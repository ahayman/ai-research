  figcaption {

<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<script>
  mermaid.initialize({
    startOnLoad: true,
    theme: 'base',
    fontFamily: 'Georgia, serif',
    themeVariables: {
      cScale0: '#7c1d1d',
      cScale1: '#c89b3c',
      cScale2: '#4a0d0d',
      cScale3: '#5a3a8c',
      cScaleLabel0: '#f5e9d3',
      primaryTextColor: '#2b2018'
    }
  });
  // Apply spoiler-blur to last three sections after Mermaid renders
  window.addEventListener('load', () => {
    setTimeout(() => {
      const svg = document.querySelector('.mermaid svg');
      if (!svg) return;
      // Heuristic: find text nodes containing 'SPOILER' or chapter 8+ markers
      svg.querySelectorAll('text').forEach(t => {
        const txt = t.textContent || '';
        if (/SPOILER|Ch 8|Ch 9|Ch 10|Ch 11|Ch 12|Standard Ending|True Ending|Caliburn's massacre|Hexe Marie killed|Master Du explains|A.T.A.G|Blackstar|H.A.L.L. defeated|Corrupted Caliburn|Umbra-Myurdin|Crimson Arbiter|life force|141 Sealed|Oongka/.test(txt)) {
          t.style.filter = 'blur(5px)';
          t.style.cursor = 'pointer';
          t.style.transition = 'filter 0.3s';
          t.addEventListener('mouseenter', () => t.style.filter = 'none');
          t.addEventListener('mouseleave', () => t.style.filter = 'blur(5px)');
        }
      });
    }, 600);
  });
</script>
