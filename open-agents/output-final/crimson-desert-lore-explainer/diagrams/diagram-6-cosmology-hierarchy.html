<!DOCTYPE html>

<head>

  .notice {
    text-align: center;

    background: linear-gradient(180deg, #fffaf0 0%, #f5e9d3 100%);

    position: relative;
  }
  .timeline-wrap::before {
    content: "Main-story spoiler — hover or tap to reveal";
    position: absolute;
    top: 0.4rem; left: 50%;
    transform: translateX(-50%);
    background: var(--abyss);
    color: var(--parchment);
    padding: 0.18rem 0.7rem;

<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<script>
  mermaid.initialize({
    startOnLoad: true,
    theme: 'base',
    flowchart: { useMaxWidth: true, htmlLabels: true, curve: 'basis' },
    themeVariables: {
      primaryColor: '#fffaf0',
      primaryBorderColor: '#7c1d1d',
      primaryTextColor: '#2b2018',
      lineColor: '#7a6242',
      fontFamily: 'Georgia, serif'
    }
  });

  // Draw 108 unmarked tick marks programmatically along the cycle bar.
  // Skip indices for cycles already drawn as labeled markers (1, 17, 26, 50, 107, 108 → indices 0, 16, 25, 49, 106, 107).
  (function drawTicks() {
    const svg = document.querySelector('#timelineWrap svg');
    if (!svg) return;
    const ticksGroup = svg.querySelector('#ticks');
    if (!ticksGroup) return;
    const startX = 40, endX = 1040, n = 108;
    const step = (endX - startX) / (n - 1);
    const skip = new Set([0, 16, 25, 49, 106, 107]);
    for (let i = 0; i < n; i++) {
      if (skip.has(i)) continue;
      const x = startX + i * step;
      const tick = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      tick.setAttribute('x1', x);
      tick.setAttribute('y1', 156);
      tick.setAttribute('x2', x);
      tick.setAttribute('y2', 164);
      ticksGroup.appendChild(tick);
    }
  })();

  // Click to lock-reveal the timeline spoiler band
  (function bindReveal() {
    const wrap = document.getElementById('timelineWrap');
    if (!wrap) return;
    wrap.addEventListener('click', () => {
      wrap.classList.toggle('revealed');
    });
  })();
</script>
