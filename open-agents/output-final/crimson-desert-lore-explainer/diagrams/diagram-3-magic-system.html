<h1>The Magic System — Abyss Energy Flow</h1>

<div class="legend">

  <div class="legend-item"><span class="swatch" style="background:#5a3a8c"></span>Corrupted channel (corrupts user)</div>

<figure class="concept-diagram" id="diagram-3" aria-label="Abyss energy flowchart with sanctioned and corrupted pipelines">
  <div class="diagram-container">
    <pre class="mermaid">
%%{init: {'theme':'base','themeVariables':{
  'primaryColor':'#fffaf0',
  'primaryBorderColor':'#7c1d1d',

  'lineColor':'#7a6242',
  'fontFamily':'Georgia, serif'

flowchart TD
  SRC(["The Abyss<br/><i>balance-substrate of all worlds</i>"]):::source

  SRC --> GUARD["Four Guardians<br/>(Alustin, White Crow, Master Du, +1)"]:::sanctioned
  SRC --> UMB["Umbra<br/>(corruption-god born of human darkness)"]:::corrupted

  %% Sanctioned pipeline
  GUARD --> ART["Abyss Artifacts<br/>1 artifact = 1 skill point"]:::sanctioned
  GUARD --> SPIRES["Spires<br/>(Stars / Sun / Soaring)"]:::sanctioned
  GUARD --> LIB["Library of Providence<br/>(knowledge)"]:::sanctioned

  ART --> SEAL["141 Sealed Artifacts<br/>challenge-locked"]:::sanctioned
  ART --> FADE["Faded Artifacts<br/>(respec)"]:::sanctioned
  SPIRES --> POW["Axiom Force<br/>Force Palm"]:::sanctioned
  SPIRES --> GATE["Abyss Gates<br/>(travel)"]:::sanctioned

  POW --> KLIFF[("Kliff<br/>does not corrupt")]:::hero
  ART --> KLIFF
  GATE --> KLIFF
  LIB --> KLIFF

  %% Corrupted pipeline
  UMB --> RIFTS["Rifts<br/>+ Monsters"]:::corrupted
  UMB --> CRPH["Corrupted Humans"]:::corrupted
  UMB --> POSS["Possession"]:::corrupted

  CRPH --> CALI["Caliburn<br/>(ambition)"]:::corrupted
  CRPH --> HEXE["Hexe Marie<br/>(vengeance)"]:::corrupted
  CRPH --> LUDVIG["Ludvig<br/>(opportunism)"]:::corrupted
  POSS --> MYUR["Myurdin<br/>(brutality → vessel of Umbra)"]:::corrupted

  %% Overlap: sealed artifacts can be in corrupted zones
  RIFTS -. drops fragments .-> SEAL

  %% Feedback loop: corruption flows back into the Abyss
  CRPH -. feeds darkness .-> UMB
  POSS -. feeds darkness .-> UMB

  classDef source fill:#c89b3c,stroke:#7c1d1d,color:#2b2018,stroke-width:3px,font-weight:bold;
  classDef sanctioned fill:#dfe8d3,stroke:#3d6b3a,color:#2b2018;
  classDef corrupted fill:#d4c2e8,stroke:#5a3a8c,color:#2b2018;
  classDef hero fill:#f5e9d3,stroke:#7c1d1d,color:#2b2018,stroke-width:3px;

  linkStyle 0 stroke:#3d6b3a,stroke-width:3px;
  linkStyle 1 stroke:#5a3a8c,stroke-width:3px;
    </pre>

  <figcaption>
    <strong>Figure 3:</strong> Abyss energy flows from a single source through two parallel pipelines. The sanctioned channel (green, via the Four Guardians) yields artifacts, signature powers, gates, and knowledge — and crucially does not corrupt the wielder. The corrupted channel (purple, via Umbra) yields rifts, monsters, and possessed antagonists. Kliff's progression draws exclusively from the sanctioned pipeline — the in-fiction reason he gains power without losing himself.
  </figcaption>
