<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Diagram 1 — Faction Relationship Map of Pywel</title>
<style>
  :root {
    --crimson: #7c1d1d;
    --burgundy: #4a0d0d;
    --gold: #c89b3c;
    --parchment: #f5e9d3;
    --slate: #2b2018;
    --ally: #3d6b3a;
    --enemy: #8b2323;
    --abyss: #5a3a8c;
  }
  body {
    background: var(--parchment);
    color: var(--slate);
    font-family: "Iowan Old Style", Georgia, serif;
    margin: 0;
    padding: 2rem;
  }
  h1 {
    color: var(--crimson);
    text-align: center;
    border-bottom: 2px solid var(--gold);
    padding-bottom: 0.5rem;
    letter-spacing: 0.05em;
  }
  .notice {
    text-align: center;
    font-style: italic;
    color: var(--burgundy);
    background: rgba(200, 155, 60, 0.15);
    border: 1px dashed var(--gold);
    padding: 0.6rem;
    margin: 1rem auto;
    max-width: 700px;
    border-radius: 4px;
  }
  .legend {
    max-width: 900px;
    margin: 1rem auto;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 1rem;
    font-size: 0.9rem;
  }
  .legend-item { display: flex; align-items: center; gap: 0.4rem; }
  .swatch { width: 28px; height: 4px; display: inline-block; }
  figure.concept-diagram {
    background: #fffaf0;
    border: 1px solid var(--gold);
    border-radius: 8px;
    padding: 1.5rem;
    max-width: 1200px;
    margin: 1rem auto;
    box-shadow: 0 4px 18px rgba(74,13,13,0.15);
  }
  .diagram-container {
    overflow-x: auto;
    padding: 1rem 0;
  }
  figcaption {
    text-align: center;
    font-style: italic;
    color: var(--burgundy);
    margin-top: 1rem;
    font-size: 0.95rem;
  }
  .spoiler {
    filter: blur(6px);
    transition: filter 0.3s ease;
    cursor: pointer;
  }
  .spoiler:hover { filter: none; }
  /* Mermaid node spoiler tagging via class */
  .mermaid .spoiler-node > rect,
  .mermaid .spoiler-node > polygon,
  .mermaid .spoiler-node > circle {
    filter: blur(5px);
  }
  .mermaid .spoiler-node:hover > rect,
  .mermaid .spoiler-node:hover > polygon,
  .mermaid .spoiler-node:hover > circle {
    filter: none;
  }
</style>
</head>
<body>
<h1>Faction Relationship Map of Pywel</h1>
<div class="notice">Spoilers blurred — hover any node to reveal. Color edges: green = ally, red = hostile, dashed = broken/historical, purple = Abyss-corrupted link.</div>
<div class="legend">
  <div class="legend-item"><span class="swatch" style="background:#3d6b3a"></span>Ally</div>
  <div class="legend-item"><span class="swatch" style="background:#8b2323"></span>Hostile</div>
  <div class="legend-item"><span class="swatch" style="background:#7a6242;border-top:2px dashed #7a6242"></span>Broken / historical</div>
  <div class="legend-item"><span class="swatch" style="background:#5a3a8c"></span>Abyss-corrupted</div>
</div>

<figure class="concept-diagram" id="diagram-1" aria-label="Faction relationship map of Pywel grouped by region">
  <div class="diagram-container">
    <pre class="mermaid">

flowchart LR

  subgraph PAILUNE["Pailune (north)"]
    GREY["Greymanes<br/>(protagonist faction)"]

    JK["Jackals<br/>(Ludvig One-Arm)"]
    PM["Pailune Militia<br/>(Jian — defunct)"]
    BF["Blue Fangs<br/>resistance"]
  end

  subgraph HERNAND["Hernand (center-south)"]
    HC["House Celeste"]
    HS["House Serkis"]
    HG["House Grace"]
    HL["House Lanford"]
    GG["Goldleaf Guild<br/>(goblin)"]
    SI["Scholastone<br/>Institute (troll)"]
    HORN["Hornsplitter's<br/>Guards"]

    REED["Reed Devil"]
  end

  subgraph DEMENISS["Demeniss (central)"]
    DRC["Demeniss<br/>royal court"]
    CAL["Caliburn faction"]:::spoiler
  end

  subgraph DELESYIA["Delesyia (east)"]
    MARNI["Marni<br/>Operations"]
    HALL["H.A.L.L.<br/>(rogue AI)"]:::spoiler

  subgraph DESERT["Crimson Desert (south)"]
    HEXE["Hexe Sanctuary<br/>(Hexe Marie)"]
    CROW["Crow Brothers<br/>(Draven)"]
    DU["Master Du<br/>(guardian)"]
  end

  subgraph UMBRA_LAYER["The Abyss"]
    UMBRA["Umbra<br/>(corruption-god)"]:::spoiler
    ALU["Alustin"]
    WC["White Crow"]
  end

  %% Alliances (green)
  GREY -. historical .-> PM
  PM === JK
  PM === BB
  GREY === HL
  GREY === BF
  GREY === HC
  GREY === HG
  GG === SI
  ALU === WC
  ALU === DU
  GREY === DU

  %% Hostilities (red)
  GREY ==>|hostile| BB
  GREY ==>|hostile| JK
  GREY ==>|hostile| HEXE
  GREY ==>|hostile| CROW
  GREY ==>|hostile| HORN
  GREY ==>|hostile| SH
  GREY ==>|hostile| REED
  GREY ==>|hostile| CAL
  GREY ==>|hostile| HALL
  HC ==>|hostile| HORN
  HEXE === CROW

  %% Broken / treachery (dashed)
  BB -. betrayed .-> PM
  JK -. betrayed .-> PM
  JK -. switched to .-> BB

  %% Abyss-corrupted links (purple-spoiler)
  UMBRA -.->|possesses| BB
  UMBRA -.->|empowers| CAL
  UMBRA -.->|empowers| HEXE
  UMBRA -.->|empowers| JK
  MARNI -. created .-> HALL

  </div>

    <strong>Figure 1:</strong> Faction relationships on the continent of Pywel, grouped by region. The Greymanes (protagonist faction) sit at the center of the alliance/hostility web. Spoiler-tagged nodes (purple, blurred) reveal Umbra's corruption network spans every major antagonist.

</figure>

      lineColor: '#7a6242',
      fontFamily: 'Georgia, serif'
    }
  });
</script>
</body>
</html>
