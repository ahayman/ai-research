<!-- Diagram: Geography of Pywel -->
<!-- Type: custom-svg -->
<!-- Generated: 2026-05-01 -->
<!-- Description: Stylized political map of Pywel's five regions with translucent Abyss layer above. -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Diagram 4 — Geography of Pywel</title>
<style>
  :root {
    --crimson: #7c1d1d;
    --burgundy: #4a0d0d;
    --gold: #c89b3c;
    --parchment: #f5e9d3;
    --slate: #2b2018;
  }
  body {
    background: var(--parchment);
    color: var(--slate);
    font-family: "Iowan Old Style", Georgia, serif;
    margin: 0;
    padding: 2rem;
  }
  h1 {
    color: var(--crimson);
    text-align: center;
    border-bottom: 2px solid var(--gold);
    padding-bottom: 0.5rem;
  }
  figure.concept-diagram {
    background: #fffaf0;
    border: 1px solid var(--gold);
    border-radius: 8px;
    padding: 1.5rem;
    max-width: 1100px;
    margin: 1rem auto;
    box-shadow: 0 4px 18px rgba(74,13,13,0.15);
  }
  figcaption {
    text-align: center;
    font-style: italic;
    color: var(--burgundy);
    margin-top: 1rem;
    font-size: 0.95rem;
  }
  svg { width: 100%; height: auto; display: block; }
</style>
</head>
<body>
<h1>Geography of Pywel</h1>

<figure class="concept-diagram" id="diagram-4">
  <svg viewBox="0 0 1000 780" xmlns="http://www.w3.org/2000/svg" role="img"
       aria-labelledby="title-4 desc-4">
    <title id="title-4">Stylized political map of the continent of Pywel</title>
    <desc id="desc-4">Five labeled regional blocks of Pywel arranged spatially: Pailune in the north,
      Hernand in the center-west, Demeniss in the center, Delesyia in the east, Crimson Desert in the south.
      A translucent Abyss layer floats above with three Spires (Stars, Sun, Soaring) anchoring vertically
      from ground regions to the Abyss. The Library of Providence is a star-marker at the center of the Abyss.</desc>

    <defs>
      <pattern id="paper" patternUnits="userSpaceOnUse" width="20" height="20">
        <rect width="20" height="20" fill="#f5e9d3"/>
        <circle cx="3" cy="3" r="0.5" fill="#c89b3c" opacity="0.18"/>
        <circle cx="13" cy="11" r="0.5" fill="#7c1d1d" opacity="0.10"/>
      </pattern>
      <radialGradient id="abyssGrad" cx="50%" cy="40%" r="60%">
        <stop offset="0%" stop-color="#5a3a8c" stop-opacity="0.55"/>
        <stop offset="100%" stop-color="#1a0d2e" stop-opacity="0.25"/>
      </radialGradient>
      <linearGradient id="pailuneGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#cfd8dc"/>
        <stop offset="1" stop-color="#90a4ae"/>
      </linearGradient>
      <linearGradient id="hernandGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#a8c090"/>
        <stop offset="1" stop-color="#6a8050"/>
      </linearGradient>
      <linearGradient id="demenissGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#d4b878"/>
        <stop offset="1" stop-color="#9a7d3c"/>
      </linearGradient>
      <linearGradient id="delesyiaGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#7a8590"/>
        <stop offset="1" stop-color="#3a4550"/>
      </linearGradient>
      <linearGradient id="desertGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#c87858"/>
        <stop offset="1" stop-color="#7c1d1d"/>
      </linearGradient>
      <filter id="glow">
        <feGaussianBlur stdDeviation="3" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#c89b3c"/>
      </marker>
    </defs>

    <!-- Parchment background -->
    <rect width="1000" height="780" fill="url(#paper)"/>
    <rect width="1000" height="780" fill="none" stroke="#7c1d1d" stroke-width="3"/>

    <!-- ABYSS LAYER (top translucent band with floating islands) -->
    <g id="abyss-layer">
      <ellipse cx="500" cy="100" rx="470" ry="80" fill="url(#abyssGrad)"/>
      <text x="500" y="40" text-anchor="middle" font-size="22" fill="#3a1f5c"
            font-family="Georgia,serif" font-weight="bold" letter-spacing="0.15em">THE ABYSS</text>
      <text x="500" y="60" text-anchor="middle" font-size="11" fill="#3a1f5c"
            font-family="Georgia,serif" font-style="italic">balance-substrate of all worlds</text>
      <!-- Floating islands -->
      <ellipse cx="220" cy="110" rx="55" ry="14" fill="#3a1f5c" opacity="0.7"/>
      <ellipse cx="780" cy="115" rx="60" ry="13" fill="#3a1f5c" opacity="0.7"/>
      <ellipse cx="380" cy="135" rx="40" ry="10" fill="#3a1f5c" opacity="0.6"/>
      <ellipse cx="640" cy="135" rx="50" ry="11" fill="#3a1f5c" opacity="0.6"/>
      <!-- Library of Providence: gold star at center -->
      <g transform="translate(500,110)" filter="url(#glow)">
        <polygon points="0,-22 6,-7 22,-7 9,3 14,19 0,9 -14,19 -9,3 -22,-7 -6,-7"
                 fill="#c89b3c" stroke="#7c1d1d" stroke-width="1.5"/>
      </g>
      <text x="500" y="155" text-anchor="middle" font-size="10" fill="#f5e9d3"
            font-family="Georgia,serif" font-weight="bold">Library of Providence</text>
    </g>

    <!-- PAILUNE (north) -->
    <g id="pailune">
      <rect x="280" y="195" width="440" height="100" rx="10" fill="url(#pailuneGrad)"
            stroke="#4a4030" stroke-width="2"/>
      <text x="500" y="225" text-anchor="middle" font-size="22" font-weight="bold"
            fill="#2b2018" font-family="Georgia,serif">PAILUNE</text>
      <text x="500" y="245" text-anchor="middle" font-size="11" fill="#2b2018"
            font-family="Georgia,serif" font-style="italic">snowy forests &amp; mountain castles — north</text>
      <text x="500" y="265" text-anchor="middle" font-size="10" fill="#4a4030"
            font-family="Georgia,serif">Greymanes (ancestral) · Black Bears · Jackals · Blue Fangs resistance</text>
      <text x="500" y="282" text-anchor="middle" font-size="10" fill="#4a4030"
            font-family="Georgia,serif">Howling Hill (Greymane Camp rebuilt in Hernand)</text>
    </g>

    <!-- HERNAND (center-west) -->
    <g id="hernand">
      <rect x="60" y="320" width="380" height="180" rx="10" fill="url(#hernandGrad)"
            stroke="#3a4520" stroke-width="2"/>
      <text x="250" y="355" text-anchor="middle" font-size="22" font-weight="bold"
            fill="#1a2010" font-family="Georgia,serif">HERNAND</text>
      <text x="250" y="375" text-anchor="middle" font-size="11" fill="#1a2010"
            font-family="Georgia,serif" font-style="italic">rivers &amp; mountains — center-west · starting region</text>
      <text x="250" y="400" text-anchor="middle" font-size="10" fill="#1a2010" font-family="Georgia,serif">Houses Celeste · Serkis · Grace · Lanford</text>
      <text x="250" y="418" text-anchor="middle" font-size="10" fill="#1a2010" font-family="Georgia,serif">Goldleaf Merchant Guild HQ (goblin)</text>
      <text x="250" y="436" text-anchor="middle" font-size="10" fill="#1a2010" font-family="Georgia,serif">Scholastone Institute (troll)</text>
      <text x="250" y="454" text-anchor="middle" font-size="10" fill="#1a2010" font-family="Georgia,serif">Greymane Camp at Howling Hill</text>
      <text x="250" y="472" text-anchor="middle" font-size="10" fill="#1a2010" font-family="Georgia,serif">St. Halssius House of Healing · Sunset Valley</text>
    </g>

    <!-- DEMENISS (center) -->
    <g id="demeniss">
      <rect x="455" y="320" width="280" height="180" rx="10" fill="url(#demenissGrad)"
            stroke="#5a4a20" stroke-width="2"/>
      <text x="595" y="355" text-anchor="middle" font-size="22" font-weight="bold"
            fill="#2a1f08" font-family="Georgia,serif">DEMENISS</text>
      <text x="595" y="375" text-anchor="middle" font-size="11" fill="#2a1f08"
            font-family="Georgia,serif" font-style="italic">political &amp; military heart</text>
      <text x="595" y="400" text-anchor="middle" font-size="10" fill="#2a1f08" font-family="Georgia,serif">Royal capital · coronation hall</text>
      <text x="595" y="418" text-anchor="middle" font-size="10" fill="#2a1f08" font-family="Georgia,serif">Caliburn faction · Fort Musket</text>
      <text x="595" y="436" text-anchor="middle" font-size="10" fill="#2a1f08" font-family="Georgia,serif">Calphade Castle (Ch 6)</text>
      <text x="595" y="454" text-anchor="middle" font-size="10" fill="#2a1f08" font-family="Georgia,serif">Site of Blood Coronation (Ch 8)</text>
    </g>

    <!-- DELESYIA (east) -->
    <g id="delesyia">
      <rect x="755" y="320" width="200" height="180" rx="10" fill="url(#delesyiaGrad)"
            stroke="#1a2530" stroke-width="2"/>
      <text x="855" y="355" text-anchor="middle" font-size="20" font-weight="bold"
            fill="#f5e9d3" font-family="Georgia,serif">DELESYIA</text>
      <text x="855" y="375" text-anchor="middle" font-size="11" fill="#f5e9d3"
            font-family="Georgia,serif" font-style="italic">tech / industrial — east</text>
      <text x="855" y="400" text-anchor="middle" font-size="10" fill="#f5e9d3" font-family="Georgia,serif">Marni's Masterium</text>
      <text x="855" y="418" text-anchor="middle" font-size="10" fill="#f5e9d3" font-family="Georgia,serif">Delesyia Castle</text>
      <text x="855" y="436" text-anchor="middle" font-size="10" fill="#f5e9d3" font-family="Georgia,serif">Flying Fortress Orbian</text>
      <text x="855" y="454" text-anchor="middle" font-size="10" fill="#f5e9d3" font-family="Georgia,serif">A.T.A.G. mech proving ground</text>
      <text x="855" y="472" text-anchor="middle" font-size="10" fill="#f5e9d3" font-family="Georgia,serif">H.A.L.L.'s domain</text>
    </g>

    <!-- CRIMSON DESERT (south) -->
    <g id="desert">
      <rect x="180" y="525" width="640" height="200" rx="10" fill="url(#desertGrad)"
            stroke="#4a0d0d" stroke-width="2"/>
      <text x="500" y="560" text-anchor="middle" font-size="22" font-weight="bold"
            fill="#f5e9d3" font-family="Georgia,serif" letter-spacing="0.05em">CRIMSON DESERT</text>
      <text x="500" y="580" text-anchor="middle" font-size="11" fill="#f5e9d3"
            font-family="Georgia,serif" font-style="italic">red sands — south · lawless</text>
      <text x="500" y="605" text-anchor="middle" font-size="10" fill="#f5e9d3" font-family="Georgia,serif">Sage's domain (Master Du)</text>
      <text x="500" y="623" text-anchor="middle" font-size="10" fill="#f5e9d3" font-family="Georgia,serif">Hexe's Smoking Lands · Witchwoods (border)</text>
      <text x="500" y="641" text-anchor="middle" font-size="10" fill="#f5e9d3" font-family="Georgia,serif">Wyrm/dragon territories · Spire of the Sun</text>
      <text x="500" y="659" text-anchor="middle" font-size="10" fill="#f5e9d3" font-family="Georgia,serif">Goyen · T'rukan · ruined temples</text>
    </g>

    <!-- SPIRES (vertical anchors from regions to Abyss) -->
    <g id="spires" stroke="#c89b3c" stroke-width="2" fill="none" stroke-dasharray="4 3" opacity="0.8">
      <!-- Spire of Stars: Everfrost, north of Scholastone -->
      <line x1="200" y1="180" x2="200" y2="320"/>
      <circle cx="200" cy="180" r="6" fill="#c89b3c" stroke="#7c1d1d" opacity="1"/>
      <text x="200" y="172" text-anchor="middle" font-size="10" fill="#7c1d1d"
            font-family="Georgia,serif" font-weight="bold">Spire of Stars</text>

      <!-- Spire of Soaring: central -->
      <line x1="595" y1="180" x2="595" y2="320"/>
      <circle cx="595" cy="180" r="6" fill="#c89b3c" stroke="#7c1d1d" opacity="1"/>
      <text x="595" y="172" text-anchor="middle" font-size="10" fill="#7c1d1d"
            font-family="Georgia,serif" font-weight="bold">Spire of Soaring</text>

      <!-- Spire of the Sun: Crimson Desert -->
      <line x1="500" y1="180" x2="500" y2="525"/>
      <circle cx="500" cy="180" r="6" fill="#c89b3c" stroke="#7c1d1d" opacity="1"/>
      <text x="500" y="200" text-anchor="middle" font-size="10" fill="#7c1d1d"
            font-family="Georgia,serif" font-weight="bold">Spire of the Sun</text>
    </g>

    <!-- Compass rose -->
    <g transform="translate(910,720)" font-family="Georgia,serif" font-size="11" fill="#7c1d1d">
      <circle cx="0" cy="0" r="28" fill="#fffaf0" stroke="#7c1d1d"/>
      <polygon points="0,-22 4,0 0,22 -4,0" fill="#7c1d1d"/>
      <text x="0" y="-14" text-anchor="middle" font-size="10" fill="#fffaf0">N</text>
      <text x="0" y="20" text-anchor="middle" font-size="10" fill="#fffaf0">S</text>
    </g>

    <!-- Caption-internal scale legend -->
    <g transform="translate(40,720)" font-family="Georgia,serif" font-size="10" fill="#4a0d0d">
      <text x="0" y="0">Translucent purple band = the Abyss (above Pywel).</text>
      <text x="0" y="14">Gold stars/dashed lines = Spires + Library of Providence.</text>
      <text x="0" y="28">Region color follows biome: snow, forest, plains, slate, sand.</text>
    </g>
  </svg>
  <figcaption>
    <strong>Figure 4:</strong> Pywel's five regions arranged spatially — Pailune north, Hernand center-west, Demeniss center, Delesyia east, Crimson Desert south. The translucent Abyss layer floats above; three Spires anchor vertically as physical bridges. The Library of Providence sits at the Abyss's center as a gold star — the in-fiction "Rosetta Stone" the protagonist eventually reaches.
  </figcaption>
</figure>

</body>
</html>
