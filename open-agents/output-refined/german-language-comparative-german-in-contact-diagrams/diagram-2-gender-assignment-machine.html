<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gender Assignment Machine</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #f8f9fa;
    color: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 2rem;
  }
  figure {
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
    max-width: 1150px;
    width: 100%;
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid #e9ecef;
  }
  figcaption strong { display: block; font-size: 1.15rem; color: #1a1a2e; margin-bottom: 0.4rem; }
  figcaption span { font-size: 0.9rem; color: #6c757d; line-height: 1.5; }
  svg { max-width: 100%; height: auto; }
  .legend {
    display: flex; justify-content: center; gap: 1.5rem; margin-top: 1rem; flex-wrap: wrap;
  }
  .legend-item { display: flex; align-items: center; gap: 0.5rem; font-size: 0.85rem; color: #495057; }
  .legend-swatch { width: 16px; height: 16px; border-radius: 4px; }
  @media (prefers-color-scheme: dark) {
    body { background: #1a1a2e; color: #e9ecef; }
    figure { background: #2d2d44; box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
    figcaption { border-top-color: #3d3d5c; }
    figcaption strong { color: #e9ecef; }
    figcaption span { color: #adb5bd; }
    .legend-item { color: #adb5bd; }
    svg text { fill: #e9ecef; }
  }
</style>
</head>
<body>
<figure>
  <svg viewBox="0 0 1100 880" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
    <defs>
      <marker id="arrowD" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
        <path d="M0,0 L8,3 L0,6" fill="#64748b"/>
      </marker>
      <marker id="arrowYes" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
        <path d="M0,0 L8,3 L0,6" fill="#22c55e"/>
      </marker>
      <marker id="arrowNo" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
        <path d="M0,0 L8,3 L0,6" fill="#ef4444"/>
      </marker>
    </defs>

    <!-- Title -->
    <text x="550" y="32" text-anchor="middle" font-size="20" font-weight="700" fill="#1a1a2e">The Gender Assignment Machine</text>
    <text x="550" y="52" text-anchor="middle" font-size="13" fill="#6c757d">How German decides der, die, or das for English loanwords -- systematic but not deterministic</text>

    <!-- Input -->
    <rect x="375" y="70" width="350" height="40" rx="20" fill="#1e293b"/>
    <text x="550" y="95" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">New English noun arrives in German</text>

    <!-- Arrow down -->
    <line x1="550" y1="110" x2="550" y2="140" stroke="#64748b" stroke-width="2" marker-end="url(#arrowD)"/>

    <!-- Decision 1: Person? -->
    <polygon points="550,145 700,195 550,245 400,195" fill="#eef2ff" stroke="#6366f1" stroke-width="2"/>
    <text x="550" y="190" text-anchor="middle" font-size="12" font-weight="600" fill="#4f46e5">Does it refer</text>
    <text x="550" y="206" text-anchor="middle" font-size="12" font-weight="600" fill="#4f46e5">to a person?</text>

    <!-- YES from Decision 1 -->
    <line x1="700" y1="195" x2="830" y2="195" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowYes)"/>
    <text x="760" y="188" font-size="10" font-weight="700" fill="#22c55e">YES</text>

    <rect x="835" y="170" width="240" height="50" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/>
    <text x="955" y="190" text-anchor="middle" font-size="11" font-weight="600" fill="#16a34a">Assign by biological gender</text>
    <text x="955" y="208" text-anchor="middle" font-size="10" fill="#166534">der Manager, die Stewardess</text>

    <!-- NO from Decision 1 -->
    <line x1="550" y1="245" x2="550" y2="275" stroke="#ef4444" stroke-width="2" marker-end="url(#arrowNo)"/>
    <text x="565" y="263" font-size="10" font-weight="700" fill="#ef4444">NO</text>

    <!-- Decision 2: Suffix? -->
    <polygon points="550,280 720,335 550,390 380,335" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
    <text x="550" y="328" text-anchor="middle" font-size="12" font-weight="600" fill="#d97706">Recognizable</text>
    <text x="550" y="344" text-anchor="middle" font-size="12" font-weight="600" fill="#d97706">suffix?</text>

    <!-- YES from Decision 2: -ing -->
    <line x1="720" y1="335" x2="830" y2="300" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowYes)"/>
    <text x="770" y="308" font-size="10" font-weight="700" fill="#22c55e">YES</text>

    <rect x="835" y="260" width="240" height="34" rx="8" fill="#fefce8" stroke="#eab308" stroke-width="1"/>
    <text x="955" y="275" text-anchor="middle" font-size="10" font-weight="600" fill="#854d0e">-ing &#8594; das (neuter)</text>
    <text x="955" y="289" text-anchor="middle" font-size="9" fill="#92400e">das Meeting, das Training, das Jogging</text>

    <rect x="835" y="300" width="240" height="34" rx="8" fill="#fefce8" stroke="#eab308" stroke-width="1"/>
    <text x="955" y="315" text-anchor="middle" font-size="10" font-weight="600" fill="#854d0e">-er &#8594; der (masculine)</text>
    <text x="955" y="329" text-anchor="middle" font-size="9" fill="#92400e">der Browser, der Scanner, der Server</text>

    <!-- NO from Decision 2 -->
    <line x1="550" y1="390" x2="550" y2="420" stroke="#ef4444" stroke-width="2" marker-end="url(#arrowNo)"/>
    <text x="565" y="408" font-size="10" font-weight="700" fill="#ef4444">NO</text>

    <!-- Decision 3: German equivalent? -->
    <polygon points="550,425 720,480 550,535 380,480" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
    <text x="550" y="473" text-anchor="middle" font-size="12" font-weight="600" fill="#16a34a">Close German</text>
    <text x="550" y="489" text-anchor="middle" font-size="12" font-weight="600" fill="#16a34a">equivalent?</text>

    <!-- YES from Decision 3 -->
    <line x1="720" y1="480" x2="830" y2="480" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowYes)"/>
    <text x="770" y="473" font-size="10" font-weight="700" fill="#22c55e">YES</text>

    <rect x="835" y="453" width="240" height="55" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="1"/>
    <text x="955" y="472" text-anchor="middle" font-size="10" font-weight="600" fill="#166534">Take the equivalent's gender</text>
    <text x="955" y="488" text-anchor="middle" font-size="9" fill="#166534">die E-Mail &#8592; die Post/Nachricht</text>
    <text x="955" y="502" text-anchor="middle" font-size="9" fill="#166534">der Computer &#8592; der Rechner</text>

    <!-- NO from Decision 3 -->
    <line x1="550" y1="535" x2="550" y2="565" stroke="#ef4444" stroke-width="2" marker-end="url(#arrowNo)"/>
    <text x="565" y="553" font-size="10" font-weight="700" fill="#ef4444">NO</text>

    <!-- Decision 4: Monosyllabic? -->
    <polygon points="550,570 700,615 550,660 400,615" fill="#eef2ff" stroke="#6366f1" stroke-width="2"/>
    <text x="550" y="610" text-anchor="middle" font-size="12" font-weight="600" fill="#4f46e5">Short</text>
    <text x="550" y="626" text-anchor="middle" font-size="12" font-weight="600" fill="#4f46e5">monosyllable?</text>

    <!-- YES from Decision 4 -->
    <line x1="700" y1="615" x2="830" y2="615" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowYes)"/>
    <text x="760" y="608" font-size="10" font-weight="700" fill="#22c55e">YES</text>

    <rect x="835" y="593" width="240" height="44" rx="8" fill="#eef2ff" stroke="#6366f1" stroke-width="1"/>
    <text x="955" y="611" text-anchor="middle" font-size="10" font-weight="600" fill="#4f46e5">Default: der (masculine)</text>
    <text x="955" y="628" text-anchor="middle" font-size="9" fill="#3730a3">Statistically most common German gender</text>

    <!-- The collision zone -->
    <line x1="550" y1="660" x2="550" y2="690" stroke="#ef4444" stroke-width="2" marker-end="url(#arrowNo)"/>

    <!-- Left-side labels -->
    <rect x="30" y="170" width="120" height="24" rx="4" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
    <text x="90" y="186" text-anchor="middle" font-size="9" fill="#64748b">Rule 1: Animacy</text>
    <line x1="150" y1="182" x2="400" y2="195" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4,3"/>

    <rect x="30" y="318" width="120" height="24" rx="4" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
    <text x="90" y="334" text-anchor="middle" font-size="9" fill="#64748b">Rule 2: Suffix</text>
    <line x1="150" y1="330" x2="380" y2="335" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4,3"/>

    <rect x="30" y="463" width="120" height="24" rx="4" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
    <text x="90" y="479" text-anchor="middle" font-size="9" fill="#64748b">Rule 3: Analogy</text>
    <line x1="150" y1="475" x2="380" y2="480" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4,3"/>

    <rect x="30" y="600" width="120" height="24" rx="4" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
    <text x="90" y="616" text-anchor="middle" font-size="9" fill="#64748b">Rule 4: Default</text>
    <line x1="150" y1="612" x2="400" y2="615" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4,3"/>

    <!-- COLLISION / VARIATION box -->
    <rect x="280" y="695" width="540" height="80" rx="12" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
    <text x="550" y="718" text-anchor="middle" font-size="14" font-weight="700" fill="#dc2626">COLLISION ZONE: When Rules Conflict &#8594; VARIATION</text>
    <text x="550" y="740" text-anchor="middle" font-size="11" fill="#991b1b">der Laptop vs. das Laptop (suffix says das, default says der)</text>
    <text x="550" y="757" text-anchor="middle" font-size="11" fill="#991b1b">der Blog vs. das Blog &nbsp;&bull;&nbsp; die Nutella vs. das Nutella vs. der Nutella</text>
    <text x="550" y="772" text-anchor="middle" font-size="10" font-style="italic" fill="#b91c1c">Multiple competing principles &#8594; genuine speaker disagreement</text>

    <!-- English comparison callout -->
    <rect x="80" y="795" width="940" height="65" rx="10" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="550" y="818" text-anchor="middle" font-size="13" font-weight="700" fill="#334155">English Has No Equivalent Process</text>
    <text x="550" y="838" text-anchor="middle" font-size="11" fill="#475569">When English borrowed French words after 1066, ZERO gender adaptation was needed --</text>
    <text x="550" y="853" text-anchor="middle" font-size="11" fill="#475569">English had already lost grammatical gender centuries earlier. Every French noun entered English as a genderless item.</text>
  </svg>
  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background:#6366f1;"></div>Decision nodes</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#22c55e;"></div>YES path / assignment</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#ef4444;"></div>NO path / conflict zone</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#eab308;"></div>Suffix rules</div>
  </div>
  <figcaption>
    <strong>Figure 2: The Gender Assignment Machine -- How German Articles Are Chosen for English Nouns</strong>
    <span>Every English noun entering German must receive one of three grammatical genders (der/die/das) via a hierarchy of competing rules: biological gender for persons, suffix patterns (-ing = neuter, -er = masculine), analogy with the nearest German equivalent, or a monosyllabic masculine default. When rules conflict, genuine variation results -- speakers disagree on der Laptop vs. das Laptop, and all three genders are attested for Nutella. English, by contrast, has no equivalent process: having lost grammatical gender before the Norman Conquest, it absorbed French loanwords with zero gender adaptation.</span>
  </figcaption>
</figure>
</body>
</html>
