<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anglicism Typology Tree</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #f8f9fa;
    color: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 2rem;
  }
  figure {
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
    max-width: 1150px;
    width: 100%;
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid #e9ecef;
  }
  figcaption strong { display: block; font-size: 1.15rem; color: #1a1a2e; margin-bottom: 0.4rem; }
  figcaption span { font-size: 0.9rem; color: #6c757d; line-height: 1.5; }
  svg { max-width: 100%; height: auto; }
  .legend {
    display: flex; justify-content: center; gap: 1.5rem; margin-top: 1rem; flex-wrap: wrap;
  }
  .legend-item { display: flex; align-items: center; gap: 0.5rem; font-size: 0.85rem; color: #495057; }
  .legend-swatch { width: 16px; height: 16px; border-radius: 4px; }
  @media (prefers-color-scheme: dark) {
    body { background: #1a1a2e; color: #e9ecef; }
    figure { background: #2d2d44; box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
    figcaption { border-top-color: #3d3d5c; }
    figcaption strong { color: #e9ecef; }
    figcaption span { color: #adb5bd; }
    .legend-item { color: #adb5bd; }
    svg text { fill: #e9ecef; }
  }
</style>
</head>
<body>
<figure>
  <svg viewBox="0 0 1100 820" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
    <defs>
      <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
        <path d="M0,0 L8,3 L0,6" fill="#94a3b8"/>
      </marker>
      <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
        <path d="M0,0 L8,3 L0,6" fill="#6366f1"/>
      </marker>
    </defs>

    <!-- Title -->
    <text x="550" y="32" text-anchor="middle" font-size="20" font-weight="700" fill="#1a1a2e">Anglicism Typology Tree</text>
    <text x="550" y="52" text-anchor="middle" font-size="13" fill="#6c757d">Three mechanisms by which English words enter German -- with French-to-English parallels</text>

    <!-- Root node -->
    <rect x="400" y="70" width="300" height="44" rx="22" fill="#1e293b" stroke="none"/>
    <text x="550" y="97" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">English &#8594; German Borrowing</text>

    <!-- Branches from root -->
    <line x1="450" y1="114" x2="180" y2="160" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="550" y1="114" x2="550" y2="160" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="650" y1="114" x2="920" y2="160" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- Branch 1: Direct Loans -->
    <rect x="40" y="160" width="280" height="42" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
    <text x="180" y="176" text-anchor="middle" font-size="12" font-weight="700" fill="#dc2626">Direct Loans</text>
    <text x="180" y="193" text-anchor="middle" font-size="10" fill="#991b1b">Lehnw&#246;rter</text>

    <!-- Direct loan description -->
    <rect x="40" y="212" width="280" height="30" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
    <text x="180" y="231" text-anchor="middle" font-size="10" fill="#991b1b">Word imported with original form + meaning</text>

    <!-- Direct loan examples -->
    <rect x="40" y="252" width="280" height="80" rx="8" fill="#fff5f5" stroke="#fecaca" stroke-width="1"/>
    <text x="55" y="272" font-size="11" font-weight="600" fill="#b91c1c">Examples:</text>
    <text x="55" y="290" font-size="10" fill="#991b1b">Computer, Team, Meeting, Software</text>
    <text x="55" y="306" font-size="10" fill="#991b1b">cool, App, Streaming, Feedback</text>
    <text x="55" y="322" font-size="9" font-style="italic" fill="#b91c1c">Looks English, means what English means</text>

    <!-- Integration meter: LOW -->
    <rect x="55" y="340" width="250" height="18" rx="9" fill="#fee2e2" stroke="#fca5a5" stroke-width="1"/>
    <rect x="55" y="340" width="60" height="18" rx="9" fill="#ef4444"/>
    <text x="180" y="353" text-anchor="middle" font-size="9" font-weight="600" fill="#991b1b">Integration: LOW (still looks English)</text>

    <!-- Branch 2: Calques -->
    <rect x="400" y="160" width="300" height="42" rx="10" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
    <text x="550" y="176" text-anchor="middle" font-size="12" font-weight="700" fill="#16a34a">Calques / Loan Translations</text>
    <text x="550" y="193" text-anchor="middle" font-size="10" fill="#166534">Lehn&#252;bersetzungen</text>

    <!-- Calque description -->
    <rect x="400" y="212" width="300" height="30" rx="6" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
    <text x="550" y="231" text-anchor="middle" font-size="10" fill="#166534">Meaning translated piece-by-piece into German</text>

    <!-- Calque examples -->
    <rect x="400" y="252" width="300" height="80" rx="8" fill="#f0fdf9" stroke="#bbf7d0" stroke-width="1"/>
    <text x="415" y="272" font-size="11" font-weight="600" fill="#15803d">Examples:</text>
    <text x="415" y="290" font-size="10" fill="#166534">Wolkenkratzer &#8592; sky+scraper</text>
    <text x="415" y="306" font-size="10" fill="#166534">Kaugummi &#8592; chewing+gum</text>
    <text x="415" y="322" font-size="10" fill="#166534">Pferdest&#228;rke &#8592; horse+power</text>

    <!-- Integration meter: HIGH -->
    <rect x="415" y="340" width="270" height="18" rx="9" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
    <rect x="415" y="340" width="240" height="18" rx="9" fill="#22c55e"/>
    <text x="550" y="353" text-anchor="middle" font-size="9" font-weight="600" fill="#ffffff">Integration: HIGH (looks fully German)</text>

    <!-- Branch 3: Pseudo-Anglicisms -->
    <rect x="770" y="160" width="290" height="42" rx="10" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
    <text x="915" y="176" text-anchor="middle" font-size="12" font-weight="700" fill="#ea580c">Pseudo-Anglicisms</text>
    <text x="915" y="193" text-anchor="middle" font-size="10" fill="#9a3412">Scheinanglizismen</text>

    <!-- Pseudo description -->
    <rect x="770" y="212" width="290" height="30" rx="6" fill="#fff7ed" stroke="#fdba74" stroke-width="1"/>
    <text x="915" y="231" text-anchor="middle" font-size="10" fill="#9a3412">English parts, German invention -- doesn't exist in English</text>

    <!-- Pseudo examples -->
    <rect x="770" y="252" width="290" height="80" rx="8" fill="#fffbf5" stroke="#fed7aa" stroke-width="1"/>
    <text x="785" y="272" font-size="11" font-weight="600" fill="#c2410c">Examples:</text>
    <text x="785" y="290" font-size="10" fill="#9a3412">Handy = mobile phone (not "handy")</text>
    <text x="785" y="306" font-size="10" fill="#9a3412">Beamer = projector (not "BMW")</text>
    <text x="785" y="322" font-size="10" fill="#9a3412">Oldtimer = vintage car (not "old person")</text>

    <!-- Integration meter: PARADOXICAL -->
    <rect x="785" y="340" width="260" height="18" rx="9" fill="#ffedd5" stroke="#fdba74" stroke-width="1"/>
    <rect x="785" y="340" width="130" height="18" rx="9" fill="#f97316"/>
    <text x="915" y="353" text-anchor="middle" font-size="9" font-weight="600" fill="#9a3412">Integration: PARADOXICAL (looks English, IS German)</text>

    <!-- Historical trend arrow -->
    <rect x="40" y="380" width="1020" height="45" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
    <text x="550" y="398" text-anchor="middle" font-size="12" font-weight="700" fill="#334155">Historical Trend</text>
    <text x="140" y="416" text-anchor="middle" font-size="10" fill="#64748b">19th century: Calques dominate</text>
    <path d="M 280,411 L 440,411" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="550" y="416" text-anchor="middle" font-size="10" fill="#64748b">20th century: Mixed</text>
    <path d="M 660,411 L 800,411" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="920" y="416" text-anchor="middle" font-size="10" fill="#64748b">21st century: Direct loans dominate</text>

    <!-- PARALLEL: English from French -->
    <rect x="40" y="445" width="1020" height="185" rx="12" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
    <text x="550" y="470" text-anchor="middle" font-size="14" font-weight="700" fill="#4f46e5">Mirror: English &#8592; French (post-1066)</text>
    <text x="550" y="488" text-anchor="middle" font-size="11" fill="#6366f1">The same three mechanisms operated when English borrowed from French</text>

    <!-- French direct loans -->
    <rect x="60" y="500" width="280" height="60" rx="8" fill="#e0e7ff" stroke="#a5b4fc" stroke-width="1"/>
    <text x="200" y="518" text-anchor="middle" font-size="11" font-weight="600" fill="#4338ca">Direct Loans</text>
    <text x="200" y="536" text-anchor="middle" font-size="10" fill="#4338ca">court, judge, parliament, beef, pork</text>
    <text x="200" y="550" text-anchor="middle" font-size="9" fill="#6366f1">French form imported wholesale</text>

    <!-- French calques -->
    <rect x="370" y="500" width="360" height="60" rx="8" fill="#e0e7ff" stroke="#a5b4fc" stroke-width="1"/>
    <text x="550" y="518" text-anchor="middle" font-size="11" font-weight="600" fill="#4338ca">Calques / Structural Copies</text>
    <text x="550" y="536" text-anchor="middle" font-size="10" fill="#4338ca">"attorney general" (French adjective-after-noun order)</text>
    <text x="550" y="550" text-anchor="middle" font-size="9" fill="#6366f1">French syntax translated into English</text>

    <!-- Pseudo-gallicisms -->
    <rect x="760" y="500" width="280" height="60" rx="8" fill="#e0e7ff" stroke="#a5b4fc" stroke-width="1"/>
    <text x="900" y="518" text-anchor="middle" font-size="11" font-weight="600" fill="#4338ca">Pseudo-Gallicisms</text>
    <text x="900" y="536" text-anchor="middle" font-size="10" fill="#4338ca">"double entendre" (not standard French)</text>
    <text x="900" y="550" text-anchor="middle" font-size="9" fill="#6366f1">English invention using French parts</text>

    <!-- Parallel insight -->
    <rect x="60" y="575" width="980" height="40" rx="8" fill="#c7d2fe" stroke="#818cf8" stroke-width="1"/>
    <text x="550" y="593" text-anchor="middle" font-size="11" font-weight="600" fill="#3730a3">Key Parallel: Both German and English use all three mechanisms.</text>
    <text x="550" y="608" text-anchor="middle" font-size="10" fill="#4338ca">Pseudo-forms are especially revealing: both languages CREATE words from borrowed material that don't exist in the source language.</text>

    <!-- Formation mechanisms panel -->
    <text x="550" y="660" text-anchor="middle" font-size="14" font-weight="700" fill="#334155">Pseudo-Anglicism Formation Mechanisms</text>

    <rect x="40" y="675" width="240" height="55" rx="8" fill="#fff7ed" stroke="#f97316" stroke-width="1"/>
    <text x="160" y="695" text-anchor="middle" font-size="11" font-weight="600" fill="#c2410c">Semantic Shift</text>
    <text x="160" y="712" text-anchor="middle" font-size="9" fill="#9a3412">English word, different meaning</text>
    <text x="160" y="724" text-anchor="middle" font-size="9" fill="#9a3412">Handy, Beamer, Oldtimer</text>

    <rect x="300" y="675" width="240" height="55" rx="8" fill="#fff7ed" stroke="#f97316" stroke-width="1"/>
    <text x="420" y="695" text-anchor="middle" font-size="11" font-weight="600" fill="#c2410c">Recombination</text>
    <text x="420" y="712" text-anchor="middle" font-size="9" fill="#9a3412">English morphemes, new combo</text>
    <text x="420" y="724" text-anchor="middle" font-size="9" fill="#9a3412">Showmaster, Pullunder</text>

    <rect x="560" y="675" width="240" height="55" rx="8" fill="#fff7ed" stroke="#f97316" stroke-width="1"/>
    <text x="680" y="695" text-anchor="middle" font-size="11" font-weight="600" fill="#c2410c">Conversion</text>
    <text x="680" y="712" text-anchor="middle" font-size="9" fill="#9a3412">New part of speech</text>
    <text x="680" y="724" text-anchor="middle" font-size="9" fill="#9a3412">No-Go (adj &#8594; noun)</text>

    <rect x="820" y="675" width="240" height="55" rx="8" fill="#fff7ed" stroke="#f97316" stroke-width="1"/>
    <text x="940" y="695" text-anchor="middle" font-size="11" font-weight="600" fill="#c2410c">Archaic Retention</text>
    <text x="940" y="712" text-anchor="middle" font-size="9" fill="#9a3412">Preserves abandoned English sense</text>
    <text x="940" y="724" text-anchor="middle" font-size="9" fill="#9a3412">Smoking (&#8592; smoking jacket)</text>

    <!-- Bottom insight -->
    <rect x="40" y="750" width="1020" height="50" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
    <text x="550" y="770" text-anchor="middle" font-size="12" font-weight="600" fill="#92400e">PATTERN: Borrowing is not passive absorption -- it is active, creative transformation.</text>
    <text x="550" y="790" text-anchor="middle" font-size="11" fill="#92400e">Pseudo-anglicisms prove that German doesn't just import English -- it invents with English raw material.</text>
  </svg>
  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background:#ef4444;"></div>Direct Loans (low integration)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#22c55e;"></div>Calques (high integration)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#f97316;"></div>Pseudo-Anglicisms (paradoxical)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#6366f1;"></div>English &#8592; French parallel</div>
  </div>
  <figcaption>
    <strong>Figure 1: Anglicism Typology Tree -- Three Mechanisms of English-to-German Borrowing</strong>
    <span>English words enter German through three distinct channels: direct loans (imported as-is), calques (translated piece-by-piece into German morphemes), and pseudo-anglicisms (German inventions wearing English clothing). The same three mechanisms operated when English borrowed from French after 1066. In the 21st century, direct loans increasingly dominate over calques, reversing the 19th-century pattern. Pseudo-anglicisms like Handy, Beamer, and Oldtimer reveal German as an active creator, not a passive borrower.</span>
  </figcaption>
</figure>
</body>
