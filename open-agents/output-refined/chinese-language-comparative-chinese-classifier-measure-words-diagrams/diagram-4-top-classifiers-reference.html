<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Top 20+ Chinese Classifiers: A Visual Reference</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --accent: #2563eb;
    --shape: #e67e22; --shape-bg: #fef3e2;
    --anim: #8b5cf6; --anim-bg: #ede9fe;
    --func: #2563eb; --func-bg: #dbeafe;
    --gen: #059669; --gen-bg: #d1fae5;
    --group: #ec4899; --group-bg: #fce7f3;
    --muted: #6c757d; --caption-bg: #f8f9fa;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a; --fg: #e8e8f0; --surface: #1a1a2e; --border: #2d2d44;
      --accent: #6b8aff;
      --shape: #f59e0b; --shape-bg: #4a3520;
      --anim: #a78bfa; --anim-bg: #2e2050;
      --func: #6b8aff; --func-bg: #1e2a4a;
      --gen: #34d399; --gen-bg: #14352d;
      --group: #f472b6; --group-bg: #4a2040;
      --muted: #9a9ab0; --caption-bg: #1a1a2e;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg); color: var(--fg);
    display: flex; justify-content: center; padding: 2rem 1rem; line-height: 1.6;
  }
  figure { max-width: 1100px; width: 100%; }
  .diagram-container {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 2rem 1.5rem; overflow-x: auto;
  }
  .ref-title {
    text-align: center; font-size: 1.1rem; font-weight: 700;
    color: var(--accent); margin-bottom: 0.3rem;
  }
  .ref-sub { text-align: center; font-size: 0.85rem; color: var(--muted); margin-bottom: 1.5rem; }
  /* Category sections */
  .cat-section { margin-bottom: 1.2rem; }
  .cat-header {
    font-size: 0.85rem; font-weight: 700; padding: 0.3rem 0.6rem;
    border-radius: 4px 4px 0 0; display: inline-block;
  }
  .cat-shape .cat-header { background: var(--shape); color: white; }
  .cat-anim .cat-header { background: var(--anim); color: white; }
  .cat-func .cat-header { background: var(--func); color: white; }
  .cat-gen .cat-header { background: var(--gen); color: white; }
  .cat-group .cat-header { background: var(--group); color: white; }
  .cl-table {
    width: 100%; border-collapse: collapse;
    border: 1px solid var(--border); border-radius: 0 6px 6px 6px;
    overflow: hidden;
  }
  .cl-table th {
    text-align: left; padding: 0.4rem 0.6rem; font-size: 0.75rem;
    font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em;
    border-bottom: 2px solid var(--border);
  }
  .cat-shape .cl-table th { background: var(--shape-bg); color: var(--shape); }
  .cat-anim .cl-table th { background: var(--anim-bg); color: var(--anim); }
  .cat-func .cl-table th { background: var(--func-bg); color: var(--func); }
  .cat-gen .cl-table th { background: var(--gen-bg); color: var(--gen); }
  .cat-group .cl-table th { background: var(--group-bg); color: var(--group); }
  .cl-table td {
    padding: 0.4rem 0.6rem; font-size: 0.82rem;
    border-bottom: 1px solid var(--border); background: var(--bg);
    vertical-align: top;
  }
  .cl-table tr:last-child td { border-bottom: none; }
  .cl-char { font-size: 1.2rem; font-weight: 700; }
  .cl-py { font-size: 0.78rem; color: var(--muted); font-style: italic; }
  .cat-shape .cl-char { color: var(--shape); }
  .cat-anim .cl-char { color: var(--anim); }
  .cat-func .cl-char { color: var(--func); }
  .cat-gen .cl-char { color: var(--gen); }
  .cat-group .cl-char { color: var(--group); }
  .ex-list { font-size: 0.78rem; color: var(--muted); }
  /* Highlight row for 个 */
  .ge-highlight td {
    background: var(--gen-bg) !important;
    font-weight: 600;
  }
  .note-box {
    margin-top: 1rem; padding: 0.8rem 1rem;
    background: var(--bg); border: 2px dashed var(--gen);
    border-radius: 6px; font-size: 0.85rem; text-align: center;
  }
  .note-box strong { color: var(--gen); }
  figcaption {
    text-align: center; margin-top: 1.5rem; padding: 1rem 1.5rem;
    background: var(--caption-bg); border-radius: 8px; border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  .legend {
    display: flex; gap: 1.2rem; justify-content: center; flex-wrap: wrap;
    margin-top: 1rem; font-size: 0.78rem; color: var(--muted);
  }
  .legend-item { display: flex; align-items: center; gap: 0.3rem; }
  .legend-swatch { width: 12px; height: 12px; border-radius: 2px; }
</style>
</head>
<body>
<figure>
  <div class="diagram-container">
    <div class="ref-title">The Top 20+ Chinese Classifiers</div>
    <div class="ref-sub">个 plus these ~20 classifiers cover the vast majority of daily communication</div>

    <!-- General -->
    <div class="cat-section cat-gen">
      <span class="cat-header">General (Default)</span>
      <table class="cl-table">
        <tr><th>Classifier</th><th>Core Meaning</th><th>Example Nouns</th></tr>
        <tr class="ge-highlight">
          <td><span class="cl-char">个</span> <span class="cl-py">ge</span></td>
          <td>Universal default -- works for most nouns in casual speech</td>
          <td class="ex-list">人 person, 苹果 apple, 问题 question, 小时 hour, 想法 idea</td>
        </tr>
      </table>
    </div>

    <!-- Shape -->
    <div class="cat-section cat-shape">
      <span class="cat-header">Shape-Based (Perceptual)</span>
      <table class="cl-table">
        <tr><th>Classifier</th><th>Core Meaning</th><th>Example Nouns</th></tr>
        <tr><td><span class="cl-char">条</span> <span class="cl-py">tiao</span></td><td>Long, thin, flexible</td><td class="ex-list">蛇 snake, 河 river, 路 road, 鱼 fish, 裤子 pants</td></tr>
        <tr><td><span class="cl-char">张</span> <span class="cl-py">zhang</span></td><td>Flat, surface-like</td><td class="ex-list">纸 paper, 桌子 table, 床 bed, 照片 photo, 脸 face</td></tr>
        <tr><td><span class="cl-char">颗</span> <span class="cl-py">ke</span></td><td>Small, round</td><td class="ex-list">珍珠 pearl, 星星 star, 牙 tooth, 心 heart</td></tr>
        <tr><td><span class="cl-char">根</span> <span class="cl-py">gen</span></td><td>Long, thin, rigid</td><td class="ex-list">筷子 chopstick, 骨头 bone, 柱子 pillar</td></tr>
        <tr><td><span class="cl-char">块</span> <span class="cl-py">kuai</span></td><td>Solid chunk/piece</td><td class="ex-list">石头 rock, 肉 meat, 蛋糕 cake, 钱 money</td></tr>
        <tr><td><span class="cl-char">片</span> <span class="cl-py">pian</span></td><td>Thin slice/flake</td><td class="ex-list">面包 bread, 叶子 leaf, 药 pill/tablet</td></tr>
      </table>
    </div>

    <!-- Animacy -->
    <div class="cat-section cat-anim">
      <span class="cat-header">Animacy-Based (Life/Status)</span>
      <table class="cl-table">
        <tr><th>Classifier</th><th>Core Meaning</th><th>Example Nouns</th></tr>
        <tr><td><span class="cl-char">只</span> <span class="cl-py">zhi</span></td><td>Individual animal</td><td class="ex-list">猫 cat, 狗 dog, 鸟 bird, 鸡 chicken</td></tr>
        <tr><td><span class="cl-char">头</span> <span class="cl-py">tou</span></td><td>Large livestock ("head")</td><td class="ex-list">牛 cow, 猪 pig, 大象 elephant</td></tr>
        <tr><td><span class="cl-char">位</span> <span class="cl-py">wei</span></td><td>Person (polite)</td><td class="ex-list">老师 teacher, 客人 guest, 女士 lady</td></tr>
      </table>
    </div>

    <!-- Function -->
    <div class="cat-section cat-func">
      <span class="cat-header">Function-Based (What It Does)</span>
      <table class="cl-table">
        <tr><th>Classifier</th><th>Core Meaning</th><th>Example Nouns</th></tr>
        <tr><td><span class="cl-char">本</span> <span class="cl-py">ben</span></td><td>Bound volumes (readable)</td><td class="ex-list">书 book, 杂志 magazine, 字典 dictionary</td></tr>
        <tr><td><span class="cl-char">辆</span> <span class="cl-py">liang</span></td><td>Wheeled vehicles</td><td class="ex-list">车 car, 自行车 bicycle, 公共汽车 bus</td></tr>
        <tr><td><span class="cl-char">台</span> <span class="cl-py">tai</span></td><td>Machines / performances</td><td class="ex-list">电脑 computer, 电视 TV, 洗衣机 washer</td></tr>
        <tr><td><span class="cl-char">把</span> <span class="cl-py">ba</span></td><td>Things with handles</td><td class="ex-list">刀 knife, 伞 umbrella, 椅子 chair, 钥匙 key</td></tr>
        <tr><td><span class="cl-char">件</span> <span class="cl-py">jian</span></td><td>Garments / matters</td><td class="ex-list">衣服 clothes, 外套 jacket, 事 matter</td></tr>
        <tr><td><span class="cl-char">支</span> <span class="cl-py">zhi</span></td><td>Stick-like implements</td><td class="ex-list">笔 pen, 枪 gun, 蜡烛 candle</td></tr>
        <tr><td><span class="cl-char">架</span> <span class="cl-py">jia</span></td><td>Framed structures</td><td class="ex-list">飞机 airplane, 钢琴 piano</td></tr>
      </table>
    </div>

    <!-- Group/Pair -->
    <div class="cat-section cat-group">
      <span class="cat-header">Group / Pair / Set</span>
      <table class="cl-table">
        <tr><th>Classifier</th><th>Core Meaning</th><th>Example Nouns</th></tr>
        <tr><td><span class="cl-char">双</span> <span class="cl-py">shuang</span></td><td>Pair (matched)</td><td class="ex-list">鞋 shoes, 筷子 chopsticks, 手 hands</td></tr>
        <tr><td><span class="cl-char">套</span> <span class="cl-py">tao</span></td><td>Set / suite</td><td class="ex-list">房子 apartment, 衣服 outfit, 书 book set</td></tr>
        <tr><td><span class="cl-char">群</span> <span class="cl-py">qun</span></td><td>Group / flock</td><td class="ex-list">人 crowd, 鸟 flock, 羊 herd</td></tr>
      </table>
    </div>

    <div class="note-box">
      <strong>Learner Strategy:</strong> Know 个 (covers everything in casual speech) + these ~20 classifiers = ready for the vast majority of daily Chinese communication. The specific classifiers add precision and cultural competence; 个 is always your safety net.
    </div>

    <div class="legend">
      <div class="legend-item"><div class="legend-swatch" style="background:var(--gen);"></div> General</div>
      <div class="legend-item"><div class="legend-swatch" style="background:var(--shape);"></div> Shape</div>
      <div class="legend-item"><div class="legend-swatch" style="background:var(--anim);"></div> Animacy</div>
      <div class="legend-item"><div class="legend-swatch" style="background:var(--func);"></div> Function</div>
      <div class="legend-item"><div class="legend-swatch" style="background:var(--group);"></div> Group/Pair</div>
    </div>
  </div>

  <figcaption>
    <h2>The Top 20+ Classifiers: A Practical Reference</h2>
    <p>Organized by category: general (个), shape-based (条, 张, 颗, 根, 块, 片), animacy-based (只, 头, 位), function-based (本, 辆, 台, 把, 件, 支, 架), and group/pair (双, 套, 群). These 20+ classifiers plus the universal 个 cover nearly all everyday Chinese.</p>
  </figcaption>
</figure>
</body>
</html>
