<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Agreement System Cascade -- From Zero to Maximum</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --accent: #4361ee;
    --accent-light: #e8edff;
    --chinese: #e63946;
    --english: #8338ec;
    --french: #2a9d8f;
    --arabic: #e9c46a;
    --muted: #6c757d;
    --caption-bg: #f8f9fa;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --accent: #6b8aff;
      --accent-light: #1e2a4a;
      --chinese: #ff6b6b;
      --english: #b380ff;
      --french: #4ecdc4;
      --arabic: #ffe66d;
      --muted: #9a9ab0;
      --caption-bg: #1a1a2e;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure { max-width: 940px; width: 100%; }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding: 1rem 1.5rem;
    background: var(--caption-bg);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  .chart-wrapper {
    overflow-x: auto;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--surface);
    padding: 1.5rem;
  }
  svg { display: block; margin: 0 auto; }
</style>
</head>
<body>
<figure>
  <div class="chart-wrapper">
    <svg viewBox="0 0 900 530" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
      <text x="450" y="28" text-anchor="middle" font-size="16" fill="var(--fg)" font-weight="700">Agreement System Cascade: Zero to Maximum Complexity</text>

      <!-- Y-axis label -->
      <text x="25" y="280" text-anchor="middle" font-size="12" fill="var(--fg)" font-weight="600" transform="rotate(-90 25 280)">Increasing Agreement Complexity</text>

      <!-- Upward arrow -->
      <line x1="50" y1="470" x2="50" y2="60" stroke="var(--fg)" stroke-width="1.5"/>
      <polygon points="45,65 55,65 50,55" fill="var(--fg)"/>

      <!-- CHINESE: Level 0 -->
      <rect x="70" y="410" width="780" height="80" rx="8" fill="var(--surface)" stroke="var(--chinese)" stroke-width="2.5"/>
      <text x="90" y="435" font-size="14" fill="var(--chinese)" font-weight="700">CHINESE: Zero Agreement</text>
      <text x="90" y="455" font-size="11" fill="var(--fg)">Verb: 吃 (always 吃) | Noun: 书 (always 书) | Adjective: 大 (always 大)</text>
      <text x="90" y="472" font-size="11" fill="var(--fg)">Nothing changes form. Ever. "I eat" = 我吃 | "He eats" = 他吃 | "They eat" = 他们吃</text>
      <text x="720" y="440" font-size="24" fill="var(--chinese)" font-weight="700">~0</text>
      <text x="720" y="458" font-size="9" fill="var(--chinese)">agreement rules</text>

      <!-- Arrow up -->
      <line x1="450" y1="405" x2="450" y2="390" stroke="var(--fg)" stroke-width="1" stroke-dasharray="3,2"/>

      <!-- ENGLISH: Level 1 -->
      <rect x="70" y="310" width="780" height="80" rx="8" fill="var(--surface)" stroke="var(--english)" stroke-width="2"/>
      <text x="90" y="335" font-size="14" fill="var(--english)" font-weight="700">ENGLISH: Minimal Agreement</text>
      <text x="90" y="355" font-size="11" fill="var(--fg)">3rd person -s: "he eat<tspan font-weight="700" fill="var(--english)">s</tspan>" | Pronoun forms: I/me, he/him, who/whom</text>
      <text x="90" y="372" font-size="11" fill="var(--fg)">a/an phonetic choice | is/am/are (irregular!) | Subject required even when obvious</text>
      <text x="720" y="340" font-size="24" fill="var(--english)" font-weight="700">~5-10</text>
      <text x="720" y="358" font-size="9" fill="var(--english)">agreement rules</text>

      <!-- Arrow up -->
      <line x1="450" y1="305" x2="450" y2="290" stroke="var(--fg)" stroke-width="1" stroke-dasharray="3,2"/>

      <!-- FRENCH: Level 2 -->
      <rect x="70" y="200" width="780" height="90" rx="8" fill="var(--surface)" stroke="var(--french)" stroke-width="2"/>
      <text x="90" y="225" font-size="14" fill="var(--french)" font-weight="700">FRENCH: Moderate-Full Agreement</text>
      <text x="90" y="245" font-size="11" fill="var(--fg)">Verb conjugation: 6 persons x ~20 tenses (je mange, tu manges, il mange...)</text>
      <text x="90" y="262" font-size="11" fill="var(--fg)">Noun-adjective: gender + number (grand/grande/grands/grandes)</text>
      <text x="90" y="279" font-size="11" fill="var(--fg)">Article agreement: le/la/les + du/de la/des | Past participle agreement</text>
      <text x="720" y="232" font-size="24" fill="var(--french)" font-weight="700">~50-100</text>
      <text x="720" y="250" font-size="9" fill="var(--french)">agreement rules</text>

      <!-- Arrow up -->
      <line x1="450" y1="195" x2="450" y2="180" stroke="var(--fg)" stroke-width="1" stroke-dasharray="3,2"/>

      <!-- ARABIC: Level 3 -->
      <rect x="70" y="80" width="780" height="100" rx="8" fill="var(--surface)" stroke="var(--arabic)" stroke-width="2"/>
      <text x="90" y="105" font-size="14" fill="var(--arabic)" font-weight="700">ARABIC: Maximum Agreement</text>
      <text x="90" y="125" font-size="11" fill="var(--fg)">Verb: person + gender + number + tense + mood (dozens of forms per verb)</text>
      <text x="90" y="142" font-size="11" fill="var(--fg)">Noun-adjective: gender + number + case + definiteness (each adjective inflects)</text>
      <text x="90" y="159" font-size="11" fill="var(--fg)">Dual number: special forms for exactly two | Broken plurals: internal vowel changes</text>
      <text x="90" y="173" font-size="10" fill="var(--muted)">Every element in a clause must agree with every other element in gender, number, case, and definiteness</text>
      <text x="720" y="112" font-size="24" fill="var(--arabic)" font-weight="700">~200+</text>
      <text x="720" y="130" font-size="9" fill="var(--arabic)">agreement rules</text>

      <!-- Key insight -->
      <rect x="70" y="500" width="780" height="25" rx="4" fill="var(--accent-light)" stroke="var(--accent)" stroke-width="1"/>
      <text x="450" y="518" text-anchor="middle" font-size="11" fill="var(--accent)" font-weight="700">Chinese zero-agreement is simultaneously its greatest simplification and its greatest unfamiliarity for Indo-European speakers</text>
    </svg>
  </div>
  <figcaption>
    <h2>Figure 3 -- The Agreement System Cascade: Zero to Maximum Complexity</h2>
    <p>Agreement complexity stacks from Chinese (zero -- nothing ever changes form) through English (minimal -- 3rd person -s, pronoun forms, a/an) and French (moderate -- verb conjugation, gender agreement, article agreement) to Arabic (maximum -- person, gender, number, case, definiteness, mood, dual number). Chinese sits at the absolute bottom: the verb 吃 (eat) is identical whether the subject is I, you, he, she, we, or they.</p>
  </figcaption>
</figure>
</body>
</html>
