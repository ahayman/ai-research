<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Morphological Type Spectrum -- Four Languages Positioned</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --accent: #4361ee;
    --accent-light: #e8edff;
    --chinese: #e63946;
    --english: #8338ec;
    --french: #2a9d8f;
    --arabic: #e9c46a;
    --muted: #6c757d;
    --caption-bg: #f8f9fa;
    --grid: #e0e0e0;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --accent: #6b8aff;
      --accent-light: #1e2a4a;
      --chinese: #ff6b6b;
      --english: #b380ff;
      --french: #4ecdc4;
      --arabic: #ffe66d;
      --muted: #9a9ab0;
      --caption-bg: #1a1a2e;
      --grid: #2d2d44;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure { max-width: 940px; width: 100%; }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding: 1rem 1.5rem;
    background: var(--caption-bg);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  .chart-wrapper {
    overflow-x: auto;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--surface);
    padding: 1rem;
  }
  svg { display: block; margin: 0 auto; }
  .legend {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 1.2rem;
    margin-top: 1rem;
    padding: 0.8rem;
    background: var(--surface);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.8rem;
    color: var(--muted);
  }
  .legend-swatch {
    width: 14px;
    height: 14px;
    border-radius: 50%;
  }
</style>
</head>
<body>
<figure>
  <div class="chart-wrapper">
    <svg viewBox="0 0 900 480" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
      <text x="450" y="28" text-anchor="middle" font-size="16" fill="var(--fg)" font-weight="700">Morphological Type Spectrum -- Four Languages Positioned</text>

      <!-- Spectrum bar -->
      <defs>
        <linearGradient id="morphGrad" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="var(--chinese)" stop-opacity="0.2"/>
          <stop offset="35%" stop-color="var(--english)" stop-opacity="0.2"/>
          <stop offset="60%" stop-color="var(--french)" stop-opacity="0.2"/>
          <stop offset="85%" stop-color="var(--arabic)" stop-opacity="0.2"/>
        </linearGradient>
      </defs>
      <rect x="60" y="70" width="780" height="20" rx="10" fill="url(#morphGrad)" stroke="var(--border)" stroke-width="1"/>

      <!-- Scale labels -->
      <text x="60" y="60" font-size="10" fill="var(--muted)" font-weight="600">ISOLATING</text>
      <text x="230" y="60" font-size="10" fill="var(--muted)" font-weight="600">ANALYTIC</text>
      <text x="440" y="60" font-size="10" fill="var(--muted)" font-weight="600">FUSIONAL</text>
      <text x="610" y="60" font-size="10" fill="var(--muted)" font-weight="600">INTROFLEXIVE</text>
      <text x="760" y="60" font-size="10" fill="var(--muted)" font-weight="600">AGGLUTINATIVE</text>

      <text x="60" y="108" font-size="9" fill="var(--muted)">1 morpheme/word</text>
      <text x="840" y="108" text-anchor="end" font-size="9" fill="var(--muted)">many morphemes/word</text>

      <!-- CHINESE marker -->
      <circle cx="100" cy="80" r="12" fill="var(--chinese)" opacity="0.8"/>
      <text x="100" y="84" text-anchor="middle" font-size="10" fill="white" font-weight="700">CN</text>
      <line x1="100" y1="92" x2="100" y2="130" stroke="var(--chinese)" stroke-width="1.5"/>
      <rect x="20" y="130" width="160" height="85" rx="6" fill="var(--surface)" stroke="var(--chinese)" stroke-width="1.5"/>
      <text x="100" y="147" text-anchor="middle" font-size="11" fill="var(--chinese)" font-weight="700">CHINESE: Isolating</text>
      <text x="100" y="162" text-anchor="middle" font-size="10" fill="var(--fg)">Ratio: 1:1</text>
      <text x="100" y="178" text-anchor="middle" font-size="9" fill="var(--fg)">"He ate" =</text>
      <text x="100" y="192" text-anchor="middle" font-size="10" fill="var(--chinese)">他 吃 了</text>
      <text x="100" y="206" text-anchor="middle" font-size="8" fill="var(--muted)">he / eat / [completed]</text>

      <!-- ENGLISH marker -->
      <circle cx="280" cy="80" r="12" fill="var(--english)" opacity="0.8"/>
      <text x="280" y="84" text-anchor="middle" font-size="10" fill="white" font-weight="700">EN</text>
      <line x1="280" y1="92" x2="280" y2="130" stroke="var(--english)" stroke-width="1.5"/>
      <rect x="200" y="130" width="160" height="85" rx="6" fill="var(--surface)" stroke="var(--english)" stroke-width="1.5"/>
      <text x="280" y="147" text-anchor="middle" font-size="11" fill="var(--english)" font-weight="700">ENGLISH: Analytic</text>
      <text x="280" y="162" text-anchor="middle" font-size="10" fill="var(--fg)">Ratio: ~1.2:1</text>
      <text x="280" y="178" text-anchor="middle" font-size="9" fill="var(--fg)">"He ate" =</text>
      <text x="280" y="192" text-anchor="middle" font-size="10" fill="var(--english)">He ate</text>
      <text x="280" y="206" text-anchor="middle" font-size="8" fill="var(--muted)">he / eat+PAST (irregular!)</text>

      <!-- FRENCH marker -->
      <circle cx="500" cy="80" r="12" fill="var(--french)" opacity="0.8"/>
      <text x="500" y="84" text-anchor="middle" font-size="10" fill="white" font-weight="700">FR</text>
      <line x1="500" y1="92" x2="500" y2="130" stroke="var(--french)" stroke-width="1.5"/>
      <rect x="420" y="130" width="160" height="85" rx="6" fill="var(--surface)" stroke="var(--french)" stroke-width="1.5"/>
      <text x="500" y="147" text-anchor="middle" font-size="11" fill="var(--french)" font-weight="700">FRENCH: Fusional</text>
      <text x="500" y="162" text-anchor="middle" font-size="10" fill="var(--fg)">Ratio: ~2-3:1</text>
      <text x="500" y="178" text-anchor="middle" font-size="9" fill="var(--fg)">"He ate" =</text>
      <text x="500" y="192" text-anchor="middle" font-size="10" fill="var(--french)">Il a mange</text>
      <text x="500" y="206" text-anchor="middle" font-size="8" fill="var(--muted)">he / has / eat+PAST.PART</text>

      <!-- ARABIC marker -->
      <circle cx="660" cy="80" r="12" fill="var(--arabic)" opacity="0.8"/>
      <text x="660" y="84" text-anchor="middle" font-size="10" fill="var(--fg)" font-weight="700">AR</text>
      <line x1="660" y1="92" x2="660" y2="130" stroke="var(--arabic)" stroke-width="1.5"/>
      <rect x="580" y="130" width="160" height="85" rx="6" fill="var(--surface)" stroke="var(--arabic)" stroke-width="1.5"/>
      <text x="660" y="147" text-anchor="middle" font-size="11" fill="var(--arabic)" font-weight="700">ARABIC: Introflexive</text>
      <text x="660" y="162" text-anchor="middle" font-size="10" fill="var(--fg)">Ratio: ~2-4:1</text>
      <text x="660" y="178" text-anchor="middle" font-size="9" fill="var(--fg)">"He ate" =</text>
      <text x="660" y="192" text-anchor="middle" font-size="10" fill="var(--arabic)">akala</text>
      <text x="660" y="206" text-anchor="middle" font-size="8" fill="var(--muted)">eat+PAST+3rd+MASC+SING</text>

      <!-- Distance arrows -->
      <text x="450" y="245" text-anchor="middle" font-size="12" fill="var(--accent)" font-weight="700">CHINESE-ENGLISH DISTANCE</text>
      <line x1="100" y1="260" x2="280" y2="260" stroke="var(--accent)" stroke-width="2" marker-end="url(#arrowA)" marker-start="url(#arrowA2)"/>
      <defs>
        <marker id="arrowA" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="var(--accent)"/></marker>
        <marker id="arrowA2" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto"><path d="M8,0 L0,3 L8,6" fill="var(--accent)"/></marker>
      </defs>
      <text x="190" y="278" text-anchor="middle" font-size="10" fill="var(--accent)">HIGH distance</text>

      <!-- Key insight box -->
      <rect x="60" y="300" width="780" height="55" rx="6" fill="var(--accent-light)" stroke="var(--accent)" stroke-width="1.5"/>
      <text x="450" y="320" text-anchor="middle" font-size="12" fill="var(--accent)" font-weight="700">KEY PATTERN: English Is BETWEEN Chinese and French</text>
      <text x="450" y="338" text-anchor="middle" font-size="11" fill="var(--fg)">English has reduced inflection compared to French/Arabic but still has some (irregular verbs, 3rd person -s, pronouns).</text>
      <text x="450" y="350" text-anchor="middle" font-size="10" fill="var(--muted)">Chinese has eliminated inflection entirely. The jump from English to Chinese is larger than from English to French.</text>

      <!-- Verb forms comparison -->
      <rect x="60" y="370" width="780" height="95" rx="6" fill="var(--surface)" stroke="var(--border)" stroke-width="1"/>
      <text x="450" y="390" text-anchor="middle" font-size="12" fill="var(--fg)" font-weight="700">Verb "eat" -- Total Distinct Forms</text>

      <rect x="100" y="405" width="30" height="45" rx="3" fill="var(--chinese)"/>
      <text x="115" y="460" text-anchor="middle" font-size="10" fill="var(--chinese)" font-weight="700">1</text>
      <text x="115" y="400" text-anchor="middle" font-size="9" fill="var(--chinese)">CN</text>

      <rect x="220" y="395" width="30" height="55" rx="3" fill="var(--english)"/>
      <text x="235" y="460" text-anchor="middle" font-size="10" fill="var(--english)" font-weight="700">5</text>
      <text x="235" y="390" text-anchor="middle" font-size="9" fill="var(--english)">EN</text>

      <rect x="380" y="330" width="30" height="120" rx="3" fill="var(--french)" opacity="0.7"/>
      <text x="395" y="460" text-anchor="middle" font-size="10" fill="var(--french)" font-weight="700">50+</text>
      <text x="395" y="380" text-anchor="middle" font-size="9" fill="var(--french)">FR</text>

      <rect x="540" y="310" width="30" height="140" rx="3" fill="var(--arabic)" opacity="0.7"/>
      <text x="555" y="460" text-anchor="middle" font-size="10" fill="var(--arabic)" font-weight="700">100+</text>
      <text x="555" y="380" text-anchor="middle" font-size="9" fill="var(--arabic)">AR</text>

      <text x="700" y="430" font-size="10" fill="var(--muted)">Chinese: 吃 (always)</text>
      <text x="700" y="445" font-size="10" fill="var(--muted)">English: eat/eats/ate/eaten/eating</text>
    </svg>
  </div>
  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background:var(--chinese)"></div>Chinese (Isolating)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--english)"></div>English (Analytic)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--french)"></div>French (Fusional)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--arabic)"></div>Arabic (Introflexive)</div>
  </div>
  <figcaption>
    <h2>Figure 2 -- Morphological Type Spectrum: Four Languages Positioned</h2>
    <p>The morphological typology spectrum places Chinese at the isolating extreme (1 morpheme per word, zero inflection), English at moderately analytic (~1.2 morphemes per word, reduced inflection), French at fusional (~2-3 morphemes per word, rich conjugation), and Arabic at introflexive (~2-4 morphemes per word, internal root modification). The verb "eat" shows 1 form in Chinese vs. 5 in English vs. 50+ in French vs. 100+ in Arabic. English sits between Chinese and French on this scale.</p>
  </figcaption>
</figure>
</body>
</html>
