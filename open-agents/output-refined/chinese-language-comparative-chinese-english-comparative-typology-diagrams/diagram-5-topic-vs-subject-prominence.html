<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Topic Prominence vs. Subject Prominence -- Sentence Structure Comparison</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --accent: #4361ee;
    --accent-light: #e8edff;
    --chinese: #e63946;
    --chinese-light: #ffe0e3;
    --english: #8338ec;
    --english-light: #ede0ff;
    --topic: #e9c46a;
    --topic-light: #fef9e7;
    --subject: #2a9d8f;
    --subject-light: #d4f5f0;
    --comment: #4361ee;
    --comment-light: #e8edff;
    --muted: #6c757d;
    --caption-bg: #f8f9fa;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --accent: #6b8aff;
      --accent-light: #1e2a4a;
      --chinese: #ff6b6b;
      --chinese-light: #3a1a1a;
      --english: #b380ff;
      --english-light: #2a1a3a;
      --topic: #ffe66d;
      --topic-light: #2a2a1a;
      --subject: #4ecdc4;
      --subject-light: #1a3a38;
      --comment: #6b8aff;
      --comment-light: #1e2a4a;
      --muted: #9a9ab0;
      --caption-bg: #1a1a2e;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure { max-width: 940px; width: 100%; }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding: 1rem 1.5rem;
    background: var(--caption-bg);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  .chart-wrapper {
    overflow-x: auto;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--surface);
    padding: 1.5rem;
  }
  .example-row {
    display: flex;
    gap: 1.5rem;
    margin-bottom: 1rem;
    flex-wrap: wrap;
  }
  .example-panel {
    flex: 1;
    min-width: 280px;
    border-radius: 8px;
    padding: 1rem;
    border: 1.5px solid var(--border);
    background: var(--bg);
  }
  .panel-cn { border-color: var(--chinese); }
  .panel-en { border-color: var(--english); }
  .panel-label {
    font-size: 0.85rem;
    font-weight: 700;
    margin-bottom: 0.5rem;
  }
  .label-cn { color: var(--chinese); }
  .label-en { color: var(--english); }
  .sentence {
    font-size: 1.1rem;
    margin-bottom: 0.4rem;
    line-height: 1.8;
  }
  .topic-tag {
    background: var(--topic-light);
    border: 1px solid var(--topic);
    border-radius: 4px;
    padding: 0.15rem 0.4rem;
    color: var(--topic);
    font-weight: 600;
  }
  .subject-tag {
    background: var(--subject-light);
    border: 1px solid var(--subject);
    border-radius: 4px;
    padding: 0.15rem 0.4rem;
    color: var(--subject);
    font-weight: 600;
  }
  .comment-tag {
    background: var(--comment-light);
    border: 1px solid var(--comment);
    border-radius: 4px;
    padding: 0.15rem 0.4rem;
    color: var(--comment);
    font-weight: 600;
  }
  .dummy-tag {
    background: var(--english-light);
    border: 1px solid var(--english);
    border-radius: 4px;
    padding: 0.15rem 0.4rem;
    color: var(--english);
    font-weight: 600;
    font-style: italic;
  }
  .dropped-tag {
    border: 1.5px dashed var(--muted);
    border-radius: 4px;
    padding: 0.15rem 0.4rem;
    color: var(--muted);
    font-style: italic;
  }
  .analysis {
    font-size: 0.8rem;
    color: var(--muted);
    margin-top: 0.3rem;
  }
  h3 {
    font-size: 1.1rem;
    text-align: center;
    margin-bottom: 1rem;
    color: var(--fg);
  }
  .section-label {
    font-size: 0.9rem;
    font-weight: 700;
    color: var(--accent);
    margin: 1rem 0 0.5rem 0;
    padding-bottom: 0.3rem;
    border-bottom: 1px solid var(--border);
  }
  .insight-box {
    margin-top: 1rem;
    padding: 0.8rem 1rem;
    background: var(--accent-light);
    border: 1px solid var(--accent);
    border-radius: 6px;
    font-size: 0.85rem;
    text-align: center;
  }
  .insight-box strong { color: var(--accent); }
  .legend {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 1rem;
    margin-top: 0.8rem;
    padding: 0.6rem;
    background: var(--surface);
    border-radius: 8px;
    border: 1px solid var(--border);
    font-size: 0.8rem;
    color: var(--muted);
  }
</style>
</head>
<body>
<figure>
  <div class="chart-wrapper">
    <h3>Topic Prominence (Chinese) vs. Subject Prominence (English)</h3>

    <div class="legend">
      <span><span class="topic-tag">TOPIC</span> = what is being talked about</span>
      <span><span class="subject-tag">SUBJECT</span> = who/what does the action</span>
      <span><span class="comment-tag">COMMENT</span> = what is said about the topic</span>
      <span><span class="dummy-tag">DUMMY</span> = meaningless required subject</span>
      <span><span class="dropped-tag">dropped</span> = omitted (pro-drop)</span>
    </div>

    <div class="section-label">Example 1: Topic differs from subject</div>
    <div class="example-row">
      <div class="example-panel panel-cn">
        <div class="panel-label label-cn">CHINESE (Topic-Prominent)</div>
        <div class="sentence">
          <span class="topic-tag">这本书</span> <span class="subject-tag">我</span> <span class="comment-tag">已经看了</span>
        </div>
        <div class="analysis">zhe ben shu / wo / yijing kan le</div>
        <div class="analysis">Topic: this book | Subject: I | Comment: already read</div>
        <div class="analysis" style="font-weight:600;color:var(--chinese)">Organized around WHAT we're discussing (the book)</div>
      </div>
      <div class="example-panel panel-en">
        <div class="panel-label label-en">ENGLISH (Subject-Prominent)</div>
        <div class="sentence">
          <span class="subject-tag">I</span> <span class="comment-tag">have already read this book</span>
        </div>
        <div class="analysis">Subject: I | Predicate: have already read this book</div>
        <div class="analysis" style="font-weight:600;color:var(--english)">Organized around WHO does the action (I)</div>
      </div>
    </div>

    <div class="section-label">Example 2: Dummy subjects (English requires, Chinese forbids)</div>
    <div class="example-row">
      <div class="example-panel panel-cn">
        <div class="panel-label label-cn">CHINESE</div>
        <div class="sentence">
          <span class="comment-tag">下雨了</span>
        </div>
        <div class="analysis">xia yu le = descend rain [completed]</div>
        <div class="analysis" style="font-weight:600;color:var(--chinese)">No subject needed. Rain just happens.</div>
      </div>
      <div class="example-panel panel-en">
        <div class="panel-label label-en">ENGLISH</div>
        <div class="sentence">
          <span class="dummy-tag">It</span> <span class="comment-tag">is raining</span>
        </div>
        <div class="analysis">"It" refers to nothing -- pure structural placeholder</div>
        <div class="analysis" style="font-weight:600;color:var(--english)">Subject REQUIRED even when meaningless</div>
      </div>
    </div>

    <div class="section-label">Example 3: Pro-drop (Chinese drops, English cannot)</div>
    <div class="example-row">
      <div class="example-panel panel-cn">
        <div class="panel-label label-cn">CHINESE</div>
        <div class="sentence">
          A: 你吃了吗？ B: <span class="dropped-tag">subject</span> <span class="comment-tag">吃了</span>
        </div>
        <div class="analysis">A: "Have you eaten?" B: "(I) ate" -- subject dropped, context is clear</div>
        <div class="analysis" style="font-weight:600;color:var(--chinese)">Subject freely omitted when contextually obvious</div>
      </div>
      <div class="example-panel panel-en">
        <div class="panel-label label-en">ENGLISH</div>
        <div class="sentence">
          A: Have you eaten? B: <span class="subject-tag">I</span> <span class="comment-tag">have</span>
        </div>
        <div class="analysis">"I" is mandatory even though the context makes the subject obvious</div>
        <div class="analysis" style="font-weight:600;color:var(--english)">Subject REQUIRED even when redundant</div>
      </div>
    </div>

    <div class="section-label">Example 4: Double subject / topic-comment nesting</div>
    <div class="example-row">
      <div class="example-panel panel-cn">
        <div class="panel-label label-cn">CHINESE</div>
        <div class="sentence">
          <span class="topic-tag">那个人</span> <span class="topic-tag">脾气</span> <span class="comment-tag">很好</span>
        </div>
        <div class="analysis">na ge ren / piqi / hen hao</div>
        <div class="analysis">Topic: that person | Sub-topic: temperament | Comment: very good</div>
        <div class="analysis" style="font-weight:600;color:var(--chinese)">Nested topic-comment: "That person, (their) temperament, (it's) very good"</div>
      </div>
      <div class="example-panel panel-en">
        <div class="panel-label label-en">ENGLISH</div>
        <div class="sentence">
          <span class="subject-tag">That person</span> <span class="comment-tag">has a very good temperament</span>
        </div>
        <div class="analysis">Must restructure into single subject-predicate</div>
        <div class="analysis" style="font-weight:600;color:var(--english)">No nested topic structure available</div>
      </div>
    </div>

    <div class="insight-box">
      <strong>KEY PATTERN:</strong> Chinese organizes sentences around "what are we talking about?" (TOPIC). English organizes sentences around "who does the action?" (SUBJECT). This is not a surface variation -- it is a fundamentally different principle of sentence organization (Li &amp; Thompson, 1976). Chinese can drop subjects freely, nest topics, and never needs dummy subjects. English requires subjects even when meaningless.
    </div>
  </div>
  <figcaption>
    <h2>Figure 5 -- Topic Prominence vs. Subject Prominence: Sentence Structure Comparison</h2>
    <p>Chinese (topic-prominent) organizes sentences around what is being talked about, while English (subject-prominent) organizes sentences around who performs the action. This manifests in four observable patterns: (1) topic can differ from subject in Chinese; (2) Chinese needs no dummy subjects ("It is raining" vs. 下雨了); (3) Chinese freely drops contextually obvious subjects (pro-drop); (4) Chinese allows nested topic-comment structures. Classification from Li and Thompson (1976).</p>
  </figcaption>
</figure>
</body>
</html>
