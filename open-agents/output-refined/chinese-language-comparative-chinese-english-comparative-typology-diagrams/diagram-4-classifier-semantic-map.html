<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Classifier Semantic Category Map -- Perceptual Categorization</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --accent: #4361ee;
    --accent-light: #e8edff;
    --chinese: #e63946;
    --center: #264653;
    --flat: #2a9d8f;
    --long: #e9c46a;
    --animal: #f4845f;
    --func: #8338ec;
    --shape: #4361ee;
    --muted: #6c757d;
    --caption-bg: #f8f9fa;
    --fallback: #a8dadc;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --accent: #6b8aff;
      --accent-light: #1e2a4a;
      --chinese: #ff6b6b;
      --center: #a8dadc;
      --flat: #4ecdc4;
      --long: #ffe66d;
      --animal: #f4845f;
      --func: #b380ff;
      --shape: #6b8aff;
      --muted: #9a9ab0;
      --caption-bg: #1a1a2e;
      --fallback: #457b9d;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure { max-width: 940px; width: 100%; }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding: 1rem 1.5rem;
    background: var(--caption-bg);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  .chart-wrapper {
    overflow-x: auto;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--surface);
    padding: 1rem;
  }
  svg { display: block; margin: 0 auto; }
</style>
</head>
<body>
<figure>
  <div class="chart-wrapper">
    <svg viewBox="0 0 900 560" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
      <text x="450" y="28" text-anchor="middle" font-size="16" fill="var(--fg)" font-weight="700">Chinese Classifier System -- Perceptual Categorization of the World</text>

      <!-- Center: 个 fallback -->
      <circle cx="450" cy="260" r="55" fill="var(--surface)" stroke="var(--fallback)" stroke-width="3"/>
      <text x="450" y="248" text-anchor="middle" font-size="28" fill="var(--center)" font-weight="700">个</text>
      <text x="450" y="268" text-anchor="middle" font-size="10" fill="var(--center)">ge (general)</text>
      <text x="450" y="283" text-anchor="middle" font-size="9" fill="var(--fallback)" font-weight="600">~94% of casual usage</text>
      <text x="450" y="296" text-anchor="middle" font-size="8" fill="var(--muted)">Universal fallback</text>

      <!-- SHAPE CATEGORY: Flat -->
      <line x1="400" y1="220" x2="180" y2="100" stroke="var(--flat)" stroke-width="1.5"/>
      <rect x="80" y="70" width="170" height="65" rx="6" fill="var(--surface)" stroke="var(--flat)" stroke-width="1.5"/>
      <text x="165" y="88" text-anchor="middle" font-size="14" fill="var(--flat)" font-weight="700">张 zhāng</text>
      <text x="165" y="102" text-anchor="middle" font-size="10" fill="var(--flat)" font-weight="600">FLAT items</text>
      <text x="165" y="118" text-anchor="middle" font-size="9" fill="var(--fg)">paper, photos, tables</text>
      <text x="165" y="130" text-anchor="middle" font-size="9" fill="var(--fg)">beds, tickets, maps</text>

      <!-- SHAPE: Long/thin -->
      <line x1="400" y1="250" x2="140" y2="230" stroke="var(--long)" stroke-width="1.5"/>
      <rect x="40" y="195" width="170" height="65" rx="6" fill="var(--surface)" stroke="var(--long)" stroke-width="1.5"/>
      <text x="125" y="213" text-anchor="middle" font-size="14" fill="var(--long)" font-weight="700">条 tiáo</text>
      <text x="125" y="227" text-anchor="middle" font-size="10" fill="var(--long)" font-weight="600">LONG / THIN items</text>
      <text x="125" y="243" text-anchor="middle" font-size="9" fill="var(--fg)">rivers, snakes, roads</text>
      <text x="125" y="255" text-anchor="middle" font-size="9" fill="var(--fg)">fish, pants, news items</text>

      <!-- ANIMACY: Small animals -->
      <line x1="490" y1="215" x2="700" y2="90" stroke="var(--animal)" stroke-width="1.5"/>
      <rect x="620" y="60" width="170" height="65" rx="6" fill="var(--surface)" stroke="var(--animal)" stroke-width="1.5"/>
      <text x="705" y="78" text-anchor="middle" font-size="14" fill="var(--animal)" font-weight="700">只 zhī</text>
      <text x="705" y="92" text-anchor="middle" font-size="10" fill="var(--animal)" font-weight="600">SMALL ANIMALS</text>
      <text x="705" y="108" text-anchor="middle" font-size="9" fill="var(--fg)">cats, dogs, birds</text>
      <text x="705" y="120" text-anchor="middle" font-size="9" fill="var(--fg)">chickens, insects</text>

      <!-- ANIMACY: Large animals -->
      <line x1="500" y1="240" x2="730" y2="185" stroke="var(--animal)" stroke-width="1.5"/>
      <rect x="650" y="155" width="170" height="55" rx="6" fill="var(--surface)" stroke="var(--animal)" stroke-width="1.5"/>
      <text x="735" y="173" text-anchor="middle" font-size="14" fill="var(--animal)" font-weight="700">头 tóu</text>
      <text x="735" y="187" text-anchor="middle" font-size="10" fill="var(--animal)" font-weight="600">LARGE ANIMALS</text>
      <text x="735" y="203" text-anchor="middle" font-size="9" fill="var(--fg)">cows, pigs, elephants</text>

      <!-- FUNCTION: Handles -->
      <line x1="400" y1="290" x2="130" y2="360" stroke="var(--func)" stroke-width="1.5"/>
      <rect x="40" y="325" width="170" height="65" rx="6" fill="var(--surface)" stroke="var(--func)" stroke-width="1.5"/>
      <text x="125" y="343" text-anchor="middle" font-size="14" fill="var(--func)" font-weight="700">把 bǎ</text>
      <text x="125" y="357" text-anchor="middle" font-size="10" fill="var(--func)" font-weight="600">ITEMS WITH HANDLES</text>
      <text x="125" y="373" text-anchor="middle" font-size="9" fill="var(--fg)">knives, chairs, umbrellas</text>
      <text x="125" y="385" text-anchor="middle" font-size="9" fill="var(--fg)">keys, fans</text>

      <!-- FUNCTION: Bound items -->
      <line x1="420" y1="310" x2="250" y2="440" stroke="var(--shape)" stroke-width="1.5"/>
      <rect x="155" y="410" width="170" height="55" rx="6" fill="var(--surface)" stroke="var(--shape)" stroke-width="1.5"/>
      <text x="240" y="428" text-anchor="middle" font-size="14" fill="var(--shape)" font-weight="700">本 běn</text>
      <text x="240" y="442" text-anchor="middle" font-size="10" fill="var(--shape)" font-weight="600">BOUND ITEMS</text>
      <text x="240" y="458" text-anchor="middle" font-size="9" fill="var(--fg)">books, magazines, albums</text>

      <!-- FUNCTION: Vehicles -->
      <line x1="500" y1="300" x2="700" y2="340" stroke="var(--func)" stroke-width="1.5"/>
      <rect x="625" y="310" width="170" height="55" rx="6" fill="var(--surface)" stroke="var(--func)" stroke-width="1.5"/>
      <text x="710" y="328" text-anchor="middle" font-size="14" fill="var(--func)" font-weight="700">辆 liàng</text>
      <text x="710" y="342" text-anchor="middle" font-size="10" fill="var(--func)" font-weight="600">VEHICLES</text>
      <text x="710" y="358" text-anchor="middle" font-size="9" fill="var(--fg)">cars, bicycles, buses</text>

      <!-- SOCIAL: People respectful -->
      <line x1="490" y1="305" x2="660" y2="420" stroke="var(--chinese)" stroke-width="1.5"/>
      <rect x="570" y="395" width="170" height="55" rx="6" fill="var(--surface)" stroke="var(--chinese)" stroke-width="1.5"/>
      <text x="655" y="413" text-anchor="middle" font-size="14" fill="var(--chinese)" font-weight="700">位 wèi</text>
      <text x="655" y="427" text-anchor="middle" font-size="10" fill="var(--chinese)" font-weight="600">PEOPLE (respectful)</text>
      <text x="655" y="443" text-anchor="middle" font-size="9" fill="var(--fg)">guests, teachers, officials</text>

      <!-- PAIRS -->
      <line x1="460" y1="315" x2="480" y2="440" stroke="var(--long)" stroke-width="1.5"/>
      <rect x="390" y="435" width="170" height="55" rx="6" fill="var(--surface)" stroke="var(--long)" stroke-width="1.5"/>
      <text x="475" y="453" text-anchor="middle" font-size="14" fill="var(--long)" font-weight="700">双 shuāng</text>
      <text x="475" y="467" text-anchor="middle" font-size="10" fill="var(--long)" font-weight="600">PAIRS</text>
      <text x="475" y="483" text-anchor="middle" font-size="9" fill="var(--fg)">shoes, chopsticks, eyes</text>

      <!-- English comparison -->
      <rect x="60" y="505" width="780" height="40" rx="6" fill="var(--accent-light)" stroke="var(--accent)" stroke-width="1.5"/>
      <text x="450" y="522" text-anchor="middle" font-size="11" fill="var(--accent)" font-weight="700">ENGLISH: No equivalent system. "Three books" (numeral + noun directly). No shape/animacy/function classification required.</text>
      <text x="450" y="537" text-anchor="middle" font-size="10" fill="var(--muted)">Compare with French: no classifiers either, but mandatory gender assignment (le livre / la table) -- equally arbitrary, less perceptually motivated</text>
    </svg>
  </div>
  <figcaption>
    <h2>Figure 4 -- Classifier Semantic Category Map: Perceptual Categorization of the World</h2>
    <p>Chinese classifiers organize nouns by salient physical properties: shape (flat, long, round), animacy (small animals, large animals), function (vehicles, bound items, handles), and social status (respectful 位 for people). The general classifier 个 covers ~94% of casual usage as a universal fallback. Unlike French grammatical gender (which is largely arbitrary), Chinese classifiers follow perceptual logic -- you can often guess the correct classifier from how an object looks or behaves.</p>
  </figcaption>
</figure>
</body>
</html>
