<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Master Typological Comparison Grid -- Four Languages</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --accent: #4361ee;
    --accent-light: #e8edff;
    --none: #2a9d8f;
    --none-bg: #d4f5f0;
    --minimal: #e9c46a;
    --minimal-bg: #fef9e7;
    --full: #e63946;
    --full-bg: #ffe0e3;
    --max-dist: #e63946;
    --high-dist: #f4845f;
    --mod-dist: #e9c46a;
    --low-dist: #2a9d8f;
    --muted: #6c757d;
    --caption-bg: #f8f9fa;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --accent: #6b8aff;
      --accent-light: #1e2a4a;
      --none: #4ecdc4;
      --none-bg: #1a3a38;
      --minimal: #ffe66d;
      --minimal-bg: #2a2a1a;
      --full: #ff6b6b;
      --full-bg: #3a1a1a;
      --max-dist: #ff6b6b;
      --high-dist: #f4845f;
      --mod-dist: #ffe66d;
      --low-dist: #4ecdc4;
      --muted: #9a9ab0;
      --caption-bg: #1a1a2e;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure { max-width: 980px; width: 100%; }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding: 1rem 1.5rem;
    background: var(--caption-bg);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  .chart-wrapper {
    overflow-x: auto;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--surface);
    padding: 1rem;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.82rem;
  }
  th, td {
    padding: 0.5rem 0.6rem;
    border: 1px solid var(--border);
    text-align: center;
    vertical-align: middle;
  }
  th {
    background: var(--accent-light);
    color: var(--accent);
    font-weight: 700;
    font-size: 0.85rem;
  }
  th.param { text-align: left; width: 18%; }
  td.param { text-align: left; font-weight: 600; }
  .none { background: var(--none-bg); color: var(--none); font-weight: 600; }
  .minimal { background: var(--minimal-bg); color: var(--minimal); font-weight: 600; }
  .full { background: var(--full-bg); color: var(--full); font-weight: 600; }
  .dist-max { background: var(--full-bg); color: var(--max-dist); font-weight: 700; }
  .dist-high { color: var(--high-dist); font-weight: 600; }
  .dist-mod { color: var(--mod-dist); font-weight: 600; }
  .dist-low { background: var(--none-bg); color: var(--low-dist); font-weight: 600; }
  .legend {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 1.2rem;
    margin-top: 1rem;
    padding: 0.8rem;
    background: var(--surface);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.8rem;
    color: var(--muted);
  }
  .legend-swatch {
    width: 14px;
    height: 14px;
    border-radius: 3px;
  }
  h3 { text-align: center; font-size: 1.1rem; color: var(--fg); margin-bottom: 0.8rem; }
</style>
</head>
<body>
<figure>
  <div class="chart-wrapper">
    <h3>Master Typological Comparison: Chinese vs. English vs. French vs. Arabic</h3>
    <table>
      <thead>
        <tr>
          <th class="param">Parameter</th>
          <th>Chinese (Mandarin)</th>
          <th>English</th>
          <th>French</th>
          <th>Arabic (MSA)</th>
          <th>CN-EN Distance</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td class="param">Morphological type</td>
          <td class="none">Isolating (1:1)</td>
          <td class="minimal">Analytic (~1.2:1)</td>
          <td class="full">Fusional (~2-3:1)</td>
          <td class="full">Introflexive (~2-4:1)</td>
          <td class="dist-high">HIGH</td>
        </tr>
        <tr>
          <td class="param">Basic word order</td>
          <td>SVO</td>
          <td>SVO</td>
          <td>SVO</td>
          <td class="minimal">VSO / SVO</td>
          <td class="dist-low">LOW</td>
        </tr>
        <tr>
          <td class="param">Modifier order (NP)</td>
          <td>Head-final (Mod+N)</td>
          <td class="minimal">Mixed</td>
          <td>Head-initial (N+Mod)</td>
          <td>Head-initial (N+Mod)</td>
          <td class="dist-mod">MODERATE</td>
        </tr>
        <tr>
          <td class="param">Lexical tone</td>
          <td class="full">Yes (4+neutral)</td>
          <td class="none">No</td>
          <td class="none">No</td>
          <td class="none">No</td>
          <td class="dist-max">MAXIMUM</td>
        </tr>
        <tr>
          <td class="param">Writing system</td>
          <td class="full">Logographic</td>
          <td>Alphabetic</td>
          <td>Alphabetic</td>
          <td class="minimal">Abjad</td>
          <td class="dist-max">MAXIMUM</td>
        </tr>
        <tr>
          <td class="param">Subject-verb agreement</td>
          <td class="none">None</td>
          <td class="minimal">Minimal (3rd -s)</td>
          <td class="full">Full (6 persons)</td>
          <td class="full">Full (person+gender+number)</td>
          <td class="dist-mod">MODERATE</td>
        </tr>
        <tr>
          <td class="param">Grammatical gender</td>
          <td class="none">None</td>
          <td class="none">Natural only</td>
          <td class="full">2 genders</td>
          <td class="full">2 genders</td>
          <td class="dist-mod">MODERATE</td>
        </tr>
        <tr>
          <td class="param">Case marking</td>
          <td class="none">None</td>
          <td class="minimal">Vestigial (pronouns)</td>
          <td class="none">None</td>
          <td class="full">3-case system</td>
          <td class="dist-low">LOW</td>
        </tr>
        <tr>
          <td class="param">Number marking</td>
          <td class="none">None</td>
          <td class="minimal">Regular + irregulars</td>
          <td class="minimal">Regular + some irreg.</td>
          <td class="full">Dual + broken plurals</td>
          <td class="dist-high">HIGH</td>
        </tr>
        <tr>
          <td class="param">Article system</td>
          <td class="none">None</td>
          <td class="minimal">the / a, an</td>
          <td class="full">le/la/les / un/une/des</td>
          <td class="minimal">al- definite</td>
          <td class="dist-high">HIGH</td>
        </tr>
        <tr>
          <td class="param">Classifier system</td>
          <td class="full">Mandatory (~100+)</td>
          <td class="none">None</td>
          <td class="none">None</td>
          <td class="none">None</td>
          <td class="dist-max">MAXIMUM</td>
        </tr>
        <tr>
          <td class="param">Topic / subject prom.</td>
          <td>Topic-prominent</td>
          <td>Subject-prominent</td>
          <td>Subject-prominent</td>
          <td>Subject-prominent</td>
          <td class="dist-high">HIGH</td>
        </tr>
        <tr>
          <td class="param">Tense / aspect</td>
          <td>Aspect (了/着/过)</td>
          <td class="minimal">Tense + aspect</td>
          <td class="full">Rich tense + aspect</td>
          <td class="full">Tense + aspect</td>
          <td class="dist-high">HIGH</td>
        </tr>
        <tr>
          <td class="param">Pro-drop</td>
          <td class="none">Yes (free)</td>
          <td class="full">No (required subj.)</td>
          <td class="minimal">Limited</td>
          <td class="none">Yes</td>
          <td class="dist-mod">MODERATE</td>
        </tr>
        <tr>
          <td class="param">Serial verb constructions</td>
          <td class="none">Yes (common)</td>
          <td class="full">No</td>
          <td class="full">No</td>
          <td class="full">No</td>
          <td class="dist-high">HIGH</td>
        </tr>
      </tbody>
    </table>
  </div>
  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background:var(--none-bg);border:1px solid var(--none)"></div>None / Absent</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--minimal-bg);border:1px solid var(--minimal)"></div>Minimal / Partial</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--full-bg);border:1px solid var(--full)"></div>Full / Complex</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--none-bg);border:1px solid var(--low-dist)"></div>LOW distance</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--full-bg);border:1px solid var(--max-dist)"></div>MAXIMUM distance</div>
  </div>
  <figcaption>
    <h2>Figure 1 -- Master Typological Comparison Grid</h2>
    <p>Fifteen typological parameters compared across Chinese, English, French, and Arabic, with Chinese-English distance rated on each. Green cells indicate absence of a feature, yellow indicates minimal presence, red indicates full/complex presence. Chinese shows MAXIMUM distance from English on lexical tone, writing system, and classifier system, but LOW distance on basic word order and case marking. This reveals that "difficulty" is not uniform -- it clusters at specific structural points.</p>
  </figcaption>
</figure>
</body>
</html>
