<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Five Parameters of Sign Language Phonology</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #f8f9fa;
    color: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 2rem;
  }
  figure {
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
    max-width: 1100px;
    width: 100%;
  }
  .diagram-title {
    text-align: center;
    font-size: 1.4rem;
    font-weight: 700;
    margin-bottom: 0.3rem;
    color: #1a1a2e;
  }
  .diagram-subtitle {
    text-align: center;
    font-size: 0.85rem;
    color: #6c757d;
    margin-bottom: 2rem;
  }

  .hub-layout {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.5rem;
  }

  .param-ring {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 1rem;
    max-width: 900px;
  }

  .param-card {
    border: 2.5px solid;
    border-radius: 14px;
    padding: 1.2rem;
    min-width: 155px;
    max-width: 180px;
    flex: 1;
    text-align: center;
    position: relative;
  }
  .param-card .stokoe-tag {
    position: absolute;
    top: -10px;
    right: 10px;
    font-size: 0.65rem;
    font-weight: 700;
    padding: 0.1rem 0.5rem;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .param-card h3 {
    font-size: 0.95rem;
    font-weight: 700;
    margin-bottom: 0.3rem;
  }
  .param-card .param-icon {
    font-size: 2rem;
    margin-bottom: 0.3rem;
  }
  .param-card .param-desc {
    font-size: 0.78rem;
    line-height: 1.4;
    opacity: 0.8;
    margin-bottom: 0.5rem;
  }
  .param-card .param-example {
    font-size: 0.73rem;
    background: rgba(0,0,0,0.04);
    border-radius: 6px;
    padding: 0.4rem;
    line-height: 1.4;
  }

  .p-handshape { border-color: #2563eb; }
  .p-handshape h3 { color: #2563eb; }
  .p-handshape .stokoe-tag { background: #dbeafe; color: #2563eb; }

  .p-location { border-color: #059669; }
  .p-location h3 { color: #059669; }
  .p-location .stokoe-tag { background: #dcfce7; color: #059669; }

  .p-movement { border-color: #d97706; }
  .p-movement h3 { color: #d97706; }
  .p-movement .stokoe-tag { background: #fef3c7; color: #d97706; }

  .p-orientation { border-color: #7c3aed; }
  .p-orientation h3 { color: #7c3aed; }
  .p-orientation .stokoe-tag { background: #f3e8ff; color: #7c3aed; }

  .p-nms { border-color: #ef4444; }
  .p-nms h3 { color: #ef4444; }
  .p-nms .stokoe-tag { background: #fee2e2; color: #ef4444; }

  .center-node {
    background: #1a1a2e;
    color: #fff;
    border-radius: 50%;
    width: 120px;
    height: 120px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    font-weight: 700;
    margin: 0.5rem 0;
  }
  .center-node .node-label {
    font-size: 0.75rem;
    opacity: 0.7;
  }
  .center-node .node-title {
    font-size: 1rem;
  }

  .constraints-section {
    margin-top: 1.5rem;
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
    justify-content: center;
  }
  .constraint-box {
    border: 1.5px solid #e5e7eb;
    border-radius: 10px;
    padding: 0.8rem 1rem;
    max-width: 380px;
    flex: 1;
  }
  .constraint-box h4 {
    font-size: 0.85rem;
    font-weight: 700;
    margin-bottom: 0.3rem;
    color: #374151;
  }
  .constraint-box p {
    font-size: 0.78rem;
    line-height: 1.45;
    color: #6c757d;
  }

  .minimal-pairs {
    margin-top: 1.5rem;
    background: #f8f9fa;
    border-radius: 10px;
    padding: 1rem 1.2rem;
  }
  .minimal-pairs h4 {
    font-size: 0.85rem;
    font-weight: 700;
    margin-bottom: 0.5rem;
    text-align: center;
    color: #374151;
  }
  .pair-row {
    display: flex;
    justify-content: center;
    gap: 1rem;
    flex-wrap: wrap;
  }
  .pair-item {
    font-size: 0.78rem;
    background: #fff;
    border: 1px solid #e5e7eb;
    border-radius: 6px;
    padding: 0.4rem 0.8rem;
    text-align: center;
  }
  .pair-item .pair-diff {
    font-weight: 700;
    font-size: 0.7rem;
    display: block;
    margin-top: 0.15rem;
  }

  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid #e9ecef;
  }
  figcaption strong {
    display: block;
    font-size: 1.15rem;
    color: #1a1a2e;
    margin-bottom: 0.4rem;
  }
  figcaption span {
    font-size: 0.9rem;
    color: #6c757d;
    line-height: 1.5;
  }

  @media (prefers-color-scheme: dark) {
    body { background: #1a1a2e; color: #e9ecef; }
    figure { background: #2d2d44; box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
    .diagram-title { color: #e9ecef; }
    .diagram-subtitle { color: #adb5bd; }
    figcaption { border-top-color: #3d3d5c; }
    figcaption strong { color: #e9ecef; }
    figcaption span { color: #adb5bd; }
    .center-node { background: #f8f9fa; color: #1a1a2e; }
    .param-card .param-example { background: rgba(255,255,255,0.06); }
    .constraint-box { border-color: #3d3d5c; }
    .constraint-box h4 { color: #e9ecef; }
    .constraint-box p { color: #adb5bd; }
    .minimal-pairs { background: #23233a; }
    .minimal-pairs h4 { color: #e9ecef; }
    .pair-item { background: #2d2d44; border-color: #3d3d5c; color: #e9ecef; }
  }
</style>
</head>
<body>
<figure>
  <div class="diagram-title">The Five Parameters of Sign Language Phonology</div>
  <div class="diagram-subtitle">Signs are composed from five simultaneous parameters, analogous to how spoken words are composed from sequential phonemes</div>

  <div class="hub-layout">
    <div class="param-ring">
      <div class="param-card p-handshape">
        <div class="stokoe-tag">Dez (Stokoe)</div>
        <div class="param-icon">&#x270B;</div>
        <h3>Handshape</h3>
        <div class="param-desc">Configuration of fingers and thumb. ASL uses ~83 distinct handshapes (per SignWriting inventory).</div>
        <div class="param-example">Open hand, fist, pointed index, curved fingers, etc. Marked vs. unmarked handshapes.</div>
      </div>

      <div class="param-card p-location">
        <div class="stokoe-tag">Tab (Stokoe)</div>
        <div class="param-icon">&#x1F4CD;</div>
        <h3>Location</h3>
        <div class="param-desc">Where the sign is produced -- forehead, chin, chest, neutral space, other hand, etc.</div>
        <div class="param-example">Changing only location creates a minimal pair: different sign, different meaning.</div>
      </div>

      <div class="param-card p-movement">
        <div class="stokoe-tag">Sig (Stokoe)</div>
        <div class="param-icon">&#x27A1;</div>
        <h3>Movement</h3>
        <div class="param-desc">Path (straight, arc, circular), internal (finger wiggle, wrist rotation), or both. Has direction, speed, iteration.</div>
        <div class="param-example">A single straight move vs. a repeated circular move changes aspect and meaning.</div>
      </div>
    </div>

    <div class="center-node">
      <div class="node-label">converge into</div>
      <div class="node-title">A SIGN</div>
      <div class="node-label">simultaneously</div>
    </div>

    <div class="param-ring">
      <div class="param-card p-orientation">
        <div class="stokoe-tag">Added post-Stokoe</div>
        <div class="param-icon">&#x1F91A;</div>
        <h3>Palm Orientation</h3>
        <div class="param-desc">Direction the palm faces -- up, down, inward, outward. Fourth parameter, added by Battison after Stokoe's original three.</div>
        <div class="param-example">Palm-up vs. palm-down with same handshape can produce different signs.</div>
      </div>

      <div class="param-card p-nms">
        <div class="stokoe-tag">Fifth parameter</div>
        <div class="param-icon">&#x1F610;</div>
        <h3>Non-Manual Signals</h3>
        <div class="param-desc">Facial expression, eyebrow position, head tilt, body shift, eye gaze. Operate simultaneously with manual parameters.</div>
        <div class="param-example">Raised eyebrows = yes/no question. Furrowed brows = wh-question. Head shake = negation.</div>
      </div>
    </div>
  </div>

  <div class="constraints-section">
    <div class="constraint-box">
      <h4>Symmetry Condition (Battison)</h4>
      <p>In two-handed signs where both hands move, they must have the same handshape, orientation, and mirrored movement. Constrains the system to maintain perceptual clarity.</p>
    </div>
    <div class="constraint-box">
      <h4>Dominance Condition (Battison)</h4>
      <p>If hands have different handshapes, only the dominant hand moves. The non-dominant hand serves as a base and must use an unmarked (simple) handshape.</p>
    </div>
  </div>

  <div class="minimal-pairs">
    <h4>Minimal Pairs: Changing One Parameter Changes Meaning</h4>
    <div class="pair-row">
      <div class="pair-item">APPLE vs. ONION<span class="pair-diff" style="color:#059669;">Location differs</span></div>
      <div class="pair-item">MOTHER vs. FATHER<span class="pair-diff" style="color:#059669;">Location differs</span></div>
      <div class="pair-item">SIT vs. CHAIR<span class="pair-diff" style="color:#d97706;">Movement differs</span></div>
      <div class="pair-item">NAME vs. SIT<span class="pair-diff" style="color:#2563eb;">Handshape differs</span></div>
    </div>
  </div>

  <figcaption>
    <strong>Diagram 1: The Five Parameters of Sign Language Phonology</strong>
    <span>William Stokoe's 1960 analysis revealed that signs are not holistic gestures but systematically decomposable structures -- composed from five simultaneous parameters, just as spoken words are composed from sequential phonemes. Stokoe originally identified three (Tab, Dez, Sig); palm orientation and non-manual signals were subsequently recognized. This parametric structure proves that visual-spatial symbols can be built from systematic distinctive features -- a direct template for visual language design. Sources: PMC (Phonological Organization of Sign Languages), Handspeak, ASL Bloom.</span>
  </figcaption>
</figure>
</body>
</html>
