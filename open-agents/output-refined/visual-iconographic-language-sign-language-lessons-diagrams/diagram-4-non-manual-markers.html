<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Non-Manual Markers as Grammatical Operators</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #f8f9fa;
    color: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 2rem;
  }
  figure {
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
    max-width: 1000px;
    width: 100%;
  }
  .diagram-title {
    text-align: center;
    font-size: 1.4rem;
    font-weight: 700;
    margin-bottom: 0.3rem;
    color: #1a1a2e;
  }
  .diagram-subtitle {
    text-align: center;
    font-size: 0.85rem;
    color: #6c757d;
    margin-bottom: 1.5rem;
  }

  .base-sequence {
    text-align: center;
    padding: 0.8rem;
    background: #f3f4f6;
    border-radius: 8px;
    margin-bottom: 1.5rem;
    font-size: 0.85rem;
  }
  .base-sequence .seq-label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #9ca3af;
    margin-bottom: 0.3rem;
  }
  .base-sequence .seq-signs {
    font-size: 1.3rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: #374151;
  }

  .nms-grid {
    display: flex;
    flex-direction: column;
    gap: 0.8rem;
    margin-bottom: 1.5rem;
  }
  .nms-row {
    display: flex;
    align-items: center;
    border: 2px solid;
    border-radius: 12px;
    overflow: hidden;
    transition: transform 0.15s;
  }
  .nms-row:hover {
    transform: translateX(4px);
  }
  .nms-marker {
    width: 200px;
    padding: 0.8rem 1rem;
    display: flex;
    align-items: center;
    gap: 0.6rem;
    flex-shrink: 0;
    border-right: 2px solid;
  }
  .nms-icon {
    font-size: 1.6rem;
  }
  .nms-desc {
    font-size: 0.75rem;
    line-height: 1.3;
    font-weight: 600;
  }
  .nms-result {
    flex: 1;
    padding: 0.8rem 1.2rem;
    display: flex;
    align-items: center;
    gap: 0.8rem;
  }
  .nms-function {
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    min-width: 90px;
  }
  .nms-sentence {
    font-size: 0.9rem;
    font-style: italic;
  }

  /* Row colors */
  .row-statement { border-color: #22c55e; }
  .row-statement .nms-marker { background: #f0fdf4; border-right-color: #22c55e; }
  .row-statement .nms-function { color: #16a34a; }

  .row-negation { border-color: #ef4444; }
  .row-negation .nms-marker { background: #fef2f2; border-right-color: #ef4444; }
  .row-negation .nms-function { color: #dc2626; }

  .row-ynq { border-color: #3b82f6; }
  .row-ynq .nms-marker { background: #eff6ff; border-right-color: #3b82f6; }
  .row-ynq .nms-function { color: #2563eb; }

  .row-whq { border-color: #7c3aed; }
  .row-whq .nms-marker { background: #faf5ff; border-right-color: #7c3aed; }
  .row-whq .nms-function { color: #7c3aed; }

  .row-conditional { border-color: #d97706; }
  .row-conditional .nms-marker { background: #fffbeb; border-right-color: #d97706; }
  .row-conditional .nms-function { color: #d97706; }

  .key-insight {
    background: #eff6ff;
    border-left: 4px solid #3b82f6;
    border-radius: 0 8px 8px 0;
    padding: 1rem 1.2rem;
    font-size: 0.88rem;
    line-height: 1.5;
  }
  .key-insight strong {
    color: #2563eb;
  }

  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid #e9ecef;
  }
  figcaption strong {
    display: block;
    font-size: 1.15rem;
    color: #1a1a2e;
    margin-bottom: 0.4rem;
  }
  figcaption span {
    font-size: 0.9rem;
    color: #6c757d;
    line-height: 1.5;
  }

  @media (prefers-color-scheme: dark) {
    body { background: #1a1a2e; color: #e9ecef; }
    figure { background: #2d2d44; box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
    .diagram-title { color: #e9ecef; }
    .diagram-subtitle { color: #adb5bd; }
    .base-sequence { background: #23233a; }
    .base-sequence .seq-signs { color: #e9ecef; }
    figcaption { border-top-color: #3d3d5c; }
    figcaption strong { color: #e9ecef; }
    figcaption span { color: #adb5bd; }
    .row-statement .nms-marker { background: rgba(34,197,94,0.12); }
    .row-negation .nms-marker { background: rgba(239,68,68,0.12); }
    .row-ynq .nms-marker { background: rgba(59,130,246,0.12); }
    .row-whq .nms-marker { background: rgba(124,58,237,0.12); }
    .row-conditional .nms-marker { background: rgba(217,119,6,0.12); }
    .key-insight { background: rgba(37,99,235,0.1); }
  }
</style>
</head>
<body>
<figure>
  <div class="diagram-title">Non-Manual Markers as Grammatical Operators</div>
  <div class="diagram-subtitle">The same manual sign sequence produces five different sentences depending entirely on which facial/head markers accompany it</div>

  <div class="base-sequence">
    <div class="seq-label">Identical manual sign sequence in all five rows</div>
    <div class="seq-signs">JOHN &nbsp; BUY &nbsp; HOUSE</div>
  </div>

  <div class="nms-grid">
    <div class="nms-row row-statement">
      <div class="nms-marker">
        <span class="nms-icon">&#x1F610;</span>
        <div class="nms-desc">Neutral face<br>Relaxed expression</div>
      </div>
      <div class="nms-result">
        <span class="nms-function">Statement</span>
        <span class="nms-sentence">"John bought the house."</span>
      </div>
    </div>

    <div class="nms-row row-negation">
      <div class="nms-marker">
        <span class="nms-icon">&#x1F645;</span>
        <div class="nms-desc">Head shake<br>Pursed lips</div>
      </div>
      <div class="nms-result">
        <span class="nms-function">Negation</span>
        <span class="nms-sentence">"John didn't buy the house."</span>
      </div>
    </div>

    <div class="nms-row row-ynq">
      <div class="nms-marker">
        <span class="nms-icon">&#x1F914;</span>
        <div class="nms-desc">Raised eyebrows<br>Forward head lean</div>
      </div>
      <div class="nms-result">
        <span class="nms-function">Yes/No Q</span>
        <span class="nms-sentence">"Did John buy the house?"</span>
      </div>
    </div>

    <div class="nms-row row-whq">
      <div class="nms-marker">
        <span class="nms-icon">&#x1F9D0;</span>
        <div class="nms-desc">Furrowed brows<br>Forward lean, squint</div>
      </div>
      <div class="nms-result">
        <span class="nms-function">Wh-Question</span>
        <span class="nms-sentence">"What did John buy?" / "Who bought the house?"</span>
      </div>
    </div>

    <div class="nms-row row-conditional">
      <div class="nms-marker">
        <span class="nms-icon">&#x1F928;</span>
        <div class="nms-desc">Raised brows (first part)<br>Head tilt, then neutral</div>
      </div>
      <div class="nms-result">
        <span class="nms-function">Conditional</span>
        <span class="nms-sentence">"If John buys the house..."</span>
      </div>
    </div>
  </div>

  <div class="key-insight">
    <strong>Design principle for visual language:</strong> Grammatical operators need not be separate sequential symbols. In sign language, negation, interrogation, and conditionality are overlay operations on existing content. A written visual language could use analogous visual transformations -- color shifts, boundary modifications, weight changes, positional offsets -- as grammatical operators applied to base symbols, rather than adding more sequential elements.
  </div>

  <figcaption>
    <strong>Diagram 4: Non-Manual Markers as Grammatical Operators</strong>
    <span>Five sentences produced from the identical manual sequence JOHN BUY HOUSE, differentiated entirely by non-manual markers: facial expression, eyebrow position, head movement, and lip configuration. These are not optional emotional additions -- they are obligatory grammatical operators. A signer who produces JOHN BUY HOUSE with no non-manual markers has produced an incomplete, ambiguous utterance. This proves that grammatical functions can be encoded as visual modifications to base content rather than as additional sequential elements. Sources: LifePrint (Non-manual markers in ASL), ASL Bloom.</span>
  </figcaption>
</figure>
</body>
</html>
