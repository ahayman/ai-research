<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Iconicity-Arbitrariness Spectrum in Sign Language</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #f8f9fa;
    color: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 2rem;
  }
  figure {
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
    max-width: 1000px;
    width: 100%;
  }
  .diagram-title {
    text-align: center;
    font-size: 1.4rem;
    font-weight: 700;
    margin-bottom: 0.3rem;
    color: #1a1a2e;
  }
  .diagram-subtitle {
    text-align: center;
    font-size: 0.85rem;
    color: #6c757d;
    margin-bottom: 2rem;
  }

  .spectrum-container {
    margin-bottom: 2rem;
  }
  .spectrum-bar {
    height: 12px;
    border-radius: 6px;
    background: linear-gradient(to right, #22c55e, #84cc16, #eab308, #f59e0b, #ef4444, #7c3aed);
    margin-bottom: 0.3rem;
  }
  .spectrum-labels {
    display: flex;
    justify-content: space-between;
    font-size: 0.75rem;
    font-weight: 700;
    margin-bottom: 1.5rem;
  }
  .spec-iconic { color: #16a34a; }
  .spec-arbitrary { color: #7c3aed; }

  .sign-cards {
    display: flex;
    flex-wrap: wrap;
    gap: 0.8rem;
    justify-content: center;
    margin-bottom: 2rem;
  }
  .sign-card {
    border: 2px solid;
    border-radius: 12px;
    padding: 1rem;
    min-width: 175px;
    max-width: 200px;
    flex: 1;
    text-align: center;
    position: relative;
  }
  .sign-card .position-tag {
    position: absolute;
    top: -10px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.65rem;
    font-weight: 700;
    padding: 0.1rem 0.6rem;
    border-radius: 10px;
    white-space: nowrap;
  }
  .sign-card .sign-name {
    font-size: 1.1rem;
    font-weight: 700;
    margin-top: 0.5rem;
    margin-bottom: 0.3rem;
  }
  .sign-card .sign-desc {
    font-size: 0.75rem;
    line-height: 1.4;
    opacity: 0.8;
  }

  .sc-transparent { border-color: #22c55e; }
  .sc-transparent .position-tag { background: #dcfce7; color: #16a34a; }
  .sc-transparent .sign-name { color: #16a34a; }

  .sc-partial { border-color: #eab308; }
  .sc-partial .position-tag { background: #fef9c3; color: #a16207; }
  .sc-partial .sign-name { color: #a16207; }

  .sc-weak { border-color: #f59e0b; }
  .sc-weak .position-tag { background: #fef3c7; color: #d97706; }
  .sc-weak .sign-name { color: #d97706; }

  .sc-arbitrary { border-color: #7c3aed; }
  .sc-arbitrary .position-tag { background: #f3e8ff; color: #7c3aed; }
  .sc-arbitrary .sign-name { color: #7c3aed; }

  .trajectory-section {
    margin-bottom: 1.5rem;
  }
  .trajectory-section h3 {
    font-size: 1rem;
    font-weight: 700;
    text-align: center;
    margin-bottom: 1rem;
    color: #374151;
  }
  .trajectory-row {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    justify-content: center;
    flex-wrap: wrap;
  }
  .traj-stage {
    padding: 0.6rem 1rem;
    border-radius: 8px;
    font-size: 0.8rem;
    font-weight: 600;
    text-align: center;
    min-width: 130px;
  }
  .traj-1 { background: #dcfce7; color: #16a34a; }
  .traj-2 { background: #fef9c3; color: #a16207; }
  .traj-3 { background: #fef3c7; color: #d97706; }
  .traj-4 { background: #f3e8ff; color: #7c3aed; }
  .traj-arrow {
    color: #9ca3af;
    font-size: 1.2rem;
  }
  .traj-note {
    text-align: center;
    font-size: 0.78rem;
    color: #9ca3af;
    margin-top: 0.5rem;
    font-style: italic;
  }

  .two-levels {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
    margin-bottom: 1.5rem;
  }
  .level-box {
    border: 2px solid;
    border-radius: 12px;
    padding: 1rem;
  }
  .level-box h4 {
    font-size: 0.9rem;
    font-weight: 700;
    margin-bottom: 0.4rem;
  }
  .level-box p {
    font-size: 0.8rem;
    line-height: 1.45;
  }
  .level-lexical { border-color: #ef4444; }
  .level-lexical h4 { color: #ef4444; }
  .level-structural { border-color: #22c55e; }
  .level-structural h4 { color: #22c55e; }

  .spoken-comparison {
    text-align: center;
    background: #f8f9fa;
    border-radius: 8px;
    padding: 0.8rem;
    font-size: 0.8rem;
    color: #6c757d;
    margin-bottom: 1.5rem;
  }

  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid #e9ecef;
  }
  figcaption strong {
    display: block;
    font-size: 1.15rem;
    color: #1a1a2e;
    margin-bottom: 0.4rem;
  }
  figcaption span {
    font-size: 0.9rem;
    color: #6c757d;
    line-height: 1.5;
  }

  @media (prefers-color-scheme: dark) {
    body { background: #1a1a2e; color: #e9ecef; }
    figure { background: #2d2d44; box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
    .diagram-title, .trajectory-section h3 { color: #e9ecef; }
    .diagram-subtitle { color: #adb5bd; }
    figcaption { border-top-color: #3d3d5c; }
    figcaption strong { color: #e9ecef; }
    figcaption span { color: #adb5bd; }
    .spoken-comparison { background: #23233a; color: #adb5bd; }
    .level-box { background: rgba(0,0,0,0.1); }
    .level-box p { color: #adb5bd; }
  }
</style>
</head>
<body>
<figure>
  <div class="diagram-title">The Iconicity-Arbitrariness Spectrum in Sign Language</div>
  <div class="diagram-subtitle">Sign languages are more iconic than spoken languages -- but still substantially arbitrary, and individual signs drift toward abstraction over time</div>

  <div class="spectrum-container">
    <div class="spectrum-bar"></div>
    <div class="spectrum-labels">
      <span class="spec-iconic">Transparent Iconicity</span>
      <span class="spec-arbitrary">Full Arbitrariness</span>
    </div>
  </div>

  <div class="sign-cards">
    <div class="sign-card sc-transparent">
      <div class="position-tag">Transparent</div>
      <div class="sign-name">TREE</div>
      <div class="sign-desc">Upright forearm = trunk, spread fingers = branches. Recognizable without training.</div>
    </div>
    <div class="sign-card sc-partial">
      <div class="position-tag">Partially Iconic</div>
      <div class="sign-name">DRINK</div>
      <div class="sign-desc">Miming raising a cup. Makes sense once explained but feature selection is arbitrary (why cup, not liquid?).</div>
    </div>
    <div class="sign-card sc-weak">
      <div class="position-tag">Weakly Iconic</div>
      <div class="sign-name">GOOD</div>
      <div class="sign-desc">Hand moves from chin outward. Some trace of "from mouth" = approval, but connection is tenuous.</div>
    </div>
    <div class="sign-card sc-arbitrary">
      <div class="position-tag">Fully Arbitrary</div>
      <div class="sign-name">BECAUSE</div>
      <div class="sign-desc">No visual connection to meaning. Pure convention -- must be learned, cannot be guessed.</div>
    </div>
  </div>

  <div class="spoken-comparison">
    Spoken language comparison: almost entirely arbitrary (onomatopoeia like "buzz" or "splash" are rare exceptions)
  </div>

  <div class="trajectory-section">
    <h3>Historical Trajectory: Individual Signs Drift Toward Abstraction</h3>
    <div class="trajectory-row">
      <div class="traj-stage traj-1">New iconic sign<br><span style="font-size:0.7rem;">Visually motivated</span></div>
      <span class="traj-arrow">--></span>
      <div class="traj-stage traj-2">Reduction<br><span style="font-size:0.7rem;">Shorter, faster</span></div>
      <span class="traj-arrow">--></span>
      <div class="traj-stage traj-3">Conventionalized<br><span style="font-size:0.7rem;">Origin forgotten</span></div>
      <span class="traj-arrow">--></span>
      <div class="traj-stage traj-4">Arbitrary<br><span style="font-size:0.7rem;">Pure convention</span></div>
    </div>
    <div class="traj-note">Individual signs become less iconic over time, but new iconic signs are continuously created -- so the overall iconicity level of the language remains relatively stable (Frishberg 1975, updated by more recent research).</div>
  </div>

  <div class="two-levels">
    <div class="level-box level-lexical">
      <h4>Lexical Iconicity (Fragile)</h4>
      <p>Individual sign-to-meaning resemblance. TREE looks like a tree -- but this erodes over time as efficiency pressure shortens and abstracts the sign form. Not sustainable as a design strategy.</p>
    </div>
    <div class="level-box level-structural">
      <h4>Structural Iconicity (Robust)</h4>
      <p>Spatial arrangement mirrors event structure. In classifier constructions, the spatial relationships between hands mirror the spatial relationships between objects. This level of iconicity may be more durable because it operates at the grammatical, not lexical, level.</p>
    </div>
  </div>

  <figcaption>
    <strong>Diagram 5: The Iconicity-Arbitrariness Spectrum in Sign Language</strong>
    <span>Four example signs placed along the iconicity spectrum, from TREE (transparently iconic) to BECAUSE (fully arbitrary). While sign languages are more iconic than spoken languages, most signs are partially or fully arbitrary, and individual signs tend to drift toward abstraction over time. The key design distinction: lexical iconicity (individual symbol resemblance) is fragile, but structural iconicity (spatial arrangement mirroring conceptual structure) is more robust. A visual language should invest in structural iconicity over lexical iconicity. Sources: Springer (Iconicity in ASL), Frontiers (Iconicity in Signed and Spoken Vocabulary), Journal of Cognition.</span>
  </figcaption>
</figure>
</body>
</html>
