<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diglossic Code-Switching as Pragmatic Resource</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --accent: #4361ee;
    --muted: #6c757d;
    --caption-bg: #f8f9fa;
    --dialect-bg: #dcfce7;
    --dialect-border: #16a34a;
    --dialect-text: #14532d;
    --msa-bg: #ede9fe;
    --msa-border: #7c3aed;
    --msa-text: #3b0764;
    --spectrum-bg: #f3f4f6;
    --switch-bg: #fef3c7;
    --switch-border: #d97706;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --accent: #6b8aff;
      --muted: #9a9ab0;
      --caption-bg: #1a1a2e;
      --dialect-bg: #064e3b;
      --dialect-border: #34d399;
      --dialect-text: #d1fae5;
      --msa-bg: #3b0764;
      --msa-border: #a78bfa;
      --msa-text: #e9d5ff;
      --spectrum-bg: #1f1f33;
      --switch-bg: #78350f;
      --switch-border: #fbbf24;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure { max-width: 1000px; width: 100%; }
  .diagram-container {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 2rem 1.5rem;
    overflow-x: auto;
  }
  .spectrum-bar {
    display: flex;
    align-items: stretch;
    border-radius: 8px;
    overflow: hidden;
    margin: 1.5rem 0;
    min-height: 60px;
    border: 2px solid var(--border);
  }
  .spectrum-end {
    padding: 0.8rem 1rem;
    font-weight: 700;
    font-size: 0.95rem;
    display: flex;
    align-items: center;
    justify-content: center;
    min-width: 140px;
    text-align: center;
  }
  .dialect-end { background: var(--dialect-bg); color: var(--dialect-text); border-right: 2px solid var(--dialect-border); }
  .msa-end { background: var(--msa-bg); color: var(--msa-text); border-left: 2px solid var(--msa-border); }
  .spectrum-middle {
    flex: 1;
    background: linear-gradient(to right, var(--dialect-bg), var(--spectrum-bg), var(--msa-bg));
    display: flex;
    align-items: center;
    justify-content: center;
    font-style: italic;
    font-size: 0.85rem;
    color: var(--muted);
    padding: 0.5rem;
    text-align: center;
  }
  .signals-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5rem;
    margin: 1.5rem 0;
  }
  .signal-box {
    padding: 1rem;
    border-radius: 8px;
    border: 2px solid;
  }
  .signal-dialect { background: var(--dialect-bg); border-color: var(--dialect-border); color: var(--dialect-text); }
  .signal-msa { background: var(--msa-bg); border-color: var(--msa-border); color: var(--msa-text); }
  .signal-box h3 { font-size: 0.95rem; margin-bottom: 0.5rem; }
  .signal-box ul { list-style: none; font-size: 0.85rem; }
  .signal-box li { padding: 0.2rem 0; }
  .signal-box li::before { content: "=> "; font-weight: 700; }
  .switch-box {
    background: var(--switch-bg);
    border: 2px solid var(--switch-border);
    border-radius: 8px;
    padding: 1rem 1.5rem;
    margin: 1.5rem 0;
    text-align: center;
  }
  .switch-box h3 { font-size: 1rem; margin-bottom: 0.5rem; color: var(--fg); }
  .switch-box p { font-size: 0.85rem; color: var(--fg); }
  .features-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 1rem;
    margin: 1rem 0;
  }
  .feature-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.7rem;
    font-size: 0.82rem;
  }
  .feature-item strong { display: block; margin-bottom: 0.2rem; color: var(--accent); }
  .eng-compare {
    background: #fee2e2;
    border: 2px solid #dc2626;
    border-radius: 8px;
    padding: 1rem 1.5rem;
    margin-top: 1.5rem;
    color: #7f1d1d;
    font-size: 0.85rem;
  }
  @media (prefers-color-scheme: dark) { .eng-compare { background: #450a0a; border-color: #f87171; color: #fecaca; } }
  .eng-compare strong { display: block; margin-bottom: 0.3rem; }
  .section-title { font-size: 1.1rem; font-weight: 700; color: var(--accent); margin: 1.5rem 0 0.5rem; text-align: center; }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding: 1rem 1.5rem;
    background: var(--caption-bg);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
</style>
</head>
<body>
<figure>
  <div class="diagram-container">
    <div class="section-title">The Diglossic Spectrum</div>
    <div class="spectrum-bar">
      <div class="spectrum-end dialect-end">PURE DIALECT<br/>(L variety)</div>
      <div class="spectrum-middle">Speakers modulate individual features along this continuum &mdash; the TRANSITION is the pragmatic signal</div>
      <div class="spectrum-end msa-end">PURE MSA<br/>(H variety)</div>
    </div>

    <div class="signals-grid">
      <div class="signal-box signal-dialect">
        <h3>Switching TOWARD Dialect signals:</h3>
        <ul>
          <li>Intimacy and solidarity</li>
          <li>Humor (jokes are almost always in dialect)</li>
          <li>Informality and relaxation</li>
          <li>Emotional authenticity and honesty</li>
          <li>Reducing imposition of a request</li>
          <li>"Between us..." (lowered social guard)</li>
        </ul>
      </div>
      <div class="signal-box signal-msa">
        <h3>Switching TOWARD MSA signals:</h3>
        <ul>
          <li>Formality and seriousness</li>
          <li>Authority and education</li>
          <li>Quoting (Quran, hadith, official text)</li>
          <li>Distance and impersonality</li>
          <li>Official announcements</li>
          <li>"Let me speak clearly..." (raised register)</li>
        </ul>
      </div>
    </div>

    <div class="switch-box">
      <h3>The Switch Itself Carries Meaning</h3>
      <p>A professor who lectures in MSA but drops into dialect for an anecdote signals: "this is personal, not academic."<br/>
      A politician who speaks dialect but switches to MSA for policy signals: "this is official."<br/>
      <strong>The TRANSITION is the message.</strong></p>
    </div>

    <div class="section-title">Features That Modulate Along the Spectrum</div>
    <div class="features-grid">
      <div class="feature-item">
        <strong>Case endings (iʿrab)</strong>
        Present in full MSA, completely absent in all dialects. Adding them = instant formality signal.
      </div>
      <div class="feature-item">
        <strong>Vocabulary choice</strong>
        MSA jawwal (mobile) vs. Egyptian mobayl vs. Levantine khallawi. Same referent, different register.
      </div>
      <div class="feature-item">
        <strong>Pronunciation of qaf</strong>
        [q] = MSA/Classical; [ʔ] = Egyptian; [g] = Gulf. One consonant, three social identities.
      </div>
      <div class="feature-item">
        <strong>Passive voice</strong>
        MSA uses internal vowel change (kutiba); dialects use periphrastic constructions. Grammar itself shifts.
      </div>
    </div>

    <div class="eng-compare">
      <strong>ENGLISH: No equivalent system</strong>
      English has register variation (formal/informal, slang/standard), but nothing comparable to the MSA/dialect split. The closest analogy: imagine if every English speaker were bilingual in a structurally different variety and could switch between them mid-sentence to encode social meaning. The magnitude of the Arabic switch involves grammar, vocabulary, and morphology simultaneously -- far beyond English "gonna" vs. "going to."
    </div>
  </div>
  <figcaption>
    <h2>Figure 3 &mdash; Diglossic Code-Switching as Pragmatic Resource</h2>
    <p>Arabic speakers command a continuum from vernacular dialect (L) to Modern Standard Arabic (H), and movement along this spectrum is a pragmatic tool. Switching toward dialect (green) signals intimacy, humor, and solidarity. Switching toward MSA (purple) signals formality, authority, and quotation. The transition itself carries meaning -- the switch IS the message. Four specific linguistic features (case endings, vocabulary, qaf pronunciation, passive voice construction) can be independently modulated along this spectrum. English has no comparable system.</p>
  </figcaption>
</figure>
</body>
</html>
