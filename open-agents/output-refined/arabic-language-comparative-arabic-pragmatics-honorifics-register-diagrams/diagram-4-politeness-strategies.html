<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arabic vs. English Politeness Strategy Comparison</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --accent: #4361ee;
    --muted: #6c757d;
    --caption-bg: #f8f9fa;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --accent: #6b8aff;
      --muted: #9a9ab0;
      --caption-bg: #1a1a2e;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure { max-width: 1100px; width: 100%; }
  .diagram-container {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.5rem 1rem;
    overflow-x: auto;
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding: 1rem 1.5rem;
    background: var(--caption-bg);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
</style>
</head>
<body>
<figure>
  <div class="diagram-container">
    <pre class="mermaid">
flowchart TD
    TITLE["<strong>Politeness Architecture: Two Organizing Principles</strong><br/><em>Same social goal &mdash; fundamentally different toolkits</em>"]

    TITLE --> AR
    TITLE --> EN

    subgraph AR["<strong>ARABIC POLITENESS</strong><br/><em>Positive politeness dominant &mdash; social harmony through formulae</em>"]
        direction TB
        AR_STRAT["<strong>Strategy: DIRECT request + RELIGIOUS softener</strong><br/>The request itself is direct; the blessing mitigates"]
        AR_LOW["<strong>Low imposition:</strong><br/>&rsquo;Give me the pen, min fadlak&rsquo;<br/><em>from your grace &mdash; standard please</em>"]
        AR_MED["<strong>Medium imposition:</strong><br/>&rsquo;All&amacr;h ykhall&imacr;k, help me with this&rsquo;<br/><em>may God preserve you</em>"]
        AR_HIGH["<strong>High imposition:</strong><br/>&rsquo;Jaz&amacr;ka All&amacr;hu khayran, lend me your car&rsquo;<br/><em>may God reward you with goodness</em>"]
        AR_HOSP["<strong>Three-refusal pattern:</strong><br/>Offer &rarr; Decline &rarr; Offer &rarr; Decline &rarr; Offer &rarr; Accept/Decline<br/><em>Insistence is polite, not pushy</em>"]
        AR_TOOL["<strong>Toolkit: VOCABULARY</strong><br/>Politeness lives in religious invocations,<br/>blessings, and graduated softeners"]
        AR_STRAT --> AR_LOW --> AR_MED --> AR_HIGH
        AR_STRAT --> AR_HOSP
        AR_STRAT --> AR_TOOL
    end

    subgraph EN["<strong>ENGLISH POLITENESS</strong><br/><em>Negative politeness dominant &mdash; minimize imposition</em>"]
        direction TB
        EN_STRAT["<strong>Strategy: INDIRECT request + GRAMMATICAL softener</strong><br/>The grammar itself encodes the hedge"]
        EN_LOW["<strong>Low imposition:</strong><br/>&rsquo;Can you pass the pen?&rsquo;<br/><em>modal verb softening</em>"]
        EN_MED["<strong>Medium imposition:</strong><br/>&rsquo;Would you mind helping me?&rsquo;<br/><em>conditional + mind-construction</em>"]
        EN_HIGH["<strong>High imposition:</strong><br/>&rsquo;I was wondering if you could<br/>possibly lend me your car?&rsquo;<br/><em>past tense + conditional + possibly</em>"]
        EN_ONCE["<strong>One-offer pattern:</strong><br/>Offer once &rarr; Accept or decline<br/><em>Repeating = pushy</em>"]
        EN_TOOL["<strong>Toolkit: GRAMMAR</strong><br/>Politeness lives in modal verbs,<br/>conditional mood, passive voice"]
        EN_STRAT --> EN_LOW --> EN_MED --> EN_HIGH
        EN_STRAT --> EN_ONCE
        EN_STRAT --> EN_TOOL
    end

    FRICTION["<strong>CROSS-CULTURAL FRICTION</strong><br/>Arabic directness + blessing &rArr; English hears &rsquo;too direct&rsquo;<br/>English indirectness &rArr; Arabic hears &rsquo;cold / insincere&rsquo;<br/>Arabic repeated offers &rArr; English hears &rsquo;pushy&rsquo;<br/>English single offers &rArr; Arabic hears &rsquo;not genuine&rsquo;"]

    style TITLE fill:#e0f2fe,stroke:#0284c7,color:#0c4a6e
    style AR fill:#dcfce7,stroke:#16a34a,color:#14532d
    style AR_STRAT fill:#bbf7d0,stroke:#16a34a,color:#14532d
    style AR_LOW fill:#f0fdf4,stroke:#22c55e,color:#14532d
    style AR_MED fill:#f0fdf4,stroke:#22c55e,color:#14532d
    style AR_HIGH fill:#f0fdf4,stroke:#22c55e,color:#14532d
    style AR_HOSP fill:#f0fdf4,stroke:#22c55e,color:#14532d
    style AR_TOOL fill:#bbf7d0,stroke:#16a34a,color:#14532d

    style EN fill:#fce7f3,stroke:#db2777,color:#831843
    style EN_STRAT fill:#fbcfe8,stroke:#db2777,color:#831843
    style EN_LOW fill:#fdf2f8,stroke:#ec4899,color:#831843
    style EN_MED fill:#fdf2f8,stroke:#ec4899,color:#831843
    style EN_HIGH fill:#fdf2f8,stroke:#ec4899,color:#831843
    style EN_ONCE fill:#fdf2f8,stroke:#ec4899,color:#831843
    style EN_TOOL fill:#fbcfe8,stroke:#db2777,color:#831843

    style FRICTION fill:#fef3c7,stroke:#d97706,color:#78350f
    </pre>
  </div>
  <figcaption>
    <h2>Figure 4 &mdash; Arabic vs. English Politeness Strategy Comparison</h2>
    <p>Arabic politeness (green) uses DIRECT requests softened by RELIGIOUS VOCABULARY -- graduated from "min fadlak" (standard please) through "Allah ykhallhik" (may God preserve you) to "Jazaka Allahu khayran" (may God reward you). English politeness (pink) uses INDIRECT requests softened by GRAMMAR -- modal verbs, conditional mood, and past tense stacking. The hospitality protocols also diverge: Arabic's three-refusal pattern (insistence = respect) vs. English's one-offer pattern (repetition = pressure). The amber friction zone shows where these incompatible systems create cross-cultural misunderstanding.</p>
  </figcaption>
</figure>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<script>
  mermaid.initialize({
    startOnLoad: true,
    theme: window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'neutral',
    flowchart: { useMaxWidth: true, htmlLabels: true }
  });
</script>
</body>
</html>
