<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arabic Greeting Ritual Flowchart</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --accent: #4361ee;
    --muted: #6c757d;
    --caption-bg: #f8f9fa;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --accent: #6b8aff;
      --muted: #9a9ab0;
      --caption-bg: #1a1a2e;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure { max-width: 1100px; width: 100%; }
  .diagram-container {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.5rem 1rem;
    overflow-x: auto;
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding: 1rem 1.5rem;
    background: var(--caption-bg);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
</style>
</head>
<body>
<figure>
  <div class="diagram-container">
    <pre class="mermaid">
flowchart TD
    START(("MEETING"))

    subgraph ARABIC["<strong>ARABIC GREETING RITUAL</strong><br/><em>Several minutes &mdash; the greeting IS the relationship</em>"]
        direction TB
        A1["<strong>1. Salam Exchange</strong><br/><em>As-sal&amacr;mu ʿalaykum</em><br/>(Peace be upon you)<br/>&darr;<br/><em>Wa ʿalaykum al-sal&amacr;m</em><br/>(And upon you peace)<br/><strong>OBLIGATORY &bull; RELIGIOUS</strong>"]
        A2["<strong>2. Health Inquiry</strong><br/><em>Kayf h&amacr;lak?</em> (How is your condition?)<br/>&darr;<br/><em>Al-hamdu lill&amacr;h</em> (Praise God)<br/><strong>FORMULAIC &mdash; always positive</strong>"]
        A3["<strong>3. Family Inquiry</strong><br/>Ask about spouse, children, parents<br/>Thoroughness = respect level<br/><strong>EXPECTED &mdash; not optional</strong>"]
        A4{"Formal<br/>context?"}
        A5["<strong>4a. Hospitality Offer</strong><br/>Tea / coffee offered<br/>Decline expected initially<br/>Offer-refuse-offer cycle<br/><strong>RITUAL HOSPITALITY</strong>"]
        A6["<strong>4b. Extended pleasantries</strong><br/>News, mutual acquaintances<br/><strong>RELATIONSHIP BUILDING</strong>"]
        A7["<strong>5. Actual Topic</strong><br/>May not be reached for minutes<br/><strong>THE BUSINESS</strong>"]
        A8["<strong>6. Farewell</strong><br/><em>Maʿa al-sal&amacr;ma</em> (With peace)<br/>Religious blessings exchanged<br/><em>Inshallah we&rsquo;ll meet again</em><br/><strong>CAN BE AS LONG AS CONVERSATION</strong>"]
        A1 --> A2 --> A3 --> A4
        A4 -->|Yes| A5 --> A7
        A4 -->|No| A6 --> A7
        A7 --> A8
    end

    subgraph ENGLISH["<strong>ENGLISH GREETING</strong><br/><em>~10 seconds total</em>"]
        direction TB
        E1["<strong>1. Hi / Hey / Hello</strong>"]
        E2["<strong>2. How are you? &rarr; Fine, thanks</strong><br/><em>(not a real question)</em>"]
        E3["<strong>3. Topic</strong><br/><em>(immediately)</em>"]
        E4["<strong>4. Bye / See you</strong>"]
        E1 --> E2 --> E3 --> E4
    end

    START --> ARABIC
    START --> ENGLISH

    style START fill:#e0f2fe,stroke:#0284c7,color:#0c4a6e

    style ARABIC fill:#dcfce7,stroke:#16a34a,color:#14532d
    style A1 fill:#f0fdf4,stroke:#22c55e,color:#14532d
    style A2 fill:#f0fdf4,stroke:#22c55e,color:#14532d
    style A3 fill:#f0fdf4,stroke:#22c55e,color:#14532d
    style A4 fill:#fef3c7,stroke:#d97706,color:#78350f
    style A5 fill:#f0fdf4,stroke:#22c55e,color:#14532d
    style A6 fill:#f0fdf4,stroke:#22c55e,color:#14532d
    style A7 fill:#bbf7d0,stroke:#16a34a,color:#14532d
    style A8 fill:#f0fdf4,stroke:#22c55e,color:#14532d

    style ENGLISH fill:#fce7f3,stroke:#db2777,color:#831843
    style E1 fill:#fdf2f8,stroke:#ec4899,color:#831843
    style E2 fill:#fdf2f8,stroke:#ec4899,color:#831843
    style E3 fill:#fbcfe8,stroke:#db2777,color:#831843
    style E4 fill:#fdf2f8,stroke:#ec4899,color:#831843
    </pre>
  </div>
  <figcaption>
    <h2>Figure 5 &mdash; Arabic Greeting Ritual vs. English Greeting</h2>
    <p>Arabic greetings (green) are a six-stage social ritual lasting several minutes: salaam exchange (obligatory, religious), health inquiry (formulaic, always answered positively), family inquiry (thoroughness = respect), hospitality offer (three-refusal pattern), actual topic, and elaborate farewell with religious blessings. English greetings (pink) compress the entire sequence into roughly 10 seconds: hi, how-are-you-fine-thanks, topic, bye. Truncating Arabic greetings is socially marked as rude; extending English greetings is socially marked as odd. The Arabic greeting IS the relationship maintenance -- it is not preliminary to conversation, it IS conversation.</p>
  </figcaption>
</figure>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<script>
  mermaid.initialize({
    startOnLoad: true,
    theme: window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'neutral',
    flowchart: { useMaxWidth: true, htmlLabels: true }
  });
</script>
</body>
</html>
