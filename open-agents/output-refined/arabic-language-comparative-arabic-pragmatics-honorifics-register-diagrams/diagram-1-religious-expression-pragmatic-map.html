<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Religious Expression Pragmatic Function Map</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --accent: #4361ee;
    --muted: #6c757d;
    --caption-bg: #f8f9fa;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --accent: #6b8aff;
      --muted: #9a9ab0;
      --caption-bg: #1a1a2e;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure { max-width: 1200px; width: 100%; }
  .diagram-container {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.5rem 1rem;
    overflow-x: auto;
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding: 1rem 1.5rem;
    background: var(--caption-bg);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
</style>
</head>
<body>
<figure>
  <div class="diagram-container">
    <pre class="mermaid">
flowchart TD
    TITLE["<strong>Religious Expressions as Pragmatic Multitools</strong><br/><em>Literal religious meaning &rarr; pragmatic drift &rarr; social function</em>"]

    TITLE --> ISA
    TITLE --> MSA
    TITLE --> BIS
    TITLE --> ALH
    TITLE --> SUB

    subgraph ISA["<strong>INSHALLAH</strong> إن شاء الله<br/><em>If God wills it</em>"]
        ISA_1["Sincere promise<br/><em>I will come, inshallah</em><br/>100% commitment"]
        ISA_2["Firm intention + caveat<br/><em>I&rsquo;ll finish tomorrow, inshallah</em><br/>~75% commitment"]
        ISA_3["Genuine hope<br/><em>You&rsquo;ll recover, inshallah</em><br/>~50% &mdash; uncertain"]
        ISA_4["Vague hedge<br/><em>We&rsquo;ll see, inshallah</em><br/>~25% &mdash; noncommittal"]
        ISA_5["Polite refusal<br/><em>Sure, inshallah (tone shift)</em><br/>~5% &mdash; &rsquo;probably not&rsquo;"]
        ISA_6["Sarcasm marker<br/><em>He&rsquo;ll pay you back, inshallah</em><br/>0% &mdash; &rsquo;never&rsquo;"]
    end

    subgraph MSA["<strong>MASHALLAH</strong> ما شاء الله<br/><em>What God has willed</em>"]
        MSA_1["Compliment<br/><em>Beautiful children, mashallah</em>"]
        MSA_2["Evil eye protection<br/><em>Praise + deflect envy</em>"]
        MSA_3["Shared joy<br/><em>You graduated! Mashallah!</em>"]
        MSA_4["Modesty marker<br/><em>I got promoted &mdash; mashallah</em>"]
        MSA_5["Sarcasm / irony<br/><em>He ate the whole cake, mashallah</em>"]
        MSA_6["Group membership<br/><em>Signals Islamic cultural belonging</em>"]
    end

    subgraph BIS["<strong>BISMILLAH</strong> بسم الله<br/><em>In the name of God</em>"]
        BIS_1["Activity starter<br/><em>Before eating, driving, any task</em>"]
        BIS_2["Surprise / shock<br/><em>Bismillah! What happened?</em>"]
    end

    subgraph ALH["<strong>ALHAMDULILLAH</strong> الحمد لله<br/><em>Praise be to God</em>"]
        ALH_1["Standard greeting response<br/><em>How are you? &mdash; Alhamdulillah</em>"]
        ALH_2["Gratitude marker<br/><em>After sneezing, good news</em>"]
        ALH_3["Resignation / acceptance<br/><em>Flight canceled, alhamdulillah</em>"]
    end

    subgraph SUB["<strong>SUBHANALLAH</strong> سبحان الله<br/><em>Glory be to God</em>"]
        SUB_1["Awe / wonder<br/><em>Look at that sunset &mdash; subhanallah</em>"]
        SUB_2["Shock / disapproval<br/><em>Subhanallah, he said that?</em>"]
    end

    ENG["<strong>ENGLISH: No equivalent system</strong><br/>&rsquo;God willing&rsquo; &rsquo;thank God&rsquo; &rsquo;God bless you&rsquo; exist<br/>but are marginal &mdash; days can pass without hearing them<br/>Closest parallel: &rsquo;hopefully&rsquo; &rsquo;fingers crossed&rsquo;<br/><em>Arabic uses these expressions multiple times per conversation</em>"]

    style TITLE fill:#e0f2fe,stroke:#0284c7,color:#0c4a6e
    style ISA fill:#dcfce7,stroke:#16a34a,color:#14532d
    style ISA_1 fill:#f0fdf4,stroke:#22c55e,color:#14532d
    style ISA_2 fill:#f0fdf4,stroke:#22c55e,color:#14532d
    style ISA_3 fill:#f0fdf4,stroke:#22c55e,color:#14532d
    style ISA_4 fill:#fefce8,stroke:#eab308,color:#78350f
    style ISA_5 fill:#fef2f2,stroke:#f87171,color:#7f1d1d
    style ISA_6 fill:#fee2e2,stroke:#dc2626,color:#7f1d1d

    style MSA fill:#fef3c7,stroke:#d97706,color:#78350f
    style MSA_1 fill:#fefce8,stroke:#eab308,color:#78350f
    style MSA_2 fill:#fefce8,stroke:#eab308,color:#78350f
    style MSA_3 fill:#fefce8,stroke:#eab308,color:#78350f
    style MSA_4 fill:#fefce8,stroke:#eab308,color:#78350f
    style MSA_5 fill:#fef2f2,stroke:#f87171,color:#7f1d1d
    style MSA_6 fill:#fefce8,stroke:#eab308,color:#78350f

    style BIS fill:#fce7f3,stroke:#db2777,color:#831843
    style BIS_1 fill:#fdf2f8,stroke:#ec4899,color:#831843
    style BIS_2 fill:#fdf2f8,stroke:#ec4899,color:#831843

    style ALH fill:#ede9fe,stroke:#7c3aed,color:#3b0764
    style ALH_1 fill:#f5f3ff,stroke:#8b5cf6,color:#3b0764
    style ALH_2 fill:#f5f3ff,stroke:#8b5cf6,color:#3b0764
    style ALH_3 fill:#f5f3ff,stroke:#8b5cf6,color:#3b0764

    style SUB fill:#fff7ed,stroke:#ea580c,color:#7c2d12
    style SUB_1 fill:#fff7ed,stroke:#fb923c,color:#7c2d12
    style SUB_2 fill:#fff7ed,stroke:#fb923c,color:#7c2d12

    style ENG fill:#fee2e2,stroke:#dc2626,color:#7f1d1d
    </pre>
  </div>
  <figcaption>
    <h2>Figure 1 &mdash; Religious Expression Pragmatic Function Map</h2>
    <p>Five major Arabic religious expressions mapped to their full range of pragmatic functions. The inshallah spectrum (green) runs from 100% sincere commitment through hedging to 0% sarcastic refusal -- the SAME words encode radically different commitment levels, disambiguated by tone, context, and relationship. Mashallah (amber) serves six distinct social roles from genuine compliment to sarcastic mock-admiration. English (red) has no comparable system: religious expressions are marginal, not systematic pragmatic architecture.</p>
  </figcaption>
</figure>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<script>
  mermaid.initialize({
    startOnLoad: true,
    theme: window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'neutral',
    flowchart: { useMaxWidth: true, htmlLabels: true }
  });
</script>
</body>
</html>
