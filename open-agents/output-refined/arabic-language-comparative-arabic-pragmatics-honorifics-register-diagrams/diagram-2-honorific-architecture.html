<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arabic vs. English Honorific Architecture</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --accent: #4361ee;
    --muted: #6c757d;
    --caption-bg: #f8f9fa;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --accent: #6b8aff;
      --muted: #9a9ab0;
      --caption-bg: #1a1a2e;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure { max-width: 1100px; width: 100%; }
  .diagram-container {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.5rem 1rem;
    overflow-x: auto;
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding: 1rem 1.5rem;
    background: var(--caption-bg);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
</style>
</head>
<body>
<figure>
  <div class="diagram-container">
    <pre class="mermaid">
flowchart TD
    TITLE["<strong>Three Strategies for Encoding Respect</strong><br/><em>Same social goal, radically different architectures</em>"]

    TITLE --> AR
    TITLE --> FR
    TITLE --> EN

    subgraph AR["<strong>ARABIC: ADDITIVE LAYERING</strong><br/><em>Stack optional elements onto base grammar</em><br/>No grammaticalized T-V distinction"]
        direction TB
        AR_BASE["<strong>Base pronoun: anta</strong> أنت<br/>Used for kings and vendors alike<br/><em>Optional polite: hadratak حضرتك</em>"]
        AR_T["<strong>Titles</strong><br/>Sheikh &bull; Ust&amacr;dh &bull; Sayyid<br/>&Hstrok;&amacr;jj &bull; Dukt&umacr;r<br/>Ab&umacr;/Umm + child&rsquo;s name"]
        AR_R["<strong>Religious formulae</strong><br/>PBUH after Prophet &bull; RA after companions<br/>Rahimahu All&amacr;h after deceased scholars<br/><em>Obligatory in formal Arabic</em>"]
        AR_B["<strong>Blessings as softeners</strong><br/>All&amacr;h ykhall&imacr;k &bull; Jaz&amacr;ka All&amacr;hu khayran<br/><em>Graduated &rsquo;please&rsquo; / &rsquo;thank you&rsquo;</em>"]
        AR_EX["<strong>Full respectful reference:</strong><br/><em>al-Sheikh al-Dukt&umacr;r Muhammad,</em><br/><em>rahimahu All&amacr;h</em><br/>= title + title + religious formula"]
        AR_BASE --> AR_T --> AR_R --> AR_B --> AR_EX
    end

    subgraph FR["<strong>FRENCH: BINARY SWITCH</strong><br/><em>One grammatical choice ripples through everything</em>"]
        direction TB
        FR_TU["<strong>tu</strong> (informal)<br/>Singular &bull; Friends &bull; Children<br/>Family &bull; God (in prayer)<br/><em>tu parles &bull; ton livre &bull; te voir</em>"]
        FR_VOUS["<strong>vous</strong> (formal)<br/>Strangers &bull; Superiors &bull; Elders<br/>Professional &bull; Multiple people<br/><em>vous parlez &bull; votre livre &bull; vous voir</em>"]
        FR_NOTE["<strong>ONE choice changes:</strong><br/>All pronouns &bull; All verb forms<br/>All possessives &bull; All object forms<br/><em>Grammatically pervasive</em>"]
        FR_TU --> FR_NOTE
        FR_VOUS --> FR_NOTE
    end

    subgraph EN["<strong>ENGLISH: MINIMAL / DECLINING</strong><br/><em>Respect via indirectness, not forms</em>"]
        direction TB
        EN_TITLES["<strong>Titles (declining)</strong><br/>Mr. &bull; Mrs. &bull; Dr. &bull; Professor<br/><em>Rapidly eroding in informal contexts</em>"]
        EN_SYNTAX["<strong>Syntactic indirectness</strong><br/>Could you possibly...?<br/>Would you mind...?<br/>I was wondering if...<br/><em>Politeness lives in GRAMMAR</em>"]
        EN_NOTE["<strong>ONE word for please</strong><br/><strong>ONE word for thank you</strong><br/>No graduated religious softeners<br/>No obligatory post-name formulae"]
        EN_TITLES --> EN_SYNTAX --> EN_NOTE
    end

    META["<strong>META-PATTERN</strong><br/>Arabic respect: LEXICAL (what words you add)<br/>French respect: GRAMMATICAL (which pronoun form you use)<br/>English respect: SYNTACTIC (how indirect you make the sentence)"]

    style TITLE fill:#e0f2fe,stroke:#0284c7,color:#0c4a6e
    style AR fill:#dcfce7,stroke:#16a34a,color:#14532d
    style AR_BASE fill:#f0fdf4,stroke:#22c55e,color:#14532d
    style AR_T fill:#f0fdf4,stroke:#22c55e,color:#14532d
    style AR_R fill:#f0fdf4,stroke:#22c55e,color:#14532d
    style AR_B fill:#f0fdf4,stroke:#22c55e,color:#14532d
    style AR_EX fill:#bbf7d0,stroke:#16a34a,color:#14532d

    style FR fill:#fef3c7,stroke:#d97706,color:#78350f
    style FR_TU fill:#fefce8,stroke:#eab308,color:#78350f
    style FR_VOUS fill:#fefce8,stroke:#eab308,color:#78350f
    style FR_NOTE fill:#fde68a,stroke:#d97706,color:#78350f

    style EN fill:#fce7f3,stroke:#db2777,color:#831843
    style EN_TITLES fill:#fdf2f8,stroke:#ec4899,color:#831843
    style EN_SYNTAX fill:#fdf2f8,stroke:#ec4899,color:#831843
    style EN_NOTE fill:#fbcfe8,stroke:#db2777,color:#831843

    style META fill:#e0f2fe,stroke:#0284c7,color:#0c4a6e
    </pre>
  </div>
  <figcaption>
    <h2>Figure 2 &mdash; Arabic vs. English Honorific Architecture</h2>
    <p>Three languages, three fundamentally different strategies for the same social goal. Arabic (green) encodes respect through ADDITIVE LAYERING: stack titles, religious formulae, and graduated blessings onto an unchanged base pronoun (anta). Arabic has no grammaticalized T-V pronoun distinction, though hadratak serves as an optional polite alternative. French (amber) uses a BINARY GRAMMATICAL SWITCH: choosing tu or vous ripples through all pronouns, verb forms, and possessives. English (pink) has a MINIMAL and declining system where respect is encoded through SYNTACTIC indirectness (modal verbs, conditional mood) rather than vocabulary or pronoun choice.</p>
  </figcaption>
</figure>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<script>
  mermaid.initialize({
    startOnLoad: true,
    theme: window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'neutral',
    flowchart: { useMaxWidth: true, htmlLabels: true }
  });
</script>
</body>
</html>
