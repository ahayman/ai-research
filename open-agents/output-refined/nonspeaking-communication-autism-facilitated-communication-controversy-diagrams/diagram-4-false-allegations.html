<!-- Description: Flowchart showing how FC-produced messages led to real-world harm: from facilitator training through abuse allegations, family separation, and the critical branch point of whether controlled testing is conducted. Includes the Boynton and Wendrow cases. -->

<figure class="concept-diagram" id="diagram-false-allegations">
  <div class="diagram-container">
    <pre class="mermaid">
flowchart TD
    START["Facilitator trained in FC<br/>---<br/>Trained to expect communicative<br/>competence. Trained that abuse<br/>rates are high in disabled<br/>populations."]

    START --> SESSIONS["Facilitated sessions produce<br/>messages through ideomotor effect"]

    SESSIONS --> ALLEGE["Messages include<br/>ABUSE ALLEGATIONS<br/>---<br/>(Consistent with facilitator's<br/>training about abuse prevalence)"]

    ALLEGE --> REPORT["Allegations reported<br/>to authorities"]

    REPORT --> REMOVE["Child REMOVED from home<br/>Parents ARRESTED / CHARGED<br/>---<br/>~60 documented cases by 1995"]

    REMOVE --> BRANCH{"Is controlled<br/>testing conducted?"}

    BRANCH -->|"YES"| TEST["Double-blind testing<br/>demonstrates facilitator<br/>authorship"]

    BRANCH -->|"NO"| PROCEED["Prosecution proceeds<br/>based on FC 'testimony'"]

    TEST --> DISMISS["Charges DISMISSED<br/>Family reunited<br/>---<br/>But damage is done:<br/>imprisonment, trauma,<br/>public accusation"]

    PROCEED --> CONVICT["Risk of wrongful<br/>conviction based on<br/>unvalidated FC output"]

    subgraph BOYNTON["BOYNTON CASE (1992)"]
        BC1["Janyce Boynton facilitates<br/>abuse allegations from<br/>Betsy Wheaton (age 16)"]
        BC2["Howard Shane conducts<br/>double-blind testing"]
        BC3["Boynton shown to be author.<br/>Accepts results. Publishes<br/>confessional account (2012)."]
        BC1 --> BC2 --> BC3
    end

    subgraph WENDROW["WENDROW CASE"]
        WC1["FC at school produces<br/>allegations against parents<br/>Julian and Thal Wendrow"]
        WC2["Julian jailed 80 days"]
        WC3["Testing reveals facilitator<br/>authorship. Charges dismissed.<br/>Family receives $3.75M settlement."]
        WC1 --> WC2 --> WC3
    end

  </div>
  <figcaption>
    <strong>Figure 4:</strong> The false allegations pipeline -- how FC-produced messages led to documented real-world harm. By 1995, approximately 60 cases existed where FC produced abuse allegations that led to family separations and criminal charges. In essentially every case subjected to controlled testing, the messages were found to originate with the facilitator. The Boynton case (1992) resulted in a published confessional account of how the ideomotor effect produced the allegations. The Wendrow case resulted in 80 days of wrongful imprisonment and a $3.75 million settlement. The critical variable is whether controlled testing is conducted.
  </figcaption>
</figure>
