<!-- Diagram: The Ideomotor Effect -- How It Works -->
<!-- Type: flowchart -->
<!-- Generated: 2026-03-31 -->
<!-- Description: Circular feedback loop diagram illustrating the psychological and motor mechanism by which facilitators unknowingly author messages attributed to the person being facilitated. Includes the Ouija board parallel. -->

<figure class="concept-diagram" id="diagram-ideomotor">
  <div class="diagram-container">
    <pre class="mermaid">
flowchart TD
    EXPECT["1. FACILITATOR EXPECTATION<br/>---<br/>Facilitator holds thought<br/>about what the individual<br/>might communicate"]

    MOTOR["2. UNCONSCIOUS MOTOR ACTIVATION<br/>---<br/>Thought activates motor<br/>planning areas in the brain<br/>(Carpenter effect, 1852)"]

    GUIDE["3. SUBTLE PHYSICAL GUIDANCE<br/>---<br/>Involuntary muscle movements<br/>transmit directional force<br/>through physical contact<br/>(hand, wrist, arm, shoulder)"]

    POINT["4. DIRECTED POINTING<br/>---<br/>Individual's hand/arm guided<br/>toward letters consistent with<br/>facilitator's expectations"]

    MESSAGE["5. MESSAGE APPEARS<br/>---<br/>Letter sequence is read<br/>as coherent communication"]

    ATTRIB["6. ATTRIBUTION ERROR<br/>---<br/>Facilitator genuinely perceives<br/>message as originating from<br/>the individual, not themselves"]

    REINFORCE["7. SOCIAL REINFORCEMENT<br/>---<br/>Family, educators, media respond<br/>with emotional intensity to the<br/>apparent breakthrough"]

    EXPECT --> MOTOR --> GUIDE --> POINT --> MESSAGE --> ATTRIB --> REINFORCE
    REINFORCE -->|"Cycle strengthens<br/>with each iteration"| EXPECT

    subgraph PARALLEL["THE OUIJA BOARD PARALLEL"]
        OB1["Participants believe external<br/>force moves the planchette"]
        OB2["Blindfolded experiments show:<br/>remove visual feedback =<br/>planchette spells gibberish"]
        OB3["Same mechanism:<br/>unconscious motor influence<br/>invisible to the person<br/>producing it"]
        OB1 --> OB2 --> OB3
    end

    KEY["KEY INSIGHT: Most facilitators<br/>are SINCERE. They are not<br/>deliberately fabricating messages.<br/>The ideomotor effect is<br/>unconscious and undetectable<br/>through introspection."]

    style EXPECT fill:#dbeafe,stroke:#2563eb,color:#1e3a5f
    style MOTOR fill:#e0f2fe,stroke:#0284c7,color:#1e3a5f
    style GUIDE fill:#fef3c7,stroke:#d97706,color:#78350f
    style POINT fill:#fef3c7,stroke:#d97706,color:#78350f
    style MESSAGE fill:#fae8ff,stroke:#a855f7,color:#581c87
    style ATTRIB fill:#fee2e2,stroke:#dc2626,color:#7f1d1d
    style REINFORCE fill:#fee2e2,stroke:#dc2626,color:#7f1d1d
    style PARALLEL fill:#f3f4f6,stroke:#6b7280,color:#374151
    style KEY fill:#f0fdf4,stroke:#22c55e,color:#14532d
    </pre>
  </div>
  <figcaption>
    <strong>Figure 2:</strong> The ideomotor effect -- the primary scientific explanation for facilitated communication. First described by William Benjamin Carpenter in 1852, the ideomotor effect occurs when thoughts produce involuntary, unconscious muscle movements. In FC, the facilitator's expectations about what the individual might communicate are transmitted through physical contact as subtle directional guidance. The facilitator genuinely perceives the resulting messages as originating from the individual. This is the same mechanism behind the Ouija board: blindfolded experiments consistently show that when visual feedback is removed, the planchette produces gibberish.
  </figcaption>
</figure>
