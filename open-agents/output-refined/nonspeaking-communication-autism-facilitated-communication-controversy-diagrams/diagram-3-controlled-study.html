<!-- Diagram: Controlled Study Design -- Message-Passing Test -->
<!-- Type: flowchart -->
<!-- Generated: 2026-03-31 -->
<!-- Description: Experimental design diagram showing the two conditions in FC authorship testing -- when facilitator knows the answer vs. when facilitator is blinded. Shows the consistent pattern across 50+ studies. -->

<figure class="concept-diagram" id="diagram-controlled-study">
  <div class="diagram-container">
    <pre class="mermaid">
flowchart TD
    TITLE["MESSAGE-PASSING TEST<br/>(Double-Blind Authorship Test)<br/>---<br/>Gold standard for testing<br/>who authors FC messages"]

    TITLE --> CONDA
    TITLE --> CONDB

    subgraph CONDA["CONDITION A: Facilitator KNOWS Answer"]
        A1["Individual shown<br/>stimulus X<br/>(e.g., picture of dog)"]
        A2["Facilitator ALSO<br/>shown stimulus X"]
        A3["FC session conducted"]
        A4["FC produces 'DOG'"]
        A5["Result: CORRECT"]
        A1 --> A3
        A2 --> A3
        A3 --> A4 --> A5
    end

    subgraph CONDB["CONDITION B: Facilitator BLINDED"]
        B1["Individual shown<br/>stimulus X<br/>(e.g., picture of dog)"]
        B2["Facilitator shown<br/>stimulus Y<br/>(e.g., picture of cat)<br/>OR shown nothing"]
        B3["FC session conducted"]
        B4["FC produces 'CAT'<br/>or random letters"]
        B5["Result: MATCHES<br/>FACILITATOR'S info<br/>or CHANCE"]
        B1 --> B3
        B2 --> B3
        B3 --> B4 --> B5
    end

    RESULT["CONSISTENT PATTERN ACROSS 50+ STUDIES:<br/>---<br/>Correct responses ONLY when facilitator<br/>has the information.<br/>Under blinding: 0% to ~1.8% correct<br/>(consistent with chance).<br/>---<br/>This pattern is what every major<br/>professional organization cites."]

    CONDA --> RESULT
    CONDB --> RESULT

    CRITIQUE["PROPONENT CRITIQUE:<br/>These conditions are artificial<br/>and anxiety-provoking. Test anxiety<br/>disrupts the communicator. The tests<br/>presume compliance that autistic<br/>individuals may not provide."]

    RESPONSE["CRITIC RESPONSE:<br/>If genuine authorship exists,<br/>SOME correct responses should<br/>appear under blinding. Zero is<br/>consistent only with facilitator<br/>authorship, not test anxiety."]

    RESULT --> CRITIQUE
    RESULT --> RESPONSE

    style CONDA fill:#dcfce7,stroke:#16a34a,color:#14532d
    style CONDB fill:#fee2e2,stroke:#dc2626,color:#7f1d1d
    style RESULT fill:#dbeafe,stroke:#2563eb,color:#1e3a5f
    style CRITIQUE fill:#fef3c7,stroke:#d97706,color:#78350f
    style RESPONSE fill:#f3f4f6,stroke:#6b7280,color:#374151
    style TITLE fill:#e0f2fe,stroke:#0284c7,color:#1e3a5f
    </pre>
  </div>
  <figcaption>
    <strong>Figure 3:</strong> The message-passing test (double-blind authorship test) -- the gold standard for testing FC authorship. In Condition A, when the facilitator knows the answer, FC produces correct responses. In Condition B, when the facilitator is blinded, correct responses drop to 0-1.8% (chance). This pattern has been replicated across more than 50 controlled studies. Proponents argue the test conditions are artificial and anxiety-provoking; critics respond that if genuine authorship existed, some correct responses would appear under blinding regardless of anxiety.
  </figcaption>
</figure>
