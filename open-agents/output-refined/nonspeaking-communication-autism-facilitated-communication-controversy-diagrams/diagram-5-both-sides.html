<figure class="concept-diagram" id="diagram-both-sides">
  <div class="diagram-container">
    <pre class="mermaid">
flowchart TD
    TITLE["THE FC DEBATE: BOTH SIDES"]
    TITLE --> SCI
    TITLE --> PRO

    subgraph SCI["SCIENTIFIC CONSENSUS POSITION"]
        S1["50+ controlled studies show<br/>facilitator control under blinding"]
        S2["5 independent systematic reviews<br/>(1995, 2001, 2010, 2014, 2018)<br/>all confirm facilitator authorship"]
        S3["~60 false abuse allegation cases<br/>with documented family harm"]
        S4["Every major professional<br/>organization opposes FC:<br/>ASHA, APA, AAP, AACAP,<br/>AAIDD, ABAI, ISAAC"]
        S5["Ideomotor effect provides<br/>parsimonious explanation:<br/>unconscious facilitator influence"]
        S6["Opposing FC is not opposing<br/>communication -- evidence-based<br/>AAC provides verified access"]
    end

    subgraph PRO["PROPONENT POSITION"]
        P1["Presuming competence principle:<br/>assume capability until<br/>demonstrated otherwise"]
        P2["Least dangerous assumption:<br/>better to presume competence<br/>and be wrong than to deny<br/>communication access"]
        P3["Ecological validity critique:<br/>message-passing tests are<br/>artificial, anxiety-provoking,<br/>hostile to autistic communication"]
        P4["Individual cases of apparent<br/>transition to independent typing<br/>(e.g., Ido Kedar)"]
        P5["Disability rights framing:<br/>dismissing FC constitutes<br/>'epistemic violence' against<br/>non-speaking people"]
        P6["Absence of evidence is not<br/>evidence of absence --<br/>researchers have not conducted<br/>appropriate studies"]
    end

    CENTER["CAN THESE PERSPECTIVES<br/>BE RECONCILED?<br/>---<br/>Currently, no.<br/>---<br/>The empirical evidence weighs<br/>heavily on the scientific<br/>consensus side. The ethical and<br/>rights-based arguments raised<br/>by proponents are not trivially<br/>dismissible, but they do not<br/>override the need for<br/>controlled evidence of<br/>authorship."]

    SCI --> CENTER
    PRO --> CENTER

    style TITLE fill:#e0f2fe,stroke:#0284c7,color:#1e3a5f
    </pre>
  </div>
  <figcaption>
    <strong>Figure 5:</strong> Both sides of the FC debate presented side by side. The scientific consensus position rests on 50+ controlled studies, five independent systematic reviews, documented false abuse allegations, and unanimous professional organization opposition. The proponent position invokes presuming competence, the least dangerous assumption, ecological validity critiques, individual cases of claimed independent typing, and disability rights framing. The empirical evidence weighs heavily on the scientific consensus side. The ethical arguments raised by proponents are not trivially dismissible, but they do not override the need for controlled evidence of authorship.
