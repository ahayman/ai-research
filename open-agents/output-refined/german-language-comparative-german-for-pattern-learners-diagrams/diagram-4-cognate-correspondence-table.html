<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cognate Correspondence Table -- The Decryption Keys</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --en: #3b82f6;
    --en-bg: #eff6ff;
    --de: #ef4444;
    --de-bg: #fef2f2;
    --shift: #f59e0b;
    --shift-bg: #fffbeb;
    --muted: #6c757d;
    --accent: #8b5cf6;
    --accent-bg: #f5f3ff;
    --green: #10b981;
    --green-bg: #ecfdf5;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --en: #60a5fa;
      --en-bg: #1e293b;
      --de: #f87171;
      --de-bg: #2a1515;
      --shift: #fbbf24;
      --shift-bg: #2a2510;
      --muted: #9a9ab0;
      --accent: #a78bfa;
      --accent-bg: #1e1535;
      --green: #34d399;
      --green-bg: #132e24;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure {
    max-width: 1100px;
    width: 100%;
    background: var(--surface);
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
  }
  h2 { text-align: center; font-size: 1.5rem; margin-bottom: 0.3rem; }
  .subtitle { text-align: center; font-size: 0.95rem; color: var(--muted); margin-bottom: 0.8rem; }

  .intro-box {
    background: var(--shift-bg);
    border: 2px solid var(--shift);
    border-radius: 12px;
    padding: 1rem 1.5rem;
    text-align: center;
    margin-bottom: 2rem;
    font-size: 0.92rem;
  }
  .intro-box strong { color: var(--shift); }

  .keys-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 1.2rem;
  }
  @media (max-width: 750px) {
    .keys-grid { grid-template-columns: 1fr; }
  }

  .key-card {
    border: 2px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }
  .key-header {
    padding: 0.7rem 1rem;
    font-weight: 700;
    font-size: 0.95rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    background: var(--accent-bg);
    border-bottom: 2px solid var(--border);
  }
  .key-num {
    background: var(--accent);
    color: #fff;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.8rem;
    font-weight: 800;
    flex-shrink: 0;
  }
  .key-rule {
    font-family: monospace;
    font-size: 1rem;
  }
  .key-rule .en-sound { color: var(--en); font-weight: 800; }
  .key-rule .de-sound { color: var(--de); font-weight: 800; }

  .key-body {
    padding: 0.6rem 0;
  }
  .pair-row {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    padding: 0.35rem 1rem;
    font-size: 0.85rem;
    border-bottom: 1px solid var(--border);
  }
  .pair-row:last-child { border-bottom: none; }
  .pair-en {
    text-align: right;
    padding-right: 0.5rem;
  }
  .pair-arrow {
    color: var(--shift);
    font-weight: 700;
    font-size: 0.9rem;
  }
  .pair-de {
    text-align: left;
    padding-left: 0.5rem;
  }
  .shifted {
    font-weight: 800;
    padding: 0 0.15rem;
    border-radius: 3px;
  }
  .shifted-en { color: var(--en); background: var(--en-bg); }
  .shifted-de { color: var(--de); background: var(--de-bg); }

  .latinate-section {
    margin-top: 1.5rem;
    border: 2px solid var(--green);
    border-radius: 12px;
    overflow: hidden;
  }
  .latinate-header {
    background: var(--green-bg);
    padding: 0.7rem 1rem;
    font-weight: 700;
    font-size: 0.95rem;
    color: var(--green);
    text-align: center;
  }
  .latinate-body {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 0;
  }
  @media (max-width: 600px) {
    .latinate-body { grid-template-columns: 1fr; }
  }
  .latinate-col {
    padding: 0.8rem 1rem;
  }
  .latinate-col:first-child {
    border-right: 1px solid var(--border);
  }
  @media (max-width: 600px) {
    .latinate-col:first-child { border-right: none; border-bottom: 1px solid var(--border); }
  }
  .latinate-col h4 {
    font-size: 0.85rem;
    color: var(--green);
    margin-bottom: 0.4rem;
  }
  .lat-pair {
    display: flex;
    justify-content: space-between;
    font-size: 0.82rem;
    padding: 0.2rem 0;
    border-bottom: 1px dotted var(--border);
  }
  .lat-pair:last-child { border-bottom: none; }

  .try-it {
    margin-top: 1.5rem;
    background: var(--shift-bg);
    border: 2px dashed var(--shift);
    border-radius: 12px;
    padding: 1.2rem 1.5rem;
  }
  .try-it h3 {
    font-size: 0.95rem;
    color: var(--shift);
    margin-bottom: 0.6rem;
    text-align: center;
  }
  .try-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0.5rem;
  }
  @media (max-width: 600px) {
    .try-grid { grid-template-columns: 1fr; }
  }
  .try-item {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.6rem 0.8rem;
    text-align: center;
  }
  .try-item .german { font-weight: 700; font-size: 1rem; margin-bottom: 0.2rem; }
  .try-item .hint { font-size: 0.75rem; color: var(--muted); }
  .try-item .answer {
    font-size: 0.78rem;
    color: var(--shift);
    margin-top: 0.3rem;
    cursor: pointer;
    user-select: none;
  }
  .try-item .answer-text {
    display: none;
    font-weight: 600;
  }
  .try-item:hover .answer-text,
  .try-item:focus-within .answer-text {
    display: inline;
  }

  figcaption {
    margin-top: 2rem;
    padding-top: 1rem;
    border-top: 1px solid var(--border);
    font-size: 0.82rem;
    color: var(--muted);
    text-align: center;
  }
  @media print {
    body { padding: 0; }
    figure { box-shadow: none; border: 1px solid #ccc; }
    .try-item .answer-text { display: inline !important; }
  }
</style>
</head>
<body>
<figure>
  <h2>Cognate Correspondence Table</h2>
  <p class="subtitle">The High German Consonant Shift as a vocabulary decryption engine</p>

  <div class="intro-box">
    <strong>The principle:</strong> The High German Consonant Shift (6th-8th century) systematically altered voiceless stops in German but not English. English preserves the older sounds. Reverse the shift to unlock thousands of German-English cognates.
  </div>

  <div class="keys-grid">
    <!-- Key 1: p → pf / f -->
    <div class="key-card">
      <div class="key-header">
        <span class="key-num">1</span>
        <span class="key-rule"><span class="en-sound">p</span> &rarr; <span class="de-sound">pf</span> / <span class="de-sound">f</span></span>
      </div>
      <div class="key-body">
        <div class="pair-row"><span class="pair-en"><span class="shifted shifted-en">p</span>e<span class="shifted shifted-en">pp</span>er</span><span class="pair-arrow">&rarr;</span><span class="pair-de"><span class="shifted shifted-de">Pf</span>e<span class="shifted shifted-de">ff</span>er</span></div>
        <div class="pair-row"><span class="pair-en">a<span class="shifted shifted-en">pp</span>le</span><span class="pair-arrow">&rarr;</span><span class="pair-de">A<span class="shifted shifted-de">pf</span>el</span></div>
        <div class="pair-row"><span class="pair-en"><span class="shifted shifted-en">p</span>ath</span><span class="pair-arrow">&rarr;</span><span class="pair-de"><span class="shifted shifted-de">Pf</span>ad</span></div>
        <div class="pair-row"><span class="pair-en"><span class="shifted shifted-en">p</span>ound</span><span class="pair-arrow">&rarr;</span><span class="pair-de"><span class="shifted shifted-de">Pf</span>und</span></div>
        <div class="pair-row"><span class="pair-en">o<span class="shifted shifted-en">p</span>en</span><span class="pair-arrow">&rarr;</span><span class="pair-de">o<span class="shifted shifted-de">ff</span>en</span></div>
        <div class="pair-row"><span class="pair-en">shi<span class="shifted shifted-en">p</span></span><span class="pair-arrow">&rarr;</span><span class="pair-de">Schi<span class="shifted shifted-de">ff</span></span></div>
      </div>
    </div>

    <!-- Key 2: t → z/tz / ss/ß -->
    <div class="key-card">
      <div class="key-header">
        <span class="key-num">2</span>
        <span class="key-rule"><span class="en-sound">t</span> &rarr; <span class="de-sound">z</span> / <span class="de-sound">tz</span> / <span class="de-sound">ss</span> / <span class="de-sound">ss</span></span>
      </div>
      <div class="key-body">
        <div class="pair-row"><span class="pair-en"><span class="shifted shifted-en">t</span>en</span><span class="pair-arrow">&rarr;</span><span class="pair-de"><span class="shifted shifted-de">z</span>ehn</span></div>
        <div class="pair-row"><span class="pair-en"><span class="shifted shifted-en">t</span>wo</span><span class="pair-arrow">&rarr;</span><span class="pair-de"><span class="shifted shifted-de">z</span>wei</span></div>
        <div class="pair-row"><span class="pair-en"><span class="shifted shifted-en">t</span>ongue</span><span class="pair-arrow">&rarr;</span><span class="pair-de"><span class="shifted shifted-de">Z</span>unge</span></div>
        <div class="pair-row"><span class="pair-en">ca<span class="shifted shifted-en">t</span></span><span class="pair-arrow">&rarr;</span><span class="pair-de">Ka<span class="shifted shifted-de">tz</span>e</span></div>
        <div class="pair-row"><span class="pair-en">wa<span class="shifted shifted-en">t</span>er</span><span class="pair-arrow">&rarr;</span><span class="pair-de">Wa<span class="shifted shifted-de">ss</span>er</span></div>
        <div class="pair-row"><span class="pair-en">whi<span class="shifted shifted-en">t</span>e</span><span class="pair-arrow">&rarr;</span><span class="pair-de">wei<span class="shifted shifted-de">ss</span></span></div>
      </div>
    </div>

    <!-- Key 3: d → t -->
    <div class="key-card">
      <div class="key-header">
        <span class="key-num">3</span>
        <span class="key-rule"><span class="en-sound">d</span> &rarr; <span class="de-sound">t</span></span>
      </div>
      <div class="key-body">
        <div class="pair-row"><span class="pair-en"><span class="shifted shifted-en">d</span>ay</span><span class="pair-arrow">&rarr;</span><span class="pair-de"><span class="shifted shifted-de">T</span>ag</span></div>
        <div class="pair-row"><span class="pair-en"><span class="shifted shifted-en">d</span>oor</span><span class="pair-arrow">&rarr;</span><span class="pair-de"><span class="shifted shifted-de">T</span>ur</span></div>
        <div class="pair-row"><span class="pair-en"><span class="shifted shifted-en">d</span>ance</span><span class="pair-arrow">&rarr;</span><span class="pair-de"><span class="shifted shifted-de">T</span>anz</span></div>
        <div class="pair-row"><span class="pair-en"><span class="shifted shifted-en">d</span>aughter</span><span class="pair-arrow">&rarr;</span><span class="pair-de"><span class="shifted shifted-de">T</span>ochter</span></div>
        <div class="pair-row"><span class="pair-en"><span class="shifted shifted-en">d</span>rink</span><span class="pair-arrow">&rarr;</span><span class="pair-de"><span class="shifted shifted-de">t</span>rinken</span></div>
        <div class="pair-row"><span class="pair-en"><span class="shifted shifted-en">d</span>ead</span><span class="pair-arrow">&rarr;</span><span class="pair-de"><span class="shifted shifted-de">t</span>ot</span></div>
      </div>
    </div>

    <!-- Key 4: th → d -->
    <div class="key-card">
      <div class="key-header">
        <span class="key-num">4</span>
        <span class="key-rule"><span class="en-sound">th</span> &rarr; <span class="de-sound">d</span></span>
      </div>
      <div class="key-body">
        <div class="pair-row"><span class="pair-en"><span class="shifted shifted-en">th</span>e</span><span class="pair-arrow">&rarr;</span><span class="pair-de"><span class="shifted shifted-de">d</span>er / <span class="shifted shifted-de">d</span>ie / <span class="shifted shifted-de">d</span>as</span></div>
        <div class="pair-row"><span class="pair-en"><span class="shifted shifted-en">th</span>ink</span><span class="pair-arrow">&rarr;</span><span class="pair-de"><span class="shifted shifted-de">d</span>enken</span></div>
        <div class="pair-row"><span class="pair-en"><span class="shifted shifted-en">th</span>ank</span><span class="pair-arrow">&rarr;</span><span class="pair-de"><span class="shifted shifted-de">d</span>anken</span></div>
        <div class="pair-row"><span class="pair-en"><span class="shifted shifted-en">th</span>ick</span><span class="pair-arrow">&rarr;</span><span class="pair-de"><span class="shifted shifted-de">d</span>ick</span></div>
        <div class="pair-row"><span class="pair-en"><span class="shifted shifted-en">th</span>ree</span><span class="pair-arrow">&rarr;</span><span class="pair-de"><span class="shifted shifted-de">d</span>rei</span></div>
        <div class="pair-row"><span class="pair-en"><span class="shifted shifted-en">th</span>under</span><span class="pair-arrow">&rarr;</span><span class="pair-de"><span class="shifted shifted-de">D</span>onner</span></div>
      </div>
    </div>
  </div>

  <!-- Latinate Borrowings -->
  <div class="latinate-section">
    <div class="latinate-header">Bonus: Latinate Borrowings -- Shared Directly</div>
    <div class="latinate-body">
      <div class="latinate-col">
        <h4>English -tion = German -tion</h4>
        <div class="lat-pair"><span>nation</span><span>Nation</span></div>
        <div class="lat-pair"><span>information</span><span>Information</span></div>
        <div class="lat-pair"><span>situation</span><span>Situation</span></div>
        <div class="lat-pair"><span>revolution</span><span>Revolution</span></div>
        <div class="lat-pair"><span>tradition</span><span>Tradition</span></div>
      </div>
      <div class="latinate-col">
        <h4>English -ty = German -tat</h4>
        <div class="lat-pair"><span>university</span><span>Universitat</span></div>
        <div class="lat-pair"><span>quality</span><span>Qualitat</span></div>
        <div class="lat-pair"><span>reality</span><span>Realitat</span></div>
        <div class="lat-pair"><span>electricity</span><span>Elektrizitat</span></div>
        <div class="lat-pair"><span>identity</span><span>Identitat</span></div>
      </div>
    </div>
  </div>

  <!-- Try It Yourself -->
  <div class="try-it">
    <h3>Try It Yourself -- Reverse the Shift</h3>
    <div class="try-grid">
      <div class="try-item" tabindex="0">
        <div class="german">Zahn</div>
        <div class="hint">Key 2: z &larr; t</div>
        <div class="answer">Hover to reveal: <span class="answer-text">tooth (Zahn = tooth)</span></div>
      </div>
      <div class="try-item" tabindex="0">
        <div class="german">Pflaume</div>
        <div class="hint">Key 1: pf &larr; p</div>
        <div class="answer">Hover to reveal: <span class="answer-text">plum (Pflaume = plum)</span></div>
      </div>
      <div class="try-item" tabindex="0">
        <div class="german">Dorn</div>
        <div class="hint">Key 4: d &larr; th</div>
        <div class="answer">Hover to reveal: <span class="answer-text">thorn (Dorn = thorn)</span></div>
      </div>
      <div class="try-item" tabindex="0">
        <div class="german">tief</div>
        <div class="hint">Key 3: t &larr; d</div>
        <div class="answer">Hover to reveal: <span class="answer-text">deep (tief = deep)</span></div>
      </div>
      <div class="try-item" tabindex="0">
        <div class="german">Pfennig</div>
        <div class="hint">Key 1: pf &larr; p</div>
        <div class="answer">Hover to reveal: <span class="answer-text">penny (Pfennig = penny)</span></div>
      </div>
      <div class="try-item" tabindex="0">
        <div class="german">sitzen</div>
        <div class="hint">Key 2: tz &larr; t</div>
        <div class="answer">Hover to reveal: <span class="answer-text">sit (sitzen = to sit)</span></div>
      </div>
    </div>
  </div>

  <figcaption>
    <strong>German for Pattern Learners (CAPSTONE) -- Diagram 4 of 6.</strong> The High German Consonant Shift (Zweite Lautverschiebung, 6th-8th century) created systematic sound correspondences between English and German. These four "decryption keys" unlock thousands of cognate pairs. English preserved the older Germanic consonants; German shifted them. Color coding: <span style="color:var(--en);font-weight:700;">blue = English sounds</span>, <span style="color:var(--de);font-weight:700;">red = German shifted sounds</span>, <span style="color:var(--shift);font-weight:700;">amber = shift direction</span>.
  </figcaption>
</figure>
</body>
</html>
