<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>把 and 被: Mirror Constructions</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --accent: #2563eb; --ba: #e67e22; --ba-bg: #fef3e2;
    --bei: #8b5cf6; --bei-bg: #ede9fe;
    --agent: #2563eb; --patient: #ef4444; --verb: #059669; --marker: #d97706;
    --muted: #6c757d; --caption-bg: #f8f9fa; --english: #6366f1;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a; --fg: #e8e8f0; --surface: #1a1a2e; --border: #2d2d44;
      --accent: #6b8aff; --ba: #f59e0b; --ba-bg: #4a3520;
      --bei: #a78bfa; --bei-bg: #2e2050;
      --agent: #6b8aff; --patient: #f87171; --verb: #34d399; --marker: #fbbf24;
      --muted: #9a9ab0; --caption-bg: #1a1a2e; --english: #818cf8;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg); color: var(--fg);
    display: flex; justify-content: center; padding: 2rem 1rem; line-height: 1.6;
  }
  figure { max-width: 1000px; width: 100%; }
  .diagram-container {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 2rem 1.5rem; overflow-x: auto;
  }
  .mirror-title {
    text-align: center; font-size: 1.1rem; font-weight: 700;
    color: var(--accent); margin-bottom: 1.5rem;
  }
  .mirror-pair {
    display: grid; grid-template-columns: 1fr auto 1fr; gap: 1rem;
    align-items: stretch; margin-bottom: 1.5rem;
  }
  .construct-panel {
    border-radius: 8px; padding: 1.2rem; border: 2px solid;
  }
  .ba-panel { background: var(--ba-bg); border-color: var(--ba); }
  .bei-panel { background: var(--bei-bg); border-color: var(--bei); }
  .panel-header {
    font-size: 1.3rem; font-weight: 700; margin-bottom: 0.2rem;
  }
  .ba-panel .panel-header { color: var(--ba); }
  .bei-panel .panel-header { color: var(--bei); }
  .panel-subtitle { font-size: 0.82rem; color: var(--muted); margin-bottom: 0.8rem; }
  .formula {
    display: flex; gap: 4px; flex-wrap: wrap; align-items: center;
    margin-bottom: 0.8rem; padding: 0.5rem; background: var(--bg);
    border-radius: 5px; border: 1px solid var(--border);
  }
  .f-block {
    padding: 0.3rem 0.5rem; border-radius: 3px; font-size: 0.82rem;
    font-weight: 600; text-align: center;
  }
  .f-agent { background: color-mix(in srgb, var(--agent) 15%, var(--bg)); color: var(--agent); border: 1px solid var(--agent); }
  .f-patient { background: color-mix(in srgb, var(--patient) 15%, var(--bg)); color: var(--patient); border: 1px solid var(--patient); }
  .f-verb { background: color-mix(in srgb, var(--verb) 15%, var(--bg)); color: var(--verb); border: 1px solid var(--verb); }
  .f-marker { background: color-mix(in srgb, var(--marker) 15%, var(--bg)); color: var(--marker); border: 1px solid var(--marker); }
  .f-arrow { font-size: 1rem; color: var(--muted); }
  .example-set { margin-bottom: 0.6rem; }
  .ex-zh { font-size: 1.1rem; font-weight: 600; }
  .ex-py { font-size: 0.78rem; color: var(--muted); font-style: italic; }
  .ex-gl { font-size: 0.82rem; margin-top: 0.2rem; }
  .ex-en { font-size: 0.82rem; color: var(--english); font-style: italic; margin-top: 0.2rem; }
  .mirror-axis {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 0.5rem;
  }
  .mirror-line {
    width: 3px; flex: 1; background: linear-gradient(to bottom, var(--ba), var(--bei));
    border-radius: 2px;
  }
  .mirror-label {
    writing-mode: vertical-rl; text-orientation: mixed;
    font-size: 0.75rem; font-weight: 700; color: var(--accent);
    letter-spacing: 0.1em; text-transform: uppercase;
  }
  .requirements {
    display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;
    margin-top: 1rem;
  }
  .req-box {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 6px; padding: 0.8rem 1rem;
  }
  .req-box h4 { font-size: 0.85rem; margin-bottom: 0.3rem; }
  .req-list { font-size: 0.82rem; margin-left: 1rem; }
  .req-list li { margin-bottom: 0.2rem; }
  .shared-tag {
    display: inline-block; background: var(--accent); color: white;
    font-size: 0.7rem; padding: 0.1rem 0.4rem; border-radius: 3px;
    font-weight: 600; margin-left: 0.3rem;
  }
  .swap-diagram {
    margin-top: 1.5rem; padding: 1rem;
    background: var(--bg); border: 2px dashed var(--accent);
    border-radius: 8px; text-align: center;
  }
  .swap-row {
    display: flex; justify-content: center; align-items: center; gap: 0.5rem;
    margin: 0.4rem 0; font-size: 0.9rem;
  }
  .swap-block {
    padding: 0.3rem 0.6rem; border-radius: 4px; font-weight: 600;
  }
  .swap-arrow { font-size: 1.2rem; color: var(--muted); }
  figcaption {
    text-align: center; margin-top: 1.5rem; padding: 1rem 1.5rem;
    background: var(--caption-bg); border-radius: 8px; border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
</style>
</head>
<body>
<figure>
  <div class="diagram-container">
    <div class="mirror-title">把 (Ba) and 被 (Bei): Two Views of the Same Event</div>

    <div class="mirror-pair">
      <!-- Ba panel -->
      <div class="construct-panel ba-panel">
        <div class="panel-header">把 (ba) -- Active Disposal</div>
        <div class="panel-subtitle">"I do something TO the object"</div>
        <div class="formula">
          <span class="f-block f-agent">Agent</span>
          <span class="f-arrow">+</span>
          <span class="f-block f-marker">把</span>
          <span class="f-arrow">+</span>
          <span class="f-block f-patient">Patient</span>
          <span class="f-arrow">+</span>
          <span class="f-block f-verb">V + Complement</span>
        </div>
        <div class="example-set">
          <div class="ex-zh">他 把 窗户 打开 了</div>
          <div class="ex-py">ta ba chuanghu dakai le</div>
          <div class="ex-gl"><span class="f-block f-agent" style="font-size:0.75rem;padding:0.15rem 0.3rem;">He</span> 把 <span class="f-block f-patient" style="font-size:0.75rem;padding:0.15rem 0.3rem;">window</span> <span class="f-block f-verb" style="font-size:0.75rem;padding:0.15rem 0.3rem;">hit-open LE</span></div>
          <div class="ex-en">"He opened the window" (emphasis: his action affected it)</div>
        </div>
        <div class="example-set">
          <div class="ex-zh">我 把 作业 做完 了</div>
          <div class="ex-py">wo ba zuoye zuowan le</div>
          <div class="ex-en">"I finished the homework" (I disposed of it by completing it)</div>
        </div>
      </div>

      <!-- Mirror axis -->
      <div class="mirror-axis">
        <div class="mirror-line"></div>
        <div class="mirror-label">MIRROR</div>
        <div class="mirror-line"></div>
      </div>

      <!-- Bei panel -->
      <div class="construct-panel bei-panel">
        <div class="panel-header">被 (bei) -- Passive Experience</div>
        <div class="panel-subtitle">"Something happened TO me"</div>
        <div class="formula">
          <span class="f-block f-patient">Patient</span>
          <span class="f-arrow">+</span>
          <span class="f-block f-marker">被</span>
          <span class="f-arrow">+</span>
          <span class="f-block f-agent">(Agent)</span>
          <span class="f-arrow">+</span>
          <span class="f-block f-verb">V + Complement</span>
        </div>
        <div class="example-set">
          <div class="ex-zh">窗户 被 他 打开 了</div>
          <div class="ex-py">chuanghu bei ta dakai le</div>
          <div class="ex-gl"><span class="f-block f-patient" style="font-size:0.75rem;padding:0.15rem 0.3rem;">Window</span> 被 <span class="f-block f-agent" style="font-size:0.75rem;padding:0.15rem 0.3rem;">him</span> <span class="f-block f-verb" style="font-size:0.75rem;padding:0.15rem 0.3rem;">hit-open LE</span></div>
          <div class="ex-en">"The window was opened by him" (emphasis: window was affected)</div>
        </div>
        <div class="example-set">
          <div class="ex-zh">我的钱包 被 偷 了</div>
          <div class="ex-py">wo de qianbao bei tou le</div>
          <div class="ex-en">"My wallet was stolen" (agent omitted -- adversity sense)</div>
        </div>
      </div>
    </div>

    <!-- Position swap visualization -->
    <div class="swap-diagram">
      <div style="font-weight:700; color:var(--accent); margin-bottom:0.5rem; font-size:0.9rem;">The Structural Mirror: Agent and Patient Swap Positions</div>
      <div class="swap-row">
        <span class="swap-block f-agent">他 (He)</span>
        <span style="font-size:0.8rem;">把</span>
        <span class="swap-block f-patient">杯子 (Cup)</span>
        <span class="swap-block f-verb">打破了</span>
        <span style="font-size:0.75rem; color:var(--ba); font-weight:600;">把 construction</span>
      </div>
      <div class="swap-row">
        <span class="swap-arrow">&#x21C5;</span>
        <span style="font-size:0.78rem; color:var(--muted);">positions swap</span>
        <span class="swap-arrow">&#x21C5;</span>
      </div>
      <div class="swap-row">
        <span class="swap-block f-patient">杯子 (Cup)</span>
        <span style="font-size:0.8rem;">被</span>
        <span class="swap-block f-agent">他 (Him)</span>
        <span class="swap-block f-verb">打破了</span>
        <span style="font-size:0.75rem; color:var(--bei); font-weight:600;">被 construction</span>
      </div>
    </div>

    <!-- Shared requirements -->
    <div class="requirements">
      <div class="req-box">
        <h4 style="color:var(--ba);">把 Requirements</h4>
        <ul class="req-list">
          <li>Object must be <b>definite/specific</b> <span class="shared-tag">SHARED</span></li>
          <li>Verb must have a <b>complement/result</b> <span class="shared-tag">SHARED</span></li>
          <li>Agent REQUIRED (who acts)</li>
          <li>Emphasizes <b>disposal</b> -- what happens to the object</li>
        </ul>
      </div>
      <div class="req-box">
        <h4 style="color:var(--bei);">被 Requirements</h4>
        <ul class="req-list">
          <li>Object must be <b>definite/specific</b> <span class="shared-tag">SHARED</span></li>
          <li>Verb must have a <b>complement/result</b> <span class="shared-tag">SHARED</span></li>
          <li>Agent OPTIONAL (can be unknown)</li>
          <li>Historically implies <b>adversity</b> -- bad things happening</li>
        </ul>
      </div>
    </div>
  </div>

  <figcaption>
    <h2>把 and 被: Mirror Constructions for Active Disposal vs. Passive Experience</h2>
    <p>把 says "the agent does something to the object." 被 says "the object has something done to it." Same event, same verb, same complement requirement -- but Agent and Patient swap sentence positions. English has active/passive; Chinese adds the 把 "disposal" dimension.</p>
  </figcaption>
</figure>
</body>
</html>
