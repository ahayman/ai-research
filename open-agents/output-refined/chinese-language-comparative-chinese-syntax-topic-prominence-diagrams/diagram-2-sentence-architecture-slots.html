<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chinese Sentence Architecture: Position Slots</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --accent: #2563eb; --accent-light: #dbeafe;
    --slot-topic: #e67e22; --slot-time: #8b5cf6; --slot-subj: #2563eb;
    --slot-neg: #ef4444; --slot-prep: #ec4899; --slot-verb: #059669;
    --slot-comp: #d97706; --slot-obj: #0891b2; --slot-part: #6366f1;
    --muted: #6c757d; --caption-bg: #f8f9fa; --label: #374151;
    --english: #6366f1; --chinese: #e67e22;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a; --fg: #e8e8f0; --surface: #1a1a2e; --border: #2d2d44;
      --accent: #6b8aff; --accent-light: #1e2a4a;
      --slot-topic: #f59e0b; --slot-time: #a78bfa; --slot-subj: #6b8aff;
      --slot-neg: #f87171; --slot-prep: #f472b6; --slot-verb: #34d399;
      --slot-comp: #fbbf24; --slot-obj: #22d3ee; --slot-part: #818cf8;
      --muted: #9a9ab0; --caption-bg: #1a1a2e; --label: #c8c8d8;
      --english: #818cf8; --chinese: #f59e0b;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg); color: var(--fg);
    display: flex; justify-content: center; padding: 2rem 1rem; line-height: 1.6;
  }
  figure { max-width: 1100px; width: 100%; }
  .diagram-container {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 2rem 1.5rem; overflow-x: auto;
  }
  .section-title {
    font-size: 1rem; font-weight: 700; margin: 1.5rem 0 0.75rem;
    padding-left: 0.5rem; border-left: 3px solid var(--accent);
  }
  .section-title:first-child { margin-top: 0; }
  /* Slot template */
  .slot-template {
    display: flex; gap: 2px; flex-wrap: wrap; margin-bottom: 1rem;
    padding: 0.5rem; background: var(--bg); border-radius: 6px; border: 1px solid var(--border);
  }
  .slot {
    padding: 0.4rem 0.6rem; border-radius: 4px; font-size: 0.78rem;
    font-weight: 600; text-align: center; min-width: 70px; line-height: 1.3;
    border: 2px solid transparent;
  }
  .slot-optional { border-style: dashed; opacity: 0.85; }
  .s-topic { background: color-mix(in srgb, var(--slot-topic) 15%, var(--bg)); color: var(--slot-topic); border-color: var(--slot-topic); }
  .s-time { background: color-mix(in srgb, var(--slot-time) 15%, var(--bg)); color: var(--slot-time); border-color: var(--slot-time); }
  .s-subj { background: color-mix(in srgb, var(--slot-subj) 15%, var(--bg)); color: var(--slot-subj); border-color: var(--slot-subj); }
  .s-neg { background: color-mix(in srgb, var(--slot-neg) 15%, var(--bg)); color: var(--slot-neg); border-color: var(--slot-neg); }
  .s-prep { background: color-mix(in srgb, var(--slot-prep) 15%, var(--bg)); color: var(--slot-prep); border-color: var(--slot-prep); }
  .s-verb { background: color-mix(in srgb, var(--slot-verb) 15%, var(--bg)); color: var(--slot-verb); border-color: var(--slot-verb); }
  .s-comp { background: color-mix(in srgb, var(--slot-comp) 15%, var(--bg)); color: var(--slot-comp); border-color: var(--slot-comp); }
  .s-obj { background: color-mix(in srgb, var(--slot-obj) 15%, var(--bg)); color: var(--slot-obj); border-color: var(--slot-obj); }
  .s-part { background: color-mix(in srgb, var(--slot-part) 15%, var(--bg)); color: var(--slot-part); border-color: var(--slot-part); }
  /* Example sentences */
  .example-grid {
    display: grid; grid-template-columns: auto 1fr; gap: 0.5rem 1rem;
    margin-bottom: 1.25rem; font-size: 0.85rem;
  }
  .ex-label {
    font-weight: 700; font-size: 0.78rem; color: var(--muted);
    white-space: nowrap; padding-top: 0.3rem;
  }
  .ex-sentence {
    display: flex; gap: 2px; flex-wrap: wrap; align-items: center;
    padding: 0.3rem 0;
  }
  .ex-word {
    padding: 0.25rem 0.45rem; border-radius: 3px; font-size: 0.82rem;
    line-height: 1.4; text-align: center;
  }
  .ex-word .zh { display: block; font-weight: 600; font-size: 0.95rem; }
  .ex-word .py { display: block; font-size: 0.7rem; color: var(--muted); }
  .ex-word .gl { display: block; font-size: 0.7rem; }
  .ex-arrow { font-size: 1rem; color: var(--muted); padding: 0 0.3rem; }
  .ex-english {
    font-style: italic; color: var(--english); padding: 0.3rem 0.5rem;
    background: color-mix(in srgb, var(--english) 8%, var(--bg));
    border-radius: 4px; font-size: 0.82rem;
  }
  .movement-note {
    display: inline-block; font-size: 0.75rem; color: var(--slot-neg);
    font-weight: 600; margin-left: 0.5rem;
  }
  .key-diff {
    background: color-mix(in srgb, var(--chinese) 10%, var(--bg));
    border: 1px solid var(--chinese);
    border-radius: 6px; padding: 0.75rem 1rem; margin-top: 1rem;
    font-size: 0.85rem;
  }
  .key-diff h4 { color: var(--chinese); font-size: 0.9rem; margin-bottom: 0.3rem; }
  .key-diff ul { margin-left: 1.2rem; }
  .key-diff li { margin-bottom: 0.2rem; }
  figcaption {
    text-align: center; margin-top: 1.5rem; padding: 1rem 1.5rem;
    background: var(--caption-bg); border-radius: 8px; border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  .legend {
    display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap;
    margin-top: 1rem; font-size: 0.78rem; color: var(--muted);
  }
  .legend-item { display: flex; align-items: center; gap: 0.3rem; }
  .legend-swatch { width: 12px; height: 12px; border-radius: 2px; }
</style>
</head>
<body>
<figure>
  <div class="diagram-container">
    <div class="section-title" style="margin-top:0;">Chinese Sentence Template</div>
    <div class="slot-template">
      <div class="slot slot-optional s-topic">(Topic)</div>
      <div class="slot slot-optional s-time">(Time)</div>
      <div class="slot slot-optional s-subj">(Subject)</div>
      <div class="slot slot-optional s-neg">(Neg/Adv)</div>
      <div class="slot slot-optional s-prep">(Prep Phrase)</div>
      <div class="slot s-verb">VERB</div>
      <div class="slot slot-optional s-comp">(Complement)</div>
      <div class="slot slot-optional s-obj">(Object)</div>
      <div class="slot slot-optional s-part">(Particle)</div>
    </div>

    <div class="section-title">English Sentence Template</div>
    <div class="slot-template">
      <div class="slot slot-optional s-subj">Subject</div>
      <div class="slot slot-optional s-neg">(Aux/Neg)</div>
      <div class="slot slot-optional s-prep">(Adverb)</div>
      <div class="slot s-verb">VERB</div>
      <div class="slot slot-optional s-obj">(Object)</div>
      <div class="slot slot-optional s-prep">(Prep Phrase)</div>
      <div class="slot slot-optional s-time">(Time)</div>
    </div>

    <div class="section-title">Example 1: Time and Place Move Pre-Verbal</div>
    <div class="example-grid">
      <div class="ex-label">Chinese:</div>
      <div class="ex-sentence">
        <div class="ex-word s-subj"><span class="zh">我</span><span class="py">wo</span><span class="gl">I</span></div>
        <div class="ex-word s-time"><span class="zh">昨天</span><span class="py">zuotian</span><span class="gl">yesterday</span></div>
        <div class="ex-word s-prep"><span class="zh">在家</span><span class="py">zai jia</span><span class="gl">at-home</span></div>
        <div class="ex-word s-verb"><span class="zh">吃</span><span class="py">chi</span><span class="gl">eat</span></div>
        <div class="ex-word s-comp"><span class="zh">了</span><span class="py">le</span><span class="gl">PERF</span></div>
        <div class="ex-word s-obj"><span class="zh">饭</span><span class="py">fan</span><span class="gl">food</span></div>
      </div>
      <div class="ex-label">English:</div>
      <div class="ex-sentence">
        <div class="ex-english">"I ate food at home yesterday"</div>
        <span class="movement-note">Time and Place shift to END in English</span>
      </div>
    </div>

    <div class="section-title">Example 2: Topic-Comment (Topic != Subject)</div>
    <div class="example-grid">
      <div class="ex-label">Chinese:</div>
      <div class="ex-sentence">
        <div class="ex-word s-topic"><span class="zh">这本书</span><span class="py">zhe ben shu</span><span class="gl">this book</span></div>
        <div class="ex-word s-subj"><span class="zh">我</span><span class="py">wo</span><span class="gl">I</span></div>
        <div class="ex-word s-neg"><span class="zh">已经</span><span class="py">yijing</span><span class="gl">already</span></div>
        <div class="ex-word s-verb"><span class="zh">看</span><span class="py">kan</span><span class="gl">read</span></div>
        <div class="ex-word s-part"><span class="zh">了</span><span class="py">le</span><span class="gl">LE</span></div>
      </div>
      <div class="ex-label">English:</div>
      <div class="ex-sentence">
        <div class="ex-english">"I have already read this book"</div>
        <span class="movement-note">No topic slot -- object stays after verb</span>
      </div>
    </div>

    <div class="section-title">Example 3: Ba Construction (Object Moves Pre-Verbal)</div>
    <div class="example-grid">
      <div class="ex-label">Chinese:</div>
      <div class="ex-sentence">
        <div class="ex-word s-subj"><span class="zh">我</span><span class="py">wo</span><span class="gl">I</span></div>
        <div class="ex-word s-prep"><span class="zh">把书</span><span class="py">ba shu</span><span class="gl">BA book</span></div>
        <div class="ex-word s-verb"><span class="zh">放</span><span class="py">fang</span><span class="gl">place</span></div>
        <div class="ex-word s-comp"><span class="zh">在桌子上</span><span class="py">zai zhuozi shang</span><span class="gl">on-table</span></div>
        <div class="ex-word s-part"><span class="zh">了</span><span class="py">le</span><span class="gl">LE</span></div>
      </div>
      <div class="ex-label">English:</div>
      <div class="ex-sentence">
        <div class="ex-english">"I put the book on the table"</div>
        <span class="movement-note">No way to front the object in English</span>
      </div>
    </div>

    <div class="section-title">Example 4: Pro-Drop (No Subject Needed)</div>
    <div class="example-grid">
      <div class="ex-label">Chinese:</div>
      <div class="ex-sentence">
        <div class="ex-word s-verb"><span class="zh">下雨</span><span class="py">xia yu</span><span class="gl">fall-rain</span></div>
        <div class="ex-word s-part"><span class="zh">了</span><span class="py">le</span><span class="gl">LE</span></div>
      </div>
      <div class="ex-label">English:</div>
      <div class="ex-sentence">
        <div class="ex-english">"It is raining"</div>
        <span class="movement-note">Dummy "it" REQUIRED in English</span>
      </div>
    </div>

    <div class="key-diff">
      <h4>The Pattern: Chinese Pre-Loads Context, English Post-Loads It</h4>
      <ul>
        <li><b>Time/Place</b>: Chinese puts them BEFORE the verb (setting the scene first); English puts them AFTER (appendix)</li>
        <li><b>Topic</b>: Chinese has a dedicated sentence-initial slot; English has no topic slot at all</li>
        <li><b>Subject</b>: Required in English (even dummy "it"); droppable in Chinese when context is clear</li>
        <li><b>Modifiers precede what they modify</b> in Chinese -- this is the unifying principle</li>
      </ul>
    </div>

    <div class="legend">
      <div class="legend-item"><div class="legend-swatch" style="background:var(--slot-topic);"></div> Topic</div>
      <div class="legend-item"><div class="legend-swatch" style="background:var(--slot-time);"></div> Time</div>
      <div class="legend-item"><div class="legend-swatch" style="background:var(--slot-subj);"></div> Subject</div>
      <div class="legend-item"><div class="legend-swatch" style="background:var(--slot-neg);"></div> Neg/Adv</div>
      <div class="legend-item"><div class="legend-swatch" style="background:var(--slot-prep);"></div> Prep/PP</div>
      <div class="legend-item"><div class="legend-swatch" style="background:var(--slot-verb);"></div> Verb</div>
      <div class="legend-item"><div class="legend-swatch" style="background:var(--slot-comp);"></div> Complement</div>
      <div class="legend-item"><div class="legend-swatch" style="background:var(--slot-obj);"></div> Object</div>
      <div class="legend-item"><div class="legend-swatch" style="background:var(--slot-part);"></div> Particle</div>
    </div>
  </div>

  <figcaption>
    <h2>Chinese Sentence Architecture: Position Slots vs. English</h2>
    <p>Chinese slots run Topic-Time-Subject-Adverb-Prep-Verb-Complement-Object-Particle. The consistent rule: <b>context before action, modifier before modified</b>. English scatters context to the end of the sentence.</p>
  </figcaption>
</figure>
</body>
</html>
