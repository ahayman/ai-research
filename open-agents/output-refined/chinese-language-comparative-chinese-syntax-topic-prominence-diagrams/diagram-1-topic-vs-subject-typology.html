<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Topic-Prominent vs. Subject-Prominent: Li &amp; Thompson's Typology</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --accent: #2563eb;
    --accent-light: #dbeafe;
    --chinese: #e67e22;
    --chinese-bg: #fef3e2;
    --english: #6366f1;
    --english-bg: #e8e8ff;
    --both: #22c55e;
    --both-bg: #dcfce7;
    --neither: #9ca3af;
    --neither-bg: #f3f4f6;
    --muted: #6c757d;
    --caption-bg: #f8f9fa;
    --label: #374151;
    --highlight: #fbbf24;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --accent: #6b8aff;
      --accent-light: #1e2a4a;
      --chinese: #f59e0b;
      --chinese-bg: #4a3520;
      --english: #818cf8;
      --english-bg: #2e2e5a;
      --both: #4ade80;
      --both-bg: #14532d;
      --neither: #6b7280;
      --neither-bg: #1f2937;
      --muted: #9a9ab0;
      --caption-bg: #1a1a2e;
      --label: #c8c8d8;
      --highlight: #fbbf24;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure { max-width: 1100px; width: 100%; }
  .diagram-container {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 2rem 1.5rem;
    overflow-x: auto;
  }
  .grid-title {
    text-align: center;
    font-size: 1.15rem;
    font-weight: 700;
    margin-bottom: 1.5rem;
    color: var(--accent);
  }
  .typology-grid {
    display: grid;
    grid-template-columns: 120px 1fr 1fr;
    grid-template-rows: auto auto auto;
    gap: 0;
    margin: 0 auto;
    max-width: 900px;
    border: 2px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  .grid-corner {
    background: var(--surface);
    border-bottom: 2px solid var(--border);
    border-right: 2px solid var(--border);
    padding: 0.75rem;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.75rem;
    color: var(--muted);
    font-style: italic;
  }
  .grid-col-header {
    text-align: center;
    padding: 0.75rem;
    font-weight: 700;
    font-size: 0.95rem;
    border-bottom: 2px solid var(--border);
  }
  .grid-col-header:first-of-type { border-right: 1px solid var(--border); }
  .col-topic-yes { background: var(--chinese-bg); color: var(--chinese); }
  .col-topic-no { background: var(--english-bg); color: var(--english); }
  .grid-row-header {
    padding: 0.75rem;
    font-weight: 700;
    font-size: 0.9rem;
    border-right: 2px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    line-height: 1.3;
  }
  .row-subj-yes { background: var(--english-bg); color: var(--english); }
  .row-subj-no { background: var(--chinese-bg); color: var(--chinese); }
  .cell {
    padding: 1rem;
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
  }
  .cell:nth-child(even) { border-right: none; }
  .cell-highlight {
    border: 3px solid var(--highlight) !important;
    border-radius: 2px;
  }
  .cell-label {
    font-weight: 700;
    font-size: 0.9rem;
    margin-bottom: 0.4rem;
  }
  .cell-langs {
    font-size: 0.85rem;
    color: var(--muted);
    margin-bottom: 0.5rem;
  }
  .cell-example {
    font-size: 0.82rem;
    background: var(--bg);
    padding: 0.5rem 0.7rem;
    border-radius: 5px;
    border: 1px solid var(--border);
    line-height: 1.5;
  }
  .cell-example .zh { font-size: 1rem; font-weight: 600; }
  .cell-example .pinyin { color: var(--muted); font-style: italic; }
  .cell-example .en { color: var(--english); font-weight: 500; }
  .cell-example .gloss { color: var(--muted); font-size: 0.78rem; }
  .contrast-box {
    margin-top: 1.5rem;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 0.75rem;
    align-items: start;
    max-width: 900px;
    margin-left: auto;
    margin-right: auto;
  }
  .contrast-panel {
    padding: 1rem;
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  .contrast-panel h4 {
    font-size: 0.9rem;
    margin-bottom: 0.5rem;
  }
  .zh-panel { background: var(--chinese-bg); }
  .zh-panel h4 { color: var(--chinese); }
  .en-panel { background: var(--english-bg); }
  .en-panel h4 { color: var(--english); }
  .contrast-arrow {
    display: flex;
    align-items: center;
    font-size: 1.5rem;
    color: var(--muted);
    padding-top: 1.5rem;
  }
  .sent-row { margin-bottom: 0.6rem; font-size: 0.85rem; line-height: 1.5; }
  .topic-tag {
    display: inline-block;
    background: var(--chinese);
    color: white;
    font-size: 0.7rem;
    padding: 0.1rem 0.4rem;
    border-radius: 3px;
    font-weight: 600;
    vertical-align: middle;
  }
  .subj-tag {
    display: inline-block;
    background: var(--english);
    color: white;
    font-size: 0.7rem;
    padding: 0.1rem 0.4rem;
    border-radius: 3px;
    font-weight: 600;
    vertical-align: middle;
  }
  .dummy-tag {
    display: inline-block;
    background: var(--neither);
    color: white;
    font-size: 0.7rem;
    padding: 0.1rem 0.4rem;
    border-radius: 3px;
    font-weight: 600;
    vertical-align: middle;
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding: 1rem 1.5rem;
    background: var(--caption-bg);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  .legend {
    display: flex; gap: 1.5rem; justify-content: center; flex-wrap: wrap;
    margin-top: 1rem; font-size: 0.82rem; color: var(--muted);
  }
  .legend-item { display: flex; align-items: center; gap: 0.4rem; }
  .legend-swatch { width: 14px; height: 14px; border-radius: 3px; border: 1px solid var(--border); }
</style>
</head>
<body>
<figure>
  <div class="diagram-container">
    <div class="grid-title">Li &amp; Thompson (1976): Four-Way Language Typology</div>

    <div class="typology-grid">
      <!-- Corner -->
      <div class="grid-corner">Subject ↓<br>Topic →</div>
      <!-- Column headers -->
      <div class="grid-col-header col-topic-yes">+ Topic-Prominent</div>
      <div class="grid-col-header col-topic-no">- Topic-Prominent</div>

      <!-- Row 1: +Subject -->
      <div class="grid-row-header row-subj-yes">+ Subject-<br>Prominent</div>
      <div class="cell" style="background: var(--both-bg);">
        <div class="cell-label" style="color: var(--both);">Both [+Sp, +Tp]</div>
        <div class="cell-langs">Japanese, Korean</div>
        <div class="cell-example">
          Japanese marks BOTH:<br>
          <span class="zh">象<b>は</b> 鼻<b>が</b> 長い</span><br>
          <span class="gloss"><span class="topic-tag">TOPIC</span> elephant-<b>wa</b> &nbsp; <span class="subj-tag">SUBJ</span> nose-<b>ga</b> &nbsp; long</span>
        </div>
      </div>
      <div class="cell cell-highlight" style="background: var(--english-bg);">
        <div class="cell-label" style="color: var(--english);">English Type [+Sp, -Tp]</div>
        <div class="cell-langs">English, French, German</div>
        <div class="cell-example">
          Subject REQUIRED, even if meaningless:<br>
          <span class="en">"<span class="dummy-tag">DUMMY</span> <b>It</b> is raining"</span><br>
          <span class="gloss">"It" refers to nothing -- but English demands a subject</span>
        </div>
      </div>

      <!-- Row 2: -Subject -->
      <div class="grid-row-header row-subj-no">- Subject-<br>Prominent</div>
      <div class="cell cell-highlight" style="background: var(--chinese-bg);">
        <div class="cell-label" style="color: var(--chinese);">Chinese Type [-Sp, +Tp]</div>
        <div class="cell-langs">Chinese, Lisu</div>
        <div class="cell-example">
          Topic sets the frame, no subject needed:<br>
          <span class="zh">大象 鼻子 长</span><br>
          <span class="pinyin">daxiang bizi chang</span><br>
          <span class="gloss"><span class="topic-tag">TOPIC</span> elephants &nbsp; noses &nbsp; long</span><br>
          <span class="gloss">"Elephants -- noses are long" (no "have," no "their")</span>
        </div>
      </div>
      <div class="cell" style="background: var(--neither-bg);">
        <div class="cell-label" style="color: var(--neither);">Neither [-Sp, -Tp]</div>
        <div class="cell-langs">Tagalog, Ilocano</div>
        <div class="cell-example">
          Different organizing principles entirely:<br>
          <span class="gloss">Verb-initial; "focus" system rather than topic or subject</span>
        </div>
      </div>
    </div>

    <!-- Contrast box -->
    <div class="contrast-box">
      <div class="contrast-panel zh-panel">
        <h4>Chinese (Topic-Prominent)</h4>
        <div class="sent-row">
          <span class="zh">下雨了</span><br>
          <span class="pinyin" style="color:var(--muted);">xia yu le</span><br>
          "Rain-fall-LE" = It's raining<br>
          <b>No subject at all.</b> No dummy "it."
        </div>
        <div class="sent-row">
          <span class="zh">这本书我已经看了</span><br>
          <span class="pinyin" style="color:var(--muted);">zhe ben shu wo yijing kan le</span><br>
          <span class="topic-tag">TOPIC</span> "This book" + <span class="subj-tag">SUBJ</span> "I already read"<br>
          <b>Topic != Subject.</b> The book is the topic; I is the subject.
        </div>
      </div>
      <div class="contrast-arrow">&#x21C4;</div>
      <div class="contrast-panel en-panel">
        <h4>English (Subject-Prominent)</h4>
        <div class="sent-row">
          <span class="en">"<b>It</b> is raining"</span><br>
          <span class="dummy-tag">DUMMY</span> "It" required even though nothing is "it"<br>
          <b>Subject always mandatory.</b>
        </div>
        <div class="sent-row">
          <span class="en">"I have already read this book"</span><br>
          <span class="subj-tag">SUBJ</span> "I" must come first<br>
          <b>Subject = sentence organizer.</b> No topic-first option without "As for..."
        </div>
      </div>
    </div>

    <div class="legend">
      <div class="legend-item"><div class="legend-swatch" style="background:var(--chinese);"></div> Chinese / Topic-prominent</div>
      <div class="legend-item"><div class="legend-swatch" style="background:var(--english);"></div> English / Subject-prominent</div>
      <div class="legend-item"><div class="legend-swatch" style="background:var(--both);"></div> Both (Japanese, Korean)</div>
      <div class="legend-item"><div class="legend-swatch" style="background:var(--neither);"></div> Neither (Tagalog)</div>
      <div class="legend-item"><div class="legend-swatch" style="background:var(--highlight);"></div> Chinese-English contrast (highlighted)</div>
    </div>
  </div>

  <figcaption>
    <h2>Li &amp; Thompson's 1976 Typology: How Languages Organize Sentences</h2>
    <p>English requires a grammatical subject in every sentence, even a meaningless one ("It is raining"). Chinese organizes around a topic -- what the sentence is about -- which need not be the grammatical subject and can be omitted entirely. This is not a stylistic preference; it is a fundamental architectural difference.</p>
  </figcaption>
</figure>
</body>
</html>
