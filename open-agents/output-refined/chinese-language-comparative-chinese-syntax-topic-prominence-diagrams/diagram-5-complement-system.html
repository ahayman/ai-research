<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Chinese Complement System: Taxonomy and Patterns</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --accent: #2563eb;
    --result: #ef4444; --result-bg: #fef2f2;
    --direct: #2563eb; --direct-bg: #dbeafe;
    --potential: #059669; --potential-bg: #d1fae5;
    --degree: #8b5cf6; --degree-bg: #ede9fe;
    --muted: #6c757d; --caption-bg: #f8f9fa; --english: #6366f1;
    --verb-color: #059669;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a; --fg: #e8e8f0; --surface: #1a1a2e; --border: #2d2d44;
      --accent: #6b8aff;
      --result: #f87171; --result-bg: #3b1a1a;
      --direct: #6b8aff; --direct-bg: #1e2a4a;
      --potential: #34d399; --potential-bg: #14352d;
      --degree: #a78bfa; --degree-bg: #2e2050;
      --muted: #9a9ab0; --caption-bg: #1a1a2e; --english: #818cf8;
      --verb-color: #34d399;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg); color: var(--fg);
    display: flex; justify-content: center; padding: 2rem 1rem; line-height: 1.6;
  }
  figure { max-width: 1100px; width: 100%; }
  .diagram-container {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 2rem 1.5rem; overflow-x: auto;
  }
  .tree-root {
    text-align: center; font-size: 1.1rem; font-weight: 700;
    color: var(--accent); margin-bottom: 0.5rem;
  }
  .tree-root-sub { text-align: center; font-size: 0.85rem; color: var(--muted); margin-bottom: 1.5rem; }
  .branches {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.8rem;
  }
  .branch {
    border-radius: 8px; padding: 1rem; border: 2px solid;
  }
  .b-result { background: var(--result-bg); border-color: var(--result); }
  .b-direct { background: var(--direct-bg); border-color: var(--direct); }
  .b-potential { background: var(--potential-bg); border-color: var(--potential); }
  .b-degree { background: var(--degree-bg); border-color: var(--degree); }
  .branch-header {
    font-size: 0.95rem; font-weight: 700; margin-bottom: 0.15rem;
  }
  .b-result .branch-header { color: var(--result); }
  .b-direct .branch-header { color: var(--direct); }
  .b-potential .branch-header { color: var(--potential); }
  .b-degree .branch-header { color: var(--degree); }
  .branch-zh { font-size: 0.82rem; color: var(--muted); margin-bottom: 0.5rem; }
  .branch-pattern {
    font-size: 0.8rem; font-weight: 600; padding: 0.3rem 0.5rem;
    background: var(--bg); border-radius: 4px; border: 1px solid var(--border);
    margin-bottom: 0.6rem; text-align: center;
  }
  .ex-item {
    margin-bottom: 0.5rem; padding: 0.4rem 0.5rem;
    background: var(--bg); border-radius: 4px; border: 1px solid var(--border);
    font-size: 0.82rem;
  }
  .ex-item .zh { font-weight: 600; font-size: 0.95rem; }
  .ex-item .py { color: var(--muted); font-style: italic; font-size: 0.75rem; }
  .ex-item .gl { font-size: 0.78rem; }
  .ex-item .en { color: var(--english); font-size: 0.78rem; font-style: italic; }
  /* Transformation arrow */
  .transform-section {
    margin-top: 1.5rem; padding: 1rem;
    background: var(--bg); border: 2px solid var(--potential);
    border-radius: 8px;
  }
  .transform-title {
    font-size: 0.95rem; font-weight: 700; color: var(--potential);
    margin-bottom: 0.75rem; text-align: center;
  }
  .transform-row {
    display: flex; align-items: center; gap: 0.5rem;
    justify-content: center; margin-bottom: 0.5rem; flex-wrap: wrap;
  }
  .t-block {
    padding: 0.35rem 0.6rem; border-radius: 4px; font-size: 0.9rem;
    font-weight: 600; text-align: center;
  }
  .t-verb { background: color-mix(in srgb, var(--verb-color) 15%, var(--bg)); color: var(--verb-color); border: 1px solid var(--verb-color); }
  .t-insert { background: var(--potential); color: white; font-size: 0.85rem; }
  .t-comp { background: color-mix(in srgb, var(--result) 15%, var(--bg)); color: var(--result); border: 1px solid var(--result); }
  .t-equals { font-size: 1rem; color: var(--muted); font-weight: 700; }
  .t-result { font-size: 0.85rem; color: var(--fg); }
  .english-box {
    margin-top: 1.5rem; padding: 0.8rem 1rem;
    background: color-mix(in srgb, var(--english) 8%, var(--bg));
    border: 1px solid var(--english); border-radius: 6px;
    font-size: 0.85rem;
  }
  .english-box h4 { color: var(--english); font-size: 0.9rem; margin-bottom: 0.3rem; }
  .comparison-row {
    display: grid; grid-template-columns: 1fr auto 1fr; gap: 0.5rem;
    margin-bottom: 0.3rem; align-items: center;
  }
  .comp-zh { text-align: right; font-weight: 600; }
  .comp-vs { text-align: center; color: var(--muted); font-size: 0.8rem; }
  .comp-en { text-align: left; color: var(--english); }
  figcaption {
    text-align: center; margin-top: 1.5rem; padding: 1rem 1.5rem;
    background: var(--caption-bg); border-radius: 8px; border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  .legend {
    display: flex; gap: 1.2rem; justify-content: center; flex-wrap: wrap;
    margin-top: 1rem; font-size: 0.78rem; color: var(--muted);
  }
  .legend-item { display: flex; align-items: center; gap: 0.3rem; }
  .legend-swatch { width: 12px; height: 12px; border-radius: 2px; }
</style>
</head>
<body>
<figure>
  <div class="diagram-container">
    <div class="tree-root">Chinese Verb Complements (补语 buyu)</div>
    <div class="tree-root-sub">Four types that pack result, direction, ability, and degree into verb-adjacent slots</div>

    <div class="branches">
      <!-- Resultative -->
      <div class="branch b-result">
        <div class="branch-header">Resultative 结果补语</div>
        <div class="branch-zh">V + Result outcome</div>
        <div class="branch-pattern">V + Result</div>
        <div class="ex-item">
          <div class="zh">看完 <span class="py">kan wan</span></div>
          <div class="gl">see-finish</div>
          <div class="en">"finish reading"</div>
        </div>
        <div class="ex-item">
          <div class="zh">听懂 <span class="py">ting dong</span></div>
          <div class="gl">listen-understand</div>
          <div class="en">"understand (by ear)"</div>
        </div>
        <div class="ex-item">
          <div class="zh">打破 <span class="py">da po</span></div>
          <div class="gl">hit-broken</div>
          <div class="en">"break"</div>
        </div>
        <div class="ex-item">
          <div class="zh">吃饱 <span class="py">chi bao</span></div>
          <div class="gl">eat-full</div>
          <div class="en">"eat until full"</div>
        </div>
      </div>

      <!-- Directional -->
      <div class="branch b-direct">
        <div class="branch-header">Directional 趋向补语</div>
        <div class="branch-zh">V + Direction of movement</div>
        <div class="branch-pattern">V + Dir (+ 来/去)</div>
        <div class="ex-item">
          <div class="zh">走进来 <span class="py">zou jin lai</span></div>
          <div class="gl">walk-enter-come</div>
          <div class="en">"walk in (toward me)"</div>
        </div>
        <div class="ex-item">
          <div class="zh">拿出去 <span class="py">na chu qu</span></div>
          <div class="gl">take-exit-go</div>
          <div class="en">"take out (away)"</div>
        </div>
        <div class="ex-item">
          <div class="zh">跑上去 <span class="py">pao shang qu</span></div>
          <div class="gl">run-ascend-go</div>
          <div class="en">"run up (away)"</div>
        </div>
        <div class="ex-item" style="font-size:0.78rem; border-style:dashed;">
          Simple: 上 下 进 出 回 过 起<br>
          Compound: +来(toward) / +去(away)
        </div>
      </div>

      <!-- Potential -->
      <div class="branch b-potential">
        <div class="branch-header">Potential 可能补语</div>
        <div class="branch-zh">V + 得/不 + can/can't</div>
        <div class="branch-pattern">V + 得/不 + Comp</div>
        <div class="ex-item">
          <div class="zh">看得懂 <span class="py">kan de dong</span></div>
          <div class="gl">see-CAN-understand</div>
          <div class="en">"can understand"</div>
        </div>
        <div class="ex-item">
          <div class="zh">看不懂 <span class="py">kan bu dong</span></div>
          <div class="gl">see-NOT-understand</div>
          <div class="en">"can't understand"</div>
        </div>
        <div class="ex-item">
          <div class="zh">吃得完 <span class="py">chi de wan</span></div>
          <div class="gl">eat-CAN-finish</div>
          <div class="en">"can finish eating"</div>
        </div>
        <div class="ex-item">
          <div class="zh">吃不完 <span class="py">chi bu wan</span></div>
          <div class="gl">eat-NOT-finish</div>
          <div class="en">"can't finish eating"</div>
        </div>
      </div>

      <!-- Degree -->
      <div class="branch b-degree">
        <div class="branch-header">Degree 程度补语</div>
        <div class="branch-zh">V/Adj + 得 + evaluation</div>
        <div class="branch-pattern">V + 得 + Eval</div>
        <div class="ex-item">
          <div class="zh">跑得快 <span class="py">pao de kuai</span></div>
          <div class="gl">run-DE-fast</div>
          <div class="en">"run fast"</div>
        </div>
        <div class="ex-item">
          <div class="zh">说得很好 <span class="py">shuo de hen hao</span></div>
          <div class="gl">speak-DE-very-good</div>
          <div class="en">"speak very well"</div>
        </div>
        <div class="ex-item">
          <div class="zh">忙得没时间 <span class="py">mang de mei shijian</span></div>
          <div class="gl">busy-DE-no-time</div>
          <div class="en">"so busy, no time"</div>
        </div>
        <div class="ex-item" style="font-size:0.78rem; border-style:dashed;">
          得 (de) here marks degree/manner<br>
          Not the same 得 as potential!
        </div>
      </div>
    </div>

    <!-- Transformation: Resultative -> Potential -->
    <div class="transform-section">
      <div class="transform-title">The Productive Pattern: Resultative + 得/不 = Potential Complement</div>
      <div class="transform-row">
        <span class="t-block t-verb">看</span><span class="t-block t-comp">懂</span>
        <span class="t-equals">=</span>
        <span class="t-result">"read-understand"</span>
      </div>
      <div class="transform-row" style="font-size:0.8rem; color:var(--muted);">insert 得 (can) or 不 (can't) between V and Complement</div>
      <div class="transform-row">
        <span class="t-block t-verb">看</span><span class="t-block t-insert">得</span><span class="t-block t-comp">懂</span>
        <span class="t-equals">=</span>
        <span class="t-result">"CAN read-understand"</span>
        <span style="font-size:0.8rem; margin-left:0.5rem;">&#x2714;</span>
      </div>
      <div class="transform-row">
        <span class="t-block t-verb">看</span><span class="t-block t-insert" style="background:var(--result);">不</span><span class="t-block t-comp">懂</span>
        <span class="t-equals">=</span>
        <span class="t-result">"CANNOT read-understand"</span>
        <span style="font-size:0.8rem; margin-left:0.5rem;">&#x2718;</span>
      </div>
      <div style="font-size:0.82rem; color:var(--muted); text-align:center; margin-top:0.5rem;">
        This works for ANY V+Complement pair: 吃得完/吃不完, 听得见/听不见, 做得到/做不到...
      </div>
    </div>

    <!-- English comparison -->
    <div class="english-box">
      <h4>English Comparison: Why Chinese Complements Are Denser</h4>
      <div class="comparison-row">
        <div class="comp-zh">听懂 (2 syllables)</div>
        <div class="comp-vs">vs.</div>
        <div class="comp-en">"understand by listening" (6 syllables)</div>
      </div>
      <div class="comparison-row">
        <div class="comp-zh">看不懂 (3 syllables)</div>
        <div class="comp-vs">vs.</div>
        <div class="comp-en">"unable to understand by reading" (10 syllables)</div>
      </div>
      <div class="comparison-row">
        <div class="comp-zh">走进来 (3 syllables)</div>
        <div class="comp-vs">vs.</div>
        <div class="comp-en">"walk in toward the speaker" (7 syllables)</div>
      </div>
    </div>

    <div class="legend">
      <div class="legend-item"><div class="legend-swatch" style="background:var(--result);"></div> Resultative</div>
      <div class="legend-item"><div class="legend-swatch" style="background:var(--direct);"></div> Directional</div>
      <div class="legend-item"><div class="legend-swatch" style="background:var(--potential);"></div> Potential</div>
      <div class="legend-item"><div class="legend-swatch" style="background:var(--degree);"></div> Degree</div>
    </div>
  </div>

  <figcaption>
    <h2>The Chinese Complement System: Four Types, One Powerful Pattern</h2>
    <p>Chinese packs result, direction, ability, and degree into single-syllable slots immediately after the verb. The potential complement is especially elegant: take any V+Result pair, insert 得 (can) or 不 (can't), and you have a productive ability statement. English needs separate words, phrases, or entire clauses for the same information.</p>
  </figcaption>
</figure>
</body>
</html>
