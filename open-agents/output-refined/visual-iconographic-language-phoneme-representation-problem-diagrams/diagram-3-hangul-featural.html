<figure class="concept-diagram" id="diagram-hangul-featural">
  <div class="diagram-title">Hangul: Articulatory Features as Visual Form</div>
  <div class="diagram-subtitle">The world's most systematically featural writing system</div>
  <div class="diagram-date">Created by King Sejong, 1443. 24 basic letters (14 consonants + 10 vowels).</div>

  <table class="consonant-table">
    <thead>
      <tr>
        <th>Place of Articulation</th>
        <th>Articulatory Position</th>
        <th class="base-col">Base Letter</th>
        <th class="aspirated-col">+ Aspiration</th>
        <th class="tense-col">Doubled (Tense)</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td><span class="place-label">Bilabial</span></td>
        <td><span class="articulation-desc">Shape of closed lips</span></td>
        <td class="base-col"><span class="hangul-char">ㅁ</span><span class="hangul-sound">m</span></td>
        <td class="aspirated-col"><span class="hangul-char">ㅂ</span><span class="hangul-sound">b/p</span></td>
        <td class="tense-col"><span class="hangul-char">ㅃ</span><span class="hangul-sound">pp</span></td>
      </tr>
      <tr>
        <td><span class="place-label">Alveolar</span></td>
        <td><span class="articulation-desc">Tongue touching upper gums</span></td>
        <td class="base-col"><span class="hangul-char">ㄴ</span><span class="hangul-sound">n</span></td>
        <td class="aspirated-col"><span class="hangul-char">ㄷ</span><span class="hangul-sound">d/t</span></td>
        <td class="tense-col"><span class="hangul-char">ㄸ</span><span class="hangul-sound">tt</span></td>
      </tr>
      <tr>
        <td><span class="place-label">Alveolar Fricative</span></td>
        <td><span class="articulation-desc">Shape of a tooth</span></td>
        <td class="base-col"><span class="hangul-char">ㅅ</span><span class="hangul-sound">s</span></td>
        <td class="aspirated-col"><span class="hangul-char">ㅈ</span><span class="hangul-sound">j</span></td>
        <td class="tense-col"><span class="hangul-char">ㅆ</span><span class="hangul-sound">ss</span></td>
      </tr>
      <tr>
        <td><span class="place-label">Velar</span></td>
        <td><span class="articulation-desc">Tongue blocking throat</span></td>
        <td class="base-col"><span class="hangul-char">ㄱ</span><span class="hangul-sound">g/k</span></td>
        <td class="aspirated-col"><span class="hangul-char">ㅋ</span><span class="hangul-sound">k (aspirated)</span></td>
        <td class="tense-col"><span class="hangul-char">ㄲ</span><span class="hangul-sound">kk</span></td>
      </tr>
      <tr>
        <td><span class="place-label">Glottal</span></td>
        <td><span class="articulation-desc">Shape of open throat</span></td>
        <td class="base-col"><span class="hangul-char">ㅇ</span><span class="hangul-sound">ng / silent</span></td>
        <td class="aspirated-col"><span class="hangul-char">ㅎ</span><span class="hangul-sound">h</span></td>
        <td class="tense-col">-</td>
      </tr>
    </tbody>
  </table>

  <div class="modification-section">
    <div class="mod-title">Systematic Modifications: The Same Pattern Transforms Every Letter</div>
    <div class="mod-grid">
      <div class="mod-card mod-aspiration">
        <div class="mod-type">Add a stroke = Aspiration</div>
        <div class="mod-demo">ㄱ &rarr; ㅋ &nbsp; ㄷ &rarr; ㅌ &nbsp; ㅂ &rarr; ㅍ</div>
        <div class="mod-rule">One additional stroke transforms a plain stop into its aspirated counterpart</div>
      </div>
      <div class="mod-card mod-tense">
        <div class="mod-type">Double the letter = Tenseness</div>
        <div class="mod-demo">ㄱ &rarr; ㄲ &nbsp; ㄷ &rarr; ㄸ &nbsp; ㅂ &rarr; ㅃ</div>
        <div class="mod-rule">Doubling transforms a plain consonant into its tense (fortis) counterpart</div>
      </div>
    </div>
  </div>

  <div class="syllable-section">
    <div class="syllable-title">Syllable Block Composition: 2D Spatial Arrangement</div>
    <div class="syllable-demo">
      <div class="syl-part">
        <div class="syl-char">ㅎ</div>
        <div class="syl-label">initial: h</div>
      </div>
      <span class="syl-arrow">+</span>
      <div class="syl-part">
        <div class="syl-char">ㅏ</div>
        <div class="syl-label">vowel: a</div>
      </div>
      <span class="syl-arrow">+</span>
      <div class="syl-part">
        <div class="syl-char">ㄴ</div>
        <div class="syl-label">final: n</div>
      </div>
      <span class="syl-arrow">&rarr;</span>
      <div class="syl-part syl-result">
        <div class="syl-char">한</div>
        <div class="syl-label">"han" (Korean)</div>
      </div>
    </div>
  </div>

  <div class="insight-box">
    <strong>Why Hangul matters for visual language design:</strong> Hangul proves that articulatory features (place, manner, voicing) can be encoded in the visual form of letters — not arbitrarily, but motivated by the shape of the mouth during articulation. A visual language could use the same principle: visual elements that depict articulatory positions, with systematic modifications for manner and voicing, composed into syllable blocks. The result would be a phonetic subsystem that is cross-linguistic (articulatory features are universal), compact (syllable blocks rather than letter sequences), and visually integrated (using spatial composition like the rest of the visual language).
  </div>

  <figcaption>
    <strong>Figure 3:</strong> Hangul's featural system, where consonant shapes depict the vocal tract during articulation and systematic modifications (adding a stroke for aspiration, doubling for tenseness) transform base letters predictably. The 2D syllable block composition demonstrates that phonetic information can be spatially arranged rather than linearly sequenced — the most promising model for a visual language's phonetic subsystem.
  </figcaption>
</figure>
