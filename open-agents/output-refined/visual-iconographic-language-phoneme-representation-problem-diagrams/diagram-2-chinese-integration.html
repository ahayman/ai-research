<figure class="concept-diagram" id="diagram-chinese-integration">
  <div class="diagram-title">How Chinese Integrates Phonetic and Semantic Components</div>
  <div class="diagram-subtitle">Over 80% of Chinese characters are semantic-phonetic compounds — the world's most successful hybrid system</div>

  <div class="section-label">Semantic-Phonetic Compound Structure</div>
  <div class="char-examples">
    <div class="char-card">
      <div class="char-display">
        <div class="char-big">妈</div>
        <div class="char-equals">=</div>
        <div class="char-parts">
          <div class="char-part part-semantic"><span class="char-part-char">女</span> semantic: female</div>
          <div class="char-part part-phonetic"><span class="char-part-char">马</span> phonetic: ma sound</div>
        </div>
      </div>
      <div class="char-info">ma (mother). The semantic radical tells you it's about women/female; the phonetic radical tells you the pronunciation.</div>
    </div>
    <div class="char-card">
      <div class="char-display">
        <div class="char-big">河</div>
        <div class="char-equals">=</div>
        <div class="char-parts">
          <div class="char-part part-semantic"><span class="char-part-char">氵</span> semantic: water</div>
          <div class="char-part part-phonetic"><span class="char-part-char">可</span> phonetic: ke sound</div>
        </div>
      </div>
      <div class="char-info">he (river). Water radical indicates the domain; phonetic radical approximates the sound. Both components occupy defined spatial zones.</div>
    </div>
  </div>

  <div class="phono-section">
    <div class="section-label">Two Strategies for Foreign Words</div>
    <div class="phono-examples">
      <div class="phono-card phono-transliterate">
        <div class="phono-type">Pure Phonetic Transliteration</div>
        <div class="phono-chinese">咖啡</div>
        <div class="phono-pinyin">kafei = "coffee"</div>
        <div class="phono-meaning">Both characters contain the mouth radical (口) — signaling "read these for sound, not meaning"</div>
        <div class="phono-note">The mouth radical acts as a "phonetic mode switch" — exactly the pattern a visual language could adopt</div>
      </div>
      <div class="phono-card phono-matching">
        <div class="phono-type">Phono-Semantic Matching</div>
        <div class="phono-chinese">声纳</div>
        <div class="phono-pinyin">shengna = "sonar"</div>
        <div class="phono-meaning">Sounds like "sonar" AND means "sound-receive" — phonetics and semantics aligned simultaneously</div>
        <div class="phono-note">The ideal strategy: encoding both pronunciation hint and meaning in the same symbol</div>
      </div>
    </div>
  </div>

  <div class="mouth-radical-box">
    <div class="mouth-radical-title">The Mouth Radical (口) as a Phonetic Mode Switch</div>
    <div class="mouth-radical-char">口</div>
    <div class="mouth-radical-text">When a character contains 口, it often signals "this character is being used for its sound, not its meaning." This is a 3,000-year-old design pattern for the exact problem a visual language faces: how to signal the reader to switch from semantic to phonetic reading mode.</div>
  </div>

  <div class="lesson-box">
    <strong>The lesson for visual language design:</strong> Chinese proves that a semantic system has always needed phonetic integration — this is not optional. The mouth radical convention (a visual marker that switches reading mode) is a clean, time-tested design pattern. A visual language should adopt the same strategy: a dedicated "phonetic switch marker" that toggles between semasiographic and phonetic reading.
  </div>

  <figcaption>
    <strong>Figure 2:</strong> Chinese character anatomy showing how semantic and phonetic components integrate within a single visual unit. Blue zones carry meaning (semantic radicals), red zones carry sound (phonetic radicals). The mouth radical (口) serves as a phonetic mode switch for transliterated foreign words — a 3,000-year-old solution to the exact problem that any new visual language must solve.
  </figcaption>
