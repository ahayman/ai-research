<figure class="concept-diagram" id="diagram-fingerspelling">
  <div class="diagram-title">The Fingerspelling Lifecycle</div>
  <div class="diagram-subtitle">How phonetic spelling becomes a native sign — a model for visual language lexicalization</div>

  <div class="lifecycle">
    <div class="stage s1">
      <div class="stage-arrow">&rarr;</div>
      <div class="stage-num">Stage 1</div>
      <div class="stage-title">Encounter</div>
      <div class="stage-desc">An untranslatable term enters the community — a proper name, a new concept, a borrowed word</div>
      <div class="stage-example">New rideshare company: "UBER"</div>
    </div>
    <div class="stage s2">
      <div class="stage-arrow">&rarr;</div>
      <div class="stage-num">Stage 2</div>
      <div class="stage-title">Full Fingerspelling</div>
      <div class="stage-desc">Spelled out letter by letter using the manual alphabet. Slow but precise.</div>
      <div class="stage-example">U-B-E-R (4 handshapes in sequence)</div>
    </div>
    <div class="stage s3">
      <div class="stage-arrow">&rarr;</div>
      <div class="stage-num">Stage 3</div>
      <div class="stage-title">Compression</div>
      <div class="stage-desc">With repeated use, the spelling is compressed: letters deleted, movements added, handshapes blended.</div>
      <div class="stage-example">U-B-R (vowel dropped, movement smoothed)</div>
    </div>
    <div class="stage s4">
      <div class="stage-num">Stage 4</div>
      <div class="stage-title">Lexicalized Sign</div>
      <div class="stage-desc">Barely recognizable as fingerspelling. Functions as a native sign with its own grammar.</div>
      <div class="stage-example">A single fluid movement — now a "real" sign</div>
    </div>
  </div>

  <div class="changes-section">
    <div class="changes-title">Eight documented changes during lexicalization (ASL)</div>
    <div class="changes-grid">
      <div class="change-tag">Letter deletion</div>
      <div class="change-tag">Location change</div>
      <div class="change-tag">Handshape change</div>
      <div class="change-tag">Movement addition</div>
      <div class="change-tag">Palm orientation change</div>
      <div class="change-tag">Movement repetition</div>
      <div class="change-tag">Second hand addition</div>
      <div class="change-tag">Grammar incorporation</div>
    </div>
  </div>

  <div class="examples-section">
    <div class="examples-title">Lexicalized examples in ASL (barely recognizable as fingerspelling)</div>
    <div class="lex-examples">
      <div class="lex-ex"><div class="lex-sign">#OK</div><div class="lex-note">from O-K</div></div>
      <div class="lex-ex"><div class="lex-sign">#ALL</div><div class="lex-note">from A-L-L</div></div>
      <div class="lex-ex"><div class="lex-sign">#IF</div><div class="lex-note">from I-F</div></div>
      <div class="lex-ex"><div class="lex-sign">#OR</div><div class="lex-note">from O-R</div></div>
      <div class="lex-ex"><div class="lex-sign">#WHAT</div><div class="lex-note">from W-H-A-T</div></div>
      <div class="lex-ex"><div class="lex-sign">#JOB</div><div class="lex-note">from J-O-B</div></div>
      <div class="lex-ex"><div class="lex-sign">#BUS</div><div class="lex-note">from B-U-S</div></div>
    </div>
  </div>

  <div class="parallel-box">
    <strong>The parallel for a visual language:</strong> A visual language's phonetic subsystem would follow the same lifecycle. Novel names start fully spelled using the featural phonetic module. Frequently used terms get compressed and simplified by the community. Eventually, high-frequency terms become conventional symbols indistinguishable from the semasiographic vocabulary — the phonetic origin dissolves into the lexicon. This is not a bug; it is the natural life cycle of borrowing in every language ever documented.
  </div>

  <figcaption>
    <strong>Figure 4:</strong> The fingerspelling-to-lexicalized-sign lifecycle in ASL. This four-stage process — from full phonetic spelling through compression to native sign — provides a model for how a visual language could handle the phoneme problem: spell initially, lexicalize over time. The eight documented changes show that this is not arbitrary simplification but a systematic linguistic process.
  </figcaption>
</figure>
