<figure class="concept-diagram" id="diagram-phoneme-problem">
  <div class="diagram-title">The Phoneme Problem: Why It Cannot Be Avoided</div>
  <div class="diagram-subtitle">Every real-world sentence exposes the fatal limitation of purely semasiographic systems</div>

  <div class="source-sentence">
    "<span class="semantic">Dr.</span> <span class="phonetic">Nakamura</span> <span class="semantic">treated the patient with</span> <span class="phonetic">ibuprofen</span> <span class="semantic">at</span> <span class="phonetic">St. Luke's Hospital</span>"
  </div>

  <div class="analysis-grid">
    <div class="analysis-col col-can">
      <div class="col-title">Semasiographic system CAN represent</div>
      <div class="col-item"><span class="col-icon">&#10003;</span> doctor (role)</div>
      <div class="col-item"><span class="col-icon">&#10003;</span> treated (action)</div>
      <div class="col-item"><span class="col-icon">&#10003;</span> patient (role)</div>
      <div class="col-item"><span class="col-icon">&#10003;</span> medication (category)</div>
      <div class="col-item"><span class="col-icon">&#10003;</span> hospital (place type)</div>
      <div class="col-item"><span class="col-icon">&#10003;</span> the relationships between these</div>
    </div>
    <div class="vs-col">vs</div>
    <div class="analysis-col col-cannot">
      <div class="col-title">Cannot represent without phonetics</div>
      <div class="col-item"><span class="col-icon">&#10007;</span> Nakamura (which doctor?)</div>
      <div class="col-item"><span class="col-icon">&#10007;</span> ibuprofen (which medication?)</div>
      <div class="col-item"><span class="col-icon">&#10007;</span> St. Luke's (which hospital?)</div>
      <div class="col-item"><span class="col-icon">&#10007;</span> Any specific person's name</div>
      <div class="col-item"><span class="col-icon">&#10007;</span> Any specific drug name</div>
      <div class="col-item"><span class="col-icon">&#10007;</span> Any specific institution name</div>
    </div>
  </div>

  <div class="cascade-section">
    <div class="cascade-title">Failure Cascade: Communication becomes fatally imprecise</div>
    <div class="cascade-items">
      <div class="cascade-item">
        <div class="cascade-box">Cannot identify specific people</div>
        <div class="cascade-arrow">&darr;</div>
        <div class="cascade-box">Cannot assign responsibility</div>
      </div>
      <div class="cascade-item">
        <div class="cascade-box">Cannot name specific medicines</div>
        <div class="cascade-arrow">&darr;</div>
        <div class="cascade-box">Medical records impossible</div>
      </div>
      <div class="cascade-item">
        <div class="cascade-box">Cannot identify specific places</div>
        <div class="cascade-arrow">&darr;</div>
        <div class="cascade-box">Navigation and logistics fail</div>
      </div>
    </div>
  </div>

  <div class="categories-section">
    <div class="categories-title">Six categories of phonetically-dependent communication</div>
    <div class="categories-grid">
      <div class="cat-tag cat-tag-name">Proper names: Aaron, Yuki, Beijing, Toyota</div>
      <div class="cat-tag cat-tag-loan">Loanwords: coffee, tsunami, algorithm</div>
      <div class="cat-tag cat-tag-tech">Technical terms: ibuprofen, CRISPR, blockchain</div>
      <div class="cat-tag cat-tag-ono">Onomatopoeia: bang, hiss, meow</div>
      <div class="cat-tag cat-tag-coin">Novel coinages: selfie, meme, vibe</div>
      <div class="cat-tag cat-tag-cult">Cultural terms: hygge, wabi-sabi, ubuntu</div>
    </div>
  </div>

  <figcaption>
    <strong>Figure 1:</strong> The phoneme representation problem demonstrated with a single sentence. Green elements can be represented semasiographically (through meaning decomposition). Red elements are arbitrary phonetic labels that require some phonetic encoding mechanism. This is not a rare edge case — proper names and specific terms appear in virtually every real-world communication. Bliss's refusal to add phonetic capability is the single most practically damaging decision in the history of visual language design.
  </figcaption>
</figure>
