  <div class="diagram-title">Four Approaches to the Phoneme Problem</div>
  <div class="diagram-subtitle">No single approach is sufficient — the synthesis leverages each where it is strongest</div>

  <table class="matrix-table">
    <thead>
      <tr>
        <th>Criteria</th>
        <th class="col-a"><span class="approach-header"><span class="approach-icon">A</span>Phonetic Switch<br/><span class="model-ref">model: Chinese 口</span></span></th>
        <th class="col-b"><span class="approach-header"><span class="approach-icon">B</span>Phono-Semantic<br/><span class="model-ref">model: 声纳 "sonar"</span></span></th>
        <th class="col-c"><span class="approach-header"><span class="approach-icon">C</span>Fingerspelling<br/><span class="model-ref">model: ASL #OK</span></span></th>
        <th class="col-d"><span class="approach-header"><span class="approach-icon">D</span>Convention<br/><span class="model-ref">model: assigned symbols</span></span></th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td class="criteria-label">Cross-linguistic scope</td>
        <td class="col-a"><span class="rating-strong">Strong</span><br/>featural = universal</td>

        <td class="col-c"><span class="rating-strong">Strong</span><br/>featural = universal</td>
        <td class="col-d"><span class="rating-weak">Weak</span><br/>community-specific</td>
      </tr>

        <td class="criteria-label">Compactness</td>

  <div class="synthesis-section">
    <div class="synthesis-title">Recommended Synthesis: Use All Four Simultaneously</div>
    <div class="synthesis-grid">
      <div class="synth-item synth-a">
        <span class="synth-when">For novel names &amp; precision</span>
        Featural phonetic subsystem with switch marker. Spell out /na.ka.mu.ra/ using articulatory symbols.
      </div>
      <div class="synth-item synth-b">
        <span class="synth-when">For common borrowings</span>
        Phono-semantic integration. Sound hint + meaning hint in one symbol, like Chinese 声纳.
      </div>
      <div class="synth-item synth-c">
        <span class="synth-when">For fingerspelling communities</span>
        Community-adapted alphabetic module. Different communities use different phonetic systems.
      </div>
      <div class="synth-item synth-d">
        <span class="synth-when">For high-frequency proper nouns</span>
        Conventional symbols assigned by community consensus. "Tokyo" gets its own symbol.
      </div>
    </div>

  <figcaption>
    <strong>Figure 5:</strong> Comparison of four strategies for handling the phoneme problem, rated across six design criteria. No single approach dominates all criteria: phonetic switch and fingerspelling handle novel terms best; phono-semantic integration and convention provide the best visual integration. The recommended design supports all four simultaneously, deploying each where it is strongest — the same strategy Chinese has used for 3,000 years.
  </figcaption>
