<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Address Term Evolution: 1949 to Present</title>
<style>
  :root {
    --bg: #0f172a; --fg: #e2e8f0; --surface: #1e293b; --border: #334155;
    --accent: #06b6d4; --accent-dim: #0891b2;
    --mandarin: #f59e0b; --mandarin-bg: rgba(245,158,11,0.12);
    --trad: #f43f5e; --trad-bg: rgba(244,63,94,0.1);
    --english: #8b5cf6; --english-bg: rgba(139,92,246,0.1);
    --muted: #64748b; --success: #4ade80; --warn: #fb923c;
    --emerald: #10b981; --emerald-bg: rgba(16,185,129,0.1);
    --blue: #3b82f6; --blue-bg: rgba(59,130,246,0.1);
    --sky: #0ea5e9; --rose: #f43f5e;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg); color: var(--fg);
    display: flex; justify-content: center; padding: 1.5rem 1rem; line-height: 1.6;
  }
  figure { max-width: 950px; width: 100%; }
  figcaption { text-align: center; font-size: 0.8rem; color: var(--muted); margin-top: 1rem; font-style: italic; }
  .diagram-box {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 1.75rem 1.5rem; overflow-x: auto;
  }
  .title { font-size: 1.15rem; font-weight: 700; text-align: center; margin-bottom: 0.2rem; color: var(--accent); }
  .subtitle { font-size: 0.82rem; color: var(--muted); text-align: center; margin-bottom: 1.5rem; }

  /* Timeline */
  .timeline { position: relative; padding-left: 2.5rem; }
  .timeline::before {
    content: ''; position: absolute; left: 0.9rem; top: 0; bottom: 0;
    width: 3px; background: linear-gradient(to bottom, var(--trad), var(--rose), var(--mandarin), var(--emerald), var(--accent));
    border-radius: 2px;
  }
  .era {
    position: relative; margin-bottom: 1.25rem;
    padding: 0.75rem 1rem; border-radius: 8px;
    background: var(--bg); border: 1px solid var(--border);
  }
  .era::before {
    content: ''; position: absolute; left: -1.95rem; top: 1rem;
    width: 12px; height: 12px; border-radius: 50%;
    border: 3px solid; background: var(--surface);
  }
  .era-pre::before { border-color: var(--trad); }
  .era-mao::before { border-color: var(--rose); }
  .era-reform::before { border-color: var(--mandarin); }
  .era-modern::before { border-color: var(--emerald); }
  .era-digital::before { border-color: var(--accent); }

  .era-header {
    display: flex; align-items: center; gap: 0.75rem;
    margin-bottom: 0.5rem; flex-wrap: wrap;
  }
  .era-date {
    font-size: 0.72rem; font-weight: 700; padding: 0.15rem 0.5rem;
    border-radius: 4px; white-space: nowrap;
  }
  .era-pre .era-date { background: var(--trad-bg); color: var(--trad); }
  .era-mao .era-date { background: var(--rose-bg); color: var(--rose); }
  .era-reform .era-date { background: var(--mandarin-bg); color: var(--mandarin); }
  .era-modern .era-date { background: var(--emerald-bg); color: var(--emerald); }
  .era-digital .era-date { background: rgba(6,182,212,0.12); color: var(--accent); }
  .era-name { font-size: 0.9rem; font-weight: 600; }

  .terms {
    display: flex; flex-wrap: wrap; gap: 0.4rem; margin-top: 0.35rem;
  }
  .term {
    display: inline-flex; align-items: center; gap: 0.3rem;
    padding: 0.25rem 0.55rem; border-radius: 5px;
    font-size: 0.75rem; border: 1px solid;
  }
  .term-rise { background: rgba(16,185,129,0.1); border-color: var(--emerald); color: var(--emerald); }
  .term-fall { background: rgba(244,63,94,0.08); border-color: var(--rose); color: var(--rose); text-decoration: line-through; }
  .term-shift { background: rgba(245,158,11,0.1); border-color: var(--mandarin); color: var(--mandarin); }
  .term-stable { background: rgba(6,182,212,0.08); border-color: var(--accent); color: var(--accent); }
  .term-warn { background: rgba(251,146,60,0.1); border-color: var(--warn); color: var(--warn); }

  .term-zh { font-weight: 700; }
  .era-note { font-size: 0.75rem; color: var(--muted); margin-top: 0.35rem; line-height: 1.4; }

  /* PRC vs Taiwan split */
  .split-section {
    margin-top: 1.25rem; padding: 1rem; border-radius: 8px;
    background: var(--bg); border: 1px solid var(--border);
  }
  .split-title {
    font-size: 0.72rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.08em; color: var(--accent); margin-bottom: 0.75rem;
    text-align: center;
  }
  .split-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
  .split-col { padding: 0.6rem 0.75rem; border-radius: 6px; border: 1px solid var(--border); }
  .split-col-prc { background: rgba(245,158,11,0.05); }
  .split-col-tw { background: rgba(6,182,212,0.05); }
  .split-label { font-size: 0.72rem; font-weight: 700; margin-bottom: 0.4rem; }
  .split-col-prc .split-label { color: var(--mandarin); }
  .split-col-tw .split-label { color: var(--accent); }
  .split-item { font-size: 0.75rem; color: var(--fg); padding: 0.2rem 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
  .split-item:last-child { border-bottom: none; }
  .split-item .zh { font-weight: 600; }
  .split-item .note { color: var(--muted); font-size: 0.7rem; }

  /* English comparison strip */
  .en-strip {
    margin-top: 0.75rem; padding: 0.6rem 0.8rem; border-radius: 6px;
    background: var(--english-bg); border: 1px solid rgba(139,92,246,0.2);
    font-size: 0.78rem; color: var(--english); text-align: center;
  }

  @media (max-width: 650px) {
    .split-grid { grid-template-columns: 1fr; }
    .timeline { padding-left: 2rem; }
  }
</style>
</head>
<body>
<figure>
<div class="diagram-box">
  <div class="title">Address Term Evolution: 1949 to Present</div>
  <div class="subtitle">How PRC political history reshaped the entire address system -- with Taiwan diverging after 1949</div>

  <div class="timeline">

    <!-- Pre-1949 -->
    <div class="era era-pre">
      <div class="era-header">
        <span class="era-date">Pre-1949</span>
        <span class="era-name">Traditional / Republican Era</span>
      </div>
      <div class="terms">
        <span class="term term-stable"><span class="term-zh">先生</span> xiansheng (Mr.)</span>
        <span class="term term-stable"><span class="term-zh">太太</span> taitai (Mrs.)</span>
        <span class="term term-stable"><span class="term-zh">小姐</span> xiaojie (Miss)</span>
        <span class="term term-stable"><span class="term-zh">老师</span> laoshi (teacher)</span>
      </div>
      <div class="era-note">Confucian hierarchy encoded: elaborate kinship terms, honorific/humble pairs (贵姓/敝姓), age-based deference</div>
    </div>

    <!-- Mao Era -->
    <div class="era era-mao">
      <div class="era-header">
        <span class="era-date">1949 -- 1976</span>
        <span class="era-name">Mao Era: Egalitarian Revolution</span>
      </div>
      <div class="terms">
        <span class="term term-rise"><span class="term-zh">同志</span> tongzhi (comrade) -- universal</span>
        <span class="term term-rise"><span class="term-zh">师傅</span> shifu (master worker)</span>
        <span class="term term-fall"><span class="term-zh">先生</span> "bourgeois"</span>
        <span class="term term-fall"><span class="term-zh">小姐</span> "bourgeois"</span>
      </div>
      <div class="era-note">Political ideology flattened hierarchy. Tongzhi applied to everyone regardless of gender, age, or rank. Traditional terms suppressed as class markers.</div>
    </div>

    <!-- Reform Era -->
    <div class="era era-reform">
      <div class="era-header">
        <span class="era-date">1978 -- 2000s</span>
        <span class="era-name">Reform and Opening Up</span>
      </div>
      <div class="terms">
        <span class="term term-rise"><span class="term-zh">先生</span> rehabilitated</span>
        <span class="term term-rise"><span class="term-zh">女士</span> nvshi (Ms.) -- new</span>
        <span class="term term-rise"><span class="term-zh">老板</span> laoban (boss)</span>
        <span class="term term-shift"><span class="term-zh">同志</span> declining</span>
        <span class="term term-warn"><span class="term-zh">小姐</span> acquiring negative connotation</span>
      </div>
      <div class="era-note">Market economy created new social categories. Laoban became flattering. Xiaojie became euphemism for sex worker in southern China. Tongzhi retreated to Party-internal use.</div>
    </div>

    <!-- Contemporary -->
    <div class="era era-modern">
      <div class="era-header">
        <span class="era-date">2000s -- 2010s</span>
        <span class="era-name">Contemporary Diversification</span>
      </div>
      <div class="terms">
        <span class="term term-rise"><span class="term-zh">美女</span> meinv (beauty)</span>
        <span class="term term-rise"><span class="term-zh">帅哥</span> shuaige (handsome)</span>
        <span class="term term-stable"><span class="term-zh">老师</span> expanded beyond education</span>
        <span class="term term-shift"><span class="term-zh">同志</span> = LGBT (Taiwan/HK)</span>
      </div>
      <div class="era-note">Meinv/shuaige as casual flattery regardless of appearance. Laoshi applied to any expert. Tongzhi reclaimed for LGBTQ+ (first proposed by Edward Lam, 1989 HK Film Festival).</div>
    </div>

    <!-- Digital -->
    <div class="era era-digital">
      <div class="era-header">
        <span class="era-date">2010s -- Present</span>
        <span class="era-name">Digital Age Innovations</span>
      </div>
      <div class="terms">
        <span class="term term-rise"><span class="term-zh">亲</span> qin (dear) -- from Taobao</span>
        <span class="term term-stable"><span class="term-zh">小哥哥</span> / <span class="term-zh">小姐姐</span> online-friendly</span>
        <span class="term term-stable"><span class="term-zh">大佬</span> dalao (big boss / expert)</span>
      </div>
      <div class="era-note">E-commerce culture spawned 亲 (from 亲爱的 qin'ai de). Diminutive 小哥哥/小姐姐 proliferated online. Internet slang constantly generates new address forms.</div>
    </div>

  </div>

  <!-- PRC vs Taiwan split -->
  <div class="split-section">
    <div class="split-title">Contemporary Split: PRC vs Taiwan</div>
    <div class="split-grid">
      <div class="split-col split-col-prc">
        <div class="split-label">PRC Mainland (Putonghua)</div>
        <div class="split-item"><span class="zh">小姐</span> -- <span class="note">problematic (sex-work connotation); safe only with surname prefix</span></div>
        <div class="split-item"><span class="zh">同志</span> -- <span class="note">CCP-internal only; younger gen. = LGBT</span></div>
        <div class="split-item"><span class="zh">美女/帅哥</span> -- <span class="note">widespread casual flattery</span></div>
        <div class="split-item"><span class="zh">老师</span> -- <span class="note">respectful for any expert</span></div>
      </div>
      <div class="split-col split-col-tw">
        <div class="split-label">Taiwan (Guoyu)</div>
        <div class="split-item"><span class="zh">小姐</span> -- <span class="note">standard polite form, no stigma</span></div>
        <div class="split-item"><span class="zh">同志</span> -- <span class="note">primarily = LGBTQ+ identity</span></div>
        <div class="split-item"><span class="zh">先生/小姐</span> -- <span class="note">default formal pair</span></div>
        <div class="split-item"><span class="zh">Japanese influence</span> -- <span class="note">softer politeness markers persist</span></div>
      </div>
    </div>
    <div class="en-strip">
      <strong>English comparison:</strong> Mr./Ms./Mrs. + rapid shift to first-name basis -- no kinship extension, no flattery-address system, minimal hierarchy encoding
    </div>
  </div>

</div>
<figcaption>PRC address terms track political history: revolutionary egalitarianism, market liberalization, and digital culture each reshaped the system. Taiwan preserved pre-1949 forms while developing independently.</figcaption>
</figure>
</body>
</html>
