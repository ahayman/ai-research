<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Harakat (Vowel Mark) System</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --accent: #4361ee;
    --muted: #6c757d;
    --caption-bg: #f8f9fa;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --accent: #6b8aff;
      --muted: #9a9ab0;
      --caption-bg: #1a1a2e;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure { max-width: 1100px; width: 100%; }
  .diagram-container {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.5rem 1rem;
    overflow-x: auto;
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding: 1rem 1.5rem;
    background: var(--caption-bg);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
</style>
</head>
<body>
<figure>
  <div class="diagram-container">
    <pre class="mermaid">
flowchart TD
    TITLE["<strong>The Harakat System: Layered Diacritics</strong><br/><em>Consonant letters = base layer &bull; Diacritics = optional overlay</em>"]

    TITLE --> SHORT
    TITLE --> EXTRA
    TITLE --> LONG
    TITLE --> MODES

    subgraph SHORT["<strong>SHORT VOWEL MARKS (harakat)</strong><br/><em>Small marks placed above or below consonant letters</em>"]
        S1["<strong>Fatha</strong> ـَ<br/>Small line ABOVE<br/>Short /a/ (cat)<br/><em>Most common vowel</em>"]
        S2["<strong>Kasra</strong> ـِ<br/>Small line BELOW<br/>Short /i/ (sit)<br/><em>Position mirrors sound: below = front vowel</em>"]
        S3["<strong>Damma</strong> ـُ<br/>Small curl ABOVE<br/>Short /u/ (put)<br/><em>Shape resembles waw (و) = long /u/</em>"]
    end

    subgraph EXTRA["<strong>ADDITIONAL MARKS</strong>"]
        E1["<strong>Sukun</strong> ـْ<br/>Small circle ABOVE<br/>&rsquo;No vowel&rsquo; marker<br/><em>This consonant has no following vowel</em>"]
        E2["<strong>Shadda</strong> ـّ<br/>W-shape ABOVE<br/>Consonant doubling<br/><em>Phonemically significant: darasa vs. darrasa</em>"]
        E3["<strong>Tanwin</strong> ـٌ ـً ـٍ<br/>Doubled vowel marks<br/>= -un, -an, -in<br/><em>Marks INDEFINITENESS + CASE</em>"]
    end

    subgraph LONG["<strong>LONG VOWELS (full letters, not marks)</strong><br/><em>Elegant logic: short = marks ON letters; long = LETTERS</em>"]
        L1["<strong>Alif</strong> ا after fatha<br/>= long /aa/<br/><em>kita:b = book</em>"]
        L2["<strong>Waw</strong> و after damma<br/>= long /uu/<br/><em>ru:h = spirit</em>"]
        L3["<strong>Ya'</strong> ي after kasra<br/>= long /ii/<br/><em>kari:m = generous</em>"]
    end

    subgraph MODES["<strong>TWO READING MODES</strong>"]
        M1["<strong>UNVOWELED (default)</strong><br/>Consonants + long vowels only<br/>Newspapers, books, websites<br/><em>Skilled readers FASTER this way</em>"]
        M2["<strong>FULLY VOWELED</strong><br/>All marks present<br/>Quran, children&rsquo;s books, poetry<br/><em>Training wheels &rarr; free riding</em>"]
    end

    COMPARE["<strong>ENGLISH COMPARISON</strong><br/>English has NO optional vowel system &mdash; all letters always written<br/>English diacritics: borrowed only (caf&eacute;, na&iuml;ve) &mdash; not a system<br/>French diacritics: OBLIGATORY (r&eacute;sum&eacute;) &mdash; part of spelling<br/>Arabic diacritics: OPTIONAL aids &mdash; omitting them is STANDARD"]

    style TITLE fill:#e0f2fe,stroke:#0284c7,color:#0c4a6e
    style SHORT fill:#dcfce7,stroke:#16a34a,color:#14532d
    style S1 fill:#f0fdf4,stroke:#22c55e,color:#14532d
    style S2 fill:#f0fdf4,stroke:#22c55e,color:#14532d
    style S3 fill:#f0fdf4,stroke:#22c55e,color:#14532d

    style EXTRA fill:#fef3c7,stroke:#d97706,color:#78350f
    style E1 fill:#fefce8,stroke:#eab308,color:#78350f
    style E2 fill:#fefce8,stroke:#eab308,color:#78350f
    style E3 fill:#fefce8,stroke:#eab308,color:#78350f

    style LONG fill:#ede9fe,stroke:#7c3aed,color:#3b0764
    style L1 fill:#f5f3ff,stroke:#8b5cf6,color:#3b0764
    style L2 fill:#f5f3ff,stroke:#8b5cf6,color:#3b0764
    style L3 fill:#f5f3ff,stroke:#8b5cf6,color:#3b0764

    style MODES fill:#fce7f3,stroke:#db2777,color:#831843
    style M1 fill:#fdf2f8,stroke:#ec4899,color:#831843
    style M2 fill:#fdf2f8,stroke:#ec4899,color:#831843

    style COMPARE fill:#fee2e2,stroke:#dc2626,color:#7f1d1d
    </pre>
  </div>
  <figcaption>
    <h2>Figure 3 &mdash; The Harakat (Vowel Mark) System</h2>
    <p>Arabic script operates as a layered system. Green = three short vowel marks (fatha /a/, kasra /i/, damma /u/) placed as small marks above or below consonant letters. Amber = additional marks: sukun (no vowel), shadda (consonant doubling), and tanwin (nunation marking indefiniteness + grammatical case). Purple = long vowels are written as FULL LETTERS (alif, waw, ya'), not diacritics -- an elegant asymmetry where short vowels are marks ON letters and long vowels ARE letters. Pink = the two reading modes: unvoweled (default, faster for skilled readers) and fully voweled (Quran, learner materials). Red comparison: English and French diacritics serve fundamentally different purposes from Arabic harakat.</p>
  </figcaption>
</figure>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<script>
  mermaid.initialize({
    startOnLoad: true,
    theme: window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'neutral',
    flowchart: { useMaxWidth: true, htmlLabels: true }
  });
</script>
</body>
</html>
