<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arabic Script vs. English Alphabet: Structural Comparison</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --accent: #4361ee;
    --muted: #6c757d;
    --caption-bg: #f8f9fa;
    --ar-bg: #dcfce7;
    --ar-border: #16a34a;
    --ar-text: #14532d;
    --en-bg: #fce7f3;
    --en-border: #db2777;
    --en-text: #831843;
    --header-bg: #e0f2fe;
    --header-border: #0284c7;
    --header-text: #0c4a6e;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --accent: #6b8aff;
      --muted: #9a9ab0;
      --caption-bg: #1a1a2e;
      --ar-bg: #064e3b;
      --ar-border: #34d399;
      --ar-text: #d1fae5;
      --en-bg: #831843;
      --en-border: #f472b6;
      --en-text: #fce7f3;
      --header-bg: #1e3a5f;
      --header-border: #6b8aff;
      --header-text: #c8ddf0;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.5;
  }
  figure { max-width: 1000px; width: 100%; }
  .diagram-container {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.5rem 1rem;
    overflow-x: auto;
  }
  table { border-collapse: collapse; width: 100%; min-width: 700px; font-size: 0.85rem; }
  th {
    padding: 0.7rem 0.6rem;
    text-align: center;
    font-weight: 700;
    font-size: 0.9rem;
  }
  th.feature-header { background: var(--header-bg); border: 2px solid var(--header-border); color: var(--header-text); text-align: left; }
  th.ar-header { background: var(--ar-bg); border: 2px solid var(--ar-border); color: var(--ar-text); }
  th.en-header { background: var(--en-bg); border: 2px solid var(--en-border); color: var(--en-text); }
  td { border: 1px solid var(--border); padding: 0.6rem; vertical-align: top; }
  td.feature { font-weight: 600; background: var(--header-bg); color: var(--header-text); border-color: var(--header-border); }
  td.ar { background: var(--ar-bg); color: var(--ar-text); border-color: var(--ar-border); }
  td.en { background: var(--en-bg); color: var(--en-text); border-color: var(--en-border); }
  .verdict {
    margin-top: 1rem;
    padding: 1rem;
    border-radius: 8px;
    background: var(--header-bg);
    border: 2px solid var(--header-border);
    color: var(--header-text);
    text-align: center;
    font-size: 0.9rem;
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding: 1rem 1.5rem;
    background: var(--caption-bg);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
</style>
</head>
<body>
<figure>
  <div class="diagram-container">
    <table>
      <thead>
        <tr>
          <th class="feature-header">Feature</th>
          <th class="ar-header">Arabic Script</th>
          <th class="en-header">English Alphabet</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td class="feature">System type</td>
          <td class="ar"><strong>Abjad</strong> -- consonants primary, vowels optional marks</td>
          <td class="en"><strong>Alphabet</strong> -- consonants and vowels both primary</td>
        </tr>
        <tr>
          <td class="feature">Direction</td>
          <td class="ar"><strong>Right-to-left (RTL)</strong>; numbers left-to-right within text (bidirectional)</td>
          <td class="en"><strong>Left-to-right (LTR)</strong>; no directional switching needed</td>
        </tr>
        <tr>
          <td class="feature">Letter count</td>
          <td class="ar"><strong>28</strong> consonant letters</td>
          <td class="en"><strong>26</strong> letters (consonants + vowels)</td>
        </tr>
        <tr>
          <td class="feature">Total forms</td>
          <td class="ar"><strong>~112</strong> (28 x 4 positional forms: isolated, initial, medial, final)</td>
          <td class="en"><strong>52</strong> (26 x 2: uppercase + lowercase)</td>
        </tr>
        <tr>
          <td class="feature">Base shapes</td>
          <td class="ar"><strong>~15-18</strong> unique shapes; dots differentiate the rest</td>
          <td class="en"><strong>26</strong> unique shapes per case (many pairs differ dramatically: A/a, G/g, R/r)</td>
        </tr>
        <tr>
          <td class="feature">Connection</td>
          <td class="ar"><strong>Always cursive</strong> -- letters connect within words (6 non-connecting exceptions)</td>
          <td class="en"><strong>Usually disconnected</strong> -- print is standard; cursive is optional and declining</td>
        </tr>
        <tr>
          <td class="feature">Vowel representation</td>
          <td class="ar"><strong>Optional diacritics</strong> -- usually omitted; reader infers from morphology</td>
          <td class="en"><strong>Always written</strong> -- vowels are mandatory letters</td>
        </tr>
        <tr>
          <td class="feature">Case distinction</td>
          <td class="ar"><strong>None</strong> -- no uppercase/lowercase</td>
          <td class="en"><strong>Yes</strong> -- uppercase for sentence starts, proper nouns, emphasis</td>
        </tr>
        <tr>
          <td class="feature">Dot differentiation</td>
          <td class="ar"><strong>Systematic</strong> -- same base shape + different dots = different letters</td>
          <td class="en"><strong>Minimal</strong> -- only i/j share a dot feature</td>
        </tr>
        <tr>
          <td class="feature">Reading strategy</td>
          <td class="ar"><strong>Morphological</strong> -- root recognition is primary; phonology secondary</td>
          <td class="en"><strong>Phonological</strong> -- letter-to-sound decoding is primary</td>
        </tr>
        <tr>
          <td class="feature">Global usage rank</td>
          <td class="ar"><strong>2nd most used script</strong> worldwide (Arabic, Persian, Urdu, Pashto, Kurdish...)</td>
          <td class="en"><strong>1st most used script</strong> worldwide (English, Spanish, French, German, Turkish...)</td>
        </tr>
      </tbody>
    </table>

    <div class="verdict">
      <strong>Neither system is "harder" -- they are optimized for DIFFERENT language structures.</strong><br/>
      Arabic's abjad is optimized for root-based Semitic morphology where consonants carry meaning.<br/>
      English's alphabet is optimized for non-root-based morphology where vowels are essential for disambiguation.
    </div>
  </div>
  <figcaption>
    <h2>Figure 4 &mdash; Arabic Script vs. English Alphabet: Structural Comparison</h2>
    <p>A systematic feature-by-feature comparison of the world's two most widely used scripts. Arabic (green) has more positional forms (~112 vs. 52) but fewer unique base shapes (~15 vs. 26), uses always-cursive connection vs. English's usually-disconnected print, and treats vowels as optional overlays vs. English's mandatory vowel letters. The reading strategies diverge fundamentally: Arabic reading is morphological (root recognition primary), while English reading is phonological (letter-to-sound decoding primary). Neither system is inherently harder -- each is optimized for its language's morphological structure.</p>
  </figcaption>
</figure>
</body>
</html>
