<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dot-Differentiated Letter Groups</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --accent: #4361ee;
    --muted: #6c757d;
    --caption-bg: #f8f9fa;
    --group-bg: #f0fdf4;
    --group-border: #22c55e;
    --dot-color: #dc2626;
    --base-color: #1a1a2e;
    --standalone-bg: #fef3c7;
    --standalone-border: #d97706;
    --nonconnect-bg: #ede9fe;
    --nonconnect-border: #7c3aed;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --accent: #6b8aff;
      --muted: #9a9ab0;
      --caption-bg: #1a1a2e;
      --group-bg: #064e3b;
      --group-border: #34d399;
      --dot-color: #f87171;
      --base-color: #e8e8f0;
      --standalone-bg: #78350f;
      --standalone-border: #fbbf24;
      --nonconnect-bg: #3b0764;
      --nonconnect-border: #a78bfa;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure { max-width: 1100px; width: 100%; }
  .diagram-container {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 2rem 1.5rem;
    overflow-x: auto;
  }
  .section-title {
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--accent);
    text-align: center;
    margin: 1.5rem 0 1rem;
  }
  .section-title:first-child { margin-top: 0; }
  .groups-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 1rem;
    margin: 1rem 0;
  }
  .letter-group {
    background: var(--group-bg);
    border: 2px solid var(--group-border);
    border-radius: 8px;
    padding: 1rem;
  }
  .group-label {
    font-weight: 700;
    font-size: 0.85rem;
    margin-bottom: 0.5rem;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }
  .letters-row {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    direction: rtl;
  }
  .letter-cell {
    text-align: center;
    padding: 0.5rem 0.7rem;
    border-radius: 6px;
    background: var(--surface);
    border: 1px solid var(--border);
    min-width: 70px;
  }
  .letter-cell .ar {
    font-size: 2rem;
    color: var(--base-color);
    line-height: 1.4;
    direction: rtl;
  }
  .letter-cell .name {
    font-size: 0.7rem;
    color: var(--muted);
    font-weight: 600;
  }
  .letter-cell .dots {
    font-size: 0.65rem;
    color: var(--dot-color);
    font-weight: 700;
  }
  .standalone-section {
    background: var(--standalone-bg);
    border: 2px solid var(--standalone-border);
    border-radius: 8px;
    padding: 1rem;
    margin: 1rem 0;
  }
  .nonconnect-section {
    background: var(--nonconnect-bg);
    border: 2px solid var(--nonconnect-border);
    border-radius: 8px;
    padding: 1rem;
    margin: 1rem 0;
  }
  .pattern-box {
    background: #e0f2fe;
    border: 2px solid #0284c7;
    border-radius: 8px;
    padding: 1rem 1.5rem;
    margin: 1.5rem 0;
    text-align: center;
    color: #0c4a6e;
  }
  @media (prefers-color-scheme: dark) { .pattern-box { background: #1e3a5f; border-color: #6b8aff; color: #c8ddf0; } }
  .pattern-box strong { font-size: 1rem; }
  .pattern-box p { font-size: 0.85rem; margin-top: 0.3rem; }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding: 1rem 1.5rem;
    background: var(--caption-bg);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
</style>
</head>
<body>
<figure>
  <div class="diagram-container">
    <div class="section-title">Dot-Differentiated Letter Groups: ~15 Base Shapes Generate 28 Letters</div>

    <div class="groups-grid">
      <div class="letter-group">
        <div class="group-label">Group 1: Ba' Family (5 letters, 1 base shape)</div>
        <div class="letters-row">
          <div class="letter-cell"><div class="ar">ب</div><div class="name">ba'</div><div class="dots">1 dot below</div></div>
          <div class="letter-cell"><div class="ar">ت</div><div class="name">ta'</div><div class="dots">2 dots above</div></div>
          <div class="letter-cell"><div class="ar">ث</div><div class="name">tha'</div><div class="dots">3 dots above</div></div>
          <div class="letter-cell"><div class="ar">ن</div><div class="name">nun</div><div class="dots">1 dot above</div></div>
          <div class="letter-cell"><div class="ar">ي</div><div class="name">ya'</div><div class="dots">2 dots below</div></div>
        </div>
      </div>

      <div class="letter-group">
        <div class="group-label">Group 2: Jim Family (3 letters, 1 base shape)</div>
        <div class="letters-row">
          <div class="letter-cell"><div class="ar">ج</div><div class="name">jim</div><div class="dots">1 dot below</div></div>
          <div class="letter-cell"><div class="ar">ح</div><div class="name">ha'</div><div class="dots">no dot</div></div>
          <div class="letter-cell"><div class="ar">خ</div><div class="name">kha'</div><div class="dots">1 dot above</div></div>
        </div>
      </div>

      <div class="letter-group">
        <div class="group-label">Group 3: Dal Family (2 letters)</div>
        <div class="letters-row">
          <div class="letter-cell"><div class="ar">د</div><div class="name">dal</div><div class="dots">no dot</div></div>
          <div class="letter-cell"><div class="ar">ذ</div><div class="name">dhal</div><div class="dots">1 dot above</div></div>
        </div>
      </div>

      <div class="letter-group">
        <div class="group-label">Group 4: Ra' Family (2 letters)</div>
        <div class="letters-row">
          <div class="letter-cell"><div class="ar">ر</div><div class="name">ra'</div><div class="dots">no dot</div></div>
          <div class="letter-cell"><div class="ar">ز</div><div class="name">zay</div><div class="dots">1 dot above</div></div>
        </div>
      </div>

      <div class="letter-group">
        <div class="group-label">Group 5: Sin Family (2 letters)</div>
        <div class="letters-row">
          <div class="letter-cell"><div class="ar">س</div><div class="name">sin</div><div class="dots">no dot</div></div>
          <div class="letter-cell"><div class="ar">ش</div><div class="name">shin</div><div class="dots">3 dots above</div></div>
        </div>
      </div>

      <div class="letter-group">
        <div class="group-label">Group 6: Sad Family (2 letters)</div>
        <div class="letters-row">
          <div class="letter-cell"><div class="ar">ص</div><div class="name">sad</div><div class="dots">no dot</div></div>
          <div class="letter-cell"><div class="ar">ض</div><div class="name">dad</div><div class="dots">1 dot above</div></div>
        </div>
      </div>

      <div class="letter-group">
        <div class="group-label">Group 7: Ta' Family (2 letters)</div>
        <div class="letters-row">
          <div class="letter-cell"><div class="ar">ط</div><div class="name">ta'</div><div class="dots">no dot</div></div>
          <div class="letter-cell"><div class="ar">ظ</div><div class="name">dha'</div><div class="dots">1 dot above</div></div>
        </div>
      </div>

      <div class="letter-group">
        <div class="group-label">Group 8: 'Ayn Family (2 letters)</div>
        <div class="letters-row">
          <div class="letter-cell"><div class="ar">ع</div><div class="name">'ayn</div><div class="dots">no dot</div></div>
          <div class="letter-cell"><div class="ar">غ</div><div class="name">ghayn</div><div class="dots">1 dot above</div></div>
        </div>
      </div>

      <div class="letter-group">
        <div class="group-label">Group 9: Fa' Family (2 letters)</div>
        <div class="letters-row">
          <div class="letter-cell"><div class="ar">ف</div><div class="name">fa'</div><div class="dots">1 dot above</div></div>
          <div class="letter-cell"><div class="ar">ق</div><div class="name">qaf</div><div class="dots">2 dots above</div></div>
        </div>
      </div>
    </div>

    <div class="standalone-section">
      <div class="group-label">Standalone Letters (unique base shapes)</div>
      <div class="letters-row" style="justify-content: center;">
        <div class="letter-cell"><div class="ar">ا</div><div class="name">alif</div></div>
        <div class="letter-cell"><div class="ar">و</div><div class="name">waw</div></div>
        <div class="letter-cell"><div class="ar">ل</div><div class="name">lam</div></div>
        <div class="letter-cell"><div class="ar">م</div><div class="name">mim</div></div>
        <div class="letter-cell"><div class="ar">ه</div><div class="name">ha'</div></div>
        <div class="letter-cell"><div class="ar">ك</div><div class="name">kaf</div></div>
      </div>
    </div>

    <div class="nonconnect-section">
      <div class="group-label">The 6 Non-Connecting Letters (never connect to following letter)</div>
      <div class="letters-row" style="justify-content: center;">
        <div class="letter-cell"><div class="ar">ا</div><div class="name">alif</div></div>
        <div class="letter-cell"><div class="ar">د</div><div class="name">dal</div></div>
        <div class="letter-cell"><div class="ar">ذ</div><div class="name">dhal</div></div>
        <div class="letter-cell"><div class="ar">ر</div><div class="name">ra'</div></div>
        <div class="letter-cell"><div class="ar">ز</div><div class="name">zay</div></div>
        <div class="letter-cell"><div class="ar">و</div><div class="name">waw</div></div>
      </div>
    </div>

    <div class="pattern-box">
      <strong>THE PATTERN: Memorize ~15 base shapes + dot positions = 28 letters</strong>
      <p>Early Arabic (pre-7th century) had NO dots -- readers relied entirely on context. Dots (i'jam) were introduced during the Umayyad period to help non-Arab Muslims read correctly. The dot system reduced ambiguity without changing the base script architecture.</p>
    </div>
  </div>
  <figcaption>
    <h2>Figure 2 &mdash; Dot-Differentiated Letter Groups</h2>
    <p>The 28 Arabic letters derive from approximately 15 unique base shapes (rasm). Green groups show how identical base shapes generate different letters through dot placement: the ba' family produces 5 letters from one shape; the jim family produces 3. Amber section shows 6 standalone letters with unique shapes. Purple section highlights the 6 non-connecting letters -- a closed class that, once memorized, explains every "unexpected" break in cursive connection. The dot system was a 7th-century innovation; before it, readers distinguished letters purely from context.</p>
  </figcaption>
</figure>
</body>
</html>
