<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Major Calligraphic Styles Compared</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --accent: #4361ee;
    --muted: #6c757d;
    --caption-bg: #f8f9fa;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --accent: #6b8aff;
      --muted: #9a9ab0;
      --caption-bg: #1a1a2e;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure { max-width: 1100px; width: 100%; }
  .diagram-container {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.5rem 1rem;
    overflow-x: auto;
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding: 1rem 1.5rem;
    background: var(--caption-bg);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
</style>
</head>
<body>
<figure>
  <div class="diagram-container">
    <pre class="mermaid">
flowchart TD
    TITLE["<strong>Arabic Calligraphic Styles</strong><br/><em>Writing as art &mdash; the word IS the sacred object</em><br/>Calligraphy holds the status in Islamic art<br/>that painting holds in Western art"]

    TITLE --> TIMELINE
    TITLE --> FUNCTION

    subgraph TIMELINE["<strong>HISTORICAL DEVELOPMENT</strong>"]
        direction LR
        T1["<strong>KUFIC</strong><br/>7th c. &bull; Kufa, Iraq<br/>Angular, geometric<br/>Earliest Quran MSS"]
        T2["<strong>NASKH</strong><br/>10th c. &bull; Ibn Muqla<br/>Round, legible<br/>Proportional system"]
        T3["<strong>THULUTH</strong><br/>11th c.<br/>Monumental<br/>&rsquo;One-third&rsquo; slope"]
        T4["<strong>NASTALIQ</strong><br/>14th c. &bull; Persia<br/>Naskh + Ta&rsquo;liq<br/>Persian/Urdu standard"]
        T5["<strong>DIWANI</strong><br/>16th c. &bull; Ottoman<br/>Court chancellery<br/>Deliberate opacity"]
        T6["<strong>RUQ'A</strong><br/>Modern<br/>Simplified<br/>Everyday handwriting"]
        T1 --> T2 --> T3 --> T4 --> T5 --> T6
    end

    subgraph FUNCTION["<strong>FUNCTIONAL SPECTRUM</strong><br/><em>From most decorative to most practical</em>"]
        direction TB
        F_DEC["<strong>DECORATIVE</strong>"]
        F1["<strong>Diwani</strong> &mdash; Ornate, interlocking, deliberately hard to read<br/><em>Ottoman court documents &bull; Security through illegibility</em>"]
        F2["<strong>Thuluth</strong> &mdash; Monumental, elegant, flowing<br/><em>Mosque inscriptions &bull; Quran chapter headings &bull; Display font</em>"]
        F3["<strong>Kufic</strong> &mdash; Angular, geometric, archival<br/><em>Early Qurans &bull; Architectural decoration &bull; Coins</em>"]
        F4["<strong>Nastaliq</strong> &mdash; Most beautiful (many say), flowing downward<br/><em>Persian &bull; Urdu &bull; Pashto &bull; NOT used for Arabic in Arab world</em>"]
        F5["<strong>Naskh</strong> &mdash; Round, clear, the universal standard<br/><em>Printed Arabic &bull; Digital fonts &bull; Modern Quran copies</em>"]
        F6["<strong>Ruq'a</strong> &mdash; Simple, rapid, minimal decoration<br/><em>Everyday handwriting &bull; Notes &bull; Informal writing</em>"]
        F_PRAC["<strong>PRACTICAL</strong>"]
        F_DEC --> F1 --> F2 --> F3 --> F4 --> F5 --> F6 --> F_PRAC
    end

    PROPORTIONS["<strong>IBN MUQLA&rsquo;S PROPORTIONAL SYSTEM (10th century)</strong><br/>All letter proportions measured by the RHOMBOID DOT<br/>(shape made by pressing pen nib at specific angle)<br/>Letters defined by dots wide x dots tall<br/><em>Calligraphy became SYSTEMATIC and TEACHABLE &mdash; a pattern system for visual form</em>"]

    COMPARE["<strong>ENGLISH COMPARISON</strong><br/>English calligraphy (Gothic, Italic, Copperplate) = decorative art<br/>Arabic calligraphy = culturally central spiritual practice<br/>No one studies English calligraphy as an act of worship"]

    style TITLE fill:#e0f2fe,stroke:#0284c7,color:#0c4a6e

    style TIMELINE fill:#dcfce7,stroke:#16a34a,color:#14532d
    style T1 fill:#f0fdf4,stroke:#22c55e,color:#14532d
    style T2 fill:#f0fdf4,stroke:#22c55e,color:#14532d
    style T3 fill:#f0fdf4,stroke:#22c55e,color:#14532d
    style T4 fill:#f0fdf4,stroke:#22c55e,color:#14532d
    style T5 fill:#f0fdf4,stroke:#22c55e,color:#14532d
    style T6 fill:#f0fdf4,stroke:#22c55e,color:#14532d

    style FUNCTION fill:#fef3c7,stroke:#d97706,color:#78350f
    style F_DEC fill:#fde68a,stroke:#d97706,color:#78350f
    style F1 fill:#fefce8,stroke:#eab308,color:#78350f
    style F2 fill:#fefce8,stroke:#eab308,color:#78350f
    style F3 fill:#fefce8,stroke:#eab308,color:#78350f
    style F4 fill:#fefce8,stroke:#eab308,color:#78350f
    style F5 fill:#fefce8,stroke:#eab308,color:#78350f
    style F6 fill:#fefce8,stroke:#eab308,color:#78350f
    style F_PRAC fill:#fde68a,stroke:#d97706,color:#78350f

    style PROPORTIONS fill:#ede9fe,stroke:#7c3aed,color:#3b0764
    style COMPARE fill:#fee2e2,stroke:#dc2626,color:#7f1d1d
    </pre>
  </div>
  <figcaption>
    <h2>Figure 5 &mdash; Major Calligraphic Styles: Timeline and Functional Spectrum</h2>
    <p>Six major Arabic calligraphic styles arranged both historically (green, left-to-right from 7th century Kufic to modern Ruq'a) and functionally (amber, from most decorative to most practical). Diwani (Ottoman court) was deliberately opaque for document security. Thuluth ("one-third") is the monumental display style for mosque inscriptions. Naskh is the universal standard for print and digital. Ruq'a is everyday handwriting. Purple box: Ibn Muqla's 10th-century proportional system made calligraphy teachable by measuring all letters in rhomboid dots. Red comparison: Arabic calligraphy holds the cultural status that painting holds in Western art, because Islamic tradition elevates the written word as the primary expression of the divine.</p>
  </figcaption>
</figure>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<script>
  mermaid.initialize({
    startOnLoad: true,
    theme: window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'neutral',
    flowchart: { useMaxWidth: true, htmlLabels: true }
  });
</script>
</body>
</html>
