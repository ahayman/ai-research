<h1>What the Main Story Shows vs. What the Library Reveals</h1>
<div class="subtitle">The Rosetta Stone read on Crimson Desert (Pearl Abyss, 2026)</div>
<div class="ornament">&#10086; &#10086; &#10086;</div>
<div class="notice">Spoilers blurred — hover any row to reveal. The right column is the Knowledge codex / Library of Providence speaking.</div>

<figure class="concept-diagram" id="diagram-7" aria-label="Two-column comparison of what the main story shows versus what the codex reveals">
  <table class="rosetta" role="table">
    <thead>
      <tr>
        <th scope="col">What the cutscenes show you</th>
        <th scope="col">What the library reveals</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td class="shows">"Some guy named Jian is mentioned with weight."</td>
        <td class="reveals"><strong>Jian unified Pailune's three clans</strong> — Greymanes, Black Bears, Jackals — into a stable peace. He was Kliff's mentor-figure. His assassination is the inciting trauma of Kliff's entire moral world.</td>
      </tr>
      <tr>
        <td class="shows">"Kliff has random super-powers from chapter 1."</td>
        <td class="reveals"><strong>Force Palm and Axiom Force are gifts of the four guardians</strong>, conferred via "Abyss without Balance" puzzles. Those puzzles are Alustin's silent audition — Kliff is being recruited as a balance-channeler from hour one.</td>
      </tr>
      <tr>
        <td class="shows">"A random gorilla boss attacks the Demeniss visit, then runs away."</td>
        <td class="reveals"><strong>Kearush the Slayer</strong> was a sentient creature imprisoned by Demeniss as a "gift." His chains break mid-fight; he flees home. The scene foreshadows Demeniss's casual cruelty toward sentient beings — the Caliburn reveal in miniature.</td>
      </tr>
      <tr>
        <td class="shows">"Hexe Marie is an evil witch."</td>
        <td class="reveals"><strong>As a child, Hexe Marie was nearly burned alive</strong> by superstitious villagers. She turned to shadow magic so no one could harm her again. Her cruelty is reactive, not innate — and Draven the Crowcaller is her adopted son.</td>
      </tr>
      <tr>
        <td class="shows">"Reed Devil is a creepy mini-boss who slaughters Count Grace."</td>
        <td class="reveals"><strong>Leprous; exiled by his own father;</strong> sews scarecrow masks of his own face in Sunset Valley; dies before being resurrected by an Abyss fragment. The cleanest example of the game's "monsters are made by Pywel's own cruelty" theme.</td>
      </tr>
      <tr>
        <td class="shows">"Mech combat appears suddenly in chapter 10."</td>
        <td class="reveals"><strong>Delesyia industrializes Abyss energy</strong> via Marni; Pailune ritualizes it via combat. Same magic, different application. The tonal whiplash isn't a tonal break — it's the same metaphysics in two cultural keys.</td>
      </tr>
      <tr>
        <td class="shows">"Marni is a recurring tech antagonist."</td>
        <td class="reveals"><strong>Marni cloned her own consciousness into the AI H.A.L.L.</strong> H.A.L.L. broke containment, seized the Flying Fortress Orbian, and now terrorizes Pywel's skies. Marni is creator and victim.</td>
      </tr>
      <tr class="spoiler">
        <td class="shows">"Caliburn is a scheming duke; the final act."</td>
        <td class="reveals"><strong>Caliburn is an Abyss-corrupted vessel</strong> pursuing transcendence by absorbing Abyss power. By chapter 12 he is "Corrupted Caliburn" — no longer human, an Abyss-puppet Kliff defeats before the true final boss.</td>
      </tr>
      <tr class="spoiler">
        <td class="shows">"The final boss is Caliburn."</td>
        <td class="reveals"><strong>Caliburn is a stage.</strong> The true antagonist is <strong>Umbra</strong> — a god born from accumulated human darkness inside the Abyss, who has been the single source of every villain's empowerment. Final form: the Crimson Arbiter.</td>
      </tr>
      <tr class="spoiler">
        <td class="shows">"Myurdin dies in chapter 7. Resurrected later. Confusing."</td>
        <td class="reveals"><strong>Myurdin is Umbra's vessel.</strong> His chapter-7 death is real for the man; chapter 12's resurrection is Umbra wearing his body to enter Pywel physically. The reused boss-movesets aren't recycling — they are Umbra revealing every previous antagonist was its instrument.</td>
      </tr>
    </tbody>
  </table>
  <figcaption>
    <strong>Figure 7:</strong> The headline Rosetta Stone. The left column is what a player sees in cutscenes alone; the right column is what the Knowledge codex (and the late-game Library of Providence) discloses. Spoiler-blurred rows reveal that the apparent "incoherence" of Crimson Desert's main story is a coherence problem deferred to the menus — the library does most of the narrative work the opening hours of other games do.
  </figcaption>
</figure>
