<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Morphological Type Comparison</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --accent: #4361ee;
    --muted: #6c757d;
    --caption-bg: #f8f9fa;
    --iso-bg: #dcfce7;
    --iso-border: #16a34a;
    --iso-text: #14532d;
    --agg-bg: #fef3c7;
    --agg-border: #d97706;
    --agg-text: #78350f;
    --fus-bg: #fce7f3;
    --fus-border: #db2777;
    --fus-text: #831843;
    --poly-bg: #ede9fe;
    --poly-border: #7c3aed;
    --poly-text: #3b0764;
    --header-bg: #e0f2fe;
    --morph-bg: #fff7ed;
    --morph-border: #ea580c;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --accent: #6b8aff;
      --muted: #9a9ab0;
      --caption-bg: #1a1a2e;
      --iso-bg: #064e3b;
      --iso-border: #34d399;
      --iso-text: #d1fae5;
      --agg-bg: #78350f;
      --agg-border: #fbbf24;
      --agg-text: #fef3c7;
      --fus-bg: #831843;
      --fus-border: #f472b6;
      --fus-text: #fce7f3;
      --poly-bg: #3b0764;
      --poly-border: #a78bfa;
      --poly-text: #ede9fe;
      --header-bg: #1e3a5f;
      --morph-bg: #431407;
      --morph-border: #fb923c;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure { max-width: 1050px; width: 100%; }
  .chart-wrapper {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.5rem 1rem;
    overflow-x: auto;
  }
  table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
    min-width: 750px;
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid var(--border);
  }
  th, td {
    padding: 0.75rem 1rem;
    text-align: left;
    vertical-align: top;
    border-bottom: 1px solid var(--border);
  }
  th {
    font-weight: 700;
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  td { font-size: 0.9rem; }
  .header-row th { background: var(--header-bg); color: var(--accent); }
  .iso-row td { background: var(--iso-bg); color: var(--iso-text); }
  .iso-row td:first-child { border-left: 4px solid var(--iso-border); font-weight: 700; }
  .agg-row td { background: var(--agg-bg); color: var(--agg-text); }
  .agg-row td:first-child { border-left: 4px solid var(--agg-border); font-weight: 700; }
  .fus-row td { background: var(--fus-bg); color: var(--fus-text); }
  .fus-row td:first-child { border-left: 4px solid var(--fus-border); font-weight: 700; }
  .poly-row td { background: var(--poly-bg); color: var(--poly-text); }
  .poly-row td:first-child { border-left: 4px solid var(--poly-border); font-weight: 700; }
  .morph-cell {
    font-family: 'Courier New', monospace;
    font-size: 0.85rem;
    background: var(--morph-bg);
    border: 1px solid var(--morph-border);
    border-radius: 4px;
    padding: 2px 6px;
    display: inline-block;
    margin: 1px 0;
  }
  .word-count { font-weight: 600; font-size: 0.8rem; opacity: 0.8; display: block; margin-top: 4px; }
  .ratio-bar {
    height: 8px;
    border-radius: 4px;
    margin-top: 4px;
    display: block;
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding: 1rem 1.5rem;
    background: var(--caption-bg);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
</style>
</head>
<body>
<figure>
  <div class="chart-wrapper">
    <table>
      <thead>
        <tr class="header-row">
          <th style="width:14%;">Type</th>
          <th style="width:14%;">Language</th>
          <th style="width:32%;">Expression: "I could not read the books"</th>
          <th style="width:20%;">Morpheme Breakdown</th>
          <th style="width:20%;">Key Properties</th>
        </tr>
      </thead>
      <tbody>
        <tr class="iso-row">
          <td>Isolating</td>
          <td>Mandarin Chinese</td>
          <td>
            <span class="morph-cell">wo</span>
            <span class="morph-cell">bu</span>
            <span class="morph-cell">neng</span>
            <span class="morph-cell">kan</span>
            <span class="morph-cell">na</span>
            <span class="morph-cell">xie</span>
            <span class="morph-cell">shu</span>
            <br/><span class="word-count">7 words, 7 morphemes</span>
            <span class="ratio-bar" style="width:20%; background:var(--iso-border);"></span>
          </td>
          <td>
            wo = I<br/>
            bu = not<br/>
            neng = can<br/>
            kan = read<br/>
            na = those<br/>
            xie = [classifier]<br/>
            shu = book
          </td>
          <td>
            1:1 morpheme-to-word ratio<br/>
            No affixes at all<br/>
            Grammar = word order<br/>
            Each word = one meaning
          </td>
        </tr>
        <tr class="agg-row">
          <td>Agglutinative</td>
          <td>Turkish</td>
          <td>
            <span class="morph-cell">kitap-lar-i</span>
            <span class="morph-cell">oku-ya-ma-di-m</span>
            <br/><span class="word-count">2 words, 8 morphemes</span>
            <span class="ratio-bar" style="width:55%; background:var(--agg-border);"></span>
          </td>
          <td>
            kitap = book<br/>
            -lar = plural<br/>
            -i = accusative<br/>
            oku = read<br/>
            -ya = ability<br/>
            -ma = negation<br/>
            -di = past tense<br/>
            -m = 1st person
          </td>
          <td>
            4:1 morpheme-to-word ratio<br/>
            Clean boundaries<br/>
            One affix = one meaning<br/>
            Fixed stacking order
          </td>
        </tr>
        <tr class="fus-row">
          <td>Fusional</td>
          <td>Latin</td>
          <td>
            <span class="morph-cell">libr-os</span>
            <span class="morph-cell">leg-ere</span>
            <span class="morph-cell">non</span>
            <span class="morph-cell">potu-i</span>
            <br/><span class="word-count">4 words, 8 morphemes</span>
            <span class="ratio-bar" style="width:40%; background:var(--fus-border);"></span>
          </td>
          <td>
            libr- = book<br/>
            -os = acc. + plural (fused!)<br/>
            leg- = read<br/>
            -ere = infinitive<br/>
            non = not<br/>
            potu- = be.able (perf. stem)<br/>
            -i = 1st sg. + perfect (fused!)
          </td>
          <td>
            2:1 morpheme-to-word ratio<br/>
            Fused boundaries<br/>
            One affix = multiple meanings<br/>
            Declension/conjugation classes
          </td>
        </tr>
        <tr class="poly-row">
          <td>Polysynthetic</td>
          <td>Inuktitut-style</td>
          <td>
            <span class="morph-cell">atuq-garunna-nngit-tunga-qalauq-tunga</span>
            <br/><span class="word-count">~1 word, ~6 morphemes</span>
            <span class="ratio-bar" style="width:90%; background:var(--poly-border);"></span>
          </td>
          <td>
            atuq- = read<br/>
            -garunna- = be able to<br/>
            -nngit- = not<br/>
            -tunga = 1st person sg.<br/>
            (books = incorporated or<br/>contextually understood)
          </td>
          <td>
            6:1+ morpheme-to-word ratio<br/>
            Word = sentence<br/>
            Noun incorporation<br/>
            Maximum synthesis
          </td>
        </tr>
      </tbody>
    </table>
  </div>
  <figcaption>
    <h2>Figure 7 &mdash; Morphological Type Comparison: One Meaning, Four Strategies</h2>
    <p>The same approximate meaning expressed across the four morphological types. Mandarin uses seven separate, uninflected words. Turkish packs eight morphemes into two words with cleanly separable suffixes. Latin fuses meanings (accusative + plural in one ending) across four words. Inuktitut-style polysynthesis compresses the entire proposition toward a single word. The colored bars illustrate relative morpheme density: green indicates low synthesis (isolating), while purple indicates maximum synthesis (polysynthetic). Real languages fall on a continuum between these idealized poles.</p>
  </figcaption>
</figure>
</body>
</html>
