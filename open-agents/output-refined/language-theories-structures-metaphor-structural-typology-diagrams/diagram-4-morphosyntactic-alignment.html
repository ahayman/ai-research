<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Morphosyntactic Alignment</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --accent: #4361ee;
    --muted: #6c757d;
    --caption-bg: #f8f9fa;
    --nom: #4361ee;
    --acc: #e63946;
    --erg: #7209b7;
    --abs: #2a9d8f;
    --s-color: #d97706;
    --line-dim: #cbd5e1;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --accent: #6b8aff;
      --muted: #9a9ab0;
      --caption-bg: #1a1a2e;
      --nom: #6b8aff;
      --acc: #ff6b7a;
      --erg: #b366ff;
      --abs: #4dd8c0;
      --s-color: #fbbf24;
      --line-dim: #475569;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure { max-width: 1000px; width: 100%; }
  .chart-wrapper {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.5rem 1rem;
    overflow-x: auto;
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding: 1rem 1.5rem;
    background: var(--caption-bg);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
</style>
</head>
<body>
<figure>
  <div class="chart-wrapper">
    <svg viewBox="0 0 920 620" xmlns="http://www.w3.org/2000/svg" style="min-width:700px;">
      <defs>
        <style>
          .title { font: bold 15px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
          .subtitle { font: 12px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
          .heading { font: bold 14px 'Segoe UI', system-ui, sans-serif; }
          .label { font: bold 12px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
          .role-label { font: bold 11px 'Segoe UI', system-ui, sans-serif; }
          .example { font: italic 11px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
          .gloss { font: 11px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
          .case-label { font: bold 10px 'Segoe UI', system-ui, sans-serif; }
          .note { font: 11px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
          .bracket { fill: none; stroke-width: 2.5; }
        </style>
        <marker id="arrowNom" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
          <path d="M0,0 L8,4 L0,8" fill="var(--nom)" />
        </marker>
        <marker id="arrowErg" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
          <path d="M0,0 L8,4 L0,8" fill="var(--erg)" />
        </marker>
      </defs>

      <text x="460" y="30" text-anchor="middle" class="title">Morphosyntactic Alignment Systems</text>
      <text x="460" y="48" text-anchor="middle" class="subtitle">How languages group the three core arguments: S (intransitive subject), A (transitive agent), P (transitive patient)</text>

      <!-- ========== NOMINATIVE-ACCUSATIVE ========== -->
      <g transform="translate(30, 75)">
        <rect x="0" y="0" width="420" height="255" rx="10" fill="none" stroke="var(--nom)" stroke-width="2"/>
        <text x="210" y="25" text-anchor="middle" class="heading" style="fill:var(--nom);">Nominative-Accusative</text>
        <text x="210" y="42" text-anchor="middle" class="example">Groups S + A together (the &quot;subject&quot;)</text>

        <!-- Three roles -->
        <g transform="translate(50, 65)">
          <!-- S role -->
          <rect x="0" y="0" width="130" height="45" rx="8" fill="none" stroke="var(--s-color)" stroke-width="2"/>
          <text x="65" y="18" text-anchor="middle" class="role-label" style="fill:var(--s-color);">S (intransitive subj)</text>
          <text x="65" y="35" text-anchor="middle" class="example">&quot;She sleeps&quot;</text>

          <!-- A role -->
          <rect x="0" y="60" width="130" height="45" rx="8" fill="none" stroke="var(--nom)" stroke-width="2"/>
          <text x="65" y="78" text-anchor="middle" class="role-label" style="fill:var(--nom);">A (transitive agent)</text>
          <text x="65" y="95" text-anchor="middle" class="example">&quot;She reads...&quot;</text>

          <!-- P role -->
          <rect x="200" y="60" width="130" height="45" rx="8" fill="none" stroke="var(--acc)" stroke-width="2"/>
          <text x="265" y="78" text-anchor="middle" class="role-label" style="fill:var(--acc);">P (transitive patient)</text>
          <text x="265" y="95" text-anchor="middle" class="example">&quot;...the book&quot;</text>

          <!-- Bracket grouping S and A -->
          <path d="M-15,22 Q-30,22 -30,50 Q-30,82 -15,82" class="bracket" stroke="var(--nom)"/>
          <text x="-45" y="56" text-anchor="middle" class="case-label" style="fill:var(--nom);">NOM</text>

          <!-- Bracket for P -->
          <path d="M345,82 Q360,82 360,82" class="bracket" stroke="var(--acc)"/>
          <text x="375" y="86" text-anchor="start" class="case-label" style="fill:var(--acc);">ACC</text>
        </g>

        <!-- Latin example -->
        <g transform="translate(30, 185)">
          <text x="0" y="0" class="label">Latin:</text>
          <text x="0" y="18" class="gloss">Puella dormit &mdash; &quot;The girl (NOM) sleeps&quot;</text>
          <text x="0" y="36" class="gloss">Puella librum legit &mdash; &quot;The girl (NOM) reads the book (ACC)&quot;</text>
          <text x="0" y="56" class="note">S and A both take nominative; P takes accusative</text>
        </g>
      </g>

      <!-- ========== ERGATIVE-ABSOLUTIVE ========== -->
      <g transform="translate(480, 75)">
        <rect x="0" y="0" width="420" height="255" rx="10" fill="none" stroke="var(--erg)" stroke-width="2"/>
        <text x="210" y="25" text-anchor="middle" class="heading" style="fill:var(--erg);">Ergative-Absolutive</text>
        <text x="210" y="42" text-anchor="middle" class="example">Groups S + P together (the &quot;absolutive&quot;)</text>

        <!-- Three roles -->
        <g transform="translate(50, 65)">
          <!-- S role -->
          <rect x="0" y="0" width="130" height="45" rx="8" fill="none" stroke="var(--s-color)" stroke-width="2"/>
          <text x="65" y="18" text-anchor="middle" class="role-label" style="fill:var(--s-color);">S (intransitive subj)</text>
          <text x="65" y="35" text-anchor="middle" class="example">&quot;The man arrived&quot;</text>

          <!-- A role -->
          <rect x="200" y="60" width="130" height="45" rx="8" fill="none" stroke="var(--erg)" stroke-width="2"/>
          <text x="265" y="78" text-anchor="middle" class="role-label" style="fill:var(--erg);">A (transitive agent)</text>
          <text x="265" y="95" text-anchor="middle" class="example">&quot;The man reads...&quot;</text>

          <!-- P role -->
          <rect x="0" y="60" width="130" height="45" rx="8" fill="none" stroke="var(--abs)" stroke-width="2"/>
          <text x="65" y="78" text-anchor="middle" class="role-label" style="fill:var(--abs);">P (transitive patient)</text>
          <text x="65" y="95" text-anchor="middle" class="example">&quot;...the book&quot;</text>

          <!-- Bracket grouping S and P -->
          <path d="M-15,22 Q-30,22 -30,50 Q-30,82 -15,82" class="bracket" stroke="var(--abs)"/>
          <text x="-45" y="56" text-anchor="middle" class="case-label" style="fill:var(--abs);">ABS</text>

          <!-- Bracket for A -->
          <path d="M345,82 Q360,82 360,82" class="bracket" stroke="var(--erg)"/>
          <text x="375" y="86" text-anchor="start" class="case-label" style="fill:var(--erg);">ERG</text>
        </g>

        <!-- Basque example -->
        <g transform="translate(30, 185)">
          <text x="0" y="0" class="label">Basque:</text>
          <text x="0" y="18" class="gloss">Gizona etorri da &mdash; &quot;The man (ABS) arrived&quot;</text>
          <text x="0" y="36" class="gloss">Gizon-ak liburua irakurri du &mdash; &quot;The man (ERG) read the book (ABS)&quot;</text>
          <text x="0" y="56" class="note">S and P both take absolutive; A takes ergative</text>
        </g>
      </g>

      <!-- ========== COMPARISON ========== -->
      <g transform="translate(30, 360)">
        <rect x="0" y="0" width="870" height="100" rx="10" fill="none" stroke="var(--s-color)" stroke-width="1.5" stroke-dasharray="6,3"/>
        <text x="435" y="25" text-anchor="middle" class="heading" style="fill:var(--s-color);">The Key Difference</text>

        <text x="30" y="50" class="gloss"><tspan font-weight="bold" fill="var(--nom)">Nom-Acc</tspan> foregrounds the <tspan font-weight="bold">actor</tspan>: S and A are grouped as &quot;subject&quot;</text>
        <text x="30" y="68" class="gloss">(the doer is the default category, regardless of transitivity)</text>

        <text x="480" y="50" class="gloss"><tspan font-weight="bold" fill="var(--erg)">Erg-Abs</tspan> foregrounds the <tspan font-weight="bold">undergoer</tspan>: S and P are grouped</text>
        <text x="480" y="68" class="gloss">(the affected entity is the default/unmarked category)</text>

        <text x="435" y="90" text-anchor="middle" class="note">~83% of languages are primarily nominative-accusative; ~17% show some form of ergative alignment</text>
      </g>

      <!-- ========== SPLIT ERGATIVITY ========== -->
      <g transform="translate(30, 480)">
        <rect x="0" y="0" width="870" height="120" rx="10" fill="none" stroke="var(--line-dim)" stroke-width="1.5"/>
        <text x="435" y="25" text-anchor="middle" class="heading" style="fill:var(--muted);">Split Ergativity: When Languages Use Both</text>

        <g transform="translate(30, 40)">
          <text x="0" y="15" class="label">By Aspect:</text>
          <text x="100" y="15" class="gloss">Georgian uses nominative-accusative in present tense, but ergative-absolutive in past/perfective</text>
        </g>

        <g transform="translate(30, 65)">
          <text x="0" y="15" class="label">By Animacy:</text>
          <text x="100" y="15" class="gloss">Dyirbal uses ergative for full nouns but switches to nominative-accusative for 1st/2nd person pronouns</text>
        </g>

        <g transform="translate(30, 90)">
          <text x="0" y="15" class="label">By Verb Type:</text>
          <text x="100" y="15" class="gloss">Hindi marks ergative only with perfective transitive verbs; imperfective uses nominative-accusative</text>
        </g>
      </g>
    </svg>
  </div>
  <figcaption>
    <h2>Figure 4 &mdash; Morphosyntactic Alignment: Two Ways to Group Arguments</h2>
    <p>Languages differ fundamentally in how they treat the three core grammatical roles. Nominative-accusative languages (most Indo-European, Afro-Asiatic, Uralic) group the intransitive subject (S) with the transitive agent (A) as the unmarked &quot;subject.&quot; Ergative-absolutive languages (Basque, many Australian and Mayan languages) group S with the transitive patient (P) as the unmarked &quot;absolutive.&quot; Many languages exhibit split ergativity, switching between systems based on tense, aspect, or animacy.</p>
  </figcaption>
</figure>
</body>
</html>
