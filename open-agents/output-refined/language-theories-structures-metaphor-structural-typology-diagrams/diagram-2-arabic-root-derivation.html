<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arabic Root Derivation — k-t-b</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --accent: #4361ee;
    --muted: #6c757d;
    --caption-bg: #f8f9fa;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --accent: #6b8aff;
      --muted: #9a9ab0;
      --caption-bg: #1a1a2e;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure { max-width: 1100px; width: 100%; }
  .diagram-container {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.5rem 1rem;
    overflow-x: auto;
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding: 1rem 1.5rem;
    background: var(--caption-bg);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
</style>
</head>
<body>
<figure>
  <div class="diagram-container">
    <pre class="mermaid">
flowchart TD
    ROOT["<strong>Root: ك-ت-ب &lpar;k-t-b&rpar;</strong><br/><em>Abstract semantic core: WRITING</em><br/>Three consonants carry the meaning"]

    ROOT --> VERB_FORMS
    ROOT --> PARTICIPLES
    ROOT --> NOUNS
    ROOT --> PLACES

    subgraph VERB_FORMS["Verb Forms &lpar;Awzān&rpar;"]
        direction TB
        V1["<strong>kataba</strong> كَتَبَ<br/><em>Pattern: CaCaCa &lpar;faʿala&rpar;</em><br/>Form I: he wrote"]
        V2["<strong>kattaba</strong><br/><em>Pattern: CaCCaCa &lpar;faʿʿala&rpar;</em><br/>Form II: he made write"]
        V3["<strong>kātaba</strong><br/><em>Pattern: CāCaCa &lpar;fāʿala&rpar;</em><br/>Form III: he corresponded"]
        V10["<strong>istaktaba</strong><br/><em>Pattern: istaCCaCa &lpar;istafʿala&rpar;</em><br/>Form X: he dictated"]
    end

    subgraph PARTICIPLES["Participles"]
        direction TB
        P1["<strong>kātib</strong> كَاتِب<br/><em>Pattern: CāCiC &lpar;fāʿil&rpar;</em><br/>Active: writer / scribe"]
        P2["<strong>maktūb</strong> مَكْتُوب<br/><em>Pattern: maCCūC &lpar;mafʿūl&rpar;</em><br/>Passive: written / fate"]
    end

    subgraph NOUNS["Nouns of Result & Instance"]
        direction TB
        N1["<strong>kitāb</strong> كِتَاب<br/><em>Pattern: CiCāC &lpar;fiʿāl&rpar;</em><br/>book"]
        N2["<strong>kutub</strong> كُتُب<br/><em>Pattern: CuCuC &lpar;fuʿul&rpar;</em><br/>books &lpar;broken plural&rpar;"]
        N3["<strong>kitāba</strong> كِتَابَة<br/><em>Pattern: CiCāCa &lpar;fiʿāla&rpar;</em><br/>the act of writing"]
        N4["<strong>kuttāb</strong> كُتَّاب<br/><em>Pattern: CuCCāC &lpar;fuʿʿāl&rpar;</em><br/>scribes / Quran school"]
    end

    subgraph PLACES["Nouns of Place & Instrument"]
        direction TB
        PL1["<strong>maktab</strong> مَكْتَب<br/><em>Pattern: maCCaC &lpar;mafʿal&rpar;</em><br/>office / desk"]
        PL2["<strong>maktaba</strong> مَكْتَبَة<br/><em>Pattern: maCCaCa &lpar;mafʿala&rpar;</em><br/>library / bookstore"]
        PL3["<strong>mukātaba</strong><br/><em>Pattern: muCāCaCa &lpar;mufāʿala&rpar;</em><br/>correspondence"]
    end

    style ROOT fill:#e0f2fe,stroke:#0284c7,color:#0c4a6e

    style VERB_FORMS fill:#dcfce7,stroke:#16a34a,color:#14532d
    style V1 fill:#f0fdf4,stroke:#22c55e,color:#14532d
    style V2 fill:#f0fdf4,stroke:#22c55e,color:#14532d
    style V3 fill:#f0fdf4,stroke:#22c55e,color:#14532d
    style V10 fill:#f0fdf4,stroke:#22c55e,color:#14532d

    style PARTICIPLES fill:#fef3c7,stroke:#d97706,color:#78350f
    style P1 fill:#fefce8,stroke:#eab308,color:#78350f
    style P2 fill:#fefce8,stroke:#eab308,color:#78350f

    style NOUNS fill:#fce7f3,stroke:#db2777,color:#831843
    style N1 fill:#fdf2f8,stroke:#ec4899,color:#831843
    style N2 fill:#fdf2f8,stroke:#ec4899,color:#831843
    style N3 fill:#fdf2f8,stroke:#ec4899,color:#831843
    style N4 fill:#fdf2f8,stroke:#ec4899,color:#831843

    style PLACES fill:#ede9fe,stroke:#7c3aed,color:#3b0764
    style PL1 fill:#f5f3ff,stroke:#8b5cf6,color:#3b0764
    style PL2 fill:#f5f3ff,stroke:#8b5cf6,color:#3b0764
    style PL3 fill:#f5f3ff,stroke:#8b5cf6,color:#3b0764
    </pre>
  </div>
  <figcaption>
    <h2>Figure 2 &mdash; Arabic Root Derivation: The k-t-b Family</h2>
    <p>Arabic morphology is a two-dimensional matrix. The consonantal root k-t-b (ك-ت-ب) carries the abstract meaning "writing," while vowel patterns (wazn/awzan) applied to the root determine grammatical function: CaCaCa (faʿala) yields a basic verb, CāCiC (faʿil) yields the active participle (doer), maCCaC (mafʿal) yields the place noun, and so on. From three consonants, Arabic generates an entire semantic family of approximately 100 related words.</p>
  </figcaption>
</figure>
