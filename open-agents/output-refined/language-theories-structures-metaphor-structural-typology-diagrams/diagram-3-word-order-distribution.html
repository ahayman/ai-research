<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Order Distribution</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --accent: #4361ee;
    --muted: #6c757d;
    --caption-bg: #f8f9fa;
    --sov: #4361ee;
    --svo: #7209b7;
    --vso: #2a9d8f;
    --vos: #e76f51;
    --ovs: #e63946;
    --osv: #f4845f;
    --nodom: #9ca3af;
    --grid: #e9ecef;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --accent: #6b8aff;
      --muted: #9a9ab0;
      --caption-bg: #1a1a2e;
      --sov: #6b8aff;
      --svo: #b366ff;
      --vso: #4dd8c0;
      --vos: #ffa07a;
      --ovs: #ff6b7a;
      --osv: #ffb380;
      --nodom: #6b7280;
      --grid: #252540;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure { max-width: 1000px; width: 100%; }
  .chart-wrapper {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.5rem 1rem;
    overflow-x: auto;
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding: 1rem 1.5rem;
    background: var(--caption-bg);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
</style>
</head>
<body>
<figure>
  <div class="chart-wrapper">
    <svg viewBox="0 0 920 580" xmlns="http://www.w3.org/2000/svg" style="min-width:700px;">
      <defs>
        <style>
          .title { font: bold 15px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
          .subtitle { font: 12px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
          .axis-text { font: 11px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
          .bar-label { font: bold 13px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
          .bar-pct { font: bold 12px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
          .bar-count { font: 11px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
          .example-text { font: italic 10px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
          .section-label { font: bold 11px 'Segoe UI', system-ui, sans-serif; fill: var(--accent); }
          .note-text { font: 11px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
        </style>
      </defs>

      <text x="460" y="30" text-anchor="middle" class="title">Word Order Distribution Across World Languages</text>
      <text x="460" y="48" text-anchor="middle" class="subtitle">Based on WALS survey of 1,377 languages</text>

      <!-- Axis -->
      <g transform="translate(160, 65)">
        <!-- Percentage scale -->
        <line x1="0" y1="0" x2="0" y2="390" stroke="var(--grid)" stroke-width="1"/>
        <!-- Grid lines at 10% intervals -->
        <line x1="0" y1="0" x2="700" y2="0" stroke="var(--grid)" stroke-width="0.5" stroke-dasharray="3,3"/>
        <line x1="170" y1="-8" x2="170" y2="390" stroke="var(--grid)" stroke-width="0.5" stroke-dasharray="3,3"/>
        <text x="170" y="405" text-anchor="middle" class="axis-text">10%</text>
        <line x1="340" y1="-8" x2="340" y2="390" stroke="var(--grid)" stroke-width="0.5" stroke-dasharray="3,3"/>
        <text x="340" y="405" text-anchor="middle" class="axis-text">20%</text>
        <line x1="510" y1="-8" x2="510" y2="390" stroke="var(--grid)" stroke-width="0.5" stroke-dasharray="3,3"/>
        <text x="510" y="405" text-anchor="middle" class="axis-text">30%</text>
        <line x1="680" y1="-8" x2="680" y2="390" stroke="var(--grid)" stroke-width="0.5" stroke-dasharray="3,3"/>
        <text x="680" y="405" text-anchor="middle" class="axis-text">40%</text>
        <text x="0" y="405" text-anchor="middle" class="axis-text">0%</text>
      </g>

      <!-- Subject-first group label -->
      <text x="20" y="78" class="section-label">Subject-first</text>
      <line x1="20" y1="84" x2="140" y2="84" stroke="var(--accent)" stroke-width="1" opacity="0.4"/>

      <!-- SOV bar -->
      <g transform="translate(0, 95)">
        <text x="155" y="16" text-anchor="end" class="bar-label">SOV</text>
        <rect x="160" y="2" width="697" height="28" rx="4" fill="var(--sov)" opacity="0.8"/>
        <text x="864" y="20" class="bar-pct">41%</text>
        <text x="864" y="36" class="bar-count">565 languages</text>
        <text x="170" y="48" class="example-text">Japanese, Korean, Turkish, Hindi, Bengali, Persian, Basque, Latin</text>
      </g>

      <!-- SVO bar -->
      <g transform="translate(0, 160)">
        <text x="155" y="16" text-anchor="end" class="bar-label">SVO</text>
        <rect x="160" y="2" width="595" height="28" rx="4" fill="var(--svo)" opacity="0.8"/>
        <text x="762" y="20" class="bar-pct">35%</text>
        <text x="762" y="36" class="bar-count">488 languages</text>
        <text x="170" y="48" class="example-text">English, Mandarin, Spanish, French, Russian, Swahili, Vietnamese</text>
      </g>

      <!-- Verb-first group label -->
      <text x="20" y="233" class="section-label">Verb-first</text>
      <line x1="20" y1="239" x2="140" y2="239" stroke="var(--accent)" stroke-width="1" opacity="0.4"/>

      <!-- VSO bar -->
      <g transform="translate(0, 250)">
        <text x="155" y="16" text-anchor="end" class="bar-label">VSO</text>
        <rect x="160" y="2" width="119" height="28" rx="4" fill="var(--vso)" opacity="0.8"/>
        <text x="284" y="20" class="bar-pct">7%</text>
        <text x="284" y="36" class="bar-count">95 langs</text>
        <text x="170" y="48" class="example-text">Classical Arabic, Irish, Welsh, Hawaiian</text>
      </g>

      <!-- VOS bar -->
      <g transform="translate(0, 305)">
        <text x="155" y="16" text-anchor="end" class="bar-label">VOS</text>
        <rect x="160" y="2" width="34" height="28" rx="4" fill="var(--vos)" opacity="0.8"/>
        <text x="200" y="20" class="bar-pct">2%</text>
        <text x="200" y="36" class="bar-count">25 langs</text>
        <text x="250" y="20" class="example-text">Malagasy, Fijian, Tzotzil</text>
      </g>

      <!-- Object-first group label -->
      <text x="20" y="368" class="section-label">Object-first</text>
      <line x1="20" y1="374" x2="140" y2="374" stroke="var(--accent)" stroke-width="1" opacity="0.4"/>

      <!-- OVS bar -->
      <g transform="translate(0, 385)">
        <text x="155" y="16" text-anchor="end" class="bar-label">OVS</text>
        <rect x="160" y="2" width="14" height="22" rx="3" fill="var(--ovs)" opacity="0.8"/>
        <text x="180" y="18" class="bar-pct">0.8%</text>
        <text x="230" y="18" class="example-text">Hixkaryana, Urarina</text>
      </g>

      <!-- OSV bar -->
      <g transform="translate(0, 415)">
        <text x="155" y="16" text-anchor="end" class="bar-label">OSV</text>
        <rect x="160" y="2" width="5" height="22" rx="2" fill="var(--osv)" opacity="0.8"/>
        <text x="172" y="18" class="bar-pct">0.3%</text>
        <text x="220" y="18" class="example-text">Warao, Nadeb</text>
      </g>

      <!-- No dominant -->
      <g transform="translate(0, 450)">
        <text x="155" y="16" text-anchor="end" class="bar-label" style="fill:var(--nodom);">None</text>
        <rect x="160" y="2" width="238" height="28" rx="4" fill="var(--nodom)" opacity="0.5"/>
        <text x="404" y="20" class="bar-pct">14%</text>
        <text x="404" y="36" class="bar-count">189 languages</text>
        <text x="170" y="48" class="example-text">Languages with flexible/free word order</text>
      </g>

      <!-- Summary bar at bottom -->
      <g transform="translate(160, 520)">
        <rect x="0" y="0" width="297" height="18" rx="3" fill="var(--sov)" opacity="0.6"/>
        <rect x="297" y="0" width="255" height="18" rx="0" fill="var(--svo)" opacity="0.6"/>
        <rect x="552" y="0" width="51" height="18" rx="0" fill="var(--vso)" opacity="0.6"/>
        <rect x="603" y="0" width="14" height="18" rx="0" fill="var(--vos)" opacity="0.6"/>
        <rect x="617" y="0" width="8" height="18" rx="0" fill="var(--ovs)" opacity="0.6"/>
        <rect x="625" y="0" width="75" height="18" rx="3" fill="var(--nodom)" opacity="0.4"/>
        <text x="148" y="13" text-anchor="middle" style="font:bold 9px 'Segoe UI',sans-serif;fill:white;">SOV</text>
        <text x="424" y="13" text-anchor="middle" style="font:bold 9px 'Segoe UI',sans-serif;fill:white;">SVO</text>
      </g>
      <text x="460" y="555" text-anchor="middle" class="note-text">Subject precedes object in ~83% of all languages (SOV + SVO + VSO) — one of the strongest universals in linguistics</text>
    </svg>
  </div>
  <figcaption>
    <h2>Figure 3 &mdash; Word Order Distribution Across World Languages</h2>
    <p>Data from the World Atlas of Language Structures (WALS, 1,377 languages). SOV and SVO together account for 76% of all languages. Object-initial orders (OVS, OSV) together represent barely 1%. Matthew Dryer argues the fundamental split is VO vs. OV (verb-object order), with subject position being secondary. The near-universal tendency for subjects to precede objects reflects cognitive priorities for agent-first information packaging.</p>
  </figcaption>
</figure>
</body>
</html>
