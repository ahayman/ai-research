<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interlocking Typological System</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --accent: #4361ee;
    --muted: #6c757d;
    --caption-bg: #f8f9fa;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --accent: #6b8aff;
      --muted: #9a9ab0;
      --caption-bg: #1a1a2e;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure { max-width: 1100px; width: 100%; }
  .diagram-container {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.5rem 1rem;
    overflow-x: auto;
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding: 1rem 1.5rem;
    background: var(--caption-bg);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
</style>
</head>
<body>
<figure>
  <div class="diagram-container">
    <pre class="mermaid">
flowchart TD
    subgraph PARAMS["TYPOLOGICAL PARAMETERS"]
        direction TB
        MORPH["<strong>Morphological Type</strong><br/>Isolating &harr; Agglutinative<br/>&harr; Fusional &harr; Polysynthetic"]
        WO["<strong>Word Order</strong><br/>SOV / SVO / VSO<br/>VO vs OV split"]
        CASE["<strong>Case System</strong><br/>None &harr; Minimal &harr; Rich<br/>Nom-Acc vs Erg-Abs"]
        AGREE["<strong>Agreement</strong><br/>None &harr; Minimal &harr;<br/>Person/Number/Gender/Class"]
        PRODROP["<strong>Pro-Drop</strong><br/>Non-pro-drop &harr;<br/>Agreement-based &harr; Discourse-based"]
    end

    MORPH <-->|"Little morphology<br/>= rigid order"| WO
    MORPH <-->|"Rich morphology<br/>= rich cases"| CASE
    CASE <-->|"Rich cases =<br/>free order"| WO
    AGREE <-->|"Rich agreement<br/>= pro-drop"| PRODROP
    MORPH <-->|"Rich morphology<br/>= rich agreement"| AGREE
    CASE <-->|"Rich cases +<br/>agreement =<br/>max flexibility"| AGREE

    subgraph JP["JAPANESE PROFILE"]
        direction LR
        JP1["Agglutinative"]
        JP2["SOV"]
        JP3["Case particles"]
        JP4["No agreement"]
        JP5["Radical pro-drop"]
        JP1 --- JP2 --- JP3 --- JP4 --- JP5
    end

    subgraph EN["ENGLISH PROFILE"]
        direction LR
        EN1["Largely isolating"]
        EN2["SVO"]
        EN3["Minimal case"]
        EN4["Minimal agreement"]
        EN5["Non-pro-drop"]
        EN1 --- EN2 --- EN3 --- EN4 --- EN5
    end

    subgraph AR["ARABIC PROFILE"]
        direction LR
        AR1["Root-and-pattern"]
        AR2["VSO/SVO"]
        AR3["3 cases &lpar;classical&rpar;"]
        AR4["Rich agreement"]
        AR5["Agreement pro-drop"]
        AR1 --- AR2 --- AR3 --- AR4 --- AR5
    end

    subgraph LA["LATIN PROFILE"]
        direction LR
        LA1["Fusional"]
        LA2["Free order &lpar;SOV default&rpar;"]
        LA3["6 cases"]
        LA4["Rich agreement"]
        LA5["Pro-drop"]
        LA1 --- LA2 --- LA3 --- LA4 --- LA5
    end

    subgraph ZH["MANDARIN PROFILE"]
        direction LR
        ZH1["Isolating"]
        ZH2["SVO"]
        ZH3["No case"]
        ZH4["No agreement"]
        ZH5["Discourse pro-drop"]
        ZH1 --- ZH2 --- ZH3 --- ZH4 --- ZH5
    end

    PARAMS ~~~ JP
    JP ~~~ EN
    EN ~~~ AR
    AR ~~~ LA
    LA ~~~ ZH

    style PARAMS fill:#e0f2fe,stroke:#0284c7,color:#0c4a6e
    style MORPH fill:#dcfce7,stroke:#16a34a,color:#14532d
    style WO fill:#fef3c7,stroke:#d97706,color:#78350f
    style CASE fill:#fce7f3,stroke:#db2777,color:#831843
    style AGREE fill:#ede9fe,stroke:#7c3aed,color:#3b0764
    style PRODROP fill:#e0f2fe,stroke:#0284c7,color:#0c4a6e

    style JP fill:#f0fdf4,stroke:#22c55e,color:#14532d
    style JP1 fill:#dcfce7,stroke:#16a34a,color:#14532d
    style JP2 fill:#dcfce7,stroke:#16a34a,color:#14532d
    style JP3 fill:#dcfce7,stroke:#16a34a,color:#14532d
    style JP4 fill:#dcfce7,stroke:#16a34a,color:#14532d
    style JP5 fill:#dcfce7,stroke:#16a34a,color:#14532d

    style EN fill:#eff6ff,stroke:#3b82f6,color:#1e3a5f
    style EN1 fill:#dbeafe,stroke:#3b82f6,color:#1e3a5f
    style EN2 fill:#dbeafe,stroke:#3b82f6,color:#1e3a5f
    style EN3 fill:#dbeafe,stroke:#3b82f6,color:#1e3a5f
    style EN4 fill:#dbeafe,stroke:#3b82f6,color:#1e3a5f
    style EN5 fill:#dbeafe,stroke:#3b82f6,color:#1e3a5f

    style AR fill:#fefce8,stroke:#eab308,color:#78350f
    style AR1 fill:#fef3c7,stroke:#d97706,color:#78350f
    style AR2 fill:#fef3c7,stroke:#d97706,color:#78350f
    style AR3 fill:#fef3c7,stroke:#d97706,color:#78350f
    style AR4 fill:#fef3c7,stroke:#d97706,color:#78350f
    style AR5 fill:#fef3c7,stroke:#d97706,color:#78350f

    style LA fill:#fdf2f8,stroke:#ec4899,color:#831843
    style LA1 fill:#fce7f3,stroke:#db2777,color:#831843
    style LA2 fill:#fce7f3,stroke:#db2777,color:#831843
    style LA3 fill:#fce7f3,stroke:#db2777,color:#831843
    style LA4 fill:#fce7f3,stroke:#db2777,color:#831843
    style LA5 fill:#fce7f3,stroke:#db2777,color:#831843

    style ZH fill:#f5f3ff,stroke:#8b5cf6,color:#3b0764
    style ZH1 fill:#ede9fe,stroke:#7c3aed,color:#3b0764
    style ZH2 fill:#ede9fe,stroke:#7c3aed,color:#3b0764
    style ZH3 fill:#ede9fe,stroke:#7c3aed,color:#3b0764
    style ZH4 fill:#ede9fe,stroke:#7c3aed,color:#3b0764
    style ZH5 fill:#ede9fe,stroke:#7c3aed,color:#3b0764
    </pre>
  </div>
  <figcaption>
    <h2>Figure 8 &mdash; The Interlocking Typological System</h2>
    <p>Typological parameters are not independent knobs &mdash; they form a mutually constraining system. Morphological richness enables case systems and agreement, which in turn license free word order and pro-drop. The five language profiles illustrate how parameters cohere: Japanese is consistently head-final, agglutinative, case-marked, and pro-drop. English has lost most morphology and compensated with rigid SVO order and mandatory pronouns. Latin's rich fusional morphology supports free word order, rich agreement, and pro-drop. Languages are integrated systems where structural choices in one domain constrain possibilities in others.</p>
  </figcaption>
</figure>
