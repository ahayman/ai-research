<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Greenberg's Universals Network</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --accent: #4361ee;
    --muted: #6c757d;
    --caption-bg: #f8f9fa;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --accent: #6b8aff;
      --muted: #9a9ab0;
      --caption-bg: #1a1a2e;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure { max-width: 1100px; width: 100%; }
  .diagram-container {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.5rem 1rem;
    overflow-x: auto;
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding: 1rem 1.5rem;
    background: var(--caption-bg);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
</style>
</head>
<body>
<figure>
  <div class="diagram-container">
    <pre class="mermaid">
flowchart TD
    subgraph ABSOLUTE["ABSOLUTE UNIVERSALS &lpar;No exceptions&rpar;"]
        direction TB
        U1["<strong>#1</strong><br/>Subject nearly always<br/>precedes Object"]
        U3["<strong>#3</strong><br/>VSO languages are<br/>always prepositional"]
        U34["<strong>#34</strong><br/>If dual number exists,<br/>plural also exists"]
        U36["<strong>#36</strong><br/>If noun has gender,<br/>pronoun has gender"]
    end

    subgraph WORD_ORDER["WORD ORDER IMPLICATIONS"]
        direction TB
        SOV_NODE["<strong>SOV order</strong><br/><em>41% of languages</em>"]
        SVO_NODE["<strong>SVO order</strong><br/><em>35% of languages</em>"]
        VSO_NODE["<strong>VSO order</strong><br/><em>7% of languages</em>"]

        SOV_NODE -->|"#4: overwhelmingly"| POST["Postpositions"]
        SOV_NODE -->|"#2 correlate"| GEN_N["Genitive before Noun"]
        SOV_NODE -->|"tendency"| ADJ_N["Adjective before Noun"]

        VSO_NODE -->|"#3: always"| PREP["Prepositions"]
        VSO_NODE -->|"#16: always"| AUX_V["Auxiliary before Verb"]

        SVO_NODE -->|"tendency"| PREP
        SVO_NODE -->|"#2 correlate"| N_GEN["Noun before Genitive"]
    end

    subgraph IMPL["IMPLICATIONAL CHAINS"]
        direction TB
        PREP -->|"#2: then"| N_GEN
        POST -->|"#2: then"| GEN_N

        PREP -->|"#9: then"| Q_INIT["Question particle<br/>sentence-initial"]
        POST -->|"#9: then"| Q_FINAL["Question particle<br/>sentence-final"]

        U34_2["Dual number"] -->|"#34: implies"| PLURAL["Plural number"]
        TRIAL["Trial number"] -->|"implies"| U34_2

        U36_2["Gender in nouns"] -->|"#36: implies"| GENDER_PRO["Gender in pronouns"]
        GENDER_PRO -->|"#43: implies"| GEN_3RD["Gender distinction<br/>in 3rd person"]
        GENDER_PRO -->|"#45: implies"| GEN_ADJ["Gender in adjectives"]
    end

    subgraph MODIFIER["MODIFIER ORDER &lpar;#20&rpar;"]
        direction LR
        DEM["Demonstrative"] --> NUM["Numeral"] --> ADJ["Adjective"] --> NOUN["NOUN"]
        NOUN_2["NOUN"] --> ADJ_2["Adjective"] --> NUM_2["Numeral"] --> DEM_2["Demonstrative"]
    end

    style ABSOLUTE fill:#fee2e2,stroke:#dc2626,color:#7f1d1d
    style U1 fill:#fef2f2,stroke:#ef4444,color:#7f1d1d
    style U3 fill:#fef2f2,stroke:#ef4444,color:#7f1d1d
    style U34 fill:#fef2f2,stroke:#ef4444,color:#7f1d1d
    style U36 fill:#fef2f2,stroke:#ef4444,color:#7f1d1d

    style WORD_ORDER fill:#e0f2fe,stroke:#0284c7,color:#0c4a6e
    style SOV_NODE fill:#ede9fe,stroke:#7c3aed,color:#3b0764
    style SVO_NODE fill:#dcfce7,stroke:#16a34a,color:#14532d
    style VSO_NODE fill:#fef3c7,stroke:#d97706,color:#78350f
    style POST fill:#f5f3ff,stroke:#8b5cf6,color:#3b0764
    style PREP fill:#f0fdf4,stroke:#22c55e,color:#14532d
    style GEN_N fill:#f5f3ff,stroke:#8b5cf6,color:#3b0764
    style N_GEN fill:#f0fdf4,stroke:#22c55e,color:#14532d
    style ADJ_N fill:#f5f3ff,stroke:#8b5cf6,color:#3b0764
    style AUX_V fill:#fefce8,stroke:#eab308,color:#78350f

    style IMPL fill:#f0f9ff,stroke:#0284c7,color:#0c4a6e
    style Q_INIT fill:#f0fdf4,stroke:#22c55e,color:#14532d
    style Q_FINAL fill:#f5f3ff,stroke:#8b5cf6,color:#3b0764
    style U34_2 fill:#fce7f3,stroke:#db2777,color:#831843
    style PLURAL fill:#fce7f3,stroke:#db2777,color:#831843
    style TRIAL fill:#fce7f3,stroke:#db2777,color:#831843
    style U36_2 fill:#fef3c7,stroke:#d97706,color:#78350f
    style GENDER_PRO fill:#fef3c7,stroke:#d97706,color:#78350f
    style GEN_3RD fill:#fef3c7,stroke:#d97706,color:#78350f
    style GEN_ADJ fill:#fef3c7,stroke:#d97706,color:#78350f

    style MODIFIER fill:#f8fafc,stroke:#94a3b8,color:#334155
    style DEM fill:#e0f2fe,stroke:#0284c7,color:#0c4a6e
    style NUM fill:#e0f2fe,stroke:#0284c7,color:#0c4a6e
    style ADJ fill:#e0f2fe,stroke:#0284c7,color:#0c4a6e
    style NOUN fill:#e0f2fe,stroke:#0284c7,color:#0c4a6e
    style NOUN_2 fill:#e0f2fe,stroke:#0284c7,color:#0c4a6e
    style ADJ_2 fill:#e0f2fe,stroke:#0284c7,color:#0c4a6e
    style NUM_2 fill:#e0f2fe,stroke:#0284c7,color:#0c4a6e
    style DEM_2 fill:#e0f2fe,stroke:#0284c7,color:#0c4a6e
    </pre>
  </div>
  <figcaption>
    <h2>Figure 6 &mdash; Greenberg's Universals Network</h2>
    <p>Joseph Greenberg's 1963 paper identified 45 universals from a sample of 30 languages. This diagram shows the network of implicational relationships. Absolute universals (red) hold without exception. Word order implications (blue) show how SOV, SVO, and VSO orders predict adposition type, genitive position, and auxiliary placement. Implicational chains (light blue) show cascading dependencies: prepositions predict genitive-after-noun and sentence-initial question particles; the existence of dual number implies plural; gender in nouns implies gender in pronouns, which implies 3rd-person gender distinctions. Universal #20 constrains modifier order around the noun.</p>
  </figcaption>
</figure>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<script>
  mermaid.initialize({
    startOnLoad: true,
    theme: window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'neutral',
    flowchart: { useMaxWidth: true, htmlLabels: true }
  });
</script>
</body>
</html>
