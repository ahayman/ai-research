<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Morphological Typology Tree</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --accent: #4361ee;
    --muted: #6c757d;
    --caption-bg: #f8f9fa;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --accent: #6b8aff;
      --muted: #9a9ab0;
      --caption-bg: #1a1a2e;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure { max-width: 1100px; width: 100%; }
  .diagram-container {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.5rem 1rem;
    overflow-x: auto;
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding: 1rem 1.5rem;
    background: var(--caption-bg);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
</style>
</head>
<body>
<figure>
  <div class="diagram-container">
    <pre class="mermaid">
flowchart TD
    ROOT["<strong>Morphological Typology</strong><br/><em>How languages build words</em><br/>Key variable: morpheme-to-word ratio"]

    ROOT --> ISO
    ROOT --> AGG
    ROOT --> FUS
    ROOT --> POLY

    subgraph ISO_BOX["ISOLATING (Analytic)"]
        ISO["<strong>~1:1 morpheme-to-word</strong><br/>Grammar lives in word order,<br/>not word structure"]
        ISO --> ISO_EX["<strong>Mandarin Chinese</strong><br/><em>wǒ kàn shū</em><br/>(I read book) — 3 words, 3 morphemes"]
        ISO --> ISO_EX2["<strong>Vietnamese</strong><br/><em>đã/đang/sẽ</em> + unchanged verb<br/>Separate particles mark tense"]
        ISO --> ISO_CHAR["No affixes &bull; No conjugation<br/>No declension &bull; No agreement<br/>Rigid word order required"]
    end

    subgraph AGG_BOX["AGGLUTINATIVE"]
        AGG["<strong>High ratio, clean boundaries</strong><br/>Each morpheme = one meaning<br/>Glued together transparently"]
        AGG --> AGG_EX["<strong>Turkish</strong><br/><em>ev-ler-im-iz-den</em><br/>(house-PL-POSS.1-PL-ABL)<br/>&lpar;from our houses&rpar;"]
        AGG --> AGG_EX2["<strong>Japanese</strong><br/><em>tabe-sase-rare-nakat-ta</em><br/>(eat-CAUS-PASS-NEG-PAST)"]
        AGG --> AGG_CHAR["One affix = one meaning<br/>Fixed stacking order<br/>Highly regular / predictable"]
    end

    subgraph FUS_BOX["FUSIONAL (Inflectional)"]
        FUS["<strong>High ratio, fused boundaries</strong><br/>Multiple meanings packed<br/>into single inseparable morpheme"]
        FUS --> FUS_EX["<strong>Latin</strong><br/><em>am-ō</em> &lpar;I love&rpar;<br/>-ō = 1st person + singular +<br/>present + active + indicative"]
        FUS --> FUS_EX2["<strong>Russian</strong><br/><em>knig-ami</em> &lpar;with books&rpar;<br/>-ami = instrumental + plural"]
        FUS --> FUS_CHAR["Portmanteau endings<br/>Declension/conjugation classes<br/>Irregular paradigms common"]
    end

    subgraph POLY_BOX["POLYSYNTHETIC"]
        POLY["<strong>Very high ratio (10:1+)</strong><br/>Entire propositions packed<br/>into a single word"]
        POLY --> POLY_EX["<strong>Inuktitut</strong><br/><em>tusaatsiarunnanngittualuujunga</em><br/>(I can't hear very well)<br/>6 morphemes, 1 word = 1 sentence"]
        POLY --> POLY_EX2["<strong>Mohawk</strong><br/>Noun incorporation:<br/>object embedded inside verb"]
        POLY --> POLY_CHAR["Word = sentence<br/>Noun incorporation<br/>Extremely high synthesis"]
    end

    style ROOT fill:#e0f2fe,stroke:#0284c7,color:#0c4a6e
    style ISO_BOX fill:#dcfce7,stroke:#16a34a,color:#14532d
    style ISO fill:#bbf7d0,stroke:#16a34a,color:#14532d
    style ISO_EX fill:#f0fdf4,stroke:#22c55e,color:#14532d
    style ISO_EX2 fill:#f0fdf4,stroke:#22c55e,color:#14532d
    style ISO_CHAR fill:#f0fdf4,stroke:#22c55e,color:#14532d

    style AGG_BOX fill:#fef3c7,stroke:#d97706,color:#78350f
    style AGG fill:#fde68a,stroke:#d97706,color:#78350f
    style AGG_EX fill:#fefce8,stroke:#eab308,color:#78350f
    style AGG_EX2 fill:#fefce8,stroke:#eab308,color:#78350f
    style AGG_CHAR fill:#fefce8,stroke:#eab308,color:#78350f

    style FUS_BOX fill:#fce7f3,stroke:#db2777,color:#831843
    style FUS fill:#fbcfe8,stroke:#db2777,color:#831843
    style FUS_EX fill:#fdf2f8,stroke:#ec4899,color:#831843
    style FUS_EX2 fill:#fdf2f8,stroke:#ec4899,color:#831843
    style FUS_CHAR fill:#fdf2f8,stroke:#ec4899,color:#831843

    style POLY_BOX fill:#ede9fe,stroke:#7c3aed,color:#3b0764
    style POLY fill:#ddd6fe,stroke:#7c3aed,color:#3b0764
    style POLY_EX fill:#f5f3ff,stroke:#8b5cf6,color:#3b0764
    style POLY_EX2 fill:#f5f3ff,stroke:#8b5cf6,color:#3b0764
    style POLY_CHAR fill:#f5f3ff,stroke:#8b5cf6,color:#3b0764
    </pre>
  </div>
  <figcaption>
    <h2>Figure 1 &mdash; Morphological Typology Tree</h2>
    <p>The four primary morphological types, arranged by morpheme-to-word ratio. Isolating languages (green) have one morpheme per word and rely on word order. Agglutinative languages (amber) stack discrete, transparent affixes. Fusional languages (pink) pack multiple meanings into single inseparable endings. Polysynthetic languages (purple) compress entire sentences into single words. Real languages exist on a continuum between these idealized types (Greenberg 1960, Sapir 1921).</p>
  </figcaption>
</figure>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<script>
  mermaid.initialize({
    startOnLoad: true,
    theme: window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'neutral',
    flowchart: { useMaxWidth: true, htmlLabels: true }
  });
</script>
</body>
</html>
