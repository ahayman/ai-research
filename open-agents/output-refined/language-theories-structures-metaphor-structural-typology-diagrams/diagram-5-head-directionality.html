<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Head-Directionality Correlations</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --accent: #4361ee;
    --muted: #6c757d;
    --caption-bg: #f8f9fa;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --accent: #6b8aff;
      --muted: #9a9ab0;
      --caption-bg: #1a1a2e;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure { max-width: 1100px; width: 100%; }
  .diagram-container {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.5rem 1rem;
    overflow-x: auto;
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding: 1rem 1.5rem;
    background: var(--caption-bg);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
</style>
</head>
<body>
<figure>
  <div class="diagram-container">
    <pre class="mermaid">
flowchart LR
    CENTER["<strong>Head-Directionality</strong><br/><em>Harmony Principle</em><br/>Languages tend toward<br/>consistent head position"]

    CENTER --> HI
    CENTER --> HF

    subgraph HI_BOX["HEAD-INITIAL Languages"]
        direction TB
        HI["<strong>Head comes FIRST</strong><br/><em>Governing element precedes<br/>its complement</em>"]

        HI --> HI1["<strong>Verb-Object</strong> &lpar;VO&rpar;<br/><em>read</em> <strong>the book</strong>"]
        HI --> HI2["<strong>Prepositions</strong><br/><em>in</em> <strong>the house</strong>"]
        HI --> HI3["<strong>Noun-Genitive</strong><br/><em>the king</em> <strong>of France</strong>"]
        HI --> HI4["<strong>Noun-Adjective</strong><br/><em>la maison</em> <strong>grande</strong>"]
        HI --> HI5["<strong>Aux-Verb</strong><br/><em>will</em> <strong>go</strong>"]
        HI --> HI6["<strong>Comp-Clause</strong><br/><em>that</em> <strong>she left</strong>"]

        HI_LANGS["<strong>Examples:</strong><br/>English, Irish, Arabic,<br/>Spanish, Tagalog"]
    end

    subgraph HF_BOX["HEAD-FINAL Languages"]
        direction TB
        HF["<strong>Head comes LAST</strong><br/><em>Complement precedes<br/>the governing element</em>"]

        HF --> HF1["<strong>Object-Verb</strong> &lpar;OV&rpar;<br/><strong>本を</strong> <em>読む</em> &lpar;book read&rpar;"]
        HF --> HF2["<strong>Postpositions</strong><br/><strong>家</strong> <em>に</em> &lpar;house to&rpar;"]
        HF --> HF3["<strong>Genitive-Noun</strong><br/><strong>フランスの</strong> <em>王</em> &lpar;France's king&rpar;"]
        HF --> HF4["<strong>Adjective-Noun</strong><br/><strong>大きい</strong> <em>家</em> &lpar;big house&rpar;"]
        HF --> HF5["<strong>Verb-Aux</strong><br/><strong>行って</strong> <em>いる</em> &lpar;going is&rpar;"]
        HF --> HF6["<strong>Clause-Comp</strong><br/><strong>彼女が出た</strong> <em>と</em> &lpar;she left COMP&rpar;"]

        HF_LANGS["<strong>Examples:</strong><br/>Japanese, Korean, Turkish,<br/>Hindi, Basque"]
    end

    subgraph MIX["MIXED Head-Direction"]
        direction TB
        MIX1["<strong>German</strong><br/>Head-initial in main clauses<br/>Head-final in subordinate clauses"]
        MIX2["<strong>Mandarin</strong><br/>Prepositions &lpar;head-initial&rpar;<br/>but some OV constructions"]
        MIX3["<strong>Persian</strong><br/>Prepositions + VO &lpar;head-initial&rpar;<br/>but Adj-N &lpar;head-final mix&rpar;"]
        MIX1 ~~~ MIX2 ~~~ MIX3
    end

    HI_BOX ~~~ MIX
    HF_BOX ~~~ MIX

    style CENTER fill:#e0f2fe,stroke:#0284c7,color:#0c4a6e

    style HI_BOX fill:#dcfce7,stroke:#16a34a,color:#14532d
    style HI fill:#bbf7d0,stroke:#16a34a,color:#14532d
    style HI1 fill:#f0fdf4,stroke:#22c55e,color:#14532d
    style HI2 fill:#f0fdf4,stroke:#22c55e,color:#14532d
    style HI3 fill:#f0fdf4,stroke:#22c55e,color:#14532d
    style HI4 fill:#f0fdf4,stroke:#22c55e,color:#14532d
    style HI5 fill:#f0fdf4,stroke:#22c55e,color:#14532d
    style HI6 fill:#f0fdf4,stroke:#22c55e,color:#14532d
    style HI_LANGS fill:#dcfce7,stroke:#16a34a,color:#14532d

    style HF_BOX fill:#ede9fe,stroke:#7c3aed,color:#3b0764
    style HF fill:#ddd6fe,stroke:#7c3aed,color:#3b0764
    style HF1 fill:#f5f3ff,stroke:#8b5cf6,color:#3b0764
    style HF2 fill:#f5f3ff,stroke:#8b5cf6,color:#3b0764
    style HF3 fill:#f5f3ff,stroke:#8b5cf6,color:#3b0764
    style HF4 fill:#f5f3ff,stroke:#8b5cf6,color:#3b0764
    style HF5 fill:#f5f3ff,stroke:#8b5cf6,color:#3b0764
    style HF6 fill:#f5f3ff,stroke:#8b5cf6,color:#3b0764
    style HF_LANGS fill:#ede9fe,stroke:#7c3aed,color:#3b0764

    style MIX fill:#fef3c7,stroke:#d97706,color:#78350f
    style MIX1 fill:#fefce8,stroke:#eab308,color:#78350f
    style MIX2 fill:#fefce8,stroke:#eab308,color:#78350f
    style MIX3 fill:#fefce8,stroke:#eab308,color:#78350f
    </pre>
  </div>
  <figcaption>
    <h2>Figure 5 &mdash; Head-Directionality Correlations</h2>
    <p>The Harmony Principle: word-order properties cluster into coherent bundles. Head-initial languages (green) consistently place the governing element first across all phrase types &mdash; VO order, prepositions, noun-before-genitive, auxiliary-before-verb. Head-final languages (purple) do the opposite. Most languages are predominantly consistent, but exceptions exist (amber): German, Mandarin, and Persian each mix head-initial and head-final properties. This clustering was first systematized by Greenberg (1963) and later formalized as the Head-Directionality Parameter.</p>
  </figcaption>
</figure>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>

    startOnLoad: true,

    flowchart: { useMaxWidth: true, htmlLabels: true }
  });
</script>
</body>
</html>
