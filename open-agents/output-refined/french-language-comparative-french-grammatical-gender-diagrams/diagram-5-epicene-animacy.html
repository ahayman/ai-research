<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Epicene, Fixed-Gender, and Animacy Patterns</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --masc-color: #3b82f6;
    --masc-bg: #eff6ff;
    --fem-color: #ec4899;
    --fem-bg: #fdf2f8;
    --both-color: #8b5cf6;
    --both-bg: #f5f3ff;
    --mismatch-color: #f59e0b;
    --mismatch-bg: #fffbeb;
    --en-color: #10b981;
    --en-bg: #ecfdf5;
    --muted: #6c757d;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --masc-color: #60a5fa;
      --masc-bg: #1e293b;
      --fem-color: #f472b6;
      --fem-bg: #2a1525;
      --both-color: #a78bfa;
      --both-bg: #1e1b3a;
      --mismatch-color: #fbbf24;
      --mismatch-bg: #2a2510;
      --en-color: #34d399;
      --en-bg: #132e24;
      --muted: #9a9ab0;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure {
    max-width: 1100px;
    width: 100%;
    background: var(--surface);
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
  }
  h2 { text-align: center; font-size: 1.4rem; margin-bottom: 0.3rem; }
  .subtitle { text-align: center; font-size: 0.95rem; color: var(--muted); margin-bottom: 2rem; }

  .categories {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.2rem;
    margin-bottom: 1.5rem;
  }
  .cat-card {
    border: 2px solid;
    border-radius: 12px;
    padding: 1.25rem;
  }
  .cat-card h3 { font-size: 0.95rem; margin-bottom: 0.6rem; }
  .cat-card .cat-desc { font-size: 0.82rem; color: var(--muted); margin-bottom: 0.5rem; }

  .cat-card.epicene { border-color: var(--both-color); }
  .cat-card.epicene h3 { color: var(--both-color); }
  .cat-card.fixed { border-color: var(--mismatch-color); }
  .cat-card.fixed h3 { color: var(--mismatch-color); }
  .cat-card.paired { border-color: var(--masc-color); }
  .cat-card.paired h3 { color: var(--masc-color); }
  .cat-card.single { border-color: var(--fem-color); }
  .cat-card.single h3 { color: var(--fem-color); }

  .example-list { list-style: none; font-size: 0.82rem; }
  .example-list li { padding: 0.25rem 0; border-bottom: 1px solid var(--border); }
  .example-list li:last-child { border-bottom: none; }
  .ex-fr { font-weight: 600; }
  .ex-masc { color: var(--masc-color); }
  .ex-fem { color: var(--fem-color); }
  .ex-note { font-size: 0.75rem; color: var(--muted); font-style: italic; display: block; }

  .mismatch-highlight {
    margin-top: 1.5rem;
    padding: 1.25rem;
    background: var(--mismatch-bg);
    border: 2px solid var(--mismatch-color);
    border-radius: 12px;
  }
  .mismatch-highlight h3 { color: var(--mismatch-color); font-size: 1rem; margin-bottom: 0.5rem; }
  .mismatch-highlight p { font-size: 0.85rem; }
  .mismatch-example {
    margin: 0.5rem 0;
    padding: 0.5rem 0.8rem;
    border-radius: 6px;
    background: var(--surface);
    font-style: italic;
    font-size: 0.85rem;
  }

  .english-comparison {
    margin-top: 1.5rem;
    padding: 1rem;
    background: var(--en-bg);
    border: 2px solid var(--en-color);
    border-radius: 10px;
  }
  .english-comparison h3 { color: var(--en-color); font-size: 0.95rem; margin-bottom: 0.4rem; }
  .english-comparison p { font-size: 0.85rem; }

  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid var(--border);
  }
  figcaption strong { display: block; font-size: 1.05rem; margin-bottom: 0.4rem; }
  figcaption span { font-size: 0.88rem; color: var(--muted); line-height: 1.5; }
  @media (max-width: 700px) {
    figure { padding: 1.2rem; }
    .categories { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<figure>
  <h2>Epicene, Fixed-Gender, and Animacy Patterns</h2>
  <p class="subtitle">How French gender handles living beings -- and where grammar and biology diverge</p>

  <div class="categories">
    <!-- Category 1: Epicene -->
    <div class="cat-card epicene">
      <h3>1. Epicene Nouns (same form, gender varies)</h3>
      <p class="cat-desc">The noun itself does not change. Only the article signals the referent's sex.</p>
      <ul class="example-list">
        <li><span class="ex-fr"><span class="ex-masc">un</span> / <span class="ex-fem">une</span> enfant</span> -- a child</li>
        <li><span class="ex-fr"><span class="ex-masc">un</span> / <span class="ex-fem">une</span> artiste</span> -- an artist</li>
        <li><span class="ex-fr"><span class="ex-masc">un</span> / <span class="ex-fem">une</span> &eacute;l&egrave;ve</span> -- a student</li>
        <li><span class="ex-fr"><span class="ex-masc">un</span> / <span class="ex-fem">une</span> journaliste</span> -- a journalist</li>
      </ul>
    </div>

    <!-- Category 2: Fixed-gender -->
    <div class="cat-card fixed">
      <h3>2. Fixed-Gender Nouns (grammar =/= biology)</h3>
      <p class="cat-desc">Grammatical gender is locked regardless of the referent's actual sex.</p>
      <ul class="example-list">
        <li><span class="ex-fr ex-fem">une personne</span> -- ALWAYS feminine, even for men<span class="ex-note">"Cette personne est un bon m&eacute;decin"</span></li>
        <li><span class="ex-fr ex-masc">un t&eacute;moin</span> -- ALWAYS masculine, even for women</li>
        <li><span class="ex-fr ex-fem">une victime</span> -- ALWAYS feminine<span class="ex-note">"Il est la victime" (He is the victim-FEM)</span></li>
        <li><span class="ex-fr ex-fem">une sentinelle</span> -- ALWAYS feminine (a sentinel)</li>
      </ul>
    </div>

    <!-- Category 3: Gendered pairs -->
    <div class="cat-card paired">
      <h3>3. Gendered Pairs (distinct forms)</h3>
      <p class="cat-desc">Entirely different words for male and female of the same kind.</p>
      <ul class="example-list">
        <li><span class="ex-fr ex-masc">le cheval</span> / <span class="ex-fr ex-fem">la jument</span> -- horse / mare</li>
        <li><span class="ex-fr ex-masc">le taureau</span> / <span class="ex-fr ex-fem">la vache</span> -- bull / cow</li>
        <li><span class="ex-fr ex-masc">le coq</span> / <span class="ex-fr ex-fem">la poule</span> -- rooster / hen</li>
        <li><span class="ex-fr ex-masc">le roi</span> / <span class="ex-fr ex-fem">la reine</span> -- king / queen</li>
      </ul>
    </div>

    <!-- Category 4: Single-gender animals -->
    <div class="cat-card single">
      <h3>4. Single-Gender Animals</h3>
      <p class="cat-desc">One fixed grammatical gender regardless of the animal's actual sex.</p>
      <ul class="example-list">
        <li><span class="ex-fr ex-fem">une souris</span> -- a mouse (always FEM)</li>
        <li><span class="ex-fr ex-masc">un escargot</span> -- a snail (always MASC)</li>
        <li><span class="ex-fr ex-fem">une girafe</span> -- a giraffe (always FEM)</li>
        <li><span class="ex-fr ex-masc">un &eacute;l&eacute;phant</span> -- an elephant (always MASC)</li>
      </ul>
    </div>
  </div>

  <!-- Mismatch highlight -->
  <div class="mismatch-highlight">
    <h3>The Proof That Gender Is GRAMMATICAL, Not Semantic</h3>
    <p>The fixed-gender nouns are the clearest evidence that French grammatical gender is a syntactic category, not a semantic one:</p>
    <div class="mismatch-example">
      A male person can be <strong>une personne</strong> (FEM) and <strong>une victime</strong> (FEM).<br>
      A female person can be <strong>un t&eacute;moin</strong> (MASC) and <strong>un m&eacute;decin</strong> (traditionally MASC).
    </div>
    <p style="font-size:0.82rem;color:var(--muted);margin-top:0.5rem;">If gender were truly about sex, these mismatches would be impossible. The fact that they exist -- and are perfectly normal -- proves that gender is a formal, grammatical property of the NOUN, not a reflection of the REFERENT.</p>
  </div>

  <!-- English comparison -->
  <div class="english-comparison">
    <h3>English Comparison</h3>
    <p>English handles all of this through natural (semantic) gender: "The person... she," "The victim... he." English uses "it" as the default pronoun for all non-human nouns. The mismatch cases that arise naturally in French (grammatical gender contradicting referent sex) simply cannot occur in English, because English has no grammatical gender to contradict anything.</p>
  </div>

  <figcaption>
    <strong>Figure 5: Epicene, Fixed-Gender, and Animacy Patterns</strong>
    <span>French handles living beings through four distinct patterns: epicene nouns (same form, article signals sex), fixed-gender nouns (grammatical gender locked regardless of referent), gendered pairs (distinct words for male and female), and single-gender animals (one gender for both sexes). The fixed-gender cases -- where grammatical gender contradicts the referent's sex -- provide the strongest evidence that French gender is truly grammatical, not semantic.</span>
  </figcaption>
</figure>
</body>
</html>
