<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meaning-Changing Gender Pairs</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --masc-color: #3b82f6;
    --masc-bg: #eff6ff;
    --fem-color: #ec4899;
    --fem-bg: #fdf2f8;
    --en-color: #10b981;
    --en-bg: #ecfdf5;
    --highlight: #8b5cf6;
    --highlight-bg: #f5f3ff;
    --muted: #6c757d;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --masc-color: #60a5fa;
      --masc-bg: #1e293b;
      --fem-color: #f472b6;
      --fem-bg: #2a1525;
      --en-color: #34d399;
      --en-bg: #132e24;
      --highlight: #a78bfa;
      --highlight-bg: #1e1b3a;
      --muted: #9a9ab0;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure {
    max-width: 1100px;
    width: 100%;
    background: var(--surface);
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
  }
  h2 { text-align: center; font-size: 1.4rem; margin-bottom: 0.3rem; }
  .subtitle { text-align: center; font-size: 0.95rem; color: var(--muted); margin-bottom: 2rem; }

  .pairs-table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 1.5rem;
  }
  .pairs-table th {
    padding: 0.6rem 0.8rem;
    font-size: 0.78rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    border-bottom: 2px solid var(--border);
  }
  .pairs-table th.masc-header { color: var(--masc-color); text-align: left; }
  .pairs-table th.fem-header { color: var(--fem-color); text-align: left; }
  .pairs-table th.word-header { text-align: center; color: var(--highlight); }
  .pairs-table td {
    padding: 0.5rem 0.8rem;
    border-bottom: 1px solid var(--border);
    font-size: 0.85rem;
    vertical-align: top;
  }
  .pairs-table tr:last-child td { border-bottom: none; }

  .pair-word {
    text-align: center;
    font-weight: 700;
    font-size: 1.1rem;
    font-family: 'Courier New', monospace;
    color: var(--highlight);
  }
  .masc-meaning { color: var(--masc-color); font-weight: 600; }
  .fem-meaning { color: var(--fem-color); font-weight: 600; }
  .article-tag {
    display: inline-block;
    font-size: 0.72rem;
    padding: 1px 6px;
    border-radius: 10px;
    font-weight: 700;
    margin-right: 0.3rem;
  }
  .article-tag.le { background: var(--masc-bg); color: var(--masc-color); }
  .article-tag.la { background: var(--fem-bg); color: var(--fem-color); }
  .meaning-detail { font-size: 0.78rem; color: var(--muted); }

  .disambiguation-box {
    padding: 1.25rem;
    background: var(--highlight-bg);
    border: 2px solid var(--highlight);
    border-radius: 12px;
    margin-bottom: 1.5rem;
  }
  .disambiguation-box h3 { color: var(--highlight); font-size: 1rem; margin-bottom: 0.5rem; }
  .disambiguation-box p { font-size: 0.85rem; }
  .demo-sentence {
    margin: 0.5rem 0;
    padding: 0.5rem 0.8rem;
    border-radius: 6px;
    font-style: italic;
  }
  .demo-sentence.masc-demo { background: var(--masc-bg); border-left: 3px solid var(--masc-color); }
  .demo-sentence.fem-demo { background: var(--fem-bg); border-left: 3px solid var(--fem-color); }

  .english-comparison {
    padding: 1rem;
    background: var(--en-bg);
    border: 2px solid var(--en-color);
    border-radius: 10px;
  }
  .english-comparison h3 { color: var(--en-color); font-size: 0.95rem; margin-bottom: 0.4rem; }
  .english-comparison p { font-size: 0.85rem; }

  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid var(--border);
  }
  figcaption strong { display: block; font-size: 1.05rem; margin-bottom: 0.4rem; }
  figcaption span { font-size: 0.88rem; color: var(--muted); line-height: 1.5; }
  @media (max-width: 700px) {
    figure { padding: 1.2rem; }
    .pairs-table { font-size: 0.78rem; }
    .pair-word { font-size: 0.95rem; }
  }
</style>
</head>
<body>
<figure>
  <h2>Meaning-Changing Gender Pairs</h2>
  <p class="subtitle">Same word, different article, different meaning. Gender as a disambiguation tool.</p>

  <table class="pairs-table">
    <thead>
      <tr>
        <th class="masc-header">Masculine (le)</th>
        <th class="word-header">Word</th>
        <th class="fem-header">Feminine (la)</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td><span class="article-tag le">le</span> <span class="masc-meaning">book</span><br><span class="meaning-detail">le livre que j'ai lu</span></td>
        <td class="pair-word">livre</td>
        <td><span class="article-tag la">la</span> <span class="fem-meaning">pound</span> (weight/currency)<br><span class="meaning-detail">une livre de beurre</span></td>
      </tr>
      <tr>
        <td><span class="article-tag le">le</span> <span class="masc-meaning">turn, tour, trick</span><br><span class="meaning-detail">le tour de France</span></td>
        <td class="pair-word">tour</td>
        <td><span class="article-tag la">la</span> <span class="fem-meaning">tower</span><br><span class="meaning-detail">la tour Eiffel</span></td>
      </tr>
      <tr>
        <td><span class="article-tag le">le</span> <span class="masc-meaning">position, TV/radio set</span><br><span class="meaning-detail">un poste de t&eacute;l&eacute;vision</span></td>
        <td class="pair-word">poste</td>
        <td><span class="article-tag la">la</span> <span class="fem-meaning">post office, mail</span><br><span class="meaning-detail">aller &agrave; la poste</span></td>
      </tr>
      <tr>
        <td><span class="article-tag le">le</span> <span class="masc-meaning">vase</span><br><span class="meaning-detail">un vase de fleurs</span></td>
        <td class="pair-word">vase</td>
        <td><span class="article-tag la">la</span> <span class="fem-meaning">mud, silt</span><br><span class="meaning-detail">la vase au fond du lac</span></td>
      </tr>
      <tr>
        <td><span class="article-tag le">le</span> <span class="masc-meaning">method, mode, way</span><br><span class="meaning-detail">le mode d'emploi</span></td>
        <td class="pair-word">mode</td>
        <td><span class="article-tag la">la</span> <span class="fem-meaning">fashion</span><br><span class="meaning-detail">&agrave; la mode</span></td>
      </tr>
      <tr>
        <td><span class="article-tag le">le</span> <span class="masc-meaning">handle</span><br><span class="meaning-detail">le manche du couteau</span></td>
        <td class="pair-word">manche</td>
        <td><span class="article-tag la">la</span> <span class="fem-meaning">sleeve; La Manche = English Channel</span><br><span class="meaning-detail">les manches longues</span></td>
      </tr>
      <tr>
        <td><span class="article-tag le">le</span> <span class="masc-meaning">nap</span><br><span class="meaning-detail">faire un petit somme</span></td>
        <td class="pair-word">somme</td>
        <td><span class="article-tag la">la</span> <span class="fem-meaning">sum, amount</span><br><span class="meaning-detail">la somme totale</span></td>
      </tr>
      <tr>
        <td><span class="article-tag le">le</span> <span class="masc-meaning">mold, cake tin</span><br><span class="meaning-detail">un moule &agrave; g&acirc;teau</span></td>
        <td class="pair-word">moule</td>
        <td><span class="article-tag la">la</span> <span class="fem-meaning">mussel</span><br><span class="meaning-detail">des moules-frites</span></td>
      </tr>
      <tr>
        <td><span class="article-tag le">le</span> <span class="masc-meaning">critic (person)</span><br><span class="meaning-detail">un critique litt&eacute;raire</span></td>
        <td class="pair-word">critique</td>
        <td><span class="article-tag la">la</span> <span class="fem-meaning">criticism, review</span><br><span class="meaning-detail">une critique du film</span></td>
      </tr>
      <tr>
        <td><span class="article-tag le">le</span> <span class="masc-meaning">dissertation, memoir</span><br><span class="meaning-detail">un m&eacute;moire de ma&icirc;trise</span></td>
        <td class="pair-word">m&eacute;moire</td>
        <td><span class="article-tag la">la</span> <span class="fem-meaning">memory</span><br><span class="meaning-detail">la m&eacute;moire collective</span></td>
      </tr>
      <tr>
        <td><span class="article-tag le">le</span> <span class="masc-meaning">page boy</span><br><span class="meaning-detail">le page du roi</span></td>
        <td class="pair-word">page</td>
        <td><span class="article-tag la">la</span> <span class="fem-meaning">page (of a book)</span><br><span class="meaning-detail">la premi&egrave;re page</span></td>
      </tr>
    </tbody>
  </table>

  <!-- Disambiguation demo -->
  <div class="disambiguation-box">
    <h3>Disambiguation at the First Word</h3>
    <p>The article resolves ambiguity before the noun is even reached:</p>
    <div class="demo-sentence masc-demo">
      "<strong>Le</strong> livre est sur la table." -- Immediately parsed as: the BOOK is on the table.
    </div>
    <div class="demo-sentence fem-demo">
      "<strong>La</strong> livre a augment&eacute;." -- Immediately parsed as: the POUND has increased.
    </div>
    <p style="font-size:0.82rem;color:var(--muted);margin-top:0.5rem;">This is a genuine cognitive advantage of the gender system: meaning is disambiguated one word earlier than in English.</p>
  </div>

  <!-- English comparison -->
  <div class="english-comparison">
    <h3>English Comparison: Context-Only Disambiguation</h3>
    <p>English handles its own homophones ("bank" = river bank or financial bank, "bat" = animal or sports equipment) through context alone. There is no article-level signal to resolve the ambiguity. French provides an extra disambiguation channel -- the determiner -- that English lacks entirely.</p>
  </div>

  <figcaption>
    <strong>Figure 3: Meaning-Changing Gender Pairs</strong>
    <span>These 11 confirmed pairs demonstrate how French grammatical gender serves a disambiguation function. The same phonological form carries different meanings depending on whether it takes the masculine article (le) or feminine article (la). The disambiguation happens at the very first word of the noun phrase -- before the noun itself is reached. English resolves equivalent ambiguities through context alone, with no determiner-level signal.</span>
  </figcaption>
</figure>
</body>
</html>
