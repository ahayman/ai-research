<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The English Gender Gap -- Why This Matters Most</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --fr-color: #8b5cf6;
    --fr-bg: #f5f3ff;
    --en-color: #10b981;
    --en-bg: #ecfdf5;
    --timeline-color: #f59e0b;
    --timeline-bg: #fffbeb;
    --muted: #6c757d;
    --lat-color: #e63946;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --fr-color: #a78bfa;
      --fr-bg: #1e1b3a;
      --en-color: #34d399;
      --en-bg: #132e24;
      --timeline-color: #fbbf24;
      --timeline-bg: #2a2510;
      --muted: #9a9ab0;
      --lat-color: #ff6b6b;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure {
    max-width: 1100px;
    width: 100%;
    background: var(--surface);
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
  }
  h2 { text-align: center; font-size: 1.4rem; margin-bottom: 0.3rem; }
  .subtitle { text-align: center; font-size: 0.95rem; color: var(--muted); margin-bottom: 2rem; }

  /* Divergent timeline */
  .timeline-section {
    background: var(--timeline-bg);
    border: 2px solid var(--timeline-color);
    border-radius: 12px;
    padding: 1.5rem;
    margin-bottom: 1.5rem;
  }
  .timeline-section h3 { color: var(--timeline-color); font-size: 1rem; margin-bottom: 1rem; text-align: center; }
  .timeline-tracks {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 0;
    font-size: 0.82rem;
  }
  .track { padding: 0.3rem 0.5rem; }
  .track.fr { text-align: right; color: var(--fr-color); }
  .track.en { text-align: left; color: var(--en-color); }
  .track.center {
    text-align: center;
    font-weight: 700;
    color: var(--muted);
    border-left: 2px solid var(--border);
    border-right: 2px solid var(--border);
    padding: 0.3rem 0.8rem;
    min-width: 100px;
  }
  .track.header { font-weight: 700; font-size: 0.85rem; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; }
  .track-label { display: block; font-size: 0.72rem; color: var(--muted); font-style: italic; }

  /* Feature comparison table */
  .feature-table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 1.5rem;
    font-size: 0.85rem;
  }
  .feature-table th {
    padding: 0.5rem 0.8rem;
    border-bottom: 2px solid var(--border);
    text-align: left;
    font-size: 0.78rem;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }
  .feature-table th:nth-child(2) { color: var(--fr-color); }
  .feature-table th:nth-child(3) { color: var(--en-color); }
  .feature-table td {
    padding: 0.5rem 0.8rem;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
  }
  .feature-table td:nth-child(2) { background: var(--fr-bg); }
  .feature-table td:nth-child(3) { background: var(--en-bg); }
  .feature-table tr:last-child td { border-bottom: none; }
  .yes { color: var(--fr-color); font-weight: 700; }
  .no { color: var(--en-color); font-weight: 700; }

  /* Bottom comparison */
  .bottom-comparison {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5rem;
  }
  .lang-card {
    border: 2px solid;
    border-radius: 12px;
    padding: 1.25rem;
    text-align: center;
  }
  .lang-card.fr { border-color: var(--fr-color); }
  .lang-card.en { border-color: var(--en-color); }
  .lang-card h3 { font-size: 1rem; margin-bottom: 0.3rem; }
  .lang-card.fr h3 { color: var(--fr-color); }
  .lang-card.en h3 { color: var(--en-color); }
  .gender-count { font-size: 3rem; font-weight: 800; line-height: 1.1; }
  .lang-card.fr .gender-count { color: var(--fr-color); }
  .lang-card.en .gender-count { color: var(--en-color); }
  .lang-card p { font-size: 0.82rem; color: var(--muted); margin-top: 0.3rem; }
  .lang-card .detail { font-size: 0.78rem; text-align: left; margin-top: 0.5rem; }

  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid var(--border);
  }
  figcaption strong { display: block; font-size: 1.05rem; margin-bottom: 0.4rem; }
  figcaption span { font-size: 0.88rem; color: var(--muted); line-height: 1.5; }
  @media (max-width: 700px) {
    figure { padding: 1.2rem; }
    .bottom-comparison { grid-template-columns: 1fr; }
    .timeline-tracks { font-size: 0.75rem; }
  }
</style>
</head>
<body>
<figure>
  <h2>The English Gender Gap</h2>
  <p class="subtitle">French preserved what English lost: how two sibling languages diverged on gender</p>

  <!-- Divergent timeline -->
  <div class="timeline-section">
    <h3>Divergent Evolution: Same Starting Point, Opposite Outcomes</h3>
    <div class="timeline-tracks">
      <div class="track fr header">French (from Latin)</div>
      <div class="track center header">Era</div>
      <div class="track en header">English (from Proto-Germanic)</div>

      <div class="track fr">Latin: 3 genders (M, F, N)<span class="track-label">Full gender system inherited</span></div>
      <div class="track center">Antiquity</div>
      <div class="track en">Proto-Germanic: 3 genders (M, F, N)<span class="track-label">Full gender system inherited</span></div>

      <div class="track fr">Old French: 2 genders (M, F)<span class="track-label">Neuter absorbed into masculine</span></div>
      <div class="track center">800-1100</div>
      <div class="track en">Old English: 3 genders (M, F, N)<span class="track-label">Still fully productive</span></div>

      <div class="track fr">Middle French: 2 genders (M, F)<span class="track-label">Stable. No change.</span></div>
      <div class="track center">1100-1400</div>
      <div class="track en" style="font-weight:700;">Middle English: COLLAPSE<span class="track-label">Gender markers erode. System crumbles.</span></div>

      <div class="track fr">Modern French: 2 genders (M, F)<span class="track-label">Fully productive. Every noun gendered.</span></div>
      <div class="track center">1400-now</div>
      <div class="track en">Modern English: 0 genders<span class="track-label">Complete absence. No trace in nouns.</span></div>
    </div>
  </div>

  <!-- Feature comparison -->
  <table class="feature-table">
    <thead>
      <tr>
        <th>Feature</th>
        <th>French</th>
        <th>English</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>Nouns carry inherent gender?</td>
        <td><span class="yes">Yes</span> -- every noun is M or F</td>
        <td><span class="no">No</span> -- nouns have zero gender feature</td>
      </tr>
      <tr>
        <td>Articles agree in gender?</td>
        <td><span class="yes">Yes</span> -- le/la/un/une/du/de la</td>
        <td><span class="no">No</span> -- "the" / "a" for everything</td>
      </tr>
      <tr>
        <td>Adjectives agree in gender?</td>
        <td><span class="yes">Yes</span> -- grand/grande, beau/belle (4 forms)</td>
        <td><span class="no">No</span> -- "big" for everything</td>
      </tr>
      <tr>
        <td>Pronouns reflect gender?</td>
        <td><span class="yes">Yes</span> -- grammatical gender (il for le livre)</td>
        <td>Partially -- semantic gender only (he/she/it/they for animate)</td>
      </tr>
      <tr>
        <td>Past participles agree?</td>
        <td><span class="yes">Yes</span> -- all&eacute;/all&eacute;e/all&eacute;s/all&eacute;es</td>
        <td><span class="no">No</span> -- "gone" is invariable</td>
      </tr>
      <tr>
        <td>Agreement chain length?</td>
        <td><span class="yes">5-7+ elements</span> per sentence possible</td>
        <td><span class="no">0</span> -- no agreement chain exists</td>
      </tr>
      <tr>
        <td>New words need gender?</td>
        <td><span class="yes">Yes</span> -- every borrowed word must be assigned M or F</td>
        <td><span class="no">No</span> -- words enter English gender-free</td>
      </tr>
    </tbody>
  </table>

  <!-- Bottom comparison -->
  <div class="bottom-comparison">
    <div class="lang-card fr">
      <h3>French</h3>
      <div class="gender-count">2</div>
      <p>grammatical genders (masculine, feminine)</p>
      <div class="detail">
        Every noun, every adjective, every determiner, every pronoun, every past participle participates in the gender system. It is the most pervasive structural feature of the language.
      </div>
    </div>
    <div class="lang-card en">
      <h3>English</h3>
      <div class="gender-count">0</div>
      <p>grammatical genders</p>
      <div class="detail">
        English is the most gender-free major European language. Only pronouns retain natural (semantic) gender for animate referents. Old English's three-gender system was completely lost by ~1400.
      </div>
    </div>
  </div>

  <figcaption>
    <strong>Figure 4: The English Gender Gap -- Why This Matters Most</strong>
    <span>Both French and English descended from ancestor languages with three grammatical genders. French reduced to two (absorbing neuter into masculine). English collapsed all three to zero. This divergence -- 2 vs. 0 -- makes grammatical gender arguably the single largest structural difference between French and English. It affects every noun phrase, every pronoun reference, every compound tense with &ecirc;tre, and every borrowed word entering the language.</span>
  </figcaption>
</figure>
</body>
</html>
