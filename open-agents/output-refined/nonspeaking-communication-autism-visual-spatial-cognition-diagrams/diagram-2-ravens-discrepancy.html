<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Intelligence Discrepancy -- Raven's vs. Wechsler</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --muted: #6c757d; --wechsler: #dc3545; --wechsler-bg: #fee2e2;
    --ravens: #198754; --ravens-bg: #edfff5;
    --accent: #4361ee; --accent-bg: #e8edff;
    --caution: #d97706; --caution-bg: #fffbeb;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a; --fg: #e8e8f0; --surface: #1a1a2e; --border: #2d2d44;
      --muted: #9a9ab0; --wechsler: #ff6b6b; --wechsler-bg: #2a1010;
      --ravens: #51cf66; --ravens-bg: #0a2a15;
      --accent: #6b8aff; --accent-bg: #1e2a4a;
      --caution: #fbbf24; --caution-bg: #2a2510;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--fg); display: flex; justify-content: center; padding: 2rem 1rem; }
  figure { max-width: 920px; width: 100%; background: var(--surface); border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); padding: 2.5rem; }
  h2 { text-align: center; font-size: 1.4rem; margin-bottom: 0.4rem; }
  .subtitle { text-align: center; font-size: 0.95rem; color: var(--muted); margin-bottom: 2rem; }
  .diagram-wrapper { overflow-x: auto; padding: 0.5rem; }
  svg { display: block; margin: 0 auto; }
  figcaption { text-align: center; margin-top: 1.5rem; padding-top: 1.25rem; border-top: 1px solid var(--border); }
  figcaption strong { display: block; font-size: 1.05rem; margin-bottom: 0.4rem; }
  figcaption span { font-size: 0.88rem; color: var(--muted); line-height: 1.5; }
</style>
</head>
<body>
<figure>
  <h2>The Intelligence Discrepancy</h2>
  <p class="subtitle">How test choice determines whether someone is labeled "disabled" or "above average"</p>
  <div class="diagram-wrapper">
    <svg viewBox="0 0 880 500" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif" role="img" aria-labelledby="title-iq desc-iq">
      <title id="title-iq">Raven's vs. Wechsler Intelligence Discrepancy</title>
      <desc id="desc-iq">Comparison showing autistic individuals score an average of 30 percentile points higher on Raven's Progressive Matrices (nonverbal pattern reasoning) than on Wechsler scales (verbal-loaded). On Wechsler: 0% scored high intelligence, 33% scored in intellectually disabled range. On Raven's: 33% scored high intelligence, only 5% scored in that same low range.</desc>

      <!-- Chart area -->
      <!-- Y-axis -->
      <text x="140" y="70" text-anchor="end" font-size="10" fill="var(--muted)">High Intelligence</text>
      <text x="140" y="230" text-anchor="end" font-size="10" fill="var(--muted)">Average</text>
      <text x="140" y="390" text-anchor="end" font-size="10" fill="var(--muted)">ID Range</text>
      <line x1="150" y1="55" x2="150" y2="400" stroke="var(--border)" stroke-width="1.5"/>

      <!-- Wechsler column -->
      <text x="280" y="42" text-anchor="middle" font-size="14" font-weight="700" fill="var(--wechsler)">Wechsler Scales</text>
      <text x="280" y="435" text-anchor="middle" font-size="10" fill="var(--muted)">(verbal-loaded)</text>

      <!-- Wechsler bar (showing distribution) -->
      <rect x="210" y="220" width="140" height="180" rx="6" fill="var(--wechsler-bg)" stroke="var(--wechsler)" stroke-width="2"/>
      <!-- High intelligence section (0%) -->
      <text x="280" y="88" text-anchor="middle" font-size="22" font-weight="700" fill="var(--wechsler)">0%</text>
      <text x="280" y="108" text-anchor="middle" font-size="11" fill="var(--fg)">scored "high</text>
      <text x="280" y="122" text-anchor="middle" font-size="11" fill="var(--fg)">intelligence"</text>
      <!-- ID range section (33%) -->
      <rect x="215" y="300" width="130" height="95" rx="4" fill="var(--wechsler)" opacity="0.25"/>
      <text x="280" y="340" text-anchor="middle" font-size="20" font-weight="700" fill="var(--wechsler)">33%</text>
      <text x="280" y="360" text-anchor="middle" font-size="11" fill="var(--fg)">scored in ID</text>
      <text x="280" y="374" text-anchor="middle" font-size="11" fill="var(--fg)">range</text>

      <!-- Gap arrow -->
      <line x1="370" y1="180" x2="430" y2="180" stroke="var(--accent)" stroke-width="3"/>
      <text x="400" y="165" text-anchor="middle" font-size="13" font-weight="700" fill="var(--accent)">~30</text>
      <text x="400" y="200" text-anchor="middle" font-size="10" fill="var(--accent)">percentile</text>
      <text x="400" y="214" text-anchor="middle" font-size="10" fill="var(--accent)">point gap</text>

      <!-- Raven's column -->
      <text x="530" y="42" text-anchor="middle" font-size="14" font-weight="700" fill="var(--ravens)">Raven's Matrices</text>
      <text x="530" y="435" text-anchor="middle" font-size="10" fill="var(--muted)">(nonverbal patterns)</text>

      <!-- Raven's bar -->
      <rect x="460" y="60" width="140" height="340" rx="6" fill="var(--ravens-bg)" stroke="var(--ravens)" stroke-width="2"/>
      <!-- High intelligence section (33%) -->
      <rect x="465" y="65" width="130" height="95" rx="4" fill="var(--ravens)" opacity="0.2"/>
      <text x="530" y="105" text-anchor="middle" font-size="20" font-weight="700" fill="var(--ravens)">33%</text>
      <text x="530" y="125" text-anchor="middle" font-size="11" fill="var(--fg)">scored "high</text>
      <text x="530" y="139" text-anchor="middle" font-size="11" fill="var(--fg)">intelligence"</text>
      <!-- ID range section (5%) -->
      <text x="530" y="362" text-anchor="middle" font-size="18" font-weight="700" fill="var(--ravens)">~5%</text>
      <text x="530" y="382" text-anchor="middle" font-size="11" fill="var(--fg)">in ID range</text>

      <!-- Speed callout -->
      <rect x="640" y="80" width="220" height="90" rx="10" fill="var(--accent-bg)" stroke="var(--accent)" stroke-width="1.5"/>
      <text x="750" y="105" text-anchor="middle" font-size="12" font-weight="700" fill="var(--accent)">Speed Advantage</text>
      <text x="750" y="125" text-anchor="middle" font-size="11" fill="var(--fg)">23-42% faster than controls</text>
      <text x="750" y="145" text-anchor="middle" font-size="11" fill="var(--fg)">Fastest on hardest items</text>
      <text x="750" y="162" text-anchor="middle" font-size="9" fill="var(--muted)">Soulieres et al. 2009</text>

      <!-- What each test measures -->
      <rect x="640" y="210" width="220" height="120" rx="10" fill="var(--surface)" stroke="var(--border)" stroke-width="1.5"/>
      <text x="750" y="235" text-anchor="middle" font-size="11" font-weight="700" fill="var(--fg)">What Each Test Measures</text>
      <line x1="660" y1="245" x2="840" y2="245" stroke="var(--border)" stroke-width="0.5"/>
      <text x="660" y="265" font-size="10" fill="var(--wechsler)"><tspan font-weight="600">Wechsler:</tspan> verbal reasoning,</text>
      <text x="660" y="280" font-size="10" fill="var(--wechsler)">timed motor tasks, verbal memory</text>
      <text x="660" y="303" font-size="10" fill="var(--ravens)"><tspan font-weight="600">Raven's:</tspan> abstract visual pattern</text>
      <text x="660" y="318" font-size="10" fill="var(--ravens)">reasoning, no verbal output needed</text>

      <!-- Caution note -->
      <rect x="150" y="452" width="710" height="38" rx="8" fill="var(--caution-bg)" stroke="var(--caution)" stroke-width="1.5"/>
      <text x="505" y="475" text-anchor="middle" font-size="10" fill="var(--fg)"><tspan font-weight="700" fill="var(--caution)">Study context:</tspan> Dawson et al. 2007, 38 autistic children + 26 adults. Well-replicated finding, but specific magnitude varies across studies.</text>
    </svg>
  </div>
  <figcaption>
    <strong>Figure 2: Raven's vs. Wechsler -- The Intelligence Discrepancy</strong>
    <span>Autistic individuals scored an average of 30 percentile points higher on Raven's Progressive Matrices (nonverbal pattern reasoning) than on the Wechsler scales (verbal-loaded). Not a single autistic child scored "high intelligence" on the Wechsler; one-third did on the Raven's. The choice of test determines whether someone is labeled "intellectually disabled" or "above average" -- with cascading consequences for educational placement and communication access.</span>
  </figcaption>
</figure>
</body>
</html>
