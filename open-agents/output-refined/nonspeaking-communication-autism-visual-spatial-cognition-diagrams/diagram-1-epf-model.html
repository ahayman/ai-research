<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enhanced Perceptual Functioning Model</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --muted: #6c757d; --accent: #4361ee; --accent-bg: #e8edff;
    --enhance: #198754; --enhance-bg: #edfff5;
    --atypical: #7c3aed; --atypical-bg: #f3e8ff;
    --neural: #d97706; --neural-bg: #fffbeb;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a; --fg: #e8e8f0; --surface: #1a1a2e; --border: #2d2d44;
      --muted: #9a9ab0; --accent: #6b8aff; --accent-bg: #1e2a4a;
      --enhance: #51cf66; --enhance-bg: #0a2a15;
      --atypical: #b197fc; --atypical-bg: #1e1030;
      --neural: #fbbf24; --neural-bg: #2a2510;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--fg); display: flex; justify-content: center; padding: 2rem 1rem; }
  figure { max-width: 960px; width: 100%; background: var(--surface); border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); padding: 2.5rem; }
  h2 { text-align: center; font-size: 1.4rem; margin-bottom: 0.4rem; }
  .subtitle { text-align: center; font-size: 0.95rem; color: var(--muted); margin-bottom: 2rem; }
  .diagram-wrapper { overflow-x: auto; padding: 0.5rem; }
  svg { display: block; margin: 0 auto; }
  figcaption { text-align: center; margin-top: 1.5rem; padding-top: 1.25rem; border-top: 1px solid var(--border); }
  figcaption strong { display: block; font-size: 1.05rem; margin-bottom: 0.4rem; }
  figcaption span { font-size: 0.88rem; color: var(--muted); line-height: 1.5; }
</style>
</head>
<body>
<figure>
  <h2>Enhanced Perceptual Functioning (EPF) Model</h2>
  <p class="subtitle">Eight principles of autistic perception -- Mottron et al., 2006</p>
  <div class="diagram-wrapper">
    <svg viewBox="0 0 920 560" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif" role="img" aria-labelledby="title-epf desc-epf">
      <title id="title-epf">Enhanced Perceptual Functioning Model</title>
      <desc id="desc-epf">Radial diagram showing the eight principles of autistic perception organized in three groups: Enhanced Sensitivity (principles 1-4), Processing Autonomy (5-6), and Neural Architecture (7-8), with observable phenomena linked to each group.</desc>

      <!-- Central hub -->
      <circle cx="460" cy="260" r="70" fill="var(--accent-bg)" stroke="var(--accent)" stroke-width="3"/>
      <text x="460" y="248" text-anchor="middle" font-size="13" font-weight="700" fill="var(--accent)">Enhanced</text>
      <text x="460" y="266" text-anchor="middle" font-size="13" font-weight="700" fill="var(--accent)">Perceptual</text>
      <text x="460" y="284" text-anchor="middle" font-size="13" font-weight="700" fill="var(--accent)">Functioning</text>

      <!-- Group 1: Enhanced Sensitivity (top-left, principles 1-4) -->
      <rect x="30" y="30" width="350" height="200" rx="12" fill="var(--enhance-bg)" stroke="var(--enhance)" stroke-width="2"/>
      <text x="205" y="55" text-anchor="middle" font-size="13" font-weight="700" fill="var(--enhance)">Enhanced Sensitivity (1-4)</text>
      <line x1="50" y1="65" x2="360" y2="65" stroke="var(--enhance)" stroke-width="0.5"/>
      <text x="50" y="88" font-size="10.5" fill="var(--fg)"><tspan font-weight="600">1.</tspan> Locally oriented visual and auditory perception</text>
      <text x="50" y="108" font-size="10.5" fill="var(--fg)"><tspan font-weight="600">2.</tspan> Enhanced low-level discrimination</text>
      <text x="50" y="128" font-size="10.5" fill="var(--fg)"><tspan font-weight="600">3.</tspan> Enhanced first-order static stimuli</text>
      <text x="50" y="148" font-size="10.5" fill="var(--fg)"><tspan font-weight="600">4.</tspan> Diminished complex movement perception</text>
      <line x1="50" y1="162" x2="360" y2="162" stroke="var(--enhance)" stroke-width="0.5"/>
      <text x="50" y="182" font-size="10" fill="var(--muted)" font-style="italic">Observable: EFT superiority, visual search speed,</text>
      <text x="50" y="197" font-size="10" fill="var(--muted)" font-style="italic">pitch discrimination, pattern detection</text>

      <!-- Connector line group 1 -->
      <line x1="380" y1="130" x2="400" y2="230" stroke="var(--enhance)" stroke-width="2"/>

      <!-- Group 2: Processing Autonomy (top-right, principles 5-6) -->
      <rect x="540" y="30" width="350" height="170" rx="12" fill="var(--atypical-bg)" stroke="var(--atypical)" stroke-width="2"/>
      <text x="715" y="55" text-anchor="middle" font-size="13" font-weight="700" fill="var(--atypical)">Processing Autonomy (5-6)</text>
      <line x1="560" y1="65" x2="870" y2="65" stroke="var(--atypical)" stroke-width="0.5"/>
      <text x="560" y="88" font-size="10.5" fill="var(--fg)"><tspan font-weight="600">5.</tspan> Autonomy of low-level processing from</text>
      <text x="575" y="103" font-size="10.5" fill="var(--fg)">higher-order operations</text>
      <text x="560" y="128" font-size="10.5" fill="var(--fg)"><tspan font-weight="600">6.</tspan> Enhanced role of perception in tasks</text>
      <text x="575" y="143" font-size="10.5" fill="var(--fg)">typically mediated by higher-order cognition</text>
      <line x1="560" y1="155" x2="870" y2="155" stroke="var(--atypical)" stroke-width="0.5"/>
      <text x="560" y="175" font-size="10" fill="var(--muted)" font-style="italic">Observable: Raven's speed advantage, visual</text>
      <text x="560" y="190" font-size="10" fill="var(--muted)" font-style="italic">problem-solving without verbal mediation</text>

      <!-- Connector line group 2 -->
      <line x1="540" y1="130" x2="520" y2="220" stroke="var(--atypical)" stroke-width="2"/>

      <!-- Group 3: Neural Architecture (bottom-left, principles 7-8) -->
      <rect x="30" y="310" width="350" height="170" rx="12" fill="var(--neural-bg)" stroke="var(--neural)" stroke-width="2"/>
      <text x="205" y="335" text-anchor="middle" font-size="13" font-weight="700" fill="var(--neural)">Neural Architecture (7-8)</text>
      <line x1="50" y1="345" x2="360" y2="345" stroke="var(--neural)" stroke-width="0.5"/>
      <text x="50" y="368" font-size="10.5" fill="var(--fg)"><tspan font-weight="600">7.</tspan> Atypical connectivity between perceptual</text>
      <text x="65" y="383" font-size="10.5" fill="var(--fg)">and frontal regions</text>
      <text x="50" y="408" font-size="10.5" fill="var(--fg)"><tspan font-weight="600">8.</tspan> Superior perceptual peaks related to</text>
      <text x="65" y="423" font-size="10.5" fill="var(--fg)">expertise-like mechanisms</text>
      <line x1="50" y1="435" x2="360" y2="435" stroke="var(--neural)" stroke-width="0.5"/>
      <text x="50" y="455" font-size="10" fill="var(--muted)" font-style="italic">Observable: Samson ALE meta-analysis -- more</text>
      <text x="50" y="470" font-size="10" fill="var(--muted)" font-style="italic">posterior activation, less frontal activation</text>

      <!-- Connector line group 3 -->
      <line x1="380" y1="360" x2="410" y2="310" stroke="var(--neural)" stroke-width="2"/>

      <!-- Implications box (bottom-right) -->
      <rect x="440" y="370" width="440" height="160" rx="12" fill="var(--surface)" stroke="var(--accent)" stroke-width="2"/>
      <text x="660" y="395" text-anchor="middle" font-size="13" font-weight="700" fill="var(--accent)">Implications for Non-Speaking Autism</text>
      <line x1="460" y1="405" x2="860" y2="405" stroke="var(--accent)" stroke-width="0.5"/>
      <text x="460" y="428" font-size="11" fill="var(--fg)">Perception operates with relative autonomy from</text>
      <text x="460" y="446" font-size="11" fill="var(--fg)">top-down verbal control, meaning:</text>
      <text x="475" y="470" font-size="11" fill="var(--fg)">- Cognition can be sophisticated without speech</text>
      <text x="475" y="488" font-size="11" fill="var(--fg)">- Visual processing may substitute for verbal coding</text>
      <text x="475" y="506" font-size="11" fill="var(--fg)">- Verbal IQ tests underestimate actual intelligence</text>
      <text x="475" y="524" font-size="11" fill="var(--fg)">- AAC should leverage visual-spatial strengths</text>

      <!-- Connector from center to implications -->
      <line x1="490" y1="320" x2="550" y2="370" stroke="var(--accent)" stroke-width="1.5" stroke-dasharray="6,3"/>
    </svg>
  </div>
  <figcaption>
    <strong>Figure 1: The Enhanced Perceptual Functioning Model -- Eight Principles</strong>
    <span>Mottron and colleagues (2006) proposed that autism involves enhanced low-level perceptual processing organized around eight principles in three groups: enhanced sensitivity, processing autonomy from top-down control, and atypical neural architecture. The model reframes autistic perception as different rather than deficient, with direct implications for understanding non-speaking autism and designing communication systems.</span>
  </figcaption>
</figure>
</body>
</html>
