<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monotropism vs. Polytropism</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --muted: #6c757d;
    --mono: #7c3aed; --mono-bg: #f3e8ff;
    --poly: #3b82f6; --poly-bg: #dbeafe;
    --speech: #dc3545; --speech-bg: #fee2e2;
    --aac: #198754; --aac-bg: #edfff5;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a; --fg: #e8e8f0; --surface: #1a1a2e; --border: #2d2d44;
      --muted: #9a9ab0;
      --mono: #b197fc; --mono-bg: #1e1030;
      --poly: #60a5fa; --poly-bg: #172554;
      --speech: #ff6b6b; --speech-bg: #2a1010;
      --aac: #51cf66; --aac-bg: #0a2a15;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--fg); display: flex; justify-content: center; padding: 2rem 1rem; }
  figure { max-width: 960px; width: 100%; background: var(--surface); border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); padding: 2.5rem; }
  h2 { text-align: center; font-size: 1.4rem; margin-bottom: 0.4rem; }
  .subtitle { text-align: center; font-size: 0.95rem; color: var(--muted); margin-bottom: 2rem; }
  .diagram-wrapper { overflow-x: auto; padding: 0.5rem; }
  svg { display: block; margin: 0 auto; }
  figcaption { text-align: center; margin-top: 1.5rem; padding-top: 1.25rem; border-top: 1px solid var(--border); }
  figcaption strong { display: block; font-size: 1.05rem; margin-bottom: 0.4rem; }
  figcaption span { font-size: 0.88rem; color: var(--muted); line-height: 1.5; }
</style>
</head>
<body>
<figure>
  <h2>Monotropism vs. Polytropism</h2>
  <p class="subtitle">Two attention allocation models and their communication implications</p>
  <div class="diagram-wrapper">
    <svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif" role="img" aria-labelledby="title-mono desc-mono">
      <title id="title-mono">Monotropism vs Polytropism Comparison</title>
      <desc id="desc-mono">Two-panel comparison showing monotropic attention (deep, narrow channels) versus polytropic attention (shallow, broad distribution). Speech production requires managing 6+ channels simultaneously, making it more compatible with polytropism. Visual AAC allows sequential single-channel engagement, more compatible with monotropism.</desc>

      <!-- Panel 1: Monotropism (left) -->
      <rect x="20" y="20" width="420" height="240" rx="12" fill="var(--mono-bg)" stroke="var(--mono)" stroke-width="2"/>
      <text x="230" y="48" text-anchor="middle" font-size="14" font-weight="700" fill="var(--mono)">Monotropic Attention (Autistic)</text>
      <text x="230" y="66" text-anchor="middle" font-size="10" fill="var(--muted)">Murray, Lesser, Lawson, 2005</text>

      <!-- Monotropic channels (few, deep) -->
      <text x="60" y="100" font-size="10" fill="var(--fg)">Channel A</text>
      <rect x="130" y="87" width="280" height="24" rx="4" fill="var(--mono)" opacity="0.8"/>
      <text x="270" y="104" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">DEEP, INTENSE FOCUS</text>

      <text x="60" y="135" font-size="10" fill="var(--fg)">Channel B</text>
      <rect x="130" y="122" width="200" height="24" rx="4" fill="var(--mono)" opacity="0.5"/>
      <text x="230" y="139" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">Moderate</text>

      <text x="60" y="170" font-size="10" fill="var(--fg)">Channel C</text>
      <rect x="130" y="157" width="40" height="18" rx="4" fill="var(--mono)" opacity="0.2"/>

      <text x="60" y="200" font-size="10" fill="var(--fg)">Channel D-F</text>
      <rect x="130" y="190" width="15" height="14" rx="3" fill="var(--mono)" opacity="0.1"/>
      <rect x="150" y="190" width="10" height="14" rx="3" fill="var(--mono)" opacity="0.05"/>
      <rect x="165" y="190" width="8" height="14" rx="3" fill="var(--mono)" opacity="0.05"/>

      <text x="60" y="236" font-size="10" fill="var(--muted)" font-style="italic">Few channels, deeply processed</text>

      <!-- Panel 2: Polytropism (right) -->
      <rect x="460" y="20" width="420" height="240" rx="12" fill="var(--poly-bg)" stroke="var(--poly)" stroke-width="2"/>
      <text x="670" y="48" text-anchor="middle" font-size="14" font-weight="700" fill="var(--poly)">Polytropic Attention (Neurotypical)</text>
      <text x="670" y="66" text-anchor="middle" font-size="10" fill="var(--muted)">Broad, flexible distribution</text>

      <!-- Polytropic channels (many, shallow) -->
      <text x="500" y="100" font-size="10" fill="var(--fg)">Channel A</text>
      <rect x="570" y="87" width="130" height="20" rx="4" fill="var(--poly)" opacity="0.5"/>

      <text x="500" y="128" font-size="10" fill="var(--fg)">Channel B</text>
      <rect x="570" y="115" width="120" height="20" rx="4" fill="var(--poly)" opacity="0.5"/>

      <text x="500" y="156" font-size="10" fill="var(--fg)">Channel C</text>
      <rect x="570" y="143" width="140" height="20" rx="4" fill="var(--poly)" opacity="0.5"/>

      <text x="500" y="184" font-size="10" fill="var(--fg)">Channel D</text>
      <rect x="570" y="171" width="110" height="20" rx="4" fill="var(--poly)" opacity="0.5"/>

      <text x="500" y="212" font-size="10" fill="var(--fg)">Channel E</text>
      <rect x="570" y="199" width="125" height="20" rx="4" fill="var(--poly)" opacity="0.5"/>

      <text x="500" y="236" font-size="10" fill="var(--muted)" font-style="italic">Many channels, evenly distributed</text>

      <!-- Bottom section: Communication compatibility -->
      <text x="450" y="298" text-anchor="middle" font-size="13" font-weight="700" fill="var(--fg)">Communication Compatibility</text>

      <!-- Speech demands (multi-channel) -->
      <rect x="20" y="320" width="420" height="100" rx="10" fill="var(--speech-bg)" stroke="var(--speech)" stroke-width="2"/>
      <text x="230" y="343" text-anchor="middle" font-size="12" font-weight="700" fill="var(--speech)">Speech Production Requires 6+ Simultaneous Channels</text>
      <g transform="translate(40, 355)">
        <rect x="0" y="0" width="58" height="22" rx="4" fill="var(--speech)" opacity="0.7"/>
        <text x="29" y="15" text-anchor="middle" font-size="8.5" fill="#fff">Phonetic</text>
        <rect x="64" y="0" width="72" height="22" rx="4" fill="var(--speech)" opacity="0.7"/>
        <text x="100" y="15" text-anchor="middle" font-size="8.5" fill="#fff">Phonological</text>
        <rect x="142" y="0" width="60" height="22" rx="4" fill="var(--speech)" opacity="0.7"/>
        <text x="172" y="15" text-anchor="middle" font-size="8.5" fill="#fff">Syntactic</text>
        <rect x="208" y="0" width="62" height="22" rx="4" fill="var(--speech)" opacity="0.7"/>
        <text x="239" y="15" text-anchor="middle" font-size="8.5" fill="#fff">Semantic</text>
        <rect x="276" y="0" width="65" height="22" rx="4" fill="var(--speech)" opacity="0.7"/>
        <text x="308" y="15" text-anchor="middle" font-size="8.5" fill="#fff">Pragmatic</text>
        <rect x="347" y="0" width="45" height="22" rx="4" fill="var(--speech)" opacity="0.7"/>
        <text x="369" y="15" text-anchor="middle" font-size="8.5" fill="#fff">Motor</text>
      </g>
      <text x="230" y="400" text-anchor="middle" font-size="11" fill="var(--speech)" font-weight="600">Requires polytropic attention allocation</text>

      <!-- Visual AAC (sequential, single-channel) -->
      <rect x="460" y="320" width="420" height="100" rx="10" fill="var(--aac-bg)" stroke="var(--aac)" stroke-width="2"/>
      <text x="670" y="343" text-anchor="middle" font-size="12" font-weight="700" fill="var(--aac)">Visual AAC: Sequential, Single-Channel</text>
      <g transform="translate(490, 355)">
        <rect x="0" y="0" width="80" height="22" rx="4" fill="var(--aac)" opacity="0.8"/>
        <text x="40" y="15" text-anchor="middle" font-size="9" fill="#fff">Look at symbol</text>
        <text x="90" y="15" font-size="14" fill="var(--muted)">-></text>
        <rect x="108" y="0" width="70" height="22" rx="4" fill="var(--aac)" opacity="0.6"/>
        <text x="143" y="15" text-anchor="middle" font-size="9" fill="#fff">Select word</text>
        <text x="188" y="15" font-size="14" fill="var(--muted)">-></text>
        <rect x="206" y="0" width="100" height="22" rx="4" fill="var(--aac)" opacity="0.4"/>
        <text x="256" y="15" text-anchor="middle" font-size="9" fill="#fff">Device speaks</text>
      </g>
      <text x="670" y="400" text-anchor="middle" font-size="11" fill="var(--aac)" font-weight="600">Compatible with monotropic attention</text>

      <!-- Bottom insight -->
      <rect x="120" y="445" width="660" height="80" rx="10" fill="var(--surface)" stroke="var(--border)" stroke-width="1.5"/>
      <text x="450" y="470" text-anchor="middle" font-size="12" font-weight="700" fill="var(--fg)">Monotropism Explains Both</text>
      <text x="260" y="495" text-anchor="middle" font-size="11" fill="var(--mono)">Strengths: deep focus, pattern</text>
      <text x="260" y="512" text-anchor="middle" font-size="11" fill="var(--mono)">detection, flow states, expertise</text>
      <text x="640" y="495" text-anchor="middle" font-size="11" fill="var(--speech)">Communication challenges: speech</text>
      <text x="640" y="512" text-anchor="middle" font-size="11" fill="var(--speech)">requires multi-channel switching</text>
    </svg>
  </div>
  <figcaption>
    <strong>Figure 3: Monotropism vs. Polytropism -- Attention Allocation Models</strong>
    <span>Monotropic attention (Murray et al., 2005) concentrates processing resources in deep, narrow channels. Speech production requires managing 6+ channels simultaneously (phonetic, phonological, syntactic, semantic, pragmatic, motor) -- a fundamentally polytropic task. Visual AAC allows sequential, single-channel engagement that is more compatible with monotropic processing. This framework is a theoretical model, not yet empirically validated as a causal mechanism.</span>
  </figcaption>
</figure>
</body>
</html>
