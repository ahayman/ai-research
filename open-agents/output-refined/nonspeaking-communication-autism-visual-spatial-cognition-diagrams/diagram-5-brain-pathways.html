<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visual Processing of Linguistic Material -- Brain Pathways</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --muted: #6c757d;
    --nt: #3b82f6; --nt-bg: #dbeafe;
    --aut: #7c3aed; --aut-bg: #f3e8ff;
    --accent: #4361ee;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a; --fg: #e8e8f0; --surface: #1a1a2e; --border: #2d2d44;
      --muted: #9a9ab0;
      --nt: #60a5fa; --nt-bg: #172554;
      --aut: #b197fc; --aut-bg: #1e1030;
      --accent: #6b8aff;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--fg); display: flex; justify-content: center; padding: 2rem 1rem; }
  figure { max-width: 960px; width: 100%; background: var(--surface); border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); padding: 2.5rem; }
  h2 { text-align: center; font-size: 1.4rem; margin-bottom: 0.4rem; }
  .subtitle { text-align: center; font-size: 0.95rem; color: var(--muted); margin-bottom: 2rem; }
  .diagram-wrapper { overflow-x: auto; padding: 0.5rem; }
  svg { display: block; margin: 0 auto; }
  figcaption { text-align: center; margin-top: 1.5rem; padding-top: 1.25rem; border-top: 1px solid var(--border); }
  figcaption strong { display: block; font-size: 1.05rem; margin-bottom: 0.4rem; }
  figcaption span { font-size: 0.88rem; color: var(--muted); line-height: 1.5; }
</style>
</head>
<body>
<figure>
  <h2>How Two Brains Process the Same Letter</h2>
  <p class="subtitle">Visual-spatial vs. phonological encoding of linguistic material</p>
  <div class="diagram-wrapper">
    <svg viewBox="0 0 900 460" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif" role="img" aria-labelledby="title-path desc-path">
      <title id="title-path">Brain Processing Pathways for Letters</title>
      <desc id="desc-path">Two parallel processing pathways for the letter B. Neurotypical pathway: left-hemisphere language regions automatically recode the letter as its phonological name. Autistic pathway: right-hemisphere visual regions process the letter as a visual pattern -- two bumps and a line. Both lead to knowing the letter but through fundamentally different neural routes.</desc>

      <defs>
        <marker id="arrNt" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
          <polygon points="0 0, 10 3.5, 0 7" fill="var(--nt)"/>
        </marker>
        <marker id="arrAut" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
          <polygon points="0 0, 10 3.5, 0 7" fill="var(--aut)"/>
        </marker>
      </defs>

      <!-- Shared stimulus -->
      <rect x="370" y="20" width="160" height="80" rx="12" fill="var(--surface)" stroke="var(--border)" stroke-width="2.5"/>
      <text x="450" y="48" text-anchor="middle" font-size="36" font-weight="700" fill="var(--fg)">B</text>
      <text x="450" y="80" text-anchor="middle" font-size="10" fill="var(--muted)">Same visual stimulus</text>

      <!-- Split arrows -->
      <line x1="400" y1="100" x2="220" y2="140" stroke="var(--nt)" stroke-width="2.5" marker-end="url(#arrNt)"/>
      <line x1="500" y1="100" x2="680" y2="140" stroke="var(--aut)" stroke-width="2.5" marker-end="url(#arrAut)"/>

      <!-- NT Pathway (left) -->
      <rect x="40" y="145" width="360" height="260" rx="12" fill="var(--nt-bg)" stroke="var(--nt)" stroke-width="2"/>
      <text x="220" y="172" text-anchor="middle" font-size="14" font-weight="700" fill="var(--nt)">Neurotypical Pathway</text>
      <text x="220" y="190" text-anchor="middle" font-size="10" fill="var(--muted)">Left-hemisphere language processing</text>

      <!-- NT steps -->
      <rect x="70" y="205" width="300" height="35" rx="6" fill="var(--nt)" opacity="0.15"/>
      <text x="220" y="228" text-anchor="middle" font-size="11" fill="var(--fg)">1. Visual cortex receives "B"</text>

      <text x="220" y="250" text-anchor="middle" font-size="14" fill="var(--nt)">|</text>

      <rect x="70" y="260" width="300" height="35" rx="6" fill="var(--nt)" opacity="0.2"/>
      <text x="220" y="283" text-anchor="middle" font-size="11" fill="var(--fg)">2. Left Broca's + Wernicke's areas activate</text>

      <text x="220" y="305" text-anchor="middle" font-size="14" fill="var(--nt)">|</text>

      <rect x="70" y="315" width="300" height="35" rx="6" fill="var(--nt)" opacity="0.25"/>
      <text x="220" y="338" text-anchor="middle" font-size="11" fill="var(--fg)">3. Phonological recoding: "B" -> /bi:/</text>

      <text x="220" y="360" text-anchor="middle" font-size="14" fill="var(--nt)">|</text>

      <rect x="70" y="370" width="300" height="25" rx="6" fill="var(--nt)" opacity="0.3"/>
      <text x="220" y="388" text-anchor="middle" font-size="11" font-weight="600" fill="var(--nt)">Stored as a SOUND in verbal memory</text>

      <!-- Autistic Pathway (right) -->
      <rect x="500" y="145" width="370" height="260" rx="12" fill="var(--aut-bg)" stroke="var(--aut)" stroke-width="2"/>
      <text x="685" y="172" text-anchor="middle" font-size="14" font-weight="700" fill="var(--aut)">Autistic Pathway</text>
      <text x="685" y="190" text-anchor="middle" font-size="10" fill="var(--muted)">Right-hemisphere visual-spatial processing</text>

      <!-- Aut steps -->
      <rect x="530" y="205" width="310" height="35" rx="6" fill="var(--aut)" opacity="0.1"/>
      <text x="685" y="228" text-anchor="middle" font-size="11" fill="var(--fg)">1. Visual cortex receives "B"</text>

      <text x="685" y="250" text-anchor="middle" font-size="14" fill="var(--aut)">|</text>

      <rect x="530" y="260" width="310" height="35" rx="6" fill="var(--aut)" opacity="0.15"/>
      <text x="685" y="283" text-anchor="middle" font-size="11" fill="var(--fg)">2. Right occipital + parietal areas activate</text>

      <text x="685" y="305" text-anchor="middle" font-size="14" fill="var(--aut)">|</text>

      <rect x="530" y="315" width="310" height="35" rx="6" fill="var(--aut)" opacity="0.2"/>
      <text x="685" y="338" text-anchor="middle" font-size="11" fill="var(--fg)">3. Visuographic encoding: "two bumps + line"</text>

      <text x="685" y="360" text-anchor="middle" font-size="14" fill="var(--aut)">|</text>

      <rect x="530" y="370" width="310" height="25" rx="6" fill="var(--aut)" opacity="0.25"/>
      <text x="685" y="388" text-anchor="middle" font-size="11" font-weight="600" fill="var(--aut)">Stored as a SHAPE in visual memory</text>

      <!-- Bottom insight -->
      <rect x="120" y="420" width="660" height="30" rx="8" fill="var(--surface)" stroke="var(--accent)" stroke-width="1.5"/>
      <text x="450" y="440" text-anchor="middle" font-size="11" fill="var(--fg)">Both individuals "know" the letter. Different neural pathways. Neither is wrong. <tspan font-size="9" fill="var(--muted)">(Minshew / NICHD fMRI)</tspan></text>
    </svg>
  </div>
  <figcaption>
    <strong>Figure 5: Visual Processing of Linguistic Material -- Brain Pathways</strong>
    <span>When a neurotypical adult sees the letter "B," their brain automatically recodes it as its phonological name (/bi:/) using left-hemisphere language regions. When an autistic adult sees the same letter, they process it as a visual pattern using right-hemisphere visuographic regions (Minshew fMRI research, NICHD). Both individuals know the letter, but through fundamentally different neural routes -- explaining why visual communication methods may be more neurologically compatible for some autistic individuals than speech.</span>
  </figcaption>
</figure>
</body>
</html>
