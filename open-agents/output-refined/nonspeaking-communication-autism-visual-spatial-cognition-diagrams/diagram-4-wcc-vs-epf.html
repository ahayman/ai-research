<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weak Central Coherence vs. EPF -- Reframing the Same Data</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --muted: #6c757d;
    --deficit: #dc3545; --deficit-bg: #fee2e2;
    --strength: #198754; --strength-bg: #edfff5;
    --data: #4361ee; --data-bg: #e8edff;
    --impl: #7c3aed; --impl-bg: #f3e8ff;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a; --fg: #e8e8f0; --surface: #1a1a2e; --border: #2d2d44;
      --muted: #9a9ab0;
      --deficit: #ff6b6b; --deficit-bg: #2a1010;
      --strength: #51cf66; --strength-bg: #0a2a15;
      --data: #6b8aff; --data-bg: #1e2a4a;
      --impl: #b197fc; --impl-bg: #1e1030;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--fg); display: flex; justify-content: center; padding: 2rem 1rem; }
  figure { max-width: 960px; width: 100%; background: var(--surface); border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); padding: 2.5rem; }
  h2 { text-align: center; font-size: 1.4rem; margin-bottom: 0.4rem; }
  .subtitle { text-align: center; font-size: 0.95rem; color: var(--muted); margin-bottom: 2rem; }
  .diagram-wrapper { overflow-x: auto; padding: 0.5rem; }
  svg { display: block; margin: 0 auto; }
  figcaption { text-align: center; margin-top: 1.5rem; padding-top: 1.25rem; border-top: 1px solid var(--border); }
  figcaption strong { display: block; font-size: 1.05rem; margin-bottom: 0.4rem; }
  figcaption span { font-size: 0.88rem; color: var(--muted); line-height: 1.5; }
</style>
</head>
<body>
<figure>
  <h2>Two Framings, Same Data</h2>
  <p class="subtitle">How Weak Central Coherence and EPF interpret identical observations differently</p>
  <div class="diagram-wrapper">
    <svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif" role="img" aria-labelledby="title-wcc desc-wcc">
      <title id="title-wcc">WCC vs EPF Comparison</title>
      <desc id="desc-wcc">Side-by-side comparison showing how the same observable phenomena in autism are interpreted as deficits by Weak Central Coherence theory (Frith 1989) and as strengths by the Enhanced Perceptual Functioning model (Mottron 2006). The framing has direct implications for intervention design.</desc>

      <!-- Headers -->
      <rect x="20" y="20" width="270" height="40" rx="8" fill="var(--data-bg)" stroke="var(--data)" stroke-width="2"/>
      <text x="155" y="46" text-anchor="middle" font-size="13" font-weight="700" fill="var(--data)">Observable Data</text>

      <rect x="310" y="20" width="270" height="40" rx="8" fill="var(--deficit-bg)" stroke="var(--deficit)" stroke-width="2"/>
      <text x="445" y="40" text-anchor="middle" font-size="12" font-weight="700" fill="var(--deficit)">WCC Interpretation</text>
      <text x="445" y="55" text-anchor="middle" font-size="9" fill="var(--muted)">Frith, 1989 -- Deficit</text>

      <rect x="600" y="20" width="280" height="40" rx="8" fill="var(--strength-bg)" stroke="var(--strength)" stroke-width="2"/>
      <text x="740" y="40" text-anchor="middle" font-size="12" font-weight="700" fill="var(--strength)">EPF Interpretation</text>
      <text x="740" y="55" text-anchor="middle" font-size="9" fill="var(--muted)">Mottron, 2006 -- Strength</text>

      <!-- Row 1 -->
      <rect x="20" y="80" width="270" height="55" rx="6" fill="var(--data-bg)" stroke="var(--data)" stroke-width="1"/>
      <text x="155" y="100" text-anchor="middle" font-size="11" font-weight="600" fill="var(--fg)">Superior performance on</text>
      <text x="155" y="116" text-anchor="middle" font-size="11" font-weight="600" fill="var(--fg)">Embedded Figures Test</text>

      <rect x="310" y="80" width="270" height="55" rx="6" fill="var(--deficit-bg)" stroke="var(--deficit)" stroke-width="1"/>
      <text x="445" y="100" text-anchor="middle" font-size="11" fill="var(--fg)">"Cannot see the big picture"</text>
      <text x="445" y="116" text-anchor="middle" font-size="11" fill="var(--fg)">-- detail at expense of whole</text>

      <rect x="600" y="80" width="280" height="55" rx="6" fill="var(--strength-bg)" stroke="var(--strength)" stroke-width="1"/>
      <text x="740" y="100" text-anchor="middle" font-size="11" fill="var(--fg)">"Enhanced detail detection"</text>
      <text x="740" y="116" text-anchor="middle" font-size="11" fill="var(--fg)">-- superior perceptual acuity</text>

      <!-- Row 2 -->
      <rect x="20" y="150" width="270" height="55" rx="6" fill="var(--data-bg)" stroke="var(--data)" stroke-width="1"/>
      <text x="155" y="170" text-anchor="middle" font-size="11" font-weight="600" fill="var(--fg)">Detail-focused visual</text>
      <text x="155" y="186" text-anchor="middle" font-size="11" font-weight="600" fill="var(--fg)">processing preference</text>

      <rect x="310" y="150" width="270" height="55" rx="6" fill="var(--deficit-bg)" stroke="var(--deficit)" stroke-width="1"/>
      <text x="445" y="170" text-anchor="middle" font-size="11" fill="var(--fg)">"Coherence deficit"</text>
      <text x="445" y="186" text-anchor="middle" font-size="11" fill="var(--fg)">-- failure to integrate</text>

      <rect x="600" y="150" width="280" height="55" rx="6" fill="var(--strength-bg)" stroke="var(--strength)" stroke-width="1"/>
      <text x="740" y="170" text-anchor="middle" font-size="11" fill="var(--fg)">"Perceptual superiority"</text>
      <text x="740" y="186" text-anchor="middle" font-size="11" fill="var(--fg)">-- enhanced local processing</text>

      <!-- Row 3 -->
      <rect x="20" y="220" width="270" height="55" rx="6" fill="var(--data-bg)" stroke="var(--data)" stroke-width="1"/>
      <text x="155" y="240" text-anchor="middle" font-size="11" font-weight="600" fill="var(--fg)">Local processing advantage</text>
      <text x="155" y="256" text-anchor="middle" font-size="11" font-weight="600" fill="var(--fg)">over global processing</text>

      <rect x="310" y="220" width="270" height="55" rx="6" fill="var(--deficit-bg)" stroke="var(--deficit)" stroke-width="1"/>
      <text x="445" y="240" text-anchor="middle" font-size="11" fill="var(--fg)">"Global processing failure"</text>
      <text x="445" y="256" text-anchor="middle" font-size="11" fill="var(--fg)">-- cannot process wholes</text>

      <rect x="600" y="220" width="280" height="55" rx="6" fill="var(--strength-bg)" stroke="var(--strength)" stroke-width="1"/>
      <text x="740" y="240" text-anchor="middle" font-size="11" fill="var(--fg)">"Local enhancement, global intact</text>
      <text x="740" y="256" text-anchor="middle" font-size="11" fill="var(--fg)">but non-dominant"</text>

      <!-- Row 4 -->
      <rect x="20" y="290" width="270" height="55" rx="6" fill="var(--data-bg)" stroke="var(--data)" stroke-width="1"/>
      <text x="155" y="310" text-anchor="middle" font-size="11" font-weight="600" fill="var(--fg)">Different neural activation</text>
      <text x="155" y="326" text-anchor="middle" font-size="11" font-weight="600" fill="var(--fg)">patterns in visual tasks</text>

      <rect x="310" y="290" width="270" height="55" rx="6" fill="var(--deficit-bg)" stroke="var(--deficit)" stroke-width="1"/>
      <text x="445" y="310" text-anchor="middle" font-size="11" fill="var(--fg)">"Dysfunctional processing"</text>
      <text x="445" y="326" text-anchor="middle" font-size="11" fill="var(--fg)">-- brain not working correctly</text>

      <rect x="600" y="290" width="280" height="55" rx="6" fill="var(--strength-bg)" stroke="var(--strength)" stroke-width="1"/>
      <text x="740" y="310" text-anchor="middle" font-size="11" fill="var(--fg)">"Alternative processing strategy"</text>
      <text x="740" y="326" text-anchor="middle" font-size="11" fill="var(--fg)">-- different but effective</text>

      <!-- Implications row -->
      <text x="450" y="380" text-anchor="middle" font-size="13" font-weight="700" fill="var(--fg)">Intervention Implications</text>
      <line x1="100" y1="390" x2="800" y2="390" stroke="var(--border)" stroke-width="1"/>

      <rect x="310" y="400" width="270" height="80" rx="8" fill="var(--deficit-bg)" stroke="var(--deficit)" stroke-width="1.5"/>
      <text x="445" y="425" text-anchor="middle" font-size="11" font-weight="600" fill="var(--deficit)">Remediate the deficit</text>
      <text x="445" y="445" text-anchor="middle" font-size="10" fill="var(--fg)">Teach global processing</text>
      <text x="445" y="460" text-anchor="middle" font-size="10" fill="var(--fg)">Train "big picture" thinking</text>
      <text x="445" y="475" text-anchor="middle" font-size="10" fill="var(--fg)">Fix what's "broken"</text>

      <rect x="600" y="400" width="280" height="80" rx="8" fill="var(--strength-bg)" stroke="var(--strength)" stroke-width="1.5"/>
      <text x="740" y="425" text-anchor="middle" font-size="11" font-weight="600" fill="var(--strength)">Accommodate and leverage</text>
      <text x="740" y="445" text-anchor="middle" font-size="10" fill="var(--fg)">Design visual-spatial communication</text>
      <text x="740" y="460" text-anchor="middle" font-size="10" fill="var(--fg)">Use consistent spatial layouts</text>
      <text x="740" y="475" text-anchor="middle" font-size="10" fill="var(--fg)">Work with the cognitive profile</text>
    </svg>
  </div>
  <figcaption>
    <strong>Figure 4: Weak Central Coherence vs. EPF -- Reframing the Same Data</strong>
    <span>The same observable phenomena in autism -- detail-focused processing, local advantages, different neural activation -- are interpreted as deficits by Weak Central Coherence (Frith, 1989) and as strengths by Enhanced Perceptual Functioning (Mottron, 2006). The framing directly determines intervention design: a deficit frame leads to remediation; a strength frame leads to accommodation and leverage. Current evidence favors the EPF account, though the debate continues.</span>
  </figcaption>
</figure>
</body>
</html>
