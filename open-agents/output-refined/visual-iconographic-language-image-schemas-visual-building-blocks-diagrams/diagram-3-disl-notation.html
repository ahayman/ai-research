<!-- Diagram: DISL Notation System Reference Card -->
<!-- Type: reference card / notation guide -->
<!-- Generated: 2026-03-31 -->
<!-- Description: Shows DISL's visual primitives, composition rules, and the strip format for representing temporally extended narratives -->

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DISL Notation System</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #f8f9fa;
    color: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 2rem;
  }
  figure {
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
    max-width: 1100px;
    width: 100%;
  }
  .diagram-title {
    text-align: center;
    font-size: 1.3rem;
    font-weight: 700;
    margin-bottom: 0.3rem;
  }
  .diagram-subtitle {
    text-align: center;
    font-size: 0.85rem;
    color: #6c757d;
    margin-bottom: 0.3rem;
  }
  .diagram-citation {
    text-align: center;
    font-size: 0.72rem;
    color: #9ca3af;
    margin-bottom: 2rem;
  }
  .section-title {
    font-size: 0.9rem;
    font-weight: 700;
    margin-bottom: 1rem;
    padding-bottom: 0.3rem;
    border-bottom: 2px solid #e5e7eb;
    color: #374151;
  }
  .primitives-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 1rem;
    margin-bottom: 2rem;
  }
  .prim-card {
    text-align: center;
    padding: 0.8rem;
    border: 1.5px solid #e5e7eb;
    border-radius: 10px;
    background: #fafafa;
  }
  .prim-label {
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: #6366f1;
    margin-bottom: 0.4rem;
  }
  .prim-svg {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 60px;
    margin-bottom: 0.3rem;
  }
  .prim-desc {
    font-size: 0.65rem;
    color: #6b7280;
    line-height: 1.4;
  }
  .strip-section {
    margin-top: 2rem;
    margin-bottom: 1.5rem;
  }
  .strip-container {
    display: flex;
    align-items: stretch;
    gap: 0;
    border: 2px solid #374151;
    border-radius: 10px;
    overflow: hidden;
    margin-top: 1rem;
  }
  .strip-panel {
    flex: 1;
    padding: 1rem;
    text-align: center;
    border-right: 1.5px solid #d1d5db;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 120px;
    background: #fefefe;
  }
  .strip-panel:last-child { border-right: none; }
  .panel-num {
    font-size: 0.6rem;
    font-weight: 700;
    color: #9ca3af;
    margin-bottom: 0.5rem;
  }
  .panel-label {
    font-size: 0.7rem;
    color: #4b5563;
    margin-top: 0.5rem;
    font-weight: 600;
  }
  .composition-section {
    margin-top: 2rem;
  }
  .comp-row {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 1rem;
    flex-wrap: wrap;
  }
  .comp-part {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.6rem 1rem;
    border: 1.5px solid #e5e7eb;
    border-radius: 8px;
    background: #fafafa;
  }
  .comp-plus {
    font-size: 1.2rem;
    font-weight: 700;
    color: #6366f1;
  }
  .comp-equals {
    font-size: 1.2rem;
    font-weight: 700;
    color: #059669;
  }
  .comp-result {
    padding: 0.6rem 1rem;
    border: 2px solid #059669;
    border-radius: 8px;
    background: #f0fdf4;
    font-weight: 600;
    font-size: 0.85rem;
    color: #047857;
  }
  .comp-label {
    font-size: 0.75rem;
    color: #4b5563;
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    font-size: 0.85rem;
    color: #4b5563;
    font-style: italic;
    line-height: 1.6;
  }
  @media (prefers-color-scheme: dark) {
    body { background: #0f172a; color: #e2e8f0; }
    figure { background: #1e293b; box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
    .diagram-title { color: #f1f5f9; }
    .diagram-subtitle, .diagram-citation { color: #94a3b8; }
    .section-title { color: #e2e8f0; border-bottom-color: #334155; }
    .prim-card { background: #0f172a; border-color: #334155; }
    .prim-label { color: #a5b4fc; }
    .prim-desc { color: #94a3b8; }
    .strip-container { border-color: #94a3b8; }
    .strip-panel { background: #0f172a; border-color: #475569; }
    .panel-num { color: #64748b; }
    .panel-label { color: #cbd5e1; }
    .comp-part { background: #0f172a; border-color: #334155; }
    .comp-label { color: #94a3b8; }
    .comp-result { background: #052e16; border-color: #059669; color: #6ee7b7; }
    .comp-plus { color: #a5b4fc; }
    .comp-equals { color: #6ee7b7; }
    figcaption { color: #94a3b8; }
    svg text { fill: #e2e8f0; }
  }
  @media (max-width: 768px) {
    .primitives-grid { grid-template-columns: repeat(2, 1fr); }
    .strip-container { flex-direction: column; }
    .strip-panel { border-right: none; border-bottom: 1.5px solid #d1d5db; }
    .comp-row { flex-direction: column; align-items: flex-start; }
  }
  @media print {
    body { background: white; padding: 0; }
    figure { box-shadow: none; border: 1px solid #ccc; }
  }
</style>
</head>
<body>
<figure class="concept-diagram" id="diagram-disl-notation">
  <div class="diagram-title">DISL: Diagrammatic Image Schema Language</div>
  <div class="diagram-subtitle">A formal visual notation for image schema primitives and their composition</div>
  <div class="diagram-citation">Hedblom, Neuhaus, and Mossakowski — Spatial Cognition and Computation, published online 2024, Volume 25 (2025)</div>

  <div class="section-title">Visual Primitives</div>
  <div class="primitives-grid">
    <div class="prim-card">
      <div class="prim-label">Object</div>
      <div class="prim-svg">
        <svg width="60" height="50" viewBox="0 0 60 50">
          <circle cx="20" cy="25" r="10" fill="#6366f1" opacity="0.3" stroke="#6366f1" stroke-width="2"/>
          <circle cx="44" cy="25" r="10" fill="none" stroke="#6366f1" stroke-width="2"/>
        </svg>
      </div>
      <div class="prim-desc">Filled = active/agent. Outlined = passive/patient.</div>
    </div>
    <div class="prim-card">
      <div class="prim-label">Path / Trajectory</div>
      <div class="prim-svg">
        <svg width="60" height="50" viewBox="0 0 60 50">
          <line x1="8" y1="18" x2="50" y2="18" stroke="#6366f1" stroke-width="2" marker-end="url(#dislArr)"/>
          <line x1="8" y1="35" x2="50" y2="35" stroke="#6366f1" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#dislArr2)"/>
          <text x="0" y="48" font-size="7" fill="#9ca3af">solid=actual  dashed=potential</text>
          <defs>
            <marker id="dislArr" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto"><polygon points="0 0, 7 2.5, 0 5" fill="#6366f1"/></marker>
            <marker id="dislArr2" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto"><polygon points="0 0, 7 2.5, 0 5" fill="#6366f1"/></marker>
          </defs>
        </svg>
      </div>
      <div class="prim-desc">Solid arrow = actual motion. Dashed = unrealized.</div>
    </div>
    <div class="prim-card">
      <div class="prim-label">Region</div>
      <div class="prim-svg">
        <svg width="60" height="50" viewBox="0 0 60 50">
          <rect x="5" y="8" width="22" height="34" rx="3" fill="none" stroke="#6366f1" stroke-width="2"/>
          <rect x="33" y="8" width="22" height="34" rx="3" fill="none" stroke="#6366f1" stroke-width="2" stroke-dasharray="4,3"/>
        </svg>
      </div>
      <div class="prim-desc">Solid boundary = impermeable. Dashed = permeable.</div>
    </div>
    <div class="prim-card">
      <div class="prim-label">Force</div>
      <div class="prim-svg">
        <svg width="60" height="50" viewBox="0 0 60 50">
          <line x1="8" y1="25" x2="48" y2="25" stroke="#6366f1" stroke-width="5" marker-end="url(#dislForce)"/>
          <defs><marker id="dislForce" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#6366f1"/></marker></defs>
        </svg>
      </div>
      <div class="prim-desc">Thick arrow. Width encodes force magnitude.</div>
    </div>
    <div class="prim-card">
      <div class="prim-label">Contact</div>
      <div class="prim-svg">
        <svg width="60" height="50" viewBox="0 0 60 50">
          <circle cx="22" cy="25" r="10" fill="none" stroke="#6366f1" stroke-width="2"/>
          <circle cx="38" cy="25" r="10" fill="none" stroke="#6366f1" stroke-width="2"/>
          <circle cx="30" cy="25" r="2" fill="#6366f1"/>
        </svg>
      </div>
      <div class="prim-desc">Two entities touching at a shared point.</div>
    </div>
    <div class="prim-card">
      <div class="prim-label">Temporal Strip</div>
      <div class="prim-svg">
        <svg width="60" height="50" viewBox="0 0 60 50">
          <rect x="2" y="10" width="16" height="30" rx="2" fill="none" stroke="#6366f1" stroke-width="1.5"/>
          <rect x="22" y="10" width="16" height="30" rx="2" fill="none" stroke="#6366f1" stroke-width="1.5"/>
          <rect x="42" y="10" width="16" height="30" rx="2" fill="none" stroke="#6366f1" stroke-width="1.5"/>
          <text x="6" y="29" font-size="7" fill="#6366f1">t1</text>
          <text x="26" y="29" font-size="7" fill="#6366f1">t2</text>
          <text x="46" y="29" font-size="7" fill="#6366f1">t3</text>
        </svg>
      </div>
      <div class="prim-desc">Left-to-right panels = temporal progression.</div>
    </div>
  </div>

  <div class="strip-section">
    <div class="section-title">Example: "Person puts object into box" as a DISL Strip</div>
    <div class="strip-container">
      <div class="strip-panel">
        <div class="panel-num">Panel 1 — Initial State</div>
        <svg width="100" height="80" viewBox="0 0 100 80">
          <circle cx="25" cy="35" r="10" fill="#6366f1" opacity="0.3" stroke="#6366f1" stroke-width="2"/>
          <circle cx="50" cy="35" r="6" fill="#6366f1" opacity="0.5" stroke="#6366f1" stroke-width="1.5"/>
          <rect x="70" y="20" width="25" height="35" rx="3" fill="none" stroke="#6366f1" stroke-width="2"/>
          <text x="12" y="60" font-size="7" fill="#6b7280">agent</text>
          <text x="40" y="60" font-size="7" fill="#6b7280">obj</text>
          <text x="72" y="68" font-size="7" fill="#6b7280">container</text>
        </svg>
        <div class="panel-label">Agent, object, empty container</div>
      </div>
      <div class="strip-panel">
        <div class="panel-num">Panel 2 — Force + Path</div>
        <svg width="100" height="80" viewBox="0 0 100 80">
          <circle cx="20" cy="35" r="10" fill="#6366f1" opacity="0.3" stroke="#6366f1" stroke-width="2"/>
          <line x1="30" y1="35" x2="52" y2="35" stroke="#6366f1" stroke-width="4" marker-end="url(#stripForce)"/>
          <circle cx="58" cy="35" r="6" fill="#6366f1" opacity="0.5" stroke="#6366f1" stroke-width="1.5"/>
          <line x1="64" y1="35" x2="72" y2="35" stroke="#6366f1" stroke-width="2" stroke-dasharray="3,2" marker-end="url(#stripPath)"/>
          <rect x="73" y="20" width="25" height="35" rx="3" fill="none" stroke="#6366f1" stroke-width="2"/>
          <defs>
            <marker id="stripForce" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto"><polygon points="0 0, 7 2.5, 0 5" fill="#6366f1"/></marker>
            <marker id="stripPath" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto"><polygon points="0 0, 6 2, 0 4" fill="#6366f1"/></marker>
          </defs>
        </svg>
        <div class="panel-label">Agent applies force, object on path to container</div>
      </div>
      <div class="strip-panel">
        <div class="panel-num">Panel 3 — Result</div>
        <svg width="100" height="80" viewBox="0 0 100 80">
          <circle cx="25" cy="35" r="10" fill="#6366f1" opacity="0.3" stroke="#6366f1" stroke-width="2"/>
          <rect x="55" y="20" width="30" height="35" rx="3" fill="none" stroke="#6366f1" stroke-width="2"/>
          <circle cx="70" cy="38" r="6" fill="#6366f1" opacity="0.5" stroke="#6366f1" stroke-width="1.5"/>
        </svg>
        <div class="panel-label">Object inside container (containment achieved)</div>
      </div>
    </div>
  </div>

  <div class="composition-section">
    <div class="section-title">Composition Rule: Primitives combine within panels following spatial logic</div>
    <div class="comp-row">
      <div class="comp-part">
        <svg width="30" height="24"><circle cx="15" cy="12" r="8" fill="none" stroke="#6366f1" stroke-width="2"/></svg>
        <span class="comp-label">Object</span>
      </div>
      <span class="comp-plus">+</span>
      <div class="comp-part">
        <svg width="30" height="24"><rect x="3" y="2" width="24" height="20" rx="3" fill="none" stroke="#6366f1" stroke-width="2"/></svg>
        <span class="comp-label">Region</span>
      </div>
      <span class="comp-equals">=</span>
      <div class="comp-result">CONTAINMENT (object inside region)</div>
    </div>
    <div class="comp-row">
      <div class="comp-part">
        <svg width="30" height="24"><line x1="4" y1="12" x2="24" y2="12" stroke="#6366f1" stroke-width="4"/></svg>
        <span class="comp-label">Force</span>
      </div>
      <span class="comp-plus">+</span>
      <div class="comp-part">
        <svg width="30" height="24"><line x1="4" y1="12" x2="26" y2="12" stroke="#6366f1" stroke-width="2" marker-end="url(#compArr)"/><defs><marker id="compArr" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto"><polygon points="0 0, 6 2, 0 4" fill="#6366f1"/></marker></defs></svg>
        <span class="comp-label">Path</span>
      </div>
      <span class="comp-equals">=</span>
      <div class="comp-result">CAUSED MOTION (force drives object along path)</div>
    </div>
  </div>

  <figcaption>
    <strong>Figure 3:</strong> The Diagrammatic Image Schema Language (DISL) by Hedblom, Neuhaus, and Mossakowski (published online 2024, Volume 25, 2025). DISL demonstrates that image schemas can receive formal, unambiguous, machine-readable visual representations. A small set of primitives (objects, paths, regions, forces, contacts) generates a wide range of schemas through cognitively motivated composition rules, using a comic-strip-like panel format for temporal narratives.
  </figcaption>
</figure>
</body>
</html>
