<figure class="concept-diagram" id="diagram-metaphor-chain">
  <div class="diagram-title">From Body to Abstract Thought: The Mapping Chain</div>
  <div class="diagram-subtitle">How embodied experience generates image schemas that ground abstract reasoning through primary metaphors (Grady, 1997)</div>

  <div class="chains-container">
    <!-- PATH CHAIN -->
    <div class="chain chain-path">
      <div class="chain-header">Path Schema</div>
      <div class="chain-level">
        <div class="chain-level-num">1. Embodied Experience</div>
        <div class="chain-level-content">Child walks across room to reach a toy</div>
      </div>
      <div class="arrow-row">&#8595;</div>
      <div class="chain-level">
        <div class="chain-level-num">2. Image Schema</div>
        <div class="chain-level-content">
          <svg width="80" height="24" viewBox="0 0 80 24"><circle cx="8" cy="12" r="4" fill="#3b82f6" opacity="0.4"/><line x1="14" y1="12" x2="64" y2="12" stroke="#3b82f6" stroke-width="2" marker-end="url(#mp)"/><circle cx="72" cy="12" r="4" fill="#3b82f6"/><defs><marker id="mp" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto"><polygon points="0 0, 6 2, 0 4" fill="#3b82f6"/></marker></defs></svg>
          <strong>SOURCE-PATH-GOAL</strong>
        </div>
      </div>
      <div class="arrow-row">&#8595;</div>
      <div class="chain-level">
        <div class="chain-level-num">3. Experiential Correlation</div>
        <div class="chain-level-content">Reaching goals co-occurs with reaching physical destinations</div>
      </div>
      <div class="arrow-row">&#8595;</div>
      <div class="chain-level">
        <div class="chain-level-num">4. Primary Metaphor</div>
        <div class="chain-level-content"><strong>PURPOSES ARE DESTINATIONS</strong></div>
      </div>
      <div class="arrow-row">&#8595;</div>
      <div class="chain-level">
        <div class="chain-level-num">5. Abstract Expressions</div>
        <div class="chain-level-content">"on the path to success" / "we've arrived at a conclusion" / "lost her way"</div>
      </div>
    </div>

    <!-- CONTAINER CHAIN -->
    <div class="chain chain-container">
      <div class="chain-header">Container Schema</div>
      <div class="chain-level">
        <div class="chain-level-num">1. Embodied Experience</div>
        <div class="chain-level-content">Child puts toy into cup, takes it out. Body is a container.</div>
      </div>
      <div class="arrow-row">&#8595;</div>
      <div class="chain-level">
        <div class="chain-level-num">2. Image Schema</div>
        <div class="chain-level-content">
          <svg width="50" height="30" viewBox="0 0 50 30"><circle cx="25" cy="15" r="13" fill="none" stroke="#8b5cf6" stroke-width="2"/><circle cx="25" cy="15" r="3" fill="#8b5cf6" opacity="0.5"/></svg>
          <strong>IN / OUT / BOUNDARY</strong>
        </div>
      </div>
      <div class="arrow-row">&#8595;</div>
      <div class="chain-level">
        <div class="chain-level-num">3. Experiential Correlation</div>
        <div class="chain-level-content">Emotional states feel like being "in" something — enclosed, bounded, trapped or safe</div>
      </div>
      <div class="arrow-row">&#8595;</div>
      <div class="chain-level">
        <div class="chain-level-num">4. Primary Metaphor</div>
        <div class="chain-level-content"><strong>STATES ARE CONTAINERS</strong></div>
      </div>
      <div class="arrow-row">&#8595;</div>
      <div class="chain-level">
        <div class="chain-level-num">5. Abstract Expressions</div>
        <div class="chain-level-content">"in trouble" / "full of joy" / "out of love" / "deep in thought"</div>
      </div>
    </div>

    <!-- VERTICALITY CHAIN -->
    <div class="chain chain-verticality">
      <div class="chain-header">Verticality Schema</div>
      <div class="chain-level">
        <div class="chain-level-num">1. Embodied Experience</div>
        <div class="chain-level-content">Piling blocks: more blocks = higher pile. Standing up vs. lying down.</div>
      </div>
      <div class="arrow-row">&#8595;</div>
      <div class="chain-level">
        <div class="chain-level-num">2. Image Schema</div>
        <div class="chain-level-content">
          <svg width="30" height="30" viewBox="0 0 30 30"><line x1="15" y1="28" x2="15" y2="4" stroke="#059669" stroke-width="2.5" marker-end="url(#mv)"/><defs><marker id="mv" markerWidth="6" markerHeight="4" refX="3" refY="2" orient="auto"><polygon points="0 0, 6 2, 0 4" fill="#059669"/></marker></defs></svg>
          <strong>UP = MORE / DOWN = LESS</strong>
        </div>
      </div>
      <div class="arrow-row">&#8595;</div>
      <div class="chain-level">
        <div class="chain-level-num">3. Experiential Correlation</div>
        <div class="chain-level-content">More substance = higher level. Health/consciousness = upright. Sickness = lying down.</div>
      </div>
      <div class="arrow-row">&#8595;</div>
      <div class="chain-level">
        <div class="chain-level-num">4. Primary Metaphor</div>
        <div class="chain-level-content"><strong>MORE IS UP / GOOD IS UP</strong></div>
      </div>
      <div class="arrow-row">&#8595;</div>
      <div class="chain-level">
        <div class="chain-level-num">5. Abstract Expressions</div>
        <div class="chain-level-content">"spirits rose" / "feeling down" / "high quality" / "low point"</div>
      </div>
    </div>

    <!-- FORCE CHAIN -->
    <div class="chain chain-force">
      <div class="chain-header">Force Schema</div>
      <div class="chain-level">
        <div class="chain-level-num">1. Embodied Experience</div>
        <div class="chain-level-content">Pushing heavy objects. Being pushed by others. Resistance and effort.</div>
      </div>
      <div class="arrow-row">&#8595;</div>
      <div class="chain-level">
        <div class="chain-level-num">2. Image Schema</div>
        <div class="chain-level-content">
          <svg width="60" height="24" viewBox="0 0 60 24"><line x1="6" y1="12" x2="44" y2="12" stroke="#dc2626" stroke-width="4" marker-end="url(#mf)"/><circle cx="52" cy="12" r="5" fill="none" stroke="#dc2626" stroke-width="2"/><defs><marker id="mf" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto"><polygon points="0 0, 6 2, 0 4" fill="#dc2626"/></marker></defs></svg>
          <strong>COMPULSION / BLOCKAGE</strong>
        </div>
      </div>
      <div class="arrow-row">&#8595;</div>
      <div class="chain-level">
        <div class="chain-level-num">3. Experiential Correlation</div>
        <div class="chain-level-content">Hard tasks feel like moving heavy objects. Persuasion feels like being pushed.</div>
      </div>
      <div class="arrow-row">&#8595;</div>
      <div class="chain-level">
        <div class="chain-level-num">4. Primary Metaphor</div>
        <div class="chain-level-content"><strong>DIFFICULTY IS HEAVINESS / CAUSES ARE FORCES</strong></div>
      </div>
      <div class="arrow-row">&#8595;</div>
      <div class="chain-level">
        <div class="chain-level-num">5. Abstract Expressions</div>
        <div class="chain-level-content">"heavy burden" / "she was driven to succeed" / "pushed into a corner"</div>
      </div>
    </div>
  </div>

  <div class="insight-box">
    <div class="insight-box-title">Why This Matters for Visual Language</div>
    <div class="insight-box-text">
      If this chain holds — image schemas ground primary metaphors, and primary metaphors structure abstract thought — then a system that visually represents image schemas could, through metaphorical extension, represent any concept human thought can express. The visual primitives in Level 2 become the building blocks not just for spatial meanings but for all meaning.
    </div>
  </div>

  <figcaption>
    <strong>Figure 4:</strong> Four parallel mapping chains showing how embodied experience generates image schemas, which through experiential correlation during development (Grady's Primary Metaphor Hypothesis, 1997) produce primary metaphors that structure abstract reasoning. Because the bodily experiences are universal, the metaphors may be universal — providing a cross-cultural foundation for visual symbol design.
  </figcaption>
</figure>
