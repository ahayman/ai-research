<body>
<figure class="concept-diagram" id="diagram-schema-gallery">
  <div class="diagram-title">The Image Schema Inventory</div>
  <div class="diagram-subtitle">Visual primitives from pre-linguistic bodily experience — the proposed "visual alphabet" for a universal visual language</div>

  <!-- SPATIAL FAMILY -->
  <div class="family-section family-spatial">
    <div class="family-label">Spatial Schemas</div>
    <div class="gallery">
      <div class="schema-card">
        <div class="schema-name">Container</div>
        <div class="schema-svg">
          <svg width="80" height="80" viewBox="0 0 80 80">
            <circle cx="40" cy="40" r="28" fill="none" stroke="#2563eb" stroke-width="2.5"/>
            <circle cx="40" cy="40" r="4" fill="#2563eb"/>
            <text x="65" y="18" font-size="8" fill="#94a3b8" font-style="italic">out</text>
            <text x="35" y="43" font-size="7" fill="#2563eb" font-weight="600">in</text>
          </svg>
        </div>
        <div class="schema-desc">Interior, boundary, exterior. Body as first container.</div>
      </div>

      <div class="schema-card">
        <div class="schema-name">Path</div>
        <div class="schema-svg">
          <svg width="80" height="80" viewBox="0 0 80 80">
            <circle cx="12" cy="40" r="5" fill="#2563eb" opacity="0.5"/>
            <line x1="17" y1="40" x2="60" y2="40" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowBlue)"/>
            <circle cx="68" cy="40" r="5" fill="#2563eb"/>
            <text x="5" y="60" font-size="7" fill="#94a3b8">source</text>
            <text x="48" y="60" font-size="7" fill="#94a3b8">goal</text>
            <defs><marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#2563eb"/></marker></defs>
          </svg>
        </div>
        <div class="schema-desc">Source, trajectory, goal. Every journey and purpose.</div>
      </div>

      <div class="schema-card">
        <div class="schema-name">Up-Down</div>
        <div class="schema-svg">
          <svg width="80" height="80" viewBox="0 0 80 80">
            <line x1="40" y1="70" x2="40" y2="12" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrowUp)"/>
            <text x="48" y="20" font-size="8" fill="#2563eb" font-weight="600">MORE</text>
            <text x="48" y="68" font-size="8" fill="#94a3b8">less</text>
            <defs><marker id="arrowUp" markerWidth="8" markerHeight="6" refX="4" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#2563eb"/></marker></defs>
          </svg>
        </div>
        <div class="schema-desc">Vertical axis. Up = more, active, conscious.</div>
      </div>

      <div class="schema-card">
        <div class="schema-name">Near-Far</div>
        <div class="schema-svg">
          <svg width="80" height="80" viewBox="0 0 80 80">
            <circle cx="20" cy="40" r="6" fill="#2563eb"/>
            <circle cx="42" cy="40" r="6" fill="#2563eb" opacity="0.6"/>
            <circle cx="68" cy="40" r="6" fill="#2563eb" opacity="0.25"/>
            <line x1="26" y1="55" x2="68" y2="55" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,2"/>
            <text x="15" y="68" font-size="7" fill="#2563eb">near</text>
            <text x="60" y="68" font-size="7" fill="#94a3b8">far</text>
          </svg>
        </div>
        <div class="schema-desc">Distance between entities. Closeness = accessibility.</div>
      </div>

      <div class="schema-card">
        <div class="schema-name">Center-Periphery</div>
        <div class="schema-svg">
          <svg width="80" height="80" viewBox="0 0 80 80">
            <circle cx="40" cy="40" r="28" fill="none" stroke="#2563eb" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
            <circle cx="40" cy="40" r="8" fill="#2563eb"/>
            <circle cx="18" cy="28" r="3" fill="#2563eb" opacity="0.3"/>
            <circle cx="60" cy="25" r="3" fill="#2563eb" opacity="0.3"/>
            <circle cx="55" cy="58" r="3" fill="#2563eb" opacity="0.3"/>
            <circle cx="22" cy="55" r="3" fill="#2563eb" opacity="0.3"/>
          </svg>
        </div>
        <div class="schema-desc">Focal center with peripheral surround.</div>
      </div>

      <div class="schema-card">
        <div class="schema-name">Contact</div>
        <div class="schema-svg">
          <svg width="80" height="80" viewBox="0 0 80 80">
            <circle cx="30" cy="40" r="12" fill="none" stroke="#2563eb" stroke-width="2"/>
            <circle cx="50" cy="40" r="12" fill="none" stroke="#2563eb" stroke-width="2"/>
            <circle cx="40" cy="40" r="2.5" fill="#2563eb"/>
          </svg>
        </div>
        <div class="schema-desc">Surfaces meeting. The tangible interface.</div>
      </div>

      <div class="schema-card">
        <div class="schema-name">Surface</div>
        <div class="schema-svg">
          <svg width="80" height="80" viewBox="0 0 80 80">
            <rect x="12" y="30" width="56" height="3" rx="1.5" fill="#2563eb" opacity="0.6"/>
            <circle cx="30" cy="31" r="3" fill="#2563eb"/>
            <line x1="30" y1="28" x2="30" y2="18" stroke="#2563eb" stroke-width="1" stroke-dasharray="2,2"/>
            <text x="34" y="22" font-size="7" fill="#94a3b8">on</text>
          </svg>
        </div>
        <div class="schema-desc">Extended plane. Support and exposure.</div>
      </div>
    </div>
  </div>

  <!-- FORCE FAMILY -->
  <div class="family-section family-force">

    <div class="gallery">
      <div class="schema-card">

          <svg width="80" height="80" viewBox="0 0 80 80">
            <circle cx="18" cy="40" r="7" fill="#dc2626" opacity="0.3"/>
            <line x1="25" y1="40" x2="52" y2="40" stroke="#dc2626" stroke-width="4" marker-end="url(#arrowRed)"/>
            <circle cx="62" cy="40" r="7" fill="none" stroke="#dc2626" stroke-width="2"/>
            <defs><marker id="arrowRed" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#dc2626"/></marker></defs>

            <circle cx="58" cy="40" r="8" fill="none" stroke="#dc2626" stroke-width="2"/>
            <line x1="30" y1="40" x2="50" y2="40" stroke="#dc2626" stroke-width="2.5"/>
          </svg>
        </div>
        <div class="schema-desc">Connection between entities. Bonds and bridges.</div>
      </div>

      <div class="schema-card">
        <div class="schema-name">Scale</div>
        <div class="schema-svg">
          <svg width="80" height="80" viewBox="0 0 80 80">
            <rect x="10" y="50" width="8" height="12" rx="2" fill="#dc2626" opacity="0.2"/>
            <rect x="22" y="42" width="8" height="20" rx="2" fill="#dc2626" opacity="0.35"/>
            <rect x="34" y="34" width="8" height="28" rx="2" fill="#dc2626" opacity="0.5"/>
            <rect x="46" y="26" width="8" height="36" rx="2" fill="#dc2626" opacity="0.7"/>
            <rect x="58" y="18" width="8" height="44" rx="2" fill="#dc2626" opacity="0.9"/>
          </svg>
        </div>
        <div class="schema-desc">Continuous variation. Size, intensity, degree.</div>
      </div>
    </div>
  </div>

  <!-- MULTIPLICITY FAMILY -->
  <div class="family-section family-multiplicity">
    <div class="family-label">Multiplicity Schemas</div>
    <div class="gallery">
      <div class="schema-card">
        <div class="schema-name">Part-Whole</div>
        <div class="schema-svg">
          <svg width="80" height="80" viewBox="0 0 80 80">
            <rect x="12" y="15" width="56" height="50" rx="8" fill="none" stroke="#16a34a" stroke-width="2"/>
            <circle cx="28" cy="35" r="7" fill="#16a34a" opacity="0.3"/>
            <circle cx="52" cy="35" r="7" fill="#16a34a" opacity="0.3"/>
            <rect x="32" y="45" width="16" height="10" rx="3" fill="#16a34a" opacity="0.3"/>
          </svg>
        </div>
        <div class="schema-desc">Components constituting a larger entity.</div>
      </div>

      <div class="schema-card">
        <div class="schema-name">Splitting</div>
        <div class="schema-svg">
          <svg width="80" height="80" viewBox="0 0 80 80">
            <circle cx="20" cy="40" r="8" fill="#16a34a" opacity="0.5"/>
            <line x1="28" y1="36" x2="50" y2="24" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowGreen)"/>
            <line x1="28" y1="44" x2="50" y2="56" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowGreen2)"/>
            <circle cx="58" cy="22" r="5" fill="#16a34a" opacity="0.4"/>
            <circle cx="58" cy="58" r="5" fill="#16a34a" opacity="0.4"/>
            <defs>
              <marker id="arrowGreen" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto"><polygon points="0 0, 7 2.5, 0 5" fill="#16a34a"/></marker>
              <marker id="arrowGreen2" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto"><polygon points="0 0, 7 2.5, 0 5" fill="#16a34a"/></marker>
            </defs>
          </svg>
        </div>
        <div class="schema-desc">One becoming many. Divergence and branching.</div>
      </div>

      <div class="schema-card">
        <div class="schema-name">Merging</div>
        <div class="schema-svg">
          <svg width="80" height="80" viewBox="0 0 80 80">
            <circle cx="18" cy="22" r="5" fill="#16a34a" opacity="0.4"/>
            <circle cx="18" cy="58" r="5" fill="#16a34a" opacity="0.4"/>
            <line x1="23" y1="24" x2="48" y2="38" stroke="#16a34a" stroke-width="2"/>
            <line x1="23" y1="56" x2="48" y2="42" stroke="#16a34a" stroke-width="2"/>
            <circle cx="56" cy="40" r="8" fill="#16a34a" opacity="0.5"/>
          </svg>
        </div>
        <div class="schema-desc">Many becoming one. Convergence and combination.</div>
      </div>

      <div class="schema-card">
        <div class="schema-name">Cycle</div>
        <div class="schema-svg">
          <svg width="80" height="80" viewBox="0 0 80 80">
            <path d="M 40 18 A 22 22 0 1 1 38 18" fill="none" stroke="#16a34a" stroke-width="2.5" marker-end="url(#arrowCycle)"/>
            <circle cx="40" cy="40" r="3" fill="#16a34a" opacity="0.3"/>
            <defs><marker id="arrowCycle" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto"><polygon points="0 0, 7 2.5, 0 5" fill="#16a34a"/></marker></defs>
          </svg>
        </div>
        <div class="schema-desc">Recurring return. Rhythm, seasons, heartbeat.</div>
      </div>

      <div class="schema-card">
        <div class="schema-name">Iteration</div>
        <div class="schema-svg">
          <svg width="80" height="80" viewBox="0 0 80 80">
            <circle cx="16" cy="40" r="5" fill="#16a34a" opacity="0.6"/>
            <circle cx="32" cy="40" r="5" fill="#16a34a" opacity="0.6"/>
            <circle cx="48" cy="40" r="5" fill="#16a34a" opacity="0.6"/>
            <circle cx="64" cy="40" r="5" fill="#16a34a" opacity="0.6"/>
            <text x="35" y="60" font-size="8" fill="#94a3b8">...</text>
          </svg>
        </div>
        <div class="schema-desc">Repeated instances. Hammering, walking, breathing.</div>
      </div>
    </div>
  </div>

  <!-- STATE FAMILY -->
  <div class="family-section family-state">
    <div class="family-label">State Schemas</div>
    <div class="gallery">
      <div class="schema-card">
        <div class="schema-name">Full-Empty</div>
        <div class="schema-svg">
          <svg width="80" height="80" viewBox="0 0 80 80">
            <rect x="8" y="20" width="25" height="40" rx="4" fill="none" stroke="#d97706" stroke-width="2"/>
            <rect x="8" y="28" width="25" height="32" rx="0 0 4 4" fill="#d97706" opacity="0.4"/>
            <rect x="47" y="20" width="25" height="40" rx="4" fill="none" stroke="#d97706" stroke-width="2"/>

            <text x="50" y="68" font-size="7" fill="#94a3b8">empty</text>
          </svg>
        </div>
        <div class="schema-desc">Container capacity. Abundance and depletion.</div>
      </div>

      <div class="schema-card">
        <div class="schema-name">Object</div>
        <div class="schema-svg">
          <svg width="80" height="80" viewBox="0 0 80 80">
            <rect x="22" y="22" width="36" height="36" rx="6" fill="#d97706" opacity="0.2" stroke="#d97706" stroke-width="2"/>
            <text x="30" y="45" font-size="10" fill="#d97706" font-weight="600">thing</text>
          </svg>
        </div>
        <div class="schema-desc">Bounded entity in space. Discrete and graspable.</div>
      </div>
    </div>
  </div>

  <figcaption>
    <strong>Figure 1:</strong> The image schema inventory organized by family. These recurring spatial-temporal structures arise from pre-linguistic bodily experience (Johnson, 1987) and are proposed as the foundational "visual alphabet" for a universal visual language. Each schema is pre-linguistic, embodied, spatial, schematic, and productive — capable of combining with others to generate complex meanings.
  </figcaption>
</figure>
