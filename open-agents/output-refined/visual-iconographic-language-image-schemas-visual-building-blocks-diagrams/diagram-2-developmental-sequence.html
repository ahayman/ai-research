<figure class="concept-diagram" id="diagram-developmental-sequence">
  <div class="diagram-title">From Body to Thought: Mandler's Developmental Sequence</div>
  <div class="diagram-subtitle">How image schemas form through Perceptual Meaning Analysis before language develops</div>

  <div class="timeline">
    <div class="stage stage-prelinguistic">
      <div class="prelinguistic-marker">Pre-linguistic</div>
      <div class="stage-num">Stage 1 — Birth to ~4 months</div>
      <div class="stage-title">Rich Perceptual Input</div>
      <div class="stage-desc">The infant's sensory world: objects moving, surfaces contacted, containers filled and emptied, agents acting on patients. Complex, continuous, multi-modal sensory streams.</div>
      <div class="stage-examples">Innately salient: paths of motion, containment events, self-moving vs. caused-motion, contingent paths (chasing)</div>
    </div>

    <div class="stage stage-pma">
      <div class="prelinguistic-marker">Pre-linguistic</div>
      <div class="stage-num">Stage 2 — ~4 to ~8 months</div>
      <div class="stage-title">Perceptual Meaning Analysis (PMA)</div>
      <div class="stage-desc">Mandler's proposed mechanism: a data summarization device that reformats rich perceptual information into a sparser, more abstract code. PMA distills complex sensory input into schematic spatial structures.</div>
      <div class="stage-examples">Not conscious extraction — an innate domain-general attentional mechanism that generates concepts from attended perceptual data</div>
    </div>

    <div class="stage stage-primitives">
      <div class="prelinguistic-marker">Pre-linguistic</div>
      <div class="stage-num">Stage 3 — ~6 to ~12 months</div>
      <div class="stage-title">Schematic Spatial Primitives</div>
      <div class="stage-desc">Repeated experiences consolidate into schematic patterns: PATH (source-trajectory-goal), CONTAINER (in-out-boundary), THING (bounded entity), CONTACT (surfaces meeting), AGENT (self-mover), CAUSED MOTION (force transfers movement).</div>
      <div class="stage-examples">A toy dropped into a cup: CONTAINER + PATH + CONTACT. A parent walking away: PATH + AGENT + NEAR-FAR.</div>
    </div>

    <div class="stage stage-concepts">
      <div class="prelinguistic-marker">Pre-linguistic</div>
      <div class="stage-num">Stage 4 — ~9 to ~18 months</div>
      <div class="stage-title">Broad Initial Concepts</div>
      <div class="stage-desc">Image schemas combine into global conceptual categories: ANIMAL (self-moving thing), VEHICLE (caused-moving thing), CONTAINER (bounded region permitting in/out). These are the first concepts — formed before and independent of language.</div>
      <div class="stage-examples">Infants distinguish "animal" from "vehicle" by motion pattern (self-propelled vs. caused), not by perceptual features like legs vs. wheels</div>
    </div>

    <div class="divider">--- LANGUAGE BEGINS TO INTERFACE ---</div>

    <div class="stage stage-language">
      <div class="language-marker">Language-aided</div>
      <div class="stage-num">Stage 5 — ~12 months onward</div>
      <div class="stage-title">Conceptual Subdivision + Language Mapping</div>
      <div class="stage-desc">Language provides labels that help subdivide broad categories into finer ones. The word "dog" helps differentiate dogs from other animals. Image schemas provide the conceptual scaffolding that language maps onto — not the reverse.</div>
      <div class="stage-examples">Broad ANIMAL category subdivides: dog, cat, bird. CONTAINER subdivides: cup, room, box. Language accelerates distinction, but schemas came first.</div>
    </div>

    <div class="stage stage-metaphor">
      <div class="language-marker">Language-aided</div>
      <div class="stage-num">Stage 6 — Childhood through adulthood</div>
      <div class="stage-title">Metaphorical Extension to Abstract Domains</div>
      <div class="stage-desc">Spatial schemas extend to non-spatial domains through experience-based correlations. Achieving goals co-occurs with reaching destinations, so PURPOSES ARE DESTINATIONS. Emotional intimacy co-occurs with physical closeness, so INTIMACY IS CLOSENESS. The spatial infrastructure now supports abstract thought.</div>
      <div class="stage-examples">"I'm in trouble" (CONTAINER), "on the path to success" (PATH), "feeling down" (VERTICALITY), "a heavy burden" (FORCE)</div>
    </div>
  </div>

  <figcaption>
    <strong>Figure 2:</strong> Mandler's developmental theory of image schema acquisition. Stages 1-4 are pre-linguistic — image schemas form through Perceptual Meaning Analysis before any language develops. This makes image schemas the deepest level of cross-linguistic, cross-cultural cognitive universality, and the strongest candidate foundation for a visual language that aims to be universally interpretable.
  </figcaption>
</figure>
