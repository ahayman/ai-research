<figure class="concept-diagram" id="diagram-abstract-gap">
  <div class="diagram-title">The Abstract Concept Gap</div>
  <div class="diagram-subtitle">Can metaphorical extension of image schemas reach all the way to logical operators and cultural constructs?</div>

  <div class="bridge-scene">
    <!-- LEFT CLIFF -->
    <div class="cliff cliff-left">
      <div class="cliff-title">Direct Schema Representation</div>
      <ul class="cliff-items">
        <li>Spatial relations (in, on, through)</li>
        <li>Physical actions (move, contain, link)</li>
        <li>Causal dynamics (push, block, enable)</li>
        <li>Quantity (more/less via SCALE)</li>
        <li>Temporal sequence (before/after via PATH)</li>
      </ul>
    </div>

    <!-- RIGHT CLIFF -->
    <div class="cliff cliff-right">
      <div class="cliff-title">Required Language Expressiveness</div>
      <ul class="cliff-items">
        <li>Logical operators (NOT, IF, OR)</li>
        <li>Propositional attitudes (believe, doubt)</li>
        <li>Metalinguistic reference</li>
        <li>Precise quantification (37%, most)</li>
        <li>Cultural constructs (democracy, copyright)</li>
      </ul>
    </div>

    <!-- BRIDGE -->
    <div class="bridge-area">
      <div class="bridge-label">Metaphorical Extension Bridge</div>
      <div class="bridge-planks">
        <div class="plank plank-solid">STATES ARE CONTAINERS: "in love" "out of danger"</div>
        <div class="plank plank-solid">PURPOSES ARE PATHS: "on track" "going nowhere"</div>
        <div class="plank plank-solid">MORE IS UP: "high price" "low quality"</div>
        <div class="plank plank-solid">CAUSES ARE FORCES: "driven to" "pushed toward"</div>
        <div class="plank plank-solid">TIME IS MOTION: "the future is coming" "past is behind"</div>
        <div class="plank plank-shaky">NOT as BLOCKAGE? (force stopping a path)</div>
        <div class="plank plank-shaky">IF as BRANCH? (fork in a road)</div>
        <div class="plank plank-shaky">BELIEF as CONTAINER? ("hold a belief")</div>
      </div>
    </div>

    <!-- GAP BELOW -->
    <div class="gap-area">
      <div class="gap-title">Unsolved: Concepts with no identified schema grounding</div>
      <div class="gap-items">
        <span class="gap-item">democracy</span>
        <span class="gap-item">copyright</span>
        <span class="gap-item">mortgage</span>
        <span class="gap-item">"I believe she thinks he knows"</span>
        <span class="gap-item">sarcasm / irony</span>
        <span class="gap-item">exactly 37%</span>
        <span class="gap-item">counterfactuals</span>
        <span class="gap-item">"literally" (metalinguistic)</span>
      </div>
    </div>
  </div>

  <div class="question-box">
    The central design question: Is there a ceiling beyond which image schemas cannot ground meaning, and conventional (non-schematic) symbols must take over? Or can compositional metaphor reach all the way?
  </div>

  <figcaption>
    <strong>Figure 5:</strong> The gap between what image schemas represent directly (spatial-physical domains) and what a general-purpose language must express (abstract-logical-social domains). Solid bridge planks represent well-established metaphorical extensions; dashed planks represent speculative extensions that may work but are less empirically supported. Below the bridge: concepts for which no metaphorical grounding has been convincingly identified.
  </figcaption>
</figure>
