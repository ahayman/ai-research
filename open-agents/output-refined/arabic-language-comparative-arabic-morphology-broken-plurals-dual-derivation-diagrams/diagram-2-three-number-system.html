<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Three-Number System: Singular, Dual, Plural</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --accent: #2563eb; --accent-light: #dbeafe;
    --singular: #059669; --singular-bg: #d1fae5;
    --dual: #d97706; --dual-bg: #fef3c7;
    --plural: #7c3aed; --plural-bg: #ede9fe;
    --english: #6366f1; --english-bg: #e8e8ff;
    --muted: #6c757d; --caption-bg: #f8f9fa;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a; --fg: #e8e8f0; --surface: #1a1a2e; --border: #2d2d44;
      --accent: #6b8aff; --accent-light: #1e2a4a;
      --singular: #34d399; --singular-bg: #064e3b;
      --dual: #fbbf24; --dual-bg: #4a3520;
      --plural: #a78bfa; --plural-bg: #2e1f5e;
      --english: #818cf8; --english-bg: #2e2e5a;
      --muted: #9a9ab0; --caption-bg: #1a1a2e;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--fg); display: flex; justify-content: center; padding: 2rem 1rem; line-height: 1.6; }
  figure { max-width: 1100px; width: 100%; }
  .diagram-container { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 1.5rem 1rem; overflow-x: auto; }
  figcaption { text-align: center; margin-top: 1.5rem; padding: 1rem 1.5rem; background: var(--caption-bg); border-radius: 8px; border: 1px solid var(--border); }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  .legend { display: flex; gap: 1.5rem; justify-content: center; flex-wrap: wrap; margin-top: 1rem; font-size: 0.82rem; color: var(--muted); }
  .legend-item { display: flex; align-items: center; gap: 0.4rem; }
  .legend-swatch { width: 14px; height: 14px; border-radius: 3px; border: 1px solid var(--border); }
  svg { display: block; margin: 0 auto; }
</style>
</head>
<body>
<figure>
  <div class="diagram-container">
    <svg viewBox="0 0 1060 600" xmlns="http://www.w3.org/2000/svg" style="min-width:780px;">
      <text x="530" y="28" text-anchor="middle" style="font: bold 16px system-ui; fill: var(--fg);">The Three-Number System: Singular -- Dual -- Plural</text>
      <text x="530" y="48" text-anchor="middle" style="font: 11px system-ui; fill: var(--muted);">Arabic has a dedicated grammatical form for exactly two -- English collapsed this 1,000 years ago</text>

      <!-- ARABIC: THREE BOXES -->
      <g transform="translate(30,75)">
        <text x="500" y="0" text-anchor="middle" style="font: bold 13px system-ui; fill: var(--accent);">Arabic: THREE number values</text>

        <!-- Singular -->
        <rect x="0" y="15" width="300" height="150" rx="10" fill="var(--singular-bg)" stroke="var(--singular)" stroke-width="2"/>
        <text x="150" y="40" text-anchor="middle" style="font: bold 14px system-ui; fill: var(--singular);">SINGULAR (mufrad)</text>
        <text x="150" y="60" text-anchor="middle" style="font: 11px system-ui; fill: var(--fg);">Exactly 1</text>
        <text x="150" y="85" text-anchor="middle" style="font: bold 16px monospace; fill: var(--fg);">kita:b</text>
        <text x="150" y="105" text-anchor="middle" style="font: 12px system-ui; fill: var(--muted);">"a book"</text>
        <text x="150" y="125" text-anchor="middle" style="font: bold 16px monospace; fill: var(--fg);">mu&#x0295;allim</text>
        <text x="150" y="145" text-anchor="middle" style="font: 12px system-ui; fill: var(--muted);">"a teacher"</text>

        <!-- Arrow 1->2 -->
        <text x="325" y="90" text-anchor="middle" style="font: bold 20px system-ui; fill: var(--muted);">--></text>

        <!-- Dual -->
        <rect x="350" y="15" width="300" height="150" rx="10" fill="var(--dual-bg)" stroke="var(--dual)" stroke-width="2"/>
        <text x="500" y="40" text-anchor="middle" style="font: bold 14px system-ui; fill: var(--dual);">DUAL (muthanna:)</text>
        <text x="500" y="60" text-anchor="middle" style="font: 11px system-ui; fill: var(--fg);">Exactly 2</text>
        <text x="500" y="85" text-anchor="middle" style="font: bold 16px monospace; fill: var(--fg);">kita:b<tspan fill="var(--dual)">a:n</tspan> / kita:b<tspan fill="var(--dual)">ayn</tspan></text>
        <text x="500" y="105" text-anchor="middle" style="font: 12px system-ui; fill: var(--muted);">"two books" (nom / acc-gen)</text>
        <text x="500" y="125" text-anchor="middle" style="font: bold 16px monospace; fill: var(--fg);">mu&#x0295;allim<tspan fill="var(--dual)">a:n</tspan> / mu&#x0295;allim<tspan fill="var(--dual)">ayn</tspan></text>
        <text x="500" y="145" text-anchor="middle" style="font: 12px system-ui; fill: var(--muted);">"two teachers" (nom / acc-gen)</text>

        <!-- Arrow 2->3+ -->
        <text x="675" y="90" text-anchor="middle" style="font: bold 20px system-ui; fill: var(--muted);">--></text>

        <!-- Plural -->
        <rect x="700" y="15" width="300" height="150" rx="10" fill="var(--plural-bg)" stroke="var(--plural)" stroke-width="2"/>
        <text x="850" y="40" text-anchor="middle" style="font: bold 14px system-ui; fill: var(--plural);">PLURAL (jam&#x0295;)</text>
        <text x="850" y="60" text-anchor="middle" style="font: 11px system-ui; fill: var(--fg);">3 or more</text>
        <text x="850" y="85" text-anchor="middle" style="font: bold 16px monospace; fill: var(--fg);"><tspan fill="var(--plural)">kutub</tspan></text>
        <text x="850" y="105" text-anchor="middle" style="font: 12px system-ui; fill: var(--muted);">"books" (broken plural)</text>
        <text x="850" y="125" text-anchor="middle" style="font: bold 16px monospace; fill: var(--fg);">mu&#x0295;allimu:<tspan fill="var(--plural)">n</tspan></text>
        <text x="850" y="145" text-anchor="middle" style="font: 12px system-ui; fill: var(--muted);">"teachers" (sound plural)</text>
      </g>

      <!-- ENGLISH: TWO BOXES -->
      <g transform="translate(30,260)">
        <text x="500" y="0" text-anchor="middle" style="font: bold 13px system-ui; fill: var(--english);">English: TWO number values</text>

        <rect x="0" y="15" width="460" height="90" rx="10" fill="var(--singular-bg)" stroke="var(--singular)" stroke-width="1.5"/>
        <text x="230" y="40" text-anchor="middle" style="font: bold 14px system-ui; fill: var(--singular);">SINGULAR</text>
        <text x="230" y="60" text-anchor="middle" style="font: 14px monospace; fill: var(--fg);">book / teacher</text>
        <text x="230" y="80" text-anchor="middle" style="font: 11px system-ui; fill: var(--muted);">Exactly 1</text>

        <text x="485" y="60" text-anchor="middle" style="font: bold 20px system-ui; fill: var(--muted);">--></text>

        <rect x="510" y="15" width="490" height="90" rx="10" fill="var(--plural-bg)" stroke="var(--plural)" stroke-width="1.5"/>
        <text x="755" y="40" text-anchor="middle" style="font: bold 14px system-ui; fill: var(--plural);">PLURAL (2 or more -- no dual!)</text>
        <text x="755" y="60" text-anchor="middle" style="font: 14px monospace; fill: var(--fg);">books / teachers</text>
        <text x="755" y="80" text-anchor="middle" style="font: 11px system-ui; fill: var(--muted);">"two books" requires the numeral -- grammar alone cannot express "exactly two"</text>
      </g>

      <!-- DUAL PROPERTIES -->
      <g transform="translate(30,380)">
        <rect width="1000" height="200" rx="10" fill="var(--accent-light)" stroke="var(--accent)" stroke-width="1.5"/>
        <text x="500" y="25" text-anchor="middle" style="font: bold 14px system-ui; fill: var(--accent);">The Arabic Dual: Completely Regular, Fully Productive</text>

        <g transform="translate(30,45)">
          <rect width="440" height="130" rx="8" fill="var(--dual-bg)" stroke="var(--dual)"/>
          <text x="220" y="20" text-anchor="middle" style="font: bold 12px system-ui; fill: var(--dual);">Formation Rules (no exceptions)</text>
          <text x="20" y="45" style="font: 12px system-ui; fill: var(--fg);">Nominative: base + <tspan style="font-weight:bold;fill:var(--dual)">-a:n</tspan> (kita:ba:n)</text>
          <text x="20" y="68" style="font: 12px system-ui; fill: var(--fg);">Accusative/Genitive: base + <tspan style="font-weight:bold;fill:var(--dual)">-ayn</tspan> (kita:bayn)</text>
          <text x="20" y="95" style="font: 11px system-ui; fill: var(--muted);">Works on EVERY noun, adjective, verb, pronoun.</text>
          <text x="20" y="113" style="font: 11px system-ui; fill: var(--muted);">No irregularities. One of Arabic's most regular features.</text>
        </g>

        <g transform="translate(530,45)">
          <rect width="440" height="130" rx="8" fill="var(--english-bg)" stroke="var(--english)"/>
          <text x="220" y="20" text-anchor="middle" style="font: bold 12px system-ui; fill: var(--english);">What English Lost</text>
          <text x="20" y="45" style="font: 12px system-ui; fill: var(--fg);">Old English had a dual: wit "we two" vs. we: "we"</text>
          <text x="20" y="68" style="font: 12px system-ui; fill: var(--fg);">Lost by Middle English (~1200 CE)</text>
          <text x="20" y="95" style="font: 12px system-ui; fill: var(--fg);">Modern English: "two" + plural = workaround</text>
          <text x="20" y="118" style="font: italic 11px system-ui; fill: var(--muted);">Slovenian still has a full dual -- rare in modern Europe</text>
        </g>
      </g>
    </svg>
  </div>

  <figcaption>
    <h2>Figure 2 -- The Three-Number System</h2>
    <p>Arabic distinguishes singular (1), dual (exactly 2), and plural (3+). The dual is formed by adding -a:n (nominative) or -ayn (accusative/genitive) -- completely regular, no exceptions. English collapsed its dual into the plural over 800 years ago; Arabic retains it as a fully productive, required grammatical category. The dual is one of Arabic morphology's most elegant features: a system of total regularity amidst the complexity of broken plurals and case marking.</p>
  </figcaption>

  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background:var(--singular);"></div>Singular (1)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--dual);"></div>Dual (exactly 2)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--plural);"></div>Plural (3+)</div>
  </div>
</figure>
</body>
</html>
