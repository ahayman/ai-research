<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English vs. Arabic Inflectional Inventory</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --accent: #2563eb; --accent-light: #dbeafe;
    --english: #6366f1; --english-bg: #e8e8ff;
    --arabic: #e67e22; --arabic-bg: #fef3e2;
    --french: #059669; --french-bg: #d1fae5;
    --muted: #6c757d; --caption-bg: #f8f9fa;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a; --fg: #e8e8f0; --surface: #1a1a2e; --border: #2d2d44;
      --accent: #6b8aff; --accent-light: #1e2a4a;
      --english: #818cf8; --english-bg: #2e2e5a;
      --arabic: #f59e0b; --arabic-bg: #4a3520;
      --french: #34d399; --french-bg: #064e3b;
      --muted: #9a9ab0; --caption-bg: #1a1a2e;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--fg); display: flex; justify-content: center; padding: 2rem 1rem; line-height: 1.6; }
  figure { max-width: 1100px; width: 100%; }
  .diagram-container { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 1.5rem 1rem; overflow-x: auto; }
  figcaption { text-align: center; margin-top: 1.5rem; padding: 1rem 1.5rem; background: var(--caption-bg); border-radius: 8px; border: 1px solid var(--border); }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  .legend { display: flex; gap: 1.5rem; justify-content: center; flex-wrap: wrap; margin-top: 1rem; font-size: 0.82rem; color: var(--muted); }
  .legend-item { display: flex; align-items: center; gap: 0.4rem; }
  .legend-swatch { width: 14px; height: 14px; border-radius: 3px; border: 1px solid var(--border); }
  svg { display: block; margin: 0 auto; }
</style>
</head>
<body>
<figure>
  <div class="diagram-container">
    <svg viewBox="0 0 1060 620" xmlns="http://www.w3.org/2000/svg" style="min-width:780px;">
      <text x="530" y="28" text-anchor="middle" style="font: bold 16px system-ui; fill: var(--fg);">Inflectional Complexity: English vs. French vs. Arabic</text>
      <text x="530" y="48" text-anchor="middle" style="font: 11px system-ui; fill: var(--muted);">Arabic's plural system alone has more patterns than English's entire inflectional inventory</text>

      <!-- BAR CHART -->
      <g transform="translate(80,80)">
        <!-- Y-axis labels -->
        <text x="-10" y="15" text-anchor="end" style="font: 10px system-ui; fill: var(--muted);">Number values</text>
        <text x="-10" y="65" text-anchor="end" style="font: 10px system-ui; fill: var(--muted);">Plural patterns</text>
        <text x="-10" y="115" text-anchor="end" style="font: 10px system-ui; fill: var(--muted);">Gender values</text>
        <text x="-10" y="165" text-anchor="end" style="font: 10px system-ui; fill: var(--muted);">Cases</text>
        <text x="-10" y="215" text-anchor="end" style="font: 10px system-ui; fill: var(--muted);">Definiteness</text>
        <text x="-10" y="265" text-anchor="end" style="font: 10px system-ui; fill: var(--muted);">Construct state</text>
        <text x="-10" y="315" text-anchor="end" style="font: 10px system-ui; fill: var(--muted);">Diminutive</text>

        <!-- ROW 1: Number values -->
        <g transform="translate(0,0)">
          <rect width="60" height="22" rx="3" fill="var(--english)" opacity="0.8"/>
          <text x="30" y="16" text-anchor="middle" style="font: bold 10px system-ui; fill: white;">2</text>
          <rect x="0" y="24" width="60" height="22" rx="3" fill="var(--french)" opacity="0.8"/>
          <text x="30" y="40" text-anchor="middle" style="font: bold 10px system-ui; fill: white;">2</text>
          <rect x="0" y="48" width="90" height="22" rx="3" fill="var(--arabic)" opacity="0.8"/>
          <text x="45" y="64" text-anchor="middle" style="font: bold 10px system-ui; fill: white;">3</text>
          <text x="100" y="40" style="font: 10px system-ui; fill: var(--muted);">Arabic adds the DUAL</text>
        </g>

        <!-- ROW 2: Plural patterns -->
        <g transform="translate(0,50)">
          <rect width="30" height="22" rx="3" fill="var(--english)" opacity="0.8"/>
          <text x="15" y="16" text-anchor="middle" style="font: bold 10px system-ui; fill: white;">1</text>
          <rect x="0" y="24" width="60" height="22" rx="3" fill="var(--french)" opacity="0.8"/>
          <text x="30" y="40" text-anchor="middle" style="font: bold 10px system-ui; fill: white;">2</text>
          <rect x="0" y="48" width="620" height="22" rx="3" fill="var(--arabic)" opacity="0.8"/>
          <text x="310" y="64" text-anchor="middle" style="font: bold 10px system-ui; fill: white;">31+ broken patterns + 2 sound patterns = 33+</text>
          <text x="650" y="64" style="font: bold 10px system-ui; fill: var(--arabic);">!!!</text>
        </g>

        <!-- ROW 3: Gender -->
        <g transform="translate(0,100)">
          <rect width="15" height="22" rx="3" fill="var(--english)" opacity="0.8"/>
          <text x="25" y="16" style="font: bold 10px system-ui; fill: var(--english);">0</text>
          <rect x="0" y="24" width="60" height="22" rx="3" fill="var(--french)" opacity="0.8"/>
          <text x="30" y="40" text-anchor="middle" style="font: bold 10px system-ui; fill: white;">2</text>
          <rect x="0" y="48" width="80" height="22" rx="3" fill="var(--arabic)" opacity="0.8"/>
          <text x="40" y="64" text-anchor="middle" style="font: bold 10px system-ui; fill: white;">2+</text>
          <text x="100" y="64" style="font: 10px system-ui; fill: var(--muted);">+ complex agreement rules</text>
        </g>

        <!-- ROW 4: Cases -->
        <g transform="translate(0,150)">
          <rect width="15" height="22" rx="3" fill="var(--english)" opacity="0.8"/>
          <text x="25" y="16" style="font: bold 10px system-ui; fill: var(--english);">0*</text>
          <rect x="0" y="24" width="15" height="22" rx="3" fill="var(--french)" opacity="0.8"/>
          <text x="25" y="40" style="font: bold 10px system-ui; fill: var(--french);">0</text>
          <rect x="0" y="48" width="90" height="22" rx="3" fill="var(--arabic)" opacity="0.8"/>
          <text x="45" y="64" text-anchor="middle" style="font: bold 10px system-ui; fill: white;">3</text>
          <text x="100" y="16" style="font: 10px system-ui; fill: var(--muted);">*only possessive 's</text>
        </g>

        <!-- ROW 5: Definiteness -->
        <g transform="translate(0,200)">
          <rect width="60" height="22" rx="3" fill="var(--english)" opacity="0.8"/>
          <text x="30" y="16" text-anchor="middle" style="font: bold 10px system-ui; fill: white;">a/the</text>
          <rect x="0" y="24" width="90" height="22" rx="3" fill="var(--french)" opacity="0.8"/>
          <text x="45" y="40" text-anchor="middle" style="font: bold 10px system-ui; fill: white;">un/le</text>
          <rect x="0" y="48" width="120" height="22" rx="3" fill="var(--arabic)" opacity="0.8"/>
          <text x="60" y="64" text-anchor="middle" style="font: bold 10px system-ui; fill: white;">al- / tanwi:n</text>
          <text x="130" y="64" style="font: 10px system-ui; fill: var(--muted);">tanwi:n marks case + indef simultaneously</text>
        </g>

        <!-- ROW 6: Construct state -->
        <g transform="translate(0,250)">
          <rect width="15" height="22" rx="3" fill="var(--english)" opacity="0.8"/>
          <text x="25" y="16" style="font: bold 10px system-ui; fill: var(--english);">No</text>
          <rect x="0" y="24" width="15" height="22" rx="3" fill="var(--french)" opacity="0.8"/>
          <text x="25" y="40" style="font: bold 10px system-ui; fill: var(--french);">No</text>
          <rect x="0" y="48" width="90" height="22" rx="3" fill="var(--arabic)" opacity="0.8"/>
          <text x="45" y="64" text-anchor="middle" style="font: bold 10px system-ui; fill: white;">Yes</text>
          <text x="100" y="64" style="font: 10px system-ui; fill: var(--muted);">id&#x02E4;a:fa -- no connectors needed</text>
        </g>

        <!-- ROW 7: Diminutive -->
        <g transform="translate(0,300)">
          <rect width="60" height="22" rx="3" fill="var(--english)" opacity="0.8"/>
          <text x="30" y="16" text-anchor="middle" style="font: bold 10px system-ui; fill: white;">suffix</text>
          <rect x="0" y="24" width="60" height="22" rx="3" fill="var(--french)" opacity="0.8"/>
          <text x="30" y="40" text-anchor="middle" style="font: bold 10px system-ui; fill: white;">suffix</text>
          <rect x="0" y="48" width="120" height="22" rx="3" fill="var(--arabic)" opacity="0.8"/>
          <text x="60" y="64" text-anchor="middle" style="font: bold 10px system-ui; fill: white;">internal pattern</text>
          <text x="130" y="64" style="font: 10px system-ui; fill: var(--muted);">fu&#x0295;ayl -- even diminutives use root-and-pattern!</text>
        </g>
      </g>

      <!-- TOTAL SCORE -->
      <g transform="translate(30,470)">
        <rect width="1000" height="130" rx="10" fill="var(--surface)" stroke="var(--border)" stroke-width="1"/>
        <text x="500" y="25" text-anchor="middle" style="font: bold 14px system-ui; fill: var(--fg);">Total Inflectional Morphemes</text>

        <!-- English -->
        <g transform="translate(50,40)">
          <rect width="30" height="70" rx="4" fill="var(--english)" opacity="0.8"/>
          <text x="15" y="-5" text-anchor="middle" style="font: bold 16px system-ui; fill: var(--english);">8</text>
          <text x="15" y="85" text-anchor="middle" style="font: bold 10px system-ui; fill: var(--english);">English</text>
          <text x="50" y="20" style="font: 10px system-ui; fill: var(--muted);">-s, 's, -s, -ed,</text>
          <text x="50" y="35" style="font: 10px system-ui; fill: var(--muted);">-en, -ing, -er, -est</text>
          <text x="50" y="55" style="font: italic 10px system-ui; fill: var(--muted);">That is the ENTIRE</text>
          <text x="50" y="68" style="font: italic 10px system-ui; fill: var(--muted);">English inflectional system.</text>
        </g>

        <!-- French -->
        <g transform="translate(300,40)">
          <rect width="60" height="70" rx="4" fill="var(--french)" opacity="0.8"/>
          <text x="30" y="-5" text-anchor="middle" style="font: bold 16px system-ui; fill: var(--french);">~15</text>
          <text x="30" y="85" text-anchor="middle" style="font: bold 10px system-ui; fill: var(--french);">French</text>
          <text x="75" y="20" style="font: 10px system-ui; fill: var(--muted);">Gender + number</text>
          <text x="75" y="35" style="font: 10px system-ui; fill: var(--muted);">on nouns, adj, articles</text>
        </g>

        <!-- Arabic -->
        <g transform="translate(550,40)">
          <rect width="350" height="70" rx="4" fill="var(--arabic)" opacity="0.8"/>
          <text x="175" y="-5" text-anchor="middle" style="font: bold 16px system-ui; fill: var(--arabic);">40+</text>
          <text x="175" y="85" text-anchor="middle" style="font: bold 10px system-ui; fill: var(--arabic);">Arabic</text>
          <text x="15" y="20" style="font: bold 10px system-ui; fill: white;">31+ broken plural patterns alone</text>
          <text x="15" y="38" style="font: 10px system-ui; fill: white;">+ 3 cases + tanwi:n + dual suffix</text>
          <text x="15" y="56" style="font: 10px system-ui; fill: white;">+ gender + construct state + diminutive pattern</text>
        </g>
      </g>
    </svg>
  </div>

  <figcaption>
    <h2>Figure 5 -- Inflectional Complexity Comparison</h2>
    <p>Arabic's nominal morphology operates on a completely different scale from English. Arabic has 31+ broken plural patterns -- more patterns for pluralization alone than English has inflectional morphemes for everything combined (8 total). Add three cases, tanwi:n, the dual, gender marking, and the construct state, and Arabic nominal inflection is an order of magnitude more complex. French sits in the middle. The visual scale difference IS the message.</p>
  </figcaption>

  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background:var(--english);"></div>English</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--french);"></div>French</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--arabic);"></div>Arabic</div>
  </div>
</figure>
</body>
</html>
