<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Idafa Construction: Noun Chains Without Connectors</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --accent: #2563eb; --accent-light: #dbeafe;
    --first: #d97706; --first-bg: #fef3c7;
    --second: #7c3aed; --second-bg: #ede9fe;
    --third: #059669; --third-bg: #d1fae5;
    --english: #6366f1; --english-bg: #e8e8ff;
    --muted: #6c757d; --caption-bg: #f8f9fa;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a; --fg: #e8e8f0; --surface: #1a1a2e; --border: #2d2d44;
      --accent: #6b8aff; --accent-light: #1e2a4a;
      --first: #fbbf24; --first-bg: #4a3520;
      --second: #a78bfa; --second-bg: #2e1f5e;
      --third: #34d399; --third-bg: #064e3b;
      --english: #818cf8; --english-bg: #2e2e5a;
      --muted: #9a9ab0; --caption-bg: #1a1a2e;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--fg); display: flex; justify-content: center; padding: 2rem 1rem; line-height: 1.6; }
  figure { max-width: 1100px; width: 100%; }
  .diagram-container { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 1.5rem 1rem; overflow-x: auto; }
  figcaption { text-align: center; margin-top: 1.5rem; padding: 1rem 1.5rem; background: var(--caption-bg); border-radius: 8px; border: 1px solid var(--border); }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  .legend { display: flex; gap: 1.5rem; justify-content: center; flex-wrap: wrap; margin-top: 1rem; font-size: 0.82rem; color: var(--muted); }
  .legend-item { display: flex; align-items: center; gap: 0.4rem; }
  .legend-swatch { width: 14px; height: 14px; border-radius: 3px; border: 1px solid var(--border); }
  svg { display: block; margin: 0 auto; }
</style>
</head>
<body>
<figure>
  <div class="diagram-container">
    <svg viewBox="0 0 1060 540" xmlns="http://www.w3.org/2000/svg" style="min-width:780px;">
      <text x="530" y="28" text-anchor="middle" style="font: bold 16px system-ui; fill: var(--fg);">The Id&#x02E4;a:fa (Construct State): Noun Chains Without Connectors</text>
      <text x="530" y="48" text-anchor="middle" style="font: 11px system-ui; fill: var(--muted);">Where English needs "of" or "'s", Arabic just places nouns side by side</text>

      <!-- TWO-NOUN IDAFA -->
      <g transform="translate(30,75)">
        <rect width="1000" height="140" rx="10" fill="var(--accent-light)" stroke="var(--accent)" stroke-width="1.5"/>
        <text x="500" y="22" text-anchor="middle" style="font: bold 13px system-ui; fill: var(--accent);">Two-Noun Id&#x02E4;a:fa: "the student's book"</text>

        <!-- Arabic chain -->
        <g transform="translate(50,40)">
          <rect width="180" height="70" rx="8" fill="var(--first-bg)" stroke="var(--first)" stroke-width="2"/>
          <text x="90" y="22" text-anchor="middle" style="font: bold 12px system-ui; fill: var(--first);">mud&#x02E4;a:f (possessed)</text>
          <text x="90" y="45" text-anchor="middle" style="font: bold 16px monospace; fill: var(--fg);">kita:b<tspan fill="var(--first)">u</tspan></text>
          <text x="90" y="62" text-anchor="middle" style="font: 10px system-ui; fill: var(--muted);">no al-, no tanwi:n</text>

          <!-- No connector! -->
          <text x="210" y="45" text-anchor="middle" style="font: bold 20px system-ui; fill: var(--accent);">&#x00D8;</text>
          <text x="210" y="62" text-anchor="middle" style="font: 9px system-ui; fill: var(--accent);">nothing!</text>

          <rect x="240" y="0" width="200" height="70" rx="8" fill="var(--second-bg)" stroke="var(--second)" stroke-width="2"/>
          <text x="340" y="22" text-anchor="middle" style="font: bold 12px system-ui; fill: var(--second);">mud&#x02E4;a:f ilayhi (possessor)</text>
          <text x="340" y="45" text-anchor="middle" style="font: bold 16px monospace; fill: var(--fg);">at&#x02E4;-t&#x02E4;a:lib<tspan fill="var(--second)">i</tspan></text>
          <text x="340" y="62" text-anchor="middle" style="font: 10px system-ui; fill: var(--muted);">genitive case</text>
        </g>

        <!-- English equivalent -->
        <g transform="translate(550,40)">
          <rect width="400" height="70" rx="8" fill="var(--english-bg)" stroke="var(--english)"/>
          <text x="200" y="22" text-anchor="middle" style="font: bold 12px system-ui; fill: var(--english);">English requires a connector:</text>
          <text x="200" y="45" text-anchor="middle" style="font: 14px system-ui; fill: var(--fg);">"the book <tspan style="font-weight:bold;fill:var(--english)">of</tspan> the student"</text>
          <text x="200" y="62" text-anchor="middle" style="font: 14px system-ui; fill: var(--fg);">OR "the student<tspan style="font-weight:bold;fill:var(--english)">'s</tspan> book"</text>
        </g>

        <!-- Definiteness rule -->
        <text x="500" y="128" text-anchor="middle" style="font: italic 11px system-ui; fill: var(--accent);">Rule: definiteness of the LAST noun determines definiteness of the entire phrase</text>
      </g>

      <!-- THREE-NOUN CHAIN -->
      <g transform="translate(30,235)">
        <rect width="1000" height="130" rx="10" fill="var(--surface)" stroke="var(--border)" stroke-width="1"/>
        <text x="500" y="22" text-anchor="middle" style="font: bold 13px system-ui; fill: var(--fg);">Three-Noun Chain: "the door of the house of the teacher"</text>

        <g transform="translate(30,40)">
          <rect width="140" height="65" rx="8" fill="var(--first-bg)" stroke="var(--first)" stroke-width="1.5"/>
          <text x="70" y="20" text-anchor="middle" style="font: bold 15px monospace; fill: var(--fg);">ba:b<tspan fill="var(--first)">u</tspan></text>
          <text x="70" y="38" text-anchor="middle" style="font: 10px system-ui; fill: var(--first);">"door" (nom)</text>
          <text x="70" y="55" text-anchor="middle" style="font: 10px system-ui; fill: var(--muted);">no al-, no tanwi:n</text>

          <rect x="160" y="0" width="140" height="65" rx="8" fill="var(--second-bg)" stroke="var(--second)" stroke-width="1.5"/>
          <text x="230" y="20" text-anchor="middle" style="font: bold 15px monospace; fill: var(--fg);">bayt<tspan fill="var(--second)">i</tspan></text>
          <text x="230" y="38" text-anchor="middle" style="font: 10px system-ui; fill: var(--second);">"house" (gen)</text>
          <text x="230" y="55" text-anchor="middle" style="font: 10px system-ui; fill: var(--muted);">no al-, no tanwi:n</text>

          <rect x="320" y="0" width="200" height="65" rx="8" fill="var(--third-bg)" stroke="var(--third)" stroke-width="1.5"/>
          <text x="420" y="20" text-anchor="middle" style="font: bold 15px monospace; fill: var(--fg);">al-mu&#x0295;allim<tspan fill="var(--third)">i</tspan></text>
          <text x="420" y="38" text-anchor="middle" style="font: 10px system-ui; fill: var(--third);">"the teacher" (gen)</text>
          <text x="420" y="55" text-anchor="middle" style="font: 10px system-ui; fill: var(--third);">definite --> whole phrase definite</text>
        </g>

        <g transform="translate(580,40)">
          <rect width="380" height="65" rx="8" fill="var(--english-bg)" stroke="var(--english)"/>
          <text x="190" y="20" text-anchor="middle" style="font: bold 11px system-ui; fill: var(--english);">English needs TWO connectors:</text>
          <text x="190" y="42" text-anchor="middle" style="font: 13px system-ui; fill: var(--fg);">"the door <tspan fill="var(--english)" style="font-weight:bold">of</tspan> the house <tspan fill="var(--english)" style="font-weight:bold">of</tspan> the teacher"</text>
          <text x="190" y="58" text-anchor="middle" style="font: italic 10px system-ui; fill: var(--muted);">(awkward in English; natural in Arabic)</text>
        </g>

        <text x="500" y="120" text-anchor="middle" style="font: italic 11px system-ui; fill: var(--muted);">Three nouns, zero connecting words. Each noun (except the last) loses its article. All but the first take genitive case.</text>
      </g>

      <!-- IDAFA MEANING RANGE -->
      <g transform="translate(30,385)">
        <rect width="1000" height="135" rx="10" fill="var(--accent-light)" stroke="var(--accent)" stroke-width="1.5"/>
        <text x="500" y="22" text-anchor="middle" style="font: bold 13px system-ui; fill: var(--accent);">Id&#x02E4;a:fa Is Not Just "Possession" -- It Encodes Many Relationships</text>

        <g transform="translate(30,40)">
          <rect width="180" height="35" rx="4" fill="var(--first-bg)" stroke="var(--first)"/>
          <text x="90" y="23" text-anchor="middle" style="font: 11px system-ui; fill: var(--fg);">kita:bu t&#x02E4;-t&#x02E4;a:libi</text>
          <text x="230" y="23" style="font: 11px system-ui; fill: var(--muted);">= "the student's book" (possession)</text>

          <rect x="0" y="42" width="180" height="35" rx="4" fill="var(--first-bg)" stroke="var(--first)"/>
          <text x="90" y="65" text-anchor="middle" style="font: 11px system-ui; fill: var(--fg);">kha:tamu dhahabin</text>
          <text x="230" y="65" style="font: 11px system-ui; fill: var(--muted);">= "a ring of gold" (material)</text>

          <rect x="500" y="0" width="180" height="35" rx="4" fill="var(--first-bg)" stroke="var(--first)"/>
          <text x="590" y="23" text-anchor="middle" style="font: 11px system-ui; fill: var(--fg);">finja:nu qahwatin</text>
          <text x="730" y="23" style="font: 11px system-ui; fill: var(--muted);">= "a cup of coffee" (contents)</text>

          <rect x="500" y="42" width="180" height="35" rx="4" fill="var(--first-bg)" stroke="var(--first)"/>
          <text x="590" y="65" text-anchor="middle" style="font: 11px system-ui; fill: var(--fg);">ghurfatu n-nawmi</text>
          <text x="730" y="65" style="font: 11px system-ui; fill: var(--muted);">= "bedroom" (lit. "room of sleeping")</text>
        </g>

        <text x="500" y="120" text-anchor="middle" style="font: italic 11px system-ui; fill: var(--accent);">One construction, many meanings. Context disambiguates -- just as English "of" can mean possession, material, contents, or type.</text>
      </g>
    </svg>
  </div>

  <figcaption>
    <h2>Figure 4 -- The Id&#x02E4;a:fa (Construct State)</h2>
    <p>Arabic chains nouns together without any connecting word. The first noun (mud&#x02E4;a:f) loses its article and tanwi:n; the second noun (mud&#x02E4;a:f ilayhi) takes genitive case. Chains can extend to three or more nouns. English requires "of" or possessive "'s" for the same relationships. The id&#x02E4;a:fa handles possession, material, contents, origin, and purpose -- a single syntactic structure with broad semantic range.</p>
  </figcaption>

  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background:var(--first);"></div>First noun (possessed/modified)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--second);"></div>Second noun (possessor, genitive)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--third);"></div>Third noun (final possessor)</div>
  </div>
</figure>
</body>
</html>
