<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Arabic Case System: Three Cases + Tanwin</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --accent: #2563eb; --accent-light: #dbeafe;
    --nom: #059669; --nom-bg: #d1fae5;
    --acc: #d97706; --acc-bg: #fef3c7;
    --gen: #7c3aed; --gen-bg: #ede9fe;
    --muted: #6c757d; --caption-bg: #f8f9fa;
    --tanwin: #dc2626; --tanwin-bg: #fee2e2;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a; --fg: #e8e8f0; --surface: #1a1a2e; --border: #2d2d44;
      --accent: #6b8aff; --accent-light: #1e2a4a;
      --nom: #34d399; --nom-bg: #064e3b;
      --acc: #fbbf24; --acc-bg: #4a3520;
      --gen: #a78bfa; --gen-bg: #2e1f5e;
      --muted: #9a9ab0; --caption-bg: #1a1a2e;
      --tanwin: #f87171; --tanwin-bg: #5c1a1a;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--fg); display: flex; justify-content: center; padding: 2rem 1rem; line-height: 1.6; }
  figure { max-width: 1100px; width: 100%; }
  .diagram-container { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 1.5rem 1rem; overflow-x: auto; }
  figcaption { text-align: center; margin-top: 1.5rem; padding: 1rem 1.5rem; background: var(--caption-bg); border-radius: 8px; border: 1px solid var(--border); }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  .legend { display: flex; gap: 1.5rem; justify-content: center; flex-wrap: wrap; margin-top: 1rem; font-size: 0.82rem; color: var(--muted); }
  .legend-item { display: flex; align-items: center; gap: 0.4rem; }
  .legend-swatch { width: 14px; height: 14px; border-radius: 3px; border: 1px solid var(--border); }
  svg { display: block; margin: 0 auto; }
  .arabic { font-family: 'Noto Sans Arabic', 'Geeza Pro', serif; }
</style>
</head>
<body>
<figure>
  <div class="diagram-container">
    <svg viewBox="0 0 1060 700" xmlns="http://www.w3.org/2000/svg" style="min-width:780px;">
      <text x="530" y="28" text-anchor="middle" style="font: bold 16px system-ui; fill: var(--fg);">The Arabic Case System + Tanwi:n</text>
      <text x="530" y="48" text-anchor="middle" style="font: 11px system-ui; fill: var(--muted);">Three cases marked by short vowel endings -- a system hiding in plain sight</text>

      <!-- THREE CASE TRIANGLE -->
      <g transform="translate(30,75)">
        <rect width="500" height="310" rx="10" fill="var(--surface)" stroke="var(--border)" stroke-width="1"/>
        <text x="250" y="25" text-anchor="middle" style="font: bold 13px system-ui; fill: var(--accent);">The Three Cases</text>

        <!-- Nominative -->
        <rect x="150" y="40" width="200" height="65" rx="8" fill="var(--nom-bg)" stroke="var(--nom)" stroke-width="2"/>
        <text x="250" y="60" text-anchor="middle" style="font: bold 13px system-ui; fill: var(--nom);">NOMINATIVE (marfu:&#x0295;)</text>
        <text x="250" y="78" text-anchor="middle" style="font: 11px system-ui; fill: var(--fg);">Subject, predicate</text>
        <text x="250" y="95" text-anchor="middle" style="font: bold 14px monospace; fill: var(--nom);">-u / -un</text>

        <!-- Accusative -->
        <rect x="20" y="200" width="200" height="65" rx="8" fill="var(--acc-bg)" stroke="var(--acc)" stroke-width="2"/>
        <text x="120" y="220" text-anchor="middle" style="font: bold 13px system-ui; fill: var(--acc);">ACCUSATIVE (mans&#x02E4;u:b)</text>
        <text x="120" y="238" text-anchor="middle" style="font: 11px system-ui; fill: var(--fg);">Direct object, adverbs</text>
        <text x="120" y="255" text-anchor="middle" style="font: bold 14px monospace; fill: var(--acc);">-a / -an</text>

        <!-- Genitive -->
        <rect x="280" y="200" width="200" height="65" rx="8" fill="var(--gen-bg)" stroke="var(--gen)" stroke-width="2"/>
        <text x="380" y="220" text-anchor="middle" style="font: bold 13px system-ui; fill: var(--gen);">GENITIVE (majru:r)</text>
        <text x="380" y="238" text-anchor="middle" style="font: 11px system-ui; fill: var(--fg);">After prepositions, id&#x02E4;a:fa</text>
        <text x="380" y="255" text-anchor="middle" style="font: bold 14px monospace; fill: var(--gen);">-i / -in</text>

        <!-- Triangle lines -->
        <line x1="250" y1="105" x2="120" y2="200" stroke="var(--border)" stroke-width="1.5" stroke-dasharray="4,3"/>
        <line x1="250" y1="105" x2="380" y2="200" stroke="var(--border)" stroke-width="1.5" stroke-dasharray="4,3"/>
        <line x1="120" y1="265" x2="380" y2="265" stroke="var(--border)" stroke-width="1.5" stroke-dasharray="4,3"/>

        <!-- Example sentence -->
        <text x="250" y="295" text-anchor="middle" style="font: bold 12px system-ui; fill: var(--fg);">qara'<tspan fill="var(--nom)">tu</tspan> al-kita:b<tspan fill="var(--acc)">a</tspan> fi: al-maktab<tspan fill="var(--gen)">i</tspan></text>
        <text x="250" y="308" text-anchor="middle" style="font: 10px system-ui; fill: var(--muted);">"I read the book in the office" -- each noun marked for its grammatical role</text>
      </g>

      <!-- TANWIN PANEL -->
      <g transform="translate(550,75)">
        <rect width="480" height="310" rx="10" fill="var(--tanwin-bg)" stroke="var(--tanwin)" stroke-width="1.5"/>
        <text x="240" y="25" text-anchor="middle" style="font: bold 13px system-ui; fill: var(--tanwin);">Tanwi:n (Nunation): Case + Indefiniteness</text>
        <text x="240" y="43" text-anchor="middle" style="font: 11px system-ui; fill: var(--muted);">Doubled vowel = case marker + "a/an" rolled into one</text>

        <!-- Definite vs Indefinite table -->
        <g transform="translate(20,60)">
          <!-- Headers -->
          <text x="70" y="0" text-anchor="middle" style="font: bold 10px system-ui; fill: var(--accent);">Case</text>
          <text x="200" y="0" text-anchor="middle" style="font: bold 10px system-ui; fill: var(--accent);">Definite (al-)</text>
          <text x="360" y="0" text-anchor="middle" style="font: bold 10px system-ui; fill: var(--tanwin);">Indefinite (tanwi:n)</text>

          <!-- Nominative row -->
          <rect x="0" y="10" width="130" height="35" rx="4" fill="var(--nom-bg)" stroke="var(--nom)"/>
          <text x="65" y="33" text-anchor="middle" style="font: bold 11px system-ui; fill: var(--nom);">Nominative</text>
          <rect x="140" y="10" width="120" height="35" rx="4" fill="var(--surface)" stroke="var(--border)"/>
          <text x="200" y="33" text-anchor="middle" style="font: 13px monospace; fill: var(--fg);">al-kita:b<tspan fill="var(--nom)">u</tspan></text>
          <rect x="270" y="10" width="160" height="35" rx="4" fill="var(--surface)" stroke="var(--tanwin)"/>
          <text x="350" y="33" text-anchor="middle" style="font: 13px monospace; fill: var(--fg);">kita:b<tspan fill="var(--tanwin)">un</tspan></text>

          <!-- Accusative row -->
          <rect x="0" y="50" width="130" height="35" rx="4" fill="var(--acc-bg)" stroke="var(--acc)"/>
          <text x="65" y="73" text-anchor="middle" style="font: bold 11px system-ui; fill: var(--acc);">Accusative</text>
          <rect x="140" y="50" width="120" height="35" rx="4" fill="var(--surface)" stroke="var(--border)"/>
          <text x="200" y="73" text-anchor="middle" style="font: 13px monospace; fill: var(--fg);">al-kita:b<tspan fill="var(--acc)">a</tspan></text>
          <rect x="270" y="50" width="160" height="35" rx="4" fill="var(--surface)" stroke="var(--tanwin)"/>
          <text x="350" y="73" text-anchor="middle" style="font: 13px monospace; fill: var(--fg);">kita:b<tspan fill="var(--tanwin)">an</tspan></text>

          <!-- Genitive row -->
          <rect x="0" y="90" width="130" height="35" rx="4" fill="var(--gen-bg)" stroke="var(--gen)"/>
          <text x="65" y="113" text-anchor="middle" style="font: bold 11px system-ui; fill: var(--gen);">Genitive</text>
          <rect x="140" y="90" width="120" height="35" rx="4" fill="var(--surface)" stroke="var(--border)"/>
          <text x="200" y="113" text-anchor="middle" style="font: 13px monospace; fill: var(--fg);">al-kita:b<tspan fill="var(--gen)">i</tspan></text>
          <rect x="270" y="90" width="160" height="35" rx="4" fill="var(--surface)" stroke="var(--tanwin)"/>
          <text x="350" y="113" text-anchor="middle" style="font: 13px monospace; fill: var(--fg);">kita:b<tspan fill="var(--tanwin)">in</tspan></text>
        </g>

        <!-- Mutual exclusivity rule -->
        <rect x="20" y="210" width="440" height="40" rx="6" fill="var(--surface)" stroke="var(--accent)"/>
        <text x="240" y="235" text-anchor="middle" style="font: bold 11px system-ui; fill: var(--accent);">Rule: al- and tanwi:n are MUTUALLY EXCLUSIVE</text>

        <!-- The dirty secret -->
        <rect x="20" y="260" width="440" height="40" rx="6" fill="var(--accent-light)" stroke="var(--accent)" stroke-dasharray="4,3"/>
        <text x="240" y="278" text-anchor="middle" style="font: italic 11px system-ui; fill: var(--accent);">The dirty secret: case endings are DROPPED in all spoken Arabic dialects.</text>
        <text x="240" y="293" text-anchor="middle" style="font: italic 10px system-ui; fill: var(--muted);">They survive in formal speech, Quranic recitation, and written texts with vowel marks.</text>
      </g>

      <!-- ENGLISH COMPARISON -->
      <g transform="translate(30,405)">
        <rect width="1000" height="120" rx="10" fill="var(--accent-light)" stroke="var(--accent)" stroke-width="1.5"/>
        <text x="500" y="25" text-anchor="middle" style="font: bold 14px system-ui; fill: var(--accent);">English Comparison: No Case on Nouns (Word Order Does the Work)</text>

        <text x="50" y="55" style="font: 13px system-ui; fill: var(--fg);"><tspan style="font-weight:bold">English:</tspan> "The dog bit the man" vs. "The man bit the dog"</text>
        <text x="50" y="75" style="font: 12px system-ui; fill: var(--muted);">Swap nouns --> meaning reverses. Word order = grammatical role.</text>

        <text x="50" y="100" style="font: 13px system-ui; fill: var(--fg);"><tspan style="font-weight:bold">Arabic:</tspan> Case endings tell you which noun is subject/object -- word order is freer.</text>
        <text x="50" y="115" style="font: 12px system-ui; fill: var(--muted);">Old English had 4 cases (nom, acc, gen, dat). Modern English kept only possessive 's. German still has 4.</text>
      </g>

      <!-- NOUN FORM COUNT -->
      <g transform="translate(30,545)">
        <rect width="1000" height="135" rx="10" fill="var(--surface)" stroke="var(--border)" stroke-width="1"/>
        <text x="500" y="25" text-anchor="middle" style="font: bold 14px system-ui; fill: var(--fg);">How Many Forms Can One Noun Take?</text>

        <!-- English -->
        <g transform="translate(30,40)">
          <text x="0" y="15" style="font: bold 12px system-ui; fill: var(--accent);">English "book":</text>
          <rect x="160" y="0" width="40" height="28" rx="4" fill="var(--accent-light)" stroke="var(--accent)"/>
          <text x="180" y="20" text-anchor="middle" style="font: bold 14px system-ui; fill: var(--accent);">2</text>
          <text x="220" y="18" style="font: 11px system-ui; fill: var(--fg);">forms (book, books)</text>
        </g>

        <!-- French -->
        <g transform="translate(30,70)">
          <text x="0" y="15" style="font: bold 12px system-ui; fill: var(--accent);">French "livre":</text>
          <rect x="160" y="0" width="40" height="28" rx="4" fill="var(--accent-light)" stroke="var(--accent)"/>
          <text x="180" y="20" text-anchor="middle" style="font: bold 14px system-ui; fill: var(--accent);">2</text>
          <text x="220" y="18" style="font: 11px system-ui; fill: var(--fg);">forms (livre, livres -- though -s is silent!)</text>
        </g>

        <!-- Arabic -->
        <g transform="translate(30,100)">
          <text x="0" y="15" style="font: bold 12px system-ui; fill: var(--tanwin);">Arabic "kita:b":</text>
          <rect x="160" y="0" width="40" height="28" rx="4" fill="var(--tanwin-bg)" stroke="var(--tanwin)"/>
          <text x="180" y="20" text-anchor="middle" style="font: bold 14px system-ui; fill: var(--tanwin);">12</text>
          <text x="220" y="18" style="font: 11px system-ui; fill: var(--fg);">forms (3 numbers x 2 definiteness x ~2 case forms each = 12 distinct forms)</text>
        </g>
      </g>
    </svg>
  </div>

  <figcaption>
    <h2>Figure 3 -- The Arabic Case System and Tanwi:n</h2>
    <p>Arabic marks grammatical role on every noun with short vowel endings: -u (nominative/subject), -a (accusative/object), -i (genitive/possession). Indefinite nouns double the vowel into tanwi:n (-un, -an, -in), which simultaneously marks case and indefiniteness. The result: a single Arabic noun like "kita:b" has 12 distinct forms (3 numbers x 2 definiteness x case variants) compared to English "book" with 2 forms. The catch: spoken Arabic universally drops these endings.</p>
  </figcaption>

  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background:var(--nom);"></div>Nominative (subject)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--acc);"></div>Accusative (object)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--gen);"></div>Genitive (possession)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--tanwin);"></div>Tanwi:n (indefinite)</div>
  </div>
</figure>
</body>
</html>
