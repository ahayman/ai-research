<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sound vs. Broken Plural Formation</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --accent: #2563eb; --accent-light: #dbeafe;
    --sound: #059669; --sound-bg: #d1fae5;
    --broken: #dc2626; --broken-bg: #fee2e2;
    --root: #7c3aed; --pattern: #2563eb;
    --muted: #6c757d; --caption-bg: #f8f9fa;
    --english: #6366f1; --english-bg: #e8e8ff;
    --correct: #059669; --correct-bg: #d1fae5;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a; --fg: #e8e8f0; --surface: #1a1a2e; --border: #2d2d44;
      --accent: #6b8aff; --accent-light: #1e2a4a;
      --sound: #34d399; --sound-bg: #064e3b;
      --broken: #f87171; --broken-bg: #5c1a1a;
      --root: #a78bfa; --pattern: #60a5fa;
      --muted: #9a9ab0; --caption-bg: #1a1a2e;
      --english: #818cf8; --english-bg: #2e2e5a;
      --correct: #34d399; --correct-bg: #064e3b;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--fg); display: flex; justify-content: center; padding: 2rem 1rem; line-height: 1.6; }
  figure { max-width: 1100px; width: 100%; }
  .diagram-container { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 1.5rem 1rem; overflow-x: auto; }
  figcaption { text-align: center; margin-top: 1.5rem; padding: 1rem 1.5rem; background: var(--caption-bg); border-radius: 8px; border: 1px solid var(--border); }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  .legend { display: flex; gap: 1.5rem; justify-content: center; flex-wrap: wrap; margin-top: 1rem; font-size: 0.82rem; color: var(--muted); }
  .legend-item { display: flex; align-items: center; gap: 0.4rem; }
  .legend-swatch { width: 14px; height: 14px; border-radius: 3px; border: 1px solid var(--border); }
  svg { display: block; margin: 0 auto; }
  .arabic { font-family: 'Noto Sans Arabic', 'Geeza Pro', serif; }
</style>
</head>
<body>
<figure>
  <div class="diagram-container">
    <svg viewBox="0 0 1060 800" xmlns="http://www.w3.org/2000/svg" style="min-width:780px;">
      <text x="530" y="28" text-anchor="middle" style="font: bold 16px system-ui; fill: var(--fg);">Sound Plurals vs. Broken Plurals</text>
      <text x="530" y="48" text-anchor="middle" style="font: 11px system-ui; fill: var(--muted);">Two strategies: add a suffix (sound) or transform from within (broken)</text>

      <!-- SOUND PLURAL PANEL -->
      <g transform="translate(30,70)">
        <rect width="480" height="280" rx="10" fill="var(--sound-bg)" stroke="var(--sound)" stroke-width="1.5"/>
        <text x="240" y="25" text-anchor="middle" style="font: bold 14px system-ui; fill: var(--sound);">Sound Plurals (suffix-based)</text>
        <text x="240" y="43" text-anchor="middle" style="font: 11px system-ui; fill: var(--muted);">Base word stays intact -- suffix added to the end</text>

        <!-- Masculine example -->
        <g transform="translate(20,60)">
          <rect width="200" height="40" rx="6" fill="var(--surface)" stroke="var(--sound)"/>
          <text x="100" y="26" text-anchor="middle" style="font: bold 13px monospace; fill: var(--fg);">mu&#x0295;allim</text>
          <text x="230" y="26" text-anchor="middle" style="font: bold 18px system-ui; fill: var(--sound);">+</text>
          <rect x="255" y="0" width="80" height="40" rx="6" fill="var(--surface)" stroke="var(--sound)" stroke-width="2"/>
          <text x="295" y="26" text-anchor="middle" style="font: bold 13px monospace; fill: var(--sound);">-u:n</text>
          <text x="355" y="26" style="font: bold 13px system-ui; fill: var(--muted);">=</text>
          <text x="380" y="26" style="font: bold 13px monospace; fill: var(--fg);">mu&#x0295;allimu:n</text>
        </g>
        <text x="240" y="115" text-anchor="middle" style="font: 11px system-ui; fill: var(--fg);">Masculine sound plural: base + -u:n (nom) / -i:n (acc/gen)</text>

        <!-- Feminine example -->
        <g transform="translate(20,135)">
          <rect width="200" height="40" rx="6" fill="var(--surface)" stroke="var(--sound)"/>
          <text x="100" y="26" text-anchor="middle" style="font: bold 13px monospace; fill: var(--fg);">mu&#x0295;allima</text>
          <text x="230" y="26" text-anchor="middle" style="font: bold 18px system-ui; fill: var(--sound);">+</text>
          <rect x="255" y="0" width="80" height="40" rx="6" fill="var(--surface)" stroke="var(--sound)" stroke-width="2"/>
          <text x="295" y="26" text-anchor="middle" style="font: bold 13px monospace; fill: var(--sound);">-a:t</text>
          <text x="355" y="26" style="font: bold 13px system-ui; fill: var(--muted);">=</text>
          <text x="380" y="26" style="font: bold 13px monospace; fill: var(--fg);">mu&#x0295;allima:t</text>
        </g>
        <text x="240" y="190" text-anchor="middle" style="font: 11px system-ui; fill: var(--fg);">Feminine sound plural: base + -a:t</text>

        <!-- Like English -->
        <rect x="20" y="210" width="440" height="55" rx="6" fill="var(--english-bg)" stroke="var(--english)"/>
        <text x="240" y="230" text-anchor="middle" style="font: bold 11px system-ui; fill: var(--english);">English analog: book + -s = books</text>
        <text x="240" y="248" text-anchor="middle" style="font: 11px system-ui; fill: var(--english);">Same principle: add suffix, base unchanged</text>
      </g>

      <!-- BROKEN PLURAL PANEL -->
      <g transform="translate(540,70)">
        <rect width="490" height="280" rx="10" fill="var(--broken-bg)" stroke="var(--broken)" stroke-width="1.5"/>
        <text x="245" y="25" text-anchor="middle" style="font: bold 14px system-ui; fill: var(--broken);">Broken Plurals (internal change)</text>
        <text x="245" y="43" text-anchor="middle" style="font: 11px system-ui; fill: var(--muted);">Root stays -- vowel pattern transforms from within</text>

        <!-- Example 1: kitab -> kutub -->
        <g transform="translate(20,60)">
          <rect width="180" height="40" rx="6" fill="var(--surface)" stroke="var(--broken)"/>
          <text x="90" y="26" text-anchor="middle" style="font: bold 14px monospace;">
            <tspan fill="var(--root)">k</tspan><tspan fill="var(--pattern)">i</tspan><tspan fill="var(--root)">t</tspan><tspan fill="var(--pattern)">a:</tspan><tspan fill="var(--root)">b</tspan>
          </text>
          <text x="210" y="26" text-anchor="middle" style="font: bold 18px system-ui; fill: var(--broken);">--></text>
          <rect x="240" y="0" width="180" height="40" rx="6" fill="var(--surface)" stroke="var(--broken)" stroke-width="2"/>
          <text x="330" y="26" text-anchor="middle" style="font: bold 14px monospace;">
            <tspan fill="var(--root)">k</tspan><tspan fill="var(--broken)">u</tspan><tspan fill="var(--root)">t</tspan><tspan fill="var(--broken)">u</tspan><tspan fill="var(--root)">b</tspan>
          </text>
        </g>
        <text x="245" y="115" text-anchor="middle" style="font: 11px system-ui; fill: var(--fg);">kita:b (CiCa:C) --> kutub (CuCuC) = book --> books</text>

        <!-- Example 2: rajul -> rija:l -->
        <g transform="translate(20,130)">
          <rect width="180" height="40" rx="6" fill="var(--surface)" stroke="var(--broken)"/>
          <text x="90" y="26" text-anchor="middle" style="font: bold 14px monospace;">
            <tspan fill="var(--root)">r</tspan><tspan fill="var(--pattern)">a</tspan><tspan fill="var(--root)">j</tspan><tspan fill="var(--pattern)">u</tspan><tspan fill="var(--root)">l</tspan>
          </text>
          <text x="210" y="26" text-anchor="middle" style="font: bold 18px system-ui; fill: var(--broken);">--></text>
          <rect x="240" y="0" width="180" height="40" rx="6" fill="var(--surface)" stroke="var(--broken)" stroke-width="2"/>
          <text x="330" y="26" text-anchor="middle" style="font: bold 14px monospace;">
            <tspan fill="var(--root)">r</tspan><tspan fill="var(--broken)">i</tspan><tspan fill="var(--root)">j</tspan><tspan fill="var(--broken)">a:</tspan><tspan fill="var(--root)">l</tspan>
          </text>
        </g>
        <text x="245" y="185" text-anchor="middle" style="font: 11px system-ui; fill: var(--fg);">rajul (CaCuC) --> rija:l (CiCa:C) = man --> men</text>

        <!-- English analog -->
        <rect x="20" y="210" width="450" height="55" rx="6" fill="var(--english-bg)" stroke="var(--english)"/>
        <text x="245" y="230" text-anchor="middle" style="font: bold 11px system-ui; fill: var(--english);">English analog: foot --> feet, man --> men, goose --> geese</text>
        <text x="245" y="248" text-anchor="middle" style="font: 11px system-ui; fill: var(--english);">English has ~7 of these. Arabic has HUNDREDS across 31+ patterns.</text>
      </g>

      <!-- FREQUENCY CORRECTION BOX -->
      <g transform="translate(30,370)">
        <rect width="1000" height="130" rx="10" fill="var(--correct-bg)" stroke="var(--correct)" stroke-width="2"/>
        <text x="500" y="25" text-anchor="middle" style="font: bold 14px system-ui; fill: var(--correct);">Frequency Distribution: Correcting a Common Myth</text>

        <g transform="translate(30,40)">
          <!-- Sound plural bar -->
          <text x="0" y="15" style="font: bold 11px system-ui; fill: var(--sound);">Sound plurals:</text>
          <rect x="150" y="0" width="555" height="25" rx="4" fill="var(--sound)" opacity="0.7"/>
          <text x="450" y="17" text-anchor="middle" style="font: bold 12px system-ui; fill: white;">74% by type / 61% by token</text>
          <text x="720" y="17" style="font: 10px system-ui; fill: var(--fg);">(MAJORITY)</text>

          <!-- Broken plural bar -->
          <text x="0" y="50" style="font: bold 11px system-ui; fill: var(--broken);">Broken plurals:</text>
          <rect x="150" y="35" width="195" height="25" rx="4" fill="var(--broken)" opacity="0.7"/>
          <text x="300" y="52" text-anchor="middle" style="font: bold 12px system-ui; fill: white;">26% by type / 39% by token</text>
        </g>

        <text x="500" y="105" text-anchor="middle" style="font: 12px system-ui; fill: var(--fg);">Corpus research shows sound plurals are actually the <tspan style="font-weight:bold">majority</tspan> in actual usage.</text>
        <text x="500" y="122" text-anchor="middle" style="font: italic 11px system-ui; fill: var(--muted);">The claim that broken plurals "dominate" comes from dictionary sampling bias -- dictionaries overrepresent uncommon noun patterns.</text>
      </g>

      <!-- BROKEN PLURAL PATTERN SHOWCASE -->
      <g transform="translate(30,520)">
        <rect width="1000" height="260" rx="10" fill="var(--surface)" stroke="var(--border)" stroke-width="1"/>
        <text x="500" y="25" text-anchor="middle" style="font: bold 14px system-ui; fill: var(--fg);">Common Broken Plural Patterns (the "organized chaos")</text>

        <!-- Pattern grid -->
        <g transform="translate(20,45)">
          <!-- Headers -->
          <rect width="220" height="28" rx="4" fill="var(--accent-light)" stroke="var(--accent)"/>
          <text x="110" y="20" text-anchor="middle" style="font: bold 10px system-ui; fill: var(--accent);">Singular Pattern</text>
          <rect x="230" y="0" width="220" height="28" rx="4" fill="var(--broken-bg)" stroke="var(--broken)"/>
          <text x="340" y="20" text-anchor="middle" style="font: bold 10px system-ui; fill: var(--broken);">Plural Pattern</text>
          <rect x="460" y="0" width="250" height="28" rx="4" fill="var(--surface)" stroke="var(--border)"/>
          <text x="585" y="20" text-anchor="middle" style="font: bold 10px system-ui; fill: var(--fg);">Example</text>
          <rect x="720" y="0" width="250" height="28" rx="4" fill="var(--surface)" stroke="var(--border)"/>
          <text x="845" y="20" text-anchor="middle" style="font: bold 10px system-ui; fill: var(--fg);">English</text>

          <!-- Rows -->
          <text x="110" y="55" text-anchor="middle" style="font: 11px monospace; fill: var(--fg);">CaCaC</text>
          <text x="340" y="55" text-anchor="middle" style="font: 11px monospace; fill: var(--broken);">CiCa:C</text>
          <text x="585" y="55" text-anchor="middle" style="font: 11px system-ui; fill: var(--fg);">jabal --> jiba:l</text>
          <text x="845" y="55" text-anchor="middle" style="font: 11px system-ui; fill: var(--fg);">mountain --> mountains</text>

          <text x="110" y="78" text-anchor="middle" style="font: 11px monospace; fill: var(--fg);">CayC / CaCC</text>
          <text x="340" y="78" text-anchor="middle" style="font: 11px monospace; fill: var(--broken);">CuCu:C</text>
          <text x="585" y="78" text-anchor="middle" style="font: 11px system-ui; fill: var(--fg);">bayt --> buyu:t</text>
          <text x="845" y="78" text-anchor="middle" style="font: 11px system-ui; fill: var(--fg);">house --> houses</text>

          <text x="110" y="101" text-anchor="middle" style="font: 11px monospace; fill: var(--fg);">Ca:CiC</text>
          <text x="340" y="101" text-anchor="middle" style="font: 11px monospace; fill: var(--broken);">CuCCa:C</text>
          <text x="585" y="101" text-anchor="middle" style="font: 11px system-ui; fill: var(--fg);">t&#x02E4;a:lib --> t&#x02E4;ulla:b</text>
          <text x="845" y="101" text-anchor="middle" style="font: 11px system-ui; fill: var(--fg);">student --> students</text>

          <text x="110" y="124" text-anchor="middle" style="font: 11px monospace; fill: var(--fg);">CaCi:C</text>
          <text x="340" y="124" text-anchor="middle" style="font: 11px monospace; fill: var(--broken);">CuCaCa:' </text>
          <text x="585" y="124" text-anchor="middle" style="font: 11px system-ui; fill: var(--fg);">kabi:r --> kubara:'</text>
          <text x="845" y="124" text-anchor="middle" style="font: 11px system-ui; fill: var(--fg);">elder --> elders</text>

          <text x="110" y="147" text-anchor="middle" style="font: 11px monospace; fill: var(--fg);">maCCaCa</text>
          <text x="340" y="147" text-anchor="middle" style="font: 11px monospace; fill: var(--broken);">maCa:CiC</text>
          <text x="585" y="147" text-anchor="middle" style="font: 11px system-ui; fill: var(--fg);">madrasa --> mada:ris</text>
          <text x="845" y="147" text-anchor="middle" style="font: 11px system-ui; fill: var(--fg);">school --> schools</text>

          <text x="110" y="170" text-anchor="middle" style="font: 11px monospace; fill: var(--fg);">CiCa:C</text>
          <text x="340" y="170" text-anchor="middle" style="font: 11px monospace; fill: var(--broken);">CuCuC</text>
          <text x="585" y="170" text-anchor="middle" style="font: 11px system-ui; fill: var(--fg);">kita:b --> kutub</text>
          <text x="845" y="170" text-anchor="middle" style="font: 11px system-ui; fill: var(--fg);">book --> books</text>
        </g>

        <text x="500" y="240" text-anchor="middle" style="font: italic 11px system-ui; fill: var(--muted);">The singular pattern partially predicts the plural pattern -- not perfectly, but not randomly either. 31+ patterns, with a handful dominating.</text>
      </g>
    </svg>
  </div>

  <figcaption>
    <h2>Figure 1 -- Sound vs. Broken Plural Formation</h2>
    <p>Sound plurals preserve the base word and add a suffix (like English -s). Broken plurals shatter the internal vowel pattern and reassemble it -- the root consonants stay, the template changes. While broken plurals are prominent and culturally significant, corpus research shows sound plurals are actually the statistical majority (74% by type, 61% by token). The claim that broken plurals dominate stems from dictionary sampling bias, not actual usage frequency.</p>
  </figcaption>

  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background:var(--sound);"></div>Sound plural (suffix-based)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--broken);"></div>Broken plural (internal change)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--root);"></div>Root consonants (unchanged)</div>
  </div>
</figure>
</body>
</html>
