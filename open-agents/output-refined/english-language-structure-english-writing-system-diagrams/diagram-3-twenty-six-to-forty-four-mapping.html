<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The 26-to-44 Mapping Problem</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --accent: #4361ee;
    --accent-light: #e8edff;
    --muted: #6c757d;
    --caption-bg: #f8f9fa;
    --consonant-color: #1565c0;
    --consonant-bg: #e3f2fd;
    --vowel-color: #c2185b;
    --vowel-bg: #fce4ec;
    --digraph-color: #2e7d32;
    --digraph-bg: #e8f5e9;
    --problem-color: #e65100;
    --problem-bg: #fff3e0;
    --line-regular: #90caf9;
    --line-irregular: #ef9a9a;
    --card-bg: #ffffff;
    --card-shadow: 0 2px 6px rgba(0,0,0,0.06);
    --stat-bg: #f3e5f5;
    --stat-color: #7b1fa2;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --accent: #6b8aff;
      --accent-light: #1e2a4a;
      --muted: #9a9ab0;
      --caption-bg: #1a1a2e;
      --consonant-color: #64b5f6;
      --consonant-bg: #152540;
      --vowel-color: #f48fb1;
      --vowel-bg: #311b2c;
      --digraph-color: #81c784;
      --digraph-bg: #1a3020;
      --problem-color: #ffb74d;
      --problem-bg: #2a2010;
      --line-regular: #2a4060;
      --line-irregular: #4a2020;
      --card-bg: #22223a;
      --card-shadow: 0 2px 6px rgba(0,0,0,0.3);
      --stat-bg: #2a1f40;
      --stat-color: #ce93d8;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure { max-width: 960px; width: 100%; }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding: 1rem 1.5rem;
    background: var(--caption-bg);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }

  .top-stats {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 0.5rem;
    align-items: center;
    margin-bottom: 1.5rem;
  }
  .stat-box {
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 10px;
    padding: 1rem;
    text-align: center;
  }
  .stat-box .big-number {
    font-size: 2.5rem;
    font-weight: 800;
    line-height: 1.1;
  }
  .stat-box .stat-label {
    font-size: 0.8rem;
    color: var(--muted);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .stat-box.letters { border-color: var(--consonant-color); }
  .stat-box.letters .big-number { color: var(--consonant-color); }
  .stat-box.phonemes { border-color: var(--vowel-color); }
  .stat-box.phonemes .big-number { color: var(--vowel-color); }
  .stat-connector {
    font-size: 1.5rem;
    color: var(--problem-color);
    font-weight: 700;
    text-align: center;
  }
  .stat-connector .label {
    font-size: 0.65rem;
    display: block;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .problem-banner {
    background: var(--problem-bg);
    border: 2px solid var(--problem-color);
    border-radius: 10px;
    padding: 0.8rem 1.2rem;
    text-align: center;
    margin-bottom: 1.5rem;
    font-size: 0.88rem;
    font-weight: 600;
    color: var(--problem-color);
  }

  .mapping-sections {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
    margin-bottom: 1rem;
  }

  .mapping-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1rem;
  }
  .mapping-section-title {
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 0.75rem;
    padding-bottom: 0.4rem;
    border-bottom: 1px solid var(--border);
  }

  /* One sound, many spellings */
  .sound-spellings {
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
  }
  .sound-row {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    flex-wrap: wrap;
  }
  .sound-badge {
    font-size: 0.85rem;
    font-weight: 700;
    padding: 0.2rem 0.5rem;
    border-radius: 5px;
    min-width: 42px;
    text-align: center;
    font-family: 'Segoe UI', system-ui, sans-serif;
    flex-shrink: 0;
  }
  .sound-badge.vowel { background: var(--vowel-bg); color: var(--vowel-color); }
  .sound-badge.consonant { background: var(--consonant-bg); color: var(--consonant-color); }

  .spelling-chips {
    display: flex;
    gap: 0.3rem;
    flex-wrap: wrap;
  }
  .spelling-chip {
    font-size: 0.78rem;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 0.1rem 0.4rem;
    font-weight: 600;
  }
  .spelling-chip .example {
    font-weight: 400;
    font-style: italic;
    color: var(--muted);
    font-size: 0.72rem;
  }

  /* Strategies section */
  .strategies-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.6rem;
  }
  .strategy-card {
    background: var(--card-bg);
    border-radius: 8px;
    padding: 0.6rem 0.8rem;
    box-shadow: var(--card-shadow);
    border-left: 3px solid var(--digraph-color);
  }
  .strategy-card .strategy-name {
    font-size: 0.82rem;
    font-weight: 700;
    color: var(--digraph-color);
    margin-bottom: 0.2rem;
  }
  .strategy-card .strategy-example {
    font-size: 0.78rem;
    color: var(--muted);
  }

  /* The ough showcase */
  .ough-showcase {
    background: var(--problem-bg);
    border: 1px solid var(--problem-color);
    border-radius: 10px;
    padding: 1rem 1.2rem;
    margin-bottom: 1rem;
  }
  .ough-title {
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--problem-color);
    margin-bottom: 0.6rem;
  }
  .ough-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 0.4rem;
  }
  .ough-item {
    background: var(--card-bg);
    border-radius: 6px;
    padding: 0.4rem 0.6rem;
    text-align: center;
    box-shadow: var(--card-shadow);
  }
  .ough-item .word {
    font-size: 1rem;
    font-weight: 700;
  }
  .ough-item .sound {
    font-size: 0.78rem;
    color: var(--problem-color);
    font-weight: 600;
  }

  /* Reliability stats */
  .reliability-section {
    background: var(--stat-bg);
    border: 1px solid var(--stat-color);
    border-radius: 10px;
    padding: 1rem 1.2rem;
  }
  .reliability-title {
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--stat-color);
    margin-bottom: 0.75rem;
  }
  .reliability-bars {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }
  .rel-bar-row {
    display: flex;
    align-items: center;
    gap: 0.6rem;
  }
  .rel-bar-label {
    font-size: 0.8rem;
    font-weight: 600;
    min-width: 160px;
    text-align: right;
  }
  .rel-bar-track {
    flex: 1;
    height: 22px;
    background: var(--surface);
    border-radius: 4px;
    overflow: hidden;
    position: relative;
    border: 1px solid var(--border);
  }
  .rel-bar-fill {
    height: 100%;
    border-radius: 3px;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding-right: 0.4rem;
    font-size: 0.7rem;
    font-weight: 700;
    color: #fff;
    transition: width 0.3s;
  }
  .rel-bar-fill.consonants { background: var(--consonant-color); }
  .rel-bar-fill.vowels { background: var(--vowel-color); }
  .rel-bar-fill.overall { background: var(--accent); }
  .rel-bar-fill.morpho { background: var(--digraph-color); }

  @media (max-width: 700px) {
    .mapping-sections { grid-template-columns: 1fr; }
    .strategies-grid { grid-template-columns: 1fr; }
    .top-stats { grid-template-columns: 1fr; }
    .stat-connector { padding: 0.3rem 0; }
    .rel-bar-label { min-width: 100px; font-size: 0.72rem; }
  }
</style>
</head>
<body>
<figure>
  <!-- Top stats -->
  <div class="top-stats">
    <div class="stat-box letters">
      <div class="big-number">26</div>
      <div class="stat-label">Letters</div>
    </div>
    <div class="stat-connector">
      <span>&rarr;</span>
      <span class="label">must encode</span>
    </div>
    <div class="stat-box phonemes">
      <div class="big-number">~44</div>
      <div class="stat-label">Phonemes</div>
    </div>
  </div>

  <div class="problem-banner">
    26 letters for ~44 sounds = an estimated 200-300 grapheme-to-phoneme correspondences.
    5 vowel letters must represent ~20 vowel phonemes.
  </div>

  <div class="mapping-sections">
    <!-- One Sound, Many Spellings -->
    <div class="mapping-section">
      <div class="mapping-section-title" style="color: var(--vowel-color);">One Sound, Many Spellings</div>
      <div class="sound-spellings">
        <div class="sound-row">
          <span class="sound-badge vowel">/iː/</span>
          <div class="spelling-chips">
            <span class="spelling-chip"><strong>ee</strong> <span class="example">meet</span></span>
            <span class="spelling-chip"><strong>ea</strong> <span class="example">meat</span></span>
            <span class="spelling-chip"><strong>e</strong> <span class="example">me</span></span>
            <span class="spelling-chip"><strong>ie</strong> <span class="example">field</span></span>
            <span class="spelling-chip"><strong>ei</strong> <span class="example">receive</span></span>
            <span class="spelling-chip"><strong>ey</strong> <span class="example">key</span></span>
            <span class="spelling-chip"><strong>i</strong> <span class="example">machine</span></span>
          </div>
        </div>
        <div class="sound-row">
          <span class="sound-badge vowel">/uː/</span>
          <div class="spelling-chips">
            <span class="spelling-chip"><strong>oo</strong> <span class="example">moon</span></span>
            <span class="spelling-chip"><strong>ue</strong> <span class="example">blue</span></span>
            <span class="spelling-chip"><strong>ew</strong> <span class="example">blew</span></span>
            <span class="spelling-chip"><strong>u_e</strong> <span class="example">rude</span></span>
            <span class="spelling-chip"><strong>ou</strong> <span class="example">group</span></span>
            <span class="spelling-chip"><strong>o</strong> <span class="example">do</span></span>
          </div>
        </div>
        <div class="sound-row">
          <span class="sound-badge consonant">/f/</span>
          <div class="spelling-chips">
            <span class="spelling-chip"><strong>f</strong> <span class="example">fish</span></span>
            <span class="spelling-chip"><strong>ff</strong> <span class="example">off</span></span>
            <span class="spelling-chip"><strong>ph</strong> <span class="example">phone</span></span>
            <span class="spelling-chip"><strong>gh</strong> <span class="example">laugh</span></span>
          </div>
        </div>
      </div>
    </div>

    <!-- One Spelling, Many Sounds -->
    <div class="mapping-section">
      <div class="mapping-section-title" style="color: var(--consonant-color);">One Spelling, Many Sounds</div>
      <div class="sound-spellings">
        <div class="sound-row">
          <span class="sound-badge vowel" style="min-width: 28px;">a</span>
          <div class="spelling-chips">
            <span class="spelling-chip">/æ/ <span class="example">cat</span></span>
            <span class="spelling-chip">/eɪ/ <span class="example">cake</span></span>
            <span class="spelling-chip">/ɔː/ <span class="example">call</span></span>
            <span class="spelling-chip">/ə/ <span class="example">about</span></span>
            <span class="spelling-chip">/ɪ/ <span class="example">village</span></span>
          </div>
        </div>
        <div class="sound-row">
          <span class="sound-badge vowel" style="min-width: 28px;">o</span>
          <div class="spelling-chips">
            <span class="spelling-chip">/ɒ/ <span class="example">hot</span></span>
            <span class="spelling-chip">/oʊ/ <span class="example">go</span></span>
            <span class="spelling-chip">/uː/ <span class="example">do</span></span>
            <span class="spelling-chip">/ʌ/ <span class="example">come</span></span>
            <span class="spelling-chip">/ʊ/ <span class="example">wolf</span></span>
          </div>
        </div>
        <div class="sound-row">
          <span class="sound-badge consonant" style="min-width: 28px;">c</span>
          <div class="spelling-chips">
            <span class="spelling-chip">/k/ <span class="example">cat</span></span>
            <span class="spelling-chip">/s/ <span class="example">city</span></span>
            <span class="spelling-chip">/ʃ/ <span class="example">ocean</span></span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Ough showcase -->
  <div class="ough-showcase">
    <div class="ough-title">The Notorious "ough" -- Six Pronunciations, One Spelling</div>
    <div class="ough-grid">
      <div class="ough-item">
        <div class="word">thr<strong>ough</strong></div>
        <div class="sound">/uː/</div>
      </div>
      <div class="ough-item">
        <div class="word">th<strong>ough</strong></div>
        <div class="sound">/oʊ/</div>
      </div>
      <div class="ough-item">
        <div class="word">th<strong>ough</strong>t</div>
        <div class="sound">/ɔː/</div>
      </div>
      <div class="ough-item">
        <div class="word">t<strong>ough</strong></div>
        <div class="sound">/ʌf/</div>
      </div>
      <div class="ough-item">
        <div class="word">c<strong>ough</strong></div>
        <div class="sound">/ɒf/</div>
      </div>
      <div class="ough-item">
        <div class="word">b<strong>ough</strong></div>
        <div class="sound">/aʊ/</div>
      </div>
    </div>
  </div>

  <!-- Strategies -->
  <div class="mapping-section" style="margin-bottom: 1rem;">
    <div class="mapping-section-title" style="color: var(--digraph-color);">How English Bridges the Gap: Four Strategies</div>
    <div class="strategies-grid">
      <div class="strategy-card">
        <div class="strategy-name">Digraphs &amp; Trigraphs</div>
        <div class="strategy-example"><strong>sh</strong> /ʃ/ &bull; <strong>ch</strong> /tʃ/ &bull; <strong>th</strong> /θ,ð/ &bull; <strong>ng</strong> /ŋ/ &bull; <strong>igh</strong> /aɪ/</div>
      </div>
      <div class="strategy-card">
        <div class="strategy-name">Magic-e (Split Digraph)</div>
        <div class="strategy-example"><em>mat</em> /mæt/ &rarr; <em>mate</em> /meɪt/ &bull; <em>not</em> &rarr; <em>note</em> &bull; ~75% reliable</div>
      </div>
      <div class="strategy-card">
        <div class="strategy-name">Consonant Doubling</div>
        <div class="strategy-example"><em>dinner</em> (short) vs <em>diner</em> (long) &bull; <em>hopping</em> vs <em>hoping</em></div>
      </div>
      <div class="strategy-card">
        <div class="strategy-name">Positional Rules</div>
        <div class="strategy-example">Soft c/g before e, i, y (~90%) &bull; <em>-tion</em> = /ʃən/ &bull; <em>-ight</em> = /aɪt/</div>
      </div>
    </div>
  </div>

  <!-- Reliability -->
  <div class="reliability-section">
    <div class="reliability-title">Actual Predictability (It Is Not Chaos)</div>
    <div class="reliability-bars">
      <div class="rel-bar-row">
        <span class="rel-bar-label">Consonant spellings</span>
        <div class="rel-bar-track">
          <div class="rel-bar-fill consonants" style="width: 93%;">~93%</div>
        </div>
      </div>
      <div class="rel-bar-row">
        <span class="rel-bar-label">Vowel spellings</span>
        <div class="rel-bar-track">
          <div class="rel-bar-fill vowels" style="width: 55%;">~50-60%</div>
        </div>
      </div>
      <div class="rel-bar-row">
        <span class="rel-bar-label">Overall (phoneme rules only)</span>
        <div class="rel-bar-track">
          <div class="rel-bar-fill overall" style="width: 77%;">~75-80%</div>
        </div>
      </div>
      <div class="rel-bar-row">
        <span class="rel-bar-label">+ morphological awareness</span>
        <div class="rel-bar-track">
          <div class="rel-bar-fill morpho" style="width: 88%;">~85-90%</div>
        </div>
      </div>
    </div>
  </div>

  <figcaption>
    <h2>The 26-to-44 Mapping Problem</h2>
    <p>English inherited a 26-letter Latin alphabet designed for ~25 Latin phonemes, then developed ~44 phonemes of its own. The mismatch is real -- but English has systematic strategies (digraphs, magic-e, doubling, positional rules) that make ~75-80% of spellings predictable. The chaos concentrates in vowels, not consonants.</p>
  </figcaption>
</figure>
</body>
</html>
