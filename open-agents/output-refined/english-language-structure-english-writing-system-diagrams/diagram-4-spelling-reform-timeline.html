<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spelling Reform Timeline: A History of Failure</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --accent: #4361ee;
    --accent-light: #e8edff;
    --muted: #6c757d;
    --caption-bg: #f8f9fa;
    --fail-color: #c62828;
    --fail-bg: #ffebee;
    --partial-color: #e65100;
    --partial-bg: #fff3e0;
    --success-color: #2e7d32;
    --success-bg: #e8f5e9;
    --timeline-line: #bdbdbd;
    --card-bg: #ffffff;
    --card-shadow: 0 2px 6px rgba(0,0,0,0.06);
    --sample-bg: #f5f5f5;
    --sample-border: #e0e0e0;
    --quote-color: #5e35b1;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --accent: #6b8aff;
      --accent-light: #1e2a4a;
      --muted: #9a9ab0;
      --caption-bg: #1a1a2e;
      --fail-color: #ef9a9a;
      --fail-bg: #2a1515;
      --partial-color: #ffb74d;
      --partial-bg: #2a2010;
      --success-color: #81c784;
      --success-bg: #1a3020;
      --timeline-line: #444;
      --card-bg: #22223a;
      --card-shadow: 0 2px 6px rgba(0,0,0,0.3);
      --sample-bg: #1a1a2e;
      --sample-border: #2d2d44;
      --quote-color: #b39ddb;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure { max-width: 860px; width: 100%; }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding: 1rem 1.5rem;
    background: var(--caption-bg);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }

  .timeline {
    position: relative;
    padding-left: 90px;
  }
  .timeline::before {
    content: '';
    position: absolute;
    left: 70px;
    top: 0;
    bottom: 0;
    width: 3px;
    background: var(--timeline-line);
    border-radius: 2px;
  }

  .timeline-entry {
    position: relative;
    margin-bottom: 1.2rem;
  }

  .timeline-year {
    position: absolute;
    left: -90px;
    top: 0.35rem;
    width: 65px;
    text-align: right;
    font-size: 0.9rem;
    font-weight: 800;
    color: var(--accent);
  }

  .timeline-dot {
    position: absolute;
    left: -20px;
    top: 0.55rem;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    border: 3px solid var(--bg);
    z-index: 1;
  }
  .timeline-dot.fail { background: var(--fail-color); }
  .timeline-dot.partial { background: var(--partial-color); }
  .timeline-dot.success { background: var(--success-color); }

  .timeline-card {
    background: var(--card-bg);
    border-radius: 10px;
    padding: 0.8rem 1rem;
    box-shadow: var(--card-shadow);
    border-left: 3px solid transparent;
    margin-left: 10px;
  }
  .timeline-card.fail { border-left-color: var(--fail-color); }
  .timeline-card.partial { border-left-color: var(--partial-color); }
  .timeline-card.success { border-left-color: var(--success-color); }

  .entry-header {
    display: flex;
    align-items: baseline;
    gap: 0.5rem;
    flex-wrap: wrap;
    margin-bottom: 0.3rem;
  }
  .entry-name {
    font-size: 1rem;
    font-weight: 700;
  }
  .entry-outcome {
    font-size: 0.65rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 0.1rem 0.4rem;
    border-radius: 3px;
  }
  .entry-outcome.fail { background: var(--fail-bg); color: var(--fail-color); }
  .entry-outcome.partial { background: var(--partial-bg); color: var(--partial-color); }
  .entry-outcome.success { background: var(--success-bg); color: var(--success-color); }

  .entry-desc {
    font-size: 0.82rem;
    color: var(--muted);
    line-height: 1.5;
    margin-bottom: 0.4rem;
  }

  .entry-sample {
    background: var(--sample-bg);
    border: 1px solid var(--sample-border);
    border-radius: 6px;
    padding: 0.4rem 0.7rem;
    font-size: 0.78rem;
    font-family: 'Courier New', monospace;
    line-height: 1.5;
  }
  .entry-sample .standard { color: var(--muted); }
  .entry-sample .reformed { color: var(--quote-color); font-weight: 600; }
  .entry-sample .label {
    font-family: 'Segoe UI', system-ui, sans-serif;
    font-size: 0.65rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--muted);
  }

  .reasons-box {
    background: var(--surface);
    border: 2px solid var(--fail-color);
    border-radius: 10px;
    padding: 1rem 1.2rem;
    margin-top: 1rem;
  }
  .reasons-title {
    font-size: 0.8rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--fail-color);
    margin-bottom: 0.6rem;
  }
  .reasons-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 0.5rem;
  }
  .reason-item {
    display: flex;
    align-items: flex-start;
    gap: 0.4rem;
    font-size: 0.82rem;
  }
  .reason-number {
    font-weight: 800;
    color: var(--fail-color);
    min-width: 18px;
  }
  .reason-item strong { font-weight: 700; }

  @media (max-width: 600px) {
    .timeline { padding-left: 50px; }
    .timeline::before { left: 30px; }
    .timeline-year { left: -50px; width: 35px; font-size: 0.75rem; }
    .timeline-dot { left: -20px; }
    .reasons-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<figure>
  <div class="timeline">
    <!-- 1768: Franklin -->
    <div class="timeline-entry">
      <div class="timeline-year">1768</div>
      <div class="timeline-dot fail"></div>
      <div class="timeline-card fail">
        <div class="entry-header">
          <span class="entry-name">Benjamin Franklin</span>
          <span class="entry-outcome fail">Not Adopted</span>
        </div>
        <div class="entry-desc">
          Proposed a new alphabet: drop 6 redundant letters (c, j, q, w, x, y), add 6 new characters for missing sounds.
          Logically rigorous but required learning an entirely new writing system.
        </div>
        <div class="entry-sample">
          <div><span class="label">Franklin's system: </span><span class="reformed">Removes "c" entirely; uses new letters for /ʃ/, /ŋ/, /ð/, etc.</span></div>
        </div>
      </div>
    </div>

    <!-- 1783-1828: Webster -->
    <div class="timeline-entry">
      <div class="timeline-year">1828</div>
      <div class="timeline-dot success"></div>
      <div class="timeline-card success">
        <div class="entry-header">
          <span class="entry-name">Noah Webster</span>
          <span class="entry-outcome success">Partially Adopted</span>
        </div>
        <div class="entry-desc">
          The most successful reformer in English history -- but only incrementally. His <em>American Dictionary</em> (1828) codified moderate simplifications that became standard in American English.
          More radical proposals were rejected.
        </div>
        <div class="entry-sample">
          <div><span class="label">Adopted: </span><span class="reformed">colour &rarr; color &bull; centre &rarr; center &bull; defence &rarr; defense &bull; catalogue &rarr; catalog</span></div>
          <div><span class="label">Rejected: </span><span class="standard">tung (tongue) &bull; hed (head) &bull; wimmen (women)</span></div>
        </div>
      </div>
    </div>

    <!-- 1906: SSB + Roosevelt -->
    <div class="timeline-entry">
      <div class="timeline-year">1906</div>
      <div class="timeline-dot fail"></div>
      <div class="timeline-card fail">
        <div class="entry-header">
          <span class="entry-name">Simplified Spelling Board + Roosevelt</span>
          <span class="entry-outcome fail">Overturned by Congress</span>
        </div>
        <div class="entry-desc">
          Carnegie funded ($250,000+) a board of prominent scholars who proposed 300 simplified spellings.
          President Roosevelt signed an executive order mandating their use in government.
          The House voted 142-25 against. Roosevelt withdrew the order within days.
        </div>
        <div class="entry-sample">
          <div><span class="label">Proposed: </span><span class="reformed">thru (through) &bull; tho (though) &bull; thoro (thorough) &bull; wisht (wished) &bull; dropt (dropped)</span></div>
        </div>
      </div>
    </div>

    <!-- 1908: Simplified Spelling Society -->
    <div class="timeline-entry">
      <div class="timeline-year">1908</div>
      <div class="timeline-dot fail"></div>
      <div class="timeline-card fail">
        <div class="entry-header">
          <span class="entry-name">Simplified Spelling Society (UK)</span>
          <span class="entry-outcome fail">Ongoing, No Impact</span>
        </div>
        <div class="entry-desc">
          Founded in Britain as a sister organization to the American SSB. Has promoted various reform schemes for over a century with minimal practical impact. Now called the English Spelling Society.
        </div>
      </div>
    </div>

    <!-- 1958: Shaw / Shavian -->
    <div class="timeline-entry">
      <div class="timeline-year">1958</div>
      <div class="timeline-dot fail"></div>
      <div class="timeline-card fail">
        <div class="entry-header">
          <span class="entry-name">George Bernard Shaw / Shavian Alphabet</span>
          <span class="entry-outcome fail">One Publication</span>
        </div>
        <div class="entry-desc">
          Shaw left his fortune for spelling reform. Kingsley Read won the alphabet design competition.
          A bi-alphabetic edition of <em>Androcles and the Lion</em> (1962) was the sole result.
          48 letters, one per phoneme -- entirely new character shapes.
        </div>
        <div class="entry-sample">
          <div><span class="label">Result: </span><span class="standard">One book published. No adoption. The estate's funds were largely consumed by legal disputes.</span></div>
        </div>
      </div>
    </div>

    <!-- 1960s-2020s: Ongoing -->
    <div class="timeline-entry">
      <div class="timeline-year">1960s+</div>
      <div class="timeline-dot partial"></div>
      <div class="timeline-card partial">
        <div class="entry-header">
          <span class="entry-name">i.t.a., Cut Spelling, Various Proposals</span>
          <span class="entry-outcome partial">Limited/No Adoption</span>
        </div>
        <div class="entry-desc">
          The Initial Teaching Alphabet (i.t.a., 1960s) was used in some British schools as a transitional tool but abandoned.
          "Cut Spelling" and other incremental approaches proposed removing silent letters but gained no traction.
          Digital-age informal simplifications (<em>thru</em>, <em>nite</em>, <em>lite</em>) spread in casual use but remain non-standard.
        </div>
      </div>
    </div>
  </div>

  <!-- Why reform fails -->
  <div class="reasons-box">
    <div class="reasons-title">Why Reform Always Fails: Five Structural Obstacles</div>
    <div class="reasons-grid">
      <div class="reason-item">
        <span class="reason-number">1.</span>
        <span><strong>Dialect problem</strong> -- whose pronunciation becomes the standard? British RP? General American? A phonetic spelling for one is opaque for the other.</span>
      </div>
      <div class="reason-item">
        <span class="reason-number">2.</span>
        <span><strong>Morphophonemic loss</strong> -- phonetic spelling would sever <em>sign/signal</em>, <em>nation/national</em>, destroying the hidden logic that skilled readers rely on.</span>
      </div>
      <div class="reason-item">
        <span class="reason-number">3.</span>
        <span><strong>Transition cost</strong> -- a generation must learn two systems. All existing texts become legacy artifacts requiring "translation."</span>
      </div>
      <div class="reason-item">
        <span class="reason-number">4.</span>
        <span><strong>Social symbolism</strong> -- correct spelling marks education and class. Reform is perceived as "dumbing down."</span>
      </div>
      <div class="reason-item">
        <span class="reason-number">5.</span>
        <span><strong>Coordination problem</strong> -- English is a global language with billions of users. No authority can mandate change for all of them.</span>
      </div>
    </div>
  </div>

  <figcaption>
    <h2>Spelling Reform: 250 Years of Recurring Failure</h2>
    <p>The pattern is striking: every generation produces brilliant reformers backed by money, political power, or both. Every generation fails. The one partial success (Webster) worked because it was incremental and patriotic. The system resists change not through irrationality but through deep structural, social, and linguistic forces.</p>
  </figcaption>
</figure>
</body>
</html>
