<!-- Diagram: Burden Taxonomy — Personal / Legacy / Unattached -->
<!-- Type: flowchart (three-pillar comparative) -->
<!-- Generated: 2026-04-29 -->
<!-- Description: Comparative breakdown of three burden types in IFS, what each claims about origin, and what evidence supports each -->

<figure class="concept-diagram" id="diagram-burden-taxonomy">
  <div class="diagram-container">
    <pre class="mermaid">
flowchart TB
    classDef personal fill:#dbeafe,stroke:#2563eb,color:#1e3a5f,stroke-width:2px
    classDef legacy fill:#fef3c7,stroke:#d97706,color:#7c2d12,stroke-width:2px
    classDef unattached fill:#fce7f3,stroke:#be185d,color:#831843,stroke-width:2px
    classDef status fill:#f3f4f6,stroke:#6b7280,color:#1f2937

    Title["IFS BURDEN TAXONOMY<br/>(three categories used in practice)"]

    Title --> P[PERSONAL<br/>BURDENS]:::personal
    Title --> L[LEGACY<br/>BURDENS]:::legacy
    Title --> U[UNATTACHED<br/>BURDENS]:::unattached

    P --> P1["Origin:<br/>client's own history"]:::personal
    P --> P2["Mechanism:<br/>trauma absorption<br/>(part takes on belief/feeling<br/>during overwhelm)"]:::personal
    P --> P3["Evidence:<br/>broad clinical trauma literature<br/>(IFS RCT/pilot work; trauma<br/>theory generally)"]:::personal
    P --> P4["Status:<br/>uncontroversial therapeutic<br/>concept"]:::status

    L --> L1["Origin:<br/>family / ancestors / culture"]:::legacy
    L --> L2["Mechanism:<br/>(a) social transmission<br/>(b) internalized cultural messages<br/>(c) possibly epigenetic"]:::legacy
    L --> L3["Evidence:<br/>strong for (a) and (b);<br/>(c) constrained — Yehuda 2018<br/>says 'not possible to attribute'"]:::legacy
    L --> L4["Status:<br/>useful clinical metaphor;<br/>pseudoscientific if framed<br/>as literal biological transmission"]:::status

    U --> U1["Origin:<br/>transpersonal / discarnate<br/>/ external"]:::unattached
    U --> U2["Mechanism (Falconer):<br/>'porous mind' + trauma<br/>vulnerability allows entry"]:::unattached
    U --> U3["Evidence:<br/>none in peer-reviewed<br/>clinical literature;<br/>cross-cultural anthropology<br/>cited as warrant"]:::unattached
    U --> U4["Status:<br/>explicitly transpersonal claim;<br/>mainstream clinical psychology<br/>has not engaged"]:::status
    </pre>
  </div>
  <figcaption>
    <strong>Figure 2:</strong> Three burden categories used in current IFS practice. Personal burdens are the foundational category; legacy burdens extend the scope to family/cultural inheritance; unattached burdens are Falconer's transpersonal expansion. Each makes different ontological claims and rests on different (or absent) evidence bases.
  </figcaption>
</figure>
