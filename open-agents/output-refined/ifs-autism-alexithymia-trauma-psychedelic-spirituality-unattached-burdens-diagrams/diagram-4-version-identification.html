<!-- Diagram: Identifying Which Version of IFS — Decision Flowchart -->
<!-- Type: flowchart -->
<!-- Generated: 2026-04-29 -->
<!-- Description: Practical schema for the reader to apply to any IFS practitioner, book, or training -->

<figure class="concept-diagram" id="diagram-version-flowchart">
  <div class="diagram-container">
    <pre class="mermaid">
flowchart TD
    classDef start fill:#f3f4f6,stroke:#6b7280,color:#1f2937,stroke-width:2px
    classDef question fill:#fef3c7,stroke:#d97706,color:#7c2d12,stroke-width:2px
    classDef clinical fill:#dbeafe,stroke:#2563eb,color:#1e3a5f,stroke-width:2px
    classDef contemplative fill:#fde68a,stroke:#b45309,color:#78350f,stroke-width:2px
    classDef transpersonal fill:#fce7f3,stroke:#be185d,color:#831843,stroke-width:2px

    Start[/"Encountering an IFS<br/>practitioner, book, or training"/]:::start

    Start --> Q1{"Q1: IFS-Trained / IFS-Certified<br/>through the Institute?"}:::question
    Q1 -- "Yes" --> Q1A["Floor of clinical competence;<br/>positioning still varies — ask further"]
    Q1 -- "No / Sounds True only" --> Q1B["No clinical certification;<br/>likely contemplative or transpersonal"]
    Q1A --> Q2
    Q1B --> Q2

    Q2{"Q2: Do they cite<br/>Others Within Us, Spirituality of IFS,<br/>or shamanic frames?"}:::question
    Q2 -- "Heavily" --> T1[Likely TRANSPERSONAL]:::transpersonal
    Q2 -- "Some, but not central" --> Q3
    Q2 -- "Not at all" --> Q3

    Q3{"Q3: Do they invoke<br/>'unattached burdens', spirit guides,<br/>past lives in their work?"}:::question
    Q3 -- "Routinely" --> T2[TRANSPERSONAL]:::transpersonal
    Q3 -- "Sometimes" --> Q4
    Q3 -- "No" --> Q4

    Q4{"Q4: How do they describe Self?"}:::question
    Q4 -- "8 Cs + therapeutic markers" --> C1[CLINICAL-MODALITY]:::clinical
    Q4 -- "8 Cs + 'cross-tradition resonance'" --> C2[CONTEMPLATIVE-PRACTICE]:::contemplative
    Q4 -- "Divine consciousness / non-dual" --> T3[TRANSPERSONAL]:::transpersonal

    C1 --> Q5
    C2 --> Q5
    Q5{"Q5: Venue?"}:::question
    Q5 -- "Licensed clinical setting,<br/>CE credit eligible" --> Conf1["Confirms clinical/contemplative<br/>positioning"]:::clinical
    Q5 -- "Retreat center, mixed<br/>clinical/spiritual audience" --> Conf2["Likely contemplative<br/>or transpersonal"]:::contemplative

    T1 --> Q6
    T2 --> Q6
    T3 --> Q6
    Q6["Confirm transpersonal positioning;<br/>decide whether this register matches<br/>your needs and risk tolerance"]:::transpersonal
    </pre>
  </div>
  <figcaption>
    <strong>Figure 4:</strong> A decision flowchart for identifying which "version" of IFS a given practitioner, text, or training is operating in. Certification (Q1) is a floor for clinical competence but does not determine register. Texts cited (Q2), categories invoked (Q3), Self framing (Q4), and venue (Q5) collectively place a practitioner on the spectrum. None of the three positions is the wrong choice in itself — the goal is informed selection rather than drift.
  </figcaption>
</figure>
