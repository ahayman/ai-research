<figure class="concept-diagram" id="diagram-3">
  <div class="diagram-container">
    <pre class="mermaid">
flowchart TD
    subgraph PHASE1["📱 Phase 1: Capture"]
        A["Scan the tree with<br/>your phone camera"]
        A --> B["Export scan as<br/>OBJ or STL file"]
    end

    subgraph PHASE2["💻 Phase 2: Import"]
        C["Enable ScanTo3D add-in<br/>(Tools → Add-Ins)"]
        C --> D["Import mesh file<br/>(File → Open)"]
        D --> E["Clean up mesh<br/>(Mesh Prep Wizard)"]
        E --> F["Orient tree vertically<br/>& remove artifacts"]
    end

    subgraph PHASE3["📐 Phase 3: Prepare Profiles"]
        G["Download lumber profiles<br/>from GrabCAD"]
        G --> H["Or create custom profiles<br/>(Sketch → Save as .sldlfp)"]
        H --> I["Set up profile folder<br/>(Tools → Options → File Locations)"]
    end

    subgraph PHASE4["🏗️ Phase 4: Design the Fort"]
        J["Create 3D sketch<br/>for post positions"]
        J --> K["Apply 4x4/6x6 profiles<br/>to vertical posts"]
        K --> L["Sketch platform beams<br/>around the tree"]
        L --> M["Apply 2x8/2x10 profiles<br/>to beams & joists"]
        M --> N["Add railings, walls,<br/>ladder, roof framing"]
        N --> O["Trim joints &<br/>add connection details"]
    end

    subgraph PHASE5["📋 Phase 5: Generate BOM"]
        P["Update Cut List<br/>(auto-generated)"]
        P --> Q["Create Drawing<br/>(File → New → Drawing)"]
        Q --> R["Insert Weldment<br/>Cut List Table"]
        R --> S["Export to Excel<br/>(right-click → Save As)"]
    end

    subgraph PHASE6["🪵 Phase 6: Build"]
        T["Take BOM to<br/>lumber yard"]
        T --> U["Cut lumber per<br/>the cut list lengths"]
        U --> V["Assemble your<br/>tree fort! 🏡"]
    end

    PHASE1 --> PHASE2
    PHASE2 --> PHASE3
    PHASE3 --> PHASE4
    PHASE4 --> PHASE5
    PHASE5 --> PHASE6

    style PHASE5 fill:#f3e8ff,stroke:#7c3aed,color:#1e3a5f
    style PHASE6 fill:#fef3c7,stroke:#d97706,color:#1e3a5f
    </pre>
  </div>
