<!-- Diagram: 3DEXPERIENCE Dashboard Navigation Map -->
<!-- Type: svg-custom -->
<!-- Generated: 2026-03-02 -->
<!-- Description: Visual guide to the 3DEXPERIENCE dashboard showing which apps to use and which to ignore for a Makers tree fort project -->

<figure class="concept-diagram" id="diagram-2">
  <svg viewBox="0 0 900 700" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title-2 desc-2">
    <title id="title-2">3DEXPERIENCE Dashboard Navigation Map for Makers</title>
    <desc id="desc-2">An annotated diagram of the 3DEXPERIENCE dashboard showing the Compass navigation, key apps for the tree fort project, and apps that can be safely ignored.</desc>

    <defs>
      <style>
        .title-text { font-family: system-ui, -apple-system, sans-serif; font-size: 20px; font-weight: bold; fill: #1e3a5f; }
        .section-title { font-family: system-ui; font-size: 14px; font-weight: 600; fill: #1e3a5f; }
        .app-label { font-family: system-ui; font-size: 11px; fill: #1e3a5f; }
        .app-desc { font-family: system-ui; font-size: 9px; fill: #64748b; }
        .compass-label { font-family: system-ui; font-size: 10px; font-weight: 600; fill: #fff; }
        .ignore-text { font-family: system-ui; font-size: 10px; fill: #9ca3af; font-style: italic; }
        .use-box { fill: #dcfce7; stroke: #059669; stroke-width: 2; rx: 6; }
        .essential-box { fill: #fef3c7; stroke: #d97706; stroke-width: 2; rx: 6; }
        .ignore-box { fill: #f3f4f6; stroke: #d1d5db; stroke-width: 1; rx: 6; stroke-dasharray: 4,4; }
        .star { fill: #d97706; }
      </style>
    </defs>

    <!-- Background -->
    <rect width="900" height="700" fill="#fafbfc" rx="12"/>

    <!-- Title -->
    <text x="450" y="35" text-anchor="middle" class="title-text">3DEXPERIENCE Dashboard: What You Actually Need</text>
    <text x="450" y="55" text-anchor="middle" class="app-desc" style="font-size:12px">The Compass icon (top-left) is your Start button. Here's what matters for your tree fort project.</text>

    <!-- Compass Circle (center-top) -->
    <g transform="translate(450, 145)">
      <circle cx="0" cy="0" r="70" fill="#1e3a5f" stroke="#0f2744" stroke-width="2"/>
      <circle cx="0" cy="0" r="25" fill="#2d5a8e" stroke="#1e3a5f" stroke-width="1"/>

      <!-- Quadrant Colors -->
      <path d="M0,-70 A70,70 0 0,1 70,0 L25,0 A25,25 0 0,0 0,-25 Z" fill="#f97316" opacity="0.8"/>
      <path d="M70,0 A70,70 0 0,1 0,70 L0,25 A25,25 0 0,0 25,0 Z" fill="#3b82f6" opacity="0.8"/>
      <path d="M0,70 A70,70 0 0,1 -70,0 L-25,0 A25,25 0 0,0 0,25 Z" fill="#8b5cf6" opacity="0.8"/>
      <path d="M-70,0 A70,70 0 0,1 0,-70 L0,-25 A25,25 0 0,0 -25,0 Z" fill="#22c55e" opacity="0.8"/>

      <!-- Quadrant Labels -->
      <text x="0" y="-45" text-anchor="middle" class="compass-label">Social</text>
      <text x="45" y="5" text-anchor="middle" class="compass-label">Info</text>
      <text x="0" y="50" text-anchor="middle" class="compass-label">Sim</text>
      <text x="-42" y="5" text-anchor="middle" class="compass-label">3D</text>

      <!-- Center text -->
      <text x="0" y="4" text-anchor="middle" style="font-family:system-ui;font-size:8px;fill:#fff;font-weight:bold">COMPASS</text>
    </g>

    <!-- Legend -->
    <g transform="translate(30, 80)">
      <rect x="0" y="0" width="14" height="14" class="essential-box"/>
      <text x="20" y="12" class="app-label" style="font-weight:600">Essential for tree fort</text>
      <rect x="0" y="22" width="14" height="14" class="use-box"/>
      <text x="20" y="34" class="app-label">Useful / nice to have</text>
      <rect x="0" y="44" width="14" height="14" class="ignore-box"/>
      <text x="20" y="56" class="ignore-text" style="font-style:normal">Safe to ignore</text>
    </g>

    <!-- ESSENTIAL APPS (left column) -->
    <g transform="translate(30, 270)">
      <text x="0" y="0" class="section-title" style="font-size:15px;fill:#d97706">★ Essential Apps</text>

      <!-- SOLIDWORKS Connected -->
      <rect x="0" y="15" width="250" height="55" class="essential-box"/>
      <text x="12" y="35" class="app-label" style="font-weight:bold">SOLIDWORKS Connected</text>
      <text x="12" y="48" class="app-desc">Full desktop CAD — your main design tool</text>
      <text x="12" y="59" class="app-desc">Design the fort, create weldments, generate BOM</text>

      <!-- ScanTo3D -->
      <rect x="0" y="80" width="250" height="55" class="essential-box"/>
      <text x="12" y="100" class="app-label" style="font-weight:bold">ScanTo3D (Add-in)</text>
      <text x="12" y="113" class="app-desc">Import your phone scan of the tree</text>
      <text x="12" y="124" class="app-desc">Tools > Add-Ins > ScanTo3D to enable</text>

      <!-- 3DDrive -->
      <rect x="0" y="145" width="250" height="45" class="essential-box"/>
      <text x="12" y="165" class="app-label" style="font-weight:bold">3DDrive</text>
      <text x="12" y="178" class="app-desc">Cloud storage for your files (25 GB included)</text>
    </g>

    <!-- USEFUL APPS (center column) -->
    <g transform="translate(320, 270)">
      <text x="0" y="0" class="section-title" style="font-size:15px;fill:#059669">Useful Apps</text>

      <rect x="0" y="15" width="250" height="45" class="use-box"/>
      <text x="12" y="35" class="app-label" style="font-weight:bold">xDesign (3D Creator)</text>
      <text x="12" y="48" class="app-desc">Browser-based modeling — quick edits on any device</text>

      <rect x="0" y="70" width="250" height="45" class="use-box"/>
      <text x="12" y="90" class="app-label" style="font-weight:bold">3D Structure Creator</text>
      <text x="12" y="103" class="app-desc">Frame design in browser — structural members</text>

      <rect x="0" y="125" width="250" height="45" class="use-box"/>
      <text x="12" y="145" class="app-label" style="font-weight:bold">3DPlay</text>
      <text x="12" y="158" class="app-desc">View your 3D models on phone/tablet</text>

      <rect x="0" y="180" width="250" height="45" class="use-box"/>
      <text x="12" y="200" class="app-label" style="font-weight:bold">SOLIDWORKS Visualize</text>
      <text x="12" y="213" class="app-desc">Photorealistic renderings of your fort design</text>
    </g>

    <!-- IGNORE APPS (right column) -->
    <g transform="translate(610, 270)">
      <text x="0" y="0" class="section-title" style="font-size:15px;fill:#9ca3af">Safe to Ignore</text>

      <rect x="0" y="15" width="260" height="35" class="ignore-box"/>
      <text x="12" y="37" class="ignore-text">3D Sculptor / xShape — organic sculpting</text>

      <rect x="0" y="58" width="260" height="35" class="ignore-box"/>
      <text x="12" y="80" class="ignore-text">Simulation apps — stress analysis (overkill)</text>

      <rect x="0" y="101" width="260" height="35" class="ignore-box"/>
      <text x="12" y="123" class="ignore-text">NC Shop Floor — CNC machining</text>

      <rect x="0" y="144" width="260" height="35" class="ignore-box"/>
      <text x="12" y="166" class="ignore-text">ENOVIA — enterprise product lifecycle</text>

      <rect x="0" y="187" width="260" height="35" class="ignore-box"/>
      <text x="12" y="209" class="ignore-text">DELMIA — manufacturing execution</text>

      <rect x="0" y="230" width="260" height="35" class="ignore-box"/>
      <text x="12" y="252" class="ignore-text">Project Management — team collaboration</text>

      <rect x="0" y="273" width="260" height="35" class="ignore-box"/>
      <text x="12" y="295" class="ignore-text">3DSwym (communities) — optional support</text>
    </g>

    <!-- Bottom tip -->
    <g transform="translate(30, 600)">
      <rect x="0" y="0" width="840" height="65" fill="#eff6ff" stroke="#3b82f6" stroke-width="1" rx="8"/>
      <text x="20" y="22" class="app-label" style="font-weight:bold;font-size:13px;fill:#1e3a5f">💡 Pro Tip: Finding Apps in the Dashboard</text>
      <text x="20" y="40" class="app-desc" style="font-size:11px">Click the Compass (top-left) → look in the West/Purple quadrant for 3D Modeling apps.</text>
      <text x="20" y="55" class="app-desc" style="font-size:11px">Or use the Search bar at the top to type the app name directly. Your assigned Roles determine which apps are active.</text>
    </g>
  </svg>
  <figcaption>
    <strong>Figure 2:</strong> A visual map of the 3DEXPERIENCE dashboard. Out of dozens of available apps, only 3-4 are essential for the tree fort project. The Compass (top-left icon) groups apps into four quadrants by function.
  </figcaption>
</figure>
