<figure class="concept-diagram" id="diagram-5">
  <svg viewBox="0 0 900 650" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title-5 desc-5">
    <title id="title-5">Tree Fort Assembly Breakdown</title>
    <desc id="desc-5">An exploded assembly diagram showing the six layers of a tree fort design: foundation/posts, platform frame, decking, walls/railings, roof structure, and access ladder. Each layer lists the recommended lumber sizes.</desc>

    <defs>
      <style>
        .title { font-family: system-ui, -apple-system, sans-serif; font-size: 20px; font-weight: bold; fill: #1e3a5f; }
        .layer-title { font-family: system-ui; font-size: 13px; font-weight: 700; fill: #fff; }
        .layer-detail { font-family: system-ui; font-size: 10px; fill: #1e3a5f; }
        .lumber-spec { font-family: monospace; font-size: 10px; fill: #059669; font-weight: 600; }
        .note-text { font-family: system-ui; font-size: 10px; fill: #64748b; }
        .connector { stroke: #94a3b8; stroke-width: 1; stroke-dasharray: 3,3; fill: none; }
      </style>
    </defs>

    <rect width="900" height="650" fill="#fafbfc" rx="12"/>
    <text x="450" y="35" text-anchor="middle" class="title">Tree Fort: Assembly Layer Breakdown</text>

    <!-- Layer 6: Roof (top) -->
    <g transform="translate(180, 55)">
      <!-- Roof shape (triangular profile) -->
      <polygon points="200,5 60,50 340,50" fill="#fed7aa" stroke="#c2410c" stroke-width="2"/>
      <polygon points="60,50 340,50 320,65 80,65" fill="#fdba74" stroke="#c2410c" stroke-width="1.5"/>
      <!-- Rafter lines -->
      <line x1="130" y1="27" x2="90" y2="50" stroke="#c2410c" stroke-width="1" opacity="0.5"/>
      <line x1="200" y1="5" x2="200" y2="50" stroke="#c2410c" stroke-width="1" opacity="0.5"/>
      <line x1="270" y1="27" x2="310" y2="50" stroke="#c2410c" stroke-width="1" opacity="0.5"/>
    </g>
    <!-- Roof label -->
    <rect x="570" y="55" width="290" height="55" fill="#c2410c" rx="6"/>
    <text x="585" y="73" class="layer-title">Layer 6: Roof Structure (Optional)</text>
    <text x="585" y="88" style="font-family:monospace;font-size:10px;fill:#fed7aa">2×4 or 2×6 rafters</text>
    <text x="585" y="100" style="font-family:monospace;font-size:10px;fill:#fed7aa">2×6 ridge beam • 1×4 purlins</text>
    <line x1="520" y1="80" x2="570" y2="80" class="connector" stroke="#c2410c" stroke-dasharray="none" stroke-width="1"/>

    <!-- Layer 5: Walls/Railings -->
    <g transform="translate(180, 130)">
      <rect x="60" y="0" width="280" height="70" fill="#bfdbfe" stroke="#2563eb" stroke-width="2" rx="3"/>
      <!-- Post lines -->
      <line x1="80" y1="0" x2="80" y2="70" stroke="#2563eb" stroke-width="3"/>
      <line x1="200" y1="0" x2="200" y2="70" stroke="#2563eb" stroke-width="3"/>
      <line x1="320" y1="0" x2="320" y2="70" stroke="#2563eb" stroke-width="3"/>
      <!-- Rail lines -->
      <line x1="80" y1="20" x2="320" y2="20" stroke="#2563eb" stroke-width="2"/>
      <line x1="80" y1="50" x2="320" y2="50" stroke="#2563eb" stroke-width="2"/>
      <!-- Balusters -->
      <line x1="120" y1="20" x2="120" y2="50" stroke="#2563eb" stroke-width="1"/>
      <line x1="160" y1="20" x2="160" y2="50" stroke="#2563eb" stroke-width="1"/>
      <line x1="240" y1="20" x2="240" y2="50" stroke="#2563eb" stroke-width="1"/>
      <line x1="280" y1="20" x2="280" y2="50" stroke="#2563eb" stroke-width="1"/>
    </g>
    <rect x="570" y="130" width="290" height="55" fill="#2563eb" rx="6"/>
    <text x="585" y="148" class="layer-title">Layer 5: Railings &amp; Walls</text>
    <text x="585" y="163" style="font-family:monospace;font-size:10px;fill:#bfdbfe">4×4 corner posts (36-42" tall)</text>
    <text x="585" y="175" style="font-family:monospace;font-size:10px;fill:#bfdbfe">2×4 rails + 2×2 balusters</text>
    <line x1="520" y1="162" x2="570" y2="162" class="connector" stroke="#2563eb" stroke-dasharray="none" stroke-width="1"/>

    <!-- Layer 4: Decking -->
    <g transform="translate(180, 215)">
      <rect x="55" y="0" width="290" height="30" fill="#bbf7d0" stroke="#16a34a" stroke-width="2" rx="2"/>
      <!-- Board lines -->
      <line x1="90" y1="0" x2="90" y2="30" stroke="#16a34a" stroke-width="0.5" opacity="0.5"/>
      <line x1="120" y1="0" x2="120" y2="30" stroke="#16a34a" stroke-width="0.5" opacity="0.5"/>
      <line x1="150" y1="0" x2="150" y2="30" stroke="#16a34a" stroke-width="0.5" opacity="0.5"/>
      <line x1="180" y1="0" x2="180" y2="30" stroke="#16a34a" stroke-width="0.5" opacity="0.5"/>
      <line x1="210" y1="0" x2="210" y2="30" stroke="#16a34a" stroke-width="0.5" opacity="0.5"/>
      <line x1="240" y1="0" x2="240" y2="30" stroke="#16a34a" stroke-width="0.5" opacity="0.5"/>
      <line x1="270" y1="0" x2="270" y2="30" stroke="#16a34a" stroke-width="0.5" opacity="0.5"/>
      <line x1="300" y1="0" x2="300" y2="30" stroke="#16a34a" stroke-width="0.5" opacity="0.5"/>
    </g>
    <rect x="570" y="210" width="290" height="45" fill="#16a34a" rx="6"/>
    <text x="585" y="228" class="layer-title">Layer 4: Decking / Floor Surface</text>
    <text x="585" y="243" style="font-family:monospace;font-size:10px;fill:#bbf7d0">5/4×6 or 2×6 deck boards</text>
    <line x1="520" y1="230" x2="570" y2="230" class="connector" stroke="#16a34a" stroke-dasharray="none" stroke-width="1"/>

    <!-- Layer 3: Platform Frame -->
    <g transform="translate(180, 260)">
      <rect x="50" y="0" width="300" height="55" fill="#fef3c7" stroke="#d97706" stroke-width="2" rx="3"/>
      <!-- Perimeter beams -->
      <rect x="55" y="5" width="290" height="8" fill="#fbbf24" stroke="#d97706" stroke-width="1"/>
      <rect x="55" y="42" width="290" height="8" fill="#fbbf24" stroke="#d97706" stroke-width="1"/>
      <!-- Joists -->
      <rect x="100" y="13" width="6" height="29" fill="#fcd34d" stroke="#d97706" stroke-width="0.5"/>
      <rect x="150" y="13" width="6" height="29" fill="#fcd34d" stroke="#d97706" stroke-width="0.5"/>
      <rect x="200" y="13" width="6" height="29" fill="#fcd34d" stroke="#d97706" stroke-width="0.5"/>
      <rect x="250" y="13" width="6" height="29" fill="#fcd34d" stroke="#d97706" stroke-width="0.5"/>
      <rect x="300" y="13" width="6" height="29" fill="#fcd34d" stroke="#d97706" stroke-width="0.5"/>
      <!-- Tree hole indication -->
      <ellipse cx="190" cy="27" rx="20" ry="12" fill="#fafbfc" stroke="#d97706" stroke-width="1" stroke-dasharray="3,2"/>
      <text x="190" y="30" text-anchor="middle" style="font-family:system-ui;font-size:7px;fill:#d97706">tree</text>
    </g>
    <rect x="570" y="265" width="290" height="55" fill="#d97706" rx="6"/>
    <text x="585" y="283" class="layer-title">Layer 3: Platform Frame</text>
    <text x="585" y="298" style="font-family:monospace;font-size:10px;fill:#fef3c7">2×8 or 2×10 perimeter beams</text>
    <text x="585" y="310" style="font-family:monospace;font-size:10px;fill:#fef3c7">2×6 or 2×8 floor joists (16" OC)</text>
    <line x1="520" y1="290" x2="570" y2="290" class="connector" stroke="#d97706" stroke-dasharray="none" stroke-width="1"/>

    <!-- Layer 2: Support Posts -->
    <g transform="translate(180, 330)">
      <!-- Posts -->
      <rect x="65" y="0" width="18" height="100" fill="#c4b5fd" stroke="#7c3aed" stroke-width="2"/>
      <rect x="165" y="0" width="18" height="100" fill="#c4b5fd" stroke="#7c3aed" stroke-width="2"/>
      <rect x="315" y="0" width="18" height="100" fill="#c4b5fd" stroke="#7c3aed" stroke-width="2"/>
      <!-- Diagonal braces -->
      <line x1="83" y1="10" x2="140" y2="60" stroke="#7c3aed" stroke-width="2"/>
      <line x1="165" y1="10" x2="110" y2="60" stroke="#7c3aed" stroke-width="2"/>
      <line x1="183" y1="10" x2="240" y2="60" stroke="#7c3aed" stroke-width="2"/>
      <line x1="315" y1="10" x2="260" y2="60" stroke="#7c3aed" stroke-width="2"/>
    </g>
    <rect x="570" y="340" width="290" height="55" fill="#7c3aed" rx="6"/>
    <text x="585" y="358" class="layer-title">Layer 2: Support Posts &amp; Bracing</text>
    <text x="585" y="373" style="font-family:monospace;font-size:10px;fill:#c4b5fd">4×4 or 6×6 vertical posts</text>
    <text x="585" y="385" style="font-family:monospace;font-size:10px;fill:#c4b5fd">2×6 diagonal braces at 45°</text>
    <line x1="520" y1="370" x2="570" y2="370" class="connector" stroke="#7c3aed" stroke-dasharray="none" stroke-width="1"/>

    <!-- Layer 1: Tree + Foundation -->
    <g transform="translate(180, 435)">
      <!-- Ground line -->
      <line x1="30" y1="80" x2="370" y2="80" stroke="#16a34a" stroke-width="3"/>
      <!-- Tree trunk -->
      <rect x="175" y="0" width="45" height="80" fill="#a3e635" stroke="#65a30d" stroke-width="2" rx="5"/>
      <text x="197" y="45" text-anchor="middle" style="font-family:system-ui;font-size:9px;fill:#365314;font-weight:bold">TREE</text>
      <!-- Ground texture -->
      <rect x="30" y="80" width="340" height="15" fill="#dcfce7" stroke="none"/>
      <!-- Footings -->
      <rect x="55" y="75" width="30" height="20" fill="#d6d3d1" stroke="#78716c" stroke-width="1"/>
      <rect x="155" y="75" width="30" height="20" fill="#d6d3d1" stroke="#78716c" stroke-width="1"/>
      <rect x="310" y="75" width="30" height="20" fill="#d6d3d1" stroke="#78716c" stroke-width="1"/>
    </g>
    <rect x="570" y="445" width="290" height="55" fill="#65a30d" rx="6"/>
    <text x="585" y="463" class="layer-title">Layer 1: Tree &amp; Foundation</text>
    <text x="585" y="478" style="font-family:monospace;font-size:10px;fill:#dcfce7">Concrete footings or post anchors</text>
    <text x="585" y="490" style="font-family:monospace;font-size:10px;fill:#dcfce7">2-4" clearance around tree trunk</text>
    <line x1="520" y1="470" x2="570" y2="470" class="connector" stroke="#65a30d" stroke-dasharray="none" stroke-width="1"/>

    <!-- Access Ladder (side) -->
    <g transform="translate(30, 300)">
      <rect x="0" y="0" width="120" height="200" fill="#fef2f2" stroke="#dc2626" stroke-width="1" rx="6" stroke-dasharray="4,4"/>
      <text x="60" y="20" text-anchor="middle" style="font-family:system-ui;font-size:11px;fill:#dc2626;font-weight:700">Access</text>
      <!-- Ladder -->
      <line x1="30" y1="35" x2="30" y2="180" stroke="#8b6b47" stroke-width="3"/>
      <line x1="90" y1="35" x2="90" y2="180" stroke="#8b6b47" stroke-width="3"/>
      <line x1="30" y1="55" x2="90" y2="55" stroke="#8b6b47" stroke-width="2"/>
      <line x1="30" y1="80" x2="90" y2="80" stroke="#8b6b47" stroke-width="2"/>
      <line x1="30" y1="105" x2="90" y2="105" stroke="#8b6b47" stroke-width="2"/>
      <line x1="30" y1="130" x2="90" y2="130" stroke="#8b6b47" stroke-width="2"/>
      <line x1="30" y1="155" x2="90" y2="155" stroke="#8b6b47" stroke-width="2"/>
      <text x="60" y="195" text-anchor="middle" style="font-family:monospace;font-size:8px;fill:#dc2626">2×4 stringers</text>
    </g>

    <!-- Bottom note -->
    <g transform="translate(30, 560)">
      <rect x="0" y="0" width="840" height="70" fill="#eff6ff" stroke="#3b82f6" stroke-width="1" rx="8"/>
      <text x="20" y="20" style="font-family:system-ui;font-size:13px;fill:#1e3a5f;font-weight:bold">Design Tip: Leave Room for the Tree</text>
      <text x="20" y="38" style="font-family:system-ui;font-size:11px;fill:#4b5563">Leave 2-4 inches of clearance around the tree trunk in the platform opening. Trees grow and sway in the wind.</text>
      <text x="20" y="55" style="font-family:system-ui;font-size:11px;fill:#4b5563">Consider a "floating" platform that uses sliding brackets instead of rigid bolts — this lets the tree move without stressing the structure.</text>
    </g>
  </svg>
  <figcaption>
    <strong>Figure 5:</strong> Exploded assembly view of a tree fort showing six structural layers, from foundation to roof. Each layer lists the recommended lumber sizes for that component.
  </figcaption>
</figure>
