<!-- Diagram: Weldments Concept - How Sketch Lines Become Lumber -->
<!-- Type: svg-custom -->
<!-- Generated: 2026-03-02 -->
<!-- Description: Shows how 3D sketch lines are transformed into structural lumber members using weldment profiles -->

<figure class="concept-diagram" id="diagram-4">
  <svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title-4 desc-4">
    <title id="title-4">How Weldments Turn Sketch Lines into Lumber</title>
    <desc id="desc-4">A three-stage diagram showing: 1) A 3D wireframe sketch of lines, 2) A lumber profile cross-section being applied, 3) The resulting 3D structural members with trim operations at joints.</desc>

    <defs>
      <style>
        .title { font-family: system-ui, -apple-system, sans-serif; font-size: 18px; font-weight: bold; fill: #1e3a5f; }
        .stage-title { font-family: system-ui; font-size: 14px; font-weight: 700; fill: #1e3a5f; }
        .label { font-family: system-ui; font-size: 11px; fill: #4b5563; }
        .label-bold { font-family: system-ui; font-size: 11px; fill: #1e3a5f; font-weight: 600; }
        .dim-text { font-family: system-ui; font-size: 9px; fill: #059669; font-weight: 600; }
        .sketch-line { stroke: #3b82f6; stroke-width: 2; stroke-dasharray: 8,4; fill: none; }
        .lumber { fill: #d4a574; stroke: #8b6b47; stroke-width: 1.5; }
        .lumber-end { fill: #c49a6c; stroke: #8b6b47; stroke-width: 1.5; }
        .lumber-top { fill: #e8c9a0; stroke: #8b6b47; stroke-width: 1.5; }
        .profile-outline { fill: none; stroke: #059669; stroke-width: 2; }
        .profile-fill { fill: #dcfce7; stroke: #059669; stroke-width: 2; }
        .arrow-big { fill: #64748b; }
        .step-bg { fill: #f8fafc; stroke: #e2e8f0; stroke-width: 1; rx: 10; }
      </style>
    </defs>

    <!-- Background -->
    <rect width="900" height="500" fill="#fafbfc" rx="12"/>

    <!-- Title -->
    <text x="450" y="35" text-anchor="middle" class="title">How Weldments Turn Sketch Lines into Lumber</text>

    <!-- STEP 1: 3D Wireframe Sketch -->
    <rect x="15" y="55" width="255" height="310" class="step-bg"/>
    <text x="142" y="80" text-anchor="middle" class="stage-title">Step 1: 3D Sketch</text>
    <text x="142" y="95" text-anchor="middle" class="label">Draw centerlines where lumber goes</text>

    <!-- Simple wireframe of a frame structure -->
    <g transform="translate(55, 110)">
      <!-- Vertical posts -->
      <line x1="20" y1="20" x2="20" y2="200" class="sketch-line"/>
      <line x1="160" y1="20" x2="160" y2="200" class="sketch-line"/>
      <line x1="90" y1="40" x2="90" y2="200" class="sketch-line"/>

      <!-- Top horizontal beam -->
      <line x1="20" y1="20" x2="160" y2="20" class="sketch-line"/>

      <!-- Mid rail -->
      <line x1="20" y1="100" x2="160" y2="100" class="sketch-line"/>

      <!-- Bottom rail -->
      <line x1="20" y1="200" x2="160" y2="200" class="sketch-line"/>

      <!-- Dots at vertices -->
      <circle cx="20" cy="20" r="4" fill="#3b82f6"/>
      <circle cx="160" cy="20" r="4" fill="#3b82f6"/>
      <circle cx="20" cy="100" r="4" fill="#3b82f6"/>
      <circle cx="160" cy="100" r="4" fill="#3b82f6"/>
      <circle cx="20" cy="200" r="4" fill="#3b82f6"/>
      <circle cx="160" cy="200" r="4" fill="#3b82f6"/>
      <circle cx="90" cy="40" r="4" fill="#3b82f6"/>
      <circle cx="90" cy="200" r="4" fill="#3b82f6"/>
      <circle cx="90" cy="100" r="3" fill="#3b82f6"/>

      <text x="90" y="235" text-anchor="middle" class="label">Each line = one piece of lumber</text>
    </g>

    <!-- Arrow 1→2 -->
    <g transform="translate(275, 200)">
      <polygon points="0,0 30,15 0,30" class="arrow-big"/>
      <text x="15" y="50" text-anchor="middle" class="label-bold">Apply</text>
      <text x="15" y="63" text-anchor="middle" class="label-bold">Profile</text>
    </g>

    <!-- STEP 2: Profile Applied -->
    <rect x="320" y="55" width="255" height="310" class="step-bg"/>
    <text x="447" y="80" text-anchor="middle" class="stage-title">Step 2: Apply Profiles</text>
    <text x="447" y="95" text-anchor="middle" class="label">Extrude lumber cross-sections along lines</text>

    <!-- Profile cross-section detail -->
    <g transform="translate(340, 115)">
      <!-- 2x4 profile -->
      <rect x="0" y="0" width="35" height="15" class="profile-fill"/>
      <text x="45" y="12" class="dim-text">2×4 (1.5" × 3.5")</text>

      <!-- 4x4 profile -->
      <rect x="0" y="25" width="35" height="35" class="profile-fill"/>
      <text x="45" y="47" class="dim-text">4×4 (3.5" × 3.5")</text>

      <!-- 2x8 profile -->
      <rect x="0" y="70" width="75" height="15" class="profile-fill"/>
      <text x="85" y="82" class="dim-text">2×8 (1.5" × 7.25")</text>
    </g>

    <!-- 3D lumber result (isometric-ish) -->
    <g transform="translate(350, 230)">
      <!-- Vertical 4x4 post -->
      <polygon points="10,10 30,0 50,10 50,120 30,130 10,120" class="lumber"/>
      <polygon points="10,10 30,0 50,10 30,20" class="lumber-top"/>

      <!-- Horizontal 2x4 beam -->
      <polygon points="50,10 170,10 170,25 50,25" class="lumber"/>
      <polygon points="50,10 60,5 180,5 170,10" class="lumber-top"/>
      <polygon points="170,10 180,5 180,20 170,25" class="lumber-end"/>

      <text x="90" y="100" text-anchor="middle" class="label">Profile extruded along</text>
      <text x="90" y="113" text-anchor="middle" class="label">each sketch line</text>
    </g>

    <!-- Arrow 2→3 -->
    <g transform="translate(580, 200)">
      <polygon points="0,0 30,15 0,30" class="arrow-big"/>
      <text x="15" y="50" text-anchor="middle" class="label-bold">Trim</text>
      <text x="15" y="63" text-anchor="middle" class="label-bold">Joints</text>
    </g>

    <!-- STEP 3: Trimmed/Finished -->
    <rect x="625" y="55" width="260" height="310" class="step-bg"/>
    <text x="755" y="80" text-anchor="middle" class="stage-title">Step 3: Trim & Finish</text>
    <text x="755" y="95" text-anchor="middle" class="label">Clean joints + auto-generate cut list</text>

    <!-- Finished structure with nice joints -->
    <g transform="translate(665, 110)">
      <!-- Left post (4x4) -->
      <polygon points="0,15 15,5 35,15 35,175 15,185 0,175" class="lumber"/>
      <polygon points="0,15 15,5 35,15 15,25" class="lumber-top"/>

      <!-- Right post (4x4) -->
      <polygon points="140,15 155,5 175,15 175,175 155,185 140,175" class="lumber"/>
      <polygon points="140,15 155,5 175,15 155,25" class="lumber-top"/>

      <!-- Top beam (2x8) -->
      <polygon points="0,15 175,15 175,30 0,30" class="lumber"/>
      <polygon points="0,15 10,10 185,10 175,15" class="lumber-top"/>

      <!-- Mid rail (2x4) -->
      <polygon points="35,85 140,85 140,95 35,95" class="lumber"/>
      <polygon points="35,85 40,82 145,82 140,85" class="lumber-top"/>

      <!-- Bottom beam (2x8) -->
      <polygon points="0,170 175,170 175,185 0,185" class="lumber"/>
      <polygon points="0,170 10,165 185,165 175,170" class="lumber-top"/>

      <!-- Joint indicators (green circles showing clean cuts) -->
      <circle cx="35" cy="15" r="5" fill="none" stroke="#059669" stroke-width="2"/>
      <circle cx="140" cy="15" r="5" fill="none" stroke="#059669" stroke-width="2"/>
      <circle cx="35" cy="90" r="4" fill="none" stroke="#059669" stroke-width="1.5"/>
      <circle cx="140" cy="90" r="4" fill="none" stroke="#059669" stroke-width="1.5"/>
    </g>

    <!-- Cut list preview -->
    <g transform="translate(660, 310)">
      <rect x="0" y="0" width="195" height="45" fill="#f3e8ff" stroke="#7c3aed" stroke-width="1" rx="4"/>
      <text x="10" y="15" style="font-family:monospace;font-size:9px;fill:#5b21b6;font-weight:bold">Auto-Generated Cut List:</text>
      <text x="10" y="27" style="font-family:monospace;font-size:8px;fill:#5b21b6">4×4 Posts:  2 pcs @ 5'-6"</text>
      <text x="10" y="37" style="font-family:monospace;font-size:8px;fill:#5b21b6">2×8 Beams:  2 pcs @ 6'-0"</text>
      <text x="10" y="47" style="font-family:monospace;font-size:8px;fill:#5b21b6">2×4 Rails:  1 pc  @ 4'-2"</text>
    </g>

    <!-- Bottom explanation -->
    <g transform="translate(30, 390)">
      <rect x="0" y="0" width="840" height="85" fill="#eff6ff" stroke="#3b82f6" stroke-width="1" rx="8"/>
      <text x="20" y="20" class="label-bold" style="font-size:13px">Key Insight: "Weldments" Aren't Just for Metal</text>
      <text x="20" y="38" class="label" style="font-size:11px">Despite the name, SolidWorks Weldments work with any extruded profile — including wood lumber.</text>
      <text x="20" y="54" class="label" style="font-size:11px">You sketch the centerline paths of your structural members, then apply lumber cross-section profiles (2×4, 4×4, etc.).</text>
      <text x="20" y="70" class="label" style="font-size:11px">The system automatically generates a Cut List with quantities and lengths — your shopping list for the lumber yard.</text>
    </g>
  </svg>
  <figcaption>
    <strong>Figure 4:</strong> The weldments workflow: sketch centerlines (Step 1), apply lumber cross-section profiles (Step 2), and trim joints to get a finished structure with an auto-generated cut list (Step 3).
  </figcaption>
</figure>
