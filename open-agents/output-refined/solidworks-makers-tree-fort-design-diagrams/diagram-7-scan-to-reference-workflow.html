<!-- Diagram: Scan-to-Reference Workflow -->
<!-- Type: flowchart -->
<!-- Generated: 2026-03-02 -->
<!-- Description: Shows the steps from phone scan to usable reference body in SolidWorks -->

<figure class="concept-diagram" id="diagram-7">
  <div class="diagram-container">
    <pre class="mermaid">
flowchart TD
    subgraph SCAN["📱 On Your Phone"]
        A["Open scanning app<br/>(Polycam, Scaniverse, etc.)"] --> B["Walk slowly around<br/>the tree trunk"]
        B --> C["Capture trunk + major<br/>branch crotches"]
        C --> D["Export as OBJ file<br/>(best for large scans)"]
    end

    subgraph IMPORT["💻 In SOLIDWORKS Desktop"]
        E["Enable ScanTo3D<br/>(Tools → Add-Ins)"] --> F["File → Open →<br/>filter: Mesh Files"]
        F --> G["Select your OBJ/STL<br/>scan file"]
    end

    subgraph CLEANUP["🧹 Mesh Prep Wizard"]
        H["Tools → ScanTo3D →<br/>Mesh Prep Wizard"] --> I["Realign: Orient tree<br/>trunk along Y-axis<br/>(vertical)"]
        I --> J["Remove Noise:<br/>Clean scanning artifacts"]
        J --> K["Delete Extraneous:<br/>Remove ground, leaves,<br/>surrounding objects"]
        K --> L["Smooth: Simplify mesh<br/>while keeping shape"]
    end

    subgraph REFERENCE["📐 Use as Design Reference"]
        M["Keep mesh as a<br/>Reference Body<br/>(do NOT convert to solid)"] --> N["Create Reference Planes<br/>at key heights:<br/>• Fort floor level<br/>• Railing level<br/>• Roof attachment"]
        N --> O["Use Slicing Tool to<br/>extract cross-sections<br/>of the trunk"]
        O --> P["Sketch your fort<br/>structure AROUND<br/>the tree mesh"]
    end

    SCAN --> IMPORT --> CLEANUP --> REFERENCE

    style A fill:#e0f2fe,stroke:#0284c7,color:#1e3a5f
