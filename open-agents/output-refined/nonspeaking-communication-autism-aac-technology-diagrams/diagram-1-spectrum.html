<!-- Diagram: The AAC Technology Spectrum -->
<!-- Type: flowchart -->
<!-- Generated: 2026-03-31 -->
<!-- Description: Horizontal spectrum illustrating the range from low-tech to high-tech AAC options, with emerging technologies. Shows that individuals may use multiple levels simultaneously (multimodal communication). -->

<figure class="concept-diagram" id="diagram-spectrum">
  <div class="diagram-container">
    <pre class="mermaid">
flowchart LR
    subgraph LOW["LOW-TECH"]
        L1["Picture cards"]
        L2["Communication boards"]
        L3["Paper-based PECS books"]
        L4["Alphabet boards"]
    end

    subgraph MID["MID-TECH"]
        M1["BIGmack single-message buttons"]
        M2["GoTalk portable devices"]
        M3["Recordable buttons"]
        M4["Simple voice-output devices"]
    end

    subgraph HIGH["HIGH-TECH"]
        H1["Proloquo2Go / iPad"]
        H2["TouchChat / iPad"]
        H3["LAMP Words for Life"]
        H4["Tobii Dynavox I-Series"]
        H5["Eye-gaze systems"]
    end

    subgraph EMERGING["EMERGING"]
        E1["Brain-computer interfaces"]
        E2["AI-powered prediction"]
        E3["Personalized synthetic voices"]
        E4["Neural speech prostheses"]
    end

    LOW --> MID --> HIGH --> EMERGING

    MULTI["Multimodal: Individuals may<br/>use multiple levels simultaneously"]
    MULTI -.-> LOW
    MULTI -.-> MID
    MULTI -.-> HIGH

    style LOW fill:#dcfce7,stroke:#16a34a,color:#14532d
    style MID fill:#e0f2fe,stroke:#0284c7,color:#1e3a5f
    style HIGH fill:#dbeafe,stroke:#2563eb,color:#1e3a5f
    style EMERGING fill:#fef3c7,stroke:#d97706,color:#78350f
    style MULTI fill:#fce7f3,stroke:#db2777,color:#831843
    </pre>
  </div>
  <figcaption>
    <strong>Figure 1:</strong> The AAC technology spectrum from low-tech picture cards through mid-tech voice-output devices to high-tech tablet apps and dedicated speech-generating devices. Complexity does not equal superiority -- the right level depends on the individual's motor profile, communication needs, and context. Most AAC users benefit from tools at multiple levels simultaneously (multimodal communication).
  </figcaption>
</figure>
