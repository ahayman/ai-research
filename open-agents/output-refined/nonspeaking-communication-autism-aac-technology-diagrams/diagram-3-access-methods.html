<!-- Diagram: AAC Access Methods Decision Tree -->
<!-- Type: flowchart -->
<!-- Generated: 2026-03-31 -->
<!-- Description: Decision tree illustrating how motor profile determines access method selection. Shows the iterative assessment process from fine motor capability through eye-gaze, switch scanning, and partner-assisted scanning. -->

<figure class="concept-diagram" id="diagram-access-methods">
  <div class="diagram-container">
    <pre class="mermaid">
flowchart TD
    START["Motor Profile Assessment<br/>(SLP evaluates motor capabilities)"] --> Q1{"Can use fine<br/>motor pointing?"}

    Q1 -->|"Yes"| TOUCH["DIRECT TOUCH<br/>Touchscreen access<br/>(iPad, tablet apps)"]
    Q1 -->|"No"| Q2{"Can control<br/>head movement?"}

    Q2 -->|"Yes"| HEAD["HEAD TRACKING<br/>Camera tracks head position<br/>to control cursor"]
    Q2 -->|"No"| Q3{"Can sustain<br/>visual fixation?"}

    Q3 -->|"Yes"| EYEGAZE["EYE-GAZE TRACKING<br/>Tobii Dynavox I-Series<br/>Infrared corneal tracking"]
    Q3 -->|"No"| Q4{"Can activate<br/>a switch?"}

    Q4 -->|"Yes"| SWITCH["SWITCH SCANNING<br/>Buttons, proximity sensors,<br/>sip-and-puff activation"]
    Q4 -->|"No"| PARTNER["PARTNER-ASSISTED SCANNING<br/>Partner verbally offers options;<br/>user signals with blink/sound"]

    TOUCH --> REASSESS
    HEAD --> REASSESS
    EYEGAZE --> REASSESS
    SWITCH --> REASSESS
    PARTNER --> REASSESS

    REASSESS["ITERATIVE REASSESSMENT<br/>Trial multiple methods<br/>Adjust as needs change<br/>Combine methods across contexts"]

    NOTE["Assessment is not one-time.<br/>Motor profiles change.<br/>Many users employ multiple<br/>access methods in different contexts."]

    REASSESS -.-> NOTE

    style START fill:#dbeafe,stroke:#2563eb,color:#1e3a5f
    style TOUCH fill:#dcfce7,stroke:#16a34a,color:#14532d
    style HEAD fill:#dcfce7,stroke:#16a34a,color:#14532d
    style EYEGAZE fill:#dcfce7,stroke:#16a34a,color:#14532d
    style SWITCH fill:#dcfce7,stroke:#16a34a,color:#14532d
    style PARTNER fill:#dcfce7,stroke:#16a34a,color:#14532d
    style REASSESS fill:#fef3c7,stroke:#d97706,color:#78350f
    style NOTE fill:#f3f4f6,stroke:#9ca3af,color:#4b5563
    style Q1 fill:#e0f2fe,stroke:#0284c7,color:#1e3a5f
    style Q2 fill:#e0f2fe,stroke:#0284c7,color:#1e3a5f
    style Q3 fill:#e0f2fe,stroke:#0284c7,color:#1e3a5f
    style Q4 fill:#e0f2fe,stroke:#0284c7,color:#1e3a5f
    </pre>
  </div>
  <figcaption>
    <strong>Figure 3:</strong> AAC access method decision tree. The selection of how a user physically interacts with their AAC device depends on their motor profile -- from direct touch (most common) through head tracking, eye-gaze, and switch scanning to partner-assisted scanning. This is an iterative process: initial assessment is followed by trials, adjustments, and ongoing reassessment as motor capabilities and needs change. Many users employ multiple access methods across different contexts.
  </figcaption>
</figure>
