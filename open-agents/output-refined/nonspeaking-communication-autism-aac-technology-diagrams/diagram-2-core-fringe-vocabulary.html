<!-- Diagram: Core vs. Fringe Vocabulary Architecture -->
<!-- Type: flowchart -->
<!-- Generated: 2026-03-31 -->
<!-- Description: Concentric diagram showing how vocabulary is organized in modern AAC systems -- approximately 200-400 core words accounting for ~80% of utterances at the center, with fringe vocabulary organized by category in the outer ring. Motor planning overlay shows consistent placement enabling motor memory. -->

<figure class="concept-diagram" id="diagram-core-fringe">
  <div class="diagram-container">
    <pre class="mermaid">
flowchart TD
    subgraph CORE["CORE VOCABULARY (~200-400 words = ~80% of utterances)"]
        direction LR
        C1["I / me / my"]
        C2["want / need / like"]
        C3["go / stop / help"]
        C4["more / not / that"]
        C5["is / do / can"]
        C6["it / you / we"]
        C7["here / there"]
        C8["big / little"]
    end

    subgraph FRINGE["FRINGE VOCABULARY (~20% of utterances, context-specific)"]
        direction LR
        subgraph F1["Food"]
            FF1["pizza, juice, crackers"]
        end
        subgraph F2["People"]
            FP1["Mom, Dad, teacher"]
        end
        subgraph F3["Places"]
            FL1["school, home, park"]
        end
        subgraph F4["Activities"]
            FA1["swim, read, play"]
        end
        subgraph F5["Feelings"]
            FE1["happy, angry, tired"]
        end
    end

    subgraph MOTOR["MOTOR PLANNING PRINCIPLE"]
        MP["Core words ALWAYS stay<br/>in the same position<br/>on the display"]
        MA["Repeated access builds<br/>motor memory, like<br/>touch-typing on QWERTY"]
    end

    CORE --> FRINGE
    CORE --> MOTOR

    style CORE fill:#dbeafe,stroke:#2563eb,color:#1e3a5f
    style FRINGE fill:#f3f4f6,stroke:#6b7280,color:#374151
    style F1 fill:#fef3c7,stroke:#d97706,color:#78350f
    style F2 fill:#fce7f3,stroke:#db2777,color:#831843
    style F3 fill:#dcfce7,stroke:#16a34a,color:#14532d
    style F4 fill:#e0f2fe,stroke:#0284c7,color:#1e3a5f
    style F5 fill:#fae8ff,stroke:#a855f7,color:#581c87
    style MOTOR fill:#fef9c3,stroke:#ca8a04,color:#713f12
    </pre>
  </div>
  <figcaption>
    <strong>Figure 2:</strong> Core vs. fringe vocabulary architecture in modern AAC systems. Approximately 200-400 high-frequency core words (I, want, go, help, more, not) account for roughly 80% of all utterances and remain in fixed positions to support motor learning. Fringe vocabulary -- context-specific nouns, names, and specialized words -- covers the remaining 20% and is organized by category. The motor planning principle is fundamental: consistent placement enables automaticity, analogous to touch-typing.
  </figcaption>
</figure>
