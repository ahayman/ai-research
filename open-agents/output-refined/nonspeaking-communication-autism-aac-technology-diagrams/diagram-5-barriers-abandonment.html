<!-- Description: Maps the factors contributing to the 30-50% AAC abandonment rate across five categories: device factors, training factors, attitudinal factors, systemic factors, and individual factors. Highlights family engagement as the strongest protective factor. -->

flowchart LR
    subgraph DEVICE["DEVICE FACTORS"]
        D1["Poor customization"]

        D3["Slow access speed"]
        D4["Poor durability"]
    end

    subgraph TRAINING["TRAINING FACTORS"]
        T1["Inadequate partner training"]
        T2["Insufficient SLP support"]
        T3["No modeling provided"]
        T4["School staff turnover"]
    end

    subgraph ATTITUDE["ATTITUDINAL FACTORS"]
        A1["'AAC inhibits speech' myth"]
        A2["Low expectations"]
        A3["Stigma around device use"]

    end

    subgraph SYSTEMIC["SYSTEMIC FACTORS"]
        SY1["Funding barriers"]

        SY3["School transition gaps"]
        SY4["Wait times for evaluation"]
    end

    subgraph INDIVIDUAL["INDIVIDUAL FACTORS"]
        I1["Motor challenges"]

        I3["Sensory sensitivities"]
        I4["Fatigue / energy cost"]
    end

    </pre>
  </div>
  <figcaption>
    <strong>Figure 5:</strong> Factors contributing to AAC abandonment, estimated at 30-50% across AAC users. Five categories of barriers feed into device underuse or abandonment: device factors (poor customization), training factors (inadequate partner training), attitudinal factors (myths about AAC inhibiting speech), systemic factors (funding barriers and transition gaps), and individual factors (motor challenges and changing needs). Family engagement is consistently identified as the strongest protective factor against abandonment.
  </figcaption>
</figure>
