<!-- Diagram: AAC Learning Trajectory -->
<!-- Type: flowchart -->
<!-- Generated: 2026-03-31 -->
<!-- Description: Stepped progression diagram showing the stages of AAC learning from assessment through to fluency and automaticity, with feedback loops for reassessment. Notes that progression is nonlinear. -->

<figure class="concept-diagram" id="diagram-learning-trajectory">
  <div class="diagram-container">
    <pre class="mermaid">
flowchart TD
    S1["STAGE 1: Assessment &<br/>System Selection<br/>---<br/>SLP evaluates motor, cognitive,<br/>vision, hearing profiles<br/>Trial multiple access methods"]

    S2["STAGE 2: Aided Language Modeling<br/>(Receptive Learning)<br/>---<br/>Partners model AAC use while speaking<br/>User develops receptive understanding<br/>No immediate imitation required"]

    S3["STAGE 3: Emerging Use<br/>---<br/>Requesting with single symbols<br/>First intentional use of device<br/>Communication begins"]

    S4["STAGE 4: Expanding Functions<br/>---<br/>Commenting, rejecting, questioning<br/>Multiple communication partners<br/>Use across contexts"]

    S5["STAGE 5: Combining Symbols<br/>---<br/>Multi-word messages<br/>Sentence construction<br/>More complex expression"]

    S6["STAGE 6: Fluency &<br/>Automaticity<br/>---<br/>Motor memory established<br/>Rapid message construction<br/>Natural communication flow"]

    S1 --> S2 --> S3 --> S4 --> S5 --> S6

    S6 -.->|"Ongoing reassessment<br/>& vocabulary expansion"| S1

    S3 -.->|"May plateau,<br/>regress, or<br/>leap forward"| S5

    WARN["Progression is NONLINEAR<br/>Users may skip stages, plateau,<br/>or need to revisit earlier stages.<br/>Family engagement is the strongest<br/>predictor of sustained progress."]

    style S1 fill:#e0f2fe,stroke:#0284c7,color:#1e3a5f
    style S2 fill:#dbeafe,stroke:#2563eb,color:#1e3a5f
    style S3 fill:#dcfce7,stroke:#16a34a,color:#14532d
    style S4 fill:#dcfce7,stroke:#16a34a,color:#14532d
    style S5 fill:#bbf7d0,stroke:#15803d,color:#14532d
    style S6 fill:#86efac,stroke:#059669,color:#14532d
    style WARN fill:#fef3c7,stroke:#d97706,color:#78350f
    </pre>
  </div>
  <figcaption>
    <strong>Figure 4:</strong> The AAC learning trajectory from initial assessment through fluency. Aided language modeling -- where communication partners model AAC use while speaking naturally -- is the primary teaching strategy. Progression is nonlinear: users may plateau, regress, or leap forward. Family engagement is the strongest predictor of sustained progress, and the system must evolve with the user throughout their lifespan.
  </figcaption>
</figure>
