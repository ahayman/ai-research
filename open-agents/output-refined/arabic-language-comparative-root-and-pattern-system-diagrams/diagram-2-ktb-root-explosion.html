<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The k-t-b Root Explosion</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --accent: #2563eb; --accent-light: #dbeafe;
    --root: #dc2626; --root-bg: #fee2e2;
    --verb: #7c3aed; --verb-bg: #ede9fe;
    --noun: #059669; --noun-bg: #d1fae5;
    --place: #d97706; --place-bg: #fef3c7;
    --person: #2563eb; --person-bg: #dbeafe;
    --muted: #6c757d; --caption-bg: #f8f9fa;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a; --fg: #e8e8f0; --surface: #1a1a2e; --border: #2d2d44;
      --accent: #6b8aff; --accent-light: #1e2a4a;
      --root: #f87171; --root-bg: #5c1a1a;
      --verb: #a78bfa; --verb-bg: #2e1f5e;
      --noun: #34d399; --noun-bg: #064e3b;
      --place: #fbbf24; --place-bg: #4a3520;
      --person: #60a5fa; --person-bg: #1e3a5f;
      --muted: #9a9ab0; --caption-bg: #1a1a2e;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--fg); display: flex; justify-content: center; padding: 2rem 1rem; line-height: 1.6; }
  figure { max-width: 1200px; width: 100%; }
  .diagram-container { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 1.5rem 1rem; overflow-x: auto; }
  figcaption { text-align: center; margin-top: 1.5rem; padding: 1rem 1.5rem; background: var(--caption-bg); border-radius: 8px; border: 1px solid var(--border); }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  .legend { display: flex; gap: 1.5rem; justify-content: center; flex-wrap: wrap; margin-top: 1rem; font-size: 0.82rem; color: var(--muted); }
  .legend-item { display: flex; align-items: center; gap: 0.4rem; }
  .legend-swatch { width: 14px; height: 14px; border-radius: 3px; border: 1px solid var(--border); }
  svg { display: block; margin: 0 auto; }
  .arabic { font-family: 'Noto Sans Arabic', 'Geeza Pro', serif; }
</style>
</head>
<body>
<figure>
  <div class="diagram-container">
    <svg viewBox="0 0 1140 740" xmlns="http://www.w3.org/2000/svg" style="min-width:900px;">
      <text x="570" y="28" text-anchor="middle" style="font: bold 16px system-ui; fill: var(--fg);">The k-t-b Root Explosion: One Root, 20+ Words</text>
      <text x="570" y="48" text-anchor="middle" style="font: 11px system-ui; fill: var(--muted);">Every word contains k, t, b in that order -- the root means "writing"</text>

      <!-- Central root -->
      <circle cx="570" cy="350" r="60" fill="var(--root-bg)" stroke="var(--root)" stroke-width="3"/>
      <text x="570" y="340" text-anchor="middle" style="font: bold 24px system-ui; fill: var(--root);">k-t-b</text>
      <text x="570" y="362" text-anchor="middle" style="font: 12px system-ui; fill: var(--fg);">"writing"</text>
      <text x="570" y="380" text-anchor="middle" class="arabic" style="font-size:16px; fill: var(--fg);">&#x0643;-&#x062A;-&#x0628;</text>

      <!-- VERBS (top-left quadrant) -->
      <g>
        <text x="180" y="80" text-anchor="middle" style="font: bold 13px system-ui; fill: var(--verb);">VERB FORMS</text>

        <!-- kataba -->
        <rect x="40" y="95" width="180" height="48" rx="8" fill="var(--verb-bg)" stroke="var(--verb)" stroke-width="1.5"/>
        <text x="130" y="115" text-anchor="middle" style="font: bold 12px system-ui; fill: var(--fg);"><tspan fill="var(--root)">k</tspan>a<tspan fill="var(--root)">t</tspan>a<tspan fill="var(--root)">b</tspan>a</text>
        <text x="130" y="133" text-anchor="middle" style="font: 10px system-ui; fill: var(--verb);">Form I: "he wrote"</text>
        <line x1="220" y1="119" x2="512" y2="330" stroke="var(--verb)" stroke-width="0.8" opacity="0.4"/>

        <!-- kattaba -->
        <rect x="40" y="150" width="180" height="48" rx="8" fill="var(--verb-bg)" stroke="var(--verb)" stroke-width="1.5"/>
        <text x="130" y="170" text-anchor="middle" style="font: bold 12px system-ui; fill: var(--fg);"><tspan fill="var(--root)">k</tspan>a<tspan fill="var(--root)">tt</tspan>a<tspan fill="var(--root)">b</tspan>a</text>
        <text x="130" y="188" text-anchor="middle" style="font: 10px system-ui; fill: var(--verb);">Form II: "he made s.o. write"</text>
        <line x1="220" y1="174" x2="515" y2="335" stroke="var(--verb)" stroke-width="0.8" opacity="0.4"/>

        <!-- kaataba -->
        <rect x="40" y="205" width="180" height="48" rx="8" fill="var(--verb-bg)" stroke="var(--verb)" stroke-width="1.5"/>
        <text x="130" y="225" text-anchor="middle" style="font: bold 12px system-ui; fill: var(--fg);"><tspan fill="var(--root)">k</tspan>a:<tspan fill="var(--root)">t</tspan>a<tspan fill="var(--root)">b</tspan>a</text>
        <text x="130" y="243" text-anchor="middle" style="font: 10px system-ui; fill: var(--verb);">Form III: "he corresponded"</text>
        <line x1="220" y1="229" x2="518" y2="340" stroke="var(--verb)" stroke-width="0.8" opacity="0.4"/>

        <!-- takaataba -->
        <rect x="40" y="260" width="180" height="48" rx="8" fill="var(--verb-bg)" stroke="var(--verb)" stroke-width="1.5"/>
        <text x="130" y="280" text-anchor="middle" style="font: bold 12px system-ui; fill: var(--fg);">ta<tspan fill="var(--root)">k</tspan>a:<tspan fill="var(--root)">t</tspan>a<tspan fill="var(--root)">b</tspan>a</text>
        <text x="130" y="298" text-anchor="middle" style="font: 10px system-ui; fill: var(--verb);">Form VI: "they corresponded"</text>
        <line x1="220" y1="284" x2="520" y2="345" stroke="var(--verb)" stroke-width="0.8" opacity="0.4"/>

        <!-- inkataba -->
        <rect x="40" y="315" width="180" height="48" rx="8" fill="var(--verb-bg)" stroke="var(--verb)" stroke-width="1.5"/>
        <text x="130" y="335" text-anchor="middle" style="font: bold 12px system-ui; fill: var(--fg);">in<tspan fill="var(--root)">k</tspan>a<tspan fill="var(--root)">t</tspan>a<tspan fill="var(--root)">b</tspan>a</text>
        <text x="130" y="353" text-anchor="middle" style="font: 10px system-ui; fill: var(--verb);">Form VII: "it was inscribed"</text>
        <line x1="220" y1="339" x2="515" y2="350" stroke="var(--verb)" stroke-width="0.8" opacity="0.4"/>

        <!-- istaktaba -->
        <rect x="40" y="370" width="180" height="48" rx="8" fill="var(--verb-bg)" stroke="var(--verb)" stroke-width="1.5"/>
        <text x="130" y="390" text-anchor="middle" style="font: bold 12px system-ui; fill: var(--fg);">ista<tspan fill="var(--root)">k</tspan><tspan fill="var(--root)">t</tspan>a<tspan fill="var(--root)">b</tspan>a</text>
        <text x="130" y="408" text-anchor="middle" style="font: 10px system-ui; fill: var(--verb);">Form X: "he asked s.o. to write"</text>
        <line x1="220" y1="394" x2="515" y2="355" stroke="var(--verb)" stroke-width="0.8" opacity="0.4"/>
      </g>

      <!-- PERSON NOUNS (top-right) -->
      <g>
        <text x="930" y="80" text-anchor="middle" style="font: bold 13px system-ui; fill: var(--person);">PERSON / PARTICIPLE</text>

        <rect x="840" y="95" width="220" height="48" rx="8" fill="var(--person-bg)" stroke="var(--person)" stroke-width="1.5"/>
        <text x="950" y="115" text-anchor="middle" style="font: bold 12px system-ui; fill: var(--fg);"><tspan fill="var(--root)">k</tspan>a:<tspan fill="var(--root)">t</tspan>i<tspan fill="var(--root)">b</tspan></text>
        <text x="950" y="133" text-anchor="middle" style="font: 10px system-ui; fill: var(--person);">fa:'il = "writer"</text>
        <line x1="840" y1="119" x2="628" y2="330" stroke="var(--person)" stroke-width="0.8" opacity="0.4"/>

        <rect x="840" y="150" width="220" height="48" rx="8" fill="var(--person-bg)" stroke="var(--person)" stroke-width="1.5"/>
        <text x="950" y="170" text-anchor="middle" style="font: bold 12px system-ui; fill: var(--fg);">ma<tspan fill="var(--root)">k</tspan><tspan fill="var(--root)">t</tspan>u:<tspan fill="var(--root)">b</tspan></text>
        <text x="950" y="188" text-anchor="middle" style="font: 10px system-ui; fill: var(--person);">maf'u:l = "written / fate"</text>
        <line x1="840" y1="174" x2="625" y2="335" stroke="var(--person)" stroke-width="0.8" opacity="0.4"/>

        <rect x="840" y="205" width="220" height="48" rx="8" fill="var(--person-bg)" stroke="var(--person)" stroke-width="1.5"/>
        <text x="950" y="225" text-anchor="middle" style="font: bold 12px system-ui; fill: var(--fg);"><tspan fill="var(--root)">k</tspan>u<tspan fill="var(--root)">tt</tspan>a:<tspan fill="var(--root)">b</tspan></text>
        <text x="950" y="243" text-anchor="middle" style="font: 10px system-ui; fill: var(--person);">fu''a:l = "writers (pl.)"</text>
        <line x1="840" y1="229" x2="622" y2="340" stroke="var(--person)" stroke-width="0.8" opacity="0.4"/>

        <rect x="840" y="260" width="220" height="48" rx="8" fill="var(--person-bg)" stroke="var(--person)" stroke-width="1.5"/>
        <text x="950" y="280" text-anchor="middle" style="font: bold 12px system-ui; fill: var(--fg);">mu<tspan fill="var(--root)">k</tspan>a:<tspan fill="var(--root)">t</tspan>a<tspan fill="var(--root)">b</tspan>a</text>
        <text x="950" y="298" text-anchor="middle" style="font: 10px system-ui; fill: var(--person);">mufa:'ala = "correspondence"</text>
        <line x1="840" y1="284" x2="620" y2="345" stroke="var(--person)" stroke-width="0.8" opacity="0.4"/>
      </g>

      <!-- THING NOUNS (bottom-right) -->
      <g>
        <text x="930" y="430" text-anchor="middle" style="font: bold 13px system-ui; fill: var(--noun);">THING / ABSTRACT NOUN</text>

        <rect x="840" y="445" width="220" height="48" rx="8" fill="var(--noun-bg)" stroke="var(--noun)" stroke-width="1.5"/>
        <text x="950" y="465" text-anchor="middle" style="font: bold 12px system-ui; fill: var(--fg);"><tspan fill="var(--root)">k</tspan>i<tspan fill="var(--root)">t</tspan>a:<tspan fill="var(--root)">b</tspan></text>
        <text x="950" y="483" text-anchor="middle" style="font: 10px system-ui; fill: var(--noun);">fi'a:l = "book"</text>
        <line x1="840" y1="469" x2="625" y2="365" stroke="var(--noun)" stroke-width="0.8" opacity="0.4"/>

        <rect x="840" y="500" width="220" height="48" rx="8" fill="var(--noun-bg)" stroke="var(--noun)" stroke-width="1.5"/>
        <text x="950" y="520" text-anchor="middle" style="font: bold 12px system-ui; fill: var(--fg);"><tspan fill="var(--root)">k</tspan>u<tspan fill="var(--root)">t</tspan>u<tspan fill="var(--root)">b</tspan></text>
        <text x="950" y="538" text-anchor="middle" style="font: 10px system-ui; fill: var(--noun);">fu'ul = "books (broken pl.)"</text>
        <line x1="840" y1="524" x2="628" y2="370" stroke="var(--noun)" stroke-width="0.8" opacity="0.4"/>

        <rect x="840" y="555" width="220" height="48" rx="8" fill="var(--noun-bg)" stroke="var(--noun)" stroke-width="1.5"/>
        <text x="950" y="575" text-anchor="middle" style="font: bold 12px system-ui; fill: var(--fg);"><tspan fill="var(--root)">k</tspan>i<tspan fill="var(--root)">t</tspan>a:<tspan fill="var(--root)">b</tspan>a</text>
        <text x="950" y="593" text-anchor="middle" style="font: 10px system-ui; fill: var(--noun);">fi'a:la = "writing (the act)"</text>
        <line x1="840" y1="579" x2="625" y2="375" stroke="var(--noun)" stroke-width="0.8" opacity="0.4"/>

        <rect x="840" y="610" width="220" height="48" rx="8" fill="var(--noun-bg)" stroke="var(--noun)" stroke-width="1.5"/>
        <text x="950" y="630" text-anchor="middle" style="font: bold 12px system-ui; fill: var(--fg);"><tspan fill="var(--root)">k</tspan>u<tspan fill="var(--root)">t</tspan>ayyi<tspan fill="var(--root)">b</tspan></text>
        <text x="950" y="648" text-anchor="middle" style="font: 10px system-ui; fill: var(--noun);">fu'ayyil = "booklet (dim.)"</text>
        <line x1="840" y1="634" x2="625" y2="378" stroke="var(--noun)" stroke-width="0.8" opacity="0.4"/>
      </g>

      <!-- PLACE NOUNS (bottom-left) -->
      <g>
        <text x="180" y="480" text-anchor="middle" style="font: bold 13px system-ui; fill: var(--place);">PLACE / INSTRUMENT</text>

        <rect x="40" y="495" width="220" height="48" rx="8" fill="var(--place-bg)" stroke="var(--place)" stroke-width="1.5"/>
        <text x="150" y="515" text-anchor="middle" style="font: bold 12px system-ui; fill: var(--fg);">ma<tspan fill="var(--root)">k</tspan><tspan fill="var(--root)">t</tspan>a<tspan fill="var(--root)">b</tspan></text>
        <text x="150" y="533" text-anchor="middle" style="font: 10px system-ui; fill: var(--place);">maf'al = "office / desk"</text>
        <line x1="260" y1="519" x2="515" y2="370" stroke="var(--place)" stroke-width="0.8" opacity="0.4"/>

        <rect x="40" y="550" width="220" height="48" rx="8" fill="var(--place-bg)" stroke="var(--place)" stroke-width="1.5"/>
        <text x="150" y="570" text-anchor="middle" style="font: bold 12px system-ui; fill: var(--fg);">ma<tspan fill="var(--root)">k</tspan><tspan fill="var(--root)">t</tspan>a<tspan fill="var(--root)">b</tspan>a</text>
        <text x="150" y="588" text-anchor="middle" style="font: 10px system-ui; fill: var(--place);">maf'ala = "library / bookstore"</text>
        <line x1="260" y1="574" x2="518" y2="375" stroke="var(--place)" stroke-width="0.8" opacity="0.4"/>
      </g>

      <!-- BOTTOM INSIGHT -->
      <g transform="translate(200,680)">
        <rect width="740" height="45" rx="8" fill="var(--accent-light)" stroke="var(--accent)" stroke-width="1.5"/>
        <text x="370" y="18" text-anchor="middle" style="font: bold 12px system-ui; fill: var(--accent);">ONE root x MANY patterns = 20+ words covering verbs, nouns, people, places, abstractions</text>
        <text x="370" y="36" text-anchor="middle" style="font: italic 11px system-ui; fill: var(--muted);">English has no single mechanism this productive. This is the heart of Arabic morphology.</text>
      </g>
    </svg>
  </div>

  <figcaption>
    <h2>Figure 2 -- The k-t-b Root Explosion</h2>
    <p>A single three-consonant root generates an entire word family through systematic pattern application. Verb forms (purple) express different types of action. Person/participle nouns (blue) name doers and things acted upon. Thing/abstract nouns (green) name objects and concepts. Place nouns (orange) name locations. Every word preserves k-t-b in order -- the root is the semantic anchor, the pattern is the grammatical function.</p>
  </figcaption>

  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background:var(--root);"></div>Root consonants (k-t-b)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--verb);"></div>Verb forms</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--person);"></div>Person/participle</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--noun);"></div>Thing/abstract noun</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--place);"></div>Place/instrument</div>
  </div>
</figure>
</body>
</html>
