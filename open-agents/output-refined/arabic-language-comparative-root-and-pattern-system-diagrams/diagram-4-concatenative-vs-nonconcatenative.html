<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Concatenative vs. Nonconcatenative Morphology</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --accent: #2563eb; --accent-light: #dbeafe;
    --english: #6366f1; --english-bg: #e8e8ff;
    --arabic: #e67e22; --arabic-bg: #fef3e2;
    --root: #dc2626; --pattern: #2563eb;
    --prefix: #d97706; --stem: #6366f1; --suffix: #059669;
    --muted: #6c757d; --caption-bg: #f8f9fa;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a; --fg: #e8e8f0; --surface: #1a1a2e; --border: #2d2d44;
      --accent: #6b8aff; --accent-light: #1e2a4a;
      --english: #818cf8; --english-bg: #2e2e5a;
      --arabic: #f59e0b; --arabic-bg: #4a3520;
      --root: #f87171; --pattern: #60a5fa;
      --prefix: #fbbf24; --stem: #818cf8; --suffix: #34d399;
      --muted: #9a9ab0; --caption-bg: #1a1a2e;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--fg); display: flex; justify-content: center; padding: 2rem 1rem; line-height: 1.6; }
  figure { max-width: 1100px; width: 100%; }
  .diagram-container { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 1.5rem 1rem; overflow-x: auto; }
  figcaption { text-align: center; margin-top: 1.5rem; padding: 1rem 1.5rem; background: var(--caption-bg); border-radius: 8px; border: 1px solid var(--border); }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  .legend { display: flex; gap: 1.5rem; justify-content: center; flex-wrap: wrap; margin-top: 1rem; font-size: 0.82rem; color: var(--muted); }
  .legend-item { display: flex; align-items: center; gap: 0.4rem; }
  .legend-swatch { width: 14px; height: 14px; border-radius: 3px; border: 1px solid var(--border); }
  svg { display: block; margin: 0 auto; }
</style>
</head>
<body>
<figure>
  <div class="diagram-container">
    <svg viewBox="0 0 1060 680" xmlns="http://www.w3.org/2000/svg" style="min-width:780px;">
      <text x="530" y="28" text-anchor="middle" style="font: bold 16px system-ui; fill: var(--fg);">Concatenative vs. Nonconcatenative Morphology</text>
      <text x="530" y="48" text-anchor="middle" style="font: 11px system-ui; fill: var(--muted);">English stacks blocks end-to-end. Arabic weaves threads together. Two fundamentally different architectures.</text>

      <!-- ========== ENGLISH PANEL ========== -->
      <g transform="translate(30,70)">
        <rect width="480" height="260" rx="10" fill="var(--english-bg)" stroke="var(--english)" stroke-width="1.5"/>
        <text x="240" y="25" text-anchor="middle" style="font: bold 14px system-ui; fill: var(--english);">English: CONCATENATIVE (Linear)</text>
        <text x="240" y="43" text-anchor="middle" style="font: 11px system-ui; fill: var(--muted);">Morphemes stack sequentially -- clear boundaries</text>

        <!-- Block diagram: un + break + able -->
        <g transform="translate(30,60)">
          <rect width="90" height="50" rx="6" fill="var(--surface)" stroke="var(--prefix)" stroke-width="2"/>
          <text x="45" y="30" text-anchor="middle" style="font: bold 16px monospace; fill: var(--prefix);">un-</text>
          <text x="45" y="48" text-anchor="middle" style="font: 9px system-ui; fill: var(--muted);">prefix</text>

          <rect x="100" y="0" width="120" height="50" rx="6" fill="var(--surface)" stroke="var(--stem)" stroke-width="2"/>
          <text x="160" y="30" text-anchor="middle" style="font: bold 16px monospace; fill: var(--stem);">break</text>
          <text x="160" y="48" text-anchor="middle" style="font: 9px system-ui; fill: var(--muted);">stem</text>

          <rect x="230" y="0" width="100" height="50" rx="6" fill="var(--surface)" stroke="var(--suffix)" stroke-width="2"/>
          <text x="280" y="30" text-anchor="middle" style="font: bold 16px monospace; fill: var(--suffix);">-able</text>
          <text x="280" y="48" text-anchor="middle" style="font: 9px system-ui; fill: var(--muted);">suffix</text>

          <text x="350" y="32" style="font: bold 16px system-ui; fill: var(--muted);">=</text>
          <text x="390" y="32" style="font: bold 16px monospace; fill: var(--fg);">unbreakable</text>
        </g>

        <!-- Block diagram: re + writ + ing -->
        <g transform="translate(30,125)">
          <rect width="90" height="50" rx="6" fill="var(--surface)" stroke="var(--prefix)" stroke-width="2"/>
          <text x="45" y="30" text-anchor="middle" style="font: bold 16px monospace; fill: var(--prefix);">re-</text>

          <rect x="100" y="0" width="120" height="50" rx="6" fill="var(--surface)" stroke="var(--stem)" stroke-width="2"/>
          <text x="160" y="30" text-anchor="middle" style="font: bold 16px monospace; fill: var(--stem);">writ</text>

          <rect x="230" y="0" width="100" height="50" rx="6" fill="var(--surface)" stroke="var(--suffix)" stroke-width="2"/>
          <text x="280" y="30" text-anchor="middle" style="font: bold 16px monospace; fill: var(--suffix);">-ing</text>

          <text x="350" y="32" style="font: bold 16px system-ui; fill: var(--muted);">=</text>
          <text x="390" y="32" style="font: bold 16px monospace; fill: var(--fg);">rewriting</text>
        </g>

        <!-- Properties -->
        <text x="30" y="210" style="font: 11px system-ui; fill: var(--fg);">- Morphemes are SEPARABLE -- peel off prefixes/suffixes</text>
        <text x="30" y="228" style="font: 11px system-ui; fill: var(--fg);">- Clear BOUNDARIES between each piece</text>
        <text x="30" y="246" style="font: 11px system-ui; fill: var(--fg);">- Structure is ONE-DIMENSIONAL (linear sequence)</text>
      </g>

      <!-- ========== ARABIC PANEL ========== -->
      <g transform="translate(540,70)">
        <rect width="490" height="260" rx="10" fill="var(--arabic-bg)" stroke="var(--arabic)" stroke-width="1.5"/>
        <text x="245" y="25" text-anchor="middle" style="font: bold 14px system-ui; fill: var(--arabic);">Arabic: NONCONCATENATIVE (Interleaved)</text>
        <text x="245" y="43" text-anchor="middle" style="font: 11px system-ui; fill: var(--muted);">Morphemes weave through each other -- no boundaries</text>

        <!-- Weave diagram: k_t_b + _a_a_a -->
        <g transform="translate(20,60)">
          <!-- Root strand -->
          <text x="0" y="15" style="font: bold 10px system-ui; fill: var(--root);">Root:</text>
          <rect x="50" y="0" width="30" height="30" rx="4" fill="var(--surface)" stroke="var(--root)" stroke-width="2"/>
          <text x="65" y="22" text-anchor="middle" style="font: bold 16px monospace; fill: var(--root);">k</text>
          <rect x="120" y="0" width="30" height="30" rx="4" fill="var(--surface)" stroke="var(--root)" stroke-width="2"/>
          <text x="135" y="22" text-anchor="middle" style="font: bold 16px monospace; fill: var(--root);">t</text>
          <rect x="190" y="0" width="30" height="30" rx="4" fill="var(--surface)" stroke="var(--root)" stroke-width="2"/>
          <text x="205" y="22" text-anchor="middle" style="font: bold 16px monospace; fill: var(--root);">b</text>

          <!-- Pattern strand (weaves between) -->
          <text x="0" y="55" style="font: bold 10px system-ui; fill: var(--pattern);">Pattern:</text>
          <rect x="85" y="38" width="30" height="30" rx="4" fill="var(--surface)" stroke="var(--pattern)" stroke-width="2"/>
          <text x="100" y="60" text-anchor="middle" style="font: bold 16px monospace; fill: var(--pattern);">a</text>
          <rect x="155" y="38" width="30" height="30" rx="4" fill="var(--surface)" stroke="var(--pattern)" stroke-width="2"/>
          <text x="170" y="60" text-anchor="middle" style="font: bold 16px monospace; fill: var(--pattern);">a</text>
          <rect x="225" y="38" width="30" height="30" rx="4" fill="var(--surface)" stroke="var(--pattern)" stroke-width="2"/>
          <text x="240" y="60" text-anchor="middle" style="font: bold 16px monospace; fill: var(--pattern);">a</text>

          <!-- Weave lines -->
          <line x1="80" y1="15" x2="85" y2="50" stroke="var(--muted)" stroke-width="1" stroke-dasharray="3,2"/>
          <line x1="115" y1="50" x2="120" y2="15" stroke="var(--muted)" stroke-width="1" stroke-dasharray="3,2"/>
          <line x1="150" y1="15" x2="155" y2="50" stroke="var(--muted)" stroke-width="1" stroke-dasharray="3,2"/>
          <line x1="185" y1="50" x2="190" y2="15" stroke="var(--muted)" stroke-width="1" stroke-dasharray="3,2"/>
          <line x1="220" y1="15" x2="225" y2="50" stroke="var(--muted)" stroke-width="1" stroke-dasharray="3,2"/>

          <!-- Result -->
          <text x="280" y="42" style="font: bold 16px system-ui; fill: var(--muted);">=</text>
          <text x="310" y="42" style="font: bold 18px monospace;">
            <tspan fill="var(--root)">k</tspan><tspan fill="var(--pattern)">a</tspan><tspan fill="var(--root)">t</tspan><tspan fill="var(--pattern)">a</tspan><tspan fill="var(--root)">b</tspan><tspan fill="var(--pattern)">a</tspan>
          </text>
        </g>

        <!-- Second weave: maktab -->
        <g transform="translate(20,130)">
          <text x="0" y="15" style="font: bold 10px system-ui; fill: var(--root);">Root:</text>
          <rect x="85" y="0" width="30" height="30" rx="4" fill="var(--surface)" stroke="var(--root)" stroke-width="2"/>
          <text x="100" y="22" text-anchor="middle" style="font: bold 16px monospace; fill: var(--root);">k</text>
          <rect x="120" y="0" width="30" height="30" rx="4" fill="var(--surface)" stroke="var(--root)" stroke-width="2"/>
          <text x="135" y="22" text-anchor="middle" style="font: bold 16px monospace; fill: var(--root);">t</text>
          <rect x="190" y="0" width="30" height="30" rx="4" fill="var(--surface)" stroke="var(--root)" stroke-width="2"/>
          <text x="205" y="22" text-anchor="middle" style="font: bold 16px monospace; fill: var(--root);">b</text>

          <text x="0" y="55" style="font: bold 10px system-ui; fill: var(--pattern);">Pattern:</text>
          <rect x="50" y="38" width="30" height="30" rx="4" fill="var(--surface)" stroke="var(--pattern)" stroke-width="2"/>
          <text x="65" y="60" text-anchor="middle" style="font: bold 14px monospace; fill: var(--pattern);">ma</text>
          <rect x="155" y="38" width="30" height="30" rx="4" fill="var(--surface)" stroke="var(--pattern)" stroke-width="2"/>
          <text x="170" y="60" text-anchor="middle" style="font: bold 16px monospace; fill: var(--pattern);">a</text>

          <text x="280" y="42" style="font: bold 16px system-ui; fill: var(--muted);">=</text>
          <text x="310" y="42" style="font: bold 18px monospace;">
            <tspan fill="var(--pattern)">ma</tspan><tspan fill="var(--root)">kt</tspan><tspan fill="var(--pattern)">a</tspan><tspan fill="var(--root)">b</tspan>
          </text>
        </g>

        <!-- Properties -->
        <text x="30" y="210" style="font: 11px system-ui; fill: var(--fg);">- Morphemes OVERLAP -- cannot separate without destroying both</text>
        <text x="30" y="228" style="font: 11px system-ui; fill: var(--fg);">- NO clear boundaries -- root and pattern are interdigitated</text>
        <text x="30" y="246" style="font: 11px system-ui; fill: var(--fg);">- Structure is TWO-DIMENSIONAL (root x pattern grid)</text>
      </g>

      <!-- COMPARISON TABLE -->
      <g transform="translate(30,350)">
        <rect width="1000" height="310" rx="10" fill="var(--accent-light)" stroke="var(--accent)" stroke-width="1.5"/>
        <text x="500" y="25" text-anchor="middle" style="font: bold 14px system-ui; fill: var(--accent);">Side-by-Side Comparison</text>

        <!-- Table rows -->
        <g transform="translate(20,40)">
          <!-- Headers -->
          <rect x="0" y="0" width="250" height="30" rx="4" fill="var(--surface)" stroke="var(--border)"/>
          <text x="125" y="20" text-anchor="middle" style="font: bold 11px system-ui; fill: var(--fg);">Feature</text>
          <rect x="260" y="0" width="350" height="30" rx="4" fill="var(--english-bg)" stroke="var(--english)"/>
          <text x="435" y="20" text-anchor="middle" style="font: bold 11px system-ui; fill: var(--english);">English (Concatenative)</text>
          <rect x="620" y="0" width="350" height="30" rx="4" fill="var(--arabic-bg)" stroke="var(--arabic)"/>
          <text x="795" y="20" text-anchor="middle" style="font: bold 11px system-ui; fill: var(--arabic);">Arabic (Nonconcatenative)</text>

          <!-- Row 1 -->
          <text x="10" y="55" style="font: 11px system-ui; fill: var(--fg);">Basic unit</text>
          <text x="270" y="55" style="font: 11px system-ui; fill: var(--fg);">Stem/base (continuous chunk)</text>
          <text x="630" y="55" style="font: 11px system-ui; fill: var(--fg);">Consonant root (discontinuous)</text>

          <!-- Row 2 -->
          <text x="10" y="80" style="font: 11px system-ui; fill: var(--fg);">How words are built</text>
          <text x="270" y="80" style="font: 11px system-ui; fill: var(--fg);">Attach affixes AROUND stem</text>
          <text x="630" y="80" style="font: 11px system-ui; fill: var(--fg);">Weave vowels INTO root</text>

          <!-- Row 3 -->
          <text x="10" y="105" style="font: 11px system-ui; fill: var(--fg);">Morpheme boundaries</text>
          <text x="270" y="105" style="font: 11px system-ui; fill: var(--fg);">Clear -- each piece occupies its own slot</text>
          <text x="630" y="105" style="font: 11px system-ui; fill: var(--fg);">Impossible to draw -- morphemes overlap</text>

          <!-- Row 4 -->
          <text x="10" y="130" style="font: 11px system-ui; fill: var(--fg);">Vowels' role</text>
          <text x="270" y="130" style="font: 11px system-ui; fill: var(--fg);">Lexical (distinguish words: bat/bet/bit)</text>
          <text x="630" y="130" style="font: 11px system-ui; fill: var(--fg);">Grammatical (mark patterns: kataba/kutiba)</text>

          <!-- Row 5 -->
          <text x="10" y="155" style="font: 11px system-ui; fill: var(--fg);">Consonants' role</text>
          <text x="270" y="155" style="font: 11px system-ui; fill: var(--fg);">Shared with vowels for word identity</text>
          <text x="630" y="155" style="font: 11px system-ui; fill: var(--fg);">Carry semantic identity (the root)</text>

          <!-- Row 6 -->
          <text x="10" y="180" style="font: 11px system-ui; fill: var(--fg);">Dictionary organization</text>
          <text x="270" y="180" style="font: 11px system-ui; fill: var(--fg);">By first letter of word</text>
          <text x="630" y="180" style="font: 11px system-ui; fill: var(--fg);">By root consonants</text>

          <!-- Row 7 -->
          <text x="10" y="205" style="font: 11px system-ui; fill: var(--fg);">Vocabulary learning</text>
          <text x="270" y="205" style="font: 11px system-ui; fill: var(--fg);">Linear (one word at a time)</text>
          <text x="630" y="205" style="font: 11px system-ui; fill: var(--fg);">Multiplicative (roots x patterns)</text>

          <!-- Row 8 -->
          <text x="10" y="230" style="font: 11px system-ui; fill: var(--fg);">Programming analog</text>
          <text x="270" y="230" style="font: 11px monospace; fill: var(--english);">"un" + "break" + "able"</text>
          <text x="630" y="230" style="font: 11px monospace; fill: var(--arabic);">merge([k,t,b], [_a_a_a])</text>

          <!-- Divider lines -->
          <line x1="0" y1="35" x2="960" y2="35" stroke="var(--border)" stroke-width="0.5"/>
          <line x1="0" y1="62" x2="960" y2="62" stroke="var(--border)" stroke-width="0.5"/>
          <line x1="0" y1="87" x2="960" y2="87" stroke="var(--border)" stroke-width="0.5"/>
          <line x1="0" y1="112" x2="960" y2="112" stroke="var(--border)" stroke-width="0.5"/>
          <line x1="0" y1="137" x2="960" y2="137" stroke="var(--border)" stroke-width="0.5"/>
          <line x1="0" y1="162" x2="960" y2="162" stroke="var(--border)" stroke-width="0.5"/>
          <line x1="0" y1="187" x2="960" y2="187" stroke="var(--border)" stroke-width="0.5"/>
          <line x1="0" y1="212" x2="960" y2="212" stroke="var(--border)" stroke-width="0.5"/>
        </g>

        <!-- Insight -->
        <text x="500" y="290" text-anchor="middle" style="font: italic 12px system-ui; fill: var(--accent);">Neither system is "better." They are different computational architectures for building words from smaller parts.</text>
      </g>
    </svg>
  </div>

  <figcaption>
    <h2>Figure 4 -- Concatenative vs. Nonconcatenative Morphology</h2>
    <p>English morphology is one-dimensional: morphemes line up sequentially and can be peeled apart (un- + break + -able). Arabic morphology is two-dimensional: root consonants and pattern vowels interleave in alternating positions, creating a merged output that cannot be disassembled without destroying both components. This structural difference drives every downstream difference in how the two languages organize vocabulary, grammar, and dictionaries.</p>
  </figcaption>

  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background:var(--english);"></div>English (concatenative)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--arabic);"></div>Arabic (nonconcatenative)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--root);"></div>Root consonants</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--pattern);"></div>Pattern vowels</div>
  </div>
</figure>
</body>
</html>
