<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Root + Pattern = Word: The Interleaving Process</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --accent: #2563eb; --accent-light: #dbeafe;
    --root: #dc2626; --root-bg: #fee2e2;
    --pattern: #2563eb; --pattern-bg: #dbeafe;
    --result: #059669; --result-bg: #d1fae5;
    --muted: #6c757d; --caption-bg: #f8f9fa;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a; --fg: #e8e8f0; --surface: #1a1a2e; --border: #2d2d44;
      --accent: #6b8aff; --accent-light: #1e2a4a;
      --root: #f87171; --root-bg: #5c1a1a;
      --pattern: #60a5fa; --pattern-bg: #1e3a5f;
      --result: #34d399; --result-bg: #064e3b;
      --muted: #9a9ab0; --caption-bg: #1a1a2e;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--fg); display: flex; justify-content: center; padding: 2rem 1rem; line-height: 1.6; }
  figure { max-width: 1100px; width: 100%; }
  .diagram-container { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 1.5rem 1rem; overflow-x: auto; }
  figcaption { text-align: center; margin-top: 1.5rem; padding: 1rem 1.5rem; background: var(--caption-bg); border-radius: 8px; border: 1px solid var(--border); }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  .legend { display: flex; gap: 1.5rem; justify-content: center; flex-wrap: wrap; margin-top: 1rem; font-size: 0.82rem; color: var(--muted); }
  .legend-item { display: flex; align-items: center; gap: 0.4rem; }
  .legend-swatch { width: 14px; height: 14px; border-radius: 3px; border: 1px solid var(--border); }
  svg { display: block; margin: 0 auto; }
  .ipa { font-family: 'Gentium Plus', 'Noto Sans', 'DejaVu Sans', serif; }
  .arabic { font-family: 'Noto Sans Arabic', 'Geeza Pro', serif; }
</style>
</head>
<body>
<figure>
  <div class="diagram-container">
    <svg viewBox="0 0 1060 780" xmlns="http://www.w3.org/2000/svg" style="min-width:780px;">
      <text x="530" y="28" text-anchor="middle" style="font: bold 16px system-ui; fill: var(--fg);">Root + Pattern = Word</text>
      <text x="530" y="48" text-anchor="middle" style="font: 11px system-ui; fill: var(--muted);">Consonant skeleton + vowel template = interleaved word (nonconcatenative morphology)</text>

      <!-- THE ROOT -->
      <g transform="translate(30,75)">
        <rect width="300" height="100" rx="10" fill="var(--root-bg)" stroke="var(--root)" stroke-width="2"/>
        <text x="150" y="25" text-anchor="middle" style="font: bold 14px system-ui; fill: var(--root);">THE ROOT (consonant skeleton)</text>
        <text x="150" y="50" text-anchor="middle" style="font: bold 28px system-ui; fill: var(--root);">k - t - b</text>
        <text x="150" y="70" text-anchor="middle" style="font: 12px system-ui; fill: var(--fg);">Semantic field: "writing"</text>
        <text x="150" y="88" text-anchor="middle" style="font: italic 10px system-ui; fill: var(--muted);">Abstract -- not pronounceable alone</text>
      </g>

      <!-- THE PATTERNS -->
      <g transform="translate(400,60)">
        <rect width="630" height="130" rx="10" fill="var(--pattern-bg)" stroke="var(--pattern)" stroke-width="2"/>
        <text x="315" y="22" text-anchor="middle" style="font: bold 14px system-ui; fill: var(--pattern);">PATTERNS (vowel templates)</text>

        <!-- Pattern 1: fa'ala -->
        <rect x="15" y="35" width="140" height="80" rx="6" fill="var(--surface)" stroke="var(--pattern)" stroke-width="1"/>
        <text x="85" y="55" text-anchor="middle" style="font: bold 12px system-ui; fill: var(--pattern);">_a_a_a</text>
        <text x="85" y="72" text-anchor="middle" class="ipa" style="font: 11px serif; fill: var(--fg);">fa&#x0295;ala</text>
        <text x="85" y="90" text-anchor="middle" style="font: 10px system-ui; fill: var(--muted);">Form I verb</text>
        <text x="85" y="105" text-anchor="middle" style="font: 10px system-ui; fill: var(--muted);">"he did [action]"</text>

        <!-- Pattern 2: fa:'il -->
        <rect x="165" y="35" width="140" height="80" rx="6" fill="var(--surface)" stroke="var(--pattern)" stroke-width="1"/>
        <text x="235" y="55" text-anchor="middle" style="font: bold 12px system-ui; fill: var(--pattern);">_a:_i_</text>
        <text x="235" y="72" text-anchor="middle" class="ipa" style="font: 11px serif; fill: var(--fg);">fa&#x02D0;&#x0295;il</text>
        <text x="235" y="90" text-anchor="middle" style="font: 10px system-ui; fill: var(--muted);">Active participle</text>
        <text x="235" y="105" text-anchor="middle" style="font: 10px system-ui; fill: var(--muted);">"doer of [action]"</text>

        <!-- Pattern 3: maf'u:l -->
        <rect x="315" y="35" width="140" height="80" rx="6" fill="var(--surface)" stroke="var(--pattern)" stroke-width="1"/>
        <text x="385" y="55" text-anchor="middle" style="font: bold 12px system-ui; fill: var(--pattern);">ma__u:_</text>
        <text x="385" y="72" text-anchor="middle" class="ipa" style="font: 11px serif; fill: var(--fg);">maf&#x0295;u&#x02D0;l</text>
        <text x="385" y="90" text-anchor="middle" style="font: 10px system-ui; fill: var(--muted);">Passive participle</text>
        <text x="385" y="105" text-anchor="middle" style="font: 10px system-ui; fill: var(--muted);">"thing [action]-ed"</text>

        <!-- Pattern 4: maf'al -->
        <rect x="465" y="35" width="140" height="80" rx="6" fill="var(--surface)" stroke="var(--pattern)" stroke-width="1"/>
        <text x="535" y="55" text-anchor="middle" style="font: bold 12px system-ui; fill: var(--pattern);">ma__a_</text>
        <text x="535" y="72" text-anchor="middle" class="ipa" style="font: 11px serif; fill: var(--fg);">maf&#x0295;al</text>
        <text x="535" y="90" text-anchor="middle" style="font: 10px system-ui; fill: var(--muted);">Place noun</text>
        <text x="535" y="105" text-anchor="middle" style="font: 10px system-ui; fill: var(--muted);">"place of [action]"</text>
      </g>

      <!-- INTERLEAVING ARROWS AND RESULTS -->
      <g transform="translate(30,210)">
        <!-- Row 1: k-t-b + _a_a_a = kataba -->
        <g transform="translate(0,0)">
          <rect width="200" height="55" rx="8" fill="var(--root-bg)" stroke="var(--root)" stroke-width="1.5"/>
          <text x="100" y="22" text-anchor="middle" style="font: bold 16px monospace; fill: var(--root);">k _ t _ b _</text>
          <text x="100" y="42" text-anchor="middle" style="font: 10px system-ui; fill: var(--muted);">consonant slots</text>

          <text x="225" y="32" text-anchor="middle" style="font: bold 18px system-ui; fill: var(--muted);">+</text>

          <rect x="250" y="0" width="200" height="55" rx="8" fill="var(--pattern-bg)" stroke="var(--pattern)" stroke-width="1.5"/>
          <text x="350" y="22" text-anchor="middle" style="font: bold 16px monospace; fill: var(--pattern);">_ a _ a _ a</text>
          <text x="350" y="42" text-anchor="middle" style="font: 10px system-ui; fill: var(--muted);">vowel template</text>

          <text x="485" y="32" text-anchor="middle" style="font: bold 18px system-ui; fill: var(--muted);">=</text>

          <rect x="510" y="0" width="240" height="55" rx="8" fill="var(--result-bg)" stroke="var(--result)" stroke-width="2"/>
          <text x="630" y="20" text-anchor="middle" style="font: bold 18px monospace;">
            <tspan fill="var(--root)">k</tspan><tspan fill="var(--pattern)">a</tspan><tspan fill="var(--root)">t</tspan><tspan fill="var(--pattern)">a</tspan><tspan fill="var(--root)">b</tspan><tspan fill="var(--pattern)">a</tspan>
          </text>
          <text x="630" y="38" text-anchor="middle" style="font: bold 12px system-ui; fill: var(--result);">kataba = "he wrote"</text>
          <text x="630" y="52" text-anchor="middle" class="arabic" style="font-size: 14px; fill: var(--fg);">&#x0643;&#x064E;&#x062A;&#x064E;&#x0628;&#x064E;</text>
        </g>

        <!-- Row 2: k-t-b + _a:_i_ = ka:tib -->
        <g transform="translate(0,70)">
          <rect width="200" height="55" rx="8" fill="var(--root-bg)" stroke="var(--root)" stroke-width="1.5"/>
          <text x="100" y="22" text-anchor="middle" style="font: bold 16px monospace; fill: var(--root);">k _ t _ b</text>
          <text x="100" y="42" text-anchor="middle" style="font: 10px system-ui; fill: var(--muted);">same root</text>

          <text x="225" y="32" text-anchor="middle" style="font: bold 18px system-ui; fill: var(--muted);">+</text>

          <rect x="250" y="0" width="200" height="55" rx="8" fill="var(--pattern-bg)" stroke="var(--pattern)" stroke-width="1.5"/>
          <text x="350" y="22" text-anchor="middle" style="font: bold 16px monospace; fill: var(--pattern);">_ a: _ i _</text>
          <text x="350" y="42" text-anchor="middle" style="font: 10px system-ui; fill: var(--muted);">different pattern</text>

          <text x="485" y="32" text-anchor="middle" style="font: bold 18px system-ui; fill: var(--muted);">=</text>

          <rect x="510" y="0" width="240" height="55" rx="8" fill="var(--result-bg)" stroke="var(--result)" stroke-width="2"/>
          <text x="630" y="20" text-anchor="middle" style="font: bold 18px monospace;">
            <tspan fill="var(--root)">k</tspan><tspan fill="var(--pattern)">a:</tspan><tspan fill="var(--root)">t</tspan><tspan fill="var(--pattern)">i</tspan><tspan fill="var(--root)">b</tspan>
          </text>
          <text x="630" y="38" text-anchor="middle" style="font: bold 12px system-ui; fill: var(--result);">ka:tib = "writer"</text>
          <text x="630" y="52" text-anchor="middle" class="arabic" style="font-size: 14px; fill: var(--fg);">&#x0643;&#x0627;&#x062A;&#x0650;&#x0628;</text>
        </g>

        <!-- Row 3: k-t-b + ma__u:_ = maktu:b -->
        <g transform="translate(0,140)">
          <rect width="200" height="55" rx="8" fill="var(--root-bg)" stroke="var(--root)" stroke-width="1.5"/>
          <text x="100" y="22" text-anchor="middle" style="font: bold 16px monospace; fill: var(--root);">k _ t _ b</text>
          <text x="100" y="42" text-anchor="middle" style="font: 10px system-ui; fill: var(--muted);">same root</text>

          <text x="225" y="32" text-anchor="middle" style="font: bold 18px system-ui; fill: var(--muted);">+</text>

          <rect x="250" y="0" width="200" height="55" rx="8" fill="var(--pattern-bg)" stroke="var(--pattern)" stroke-width="1.5"/>
          <text x="350" y="22" text-anchor="middle" style="font: bold 16px monospace; fill: var(--pattern);">ma_ _u:_</text>
          <text x="350" y="42" text-anchor="middle" style="font: 10px system-ui; fill: var(--muted);">different pattern</text>

          <text x="485" y="32" text-anchor="middle" style="font: bold 18px system-ui; fill: var(--muted);">=</text>

          <rect x="510" y="0" width="240" height="55" rx="8" fill="var(--result-bg)" stroke="var(--result)" stroke-width="2"/>
          <text x="630" y="20" text-anchor="middle" style="font: bold 18px monospace;">
            <tspan fill="var(--pattern)">ma</tspan><tspan fill="var(--root)">k</tspan><tspan fill="var(--root)">t</tspan><tspan fill="var(--pattern)">u:</tspan><tspan fill="var(--root)">b</tspan>
          </text>
          <text x="630" y="38" text-anchor="middle" style="font: bold 12px system-ui; fill: var(--result);">maktu:b = "written / fate"</text>
          <text x="630" y="52" text-anchor="middle" class="arabic" style="font-size: 14px; fill: var(--fg);">&#x0645;&#x064E;&#x0643;&#x0652;&#x062A;&#x064F;&#x0648;&#x0628;</text>
        </g>

        <!-- Row 4: k-t-b + ma__a_ = maktab -->
        <g transform="translate(0,210)">
          <rect width="200" height="55" rx="8" fill="var(--root-bg)" stroke="var(--root)" stroke-width="1.5"/>
          <text x="100" y="22" text-anchor="middle" style="font: bold 16px monospace; fill: var(--root);">k _ t _ b</text>
          <text x="100" y="42" text-anchor="middle" style="font: 10px system-ui; fill: var(--muted);">same root</text>

          <text x="225" y="32" text-anchor="middle" style="font: bold 18px system-ui; fill: var(--muted);">+</text>

          <rect x="250" y="0" width="200" height="55" rx="8" fill="var(--pattern-bg)" stroke="var(--pattern)" stroke-width="1.5"/>
          <text x="350" y="22" text-anchor="middle" style="font: bold 16px monospace; fill: var(--pattern);">ma_ _a_</text>
          <text x="350" y="42" text-anchor="middle" style="font: 10px system-ui; fill: var(--muted);">different pattern</text>

          <text x="485" y="32" text-anchor="middle" style="font: bold 18px system-ui; fill: var(--muted);">=</text>

          <rect x="510" y="0" width="240" height="55" rx="8" fill="var(--result-bg)" stroke="var(--result)" stroke-width="2"/>
          <text x="630" y="20" text-anchor="middle" style="font: bold 18px monospace;">
            <tspan fill="var(--pattern)">ma</tspan><tspan fill="var(--root)">k</tspan><tspan fill="var(--root)">t</tspan><tspan fill="var(--pattern)">a</tspan><tspan fill="var(--root)">b</tspan>
          </text>
          <text x="630" y="38" text-anchor="middle" style="font: bold 12px system-ui; fill: var(--result);">maktab = "office / desk"</text>
          <text x="630" y="52" text-anchor="middle" class="arabic" style="font-size: 14px; fill: var(--fg);">&#x0645;&#x064E;&#x0643;&#x0652;&#x062A;&#x064E;&#x0628;</text>
        </g>
      </g>

      <!-- ENGLISH COMPARISON -->
      <g transform="translate(30,510)">
        <rect width="1000" height="110" rx="10" fill="var(--accent-light)" stroke="var(--accent)" stroke-width="1.5"/>
        <text x="500" y="25" text-anchor="middle" style="font: bold 14px system-ui; fill: var(--accent);">English Comparison: Concatenative (Linear) Morphology</text>

        <g transform="translate(30,40)">
          <rect width="130" height="40" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
          <text x="65" y="25" text-anchor="middle" style="font: bold 14px monospace; fill: #d97706;">un-</text>
        </g>
        <text x="175" y="65" text-anchor="middle" style="font: bold 16px system-ui; fill: var(--muted);">+</text>
        <g transform="translate(195,40)">
          <rect width="130" height="40" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
          <text x="65" y="25" text-anchor="middle" style="font: bold 14px monospace; fill: #2563eb;">break</text>
        </g>
        <text x="340" y="65" text-anchor="middle" style="font: bold 16px system-ui; fill: var(--muted);">+</text>
        <g transform="translate(360,40)">
          <rect width="130" height="40" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
          <text x="65" y="25" text-anchor="middle" style="font: bold 14px monospace; fill: #d97706;">-able</text>
        </g>
        <text x="510" y="65" text-anchor="middle" style="font: bold 16px system-ui; fill: var(--muted);">=</text>
        <g transform="translate(530,40)">
          <rect width="200" height="40" rx="6" fill="#d1fae5" stroke="#059669" stroke-width="1.5"/>
          <text x="100" y="25" text-anchor="middle" style="font: bold 14px monospace;">
            <tspan fill="#d97706">un</tspan><tspan fill="#2563eb">break</tspan><tspan fill="#d97706">able</tspan>
          </text>
        </g>

        <text x="850" y="55" text-anchor="middle" style="font: 11px system-ui; fill: var(--fg);">Pieces stack</text>
        <text x="850" y="72" text-anchor="middle" style="font: 11px system-ui; fill: var(--fg);">end-to-end.</text>
        <text x="850" y="90" text-anchor="middle" style="font: bold 11px system-ui; fill: var(--accent);">You can peel them apart.</text>
      </g>

      <!-- KEY INSIGHT -->
      <g transform="translate(30,635)">
        <rect width="1000" height="120" rx="10" fill="var(--result-bg)" stroke="var(--result)" stroke-width="2"/>
        <text x="500" y="25" text-anchor="middle" style="font: bold 14px system-ui; fill: var(--result);">The Core Difference</text>
        <text x="500" y="50" text-anchor="middle" style="font: 13px system-ui; fill: var(--fg);">English: <tspan style="font-weight:bold">prefix + stem + suffix</tspan> -- morphemes are SEQUENTIAL. You can separate them.</text>
        <text x="500" y="72" text-anchor="middle" style="font: 13px system-ui; fill: var(--fg);">Arabic: <tspan style="font-weight:bold">consonants INTERLEAVED with vowels</tspan> -- morphemes OVERLAP. You cannot separate them without destroying the word.</text>
        <text x="500" y="100" text-anchor="middle" style="font: italic 12px system-ui; fill: var(--muted);">Programming analogy: English = string concatenation ("un" + "break" + "able"). Arabic = template function: merge([k,t,b], [_,a,_,a,_,a]) --> "kataba"</text>
      </g>
    </svg>
  </div>

  <figcaption>
    <h2>Figure 1 -- Root + Pattern = Word: The Interleaving Process</h2>
    <p>The root k-t-b provides the consonant skeleton ("writing"). Four different patterns produce four different words: kataba (he wrote), ka:tib (writer), maktu:b (written/fate), maktab (office). The root consonants (red) and pattern vowels (blue) interleave into a single merged word (green). English, by contrast, stacks morphemes end-to-end -- you can peel them apart. Arabic morphemes overlap and cannot be separated.</p>
  </figcaption>

  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background:var(--root);"></div>Root consonants (semantic content)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--pattern);"></div>Pattern vowels/affixes (grammatical function)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--result);"></div>Resulting word (interleaved)</div>
  </div>
</figure>
</body>
</html>
