<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pattern Semantic Grid: Same Pattern, Different Roots</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --accent: #2563eb; --accent-light: #dbeafe;
    --root: #dc2626; --root-bg: #fee2e2;
    --pattern: #2563eb; --pattern-bg: #dbeafe;
    --result: #059669; --result-bg: #d1fae5;
    --muted: #6c757d; --caption-bg: #f8f9fa;
    --header: #7c3aed; --header-bg: #ede9fe;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a; --fg: #e8e8f0; --surface: #1a1a2e; --border: #2d2d44;
      --accent: #6b8aff; --accent-light: #1e2a4a;
      --root: #f87171; --root-bg: #5c1a1a;
      --pattern: #60a5fa; --pattern-bg: #1e3a5f;
      --result: #34d399; --result-bg: #064e3b;
      --muted: #9a9ab0; --caption-bg: #1a1a2e;
      --header: #a78bfa; --header-bg: #2e1f5e;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--fg); display: flex; justify-content: center; padding: 2rem 1rem; line-height: 1.6; }
  figure { max-width: 1200px; width: 100%; }
  .diagram-container { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 1.5rem 1rem; overflow-x: auto; }
  figcaption { text-align: center; margin-top: 1.5rem; padding: 1rem 1.5rem; background: var(--caption-bg); border-radius: 8px; border: 1px solid var(--border); }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  .legend { display: flex; gap: 1.5rem; justify-content: center; flex-wrap: wrap; margin-top: 1rem; font-size: 0.82rem; color: var(--muted); }
  .legend-item { display: flex; align-items: center; gap: 0.4rem; }
  .legend-swatch { width: 14px; height: 14px; border-radius: 3px; border: 1px solid var(--border); }

  table { border-collapse: collapse; width: 100%; min-width: 950px; font-size: 0.9rem; }
  th, td { border: 1px solid var(--border); padding: 10px 8px; text-align: center; vertical-align: middle; }
  th { font-weight: 600; }
  th.pattern-header { background: var(--pattern-bg); color: var(--pattern); }
  th.root-header { background: var(--root-bg); color: var(--root); }
  th.function-header { background: var(--header-bg); color: var(--header); font-size: 0.8rem; }
  td.root-cell { background: var(--root-bg); font-weight: 600; color: var(--root); }
  td.word-cell { background: var(--result-bg); }
  .word-main { font-weight: 600; font-size: 1rem; color: var(--fg); }
  .word-meaning { font-size: 0.8rem; color: var(--muted); font-style: italic; }
  .arabic { font-family: 'Noto Sans Arabic', 'Geeza Pro', serif; }
  h3 { text-align: center; margin-bottom: 0.5rem; font-size: 1.1rem; color: var(--fg); }
  .insight { text-align: center; margin-top: 1rem; padding: 0.8rem; background: var(--accent-light); border-radius: 8px; border: 1px solid var(--accent); font-size: 0.9rem; color: var(--fg); }
  .insight strong { color: var(--accent); }
</style>
</head>
<body>
<figure>
  <div class="diagram-container">
    <h3>Pattern Semantic Grid: The Pattern IS the Function</h3>
    <p style="text-align:center; font-size:0.85rem; color:var(--muted); margin-bottom:1rem;">Read across a row: same root, different patterns = different grammatical roles. Read down a column: same pattern, different roots = same grammatical role.</p>

    <table>
      <thead>
        <tr>
          <th class="root-header">Root</th>
          <th class="root-header">Meaning Field</th>
          <th class="pattern-header">fa&#x0295;ala<br/><span style="font-weight:normal;font-size:0.8rem;">CaCaCa</span></th>
          <th class="pattern-header">fa:&#x0295;il<br/><span style="font-weight:normal;font-size:0.8rem;">Ca:CiC</span></th>
          <th class="pattern-header">maf&#x0295;u:l<br/><span style="font-weight:normal;font-size:0.8rem;">maCCu:C</span></th>
          <th class="pattern-header">maf&#x0295;al<br/><span style="font-weight:normal;font-size:0.8rem;">maCCaC</span></th>
          <th class="pattern-header">fi&#x0295;a:la<br/><span style="font-weight:normal;font-size:0.8rem;">CiCa:Ca</span></th>
          <th class="pattern-header">fa&#x0295;&#x0295;a:l<br/><span style="font-weight:normal;font-size:0.8rem;">CaCCa:C</span></th>
        </tr>
        <tr>
          <th class="function-header" colspan="2"></th>
          <th class="function-header">He did X</th>
          <th class="function-header">Doer of X</th>
          <th class="function-header">Thing X-ed</th>
          <th class="function-header">Place of X</th>
          <th class="function-header">The act of X</th>
          <th class="function-header">Professional X-er</th>
        </tr>
      </thead>
      <tbody>
        <!-- k-t-b row -->
        <tr>
          <td class="root-cell">k-t-b</td>
          <td class="root-cell" style="font-size:0.85rem;">writing</td>
          <td class="word-cell"><div class="word-main">kataba</div><div class="word-meaning">he wrote</div></td>
          <td class="word-cell"><div class="word-main">ka:tib</div><div class="word-meaning">writer</div></td>
          <td class="word-cell"><div class="word-main">maktu:b</div><div class="word-meaning">written / fate</div></td>
          <td class="word-cell"><div class="word-main">maktab</div><div class="word-meaning">office / desk</div></td>
          <td class="word-cell"><div class="word-main">kita:ba</div><div class="word-meaning">writing (act)</div></td>
          <td class="word-cell"><div class="word-main">katta:b</div><div class="word-meaning">prolific writer</div></td>
        </tr>
        <!-- d-r-s row -->
        <tr>
          <td class="root-cell">d-r-s</td>
          <td class="root-cell" style="font-size:0.85rem;">studying</td>
          <td class="word-cell"><div class="word-main">darasa</div><div class="word-meaning">he studied</div></td>
          <td class="word-cell"><div class="word-main">da:ris</div><div class="word-meaning">studier</div></td>
          <td class="word-cell"><div class="word-main">madru:s</div><div class="word-meaning">studied</div></td>
          <td class="word-cell"><div class="word-main">madrasa</div><div class="word-meaning">school</div></td>
          <td class="word-cell"><div class="word-main">dira:sa</div><div class="word-meaning">study (act)</div></td>
          <td class="word-cell"><div class="word-main">darra:s</div><div class="word-meaning">avid studier</div></td>
        </tr>
        <!-- '-l-m row -->
        <tr>
          <td class="root-cell">&#x0295;-l-m</td>
          <td class="root-cell" style="font-size:0.85rem;">knowing</td>
          <td class="word-cell"><div class="word-main">&#x0295;alima</div><div class="word-meaning">he knew</div></td>
          <td class="word-cell"><div class="word-main">&#x0295;a:lim</div><div class="word-meaning">scientist</div></td>
          <td class="word-cell"><div class="word-main">ma&#x0295;lu:m</div><div class="word-meaning">known</div></td>
          <td class="word-cell"><div class="word-main">ma&#x0295;mal</div><div class="word-meaning">factory / lab</div></td>
          <td class="word-cell" style="background:var(--surface);"><div class="word-main" style="color:var(--muted);">--</div><div class="word-meaning">(&#x0295;ilm instead)</div></td>
          <td class="word-cell"><div class="word-main">&#x0295;alla:m</div><div class="word-meaning">very knowledgeable</div></td>
        </tr>
        <!-- t-b-kh row -->
        <tr>
          <td class="root-cell">t&#x02E4;-b-kh</td>
          <td class="root-cell" style="font-size:0.85rem;">cooking</td>
          <td class="word-cell"><div class="word-main">t&#x02E4;abakha</div><div class="word-meaning">he cooked</div></td>
          <td class="word-cell"><div class="word-main">t&#x02E4;a:bikh</div><div class="word-meaning">cook (person)</div></td>
          <td class="word-cell"><div class="word-main">mat&#x02E4;bu:kh</div><div class="word-meaning">cooked</div></td>
          <td class="word-cell"><div class="word-main">mat&#x02E4;bakh</div><div class="word-meaning">kitchen</div></td>
          <td class="word-cell"><div class="word-main">t&#x02E4;iba:kha</div><div class="word-meaning">cooking (act)</div></td>
          <td class="word-cell"><div class="word-main">t&#x02E4;abba:kh</div><div class="word-meaning">chef</div></td>
        </tr>
        <!-- h-k-m row -->
        <tr>
          <td class="root-cell">h&#x02E4;-k-m</td>
          <td class="root-cell" style="font-size:0.85rem;">judging</td>
          <td class="word-cell"><div class="word-main">h&#x02E4;akama</div><div class="word-meaning">he judged</div></td>
          <td class="word-cell"><div class="word-main">h&#x02E4;a:kim</div><div class="word-meaning">ruler / judge</div></td>
          <td class="word-cell"><div class="word-main">mah&#x02E4;ku:m</div><div class="word-meaning">judged / ruled</div></td>
          <td class="word-cell"><div class="word-main">mah&#x02E4;kama</div><div class="word-meaning">court (of law)</div></td>
          <td class="word-cell" style="background:var(--surface);"><div class="word-main" style="color:var(--muted);">--</div><div class="word-meaning">(h&#x02E4;ukm instead)</div></td>
          <td class="word-cell"><div class="word-main">h&#x02E4;akka:m</div><div class="word-meaning">referee</div></td>
        </tr>
      </tbody>
    </table>

    <div class="insight">
      <strong>The Pattern:</strong> Read any COLUMN and every word has the same grammatical function (doer, place, etc.) despite completely different meanings. Read any ROW and every word shares the same semantic field despite completely different grammatical roles. <strong>The root is the argument. The pattern is the function. Arabic morphology is a two-dimensional grid.</strong>
    </div>

    <div class="insight" style="margin-top:0.5rem;">
      <strong>English comparison:</strong> English has nothing this systematic. "-er" sometimes makes agent nouns (writer, teacher), but "computer" is not a person who computes, "dinner" is not a person who dins, and "hammer" is not a person who hams. Arabic's pattern-to-meaning mappings are far more consistent.
    </div>
  </div>

  <figcaption>
    <h2>Figure 3 -- Pattern Semantic Grid</h2>
    <p>Five roots combined with six patterns produce 30 predictable words. The grey cells show gaps where a particular root-pattern combination does not exist (irregular verbal nouns). The regularity of the grid -- not its exceptions -- is the defining feature. If you know the root (semantic field) and the pattern (grammatical function), you can predict the word.</p>
  </figcaption>

  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background:var(--root);"></div>Root (rows = semantic field)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--pattern);"></div>Pattern (columns = grammatical function)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--result);"></div>Resulting word (intersection)</div>
  </div>
</figure>
</body>
</html>
