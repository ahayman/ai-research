<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The f-ʕ-l Meta-Template System</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --accent: #2563eb; --accent-light: #dbeafe;
    --slot1: #dc2626; --slot2: #059669; --slot3: #7c3aed;
    --template: #d97706; --template-bg: #fef3c7;
    --result: #2563eb; --result-bg: #dbeafe;
    --muted: #6c757d; --caption-bg: #f8f9fa;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a; --fg: #e8e8f0; --surface: #1a1a2e; --border: #2d2d44;
      --accent: #6b8aff; --accent-light: #1e2a4a;
      --slot1: #f87171; --slot2: #34d399; --slot3: #a78bfa;
      --template: #fbbf24; --template-bg: #4a3520;
      --result: #60a5fa; --result-bg: #1e3a5f;
      --muted: #9a9ab0; --caption-bg: #1a1a2e;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--fg); display: flex; justify-content: center; padding: 2rem 1rem; line-height: 1.6; }
  figure { max-width: 1100px; width: 100%; }
  .diagram-container { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 1.5rem 1rem; overflow-x: auto; }
  figcaption { text-align: center; margin-top: 1.5rem; padding: 1rem 1.5rem; background: var(--caption-bg); border-radius: 8px; border: 1px solid var(--border); }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  .legend { display: flex; gap: 1.5rem; justify-content: center; flex-wrap: wrap; margin-top: 1rem; font-size: 0.82rem; color: var(--muted); }
  .legend-item { display: flex; align-items: center; gap: 0.4rem; }
  .legend-swatch { width: 14px; height: 14px; border-radius: 3px; border: 1px solid var(--border); }
  svg { display: block; margin: 0 auto; }
  .arabic { font-family: 'Noto Sans Arabic', 'Geeza Pro', serif; }
</style>
</head>
<body>
<figure>
  <div class="diagram-container">
    <svg viewBox="0 0 1060 720" xmlns="http://www.w3.org/2000/svg" style="min-width:780px;">
      <text x="530" y="28" text-anchor="middle" style="font: bold 16px system-ui; fill: var(--fg);">The f-&#x0295;-l Meta-Template: A 1,000-Year-Old Function Definition</text>
      <text x="530" y="48" text-anchor="middle" style="font: 11px system-ui; fill: var(--muted);">Arabic grammarians use the root "to do" (&#x0641;-&#x0639;-&#x0644;) as abstract placeholder notation for any root</text>

      <!-- THE ABSTRACT TEMPLATE -->
      <g transform="translate(30,75)">
        <rect width="1000" height="140" rx="10" fill="var(--template-bg)" stroke="var(--template)" stroke-width="2"/>
        <text x="500" y="25" text-anchor="middle" style="font: bold 14px system-ui; fill: var(--template);">THE ABSTRACT TEMPLATE (function definition)</text>

        <!-- Three slots -->
        <g transform="translate(100,45)">
          <rect width="180" height="70" rx="10" fill="var(--surface)" stroke="var(--slot1)" stroke-width="2"/>
          <text x="90" y="25" text-anchor="middle" style="font: bold 16px system-ui; fill: var(--slot1);">&#x0641; fa:' (C&#x2081;)</text>
          <text x="90" y="45" text-anchor="middle" style="font: 12px system-ui; fill: var(--fg);">1st root consonant</text>
          <text x="90" y="63" text-anchor="middle" class="arabic" style="font-size: 14px; fill: var(--muted);">&#x0641;&#x0627;&#x0621;</text>
        </g>

        <g transform="translate(400,45)">
          <rect width="180" height="70" rx="10" fill="var(--surface)" stroke="var(--slot2)" stroke-width="2"/>
          <text x="90" y="25" text-anchor="middle" style="font: bold 16px system-ui; fill: var(--slot2);">&#x0295; &#x02BF;ayn (C&#x2082;)</text>
          <text x="90" y="45" text-anchor="middle" style="font: 12px system-ui; fill: var(--fg);">2nd root consonant</text>
          <text x="90" y="63" text-anchor="middle" class="arabic" style="font-size: 14px; fill: var(--muted);">&#x0639;&#x064E;&#x064A;&#x0652;&#x0646;</text>
        </g>

        <g transform="translate(700,45)">
          <rect width="180" height="70" rx="10" fill="var(--surface)" stroke="var(--slot3)" stroke-width="2"/>
          <text x="90" y="25" text-anchor="middle" style="font: bold 16px system-ui; fill: var(--slot3);">l la:m (C&#x2083;)</text>
          <text x="90" y="45" text-anchor="middle" style="font: 12px system-ui; fill: var(--fg);">3rd root consonant</text>
          <text x="90" y="63" text-anchor="middle" class="arabic" style="font-size: 14px; fill: var(--muted);">&#x0644;&#x0627;&#x0645;</text>
        </g>
      </g>

      <!-- PATTERN EXAMPLES with instantiation arrows -->
      <g transform="translate(30,240)">
        <text x="500" y="0" text-anchor="middle" style="font: bold 14px system-ui; fill: var(--accent);">Template Instantiations (calling the function with different arguments)</text>

        <!-- fa:'il pattern -->
        <g transform="translate(0,20)">
          <rect width="200" height="55" rx="8" fill="var(--template-bg)" stroke="var(--template)" stroke-width="1.5"/>
          <text x="100" y="22" text-anchor="middle" style="font: bold 14px system-ui; fill: var(--template);">Pattern: fa:&#x0295;il</text>
          <text x="100" y="42" text-anchor="middle" style="font: 11px system-ui; fill: var(--muted);">"doer of action"</text>

          <!-- Arrow to k-t-b -->
          <line x1="210" y1="28" x2="310" y2="28" stroke="var(--accent)" stroke-width="1.5" marker-end="url(#arrMeta)"/>

          <rect x="320" y="0" width="200" height="55" rx="8" fill="var(--result-bg)" stroke="var(--result)" stroke-width="1.5"/>
          <text x="420" y="22" text-anchor="middle" style="font: bold 14px monospace;">
            <tspan fill="var(--slot1)">k</tspan>a:<tspan fill="var(--slot2)">t</tspan>i<tspan fill="var(--slot3)">b</tspan>
          </text>
          <text x="420" y="42" text-anchor="middle" style="font: 11px system-ui; fill: var(--result);">k-t-b --> writer</text>

          <line x1="530" y1="28" x2="620" y2="28" stroke="var(--accent)" stroke-width="1" stroke-dasharray="4,3"/>

          <rect x="630" y="0" width="200" height="55" rx="8" fill="var(--result-bg)" stroke="var(--result)" stroke-width="1.5"/>
          <text x="730" y="22" text-anchor="middle" style="font: bold 14px monospace;">
            <tspan fill="var(--slot1)">d</tspan>a:<tspan fill="var(--slot2)">r</tspan>i<tspan fill="var(--slot3)">s</tspan>
          </text>
          <text x="730" y="42" text-anchor="middle" style="font: 11px system-ui; fill: var(--result);">d-r-s --> studier</text>
        </g>

        <!-- maf'u:l pattern -->
        <g transform="translate(0,90)">
          <rect width="200" height="55" rx="8" fill="var(--template-bg)" stroke="var(--template)" stroke-width="1.5"/>
          <text x="100" y="22" text-anchor="middle" style="font: bold 14px system-ui; fill: var(--template);">Pattern: maf&#x0295;u:l</text>
          <text x="100" y="42" text-anchor="middle" style="font: 11px system-ui; fill: var(--muted);">"thing acted upon"</text>

          <line x1="210" y1="28" x2="310" y2="28" stroke="var(--accent)" stroke-width="1.5" marker-end="url(#arrMeta)"/>

          <rect x="320" y="0" width="200" height="55" rx="8" fill="var(--result-bg)" stroke="var(--result)" stroke-width="1.5"/>
          <text x="420" y="22" text-anchor="middle" style="font: bold 14px monospace;">
            ma<tspan fill="var(--slot1)">k</tspan><tspan fill="var(--slot2)">t</tspan>u:<tspan fill="var(--slot3)">b</tspan>
          </text>
          <text x="420" y="42" text-anchor="middle" style="font: 11px system-ui; fill: var(--result);">k-t-b --> written</text>

          <line x1="530" y1="28" x2="620" y2="28" stroke="var(--accent)" stroke-width="1" stroke-dasharray="4,3"/>

          <rect x="630" y="0" width="200" height="55" rx="8" fill="var(--result-bg)" stroke="var(--result)" stroke-width="1.5"/>
          <text x="730" y="22" text-anchor="middle" style="font: bold 14px monospace;">
            ma<tspan fill="var(--slot1)">&#x0295;</tspan><tspan fill="var(--slot2)">l</tspan>u:<tspan fill="var(--slot3)">m</tspan>
          </text>
          <text x="730" y="42" text-anchor="middle" style="font: 11px system-ui; fill: var(--result);">&#x0295;-l-m --> known</text>
        </g>

        <!-- maf'al pattern -->
        <g transform="translate(0,160)">
          <rect width="200" height="55" rx="8" fill="var(--template-bg)" stroke="var(--template)" stroke-width="1.5"/>
          <text x="100" y="22" text-anchor="middle" style="font: bold 14px system-ui; fill: var(--template);">Pattern: maf&#x0295;al</text>
          <text x="100" y="42" text-anchor="middle" style="font: 11px system-ui; fill: var(--muted);">"place of action"</text>

          <line x1="210" y1="28" x2="310" y2="28" stroke="var(--accent)" stroke-width="1.5" marker-end="url(#arrMeta)"/>

          <rect x="320" y="0" width="200" height="55" rx="8" fill="var(--result-bg)" stroke="var(--result)" stroke-width="1.5"/>
          <text x="420" y="22" text-anchor="middle" style="font: bold 14px monospace;">
            ma<tspan fill="var(--slot1)">k</tspan><tspan fill="var(--slot2)">t</tspan>a<tspan fill="var(--slot3)">b</tspan>
          </text>
          <text x="420" y="42" text-anchor="middle" style="font: 11px system-ui; fill: var(--result);">k-t-b --> office</text>

          <line x1="530" y1="28" x2="620" y2="28" stroke="var(--accent)" stroke-width="1" stroke-dasharray="4,3"/>

          <rect x="630" y="0" width="200" height="55" rx="8" fill="var(--result-bg)" stroke="var(--result)" stroke-width="1.5"/>
          <text x="730" y="22" text-anchor="middle" style="font: bold 14px monospace;">
            ma<tspan fill="var(--slot1)">d</tspan><tspan fill="var(--slot2)">r</tspan>a<tspan fill="var(--slot3)">s</tspan>a
          </text>
          <text x="730" y="42" text-anchor="middle" style="font: 11px system-ui; fill: var(--result);">d-r-s --> school</text>
        </g>

        <!-- fa''a:l pattern -->
        <g transform="translate(0,230)">
          <rect width="200" height="55" rx="8" fill="var(--template-bg)" stroke="var(--template)" stroke-width="1.5"/>
          <text x="100" y="22" text-anchor="middle" style="font: bold 14px system-ui; fill: var(--template);">Pattern: fa&#x0295;&#x0295;a:l</text>
          <text x="100" y="42" text-anchor="middle" style="font: 11px system-ui; fill: var(--muted);">"professional / intense"</text>

          <line x1="210" y1="28" x2="310" y2="28" stroke="var(--accent)" stroke-width="1.5" marker-end="url(#arrMeta)"/>

          <rect x="320" y="0" width="200" height="55" rx="8" fill="var(--result-bg)" stroke="var(--result)" stroke-width="1.5"/>
          <text x="420" y="22" text-anchor="middle" style="font: bold 14px monospace;">
            <tspan fill="var(--slot1)">h&#x02E4;</tspan>a<tspan fill="var(--slot2)">dd</tspan>a:<tspan fill="var(--slot3)">d</tspan>
          </text>
          <text x="420" y="42" text-anchor="middle" style="font: 11px system-ui; fill: var(--result);">h&#x02E4;-d-d --> blacksmith</text>

          <line x1="530" y1="28" x2="620" y2="28" stroke="var(--accent)" stroke-width="1" stroke-dasharray="4,3"/>

          <rect x="630" y="0" width="200" height="55" rx="8" fill="var(--result-bg)" stroke="var(--result)" stroke-width="1.5"/>
          <text x="730" y="22" text-anchor="middle" style="font: bold 14px monospace;">
            <tspan fill="var(--slot1)">n</tspan>a<tspan fill="var(--slot2)">jj</tspan>a:<tspan fill="var(--slot3)">r</tspan>
          </text>
          <text x="730" y="42" text-anchor="middle" style="font: 11px system-ui; fill: var(--result);">n-j-r --> carpenter</text>
        </g>
      </g>

      <!-- PROGRAMMING ANALOGY -->
      <g transform="translate(30,570)">
        <rect width="1000" height="130" rx="10" fill="var(--accent-light)" stroke="var(--accent)" stroke-width="1.5"/>
        <text x="500" y="25" text-anchor="middle" style="font: bold 14px system-ui; fill: var(--accent);">The Programming Analogy</text>
        <text x="500" y="55" text-anchor="middle" style="font: 13px monospace; fill: var(--fg);">function fa:&#x0295;il(C1, C2, C3) { return C1 + "a:" + C2 + "i" + C3; }</text>
        <text x="500" y="80" text-anchor="middle" style="font: 13px monospace; fill: var(--fg);">fa:&#x0295;il("k", "t", "b") // --> "ka:tib" (writer)</text>
        <text x="500" y="100" text-anchor="middle" style="font: 13px monospace; fill: var(--fg);">fa:&#x0295;il("d", "r", "s") // --> "da:ris" (studier)</text>
        <text x="500" y="122" text-anchor="middle" style="font: italic 11px system-ui; fill: var(--muted);">The pattern is the function. The root is the argument. Arabic grammarians invented this abstraction over 1,000 years ago.</text>
      </g>

      <defs>
        <marker id="arrMeta" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="var(--accent)"/>
        </marker>
      </defs>
    </svg>
  </div>

  <figcaption>
    <h2>Figure 5 -- The f-&#x0295;-l Meta-Template System</h2>
    <p>Arabic grammarians use the root f-&#x0295;-l ("to do") as abstract placeholder notation: C1 = fa:', C2 = &#x02BF;ayn, C3 = la:m. Any pattern can be described in f-&#x0295;-l notation, then instantiated with any compatible root. This is functionally identical to defining a function in programming: the pattern is the function definition, and the root is the argument passed at call time. The system was invented by Arabic grammarians like Sibawayh over 1,000 years ago -- one of the oldest formal metalinguistic notations in the world.</p>
  </figcaption>

  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background:var(--slot1);"></div>C1 (fa:' position)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--slot2);"></div>C2 (&#x02BF;ayn position)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--slot3);"></div>C3 (la:m position)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--template);"></div>Pattern template</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--result);"></div>Instantiated word</div>
  </div>
</figure>
</body>
</html>
