<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Numeral Reverse Polarity -- Numerals 3-10</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --accent: #4361ee;
    --accent-light: #e8edff;
    --masc: #0077b6;
    --masc-bg: #e8f4f8;
    --fem: #e63946;
    --fem-bg: #fef3f0;
    --cross: #d4770b;
    --cross-bg: #fdf6ec;
    --english: #6c757d;
    --english-bg: #f0f0f5;
    --muted: #6c757d;
    --caption-bg: #f8f9fa;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --accent: #6b8aff;
      --accent-light: #1e2a4a;
      --masc: #5dade2;
      --masc-bg: #102030;
      --fem: #ff6b6b;
      --fem-bg: #2a1520;
      --cross: #f0c050;
      --cross-bg: #2a2210;
      --english: #888;
      --english-bg: #1e1e30;
      --muted: #9a9ab0;
      --caption-bg: #1a1a2e;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure { max-width: 1000px; width: 100%; }
  .chart-wrapper {
    overflow-x: auto;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--surface);
    padding: 1.5rem;
  }
  .section-title {
    font-size: 1rem;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 0.8rem;
    padding-bottom: 0.3rem;
    border-bottom: 2px solid var(--accent);
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding: 1rem 1.5rem;
    background: var(--caption-bg);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  .arabic-text {
    font-family: 'Traditional Arabic', 'Scheherazade', serif;
    direction: rtl;
  }

  /* Cross diagram */
  .cross-display {
    display: flex;
    justify-content: center;
    gap: 2rem;
    margin: 1.5rem 0;
  }
  .cross-example {
    text-align: center;
    min-width: 200px;
  }
  .cross-noun {
    padding: 0.6rem 1rem;
    border-radius: 8px 8px 0 0;
    font-weight: 700;
    font-size: 0.85rem;
    border: 2px solid;
    border-bottom: none;
  }
  .noun-masc { background: var(--masc-bg); border-color: var(--masc); color: var(--masc); }
  .noun-fem { background: var(--fem-bg); border-color: var(--fem); color: var(--fem); }
  .cross-numeral {
    padding: 0.6rem 1rem;
    border-radius: 0 0 8px 8px;
    font-weight: 700;
    font-size: 0.85rem;
    border: 2px solid;
    border-top: 2px dashed;
  }
  .num-fem { background: var(--fem-bg); border-color: var(--fem); color: var(--fem); }
  .num-masc { background: var(--masc-bg); border-color: var(--masc); color: var(--masc); }

  .cross-line {
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0.2rem 0;
    font-size: 1.2rem;
    font-weight: 900;
    color: var(--cross);
  }

  .cross-arabic {
    font-family: 'Traditional Arabic', 'Scheherazade', serif;
    font-size: 1.2rem;
    direction: rtl;
    margin: 0.3rem 0;
  }
  .cross-translit { font-size: 0.75rem; color: var(--muted); font-style: italic; }

  /* SVG crossing lines */
  .cross-svg-wrapper { text-align: center; margin: 1rem 0; }

  /* Range table */
  .range-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.8rem;
    margin: 1rem 0;
  }
  .range-table th, .range-table td {
    padding: 0.5rem 0.6rem;
    border: 1px solid var(--border);
    text-align: center;
  }
  .range-table th {
    background: var(--accent-light);
    color: var(--accent);
    font-weight: 700;
  }
  .row-highlight { background: var(--cross-bg); }
  .row-highlight td:nth-child(2) { color: var(--cross); font-weight: 700; }

  .english-compare {
    margin-top: 1.2rem;
    padding: 0.8rem 1rem;
    background: var(--english-bg);
    border-radius: 8px;
    border-left: 4px solid var(--english);
    font-size: 0.85rem;
  }
  .english-compare strong { color: var(--english); }
  .pattern-note {
    margin-top: 1rem;
    padding: 0.8rem 1rem;
    background: var(--accent-light);
    border-radius: 8px;
    border-left: 4px solid var(--accent);
    font-size: 0.85rem;
  }
  .pattern-note strong { color: var(--accent); }
</style>
</head>
<body>
<figure>
  <div class="chart-wrapper">
    <div class="section-title">Numeral Reverse Polarity -- Numerals 3-10 Take the OPPOSITE Gender</div>

    <div class="cross-svg-wrapper">
      <svg viewBox="0 0 600 200" xmlns="http://www.w3.org/2000/svg" style="max-width:600px;margin:0 auto;display:block;">
        <!-- Left: masculine noun -->
        <rect x="30" y="20" width="180" height="40" rx="8" fill="var(--masc-bg)" stroke="var(--masc)" stroke-width="2"/>
        <text x="120" y="38" text-anchor="middle" font-weight="700" font-size="12" fill="var(--masc)">NOUN: masculine</text>
        <text x="120" y="52" text-anchor="middle" font-size="10" fill="var(--muted)">kitab "book"</text>

        <!-- Right: feminine noun -->
        <rect x="390" y="20" width="180" height="40" rx="8" fill="var(--fem-bg)" stroke="var(--fem)" stroke-width="2"/>
        <text x="480" y="38" text-anchor="middle" font-weight="700" font-size="12" fill="var(--fem)">NOUN: feminine</text>
        <text x="480" y="52" text-anchor="middle" font-size="10" fill="var(--muted)">madrasa "school"</text>

        <!-- Left bottom: feminine numeral -->
        <rect x="30" y="140" width="180" height="40" rx="8" fill="var(--fem-bg)" stroke="var(--fem)" stroke-width="2"/>
        <text x="120" y="158" text-anchor="middle" font-weight="700" font-size="12" fill="var(--fem)">NUMERAL: feminine</text>
        <text x="120" y="172" text-anchor="middle" font-size="10" fill="var(--muted)">thalatha(t) "three" + ta</text>

        <!-- Right bottom: masculine numeral -->
        <rect x="390" y="140" width="180" height="40" rx="8" fill="var(--masc-bg)" stroke="var(--masc)" stroke-width="2"/>
        <text x="480" y="158" text-anchor="middle" font-weight="700" font-size="12" fill="var(--masc)">NUMERAL: masculine</text>
        <text x="480" y="172" text-anchor="middle" font-size="10" fill="var(--muted)">thalath "three" no ta</text>

        <!-- Crossing lines -->
        <line x1="120" y1="60" x2="480" y2="140" stroke="var(--cross)" stroke-width="3" stroke-dasharray="6,3"/>
        <line x1="480" y1="60" x2="120" y2="140" stroke="var(--cross)" stroke-width="3" stroke-dasharray="6,3"/>

        <!-- X label -->
        <text x="300" y="108" text-anchor="middle" font-weight="900" font-size="18" fill="var(--cross)">GENDER FLIP</text>
      </svg>
    </div>

    <div class="cross-display">
      <div class="cross-example">
        <div class="cross-noun noun-masc">Noun: <span style="font-size:0.8rem;">masculine</span></div>
        <div class="cross-line">+</div>
        <div class="cross-numeral num-fem">Numeral "3": <span style="font-size:0.8rem;">feminine form (with ة)</span></div>
        <div class="cross-arabic">ثَلاثةُ كُتُبٍ</div>
        <div class="cross-translit">thalathatu kutubin</div>
        <div style="font-size:0.82rem;font-weight:600;">"three books"</div>
      </div>
      <div class="cross-example">
        <div class="cross-noun noun-fem">Noun: <span style="font-size:0.8rem;">feminine</span></div>
        <div class="cross-line">+</div>
        <div class="cross-numeral num-masc">Numeral "3": <span style="font-size:0.8rem;">masculine form (no ة)</span></div>
        <div class="cross-arabic">ثَلاثُ مَدارِسَ</div>
        <div class="cross-translit">thalathu madarisa</div>
        <div style="font-size:0.82rem;font-weight:600;">"three schools"</div>
      </div>
    </div>

    <div class="section-title" style="margin-top:1.5rem;">The Full Numeral Agreement Patchwork</div>
    <table class="range-table">
      <thead>
        <tr>
          <th>Number Range</th>
          <th>Gender Agreement</th>
          <th>Counted Noun Form</th>
          <th>Example</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>1-2</td>
          <td>Numeral <strong>agrees</strong> with noun</td>
          <td>Singular (1) or dual (2)</td>
          <td><em>kitabani ithnani</em> "two books"</td>
        </tr>
        <tr class="row-highlight">
          <td><strong>3-10</strong></td>
          <td><strong>REVERSE POLARITY</strong></td>
          <td><strong>Genitive plural</strong></td>
          <td><em>thalathatu kutubin</em> "three books"</td>
        </tr>
        <tr>
          <td>11-12</td>
          <td>Complex compound</td>
          <td>Accusative singular</td>
          <td><em>ithna 'ashara kitaban</em> "twelve books"</td>
        </tr>
        <tr>
          <td>13-19</td>
          <td>Units: reverse; tens: agree</td>
          <td>Accusative singular</td>
          <td><em>thalathata 'ashara kitaban</em> "thirteen books"</td>
        </tr>
        <tr>
          <td>20-99</td>
          <td>Units follow own rules; tens invariant</td>
          <td>Accusative singular</td>
          <td><em>'ishrina kitaban</em> "twenty books"</td>
        </tr>
        <tr>
          <td>100+</td>
          <td>Numeral is invariant</td>
          <td>Genitive singular</td>
          <td><em>mi'atu kitabin</em> "a hundred books"</td>
        </tr>
      </tbody>
    </table>

    <div class="english-compare">
      <strong>English comparison:</strong> English numerals have zero gender agreement. "Three books," "three schools," "three women" -- "three" never changes. This total absence of numeral agreement is the norm for analytic languages. Arabic's patchwork of different rules for different number ranges is among the most complex numeral agreement systems in any major language.
    </div>

    <div class="pattern-note">
      <strong>The pattern:</strong> The numeral system is a <em>patchwork</em>, not a single rule. Each range (1-2, 3-10, 11-19, 20-99, 100+) has its own agreement behavior AND its own counted-noun form. The 3-10 reverse polarity is the most famous piece, but the full picture is a structured matrix of six different zones, each with its own rules. Once you see the zones, the system organizes itself.
    </div>
  </div>

  <figcaption>
    <h2>Figure 4 &mdash; Numeral Reverse Polarity</h2>
    <p>For numerals 3-10, the numeral takes the opposite gender of the counted noun: masculine nouns get feminine numerals and vice versa. The crossing-lines diagram shows the gender flip visually. The full numeral system is a patchwork of six zones, each with different agreement rules.</p>
  </figcaption>
</figure>
</body>
</html>
