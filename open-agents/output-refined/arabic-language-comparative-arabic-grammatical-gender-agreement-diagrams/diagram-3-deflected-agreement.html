<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deflected Agreement -- The Rule That Breaks Learners' Brains</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --accent: #4361ee;
    --accent-light: #e8edff;
    --masc: #0077b6;
    --masc-bg: #e8f4f8;
    --fem: #e63946;
    --fem-bg: #fef3f0;
    --surprise: #d4770b;
    --surprise-bg: #fdf6ec;
    --regular: #2d8a4e;
    --regular-bg: #f0faf0;
    --english: #6c757d;
    --english-bg: #f0f0f5;
    --muted: #6c757d;
    --caption-bg: #f8f9fa;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --accent: #6b8aff;
      --accent-light: #1e2a4a;
      --masc: #5dade2;
      --masc-bg: #102030;
      --fem: #ff6b6b;
      --fem-bg: #2a1520;
      --surprise: #f0c050;
      --surprise-bg: #2a2210;
      --regular: #5cb87a;
      --regular-bg: #102a18;
      --english: #888;
      --english-bg: #1e1e30;
      --muted: #9a9ab0;
      --caption-bg: #1a1a2e;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure { max-width: 1050px; width: 100%; }
  .chart-wrapper {
    overflow-x: auto;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--surface);
    padding: 1.5rem;
  }
  .section-title {
    font-size: 1rem;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 0.8rem;
    padding-bottom: 0.3rem;
    border-bottom: 2px solid var(--accent);
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding: 1rem 1.5rem;
    background: var(--caption-bg);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  .arabic-text {
    font-family: 'Traditional Arabic', 'Scheherazade', serif;
    font-size: 1rem;
    direction: rtl;
  }

  /* Rule box */
  .rule-box {
    margin: 1rem 0;
    padding: 1.2rem;
    border: 3px solid var(--surprise);
    border-radius: 12px;
    background: var(--surprise-bg);
    text-align: center;
  }
  .rule-box .rule-label { font-size: 0.8rem; font-weight: 700; color: var(--surprise); text-transform: uppercase; letter-spacing: 0.05em; }
  .rule-box .rule-text { font-size: 1.1rem; font-weight: 700; margin-top: 0.3rem; }
  .rule-box .rule-sub { font-size: 0.82rem; color: var(--muted); margin-top: 0.2rem; }

  /* Contrast panels */
  .contrast-row {
    display: flex;
    gap: 1rem;
    margin: 1rem 0;
  }
  .contrast-panel {
    flex: 1;
    border: 2px solid;
    border-radius: 10px;
    padding: 1rem;
    text-align: center;
  }
  .panel-expected { border-color: var(--regular); background: var(--regular-bg); }
  .panel-deflected { border-color: var(--surprise); background: var(--surprise-bg); }
  .panel-title { font-weight: 700; font-size: 0.9rem; margin-bottom: 0.5rem; }
  .panel-expected .panel-title { color: var(--regular); }
  .panel-deflected .panel-title { color: var(--surprise); }
  .panel-example { margin: 0.5rem 0; }
  .panel-arabic { font-family: 'Traditional Arabic', 'Scheherazade', serif; font-size: 1.2rem; direction: rtl; }
  .panel-translit { font-size: 0.78rem; color: var(--muted); font-style: italic; }
  .panel-meaning { font-size: 0.85rem; font-weight: 600; }
  .panel-annotation {
    font-size: 0.78rem;
    margin-top: 0.3rem;
    padding: 0.3rem;
    border-radius: 4px;
  }
  .ann-regular { background: var(--regular-bg); color: var(--regular); border: 1px solid var(--regular); }
  .ann-deflected { background: var(--fem-bg); color: var(--fem); border: 1px solid var(--fem); }

  /* Comprehensive table */
  .dtable {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.8rem;
    margin: 1rem 0;
  }
  .dtable th, .dtable td {
    padding: 0.5rem 0.6rem;
    border: 1px solid var(--border);
    text-align: center;
    vertical-align: middle;
  }
  .dtable th {
    background: var(--accent-light);
    color: var(--accent);
    font-weight: 700;
  }
  .dtable .human-row { background: var(--regular-bg); }
  .dtable .nonhuman-row { background: var(--surprise-bg); }

  .english-compare {
    margin-top: 1.2rem;
    padding: 0.8rem 1rem;
    background: var(--english-bg);
    border-radius: 8px;
    border-left: 4px solid var(--english);
    font-size: 0.85rem;
  }
  .english-compare strong { color: var(--english); }
  .pattern-note {
    margin-top: 1rem;
    padding: 0.8rem 1rem;
    background: var(--accent-light);
    border-radius: 8px;
    border-left: 4px solid var(--accent);
    font-size: 0.85rem;
  }
  .pattern-note strong { color: var(--accent); }
  @media (max-width: 700px) {
    .contrast-row { flex-direction: column; }
  }
</style>
</head>
<body>
<figure>
  <div class="chart-wrapper">
    <div class="section-title">Deflected Agreement -- Arabic's Most Surprising Rule</div>

    <div class="rule-box">
      <div class="rule-label">The Rule</div>
      <div class="rule-text">Non-human plurals take <span style="color:var(--fem);">FEMININE SINGULAR</span> agreement.</div>
      <div class="rule-sub">Not feminine plural. Feminine <strong>singular</strong>. Regardless of the noun's original gender. Zero exceptions.</div>
    </div>

    <div class="contrast-row">
      <div class="contrast-panel panel-expected">
        <div class="panel-title">Singular: Regular Agreement</div>
        <div class="panel-example">
          <div class="panel-arabic">الكِتابُ الكَبيرُ</div>
          <div class="panel-translit">al-kitab-u al-kabir-u</div>
          <div class="panel-meaning">"the big book"</div>
          <div class="panel-annotation ann-regular">Masculine singular noun = masculine singular adjective</div>
        </div>
      </div>
      <div class="contrast-panel panel-deflected">
        <div class="panel-title">Plural: Deflected Agreement!</div>
        <div class="panel-example">
          <div class="panel-arabic">الكُتُبُ الكَبيرةُ</div>
          <div class="panel-translit">al-kutub-u al-kabira-tu</div>
          <div class="panel-meaning">"the big books"</div>
          <div class="panel-annotation ann-deflected">Masculine PLURAL noun = FEMININE SINGULAR adjective</div>
        </div>
      </div>
    </div>

    <div class="section-title" style="margin-top:1rem;">Human vs. Non-Human Agreement</div>
    <table class="dtable">
      <thead>
        <tr>
          <th>Noun</th>
          <th>Type</th>
          <th>Singular Gender</th>
          <th>Plural Form</th>
          <th>Agreement</th>
          <th>Adjective "new"</th>
        </tr>
      </thead>
      <tbody>
        <tr class="human-row">
          <td><span class="arabic-text">مُعَلِّم</span> teacher (m.)</td>
          <td style="color:var(--regular);font-weight:700;">Human</td>
          <td>Masculine</td>
          <td><span class="arabic-text">مُعَلِّمون</span></td>
          <td style="color:var(--regular);font-weight:700;">Regular (m. pl.)</td>
          <td><span class="arabic-text">جُدُد</span> <em>judud</em></td>
        </tr>
        <tr class="human-row">
          <td><span class="arabic-text">مُعَلِّمة</span> teacher (f.)</td>
          <td style="color:var(--regular);font-weight:700;">Human</td>
          <td>Feminine</td>
          <td><span class="arabic-text">مُعَلِّمات</span></td>
          <td style="color:var(--regular);font-weight:700;">Regular (f. pl.)</td>
          <td><span class="arabic-text">جَديدات</span> <em>jadidat</em></td>
        </tr>
        <tr class="nonhuman-row">
          <td><span class="arabic-text">كِتاب</span> book</td>
          <td style="color:var(--surprise);font-weight:700;">Non-human</td>
          <td>Masculine</td>
          <td><span class="arabic-text">كُتُب</span></td>
          <td style="color:var(--fem);font-weight:700;">Deflected (f. sg.!)</td>
          <td><span class="arabic-text">جَديدة</span> <em>jadida</em></td>
        </tr>
        <tr class="nonhuman-row">
          <td><span class="arabic-text">سَيّارة</span> car</td>
          <td style="color:var(--surprise);font-weight:700;">Non-human</td>
          <td>Feminine</td>
          <td><span class="arabic-text">سَيّارات</span></td>
          <td style="color:var(--fem);font-weight:700;">Deflected (f. sg.!)</td>
          <td><span class="arabic-text">جَديدة</span> <em>jadida</em></td>
        </tr>
        <tr class="nonhuman-row">
          <td><span class="arabic-text">كَلْب</span> dog</td>
          <td style="color:var(--surprise);font-weight:700;">Non-human*</td>
          <td>Masculine</td>
          <td><span class="arabic-text">كِلاب</span></td>
          <td style="color:var(--fem);font-weight:700;">Deflected (f. sg.!)</td>
          <td><span class="arabic-text">جَديدة</span> <em>jadida</em></td>
        </tr>
      </tbody>
    </table>
    <div style="font-size:0.75rem;color:var(--muted);margin-top:0.3rem;">*Animals are grammatically non-human in MSA agreement.</div>

    <div style="margin:1rem 0;padding:0.8rem;border:2px solid var(--fem);border-radius:8px;background:var(--fem-bg);font-size:0.85rem;text-align:center;">
      <strong style="color:var(--fem);">Pronoun test:</strong> A group of masculine books is referred to as <span class="arabic-text" style="font-size:1.1rem;">هِيَ</span> <em>hiya</em> = "<strong>she</strong>," not <span class="arabic-text" style="font-size:1.1rem;">هُم</span> <em>hum</em> = "they (m.)." The pronoun deflects to feminine singular too.
    </div>

    <div class="english-compare">
      <strong>English comparison:</strong> English has absolutely nothing like deflected agreement. "The new books arrived" -- plural subject, plural verb, invariant adjective. No gender shift occurs anywhere. "They arrived" -- "they," not "she." Deflected agreement is genuinely unique to Arabic (and some other Semitic languages) among the world's major languages.
    </div>

    <div class="pattern-note">
      <strong>The pattern:</strong> Deflected agreement is <strong>100% regular with zero exceptions</strong>. Every non-human plural noun, regardless of its singular gender, regardless of its plural form (sound or broken), triggers feminine singular agreement on adjectives, verbs, pronouns, and demonstratives. The rule is hard to internalize but trivial to apply: non-human plural? Feminine singular. Always.
    </div>
  </div>

  <figcaption>
    <h2>Figure 3 &mdash; Deflected Agreement</h2>
    <p>Arabic's most distinctive agreement rule: non-human plurals (books, houses, cars, animals) take feminine singular agreement regardless of their original gender. Human plurals take regular agreement. The rule is exceptionless -- making it perfectly predictable once internalized, despite being deeply counterintuitive to English speakers.</p>
  </figcaption>
</figure>
</body>
</html>
