<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arabic Four-Way Adjective Agreement</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --accent: #4361ee;
    --accent-light: #e8edff;
    --gender: #e63946;
    --gender-bg: #fef3f0;
    --number: #2d8a4e;
    --number-bg: #f0faf0;
    --case-c: #7c3aed;
    --case-bg: #f5f0ff;
    --def: #d4770b;
    --def-bg: #fdf6ec;
    --english: #0077b6;
    --english-bg: #e8f4f8;
    --french: #6c757d;
    --french-bg: #f0f0f5;
    --muted: #6c757d;
    --caption-bg: #f8f9fa;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --accent: #6b8aff;
      --accent-light: #1e2a4a;
      --gender: #ff6b6b;
      --gender-bg: #2a1520;
      --number: #5cb87a;
      --number-bg: #102a18;
      --case-c: #a78bfa;
      --case-bg: #1a1030;
      --def: #f0c050;
      --def-bg: #2a2210;
      --english: #5dade2;
      --english-bg: #102030;
      --french: #888;
      --french-bg: #1e1e30;
      --muted: #9a9ab0;
      --caption-bg: #1a1a2e;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure { max-width: 1000px; width: 100%; }
  .chart-wrapper {
    overflow-x: auto;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--surface);
    padding: 1.5rem;
  }
  .section-title {
    font-size: 1rem;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 0.8rem;
    padding-bottom: 0.3rem;
    border-bottom: 2px solid var(--accent);
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding: 1rem 1.5rem;
    background: var(--caption-bg);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }

  /* Agreement display */
  .agree-display {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    margin: 1.5rem 0;
  }
  .noun-box, .adj-box {
    padding: 1rem 1.5rem;
    border-radius: 10px;
    text-align: center;
    border: 3px solid var(--accent);
    min-width: 200px;
  }
  .noun-box { background: var(--accent-light); }
  .adj-box { background: var(--accent-light); }
  .box-label { font-size: 0.75rem; font-weight: 700; color: var(--accent); margin-bottom: 0.3rem; }
  .box-arabic {
    font-family: 'Traditional Arabic', 'Scheherazade', serif;
    font-size: 1.5rem;
    direction: rtl;
  }
  .box-translit { font-size: 0.8rem; color: var(--muted); font-style: italic; }
  .box-meaning { font-size: 0.85rem; font-weight: 600; }

  /* Feature arrows */
  .arrows-container {
    display: flex;
    flex-direction: column;
    gap: 0.2rem;
    min-width: 140px;
  }
  .feature-arrow {
    display: flex;
    align-items: center;
    gap: 0.3rem;
    font-size: 0.72rem;
    font-weight: 700;
    padding: 0.15rem 0.4rem;
    border-radius: 4px;
  }
  .fa-gender { color: var(--gender); background: var(--gender-bg); }
  .fa-number { color: var(--number); background: var(--number-bg); }
  .fa-case { color: var(--case-c); background: var(--case-bg); }
  .fa-def { color: var(--def); background: var(--def-bg); }

  /* Comparison bars */
  .compare-bars {
    display: flex;
    gap: 1rem;
    margin: 1.5rem 0;
  }
  .bar-card {
    flex: 1;
    border: 2px solid;
    border-radius: 10px;
    padding: 0.8rem;
    text-align: center;
  }
  .bar-english { border-color: var(--english); background: var(--english-bg); }
  .bar-french { border-color: var(--french); background: var(--french-bg); }
  .bar-arabic { border-color: var(--accent); background: var(--accent-light); }
  .bar-lang { font-weight: 700; font-size: 0.85rem; margin-bottom: 0.3rem; }
  .bar-english .bar-lang { color: var(--english); }
  .bar-french .bar-lang { color: var(--french); }
  .bar-arabic .bar-lang { color: var(--accent); }
  .bar-count { font-size: 2rem; font-weight: 900; }
  .bar-label { font-size: 0.72rem; color: var(--muted); }
  .bar-features { font-size: 0.75rem; margin-top: 0.3rem; }

  .feature-dot {
    display: inline-block;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    margin: 0 2px;
  }

  .pattern-note {
    margin-top: 1rem;
    padding: 0.8rem 1rem;
    background: var(--accent-light);
    border-radius: 8px;
    border-left: 4px solid var(--accent);
    font-size: 0.85rem;
  }
  .pattern-note strong { color: var(--accent); }
  .english-compare {
    margin-top: 1.2rem;
    padding: 0.8rem 1rem;
    background: var(--english-bg);
    border-radius: 8px;
    border-left: 4px solid var(--english);
    font-size: 0.85rem;
  }
  .english-compare strong { color: var(--english); }
  @media (max-width: 700px) {
    .agree-display { flex-direction: column; }
    .compare-bars { flex-direction: column; }
  }
</style>
</head>
<body>
<figure>
  <div class="chart-wrapper">
    <div class="section-title">The Four-Way Agreement Match -- Adjective Must Match Noun in 4 Dimensions</div>

    <div class="agree-display">
      <div class="noun-box">
        <div class="box-label">NOUN</div>
        <div class="box-arabic">الكِتابُ</div>
        <div class="box-translit">al-kitab-u</div>
        <div class="box-meaning">"the book"</div>
        <div style="margin-top:0.5rem;font-size:0.75rem;text-align:left;">
          <span style="color:var(--gender);">Gender: masculine</span><br>
          <span style="color:var(--number);">Number: singular</span><br>
          <span style="color:var(--case-c);">Case: nominative (-u)</span><br>
          <span style="color:var(--def);">Definite: yes (al-)</span>
        </div>
      </div>

      <div class="arrows-container">
        <div class="feature-arrow fa-gender">Gender &rarr; masc.</div>
        <div class="feature-arrow fa-number">Number &rarr; sg.</div>
        <div class="feature-arrow fa-case">Case &rarr; nom.</div>
        <div class="feature-arrow fa-def">Definite &rarr; yes</div>
      </div>

      <div class="adj-box">
        <div class="box-label">ADJECTIVE</div>
        <div class="box-arabic">الكَبيرُ</div>
        <div class="box-translit">al-kabir-u</div>
        <div class="box-meaning">"the big"</div>
        <div style="margin-top:0.5rem;font-size:0.75rem;text-align:left;">
          <span style="color:var(--gender);">Gender: masculine (matches)</span><br>
          <span style="color:var(--number);">Number: singular (matches)</span><br>
          <span style="color:var(--case-c);">Case: nominative -u (matches)</span><br>
          <span style="color:var(--def);">Definite: yes al- (matches)</span>
        </div>
      </div>
    </div>

    <div style="text-align:center;font-size:0.85rem;font-weight:600;color:var(--accent);margin-bottom:1rem;">
      All four features must match. Change any one feature on the noun and the adjective must change too.
    </div>

    <div class="section-title" style="margin-top:1rem;">Agreement Complexity Across Languages</div>
    <div class="compare-bars">
      <div class="bar-card bar-english">
        <div class="bar-lang">English</div>
        <div class="bar-count" style="color:var(--english);">0</div>
        <div class="bar-label">agreement features</div>
        <div class="bar-features">"big" is always "big"<br>No adjective agreement at all</div>
      </div>
      <div class="bar-card bar-french">
        <div class="bar-lang">French</div>
        <div class="bar-count" style="color:var(--french);">2</div>
        <div class="bar-label">agreement features</div>
        <div class="bar-features">
          <span class="feature-dot" style="background:var(--gender);"></span> Gender
          <span class="feature-dot" style="background:var(--number);"></span> Number<br>
          <em>grand / grande / grands / grandes</em>
        </div>
      </div>
      <div class="bar-card bar-arabic">
        <div class="bar-lang">Arabic</div>
        <div class="bar-count" style="color:var(--accent);">4</div>
        <div class="bar-label">agreement features</div>
        <div class="bar-features">
          <span class="feature-dot" style="background:var(--gender);"></span> Gender
          <span class="feature-dot" style="background:var(--number);"></span> Number (3-way!)
          <span class="feature-dot" style="background:var(--case-c);"></span> Case
          <span class="feature-dot" style="background:var(--def);"></span> Definiteness
        </div>
      </div>
    </div>

    <div class="english-compare">
      <strong>English comparison:</strong> English adjectives are completely invariant. "Big" is "big" no matter what: "the big book," "big books," "a big school." French requires adjective agreement in gender and number (4 forms). Arabic requires agreement in <strong>four</strong> dimensions with up to 36 theoretical forms per adjective.
    </div>

    <div class="pattern-note">
      <strong>The pattern:</strong> Each language sits at a different point on the agreement complexity spectrum. English = zero (analytic extreme). French = moderate (2 features). Arabic = elaborate (4 features, including the typologically unusual definiteness agreement and three-way number). The gradient is clear and quantifiable.
    </div>
  </div>

  <figcaption>
    <h2>Figure 2 &mdash; The Four-Way Agreement Match</h2>
    <p>Arabic adjectives must match their nouns in four dimensions: gender, number, case, and definiteness. English adjectives agree in zero features. French adjectives agree in two. Arabic's four-way system is among the most elaborate agreement systems of any major language.</p>
  </figcaption>
</figure>
</body>
</html>
