<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agreement Complexity Comparison -- English vs. French vs. Arabic</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --accent: #4361ee;
    --accent-light: #e8edff;
    --english: #6c757d;
    --english-bg: #f0f0f5;
    --french: #0077b6;
    --french-bg: #e8f4f8;
    --arabic: #e63946;
    --arabic-bg: #fef3f0;
    --yes: #2d8a4e;
    --no: #ccc;
    --special: #d4770b;
    --muted: #6c757d;
    --caption-bg: #f8f9fa;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --accent: #6b8aff;
      --accent-light: #1e2a4a;
      --english: #888;
      --english-bg: #1e1e30;
      --french: #5dade2;
      --french-bg: #102030;
      --arabic: #ff6b6b;
      --arabic-bg: #2a1520;
      --yes: #5cb87a;
      --no: #444;
      --special: #f0c050;
      --muted: #9a9ab0;
      --caption-bg: #1a1a2e;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure { max-width: 1050px; width: 100%; }
  .chart-wrapper {
    overflow-x: auto;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--surface);
    padding: 1.5rem;
  }
  .section-title {
    font-size: 1rem;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 0.8rem;
    padding-bottom: 0.3rem;
    border-bottom: 2px solid var(--accent);
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding: 1rem 1.5rem;
    background: var(--caption-bg);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }

  .comp-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.82rem;
    margin: 1rem 0;
  }
  .comp-table th, .comp-table td {
    padding: 0.5rem 0.6rem;
    border: 1px solid var(--border);
    text-align: center;
    vertical-align: middle;
  }
  .comp-table th {
    font-weight: 700;
  }
  .comp-table th:first-child { text-align: left; background: var(--accent-light); color: var(--accent); }
  .head-eng { background: var(--english-bg) !important; color: var(--english) !important; }
  .head-fr { background: var(--french-bg) !important; color: var(--french) !important; }
  .head-ar { background: var(--arabic-bg) !important; color: var(--arabic) !important; }

  .cell-yes { color: var(--yes); font-weight: 700; }
  .cell-no { color: var(--no); }
  .cell-special { color: var(--special); font-weight: 700; }
  .cell-minimal { color: var(--muted); font-style: italic; }

  /* Bar visualization */
  .bar-row {
    display: flex;
    gap: 1.5rem;
    margin: 1.5rem 0;
    align-items: flex-end;
    justify-content: center;
  }
  .bar-item {
    text-align: center;
    min-width: 140px;
  }
  .bar-stack {
    display: flex;
    flex-direction: column-reverse;
    align-items: center;
    min-height: 200px;
    justify-content: flex-start;
  }
  .bar-segment {
    width: 100px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.65rem;
    font-weight: 700;
    color: white;
    border: 1px solid rgba(255,255,255,0.3);
  }
  .bar-label-bottom {
    font-weight: 700;
    font-size: 0.9rem;
    margin-top: 0.5rem;
  }
  .bar-score {
    font-size: 1.5rem;
    font-weight: 900;
    margin-top: 0.2rem;
  }

  .pattern-note {
    margin-top: 1rem;
    padding: 0.8rem 1rem;
    background: var(--accent-light);
    border-radius: 8px;
    border-left: 4px solid var(--accent);
    font-size: 0.85rem;
  }
  .pattern-note strong { color: var(--accent); }
</style>
</head>
<body>
<figure>
  <div class="chart-wrapper">
    <div class="section-title">Agreement Complexity Comparison -- English vs. French vs. Arabic</div>

    <!-- Visual bars -->
    <div class="bar-row">
      <div class="bar-item">
        <div class="bar-stack">
          <div class="bar-segment" style="height:10px;background:var(--english);opacity:0.3;border-radius:4px 4px 0 0;">
          </div>
        </div>
        <div class="bar-label-bottom" style="color:var(--english);">English</div>
        <div class="bar-score" style="color:var(--english);">1/11</div>
        <div style="font-size:0.7rem;color:var(--muted);">Almost no agreement</div>
      </div>
      <div class="bar-item">
        <div class="bar-stack">
          <div class="bar-segment" style="height:20px;background:var(--french);border-radius:0 0 0 0;">gender</div>
          <div class="bar-segment" style="height:20px;background:var(--french);opacity:0.8;">number</div>
          <div class="bar-segment" style="height:15px;background:var(--french);opacity:0.6;border-radius:4px 4px 0 0;">verb (limited)</div>
        </div>
        <div class="bar-label-bottom" style="color:var(--french);">French</div>
        <div class="bar-score" style="color:var(--french);">4/11</div>
        <div style="font-size:0.7rem;color:var(--muted);">Moderate agreement</div>
      </div>
      <div class="bar-item">
        <div class="bar-stack">
          <div class="bar-segment" style="height:20px;background:var(--arabic);">gender</div>
          <div class="bar-segment" style="height:25px;background:var(--arabic);opacity:0.9;">number (3-way)</div>
          <div class="bar-segment" style="height:20px;background:var(--arabic);opacity:0.8;">case</div>
          <div class="bar-segment" style="height:15px;background:var(--arabic);opacity:0.7;">definiteness</div>
          <div class="bar-segment" style="height:20px;background:var(--arabic);opacity:0.6;">verb gender</div>
          <div class="bar-segment" style="height:15px;background:var(--arabic);opacity:0.5;">verb number</div>
          <div class="bar-segment" style="height:15px;background:var(--special);opacity:0.9;">deflected</div>
          <div class="bar-segment" style="height:15px;background:var(--special);opacity:0.8;">6-form rel. pro.</div>
          <div class="bar-segment" style="height:15px;background:var(--special);opacity:0.7;">numeral polarity</div>
          <div class="bar-segment" style="height:15px;background:var(--special);opacity:0.6;border-radius:4px 4px 0 0;">dual</div>
        </div>
        <div class="bar-label-bottom" style="color:var(--arabic);">Arabic</div>
        <div class="bar-score" style="color:var(--arabic);">11/11</div>
        <div style="font-size:0.7rem;color:var(--muted);">Elaborate agreement</div>
      </div>
    </div>

    <table class="comp-table">
      <thead>
        <tr>
          <th>Feature</th>
          <th class="head-eng">English</th>
          <th class="head-fr">French</th>
          <th class="head-ar">Arabic</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td style="text-align:left;font-weight:600;">Grammatical genders</td>
          <td class="cell-no">0</td>
          <td class="cell-yes">2 (m/f)</td>
          <td class="cell-yes">2 (m/f)</td>
        </tr>
        <tr>
          <td style="text-align:left;font-weight:600;">Adjective agrees in gender</td>
          <td class="cell-no">No</td>
          <td class="cell-yes">Yes</td>
          <td class="cell-yes">Yes</td>
        </tr>
        <tr>
          <td style="text-align:left;font-weight:600;">Adjective agrees in number</td>
          <td class="cell-no">No</td>
          <td class="cell-yes">Yes (2-way)</td>
          <td class="cell-yes">Yes (3-way: sg/du/pl)</td>
        </tr>
        <tr>
          <td style="text-align:left;font-weight:600;">Adjective agrees in case</td>
          <td class="cell-no">No</td>
          <td class="cell-no">No</td>
          <td class="cell-yes">Yes</td>
        </tr>
        <tr>
          <td style="text-align:left;font-weight:600;">Adjective agrees in definiteness</td>
          <td class="cell-no">No</td>
          <td class="cell-no">No</td>
          <td class="cell-yes">Yes</td>
        </tr>
        <tr>
          <td style="text-align:left;font-weight:600;">Verb agrees in gender</td>
          <td class="cell-no">No</td>
          <td class="cell-minimal">Minimal</td>
          <td class="cell-yes">Yes (full)</td>
        </tr>
        <tr>
          <td style="text-align:left;font-weight:600;">Verb agrees in number</td>
          <td class="cell-minimal">Minimal (-s)</td>
          <td class="cell-yes">Yes</td>
          <td class="cell-special">Yes (but asymmetric VSO/SVO)</td>
        </tr>
        <tr>
          <td style="text-align:left;font-weight:600;">Deflected agreement (inanimate pl.)</td>
          <td class="cell-no">No</td>
          <td class="cell-no">No</td>
          <td class="cell-special">Yes (fem. sg.!)</td>
        </tr>
        <tr>
          <td style="text-align:left;font-weight:600;">Relative pronoun declines</td>
          <td class="cell-no">No</td>
          <td class="cell-no">No</td>
          <td class="cell-special">Yes (6+ forms)</td>
        </tr>
        <tr>
          <td style="text-align:left;font-weight:600;">Numeral gender polarity</td>
          <td class="cell-no">No</td>
          <td class="cell-no">No</td>
          <td class="cell-special">Yes (3-10)</td>
        </tr>
        <tr>
          <td style="text-align:left;font-weight:600;">Dual agreement</td>
          <td class="cell-no">No</td>
          <td class="cell-no">No</td>
          <td class="cell-special">Yes</td>
        </tr>
      </tbody>
    </table>

    <div class="pattern-note">
      <strong>The pattern:</strong> The three languages represent three points on a clear spectrum of agreement complexity. English = almost none (analytic extreme). French = moderate (standard European level). Arabic = elaborate (with features -- deflected agreement, numeral polarity, dual, six-form relative pronoun -- found in <em>neither</em> English nor French). The four Arabic-only features (highlighted in amber) are what make Arabic agreement qualitatively, not just quantitatively, different from European systems.
    </div>
  </div>

  <figcaption>
    <h2>Figure 5 &mdash; Agreement Complexity: English vs. French vs. Arabic</h2>
    <p>A comprehensive feature-by-feature comparison showing the gradient from English (almost no agreement) through French (moderate) to Arabic (elaborate, with unique features like deflected agreement, numeral polarity, dual forms, and six-form relative pronouns found in neither English nor French).</p>
  </figcaption>
</figure>
</body>
</html>
