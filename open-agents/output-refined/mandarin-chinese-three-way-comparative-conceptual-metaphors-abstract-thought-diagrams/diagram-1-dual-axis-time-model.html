<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dual-Axis Time Model -- Chinese vs. English</title>
<style>
  :root {
    --bg: #0f172a;
    --fg: #e2e8f0;
    --surface: #1e293b;
    --border: #334155;
    --accent: #06b6d4;
    --accent-dim: #0891b2;
    --accent-light: rgba(6,182,212,0.12);
    --chinese: #f87171;
    --chinese-light: rgba(248,113,113,0.12);
    --english: #a78bfa;
    --english-light: rgba(167,139,250,0.12);
    --shared: #34d399;
    --shared-light: rgba(52,211,153,0.12);
    --muted: #94a3b8;
    --caption-bg: #1e293b;
    --warn: #fbbf24;
    --warn-bg: rgba(251,191,36,0.1);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure { max-width: 960px; width: 100%; }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding: 1rem 1.5rem;
    background: var(--caption-bg);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 700; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); max-width: 700px; margin: 0 auto; }
  .chart-wrapper {
    overflow-x: auto;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--surface);
    padding: 1.5rem 1rem;
  }
  svg { display: block; margin: 0 auto; }
  .legend {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 1.25rem;
    margin-top: 1rem;
    padding: 0.75rem;
    background: rgba(6,182,212,0.05);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.8rem;
    color: var(--muted);
  }
  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .controversy-box {
    margin-top: 1rem;
    padding: 0.75rem 1rem;
    background: var(--warn-bg);
    border: 1px solid rgba(251,191,36,0.3);
    border-radius: 8px;
    font-size: 0.82rem;
    color: var(--warn);
    text-align: center;
  }
  .controversy-box strong { color: var(--warn); }
</style>
</head>
<body>
<figure>
  <div class="chart-wrapper">
    <svg viewBox="0 0 920 520" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
      <!-- Title -->
      <text x="460" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#e2e8f0">Temporal Metaphor Axes: Chinese (Dual-Axis) vs. English (Single-Axis)</text>

      <!-- ENGLISH PANEL -->
      <rect x="20" y="55" width="420" height="200" rx="10" fill="rgba(167,139,250,0.06)" stroke="rgba(167,139,250,0.25)" stroke-width="1.5"/>
      <text x="230" y="80" text-anchor="middle" font-size="14" font-weight="700" fill="#a78bfa">English: Horizontal Only</text>

      <!-- Horizontal arrow -->
      <line x1="60" y1="155" x2="400" y2="155" stroke="#a78bfa" stroke-width="2.5" marker-end="url(#arrow-en)"/>
      <defs>
        <marker id="arrow-en" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto">
          <polygon points="0 0, 10 3.5, 0 7" fill="#a78bfa"/>
        </marker>
        <marker id="arrow-zh-h" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto">
          <polygon points="0 0, 10 3.5, 0 7" fill="#f87171"/>
        </marker>
        <marker id="arrow-zh-v" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto">
          <polygon points="0 0, 10 3.5, 0 7" fill="#06b6d4"/>
        </marker>
      </defs>

      <!-- English labels -->
      <text x="80" y="140" font-size="11" fill="#a78bfa" font-weight="600">PAST</text>
      <text x="370" y="140" font-size="11" fill="#a78bfa" font-weight="600">FUTURE</text>
      <text x="220" y="140" font-size="11" fill="#e2e8f0" font-weight="600">NOW</text>
      <circle cx="228" cy="155" r="5" fill="#e2e8f0"/>

      <!-- English examples -->
      <text x="70" y="185" font-size="10.5" fill="#94a3b8">"look back"</text>
      <text x="70" y="200" font-size="10.5" fill="#94a3b8">"behind us"</text>
      <text x="340" y="185" font-size="10.5" fill="#94a3b8">"look forward"</text>
      <text x="340" y="200" font-size="10.5" fill="#94a3b8">"ahead of us"</text>

      <!-- No vertical note -->
      <text x="230" y="235" text-anchor="middle" font-size="10.5" fill="#64748b" font-style="italic">No vertical time metaphors in English</text>

      <!-- CHINESE PANEL -->
      <rect x="480" y="55" width="420" height="440" rx="10" fill="rgba(248,113,113,0.05)" stroke="rgba(248,113,113,0.2)" stroke-width="1.5"/>
      <text x="690" y="80" text-anchor="middle" font-size="14" font-weight="700" fill="#f87171">Chinese: Horizontal + Vertical</text>

      <!-- Chinese Horizontal axis -->
      <text x="690" y="102" text-anchor="middle" font-size="11" fill="#f87171" font-weight="600">Axis 1: Horizontal (PRIMARY ~64%)</text>
      <line x1="520" y1="130" x2="860" y2="130" stroke="#f87171" stroke-width="2.5" marker-end="url(#arrow-zh-h)"/>
      <text x="540" y="118" font-size="11" fill="#f87171" font-weight="600">PAST</text>
      <text x="830" y="118" font-size="11" fill="#f87171" font-weight="600">FUTURE</text>
      <circle cx="690" cy="130" r="4" fill="#e2e8f0"/>

      <!-- Chinese horizontal examples -->
      <text x="525" y="155" font-size="10" fill="#94a3b8">前天 qiantiān</text>
      <text x="525" y="169" font-size="9.5" fill="#64748b">"front-day" = day before yesterday</text>
      <text x="525" y="186" font-size="10" fill="#94a3b8">以前 yǐqian</text>
      <text x="525" y="200" font-size="9.5" fill="#64748b">"before-front" = in the past</text>

      <text x="770" y="155" font-size="10" fill="#94a3b8">后天 hòutiān</text>
      <text x="770" y="169" font-size="9.5" fill="#64748b">"back-day" = day after tomorrow</text>
      <text x="770" y="186" font-size="10" fill="#94a3b8">以后 yǐhòu</text>
      <text x="770" y="200" font-size="9.5" fill="#64748b">"after-back" = in the future</text>

      <!-- Divider -->
      <line x1="510" y1="220" x2="870" y2="220" stroke="#334155" stroke-width="1" stroke-dasharray="4,4"/>

      <!-- Chinese Vertical axis -->
      <text x="690" y="245" text-anchor="middle" font-size="11" fill="#06b6d4" font-weight="600">Axis 2: Vertical (SECONDARY ~36%)</text>

      <!-- Vertical arrow -->
      <line x1="690" y1="265" x2="690" y2="460" stroke="#06b6d4" stroke-width="2.5" marker-end="url(#arrow-zh-v)"/>
      <text x="700" y="278" font-size="11" fill="#06b6d4" font-weight="600">EARLIER (上 UP)</text>
      <text x="700" y="453" font-size="11" fill="#06b6d4" font-weight="600">LATER (下 DOWN)</text>

      <!-- Vertical examples - earlier -->
      <text x="520" y="300" font-size="10" fill="#94a3b8">上个月 shàng gè yuè</text>
      <text x="520" y="314" font-size="9.5" fill="#64748b">"upper month" = last month</text>
      <text x="520" y="334" font-size="10" fill="#94a3b8">上午 shàngwǔ</text>
      <text x="520" y="348" font-size="9.5" fill="#64748b">"upper noon" = morning</text>
      <text x="520" y="368" font-size="10" fill="#94a3b8">上半年 shàng bànnián</text>
      <text x="520" y="382" font-size="9.5" fill="#64748b">"upper half-year" = first half</text>

      <!-- Vertical examples - later -->
      <text x="520" y="410" font-size="10" fill="#94a3b8">下个月 xià gè yuè</text>
      <text x="520" y="424" font-size="9.5" fill="#64748b">"lower month" = next month</text>
      <text x="520" y="444" font-size="10" fill="#94a3b8">下午 xiàwǔ</text>
      <text x="520" y="458" font-size="9.5" fill="#64748b">"lower noon" = afternoon</text>

      <!-- Key Insight Box -->
      <rect x="20" y="280" width="420" height="100" rx="8" fill="rgba(52,211,153,0.08)" stroke="rgba(52,211,153,0.3)" stroke-width="1.5"/>
      <text x="230" y="305" text-anchor="middle" font-size="12" font-weight="700" fill="#34d399">Key Insight</text>
      <text x="230" y="325" text-anchor="middle" font-size="11" fill="#94a3b8">Chinese has MORE axes available, not a DIFFERENT axis.</text>
      <text x="230" y="345" text-anchor="middle" font-size="11" fill="#94a3b8">Both languages use horizontal as primary.</text>
      <text x="230" y="365" text-anchor="middle" font-size="11" fill="#94a3b8">Chinese adds vertical as a secondary option.</text>

      <!-- Origin hypothesis -->
      <rect x="20" y="400" width="420" height="80" rx="8" fill="rgba(6,182,212,0.06)" stroke="rgba(6,182,212,0.2)" stroke-width="1"/>
      <text x="230" y="425" text-anchor="middle" font-size="11" font-weight="600" fill="#06b6d4">Possible Origin: Vertical Writing Direction</text>
      <text x="230" y="445" text-anchor="middle" font-size="10.5" fill="#94a3b8">Traditional Chinese is written top-to-bottom.</text>
      <text x="230" y="462" text-anchor="middle" font-size="10.5" fill="#94a3b8">Earlier text literally appears ABOVE later text.</text>
    </svg>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#f87171"></div> Chinese horizontal (前/后)</div>
    <div class="legend-item"><div class="legend-dot" style="background:#06b6d4"></div> Chinese vertical (上/下)</div>
    <div class="legend-item"><div class="legend-dot" style="background:#a78bfa"></div> English horizontal only</div>
    <div class="legend-item"><div class="legend-dot" style="background:#34d399"></div> Shared across all Chinese varieties</div>
  </div>

  <div class="controversy-box">
    <strong>Boroditsky Debate (2001-present):</strong> Linguistic pattern confirmed &mdash; Chinese does use vertical time metaphors. Cognitive influence contested &mdash; whether this shapes non-linguistic thought remains unresolved (Chen 2007 failed replication; supporting studies exist).
  </div>

  <figcaption>
    <h2>Diagram 1: Dual-Axis Time Model</h2>
    <p>Chinese uses both horizontal (front/back = past/future) and vertical (up/down = earlier/later) spatial metaphors for time, while English uses only the horizontal axis. The vertical system is shared across all Chinese varieties (Mandarin, Cantonese, Taiwanese) and may originate from the traditional top-to-bottom writing direction.</p>
  </figcaption>
</figure>
</body>
</html>
