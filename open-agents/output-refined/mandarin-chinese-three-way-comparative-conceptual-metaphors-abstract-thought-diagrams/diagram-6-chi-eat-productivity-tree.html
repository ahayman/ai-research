<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>吃 (Chi) Productivity Tree -- Metaphorical Extensions of "Eat"</title>
<style>
  :root {
    --bg: #0f172a;
    --fg: #e2e8f0;
    --surface: #1e293b;
    --border: #334155;
    --accent: #06b6d4;
    --chinese: #f87171;
    --english: #a78bfa;
    --muted: #94a3b8;
    --caption-bg: #1e293b;
    --suffering: #ef4444;
    --emotion: #f59e0b;
    --cognition: #06b6d4;
    --social: #8b5cf6;
    --literal: #34d399;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure { max-width: 960px; width: 100%; }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding: 1rem 1.5rem;
    background: var(--caption-bg);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 700; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); max-width: 700px; margin: 0 auto; }
  .chart-wrapper {
    overflow-x: auto;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--surface);
    padding: 1.5rem 1rem;
  }
  svg { display: block; margin: 0 auto; }
  .legend {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 1rem;
    margin-top: 1rem;
    padding: 0.75rem;
    background: rgba(6,182,212,0.05);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.8rem;
    color: var(--muted);
  }
  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .comparison-box {
    margin-top: 1rem;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
  }
  .comp-panel {
    padding: 1rem;
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  .comp-panel h3 {
    font-size: 0.9rem;
    font-weight: 700;
    margin-bottom: 0.5rem;
  }
  .comp-panel ul {
    list-style: none;
    font-size: 0.82rem;
    color: var(--muted);
  }
  .comp-panel li {
    padding: 0.2rem 0;
    padding-left: 0.8rem;
    position: relative;
  }
  .comp-panel li::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0.55rem;
    width: 5px;
    height: 5px;
    border-radius: 50%;
  }
  .zh-panel { background: rgba(248,113,113,0.04); }
  .zh-panel h3 { color: #f87171; }
  .zh-panel li::before { background: #f87171; }
  .en-panel { background: rgba(167,139,250,0.04); }
  .en-panel h3 { color: #a78bfa; }
  .en-panel li::before { background: #a78bfa; }
  @media (max-width: 640px) {
    .comparison-box { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<figure>
  <div class="chart-wrapper">
    <svg viewBox="0 0 920 530" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
      <!-- Title -->
      <text x="460" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#e2e8f0">吃 (Chi) Productivity Tree: How "Eat" Extends Metaphorically</text>

      <!-- Center node -->
      <circle cx="460" cy="180" r="55" fill="rgba(6,182,212,0.1)" stroke="#06b6d4" stroke-width="3"/>
      <text x="460" y="170" text-anchor="middle" font-size="40" fill="#06b6d4" font-family="serif">吃</text>
      <text x="460" y="200" text-anchor="middle" font-size="13" fill="#e2e8f0" font-weight="600">chi -- eat</text>
      <text x="460" y="218" text-anchor="middle" font-size="10" fill="#94a3b8">concrete: consume food</text>

      <!-- Branch lines and nodes -->
      <!-- SUFFERING CLUSTER (top-left) -->
      <line x1="415" y1="140" x2="160" y2="80" stroke="#ef4444" stroke-width="1.5" opacity="0.6"/>
      <line x1="410" y1="150" x2="140" y2="155" stroke="#ef4444" stroke-width="1.5" opacity="0.6"/>

      <rect x="40" y="55" width="200" height="55" rx="8" fill="rgba(239,68,68,0.08)" stroke="rgba(239,68,68,0.3)" stroke-width="1.5"/>
      <text x="140" y="75" text-anchor="middle" font-size="18" fill="#ef4444" font-family="serif">吃苦</text>
      <text x="140" y="92" text-anchor="middle" font-size="10" fill="#94a3b8">chi ku -- "eat bitter" = endure hardship</text>
      <text x="140" y="105" text-anchor="middle" font-size="9" fill="#64748b">SUFFERING = CONSUMING BITTER THINGS</text>

      <rect x="25" y="130" width="210" height="55" rx="8" fill="rgba(239,68,68,0.08)" stroke="rgba(239,68,68,0.3)" stroke-width="1.5"/>
      <text x="130" y="150" text-anchor="middle" font-size="18" fill="#ef4444" font-family="serif">吃亏</text>
      <text x="130" y="167" text-anchor="middle" font-size="10" fill="#94a3b8">chi kui -- "eat loss" = suffer a loss</text>
      <text x="130" y="180" text-anchor="middle" font-size="9" fill="#64748b">LOSS = SOMETHING CONSUMED</text>

      <!-- EMOTION CLUSTER (top-right) -->
      <line x1="505" y1="140" x2="740" y2="75" stroke="#f59e0b" stroke-width="1.5" opacity="0.6"/>
      <line x1="510" y1="155" x2="760" y2="155" stroke="#f59e0b" stroke-width="1.5" opacity="0.6"/>

      <rect x="640" y="50" width="230" height="55" rx="8" fill="rgba(245,158,11,0.08)" stroke="rgba(245,158,11,0.3)" stroke-width="1.5"/>
      <text x="755" y="70" text-anchor="middle" font-size="18" fill="#f59e0b" font-family="serif">吃惊</text>
      <text x="755" y="87" text-anchor="middle" font-size="10" fill="#94a3b8">chi jing -- "eat surprise" = be startled</text>
      <text x="755" y="100" text-anchor="middle" font-size="9" fill="#64748b">SURPRISE = CONSUMED</text>

      <rect x="650" y="130" width="230" height="55" rx="8" fill="rgba(245,158,11,0.08)" stroke="rgba(245,158,11,0.3)" stroke-width="1.5"/>
      <text x="765" y="150" text-anchor="middle" font-size="18" fill="#f59e0b" font-family="serif">吃醋</text>
      <text x="765" y="167" text-anchor="middle" font-size="10" fill="#94a3b8">chi cu -- "eat vinegar" = be jealous</text>
      <text x="765" y="180" text-anchor="middle" font-size="9" fill="#64748b">JEALOUSY = CONSUMING SOUR THINGS</text>

      <!-- COGNITION / EFFORT (bottom-left) -->
      <line x1="420" y1="220" x2="170" y2="290" stroke="#06b6d4" stroke-width="1.5" opacity="0.6"/>
      <line x1="415" y1="230" x2="155" y2="370" stroke="#06b6d4" stroke-width="1.5" opacity="0.6"/>

      <rect x="40" y="265" width="230" height="55" rx="8" fill="rgba(6,182,212,0.08)" stroke="rgba(6,182,212,0.3)" stroke-width="1.5"/>
      <text x="155" y="285" text-anchor="middle" font-size="18" fill="#06b6d4" font-family="serif">吃透</text>
      <text x="155" y="302" text-anchor="middle" font-size="10" fill="#94a3b8">chi tou -- "eat through" = thoroughly understand</text>
      <text x="155" y="315" text-anchor="middle" font-size="9" fill="#64748b">UNDERSTANDING = FULLY CONSUMING</text>

      <rect x="25" y="345" width="230" height="55" rx="8" fill="rgba(6,182,212,0.08)" stroke="rgba(6,182,212,0.3)" stroke-width="1.5"/>
      <text x="140" y="365" text-anchor="middle" font-size="18" fill="#06b6d4" font-family="serif">吃力</text>
      <text x="140" y="382" text-anchor="middle" font-size="10" fill="#94a3b8">chi li -- "eat strength" = be strenuous</text>
      <text x="140" y="395" text-anchor="middle" font-size="9" fill="#64748b">EFFORT = CONSUMING ENERGY</text>

      <!-- SOCIAL CLUSTER (bottom-right) -->
      <line x1="500" y1="225" x2="730" y2="295" stroke="#8b5cf6" stroke-width="1.5" opacity="0.6"/>
      <line x1="505" y1="230" x2="760" y2="375" stroke="#8b5cf6" stroke-width="1.5" opacity="0.6"/>

      <rect x="640" y="270" width="240" height="55" rx="8" fill="rgba(139,92,246,0.08)" stroke="rgba(139,92,246,0.3)" stroke-width="1.5"/>
      <text x="760" y="290" text-anchor="middle" font-size="18" fill="#8b5cf6" font-family="serif">吃香</text>
      <text x="760" y="307" text-anchor="middle" font-size="10" fill="#94a3b8">chi xiang -- "eat fragrance" = be popular</text>
      <text x="760" y="320" text-anchor="middle" font-size="9" fill="#64748b">POPULARITY = CONSUMING PLEASANT THINGS</text>

      <rect x="640" y="350" width="260" height="55" rx="8" fill="rgba(139,92,246,0.08)" stroke="rgba(139,92,246,0.3)" stroke-width="1.5"/>
      <text x="770" y="370" text-anchor="middle" font-size="18" fill="#8b5cf6" font-family="serif">吃官司</text>
      <text x="770" y="387" text-anchor="middle" font-size="10" fill="#94a3b8">chi guansi -- "eat lawsuit" = face legal trouble</text>
      <text x="770" y="400" text-anchor="middle" font-size="9" fill="#64748b">LEGAL TROUBLE = CONSUMED</text>

      <!-- LITERAL EXTENSION (bottom-center) -->
      <line x1="460" y1="235" x2="460" y2="430" stroke="#34d399" stroke-width="1.5" opacity="0.4"/>

      <rect x="340" y="430" width="240" height="55" rx="8" fill="rgba(52,211,153,0.08)" stroke="rgba(52,211,153,0.3)" stroke-width="1.5"/>
      <text x="460" y="450" text-anchor="middle" font-size="18" fill="#34d399" font-family="serif">吃不消</text>
      <text x="460" y="467" text-anchor="middle" font-size="10" fill="#94a3b8">chi bu xiao -- "eat-not-digest" = can't bear</text>
      <text x="460" y="480" text-anchor="middle" font-size="9" fill="#64748b">INABILITY TO COPE = INDIGESTION</text>

      <!-- Category labels -->
      <text x="140" y="250" text-anchor="middle" font-size="9" font-weight="700" fill="#ef4444">SUFFERING / LOSS</text>
      <text x="760" y="252" text-anchor="middle" font-size="9" font-weight="700" fill="#f59e0b">EMOTION</text>
      <text x="140" y="420" text-anchor="middle" font-size="9" font-weight="700" fill="#06b6d4">COGNITION / EFFORT</text>
      <text x="770" y="424" text-anchor="middle" font-size="9" font-weight="700" fill="#8b5cf6">SOCIAL / STATUS</text>

      <!-- WHY annotation -->
      <rect x="280" y="500" width="360" height="25" rx="6" fill="rgba(6,182,212,0.06)" stroke="rgba(6,182,212,0.15)" stroke-width="1"/>
      <text x="460" y="517" text-anchor="middle" font-size="10" fill="#06b6d4" font-style="italic">Food is culturally central in Chinese: "吃了吗?" (Have you eaten?) = Hello</text>
    </svg>
  </div>

  <div class="comparison-box">
    <div class="comp-panel zh-panel">
      <h3>Chinese 吃 (chi) -- Highly Productive</h3>
      <ul>
        <li>吃苦 eat bitter = endure hardship</li>
        <li>吃亏 eat loss = suffer disadvantage</li>
        <li>吃惊 eat surprise = be startled</li>
        <li>吃醋 eat vinegar = be jealous</li>
        <li>吃力 eat strength = strenuous</li>
        <li>吃香 eat fragrance = be popular</li>
        <li>吃透 eat through = fully understand</li>
        <li>吃官司 eat lawsuit = face legal trouble</li>
        <li>吃不消 eat-not-digest = can't cope</li>
        <li>吃素 eat vegetarian = be a pushover</li>
      </ul>
    </div>
    <div class="comp-panel en-panel">
      <h3>English "eat" -- Very Limited</h3>
      <ul>
        <li>"eat your words" = retract a statement</li>
        <li>"eat humble pie" = accept humiliation</li>
        <li>"what's eating you?" = what's bothering you?</li>
        <li>"eat the cost" = absorb a financial loss</li>
        <li>"eat crow" = admit being wrong</li>
        <li style="color:#64748b; font-style:italic; padding-top:0.5rem">(Far fewer productive extensions)</li>
      </ul>
    </div>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#ef4444"></div> Suffering / Loss</div>
    <div class="legend-item"><div class="legend-dot" style="background:#f59e0b"></div> Emotion</div>
    <div class="legend-item"><div class="legend-dot" style="background:#06b6d4"></div> Cognition / Effort</div>
    <div class="legend-item"><div class="legend-dot" style="background:#8b5cf6"></div> Social / Status</div>
    <div class="legend-item"><div class="legend-dot" style="background:#34d399"></div> Bodily Extension</div>
  </div>

  <figcaption>
    <h2>Diagram 6: 吃 (Chi) Productivity Tree</h2>
    <p>The verb 吃 (eat) is one of Mandarin's most metaphorically productive words, extending from physical consumption into suffering, emotion, cognition, and social domains. English "eat" has far fewer metaphorical extensions. Chinese monosyllabic compounding and the cultural centrality of food fuel this extraordinary productivity.</p>
  </figcaption>
</figure>
</body>
</html>
