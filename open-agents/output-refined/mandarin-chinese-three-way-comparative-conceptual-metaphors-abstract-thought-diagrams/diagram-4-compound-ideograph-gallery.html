<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compound Ideograph Gallery -- Frozen Metaphors in Characters</title>
<style>
  :root {
    --bg: #0f172a;
    --fg: #e2e8f0;
    --surface: #1e293b;
    --border: #334155;
    --accent: #06b6d4;
    --chinese: #f87171;
    --gold: #fbbf24;
    --muted: #94a3b8;
    --caption-bg: #1e293b;
    --warn: #fbbf24;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure { max-width: 960px; width: 100%; }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding: 1rem 1.5rem;
    background: var(--caption-bg);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 700; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); max-width: 700px; margin: 0 auto; }
  .chart-wrapper {
    overflow-x: auto;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--surface);
    padding: 1.5rem 1rem;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 1rem;
    padding: 0.5rem;
  }
  .card {
    background: rgba(6,182,212,0.04);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.25rem;
    text-align: center;
    transition: border-color 0.2s;
  }
  .card:hover {
    border-color: rgba(6,182,212,0.4);
  }
  .card-char {
    font-size: 3rem;
    font-family: serif;
    color: var(--accent);
    line-height: 1.2;
    margin-bottom: 0.25rem;
  }
  .card-pinyin {
    font-size: 0.95rem;
    color: var(--fg);
    font-weight: 600;
    margin-bottom: 0.75rem;
  }
  .card-decomp {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    margin-bottom: 0.75rem;
  }
  .comp {
    display: flex;
    flex-direction: column;
    align-items: center;
    background: rgba(248,113,113,0.08);
    border: 1px solid rgba(248,113,113,0.2);
    border-radius: 8px;
    padding: 0.4rem 0.6rem;
    min-width: 55px;
  }
  .comp-char {
    font-size: 1.4rem;
    font-family: serif;
    color: #f87171;
    line-height: 1.2;
  }
  .comp-meaning {
    font-size: 0.7rem;
    color: var(--muted);
    margin-top: 0.15rem;
  }
  .plus {
    font-size: 1.2rem;
    color: var(--muted);
    font-weight: 300;
  }
  .equals {
    font-size: 1.2rem;
    color: var(--accent);
    font-weight: 700;
  }
  .card-logic {
    font-size: 0.82rem;
    color: #34d399;
    font-style: italic;
    margin-bottom: 0.5rem;
    padding: 0.3rem 0.5rem;
    background: rgba(52,211,153,0.06);
    border-radius: 4px;
    display: inline-block;
  }
  .card-meaning {
    font-size: 0.85rem;
    color: var(--muted);
  }
  .title-row {
    text-align: center;
    margin-bottom: 1.25rem;
  }
  .title-row h2 {
    font-size: 1.15rem;
    font-weight: 700;
    color: var(--accent);
  }
  .title-row p {
    font-size: 0.85rem;
    color: var(--muted);
    margin-top: 0.3rem;
  }
  .caveat {
    margin-top: 1rem;
    padding: 0.75rem 1rem;
    background: rgba(251,191,36,0.08);
    border: 1px solid rgba(251,191,36,0.25);
    border-radius: 8px;
    font-size: 0.82rem;
    color: var(--warn);
    text-align: center;
  }
  .simp-note {
    margin-top: 0.75rem;
    padding: 0.75rem 1rem;
    background: rgba(248,113,113,0.06);
    border: 1px solid rgba(248,113,113,0.2);
    border-radius: 8px;
    font-size: 0.82rem;
    color: #f87171;
    text-align: center;
  }
</style>
</head>
<body>
<figure>
  <div class="chart-wrapper">
    <div class="title-row">
      <h2>Compound Ideographs (会意字): Characters as Frozen Metaphors</h2>
      <p>Each character visually encodes a metaphorical reasoning that alphabetic scripts cannot represent</p>
    </div>

    <div class="grid">
      <!-- 明 -->
      <div class="card">
        <div class="card-char">明</div>
        <div class="card-pinyin">ming -- Bright, Clear</div>
        <div class="card-decomp">
          <div class="comp"><span class="comp-char">日</span><span class="comp-meaning">sun</span></div>
          <span class="plus">+</span>
          <div class="comp"><span class="comp-char">月</span><span class="comp-meaning">moon</span></div>
        </div>
        <div class="card-logic">BRIGHTNESS = COMBINED LIGHT SOURCES</div>
        <div class="card-meaning">Two brightest celestial objects together = brightness</div>
      </div>

      <!-- 好 -->
      <div class="card">
        <div class="card-char">好</div>
        <div class="card-pinyin">hǎo -- Good</div>
        <div class="card-decomp">
          <div class="comp"><span class="comp-char">女</span><span class="comp-meaning">woman</span></div>
          <span class="plus">+</span>
          <div class="comp"><span class="comp-char">子</span><span class="comp-meaning">child</span></div>
        </div>
        <div class="card-logic">GOODNESS = MOTHER-CHILD BOND</div>
        <div class="card-meaning">Woman with child = the image of what is good</div>
      </div>

      <!-- 安 -->
      <div class="card">
        <div class="card-char">安</div>
        <div class="card-pinyin">ān -- Peace, Safety</div>
        <div class="card-decomp">
          <div class="comp"><span class="comp-char">宀</span><span class="comp-meaning">roof</span></div>
          <span class="plus">+</span>
          <div class="comp"><span class="comp-char">女</span><span class="comp-meaning">woman</span></div>
        </div>
        <div class="card-logic">PEACE = SHELTERED PERSON</div>
        <div class="card-meaning">Woman under a roof = security, tranquility</div>
      </div>

      <!-- 家 -->
      <div class="card">
        <div class="card-char">家</div>
        <div class="card-pinyin">jiā -- Home, Family</div>
        <div class="card-decomp">
          <div class="comp"><span class="comp-char">宀</span><span class="comp-meaning">roof</span></div>
          <span class="plus">+</span>
          <div class="comp"><span class="comp-char">豕</span><span class="comp-meaning">pig</span></div>
        </div>
        <div class="card-logic">HOME = DOMESTIC ANIMALS SHELTERED</div>
        <div class="card-meaning">Pig under a roof = household, domesticity</div>
      </div>

      <!-- 信 -->
      <div class="card">
        <div class="card-char">信</div>
        <div class="card-pinyin">xin -- Trust, Believe</div>
        <div class="card-decomp">
          <div class="comp"><span class="comp-char">人</span><span class="comp-meaning">person</span></div>
          <span class="plus">+</span>
          <div class="comp"><span class="comp-char">言</span><span class="comp-meaning">speech</span></div>
        </div>
        <div class="card-logic">TRUST = PERSON + THEIR WORD</div>
        <div class="card-meaning">A person standing by their speech = trustworthy</div>
      </div>

      <!-- 休 -->
      <div class="card">
        <div class="card-char">休</div>
        <div class="card-pinyin">xiū -- Rest</div>
        <div class="card-decomp">
          <div class="comp"><span class="comp-char">人</span><span class="comp-meaning">person</span></div>
          <span class="plus">+</span>
          <div class="comp"><span class="comp-char">木</span><span class="comp-meaning">tree</span></div>
        </div>
        <div class="card-logic">REST = PERSON + SUPPORT</div>
        <div class="card-meaning">A person leaning against a tree = taking rest</div>
      </div>

      <!-- 从 -->
      <div class="card">
        <div class="card-char">从</div>
        <div class="card-pinyin">cong -- Follow</div>
        <div class="card-decomp">
          <div class="comp"><span class="comp-char">人</span><span class="comp-meaning">person</span></div>
          <span class="plus">+</span>
          <div class="comp"><span class="comp-char">人</span><span class="comp-meaning">person</span></div>
        </div>
        <div class="card-logic">FOLLOWING = ONE BEHIND ANOTHER</div>
        <div class="card-meaning">Two people, one following the other</div>
      </div>

      <!-- 众 -->
      <div class="card">
        <div class="card-char">众</div>
        <div class="card-pinyin">zhong -- Crowd, Masses</div>
        <div class="card-decomp">
          <div class="comp"><span class="comp-char">人</span><span class="comp-meaning">person</span></div>
          <span class="plus">+</span>
          <div class="comp"><span class="comp-char">人</span><span class="comp-meaning">person</span></div>
          <span class="plus">+</span>
          <div class="comp"><span class="comp-char">人</span><span class="comp-meaning">person</span></div>
        </div>
        <div class="card-logic">MULTITUDE = MANY PEOPLE</div>
        <div class="card-meaning">Three people together = a crowd</div>
      </div>

      <!-- 森 -->
      <div class="card">
        <div class="card-char">森</div>
        <div class="card-pinyin">sēn -- Dense Forest</div>
        <div class="card-decomp">
          <div class="comp"><span class="comp-char">木</span><span class="comp-meaning">tree</span></div>
          <span class="plus">+</span>
          <div class="comp"><span class="comp-char">木</span><span class="comp-meaning">tree</span></div>
          <span class="plus">+</span>
          <div class="comp"><span class="comp-char">木</span><span class="comp-meaning">tree</span></div>
        </div>
        <div class="card-logic">DENSITY = MULTIPLICATION</div>
        <div class="card-meaning">Three trees = dense forest (木 one tree, 林 two = grove)</div>
      </div>
    </div>

    <div class="caveat">
      <strong>Caveat:</strong> Modern etymology shows many traditional compound-ideograph analyses are folk etymologies. Some characters originally had phonetic components obscured by millennia of pronunciation change. However, the visual-metaphorical readings function as powerful mnemonics and resonate as cultural logic, even when historically uncertain.
    </div>

    <div class="simp-note">
      <strong>Simplification &amp; Metaphor Loss:</strong> Traditional 愛 (love) contains 心 (heart) at its center &mdash; love literally has heart in it. Simplified 爱 removed the heart component. This is a case where PRC simplification reduced visual-metaphorical transparency.
    </div>
  </div>

  <figcaption>
    <h2>Diagram 4: Compound Ideograph Gallery</h2>
    <p>Chinese characters can visually encode metaphorical reasoning &mdash; a feature structurally impossible in alphabetic scripts. Each character's visual composition tells a story: sun + moon = bright, person + tree = rest. This is a third layer of metaphorical encoding unique to logographic writing systems.</p>
  </figcaption>
</figure>
</body>
</html>
