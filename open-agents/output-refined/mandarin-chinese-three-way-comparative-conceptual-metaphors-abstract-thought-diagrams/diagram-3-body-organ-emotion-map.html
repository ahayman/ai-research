<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Body-Organ Emotion Map -- Chinese vs. English</title>
<style>
  :root {
    --bg: #0f172a;
    --fg: #e2e8f0;
    --surface: #1e293b;
    --border: #334155;
    --accent: #06b6d4;
    --chinese: #f87171;
    --english: #a78bfa;
    --muted: #94a3b8;
    --caption-bg: #1e293b;
    --fire: #ef4444;
    --wood: #22c55e;
    --earth: #eab308;
    --metal: #94a3b8;
    --water: #3b82f6;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure { max-width: 960px; width: 100%; }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding: 1rem 1.5rem;
    background: var(--caption-bg);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 700; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); max-width: 700px; margin: 0 auto; }
  .chart-wrapper {
    overflow-x: auto;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--surface);
    padding: 1.5rem 1rem;
  }
  svg { display: block; margin: 0 auto; }
  .legend {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 1rem;
    margin-top: 1rem;
    padding: 0.75rem;
    background: rgba(6,182,212,0.05);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.78rem;
    color: var(--muted);
  }
  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
</style>
</head>
<body>
<figure>
  <div class="chart-wrapper">
    <svg viewBox="0 0 920 620" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
      <!-- Title -->
      <text x="460" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#e2e8f0">Body-Organ Emotion Map: Chinese (7 Organs) vs. English (1-2 Organs)</text>
      <text x="460" y="50" text-anchor="middle" font-size="11" fill="#94a3b8">Grounded in Traditional Chinese Medicine (TCM) Five-Element Theory</text>

      <!-- ===== CHINESE SIDE ===== -->
      <rect x="20" y="65" width="500" height="540" rx="12" fill="rgba(248,113,113,0.03)" stroke="rgba(248,113,113,0.15)" stroke-width="1.5"/>
      <text x="270" y="90" text-anchor="middle" font-size="14" font-weight="700" fill="#f87171">Chinese: Distributed Organ-Emotion System</text>

      <!-- Body silhouette (simplified) -->
      <ellipse cx="200" cy="155" rx="40" ry="45" fill="none" stroke="#475569" stroke-width="1.5"/>
      <rect x="160" y="195" width="80" height="180" rx="30" fill="none" stroke="#475569" stroke-width="1.5"/>
      <!-- Neck -->
      <line x1="190" y1="195" x2="190" y2="195" stroke="#475569" stroke-width="1.5"/>

      <!-- HEART - Fire -->
      <circle cx="200" cy="230" r="16" fill="rgba(239,68,68,0.15)" stroke="#ef4444" stroke-width="2"/>
      <text x="200" y="234" text-anchor="middle" font-size="14" fill="#ef4444" font-family="serif">心</text>
      <!-- Arrow to label -->
      <line x1="217" y1="225" x2="290" y2="200" stroke="#ef4444" stroke-width="1" stroke-dasharray="3,3"/>
      <rect x="290" y="185" width="220" height="45" rx="6" fill="rgba(239,68,68,0.08)" stroke="rgba(239,68,68,0.3)" stroke-width="1"/>
      <text x="300" y="202" font-size="11" font-weight="700" fill="#ef4444">Heart (心 xīn) -- Fire</text>
      <text x="300" y="218" font-size="9.5" fill="#94a3b8">Joy (喜) + ALL cognition | 心烦 agitated, 心疼 pity</text>

      <!-- LUNGS - Metal -->
      <circle cx="200" cy="260" r="14" fill="rgba(148,163,184,0.15)" stroke="#94a3b8" stroke-width="2"/>
      <text x="200" y="264" text-anchor="middle" font-size="12" fill="#94a3b8" font-family="serif">肺</text>
      <line x1="214" y1="260" x2="290" y2="248" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,3"/>
      <rect x="290" y="236" width="220" height="35" rx="6" fill="rgba(148,163,184,0.06)" stroke="rgba(148,163,184,0.2)" stroke-width="1"/>
      <text x="300" y="252" font-size="11" font-weight="700" fill="#94a3b8">Lungs (肺 fèi) -- Metal</text>
      <text x="300" y="265" font-size="9.5" fill="#94a3b8">Grief (悲) | 肺腑之言 heartfelt words</text>

      <!-- LIVER - Wood -->
      <circle cx="175" cy="290" r="14" fill="rgba(34,197,94,0.15)" stroke="#22c55e" stroke-width="2"/>
      <text x="175" y="294" text-anchor="middle" font-size="12" fill="#22c55e" font-family="serif">肝</text>
      <line x1="189" y1="287" x2="290" y2="287" stroke="#22c55e" stroke-width="1" stroke-dasharray="3,3"/>
      <rect x="290" y="278" width="220" height="35" rx="6" fill="rgba(34,197,94,0.06)" stroke="rgba(34,197,94,0.2)" stroke-width="1"/>
      <text x="300" y="294" font-size="11" font-weight="700" fill="#22c55e">Liver (肝 gān) -- Wood</text>
      <text x="300" y="307" font-size="9.5" fill="#94a3b8">Anger (怒) | 肝火旺 irascible, 大动肝火 furious</text>

      <!-- GALLBLADDER -->
      <circle cx="225" cy="300" r="11" fill="rgba(6,182,212,0.15)" stroke="#06b6d4" stroke-width="2"/>
      <text x="225" y="304" text-anchor="middle" font-size="10" fill="#06b6d4" font-family="serif">胆</text>
      <line x1="236" y1="298" x2="290" y2="320" stroke="#06b6d4" stroke-width="1" stroke-dasharray="3,3"/>
      <rect x="290" y="320" width="220" height="35" rx="6" fill="rgba(6,182,212,0.06)" stroke="rgba(6,182,212,0.2)" stroke-width="1"/>
      <text x="300" y="335" font-size="11" font-weight="700" fill="#06b6d4">Gallbladder (胆 dǎn)</text>
      <text x="300" y="348" font-size="9.5" fill="#94a3b8">Courage | 胆大 brave, 胆小 cowardly</text>

      <!-- SPLEEN - Earth -->
      <circle cx="195" cy="325" r="14" fill="rgba(234,179,8,0.15)" stroke="#eab308" stroke-width="2"/>
      <text x="195" y="329" text-anchor="middle" font-size="12" fill="#eab308" font-family="serif">脾</text>
      <line x1="209" y1="325" x2="290" y2="365" stroke="#eab308" stroke-width="1" stroke-dasharray="3,3"/>
      <rect x="290" y="362" width="220" height="35" rx="6" fill="rgba(234,179,8,0.06)" stroke="rgba(234,179,8,0.2)" stroke-width="1"/>
      <text x="300" y="377" font-size="11" font-weight="700" fill="#eab308">Spleen (脾 pí) -- Earth</text>
      <text x="300" y="390" font-size="9.5" fill="#94a3b8">Worry/Temper | 脾气 temperament</text>

      <!-- KIDNEYS - Water -->
      <circle cx="185" cy="355" r="12" fill="rgba(59,130,246,0.15)" stroke="#3b82f6" stroke-width="2"/>
      <text x="185" y="359" text-anchor="middle" font-size="11" fill="#3b82f6" font-family="serif">肾</text>
      <line x1="197" y1="353" x2="290" y2="410" stroke="#3b82f6" stroke-width="1" stroke-dasharray="3,3"/>
      <rect x="290" y="404" width="220" height="35" rx="6" fill="rgba(59,130,246,0.06)" stroke="rgba(59,130,246,0.2)" stroke-width="1"/>
      <text x="300" y="419" font-size="11" font-weight="700" fill="#3b82f6">Kidneys (肾 shèn) -- Water</text>
      <text x="300" y="432" font-size="9.5" fill="#94a3b8">Fear (恐) | Primarily in TCM context</text>

      <!-- INTESTINES -->
      <circle cx="200" cy="370" r="12" fill="rgba(236,72,153,0.15)" stroke="#ec4899" stroke-width="2"/>
      <text x="200" y="374" text-anchor="middle" font-size="10" fill="#ec4899" font-family="serif">肠</text>
      <line x1="212" y1="370" x2="290" y2="450" stroke="#ec4899" stroke-width="1" stroke-dasharray="3,3"/>
      <rect x="290" y="446" width="220" height="35" rx="6" fill="rgba(236,72,153,0.06)" stroke="rgba(236,72,153,0.2)" stroke-width="1"/>
      <text x="300" y="461" font-size="11" font-weight="700" fill="#ec4899">Intestines (肠 cháng)</text>
      <text x="300" y="474" font-size="9.5" fill="#94a3b8">Deep feeling | 断肠 heartbroken</text>

      <!-- Count badge -->
      <rect x="80" y="500" width="150" height="35" rx="8" fill="rgba(248,113,113,0.1)" stroke="rgba(248,113,113,0.3)" stroke-width="1.5"/>
      <text x="155" y="522" text-anchor="middle" font-size="13" font-weight="700" fill="#f87171">7 Organs Mapped</text>

      <text x="270" y="555" text-anchor="middle" font-size="10.5" fill="#34d399" font-weight="600">Shared across Mandarin + Cantonese + all Chinese varieties</text>
      <text x="270" y="573" text-anchor="middle" font-size="10" fill="#94a3b8">Productive system: generates new expressions following organ-emotion patterns</text>

      <!-- ===== ENGLISH SIDE ===== -->
      <rect x="540" y="65" width="360" height="540" rx="12" fill="rgba(167,139,250,0.04)" stroke="rgba(167,139,250,0.15)" stroke-width="1.5"/>
      <text x="720" y="90" text-anchor="middle" font-size="14" font-weight="700" fill="#a78bfa">English: Sparse System</text>

      <!-- Heart (dominant) -->
      <rect x="565" y="110" width="310" height="100" rx="8" fill="rgba(167,139,250,0.08)" stroke="rgba(167,139,250,0.3)" stroke-width="1.5"/>
      <text x="575" y="133" font-size="12" font-weight="700" fill="#a78bfa">Heart = DOMINANT (almost everything)</text>
      <text x="585" y="153" font-size="10" fill="#94a3b8">"heartbroken," "heartfelt," "sweetheart"</text>
      <text x="585" y="170" font-size="10" fill="#94a3b8">"from the heart," "heart of the matter"</text>
      <text x="585" y="187" font-size="10" fill="#94a3b8">"take heart," "lose heart," "change of heart"</text>

      <!-- Gut (secondary) -->
      <rect x="565" y="225" width="310" height="65" rx="8" fill="rgba(167,139,250,0.05)" stroke="rgba(167,139,250,0.15)" stroke-width="1"/>
      <text x="575" y="248" font-size="12" font-weight="600" fill="#a78bfa">Gut = secondary</text>
      <text x="585" y="268" font-size="10" fill="#94a3b8">"gut feeling," "gut-wrenching," "gutsy"</text>

      <!-- Vestigial traces -->
      <rect x="565" y="310" width="310" height="130" rx="8" fill="rgba(100,116,139,0.08)" stroke="rgba(100,116,139,0.15)" stroke-width="1"/>
      <text x="575" y="333" font-size="12" font-weight="600" fill="#64748b">Vestigial Traces (frozen, unproductive)</text>
      <text x="585" y="358" font-size="10" fill="#94a3b8">Spleen: "vent your spleen" (archaic)</text>
      <text x="585" y="378" font-size="10" fill="#94a3b8">Liver: "lily-livered" (cowardly, archaic)</text>
      <text x="585" y="398" font-size="10" fill="#94a3b8">Bile: "full of bile" (bitter/angry, rare)</text>
      <text x="585" y="418" font-size="10" fill="#94a3b8">Gall: "gall" (audacity, archaic)</text>

      <!-- Count badge -->
      <rect x="640" y="460" width="160" height="35" rx="8" fill="rgba(167,139,250,0.1)" stroke="rgba(167,139,250,0.3)" stroke-width="1.5"/>
      <text x="720" y="482" text-anchor="middle" font-size="13" font-weight="700" fill="#a78bfa">1-2 Active Organs</text>

      <!-- Summary comparison -->
      <rect x="565" y="510" width="310" height="80" rx="8" fill="rgba(100,116,139,0.06)" stroke="rgba(100,116,139,0.15)" stroke-width="1"/>
      <text x="720" y="535" text-anchor="middle" font-size="11" font-weight="600" fill="#64748b">Key Difference</text>
      <text x="720" y="555" text-anchor="middle" font-size="10" fill="#94a3b8">Chinese: productive system (new expressions</text>
      <text x="720" y="570" text-anchor="middle" font-size="10" fill="#94a3b8">generated following organ-emotion patterns)</text>
      <text x="720" y="585" text-anchor="middle" font-size="10" fill="#94a3b8">English: frozen idioms (no new ones coined)</text>
    </svg>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#ef4444"></div> Fire (Heart)</div>
    <div class="legend-item"><div class="legend-dot" style="background:#22c55e"></div> Wood (Liver)</div>
    <div class="legend-item"><div class="legend-dot" style="background:#eab308"></div> Earth (Spleen)</div>
    <div class="legend-item"><div class="legend-dot" style="background:#94a3b8"></div> Metal (Lungs)</div>
    <div class="legend-item"><div class="legend-dot" style="background:#3b82f6"></div> Water (Kidneys)</div>
    <div class="legend-item"><div class="legend-dot" style="background:#06b6d4"></div> Gallbladder</div>
    <div class="legend-item"><div class="legend-dot" style="background:#ec4899"></div> Intestines</div>
  </div>

  <figcaption>
    <h2>Diagram 3: Body-Organ Emotion Map</h2>
    <p>Chinese distributes emotions across 7 internal organs following Traditional Chinese Medicine, each with productive metaphorical expressions. English concentrates almost everything in the heart, with vestigial traces of spleen and liver. The Chinese system is shared across all varieties and remains productive; the English traces are frozen idioms.</p>
  </figcaption>
</figure>
</body>
</html>
