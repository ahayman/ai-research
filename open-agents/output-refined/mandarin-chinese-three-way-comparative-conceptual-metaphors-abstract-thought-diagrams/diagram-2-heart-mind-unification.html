<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heart-Mind Unification -- 心 vs. English Head/Heart Split</title>
<style>
  :root {
    --bg: #0f172a;
    --fg: #e2e8f0;
    --surface: #1e293b;
    --border: #334155;
    --accent: #06b6d4;
    --chinese: #f87171;
    --chinese-light: rgba(248,113,113,0.12);
    --english: #a78bfa;
    --english-light: rgba(167,139,250,0.12);
    --gold: #fbbf24;
    --gold-light: rgba(251,191,36,0.1);
    --shared: #34d399;
    --muted: #94a3b8;
    --caption-bg: #1e293b;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure { max-width: 960px; width: 100%; }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding: 1rem 1.5rem;
    background: var(--caption-bg);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 700; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); max-width: 700px; margin: 0 auto; }
  .chart-wrapper {
    overflow-x: auto;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--surface);
    padding: 1.5rem 1rem;
  }
  svg { display: block; margin: 0 auto; }
  .legend {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 1.25rem;
    margin-top: 1rem;
    padding: 0.75rem;
    background: rgba(6,182,212,0.05);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.8rem;
    color: var(--muted);
  }
  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
</style>
</head>
<body>
<figure>
  <div class="chart-wrapper">
    <svg viewBox="0 0 920 580" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
      <!-- Title -->
      <text x="460" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#e2e8f0">心 (Xīn): Unified Heart-Mind vs. English Head/Heart Split</text>

      <!-- ===== CHINESE SIDE ===== -->
      <rect x="20" y="50" width="430" height="510" rx="12" fill="rgba(248,113,113,0.04)" stroke="rgba(248,113,113,0.2)" stroke-width="1.5"/>
      <text x="235" y="78" text-anchor="middle" font-size="15" font-weight="700" fill="#f87171">Chinese Model: ONE Unified Center</text>
      <text x="235" y="96" text-anchor="middle" font-size="11" fill="#94a3b8">All Chinese varieties (Mandarin, Cantonese, Hokkien)</text>

      <!-- Big unified circle -->
      <circle cx="235" cy="260" r="140" fill="rgba(248,113,113,0.06)" stroke="#f87171" stroke-width="2.5"/>
      <text x="235" y="150" text-anchor="middle" font-size="42" fill="#f87171" font-family="serif">心</text>
      <text x="235" y="175" text-anchor="middle" font-size="13" fill="#f87171" font-weight="600">xīn = Heart-Mind</text>
      <text x="235" y="193" text-anchor="middle" font-size="10.5" fill="#94a3b8">Cognition + Emotion + Will</text>

      <!-- Cognitive characters (left cluster) -->
      <text x="135" y="225" text-anchor="middle" font-size="10" fill="#06b6d4" font-weight="600">COGNITION</text>
      <text x="135" y="245" text-anchor="middle" font-size="18" fill="#06b6d4" font-family="serif">想</text>
      <text x="135" y="260" text-anchor="middle" font-size="9" fill="#94a3b8">think</text>
      <text x="175" y="280" text-anchor="middle" font-size="18" fill="#06b6d4" font-family="serif">思</text>
      <text x="175" y="295" text-anchor="middle" font-size="9" fill="#94a3b8">contemplate</text>
      <text x="130" y="315" text-anchor="middle" font-size="18" fill="#06b6d4" font-family="serif">忆</text>
      <text x="130" y="330" text-anchor="middle" font-size="9" fill="#94a3b8">remember</text>
      <text x="170" y="350" text-anchor="middle" font-size="18" fill="#06b6d4" font-family="serif">悟</text>
      <text x="170" y="365" text-anchor="middle" font-size="9" fill="#94a3b8">comprehend</text>

      <!-- Emotional characters (right cluster) -->
      <text x="335" y="225" text-anchor="middle" font-size="10" fill="#fbbf24" font-weight="600">EMOTION</text>
      <text x="335" y="245" text-anchor="middle" font-size="18" fill="#fbbf24" font-family="serif">情</text>
      <text x="335" y="260" text-anchor="middle" font-size="9" fill="#94a3b8">feeling</text>
      <text x="295" y="280" text-anchor="middle" font-size="18" fill="#fbbf24" font-family="serif">怒</text>
      <text x="295" y="295" text-anchor="middle" font-size="9" fill="#94a3b8">anger</text>
      <text x="340" y="315" text-anchor="middle" font-size="18" fill="#fbbf24" font-family="serif">恐</text>
      <text x="340" y="330" text-anchor="middle" font-size="9" fill="#94a3b8">fear</text>
      <text x="300" y="350" text-anchor="middle" font-size="18" fill="#fbbf24" font-family="serif">悲</text>
      <text x="300" y="365" text-anchor="middle" font-size="9" fill="#94a3b8">sorrow</text>

      <!-- Radical indicator -->
      <text x="235" y="400" text-anchor="middle" font-size="10" fill="#34d399" font-weight="600">All share radical: 心 / 忄</text>
      <text x="235" y="418" text-anchor="middle" font-size="10" fill="#94a3b8">Writing system makes the unity VISIBLE</text>

      <!-- Key properties -->
      <rect x="50" y="440" width="370" height="100" rx="8" fill="rgba(6,182,212,0.06)" stroke="rgba(6,182,212,0.2)" stroke-width="1"/>
      <text x="235" y="462" text-anchor="middle" font-size="10.5" fill="#06b6d4" font-weight="600">Properties of the 心 System</text>
      <text x="65" y="482" font-size="10" fill="#94a3b8">Thinking and feeling = same domain</text>
      <text x="65" y="498" font-size="10" fill="#94a3b8">Reason and emotion = complementary, not opposed</text>
      <text x="65" y="514" font-size="10" fill="#94a3b8">Seat of cognition = heart/chest, not head</text>
      <text x="65" y="530" font-size="10" fill="#94a3b8">One radical unifies all mental/emotional words</text>

      <!-- ===== ENGLISH SIDE ===== -->
      <rect x="480" y="50" width="420" height="380" rx="12" fill="rgba(167,139,250,0.04)" stroke="rgba(167,139,250,0.2)" stroke-width="1.5"/>
      <text x="690" y="78" text-anchor="middle" font-size="15" font-weight="700" fill="#a78bfa">English Model: TWO Separate Centers</text>

      <!-- Mind/Head circle -->
      <circle cx="610" cy="195" r="85" fill="rgba(167,139,250,0.08)" stroke="#a78bfa" stroke-width="2"/>
      <text x="610" y="145" text-anchor="middle" font-size="14" fill="#a78bfa" font-weight="700">MIND / HEAD</text>
      <text x="610" y="165" text-anchor="middle" font-size="11" fill="#a78bfa">Cognition</text>
      <text x="610" y="190" text-anchor="middle" font-size="10" fill="#94a3b8">"Use your head"</text>
      <text x="610" y="207" text-anchor="middle" font-size="10" fill="#94a3b8">"think it through"</text>
      <text x="610" y="224" text-anchor="middle" font-size="10" fill="#94a3b8">"rational mind"</text>
      <text x="610" y="241" text-anchor="middle" font-size="10" fill="#94a3b8">"brainy"</text>

      <!-- Tension arrow -->
      <text x="690" y="268" text-anchor="middle" font-size="22" fill="#64748b">vs.</text>
      <line x1="660" y1="258" x2="720" y2="258" stroke="#64748b" stroke-width="1" stroke-dasharray="3,3"/>

      <!-- Heart circle -->
      <circle cx="770" cy="340" r="85" fill="rgba(251,191,36,0.08)" stroke="#fbbf24" stroke-width="2"/>
      <text x="770" y="290" text-anchor="middle" font-size="14" fill="#fbbf24" font-weight="700">HEART</text>
      <text x="770" y="310" text-anchor="middle" font-size="11" fill="#fbbf24">Emotion</text>
      <text x="770" y="335" text-anchor="middle" font-size="10" fill="#94a3b8">"Follow your heart"</text>
      <text x="770" y="352" text-anchor="middle" font-size="10" fill="#94a3b8">"heartbroken"</text>
      <text x="770" y="369" text-anchor="middle" font-size="10" fill="#94a3b8">"heartfelt"</text>
      <text x="770" y="386" text-anchor="middle" font-size="10" fill="#94a3b8">"listen to your heart"</text>

      <!-- Dualism label -->
      <rect x="510" y="395" width="350" height="25" rx="4" fill="rgba(167,139,250,0.08)"/>
      <text x="685" y="413" text-anchor="middle" font-size="10.5" fill="#a78bfa" font-style="italic">"Head vs. heart" = a core English cultural metaphor</text>

      <!-- ===== CROSS-LINGUISTIC PARALLELS ===== -->
      <rect x="480" y="450" width="420" height="110" rx="10" fill="rgba(52,211,153,0.06)" stroke="rgba(52,211,153,0.2)" stroke-width="1.5"/>
      <text x="690" y="475" text-anchor="middle" font-size="12" font-weight="700" fill="#34d399">Cross-Linguistic Parallels</text>
      <text x="500" y="498" font-size="10.5" fill="#94a3b8">Arabic: </text>
      <text x="545" y="498" font-size="11" fill="#34d399" font-weight="600">qalb (heart)</text>
      <text x="625" y="498" font-size="10.5" fill="#94a3b8"> = seat of reason + feeling</text>
      <text x="500" y="518" font-size="10.5" fill="#94a3b8">Japanese: </text>
      <text x="555" y="518" font-size="11" fill="#34d399" font-weight="600">kokoro (心)</text>
      <text x="638" y="518" font-size="10.5" fill="#94a3b8"> = borrowed unified concept</text>
      <text x="500" y="538" font-size="10.5" fill="#94a3b8">Korean: </text>
      <text x="548" y="538" font-size="11" fill="#34d399" font-weight="600">maeum (마음)</text>
      <text x="640" y="538" font-size="10.5" fill="#94a3b8"> = heart-mind parallel</text>
    </svg>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#f87171"></div> Chinese 心 unified system</div>
    <div class="legend-item"><div class="legend-dot" style="background:#06b6d4"></div> Cognitive domain</div>
    <div class="legend-item"><div class="legend-dot" style="background:#fbbf24"></div> Emotional domain</div>
    <div class="legend-item"><div class="legend-dot" style="background:#a78bfa"></div> English split system</div>
    <div class="legend-item"><div class="legend-dot" style="background:#34d399"></div> Cross-linguistic parallels</div>
  </div>

  <figcaption>
    <h2>Diagram 2: Heart-Mind Unification</h2>
    <p>Chinese 心 (xīn) unifies cognition and emotion in a single concept &mdash; the heart radical appears in both "think" (想) and "anger" (怒). English separates these into "mind/head" (reason) vs. "heart" (emotion), creating a dualism absent from Chinese, Arabic, Japanese, and Korean.</p>
  </figcaption>
</figure>
</body>
</html>
