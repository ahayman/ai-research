<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Metaphor Universality Spectrum -- Three-Way Comparison</title>
<style>
  :root {
    --bg: #0f172a;
    --fg: #e2e8f0;
    --surface: #1e293b;
    --border: #334155;
    --accent: #06b6d4;
    --chinese: #f87171;
    --english: #a78bfa;
    --shared: #34d399;
    --gold: #fbbf24;
    --muted: #94a3b8;
    --caption-bg: #1e293b;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure { max-width: 960px; width: 100%; }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding: 1rem 1.5rem;
    background: var(--caption-bg);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 700; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); max-width: 700px; margin: 0 auto; }
  .chart-wrapper {
    overflow-x: auto;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--surface);
    padding: 1.5rem 1rem;
  }
  svg { display: block; margin: 0 auto; }
  .legend {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 1.25rem;
    margin-top: 1rem;
    padding: 0.75rem;
    background: rgba(6,182,212,0.05);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.8rem;
    color: var(--muted);
  }
  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
</style>
</head>
<body>
<figure>
  <div class="chart-wrapper">
    <svg viewBox="0 0 920 620" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
      <!-- Title -->
      <text x="460" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#e2e8f0">Metaphor Universality Spectrum</text>
      <text x="460" y="50" text-anchor="middle" font-size="11" fill="#94a3b8">Where each metaphor falls: Universal (bodily) to Culture-Specific (filtered through tradition)</text>

      <!-- Spectrum bar -->
      <defs>
        <linearGradient id="spectrum" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="#34d399"/>
          <stop offset="50%" stop-color="#fbbf24"/>
          <stop offset="100%" stop-color="#f87171"/>
        </linearGradient>
      </defs>
      <rect x="80" y="75" width="760" height="12" rx="6" fill="url(#spectrum)" opacity="0.3"/>
      <rect x="80" y="75" width="760" height="12" rx="6" fill="none" stroke="#475569" stroke-width="1"/>

      <!-- Spectrum labels -->
      <text x="80" y="107" font-size="11" font-weight="700" fill="#34d399">UNIVERSAL</text>
      <text x="80" y="121" font-size="9" fill="#94a3b8">Found in all/most languages</text>
      <text x="80" y="133" font-size="9" fill="#94a3b8">Bodily grounding</text>

      <text x="400" y="107" text-anchor="middle" font-size="11" font-weight="700" fill="#fbbf24">WIDESPREAD</text>
      <text x="400" y="121" text-anchor="middle" font-size="9" fill="#94a3b8">Found in many languages</text>
      <text x="400" y="133" text-anchor="middle" font-size="9" fill="#94a3b8">Variable realizations</text>

      <text x="840" y="107" text-anchor="end" font-size="11" font-weight="700" fill="#f87171">CULTURE-SPECIFIC</text>
      <text x="840" y="121" text-anchor="end" font-size="9" fill="#94a3b8">Found in one/few traditions</text>
      <text x="840" y="133" text-anchor="end" font-size="9" fill="#94a3b8">Cultural model filtering</text>

      <!-- ===== METAPHOR ENTRIES ===== -->
      <!-- Each entry: colored bar positioned on spectrum, with icons showing which systems have it -->

      <!-- 1. ANGER IS HEAT (Universal) -->
      <rect x="80" y="155" width="160" height="55" rx="8" fill="rgba(52,211,153,0.08)" stroke="rgba(52,211,153,0.3)" stroke-width="1.5"/>
      <text x="95" y="175" font-size="11" font-weight="700" fill="#34d399">ANGER IS HEAT / FIRE</text>
      <text x="95" y="192" font-size="9" fill="#94a3b8">Ch: 发火 (emit fire = angry)</text>
      <text x="95" y="204" font-size="9" fill="#94a3b8">En: "burning with rage"</text>
      <circle cx="253" cy="182" r="6" fill="#f87171" stroke="none"/>
      <text x="253" y="185" text-anchor="middle" font-size="7" fill="white" font-weight="700">ZH</text>
      <circle cx="270" cy="182" r="6" fill="#a78bfa" stroke="none"/>
      <text x="270" y="185" text-anchor="middle" font-size="7" fill="white" font-weight="700">EN</text>

      <!-- 2. HAPPINESS IS UP (Universal) -->
      <rect x="80" y="220" width="160" height="55" rx="8" fill="rgba(52,211,153,0.08)" stroke="rgba(52,211,153,0.3)" stroke-width="1.5"/>
      <text x="95" y="240" font-size="11" font-weight="700" fill="#34d399">HAPPINESS IS UP</text>
      <text x="95" y="257" font-size="9" fill="#94a3b8">Ch: 高兴 (high-excitement)</text>
      <text x="95" y="269" font-size="9" fill="#94a3b8">En: "I'm on top of the world"</text>
      <circle cx="253" cy="247" r="6" fill="#f87171" stroke="none"/>
      <text x="253" y="250" text-anchor="middle" font-size="7" fill="white" font-weight="700">ZH</text>
      <circle cx="270" cy="247" r="6" fill="#a78bfa" stroke="none"/>
      <text x="270" y="250" text-anchor="middle" font-size="7" fill="white" font-weight="700">EN</text>

      <!-- 3. KNOWING IS SEEING (Universal) -->
      <rect x="80" y="285" width="160" height="55" rx="8" fill="rgba(52,211,153,0.08)" stroke="rgba(52,211,153,0.3)" stroke-width="1.5"/>
      <text x="95" y="305" font-size="11" font-weight="700" fill="#34d399">KNOWING IS SEEING</text>
      <text x="95" y="322" font-size="9" fill="#94a3b8">Ch: 看出来 (look-out = realize)</text>
      <text x="95" y="334" font-size="9" fill="#94a3b8">En: "I see what you mean"</text>
      <circle cx="253" cy="312" r="6" fill="#f87171" stroke="none"/>
      <text x="253" y="315" text-anchor="middle" font-size="7" fill="white" font-weight="700">ZH</text>
      <circle cx="270" cy="312" r="6" fill="#a78bfa" stroke="none"/>
      <text x="270" y="315" text-anchor="middle" font-size="7" fill="white" font-weight="700">EN</text>

      <!-- 4. TIME IS SPACE (Widespread, variable) -->
      <rect x="310" y="155" width="210" height="70" rx="8" fill="rgba(251,191,36,0.08)" stroke="rgba(251,191,36,0.3)" stroke-width="1.5"/>
      <text x="325" y="175" font-size="11" font-weight="700" fill="#fbbf24">TIME IS SPACE</text>
      <text x="325" y="192" font-size="9" fill="#94a3b8">Universal concept, but AXIS varies:</text>
      <text x="325" y="206" font-size="9" fill="#f87171">Ch: horizontal (前/后) + vertical (上/下)</text>
      <text x="325" y="218" font-size="9" fill="#a78bfa">En: horizontal only (forward/back)</text>
      <circle cx="530" cy="172" r="6" fill="#f87171" stroke="none"/>
      <text x="530" y="175" text-anchor="middle" font-size="7" fill="white" font-weight="700">ZH</text>
      <circle cx="547" cy="172" r="6" fill="#a78bfa" stroke="none"/>
      <text x="547" y="175" text-anchor="middle" font-size="7" fill="white" font-weight="700">EN</text>

      <!-- 5. IDEAS ARE FOOD (Widespread) -->
      <rect x="310" y="238" width="210" height="55" rx="8" fill="rgba(251,191,36,0.08)" stroke="rgba(251,191,36,0.25)" stroke-width="1"/>
      <text x="325" y="258" font-size="11" font-weight="700" fill="#fbbf24">IDEAS ARE FOOD</text>
      <text x="325" y="275" font-size="9" fill="#94a3b8">Ch: 消化 (digest = absorb idea)</text>
      <text x="325" y="287" font-size="9" fill="#94a3b8">En: "food for thought"</text>
      <circle cx="530" cy="255" r="6" fill="#f87171" stroke="none"/>
      <text x="530" y="258" text-anchor="middle" font-size="7" fill="white" font-weight="700">ZH</text>
      <circle cx="547" cy="255" r="6" fill="#a78bfa" stroke="none"/>
      <text x="547" y="258" text-anchor="middle" font-size="7" fill="white" font-weight="700">EN</text>

      <!-- 6. HEART-MIND UNITY (Chinese + Arabic, not English) -->
      <rect x="560" y="155" width="200" height="70" rx="8" fill="rgba(248,113,113,0.08)" stroke="rgba(248,113,113,0.25)" stroke-width="1.5"/>
      <text x="575" y="175" font-size="11" font-weight="700" fill="#f87171">HEART-MIND UNITY</text>
      <text x="575" y="192" font-size="9" fill="#94a3b8">Ch: 心 = cognition + emotion</text>
      <text x="575" y="206" font-size="9" fill="#94a3b8">Arabic: qalb (heart) = similar</text>
      <text x="575" y="218" font-size="9" fill="#64748b">En: heart/mind SPLIT</text>
      <circle cx="770" cy="172" r="6" fill="#f87171" stroke="none"/>
      <text x="770" y="175" text-anchor="middle" font-size="7" fill="white" font-weight="700">ZH</text>
      <circle cx="787" cy="172" r="6" fill="none" stroke="#a78bfa" stroke-width="1.5"/>

      <!-- 7. GALLBLADDER IS COURAGE (Chinese-specific) -->
      <rect x="680" y="238" width="200" height="55" rx="8" fill="rgba(248,113,113,0.08)" stroke="rgba(248,113,113,0.2)" stroke-width="1"/>
      <text x="695" y="258" font-size="11" font-weight="700" fill="#f87171">GALLBLADDER IS COURAGE</text>
      <text x="695" y="275" font-size="9" fill="#94a3b8">Ch: 胆大 (big gallbladder = brave)</text>
      <text x="695" y="287" font-size="9" fill="#64748b">En: no parallel</text>
      <circle cx="890" cy="255" r="6" fill="#f87171" stroke="none"/>
      <text x="890" y="258" text-anchor="middle" font-size="7" fill="white" font-weight="700">ZH</text>

      <!-- 8. SPLEEN IS TEMPERAMENT (Chinese) -->
      <rect x="680" y="305" width="200" height="55" rx="8" fill="rgba(248,113,113,0.08)" stroke="rgba(248,113,113,0.2)" stroke-width="1"/>
      <text x="695" y="325" font-size="11" font-weight="700" fill="#f87171">SPLEEN IS TEMPERAMENT</text>
      <text x="695" y="342" font-size="9" fill="#94a3b8">Ch: 脾气 (spleen-qi = temper)</text>
      <text x="695" y="354" font-size="9" fill="#64748b">En: "vent your spleen" (archaic)</text>
      <circle cx="890" cy="322" r="6" fill="#f87171" stroke="none"/>
      <text x="890" y="325" text-anchor="middle" font-size="7" fill="white" font-weight="700">ZH</text>

      <!-- 9. FACE IS SOCIAL STANDING (Chinese origin) -->
      <rect x="560" y="375" width="200" height="70" rx="8" fill="rgba(248,113,113,0.08)" stroke="rgba(248,113,113,0.25)" stroke-width="1.5"/>
      <text x="575" y="395" font-size="11" font-weight="700" fill="#f87171">FACE IS SOCIAL STANDING</text>
      <text x="575" y="412" font-size="9" fill="#94a3b8">Ch: 面子 miànzi (elaborate system)</text>
      <text x="575" y="426" font-size="9" fill="#94a3b8">En: "save face" (borrowed from Ch.)</text>
      <text x="575" y="440" font-size="9" fill="#64748b">OED traces to 1876 from Chinese</text>
      <circle cx="770" cy="392" r="6" fill="#f87171" stroke="none"/>
      <text x="770" y="395" text-anchor="middle" font-size="7" fill="white" font-weight="700">ZH</text>
      <circle cx="787" cy="392" r="6" fill="#a78bfa" stroke="none" opacity="0.5"/>
      <text x="787" y="395" text-anchor="middle" font-size="7" fill="white" font-weight="700">EN</text>

      <!-- 10. EATING IS EXPERIENCING (Chinese) -->
      <rect x="680" y="460" width="200" height="55" rx="8" fill="rgba(248,113,113,0.08)" stroke="rgba(248,113,113,0.2)" stroke-width="1"/>
      <text x="695" y="480" font-size="11" font-weight="700" fill="#f87171">EATING IS EXPERIENCING</text>
      <text x="695" y="497" font-size="9" fill="#94a3b8">Ch: 吃苦, 吃亏, 吃惊, 吃醋...</text>
      <text x="695" y="509" font-size="9" fill="#64748b">En: very limited ("eat your words")</text>
      <circle cx="890" cy="477" r="6" fill="#f87171" stroke="none"/>
      <text x="890" y="480" text-anchor="middle" font-size="7" fill="white" font-weight="700">ZH</text>

      <!-- English-specific metaphors section -->
      <rect x="80" y="375" width="230" height="145" rx="8" fill="rgba(167,139,250,0.06)" stroke="rgba(167,139,250,0.2)" stroke-width="1.5"/>
      <text x="95" y="398" font-size="11" font-weight="700" fill="#a78bfa">English-Specific Metaphors</text>

      <text x="95" y="420" font-size="10" fill="#a78bfa" font-weight="600">ARGUMENT IS WAR</text>
      <text x="95" y="434" font-size="9" fill="#94a3b8">"attack a position," "defend a claim"</text>

      <text x="95" y="454" font-size="10" fill="#a78bfa" font-weight="600">TIME IS MONEY</text>
      <text x="95" y="468" font-size="9" fill="#94a3b8">"spend time," "invest time," "waste time"</text>

      <text x="95" y="488" font-size="10" fill="#a78bfa" font-weight="600">THEORIES ARE BUILDINGS</text>
      <text x="95" y="502" font-size="9" fill="#94a3b8">"construct an argument," "foundation"</text>

      <!-- Bottom insight -->
      <rect x="80" y="540" width="760" height="65" rx="10" fill="rgba(6,182,212,0.06)" stroke="rgba(6,182,212,0.2)" stroke-width="1.5"/>
      <text x="460" y="565" text-anchor="middle" font-size="12" font-weight="700" fill="#06b6d4">Pattern: Universal metaphors arise from shared bodily experience (embodied cognition).</text>
      <text x="460" y="585" text-anchor="middle" font-size="11" fill="#94a3b8">Culture-specific metaphors are filtered through particular traditions (TCM, Confucianism, English individualism). The body is universal; the cultural model is local.</text>
    </svg>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#34d399"></div> Universal (all languages)</div>
    <div class="legend-item"><div class="legend-dot" style="background:#fbbf24"></div> Widespread (many, variable)</div>
    <div class="legend-item"><div class="legend-dot" style="background:#f87171"></div> Chinese-specific or Chinese-origin</div>
    <div class="legend-item"><div class="legend-dot" style="background:#a78bfa"></div> English-specific</div>
    <div class="legend-item"><span style="display:inline-block;width:10px;height:10px;border-radius:50%;border:1.5px solid #a78bfa;flex-shrink:0"></span> Absent in English</div>
  </div>

  <figcaption>
    <h2>Diagram 5: Metaphor Universality Spectrum</h2>
    <p>Metaphors range from universal (ANGER IS HEAT, found in all languages due to bodily grounding) through widespread (TIME IS SPACE, with variable axis choices) to culture-specific (GALLBLADDER IS COURAGE, grounded in TCM not universal physiology). English has its own culture-specific metaphors (ARGUMENT IS WAR, TIME IS MONEY) absent from Chinese.</p>
  </figcaption>
</figure>
</body>
</html>
