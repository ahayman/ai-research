<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Partitive Articles and Derivational Suffixes</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --accent: #4361ee; --accent-light: #e8edff;
    --french: #3b82f6; --french-bg: #dbeafe;
    --english: #ef4444; --english-bg: #fee2e2;
    --masc: #3b82f6; --masc-bg: #dbeafe;
    --fem: #ec4899; --fem-bg: #fce7f3;
    --negation: #f59e0b; --negation-bg: #fef3c7;
    --muted: #6c757d; --caption-bg: #f8f9fa;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a; --fg: #e8e8f0; --surface: #1a1a2e; --border: #2d2d44;
      --accent: #6b8aff; --accent-light: #1e2a4a;
      --french: #60a5fa; --french-bg: #1e3a5f;
      --english: #f87171; --english-bg: #5c1a1a;
      --masc: #60a5fa; --masc-bg: #1e3a5f;
      --fem: #f472b6; --fem-bg: #5c1a3a;
      --negation: #fbbf24; --negation-bg: #78350f;
      --muted: #9a9ab0; --caption-bg: #1a1a2e;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg); color: var(--fg);
    display: flex; justify-content: center; padding: 2rem 1rem; line-height: 1.6;
  }
  figure { max-width: 1100px; width: 100%; }
  .diagram-container {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 1.5rem 1rem; overflow-x: auto;
  }
  figcaption {
    text-align: center; margin-top: 1.5rem; padding: 1rem 1.5rem;
    background: var(--caption-bg); border-radius: 8px; border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  svg { display: block; margin: 0 auto; }
  .title-text { font: bold 14px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
  .subtitle-text { font: 11px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
  .box-text { font: 12px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
  .word { font: bold 15px 'Segoe UI', system-ui, sans-serif; }
  .label-sm { font: 10px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
  .legend { display: flex; gap: 1.5rem; justify-content: center; flex-wrap: wrap; margin-top: 1rem; font-size: 0.82rem; color: var(--muted); }
  .legend-item { display: flex; align-items: center; gap: 0.4rem; }
  .legend-swatch { width: 14px; height: 14px; border-radius: 3px; border: 1px solid var(--border); }
</style>
</head>
<body>
<figure>
  <div class="diagram-container">
    <svg viewBox="0 0 1060 620" xmlns="http://www.w3.org/2000/svg" style="min-width:780px;">
      <defs>
        <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="var(--fg)"/>
        </marker>
      </defs>

      <text x="530" y="28" text-anchor="middle" class="title-text" style="font-size:16px;">Partitive Articles and Derivational Suffixes</text>
      <text x="530" y="46" text-anchor="middle" class="subtitle-text">Two systems that have no English equivalent -- and one shared heritage that works differently</text>

      <!-- ========== PARTITIVE ARTICLE SYSTEM ========== -->
      <g transform="translate(30, 65)">
        <text x="250" y="0" text-anchor="middle" class="title-text" fill="var(--french)">The Partitive Article System (no English equivalent)</text>

        <!-- Four forms -->
        <rect x="0" y="20" width="120" height="70" rx="8" fill="var(--masc-bg)" stroke="var(--masc)" stroke-width="2"/>
        <text x="60" y="45" text-anchor="middle" class="word" fill="var(--masc)">du</text>
        <text x="60" y="62" text-anchor="middle" class="label-sm" fill="var(--masc)">masc. sing.</text>
        <text x="60" y="78" text-anchor="middle" class="box-text" style="font-size:10px;">du cafe</text>

        <rect x="135" y="20" width="120" height="70" rx="8" fill="var(--fem-bg)" stroke="var(--fem)" stroke-width="2"/>
        <text x="195" y="45" text-anchor="middle" class="word" fill="var(--fem)">de la</text>
        <text x="195" y="62" text-anchor="middle" class="label-sm" fill="var(--fem)">fem. sing.</text>
        <text x="195" y="78" text-anchor="middle" class="box-text" style="font-size:10px;">de la viande</text>

        <rect x="270" y="20" width="120" height="70" rx="8" fill="var(--accent-light)" stroke="var(--accent)" stroke-width="2"/>
        <text x="330" y="45" text-anchor="middle" class="word" fill="var(--accent)">de l'</text>
        <text x="330" y="62" text-anchor="middle" class="label-sm" fill="var(--accent)">before vowel</text>
        <text x="330" y="78" text-anchor="middle" class="box-text" style="font-size:10px;">de l'eau</text>

        <rect x="405" y="20" width="120" height="70" rx="8" fill="var(--accent-light)" stroke="var(--accent)" stroke-width="2"/>
        <text x="465" y="45" text-anchor="middle" class="word" fill="var(--accent)">des</text>
        <text x="465" y="62" text-anchor="middle" class="label-sm" fill="var(--accent)">plural</text>
        <text x="465" y="78" text-anchor="middle" class="box-text" style="font-size:10px;">des pommes</text>

        <!-- Negation transformation -->
        <rect x="0" y="105" width="525" height="55" rx="6" fill="var(--negation-bg)" stroke="var(--negation)" stroke-width="1.5"/>
        <text x="262" y="125" text-anchor="middle" class="box-text" style="font-weight:bold;" fill="var(--negation)">Negation transforms ALL partitives to "de":</text>
        <text x="262" y="148" text-anchor="middle" class="box-text" fill="var(--fg)">
          Je bois du cafe \u2192 Je ne bois pas de cafe  |  Je mange des pommes \u2192 Je ne mange pas de pommes
        </text>
      </g>

      <!-- English comparison for partitives -->
      <g transform="translate(580, 65)">
        <rect x="0" y="20" width="440" height="140" rx="10" fill="var(--english-bg)" stroke="var(--english)" stroke-width="1.5"/>
        <text x="220" y="42" text-anchor="middle" class="title-text" fill="var(--english)">English: NO Partitive Article</text>

        <text x="30" y="68" text-anchor="start" class="box-text">"I drink coffee" \u2190 bare noun (no article)</text>
        <text x="30" y="88" text-anchor="start" class="box-text">"I eat apples" \u2190 bare noun</text>
        <text x="30" y="108" text-anchor="start" class="box-text">"some" is optional: "I want (some) water"</text>

        <text x="30" y="138" text-anchor="start" class="box-text" style="font-weight:bold;" fill="var(--english)">
          French: EVERY noun MUST have an article. No bare nouns ever.
        </text>
      </g>

      <!-- ========== DERIVATIONAL SUFFIX COMPARISON ========== -->
      <g transform="translate(30, 240)">
        <text x="500" y="0" text-anchor="middle" class="title-text" fill="var(--accent)">Derivational Suffixes: Same Latin Heritage, Different Functions</text>

        <!-- Headers -->
        <rect x="0" y="20" width="480" height="30" rx="5" fill="var(--french-bg)" stroke="var(--french)" stroke-width="1.5"/>
        <text x="240" y="40" text-anchor="middle" class="box-text" style="font-weight:bold;" fill="var(--french)">French (suffix + GENDER assignment)</text>

        <rect x="520" y="20" width="480" height="30" rx="5" fill="var(--english-bg)" stroke="var(--english)" stroke-width="1.5"/>
        <text x="760" y="40" text-anchor="middle" class="box-text" style="font-weight:bold;" fill="var(--english)">English (suffix ONLY -- no gender)</text>

        <!-- Row: -tion -->
        <rect x="0" y="60" width="480" height="32" rx="4" fill="var(--fem-bg)" stroke="var(--fem)" stroke-width="1"/>
        <text x="15" y="80" text-anchor="start" class="box-text" fill="var(--fem)">-tion  \u2192  FEMININE</text>
        <text x="200" y="80" text-anchor="start" class="box-text">la information, la decision, la nation</text>
        <rect x="520" y="60" width="480" height="32" rx="4" fill="var(--surface)" stroke="var(--border)" stroke-width="1"/>
        <text x="535" y="80" text-anchor="start" class="box-text">-tion  \u2192  (no gender)</text>
        <text x="720" y="80" text-anchor="start" class="box-text">information, decision, nation</text>

        <!-- Row: -ment -->
        <rect x="0" y="98" width="480" height="32" rx="4" fill="var(--masc-bg)" stroke="var(--masc)" stroke-width="1"/>
        <text x="15" y="118" text-anchor="start" class="box-text" fill="var(--masc)">-ment  \u2192  MASCULINE</text>
        <text x="200" y="118" text-anchor="start" class="box-text">le gouvernement, le changement</text>
        <rect x="520" y="98" width="480" height="32" rx="4" fill="var(--surface)" stroke="var(--border)" stroke-width="1"/>
        <text x="535" y="118" text-anchor="start" class="box-text">-ment  \u2192  (no gender)</text>
        <text x="720" y="118" text-anchor="start" class="box-text">government, change</text>

        <!-- Row: -age -->
        <rect x="0" y="136" width="480" height="32" rx="4" fill="var(--masc-bg)" stroke="var(--masc)" stroke-width="1"/>
        <text x="15" y="156" text-anchor="start" class="box-text" fill="var(--masc)">-age  \u2192  MASCULINE</text>
        <text x="200" y="156" text-anchor="start" class="box-text">le passage, le lavage, le voyage</text>
        <rect x="520" y="136" width="480" height="32" rx="4" fill="var(--surface)" stroke="var(--border)" stroke-width="1"/>
        <text x="535" y="156" text-anchor="start" class="box-text">-age  \u2192  (no gender)</text>
        <text x="720" y="156" text-anchor="start" class="box-text">passage, voyage</text>

        <!-- Row: -ite -->
        <rect x="0" y="174" width="480" height="32" rx="4" fill="var(--fem-bg)" stroke="var(--fem)" stroke-width="1"/>
        <text x="15" y="194" text-anchor="start" class="box-text" fill="var(--fem)">-ite  \u2192  FEMININE</text>
        <text x="200" y="194" text-anchor="start" class="box-text">la possibilite, la realite, la qualite</text>
        <rect x="520" y="174" width="480" height="32" rx="4" fill="var(--surface)" stroke="var(--border)" stroke-width="1"/>
        <text x="535" y="194" text-anchor="start" class="box-text">-ity  \u2192  (no gender)</text>
        <text x="720" y="194" text-anchor="start" class="box-text">possibility, reality, quality</text>

        <!-- Row: -eur/-euse -->
        <rect x="0" y="212" width="480" height="32" rx="4" fill="var(--accent-light)" stroke="var(--accent)" stroke-width="1"/>
        <text x="15" y="232" text-anchor="start" class="box-text" fill="var(--masc)">-eur (M)</text>
        <text x="90" y="232" text-anchor="start" class="box-text" fill="var(--fem)">/ -euse (F)</text>
        <text x="200" y="232" text-anchor="start" class="box-text">le chanteur / la chanteuse</text>
        <rect x="520" y="212" width="480" height="32" rx="4" fill="var(--surface)" stroke="var(--border)" stroke-width="1"/>
        <text x="535" y="232" text-anchor="start" class="box-text">-er / -or  \u2192  (no gender)</text>
        <text x="720" y="232" text-anchor="start" class="box-text">singer (gender-neutral)</text>

        <!-- Key insight -->
        <rect x="0" y="260" width="1000" height="50" rx="8" fill="var(--accent-light)" stroke="var(--accent)" stroke-width="1.5"/>
        <text x="500" y="280" text-anchor="middle" class="title-text" fill="var(--accent)" style="font-size:12px;">THE PATTERN</text>
        <text x="500" y="300" text-anchor="middle" class="subtitle-text" style="font-size:11px;">
          Same Latin-derived suffixes, fundamentally different function: French suffixes are productive morphology (they assign gender). English suffixes are inert fossils (they carry no grammatical features).
        </text>
      </g>

      <!-- ========== GENDER PREDICTABILITY ========== -->
      <g transform="translate(30, 570)">
        <rect x="0" y="0" width="1000" height="35" rx="6" fill="var(--surface)" stroke="var(--border)" stroke-width="1"/>
        <text x="500" y="22" text-anchor="middle" class="box-text" style="font-weight:bold;" fill="var(--accent)">
          ~80% of French noun genders are predictable from the suffix (Lyster 2006). The system is far more regular than its reputation suggests.
        </text>
      </g>
    </svg>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background:var(--masc-bg);border-color:var(--masc);"></div> Masculine suffix</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--fem-bg);border-color:var(--fem);"></div> Feminine suffix</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--negation-bg);border-color:var(--negation);"></div> Negation transformation</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--english-bg);border-color:var(--english);"></div> English (no partitive / no gender)</div>
  </div>

  <figcaption>
    <h2>Figure 4 -- Partitive Articles and Derivational Suffixes</h2>
    <p>French requires a partitive article (du/de la/de l'/des) before every unspecified quantity -- English allows bare nouns ("I drink coffee") where French demands an article ("Je bois du cafe"). Below, the derivational suffix comparison reveals a shared Latin heritage with divergent functions: the same suffixes (-tion, -ment, -age) that are gender-bearing productive morphology in French serve as inert, genderless fossils in English. About 80% of French noun genders are predictable from these suffix patterns.</p>
  </figcaption>
</figure>
</body>
</html>
