<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verlan: Morphological Play</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --accent: #4361ee; --accent-light: #e8edff;
    --verlan: #a855f7; --verlan-bg: #f3e8ff;
    --input: #3b82f6; --input-bg: #dbeafe;
    --output: #22c55e; --output-bg: #dcfce7;
    --double: #f59e0b; --double-bg: #fef3c7;
    --english: #ef4444; --english-bg: #fee2e2;
    --muted: #6c757d; --caption-bg: #f8f9fa;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a; --fg: #e8e8f0; --surface: #1a1a2e; --border: #2d2d44;
      --accent: #6b8aff; --accent-light: #1e2a4a;
      --verlan: #c084fc; --verlan-bg: #3b1764;
      --input: #60a5fa; --input-bg: #1e3a5f;
      --output: #4ade80; --output-bg: #14532d;
      --double: #fbbf24; --double-bg: #78350f;
      --english: #f87171; --english-bg: #5c1a1a;
      --muted: #9a9ab0; --caption-bg: #1a1a2e;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg); color: var(--fg);
    display: flex; justify-content: center; padding: 2rem 1rem; line-height: 1.6;
  }
  figure { max-width: 1100px; width: 100%; }
  .diagram-container {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 1.5rem 1rem; overflow-x: auto;
  }
  figcaption {
    text-align: center; margin-top: 1.5rem; padding: 1rem 1.5rem;
    background: var(--caption-bg); border-radius: 8px; border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  svg { display: block; margin: 0 auto; }
  .title-text { font: bold 14px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
  .subtitle-text { font: 11px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
  .box-text { font: 12px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
  .word { font: bold 18px 'Segoe UI', system-ui, sans-serif; }
  .label-sm { font: 10px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
  .legend { display: flex; gap: 1.5rem; justify-content: center; flex-wrap: wrap; margin-top: 1rem; font-size: 0.82rem; color: var(--muted); }
  .legend-item { display: flex; align-items: center; gap: 0.4rem; }
  .legend-swatch { width: 14px; height: 14px; border-radius: 3px; border: 1px solid var(--border); }
</style>
</head>
<body>
<figure>
  <div class="diagram-container">
    <svg viewBox="0 0 1060 580" xmlns="http://www.w3.org/2000/svg" style="min-width:780px;">
      <defs>
        <marker id="arrV" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
          <polygon points="0 0, 10 3.5, 0 7" fill="var(--verlan)"/>
        </marker>
        <marker id="arrD" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
          <polygon points="0 0, 10 3.5, 0 7" fill="var(--double)"/>
        </marker>
      </defs>

      <text x="530" y="28" text-anchor="middle" class="title-text" style="font-size:16px;">Verlan: Systematic Morphological Inversion</text>
      <text x="530" y="46" text-anchor="middle" class="subtitle-text">A productive word-formation process unique to French, exploiting clean CV syllable structure</text>

      <!-- ========== THE RULE ========== -->
      <g transform="translate(30, 65)">
        <rect x="200" y="0" width="600" height="45" rx="10" fill="var(--verlan-bg)" stroke="var(--verlan)" stroke-width="2"/>
        <text x="500" y="18" text-anchor="middle" class="title-text" fill="var(--verlan)">The Rule: Invert Syllable Order</text>
        <text x="500" y="36" text-anchor="middle" class="box-text" fill="var(--verlan)">"verlan" itself = l'en.vers \u2192 vers.l'en \u2192 verlan ("the reverse")</text>
      </g>

      <!-- ========== EXAMPLES ========== -->
      <g transform="translate(30, 130)">
        <!-- Two-syllable examples -->
        <text x="250" y="0" text-anchor="middle" class="title-text" fill="var(--verlan)">Two-Syllable Words: Swap Syllables</text>

        <!-- francais -> cefran -->
        <rect x="20" y="20" width="130" height="45" rx="8" fill="var(--input-bg)" stroke="var(--input)" stroke-width="2"/>
        <text x="85" y="40" text-anchor="middle" class="word" fill="var(--input)">fran.cais</text>
        <text x="85" y="58" text-anchor="middle" class="label-sm">"French"</text>
        <path d="M 155,42 L 195,42" fill="none" stroke="var(--verlan)" stroke-width="2" marker-end="url(#arrV)"/>
        <rect x="200" y="20" width="130" height="45" rx="8" fill="var(--output-bg)" stroke="var(--output)" stroke-width="2"/>
        <text x="265" y="40" text-anchor="middle" class="word" fill="var(--output)">ce.fran</text>
        <text x="265" y="58" text-anchor="middle" class="label-sm" fill="var(--output)">verlan</text>

        <!-- femme -> meuf -->
        <rect x="380" y="20" width="110" height="45" rx="8" fill="var(--input-bg)" stroke="var(--input)" stroke-width="2"/>
        <text x="435" y="40" text-anchor="middle" class="word" fill="var(--input)">fe.mme</text>
        <text x="435" y="58" text-anchor="middle" class="label-sm">"woman"</text>
        <path d="M 495,42 L 535,42" fill="none" stroke="var(--verlan)" stroke-width="2" marker-end="url(#arrV)"/>
        <rect x="540" y="20" width="110" height="45" rx="8" fill="var(--output-bg)" stroke="var(--output)" stroke-width="2"/>
        <text x="595" y="40" text-anchor="middle" class="word" fill="var(--output)">meuf</text>
        <text x="595" y="58" text-anchor="middle" class="label-sm" fill="var(--output)">in dictionaries</text>

        <!-- lourd -> relou -->
        <rect x="700" y="20" width="110" height="45" rx="8" fill="var(--input-bg)" stroke="var(--input)" stroke-width="2"/>
        <text x="755" y="40" text-anchor="middle" class="word" fill="var(--input)">lou.rd</text>
        <text x="755" y="58" text-anchor="middle" class="label-sm">"heavy/annoying"</text>
        <path d="M 815,42 L 855,42" fill="none" stroke="var(--verlan)" stroke-width="2" marker-end="url(#arrV)"/>
        <rect x="860" y="20" width="110" height="45" rx="8" fill="var(--output-bg)" stroke="var(--output)" stroke-width="2"/>
        <text x="915" y="40" text-anchor="middle" class="word" fill="var(--output)">re.lou</text>
        <text x="915" y="58" text-anchor="middle" class="label-sm" fill="var(--output)">mainstream</text>

        <!-- One-syllable examples -->
        <text x="250" y="100" text-anchor="middle" class="title-text" fill="var(--verlan)">One-Syllable Words: Consonant Migration</text>

        <!-- fou -> ouf -->
        <rect x="100" y="120" width="100" height="45" rx="8" fill="var(--input-bg)" stroke="var(--input)" stroke-width="2"/>
        <text x="150" y="140" text-anchor="middle" class="word" fill="var(--input)">fou</text>
        <text x="150" y="158" text-anchor="middle" class="label-sm">"crazy"</text>
        <path d="M 205,142 L 245,142" fill="none" stroke="var(--verlan)" stroke-width="2" marker-end="url(#arrV)"/>
        <rect x="250" y="120" width="100" height="45" rx="8" fill="var(--output-bg)" stroke="var(--output)" stroke-width="2"/>
        <text x="300" y="140" text-anchor="middle" class="word" fill="var(--output)">ouf</text>
        <text x="300" y="158" text-anchor="middle" class="label-sm" fill="var(--output)">mainstream</text>

        <!-- flic -> keuf -->
        <rect x="430" y="120" width="100" height="45" rx="8" fill="var(--input-bg)" stroke="var(--input)" stroke-width="2"/>
        <text x="480" y="140" text-anchor="middle" class="word" fill="var(--input)">flic</text>
        <text x="480" y="158" text-anchor="middle" class="label-sm">"cop"</text>
        <path d="M 535,142 L 575,142" fill="none" stroke="var(--verlan)" stroke-width="2" marker-end="url(#arrV)"/>
        <rect x="580" y="120" width="100" height="45" rx="8" fill="var(--output-bg)" stroke="var(--output)" stroke-width="2"/>
        <text x="630" y="140" text-anchor="middle" class="word" fill="var(--output)">keuf</text>
        <text x="630" y="158" text-anchor="middle" class="label-sm" fill="var(--output)">+ vowel adjustment</text>
      </g>

      <!-- ========== DOUBLE VERLAN ========== -->
      <g transform="translate(30, 320)">
        <rect x="100" y="0" width="800" height="60" rx="10" fill="var(--double-bg)" stroke="var(--double)" stroke-width="2"/>
        <text x="500" y="20" text-anchor="middle" class="title-text" fill="var(--double)">Double Verlan: When the First Inversion Becomes Mainstream, Invert Again</text>

        <rect x="160" y="30" width="100" height="25" rx="5" fill="var(--input-bg)" stroke="var(--input)" stroke-width="1.5"/>
        <text x="210" y="48" text-anchor="middle" class="box-text" style="font-weight:bold;">arabe</text>
        <path d="M 265,42 L 330,42" fill="none" stroke="var(--double)" stroke-width="2" marker-end="url(#arrD)"/>
        <rect x="335" y="30" width="80" height="25" rx="5" fill="var(--output-bg)" stroke="var(--output)" stroke-width="1.5"/>
        <text x="375" y="48" text-anchor="middle" class="box-text" style="font-weight:bold;">beur</text>
        <text x="375" y="22" text-anchor="middle" class="label-sm" fill="var(--double)">verlan (1970s)</text>
        <path d="M 420,42 L 500,42" fill="none" stroke="var(--double)" stroke-width="2" marker-end="url(#arrD)"/>
        <rect x="505" y="30" width="80" height="25" rx="5" fill="var(--double-bg)" stroke="var(--double)" stroke-width="2"/>
        <text x="545" y="48" text-anchor="middle" class="box-text" style="font-weight:bold;">rebeu</text>
        <text x="545" y="22" text-anchor="middle" class="label-sm" fill="var(--double)">double verlan (2000s)</text>
        <text x="620" y="48" text-anchor="start" class="label-sm">\u2190 re-inverted when "beur" became mainstream</text>
      </g>

      <!-- ========== TIMELINE ========== -->
      <g transform="translate(30, 400)">
        <text x="500" y="0" text-anchor="middle" class="title-text" fill="var(--accent)">Historical Trajectory</text>
        <line x1="100" y1="25" x2="900" y2="25" stroke="var(--border)" stroke-width="2"/>

        <circle cx="150" cy="25" r="6" fill="var(--verlan)"/>
        <text x="150" y="48" text-anchor="middle" class="box-text" style="font-size:10px;">19th c.</text>
        <text x="150" y="62" text-anchor="middle" class="label-sm">Criminal argot</text>

        <circle cx="400" cy="25" r="6" fill="var(--verlan)"/>
        <text x="400" y="48" text-anchor="middle" class="box-text" style="font-size:10px;">1970s-80s</text>
        <text x="400" y="62" text-anchor="middle" class="label-sm">Banlieue youth culture</text>

        <circle cx="600" cy="25" r="6" fill="var(--verlan)"/>
        <text x="600" y="48" text-anchor="middle" class="box-text" style="font-size:10px;">1990s-2000s</text>
        <text x="600" y="62" text-anchor="middle" class="label-sm">Media/music spread</text>

        <circle cx="850" cy="25" r="6" fill="var(--output)"/>
        <text x="850" y="48" text-anchor="middle" class="box-text" style="font-size:10px;">Today</text>
        <text x="850" y="62" text-anchor="middle" class="label-sm">In standard dictionaries</text>
      </g>

      <!-- ========== ENGLISH COMPARISON ========== -->
      <g transform="translate(30, 480)">
        <rect x="0" y="0" width="1000" height="80" rx="10" fill="var(--english-bg)" stroke="var(--english)" stroke-width="1.5"/>
        <text x="500" y="22" text-anchor="middle" class="title-text" fill="var(--english)">English: No Equivalent Process Exists</text>
        <text x="30" y="45" text-anchor="start" class="box-text" fill="var(--fg)">
          English slang operates through semantic shift (sick = good), abbreviation (fam), or borrowing -- never through rule-governed syllable manipulation.
        </text>
        <text x="30" y="68" text-anchor="start" class="box-text" style="font-weight:bold;" fill="var(--english)">
          Why? French's clean CV syllable structure makes inversion natural. English's complex clusters (CCCVCCCC) make it impossible. Try inverting "strengths."
        </text>
      </g>
    </svg>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background:var(--input-bg);border-color:var(--input);"></div> Original word</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--output-bg);border-color:var(--output);"></div> Verlan form</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--double-bg);border-color:var(--double);"></div> Double verlan</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--verlan-bg);border-color:var(--verlan);"></div> Process arrows</div>
  </div>

  <figcaption>
    <h2>Figure 5 -- Verlan: Systematic Morphological Inversion</h2>
    <p>Verlan is a productive word-formation process unique to French that creates new vocabulary through rule-governed syllable inversion. Two-syllable words swap syllable order (francais \u2192 cefran); one-syllable words move the onset consonant to the end (fou \u2192 ouf). When a verlan form itself becomes mainstream, it can be re-inverted (double verlan: arabe \u2192 beur \u2192 rebeu). This process is only possible because French has clean CV syllable structure -- English's complex consonant clusters make systematic inversion impossible.</p>
  </figcaption>
</figure>
</body>
</html>
