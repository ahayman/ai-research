<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Four-Form Adjective Paradigm</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --accent: #4361ee; --accent-light: #e8edff;
    --masc: #3b82f6; --masc-bg: #dbeafe;
    --fem: #ec4899; --fem-bg: #fce7f3;
    --english: #22c55e; --english-bg: #dcfce7;
    --muted: #6c757d; --caption-bg: #f8f9fa;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a; --fg: #e8e8f0; --surface: #1a1a2e; --border: #2d2d44;
      --accent: #6b8aff; --accent-light: #1e2a4a;
      --masc: #60a5fa; --masc-bg: #1e3a5f;
      --fem: #f472b6; --fem-bg: #5c1a3a;
      --english: #4ade80; --english-bg: #14532d;
      --muted: #9a9ab0; --caption-bg: #1a1a2e;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg); color: var(--fg);
    display: flex; justify-content: center; padding: 2rem 1rem; line-height: 1.6;
  }
  figure { max-width: 1100px; width: 100%; }
  .diagram-container {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 1.5rem 1rem; overflow-x: auto;
  }
  figcaption {
    text-align: center; margin-top: 1.5rem; padding: 1rem 1.5rem;
    background: var(--caption-bg); border-radius: 8px; border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  svg { display: block; margin: 0 auto; }
  .title-text { font: bold 14px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
  .subtitle-text { font: 11px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
  .box-text { font: 12px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
  .word { font: bold 16px 'Segoe UI', system-ui, sans-serif; }
  .ipa { font: 12px 'Gentium Plus', 'Noto Sans', 'DejaVu Sans', serif; }
  .label-sm { font: 10px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
  .legend { display: flex; gap: 1.5rem; justify-content: center; flex-wrap: wrap; margin-top: 1rem; font-size: 0.82rem; color: var(--muted); }
  .legend-item { display: flex; align-items: center; gap: 0.4rem; }
  .legend-swatch { width: 14px; height: 14px; border-radius: 3px; border: 1px solid var(--border); }
</style>
</head>
<body>
<figure>
  <div class="diagram-container">
    <svg viewBox="0 0 1060 600" xmlns="http://www.w3.org/2000/svg" style="min-width:780px;">
      <text x="530" y="28" text-anchor="middle" class="title-text" style="font-size:16px;">The Four-Form Adjective Paradigm</text>
      <text x="530" y="46" text-anchor="middle" class="subtitle-text">French: 4 forms per adjective (gender x number) vs. English: 1 (invariable)</text>

      <!-- ========== 2x2 GRID: "grand" ========== -->
      <g transform="translate(60, 70)">
        <text x="210" y="0" text-anchor="middle" class="title-text" fill="var(--accent)">"grand" (big/tall) -- Regular Pattern</text>

        <!-- Column headers -->
        <text x="140" y="30" text-anchor="middle" class="box-text" style="font-weight:bold;">Singular</text>
        <text x="320" y="30" text-anchor="middle" class="box-text" style="font-weight:bold;">Plural</text>

        <!-- Row headers -->
        <text x="15" y="75" text-anchor="middle" class="box-text" style="font-weight:bold;" fill="var(--masc)">Masc.</text>
        <text x="15" y="145" text-anchor="middle" class="box-text" style="font-weight:bold;" fill="var(--fem)">Fem.</text>

        <!-- M.SG -->
        <rect x="50" y="45" width="180" height="50" rx="8" fill="var(--masc-bg)" stroke="var(--masc)" stroke-width="2"/>
        <text x="140" y="70" text-anchor="middle" class="word" fill="var(--masc)">grand</text>
        <text x="140" y="88" text-anchor="middle" class="ipa" fill="var(--muted)">/g\u0281\u0251\u0303/</text>

        <!-- M.PL -->
        <rect x="240" y="45" width="180" height="50" rx="8" fill="var(--masc-bg)" stroke="var(--masc)" stroke-width="2"/>
        <text x="330" y="70" text-anchor="middle" class="word" fill="var(--masc)">grands</text>
        <text x="330" y="88" text-anchor="middle" class="ipa" fill="var(--muted)">/g\u0281\u0251\u0303/ (same!)</text>

        <!-- F.SG -->
        <rect x="50" y="115" width="180" height="50" rx="8" fill="var(--fem-bg)" stroke="var(--fem)" stroke-width="2"/>
        <text x="140" y="140" text-anchor="middle" class="word" fill="var(--fem)">grande</text>
        <text x="140" y="158" text-anchor="middle" class="ipa" fill="var(--muted)">/g\u0281\u0251\u0303d/ (+/d/!)</text>

        <!-- F.PL -->
        <rect x="240" y="115" width="180" height="50" rx="8" fill="var(--fem-bg)" stroke="var(--fem)" stroke-width="2"/>
        <text x="330" y="140" text-anchor="middle" class="word" fill="var(--fem)">grandes</text>
        <text x="330" y="158" text-anchor="middle" class="ipa" fill="var(--muted)">/g\u0281\u0251\u0303d/ (same as F.SG)</text>

        <!-- Rule annotations -->
        <text x="440" y="70" text-anchor="start" class="label-sm" fill="var(--masc)">base form</text>
        <text x="440" y="90" text-anchor="start" class="label-sm" fill="var(--masc)">+ silent -s</text>
        <text x="440" y="140" text-anchor="start" class="label-sm" fill="var(--fem)">+ -e (reveals final consonant)</text>
        <text x="440" y="160" text-anchor="start" class="label-sm" fill="var(--fem)">+ -es (plural -s still silent)</text>
      </g>

      <!-- ========== SPECIAL PATTERN: "beau" ========== -->
      <g transform="translate(580, 70)">
        <text x="200" y="0" text-anchor="middle" class="title-text" fill="var(--accent)">"beau" (beautiful) -- Special Pattern</text>

        <text x="110" y="30" text-anchor="middle" class="box-text" style="font-weight:bold;">Singular</text>
        <text x="290" y="30" text-anchor="middle" class="box-text" style="font-weight:bold;">Plural</text>

        <text x="15" y="75" text-anchor="middle" class="box-text" style="font-weight:bold;" fill="var(--masc)">Masc.</text>
        <text x="15" y="145" text-anchor="middle" class="box-text" style="font-weight:bold;" fill="var(--fem)">Fem.</text>

        <rect x="30" y="45" width="160" height="50" rx="8" fill="var(--masc-bg)" stroke="var(--masc)" stroke-width="2"/>
        <text x="110" y="70" text-anchor="middle" class="word" fill="var(--masc)">beau</text>
        <text x="110" y="88" text-anchor="middle" class="label-sm" fill="var(--masc)">(bel before vowel)</text>

        <rect x="210" y="45" width="160" height="50" rx="8" fill="var(--masc-bg)" stroke="var(--masc)" stroke-width="2"/>
        <text x="290" y="70" text-anchor="middle" class="word" fill="var(--masc)">beaux</text>

        <rect x="30" y="115" width="160" height="50" rx="8" fill="var(--fem-bg)" stroke="var(--fem)" stroke-width="2"/>
        <text x="110" y="140" text-anchor="middle" class="word" fill="var(--fem)">belle</text>

        <rect x="210" y="115" width="160" height="50" rx="8" fill="var(--fem-bg)" stroke="var(--fem)" stroke-width="2"/>
        <text x="290" y="140" text-anchor="middle" class="word" fill="var(--fem)">belles</text>

        <text x="390" y="75" text-anchor="start" class="label-sm">5 forms! (beau/bel/</text>
        <text x="390" y="90" text-anchor="start" class="label-sm">beaux/belle/belles)</text>
      </g>

      <!-- ========== ENGLISH: INVARIABLE ========== -->
      <g transform="translate(60, 260)">
        <rect x="0" y="0" width="940" height="90" rx="10" fill="var(--english-bg)" stroke="var(--english)" stroke-width="2"/>
        <text x="470" y="25" text-anchor="middle" class="title-text" fill="var(--english)">English: ZERO Agreement (1 form for everything)</text>

        <text x="60" y="52" text-anchor="start" class="box-text" fill="var(--fg)">a big house</text>
        <text x="200" y="52" text-anchor="start" class="box-text" fill="var(--fg)">big houses</text>
        <text x="340" y="52" text-anchor="start" class="box-text" fill="var(--fg)">a big man</text>
        <text x="480" y="52" text-anchor="start" class="box-text" fill="var(--fg)">big women</text>

        <text x="660" y="52" text-anchor="start" class="word" fill="var(--english)" style="font-size:20px;">\u2190 always "big"</text>

        <text x="60" y="78" text-anchor="start" class="box-text" style="font-weight:bold;" fill="var(--english)">
          English lost ALL adjective agreement by ~1400. French retains the full paradigm English abandoned.
        </text>
      </g>

      <!-- ========== AGREEMENT CHAIN DEMO ========== -->
      <g transform="translate(60, 380)">
        <text x="470" y="0" text-anchor="middle" class="title-text" fill="var(--accent)">The Agreement Chain: 5 Elements Agreeing</text>

        <!-- French sentence with agreement arrows -->
        <rect x="10" y="20" width="60" height="35" rx="5" fill="var(--fem-bg)" stroke="var(--fem)" stroke-width="2"/>
        <text x="40" y="42" text-anchor="middle" class="word" style="font-size:14px;" fill="var(--fem)">Les</text>
        <text x="40" y="62" text-anchor="middle" class="label-sm" fill="var(--fem)">F.PL</text>

        <rect x="90" y="20" width="100" height="35" rx="5" fill="var(--fem-bg)" stroke="var(--fem)" stroke-width="2"/>
        <text x="140" y="42" text-anchor="middle" class="word" style="font-size:14px;" fill="var(--fem)">petites</text>
        <text x="140" y="62" text-anchor="middle" class="label-sm" fill="var(--fem)">F.PL</text>

        <rect x="210" y="20" width="80" height="35" rx="5" fill="var(--fem-bg)" stroke="var(--fem)" stroke-width="2"/>
        <text x="250" y="42" text-anchor="middle" class="word" style="font-size:14px;" fill="var(--fem)">filles</text>
        <text x="250" y="62" text-anchor="middle" class="label-sm" fill="var(--fem)">F.PL</text>

        <rect x="310" y="20" width="70" height="35" rx="5" fill="var(--fem-bg)" stroke="var(--fem)" stroke-width="2"/>
        <text x="345" y="42" text-anchor="middle" class="word" style="font-size:14px;" fill="var(--fem)">sont</text>
        <text x="345" y="62" text-anchor="middle" class="label-sm" fill="var(--fem)">3PL</text>

        <rect x="400" y="20" width="90" height="35" rx="5" fill="var(--fem-bg)" stroke="var(--fem)" stroke-width="2"/>
        <text x="445" y="42" text-anchor="middle" class="word" style="font-size:14px;" fill="var(--fem)">allees</text>
        <text x="445" y="62" text-anchor="middle" class="label-sm" fill="var(--fem)">F.PL</text>

        <!-- Agreement arrows -->
        <path d="M 70,25 Q 100,10 110,20" fill="none" stroke="var(--fem)" stroke-width="1.5"/>
        <path d="M 190,25 Q 210,10 220,20" fill="none" stroke="var(--fem)" stroke-width="1.5"/>
        <path d="M 290,25 Q 310,10 320,20" fill="none" stroke="var(--fem)" stroke-width="1.5"/>
        <path d="M 380,25 Q 400,10 410,20" fill="none" stroke="var(--fem)" stroke-width="1.5"/>

        <text x="530" y="42" text-anchor="start" class="box-text" fill="var(--fg)">"The little girls have gone"</text>
        <text x="530" y="62" text-anchor="start" class="box-text" style="font-weight:bold;" fill="var(--fem)">5 elements all agree: FEM.PL</text>

        <!-- English equivalent -->
        <rect x="10" y="90" width="480" height="35" rx="5" fill="var(--english-bg)" stroke="var(--english)" stroke-width="1.5"/>
        <text x="250" y="112" text-anchor="middle" class="word" style="font-size:14px;" fill="var(--english)">The small girls have gone</text>
        <text x="530" y="112" text-anchor="start" class="box-text" fill="var(--english)">ZERO agreement (no element agrees with any other)</text>
      </g>

      <!-- ========== PATTERN INSIGHT ========== -->
      <g transform="translate(60, 520)">
        <rect x="0" y="0" width="940" height="55" rx="8" fill="var(--accent-light)" stroke="var(--accent)" stroke-width="1.5"/>
        <text x="470" y="22" text-anchor="middle" class="title-text" fill="var(--accent)" style="font-size:12px;">THE REDUNDANCY PATTERN</text>
        <text x="470" y="42" text-anchor="middle" class="subtitle-text" style="font-size:11px;">French encodes the same feature (feminine plural) 5 times across the sentence. This redundancy aids comprehension in noisy environments -- if you miss one cue, three others carry the same information.</text>
      </g>
    </svg>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background:var(--masc-bg);border-color:var(--masc);"></div> Masculine</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--fem-bg);border-color:var(--fem);"></div> Feminine</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--english-bg);border-color:var(--english);"></div> English (invariable)</div>
  </div>

  <figcaption>
    <h2>Figure 3 -- The Four-Form Adjective Paradigm and Agreement Chain</h2>
    <p>French adjectives inflect for both gender and number, producing up to four (sometimes five) distinct forms. English adjectives are completely invariable -- "big" is always "big" regardless of the noun. The agreement chain demonstrates how French threads gender/number features across an entire sentence: in "Les petites filles sont allees," all five elements carry the feminine plural marker. English encodes this information zero times. The redundancy is not waste -- it provides multiple processing cues that aid comprehension.</p>
  </figcaption>
</figure>
</body>
</html>
