<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verb Form Count: French vs. English</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --accent: #4361ee; --accent-light: #e8edff;
    --french: #3b82f6; --french-bg: #dbeafe;
    --english: #ef4444; --english-bg: #fee2e2;
    --silent: #94a3b8; --silent-bg: #f1f5f9;
    --subjunctive: #a855f7; --subjunctive-bg: #f3e8ff;
    --compound: #06b6d4; --compound-bg: #cffafe;
    --muted: #6c757d; --caption-bg: #f8f9fa;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a; --fg: #e8e8f0; --surface: #1a1a2e; --border: #2d2d44;
      --accent: #6b8aff; --accent-light: #1e2a4a;
      --french: #60a5fa; --french-bg: #1e3a5f;
      --english: #f87171; --english-bg: #5c1a1a;
      --silent: #64748b; --silent-bg: #1e293b;
      --subjunctive: #c084fc; --subjunctive-bg: #3b1764;
      --compound: #22d3ee; --compound-bg: #0c3d4a;
      --muted: #9a9ab0; --caption-bg: #1a1a2e;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg); color: var(--fg);
    display: flex; justify-content: center; padding: 2rem 1rem; line-height: 1.6;
  }
  figure { max-width: 1100px; width: 100%; }
  .diagram-container {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 1.5rem 1rem; overflow-x: auto;
  }
  figcaption {
    text-align: center; margin-top: 1.5rem; padding: 1rem 1.5rem;
    background: var(--caption-bg); border-radius: 8px; border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  svg { display: block; margin: 0 auto; }
  .title-text { font: bold 14px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
  .subtitle-text { font: 11px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
  .box-text { font: 12px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
  .cell-text { font: 11px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
  .label-sm { font: 10px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
  .big-num { font: bold 36px 'Segoe UI', system-ui, sans-serif; }
  .legend { display: flex; gap: 1.5rem; justify-content: center; flex-wrap: wrap; margin-top: 1rem; font-size: 0.82rem; color: var(--muted); }
  .legend-item { display: flex; align-items: center; gap: 0.4rem; }
  .legend-swatch { width: 14px; height: 14px; border-radius: 3px; border: 1px solid var(--border); }
</style>
</head>
<body>
<figure>
  <div class="diagram-container">
    <svg viewBox="0 0 1060 680" xmlns="http://www.w3.org/2000/svg" style="min-width:780px;">
      <text x="530" y="28" text-anchor="middle" class="title-text" style="font-size:16px;">Verb Form Count: French vs. English</text>
      <text x="530" y="46" text-anchor="middle" class="subtitle-text">A 10:1 ratio of morphological complexity</text>

      <!-- ========== FRENCH VERB GRID ========== -->
      <g transform="translate(30, 65)">
        <text x="350" y="0" text-anchor="middle" class="title-text" fill="var(--french)">French "parler" (to speak) -- ~50 written forms</text>

        <!-- Indicative simple tenses: 5 tenses x 6 persons = 30 cells -->
        <text x="0" y="30" text-anchor="start" class="cell-text" style="font-weight:bold;" fill="var(--french)">INDICATIVE (5 x 6 = 30)</text>

        <!-- Column headers -->
        <text x="140" y="50" text-anchor="middle" class="cell-text" fill="var(--muted)">je</text>
        <text x="230" y="50" text-anchor="middle" class="cell-text" fill="var(--muted)">tu</text>
        <text x="320" y="50" text-anchor="middle" class="cell-text" fill="var(--muted)">il/elle</text>
        <text x="410" y="50" text-anchor="middle" class="cell-text" fill="var(--muted)">nous</text>
        <text x="500" y="50" text-anchor="middle" class="cell-text" fill="var(--muted)">vous</text>
        <text x="590" y="50" text-anchor="middle" class="cell-text" fill="var(--muted)">ils/elles</text>

        <!-- Present -->
        <text x="50" y="72" text-anchor="middle" class="cell-text" style="font-size:10px;">Present</text>
        <rect x="100" y="58" width="80" height="20" rx="3" fill="var(--silent-bg)" stroke="var(--silent)" stroke-width="1"/>
        <text x="140" y="72" text-anchor="middle" class="cell-text" style="font-size:10px;">parle</text>
        <rect x="190" y="58" width="80" height="20" rx="3" fill="var(--silent-bg)" stroke="var(--silent)" stroke-width="1"/>
        <text x="230" y="72" text-anchor="middle" class="cell-text" style="font-size:10px;">parles</text>
        <rect x="280" y="58" width="80" height="20" rx="3" fill="var(--silent-bg)" stroke="var(--silent)" stroke-width="1"/>
        <text x="320" y="72" text-anchor="middle" class="cell-text" style="font-size:10px;">parle</text>
        <rect x="370" y="58" width="80" height="20" rx="3" fill="var(--french-bg)" stroke="var(--french)" stroke-width="1"/>
        <text x="410" y="72" text-anchor="middle" class="cell-text" style="font-size:10px;">parlons</text>
        <rect x="460" y="58" width="80" height="20" rx="3" fill="var(--french-bg)" stroke="var(--french)" stroke-width="1"/>
        <text x="500" y="72" text-anchor="middle" class="cell-text" style="font-size:10px;">parlez</text>
        <rect x="550" y="58" width="80" height="20" rx="3" fill="var(--silent-bg)" stroke="var(--silent)" stroke-width="1"/>
        <text x="590" y="72" text-anchor="middle" class="cell-text" style="font-size:10px;">parlent</text>

        <!-- Bracket: 4 forms sound identical -->
        <path d="M 100,80 L 100,88 L 630,88 L 630,80" fill="none" stroke="var(--silent)" stroke-width="1"/>
        <text x="365" y="100" text-anchor="middle" class="label-sm" fill="var(--silent)">4 written forms, 1 spoken form: /pa\u0281l/</text>

        <!-- Imperfect row -->
        <text x="50" y="120" text-anchor="middle" class="cell-text" style="font-size:10px;">Imperfect</text>
        <rect x="100" y="106" width="530" height="20" rx="3" fill="var(--french-bg)" stroke="var(--french)" stroke-width="0.5"/>
        <text x="365" y="120" text-anchor="middle" class="cell-text" style="font-size:10px;">parlais / parlais / parlait / parlions / parliez / parlaient</text>

        <!-- Future row -->
        <text x="50" y="140" text-anchor="middle" class="cell-text" style="font-size:10px;">Future</text>
        <rect x="100" y="126" width="530" height="20" rx="3" fill="var(--french-bg)" stroke="var(--french)" stroke-width="0.5"/>
        <text x="365" y="140" text-anchor="middle" class="cell-text" style="font-size:10px;">parlerai / parleras / parlera / parlerons / parlerez / parleront</text>

        <!-- Conditional row -->
        <text x="50" y="160" text-anchor="middle" class="cell-text" style="font-size:10px;">Conditional</text>
        <rect x="100" y="146" width="530" height="20" rx="3" fill="var(--french-bg)" stroke="var(--french)" stroke-width="0.5"/>
        <text x="365" y="160" text-anchor="middle" class="cell-text" style="font-size:10px;">parlerais / parlerais / parlerait / parlerions / parleriez / parleraient</text>

        <!-- Passe simple row -->
        <text x="50" y="180" text-anchor="middle" class="cell-text" style="font-size:10px;">P. simple</text>
        <rect x="100" y="166" width="530" height="20" rx="3" fill="var(--silent-bg)" stroke="var(--silent)" stroke-width="0.5" stroke-dasharray="3,2"/>
        <text x="365" y="180" text-anchor="middle" class="cell-text" style="font-size:10px;font-style:italic;" fill="var(--silent)">parlai / parlas / parla / parlames / parlates / parlerent (literary only)</text>

        <!-- Subjunctive -->
        <text x="0" y="210" text-anchor="start" class="cell-text" style="font-weight:bold;" fill="var(--subjunctive)">SUBJUNCTIVE (2 x 6 = 12)</text>
        <rect x="100" y="196" width="530" height="20" rx="3" fill="var(--subjunctive-bg)" stroke="var(--subjunctive)" stroke-width="0.5"/>
        <text x="365" y="210" text-anchor="middle" class="cell-text" style="font-size:10px;">parle / parles / parle / parlions / parliez / parlent + imperfect subjunctive (6, literary)</text>

        <!-- Imperative + Non-finite -->
        <text x="0" y="240" text-anchor="start" class="cell-text" style="font-weight:bold;" fill="var(--french)">IMPERATIVE (3) + NON-FINITE (3)</text>
        <rect x="100" y="226" width="300" height="20" rx="3" fill="var(--french-bg)" stroke="var(--french)" stroke-width="0.5"/>
        <text x="250" y="240" text-anchor="middle" class="cell-text" style="font-size:10px;">parle / parlons / parlez | parler / parlant / parle</text>

        <!-- Compound tenses -->
        <text x="0" y="270" text-anchor="start" class="cell-text" style="font-weight:bold;" fill="var(--compound)">COMPOUND TENSES (auxiliary + participle = ~30 more)</text>
        <rect x="100" y="256" width="530" height="20" rx="3" fill="var(--compound-bg)" stroke="var(--compound)" stroke-width="0.5"/>
        <text x="365" y="270" text-anchor="middle" class="cell-text" style="font-size:10px;">passe compose, plus-que-parfait, futur anterieur, conditionnel passe, passe anterieur...</text>
      </g>

      <!-- ========== ENGLISH VERB (to scale) ========== -->
      <g transform="translate(700, 65)">
        <text x="160" y="0" text-anchor="middle" class="title-text" fill="var(--english)">English "speak" -- 5 forms</text>

        <rect x="30" y="20" width="260" height="260" rx="10" fill="var(--english-bg)" stroke="var(--english)" stroke-width="2"/>

        <rect x="60" y="40" width="200" height="35" rx="5" fill="var(--surface)" stroke="var(--english)" stroke-width="1"/>
        <text x="160" y="63" text-anchor="middle" class="box-text" style="font-weight:bold;" fill="var(--english)">speak</text>
        <text x="160" y="76" text-anchor="middle" class="label-sm">base form</text>

        <rect x="60" y="85" width="200" height="35" rx="5" fill="var(--surface)" stroke="var(--english)" stroke-width="1"/>
        <text x="160" y="108" text-anchor="middle" class="box-text" style="font-weight:bold;" fill="var(--english)">speaks</text>
        <text x="160" y="121" text-anchor="middle" class="label-sm">3rd person singular</text>

        <rect x="60" y="130" width="200" height="35" rx="5" fill="var(--surface)" stroke="var(--english)" stroke-width="1"/>
        <text x="160" y="153" text-anchor="middle" class="box-text" style="font-weight:bold;" fill="var(--english)">spoke</text>
        <text x="160" y="166" text-anchor="middle" class="label-sm">past tense</text>

        <rect x="60" y="175" width="200" height="35" rx="5" fill="var(--surface)" stroke="var(--english)" stroke-width="1"/>
        <text x="160" y="198" text-anchor="middle" class="box-text" style="font-weight:bold;" fill="var(--english)">spoken</text>
        <text x="160" y="211" text-anchor="middle" class="label-sm">past participle</text>

        <rect x="60" y="220" width="200" height="35" rx="5" fill="var(--surface)" stroke="var(--english)" stroke-width="1"/>
        <text x="160" y="243" text-anchor="middle" class="box-text" style="font-weight:bold;" fill="var(--english)">speaking</text>
        <text x="160" y="256" text-anchor="middle" class="label-sm">present participle</text>

        <text x="160" y="295" text-anchor="middle" class="subtitle-text">That is ALL. 5 forms total.</text>
      </g>

      <!-- ========== RATIO COMPARISON ========== -->
      <g transform="translate(30, 380)">
        <rect x="0" y="0" width="1000" height="100" rx="10" fill="var(--accent-light)" stroke="var(--accent)" stroke-width="1.5"/>

        <text x="170" y="35" text-anchor="middle" class="big-num" fill="var(--french)">~50</text>
        <text x="170" y="55" text-anchor="middle" class="box-text" fill="var(--french)">French written forms</text>

        <text x="370" y="45" text-anchor="middle" class="title-text" fill="var(--muted)" style="font-size:28px;">vs.</text>

        <text x="550" y="35" text-anchor="middle" class="big-num" fill="var(--english)">5</text>
        <text x="550" y="55" text-anchor="middle" class="box-text" fill="var(--english)">English forms</text>

        <text x="750" y="35" text-anchor="middle" class="big-num" fill="var(--accent)">10:1</text>
        <text x="750" y="55" text-anchor="middle" class="box-text" fill="var(--accent)">complexity ratio</text>

        <text x="500" y="85" text-anchor="middle" class="subtitle-text" style="font-size:11px;">
          English compensates with auxiliary verbs: "I will have been speaking" (4 words) = "j'aurai parle" (2 words)
        </text>
      </g>

      <!-- ========== ORAL/WRITTEN GAP ========== -->
      <g transform="translate(30, 500)">
        <rect x="0" y="0" width="1000" height="155" rx="10" fill="var(--surface)" stroke="var(--border)" stroke-width="1"/>
        <text x="500" y="25" text-anchor="middle" class="title-text" fill="var(--accent)">The Oral/Written Gap: The Pattern Within the Pattern</text>

        <text x="30" y="52" text-anchor="start" class="box-text" fill="var(--fg)">Written French:</text>
        <rect x="170" y="38" width="60" height="22" rx="3" fill="var(--french-bg)" stroke="var(--french)" stroke-width="1"/>
        <text x="200" y="54" text-anchor="middle" class="cell-text">parle</text>
        <rect x="240" y="38" width="65" height="22" rx="3" fill="var(--french-bg)" stroke="var(--french)" stroke-width="1"/>
        <text x="272" y="54" text-anchor="middle" class="cell-text">parles</text>
        <rect x="315" y="38" width="60" height="22" rx="3" fill="var(--french-bg)" stroke="var(--french)" stroke-width="1"/>
        <text x="345" y="54" text-anchor="middle" class="cell-text">parle</text>
        <rect x="385" y="38" width="70" height="22" rx="3" fill="var(--french-bg)" stroke="var(--french)" stroke-width="1"/>
        <text x="420" y="54" text-anchor="middle" class="cell-text">parlent</text>
        <text x="475" y="54" text-anchor="start" class="box-text" fill="var(--muted)">\u2190 4 different written forms</text>

        <text x="30" y="88" text-anchor="start" class="box-text" fill="var(--fg)">Spoken French:</text>
        <rect x="170" y="74" width="285" height="22" rx="3" fill="var(--silent-bg)" stroke="var(--silent)" stroke-width="1.5"/>
        <text x="312" y="90" text-anchor="middle" class="cell-text" style="font-weight:bold;">/pa\u0281l/ = /pa\u0281l/ = /pa\u0281l/ = /pa\u0281l/</text>
        <text x="475" y="90" text-anchor="start" class="box-text" fill="var(--muted)">\u2190 1 spoken form (all identical)</text>

        <text x="30" y="125" text-anchor="start" class="box-text" style="font-weight:bold;" fill="var(--accent)">Pattern:</text>
        <text x="100" y="125" text-anchor="start" class="box-text" fill="var(--fg)">
          French morphology is primarily a WRITTEN system. In speech, many distinctions collapse. This creates a paradox:
        </text>
        <text x="100" y="143" text-anchor="start" class="box-text" fill="var(--fg)">
          spoken French is simpler than written French; written French encodes distinctions that spoken French has discarded.
        </text>
      </g>
    </svg>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background:var(--french-bg);border-color:var(--french);"></div> French forms (audibly distinct)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--silent-bg);border-color:var(--silent);"></div> French forms (sound identical)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--subjunctive-bg);border-color:var(--subjunctive);"></div> Subjunctive</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--compound-bg);border-color:var(--compound);"></div> Compound tenses</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--english-bg);border-color:var(--english);"></div> English forms</div>
  </div>

  <figcaption>
    <h2>Figure 1 -- Verb Form Count: French vs. English</h2>
    <p>A single French verb conjugates across ~50 distinct written forms (6 persons x 8+ tense/mood combinations plus non-finite forms). English manages with exactly 5 forms for any verb (or 8 for "be"). This 10:1 ratio is the starkest morphological difference between the two languages. But the oral/written gap reveals a deeper pattern: many French written forms are pronounced identically, meaning spoken French is considerably less complex than written French suggests.</p>
  </figcaption>
</figure>
</body>
</html>
