<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Three Conjugation Groups</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --accent: #4361ee; --accent-light: #e8edff;
    --group1: #22c55e; --group1-bg: #dcfce7;
    --group2: #f59e0b; --group2-bg: #fef3c7;
    --group3: #ef4444; --group3-bg: #fee2e2;
    --new-word: #06b6d4; --new-word-bg: #cffafe;
    --english: #6366f1; --english-bg: #e0e7ff;
    --muted: #6c757d; --caption-bg: #f8f9fa;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a; --fg: #e8e8f0; --surface: #1a1a2e; --border: #2d2d44;
      --accent: #6b8aff; --accent-light: #1e2a4a;
      --group1: #4ade80; --group1-bg: #14532d;
      --group2: #fbbf24; --group2-bg: #78350f;
      --group3: #f87171; --group3-bg: #5c1a1a;
      --new-word: #22d3ee; --new-word-bg: #0c3d4a;
      --english: #818cf8; --english-bg: #2e2a5e;
      --muted: #9a9ab0; --caption-bg: #1a1a2e;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg); color: var(--fg);
    display: flex; justify-content: center; padding: 2rem 1rem; line-height: 1.6;
  }
  figure { max-width: 1100px; width: 100%; }
  .diagram-container {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 1.5rem 1rem; overflow-x: auto;
  }
  figcaption {
    text-align: center; margin-top: 1.5rem; padding: 1rem 1.5rem;
    background: var(--caption-bg); border-radius: 8px; border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  svg { display: block; margin: 0 auto; }
  .title-text { font: bold 14px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
  .subtitle-text { font: 11px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
  .box-text { font: 12px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
  .label-sm { font: 10px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
  .legend { display: flex; gap: 1.5rem; justify-content: center; flex-wrap: wrap; margin-top: 1rem; font-size: 0.82rem; color: var(--muted); }
  .legend-item { display: flex; align-items: center; gap: 0.4rem; }
  .legend-swatch { width: 14px; height: 14px; border-radius: 3px; border: 1px solid var(--border); }
</style>
</head>
<body>
<figure>
  <div class="diagram-container">
    <svg viewBox="0 0 1060 580" xmlns="http://www.w3.org/2000/svg" style="min-width:780px;">
      <defs>
        <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="var(--fg)"/>
        </marker>
        <marker id="arrNew" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="var(--new-word)"/>
        </marker>
      </defs>

      <text x="530" y="28" text-anchor="middle" class="title-text" style="font-size:16px;">The Three Conjugation Groups</text>
      <text x="530" y="46" text-anchor="middle" class="subtitle-text">How French organizes all verbs into pattern classes -- and why ~90% follow one pattern</text>

      <!-- ========== ROOT NODE ========== -->
      <rect x="380" y="60" width="300" height="40" rx="10" fill="var(--accent-light)" stroke="var(--accent)" stroke-width="2"/>
      <text x="530" y="85" text-anchor="middle" class="title-text" fill="var(--accent)">All French Verbs</text>

      <!-- Branches -->
      <line x1="420" y1="100" x2="170" y2="150" stroke="var(--group1)" stroke-width="2"/>
      <line x1="530" y1="100" x2="530" y2="150" stroke="var(--group2)" stroke-width="2"/>
      <line x1="640" y1="100" x2="890" y2="150" stroke="var(--group3)" stroke-width="2"/>

      <!-- ========== GROUP 1: -ER ========== -->
      <g transform="translate(20, 150)">
        <rect x="0" y="0" width="300" height="210" rx="10" fill="var(--group1-bg)" stroke="var(--group1)" stroke-width="2"/>
        <text x="150" y="25" text-anchor="middle" class="title-text" fill="var(--group1)">1st Group: -ER verbs</text>
        <text x="150" y="42" text-anchor="middle" class="box-text" style="font-weight:bold;" fill="var(--group1)">~90% of all verbs</text>

        <text x="20" y="65" text-anchor="start" class="box-text">Pattern: stem + -e, -es, -e, -ons, -ez, -ent</text>
        <text x="20" y="85" text-anchor="start" class="box-text">parler, manger, jouer, regarder, aimer</text>
        <text x="20" y="108" text-anchor="start" class="label-sm">Highly regular; minor spelling adjustments</text>
        <text x="20" y="122" text-anchor="start" class="label-sm">(manger \u2192 mangeons, appeler \u2192 appelle)</text>

        <!-- Present tense paradigm -->
        <rect x="20" y="135" width="260" height="65" rx="5" fill="var(--surface)" stroke="var(--group1)" stroke-width="1"/>
        <text x="150" y="152" text-anchor="middle" class="box-text" style="font-weight:bold;">Present: "parler"</text>
        <text x="30" y="170" text-anchor="start" class="box-text" style="font-size:11px;">je parl-e     tu parl-es    il parl-e</text>
        <text x="30" y="188" text-anchor="start" class="box-text" style="font-size:11px;">nous parl-ons  vous parl-ez  ils parl-ent</text>
      </g>

      <!-- ========== GROUP 2: -IR (iss) ========== -->
      <g transform="translate(380, 150)">
        <rect x="0" y="0" width="300" height="210" rx="10" fill="var(--group2-bg)" stroke="var(--group2)" stroke-width="2"/>
        <text x="150" y="25" text-anchor="middle" class="title-text" fill="var(--group2)">2nd Group: -IR (with -iss-)</text>
        <text x="150" y="42" text-anchor="middle" class="box-text" style="font-weight:bold;" fill="var(--group2)">~300 verbs</text>

        <text x="20" y="65" text-anchor="start" class="box-text">Pattern: stem + -iss- in plural forms</text>
        <text x="20" y="85" text-anchor="start" class="box-text">finir, choisir, reussir, rougir, grandir</text>
        <text x="20" y="108" text-anchor="start" class="label-sm">Productive but less so than -er</text>
        <text x="20" y="122" text-anchor="start" class="label-sm">From Latin inchoative -iscere suffix</text>

        <rect x="20" y="135" width="260" height="65" rx="5" fill="var(--surface)" stroke="var(--group2)" stroke-width="1"/>
        <text x="150" y="152" text-anchor="middle" class="box-text" style="font-weight:bold;">Present: "finir"</text>
        <text x="30" y="170" text-anchor="start" class="box-text" style="font-size:11px;">je fin-is      tu fin-is     il fin-it</text>
        <text x="30" y="188" text-anchor="start" class="box-text" style="font-size:11px;">nous fin-iss-ons  vous fin-iss-ez  ils fin-iss-ent</text>
      </g>

      <!-- ========== GROUP 3: IRREGULAR ========== -->
      <g transform="translate(740, 150)">
        <rect x="0" y="0" width="300" height="210" rx="10" fill="var(--group3-bg)" stroke="var(--group3)" stroke-width="2"/>
        <text x="150" y="25" text-anchor="middle" class="title-text" fill="var(--group3)">3rd Group: Irregular</text>
        <text x="150" y="42" text-anchor="middle" class="box-text" style="font-weight:bold;" fill="var(--group3)">~350 verbs</text>

        <text x="20" y="65" text-anchor="start" class="box-text">-ir (no -iss-): partir, dormir, ouvrir</text>
        <text x="20" y="82" text-anchor="start" class="box-text">-re: vendre, prendre, mettre</text>
        <text x="20" y="99" text-anchor="start" class="box-text">-oir: voir, savoir, pouvoir</text>
        <text x="20" y="122" text-anchor="start" class="label-sm">Irregular stems but predictable endings</text>
        <text x="20" y="136" text-anchor="start" class="label-sm">Contains ALL highest-frequency verbs:</text>

        <rect x="20" y="148" width="260" height="50" rx="5" fill="var(--surface)" stroke="var(--group3)" stroke-width="1"/>
        <text x="150" y="168" text-anchor="middle" class="box-text" style="font-weight:bold;font-size:11px;">etre, avoir, aller, faire, pouvoir,</text>
        <text x="150" y="186" text-anchor="middle" class="box-text" style="font-weight:bold;font-size:11px;">vouloir, savoir, voir, devoir, dire</text>
      </g>

      <!-- ========== NEW WORDS ARROW ========== -->
      <g transform="translate(30, 380)">
        <rect x="0" y="0" width="300" height="40" rx="8" fill="var(--new-word-bg)" stroke="var(--new-word)" stroke-width="2"/>
        <text x="150" y="25" text-anchor="middle" class="box-text" style="font-weight:bold;" fill="var(--new-word)">ALL new verbs \u2192 1st Group (-er)</text>
        <text x="0" y="55" text-anchor="start" class="box-text" fill="var(--new-word)">googler, tweeter, liker, podcaster, scroller</text>
        <text x="0" y="72" text-anchor="start" class="label-sm">No exceptions: every new verb entering French follows the -er pattern</text>
      </g>

      <!-- ========== ENGLISH COMPARISON ========== -->
      <g transform="translate(30, 465)">
        <rect x="0" y="0" width="1000" height="95" rx="10" fill="var(--english-bg)" stroke="var(--english)" stroke-width="1.5"/>
        <text x="500" y="22" text-anchor="middle" class="title-text" fill="var(--english)">English Comparison: Two Verb Classes</text>

        <text x="100" y="50" text-anchor="start" class="box-text" fill="var(--fg)">Regular (-ed): walk/walked, talk/talked</text>
        <text x="100" y="68" text-anchor="start" class="box-text" fill="var(--fg)">Irregular (ablaut): sing/sang/sung, drive/drove/driven</text>
        <text x="100" y="86" text-anchor="start" class="box-text" style="font-weight:bold;" fill="var(--english)">Same pattern: most frequent verbs are most irregular (be, have, go, do, say)</text>

        <text x="600" y="50" text-anchor="start" class="box-text" fill="var(--fg)">New verbs always regular:</text>
        <text x="600" y="68" text-anchor="start" class="box-text" fill="var(--fg)">to google, to tweet, to podcast</text>
        <text x="600" y="86" text-anchor="start" class="box-text" style="font-weight:bold;" fill="var(--english)">Same frequency-irregularity pattern as French</text>
      </g>
    </svg>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background:var(--group1-bg);border-color:var(--group1);"></div> 1st Group -ER (~90%)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--group2-bg);border-color:var(--group2);"></div> 2nd Group -IR (~300)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--group3-bg);border-color:var(--group3);"></div> 3rd Group Irregular (~350)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--new-word-bg);border-color:var(--new-word);"></div> New words (always -ER)</div>
  </div>

  <figcaption>
    <h2>Figure 2 -- The Three Conjugation Groups</h2>
    <p>French organizes all verbs into three conjugation classes. The first group (-er) is overwhelmingly dominant at ~90% of all verbs and serves as the exclusive entry point for new vocabulary. The second group (-ir with -iss- infix) covers ~300 verbs with a distinctive plural pattern. The third group contains ~350 highly irregular but extremely frequent verbs. Both French and English share the same cross-linguistic pattern: the most frequent verbs are the most irregular, while all new verbs follow the regular pattern.</p>
  </figcaption>
</figure>
</body>
</html>
