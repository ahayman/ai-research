<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tone Sandhi Rule System -- Complete Decision Flowchart</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --accent: #4361ee;
    --accent-light: #e8edff;
    --yes: #2a9d8f;
    --no: #e63946;
    --rule: #e9c46a;
    --rule-bg: #fef9e7;
    --english: #8338ec;
    --muted: #6c757d;
    --caption-bg: #f8f9fa;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --accent: #6b8aff;
      --accent-light: #1e2a4a;
      --yes: #4ecdc4;
      --no: #ff6b6b;
      --rule: #ffe66d;
      --rule-bg: #2a2a1a;
      --english: #b380ff;
      --muted: #9a9ab0;
      --caption-bg: #1a1a2e;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure { max-width: 940px; width: 100%; }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding: 1rem 1.5rem;
    background: var(--caption-bg);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  .chart-wrapper {
    overflow-x: auto;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--surface);
    padding: 1rem;
  }
  svg { display: block; margin: 0 auto; }
</style>
</head>
<body>
<figure>
  <div class="chart-wrapper">
    <svg viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
      <text x="450" y="25" text-anchor="middle" font-size="16" fill="var(--fg)" font-weight="700">Tone Sandhi Decision Flowchart -- The Complete Algorithm</text>
      <text x="450" y="43" text-anchor="middle" font-size="11" fill="var(--accent)" font-weight="600">Virtually no exceptions -- algorithmically predictable</text>

      <!-- START -->
      <rect x="350" y="55" width="200" height="35" rx="17" fill="var(--accent)" stroke="var(--accent)" stroke-width="1.5"/>
      <text x="450" y="78" text-anchor="middle" font-size="12" fill="white" font-weight="700">INPUT: Any syllable sequence</text>

      <!-- Arrow down -->
      <line x1="450" y1="90" x2="450" y2="110" stroke="var(--fg)" stroke-width="1.5"/>
      <polygon points="445,108 455,108 450,115" fill="var(--fg)"/>

      <!-- Decision 1: Is the word 一 or 不? -->
      <polygon points="450,115 600,155 450,195 300,155" fill="var(--surface)" stroke="var(--accent)" stroke-width="1.5"/>
      <text x="450" y="152" text-anchor="middle" font-size="11" fill="var(--accent)" font-weight="700">Is the word 一 (yi)</text>
      <text x="450" y="165" text-anchor="middle" font-size="11" fill="var(--accent)" font-weight="700">or 不 (bu)?</text>

      <!-- YES to 一 -->
      <line x1="600" y1="155" x2="720" y2="155" stroke="var(--yes)" stroke-width="1.5"/>
      <text x="650" y="148" font-size="10" fill="var(--yes)" font-weight="600">YES: 一</text>
      <polygon points="718,150 718,160 725,155" fill="var(--yes)"/>

      <!-- 一 rules box -->
      <rect x="725" y="100" width="160" height="115" rx="6" fill="var(--rule-bg)" stroke="var(--rule)" stroke-width="1.5"/>
      <text x="805" y="118" text-anchor="middle" font-size="11" fill="var(--rule)" font-weight="700">RULE: 一 Changes</text>
      <text x="805" y="137" text-anchor="middle" font-size="10" fill="var(--fg)">Before T4 --> T2</text>
      <text x="805" y="152" text-anchor="middle" font-size="9" fill="var(--muted)">一个 yi ge --> yi ge</text>
      <text x="805" y="170" text-anchor="middle" font-size="10" fill="var(--fg)">Before T1/2/3 --> T4</text>
      <text x="805" y="185" text-anchor="middle" font-size="9" fill="var(--muted)">一天 yi tian --> yi tian</text>
      <text x="805" y="203" text-anchor="middle" font-size="10" fill="var(--fg)">Counting/ordinals --> T1</text>
      <text x="805" y="211" text-anchor="middle" font-size="9" fill="var(--muted)">第一 di yi (stays 1st)</text>

      <!-- YES to 不 (left branch) -->
      <line x1="300" y1="155" x2="170" y2="155" stroke="var(--yes)" stroke-width="1.5"/>
      <text x="240" y="148" font-size="10" fill="var(--yes)" font-weight="600">YES: 不</text>
      <polygon points="172,150 172,160 165,155" fill="var(--yes)"/>

      <!-- 不 rules box -->
      <rect x="15" y="115" width="155" height="85" rx="6" fill="var(--rule-bg)" stroke="var(--rule)" stroke-width="1.5"/>
      <text x="92" y="133" text-anchor="middle" font-size="11" fill="var(--rule)" font-weight="700">RULE: 不 Changes</text>
      <text x="92" y="152" text-anchor="middle" font-size="10" fill="var(--fg)">Before T4 --> T2</text>
      <text x="92" y="167" text-anchor="middle" font-size="9" fill="var(--muted)">不是 bu shi --> bu shi</text>
      <text x="92" y="185" text-anchor="middle" font-size="10" fill="var(--fg)">Otherwise --> stays T4</text>
      <text x="92" y="195" text-anchor="middle" font-size="10" fill="var(--fg)"></text>

      <!-- NO arrow down -->
      <line x1="450" y1="195" x2="450" y2="225" stroke="var(--no)" stroke-width="1.5"/>
      <text x="460" y="215" font-size="10" fill="var(--no)" font-weight="600">NO</text>

      <!-- Decision 2: Third tone? -->
      <polygon points="450,225 590,265 450,305 310,265" fill="var(--surface)" stroke="var(--accent)" stroke-width="1.5"/>
      <text x="450" y="262" text-anchor="middle" font-size="11" fill="var(--accent)" font-weight="700">Is the syllable</text>
      <text x="450" y="275" text-anchor="middle" font-size="11" fill="var(--accent)" font-weight="700">Tone 3?</text>

      <!-- NO: no change -->
      <line x1="310" y1="265" x2="170" y2="265" stroke="var(--no)" stroke-width="1.5"/>
      <text x="240" y="258" font-size="10" fill="var(--no)" font-weight="600">NO</text>
      <rect x="50" y="245" width="120" height="40" rx="6" fill="var(--surface)" stroke="var(--muted)" stroke-width="1.5"/>
      <text x="110" y="262" text-anchor="middle" font-size="10" fill="var(--fg)" font-weight="600">NO CHANGE</text>
      <text x="110" y="278" text-anchor="middle" font-size="9" fill="var(--muted)">Pronounce as-is</text>

      <!-- YES arrow down -->
      <line x1="450" y1="305" x2="450" y2="330" stroke="var(--yes)" stroke-width="1.5"/>
      <text x="460" y="322" font-size="10" fill="var(--yes)" font-weight="600">YES</text>

      <!-- Decision 3: Next syllable also T3? -->
      <polygon points="450,330 610,370 450,410 290,370" fill="var(--surface)" stroke="var(--accent)" stroke-width="1.5"/>
      <text x="450" y="367" text-anchor="middle" font-size="11" fill="var(--accent)" font-weight="700">Is the NEXT syllable</text>
      <text x="450" y="380" text-anchor="middle" font-size="11" fill="var(--accent)" font-weight="700">also Tone 3?</text>

      <!-- YES: T3 sandhi -->
      <line x1="610" y1="370" x2="720" y2="370" stroke="var(--yes)" stroke-width="1.5"/>
      <text x="660" y="363" font-size="10" fill="var(--yes)" font-weight="600">YES</text>

      <rect x="720" y="330" width="170" height="85" rx="6" fill="var(--rule-bg)" stroke="var(--rule)" stroke-width="1.5"/>
      <text x="805" y="348" text-anchor="middle" font-size="11" fill="var(--rule)" font-weight="700">RULE: T3 Sandhi</text>
      <text x="805" y="367" text-anchor="middle" font-size="10" fill="var(--fg)">First T3 --> becomes T2</text>
      <text x="805" y="385" text-anchor="middle" font-size="9" fill="var(--muted)">你好 ni hao --> ni hao</text>
      <text x="805" y="403" text-anchor="middle" font-size="9" fill="var(--muted)">很好 hen hao --> hen hao</text>

      <!-- NO: Half-third -->
      <line x1="290" y1="370" x2="170" y2="370" stroke="var(--no)" stroke-width="1.5"/>
      <text x="230" y="363" font-size="10" fill="var(--no)" font-weight="600">NO</text>

      <rect x="30" y="340" width="145" height="65" rx="6" fill="var(--rule-bg)" stroke="var(--rule)" stroke-width="1.5"/>
      <text x="102" y="358" text-anchor="middle" font-size="11" fill="var(--rule)" font-weight="700">RULE: Half-Third</text>
      <text x="102" y="377" text-anchor="middle" font-size="10" fill="var(--fg)">Full T3 --> half T3</text>
      <text x="102" y="392" text-anchor="middle" font-size="9" fill="var(--muted)">Dip only, no rise</text>
      <text x="102" y="402" text-anchor="middle" font-size="9" fill="var(--muted)">Natural, automatic</text>

      <!-- English comparison box -->
      <rect x="100" y="440" width="340" height="70" rx="6" fill="var(--surface)" stroke="var(--english)" stroke-width="1.5"/>
      <text x="270" y="460" text-anchor="middle" font-size="12" fill="var(--english)" font-weight="700">ENGLISH STRESS RULES</text>
      <text x="270" y="478" text-anchor="middle" font-size="10" fill="var(--fg)">PERmit vs. perMIT, REcord vs. reCORD</text>
      <text x="270" y="493" text-anchor="middle" font-size="10" fill="var(--fg)">ADdress vs. adDRESS -- NO algorithm exists</text>
      <text x="270" y="505" text-anchor="middle" font-size="9" fill="var(--english)">Must be memorized per word, unpredictable</text>

      <!-- Key insight -->
      <rect x="460" y="440" width="340" height="70" rx="6" fill="var(--accent-light)" stroke="var(--accent)" stroke-width="1.5"/>
      <text x="630" y="460" text-anchor="middle" font-size="12" fill="var(--accent)" font-weight="700">THE PATTERN</text>
      <text x="630" y="478" text-anchor="middle" font-size="10" fill="var(--fg)">Chinese: 4 rules, virtually no exceptions</text>
      <text x="630" y="493" text-anchor="middle" font-size="10" fill="var(--fg)">English: dozens of patterns, hundreds</text>
      <text x="630" y="505" text-anchor="middle" font-size="10" fill="var(--fg)">of exceptions, no general algorithm</text>

      <!-- Summary -->
      <rect x="100" y="525" width="700" height="80" rx="6" fill="var(--rule-bg)" stroke="var(--rule)" stroke-width="1.5"/>
      <text x="450" y="545" text-anchor="middle" font-size="12" fill="var(--rule)" font-weight="700">COMPLETE RULE SUMMARY</text>
      <text x="450" y="565" text-anchor="middle" font-size="10" fill="var(--fg)">Rule 1: T3+T3 --> T2+T3 (你好) | Rule 2: T3 before non-T3 --> half-T3 (automatic)</text>
      <text x="450" y="580" text-anchor="middle" font-size="10" fill="var(--fg)">Rule 3: 一 before T4 --> T2; before T1/2/3 --> T4; counting --> T1</text>
      <text x="450" y="595" text-anchor="middle" font-size="10" fill="var(--fg)">Rule 4: 不 before T4 --> T2; otherwise stays T4</text>
    </svg>
  </div>
  <figcaption>
    <h2>Figure 3 -- Tone Sandhi Decision Flowchart: The Complete Algorithm</h2>
    <p>The entire Mandarin tone-change system fits in one decision flowchart with four rules and virtually no exceptions. This is the clearest demonstration of Chinese regularity: every tone change is algorithmically predictable. Compare with English stress rules, where no comparable algorithm exists -- PERmit vs. perMIT, REcord vs. reCORD must be memorized individually, and stress assignment is unpredictable from spelling. For a pattern learner, the contrast is decisive: Chinese tone rules are a finite, completable system.</p>
  </figcaption>
</figure>
</body>
</html>
