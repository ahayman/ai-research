<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Regularity Scorecard -- Chinese vs. English Head-to-Head</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --accent: #4361ee;
    --accent-light: #e8edff;
    --chinese: #e63946;
    --chinese-light: #ffe0e3;
    --english: #8338ec;
    --english-light: #ede0ff;
    --tie: #e9c46a;
    --tie-light: #fef9e7;
    --muted: #6c757d;
    --caption-bg: #f8f9fa;
    --win: #2a9d8f;
    --win-light: #d4f5f0;
    --lose: #e63946;
    --lose-light: #ffe0e3;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --accent: #6b8aff;
      --accent-light: #1e2a4a;
      --chinese: #ff6b6b;
      --chinese-light: #3a1a1a;
      --english: #b380ff;
      --english-light: #2a1a3a;
      --tie: #ffe66d;
      --tie-light: #2a2a1a;
      --muted: #9a9ab0;
      --caption-bg: #1a1a2e;
      --win: #4ecdc4;
      --win-light: #1a3a38;
      --lose: #ff6b6b;
      --lose-light: #3a1a1a;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure { max-width: 940px; width: 100%; }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding: 1rem 1.5rem;
    background: var(--caption-bg);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  .chart-wrapper {
    overflow-x: auto;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--surface);
    padding: 1.5rem;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.85rem;
  }
  th, td {
    padding: 0.6rem 0.8rem;
    border: 1px solid var(--border);
    vertical-align: middle;
  }
  th {
    background: var(--accent-light);
    color: var(--accent);
    font-weight: 700;
    text-align: center;
  }
  th:first-child { text-align: left; }
  td:first-child { font-weight: 600; text-align: left; }
  td { text-align: center; }
  .cn-win { background: var(--win-light); }
  .en-win { background: var(--lose-light); }
  .tie-cell { background: var(--tie-light); }
  .winner-cn { color: var(--win); font-weight: 700; }
  .winner-en { color: var(--english); font-weight: 700; }
  .winner-tie { color: var(--tie); font-weight: 700; }
  .score-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    margin-top: 1.5rem;
    padding: 1rem;
    background: var(--accent-light);
    border-radius: 8px;
    border: 2px solid var(--accent);
  }
  .score-item {
    text-align: center;
  }
  .score-num {
    font-size: 2.5rem;
    font-weight: 700;
    line-height: 1;
  }
  .score-label {
    font-size: 0.8rem;
    font-weight: 600;
    margin-top: 0.2rem;
  }
  .score-dash {
    font-size: 2rem;
    color: var(--muted);
  }
  h3 { text-align: center; font-size: 1.1rem; margin-bottom: 0.8rem; }
</style>
</head>
<body>
<figure>
  <div class="chart-wrapper">
    <h3>The Regularity Scorecard: Chinese vs. English -- Feature by Feature</h3>
    <table>
      <thead>
        <tr>
          <th style="width:18%">Feature</th>
          <th style="width:28%">Chinese Regularity</th>
          <th style="width:28%">English Regularity</th>
          <th style="width:12%">Winner</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>Verb forms</td>
          <td class="cn-win">1 form per verb, always</td>
          <td>3-5 forms + ~200 irregular verbs</td>
          <td class="winner-cn">CHINESE</td>
        </tr>
        <tr>
          <td>Plural marking</td>
          <td class="cn-win">None (no irregularity possible)</td>
          <td>Regular -s + ~300 irregular plurals</td>
          <td class="winner-cn">CHINESE</td>
        </tr>
        <tr>
          <td>Spelling</td>
          <td class="cn-win">N/A (no spelling system)</td>
          <td>Deeply irregular (ough = 6+ sounds)</td>
          <td class="winner-cn">CHINESE</td>
        </tr>
        <tr>
          <td>Number words</td>
          <td class="cn-win">Perfectly transparent (十一 = ten-one)</td>
          <td>Irregular teens (eleven, twelve, thirteen)</td>
          <td class="winner-cn">CHINESE</td>
        </tr>
        <tr>
          <td>Tone / stress rules</td>
          <td class="cn-win">4 tones, strict sandhi, virtually no exceptions</td>
          <td>Variable stress, hundreds of exceptions</td>
          <td class="winner-cn">CHINESE</td>
        </tr>
        <tr>
          <td>Agreement</td>
          <td class="cn-win">None -- zero agreement rules</td>
          <td>Minimal but irregular (is/am/are)</td>
          <td class="winner-cn">CHINESE</td>
        </tr>
        <tr>
          <td>Word order</td>
          <td class="tie-cell">Largely fixed (SVO + topic)</td>
          <td class="tie-cell">Mostly fixed (SVO)</td>
          <td class="winner-tie">TIE</td>
        </tr>
        <tr>
          <td>Script learning curve</td>
          <td>Steep initial (3000+ characters)</td>
          <td class="en-win">26 letters -- fast start</td>
          <td class="winner-en">ENGLISH</td>
        </tr>
        <tr>
          <td>Vocabulary transparency</td>
          <td class="cn-win">High -- compounds often guessable</td>
          <td>Moderate -- many opaque borrowings</td>
          <td class="winner-cn">CHINESE</td>
        </tr>
        <tr>
          <td>Grammatical gender</td>
          <td class="tie-cell">None</td>
          <td class="tie-cell">None</td>
          <td class="winner-tie">TIE</td>
        </tr>
      </tbody>
    </table>

    <div class="score-bar">
      <div class="score-item">
        <div class="score-num" style="color:var(--win)">7</div>
        <div class="score-label" style="color:var(--win)">CHINESE WINS</div>
      </div>
      <div class="score-dash">-</div>
      <div class="score-item">
        <div class="score-num" style="color:var(--english)">1</div>
        <div class="score-label" style="color:var(--english)">ENGLISH WINS</div>
      </div>
      <div class="score-dash">-</div>
      <div class="score-item">
        <div class="score-num" style="color:var(--tie)">2</div>
        <div class="score-label" style="color:var(--tie)">TIE</div>
      </div>
    </div>
    <p style="text-align:center;font-size:0.85rem;color:var(--muted);margin-top:0.8rem;">Chinese is MORE regular than English on 7 of 10 dimensions. English's only advantage is initial script accessibility (26 letters vs. thousands of characters). The "difficulty" of Chinese is unfamiliarity, not irregularity.</p>
  </div>
  <figcaption>
    <h2>Figure 1 -- The Regularity Scorecard: Chinese vs. English Head-to-Head</h2>
    <p>On seven of ten regularity dimensions, Chinese is demonstrably more regular than English. Chinese has zero irregular verbs, zero irregular plurals, zero spelling irregularity, perfectly transparent numbers, strict tone-change rules, zero agreement, and high vocabulary transparency. English wins only on initial script accessibility. This reframes the FSI "difficulty" classification: Chinese is not irregular -- it is unfamiliar. For pattern learners, regularity is the key variable, and Chinese delivers it abundantly.</p>
  </figcaption>
</figure>
</body>
</html>
