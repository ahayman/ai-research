<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unfamiliarity vs. Irregularity Matrix -- Reframing Difficulty</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --accent: #4361ee;
    --accent-light: #e8edff;
    --q1: #2a9d8f;
    --q1-bg: #d4f5f0;
    --q2: #e63946;
    --q2-bg: #ffe0e3;
    --q3: #4361ee;
    --q3-bg: #e8edff;
    --q4: #6c757d;
    --q4-bg: #f0f0f0;
    --chinese: #e63946;
    --english: #8338ec;
    --muted: #6c757d;
    --caption-bg: #f8f9fa;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --accent: #6b8aff;
      --accent-light: #1e2a4a;
      --q1: #4ecdc4;
      --q1-bg: #1a3a38;
      --q2: #ff6b6b;
      --q2-bg: #3a1a1a;
      --q3: #6b8aff;
      --q3-bg: #1e2a4a;
      --q4: #9a9ab0;
      --q4-bg: #2a2a2e;
      --chinese: #ff6b6b;
      --english: #b380ff;
      --muted: #9a9ab0;
      --caption-bg: #1a1a2e;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure { max-width: 940px; width: 100%; }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding: 1rem 1.5rem;
    background: var(--caption-bg);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  .chart-wrapper {
    overflow-x: auto;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--surface);
    padding: 1rem;
  }
  svg { display: block; margin: 0 auto; }
</style>
</head>
<body>
<figure>
  <div class="chart-wrapper">
    <svg viewBox="0 0 900 580" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
      <text x="450" y="28" text-anchor="middle" font-size="16" fill="var(--fg)" font-weight="700">The Difficulty Matrix: Unfamiliarity vs. Irregularity</text>
      <text x="450" y="46" text-anchor="middle" font-size="11" fill="var(--accent)" font-weight="600">Why Chinese difficulty is the LEARNABLE kind</text>

      <!-- Axes -->
      <line x1="120" y1="460" x2="850" y2="460" stroke="var(--fg)" stroke-width="2"/>
      <line x1="120" y1="460" x2="120" y2="70" stroke="var(--fg)" stroke-width="2"/>

      <!-- X-axis labels -->
      <text x="120" y="485" font-size="11" fill="var(--fg)" font-weight="600">FAMILIAR</text>
      <text x="850" y="485" text-anchor="end" font-size="11" fill="var(--fg)" font-weight="600">UNFAMILIAR</text>
      <text x="485" y="500" text-anchor="middle" font-size="10" fill="var(--muted)">Structural Distance from English</text>

      <!-- Y-axis labels -->
      <text x="110" y="460" text-anchor="end" font-size="11" fill="var(--fg)" font-weight="600">REGULAR</text>
      <text x="110" y="80" text-anchor="end" font-size="11" fill="var(--fg)" font-weight="600">IRREGULAR</text>
      <text x="30" y="265" text-anchor="middle" font-size="10" fill="var(--muted)" transform="rotate(-90 30 265)">Pattern Predictability</text>

      <!-- Quadrant backgrounds -->
      <!-- Q1: Familiar + Regular = EASY -->
      <rect x="121" y="265" width="370" height="194" fill="var(--q1-bg)" opacity="0.5"/>
      <!-- Q2: Familiar + Irregular = FRUSTRATING -->
      <rect x="121" y="71" width="370" height="194" fill="var(--q2-bg)" opacity="0.5"/>
      <!-- Q3: Unfamiliar + Regular = LEARNABLE -->
      <rect x="491" y="265" width="358" height="194" fill="var(--q3-bg)" opacity="0.5"/>
      <!-- Q4: Unfamiliar + Irregular = HARD -->
      <rect x="491" y="71" width="358" height="194" fill="var(--q4-bg)" opacity="0.3"/>

      <!-- Quadrant labels -->
      <text x="306" y="300" text-anchor="middle" font-size="13" fill="var(--q1)" font-weight="700">Q1: EASY</text>
      <text x="306" y="316" text-anchor="middle" font-size="10" fill="var(--q1)">Familiar + Regular</text>

      <text x="306" y="105" text-anchor="middle" font-size="13" fill="var(--q2)" font-weight="700">Q2: FRUSTRATING</text>
      <text x="306" y="121" text-anchor="middle" font-size="10" fill="var(--q2)">Familiar + Irregular</text>

      <text x="670" y="300" text-anchor="middle" font-size="13" fill="var(--q3)" font-weight="700">Q3: LEARNABLE</text>
      <text x="670" y="316" text-anchor="middle" font-size="10" fill="var(--q3)">Unfamiliar + Regular</text>
      <text x="670" y="332" text-anchor="middle" font-size="10" fill="var(--q3)">Effort leads to mastery</text>

      <text x="670" y="105" text-anchor="middle" font-size="13" fill="var(--q4)" font-weight="700">Q4: GENUINELY HARD</text>
      <text x="670" y="121" text-anchor="middle" font-size="10" fill="var(--q4)">Unfamiliar + Irregular</text>
      <text x="670" y="137" text-anchor="middle" font-size="10" fill="var(--q4)">(Rare for Chinese)</text>

      <!-- ENGLISH features plotted -->
      <circle cx="200" cy="380" r="8" fill="var(--english)" opacity="0.8"/>
      <text x="215" y="385" font-size="9" fill="var(--english)" font-weight="600">EN: SVO order</text>

      <circle cx="250" cy="370" r="8" fill="var(--english)" opacity="0.8"/>
      <text x="265" y="375" font-size="9" fill="var(--english)" font-weight="600">EN: basic vocabulary</text>

      <circle cx="230" cy="150" r="10" fill="var(--english)" opacity="0.8"/>
      <text x="248" y="147" font-size="9" fill="var(--english)" font-weight="600">EN: irregular verbs</text>
      <text x="248" y="160" font-size="8" fill="var(--muted)">go/went, eat/ate (~200)</text>

      <circle cx="280" cy="175" r="10" fill="var(--english)" opacity="0.8"/>
      <text x="298" y="172" font-size="9" fill="var(--english)" font-weight="600">EN: spelling chaos</text>
      <text x="298" y="185" font-size="8" fill="var(--muted)">ough = 6+ sounds</text>

      <circle cx="200" cy="200" r="8" fill="var(--english)" opacity="0.8"/>
      <text x="218" y="197" font-size="9" fill="var(--english)" font-weight="600">EN: irregular plurals</text>

      <circle cx="320" cy="220" r="8" fill="var(--english)" opacity="0.8"/>
      <text x="338" y="225" font-size="9" fill="var(--english)" font-weight="600">EN: stress unpredictable</text>

      <!-- CHINESE features plotted -->
      <circle cx="620" cy="400" r="10" fill="var(--chinese)" opacity="0.8"/>
      <text x="638" y="397" font-size="9" fill="var(--chinese)" font-weight="600">CN: tone system</text>
      <text x="638" y="410" font-size="8" fill="var(--muted)">4 tones, strict rules</text>

      <circle cx="700" cy="380" r="10" fill="var(--chinese)" opacity="0.8"/>
      <text x="718" y="377" font-size="9" fill="var(--chinese)" font-weight="600">CN: characters</text>
      <text x="718" y="390" font-size="8" fill="var(--muted)">80% systematic</text>

      <circle cx="660" cy="420" r="8" fill="var(--chinese)" opacity="0.8"/>
      <text x="678" y="425" font-size="9" fill="var(--chinese)" font-weight="600">CN: classifiers</text>

      <circle cx="580" cy="390" r="8" fill="var(--chinese)" opacity="0.8"/>
      <text x="525" y="395" font-size="9" fill="var(--chinese)" font-weight="600">CN: compounds</text>

      <circle cx="640" cy="440" r="8" fill="var(--chinese)" opacity="0.8"/>
      <text x="580" y="445" font-size="9" fill="var(--chinese)" font-weight="600">CN: aspect particles</text>

      <circle cx="550" cy="410" r="8" fill="var(--chinese)" opacity="0.8"/>
      <text x="490" y="415" font-size="9" fill="var(--chinese)" font-weight="600">CN: topic structure</text>

      <!-- KEY INSIGHT box -->
      <rect x="130" y="510" width="720" height="55" rx="6" fill="var(--accent-light)" stroke="var(--accent)" stroke-width="2"/>
      <text x="490" y="530" text-anchor="middle" font-size="12" fill="var(--accent)" font-weight="700">CORE THESIS: Pattern learners thrive in Q3 (learnable) and struggle in Q2 (frustrating)</text>
      <text x="490" y="548" text-anchor="middle" font-size="11" fill="var(--fg)">Chinese features cluster in Q3 (unfamiliar but regular). English features spread across Q1 and Q2 (familiar but mixed regularity).</text>
      <text x="490" y="560" text-anchor="middle" font-size="10" fill="var(--muted)">Chinese difficulty dissolves as patterns are recognized. English irregularity persists forever.</text>
    </svg>
  </div>
  <figcaption>
    <h2>Figure 5 -- The Difficulty Matrix: Unfamiliarity vs. Irregularity</h2>
    <p>This matrix maps language features into four quadrants: Familiar+Regular (easy), Familiar+Irregular (frustrating -- the worst kind for pattern learners), Unfamiliar+Regular (learnable -- effort leads to mastery), and Unfamiliar+Irregular (genuinely hard). Chinese features cluster in Q3 (unfamiliar but regular): tones, characters, classifiers, compounds, and topic-comment structure are all unfamiliar to English speakers but follow predictable patterns. English features spread across Q1 and Q2, with irregular verbs, chaotic spelling, and unpredictable stress sitting in Q2 -- the quadrant most hostile to pattern-oriented learners.</p>
  </figcaption>
</figure>
</body>
</html>
