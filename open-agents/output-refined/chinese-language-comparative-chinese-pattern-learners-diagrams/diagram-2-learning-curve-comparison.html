<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Learning Curve Comparison -- Chinese vs. English for Pattern Learners</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --accent: #4361ee;
    --accent-light: #e8edff;
    --chinese: #e63946;
    --english: #8338ec;
    --muted: #6c757d;
    --caption-bg: #f8f9fa;
    --grid: #e0e0e0;
    --zone-good: #2a9d8f;
    --zone-bad: #e9c46a;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --accent: #6b8aff;
      --accent-light: #1e2a4a;
      --chinese: #ff6b6b;
      --english: #b380ff;
      --muted: #9a9ab0;
      --caption-bg: #1a1a2e;
      --grid: #2d2d44;
      --zone-good: #4ecdc4;
      --zone-bad: #ffe66d;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure { max-width: 940px; width: 100%; }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding: 1rem 1.5rem;
    background: var(--caption-bg);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  .chart-wrapper {
    overflow-x: auto;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--surface);
    padding: 1rem;
  }
  svg { display: block; margin: 0 auto; }
</style>
</head>
<body>
<figure>
  <div class="chart-wrapper">
    <svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
      <text x="450" y="28" text-anchor="middle" font-size="16" fill="var(--fg)" font-weight="700">Learning Curve: Chinese vs. English for Pattern Learners</text>

      <!-- Axes -->
      <line x1="100" y1="400" x2="830" y2="400" stroke="var(--fg)" stroke-width="1.5"/>
      <line x1="100" y1="400" x2="100" y2="60" stroke="var(--fg)" stroke-width="1.5"/>

      <!-- Y-axis label -->
      <text x="30" y="230" text-anchor="middle" font-size="12" fill="var(--fg)" font-weight="600" transform="rotate(-90 30 230)">New Material Decodable per Unit Study Time</text>

      <!-- X-axis label -->
      <text x="465" y="435" text-anchor="middle" font-size="12" fill="var(--fg)" font-weight="600">Learning Time</text>
      <text x="150" y="418" font-size="10" fill="var(--muted)">Months 1-3</text>
      <text x="350" y="418" font-size="10" fill="var(--muted)">Months 6-12</text>
      <text x="600" y="418" font-size="10" fill="var(--muted)">Years 1-2</text>
      <text x="780" y="418" font-size="10" fill="var(--muted)">Year 3+</text>

      <!-- Grid lines -->
      <line x1="100" y1="320" x2="830" y2="320" stroke="var(--grid)" stroke-width="0.5" stroke-dasharray="4,4"/>
      <line x1="100" y1="240" x2="830" y2="240" stroke="var(--grid)" stroke-width="0.5" stroke-dasharray="4,4"/>
      <line x1="100" y1="160" x2="830" y2="160" stroke="var(--grid)" stroke-width="0.5" stroke-dasharray="4,4"/>
      <line x1="100" y1="80" x2="830" y2="80" stroke="var(--grid)" stroke-width="0.5" stroke-dasharray="4,4"/>

      <!-- ENGLISH curve: fast start, slow plateau -->
      <path d="M100,380 Q180,180 280,160 Q400,150 500,155 Q600,160 700,170 Q780,175 830,180" stroke="var(--english)" stroke-width="3" fill="none" stroke-linecap="round"/>

      <!-- CHINESE curve: slow start, steep acceleration -->
      <path d="M100,395 Q160,390 200,380 Q260,360 320,320 Q400,220 500,130 Q600,95 700,80 Q780,75 830,72" stroke="var(--chinese)" stroke-width="3" fill="none" stroke-linecap="round"/>

      <!-- Crossover point -->
      <circle cx="340" cy="285" r="6" fill="var(--accent)" stroke="var(--bg)" stroke-width="2"/>
      <line x1="340" y1="291" x2="340" y2="340" stroke="var(--accent)" stroke-width="1" stroke-dasharray="3,2"/>
      <text x="340" y="355" text-anchor="middle" font-size="10" fill="var(--accent)" font-weight="700">CROSSOVER</text>
      <text x="340" y="368" text-anchor="middle" font-size="9" fill="var(--accent)">~6-9 months</text>

      <!-- Annotations: English -->
      <rect x="140" y="120" width="140" height="45" rx="5" fill="var(--surface)" stroke="var(--english)" stroke-width="1"/>
      <text x="210" y="138" text-anchor="middle" font-size="10" fill="var(--english)" font-weight="700">ENGLISH: Fast Start</text>
      <text x="210" y="153" text-anchor="middle" font-size="9" fill="var(--fg)">26 letters = immediate</text>
      <text x="210" y="163" text-anchor="middle" font-size="9" fill="var(--fg)">sound-out capability</text>

      <rect x="570" y="185" width="155" height="45" rx="5" fill="var(--surface)" stroke="var(--zone-bad)" stroke-width="1.5"/>
      <text x="647" y="203" text-anchor="middle" font-size="10" fill="var(--zone-bad)" font-weight="700">IRREGULARITY DRAG</text>
      <text x="647" y="218" text-anchor="middle" font-size="9" fill="var(--fg)">Irregular verbs, spelling,</text>
      <text x="647" y="228" text-anchor="middle" font-size="9" fill="var(--fg)">stress -- persist forever</text>

      <!-- Annotations: Chinese -->
      <rect x="115" y="340" width="140" height="45" rx="5" fill="var(--surface)" stroke="var(--chinese)" stroke-width="1"/>
      <text x="185" y="358" text-anchor="middle" font-size="10" fill="var(--chinese)" font-weight="700">CHINESE: Slow Start</text>
      <text x="185" y="373" text-anchor="middle" font-size="9" fill="var(--fg)">Character memorization,</text>
      <text x="185" y="383" text-anchor="middle" font-size="9" fill="var(--fg)">tone training, no cognates</text>

      <rect x="530" y="50" width="185" height="45" rx="5" fill="var(--surface)" stroke="var(--zone-good)" stroke-width="1.5"/>
      <text x="622" y="68" text-anchor="middle" font-size="10" fill="var(--zone-good)" font-weight="700">PATTERN ACCELERATION</text>
      <text x="622" y="83" text-anchor="middle" font-size="9" fill="var(--fg)">Components unlock characters;</text>
      <text x="622" y="93" text-anchor="middle" font-size="9" fill="var(--fg)">compounds predict vocabulary</text>

      <!-- Phase labels -->
      <rect x="105" y="445" width="200" height="40" rx="4" fill="var(--chinese)" opacity="0.1" stroke="var(--chinese)" stroke-width="1"/>
      <text x="205" y="465" text-anchor="middle" font-size="10" fill="var(--chinese)" font-weight="600">Phase 1: Infrastructure</text>
      <text x="205" y="478" text-anchor="middle" font-size="8" fill="var(--muted)">Tones, radicals, pinyin, basic grammar</text>

      <rect x="320" y="445" width="240" height="40" rx="4" fill="var(--chinese)" opacity="0.15" stroke="var(--chinese)" stroke-width="1"/>
      <text x="440" y="465" text-anchor="middle" font-size="10" fill="var(--chinese)" font-weight="600">Phase 2: Network Expansion</text>
      <text x="440" y="478" text-anchor="middle" font-size="8" fill="var(--muted)">Phonetics, compounds, classifiers, aspect</text>

      <rect x="575" y="445" width="255" height="40" rx="4" fill="var(--chinese)" opacity="0.2" stroke="var(--chinese)" stroke-width="1"/>
      <text x="702" y="465" text-anchor="middle" font-size="10" fill="var(--chinese)" font-weight="600">Phase 3: Acceleration</text>
      <text x="702" y="478" text-anchor="middle" font-size="8" fill="var(--muted)">Each new component unlocks many characters</text>
    </svg>
  </div>
  <figcaption>
    <h2>Figure 2 -- Learning Curve Comparison: Chinese vs. English for Pattern Learners</h2>
    <p>English front-loads easy access (26 letters, sound-out capability) but plateaus as accumulated irregularity drags progress. Chinese front-loads investment (characters, tones, unfamiliar structures) but accelerates as pattern recognition compounds. The crossover point (~6-9 months) marks where Chinese learning efficiency surpasses English, driven by the network effect of component knowledge: each new radical or phonetic component unlocks access to multiple new characters simultaneously.</p>
  </figcaption>
</figure>
</body>
</html>
