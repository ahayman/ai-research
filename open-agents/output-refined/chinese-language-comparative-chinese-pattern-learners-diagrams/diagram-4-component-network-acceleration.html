<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Component Network Acceleration -- From Radicals to Thousands of Characters</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --accent: #4361ee;
    --accent-light: #e8edff;
    --stage1: #e9c46a;
    --stage2: #f4845f;
    --stage3: #e63946;
    --stage4: #2a9d8f;
    --radical: #e63946;
    --phonetic: #4361ee;
    --english: #8338ec;
    --muted: #6c757d;
    --caption-bg: #f8f9fa;
    --grid: #e0e0e0;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --accent: #6b8aff;
      --accent-light: #1e2a4a;
      --stage1: #ffe66d;
      --stage2: #f4845f;
      --stage3: #ff6b6b;
      --stage4: #4ecdc4;
      --radical: #ff6b6b;
      --phonetic: #6b8aff;
      --english: #b380ff;
      --muted: #9a9ab0;
      --caption-bg: #1a1a2e;
      --grid: #2d2d44;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure { max-width: 940px; width: 100%; }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding: 1rem 1.5rem;
    background: var(--caption-bg);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  .chart-wrapper {
    overflow-x: auto;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--surface);
    padding: 1rem;
  }
  svg { display: block; margin: 0 auto; }
</style>
</head>
<body>
<figure>
  <div class="chart-wrapper">
    <svg viewBox="0 0 900 560" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
      <text x="450" y="28" text-anchor="middle" font-size="16" fill="var(--fg)" font-weight="700">Component Network Acceleration: Radicals + Phonetics = Exponential Returns</text>

      <!-- Staircase visualization -->
      <!-- Stage 1 -->
      <rect x="60" y="380" width="180" height="110" rx="6" fill="var(--surface)" stroke="var(--stage1)" stroke-width="2"/>
      <text x="150" y="400" text-anchor="middle" font-size="11" fill="var(--stage1)" font-weight="700">STAGE 1</text>
      <text x="150" y="418" text-anchor="middle" font-size="24" fill="var(--stage1)" font-weight="700">10+10</text>
      <text x="150" y="435" text-anchor="middle" font-size="10" fill="var(--fg)">10 radicals + 10 phonetics</text>
      <line x1="100" y1="448" x2="200" y2="448" stroke="var(--border)" stroke-width="0.5"/>
      <text x="150" y="465" text-anchor="middle" font-size="14" fill="var(--stage1)" font-weight="700">~50-100</text>
      <text x="150" y="480" text-anchor="middle" font-size="10" fill="var(--muted)">characters decodable</text>

      <!-- Stage 2 -->
      <rect x="260" y="290" width="180" height="110" rx="6" fill="var(--surface)" stroke="var(--stage2)" stroke-width="2"/>
      <text x="350" y="310" text-anchor="middle" font-size="11" fill="var(--stage2)" font-weight="700">STAGE 2</text>
      <text x="350" y="328" text-anchor="middle" font-size="24" fill="var(--stage2)" font-weight="700">30+50</text>
      <text x="350" y="345" text-anchor="middle" font-size="10" fill="var(--fg)">30 radicals + 50 phonetics</text>
      <line x1="300" y1="358" x2="400" y2="358" stroke="var(--border)" stroke-width="0.5"/>
      <text x="350" y="375" text-anchor="middle" font-size="14" fill="var(--stage2)" font-weight="700">~500-800</text>
      <text x="350" y="390" text-anchor="middle" font-size="10" fill="var(--muted)">characters decodable</text>

      <!-- Stage 3 -->
      <rect x="460" y="190" width="180" height="110" rx="6" fill="var(--surface)" stroke="var(--stage3)" stroke-width="2"/>
      <text x="550" y="210" text-anchor="middle" font-size="11" fill="var(--stage3)" font-weight="700">STAGE 3</text>
      <text x="550" y="228" text-anchor="middle" font-size="24" fill="var(--stage3)" font-weight="700">50+100</text>
      <text x="550" y="245" text-anchor="middle" font-size="10" fill="var(--fg)">50 radicals + 100 phonetics</text>
      <line x1="500" y1="258" x2="600" y2="258" stroke="var(--border)" stroke-width="0.5"/>
      <text x="550" y="275" text-anchor="middle" font-size="14" fill="var(--stage3)" font-weight="700">~2,000-3,000</text>
      <text x="550" y="290" text-anchor="middle" font-size="10" fill="var(--muted)">characters -- LITERACY</text>

      <!-- Stage 4 -->
      <rect x="660" y="85" width="180" height="110" rx="6" fill="var(--surface)" stroke="var(--stage4)" stroke-width="2.5"/>
      <text x="750" y="105" text-anchor="middle" font-size="11" fill="var(--stage4)" font-weight="700">STAGE 4</text>
      <text x="750" y="123" text-anchor="middle" font-size="24" fill="var(--stage4)" font-weight="700">100+200</text>
      <text x="750" y="140" text-anchor="middle" font-size="10" fill="var(--fg)">100 radicals + 200 phonetics</text>
      <line x1="700" y1="153" x2="800" y2="153" stroke="var(--border)" stroke-width="0.5"/>
      <text x="750" y="170" text-anchor="middle" font-size="14" fill="var(--stage4)" font-weight="700">5,000+</text>
      <text x="750" y="185" text-anchor="middle" font-size="10" fill="var(--muted)">FULL LITERACY</text>

      <!-- Arrows between stages -->
      <path d="M240,430 Q250,370 260,340" stroke="var(--fg)" stroke-width="1.5" fill="none" marker-end="url(#arrowFg)"/>
      <path d="M440,340 Q450,280 460,240" stroke="var(--fg)" stroke-width="1.5" fill="none" marker-end="url(#arrowFg)"/>
      <path d="M640,240 Q650,180 660,140" stroke="var(--fg)" stroke-width="1.5" fill="none" marker-end="url(#arrowFg)"/>
      <defs>
        <marker id="arrowFg" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="var(--fg)"/></marker>
      </defs>

      <!-- Acceleration labels -->
      <text x="250" y="375" font-size="9" fill="var(--accent)" font-weight="600">5-8x growth</text>
      <text x="448" y="275" font-size="9" fill="var(--accent)" font-weight="600">4-5x growth</text>
      <text x="648" y="175" font-size="9" fill="var(--accent)" font-weight="600">2x growth</text>

      <!-- Example: 青 family -->
      <rect x="60" y="55" width="380" height="120" rx="6" fill="var(--accent-light)" stroke="var(--accent)" stroke-width="1.5"/>
      <text x="250" y="75" text-anchor="middle" font-size="11" fill="var(--accent)" font-weight="700">EXAMPLE: One Phonetic Component (青 qing) Unlocks 5+ Characters</text>

      <text x="80" y="100" font-size="11" fill="var(--fg)"><tspan fill="var(--radical)">氵</tspan> + <tspan fill="var(--phonetic)">青</tspan> = <tspan font-weight="700">清</tspan> qing (clear)</text>
      <text x="80" y="118" font-size="11" fill="var(--fg)"><tspan fill="var(--radical)">讠</tspan> + <tspan fill="var(--phonetic)">青</tspan> = <tspan font-weight="700">请</tspan> qing (please)</text>
      <text x="80" y="136" font-size="11" fill="var(--fg)"><tspan fill="var(--radical)">忄</tspan> + <tspan fill="var(--phonetic)">青</tspan> = <tspan font-weight="700">情</tspan> qing (feeling)</text>
      <text x="260" y="100" font-size="11" fill="var(--fg)"><tspan fill="var(--radical)">日</tspan> + <tspan fill="var(--phonetic)">青</tspan> = <tspan font-weight="700">晴</tspan> qing (clear weather)</text>
      <text x="260" y="118" font-size="11" fill="var(--fg)"><tspan fill="var(--radical)">目</tspan> + <tspan fill="var(--phonetic)">青</tspan> = <tspan font-weight="700">睛</tspan> jing (eyeball)</text>
      <text x="260" y="146" font-size="9" fill="var(--accent)">Radical hints MEANING, phonetic hints SOUND</text>

      <!-- English comparison -->
      <rect x="60" y="500" width="780" height="45" rx="6" fill="var(--surface)" stroke="var(--english)" stroke-width="1.5"/>
      <text x="450" y="518" text-anchor="middle" font-size="11" fill="var(--english)" font-weight="700">ENGLISH COMPARISON: Roughly Linear Growth</text>
      <text x="450" y="535" text-anchor="middle" font-size="10" fill="var(--fg)">Each new English word must be learned mostly independently. Cognates and roots help somewhat, but there is no comparable network effect where 300 components systematically generate 5,000+ words.</text>
    </svg>
  </div>
  <figcaption>
    <h2>Figure 4 -- Component Network Acceleration: From Radicals to Thousands of Characters</h2>
    <p>Character learning in Chinese follows an accelerating-returns curve: each new radical or phonetic component unlocks access to an entire family of characters. From 10+10 components (~100 characters) to 50+100 (~3,000 characters = literacy) to 100+200 (5,000+ = full literacy). The example shows how a single phonetic component 青 (qing) combined with different semantic radicals generates clear, please, feeling, sunny, eyeball. English vocabulary growth is roughly linear -- each word must be learned somewhat independently.</p>
  </figcaption>
</figure>
</body>
</html>
