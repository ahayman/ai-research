<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Germanic Dialect Family Tree</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --accent: #4361ee; --accent-light: #e8edff;
    --unshifted: #3b82f6; --unshifted-bg: #dbeafe;
    --shifted: #ef4444; --shifted-bg: #fee2e2;
    --north: #8b5cf6; --north-bg: #ede9fe;
    --east: #6c757d; --east-bg: #e9ecef;
    --en: #10b981; --en-bg: #d1fae5;
    --standard: #f59e0b; --standard-bg: #fef3c7;
    --muted: #6c757d; --caption-bg: #f8f9fa;
    --line: #94a3b8;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a; --fg: #e8e8f0; --surface: #1a1a2e; --border: #2d2d44;
      --accent: #6b8aff; --accent-light: #1e2a4a;
      --unshifted: #60a5fa; --unshifted-bg: #1e3a5f;
      --shifted: #f87171; --shifted-bg: #5c1a1a;
      --north: #a78bfa; --north-bg: #3b2d6b;
      --east: #9a9ab0; --east-bg: #2d2d44;
      --en: #34d399; --en-bg: #064e3b;
      --standard: #fbbf24; --standard-bg: #78350f;
      --muted: #9a9ab0; --caption-bg: #1a1a2e;
      --line: #4a5568;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--fg); display: flex; justify-content: center; padding: 2rem 1rem; line-height: 1.6; }
  figure { max-width: 1100px; width: 100%; }
  .diagram-container { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 1.5rem 1rem; overflow-x: auto; }
  figcaption { text-align: center; margin-top: 1.5rem; padding: 1rem 1.5rem; background: var(--caption-bg); border-radius: 8px; border: 1px solid var(--border); }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  svg { display: block; margin: 0 auto; }
  @media print { body { background: white; } .diagram-container { border: none; } }
</style>
</head>
<body>
<figure>
  <div class="diagram-container">
    <svg viewBox="0 0 1060 850" xmlns="http://www.w3.org/2000/svg" style="min-width:750px;">

      <!-- Title -->
      <text x="530" y="30" text-anchor="middle" style="font: bold 16px 'Segoe UI', system-ui, sans-serif; fill: var(--fg);">The Germanic Dialect Family Tree</text>
      <text x="530" y="50" text-anchor="middle" style="font: 11px 'Segoe UI', system-ui, sans-serif; fill: var(--muted);">From Proto-Germanic to modern varieties -- the consonant shift divides the tree</text>

      <!-- ===== ROOT: Proto-Germanic ===== -->
      <rect x="420" y="70" width="220" height="40" rx="8" fill="var(--accent-light)" stroke="var(--accent)" stroke-width="2.5"/>
      <text x="530" y="95" text-anchor="middle" style="font: bold 14px 'Segoe UI', system-ui, sans-serif; fill: var(--accent);">Proto-Germanic</text>

      <!-- Three branches from Proto-Germanic -->
      <line x1="400" y1="110" x2="150" y2="160" stroke="var(--line)" stroke-width="2"/>
      <line x1="530" y1="110" x2="530" y2="160" stroke="var(--line)" stroke-width="2"/>
      <line x1="660" y1="110" x2="900" y2="160" stroke="var(--line)" stroke-width="2"/>

      <!-- North Germanic -->
      <rect x="60" y="160" width="180" height="36" rx="6" fill="var(--north-bg)" stroke="var(--north)" stroke-width="1.5"/>
      <text x="150" y="183" text-anchor="middle" style="font: bold 12px 'Segoe UI', system-ui, sans-serif; fill: var(--north);">North Germanic</text>
      <line x1="150" y1="196" x2="150" y2="230" stroke="var(--line)" stroke-width="1.5"/>
      <text x="150" y="248" text-anchor="middle" style="font: 10px 'Segoe UI', system-ui, sans-serif; fill: var(--north);">Old Norse</text>
      <line x1="100" y1="258" x2="100" y2="282" stroke="var(--line)" stroke-width="1"/>
      <line x1="200" y1="258" x2="200" y2="282" stroke="var(--line)" stroke-width="1"/>
      <line x1="100" y1="258" x2="200" y2="258" stroke="var(--line)" stroke-width="1"/>
      <text x="80" y="295" text-anchor="middle" style="font: 9px 'Segoe UI', system-ui, sans-serif; fill: var(--muted);">Swedish</text>
      <text x="130" y="295" text-anchor="middle" style="font: 9px 'Segoe UI', system-ui, sans-serif; fill: var(--muted);">Danish</text>
      <text x="185" y="295" text-anchor="middle" style="font: 9px 'Segoe UI', system-ui, sans-serif; fill: var(--muted);">Norwegian</text>
      <text x="235" y="295" text-anchor="middle" style="font: 9px 'Segoe UI', system-ui, sans-serif; fill: var(--muted);">Icelandic</text>

      <!-- East Germanic (extinct) -->
      <rect x="820" y="160" width="160" height="36" rx="6" fill="var(--east-bg)" stroke="var(--east)" stroke-width="1.5" stroke-dasharray="4,2"/>
      <text x="900" y="183" text-anchor="middle" style="font: bold 12px 'Segoe UI', system-ui, sans-serif; fill: var(--east);">East Germanic</text>
      <line x1="900" y1="196" x2="900" y2="230" stroke="var(--east)" stroke-width="1" stroke-dasharray="3,2"/>
      <text x="900" y="248" text-anchor="middle" style="font: 10px 'Segoe UI', system-ui, sans-serif; fill: var(--east);">Gothic (extinct)</text>
      <text x="900" y="262" text-anchor="middle" style="font: 9px 'Segoe UI', system-ui, sans-serif; fill: var(--muted);">Burgundian, Vandalic...</text>

      <!-- ===== WEST GERMANIC (center, main focus) ===== -->
      <rect x="420" y="160" width="220" height="40" rx="7" fill="var(--surface)" stroke="var(--accent)" stroke-width="2"/>
      <text x="530" y="186" text-anchor="middle" style="font: bold 13px 'Segoe UI', system-ui, sans-serif; fill: var(--accent);">West Germanic</text>

      <!-- Branches from West Germanic -->
      <!-- Anglo-Frisian -->
      <line x1="455" y1="200" x2="200" y2="340" stroke="var(--unshifted)" stroke-width="2"/>
      <!-- Low German / Low Saxon -->
      <line x1="480" y1="200" x2="380" y2="340" stroke="var(--unshifted)" stroke-width="2"/>
      <!-- Low Franconian -->
      <line x1="510" y1="200" x2="530" y2="340" stroke="var(--unshifted)" stroke-width="2"/>
      <!-- High German -->
      <line x1="580" y1="200" x2="750" y2="340" stroke="var(--shifted)" stroke-width="2.5"/>

      <!-- === CONSONANT SHIFT MARKER === -->
      <rect x="620" y="260" width="200" height="32" rx="5" fill="var(--shifted-bg)" stroke="var(--shifted)" stroke-width="2"/>
      <text x="720" y="276" text-anchor="middle" style="font: bold 10px 'Segoe UI', system-ui, sans-serif; fill: var(--shifted);">HIGH GERMAN</text>
      <text x="720" y="288" text-anchor="middle" style="font: bold 10px 'Segoe UI', system-ui, sans-serif; fill: var(--shifted);">CONSONANT SHIFT</text>
      <text x="618" y="280" text-anchor="end" style="font: 16px 'Segoe UI', system-ui, sans-serif; fill: var(--shifted);">&laquo;</text>

      <!-- Unshifted label -->
      <rect x="180" y="310" width="400" height="22" rx="4" fill="var(--unshifted-bg)" stroke="var(--unshifted)" stroke-width="1" opacity="0.6"/>
      <text x="380" y="326" text-anchor="middle" style="font: bold 10px 'Segoe UI', system-ui, sans-serif; fill: var(--unshifted);">UNSHIFTED BRANCHES (retain original p, t, k)</text>

      <!-- Anglo-Frisian node -->
      <rect x="110" y="340" width="180" height="36" rx="6" fill="var(--unshifted-bg)" stroke="var(--unshifted)" stroke-width="2"/>
      <text x="200" y="363" text-anchor="middle" style="font: bold 12px 'Segoe UI', system-ui, sans-serif; fill: var(--unshifted);">Anglo-Frisian</text>

      <!-- Anglo-Frisian children -->
      <line x1="155" y1="376" x2="120" y2="420" stroke="var(--line)" stroke-width="1.5"/>
      <line x1="240" y1="376" x2="270" y2="420" stroke="var(--line)" stroke-width="1.5"/>

      <!-- Old English -> English -->
      <rect x="50" y="420" width="140" height="32" rx="5" fill="var(--en-bg)" stroke="var(--en)" stroke-width="2"/>
      <text x="120" y="441" text-anchor="middle" style="font: bold 11px 'Segoe UI', system-ui, sans-serif; fill: var(--en);">Old English</text>
      <line x1="120" y1="452" x2="120" y2="485" stroke="var(--en)" stroke-width="2"/>
      <rect x="50" y="485" width="140" height="36" rx="6" fill="var(--en-bg)" stroke="var(--en)" stroke-width="2.5"/>
      <text x="120" y="508" text-anchor="middle" style="font: bold 13px 'Segoe UI', system-ui, sans-serif; fill: var(--en);">ENGLISH</text>

      <!-- Frisian -->
      <rect x="210" y="420" width="120" height="32" rx="5" fill="var(--unshifted-bg)" stroke="var(--unshifted)" stroke-width="1.5"/>
      <text x="270" y="441" text-anchor="middle" style="font: 11px 'Segoe UI', system-ui, sans-serif; fill: var(--unshifted);">Frisian</text>

      <!-- Low German node -->
      <rect x="310" y="340" width="150" height="36" rx="6" fill="var(--unshifted-bg)" stroke="var(--unshifted)" stroke-width="2"/>
      <text x="385" y="363" text-anchor="middle" style="font: bold 12px 'Segoe UI', system-ui, sans-serif; fill: var(--unshifted);">Low German</text>
      <line x1="385" y1="376" x2="385" y2="420" stroke="var(--line)" stroke-width="1.5"/>
      <text x="385" y="438" text-anchor="middle" style="font: 10px 'Segoe UI', system-ui, sans-serif; fill: var(--unshifted);">Old Saxon</text>
      <line x1="385" y1="448" x2="385" y2="475" stroke="var(--line)" stroke-width="1.5"/>
      <text x="385" y="490" text-anchor="middle" style="font: 10px 'Segoe UI', system-ui, sans-serif; fill: var(--unshifted);">Middle Low German</text>
      <text x="385" y="504" text-anchor="middle" style="font: 9px 'Segoe UI', system-ui, sans-serif; fill: var(--muted);">(Hanseatic lingua franca)</text>
      <line x1="385" y1="512" x2="385" y2="535" stroke="var(--line)" stroke-width="1.5"/>
      <rect x="310" y="535" width="150" height="36" rx="6" fill="var(--unshifted-bg)" stroke="var(--unshifted)" stroke-width="2"/>
      <text x="385" y="558" text-anchor="middle" style="font: bold 12px 'Segoe UI', system-ui, sans-serif; fill: var(--unshifted);">Plattdeutsch</text>

      <!-- Sister relationship arrow English <-> Low German -->
      <rect x="155" y="530" width="150" height="24" rx="4" fill="var(--en-bg)" stroke="var(--en)" stroke-width="1" stroke-dasharray="4,2"/>
      <text x="230" y="546" text-anchor="middle" style="font: bold 9px 'Segoe UI', system-ui, sans-serif; fill: var(--en);">closest relatives!</text>
      <line x1="190" y1="510" x2="215" y2="530" stroke="var(--en)" stroke-width="1" stroke-dasharray="3,2"/>
      <line x1="310" y1="550" x2="305" y2="546" stroke="var(--en)" stroke-width="1" stroke-dasharray="3,2"/>

      <!-- Low Franconian (Dutch) -->
      <rect x="480" y="340" width="140" height="36" rx="6" fill="var(--unshifted-bg)" stroke="var(--unshifted)" stroke-width="1.5"/>
      <text x="550" y="358" text-anchor="middle" style="font: bold 11px 'Segoe UI', system-ui, sans-serif; fill: var(--unshifted);">Low Franconian</text>
      <text x="550" y="373" text-anchor="middle" style="font: 9px 'Segoe UI', system-ui, sans-serif; fill: var(--muted);">(also unshifted)</text>
      <line x1="550" y1="376" x2="550" y2="420" stroke="var(--line)" stroke-width="1.5"/>
      <rect x="490" y="420" width="120" height="32" rx="5" fill="var(--unshifted-bg)" stroke="var(--unshifted)" stroke-width="1.5"/>
      <text x="550" y="441" text-anchor="middle" style="font: bold 11px 'Segoe UI', system-ui, sans-serif; fill: var(--unshifted);">Dutch</text>

      <!-- ===== HIGH GERMAN branch ===== -->
      <rect x="670" y="340" width="170" height="40" rx="7" fill="var(--shifted-bg)" stroke="var(--shifted)" stroke-width="2.5"/>
      <text x="755" y="358" text-anchor="middle" style="font: bold 13px 'Segoe UI', system-ui, sans-serif; fill: var(--shifted);">High German</text>
      <text x="755" y="374" text-anchor="middle" style="font: 9px 'Segoe UI', system-ui, sans-serif; fill: var(--shifted);">(shifted: pf, z/ss, ch)</text>

      <!-- Central German branch -->
      <line x1="715" y1="380" x2="680" y2="440" stroke="var(--line)" stroke-width="2"/>
      <!-- Upper German branch -->
      <line x1="795" y1="380" x2="860" y2="440" stroke="var(--line)" stroke-width="2"/>

      <!-- Central German -->
      <rect x="595" y="440" width="170" height="36" rx="6" fill="var(--standard-bg)" stroke="var(--standard)" stroke-width="2"/>
      <text x="680" y="463" text-anchor="middle" style="font: bold 12px 'Segoe UI', system-ui, sans-serif; fill: var(--standard);">Central German</text>

      <!-- Central German children -->
      <line x1="640" y1="476" x2="620" y2="510" stroke="var(--line)" stroke-width="1"/>
      <line x1="680" y1="476" x2="680" y2="510" stroke="var(--line)" stroke-width="1"/>
      <line x1="720" y1="476" x2="740" y2="510" stroke="var(--line)" stroke-width="1"/>
      <text x="610" y="525" text-anchor="middle" style="font: 9px 'Segoe UI', system-ui, sans-serif; fill: var(--muted);">Franconian</text>
      <text x="680" y="525" text-anchor="middle" style="font: 9px 'Segoe UI', system-ui, sans-serif; fill: var(--muted);">Thuringian</text>
      <text x="750" y="525" text-anchor="middle" style="font: 9px 'Segoe UI', system-ui, sans-serif; fill: var(--muted);">Saxon</text>

      <!-- Standard German emerges from Central German -->
      <line x1="680" y1="535" x2="680" y2="570" stroke="var(--standard)" stroke-width="2" stroke-dasharray="5,3"/>
      <rect x="590" y="570" width="180" height="44" rx="7" fill="var(--standard-bg)" stroke="var(--standard)" stroke-width="2.5"/>
      <text x="680" y="590" text-anchor="middle" style="font: bold 13px 'Segoe UI', system-ui, sans-serif; fill: var(--standard);">STANDARD GERMAN</text>
      <text x="680" y="606" text-anchor="middle" style="font: 9px 'Segoe UI', system-ui, sans-serif; fill: var(--standard);">(constructed, not natural)</text>

      <!-- Standard German serves all zones (dashed lines) -->
      <line x1="605" y1="592" x2="385" y2="570" stroke="var(--standard)" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
      <line x1="770" y1="592" x2="860" y2="560" stroke="var(--standard)" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
      <text x="680" y="632" text-anchor="middle" style="font: 9px 'Segoe UI', system-ui, sans-serif; fill: var(--standard);">serves as overlay for ALL zones</text>

      <!-- Upper German -->
      <rect x="790" y="440" width="160" height="36" rx="6" fill="var(--shifted-bg)" stroke="var(--shifted)" stroke-width="2"/>
      <text x="870" y="463" text-anchor="middle" style="font: bold 12px 'Segoe UI', system-ui, sans-serif; fill: var(--shifted);">Upper German</text>

      <!-- Upper German children -->
      <line x1="830" y1="476" x2="800" y2="520" stroke="var(--line)" stroke-width="1"/>
      <line x1="870" y1="476" x2="870" y2="520" stroke="var(--line)" stroke-width="1"/>
      <line x1="910" y1="476" x2="940" y2="520" stroke="var(--line)" stroke-width="1"/>

      <rect x="748" y="520" width="100" height="40" rx="5" fill="var(--shifted-bg)" stroke="var(--shifted)" stroke-width="1"/>
      <text x="798" y="540" text-anchor="middle" style="font: bold 10px 'Segoe UI', system-ui, sans-serif; fill: var(--shifted);">Bavarian</text>
      <text x="798" y="553" text-anchor="middle" style="font: 8px 'Segoe UI', system-ui, sans-serif; fill: var(--muted);">Bavaria, Austria</text>

      <rect x="860" y="520" width="100" height="40" rx="5" fill="var(--shifted-bg)" stroke="var(--shifted)" stroke-width="1"/>
      <text x="910" y="540" text-anchor="middle" style="font: bold 10px 'Segoe UI', system-ui, sans-serif; fill: var(--shifted);">Alemannic</text>
      <text x="910" y="553" text-anchor="middle" style="font: 8px 'Segoe UI', system-ui, sans-serif; fill: var(--muted);">SW Germany</text>

      <!-- Swiss German from Alemannic -->
      <line x1="910" y1="560" x2="910" y2="590" stroke="var(--line)" stroke-width="1.5"/>
      <rect x="855" y="590" width="120" height="36" rx="5" fill="var(--shifted-bg)" stroke="var(--shifted)" stroke-width="2"/>
      <text x="915" y="610" text-anchor="middle" style="font: bold 10px 'Segoe UI', system-ui, sans-serif; fill: var(--shifted);">Swiss German</text>
      <text x="915" y="622" text-anchor="middle" style="font: 8px 'Segoe UI', system-ui, sans-serif; fill: var(--muted);">full diglossia</text>

      <!-- Swabian -->
      <line x1="940" y1="520" x2="985" y2="545" stroke="var(--line)" stroke-width="1"/>
      <text x="1000" y="558" text-anchor="middle" style="font: 9px 'Segoe UI', system-ui, sans-serif; fill: var(--muted);">Swabian</text>

      <!-- Key insight boxes -->
      <rect x="60" y="670" width="940" height="55" rx="8" fill="var(--accent-light)" stroke="var(--accent)" stroke-width="2"/>
      <text x="530" y="692" text-anchor="middle" style="font: bold 12px 'Segoe UI', system-ui, sans-serif; fill: var(--accent);">READING THE TREE</text>
      <text x="530" y="710" text-anchor="middle" style="font: 11px 'Segoe UI', system-ui, sans-serif; fill: var(--fg);">Everything LEFT of the shift marker (blue) retains original consonants: English, Frisian, Low German, Dutch.</text>
      <text x="530" y="724" text-anchor="middle" style="font: 11px 'Segoe UI', system-ui, sans-serif; fill: var(--fg);">Everything RIGHT (red) underwent the shift. Standard German was built from the Central branch to bridge both sides.</text>

      <!-- English comparison -->
      <rect x="60" y="740" width="940" height="50" rx="8" fill="var(--en-bg)" stroke="var(--en)" stroke-width="1.5"/>
      <text x="530" y="762" text-anchor="middle" style="font: bold 12px 'Segoe UI', system-ui, sans-serif; fill: var(--en);">ENGLISH'S POSITION</text>
      <text x="530" y="780" text-anchor="middle" style="font: 11px 'Segoe UI', system-ui, sans-serif; fill: var(--fg);">English is NOT a "cousin" of German that drifted apart. English and Low German are sisters that stayed together --</text>
      <text x="530" y="793" text-anchor="middle" style="font: 11px 'Segoe UI', system-ui, sans-serif; fill: var(--fg);">it is Standard German that underwent a major sound change and moved away from the ancestral pattern.</text>

      <!-- Color legend -->
      <rect x="60" y="806" width="940" height="30" rx="5" fill="var(--surface)" stroke="var(--border)" stroke-width="1"/>
      <rect x="80" y="812" width="14" height="14" rx="3" fill="var(--unshifted-bg)" stroke="var(--unshifted)" stroke-width="1"/>
      <text x="100" y="824" style="font: 10px 'Segoe UI', system-ui, sans-serif; fill: var(--fg);">Unshifted (original consonants)</text>
      <rect x="310" y="812" width="14" height="14" rx="3" fill="var(--shifted-bg)" stroke="var(--shifted)" stroke-width="1"/>
      <text x="330" y="824" style="font: 10px 'Segoe UI', system-ui, sans-serif; fill: var(--fg);">Shifted (consonant shift applied)</text>
      <rect x="540" y="812" width="14" height="14" rx="3" fill="var(--standard-bg)" stroke="var(--standard)" stroke-width="1"/>
      <text x="560" y="824" style="font: 10px 'Segoe UI', system-ui, sans-serif; fill: var(--fg);">Standard German (constructed from Central)</text>
      <rect x="790" y="812" width="14" height="14" rx="3" fill="var(--east-bg)" stroke="var(--east)" stroke-width="1" stroke-dasharray="3,1"/>
      <text x="810" y="824" style="font: 10px 'Segoe UI', system-ui, sans-serif; fill: var(--fg);">Extinct</text>

    </svg>
  </div>
  <figcaption>
    <h2>The Germanic Dialect Family Tree</h2>
    <p>Proto-Germanic split into North, East, and West branches. Within West Germanic, the High German Consonant Shift created a fundamental division: unshifted varieties (English, Frisian, Low German, Dutch) on one side, shifted varieties (Central and Upper German) on the other. Standard German was deliberately constructed from the Central German branch -- a geographic and linguistic "middle ground" between the fully shifted south and the unshifted north.</p>
  </figcaption>
</figure>
