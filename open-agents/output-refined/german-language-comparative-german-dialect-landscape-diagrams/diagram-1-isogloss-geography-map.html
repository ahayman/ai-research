<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>German Dialect Isogloss Geography Map</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --accent: #4361ee; --accent-light: #e8edff;
    --low: #3b82f6; --low-bg: #dbeafe;
    --central: #f59e0b; --central-bg: #fef3c7;
    --upper: #ef4444; --upper-bg: #fee2e2;
    --line-benrath: #e11d48; --line-speyer: #f97316;
    --line-uerdingen: #8b5cf6;
    --en: #10b981; --en-bg: #d1fae5;
    --muted: #6c757d; --caption-bg: #f8f9fa;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a; --fg: #e8e8f0; --surface: #1a1a2e; --border: #2d2d44;
      --accent: #6b8aff; --accent-light: #1e2a4a;
      --low: #60a5fa; --low-bg: #1e3a5f;
      --central: #fbbf24; --central-bg: #78350f;
      --upper: #f87171; --upper-bg: #5c1a1a;
      --line-benrath: #fb7185; --line-speyer: #fb923c;
      --line-uerdingen: #a78bfa;
      --en: #34d399; --en-bg: #064e3b;
      --muted: #9a9ab0; --caption-bg: #1a1a2e;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--fg); display: flex; justify-content: center; padding: 2rem 1rem; line-height: 1.6; }
  figure { max-width: 1100px; width: 100%; }
  .diagram-container { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 1.5rem 1rem; overflow-x: auto; }
  figcaption { text-align: center; margin-top: 1.5rem; padding: 1rem 1.5rem; background: var(--caption-bg); border-radius: 8px; border: 1px solid var(--border); }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  svg { display: block; margin: 0 auto; }
  @media print { body { background: white; } .diagram-container { border: none; box-shadow: none; } }
</style>
</head>
<body>
<figure>
  <div class="diagram-container">
    <svg viewBox="0 0 1060 880" xmlns="http://www.w3.org/2000/svg" style="min-width:700px;">
      <defs>
        <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="var(--muted)"/></marker>
        <linearGradient id="zoneGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="var(--low)" stop-opacity="0.12"/>
          <stop offset="35%" stop-color="var(--central)" stop-opacity="0.12"/>
          <stop offset="100%" stop-color="var(--upper)" stop-opacity="0.12"/>
        </linearGradient>
      </defs>

      <!-- Title -->
      <text x="530" y="30" text-anchor="middle" style="font: bold 16px 'Segoe UI', system-ui, sans-serif; fill: var(--fg);">The German Dialect Geography: Isogloss Map</text>
      <text x="530" y="50" text-anchor="middle" style="font: 11px 'Segoe UI', system-ui, sans-serif; fill: var(--muted);">Major isoglosses dividing Low German, Central German, and Upper German zones</text>

      <!-- Stylized map outline (simplified Germany + Austria + Switzerland) -->
      <path d="M 200,100 L 350,80 L 500,85 L 620,95 L 750,100 L 820,130 L 850,200 L 830,280 L 810,340 L 780,400 L 800,450 L 830,500 L 810,560 L 750,600 L 700,640 L 650,660 L 580,680 L 500,700 L 420,710 L 350,700 L 280,680 L 230,640 L 200,590 L 170,530 L 150,460 L 140,380 L 150,300 L 170,230 L 180,160 Z"
            fill="url(#zoneGrad)" stroke="var(--border)" stroke-width="2" opacity="0.9"/>

      <!-- ZONE LABELS (background fills for each zone) -->
      <!-- Low German zone (north) -->
      <rect x="320" y="108" width="300" height="80" rx="8" fill="var(--low-bg)" stroke="var(--low)" stroke-width="1.5" opacity="0.7"/>
      <text x="470" y="132" text-anchor="middle" style="font: bold 14px 'Segoe UI', system-ui, sans-serif; fill: var(--low);">LOW GERMAN (Niederdeutsch)</text>
      <text x="470" y="150" text-anchor="middle" style="font: 11px 'Segoe UI', system-ui, sans-serif; fill: var(--low);">No consonant shift</text>
      <text x="470" y="166" text-anchor="middle" style="font: 10px 'Segoe UI', system-ui, sans-serif; fill: var(--muted);">maken, Water, Appel, ik, dat</text>
      <text x="470" y="180" text-anchor="middle" style="font: 10px 'Segoe UI', system-ui, sans-serif; fill: var(--en);">= English: make, water, apple, I, that</text>

      <!-- Central German zone (middle) -->
      <rect x="300" y="310" width="340" height="75" rx="8" fill="var(--central-bg)" stroke="var(--central)" stroke-width="1.5" opacity="0.7"/>
      <text x="470" y="334" text-anchor="middle" style="font: bold 14px 'Segoe UI', system-ui, sans-serif; fill: var(--central);">CENTRAL GERMAN (Mitteldeutsch)</text>
      <text x="470" y="352" text-anchor="middle" style="font: 11px 'Segoe UI', system-ui, sans-serif; fill: var(--central);">Partial consonant shift</text>
      <text x="470" y="368" text-anchor="middle" style="font: 10px 'Segoe UI', system-ui, sans-serif; fill: var(--muted);">machen, Wasser, but Appel (p unshifted in some positions)</text>
      <text x="470" y="380" text-anchor="middle" style="font: 10px 'Segoe UI', system-ui, sans-serif; fill: var(--central);">Source region for Standard German</text>

      <!-- Upper German zone (south) -->
      <rect x="280" y="520" width="370" height="75" rx="8" fill="var(--upper-bg)" stroke="var(--upper)" stroke-width="1.5" opacity="0.7"/>
      <text x="465" y="544" text-anchor="middle" style="font: bold 14px 'Segoe UI', system-ui, sans-serif; fill: var(--upper);">UPPER GERMAN (Oberdeutsch)</text>
      <text x="465" y="562" text-anchor="middle" style="font: 11px 'Segoe UI', system-ui, sans-serif; fill: var(--upper);">Full consonant shift</text>
      <text x="465" y="578" text-anchor="middle" style="font: 10px 'Segoe UI', system-ui, sans-serif; fill: var(--muted);">machen, Wasser, Apfel, Pfund, [kx]ind</text>
      <text x="465" y="590" text-anchor="middle" style="font: 10px 'Segoe UI', system-ui, sans-serif; fill: var(--upper);">Bavarian, Alemannic, Swabian</text>

      <!-- === ISOGLOSSES === -->

      <!-- Uerdingen Line (ik/ich) - slightly north of Benrath -->
      <path d="M 158,225 C 280,215 400,210 530,215 C 650,220 750,225 835,218"
            fill="none" stroke="var(--line-uerdingen)" stroke-width="2" stroke-dasharray="6,3" opacity="0.8"/>
      <rect x="838" y="206" width="180" height="24" rx="4" fill="var(--surface)" stroke="var(--line-uerdingen)" stroke-width="1"/>
      <text x="928" y="222" text-anchor="middle" style="font: bold 10px 'Segoe UI', system-ui, sans-serif; fill: var(--line-uerdingen);">Uerdingen Line: ik / ich</text>

      <!-- Benrath Line (maken/machen) - THE primary divider -->
      <path d="M 150,260 C 250,255 350,245 440,250 C 530,255 620,260 710,255 C 770,252 810,258 840,255"
            fill="none" stroke="var(--line-benrath)" stroke-width="3.5" opacity="0.9"/>
      <rect x="842" y="240" width="200" height="30" rx="5" fill="var(--surface)" stroke="var(--line-benrath)" stroke-width="2"/>
      <text x="942" y="260" text-anchor="middle" style="font: bold 11px 'Segoe UI', system-ui, sans-serif; fill: var(--line-benrath);">BENRATH LINE: maken / machen</text>

      <!-- Speyer Line (Appel/Apfel) -->
      <path d="M 160,470 C 260,462 380,455 470,460 C 560,465 660,470 740,465 C 790,462 810,468 830,465"
            fill="none" stroke="var(--line-speyer)" stroke-width="2.5" opacity="0.8"/>
      <rect x="833" y="452" width="195" height="26" rx="4" fill="var(--surface)" stroke="var(--line-speyer)" stroke-width="1.5"/>
      <text x="930" y="470" text-anchor="middle" style="font: bold 10px 'Segoe UI', system-ui, sans-serif; fill: var(--line-speyer);">SPEYER LINE: Appel / Apfel</text>

      <!-- Rhenish Fan annotation -->
      <!-- Fan lines diverging from a western point -->
      <circle cx="180" cy="340" r="6" fill="var(--accent)" opacity="0.6"/>
      <line x1="180" y1="340" x2="158" y2="225" stroke="var(--line-uerdingen)" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
      <line x1="180" y1="340" x2="150" y2="260" stroke="var(--line-benrath)" stroke-width="1.5" stroke-dasharray="3,2" opacity="0.5"/>
      <line x1="180" y1="340" x2="160" y2="470" stroke="var(--line-speyer)" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>

      <rect x="50" y="310" width="120" height="60" rx="6" fill="var(--accent-light)" stroke="var(--accent)" stroke-width="1.5"/>
      <text x="110" y="330" text-anchor="middle" style="font: bold 10px 'Segoe UI', system-ui, sans-serif; fill: var(--accent);">RHENISH FAN</text>
      <text x="110" y="343" text-anchor="middle" style="font: 9px 'Segoe UI', system-ui, sans-serif; fill: var(--muted);">Isoglosses fan out</text>
      <text x="110" y="355" text-anchor="middle" style="font: 9px 'Segoe UI', system-ui, sans-serif; fill: var(--muted);">in the Rhineland</text>
      <text x="110" y="367" text-anchor="middle" style="font: 9px 'Segoe UI', system-ui, sans-serif; fill: var(--muted);">from one point</text>

      <!-- City markers -->
      <!-- Hamburg (Low) -->
      <circle cx="430" cy="135" r="5" fill="var(--low)" stroke="var(--fg)" stroke-width="1"/>
      <text x="455" y="128" style="font: bold 10px 'Segoe UI', system-ui, sans-serif; fill: var(--fg);">Hamburg</text>
      <text x="455" y="140" style="font: 9px 'Segoe UI', system-ui, sans-serif; fill: var(--low);">Low German</text>

      <!-- Hannover -->
      <circle cx="520" cy="195" r="4" fill="var(--low)" stroke="var(--fg)" stroke-width="1"/>
      <text x="540" y="193" style="font: 10px 'Segoe UI', system-ui, sans-serif; fill: var(--fg);">Hannover</text>

      <!-- Benrath/Dusseldorf -->
      <circle cx="310" cy="250" r="4" fill="var(--line-benrath)" stroke="var(--fg)" stroke-width="1"/>
      <text x="285" y="275" style="font: 9px 'Segoe UI', system-ui, sans-serif; fill: var(--line-benrath);">Benrath</text>

      <!-- Cologne (Central) -->
      <circle cx="290" cy="310" r="4" fill="var(--central)" stroke="var(--fg)" stroke-width="1"/>
      <text x="245" y="303" style="font: 10px 'Segoe UI', system-ui, sans-serif; fill: var(--fg);">Cologne</text>

      <!-- Berlin -->
      <circle cx="680" cy="195" r="4" fill="var(--low)" stroke="var(--fg)" stroke-width="1"/>
      <text x="696" y="193" style="font: 10px 'Segoe UI', system-ui, sans-serif; fill: var(--fg);">Berlin</text>
      <text x="696" y="204" style="font: 9px 'Segoe UI', system-ui, sans-serif; fill: var(--muted);">(on the line)</text>

      <!-- Frankfurt (Central) -->
      <circle cx="370" cy="390" r="4" fill="var(--central)" stroke="var(--fg)" stroke-width="1"/>
      <text x="388" y="395" style="font: 10px 'Segoe UI', system-ui, sans-serif; fill: var(--fg);">Frankfurt</text>

      <!-- Leipzig/Dresden (Saxon - Central) -->
      <circle cx="640" cy="360" r="4" fill="var(--central)" stroke="var(--fg)" stroke-width="1"/>
      <text x="656" y="358" style="font: 10px 'Segoe UI', system-ui, sans-serif; fill: var(--fg);">Leipzig</text>
      <text x="656" y="370" style="font: 9px 'Segoe UI', system-ui, sans-serif; fill: var(--central);">Saxon</text>

      <!-- Munich (Upper / Bavarian) -->
      <circle cx="560" cy="590" r="5" fill="var(--upper)" stroke="var(--fg)" stroke-width="1"/>
      <text x="580" y="588" style="font: bold 10px 'Segoe UI', system-ui, sans-serif; fill: var(--fg);">Munich</text>
      <text x="580" y="600" style="font: 9px 'Segoe UI', system-ui, sans-serif; fill: var(--upper);">Bavarian</text>

      <!-- Vienna (Upper / Bavarian) -->
      <circle cx="750" cy="540" r="5" fill="var(--upper)" stroke="var(--fg)" stroke-width="1"/>
      <text x="766" y="538" style="font: bold 10px 'Segoe UI', system-ui, sans-serif; fill: var(--fg);">Vienna</text>
      <text x="766" y="550" style="font: 9px 'Segoe UI', system-ui, sans-serif; fill: var(--upper);">Bavarian</text>

      <!-- Zurich (Upper / Alemannic) -->
      <circle cx="350" cy="630" r="5" fill="var(--upper)" stroke="var(--fg)" stroke-width="1"/>
      <text x="310" y="650" style="font: bold 10px 'Segoe UI', system-ui, sans-serif; fill: var(--fg);">Zurich</text>
      <text x="310" y="662" style="font: 9px 'Segoe UI', system-ui, sans-serif; fill: var(--upper);">Alemannic</text>

      <!-- Stuttgart (Swabian) -->
      <circle cx="390" cy="540" r="4" fill="var(--upper)" stroke="var(--fg)" stroke-width="1"/>
      <text x="345" y="538" style="font: 10px 'Segoe UI', system-ui, sans-serif; fill: var(--fg);">Stuttgart</text>
      <text x="345" y="550" style="font: 9px 'Segoe UI', system-ui, sans-serif; fill: var(--upper);">Swabian</text>

      <!-- Strasbourg -->
      <circle cx="260" cy="510" r="4" fill="var(--line-speyer)" stroke="var(--fg)" stroke-width="1"/>
      <text x="215" y="510" style="font: 9px 'Segoe UI', system-ui, sans-serif; fill: var(--fg);">Strasbourg</text>

      <!-- North-South Arrow -->
      <text x="80" y="130" text-anchor="middle" style="font: bold 11px 'Segoe UI', system-ui, sans-serif; fill: var(--muted);">NORTH</text>
      <text x="80" y="145" text-anchor="middle" style="font: 9px 'Segoe UI', system-ui, sans-serif; fill: var(--muted);">(flat lowlands)</text>
      <line x1="80" y1="155" x2="80" y2="600" stroke="var(--muted)" stroke-width="1.5" marker-end="url(#arr)"/>
      <text x="80" y="625" text-anchor="middle" style="font: bold 11px 'Segoe UI', system-ui, sans-serif; fill: var(--muted);">SOUTH</text>
      <text x="80" y="640" text-anchor="middle" style="font: 9px 'Segoe UI', system-ui, sans-serif; fill: var(--muted);">(mountains)</text>

      <!-- Shift gradient arrow on right -->
      <text x="980" y="140" text-anchor="middle" style="font: 9px 'Segoe UI', system-ui, sans-serif; fill: var(--low);">No shift</text>
      <rect x="970" y="150" width="20" height="18" rx="3" fill="var(--low)" opacity="0.3"/>
      <rect x="970" y="310" width="20" height="18" rx="3" fill="var(--central)" opacity="0.3"/>
      <rect x="970" y="500" width="20" height="18" rx="3" fill="var(--upper)" opacity="0.3"/>
      <line x1="980" y1="170" x2="980" y2="500" stroke="var(--muted)" stroke-width="1" marker-end="url(#arr)"/>
      <text x="980" y="530" text-anchor="middle" style="font: 9px 'Segoe UI', system-ui, sans-serif; fill: var(--upper);">Full shift</text>

      <!-- Legend -->
      <rect x="100" y="700" width="860" height="80" rx="8" fill="var(--surface)" stroke="var(--border)" stroke-width="1"/>
      <text x="530" y="720" text-anchor="middle" style="font: bold 12px 'Segoe UI', system-ui, sans-serif; fill: var(--fg);">LEGEND</text>
      <line x1="140" y1="740" x2="200" y2="740" stroke="var(--line-benrath)" stroke-width="3.5"/>
      <text x="210" y="744" style="font: 10px 'Segoe UI', system-ui, sans-serif; fill: var(--fg);">Benrath Line (maken/machen) -- primary High/Low divide</text>
      <line x1="140" y1="760" x2="200" y2="760" stroke="var(--line-speyer)" stroke-width="2.5"/>
      <text x="210" y="764" style="font: 10px 'Segoe UI', system-ui, sans-serif; fill: var(--fg);">Speyer Line (Appel/Apfel) -- Central/Upper divide</text>
      <line x1="600" y1="740" x2="660" y2="740" stroke="var(--line-uerdingen)" stroke-width="2" stroke-dasharray="6,3"/>
      <text x="670" y="744" style="font: 10px 'Segoe UI', system-ui, sans-serif; fill: var(--fg);">Uerdingen Line (ik/ich)</text>
      <circle cx="620" cy="760" r="4" fill="var(--accent)" opacity="0.6"/>
      <text x="670" y="764" style="font: 10px 'Segoe UI', system-ui, sans-serif; fill: var(--fg);">Rhenish Fan convergence</text>

      <!-- English comparison box -->
      <rect x="100" y="795" width="860" height="60" rx="8" fill="var(--en-bg)" stroke="var(--en)" stroke-width="1.5"/>
      <text x="530" y="818" text-anchor="middle" style="font: bold 12px 'Segoe UI', system-ui, sans-serif; fill: var(--en);">ENGLISH COMPARISON</text>
      <text x="530" y="836" text-anchor="middle" style="font: 11px 'Segoe UI', system-ui, sans-serif; fill: var(--fg);">English has no comparable sharp isoglosses. English dialect boundaries are gradient (vowel shifts, rhoticity).</text>
      <text x="530" y="850" text-anchor="middle" style="font: 11px 'Segoe UI', system-ui, sans-serif; fill: var(--fg);">German isoglosses are sharp because they mark discrete consonant changes: shifted or not shifted.</text>

    </svg>
  </div>
  <figcaption>
    <h2>The German Dialect Geography: Isogloss Map</h2>
    <p>The High German Consonant Shift created a layered dialect landscape. The Benrath Line separates Low German (unshifted, like English) from High German (shifted). The Speyer Line further divides Central German (partial shift) from Upper German (full shift). In the Rhineland, these isoglosses fan out into the famous Rhenish Fan, showing the shift was not all-or-nothing but a graded process, with each consonant shifting independently to different geographic extents.</p>
  </figcaption>
</figure>
</body>
</html>
