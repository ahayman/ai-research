<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>High German Consonant Shift Comparison Table</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --accent: #4361ee; --accent-light: #e8edff;
    --unshifted: #3b82f6; --unshifted-bg: #dbeafe;
    --shifted: #ef4444; --shifted-bg: #fee2e2;
    --partial: #f59e0b; --partial-bg: #fef3c7;
    --en: #10b981; --en-bg: #d1fae5;
    --match: #10b981; --match-bg: #d1fae5;
    --muted: #6c757d; --caption-bg: #f8f9fa;
    --row-alt: #f1f5f9;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a; --fg: #e8e8f0; --surface: #1a1a2e; --border: #2d2d44;
      --accent: #6b8aff; --accent-light: #1e2a4a;
      --unshifted: #60a5fa; --unshifted-bg: #1e3a5f;
      --shifted: #f87171; --shifted-bg: #5c1a1a;
      --partial: #fbbf24; --partial-bg: #78350f;
      --en: #34d399; --en-bg: #064e3b;
      --match: #34d399; --match-bg: #064e3b;
      --muted: #9a9ab0; --caption-bg: #1a1a2e;
      --row-alt: #1e1e32;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--fg); display: flex; justify-content: center; padding: 2rem 1rem; line-height: 1.6; }
  figure { max-width: 1100px; width: 100%; }
  .diagram-container { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 1.5rem 1rem; overflow-x: auto; }
  figcaption { text-align: center; margin-top: 1.5rem; padding: 1rem 1.5rem; background: var(--caption-bg); border-radius: 8px; border: 1px solid var(--border); }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  svg { display: block; margin: 0 auto; }
  @media print { body { background: white; } .diagram-container { border: none; } }
</style>
</head>
<body>
<figure>
  <div class="diagram-container">
    <svg viewBox="0 0 1060 920" xmlns="http://www.w3.org/2000/svg" style="min-width:700px;">
      <defs>
        <marker id="shiftArr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
          <polygon points="0 0, 10 3.5, 0 7" fill="var(--shifted)"/>
        </marker>
      </defs>

      <!-- Title -->
      <text x="530" y="30" text-anchor="middle" style="font: bold 16px 'Segoe UI', system-ui, sans-serif; fill: var(--fg);">The High German Consonant Shift: Side-by-Side Comparison</text>
      <text x="530" y="50" text-anchor="middle" style="font: 11px 'Segoe UI', system-ui, sans-serif; fill: var(--muted);">Same Proto-Germanic words across four stages of the shift -- English and Low German match (both unshifted)</text>

      <!-- Column headers -->
      <rect x="60" y="68" width="180" height="48" rx="6" fill="var(--unshifted-bg)" stroke="var(--unshifted)" stroke-width="2"/>
      <text x="150" y="88" text-anchor="middle" style="font: bold 13px 'Segoe UI', system-ui, sans-serif; fill: var(--unshifted);">English</text>
      <text x="150" y="104" text-anchor="middle" style="font: 10px 'Segoe UI', system-ui, sans-serif; fill: var(--unshifted);">NO SHIFT</text>

      <rect x="260" y="68" width="200" height="48" rx="6" fill="var(--unshifted-bg)" stroke="var(--unshifted)" stroke-width="2"/>
      <text x="360" y="88" text-anchor="middle" style="font: bold 13px 'Segoe UI', system-ui, sans-serif; fill: var(--unshifted);">Low German</text>
      <text x="360" y="104" text-anchor="middle" style="font: 10px 'Segoe UI', system-ui, sans-serif; fill: var(--unshifted);">NO SHIFT</text>

      <rect x="480" y="68" width="200" height="48" rx="6" fill="var(--partial-bg)" stroke="var(--partial)" stroke-width="2"/>
      <text x="580" y="88" text-anchor="middle" style="font: bold 13px 'Segoe UI', system-ui, sans-serif; fill: var(--partial);">Central German</text>
      <text x="580" y="104" text-anchor="middle" style="font: 10px 'Segoe UI', system-ui, sans-serif; fill: var(--partial);">PARTIAL SHIFT</text>

      <rect x="700" y="68" width="220" height="48" rx="6" fill="var(--shifted-bg)" stroke="var(--shifted)" stroke-width="2"/>
      <text x="810" y="88" text-anchor="middle" style="font: bold 13px 'Segoe UI', system-ui, sans-serif; fill: var(--shifted);">Upper / Standard German</text>
      <text x="810" y="104" text-anchor="middle" style="font: 10px 'Segoe UI', system-ui, sans-serif; fill: var(--shifted);">FULL SHIFT</text>

      <!-- "Increasing shift" arrow -->
      <line x1="140" y1="62" x2="820" y2="62" stroke="var(--shifted)" stroke-width="1.5" marker-end="url(#shiftArr)" opacity="0.6"/>
      <text x="480" y="58" text-anchor="middle" style="font: 9px 'Segoe UI', system-ui, sans-serif; fill: var(--shifted);">increasing shift &rarr;</text>

      <!-- Match bracket between English and Low German -->
      <rect x="58" y="66" width="404" height="52" rx="8" fill="none" stroke="var(--match)" stroke-width="2" stroke-dasharray="5,3"/>
      <text x="260" y="132" text-anchor="middle" style="font: bold 10px 'Segoe UI', system-ui, sans-serif; fill: var(--match);">THESE TWO MATCH -- both unshifted West Germanic</text>

      <!-- Section: /p/ shift -->
      <rect x="30" y="148" width="20" height="195" rx="4" fill="var(--accent)" opacity="0.15"/>
      <text x="40" y="250" text-anchor="middle" style="font: bold 14px 'Segoe UI', system-ui, sans-serif; fill: var(--accent);" transform="rotate(-90,40,250)">/p/ SHIFT</text>

      <!-- Row label: Proto-Germanic *p -->
      <rect x="60" y="150" width="860" height="28" rx="4" fill="var(--surface)" stroke="var(--border)" stroke-width="0.5"/>
      <text x="530" y="169" text-anchor="middle" style="font: bold 11px 'Segoe UI', system-ui, sans-serif; fill: var(--accent);">Proto-Germanic *p  -->  /pf/ (initial) or /f~ff/ (medial/final)</text>

      <!-- Row: pound/Pund/Pfund -->
      <rect x="60" y="183" width="860" height="34" rx="0" fill="var(--row-alt)" opacity="0.5"/>
      <text x="150" y="205" text-anchor="middle" style="font: bold 13px 'Segoe UI', system-ui, sans-serif; fill: var(--unshifted);"><tspan style="font-size:15px;">p</tspan>ound</text>
      <text x="360" y="205" text-anchor="middle" style="font: bold 13px 'Segoe UI', system-ui, sans-serif; fill: var(--unshifted);"><tspan style="font-size:15px;">P</tspan>und</text>
      <text x="580" y="205" text-anchor="middle" style="font: bold 13px 'Segoe UI', system-ui, sans-serif; fill: var(--shifted);"><tspan style="font-size:15px;">Pf</tspan>und</text>
      <text x="810" y="205" text-anchor="middle" style="font: bold 13px 'Segoe UI', system-ui, sans-serif; fill: var(--shifted);"><tspan style="font-size:15px;">Pf</tspan>und</text>

      <!-- Row: pepper/Peper/Pfeffer -->
      <rect x="60" y="220" width="860" height="34" rx="0" fill="none"/>
      <text x="150" y="242" text-anchor="middle" style="font: bold 13px 'Segoe UI', system-ui, sans-serif; fill: var(--unshifted);"><tspan style="font-size:15px;">p</tspan>e<tspan style="font-size:15px;">pp</tspan>er</text>
      <text x="360" y="242" text-anchor="middle" style="font: bold 13px 'Segoe UI', system-ui, sans-serif; fill: var(--unshifted);"><tspan style="font-size:15px;">P</tspan>e<tspan style="font-size:15px;">p</tspan>er</text>
      <text x="580" y="242" text-anchor="middle" style="font: bold 13px 'Segoe UI', system-ui, sans-serif; fill: var(--shifted);"><tspan style="font-size:15px;">Pf</tspan>e<tspan style="font-size:15px;">ff</tspan>er</text>
      <text x="810" y="242" text-anchor="middle" style="font: bold 13px 'Segoe UI', system-ui, sans-serif; fill: var(--shifted);"><tspan style="font-size:15px;">Pf</tspan>e<tspan style="font-size:15px;">ff</tspan>er</text>

      <!-- Row: ship/Schipp/Schiff -->
      <rect x="60" y="257" width="860" height="34" rx="0" fill="var(--row-alt)" opacity="0.5"/>
      <text x="150" y="279" text-anchor="middle" style="font: bold 13px 'Segoe UI', system-ui, sans-serif; fill: var(--unshifted);">shi<tspan style="font-size:15px;">p</tspan></text>
      <text x="360" y="279" text-anchor="middle" style="font: bold 13px 'Segoe UI', system-ui, sans-serif; fill: var(--unshifted);">Schi<tspan style="font-size:15px;">pp</tspan></text>
      <text x="580" y="279" text-anchor="middle" style="font: bold 13px 'Segoe UI', system-ui, sans-serif; fill: var(--shifted);">Schi<tspan style="font-size:15px;">ff</tspan></text>
      <text x="810" y="279" text-anchor="middle" style="font: bold 13px 'Segoe UI', system-ui, sans-serif; fill: var(--shifted);">Schi<tspan style="font-size:15px;">ff</tspan></text>

      <!-- Row: apple/Appel/Apfel -->
      <rect x="60" y="294" width="860" height="34" rx="0" fill="none"/>
      <text x="150" y="316" text-anchor="middle" style="font: bold 13px 'Segoe UI', system-ui, sans-serif; fill: var(--unshifted);">a<tspan style="font-size:15px;">pp</tspan>le</text>
      <text x="360" y="316" text-anchor="middle" style="font: bold 13px 'Segoe UI', system-ui, sans-serif; fill: var(--unshifted);">A<tspan style="font-size:15px;">pp</tspan>el</text>
      <text x="580" y="316" text-anchor="middle" style="font: bold 13px 'Segoe UI', system-ui, sans-serif; fill: var(--partial);">A<tspan style="font-size:15px;">pp</tspan>el</text>
      <text x="580" y="330" text-anchor="middle" style="font: 9px 'Segoe UI', system-ui, sans-serif; fill: var(--partial);">still unshifted!</text>
      <text x="810" y="316" text-anchor="middle" style="font: bold 13px 'Segoe UI', system-ui, sans-serif; fill: var(--shifted);">A<tspan style="font-size:15px;">pf</tspan>el</text>

      <!-- Section: /t/ shift -->
      <rect x="30" y="350" width="20" height="195" rx="4" fill="var(--accent)" opacity="0.15"/>
      <text x="40" y="450" text-anchor="middle" style="font: bold 14px 'Segoe UI', system-ui, sans-serif; fill: var(--accent);" transform="rotate(-90,40,450)">/t/ SHIFT</text>

      <rect x="60" y="352" width="860" height="28" rx="4" fill="var(--surface)" stroke="var(--border)" stroke-width="0.5"/>
      <text x="530" y="371" text-anchor="middle" style="font: bold 11px 'Segoe UI', system-ui, sans-serif; fill: var(--accent);">Proto-Germanic *t  -->  /ts/ (initial) or /s~ss/ (medial/final)</text>

      <!-- Row: tongue/Tunge/Zunge -->
      <rect x="60" y="385" width="860" height="34" rx="0" fill="var(--row-alt)" opacity="0.5"/>
      <text x="150" y="407" text-anchor="middle" style="font: bold 13px 'Segoe UI', system-ui, sans-serif; fill: var(--unshifted);"><tspan style="font-size:15px;">t</tspan>ongue</text>
      <text x="360" y="407" text-anchor="middle" style="font: bold 13px 'Segoe UI', system-ui, sans-serif; fill: var(--unshifted);"><tspan style="font-size:15px;">T</tspan>unge</text>
      <text x="580" y="407" text-anchor="middle" style="font: bold 13px 'Segoe UI', system-ui, sans-serif; fill: var(--shifted);"><tspan style="font-size:15px;">Z</tspan>unge</text>
      <text x="810" y="407" text-anchor="middle" style="font: bold 13px 'Segoe UI', system-ui, sans-serif; fill: var(--shifted);"><tspan style="font-size:15px;">Z</tspan>unge</text>

      <!-- Row: two/twee/zwei -->
      <rect x="60" y="422" width="860" height="34" rx="0" fill="none"/>
      <text x="150" y="444" text-anchor="middle" style="font: bold 13px 'Segoe UI', system-ui, sans-serif; fill: var(--unshifted);"><tspan style="font-size:15px;">t</tspan>wo</text>
      <text x="360" y="444" text-anchor="middle" style="font: bold 13px 'Segoe UI', system-ui, sans-serif; fill: var(--unshifted);"><tspan style="font-size:15px;">t</tspan>wee</text>
      <text x="580" y="444" text-anchor="middle" style="font: bold 13px 'Segoe UI', system-ui, sans-serif; fill: var(--shifted);"><tspan style="font-size:15px;">z</tspan>wei</text>
      <text x="810" y="444" text-anchor="middle" style="font: bold 13px 'Segoe UI', system-ui, sans-serif; fill: var(--shifted);"><tspan style="font-size:15px;">z</tspan>wei</text>

      <!-- Row: eat/eten/essen -->
      <rect x="60" y="459" width="860" height="34" rx="0" fill="var(--row-alt)" opacity="0.5"/>
      <text x="150" y="481" text-anchor="middle" style="font: bold 13px 'Segoe UI', system-ui, sans-serif; fill: var(--unshifted);">ea<tspan style="font-size:15px;">t</tspan></text>
      <text x="360" y="481" text-anchor="middle" style="font: bold 13px 'Segoe UI', system-ui, sans-serif; fill: var(--unshifted);">e<tspan style="font-size:15px;">t</tspan>en</text>
      <text x="580" y="481" text-anchor="middle" style="font: bold 13px 'Segoe UI', system-ui, sans-serif; fill: var(--shifted);">e<tspan style="font-size:15px;">ss</tspan>en</text>
      <text x="810" y="481" text-anchor="middle" style="font: bold 13px 'Segoe UI', system-ui, sans-serif; fill: var(--shifted);">e<tspan style="font-size:15px;">ss</tspan>en</text>

      <!-- Row: water/Water/Wasser -->
      <rect x="60" y="496" width="860" height="34" rx="0" fill="none"/>
      <text x="150" y="518" text-anchor="middle" style="font: bold 13px 'Segoe UI', system-ui, sans-serif; fill: var(--unshifted);">wa<tspan style="font-size:15px;">t</tspan>er</text>
      <text x="360" y="518" text-anchor="middle" style="font: bold 13px 'Segoe UI', system-ui, sans-serif; fill: var(--unshifted);">Wa<tspan style="font-size:15px;">t</tspan>er</text>
      <text x="580" y="518" text-anchor="middle" style="font: bold 13px 'Segoe UI', system-ui, sans-serif; fill: var(--shifted);">Wa<tspan style="font-size:15px;">ss</tspan>er</text>
      <text x="810" y="518" text-anchor="middle" style="font: bold 13px 'Segoe UI', system-ui, sans-serif; fill: var(--shifted);">Wa<tspan style="font-size:15px;">ss</tspan>er</text>

      <!-- Section: /k/ shift -->
      <rect x="30" y="548" width="20" height="155" rx="4" fill="var(--accent)" opacity="0.15"/>
      <text x="40" y="628" text-anchor="middle" style="font: bold 14px 'Segoe UI', system-ui, sans-serif; fill: var(--accent);" transform="rotate(-90,40,628)">/k/ SHIFT</text>

      <rect x="60" y="550" width="860" height="28" rx="4" fill="var(--surface)" stroke="var(--border)" stroke-width="0.5"/>
      <text x="530" y="569" text-anchor="middle" style="font: bold 11px 'Segoe UI', system-ui, sans-serif; fill: var(--accent);">Proto-Germanic *k  -->  /kx/ (initial, Upper only) or /x~ch/ (medial/final)</text>

      <!-- Row: make/maken/machen -->
      <rect x="60" y="583" width="860" height="34" rx="0" fill="var(--row-alt)" opacity="0.5"/>
      <text x="150" y="605" text-anchor="middle" style="font: bold 13px 'Segoe UI', system-ui, sans-serif; fill: var(--unshifted);">ma<tspan style="font-size:15px;">k</tspan>e</text>
      <text x="360" y="605" text-anchor="middle" style="font: bold 13px 'Segoe UI', system-ui, sans-serif; fill: var(--unshifted);">ma<tspan style="font-size:15px;">k</tspan>en</text>
      <text x="580" y="605" text-anchor="middle" style="font: bold 13px 'Segoe UI', system-ui, sans-serif; fill: var(--shifted);">ma<tspan style="font-size:15px;">ch</tspan>en</text>
      <text x="810" y="605" text-anchor="middle" style="font: bold 13px 'Segoe UI', system-ui, sans-serif; fill: var(--shifted);">ma<tspan style="font-size:15px;">ch</tspan>en</text>

      <!-- Row: week/Week/Woche -->
      <rect x="60" y="620" width="860" height="34" rx="0" fill="none"/>
      <text x="150" y="642" text-anchor="middle" style="font: bold 13px 'Segoe UI', system-ui, sans-serif; fill: var(--unshifted);">wee<tspan style="font-size:15px;">k</tspan></text>
      <text x="360" y="642" text-anchor="middle" style="font: bold 13px 'Segoe UI', system-ui, sans-serif; fill: var(--unshifted);">Wee<tspan style="font-size:15px;">k</tspan></text>
      <text x="580" y="642" text-anchor="middle" style="font: bold 13px 'Segoe UI', system-ui, sans-serif; fill: var(--shifted);">Wo<tspan style="font-size:15px;">ch</tspan>e</text>
      <text x="810" y="642" text-anchor="middle" style="font: bold 13px 'Segoe UI', system-ui, sans-serif; fill: var(--shifted);">Wo<tspan style="font-size:15px;">ch</tspan>e</text>

      <!-- Row: book/Book/Buch -->
      <rect x="60" y="657" width="860" height="34" rx="0" fill="var(--row-alt)" opacity="0.5"/>
      <text x="150" y="679" text-anchor="middle" style="font: bold 13px 'Segoe UI', system-ui, sans-serif; fill: var(--unshifted);">boo<tspan style="font-size:15px;">k</tspan></text>
      <text x="360" y="679" text-anchor="middle" style="font: bold 13px 'Segoe UI', system-ui, sans-serif; fill: var(--unshifted);">Boo<tspan style="font-size:15px;">k</tspan></text>
      <text x="580" y="679" text-anchor="middle" style="font: bold 13px 'Segoe UI', system-ui, sans-serif; fill: var(--shifted);">Bu<tspan style="font-size:15px;">ch</tspan></text>
      <text x="810" y="679" text-anchor="middle" style="font: bold 13px 'Segoe UI', system-ui, sans-serif; fill: var(--shifted);">Bu<tspan style="font-size:15px;">ch</tspan></text>

      <!-- Pattern insight box -->
      <rect x="60" y="710" width="940" height="60" rx="8" fill="var(--accent-light)" stroke="var(--accent)" stroke-width="2"/>
      <text x="530" y="733" text-anchor="middle" style="font: bold 12px 'Segoe UI', system-ui, sans-serif; fill: var(--accent);">THE PATTERN</text>
      <text x="530" y="750" text-anchor="middle" style="font: 11px 'Segoe UI', system-ui, sans-serif; fill: var(--fg);">English and Low German are IDENTICAL in their consonants (both unshifted). Standard German is the "odd one out."</text>
      <text x="530" y="764" text-anchor="middle" style="font: 11px 'Segoe UI', system-ui, sans-serif; fill: var(--fg);">Central German is the transitional zone: shifted for /t/ and /k/ but retains unshifted /p/ in some words (Appel, not Apfel).</text>

      <!-- English comparison -->
      <rect x="60" y="785" width="940" height="55" rx="8" fill="var(--en-bg)" stroke="var(--en)" stroke-width="1.5"/>
      <text x="530" y="808" text-anchor="middle" style="font: bold 12px 'Segoe UI', system-ui, sans-serif; fill: var(--en);">WHY ENGLISH AND GERMAN "SOUND DIFFERENT"</text>
      <text x="530" y="825" text-anchor="middle" style="font: 11px 'Segoe UI', system-ui, sans-serif; fill: var(--fg);">English left the continent BEFORE the shift. Standard German underwent it. The shift is not history --</text>
      <text x="530" y="839" text-anchor="middle" style="font: 11px 'Segoe UI', system-ui, sans-serif; fill: var(--fg);">it is audible every time you compare "water/Wasser", "make/machen", "apple/Apfel", "pound/Pfund".</text>

      <!-- Summary stats -->
      <rect x="60" y="855" width="940" height="40" rx="6" fill="var(--surface)" stroke="var(--border)" stroke-width="1"/>
      <text x="270" y="880" text-anchor="middle" style="font: 10px 'Segoe UI', system-ui, sans-serif; fill: var(--unshifted);">p, t, k  -->  p, t, k  (English &amp; Low German: unchanged)</text>
      <text x="750" y="880" text-anchor="middle" style="font: 10px 'Segoe UI', system-ui, sans-serif; fill: var(--shifted);">p, t, k  -->  pf/f, z/ss, kx/ch  (Upper German: fully shifted)</text>

    </svg>
  </div>
  <figcaption>
    <h2>The High German Consonant Shift: Four-Way Comparison</h2>
    <p>The High German Consonant Shift (Zweite Lautverschiebung, c. 3rd-5th century CE) transformed voiceless stops /p/, /t/, /k/ into affricates and fricatives. English and Low German retain the original unshifted consonants -- they match almost perfectly. Central German shifted partially (note "Appel" still unshifted). Upper/Standard German shifted fully. This single historical event explains why English "sounds different" from Standard German.</p>
  </figcaption>
</figure>
