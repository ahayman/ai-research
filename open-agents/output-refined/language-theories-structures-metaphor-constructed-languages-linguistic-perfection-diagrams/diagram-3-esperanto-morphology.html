<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Esperanto Morphology Decomposition</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #f8f9fa;
    color: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 2rem;
  }
  figure {
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
    max-width: 1000px;
    width: 100%;
  }
  .diagram-title {
    text-align: center;
    font-size: 1.3rem;
    font-weight: 700;
    margin-bottom: 0.5rem;
    color: #1a1a2e;
  }
  .diagram-subtitle {
    text-align: center;
    font-size: 0.9rem;
    color: #6b7280;
    margin-bottom: 2rem;
  }
  .svg-container {
    display: flex;
    justify-content: center;
    overflow-x: auto;
    padding: 1rem 0;
  }
  svg text {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid #e9ecef;
  }
  figcaption strong {
    display: block;
    font-size: 1.05rem;
    color: #1a1a2e;
    margin-bottom: 0.4rem;
  }
  figcaption span {
    font-size: 0.85rem;
    color: #6c757d;
    line-height: 1.6;
    display: block;
  }
  @media (prefers-color-scheme: dark) {
    body { background: #1a1a2e; color: #e9ecef; }
    figure { background: #2d2d44; box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
    .diagram-title { color: #e9ecef; }
    .diagram-subtitle { color: #9ca3af; }
    figcaption { border-top-color: #3d3d5c; }
    figcaption strong { color: #e9ecef; }
    figcaption span { color: #adb5bd; }
    svg text { fill: #e9ecef; }
    svg text.dark-text { fill: #1a1a2e; }
  }
  @media print {
    body { background: #fff; padding: 0; }
    figure { box-shadow: none; border: 1px solid #ccc; break-inside: avoid; }
  }
</style>
</head>
<body>
<figure>
  <div class="diagram-title">Esperanto Morphology: Building Words Like LEGO</div>
  <div class="diagram-subtitle">Every Esperanto word is transparently composed from invariant roots, regular affixes, and grammatical endings</div>
  <div class="svg-container">
    <svg viewBox="0 0 920 740" width="920" height="740" xmlns="http://www.w3.org/2000/svg">

      <!-- Section 1: The Formula -->
      <rect x="30" y="10" width="860" height="55" rx="12" fill="#1e40af" stroke="#1e3a5f" stroke-width="2"/>
      <text x="460" y="32" text-anchor="middle" font-weight="700" font-size="14" fill="#ffffff">THE ESPERANTO WORD FORMULA</text>
      <text x="460" y="52" text-anchor="middle" font-size="12" fill="#93c5fd">[Prefix(es)] + ROOT + [Suffix(es)] + Part-of-Speech Ending</text>

      <!-- Part-of-Speech Endings (always required) -->
      <rect x="30" y="85" width="860" height="80" rx="12" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
      <text x="460" y="106" text-anchor="middle" font-weight="700" font-size="13" class="dark-text" fill="#2563eb">PART-OF-SPEECH ENDINGS (Mandatory -- No Exceptions)</text>

      <rect x="60" y="118" width="160" height="35" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
      <text x="140" y="141" text-anchor="middle" font-weight="700" font-size="14" class="dark-text" fill="#2563eb">-o</text>
      <text x="175" y="141" font-size="10" class="dark-text" fill="#4b5563">= noun</text>

      <rect x="240" y="118" width="160" height="35" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
      <text x="320" y="141" text-anchor="middle" font-weight="700" font-size="14" class="dark-text" fill="#2563eb">-a</text>
      <text x="355" y="141" font-size="10" class="dark-text" fill="#4b5563">= adjective</text>

      <rect x="420" y="118" width="160" height="35" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
      <text x="500" y="141" text-anchor="middle" font-weight="700" font-size="14" class="dark-text" fill="#2563eb">-e</text>
      <text x="535" y="141" font-size="10" class="dark-text" fill="#4b5563">= adverb</text>

      <rect x="600" y="118" width="265" height="35" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
      <text x="735" y="141" text-anchor="middle" font-weight="700" font-size="14" class="dark-text" fill="#2563eb">-i / -as / -is / -os / -us</text>
      <text x="735" y="151" text-anchor="middle" font-size="8.5" class="dark-text" fill="#4b5563">verb tenses</text>

      <!-- Example 1: Simple word building -->
      <text x="460" y="195" text-anchor="middle" font-weight="700" font-size="13" class="dark-text" fill="#1a1a2e">EXAMPLE 1: From One Root, Four Word Classes</text>

      <rect x="370" y="210" width="180" height="40" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
      <text x="460" y="236" text-anchor="middle" font-weight="700" font-size="15" class="dark-text" fill="#d97706">san-</text>
      <text x="460" y="246" text-anchor="middle" font-size="9" class="dark-text" fill="#92400e">ROOT: "health"</text>

      <!-- Arrows from root -->
      <line x1="390" y1="250" x2="145" y2="280" stroke="#d97706" stroke-width="1.5"/>
      <line x1="430" y1="250" x2="345" y2="280" stroke="#d97706" stroke-width="1.5"/>
      <line x1="490" y1="250" x2="575" y2="280" stroke="#d97706" stroke-width="1.5"/>
      <line x1="530" y1="250" x2="775" y2="280" stroke="#d97706" stroke-width="1.5"/>

      <!-- Four derived words -->
      <rect x="60" y="280" width="170" height="52" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
      <text x="145" y="302" text-anchor="middle" font-weight="700" font-size="16" class="dark-text" fill="#16a34a">san-o</text>
      <text x="145" y="322" text-anchor="middle" font-size="11" class="dark-text" fill="#4b5563">"health" (noun)</text>

      <rect x="260" y="280" width="170" height="52" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
      <text x="345" y="302" text-anchor="middle" font-weight="700" font-size="16" class="dark-text" fill="#16a34a">san-a</text>
      <text x="345" y="322" text-anchor="middle" font-size="11" class="dark-text" fill="#4b5563">"healthy" (adj)</text>

      <rect x="490" y="280" width="170" height="52" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
      <text x="575" y="302" text-anchor="middle" font-weight="700" font-size="16" class="dark-text" fill="#16a34a">san-e</text>
      <text x="575" y="322" text-anchor="middle" font-size="11" class="dark-text" fill="#4b5563">"healthily" (adv)</text>

      <rect x="690" y="280" width="170" height="52" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
      <text x="775" y="302" text-anchor="middle" font-weight="700" font-size="16" class="dark-text" fill="#16a34a">san-i</text>
      <text x="775" y="322" text-anchor="middle" font-size="11" class="dark-text" fill="#4b5563">"to be healthy" (verb)</text>

      <!-- Example 2: Affixes in action -->
      <text x="460" y="370" text-anchor="middle" font-weight="700" font-size="13" class="dark-text" fill="#1a1a2e">EXAMPLE 2: Affixes Multiply Vocabulary Exponentially</text>

      <!-- Prefix + Root + Suffix chain -->
      <rect x="30" y="390" width="860" height="130" rx="12" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="6,4"/>

      <!-- mal- (prefix) -->
      <rect x="60" y="405" width="120" height="50" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
      <text x="120" y="426" text-anchor="middle" font-weight="700" font-size="14" class="dark-text" fill="#dc2626">mal-</text>
      <text x="120" y="445" text-anchor="middle" font-size="10" class="dark-text" fill="#4b5563">PREFIX: opposite</text>

      <text x="200" y="432" text-anchor="middle" font-size="20" class="dark-text" fill="#6b7280">+</text>

      <!-- san- (root) -->
      <rect x="220" y="405" width="120" height="50" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
      <text x="280" y="426" text-anchor="middle" font-weight="700" font-size="14" class="dark-text" fill="#d97706">san-</text>
      <text x="280" y="445" text-anchor="middle" font-size="10" class="dark-text" fill="#4b5563">ROOT: health</text>

      <text x="360" y="432" text-anchor="middle" font-size="20" class="dark-text" fill="#6b7280">+</text>

      <!-- -ul- (suffix) -->
      <rect x="380" y="405" width="120" height="50" rx="8" fill="#f3e8ff" stroke="#7c3aed" stroke-width="2"/>
      <text x="440" y="426" text-anchor="middle" font-weight="700" font-size="14" class="dark-text" fill="#7c3aed">-ul-</text>
      <text x="440" y="445" text-anchor="middle" font-size="10" class="dark-text" fill="#4b5563">SUFFIX: person</text>

      <text x="520" y="432" text-anchor="middle" font-size="20" class="dark-text" fill="#6b7280">+</text>

      <!-- -ej- (suffix) -->
      <rect x="540" y="405" width="120" height="50" rx="8" fill="#f3e8ff" stroke="#7c3aed" stroke-width="2"/>
      <text x="600" y="426" text-anchor="middle" font-weight="700" font-size="14" class="dark-text" fill="#7c3aed">-ej-</text>
      <text x="600" y="445" text-anchor="middle" font-size="10" class="dark-text" fill="#4b5563">SUFFIX: place</text>

      <text x="680" y="432" text-anchor="middle" font-size="20" class="dark-text" fill="#6b7280">+</text>

      <!-- -o (ending) -->
      <rect x="700" y="405" width="100" height="50" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
      <text x="750" y="426" text-anchor="middle" font-weight="700" font-size="14" class="dark-text" fill="#2563eb">-o</text>
      <text x="750" y="445" text-anchor="middle" font-size="10" class="dark-text" fill="#4b5563">ENDING: noun</text>

      <!-- Result -->
      <text x="460" y="490" text-anchor="middle" font-size="12" class="dark-text" fill="#6b7280">Result:</text>
      <text x="460" y="510" text-anchor="middle" font-weight="700" font-size="15" class="dark-text" fill="#16a34a">malsanulejo = "hospital"</text>
      <text x="460" y="525" text-anchor="middle" font-size="10.5" class="dark-text" fill="#4b5563">(opposite-health-person-place-noun = "place for unhealthy people")</text>

      <!-- Example 3: Common Affixes Table -->
      <text x="460" y="555" text-anchor="middle" font-weight="700" font-size="13" class="dark-text" fill="#1a1a2e">KEY AFFIXES: A Small Set That Generates Thousands of Words</text>

      <!-- Prefixes column -->
      <rect x="30" y="570" width="280" height="155" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
      <text x="170" y="590" text-anchor="middle" font-weight="700" font-size="12" fill="#dc2626">PREFIXES</text>
      <text x="55" y="612" font-size="10.5" class="dark-text" fill="#4b5563"><tspan font-weight="700" fill="#dc2626">mal-</tspan>  opposite: bona (good) -> malbona (bad)</text>
      <text x="55" y="630" font-size="10.5" class="dark-text" fill="#4b5563"><tspan font-weight="700" fill="#dc2626">re-</tspan>   again: fari (do) -> refari (redo)</text>
      <text x="55" y="648" font-size="10.5" class="dark-text" fill="#4b5563"><tspan font-weight="700" fill="#dc2626">ek-</tspan>   begin: kanti (sing) -> ekkanti (start singing)</text>
      <text x="55" y="666" font-size="10.5" class="dark-text" fill="#4b5563"><tspan font-weight="700" fill="#dc2626">ge-</tspan>   both sexes: patroj -> gepatroj (parents)</text>
      <text x="55" y="684" font-size="10.5" class="dark-text" fill="#4b5563"><tspan font-weight="700" fill="#dc2626">dis-</tspan>  scatter: semi (sow) -> dissemi (disseminate)</text>
      <text x="55" y="708" font-size="10" font-style="italic" class="dark-text" fill="#4b5563">~10 prefixes total</text>

      <!-- Suffixes column -->
      <rect x="330" y="570" width="280" height="155" rx="10" fill="#f3e8ff" stroke="#7c3aed" stroke-width="1.5"/>
      <text x="470" y="590" text-anchor="middle" font-weight="700" font-size="12" fill="#7c3aed">SUFFIXES</text>
      <text x="355" y="612" font-size="10.5" class="dark-text" fill="#4b5563"><tspan font-weight="700" fill="#7c3aed">-ul-</tspan>  person: lerni -> lernulo (student)</text>
      <text x="355" y="630" font-size="10.5" class="dark-text" fill="#4b5563"><tspan font-weight="700" fill="#7c3aed">-ej-</tspan>  place: lerni -> lernejo (school)</text>
      <text x="355" y="648" font-size="10.5" class="dark-text" fill="#4b5563"><tspan font-weight="700" fill="#7c3aed">-il-</tspan>  tool: kombi -> kombilo (comb)</text>
      <text x="355" y="666" font-size="10.5" class="dark-text" fill="#4b5563"><tspan font-weight="700" fill="#7c3aed">-et-</tspan>  diminutive: domo -> dometo (cottage)</text>
      <text x="355" y="684" font-size="10.5" class="dark-text" fill="#4b5563"><tspan font-weight="700" fill="#7c3aed">-eg-</tspan>  augmentative: pluvo -> pluvego (storm)</text>
      <text x="355" y="708" font-size="10" font-style="italic" class="dark-text" fill="#4b5563">~40 suffixes total</text>

      <!-- The insight -->
      <rect x="630" y="570" width="260" height="155" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
      <text x="760" y="590" text-anchor="middle" font-weight="700" font-size="12" fill="#16a34a">THE INSIGHT</text>
      <text x="650" y="615" font-size="11" class="dark-text" fill="#4b5563">~900 roots</text>
      <text x="650" y="635" font-size="11" class="dark-text" fill="#4b5563">+ ~50 affixes</text>
      <text x="650" y="655" font-size="11" class="dark-text" fill="#4b5563">+ 4 endings</text>
      <line x1="650" y1="665" x2="870" y2="665" stroke="#16a34a" stroke-width="1"/>
      <text x="650" y="685" font-size="12" font-weight="700" class="dark-text" fill="#16a34a">= tens of thousands</text>
      <text x="650" y="703" font-size="12" font-weight="700" class="dark-text" fill="#16a34a">  of words</text>
      <text x="650" y="720" font-size="10" font-style="italic" class="dark-text" fill="#4b5563">No irregular forms. Ever.</text>

    </svg>
  </div>
  <figcaption>
    <strong>Figure 3: Esperanto Morphology -- Building Words Like LEGO</strong>
    <span>Esperanto's agglutinative morphology builds words from invariant components: every word takes a mandatory part-of-speech ending (-o noun, -a adjective, -e adverb, -i/-as/-is/-os/-us verb), and any root can combine with any affix. The root "san-" (health) instantly generates sano, sana, sane, sani. Adding the prefix mal- (opposite) and suffixes -ul- (person) and -ej- (place) produces "malsanulejo" (hospital) -- transparently composed, instantly parseable. With approximately 900 roots and 50 affixes, speakers can generate tens of thousands of words with zero irregularity. This is the core of Zamenhof's design genius: maximum expressiveness from minimal memorization.</span>
  </figcaption>
</figure>
</body>
