<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Why Natural Language Features Are Necessary</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #f8f9fa;
    color: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 2rem;
  }
  figure {
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
    max-width: 1050px;
    width: 100%;
  }
  .diagram-title {
    text-align: center;
    font-size: 1.3rem;
    font-weight: 700;
    margin-bottom: 0.5rem;
    color: #1a1a2e;
  }
  .diagram-subtitle {
    text-align: center;
    font-size: 0.9rem;
    color: #6b7280;
    margin-bottom: 2rem;
  }
  .svg-container {
    display: flex;
    justify-content: center;
    overflow-x: auto;
    padding: 1rem 0;
  }
  svg text {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid #e9ecef;
  }
  figcaption strong {
    display: block;
    font-size: 1.05rem;
    color: #1a1a2e;
    margin-bottom: 0.4rem;
  }
  figcaption span {
    font-size: 0.85rem;
    color: #6c757d;
    line-height: 1.6;
    display: block;
  }
  @media (prefers-color-scheme: dark) {
    body { background: #1a1a2e; color: #e9ecef; }
    figure { background: #2d2d44; box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
    .diagram-title { color: #e9ecef; }
    .diagram-subtitle { color: #9ca3af; }
    figcaption { border-top-color: #3d3d5c; }
    figcaption strong { color: #e9ecef; }
    figcaption span { color: #adb5bd; }
    svg text { fill: #e9ecef; }
    svg text.dark-text { fill: #1a1a2e; }
  }
  @media print {
    body { background: #fff; padding: 0; }
    figure { box-shadow: none; border: 1px solid #ccc; break-inside: avoid; }
  }
</style>
</head>
<body>
<figure>
  <div class="diagram-title">Why Natural Language "Flaws" Are Necessary</div>
  <div class="diagram-subtitle">Four features conlang designers try to eliminate -- and the essential functions they serve</div>
  <div class="svg-container">
    <svg viewBox="0 0 940 780" width="940" height="780" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="arrowFunc" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#16a34a"/>
        </marker>
      </defs>

      <!-- Central node -->
      <circle cx="470" cy="390" r="68" fill="#1e40af" stroke="#1e3a5f" stroke-width="3"/>
      <text x="470" y="380" text-anchor="middle" font-weight="700" font-size="12" fill="#ffffff">NATURAL</text>
      <text x="470" y="398" text-anchor="middle" font-weight="700" font-size="12" fill="#ffffff">LANGUAGE</text>
      <text x="470" y="416" text-anchor="middle" font-size="10" fill="#93c5fd">"Imperfections"</text>

      <!-- ===== BRANCH 1: AMBIGUITY (top-left) ===== -->
      <!-- Connector -->
      <line x1="412" y1="338" x2="230" y2="120" stroke="#dc2626" stroke-width="2.5"/>

      <!-- Flaw node -->
      <rect x="100" y="30" width="260" height="55" rx="14" fill="#fee2e2" stroke="#dc2626" stroke-width="2.5"/>
      <text x="230" y="52" text-anchor="middle" font-weight="700" font-size="14" fill="#dc2626">AMBIGUITY</text>
      <text x="230" y="72" text-anchor="middle" font-size="10.5" class="dark-text" fill="#4b5563">"bank", "light", "run" have multiple meanings</text>

      <!-- Arrow to function -->
      <line x1="230" y1="85" x2="230" y2="110" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowFunc)"/>

      <!-- Function node -->
      <rect x="60" y="110" width="340" height="145" rx="12" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
      <text x="230" y="132" text-anchor="middle" font-weight="700" font-size="12" fill="#16a34a">ENABLES: Communicative Efficiency</text>
      <line x1="80" y1="142" x2="380" y2="142" stroke="#16a34a" stroke-width="0.5" opacity="0.3"/>

      <text x="85" y="162" font-size="10.5" class="dark-text" fill="#4b5563">Fewer words needed: context resolves meaning</text>
      <text x="85" y="180" font-size="10.5" class="dark-text" fill="#4b5563">Zipf's Law: frequent words are short + ambiguous</text>
      <text x="85" y="198" font-size="10.5" class="dark-text" fill="#4b5563">Enables humor, irony, diplomacy, tact</text>
      <text x="85" y="216" font-size="10.5" class="dark-text" fill="#4b5563">Allows speaker to be vague when precision is costly</text>

      <rect x="90" y="228" width="290" height="20" rx="4" fill="#f0fdf4" stroke="#16a34a" stroke-width="1"/>
      <text x="235" y="243" text-anchor="middle" font-size="9.5" font-style="italic" fill="#16a34a">Without it: Wilkins required 2000+ unique symbols</text>

      <!-- ===== BRANCH 2: IRREGULARITY (top-right) ===== -->
      <!-- Connector -->
      <line x1="528" y1="338" x2="710" y2="120" stroke="#7c3aed" stroke-width="2.5"/>

      <!-- Flaw node -->
      <rect x="580" y="30" width="260" height="55" rx="14" fill="#f3e8ff" stroke="#7c3aed" stroke-width="2.5"/>
      <text x="710" y="52" text-anchor="middle" font-weight="700" font-size="14" fill="#7c3aed">IRREGULARITY</text>
      <text x="710" y="72" text-anchor="middle" font-size="10.5" class="dark-text" fill="#4b5563">go/went, be/am/is/was/were/been</text>

      <!-- Arrow to function -->
      <line x1="710" y1="85" x2="710" y2="110" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowFunc)"/>

      <!-- Function node -->
      <rect x="540" y="110" width="340" height="145" rx="12" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
      <text x="710" y="132" text-anchor="middle" font-weight="700" font-size="12" fill="#16a34a">ENABLES: Rapid Pattern Recognition</text>
      <line x1="560" y1="142" x2="860" y2="142" stroke="#16a34a" stroke-width="0.5" opacity="0.3"/>

      <text x="565" y="162" font-size="10.5" class="dark-text" fill="#4b5563">High-frequency words stay irregular = faster retrieval</text>
      <text x="565" y="180" font-size="10.5" class="dark-text" fill="#4b5563">Distinct forms prevent confusion (is vs. bes)</text>
      <text x="565" y="198" font-size="10.5" class="dark-text" fill="#4b5563">Tolkien: irregularity gives languages "flavor"</text>
      <text x="565" y="216" font-size="10.5" class="dark-text" fill="#4b5563">Signals to listener that speaker is fluent/native</text>

      <rect x="570" y="228" width="290" height="20" rx="4" fill="#f0fdf4" stroke="#16a34a" stroke-width="1"/>
      <text x="715" y="243" text-anchor="middle" font-size="9.5" font-style="italic" fill="#16a34a">Without it: Volapuk felt artificial, speakers left</text>

      <!-- ===== BRANCH 3: REDUNDANCY (bottom-left) ===== -->
      <!-- Connector -->
      <line x1="412" y1="442" x2="230" y2="520" stroke="#2563eb" stroke-width="2.5"/>

      <!-- Flaw node -->
      <rect x="100" y="480" width="260" height="55" rx="14" fill="#dbeafe" stroke="#2563eb" stroke-width="2.5"/>
      <text x="230" y="502" text-anchor="middle" font-weight="700" font-size="14" fill="#2563eb">REDUNDANCY</text>
      <text x="230" y="522" text-anchor="middle" font-size="10.5" class="dark-text" fill="#4b5563">"The cats are sleeping" (plural marked 3x)</text>

      <!-- Arrow to function -->
      <line x1="230" y1="535" x2="230" y2="560" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowFunc)"/>

      <!-- Function node -->
      <rect x="60" y="560" width="340" height="145" rx="12" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
      <text x="230" y="582" text-anchor="middle" font-weight="700" font-size="12" fill="#16a34a">ENABLES: Error Correction</text>
      <line x1="80" y1="592" x2="380" y2="592" stroke="#16a34a" stroke-width="0.5" opacity="0.3"/>

      <text x="85" y="612" font-size="10.5" class="dark-text" fill="#4b5563">Noisy environments: redundancy recovers signal</text>
      <text x="85" y="630" font-size="10.5" class="dark-text" fill="#4b5563">Like error-correcting codes in telecommunications</text>
      <text x="85" y="648" font-size="10.5" class="dark-text" fill="#4b5563">Agreement helps parse long/complex sentences</text>
      <text x="85" y="666" font-size="10.5" class="dark-text" fill="#4b5563">Listeners miss ~25% of speech signal normally</text>

      <rect x="90" y="678" width="290" height="20" rx="4" fill="#f0fdf4" stroke="#16a34a" stroke-width="1"/>
      <text x="235" y="693" text-anchor="middle" font-size="9.5" font-style="italic" fill="#16a34a">Without it: Wilkins -- one wrong mark = wrong concept</text>

      <!-- ===== BRANCH 4: POLYSEMY (bottom-right) ===== -->
      <!-- Connector -->
      <line x1="528" y1="442" x2="710" y2="520" stroke="#d97706" stroke-width="2.5"/>

      <!-- Flaw node -->
      <rect x="580" y="480" width="260" height="55" rx="14" fill="#fef3c7" stroke="#d97706" stroke-width="2.5"/>
      <text x="710" y="502" text-anchor="middle" font-weight="700" font-size="14" fill="#d97706">POLYSEMY</text>
      <text x="710" y="522" text-anchor="middle" font-size="10.5" class="dark-text" fill="#4b5563">"head" of body, table, company, river, nail</text>

      <!-- Arrow to function -->
      <line x1="710" y1="535" x2="710" y2="560" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowFunc)"/>

      <!-- Function node -->
      <rect x="540" y="560" width="340" height="145" rx="12" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
      <text x="710" y="582" text-anchor="middle" font-weight="700" font-size="12" fill="#16a34a">ENABLES: Metaphorical Extension</text>
      <line x1="560" y1="592" x2="860" y2="592" stroke="#16a34a" stroke-width="0.5" opacity="0.3"/>

      <text x="565" y="612" font-size="10.5" class="dark-text" fill="#4b5563">New concepts named via existing words: "web" page</text>
      <text x="565" y="630" font-size="10.5" class="dark-text" fill="#4b5563">Conceptual metaphor: UNDERSTANDING IS GRASPING</text>
      <text x="565" y="648" font-size="10.5" class="dark-text" fill="#4b5563">Vocabulary grows organically without coinages</text>
      <text x="565" y="666" font-size="10.5" class="dark-text" fill="#4b5563">Poetry, analogy, creative thought depend on it</text>

      <rect x="570" y="678" width="290" height="20" rx="4" fill="#f0fdf4" stroke="#16a34a" stroke-width="1"/>
      <text x="715" y="693" text-anchor="middle" font-size="9.5" font-style="italic" fill="#16a34a">Without it: Lojban struggles with creative expression</text>

      <!-- Bottom summary -->
      <rect x="170" y="730" width="600" height="40" rx="10" fill="#1e40af" stroke="#1e3a5f" stroke-width="2"/>
      <text x="470" y="748" text-anchor="middle" font-weight="700" font-size="12" fill="#ffffff">CONCLUSION: Every "flaw" is a feature optimized by millennia of human use</text>
      <text x="470" y="763" text-anchor="middle" font-size="10" fill="#93c5fd">Removing them makes language logical but inhuman</text>

    </svg>
  </div>
  <figcaption>
    <strong>Figure 7: Why Natural Language "Flaws" Are Necessary</strong>
    <span>Four features that constructed language designers have repeatedly tried to eliminate -- ambiguity, irregularity, redundancy, and polysemy -- mapped to the essential communicative functions they serve. Ambiguity enables efficiency (Zipf's Law: frequent words carry more meanings). Irregularity aids rapid processing (high-frequency words stay irregular precisely because they are accessed so often). Redundancy provides error correction (listeners miss roughly 25% of the speech signal in normal conditions). Polysemy enables metaphorical extension (nearly all abstract vocabulary originates from concrete metaphors). Each function has been confirmed when conlang designers removed the "flaw" and discovered the language became unusable, rigid, or emotionally flat. Natural languages are not poorly designed -- they are precisely optimized for imperfect humans communicating in noisy, uncertain environments.</span>
  </figcaption>
</figure>
</body>
</html>
