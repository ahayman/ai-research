<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Constructed Language Feature Comparison Matrix</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #f8f9fa;
    color: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 2rem;
  }
  figure {
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
    max-width: 1100px;
    width: 100%;
  }
  .diagram-title {
    text-align: center;
    font-size: 1.3rem;
    font-weight: 700;
    margin-bottom: 0.5rem;
    color: #1a1a2e;
  }
  .diagram-subtitle {
    text-align: center;
    font-size: 0.9rem;
    color: #6b7280;
    margin-bottom: 2rem;
  }
  .table-container {
    overflow-x: auto;
    padding: 0.5rem 0;
  }
  table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
    font-size: 0.82rem;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid #e5e7eb;
  }
  thead th {
    padding: 0.9rem 0.7rem;
    font-weight: 700;
    text-align: center;
    font-size: 0.78rem;
    letter-spacing: 0.02em;
    border-bottom: 2px solid #e5e7eb;
    vertical-align: bottom;
    line-height: 1.3;
  }
  thead th:first-child {
    text-align: left;
    min-width: 140px;
  }
  thead th .type-label {
    display: block;
    font-size: 0.72rem;
    font-weight: 400;
    color: #6b7280;
    margin-top: 0.2rem;
  }
  thead th .example {
    display: block;
    font-size: 0.68rem;
    font-weight: 400;
    font-style: italic;
    color: #9ca3af;
    margin-top: 0.15rem;
  }
  tbody td {
    padding: 0.7rem;
    text-align: center;
    border-bottom: 1px solid #f3f4f6;
    vertical-align: middle;
    line-height: 1.4;
  }
  tbody td:first-child {
    text-align: left;
    font-weight: 600;
    color: #1a1a2e;
    padding-left: 1rem;
  }
  tbody tr:last-child td {
    border-bottom: none;
  }
  tbody tr:hover {
    background: #f9fafb;
  }
  /* Column header colors */
  .col-natural { background: #f0f9ff; color: #0369a1; }
  .col-philosophical { background: #f3e8ff; color: #7c3aed; }
  .col-auxiliary { background: #ecfdf5; color: #059669; }
  .col-logical { background: #fef3c7; color: #b45309; }
  .col-artistic { background: #fef2f2; color: #dc2626; }
  .col-feature { background: #f9fafb; color: #374151; }

  /* Cell styling by rating */
  .high { color: #16a34a; font-weight: 600; }
  .medium { color: #d97706; font-weight: 500; }
  .low { color: #dc2626; font-weight: 500; }
  .varies { color: #7c3aed; font-style: italic; }
  .cell-detail {
    display: block;
    font-size: 0.7rem;
    color: #6b7280;
    font-weight: 400;
    margin-top: 0.15rem;
    font-style: normal;
  }

  /* Feature category rows */
  .category-row td {
    background: #f3f4f6;
    font-weight: 700;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: #4b5563;
    text-align: left;
    padding: 0.5rem 1rem;
  }

  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid #e9ecef;
  }
  figcaption strong {
    display: block;
    font-size: 1.05rem;
    color: #1a1a2e;
    margin-bottom: 0.4rem;
  }
  figcaption span {
    font-size: 0.85rem;
    color: #6c757d;
    line-height: 1.6;
    display: block;
  }
  .legend {
    display: flex;
    justify-content: center;
    gap: 1.5rem;
    margin-top: 1rem;
    flex-wrap: wrap;
    font-size: 0.78rem;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.3rem;
  }
  @media (prefers-color-scheme: dark) {
    body { background: #1a1a2e; color: #e9ecef; }
    figure { background: #2d2d44; box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
    .diagram-title { color: #e9ecef; }
    .diagram-subtitle { color: #9ca3af; }
    table { border-color: #3d3d5c; }
    thead th { border-bottom-color: #3d3d5c; }
    tbody td { border-bottom-color: #363652; }
    tbody td:first-child { color: #e9ecef; }
    tbody tr:hover { background: #363652; }
    .col-natural { background: #1a2e3d; color: #38bdf8; }
    .col-philosophical { background: #2a1f3d; color: #a78bfa; }
    .col-auxiliary { background: #1a2e24; color: #34d399; }
    .col-logical { background: #2e2a1a; color: #fbbf24; }
    .col-artistic { background: #2e1a1a; color: #f87171; }
    .col-feature { background: #2d2d44; color: #9ca3af; }
    .category-row td { background: #363652; color: #9ca3af; }
    thead th .type-label { color: #9ca3af; }
    thead th .example { color: #6b7280; }
    .cell-detail { color: #9ca3af; }
    .high { color: #4ade80; }
    .medium { color: #fbbf24; }
    .low { color: #f87171; }
    .varies { color: #a78bfa; }
    figcaption { border-top-color: #3d3d5c; }
    figcaption strong { color: #e9ecef; }
    figcaption span { color: #adb5bd; }
  }
  @media print {
    body { background: #fff; padding: 0; }
    figure { box-shadow: none; border: 1px solid #ccc; break-inside: avoid; }
  }
</style>
</head>
<body>
<figure>
  <div class="diagram-title">Language Type Feature Comparison Matrix</div>
  <div class="diagram-subtitle">How five categories of language differ across key design dimensions</div>
  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th class="col-feature">Feature</th>
          <th class="col-natural">Natural<br>Language<span class="type-label">Evolved</span><span class="example">English, Mandarin</span></th>
          <th class="col-philosophical">Philosophical<br>Language<span class="type-label">Taxonomic</span><span class="example">Wilkins, Dalgarno</span></th>
          <th class="col-auxiliary">Auxiliary<br>Language<span class="type-label">International</span><span class="example">Esperanto, Ido</span></th>
          <th class="col-logical">Logical<br>Language<span class="type-label">Formal</span><span class="example">Lojban, Loglan</span></th>
          <th class="col-artistic">Artistic<br>Language<span class="type-label">Creative</span><span class="example">Quenya, Na'vi</span></th>
        </tr>
      </thead>
      <tbody>
        <tr class="category-row"><td colspan="6">Structural Properties</td></tr>
        <tr>
          <td>Ambiguity</td>
          <td class="high">High<span class="cell-detail">Pervasive and functional</span></td>
          <td class="low">Very Low<span class="cell-detail">Eliminated by design</span></td>
          <td class="medium">Low-Medium<span class="cell-detail">Reduced but present</span></td>
          <td class="low">None<span class="cell-detail">Formally impossible</span></td>
          <td class="varies">Varies<span class="cell-detail">Designer's choice</span></td>
        </tr>
        <tr>
          <td>Irregularity</td>
          <td class="high">High<span class="cell-detail">go/went, be/am/is/was</span></td>
          <td class="low">None<span class="cell-detail">Fully systematic</span></td>
          <td class="low">None<span class="cell-detail">Zero exceptions</span></td>
          <td class="low">None<span class="cell-detail">Machine-parseable</span></td>
          <td class="varies">By choice<span class="cell-detail">Often added for realism</span></td>
        </tr>
        <tr>
          <td>Redundancy</td>
          <td class="high">High<span class="cell-detail">Agreement, context, prosody</span></td>
          <td class="low">Minimal<span class="cell-detail">Each symbol unique</span></td>
          <td class="medium">Moderate<span class="cell-detail">Some agreement kept</span></td>
          <td class="low">Minimal<span class="cell-detail">No unnecessary marking</span></td>
          <td class="varies">Varies<span class="cell-detail">Naturalistic or minimal</span></td>
        </tr>
        <tr>
          <td>Polysemy</td>
          <td class="high">Extreme<span class="cell-detail">"run" has 645 senses</span></td>
          <td class="low">None<span class="cell-detail">One symbol = one concept</span></td>
          <td class="medium">Moderate<span class="cell-detail">Roots have core meaning</span></td>
          <td class="low">None<span class="cell-detail">Monosemous by design</span></td>
          <td class="varies">Varies<span class="cell-detail">Depends on aesthetic</span></td>
        </tr>
        <tr class="category-row"><td colspan="6">Usability</td></tr>
        <tr>
          <td>Learnability</td>
          <td class="medium">Slow<span class="cell-detail">Years to fluency</span></td>
          <td class="low">Very Hard<span class="cell-detail">Memorize full taxonomy</span></td>
          <td class="high">Fast<span class="cell-detail">~150 hrs to proficiency</span></td>
          <td class="low">Hard<span class="cell-detail">Requires logic training</span></td>
          <td class="medium">Variable<span class="cell-detail">Depends on complexity</span></td>
        </tr>
        <tr>
          <td>Expressiveness</td>
          <td class="high">Unlimited<span class="cell-detail">Metaphor, irony, poetry</span></td>
          <td class="low">Limited<span class="cell-detail">Only what taxonomy covers</span></td>
          <td class="high">High<span class="cell-detail">Evolving vocabulary</span></td>
          <td class="medium">Medium<span class="cell-detail">Precise but clinical</span></td>
          <td class="varies">By design<span class="cell-detail">Some deliberately limited</span></td>
        </tr>
        <tr>
          <td>Emotional range</td>
          <td class="high">Full<span class="cell-detail">Evolved for social bonds</span></td>
          <td class="low">None<span class="cell-detail">Not in scope</span></td>
          <td class="high">Growing<span class="cell-detail">Poetry, songs, literature</span></td>
          <td class="low">Minimal<span class="cell-detail">Attitudinal indicators exist</span></td>
          <td class="varies">Variable<span class="cell-detail">Tolkien: deeply poetic</span></td>
        </tr>
        <tr class="category-row"><td colspan="6">Social and Practical Factors</td></tr>
        <tr>
          <td>Speaker community</td>
          <td class="high">Millions-Billions<span class="cell-detail">Organic growth</span></td>
          <td class="low">Zero<span class="cell-detail">Never adopted</span></td>
          <td class="medium">Thousands-Millions<span class="cell-detail">Esperanto: ~2M</span></td>
          <td class="low">Hundreds<span class="cell-detail">Niche enthusiasts</span></td>
          <td class="medium">Thousands<span class="cell-detail">Fandom-driven</span></td>
        </tr>
        <tr>
          <td>Cultural evolution</td>
          <td class="high">Constant<span class="cell-detail">Unstoppable drift</span></td>
          <td class="low">Frozen<span class="cell-detail">Fixed at creation</span></td>
          <td class="medium">Gradual<span class="cell-detail">Community-driven change</span></td>
          <td class="low">Resisted<span class="cell-detail">Change breaks logic</span></td>
          <td class="varies">Mixed<span class="cell-detail">Creator vs. community</span></td>
        </tr>
        <tr>
          <td>Error tolerance</td>
          <td class="high">High<span class="cell-detail">Redundancy enables repair</span></td>
          <td class="low">Very Low<span class="cell-detail">One symbol wrong = wrong concept</span></td>
          <td class="high">High<span class="cell-detail">Regular patterns aid recovery</span></td>
          <td class="low">Very Low<span class="cell-detail">Precision required</span></td>
          <td class="varies">Variable<span class="cell-detail">Depends on design</span></td>
        </tr>
        <tr>
          <td>Primary goal</td>
          <td class="varies">Communication<span class="cell-detail">Social bonding, identity</span></td>
          <td class="varies">Classification<span class="cell-detail">Map all knowledge</span></td>
          <td class="varies">Peace<span class="cell-detail">International understanding</span></td>
          <td class="varies">Precision<span class="cell-detail">Unambiguous thought</span></td>
          <td class="varies">Beauty<span class="cell-detail">Aesthetic or world-building</span></td>
        </tr>
      </tbody>
    </table>
  </div>
  <div class="legend">
    <div class="legend-item"><span class="high" style="font-weight:700;">High</span> = strong presence</div>
    <div class="legend-item"><span class="medium" style="font-weight:700;">Medium</span> = moderate</div>
    <div class="legend-item"><span class="low" style="font-weight:700;">Low/None</span> = absent or minimal</div>
    <div class="legend-item"><span class="varies" style="font-weight:700;">Varies</span> = depends on specific language</div>
  </div>
  <figcaption>
    <strong>Figure 4: Language Type Feature Comparison Matrix</strong>
    <span>Five categories of language compared across twelve dimensions. Natural languages score highest on the features that conlang designers most want to eliminate (ambiguity, irregularity, redundancy, polysemy) -- but also highest on usability and social adoption. The paradox of constructed language design is visible in the inverse correlation between formal precision and practical expressiveness: Lojban eliminates ambiguity but struggles with emotional range; Wilkins eliminates polysemy but cannot be learned; Esperanto succeeds precisely because it retained enough natural-language features to feel human. Artistic languages like Tolkien's, which deliberately embrace irregularity, achieve cultural resonance that "perfect" designs never do.</span>
  </figcaption>
</figure>
</body>
</html>
