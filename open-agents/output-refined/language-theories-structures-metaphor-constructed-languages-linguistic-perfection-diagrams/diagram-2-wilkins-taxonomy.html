<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wilkins' Taxonomic Real Character</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #f8f9fa;
    color: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 2rem;
  }
  figure {
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
    max-width: 1050px;
    width: 100%;
  }
  .diagram-title {
    text-align: center;
    font-size: 1.3rem;
    font-weight: 700;
    margin-bottom: 2rem;
    color: #1a1a2e;
  }
  .svg-container {
    display: flex;
    justify-content: center;
    overflow-x: auto;
    padding: 1rem 0;
  }
  svg text {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid #e9ecef;
  }
  figcaption strong {
    display: block;
    font-size: 1.05rem;
    color: #1a1a2e;
    margin-bottom: 0.4rem;
  }
  figcaption span {
    font-size: 0.85rem;
    color: #6c757d;
    line-height: 1.6;
    display: block;
  }
  .legend {
    display: flex;
    justify-content: center;
    gap: 1.5rem;
    margin-top: 1.25rem;
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.8rem;
    color: #495057;
  }
  .legend-swatch {
    width: 14px;
    height: 14px;
    border-radius: 3px;
    border: 1px solid rgba(0,0,0,0.15);
  }
  @media (prefers-color-scheme: dark) {
    body { background: #1a1a2e; color: #e9ecef; }
    figure { background: #2d2d44; box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
    .diagram-title { color: #e9ecef; }
    figcaption { border-top-color: #3d3d5c; }
    figcaption strong { color: #e9ecef; }
    figcaption span { color: #adb5bd; }
    .legend-item { color: #adb5bd; }
    svg text { fill: #e9ecef; }
    svg text.dark-text { fill: #1a1a2e; }
  }
  @media print {
    body { background: #fff; padding: 0; }
    figure { box-shadow: none; border: 1px solid #ccc; break-inside: avoid; }
  }
</style>
</head>
<body>
<figure>
  <div class="diagram-title">Wilkins' Taxonomic Real Character (1668)</div>
  <div class="svg-container">
    <svg viewBox="0 0 960 680" width="960" height="680" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#6b7280"/>
        </marker>
        <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#2563eb"/>
        </marker>
      </defs>

      <!-- Level 0: Root -->
      <rect x="350" y="15" width="260" height="50" rx="12" fill="#1e40af" stroke="#1e3a5f" stroke-width="2"/>
      <text x="480" y="46" text-anchor="middle" font-weight="700" font-size="15" fill="#ffffff">ALL OF REALITY</text>

      <!-- Branches to General Categories -->
      <line x1="420" y1="65" x2="160" y2="110" stroke="#6b7280" stroke-width="1.8" marker-end="url(#arrow)"/>
      <line x1="480" y1="65" x2="480" y2="110" stroke="#6b7280" stroke-width="1.8" marker-end="url(#arrow)"/>
      <line x1="540" y1="65" x2="800" y2="110" stroke="#6b7280" stroke-width="1.8" marker-end="url(#arrow)"/>

      <!-- Level 1: General Categories (3 of 40 genera shown) -->
      <rect x="60" y="110" width="200" height="44" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
      <text x="160" y="125" text-anchor="middle" font-weight="600" font-size="11" class="dark-text" fill="#1a1a2e">GENUS: Element</text>
      <text x="160" y="142" text-anchor="middle" font-size="10" class="dark-text" fill="#4b5563">(1 of 40 genera)</text>

      <rect x="380" y="110" width="200" height="44" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
      <text x="480" y="125" text-anchor="middle" font-weight="600" font-size="11" class="dark-text" fill="#1a1a2e">GENUS: Beast</text>
      <text x="480" y="142" text-anchor="middle" font-size="10" class="dark-text" fill="#4b5563">(1 of 40 genera)</text>

      <rect x="700" y="110" width="200" height="44" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
      <text x="800" y="125" text-anchor="middle" font-weight="600" font-size="11" class="dark-text" fill="#1a1a2e">GENUS: Motion</text>
      <text x="800" y="142" text-anchor="middle" font-size="10" class="dark-text" fill="#4b5563">(1 of 40 genera)</text>

      <!-- "40 genera" annotation -->
      <text x="480" y="96" text-anchor="middle" font-size="10" font-style="italic" fill="#6b7280">40 genera classifying all knowledge</text>

      <!-- Expand Beast branch -->
      <line x1="430" y1="154" x2="300" y2="200" stroke="#2563eb" stroke-width="1.8" marker-end="url(#arrowBlue)"/>
      <line x1="480" y1="154" x2="480" y2="200" stroke="#2563eb" stroke-width="1.8" marker-end="url(#arrowBlue)"/>
      <line x1="530" y1="154" x2="660" y2="200" stroke="#2563eb" stroke-width="1.8" marker-end="url(#arrowBlue)"/>

      <!-- Level 2: Differences within Beast -->
      <rect x="200" y="200" width="195" height="44" rx="10" fill="#ccfbf1" stroke="#0891b2" stroke-width="2"/>
      <text x="297" y="215" text-anchor="middle" font-weight="600" font-size="11" class="dark-text" fill="#1a1a2e">DIFFERENCE: Viviparous</text>
      <text x="297" y="232" text-anchor="middle" font-size="10" class="dark-text" fill="#4b5563">(live-bearing)</text>

      <rect x="405" y="200" width="150" height="44" rx="10" fill="#ccfbf1" stroke="#0891b2" stroke-width="2"/>
      <text x="480" y="215" text-anchor="middle" font-weight="600" font-size="11" class="dark-text" fill="#1a1a2e">DIFFERENCE: Oviparous</text>
      <text x="480" y="232" text-anchor="middle" font-size="10" class="dark-text" fill="#4b5563">(egg-laying)</text>

      <rect x="580" y="200" width="160" height="44" rx="10" fill="#ccfbf1" stroke="#0891b2" stroke-width="2"/>
      <text x="660" y="215" text-anchor="middle" font-weight="600" font-size="11" class="dark-text" fill="#1a1a2e">DIFFERENCE: Insect</text>
      <text x="660" y="232" text-anchor="middle" font-size="10" class="dark-text" fill="#4b5563">(many-legged)</text>

      <!-- Expand Viviparous -->
      <line x1="250" y1="244" x2="145" y2="290" stroke="#0891b2" stroke-width="1.5" marker-end="url(#arrow)"/>
      <line x1="297" y1="244" x2="297" y2="290" stroke="#0891b2" stroke-width="1.5" marker-end="url(#arrow)"/>
      <line x1="345" y1="244" x2="450" y2="290" stroke="#0891b2" stroke-width="1.5" marker-end="url(#arrow)"/>

      <!-- Level 3: Species within Viviparous -->
      <rect x="55" y="290" width="180" height="44" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
      <text x="145" y="305" text-anchor="middle" font-weight="600" font-size="11" class="dark-text" fill="#1a1a2e">SPECIES: Dog-kind</text>
      <text x="145" y="322" text-anchor="middle" font-size="10" class="dark-text" fill="#4b5563">(domesticated canid)</text>

      <rect x="245" y="290" width="105" height="44" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
      <text x="297" y="305" text-anchor="middle" font-weight="600" font-size="11" class="dark-text" fill="#1a1a2e">SPECIES: Cat</text>
      <text x="297" y="322" text-anchor="middle" font-size="10" class="dark-text" fill="#4b5563">(felid)</text>

      <rect x="380" y="290" width="145" height="44" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
      <text x="452" y="305" text-anchor="middle" font-weight="600" font-size="11" class="dark-text" fill="#1a1a2e">SPECIES: Horse</text>
      <text x="452" y="322" text-anchor="middle" font-size="10" class="dark-text" fill="#4b5563">(equid)</text>

      <!-- The encoding system -->
      <!-- Big box for the encoding -->
      <rect x="55" y="375" width="530" height="275" rx="14" fill="#faf5ff" stroke="#7c3aed" stroke-width="2" stroke-dasharray="6,4"/>
      <text x="320" y="400" text-anchor="middle" font-weight="700" font-size="13" class="dark-text" fill="#7c3aed">HOW THE ENCODING WORKS</text>

      <!-- Example: Dog = Zi + t = Zit -->
      <rect x="80" y="418" width="480" height="60" rx="10" fill="#f3e8ff" stroke="#7c3aed" stroke-width="1.5"/>
      <text x="320" y="436" text-anchor="middle" font-weight="600" font-size="12" class="dark-text" fill="#1a1a2e">Example Path: Reality -> Beast -> Viviparous -> Dog-kind</text>

      <text x="100" y="468" font-size="11" class="dark-text" fill="#4b5563">Genus symbol: </text>
      <text x="200" y="468" font-weight="700" font-size="14" class="dark-text" fill="#2563eb">Zi</text>
      <text x="260" y="468" font-size="11" class="dark-text" fill="#4b5563">+ Difference mark: </text>
      <text x="400" y="468" font-weight="700" font-size="14" class="dark-text" fill="#0891b2">-t</text>
      <text x="440" y="468" font-size="11" class="dark-text" fill="#4b5563">= </text>
      <text x="460" y="468" font-weight="700" font-size="16" class="dark-text" fill="#16a34a">Zit</text>
      <text x="500" y="468" font-size="11" class="dark-text" fill="#4b5563">(Dog)</text>

      <!-- Additional examples -->
      <rect x="80" y="490" width="480" height="75" rx="10" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
      <text x="320" y="510" text-anchor="middle" font-weight="600" font-size="11" class="dark-text" fill="#1a1a2e">More Examples from the System</text>
      <text x="100" y="530" font-size="10.5" class="dark-text" fill="#4b5563">Zi = Beast (genus)</text>
      <text x="100" y="548" font-size="10.5" class="dark-text" fill="#4b5563">Zit = Dog (beast + 1st difference + 1st species)</text>
      <text x="350" y="530" font-size="10.5" class="dark-text" fill="#4b5563">Zita = Male Dog</text>
      <text x="350" y="548" font-size="10.5" class="dark-text" fill="#4b5563">Ziti = Female Dog</text>

      <!-- Problem annotation -->
      <rect x="80" y="580" width="480" height="55" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
      <text x="320" y="600" text-anchor="middle" font-weight="700" font-size="11" fill="#dc2626">THE FUNDAMENTAL PROBLEM</text>
      <text x="320" y="618" text-anchor="middle" font-size="10.5" class="dark-text" fill="#4b5563">Nature does not divide into neat categories. "Dog" is closer to "wolf" than to</text>
      <text x="320" y="632" text-anchor="middle" font-size="10.5" class="dark-text" fill="#4b5563">"cat" -- but both are in the same genus. One misclassification cascades through the system.</text>

      <!-- Right side: Structure annotation -->
      <rect x="620" y="375" width="310" height="275" rx="14" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
      <text x="775" y="400" text-anchor="middle" font-weight="700" font-size="12" class="dark-text" fill="#2563eb">STRUCTURE OF THE SYSTEM</text>

      <text x="640" y="430" font-size="11" font-weight="600" class="dark-text" fill="#1a1a2e">Hierarchy Levels:</text>
      <text x="660" y="452" font-size="11" class="dark-text" fill="#4b5563">1. 40 Genera (top categories)</text>
      <text x="660" y="472" font-size="11" class="dark-text" fill="#4b5563">2. Differences (subdivisions)</text>
      <text x="660" y="492" font-size="11" class="dark-text" fill="#4b5563">3. Species (finest grain)</text>

      <line x1="640" y1="508" x2="910" y2="508" stroke="#2563eb" stroke-width="0.5" opacity="0.3"/>

      <text x="640" y="530" font-size="11" font-weight="600" class="dark-text" fill="#1a1a2e">Coverage claimed:</text>
      <text x="660" y="550" font-size="11" class="dark-text" fill="#4b5563">"All things and notions"</text>
      <text x="660" y="570" font-size="11" class="dark-text" fill="#4b5563">~2,030 species defined</text>

      <line x1="640" y1="585" x2="910" y2="585" stroke="#2563eb" stroke-width="0.5" opacity="0.3"/>

      <text x="640" y="605" font-size="11" font-weight="600" class="dark-text" fill="#1a1a2e">Key insight:</text>
      <text x="660" y="625" font-size="10.5" font-style="italic" class="dark-text" fill="#4b5563">The word IS the definition.</text>
      <text x="660" y="643" font-size="10.5" class="dark-text" fill="#4b5563">Knowing the symbol = knowing</text>
      <text x="660" y="658" font-size="10.5" class="dark-text" fill="#4b5563">where it sits in the taxonomy.</text>

    </svg>
  </div>
  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background:#1e40af;"></div> Root (All Reality)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#dbeafe; border-color:#2563eb;"></div> Genera (40 top categories)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#ccfbf1; border-color:#0891b2;"></div> Differences (subdivisions)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#dcfce7; border-color:#16a34a;"></div> Species (specific items)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#f3e8ff; border-color:#7c3aed;"></div> Encoding system</div>
  </div>
  <figcaption>
    <strong>Figure 2: Wilkins' Taxonomic Real Character (1668)</strong>
    <span>John Wilkins' <em>Essay towards a Real Character and a Philosophical Language</em> attempted to classify all of reality into a strict tree hierarchy, then encode each concept's position in a systematic symbol. The word itself would reveal its meaning: "Zi" marks the genus Beast, "Zit" specifies Dog within it. The system's fatal flaw was its assumption that nature divides into clean, non-overlapping categories -- an assumption that Borges famously mocked and that modern biology, with its cladistic revisions and fuzzy boundaries, has thoroughly refuted. Commissioned by the Royal Society, the project remains the most ambitious attempt to make language mirror the structure of reality.</span>
  </figcaption>
</figure>
</body>
</html>
