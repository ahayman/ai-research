<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Perfection Paradox Cycle</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #f8f9fa;
    color: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 2rem;
  }
  figure {
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
    max-width: 1000px;
    width: 100%;
  }
  .diagram-title {
    text-align: center;
    font-size: 1.3rem;
    font-weight: 700;
    margin-bottom: 0.5rem;
    color: #1a1a2e;
  }
  .diagram-subtitle {
    text-align: center;
    font-size: 0.9rem;
    color: #6b7280;
    margin-bottom: 2rem;
  }
  .svg-container {
    display: flex;
    justify-content: center;
    overflow-x: auto;
    padding: 1rem 0;
  }
  svg text {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid #e9ecef;
  }
  figcaption strong {
    display: block;
    font-size: 1.05rem;
    color: #1a1a2e;
    margin-bottom: 0.4rem;
  }
  figcaption span {
    font-size: 0.85rem;
    color: #6c757d;
    line-height: 1.6;
    display: block;
  }
  @media (prefers-color-scheme: dark) {
    body { background: #1a1a2e; color: #e9ecef; }
    figure { background: #2d2d44; box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
    .diagram-title { color: #e9ecef; }
    .diagram-subtitle { color: #9ca3af; }
    figcaption { border-top-color: #3d3d5c; }
    figcaption strong { color: #e9ecef; }
    figcaption span { color: #adb5bd; }
    svg text { fill: #e9ecef; }
    svg text.dark-text { fill: #1a1a2e; }
  }
  @media print {
    body { background: #fff; padding: 0; }
    figure { box-shadow: none; border: 1px solid #ccc; break-inside: avoid; }
  }
</style>
</head>
<body>
<figure>
  <div class="diagram-title">The Perfection Paradox: Why "Flaws" Are Features</div>
  <div class="diagram-subtitle">Every attempt to build a perfect language reveals that natural-language "imperfections" are essential</div>
  <div class="svg-container">
    <svg viewBox="0 0 880 820" width="880" height="820" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
          <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
        </marker>
        <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
          <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
        </marker>
        <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
          <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
        </marker>
        <marker id="arrowAmber" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
          <polygon points="0 0, 10 3.5, 0 7" fill="#d97706"/>
        </marker>
        <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
          <polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/>
        </marker>
      </defs>

      <!-- Central cycle -->
      <!-- Step 1: Identify "Flaw" -->
      <rect x="290" y="20" width="300" height="75" rx="14" fill="#dbeafe" stroke="#2563eb" stroke-width="2.5"/>
      <text x="440" y="46" text-anchor="middle" font-weight="700" font-size="13" class="dark-text" fill="#2563eb">1. IDENTIFY A "FLAW"</text>
      <text x="440" y="64" text-anchor="middle" font-size="11" class="dark-text" fill="#4b5563">in natural language</text>
      <text x="440" y="80" text-anchor="middle" font-size="10" font-style="italic" class="dark-text" fill="#6b7280">"Ambiguity causes confusion!"</text>

      <!-- Arrow 1->2 -->
      <path d="M 590 58 C 680 58, 720 120, 720 160" fill="none" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrowGreen)"/>

      <!-- Step 2: Design "Perfect" Feature -->
      <rect x="570" y="160" width="300" height="75" rx="14" fill="#dcfce7" stroke="#16a34a" stroke-width="2.5"/>
      <text x="720" y="186" text-anchor="middle" font-weight="700" font-size="13" class="dark-text" fill="#16a34a">2. DESIGN "PERFECT" FIX</text>
      <text x="720" y="204" text-anchor="middle" font-size="11" class="dark-text" fill="#4b5563">Eliminate the flaw entirely</text>
      <text x="720" y="220" text-anchor="middle" font-size="10" font-style="italic" class="dark-text" fill="#6b7280">"Every word has exactly one meaning!"</text>

      <!-- Arrow 2->3 -->
      <path d="M 720 235 C 720 300, 720 310, 720 340" fill="none" stroke="#16a34a" stroke-width="2.5" marker-end="url(#arrowAmber)"/>

      <!-- Step 3: Discover Hidden Cost -->
      <rect x="570" y="340" width="300" height="75" rx="14" fill="#fef3c7" stroke="#d97706" stroke-width="2.5"/>
      <text x="720" y="366" text-anchor="middle" font-weight="700" font-size="13" class="dark-text" fill="#d97706">3. DISCOVER HIDDEN COST</text>
      <text x="720" y="384" text-anchor="middle" font-size="11" class="dark-text" fill="#4b5563">The "flaw" was serving a purpose</text>
      <text x="720" y="400" text-anchor="middle" font-size="10" font-style="italic" class="dark-text" fill="#6b7280">"Without ambiguity, language is too rigid!"</text>

      <!-- Arrow 3->4 -->
      <path d="M 570 378 C 480 378, 440 420, 440 460" fill="none" stroke="#d97706" stroke-width="2.5" marker-end="url(#arrowRed)"/>

      <!-- Step 4: Language Fails or Adapts -->
      <rect x="290" y="460" width="300" height="75" rx="14" fill="#fee2e2" stroke="#dc2626" stroke-width="2.5"/>
      <text x="440" y="486" text-anchor="middle" font-weight="700" font-size="13" fill="#dc2626">4. LANGUAGE FAILS OR ADAPTS</text>
      <text x="440" y="504" text-anchor="middle" font-size="11" class="dark-text" fill="#4b5563">Speakers abandon or reintroduce the "flaw"</text>
      <text x="440" y="520" text-anchor="middle" font-size="10" font-style="italic" class="dark-text" fill="#6b7280">"Speakers start using words metaphorically anyway"</text>

      <!-- Arrow 4->1 (the loop) -->
      <path d="M 290 498 C 160 498, 120 300, 120 58 C 120 40, 200 30, 290 40" fill="none" stroke="#dc2626" stroke-width="2.5" stroke-dasharray="8,4" marker-end="url(#arrowBlue)"/>
      <text x="90" y="280" text-anchor="middle" font-size="10" font-weight="600" fill="#7c3aed" transform="rotate(-90, 90, 280)">Cycle repeats with each new attempt</text>

      <!-- Historical examples -->
      <rect x="30" y="575" width="820" height="225" rx="14" fill="#faf5ff" stroke="#7c3aed" stroke-width="2"/>
      <text x="440" y="600" text-anchor="middle" font-weight="700" font-size="13" fill="#7c3aed">HISTORICAL EXAMPLES OF THE PARADOX</text>

      <!-- Example 1: Wilkins -->
      <rect x="50" y="615" width="240" height="95" rx="10" fill="#f3e8ff" stroke="#7c3aed" stroke-width="1.5"/>
      <text x="170" y="635" text-anchor="middle" font-weight="700" font-size="11" class="dark-text" fill="#7c3aed">Wilkins (1668)</text>
      <text x="170" y="652" text-anchor="middle" font-size="10" class="dark-text" fill="#4b5563">Flaw targeted: Arbitrary words</text>
      <text x="170" y="668" text-anchor="middle" font-size="10" class="dark-text" fill="#4b5563">Fix: Words = taxonomic position</text>
      <text x="170" y="684" text-anchor="middle" font-size="10" font-weight="600" fill="#dc2626">Cost: Unlearnable; one error</text>
      <text x="170" y="698" text-anchor="middle" font-size="10" font-weight="600" fill="#dc2626">cascades through meaning</text>

      <!-- Example 2: Lojban -->
      <rect x="310" y="615" width="240" height="95" rx="10" fill="#f3e8ff" stroke="#7c3aed" stroke-width="1.5"/>
      <text x="430" y="635" text-anchor="middle" font-weight="700" font-size="11" class="dark-text" fill="#7c3aed">Lojban (1987)</text>
      <text x="430" y="652" text-anchor="middle" font-size="10" class="dark-text" fill="#4b5563">Flaw targeted: Syntactic ambiguity</text>
      <text x="430" y="668" text-anchor="middle" font-size="10" class="dark-text" fill="#4b5563">Fix: Predicate logic grammar</text>
      <text x="430" y="684" text-anchor="middle" font-size="10" font-weight="600" fill="#dc2626">Cost: Speakers cannot do</text>
      <text x="430" y="698" text-anchor="middle" font-size="10" font-weight="600" fill="#dc2626">casual chat or poetry easily</text>

      <!-- Example 3: Volapuk -->
      <rect x="570" y="615" width="260" height="95" rx="10" fill="#f3e8ff" stroke="#7c3aed" stroke-width="1.5"/>
      <text x="700" y="635" text-anchor="middle" font-weight="700" font-size="11" class="dark-text" fill="#7c3aed">Volapuk (1879)</text>
      <text x="700" y="652" text-anchor="middle" font-size="10" class="dark-text" fill="#4b5563">Flaw targeted: Irregular natural langs</text>
      <text x="700" y="668" text-anchor="middle" font-size="10" class="dark-text" fill="#4b5563">Fix: Totally regular, controlled</text>
      <text x="700" y="684" text-anchor="middle" font-size="10" font-weight="600" fill="#dc2626">Cost: Creator refused evolution;</text>
      <text x="700" y="698" text-anchor="middle" font-size="10" font-weight="600" fill="#dc2626">community abandoned language</text>

      <!-- The lesson -->
      <rect x="130" y="725" width="620" height="60" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
      <text x="440" y="748" text-anchor="middle" font-weight="700" font-size="12" class="dark-text" fill="#16a34a">THE LESSON</text>
      <text x="440" y="768" text-anchor="middle" font-size="11" class="dark-text" fill="#4b5563">Natural language "imperfections" are engineering solutions: ambiguity enables efficiency,</text>
      <text x="440" y="783" text-anchor="middle" font-size="11" class="dark-text" fill="#4b5563">irregularity aids pattern recognition, redundancy provides error correction, polysemy enables metaphor.</text>

    </svg>
  </div>
  <figcaption>
    <strong>Figure 5: The Perfection Paradox -- Why "Flaws" Are Features</strong>
    <span>Every constructed language encounters the same cycle: a designer identifies a natural-language "flaw" (ambiguity, irregularity, redundancy, polysemy), engineers it away, discovers that the "flaw" served an essential function, and watches the language either fail or evolve to reintroduce the feature. Wilkins' taxonomic language made one-symbol errors catastrophic. Lojban's logical precision made casual conversation nearly impossible. Volapuk's rigid control drove its community to Esperanto. The lesson is consistent across centuries: natural languages are not poorly designed -- they are precisely optimized for use by fallible humans in noisy, uncertain social environments.</span>
  </figcaption>
</figure>
</body>
</html>
