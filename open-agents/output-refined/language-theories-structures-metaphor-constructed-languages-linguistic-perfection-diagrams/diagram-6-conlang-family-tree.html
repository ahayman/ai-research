<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conlang Family Tree: Influences and Relationships</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #f8f9fa;
    color: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 2rem;
  }
  figure {
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
    max-width: 1050px;
    width: 100%;
  }
  .diagram-title {
    text-align: center;
    font-size: 1.3rem;
    font-weight: 700;
    margin-bottom: 0.5rem;
    color: #1a1a2e;
  }
  .diagram-subtitle {
    text-align: center;
    font-size: 0.9rem;
    color: #6b7280;
    margin-bottom: 2rem;
  }
  .svg-container {
    display: flex;
    justify-content: center;
    overflow-x: auto;
    padding: 1rem 0;
  }
  svg text {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  }
  .legend {
    display: flex;
    justify-content: center;
    gap: 1.2rem;
    margin-top: 1.25rem;
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.78rem;
    color: #495057;
  }
  .legend-swatch {
    width: 14px;
    height: 14px;
    border-radius: 3px;
    border: 1px solid rgba(0,0,0,0.15);
  }
  .legend-line {
    width: 24px;
    height: 2px;
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid #e9ecef;
  }
  figcaption strong {
    display: block;
    font-size: 1.05rem;
    color: #1a1a2e;
    margin-bottom: 0.4rem;
  }
  figcaption span {
    font-size: 0.85rem;
    color: #6c757d;
    line-height: 1.6;
    display: block;
  }
  @media (prefers-color-scheme: dark) {
    body { background: #1a1a2e; color: #e9ecef; }
    figure { background: #2d2d44; box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
    .diagram-title { color: #e9ecef; }
    .diagram-subtitle { color: #9ca3af; }
    figcaption { border-top-color: #3d3d5c; }
    figcaption strong { color: #e9ecef; }
    figcaption span { color: #adb5bd; }
    .legend-item { color: #adb5bd; }
    svg text { fill: #e9ecef; }
    svg text.dark-text { fill: #1a1a2e; }
  }
  @media print {
    body { background: #fff; padding: 0; }
    figure { box-shadow: none; border: 1px solid #ccc; break-inside: avoid; }
  }
</style>
</head>
<body>
<figure>
  <div class="diagram-title">Constructed Language Family Tree</div>
  <div class="diagram-subtitle">Intellectual lineages, forks, and influences across nine centuries of language engineering</div>
  <div class="svg-container">
    <svg viewBox="0 0 960 760" width="960" height="760" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="arrowSolid" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#6b7280"/>
        </marker>
        <marker id="arrowPhil" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#7c3aed"/>
        </marker>
        <marker id="arrowAux" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#0891b2"/>
        </marker>
        <marker id="arrowLog" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#16a34a"/>
        </marker>
        <marker id="arrowArt" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#d97706"/>
        </marker>
        <marker id="arrowInfluence" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#9ca3af"/>
        </marker>
      </defs>

      <!-- TIME AXIS on left -->
      <line x1="28" y1="30" x2="28" y2="720" stroke="#d1d5db" stroke-width="1.5"/>
      <text x="18" y="25" font-size="9" fill="#9ca3af" font-weight="600">TIME</text>
      <polygon points="28,720 24,710 32,710" fill="#d1d5db"/>
      <text x="10" y="60" font-size="9" fill="#9ca3af">1100s</text>
      <text x="10" y="130" font-size="9" fill="#9ca3af">1600s</text>
      <text x="10" y="250" font-size="9" fill="#9ca3af">1800s</text>
      <text x="10" y="370" font-size="9" fill="#9ca3af">1900s</text>
      <text x="10" y="530" font-size="9" fill="#9ca3af">1950s</text>
      <text x="10" y="620" font-size="9" fill="#9ca3af">2000s</text>
      <text x="10" y="700" font-size="9" fill="#9ca3af">2010s+</text>

      <!-- ===== MEDIEVAL ===== -->
      <rect x="120" y="40" width="170" height="42" rx="10" fill="#f3f4f6" stroke="#6b7280" stroke-width="2"/>
      <text x="205" y="57" text-anchor="middle" font-weight="700" font-size="10.5" class="dark-text" fill="#374151">Lingua Ignota (c.1150)</text>
      <text x="205" y="72" text-anchor="middle" font-size="9" class="dark-text" fill="#6b7280">Hildegard von Bingen</text>

      <!-- ===== PHILOSOPHICAL BRANCH ===== -->
      <!-- Lodwick -->
      <rect x="80" y="105" width="155" height="38" rx="10" fill="#f3e8ff" stroke="#7c3aed" stroke-width="2"/>
      <text x="157" y="121" text-anchor="middle" font-weight="600" font-size="10" class="dark-text" fill="#7c3aed">Lodwick (1647)</text>
      <text x="157" y="135" text-anchor="middle" font-size="8.5" class="dark-text" fill="#6b7280">Universal Alphabet</text>

      <!-- Dalgarno -->
      <rect x="260" y="105" width="155" height="38" rx="10" fill="#f3e8ff" stroke="#7c3aed" stroke-width="2"/>
      <text x="337" y="121" text-anchor="middle" font-weight="600" font-size="10" class="dark-text" fill="#7c3aed">Dalgarno (1661)</text>
      <text x="337" y="135" text-anchor="middle" font-size="8.5" class="dark-text" fill="#6b7280">Ars Signorum</text>

      <!-- Wilkins -->
      <rect x="160" y="165" width="195" height="42" rx="10" fill="#f3e8ff" stroke="#7c3aed" stroke-width="2.5"/>
      <text x="257" y="182" text-anchor="middle" font-weight="700" font-size="11" class="dark-text" fill="#7c3aed">Wilkins (1668)</text>
      <text x="257" y="197" text-anchor="middle" font-size="9" class="dark-text" fill="#6b7280">Real Character -- Royal Society</text>

      <!-- Leibniz -->
      <rect x="400" y="165" width="195" height="42" rx="10" fill="#f3e8ff" stroke="#7c3aed" stroke-width="2"/>
      <text x="497" y="182" text-anchor="middle" font-weight="600" font-size="10" class="dark-text" fill="#7c3aed">Leibniz (c.1679)</text>
      <text x="497" y="197" text-anchor="middle" font-size="9" class="dark-text" fill="#6b7280">Characteristica Universalis (unfinished)</text>

      <!-- Philosophical connections -->
      <line x1="157" y1="143" x2="220" y2="165" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrowPhil)"/>
      <line x1="337" y1="143" x2="290" y2="165" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrowPhil)"/>
      <line x1="355" y1="186" x2="400" y2="186" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowPhil)"/>

      <!-- ===== AUXILIARY BRANCH ===== -->
      <!-- Volapuk -->
      <rect x="80" y="235" width="155" height="42" rx="10" fill="#ccfbf1" stroke="#0891b2" stroke-width="2"/>
      <text x="157" y="252" text-anchor="middle" font-weight="600" font-size="10" class="dark-text" fill="#0891b2">Volapuk (1879)</text>
      <text x="157" y="266" text-anchor="middle" font-size="8.5" class="dark-text" fill="#6b7280">Schleyer -- first mass IAL</text>

      <!-- Esperanto -->
      <rect x="80" y="300" width="155" height="42" rx="10" fill="#ccfbf1" stroke="#0891b2" stroke-width="2.5"/>
      <text x="157" y="317" text-anchor="middle" font-weight="700" font-size="11" class="dark-text" fill="#0891b2">Esperanto (1887)</text>
      <text x="157" y="331" text-anchor="middle" font-size="8.5" class="dark-text" fill="#6b7280">Zamenhof -- ~2M speakers</text>

      <!-- Volapuk -> Esperanto (reaction) -->
      <line x1="157" y1="277" x2="157" y2="300" stroke="#0891b2" stroke-width="1.5" marker-end="url(#arrowAux)"/>
      <text x="175" y="292" font-size="7.5" fill="#0891b2" font-style="italic">reaction to</text>

      <!-- Ido -->
      <rect x="260" y="340" width="120" height="38" rx="10" fill="#ccfbf1" stroke="#0891b2" stroke-width="1.5"/>
      <text x="320" y="356" text-anchor="middle" font-weight="600" font-size="10" class="dark-text" fill="#0891b2">Ido (1907)</text>
      <text x="320" y="370" text-anchor="middle" font-size="8.5" class="dark-text" fill="#6b7280">"Reformed Esperanto"</text>

      <!-- Occidental -->
      <rect x="395" y="340" width="140" height="38" rx="10" fill="#ccfbf1" stroke="#0891b2" stroke-width="1.5"/>
      <text x="465" y="356" text-anchor="middle" font-weight="600" font-size="10" class="dark-text" fill="#0891b2">Occidental (1922)</text>
      <text x="465" y="370" text-anchor="middle" font-size="8.5" class="dark-text" fill="#6b7280">de Wahl -- naturalistic</text>

      <!-- Novial -->
      <rect x="260" y="390" width="120" height="38" rx="10" fill="#ccfbf1" stroke="#0891b2" stroke-width="1.5"/>
      <text x="320" y="406" text-anchor="middle" font-weight="600" font-size="10" class="dark-text" fill="#0891b2">Novial (1928)</text>
      <text x="320" y="420" text-anchor="middle" font-size="8.5" class="dark-text" fill="#6b7280">Jespersen</text>

      <!-- Interlingua -->
      <rect x="395" y="390" width="140" height="38" rx="10" fill="#ccfbf1" stroke="#0891b2" stroke-width="1.5"/>
      <text x="465" y="406" text-anchor="middle" font-weight="600" font-size="10" class="dark-text" fill="#0891b2">Interlingua (1951)</text>
      <text x="465" y="420" text-anchor="middle" font-size="8.5" class="dark-text" fill="#6b7280">IALA -- Romance core</text>

      <!-- Esperanto -> forks -->
      <line x1="235" y1="321" x2="260" y2="350" stroke="#0891b2" stroke-width="1.5" marker-end="url(#arrowAux)"/>
      <line x1="235" y1="321" x2="395" y2="350" stroke="#0891b2" stroke-width="1.3" stroke-dasharray="5,3" marker-end="url(#arrowInfluence)"/>
      <line x1="320" y1="378" x2="320" y2="390" stroke="#0891b2" stroke-width="1.3" stroke-dasharray="5,3" marker-end="url(#arrowInfluence)"/>
      <line x1="465" y1="378" x2="465" y2="390" stroke="#0891b2" stroke-width="1.3" stroke-dasharray="5,3" marker-end="url(#arrowInfluence)"/>

      <!-- ===== LOGICAL BRANCH ===== -->
      <!-- Leibniz -> Loglan influence -->
      <path d="M 497 207 C 497 300, 640 400, 640 490" fill="none" stroke="#9ca3af" stroke-width="1.3" stroke-dasharray="5,3" marker-end="url(#arrowInfluence)"/>
      <text x="590" y="370" font-size="7.5" fill="#9ca3af" font-style="italic" transform="rotate(-60, 590, 370)">intellectual lineage</text>

      <!-- Loglan -->
      <rect x="570" y="490" width="170" height="42" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
      <text x="655" y="507" text-anchor="middle" font-weight="600" font-size="10" class="dark-text" fill="#16a34a">Loglan (1955)</text>
      <text x="655" y="521" text-anchor="middle" font-size="8.5" class="dark-text" fill="#6b7280">Brown -- Sapir-Whorf test</text>

      <!-- Lojban -->
      <rect x="570" y="555" width="170" height="42" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2.5"/>
      <text x="655" y="572" text-anchor="middle" font-weight="700" font-size="11" class="dark-text" fill="#16a34a">Lojban (1987)</text>
      <text x="655" y="586" text-anchor="middle" font-size="8.5" class="dark-text" fill="#6b7280">LLG fork -- predicate logic</text>

      <line x1="655" y1="532" x2="655" y2="555" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowLog)"/>
      <text x="673" y="547" font-size="7.5" fill="#16a34a" font-style="italic">fork</text>

      <!-- ===== ARTISTIC BRANCH ===== -->
      <!-- Tolkien -->
      <rect x="770" y="300" width="170" height="50" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="2.5"/>
      <text x="855" y="320" text-anchor="middle" font-weight="700" font-size="11" class="dark-text" fill="#d97706">Tolkien (1910s-73)</text>
      <text x="855" y="337" text-anchor="middle" font-size="8.5" class="dark-text" fill="#6b7280">Quenya, Sindarin, Khuzdul</text>
      <text x="855" y="347" text-anchor="middle" font-size="7.5" class="dark-text" fill="#6b7280">Fiction-driven; etymological depth</text>

      <!-- Klingon -->
      <rect x="770" y="450" width="170" height="42" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
      <text x="855" y="467" text-anchor="middle" font-weight="600" font-size="10" class="dark-text" fill="#d97706">Klingon (1984)</text>
      <text x="855" y="481" text-anchor="middle" font-size="8.5" class="dark-text" fill="#6b7280">Okrand -- Star Trek</text>

      <!-- Toki Pona -->
      <rect x="80" y="590" width="155" height="42" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
      <text x="157" y="607" text-anchor="middle" font-weight="600" font-size="10" class="dark-text" fill="#d97706">Toki Pona (2001)</text>
      <text x="157" y="621" text-anchor="middle" font-size="8.5" class="dark-text" fill="#6b7280">Sonja Lang -- ~120 words</text>

      <!-- Na'vi -->
      <rect x="770" y="565" width="170" height="42" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
      <text x="855" y="582" text-anchor="middle" font-weight="600" font-size="10" class="dark-text" fill="#d97706">Na'vi (2005)</text>
      <text x="855" y="596" text-anchor="middle" font-size="8.5" class="dark-text" fill="#6b7280">Frommer -- Avatar</text>

      <!-- Dothraki -->
      <rect x="770" y="620" width="170" height="42" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
      <text x="855" y="637" text-anchor="middle" font-weight="600" font-size="10" class="dark-text" fill="#d97706">Dothraki (2009)</text>
      <text x="855" y="651" text-anchor="middle" font-size="8.5" class="dark-text" fill="#6b7280">Peterson -- Game of Thrones</text>

      <!-- Tolkien -> influence on later artistic -->
      <line x1="855" y1="350" x2="855" y2="450" stroke="#d97706" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowArt)"/>
      <line x1="855" y1="492" x2="855" y2="565" stroke="#d97706" stroke-width="1.3" stroke-dasharray="5,3" marker-end="url(#arrowArt)"/>
      <line x1="855" y1="607" x2="855" y2="620" stroke="#d97706" stroke-width="1.3" stroke-dasharray="5,3" marker-end="url(#arrowArt)"/>

      <!-- ===== MODERN ERA ===== -->
      <rect x="260" y="670" width="460" height="50" rx="12" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
      <text x="490" y="690" text-anchor="middle" font-weight="700" font-size="12" fill="#dc2626">Modern Conlanging Community (2010s+)</text>
      <text x="490" y="708" text-anchor="middle" font-size="10" class="dark-text" fill="#4b5563">Language Creation Society (2007) -- Reddit r/conlangs -- Fiat Lingua -- Online tools -- Thousands of languages</text>

      <!-- Connections to modern -->
      <line x1="157" y1="632" x2="330" y2="670" stroke="#9ca3af" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arrowInfluence)"/>
      <line x1="655" y1="597" x2="560" y2="670" stroke="#9ca3af" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arrowInfluence)"/>
      <line x1="855" y1="662" x2="720" y2="678" stroke="#9ca3af" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arrowInfluence)"/>
      <line x1="157" y1="342" x2="310" y2="670" stroke="#9ca3af" stroke-width="1" stroke-dasharray="5,3" opacity="0.5"/>

    </svg>
  </div>
  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background:#f3f4f6; border-color:#6b7280;"></div> Medieval Precursor</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#f3e8ff; border-color:#7c3aed;"></div> Philosophical Language</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#ccfbf1; border-color:#0891b2;"></div> International Auxiliary</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#dcfce7; border-color:#16a34a;"></div> Logical Language</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#fef3c7; border-color:#d97706;"></div> Artistic Language</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#fee2e2; border-color:#dc2626;"></div> Modern Community</div>
    <div class="legend-item"><div class="legend-line" style="background:#6b7280;"></div> Direct derivation</div>
    <div class="legend-item"><div class="legend-line" style="background:#9ca3af; border-top: 2px dashed #9ca3af; height:0;"></div> Intellectual influence</div>
  </div>
  <figcaption>
    <strong>Figure 6: Constructed Language Family Tree</strong>
    <span>Constructed languages form a branching intellectual genealogy. The philosophical languages of the 1600s (Lodwick, Dalgarno, Wilkins, Leibniz) influenced each other directly, and Leibniz's unfinished algebra of thought anticipates the logical languages (Loglan, Lojban) by three centuries. The auxiliary language tradition runs from Volapuk's rapid rise and fall through Esperanto and its many offshoots (Ido, Occidental, Novial, Interlingua), none of which surpassed the original. Tolkien's artistic languages, created as a private aesthetic pursuit, launched the modern tradition of fiction-driven conlangs (Klingon, Na'vi, Dothraki). All these streams converge in the modern conlanging community, where thousands of languages are created for every conceivable purpose.</span>
  </figcaption>
</figure>
