<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Five French Diacritical Marks</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --accent-fr: #3b82f6;
    --accent-en: #10b981;
    --accent-fr-bg: #eff6ff;
    --accent-en-bg: #ecfdf5;
    --pron-color: #3b82f6;
    --pron-bg: #eff6ff;
    --disambig-color: #f59e0b;
    --disambig-bg: #fffbeb;
    --hist-color: #8b5cf6;
    --hist-bg: #f5f3ff;
    --muted: #6c757d;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --accent-fr: #60a5fa;
      --accent-en: #34d399;
      --accent-fr-bg: #1e293b;
      --accent-en-bg: #132e24;
      --pron-color: #60a5fa;
      --pron-bg: #1e293b;
      --disambig-color: #fbbf24;
      --disambig-bg: #2a2510;
      --hist-color: #a78bfa;
      --hist-bg: #1e1b3a;
      --muted: #9a9ab0;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure {
    max-width: 1100px;
    width: 100%;
    background: var(--surface);
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
  }
  h2 { text-align: center; font-size: 1.4rem; margin-bottom: 0.3rem; }
  .subtitle { text-align: center; font-size: 0.95rem; color: var(--muted); margin-bottom: 2rem; }

  .mark-card {
    border: 2px solid var(--border);
    border-radius: 12px;
    padding: 1.2rem;
    margin-bottom: 1rem;
    display: grid;
    grid-template-columns: 100px 1fr;
    gap: 1rem;
    align-items: start;
  }
  .mark-symbol-area {
    text-align: center;
  }
  .mark-symbol {
    font-size: 2.5rem;
    font-weight: 800;
    color: var(--accent-fr);
    line-height: 1;
  }
  .mark-name {
    font-size: 0.78rem;
    color: var(--muted);
    margin-top: 0.2rem;
  }
  .mark-letters {
    font-size: 0.72rem;
    font-weight: 600;
    margin-top: 0.2rem;
  }
  .mark-details h3 { font-size: 0.95rem; font-weight: 700; margin-bottom: 0.5rem; }
  .mark-functions {
    display: flex;
    flex-wrap: wrap;
    gap: 0.3rem;
    margin-bottom: 0.5rem;
  }
  .func-badge {
    font-size: 0.68rem;
    padding: 2px 8px;
    border-radius: 20px;
    font-weight: 700;
    text-transform: uppercase;
  }
  .func-pron { background: var(--pron-bg); color: var(--pron-color); }
  .func-disambig { background: var(--disambig-bg); color: var(--disambig-color); }
  .func-hist { background: var(--hist-bg); color: var(--hist-color); }
  .mark-rule { font-size: 0.85rem; margin-bottom: 0.5rem; }
  .mark-examples { font-size: 0.82rem; color: var(--muted); }
  .mark-examples em { font-style: normal; color: var(--accent-fr); font-weight: 600; }

  .circumflex-pairs {
    border: 2px solid var(--hist-color);
    border-radius: 12px;
    padding: 1.2rem;
    margin-bottom: 1.5rem;
  }
  .circumflex-pairs h3 { font-size: 0.95rem; color: var(--hist-color); margin-bottom: 1rem; text-align: center; }
  .pair-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0.5rem;
  }
  .pair-card {
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.5rem;
    text-align: center;
    font-size: 0.82rem;
  }
  .pair-fr { font-weight: 700; color: var(--accent-fr); }
  .pair-old { color: var(--hist-color); font-size: 0.75rem; }
  .pair-en { color: var(--accent-en); font-weight: 600; }
  .pair-arrow { font-size: 0.7rem; color: var(--muted); }

  .legend {
    display: flex;
    gap: 1.5rem;
    justify-content: center;
    margin: 1.5rem 0;
    font-size: 0.82rem;
  }
  .legend-item { display: flex; align-items: center; gap: 0.3rem; }
  .legend-badge { width: 24px; height: 14px; border-radius: 3px; }

  .en-comparison {
    margin-top: 1.5rem;
    background: var(--accent-en-bg);
    border: 2px solid var(--accent-en);
    border-radius: 12px;
    padding: 1.2rem;
  }
  .en-comparison h4 { color: var(--accent-en); margin-bottom: 0.5rem; }
  .en-comparison p { font-size: 0.88rem; }

  figcaption {
    margin-top: 1.5rem;
    padding-top: 1rem;
    border-top: 1px solid var(--border);
    font-size: 0.82rem;
    color: var(--muted);
    text-align: center;
  }
  @media (max-width: 640px) {
    .mark-card { grid-template-columns: 1fr; }
    .pair-grid { grid-template-columns: 1fr 1fr; }
    figure { padding: 1.5rem; }
  }
</style>
</head>
<body>
<figure>
  <h2>The Five French Diacritical Marks</h2>
  <p class="subtitle">Not optional decorations -- obligatory marks that change pronunciation, disambiguate meaning, and preserve history</p>

  <div class="legend">
    <div class="legend-item"><div class="legend-badge" style="background:var(--pron-bg);border:1px solid var(--pron-color);"></div> Pronunciation</div>
    <div class="legend-item"><div class="legend-badge" style="background:var(--disambig-bg);border:1px solid var(--disambig-color);"></div> Disambiguation</div>
    <div class="legend-item"><div class="legend-badge" style="background:var(--hist-bg);border:1px solid var(--hist-color);"></div> Historical</div>
  </div>

  <div class="mark-card">
    <div class="mark-symbol-area">
      <div class="mark-symbol">e</div>
      <div class="mark-name">L'accent aigu</div>
      <div class="mark-letters">On: e only</div>
    </div>
    <div class="mark-details">
      <h3>Accent Aigu (Acute)</h3>
      <div class="mark-functions"><span class="func-badge func-pron">Pronunciation</span></div>
      <div class="mark-rule"><strong>Rule:</strong> Changes e to closed /e/ (as in English "bay"). The most common diacritic in French.</div>
      <div class="mark-examples">Examples: <em>elephant</em>, <em>cafe</em>, <em>resume</em>, <em>ete</em> (summer), <em>ecole</em></div>
    </div>
  </div>

  <div class="mark-card">
    <div class="mark-symbol-area">
      <div class="mark-symbol">e a u</div>
      <div class="mark-name">L'accent grave</div>
      <div class="mark-letters">On: e, a, u</div>
    </div>
    <div class="mark-details">
      <h3>Accent Grave (Grave)</h3>
      <div class="mark-functions"><span class="func-badge func-pron">Pronunciation (e)</span><span class="func-badge func-disambig">Disambiguation (a, u)</span></div>
      <div class="mark-rule"><strong>On e:</strong> Changes to open /ɛ/ (as in English "bed"). <strong>On a, u:</strong> No sound change -- purely disambiguates homophones.</div>
      <div class="mark-examples">
        On e: <em>mere</em> (mother), <em>pere</em> (father), <em>frere</em> (brother)<br>
        On a: <em>a</em> (to/at) vs. a (has); <em>la</em> (there) vs. la (the)<br>
        On u: <em>ou</em> (where) vs. ou (or) -- the ONLY word in French with u
      </div>
    </div>
  </div>

  <div class="mark-card">
    <div class="mark-symbol-area">
      <div class="mark-symbol">a e i o u</div>
      <div class="mark-name">L'accent circonflexe</div>
      <div class="mark-letters">On: all 5 vowels</div>
    </div>
    <div class="mark-details">
      <h3>Accent Circonflexe (Circumflex)</h3>
      <div class="mark-functions"><span class="func-badge func-pron">Pronunciation (some)</span><span class="func-badge func-disambig">Disambiguation</span><span class="func-badge func-hist">Historical</span></div>
      <div class="mark-rule"><strong>Primary historical function:</strong> Marks a lost letter (usually "s") from Old French. Visible through English cognates. <strong>Disambiguation:</strong> du (owed) vs. du (some); sur (certain) vs. sur (on); mur (ripe) vs. mur (wall).</div>
      <div class="mark-examples">
        Tombstone for 's': <em>hopital</em>/hospital, <em>foret</em>/forest, <em>ile</em>/island, <em>fete</em>/feast<br>
        On i, u: No pronunciation change in modern French -- purely historical/disambiguating
      </div>
    </div>
  </div>

  <div class="mark-card">
    <div class="mark-symbol-area">
      <div class="mark-symbol">c</div>
      <div class="mark-name">La cedille</div>
      <div class="mark-letters">On: c only (before a, o, u)</div>
    </div>
    <div class="mark-details">
      <h3>Cedille (Cedilla)</h3>
      <div class="mark-functions"><span class="func-badge func-pron">Pronunciation</span></div>
      <div class="mark-rule"><strong>Rule:</strong> Forces c to be soft /s/ before back vowels (a, o, u). Without cedilla: c + a/o/u = /k/. With cedilla: c + a/o/u = /s/. Unnecessary before e/i (c is already /s/).</div>
      <div class="mark-examples">
        <em>francais</em> (French), <em>garcon</em> (boy), <em>lecon</em> (lesson), <em>recu</em> (received), <em>ca</em> (that)<br>
        The rule is perfectly regular: c = /s/ before {e, i, c} and /k/ before {a, o, u, consonant}
      </div>
    </div>
  </div>

  <div class="mark-card">
    <div class="mark-symbol-area">
      <div class="mark-symbol">e i u</div>
      <div class="mark-name">Le trema</div>
      <div class="mark-letters">On: e, i, u</div>
    </div>
    <div class="mark-details">
      <h3>Trema (Diaeresis)</h3>
      <div class="mark-functions"><span class="func-badge func-pron">Pronunciation</span></div>
      <div class="mark-rule"><strong>Rule:</strong> Indicates two adjacent vowels are pronounced separately, NOT as a digraph. Without trema: ai = /ɛ/. With trema: ai = /a.i/ (two syllables).</div>
      <div class="mark-examples">
        <em>mais</em> (corn/maize) -- /a.i/ not /ɛ/ like mais (but)<br>
        <em>Noel</em> (Christmas) -- /o.ɛ/ not a single sound<br>
        <em>naif</em> (naive) -- /a.i/ not /ɛ/<br>
        1990 reform moved trema in some words: aigue -> aigue
      </div>
    </div>
  </div>

  <div class="circumflex-pairs">
    <h3>The Circumflex as Historical Evidence -- A Bridge to English Cognates</h3>
    <div class="pair-grid">
      <div class="pair-card">
        <div class="pair-fr">hopital</div>
        <div class="pair-arrow">^ = lost s</div>
        <div class="pair-en">hospital</div>
      </div>
      <div class="pair-card">
        <div class="pair-fr">foret</div>
        <div class="pair-arrow">^ = lost s</div>
        <div class="pair-en">forest</div>
      </div>
      <div class="pair-card">
        <div class="pair-fr">ile</div>
        <div class="pair-arrow">^ = lost s</div>
        <div class="pair-en">island</div>
      </div>
      <div class="pair-card">
        <div class="pair-fr">fete</div>
        <div class="pair-arrow">^ = lost s</div>
        <div class="pair-en">feast</div>
      </div>
      <div class="pair-card">
        <div class="pair-fr">hotel</div>
        <div class="pair-arrow">^ = lost s</div>
        <div class="pair-en">hostel</div>
      </div>
      <div class="pair-card">
        <div class="pair-fr">cote</div>
        <div class="pair-arrow">^ = lost s</div>
        <div class="pair-en">coast</div>
      </div>
      <div class="pair-card">
        <div class="pair-fr">maitre</div>
        <div class="pair-arrow">^ = lost s</div>
        <div class="pair-en">master</div>
      </div>
      <div class="pair-card">
        <div class="pair-fr">pate</div>
        <div class="pair-arrow">^ = lost s</div>
        <div class="pair-en">paste</div>
      </div>
    </div>
  </div>

  <div class="en-comparison">
    <h4>ENGLISH COMPARISON</h4>
    <p>English uses <strong>almost no diacritical marks</strong>. The rare exceptions are borrowed words that sometimes retain their original diacritics: cafe, resume, naive, fiancee -- but even these are frequently written without marks. English compensates by tolerating enormous spelling ambiguity: the letter "e" represents at least 6 different sounds with no systematic marking. French's diacritical system <em>reduces</em> vowel ambiguity, making French vowel pronunciation from spelling more predictable than English.</p>
    <p style="margin-top:0.5rem;"><strong>The pattern:</strong> French diacritics are OBLIGATORY and FUNCTIONAL. English diacritics are OPTIONAL and DECORATIVE. Omitting an accent in French is as much an error as misspelling a word in English.</p>
  </div>

  <figcaption>
    The five diacritical marks form a systematic, rule-governed system that reduces reading ambiguity, disambiguates homophones, and preserves historical information. The circumflex's "tombstone for s" pattern is especially powerful for English speakers, turning a mysterious mark into a bridge to cognate vocabulary.
  </figcaption>
</figure>
</body>
</html>
