<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Circumflex as Historical Evidence -- A Bridge to English</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --accent-fr: #3b82f6;
    --accent-en: #10b981;
    --accent-fr-bg: #eff6ff;
    --accent-en-bg: #ecfdf5;
    --ghost: #8b5cf6;
    --ghost-bg: #f5f3ff;
    --muted: #6c757d;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --accent-fr: #60a5fa;
      --accent-en: #34d399;
      --accent-fr-bg: #1e293b;
      --accent-en-bg: #132e24;
      --ghost: #a78bfa;
      --ghost-bg: #1e1b3a;
      --muted: #9a9ab0;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure {
    max-width: 1000px;
    width: 100%;
    background: var(--surface);
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
  }
  h2 { text-align: center; font-size: 1.4rem; margin-bottom: 0.3rem; }
  .subtitle { text-align: center; font-size: 0.95rem; color: var(--muted); margin-bottom: 2rem; }

  .concept-box {
    border: 2px solid var(--ghost);
    border-radius: 14px;
    padding: 1.5rem;
    margin-bottom: 2rem;
    background: var(--ghost-bg);
    text-align: center;
  }
  .concept-box .big-symbol {
    font-size: 3rem;
    color: var(--ghost);
    line-height: 1;
  }
  .concept-box .concept-text {
    font-size: 1rem;
    margin-top: 0.5rem;
  }
  .concept-box .concept-formula {
    font-size: 0.95rem;
    font-weight: 700;
    color: var(--ghost);
    margin-top: 0.5rem;
  }

  .cognate-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.92rem;
    margin-bottom: 2rem;
  }
  .cognate-table thead th {
    padding: 0.6rem;
    text-align: center;
    border-bottom: 2px solid var(--border);
    font-size: 0.78rem;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    color: var(--muted);
  }
  .cognate-table tbody td {
    padding: 0.6rem;
    text-align: center;
    border-bottom: 1px solid var(--border);
  }
  .cognate-table .fr-word {
    font-weight: 700;
    color: var(--accent-fr);
    font-size: 1.05rem;
  }
  .cognate-table .old-word {
    color: var(--ghost);
    font-style: italic;
  }
  .cognate-table .old-word .s-letter {
    font-weight: 800;
    color: var(--ghost);
    background: var(--ghost-bg);
    padding: 0 2px;
    border-radius: 2px;
  }
  .cognate-table .en-word {
    font-weight: 700;
    color: var(--accent-en);
    font-size: 1.05rem;
  }
  .cognate-table .en-word .s-letter {
    font-weight: 800;
    color: var(--accent-en);
    background: var(--accent-en-bg);
    padding: 0 2px;
    border-radius: 2px;
  }
  .cognate-table .meaning { color: var(--muted); font-size: 0.82rem; }

  .pattern-box {
    border: 2px solid var(--accent-fr);
    border-radius: 12px;
    padding: 1.2rem;
    margin-bottom: 1.5rem;
  }
  .pattern-box h3 { font-size: 0.95rem; color: var(--accent-fr); margin-bottom: 0.8rem; text-align: center; }
  .pattern-steps {
    display: grid;
    grid-template-columns: 1fr 40px 1fr 40px 1fr;
    gap: 0;
    align-items: center;
    text-align: center;
  }
  .pattern-step {
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.8rem;
    font-size: 0.88rem;
  }
  .pattern-arrow { font-size: 1.2rem; color: var(--muted); text-align: center; }

  .algorithm-box {
    border: 2px solid var(--accent-en);
    border-radius: 12px;
    padding: 1.2rem;
    background: var(--accent-en-bg);
  }
  .algorithm-box h4 { color: var(--accent-en); margin-bottom: 0.5rem; }
  .algorithm-box p { font-size: 0.88rem; }
  .algorithm-steps {
    margin-top: 0.5rem;
    font-size: 0.85rem;
  }
  .algorithm-steps li {
    padding: 0.2rem 0;
  }

  figcaption {
    margin-top: 1.5rem;
    padding-top: 1rem;
    border-top: 1px solid var(--border);
    font-size: 0.82rem;
    color: var(--muted);
    text-align: center;
  }
  @media (max-width: 640px) {
    .pattern-steps { grid-template-columns: 1fr; gap: 0.3rem; }
    .pattern-arrow { transform: rotate(90deg); }
    figure { padding: 1.5rem; }
  }
</style>
</head>
<body>
<figure>
  <h2>The Circumflex as Historical Evidence</h2>
  <p class="subtitle">A "tombstone" marking where a deleted 's' once stood -- and a bridge to English cognates</p>

  <div class="concept-box">
    <div class="big-symbol">^</div>
    <div class="concept-text">The circumflex marks the grave of a letter that was pronounced in Old French but deleted in Modern French -- usually an <strong>'s'</strong> that English preserved.</div>
    <div class="concept-formula">French circumflex = Old French 's' = English cognate with 's'</div>
  </div>

  <table class="cognate-table">
    <thead>
      <tr>
        <th>Modern French</th>
        <th>Old French</th>
        <th>English Cognate</th>
        <th>Meaning</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td class="fr-word">hopital</td>
        <td class="old-word">ho<span class="s-letter">s</span>pital</td>
        <td class="en-word">ho<span class="s-letter">s</span>pital</td>
        <td class="meaning">hospital</td>
      </tr>
      <tr>
        <td class="fr-word">foret</td>
        <td class="old-word">fore<span class="s-letter">s</span>t</td>
        <td class="en-word">fore<span class="s-letter">s</span>t</td>
        <td class="meaning">forest</td>
      </tr>
      <tr>
        <td class="fr-word">ile</td>
        <td class="old-word">i<span class="s-letter">s</span>le</td>
        <td class="en-word">i<span class="s-letter">s</span>land</td>
        <td class="meaning">island</td>
      </tr>
      <tr>
        <td class="fr-word">fete</td>
        <td class="old-word">fe<span class="s-letter">s</span>te</td>
        <td class="en-word">fea<span class="s-letter">s</span>t</td>
        <td class="meaning">feast / celebration</td>
      </tr>
      <tr>
        <td class="fr-word">hotel</td>
        <td class="old-word">ho<span class="s-letter">s</span>tel</td>
        <td class="en-word">ho<span class="s-letter">s</span>tel</td>
        <td class="meaning">hostel / hotel</td>
      </tr>
      <tr>
        <td class="fr-word">cote</td>
        <td class="old-word">co<span class="s-letter">s</span>te</td>
        <td class="en-word">coa<span class="s-letter">s</span>t</td>
        <td class="meaning">coast / rib</td>
      </tr>
      <tr>
        <td class="fr-word">maitre</td>
        <td class="old-word">mai<span class="s-letter">s</span>tre</td>
        <td class="en-word">ma<span class="s-letter">s</span>ter</td>
        <td class="meaning">master</td>
      </tr>
      <tr>
        <td class="fr-word">pate</td>
        <td class="old-word">pa<span class="s-letter">s</span>te</td>
        <td class="en-word">pa<span class="s-letter">s</span>te</td>
        <td class="meaning">paste / dough</td>
      </tr>
      <tr>
        <td class="fr-word">bete</td>
        <td class="old-word">be<span class="s-letter">s</span>te</td>
        <td class="en-word">bea<span class="s-letter">s</span>t</td>
        <td class="meaning">beast</td>
      </tr>
      <tr>
        <td class="fr-word">rotir</td>
        <td class="old-word">ro<span class="s-letter">s</span>tir</td>
        <td class="en-word">roa<span class="s-letter">s</span>t</td>
        <td class="meaning">roast</td>
      </tr>
      <tr>
        <td class="fr-word">arret</td>
        <td class="old-word">arre<span class="s-letter">s</span>t</td>
        <td class="en-word">arre<span class="s-letter">s</span>t</td>
        <td class="meaning">arrest / stop</td>
      </tr>
    </tbody>
  </table>

  <div class="pattern-box">
    <h3>How the Pattern Works Historically</h3>
    <div class="pattern-steps">
      <div class="pattern-step">
        <strong>Old French</strong><br>
        ho<span style="color:var(--ghost);font-weight:800;">s</span>pital<br>
        <em style="font-size:0.78rem;color:var(--muted);">s was pronounced</em>
      </div>
      <div class="pattern-arrow">&#10132;</div>
      <div class="pattern-step">
        <strong>s deleted</strong><br>
        ho^pital<br>
        <em style="font-size:0.78rem;color:var(--muted);">circumflex marks the gap</em>
      </div>
      <div class="pattern-arrow">&#10132;</div>
      <div class="pattern-step">
        <strong>English preserved s</strong><br>
        ho<span style="color:var(--accent-en);font-weight:800;">s</span>pital<br>
        <em style="font-size:0.78rem;color:var(--muted);">borrowed before French deleted it</em>
      </div>
    </div>
  </div>

  <div class="algorithm-box">
    <h4>The Learnable Algorithm for English Speakers</h4>
    <p>When you encounter a circumflex in French, apply this pattern:</p>
    <ol class="algorithm-steps">
      <li><strong>See circumflex</strong> on a vowel (e.g., <em>foret</em>)</li>
      <li><strong>Insert 's'</strong> after the circumflexed vowel mentally (<em>forest</em>)</li>
      <li><strong>Recognize the English cognate</strong> (<em>forest</em> = forest)</li>
      <li><strong>Confirm meaning</strong> -- the French word likely means the same as the English cognate</li>
    </ol>
    <p style="margin-top:0.5rem;">This transforms the circumflex from an arbitrary obstacle into a <strong>systematic vocabulary-building tool</strong>. For a pattern-oriented learner, this is one of the most powerful regularities in French orthography.</p>
  </div>

  <figcaption>
    The circumflex is not decorative or arbitrary -- it is historical evidence, a record of phonological change that occurred after French was borrowed into English. English preserved the 's' that French deleted, creating a systematic bridge between the two languages' vocabularies.
  </figcaption>
</figure>
</body>
</html>
