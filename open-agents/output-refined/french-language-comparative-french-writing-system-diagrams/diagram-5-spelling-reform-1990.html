<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The 1990 Spelling Reform and #JeSuisCirconflexe</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --accent-fr: #3b82f6;
    --accent-en: #10b981;
    --accent-fr-bg: #eff6ff;
    --accent-en-bg: #ecfdf5;
    --old: #8b5cf6;
    --old-bg: #f5f3ff;
    --new: #10b981;
    --new-bg: #ecfdf5;
    --controversy: #e63946;
    --controversy-bg: #fef2f2;
    --retained: #f59e0b;
    --retained-bg: #fffbeb;
    --muted: #6c757d;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --accent-fr: #60a5fa;
      --accent-en: #34d399;
      --accent-fr-bg: #1e293b;
      --accent-en-bg: #132e24;
      --old: #a78bfa;
      --old-bg: #1e1b3a;
      --new: #34d399;
      --new-bg: #132e24;
      --controversy: #f87171;
      --controversy-bg: #2a1215;
      --retained: #fbbf24;
      --retained-bg: #2a2510;
      --muted: #9a9ab0;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure {
    max-width: 1000px;
    width: 100%;
    background: var(--surface);
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
  }
  h2 { text-align: center; font-size: 1.4rem; margin-bottom: 0.3rem; }
  .subtitle { text-align: center; font-size: 0.95rem; color: var(--muted); margin-bottom: 2rem; }

  .timeline-strip {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border: 2px solid var(--border);
    border-radius: 12px;
    padding: 1rem;
    margin-bottom: 2rem;
    position: relative;
    overflow: hidden;
  }
  .timeline-strip::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 5%;
    right: 5%;
    height: 3px;
    background: var(--border);
    z-index: 0;
  }
  .tl-event {
    position: relative;
    z-index: 1;
    text-align: center;
    font-size: 0.78rem;
    max-width: 120px;
  }
  .tl-event .tl-dot {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    margin: 0 auto 0.3rem;
    border: 3px solid var(--fg);
  }
  .tl-event .tl-date { font-weight: 700; font-size: 0.82rem; }
  .tl-event .tl-desc { color: var(--muted); font-size: 0.72rem; }

  .changes-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
    margin-bottom: 2rem;
  }
  .change-section {
    border: 2px solid var(--border);
    border-radius: 12px;
    padding: 1.2rem;
  }
  .change-section h3 { font-size: 0.95rem; margin-bottom: 0.8rem; }
  .change-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.85rem;
  }
  .change-table th {
    padding: 0.3rem 0.5rem;
    text-align: left;
    border-bottom: 1px solid var(--border);
    font-size: 0.72rem;
    text-transform: uppercase;
    color: var(--muted);
  }
  .change-table td {
    padding: 0.3rem 0.5rem;
    border-bottom: 1px solid var(--border);
  }
  .old-form { color: var(--old); text-decoration: line-through; }
  .new-form { color: var(--new); font-weight: 600; }
  .retained-form { color: var(--retained); font-weight: 600; }
  .change-type { font-size: 0.75rem; color: var(--muted); }

  .controversy-box {
    border: 3px solid var(--controversy);
    border-radius: 14px;
    padding: 1.5rem;
    margin-bottom: 2rem;
    background: var(--controversy-bg);
  }
  .controversy-box h3 {
    font-size: 1.1rem;
    color: var(--controversy);
    margin-bottom: 0.8rem;
    text-align: center;
  }
  .controversy-box .hashtag {
    font-size: 1.5rem;
    font-weight: 800;
    color: var(--controversy);
    text-align: center;
    margin-bottom: 0.5rem;
  }
  .controversy-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.8rem;
    margin-top: 1rem;
  }
  .controversy-card {
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.8rem;
    font-size: 0.85rem;
  }
  .controversy-card h4 { font-size: 0.88rem; margin-bottom: 0.3rem; }

  .en-comparison {
    margin-top: 1.5rem;
    background: var(--accent-en-bg);
    border: 2px solid var(--accent-en);
    border-radius: 12px;
    padding: 1.2rem;
  }
  .en-comparison h4 { color: var(--accent-en); margin-bottom: 0.5rem; }
  .en-comparison p { font-size: 0.88rem; }

  figcaption {
    margin-top: 1.5rem;
    padding-top: 1rem;
    border-top: 1px solid var(--border);
    font-size: 0.82rem;
    color: var(--muted);
    text-align: center;
  }
  @media (max-width: 640px) {
    .changes-grid { grid-template-columns: 1fr; }
    .controversy-grid { grid-template-columns: 1fr; }
    .timeline-strip { flex-direction: column; gap: 0.5rem; }
    .timeline-strip::before { display: none; }
    figure { padding: 1.5rem; }
  }
</style>
</head>
<body>
<figure>
  <h2>The 1990 Spelling Reform</h2>
  <p class="subtitle">Approved in 1990, ignored for 25 years, then ignited a cultural firestorm in 2016</p>

  <div class="timeline-strip">
    <div class="tl-event">
      <div class="tl-dot" style="background:var(--new);"></div>
      <div class="tl-date">May 3, 1990</div>
      <div class="tl-desc">Reforms proposed by Conseil superieur, approved by Academie</div>
    </div>
    <div class="tl-event">
      <div class="tl-dot" style="background:var(--muted);"></div>
      <div class="tl-date">1990-2015</div>
      <div class="tl-desc">25 years of near-total non-adoption</div>
    </div>
    <div class="tl-event">
      <div class="tl-dot" style="background:var(--controversy);"></div>
      <div class="tl-date">Feb 3, 2016</div>
      <div class="tl-desc">TF1 reports textbooks will implement reforms</div>
    </div>
    <div class="tl-event">
      <div class="tl-dot" style="background:var(--controversy);"></div>
      <div class="tl-date">2016+</div>
      <div class="tl-desc">#JeSuisCirconflexe trends. Petitions gather tens of thousands.</div>
    </div>
  </div>

  <div class="changes-grid">
    <div class="change-section" style="border-color:var(--new);">
      <h3 style="color:var(--new);">What Changed (~2,400 words)</h3>
      <table class="change-table">
        <thead><tr><th>Old</th><th>New</th><th>Type</th></tr></thead>
        <tbody>
          <tr><td class="old-form">cout</td><td class="new-form">cout</td><td class="change-type">Circumflex removed (i, u)</td></tr>
          <tr><td class="old-form">paraitre</td><td class="new-form">paraitre</td><td class="change-type">Circumflex removed</td></tr>
          <tr><td class="old-form">oignon</td><td class="new-form">ognon</td><td class="change-type">Regularization</td></tr>
          <tr><td class="old-form">nenuphar</td><td class="new-form">nenufar</td><td class="change-type">Spelling correction (ph->f)</td></tr>
          <tr><td class="old-form">porte-monnaie</td><td class="new-form">portemonnaie</td><td class="change-type">Compound simplification</td></tr>
          <tr><td class="old-form">week-end</td><td class="new-form">weekend</td><td class="change-type">Compound simplification</td></tr>
        </tbody>
      </table>
      <p style="font-size:0.78rem;color:var(--new);margin-top:0.5rem;">Both old and new spellings are officially accepted. The reform created optional alternatives, not mandates.</p>
    </div>

    <div class="change-section" style="border-color:var(--retained);">
      <h3 style="color:var(--retained);">What Was Kept (Disambiguation)</h3>
      <table class="change-table">
        <thead><tr><th>Kept</th><th>Reason</th></tr></thead>
        <tbody>
          <tr><td class="retained-form">du (owed)</td><td class="change-type">Distinguishes from du (some)</td></tr>
          <tr><td class="retained-form">sur (certain)</td><td class="change-type">Distinguishes from sur (on)</td></tr>
          <tr><td class="retained-form">mur (ripe)</td><td class="change-type">Distinguishes from mur (wall)</td></tr>
          <tr><td class="retained-form">jeune (fast)</td><td class="change-type">Distinguishes from jeune (young)</td></tr>
        </tbody>
      </table>
      <p style="font-size:0.78rem;color:var(--retained);margin-top:0.5rem;">Circumflex retained wherever it actively disambiguates homophones -- the functional use is preserved.</p>
    </div>
  </div>

  <div class="controversy-box">
    <h3>The 2016 Eruption</h3>
    <div class="hashtag">#JeSuisCirconflexe</div>
    <p style="font-size:0.88rem;text-align:center;">26 years after approval, when textbooks finally began implementing the reforms, France erupted. The hashtag (echoing #JeSuisCharlie) signaled that many perceived the reforms as an attack on French identity itself.</p>
    <div class="controversy-grid">
      <div class="controversy-card">
        <h4 style="color:var(--controversy);">Why So Emotional?</h4>
        <p>French orthography is tied to national identity. The dictee is a cultural institution. Spelling mastery signals education and class. Changing spelling feels like changing France.</p>
      </div>
      <div class="controversy-card">
        <h4 style="color:var(--controversy);">The Paradox</h4>
        <p>The reforms were proposed by the Academie francaise itself -- the very institution charged with protecting French. Citizens opposed the Academie's own recommendations in the name of defending the language the Academie oversees.</p>
      </div>
    </div>
  </div>

  <div class="en-comparison">
    <h4>ENGLISH COMPARISON -- No Official Mechanism, No Official Drama</h4>
    <p>English has <strong>no official spelling authority</strong> and therefore no mechanism for official reform. Spelling variation between British and American English (colour/color, centre/center) is handled by competing dictionaries, not by decree. Major English spelling reforms have been proposed (George Bernard Shaw, the Simplified Spelling Society) but never implemented nationally.</p>
    <p style="margin-top:0.5rem;"><strong>The pattern:</strong> French has <em>institutional control + cultural resistance to change</em>. English has <em>no institutional control + gradual organic change</em>. The French system creates dramatic confrontations (1990/2016). The English system creates quiet drift (theater/theatre, donut/doughnut).</p>
  </div>

  <figcaption>
    The #JeSuisCirconflexe controversy reveals that French orthography is not merely a technical system but a component of national identity. The circumflex is simultaneously a historical marker, a disambiguation tool, and a cultural symbol -- and for many French citizens, removing it is unthinkable.
  </figcaption>
</figure>
</body>
</html>
