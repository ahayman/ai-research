  root((Autistic Masking<br/>Camouflaging))
    **Compensation**
      Learning social rules explicitly
      Scripting conversations
      Watching and imitating others
      Using intellectual strategies

      Monitoring own behavior
    **Masking**
      Suppressing stimming
      Hiding sensory distress
      Forcing eye contact
      Controlling facial expressions
      Concealing special interests
      Suppressing natural responses
    **Assimilation**
      Fitting in with others
      Adjusting personality to context
      Adopting others mannerisms
      Performing expected social role
      Mirroring body language
      Managing social identity
