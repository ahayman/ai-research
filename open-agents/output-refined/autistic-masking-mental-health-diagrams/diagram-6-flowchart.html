  <figcaption>
    <strong>Figure 6:</strong> The intervention approaches spectrum, from person-modification (which teaches masking) to environmental accommodation (which reduces the need to mask). Neurodiversity-affirming frameworks (Leadbitter et al., 2021; Lerner &amp; Gurba, 2023) advocate moving rightward on this spectrum, while acknowledging that some adaptive skill-building in the middle zone can be beneficial when collaboratively goal-set.
