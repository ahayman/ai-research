<!-- Description: Decision framework for evaluating whether an intervention or technology promotes masking vs genuine communication support -->

<figure class="concept-diagram" id="diagram-aac-framework">
  <div class="diagram-container">
    <pre class="mermaid">
flowchart TD
    START["Proposed Intervention<br/>or Technology"] --> Q1{"Does it aim to change<br/>HOW the person<br/>expresses themselves?"}

    Q1 -->|"Yes"| Q2{"Is the goal to match<br/>neurotypical norms?"}
    Q1 -->|"No"| Q3{"Does it help the person<br/>communicate WHAT<br/>they want to say?"}

    Q2 -->|"Yes"| RISK["⛔ HIGH MASKING RISK<br/><br/>Examples:<br/>• Facial expression training<br/>• Eye contact coaching<br/>• 'Normal' behavior rewards<br/>• Expression normalization"]

    Q2 -->|"No"| CHECK{"Is it self-directed<br/>and optional?"}

    Q3 -->|"Yes"| GOOD["✅ COMMUNICATION SUPPORT<br/><br/>Examples:<br/>• Symbol-based expression<br/>• Multimodal communication<br/>• Emotion identification aids<br/>• Social situation explainers"]
    Q3 -->|"No"| Q4{"Does it modify the<br/>ENVIRONMENT to be<br/>more accessible?"}

    CHECK -->|"Yes"| OKAY["✅ ACCEPTABLE<br/><br/>• Person chooses when/if<br/>• Supports autonomy<br/>• No compliance pressure"]
    CHECK -->|"No"| RISK

    Q4 -->|"Yes"| GREAT["✅ IDEAL APPROACH<br/><br/>Examples:<br/>• Sensory environment design<br/>• Communication partner training<br/>• Peer education<br/>• Accommodation supports"]
    Q4 -->|"No"| REVIEW["🔍 NEEDS REVIEW<br/>Evaluate with autistic<br/>stakeholders"]

    RISK --> ALTERNATIVE["Consider: Can the same<br/>goal be achieved by<br/>modifying the environment<br/>instead of the person?"]
    ALTERNATIVE --> Q4

  </div>
  <figcaption>
    <strong>Figure 8:</strong> Decision framework for evaluating whether a proposed intervention or technology promotes masking or supports genuine communication. Based on communicative competence research (Light &amp; McNaughton, 2014) and neurodiversity-affirming intervention principles (Leadbitter et al., 2021; Lerner &amp; Gurba, 2023). The key question: does this change the person to fit the environment, or the environment to fit the person?
