<!-- Diagram: Comorbidity and Masking Relationships -->
<!-- Type: flowchart -->
<!-- Generated: 2026-03-10 -->
<!-- Description: Shows the relationships between masking and various comorbid conditions, with bidirectional arrows indicating complex interactions -->

<figure class="concept-diagram" id="diagram-comorbidities">
  <div class="diagram-container">
    <pre class="mermaid">
flowchart TD
    MASK["Autistic Masking<br/>(Camouflaging)"]

    subgraph COGNITIVE["Cognitive/Emotional"]
        AX["Alexithymia<br/>~50% of autistic people<br/>(vs 10-13% general pop)"]
        EF["Executive Function<br/>Depletion"]
    end

    subgraph MENTAL["Mental Health"]
        DEP["Depression<br/>r = 0.36"]
        ANX["Anxiety / Social<br/>Anxiety r = 0.27"]
        BURN["Autistic<br/>Burnout"]
        SI["Suicidal<br/>Ideation"]
    end

    subgraph TRAUMA["Trauma-Related"]
        PTSD["PTSD / Complex<br/>Trauma"]
        ID["Identity Loss &amp;<br/>Confusion"]
    end

    subgraph BEHAVIORAL["Behavioral"]
        ED["Eating Disorders<br/>20-30% anorexia<br/>meet ASD criteria"]
        SUB["Substance Use<br/>for self-medication<br/>(lower overall use)"]
    end

    MASK <-.->|"complicates<br/>masking"| AX
    MASK -.->|"depletes"| EF
    MASK <-.->|"associated"| DEP
    MASK <-.->|"associated"| ANX
    MASK -.->|"contributes to"| BURN
    DEP -.-> SI
    ANX -.-> SI
    MASK <-.->|"associated"| PTSD
    MASK -.->|"threatens"| ID
    MASK <-.->|"predicts"| ED
    DEP -.-> SUB

    subgraph NOTE["Note"]
        N1["Dashed arrows = associations,<br/>not established causal links.<br/>79% of autistic adults meet<br/>criteria for a psychiatric<br/>disorder at least once<br/>(Lever &amp; Geurts, 2016)"]
    end

    style MASK fill:#fef3c7,stroke:#d97706,color:#78350f
    style COGNITIVE fill:#e0f2fe,stroke:#0284c7,color:#1e3a5f
    style MENTAL fill:#fce7f3,stroke:#be185d,color:#831843
    style TRAUMA fill:#fee2e2,stroke:#dc2626,color:#7f1d1d
    style BEHAVIORAL fill:#f3e8ff,stroke:#7c3aed,color:#4c1d95
    style NOTE fill:#f3f4f6,stroke:#6b7280,color:#374151
    </pre>
  </div>
  <figcaption>
    <strong>Figure 7:</strong> Relationships between masking and comorbid conditions. Dashed arrows indicate associations found in cross-sectional research, not established causal pathways. Alexithymia (~50% prevalence in autism) both complicates masking demands and may drive many emotional processing difficulties previously attributed to autism itself (Bird &amp; Cook, 2013).
  </figcaption>
</figure>
