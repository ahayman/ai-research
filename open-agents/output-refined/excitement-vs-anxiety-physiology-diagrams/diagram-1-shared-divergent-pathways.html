<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shared vs. Divergent Physiological Pathways</title>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #f8f9fa;
    color: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 2rem;
  }
  figure {
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
    max-width: 960px;
    width: 100%;
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid #e9ecef;
  }
  figcaption strong {
    display: block;
    font-size: 1.15rem;
    color: #1a1a2e;
    margin-bottom: 0.4rem;
  }
  figcaption span {
    font-size: 0.9rem;
    color: #6c757d;
    line-height: 1.5;
  }
  .mermaid {
    display: flex;
    justify-content: center;
  }
  .legend {
    display: flex;
    justify-content: center;
    gap: 2rem;
    margin-top: 1rem;
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.85rem;
    color: #495057;
  }
  .legend-swatch {
    width: 16px;
    height: 16px;
    border-radius: 4px;
  }
  .swatch-shared { background: #6c757d; }
  .swatch-excitement { background: #2e86ab; }
  .swatch-anxiety { background: #d64045; }
</style>
</head>
<body>
<figure>
  <div class="mermaid">
%%{init: {'theme': 'neutral', 'themeVariables': {'fontSize': '14px'}}}%%
flowchart TD
    A["<b>Arousal Trigger</b><br/>Environmental stimulus detected"]:::shared
    B["<b>Amygdala Assessment</b><br/>Rapid threat/reward evaluation"]:::shared
    C["<b>SNS Activation</b><br/>Heart rate up, adrenaline released,<br/>alertness heightened"]:::shared

    C --> D{"<b>Prefrontal Cortex<br/>Appraisal</b>"}:::shared

    D -->|"Context = Safe / Rewarding"| E["<b>Reward Appraisal</b><br/>Ventral tegmental area activates"]:::excite
    D -->|"Context = Threatening"| F["<b>Threat Appraisal</b><br/>HPA axis activates"]:::anxious

    E --> G["<b>Dopamine Surge</b><br/>Nucleus accumbens, PFC"]:::excite
    E --> H["<b>Vagal Tone Maintained</b><br/>High HRV, RSA preserved"]:::excite
    G --> I["<b>Approach Motivation</b><br/>Engagement, exploration"]:::excite
    H --> I

    F --> J["<b>Cortisol Release</b><br/>Sustained stress response"]:::anxious
    F --> K["<b>Vagal Withdrawal</b><br/>Low HRV, RSA reduced"]:::anxious
    J --> L["<b>Avoidance Motivation</b><br/>Withdrawal, vigilance"]:::anxious
    K --> L

    A --> B --> C

    classDef shared fill:#e9ecef,stroke:#6c757d,stroke-width:2px,color:#1a1a2e
    classDef excite fill:#d4eaf7,stroke:#2e86ab,stroke-width:2px,color:#1a1a2e
    classDef anxious fill:#f8d7da,stroke:#d64045,stroke-width:2px,color:#1a1a2e
  </div>
  <div class="legend">
    <div class="legend-item"><div class="legend-swatch swatch-shared"></div> Shared pathway</div>
    <div class="legend-item"><div class="legend-swatch swatch-excitement"></div> Excitement cascade</div>
    <div class="legend-item"><div class="legend-swatch swatch-anxiety"></div> Anxiety cascade</div>
  </div>
  <figcaption>
    <strong>Diagram 1: Shared vs. Divergent Physiological Pathways</strong>
    <span>Both excitement and anxiety begin with identical sympathetic nervous system activation. The divergence occurs at the prefrontal cortex appraisal stage, producing two distinct neurochemical and autonomic cascades. Based on Schachter &amp; Singer (1962) two-factor theory and Brooks (2014) reappraisal research.</span>
  </figcaption>
</figure>
<script>
  mermaid.initialize({ startOnLoad: true, securityLevel: 'loose', theme: 'neutral' });
</script>
</body>
</html>
