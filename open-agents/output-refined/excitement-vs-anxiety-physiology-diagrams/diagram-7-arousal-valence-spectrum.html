<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arousal-Valence Circumplex Model</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #f8f9fa;
    color: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 2rem;
  }
  figure {
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
    max-width: 780px;
    width: 100%;
  }
  .svg-container {
    display: flex;
    justify-content: center;
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid #e9ecef;
  }
  figcaption strong {
    display: block;
    font-size: 1.15rem;
    color: #1a1a2e;
    margin-bottom: 0.4rem;
  }
  figcaption span {
    font-size: 0.9rem;
    color: #6c757d;
    line-height: 1.5;
  }
</style>
</head>
<body>
<figure>
  <div class="svg-container">
    <svg width="680" height="680" viewBox="0 0 680 680" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
      <defs>
        <!-- Quadrant background fills -->
        <linearGradient id="quadTL" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#f8d7da" stop-opacity="0.5"/>
          <stop offset="100%" stop-color="#f8d7da" stop-opacity="0.1"/>
        </linearGradient>
        <linearGradient id="quadTR" x1="100%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#d4eaf7" stop-opacity="0.5"/>
          <stop offset="100%" stop-color="#d4eaf7" stop-opacity="0.1"/>
        </linearGradient>
        <linearGradient id="quadBL" x1="0%" y1="100%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#e9ecef" stop-opacity="0.5"/>
          <stop offset="100%" stop-color="#e9ecef" stop-opacity="0.1"/>
        </linearGradient>
        <linearGradient id="quadBR" x1="100%" y1="100%" x2="0%" y2="0%">
          <stop offset="0%" stop-color="#e8f5e9" stop-opacity="0.5"/>
          <stop offset="100%" stop-color="#e8f5e9" stop-opacity="0.1"/>
        </linearGradient>
        <!-- Arrow marker -->
        <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
          <polygon points="0 0, 10 3.5, 0 7" fill="#7b5ea7"/>
        </marker>
        <!-- Glow filter for emotion dots -->
        <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur stdDeviation="4" result="blur"/>
          <feMerge>
            <feMergeNode in="blur"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>
      </defs>

      <!-- Quadrant backgrounds -->
      <rect x="60" y="30" width="280" height="300" rx="4" fill="url(#quadTL)"/>
      <rect x="340" y="30" width="280" height="300" rx="4" fill="url(#quadTR)"/>
      <rect x="60" y="330" width="280" height="300" rx="4" fill="url(#quadBL)"/>
      <rect x="340" y="330" width="280" height="300" rx="4" fill="url(#quadBR)"/>

      <!-- Quadrant labels -->
      <text x="200" y="60" text-anchor="middle" font-size="13" fill="#a0a0a0" font-weight="600" text-transform="uppercase" letter-spacing="0.05em">High Arousal / Negative</text>
      <text x="480" y="60" text-anchor="middle" font-size="13" fill="#a0a0a0" font-weight="600">High Arousal / Positive</text>
      <text x="200" y="614" text-anchor="middle" font-size="13" fill="#a0a0a0" font-weight="600">Low Arousal / Negative</text>
      <text x="480" y="614" text-anchor="middle" font-size="13" fill="#a0a0a0" font-weight="600">Low Arousal / Positive</text>

      <!-- Axes -->
      <line x1="340" y1="30" x2="340" y2="630" stroke="#adb5bd" stroke-width="1.5"/>
      <line x1="60" y1="330" x2="620" y2="330" stroke="#adb5bd" stroke-width="1.5"/>

      <!-- Axis labels -->
      <text x="340" y="20" text-anchor="middle" font-size="14" fill="#495057" font-weight="700">HIGH AROUSAL</text>
      <text x="340" y="655" text-anchor="middle" font-size="14" fill="#495057" font-weight="700">LOW AROUSAL</text>
      <text x="30" y="335" text-anchor="middle" font-size="14" fill="#495057" font-weight="700" transform="rotate(-90, 30, 330)">NEGATIVE VALENCE</text>
      <text x="650" y="335" text-anchor="middle" font-size="14" fill="#495057" font-weight="700" transform="rotate(90, 650, 330)">POSITIVE VALENCE</text>

      <!-- Grid lines (subtle) -->
      <line x1="200" y1="30" x2="200" y2="630" stroke="#dee2e6" stroke-width="0.5" stroke-dasharray="4,4"/>
      <line x1="480" y1="30" x2="480" y2="630" stroke="#dee2e6" stroke-width="0.5" stroke-dasharray="4,4"/>
      <line x1="60" y1="180" x2="620" y2="180" stroke="#dee2e6" stroke-width="0.5" stroke-dasharray="4,4"/>
      <line x1="60" y1="480" x2="620" y2="480" stroke="#dee2e6" stroke-width="0.5" stroke-dasharray="4,4"/>

      <!-- EMOTION POINTS -->

      <!-- ANXIETY - top left quadrant (high arousal, negative valence) -->
      <circle cx="185" cy="120" r="30" fill="#d64045" opacity="0.2" filter="url(#glow)"/>
      <circle cx="185" cy="120" r="16" fill="#d64045" stroke="#a83035" stroke-width="2.5"/>
      <text x="185" y="125" text-anchor="middle" font-size="13" fill="white" font-weight="700">ANXIETY</text>
      <text x="185" y="155" text-anchor="middle" font-size="11" fill="#8b1a1a">
        <tspan x="185" dy="0">Cortisol-dominant</tspan>
        <tspan x="185" dy="15">Vagal withdrawal</tspan>
        <tspan x="185" dy="15">Avoidance motivation</tspan>
      </text>

      <!-- EXCITEMENT - top right quadrant (high arousal, positive valence) -->
      <circle cx="490" cy="120" r="30" fill="#2e86ab" opacity="0.2" filter="url(#glow)"/>
      <circle cx="490" cy="120" r="16" fill="#2e86ab" stroke="#1a6d8e" stroke-width="2.5"/>
      <text x="490" y="125" text-anchor="middle" font-size="12" fill="white" font-weight="700">EXCITEMENT</text>
      <text x="490" y="155" text-anchor="middle" font-size="11" fill="#1a5570">
        <tspan x="490" dy="0">Dopamine-dominant</tspan>
        <tspan x="490" dy="15">Vagal tone maintained</tspan>
        <tspan x="490" dy="15">Approach motivation</tspan>
      </text>

      <!-- FEAR -->
      <circle cx="140" cy="90" r="9" fill="#e07070" stroke="#c44" stroke-width="1.5"/>
      <text x="110" y="82" text-anchor="end" font-size="11" fill="#6c757d">Fear</text>

      <!-- ANGER -->
      <circle cx="230" cy="95" r="9" fill="#e07070" stroke="#c44" stroke-width="1.5"/>
      <text x="230" y="82" text-anchor="middle" font-size="11" fill="#6c757d">Anger</text>

      <!-- STRESS -->
      <circle cx="250" cy="170" r="8" fill="#e8a0a0" stroke="#c88" stroke-width="1.5"/>
      <text x="270" y="168" text-anchor="start" font-size="11" fill="#6c757d">Stress</text>

      <!-- JOY -->
      <circle cx="470" cy="200" r="9" fill="#5bb0cc" stroke="#2e86ab" stroke-width="1.5"/>
      <text x="490" y="198" text-anchor="start" font-size="11" fill="#6c757d">Joy</text>

      <!-- ELATION -->
      <circle cx="530" cy="100" r="8" fill="#5bb0cc" stroke="#2e86ab" stroke-width="1.5"/>
      <text x="550" y="98" text-anchor="start" font-size="11" fill="#6c757d">Elation</text>

      <!-- SURPRISE -->
      <circle cx="370" cy="85" r="8" fill="#adb5bd" stroke="#868e96" stroke-width="1.5"/>
      <text x="370" y="72" text-anchor="middle" font-size="11" fill="#6c757d">Surprise</text>

      <!-- SADNESS - bottom left -->
      <circle cx="180" cy="480" r="9" fill="#adb5bd" stroke="#868e96" stroke-width="1.5"/>
      <text x="180" y="500" text-anchor="middle" font-size="11" fill="#6c757d">Sadness</text>

      <!-- DEPRESSION -->
      <circle cx="140" cy="530" r="8" fill="#c4c8cc" stroke="#adb5bd" stroke-width="1.5"/>
      <text x="140" y="550" text-anchor="middle" font-size="11" fill="#6c757d">Depression</text>

      <!-- BOREDOM -->
      <circle cx="250" cy="510" r="8" fill="#c4c8cc" stroke="#adb5bd" stroke-width="1.5"/>
      <text x="250" y="530" text-anchor="middle" font-size="11" fill="#6c757d">Boredom</text>

      <!-- CONTENTMENT - bottom right -->
      <circle cx="470" cy="460" r="9" fill="#81c784" stroke="#4caf50" stroke-width="1.5"/>
      <text x="470" y="480" text-anchor="middle" font-size="11" fill="#6c757d">Contentment</text>

      <!-- CALM -->
      <circle cx="520" cy="500" r="8" fill="#a5d6a7" stroke="#66bb6a" stroke-width="1.5"/>
      <text x="520" y="520" text-anchor="middle" font-size="11" fill="#6c757d">Calm</text>

      <!-- RELAXED -->
      <circle cx="420" cy="520" r="8" fill="#a5d6a7" stroke="#66bb6a" stroke-width="1.5"/>
      <text x="420" y="540" text-anchor="middle" font-size="11" fill="#6c757d">Relaxed</text>

      <!-- REAPPRAISAL ARROW (Anxiety -> Excitement) -->
      <path d="M 210 118 C 280 70, 380 70, 465 118"
            fill="none" stroke="#7b5ea7" stroke-width="3" stroke-dasharray="8,4"
            marker-end="url(#arrowhead)"/>
      <rect x="290" y="52" width="110" height="36" rx="8" fill="#7b5ea7" opacity="0.9"/>
      <text x="345" y="66" text-anchor="middle" font-size="11" fill="white" font-weight="600">REAPPRAISAL</text>
      <text x="345" y="80" text-anchor="middle" font-size="10" fill="#e0d0f0">(Brooks, 2014)</text>

      <!-- Annotation: "Same arousal level" bracket -->
      <line x1="185" y1="100" x2="185" y2="42" stroke="#7b5ea7" stroke-width="1" stroke-dasharray="3,3"/>
      <line x1="490" y1="100" x2="490" y2="42" stroke="#7b5ea7" stroke-width="1" stroke-dasharray="3,3"/>

      <!-- Shared arousal level annotation -->
      <text x="340" y="290" text-anchor="middle" font-size="12" fill="#7b5ea7" font-style="italic">
        <tspan x="340" dy="0">Arousal-congruent reappraisal:</tspan>
        <tspan x="340" dy="16">Shifting valence at the same arousal level</tspan>
        <tspan x="340" dy="16">is easier than trying to calm down</tspan>
      </text>
    </svg>
  </div>

  <figcaption>
    <strong>Diagram 7: The Arousal-Valence Circumplex (Russell's Model)</strong>
    <span>Based on Russell's circumplex model of affect. Emotions are mapped along two dimensions: arousal (low to high) and valence (negative to positive). Excitement and anxiety occupy the same high-arousal level but differ in valence. The dashed purple reappraisal arrow illustrates Brooks' (2014) finding that reappraising anxiety as excitement is more effective than trying to calm down, because it is "arousal congruent" -- it only requires shifting valence, not reducing arousal.</span>
  </figcaption>
</figure>
</body>
</html>
