<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Body Sensation Map: Excitement vs. Anxiety</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #f8f9fa;
    color: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 2rem;
  }
  figure {
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
    max-width: 1100px;
    width: 100%;
  }
  .diagram-container {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    gap: 3rem;
    flex-wrap: wrap;
  }
  .body-panel {
    text-align: center;
    flex: 0 1 auto;
  }
  .body-panel h3 {
    font-size: 1.2rem;
    margin-bottom: 0.75rem;
    letter-spacing: 0.02em;
  }
  .excitement-title { color: #2e86ab; }
  .anxiety-title { color: #d64045; }
  .body-panel .subtitle {
    font-size: 0.85rem;
    color: #6c757d;
    margin-bottom: 1rem;
  }
  svg.body-map { display: block; margin: 0 auto; }
  .annotation-list {
    text-align: left;
    margin-top: 1rem;
    padding: 0.75rem 1rem;
    border-radius: 8px;
    font-size: 0.82rem;
    line-height: 1.6;
    max-width: 320px;
  }
  .annotation-list.excitement {
    background: #eaf6fb;
    border-left: 3px solid #2e86ab;
  }
  .annotation-list.anxiety {
    background: #fdf0f0;
    border-left: 3px solid #d64045;
  }
  .annotation-list strong { display: block; margin-bottom: 0.25rem; }
  .legend-bar {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 0.25rem;
    margin: 1.5rem auto 0;
    max-width: 500px;
  }
  .legend-bar .grad-block {
    height: 16px;
    flex: 1;
    border-radius: 3px;
  }
  .legend-labels {
    display: flex;
    justify-content: space-between;
    max-width: 500px;
    margin: 0.25rem auto 0;
    font-size: 0.78rem;
    color: #6c757d;
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid #e9ecef;
  }
  figcaption strong {
    display: block;
    font-size: 1.15rem;
    color: #1a1a2e;
    margin-bottom: 0.4rem;
  }
  figcaption span {
    font-size: 0.9rem;
    color: #6c757d;
    line-height: 1.5;
  }
</style>
</head>
<body>
<figure>
  <div class="diagram-container">
    <!-- EXCITEMENT BODY -->
    <div class="body-panel">
      <h3 class="excitement-title">EXCITEMENT</h3>
      <p class="subtitle">Warm, expansive, energized</p>
      <svg class="body-map" width="220" height="440" viewBox="0 0 220 440" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="exciteChest" cx="50%" cy="40%" r="50%">
            <stop offset="0%" stop-color="#ff9f1c" stop-opacity="0.9"/>
            <stop offset="100%" stop-color="#ff9f1c" stop-opacity="0.1"/>
          </radialGradient>
          <radialGradient id="exciteHead" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#ffbf69" stop-opacity="0.7"/>
            <stop offset="100%" stop-color="#ffbf69" stop-opacity="0.1"/>
          </radialGradient>
          <linearGradient id="exciteArm" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#ff9f1c" stop-opacity="0.5"/>
            <stop offset="100%" stop-color="#ffbf69" stop-opacity="0.7"/>
          </linearGradient>
          <linearGradient id="exciteLeg" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#ff9f1c" stop-opacity="0.4"/>
            <stop offset="100%" stop-color="#ffbf69" stop-opacity="0.6"/>
          </linearGradient>
        </defs>
        <!-- Body outline -->
        <g fill="none" stroke="#c4c8cc" stroke-width="1.5">
          <!-- Head -->
          <ellipse cx="110" cy="45" rx="28" ry="34"/>
          <!-- Neck -->
          <rect x="100" y="78" width="20" height="18" rx="4"/>
          <!-- Torso -->
          <path d="M 70 96 Q 65 96 62 110 L 55 200 Q 54 210 62 215 L 80 220 Q 88 222 90 218 L 90 218 L 110 225 L 130 218 Q 132 222 140 220 L 158 215 Q 166 210 165 200 L 158 110 Q 155 96 150 96 Z"/>
          <!-- Left arm -->
          <path d="M 62 110 Q 42 115 32 160 L 22 220 Q 18 235 20 245 L 18 260" stroke-linecap="round"/>
          <path d="M 62 110 Q 48 112 40 155 L 30 218 Q 26 233 28 243 L 26 258" stroke-linecap="round"/>
          <!-- Right arm -->
          <path d="M 158 110 Q 178 115 188 160 L 198 220 Q 202 235 200 245 L 202 260" stroke-linecap="round"/>
          <path d="M 158 110 Q 172 112 180 155 L 190 218 Q 194 233 192 243 L 194 258" stroke-linecap="round"/>
          <!-- Left leg -->
          <path d="M 80 220 L 75 300 L 70 370 Q 68 385 65 400 L 60 420" stroke-linecap="round"/>
          <path d="M 110 225 L 105 300 L 100 370 Q 98 385 95 400 L 92 420" stroke-linecap="round"/>
          <!-- Right leg -->
          <path d="M 110 225 L 115 300 L 120 370 Q 122 385 125 400 L 128 420" stroke-linecap="round"/>
          <path d="M 140 220 L 145 300 L 150 370 Q 152 385 155 400 L 160 420" stroke-linecap="round"/>
        </g>
        <!-- Sensation overlays for EXCITEMENT -->
        <!-- Head: moderate warmth (engaged, alert) -->
        <ellipse cx="110" cy="45" rx="26" ry="32" fill="url(#exciteHead)"/>
        <!-- Chest: strong warmth & expansion (dominant sensation) -->
        <ellipse cx="110" cy="155" rx="48" ry="55" fill="url(#exciteChest)"/>
        <!-- Upper chest: openness -->
        <ellipse cx="110" cy="120" rx="38" ry="22" fill="#ff9f1c" opacity="0.45"/>
        <!-- Belly: gentle fluttery sensation -->
        <ellipse cx="110" cy="200" rx="30" ry="20" fill="#ffbf69" opacity="0.35"/>
        <!-- Arms: energy flowing outward (warm) -->
        <ellipse cx="40" cy="190" rx="14" ry="55" fill="url(#exciteArm)" transform="rotate(-10 40 190)"/>
        <ellipse cx="180" cy="190" rx="14" ry="55" fill="url(#exciteArm)" transform="rotate(10 180 190)"/>
        <!-- Hands: warm -->
        <ellipse cx="22" cy="255" rx="10" ry="12" fill="#ffbf69" opacity="0.65"/>
        <ellipse cx="198" cy="255" rx="10" ry="12" fill="#ffbf69" opacity="0.65"/>
        <!-- Legs: activated, energized -->
        <ellipse cx="87" cy="330" rx="16" ry="60" fill="url(#exciteLeg)"/>
        <ellipse cx="133" cy="330" rx="16" ry="60" fill="url(#exciteLeg)"/>
        <!-- Feet: warm -->
        <ellipse cx="76" cy="415" rx="14" ry="10" fill="#ffbf69" opacity="0.5"/>
        <ellipse cx="144" cy="415" rx="14" ry="10" fill="#ffbf69" opacity="0.5"/>
      </svg>
      <div class="annotation-list excitement">
        <strong>Typical sensations:</strong>
        Chest: Warmth, openness, expansion<br/>
        Stomach: Light fluttering ("butterflies")<br/>
        Limbs: Energized, ready to move<br/>
        Hands: Warm<br/>
        Breathing: Quick but deep<br/>
        Muscles: Activated, not tense
      </div>
    </div>

    <!-- ANXIETY BODY -->
    <div class="body-panel">
      <h3 class="anxiety-title">ANXIETY</h3>
      <p class="subtitle">Tight, constricted, cold extremities</p>
      <svg class="body-map" width="220" height="440" viewBox="0 0 220 440" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="anxChest" cx="50%" cy="45%" r="45%">
            <stop offset="0%" stop-color="#d64045" stop-opacity="0.85"/>
            <stop offset="100%" stop-color="#d64045" stop-opacity="0.1"/>
          </radialGradient>
          <radialGradient id="anxHead" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#d64045" stop-opacity="0.6"/>
            <stop offset="100%" stop-color="#e07070" stop-opacity="0.1"/>
          </radialGradient>
          <radialGradient id="anxThroat" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#d64045" stop-opacity="0.75"/>
            <stop offset="100%" stop-color="#d64045" stop-opacity="0.2"/>
          </radialGradient>
          <radialGradient id="anxStomach" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#d64045" stop-opacity="0.65"/>
            <stop offset="100%" stop-color="#e07070" stop-opacity="0.1"/>
          </radialGradient>
        </defs>
        <!-- Body outline -->
        <g fill="none" stroke="#c4c8cc" stroke-width="1.5">
          <ellipse cx="110" cy="45" rx="28" ry="34"/>
          <rect x="100" y="78" width="20" height="18" rx="4"/>
          <path d="M 70 96 Q 65 96 62 110 L 55 200 Q 54 210 62 215 L 80 220 Q 88 222 90 218 L 90 218 L 110 225 L 130 218 Q 132 222 140 220 L 158 215 Q 166 210 165 200 L 158 110 Q 155 96 150 96 Z"/>
          <path d="M 62 110 Q 42 115 32 160 L 22 220 Q 18 235 20 245 L 18 260" stroke-linecap="round"/>
          <path d="M 62 110 Q 48 112 40 155 L 30 218 Q 26 233 28 243 L 26 258" stroke-linecap="round"/>
          <path d="M 158 110 Q 178 115 188 160 L 198 220 Q 202 235 200 245 L 202 260" stroke-linecap="round"/>
          <path d="M 158 110 Q 172 112 180 155 L 190 218 Q 194 233 192 243 L 194 258" stroke-linecap="round"/>
          <path d="M 80 220 L 75 300 L 70 370 Q 68 385 65 400 L 60 420" stroke-linecap="round"/>
          <path d="M 110 225 L 105 300 L 100 370 Q 98 385 95 400 L 92 420" stroke-linecap="round"/>
          <path d="M 110 225 L 115 300 L 120 370 Q 122 385 125 400 L 128 420" stroke-linecap="round"/>
          <path d="M 140 220 L 145 300 L 150 370 Q 152 385 155 400 L 160 420" stroke-linecap="round"/>
        </g>
        <!-- Sensation overlays for ANXIETY -->
        <!-- Head: racing thoughts, tension headache -->
        <ellipse cx="110" cy="45" rx="26" ry="32" fill="url(#anxHead)"/>
        <!-- Throat: lump, constriction -->
        <ellipse cx="110" cy="88" rx="16" ry="14" fill="url(#anxThroat)"/>
        <!-- Shoulders: tension -->
        <ellipse cx="74" cy="104" rx="16" ry="10" fill="#d64045" opacity="0.55"/>
        <ellipse cx="146" cy="104" rx="16" ry="10" fill="#d64045" opacity="0.55"/>
        <!-- Chest: tightness, constriction -->
        <ellipse cx="110" cy="145" rx="42" ry="35" fill="url(#anxChest)"/>
        <!-- Stomach: churning, nausea -->
        <ellipse cx="110" cy="200" rx="32" ry="22" fill="url(#anxStomach)"/>
        <!-- Arms: minimal activation / tense -->
        <ellipse cx="42" cy="170" rx="10" ry="30" fill="#e07070" opacity="0.2" transform="rotate(-10 42 170)"/>
        <ellipse cx="178" cy="170" rx="10" ry="30" fill="#e07070" opacity="0.2" transform="rotate(10 178 170)"/>
        <!-- Hands: cold, clammy (blue tones) -->
        <ellipse cx="22" cy="255" rx="10" ry="12" fill="#5b8fa8" opacity="0.6"/>
        <ellipse cx="198" cy="255" rx="10" ry="12" fill="#5b8fa8" opacity="0.6"/>
        <!-- Legs: weak/shaky or deactivated -->
        <ellipse cx="87" cy="340" rx="13" ry="40" fill="#5b8fa8" opacity="0.15"/>
        <ellipse cx="133" cy="340" rx="13" ry="40" fill="#5b8fa8" opacity="0.15"/>
        <!-- Feet: cold -->
        <ellipse cx="76" cy="415" rx="14" ry="10" fill="#5b8fa8" opacity="0.5"/>
        <ellipse cx="144" cy="415" rx="14" ry="10" fill="#5b8fa8" opacity="0.5"/>
      </svg>
      <div class="annotation-list anxiety">
        <strong>Typical sensations:</strong>
        Head: Racing thoughts, pressure<br/>
        Throat: Lump, tightness<br/>
        Shoulders: Tension, guarding<br/>
        Chest: Constriction, tightness<br/>
        Stomach: Churning, nausea<br/>
        Hands/Feet: Cold, clammy<br/>
        Breathing: Shallow, rapid<br/>
        Muscles: Tense, defensive
      </div>
    </div>
  </div>

  <div class="legend-bar">
    <div class="grad-block" style="background: #5b8fa8;"></div>
    <div class="grad-block" style="background: #8db8cc;"></div>
    <div class="grad-block" style="background: #c4c8cc;"></div>
    <div class="grad-block" style="background: #e8c57a;"></div>
    <div class="grad-block" style="background: #ffbf69;"></div>
    <div class="grad-block" style="background: #ff9f1c;"></div>
    <div class="grad-block" style="background: #d64045;"></div>
  </div>
  <div class="legend-labels">
    <span>Cold / Deactivated</span>
    <span>Neutral</span>
    <span>Warm / Activated</span>
    <span>Tense / Constricted</span>
  </div>

  <figcaption>
    <strong>Diagram 3: Body Sensation Map -- Excitement vs. Anxiety</strong>
    <span>Inspired by Nummenmaa et al. (2014) research on bodily maps of emotions. Excitement produces warmth and energy throughout the body with an expansive chest sensation. Anxiety concentrates tension in the head, throat, chest, and stomach, with cold extremities. These topographical differences provide concrete body-based anchors for emotion identification.</span>
  </figcaption>
</figure>
</body>
</html>
