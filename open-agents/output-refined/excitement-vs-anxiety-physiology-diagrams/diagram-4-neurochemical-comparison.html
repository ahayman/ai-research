<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neurochemical Profiles: Excitement vs. Anxiety</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #f8f9fa;
    color: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 2rem;
  }
  figure {
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
    max-width: 960px;
    width: 100%;
  }
  h2 {
    text-align: center;
    font-size: 1.1rem;
    color: #495057;
    margin-bottom: 1.5rem;
    font-weight: 500;
  }
  .chart-container {
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
  }
  .chem-row {
    display: flex;
    align-items: stretch;
    gap: 0;
  }
  .chem-label {
    width: 160px;
    min-width: 160px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding-right: 1rem;
    text-align: right;
  }
  .chem-label .name {
    font-weight: 700;
    font-size: 0.95rem;
    color: #1a1a2e;
  }
  .chem-label .aka {
    font-size: 0.78rem;
    color: #868e96;
    margin-top: 2px;
  }
  .bars-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 6px;
  }
  .bar-row {
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .bar-state-label {
    width: 80px;
    min-width: 80px;
    font-size: 0.8rem;
    font-weight: 600;
    text-align: right;
  }
  .bar-state-label.excitement { color: #2e86ab; }
  .bar-state-label.anxiety { color: #d64045; }
  .bar-track {
    flex: 1;
    height: 28px;
    background: #f1f3f5;
    border-radius: 6px;
    overflow: hidden;
    position: relative;
  }
  .bar-fill {
    height: 100%;
    border-radius: 6px;
    display: flex;
    align-items: center;
    padding-left: 10px;
    font-size: 0.78rem;
    font-weight: 600;
    color: white;
    transition: width 0.6s ease;
    min-width: fit-content;
  }
  .bar-fill.excitement { background: linear-gradient(90deg, #2e86ab, #48a9c5); }
  .bar-fill.anxiety { background: linear-gradient(90deg, #d64045, #e67a7d); }
  .bar-fill.shared-ex { background: linear-gradient(90deg, #2e86ab, #48a9c5); }
  .bar-fill.shared-anx { background: linear-gradient(90deg, #d64045, #e67a7d); }
  .bar-note {
    font-size: 0.75rem;
    color: #868e96;
    margin-left: 8px;
    white-space: nowrap;
  }
  .divider {
    border: none;
    border-top: 1px dashed #dee2e6;
    margin: 0.25rem 0;
  }
  .section-label {
    text-align: center;
    font-size: 0.78rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #adb5bd;
    margin-top: 0.5rem;
    margin-bottom: -0.5rem;
  }
  .key-diff {
    background: #fff8e1;
    border-left: 4px solid #ff9f1c;
    border-radius: 0 8px 8px 0;
    padding: 0.75rem 1rem;
    margin-top: 1.25rem;
    font-size: 0.88rem;
    line-height: 1.5;
    color: #495057;
  }
  .key-diff strong { color: #e67700; }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid #e9ecef;
  }
  figcaption strong {
    display: block;
    font-size: 1.15rem;
    color: #1a1a2e;
    margin-bottom: 0.4rem;
  }
  figcaption span {
    font-size: 0.9rem;
    color: #6c757d;
    line-height: 1.5;
  }
</style>
</head>
<body>
<figure>
  <h2>Relative Neurochemical Levels During Excitement vs. Anxiety</h2>
  <div class="chart-container">
    <p class="section-label">Key Differentiators</p>

    <!-- Dopamine -->
    <div class="chem-row">
      <div class="chem-label">
        <span class="name">Dopamine</span>
        <span class="aka">Reward &amp; motivation</span>
      </div>
      <div class="bars-area">
        <div class="bar-row">
          <span class="bar-state-label excitement">Excitement</span>
          <div class="bar-track">
            <div class="bar-fill excitement" style="width: 88%;">HIGH</div>
          </div>
          <span class="bar-note">VTA &rarr; nucleus accumbens</span>
        </div>
        <div class="bar-row">
          <span class="bar-state-label anxiety">Anxiety</span>
          <div class="bar-track">
            <div class="bar-fill anxiety" style="width: 22%;">LOW</div>
          </div>
          <span class="bar-note">Reward circuits suppressed</span>
        </div>
      </div>
    </div>

    <!-- Cortisol -->
    <div class="chem-row">
      <div class="chem-label">
        <span class="name">Cortisol</span>
        <span class="aka">Stress hormone (HPA axis)</span>
      </div>
      <div class="bars-area">
        <div class="bar-row">
          <span class="bar-state-label excitement">Excitement</span>
          <div class="bar-track">
            <div class="bar-fill excitement" style="width: 15%;">LOW</div>
          </div>
          <span class="bar-note">Minimal HPA activation</span>
        </div>
        <div class="bar-row">
          <span class="bar-state-label anxiety">Anxiety</span>
          <div class="bar-track">
            <div class="bar-fill anxiety" style="width: 85%;">HIGH</div>
          </div>
          <span class="bar-note">Sustained stress response</span>
        </div>
      </div>
    </div>

    <!-- Serotonin -->
    <div class="chem-row">
      <div class="chem-label">
        <span class="name">Serotonin</span>
        <span class="aka">Mood modulation</span>
      </div>
      <div class="bars-area">
        <div class="bar-row">
          <span class="bar-state-label excitement">Excitement</span>
          <div class="bar-track">
            <div class="bar-fill excitement" style="width: 65%;">MODERATE-HIGH</div>
          </div>
          <span class="bar-note">Positive mood facilitation</span>
        </div>
        <div class="bar-row">
          <span class="bar-state-label anxiety">Anxiety</span>
          <div class="bar-track">
            <div class="bar-fill anxiety" style="width: 30%;">LOW-MOD</div>
          </div>
          <span class="bar-note">Dysregulated signaling</span>
        </div>
      </div>
    </div>

    <hr class="divider"/>
    <p class="section-label">Shared (Present in Both States)</p>

    <!-- Norepinephrine -->
    <div class="chem-row">
      <div class="chem-label">
        <span class="name">Norepinephrine</span>
        <span class="aka">Alertness &amp; focus</span>
      </div>
      <div class="bars-area">
        <div class="bar-row">
          <span class="bar-state-label excitement">Excitement</span>
          <div class="bar-track">
            <div class="bar-fill shared-ex" style="width: 70%;">ELEVATED</div>
          </div>
          <span class="bar-note">Focused approach energy</span>
        </div>
        <div class="bar-row">
          <span class="bar-state-label anxiety">Anxiety</span>
          <div class="bar-track">
            <div class="bar-fill shared-anx" style="width: 75%;">ELEVATED</div>
          </div>
          <span class="bar-note">Scanning vigilance</span>
        </div>
      </div>
    </div>

    <!-- Epinephrine -->
    <div class="chem-row">
      <div class="chem-label">
        <span class="name">Epinephrine</span>
        <span class="aka">Adrenaline</span>
      </div>
      <div class="bars-area">
        <div class="bar-row">
          <span class="bar-state-label excitement">Excitement</span>
          <div class="bar-track">
            <div class="bar-fill shared-ex" style="width: 65%;">ELEVATED</div>
          </div>
          <span class="bar-note">Energizing mobilization</span>
        </div>
        <div class="bar-row">
          <span class="bar-state-label anxiety">Anxiety</span>
          <div class="bar-track">
            <div class="bar-fill shared-anx" style="width: 70%;">ELEVATED</div>
          </div>
          <span class="bar-note">Fight-or-flight readiness</span>
        </div>
      </div>
    </div>
  </div>

  <div class="key-diff">
    <strong>The key biochemical marker:</strong> The dopamine-to-cortisol ratio is the clearest neurochemical differentiator. Excitement is dopamine-dominant (high reward, low stress). Anxiety is cortisol-dominant (high stress, low reward). Norepinephrine and epinephrine are elevated in both states, which is why they feel so similar at the surface level.
  </div>

  <figcaption>
    <strong>Diagram 4: Neurochemical Profiles -- Excitement vs. Anxiety</strong>
    <span>Comparative view of the five key neurochemicals involved in high-arousal emotional states. The dopamine/cortisol divergence is the primary biochemical signature that distinguishes excitement from anxiety, while norepinephrine and epinephrine are shared drivers of the overlapping sensations.</span>
  </figcaption>
</figure>
</body>
</html>
