<title>Polyvagal States: Excitement vs. Anxiety</title>

    background: linear-gradient(135deg, #d4eaf7, #e8d5f5);
    border-radius: 10px;
    padding: 1rem 1.5rem;
    margin-top: 1.25rem;

  }
  .key-insight strong { color: #2e86ab; }

<body>
<figure>
  <div class="mermaid">
%%{init: {'theme': 'neutral', 'themeVariables': {'fontSize': '13px'}}}%%
stateDiagram-v2
    direction TB

    state "VENTRAL VAGAL\n(Social Engagement / Safety)" as VV {
        direction LR
        state "Calm, connected\nHigh vagal tone\nSocial engagement active\nFacial expressiveness" as VV_desc
    }

    state "SYMPATHETIC\n(Fight / Flight / Mobilization)" as SYM {
        direction LR
        state "High arousal\nHeart rate elevated\nAdrenaline released\nMobilized for action" as SYM_desc
    }

    state "DORSAL VAGAL\n(Shutdown / Freeze / Collapse)" as DV {
        direction LR
        state "Immobilization\nDissociation\nNumbing\nEnergy conservation" as DV_desc
    }

    state "EXCITEMENT\n(Ventral Vagal + Sympathetic\nCO-ACTIVATION)" as EX {
        direction LR
        state "High arousal WITH safety\nPlay, joy, passionate engagement\nHigh HRV maintained\nApproach motivation" as EX_desc
    }

    state "ANXIETY\n(Sympathetic DOMINANCE\nVagal Withdrawal)" as ANX {
        direction LR
        state "High arousal WITHOUT safety\nFear, dread, hypervigilance\nLow HRV\nAvoidance motivation" as ANX_desc
    }

    [*] --> VV : Safety cues detected
    VV --> EX : Positive arousal +\nsafety maintained
    VV --> SYM : Safety cues lost
    SYM --> ANX : Threat persists,\nvagal withdrawal
    SYM --> VV : Safety restored,\nco-regulation
    SYM --> DV : Overwhelming threat,\nsystem collapse
    DV --> SYM : Mobilization returns
    DV --> VV : Safety slowly restored
    EX --> VV : Arousal subsides,\ncalm returns
    ANX --> EX : Reappraisal\n(Brooks, 2014)
    ANX --> DV : Overwhelm / shutdown
  </div>
  <div class="key-insight">
    <strong>Key insight:</strong> Excitement is NOT simply sympathetic activation. It is a unique co-activation state where the ventral vagal (safety/social) system remains engaged alongside sympathetic arousal. Anxiety, by contrast, involves sympathetic dominance with vagal withdrawal. This is why excitement feels energizing while anxiety feels depleting.
  </div>
  <figcaption>
    <strong>Diagram 2: Autonomic Nervous System States (Polyvagal Theory)</strong>
    <span>Based on Stephen Porges' Polyvagal Theory (2011). The three hierarchical autonomic states and how excitement and anxiety map onto different activation patterns. The reappraisal arrow from Anxiety to Excitement reflects Brooks (2014) research on arousal-congruent cognitive reappraisal.</span>
  </figcaption>
</figure>
