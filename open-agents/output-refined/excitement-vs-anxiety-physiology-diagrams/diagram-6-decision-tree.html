<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Body Signal Decision Tree</title>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #f8f9fa;
    color: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 2rem;
  }
  figure {
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
    max-width: 1100px;
    width: 100%;
  }
  .preamble {
    text-align: center;
    background: #f0f4f8;
    border-radius: 10px;
    padding: 1rem 1.5rem;
    margin-bottom: 1.5rem;
    font-size: 0.9rem;
    color: #495057;
    line-height: 1.5;
  }
  .preamble strong { color: #2e86ab; }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid #e9ecef;
  }
  figcaption strong {
    display: block;
    font-size: 1.15rem;
    color: #1a1a2e;
    margin-bottom: 0.4rem;
  }
  figcaption span {
    font-size: 0.9rem;
    color: #6c757d;
    line-height: 1.5;
  }
  .mermaid {
    display: flex;
    justify-content: center;
  }
  .legend {
    display: flex;
    justify-content: center;
    gap: 1.5rem;
    margin-top: 1rem;
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.82rem;
    color: #495057;
  }
  .legend-swatch {
    width: 14px;
    height: 14px;
    border-radius: 3px;
  }
  .sw-start { background: #495057; }
  .sw-check { background: #f5f0e1; border: 2px solid #c8a951; }
  .sw-excite { background: #d4eaf7; border: 2px solid #2e86ab; }
  .sw-anxiety { background: #fdf0f0; border: 2px solid #d64045; }
  .sw-mixed { background: #e8d5f5; border: 2px solid #7b5ea7; }
</style>
</head>
<body>
<figure>
  <div class="preamble">
    <strong>Practical Tool:</strong> When you notice high arousal and cannot tell if it is excitement or anxiety, work through these body checks one at a time. Tally your results at the end.
  </div>
  <div class="mermaid">
%%{init: {'theme': 'neutral', 'themeVariables': {'fontSize': '12px'}}}%%
flowchart TD
    START["<b>I notice high arousal</b><br/>Heart racing, energy surge,<br/>heightened alertness"]:::start

    START --> Q1{"<b>1. BREATHING</b><br/>How am I breathing?"}:::check

    Q1 -->|"Shallow, tight,<br/>hard to get full breath"| A1["Anxiety signal"]:::anx
    Q1 -->|"Quick but deep,<br/>full breaths"| E1["Excitement signal"]:::exc

    A1 --> Q2{"<b>2. MUSCLES</b><br/>What are my<br/>muscles doing?"}:::check
    E1 --> Q2

    Q2 -->|"Tense, guarding,<br/>shoulders up, jaw tight"| A2["Anxiety signal"]:::anx
    Q2 -->|"Energized, ready,<br/>wanting to move"| E2["Excitement signal"]:::exc

    A2 --> Q3{"<b>3. STOMACH</b><br/>What does my<br/>stomach feel like?"}:::check
    E2 --> Q3

    Q3 -->|"Churning, nauseous,<br/>heavy, knotted"| A3["Anxiety signal"]:::anx
    Q3 -->|"Fluttery, light,<br/>butterflies"| E3["Excitement signal"]:::exc

    A3 --> Q4{"<b>4. THOUGHTS</b><br/>What are my<br/>thoughts doing?"}:::check
    E3 --> Q4

    Q4 -->|"'What if...' worry<br/>Imagining bad outcomes"| A4["Anxiety signal"]:::anx
    Q4 -->|"'I want to...' anticipation<br/>Imagining engagement"| E4["Excitement signal"]:::exc

    A4 --> Q5{"<b>5. HANDS</b><br/>What do my<br/>hands feel like?"}:::check
    E4 --> Q5

    Q5 -->|"Cold, clammy,<br/>tingling, numb"| A5["Anxiety signal"]:::anx
    Q5 -->|"Warm, steady,<br/>or energized"| E5["Excitement signal"]:::exc

    A5 --> Q6{"<b>6. CHEST</b><br/>What does my<br/>chest feel like?"}:::check
    E5 --> Q6

    Q6 -->|"Tight, constricted,<br/>pressure, heavy"| A6["Anxiety signal"]:::anx
    Q6 -->|"Open, expansive,<br/>warm, buoyant"| E6["Excitement signal"]:::exc

    A6 --> TALLY["<b>TALLY YOUR SIGNALS</b><br/>Count excitement vs.<br/>anxiety signals"]:::start
    E6 --> TALLY

    TALLY -->|"4-6 excitement<br/>signals"| RES_E["<b>LIKELY EXCITEMENT</b><br/>Your body is in approach mode.<br/>This arousal is positive energy.<br/>Lean into it!"]:::result_exc
    TALLY -->|"4-6 anxiety<br/>signals"| RES_A["<b>LIKELY ANXIETY</b><br/>Your body is in protection mode.<br/>Use grounding or co-regulation.<br/>The arousal may ease."]:::result_anx
    TALLY -->|"Roughly equal<br/>or unclear"| RES_M["<b>MIXED STATE</b><br/>Both are present. This is normal.<br/>Acknowledge both. Check again<br/>in 15-30 minutes for clarity."]:::result_mix

    classDef start fill:#e9ecef,stroke:#495057,stroke-width:2px,color:#1a1a2e
    classDef check fill:#fdf6e3,stroke:#c8a951,stroke-width:2px,color:#1a1a2e
    classDef exc fill:#d4eaf7,stroke:#2e86ab,stroke-width:2px,color:#1a1a2e
    classDef anx fill:#fdf0f0,stroke:#d64045,stroke-width:2px,color:#1a1a2e
    classDef result_exc fill:#2e86ab,stroke:#1a6d8e,stroke-width:3px,color:#ffffff
    classDef result_anx fill:#d64045,stroke:#a83035,stroke-width:3px,color:#ffffff
    classDef result_mix fill:#7b5ea7,stroke:#5e4580,stroke-width:3px,color:#ffffff
  </div>
  <div class="legend">
    <div class="legend-item"><div class="legend-swatch sw-start"></div> Start / Tally</div>
    <div class="legend-item"><div class="legend-swatch sw-check"></div> Body check question</div>
    <div class="legend-item"><div class="legend-swatch sw-excite"></div> Excitement signal</div>
    <div class="legend-item"><div class="legend-swatch sw-anxiety"></div> Anxiety signal</div>
    <div class="legend-item"><div class="legend-swatch sw-mixed"></div> Mixed state</div>
  </div>
  <figcaption>
    <strong>Diagram 6: Practical Decision Tree for Body Signal Interpretation</strong>
    <span>A systematic body-checking tool designed for individuals with alexithymia or interoceptive processing differences. Rather than trying to "identify the feeling" directly, this approach checks six concrete body markers and tallies the results. Based on somatic marker research (Damasio, 1994) and interoceptive training principles (Mahler, 2016). Note: Mixed states are normal and common -- acknowledge both rather than forcing a single label.</span>
  </figcaption>
</figure>
<script>
  mermaid.initialize({ startOnLoad: true, securityLevel: 'loose', theme: 'neutral' });
</script>
</body>
</html>
