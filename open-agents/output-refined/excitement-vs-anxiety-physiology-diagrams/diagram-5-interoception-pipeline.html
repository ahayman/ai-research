<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interoception Processing Pipeline</title>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #f8f9fa;
    color: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 2rem;
  }
  figure {
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
    max-width: 1000px;
    width: 100%;
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid #e9ecef;
  }
  figcaption strong {
    display: block;
    font-size: 1.15rem;
    color: #1a1a2e;
    margin-bottom: 0.4rem;
  }
  figcaption span {
    font-size: 0.9rem;
    color: #6c757d;
    line-height: 1.5;
  }
  .mermaid {
    display: flex;
    justify-content: center;
  }
  .legend {
    display: flex;
    justify-content: center;
    gap: 1.5rem;
    margin-top: 1.25rem;
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.82rem;
    color: #495057;
  }
  .legend-swatch {
    width: 16px;
    height: 16px;
    border-radius: 4px;
  }
  .swatch-normal { background: #2e86ab; }
  .swatch-disrupt { background: #d64045; border: 2px dashed #a03035; }
  .swatch-process { background: #6c757d; }
</style>
</head>
<body>
<figure>
  <div class="mermaid">
%%{init: {'theme': 'neutral', 'themeVariables': {'fontSize': '13px'}}}%%
flowchart TD
    subgraph BODY ["BODY SIGNALS"]
        direction LR
        H["Heart<br/>rate, rhythm"]:::body
        G["Gut<br/>churning, fluttering"]:::body
        M["Muscles<br/>tension, energy"]:::body
        S["Skin<br/>temperature, sweat"]:::body
        R["Respiration<br/>depth, rate"]:::body
    end

    H & G & M & S & R --> T["<b>Vagus Nerve &amp; Spinal Cord</b><br/>Signal transmission to brain"]:::process

    T --> INS["<b>Insular Cortex (Insula)</b><br/>Primary interoceptive hub<br/>Integrates body signals into<br/>conscious awareness"]:::process

    INS --> INT["<b>Signal Integration</b><br/>Body signals + Context + Memory<br/>+ Learned associations"]:::process

    INT --> LAB["<b>Emotion Identification</b><br/>Arousal labeled as specific emotion<br/>(excitement, anxiety, fear, joy...)"]:::process

    LAB --> BEH["<b>Behavioral Response</b><br/>Approach / Avoidance / Mixed"]:::process

    %% Alexithymia disruption points
    AX1["ALEXITHYMIA<br/>Disruption Point 1<br/><i>Reduced interoceptive<br/>accuracy: body signals<br/>detected with less<br/>precision &amp; clarity</i>"]:::disrupt
    AX2["ALEXITHYMIA<br/>Disruption Point 2<br/><i>Impaired signal-to-emotion<br/>mapping: difficulty linking<br/>body sensation to<br/>specific emotion label</i>"]:::disrupt
    AX3["ALEXITHYMIA<br/>Disruption Point 3<br/><i>Default to high-arousal =<br/>anxiety interpretation.<br/>Excitement misidentified<br/>as threat.</i>"]:::disrupt

    AX1 -. "Weakened<br/>signal" .-> INS
    AX2 -. "Confused<br/>mapping" .-> INT
    AX3 -. "Biased<br/>labeling" .-> LAB

    classDef body fill:#e8f4f8,stroke:#2e86ab,stroke-width:2px,color:#1a1a2e
    classDef process fill:#e9ecef,stroke:#6c757d,stroke-width:2px,color:#1a1a2e
    classDef disrupt fill:#fdf0f0,stroke:#d64045,stroke-width:2px,stroke-dasharray:5 5,color:#8b1a1a
  </div>
  <div class="legend">
    <div class="legend-item"><div class="legend-swatch swatch-normal"></div> Body signal sources</div>
    <div class="legend-item"><div class="legend-swatch swatch-process"></div> Processing stages</div>
    <div class="legend-item"><div class="legend-swatch swatch-disrupt"></div> Alexithymia disruption points</div>
  </div>
  <figcaption>
    <strong>Diagram 5: Interoception Processing Pipeline</strong>
    <span>How internal body signals are processed into emotional awareness, and where alexithymia disrupts the pipeline. Based on research by Murphy et al. (2017), Shah et al. (2016), and Garfinkel et al. (2016). Alexithymia creates difficulties at three key stages: detecting signals accurately (interoceptive accuracy), mapping signals to emotions (integration), and correctly labeling the emotional state (identification). This triple disruption explains why excitement is frequently misidentified as anxiety.</span>
  </figcaption>
</figure>
<script>
  mermaid.initialize({ startOnLoad: true, securityLevel: 'loose', theme: 'neutral' });
</script>
</body>
</html>
