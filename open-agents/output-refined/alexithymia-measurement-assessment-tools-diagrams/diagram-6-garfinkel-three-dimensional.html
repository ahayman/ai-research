    Garf["Garfinkel et al. 2015<br/><i>Knowing your own heart</i><br/>Biological Psychology 104:65-74<br/><strong>Three dissociable dimensions of interoception</strong>"]

    Garf --> IAcc["INTEROCEPTIVE ACCURACY<br/>(IAcc)<br/>Objective performance<br/>on a behavioural task<br/><i>e.g. heartbeat-detection (HCD)</i><br/><br/>Q: 'How accurate are you<br/>at detecting body signals?'"]
    Garf --> ISen["INTEROCEPTIVE SENSIBILITY<br/>(ISen)<br/>Self-reported tendency<br/>to attend to body signals<br/><i>e.g. MAIA self-report</i><br/><br/>Q: 'How much do you<br/>attend to body signals?'"]
    Garf --> IAw["INTEROCEPTIVE AWARENESS<br/>(IAw)<br/>Metacognitive correspondence<br/>between IAcc and ISen<br/><br/>Q: 'How well-calibrated is<br/>your knowledge of your own<br/>signal-reading ability?'"]

    Disc["These three are DISSOCIABLE.<br/>A person can be high on one and low on another."]
    Garf -.- Disc

    IAcc --> Profile1["High IAcc + High ISen + High IAw<br/>= well-calibrated interoceptor"]
    IAcc --> Profile2["Low IAcc + Low ISen<br/>= 'no-detection-deficit' alexithymia"]
    IAcc --> Profile3["Low IAcc + High ISen<br/>= 'hypervigilance with mislabelling'<br/>Lots of body attention,<br/>poor inferences about meaning<br/><strong>→ Somatic-symptom-disorder profile</strong>"]
    IAcc --> Profile4["High IAcc + Low ISen<br/>= signals present, attention<br/>elsewhere<br/>(emotional bypass?)"]

    Quad["<strong>Aaron, Blain, Snodgress, Park 2020</strong><br/>(Frontiers in Psychiatry, PMC7076086)<br/>Quadratic relationship between<br/>alexithymia and IAcc:<br/>BOTH low-IAcc and high-IAcc<br/>tended to show elevated alexithymia,<br/>with mid-range IAcc as the protective profile.<br/><br/><i>Consistent with the parsing-deficit framework</i>"]

    IAcc -.- HCT

  <figcaption>
    <strong>Figure 6.</strong> Garfinkel's three-dimensional interoception model. The architectural insight is that body-signal <em>detection</em> (IAcc), self-reported <em>attention</em> to body signals (ISen), and the <em>metacognitive calibration</em> between them (IAw) are three dissociable dimensions. The combinations matter: low IAcc + high ISen is the somatic-symptom-disorder profile (lots of body attention, poor inferences) and is the population for whom open-ended interoceptive training is most likely to backfire. The quadratic finding (Aaron et al. 2020, PMC7076086) — that both very low and very high IAcc associate with elevated alexithymia — supports the parsing-deficit framework: the deficit is in <em>appropriate</em> body attention and the labelling that follows, not in detection per se.
  </figcaption>
