<figure class="concept-diagram" id="diagram-7">
  <div class="diagram-container">
    <pre class="mermaid">
flowchart TD
    Start(["I want to understand my<br/>alexithymia profile"])

    Start --> Q1{"What's the<br/>primary question?"}

    Q1 -->|"Generic alexithymia<br/>label, comparing to<br/>published research"| TAS["TAS-20<br/>(start here for almost everyone)<br/><i>Free online; ~3 min</i>"]
    Q1 -->|"Cognitive vs.<br/>affective dimensions<br/>(Type I vs Type II)"| BVAQ["TAS-20 + BVAQ<br/><i>BVAQ adds fantasising +<br/>emotionalising</i>"]
    Q1 -->|"Positive vs.<br/>negative emotion<br/>impairment"| PAQ["TAS-20 + PAQ<br/><i>PAQ splits valences</i>"]
    Q1 -->|"Body signals — am I<br/>over-attending,<br/>under-attending,<br/>or mislabelling?"| MAIA["TAS-20 + MAIA<br/><i>plus possible HCD<br/>if accessible</i>"]
    Q1 -->|"Concept impoverishment<br/>vs. attention deficit"| LEAS["TAS-20 + LEAS<br/><i>LEAS bypasses<br/>self-report paradox</i>"]
    Q1 -->|"Self-rating seems off<br/>(low introspection,<br/>defensive responding,<br/>dissociation)"| Bypass["TSIA + OAQ<br/><i>observer-based<br/>(needs clinician + informant)</i>"]

    TAS --> Triangulate
    BVAQ --> Triangulate
    PAQ --> Triangulate
    MAIA --> Triangulate
    LEAS --> Triangulate
    Bypass --> Triangulate

    Triangulate{"Are answers<br/>across instruments<br/>consistent?"}

    Triangulate -->|"Yes — convergent"| Conf["Take the convergent picture<br/>as a working hypothesis<br/>about your subtype.<br/>Re-administer in 6+ months<br/>to check trait stability."]
    Triangulate -->|"No — discrepant"| Diag["DISCREPANCY IS DIAGNOSTIC<br/>e.g. high TAS-20 + average LEAS<br/>= attention/appraisal issue<br/>(not concept impoverishment)<br/><br/>e.g. high TAS-20 + low MAIA<br/>= no-detection-deficit profile<br/><br/>e.g. high TAS-20 + high MAIA + somatic Sx<br/>= hypervigilance-mislabelling profile<br/>→ contraindicates open-ended interoceptive training"]

    Caveats["<strong>Caveats to carry forward</strong><br/>· Scores fluctuate with state (depression, sleep, distress)<br/>· Cutoffs are conventions, not natural kinds<br/>· Cultural validity not guaranteed for all instruments<br/>· Pre-post change may reflect changed answering, not changed alexithymia"]
    Conf -.- Caveats
    Diag -.- Caveats

  <figcaption>
    <strong>Figure 7.</strong> A practical decision flowchart for which instrument(s) to take. For most users, TAS-20 is the right starting point — it anchors the result against the published literature. The branching depends on the actual question. Once results are in, the most informative output is whether the instruments converge or disagree: discrepancies between TAS-20 and LEAS, between TAS-20 and MAIA, or between self-rating and observer-rating tell you more about your subtype than any single score does. Caveats (state fluctuation, conventional cutoffs, cross-cultural validity, pre-post interpretive caution) apply throughout.
  </figcaption>
