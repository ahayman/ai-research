<!-- Diagram: Triangulation Strategy — Pairing Instruments for Self-Classification -->
<!-- Type: Mermaid pairing matrix with diagnostic readings -->
<!-- Generated: 2026-05-04 -->
<!-- Description: Shows how to pair instruments to answer specific questions, and what discrepant patterns mean diagnostically. -->

<figure class="concept-diagram" id="diagram-5">
  <div class="diagram-container">
    <pre class="mermaid">
flowchart TD
    Goal["GOAL<br/>Identify which alexithymia<br/>subtype/profile applies to me"]

    Goal --> Min["MINIMAL PAIRING<br/>(free, ~30 minutes)"]
    Goal --> Strong["STRONGER PAIRING"]
    Goal --> Comp["COMPREHENSIVE"]
    Goal --> Clin["WITH CLINICIAN ACCESS"]

    Min --> MinSet["TAS-20 + MAIA<br/><i>cognitive alexithymia<br/>× interoceptive sensibility</i>"]
    Strong --> StrSet["TAS-20 + BVAQ + MAIA<br/><i>adds affective dimension<br/>(Type I vs II)</i><br/><br/>OR<br/><br/>TAS-20 + PAQ + MAIA<br/><i>adds valence sensitivity<br/>(positive vs negative emotion)</i>"]
    Comp --> CompSet["TAS-20 + BVAQ/PAQ +<br/>MAIA + LEAS-self<br/><i>adds emotion-concept<br/>developmental level</i>"]
    Clin --> ClinSet["Above + TSIA + LEAS-coded<br/><i>bypasses self-report<br/>paradox via observer +<br/>performance-based</i>"]

    MinSet --> Read["READING THE PATTERN<br/>(discrepancies are diagnostic)"]
    StrSet --> Read
    CompSet --> Read
    ClinSet --> Read

    Read --> R1["<strong>High TAS-20 + low MAIA</strong><br/>No-detection-deficit profile<br/>→ scaffolded interoceptive training<br/>(with trauma caution)"]
    Read --> R2["<strong>High TAS-20 + high MAIA<br/>+ chronic body symptoms</strong><br/>Hypervigilance-with-mislabelling<br/>→ cognitive reappraisal of body signals<br/>→ contraindicates open-ended<br/>interoceptive awareness training"]
    Read --> R3["<strong>High TAS-20 + low LEAS</strong><br/>Impoverished emotion concepts<br/>→ granularity-building, expressive writing,<br/>emotion-vocabulary scaffolding"]
    Read --> R4["<strong>High TAS-20 + average LEAS</strong><br/>Concepts present, attention/appraisal issue<br/>→ attention-appraisal therapy (Preece),<br/>ACT-style approaches"]
    Read --> R5["<strong>BVAQ low cognitive only</strong><br/>Type II profile<br/>→ feelings present but illegible<br/>(track psychosis-risk literature)"]
    Read --> R6["<strong>BVAQ low cognitive AND affective</strong><br/>Type I profile<br/>→ classic 'affectless' presentation<br/>→ trauma history? somatic-focused work?"]

    classDef goal fill:#EEF2FF,stroke:#6366F1,stroke-width:2px
    classDef level1 fill:#DBEAFE,stroke:#2563EB,stroke-width:2px
    classDef level2 fill:#DCFCE7,stroke:#16A34A,stroke-width:2px
    classDef level3 fill:#FEF3C7,stroke:#D97706,stroke-width:2px
    classDef level4 fill:#F3E8FF,stroke:#9333EA,stroke-width:2px
    classDef pattern fill:#FFFFFF,stroke:#6B7280,stroke-width:1px

    class Goal goal
    class Min,MinSet level1
    class Strong,StrSet level2
    class Comp,CompSet level3
    class Clin,ClinSet level4
    class Read,R1,R2,R3,R4,R5,R6 pattern
    </pre>
  </div>
  <figcaption>
    <strong>Figure 5.</strong> Triangulation strategy. The goal is not to pile on instruments, but to pair them so that <em>discrepancies become diagnostic</em>. A user who scores high on TAS-20 but average on LEAS is in a different therapy lane than one who scores high on TAS-20 and low on LEAS — the former has emotion concepts available and an attention or appraisal issue; the latter has impoverished emotion-concept granularity. A high TAS-20 paired with high MAIA and chronic body symptoms suggests hypervigilance-with-mislabelling and contraindicates open-ended interoceptive awareness training. Free self-administration of TAS-20 + MAIA + PAQ takes about 30 minutes and covers most of the navigation territory.
  </figcaption>
</figure>
