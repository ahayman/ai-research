  <figcaption>
    <strong>Figure 2.</strong> The TAS-20's three-factor structure. DIF and DDF (blue) replicate consistently across populations with good internal consistency. EOT (yellow) is the troubled factor — lower internal consistency, sometimes splits in cross-cultural samples, includes reverse-scored items that respondents read inconsistently. The three-factor solution itself is well-replicated meta-analytically (Schroeders et al. 2022, PMC9597132). The conventional cutoffs (≥61 alexithymic, 52-60 borderline, ≤51 non-alexithymic) are widely used but are conventions, not categorical boundaries.
