<!-- Diagram: The Self-Report-on-Introspection Paradox -->
<!-- Type: Mermaid loop diagram -->
<!-- Generated: 2026-05-04 -->
<!-- Description: Visualises Lundh's structural critique of TAS-20 and other self-report measures: the instrument requires the introspective ability whose impairment it is trying to measure, creating a circular dependency. Then shows the three pragmatic responses the field uses. -->

<figure class="concept-diagram" id="diagram-4">
  <div class="diagram-container">
    <pre class="mermaid">
flowchart TD
    Q["TAS-20 / BVAQ / PAQ asks:<br/>'Are you confused about<br/>what you are feeling?'"]
    Q --> Need["Answering accurately requires:<br/>introspection on emotional confusion"]
    Need --> Construct["But that introspective ability<br/><strong>is the construct</strong><br/>the instrument is trying<br/>to measure"]
    Construct --> Paradox["If the respondent is alexithymic<br/>(impaired at introspection),<br/>their self-rating of introspective<br/>impairment is itself unreliable"]
    Paradox -.->|"Self-report can underrate<br/>(don't notice the confusion)<br/>or overrate<br/>(misread other states as confusion)"| Q

    Lundh["<strong>Lundh 2001</strong><br/>PubMed 11593459<br/>Original formulation"]
    Construct -.- Lundh

    EvidenceWeak["Weak correlation<br/>(r ≈ .15-.30)<br/>between TAS-20<br/>and performance-based<br/>LEAS"]
    Paradox -.- EvidenceWeak

    Resolution["How the field handles it"]
    Paradox --> Resolution

    Resolution --> Tri["1. TRIANGULATE<br/>Pair self-report with<br/>performance-based (LEAS)<br/>and observer-rated (TSIA, OAQ)"]
    Resolution --> Bypass["2. BYPASS<br/>Use TSIA (observer interview)<br/>or LEAS (performance task)<br/>that don't depend on<br/>self-introspection"]
    Resolution --> Hedge["3. HEDGE<br/>Treat TAS-20 score as<br/>one piece of evidence,<br/>not a verdict;<br/>read borderline scores cautiously"]

    classDef question fill:#EEF2FF,stroke:#6366F1,stroke-width:2px
    classDef paradox fill:#FEE2E2,stroke:#DC2626,stroke-width:2px
    classDef evidence fill:#F9FAFB,stroke:#9CA3AF,stroke-width:1px,stroke-dasharray:3
    classDef resolution fill:#FEF3C7,stroke:#D97706,stroke-width:2px
    classDef solution fill:#DCFCE7,stroke:#16A34A,stroke-width:2px

    class Q,Need question
    class Construct,Paradox paradox
    class Lundh,EvidenceWeak evidence
    class Resolution resolution
    class Tri,Bypass,Hedge solution
    </pre>
  </div>
  <figcaption>
    <strong>Figure 4.</strong> Lundh's structural critique of self-report alexithymia measurement. The instrument requires the very introspective capacity whose absence it is trying to measure — a circularity built into the design. The empirical signature of the paradox is the weak correlation between TAS-20 and performance-based LEAS (typically r ≈ .15–.30); these two methods tap related but distinct constructs. The pragmatic field response is some combination of triangulation, bypass via observer/performance-based measures, and hedged interpretation. For self-classification, the take-home is that a single TAS-20 score is a starting point, not a verdict.
  </figcaption>
</figure>
