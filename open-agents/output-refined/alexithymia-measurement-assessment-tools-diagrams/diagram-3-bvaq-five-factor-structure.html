  <div class="diagram-container">
    <pre class="mermaid">
flowchart TD
    BVAQ["BVAQ<br/>(Vorst &amp; Bermond 2001)<br/>40-item self-report<br/>5 factors, 2 dimensions"]

    BVAQ --> Cog["COGNITIVE DIMENSION<br/><i>'Can I think clearly about<br/>what I feel?'</i>"]
    BVAQ --> Aff["AFFECTIVE DIMENSION<br/><i>'Are emotions/imagination<br/>vividly present?'</i>"]

    Cog --> Iden["Identifying<br/>Knowing what one feels"]
    Cog --> Verb["Verbalising<br/>Putting feelings into words"]
    Cog --> Anal["Analysing<br/>Understanding causes of feelings"]

    Aff --> Fant["Fantasising<br/>Imaginative engagement,<br/>daydreaming, vivid imagery"]
    Aff --> Emot["Emotionalising<br/>Strength of emotional arousal,<br/>responsiveness"]

    TypeI["TYPE I PROFILE<br/>Low cognitive AND<br/>low affective<br/><i>'Affectless' presentation</i><br/>Closer to original<br/>psychosomatic phenotype"]
    TypeII["TYPE II PROFILE<br/>Low cognitive,<br/>NORMAL/HIGH affective<br/><i>'Feelings are present<br/>but illegible to me'</i><br/>Linked to psychosis vulnerability<br/>(van der Velde 2015)"]

    Cog --> TypeI
    Aff --> TypeI
    Cog --> TypeII
    Aff --> TypeII

    Caveat["The categorical Type I / Type II split<br/>is weakly supported empirically.<br/>Cognitive and affective dimensions are continuous.<br/>Use BVAQ <strong>dimensionally</strong>, not categorically.<br/>(Schaeuffele et al. 2021)"]

  <figcaption>
    <strong>Figure 3.</strong> The BVAQ's distinctive contribution is the affective dimension (pink) — fantasising and emotionalising — which the TAS-20 does not capture. A respondent low on the cognitive facets but normal on affective ones fits the Type II profile (feelings present but illegible to the self), which has been linked to psychosis vulnerability (van der Velde et al. 2015, PMC4451258). A respondent low on both fits Type I (the classic 'affectless' presentation). Important caveat: the categorical Type I / Type II distinction is weakly supported in the contemporary literature; the underlying dimensions are continuous, and BVAQ is best used dimensionally.
  </figcaption>
