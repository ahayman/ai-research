<!-- Description: Compares the six major alexithymia instruments — TAS-20, BVAQ, PAQ, TSIA, LEAS, OAQ-G2 — on format, what they capture, strengths, weaknesses, and best use case. Designed as a navigation reference. -->

<figure class="concept-diagram" id="diagram-1">
  <div class="diagram-container" style="display:block; overflow-x:auto;">
    <table style="width:100%; min-width:780px; border-collapse:collapse; font-size:0.85rem; line-height:1.5;">
      <thead>
        <tr style="background:#EEF2FF;">
          <th style="padding:0.6rem; text-align:left; border-bottom:2px solid #6366F1; vertical-align:top;">Instrument</th>
          <th style="padding:0.6rem; text-align:left; border-bottom:2px solid #6366F1; vertical-align:top;">Format</th>
          <th style="padding:0.6rem; text-align:left; border-bottom:2px solid #6366F1; vertical-align:top;">What It Captures</th>
          <th style="padding:0.6rem; text-align:left; border-bottom:2px solid #6366F1; vertical-align:top;">Key Strength</th>
          <th style="padding:0.6rem; text-align:left; border-bottom:2px solid #6366F1; vertical-align:top;">Key Weakness</th>
          <th style="padding:0.6rem; text-align:left; border-bottom:2px solid #6366F1; vertical-align:top;">Best Use Case</th>
        </tr>
      </thead>
      <tbody>
        <tr style="border-bottom:1px solid #E5E7EB;">
          <td style="padding:0.6rem; vertical-align:top;"><strong>TAS-20</strong><br/><span style="color:#6B7280; font-size:0.78rem;">Bagby, Parker, Taylor 1994</span></td>
          <td style="padding:0.6rem; vertical-align:top;">20-item self-report Likert</td>
          <td style="padding:0.6rem; vertical-align:top;">DIF, DDF, EOT (cognitive dimension only); negative emotions</td>
          <td style="padding:0.6rem; vertical-align:top; color:#059669;">Most validated; cross-cultural; brief</td>
          <td style="padding:0.6rem; vertical-align:top; color:#DC2626;">EOT factor unstable; negative-only; self-report paradox</td>
          <td style="padding:0.6rem; vertical-align:top;">Anchoring against published literature</td>
        </tr>
        <tr style="border-bottom:1px solid #E5E7EB; background:#F9FAFB;">
          <td style="padding:0.6rem; vertical-align:top;"><strong>BVAQ</strong><br/><span style="color:#6B7280; font-size:0.78rem;">Vorst &amp; Bermond 2001</span></td>
          <td style="padding:0.6rem; vertical-align:top;">40-item self-report (20-item short form)</td>
          <td style="padding:0.6rem; vertical-align:top;">Identifying, verbalising, analysing (cognitive) + fantasising, emotionalising (affective)</td>
          <td style="padding:0.6rem; vertical-align:top; color:#059669;">Captures affective dimension TAS-20 misses; Type I vs II</td>
          <td style="padding:0.6rem; vertical-align:top; color:#DC2626;">Less cross-cultural data; categorical Type I/II weakly supported</td>
          <td style="padding:0.6rem; vertical-align:top;">Distinguishing cognitive-only vs cognitive+affective alexithymia</td>
        </tr>
        <tr style="border-bottom:1px solid #E5E7EB;">
          <td style="padding:0.6rem; vertical-align:top;"><strong>PAQ</strong><br/><span style="color:#6B7280; font-size:0.78rem;">Preece et al. 2018</span></td>
          <td style="padding:0.6rem; vertical-align:top;">24-item self-report (6-item PAQ-S short)</td>
          <td style="padding:0.6rem; vertical-align:top;">DIF/DDF separately for positive AND negative emotions; G-EOT</td>
          <td style="padding:0.6rem; vertical-align:top; color:#059669;">Both valences; theoretically grounded (attention-appraisal)</td>
          <td style="padding:0.6rem; vertical-align:top; color:#DC2626;">Less cross-cultural data; cutoffs less standardised</td>
          <td style="padding:0.6rem; vertical-align:top;">Valence-specific patterns; theoretical scaffolding</td>
        </tr>
        <tr style="border-bottom:1px solid #E5E7EB; background:#F9FAFB;">
          <td style="padding:0.6rem; vertical-align:top;"><strong>TSIA</strong><br/><span style="color:#6B7280; font-size:0.78rem;">Bagby et al. 2006</span></td>
          <td style="padding:0.6rem; vertical-align:top;">24-item observer-rated semi-structured interview</td>
          <td style="padding:0.6rem; vertical-align:top;">DIF, DDF, EOT, imaginal processes (restores Sifneos 4th feature)</td>
          <td style="padding:0.6rem; vertical-align:top; color:#059669;">Bypasses self-report bias; clinically rich</td>
          <td style="padding:0.6rem; vertical-align:top; color:#DC2626;">Trained interviewer; 30-45 min; not self-administrable</td>
          <td style="padding:0.6rem; vertical-align:top;">Research and high-stakes clinical assessment</td>
        </tr>
        <tr style="border-bottom:1px solid #E5E7EB;">
          <td style="padding:0.6rem; vertical-align:top;"><strong>LEAS</strong><br/><span style="color:#6B7280; font-size:0.78rem;">Lane et al. 1990</span></td>
          <td style="padding:0.6rem; vertical-align:top;">20-vignette free-response performance task</td>
          <td style="padding:0.6rem; vertical-align:top;">Developmental complexity of emotion concepts (5-level Piaget/Werner scale)</td>
          <td style="padding:0.6rem; vertical-align:top; color:#059669;">Performance-based — bypasses self-report paradox entirely</td>
          <td style="padding:0.6rem; vertical-align:top; color:#DC2626;">Trained coders; low correlation with TAS-20 (r ≈ .15-.30)</td>
          <td style="padding:0.6rem; vertical-align:top;">Distinguishing emotion-concept impoverishment from attention deficits</td>
        </tr>
        <tr>
          <td style="padding:0.6rem; vertical-align:top; background:#F9FAFB;"><strong>OAQ-G2</strong><br/><span style="color:#6B7280; font-size:0.78rem;">Haviland et al. 2000</span></td>
          <td style="padding:0.6rem; vertical-align:top; background:#F9FAFB;">33-item observer/informant rating (12-item short)</td>
          <td style="padding:0.6rem; vertical-align:top; background:#F9FAFB;">Externally-observable phenotype: distant, uninsightful, somatising, humourless, rigid</td>
          <td style="padding:0.6rem; vertical-align:top; background:#F9FAFB; color:#059669;">Bypasses self-report entirely; needs no self-introspection</td>
          <td style="padding:0.6rem; vertical-align:top; background:#F9FAFB; color:#DC2626;">Less common; rater bias; needs willing intimate informant</td>
          <td style="padding:0.6rem; vertical-align:top; background:#F9FAFB;">When self-report is suspect (dissociation, defensive responding)</td>
        </tr>
      </tbody>
    </table>
  </div>
  <figcaption>
    <strong>Figure 1.</strong> The six major alexithymia instruments at a glance. Self-report instruments (TAS-20, BVAQ, PAQ) are fast and accessible but share the self-report-on-introspection paradox. Performance-based (LEAS) and observer-rated (TSIA, OAQ-G2) measures bypass that paradox at the cost of higher administrative burden. No single instrument captures the full construct; the navigation question is which combination answers <em>your</em> question.
  </figcaption>
</figure>
