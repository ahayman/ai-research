<figure class="concept-diagram" id="diagram-3">
  <div class="diagram-container">
    <table class="modality-matrix" style="width:100%; border-collapse: collapse; font-size: 0.85rem;">
      <thead style="background:#f3f4f6;">
        <tr>
          <th style="padding:0.5rem; border:1px solid #e5e7eb; text-align:left;">Modality</th>
          <th style="padding:0.5rem; border:1px solid #e5e7eb;">Mechanism</th>
          <th style="padding:0.5rem; border:1px solid #e5e7eb;">Body Involvement</th>
          <th style="padding:0.5rem; border:1px solid #e5e7eb;">Parts Framing</th>
          <th style="padding:0.5rem; border:1px solid #e5e7eb;">Evidence Base</th>
          <th style="padding:0.5rem; border:1px solid #e5e7eb;">Primary Phase</th>
          <th style="padding:0.5rem; border:1px solid #e5e7eb;">Complex Trauma Fit</th>
          <th style="padding:0.5rem; border:1px solid #e5e7eb;">Common Combinations</th>
        </tr>
      </thead>
      <tbody>
        <tr style="background:#f0f9ff;">
          <td style="padding:0.5rem; border:1px solid #e5e7eb; font-weight:600;">IFS<br/><span style="font-weight:normal; font-size:0.75rem; color:#6b7280;">Schwartz, 1980s</span></td>
          <td style="padding:0.5rem; border:1px solid #e5e7eb;">Self-to-part relational. Witness, unburden, integrate.</td>
          <td style="padding:0.5rem; border:1px solid #e5e7eb;">Moderate (interoceptive "where in body" + felt sense)</td>
          <td style="padding:0.5rem; border:1px solid #e5e7eb;">Explicit: managers, firefighters, exiles + Self</td>
          <td style="padding:0.5rem; border:1px solid #e5e7eb;">1 RCT (RA), 1 equivalence RCT (depression), 1 PTSD pilot. Limited.</td>
          <td style="padding:0.5rem; border:1px solid #e5e7eb;">Phase 1 + Phase 2 + Phase 3 (claims to handle all)</td>
          <td style="padding:0.5rem; border:1px solid #e5e7eb;">Sweet spot for C-PTSD without DID-level fragmentation. Contraindicated as primary for DID.</td>
          <td style="padding:0.5rem; border:1px solid #e5e7eb;">+ EMDR for processing, + SE for stabilization, + sensorimotor for body access</td>
        </tr>
        <tr style="background:#fef9c3;">
          <td style="padding:0.5rem; border:1px solid #e5e7eb; font-weight:600;">EMDR<br/><span style="font-weight:normal; font-size:0.75rem; color:#6b7280;">Shapiro, 1989</span></td>
          <td style="padding:0.5rem; border:1px solid #e5e7eb;">Bilateral stimulation + AIP — reprocesses "stuck" memories</td>
          <td style="padding:0.5rem; border:1px solid #e5e7eb;">Moderate (body scan, somatic activation tracking)</td>
          <td style="padding:0.5rem; border:1px solid #e5e7eb;">Implicit (memory networks); pairs well with IFS parts framing</td>
          <td style="padding:0.5rem; border:1px solid #e5e7eb;">Hundreds of RCTs; WHO/APA/VA first-line PTSD; equivalent to other trauma-focused therapies (2024 meta-analysis)</td>
          <td style="padding:0.5rem; border:1px solid #e5e7eb;">Phase 2 (processing); Phase 1 prep is shorter than complex-trauma usually requires</td>
          <td style="padding:0.5rem; border:1px solid #e5e7eb;">Strong for single-incident PTSD; needs modification + parts framing for C-PTSD/dissociation</td>
          <td style="padding:0.5rem; border:1px solid #e5e7eb;">+ IFS for parts/Phase-1 prep, + SE for nervous-system stabilization</td>
        </tr>
        <tr style="background:#dcfce7;">
          <td style="padding:0.5rem; border:1px solid #e5e7eb; font-weight:600;">Somatic Experiencing<br/><span style="font-weight:normal; font-size:0.75rem; color:#6b7280;">Levine, 1990s</span></td>
          <td style="padding:0.5rem; border:1px solid #e5e7eb;">Pendulation + titration; complete trapped survival responses</td>
          <td style="padding:0.5rem; border:1px solid #e5e7eb;">High (body-first, sensation tracking)</td>
          <td style="padding:0.5rem; border:1px solid #e5e7eb;">Implicit (no explicit parts vocabulary)</td>
          <td style="padding:0.5rem; border:1px solid #e5e7eb;">Limited RCTs; clinical reputation strong; polyvagal theory grounding contested</td>
          <td style="padding:0.5rem; border:1px solid #e5e7eb;">Phase 1 (stabilization, regulation)</td>
          <td style="padding:0.5rem; border:1px solid #e5e7eb;">Useful prerequisite for severe nervous-system dysregulation</td>
          <td style="padding:0.5rem; border:1px solid #e5e7eb;">+ IFS after stabilization, + EMDR after stabilization</td>
        </tr>
        <tr style="background:#e0e7ff;">
          <td style="padding:0.5rem; border:1px solid #e5e7eb; font-weight:600;">Sensorimotor Psychotherapy<br/><span style="font-weight:normal; font-size:0.75rem; color:#6b7280;">Ogden, 2000s</span></td>
          <td style="padding:0.5rem; border:1px solid #e5e7eb;">Body-tracking led; movement experiments; observable somatic patterns as entry</td>
          <td style="padding:0.5rem; border:1px solid #e5e7eb;">High (observable movement + interoception)</td>
          <td style="padding:0.5rem; border:1px solid #e5e7eb;">Explicit (overlapping with IFS — closest cousin)</td>
          <td style="padding:0.5rem; border:1px solid #e5e7eb;">Limited RCTs; integrated into trauma-field training programs</td>
          <td style="padding:0.5rem; border:1px solid #e5e7eb;">Phase 1 + Phase 2 (body-led processing)</td>
          <td style="padding:0.5rem; border:1px solid #e5e7eb;">Strong for C-PTSD; observable-movement entry may be more accessible to alexithymic clients than pure IFS</td>
          <td style="padding:0.5rem; border:1px solid #e5e7eb;">+ IFS, + structural dissociation framework (TIST does this)</td>
        </tr>
        <tr style="background:#fce7f3;">
          <td style="padding:0.5rem; border:1px solid #e5e7eb; font-weight:600;">Ego State Therapy<br/><span style="font-weight:normal; font-size:0.75rem; color:#6b7280;">Watkins, 1980s</span></td>
          <td style="padding:0.5rem; border:1px solid #e5e7eb;">Identification + integration of ego states; often via hypnosis</td>
          <td style="padding:0.5rem; border:1px solid #e5e7eb;">Variable</td>
          <td style="padding:0.5rem; border:1px solid #e5e7eb;">Explicit (predates IFS by decades; psychoanalytic roots)</td>
          <td style="padding:0.5rem; border:1px solid #e5e7eb;">Long clinical tradition; modest formal RCT evidence</td>
          <td style="padding:0.5rem; border:1px solid #e5e7eb;">Phase 1 + Phase 2 + Phase 3</td>
          <td style="padding:0.5rem; border:1px solid #e5e7eb;">Strong for dissociative disorders; commonly used in DID treatment</td>
          <td style="padding:0.5rem; border:1px solid #e5e7eb;">+ EMDR (sometimes called "ego-state EMDR"), + structural dissociation framework</td>
        </tr>
        <tr style="background:#cffafe;">
          <td style="padding:0.5rem; border:1px solid #e5e7eb; font-weight:600;">TIST<br/><span style="font-weight:normal; font-size:0.75rem; color:#6b7280;">Fisher, 2017</span></td>
          <td style="padding:0.5rem; border:1px solid #e5e7eb;">Integrative — combines all the above with phase-orientation</td>
          <td style="padding:0.5rem; border:1px solid #e5e7eb;">High (sensorimotor heritage)</td>
          <td style="padding:0.5rem; border:1px solid #e5e7eb;">Explicit (IFS-informed + structural dissociation)</td>
          <td style="padding:0.5rem; border:1px solid #e5e7eb;">Modest formal RCT evidence; strong clinical reputation; same evidence pattern as IFS</td>
          <td style="padding:0.5rem; border:1px solid #e5e7eb;">Phase 1 (stabilization-first)</td>
          <td style="padding:0.5rem; border:1px solid #e5e7eb;">Designed for complex trauma + dissociation + self-destructive behavior. Strong fit.</td>
          <td style="padding:0.5rem; border:1px solid #e5e7eb;">Already integrative — IFS, sensorimotor, structural dissociation, hypnosis principles</td>
        </tr>
      </tbody>
    </table>
  </div>
  <figcaption>
    <strong>Figure 3:</strong> Comparison matrix across major trauma modalities. No modality dominates — they have different strengths, mechanisms, and phase-fit. For complex trauma, integrative approaches (TIST especially) and sequenced combinations are common.
  </figcaption>
</figure>
