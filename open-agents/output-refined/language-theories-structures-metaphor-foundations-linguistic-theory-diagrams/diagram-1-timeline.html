<!-- Diagram: Timeline of Major Linguistic Theories -->
<!-- Type: timeline -->

<!-- Description: Historical timeline from Saussure (1916) to the present showing the emergence and evolution of major linguistic theoretical frameworks, including Structuralism, Behaviorism, Generative Grammar, Cognitive Linguistics, and Connectionism -->

<figure class="concept-diagram" id="diagram-timeline">
  <div class="diagram-container">
    <pre class="mermaid">
timeline
    title Major Linguistic Theories: 1916 to Present

    section Structuralism
        1916 : Saussure, Course in General Linguistics
             : The linguistic sign, langue vs. parole
             : Language as a system of differences
        1920s : Prague School founded
              : Jakobson, Trubetzkoy
              : Distinctive feature theory
        1933 : Bloomfield, Language
             : American Structuralism
             : Distributional analysis

    section Behaviorism & Revolution
        1957 : Skinner, Verbal Behavior
             : Language as operant conditioning
        1957 : Chomsky, Syntactic Structures
             : Generative grammar born
        1959 : Chomsky reviews Skinner
             : Catalyst for the cognitive revolution

    section Generative Grammar
        1965 : Standard Theory - Aspects
             : Deep structure, surface structure
             : Competence vs. performance
        1970s : Extended Standard Theory
              : Linguistics Wars rage
              : Generative vs. interpretive semantics
        1981 : Government and Binding
             : Principles and Parameters

    section Cognitive Turn
        1980 : Lakoff and Johnson, Metaphors We Live By
             : Conceptual metaphor theory
        1982 : Bates and MacWhinney, Competition Model
        1986 : Rumelhart and McClelland
             : Connectionist past tense model
        1987 : Lakoff, Women Fire and Dangerous Things
             : Langacker, Foundations of Cognitive Grammar

    section Modern Era
        1989 : First Cognitive Linguistics Conference
             : ICLA founded
        1993 : Chomsky, Minimalist Program
             : Merge as fundamental operation
        1995 : Goldberg, Constructions
             : Construction Grammar formalized
        2000 : Talmy, Toward a Cognitive Semantics
        2002 : Hauser Chomsky Fitch
             : FLN recursion hypothesis
        2003 : Tomasello, Constructing a Language
             : Usage-based acquisition
    </pre>
  </div>
  <figcaption>
    <strong>Figure 1:</strong> Timeline of major linguistic theories from Saussure's posthumous <em>Course in General Linguistics</em> (1916) to Tomasello's usage-based framework (2003). Each paradigm shift has been partly a reaction against the perceived limitations of its predecessor -- from structuralism's system of differences, through behaviorism's stimulus-response model, Chomsky's generative revolution, to the cognitive and connectionist turns of the 1980s onward.
  </figcaption>
</figure>
