<!-- Diagram: Saussure's Linguistic Sign -->
<!-- Type: flowchart -->
<!-- Generated: 2026-03-15 -->
<!-- Description: Component diagram showing Saussure's theory of the linguistic sign (signifier/signified), the paradigmatic and syntagmatic axes, and the distinction between langue and parole -->

<figure class="concept-diagram" id="diagram-saussure-sign">
  <div class="diagram-container">
    <pre class="mermaid">
flowchart TB
    subgraph SIGN["THE LINGUISTIC SIGN"]
        direction TB
        SF["Signifier &lpar;signifiant&rpar;<br/><em>Sound-image</em><br/>e.g. /triː/"]
        SD["Signified &lpar;signifie&rpar;<br/><em>Concept</em><br/>e.g. 🌳 concept of tree"]
        SF <--->|"Arbitrary<br/>relationship"| SD
    end

    subgraph AXES["TWO AXES OF LINGUISTIC RELATIONS"]
        direction TB

        subgraph PARA["Paradigmatic Axis &lpar;vertical: substitution&rpar;"]
            direction TB
            P1["The <strong>cat</strong> sat"]
            P2["The <strong>dog</strong> sat"]
            P3["The <strong>bird</strong> sat"]
            P4["The <strong>child</strong> sat"]
            P1 ~~~ P2 ~~~ P3 ~~~ P4
        end

        subgraph SYNT["Syntagmatic Axis &lpar;horizontal: combination&rpar;"]
            direction LR
            S1["The"] --> S2["cat"] --> S3["sat"] --> S4["on"] --> S5["the"] --> S6["mat"]
        end
    end

    subgraph LEVELS["LANGUE vs. PAROLE"]
        direction LR

        subgraph LANGUE["Langue"]
            L1["Abstract system"]
            L2["Shared by community"]
            L3["Social convention"]
            L4["Object of linguistics"]
            L1 ~~~ L2 ~~~ L3 ~~~ L4
        end

        subgraph PAROLE["Parole"]
            R1["Individual utterances"]
            R2["Variable, idiosyncratic"]
            R3["Concrete speech acts"]
            R4["Subject to performance"]
            R1 ~~~ R2 ~~~ R3 ~~~ R4
        end

        LANGUE <-->|"Langue enables parole;<br/>parole instantiates langue"| PAROLE
    end

    subgraph DIFF["LANGUAGE AS A SYSTEM OF DIFFERENCES"]
        direction LR
        D1["hot"] <-->|"opposition"| D2["cold"]
        D2 <-->|"opposition"| D3["warm"]
        D3 <-->|"opposition"| D4["lukewarm"]
        D4 <-->|"opposition"| D1
    end

    SIGN ~~~ AXES
    AXES ~~~ LEVELS
    LEVELS ~~~ DIFF

    style SIGN fill:#e0f2fe,stroke:#0284c7,color:#1e3a5f
    style SF fill:#dbeafe,stroke:#2563eb,color:#1e3a5f
    style SD fill:#dbeafe,stroke:#2563eb,color:#1e3a5f
    style PARA fill:#f3e8ff,stroke:#7c3aed,color:#3b0764
    style SYNT fill:#fef3c7,stroke:#d97706,color:#78350f
    style LANGUE fill:#dcfce7,stroke:#16a34a,color:#14532d
    style PAROLE fill:#fee2e2,stroke:#dc2626,color:#7f1d1d
    style DIFF fill:#f3f4f6,stroke:#6b7280,color:#374151
    style AXES fill:#faf5ff,stroke:#a78bfa,color:#3b0764
    style LEVELS fill:#f0fdf4,stroke:#4ade80,color:#14532d
    </pre>
  </div>
  <figcaption>
    <strong>Figure 2:</strong> Saussure's theory of the linguistic sign and its structural context. The sign unites a signifier (sound-image) and signified (concept) in an arbitrary relationship. Language operates along two axes: the paradigmatic (elements that can substitute for each other) and the syntagmatic (elements combined in sequence). Langue is the abstract shared system; parole is its concrete realization in individual speech. Signs have no positive content -- they gain meaning only through their differences from other signs in the system.
  </figcaption>
</figure>
