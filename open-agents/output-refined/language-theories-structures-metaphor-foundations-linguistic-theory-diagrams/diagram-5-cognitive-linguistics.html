<!-- Description: Mind map showing the five major strands of cognitive linguistics: Lakoff's conceptual metaphor theory, Langacker's cognitive grammar, Talmy's cognitive semantics, Goldberg's construction grammar, and Tomasello's usage-based approaches, with their shared core commitments -->

<figure class="concept-diagram" id="diagram-cognitive-linguistics">
  <div class="diagram-container">
    <pre class="mermaid">
mindmap
  root(("Cognitive<br/>Linguistics"))
    **Conceptual Metaphor**<br/>George Lakoff
      Metaphors We Live By, 1980
      Source domain maps to target domain
      ARGUMENT IS WAR
      TIME IS MONEY
      IDEAS ARE OBJECTS
      LIFE IS A JOURNEY
      Metaphor structures thought itself
    **Cognitive Grammar**<br/>Ronald Langacker
      Foundations of Cognitive Grammar, 1987
      Symbolic units: form + meaning
      Profile and Base
      Schema and Instance
      Construal operations
      No boundary between lexicon and grammar
    **Cognitive Semantics**<br/>Leonard Talmy
      Toward a Cognitive Semantics, 2000
      Force Dynamics
      Figure and Ground
      Motion Events: verb-framed vs satellite-framed
      Fictive Motion
      Conceptual structuring systems
    **Construction Grammar**<br/>Fillmore, Goldberg
      Constructions, 1995
      Form-meaning pairings at all levels
      Morphemes, words, idioms, abstract patterns
      Ditransitive construction means transfer
      No derivation from deeper structure
      Constructions are learned, not innate
    **Usage-Based Approaches**<br/>Michael Tomasello
      Constructing a Language, 2003
      Intention-reading
      Pattern-finding
      Item-based early language
      No Universal Grammar module needed
      Language constructed through use
    **Shared Commitments**
      Language is embodied
      No autonomous syntax
      Meaning drives grammar
      No innate language module
      Usage-based learning
      General cognition, not special faculty
    </pre>
  </div>
  <figcaption>
    <strong>Figure 5:</strong> The architecture of cognitive linguistics. Five major strands share core commitments: language is embodied, meaning-driven, and learned through use rather than triggered by innate grammar. Lakoff grounds meaning in metaphorical mappings from bodily experience; Langacker treats all grammar as symbolic (form-meaning pairings); Talmy analyzes how language structures conceptual content; Goldberg shows that syntactic patterns are themselves meaningful constructions; Tomasello argues children build grammar through intention-reading and pattern-finding.
  </figcaption>
</figure>
