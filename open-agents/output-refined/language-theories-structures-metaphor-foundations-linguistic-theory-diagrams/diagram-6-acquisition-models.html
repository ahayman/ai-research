<!-- Diagram: Language Acquisition Models Compared -->
<!-- Type: flowchart -->
<!-- Generated: 2026-03-15 -->
<!-- Description: Four competing theories of language acquisition shown side by side: Nativist/UG (Chomsky), Usage-Based (Tomasello), Statistical/Connectionist (Rumelhart, Seidenberg), and Competition Model (Bates & MacWhinney), each showing what the child brings, what the environment provides, and the acquisition mechanism -->

<figure class="concept-diagram" id="diagram-acquisition-models">
  <div class="diagram-container">
    <pre class="mermaid">
flowchart TB
    subgraph NAT["NATIVIST / UG<br/>&lpar;Chomsky, Pinker&rpar;"]
        direction TB
        N1["Child brings:<br/><strong>Innate Universal Grammar</strong><br/>Principles &amp; Parameters"]
        N2["Environment provides:<br/>Linguistic input<br/>&lpar;positive evidence only&rpar;"]
        N3["Mechanism:<br/><strong>Parameter setting</strong><br/>Input triggers binary switches"]
        N4["Result:<br/>Internalized grammar<br/>in place by age 4-5"]
        N1 --> N3
        N2 --> N3
        N3 --> N4
    end

    subgraph UBG["USAGE-BASED<br/>&lpar;Tomasello, Goldberg&rpar;"]
        direction TB
        U1["Child brings:<br/><strong>General cognition</strong><br/>Intention-reading<br/>Pattern-finding"]
        U2["Environment provides:<br/>Rich social interaction<br/>Frequent constructions"]
        U3["Mechanism:<br/><strong>Abstraction from use</strong><br/>Item-based to schemas<br/>Analogy &amp; categorization"]
        U4["Result:<br/>Inventory of constructions<br/>gradually generalized"]
        U1 --> U3
        U2 --> U3
        U3 --> U4
    end

    subgraph STAT["CONNECTIONIST<br/>&lpar;Rumelhart, Elman, Seidenberg&rpar;"]
        direction TB
        S1["Child brings:<br/><strong>Learning algorithms</strong><br/>Neural architecture<br/>for statistical extraction"]
        S2["Environment provides:<br/>Distributional statistics<br/>Frequency patterns"]
        S3["Mechanism:<br/><strong>Weight adjustment</strong><br/>Connection strengths tuned<br/>by input statistics"]
        S4["Result:<br/>Emergent patterns<br/>Rule-like behavior<br/>without explicit rules"]
        S1 --> S3
        S2 --> S3
        S3 --> S4
    end

    subgraph COMP["COMPETITION MODEL<br/>&lpar;Bates &amp; MacWhinney&rpar;"]
        direction TB
        C1["Child brings:<br/><strong>General processing</strong><br/>Cue sensitivity<br/>Competition mechanisms"]
        C2["Environment provides:<br/>Multiple cues<br/>&lpar;word order, case,<br/>agreement, animacy&rpar;"]
        C3["Mechanism:<br/><strong>Cue competition</strong><br/>Cues weighted by<br/>reliability and availability"]
        C4["Result:<br/>Language-specific<br/>cue weightings<br/>&lpar;crosslinguistic variation&rpar;"]
        C1 --> C3
        C2 --> C3
        C3 --> C4
    end

    subgraph KEY["KEY QUESTION: What is innate?"]
        direction LR
        K1["Language-specific<br/>grammar<br/>&lpar;Nativist&rpar;"] ---|"spectrum"| K2["Domain-general<br/>cognition<br/>&lpar;Usage-based,<br/>Connectionist,<br/>Competition&rpar;"]
    end

    NAT ~~~ UBG
    STAT ~~~ COMP
    NAT ~~~ STAT
    UBG ~~~ COMP

    style NAT fill:#dbeafe,stroke:#2563eb,color:#1e3a5f
    style UBG fill:#dcfce7,stroke:#16a34a,color:#14532d
    style STAT fill:#f3e8ff,stroke:#7c3aed,color:#3b0764
    style COMP fill:#fef3c7,stroke:#d97706,color:#78350f
    style KEY fill:#f3f4f6,stroke:#6b7280,color:#374151
    </pre>
  </div>
  <figcaption>
    <strong>Figure 6:</strong> Four competing models of language acquisition. The nativist model (Chomsky) posits innate, language-specific Universal Grammar activated by input. The usage-based model (Tomasello) relies on general cognitive capacities -- intention-reading and pattern-finding -- applied to rich social input. The connectionist model (Rumelhart, Elman) learns through statistical extraction and weight adjustment in neural networks. The competition model (Bates &amp; MacWhinney) weights multiple cues that compete during processing, predicting crosslinguistic variation. The key divide: is what the child brings language-specific or domain-general?
  </figcaption>
</figure>
