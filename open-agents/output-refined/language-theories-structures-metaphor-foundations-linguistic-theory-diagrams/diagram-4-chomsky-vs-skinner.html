  <figcaption>
    <strong>Figure 4:</strong> The Chomsky-Skinner debate (1957-1959). Skinner's <em>Verbal Behavior</em> modeled language as operant conditioning shaped by environmental reinforcement. Chomsky's 33-page review argued this could not account for linguistic creativity, hierarchical structure, or rapid acquisition. The clash catalyzed the cognitive revolution, though the debate was not as one-sided as the standard narrative suggests -- MacCorquodale (1970) argued Chomsky mischaracterized some of Skinner's claims, and modern applied behavior analysis continues to use Skinner's verbal operant categories.
  </figcaption>
