<!-- Diagram: Chomsky's Grammar Architecture Evolution -->
<!-- Type: flowchart -->
<!-- Generated: 2026-03-15 -->
<!-- Description: Shows the evolution of Chomsky's generative grammar framework across five eras: Syntactic Structures (1957), Standard Theory (1965), Extended Standard Theory (1970s), Government and Binding (1981), and the Minimalist Program (1993+), highlighting how the architecture simplified over time -->

<figure class="concept-diagram" id="diagram-chomsky-evolution">
  <div class="diagram-container">
    <pre class="mermaid">
flowchart TB
    subgraph ERA1["1957: Syntactic Structures"]
        direction TB
        E1A["Phrase Structure<br/>Rules"] --> E1B["Kernel<br/>Sentences"]
        E1B --> E1C["Transformational<br/>Rules"]
        E1C --> E1D["Surface<br/>Sentences"]
    end

    subgraph ERA2["1965: Standard Theory &lpar;Aspects&rpar;"]
        direction TB
        E2A["Phrase Structure Rules<br/>+ Lexicon"] --> E2B["Deep Structure<br/>&lpar;D-structure&rpar;"]
        E2B --> E2C["Semantic<br/>Interpretation"]
        E2B --> E2D["Transformations"]
        E2D --> E2E["Surface Structure<br/>&lpar;S-structure&rpar;"]
        E2E --> E2F["Phonological<br/>Interpretation"]
    end

    subgraph ERA3["1970s: Extended Standard Theory"]
        direction TB
        E3A["X-bar Theory<br/>&lpar;generalized phrase structure&rpar;"] --> E3B["D-structure"]
        E3B --> E3C["Move alpha<br/>&lpar;single general transformation&rpar;"]
        E3C --> E3D["S-structure"]
        E3D --> E3E["Phonological Form<br/>&lpar;PF&rpar;"]
        E3D --> E3F["Logical Form<br/>&lpar;LF&rpar;"]
        E3C -.->|"leaves traces"| E3G["Trace Theory"]
    end

    subgraph ERA4["1981: Government &amp; Binding"]
        direction TB
        E4A["Principles<br/>&lpar;universal constraints&rpar;"] --> E4B["Parameters<br/>&lpar;binary switches&rpar;"]
        E4B --> E4C["D-structure"]
        E4C --> E4D["Move alpha"]
        E4D --> E4E["S-structure"]
        E4E --> E4F["PF"]
        E4E --> E4G["LF"]
        E4A -.-> E4H["Modular subsystems:<br/>X-bar, Theta, Case,<br/>Binding, Bounding,<br/>Control, Government"]
    end

    subgraph ERA5["1993+: Minimalist Program"]
        direction TB
        E5A["Lexicon<br/>&lpar;features&rpar;"] --> E5B["External Merge<br/>&lpar;combine items&rpar;"]
        E5B --> E5C["Internal Merge<br/>&lpar;movement&rpar;"]
        E5C --> E5D["Spell-Out"]
        E5D --> E5E["PF<br/>&lpar;Articulatory-<br/>Perceptual&rpar;"]
        E5D --> E5F["LF<br/>&lpar;Conceptual-<br/>Intentional&rpar;"]
    end

    ERA1 ==>|"adds semantic<br/>interpretation"| ERA2
    ERA2 ==>|"generalizes<br/>transformations"| ERA3
    ERA3 ==>|"modularizes<br/>constraints"| ERA4
    ERA4 ==>|"radically<br/>simplifies"| ERA5

    subgraph TREND["Simplification Trend"]
        T1["Many specific rules"] -.->|"to"| T2["One operation: Merge"]
        T3["Multiple levels"] -.->|"to"| T4["Two interface levels: PF + LF"]
        T5["Language-specific rules"] -.->|"to"| T6["Universal principles +<br/>lexical variation"]
    end

    style ERA1 fill:#fef3c7,stroke:#d97706,color:#78350f
    style ERA2 fill:#fed7aa,stroke:#ea580c,color:#7c2d12
    style ERA3 fill:#fecaca,stroke:#dc2626,color:#7f1d1d
    style ERA4 fill:#e9d5ff,stroke:#7c3aed,color:#3b0764
    style ERA5 fill:#dbeafe,stroke:#2563eb,color:#1e3a5f
    style TREND fill:#dcfce7,stroke:#16a34a,color:#14532d
    </pre>
  </div>
  <figcaption>
    <strong>Figure 3:</strong> The evolution of Chomsky's generative grammar across five major eras. The architecture progressively simplified: from many specific phrase structure and transformational rules (1957) to a single fundamental operation, Merge (1993+). Deep and surface structure were replaced by PF (sound) and LF (meaning) interface levels. The Minimalist Program asks: how simple can the language faculty be while still explaining the facts?
  </figcaption>
</figure>
