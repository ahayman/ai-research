  <figcaption>
    <strong>Figure 7:</strong> The theoretical landscape of linguistics mapped across five key oppositions. Chomsky's generative grammar occupies the innate, formal, modular, rule-based, competence-focused pole. Cognitive linguistics, construction grammar, and usage-based approaches cluster at the opposite end: learned, functional, holistic, statistically sensitive, and focused on actual use. Connectionism aligns with the learned/statistical side. Saussure and Bloomfield occupy intermediate positions. Dashed lines show intellectual lineage and influence. Modern linguistics increasingly recognizes that these oppositions may represent false dichotomies.
  </figcaption>
