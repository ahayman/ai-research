<!-- Diagram: Conceptual Metaphor Map -->
<!-- Type: source-to-target domain mapping -->
<!-- Generated: 2026-03-31 -->
<!-- Description: Shows systematic conceptual metaphors in English mapping concrete source domains to abstract target domains -->

<figure class="concept-diagram" id="diagram-conceptual-metaphor">
  <div class="diagram-container">
    <pre class="mermaid">
flowchart LR
    subgraph source["SOURCE DOMAINS (Concrete / Physical)"]
        direction TB
        S_vis["VISION<br/><i>seeing, light, clarity</i>"]
        S_grip["PHYSICAL HOLDING<br/><i>grasping, gripping</i>"]
        S_war["WAR / COMBAT<br/><i>attack, defend, weapons</i>"]
        S_money["ECONOMIC RESOURCE<br/><i>spending, saving, investing</i>"]
        S_space["VERTICAL SPACE<br/><i>up, down, high, low</i>"]
        S_journey["TRAVEL / JOURNEY<br/><i>paths, crossroads, progress</i>"]
        S_temp["TEMPERATURE<br/><i>heat, cold, boiling, freezing</i>"]
        S_body["BODY / TOUCH<br/><i>feeling, weight, pressure</i>"]
    end

    subgraph target["TARGET DOMAINS (Abstract / Mental)"]
        direction TB
        T_und["UNDERSTANDING<br/><i>I <b>see</b> what you mean</i>"]
        T_comp["COMPREHENSION<br/><i><b>grasp</b> the concept</i>"]
        T_arg["ARGUMENT<br/><i><b>attack</b> a position</i>"]
        T_time["TIME<br/><i><b>spend</b> time, <b>save</b> time</i>"]
        T_qty["QUANTITY / VALUE<br/><i>prices <b>rise</b>, spirits <b>soar</b></i>"]
        T_life["LIFE / LOVE<br/><i>at a <b>crossroads</b></i>"]
        T_emo["EMOTION / ANGER<br/><i><b>boiling</b> with rage</i>"]
        T_force["SOCIAL FORCE<br/><i><b>pressure</b> someone</i>"]
    end

    S_vis -->|"UNDERSTANDING IS SEEING<br/><i>shed light on, illuminate, clarify,<br/>in view of, blind spot</i>"| T_und
    S_grip -->|"UNDERSTANDING IS GRASPING<br/><i>get a handle on, hold that thought,<br/>can't get a grip on this</i>"| T_comp
    S_war -->|"ARGUMENT IS WAR<br/><i>shoot down, defend a thesis,<br/>weak point, under fire</i>"| T_arg
    S_money -->|"TIME IS MONEY<br/><i>waste time, budget time,<br/>costly delay, time well spent</i>"| T_time
    S_space -->|"MORE IS UP / GOOD IS UP<br/><i>high quality, top-notch,<br/>feeling down, low point</i>"| T_qty
    S_journey -->|"LIFE IS A JOURNEY<br/><i>dead end, going in circles,<br/>moving forward, milestone</i>"| T_life
    S_temp -->|"ANGER IS HEAT<br/><i>heated argument, cool down,<br/>hot-tempered, simmer</i>"| T_emo
    S_body -->|"SOCIAL FORCE IS PHYSICAL<br/><i>push an agenda, pull strings,<br/>throw weight around</i>"| T_force

    style source fill:#dbeafe,stroke:#2563eb,stroke-width:2px
    style target fill:#fef3c7,stroke:#d97706,stroke-width:2px

    style S_vis fill:#bfdbfe,stroke:#1d4ed8
    style S_grip fill:#bfdbfe,stroke:#1d4ed8
    style S_war fill:#bfdbfe,stroke:#1d4ed8

    style S_journey fill:#bfdbfe,stroke:#1d4ed8
    style S_temp fill:#bfdbfe,stroke:#1d4ed8
    style S_body fill:#bfdbfe,stroke:#1d4ed8

    style T_und fill:#fde68a,stroke:#a16207
    style T_comp fill:#fde68a,stroke:#a16207
    style T_arg fill:#fde68a,stroke:#a16207
    style T_time fill:#fde68a,stroke:#a16207
    style T_qty fill:#fde68a,stroke:#a16207
    style T_life fill:#fde68a,stroke:#a16207
    style T_emo fill:#fde68a,stroke:#a16207
    style T_force fill:#fde68a,stroke:#a16207
    </pre>

    <div class="direction-box">
      <div class="direction-title">THE DIRECTIONALITY PRINCIPLE</div>
      <div class="direction-content">
        Mapping is <strong>always unidirectional: CONCRETE &rarr; ABSTRACT</strong>, never the reverse.
        We understand abstract concepts through physical experience, not the other way around.
        "I <em>see</em> your point" maps vision onto understanding. We never say "I <em>understand</em> that sunset" to mean we saw it.
      </div>
    </div>
  </div>
  <figcaption>
    <strong>Figure 3:</strong> Conceptual metaphor map (Lakoff and Johnson, 1980). English systematically maps concrete source domains (vision, physical holding, war, money, space, journeys, temperature, body) onto abstract target domains (understanding, argument, time, quantity, life, emotion, social force). The mapping is always unidirectional -- from more concrete to more abstract -- and each metaphor generates dozens of conventional English expressions.
  </figcaption>
</figure>
