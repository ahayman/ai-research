<!-- Diagram: The Three-Layer Lexicon Pyramid -->
<!-- Type: stratified pyramid -->
<!-- Generated: 2026-03-31 -->
<!-- Description: Visualizes English's three etymological-register layers (Germanic/French/Latin-Greek) with triplet examples, token frequency, and the animal-meat split -->

<figure class="concept-diagram" id="diagram-three-layer-pyramid">
  <div class="diagram-container">
    <div class="pyramid-title">THE THREE-LAYER ENGLISH LEXICON</div>
    <div class="pyramid-subtitle">One concept, three register levels -- a functioning social signaling system</div>

    <div class="pyramid-wrapper">
      <!-- The Pyramid -->
      <div class="pyramid">
        <div class="layer layer-latin">
          <div class="layer-label">LATIN / GREEK</div>
          <div class="layer-props">Long (3+ syllables) -- Abstract -- Technical -- Academic</div>
          <div class="layer-percent">~29% Latin + ~6% Greek of dictionary entries</div>
        </div>
        <div class="layer layer-french">
          <div class="layer-label">FRENCH (post-1066)</div>
          <div class="layer-props">Medium (2-3 syllables) -- Social -- Formal -- Institutional</div>
          <div class="layer-percent">~29% of dictionary entries</div>
        </div>
        <div class="layer layer-germanic">
          <div class="layer-label">GERMANIC (Anglo-Saxon + Old Norse)</div>
          <div class="layer-props">Short (1-2 syllables) -- Concrete -- Everyday -- Intimate</div>
          <div class="layer-percent">~26% of dictionary entries BUT 60-70% of running text</div>
        </div>
      </div>

      <!-- Frequency bar -->
      <div class="freq-bar">
        <div class="freq-title">TOKEN FREQUENCY (actual usage)</div>
        <div class="freq-visual">
          <div class="freq-segment germ" style="flex: 7;">Germanic 60-70%</div>
          <div class="freq-segment french" style="flex: 2;">French</div>
          <div class="freq-segment latin" style="flex: 1;">Lat/Gr</div>
        </div>
        <div class="freq-note">The 100 most common English words are almost entirely Germanic</div>
      </div>
    </div>

    <!-- Triplets Table -->
    <div class="triplets-section">
      <div class="triplets-title">SYSTEMATIC TRIPLETS: Same Concept, Three Registers</div>
      <table class="triplets-table">
        <thead>
          <tr><th>Concept</th><th class="germ-col">Germanic</th><th class="french-col">French</th><th class="latin-col">Latin/Greek</th></tr>
        </thead>
        <tbody>
          <tr><td>ask</td><td class="germ-col">ask</td><td class="french-col">question</td><td class="latin-col">interrogate</td></tr>
          <tr><td>begin</td><td class="germ-col">begin</td><td class="french-col">commence</td><td class="latin-col">initiate</td></tr>
          <tr><td>end</td><td class="germ-col">end</td><td class="french-col">finish</td><td class="latin-col">terminate</td></tr>
          <tr><td>help</td><td class="germ-col">help</td><td class="french-col">aid</td><td class="latin-col">assist</td></tr>
          <tr><td>fear</td><td class="germ-col">fear</td><td class="french-col">terror</td><td class="latin-col">trepidation</td></tr>
          <tr><td>kingly</td><td class="germ-col">kingly</td><td class="french-col">royal</td><td class="latin-col">regal</td></tr>
          <tr><td>fatherly</td><td class="germ-col">fatherly</td><td class="french-col">paternal</td><td class="latin-col">patriarchal</td></tr>
          <tr><td>heart</td><td class="germ-col">hearty</td><td class="french-col">cordial</td><td class="latin-col">cardiac</td></tr>
          <tr><td>freedom</td><td class="germ-col">freedom</td><td class="french-col">liberty</td><td class="latin-col">autonomy</td></tr>
          <tr><td>buy</td><td class="germ-col">buy</td><td class="french-col">purchase</td><td class="latin-col">acquire</td></tr>
          <tr><td>fire</td><td class="germ-col">fire</td><td class="french-col">flame</td><td class="latin-col">conflagration</td></tr>
          <tr><td>book</td><td class="germ-col">handbook</td><td class="french-col">manual</td><td class="latin-col">compendium</td></tr>
        </tbody>
      </table>
    </div>

    <!-- Animal-Meat Split -->
    <div class="split-section">
      <div class="split-title">THE ANIMAL-MEAT SPLIT (Norman Conquest, 1066)</div>
      <div class="split-subtitle">English-speaking peasants tended the animals; French-speaking nobility ate the meat</div>
      <div class="split-grid">
        <div class="split-pair"><span class="animal">cow</span><span class="arrow">&rarr;</span><span class="meat">beef</span></div>
        <div class="split-pair"><span class="animal">pig</span><span class="arrow">&rarr;</span><span class="meat">pork</span></div>
        <div class="split-pair"><span class="animal">sheep</span><span class="arrow">&rarr;</span><span class="meat">mutton</span></div>
        <div class="split-pair"><span class="animal">calf</span><span class="arrow">&rarr;</span><span class="meat">veal</span></div>
        <div class="split-pair"><span class="animal">deer</span><span class="arrow">&rarr;</span><span class="meat">venison</span></div>
      </div>
    </div>
  </div>
  <figcaption>
    <strong>Figure 1:</strong> The three-layer English lexicon. English uniquely provides register-calibrated vocabulary from three etymological sources: Germanic (everyday, concrete, emotionally direct), French (formal, social, institutional), and Latin/Greek (technical, abstract, academic). By dictionary entries, the three layers are roughly equal in size -- but by token frequency in actual text, Germanic words dominate (60-70% of running text). The Latinate-to-Germanic ratio in a text is a reliable quantitative measure of its formality level.
  </figcaption>
</figure>
