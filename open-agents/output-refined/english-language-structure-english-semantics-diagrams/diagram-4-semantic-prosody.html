<!-- Diagram: Semantic Prosody and Collocational Patterns -->
<!-- Type: word-association web with polarity -->
<!-- Generated: 2026-03-31 -->
<!-- Description: Shows how certain words attract positive or negative collocates, creating an evaluative aura -->

<figure class="concept-diagram" id="diagram-semantic-prosody">
  <div class="diagram-container">
    <div class="prosody-title">SEMANTIC PROSODY: The Invisible Grammar of Evaluation</div>
    <div class="prosody-subtitle">Words acquire evaluative auras from the company they habitually keep</div>

    <div class="prosody-grid">
      <!-- CAUSE -->
      <div class="prosody-cluster negative">
        <div class="cluster-header">
          <span class="center-word">"cause"</span>
          <span class="prosody-tag neg">~90% NEGATIVE collocates</span>
        </div>
        <div class="collocate-cloud">
          <span class="collocate neg">damage</span>
          <span class="collocate neg">problems</span>
          <span class="collocate neg">death</span>
          <span class="collocate neg">suffering</span>
          <span class="collocate neg">concern</span>
          <span class="collocate neg">delays</span>
          <span class="collocate neg">cancer</span>
          <span class="collocate neg">harm</span>
          <span class="collocate neg">accidents</span>
          <span class="collocate marked">happiness?</span>
        </div>
        <div class="prosody-note">"The policy caused happiness" -- grammatical but feels wrong. Use "brought" or "created" instead.</div>
      </div>

      <!-- COMMIT -->
      <div class="prosody-cluster negative">
        <div class="cluster-header">
          <span class="center-word">"commit"</span>
          <span class="prosody-tag neg">STRONGLY NEGATIVE</span>
        </div>
        <div class="collocate-cloud">
          <span class="collocate neg">murder</span>
          <span class="collocate neg">fraud</span>
          <span class="collocate neg">crime</span>
          <span class="collocate neg">suicide</span>
          <span class="collocate neg">atrocities</span>
          <span class="collocate neg">arson</span>
          <span class="collocate neg">perjury</span>
          <span class="collocate neg">treason</span>
        </div>
        <div class="prosody-note">Almost exclusively associated with morally negative actions.</div>
      </div>

      <!-- PROVIDE -->
      <div class="prosody-cluster positive">
        <div class="cluster-header">
          <span class="center-word">"provide"</span>
          <span class="prosody-tag pos">POSITIVE / NEUTRAL</span>
        </div>
        <div class="collocate-cloud">
          <span class="collocate pos">support</span>
          <span class="collocate pos">assistance</span>
          <span class="collocate pos">evidence</span>
          <span class="collocate pos">information</span>
          <span class="collocate pos">resources</span>
          <span class="collocate pos">services</span>
          <span class="collocate pos">guidance</span>
          <span class="collocate pos">opportunities</span>
        </div>
        <div class="prosody-note">Consistently associated with beneficial or enabling actions.</div>
      </div>

      <!-- UTTERLY -->
      <div class="prosody-cluster negative">
        <div class="cluster-header">
          <span class="center-word">"utterly"</span>
          <span class="prosody-tag neg">OVERWHELMINGLY NEGATIVE</span>
        </div>
        <div class="collocate-cloud">
          <span class="collocate neg">ridiculous</span>
          <span class="collocate neg">destroyed</span>
          <span class="collocate neg">wrong</span>
          <span class="collocate neg">failed</span>
          <span class="collocate neg">useless</span>
          <span class="collocate neg">hopeless</span>
          <span class="collocate marked">beautiful?</span>
        </div>
        <div class="prosody-note">"Utterly beautiful" works but sounds slightly surprising because of the negative prosody.</div>
      </div>
    </div>

    <!-- Collocation Box -->
    <div class="collocation-section">
      <div class="coll-title">COLLOCATIONAL RESTRICTIONS: Why "Strong Tea" But Not *"Powerful Tea"</div>
      <div class="coll-grid">
        <div class="coll-pair">
          <span class="coll-word">strong</span>
          <span class="coll-goes">tea, coffee, wind, accent, feelings, argument</span>
        </div>
        <div class="coll-pair">
          <span class="coll-word">powerful</span>
          <span class="coll-goes">engine, computer, speech, weapon, nation, emotion</span>
        </div>
        <div class="coll-pair">
          <span class="coll-word">heavy</span>
          <span class="coll-goes">rain, traffic, burden, heart, smoker, losses</span>
        </div>
        <div class="coll-pair">
          <span class="coll-word">make</span>
          <span class="coll-goes">a decision, a mistake, progress, money, an effort</span>
        </div>
        <div class="coll-pair">
          <span class="coll-word">do</span>
          <span class="coll-goes">homework, work, business, damage, a favor</span>
        </div>
      </div>
    </div>
  </div>
  <figcaption>
    <strong>Figure 4:</strong> Semantic prosody -- the evaluative aura words acquire from habitual collocation. "Cause" collocates with negative events ~90% of the time, making "cause happiness" feel marked even though it is grammatical. "Commit" is almost exclusively associated with morally negative acts. "Provide" collocates with positive/enabling actions. These patterns are not rules but statistical tendencies that native speakers internalize from exposure -- they constitute an invisible layer of evaluative grammar.
  </figcaption>
</figure>
