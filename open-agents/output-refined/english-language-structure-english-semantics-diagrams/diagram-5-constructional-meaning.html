<!-- Description: Shows how syntactic constructions carry meaning independently of the words that fill them (Construction Grammar) -->

<figure class="concept-diagram" id="diagram-constructional-meaning">
  <div class="diagram-container">
    <pre class="mermaid">
flowchart TB
    subgraph title[" "]
        T["CONSTRUCTIONAL MEANING: The Grammar Itself Carries Meaning<br/><i>Goldberg (1995): Constructions are form-meaning pairings</i>"]
    end

    subgraph ditrans["THE DITRANSITIVE CONSTRUCTION"]
        direction TB
        DT["<b>[Subject V Object1 Object2]</b><br/>= 'X CAUSES Y to RECEIVE Z'"]
        D1["'She <b>gave</b> him the book'<br/><i>literal transfer -- give means transfer</i>"]
        D2["'She <b>baked</b> him a cake'<br/><i>intended transfer -- bake does NOT mean give,<br/>but the construction IMPOSES transfer meaning</i>"]
        D3["'She <b>denied</b> him the promotion'<br/><i>NEGATIVE transfer -- even negation<br/>still operates within the transfer frame</i>"]
        DT --> D1
        DT --> D2
        DT --> D3
    end

    subgraph caused["THE CAUSED-MOTION CONSTRUCTION"]
        direction TB
        CM["<b>[Subject V Object PP-direction]</b><br/>= 'X CAUSES Y to MOVE to Z'"]
        C1["'She <b>sneezed</b> the napkin off the table'<br/><i>sneeze is normally intransitive!<br/>The construction creates caused-motion</i>"]
        C2["'He <b>laughed</b> her out of the room'<br/><i>laugh is intransitive -- but the<br/>construction forces a caused-motion reading</i>"]
        CM --> C1
        CM --> C2
    end

    subgraph result["THE RESULTATIVE CONSTRUCTION"]
        direction TB
        R["<b>[Subject V Object AdjP]</b><br/>= 'X causes Y to BECOME Z'"]
        R1["'She hammered the metal <b>flat</b>'"]
        R2["'She painted the wall <b>red</b>'"]
        R3["'She drank herself <b>silly</b>'"]
        R --> R1
        R --> R2
        R --> R3
    end

    subgraph way["THE WAY-CONSTRUCTION"]
        direction TB
        W["<b>[Subject V poss way PP]</b><br/>= 'X moves along a path by means of V-ing'"]
        W1["'She <b>elbowed</b> her way through the crowd'"]
        W2["'He <b>talked</b> his way into the job'"]
        W --> W1
        W --> W2
    end

    subgraph key["KEY INSIGHT"]
        K["The <b>construction</b> contributes meaning<br/>beyond the sum of its words.<br/><b>Verb meaning + Construction meaning = Composite meaning</b>"]
    end

  <figcaption>
    <strong>Figure 5:</strong> Constructional meaning (Goldberg, 1995). Syntactic constructions carry meaning independently of the words that fill them. The ditransitive construction [S V O1 O2] means "X causes Y to receive Z" -- it imposes transfer semantics even on verbs like "bake" (which does not inherently mean "give") and "deny" (which is a negative transfer). The caused-motion construction turns intransitive verbs like "sneeze" into transitive caused-motion events. The grammar itself is a meaning-bearing system.
  </figcaption>
