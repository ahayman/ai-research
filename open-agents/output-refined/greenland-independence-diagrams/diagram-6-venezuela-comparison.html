    <div class="key-lessons">
      <h4>Key Lessons from Venezuela for Greenland</h4>
      <ol>
        <li><strong>Don't gut technical capacity for political loyalty.</strong> Venezuela fired 18,000 PDVSA workers; production never recovered.</li>
        <li><strong>Avoid single-resource dependence.</strong> Venezuela's 95% oil dependence proved catastrophic; Greenland's 97.8% fishing dependence is equally dangerous.</li>
        <li><strong>Debt from foreign powers becomes leverage.</strong> China's loans to Venezuela became strangling when oil production collapsed.</li>
        <li><strong>Great powers will intervene for resources.</strong> The US ultimately captured Maduro. Greenland's smaller size makes it more vulnerable, not less.</li>
        <li><strong>Democratic institutions are the best protection.</strong> Venezuela's institutional erosion enabled both internal collapse and external intervention.</li>
        <li><strong>Design systems before extraction begins.</strong> Greenland has no mining industry yet—it can learn from Venezuela's mistakes rather than repeat them.</li>
      </ol>
    </div>
