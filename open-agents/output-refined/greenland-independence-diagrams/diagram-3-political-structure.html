<!-- Diagram: Greenland Political Structure -->
<!-- Type: Mermaid flowchart -->
<!-- Generated: 2026-01-21 -->
<!-- Description: Governance relationship between Denmark and Greenland -->

<figure class="concept-diagram" id="diagram-3">
  <div class="diagram-container">
    <pre class="mermaid">
flowchart TB
    subgraph kingdom["Kingdom of Denmark"]
        MONARCH["Danish Monarch"]
        FOLK["Danish Folketing<br/>(Parliament)"]
    end

    subgraph greenland["Greenland Self-Government"]
        INAT["Inatsisartut<br/>(Parliament)<br/>31 elected members"]
        NAAL["Naalakkersuisut<br/>(Government)"]
        PM["Prime Minister<br/>Jens-Frederik Nielsen"]
    end

    subgraph danish_control["Danish Control"]
        DEF["Defense &<br/>Military"]
        FOREIGN["Foreign<br/>Policy"]
        JUSTICE["Courts &<br/>Justice"]
        CURR["Currency<br/>(DKK)"]
    end

    subgraph greenland_control["Greenlandic Control"]
        HEALTH["Healthcare"]
        EDU["Education"]
        TAX["Taxation"]
        FISH["Fisheries"]
        ENV["Environment"]
        MINE["Mining<br/>Permits"]
    end

    subgraph finances["Financial Relationship"]
        BLOCK["Block Grant<br/>~$600M/year<br/>(50% of gov revenue)"]
    end

    MONARCH -.-> FOLK
    FOLK -->|"2 seats"| INAT
    INAT -->|"elects"| NAAL
    NAAL -->|"leads"| PM

    FOLK -->|"controls"| danish_control
    NAAL -->|"controls"| greenland_control

    FOLK -->|"provides"| BLOCK
    BLOCK -->|"funds"| NAAL

    subgraph independence["Path to Independence"]
        direction LR
        VOTE["Referendum<br/>required"]
        NEGO["Denmark-Greenland<br/>negotiations"]
        CONSENT["Both parliaments<br/>must consent"]
    end

    INAT -.->|"can initiate"| independence

    classDef dk fill:#fee2e2,stroke:#dc2626,stroke-width:2px
    classDef gl fill:#dbeafe,stroke:#2563eb,stroke-width:2px
    classDef control fill:#f3f4f6,stroke:#6b7280,stroke-width:1px
    classDef money fill:#fef3c7,stroke:#d97706,stroke-width:2px
    classDef path fill:#dcfce7,stroke:#16a34a,stroke-width:2px

    class MONARCH,FOLK dk
    class INAT,NAAL,PM gl
    class DEF,FOREIGN,JUSTICE,CURR,HEALTH,EDU,TAX,FISH,ENV,MINE control
    class BLOCK money
    class VOTE,NEGO,CONSENT path
    </pre>
  </div>
  <figcaption>
    <strong>Figure 3:</strong> Greenland's political structure under the 2009 Self-Government Act. Denmark retains control of defense, foreign policy, and currency, while Greenland controls domestic affairs including mining permits. Independence requires referendum and negotiation with Denmark.
  </figcaption>
</figure>
