<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WEIRDO Subjunctive Trigger Map</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --accent: #4361ee; --accent-light: #e8edff;
    --w: #ec4899; --e: #ef4444; --i: #f59e0b; --r: #22c55e; --d: #3b82f6; --o: #8b5cf6;
    --conj: #06b6d4; --conj-bg: #cffafe;
    --exception: #f97316; --exception-bg: #fff7ed;
    --english: #6c757d; --english-bg: #f8f9fa;
    --muted: #6c757d; --caption-bg: #f8f9fa;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a; --fg: #e8e8f0; --surface: #1a1a2e; --border: #2d2d44;
      --accent: #6b8aff; --accent-light: #1e2a4a;
      --w: #f472b6; --e: #f87171; --i: #fbbf24; --r: #4ade80; --d: #60a5fa; --o: #a78bfa;
      --conj: #22d3ee; --conj-bg: #0c3d4a;
      --exception: #fb923c; --exception-bg: #78350f;
      --english: #9a9ab0; --english-bg: #1a1a2e;
      --muted: #9a9ab0; --caption-bg: #1a1a2e;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg); color: var(--fg);
    display: flex; justify-content: center; padding: 2rem 1rem; line-height: 1.6;
  }
  figure { max-width: 1100px; width: 100%; }
  .diagram-container {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 1.5rem 1rem; overflow-x: auto;
  }
  figcaption {
    text-align: center; margin-top: 1.5rem; padding: 1rem 1.5rem;
    background: var(--caption-bg); border-radius: 8px; border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  svg { display: block; margin: 0 auto; }
  .title-text { font: bold 14px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
  .label { font: 11px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
  .label-bold { font: bold 11px 'Segoe UI', system-ui, sans-serif; }
  .label-sm { font: 10px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
  .cat-label { font: bold 16px 'Segoe UI', system-ui, sans-serif; }
  .legend { display: flex; gap: 0.8rem; justify-content: center; flex-wrap: wrap; margin-top: 1rem; font-size: 0.82rem; color: var(--muted); }
  .legend-item { display: flex; align-items: center; gap: 0.4rem; }
  .legend-swatch { width: 14px; height: 14px; border-radius: 3px; border: 1px solid var(--border); }
</style>
</head>
<body>
<figure>
  <div class="diagram-container">
    <svg viewBox="0 0 1060 720" xmlns="http://www.w3.org/2000/svg" style="min-width:780px;">
      <text x="530" y="25" text-anchor="middle" class="title-text" style="font-size:16px;">WEIRDO Subjunctive Trigger Map</text>
      <text x="530" y="42" text-anchor="middle" class="label-sm" style="font-size:11px;">The subjunctive is OBLIGATORY after these triggers -- not a stylistic choice but a grammatical requirement</text>

      <!-- CENTER -->
      <circle cx="530" cy="150" r="55" fill="var(--accent-light)" stroke="var(--accent)" stroke-width="3"/>
      <text x="530" y="140" text-anchor="middle" class="title-text" fill="var(--accent)" style="font-size:13px;">que +</text>
      <text x="530" y="158" text-anchor="middle" class="title-text" fill="var(--accent)" style="font-size:13px;">SUBJUNCTIVE</text>
      <text x="530" y="172" text-anchor="middle" class="label-sm" fill="var(--accent)">verb form</text>

      <!-- W: WISHES (top-left) -->
      <line x1="485" y1="105" x2="200" y2="70" stroke="var(--w)" stroke-width="2"/>
      <rect x="50" y="45" width="300" height="95" rx="10" fill="var(--surface)" stroke="var(--w)" stroke-width="2"/>
      <text x="200" y="65" text-anchor="middle" class="cat-label" fill="var(--w)">W -- Wishes / Wants</text>
      <text x="65" y="82" text-anchor="start" class="label" fill="var(--fg)">vouloir que (want)</text>
      <text x="65" y="96" text-anchor="start" class="label" fill="var(--fg)">souhaiter que (wish)</text>
      <text x="65" y="110" text-anchor="start" class="label" fill="var(--fg)">desirer que, preferer que</text>
      <text x="65" y="128" text-anchor="start" class="label-sm" fill="var(--w)">Ex: "Je veux que tu viennes"</text>

      <!-- E: EMOTIONS (top-right) -->
      <line x1="575" y1="105" x2="860" y2="70" stroke="var(--e)" stroke-width="2"/>
      <rect x="710" y="45" width="300" height="95" rx="10" fill="var(--surface)" stroke="var(--e)" stroke-width="2"/>
      <text x="860" y="65" text-anchor="middle" class="cat-label" fill="var(--e)">E -- Emotions</text>
      <text x="725" y="82" text-anchor="start" class="label" fill="var(--fg)">etre content/triste que</text>
      <text x="725" y="96" text-anchor="start" class="label" fill="var(--fg)">avoir peur que, regretter que</text>
      <text x="725" y="110" text-anchor="start" class="label" fill="var(--fg)">etre surpris/furieux que</text>
      <text x="725" y="128" text-anchor="start" class="label-sm" fill="var(--e)">Ex: "Je suis content qu'elle soit la"</text>

      <!-- I: IMPERSONAL (left) -->
      <line x1="480" y1="160" x2="200" y2="200" stroke="var(--i)" stroke-width="2"/>
      <rect x="50" y="165" width="300" height="95" rx="10" fill="var(--surface)" stroke="var(--i)" stroke-width="2"/>
      <text x="200" y="185" text-anchor="middle" class="cat-label" fill="var(--i)">I -- Impersonal Expressions</text>
      <text x="65" y="202" text-anchor="start" class="label" fill="var(--fg)">il faut que (must)</text>
      <text x="65" y="216" text-anchor="start" class="label" fill="var(--fg)">il est possible/important que</text>
      <text x="65" y="230" text-anchor="start" class="label" fill="var(--fg)">il vaut mieux que, il se peut que</text>
      <text x="65" y="248" text-anchor="start" class="label-sm" fill="var(--i)">Ex: "Il faut que nous partions"</text>

      <!-- R: RECOMMENDATIONS (right) -->
      <line x1="580" y1="160" x2="860" y2="200" stroke="var(--r)" stroke-width="2"/>
      <rect x="710" y="165" width="300" height="95" rx="10" fill="var(--surface)" stroke="var(--r)" stroke-width="2"/>
      <text x="860" y="185" text-anchor="middle" class="cat-label" fill="var(--r)">R -- Recommendations</text>
      <text x="725" y="202" text-anchor="start" class="label" fill="var(--fg)">demander que (ask), exiger que (demand)</text>
      <text x="725" y="216" text-anchor="start" class="label" fill="var(--fg)">suggerer que, proposer que</text>
      <text x="725" y="230" text-anchor="start" class="label" fill="var(--fg)">permettre que, interdire que</text>
      <text x="725" y="248" text-anchor="start" class="label-sm" fill="var(--r)">Ex: "Je demande qu'il vienne"</text>

      <!-- D: DOUBT (bottom-left) -->
      <line x1="495" y1="200" x2="200" y2="310" stroke="var(--d)" stroke-width="2"/>
      <rect x="50" y="285" width="300" height="105" rx="10" fill="var(--surface)" stroke="var(--d)" stroke-width="2"/>
      <text x="200" y="305" text-anchor="middle" class="cat-label" fill="var(--d)">D -- Doubt / Denial</text>
      <text x="65" y="322" text-anchor="start" class="label" fill="var(--fg)">douter que (doubt)</text>
      <text x="65" y="336" text-anchor="start" class="label" fill="var(--fg)">ne pas croire que (not believe)</text>
      <text x="65" y="350" text-anchor="start" class="label" fill="var(--fg)">ne pas penser que (not think)</text>
      <text x="65" y="364" text-anchor="start" class="label-sm" fill="var(--d)">Ex: "Je doute qu'il sache la reponse"</text>
      <text x="65" y="378" text-anchor="start" class="label-sm" fill="var(--exception)">NOTE: croire/penser AFFIRMATIVE -> indicative!</text>

      <!-- O: OPINIONS (bottom-right) -->
      <line x1="565" y1="200" x2="860" y2="310" stroke="var(--o)" stroke-width="2"/>
      <rect x="710" y="285" width="300" height="95" rx="10" fill="var(--surface)" stroke="var(--o)" stroke-width="2"/>
      <text x="860" y="305" text-anchor="middle" class="cat-label" fill="var(--o)">O -- Opinions (Subjective)</text>
      <text x="725" y="322" text-anchor="start" class="label" fill="var(--fg)">il est bon/dommage que</text>
      <text x="725" y="336" text-anchor="start" class="label" fill="var(--fg)">c'est etrange/rare que</text>
      <text x="725" y="350" text-anchor="start" class="label" fill="var(--fg)">il est temps que</text>
      <text x="725" y="368" text-anchor="start" class="label-sm" fill="var(--o)">Ex: "Il est dommage que tu ne puisses pas"</text>

      <!-- CONJUNCTIONS (outer ring) -->
      <g transform="translate(30, 405)">
        <rect x="0" y="0" width="1000" height="70" rx="10" fill="var(--conj-bg)" stroke="var(--conj)" stroke-width="1.5"/>
        <text x="500" y="18" text-anchor="middle" class="label-bold" fill="var(--conj)">CONJUNCTIONS REQUIRING SUBJUNCTIVE (independent of WEIRDO)</text>
        <text x="30" y="38" text-anchor="start" class="label" fill="var(--fg)">avant que (before)</text>
        <text x="180" y="38" text-anchor="start" class="label" fill="var(--fg)">pour que (in order to)</text>
        <text x="340" y="38" text-anchor="start" class="label" fill="var(--fg)">bien que (although)</text>
        <text x="500" y="38" text-anchor="start" class="label" fill="var(--fg)">sans que (without)</text>
        <text x="30" y="56" text-anchor="start" class="label" fill="var(--fg)">a moins que (unless)</text>
        <text x="180" y="56" text-anchor="start" class="label" fill="var(--fg)">jusqu'a ce que (until)</text>
        <text x="340" y="56" text-anchor="start" class="label" fill="var(--fg)">de peur que (for fear)</text>
        <text x="500" y="56" text-anchor="start" class="label" fill="var(--fg)">pourvu que (provided)</text>
        <text x="680" y="48" text-anchor="start" class="label-sm" fill="var(--conj)">Contrast: apres que takes INDICATIVE</text>
        <text x="680" y="62" text-anchor="start" class="label-sm" fill="var(--conj)">(what happened = fact; what will happen = uncertain)</text>
      </g>

      <!-- TWO-SUBJECT RULE + EXCEPTIONS -->
      <g transform="translate(30, 490)">
        <rect x="0" y="0" width="480" height="90" rx="10" fill="var(--accent-light)" stroke="var(--accent)" stroke-width="1.5"/>
        <text x="240" y="18" text-anchor="middle" class="label-bold" fill="var(--accent)">THE TWO-SUBJECT RULE</text>
        <text x="15" y="38" text-anchor="start" class="label" fill="var(--fg)">Subjunctive requires TWO DIFFERENT subjects:</text>
        <text x="15" y="55" text-anchor="start" class="label-bold" fill="var(--accent)">Different: "Je veux que tu viennes" (subj.)</text>
        <text x="15" y="72" text-anchor="start" class="label-bold" fill="var(--accent)">Same: "Je veux venir" (infinitive!)</text>
        <text x="15" y="85" text-anchor="start" class="label-sm">NOT *"Je veux que je vienne"</text>

        <rect x="510" y="0" width="490" height="90" rx="10" fill="var(--exception-bg)" stroke="var(--exception)" stroke-width="1.5"/>
        <text x="755" y="18" text-anchor="middle" class="label-bold" fill="var(--exception)">KEY EXCEPTIONS</text>
        <text x="525" y="38" text-anchor="start" class="label" fill="var(--fg)">esperer que (to hope) -- INDICATIVE in affirmative!</text>
        <text x="525" y="52" text-anchor="start" class="label-sm" fill="var(--exception)">"J'espere qu'il viendra" (NOT viendra -> vienne)</text>
        <text x="525" y="68" text-anchor="start" class="label" fill="var(--fg)">croire/penser AFFIRMATIVE -> indicative</text>
        <text x="525" y="82" text-anchor="start" class="label" fill="var(--fg)">croire/penser NEGATIVE/INTERROGATIVE -> subjunctive</text>
      </g>

      <!-- ENGLISH COMPARISON -->
      <g transform="translate(30, 600)">
        <rect x="0" y="0" width="1000" height="95" rx="10" fill="var(--english-bg)" stroke="var(--english)" stroke-width="1.5"/>
        <text x="500" y="18" text-anchor="middle" class="title-text" fill="var(--english)" style="font-size:12px;">ENGLISH COMPARISON</text>
        <text x="15" y="40" text-anchor="start" class="label" fill="var(--fg)">English subjunctive is VESTIGIAL, surviving only in:</text>
        <text x="15" y="56" text-anchor="start" class="label" fill="var(--fg)">Formulaic: "If I were you," "God save the Queen," "Be that as it may"</text>
        <text x="15" y="72" text-anchor="start" class="label" fill="var(--fg)">Mandative: "I suggest that he go" (often replaced by "should go" or "goes")</text>
        <text x="15" y="88" text-anchor="start" class="label-bold" fill="var(--english)">French subjunctive is alive, productive, and grammatically obligatory in ALL WEIRDO contexts. One of the starkest FR-EN contrasts.</text>
      </g>
    </svg>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background:var(--w);opacity:0.5;"></div> Wishes</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--e);opacity:0.5;"></div> Emotions</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--i);opacity:0.5;"></div> Impersonal</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--r);opacity:0.5;"></div> Recommendations</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--d);opacity:0.5;"></div> Doubt</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--o);opacity:0.5;"></div> Opinions</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--conj-bg);border-color:var(--conj);"></div> Conjunctions</div>
  </div>

  <figcaption>
    <h2>Figure 6 -- WEIRDO Subjunctive Trigger Map</h2>
    <p>The WEIRDO mnemonic organizes all subjunctive triggers into six categories: Wishes, Emotions, Impersonal expressions, Recommendations, Doubt/Denial, and Opinions. The subjunctive is obligatory after any of these triggers when two different subjects are involved (same subject uses infinitive instead). Key exceptions: "esperer que" takes indicative despite being a wish verb; "croire/penser" only trigger subjunctive in the negative or interrogative.</p>
  </figcaption>
</figure>
</body>
</html>
