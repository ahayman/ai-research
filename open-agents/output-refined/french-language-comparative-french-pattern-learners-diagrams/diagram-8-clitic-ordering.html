<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clitic Pronoun Ordering Template</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --accent: #4361ee; --accent-light: #e8edff;
    --french: #3b82f6; --french-bg: #dbeafe;
    --english: #8b5cf6; --english-bg: #ede9fe;
    --col1: #ec4899; --col1-bg: #fce7f3;
    --col2: #22c55e; --col2-bg: #dcfce7;
    --col3: #f59e0b; --col3-bg: #fef3c7;
    --col4: #06b6d4; --col4-bg: #cffafe;
    --col5: #8b5cf6; --col5-bg: #ede9fe;
    --neg: #ef4444; --neg-bg: #fee2e2;
    --imp: #f97316; --imp-bg: #fff7ed;
    --muted: #6c757d; --caption-bg: #f8f9fa;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a; --fg: #e8e8f0; --surface: #1a1a2e; --border: #2d2d44;
      --accent: #6b8aff; --accent-light: #1e2a4a;
      --french: #60a5fa; --french-bg: #1e3a5f;
      --english: #a78bfa; --english-bg: #2e1a5e;
      --col1: #f472b6; --col1-bg: #5c1a3a;
      --col2: #4ade80; --col2-bg: #14532d;
      --col3: #fbbf24; --col3-bg: #78350f;
      --col4: #22d3ee; --col4-bg: #0c3d4a;
      --col5: #a78bfa; --col5-bg: #2e1a5e;
      --neg: #f87171; --neg-bg: #5c1a1a;
      --imp: #fb923c; --imp-bg: #78350f;
      --muted: #9a9ab0; --caption-bg: #1a1a2e;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg); color: var(--fg);
    display: flex; justify-content: center; padding: 2rem 1rem; line-height: 1.6;
  }
  figure { max-width: 1100px; width: 100%; }
  .diagram-container {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 1.5rem 1rem; overflow-x: auto;
  }
  figcaption {
    text-align: center; margin-top: 1.5rem; padding: 1rem 1.5rem;
    background: var(--caption-bg); border-radius: 8px; border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  svg { display: block; margin: 0 auto; }
  .title-text { font: bold 14px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
  .label { font: 11px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
  .label-bold { font: bold 11px 'Segoe UI', system-ui, sans-serif; }
  .label-sm { font: 10px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
  .slot-label { font: bold 12px 'Segoe UI', system-ui, sans-serif; }
  .word { font: bold 14px 'Segoe UI', system-ui, sans-serif; }
  .legend { display: flex; gap: 0.8rem; justify-content: center; flex-wrap: wrap; margin-top: 1rem; font-size: 0.82rem; color: var(--muted); }
  .legend-item { display: flex; align-items: center; gap: 0.4rem; }
  .legend-swatch { width: 14px; height: 14px; border-radius: 3px; border: 1px solid var(--border); }
</style>
</head>
<body>
<figure>
  <div class="diagram-container">
    <svg viewBox="0 0 1060 680" xmlns="http://www.w3.org/2000/svg" style="min-width:780px;">
      <text x="530" y="25" text-anchor="middle" class="title-text" style="font-size:16px;">Clitic Pronoun Ordering Template</text>
      <text x="530" y="42" text-anchor="middle" class="label-sm" style="font-size:11px;">ALL object pronouns go BEFORE the verb in a RIGID, fixed order. Max 2 pronouns per verb.</text>

      <!-- THE TEMPLATE -->
      <g transform="translate(15, 60)">
        <text x="515" y="0" text-anchor="middle" class="label-bold" fill="var(--french)">STANDARD ORDER (declarative + negative sentences)</text>

        <!-- Subject -->
        <rect x="5" y="15" width="70" height="55" rx="6" fill="var(--surface)" stroke="var(--border)" stroke-width="1.5"/>
        <text x="40" y="38" text-anchor="middle" class="slot-label" fill="var(--fg)">Subj.</text>
        <text x="40" y="53" text-anchor="middle" class="label-sm">je, tu...</text>

        <!-- ne -->
        <rect x="85" y="15" width="50" height="55" rx="6" fill="var(--neg-bg)" stroke="var(--neg)" stroke-width="1.5"/>
        <text x="110" y="38" text-anchor="middle" class="slot-label" fill="var(--neg)">(ne)</text>
        <text x="110" y="53" text-anchor="middle" class="label-sm">neg.</text>

        <!-- Col 1 -->
        <rect x="145" y="15" width="120" height="55" rx="6" fill="var(--col1-bg)" stroke="var(--col1)" stroke-width="2"/>
        <text x="205" y="33" text-anchor="middle" class="slot-label" fill="var(--col1)">Col 1</text>
        <text x="205" y="48" text-anchor="middle" class="label-bold" fill="var(--col1)">me/te/se</text>
        <text x="205" y="62" text-anchor="middle" class="label-bold" fill="var(--col1)">nous/vous</text>

        <!-- Col 2 -->
        <rect x="275" y="15" width="100" height="55" rx="6" fill="var(--col2-bg)" stroke="var(--col2)" stroke-width="2"/>
        <text x="325" y="33" text-anchor="middle" class="slot-label" fill="var(--col2)">Col 2</text>
        <text x="325" y="48" text-anchor="middle" class="label-bold" fill="var(--col2)">le/la/les</text>
        <text x="325" y="62" text-anchor="middle" class="label-sm">direct obj.</text>

        <!-- Col 3 -->
        <rect x="385" y="15" width="100" height="55" rx="6" fill="var(--col3-bg)" stroke="var(--col3)" stroke-width="2"/>
        <text x="435" y="33" text-anchor="middle" class="slot-label" fill="var(--col3)">Col 3</text>
        <text x="435" y="48" text-anchor="middle" class="label-bold" fill="var(--col3)">lui/leur</text>
        <text x="435" y="62" text-anchor="middle" class="label-sm">indirect obj.</text>

        <!-- Col 4 -->
        <rect x="495" y="15" width="55" height="55" rx="6" fill="var(--col4-bg)" stroke="var(--col4)" stroke-width="2"/>
        <text x="523" y="33" text-anchor="middle" class="slot-label" fill="var(--col4)">Col 4</text>
        <text x="523" y="48" text-anchor="middle" class="label-bold" fill="var(--col4)">y</text>
        <text x="523" y="62" text-anchor="middle" class="label-sm">place</text>

        <!-- Col 5 -->
        <rect x="560" y="15" width="55" height="55" rx="6" fill="var(--col5-bg)" stroke="var(--col5)" stroke-width="2"/>
        <text x="588" y="33" text-anchor="middle" class="slot-label" fill="var(--col5)">Col 5</text>
        <text x="588" y="48" text-anchor="middle" class="label-bold" fill="var(--col5)">en</text>
        <text x="588" y="62" text-anchor="middle" class="label-sm">partitive</text>

        <!-- VERB -->
        <rect x="625" y="15" width="100" height="55" rx="6" fill="var(--accent-light)" stroke="var(--accent)" stroke-width="2.5"/>
        <text x="675" y="38" text-anchor="middle" class="word" fill="var(--accent)">VERB</text>
        <text x="675" y="55" text-anchor="middle" class="label-sm" fill="var(--accent)">conjugated</text>

        <!-- pas -->
        <rect x="735" y="15" width="50" height="55" rx="6" fill="var(--neg-bg)" stroke="var(--neg)" stroke-width="1.5"/>
        <text x="760" y="38" text-anchor="middle" class="slot-label" fill="var(--neg)">(pas)</text>
        <text x="760" y="53" text-anchor="middle" class="label-sm">neg.</text>

        <!-- Order arrow -->
        <text x="900" y="35" text-anchor="middle" class="label-bold" fill="var(--french)">Rigid left-to-right</text>
        <text x="900" y="50" text-anchor="middle" class="label-bold" fill="var(--french)">NEVER varies</text>
        <text x="900" y="65" text-anchor="middle" class="label-sm" fill="var(--french)">Max 2 pronouns/verb</text>
      </g>

      <!-- EXAMPLES -->
      <g transform="translate(15, 145)">
        <text x="515" y="0" text-anchor="middle" class="title-text" fill="var(--accent)">Examples: Filling the Slots</text>

        <text x="30" y="25" text-anchor="start" class="label-bold" fill="var(--french)">Je le vois</text>
        <text x="220" y="25" text-anchor="start" class="label" fill="var(--muted)">"I see him/it"</text>
        <text x="420" y="25" text-anchor="start" class="label-sm">Subj + [Col 2: le] + VERB</text>

        <text x="30" y="45" text-anchor="start" class="label-bold" fill="var(--french)">Je le lui donne</text>
        <text x="220" y="45" text-anchor="start" class="label" fill="var(--muted)">"I give it to him/her"</text>
        <text x="420" y="45" text-anchor="start" class="label-sm">Subj + [Col 2: le] + [Col 3: lui] + VERB</text>

        <text x="30" y="65" text-anchor="start" class="label-bold" fill="var(--french)">Il me le donne</text>
        <text x="220" y="65" text-anchor="start" class="label" fill="var(--muted)">"He gives it to me"</text>
        <text x="420" y="65" text-anchor="start" class="label-sm">Subj + [Col 1: me] + [Col 2: le] + VERB</text>

        <text x="30" y="85" text-anchor="start" class="label-bold" fill="var(--french)">Je m'en souviens</text>
        <text x="220" y="85" text-anchor="start" class="label" fill="var(--muted)">"I remember it"</text>
        <text x="420" y="85" text-anchor="start" class="label-sm">Subj + [Col 1: m'] + [Col 5: en] + VERB</text>

        <text x="30" y="105" text-anchor="start" class="label-bold" fill="var(--french)">Il y en a</text>
        <text x="220" y="105" text-anchor="start" class="label" fill="var(--muted)">"There are some"</text>
        <text x="420" y="105" text-anchor="start" class="label-sm">Subj + [Col 4: y] + [Col 5: en] + VERB</text>

        <text x="30" y="125" text-anchor="start" class="label-bold" fill="var(--french)">Je ne le lui ai pas donne</text>
        <text x="280" y="125" text-anchor="start" class="label" fill="var(--muted)">"I didn't give it to him"</text>
        <text x="510" y="125" text-anchor="start" class="label-sm">ne + [Col 2] + [Col 3] + AUX + pas + PP</text>
      </g>

      <!-- IMPERATIVE EXCEPTION -->
      <g transform="translate(15, 290)">
        <rect x="0" y="0" width="1030" height="130" rx="10" fill="var(--imp-bg)" stroke="var(--imp)" stroke-width="2"/>
        <text x="515" y="20" text-anchor="middle" class="title-text" fill="var(--imp)">THE IMPERATIVE EXCEPTION (Affirmative Only)</text>

        <text x="20" y="42" text-anchor="start" class="label" fill="var(--fg)">Affirmative imperatives REVERSE the order -- pronouns follow the verb with hyphens:</text>

        <!-- Imperative template -->
        <rect x="20" y="52" width="100" height="40" rx="6" fill="var(--accent-light)" stroke="var(--accent)" stroke-width="2"/>
        <text x="70" y="76" text-anchor="middle" class="word" fill="var(--accent)">VERB</text>

        <text x="128" y="76" text-anchor="middle" class="label-bold" fill="var(--fg)">+</text>

        <rect x="138" y="52" width="100" height="40" rx="6" fill="var(--col2-bg)" stroke="var(--col2)" stroke-width="1.5"/>
        <text x="188" y="76" text-anchor="middle" class="label-bold" fill="var(--col2)">le/la/les</text>

        <text x="246" y="76" text-anchor="middle" class="label-bold" fill="var(--fg)">+</text>

        <rect x="256" y="52" width="160" height="40" rx="6" fill="var(--col1-bg)" stroke="var(--col1)" stroke-width="1.5"/>
        <text x="336" y="76" text-anchor="middle" class="label-bold" fill="var(--col1)">moi/toi/lui/nous/vous/leur</text>

        <text x="424" y="76" text-anchor="middle" class="label-bold" fill="var(--fg)">+</text>

        <rect x="434" y="52" width="40" height="40" rx="6" fill="var(--col4-bg)" stroke="var(--col4)" stroke-width="1.5"/>
        <text x="454" y="76" text-anchor="middle" class="label-bold" fill="var(--col4)">y</text>

        <text x="482" y="76" text-anchor="middle" class="label-bold" fill="var(--fg)">+</text>

        <rect x="492" y="52" width="40" height="40" rx="6" fill="var(--col5-bg)" stroke="var(--col5)" stroke-width="1.5"/>
        <text x="512" y="76" text-anchor="middle" class="label-bold" fill="var(--col5)">en</text>

        <!-- Examples -->
        <text x="580" y="68" text-anchor="start" class="label-bold" fill="var(--imp)">Donne-le-moi</text>
        <text x="720" y="68" text-anchor="start" class="label" fill="var(--muted)">"Give it to me"</text>
        <text x="580" y="86" text-anchor="start" class="label-bold" fill="var(--imp)">Donnez-les-leur</text>
        <text x="720" y="86" text-anchor="start" class="label" fill="var(--muted)">"Give them to them"</text>

        <text x="20" y="115" text-anchor="start" class="label-bold" fill="var(--neg)">BUT: Negative imperatives REVERT to standard pre-verbal order:</text>
        <text x="480" y="115" text-anchor="start" class="label" fill="var(--fg)">"Ne me le donne pas" (Don't give it to me)</text>
      </g>

      <!-- ENGLISH COMPARISON -->
      <g transform="translate(15, 435)">
        <rect x="0" y="0" width="1030" height="85" rx="10" fill="var(--english-bg)" stroke="var(--english)" stroke-width="1.5"/>
        <text x="515" y="18" text-anchor="middle" class="title-text" fill="var(--english)" style="font-size:12px;">ENGLISH COMPARISON: No Pre-Verbal Slots</text>

        <text x="25" y="42" text-anchor="start" class="label" fill="var(--fg)">English: Subject + VERB + objects (flexible order after verb)</text>
        <text x="25" y="58" text-anchor="start" class="label" fill="var(--fg)">"I give it to him" OR "I give him it" -- both grammatical, objects AFTER verb</text>
        <text x="25" y="78" text-anchor="start" class="label-bold" fill="var(--english)">English has NO pre-verbal object position and NO clitic ordering system. This is one of the most alien features of French for English speakers.</text>
      </g>

      <!-- DECISION ALGORITHM -->
      <g transform="translate(15, 535)">
        <rect x="0" y="0" width="1030" height="120" rx="10" fill="var(--accent-light)" stroke="var(--accent)" stroke-width="1.5"/>
        <text x="515" y="18" text-anchor="middle" class="title-text" fill="var(--accent)" style="font-size:12px;">THE ALGORITHM: How to Order Clitics</text>

        <text x="25" y="40" text-anchor="start" class="label" fill="var(--fg)">1. Identify which pronouns replace which noun phrases (direct object? indirect object? locative? partitive?)</text>
        <text x="25" y="56" text-anchor="start" class="label" fill="var(--fg)">2. Assign each pronoun to its column (Col 1: me/te/se/nous/vous; Col 2: le/la/les; Col 3: lui/leur; Col 4: y; Col 5: en)</text>
        <text x="25" y="72" text-anchor="start" class="label" fill="var(--fg)">3. Maximum 2 pronouns per verb -- if you have 3+, restructure the sentence</text>
        <text x="25" y="88" text-anchor="start" class="label" fill="var(--fg)">4. Place them in column order (left to right) BEFORE the verb</text>
        <text x="25" y="104" text-anchor="start" class="label-bold" fill="var(--accent)">5. If affirmative imperative: REVERSE (post-verbal). If negative imperative: standard pre-verbal order.</text>
      </g>
    </svg>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background:var(--col1-bg);border-color:var(--col1);"></div> Col 1: me/te/se/nous/vous</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--col2-bg);border-color:var(--col2);"></div> Col 2: le/la/les</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--col3-bg);border-color:var(--col3);"></div> Col 3: lui/leur</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--col4-bg);border-color:var(--col4);"></div> Col 4: y</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--col5-bg);border-color:var(--col5);"></div> Col 5: en</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--neg-bg);border-color:var(--neg);"></div> Negation</div>
  </div>

  <figcaption>
    <h2>Figure 8 -- Clitic Pronoun Ordering Template</h2>
    <p>French places object pronouns in a rigid pre-verbal template with 5 ordered columns. The order never varies: reflexive/personal, then direct object, then indirect object, then locative (y), then partitive (en). Maximum 2 pronouns per verb. Affirmative imperatives are the one exception, reversing to post-verbal order with hyphens. English has no equivalent system -- all objects follow the verb in flexible order.</p>
  </figcaption>
</figure>
</body>
</html>
