<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Passe Compose vs Imparfait Decision Tree</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --accent: #4361ee; --accent-light: #e8edff;
    --pc: #3b82f6; --pc-bg: #dbeafe;
    --imp: #22c55e; --imp-bg: #dcfce7;
    --question: #f59e0b; --question-bg: #fef3c7;
    --english: #8b5cf6; --english-bg: #ede9fe;
    --muted: #6c757d; --caption-bg: #f8f9fa;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a; --fg: #e8e8f0; --surface: #1a1a2e; --border: #2d2d44;
      --accent: #6b8aff; --accent-light: #1e2a4a;
      --pc: #60a5fa; --pc-bg: #1e3a5f;
      --imp: #4ade80; --imp-bg: #14532d;
      --question: #fbbf24; --question-bg: #78350f;
      --english: #a78bfa; --english-bg: #2e1a5e;
      --muted: #9a9ab0; --caption-bg: #1a1a2e;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg); color: var(--fg);
    display: flex; justify-content: center; padding: 2rem 1rem; line-height: 1.6;
  }
  figure { max-width: 1100px; width: 100%; }
  .diagram-container {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 1.5rem 1rem; overflow-x: auto;
  }
  figcaption {
    text-align: center; margin-top: 1.5rem; padding: 1rem 1.5rem;
    background: var(--caption-bg); border-radius: 8px; border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  svg { display: block; margin: 0 auto; }
  .title-text { font: bold 14px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
  .label { font: 11px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
  .label-bold { font: bold 11px 'Segoe UI', system-ui, sans-serif; }
  .label-sm { font: 10px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
  .legend { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; margin-top: 1rem; font-size: 0.82rem; color: var(--muted); }
  .legend-item { display: flex; align-items: center; gap: 0.4rem; }
  .legend-swatch { width: 14px; height: 14px; border-radius: 3px; border: 1px solid var(--border); }
</style>
</head>
<body>
<figure>
  <div class="diagram-container">
    <svg viewBox="0 0 1060 750" xmlns="http://www.w3.org/2000/svg" style="min-width:780px;">
      <text x="530" y="25" text-anchor="middle" class="title-text" style="font-size:16px;">Passe Compose vs. Imparfait: The Aspect Decision Tree</text>
      <text x="530" y="42" text-anchor="middle" class="label-sm" style="font-size:11px;">Both are past tense -- the difference is PERSPECTIVE, not time</text>

      <!-- ENTRY -->
      <rect x="380" y="55" width="300" height="35" rx="17" fill="var(--question-bg)" stroke="var(--question)" stroke-width="2"/>
      <text x="530" y="77" text-anchor="middle" class="label-bold" fill="var(--question)">Describing a past event or situation?</text>

      <!-- DECISION 1 -->
      <line x1="530" y1="90" x2="530" y2="105" stroke="var(--fg)" stroke-width="1.5"/>
      <rect x="350" y="105" width="360" height="32" rx="6" fill="var(--question-bg)" stroke="var(--question)" stroke-width="1.5"/>
      <text x="530" y="125" text-anchor="middle" class="label-bold" fill="var(--question)">Q1: Did it happen a specific, countable number of times?</text>

      <!-- Yes -> PC -->
      <line x1="710" y1="121" x2="820" y2="121" stroke="var(--pc)" stroke-width="1.5"/>
      <text x="760" y="116" text-anchor="middle" class="label-sm" fill="var(--pc)">YES</text>
      <rect x="820" y="108" width="220" height="30" rx="5" fill="var(--pc-bg)" stroke="var(--pc)" stroke-width="1.5"/>
      <text x="930" y="127" text-anchor="middle" class="label-bold" fill="var(--pc)">PASSE COMPOSE</text>
      <text x="930" y="150" text-anchor="middle" class="label-sm">"J'ai mange trois fois"</text>

      <!-- No -> next question -->
      <text x="520" y="150" text-anchor="middle" class="label-sm" fill="var(--imp)">NO / not specific</text>
      <line x1="530" y1="137" x2="530" y2="162" stroke="var(--fg)" stroke-width="1.5"/>

      <!-- DECISION 2 -->
      <rect x="350" y="162" width="360" height="32" rx="6" fill="var(--question-bg)" stroke="var(--question)" stroke-width="1.5"/>
      <text x="530" y="182" text-anchor="middle" class="label-bold" fill="var(--question)">Q2: Was it habitual or repeated without specific count?</text>

      <line x1="710" y1="178" x2="820" y2="178" stroke="var(--imp)" stroke-width="1.5"/>
      <text x="760" y="173" text-anchor="middle" class="label-sm" fill="var(--imp)">YES</text>
      <rect x="820" y="165" width="220" height="30" rx="5" fill="var(--imp-bg)" stroke="var(--imp)" stroke-width="1.5"/>
      <text x="930" y="184" text-anchor="middle" class="label-bold" fill="var(--imp)">IMPARFAIT</text>
      <text x="930" y="207" text-anchor="middle" class="label-sm">"Je mangeais souvent la-bas"</text>

      <text x="520" y="207" text-anchor="middle" class="label-sm" fill="var(--fg)">NO</text>
      <line x1="530" y1="194" x2="530" y2="219" stroke="var(--fg)" stroke-width="1.5"/>

      <!-- DECISION 3 -->
      <rect x="350" y="219" width="360" height="32" rx="6" fill="var(--question-bg)" stroke="var(--question)" stroke-width="1.5"/>
      <text x="530" y="239" text-anchor="middle" class="label-bold" fill="var(--question)">Q3: Did the action have a clear beginning, end, or duration?</text>

      <line x1="710" y1="235" x2="820" y2="235" stroke="var(--pc)" stroke-width="1.5"/>
      <text x="760" y="230" text-anchor="middle" class="label-sm" fill="var(--pc)">YES</text>
      <rect x="820" y="222" width="220" height="30" rx="5" fill="var(--pc-bg)" stroke="var(--pc)" stroke-width="1.5"/>
      <text x="930" y="241" text-anchor="middle" class="label-bold" fill="var(--pc)">PASSE COMPOSE</text>
      <text x="930" y="264" text-anchor="middle" class="label-sm">"J'ai travaille de 9h a 17h"</text>

      <text x="520" y="264" text-anchor="middle" class="label-sm" fill="var(--fg)">NO</text>
      <line x1="530" y1="251" x2="530" y2="276" stroke="var(--fg)" stroke-width="1.5"/>

      <!-- DECISION 4 -->
      <rect x="350" y="276" width="360" height="32" rx="6" fill="var(--question-bg)" stroke="var(--question)" stroke-width="1.5"/>
      <text x="530" y="296" text-anchor="middle" class="label-bold" fill="var(--question)">Q4: Does this advance the story / narrate a plot event?</text>

      <line x1="710" y1="292" x2="820" y2="292" stroke="var(--pc)" stroke-width="1.5"/>
      <text x="760" y="287" text-anchor="middle" class="label-sm" fill="var(--pc)">YES</text>
      <rect x="820" y="279" width="220" height="30" rx="5" fill="var(--pc-bg)" stroke="var(--pc)" stroke-width="1.5"/>
      <text x="930" y="298" text-anchor="middle" class="label-bold" fill="var(--pc)">PASSE COMPOSE</text>
      <text x="930" y="321" text-anchor="middle" class="label-sm">"Il est entre, il a vu"</text>

      <text x="520" y="321" text-anchor="middle" class="label-sm" fill="var(--fg)">NO</text>
      <line x1="530" y1="308" x2="530" y2="333" stroke="var(--fg)" stroke-width="1.5"/>

      <!-- DECISION 5 -->
      <rect x="350" y="333" width="360" height="32" rx="6" fill="var(--question-bg)" stroke="var(--question)" stroke-width="1.5"/>
      <text x="530" y="353" text-anchor="middle" class="label-bold" fill="var(--question)">Q5: Is this background description or scene-setting?</text>

      <line x1="710" y1="349" x2="820" y2="349" stroke="var(--imp)" stroke-width="1.5"/>
      <text x="760" y="344" text-anchor="middle" class="label-sm" fill="var(--imp)">YES</text>
      <rect x="820" y="336" width="220" height="30" rx="5" fill="var(--imp-bg)" stroke="var(--imp)" stroke-width="1.5"/>
      <text x="930" y="355" text-anchor="middle" class="label-bold" fill="var(--imp)">IMPARFAIT</text>
      <text x="930" y="378" text-anchor="middle" class="label-sm">"Il faisait beau, les oiseaux chantaient"</text>

      <text x="520" y="378" text-anchor="middle" class="label-sm" fill="var(--fg)">NO</text>
      <line x1="530" y1="365" x2="530" y2="390" stroke="var(--fg)" stroke-width="1.5"/>

      <!-- DECISION 6 -->
      <rect x="330" y="390" width="400" height="32" rx="6" fill="var(--question-bg)" stroke="var(--question)" stroke-width="1.5"/>
      <text x="530" y="410" text-anchor="middle" class="label-bold" fill="var(--question)">Q6: Is this a state/condition? Did it CHANGE at a specific moment?</text>

      <line x1="730" y1="406" x2="820" y2="380" stroke="var(--pc)" stroke-width="1.5"/>
      <text x="770" y="385" text-anchor="middle" class="label-sm" fill="var(--pc)">CHANGED</text>
      <rect x="820" y="393" width="220" height="30" rx="5" fill="var(--pc-bg)" stroke="var(--pc)" stroke-width="1.5"/>
      <text x="930" y="412" text-anchor="middle" class="label-bold" fill="var(--pc)">PASSE COMPOSE</text>
      <text x="930" y="435" text-anchor="middle" class="label-sm">"J'ai eu peur" (became afraid)</text>

      <line x1="530" y1="422" x2="530" y2="445" stroke="var(--imp)" stroke-width="1.5"/>
      <text x="520" y="440" text-anchor="middle" class="label-sm" fill="var(--imp)">UNCHANGED</text>
      <rect x="420" y="445" width="220" height="30" rx="5" fill="var(--imp-bg)" stroke="var(--imp)" stroke-width="1.5"/>
      <text x="530" y="464" text-anchor="middle" class="label-bold" fill="var(--imp)">IMPARFAIT (states default)</text>
      <text x="530" y="487" text-anchor="middle" class="label-sm">"J'avais faim" (I was hungry)</text>

      <!-- MOVIE METAPHOR -->
      <g transform="translate(30, 505)">
        <rect x="0" y="0" width="480" height="110" rx="10" fill="var(--accent-light)" stroke="var(--accent)" stroke-width="1.5"/>
        <text x="240" y="20" text-anchor="middle" class="title-text" fill="var(--accent)" style="font-size:12px;">THE MOVIE METAPHOR</text>

        <rect x="20" y="35" width="200" height="60" rx="6" fill="var(--imp-bg)" stroke="var(--imp)" stroke-width="1.5"/>
        <text x="120" y="55" text-anchor="middle" class="label-bold" fill="var(--imp)">IMPARFAIT = Background</text>
        <text x="120" y="70" text-anchor="middle" class="label-sm">Scenery, weather, feelings,</text>
        <text x="120" y="82" text-anchor="middle" class="label-sm">what things looked like</text>

        <rect x="260" y="35" width="200" height="60" rx="6" fill="var(--pc-bg)" stroke="var(--pc)" stroke-width="1.5"/>
        <text x="360" y="55" text-anchor="middle" class="label-bold" fill="var(--pc)">PC = Action/Plot</text>
        <text x="360" y="70" text-anchor="middle" class="label-sm">Events, changes, things</text>
        <text x="360" y="82" text-anchor="middle" class="label-sm">that HAPPENED</text>
      </g>

      <!-- TRIGGER WORDS -->
      <g transform="translate(530, 505)">
        <rect x="0" y="0" width="500" height="110" rx="10" fill="var(--surface)" stroke="var(--border)" stroke-width="1.5"/>
        <text x="250" y="20" text-anchor="middle" class="title-text" fill="var(--accent)" style="font-size:12px;">TRIGGER WORD CLUES</text>

        <rect x="15" y="32" width="220" height="68" rx="6" fill="var(--imp-bg)" stroke="var(--imp)" stroke-width="1"/>
        <text x="125" y="48" text-anchor="middle" class="label-bold" fill="var(--imp)">Imparfait triggers:</text>
        <text x="125" y="62" text-anchor="middle" class="label-sm">souvent, toujours, d'habitude,</text>
        <text x="125" y="74" text-anchor="middle" class="label-sm">chaque jour, quand j'etais petit,</text>
        <text x="125" y="86" text-anchor="middle" class="label-sm">en general, tous les matins</text>

        <rect x="265" y="32" width="220" height="68" rx="6" fill="var(--pc-bg)" stroke="var(--pc)" stroke-width="1"/>
        <text x="375" y="48" text-anchor="middle" class="label-bold" fill="var(--pc)">PC triggers:</text>
        <text x="375" y="62" text-anchor="middle" class="label-sm">hier, soudain, tout a coup,</text>
        <text x="375" y="74" text-anchor="middle" class="label-sm">un jour, une fois, a ce moment-la,</text>
        <text x="375" y="86" text-anchor="middle" class="label-sm">l'annee derniere</text>
      </g>

      <!-- ENGLISH COMPARISON -->
      <g transform="translate(30, 630)">
        <rect x="0" y="0" width="1000" height="95" rx="10" fill="var(--english-bg)" stroke="var(--english)" stroke-width="1.5"/>
        <text x="500" y="18" text-anchor="middle" class="title-text" fill="var(--english)" style="font-size:12px;">ENGLISH COMPARISON: Why This Is Hard</text>

        <text x="20" y="40" text-anchor="start" class="label" fill="var(--fg)">English CAN express this distinction: "I was eating" (ongoing) vs. "I ate" (completed)</text>
        <text x="20" y="56" text-anchor="start" class="label" fill="var(--fg)">But English does NOT require it: "I ate" is ambiguous between completed, habitual, and background.</text>
        <text x="20" y="72" text-anchor="start" class="label-bold" fill="var(--english)">French REQUIRES the choice on every past-tense verb. There is no ambiguous "I ate" -- you MUST pick PC or imparfait.</text>
        <text x="20" y="88" text-anchor="start" class="label" fill="var(--fg)">The decision tree above makes this obligatory choice algorithmic rather than intuitive.</text>
      </g>
    </svg>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background:var(--pc-bg);border-color:var(--pc);"></div> Passe compose (completed/event)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--imp-bg);border-color:var(--imp);"></div> Imparfait (ongoing/background)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--question-bg);border-color:var(--question);"></div> Decision question</div>
  </div>

  <figcaption>
    <h2>Figure 3 -- Passe Compose vs. Imparfait Decision Tree</h2>
    <p>The passe compose / imparfait distinction is aspectual, not temporal: both refer to the past, but they encode different perspectives. This six-step decision tree converts the choice from an intuitive "feel" into a systematic algorithm. The movie metaphor provides a quick heuristic: imparfait = background scenery, passe compose = plot events. English can express this distinction optionally; French requires it on every past-tense verb.</p>
  </figcaption>
</figure>
</body>
</html>
