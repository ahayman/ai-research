<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Meta-Pattern Cascade</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --accent: #4361ee; --accent-light: #e8edff;
    --center: #dc2626; --center-bg: #fee2e2;
    --french: #3b82f6; --french-bg: #dbeafe;
    --english: #8b5cf6; --english-bg: #ede9fe;
    --predict: #22c55e; --predict-bg: #dcfce7;
    --muted: #6c757d; --caption-bg: #f8f9fa;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a; --fg: #e8e8f0; --surface: #1a1a2e; --border: #2d2d44;
      --accent: #6b8aff; --accent-light: #1e2a4a;
      --center: #f87171; --center-bg: #5c1a1a;
      --french: #60a5fa; --french-bg: #1e3a5f;
      --english: #a78bfa; --english-bg: #2e1a5e;
      --predict: #4ade80; --predict-bg: #14532d;
      --muted: #9a9ab0; --caption-bg: #1a1a2e;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg); color: var(--fg);
    display: flex; justify-content: center; padding: 2rem 1rem; line-height: 1.6;
  }
  figure { max-width: 1100px; width: 100%; }
  .diagram-container {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 1.5rem 1rem; overflow-x: auto;
  }
  figcaption {
    text-align: center; margin-top: 1.5rem; padding: 1rem 1.5rem;
    background: var(--caption-bg); border-radius: 8px; border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  svg { display: block; margin: 0 auto; }
  .title-text { font: bold 14px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
  .label { font: 11px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
  .label-bold { font: bold 11px 'Segoe UI', system-ui, sans-serif; }
  .label-sm { font: 10px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
  .legend { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; margin-top: 1rem; font-size: 0.82rem; color: var(--muted); }
  .legend-item { display: flex; align-items: center; gap: 0.4rem; }
  .legend-swatch { width: 14px; height: 14px; border-radius: 3px; border: 1px solid var(--border); }
</style>
</head>
<body>
<figure>
  <div class="diagram-container">
    <svg viewBox="0 0 1060 600" xmlns="http://www.w3.org/2000/svg" style="min-width:780px;">
      <defs>
        <marker id="arrC" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="var(--center)"/></marker>
        <marker id="arrE" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="var(--english)"/></marker>
      </defs>

      <text x="530" y="25" text-anchor="middle" class="title-text" style="font-size:16px;">The Meta-Pattern: One Principle, All Predictions</text>
      <text x="530" y="42" text-anchor="middle" class="label-sm" style="font-size:11px;">For pattern learners: when you encounter something new in French, check if it follows from this</text>

      <!-- CENTER NODE -->
      <ellipse cx="530" cy="95" rx="220" ry="35" fill="var(--center-bg)" stroke="var(--center)" stroke-width="3"/>
      <text x="530" y="90" text-anchor="middle" class="title-text" fill="var(--center)" style="font-size:13px;">FRENCH = MORE SYNTHETIC</text>
      <text x="530" y="106" text-anchor="middle" class="label" fill="var(--center)">More information packed INTO each word</text>

      <!-- Radiating spokes with French feature -> English compensation pairs -->
      <!-- Spoke 1: Gender (top-left) -->
      <line x1="370" y1="75" x2="100" y2="170" stroke="var(--center)" stroke-width="1.5" marker-end="url(#arrC)"/>
      <rect x="20" y="155" width="170" height="50" rx="8" fill="var(--french-bg)" stroke="var(--french)" stroke-width="1.5"/>
      <text x="105" y="175" text-anchor="middle" class="label-bold" fill="var(--french)">2 Grammatical Genders</text>
      <text x="105" y="192" text-anchor="middle" class="label-sm">every noun: masc/fem</text>
      <line x1="105" y1="205" x2="105" y2="225" stroke="var(--english)" stroke-width="1" marker-end="url(#arrE)"/>
      <rect x="25" y="225" width="160" height="30" rx="5" fill="var(--english-bg)" stroke="var(--english)" stroke-width="1"/>
      <text x="105" y="244" text-anchor="middle" class="label" fill="var(--english)">EN: 0 genders</text>

      <!-- Spoke 2: Verb Forms (top) -->
      <line x1="440" y1="65" x2="310" y2="170" stroke="var(--center)" stroke-width="1.5" marker-end="url(#arrC)"/>
      <rect x="210" y="155" width="200" height="50" rx="8" fill="var(--french-bg)" stroke="var(--french)" stroke-width="1.5"/>
      <text x="310" y="175" text-anchor="middle" class="label-bold" fill="var(--french)">50+ Verb Forms/Verb</text>
      <text x="310" y="192" text-anchor="middle" class="label-sm">parle, parles, parlait, parlera...</text>
      <line x1="310" y1="205" x2="310" y2="225" stroke="var(--english)" stroke-width="1" marker-end="url(#arrE)"/>
      <rect x="215" y="225" width="190" height="30" rx="5" fill="var(--english-bg)" stroke="var(--english)" stroke-width="1"/>
      <text x="310" y="244" text-anchor="middle" class="label" fill="var(--english)">EN: 5 forms + aux stacking</text>

      <!-- Spoke 3: Agreement (top-right) -->
      <line x1="620" y1="65" x2="750" y2="170" stroke="var(--center)" stroke-width="1.5" marker-end="url(#arrC)"/>
      <rect x="660" y="155" width="190" height="50" rx="8" fill="var(--french-bg)" stroke="var(--french)" stroke-width="1.5"/>
      <text x="755" y="175" text-anchor="middle" class="label-bold" fill="var(--french)">Rich Agreement (5+ types)</text>
      <text x="755" y="192" text-anchor="middle" class="label-sm">det-noun, adj-noun, subj-verb...</text>
      <line x1="755" y1="205" x2="755" y2="225" stroke="var(--english)" stroke-width="1" marker-end="url(#arrE)"/>
      <rect x="665" y="225" width="180" height="30" rx="5" fill="var(--english-bg)" stroke="var(--english)" stroke-width="1"/>
      <text x="755" y="244" text-anchor="middle" class="label" fill="var(--english)">EN: 3rd person -s only</text>

      <!-- Spoke 4: Articles (right) -->
      <line x1="690" y1="75" x2="935" y2="170" stroke="var(--center)" stroke-width="1.5" marker-end="url(#arrC)"/>
      <rect x="860" y="155" width="180" height="50" rx="8" fill="var(--french-bg)" stroke="var(--french)" stroke-width="1.5"/>
      <text x="950" y="175" text-anchor="middle" class="label-bold" fill="var(--french)">3-Way Articles (~11 forms)</text>
      <text x="950" y="192" text-anchor="middle" class="label-sm">def + indef + partitive</text>
      <line x1="950" y1="205" x2="950" y2="225" stroke="var(--english)" stroke-width="1" marker-end="url(#arrE)"/>
      <rect x="865" y="225" width="170" height="30" rx="5" fill="var(--english-bg)" stroke="var(--english)" stroke-width="1"/>
      <text x="950" y="244" text-anchor="middle" class="label" fill="var(--english)">EN: the/a + bare nouns</text>

      <!-- Spoke 5: Conditional/Subjunctive (bottom-left) -->
      <line x1="370" y1="120" x2="100" y2="290" stroke="var(--center)" stroke-width="1.5" marker-end="url(#arrC)"/>
      <rect x="15" y="275" width="170" height="50" rx="8" fill="var(--french-bg)" stroke="var(--french)" stroke-width="1.5"/>
      <text x="100" y="295" text-anchor="middle" class="label-bold" fill="var(--french)">Morph. Conditional</text>
      <text x="100" y="312" text-anchor="middle" class="label-sm">parlerait = 1 suffix</text>
      <line x1="100" y1="325" x2="100" y2="345" stroke="var(--english)" stroke-width="1" marker-end="url(#arrE)"/>
      <rect x="15" y="345" width="170" height="30" rx="5" fill="var(--english-bg)" stroke="var(--english)" stroke-width="1"/>
      <text x="100" y="364" text-anchor="middle" class="label" fill="var(--english)">EN: "would" (separate word)</text>

      <!-- Spoke 6: Subjunctive (bottom-center-left) -->
      <line x1="440" y1="125" x2="310" y2="290" stroke="var(--center)" stroke-width="1.5" marker-end="url(#arrC)"/>
      <rect x="210" y="275" width="200" height="50" rx="8" fill="var(--french-bg)" stroke="var(--french)" stroke-width="1.5"/>
      <text x="310" y="295" text-anchor="middle" class="label-bold" fill="var(--french)">Productive Subjunctive</text>
      <text x="310" y="312" text-anchor="middle" class="label-sm">qu'il parle (obligatory)</text>
      <line x1="310" y1="325" x2="310" y2="345" stroke="var(--english)" stroke-width="1" marker-end="url(#arrE)"/>
      <rect x="215" y="345" width="190" height="30" rx="5" fill="var(--english-bg)" stroke="var(--english)" stroke-width="1"/>
      <text x="310" y="364" text-anchor="middle" class="label" fill="var(--english)">EN: vestigial ("if I were")</text>

      <!-- Spoke 7: Clitics (bottom-center-right) -->
      <line x1="620" y1="125" x2="530" y2="290" stroke="var(--center)" stroke-width="1.5" marker-end="url(#arrC)"/>
      <rect x="435" y="275" width="190" height="50" rx="8" fill="var(--french-bg)" stroke="var(--french)" stroke-width="1.5"/>
      <text x="530" y="295" text-anchor="middle" class="label-bold" fill="var(--french)">Pre-Verbal Clitics</text>
      <text x="530" y="312" text-anchor="middle" class="label-sm">Je le lui donne (rigid slots)</text>
      <line x1="530" y1="325" x2="530" y2="345" stroke="var(--english)" stroke-width="1" marker-end="url(#arrE)"/>
      <rect x="435" y="345" width="190" height="30" rx="5" fill="var(--english-bg)" stroke="var(--english)" stroke-width="1"/>
      <text x="530" y="364" text-anchor="middle" class="label" fill="var(--english)">EN: post-verbal (I give it)</text>

      <!-- Spoke 8: Negation (bottom-right) -->
      <line x1="690" y1="120" x2="750" y2="290" stroke="var(--center)" stroke-width="1.5" marker-end="url(#arrC)"/>
      <rect x="660" y="275" width="190" height="50" rx="8" fill="var(--french-bg)" stroke="var(--french)" stroke-width="1.5"/>
      <text x="755" y="295" text-anchor="middle" class="label-bold" fill="var(--french)">Bipartite Negation</text>
      <text x="755" y="312" text-anchor="middle" class="label-sm">ne...pas (wraps verb)</text>
      <line x1="755" y1="325" x2="755" y2="345" stroke="var(--english)" stroke-width="1" marker-end="url(#arrE)"/>
      <rect x="665" y="345" width="180" height="30" rx="5" fill="var(--english-bg)" stroke="var(--english)" stroke-width="1"/>
      <text x="755" y="364" text-anchor="middle" class="label" fill="var(--english)">EN: do-support + not</text>

      <!-- Spoke 9: Adj Agreement (far bottom-right) -->
      <line x1="730" y1="110" x2="950" y2="290" stroke="var(--center)" stroke-width="1.5" marker-end="url(#arrC)"/>
      <rect x="860" y="275" width="180" height="50" rx="8" fill="var(--french-bg)" stroke="var(--french)" stroke-width="1.5"/>
      <text x="950" y="295" text-anchor="middle" class="label-bold" fill="var(--french)">Adj. Agreement x4</text>
      <text x="950" y="312" text-anchor="middle" class="label-sm">grand/grande/grands/grandes</text>
      <line x1="950" y1="325" x2="950" y2="345" stroke="var(--english)" stroke-width="1" marker-end="url(#arrE)"/>
      <rect x="865" y="345" width="170" height="30" rx="5" fill="var(--english-bg)" stroke="var(--english)" stroke-width="1"/>
      <text x="950" y="364" text-anchor="middle" class="label" fill="var(--english)">EN: "big" (invariable)</text>

      <!-- Decision tree box -->
      <g transform="translate(50, 400)">
        <rect x="0" y="0" width="960" height="85" rx="10" fill="var(--predict-bg)" stroke="var(--predict)" stroke-width="1.5"/>
        <text x="480" y="20" text-anchor="middle" class="title-text" fill="var(--predict)" style="font-size:12px;">THE PATTERN LEARNER'S ALGORITHM</text>
        <text x="480" y="40" text-anchor="middle" class="label" fill="var(--fg)">When you encounter something in French that confuses you, ask:</text>
        <text x="480" y="58" text-anchor="middle" class="label-bold" fill="var(--predict)">"Is this a consequence of French being more synthetic?"</text>
        <text x="480" y="76" text-anchor="middle" class="label" fill="var(--fg)">If YES (approx. 80% of the time): expect more morphological complexity per word but fewer total words.</text>
      </g>

      <!-- Decision trees reference -->
      <g transform="translate(50, 500)">
        <rect x="0" y="0" width="960" height="80" rx="10" fill="var(--accent-light)" stroke="var(--accent)" stroke-width="1.5"/>
        <text x="480" y="18" text-anchor="middle" class="title-text" fill="var(--accent)" style="font-size:12px;">8 DECISION TREES FOR THE PATTERN LEARNER'S TOOLKIT</text>
        <text x="40" y="40" text-anchor="start" class="label" fill="var(--fg)">1. Gender Prediction</text>
        <text x="40" y="55" text-anchor="start" class="label" fill="var(--fg)">2. Verb Conjugation</text>
        <text x="250" y="40" text-anchor="start" class="label" fill="var(--fg)">3. BAGS Placement</text>
        <text x="250" y="55" text-anchor="start" class="label" fill="var(--fg)">4. Liaison Rules</text>
        <text x="480" y="40" text-anchor="start" class="label" fill="var(--fg)">5. PC vs. Imparfait</text>
        <text x="480" y="55" text-anchor="start" class="label" fill="var(--fg)">6. WEIRDO Subjunctive</text>
        <text x="710" y="40" text-anchor="start" class="label" fill="var(--fg)">7. Article Selection</text>
        <text x="710" y="55" text-anchor="start" class="label" fill="var(--fg)">8. Clitic Ordering</text>
        <text x="480" y="73" text-anchor="middle" class="label-sm" fill="var(--accent)">Each tree transforms a "memorize this" problem into a "follow this algorithm" solution.</text>
      </g>
    </svg>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background:var(--center-bg);border-color:var(--center);"></div> Meta-pattern (root cause)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--french-bg);border-color:var(--french);"></div> French feature (predicted)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--english-bg);border-color:var(--english);"></div> English compensation</div>
  </div>

  <figcaption>
    <h2>Figure 1 -- The Meta-Pattern Cascade</h2>
    <p>The single principle "French is more morphologically synthetic" radiates outward to predict 9 major grammatical differences: gender, verb forms, agreement, articles, conditional mood, subjunctive, clitics, negation, and adjective agreement. Each French feature has an English compensatory strategy. For a pattern learner, this transforms French grammar from "thousands of arbitrary rules" into "one principle and its predictable consequences."</p>
  </figcaption>
</figure>
</body>
</html>
