<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liaison Rules -- Three-Category System</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --accent: #4361ee; --accent-light: #e8edff;
    --oblig: #22c55e; --oblig-bg: #dcfce7;
    --forbid: #ef4444; --forbid-bg: #fee2e2;
    --opt: #f59e0b; --opt-bg: #fef3c7;
    --english: #8b5cf6; --english-bg: #ede9fe;
    --muted: #6c757d; --caption-bg: #f8f9fa;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a; --fg: #e8e8f0; --surface: #1a1a2e; --border: #2d2d44;
      --accent: #6b8aff; --accent-light: #1e2a4a;
      --oblig: #4ade80; --oblig-bg: #14532d;
      --forbid: #f87171; --forbid-bg: #5c1a1a;
      --opt: #fbbf24; --opt-bg: #78350f;
      --english: #a78bfa; --english-bg: #2e1a5e;
      --muted: #9a9ab0; --caption-bg: #1a1a2e;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg); color: var(--fg);
    display: flex; justify-content: center; padding: 2rem 1rem; line-height: 1.6;
  }
  figure { max-width: 1100px; width: 100%; }
  .diagram-container {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 1.5rem 1rem; overflow-x: auto;
  }
  figcaption {
    text-align: center; margin-top: 1.5rem; padding: 1rem 1.5rem;
    background: var(--caption-bg); border-radius: 8px; border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  svg { display: block; margin: 0 auto; }
  .title-text { font: bold 14px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
  .label { font: 11px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
  .label-bold { font: bold 11px 'Segoe UI', system-ui, sans-serif; }
  .label-sm { font: 10px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
  .legend { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; margin-top: 1rem; font-size: 0.82rem; color: var(--muted); }
  .legend-item { display: flex; align-items: center; gap: 0.4rem; }
  .legend-swatch { width: 14px; height: 14px; border-radius: 3px; border: 1px solid var(--border); }
</style>
</head>
<body>
<figure>
  <div class="diagram-container">
    <svg viewBox="0 0 1060 700" xmlns="http://www.w3.org/2000/svg" style="min-width:780px;">
      <text x="530" y="25" text-anchor="middle" class="title-text" style="font-size:16px;">Liaison Rules: The Three-Category System</text>
      <text x="530" y="42" text-anchor="middle" class="label-sm" style="font-size:11px;">Silent final consonant pronounced before a vowel -- but ONLY in specific contexts</text>

      <!-- THREE ZONES SIDE BY SIDE -->

      <!-- OBLIGATORY (GREEN) -->
      <g transform="translate(15, 60)">
        <rect x="0" y="0" width="330" height="290" rx="10" fill="var(--oblig-bg)" stroke="var(--oblig)" stroke-width="2"/>
        <rect x="0" y="0" width="330" height="30" rx="10" fill="var(--oblig)" opacity="0.3"/>
        <text x="165" y="20" text-anchor="middle" class="title-text" fill="var(--oblig)">OBLIGATORY</text>

        <text x="15" y="48" text-anchor="start" class="label-sm" fill="var(--oblig)">Omission = grammatical error</text>

        <text x="15" y="70" text-anchor="start" class="label-bold" fill="var(--fg)">Determiner + noun:</text>
        <text x="15" y="84" text-anchor="start" class="label" fill="var(--fg)">les_amis, un_ami, des_enfants</text>

        <text x="15" y="104" text-anchor="start" class="label-bold" fill="var(--fg)">Pronoun + verb:</text>
        <text x="15" y="118" text-anchor="start" class="label" fill="var(--fg)">ils_ont, nous_avons, on_a</text>

        <text x="15" y="138" text-anchor="start" class="label-bold" fill="var(--fg)">Prenominal adj. + noun:</text>
        <text x="15" y="152" text-anchor="start" class="label" fill="var(--fg)">un petit_ami, les grands_arbres</text>

        <text x="15" y="172" text-anchor="start" class="label-bold" fill="var(--fg)">After tres/plus/moins/bien/trop:</text>
        <text x="15" y="186" text-anchor="start" class="label" fill="var(--fg)">tres_interessant, bien_entendu</text>

        <text x="15" y="206" text-anchor="start" class="label-bold" fill="var(--fg)">Fixed expressions:</text>
        <text x="15" y="220" text-anchor="start" class="label" fill="var(--fg)">les Etats-Unis, comment_allez-vous</text>

        <rect x="10" y="240" width="310" height="40" rx="5" fill="var(--oblig)" opacity="0.1" stroke="var(--oblig)" stroke-width="1"/>
        <text x="165" y="257" text-anchor="middle" class="label-bold" fill="var(--oblig)">RULE: Obligatory within tight</text>
        <text x="165" y="271" text-anchor="middle" class="label-bold" fill="var(--oblig)">syntactic bonds (det-noun, pron-verb)</text>
      </g>

      <!-- FORBIDDEN (RED) -->
      <g transform="translate(365, 60)">
        <rect x="0" y="0" width="330" height="290" rx="10" fill="var(--forbid-bg)" stroke="var(--forbid)" stroke-width="2"/>
        <rect x="0" y="0" width="330" height="30" rx="10" fill="var(--forbid)" opacity="0.3"/>
        <text x="165" y="20" text-anchor="middle" class="title-text" fill="var(--forbid)">FORBIDDEN</text>

        <text x="15" y="48" text-anchor="start" class="label-sm" fill="var(--forbid)">Production = grammatical error</text>

        <text x="15" y="70" text-anchor="start" class="label-bold" fill="var(--fg)">After "et" (and) -- NEVER:</text>
        <text x="15" y="84" text-anchor="start" class="label" fill="var(--fg)">pain et // eau (NOT *pain et_eau)</text>

        <text x="15" y="104" text-anchor="start" class="label-bold" fill="var(--fg)">Before aspirate-h words:</text>
        <text x="15" y="118" text-anchor="start" class="label" fill="var(--fg)">le // heros, les // haricots</text>

        <text x="15" y="138" text-anchor="start" class="label-bold" fill="var(--fg)">After singular nouns:</text>
        <text x="15" y="152" text-anchor="start" class="label" fill="var(--fg)">un etudiant // intelligent</text>

        <text x="15" y="172" text-anchor="start" class="label-bold" fill="var(--fg)">Before onze and oui:</text>
        <text x="15" y="186" text-anchor="start" class="label" fill="var(--fg)">le // onze mars, mais // oui</text>

        <rect x="10" y="240" width="310" height="40" rx="5" fill="var(--forbid)" opacity="0.1" stroke="var(--forbid)" stroke-width="1"/>
        <text x="165" y="257" text-anchor="middle" class="label-bold" fill="var(--forbid)">RULE: Forbidden across syntactic</text>
        <text x="165" y="271" text-anchor="middle" class="label-bold" fill="var(--forbid)">boundaries and before specific words</text>
      </g>

      <!-- OPTIONAL (AMBER) -->
      <g transform="translate(715, 60)">
        <rect x="0" y="0" width="330" height="290" rx="10" fill="var(--opt-bg)" stroke="var(--opt)" stroke-width="2"/>
        <rect x="0" y="0" width="330" height="30" rx="10" fill="var(--opt)" opacity="0.3"/>
        <text x="165" y="20" text-anchor="middle" class="title-text" fill="var(--opt)">OPTIONAL</text>

        <text x="15" y="48" text-anchor="start" class="label-sm" fill="var(--opt)">Register marker: more liaison = more formal</text>

        <text x="15" y="70" text-anchor="start" class="label-bold" fill="var(--fg)">After plural nouns:</text>
        <text x="15" y="84" text-anchor="start" class="label" fill="var(--fg)">les etudiants (?)intelligents</text>

        <text x="15" y="104" text-anchor="start" class="label-bold" fill="var(--fg)">After verbs (except etre/avoir):</text>
        <text x="15" y="118" text-anchor="start" class="label" fill="var(--fg)">ils parlent (?)anglais</text>

        <text x="15" y="138" text-anchor="start" class="label-bold" fill="var(--fg)">After prepositions:</text>
        <text x="15" y="152" text-anchor="start" class="label" fill="var(--fg)">dans (?)un an</text>

        <!-- Register gradient -->
        <rect x="15" y="180" width="300" height="50" rx="6" fill="var(--surface)" stroke="var(--opt)" stroke-width="1"/>
        <text x="165" y="197" text-anchor="middle" class="label-bold" fill="var(--opt)">THE FORMALITY DIAL</text>
        <rect x="25" y="205" width="280" height="12" rx="6" fill="var(--opt)" opacity="0.2"/>
        <rect x="25" y="205" width="80" height="12" rx="6" fill="var(--opt)" opacity="0.6"/>
        <text x="40" y="228" text-anchor="start" class="label-sm">Casual</text>
        <text x="165" y="228" text-anchor="middle" class="label-sm">Standard</text>
        <text x="290" y="228" text-anchor="end" class="label-sm">Formal</text>

        <rect x="10" y="240" width="310" height="40" rx="5" fill="var(--opt)" opacity="0.1" stroke="var(--opt)" stroke-width="1"/>
        <text x="165" y="257" text-anchor="middle" class="label-bold" fill="var(--opt)">RULE: Optional liaisons function as</text>
        <text x="165" y="271" text-anchor="middle" class="label-bold" fill="var(--opt)">a formality dial, not a binary rule</text>
      </g>

      <!-- CONSONANT PRONUNCIATION TABLE -->
      <g transform="translate(15, 375)">
        <rect x="0" y="0" width="1030" height="80" rx="10" fill="var(--accent-light)" stroke="var(--accent)" stroke-width="1.5"/>
        <text x="515" y="18" text-anchor="middle" class="title-text" fill="var(--accent)" style="font-size:12px;">WHICH CONSONANT SURFACES IN LIAISON?</text>

        <text x="40" y="42" text-anchor="start" class="label-bold" fill="var(--fg)">-s -> /z/</text>
        <text x="40" y="56" text-anchor="start" class="label-sm">les_amis</text>

        <text x="195" y="42" text-anchor="start" class="label-bold" fill="var(--fg)">-x -> /z/</text>
        <text x="195" y="56" text-anchor="start" class="label-sm">deux_amis</text>

        <text x="350" y="42" text-anchor="start" class="label-bold" fill="var(--fg)">-t -> /t/</text>
        <text x="350" y="56" text-anchor="start" class="label-sm">petit_ami</text>

        <text x="505" y="42" text-anchor="start" class="label-bold" fill="var(--fg)">-d -> /t/</text>
        <text x="505" y="56" text-anchor="start" class="label-sm">grand_homme</text>
        <text x="505" y="70" text-anchor="start" class="label-sm" fill="var(--accent)">(voicing change!)</text>

        <text x="680" y="42" text-anchor="start" class="label-bold" fill="var(--fg)">-n -> /n/</text>
        <text x="680" y="56" text-anchor="start" class="label-sm">un_ami</text>

        <text x="835" y="42" text-anchor="start" class="label-bold" fill="var(--fg)">-f -> /v/</text>
        <text x="835" y="56" text-anchor="start" class="label-sm">neuf_ans</text>
        <text x="835" y="70" text-anchor="start" class="label-sm" fill="var(--accent)">(voicing change! rare)</text>
      </g>

      <!-- DECISION TREE SUMMARY -->
      <g transform="translate(15, 475)">
        <rect x="0" y="0" width="1030" height="100" rx="10" fill="var(--surface)" stroke="var(--border)" stroke-width="1.5"/>
        <text x="515" y="18" text-anchor="middle" class="title-text" fill="var(--accent)" style="font-size:12px;">LIAISON DECISION ALGORITHM</text>

        <text x="30" y="40" text-anchor="start" class="label" fill="var(--fg)">1. Is next word vowel-initial (or mute-h)?</text>
        <text x="500" y="40" text-anchor="start" class="label-sm" fill="var(--fg)">NO -> No liaison (consonant stays silent)</text>

        <text x="30" y="56" text-anchor="start" class="label" fill="var(--fg)">2. Is this a forbidden context (after et, before h-aspire, after sg. noun)?</text>
        <text x="500" y="56" text-anchor="start" class="label-sm" fill="var(--forbid)">YES -> FORBIDDEN. Do not link.</text>

        <text x="30" y="72" text-anchor="start" class="label" fill="var(--fg)">3. Is this an obligatory context (det+noun, pron+verb, adj+noun)?</text>
        <text x="500" y="72" text-anchor="start" class="label-sm" fill="var(--oblig)">YES -> OBLIGATORY. Must link.</text>

        <text x="30" y="88" text-anchor="start" class="label" fill="var(--fg)">4. Otherwise:</text>
        <text x="500" y="88" text-anchor="start" class="label-sm" fill="var(--opt)">OPTIONAL. Link = formal; skip = casual.</text>
      </g>

      <!-- ENGLISH COMPARISON -->
      <g transform="translate(15, 595)">
        <rect x="0" y="0" width="1030" height="80" rx="10" fill="var(--english-bg)" stroke="var(--english)" stroke-width="1.5"/>
        <text x="515" y="18" text-anchor="middle" class="title-text" fill="var(--english)" style="font-size:12px;">ENGLISH COMPARISON</text>
        <text x="30" y="38" text-anchor="start" class="label" fill="var(--fg)">English has NO liaison system. Final consonants are always pronounced or always silent regardless of context.</text>
        <text x="30" y="55" text-anchor="start" class="label" fill="var(--fg)">Closest English parallel: linking-r in non-rhotic dialects ("far away" /fa:r.e.wei/), but this is one limited rule.</text>
        <text x="30" y="72" text-anchor="start" class="label-bold" fill="var(--english)">French liaison erases word boundaries; English preserves them. This is why French sounds "connected" to English ears.</text>
      </g>
    </svg>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background:var(--oblig-bg);border-color:var(--oblig);"></div> Obligatory (omission = error)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--forbid-bg);border-color:var(--forbid);"></div> Forbidden (production = error)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--opt-bg);border-color:var(--opt);"></div> Optional (register marker)</div>
  </div>

  <figcaption>
    <h2>Figure 5 -- Liaison Rules: The Three-Category System</h2>
    <p>French liaison -- pronouncing a normally silent final consonant before a vowel -- follows a systematic three-category system. Obligatory liaison occurs within tight syntactic bonds (determiner-noun, pronoun-verb). Forbidden liaison prevents linking across boundaries or before specific words. Optional liaison functions as a formality dial: more liaison = more formal register. English has no equivalent system.</p>
  </figcaption>
</figure>
</body>
</html>
