<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BAGS Adjective Placement</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --accent: #4361ee; --accent-light: #e8edff;
    --pre: #22c55e; --pre-bg: #dcfce7;
    --post: #3b82f6; --post-bg: #dbeafe;
    --change: #f59e0b; --change-bg: #fef3c7;
    --english: #8b5cf6; --english-bg: #ede9fe;
    --beauty: #ec4899; --age: #f59e0b; --good: #22c55e; --size: #3b82f6;
    --muted: #6c757d; --caption-bg: #f8f9fa;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a; --fg: #e8e8f0; --surface: #1a1a2e; --border: #2d2d44;
      --accent: #6b8aff; --accent-light: #1e2a4a;
      --pre: #4ade80; --pre-bg: #14532d;
      --post: #60a5fa; --post-bg: #1e3a5f;
      --change: #fbbf24; --change-bg: #78350f;
      --english: #a78bfa; --english-bg: #2e1a5e;
      --beauty: #f472b6; --age: #fbbf24; --good: #4ade80; --size: #60a5fa;
      --muted: #9a9ab0; --caption-bg: #1a1a2e;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg); color: var(--fg);
    display: flex; justify-content: center; padding: 2rem 1rem; line-height: 1.6;
  }
  figure { max-width: 1100px; width: 100%; }
  .diagram-container {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 1.5rem 1rem; overflow-x: auto;
  }
  figcaption {
    text-align: center; margin-top: 1.5rem; padding: 1rem 1.5rem;
    background: var(--caption-bg); border-radius: 8px; border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  svg { display: block; margin: 0 auto; }
  .title-text { font: bold 14px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
  .label { font: 11px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
  .label-bold { font: bold 11px 'Segoe UI', system-ui, sans-serif; }
  .label-sm { font: 10px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
  .word { font: bold 14px 'Segoe UI', system-ui, sans-serif; }
  .legend { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; margin-top: 1rem; font-size: 0.82rem; color: var(--muted); }
  .legend-item { display: flex; align-items: center; gap: 0.4rem; }
  .legend-swatch { width: 14px; height: 14px; border-radius: 3px; border: 1px solid var(--border); }
</style>
</head>
<body>
<figure>
  <div class="diagram-container">
    <svg viewBox="0 0 1060 720" xmlns="http://www.w3.org/2000/svg" style="min-width:780px;">
      <text x="530" y="25" text-anchor="middle" class="title-text" style="font-size:16px;">BAGS Adjective Placement Decision Tree</text>
      <text x="530" y="42" text-anchor="middle" class="label-sm" style="font-size:11px;">French default: adjective AFTER noun (85%). BAGS exception: adjective BEFORE noun.</text>

      <!-- DECISION FLOW -->
      <rect x="380" y="55" width="300" height="35" rx="17" fill="var(--accent-light)" stroke="var(--accent)" stroke-width="2"/>
      <text x="530" y="77" text-anchor="middle" class="label-bold" fill="var(--accent)">Where does this adjective go?</text>

      <line x1="530" y1="90" x2="530" y2="110" stroke="var(--fg)" stroke-width="1.5"/>

      <!-- Q1: BAGS? -->
      <rect x="380" y="110" width="300" height="30" rx="6" fill="var(--pre-bg)" stroke="var(--pre)" stroke-width="1.5"/>
      <text x="530" y="129" text-anchor="middle" class="label-bold" fill="var(--pre)">Is it a BAGS adjective? (see list below)</text>

      <!-- YES -> Pre-nominal -->
      <line x1="680" y1="125" x2="780" y2="125" stroke="var(--pre)" stroke-width="1.5"/>
      <text x="730" y="118" text-anchor="middle" class="label-sm" fill="var(--pre)">YES</text>
      <rect x="780" y="110" width="250" height="35" rx="6" fill="var(--pre-bg)" stroke="var(--pre)" stroke-width="2"/>
      <text x="905" y="125" text-anchor="middle" class="word" fill="var(--pre)">[ADJ] + NOUN</text>
      <text x="905" y="140" text-anchor="middle" class="label-sm">une belle maison, un petit chat</text>

      <!-- NO -> Q2 -->
      <text x="520" y="155" text-anchor="middle" class="label-sm" fill="var(--fg)">NO</text>
      <line x1="530" y1="140" x2="530" y2="168" stroke="var(--fg)" stroke-width="1.5"/>

      <!-- Q2: Position-dependent? -->
      <rect x="350" y="168" width="360" height="30" rx="6" fill="var(--change-bg)" stroke="var(--change)" stroke-width="1.5"/>
      <text x="530" y="187" text-anchor="middle" class="label-bold" fill="var(--change)">Does it change meaning by position? (see list below)</text>

      <!-- YES -> check meaning -->
      <line x1="710" y1="183" x2="780" y2="183" stroke="var(--change)" stroke-width="1.5"/>
      <text x="745" y="177" text-anchor="middle" class="label-sm" fill="var(--change)">YES</text>
      <rect x="780" y="168" width="250" height="35" rx="6" fill="var(--change-bg)" stroke="var(--change)" stroke-width="2"/>
      <text x="905" y="185" text-anchor="middle" class="label-bold" fill="var(--change)">Check desired meaning</text>
      <text x="905" y="198" text-anchor="middle" class="label-sm">Position selects between meanings</text>

      <!-- NO -> default post-nominal -->
      <text x="520" y="212" text-anchor="middle" class="label-sm" fill="var(--fg)">NO</text>
      <line x1="530" y1="198" x2="530" y2="223" stroke="var(--fg)" stroke-width="1.5"/>

      <rect x="380" y="223" width="300" height="35" rx="6" fill="var(--post-bg)" stroke="var(--post)" stroke-width="2"/>
      <text x="530" y="238" text-anchor="middle" class="word" fill="var(--post)">NOUN + [ADJ]</text>
      <text x="530" y="253" text-anchor="middle" class="label-sm">Default (85%): une maison blanche</text>

      <!-- ========== BAGS CATEGORIES ========== -->
      <g transform="translate(20, 275)">
        <text x="510" y="0" text-anchor="middle" class="title-text" fill="var(--pre)">The BAGS Categories (Pre-Nominal Adjectives)</text>

        <!-- B: Beauty -->
        <rect x="10" y="15" width="240" height="80" rx="8" fill="var(--surface)" stroke="var(--beauty)" stroke-width="2"/>
        <rect x="10" y="15" width="240" height="22" rx="8" fill="var(--beauty)" opacity="0.2"/>
        <text x="130" y="32" text-anchor="middle" class="label-bold" fill="var(--beauty)">B -- Beauty</text>
        <text x="25" y="52" text-anchor="start" class="label" fill="var(--fg)">beau/belle (beautiful)</text>
        <text x="25" y="66" text-anchor="start" class="label" fill="var(--fg)">joli/jolie (pretty)</text>
        <text x="25" y="82" text-anchor="start" class="label-sm" fill="var(--beauty)">bel (m. before vowel): un bel homme</text>

        <!-- A: Age -->
        <rect x="265" y="15" width="240" height="80" rx="8" fill="var(--surface)" stroke="var(--age)" stroke-width="2"/>
        <rect x="265" y="15" width="240" height="22" rx="8" fill="var(--age)" opacity="0.2"/>
        <text x="385" y="32" text-anchor="middle" class="label-bold" fill="var(--age)">A -- Age</text>
        <text x="280" y="52" text-anchor="start" class="label" fill="var(--fg)">jeune (young), vieux/vieille (old)</text>
        <text x="280" y="66" text-anchor="start" class="label" fill="var(--fg)">nouveau/nouvelle (new)</text>
        <text x="280" y="82" text-anchor="start" class="label-sm" fill="var(--age)">vieil, nouvel (m. before vowel)</text>

        <!-- G: Goodness -->
        <rect x="520" y="15" width="240" height="80" rx="8" fill="var(--surface)" stroke="var(--good)" stroke-width="2"/>
        <rect x="520" y="15" width="240" height="22" rx="8" fill="var(--good)" opacity="0.2"/>
        <text x="640" y="32" text-anchor="middle" class="label-bold" fill="var(--good)">G -- Goodness</text>
        <text x="535" y="52" text-anchor="start" class="label" fill="var(--fg)">bon/bonne (good)</text>
        <text x="535" y="66" text-anchor="start" class="label" fill="var(--fg)">mauvais/mauvaise (bad)</text>
        <text x="535" y="82" text-anchor="start" class="label" fill="var(--fg)">meilleur/meilleure (better/best)</text>

        <!-- S: Size -->
        <rect x="775" y="15" width="240" height="80" rx="8" fill="var(--surface)" stroke="var(--size)" stroke-width="2"/>
        <rect x="775" y="15" width="240" height="22" rx="8" fill="var(--size)" opacity="0.2"/>
        <text x="895" y="32" text-anchor="middle" class="label-bold" fill="var(--size)">S -- Size</text>
        <text x="790" y="52" text-anchor="start" class="label" fill="var(--fg)">grand (big), petit (small)</text>
        <text x="790" y="66" text-anchor="start" class="label" fill="var(--fg)">gros (fat/big), long (long)</text>
        <text x="790" y="82" text-anchor="start" class="label" fill="var(--fg)">court (short)</text>

        <!-- Deep pattern -->
        <rect x="10" y="105" width="1005" height="28" rx="5" fill="var(--accent-light)" stroke="var(--accent)" stroke-width="1"/>
        <text x="510" y="123" text-anchor="middle" class="label-bold" fill="var(--accent)">The deeper pattern: BAGS adjectives are SHORT (1-2 syllables), HIGH-FREQUENCY, and SUBJECTIVE/EVALUATIVE</text>
      </g>

      <!-- ========== MEANING-CHANGE PAIRS ========== -->
      <g transform="translate(20, 425)">
        <text x="510" y="0" text-anchor="middle" class="title-text" fill="var(--change)">Position-Dependent Meaning Changes</text>
        <text x="510" y="15" text-anchor="middle" class="label-sm">Same adjective, different position = different meaning</text>

        <!-- Table -->
        <rect x="60" y="25" width="900" height="25" rx="4" fill="var(--change)" opacity="0.15"/>
        <text x="80" y="42" text-anchor="start" class="label-bold" fill="var(--fg)">Adjective</text>
        <text x="230" y="42" text-anchor="start" class="label-bold" fill="var(--pre)">Before noun (figurative)</text>
        <text x="550" y="42" text-anchor="start" class="label-bold" fill="var(--post)">After noun (literal)</text>

        <line x1="60" y1="52" x2="960" y2="52" stroke="var(--border)" stroke-width="1"/>

        <text x="80" y="70" text-anchor="start" class="label-bold" fill="var(--change)">ancien</text>
        <text x="230" y="70" text-anchor="start" class="label" fill="var(--pre)">un ancien collegue = a former colleague</text>
        <text x="550" y="70" text-anchor="start" class="label" fill="var(--post)">un chateau ancien = an ancient castle</text>

        <text x="80" y="90" text-anchor="start" class="label-bold" fill="var(--change)">grand</text>
        <text x="230" y="90" text-anchor="start" class="label" fill="var(--pre)">un grand homme = a great man</text>
        <text x="550" y="90" text-anchor="start" class="label" fill="var(--post)">un homme grand = a tall man</text>

        <text x="80" y="110" text-anchor="start" class="label-bold" fill="var(--change)">pauvre</text>
        <text x="230" y="110" text-anchor="start" class="label" fill="var(--pre)">un pauvre homme = a pitiable man</text>
        <text x="550" y="110" text-anchor="start" class="label" fill="var(--post)">un homme pauvre = a poor (broke) man</text>

        <text x="80" y="130" text-anchor="start" class="label-bold" fill="var(--change)">propre</text>
        <text x="230" y="130" text-anchor="start" class="label" fill="var(--pre)">mon propre cahier = my own notebook</text>
        <text x="550" y="130" text-anchor="start" class="label" fill="var(--post)">un cahier propre = a clean notebook</text>

        <text x="80" y="150" text-anchor="start" class="label-bold" fill="var(--change)">cher</text>
        <text x="230" y="150" text-anchor="start" class="label" fill="var(--pre)">un cher ami = a dear friend</text>
        <text x="550" y="150" text-anchor="start" class="label" fill="var(--post)">un restaurant cher = expensive restaurant</text>

        <text x="80" y="170" text-anchor="start" class="label-bold" fill="var(--change)">seul</text>
        <text x="230" y="170" text-anchor="start" class="label" fill="var(--pre)">un seul enfant = a single/only child</text>
        <text x="550" y="170" text-anchor="start" class="label" fill="var(--post)">un enfant seul = a lonely child</text>

        <text x="80" y="190" text-anchor="start" class="label-bold" fill="var(--change)">certain</text>
        <text x="230" y="190" text-anchor="start" class="label" fill="var(--pre)">un certain charme = a certain charm</text>
        <text x="550" y="190" text-anchor="start" class="label" fill="var(--post)">une chose certaine = a sure thing</text>
      </g>

      <!-- ENGLISH COMPARISON -->
      <g transform="translate(30, 640)">
        <rect x="0" y="0" width="1000" height="60" rx="10" fill="var(--english-bg)" stroke="var(--english)" stroke-width="1.5"/>
        <text x="500" y="18" text-anchor="middle" class="title-text" fill="var(--english)" style="font-size:12px;">ENGLISH COMPARISON</text>
        <text x="500" y="36" text-anchor="middle" class="label" fill="var(--fg)">English adjectives ALWAYS precede the noun: "a white house," "an interesting book," "a tall man."</text>
        <text x="500" y="52" text-anchor="middle" class="label-bold" fill="var(--english)">English speakers must REVERSE their default, then learn BAGS exceptions that reverse BACK. Double inversion.</text>
      </g>
    </svg>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background:var(--pre-bg);border-color:var(--pre);"></div> Pre-nominal (BAGS)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--post-bg);border-color:var(--post);"></div> Post-nominal (default 85%)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--change-bg);border-color:var(--change);"></div> Position changes meaning</div>
  </div>

  <figcaption>
    <h2>Figure 4 -- BAGS Adjective Placement Decision Tree</h2>
    <p>French adjectives default to post-nominal position (85%), the opposite of English. The BAGS exception (Beauty, Age, Goodness, Size) captures the short, high-frequency, evaluative adjectives that precede the noun. Some adjectives change meaning with position: "un grand homme" (a great man) vs. "un homme grand" (a tall man). The deeper pattern: pre-nominal = subjective/figurative; post-nominal = objective/literal.</p>
  </figcaption>
</figure>
</body>
</html>
