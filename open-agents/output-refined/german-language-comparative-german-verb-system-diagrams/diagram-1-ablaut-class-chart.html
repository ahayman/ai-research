<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Seven Ablaut Classes — German &amp; English Cognate Pairs</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --de-color: #3b82f6;
    --de-bg: #eff6ff;
    --en-color: #10b981;
    --en-bg: #ecfdf5;
    --shared-color: #f59e0b;
    --shared-bg: #fffbeb;
    --muted: #6c757d;
    --class1: #e63946;
    --class2: #f77f00;
    --class3: #fcbf49;
    --class4: #2a9d8f;
    --class5: #264653;
    --class6: #7209b7;
    --class7: #3a0ca3;
    --class1-bg: #fef2f2;
    --class2-bg: #fff7ed;
    --class3-bg: #fefce8;
    --class4-bg: #f0fdfa;
    --class5-bg: #f0f4f8;
    --class6-bg: #faf5ff;
    --class7-bg: #eef2ff;
    --defected: #ef4444;
    --defected-bg: #fef2f2;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --de-color: #60a5fa;
      --de-bg: #1e293b;
      --en-color: #34d399;
      --en-bg: #132e24;
      --shared-color: #fbbf24;
      --shared-bg: #2a2510;
      --muted: #9a9ab0;
      --class1: #ff6b6b;
      --class2: #ffa94d;
      --class3: #ffe066;
      --class4: #63e6be;
      --class5: #74c0fc;
      --class6: #b197fc;
      --class7: #91a7ff;
      --class1-bg: #2a1515;
      --class2-bg: #2a2010;
      --class3-bg: #2a2810;
      --class4-bg: #0f2922;
      --class5-bg: #152030;
      --class6-bg: #1e152a;
      --class7-bg: #15182a;
      --defected: #ff6b6b;
      --defected-bg: #2a1515;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure {
    max-width: 1300px;
    width: 100%;
    background: var(--surface);
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
  }
  h2 { text-align: center; font-size: 1.4rem; margin-bottom: 0.3rem; }
  .subtitle { text-align: center; font-size: 0.95rem; color: var(--muted); margin-bottom: 2rem; }

  .class-grid { display: flex; flex-direction: column; gap: 0.8rem; }

  .class-row {
    border: 2px solid var(--border);
    border-radius: 12px;
    padding: 1rem 1.2rem;
    display: grid;
    grid-template-columns: 120px 140px 1fr;
    gap: 1rem;
    align-items: start;
  }

  .class-label {
    font-weight: 800;
    font-size: 0.95rem;
    display: flex;
    flex-direction: column;
    gap: 0.2rem;
  }
  .class-label .num {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    opacity: 0.8;
  }

  .vowel-pattern {
    font-family: 'Courier New', monospace;
    font-size: 1rem;
    font-weight: 700;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.15rem;
  }
  .vowel-pattern .arrows {
    font-size: 0.75rem;
    color: var(--muted);
  }
  .vowel-label {
    font-size: 0.65rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .cognate-pairs {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
  }
  .pair {
    display: flex;
    flex-direction: column;
    gap: 0.15rem;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.4rem 0.7rem;
    min-width: 160px;
    font-size: 0.78rem;
  }
  .pair-de {
    font-weight: 700;
    color: var(--de-color);
  }
  .pair-en {
    color: var(--en-color);
    font-style: italic;
  }
  .pair-en.defected {
    color: var(--defected);
    text-decoration: line-through;
    text-decoration-color: var(--defected);
    text-decoration-thickness: 1.5px;
  }
  .pair-en.defected::after {
    content: ' (now regular)';
    text-decoration: none;
    font-style: normal;
    font-size: 0.68rem;
    opacity: 0.8;
  }
  .pair .match-badge {
    font-size: 0.62rem;
    background: var(--shared-bg);
    color: var(--shared-color);
    padding: 1px 5px;
    border-radius: 3px;
    width: fit-content;
    font-weight: 600;
  }

  .class-row:nth-child(1) { border-color: var(--class1); }
  .class-row:nth-child(1) .class-label { color: var(--class1); }
  .class-row:nth-child(1) .vowel-pattern { color: var(--class1); }

  .class-row:nth-child(2) { border-color: var(--class2); }
  .class-row:nth-child(2) .class-label { color: var(--class2); }
  .class-row:nth-child(2) .vowel-pattern { color: var(--class2); }

  .class-row:nth-child(3) { border-color: var(--class3); }
  .class-row:nth-child(3) .class-label { color: var(--class3); }
  .class-row:nth-child(3) .vowel-pattern { color: var(--class3); }

  .class-row:nth-child(4) { border-color: var(--class4); }
  .class-row:nth-child(4) .class-label { color: var(--class4); }
  .class-row:nth-child(4) .vowel-pattern { color: var(--class4); }

  .class-row:nth-child(5) { border-color: var(--class5); }
  .class-row:nth-child(5) .class-label { color: var(--class5); }
  .class-row:nth-child(5) .vowel-pattern { color: var(--class5); }

  .class-row:nth-child(6) { border-color: var(--class6); }
  .class-row:nth-child(6) .class-label { color: var(--class6); }
  .class-row:nth-child(6) .vowel-pattern { color: var(--class6); }

  .class-row:nth-child(7) { border-color: var(--class7); }
  .class-row:nth-child(7) .class-label { color: var(--class7); }
  .class-row:nth-child(7) .vowel-pattern { color: var(--class7); }

  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 1.2rem;
    margin-top: 1.5rem;
    justify-content: center;
    font-size: 0.8rem;
  }
  .legend-item { display: flex; align-items: center; gap: 0.4rem; }
  .legend-swatch {
    width: 14px; height: 14px;
    border-radius: 3px;
    border: 1px solid var(--border);
  }

  .insight-box {
    margin-top: 1.5rem;
    padding: 1rem 1.25rem;
    border-radius: 8px;
    border-left: 4px solid var(--shared-color);
    background: var(--shared-bg);
    font-size: 0.88rem;
  }
  .insight-box strong { display: block; margin-bottom: 0.3rem; }

  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid var(--border);
  }
  figcaption strong { display: block; font-size: 1.05rem; margin-bottom: 0.4rem; }
  figcaption span { font-size: 0.88rem; color: var(--muted); line-height: 1.5; }

  @media (max-width: 900px) {
    .class-row {
      grid-template-columns: 1fr;
      gap: 0.6rem;
    }
    .vowel-pattern { flex-direction: row; gap: 0.5rem; }
    figure { padding: 1.2rem; }
    .pair { min-width: 140px; }
  }
</style>
</head>
<body>
<figure>
  <h2>The Seven Ablaut Classes</h2>
  <p class="subtitle">German strong verbs and their English cognates share the same Proto-Germanic vowel-change patterns.</p>

  <div class="class-grid">

    <!-- CLASS I -->
    <div class="class-row">
      <div class="class-label">
        <span class="num">Class I</span>
        ei / i
      </div>
      <div class="vowel-pattern">
        <span class="vowel-label">inf / past / part</span>
        ei &rarr; ie/i &rarr; ie/i
      </div>
      <div class="cognate-pairs">
        <div class="pair">
          <span class="pair-de">schreiben / schrieb / geschrieben</span>
          <span class="pair-en">write / wrote / written</span>
          <span class="match-badge">same class</span>
        </div>
        <div class="pair">
          <span class="pair-de">reiten / ritt / geritten</span>
          <span class="pair-en">ride / rode / ridden</span>
          <span class="match-badge">same class</span>
        </div>
        <div class="pair">
          <span class="pair-de">scheinen / schien / geschienen</span>
          <span class="pair-en">shine / shone / shone</span>
          <span class="match-badge">same class</span>
        </div>
        <div class="pair">
          <span class="pair-de">bleiben / blieb / geblieben</span>
          <span class="pair-en">stay / stayed / stayed</span>
        </div>
      </div>
    </div>

    <!-- CLASS II -->
    <div class="class-row">
      <div class="class-label">
        <span class="num">Class II</span>
        ie / o
      </div>
      <div class="vowel-pattern">
        <span class="vowel-label">inf / past / part</span>
        ie/&uuml; &rarr; o &rarr; o
      </div>
      <div class="cognate-pairs">
        <div class="pair">
          <span class="pair-de">fliegen / flog / geflogen</span>
          <span class="pair-en">fly / flew / flown</span>
          <span class="match-badge">same class</span>
        </div>
        <div class="pair">
          <span class="pair-de">fliehen / floh / geflohen</span>
          <span class="pair-en">flee / fled / fled</span>
          <span class="match-badge">same class</span>
        </div>
        <div class="pair">
          <span class="pair-de">l&uuml;gen / log / gelogen</span>
          <span class="pair-en">lie (untruth) / lied / lied</span>
        </div>
        <div class="pair">
          <span class="pair-de">ziehen / zog / gezogen</span>
          <span class="pair-en">tug (archaic cognate)</span>
        </div>
      </div>
    </div>

    <!-- CLASS III -->
    <div class="class-row">
      <div class="class-label">
        <span class="num">Class III</span>
        i-a-u
      </div>
      <div class="vowel-pattern">
        <span class="vowel-label">inf / past / part</span>
        i/e &rarr; a &rarr; u/o
      </div>
      <div class="cognate-pairs">
        <div class="pair">
          <span class="pair-de">singen / sang / gesungen</span>
          <span class="pair-en">sing / sang / sung</span>
          <span class="match-badge">identical pattern</span>
        </div>
        <div class="pair">
          <span class="pair-de">trinken / trank / getrunken</span>
          <span class="pair-en">drink / drank / drunk</span>
          <span class="match-badge">identical pattern</span>
        </div>
        <div class="pair">
          <span class="pair-de">finden / fand / gefunden</span>
          <span class="pair-en">find / found / found</span>
          <span class="match-badge">same class</span>
        </div>
        <div class="pair">
          <span class="pair-de">helfen / half / geholfen</span>
          <span class="pair-en defected">help / helped</span>
        </div>
      </div>
    </div>

    <!-- CLASS IV -->
    <div class="class-row">
      <div class="class-label">
        <span class="num">Class IV</span>
        e-a-o
      </div>
      <div class="vowel-pattern">
        <span class="vowel-label">inf / past / part</span>
        e/i &rarr; a &rarr; o
      </div>
      <div class="cognate-pairs">
        <div class="pair">
          <span class="pair-de">sprechen / sprach / gesprochen</span>
          <span class="pair-en">speak / spoke / spoken</span>
          <span class="match-badge">same class</span>
        </div>
        <div class="pair">
          <span class="pair-de">brechen / brach / gebrochen</span>
          <span class="pair-en">break / broke / broken</span>
          <span class="match-badge">same class</span>
        </div>
        <div class="pair">
          <span class="pair-de">stehlen / stahl / gestohlen</span>
          <span class="pair-en">steal / stole / stolen</span>
          <span class="match-badge">same class</span>
        </div>
        <div class="pair">
          <span class="pair-de">nehmen / nahm / genommen</span>
          <span class="pair-en">take (cf. archaic "nim")</span>
        </div>
      </div>
    </div>

    <!-- CLASS V -->
    <div class="class-row">
      <div class="class-label">
        <span class="num">Class V</span>
        e-a-e
      </div>
      <div class="vowel-pattern">
        <span class="vowel-label">inf / past / part</span>
        e &rarr; a &rarr; e
      </div>
      <div class="cognate-pairs">
        <div class="pair">
          <span class="pair-de">geben / gab / gegeben</span>
          <span class="pair-en">give / gave / given</span>
          <span class="match-badge">same class</span>
        </div>
        <div class="pair">
          <span class="pair-de">sehen / sah / gesehen</span>
          <span class="pair-en">see / saw / seen</span>
          <span class="match-badge">same class</span>
        </div>
        <div class="pair">
          <span class="pair-de">essen / a&szlig; / gegessen</span>
          <span class="pair-en">eat / ate / eaten</span>
          <span class="match-badge">same class</span>
        </div>
        <div class="pair">
          <span class="pair-de">vergessen / verga&szlig; / vergessen</span>
          <span class="pair-en">forget / forgot / forgotten</span>
          <span class="match-badge">same class</span>
        </div>
      </div>
    </div>

    <!-- CLASS VI -->
    <div class="class-row">
      <div class="class-label">
        <span class="num">Class VI</span>
        a-u-a
      </div>
      <div class="vowel-pattern">
        <span class="vowel-label">inf / past / part</span>
        a &rarr; u &rarr; a
      </div>
      <div class="cognate-pairs">
        <div class="pair">
          <span class="pair-de">fahren / fuhr / gefahren</span>
          <span class="pair-en">fare (archaic) / fared</span>
        </div>
        <div class="pair">
          <span class="pair-de">graben / grub / gegraben</span>
          <span class="pair-en">dig / dug / dug</span>
          <span class="match-badge">same class</span>
        </div>
        <div class="pair">
          <span class="pair-de">waschen / wusch / gewaschen</span>
          <span class="pair-en defected">wash / washed</span>
        </div>
        <div class="pair">
          <span class="pair-de">tragen / trug / getragen</span>
          <span class="pair-en">carry (cf. "drag")</span>
        </div>
      </div>
    </div>

    <!-- CLASS VII -->
    <div class="class-row">
      <div class="class-label">
        <span class="num">Class VII</span>
        mixed &rarr; ie
      </div>
      <div class="vowel-pattern">
        <span class="vowel-label">inf / past / part</span>
        various &rarr; ie &rarr; various
      </div>
      <div class="cognate-pairs">
        <div class="pair">
          <span class="pair-de">fallen / fiel / gefallen</span>
          <span class="pair-en">fall / fell / fallen</span>
          <span class="match-badge">same class</span>
        </div>
        <div class="pair">
          <span class="pair-de">halten / hielt / gehalten</span>
          <span class="pair-en">hold / held / held</span>
          <span class="match-badge">same class</span>
        </div>
        <div class="pair">
          <span class="pair-de">h&auml;ngen / hing / gehangen</span>
          <span class="pair-en">hang / hung / hung</span>
          <span class="match-badge">same class</span>
        </div>
        <div class="pair">
          <span class="pair-de">laufen / lief / gelaufen</span>
          <span class="pair-en">run (cf. "leap")</span>
        </div>
      </div>
    </div>

  </div>

  <div class="legend">
    <div class="legend-item">
      <div class="legend-swatch" style="background: var(--de-color);"></div>
      German strong verb
    </div>
    <div class="legend-item">
      <div class="legend-swatch" style="background: var(--en-color);"></div>
      English cognate (still strong)
    </div>
    <div class="legend-item">
      <div class="legend-swatch" style="background: var(--defected);"></div>
      <span style="text-decoration: line-through;">English defected to regular</span>
    </div>
    <div class="legend-item">
      <div class="legend-swatch" style="background: var(--shared-color);"></div>
      Same ablaut class preserved
    </div>
  </div>

  <div class="insight-box">
    <strong>Pattern Learner Insight</strong>
    English "irregular" verbs are not random exceptions. They are surviving members of these same seven Proto-Germanic ablaut classes. German preserves the system more completely (~170 strong verbs vs. English's ~150 irregulars with blurred class boundaries). If a verb is irregular in English, its German cognate is almost certainly strong -- and in the same class.
  </div>

  <figcaption>
    <strong>Seven Ablaut Classes: The Shared Engine of Germanic Verbs</strong>
    <span>Both German and English inherited the same vowel-change system from Proto-Germanic. German maintained the class structure; English leveled many members into the regular -ed pattern. The cognate pairs reveal the hidden system behind English "irregular" verbs.</span>
  </figcaption>
</figure>
</body>
</html>
