<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Register Continuum</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #f8f9fa;
    color: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 2rem;
  }
  figure {
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
    max-width: 1050px;
    width: 100%;
  }
  h2 { text-align: center; font-size: 1.3rem; margin-bottom: 0.3rem; }
  .subtitle { text-align: center; font-size: 0.9rem; color: #6c757d; margin-bottom: 2rem; }

  .continuum {
    position: relative;
    padding: 0 0 2rem 0;
  }
  .gradient-bar {
    height: 8px;
    border-radius: 4px;
    background: linear-gradient(to right, #7c3aed, #3b82f6, #0ea5e9, #22c55e, #f59e0b);
    margin-bottom: 1.5rem;
  }
  .registers {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 0.5rem;
  }
  .register-col {
    padding: 0.8rem;
    border-radius: 10px;
    font-size: 0.78rem;
  }
  .register-col h3 {
    font-size: 0.9rem;
    margin-bottom: 0.1rem;
  }
  .register-col .context {
    font-size: 0.7rem;
    font-style: italic;
    margin-bottom: 0.6rem;
    opacity: 0.7;
  }
  .feature-section {
    margin-bottom: 0.5rem;
  }
  .feature-section .f-label {
    font-weight: 700;
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 0.2rem;
    opacity: 0.8;
  }
  .feature-section .f-examples {
    font-size: 0.72rem;
    line-height: 1.4;
  }
  .request-example {
    margin-top: 0.5rem;
    padding: 0.4rem;
    background: rgba(255,255,255,0.3);
    border-radius: 6px;
    font-style: italic;
    font-size: 0.72rem;
    line-height: 1.4;
  }

  /* Color per register */
  .r-frozen   { background: #ede9fe; border: 1px solid #c4b5fd; color: #4c1d95; }
  .r-formal   { background: #dbeafe; border: 1px solid #93c5fd; color: #1e3a5f; }
  .r-consult  { background: #e0f2fe; border: 1px solid #7dd3fc; color: #0c4a6e; }
  .r-casual   { background: #dcfce7; border: 1px solid #86efac; color: #14532d; }
  .r-intimate { background: #fef3c7; border: 1px solid #fcd34d; color: #78350f; }

  .dim-axes {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0.5rem;
    margin-top: 1.5rem;
  }
  .dim-axis {
    text-align: center;
    padding: 0.5rem;
    background: #f1f5f9;
    border-radius: 8px;
  }
  .dim-axis .dim-label {
    font-weight: 700;
    font-size: 0.75rem;
    color: #475569;
    margin-bottom: 0.3rem;
  }
  .dim-axis .dim-range {
    font-size: 0.7rem;
    color: #64748b;
    display: flex;
    justify-content: space-between;
    padding: 0 0.3rem;
  }
  .dim-axis .dim-arrow {
    font-size: 0.8rem;
    color: #94a3b8;
  }

  .pattern-note {
    margin-top: 1.5rem;
    padding: 1rem;
    background: #f0f4ff;
    border-radius: 8px;
    border-left: 4px solid #3b82f6;
    font-size: 0.82rem;
    line-height: 1.5;
    color: #374151;
  }
  .pattern-note strong { color: #1e40af; }

  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid #e9ecef;
  }
  figcaption strong { display: block; font-size: 1.05rem; margin-bottom: 0.3rem; }
  figcaption span { font-size: 0.85rem; color: #6c757d; line-height: 1.5; }

  @media (prefers-color-scheme: dark) {
    body { background: #1a1a2e; color: #e9ecef; }
    figure { background: #2d2d44; box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
    h2 { color: #e9ecef; }
    .subtitle { color: #adb5bd; }
    .r-frozen   { background: #2e1065; border-color: #7c3aed; color: #ddd6fe; }
    .r-formal   { background: #1e2a4a; border-color: #3b82f6; color: #bfdbfe; }
    .r-consult  { background: #0c2d48; border-color: #0ea5e9; color: #bae6fd; }
    .r-casual   { background: #052e16; border-color: #22c55e; color: #bbf7d0; }
    .r-intimate { background: #451a03; border-color: #f59e0b; color: #fde68a; }
    .request-example { background: rgba(0,0,0,0.2); }
    .dim-axis { background: #1e2a4a; }
    .dim-axis .dim-label { color: #adb5bd; }
    .dim-axis .dim-range { color: #94a3b8; }
    .dim-axis .dim-arrow { color: #64748b; }
    .pattern-note { background: #1e2a4a; border-left-color: #60a5fa; color: #cbd5e1; }
    .pattern-note strong { color: #93bbfc; }
    figcaption { border-top-color: #3d3d5c; }
    figcaption strong { color: #e9ecef; }
    figcaption span { color: #adb5bd; }
  }

  @media (max-width: 900px) {
    .registers { grid-template-columns: 1fr 1fr; }
    .dim-axes { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 500px) {
    .registers { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<figure>
  <h2>English Register Continuum</h2>
  <p class="subtitle">Five registers from frozen/ritual to intimate -- each shifts vocabulary, syntax, hedging, and discourse markers</p>

  <div class="continuum">
    <div class="gradient-bar"></div>
    <div class="registers">

      <div class="register-col r-frozen">
        <h3>Frozen / Ritual</h3>
        <div class="context">Law, liturgy, oaths</div>
        <div class="feature-section">
          <div class="f-label">Vocabulary</div>
          <div class="f-examples">Latinate, archaic: <em>hereby, whereas, hitherto</em></div>
        </div>
        <div class="feature-section">
          <div class="f-label">Syntax</div>
          <div class="f-examples">Fixed formulae, passive voice, nominalization</div>
        </div>
        <div class="feature-section">
          <div class="f-label">Hedging</div>
          <div class="f-examples">None (maximum authority)</div>
        </div>
        <div class="feature-section">
          <div class="f-label">Discourse markers</div>
          <div class="f-examples">None (pre-scripted)</div>
        </div>
        <div class="request-example">"The court hereby orders the defendant to..."</div>
      </div>

      <div class="register-col r-formal">
        <h3>Formal</h3>
        <div class="context">Academic writing, business</div>
        <div class="feature-section">
          <div class="f-label">Vocabulary</div>
          <div class="f-examples">Latinate/French: <em>commence, facilitate, endeavour</em></div>
        </div>
        <div class="feature-section">
          <div class="f-label">Syntax</div>
          <div class="f-examples">Complex clauses, passive voice, impersonal constructions</div>
        </div>
        <div class="feature-section">
          <div class="f-label">Hedging</div>
          <div class="f-examples">Heavy academic hedging: <em>it may be suggested that</em></div>
        </div>
        <div class="feature-section">
          <div class="f-label">Discourse markers</div>
          <div class="f-examples"><em>Furthermore, however, consequently</em></div>
        </div>
        <div class="request-example">"I wonder if I might trouble you for a moment of your time."</div>
      </div>

      <div class="register-col r-consult">
        <h3>Consultative</h3>
        <div class="context">Workplace, service, classrooms</div>
        <div class="feature-section">
          <div class="f-label">Vocabulary</div>
          <div class="f-examples">Mixed: technical + everyday</div>
        </div>
        <div class="feature-section">
          <div class="f-label">Syntax</div>
          <div class="f-examples">Standard SVO, some complexity, complete sentences</div>
        </div>
        <div class="feature-section">
          <div class="f-label">Hedging</div>
          <div class="f-examples">Modal hedges: <em>could, would, might</em></div>
        </div>
        <div class="feature-section">
          <div class="f-label">Discourse markers</div>
          <div class="f-examples"><em>So, basically, actually, right</em></div>
        </div>
        <div class="request-example">"Would you mind getting me a coffee when you have a moment?"</div>
      </div>

      <div class="register-col r-casual">
        <h3>Casual</h3>
        <div class="context">Friends, peers</div>
        <div class="feature-section">
          <div class="f-label">Vocabulary</div>
          <div class="f-examples">Germanic base, slang: <em>grab, stuff, awesome, chill</em></div>
        </div>
        <div class="feature-section">
          <div class="f-label">Syntax</div>
          <div class="f-examples">Fragments, ellipsis, contractions</div>
        </div>
        <div class="feature-section">
          <div class="f-label">Hedging</div>
          <div class="f-examples">Minimal: <em>like, sort of, kind of</em></div>
        </div>
        <div class="feature-section">
          <div class="f-label">Discourse markers</div>
          <div class="f-examples"><em>Like, you know, I mean, so</em></div>
        </div>
        <div class="request-example">"Can you grab me a coffee?"</div>
      </div>

      <div class="register-col r-intimate">
        <h3>Intimate</h3>
        <div class="context">Close family, partners</div>
        <div class="feature-section">
          <div class="f-label">Vocabulary</div>
          <div class="f-examples">Private codes, nicknames, one-word utterances</div>
        </div>
        <div class="feature-section">
          <div class="f-label">Syntax</div>
          <div class="f-examples">Minimal: single words, shared context fills gaps</div>
        </div>
        <div class="feature-section">
          <div class="f-label">Hedging</div>
          <div class="f-examples">None needed (face threat is minimal)</div>
        </div>
        <div class="feature-section">
          <div class="f-label">Discourse markers</div>
          <div class="f-examples">Idiosyncratic, in-group only</div>
        </div>
        <div class="request-example">"Coffee."</div>
      </div>

    </div>
  </div>

  <div class="dim-axes">
    <div class="dim-axis">
      <div class="dim-label">Vocabulary Layer</div>
      <div class="dim-range"><span>Latinate</span><span class="dim-arrow">----</span><span>Germanic</span></div>
    </div>
    <div class="dim-axis">
      <div class="dim-label">Sentence Complexity</div>
      <div class="dim-range"><span>Complex</span><span class="dim-arrow">----</span><span>Fragment</span></div>
    </div>
    <div class="dim-axis">
      <div class="dim-label">Hedging Density</div>
      <div class="dim-range"><span>Heavy</span><span class="dim-arrow">----</span><span>None</span></div>
    </div>
    <div class="dim-axis">
      <div class="dim-label">Indirectness</div>
      <div class="dim-range"><span>Maximal</span><span class="dim-arrow">----</span><span>Direct</span></div>
    </div>
  </div>

  <div class="pattern-note">
    <strong>The Pattern:</strong> Register is not a single dial -- it is four correlated dimensions moving in parallel. As formality decreases: vocabulary shifts from Latinate to Germanic, syntax shrinks from complex clauses to fragments, hedging density follows a U-curve (none at frozen, peaks at formal/consultative, drops again at intimate), and indirectness peaks in the middle registers where face-threat is actively managed. The same request ("get me a coffee") traverses all five registers with predictable transformations at each level. Reading register is reading all four dimensions simultaneously.
  </div>

  <figcaption>
    <strong>Figure 5 -- English Register Continuum</strong>
    <span>Five registers from Joos (1961) with vocabulary, syntax, hedging, and discourse marker profiles at each level. The same request is shown at each register, demonstrating systematic transformation of pragmatic strategy.</span>
  </figcaption>
</figure>
</body>
</html>
