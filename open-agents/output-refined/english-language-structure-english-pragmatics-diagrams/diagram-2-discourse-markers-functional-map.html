<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Discourse Markers -- Functional Map</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #f8f9fa;
    color: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 2rem;
  }
  figure {
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
    max-width: 1100px;
    width: 100%;
  }
  h2 { text-align: center; font-size: 1.3rem; margin-bottom: 0.3rem; }
  .subtitle { text-align: center; font-size: 0.9rem; color: #6c757d; margin-bottom: 2rem; }

  .matrix-container { overflow-x: auto; }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.82rem;
  }
  th {
    padding: 0.6rem 0.4rem;
    text-align: center;
    font-weight: 700;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    border-bottom: 2px solid #dee2e6;
  }
  th:first-child {
    text-align: left;
    min-width: 100px;
  }
  .fn-col { color: #6c757d; }
  td {
    padding: 0.5rem 0.4rem;
    text-align: center;
    border-bottom: 1px solid #f0f0f0;
    vertical-align: middle;
  }
  td:first-child {
    text-align: left;
    font-weight: 700;
    white-space: nowrap;
  }
  .marker-label { font-size: 0.9rem; }

  /* Dots: primary function vs secondary */
  .dot {
    display: inline-block;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    vertical-align: middle;
  }
  .primary { background: #3b82f6; }
  .secondary { background: #93c5fd; }
  .rare { background: #dbeafe; border: 1px solid #93c5fd; }
  .none { background: transparent; }

  .legend {
    display: flex;
    justify-content: center;
    gap: 2rem;
    margin-top: 1.2rem;
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.8rem;
    color: #495057;
  }
  .legend-swatch {
    width: 14px; height: 14px; border-radius: 50%;
  }

  .pattern-note {
    margin-top: 1.5rem;
    padding: 1rem;
    background: #f0f4ff;
    border-radius: 8px;
    border-left: 4px solid #3b82f6;
    font-size: 0.82rem;
    line-height: 1.5;
    color: #374151;
  }
  .pattern-note strong { color: #1e40af; }

  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid #e9ecef;
  }
  figcaption strong { display: block; font-size: 1.05rem; margin-bottom: 0.3rem; }
  figcaption span { font-size: 0.85rem; color: #6c757d; line-height: 1.5; }

  @media (prefers-color-scheme: dark) {
    body { background: #1a1a2e; color: #e9ecef; }
    figure { background: #2d2d44; box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
    h2 { color: #e9ecef; }
    .subtitle { color: #adb5bd; }
    th { border-bottom-color: #3d3d5c; color: #e9ecef; }
    .fn-col { color: #adb5bd; }
    td { border-bottom-color: #3d3d5c; color: #e9ecef; }
    .rare { border-color: #60a5fa; background: rgba(59,130,246,0.15); }
    .legend-item { color: #adb5bd; }
    .pattern-note { background: #1e2a4a; border-left-color: #60a5fa; color: #cbd5e1; }
    .pattern-note strong { color: #93bbfc; }
    figcaption { border-top-color: #3d3d5c; }
    figcaption strong { color: #e9ecef; }
    figcaption span { color: #adb5bd; }
  }
</style>
</head>
<body>
<figure>
  <h2>English Discourse Markers -- Functional Map</h2>
  <p class="subtitle">How each marker maps to pragmatic functions (primary, secondary, occasional)</p>

  <div class="matrix-container">
  <table>

        <th class="fn-col">Common<br>Ground</th>
        <th class="fn-col">Turn<br>Mgmt</th>
        <th class="fn-col">Assessment /<br>Stance</th>
        <th class="fn-col">Summary /<br>Result</th>

      </tr>
    </thead>
    <tbody>
      <tr>
        <td><span class="marker-label">well</span></td>

        <td><span class="dot secondary"></span></td>

      </tr>

      </tr>
      <tr>

  </div>

  <div class="legend">
    <div class="legend-item"><span class="legend-swatch primary"></span> Primary function</div>
    <div class="legend-item"><span class="legend-swatch secondary"></span> Secondary function</div>
    <div class="legend-item"><span class="legend-swatch rare"></span> Occasional function</div>
    <div class="legend-item"><span class="legend-swatch none" style="border:1px solid #ccc;"></span> Not typical</div>
  </div>

  <div class="pattern-note">
    <strong>The Pattern:</strong> Each discourse marker has a distinct "functional fingerprint." No two markers are interchangeable: "well" signals a dispreferred response while "so" signals a result; "like" hedges while "actually" corrects. The column-view reveals clusters: topic management and boundary marking are the most populated functions, reflecting the core job of discourse markers -- organizing the invisible architecture of conversation. Markers originating from different word classes (adverbs, conjunctions, verbs) converge on the same pragmatic functions, evidence that function, not etymology, determines their use.
  </div>

  <figcaption>
    <strong>Figure 2 -- Discourse Markers Functional Map</strong>
    <span>Matrix of 10 major English discourse markers against 8 pragmatic functions. Based on Schiffrin (1987), Fraser (1999), and corpus pragmatics research. Each marker has a unique functional profile; the pattern of filled cells is the marker's "pragmatic signature."</span>
  </figcaption>
