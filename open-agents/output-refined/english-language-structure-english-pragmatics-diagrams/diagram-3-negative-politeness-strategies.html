<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Negative Politeness Strategies</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #f8f9fa;
    color: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 2rem;
  }
  figure {
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
    max-width: 1000px;
    width: 100%;
  }
  h2 { text-align: center; font-size: 1.3rem; margin-bottom: 0.3rem; }
  .subtitle { text-align: center; font-size: 0.9rem; color: #6c757d; margin-bottom: 1.5rem; }

  .context-bar {
    display: flex;
    justify-content: center;
    gap: 2rem;
    margin-bottom: 1.5rem;
    padding: 0.8rem;
    background: #f0f4ff;
    border-radius: 8px;
    font-size: 0.8rem;
  }
  .context-item { display: flex; align-items: center; gap: 0.4rem; }
  .context-icon { font-size: 1rem; }

  .five-super {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 0.5rem;
    margin-bottom: 1.5rem;
  }
  .super-strategy {
    padding: 0.6rem;
    border-radius: 8px;
    text-align: center;
    font-size: 0.75rem;
    font-weight: 600;
    border: 2px solid transparent;
    opacity: 0.5;
  }
  .super-strategy.active {
    opacity: 1;
    border-color: currentColor;
    position: relative;
  }
  .super-strategy.active::after {
    content: '';
    position: absolute;
    bottom: -10px;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    border-left: 8px solid transparent;
    border-right: 8px solid transparent;
    border-top: 8px solid #3b82f6;
  }
  .s1 { background: #fef2f2; color: #dc2626; }
  .s2 { background: #fef9ee; color: #d97706; }
  .s3 { background: #eff6ff; color: #2563eb; }
  .s4 { background: #f5f3ff; color: #7c3aed; }
  .s5 { background: #f0fdf4; color: #16a34a; }

  .neg-strategies {
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
  }
  .neg-row {
    display: grid;
    grid-template-columns: 32px 200px 1fr;
    gap: 0.8rem;
    align-items: center;
    padding: 0.6rem 0.8rem;
    background: #f8fafc;
    border-radius: 8px;
    border-left: 4px solid #3b82f6;
  }
  .neg-num {
    font-weight: 800;
    font-size: 0.9rem;
    color: #3b82f6;
    text-align: center;
  }
  .neg-name {
    font-weight: 600;
    font-size: 0.85rem;
  }
  .neg-example {
    font-style: italic;
    font-size: 0.82rem;
    color: #4b5563;
  }

  .formula-box {
    margin-top: 1.5rem;
    padding: 1rem 1.5rem;
    background: #f0fdf4;
    border-radius: 8px;
    border-left: 4px solid #16a34a;
    text-align: center;
  }
  .formula-box .label {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #16a34a;
    font-weight: 700;
    margin-bottom: 0.5rem;
  }
  .formula {
    font-size: 1rem;
    font-weight: 600;
    color: #1a1a2e;
    letter-spacing: 0.03em;
  }
  .formula .var { color: #3b82f6; font-style: italic; }

  .pattern-note {
    margin-top: 1.5rem;
    padding: 1rem;
    background: #f0f4ff;
    border-radius: 8px;
    border-left: 4px solid #3b82f6;
    font-size: 0.82rem;
    line-height: 1.5;
    color: #374151;
  }
  .pattern-note strong { color: #1e40af; }

  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid #e9ecef;
  }
  figcaption strong { display: block; font-size: 1.05rem; margin-bottom: 0.3rem; }
  figcaption span { font-size: 0.85rem; color: #6c757d; line-height: 1.5; }

  @media (prefers-color-scheme: dark) {
    body { background: #1a1a2e; color: #e9ecef; }
    figure { background: #2d2d44; box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
    h2 { color: #e9ecef; }
    .subtitle { color: #adb5bd; }
    .context-bar { background: #1e2a4a; color: #cbd5e1; }
    .s1 { background: #3b1515; } .s2 { background: #3b2a0f; }
    .s3 { background: #1e2a4a; } .s4 { background: #2a1f4a; }
    .s5 { background: #1a2e1a; }
    .neg-row { background: #1e2a4a; border-left-color: #60a5fa; }
    .neg-num { color: #60a5fa; }
    .neg-name { color: #e9ecef; }
    .neg-example { color: #adb5bd; }
    .formula-box { background: #1a2e1a; border-left-color: #4ade80; }
    .formula-box .label { color: #4ade80; }
    .formula { color: #e9ecef; }
    .formula .var { color: #60a5fa; }
    .pattern-note { background: #1e2a4a; border-left-color: #60a5fa; color: #cbd5e1; }
    .pattern-note strong { color: #93bbfc; }
    figcaption { border-top-color: #3d3d5c; }
    figcaption strong { color: #e9ecef; }
    figcaption span { color: #adb5bd; }
  }

  @media (max-width: 700px) {
    .five-super { grid-template-columns: repeat(3, 1fr); }
    .neg-row { grid-template-columns: 28px 1fr; }
    .neg-example { grid-column: 1 / -1; }
  }
</style>
</head>
<body>
<figure>
  <h2>English Negative Politeness Strategies</h2>
  <p class="subtitle">Brown &amp; Levinson's 10 sub-strategies -- the dominant system in English interaction</p>

  <div class="five-super">
    <div class="super-strategy s1">1. Bald<br>On-Record</div>
    <div class="super-strategy s2">2. Positive<br>Politeness</div>
    <div class="super-strategy s3 active">3. Negative<br>Politeness</div>
    <div class="super-strategy s4">4. Off-Record<br>(Hints)</div>
    <div class="super-strategy s5">5. Don't Do<br>the FTA</div>
  </div>

  <div class="neg-strategies">
    <div class="neg-row">
      <div class="neg-num">1</div>
      <div class="neg-name">Be conventionally indirect</div>
      <div class="neg-example">"Could you close the door?"</div>
    </div>
    <div class="neg-row">
      <div class="neg-num">2</div>
      <div class="neg-name">Question / hedge</div>
      <div class="neg-example">"I was wondering if you might possibly..."</div>
    </div>
    <div class="neg-row">
      <div class="neg-num">3</div>
      <div class="neg-name">Be pessimistic</div>
      <div class="neg-example">"I don't suppose you could...?"</div>
    </div>
    <div class="neg-row">
      <div class="neg-num">4</div>
      <div class="neg-name">Minimize the imposition</div>
      <div class="neg-example">"Could you just spare a tiny second?"</div>
    </div>
    <div class="neg-row">
      <div class="neg-num">5</div>
      <div class="neg-name">Give deference</div>
      <div class="neg-example">"Sir, if you wouldn't mind..."</div>
    </div>
    <div class="neg-row">
      <div class="neg-num">6</div>
      <div class="neg-name">Apologize</div>
      <div class="neg-example">"Sorry to bother you, but..."</div>
    </div>
    <div class="neg-row">
      <div class="neg-num">7</div>
      <div class="neg-name">Impersonalize S and H</div>
      <div class="neg-example">"It would be appreciated if..."</div>
    </div>
    <div class="neg-row">
      <div class="neg-num">8</div>
      <div class="neg-name">State as a general rule</div>
      <div class="neg-example">"Passengers are kindly requested to..."</div>
    </div>
    <div class="neg-row">
      <div class="neg-num">9</div>
      <div class="neg-name">Nominalize</div>
      <div class="neg-example">"Your compliance would be appreciated."</div>
    </div>
    <div class="neg-row">
      <div class="neg-num">10</div>
      <div class="neg-name">Go on record as incurring a debt</div>
      <div class="neg-example">"I'd be so grateful if you could..."</div>
    </div>
  </div>

  <div class="formula-box">
    <div class="label">Brown &amp; Levinson's Weight Formula</div>
    <div class="formula">W<sub>x</sub> = <span class="var">D</span>(S,H) + <span class="var">P</span>(H,S) + <span class="var">R</span><sub>x</sub></div>
    <div style="font-size:0.75rem; color:#6c757d; margin-top:0.3rem;">
      <span class="var" style="color:#3b82f6;">D</span> = social distance &nbsp;|&nbsp;
      <span class="var" style="color:#3b82f6;">P</span> = relative power of hearer &nbsp;|&nbsp;
      <span class="var" style="color:#3b82f6;">R</span> = ranking of imposition
    </div>
    <div style="font-size:0.75rem; color:#6c757d; margin-top:0.2rem;">
      Higher W<sub>x</sub> = more strategies stacked = more hedging, indirectness, deference
    </div>
  </div>

  <div class="pattern-note">
    <strong>The Pattern:</strong> English speakers instinctively compute the weight formula for every request. A high-D, high-P, high-R situation (asking your boss for a day off) triggers heavy stacking of strategies 1-6: "I'm really sorry to ask (6), and I know this is short notice (4), but I was wondering (2) if there might be any possibility (3) of my taking Friday off (9)?" A low-D, low-P, low-R situation (asking a close friend to pass something) requires only strategy 1: "Could you pass that?" The number of stacked strategies is a direct readout of the speaker's assessment of D + P + R.
  </div>

  <figcaption>
    <strong>Figure 3 -- English Negative Politeness Strategies</strong>
    <span>The 10 sub-strategies of Brown &amp; Levinson (1987) that form the dominant politeness orientation in English. Strategies are routinely combined: higher social stakes trigger more simultaneous strategies.</span>
  </figcaption>
</figure>
</body>
</html>
