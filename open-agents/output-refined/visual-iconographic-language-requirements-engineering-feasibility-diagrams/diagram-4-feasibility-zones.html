<!-- Diagram: Feasibility Zones -->
<!-- Type: flowchart -->
<!-- Generated: 2026-03-31 -->
<!-- Description: Classifies every major capability into feasible/researchable/unknown zones with research questions -->

<figure class="concept-diagram" id="diagram-feasibility-zones">
  <div class="diagram-container">
    <pre class="mermaid">
flowchart TD
    subgraph GREEN["Feasible Now"]
        G1["Core symbol set<br/>(65-100 base symbols)"]
        G2["Basic spatial<br/>composition rules"]
        G3["Digital SVG prototype<br/>with input method"]
        G4["Tier 1 communication<br/>(requests, descriptions,<br/>emotions, questions)"]
        G5["Personal and<br/>small-group use"]
        G6["Core vocabulary<br/>(200-400 concepts)"]
        G7["Dual coding design<br/>(visual + verbal names)"]
    end

    subgraph YELLOW["Requires Research"]
        Y1["Complex grammar in 2D<br/>(conditionals, relative clauses)"]
        Y2["Cross-cultural symbol<br/>validation"]
        Y3["Optimal visual complexity<br/>(Cowan's ~4 vs Miller's 7)"]
        Y4["Tier 2 expressiveness<br/>(narrative, causation,<br/>quantification)"]
        Y5["AAC platform<br/>integration"]
        Y6["Learnability empirical<br/>testing"]
        Y7["Compositional fluency<br/>development timeline"]
    end

    subgraph RED["May Be Impossible"]
        R1["Full semasiographic<br/>expressiveness (Tier 3)"]
        R2["Truly universal symbols<br/>(cross-cultural neutrality)"]
        R3["Competing with natural<br/>language speed"]
        R4["Cultural neutrality<br/>at scale"]
        R5["Avoiding the<br/>adoption trap"]
        R6["Preventing compositional<br/>opacity over time"]
    end

    subgraph RESEARCH["Research Questions That Could Move Items From Yellow to Green"]
        RQ1["Can sign language spatial<br/>grammar adapt to 2D?"]
        RQ2["Do image-schema-based symbols<br/>learn faster than arbitrary symbols?"]
        RQ3["What is the compositionality<br/>ceiling in static 2D form?"]
        RQ4["Does autistic EPF provide<br/>a learning advantage for<br/>visual symbol systems?"]
    end

    YELLOW -.->|"answers could<br/>unlock"| GREEN
    RED -.->|"breakthroughs<br/>needed"| YELLOW

    style GREEN fill:#dcfce7,stroke:#16a34a,color:#14532d
    style YELLOW fill:#fef3c7,stroke:#d97706,color:#78350f
    style RED fill:#fee2e2,stroke:#dc2626,color:#7f1d1d
    style RESEARCH fill:#e0f2fe,stroke:#0284c7,color:#1e3a5f
    </pre>
  </div>
  <figcaption>
    <strong>Figure 4:</strong> Every major capability classified by feasibility. Green zone: achievable with current knowledge (core symbol set, basic composition, Tier 1 communication, personal use). Yellow zone: plausible but requires empirical research (complex grammar in 2D, cross-cultural validation, learnability testing). Red zone: may be fundamentally impossible (full semasiographic expressiveness, cultural neutrality at scale, competing with speech speed). The most important honest assessment: not everything will work. Design must prioritize what is achievable.
  </figcaption>
</figure>
