<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feasibility Pyramid</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --accent: #4361ee;
    --muted: #6c757d;
    --caption-bg: #f8f9fa;
    --tier1: #16a34a;
    --tier1-bg: #dcfce7;
    --tier2: #d97706;
    --tier2-bg: #fef3c7;
    --tier3: #dc2626;
    --tier3-bg: #fee2e2;
    --grid: #e9ecef;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --accent: #6b8aff;
      --muted: #9a9ab0;
      --caption-bg: #1a1a2e;
      --tier1: #34d399;
      --tier1-bg: #064e3b;
      --tier2: #fbbf24;
      --tier2-bg: #78350f;
      --tier3: #ff6b7a;
      --tier3-bg: #450a0a;
      --grid: #252540;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure { max-width: 1000px; width: 100%; }
  .chart-wrapper {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.5rem 1rem;
    overflow-x: auto;
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding: 1rem 1.5rem;
    background: var(--caption-bg);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
</style>
</head>
<body>
<figure>
  <div class="chart-wrapper">
    <svg viewBox="0 0 920 580" xmlns="http://www.w3.org/2000/svg" style="min-width:680px;">
      <defs>
        <style>
          .title { font: bold 16px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
          .subtitle { font: 12px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
          .tier-label { font: bold 14px 'Segoe UI', system-ui, sans-serif; fill: white; }
          .tier-sub { font: bold 11px 'Segoe UI', system-ui, sans-serif; fill: white; }
          .tier-desc { font: 10px 'Segoe UI', system-ui, sans-serif; fill: white; }
          .side-title { font: bold 12px 'Segoe UI', system-ui, sans-serif; }
          .side-text { font: 10px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
          .note-text { font: 11px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
          .time-label { font: italic 10px 'Segoe UI', system-ui, sans-serif; }
          .risk-label { font: bold 10px 'Segoe UI', system-ui, sans-serif; }
        </style>
      </defs>

      <text x="460" y="28" text-anchor="middle" class="title">The Feasibility Pyramid</text>
      <text x="460" y="46" text-anchor="middle" class="subtitle">Three Tiers of Achievability -- From Functional Communication to Full Expressiveness</text>

      <!-- Pyramid -->
      <!-- Tier 3 (top - smallest) -->
      <polygon points="460,75 330,195 590,195" fill="var(--tier3)" opacity="0.85"/>
      <text x="460" y="120" text-anchor="middle" class="tier-label">TIER 3</text>
      <text x="460" y="138" text-anchor="middle" class="tier-sub">May Be Impossible</text>
      <text x="460" y="155" text-anchor="middle" class="tier-desc">Full natural language</text>
      <text x="460" y="168" text-anchor="middle" class="tier-desc">equivalence</text>

      <!-- Tier 2 (middle) -->
      <polygon points="330,200 200,345 720,345 590,200" fill="var(--tier2)" opacity="0.85"/>
      <text x="460" y="245" text-anchor="middle" class="tier-label">TIER 2</text>
      <text x="460" y="263" text-anchor="middle" class="tier-sub">Requires Research</text>
      <text x="460" y="283" text-anchor="middle" class="tier-desc">Extended expressiveness: conditionals, causation,</text>
      <text x="460" y="296" text-anchor="middle" class="tier-desc">narrative, relative clauses, modality</text>

      <!-- Tier 1 (base - largest) -->
      <polygon points="200,350 80,490 840,490 720,350" fill="var(--tier1)" opacity="0.85"/>
      <text x="460" y="395" text-anchor="middle" class="tier-label">TIER 1</text>
      <text x="460" y="413" text-anchor="middle" class="tier-sub">Achievable Now</text>
      <text x="460" y="433" text-anchor="middle" class="tier-desc">Functional daily communication: requests, descriptions,</text>
      <text x="460" y="446" text-anchor="middle" class="tier-desc">actions, emotions, questions, social exchange (200-400 concepts)</text>

      <!-- Right side: Capabilities -->
      <g transform="translate(710, 75)">
        <!-- Tier 3 capabilities -->
        <rect x="0" y="0" width="190" height="110" rx="6" fill="var(--tier3-bg)" stroke="var(--tier3)" stroke-width="1.5"/>
        <text x="95" y="18" text-anchor="middle" class="side-title" fill="var(--tier3)">Tier 3 Capabilities</text>
        <text x="10" y="36" class="side-text">Recursive embedding</text>
        <text x="10" y="50" class="side-text">Counterfactual conditionals</text>
        <text x="10" y="64" class="side-text">Technical/legal precision</text>
        <text x="10" y="78" class="side-text">Literary expression</text>
        <text x="10" y="92" class="side-text">Humor, irony, sarcasm</text>
        <text x="95" y="108" text-anchor="middle" class="risk-label" fill="var(--tier3)">No semasiographic system has achieved this</text>
      </g>

      <g transform="translate(710, 200)">
        <!-- Tier 2 capabilities -->
        <rect x="0" y="0" width="190" height="130" rx="6" fill="var(--tier2-bg)" stroke="var(--tier2)" stroke-width="1.5"/>
        <text x="95" y="18" text-anchor="middle" class="side-title" fill="var(--tier2)">Tier 2 Capabilities</text>
        <text x="10" y="36" class="side-text">Complex negation (X is not Y)</text>
        <text x="10" y="50" class="side-text">Conditionals (if X, then Y)</text>
        <text x="10" y="64" class="side-text">Causation (because, therefore)</text>
        <text x="10" y="78" class="side-text">Quantification (all, some, none)</text>
        <text x="10" y="92" class="side-text">Relative clauses</text>
        <text x="10" y="106" class="side-text">Reported speech</text>
        <text x="10" y="120" class="side-text">Tense/aspect/modality</text>
      </g>

      <!-- Left side: Timeline -->
      <g transform="translate(10, 75)">
        <rect x="0" y="0" width="140" height="60" rx="6" fill="var(--tier3-bg)" stroke="var(--tier3)" stroke-width="1"/>
        <text x="70" y="18" text-anchor="middle" class="time-label" fill="var(--tier3)">Timeline: Unknown</text>
        <text x="70" y="34" text-anchor="middle" class="side-text">May require fundamental</text>
        <text x="70" y="48" text-anchor="middle" class="side-text">breakthroughs or may</text>
        <text x="70" y="60" text-anchor="middle" class="side-text">never be fully achievable</text>

        <rect x="0" y="130" width="140" height="50" rx="6" fill="var(--tier2-bg)" stroke="var(--tier2)" stroke-width="1"/>
        <text x="70" y="148" text-anchor="middle" class="time-label" fill="var(--tier2)">Timeline: 2-5 years</text>
        <text x="70" y="164" text-anchor="middle" class="side-text">Requires design innovation</text>
        <text x="70" y="178" text-anchor="middle" class="side-text">drawing on sign language</text>

        <rect x="0" y="260" width="140" height="50" rx="6" fill="var(--tier1-bg)" stroke="var(--tier1)" stroke-width="1"/>
        <text x="70" y="278" text-anchor="middle" class="time-label" fill="var(--tier1)">Timeline: Now</text>
        <text x="70" y="294" text-anchor="middle" class="side-text">Current knowledge and</text>
        <text x="70" y="308" text-anchor="middle" class="side-text">technology sufficient</text>
      </g>

      <!-- Bottom note -->
      <rect x="100" y="510" width="720" height="50" rx="10" fill="var(--surface)" stroke="var(--accent)" stroke-width="2"/>
      <text x="460" y="530" text-anchor="middle" class="note-text"><tspan font-weight="bold">Honest assessment:</tspan> Tier 1 is genuinely valuable on its own -- functional daily communication for people</text>
      <text x="460" y="547" text-anchor="middle" class="note-text">whose current options are more limited. Perfection is not the standard; improvement over the status quo is.</text>
    </svg>
  </div>
  <figcaption>
    <h2>Figure 1 &mdash; The Feasibility Pyramid: Three Tiers of Achievability</h2>
    <p>Expressiveness requirements separated into three tiers of feasibility. Tier 1 (functional daily communication, ~200-400 concepts) is achievable with current knowledge -- equivalent to Makaton's scope. Tier 2 (extended expressiveness including conditionals, causation, narrative) requires design innovation, particularly adapting sign language's spatial grammar to 2D. Tier 3 (full natural language equivalence) is an open question -- no semasiographic system has ever achieved this, and it may not be possible in 2D static form.</p>
  </figcaption>
</figure>
</body>
</html>
