<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Underconnectivity Pattern</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --muted: #6c757d;
    --local: #198754; --local-bg: #edfff5;
    --long: #dc3545; --long-bg: #fee2e2;
    --accent: #4361ee;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a; --fg: #e8e8f0; --surface: #1a1a2e; --border: #2d2d44;
      --muted: #9a9ab0;
      --local: #51cf66; --local-bg: #0a2a15;
      --long: #ff6b6b; --long-bg: #2a1010;
      --accent: #6b8aff;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--fg); display: flex; justify-content: center; padding: 2rem 1rem; }
  figure { max-width: 900px; width: 100%; background: var(--surface); border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); padding: 2.5rem; }
  h2 { text-align: center; font-size: 1.4rem; margin-bottom: 0.4rem; }
  .subtitle { text-align: center; font-size: 0.95rem; color: var(--muted); margin-bottom: 2rem; }
  .diagram-wrapper { overflow-x: auto; padding: 0.5rem; }
  svg { display: block; margin: 0 auto; }
  figcaption { text-align: center; margin-top: 1.5rem; padding-top: 1.25rem; border-top: 1px solid var(--border); }
  figcaption strong { display: block; font-size: 1.05rem; margin-bottom: 0.4rem; }
  figcaption span { font-size: 0.88rem; color: var(--muted); line-height: 1.5; }
</style>
</head>
<body>
<figure>
  <h2>The Underconnectivity Pattern</h2>
  <p class="subtitle">Local over-connectivity + long-range under-connectivity</p>
  <div class="diagram-wrapper">
    <svg viewBox="0 0 860 440" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif" role="img" aria-labelledby="title-uc desc-uc">
      <title id="title-uc">Underconnectivity Pattern in Autism</title>
      <desc id="desc-uc">Network diagram showing two brain region clusters (frontal and posterior). Within each cluster, connections are thick and strong (local over-connectivity). Between clusters, connections are thin and dashed (long-range under-connectivity). This pattern explains preserved local processing alongside impaired cross-brain coordination.</desc>

      <!-- Frontal cluster -->
      <rect x="50" y="40" width="320" height="250" rx="16" fill="var(--local-bg)" stroke="var(--local)" stroke-width="2" stroke-dasharray="none"/>
      <text x="210" y="70" text-anchor="middle" font-size="14" font-weight="700" fill="var(--local)">Frontal Regions</text>
      <text x="210" y="88" text-anchor="middle" font-size="10" fill="var(--muted)">Executive, planning, production</text>

      <!-- Frontal nodes -->
      <circle cx="130" cy="140" r="30" fill="var(--surface)" stroke="var(--local)" stroke-width="2.5"/>
      <text x="130" y="137" text-anchor="middle" font-size="9" font-weight="600" fill="var(--fg)">Broca's</text>
      <text x="130" y="150" text-anchor="middle" font-size="8" fill="var(--muted)">area</text>

      <circle cx="260" cy="130" r="28" fill="var(--surface)" stroke="var(--local)" stroke-width="2.5"/>
      <text x="260" y="127" text-anchor="middle" font-size="9" font-weight="600" fill="var(--fg)">Motor</text>
      <text x="260" y="140" text-anchor="middle" font-size="8" fill="var(--muted)">cortex</text>

      <circle cx="190" cy="210" r="26" fill="var(--surface)" stroke="var(--local)" stroke-width="2.5"/>
      <text x="190" y="207" text-anchor="middle" font-size="9" font-weight="600" fill="var(--fg)">Prefrontal</text>
      <text x="190" y="220" text-anchor="middle" font-size="8" fill="var(--muted)">exec.</text>

      <!-- Thick local connections (frontal) -->
      <line x1="155" y1="130" x2="235" y2="125" stroke="var(--local)" stroke-width="4" opacity="0.7"/>
      <line x1="145" y1="165" x2="175" y2="195" stroke="var(--local)" stroke-width="4" opacity="0.7"/>
      <line x1="240" y1="152" x2="210" y2="192" stroke="var(--local)" stroke-width="4" opacity="0.7"/>

      <text x="210" y="265" text-anchor="middle" font-size="10" font-weight="600" fill="var(--local)">Strong local connections</text>

      <!-- Posterior cluster -->
      <rect x="490" y="40" width="340" height="250" rx="16" fill="var(--local-bg)" stroke="var(--local)" stroke-width="2"/>
      <text x="660" y="70" text-anchor="middle" font-size="14" font-weight="700" fill="var(--local)">Posterior Regions</text>
      <text x="660" y="88" text-anchor="middle" font-size="10" fill="var(--muted)">Visual, perceptual, comprehension</text>

      <!-- Posterior nodes -->
      <circle cx="570" cy="140" r="30" fill="var(--surface)" stroke="var(--local)" stroke-width="2.5"/>
      <text x="570" y="137" text-anchor="middle" font-size="9" font-weight="600" fill="var(--fg)">Wernicke's</text>
      <text x="570" y="150" text-anchor="middle" font-size="8" fill="var(--muted)">area</text>

      <circle cx="720" cy="130" r="28" fill="var(--surface)" stroke="var(--local)" stroke-width="2.5"/>
      <text x="720" y="127" text-anchor="middle" font-size="9" font-weight="600" fill="var(--fg)">Visual</text>
      <text x="720" y="140" text-anchor="middle" font-size="8" fill="var(--muted)">cortex</text>

      <circle cx="640" cy="210" r="26" fill="var(--surface)" stroke="var(--local)" stroke-width="2.5"/>
      <text x="640" y="207" text-anchor="middle" font-size="9" font-weight="600" fill="var(--fg)">Parietal</text>
      <text x="640" y="220" text-anchor="middle" font-size="8" fill="var(--muted)">cortex</text>

      <!-- Thick local connections (posterior) -->
      <line x1="595" y1="130" x2="695" y2="125" stroke="var(--local)" stroke-width="4" opacity="0.7"/>
      <line x1="585" y1="165" x2="625" y2="192" stroke="var(--local)" stroke-width="4" opacity="0.7"/>
      <line x1="700" y1="152" x2="660" y2="192" stroke="var(--local)" stroke-width="4" opacity="0.7"/>

      <text x="660" y="265" text-anchor="middle" font-size="10" font-weight="600" fill="var(--local)">Strong local connections</text>

      <!-- Long-range under-connections -->
      <line x1="285" y1="135" x2="540" y2="135" stroke="var(--long)" stroke-width="1.5" stroke-dasharray="8,6"/>
      <line x1="260" y1="160" x2="570" y2="170" stroke="var(--long)" stroke-width="1.5" stroke-dasharray="8,6"/>
      <line x1="215" y1="195" x2="615" y2="195" stroke="var(--long)" stroke-width="1.5" stroke-dasharray="8,6"/>

      <!-- Long-range label -->
      <rect x="345" y="155" width="170" height="50" rx="8" fill="var(--long-bg)" stroke="var(--long)" stroke-width="1.5"/>
      <text x="430" y="175" text-anchor="middle" font-size="10" font-weight="700" fill="var(--long)">UNDER-CONNECTED</text>
      <text x="430" y="192" text-anchor="middle" font-size="9" fill="var(--fg)">Weak long-range links</text>

      <!-- Implications -->
      <rect x="80" y="320" width="700" height="100" rx="12" fill="var(--surface)" stroke="var(--accent)" stroke-width="2"/>
      <text x="430" y="348" text-anchor="middle" font-size="13" font-weight="700" fill="var(--accent)">What This Pattern Explains</text>
      <text x="250" y="375" text-anchor="middle" font-size="11" fill="var(--local)"><tspan font-weight="600">Local over-connectivity:</tspan></text>
      <text x="250" y="395" text-anchor="middle" font-size="10" fill="var(--fg)">Enhanced perceptual processing,</text>
      <text x="250" y="410" text-anchor="middle" font-size="10" fill="var(--fg)">pattern detection, visual search</text>
      <text x="610" y="375" text-anchor="middle" font-size="11" fill="var(--long)"><tspan font-weight="600">Long-range under-connectivity:</tspan></text>
      <text x="610" y="395" text-anchor="middle" font-size="10" fill="var(--fg)">Speech production failure (requires</text>
      <text x="610" y="410" text-anchor="middle" font-size="10" fill="var(--fg)">frontal-posterior coordination)</text>
    </svg>
  </div>
  <figcaption>
    <strong>Figure 2: The Underconnectivity Pattern</strong>
    <span>Autism involves local over-connectivity (thick green lines within frontal and posterior clusters) paired with long-range under-connectivity (thin dashed red lines between clusters). This dual pattern, proposed by Just and Minshew, explains both autistic strengths (enhanced local/perceptual processing) and challenges (impaired cross-brain coordination required for speech production).</span>
  </figcaption>
</figure>
</body>
</html>
