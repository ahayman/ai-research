<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EEG/ERP Components -- Windows into Non-Speaking Minds</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --muted: #6c757d;
    --nt: #3b82f6; --nt-bg: #dbeafe;
    --aut: #7c3aed; --aut-bg: #f3e8ff;
    --n400: #d97706; --p600: #198754;
    --accent: #4361ee;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a; --fg: #e8e8f0; --surface: #1a1a2e; --border: #2d2d44;
      --muted: #9a9ab0;
      --nt: #60a5fa; --nt-bg: #172554;
      --aut: #b197fc; --aut-bg: #1e1030;
      --n400: #fbbf24; --p600: #51cf66;
      --accent: #6b8aff;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--fg); display: flex; justify-content: center; padding: 2rem 1rem; }
  figure { max-width: 920px; width: 100%; background: var(--surface); border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); padding: 2.5rem; }
  h2 { text-align: center; font-size: 1.4rem; margin-bottom: 0.4rem; }
  .subtitle { text-align: center; font-size: 0.95rem; color: var(--muted); margin-bottom: 2rem; }
  .diagram-wrapper { overflow-x: auto; padding: 0.5rem; }
  svg { display: block; margin: 0 auto; }
  figcaption { text-align: center; margin-top: 1.5rem; padding-top: 1.25rem; border-top: 1px solid var(--border); }
  figcaption strong { display: block; font-size: 1.05rem; margin-bottom: 0.4rem; }
  figcaption span { font-size: 0.88rem; color: var(--muted); line-height: 1.5; }
</style>
</head>
<body>
<figure>
  <h2>EEG/ERP: Windows into Non-Speaking Minds</h2>
  <p class="subtitle">Brain responses reveal language processing without requiring speech output</p>
  <div class="diagram-wrapper">
    <svg viewBox="0 0 880 420" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif" role="img" aria-labelledby="title-erp desc-erp">
      <title id="title-erp">ERP Components in Language Processing</title>
      <desc id="desc-erp">Simplified ERP waveform showing two key components: N400 (semantic processing, 300-500ms) and P600 (syntactic integration, 500-800ms). In autism, N400 amplitude is reduced and P600 is delayed, but both components are present -- indicating that language processing occurs even without speech output.</desc>

      <!-- Time axis -->
      <line x1="100" y1="230" x2="820" y2="230" stroke="var(--border)" stroke-width="1.5"/>
      <text x="100" y="255" font-size="10" fill="var(--muted)">0ms</text>
      <text x="240" y="255" font-size="10" fill="var(--muted)">200ms</text>
      <text x="380" y="255" font-size="10" fill="var(--muted)">400ms</text>
      <text x="520" y="255" font-size="10" fill="var(--muted)">600ms</text>
      <text x="660" y="255" font-size="10" fill="var(--muted)">800ms</text>
      <text x="790" y="255" font-size="10" fill="var(--muted)">1000ms</text>

      <!-- Stimulus marker -->
      <line x1="120" y1="30" x2="120" y2="245" stroke="var(--accent)" stroke-width="1.5" stroke-dasharray="4,4"/>
      <text x="120" y="22" text-anchor="middle" font-size="10" font-weight="700" fill="var(--accent)">Word</text>
      <text x="120" y="270" text-anchor="middle" font-size="10" fill="var(--accent)">presented</text>

      <!-- Voltage axis label -->
      <text x="60" y="120" text-anchor="middle" font-size="10" fill="var(--muted)" transform="rotate(-90, 60, 175)">Voltage</text>
      <text x="80" y="70" font-size="9" fill="var(--muted)">+ (positive)</text>
      <text x="80" y="360" font-size="9" fill="var(--muted)">- (negative)</text>

      <!-- NT waveform (simplified) -->
      <path d="M 120 230 C 200 230, 280 340, 360 340 C 400 340, 420 230, 440 230 C 500 230, 540 130, 600 130 C 640 130, 680 230, 720 230" fill="none" stroke="var(--nt)" stroke-width="3"/>
      <text x="750" y="218" font-size="11" font-weight="600" fill="var(--nt)">Neurotypical</text>

      <!-- Autistic waveform (reduced N400, delayed P600) -->
      <path d="M 120 230 C 210 230, 310 290, 380 290 C 415 290, 435 230, 460 230 C 530 230, 590 165, 660 165 C 700 165, 730 230, 760 230" fill="none" stroke="var(--aut)" stroke-width="3" stroke-dasharray="8,4"/>
      <text x="790" y="218" font-size="11" font-weight="600" fill="var(--aut)">Autistic</text>

      <!-- N400 annotation -->
      <rect x="270" y="345" width="200" height="60" rx="8" fill="var(--surface)" stroke="var(--n400)" stroke-width="2"/>
      <text x="370" y="367" text-anchor="middle" font-size="12" font-weight="700" fill="var(--n400)">N400 (300-500ms)</text>
      <text x="370" y="385" text-anchor="middle" font-size="10" fill="var(--fg)">Semantic processing</text>
      <text x="370" y="398" text-anchor="middle" font-size="9" fill="var(--aut)">Reduced amplitude in autism</text>
      <line x1="360" y1="340" x2="360" y2="345" stroke="var(--n400)" stroke-width="1.5"/>

      <!-- P600 annotation -->
      <rect x="500" y="45" width="200" height="60" rx="8" fill="var(--surface)" stroke="var(--p600)" stroke-width="2"/>
      <text x="600" y="67" text-anchor="middle" font-size="12" font-weight="700" fill="var(--p600)">P600 (500-800ms)</text>
      <text x="600" y="85" text-anchor="middle" font-size="10" fill="var(--fg)">Syntactic integration</text>
      <text x="600" y="98" text-anchor="middle" font-size="9" fill="var(--aut)">Delayed and altered in autism</text>
      <line x1="600" y1="105" x2="600" y2="130" stroke="var(--p600)" stroke-width="1.5"/>

      <!-- Key insight box -->
      <rect x="120" y="288" width="700" height="38" rx="8" fill="var(--accent)" opacity="0.08" stroke="var(--accent)" stroke-width="1.5"/>
      <text x="470" y="312" text-anchor="middle" font-size="11" font-weight="600" fill="var(--accent)">Key: Both N400 and P600 are PRESENT in autism -- language processing is occurring, even without speech.</text>
      <text x="470" y="324" text-anchor="middle" font-size="9" fill="var(--muted)">Reduced =/= absent. Atypical processing =/= no processing.</text>
    </svg>
  </div>
  <figcaption>
    <strong>Figure 4: EEG/ERP Components -- Windows into Non-Speaking Minds</strong>
    <span>Event-related potentials (ERPs) can detect language processing without requiring any speech or motor output. The N400 component (300-500ms) reflects semantic processing; the P600 (500-800ms) reflects syntactic integration. In autism, N400 amplitude is reduced and P600 is delayed, but both are present -- indicating that the brain is processing language even when no speech is produced. EEG is more tolerable than fMRI for non-speaking individuals (no enclosed scanner, no loud noise).</span>
  </figcaption>
</figure>
</body>
</html>
