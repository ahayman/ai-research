<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Motor Speech Production Cascade -- Failure Points</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --muted: #6c757d;
    --intact: #198754; --intact-bg: #edfff5;
    --fail: #dc3545; --fail-bg: #fee2e2;
    --accent: #4361ee;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a; --fg: #e8e8f0; --surface: #1a1a2e; --border: #2d2d44;
      --muted: #9a9ab0;
      --intact: #51cf66; --intact-bg: #0a2a15;
      --fail: #ff6b6b; --fail-bg: #2a1010;
      --accent: #6b8aff;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--fg); display: flex; justify-content: center; padding: 2rem 1rem; }
  figure { max-width: 900px; width: 100%; background: var(--surface); border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); padding: 2.5rem; }
  h2 { text-align: center; font-size: 1.4rem; margin-bottom: 0.4rem; }
  .subtitle { text-align: center; font-size: 0.95rem; color: var(--muted); margin-bottom: 2rem; }
  .diagram-wrapper { overflow-x: auto; padding: 0.5rem; }
  svg { display: block; margin: 0 auto; }
  figcaption { text-align: center; margin-top: 1.5rem; padding-top: 1.25rem; border-top: 1px solid var(--border); }
  figcaption strong { display: block; font-size: 1.05rem; margin-bottom: 0.4rem; }
  figcaption span { font-size: 0.88rem; color: var(--muted); line-height: 1.5; }
</style>
</head>
<body>
<figure>
  <h2>The Motor Speech Production Cascade</h2>
  <p class="subtitle">Multiple neural failure points from intent to speech output</p>
  <div class="diagram-wrapper">
    <svg viewBox="0 0 860 520" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif" role="img" aria-labelledby="title-casc desc-casc">
      <title id="title-casc">Motor Speech Production Cascade with Failure Points</title>
      <desc id="desc-casc">Vertical cascade showing six stages of speech production, with three marked failure points in autism: Broca's area reduced activation, cerebellum failure to automatize, and motor execution network decreased connectivity. Intent and comprehension are intact; the cascade fails at the motor stages.</desc>

      <defs>
        <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
          <polygon points="0 0, 10 3.5, 0 7" fill="var(--border)"/>
        </marker>
      </defs>

      <!-- Stage 1: Language Intent (intact) -->
      <rect x="220" y="20" width="260" height="55" rx="10" fill="var(--intact-bg)" stroke="var(--intact)" stroke-width="2"/>
      <text x="350" y="42" text-anchor="middle" font-size="12" font-weight="700" fill="var(--intact)">Language Intent</text>
      <text x="350" y="60" text-anchor="middle" font-size="10" fill="var(--fg)">Cognitive - "I want to say..."</text>
      <circle cx="490" cy="47" r="10" fill="var(--intact)"/><text x="490" y="51" text-anchor="middle" font-size="10" fill="#fff">OK</text>

      <line x1="350" y1="75" x2="350" y2="95" stroke="var(--border)" stroke-width="2" marker-end="url(#arr)"/>

      <!-- Stage 2: Broca's Area (FAILURE 1) -->
      <rect x="220" y="100" width="260" height="55" rx="10" fill="var(--fail-bg)" stroke="var(--fail)" stroke-width="2.5"/>
      <text x="350" y="122" text-anchor="middle" font-size="12" font-weight="700" fill="var(--fail)">Broca's Area</text>
      <text x="350" y="140" text-anchor="middle" font-size="10" fill="var(--fg)">Speech planning + programming</text>

      <!-- Failure callout 1 -->
      <rect x="530" y="95" width="280" height="65" rx="8" fill="var(--fail-bg)" stroke="var(--fail)" stroke-width="1.5"/>
      <text x="545" y="115" font-size="11" font-weight="700" fill="var(--fail)">FAILURE POINT 1</text>
      <text x="545" y="132" font-size="10" fill="var(--fg)">Reduced activation -- speech motor</text>
      <text x="545" y="147" font-size="10" fill="var(--fg)">plans not generated or incomplete</text>
      <line x1="480" y1="127" x2="530" y2="127" stroke="var(--fail)" stroke-width="2"/>

      <line x1="350" y1="155" x2="350" y2="175" stroke="var(--border)" stroke-width="2" marker-end="url(#arr)"/>

      <!-- Stage 3: SMA (intact-ish but overworking) -->
      <rect x="220" y="180" width="260" height="55" rx="10" fill="var(--surface)" stroke="var(--border)" stroke-width="2"/>
      <text x="350" y="202" text-anchor="middle" font-size="12" font-weight="600" fill="var(--fg)">Supplementary Motor Area</text>
      <text x="350" y="220" text-anchor="middle" font-size="10" fill="var(--muted)">Motor preparation (overactivated)</text>

      <line x1="350" y1="235" x2="350" y2="255" stroke="var(--border)" stroke-width="2" marker-end="url(#arr)"/>

      <!-- Stage 4: Cerebellum (FAILURE 2) -->
      <rect x="220" y="260" width="260" height="55" rx="10" fill="var(--fail-bg)" stroke="var(--fail)" stroke-width="2.5"/>
      <text x="350" y="282" text-anchor="middle" font-size="12" font-weight="700" fill="var(--fail)">Cerebellum</text>
      <text x="350" y="300" text-anchor="middle" font-size="10" fill="var(--fg)">Timing, coordination, automatization</text>

      <!-- Failure callout 2 -->
      <rect x="530" y="255" width="280" height="65" rx="8" fill="var(--fail-bg)" stroke="var(--fail)" stroke-width="1.5"/>
      <text x="545" y="275" font-size="11" font-weight="700" fill="var(--fail)">FAILURE POINT 2</text>
      <text x="545" y="292" font-size="10" fill="var(--fg)">Underactivation -- speech stays</text>
      <text x="545" y="307" font-size="10" fill="var(--fg)">effortful, never becomes automatic</text>
      <line x1="480" y1="287" x2="530" y2="287" stroke="var(--fail)" stroke-width="2"/>

      <line x1="350" y1="315" x2="350" y2="335" stroke="var(--border)" stroke-width="2" marker-end="url(#arr)"/>

      <!-- Stage 5: Motor Execution (FAILURE 3) -->
      <rect x="220" y="340" width="260" height="55" rx="10" fill="var(--fail-bg)" stroke="var(--fail)" stroke-width="2.5"/>
      <text x="350" y="362" text-anchor="middle" font-size="12" font-weight="700" fill="var(--fail)">Motor Execution Network</text>
      <text x="350" y="380" text-anchor="middle" font-size="10" fill="var(--fg)">Basal ganglia, cranial nerves, muscles</text>

      <!-- Failure callout 3 -->
      <rect x="530" y="335" width="280" height="65" rx="8" fill="var(--fail-bg)" stroke="var(--fail)" stroke-width="1.5"/>
      <text x="545" y="355" font-size="11" font-weight="700" fill="var(--fail)">FAILURE POINT 3</text>
      <text x="545" y="372" font-size="10" fill="var(--fg)">Decreased connectivity across</text>
      <text x="545" y="387" font-size="10" fill="var(--fg)">motor execution network</text>
      <line x1="480" y1="367" x2="530" y2="367" stroke="var(--fail)" stroke-width="2"/>

      <line x1="350" y1="395" x2="350" y2="415" stroke="var(--fail)" stroke-width="1.5" stroke-dasharray="5,4"/>

      <!-- Stage 6: Output (failed) -->
      <rect x="260" y="420" width="180" height="40" rx="20" fill="var(--fail)" opacity="0.15" stroke="var(--fail)" stroke-width="2" stroke-dasharray="6,3"/>
      <text x="350" y="445" text-anchor="middle" font-size="12" font-weight="700" fill="var(--fail)">Speech Not Produced</text>

      <!-- Left annotation -->
      <rect x="20" y="180" width="170" height="110" rx="10" fill="var(--intact-bg)" stroke="var(--intact)" stroke-width="1.5"/>
      <text x="105" y="205" text-anchor="middle" font-size="11" font-weight="700" fill="var(--intact)">Not a failure of:</text>
      <text x="105" y="225" text-anchor="middle" font-size="10" fill="var(--fg)">- Understanding</text>
      <text x="105" y="242" text-anchor="middle" font-size="10" fill="var(--fg)">- Intent</text>
      <text x="105" y="259" text-anchor="middle" font-size="10" fill="var(--fg)">- Intelligence</text>
      <text x="105" y="280" text-anchor="middle" font-size="10" fill="var(--intact)" font-weight="600">The mind works;</text>
      <text x="105" y="293" text-anchor="middle" font-size="10" fill="var(--intact)" font-weight="600">the motor path fails.</text>

      <!-- Bottom note -->
      <rect x="160" y="475" width="540" height="30" rx="6" fill="var(--surface)" stroke="var(--border)" stroke-width="1"/>
      <text x="430" y="495" text-anchor="middle" font-size="10" fill="var(--muted)">Speech can fail at any or all of these stages; the more stages disrupted, the more severe the output impairment.</text>
    </svg>
  </div>
  <figcaption>
    <strong>Figure 3: The Motor Speech Production Cascade -- Three Failure Points</strong>
    <span>Speech production passes through a cascade of neural stages. In non-speaking autism, three distinct failure points have been identified: (1) Broca's area hypoactivation (speech plans not generated), (2) cerebellar underactivation (speech never automatizes), and (3) motor execution network disconnection. The individual has language intent (intact) but the motor pathway from planning to output fails at multiple levels.</span>
  </figcaption>
</figure>
</body>
</html>
