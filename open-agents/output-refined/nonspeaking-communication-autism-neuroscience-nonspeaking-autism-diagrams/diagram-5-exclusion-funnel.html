<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Methodological Exclusion Funnel</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --muted: #6c757d;
    --excluded: #dc3545; --excluded-bg: #fee2e2;
    --studied: #3b82f6; --studied-bg: #dbeafe;
    --solution: #198754; --solution-bg: #edfff5;
    --accent: #4361ee;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a; --fg: #e8e8f0; --surface: #1a1a2e; --border: #2d2d44;
      --muted: #9a9ab0;
      --excluded: #ff6b6b; --excluded-bg: #2a1010;
      --studied: #60a5fa; --studied-bg: #172554;
      --solution: #51cf66; --solution-bg: #0a2a15;
      --accent: #6b8aff;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--fg); display: flex; justify-content: center; padding: 2rem 1rem; }
  figure { max-width: 920px; width: 100%; background: var(--surface); border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); padding: 2.5rem; }
  h2 { text-align: center; font-size: 1.4rem; margin-bottom: 0.4rem; }
  .subtitle { text-align: center; font-size: 0.95rem; color: var(--muted); margin-bottom: 2rem; }
  .diagram-wrapper { overflow-x: auto; padding: 0.5rem; }
  svg { display: block; margin: 0 auto; }
  figcaption { text-align: center; margin-top: 1.5rem; padding-top: 1.25rem; border-top: 1px solid var(--border); }
  figcaption strong { display: block; font-size: 1.05rem; margin-bottom: 0.4rem; }
  figcaption span { font-size: 0.88rem; color: var(--muted); line-height: 1.5; }
</style>
</head>
<body>
<figure>
  <h2>The Methodological Exclusion Funnel</h2>
  <p class="subtitle">How the people most needing study are least studied</p>
  <div class="diagram-wrapper">
    <svg viewBox="0 0 880 520" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif" role="img" aria-labelledby="title-fun desc-fun">
      <title id="title-fun">Methodological Exclusion Funnel</title>
      <desc id="desc-fun">Funnel diagram showing how non-speaking autistic individuals are systematically excluded from neuroimaging research through four successive filters: scanner tolerance, motion requirements, verbal instructions, and behavioral response demands. The remaining studied population is a biased subsample. Emerging solutions at each stage are noted.</desc>

      <!-- Funnel stages -->
      <!-- Top: Total population -->
      <polygon points="100,40 780,40 740,100 140,100" fill="var(--studied-bg)" stroke="var(--studied)" stroke-width="2"/>
      <text x="440" y="75" text-anchor="middle" font-size="13" font-weight="700" fill="var(--studied)">Total Autistic Population</text>

      <!-- Filter 1 -->
      <polygon points="140,110 740,110 700,170 180,170" fill="var(--excluded-bg)" stroke="var(--excluded)" stroke-width="1.5"/>
      <text x="440" y="142" text-anchor="middle" font-size="11" fill="var(--fg)"><tspan font-weight="600">Filter 1:</tspan> Must tolerate scanner (noise, confinement)</text>
      <!-- Solution -->
      <rect x="750" y="115" width="120" height="46" rx="6" fill="var(--solution-bg)" stroke="var(--solution)" stroke-width="1"/>
      <text x="810" y="135" text-anchor="middle" font-size="8.5" fill="var(--solution)" font-weight="600">Emerging fix:</text>
      <text x="810" y="150" text-anchor="middle" font-size="8" fill="var(--fg)">fNIRS (wearable)</text>

      <!-- Filter 2 -->
      <polygon points="180,180 700,180 660,240 220,240" fill="var(--excluded-bg)" stroke="var(--excluded)" stroke-width="1.5"/>
      <text x="440" y="212" text-anchor="middle" font-size="11" fill="var(--fg)"><tspan font-weight="600">Filter 2:</tspan> Must remain still (no motor stereotypies)</text>
      <rect x="750" y="185" width="120" height="46" rx="6" fill="var(--solution-bg)" stroke="var(--solution)" stroke-width="1"/>
      <text x="810" y="205" text-anchor="middle" font-size="8.5" fill="var(--solution)" font-weight="600">Emerging fix:</text>
      <text x="810" y="220" text-anchor="middle" font-size="8" fill="var(--fg)">Motion correction</text>

      <!-- Filter 3 -->
      <polygon points="220,250 660,250 620,310 260,310" fill="var(--excluded-bg)" stroke="var(--excluded)" stroke-width="1.5"/>
      <text x="440" y="282" text-anchor="middle" font-size="11" fill="var(--fg)"><tspan font-weight="600">Filter 3:</tspan> Must follow verbal instructions</text>
      <rect x="750" y="255" width="120" height="46" rx="6" fill="var(--solution-bg)" stroke="var(--solution)" stroke-width="1"/>
      <text x="810" y="275" text-anchor="middle" font-size="8.5" fill="var(--solution)" font-weight="600">Emerging fix:</text>
      <text x="810" y="290" text-anchor="middle" font-size="8" fill="var(--fg)">Naturalistic paradigms</text>

      <!-- Filter 4 -->
      <polygon points="260,320 620,320 580,380 300,380" fill="var(--excluded-bg)" stroke="var(--excluded)" stroke-width="1.5"/>
      <text x="440" y="352" text-anchor="middle" font-size="11" fill="var(--fg)"><tspan font-weight="600">Filter 4:</tspan> Must produce behavioral responses</text>
      <rect x="750" y="325" width="120" height="46" rx="6" fill="var(--solution-bg)" stroke="var(--solution)" stroke-width="1"/>
      <text x="810" y="345" text-anchor="middle" font-size="8.5" fill="var(--solution)" font-weight="600">Emerging fix:</text>
      <text x="810" y="360" text-anchor="middle" font-size="8" fill="var(--fg)">Eye-tracking / CLP</text>

      <!-- Bottom: What remains -->
      <rect x="320" y="395" width="240" height="50" rx="8" fill="var(--studied-bg)" stroke="var(--studied)" stroke-width="2"/>
      <text x="440" y="417" text-anchor="middle" font-size="11" font-weight="700" fill="var(--studied)">Studied Population</text>
      <text x="440" y="435" text-anchor="middle" font-size="9" fill="var(--muted)">Speaking, compliant, average+ IQ</text>

      <!-- Side annotation: What's excluded -->
      <rect x="20" y="140" width="100" height="230" rx="8" fill="var(--excluded-bg)" stroke="var(--excluded)" stroke-width="1.5"/>
      <text x="70" y="165" text-anchor="middle" font-size="10" font-weight="700" fill="var(--excluded)">Excluded:</text>
      <text x="70" y="185" text-anchor="middle" font-size="10" fill="var(--fg)">25-30% of</text>
      <text x="70" y="200" text-anchor="middle" font-size="10" fill="var(--fg)">autistic</text>
      <text x="70" y="215" text-anchor="middle" font-size="10" fill="var(--fg)">population</text>
      <text x="70" y="245" text-anchor="middle" font-size="10" fill="var(--excluded)">Non-speaking</text>
      <text x="70" y="260" text-anchor="middle" font-size="10" fill="var(--excluded)">and minimally</text>
      <text x="70" y="275" text-anchor="middle" font-size="10" fill="var(--excluded)">verbal</text>
      <text x="70" y="305" text-anchor="middle" font-size="9" fill="var(--muted)" font-style="italic">The ones whose</text>
      <text x="70" y="320" text-anchor="middle" font-size="9" fill="var(--muted)" font-style="italic">brains most</text>
      <text x="70" y="335" text-anchor="middle" font-size="9" fill="var(--muted)" font-style="italic">need studying</text>

      <!-- Bottom insight -->
      <rect x="180" y="460" width="520" height="48" rx="8" fill="var(--surface)" stroke="var(--accent)" stroke-width="2"/>
      <text x="440" y="480" text-anchor="middle" font-size="11" font-weight="600" fill="var(--accent)">The research gap is not random. It is systematically biased</text>
      <text x="440" y="497" text-anchor="middle" font-size="11" font-weight="600" fill="var(--accent)">against the most severely affected individuals.</text>
    </svg>
  </div>
  <figcaption>
    <strong>Figure 5: The Methodological Exclusion Funnel</strong>
    <span>Non-speaking autistic individuals (25-30% of the autistic population) are systematically excluded from neuroimaging research by four successive filters: scanner intolerance, motion requirements, verbal instruction compliance, and behavioral response demands. The population that emerges for study is a biased subsample of speaking, compliant individuals -- meaning most "autism neuroscience" may not describe non-speaking autism at all. Emerging methods (fNIRS, motion correction, naturalistic paradigms, eye-tracking) are beginning to address each filter.</span>
  </figcaption>
</figure>
</body>
</html>
