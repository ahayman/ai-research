<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neurotypical vs. Autistic Language Network Architecture</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --muted: #6c757d;
    --nt: #3b82f6; --nt-bg: #dbeafe; --nt-strong: #1d4ed8;
    --aut: #7c3aed; --aut-bg: #f3e8ff; --aut-strong: #5b21b6;
    --visual: #d97706; --visual-bg: #fffbeb;
    --weak: #dc3545;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a; --fg: #e8e8f0; --surface: #1a1a2e; --border: #2d2d44;
      --muted: #9a9ab0;
      --nt: #60a5fa; --nt-bg: #172554; --nt-strong: #93bbfd;
      --aut: #b197fc; --aut-bg: #1e1030; --aut-strong: #c4b5fd;
      --visual: #fbbf24; --visual-bg: #2a2510;
      --weak: #ff6b6b;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--fg); display: flex; justify-content: center; padding: 2rem 1rem; }
  figure { max-width: 960px; width: 100%; background: var(--surface); border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); padding: 2.5rem; }
  h2 { text-align: center; font-size: 1.4rem; margin-bottom: 0.4rem; }
  .subtitle { text-align: center; font-size: 0.95rem; color: var(--muted); margin-bottom: 2rem; }
  .diagram-wrapper { overflow-x: auto; padding: 0.5rem; }
  svg { display: block; margin: 0 auto; }
  figcaption { text-align: center; margin-top: 1.5rem; padding-top: 1.25rem; border-top: 1px solid var(--border); }
  figcaption strong { display: block; font-size: 1.05rem; margin-bottom: 0.4rem; }
  figcaption span { font-size: 0.88rem; color: var(--muted); line-height: 1.5; }
</style>
</head>
<body>
<figure>
  <h2>Language Network Architecture</h2>
  <p class="subtitle">Neurotypical canonical pathway vs. autistic reorganized pathway</p>
  <div class="diagram-wrapper">
    <svg viewBox="0 0 920 500" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif" role="img" aria-labelledby="title-lang desc-lang">
      <title id="title-lang">Neurotypical vs Autistic Language Networks</title>
      <desc id="desc-lang">Side-by-side comparison of language network architecture. Neurotypical: strong Wernicke-to-Broca connection via arcuate fasciculus, strong motor output. Autistic: weak Wernicke-to-Broca connection, strong visual-spatial rerouting, weak motor output. Language comprehension may be preserved via visual mediation while speech production fails.</desc>

      <defs>
        <marker id="arrNt" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
          <polygon points="0 0, 10 3.5, 0 7" fill="var(--nt-strong)"/>
        </marker>
        <marker id="arrWeak" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
          <polygon points="0 0, 10 3.5, 0 7" fill="var(--weak)"/>
        </marker>
        <marker id="arrVis" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
          <polygon points="0 0, 10 3.5, 0 7" fill="var(--visual)"/>
        </marker>
      </defs>

      <!-- NT Panel -->
      <rect x="20" y="20" width="420" height="420" rx="14" fill="var(--nt-bg)" stroke="var(--nt)" stroke-width="2"/>
      <text x="230" y="48" text-anchor="middle" font-size="14" font-weight="700" fill="var(--nt)">Neurotypical</text>
      <text x="230" y="65" text-anchor="middle" font-size="10" fill="var(--muted)">Canonical language pathway</text>

      <!-- NT: Wernicke's -->
      <rect x="60" y="90" width="160" height="60" rx="10" fill="var(--surface)" stroke="var(--nt)" stroke-width="2"/>
      <text x="140" y="115" text-anchor="middle" font-size="11" font-weight="700" fill="var(--nt)">Wernicke's Area</text>
      <text x="140" y="132" text-anchor="middle" font-size="9" fill="var(--muted)">Comprehension</text>

      <!-- NT: Arcuate Fasciculus -->
      <line x1="220" y1="120" x2="280" y2="120" stroke="var(--nt-strong)" stroke-width="4" marker-end="url(#arrNt)"/>
      <text x="252" y="110" text-anchor="middle" font-size="8" fill="var(--nt)">Arcuate</text>
      <text x="252" y="140" text-anchor="middle" font-size="8" fill="var(--nt)">fasciculus</text>
      <text x="252" y="152" text-anchor="middle" font-size="8" font-weight="700" fill="var(--nt)">STRONG</text>

      <!-- NT: Broca's -->
      <rect x="290" y="90" width="130" height="60" rx="10" fill="var(--surface)" stroke="var(--nt)" stroke-width="2"/>
      <text x="355" y="115" text-anchor="middle" font-size="11" font-weight="700" fill="var(--nt)">Broca's Area</text>
      <text x="355" y="132" text-anchor="middle" font-size="9" fill="var(--muted)">Speech planning</text>

      <!-- NT: Motor cortex -->
      <line x1="355" y1="150" x2="355" y2="190" stroke="var(--nt-strong)" stroke-width="3" marker-end="url(#arrNt)"/>
      <rect x="290" y="200" width="130" height="50" rx="10" fill="var(--surface)" stroke="var(--nt)" stroke-width="2"/>
      <text x="355" y="222" text-anchor="middle" font-size="11" font-weight="600" fill="var(--nt)">Motor Cortex</text>
      <text x="355" y="240" text-anchor="middle" font-size="9" fill="var(--muted)">Execution</text>

      <!-- NT: Cerebellum -->
      <line x1="355" y1="250" x2="355" y2="280" stroke="var(--nt-strong)" stroke-width="3" marker-end="url(#arrNt)"/>
      <rect x="290" y="290" width="130" height="50" rx="10" fill="var(--surface)" stroke="var(--nt)" stroke-width="2"/>
      <text x="355" y="312" text-anchor="middle" font-size="11" font-weight="600" fill="var(--nt)">Cerebellum</text>
      <text x="355" y="328" text-anchor="middle" font-size="9" fill="var(--muted)">Timing + coordination</text>

      <!-- NT: Output -->
      <line x1="355" y1="340" x2="355" y2="370" stroke="var(--nt-strong)" stroke-width="3" marker-end="url(#arrNt)"/>
      <rect x="285" y="380" width="140" height="40" rx="20" fill="var(--nt)" opacity="0.2" stroke="var(--nt)" stroke-width="2"/>
      <text x="355" y="405" text-anchor="middle" font-size="12" font-weight="700" fill="var(--nt)">Fluent Speech</text>

      <!-- Autistic Panel -->
      <rect x="480" y="20" width="420" height="420" rx="14" fill="var(--aut-bg)" stroke="var(--aut)" stroke-width="2"/>
      <text x="690" y="48" text-anchor="middle" font-size="14" font-weight="700" fill="var(--aut)">Autistic (Non-Speaking)</text>
      <text x="690" y="65" text-anchor="middle" font-size="10" fill="var(--muted)">Reorganized pathway</text>

      <!-- Aut: Wernicke's (increased) -->
      <rect x="510" y="90" width="160" height="60" rx="10" fill="var(--surface)" stroke="var(--aut)" stroke-width="2.5"/>
      <text x="590" y="112" text-anchor="middle" font-size="11" font-weight="700" fill="var(--aut)">Wernicke's Area</text>
      <text x="590" y="128" text-anchor="middle" font-size="9" fill="var(--aut)">INCREASED activation</text>
      <text x="590" y="140" text-anchor="middle" font-size="8" fill="var(--muted)">(compensatory)</text>

      <!-- Aut: Weak arcuate fasciculus -->
      <line x1="670" y1="120" x2="730" y2="120" stroke="var(--weak)" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrWeak)"/>
      <text x="700" y="110" text-anchor="middle" font-size="8" fill="var(--weak)">Reduced FA</text>
      <text x="700" y="142" text-anchor="middle" font-size="8" font-weight="700" fill="var(--weak)">WEAK</text>

      <!-- Aut: Broca's (decreased) -->
      <rect x="740" y="90" width="130" height="60" rx="10" fill="var(--surface)" stroke="var(--weak)" stroke-width="2" stroke-dasharray="6,3"/>
      <text x="805" y="112" text-anchor="middle" font-size="11" font-weight="600" fill="var(--weak)">Broca's Area</text>
      <text x="805" y="128" text-anchor="middle" font-size="9" fill="var(--weak)">DECREASED activation</text>

      <!-- Aut: Visual-spatial rerouting -->
      <line x1="590" y1="150" x2="590" y2="190" stroke="var(--visual)" stroke-width="3" marker-end="url(#arrVis)"/>
      <rect x="510" y="200" width="170" height="60" rx="10" fill="var(--visual-bg)" stroke="var(--visual)" stroke-width="2.5"/>
      <text x="595" y="222" text-anchor="middle" font-size="11" font-weight="700" fill="var(--visual)">Visual-Spatial Regions</text>
      <text x="595" y="240" text-anchor="middle" font-size="9" fill="var(--fg)">Occipital, parietal cortex</text>
      <text x="595" y="252" text-anchor="middle" font-size="8" fill="var(--visual)">STRONG alternative route</text>

      <!-- Aut: weak motor -->
      <line x1="805" y1="150" x2="805" y2="280" stroke="var(--weak)" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arrWeak)"/>
      <rect x="740" y="290" width="130" height="50" rx="10" fill="var(--surface)" stroke="var(--weak)" stroke-width="1.5" stroke-dasharray="5,3"/>
      <text x="805" y="312" text-anchor="middle" font-size="10" fill="var(--weak)">Motor + Cerebellum</text>
      <text x="805" y="328" text-anchor="middle" font-size="9" fill="var(--weak)">Underactivated</text>

      <!-- Aut: failed output -->
      <line x1="805" y1="340" x2="805" y2="370" stroke="var(--weak)" stroke-width="1.5" stroke-dasharray="4,4"/>
      <rect x="740" y="380" width="140" height="40" rx="20" fill="var(--weak)" opacity="0.15" stroke="var(--weak)" stroke-width="2" stroke-dasharray="6,3"/>
      <text x="810" y="405" text-anchor="middle" font-size="12" font-weight="600" fill="var(--weak)">Speech Fails</text>

      <!-- Aut: visual understanding -->
      <rect x="510" y="290" width="170" height="40" rx="20" fill="var(--visual)" opacity="0.15" stroke="var(--visual)" stroke-width="2"/>
      <text x="595" y="315" text-anchor="middle" font-size="11" font-weight="600" fill="var(--visual)">Understanding via Vision</text>
      <line x1="595" y1="260" x2="595" y2="290" stroke="var(--visual)" stroke-width="2" marker-end="url(#arrVis)"/>

      <!-- Bottom summary -->
      <rect x="120" y="455" width="680" height="35" rx="8" fill="var(--surface)" stroke="var(--border)" stroke-width="1.5"/>
      <text x="460" y="477" text-anchor="middle" font-size="11" fill="var(--fg)">Language comprehension may be preserved via visual mediation; speech production fails due to Broca's hypoactivation + weak connectivity</text>
    </svg>
  </div>
  <figcaption>
    <strong>Figure 1: Neurotypical vs. Autistic Language Network Architecture</strong>
    <span>In the neurotypical brain, language flows through a strong canonical pathway: Wernicke's (comprehension) to Broca's (planning) via the arcuate fasciculus, then to motor cortex and cerebellum for fluent speech. In the autistic brain, the arcuate fasciculus has reduced structural integrity, Broca's area is hypoactivated, and language is rerouted through visual-spatial regions. The result: comprehension may be preserved through visual mediation, but speech production fails.</span>
  </figcaption>
</figure>
</body>
</html>
