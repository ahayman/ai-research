<!-- Diagram: The S2C/RPM Method -- Step by Step -->
<!-- Type: flowchart -->
<!-- Generated: 2026-03-31 -->
<!-- Description: Sequence diagram showing how a typical S2C/RPM session works, with annotations at each step showing where facilitator influence could enter the process. Presented neutrally. -->

<figure class="concept-diagram" id="diagram-session">
  <div class="diagram-container">
    <pre class="mermaid">
flowchart TD
    S1["STEP 1: Content Presentation<br/>---<br/>Instructor rapidly presents<br/>academic content through<br/>auditory, visual, and tactile<br/>channels simultaneously"]
    I1["Facilitator decision:<br/>What content to present<br/>and how to frame it"]

    S2["STEP 2: Question Posed<br/>---<br/>Instructor asks question<br/>about the content presented"]
    I2["Facilitator decision:<br/>What question to ask<br/>(determines expected answer)"]

    S3["STEP 3: Letterboard Held Up<br/>---<br/>Instructor holds letterboard<br/>in the air in front of learner"]
    I3["Facilitator decision:<br/>Board position, angle,<br/>height, and distance"]

    S4["STEP 4: Pointing Begins<br/>---<br/>Learner extends arm and<br/>points at letters on the board"]
    I4["Facilitator decision:<br/>Which letter was selected<br/>when pointing is ambiguous"]

    S5["STEP 5: Letter Announced<br/>---<br/>Instructor says each letter<br/>aloud, building the message"]
    I5["Facilitator decision:<br/>'Keep going' vs. 'try again'<br/>vs. pulling board away"]

    S6["STEP 6: Message Attributed<br/>---<br/>Completed message is read<br/>as the learner's communication"]
    I6["Authorship question:<br/>Who determined the content<br/>of this message?"]

    S1 --> S2 --> S3 --> S4 --> S5 --> S6

    S1 -.-> I1
    S2 -.-> I2
    S3 -.-> I3
    S4 -.-> I4
    S5 -.-> I5
    S6 -.-> I6

    NOTE["These are OBSERVABLE STEPS<br/>in the process. The question<br/>is whether the facilitator<br/>decisions constitute influence<br/>over the message content.<br/>---<br/>This question can only be<br/>resolved through controlled<br/>testing, not observation."]

    style S1 fill:#dbeafe,stroke:#2563eb,color:#1e3a5f
    style S2 fill:#dbeafe,stroke:#2563eb,color:#1e3a5f
    style S3 fill:#dbeafe,stroke:#2563eb,color:#1e3a5f
    style S4 fill:#dbeafe,stroke:#2563eb,color:#1e3a5f
    style S5 fill:#dbeafe,stroke:#2563eb,color:#1e3a5f
    style S6 fill:#dbeafe,stroke:#2563eb,color:#1e3a5f
    style I1 fill:#fef3c7,stroke:#d97706,color:#78350f
    style I2 fill:#fef3c7,stroke:#d97706,color:#78350f
    style I3 fill:#fef3c7,stroke:#d97706,color:#78350f
    style I4 fill:#fef3c7,stroke:#d97706,color:#78350f
    style I5 fill:#fef3c7,stroke:#d97706,color:#78350f
    style I6 fill:#fee2e2,stroke:#dc2626,color:#7f1d1d
    style NOTE fill:#f3f4f6,stroke:#6b7280,color:#374151
    </pre>
  </div>
  <figcaption>
    <strong>Figure 2:</strong> A typical S2C/RPM session step by step, with facilitator decision points annotated at each stage (amber boxes). The blue track shows the observable process; the amber track shows where the facilitator makes decisions that could influence the output. At every step -- from content presentation through board positioning, letter interpretation, and pacing cues -- the facilitator exercises control over variables that affect what message emerges. Whether these decisions constitute authorship influence can only be determined through controlled testing, not through observation.
  </figcaption>
</figure>
