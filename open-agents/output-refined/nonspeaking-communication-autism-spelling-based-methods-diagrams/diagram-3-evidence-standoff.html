<!-- Diagram: The Evidence Standoff -- Two Interpretations of the Same Data -->
<!-- Type: flowchart -->
<!-- Generated: 2026-03-31 -->
<!-- Description: Presents the same observable facts with two competing interpretations -- proponent and critic -- side by side. This is the central structure of the S2C/RPM debate. -->

<figure class="concept-diagram" id="diagram-standoff">
  <div class="diagram-container">
    <pre class="mermaid">
flowchart TD
    TITLE["THE EVIDENCE STANDOFF:<br/>Same Observations, Two Interpretations"]

    subgraph OBS["OBSERVABLE FACTS"]
        O1["Learner points to letters<br/>on a held board"]
        O2["Messages produced are<br/>complex and literate"]
        O3["Eye-tracking shows learner<br/>looks at letters before pointing"]
        O4["Systematic reviews find<br/>zero qualifying studies"]
        O5["Some individuals reportedly<br/>transition to independent typing"]
    end

    subgraph PRO_INT["PROPONENT INTERPRETATION"]
        P1["Motor support enables<br/>genuine communication"]
        P2["Hidden competence revealed<br/>through spelling support"]
        P3["Agency demonstrated:<br/>learner initiates pointing"]
        P4["Researchers have not<br/>studied it properly"]
        P5["Proof the method works:<br/>independence achieved"]
    end

    subgraph CRIT_INT["CRITIC INTERPRETATION"]
        C1["Facilitator positioning<br/>guides pointing direction"]
        C2["Consistent with facilitator<br/>authorship (FC history)"]
        C3["Following a held board is<br/>expected regardless of<br/>who chooses letters"]
        C4["Method cannot pass<br/>controlled tests"]
        C5["Transition needs controlled<br/>verification at each stage"]
    end

    O1 --> P1
    O1 --> C1
    O2 --> P2
    O2 --> C2
    O3 --> P3
    O3 --> C3
    O4 --> P4
    O4 --> C4
    O5 --> P5
    O5 --> C5

    style OBS fill:#e0f2fe,stroke:#0284c7,color:#1e3a5f
    style PRO_INT fill:#fef3c7,stroke:#d97706,color:#78350f
    style CRIT_INT fill:#f3f4f6,stroke:#6b7280,color:#374151
    style TITLE fill:#dbeafe,stroke:#2563eb,color:#1e3a5f
    </pre>
  </div>
  <figcaption>
    <strong>Figure 3:</strong> The evidence standoff at the heart of the S2C/RPM debate. Five observable facts (center) each admit two competing interpretations. Proponents see motor support enabling genuine communication, hidden competence, and demonstrated agency. Critics see the same observations as consistent with facilitator influence, continuous with FC history, and unverifiable without controlled testing. This ambiguity is precisely why controlled authorship studies are needed -- and why their absence is the most significant fact in this debate.
  </figcaption>
</figure>
