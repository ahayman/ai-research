<!-- Diagram: The Claimed Independence Continuum -->
<!-- Type: flowchart -->
<!-- Generated: 2026-03-31 -->
<!-- Description: Shows the claimed progression from fully supported spelling to independent typing, with annotations at each stage showing what facilitator control remains and where authorship verification becomes possible. -->

<figure class="concept-diagram" id="diagram-independence">
  <div class="diagram-container">
    <pre class="mermaid">
flowchart LR
    subgraph S1["STAGE 1:<br/>Stencil Board"]
        S1D["Large targets<br/>Full arm movement<br/>Board held close"]
        S1F["Facilitator control:<br/>HIGH<br/>Board position, angle,<br/>distance, verbal cues"]
    end

    subgraph S2["STAGE 2:<br/>Laminated Letterboard"]
        S2D["Standard alphabet<br/>Board held at<br/>arm's length"]
        S2F["Facilitator control:<br/>HIGH<br/>Board position, letter<br/>interpretation, pacing"]
    end

    subgraph S3["STAGE 3:<br/>Board on Table"]
        S3D["Board not held<br/>by partner<br/>Partner present"]
        S3F["Facilitator control:<br/>MODERATE<br/>Verbal cues, presence,<br/>environmental control"]
    end

    subgraph S4["STAGE 4:<br/>Keyboard / iPad"]
        S4D["No board<br/>Partner present<br/>but not holding device"]
        S4F["Facilitator control:<br/>LOW<br/>Verbal cues, presence"]
    end

    subgraph S5["STAGE 5:<br/>Independent Typing"]
        S5D["No communication<br/>partner needed<br/>Fully independent"]
        S5F["Facilitator control:<br/>NONE<br/>Authorship verifiable"]
    end

    S1 --> S2 --> S3 --> S4 --> S5

    VERIFY["AUTHORSHIP VERIFICATION:<br/>---<br/>Stages 1-2: Verification NOT possible<br/>(facilitator controls display)<br/>Stage 3: Partial verification possible<br/>Stages 4-5: Full verification possible<br/>---<br/>The critical transition from<br/>unverifiable to verifiable has<br/>NEVER been systematically<br/>documented with controlled testing."]

    style S1 fill:#fee2e2,stroke:#dc2626,color:#7f1d1d
    style S2 fill:#fee2e2,stroke:#dc2626,color:#7f1d1d
    style S3 fill:#fef3c7,stroke:#d97706,color:#78350f
    style S4 fill:#dcfce7,stroke:#16a34a,color:#14532d
    style S5 fill:#bbf7d0,stroke:#15803d,color:#14532d
    style VERIFY fill:#f3f4f6,stroke:#6b7280,color:#374151
    </pre>
  </div>
  <figcaption>
    <strong>Figure 5:</strong> The claimed independence continuum in S2C/RPM, from fully supported stencil boards (Stage 1) through laminated letterboards, table boards, and keyboards to fully independent typing (Stage 5). The critical question is where authorship verification becomes possible: at Stages 1-2, the facilitator controls the communication display, making verification impossible. At Stages 4-5, the individual uses a fixed device without facilitator control of the display, making controlled authorship testing feasible. The transition from unverifiable to verifiable stages has never been systematically documented with controlled testing at each stage.
  </figcaption>
</figure>
