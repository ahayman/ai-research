timeline
    title Method Lineage: FC to RPM to S2C

    section Facilitated Communication
        1977 : Crossley develops FC in Melbourne
             : Hand-over-hand physical support
        1989-90 : Biklen imports FC to US
               : Syracuse FC Institute founded
        1991-95 : 50+ controlled studies
               : Debunk FC authorship claims
               : ~60 false abuse cases
        1995 : ASHA opposes FC
             : Scientific consensus established

    section Rapid Prompting Method
        ~1991 : Soma Mukhopadhyay develops RPM
              : For her son Tito in India
        2001 : Soma moves to US
             : HALO clinic, Austin TX
        2003 : Tito publishes The Mind Tree
        2019 : Systematic review of RPM
             : Zero qualifying studies found

    section Spelling to Communicate
        ~2013 : Vosseller begins S2C methods
        2015 : S2C protocols formalized
        2019 : I-ASC founded
             : AAIDD opposes FC and RPM
        2020 : Jaswal eye-tracking study
             : N=9, published critiques follow
        2023 : Spellers documentary released
             : McCarthy-Wahlberg exec producer
        2024 : Telepathy Tapes podcast
             : Jaswal literacy study and rebuttal
             : ASHA 2025 Empty Review
    </pre>
  </div>
  <figcaption>
    <strong>Figure 1:</strong> The method lineage from facilitated communication (1977) through RPM (~1991) to S2C (~2013-2015). FC was scientifically debunked by the mid-1990s through 50+ controlled studies. RPM emerged from a different origin (Soma Mukhopadhyay in India) but shares the fundamental structure of a facilitator controlling the communication display while a non-speaking individual points to letters. S2C formalized this approach with published protocols. The central question: does this lineage represent genuine methodological evolution or rebranding of a practice that has failed controlled testing?
  </figcaption>
</figure>
