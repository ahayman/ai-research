<!-- Diagram: The Jaswal Studies -- Claims and Critiques -->
<!-- Type: flowchart -->
<!-- Generated: 2026-03-31 -->
<!-- Description: Maps the specific claims of the Jaswal 2020 eye-tracking study and 2024 literacy study against their specific published critiques. Presented as an active scientific debate. -->

<figure class="concept-diagram" id="diagram-jaswal">
  <div class="diagram-container">
    <pre class="mermaid">
flowchart TD
    subgraph STUDY1["JASWAL 2020: Eye-Tracking Study<br/>(Nature Scientific Reports, N=9)"]
        J1C["CLAIM: Participants fixated<br/>on target letters before<br/>pointing to them"]
        J1R["CRITIQUE (Catherine &<br/>Katharine, 2021; Vyse):<br/>Looking at letters does not<br/>prove choosing letters. A person<br/>following a held board would<br/>also look at target letters."]

        J2C["CLAIM: Patterns consistent<br/>with language production<br/>planning processes"]
        J2R["CRITIQUE: No control condition<br/>without facilitator present.<br/>N=9 far too small for<br/>generalizable conclusions."]

        J3C["CLAIM: Eye-tracking<br/>reveals agency in<br/>assisted communication"]
        J3R["CRITIQUE: Study assumes what<br/>it sets out to prove. Agency<br/>of gaze does not establish<br/>agency of letter selection."]

        J1C -.-> J1R
        J2C -.-> J2R
        J3C -.-> J3R
    end

    subgraph STUDY2["JASWAL 2024: Literacy Study<br/>(Autism journal, N=31)"]
        J4C["CLAIM: 17 of 31 non-speaking<br/>participants showed patterns<br/>consistent with foundational<br/>literacy skills"]
        J4R["CRITIQUE ('Illusions of Literacy',<br/>EBCAI 2024): Participants recruited<br/>from RPM/S2C programs -- practice<br/>effects with letter sequences."]

        J5C["CLAIM: Literacy present despite<br/>never receiving formal<br/>literacy instruction"]
        J5R["CRITIQUE: No comparison condition<br/>without experimenter reading<br/>sentence aloud. Task measured<br/>reaction times, not reading<br/>comprehension."]

        J4C -.-> J4R
        J5C -.-> J5R
    end

    STATUS["CURRENT STATUS:<br/>---<br/>Neither study settles the<br/>authorship question. The Jaswal<br/>studies are the most frequently<br/>cited research by S2C proponents.<br/>The published critiques are<br/>substantive and unrefuted.<br/>---<br/>The fundamental gap remains:<br/>no controlled authorship test<br/>of S2C or RPM has ever been<br/>published."]

    STUDY1 --> STATUS
    STUDY2 --> STATUS

    style STUDY1 fill:#dbeafe,stroke:#2563eb,color:#1e3a5f
    style STUDY2 fill:#e0f2fe,stroke:#0284c7,color:#1e3a5f
    style J1C fill:#dcfce7,stroke:#16a34a,color:#14532d
    style J2C fill:#dcfce7,stroke:#16a34a,color:#14532d
    style J3C fill:#dcfce7,stroke:#16a34a,color:#14532d
    style J4C fill:#dcfce7,stroke:#16a34a,color:#14532d
    style J5C fill:#dcfce7,stroke:#16a34a,color:#14532d
    style J1R fill:#fef3c7,stroke:#d97706,color:#78350f
    style J2R fill:#fef3c7,stroke:#d97706,color:#78350f
    style J3R fill:#fef3c7,stroke:#d97706,color:#78350f
    style J4R fill:#fef3c7,stroke:#d97706,color:#78350f
    style J5R fill:#fef3c7,stroke:#d97706,color:#78350f
    style STATUS fill:#f3f4f6,stroke:#6b7280,color:#374151
    </pre>
  </div>
  <figcaption>
    <strong>Figure 4:</strong> The Jaswal studies and their published critiques. The 2020 eye-tracking study (N=9) claimed to reveal agency in assisted communication; critiques argue it assumes what it sets out to prove and lacks a control condition without a facilitator. The 2024 literacy study (N=31) claimed to find literacy patterns; the "Illusions of Literacy" rebuttal notes practice effects from RPM/S2C participation and questions whether the task measured actual reading comprehension. Neither study settles the authorship question. No controlled authorship test of S2C or RPM has ever been published.
  </figcaption>
</figure>
