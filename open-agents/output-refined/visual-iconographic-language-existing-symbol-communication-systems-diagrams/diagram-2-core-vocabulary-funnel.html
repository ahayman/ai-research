<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Core Vocabulary Funnel</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --accent: #4361ee;
    --muted: #6c757d;
    --caption-bg: #f8f9fa;
    --ring1: #4361ee;
    --ring2: #7209b7;
    --ring3: #2a9d8f;
    --ring4: #e76f51;
    --ring5: #9ca3af;
    --core-bg: #ede9fe;
    --fringe-bg: #fef3c7;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --accent: #6b8aff;
      --muted: #9a9ab0;
      --caption-bg: #1a1a2e;
      --ring1: #6b8aff;
      --ring2: #b366ff;
      --ring3: #4dd8c0;
      --ring4: #ffa07a;
      --ring5: #6b7280;
      --core-bg: #3b0764;
      --fringe-bg: #78350f;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure { max-width: 1000px; width: 100%; }
  .chart-wrapper {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.5rem 1rem;
    overflow-x: auto;
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding: 1rem 1.5rem;
    background: var(--caption-bg);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
</style>
</head>
<body>
<figure>
  <div class="chart-wrapper">
    <svg viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg" style="min-width:650px;">
      <defs>
        <style>
          .title { font: bold 16px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
          .subtitle { font: 12px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
          .ring-label { font: bold 14px 'Segoe UI', system-ui, sans-serif; fill: white; }
          .ring-pct { font: bold 20px 'Segoe UI', system-ui, sans-serif; fill: white; }
          .ring-words { font: 12px 'Segoe UI', system-ui, sans-serif; fill: white; }
          .side-label { font: bold 12px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
          .side-text { font: 11px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
          .example-text { font: italic 10px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
          .insight-text { font: bold 12px 'Segoe UI', system-ui, sans-serif; fill: var(--accent); }
          .note-text { font: 11px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
        </style>
      </defs>

      <text x="450" y="30" text-anchor="middle" class="title">Core Vocabulary Funnel</text>
      <text x="450" y="48" text-anchor="middle" class="subtitle">From 50 Words to Full Communication -- Why Verbs Matter More Than Nouns</text>

      <!-- Funnel layers (inverted pyramid) -->
      <!-- Level 5 (outermost) - 1000+ words -->
      <polygon points="100,90 800,90 720,180 180,180" fill="var(--ring5)" opacity="0.6"/>
      <text x="450" y="125" text-anchor="middle" class="ring-label">1,000+ words</text>
      <text x="450" y="148" text-anchor="middle" class="ring-words">~95% coverage | Fringe vocabulary: nouns, names, topic-specific</text>

      <!-- Level 4 - 400 words -->
      <polygon points="180,185 720,185 660,265 240,265" fill="var(--ring4)" opacity="0.8"/>
      <text x="450" y="215" text-anchor="middle" class="ring-label">200-400 words</text>
      <text x="450" y="237" text-anchor="middle" class="ring-pct">~80%</text>
      <text x="450" y="257" text-anchor="middle" class="ring-words">of all daily communication</text>

      <!-- Level 3 - 100 words -->
      <polygon points="240,270 660,270 610,340 290,340" fill="var(--ring3)" opacity="0.85"/>
      <text x="450" y="298" text-anchor="middle" class="ring-label">100 words</text>
      <text x="450" y="318" text-anchor="middle" class="ring-pct">~60%</text>

      <!-- Level 2 - 50 words -->
      <polygon points="290,345 610,345 570,410 330,410" fill="var(--ring2)" opacity="0.85"/>
      <text x="450" y="370" text-anchor="middle" class="ring-label">50 words</text>
      <text x="450" y="392" text-anchor="middle" class="ring-pct">40-50%</text>

      <!-- Level 1 (core) - top 20 -->
      <polygon points="330,415 570,415 530,470 370,470" fill="var(--ring1)" opacity="0.9"/>
      <text x="450" y="440" text-anchor="middle" class="ring-label">Top 20 words</text>
      <text x="450" y="460" text-anchor="middle" class="ring-words">I, you, it, want, go, not, more, is</text>

      <!-- Left side: Core vocabulary composition -->
      <rect x="30" y="290" width="170" height="130" rx="8" fill="var(--core-bg)" stroke="var(--accent)" stroke-width="1.5" opacity="0.8"/>
      <text x="115" y="310" text-anchor="middle" class="side-label">Core Words</text>
      <text x="115" y="328" text-anchor="middle" class="side-text">(top 200-400)</text>
      <text x="45" y="350" class="side-text">Verbs: want, go, help</text>
      <text x="45" y="367" class="side-text">Adjectives: more, big</text>
      <text x="45" y="384" class="side-text">Pronouns: I, you, it</text>
      <text x="45" y="401" class="side-text">Prepositions: in, on, to</text>
      <line x1="200" y1="355" x2="290" y2="355" stroke="var(--accent)" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowBlue)"/>

      <!-- Right side: Fringe vocabulary composition -->
      <rect x="710" y="110" width="170" height="120" rx="8" fill="var(--fringe-bg)" stroke="var(--ring4)" stroke-width="1.5" opacity="0.8"/>
      <text x="795" y="130" text-anchor="middle" class="side-label">Fringe Words</text>
      <text x="795" y="148" text-anchor="middle" class="side-text">(everything else)</text>
      <text x="725" y="170" class="side-text">Nouns: apple, dog, car</text>
      <text x="725" y="187" class="side-text">Proper nouns: names</text>
      <text x="725" y="204" class="side-text">Topic-specific terms</text>
      <text x="725" y="221" class="side-text">Highly personal</text>
      <line x1="710" y1="170" x2="660" y2="150" stroke="var(--ring4)" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowOrange)"/>

      <!-- Insight box at bottom -->
      <rect x="140" y="490" width="620" height="60" rx="10" fill="var(--surface)" stroke="var(--accent)" stroke-width="2"/>
      <text x="450" y="513" text-anchor="middle" class="insight-text">Counterintuitive Finding</text>
      <text x="450" y="532" text-anchor="middle" class="note-text">The most communicatively essential words are the hardest to picture.</text>
      <text x="450" y="547" text-anchor="middle" class="note-text">"Want" enables thousands of requests. "Apple" labels exactly one thing.</text>

      <!-- Arrow markers -->
      <defs>
        <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
          <path d="M0,0 L8,3 L0,6" fill="var(--accent)"/>
        </marker>
        <marker id="arrowOrange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
          <path d="M0,0 L8,3 L0,6" fill="var(--ring4)"/>
        </marker>
      </defs>

      <!-- Diminishing returns annotation -->
      <text x="810" y="270" text-anchor="middle" class="example-text">Diminishing</text>
      <text x="810" y="283" text-anchor="middle" class="example-text">returns</text>
      <line x1="810" y1="245" x2="810" y2="230" stroke="var(--muted)" stroke-width="1" marker-end="url(#arrowGray)"/>
      <line x1="810" y1="290" x2="810" y2="310" stroke="var(--muted)" stroke-width="1"/>
      <defs>
        <marker id="arrowGray" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto">
          <path d="M0,0 L6,2 L0,4" fill="var(--muted)"/>
        </marker>
      </defs>
    </svg>
  </div>
  <figcaption>
    <h2>Figure 2 &mdash; Core Vocabulary Funnel</h2>
    <p>Approximately 200-400 high-frequency words account for 80% of daily communication (AAC Institute; AssistiveWare). These core words are primarily verbs, adjectives, pronouns, and prepositions -- not nouns. Nouns dominate the fringe vocabulary, which is highly variable across individuals. Any visual language must prioritize these abstract, relational core words first, despite them being the hardest to depict.</p>
  </figcaption>
</figure>
</body>
</html>
