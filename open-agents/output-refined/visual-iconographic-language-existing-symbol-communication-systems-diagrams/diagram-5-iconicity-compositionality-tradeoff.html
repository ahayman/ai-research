<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iconicity-Compositionality Trade-Off</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --accent: #4361ee;
    --muted: #6c757d;
    --caption-bg: #f8f9fa;
    --grid: #e9ecef;
    --target-bg: rgba(67, 97, 238, 0.08);
    --target-border: #4361ee;
    --dot-pcs: #0284c7;
    --dot-widgit: #d97706;
    --dot-bliss: #7c3aed;
    --dot-emoji: #e76f51;
    --dot-makaton: #db2777;
    --dot-symbolstix: #ea580c;
    --dot-target: #16a34a;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --accent: #6b8aff;
      --muted: #9a9ab0;
      --caption-bg: #1a1a2e;
      --grid: #252540;
      --target-bg: rgba(107, 138, 255, 0.1);
      --target-border: #6b8aff;
      --dot-pcs: #6b8aff;
      --dot-widgit: #fbbf24;
      --dot-bliss: #a78bfa;
      --dot-emoji: #ffa07a;
      --dot-makaton: #f472b6;
      --dot-symbolstix: #fb923c;
      --dot-target: #34d399;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure { max-width: 1000px; width: 100%; }
  .chart-wrapper {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.5rem 1rem;
    overflow-x: auto;
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding: 1rem 1.5rem;
    background: var(--caption-bg);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
</style>
</head>
<body>
<figure>
  <div class="chart-wrapper">
    <svg viewBox="0 0 900 600" xmlns="http://www.w3.org/2000/svg" style="min-width:650px;">
      <defs>
        <style>
          .title { font: bold 16px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
          .subtitle { font: 12px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
          .axis-label { font: bold 12px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
          .axis-text { font: 11px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
          .dot-label { font: bold 11px 'Segoe UI', system-ui, sans-serif; }
          .dot-desc { font: 10px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
          .target-label { font: bold 13px 'Segoe UI', system-ui, sans-serif; fill: var(--dot-target); }
          .target-desc { font: italic 10px 'Segoe UI', system-ui, sans-serif; fill: var(--dot-target); }
          .note-text { font: 11px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
          .tradeoff-line { stroke: var(--muted); stroke-width: 1.5; stroke-dasharray: 8,4; fill: none; }
        </style>
      </defs>

      <text x="450" y="30" text-anchor="middle" class="title">The Iconicity-Compositionality Trade-Off</text>
      <text x="450" y="48" text-anchor="middle" class="subtitle">Where current systems sit -- and where the visual language aims to go</text>

      <!-- Axes -->
      <g transform="translate(100, 80)">
        <!-- Y-axis: Compositionality -->
        <line x1="0" y1="0" x2="0" y2="420" stroke="var(--fg)" stroke-width="2"/>
        <text x="-15" y="210" text-anchor="middle" transform="rotate(-90, -15, 210)" class="axis-label">Compositionality</text>
        <text x="-8" y="10" text-anchor="end" class="axis-text">Full</text>
        <text x="-8" y="420" text-anchor="end" class="axis-text">None</text>

        <!-- X-axis: Iconicity -->
        <line x1="0" y1="420" x2="720" y2="420" stroke="var(--fg)" stroke-width="2"/>
        <text x="360" y="460" text-anchor="middle" class="axis-label">Iconicity</text>
        <text x="10" y="440" class="axis-text">Low</text>
        <text x="700" y="440" text-anchor="end" class="axis-text">High</text>

        <!-- Grid -->
        <line x1="0" y1="105" x2="720" y2="105" stroke="var(--grid)" stroke-width="0.5"/>
        <line x1="0" y1="210" x2="720" y2="210" stroke="var(--grid)" stroke-width="0.5"/>
        <line x1="0" y1="315" x2="720" y2="315" stroke="var(--grid)" stroke-width="0.5"/>
        <line x1="180" y1="0" x2="180" y2="420" stroke="var(--grid)" stroke-width="0.5"/>
        <line x1="360" y1="0" x2="360" y2="420" stroke="var(--grid)" stroke-width="0.5"/>
        <line x1="540" y1="0" x2="540" y2="420" stroke="var(--grid)" stroke-width="0.5"/>

        <!-- Trade-off curve -->
        <path d="M80,20 Q300,100 650,380" class="tradeoff-line"/>
        <text x="660" y="370" class="dot-desc" transform="rotate(-50, 660, 370)">current frontier</text>

        <!-- Target zone -->
        <rect x="250" y="20" width="200" height="140" rx="12" fill="var(--target-bg)" stroke="var(--target-border)" stroke-width="2" stroke-dasharray="6,3"/>
        <text x="350" y="55" text-anchor="middle" class="target-label">TARGET ZONE</text>
        <text x="350" y="72" text-anchor="middle" class="target-desc">Visual Iconographic</text>
        <text x="350" y="85" text-anchor="middle" class="target-desc">Language</text>
        <text x="350" y="105" text-anchor="middle" class="dot-desc">High compositionality +</text>
        <text x="350" y="118" text-anchor="middle" class="dot-desc">moderate iconicity via</text>
        <text x="350" y="131" text-anchor="middle" class="dot-desc">image-schema grounding</text>
        <!-- Target dot -->
        <circle cx="350" cy="75" r="8" fill="var(--dot-target)" opacity="0.7"/>

        <!-- Blissymbolics -->
        <circle cx="120" cy="40" r="12" fill="var(--dot-bliss)" opacity="0.85"/>
        <text x="138" y="35" class="dot-label" fill="var(--dot-bliss)">Blissymbolics</text>
        <text x="138" y="48" class="dot-desc">Full composition, abstract base elements</text>

        <!-- Widgit -->
        <circle cx="380" cy="220" r="12" fill="var(--dot-widgit)" opacity="0.85"/>
        <text x="398" y="215" class="dot-label" fill="var(--dot-widgit)">Widgit</text>
        <text x="398" y="228" class="dot-desc">Rule-based, partial generalization</text>

        <!-- PCS -->
        <circle cx="600" cy="360" r="12" fill="var(--dot-pcs)" opacity="0.85"/>
        <text x="540" y="345" class="dot-label" fill="var(--dot-pcs)">PCS</text>
        <text x="480" y="358" class="dot-desc">79,000+ pictorial symbols, no composition</text>

        <!-- SymbolStix -->
        <circle cx="570" cy="340" r="10" fill="var(--dot-symbolstix)" opacity="0.85"/>
        <text x="588" y="330" class="dot-label" fill="var(--dot-symbolstix)">SymbolStix</text>
        <text x="588" y="343" class="dot-desc">Action-oriented stick figures</text>

        <!-- Emoji -->
        <circle cx="650" cy="390" r="10" fill="var(--dot-emoji)" opacity="0.85"/>
        <text x="600" y="400" class="dot-label" fill="var(--dot-emoji)">Emoji</text>
        <text x="580" y="413" class="dot-desc">Highly iconic, zero composition</text>

        <!-- Makaton -->
        <circle cx="440" cy="310" r="10" fill="var(--dot-makaton)" opacity="0.85"/>
        <text x="458" y="300" class="dot-label" fill="var(--dot-makaton)">Makaton</text>
        <text x="458" y="313" class="dot-desc">Multimodal, staged vocabulary</text>

        <!-- Arrow from Bliss to target zone -->
        <line x1="135" y1="42" x2="260" y2="70" stroke="var(--dot-target)" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrowGreen)"/>
        <text x="170" y="62" class="dot-desc" fill="var(--dot-target)">Add grounding</text>
      </g>

      <!-- Key question at bottom -->
      <rect x="100" y="530" width="700" height="35" rx="8" fill="var(--surface)" stroke="var(--accent)" stroke-width="1.5"/>
      <text x="450" y="552" text-anchor="middle" class="note-text" font-weight="bold">Key question: Can image-schema grounding shift the trade-off curve, achieving Blissymbolics' compositionality with better learnability?</text>

      <defs>
        <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
          <path d="M0,0 L8,3 L0,6" fill="var(--dot-target)"/>
        </marker>
      </defs>
    </svg>
  </div>
  <figcaption>
    <h2>Figure 5 &mdash; The Iconicity-Compositionality Trade-Off</h2>
    <p>The fundamental design tension in visual communication systems: pictorial clarity (iconicity) trades off against the ability to build new meanings from parts (compositionality). PCS sits at the high-iconicity end; Blissymbolics at high-compositionality. The proposed visual iconographic language aims for a new position: high compositionality with moderate iconicity achieved through image-schema grounding rather than arbitrary geometric shapes.</p>
  </figcaption>
</figure>
</body>
</html>
