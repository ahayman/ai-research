<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blissymbolics Composition</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --accent: #7c3aed;
    --muted: #6c757d;
    --caption-bg: #f8f9fa;
    --base-bg: #ede9fe;
    --base-border: #7c3aed;
    --composed-bg: #e0f2fe;
    --composed-border: #0284c7;
    --indicator-bg: #fef3c7;
    --indicator-border: #d97706;
    --metaphor-bg: #dcfce7;
    --metaphor-border: #16a34a;
    --plus: #6c757d;
    --arrow: #4361ee;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --accent: #a78bfa;
      --muted: #9a9ab0;
      --caption-bg: #1a1a2e;
      --base-bg: #3b0764;
      --base-border: #a78bfa;
      --composed-bg: #1e3a5f;
      --composed-border: #6b8aff;
      --indicator-bg: #78350f;
      --indicator-border: #fbbf24;
      --metaphor-bg: #064e3b;
      --metaphor-border: #34d399;
      --plus: #9a9ab0;
      --arrow: #6b8aff;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure { max-width: 1000px; width: 100%; }
  .chart-wrapper {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.5rem 1rem;
    overflow-x: auto;
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding: 1rem 1.5rem;
    background: var(--caption-bg);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
</style>
</head>
<body>
<figure>
  <div class="chart-wrapper">
    <svg viewBox="0 0 920 600" xmlns="http://www.w3.org/2000/svg" style="min-width:700px;">
      <defs>
        <style>
          .title { font: bold 16px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
          .subtitle { font: 12px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
          .section-title { font: bold 13px 'Segoe UI', system-ui, sans-serif; fill: var(--accent); }
          .base-label { font: bold 12px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
          .base-desc { font: 10px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
          .plus-sign { font: bold 20px 'Segoe UI', system-ui, sans-serif; fill: var(--plus); }
          .equals-sign { font: bold 20px 'Segoe UI', system-ui, sans-serif; fill: var(--arrow); }
          .result-label { font: bold 13px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
          .metaphor-label { font: italic 10px 'Segoe UI', system-ui, sans-serif; fill: var(--metaphor-border); }
          .indicator-label { font: bold 11px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
          .indicator-desc { font: 10px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
          .note-text { font: 11px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
          .shape-stroke { stroke: var(--base-border); stroke-width: 2; fill: none; }
          .shape-fill { fill: var(--base-bg); stroke: var(--base-border); stroke-width: 1.5; }
        </style>
      </defs>

      <text x="460" y="30" text-anchor="middle" class="title">Blissymbolics: Building Meaning from Base Elements</text>
      <text x="460" y="48" text-anchor="middle" class="subtitle">~120 base elements compose into 5,000+ authorized symbols through semantic combination</text>

      <!-- Section 1: Base Elements -->
      <text x="30" y="80" class="section-title">Base Elements (~120)</text>
      <line x1="30" y1="86" x2="200" y2="86" stroke="var(--accent)" stroke-width="1" opacity="0.4"/>

      <!-- Heart -->
      <rect x="30" y="95" width="90" height="55" rx="6" class="shape-fill"/>
      <text x="75" y="113" text-anchor="middle" style="font:20px serif;fill:var(--base-border);">&#9829;</text>
      <text x="75" y="135" text-anchor="middle" class="base-label">FEELING</text>
      <text x="75" y="147" text-anchor="middle" class="base-desc">heart symbol</text>

      <!-- Up arrow -->
      <rect x="140" y="95" width="90" height="55" rx="6" class="shape-fill"/>
      <text x="185" y="118" text-anchor="middle" style="font:20px sans-serif;fill:var(--base-border);">&#8593;</text>
      <text x="185" y="135" text-anchor="middle" class="base-label">UP</text>
      <text x="185" y="147" text-anchor="middle" class="base-desc">upward line</text>

      <!-- Down arrow -->
      <rect x="250" y="95" width="90" height="55" rx="6" class="shape-fill"/>
      <text x="295" y="118" text-anchor="middle" style="font:20px sans-serif;fill:var(--base-border);">&#8595;</text>
      <text x="295" y="135" text-anchor="middle" class="base-label">DOWN</text>
      <text x="295" y="147" text-anchor="middle" class="base-desc">downward line</text>

      <!-- Enclosure -->
      <rect x="360" y="95" width="90" height="55" rx="6" class="shape-fill"/>
      <rect x="385" y="103" width="40" height="25" rx="3" stroke="var(--base-border)" stroke-width="2" fill="none"/>
      <text x="405" y="140" text-anchor="middle" class="base-label">ENCLOSURE</text>
      <text x="405" y="152" text-anchor="middle" class="base-desc">bounded region</text>

      <!-- Person -->
      <rect x="470" y="95" width="90" height="55" rx="6" class="shape-fill"/>
      <circle cx="515" cy="107" r="5" stroke="var(--base-border)" stroke-width="2" fill="none"/>
      <line x1="515" y1="112" x2="515" y2="126" stroke="var(--base-border)" stroke-width="2"/>
      <text x="515" y="140" text-anchor="middle" class="base-label">PERSON</text>
      <text x="515" y="152" text-anchor="middle" class="base-desc">stick figure</text>

      <!-- Forward -->
      <rect x="580" y="95" width="90" height="55" rx="6" class="shape-fill"/>
      <text x="625" y="118" text-anchor="middle" style="font:20px sans-serif;fill:var(--base-border);">&#8594;</text>
      <text x="625" y="135" text-anchor="middle" class="base-label">FORWARD</text>
      <text x="625" y="147" text-anchor="middle" class="base-desc">directional</text>

      <!-- Section 2: Composition Examples -->
      <text x="30" y="195" class="section-title">Composition Examples</text>
      <line x1="30" y1="201" x2="230" y2="201" stroke="var(--accent)" stroke-width="1" opacity="0.4"/>

      <!-- Happy = Heart + Up -->
      <rect x="30" y="215" width="70" height="45" rx="6" class="shape-fill"/>
      <text x="65" y="240" text-anchor="middle" style="font:16px serif;fill:var(--base-border);">&#9829;</text>
      <text x="65" y="256" text-anchor="middle" class="base-desc">feeling</text>
      <text x="115" y="240" text-anchor="middle" class="plus-sign">+</text>
      <rect x="130" y="215" width="70" height="45" rx="6" class="shape-fill"/>
      <text x="165" y="243" text-anchor="middle" style="font:16px sans-serif;fill:var(--base-border);">&#8593;</text>
      <text x="165" y="256" text-anchor="middle" class="base-desc">up</text>
      <text x="215" y="240" text-anchor="middle" class="equals-sign">=</text>
      <rect x="230" y="215" width="100" height="45" rx="6" fill="var(--composed-bg)" stroke="var(--composed-border)" stroke-width="1.5"/>
      <text x="280" y="237" text-anchor="middle" class="result-label">HAPPY</text>
      <text x="280" y="252" text-anchor="middle" class="metaphor-label">HAPPY IS UP</text>

      <!-- Sad = Heart + Down -->
      <rect x="370" y="215" width="70" height="45" rx="6" class="shape-fill"/>
      <text x="405" y="240" text-anchor="middle" style="font:16px serif;fill:var(--base-border);">&#9829;</text>
      <text x="405" y="256" text-anchor="middle" class="base-desc">feeling</text>
      <text x="455" y="240" text-anchor="middle" class="plus-sign">+</text>
      <rect x="470" y="215" width="70" height="45" rx="6" class="shape-fill"/>
      <text x="505" y="243" text-anchor="middle" style="font:16px sans-serif;fill:var(--base-border);">&#8595;</text>
      <text x="505" y="256" text-anchor="middle" class="base-desc">down</text>
      <text x="555" y="240" text-anchor="middle" class="equals-sign">=</text>
      <rect x="570" y="215" width="100" height="45" rx="6" fill="var(--composed-bg)" stroke="var(--composed-border)" stroke-width="1.5"/>
      <text x="620" y="237" text-anchor="middle" class="result-label">SAD</text>
      <text x="620" y="252" text-anchor="middle" class="metaphor-label">SAD IS DOWN</text>

      <!-- Protection = Enclosure + Person -->
      <rect x="30" y="285" width="70" height="45" rx="6" class="shape-fill"/>
      <rect x="47" y="293" width="36" height="20" rx="3" stroke="var(--base-border)" stroke-width="1.5" fill="none"/>
      <text x="65" y="326" text-anchor="middle" class="base-desc">enclosure</text>
      <text x="115" y="310" text-anchor="middle" class="plus-sign">+</text>
      <rect x="130" y="285" width="70" height="45" rx="6" class="shape-fill"/>
      <circle cx="165" cy="296" r="4" stroke="var(--base-border)" stroke-width="1.5" fill="none"/>
      <line x1="165" y1="300" x2="165" y2="312" stroke="var(--base-border)" stroke-width="1.5"/>
      <text x="165" y="326" text-anchor="middle" class="base-desc">person</text>
      <text x="215" y="310" text-anchor="middle" class="equals-sign">=</text>
      <rect x="230" y="285" width="100" height="45" rx="6" fill="var(--composed-bg)" stroke="var(--composed-border)" stroke-width="1.5"/>
      <text x="280" y="307" text-anchor="middle" class="result-label">PROTECTION</text>
      <text x="280" y="322" text-anchor="middle" class="metaphor-label">Person in container</text>

      <!-- Section 3: Indicator System -->
      <text x="30" y="370" class="section-title">Grammatical Indicators</text>
      <line x1="30" y1="376" x2="230" y2="376" stroke="var(--accent)" stroke-width="1" opacity="0.4"/>

      <!-- Action indicator -->
      <rect x="30" y="390" width="200" height="40" rx="6" fill="var(--indicator-bg)" stroke="var(--indicator-border)" stroke-width="1.5"/>
      <text x="45" y="413" class="indicator-label">&#8744; above</text>
      <text x="130" y="413" class="indicator-desc">= Action (verb)</text>

      <!-- Thing indicator -->
      <rect x="250" y="390" width="200" height="40" rx="6" fill="var(--indicator-bg)" stroke="var(--indicator-border)" stroke-width="1.5"/>
      <text x="265" y="413" class="indicator-label">&#9633; above</text>
      <text x="355" y="413" class="indicator-desc">= Thing (noun)</text>

      <!-- Description indicator -->
      <rect x="470" y="390" width="200" height="40" rx="6" fill="var(--indicator-bg)" stroke="var(--indicator-border)" stroke-width="1.5"/>
      <text x="485" y="413" class="indicator-label">&#709; above</text>
      <text x="575" y="413" class="indicator-desc">= Description (adj)</text>

      <!-- Evaluation -->
      <rect x="690" y="390" width="200" height="40" rx="6" fill="var(--indicator-bg)" stroke="var(--indicator-border)" stroke-width="1.5"/>
      <text x="705" y="413" class="indicator-label">+/- marks</text>
      <text x="800" y="413" class="indicator-desc">= Evaluation</text>

      <!-- Section 4: Comparison with proposed approach -->
      <text x="30" y="470" class="section-title">Blissymbolics vs. Proposed Visual Language</text>
      <line x1="30" y1="476" x2="350" y2="476" stroke="var(--accent)" stroke-width="1" opacity="0.4"/>

      <rect x="30" y="490" width="410" height="85" rx="8" fill="var(--base-bg)" stroke="var(--base-border)" stroke-width="1.5"/>
      <text x="235" y="510" text-anchor="middle" class="indicator-label">Blissymbolics (1949)</text>
      <text x="235" y="528" text-anchor="middle" class="note-text">Base elements: arbitrary geometric shapes</text>
      <text x="235" y="543" text-anchor="middle" class="note-text">Some metaphor use (HAPPY IS UP) but not systematic</text>
      <text x="235" y="558" text-anchor="middle" class="note-text">Higher learning burden due to abstract base elements</text>

      <text x="460" y="535" text-anchor="middle" class="equals-sign">vs.</text>

      <rect x="480" y="490" width="410" height="85" rx="8" fill="var(--metaphor-bg)" stroke="var(--metaphor-border)" stroke-width="1.5"/>
      <text x="685" y="510" text-anchor="middle" class="indicator-label">Proposed Visual Language</text>
      <text x="685" y="528" text-anchor="middle" class="note-text">Base elements: image schemas (CONTAINER, PATH, FORCE)</text>
      <text x="685" y="543" text-anchor="middle" class="note-text">Systematic primary metaphor mappings throughout</text>
      <text x="685" y="558" text-anchor="middle" class="note-text">Lower learning burden via experiential grounding</text>
    </svg>
  </div>
  <figcaption>
    <h2>Figure 4 &mdash; Blissymbolics Composition: Building Meaning from Base Elements</h2>
    <p>Blissymbolics (Charles K. Bliss, 1949; AAC adoption by Shirley McNaughton, 1971) uses approximately 120 base elements to compose 5,000+ authorized symbols. The system already uses some conceptual metaphors (HAPPY IS UP / SAD IS DOWN) -- the same grounding the visual iconographic language proposes to systematize. The key difference: Blissymbolics' base elements are largely arbitrary geometric shapes, while the proposed language would ground base elements in image schemas derived from embodied experience.</p>
  </figcaption>
</figure>
</body>
</html>
