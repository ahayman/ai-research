  <figcaption>
    <strong>Figure 3:</strong> The six phases of PECS (Bondy &amp; Frost, 1985). Communication competence builds from simple physical exchange (Phase 1, often achieved in hours) to spontaneous commenting (Phase 6, achieved over months). The progression demonstrates a universal learning model: start with functional requests, build to structured sentences, end with spontaneous expression. Any visual communication system can follow this staged approach.
