<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AAC Symbol System Landscape</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --accent: #4361ee;
    --muted: #6c757d;
    --caption-bg: #f8f9fa;
    --header-bg: #e0f2fe;
    --header-border: #0284c7;
    --row-alt: #f8f9fa;
    --pecs: #dcfce7;
    --pecs-border: #16a34a;
    --pcs: #e0f2fe;
    --pcs-border: #0284c7;
    --widgit: #fef3c7;
    --widgit-border: #d97706;
    --makaton: #fce7f3;
    --makaton-border: #db2777;
    --bliss: #ede9fe;
    --bliss-border: #7c3aed;
    --symbolstix: #ffedd5;
    --symbolstix-border: #ea580c;
    --high: #16a34a;
    --med: #d97706;
    --low: #dc2626;
    --none: #6b7280;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --accent: #6b8aff;
      --muted: #9a9ab0;
      --caption-bg: #1a1a2e;
      --header-bg: #1e3a5f;
      --header-border: #6b8aff;
      --row-alt: #16162e;
      --pecs: #064e3b;
      --pecs-border: #34d399;
      --pcs: #1e3a5f;
      --pcs-border: #6b8aff;
      --widgit: #78350f;
      --widgit-border: #fbbf24;
      --makaton: #831843;
      --makaton-border: #f472b6;
      --bliss: #3b0764;
      --bliss-border: #a78bfa;
      --symbolstix: #7c2d12;
      --symbolstix-border: #fb923c;
      --high: #34d399;
      --med: #fbbf24;
      --low: #ff6b7a;
      --none: #9a9ab0;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure { max-width: 1100px; width: 100%; }
  .chart-wrapper {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.5rem;
    overflow-x: auto;
  }
  h2.chart-title {
    text-align: center;
    font-size: 1.2rem;
    color: var(--accent);
    margin-bottom: 0.3rem;
  }
  p.chart-subtitle {
    text-align: center;
    font-size: 0.85rem;
    color: var(--muted);
    margin-bottom: 1.5rem;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    min-width: 900px;
    font-size: 0.85rem;
  }
  th {
    background: var(--header-bg);
    border: 1px solid var(--header-border);
    padding: 0.6rem 0.5rem;
    text-align: center;
    font-weight: 600;
    font-size: 0.8rem;
    color: var(--fg);
  }
  td {
    border: 1px solid var(--border);
    padding: 0.5rem;
    vertical-align: middle;
    text-align: center;
  }
  td:first-child { text-align: left; font-weight: 600; }
  tr.pecs td:first-child { border-left: 4px solid var(--pecs-border); background: var(--pecs); }
  tr.pcs td:first-child { border-left: 4px solid var(--pcs-border); background: var(--pcs); }
  tr.widgit td:first-child { border-left: 4px solid var(--widgit-border); background: var(--widgit); }
  tr.makaton td:first-child { border-left: 4px solid var(--makaton-border); background: var(--makaton); }
  tr.bliss td:first-child { border-left: 4px solid var(--bliss-border); background: var(--bliss); }
  tr.symbolstix td:first-child { border-left: 4px solid var(--symbolstix-border); background: var(--symbolstix); }
  .pill {
    display: inline-block;
    padding: 0.15rem 0.5rem;
    border-radius: 999px;
    font-size: 0.75rem;
    font-weight: 600;
  }
  .pill-high { background: var(--pecs); color: var(--high); border: 1px solid var(--high); }
  .pill-med { background: var(--widgit); color: var(--med); border: 1px solid var(--med); }
  .pill-low { background: #fee2e2; color: var(--low); border: 1px solid var(--low); }
  .pill-none { background: var(--row-alt); color: var(--none); border: 1px solid var(--none); }
  .pill-full { background: var(--bliss); color: var(--bliss-border); border: 1px solid var(--bliss-border); }
  @media (prefers-color-scheme: dark) {
    .pill-high { background: #064e3b; }
    .pill-med { background: #78350f; }
    .pill-low { background: #450a0a; }
    .pill-full { background: #3b0764; }
  }
  .tradeoff-note {
    margin-top: 1.2rem;
    padding: 0.8rem 1rem;
    background: var(--bliss);
    border: 1px solid var(--bliss-border);
    border-radius: 8px;
    font-size: 0.85rem;
    text-align: center;
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding: 1rem 1.5rem;
    background: var(--caption-bg);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  figcaption h3 { font-size: 1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.82rem; color: var(--muted); }
</style>
</head>
<body>
<figure>
  <div class="chart-wrapper">
    <h2 class="chart-title">AAC Symbol System Landscape</h2>
    <p class="chart-subtitle">Comparison across design philosophy, scale, compositionality, iconicity, and linguistic power</p>
    <table>
      <thead>
        <tr>
          <th>System</th>
          <th>Type</th>
          <th>Symbols</th>
          <th>Iconicity</th>
          <th>Compositionality</th>
          <th>Linguistic Level</th>
          <th>Primary Users</th>
          <th>Region</th>
        </tr>
      </thead>
      <tbody>
        <tr class="pecs">
          <td>PECS</td>
          <td>Teaching<br/>methodology</td>
          <td>Uses any<br/>symbols</td>
          <td><span class="pill pill-none">N/A</span></td>
          <td><span class="pill pill-none">None</span></td>
          <td>Sentence strips<br/>(phase 4+)</td>
          <td>Autism, nonverbal<br/>children</td>
          <td>Global</td>
        </tr>
        <tr class="pcs">
          <td>PCS</td>
          <td>Pictorial<br/>symbol set</td>
          <td>79,000+</td>
          <td><span class="pill pill-high">High</span></td>
          <td><span class="pill pill-none">None</span></td>
          <td>Word-level</td>
          <td>Broad AAC<br/>population</td>
          <td>Global</td>
        </tr>
        <tr class="widgit">
          <td>Widgit</td>
          <td>Rule-based<br/>symbol set</td>
          <td>12,000+<br/>(40K words)</td>
          <td><span class="pill pill-med">Medium</span></td>
          <td><span class="pill pill-med">Limited</span></td>
          <td>Word + partial<br/>generalization</td>
          <td>Education,<br/>learning disability</td>
          <td>UK</td>
        </tr>
        <tr class="makaton">
          <td>Makaton</td>
          <td>Multimodal<br/>program</td>
          <td>450 core +<br/>11K resource</td>
          <td><span class="pill pill-med">Medium</span></td>
          <td><span class="pill pill-none">None</span></td>
          <td>Keyword<br/>signing + symbols</td>
          <td>Learning disability,<br/>autism, Down syndrome</td>
          <td>UK, 40+<br/>countries</td>
        </tr>
        <tr class="bliss">
          <td>Blissymbolics</td>
          <td>Compositional<br/>visual language</td>
          <td>~120 base<br/>=&gt; 5,000+</td>
          <td><span class="pill pill-low">Low</span></td>
          <td><span class="pill pill-full">Full</span></td>
          <td>Compositional<br/>semantics</td>
          <td>AAC, cerebral palsy,<br/>motor impairments</td>
          <td>33+<br/>countries</td>
        </tr>
        <tr class="symbolstix">
          <td>SymbolStix</td>
          <td>Stick-figure<br/>symbol set</td>
          <td>15,000+</td>
          <td><span class="pill pill-high">High</span></td>
          <td><span class="pill pill-none">None</span></td>
          <td>Word-level</td>
          <td>Broad AAC<br/>population</td>
          <td>Global</td>
        </tr>
      </tbody>
    </table>
    <div class="tradeoff-note">
      <strong>The fundamental trade-off:</strong> PCS maximizes iconicity (easy to recognize) but cannot compose new meanings. Blissymbolics maximizes compositionality (can build novel symbols) but is harder to learn. A visual iconographic language aims to combine both -- grounded compositionality through image schemas.
    </div>
  </div>
  <figcaption>
    <h3>Figure 1 &mdash; AAC Symbol System Landscape</h3>
    <p>The six major AAC symbol systems compared across key dimensions. PCS (Tobii Dynavox, created by Roxie Johnson, 1981) dominates by volume; Blissymbolics (Charles K. Bliss, 1949, adopted for AAC 1971) dominates in linguistic sophistication. The proposed visual iconographic language targets the empty cell: high compositionality with moderate iconicity.</p>
  </figcaption>
</figure>
</body>
</html>
