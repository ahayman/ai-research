<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Linking Element Decision Guide -- Fugenelement Flowchart</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --s-color: #3b82f6;
    --s-bg: #eff6ff;
    --n-color: #10b981;
    --n-bg: #ecfdf5;
    --er-color: #f59e0b;
    --er-bg: #fffbeb;
    --zero-color: #8b5cf6;
    --zero-bg: #f5f3ff;
    --start-color: #e63946;
    --start-bg: #fef2f2;
    --muted: #6c757d;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --s-color: #60a5fa;
      --s-bg: #1e293b;
      --n-color: #34d399;
      --n-bg: #132e24;
      --er-color: #fbbf24;
      --er-bg: #2a2510;
      --zero-color: #a78bfa;
      --zero-bg: #1e1b3a;
      --start-color: #f87171;
      --start-bg: #2a1520;
      --muted: #9a9ab0;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure {
    max-width: 1100px;
    width: 100%;
    background: var(--surface);
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
  }
  h2 { text-align: center; font-size: 1.4rem; margin-bottom: 0.3rem; }
  .subtitle { text-align: center; font-size: 0.95rem; color: var(--muted); margin-bottom: 2rem; }

  /* Start node */
  .start-node {
    text-align: center;
    margin-bottom: 1.5rem;
  }
  .start-pill {
    display: inline-block;
    background: var(--start-color);
    color: #fff;
    padding: 0.6rem 2rem;
    border-radius: 25px;
    font-size: 1rem;
    font-weight: 700;
  }
  .start-sub {
    font-size: 0.82rem;
    color: var(--muted);
    margin-top: 0.3rem;
  }

  /* Arrow */
  .flow-arrow {
    text-align: center;
    font-size: 1.5rem;
    color: var(--muted);
    margin: 0.6rem 0;
  }

  /* Decision branches */
  .branches {
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }
  .branch {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 1rem;
    align-items: center;
  }
  .condition {
    padding: 0.8rem 1rem;
    border-radius: 10px;
    font-size: 0.85rem;
    text-align: right;
  }
  .condition .cond-label {
    font-weight: 700;
    display: block;
    margin-bottom: 0.2rem;
  }
  .condition .cond-detail {
    font-size: 0.75rem;
    color: var(--muted);
  }

  .result-pill {
    padding: 0.5rem 1.2rem;
    border-radius: 25px;
    font-weight: 800;
    font-size: 1.1rem;
    text-align: center;
    white-space: nowrap;
    min-width: 60px;
  }

  .examples-col {
    padding: 0.5rem 0.8rem;
    border-radius: 8px;
    font-size: 0.8rem;
  }
  .example-word {
    font-weight: 600;
    display: block;
  }
  .example-trans {
    font-size: 0.72rem;
    color: var(--muted);
  }

  /* Colors per branch */
  .branch.s .condition { background: var(--s-bg); border: 1px solid var(--s-color); }
  .branch.s .condition .cond-label { color: var(--s-color); }
  .branch.s .result-pill { background: var(--s-color); color: #fff; }
  .branch.s .examples-col { background: var(--s-bg); border: 1px solid var(--s-color); }

  .branch.n .condition { background: var(--n-bg); border: 1px solid var(--n-color); }
  .branch.n .condition .cond-label { color: var(--n-color); }
  .branch.n .result-pill { background: var(--n-color); color: #fff; }
  .branch.n .examples-col { background: var(--n-bg); border: 1px solid var(--n-color); }

  .branch.er .condition { background: var(--er-bg); border: 1px solid var(--er-color); }
  .branch.er .condition .cond-label { color: var(--er-color); }
  .branch.er .result-pill { background: var(--er-color); color: #fff; }
  .branch.er .examples-col { background: var(--er-bg); border: 1px solid var(--er-color); }

  .branch.zero .condition { background: var(--zero-bg); border: 1px solid var(--zero-color); }
  .branch.zero .condition .cond-label { color: var(--zero-color); }
  .branch.zero .result-pill { background: var(--zero-color); color: #fff; }
  .branch.zero .examples-col { background: var(--zero-bg); border: 1px solid var(--zero-color); }

  /* Coverage note */
  .coverage-note {
    margin-top: 1.5rem;
    padding: 1rem;
    border-radius: 10px;
    border: 2px dashed var(--border);
    text-align: center;
  }
  .coverage-note .big {
    font-size: 1.3rem;
    font-weight: 800;
    color: var(--s-color);
  }
  .coverage-note .note-text {
    font-size: 0.82rem;
    color: var(--muted);
    margin-top: 0.3rem;
  }

  /* Quick-reference table */
  .quick-ref {
    margin-top: 1.5rem;
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  .quick-ref h3 {
    padding: 0.6rem 1rem;
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  .ref-row {
    display: grid;
    grid-template-columns: 80px 1fr 1fr;
    font-size: 0.82rem;
    border-bottom: 1px solid var(--border);
  }
  .ref-row:last-child { border-bottom: none; }
  .ref-cell {
    padding: 0.5rem 0.8rem;
  }
  .ref-cell.element {
    font-weight: 700;
    text-align: center;
  }
  .ref-cell.trigger {
    border-right: 1px solid var(--border);
  }

  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid var(--border);
  }
  figcaption strong { display: block; font-size: 1.05rem; margin-bottom: 0.4rem; }
  figcaption span { font-size: 0.88rem; color: var(--muted); line-height: 1.5; }

  @media (max-width: 700px) {
    figure { padding: 1.2rem; }
    .branch { grid-template-columns: 1fr; gap: 0.3rem; }
    .condition { text-align: left; }
    .result-pill { justify-self: start; }
    .ref-row { grid-template-columns: 60px 1fr; }
    .ref-cell:nth-child(3) { grid-column: 1 / -1; }
  }
  @media print {
    body { background: #fff; }
    figure { box-shadow: none; border: 1px solid #ccc; }
  }
</style>
</head>
<body>
<figure>
  <h2>Linking Element Decision Guide</h2>
  <p class="subtitle">How to choose the right Fugenelement between compound components -- covering ~80% of cases.</p>

  <div class="start-node">
    <div class="start-pill">What does the FIRST element end with?</div>
    <div class="start-sub">Examine the modifier (Bestimmungswort) to predict the linking element</div>
  </div>

  <div class="flow-arrow">&darr;</div>

  <div class="branches">
    <!-- Branch 1: -s- (suffix triggers) -->
    <div class="branch s">
      <div class="condition">
        <span class="cond-label">Ends in -ung, -heit, -keit, -schaft, -tion, -taet, -ling, -tum</span>
        <span class="cond-detail">Abstract/derived noun suffixes</span>
      </div>
      <div class="result-pill">-s-</div>
      <div class="examples-col">
        <span class="example-word">Hoffnung-s-los</span>
        <span class="example-trans">hopeless</span>
        <span class="example-word">Freiheit-s-kampf</span>
        <span class="example-trans">freedom fight</span>
        <span class="example-word">Freundschaft-s-spiel</span>
        <span class="example-trans">friendly match</span>
      </div>
    </div>

    <!-- Branch 1b: -s- (nominalized infinitive) -->
    <div class="branch s">
      <div class="condition">
        <span class="cond-label">Nominalized infinitive (ends in -en)</span>
        <span class="cond-detail">Verbs used as nouns: das Leben, das Essen</span>
      </div>
      <div class="result-pill">-s-</div>
      <div class="examples-col">
        <span class="example-word">Leben-s-freude</span>
        <span class="example-trans">joy of life</span>
        <span class="example-word">Essen-s-zeit</span>
        <span class="example-trans">mealtime</span>
      </div>
    </div>

    <!-- Branch 2: -n- -->
    <div class="branch n">
      <div class="condition">
        <span class="cond-label">Feminine noun ending in -e</span>
        <span class="cond-detail">die Blume, die Sonne, die Strasse</span>
      </div>
      <div class="result-pill">-n-</div>
      <div class="examples-col">
        <span class="example-word">Blume-n-strauss</span>
        <span class="example-trans">bouquet</span>
        <span class="example-word">Sonne-n-schein</span>
        <span class="example-trans">sunshine</span>
        <span class="example-word">Strasse-n-bahn</span>
        <span class="example-trans">streetcar</span>
      </div>
    </div>

    <!-- Branch 3: -er- -->
    <div class="branch er">
      <div class="condition">
        <span class="cond-label">Noun with -er plural</span>
        <span class="cond-detail">das Kind &rarr; die Kinder, das Ei &rarr; die Eier</span>
      </div>
      <div class="result-pill">-er-</div>
      <div class="examples-col">
        <span class="example-word">Kind-er-garten</span>
        <span class="example-trans">kindergarten</span>
        <span class="example-word">Ei-er-schale</span>
        <span class="example-trans">eggshell</span>
        <span class="example-word">Bild-er-buch</span>
        <span class="example-trans">picture book</span>
      </div>
    </div>

    <!-- Branch 4: zero -->
    <div class="branch zero">
      <div class="condition">
        <span class="cond-label">None of the above?</span>
        <span class="cond-detail">Try zero (no linker) -- or default to -s- if unsure</span>
      </div>
      <div class="result-pill">&empty;</div>
      <div class="examples-col">
        <span class="example-word">Haus-tuer</span>
        <span class="example-trans">front door</span>
        <span class="example-word">Tisch-lampe</span>
        <span class="example-trans">desk lamp</span>
        <span class="example-word">Bier-garten</span>
        <span class="example-trans">beer garden</span>
      </div>
    </div>
  </div>

  <!-- Coverage note -->
  <div class="coverage-note">
    <div class="big">~80% predictable</div>
    <div class="note-text">These rules cover the vast majority of compounds. The remaining ~20% are lexicalized and must be learned individually. When in doubt, <strong>-s-</strong> is the safest default -- it is the most common linking element overall.</div>
  </div>

  <!-- Quick reference -->
  <div class="quick-ref">
    <h3>Quick Reference -- All Fugenelemente</h3>
    <div class="ref-row" style="font-weight:700; background:var(--surface);">
      <div class="ref-cell element">Element</div>
      <div class="ref-cell trigger">Triggered by</div>
      <div class="ref-cell">Frequency</div>
    </div>
    <div class="ref-row">
      <div class="ref-cell element" style="color:var(--s-color);">-s-</div>
      <div class="ref-cell trigger">-ung, -heit, -keit, -schaft, -tion, nominalized infinitives</div>
      <div class="ref-cell">Most common overall</div>
    </div>
    <div class="ref-row">
      <div class="ref-cell element" style="color:var(--n-color);">-n-</div>
      <div class="ref-cell trigger">Feminine nouns ending in -e</div>
      <div class="ref-cell">Very common</div>
    </div>
    <div class="ref-row">
      <div class="ref-cell element" style="color:var(--n-color);">-en-</div>
      <div class="ref-cell trigger">Certain plural forms, weak nouns</div>
      <div class="ref-cell">Common</div>
    </div>
    <div class="ref-row">
      <div class="ref-cell element" style="color:var(--er-color);">-er-</div>
      <div class="ref-cell trigger">Nouns with -er plural</div>
      <div class="ref-cell">Moderate</div>
    </div>
    <div class="ref-row">
      <div class="ref-cell element" style="color:var(--zero-color);">&empty;</div>
      <div class="ref-cell trigger">Many simple compounds, monosyllabic first elements</div>
      <div class="ref-cell">Very common</div>
    </div>
    <div class="ref-row">
      <div class="ref-cell element" style="color:var(--muted);">-e-</div>
      <div class="ref-cell trigger">Some older or lexicalized compounds</div>
      <div class="ref-cell">Rare</div>
    </div>
  </div>

  <figcaption>
    <strong>Figure 2: Linking Element Decision Guide -- Fugenelement Flowchart</strong>
    <span>German Fugenelemente are phonological "glue" inserted between compound components. Though historically derived from genitive and plural endings, they are now grammaticalized linking devices. The choice is largely predictable: abstract suffixes (-ung, -heit, -keit, -schaft) trigger -s-; feminine nouns ending in -e trigger -n-; nouns with -er plurals trigger -er-. When no rule applies, try zero or default to -s-. This system covers approximately 80% of cases -- the remainder are lexicalized and must be learned individually.</span>
  </figcaption>
</figure>
</body>
</html>
