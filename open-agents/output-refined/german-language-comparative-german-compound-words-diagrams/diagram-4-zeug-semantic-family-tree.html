<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The -Zeug Semantic Family Tree</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --center-color: #e63946;
    --center-bg: #fef2f2;
    --transport-color: #3b82f6;
    --transport-bg: #eff6ff;
    --tool-color: #10b981;
    --tool-bg: #ecfdf5;
    --object-color: #f59e0b;
    --object-bg: #fffbeb;
    --music-color: #8b5cf6;
    --music-bg: #f5f3ff;
    --other-color: #ec4899;
    --other-bg: #fdf2f8;
    --en-color: #6c757d;
    --muted: #6c757d;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --center-color: #f87171;
      --center-bg: #2a1520;
      --transport-color: #60a5fa;
      --transport-bg: #1e293b;
      --tool-color: #34d399;
      --tool-bg: #132e24;
      --object-color: #fbbf24;
      --object-bg: #2a2510;
      --music-color: #a78bfa;
      --music-bg: #1e1b3a;
      --other-color: #f472b6;
      --other-bg: #2a1525;
      --en-color: #9a9ab0;
      --muted: #9a9ab0;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure {
    max-width: 1100px;
    width: 100%;
    background: var(--surface);
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
  }
  h2 { text-align: center; font-size: 1.4rem; margin-bottom: 0.3rem; }
  .subtitle { text-align: center; font-size: 0.95rem; color: var(--muted); margin-bottom: 2rem; }

  /* Radial layout */
  .radial-container {
    position: relative;
    width: 100%;
    max-width: 700px;
    margin: 0 auto 2rem;
  }

  /* Center node */
  .center-node {
    width: 130px;
    height: 130px;
    border-radius: 50%;
    background: var(--center-bg);
    border: 4px solid var(--center-color);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin: 0 auto 1rem;
    position: relative;
    z-index: 2;
  }
  .center-node .zeug-word {
    font-size: 1.6rem;
    font-weight: 800;
    color: var(--center-color);
  }
  .center-node .zeug-meaning {
    font-size: 0.72rem;
    color: var(--muted);
    text-align: center;
    line-height: 1.3;
  }

  /* Category clusters */
  .cluster-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1rem;
    margin-bottom: 1.5rem;
  }

  .cluster {
    border-radius: 12px;
    padding: 1rem;
    border: 2px solid;
  }
  .cluster h3 {
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 0.6rem;
    text-align: center;
  }

  .cluster.transport { background: var(--transport-bg); border-color: var(--transport-color); }
  .cluster.transport h3 { color: var(--transport-color); }
  .cluster.tool { background: var(--tool-bg); border-color: var(--tool-color); }
  .cluster.tool h3 { color: var(--tool-color); }
  .cluster.object { background: var(--object-bg); border-color: var(--object-color); }
  .cluster.object h3 { color: var(--object-color); }
  .cluster.music { background: var(--music-bg); border-color: var(--music-color); }
  .cluster.music h3 { color: var(--music-color); }
  .cluster.other { background: var(--other-bg); border-color: var(--other-color); }
  .cluster.other h3 { color: var(--other-color); }

  .zeug-item {
    display: flex;
    flex-direction: column;
    padding: 0.4rem 0;
    border-bottom: 1px solid var(--border);
  }
  .zeug-item:last-child { border-bottom: none; }

  .zeug-compound {
    font-weight: 700;
    font-size: 0.9rem;
  }
  .zeug-parts {
    font-size: 0.72rem;
    color: var(--muted);
    font-style: italic;
  }
  .zeug-en {
    font-size: 0.75rem;
    color: var(--en-color);
    font-weight: 600;
  }

  /* Pattern formula */
  .pattern-box {
    background: var(--center-bg);
    border: 2px solid var(--center-color);
    border-radius: 12px;
    padding: 1rem 1.5rem;
    text-align: center;
    margin-bottom: 1.5rem;
  }
  .pattern-formula {
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--center-color);
    font-family: 'Courier New', monospace;
  }
  .pattern-desc {
    font-size: 0.82rem;
    color: var(--muted);
    margin-top: 0.3rem;
  }

  /* English contrast box */
  .contrast-box {
    border: 2px dashed var(--border);
    border-radius: 12px;
    padding: 1rem;
  }
  .contrast-box h3 {
    font-size: 0.85rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 0.6rem;
    text-align: center;
  }
  .contrast-row {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 0.3rem;
    align-items: center;
    font-size: 0.82rem;
    padding: 0.25rem 0;
    border-bottom: 1px solid var(--border);
  }
  .contrast-row:last-child { border-bottom: none; }
  .contrast-de {
    font-weight: 600;
    color: var(--center-color);
    text-align: right;
  }
  .contrast-arrow { color: var(--muted); text-align: center; }
  .contrast-en {
    font-weight: 600;
    color: var(--en-color);
  }
  .no-shared {
    font-size: 0.72rem;
    color: var(--muted);
    text-align: center;
    margin-top: 0.5rem;
    font-style: italic;
  }

  /* Etymology note */
  .ety-note {
    margin-top: 1rem;
    padding: 0.8rem 1rem;
    border-radius: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    font-size: 0.78rem;
    color: var(--muted);
    text-align: center;
  }
  .ety-note strong { color: var(--fg); }

  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid var(--border);
  }
  figcaption strong { display: block; font-size: 1.05rem; margin-bottom: 0.4rem; }
  figcaption span { font-size: 0.88rem; color: var(--muted); line-height: 1.5; }

  @media (max-width: 700px) {
    figure { padding: 1.2rem; }
    .cluster-grid { grid-template-columns: 1fr 1fr; }
    .center-node { width: 100px; height: 100px; }
    .center-node .zeug-word { font-size: 1.2rem; }
    .contrast-row { grid-template-columns: 1fr; gap: 0.1rem; text-align: left !important; }
    .contrast-de, .contrast-en { text-align: left; }
    .contrast-arrow { display: none; }
  }
  @media (max-width: 450px) {
    .cluster-grid { grid-template-columns: 1fr; }
  }
  @media print {
    body { background: #fff; }
    figure { box-shadow: none; border: 1px solid #ccc; }
  }
</style>
</head>
<body>
<figure>
  <h2>The -Zeug Semantic Family Tree</h2>
  <p class="subtitle">One morpheme -- "Zeug" (thing/stuff/device) -- generates an entire vocabulary family. Learn the root, unlock the network.</p>

  <!-- Center hub -->
  <div class="center-node">
    <span class="zeug-word">-ZEUG</span>
    <span class="zeug-meaning">thing / stuff /<br>device / gear</span>
  </div>

  <!-- Pattern formula -->
  <div class="pattern-box">
    <div class="pattern-formula">[Activity / Descriptor] + Zeug = "thing/device/stuff for [X]"</div>
    <div class="pattern-desc">Productive and transparent -- speakers can coin new -zeug compounds on the fly</div>
  </div>

  <!-- Category clusters -->
  <div class="cluster-grid">
    <div class="cluster transport">
      <h3>Transportation</h3>
      <div class="zeug-item">
        <span class="zeug-compound">Fahrzeug</span>
        <span class="zeug-parts">fahr (drive) + Zeug</span>
        <span class="zeug-en">= vehicle</span>
      </div>
      <div class="zeug-item">
        <span class="zeug-compound">Flugzeug</span>
        <span class="zeug-parts">flug (flight) + Zeug</span>
        <span class="zeug-en">= airplane</span>
      </div>
      <div class="zeug-item">
        <span class="zeug-compound">Wasserfahrzeug</span>
        <span class="zeug-parts">wasser (water) + fahr + Zeug</span>
        <span class="zeug-en">= watercraft</span>
      </div>
    </div>

    <div class="cluster tool">
      <h3>Tools &amp; Kits</h3>
      <div class="zeug-item">
        <span class="zeug-compound">Werkzeug</span>
        <span class="zeug-parts">werk (work) + Zeug</span>
        <span class="zeug-en">= tool</span>
      </div>
      <div class="zeug-item">
        <span class="zeug-compound">Naehzeug</span>
        <span class="zeug-parts">naeh (sew) + Zeug</span>
        <span class="zeug-en">= sewing kit</span>
      </div>
      <div class="zeug-item">
        <span class="zeug-compound">Schreibzeug</span>
        <span class="zeug-parts">schreib (write) + Zeug</span>
        <span class="zeug-en">= writing supplies</span>
      </div>
    </div>

    <div class="cluster object">
      <h3>Everyday Objects</h3>
      <div class="zeug-item">
        <span class="zeug-compound">Spielzeug</span>
        <span class="zeug-parts">spiel (play) + Zeug</span>
        <span class="zeug-en">= toy</span>
      </div>
      <div class="zeug-item">
        <span class="zeug-compound">Feuerzeug</span>
        <span class="zeug-parts">feuer (fire) + Zeug</span>
        <span class="zeug-en">= lighter</span>
      </div>
      <div class="zeug-item">
        <span class="zeug-compound">Bettzeug</span>
        <span class="zeug-parts">bett (bed) + Zeug</span>
        <span class="zeug-en">= bedding</span>
      </div>
    </div>

    <div class="cluster music">
      <h3>Music</h3>
      <div class="zeug-item">
        <span class="zeug-compound">Schlagzeug</span>
        <span class="zeug-parts">schlag (hit/beat) + Zeug</span>
        <span class="zeug-en">= drum kit</span>
      </div>
    </div>

    <div class="cluster other">
      <h3>Food &amp; Abstract</h3>
      <div class="zeug-item">
        <span class="zeug-compound">Gruenzeug</span>
        <span class="zeug-parts">gruen (green) + Zeug</span>
        <span class="zeug-en">= vegetables (colloquial)</span>
      </div>
      <div class="zeug-item">
        <span class="zeug-compound">Ruestzeug</span>
        <span class="zeug-parts">ruest (equip) + Zeug</span>
        <span class="zeug-en">= equipment / qualifications</span>
      </div>
      <div class="zeug-item">
        <span class="zeug-compound">Zaumzeug</span>
        <span class="zeug-parts">zaum (bridle) + Zeug</span>
        <span class="zeug-en">= harness</span>
      </div>
    </div>

    <div class="cluster" style="border-color:var(--border); background:var(--surface);">
      <h3 style="color:var(--muted);">Novel / Ad-Hoc</h3>
      <div class="zeug-item">
        <span class="zeug-compound">Putzzeug</span>
        <span class="zeug-parts">putz (clean) + Zeug</span>
        <span class="zeug-en">= cleaning stuff</span>
      </div>
      <div class="zeug-item">
        <span class="zeug-compound">Angelzeug</span>
        <span class="zeug-parts">angel (fish) + Zeug</span>
        <span class="zeug-en">= fishing gear</span>
      </div>
      <div class="zeug-item" style="font-size:0.72rem; color:var(--muted); font-style:italic; padding-top:0.3rem;">
        Any speaker can coin new -zeug words and be understood instantly.
      </div>
    </div>
  </div>

  <!-- English contrast -->
  <div class="contrast-box">
    <h3>English Equivalents -- No Shared Morpheme</h3>
    <div class="contrast-row">
      <span class="contrast-de">Fahr-zeug</span>
      <span class="contrast-arrow">&rarr;</span>
      <span class="contrast-en">vehicle</span>
    </div>
    <div class="contrast-row">
      <span class="contrast-de">Flug-zeug</span>
      <span class="contrast-arrow">&rarr;</span>
      <span class="contrast-en">airplane</span>
    </div>
    <div class="contrast-row">
      <span class="contrast-de">Werk-zeug</span>
      <span class="contrast-arrow">&rarr;</span>
      <span class="contrast-en">tool</span>
    </div>
    <div class="contrast-row">
      <span class="contrast-de">Spiel-zeug</span>
      <span class="contrast-arrow">&rarr;</span>
      <span class="contrast-en">toy</span>
    </div>
    <div class="contrast-row">
      <span class="contrast-de">Feuer-zeug</span>
      <span class="contrast-arrow">&rarr;</span>
      <span class="contrast-en">lighter</span>
    </div>
    <div class="contrast-row">
      <span class="contrast-de">Schlag-zeug</span>
      <span class="contrast-arrow">&rarr;</span>
      <span class="contrast-en">drums</span>
    </div>
    <div class="no-shared">English uses six completely unrelated words. German uses one shared morpheme. A learner who knows "-zeug" recognizes the family connection instantly.</div>
  </div>

  <!-- Etymology -->
  <div class="ety-note">
    <strong>Etymology:</strong> Old High German "giziug" &rarr; Middle High German "ziuc" (gear, equipment) &rarr; Modern German "Zeug" (stuff/thing). The meaning generalized from "equipment" to "stuff" and, in compounds, to "device/thing used for X."
  </div>

  <figcaption>
    <strong>Figure 4: The -Zeug Semantic Family Tree</strong>
    <span>The morpheme "Zeug" (thing/stuff/device) generates an entire vocabulary family through transparent composition. Fahrzeug ("drive-thing" = vehicle), Flugzeug ("fly-thing" = airplane), Werkzeug ("work-thing" = tool), Spielzeug ("play-thing" = toy) -- all share a visible kinship. English uses completely unrelated words for the same concepts (vehicle, airplane, tool, toy), erasing the category connection. The -Zeug pattern is productive: speakers can coin new compounds (Putzzeug = "cleaning stuff") and be understood immediately.</span>
  </figcaption>
</figure>
</body>
</html>
