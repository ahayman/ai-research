<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Stress Patterns: Lexical, Compound, Phrasal</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --accent: #4361ee;
    --accent-light: #e8edff;
    --level1: #e63946;
    --level1-bg: #fef3f0;
    --level2: #2d8a4e;
    --level2-bg: #f0faf0;
    --level3: #7c3aed;
    --level3-bg: #f5f0ff;
    --stress-mark: #e63946;
    --unstress: #b0b0c0;
    --muted: #6c757d;
    --caption-bg: #f8f9fa;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --accent: #6b8aff;
      --accent-light: #1e2a4a;
      --level1: #ff6b6b;
      --level1-bg: #2a1520;
      --level2: #5cb87a;
      --level2-bg: #102a18;
      --level3: #a78bfa;
      --level3-bg: #1a1030;
      --stress-mark: #ff6b6b;
      --unstress: #555570;
      --muted: #9a9ab0;
      --caption-bg: #1a1a2e;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure { max-width: 1000px; width: 100%; }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding: 1rem 1.5rem;
    background: var(--caption-bg);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  .chart-wrapper {
    overflow-x: auto;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--surface);
    padding: 1.5rem;
    min-width: 700px;
  }
  .level-section {
    margin-bottom: 2rem;
    padding: 1.2rem;
    border-radius: 10px;
    border-left: 5px solid;
  }
  .level-section:last-child { margin-bottom: 0; }
  .l1 { background: var(--level1-bg); border-color: var(--level1); }
  .l2 { background: var(--level2-bg); border-color: var(--level2); }
  .l3 { background: var(--level3-bg); border-color: var(--level3); }
  .level-header {
    font-size: 1rem;
    font-weight: 700;
    margin-bottom: 0.6rem;
  }
  .l1 .level-header { color: var(--level1); }
  .l2 .level-header { color: var(--level2); }
  .l3 .level-header { color: var(--level3); }
  .level-desc {
    font-size: 0.85rem;
    color: var(--muted);
    margin-bottom: 1rem;
  }
  .stress-examples {
    display: flex;
    flex-wrap: wrap;
    gap: 1rem;
  }
  .stress-word {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.6rem 1rem;
    text-align: center;
    min-width: 140px;
  }
  .stress-word .word {
    font-size: 1.1rem;
    font-weight: 600;
    letter-spacing: 0.02em;
    margin-bottom: 0.2rem;
  }
  .stress-word .ipa {
    font-family: 'Gentium Plus', 'Noto Sans', serif;
    font-size: 0.85rem;
    color: var(--muted);
  }
  .stress-word .label {
    font-size: 0.7rem;
    color: var(--muted);
    margin-top: 0.2rem;
  }
  .stressed { color: var(--stress-mark); font-weight: 800; font-size: 1.3rem !important; }
  .unstressed { color: var(--unstress); }
  .pair-group {
    display: flex;
    gap: 0.5rem;
    align-items: center;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.6rem 1rem;
  }
  .pair-arrow {
    font-size: 1.2rem;
    color: var(--muted);
  }
  .vs-badge {
    display: inline-block;
    background: var(--accent-light);
    color: var(--accent);
    font-size: 0.65rem;
    font-weight: 700;
    padding: 0.1rem 0.4rem;
    border-radius: 4px;
  }
  .sub-label {
    font-size: 0.75rem;
    font-weight: 600;
    margin: 0.5rem 0 0.4rem;
  }
  .l1 .sub-label { color: var(--level1); }
  .pattern-note {
    margin-top: 1rem;
    padding: 0.8rem 1rem;
    background: var(--accent-light);
    border-radius: 8px;
    border-left: 4px solid var(--accent);
    font-size: 0.85rem;
  }
  .pattern-note strong { color: var(--accent); }
</style>
</head>
<body>
<figure>
  <div class="chart-wrapper">
    <!-- Level 1: Lexical Stress -->
    <div class="level-section l1">
      <div class="level-header">Level 1: Lexical (Word) Stress</div>
      <div class="level-desc">The position of primary stress within a word. Follows etymological patterns: Germanic roots favor initial stress; Latinate roots shift stress with suffixation.</div>

      <div class="sub-label">Germanic Pattern -- Initial/Root Stress</div>
      <div class="stress-examples">
        <div class="stress-word">
          <div class="word"><span class="stressed">WA</span><span class="unstressed">ter</span></div>
          <div class="ipa">/&#x2C8;w&#x254;&#x2D0;.t&#x259;/</div>
        </div>
        <div class="stress-word">
          <div class="word"><span class="stressed">FA</span><span class="unstressed">ther</span></div>
          <div class="ipa">/&#x2C8;f&#x251;&#x2D0;.&#x00F0;&#x259;/</div>
        </div>
        <div class="stress-word">
          <div class="word"><span class="stressed">HAP</span><span class="unstressed">py</span></div>
          <div class="ipa">/&#x2C8;h&#xE6;p.i/</div>
        </div>
      </div>

      <div class="sub-label">Latinate Pattern -- Stress Shifts with Suffixes</div>
      <div class="stress-examples">
        <div class="pair-group">
          <div>
            <div class="word"><span class="stressed">NA</span><span class="unstressed">tion</span></div>
            <div class="ipa">/&#x2C8;ne&#x26A;.&#x283;&#x259;n/</div>
          </div>
          <span class="pair-arrow">&rarr;</span>
          <div>
            <div class="word"><span class="unstressed">na</span><span class="stressed">TION</span><span class="unstressed">al</span></div>
            <div class="ipa">/&#x2C8;n&#xE6;&#x283;.&#x259;n.&#x259;l/</div>
          </div>
          <span class="pair-arrow">&rarr;</span>
          <div>
            <div class="word"><span class="unstressed">na</span><span class="unstressed">tion</span><span class="unstressed">al</span><span class="stressed">I</span><span class="unstressed">ty</span></div>
            <div class="ipa">/&#x2CC;n&#xE6;&#x283;.&#x259;&#x2C8;n&#xE6;l.&#x259;.ti/</div>
          </div>
        </div>
      </div>

      <div class="sub-label">Noun-Verb Stress Shift (100+ pairs)</div>
      <div class="stress-examples">
        <div class="pair-group">
          <div>
            <div class="word"><span class="stressed">RE</span><span class="unstressed">cord</span></div>
            <div class="label">noun</div>
          </div>
          <span class="vs-badge">vs</span>
          <div>
            <div class="word"><span class="unstressed">re</span><span class="stressed">CORD</span></div>
            <div class="label">verb</div>
          </div>
        </div>
        <div class="pair-group">
          <div>
            <div class="word"><span class="stressed">PRE</span><span class="unstressed">sent</span></div>
            <div class="label">noun</div>
          </div>
          <span class="vs-badge">vs</span>
          <div>
            <div class="word"><span class="unstressed">pre</span><span class="stressed">SENT</span></div>
            <div class="label">verb</div>
          </div>
        </div>
        <div class="pair-group">
          <div>
            <div class="word"><span class="stressed">CON</span><span class="unstressed">flict</span></div>
            <div class="label">noun</div>
          </div>
          <span class="vs-badge">vs</span>
          <div>
            <div class="word"><span class="unstressed">con</span><span class="stressed">FLICT</span></div>
            <div class="label">verb</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Level 2: Compound Stress -->
    <div class="level-section l2">
      <div class="level-header">Level 2: Compound Stress</div>
      <div class="level-desc">Compound nouns take primary stress on the FIRST element. Adjective+noun phrases stress the SECOND element. Stress alone distinguishes compound from phrase.</div>

      <div class="stress-examples">
        <div class="pair-group">
          <div>
            <div class="word"><span class="stressed">BLACK</span><span class="unstressed">bird</span></div>
            <div class="label">compound = species</div>
          </div>
          <span class="vs-badge">vs</span>
          <div>
            <div class="word"><span class="unstressed">black</span> <span class="stressed">BIRD</span></div>
            <div class="label">phrase = any black bird</div>
          </div>
        </div>
        <div class="pair-group">
          <div>
            <div class="word"><span class="stressed">GREEN</span><span class="unstressed">house</span></div>
            <div class="label">compound = plant structure</div>
          </div>
          <span class="vs-badge">vs</span>
          <div>
            <div class="word"><span class="unstressed">green</span> <span class="stressed">HOUSE</span></div>
            <div class="label">phrase = green-colored house</div>
          </div>
        </div>
        <div class="pair-group">
          <div>
            <div class="word"><span class="stressed">HOT</span> <span class="unstressed">dog</span></div>
            <div class="label">compound = food</div>
          </div>
          <span class="vs-badge">vs</span>
          <div>
            <div class="word"><span class="unstressed">hot</span> <span class="stressed">DOG</span></div>
            <div class="label">phrase = overheated canine</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Level 3: Phrasal/Sentence Stress -->
    <div class="level-section l3">
      <div class="level-header">Level 3: Phrasal (Sentence) Stress</div>
      <div class="level-desc">In neutral declaratives, the nuclear (main) stress falls on the last content word. Contrastive focus can shift this placement to highlight specific information.</div>

      <div class="stress-examples" style="flex-direction: column; gap: 0.6rem;">
        <div class="stress-word" style="min-width: 100%; text-align: left;">
          <div class="word"><span class="unstressed">She gave the book to</span> <span class="stressed">JOHN</span><span class="unstressed">.</span></div>
          <div class="label">Neutral: nuclear stress on last content word</div>
        </div>
        <div class="stress-word" style="min-width: 100%; text-align: left;">
          <div class="word"><span class="stressed">SHE</span> <span class="unstressed">gave the book to John.</span></div>
          <div class="label">Contrastive: WHO gave it? SHE did (not someone else)</div>
        </div>
        <div class="stress-word" style="min-width: 100%; text-align: left;">
          <div class="word"><span class="unstressed">She</span> <span class="stressed">GAVE</span> <span class="unstressed">the book to John.</span></div>
          <div class="label">Contrastive: She GAVE it (didn't lend it)</div>
        </div>
        <div class="stress-word" style="min-width: 100%; text-align: left;">
          <div class="word"><span class="unstressed">She gave the</span> <span class="stressed">BOOK</span> <span class="unstressed">to John.</span></div>
          <div class="label">Contrastive: She gave the BOOK (not the pen)</div>
        </div>
      </div>
    </div>
  </div>

  <div class="pattern-note">
    <strong>Pattern:</strong> English stress operates as a three-level hierarchy. Each level does different grammatical work: lexical stress marks word identity and part of speech; compound stress distinguishes compounds from phrases; phrasal stress manages information flow. Stress in English does the work that tone does in tonal languages -- it is a primary carrier of both grammatical and pragmatic meaning.
  </div>

  <figcaption>
    <h2>Figure 3 &mdash; English Stress Patterns: Three Levels</h2>
    <p>Level 1 (lexical): stress position within words follows Germanic vs. Latinate patterns, with 100+ noun-verb pairs distinguished solely by stress. Level 2 (compound): first-element stress marks compound nouns vs. last-element stress for phrases. Level 3 (phrasal): nuclear accent defaults to last content word but shifts for contrastive focus.</p>
  </figcaption>
</figure>
</body>
</html>
