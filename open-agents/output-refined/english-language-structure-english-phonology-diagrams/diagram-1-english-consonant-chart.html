<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Consonant Chart (24 Phonemes)</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --accent: #4361ee;
    --accent-light: #e8edff;
    --highlight: #ff6b35;
    --highlight-bg: #fff3ec;
    --muted: #6c757d;
    --voiceless-bg: #eef2ff;
    --voiced-bg: #fef3f0;
    --voiceless-color: #4361ee;
    --voiced-color: #e63946;
    --rare-bg: #fdf6ec;
    --rare-border: #e9a820;
    --caption-bg: #f8f9fa;
    --unpaired-bg: #f0faf0;
    --unpaired-color: #2d8a4e;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --accent: #6b8aff;
      --accent-light: #1e2a4a;
      --highlight: #ff8c5a;
      --highlight-bg: #2a1a10;
      --muted: #9a9ab0;
      --voiceless-bg: #1a2040;
      --voiced-bg: #2a1520;
      --voiceless-color: #6b8aff;
      --voiced-color: #ff6b6b;
      --rare-bg: #2a2210;
      --rare-border: #c49020;
      --caption-bg: #1a1a2e;
      --unpaired-bg: #102a18;
      --unpaired-color: #5cb87a;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure { max-width: 1100px; width: 100%; }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding: 1rem 1.5rem;
    background: var(--caption-bg);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  .chart-wrapper {
    overflow-x: auto;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--surface);
  }
  table {
    width: 100%;
    min-width: 800px;
    border-collapse: collapse;
    font-size: 0.9rem;
  }
  th, td {
    border: 1px solid var(--border);
    padding: 0.5rem 0.3rem;
    text-align: center;
    vertical-align: middle;
  }
  th {
    background: var(--accent-light);
    color: var(--accent);
    font-weight: 600;
    font-size: 0.82rem;
  }
  th.manner {
    text-align: right;
    padding-right: 0.8rem;
    width: 110px;
    min-width: 110px;
  }
  .pair-cell {
    display: flex;
    justify-content: center;
    gap: 0.6rem;
    align-items: center;
  }
  .phoneme {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 36px;
    height: 36px;
    border-radius: 6px;
    font-family: 'Gentium Plus', 'Noto Sans', 'DejaVu Sans', serif;
    font-size: 1.15rem;
    font-weight: 600;
    transition: transform 0.15s;
  }
  .phoneme:hover { transform: scale(1.15); }
  .vl {
    background: var(--voiceless-bg);
    color: var(--voiceless-color);
    border: 1.5px solid var(--voiceless-color);
  }
  .vd {
    background: var(--voiced-bg);
    color: var(--voiced-color);
    border: 1.5px solid var(--voiced-color);
  }
  .unpaired {
    background: var(--unpaired-bg);
    color: var(--unpaired-color);
    border: 1.5px solid var(--unpaired-color);
  }
  .rare-cell {
    background: var(--rare-bg);
    border-color: var(--rare-border);
  }
  .rare-badge {
    display: block;
    font-size: 0.6rem;
    color: var(--rare-border);
    margin-top: 0.2rem;
    font-weight: 600;
    letter-spacing: 0.02em;
  }
  .empty-cell { background: var(--surface); color: var(--muted); font-size: 0.75rem; }
  .example {
    display: block;
    font-size: 0.6rem;
    color: var(--muted);
    margin-top: 0.1rem;
    font-style: italic;
  }
  .legend {
    display: flex;
    gap: 1.5rem;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 1rem;
    font-size: 0.82rem;
    color: var(--muted);
  }
  .legend-item { display: flex; align-items: center; gap: 0.4rem; }
  .legend-swatch {
    width: 14px; height: 14px;
    border-radius: 3px;
    border: 1.5px solid;
  }
  .pattern-note {
    margin-top: 1rem;
    padding: 0.8rem 1rem;
    background: var(--accent-light);
    border-radius: 8px;
    border-left: 4px solid var(--accent);
    font-size: 0.85rem;
    color: var(--fg);
  }
  .pattern-note strong { color: var(--accent); }
</style>
</head>
<body>
<figure>
  <div class="chart-wrapper">
    <table>
      <thead>
        <tr>
          <th class="manner"></th>
          <th>Bilabial</th>
          <th>Labio-dental</th>
          <th>Dental</th>
          <th>Alveolar</th>
          <th>Post-alveolar</th>
          <th>Palatal</th>
          <th>Velar</th>
          <th>Glottal</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <th class="manner">Plosive</th>
          <td>
            <div class="pair-cell">
              <span class="phoneme vl" title="voiceless bilabial plosive: 'pin'">p</span>
              <span class="phoneme vd" title="voiced bilabial plosive: 'bin'">b</span>
            </div>
            <span class="example">pin / bin</span>
          </td>
          <td class="empty-cell">&mdash;</td>
          <td class="empty-cell">&mdash;</td>
          <td>
            <div class="pair-cell">
              <span class="phoneme vl" title="voiceless alveolar plosive: 'tin'">t</span>
              <span class="phoneme vd" title="voiced alveolar plosive: 'din'">d</span>
            </div>
            <span class="example">tin / din</span>
          </td>
          <td class="empty-cell">&mdash;</td>
          <td class="empty-cell">&mdash;</td>
          <td>
            <div class="pair-cell">
              <span class="phoneme vl" title="voiceless velar plosive: 'cap'">k</span>
              <span class="phoneme vd" title="voiced velar plosive: 'gap'">&nbsp;&#x261;&nbsp;</span>
            </div>
            <span class="example">cap / gap</span>
          </td>
          <td class="empty-cell">&mdash;</td>
        </tr>
        <tr>
          <th class="manner">Fricative</th>
          <td class="empty-cell">&mdash;</td>
          <td>
            <div class="pair-cell">
              <span class="phoneme vl" title="voiceless labiodental fricative: 'fan'">f</span>
              <span class="phoneme vd" title="voiced labiodental fricative: 'van'">v</span>
            </div>
            <span class="example">fan / van</span>
          </td>
          <td class="rare-cell">
            <div class="pair-cell">
              <span class="phoneme vl" title="voiceless dental fricative: 'thin'">&theta;</span>
              <span class="phoneme vd" title="voiced dental fricative: 'then'">&eth;</span>
            </div>
            <span class="example">thin / then</span>
            <span class="rare-badge">&lt;10% of languages</span>
          </td>
          <td>
            <div class="pair-cell">
              <span class="phoneme vl" title="voiceless alveolar fricative: 'sip'">s</span>
              <span class="phoneme vd" title="voiced alveolar fricative: 'zip'">z</span>
            </div>
            <span class="example">sip / zip</span>
          </td>
          <td>
            <div class="pair-cell">
              <span class="phoneme vl" title="voiceless post-alveolar fricative: 'ship'">&#x283;</span>
              <span class="phoneme vd" title="voiced post-alveolar fricative: 'measure'">&#x292;</span>
            </div>
            <span class="example">ship / measure</span>
          </td>
          <td class="empty-cell">&mdash;</td>
          <td class="empty-cell">&mdash;</td>
          <td>
            <div class="pair-cell">
              <span class="phoneme vl" title="voiceless glottal fricative: 'hat'">h</span>
            </div>
            <span class="example">hat</span>
          </td>
        </tr>
        <tr>
          <th class="manner">Affricate</th>
          <td class="empty-cell">&mdash;</td>
          <td class="empty-cell">&mdash;</td>
          <td class="empty-cell">&mdash;</td>
          <td class="empty-cell">&mdash;</td>
          <td>
            <div class="pair-cell">
              <span class="phoneme vl" title="voiceless post-alveolar affricate: 'church'">t&#x283;</span>
              <span class="phoneme vd" title="voiced post-alveolar affricate: 'judge'">d&#x292;</span>
            </div>
            <span class="example">church / judge</span>
          </td>
          <td class="empty-cell">&mdash;</td>
          <td class="empty-cell">&mdash;</td>
          <td class="empty-cell">&mdash;</td>
        </tr>
        <tr>
          <th class="manner">Nasal</th>
          <td>
            <div class="pair-cell">
              <span class="phoneme unpaired" title="bilabial nasal: 'map'">m</span>
            </div>
            <span class="example">map</span>
          </td>
          <td class="empty-cell">&mdash;</td>
          <td class="empty-cell">&mdash;</td>
          <td>
            <div class="pair-cell">
              <span class="phoneme unpaired" title="alveolar nasal: 'nap'">n</span>
            </div>
            <span class="example">nap</span>
          </td>
          <td class="empty-cell">&mdash;</td>
          <td class="empty-cell">&mdash;</td>
          <td>
            <div class="pair-cell">
              <span class="phoneme unpaired" title="velar nasal: 'ring'">&#x14B;</span>
            </div>
            <span class="example">ring</span>
          </td>
          <td class="empty-cell">&mdash;</td>
        </tr>
        <tr>
          <th class="manner">Lateral</th>
          <td class="empty-cell">&mdash;</td>
          <td class="empty-cell">&mdash;</td>
          <td class="empty-cell">&mdash;</td>
          <td>
            <div class="pair-cell">
              <span class="phoneme unpaired" title="alveolar lateral approximant: 'lip'">l</span>
            </div>
            <span class="example">lip</span>
          </td>
          <td class="empty-cell">&mdash;</td>
          <td class="empty-cell">&mdash;</td>
          <td class="empty-cell">&mdash;</td>
          <td class="empty-cell">&mdash;</td>
        </tr>
        <tr>
          <th class="manner">Approximant</th>
          <td class="empty-cell">&mdash;</td>
          <td class="empty-cell">&mdash;</td>
          <td class="empty-cell">&mdash;</td>
          <td>
            <div class="pair-cell">
              <span class="phoneme unpaired" title="alveolar approximant: 'red'">&#x279;</span>
            </div>
            <span class="example">red</span>
          </td>
          <td class="empty-cell">&mdash;</td>
          <td>
            <div class="pair-cell">
              <span class="phoneme unpaired" title="palatal approximant: 'yes'">j</span>
            </div>
            <span class="example">yes</span>
          </td>
          <td>
            <div class="pair-cell">
              <span class="phoneme unpaired" title="labio-velar approximant: 'wet'">w</span>
            </div>
            <span class="example">wet</span>
          </td>
          <td class="empty-cell">&mdash;</td>
        </tr>
      </tbody>
    </table>
  </div>

  <div class="legend">
    <div class="legend-item">
      <div class="legend-swatch" style="background:var(--voiceless-bg);border-color:var(--voiceless-color);"></div>
      <span>Voiceless (vocal folds open)</span>
    </div>
    <div class="legend-item">
      <div class="legend-swatch" style="background:var(--voiced-bg);border-color:var(--voiced-color);"></div>
      <span>Voiced (vocal folds vibrating)</span>
    </div>
    <div class="legend-item">
      <div class="legend-swatch" style="background:var(--unpaired-bg);border-color:var(--unpaired-color);"></div>
      <span>Unpaired (voiced only)</span>
    </div>
    <div class="legend-item">
      <div class="legend-swatch" style="background:var(--rare-bg);border-color:var(--rare-border);"></div>
      <span>Cross-linguistically rare</span>
    </div>
  </div>

  <div class="pattern-note">
    <strong>Pattern:</strong> English consonants are organized by systematic voicing pairs. Eight pairs of consonants differ <em>only</em> in whether the vocal folds vibrate (/p/-/b/, /t/-/d/, /k/-/g/, /f/-/v/, /&theta;/-/&eth;/, /s/-/z/, /&#x283;/-/&#x292;/, /t&#x283;/-/d&#x292;/). The remaining 8 consonants (/m/, /n/, /&#x14B;/, /l/, /&#x279;/, /j/, /w/, /h/) are unpaired. This 16 + 8 = 24 structure is the consonant system's skeleton.
  </div>

  <figcaption>
    <h2>Figure 1 &mdash; English Consonant Inventory (24 Phonemes)</h2>
    <p>Rows represent manner of articulation (how airflow is shaped); columns represent place of articulation (where in the vocal tract the constriction occurs). Eight voicing pairs produce 16 consonants; eight unpaired consonants complete the system. Dental fricatives /&theta;/ and /&eth;/ are highlighted as cross-linguistically rare, found in fewer than 10% of the world's languages.</p>
  </figcaption>
</figure>
</body>
</html>
