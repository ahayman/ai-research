<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Syllable Structure (Onset-Nucleus-Coda)</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --accent: #4361ee;
    --accent-light: #e8edff;
    --onset-color: #2d8a4e;
    --onset-bg: #f0faf0;
    --nucleus-color: #e63946;
    --nucleus-bg: #fef3f0;
    --coda-color: #7c3aed;
    --coda-bg: #f5f0ff;
    --special-color: #e9a820;
    --special-bg: #fdf6ec;
    --muted: #6c757d;
    --caption-bg: #f8f9fa;
    --tree-line: #aab0c0;
    --sonority-high: #e63946;
    --sonority-low: #4361ee;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --accent: #6b8aff;
      --accent-light: #1e2a4a;
      --onset-color: #5cb87a;
      --onset-bg: #102a18;
      --nucleus-color: #ff6b6b;
      --nucleus-bg: #2a1520;
      --coda-color: #a78bfa;
      --coda-bg: #1a1030;
      --special-color: #f0c050;
      --special-bg: #2a2210;
      --muted: #9a9ab0;
      --caption-bg: #1a1a2e;
      --tree-line: #555570;
      --sonority-high: #ff6b6b;
      --sonority-low: #6b8aff;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure { max-width: 1000px; width: 100%; }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding: 1rem 1.5rem;
    background: var(--caption-bg);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  .chart-wrapper {
    overflow-x: auto;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--surface);
    padding: 1.5rem;
    min-width: 750px;
  }
  .section-title {
    font-size: 1rem;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 0.8rem;
    padding-bottom: 0.3rem;
    border-bottom: 2px solid var(--accent);
  }
  .template-display {
    text-align: center;
    margin: 1rem 0 1.5rem;
    padding: 1rem;
    background: var(--accent-light);
    border-radius: 10px;
    border: 2px solid var(--accent);
  }
  .template-formula {
    font-size: 1.5rem;
    font-weight: 700;
    font-family: 'Courier New', monospace;
    letter-spacing: 0.05em;
  }
  .template-formula .onset { color: var(--onset-color); }
  .template-formula .nucleus { color: var(--nucleus-color); }
  .template-formula .coda { color: var(--coda-color); }
  .template-formula .optional { opacity: 0.5; }
  .template-desc {
    font-size: 0.85rem;
    color: var(--muted);
    margin-top: 0.4rem;
  }
  svg text { font-family: 'Segoe UI', system-ui, sans-serif; }
  .tree-section {
    margin: 1.5rem 0;
  }
  .constraints-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 1rem;
    margin: 1rem 0;
  }
  .constraint-card {
    padding: 0.8rem;
    border-radius: 8px;
    border: 1px solid;
  }
  .onset-card { background: var(--onset-bg); border-color: var(--onset-color); }
  .nucleus-card { background: var(--nucleus-bg); border-color: var(--nucleus-color); }
  .coda-card { background: var(--coda-bg); border-color: var(--coda-color); }
  .constraint-title {
    font-weight: 700;
    font-size: 0.9rem;
    margin-bottom: 0.4rem;
  }
  .onset-card .constraint-title { color: var(--onset-color); }
  .nucleus-card .constraint-title { color: var(--nucleus-color); }
  .coda-card .constraint-title { color: var(--coda-color); }
  .constraint-list {
    font-size: 0.8rem;
    padding-left: 1rem;
    color: var(--fg);
  }
  .constraint-list li { margin-bottom: 0.3rem; }
  .examples-row {
    display: flex;
    flex-wrap: wrap;
    gap: 0.8rem;
    margin: 1rem 0;
  }
  .example-chip {
    padding: 0.4rem 0.8rem;
    border-radius: 6px;
    font-size: 0.85rem;
    border: 1px solid var(--border);
    background: var(--surface);
  }
  .example-chip .word { font-weight: 600; }
  .example-chip .structure {
    font-family: monospace;
    font-size: 0.75rem;
    color: var(--muted);
    margin-left: 0.3rem;
  }
  .example-chip .onset-part { color: var(--onset-color); font-weight: 600; }
  .example-chip .nucleus-part { color: var(--nucleus-color); font-weight: 600; }
  .example-chip .coda-part { color: var(--coda-color); font-weight: 600; }
  .special-note {
    padding: 0.8rem 1rem;
    background: var(--special-bg);
    border-radius: 8px;
    border-left: 4px solid var(--special-color);
    font-size: 0.85rem;
    margin: 1rem 0;
  }
  .special-note strong { color: var(--special-color); }
  .sonority-section {
    margin-top: 1.5rem;
  }
  .sonority-scale {
    display: flex;
    align-items: center;
    gap: 0;
    margin: 0.8rem 0;
  }
  .sonority-level {
    flex: 1;
    text-align: center;
    padding: 0.5rem 0.3rem;
    font-size: 0.78rem;
    font-weight: 600;
    border: 1px solid var(--border);
  }
  .sonority-level:first-child { border-radius: 6px 0 0 6px; }
  .sonority-level:last-child { border-radius: 0 6px 6px 0; }
  .s-1 { background: #eef2ff; color: var(--sonority-low); }
  .s-2 { background: #e8eeff; color: #4a5acc; }
  .s-3 { background: #f0e8ff; color: #6a4acc; }
  .s-4 { background: #ffe8ee; color: #cc4a6a; }
  .s-5 { background: #ffe8e0; color: #cc5a3a; }
  .s-6 { background: #fef3f0; color: var(--sonority-high); }
  @media (prefers-color-scheme: dark) {
    .s-1 { background: #151530; }
    .s-2 { background: #1a1540; }
    .s-3 { background: #201540; }
    .s-4 { background: #2a1525; }
    .s-5 { background: #2a1a15; }
    .s-6 { background: #2a1520; }
  }
  .pattern-note {
    margin-top: 1rem;
    padding: 0.8rem 1rem;
    background: var(--accent-light);
    border-radius: 8px;
    border-left: 4px solid var(--accent);
    font-size: 0.85rem;
  }
  .pattern-note strong { color: var(--accent); }
</style>
</head>
<body>
<figure>
  <div class="chart-wrapper">
    <!-- Template Formula -->
    <div class="section-title">Maximum Syllable Template</div>
    <div class="template-display">
      <div class="template-formula">
        <span class="optional">(</span><span class="onset">C</span><span class="optional">)</span><span class="optional">(</span><span class="onset">C</span><span class="optional">)</span><span class="optional">(</span><span class="onset">C</span><span class="optional">)</span><span class="nucleus">V</span><span class="optional">(</span><span class="coda">C</span><span class="optional">)</span><span class="optional">(</span><span class="coda">C</span><span class="optional">)</span><span class="optional">(</span><span class="coda">C</span><span class="optional">)</span><span class="optional">(</span><span class="coda">C</span><span class="optional">)</span>
      </div>
      <div class="template-desc">Up to 3 consonants in onset + 1 vowel nucleus + up to 4 consonants in coda</div>
    </div>

    <!-- Tree Diagram via SVG -->
    <div class="section-title">Syllable Tree: "strengths" /str&#x025B;&#x014B;k&theta;s/</div>
    <div class="tree-section">
      <svg viewBox="0 0 700 260" xmlns="http://www.w3.org/2000/svg" style="max-width: 700px; margin: 0 auto; display: block;">
        <!-- Syllable node -->
        <text x="350" y="20" text-anchor="middle" font-weight="700" font-size="14" fill="var(--accent)">&#x03C3; (Syllable)</text>

        <!-- Onset, Rhyme branches -->
        <line x1="350" y1="25" x2="160" y2="60" stroke="var(--tree-line)" stroke-width="1.5"/>
        <line x1="350" y1="25" x2="460" y2="60" stroke="var(--tree-line)" stroke-width="1.5"/>

        <text x="160" y="75" text-anchor="middle" font-weight="700" font-size="13" fill="var(--onset-color)">Onset</text>
        <text x="460" y="75" text-anchor="middle" font-weight="700" font-size="13" fill="var(--accent)">Rhyme</text>

        <!-- Onset branches to s, t, r -->
        <line x1="160" y1="80" x2="80" y2="120" stroke="var(--tree-line)" stroke-width="1.5"/>
        <line x1="160" y1="80" x2="160" y2="120" stroke="var(--tree-line)" stroke-width="1.5"/>
        <line x1="160" y1="80" x2="240" y2="120" stroke="var(--tree-line)" stroke-width="1.5"/>

        <!-- Rhyme branches to Nucleus and Coda -->
        <line x1="460" y1="80" x2="360" y2="120" stroke="var(--tree-line)" stroke-width="1.5"/>
        <line x1="460" y1="80" x2="540" y2="120" stroke="var(--tree-line)" stroke-width="1.5"/>

        <text x="360" y="135" text-anchor="middle" font-weight="700" font-size="13" fill="var(--nucleus-color)">Nucleus</text>
        <text x="540" y="135" text-anchor="middle" font-weight="700" font-size="13" fill="var(--coda-color)">Coda</text>

        <!-- Nucleus branches to vowel -->
        <line x1="360" y1="140" x2="360" y2="175" stroke="var(--tree-line)" stroke-width="1.5"/>

        <!-- Coda branches to 4 consonants -->
        <line x1="540" y1="140" x2="440" y2="175" stroke="var(--tree-line)" stroke-width="1.5"/>
        <line x1="540" y1="140" x2="510" y2="175" stroke="var(--tree-line)" stroke-width="1.5"/>
        <line x1="540" y1="140" x2="580" y2="175" stroke="var(--tree-line)" stroke-width="1.5"/>
        <line x1="540" y1="140" x2="650" y2="175" stroke="var(--tree-line)" stroke-width="1.5"/>

        <!-- Terminal segments -->
        <!-- Onset: s, t, r -->
        <rect x="60" y="118" width="40" height="30" rx="6" fill="var(--onset-bg)" stroke="var(--onset-color)" stroke-width="1.5"/>
        <text x="80" y="138" text-anchor="middle" font-size="15" font-weight="700" fill="var(--onset-color)" font-family="Gentium Plus, serif">s</text>

        <rect x="140" y="118" width="40" height="30" rx="6" fill="var(--onset-bg)" stroke="var(--onset-color)" stroke-width="1.5"/>
        <text x="160" y="138" text-anchor="middle" font-size="15" font-weight="700" fill="var(--onset-color)" font-family="Gentium Plus, serif">t</text>

        <rect x="220" y="118" width="40" height="30" rx="6" fill="var(--onset-bg)" stroke="var(--onset-color)" stroke-width="1.5"/>
        <text x="240" y="138" text-anchor="middle" font-size="15" font-weight="700" fill="var(--onset-color)" font-family="Gentium Plus, serif">r</text>

        <!-- Nucleus: vowel -->
        <rect x="338" y="173" width="44" height="30" rx="6" fill="var(--nucleus-bg)" stroke="var(--nucleus-color)" stroke-width="2"/>
        <text x="360" y="193" text-anchor="middle" font-size="15" font-weight="700" fill="var(--nucleus-color)" font-family="Gentium Plus, serif">&#x025B;</text>

        <!-- Coda: ng, k, th, s -->
        <rect x="418" y="173" width="44" height="30" rx="6" fill="var(--coda-bg)" stroke="var(--coda-color)" stroke-width="1.5"/>
        <text x="440" y="193" text-anchor="middle" font-size="15" font-weight="700" fill="var(--coda-color)" font-family="Gentium Plus, serif">&#x14B;</text>

        <rect x="488" y="173" width="44" height="30" rx="6" fill="var(--coda-bg)" stroke="var(--coda-color)" stroke-width="1.5"/>
        <text x="510" y="193" text-anchor="middle" font-size="15" font-weight="700" fill="var(--coda-color)" font-family="Gentium Plus, serif">k</text>

        <rect x="558" y="173" width="44" height="30" rx="6" fill="var(--coda-bg)" stroke="var(--coda-color)" stroke-width="1.5"/>
        <text x="580" y="193" text-anchor="middle" font-size="15" font-weight="700" fill="var(--coda-color)" font-family="Gentium Plus, serif">&theta;</text>

        <rect x="628" y="173" width="44" height="30" rx="6" fill="var(--coda-bg)" stroke="var(--coda-color)" stroke-width="1.5"/>
        <text x="650" y="193" text-anchor="middle" font-size="15" font-weight="700" fill="var(--coda-color)" font-family="Gentium Plus, serif">s</text>

        <!-- Labels below -->
        <text x="80" y="165" text-anchor="middle" font-size="9" fill="var(--muted)">/s/ + stop</text>
        <text x="80" y="175" text-anchor="middle" font-size="9" fill="var(--special-color)" font-weight="600">extra-syllabic</text>

        <!-- Sonority curve -->
        <text x="350" y="230" text-anchor="middle" font-size="11" fill="var(--muted)" font-weight="600">Sonority Profile</text>
        <polyline points="80,250 160,248 240,240 360,215 440,238 510,248 580,245 650,248" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linejoin="round"/>
        <circle cx="80" cy="250" r="3" fill="var(--onset-color)"/>
        <circle cx="160" cy="248" r="3" fill="var(--onset-color)"/>
        <circle cx="240" cy="240" r="3" fill="var(--onset-color)"/>
        <circle cx="360" cy="215" r="3" fill="var(--nucleus-color)"/>
        <circle cx="440" cy="238" r="3" fill="var(--coda-color)"/>
        <circle cx="510" cy="248" r="3" fill="var(--coda-color)"/>
        <circle cx="580" cy="245" r="3" fill="var(--coda-color)"/>
        <circle cx="650" cy="248" r="3" fill="var(--coda-color)"/>
      </svg>
    </div>

    <div class="special-note">
      <strong>The /s/ exception:</strong> English /s/ systematically violates the Sonority Sequencing Principle in onset clusters. In /str-/, the sonority sequence is fricative &rarr; stop &rarr; liquid (falls, then rises), when it should only rise toward the nucleus. Phonologists treat /s/ as "extrasyllabic" -- an appendix outside normal syllable structure. This is a well-known and deeply studied pattern.
    </div>

    <!-- Constraints -->
    <div class="section-title" style="margin-top: 1.5rem;">Positional Constraints</div>
    <div class="constraints-grid">
      <div class="constraint-card onset-card">
        <div class="constraint-title">Onset (0-3 consonants)</div>
        <ul class="constraint-list">
          <li><strong>1 C:</strong> any except /&#x14B;/</li>
          <li><strong>2 C:</strong> rising sonority: /pl, tr, kw, fl, sm, sn/</li>
          <li><strong>3 C:</strong> must be /s/ + /p,t,k/ + /l,r,w,j/: /str, spl, skr, skw/</li>
        </ul>
      </div>
      <div class="constraint-card nucleus-card">
        <div class="constraint-title">Nucleus (obligatory)</div>
        <ul class="constraint-list">
          <li>Always a vowel or diphthong</li>
          <li>Exception: syllabic consonants /n&#x329;, l&#x329;/ in "button," "bottle"</li>
          <li>Most common nucleus: schwa /&#x259;/</li>
        </ul>
      </div>
      <div class="constraint-card coda-card">
        <div class="constraint-title">Coda (0-4 consonants)</div>
        <ul class="constraint-list">
          <li>More permissive than onset</li>
          <li>Complex codas often morphological: "sixths" /s&#x26A;ks&theta;s/</li>
          <li>Falling sonority toward margins</li>
        </ul>
      </div>
    </div>

    <!-- Example syllables -->
    <div class="section-title" style="margin-top: 1rem;">Example Syllable Structures</div>
    <div class="examples-row">
      <div class="example-chip"><span class="word">a</span> <span class="structure"><span class="nucleus-part">V</span></span></div>
      <div class="example-chip"><span class="word">at</span> <span class="structure"><span class="nucleus-part">V</span><span class="coda-part">C</span></span></div>
      <div class="example-chip"><span class="word">cat</span> <span class="structure"><span class="onset-part">C</span><span class="nucleus-part">V</span><span class="coda-part">C</span></span></div>
      <div class="example-chip"><span class="word">stop</span> <span class="structure"><span class="onset-part">CC</span><span class="nucleus-part">V</span><span class="coda-part">C</span></span></div>
      <div class="example-chip"><span class="word">strap</span> <span class="structure"><span class="onset-part">CCC</span><span class="nucleus-part">V</span><span class="coda-part">C</span></span></div>
      <div class="example-chip"><span class="word">next</span> <span class="structure"><span class="onset-part">C</span><span class="nucleus-part">V</span><span class="coda-part">CCC</span></span></div>
      <div class="example-chip"><span class="word">strengths</span> <span class="structure"><span class="onset-part">CCC</span><span class="nucleus-part">V</span><span class="coda-part">CCCC</span></span></div>
    </div>

    <!-- Sonority Hierarchy -->
    <div class="sonority-section">
      <div class="section-title">The Sonority Hierarchy</div>
      <div class="sonority-scale">
        <div class="sonority-level s-1">Stops<br><small>/p t k b d g/</small><br><strong>1 (least)</strong></div>
        <div class="sonority-level s-2">Fricatives<br><small>/f s &#x283; h .../</small><br><strong>2</strong></div>
        <div class="sonority-level s-3">Nasals<br><small>/m n &#x14B;/</small><br><strong>3</strong></div>
        <div class="sonority-level s-4">Liquids<br><small>/l r/</small><br><strong>4</strong></div>
        <div class="sonority-level s-5">Glides<br><small>/j w/</small><br><strong>5</strong></div>
        <div class="sonority-level s-6">Vowels<br><small>/a e i o u/</small><br><strong>6 (most)</strong></div>
      </div>
      <div style="font-size:0.82rem; color:var(--muted); margin-top:0.4rem; text-align:center;">
        Sonority must <strong>rise</strong> from onset to nucleus and <strong>fall</strong> from nucleus to coda &mdash; the Sonority Sequencing Principle (SSP)
      </div>
    </div>
  </div>

  <div class="pattern-note">
    <strong>Pattern:</strong> English syllable structure follows the Sonority Sequencing Principle -- sonority rises from the margins to the peak (nucleus). This is why "blick" could be an English word (rising sonority: stop &rarr; liquid &rarr; vowel) but "bnick" could not (stop &rarr; nasal violates the expected rise). Native speakers unconsciously know which sound combinations are "legal" -- this is phonotactic competence.
  </div>

  <figcaption>
    <h2>Figure 5 &mdash; English Syllable Structure: Onset-Nucleus-Coda</h2>
    <p>English permits one of the most complex syllable structures among world languages, with up to 3 consonants in the onset and 4 in the coda. The tree diagram shows "strengths" (CCCVCCCC) decomposed into constituents. The sonority profile shows the characteristic rise-peak-fall pattern, with /s/ as the systematic exception to the Sonority Sequencing Principle.</p>
  </figcaption>
</figure>
</body>
</html>
