<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Vowel Quadrilateral (RP vs GenAm)</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --accent: #4361ee;
    --accent-light: #e8edff;
    --rp-color: #e63946;
    --rp-bg: #fef3f0;
    --genam-color: #2d8a4e;
    --genam-bg: #f0faf0;
    --shared-color: #7c3aed;
    --diphthong-color: #e9a820;
    --muted: #6c757d;
    --caption-bg: #f8f9fa;
    --grid-color: #e0e4ea;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --accent: #6b8aff;
      --accent-light: #1e2a4a;
      --rp-color: #ff6b6b;
      --rp-bg: #2a1520;
      --genam-color: #5cb87a;
      --genam-bg: #102a18;
      --shared-color: #a78bfa;
      --diphthong-color: #f0c050;
      --muted: #9a9ab0;
      --caption-bg: #1a1a2e;
      --grid-color: #252540;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure { max-width: 1100px; width: 100%; }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding: 1rem 1.5rem;
    background: var(--caption-bg);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  .chart-wrapper {
    overflow-x: auto;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--surface);
    padding: 1rem;
  }
  .dual-panel {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 2rem;
    min-width: 800px;
  }
  .panel {
    position: relative;
  }
  .panel-title {
    text-align: center;
    font-weight: 700;
    font-size: 1rem;
    margin-bottom: 0.5rem;
  }
  .panel-title.rp { color: var(--rp-color); }
  .panel-title.genam { color: var(--genam-color); }
  .panel-subtitle {
    text-align: center;
    font-size: 0.75rem;
    color: var(--muted);
    margin-bottom: 0.8rem;
  }
  svg text { font-family: 'Gentium Plus', 'Noto Sans', 'DejaVu Sans', serif; }
  .legend {
    display: flex;
    gap: 1.5rem;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 1rem;
    font-size: 0.82rem;
    color: var(--muted);
  }
  .legend-item { display: flex; align-items: center; gap: 0.4rem; }
  .legend-swatch { width: 14px; height: 14px; border-radius: 50%; }
  .diff-table {
    margin-top: 1.2rem;
    width: 100%;
    min-width: 700px;
    border-collapse: collapse;
    font-size: 0.82rem;
  }
  .diff-table th, .diff-table td {
    border: 1px solid var(--border);
    padding: 0.4rem 0.6rem;
    text-align: center;
  }
  .diff-table th {
    background: var(--accent-light);
    color: var(--accent);
    font-weight: 600;
  }
  .diff-table .rp-val { color: var(--rp-color); font-weight: 600; }
  .diff-table .ga-val { color: var(--genam-color); font-weight: 600; }
  .pattern-note {
    margin-top: 1rem;
    padding: 0.8rem 1rem;
    background: var(--accent-light);
    border-radius: 8px;
    border-left: 4px solid var(--accent);
    font-size: 0.85rem;
  }
  .pattern-note strong { color: var(--accent); }
</style>
</head>
<body>
<figure>
  <div class="chart-wrapper">
    <div class="dual-panel">
      <!-- RP Panel -->
      <div class="panel">
        <div class="panel-title rp">Received Pronunciation (RP)</div>
        <div class="panel-subtitle">~20 vowel phonemes (12 monophthongs + 8 diphthongs)</div>
        <svg viewBox="0 0 420 340" xmlns="http://www.w3.org/2000/svg">
          <!-- Trapezoid outline -->
          <polygon points="80,30 340,30 380,290 40,290" fill="none" stroke="var(--grid-color)" stroke-width="1.5"/>
          <line x1="120" y1="115" x2="360" y2="115" stroke="var(--grid-color)" stroke-width="0.5" stroke-dasharray="4"/>
          <line x1="160" y1="200" x2="375" y2="200" stroke="var(--grid-color)" stroke-width="0.5" stroke-dasharray="4"/>
          <!-- Axis labels -->
          <text x="210" y="18" text-anchor="middle" fill="var(--muted)" font-size="10" font-family="Segoe UI,sans-serif">Front</text>
          <text x="370" y="18" text-anchor="middle" fill="var(--muted)" font-size="10" font-family="Segoe UI,sans-serif">Back</text>
          <text x="20" y="30" fill="var(--muted)" font-size="10" font-family="Segoe UI,sans-serif">Close</text>
          <text x="20" y="290" fill="var(--muted)" font-size="10" font-family="Segoe UI,sans-serif">Open</text>

          <!-- Short (lax) monophthongs - filled circles -->
          <circle cx="110" cy="65" r="18" fill="var(--rp-bg)" stroke="var(--rp-color)" stroke-width="2"/>
          <text x="110" y="70" text-anchor="middle" fill="var(--rp-color)" font-size="14" font-weight="bold">&#x26A;</text>
          <text x="110" y="85" text-anchor="middle" fill="var(--muted)" font-size="8" font-family="Segoe UI,sans-serif">KIT</text>

          <circle cx="130" cy="140" r="18" fill="var(--rp-bg)" stroke="var(--rp-color)" stroke-width="2"/>
          <text x="130" y="145" text-anchor="middle" fill="var(--rp-color)" font-size="14" font-weight="bold">e</text>
          <text x="130" y="160" text-anchor="middle" fill="var(--muted)" font-size="8" font-family="Segoe UI,sans-serif">DRESS</text>

          <circle cx="150" cy="240" r="18" fill="var(--rp-bg)" stroke="var(--rp-color)" stroke-width="2"/>
          <text x="150" y="245" text-anchor="middle" fill="var(--rp-color)" font-size="14" font-weight="bold">&#xE6;</text>
          <text x="150" y="260" text-anchor="middle" fill="var(--muted)" font-size="8" font-family="Segoe UI,sans-serif">TRAP</text>

          <circle cx="250" cy="180" r="18" fill="var(--rp-bg)" stroke="var(--rp-color)" stroke-width="2"/>
          <text x="250" y="185" text-anchor="middle" fill="var(--rp-color)" font-size="14" font-weight="bold">&#x28C;</text>
          <text x="250" y="200" text-anchor="middle" fill="var(--muted)" font-size="8" font-family="Segoe UI,sans-serif">STRUT</text>

          <circle cx="340" cy="240" r="18" fill="var(--rp-bg)" stroke="var(--rp-color)" stroke-width="2"/>
          <text x="340" y="245" text-anchor="middle" fill="var(--rp-color)" font-size="14" font-weight="bold">&#x252;</text>
          <text x="340" y="260" text-anchor="middle" fill="var(--muted)" font-size="8" font-family="Segoe UI,sans-serif">LOT</text>

          <circle cx="330" cy="65" r="18" fill="var(--rp-bg)" stroke="var(--rp-color)" stroke-width="2"/>
          <text x="330" y="70" text-anchor="middle" fill="var(--rp-color)" font-size="14" font-weight="bold">&#x28A;</text>
          <text x="330" y="85" text-anchor="middle" fill="var(--muted)" font-size="8" font-family="Segoe UI,sans-serif">FOOT</text>

          <circle cx="225" cy="120" r="16" fill="var(--rp-bg)" stroke="var(--rp-color)" stroke-width="1.5" stroke-dasharray="3"/>
          <text x="225" y="125" text-anchor="middle" fill="var(--rp-color)" font-size="13">&#x259;</text>
          <text x="225" y="138" text-anchor="middle" fill="var(--muted)" font-size="8" font-family="Segoe UI,sans-serif">schwa</text>

          <!-- Long (tense) monophthongs - larger circles -->
          <circle cx="85" cy="40" r="18" fill="none" stroke="var(--rp-color)" stroke-width="2.5"/>
          <text x="85" y="45" text-anchor="middle" fill="var(--rp-color)" font-size="13" font-weight="bold">i&#x2D0;</text>
          <text x="60" y="38" text-anchor="middle" fill="var(--muted)" font-size="8" font-family="Segoe UI,sans-serif">FLEECE</text>

          <circle cx="350" cy="40" r="18" fill="none" stroke="var(--rp-color)" stroke-width="2.5"/>
          <text x="350" y="45" text-anchor="middle" fill="var(--rp-color)" font-size="13" font-weight="bold">u&#x2D0;</text>
          <text x="375" y="38" text-anchor="middle" fill="var(--muted)" font-size="8" font-family="Segoe UI,sans-serif">GOOSE</text>

          <circle cx="310" cy="280" r="18" fill="none" stroke="var(--rp-color)" stroke-width="2.5"/>
          <text x="310" y="285" text-anchor="middle" fill="var(--rp-color)" font-size="13" font-weight="bold">&#x251;&#x2D0;</text>
          <text x="310" y="300" text-anchor="middle" fill="var(--muted)" font-size="8" font-family="Segoe UI,sans-serif">BATH</text>

          <circle cx="360" cy="180" r="18" fill="none" stroke="var(--rp-color)" stroke-width="2.5"/>
          <text x="360" y="185" text-anchor="middle" fill="var(--rp-color)" font-size="13" font-weight="bold">&#x254;&#x2D0;</text>
          <text x="390" y="180" text-anchor="middle" fill="var(--muted)" font-size="8" font-family="Segoe UI,sans-serif">THOUGHT</text>

          <circle cx="230" cy="155" r="18" fill="none" stroke="var(--rp-color)" stroke-width="2.5"/>
          <text x="230" y="160" text-anchor="middle" fill="var(--rp-color)" font-size="13" font-weight="bold">&#x25C;&#x2D0;</text>
          <text x="262" y="155" text-anchor="middle" fill="var(--muted)" font-size="8" font-family="Segoe UI,sans-serif">NURSE</text>

          <!-- Key: filled = short/lax; outlined = long/tense -->
          <text x="210" y="325" text-anchor="middle" fill="var(--muted)" font-size="9" font-family="Segoe UI,sans-serif">Filled = short/lax | Outlined = long/tense | Dashed = schwa (unstressed only)</text>
        </svg>
      </div>

      <!-- GenAm Panel -->
      <div class="panel">
        <div class="panel-title genam">General American (GenAm)</div>
        <div class="panel-subtitle">~14-16 vowel phonemes (rhotic vowels, mergers)</div>
        <svg viewBox="0 0 420 340" xmlns="http://www.w3.org/2000/svg">
          <!-- Trapezoid outline -->
          <polygon points="80,30 340,30 380,290 40,290" fill="none" stroke="var(--grid-color)" stroke-width="1.5"/>
          <line x1="120" y1="115" x2="360" y2="115" stroke="var(--grid-color)" stroke-width="0.5" stroke-dasharray="4"/>
          <line x1="160" y1="200" x2="375" y2="200" stroke="var(--grid-color)" stroke-width="0.5" stroke-dasharray="4"/>
          <!-- Axis labels -->
          <text x="210" y="18" text-anchor="middle" fill="var(--muted)" font-size="10" font-family="Segoe UI,sans-serif">Front</text>
          <text x="370" y="18" text-anchor="middle" fill="var(--muted)" font-size="10" font-family="Segoe UI,sans-serif">Back</text>
          <text x="20" y="30" fill="var(--muted)" font-size="10" font-family="Segoe UI,sans-serif">Close</text>
          <text x="20" y="290" fill="var(--muted)" font-size="10" font-family="Segoe UI,sans-serif">Open</text>

          <!-- Monophthongs -->
          <circle cx="110" cy="65" r="18" fill="var(--genam-bg)" stroke="var(--genam-color)" stroke-width="2"/>
          <text x="110" y="70" text-anchor="middle" fill="var(--genam-color)" font-size="14" font-weight="bold">&#x26A;</text>
          <text x="110" y="85" text-anchor="middle" fill="var(--muted)" font-size="8" font-family="Segoe UI,sans-serif">KIT</text>

          <circle cx="130" cy="140" r="18" fill="var(--genam-bg)" stroke="var(--genam-color)" stroke-width="2"/>
          <text x="130" y="145" text-anchor="middle" fill="var(--genam-color)" font-size="14" font-weight="bold">&#x25B;</text>
          <text x="130" y="160" text-anchor="middle" fill="var(--muted)" font-size="8" font-family="Segoe UI,sans-serif">DRESS</text>

          <circle cx="150" cy="240" r="18" fill="var(--genam-bg)" stroke="var(--genam-color)" stroke-width="2"/>
          <text x="150" y="245" text-anchor="middle" fill="var(--genam-color)" font-size="14" font-weight="bold">&#xE6;</text>
          <text x="150" y="260" text-anchor="middle" fill="var(--muted)" font-size="8" font-family="Segoe UI,sans-serif">TRAP+BATH</text>

          <circle cx="250" cy="180" r="18" fill="var(--genam-bg)" stroke="var(--genam-color)" stroke-width="2"/>
          <text x="250" y="185" text-anchor="middle" fill="var(--genam-color)" font-size="14" font-weight="bold">&#x28C;</text>
          <text x="250" y="200" text-anchor="middle" fill="var(--muted)" font-size="8" font-family="Segoe UI,sans-serif">STRUT</text>

          <!-- LOT-THOUGHT merged to /&#x251;/ in many GenAm speakers -->
          <circle cx="340" cy="250" r="22" fill="var(--genam-bg)" stroke="var(--genam-color)" stroke-width="2.5"/>
          <text x="340" y="249" text-anchor="middle" fill="var(--genam-color)" font-size="13" font-weight="bold">&#x251;</text>
          <text x="340" y="263" text-anchor="middle" fill="var(--muted)" font-size="7" font-family="Segoe UI,sans-serif">LOT+THOUGHT</text>
          <text x="340" y="275" text-anchor="middle" fill="var(--diphthong-color)" font-size="7" font-weight="600" font-family="Segoe UI,sans-serif">MERGED</text>

          <circle cx="330" cy="65" r="18" fill="var(--genam-bg)" stroke="var(--genam-color)" stroke-width="2"/>
          <text x="330" y="70" text-anchor="middle" fill="var(--genam-color)" font-size="14" font-weight="bold">&#x28A;</text>
          <text x="330" y="85" text-anchor="middle" fill="var(--muted)" font-size="8" font-family="Segoe UI,sans-serif">FOOT</text>

          <circle cx="225" cy="120" r="16" fill="var(--genam-bg)" stroke="var(--genam-color)" stroke-width="1.5" stroke-dasharray="3"/>
          <text x="225" y="125" text-anchor="middle" fill="var(--genam-color)" font-size="13">&#x259;</text>
          <text x="225" y="138" text-anchor="middle" fill="var(--muted)" font-size="8" font-family="Segoe UI,sans-serif">schwa</text>

          <!-- Tense vowels -->
          <circle cx="85" cy="40" r="18" fill="none" stroke="var(--genam-color)" stroke-width="2.5"/>
          <text x="85" y="45" text-anchor="middle" fill="var(--genam-color)" font-size="13" font-weight="bold">i</text>
          <text x="60" y="38" text-anchor="middle" fill="var(--muted)" font-size="8" font-family="Segoe UI,sans-serif">FLEECE</text>

          <circle cx="350" cy="40" r="18" fill="none" stroke="var(--genam-color)" stroke-width="2.5"/>
          <text x="350" y="45" text-anchor="middle" fill="var(--genam-color)" font-size="13" font-weight="bold">u</text>
          <text x="375" y="38" text-anchor="middle" fill="var(--muted)" font-size="8" font-family="Segoe UI,sans-serif">GOOSE</text>

          <!-- R-colored vowel (unique to GenAm) -->
          <circle cx="260" cy="150" r="18" fill="none" stroke="var(--diphthong-color)" stroke-width="2.5"/>
          <text x="260" y="155" text-anchor="middle" fill="var(--diphthong-color)" font-size="13" font-weight="bold">&#x25D;</text>
          <text x="290" y="148" text-anchor="middle" fill="var(--diphthong-color)" font-size="8" font-weight="600" font-family="Segoe UI,sans-serif">NURSE</text>
          <text x="290" y="158" text-anchor="middle" fill="var(--diphthong-color)" font-size="7" font-family="Segoe UI,sans-serif">(r-colored)</text>

          <text x="210" y="325" text-anchor="middle" fill="var(--muted)" font-size="9" font-family="Segoe UI,sans-serif">Filled = short/lax | Outlined = long/tense | Gold = r-colored (rhotic)</text>
        </svg>
      </div>
    </div>

    <!-- Key Differences Table -->
    <table class="diff-table">
      <thead>
        <tr>
          <th>Feature</th>
          <th>Lexical Set</th>
          <th>RP</th>
          <th>GenAm</th>
          <th>Pattern</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>BATH vowel</td>
          <td>BATH, PALM, START</td>
          <td class="rp-val">/&#x251;&#x2D0;/</td>
          <td class="ga-val">/&#xE6;/</td>
          <td>RP split TRAP/BATH; GenAm keeps them merged</td>
        </tr>
        <tr>
          <td>LOT-THOUGHT</td>
          <td>LOT, CLOTH, THOUGHT</td>
          <td class="rp-val">/&#x252;/ vs /&#x254;&#x2D0;/</td>
          <td class="ga-val">/&#x251;/ (merged)</td>
          <td>GenAm merges cot-caught; RP keeps them distinct</td>
        </tr>
        <tr>
          <td>Rhoticity</td>
          <td>NURSE, START, NORTH, FORCE, NEAR, SQUARE, CURE</td>
          <td class="rp-val">Non-rhotic (/r/ silent before C)</td>
          <td class="ga-val">Rhotic (/r/ always pronounced)</td>
          <td>RP has linking-r; GenAm has r-colored vowels</td>
        </tr>
        <tr>
          <td>Total vowels</td>
          <td>All</td>
          <td class="rp-val">~20</td>
          <td class="ga-val">~14-16</td>
          <td>GenAm mergers reduce inventory size</td>
        </tr>
      </tbody>
    </table>
  </div>

  <div class="pattern-note">
    <strong>Pattern:</strong> RP and GenAm are not random accent differences -- they are <em>systematic phonological divergences</em>. RP preserves more vowel distinctions (larger inventory) while GenAm preserves /r/ in all positions (rhoticity). The two systems are mirror images: RP has more vowels but fewer consonant environments for /r/; GenAm has fewer vowels but r-colored versions of many of them.
  </div>

  <figcaption>
    <h2>Figure 2 &mdash; English Vowel Quadrilateral: RP vs. General American</h2>
    <p>Vowels plotted on the standard IPA trapezoid (vertical = tongue height, horizontal = tongue backness). Filled circles are short/lax vowels; open circles are long/tense. Key dialectal differences shown: the BATH split, the cot-caught merger, and rhoticity. Lexical set labels (Wells, 1982) identify vowel categories across dialects.</p>
  </figcaption>
</figure>
</body>
</html>
