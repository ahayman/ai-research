<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Topic-Comment vs. Subject-Predicate Architecture</title>
<style>
  :root {
    --bg: #0f172a;
    --fg: #e2e8f0;
    --surface: #1e293b;
    --surface2: #253349;
    --border: #334155;
    --accent: #06b6d4;
    --accent-dim: #0891b2;
    --accent-glow: rgba(6, 182, 212, 0.15);
    --mandarin: #06b6d4;
    --mandarin-bg: #0c3644;
    --english: #a78bfa;
    --english-bg: #2e2454;
    --classical: #f59e0b;
    --classical-bg: #4a3520;
    --muted: #64748b;
    --text-secondary: #94a3b8;
    --success: #10b981;
    --rose: #f43f5e;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure { max-width: 1100px; width: 100%; }
  figcaption {
    text-align: center;
    font-size: 0.85rem;
    color: var(--text-secondary);
    margin-top: 1rem;
    padding: 0.75rem;
    background: var(--surface);
    border-radius: 6px;
    border: 1px solid var(--border);
  }
  .diagram-container {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 2rem 1.5rem;
    overflow-x: auto;
  }
  .diagram-title {
    text-align: center;
    font-size: 1.3rem;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 0.5rem;
  }
  .diagram-subtitle {
    text-align: center;
    font-size: 0.9rem;
    color: var(--text-secondary);
    margin-bottom: 2rem;
  }

  /* === Typology Grid === */
  .section-label {
    font-size: 0.8rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-bottom: 0.75rem;
    padding-left: 0.25rem;
  }
  .typology-grid {
    display: grid;
    grid-template-columns: 100px 1fr 1fr;
    gap: 0;
    border: 2px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    margin-bottom: 2.5rem;
    max-width: 700px;
    margin-left: auto;
    margin-right: auto;
  }
  .tg-corner {
    background: var(--surface2);
    border-bottom: 2px solid var(--border);
    border-right: 2px solid var(--border);
    padding: 0.6rem;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.65rem;
    color: var(--muted);
    font-style: italic;
    text-align: center;
  }
  .tg-col-hdr {
    text-align: center;
    padding: 0.6rem 0.5rem;
    font-weight: 700;
    font-size: 0.85rem;
    border-bottom: 2px solid var(--border);
  }
  .tg-col-hdr:first-of-type { border-right: 1px solid var(--border); }
  .tg-col-tp { background: var(--mandarin-bg); color: var(--mandarin); }
  .tg-col-ntp { background: var(--surface2); color: var(--text-secondary); }
  .tg-row-hdr {
    padding: 0.6rem 0.5rem;
    font-weight: 700;
    font-size: 0.8rem;
    border-right: 2px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    line-height: 1.3;
  }
  .tg-row-sp { background: var(--english-bg); color: var(--english); }
  .tg-row-nsp { background: var(--surface2); color: var(--text-secondary); }
  .tg-cell {
    padding: 0.8rem;
    text-align: center;
    border-top: 1px solid var(--border);
    position: relative;
  }
  .tg-cell:nth-child(odd) { border-right: 1px solid var(--border); }
  .tg-cell .lang-name {
    font-weight: 700;
    font-size: 0.95rem;
    margin-bottom: 0.2rem;
  }
  .tg-cell .lang-examples {
    font-size: 0.75rem;
    color: var(--text-secondary);
  }
  .tg-cell.highlight-mandarin {
    background: rgba(6, 182, 212, 0.08);
    box-shadow: inset 0 0 0 2px var(--mandarin);
    border-radius: 2px;
  }
  .tg-cell.highlight-english {
    background: rgba(167, 139, 250, 0.08);
    box-shadow: inset 0 0 0 2px var(--english);
    border-radius: 2px;
  }

  /* === Architecture Comparison === */
  .arch-compare {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5rem;
    margin-bottom: 2rem;
  }
  @media (max-width: 700px) {
    .arch-compare { grid-template-columns: 1fr; }
  }
  .arch-box {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.25rem;
    position: relative;
  }
  .arch-box .arch-lang {
    font-weight: 700;
    font-size: 0.95rem;
    margin-bottom: 0.75rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .arch-box .arch-lang .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    display: inline-block;
  }
  .mandarin-box { border-color: var(--mandarin); }
  .mandarin-box .arch-lang { color: var(--mandarin); }
  .mandarin-box .dot { background: var(--mandarin); }
  .english-box { border-color: var(--english); }
  .english-box .arch-lang { color: var(--english); }
  .english-box .dot { background: var(--english); }

  /* Sentence parse blocks */
  .parse-row {
    display: flex;
    gap: 0.25rem;
    margin-bottom: 0.5rem;
    flex-wrap: wrap;
    align-items: flex-end;
  }
  .parse-unit {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-width: 60px;
  }
  .parse-unit .word {
    font-size: 1rem;
    font-weight: 600;
    padding: 0.35rem 0.6rem;
    border-radius: 6px;
    white-space: nowrap;
  }
  .parse-unit .pinyin {
    font-size: 0.7rem;
    color: var(--text-secondary);
    margin-bottom: 0.15rem;
    font-style: italic;
  }
  .parse-unit .role {
    font-size: 0.6rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-top: 0.2rem;
    padding: 0.1rem 0.4rem;
    border-radius: 3px;
  }
  .role-topic { color: var(--mandarin); background: var(--mandarin-bg); }
  .role-comment { color: var(--success); background: rgba(16, 185, 129, 0.15); }
  .role-subject { color: var(--english); background: var(--english-bg); }
  .role-verb { color: var(--classical); background: var(--classical-bg); }
  .role-object { color: var(--rose); background: rgba(244, 63, 94, 0.12); }
  .role-zero { color: var(--muted); background: rgba(100, 116, 139, 0.2); }
  .word-topic { background: var(--mandarin-bg); color: var(--mandarin); }
  .word-comment { background: rgba(16, 185, 129, 0.12); color: var(--success); }
  .word-subject { background: var(--english-bg); color: var(--english); }
  .word-verb { background: var(--classical-bg); color: var(--classical); }
  .word-object { background: rgba(244, 63, 94, 0.1); color: var(--rose); }
  .word-zero { background: rgba(100, 116, 139, 0.15); color: var(--muted); border: 1px dashed var(--muted); }

  .parse-label {
    font-size: 0.8rem;
    color: var(--text-secondary);
    margin-bottom: 0.4rem;
    font-weight: 600;
  }
  .parse-translation {
    font-size: 0.8rem;
    color: var(--muted);
    font-style: italic;
    margin-top: 0.3rem;
  }

  .connector {
    display: flex;
    align-items: center;
    gap: 0.15rem;
    font-size: 0.75rem;
    color: var(--muted);
    margin: 0.15rem 0;
  }
  .connector .arrow { font-size: 1.1rem; }

  /* Key insight callout */
  .insight {
    background: var(--accent-glow);
    border: 1px solid var(--accent-dim);
    border-left: 3px solid var(--accent);
    border-radius: 6px;
    padding: 0.75rem 1rem;
    font-size: 0.85rem;
    color: var(--fg);
    margin-top: 1.5rem;
  }
  .insight strong {
    color: var(--accent);
  }

  /* Comparison strip */
  .compare-strip {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0.75rem;
    margin-top: 2rem;
  }
  @media (max-width: 600px) {
    .compare-strip { grid-template-columns: 1fr; }
  }
  .strip-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.75rem;
    text-align: center;
  }
  .strip-card .strip-lang {
    font-weight: 700;
    font-size: 0.8rem;
    margin-bottom: 0.4rem;
  }
  .strip-card .strip-feature {
    font-size: 0.75rem;
    color: var(--text-secondary);
    line-height: 1.5;
  }
  .strip-card .strip-feature em {
    color: var(--fg);
    font-style: normal;
    font-weight: 600;
  }
  .strip-mandarin { border-color: var(--mandarin); }
  .strip-mandarin .strip-lang { color: var(--mandarin); }
  .strip-classical { border-color: var(--classical); }
  .strip-classical .strip-lang { color: var(--classical); }
  .strip-english { border-color: var(--english); }
  .strip-english .strip-lang { color: var(--english); }
</style>
</head>
<body>
<figure>
  <div class="diagram-container">
    <div class="diagram-title">Topic-Comment vs. Subject-Predicate Architecture</div>
    <div class="diagram-subtitle">Li &amp; Thompson (1976): How languages organize sentences</div>

    <!-- Typology Grid -->
    <div class="section-label">Four-Way Language Typology</div>
    <div class="typology-grid">
      <div class="tg-corner">Li &amp; Thompson 1976</div>
      <div class="tg-col-hdr tg-col-tp">+ Topic-Prominent</div>
      <div class="tg-col-hdr tg-col-ntp">- Topic-Prominent</div>
      <div class="tg-row-hdr tg-row-sp">+ Subject-<br>Prominent</div>
      <div class="tg-cell">
        <div class="lang-name" style="color:var(--success)">Both Sp &amp; Tp</div>
        <div class="lang-examples">Japanese, Korean</div>
      </div>
      <div class="tg-cell highlight-english">
        <div class="lang-name" style="color:var(--english)">Subject-Prominent</div>
        <div class="lang-examples">English, French, German</div>
      </div>
      <div class="tg-row-hdr tg-row-nsp">- Subject-<br>Prominent</div>
      <div class="tg-cell highlight-mandarin">
        <div class="lang-name" style="color:var(--mandarin)">Topic-Prominent</div>
        <div class="lang-examples">Mandarin, Cantonese, Vietnamese</div>
      </div>
      <div class="tg-cell">
        <div class="lang-name" style="color:var(--muted)">Neither</div>
        <div class="lang-examples">Tagalog, Ilokano</div>
      </div>
    </div>

    <!-- Architecture Comparison -->
    <div class="section-label">Structural Architecture Comparison</div>
    <div class="arch-compare">
      <!-- Mandarin side -->
      <div class="arch-box mandarin-box">
        <div class="arch-lang"><span class="dot"></span> Mandarin: Topic-Comment</div>

        <div class="parse-label">Example 1: "Elephants, noses are very long"</div>
        <div class="parse-row">
          <div class="parse-unit">
            <div class="pinyin">daxiang</div>
            <div class="word word-topic">大象</div>
            <div class="role role-topic">Topic</div>
          </div>
          <div class="parse-unit">
            <div class="pinyin">bizi</div>
            <div class="word word-comment">鼻子</div>
            <div class="role role-comment">Comment subj</div>
          </div>
          <div class="parse-unit">
            <div class="pinyin">hen</div>
            <div class="word word-verb">很</div>
            <div class="role role-verb">Adverb</div>
          </div>
          <div class="parse-unit">
            <div class="pinyin">chang</div>
            <div class="word word-verb">长</div>
            <div class="role role-verb">Adj</div>
          </div>
        </div>
        <div class="parse-translation">Topic has NO syntactic link to the predicate "long"</div>

        <div class="parse-label" style="margin-top:1rem">Example 2: "That book, I've already read"</div>
        <div class="parse-row">
          <div class="parse-unit">
            <div class="pinyin">na ben shu</div>
            <div class="word word-topic">那本书</div>
            <div class="role role-topic">Topic</div>
          </div>
          <div class="parse-unit">
            <div class="pinyin">wo</div>
            <div class="word word-comment">我</div>
            <div class="role role-comment">Comment subj</div>
          </div>
          <div class="parse-unit">
            <div class="pinyin">yijing</div>
            <div class="word word-verb">已经</div>
            <div class="role role-verb">Adverb</div>
          </div>
          <div class="parse-unit">
            <div class="pinyin">kan le</div>
            <div class="word word-verb">看了</div>
            <div class="role role-verb">Verb</div>
          </div>
        </div>
        <div class="parse-translation">Topic = Object of verb, moved to sentence-initial frame position</div>
      </div>

      <!-- English side -->
      <div class="arch-box english-box">
        <div class="arch-lang"><span class="dot"></span> English: Subject-Predicate</div>

        <div class="parse-label">Example 1: "Elephants have long noses"</div>
        <div class="parse-row">
          <div class="parse-unit">
            <div class="word word-subject">Elephants</div>
            <div class="role role-subject">Subject</div>
          </div>
          <div class="parse-unit">
            <div class="word word-verb">have</div>
            <div class="role role-verb">Verb</div>
          </div>
          <div class="parse-unit">
            <div class="word word-object">long noses</div>
            <div class="role role-object">Object</div>
          </div>
        </div>
        <div class="parse-translation">Subject MUST agree with verb and serve as argument</div>

        <div class="parse-label" style="margin-top:1rem">Example 2: "I've already read that book"</div>
        <div class="parse-row">
          <div class="parse-unit">
            <div class="word word-subject">I</div>
            <div class="role role-subject">Subject</div>
          </div>
          <div class="parse-unit">
            <div class="word word-verb">'ve read</div>
            <div class="role role-verb">Verb</div>
          </div>
          <div class="parse-unit">
            <div class="word word-object">that book</div>
            <div class="role role-object">Object</div>
          </div>
        </div>
        <div class="parse-translation">Object stays after verb; fronting ("That book, I read") is very marked</div>
      </div>
    </div>

    <div class="insight">
      <strong>Key Distinction:</strong> In English, the subject must have a grammatical relationship with the verb (agreement, case). In Mandarin, the topic merely establishes the frame for what follows — it can be semantically detached from the predicate entirely. This is why Chinese linguist Chao Yuen Ren (1968) said: "In Chinese, the subject IS the topic."
    </div>

    <!-- Three-way comparison strip -->
    <div class="compare-strip">
      <div class="strip-card strip-mandarin">
        <div class="strip-lang">Mandarin</div>
        <div class="strip-feature">
          Topic <em>optional</em><br>
          No agreement required<br>
          Topic can be <em>any NP</em><br>
          "Dangling topics" normal
        </div>
      </div>
      <div class="strip-card strip-classical">
        <div class="strip-lang">Classical Chinese</div>
        <div class="strip-feature">
          Even <em>more</em> topic-dominant<br>
          Extreme subject omission<br>
          Parallelism as structure<br>
          Topic often fully implicit
        </div>
      </div>
      <div class="strip-card strip-english">
        <div class="strip-lang">English</div>
        <div class="strip-feature">
          Subject <em>required</em><br>
          Subject-verb agreement<br>
          Expletive "it/there" fill slots<br>
          Topicalization very marked
        </div>
      </div>
    </div>
  </div>

  <figcaption>
    Li &amp; Thompson (1976) classified languages into four types based on the prominence of subject vs. topic in basic sentence structure. Mandarin Chinese is the canonical topic-prominent language, where sentence organization centers on "what is being talked about" rather than "who is doing something."
  </figcaption>
</figure>
</body>
</html>
