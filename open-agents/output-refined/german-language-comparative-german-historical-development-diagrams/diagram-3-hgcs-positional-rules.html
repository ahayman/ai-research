<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The High German Consonant Shift -- Positional Rules and Cognate Map</title>
<style>
  :root {
    --bg-primary: #1a1a2e;
    --bg-secondary: #16213e;
    --bg-card: #1e2a4a;
    --text-primary: #e0e0e0;
    --text-secondary: #a0a0b8;
    --text-muted: #707088;
    --accent-gold: #f0c040;
    --accent-blue: #4a9eff;
    --accent-green: #50c878;
    --accent-red: #e06060;
    --accent-purple: #b080e0;
    --accent-orange: #e0943a;
    --accent-cyan: #40c8e0;
    --border-subtle: #2a3a5a;
  }

  @media (prefers-color-scheme: light) {
    :root {
      --bg-primary: #f5f5f0;
      --bg-secondary: #eaeae5;
      --bg-card: #ffffff;
      --text-primary: #1a1a2e;
      --text-secondary: #4a4a60;
      --text-muted: #7a7a90;
      --accent-gold: #c09020;
      --accent-blue: #2070d0;
      --accent-green: #208050;
      --accent-red: #c04040;
      --accent-purple: #8050b0;
      --accent-orange: #c07020;
      --accent-cyan: #1090a0;
      --border-subtle: #d0d0d0;
    }
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg-primary);
    color: var(--text-primary);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    padding: 2rem 1rem;
    min-height: 100vh;
  }

  .diagram-container {
    max-width: 960px;
    margin: 0 auto;
  }

  h1 {
    text-align: center;
    font-size: 1.4rem;
    color: var(--accent-gold);
    margin-bottom: 0.3rem;
  }

  .subtitle {
    text-align: center;
    font-size: 0.9rem;
    color: var(--text-secondary);
    margin-bottom: 1.5rem;
  }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
  }

  .shift-card {
    background: var(--bg-card);
    border: 1px solid var(--border-subtle);
    border-radius: 10px;
    padding: 1rem;
    overflow: hidden;
  }

  .shift-card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0.8rem;
    padding-bottom: 0.6rem;
    border-bottom: 1px solid var(--border-subtle);
  }

  .consonant-big {
    font-size: 1.8rem;
    font-weight: 800;
  }

  .position-label {
    font-size: 0.7rem;
    font-weight: 600;
    padding: 0.2rem 0.5rem;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .pos-initial {
    background: rgba(74, 158, 255, 0.15);
    color: var(--accent-blue);
    border: 1px solid var(--accent-blue);
  }

  .pos-medial {
    background: rgba(240, 192, 64, 0.15);
    color: var(--accent-gold);
    border: 1px solid var(--accent-gold);
  }

  .rule-display {
    text-align: center;
    margin-bottom: 0.6rem;
    padding: 0.4rem;
    background: var(--bg-secondary);
    border-radius: 6px;
  }

  .rule-formula {
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 0.5px;
  }

  .rule-condition {
    font-size: 0.72rem;
    color: var(--text-muted);
    margin-top: 2px;
  }

  .cognate-list {
    list-style: none;
  }

  .cognate-item {
    display: flex;
    align-items: center;
    padding: 0.3rem 0;
    border-bottom: 1px dashed rgba(42, 58, 90, 0.5);
    font-size: 0.85rem;
  }

  .cognate-item:last-child {
    border-bottom: none;
  }

  .eng {
    color: var(--accent-blue);
    font-weight: 600;
    min-width: 80px;
  }

  .arrow {
    color: var(--text-muted);
    margin: 0 0.4rem;
  }

  .ger {
    color: var(--accent-gold);
    font-weight: 600;
  }

  .highlight-letter {
    text-decoration: underline;
    text-decoration-thickness: 2px;
  }

  .eng .highlight-letter { text-decoration-color: var(--accent-blue); }
  .ger .highlight-letter { text-decoration-color: var(--accent-gold); }

  /* d→t card spans full width */
  .shift-card.full-width {
    grid-column: 1 / -1;
  }

  .exception-card {
    grid-column: 1 / -1;
    background: var(--bg-secondary);
    border: 2px solid var(--accent-red);
    border-radius: 10px;
    padding: 1rem;
  }

  .exception-header {
    color: var(--accent-red);
    font-weight: 700;
    font-size: 1rem;
    margin-bottom: 0.6rem;
  }

  .exception-rule {
    display: flex;
    gap: 1.5rem;
    flex-wrap: wrap;
  }

  .exception-item {
    flex: 1;
    min-width: 180px;
  }

  .exception-item h4 {
    color: var(--accent-red);
    font-size: 0.8rem;
    margin-bottom: 0.3rem;
  }

  .exception-example {
    font-size: 0.85rem;
    color: var(--text-secondary);
    line-height: 1.6;
  }

  .exception-example .eng { font-size: 0.85rem; min-width: auto; }
  .exception-example .ger { font-size: 0.85rem; }

  figcaption {
    text-align: center;
    font-size: 0.85rem;
    color: var(--text-muted);
    margin-top: 1.2rem;
    font-style: italic;
    line-height: 1.5;
  }

  @media (max-width: 700px) {
    .grid { grid-template-columns: 1fr; }
    .shift-card.full-width { grid-column: 1; }
    .exception-card { grid-column: 1; }
  }
</style>
</head>
<body>
<figure class="diagram-container">
  <h1>The High German Consonant Shift</h1>
  <p class="subtitle">Positional rules with English-German cognate pairs -- a practical decoding reference</p>

  <div class="grid">

    <!-- P: INITIAL → pf -->
    <div class="shift-card">
      <div class="shift-card-header">
        <span class="consonant-big" style="color:var(--accent-blue)">p</span>
        <span class="position-label pos-initial">Word-initial / Geminate</span>
      </div>
      <div class="rule-display">
        <div class="rule-formula" style="color:var(--accent-cyan)">p &rarr; pf</div>
        <div class="rule-condition">affricate: stop preserved + fricative added</div>
      </div>
      <ul class="cognate-list">
        <li class="cognate-item"><span class="eng"><span class="highlight-letter">p</span>ound</span><span class="arrow">&rarr;</span><span class="ger"><span class="highlight-letter">Pf</span>und</span></li>
        <li class="cognate-item"><span class="eng"><span class="highlight-letter">p</span>epper</span><span class="arrow">&rarr;</span><span class="ger"><span class="highlight-letter">Pf</span>effer</span></li>
        <li class="cognate-item"><span class="eng"><span class="highlight-letter">p</span>lant</span><span class="arrow">&rarr;</span><span class="ger"><span class="highlight-letter">Pf</span>lanze</span></li>
        <li class="cognate-item"><span class="eng">a<span class="highlight-letter">pp</span>le</span><span class="arrow">&rarr;</span><span class="ger">A<span class="highlight-letter">pf</span>el</span></li>
      </ul>
    </div>

    <!-- P: MEDIAL → ff -->
    <div class="shift-card">
      <div class="shift-card-header">
        <span class="consonant-big" style="color:var(--accent-blue)">p</span>
        <span class="position-label pos-medial">After vowel / Word-final</span>
      </div>
      <div class="rule-display">
        <div class="rule-formula" style="color:var(--accent-gold)">p &rarr; ff / f</div>
        <div class="rule-condition">fricative: stop fully opens</div>
      </div>
      <ul class="cognate-list">
        <li class="cognate-item"><span class="eng">shi<span class="highlight-letter">p</span></span><span class="arrow">&rarr;</span><span class="ger">Schi<span class="highlight-letter">ff</span></span></li>
        <li class="cognate-item"><span class="eng">slee<span class="highlight-letter">p</span></span><span class="arrow">&rarr;</span><span class="ger">schla<span class="highlight-letter">f</span>en</span></li>
        <li class="cognate-item"><span class="eng">o<span class="highlight-letter">p</span>en</span><span class="arrow">&rarr;</span><span class="ger">o<span class="highlight-letter">ff</span>en</span></li>
        <li class="cognate-item"><span class="eng">ri<span class="highlight-letter">p</span>e</span><span class="arrow">&rarr;</span><span class="ger">rei<span class="highlight-letter">f</span></span></li>
      </ul>
    </div>

    <!-- T: INITIAL → ts -->
    <div class="shift-card">
      <div class="shift-card-header">
        <span class="consonant-big" style="color:var(--accent-blue)">t</span>
        <span class="position-label pos-initial">Word-initial / Geminate</span>
      </div>
      <div class="rule-display">
        <div class="rule-formula" style="color:var(--accent-cyan)">t &rarr; z (= ts)</div>
        <div class="rule-condition">affricate: spelled z or tz</div>
      </div>
      <ul class="cognate-list">
        <li class="cognate-item"><span class="eng"><span class="highlight-letter">t</span>en</span><span class="arrow">&rarr;</span><span class="ger"><span class="highlight-letter">z</span>ehn</span></li>
        <li class="cognate-item"><span class="eng"><span class="highlight-letter">t</span>ongue</span><span class="arrow">&rarr;</span><span class="ger"><span class="highlight-letter">Z</span>unge</span></li>
        <li class="cognate-item"><span class="eng"><span class="highlight-letter">t</span>wo</span><span class="arrow">&rarr;</span><span class="ger"><span class="highlight-letter">z</span>wei</span></li>
        <li class="cognate-item"><span class="eng">si<span class="highlight-letter">tt</span>ing</span><span class="arrow">&rarr;</span><span class="ger">si<span class="highlight-letter">tz</span>en</span></li>
      </ul>
    </div>

    <!-- T: MEDIAL → ss -->
    <div class="shift-card">
      <div class="shift-card-header">
        <span class="consonant-big" style="color:var(--accent-blue)">t</span>
        <span class="position-label pos-medial">After vowel / Word-final</span>
      </div>
      <div class="rule-display">
        <div class="rule-formula" style="color:var(--accent-gold)">t &rarr; ss / &szlig;</div>
        <div class="rule-condition">fricative: spelled ss or &szlig;</div>
      </div>
      <ul class="cognate-list">
        <li class="cognate-item"><span class="eng">wa<span class="highlight-letter">t</span>er</span><span class="arrow">&rarr;</span><span class="ger">Wa<span class="highlight-letter">ss</span>er</span></li>
        <li class="cognate-item"><span class="eng">ea<span class="highlight-letter">t</span></span><span class="arrow">&rarr;</span><span class="ger">e<span class="highlight-letter">ss</span>en</span></li>
        <li class="cognate-item"><span class="eng">whi<span class="highlight-letter">t</span>e</span><span class="arrow">&rarr;</span><span class="ger">wei<span class="highlight-letter">&szlig;</span></span></li>
        <li class="cognate-item"><span class="eng">stree<span class="highlight-letter">t</span></span><span class="arrow">&rarr;</span><span class="ger">Stra<span class="highlight-letter">&szlig;</span>e</span></li>
      </ul>
    </div>

    <!-- K: only post-vocalic in Standard German -->
    <div class="shift-card">
      <div class="shift-card-header">
        <span class="consonant-big" style="color:var(--accent-blue)">k</span>
        <span class="position-label pos-medial">After vowel only</span>
      </div>
      <div class="rule-display">
        <div class="rule-formula" style="color:var(--accent-gold)">k &rarr; ch</div>
        <div class="rule-condition">fricative: initial k- unshifted in Standard German</div>
      </div>
      <ul class="cognate-list">
        <li class="cognate-item"><span class="eng">ma<span class="highlight-letter">k</span>e</span><span class="arrow">&rarr;</span><span class="ger">ma<span class="highlight-letter">ch</span>en</span></li>
        <li class="cognate-item"><span class="eng">brea<span class="highlight-letter">k</span></span><span class="arrow">&rarr;</span><span class="ger">bre<span class="highlight-letter">ch</span>en</span></li>
        <li class="cognate-item"><span class="eng">boo<span class="highlight-letter">k</span></span><span class="arrow">&rarr;</span><span class="ger">Bu<span class="highlight-letter">ch</span></span></li>
        <li class="cognate-item"><span class="eng">wee<span class="highlight-letter">k</span></span><span class="arrow">&rarr;</span><span class="ger">Wo<span class="highlight-letter">ch</span>e</span></li>
      </ul>
    </div>

    <!-- D → T (voiced stop devoicing) -->
    <div class="shift-card">
      <div class="shift-card-header">
        <span class="consonant-big" style="color:var(--accent-blue)">d</span>
        <span class="position-label" style="background:rgba(176,128,224,0.15);color:var(--accent-purple);border:1px solid var(--accent-purple)">All positions</span>
      </div>
      <div class="rule-display">
        <div class="rule-formula" style="color:var(--accent-purple)">d &rarr; t</div>
        <div class="rule-condition">voiced stop devoices (most systematic of the voiced shifts)</div>
      </div>
      <ul class="cognate-list">
        <li class="cognate-item"><span class="eng"><span class="highlight-letter">d</span>o</span><span class="arrow">&rarr;</span><span class="ger"><span class="highlight-letter">t</span>un</span></li>
        <li class="cognate-item"><span class="eng"><span class="highlight-letter">d</span>ay</span><span class="arrow">&rarr;</span><span class="ger"><span class="highlight-letter">T</span>ag</span></li>
        <li class="cognate-item"><span class="eng"><span class="highlight-letter">d</span>aughter</span><span class="arrow">&rarr;</span><span class="ger"><span class="highlight-letter">T</span>ochter</span></li>
        <li class="cognate-item"><span class="eng"><span class="highlight-letter">d</span>oor</span><span class="arrow">&rarr;</span><span class="ger"><span class="highlight-letter">T</span>&uuml;r</span></li>
      </ul>
    </div>

    <!-- Exception zone -->
    <div class="exception-card">
      <div class="exception-header">Exception Zone -- No Shift Occurs</div>
      <div class="exception-rule">
        <div class="exception-item">
          <h4>After a fricative (sp, st, sk, ft, xt)</h4>
          <div class="exception-example">
            <span class="eng">stone</span> = <span class="ger">Stein</span> (not *Szein)<br>
            <span class="eng">star</span> = <span class="ger">Stern</span> (not *Szern)<br>
            <span class="eng">speak</span> = <span class="ger">sprechen</span> (sp- kept)
          </div>
        </div>
        <div class="exception-item">
          <h4>In the cluster /tr/</h4>
          <div class="exception-example">
            <span class="eng">true</span> = <span class="ger">treu</span> (not *zreu)<br>
            <span class="eng">tree</span> / <span class="ger">Traum</span> (tr- kept)
          </div>
        </div>
        <div class="exception-item">
          <h4>Initial k- in Standard German</h4>
          <div class="exception-example">
            <span class="eng">kin</span> = <span class="ger">Kind</span> (not *Kchind)<br>
            <span class="eng">cold</span> = <span class="ger">kalt</span> (not *kchallt)<br>
            <span style="color:var(--text-muted);font-size:0.78rem">k&rarr;kch only in Upper German dialects</span>
          </div>
        </div>
      </div>
    </div>

  </div>

  <figcaption>
    Figure 3: The High German Consonant Shift as a practical cognate-decoding reference. The shift changes voiceless stops (p, t, k) into affricates word-initially and fricatives after vowels. These correspondences are systematic and predictable -- once you know the rules, hundreds of cognate pairs become decodable.
  </figcaption>
</figure>
</body>
</html>
