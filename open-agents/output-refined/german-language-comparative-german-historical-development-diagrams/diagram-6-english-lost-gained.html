<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>What English Lost vs Gained -- The Germanic-to-Analytic Transformation</title>
<style>
  :root {
    --bg-primary: #1a1a2e;
    --bg-secondary: #16213e;
    --bg-card: #1e2a4a;
    --text-primary: #e0e0e0;
    --text-secondary: #a0a0b8;
    --text-muted: #707088;
    --accent-gold: #f0c040;
    --accent-blue: #4a9eff;
    --accent-green: #50c878;
    --accent-red: #e06060;
    --accent-purple: #b080e0;
    --accent-orange: #e0943a;
    --accent-cyan: #40c8e0;
    --border-subtle: #2a3a5a;
    --lost-bg: rgba(224, 96, 96, 0.08);
    --gained-bg: rgba(80, 200, 120, 0.08);
    --german-bg: rgba(240, 192, 64, 0.08);
  }

  @media (prefers-color-scheme: light) {
    :root {
      --bg-primary: #f5f5f0;
      --bg-secondary: #eaeae5;
      --bg-card: #ffffff;
      --text-primary: #1a1a2e;
      --text-secondary: #4a4a60;
      --text-muted: #7a7a90;
      --accent-gold: #c09020;
      --accent-blue: #2070d0;
      --accent-green: #208050;
      --accent-red: #c04040;
      --accent-purple: #8050b0;
      --accent-orange: #c07020;
      --accent-cyan: #1090a0;
      --border-subtle: #d0d0d0;
      --lost-bg: rgba(192, 64, 64, 0.06);
      --gained-bg: rgba(32, 128, 80, 0.06);
      --german-bg: rgba(192, 144, 32, 0.06);
    }
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg-primary);
    color: var(--text-primary);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    padding: 2rem 1rem;
    min-height: 100vh;
  }

  .diagram-container {
    max-width: 1050px;
    margin: 0 auto;
  }

  h1 {
    text-align: center;
    font-size: 1.4rem;
    color: var(--accent-gold);
    margin-bottom: 0.3rem;
  }

  .subtitle {
    text-align: center;
    font-size: 0.9rem;
    color: var(--text-secondary);
    margin-bottom: 1.5rem;
  }

  .comparison-grid {
    display: grid;
    grid-template-columns: 1fr auto 1fr auto;
    gap: 0;
    border: 1px solid var(--border-subtle);
    border-radius: 10px;
    overflow: hidden;
  }

  .grid-header {
    padding: 0.8rem;
    font-weight: 700;
    font-size: 0.9rem;
    text-align: center;
    background: var(--bg-secondary);
    border-bottom: 2px solid var(--border-subtle);
  }

  .header-lost { color: var(--accent-red); }
  .header-arrow { color: var(--text-muted); padding: 0.8rem 0.3rem; background: var(--bg-secondary); border-bottom: 2px solid var(--border-subtle); text-align: center; font-size: 1.2rem; }
  .header-gained { color: var(--accent-green); }
  .header-german { color: var(--accent-gold); }

  .row-lost, .row-gained, .row-german, .row-arrow {
    padding: 0.7rem 0.8rem;
    border-bottom: 1px solid var(--border-subtle);
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .row-lost { background: var(--lost-bg); }
  .row-gained { background: var(--gained-bg); }
  .row-german { background: var(--german-bg); }
  .row-arrow {
    text-align: center;
    color: var(--text-muted);
    font-size: 1.3rem;
    padding: 0.7rem 0.2rem;
    border-bottom: 1px solid var(--border-subtle);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .feature-name {
    font-weight: 700;
    font-size: 0.88rem;
    margin-bottom: 0.2rem;
  }

  .row-lost .feature-name { color: var(--accent-red); }
  .row-gained .feature-name { color: var(--accent-green); }
  .row-german .feature-name { color: var(--accent-gold); }

  .feature-detail {
    font-size: 0.78rem;
    color: var(--text-secondary);
    line-height: 1.4;
  }

  .feature-example {
    font-size: 0.75rem;
    color: var(--text-muted);
    font-style: italic;
    margin-top: 0.15rem;
  }

  .cause-tag {
    display: inline-block;
    font-size: 0.65rem;
    font-weight: 600;
    padding: 0.1rem 0.4rem;
    border-radius: 3px;
    margin-top: 0.2rem;
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }

  .cause-norse { background: rgba(64, 200, 224, 0.15); color: var(--accent-cyan); }
  .cause-norman { background: rgba(176, 128, 224, 0.15); color: var(--accent-purple); }
  .cause-gvs { background: rgba(224, 148, 58, 0.15); color: var(--accent-orange); }
  .cause-internal { background: rgba(160, 160, 184, 0.15); color: var(--text-secondary); }

  .balance-summary {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
    margin-top: 1.5rem;
  }

  .summary-card {
    padding: 1rem;
    border-radius: 8px;
    background: var(--bg-secondary);
    border: 1px solid var(--border-subtle);
  }

  .summary-card h3 {
    font-size: 0.95rem;
    margin-bottom: 0.5rem;
  }

  .summary-card p {
    font-size: 0.82rem;
    color: var(--text-secondary);
    line-height: 1.5;
  }

  .framing-note {
    margin-top: 1.2rem;
    padding: 0.8rem 1rem;
    background: var(--bg-secondary);
    border-left: 4px solid var(--accent-purple);
    border-radius: 0 8px 8px 0;
    font-size: 0.85rem;
    color: var(--text-secondary);
    line-height: 1.5;
  }

  .framing-note strong {
    color: var(--accent-purple);
  }

  figcaption {
    text-align: center;
    font-size: 0.85rem;
    color: var(--text-muted);
    margin-top: 1rem;
    font-style: italic;
    line-height: 1.5;
  }

  @media (max-width: 750px) {
    .comparison-grid {
      grid-template-columns: 1fr;
    }
    .row-arrow, .header-arrow {
      display: none;
    }
    .balance-summary { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<figure class="diagram-container">
  <h1>What English Lost and What It Gained</h1>
  <p class="subtitle">The Germanic-to-analytic transformation -- not degradation, but structural replacement</p>

  <div class="comparison-grid">
    <!-- Headers -->
    <div class="grid-header header-lost">Feature English LOST</div>
    <div class="header-arrow">&rarr;</div>
    <div class="grid-header header-gained">Replacement English GAINED</div>
    <div class="grid-header header-german">What German RETAINED</div>

    <!-- Row 1: Case System -->
    <div class="row-lost">
      <div class="feature-name">Case System</div>
      <div class="feature-detail">4+ cases on nouns, pronouns, adjectives</div>
      <div class="feature-example">Old English: "the king" = se cyning / thone cyning / thaes cyninges / thaem cyninge</div>
      <span class="cause-tag cause-norse">Norse contact</span>
    </div>
    <div class="row-arrow">&rarr;</div>
    <div class="row-gained">
      <div class="feature-name">Fixed SVO Word Order + Prepositions</div>
      <div class="feature-detail">Rigid word order replaces case markings for showing who does what</div>
      <div class="feature-example">"The dog bit the man" vs. "The man bit the dog" -- order is meaning</div>
    </div>
    <div class="row-german">
      <div class="feature-name">4 Cases Retained</div>
      <div class="feature-detail">Nominativ, Akkusativ, Dativ, Genitiv on articles, adjectives, pronouns</div>
      <div class="feature-example">der Mann / den Mann / dem Mann / des Mannes</div>
    </div>

    <!-- Row 2: Gender -->
    <div class="row-lost">
      <div class="feature-name">Grammatical Gender</div>
      <div class="feature-detail">3 genders with agreement on articles, adjectives, pronouns</div>
      <div class="feature-example">OE: se mona (masc. moon), seo sunne (fem. sun)</div>
      <span class="cause-tag cause-norse">Norse contact</span>
    </div>
    <div class="row-arrow">&rarr;</div>
    <div class="row-gained">
      <div class="feature-name">Simplified Article System</div>
      <div class="feature-detail">One definite article (the), two indefinite (a/an), no gender agreement</div>
      <div class="feature-example">"the table, the lamp, the book" -- all identical</div>
    </div>
    <div class="row-german">
      <div class="feature-name">3 Genders Retained</div>
      <div class="feature-detail">der/die/das with full agreement system</div>
      <div class="feature-example">der Tisch (m.), die Lampe (f.), das Buch (n.)</div>
    </div>

    <!-- Row 3: V2 -->
    <div class="row-lost">
      <div class="feature-name">V2 Word Order</div>
      <div class="feature-detail">Flexible word order with verb always in second position</div>
      <div class="feature-example">OE: "Yesterday came the king" (V2 like German)</div>
      <span class="cause-tag cause-internal">Internal + contact</span>
    </div>
    <div class="row-arrow">&rarr;</div>
    <div class="row-gained">
      <div class="feature-name">Rigid SVO + Do-Support</div>
      <div class="feature-detail">Questions/negation use "do" auxiliary instead of verb movement</div>
      <div class="feature-example">"Do you speak?" / "I do not speak" (not *"Speak you?" / "I speak not")</div>
    </div>
    <div class="row-german">
      <div class="feature-name">Strict V2 Retained</div>
      <div class="feature-detail">Verb ALWAYS in second position in main clauses</div>
      <div class="feature-example">"Gestern kam der Konig" -- verb stays in position 2</div>
    </div>

    <!-- Row 4: Adjective declension -->
    <div class="row-lost">
      <div class="feature-name">Adjective Declension</div>
      <div class="feature-detail">Strong/weak adjective endings matching case, gender, number</div>
      <div class="feature-example">OE: god mann (strong) vs. se goda mann (weak)</div>
      <span class="cause-tag cause-norse">Norse contact</span>
    </div>
    <div class="row-arrow">&rarr;</div>
    <div class="row-gained">
      <div class="feature-name">Invariable Adjectives</div>
      <div class="feature-detail">Adjectives never change form regardless of context</div>
      <div class="feature-example">"the good man / a good woman / good children" -- "good" never changes</div>
    </div>
    <div class="row-german">
      <div class="feature-name">Full Adjective Declension</div>
      <div class="feature-detail">Strong and weak endings with 48+ possible forms</div>
      <div class="feature-example">guter Mann / der gute Mann / einem guten Mann</div>
    </div>

    <!-- Row 5: Strong verbs -->
    <div class="row-lost">
      <div class="feature-name">Productive Strong Verb Classes</div>
      <div class="feature-detail">Many ablaut classes actively producing irregular past tenses</div>
      <div class="feature-example">OE had ~300+ strong verbs in active classes</div>
      <span class="cause-tag cause-internal">Analogy</span>
    </div>
    <div class="row-arrow">&rarr;</div>
    <div class="row-gained">
      <div class="feature-name">Regular -ed Past Tense Dominates</div>
      <div class="feature-detail">~160 irregular verbs remain; all new verbs are regular</div>
      <div class="feature-example">"googled," "texted," "Ubered" -- productive -ed pattern</div>
    </div>
    <div class="row-german">
      <div class="feature-name">More Strong Verbs Survive</div>
      <div class="feature-detail">Strong verb ablaut classes remain more productive</div>
      <div class="feature-example">singen/sang/gesungen, fahren/fuhr/gefahren</div>
    </div>

    <!-- Row 6: Compounding vs Borrowing -->
    <div class="row-lost">
      <div class="feature-name">Germanic Compound Word-Building</div>
      <div class="feature-detail">Building new words from existing Germanic roots</div>
      <div class="feature-example">OE: "star-craft" (astronomy), "leech-craft" (medicine)</div>
      <span class="cause-tag cause-norman">Norman Conquest</span>
    </div>
    <div class="row-arrow">&rarr;</div>
    <div class="row-gained">
      <div class="feature-name">Latin/French/Greek Borrowing</div>
      <div class="feature-detail">Primary vocabulary expansion through foreign borrowing</div>
      <div class="feature-example">"television" (Greek+Latin), not *"far-seer"</div>
    </div>
    <div class="row-german">
      <div class="feature-name">Compounding Retained</div>
      <div class="feature-detail">New words built from Germanic roots</div>
      <div class="feature-example">Fernsehen (far-see), Handschuh (hand-shoe), Krankenwagen (sick-wagon)</div>
    </div>

    <!-- Row 7: Spelling -->
    <div class="row-lost">
      <div class="feature-name">Phonetic Spelling</div>
      <div class="feature-detail">Writing that matched pronunciation</div>
      <div class="feature-example">ME "night" was /nixt/ -- gh spelled a real sound</div>
      <span class="cause-tag cause-gvs">Great Vowel Shift</span>
    </div>
    <div class="row-arrow">&rarr;</div>
    <div class="row-gained">
      <div class="feature-name">Historical/Fossil Spelling</div>
      <div class="feature-detail">Spelling preserves medieval pronunciation as a fossil record</div>
      <div class="feature-example">"knight" = /naIt/ (silent k, silent gh) -- medieval fossil</div>
    </div>
    <div class="row-german">
      <div class="feature-name">Phonetic Spelling Retained</div>
      <div class="feature-detail">What you see is what you say</div>
      <div class="feature-example">Nacht = /naxt/ -- spelling matches pronunciation</div>
    </div>

    <!-- Row 8: Productive prefixes -->
    <div class="row-lost">
      <div class="feature-name">Productive Verbal Prefixes</div>
      <div class="feature-detail">ver-, zer-, be-, ent-, er- creating new verb meanings</div>
      <div class="feature-example">OE: for-gifan (forgive), be-settan (beset)</div>
      <span class="cause-tag cause-norman">Norman Conquest</span>
    </div>
    <div class="row-arrow">&rarr;</div>
    <div class="row-gained">
      <div class="feature-name">Phrasal Verbs</div>
      <div class="feature-detail">Verb + particle combinations (unique to English among Germanic)</div>
      <div class="feature-example">"put up with," "look forward to," "break down," "give in"</div>
    </div>
    <div class="row-german">
      <div class="feature-name">Prefix System Retained</div>
      <div class="feature-detail">ver-, zer-, be-, ent-, er-, aus-, an-, auf- remain productive</div>
      <div class="feature-example">verstehen, zerstoren, beginnen, entdecken, erklaren</div>
    </div>
  </div>

  <div class="framing-note">
    <strong>Key framing:</strong> This is NOT "English lost" (implying degradation). It is structural transformation. Every feature English shed was replaced by a different mechanism that serves the same communicative function. German retained the original system; English replaced it with an equally functional alternative. Neither language is better or worse -- they represent two different solutions to the same communicative challenges, shaped by different historical circumstances.
  </div>

  <figcaption>
    Figure 6: The systematic trade-offs as English transformed from a Germanic synthetic language (like modern German) to an analytic hybrid. Each "loss" was a replacement, not a degradation. Color-coded cause tags show which historical event drove each change: Norse contact (cyan), the Norman Conquest (purple), the Great Vowel Shift (orange), or internal analogical change (gray).
  </figcaption>
</figure>
</body>
</html>
