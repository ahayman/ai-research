<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>German-English Divergence Timeline</title>
<style>
  :root {
    --bg-primary: #1a1a2e;
    --bg-secondary: #16213e;
    --bg-card: #1e2a4a;
    --text-primary: #e0e0e0;
    --text-secondary: #a0a0b8;
    --text-muted: #707088;
    --accent-gold: #f0c040;
    --accent-blue: #4a9eff;
    --accent-green: #50c878;
    --accent-red: #e06060;
    --accent-purple: #b080e0;
    --accent-orange: #e0943a;
    --accent-cyan: #40c8e0;
    --border-subtle: #2a3a5a;
  }

  @media (prefers-color-scheme: light) {
    :root {
      --bg-primary: #f5f5f0;
      --bg-secondary: #eaeae5;
      --bg-card: #ffffff;
      --text-primary: #1a1a2e;
      --text-secondary: #4a4a60;
      --text-muted: #7a7a90;
      --accent-gold: #c09020;
      --accent-blue: #2070d0;
      --accent-green: #208050;
      --accent-red: #c04040;
      --accent-purple: #8050b0;
      --accent-orange: #c07020;
      --accent-cyan: #1090a0;
      --border-subtle: #d0d0d0;
    }
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg-primary);
    color: var(--text-primary);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    padding: 2rem 1rem;
    min-height: 100vh;
  }

  .diagram-container {
    max-width: 960px;
    margin: 0 auto;
  }

  h1 {
    text-align: center;
    font-size: 1.4rem;
    color: var(--accent-gold);
    margin-bottom: 0.3rem;
  }

  .subtitle {
    text-align: center;
    font-size: 0.9rem;
    color: var(--text-secondary);
    margin-bottom: 1.5rem;
  }

  .timeline-wrapper {
    position: relative;
    width: 100%;
    overflow-x: auto;
  }

  .timeline-svg {
    width: 100%;
    min-width: 900px;
    height: auto;
  }

  figcaption {
    text-align: center;
    font-size: 0.85rem;
    color: var(--text-muted);
    margin-top: 1rem;
    font-style: italic;
    line-height: 1.5;
  }
</style>
</head>
<body>
<figure class="diagram-container">
  <h1>The Divergence Timeline</h1>
  <p class="subtitle">German and English from shared origin to modern forms -- parallel tracks, diverging paths</p>

  <div class="timeline-wrapper">
    <svg class="timeline-svg" viewBox="0 0 920 980" xmlns="http://www.w3.org/2000/svg">

      <!-- Background date scale on center -->
      <line x1="460" y1="60" x2="460" y2="920" stroke="var(--border-subtle)" stroke-width="1" stroke-dasharray="4 4" />

      <!-- Date markers -->
      <text x="460" y="50" fill="var(--text-muted)" font-size="9" text-anchor="middle" font-weight="600">~500 BCE</text>
      <text x="460" y="150" fill="var(--text-muted)" font-size="9" text-anchor="middle" font-weight="600">~200 CE</text>
      <text x="460" y="230" fill="var(--text-muted)" font-size="9" text-anchor="middle" font-weight="600">~450 CE</text>
      <text x="460" y="310" fill="var(--text-muted)" font-size="9" text-anchor="middle" font-weight="600">~750 CE</text>
      <text x="460" y="430" fill="var(--text-muted)" font-size="9" text-anchor="middle" font-weight="600">~1050</text>
      <text x="460" y="530" fill="var(--text-muted)" font-size="9" text-anchor="middle" font-weight="600">~1200</text>
      <text x="460" y="600" fill="var(--text-muted)" font-size="9" text-anchor="middle" font-weight="600">~1350</text>
      <text x="460" y="680" fill="var(--text-muted)" font-size="9" text-anchor="middle" font-weight="600">~1522</text>
      <text x="460" y="770" fill="var(--text-muted)" font-size="9" text-anchor="middle" font-weight="600">~1700</text>
      <text x="460" y="850" fill="var(--text-muted)" font-size="9" text-anchor="middle" font-weight="600">~1880</text>
      <text x="460" y="920" fill="var(--text-muted)" font-size="9" text-anchor="middle" font-weight="600">Today</text>

      <!-- Column headers -->
      <text x="210" y="25" fill="var(--accent-gold)" font-size="14" text-anchor="middle" font-weight="700">GERMAN TRACK</text>
      <text x="710" y="25" fill="var(--accent-blue)" font-size="14" text-anchor="middle" font-weight="700">ENGLISH TRACK</text>

      <!-- Track lines -->
      <line x1="210" y1="35" x2="210" y2="920" stroke="var(--accent-gold)" stroke-width="2" opacity="0.3" />
      <line x1="710" y1="35" x2="710" y2="920" stroke="var(--accent-blue)" stroke-width="2" opacity="0.3" />

      <!-- ==================== SHARED ZONE ==================== -->
      <rect x="100" y="55" width="720" height="90" rx="8" fill="var(--bg-card)" stroke="var(--accent-green)" stroke-width="2" opacity="0.8" />
      <text x="460" y="75" fill="var(--accent-green)" font-size="13" text-anchor="middle" font-weight="700">PROTO-GERMANIC: Both Languages Identical</text>
      <text x="460" y="93" fill="var(--text-secondary)" font-size="9.5" text-anchor="middle">Shared features: 4+ cases | 3 genders | V2 word order | ablaut (sing/sang/sung) | strong/weak verbs</text>
      <text x="460" y="107" fill="var(--text-secondary)" font-size="9.5" text-anchor="middle">Both underwent Grimm's Law together | Both West Germanic</text>
      <text x="460" y="121" fill="var(--text-muted)" font-size="8.5" text-anchor="middle" font-style="italic">An ancestor of English and an ancestor of German were essentially the same language</text>

      <!-- ==================== DIVERGENCE BEGINS ==================== -->

      <!-- Migration event (English side) -->
      <rect x="570" y="215" width="280" height="36" rx="6" fill="var(--bg-card)" stroke="var(--accent-cyan)" stroke-width="1.5" />
      <text x="710" y="231" fill="var(--accent-cyan)" font-size="10" text-anchor="middle" font-weight="600">Anglo-Saxons migrate to Britain ~450 CE</text>
      <text x="710" y="244" fill="var(--text-muted)" font-size="8.5" text-anchor="middle">Leave the continent BEFORE the consonant shift</text>

      <!-- HGCS (German side) -->
      <rect x="50" y="168" width="320" height="55" rx="6" fill="var(--bg-card)" stroke="var(--accent-orange)" stroke-width="2" />
      <text x="210" y="186" fill="var(--accent-orange)" font-size="11" text-anchor="middle" font-weight="700">HIGH GERMAN CONSONANT SHIFT</text>
      <text x="210" y="200" fill="var(--text-secondary)" font-size="9" text-anchor="middle">~3rd-8th century CE</text>
      <text x="210" y="213" fill="var(--text-secondary)" font-size="8.5" text-anchor="middle">p&rarr;pf/ff | t&rarr;z/ss | k&rarr;ch | d&rarr;t</text>

      <!-- Divergence arrow 1 -->
      <line x1="370" y1="195" x2="570" y2="233" stroke="var(--accent-red)" stroke-width="1.5" stroke-dasharray="5 3" />
      <text x="470" y="205" fill="var(--accent-red)" font-size="8" text-anchor="middle" font-weight="600" transform="rotate(-5,470,205)">Consonant systems separate</text>

      <!-- OHG -->
      <rect x="110" y="295" width="200" height="40" rx="6" fill="var(--bg-card)" stroke="var(--accent-gold)" stroke-width="1.5" />
      <text x="210" y="312" fill="var(--accent-gold)" font-size="10.5" text-anchor="middle" font-weight="600">Old High German</text>
      <text x="210" y="326" fill="var(--text-muted)" font-size="8.5" text-anchor="middle">750-1050 | Abrogans ~765</text>

      <!-- Old English -->
      <rect x="610" y="275" width="200" height="40" rx="6" fill="var(--bg-card)" stroke="var(--accent-blue)" stroke-width="1.5" />
      <text x="710" y="292" fill="var(--accent-blue)" font-size="10.5" text-anchor="middle" font-weight="600">Old English</text>
      <text x="710" y="306" fill="var(--text-muted)" font-size="8.5" text-anchor="middle">450-1100 | Beowulf ~8th-10th c.</text>

      <!-- Hildebrandslied -->
      <text x="210" y="350" fill="var(--text-secondary)" font-size="8" text-anchor="middle">Hildebrandslied ~830</text>

      <!-- Norse contact (English) -->
      <rect x="570" y="350" width="280" height="36" rx="6" fill="var(--bg-card)" stroke="var(--accent-red)" stroke-width="2" />
      <text x="710" y="365" fill="var(--accent-red)" font-size="10" text-anchor="middle" font-weight="700">Norse Contact / Danelaw ~9th c.</text>
      <text x="710" y="379" fill="var(--text-secondary)" font-size="8" text-anchor="middle">Accelerates case loss | they/them/their borrowed</text>

      <!-- Divergence arrow 2 -->
      <line x1="570" y1="368" x2="380" y2="368" stroke="var(--accent-red)" stroke-width="1" stroke-dasharray="4 3" />
      <text x="475" y="360" fill="var(--accent-red)" font-size="7.5" text-anchor="middle">English begins losing cases</text>

      <!-- Norman Conquest -->
      <rect x="570" y="412" width="280" height="45" rx="6" fill="var(--bg-card)" stroke="var(--accent-red)" stroke-width="2.5" />
      <text x="710" y="428" fill="var(--accent-red)" font-size="11" text-anchor="middle" font-weight="700">NORMAN CONQUEST 1066</text>
      <text x="710" y="442" fill="var(--text-secondary)" font-size="8.5" text-anchor="middle">10,000+ French words flood English</text>
      <text x="710" y="453" fill="var(--text-muted)" font-size="7.5" text-anchor="middle">Case collapse | Gender loss | French prestige layer</text>

      <!-- Divergence arrow 3 -->
      <line x1="570" y1="435" x2="380" y2="435" stroke="var(--accent-red)" stroke-width="1.5" stroke-dasharray="5 3" />
      <text x="475" y="445" fill="var(--accent-red)" font-size="7.5" text-anchor="middle">Massive vocabulary divergence</text>

      <!-- German: no contact events -->
      <rect x="100" y="395" width="220" height="30" rx="5" fill="var(--bg-secondary)" stroke="var(--accent-green)" stroke-width="1" opacity="0.8" />
      <text x="210" y="414" fill="var(--accent-green)" font-size="9" text-anchor="middle" font-style="italic">German: NO equivalent contact events</text>

      <!-- MHG -->
      <rect x="110" y="470" width="200" height="40" rx="6" fill="var(--bg-card)" stroke="var(--accent-gold)" stroke-width="1.5" />
      <text x="210" y="487" fill="var(--accent-gold)" font-size="10.5" text-anchor="middle" font-weight="600">Middle High German</text>
      <text x="210" y="500" fill="var(--text-muted)" font-size="8.5" text-anchor="middle">1050-1350</text>

      <text x="210" y="523" fill="var(--text-secondary)" font-size="8.5" text-anchor="middle">Nibelungenlied ~1200 | Minnesang</text>
      <text x="210" y="536" fill="var(--text-secondary)" font-size="8" text-anchor="middle">Umlaut phonemicized | Vowel reduction begins</text>

      <!-- Middle English -->
      <rect x="610" y="480" width="200" height="40" rx="6" fill="var(--bg-card)" stroke="var(--accent-blue)" stroke-width="1.5" />
      <text x="710" y="497" fill="var(--accent-blue)" font-size="10.5" text-anchor="middle" font-weight="600">Middle English</text>
      <text x="710" y="510" fill="var(--text-muted)" font-size="8.5" text-anchor="middle">1100-1500</text>

      <text x="710" y="530" fill="var(--text-secondary)" font-size="8" text-anchor="middle">Canterbury Tales ~1400</text>
      <text x="710" y="543" fill="var(--text-muted)" font-size="8" text-anchor="middle">Hybrid vocabulary established</text>

      <!-- ENHG + Luther -->
      <rect x="80" y="625" width="260" height="55" rx="6" fill="var(--bg-card)" stroke="var(--accent-gold)" stroke-width="2" />
      <text x="210" y="643" fill="var(--accent-gold)" font-size="11" text-anchor="middle" font-weight="700">Early New High German</text>
      <text x="210" y="658" fill="var(--text-secondary)" font-size="9" text-anchor="middle">Luther's Bible 1522/1534</text>
      <text x="210" y="671" fill="var(--text-muted)" font-size="8" text-anchor="middle">Creates supra-regional written standard</text>

      <!-- Early Modern English + GVS -->
      <rect x="570" y="615" width="280" height="55" rx="6" fill="var(--bg-card)" stroke="var(--accent-blue)" stroke-width="2" />
      <text x="710" y="633" fill="var(--accent-blue)" font-size="11" text-anchor="middle" font-weight="700">Early Modern English</text>
      <text x="710" y="648" fill="var(--text-secondary)" font-size="9" text-anchor="middle">Great Vowel Shift 1400-1700</text>
      <text x="710" y="661" fill="var(--text-muted)" font-size="8" text-anchor="middle">Spelling frozen during shift = opaque orthography</text>

      <!-- KJV -->
      <text x="710" y="695" fill="var(--text-secondary)" font-size="8.5" text-anchor="middle">KJV 1611 | Shakespeare</text>

      <!-- Codification -->
      <rect x="100" y="830" width="220" height="60" rx="6" fill="var(--bg-card)" stroke="var(--accent-gold)" stroke-width="1.5" />
      <text x="210" y="848" fill="var(--accent-gold)" font-size="10" text-anchor="middle" font-weight="600">Codification</text>
      <text x="210" y="862" fill="var(--text-secondary)" font-size="8.5" text-anchor="middle">Duden spelling 1880</text>
      <text x="210" y="875" fill="var(--text-secondary)" font-size="8.5" text-anchor="middle">Siebs pronunciation 1898</text>
      <text x="210" y="885" fill="var(--text-muted)" font-size="7.5" text-anchor="middle">Phonetic spelling codified AFTER sound changes</text>

      <rect x="600" y="760" width="220" height="55" rx="6" fill="var(--bg-card)" stroke="var(--accent-blue)" stroke-width="1.5" />
      <text x="710" y="778" fill="var(--accent-blue)" font-size="10" text-anchor="middle" font-weight="600">Codification</text>
      <text x="710" y="792" fill="var(--text-secondary)" font-size="8.5" text-anchor="middle">Johnson's Dictionary 1755</text>
      <text x="710" y="805" fill="var(--text-muted)" font-size="7.5" text-anchor="middle">Spelling frozen DURING sound changes</text>

      <!-- Divergence arrow 4 -->
      <line x1="570" y1="645" x2="340" y2="645" stroke="var(--accent-red)" stroke-width="1" stroke-dasharray="4 3" />
      <text x="455" y="636" fill="var(--accent-red)" font-size="7.5" text-anchor="middle">GVS decouples English spelling</text>

      <!-- Modern endpoints -->
      <rect x="80" y="905" width="260" height="55" rx="8" fill="var(--bg-card)" stroke="var(--accent-gold)" stroke-width="2.5" />
      <text x="210" y="923" fill="var(--accent-gold)" font-size="13" text-anchor="middle" font-weight="700">Modern Standard German</text>
      <text x="210" y="938" fill="var(--text-secondary)" font-size="8.5" text-anchor="middle">4 cases | 3 genders | V2 | phonetic spelling</text>
      <text x="210" y="951" fill="var(--text-secondary)" font-size="8.5" text-anchor="middle">Germanic vocabulary | adjective declension</text>

      <rect x="570" y="905" width="280" height="55" rx="8" fill="var(--bg-card)" stroke="var(--accent-blue)" stroke-width="2.5" />
      <text x="710" y="923" fill="var(--accent-blue)" font-size="13" text-anchor="middle" font-weight="700">Modern English</text>
      <text x="710" y="938" fill="var(--text-secondary)" font-size="8.5" text-anchor="middle">No cases | No gender | SVO | opaque spelling</text>
      <text x="710" y="951" fill="var(--text-secondary)" font-size="8.5" text-anchor="middle">Hybrid vocabulary | invariable adjectives</text>

      <!-- Sibling link at bottom -->
      <line x1="340" y1="930" x2="570" y2="930" stroke="var(--accent-gold)" stroke-width="1.5" stroke-dasharray="5 3" />
      <text x="455" y="925" fill="var(--accent-gold)" font-size="8.5" text-anchor="middle" font-weight="600">Still siblings -- every difference has a cause</text>

    </svg>
  </div>

  <figcaption>
    Figure 5: Parallel timelines showing how German and English diverged from a common starting point. The timelines converge at the top (shared ancestry) and diverge as historical events accumulate. Each divergence point has a specific, identifiable cause. German's complexity is mostly retentive; English's simplicity is mostly innovative.
  </figcaption>
</figure>
</body>
</html>
