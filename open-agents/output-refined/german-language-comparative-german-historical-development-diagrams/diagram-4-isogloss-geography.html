<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Isogloss Geography -- Benrath Line, Speyer Line, and the Dialect Gradient</title>
<style>
  :root {
    --bg-primary: #1a1a2e;
    --bg-secondary: #16213e;
    --bg-card: #1e2a4a;
    --text-primary: #e0e0e0;
    --text-secondary: #a0a0b8;
    --text-muted: #707088;
    --accent-gold: #f0c040;
    --accent-blue: #4a9eff;
    --accent-green: #50c878;
    --accent-red: #e06060;
    --accent-purple: #b080e0;
    --accent-orange: #e0943a;
    --accent-cyan: #40c8e0;
    --border-subtle: #2a3a5a;
    --zone-north: #2a4a6a;
    --zone-central: #3a4a3a;
    --zone-south: #4a3a2a;
  }

  @media (prefers-color-scheme: light) {
    :root {
      --bg-primary: #f5f5f0;
      --bg-secondary: #eaeae5;
      --bg-card: #ffffff;
      --text-primary: #1a1a2e;
      --text-secondary: #4a4a60;
      --text-muted: #7a7a90;
      --accent-gold: #c09020;
      --accent-blue: #2070d0;
      --accent-green: #208050;
      --accent-red: #c04040;
      --accent-purple: #8050b0;
      --accent-orange: #c07020;
      --accent-cyan: #1090a0;
      --border-subtle: #d0d0d0;
      --zone-north: #d0e0f0;
      --zone-central: #d8e8d8;
      --zone-south: #f0e0d0;
    }
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg-primary);
    color: var(--text-primary);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    padding: 2rem 1rem;
    min-height: 100vh;
  }

  .diagram-container {
    max-width: 880px;
    margin: 0 auto;
  }

  h1 {
    text-align: center;
    font-size: 1.4rem;
    color: var(--accent-gold);
    margin-bottom: 0.3rem;
  }

  .subtitle {
    text-align: center;
    font-size: 0.9rem;
    color: var(--text-secondary);
    margin-bottom: 1.5rem;
  }

  .map-container {
    position: relative;
    width: 100%;
    max-width: 820px;
    margin: 0 auto;
  }

  .map-svg {
    width: 100%;
    height: auto;
  }

  .zone-comparison {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0.8rem;
    margin-top: 1.2rem;
  }

  .zone-card {
    padding: 0.9rem;
    border-radius: 8px;
    border: 1px solid var(--border-subtle);
  }

  .zone-north-card { background: var(--zone-north); }
  .zone-central-card { background: var(--zone-central); }
  .zone-south-card { background: var(--zone-south); }

  .zone-title {
    font-weight: 700;
    font-size: 0.9rem;
    margin-bottom: 0.5rem;
  }

  .zone-north-card .zone-title { color: var(--accent-blue); }
  .zone-central-card .zone-title { color: var(--accent-green); }
  .zone-south-card .zone-title { color: var(--accent-orange); }

  .zone-words {
    font-size: 0.85rem;
    line-height: 1.7;
    color: var(--text-secondary);
  }

  .zone-words strong {
    color: var(--text-primary);
  }

  .zone-note {
    font-size: 0.72rem;
    color: var(--text-muted);
    margin-top: 0.4rem;
    font-style: italic;
  }

  .insight-box {
    margin-top: 1.2rem;
    padding: 0.9rem 1rem;
    background: var(--bg-secondary);
    border-left: 4px solid var(--accent-blue);
    border-radius: 0 8px 8px 0;
    font-size: 0.88rem;
    color: var(--text-secondary);
    line-height: 1.5;
  }

  .insight-box strong {
    color: var(--accent-blue);
  }

  figcaption {
    text-align: center;
    font-size: 0.85rem;
    color: var(--text-muted);
    margin-top: 1rem;
    font-style: italic;
    line-height: 1.5;
  }

  @media (max-width: 650px) {
    .zone-comparison { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<figure class="diagram-container">
  <h1>Isogloss Geography</h1>
  <p class="subtitle">How the consonant shift carved Germany into three dialect zones</p>

  <div class="map-container">
    <svg class="map-svg" viewBox="0 0 800 520" xmlns="http://www.w3.org/2000/svg">

      <!-- Simplified outline of German-speaking territory -->
      <path d="M120,30 L350,15 L600,20 L720,50 L740,150 L730,250 L710,340 L650,400 L550,450 L450,480 L350,490 L250,470 L180,430 L130,370 L100,280 L90,200 L100,120 Z"
            fill="none" stroke="var(--border-subtle)" stroke-width="2" opacity="0.6" />

      <!-- North Zone (Low German) - blue tint -->
      <path d="M120,30 L350,15 L600,20 L720,50 L740,150 L730,180 L100,180 L100,120 Z"
            fill="var(--zone-north)" opacity="0.4" />

      <!-- Central Zone - green tint -->
      <path d="M100,180 L730,180 L720,320 L95,320 Z"
            fill="var(--zone-central)" opacity="0.35" />

      <!-- South Zone (Upper German) - orange tint -->
      <path d="M95,320 L720,320 L710,340 L650,400 L550,450 L450,480 L350,490 L250,470 L180,430 L130,370 L100,280 Z"
            fill="var(--zone-south)" opacity="0.35" />

      <!-- Compass arrow -->
      <text x="50" y="60" fill="var(--text-muted)" font-size="11" font-weight="700">N</text>
      <line x1="55" y1="65" x2="55" y2="100" stroke="var(--text-muted)" stroke-width="1.5" />
      <polygon points="55,62 50,72 60,72" fill="var(--text-muted)" />
      <text x="50" y="113" fill="var(--text-muted)" font-size="11" font-weight="700">S</text>

      <!-- North Sea coast label -->
      <text x="130" y="55" fill="var(--accent-blue)" font-size="10" font-weight="600" opacity="0.8">North Sea Coast</text>

      <!-- BENRATH LINE -->
      <line x1="85" y1="180" x2="745" y2="180" stroke="var(--accent-red)" stroke-width="3.5" />
      <rect x="280" y="160" width="260" height="22" rx="4" fill="var(--bg-primary)" stroke="var(--accent-red)" stroke-width="1.5" opacity="0.95" />
      <text x="410" y="175" fill="var(--accent-red)" font-size="11" font-weight="700" text-anchor="middle">BENRATH LINE -- maken / machen (k&rarr;ch)</text>

      <!-- Düsseldorf marker -->
      <circle cx="210" cy="180" r="5" fill="var(--accent-red)" />
      <text x="215" y="200" fill="var(--accent-red)" font-size="9" font-weight="600">D&uuml;sseldorf</text>

      <!-- Berlin marker (north of Benrath) -->
      <circle cx="560" cy="120" r="4" fill="var(--text-muted)" />
      <text x="570" y="125" fill="var(--text-muted)" font-size="9">Berlin</text>

      <!-- Hamburg marker -->
      <circle cx="380" cy="70" r="4" fill="var(--text-muted)" />
      <text x="390" y="75" fill="var(--text-muted)" font-size="9">Hamburg</text>

      <!-- SPEYER LINE -->
      <line x1="85" y1="320" x2="735" y2="320" stroke="var(--accent-orange)" stroke-width="3.5" />
      <rect x="280" y="300" width="260" height="22" rx="4" fill="var(--bg-primary)" stroke="var(--accent-orange)" stroke-width="1.5" opacity="0.95" />
      <text x="410" y="315" fill="var(--accent-orange)" font-size="11" font-weight="700" text-anchor="middle">SPEYER LINE -- Appel / Apfel (pp&rarr;pf)</text>

      <!-- Speyer marker -->
      <circle cx="230" cy="320" r="5" fill="var(--accent-orange)" />
      <text x="235" y="340" fill="var(--accent-orange)" font-size="9" font-weight="600">Speyer</text>

      <!-- Frankfurt marker (between lines) -->
      <circle cx="240" cy="250" r="4" fill="var(--text-muted)" />
      <text x="250" y="255" fill="var(--text-muted)" font-size="9">Frankfurt</text>

      <!-- Wittenberg / Luther region -->
      <circle cx="520" cy="230" r="4" fill="var(--accent-green)" />
      <text x="530" y="235" fill="var(--accent-green)" font-size="9" font-weight="600">Wittenberg</text>
      <rect x="480" y="242" width="130" height="16" rx="3" fill="var(--bg-primary)" stroke="var(--accent-green)" stroke-width="1" opacity="0.9" />
      <text x="545" y="254" fill="var(--accent-green)" font-size="8" text-anchor="middle" font-weight="600">Luther's Bible region</text>

      <!-- Munich marker (south) -->
      <circle cx="460" cy="410" r="4" fill="var(--text-muted)" />
      <text x="470" y="415" fill="var(--text-muted)" font-size="9">Munich</text>

      <!-- Vienna marker -->
      <circle cx="640" cy="370" r="4" fill="var(--text-muted)" />
      <text x="650" y="375" fill="var(--text-muted)" font-size="9">Vienna</text>

      <!-- Rhenish Fan visualization -->
      <!-- Multiple fanning lines near the Rhine -->
      <line x1="195" y1="180" x2="160" y2="220" stroke="var(--accent-purple)" stroke-width="1" opacity="0.5" />
      <line x1="195" y1="180" x2="175" y2="230" stroke="var(--accent-purple)" stroke-width="1" opacity="0.5" />
      <line x1="195" y1="180" x2="190" y2="240" stroke="var(--accent-purple)" stroke-width="1" opacity="0.5" />
      <line x1="195" y1="180" x2="200" y2="250" stroke="var(--accent-purple)" stroke-width="1" opacity="0.5" />
      <line x1="195" y1="180" x2="210" y2="260" stroke="var(--accent-purple)" stroke-width="1" opacity="0.5" />
      <line x1="195" y1="180" x2="215" y2="270" stroke="var(--accent-purple)" stroke-width="1" opacity="0.5" />
      <line x1="195" y1="180" x2="220" y2="280" stroke="var(--accent-purple)" stroke-width="1" opacity="0.5" />
      <line x1="195" y1="180" x2="225" y2="300" stroke="var(--accent-purple)" stroke-width="1" opacity="0.5" />

      <rect x="100" y="265" width="85" height="30" rx="4" fill="var(--bg-primary)" stroke="var(--accent-purple)" stroke-width="1" opacity="0.9" />
      <text x="142" y="278" fill="var(--accent-purple)" font-size="8" text-anchor="middle" font-weight="600">Rhenish Fan</text>
      <text x="142" y="289" fill="var(--accent-purple)" font-size="7" text-anchor="middle">8 fanning isoglosses</text>

      <!-- Zone labels -->
      <rect x="590" y="95" width="120" height="50" rx="6" fill="var(--bg-primary)" stroke="var(--accent-blue)" stroke-width="1.5" opacity="0.9" />
      <text x="650" y="112" fill="var(--accent-blue)" font-size="11" font-weight="700" text-anchor="middle">LOW GERMAN</text>
      <text x="650" y="126" fill="var(--text-secondary)" font-size="8.5" text-anchor="middle">No shift: water, maken</text>
      <text x="650" y="138" fill="var(--accent-blue)" font-size="8" text-anchor="middle" font-style="italic">Like English</text>

      <rect x="590" y="225" width="120" height="50" rx="6" fill="var(--bg-primary)" stroke="var(--accent-green)" stroke-width="1.5" opacity="0.9" />
      <text x="650" y="242" fill="var(--accent-green)" font-size="11" font-weight="700" text-anchor="middle">CENTRAL</text>
      <text x="650" y="256" fill="var(--text-secondary)" font-size="8.5" text-anchor="middle">Partial: Wasser, machen</text>
      <text x="650" y="268" fill="var(--accent-green)" font-size="8" text-anchor="middle" font-style="italic">Standard German basis</text>

      <rect x="590" y="370" width="120" height="50" rx="6" fill="var(--bg-primary)" stroke="var(--accent-orange)" stroke-width="1.5" opacity="0.9" />
      <text x="650" y="387" fill="var(--accent-orange)" font-size="11" font-weight="700" text-anchor="middle">UPPER GERMAN</text>
      <text x="650" y="401" fill="var(--text-secondary)" font-size="8.5" text-anchor="middle">Maximum: Apfel, Kchind</text>
      <text x="650" y="413" fill="var(--accent-orange)" font-size="8" text-anchor="middle" font-style="italic">Most different from English</text>

      <!-- Migration annotation -->
      <rect x="130" y="85" width="200" height="26" rx="5" fill="var(--bg-primary)" stroke="var(--accent-cyan)" stroke-width="1.5" opacity="0.95" />
      <text x="230" y="102" fill="var(--accent-cyan)" font-size="9.5" text-anchor="middle" font-weight="700">English ancestors migrated from HERE</text>
      <line x1="230" y1="111" x2="230" y2="125" stroke="var(--accent-cyan)" stroke-width="1.5" />
      <polygon points="230,130 225,122 235,122" fill="var(--accent-cyan)" />

      <!-- Gradient arrow on left -->
      <defs>
        <linearGradient id="gradient-shift" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="var(--accent-blue)" />
          <stop offset="50%" stop-color="var(--accent-green)" />
          <stop offset="100%" stop-color="var(--accent-orange)" />
        </linearGradient>
      </defs>
      <rect x="60" y="150" width="12" height="300" rx="6" fill="url(#gradient-shift)" opacity="0.6" />
      <text x="45" y="165" fill="var(--accent-blue)" font-size="7.5" text-anchor="middle" font-weight="600">Less</text>
      <text x="45" y="175" fill="var(--accent-blue)" font-size="7.5" text-anchor="middle" font-weight="600">shift</text>
      <text x="45" y="430" fill="var(--accent-orange)" font-size="7.5" text-anchor="middle" font-weight="600">More</text>
      <text x="45" y="440" fill="var(--accent-orange)" font-size="7.5" text-anchor="middle" font-weight="600">shift</text>

    </svg>
  </div>

  <div class="zone-comparison">
    <div class="zone-card zone-north-card">
      <div class="zone-title">Low German (North)</div>
      <div class="zone-words">
        <strong>water</strong> (not Wasser)<br>
        <strong>maken</strong> (not machen)<br>
        <strong>Appel</strong> (not Apfel)<br>
        <strong>Pund</strong> (not Pfund)
      </div>
      <div class="zone-note">No consonant shift at all -- closest to English</div>
    </div>
    <div class="zone-card zone-central-card">
      <div class="zone-title">Central German (Middle)</div>
      <div class="zone-words">
        <strong>Wasser</strong> (t&rarr;ss)<br>
        <strong>machen</strong> (k&rarr;ch)<br>
        <strong>Appel/Apfel</strong> (varies)<br>
        <strong>Kind</strong> (not Kchind)
      </div>
      <div class="zone-note">Partial shift -- basis for Standard German</div>
    </div>
    <div class="zone-card zone-south-card">
      <div class="zone-title">Upper German (South)</div>
      <div class="zone-words">
        <strong>Wasser</strong> (t&rarr;ss)<br>
        <strong>machen</strong> (k&rarr;ch)<br>
        <strong>Apfel</strong> (pp&rarr;pf)<br>
        <strong>Kchind</strong> (k&rarr;kch)
      </div>
      <div class="zone-note">Maximum shift -- most different from English</div>
    </div>
  </div>

  <div class="insight-box">
    <strong>Why this matters:</strong> Standard German (Hochdeutsch) is based on Central German -- the compromise zone. This is why Standard German has <em>some</em> shifts (Wasser, machen, zehn) but not others (Kind, not Kchind). English phonologically sits on the same side as Low German -- both preserve the pre-shift consonants. An English speaker reading Low German finds it far more recognizable than Standard German.
  </div>

  <figcaption>
    Figure 4: Schematic map of the German-speaking territory showing how the High German Consonant Shift created a north-south gradient. The Benrath Line (red) and Speyer Line (orange) divide the territory into three zones. The consonant shift was a wave, not a binary event.
  </figcaption>
</figure>
</body>
</html>
