<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Germanic Family Tree</title>
<style>
  :root {
    --bg-primary: #1a1a2e;
    --bg-secondary: #16213e;
    --bg-card: #1e2a4a;
    --text-primary: #e0e0e0;
    --text-secondary: #a0a0b8;
    --text-muted: #707088;
    --accent-gold: #f0c040;
    --accent-blue: #4a9eff;
    --accent-green: #50c878;
    --accent-red: #e06060;
    --accent-purple: #b080e0;
    --accent-orange: #e0943a;
    --border-subtle: #2a3a5a;
    --line-color: #405070;
  }

  @media (prefers-color-scheme: light) {
    :root {
      --bg-primary: #f5f5f0;
      --bg-secondary: #eaeae5;
      --bg-card: #ffffff;
      --text-primary: #1a1a2e;
      --text-secondary: #4a4a60;
      --text-muted: #7a7a90;
      --accent-gold: #c09020;
      --accent-blue: #2070d0;
      --accent-green: #208050;
      --accent-red: #c04040;
      --accent-purple: #8050b0;
      --accent-orange: #c07020;
      --border-subtle: #d0d0d0;
      --line-color: #a0a0b0;
    }
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg-primary);
    color: var(--text-primary);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    padding: 2rem 1rem;
    min-height: 100vh;
  }

  .diagram-container {
    max-width: 1100px;
    margin: 0 auto;
  }

  h1 {
    text-align: center;
    font-size: 1.6rem;
    color: var(--accent-gold);
    margin-bottom: 0.3rem;
  }

  .subtitle {
    text-align: center;
    font-size: 0.95rem;
    color: var(--text-secondary);
    margin-bottom: 2rem;
  }

  .tree-svg {
    width: 100%;
    height: auto;
  }

  .node-box {
    fill: var(--bg-card);
    stroke: var(--border-subtle);
    stroke-width: 1.5;
    rx: 6;
  }

  .node-box.highlight-west {
    stroke: var(--accent-blue);
    stroke-width: 2.5;
    fill: var(--bg-secondary);
  }

  .node-box.highlight-target {
    stroke: var(--accent-gold);
    stroke-width: 3;
  }

  .node-box.extinct {
    stroke: var(--accent-red);
    stroke-width: 1.5;
    stroke-dasharray: 6 3;
  }

  .node-label {
    fill: var(--text-primary);
    font-size: 12px;
    font-weight: 600;
    text-anchor: middle;
    dominant-baseline: central;
  }

  .node-sublabel {
    fill: var(--text-secondary);
    font-size: 9.5px;
    text-anchor: middle;
    dominant-baseline: central;
  }

  .branch-line {
    stroke: var(--line-color);
    stroke-width: 1.8;
    fill: none;
  }

  .branch-line.highlight {
    stroke: var(--accent-blue);
    stroke-width: 2.5;
  }

  .annotation-box {
    fill: var(--bg-card);
    stroke: var(--accent-orange);
    stroke-width: 1.5;
    rx: 4;
    opacity: 0.95;
  }

  .annotation-text {
    fill: var(--accent-orange);
    font-size: 9.5px;
    font-weight: 600;
    text-anchor: middle;
    dominant-baseline: central;
  }

  .event-marker {
    fill: var(--accent-red);
    font-size: 9px;
    font-weight: 600;
    text-anchor: middle;
  }

  .date-label {
    fill: var(--text-muted);
    font-size: 8.5px;
    text-anchor: middle;
    dominant-baseline: central;
  }

  .legend {
    display: flex;
    justify-content: center;
    gap: 1.5rem;
    flex-wrap: wrap;
    margin-top: 1.5rem;
    padding: 0.8rem;
    background: var(--bg-secondary);
    border-radius: 8px;
    border: 1px solid var(--border-subtle);
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.8rem;
    color: var(--text-secondary);
  }

  .legend-swatch {
    width: 14px;
    height: 14px;
    border-radius: 3px;
    border: 2px solid;
  }

  figcaption {
    text-align: center;
    font-size: 0.85rem;
    color: var(--text-muted);
    margin-top: 1rem;
    font-style: italic;
    line-height: 1.5;
    max-width: 750px;
    margin-left: auto;
    margin-right: auto;
  }
</style>
</head>
<body>
<figure class="diagram-container">
  <h1>The Germanic Family Tree</h1>
  <p class="subtitle">Where German and English sit among the Germanic languages</p>

  <svg class="tree-svg" viewBox="0 0 1080 720" xmlns="http://www.w3.org/2000/svg">

    <!-- PIE Root -->
    <rect class="node-box" x="410" y="10" width="260" height="40" />
    <text class="node-label" x="540" y="26">Proto-Indo-European</text>
    <text class="node-sublabel" x="540" y="40">Grimm's Law applies here (1st Sound Shift)</text>

    <!-- Arrow down to Proto-Germanic -->
    <line class="branch-line" x1="540" y1="50" x2="540" y2="72" />
    <text class="date-label" x="580" y="64">~500 BCE</text>

    <!-- Proto-Germanic -->
    <rect class="node-box highlight-west" x="430" y="72" width="220" height="38" />
    <text class="node-label" x="540" y="88">Proto-Germanic</text>
    <text class="node-sublabel" x="540" y="100">~500 BCE -- 200 CE</text>

    <!-- Three-way split lines -->
    <line class="branch-line" x1="540" y1="110" x2="540" y2="130" />
    <line class="branch-line" x1="170" y1="130" x2="910" y2="130" />
    <line class="branch-line" x1="170" y1="130" x2="170" y2="150" />
    <line class="branch-line highlight" x1="540" y1="130" x2="540" y2="150" />
    <line class="branch-line" x1="910" y1="130" x2="910" y2="150" />

    <!-- North Germanic -->
    <rect class="node-box" x="80" y="150" width="180" height="38" />
    <text class="node-label" x="170" y="166">North Germanic</text>
    <text class="node-sublabel" x="170" y="178">Scandinavian</text>

    <!-- East Germanic -->
    <rect class="node-box extinct" x="820" y="150" width="180" height="38" />
    <text class="node-label" x="910" y="166">East Germanic</text>
    <text class="node-sublabel" x="910" y="178">extinct branch</text>

    <!-- West Germanic -->
    <rect class="node-box highlight-west" x="430" y="150" width="220" height="38" />
    <text class="node-label" x="540" y="166">West Germanic</text>
    <text class="node-sublabel" x="540" y="178">English, German, Dutch, Frisian</text>

    <!-- North Germanic children -->
    <line class="branch-line" x1="170" y1="188" x2="170" y2="210" />
    <line class="branch-line" x1="80" y1="210" x2="260" y2="210" />
    <line class="branch-line" x1="80" y1="210" x2="80" y2="225" />
    <line class="branch-line" x1="170" y1="210" x2="170" y2="225" />
    <line class="branch-line" x1="260" y1="210" x2="260" y2="225" />

    <rect class="node-box" x="20" y="225" width="120" height="32" />
    <text class="node-label" x="80" y="237">Old Norse</text>
    <text class="node-sublabel" x="80" y="249">~200 CE</text>

    <!-- Old Norse children -->
    <line class="branch-line" x1="80" y1="257" x2="80" y2="275" />
    <line class="branch-line" x1="25" y1="275" x2="135" y2="275" />

    <line class="branch-line" x1="25" y1="275" x2="25" y2="290" />
    <line class="branch-line" x1="80" y1="275" x2="80" y2="290" />
    <line class="branch-line" x1="135" y1="275" x2="135" y2="290" />

    <rect class="node-box" x="5" y="290" width="42" height="50" />
    <text class="node-sublabel" x="26" y="307" style="font-size:8px">Swedish</text>
    <text class="node-sublabel" x="26" y="319" style="font-size:8px">Norwegian</text>
    <text class="node-sublabel" x="26" y="331" style="font-size:8px">Danish</text>

    <rect class="node-box" x="56" y="290" width="50" height="38" />
    <text class="node-sublabel" x="81" y="306" style="font-size:8.5px">Icelandic</text>
    <text class="node-sublabel" x="81" y="318" style="font-size:7.5px;fill:var(--accent-green)">(4 cases!)</text>

    <rect class="node-box" x="113" y="290" width="46" height="38" />
    <text class="node-sublabel" x="136" y="309" style="font-size:8.5px">Faroese</text>

    <!-- East Germanic children -->
    <line class="branch-line" x1="910" y1="188" x2="910" y2="215" />

    <rect class="node-box extinct" x="845" y="215" width="130" height="50" />
    <text class="node-label" x="910" y="232" style="fill:var(--accent-red)">Gothic</text>
    <text class="node-sublabel" x="910" y="244">Wulfila's Bible ~360 CE</text>
    <text class="node-sublabel" x="910" y="256" style="fill:var(--accent-red);font-size:8px">Crimean Gothic last speaker ~1700s</text>

    <!-- West Germanic split - the main event -->
    <line class="branch-line highlight" x1="540" y1="188" x2="540" y2="215" />
    <line class="branch-line highlight" x1="310" y1="215" x2="720" y2="215" />

    <!-- Three sub-branches of West Germanic -->
    <line class="branch-line highlight" x1="310" y1="215" x2="310" y2="240" />
    <line class="branch-line highlight" x1="540" y1="215" x2="540" y2="240" />
    <line class="branch-line" x1="720" y1="215" x2="720" y2="240" />

    <!-- Ingvaeonic / North Sea Germanic -->
    <rect class="node-box highlight-west" x="210" y="240" width="200" height="42" />
    <text class="node-label" x="310" y="254" style="font-size:11px">Ingvaeonic</text>
    <text class="node-sublabel" x="310" y="268">North Sea Germanic</text>
    <text class="node-sublabel" x="310" y="278" style="font-size:8px;fill:var(--accent-green)">Unshifted consonants</text>

    <!-- High German -->
    <rect class="node-box highlight-west" x="440" y="240" width="200" height="42" />
    <text class="node-label" x="540" y="254" style="font-size:11px">High German</text>
    <text class="node-sublabel" x="540" y="268">Southern uplands</text>

    <!-- HGCS annotation -->
    <rect class="annotation-box" x="460" y="286" width="160" height="22" />
    <text class="annotation-text" x="540" y="298" style="font-size:8.5px">HGCS (~3rd-8th c. CE)</text>

    <!-- Low Franconian -->
    <rect class="node-box" x="660" y="240" width="120" height="42" />
    <text class="node-label" x="720" y="257" style="font-size:11px">Low Franconian</text>
    <text class="node-sublabel" x="720" y="272">Rhine delta</text>

    <!-- Ingvaeonic children -->
    <line class="branch-line highlight" x1="310" y1="282" x2="310" y2="310" />
    <line class="branch-line highlight" x1="225" y1="310" x2="395" y2="310" />
    <line class="branch-line highlight" x1="225" y1="310" x2="225" y2="330" />
    <line class="branch-line" x1="310" y1="310" x2="310" y2="330" />
    <line class="branch-line" x1="395" y1="310" x2="395" y2="330" />

    <!-- Old English -->
    <rect class="node-box highlight-target" x="155" y="330" width="140" height="38" />
    <text class="node-label" x="225" y="343" style="color:var(--accent-gold)">Old English</text>
    <text class="node-sublabel" x="225" y="358">Anglo-Saxon</text>

    <!-- Migration annotation -->
    <rect class="annotation-box" x="115" y="370" width="220" height="20" style="stroke:var(--accent-red);" />
    <text class="annotation-text" x="225" y="381" style="fill:var(--accent-red);font-size:8.5px">Migration to Britain ~450 CE</text>

    <!-- Old Frisian -->
    <rect class="node-box" x="265" y="330" width="90" height="38" />
    <text class="node-label" x="310" y="346" style="font-size:10px">Old Frisian</text>
    <text class="node-sublabel" x="310" y="358" style="font-size:8px">closest to OE</text>

    <!-- Old Saxon / Low German -->
    <rect class="node-box" x="355" y="330" width="80" height="38" />
    <text class="node-label" x="395" y="343" style="font-size:9.5px">Old Saxon</text>
    <text class="node-sublabel" x="395" y="358" style="font-size:8px">Low German</text>

    <!-- High German branch down -->
    <line class="branch-line highlight" x1="540" y1="308" x2="540" y2="330" />

    <!-- OHG -->
    <rect class="node-box highlight-west" x="460" y="330" width="160" height="38" />
    <text class="node-label" x="540" y="343">Old High German</text>
    <text class="node-sublabel" x="540" y="358">750-1050 CE</text>

    <!-- Low Franconian children -->
    <line class="branch-line" x1="720" y1="282" x2="720" y2="330" />

    <rect class="node-box" x="670" y="330" width="100" height="38" />
    <text class="node-label" x="720" y="346" style="font-size:11px">Dutch</text>
    <text class="node-sublabel" x="720" y="358" style="font-size:8px">Flemish</text>

    <!-- Middle stages -->
    <!-- Old English → Middle English -->
    <line class="branch-line highlight" x1="225" y1="390" x2="225" y2="430" />
    <rect class="node-box highlight-target" x="145" y="430" width="160" height="38" />
    <text class="node-label" x="225" y="443">Middle English</text>
    <text class="node-sublabel" x="225" y="458">1100-1500</text>

    <!-- Contact events -->
    <rect class="annotation-box" x="50" y="400" width="130" height="32" style="stroke:var(--accent-red);" />
    <text class="annotation-text" x="115" y="412" style="fill:var(--accent-red);font-size:8px">Norse contact 9th c.</text>
    <text class="annotation-text" x="115" y="424" style="fill:var(--accent-red);font-size:8px">Norman Conquest 1066</text>

    <!-- OHG → MHG -->
    <line class="branch-line highlight" x1="540" y1="368" x2="540" y2="430" />
    <rect class="node-box highlight-west" x="450" y="430" width="180" height="38" />
    <text class="node-label" x="540" y="443">Middle High German</text>
    <text class="node-sublabel" x="540" y="458">1050-1350</text>

    <!-- MHG annotation -->
    <rect class="annotation-box" x="640" y="438" width="140" height="22" style="stroke:var(--accent-green);" />
    <text class="annotation-text" x="710" y="450" style="fill:var(--accent-green);font-size:8px">Nibelungenlied ~1200</text>

    <!-- ME → Early Modern English -->
    <line class="branch-line highlight" x1="225" y1="468" x2="225" y2="510" />
    <rect class="node-box highlight-target" x="120" y="510" width="210" height="38" />
    <text class="node-label" x="225" y="523">Early Modern English</text>
    <text class="node-sublabel" x="225" y="538">Great Vowel Shift 1400-1700</text>

    <!-- MHG → ENHG -->
    <line class="branch-line highlight" x1="540" y1="468" x2="540" y2="510" />
    <rect class="node-box highlight-west" x="430" y="510" width="220" height="38" />
    <text class="node-label" x="540" y="523">Early New High German</text>
    <text class="node-sublabel" x="540" y="538">Luther's Bible 1522/1534</text>

    <!-- Modern stages -->
    <line class="branch-line highlight" x1="225" y1="548" x2="225" y2="590" />
    <rect class="node-box highlight-target" x="125" y="590" width="200" height="48" />
    <text class="node-label" x="225" y="606" style="fill:var(--accent-gold);font-size:14px">Modern English</text>
    <text class="node-sublabel" x="225" y="622">Analytic, hybrid vocabulary</text>
    <text class="node-sublabel" x="225" y="632" style="font-size:8px">Historical spelling</text>

    <line class="branch-line highlight" x1="540" y1="548" x2="540" y2="590" />
    <rect class="node-box highlight-target" x="420" y="590" width="240" height="48" />
    <text class="node-label" x="540" y="606" style="fill:var(--accent-gold);font-size:14px">Modern Standard German</text>
    <text class="node-sublabel" x="540" y="622">Inflected, Germanic vocabulary</text>
    <text class="node-sublabel" x="540" y="632" style="font-size:8px">Phonetic spelling (Duden 1880)</text>

    <!-- Sibling connector -->
    <line x1="325" y1="614" x2="420" y2="614" stroke="var(--accent-gold)" stroke-width="1.5" stroke-dasharray="5 3" />
    <text x="372" y="608" fill="var(--accent-gold)" font-size="8" text-anchor="middle" font-weight="bold">SIBLINGS</text>

    <!-- Divergence bracket label -->
    <text x="540" y="670" fill="var(--text-muted)" font-size="10" text-anchor="middle" font-style="italic">Same starting point -- different historical paths</text>

  </svg>

  <div class="legend">
    <div class="legend-item">
      <div class="legend-swatch" style="border-color: var(--accent-blue); background: var(--bg-secondary);"></div>
      West Germanic branch
    </div>
    <div class="legend-item">
      <div class="legend-swatch" style="border-color: var(--accent-gold); background: var(--bg-card);"></div>
      English and German (target languages)
    </div>
    <div class="legend-item">
      <div class="legend-swatch" style="border-color: var(--accent-red); background: transparent; border-style: dashed;"></div>
      Extinct languages
    </div>
    <div class="legend-item">
      <div class="legend-swatch" style="border-color: var(--accent-orange); background: var(--bg-card);"></div>
      Key historical events
    </div>
  </div>

  <figcaption>
    Figure 1: The Germanic language family tree, showing how English and German both descend from Proto-Germanic via the West Germanic branch. They are siblings, not parent and child. The High German Consonant Shift is the event that split the West Germanic branch in two.
  </figcaption>
</figure>
</body>
</html>
