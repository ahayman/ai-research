<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Two Sound Shifts -- From Latin to English to German</title>
<style>
  :root {
    --bg-primary: #1a1a2e;
    --bg-secondary: #16213e;
    --bg-card: #1e2a4a;
    --text-primary: #e0e0e0;
    --text-secondary: #a0a0b8;
    --text-muted: #707088;
    --accent-gold: #f0c040;
    --accent-blue: #4a9eff;
    --accent-green: #50c878;
    --accent-red: #e06060;
    --accent-purple: #b080e0;
    --accent-orange: #e0943a;
    --border-subtle: #2a3a5a;
    --layer1-color: #50c878;
    --layer2-color: #e0943a;
  }

  @media (prefers-color-scheme: light) {
    :root {
      --bg-primary: #f5f5f0;
      --bg-secondary: #eaeae5;
      --bg-card: #ffffff;
      --text-primary: #1a1a2e;
      --text-secondary: #4a4a60;
      --text-muted: #7a7a90;
      --accent-gold: #c09020;
      --accent-blue: #2070d0;
      --accent-green: #208050;
      --accent-red: #c04040;
      --accent-purple: #8050b0;
      --accent-orange: #c07020;
      --border-subtle: #d0d0d0;
      --layer1-color: #208050;
      --layer2-color: #c07020;
    }
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg-primary);
    color: var(--text-primary);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    padding: 2rem 1rem;
    min-height: 100vh;
  }

  .diagram-container {
    max-width: 900px;
    margin: 0 auto;
  }

  h1 {
    text-align: center;
    font-size: 1.5rem;
    color: var(--accent-gold);
    margin-bottom: 0.3rem;
  }

  .subtitle {
    text-align: center;
    font-size: 0.9rem;
    color: var(--text-secondary);
    margin-bottom: 1.5rem;
  }

  .layer-labels {
    display: flex;
    justify-content: center;
    gap: 2rem;
    margin-bottom: 1.5rem;
  }

  .layer-label {
    padding: 0.4rem 1rem;
    border-radius: 20px;
    font-size: 0.85rem;
    font-weight: 600;
  }

  .layer1 {
    background: rgba(80, 200, 120, 0.15);
    color: var(--layer1-color);
    border: 1.5px solid var(--layer1-color);
  }

  .layer2 {
    background: rgba(224, 148, 58, 0.15);
    color: var(--layer2-color);
    border: 1.5px solid var(--layer2-color);
  }

  .shift-table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
    overflow: hidden;
    border-radius: 10px;
    border: 1px solid var(--border-subtle);
  }

  .shift-table thead th {
    background: var(--bg-secondary);
    padding: 0.8rem 0.6rem;
    font-size: 0.85rem;
    font-weight: 700;
    text-align: center;
    border-bottom: 2px solid var(--border-subtle);
  }

  .shift-table thead th:nth-child(1) { color: var(--accent-purple); }
  .shift-table thead th:nth-child(2) { color: var(--text-secondary); }
  .shift-table thead th:nth-child(3) { color: var(--layer1-color); }
  .shift-table thead th:nth-child(4) { color: var(--text-secondary); }
  .shift-table thead th:nth-child(5) { color: var(--layer2-color); }

  .shift-table tbody td {
    padding: 0.7rem 0.6rem;
    text-align: center;
    border-bottom: 1px solid var(--border-subtle);
    background: var(--bg-card);
    vertical-align: middle;
  }

  .shift-table tbody tr:last-child td {
    border-bottom: none;
  }

  .shift-table tbody tr:hover td {
    background: var(--bg-secondary);
  }

  .source-word {
    font-weight: 700;
    color: var(--accent-purple);
    font-size: 1.05rem;
  }

  .english-word {
    font-weight: 700;
    color: var(--accent-blue);
    font-size: 1.05rem;
  }

  .german-word {
    font-weight: 700;
    color: var(--accent-gold);
    font-size: 1.05rem;
  }

  .shift-arrow {
    color: var(--text-muted);
    font-size: 1.1rem;
  }

  .shift-rule {
    display: block;
    font-size: 0.72rem;
    font-weight: 600;
    margin-top: 2px;
    padding: 1px 5px;
    border-radius: 3px;
  }

  .rule-layer1 {
    color: var(--layer1-color);
    background: rgba(80, 200, 120, 0.1);
  }

  .rule-layer2 {
    color: var(--layer2-color);
    background: rgba(224, 148, 58, 0.1);
  }

  .no-shift {
    color: var(--text-muted);
    font-style: italic;
    font-size: 0.75rem;
  }

  .key-insight {
    margin-top: 1.5rem;
    padding: 1rem 1.2rem;
    background: var(--bg-secondary);
    border-left: 4px solid var(--accent-gold);
    border-radius: 0 8px 8px 0;
    font-size: 0.9rem;
    color: var(--text-secondary);
    line-height: 1.6;
  }

  .key-insight strong {
    color: var(--accent-gold);
  }

  figcaption {
    text-align: center;
    font-size: 0.85rem;
    color: var(--text-muted);
    margin-top: 1rem;
    font-style: italic;
    line-height: 1.5;
  }

  @media (max-width: 650px) {
    .shift-table thead th, .shift-table tbody td {
      padding: 0.5rem 0.3rem;
      font-size: 0.78rem;
    }
    .source-word, .english-word, .german-word { font-size: 0.9rem; }
    .layer-labels { flex-direction: column; align-items: center; gap: 0.5rem; }
  }
</style>
</head>
<body>
<figure class="diagram-container">
  <h1>The Two Sound Shifts</h1>
  <p class="subtitle">From Latin/PIE to English to German -- two layers of systematic consonant change</p>

  <div class="layer-labels">
    <span class="layer-label layer1">Layer 1: Grimm's Law -- affects BOTH English and German</span>
    <span class="layer-label layer2">Layer 2: HGCS -- affects ONLY German</span>
  </div>

  <table class="shift-table">
    <thead>
      <tr>
        <th>Latin / PIE</th>
        <th></th>
        <th>English<br><span style="font-weight:400;font-size:0.75rem">(Layer 1 only)</span></th>
        <th></th>
        <th>German<br><span style="font-weight:400;font-size:0.75rem">(Layer 1 + Layer 2)</span></th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>
          <span class="source-word">pater</span>
          <span class="shift-rule rule-layer1">p &rarr; f</span>
        </td>
        <td class="shift-arrow">&rarr;</td>
        <td>
          <span class="english-word">father</span>
          <span class="shift-rule rule-layer1">Grimm: p&rarr;f</span>
        </td>
        <td class="shift-arrow">&rarr;</td>
        <td>
          <span class="german-word">Vater</span>
          <span class="no-shift">same f (spelled V)</span>
        </td>
      </tr>
      <tr>
        <td>
          <span class="source-word">ped-</span>
          <span class="shift-rule rule-layer1">p &rarr; f</span>
        </td>
        <td class="shift-arrow">&rarr;</td>
        <td>
          <span class="english-word">foot</span>
          <span class="shift-rule rule-layer1">Grimm: p&rarr;f, d&rarr;t</span>
        </td>
        <td class="shift-arrow">&rarr;</td>
        <td>
          <span class="german-word">Fu&szlig;</span>
          <span class="shift-rule rule-layer2">HGCS: t&rarr;ss</span>
        </td>
      </tr>
      <tr>
        <td>
          <span class="source-word">tres</span>
          <span class="shift-rule rule-layer1">t &rarr; &thorn;</span>
        </td>
        <td class="shift-arrow">&rarr;</td>
        <td>
          <span class="english-word">three</span>
          <span class="shift-rule rule-layer1">Grimm: t&rarr;th</span>
        </td>
        <td class="shift-arrow">&rarr;</td>
        <td>
          <span class="german-word">drei</span>
          <span class="shift-rule" style="color:var(--text-muted)">th&rarr;d (separate change)</span>
        </td>
      </tr>
      <tr>
        <td>
          <span class="source-word">decem</span>
          <span class="shift-rule rule-layer1">d &rarr; t</span>
        </td>
        <td class="shift-arrow">&rarr;</td>
        <td>
          <span class="english-word">ten</span>
          <span class="shift-rule rule-layer1">Grimm: d&rarr;t</span>
        </td>
        <td class="shift-arrow">&rarr;</td>
        <td>
          <span class="german-word">zehn</span>
          <span class="shift-rule rule-layer2">HGCS: t&rarr;z (ts)</span>
        </td>
      </tr>
      <tr>
        <td>
          <span class="source-word">centum</span>
          <span class="shift-rule rule-layer1">k &rarr; h</span>
        </td>
        <td class="shift-arrow">&rarr;</td>
        <td>
          <span class="english-word">hundred</span>
          <span class="shift-rule rule-layer1">Grimm: k&rarr;h</span>
        </td>
        <td class="shift-arrow">&rarr;</td>
        <td>
          <span class="german-word">Hundert</span>
          <span class="no-shift">same h (initial H-)</span>
        </td>
      </tr>
      <tr>
        <td>
          <span class="source-word">piscis</span>
          <span class="shift-rule rule-layer1">p &rarr; f</span>
        </td>
        <td class="shift-arrow">&rarr;</td>
        <td>
          <span class="english-word">fish</span>
          <span class="shift-rule rule-layer1">Grimm: p&rarr;f</span>
        </td>
        <td class="shift-arrow">&rarr;</td>
        <td>
          <span class="german-word">Fisch</span>
          <span class="no-shift">sk blocks HGCS</span>
        </td>
      </tr>
      <tr>
        <td>
          <span class="source-word">genus</span>
          <span class="shift-rule rule-layer1">g &rarr; k</span>
        </td>
        <td class="shift-arrow">&rarr;</td>
        <td>
          <span class="english-word">kin</span>
          <span class="shift-rule rule-layer1">Grimm: g&rarr;k</span>
        </td>
        <td class="shift-arrow">&rarr;</td>
        <td>
          <span class="german-word">Kind</span>
          <span class="no-shift">initial k- unshifted in Std. German</span>
        </td>
      </tr>
      <tr>
        <td>
          <span class="source-word">aqua</span>
          <span class="shift-rule" style="color:var(--text-muted)">various</span>
        </td>
        <td class="shift-arrow">&rarr;</td>
        <td>
          <span class="english-word">water</span>
          <span class="shift-rule rule-layer1">Grimm: various</span>
        </td>
        <td class="shift-arrow">&rarr;</td>
        <td>
          <span class="german-word">Wasser</span>
          <span class="shift-rule rule-layer2">HGCS: t&rarr;ss</span>
        </td>
      </tr>
    </tbody>
  </table>

  <div class="key-insight">
    <strong>The decoding key:</strong> To get from a Latin word to English, apply Grimm's Law (Layer 1). To get from Latin to German, apply Grimm's Law AND then the High German Consonant Shift (Layer 2). To get from English to German, apply only Layer 2. These are not random differences -- they are the predictable output of two well-documented historical processes.
  </div>

  <figcaption>
    Figure 2: The two-layer sound shift system. Grimm's Law (green) separated ALL Germanic languages from Latin/Greek. The High German Consonant Shift (orange) further separated German from English. English stops at Layer 1; German continues to Layer 2.
  </figcaption>
</figure>
</body>
</html>
