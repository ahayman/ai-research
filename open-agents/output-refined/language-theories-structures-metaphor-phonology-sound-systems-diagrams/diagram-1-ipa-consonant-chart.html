<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPA Consonant Chart Overview</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --accent: #4361ee;
    --accent-light: #e8edff;
    --highlight: #ff6b35;
    --highlight-bg: #fff3ec;
    --muted: #6c757d;
    --cell-hover: #eef2ff;
    --voiced-bg: #f0f7ff;
    --caption-bg: #f8f9fa;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --accent: #6b8aff;
      --accent-light: #1e2a4a;
      --highlight: #ff8c5a;
      --highlight-bg: #2a1a10;
      --muted: #9a9ab0;
      --cell-hover: #252540;
      --voiced-bg: #151530;
      --caption-bg: #1a1a2e;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure {
    max-width: 1100px;
    width: 100%;
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding: 1rem 1.5rem;
    background: var(--caption-bg);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  figcaption h2 {
    font-size: 1.1rem;
    font-weight: 600;
    margin-bottom: 0.3rem;
    color: var(--accent);
  }
  figcaption p {
    font-size: 0.85rem;
    color: var(--muted);
  }
  .chart-wrapper {
    overflow-x: auto;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--surface);
  }
  svg {
    display: block;
    margin: 0 auto;
  }
  .legend {
    display: flex;
    gap: 1.5rem;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 1rem;
    font-size: 0.82rem;
    color: var(--muted);
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }
  .legend-swatch {
    width: 14px;
    height: 14px;
    border-radius: 3px;
    border: 1px solid var(--border);
  }
</style>
</head>
<body>
<figure>
  <div class="chart-wrapper">
    <svg viewBox="0 0 1060 520" xmlns="http://www.w3.org/2000/svg" style="min-width:800px;">
      <defs>
        <style>
          .header-text { font: bold 11px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
          .place-text { font: bold 10.5px 'Segoe UI', system-ui, sans-serif; fill: var(--accent); }
          .manner-text { font: bold 10.5px 'Segoe UI', system-ui, sans-serif; fill: var(--accent); }
          .ipa-symbol { font: 16px 'Gentium Plus', 'Noto Sans', 'DejaVu Sans', serif; fill: var(--fg); }
          .ipa-english { font: bold 16px 'Gentium Plus', 'Noto Sans', 'DejaVu Sans', serif; }
          .cell-bg { fill: var(--surface); stroke: var(--border); stroke-width: 0.5; }
          .cell-bg-voiced { fill: var(--voiced-bg); stroke: var(--border); stroke-width: 0.5; }
          .cell-bg-english { fill: var(--highlight-bg); stroke: var(--highlight); stroke-width: 1.2; }
          .header-bg { fill: var(--accent-light); stroke: var(--border); stroke-width: 0.5; }
          .no-sound { fill: var(--muted); opacity: 0.3; }
          .shaded { fill: var(--border); opacity: 0.4; }
        </style>
      </defs>

      <!-- Title -->
      <text x="530" y="28" text-anchor="middle" class="header-text" style="font-size:15px;">IPA Consonant Chart (Simplified Pulmonic)</text>

      <!-- Column headers: Places of Articulation -->
      <g transform="translate(130, 38)">
        <rect x="0" y="0" width="92" height="30" rx="4" class="header-bg"/>
        <text x="46" y="20" text-anchor="middle" class="place-text">Bilabial</text>

        <rect x="93" y="0" width="92" height="30" rx="4" class="header-bg"/>
        <text x="139" y="20" text-anchor="middle" class="place-text">Labio-dental</text>

        <rect x="186" y="0" width="92" height="30" rx="4" class="header-bg"/>
        <text x="232" y="20" text-anchor="middle" class="place-text">Dental</text>

        <rect x="279" y="0" width="92" height="30" rx="4" class="header-bg"/>
        <text x="325" y="20" text-anchor="middle" class="place-text">Alveolar</text>

        <rect x="372" y="0" width="92" height="30" rx="4" class="header-bg"/>
        <text x="418" y="20" text-anchor="middle" class="place-text">Post-alv.</text>

        <rect x="465" y="0" width="92" height="30" rx="4" class="header-bg"/>
        <text x="511" y="20" text-anchor="middle" class="place-text">Palatal</text>

        <rect x="558" y="0" width="92" height="30" rx="4" class="header-bg"/>
        <text x="604" y="20" text-anchor="middle" class="place-text">Velar</text>

        <rect x="651" y="0" width="92" height="30" rx="4" class="header-bg"/>
        <text x="697" y="20" text-anchor="middle" class="place-text">Uvular</text>

        <rect x="744" y="0" width="92" height="30" rx="4" class="header-bg"/>
        <text x="790" y="20" text-anchor="middle" class="place-text">Glottal</text>
      </g>

      <!-- Row headers: Manners of Articulation -->
      <g transform="translate(0, 72)">
        <rect x="5" y="0" width="122" height="48" rx="4" class="header-bg"/>
        <text x="66" y="28" text-anchor="middle" class="manner-text">Plosive (Stop)</text>

        <rect x="5" y="50" width="122" height="48" rx="4" class="header-bg"/>
        <text x="66" y="78" text-anchor="middle" class="manner-text">Nasal</text>

        <rect x="5" y="100" width="122" height="48" rx="4" class="header-bg"/>
        <text x="66" y="128" text-anchor="middle" class="manner-text">Trill</text>

        <rect x="5" y="150" width="122" height="48" rx="4" class="header-bg"/>
        <text x="66" y="178" text-anchor="middle" class="manner-text">Tap / Flap</text>

        <rect x="5" y="200" width="122" height="48" rx="4" class="header-bg"/>
        <text x="66" y="228" text-anchor="middle" class="manner-text">Fricative</text>

        <rect x="5" y="250" width="122" height="48" rx="4" class="header-bg"/>
        <text x="66" y="278" text-anchor="middle" class="manner-text">Affricate</text>

        <rect x="5" y="300" width="122" height="48" rx="4" class="header-bg"/>
        <text x="66" y="328" text-anchor="middle" class="manner-text">Lateral Fric.</text>

        <rect x="5" y="350" width="122" height="48" rx="4" class="header-bg"/>
        <text x="66" y="378" text-anchor="middle" class="manner-text">Approximant</text>

        <rect x="5" y="400" width="122" height="48" rx="4" class="header-bg"/>
        <text x="66" y="428" text-anchor="middle" class="manner-text">Lateral Approx.</text>
      </g>

      <!-- Grid cells: Each cell has voiceless (left) and voiced (right) -->
      <!-- Row: Plosive -->
      <g transform="translate(130, 72)">
        <!-- Bilabial: p b -->
        <rect x="0" y="0" width="45" height="48" class="cell-bg-english"/>
        <text x="22" y="30" text-anchor="middle" class="ipa-english" style="fill:var(--highlight);">p</text>
        <rect x="46" y="0" width="46" height="48" class="cell-bg-english"/>
        <text x="69" y="30" text-anchor="middle" class="ipa-english" style="fill:var(--highlight);">b</text>

        <!-- Labiodental: impossible -->
        <rect x="93" y="0" width="92" height="48" class="cell-bg"/>
        <rect x="93" y="0" width="92" height="48" class="shaded" rx="0"/>

        <!-- Dental: voiceless dental stop, voiced dental stop -->
        <rect x="186" y="0" width="45" height="48" class="cell-bg"/>
        <text x="208" y="30" text-anchor="middle" class="ipa-symbol">t&#x0327;</text>
        <rect x="232" y="0" width="46" height="48" class="cell-bg"/>
        <text x="255" y="30" text-anchor="middle" class="ipa-symbol">d&#x0327;</text>

        <!-- Alveolar: t d -->
        <rect x="279" y="0" width="45" height="48" class="cell-bg-english"/>
        <text x="301" y="30" text-anchor="middle" class="ipa-english" style="fill:var(--highlight);">t</text>
        <rect x="325" y="0" width="46" height="48" class="cell-bg-english"/>
        <text x="348" y="30" text-anchor="middle" class="ipa-english" style="fill:var(--highlight);">d</text>

        <!-- Post-alveolar -->
        <rect x="372" y="0" width="92" height="48" class="cell-bg"/>

        <!-- Palatal: c, barred j -->
        <rect x="465" y="0" width="45" height="48" class="cell-bg"/>
        <text x="487" y="30" text-anchor="middle" class="ipa-symbol">c</text>
        <rect x="511" y="0" width="46" height="48" class="cell-bg"/>
        <text x="534" y="30" text-anchor="middle" class="ipa-symbol">&#x025F;</text>

        <!-- Velar: k g -->
        <rect x="558" y="0" width="45" height="48" class="cell-bg-english"/>
        <text x="580" y="30" text-anchor="middle" class="ipa-english" style="fill:var(--highlight);">k</text>
        <rect x="604" y="0" width="46" height="48" class="cell-bg-english"/>
        <text x="627" y="30" text-anchor="middle" class="ipa-english" style="fill:var(--highlight);">&#x0261;</text>

        <!-- Uvular: q G -->
        <rect x="651" y="0" width="45" height="48" class="cell-bg"/>
        <text x="673" y="30" text-anchor="middle" class="ipa-symbol">q</text>
        <rect x="697" y="0" width="46" height="48" class="cell-bg"/>
        <text x="720" y="30" text-anchor="middle" class="ipa-symbol">&#x0262;</text>

        <!-- Glottal: glottal stop -->
        <rect x="744" y="0" width="45" height="48" class="cell-bg"/>
        <text x="766" y="30" text-anchor="middle" class="ipa-symbol">&#x0294;</text>
        <rect x="790" y="0" width="46" height="48" class="cell-bg"/>
        <rect x="790" y="0" width="46" height="48" class="shaded" rx="0"/>
      </g>

      <!-- Row: Nasal -->
      <g transform="translate(130, 122)">
        <!-- Bilabial: m -->
        <rect x="0" y="0" width="92" height="48" class="cell-bg-english"/>
        <text x="46" y="30" text-anchor="middle" class="ipa-english" style="fill:var(--highlight);">m</text>

        <!-- Labiodental: labiodental nasal -->
        <rect x="93" y="0" width="92" height="48" class="cell-bg"/>
        <text x="139" y="30" text-anchor="middle" class="ipa-symbol">&#x0271;</text>

        <!-- Dental -->
        <rect x="186" y="0" width="92" height="48" class="cell-bg"/>

        <!-- Alveolar: n -->
        <rect x="279" y="0" width="92" height="48" class="cell-bg-english"/>
        <text x="325" y="30" text-anchor="middle" class="ipa-english" style="fill:var(--highlight);">n</text>

        <!-- Post-alveolar -->
        <rect x="372" y="0" width="92" height="48" class="cell-bg"/>

        <!-- Palatal: palatal nasal -->
        <rect x="465" y="0" width="92" height="48" class="cell-bg"/>
        <text x="511" y="30" text-anchor="middle" class="ipa-symbol">&#x0272;</text>

        <!-- Velar: eng -->
        <rect x="558" y="0" width="92" height="48" class="cell-bg-english"/>
        <text x="604" y="30" text-anchor="middle" class="ipa-english" style="fill:var(--highlight);">&#x014B;</text>

        <!-- Uvular: N -->
        <rect x="651" y="0" width="92" height="48" class="cell-bg"/>
        <text x="697" y="30" text-anchor="middle" class="ipa-symbol">&#x0274;</text>

        <!-- Glottal: impossible -->
        <rect x="744" y="0" width="92" height="48" class="cell-bg"/>
        <rect x="744" y="0" width="92" height="48" class="shaded" rx="0"/>
      </g>

      <!-- Row: Trill -->
      <g transform="translate(130, 172)">
        <rect x="0" y="0" width="92" height="48" class="cell-bg"/>
        <text x="46" y="30" text-anchor="middle" class="ipa-symbol">&#x0299;</text>

        <rect x="93" y="0" width="92" height="48" class="cell-bg"/>

        <rect x="186" y="0" width="92" height="48" class="cell-bg"/>

        <rect x="279" y="0" width="92" height="48" class="cell-bg"/>
        <text x="325" y="30" text-anchor="middle" class="ipa-symbol">r</text>

        <rect x="372" y="0" width="92" height="48" class="cell-bg"/>

        <rect x="465" y="0" width="92" height="48" class="cell-bg"/>

        <rect x="558" y="0" width="92" height="48" class="cell-bg"/>

        <rect x="651" y="0" width="92" height="48" class="cell-bg"/>
        <text x="697" y="30" text-anchor="middle" class="ipa-symbol">&#x0280;</text>

        <rect x="744" y="0" width="92" height="48" class="cell-bg"/>
        <rect x="744" y="0" width="92" height="48" class="shaded" rx="0"/>
      </g>

      <!-- Row: Tap/Flap -->
      <g transform="translate(130, 222)">
        <rect x="0" y="0" width="92" height="48" class="cell-bg"/>

        <rect x="93" y="0" width="92" height="48" class="cell-bg"/>
        <text x="139" y="30" text-anchor="middle" class="ipa-symbol">&#x2C71;</text>

        <rect x="186" y="0" width="92" height="48" class="cell-bg"/>

        <rect x="279" y="0" width="92" height="48" class="cell-bg"/>
        <text x="325" y="30" text-anchor="middle" class="ipa-symbol">&#x027E;</text>

        <rect x="372" y="0" width="92" height="48" class="cell-bg"/>

        <rect x="465" y="0" width="92" height="48" class="cell-bg"/>

        <rect x="558" y="0" width="92" height="48" class="cell-bg"/>

        <rect x="651" y="0" width="92" height="48" class="cell-bg"/>

        <rect x="744" y="0" width="92" height="48" class="cell-bg"/>
        <rect x="744" y="0" width="92" height="48" class="shaded" rx="0"/>
      </g>

      <!-- Row: Fricative -->
      <g transform="translate(130, 272)">
        <!-- Bilabial -->
        <rect x="0" y="0" width="45" height="48" class="cell-bg"/>
        <text x="22" y="30" text-anchor="middle" class="ipa-symbol">&#x0278;</text>
        <rect x="46" y="0" width="46" height="48" class="cell-bg"/>
        <text x="69" y="30" text-anchor="middle" class="ipa-symbol">&#x03B2;</text>

        <!-- Labiodental: f v -->
        <rect x="93" y="0" width="45" height="48" class="cell-bg-english"/>
        <text x="115" y="30" text-anchor="middle" class="ipa-english" style="fill:var(--highlight);">f</text>
        <rect x="139" y="0" width="46" height="48" class="cell-bg-english"/>
        <text x="162" y="30" text-anchor="middle" class="ipa-english" style="fill:var(--highlight);">v</text>

        <!-- Dental: theta, eth -->
        <rect x="186" y="0" width="45" height="48" class="cell-bg-english"/>
        <text x="208" y="30" text-anchor="middle" class="ipa-english" style="fill:var(--highlight);">&#x03B8;</text>
        <rect x="232" y="0" width="46" height="48" class="cell-bg-english"/>
        <text x="255" y="30" text-anchor="middle" class="ipa-english" style="fill:var(--highlight);">&#x00F0;</text>

        <!-- Alveolar: s z -->
        <rect x="279" y="0" width="45" height="48" class="cell-bg-english"/>
        <text x="301" y="30" text-anchor="middle" class="ipa-english" style="fill:var(--highlight);">s</text>
        <rect x="325" y="0" width="46" height="48" class="cell-bg-english"/>
        <text x="348" y="30" text-anchor="middle" class="ipa-english" style="fill:var(--highlight);">z</text>

        <!-- Post-alveolar: esh, ezh -->
        <rect x="372" y="0" width="45" height="48" class="cell-bg-english"/>
        <text x="394" y="30" text-anchor="middle" class="ipa-english" style="fill:var(--highlight);">&#x0283;</text>
        <rect x="418" y="0" width="46" height="48" class="cell-bg-english"/>
        <text x="441" y="30" text-anchor="middle" class="ipa-english" style="fill:var(--highlight);">&#x0292;</text>

        <!-- Palatal -->
        <rect x="465" y="0" width="45" height="48" class="cell-bg"/>
        <text x="487" y="30" text-anchor="middle" class="ipa-symbol">&#x00E7;</text>
        <rect x="511" y="0" width="46" height="48" class="cell-bg"/>
        <text x="534" y="30" text-anchor="middle" class="ipa-symbol">&#x029D;</text>

        <!-- Velar -->
        <rect x="558" y="0" width="45" height="48" class="cell-bg"/>
        <text x="580" y="30" text-anchor="middle" class="ipa-symbol">x</text>
        <rect x="604" y="0" width="46" height="48" class="cell-bg"/>
        <text x="627" y="30" text-anchor="middle" class="ipa-symbol">&#x0263;</text>

        <!-- Uvular -->
        <rect x="651" y="0" width="45" height="48" class="cell-bg"/>
        <text x="673" y="30" text-anchor="middle" class="ipa-symbol">&#x03C7;</text>
        <rect x="697" y="0" width="46" height="48" class="cell-bg"/>
        <text x="720" y="30" text-anchor="middle" class="ipa-symbol">&#x0281;</text>

        <!-- Glottal: h, breathy h -->
        <rect x="744" y="0" width="45" height="48" class="cell-bg-english"/>
        <text x="766" y="30" text-anchor="middle" class="ipa-english" style="fill:var(--highlight);">h</text>
        <rect x="790" y="0" width="46" height="48" class="cell-bg"/>
        <text x="813" y="30" text-anchor="middle" class="ipa-symbol">&#x0266;</text>
      </g>

      <!-- Row: Affricate (selected) -->
      <g transform="translate(130, 322)">
        <rect x="0" y="0" width="92" height="48" class="cell-bg"/>
        <rect x="93" y="0" width="92" height="48" class="cell-bg"/>
        <rect x="186" y="0" width="92" height="48" class="cell-bg"/>

        <!-- Alveolar: ts dz -->
        <rect x="279" y="0" width="45" height="48" class="cell-bg"/>
        <text x="301" y="30" text-anchor="middle" class="ipa-symbol" style="font-size:14px;">t&#x0361;s</text>
        <rect x="325" y="0" width="46" height="48" class="cell-bg"/>
        <text x="348" y="30" text-anchor="middle" class="ipa-symbol" style="font-size:14px;">d&#x0361;z</text>

        <!-- Post-alveolar: tsh, dzh -->
        <rect x="372" y="0" width="45" height="48" class="cell-bg-english"/>
        <text x="394" y="30" text-anchor="middle" class="ipa-english" style="fill:var(--highlight);font-size:14px;">t&#x0361;&#x0283;</text>
        <rect x="418" y="0" width="46" height="48" class="cell-bg-english"/>
        <text x="441" y="30" text-anchor="middle" class="ipa-english" style="fill:var(--highlight);font-size:14px;">d&#x0361;&#x0292;</text>

        <rect x="465" y="0" width="92" height="48" class="cell-bg"/>
        <rect x="558" y="0" width="92" height="48" class="cell-bg"/>
        <rect x="651" y="0" width="92" height="48" class="cell-bg"/>
        <rect x="744" y="0" width="92" height="48" class="cell-bg"/>
        <rect x="744" y="0" width="92" height="48" class="shaded" rx="0"/>
      </g>

      <!-- Row: Lateral Fricative -->
      <g transform="translate(130, 372)">
        <rect x="0" y="0" width="92" height="48" class="cell-bg"/>
        <rect x="0" y="0" width="92" height="48" class="shaded" rx="0"/>
        <rect x="93" y="0" width="92" height="48" class="cell-bg"/>
        <rect x="93" y="0" width="92" height="48" class="shaded" rx="0"/>
        <rect x="186" y="0" width="92" height="48" class="cell-bg"/>

        <rect x="279" y="0" width="45" height="48" class="cell-bg"/>
        <text x="301" y="30" text-anchor="middle" class="ipa-symbol">&#x026C;</text>
        <rect x="325" y="0" width="46" height="48" class="cell-bg"/>
        <text x="348" y="30" text-anchor="middle" class="ipa-symbol">&#x026E;</text>

        <rect x="372" y="0" width="92" height="48" class="cell-bg"/>
        <rect x="465" y="0" width="92" height="48" class="cell-bg"/>
        <rect x="558" y="0" width="92" height="48" class="cell-bg"/>
        <rect x="651" y="0" width="92" height="48" class="cell-bg"/>
        <rect x="744" y="0" width="92" height="48" class="cell-bg"/>
        <rect x="744" y="0" width="92" height="48" class="shaded" rx="0"/>
      </g>

      <!-- Row: Approximant -->
      <g transform="translate(130, 422)">
        <rect x="0" y="0" width="92" height="48" class="cell-bg"/>

        <rect x="93" y="0" width="92" height="48" class="cell-bg"/>
        <text x="139" y="30" text-anchor="middle" class="ipa-symbol">&#x028B;</text>

        <rect x="186" y="0" width="92" height="48" class="cell-bg"/>

        <!-- Alveolar: approximant r -->
        <rect x="279" y="0" width="92" height="48" class="cell-bg-english"/>
        <text x="325" y="30" text-anchor="middle" class="ipa-english" style="fill:var(--highlight);">&#x0279;</text>

        <rect x="372" y="0" width="92" height="48" class="cell-bg"/>

        <!-- Palatal: j -->
        <rect x="465" y="0" width="92" height="48" class="cell-bg-english"/>
        <text x="511" y="30" text-anchor="middle" class="ipa-english" style="fill:var(--highlight);">j</text>

        <!-- Velar: labial-velar approximant w (shown here) -->
        <rect x="558" y="0" width="92" height="48" class="cell-bg-english"/>
        <text x="604" y="30" text-anchor="middle" class="ipa-english" style="fill:var(--highlight);">w</text>

        <rect x="651" y="0" width="92" height="48" class="cell-bg"/>
        <rect x="744" y="0" width="92" height="48" class="cell-bg"/>
        <rect x="744" y="0" width="92" height="48" class="shaded" rx="0"/>
      </g>

      <!-- Row: Lateral Approximant -->
      <g transform="translate(130, 472)">
        <rect x="0" y="0" width="92" height="48" class="cell-bg"/>
