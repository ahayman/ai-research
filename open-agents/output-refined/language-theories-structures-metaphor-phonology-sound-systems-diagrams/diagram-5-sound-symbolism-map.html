<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sound Symbolism Map</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --accent: #4361ee;
    --muted: #6c757d;
    --caption-bg: #f8f9fa;
    --bouba: #7209b7;
    --kiki: #e63946;
    --phon: #2a9d8f;
    --ideo: #e76f51;
    --center: #4361ee;
    --node-bg: #f0f4ff;
    --node-border: #c5d0f0;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --accent: #6b8aff;
      --muted: #9a9ab0;
      --caption-bg: #1a1a2e;
      --bouba: #b366ff;
      --kiki: #ff6b7a;
      --phon: #4dd8c0;
      --ideo: #ffa07a;
      --center: #6b8aff;
      --node-bg: #1e2040;
      --node-border: #3a3a60;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure { max-width: 1050px; width: 100%; }
  .chart-wrapper {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1rem;
    overflow-x: auto;
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding: 1rem 1.5rem;
    background: var(--caption-bg);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
</style>
</head>
<body>
<figure>
  <div class="chart-wrapper">
    <svg viewBox="0 0 1000 700" xmlns="http://www.w3.org/2000/svg" style="min-width:750px;">
      <defs>
        <style>
          .title { font: bold 15px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
          .center-label { font: bold 16px 'Segoe UI', system-ui, sans-serif; fill: white; }
          .branch-label { font: bold 13px 'Segoe UI', system-ui, sans-serif; }
          .node-text { font: 11px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
          .node-bold { font: bold 11px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
          .node-example { font: italic 10px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
          .node-small { font: 9.5px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
          .connector { stroke-width: 2; fill: none; }
        </style>
        <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
          <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
        </filter>
      </defs>

      <text x="500" y="28" text-anchor="middle" class="title">Sound Symbolism: Non-Arbitrary Sound-Meaning Mappings</text>

      <!-- Central node -->
      <circle cx="500" cy="320" r="55" fill="var(--center)" filter="url(#shadow)"/>
      <text x="500" y="312" text-anchor="middle" class="center-label">Sound</text>
      <text x="500" y="332" text-anchor="middle" class="center-label">Symbolism</text>

      <!-- ============ BRANCH 1: BOUBA/KIKI (Top Left) ============ -->
      <path d="M 455,275 Q 350,200 270,140" class="connector" stroke="var(--bouba)" stroke-dasharray="6,3"/>

      <!-- Bouba/Kiki main node -->
      <rect x="120" y="55" width="280" height="165" rx="12" fill="var(--node-bg)" stroke="var(--bouba)" stroke-width="2" filter="url(#shadow)"/>
      <text x="260" y="78" text-anchor="middle" class="branch-label" style="fill:var(--bouba);">Bouba / Kiki Effect</text>

      <!-- Rounded shape for bouba -->
      <ellipse cx="180" cy="115" rx="30" ry="22" fill="none" stroke="var(--bouba)" stroke-width="2" opacity="0.6"/>
      <text x="180" y="120" text-anchor="middle" class="node-bold" style="fill:var(--bouba);">bouba</text>
      <text x="180" y="150" text-anchor="middle" class="node-small">rounded, soft</text>
      <text x="180" y="163" text-anchor="middle" class="node-small">low-frequency</text>
      <text x="180" y="176" text-anchor="middle" class="node-small">continuous</text>

      <!-- Spiky shape for kiki -->
      <polygon points="320,93 345,115 335,140 305,140 295,115" fill="none" stroke="var(--kiki)" stroke-width="2" opacity="0.6"/>
      <text x="320" y="122" text-anchor="middle" class="node-bold" style="fill:var(--kiki);">kiki</text>
      <text x="320" y="150" text-anchor="middle" class="node-small">spiky, sharp</text>
      <text x="320" y="163" text-anchor="middle" class="node-small">high-frequency</text>
      <text x="320" y="176" text-anchor="middle" class="node-small">discontinuous</text>

      <text x="260" y="198" text-anchor="middle" class="node-example">Cross-cultural, cross-modal, present from infancy</text>
      <text x="260" y="212" text-anchor="middle" class="node-example">Kohler 1929 "maluma/takete" | replicated 2021</text>

      <!-- ============ BRANCH 2: PHONESTHEMES (Top Right) ============ -->
      <path d="M 545,275 Q 640,200 720,140" class="connector" stroke="var(--phon)" stroke-dasharray="6,3"/>

      <rect x="600" y="45" width="370" height="225" rx="12" fill="var(--node-bg)" stroke="var(--phon)" stroke-width="2" filter="url(#shadow)"/>
      <text x="785" y="68" text-anchor="middle" class="branch-label" style="fill:var(--phon);">Phonesthemes (English)</text>
      <text x="785" y="83" text-anchor="middle" class="node-small">Sound clusters with consistent semantic associations</text>

      <!-- gl- -->
      <rect x="615" y="94" width="160" height="38" rx="6" fill="none" stroke="var(--phon)" stroke-width="1.2" opacity="0.6"/>
      <text x="625" y="112" class="node-bold" style="fill:var(--phon);">gl-</text>
      <text x="660" y="112" class="node-text">light, vision</text>
      <text x="625" y="126" class="node-example">glow, glitter, gleam, glint</text>

      <!-- sn- -->
      <rect x="790" y="94" width="165" height="38" rx="6" fill="none" stroke="var(--phon)" stroke-width="1.2" opacity="0.6"/>
      <text x="800" y="112" class="node-bold" style="fill:var(--phon);">sn-</text>
      <text x="835" y="112" class="node-text">nose, mouth</text>
      <text x="800" y="126" class="node-example">sneeze, sniff, snore, snout</text>

      <!-- sl- -->
      <rect x="615" y="142" width="160" height="38" rx="6" fill="none" stroke="var(--phon)" stroke-width="1.2" opacity="0.6"/>
      <text x="625" y="160" class="node-bold" style="fill:var(--phon);">sl-</text>
      <text x="660" y="160" class="node-text">smooth, slippery</text>
      <text x="625" y="174" class="node-example">slide, slick, slip, slither</text>

      <!-- cr- -->
      <rect x="790" y="142" width="165" height="38" rx="6" fill="none" stroke="var(--phon)" stroke-width="1.2" opacity="0.6"/>
      <text x="800" y="160" class="node-bold" style="fill:var(--phon);">cr-</text>
      <text x="835" y="160" class="node-text">crushing, impact</text>
      <text x="800" y="174" class="node-example">crack, crash, crumble, crush</text>

      <!-- -ump -->
      <rect x="615" y="190" width="160" height="38" rx="6" fill="none" stroke="var(--phon)" stroke-width="1.2" opacity="0.6"/>
      <text x="625" y="208" class="node-bold" style="fill:var(--phon);">-ump</text>
      <text x="670" y="208" class="node-text">heavy, round</text>
      <text x="625" y="222" class="node-example">bump, clump, lump, plump</text>

      <text x="785" y="250" text-anchor="middle" class="node-example">J.R. Firth (1930): "Not morphemes, but psychologically real"</text>

      <!-- ============ BRANCH 3: IDEOPHONES (Bottom Right) ============ -->
      <path d="M 545,360 Q 640,430 700,470" class="connector" stroke="var(--ideo)" stroke-dasharray="6,3"/>

      <rect x="590" y="420" width="380" height="255" rx="12" fill="var(--node-bg)" stroke="var(--ideo)" stroke-width="2" filter="url(#shadow)"/>
      <text x="780" y="443" text-anchor="middle" class="branch-label" style="fill:var(--ideo);">Ideophones / Mimetics</text>
      <text x="780" y="458" text-anchor="middle" class="node-small">Words depicting sensory imagery (Asia, Africa, Americas)</text>

      <text x="610" y="480" class="node-bold" style="fill:var(--ideo);">Japanese Ideophone System:</text>

      <!-- Giseigo -->
      <rect x="610" y="490" width="170" height="32" rx="5" fill="none" stroke="var(--ideo)" stroke-width="1" opacity="0.5"/>
      <text x="618" y="506" class="node-bold">Giseigo</text>
      <text x="680" y="506" class="node-text">living sounds</text>
      <text x="618" y="518" class="node-example">wan-wan (dog bark)</text>

      <!-- Giongo -->
      <rect x="790" y="490" width="170" height="32" rx="5" fill="none" stroke="var(--ideo)" stroke-width="1" opacity="0.5"/>
      <text x="798" y="506" class="node-bold">Giongo</text>
      <text x="853" y="506" class="node-text">object sounds</text>
      <text x="798" y="518" class="node-example">zaa-zaa (heavy rain)</text>

      <!-- Gitaigo -->
      <rect x="610" y="530" width="170" height="32" rx="5" fill="none" stroke="var(--ideo)" stroke-width="1" opacity="0.5"/>
      <text x="618" y="546" class="node-bold">Gitaigo</text>
      <text x="675" y="546" class="node-text">states/conditions</text>
      <text x="618" y="558" class="node-example">kira-kira (sparkling)</text>

      <!-- Gijougo -->
      <rect x="790" y="530" width="170" height="32" rx="5" fill="none" stroke="var(--ideo)" stroke-width="1" opacity="0.5"/>
      <text x="798" y="546" class="node-bold">Gijougo</text>
      <text x="858" y="546" class="node-text">emotions</text>
      <text x="798" y="558" class="node-example">waku-waku (excited)</text>

      <!-- Giyougo -->
      <rect x="610" y="570" width="170" height="32" rx="5" fill="none" stroke="var(--ideo)" stroke-width="1" opacity="0.5"/>
      <text x="618" y="586" class="node-bold">Giyougo</text>
      <text x="680" y="586" class="node-text">movements</text>
      <text x="618" y="598" class="node-example">noro-noro (sluggish)</text>

      <text x="780" y="625" text-anchor="middle" class="node-small">Cross-linguistic pattern: voiced + low tone = large/heavy;</text>
      <text x="780" y="638" text-anchor="middle" class="node-small">voiceless + high tone = small/light</text>

      <text x="780" y="665" text-anchor="middle" class="node-example">Meanings guessed above chance across unfamiliar languages</text>

      <!-- ============ BRANCH 4: Challenge to Saussure (Bottom Left) ============ -->
      <path d="M 455,360 Q 350,430 280,470" class="connector" stroke="var(--center)" stroke-dasharray="6,3"/>

      <rect x="40" y="420" width="380" height="220" rx="12" fill="var(--node-bg)" stroke="var(--center)" stroke-width="2" filter="url(#shadow)"/>
      <text x="230" y="448" text-anchor="middle" class="branch-label" style="fill:var(--center);">Challenge to Saussure's Arbitrariness</text>

      <text x="60" y="475" class="node-text">"The sign is arbitrary" -- Ferdinand de Saussure (1916)</text>

      <!-- The spectrum -->
      <rect x="60" y="490" width="340" height="40" rx="6" fill="none" stroke="var(--border)" stroke-width="1"/>

      <!-- Gradient from arbitrary to motivated -->
      <rect x="60" y="490" width="170" height="40" rx="6" fill="var(--center)" opacity="0.1"/>
      <text x="145" y="508" text-anchor="middle" class="node-bold" style="fill:var(--center);">Arbitrary</text>
      <text x="145" y="523" text-anchor="middle" class="node-small">"dog" = nothing dog-like</text>

      <rect x="230" y="490" width="170" height="40" rx="0" fill="var(--ideo)" opacity="0.1"/>
      <text x="315" y="508" text-anchor="middle" class="node-bold" style="fill:var(--ideo);">Iconic / Motivated</text>
      <text x="315" y="523" text-anchor="middle" class="node-small">bouba/kiki, ideophones</text>

      <text x="60" y="555" class="node-text">Emerging consensus: Language involves</text>
      <text x="60" y="570" class="node-text">BOTH arbitrary and motivated mappings.</text>

      <text x="60" y="595" class="node-example">Sound symbolism may have played a role</text>
      <text x="60" y="610" class="node-example">in the origins and evolution of language.</text>

      <text x="230" y="632" text-anchor="middle" class="node-small" style="font-style:italic;">~39% of gl- words relate to light/vision (Firth)</text>

      <!-- ============ ONOMATOPOEIA (Left Center) ============ -->
      <path d="M 446,310 Q 350,295 240,310" class="connector" stroke="var(--kiki)" stroke-dasharray="6,3"/>

      <rect x="40" y="275" width="210" height="100" rx="12" fill="var(--node-bg)" stroke="var(--kiki)" stroke-width="2" filter="url(#shadow)"/>
      <text x="145" y="298" text-anchor="middle" class="branch-label" style="fill:var(--kiki);">Onomatopoeia</text>
      <text x="145" y="316" text-anchor="middle" class="node-text">Direct sound imitation</text>
      <text x="145" y="336" text-anchor="middle" class="node-example">buzz, hiss, splash, bang</text>
      <text x="145" y="352" text-anchor="middle" class="node-small">Most recognized form</text>
      <text x="145" y="365" text-anchor="middle" class="node-small">of sound symbolism</text>
    </svg>
  </div>
  <figcaption>
    <h2>Figure 5 &mdash; Sound Symbolism Mind Map</h2>
    <p>Sound symbolism encompasses non-arbitrary connections between sound and meaning. The bouba/kiki effect reveals cross-modal associations present from infancy. English phonesthemes (gl-, sn-, sl-, cr-) cluster words by shared initial sounds and related meanings. Japanese has thousands of ideophones (mimetics) organized into five categories covering sounds, states, emotions, and movements. Together, these phenomena challenge Saussure's foundational claim that the linguistic sign is purely arbitrary.</p>
  </figcaption>
</figure>
</body>
</html>
