<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPA Vowel Trapezoid</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --accent: #4361ee;
    --muted: #6c757d;
    --caption-bg: #f8f9fa;
    --arabic: #e63946;
    --spanish: #2a9d8f;
    --english: #e76f51;
    --cardinal: #6c757d;
    --trapez-fill: #f0f4ff;
    --trapez-stroke: #adb5bd;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --accent: #6b8aff;
      --muted: #9a9ab0;
      --caption-bg: #1a1a2e;
      --arabic: #ff6b7a;
      --spanish: #4dd8c0;
      --english: #ff9a7a;
      --cardinal: #9a9ab0;
      --trapez-fill: #151525;
      --trapez-stroke: #444466;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure { max-width: 900px; width: 100%; }
  .chart-wrapper {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1rem;
    overflow-x: auto;
  }
  svg { display: block; margin: 0 auto; }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding: 1rem 1.5rem;
    background: var(--caption-bg);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  .legend {
    display: flex;
    gap: 1.5rem;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 1rem;
    font-size: 0.82rem;
    color: var(--muted);
  }
  .legend-item { display: flex; align-items: center; gap: 0.4rem; }
  .legend-dot {
    width: 12px; height: 12px; border-radius: 50%;
  }
</style>
</head>
<body>
<figure>
  <div class="chart-wrapper">
    <svg viewBox="0 0 750 520" xmlns="http://www.w3.org/2000/svg" style="min-width:550px;">
      <defs>
        <style>
          .axis-label { font: 11px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
          .dimension-label { font: bold 12px 'Segoe UI', system-ui, sans-serif; fill: var(--accent); }
          .vowel-cardinal { font: 18px 'Gentium Plus', 'DejaVu Sans', serif; fill: var(--cardinal); }
          .vowel-arabic { font: bold 16px 'Gentium Plus', 'DejaVu Sans', serif; fill: var(--arabic); }
          .vowel-spanish { font: bold 16px 'Gentium Plus', 'DejaVu Sans', serif; fill: var(--spanish); }
          .vowel-english { font: bold 15px 'Gentium Plus', 'DejaVu Sans', serif; fill: var(--english); }
          .round-label { font: italic 10px 'Segoe UI', sans-serif; fill: var(--muted); }
        </style>
        <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="var(--muted)"/>
        </marker>
      </defs>

      <!-- Title -->
      <text x="375" y="28" text-anchor="middle" style="font:bold 15px 'Segoe UI',system-ui,sans-serif;fill:var(--fg);">IPA Vowel Trapezoid with Language Overlays</text>

      <!-- Axis labels -->
      <text x="160" y="55" class="dimension-label">Front</text>
      <text x="420" y="55" class="dimension-label">Central</text>
      <text x="630" y="55" class="dimension-label">Back</text>

      <text x="80" y="105" class="dimension-label" transform="rotate(-90, 80, 200)">Close (High)</text>
      <text x="80" y="365" class="dimension-label" transform="rotate(-90, 80, 365)">Open (Low)</text>

      <!-- Trapezoid shape (the vowel space) -->
      <!-- Front-close to Back-close to Back-open to Front-open -->
      <polygon points="160,80 640,80 580,430 120,430"
        fill="var(--trapez-fill)" stroke="var(--trapez-stroke)" stroke-width="1.5" stroke-dasharray="6,3"/>

      <!-- Horizontal guide lines -->
      <line x1="160" y1="80" x2="640" y2="80" stroke="var(--trapez-stroke)" stroke-width="0.8" stroke-dasharray="4,4"/>
      <text x="105" y="85" class="axis-label">Close</text>

      <line x1="150" y1="197" x2="625" y2="197" stroke="var(--trapez-stroke)" stroke-width="0.8" stroke-dasharray="4,4"/>
      <text x="105" y="202" class="axis-label">Close-mid</text>

      <line x1="140" y1="313" x2="610" y2="313" stroke="var(--trapez-stroke)" stroke-width="0.8" stroke-dasharray="4,4"/>
      <text x="105" y="318" class="axis-label">Open-mid</text>

      <line x1="120" y1="430" x2="580" y2="430" stroke="var(--trapez-stroke)" stroke-width="0.8" stroke-dasharray="4,4"/>
      <text x="105" y="435" class="axis-label">Open</text>

      <!-- Cardinal Vowels (gray reference points) -->
      <!-- Primary cardinals -->
      <circle cx="160" cy="80" r="4" fill="var(--cardinal)" opacity="0.3"/>
      <text x="148" y="75" class="vowel-cardinal" opacity="0.4">i</text>

      <circle cx="150" cy="197" r="4" fill="var(--cardinal)" opacity="0.3"/>
      <text x="135" y="193" class="vowel-cardinal" opacity="0.4">e</text>

      <circle cx="140" cy="313" r="4" fill="var(--cardinal)" opacity="0.3"/>
      <text x="122" y="310" class="vowel-cardinal" opacity="0.4">&#x025B;</text>

      <circle cx="125" cy="430" r="4" fill="var(--cardinal)" opacity="0.3"/>
      <text x="115" y="455" class="vowel-cardinal" opacity="0.4">a</text>

      <circle cx="580" cy="430" r="4" fill="var(--cardinal)" opacity="0.3"/>
      <text x="588" y="450" class="vowel-cardinal" opacity="0.4">&#x0251;</text>

      <circle cx="610" cy="313" r="4" fill="var(--cardinal)" opacity="0.3"/>
      <text x="620" y="310" class="vowel-cardinal" opacity="0.4">&#x0254;</text>

      <circle cx="625" cy="197" r="4" fill="var(--cardinal)" opacity="0.3"/>
      <text x="638" y="193" class="vowel-cardinal" opacity="0.4">o</text>

      <circle cx="640" cy="80" r="4" fill="var(--cardinal)" opacity="0.3"/>
      <text x="650" y="75" class="vowel-cardinal" opacity="0.4">u</text>

      <!-- Rounding note -->
      <text x="170" y="68" class="round-label">unrounded</text>
      <text x="618" y="68" class="round-label">rounded</text>

      <!-- === ARABIC (3 vowels): i, a, u === -->
      <!-- Triangle connecting the three -->
      <polygon points="180,90 650,90 350,420" fill="none" stroke="var(--arabic)" stroke-width="2" stroke-dasharray="8,4" opacity="0.5"/>

      <circle cx="180" cy="90" r="10" fill="var(--arabic)" opacity="0.25" stroke="var(--arabic)" stroke-width="1.5"/>
      <text x="180" y="96" text-anchor="middle" class="vowel-arabic">/i/</text>

      <circle cx="350" cy="420" r="10" fill="var(--arabic)" opacity="0.25" stroke="var(--arabic)" stroke-width="1.5"/>
      <text x="350" y="426" text-anchor="middle" class="vowel-arabic">/a/</text>

      <circle cx="650" cy="90" r="10" fill="var(--arabic)" opacity="0.25" stroke="var(--arabic)" stroke-width="1.5"/>
      <text x="650" y="96" text-anchor="middle" class="vowel-arabic">/u/</text>

      <text x="395" y="260" style="font:italic 11px 'Segoe UI',sans-serif;fill:var(--arabic);">Arabic: 3 vowels</text>
      <text x="395" y="275" style="font:italic 10px 'Segoe UI',sans-serif;fill:var(--arabic);">(maximum dispersion)</text>

      <!-- === SPANISH (5 vowels): i, e, a, o, u === -->
      <polygon points="200,100 185,210 300,410 595,210 620,100" fill="none" stroke="var(--spanish)" stroke-width="2" opacity="0.5"/>

      <circle cx="200" cy="100" r="8" fill="var(--spanish)" opacity="0.2" stroke="var(--spanish)" stroke-width="1.5"/>
      <text x="216" y="106" class="vowel-spanish">/i/</text>

      <circle cx="185" cy="210" r="8" fill="var(--spanish)" opacity="0.2" stroke="var(--spanish)" stroke-width="1.5"/>
      <text x="169" y="215" class="vowel-spanish">/e/</text>

      <circle cx="300" cy="410" r="8" fill="var(--spanish)" opacity="0.2" stroke="var(--spanish)" stroke-width="1.5"/>
      <text x="280" y="407" class="vowel-spanish">/a/</text>

      <circle cx="595" cy="210" r="8" fill="var(--spanish)" opacity="0.2" stroke="var(--spanish)" stroke-width="1.5"/>
      <text x="608" y="215" class="vowel-spanish">/o/</text>

      <circle cx="620" cy="100" r="8" fill="var(--spanish)" opacity="0.2" stroke="var(--spanish)" stroke-width="1.5"/>
      <text x="603" y="96" class="vowel-spanish">/u/</text>

      <!-- === ENGLISH (~11-15 vowels) === -->
      <!-- Monophthongs shown -->
      <!-- /i:/ close front -->
      <circle cx="195" cy="88" r="5" fill="var(--english)" opacity="0.7"/>
      <text x="195" y="80" text-anchor="middle" class="vowel-english">i&#x02D0;</text>

      <!-- /I/ near-close near-front -->
      <circle cx="240" cy="125" r="5" fill="var(--english)" opacity="0.7"/>
      <text x="260" y="125" class="vowel-english">&#x026A;</text>

      <!-- /e/ close-mid front (DRESS) -->
      <circle cx="195" cy="275" r="5" fill="var(--english)" opacity="0.7"/>
      <text x="178" y="272" class="vowel-english">&#x025B;</text>

      <!-- /ae/ near-open front (TRAP) -->
      <circle cx="215" cy="385" r="5" fill="var(--english)" opacity="0.7"/>
      <text x="230" y="390" class="vowel-english">&#x00E6;</text>

      <!-- /a:/ open back (PALM) -->
      <circle cx="470" cy="430" r="5" fill="var(--english)" opacity="0.7"/>
      <text x="486" y="436" class="vowel-english">&#x0251;&#x02D0;</text>

      <!-- /schwa/ central -->
      <circle cx="395" cy="255" r="5" fill="var(--english)" opacity="0.7"/>
      <text x="408" y="252" class="vowel-english">&#x0259;</text>

      <!-- /uh/ STRUT -->
      <circle cx="420" cy="340" r="5" fill="var(--english)" opacity="0.7"/>
      <text x="436" y="345" class="vowel-english">&#x028C;</text>

      <!-- /u:/ close back -->
      <circle cx="600" cy="88" r="5" fill="var(--english)" opacity="0.7"/>
      <text x="580" y="80" text-anchor="end" class="vowel-english">u&#x02D0;</text>

      <!-- /U/ near-close near-back (FOOT) -->
      <circle cx="555" cy="125" r="5" fill="var(--english)" opacity="0.7"/>
      <text x="537" y="122" text-anchor="end" class="vowel-english">&#x028A;</text>

      <!-- /o:/ THOUGHT -->
      <circle cx="575" cy="300" r="5" fill="var(--english)" opacity="0.7"/>
      <text x="590" y="298" class="vowel-english">&#x0254;&#x02D0;</text>

      <!-- /3:/ NURSE (central) -->
      <circle cx="385" cy="210" r="5" fill="var(--english)" opacity="0.7"/>
      <text x="368" y="206" text-anchor="end" class="vowel-english">&#x025C;&#x02D0;</text>

      <text x="440" y="475" style="font:italic 11px 'Segoe UI',sans-serif;fill:var(--english);">English: ~11-15 vowels</text>

      <!-- Schwa annotation -->
      <line x1="395" y1="258" x2="395" y2="290" stroke="var(--english)" stroke-width="0.8" stroke-dasharray="2,2"/>
      <text x="395" y="302" text-anchor="middle" style="font:italic 9px 'Segoe UI',sans-serif;fill:var(--english);">schwa (most common</text>
      <text x="395" y="313" text-anchor="middle" style="font:italic 9px 'Segoe UI',sans-serif;fill:var(--english);">vowel in English)</text>
    </svg>
  </div>
  <div class="legend">
    <div class="legend-item">
      <div class="legend-dot" style="background:var(--arabic);"></div>
      <span>Arabic (3 vowels) -- minimal system</span>
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:var(--spanish);"></div>
      <span>Spanish (5 vowels) -- most common system</span>
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:var(--english);"></div>
      <span>English (~11-15 vowels) -- large system</span>
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:var(--cardinal);opacity:0.4;"></div>
      <span>Cardinal vowel reference points</span>
    </div>
  </div>
  <figcaption>
    <h2>Figure 2 &mdash; IPA Vowel Trapezoid with Language Overlays</h2>
    <p>The trapezoid maps tongue position: horizontal axis = front-to-back, vertical axis = close (high) to open (low). The shape reflects the oral cavity's geometry -- more room for tongue movement at the front. Arabic's 3-vowel system (/i, a, u/) achieves maximum acoustic dispersion. Spanish's 5-vowel system (/i, e, a, o, u/) is the world's most common pattern. English uses 11-15 monophthongs (plus diphthongs), filling much more of the available vowel space.</p>
  </figcaption>
</figure>
</body>
</html>
