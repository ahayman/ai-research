<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Great Vowel Shift</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --accent: #4361ee;
    --muted: #6c757d;
    --caption-bg: #f8f9fa;
    --grid: #e9ecef;
    --trapez-fill: #f0f4ff;
    --trapez-stroke: #adb5bd;
    --front-arrow: #e63946;
    --back-arrow: #4361ee;
    --diph-arrow: #7209b7;
    --me-color: #6c757d;
    --mod-color: #2a9d8f;
    --grimm-p: #e63946;
    --grimm-v: #4361ee;
    --grimm-va: #2a9d8f;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --accent: #6b8aff;
      --muted: #9a9ab0;
      --caption-bg: #1a1a2e;
      --grid: #252540;
      --trapez-fill: #151525;
      --trapez-stroke: #444466;
      --front-arrow: #ff6b7a;
      --back-arrow: #6b8aff;
      --diph-arrow: #b366ff;
      --me-color: #9a9ab0;
      --mod-color: #4dd8c0;
      --grimm-p: #ff6b7a;
      --grimm-v: #6b8aff;
      --grimm-va: #4dd8c0;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure { max-width: 1050px; width: 100%; }
  .chart-wrapper {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1rem;
    overflow-x: auto;
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding: 1rem 1.5rem;
    background: var(--caption-bg);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  .legend {
    display: flex;
    gap: 1.5rem;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 1rem;
    font-size: 0.82rem;
    color: var(--muted);
  }
  .legend-item { display: flex; align-items: center; gap: 0.4rem; }
  .legend-line {
    width: 24px; height: 3px; border-radius: 2px;
  }
</style>
</head>
<body>
<figure>
  <div class="chart-wrapper">
    <svg viewBox="0 0 1000 680" xmlns="http://www.w3.org/2000/svg" style="min-width:750px;">
      <defs>
        <style>
          .title { font: bold 15px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
          .subtitle { font: 12px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
          .axis-text { font: 10px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
          .axis-label { font: bold 11px 'Segoe UI', system-ui, sans-serif; fill: var(--accent); }
          .vowel-me { font: bold 17px 'Gentium Plus', 'DejaVu Sans', serif; fill: var(--me-color); }
          .vowel-mod { font: bold 17px 'Gentium Plus', 'DejaVu Sans', serif; fill: var(--mod-color); }
          .word-label { font: italic 11px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
          .panel-title { font: bold 13px 'Segoe UI', system-ui, sans-serif; fill: var(--accent); }
          .grimm-text { font: 12px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
          .grimm-bold { font: bold 12px 'Segoe UI', system-ui, sans-serif; }
        </style>
        <marker id="arr-front" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
          <polygon points="0 0, 10 3.5, 0 7" fill="var(--front-arrow)"/>
        </marker>
        <marker id="arr-back" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
          <polygon points="0 0, 10 3.5, 0 7" fill="var(--back-arrow)"/>
        </marker>
        <marker id="arr-diph" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
          <polygon points="0 0, 10 3.5, 0 7" fill="var(--diph-arrow)"/>
        </marker>
        <marker id="arr-gp" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="var(--grimm-p)"/>
        </marker>
        <marker id="arr-gv" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="var(--grimm-v)"/>
        </marker>
        <marker id="arr-gva" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="var(--grimm-va)"/>
        </marker>
      </defs>

      <text x="330" y="28" text-anchor="middle" class="title">The Great Vowel Shift (c. 1400-1700)</text>
      <text x="330" y="48" text-anchor="middle" class="subtitle">How every long vowel in English changed position -- shown on the vowel trapezoid</text>

      <!-- ============ MAIN VOWEL TRAPEZOID ============ -->
      <g transform="translate(30, 65)">
        <!-- Axis labels -->
        <text x="120" y="0" class="axis-label">Front</text>
        <text x="390" y="0" class="axis-label">Back</text>

        <!-- Trapezoid -->
        <polygon points="100,15 460,15 420,330 70,330"
          fill="var(--trapez-fill)" stroke="var(--trapez-stroke)" stroke-width="1.5" stroke-dasharray="6,3"/>

        <!-- Height labels -->
        <text x="55" y="25" class="axis-text" text-anchor="end">Close</text>
        <text x="55" y="125" class="axis-text" text-anchor="end">Close-mid</text>
        <text x="55" y="225" class="axis-text" text-anchor="end">Open-mid</text>
        <text x="55" y="335" class="axis-text" text-anchor="end">Open</text>

        <!-- Guide lines -->
        <line x1="70" y1="15" x2="460" y2="15" stroke="var(--trapez-stroke)" stroke-width="0.5" stroke-dasharray="4,4"/>
        <line x1="80" y1="120" x2="448" y2="120" stroke="var(--trapez-stroke)" stroke-width="0.5" stroke-dasharray="4,4"/>
        <line x1="85" y1="225" x2="435" y2="225" stroke="var(--trapez-stroke)" stroke-width="0.5" stroke-dasharray="4,4"/>
        <line x1="70" y1="330" x2="420" y2="330" stroke="var(--trapez-stroke)" stroke-width="0.5" stroke-dasharray="4,4"/>

        <!-- ====== FRONT VOWEL SHIFTS (red arrows) ====== -->

        <!-- /a:/ (open front) -> /e:/ (close-mid front) -> eventually /eI/ -->
        <!-- "name": ME /a:/ to ModE /eI/ -->
        <circle cx="110" cy="310" r="5" fill="var(--me-color)" opacity="0.5"/>
        <text x="90" y="315" text-anchor="end" class="vowel-me">a&#x02D0;</text>
        <path d="M 110,305 Q 115,240 115,140" fill="none" stroke="var(--front-arrow)" stroke-width="2.5" marker-end="url(#arr-front)"/>
        <text x="120" y="135" class="vowel-mod">e&#x02D0;</text>
        <text x="90" y="330" text-anchor="end" class="word-label">"name"</text>

        <!-- /e:/ (close-mid front) -> /i:/ (close front) -->
        <!-- This is ME /e:/ from words like "meat" -->
        <circle cx="140" cy="210" r="5" fill="var(--me-color)" opacity="0.5"/>
        <text x="118" y="215" text-anchor="end" class="vowel-me">&#x025B;&#x02D0;</text>
        <path d="M 140,205 Q 138,170 135,135" fill="none" stroke="var(--front-arrow)" stroke-width="2.5" marker-end="url(#arr-front)"/>
        <text x="93" y="130" text-anchor="end" class="vowel-mod">e&#x02D0;</text>
        <text x="118" y="230" text-anchor="end" class="word-label">"meat"</text>

        <!-- /e:/ close-mid -> /i:/ -->
        <circle cx="115" cy="120" r="5" fill="var(--me-color)" opacity="0.5"/>
        <text x="94" y="117" text-anchor="end" class="vowel-me">e&#x02D0;</text>
        <path d="M 115,115 Q 112,75 110,30" fill="none" stroke="var(--front-arrow)" stroke-width="2.5" marker-end="url(#arr-front)"/>
        <text x="95" y="25" text-anchor="end" class="vowel-mod">i&#x02D0;</text>
        <text x="94" y="102" text-anchor="end" class="word-label">"beet"</text>

        <!-- /i:/ (close front) -> /aI/ diphthong (breaks out) -->
        <circle cx="110" cy="20" r="5" fill="var(--me-color)" opacity="0.5"/>
        <text x="120" y="16" class="vowel-me">i&#x02D0;</text>
        <path d="M 115,25 Q 160,100 200,250" fill="none" stroke="var(--diph-arrow)" stroke-width="2.5" stroke-dasharray="6,3" marker-end="url(#arr-diph)"/>
        <text x="210" y="258" class="vowel-mod">/aI/</text>
        <text x="140" y="13" class="word-label">"bite"</text>

        <!-- ====== BACK VOWEL SHIFTS (blue arrows) ====== -->

        <!-- /o:/ (close-mid back) -> /u:/ (close back) -->
        <circle cx="435" cy="120" r="5" fill="var(--me-color)" opacity="0.5"/>
        <text x="448" y="117" class="vowel-me">o&#x02D0;</text>
        <path d="M 435,115 Q 440,75 445,30" fill="none" stroke="var(--back-arrow)" stroke-width="2.5" marker-end="url(#arr-back)"/>
        <text x="456" y="25" class="vowel-mod">u&#x02D0;</text>
        <text x="448" y="102" class="word-label">"boot"</text>

        <!-- /o:/ open-mid -> /o:/ close-mid -->
        <circle cx="415" cy="220" r="5" fill="var(--me-color)" opacity="0.5"/>
        <text x="430" y="225" class="vowel-me">&#x0254;&#x02D0;</text>
        <path d="M 418,215 Q 425,175 430,140" fill="none" stroke="var(--back-arrow)" stroke-width="2.5" marker-end="url(#arr-back)"/>
        <text x="440" y="137" class="vowel-mod">o&#x02D0;</text>
        <text x="430" y="240" class="word-label">"boat"</text>

        <!-- /u:/ (close back) -> /aU/ diphthong -->
        <circle cx="450" cy="20" r="5" fill="var(--me-color)" opacity="0.5"/>
        <text x="435" y="16" text-anchor="end" class="vowel-me">u&#x02D0;</text>
        <path d="M 445,25 Q 400,100 340,250" fill="none" stroke="var(--diph-arrow)" stroke-width="2.5" stroke-dasharray="6,3" marker-end="url(#arr-diph)"/>
        <text x="320" y="258" text-anchor="end" class="vowel-mod">/aU/</text>
        <text x="435" y="8" text-anchor="end" class="word-label">"house"</text>

        <!-- Legend for the vowel shift -->
        <rect x="170" y="348" width="230" height="55" rx="6" fill="var(--surface)" stroke="var(--border)" stroke-width="1"/>
        <line x1="185" y1="367" x2="215" y2="367" stroke="var(--front-arrow)" stroke-width="2.5"/>
        <text x="222" y="371" class="axis-text" style="fill:var(--front-arrow);">Front vowel raising</text>
        <line x1="185" y1="385" x2="215" y2="385" stroke="var(--back-arrow)" stroke-width="2.5"/>
        <text x="222" y="389" class="axis-text" style="fill:var(--back-arrow);">Back vowel raising</text>
        <line x1="185" y1="395" x2="215" y2="395" stroke="var(--diph-arrow)" stroke-width="2.5" stroke-dasharray="5,3"/>
        <text x="222" y="399" class="axis-text" style="fill:var(--diph-arrow);">Diphthongization (highest vowels)</text>
      </g>

      <!-- ============ SIDE PANEL: Grimm's Law ============ -->
      <g transform="translate(600, 65)">
        <rect x="0" y="0" width="370" height="395" rx="10" fill="var(--surface)" stroke="var(--border)" stroke-width="1.5"/>
        <text x="185" y="28" text-anchor="middle" class="panel-title">Grimm's Law: The First Germanic</text>
        <text x="185" y="46" text-anchor="middle" class="panel-title">Consonant Shift (c. 1000-500 BCE)</text>

        <!-- Chain shift circle diagram -->
        <!-- Three nodes in a triangle -->

        <!-- Voiceless Stops -->
        <circle cx="185" cy="95" r="40" fill="var(--grimm-p)" opacity="0.12" stroke="var(--grimm-p)" stroke-width="2"/>
        <text x="185" y="88" text-anchor="middle" class="grimm-bold" style="fill:var(--grimm-p);">Voiceless</text>
        <text x="185" y="104" text-anchor="middle" class="grimm-bold" style="fill:var(--grimm-p);">Stops</text>
        <text x="185" y="118" text-anchor="middle" class="axis-text" style="fill:var(--grimm-p);">*p, *t, *k</text>

        <!-- Voiced Stops -->
        <circle cx="95" cy="240" r="40" fill="var(--grimm-v)" opacity="0.12" stroke="var(--grimm-v)" stroke-width="2"/>
        <text x="95" y="233" text-anchor="middle" class="grimm-bold" style="fill:var(--grimm-v);">Voiced</text>
        <text x="95" y="249" text-anchor="middle" class="grimm-bold" style="fill:var(--grimm-v);">Stops</text>
        <text x="95" y="263" text-anchor="middle" class="axis-text" style="fill:var(--grimm-v);">*b, *d, *g</text>

        <!-- Voiced Aspirated Stops -->
        <circle cx="275" cy="240" r="40" fill="var(--grimm-va)" opacity="0.12" stroke="var(--grimm-va)" stroke-width="2"/>
        <text x="275" y="226" text-anchor="middle" class="grimm-bold" style="fill:var(--grimm-va);">Voiced</text>
        <text x="275" y="242" text-anchor="middle" class="grimm-bold" style="fill:var(--grimm-va);">Aspirated</text>
        <text x="275" y="258" text-anchor="middle" class="grimm-bold" style="fill:var(--grimm-va);">Stops</text>
        <text x="275" y="272" text-anchor="middle" class="axis-text" style="fill:var(--grimm-va);">*bh, *dh, *gh</text>

        <!-- Arrows showing the chain shift -->
        <!-- Voiceless stops -> Voiceless Fricatives (out of the triangle, to the right) -->
        <rect x="280" y="75" width="80" height="40" rx="6" fill="var(--grimm-p)" opacity="0.08" stroke="var(--grimm-p)" stroke-width="1.2"/>
        <text x="320" y="93" text-anchor="middle" class="axis-text" style="fill:var(--grimm-p);font-weight:bold;">Fricatives</text>
        <text x="320" y="107" text-anchor="middle" class="axis-text" style="fill:var(--grimm-p);">f, th, h</text>
        <path d="M 222,85 Q 250,82 278,88" fill="none" stroke="var(--grimm-p)" stroke-width="2" marker-end="url(#arr-gp)"/>

        <!-- Voiced stops -> Voiceless stops position -->
        <path d="M 115,205 Q 140,160 165,130" fill="none" stroke="var(--grimm-v)" stroke-width="2" marker-end="url(#arr-gv)"/>
        <text x="120" y="165" class="axis-text" style="fill:var(--grimm-v);font-weight:bold;">become p,t,k</text>

        <!-- Voiced aspirated -> Voiced stops position -->
        <path d="M 240,225 Q 190,220 135,230" fill="none" stroke="var(--grimm-va)" stroke-width="2" marker-end="url(#arr-gva)"/>
        <text x="185" y="218" text-anchor="middle" class="axis-text" style="fill:var(--grimm-va);font-weight:bold;">become b,d,g</text>

        <!-- Examples -->
        <rect x="20" y="295" width="330" height="85" rx="6" fill="var(--node-bg, var(--surface))" stroke="var(--border)" stroke-width="1"/>
        <text x="35" y="314" class="grimm-text"><tspan style="fill:var(--grimm-p);font-weight:bold;">*p > f:</tspan> Latin "pater" > English "father"</text>
        <text x="35" y="334" class="grimm-text"><tspan style="fill:var(--grimm-p);font-weight:bold;">*t > th:</tspan> Latin "tres" > English "three"</text>
        <text x="35" y="354" class="grimm-text"><tspan style="fill:var(--grimm-v);font-weight:bold;">*d > t:</tspan> Latin "decem" > English "ten"</text>
        <text x="35" y="374" class="grimm-text"><tspan style="fill:var(--grimm-va);font-weight:bold;">*bh > b:</tspan> Sanskrit "bhrata" > Eng. "brother"</text>
      </g>

      <!-- ============ BOTTOM: Word Examples Timeline ============ -->
      <g transform="translate(30, 490)">
        <text x="0" y="0" class="panel-title">Selected Word Transformations</text>

        <rect x="0" y="12" width="940" height="165" rx="8" fill="var(--surface)" stroke="var(--border)" stroke-width="1"/>

        <!-- Column headers -->
        <text x="80" y="35" text-anchor="middle" style="font:bold 11px 'Segoe UI',sans-serif;fill:var(--me-color);">Middle English</text>
        <text x="80" y="50" text-anchor="middle" style="font:bold 11px 'Segoe UI',sans-serif;fill:var(--me-color);">(c. 1400)</text>

        <text x="280" y="35" text-anchor="middle" style="font:bold 11px 'Segoe UI',sans-serif;fill:var(--fg);">Pronunciation</text>
        <text x="280" y="50" text-anchor="middle" style="font:bold 11px 'Segoe UI',sans-serif;fill:var(--fg);">Change</text>

        <text x="500" y="35" text-anchor="middle" style="font:bold 11px 'Segoe UI',sans-serif;fill:var(--mod-color);">Modern English</text>

        <text x="720" y="35" text-anchor="middle" style="font:bold 11px 'Segoe UI',sans-serif;fill:var(--muted);">Spelling</text>
        <text x="720" y="50" text-anchor="middle" style="font:bold 11px 'Segoe UI',sans-serif;fill:var(--muted);">Note</text>

        <!-- bite -->
        <text x="80" y="78" text-anchor="middle" class="vowel-me">"bite" /bi&#x02D0;t&#x0259;/</text>
        <text x="280" y="78" text-anchor="middle" style="font:14px 'Gentium Plus',serif;fill:var(--diph-arrow);">/i&#x02D0;/ --> /aI/</text>
        <text x="500" y="78" text-anchor="middle" class="vowel-mod">"bite" /baIt/</text>
        <text x="720" y="78" text-anchor="middle" class="word-label">silent 'e' once pronounced</text>

        <!-- house -->
        <text x="80" y="105" text-anchor="middle" class="vowel-me">"hous" /hu&#x02D0;s/</text>
        <text x="280" y="105" text-anchor="middle" style="font:14px 'Gentium Plus',serif;fill:var(--diph-arrow);">/u&#x02D0;/ --> /aU/</text>
        <text x="500" y="105" text-anchor="middle" class="vowel-mod">"house" /haUs/</text>
        <text x="720" y="105" text-anchor="middle" class="word-label">'ou' once = /u&#x02D0;/</text>

        <!-- beet / meat -->
        <text x="80" y="132" text-anchor="middle" class="vowel-me">"bete" /be&#x02D0;t&#x0259;/</text>
        <text x="280" y="132" text-anchor="middle" style="font:14px 'Gentium Plus',serif;fill:var(--front-arrow);">/e&#x02D0;/ --> /i&#x02D0;/</text>
        <text x="500" y="132" text-anchor="middle" class="vowel-mod">"beet" /bi&#x02D0;t/</text>
        <text x="720" y="132" text-anchor="middle" class="word-label">'ee' once = /e&#x02D0;/</text>

        <!-- boot -->
        <text x="80" y="159" text-anchor="middle" class="vowel-me">"bote" /bo&#x02D0;t&#x0259;/</text>
        <text x="280" y="159" text-anchor="middle" style="font:14px 'Gentium Plus',serif;fill:var(--back-arrow);">/o&#x02D0;/ --> /u&#x02D0;/</text>
        <text x="500" y="159" text-anchor="middle" class="vowel-mod">"boot" /bu&#x02D0;t/</text>
        <text x="720" y="159" text-anchor="middle" class="word-label">'oo' once = /o&#x02D0;/</text>
      </g>
    </svg>
  </div>
  <div class="legend">
    <div class="legend-item">
      <div class="legend-line" style="background:var(--front-arrow);"></div>
      <span>Front vowel raising</span>
    </div>
    <div class="legend-item">
      <div class="legend-line" style="background:var(--back-arrow);"></div>
      <span>Back vowel raising</span>
    </div>
    <div class="legend-item">
      <div class="legend-line" style="background:var(--diph-arrow);border:1px dashed var(--diph-arrow);"></div>
      <span>Diphthongization</span>
    </div>
    <div class="legend-item">
      <span style="color:var(--me-color);font-weight:bold;">Gray</span>
      <span>= Middle English</span>
    </div>
    <div class="legend-item">
      <span style="color:var(--mod-color);font-weight:bold;">Teal</span>
      <span>= Modern English</span>
    </div>
  </div>
  <figcaption>
    <h2>Figure 7 &mdash; The Great Vowel Shift and Grimm's Law</h2>
    <p>Left: The Great Vowel Shift (c. 1400-1700) transformed every long vowel in English. Mid and low vowels raised one or two steps; the two highest vowels (/i:/ and /u:/) broke into diphthongs (/aI/ and /aU/). This chain shift is why English spelling (frozen c. 1470 by printing) mismatches modern pronunciation. Right: Grimm's Law (c. 1000-500 BCE) shows the earlier Proto-Indo-European to Proto-Germanic consonant chain shift, where voiceless stops became fricatives, voiced stops became voiceless, and aspirated stops lost aspiration.</p>
  </figcaption>
</figure>
</body>
</html>
