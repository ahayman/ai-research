<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phoneme Inventory Distribution</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --accent: #4361ee;
    --accent2: #7209b7;
    --muted: #6c757d;
    --caption-bg: #f8f9fa;
    --bar-small: #e63946;
    --bar-modsmall: #f4845f;
    --bar-average: #4361ee;
    --bar-modlarge: #7209b7;
    --bar-large: #2d0057;
    --marker: #e63946;
    --grid: #e9ecef;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --accent: #6b8aff;
      --accent2: #b366ff;
      --muted: #9a9ab0;
      --caption-bg: #1a1a2e;
      --bar-small: #ff6b7a;
      --bar-modsmall: #ffa07a;
      --bar-average: #6b8aff;
      --bar-modlarge: #b366ff;
      --bar-large: #8b5cf6;
      --marker: #ff6b7a;
      --grid: #252540;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure { max-width: 950px; width: 100%; }
  .chart-wrapper {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.5rem 1rem;
    overflow-x: auto;
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding: 1rem 1.5rem;
    background: var(--caption-bg);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
</style>
</head>
<body>
<figure>
  <div class="chart-wrapper">
    <svg viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg" style="min-width:700px;">
      <defs>
        <style>
          .title { font: bold 14px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
          .axis-text { font: 11px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
          .axis-label { font: bold 11px 'Segoe UI', system-ui, sans-serif; fill: var(--accent); }
          .lang-label { font: bold 10px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
          .lang-detail { font: italic 9px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
          .cat-label { font: bold 10px 'Segoe UI', system-ui, sans-serif; }
          .count-label { font: bold 11px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
        </style>
        <linearGradient id="spectrum" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="var(--bar-small)"/>
          <stop offset="25%" stop-color="var(--bar-modsmall)"/>
          <stop offset="50%" stop-color="var(--bar-average)"/>
          <stop offset="75%" stop-color="var(--bar-modlarge)"/>
          <stop offset="100%" stop-color="var(--bar-large)"/>
        </linearGradient>
      </defs>

      <text x="450" y="28" text-anchor="middle" class="title">Phoneme Inventory Sizes Across World Languages</text>

      <!-- === TOP SECTION: Notable Languages Bar Chart === -->
      <text x="60" y="58" class="axis-label">Notable Languages (Total Phonemes)</text>

      <!-- Scale bar at top -->
      <g transform="translate(180, 50)">
        <line x1="0" y1="0" x2="660" y2="0" stroke="var(--grid)" stroke-width="0.5"/>
        <!-- Tick marks at 0, 20, 40, 60, 80, 100, 120, 140 -->
        <line x1="0" y1="-4" x2="0" y2="4" stroke="var(--grid)" stroke-width="1"/>
        <text x="0" y="14" text-anchor="middle" class="axis-text">0</text>

        <line x1="94" y1="-4" x2="94" y2="4" stroke="var(--grid)" stroke-width="1"/>
        <text x="94" y="14" text-anchor="middle" class="axis-text">20</text>

        <line x1="188" y1="-4" x2="188" y2="4" stroke="var(--grid)" stroke-width="1"/>
        <text x="188" y="14" text-anchor="middle" class="axis-text">40</text>

        <line x1="283" y1="-4" x2="283" y2="4" stroke="var(--grid)" stroke-width="1"/>
        <text x="283" y="14" text-anchor="middle" class="axis-text">60</text>

        <line x1="377" y1="-4" x2="377" y2="4" stroke="var(--grid)" stroke-width="1"/>
        <text x="377" y="14" text-anchor="middle" class="axis-text">80</text>

        <line x1="471" y1="-4" x2="471" y2="4" stroke="var(--grid)" stroke-width="1"/>
        <text x="471" y="14" text-anchor="middle" class="axis-text">100</text>

        <line x1="565" y1="-4" x2="565" y2="4" stroke="var(--grid)" stroke-width="1"/>
        <text x="565" y="14" text-anchor="middle" class="axis-text">120</text>

        <line x1="660" y1="-4" x2="660" y2="4" stroke="var(--grid)" stroke-width="1"/>
        <text x="660" y="14" text-anchor="middle" class="axis-text">140</text>
      </g>

      <!-- Grid lines -->
      <g transform="translate(180, 68)">
        <line x1="94" y1="0" x2="94" y2="240" stroke="var(--grid)" stroke-width="0.5" stroke-dasharray="3,3"/>
        <line x1="188" y1="0" x2="188" y2="240" stroke="var(--grid)" stroke-width="0.5" stroke-dasharray="3,3"/>
        <line x1="283" y1="0" x2="283" y2="240" stroke="var(--grid)" stroke-width="0.5" stroke-dasharray="3,3"/>
        <line x1="377" y1="0" x2="377" y2="240" stroke="var(--grid)" stroke-width="0.5" stroke-dasharray="3,3"/>
        <line x1="471" y1="0" x2="471" y2="240" stroke="var(--grid)" stroke-width="0.5" stroke-dasharray="3,3"/>
        <line x1="565" y1="0" x2="565" y2="240" stroke="var(--grid)" stroke-width="0.5" stroke-dasharray="3,3"/>
      </g>

      <!-- Language bars -->
      <g transform="translate(0, 68)">
        <!-- Piraha: 11 -->
        <text x="175" y="18" text-anchor="end" class="lang-label">Piraha</text>
        <rect x="180" y="6" width="52" height="18" rx="3" fill="var(--bar-small)" opacity="0.85"/>
        <text x="237" y="20" class="count-label">11</text>
        <text x="175" y="32" text-anchor="end" class="lang-detail">Amazonian Brazil</text>

        <!-- Rotokas: 11 -->
        <text x="175" y="58" text-anchor="end" class="lang-label">Rotokas</text>
        <rect x="180" y="46" width="52" height="18" rx="3" fill="var(--bar-small)" opacity="0.85"/>
        <text x="237" y="60" class="count-label">11</text>
        <text x="175" y="72" text-anchor="end" class="lang-detail">Papua New Guinea</text>

        <!-- Hawaiian: 13 -->
        <text x="175" y="98" text-anchor="end" class="lang-label">Hawaiian</text>
        <rect x="180" y="86" width="61" height="18" rx="3" fill="var(--bar-modsmall)" opacity="0.85"/>
        <text x="246" y="100" class="count-label">13</text>

        <!-- Japanese: ~22 -->
        <text x="175" y="138" text-anchor="end" class="lang-label">Japanese</text>
        <rect x="180" y="126" width="103" height="18" rx="3" fill="var(--bar-average)" opacity="0.85"/>
        <text x="288" y="140" class="count-label">~22</text>

        <!-- English: ~38 -->
        <text x="175" y="170" text-anchor="end" class="lang-label">English</text>
        <rect x="180" y="158" width="179" height="18" rx="3" fill="var(--bar-average)" opacity="0.85"/>
        <text x="365" y="172" class="count-label">~38</text>
        <text x="175" y="184" text-anchor="end" class="lang-detail">24C + ~14V</text>

        <!-- Georgian: ~38 -->
        <text x="175" y="206" text-anchor="end" class="lang-label">Georgian</text>
        <rect x="180" y="194" width="179" height="18" rx="3" fill="var(--bar-modlarge)" opacity="0.85"/>
        <text x="365" y="208" class="count-label">~38</text>

        <!-- !Xoo (Taa): 122+ -->
        <text x="175" y="242" text-anchor="end" class="lang-label">!Xoo (Taa)</text>
        <rect x="180" y="230" width="574" height="18" rx="3" fill="var(--bar-large)" opacity="0.85"/>
        <text x="760" y="244" class="count-label">122+</text>
        <text x="175" y="256" text-anchor="end" class="lang-detail">Khoisan, Botswana</text>
      </g>

      <!-- Mean line -->
      <g transform="translate(180, 68)">
        <line x1="141" y1="0" x2="141" y2="260" stroke="var(--marker)" stroke-width="2" stroke-dasharray="6,3"/>
        <text x="145" y="270" class="axis-text" style="fill:var(--marker);font-weight:bold;">Mean: ~30</text>
      </g>

      <!-- === BOTTOM SECTION: WALS Distribution === -->
      <g transform="translate(0, 360)">
        <text x="60" y="0" class="axis-label">WALS Consonant Inventory Distribution (562 languages)</text>

        <!-- Category boxes -->
        <g transform="translate(60, 15)">
          <!-- Small: 6-14 -->
          <rect x="0" y="0" width="140" height="50" rx="6" fill="var(--bar-small)" opacity="0.15" stroke="var(--bar-small)" stroke-width="1.5"/>
          <text x="70" y="20" text-anchor="middle" class="cat-label" style="fill:var(--bar-small);">Small</text>
          <text x="70" y="34" text-anchor="middle" class="axis-text">6-14 consonants</text>
          <text x="70" y="46" text-anchor="middle" class="lang-detail">~89 languages (16%)</text>

          <!-- Mod small: 15-18 -->
          <rect x="150" y="0" width="140" height="50" rx="6" fill="var(--bar-modsmall)" opacity="0.15" stroke="var(--bar-modsmall)" stroke-width="1.5"/>
          <text x="220" y="20" text-anchor="middle" class="cat-label" style="fill:var(--bar-modsmall);">Mod. Small</text>
          <text x="220" y="34" text-anchor="middle" class="axis-text">15-18 consonants</text>
          <text x="220" y="46" text-anchor="middle" class="lang-detail">~122 languages (22%)</text>

          <!-- Average: 19-25 -->
          <rect x="300" y="0" width="140" height="50" rx="6" fill="var(--bar-average)" opacity="0.15" stroke="var(--bar-average)" stroke-width="1.5"/>
          <text x="370" y="20" text-anchor="middle" class="cat-label" style="fill:var(--bar-average);">Average</text>
          <text x="370" y="34" text-anchor="middle" class="axis-text">19-25 consonants</text>
          <text x="370" y="46" text-anchor="middle" class="lang-detail">~201 languages (36%)</text>

          <!-- Mod large: 26-33 -->
          <rect x="450" y="0" width="140" height="50" rx="6" fill="var(--bar-modlarge)" opacity="0.15" stroke="var(--bar-modlarge)" stroke-width="1.5"/>
          <text x="520" y="20" text-anchor="middle" class="cat-label" style="fill:var(--bar-modlarge);">Mod. Large</text>
          <text x="520" y="34" text-anchor="middle" class="axis-text">26-33 consonants</text>
          <text x="520" y="46" text-anchor="middle" class="lang-detail">~94 languages (17%)</text>

          <!-- Large: 34+ -->
          <rect x="600" y="0" width="140" height="50" rx="6" fill="var(--bar-large)" opacity="0.15" stroke="var(--bar-large)" stroke-width="1.5"/>
          <text x="670" y="20" text-anchor="middle" class="cat-label" style="fill:var(--bar-large);">Large</text>
          <text x="670" y="34" text-anchor="middle" class="axis-text">34+ consonants</text>
          <text x="670" y="46" text-anchor="middle" class="lang-detail">~56 languages (10%)</text>
        </g>

        <!-- Distribution bar (proportional) -->
        <g transform="translate(60, 75)">
          <rect x="0" y="0" width="118" height="24" rx="4" fill="var(--bar-small)" opacity="0.7"/>
          <rect x="118" y="0" width="162" height="24" rx="0" fill="var(--bar-modsmall)" opacity="0.7"/>
          <rect x="280" y="0" width="266" height="24" rx="0" fill="var(--bar-average)" opacity="0.7"/>
          <rect x="546" y="0" width="125" height="24" rx="0" fill="var(--bar-modlarge)" opacity="0.7"/>
          <rect x="671" y="0" width="69" height="24" rx="4" fill="var(--bar-large)" opacity="0.7"/>

          <text x="59" y="16" text-anchor="middle" style="font:bold 10px 'Segoe UI',sans-serif;fill:white;">16%</text>
          <text x="199" y="16" text-anchor="middle" style="font:bold 10px 'Segoe UI',sans-serif;fill:white;">22%</text>
          <text x="413" y="16" text-anchor="middle" style="font:bold 10px 'Segoe UI',sans-serif;fill:white;">36%</text>
          <text x="608" y="16" text-anchor="middle" style="font:bold 10px 'Segoe UI',sans-serif;fill:white;">17%</text>
          <text x="705" y="16" text-anchor="middle" style="font:bold 10px 'Segoe UI',sans-serif;fill:white;">10%</text>
        </g>

        <!-- Note about mean -->
        <text x="450" y="118" text-anchor="middle" class="axis-text">Mean consonant inventory: 22.7 &nbsp;|&nbsp; Median: 21 &nbsp;|&nbsp; Mode: 22</text>
      </g>
    </svg>
  </div>
  <figcaption>
    <h2>Figure 3 &mdash; Phoneme Inventory Size Distribution</h2>
    <p>Languages range from ~11 phonemes (Piraha, Rotokas) to over 122 consonants alone (!Xoo/Taa, a Khoisan language with extensive click consonants). The WALS survey of 562 languages shows the majority cluster around 19-25 consonants, with a mean of 22.7. The dashed red line marks the approximate global mean of ~30 total phonemes (consonants + vowels).</p>
  </figcaption>
</figure>
</body>
</html>
