<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sonority Hierarchy</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --accent: #4361ee;
    --muted: #6c757d;
    --caption-bg: #f8f9fa;
    --grid: #e9ecef;
    --vowel: #e63946;
    --glide: #e76f51;
    --liquid: #f4a261;
    --nasal: #2a9d8f;
    --fric: #4361ee;
    --stop: #7209b7;
    --curve: #4361ee;
    --good: #2a9d8f;
    --bad: #e63946;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --accent: #6b8aff;
      --muted: #9a9ab0;
      --caption-bg: #1a1a2e;
      --grid: #252540;
      --vowel: #ff6b7a;
      --glide: #ffa07a;
      --liquid: #ffc87a;
      --nasal: #4dd8c0;
      --fric: #6b8aff;
      --stop: #b366ff;
      --curve: #6b8aff;
      --good: #4dd8c0;
      --bad: #ff6b7a;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure { max-width: 950px; width: 100%; }
  .chart-wrapper {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.5rem 1rem;
    overflow-x: auto;
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding: 1rem 1.5rem;
    background: var(--caption-bg);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
</style>
</head>
<body>
<figure>
  <div class="chart-wrapper">
    <svg viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg" style="min-width:700px;">
      <defs>
        <style>
          .title { font: bold 15px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
          .subtitle { font: 12px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
          .axis-text { font: 10px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
          .axis-label { font: bold 11px 'Segoe UI', system-ui, sans-serif; fill: var(--accent); }
          .scale-label { font: bold 12px 'Segoe UI', system-ui, sans-serif; }
          .scale-example { font: 14px 'Gentium Plus', 'DejaVu Sans', serif; fill: var(--fg); }
          .scale-num { font: bold 14px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
          .panel-title { font: bold 13px 'Segoe UI', system-ui, sans-serif; fill: var(--accent); }
          .seg-label { font: bold 14px 'Gentium Plus', 'DejaVu Sans', serif; }
          .seg-desc { font: 10px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
        </style>
        <marker id="arrow-good" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="var(--good)"/>
        </marker>
        <marker id="arrow-bad" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="var(--bad)"/>
        </marker>
      </defs>

      <text x="450" y="28" text-anchor="middle" class="title">Sonority Hierarchy and the Sonority Sequencing Principle</text>

      <!-- ============ SECTION 1: Sonority Scale ============ -->
      <text x="40" y="60" class="panel-title">The Sonority Scale</text>
      <text x="40" y="78" class="subtitle">Sounds ranked by inherent acoustic prominence (most sonorous at top)</text>

      <!-- Scale bars -->
      <g transform="translate(40, 95)">
        <!-- Level 6: Vowels -->
        <rect x="0" y="0" width="800" height="32" rx="6" fill="var(--vowel)" opacity="0.15" stroke="var(--vowel)" stroke-width="1.5"/>
        <text x="12" y="22" class="scale-num" style="fill:var(--vowel);">6</text>
        <text x="40" y="22" class="scale-label" style="fill:var(--vowel);">Open Vowels</text>
        <text x="200" y="22" class="scale-example">/a/, /e/, /o/</text>
        <text x="700" y="22" text-anchor="end" class="axis-text">MOST SONOROUS</text>

        <!-- Level 5: Close Vowels / Glides -->
        <rect x="40" y="38" width="720" height="32" rx="6" fill="var(--glide)" opacity="0.15" stroke="var(--glide)" stroke-width="1.5"/>
        <text x="52" y="60" class="scale-num" style="fill:var(--glide);">5</text>
        <text x="80" y="60" class="scale-label" style="fill:var(--glide);">Close Vowels / Glides</text>
        <text x="260" y="60" class="scale-example">/i/, /u/, /j/, /w/</text>

        <!-- Level 4: Liquids -->
        <rect x="80" y="76" width="640" height="32" rx="6" fill="var(--liquid)" opacity="0.15" stroke="var(--liquid)" stroke-width="1.5"/>
        <text x="92" y="98" class="scale-num" style="fill:var(--liquid);">4</text>
        <text x="120" y="98" class="scale-label" style="fill:var(--liquid);">Liquids</text>
        <text x="260" y="98" class="scale-example">/l/, /r/</text>

        <!-- Level 3: Nasals -->
        <rect x="120" y="114" width="560" height="32" rx="6" fill="var(--nasal)" opacity="0.15" stroke="var(--nasal)" stroke-width="1.5"/>
        <text x="132" y="136" class="scale-num" style="fill:var(--nasal);">3</text>
        <text x="160" y="136" class="scale-label" style="fill:var(--nasal);">Nasals</text>
        <text x="260" y="136" class="scale-example">/m/, /n/, /&#x014B;/</text>

        <!-- Level 2: Fricatives -->
        <rect x="160" y="152" width="480" height="32" rx="6" fill="var(--fric)" opacity="0.15" stroke="var(--fric)" stroke-width="1.5"/>
        <text x="172" y="174" class="scale-num" style="fill:var(--fric);">2</text>
        <text x="200" y="174" class="scale-label" style="fill:var(--fric);">Fricatives</text>
        <text x="320" y="174" class="scale-example">/f/, /s/, /&#x0283;/, /z/, /v/</text>

        <!-- Level 1: Stops -->
        <rect x="200" y="190" width="400" height="32" rx="6" fill="var(--stop)" opacity="0.15" stroke="var(--stop)" stroke-width="1.5"/>
        <text x="212" y="212" class="scale-num" style="fill:var(--stop);">1</text>
        <text x="240" y="212" class="scale-label" style="fill:var(--stop);">Stops (Plosives)</text>
        <text x="380" y="212" class="scale-example">/p/, /t/, /k/, /b/, /d/, /&#x0261;/</text>
        <text x="595" y="212" text-anchor="end" class="axis-text">LEAST SONOROUS</text>

        <!-- Arrow on the left showing direction -->
        <line x1="8" y1="225" x2="8" y2="5" stroke="var(--accent)" stroke-width="2" marker-end="url(#arrow-good)"/>
        <text x="8" y="240" text-anchor="middle" style="font:bold 9px 'Segoe UI',sans-serif;fill:var(--accent);">Increasing</text>
        <text x="8" y="252" text-anchor="middle" style="font:bold 9px 'Segoe UI',sans-serif;fill:var(--accent);">Sonority</text>
      </g>

      <!-- ============ SECTION 2: SSP Example "trust" ============ -->
      <g transform="translate(40, 370)">
        <text x="0" y="0" class="panel-title">SSP Illustrated: the word "trust" /tr&#x028C;st/</text>
        <text x="0" y="18" class="subtitle">Sonority rises from edges to nucleus (vowel peak) -- a well-formed syllable</text>

        <!-- Graph area -->
        <rect x="30" y="30" width="380" height="200" rx="4" fill="none" stroke="var(--grid)" stroke-width="1"/>

        <!-- Y-axis grid lines -->
        <line x1="30" y1="63" x2="410" y2="63" stroke="var(--grid)" stroke-width="0.5" stroke-dasharray="3,3"/>
        <text x="25" y="67" text-anchor="end" class="axis-text">5</text>
        <line x1="30" y1="97" x2="410" y2="97" stroke="var(--grid)" stroke-width="0.5" stroke-dasharray="3,3"/>
        <text x="25" y="101" text-anchor="end" class="axis-text">4</text>
        <line x1="30" y1="130" x2="410" y2="130" stroke="var(--grid)" stroke-width="0.5" stroke-dasharray="3,3"/>
        <text x="25" y="134" text-anchor="end" class="axis-text">3</text>
        <line x1="30" y1="163" x2="410" y2="163" stroke="var(--grid)" stroke-width="0.5" stroke-dasharray="3,3"/>
        <text x="25" y="167" text-anchor="end" class="axis-text">2</text>
        <line x1="30" y1="197" x2="410" y2="197" stroke="var(--grid)" stroke-width="0.5" stroke-dasharray="3,3"/>
        <text x="25" y="201" text-anchor="end" class="axis-text">1</text>
        <text x="25" y="234" text-anchor="end" class="axis-text">0</text>

        <!-- X-axis labels (segments) -->
        <!-- t=1, r=4, ʌ=6, s=2, t=1 -->

        <!-- Sonority curve -->
        <path d="M 75,197 L 155,97 L 235,30 L 315,163 L 395,197"
          fill="none" stroke="var(--curve)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

        <!-- Data points -->
        <circle cx="75" cy="197" r="8" fill="var(--stop)" opacity="0.8"/>
        <text x="75" y="201" text-anchor="middle" style="font:bold 10px sans-serif;fill:white;">t</text>
        <text x="75" y="245" text-anchor="middle" class="seg-label" style="fill:var(--stop);">/t/</text>
        <text x="75" y="258" text-anchor="middle" class="seg-desc">stop</text>

        <circle cx="155" cy="97" r="8" fill="var(--liquid)" opacity="0.8"/>
        <text x="155" y="101" text-anchor="middle" style="font:bold 10px sans-serif;fill:white;">r</text>
        <text x="155" y="245" text-anchor="middle" class="seg-label" style="fill:var(--liquid);">/r/</text>
        <text x="155" y="258" text-anchor="middle" class="seg-desc">liquid</text>

        <circle cx="235" cy="30" r="10" fill="var(--vowel)" opacity="0.8"/>
        <text x="235" y="35" text-anchor="middle" style="font:bold 11px sans-serif;fill:white;">&#x028C;</text>
        <text x="235" y="245" text-anchor="middle" class="seg-label" style="fill:var(--vowel);">/&#x028C;/</text>
        <text x="235" y="258" text-anchor="middle" class="seg-desc">vowel</text>
        <text x="235" y="19" text-anchor="middle" style="font:bold 9px 'Segoe UI',sans-serif;fill:var(--vowel);">NUCLEUS</text>

        <circle cx="315" cy="163" r="8" fill="var(--fric)" opacity="0.8"/>
        <text x="315" y="167" text-anchor="middle" style="font:bold 10px sans-serif;fill:white;">s</text>
        <text x="315" y="245" text-anchor="middle" class="seg-label" style="fill:var(--fric);">/s/</text>
        <text x="315" y="258" text-anchor="middle" class="seg-desc">fricative</text>

        <circle cx="395" cy="197" r="8" fill="var(--stop)" opacity="0.8"/>
        <text x="395" y="201" text-anchor="middle" style="font:bold 10px sans-serif;fill:white;">t</text>
        <text x="395" y="245" text-anchor="middle" class="seg-label" style="fill:var(--stop);">/t/</text>
        <text x="395" y="258" text-anchor="middle" class="seg-desc">stop</text>

        <!-- Onset / Coda labels -->
        <line x1="75" y1="225" x2="155" y2="225" stroke="var(--good)" stroke-width="2" marker-end="url(#arrow-good)"/>
        <text x="115" y="222" text-anchor="middle" style="font:bold 9px 'Segoe UI',sans-serif;fill:var(--good);">ONSET</text>

        <line x1="315" y1="225" x2="395" y2="225" stroke="var(--good)" stroke-width="2" marker-end="url(#arrow-good)"/>
        <text x="355" y="222" text-anchor="middle" style="font:bold 9px 'Segoe UI',sans-serif;fill:var(--good);">CODA</text>
      </g>

      <!-- ============ SECTION 3: Common vs. Rare Clusters ============ -->
      <g transform="translate(490, 370)">
        <text x="0" y="0" class="panel-title">Onset Clusters: SSP-Conforming vs. Violating</text>

        <!-- Good clusters -->
        <rect x="0" y="22" width="185" height="130" rx="8" fill="var(--good)" opacity="0.08" stroke="var(--good)" stroke-width="1.5"/>
        <text x="92" y="42" text-anchor="middle" style="font:bold 11px 'Segoe UI',sans-serif;fill:var(--good);">Common (SSP OK)</text>
        <text x="92" y="58" text-anchor="middle" class="axis-text">Sonority rises toward vowel</text>

        <text x="20" y="80" class="seg-label" style="fill:var(--good);">/pl/</text>
        <text x="65" y="80" class="seg-desc">stop + liquid (play)</text>
        <text x="20" y="100" class="seg-label" style="fill:var(--good);">/tr/</text>
        <text x="65" y="100" class="seg-desc">stop + liquid (tree)</text>
        <text x="20" y="120" class="seg-label" style="fill:var(--good);">/sn/</text>
        <text x="65" y="120" class="seg-desc">fric. + nasal (snow)</text>
        <text x="20" y="140" class="seg-label" style="fill:var(--good);">/fl/</text>
        <text x="65" y="140" class="seg-desc">fric. + liquid (flow)</text>

        <!-- Bad clusters -->
        <rect x="205" y="22" width="185" height="130" rx="8" fill="var(--bad)" opacity="0.08" stroke="var(--bad)" stroke-width="1.5"/>
        <text x="297" y="42" text-anchor="middle" style="font:bold 11px 'Segoe UI',sans-serif;fill:var(--bad);">Rare / Absent</text>
        <text x="297" y="58" text-anchor="middle" class="axis-text">SSP violations or plateaus</text>

        <text x="225" y="80" class="seg-label" style="fill:var(--bad);">*/lb/</text>
        <text x="272" y="80" class="seg-desc">liquid + stop</text>
        <text x="225" y="100" class="seg-label" style="fill:var(--bad);">*/rt/</text>
        <text x="272" y="100" class="seg-desc">liquid + stop</text>
        <text x="225" y="120" class="seg-label" style="fill:var(--bad);">*/nm/</text>
        <text x="272" y="120" class="seg-desc">nasal + nasal</text>
        <text x="225" y="140" class="seg-label" style="fill:var(--bad);">*/tl/</text>
        <text x="272" y="140" class="seg-desc">stop + lateral (in Eng.)</text>

        <!-- SSP Exception note -->
        <rect x="0" y="165" width="390" height="70" rx="8" fill="var(--node-bg, var(--surface))" stroke="var(--border)" stroke-width="1"/>
        <text x="195" y="185" text-anchor="middle" style="font:bold 11px 'Segoe UI',sans-serif;fill:var(--fric);">Notable Exception: /s/-clusters</text>
        <text x="195" y="202" text-anchor="middle" class="axis-text">English /st/, /sp/, /sk/ violate SSP (fricative before stop)</text>
        <text x="195" y="217" text-anchor="middle" class="axis-text">Solution: /s/ may be "extrasyllabic" -- an appendix outside the syllable</text>
      </g>
    </svg>
  </div>
  <figcaption>
    <h2>Figure 6 &mdash; Sonority Hierarchy and the Sonority Sequencing Principle</h2>
    <p>The sonority hierarchy ranks sounds from stops (least sonorous) to open vowels (most sonorous). The Sonority Sequencing Principle (SSP) states that well-formed syllables rise in sonority from edges to nucleus. The word "trust" /tr&#x028C;st/ illustrates a perfect sonority curve: onset rises (stop > liquid > vowel), coda falls (vowel > fricative > stop). English /s/-initial clusters like /st-/ are a well-known exception, often analyzed as extrasyllabic.</p>
  </figcaption>
</figure>
</body>
</html>
