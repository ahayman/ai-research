<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tone Contour Comparison</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --accent: #4361ee;
    --muted: #6c757d;
    --caption-bg: #f8f9fa;
    --grid: #e9ecef;
    --mandarin: #e63946;
    --thai: #2a9d8f;
    --cantonese: #7209b7;
    --tone1: #e63946;
    --tone2: #4361ee;
    --tone3: #2a9d8f;
    --tone4: #e76f51;
    --tone5: #7209b7;
    --tone6: #d4a017;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --accent: #6b8aff;
      --muted: #9a9ab0;
      --caption-bg: #1a1a2e;
      --grid: #252540;
      --mandarin: #ff6b7a;
      --thai: #4dd8c0;
      --cantonese: #b366ff;
      --tone1: #ff6b7a;
      --tone2: #6b8aff;
      --tone3: #4dd8c0;
      --tone4: #ffa07a;
      --tone5: #b366ff;
      --tone6: #ffd54f;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure { max-width: 1000px; width: 100%; }
  .chart-wrapper {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1rem;
    overflow-x: auto;
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding: 1rem 1.5rem;
    background: var(--caption-bg);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
</style>
</head>
<body>
<figure>
  <div class="chart-wrapper">
    <svg viewBox="0 0 960 600" xmlns="http://www.w3.org/2000/svg" style="min-width:750px;">
      <defs>
        <style>
          .title { font: bold 14px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
          .panel-title { font: bold 13px 'Segoe UI', system-ui, sans-serif; }
          .axis-text { font: 10px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
          .axis-label { font: bold 10px 'Segoe UI', system-ui, sans-serif; fill: var(--accent); }
          .tone-label { font: bold 11px 'Segoe UI', system-ui, sans-serif; }
          .tone-example { font: 13px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
          .tone-meaning { font: italic 10px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
          .pitch-num { font: bold 10px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
        </style>
      </defs>

      <text x="480" y="28" text-anchor="middle" class="title">Tone Contour Comparison: Mandarin, Thai, and Cantonese</text>
      <text x="480" y="46" text-anchor="middle" class="axis-text">Pitch level: 5 = highest, 1 = lowest (Chao tone number system)</text>

      <!-- =============== MANDARIN PANEL =============== -->
      <g transform="translate(30, 65)">
        <text x="130" y="0" text-anchor="middle" class="panel-title" style="fill:var(--mandarin);">Mandarin Chinese (4 tones)</text>

        <!-- Pitch grid -->
        <rect x="20" y="15" width="220" height="160" rx="4" fill="none" stroke="var(--grid)" stroke-width="1"/>
        <!-- Pitch levels 1-5 -->
        <line x1="20" y1="175" x2="240" y2="175" stroke="var(--grid)" stroke-width="0.5"/>
        <text x="14" y="179" text-anchor="end" class="pitch-num">1</text>
        <line x1="20" y1="135" x2="240" y2="135" stroke="var(--grid)" stroke-width="0.5" stroke-dasharray="3,3"/>
        <text x="14" y="139" text-anchor="end" class="pitch-num">2</text>
        <line x1="20" y1="95" x2="240" y2="95" stroke="var(--grid)" stroke-width="0.5" stroke-dasharray="3,3"/>
        <text x="14" y="99" text-anchor="end" class="pitch-num">3</text>
        <line x1="20" y1="55" x2="240" y2="55" stroke="var(--grid)" stroke-width="0.5" stroke-dasharray="3,3"/>
        <text x="14" y="59" text-anchor="end" class="pitch-num">4</text>
        <line x1="20" y1="15" x2="240" y2="15" stroke="var(--grid)" stroke-width="0.5"/>
        <text x="14" y="19" text-anchor="end" class="pitch-num">5</text>

        <text x="130" y="198" text-anchor="middle" class="axis-text">Time --></text>

        <!-- Tone 1: High level (55) - straight line at 5 -->
        <path d="M 35,15 L 105,15" fill="none" stroke="var(--tone1)" stroke-width="3" stroke-linecap="round"/>
        <circle cx="35" cy="15" r="3" fill="var(--tone1)"/>
        <text x="115" y="20" class="tone-label" style="fill:var(--tone1);">T1 (55)</text>

        <!-- Tone 2: Rising (35) - line from 3 to 5 -->
        <path d="M 35,95 Q 60,85 80,55 Q 90,35 105,15" fill="none" stroke="var(--tone2)" stroke-width="3" stroke-linecap="round"/>
        <circle cx="35" cy="95" r="3" fill="var(--tone2)"/>
        <text x="115" y="58" class="tone-label" style="fill:var(--tone2);">T2 (35)</text>

        <!-- Tone 3: Dipping (214) - dip down then up -->
        <path d="M 35,135 Q 50,160 65,170 Q 80,175 90,155 Q 100,130 105,55" fill="none" stroke="var(--tone3)" stroke-width="3" stroke-linecap="round"/>
        <circle cx="35" cy="135" r="3" fill="var(--tone3)"/>
        <text x="115" y="98" class="tone-label" style="fill:var(--tone3);">T3 (214)</text>

        <!-- Tone 4: Falling (51) - line from 5 to 1 -->
        <path d="M 35,15 Q 55,55 75,115 Q 85,145 105,175" fill="none" stroke="var(--tone4)" stroke-width="3" stroke-linecap="round"/>
        <circle cx="35" cy="15" r="3" fill="var(--tone4)"/>
        <text x="115" y="140" class="tone-label" style="fill:var(--tone4);">T4 (51)</text>

        <!-- Examples -->
        <text x="15" y="225" class="tone-example">
          <tspan style="fill:var(--tone1);">ma (55) = mother</tspan>
        </text>
        <text x="15" y="242" class="tone-example">
          <tspan style="fill:var(--tone2);">ma (35) = hemp</tspan>
        </text>
        <text x="15" y="259" class="tone-example">
          <tspan style="fill:var(--tone3);">ma (214) = horse</tspan>
        </text>
        <text x="15" y="276" class="tone-example">
          <tspan style="fill:var(--tone4);">ma (51) = scold</tspan>
        </text>
      </g>

      <!-- =============== THAI PANEL =============== -->
      <g transform="translate(340, 65)">
        <text x="130" y="0" text-anchor="middle" class="panel-title" style="fill:var(--thai);">Thai (5 tones)</text>

        <!-- Pitch grid -->
        <rect x="20" y="15" width="220" height="160" rx="4" fill="none" stroke="var(--grid)" stroke-width="1"/>
        <line x1="20" y1="175" x2="240" y2="175" stroke="var(--grid)" stroke-width="0.5"/>
        <text x="14" y="179" text-anchor="end" class="pitch-num">1</text>
        <line x1="20" y1="135" x2="240" y2="135" stroke="var(--grid)" stroke-width="0.5" stroke-dasharray="3,3"/>
        <text x="14" y="139" text-anchor="end" class="pitch-num">2</text>
        <line x1="20" y1="95" x2="240" y2="95" stroke="var(--grid)" stroke-width="0.5" stroke-dasharray="3,3"/>
        <text x="14" y="99" text-anchor="end" class="pitch-num">3</text>
        <line x1="20" y1="55" x2="240" y2="55" stroke="var(--grid)" stroke-width="0.5" stroke-dasharray="3,3"/>
        <text x="14" y="59" text-anchor="end" class="pitch-num">4</text>
        <line x1="20" y1="15" x2="240" y2="15" stroke="var(--grid)" stroke-width="0.5"/>
        <text x="14" y="19" text-anchor="end" class="pitch-num">5</text>

        <text x="130" y="198" text-anchor="middle" class="axis-text">Time --></text>

        <!-- Mid (33) -->
        <path d="M 35,95 L 105,95" fill="none" stroke="var(--tone1)" stroke-width="3" stroke-linecap="round"/>
        <circle cx="35" cy="95" r="3" fill="var(--tone1)"/>
        <text x="115" y="100" class="tone-label" style="fill:var(--tone1);">Mid (33)</text>

        <!-- Low (21) -->
        <path d="M 35,135 Q 60,150 80,160 L 105,175" fill="none" stroke="var(--tone2)" stroke-width="3" stroke-linecap="round"/>
        <circle cx="35" cy="135" r="3" fill="var(--tone2)"/>
        <text x="115" y="165" class="tone-label" style="fill:var(--tone2);">Low (21)</text>

        <!-- Falling (41) -->
        <path d="M 35,55 Q 55,85 75,135 L 105,175" fill="none" stroke="var(--tone3)" stroke-width="3" stroke-linecap="round"/>
        <circle cx="35" cy="55" r="3" fill="var(--tone3)"/>
        <text x="115" y="133" class="tone-label" style="fill:var(--tone3);">Falling (41)</text>

        <!-- High (45) -->
        <path d="M 35,55 Q 55,45 80,30 L 105,15" fill="none" stroke="var(--tone4)" stroke-width="3" stroke-linecap="round"/>
        <circle cx="35" cy="55" r="3" fill="var(--tone4)"/>
        <text x="115" y="30" class="tone-label" style="fill:var(--tone4);">High (45)</text>

        <!-- Rising (315) -->
        <path d="M 35,95 Q 50,115 60,120 Q 75,115 90,65 L 105,15" fill="none" stroke="var(--tone5)" stroke-width="3" stroke-linecap="round"/>
        <circle cx="35" cy="95" r="3" fill="var(--tone5)"/>
        <text x="115" y="65" class="tone-label" style="fill:var(--tone5);">Rising (315)</text>

        <!-- Examples -->
        <text x="15" y="225" class="tone-example">
          <tspan style="fill:var(--tone1);">naa (mid) = field</tspan>
        </text>
        <text x="15" y="242" class="tone-example">
          <tspan style="fill:var(--tone2);">naa (low) = aunt</tspan>
        </text>
        <text x="15" y="259" class="tone-example">
          <tspan style="fill:var(--tone3);">naa (falling) = face</tspan>
        </text>
        <text x="15" y="276" class="tone-example">
          <tspan style="fill:var(--tone4);">naa (high) = thick</tspan>
        </text>
        <text x="15" y="293" class="tone-example">
          <tspan style="fill:var(--tone5);">naa (rising) = title</tspan>
        </text>
      </g>

      <!-- =============== CANTONESE PANEL =============== -->
      <g transform="translate(650, 65)">
        <text x="130" y="0" text-anchor="middle" class="panel-title" style="fill:var(--cantonese);">Cantonese (6 tones)</text>

        <!-- Pitch grid -->
        <rect x="20" y="15" width="220" height="160" rx="4" fill="none" stroke="var(--grid)" stroke-width="1"/>
        <line x1="20" y1="175" x2="240" y2="175" stroke="var(--grid)" stroke-width="0.5"/>
        <text x="14" y="179" text-anchor="end" class="pitch-num">1</text>
        <line x1="20" y1="135" x2="240" y2="135" stroke="var(--grid)" stroke-width="0.5" stroke-dasharray="3,3"/>
        <text x="14" y="139" text-anchor="end" class="pitch-num">2</text>
        <line x1="20" y1="95" x2="240" y2="95" stroke="var(--grid)" stroke-width="0.5" stroke-dasharray="3,3"/>
        <text x="14" y="99" text-anchor="end" class="pitch-num">3</text>
        <line x1="20" y1="55" x2="240" y2="55" stroke="var(--grid)" stroke-width="0.5" stroke-dasharray="3,3"/>
        <text x="14" y="59" text-anchor="end" class="pitch-num">4</text>
        <line x1="20" y1="15" x2="240" y2="15" stroke="var(--grid)" stroke-width="0.5"/>
        <text x="14" y="19" text-anchor="end" class="pitch-num">5</text>

        <text x="130" y="198" text-anchor="middle" class="axis-text">Time --></text>

        <!-- T1: High level (55) -->
        <path d="M 30,15 L 95,15" fill="none" stroke="var(--tone1)" stroke-width="2.5" stroke-linecap="round"/>
        <circle cx="30" cy="15" r="2.5" fill="var(--tone1)"/>
        <text x="103" y="20" class="tone-label" style="fill:var(--tone1);font-size:10px;">T1 (55)</text>

        <!-- T2: High rising (25) -->
        <path d="M 30,135 Q 50,105 70,65 L 95,15" fill="none" stroke="var(--tone2)" stroke-width="2.5" stroke-linecap="round"/>
        <circle cx="30" cy="135" r="2.5" fill="var(--tone2)"/>
        <text x="103" y="40" class="tone-label" style="fill:var(--tone2);font-size:10px;">T2 (25)</text>

        <!-- T3: Mid level (33) -->
        <path d="M 30,95 L 95,95" fill="none" stroke="var(--tone3)" stroke-width="2.5" stroke-linecap="round"/>
        <circle cx="30" cy="95" r="2.5" fill="var(--tone3)"/>
        <text x="103" y="100" class="tone-label" style="fill:var(--tone3);font-size:10px;">T3 (33)</text>

        <!-- T4: Low falling (21) -->
        <path d="M 30,135 Q 50,150 70,165 L 95,175" fill="none" stroke="var(--tone4)" stroke-width="2.5" stroke-linecap="round"/>
        <circle cx="30" cy="135" r="2.5" fill="var(--tone4)"/>
        <text x="103" y="172" class="tone-label" style="fill:var(--tone4);font-size:10px;">T4 (21)</text>

        <!-- T5: Low rising (23) -->
        <path d="M 30,135 Q 50,120 70,105 L 95,95" fill="none" stroke="var(--tone5)" stroke-width="2.5" stroke-linecap="round"/>
        <circle cx="30" cy="135" r="2.5" fill="var(--tone5)"/>
        <text x="103" y="120" class="tone-label" style="fill:var(--tone5);font-size:10px;">T5 (23)</text>

        <!-- T6: Low level (22) -->
        <path d="M 30,135 L 95,135" fill="none" stroke="var(--tone6)" stroke-width="2.5" stroke-linecap="round"/>
        <circle cx="30" cy="135" r="2.5" fill="var(--tone6)"/>
        <text x="103" y="142" class="tone-label" style="fill:var(--tone6);font-size:10px;">T6 (22)</text>

        <!-- Examples with si -->
        <text x="15" y="222" class="tone-example" style="font-size:10px;">
          <tspan style="fill:var(--tone1);">si1 = poem</tspan>
        </text>
        <text x="15" y="237" class="tone-example" style="font-size:10px;">
          <tspan style="fill:var(--tone2);">si2 = history</tspan>
        </text>
        <text x="15" y="252" class="tone-example" style="font-size:10px;">
          <tspan style="fill:var(--tone3);">si3 = attempt</tspan>
        </text>
        <text x="15" y="267" class="tone-example" style="font-size:10px;">
          <tspan style="fill:var(--tone4);">si4 = time</tspan>
        </text>
        <text x="15" y="282" class="tone-example" style="font-size:10px;">
          <tspan style="fill:var(--tone5);">si5 = city</tspan>
        </text>
        <text x="15" y="297" class="tone-example" style="font-size:10px;">
          <tspan style="fill:var(--tone6);">si6 = matter</tspan>
        </text>
      </g>

      <!-- Bottom comparison section -->
      <g transform="translate(30, 440)">
        <rect x="0" y="0" width="900" height="140" rx="8" fill="var(--surface)" stroke="var(--border)" stroke-width="1"/>

        <text x="450" y="25" text-anchor="middle" style="font:bold 12px 'Segoe UI',system-ui,sans-serif;fill:var(--accent);">Tonal System Comparison</text>

        <!-- Spectrum showing number of tones -->
        <g transform="translate(50, 45)">
          <text x="0" y="0" class="axis-text">Fewer tones</text>
          <text x="800" y="0" text-anchor="end" class="axis-text">More tones</text>

          <!-- Gradient bar -->
          <rect x="0" y="8" width="800" height="12" rx="6" fill="var(--grid)"/>

          <!-- Yoruba marker -->
          <circle cx="120" cy="14" r="8" fill="var(--tone3)" stroke="white" stroke-width="2"/>
          <text x="120" y="17" text-anchor="middle" style="font:bold 8px sans-serif;fill:white;">3</text>
          <text x="120" y="38" text-anchor="middle" class="axis-text" style="font-weight:bold;">Yoruba</text>
          <text x="120" y="50" text-anchor="middle" class="tone-meaning">Register tones (H/M/L)</text>

          <!-- Mandarin marker -->
          <circle cx="280" cy="14" r="8" fill="var(--mandarin)" stroke="white" stroke-width="2"/>
          <text x="280" y="17" text-anchor="middle" style="font:bold 8px sans-serif;fill:white;">4</text>
          <text x="280" y="38" text-anchor="middle" class="axis-text" style="font-weight:bold;">Mandarin</text>
          <text x="280" y="50" text-anchor="middle" class="tone-meaning">Contour tones</text>

          <!-- Thai marker -->
          <circle cx="440" cy="14" r="8" fill="var(--thai)" stroke="white" stroke-width="2"/>
          <text x="440" y="17" text-anchor="middle" style="font:bold 8px sans-serif;fill:white;">5</text>
          <text x="440" y="38" text-anchor="middle" class="axis-text" style="font-weight:bold;">Thai</text>
          <text x="440" y="50" text-anchor="middle" class="tone-meaning">Mixed level + contour</text>

          <!-- Cantonese marker -->
          <circle cx="560" cy="14" r="8" fill="var(--cantonese)" stroke="white" stroke-width="2"/>
          <text x="560" y="17" text-anchor="middle" style="font:bold 8px sans-serif;fill:white;">6</text>
          <text x="560" y="38" text-anchor="middle" class="axis-text" style="font-weight:bold;">Cantonese</text>
          <text x="560" y="50" text-anchor="middle" class="tone-meaning">6-9 tones (analysis varies)</text>

          <!-- Vietnamese marker -->
          <circle cx="600" cy="14" r="8" fill="var(--tone6)" stroke="white" stroke-width="2"/>
          <text x="600" y="17" text-anchor="middle" style="font:bold 8px sans-serif;fill:white;">6</text>
          <text x="640" y="38" text-anchor="start" class="axis-text" style="font-weight:bold;">Vietnamese</text>
        </g>

        <text x="450" y="125" text-anchor="middle" class="tone-meaning" style="font-size:11px;">60-70% of the world's languages are tonal. Tone is concentrated in East/Southeast Asia, Sub-Saharan Africa, and Mesoamerica.</text>
      </g>
    </svg>
  </div>
  <figcaption>
    <h2>Figure 4 &mdash; Tone Contour Comparison</h2>
    <p>Pitch contours for Mandarin (4 tones), Thai (5 tones), and Cantonese (6 tones) shown using the Chao tone-letter system (5 = highest pitch, 1 = lowest). Register tone systems (like Yoruba) distinguish static pitch levels; contour tone systems (like Mandarin) distinguish the shape of pitch movement. Thai mixes both approaches. The same syllable can carry completely different meanings depending only on its tone.</p>
  </figcaption>
</figure>
</body>
</html>
