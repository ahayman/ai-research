<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Language-as-Lens Model</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --accent: #4361ee;
    --muted: #6c757d;
    --reality-color: #6c3483;
    --reality-bg: #f4ecf7;
    --lens1: #e74c3c;
    --lens2: #2980b9;
    --lens3: #27ae60;
    --lens4: #e67e22;
    --lens5: #8e44ad;
    --output-bg: #fff8e1;
    --output-border: #f9a825;
    --bypass-color: #95a5a6;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --accent: #6b8aff;
      --muted: #9a9ab0;
      --reality-color: #bb86fc;
      --reality-bg: #1e1030;
      --lens1: #ff6b6b;
      --lens2: #5dade2;
      --lens3: #51cf66;
      --lens4: #f5a623;
      --lens5: #bb86fc;
      --output-bg: #2a2510;
      --output-border: #c49000;
      --bypass-color: #636e72;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure {
    max-width: 1100px;
    width: 100%;
    background: var(--surface);
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
  }
  h2 { text-align: center; font-size: 1.4rem; margin-bottom: 0.3rem; }
  .subtitle { text-align: center; font-size: 0.95rem; color: var(--muted); margin-bottom: 2rem; }
  .diagram-wrapper { overflow-x: auto; padding: 0.5rem; }
  svg { display: block; margin: 0 auto; }
  figcaption {
    text-align: center; margin-top: 1.5rem; padding-top: 1.25rem; border-top: 1px solid var(--border);
  }
  figcaption strong { display: block; font-size: 1.05rem; margin-bottom: 0.4rem; }
  figcaption span { font-size: 0.88rem; color: var(--muted); line-height: 1.5; }
</style>
</head>
<body>
<figure>
  <h2>The Language-as-Lens Model</h2>
  <p class="subtitle">Language focuses attention without blocking other views</p>
  <div class="diagram-wrapper">
    <svg viewBox="0 0 1040 700" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
      <defs>
        <radialGradient id="realityGlow" cx="0.5" cy="0.5" r="0.5">
          <stop offset="0%" stop-color="#bb86fc" stop-opacity="0.3"/>
          <stop offset="50%" stop-color="#6c3483" stop-opacity="0.15"/>
          <stop offset="100%" stop-color="#6c3483" stop-opacity="0.05"/>
        </radialGradient>
        <marker id="arrFocus" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
          <polygon points="0 0,8 3,0 6" fill="var(--accent)"/>
        </marker>
        <marker id="arrBypass" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
          <polygon points="0 0,8 3,0 6" fill="var(--bypass-color)"/>
        </marker>
        <!-- Lens shape filter -->
        <filter id="lensGlow">
          <feGaussianBlur stdDeviation="2" result="glow"/>
          <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>

      <!-- ========= CONTINUOUS REALITY (Left) ========= -->
      <g transform="translate(50, 80)">
        <rect x="-30" y="-60" width="180" height="570" rx="16" fill="url(#realityGlow)" stroke="var(--reality-color)" stroke-width="2"/>
        <text x="60" y="-35" text-anchor="middle" font-size="16" font-weight="700" fill="var(--reality-color)">Continuous</text>
        <text x="60" y="-15" text-anchor="middle" font-size="16" font-weight="700" fill="var(--reality-color)">Reality</text>

        <!-- Aspects of reality as small tags -->
        <g font-size="9" fill="var(--muted)">
          <rect x="-10" y="10" width="70" height="18" rx="3" fill="var(--surface)" stroke="var(--border)" stroke-width="0.5"/>
          <text x="25" y="23">color space</text>

          <rect x="70" y="10" width="70" height="18" rx="3" fill="var(--surface)" stroke="var(--border)" stroke-width="0.5"/>
          <text x="105" y="23">motion</text>

          <rect x="-10" y="35" width="55" height="18" rx="3" fill="var(--surface)" stroke="var(--border)" stroke-width="0.5"/>
          <text x="17" y="48">space</text>

          <rect x="55" y="35" width="50" height="18" rx="3" fill="var(--surface)" stroke="var(--border)" stroke-width="0.5"/>
          <text x="80" y="48">time</text>

          <rect x="115" y="35" width="25" height="18" rx="3" fill="var(--surface)" stroke="var(--border)" stroke-width="0.5"/>
          <text x="127" y="48">...</text>

          <rect x="-10" y="60" width="65" height="18" rx="3" fill="var(--surface)" stroke="var(--border)" stroke-width="0.5"/>
          <text x="22" y="73">causality</text>

          <rect x="65" y="60" width="65" height="18" rx="3" fill="var(--surface)" stroke="var(--border)" stroke-width="0.5"/>
          <text x="97" y="73">number</text>

          <rect x="-10" y="85" width="60" height="18" rx="3" fill="var(--surface)" stroke="var(--border)" stroke-width="0.5"/>
          <text x="20" y="98">gender</text>

          <rect x="60" y="85" width="75" height="18" rx="3" fill="var(--surface)" stroke="var(--border)" stroke-width="0.5"/>
          <text x="97" y="98">direction</text>
        </g>

        <!-- Continuous/undifferentiated indicator -->
        <text x="60" y="135" text-anchor="middle" font-size="10" fill="var(--reality-color)" font-style="italic">Undifferentiated</text>
        <text x="60" y="148" text-anchor="middle" font-size="10" fill="var(--reality-color)" font-style="italic">continuous field</text>
      </g>

      <!-- ========= LENSES (Middle) ========= -->
      <!-- English Lens -->
      <g transform="translate(330, 40)">
        <ellipse cx="70" cy="45" rx="65" ry="42" fill="none" stroke="var(--lens1)" stroke-width="2.5" filter="url(#lensGlow)"/>
        <ellipse cx="70" cy="45" rx="65" ry="42" fill="var(--lens1)" opacity="0.06"/>
        <text x="70" y="35" text-anchor="middle" font-size="13" font-weight="700" fill="var(--lens1)">English</text>
        <text x="70" y="50" text-anchor="middle" font-size="8.5" fill="var(--muted)">agency, manner,</text>
        <text x="70" y="61" text-anchor="middle" font-size="8.5" fill="var(--muted)">horiz. time, left/right</text>
        <!-- Focus beam -->
        <line x1="135" y1="45" x2="220" y2="45" stroke="var(--lens1)" stroke-width="2" marker-end="url(#arrFocus)" opacity="0.7"/>
      </g>

      <!-- Russian Lens -->
      <g transform="translate(330, 135)">
        <ellipse cx="70" cy="45" rx="65" ry="42" fill="none" stroke="var(--lens2)" stroke-width="2.5" filter="url(#lensGlow)"/>
        <ellipse cx="70" cy="45" rx="65" ry="42" fill="var(--lens2)" opacity="0.06"/>
        <text x="70" y="35" text-anchor="middle" font-size="13" font-weight="700" fill="var(--lens2)">Russian</text>
        <text x="70" y="50" text-anchor="middle" font-size="8.5" fill="var(--muted)">goluboy/siniy boundary,</text>
        <text x="70" y="61" text-anchor="middle" font-size="8.5" fill="var(--muted)">aspect distinctions</text>
        <line x1="135" y1="45" x2="220" y2="45" stroke="var(--lens2)" stroke-width="2" marker-end="url(#arrFocus)" opacity="0.7"/>
      </g>

      <!-- Guugu Yimithirr Lens -->
      <g transform="translate(330, 230)">
        <ellipse cx="70" cy="45" rx="65" ry="42" fill="none" stroke="var(--lens3)" stroke-width="2.5" filter="url(#lensGlow)"/>
        <ellipse cx="70" cy="45" rx="65" ry="42" fill="var(--lens3)" opacity="0.06"/>
        <text x="70" y="30" text-anchor="middle" font-size="12" font-weight="700" fill="var(--lens3)">Guugu</text>
        <text x="70" y="44" text-anchor="middle" font-size="12" font-weight="700" fill="var(--lens3)">Yimithirr</text>
        <text x="70" y="58" text-anchor="middle" font-size="8.5" fill="var(--muted)">cardinal directions,</text>
        <text x="70" y="69" text-anchor="middle" font-size="8.5" fill="var(--muted)">absolute space</text>
        <line x1="135" y1="45" x2="220" y2="45" stroke="var(--lens3)" stroke-width="2" marker-end="url(#arrFocus)" opacity="0.7"/>
      </g>

      <!-- Mandarin Lens -->
      <g transform="translate(330, 325)">
        <ellipse cx="70" cy="45" rx="65" ry="42" fill="none" stroke="var(--lens4)" stroke-width="2.5" filter="url(#lensGlow)"/>
        <ellipse cx="70" cy="45" rx="65" ry="42" fill="var(--lens4)" opacity="0.06"/>
        <text x="70" y="35" text-anchor="middle" font-size="13" font-weight="700" fill="var(--lens4)">Mandarin</text>
        <text x="70" y="50" text-anchor="middle" font-size="8.5" fill="var(--muted)">vertical time,</text>
        <text x="70" y="61" text-anchor="middle" font-size="8.5" fill="var(--muted)">aspect markers</text>
        <line x1="135" y1="45" x2="220" y2="45" stroke="var(--lens4)" stroke-width="2" marker-end="url(#arrFocus)" opacity="0.7"/>
      </g>

      <!-- Spanish Lens -->
      <g transform="translate(330, 420)">
        <ellipse cx="70" cy="45" rx="65" ry="42" fill="none" stroke="var(--lens5)" stroke-width="2.5" filter="url(#lensGlow)"/>
        <ellipse cx="70" cy="45" rx="65" ry="42" fill="var(--lens5)" opacity="0.06"/>
        <text x="70" y="35" text-anchor="middle" font-size="13" font-weight="700" fill="var(--lens5)">Spanish</text>
        <text x="70" y="50" text-anchor="middle" font-size="8.5" fill="var(--muted)">path of motion,</text>
        <text x="70" y="61" text-anchor="middle" font-size="8.5" fill="var(--muted)">non-agentive accidents</text>
        <line x1="135" y1="45" x2="220" y2="45" stroke="var(--lens5)" stroke-width="2" marker-end="url(#arrFocus)" opacity="0.7"/>
      </g>

      <!-- Connecting lines from Reality to Lenses -->
      <line x1="200" y1="200" x2="265" y2="85" stroke="var(--lens1)" stroke-width="1.5" opacity="0.3"/>
      <line x1="200" y1="220" x2="265" y2="180" stroke="var(--lens2)" stroke-width="1.5" opacity="0.3"/>
      <line x1="200" y1="260" x2="265" y2="275" stroke="var(--lens3)" stroke-width="1.5" opacity="0.3"/>
      <line x1="200" y1="300" x2="265" y2="370" stroke="var(--lens4)" stroke-width="1.5" opacity="0.3"/>
      <line x1="200" y1="340" x2="265" y2="465" stroke="var(--lens5)" stroke-width="1.5" opacity="0.3"/>

      <!-- ========= COGNITIVE DEFAULTS (Right) ========= -->
      <g transform="translate(570, 40)">
        <!-- English output -->
        <rect x="0" y="0" width="200" height="80" rx="8" fill="var(--output-bg)" stroke="var(--lens1)" stroke-width="1.5"/>
        <text x="100" y="20" text-anchor="middle" font-size="11" font-weight="700" fill="var(--lens1)">English Default</text>
        <text x="100" y="36" text-anchor="middle" font-size="9" fill="var(--fg)">Notices manner of motion</text>
        <text x="100" y="49" text-anchor="middle" font-size="9" fill="var(--fg)">Assigns blame for accidents</text>
        <text x="100" y="62" text-anchor="middle" font-size="9" fill="var(--fg)">Time flows left to right</text>
        <text x="100" y="75" text-anchor="middle" font-size="9" fill="var(--fg)">Uses left/right for space</text>
      </g>

      <g transform="translate(570, 135)">
        <rect x="0" y="0" width="200" height="80" rx="8" fill="var(--output-bg)" stroke="var(--lens2)" stroke-width="1.5"/>
        <text x="100" y="20" text-anchor="middle" font-size="11" font-weight="700" fill="var(--lens2)">Russian Default</text>
        <text x="100" y="36" text-anchor="middle" font-size="9" fill="var(--fg)">Faster blue discrimination</text>
        <text x="100" y="49" text-anchor="middle" font-size="9" fill="var(--fg)">at goluboy/siniy boundary</text>
        <text x="100" y="62" text-anchor="middle" font-size="9" fill="var(--fg)">Enhanced color awareness</text>
        <text x="100" y="75" text-anchor="middle" font-size="9" fill="var(--fg)">Automatic categorization</text>
      </g>

      <g transform="translate(570, 230)">
        <rect x="0" y="0" width="200" height="80" rx="8" fill="var(--output-bg)" stroke="var(--lens3)" stroke-width="1.5"/>
        <text x="100" y="20" text-anchor="middle" font-size="11" font-weight="700" fill="var(--lens3)">Guugu Yimithirr Default</text>
        <text x="100" y="36" text-anchor="middle" font-size="9" fill="var(--fg)">Internal compass always on</text>
        <text x="100" y="49" text-anchor="middle" font-size="9" fill="var(--fg)">Memory encoded by N/S/E/W</text>
        <text x="100" y="62" text-anchor="middle" font-size="9" fill="var(--fg)">Time mapped to solar path</text>
        <text x="100" y="75" text-anchor="middle" font-size="9" fill="var(--fg)">No body-relative confusion</text>
      </g>

      <g transform="translate(570, 325)">
        <rect x="0" y="0" width="200" height="80" rx="8" fill="var(--output-bg)" stroke="var(--lens4)" stroke-width="1.5"/>
        <text x="100" y="20" text-anchor="middle" font-size="11" font-weight="700" fill="var(--lens4)">Mandarin Default</text>
        <text x="100" y="36" text-anchor="middle" font-size="9" fill="var(--fg)">Vertical time reasoning</text>
        <text x="100" y="49" text-anchor="middle" font-size="9" fill="var(--fg)">Earlier = up, later = down</text>
        <text x="100" y="62" text-anchor="middle" font-size="9" fill="var(--fg)">Faster with vertical primes</text>
        <text x="100" y="75" text-anchor="middle" font-size="9" fill="var(--fg)">Dual (horiz. + vert.) mapping</text>
      </g>

      <g transform="translate(570, 420)">
        <rect x="0" y="0" width="200" height="80" rx="8" fill="var(--output-bg)" stroke="var(--lens5)" stroke-width="1.5"/>
        <text x="100" y="20" text-anchor="middle" font-size="11" font-weight="700" fill="var(--lens5)">Spanish Default</text>
        <text x="100" y="36" text-anchor="middle" font-size="9" fill="var(--fg)">Notices path over manner</text>
        <text x="100" y="49" text-anchor="middle" font-size="9" fill="var(--fg)">Less blame for accidents</text>
        <text x="100" y="62" text-anchor="middle" font-size="9" fill="var(--fg)">Non-agentive framing</text>
        <text x="100" y="75" text-anchor="middle" font-size="9" fill="var(--fg)">"Se rompio" (it broke itself)</text>
      </g>

      <!-- ========= BYPASS ARROWS (dotted) ========= -->
      <g transform="translate(800, 40)">
        <text x="0" y="15" font-size="10" fill="var(--bypass-color)" font-style="italic">Effort /</text>
        <text x="0" y="28" font-size="10" fill="var(--bypass-color)" font-style="italic">exposure can</text>
        <text x="0" y="41" font-size="10" fill="var(--bypass-color)" font-style="italic">override defaults</text>

        <!-- Curved bypass arrow -->
        <path d="M 80,50 Q 140,250 80,450" fill="none" stroke="var(--bypass-color)" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrBypass)"/>
        <text x="150" y="260" font-size="9" fill="var(--bypass-color)" transform="rotate(90, 150, 260)">Bypass path (learning, bilingualism)</text>
      </g>

      <!-- ========= BOTTOM LABEL ========= -->
      <rect x="50" y="530" width="940" height="150" rx="12" fill="var(--surface)" stroke="var(--border)" stroke-width="1.5"/>

      <text x="520" y="558" text-anchor="middle" font-size="15" font-weight="700" fill="var(--fg)">The Master Pattern</text>
      <text x="520" y="578" text-anchor="middle" font-size="12" fill="var(--fg)">Language is a <tspan font-weight="700" fill="var(--accent)">lens</tspan>, not a <tspan font-weight="700" fill="var(--bypass-color)">prison</tspan>.</text>

      <g transform="translate(80, 590)">
        <circle cx="8" cy="12" r="4" fill="var(--accent)"/>
        <text x="20" y="16" font-size="11" fill="var(--fg)"><tspan font-weight="600">Focuses attention</tspan> on certain aspects of experience (color, space, time, causality)</text>

        <circle cx="8" cy="36" r="4" fill="var(--accent)"/>
        <text x="20" y="40" font-size="11" fill="var(--fg)"><tspan font-weight="600">Creates cognitive defaults</tspan> -- the path of least resistance for perception and memory</text>

        <circle cx="8" cy="60" r="4" fill="var(--bypass-color)"/>
        <text x="20" y="64" font-size="11" fill="var(--fg)"><tspan font-weight="600">Does not eliminate</tspan> the capacity to perceive, learn, or think beyond those defaults</text>

        <circle cx="8" cy="84" r="4" fill="var(--bypass-color)"/>
        <text x="20" y="88" font-size="11" fill="var(--fg)"><tspan font-weight="600">Bilingualism proves both</tspan> -- effects shift with language (real) but can be shifted (non-deterministic)</text>
      </g>
    </svg>
  </div>
  <figcaption>
    <strong>Figure 6: The Language-as-Lens Model</strong>
    <span>Across every domain studied -- color, space, time, number, causation, motion -- the same pattern emerges. Language acts as a lens that focuses habitual attention on certain features of continuous reality, creating cognitive defaults without eliminating the capacity to perceive beyond them. Each language highlights different aspects: English foregrounds manner and agency; Russian highlights blue subcategories; Guugu Yimithirr brings cardinal directions into constant salience. The dotted bypass path represents what bilingualism, learning, and deliberate effort can achieve.</span>
  </figcaption>
</figure>
</body>
</html>
