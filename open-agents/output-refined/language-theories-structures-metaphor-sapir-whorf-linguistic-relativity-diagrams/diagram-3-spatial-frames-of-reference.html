<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spatial Frames of Reference</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --accent: #4361ee;
    --accent-light: #e8edff;
    --muted: #6c757d;
    --relative-color: #e67e22;
    --relative-bg: #fef5e7;
    --intrinsic-color: #8e44ad;
    --intrinsic-bg: #f5eef8;
    --absolute-color: #27ae60;
    --absolute-bg: #eafaf1;
    --callout-bg: #fff8e1;
    --callout-border: #f9a825;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --accent: #6b8aff;
      --accent-light: #1e2a4a;
      --muted: #9a9ab0;
      --relative-color: #f5a623;
      --relative-bg: #2a2010;
      --intrinsic-color: #bb86fc;
      --intrinsic-bg: #1e1030;
      --absolute-color: #51cf66;
      --absolute-bg: #0a2a15;
      --callout-bg: #2a2510;
      --callout-border: #c49000;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure {
    max-width: 1100px;
    width: 100%;
    background: var(--surface);
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
  }
  h2 { text-align: center; font-size: 1.4rem; margin-bottom: 0.3rem; }
  .subtitle { text-align: center; font-size: 0.95rem; color: var(--muted); margin-bottom: 2rem; }
  .diagram-wrapper { overflow-x: auto; padding: 0.5rem; }
  svg { display: block; margin: 0 auto; }
  figcaption {
    text-align: center; margin-top: 1.5rem; padding-top: 1.25rem; border-top: 1px solid var(--border);
  }
  figcaption strong { display: block; font-size: 1.05rem; margin-bottom: 0.4rem; }
  figcaption span { font-size: 0.88rem; color: var(--muted); line-height: 1.5; }
</style>
</head>
<body>
<figure>
  <h2>Spatial Frames of Reference</h2>
  <p class="subtitle">Three ways languages encode spatial relationships</p>
  <div class="diagram-wrapper">
    <svg viewBox="0 0 1040 680" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
      <defs>
        <marker id="arrowOrange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
          <polygon points="0 0,8 3,0 6" fill="var(--relative-color)"/>
        </marker>
        <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
          <polygon points="0 0,8 3,0 6" fill="var(--absolute-color)"/>
        </marker>
        <marker id="arrowPurple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
          <polygon points="0 0,8 3,0 6" fill="var(--intrinsic-color)"/>
        </marker>
      </defs>

      <!-- ========= PANEL 1: RELATIVE ========= -->
      <g transform="translate(20, 0)">
        <rect x="0" y="10" width="320" height="380" rx="12" fill="var(--relative-bg)" stroke="var(--relative-color)" stroke-width="2"/>
        <text x="160" y="40" text-anchor="middle" font-size="15" font-weight="700" fill="var(--relative-color)">Relative Frame</text>
        <text x="160" y="58" text-anchor="middle" font-size="11" fill="var(--muted)">English, Dutch, most Western languages</text>
        <text x="160" y="73" text-anchor="middle" font-size="10" fill="var(--muted)" font-style="italic">Body-centered (egocentric)</text>

        <!-- Person icon (simple) -->
        <circle cx="160" cy="170" r="16" fill="var(--relative-color)" opacity="0.2" stroke="var(--relative-color)" stroke-width="2"/>
        <circle cx="160" cy="155" r="8" fill="none" stroke="var(--relative-color)" stroke-width="2"/>
        <line x1="160" y1="163" x2="160" y2="192" stroke="var(--relative-color)" stroke-width="2"/>
        <line x1="160" y1="175" x2="140" y2="185" stroke="var(--relative-color)" stroke-width="2"/>
        <line x1="160" y1="175" x2="180" y2="185" stroke="var(--relative-color)" stroke-width="2"/>
        <line x1="160" y1="192" x2="145" y2="210" stroke="var(--relative-color)" stroke-width="2"/>
        <line x1="160" y1="192" x2="175" y2="210" stroke="var(--relative-color)" stroke-width="2"/>

        <!-- Direction labels - rotate with person -->
        <text x="95" y="175" text-anchor="middle" font-size="13" font-weight="700" fill="var(--relative-color)">LEFT</text>
        <line x1="130" y1="170" x2="115" y2="170" stroke="var(--relative-color)" stroke-width="1.5" marker-end="url(#arrowOrange)"/>

        <text x="225" y="175" text-anchor="middle" font-size="13" font-weight="700" fill="var(--relative-color)">RIGHT</text>
        <line x1="190" y1="170" x2="205" y2="170" stroke="var(--relative-color)" stroke-width="1.5" marker-end="url(#arrowOrange)"/>

        <text x="160" y="133" text-anchor="middle" font-size="13" font-weight="700" fill="var(--relative-color)">FRONT</text>
        <line x1="160" y1="140" x2="160" y2="137" stroke="var(--relative-color)" stroke-width="1.5"/>

        <text x="160" y="230" text-anchor="middle" font-size="13" font-weight="700" fill="var(--relative-color)">BEHIND</text>

        <!-- Key property -->
        <rect x="20" y="255" width="280" height="55" rx="6" fill="var(--surface)" stroke="var(--border)" stroke-width="1"/>
        <text x="160" y="275" text-anchor="middle" font-size="11" font-weight="600" fill="var(--fg)">Labels rotate with the speaker</text>
        <text x="160" y="293" text-anchor="middle" font-size="10" fill="var(--muted)">"The ball is to my left" changes if I turn</text>

        <!-- Example -->
        <rect x="20" y="320" width="280" height="55" rx="6" fill="var(--callout-bg)" stroke="var(--callout-border)" stroke-width="1"/>
        <text x="160" y="340" text-anchor="middle" font-size="11" font-weight="700" fill="var(--fg)">"The cup is to the left of the plate"</text>
        <text x="160" y="358" text-anchor="middle" font-size="10" fill="var(--muted)">Depends entirely on observer's orientation</text>
      </g>

      <!-- ========= PANEL 2: INTRINSIC ========= -->
      <g transform="translate(360, 0)">
        <rect x="0" y="10" width="320" height="380" rx="12" fill="var(--intrinsic-bg)" stroke="var(--intrinsic-color)" stroke-width="2"/>
        <text x="160" y="40" text-anchor="middle" font-size="15" font-weight="700" fill="var(--intrinsic-color)">Intrinsic Frame</text>
        <text x="160" y="58" text-anchor="middle" font-size="11" fill="var(--muted)">Tzeltal (Mayan), Mopan, Mixtec</text>
        <text x="160" y="73" text-anchor="middle" font-size="10" fill="var(--muted)" font-style="italic">Object/environment-centered</text>

        <!-- Object (car shape) -->
        <rect x="120" y="140" width="80" height="50" rx="8" fill="var(--intrinsic-color)" opacity="0.15" stroke="var(--intrinsic-color)" stroke-width="2"/>
        <text x="160" y="170" text-anchor="middle" font-size="11" fill="var(--intrinsic-color)" font-weight="600">OBJECT</text>

        <!-- Object-based directions -->
        <text x="160" y="125" text-anchor="middle" font-size="12" font-weight="700" fill="var(--intrinsic-color)">FRONT</text>
        <text x="160" y="215" text-anchor="middle" font-size="12" font-weight="700" fill="var(--intrinsic-color)">BACK</text>

        <!-- Tzeltal mountain metaphor -->
        <text x="90" y="170" text-anchor="middle" font-size="10" font-weight="700" fill="var(--intrinsic-color)">uphill</text>
        <line x1="108" y1="165" x2="115" y2="155" stroke="var(--intrinsic-color)" stroke-width="1.5" marker-end="url(#arrowPurple)"/>

        <text x="230" y="170" text-anchor="middle" font-size="10" font-weight="700" fill="var(--intrinsic-color)">downhill</text>
        <line x1="212" y1="165" x2="205" y2="175" stroke="var(--intrinsic-color)" stroke-width="1.5" marker-end="url(#arrowPurple)"/>

        <!-- Key property -->
        <rect x="20" y="255" width="280" height="55" rx="6" fill="var(--surface)" stroke="var(--border)" stroke-width="1"/>
        <text x="160" y="275" text-anchor="middle" font-size="11" font-weight="600" fill="var(--fg)">Tied to object or terrain features</text>
        <text x="160" y="293" text-anchor="middle" font-size="10" fill="var(--muted)">Tzeltal uses uphill / downhill / across-slope</text>

        <!-- Example -->
        <rect x="20" y="320" width="280" height="55" rx="6" fill="var(--callout-bg)" stroke="var(--callout-border)" stroke-width="1"/>
        <text x="160" y="340" text-anchor="middle" font-size="11" font-weight="700" fill="var(--fg)">"The cup is uphill of the plate"</text>
        <text x="160" y="358" text-anchor="middle" font-size="10" fill="var(--muted)">Consistent regardless of observer position</text>
      </g>

      <!-- ========= PANEL 3: ABSOLUTE ========= -->
      <g transform="translate(700, 0)">
        <rect x="0" y="10" width="320" height="380" rx="12" fill="var(--absolute-bg)" stroke="var(--absolute-color)" stroke-width="2"/>
        <text x="160" y="40" text-anchor="middle" font-size="15" font-weight="700" fill="var(--absolute-color)">Absolute Frame</text>
        <text x="160" y="58" text-anchor="middle" font-size="11" fill="var(--muted)">Guugu Yimithirr, Kuuk Thaayorre</text>
        <text x="160" y="73" text-anchor="middle" font-size="10" fill="var(--muted)" font-style="italic">Cardinal directions (geocentric)</text>

        <!-- Person icon -->
        <circle cx="160" cy="170" r="16" fill="var(--absolute-color)" opacity="0.15" stroke="var(--absolute-color)" stroke-width="2"/>
        <circle cx="160" cy="155" r="8" fill="none" stroke="var(--absolute-color)" stroke-width="2"/>
        <line x1="160" y1="163" x2="160" y2="192" stroke="var(--absolute-color)" stroke-width="2"/>
        <line x1="160" y1="175" x2="140" y2="185" stroke="var(--absolute-color)" stroke-width="2"/>
        <line x1="160" y1="175" x2="180" y2="185" stroke="var(--absolute-color)" stroke-width="2"/>
        <line x1="160" y1="192" x2="145" y2="210" stroke="var(--absolute-color)" stroke-width="2"/>
        <line x1="160" y1="192" x2="175" y2="210" stroke="var(--absolute-color)" stroke-width="2"/>

        <!-- Cardinal directions - FIXED regardless of person orientation -->
        <text x="160" y="110" text-anchor="middle" font-size="14" font-weight="700" fill="var(--absolute-color)">N</text>
        <line x1="160" y1="115" x2="160" y2="126" stroke="var(--absolute-color)" stroke-width="2" marker-end="url(#arrowGreen)"/>

        <text x="160" y="242" text-anchor="middle" font-size="14" font-weight="700" fill="var(--absolute-color)">S</text>

        <text x="75" y="172" text-anchor="middle" font-size="14" font-weight="700" fill="var(--absolute-color)">W</text>
        <line x1="100" y1="168" x2="88" y2="168" stroke="var(--absolute-color)" stroke-width="2" marker-end="url(#arrowGreen)"/>

        <text x="245" y="172" text-anchor="middle" font-size="14" font-weight="700" fill="var(--absolute-color)">E</text>
        <line x1="220" y1="168" x2="232" y2="168" stroke="var(--absolute-color)" stroke-width="2" marker-end="url(#arrowGreen)"/>

        <!-- Compass rose hint -->
        <circle cx="265" cy="105" r="18" fill="none" stroke="var(--absolute-color)" stroke-width="1.5" opacity="0.5"/>
        <line x1="265" y1="90" x2="265" y2="120" stroke="var(--absolute-color)" stroke-width="1" opacity="0.5"/>
        <line x1="250" y1="105" x2="280" y2="105" stroke="var(--absolute-color)" stroke-width="1" opacity="0.5"/>
        <text x="265" y="97" text-anchor="middle" font-size="7" fill="var(--absolute-color)" font-weight="700">N</text>

        <!-- Key property -->
        <rect x="20" y="255" width="280" height="55" rx="6" fill="var(--surface)" stroke="var(--border)" stroke-width="1"/>
        <text x="160" y="275" text-anchor="middle" font-size="11" font-weight="600" fill="var(--fg)">Labels are fixed to the earth</text>
        <text x="160" y="293" text-anchor="middle" font-size="10" fill="var(--muted)">Speakers maintain an "internal compass" at all times</text>

        <!-- Example -->
        <rect x="20" y="320" width="280" height="55" rx="6" fill="var(--callout-bg)" stroke="var(--callout-border)" stroke-width="1"/>
        <text x="160" y="340" text-anchor="middle" font-size="11" font-weight="700" fill="var(--fg)">"The cup is north of the plate"</text>
        <text x="160" y="358" text-anchor="middle" font-size="10" fill="var(--muted)">Same answer no matter where you stand</text>
      </g>

      <!-- ========= BOTTOM: COGNITIVE CONSEQUENCE ========= -->
      <rect x="20" y="410" width="1000" height="115" rx="12" fill="var(--callout-bg)" stroke="var(--callout-border)" stroke-width="2"/>
      <text x="520" y="438" text-anchor="middle" font-size="14" font-weight="700" fill="var(--fg)">Cognitive Consequences: The Pormpuraaw Temporal Ordering Test</text>

      <!-- Cards arranged differently -->
      <g transform="translate(60, 455)">
        <text x="0" y="12" font-size="11" font-weight="600" fill="var(--relative-color)">English speakers:</text>
        <text x="0" y="28" font-size="10" fill="var(--muted)">Always arrange cards left to right</text>
        <!-- mini cards -->
        <rect x="180" y="2" width="24" height="18" rx="3" fill="var(--relative-color)" opacity="0.3"/>
        <text x="192" y="15" text-anchor="middle" font-size="8" fill="var(--fg)">1</text>
        <text x="212" y="15" font-size="10" fill="var(--muted)">-></text>
        <rect x="222" y="2" width="24" height="18" rx="3" fill="var(--relative-color)" opacity="0.5"/>
        <text x="234" y="15" text-anchor="middle" font-size="8" fill="var(--fg)">2</text>
        <text x="254" y="15" font-size="10" fill="var(--muted)">-></text>
        <rect x="264" y="2" width="24" height="18" rx="3" fill="var(--relative-color)" opacity="0.7"/>
        <text x="276" y="15" text-anchor="middle" font-size="8" fill="var(--fg)">3</text>
      </g>

      <g transform="translate(60, 490)">
        <text x="0" y="12" font-size="11" font-weight="600" fill="var(--absolute-color)">Kuuk Thaayorre speakers:</text>
        <text x="0" y="28" font-size="10" fill="var(--muted)">Always arrange cards east to west (following the sun), regardless of facing direction</text>
        <!-- mini cards with compass -->
        <rect x="400" y="2" width="24" height="18" rx="3" fill="var(--absolute-color)" opacity="0.3"/>
        <text x="412" y="15" text-anchor="middle" font-size="7" fill="var(--fg)">E</text>
        <text x="432" y="15" font-size="10" fill="var(--muted)">-></text>
        <rect x="442" y="2" width="24" height="18" rx="3" fill="var(--absolute-color)" opacity="0.5"/>
        <text x="454" y="15" text-anchor="middle" font-size="7" fill="var(--fg)">...</text>
        <text x="474" y="15" font-size="10" fill="var(--muted)">-></text>
        <rect x="484" y="2" width="24" height="18" rx="3" fill="var(--absolute-color)" opacity="0.7"/>
        <text x="496" y="15" text-anchor="middle" font-size="7" fill="var(--fg)">W</text>
      </g>

      <!-- Bottom explanation -->
      <rect x="20" y="540" width="1000" height="130" rx="12" fill="var(--surface)" stroke="var(--border)" stroke-width="1.5"/>
      <text x="520" y="568" text-anchor="middle" font-size="13" font-weight="700" fill="var(--fg)">What This Means for Cognition</text>

      <g transform="translate(60, 580)">
        <circle cx="6" cy="6" r="5" fill="var(--relative-color)"/>
        <text x="18" y="10" font-size="11" fill="var(--fg)"><tspan font-weight="600">Relative-frame speakers</tspan> encode spatial memory relative to their body. Disorientation disrupts recall.</text>
      </g>
      <g transform="translate(60, 605)">
        <circle cx="6" cy="6" r="5" fill="var(--intrinsic-color)"/>
        <text x="18" y="10" font-size="11" fill="var(--fg)"><tspan font-weight="600">Intrinsic-frame speakers</tspan> (Tzeltal) maintain orientation even when blindfolded and spun 20+ times.</text>
      </g>
      <g transform="translate(60, 630)">
        <circle cx="6" cy="6" r="5" fill="var(--absolute-color)"/>
        <text x="18" y="10" font-size="11" fill="var(--fg)"><tspan font-weight="600">Absolute-frame speakers</tspan> develop a lifelong internal compass. Their greeting: "Where are you going?" "Northwest, a long way."</text>
      </g>
    </svg>
  </div>
  <figcaption>
    <strong>Figure 3: Spatial Frames of Reference</strong>
    <span>Languages encode spatial relationships using fundamentally different reference frames. Most Western languages use a <em>relative</em> frame tied to the speaker's body (left/right). Languages like Tzeltal (Maya) use an <em>intrinsic</em> frame tied to environmental features (uphill/downhill). Aboriginal Australian languages like Guugu Yimithirr and Kuuk Thaayorre use an <em>absolute</em> frame based on cardinal directions. These linguistic differences produce measurable cognitive differences in spatial memory, navigation, and even temporal reasoning (Levinson, 1997; Boroditsky &amp; Gaby).</span>
  </figcaption>
</figure>
</body>
</html>
