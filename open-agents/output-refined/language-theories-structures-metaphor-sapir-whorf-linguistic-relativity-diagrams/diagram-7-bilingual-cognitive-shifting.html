    color: var(--fg);

  }
  figcaption strong { display: block; font-size: 1.05rem; margin-bottom: 0.4rem; }

<figure>
  <h2>Bilingual Cognitive Shifting</h2>
  <p class="subtitle">How switching languages shifts habitual thought patterns</p>

  <div class="evidence-grid">
    <div class="evidence-card">
      <h4>Time Orientation Shift</h4>
      <div class="lang-pair">Mandarin-English bilinguals</div>
      <p>Show more vertical temporal reasoning when tested in Mandarin and more horizontal reasoning when tested in English. Proficiency in Mandarin correlates with strength of vertical effect (Boroditsky, 2001).</p>
    </div>
    <div class="evidence-card">
      <h4>Color Discrimination Shift</h4>
      <div class="lang-pair">Russian-English bilinguals</div>
      <p>Faster discrimination at the goluboy/siniy boundary when operating in Russian linguistic mode. The advantage is reduced or eliminated when verbally shadowing, confirming language mediation (Winawer et al., 2007).</p>
    </div>
    <div class="evidence-card">
      <h4>Agency &amp; Blame Shift</h4>
      <div class="lang-pair">Spanish-English bilinguals</div>
      <p>Use more agentive descriptions of accidental events when speaking English and more non-agentive constructions when speaking Spanish. Memory for accident agents shifts accordingly (Fausey &amp; Boroditsky).</p>
    </div>
    <div class="evidence-card">
      <h4>Semantic Association Shift</h4>
      <div class="lang-pair">Multiple bilingual populations</div>
      <p>Bilingual speakers rate picture pairs as more semantically related than monolinguals. Learning new metaphor systems (e.g., Greek size metaphors for time) changes cognitive performance to resemble speakers of the learned language.</p>
    </div>
  </div>

  <div class="callout">
    <strong>Why Bilingualism Is the Strongest Evidence for Linguistic Relativity</strong>
    <p>By holding culture, education, and individual identity constant while varying language, bilingual studies isolate language as the causal factor. The fact that cognitive patterns <em>shift</em> with language proves the effects are real. The fact that they <em>can</em> shift proves they are not deterministic. Bilingualism provides a second lens -- demonstrating that no single linguistic worldview is a cognitive prison.</p>
  </div>

  <figcaption>
    <strong>Figure 7: Bilingual Cognitive Shifting</strong>
    <span>Bilingual speakers shift their cognitive patterns depending on which language is currently active. Context triggers (conversation partners, priming, task instructions) activate one linguistic system, which brings its associated cognitive defaults online. The bidirectional nature of this shifting provides the strongest evidence for the neo-Whorfian position: language effects are real (they change with language), measurable (across time, color, space, and causality), and non-deterministic (they can be reversed by switching languages).</span>
  </figcaption>
</figure>
