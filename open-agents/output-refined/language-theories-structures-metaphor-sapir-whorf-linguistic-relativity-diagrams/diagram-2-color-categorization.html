<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Color Categorization Comparison</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --accent: #4361ee;
    --muted: #6c757d;
    --caption-bg: #f8f9fa;
    --callout-bg: #fff8e1;
    --callout-border: #f9a825;
    --boundary-color: #e63946;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --accent: #6b8aff;
      --muted: #9a9ab0;
      --caption-bg: #1a1a2e;
      --callout-bg: #2a2510;
      --callout-border: #c49000;
      --boundary-color: #ff6b6b;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure {
    max-width: 1100px;
    width: 100%;
    background: var(--surface);
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
  }
  h2 {
    text-align: center;
    font-size: 1.4rem;
    margin-bottom: 0.3rem;
  }
  .subtitle {
    text-align: center;
    font-size: 0.95rem;
    color: var(--muted);
    margin-bottom: 2rem;
  }
  .diagram-wrapper {
    overflow-x: auto;
    padding: 0.5rem;
  }
  svg { display: block; margin: 0 auto; }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid var(--border);
  }
  figcaption strong {
    display: block;
    font-size: 1.05rem;
    margin-bottom: 0.4rem;
  }
  figcaption span {
    font-size: 0.88rem;
    color: var(--muted);
    line-height: 1.5;
  }
</style>
</head>
<body>
<figure>
  <h2>Color Categorization Across Languages</h2>
  <p class="subtitle">Same continuous spectrum, different linguistic boundaries</p>
  <div class="diagram-wrapper">
    <svg viewBox="0 0 1000 620" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
      <defs>
        <!-- Blue gradient for blue-focused strips -->
        <linearGradient id="blueSpectrum" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="#e0f0ff"/>
          <stop offset="15%" stop-color="#a8d8ff"/>
          <stop offset="30%" stop-color="#6bb8ff"/>
          <stop offset="50%" stop-color="#3498db"/>
          <stop offset="70%" stop-color="#1a6fba"/>
          <stop offset="85%" stop-color="#0d4a8a"/>
          <stop offset="100%" stop-color="#0a2e5c"/>
        </linearGradient>
        <!-- Full visible spectrum for Himba -->
        <linearGradient id="fullSpectrum" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="#8B0000"/>
          <stop offset="10%" stop-color="#ff0000"/>
          <stop offset="20%" stop-color="#ff8c00"/>
          <stop offset="30%" stop-color="#ffd700"/>
          <stop offset="40%" stop-color="#7cfc00"/>
          <stop offset="55%" stop-color="#228b22"/>
          <stop offset="65%" stop-color="#006400"/>
          <stop offset="75%" stop-color="#3498db"/>
          <stop offset="85%" stop-color="#0d4a8a"/>
          <stop offset="95%" stop-color="#4b0082"/>
          <stop offset="100%" stop-color="#2e003e"/>
        </linearGradient>
        <marker id="arrowDown" markerWidth="8" markerHeight="8" refX="4" refY="8" orient="auto">
          <polygon points="0 0, 8 8, 4 0" fill="var(--boundary-color)"/>
        </marker>
      </defs>

      <!-- Title for blue spectrum section -->
      <text x="60" y="30" font-size="14" font-weight="700" fill="var(--fg)">Blue Spectrum Focus</text>
      <text x="60" y="48" font-size="11" fill="var(--muted)">How English and Russian divide the same continuous blue range</text>

      <!-- Physical spectrum bar (reference) -->
      <text x="60" y="80" font-size="12" font-weight="600" fill="var(--muted)">Physical Spectrum (continuous, no natural boundaries)</text>
      <rect x="60" y="88" width="700" height="30" rx="4" fill="url(#blueSpectrum)"/>
      <text x="70" y="107" font-size="10" fill="#ffffff" font-weight="600">Light</text>
      <text x="720" y="107" font-size="10" fill="#ffffff" font-weight="600" text-anchor="end">Dark</text>

      <!-- ENGLISH -->
      <text x="60" y="152" font-size="13" font-weight="700" fill="var(--fg)">English</text>
      <rect x="60" y="160" width="700" height="40" rx="6" fill="url(#blueSpectrum)" stroke="var(--border)" stroke-width="1"/>
      <!-- Single bracket -->
      <rect x="60" y="205" width="700" height="28" rx="4" fill="var(--surface)" stroke="var(--border)" stroke-width="1"/>
      <text x="410" y="224" text-anchor="middle" font-size="13" font-weight="700" fill="var(--accent)">"blue"</text>
      <text x="410" y="252" text-anchor="middle" font-size="10" fill="var(--muted)">One basic color term covers the entire range (light blue and dark blue are shades, not separate categories)</text>

      <!-- RUSSIAN -->
      <text x="60" y="295" font-size="13" font-weight="700" fill="var(--fg)">Russian</text>
      <rect x="60" y="303" width="700" height="40" rx="6" fill="url(#blueSpectrum)" stroke="var(--border)" stroke-width="1"/>
      <!-- Boundary line -->
      <line x1="390" y1="295" x2="390" y2="350" stroke="var(--boundary-color)" stroke-width="3"/>
      <text x="390" y="290" text-anchor="middle" font-size="10" font-weight="700" fill="var(--boundary-color)">BOUNDARY</text>
      <!-- Two category brackets -->
      <rect x="60" y="348" width="325" height="28" rx="4" fill="#dbeeff" stroke="#3498db" stroke-width="1.5"/>
      <text x="222" y="367" text-anchor="middle" font-size="13" font-weight="700" fill="#1a6fba">goluboy</text>
      <text x="222" y="383" text-anchor="middle" font-size="9" fill="var(--muted)">(light blue)</text>

      <rect x="395" y="348" width="365" height="28" rx="4" fill="#0d4a8a22" stroke="#0d4a8a" stroke-width="1.5"/>
      <text x="577" y="367" text-anchor="middle" font-size="13" font-weight="700" fill="#0d4a8a">siniy</text>
      <text x="577" y="383" text-anchor="middle" font-size="9" fill="var(--muted)">(dark blue)</text>

      <!-- Faster discrimination callout -->
      <g transform="translate(810, 300)">
        <rect x="0" y="-10" width="170" height="70" rx="8" fill="var(--callout-bg)" stroke="var(--callout-border)" stroke-width="1.5"/>
        <text x="85" y="9" text-anchor="middle" font-size="11" font-weight="700" fill="var(--fg)">Faster Discrimination</text>
        <text x="85" y="25" text-anchor="middle" font-size="10" fill="var(--muted)">Russian speakers are faster</text>
        <text x="85" y="38" text-anchor="middle" font-size="10" fill="var(--muted)">at distinguishing colors</text>
        <text x="85" y="51" text-anchor="middle" font-size="10" fill="var(--muted)">across this boundary</text>
      </g>
      <line x1="810" y1="335" x2="400" y2="323" stroke="var(--callout-border)" stroke-width="1.5" stroke-dasharray="5,3"/>

      <!-- HIMBA - Full spectrum -->
      <text x="60" y="430" font-size="14" font-weight="700" fill="var(--fg)">Himba (Namibia) -- Full Visible Spectrum</text>
      <text x="60" y="448" font-size="11" fill="var(--muted)">Different category boundaries from both English and Russian</text>

      <rect x="60" y="458" width="900" height="40" rx="6" fill="url(#fullSpectrum)" stroke="var(--border)" stroke-width="1"/>

      <!-- Himba categories -->
      <!-- zoozu - dark shades -->
      <rect x="60" y="503" width="110" height="26" rx="4" fill="#3a0a0a" stroke="#8B0000" stroke-width="1"/>
      <text x="115" y="520" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">zoozu</text>
      <!-- vapa - white/light -->
      <rect x="180" y="503" width="100" height="26" rx="4" fill="#ffecb3" stroke="#ffd700" stroke-width="1"/>
      <text x="230" y="520" text-anchor="middle" font-size="11" font-weight="700" fill="#333">vapa</text>
      <!-- dumbu - greens/some browns -->
      <rect x="290" y="503" width="140" height="26" rx="4" fill="#c5e1a5" stroke="#66bb6a" stroke-width="1"/>
      <text x="360" y="520" text-anchor="middle" font-size="11" font-weight="700" fill="#2e7d32">dumbu</text>
      <!-- burou - specific greens -->
      <rect x="440" y="503" width="100" height="26" rx="4" fill="#81c784" stroke="#388e3c" stroke-width="1"/>
      <text x="490" y="520" text-anchor="middle" font-size="11" font-weight="700" fill="#1b5e20">burou</text>
      <!-- zoozu again - dark blues, purples -->
      <rect x="640" y="503" width="190" height="26" rx="4" fill="#1a1a4e" stroke="#0d4a8a" stroke-width="1"/>
      <text x="735" y="520" text-anchor="middle" font-size="11" font-weight="700" fill="#aaccff">zoozu</text>
      <!-- serandu - some reds/oranges -->
      <rect x="550" y="503" width="80" height="26" rx="4" fill="#42a5f5" stroke="#1e88e5" stroke-width="1"/>
      <text x="590" y="520" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">buru</text>
      <!-- zoozu dark end -->
      <rect x="840" y="503" width="120" height="26" rx="4" fill="#1a002e" stroke="#4b0082" stroke-width="1"/>
      <text x="900" y="520" text-anchor="middle" font-size="11" font-weight="700" fill="#bb86fc">zoozu</text>

      <text x="60" y="550" font-size="10" fill="var(--muted)" font-style="italic">zoozu encompasses dark shades of blue, green, red, and purple -- colors English treats as fundamentally different categories</text>

      <!-- Key insight box -->
      <rect x="60" y="565" width="900" height="42" rx="8" fill="var(--callout-bg)" stroke="var(--callout-border)" stroke-width="1.5"/>
      <text x="510" y="583" text-anchor="middle" font-size="12" font-weight="700" fill="var(--fg)">Key Finding: Discrimination speed is fastest at linguistic boundaries, not universal perceptual boundaries.</text>
      <text x="510" y="599" text-anchor="middle" font-size="11" fill="var(--muted)">Each language creates its own perceptual advantages -- the physical spectrum is identical; only the imposed categories differ.</text>
    </svg>
  </div>
  <figcaption>
    <strong>Figure 2: Color Categorization Across Languages</strong>
    <span>The continuous color spectrum is divided differently by different languages, and these linguistic boundaries create measurable perceptual advantages. Russian speakers discriminate blues faster at the goluboy/siniy boundary (Winawer et al., 2007, PNAS), while Himba speakers of Namibia show advantages at their own category boundaries. The effect is eliminated by verbal interference, confirming that language mediates the perceptual advantage.</span>
  </figcaption>
</figure>
</body>
</html>
