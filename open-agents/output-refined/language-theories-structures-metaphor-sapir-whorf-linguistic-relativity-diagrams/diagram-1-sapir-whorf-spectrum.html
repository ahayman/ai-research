<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Sapir-Whorf Spectrum</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --accent: #4361ee;
    --accent-light: #e8edff;
    --muted: #6c757d;
    --reject: #dc3545;
    --reject-bg: #fff0f0;
    --support: #198754;
    --support-bg: #edfff5;
    --consensus-bg: rgba(67, 97, 238, 0.08);
    --consensus-border: #4361ee;
    --caption-bg: #f8f9fa;
    --thinker-bg: #fff8e1;
    --thinker-border: #f9a825;
    --arrow-color: #adb5bd;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --accent: #6b8aff;
      --accent-light: #1e2a4a;
      --muted: #9a9ab0;
      --reject: #ff6b6b;
      --reject-bg: #2a1010;
      --support: #51cf66;
      --support-bg: #0a2a15;
      --consensus-bg: rgba(107, 138, 255, 0.1);
      --consensus-border: #6b8aff;
      --caption-bg: #1a1a2e;
      --thinker-bg: #2a2510;
      --thinker-border: #c49000;
      --arrow-color: #4a4a60;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure {
    max-width: 1100px;
    width: 100%;
    background: var(--surface);
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
  }
  h2 {
    text-align: center;
    font-size: 1.4rem;
    margin-bottom: 0.4rem;
    color: var(--fg);
  }
  .subtitle {
    text-align: center;
    font-size: 0.95rem;
    color: var(--muted);
    margin-bottom: 2rem;
  }
  .diagram-wrapper {
    overflow-x: auto;
    padding: 0.5rem;
  }
  svg { display: block; margin: 0 auto; }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid var(--border);
  }
  figcaption strong {
    display: block;
    font-size: 1.05rem;
    color: var(--fg);
    margin-bottom: 0.4rem;
  }
  figcaption span {
    font-size: 0.88rem;
    color: var(--muted);
    line-height: 1.5;
  }
</style>
</head>
<body>
<figure>
  <h2>The Sapir-Whorf Spectrum</h2>
  <p class="subtitle">From Linguistic Determinism to Mere Labeling</p>
  <div class="diagram-wrapper">
    <svg viewBox="0 0 1040 520" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
      <defs>
        <linearGradient id="spectrumGrad" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="#dc3545" stop-opacity="0.7"/>
          <stop offset="25%" stop-color="#fd7e14" stop-opacity="0.6"/>
          <stop offset="45%" stop-color="#4361ee" stop-opacity="0.7"/>
          <stop offset="65%" stop-color="#198754" stop-opacity="0.7"/>
          <stop offset="100%" stop-color="#adb5bd" stop-opacity="0.5"/>
        </linearGradient>
        <marker id="arrowRight" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
          <polygon points="0 0, 10 3.5, 0 7" fill="var(--arrow-color)"/>
        </marker>
      </defs>

      <!-- Main spectrum bar -->
      <rect x="60" y="200" width="920" height="40" rx="20" fill="url(#spectrumGrad)"/>

      <!-- Current consensus bracket -->
      <rect x="380" y="185" width="310" height="70" rx="8" fill="var(--consensus-bg)" stroke="var(--consensus-border)" stroke-width="2" stroke-dasharray="6,3"/>
      <text x="535" y="175" text-anchor="middle" font-size="12" font-weight="700" fill="var(--consensus-border)">CURRENT CONSENSUS</text>

      <!-- Zone labels above the bar -->
      <!-- Strong Determinism -->
      <g transform="translate(120, 130)">
        <rect x="-55" y="-18" width="110" height="50" rx="6" fill="var(--reject-bg)" stroke="var(--reject)" stroke-width="1.5"/>
        <text text-anchor="middle" font-size="11" font-weight="700" fill="var(--reject)" dy="0">Strong</text>
        <text text-anchor="middle" font-size="11" font-weight="700" fill="var(--reject)" dy="14">Determinism</text>
        <text text-anchor="middle" font-size="9" fill="var(--reject)" dy="28">REJECTED</text>
      </g>

      <!-- Moderate Determinism -->
      <g transform="translate(290, 130)">
        <rect x="-55" y="-18" width="110" height="50" rx="6" fill="var(--surface)" stroke="var(--border)" stroke-width="1.5"/>
        <text text-anchor="middle" font-size="11" font-weight="600" fill="var(--fg)" dy="0">Moderate</text>
        <text text-anchor="middle" font-size="11" font-weight="600" fill="var(--fg)" dy="14">Determinism</text>
        <text text-anchor="middle" font-size="9" fill="var(--muted)" dy="28">Partially supported</text>
      </g>

      <!-- Thinking for Speaking -->
      <g transform="translate(460, 130)">
        <rect x="-60" y="-18" width="120" height="50" rx="6" fill="var(--support-bg)" stroke="var(--support)" stroke-width="1.5"/>
        <text text-anchor="middle" font-size="11" font-weight="700" fill="var(--support)" dy="0">Thinking for</text>
        <text text-anchor="middle" font-size="11" font-weight="700" fill="var(--support)" dy="14">Speaking</text>
        <text text-anchor="middle" font-size="9" fill="var(--support)" dy="28">Well supported</text>
      </g>

      <!-- Habitual Influence -->
      <g transform="translate(630, 130)">
        <rect x="-55" y="-18" width="110" height="50" rx="6" fill="var(--support-bg)" stroke="var(--support)" stroke-width="1.5"/>
        <text text-anchor="middle" font-size="11" font-weight="700" fill="var(--support)" dy="0">Habitual</text>
        <text text-anchor="middle" font-size="11" font-weight="700" fill="var(--support)" dy="14">Influence</text>
        <text text-anchor="middle" font-size="9" fill="var(--support)" dy="28">Well supported</text>
      </g>

      <!-- Mere Labeling -->
      <g transform="translate(870, 130)">
        <rect x="-55" y="-18" width="110" height="50" rx="6" fill="var(--surface)" stroke="var(--border)" stroke-width="1.5"/>
        <text text-anchor="middle" font-size="11" font-weight="600" fill="var(--muted)" dy="0">Mere</text>
        <text text-anchor="middle" font-size="11" font-weight="600" fill="var(--muted)" dy="14">Labeling</text>
        <text text-anchor="middle" font-size="9" fill="var(--muted)" dy="28">Insufficient</text>
      </g>

      <!-- Connecting lines from labels to bar -->
      <line x1="120" y1="162" x2="120" y2="200" stroke="var(--border)" stroke-width="1.5"/>
      <line x1="290" y1="162" x2="290" y2="200" stroke="var(--border)" stroke-width="1.5"/>
      <line x1="460" y1="162" x2="460" y2="200" stroke="var(--border)" stroke-width="1.5"/>
      <line x1="630" y1="162" x2="630" y2="200" stroke="var(--border)" stroke-width="1.5"/>
      <line x1="870" y1="162" x2="870" y2="200" stroke="var(--border)" stroke-width="1.5"/>

      <!-- Spectrum endpoints -->
      <text x="60" y="260" font-size="10" fill="var(--muted)">Language determines</text>
      <text x="60" y="273" font-size="10" fill="var(--muted)">thought entirely</text>
      <text x="980" y="260" font-size="10" fill="var(--muted)" text-anchor="end">Language only labels</text>
      <text x="980" y="273" font-size="10" fill="var(--muted)" text-anchor="end">pre-existing concepts</text>

      <!-- Direction arrow -->
      <line x1="60" y1="290" x2="980" y2="290" stroke="var(--arrow-color)" stroke-width="1.5" marker-end="url(#arrowRight)"/>
      <text x="520" y="308" text-anchor="middle" font-size="11" fill="var(--muted)" font-style="italic">Decreasing language influence on cognition</text>

      <!-- Thinker markers below spectrum -->
      <g>
        <!-- Humboldt -->
        <g transform="translate(140, 340)">
          <rect x="-45" y="-10" width="90" height="52" rx="6" fill="var(--thinker-bg)" stroke="var(--thinker-border)" stroke-width="1.5"/>
          <line x1="0" y1="-10" x2="0" y2="-100" stroke="var(--thinker-border)" stroke-width="1" stroke-dasharray="4,3"/>
          <circle cx="0" cy="-100" r="4" fill="var(--thinker-border)"/>
          <text text-anchor="middle" font-size="11" font-weight="700" fill="var(--fg)" dy="6">Humboldt</text>
          <text text-anchor="middle" font-size="9" fill="var(--muted)" dy="20">1820s</text>
          <text text-anchor="middle" font-size="8.5" fill="var(--muted)" dy="33">Weltanschauung</text>
        </g>

        <!-- Sapir -->
        <g transform="translate(310, 340)">
          <rect x="-45" y="-10" width="90" height="52" rx="6" fill="var(--thinker-bg)" stroke="var(--thinker-border)" stroke-width="1.5"/>
          <line x1="0" y1="-10" x2="0" y2="-100" stroke="var(--thinker-border)" stroke-width="1" stroke-dasharray="4,3"/>
          <circle cx="0" cy="-100" r="4" fill="var(--thinker-border)"/>
          <text text-anchor="middle" font-size="11" font-weight="700" fill="var(--fg)" dy="6">Sapir</text>
          <text text-anchor="middle" font-size="9" fill="var(--muted)" dy="20">1929</text>
          <text text-anchor="middle" font-size="8.5" fill="var(--muted)" dy="33">"predispose"</text>
        </g>

        <!-- Whorf -->
        <g transform="translate(220, 410)">
          <rect x="-45" y="-10" width="90" height="52" rx="6" fill="var(--thinker-bg)" stroke="var(--thinker-border)" stroke-width="1.5"/>
          <line x1="0" y1="-10" x2="70" y2="-170" stroke="var(--thinker-border)" stroke-width="1" stroke-dasharray="4,3"/>
          <circle cx="70" cy="-170" r="4" fill="var(--thinker-border)"/>
          <text text-anchor="middle" font-size="11" font-weight="700" fill="var(--fg)" dy="6">Whorf</text>
          <text text-anchor="middle" font-size="9" fill="var(--muted)" dy="20">1940</text>
          <text text-anchor="middle" font-size="8.5" fill="var(--muted)" dy="33">Hopi time</text>
        </g>

        <!-- Slobin -->
        <g transform="translate(460, 340)">
          <rect x="-45" y="-10" width="90" height="52" rx="6" fill="var(--thinker-bg)" stroke="var(--thinker-border)" stroke-width="1.5"/>
          <line x1="0" y1="-10" x2="0" y2="-100" stroke="var(--thinker-border)" stroke-width="1" stroke-dasharray="4,3"/>
          <circle cx="0" cy="-100" r="4" fill="var(--thinker-border)"/>
          <text text-anchor="middle" font-size="11" font-weight="700" fill="var(--fg)" dy="6">Slobin</text>
          <text text-anchor="middle" font-size="9" fill="var(--muted)" dy="20">1987</text>
          <text text-anchor="middle" font-size="8.5" fill="var(--muted)" dy="33">Think-for-speak</text>
        </g>

        <!-- Boroditsky -->
        <g transform="translate(600, 410)">
          <rect x="-50" y="-10" width="100" height="52" rx="6" fill="var(--thinker-bg)" stroke="var(--thinker-border)" stroke-width="1.5"/>
          <line x1="0" y1="-10" x2="30" y2="-170" stroke="var(--thinker-border)" stroke-width="1" stroke-dasharray="4,3"/>
          <circle cx="30" cy="-170" r="4" fill="var(--thinker-border)"/>
          <text text-anchor="middle" font-size="11" font-weight="700" fill="var(--fg)" dy="6">Boroditsky</text>
          <text text-anchor="middle" font-size="9" fill="var(--muted)" dy="20">2001+</text>
          <text text-anchor="middle" font-size="8.5" fill="var(--muted)" dy="33">Neo-Whorfian</text>
        </g>

        <!-- Chomsky -->
        <g transform="translate(830, 340)">
          <rect x="-50" y="-10" width="100" height="52" rx="6" fill="var(--thinker-bg)" stroke="var(--thinker-border)" stroke-width="1.5"/>
          <line x1="0" y1="-10" x2="0" y2="-100" stroke="var(--thinker-border)" stroke-width="1" stroke-dasharray="4,3"/>
          <circle cx="0" cy="-100" r="4" fill="var(--thinker-border)"/>
          <text text-anchor="middle" font-size="11" font-weight="700" fill="var(--fg)" dy="6">Chomsky</text>
          <text text-anchor="middle" font-size="9" fill="var(--muted)" dy="20">1957+</text>
          <text text-anchor="middle" font-size="8.5" fill="var(--muted)" dy="33">Universalism</text>
        </g>
      </g>

      <!-- Legend -->
      <g transform="translate(60, 490)">
        <rect x="0" y="-10" width="12" height="12" rx="2" fill="var(--reject-bg)" stroke="var(--reject)" stroke-width="1"/>
        <text x="18" y="0" font-size="10" fill="var(--muted)">Rejected</text>
        <rect x="90" y="-10" width="12" height="12" rx="2" fill="var(--support-bg)" stroke="var(--support)" stroke-width="1"/>
        <text x="108" y="0" font-size="10" fill="var(--muted)">Well supported</text>
        <rect x="210" y="-10" width="12" height="12" rx="2" fill="var(--consensus-bg)" stroke="var(--consensus-border)" stroke-width="1" stroke-dasharray="3,2"/>
        <text x="228" y="0" font-size="10" fill="var(--muted)">Current consensus zone</text>
        <rect x="380" y="-10" width="12" height="12" rx="2" fill="var(--thinker-bg)" stroke="var(--thinker-border)" stroke-width="1"/>
        <text x="398" y="0" font-size="10" fill="var(--muted)">Key thinker (positioned by stance)</text>
      </g>
    </svg>
  </div>
  <figcaption>
    <strong>Figure 1: The Sapir-Whorf Spectrum</strong>
    <span>The hypothesis spans a continuum from strong linguistic determinism (language determines thought -- rejected) through moderate positions to mere labeling (language only labels universal concepts -- insufficient). The current scientific consensus occupies the middle ground of "Thinking for Speaking" and "Habitual Influence," where language shapes default attention patterns without eliminating the capacity to think beyond them. Key thinkers are positioned along the spectrum according to the strength of their claims about language's influence on cognition.</span>
  </figcaption>
</figure>
</body>
</html>
