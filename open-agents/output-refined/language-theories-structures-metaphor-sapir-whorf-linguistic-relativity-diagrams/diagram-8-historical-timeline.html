<body>
<figure>
  <h2>Historical Timeline of the Sapir-Whorf Debate</h2>
  <p class="subtitle">Two centuries of oscillation between relativism and universalism</p>

  <div class="mermaid-wrapper">
    <pre class="mermaid">
timeline
    title The Sapir-Whorf Hypothesis: 1820s to Present

    section Origins of Linguistic Relativity
        1820s : Humboldt
              : Language as Weltanschauung
              : The forming organ of thought
              : innere Sprachform (inner form)
        1911 : Boas
             : Handbook of American Indian Languages
             : Cultural relativism meets linguistics
             : Languages classified on their own terms

    section The Classical Period
        1929 : Sapir
             : The Status of Linguistics as a Science
             : Real world built on language habits
             : Influence hedged with predispose
        1940 : Whorf
             : Science and Linguistics published
             : Hopi time analysis
             : Linguistic relativity principle named
             : Standard Average European critique
        1941 : Whorf dies at 44
             : Never held an academic position
        1954 : Hoijer coins Sapir-Whorf Hypothesis
             : Neither Sapir nor Whorf named it

    section The Universalist Backlash
        1957 : Chomsky
             : Syntactic Structures published
             : Universal Grammar proposed
             : Innate language faculty
        1960s-80s : Linguistic relativity dismissed
                  : ~30 year dark age for relativism
                  : Surface differences seen as trivial
                  : Deep structure universalism dominant
        1983 : Malotki publishes Hopi Time
             : Challenges Whorf on Hopi temporal concepts
        1986 : Martin documents Eskimo snow inflation
        1989 : Pullum
             : The Great Eskimo Vocabulary Hoax
             : Devastating critique of sloppy scholarship
             : Relativity tainted by association

    section The Neo-Whorfian Renaissance
        1987 : Slobin
             : Thinking for Speaking hypothesis
             : Defensible middle ground formulated
        1990s : Levinson
              : Guugu Yimithirr spatial research
              : Absolute vs relative frames demonstrated
              : Tzeltal topographic space
        2001 : Boroditsky
             : Mandarin vertical time study
             : Broad empirical research program begins
        2003 : Grammatical gender effects
             : Phillips and Boroditsky bridge study
        2006 : Nunez and Sweetser
             : Aymara past-is-front discovery

    section Mature Empirical Phase
        2007 : Winawer et al
             : Russian blues in PNAS
             : Categorical perception demonstrated
             : Verbal interference control
        2008 : Frank et al
             : Piraha number cognition study
             : Language as cognitive technology
        2010s : Neural evidence emerges
              : Lateralized color effects in brain
              : Context-dependent findings refined
              : Replication challenges for some claims
        2020s : Current consensus
              : Language influences habitual thought
              : Effects real but non-deterministic
              : Domain-specific and context-dependent
              : How much and through what mechanisms
    </pre>
  </div>

  <div class="pendulum">
    <strong>The Pendulum Swing of Linguistic Relativity</strong>
    <p>The history of the Sapir-Whorf hypothesis follows a dramatic arc: from Humboldt's early romanticism, through Sapir and Whorf's classical formulations, into a ~30-year period of dismissal under Chomskyan universalism, to the current neo-Whorfian renaissance. The field has moved from asking "does language shape thought?" (yes, partially) to "how much, under what conditions, and through what mechanisms?"</p>
  </div>

  <figcaption>
    <strong>Figure 8: Historical Timeline of the Sapir-Whorf Debate</strong>
    <span>The intellectual history of linguistic relativity spans two centuries, from Humboldt's philosophical framework through Boas, Sapir, and Whorf's classical formulations, the Chomskyan universalist backlash (1957-1990s), and the neo-Whorfian empirical renaissance led by Slobin, Levinson, Boroditsky, and others. The "Sapir-Whorf Hypothesis" was never actually proposed by either Sapir or Whorf -- the term was coined by Harry Hoijer in 1954, years after both men had died.</span>
  </figcaption>
</figure>
