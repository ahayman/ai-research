<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Time Conceptualization Across Languages</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --accent: #4361ee;
    --muted: #6c757d;
    --english-color: #3498db;
    --english-bg: #ebf5fb;
    --mandarin-color: #e74c3c;
    --mandarin-bg: #fdedec;
    --aymara-color: #8e44ad;
    --aymara-bg: #f4ecf7;
    --kuuk-color: #27ae60;
    --kuuk-bg: #eafaf1;
    --callout-bg: #fff8e1;
    --callout-border: #f9a825;
    --past-color: #95a5a6;
    --future-color: #2c3e50;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --accent: #6b8aff;
      --muted: #9a9ab0;
      --english-color: #5dade2;
      --english-bg: #0d2a3a;
      --mandarin-color: #ff6b6b;
      --mandarin-bg: #2a1010;
      --aymara-color: #bb86fc;
      --aymara-bg: #1e1030;
      --kuuk-color: #51cf66;
      --kuuk-bg: #0a2a15;
      --callout-bg: #2a2510;
      --callout-border: #c49000;
      --past-color: #7f8c8d;
      --future-color: #bdc3c7;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure {
    max-width: 1100px;
    width: 100%;
    background: var(--surface);
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
  }
  h2 { text-align: center; font-size: 1.4rem; margin-bottom: 0.3rem; }
  .subtitle { text-align: center; font-size: 0.95rem; color: var(--muted); margin-bottom: 2rem; }
  .diagram-wrapper { overflow-x: auto; padding: 0.5rem; }
  svg { display: block; margin: 0 auto; }
  figcaption {
    text-align: center; margin-top: 1.5rem; padding-top: 1.25rem; border-top: 1px solid var(--border);
  }
  figcaption strong { display: block; font-size: 1.05rem; margin-bottom: 0.4rem; }
  figcaption span { font-size: 0.88rem; color: var(--muted); line-height: 1.5; }
</style>
</head>
<body>
<figure>
  <h2>Time Conceptualization Across Languages</h2>
  <p class="subtitle">Different linguistic metaphors, different mental timelines</p>
  <div class="diagram-wrapper">
    <svg viewBox="0 0 1040 750" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
      <defs>
        <marker id="arrBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
          <polygon points="0 0,10 3.5,0 7" fill="var(--english-color)"/>
        </marker>
        <marker id="arrRed" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
          <polygon points="0 0,10 3.5,0 7" fill="var(--mandarin-color)"/>
        </marker>
        <marker id="arrPurple" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
          <polygon points="0 0,10 3.5,0 7" fill="var(--aymara-color)"/>
        </marker>
        <marker id="arrGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
          <polygon points="0 0,10 3.5,0 7" fill="var(--kuuk-color)"/>
        </marker>
      </defs>

      <!-- ========= PANEL 1: ENGLISH ========= -->
      <g transform="translate(20, 10)">
        <rect x="0" y="0" width="490" height="170" rx="12" fill="var(--english-bg)" stroke="var(--english-color)" stroke-width="2"/>
        <text x="245" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="var(--english-color)">English</text>
        <text x="245" y="45" text-anchor="middle" font-size="10" fill="var(--muted)">Horizontal, left-to-right, future = ahead</text>

        <!-- Person figure -->
        <circle cx="245" cy="85" r="7" fill="none" stroke="var(--english-color)" stroke-width="2"/>
        <line x1="245" y1="92" x2="245" y2="112" stroke="var(--english-color)" stroke-width="2"/>
        <line x1="245" y1="100" x2="232" y2="108" stroke="var(--english-color)" stroke-width="2"/>
        <line x1="245" y1="100" x2="258" y2="108" stroke="var(--english-color)" stroke-width="2"/>

        <!-- Timeline arrow -->
        <line x1="50" y1="95" x2="440" y2="95" stroke="var(--english-color)" stroke-width="2.5" marker-end="url(#arrBlue)"/>

        <!-- Past label -->
        <text x="80" y="88" text-anchor="middle" font-size="12" font-weight="700" fill="var(--past-color)">PAST</text>
        <text x="80" y="120" text-anchor="middle" font-size="9" fill="var(--muted)">"put it behind us"</text>

        <!-- Future label -->
        <text x="410" y="88" text-anchor="middle" font-size="12" font-weight="700" fill="var(--future-color)">FUTURE</text>
        <text x="410" y="120" text-anchor="middle" font-size="9" fill="var(--muted)">"the road ahead"</text>

        <!-- Metaphor label -->
        <rect x="120" y="135" width="250" height="24" rx="4" fill="var(--surface)" stroke="var(--border)" stroke-width="1"/>
        <text x="245" y="152" text-anchor="middle" font-size="10" fill="var(--muted)">Metaphor: writing direction + forward motion</text>
      </g>

      <!-- ========= PANEL 2: MANDARIN ========= -->
      <g transform="translate(530, 10)">
        <rect x="0" y="0" width="490" height="170" rx="12" fill="var(--mandarin-bg)" stroke="var(--mandarin-color)" stroke-width="2"/>
        <text x="245" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="var(--mandarin-color)">Mandarin Chinese</text>
        <text x="245" y="45" text-anchor="middle" font-size="10" fill="var(--muted)">Horizontal AND vertical, future = down</text>

        <!-- Horizontal arrow (also present) -->
        <line x1="40" y1="110" x2="200" y2="110" stroke="var(--mandarin-color)" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrRed)"/>
        <text x="55" y="105" font-size="9" fill="var(--muted)">past</text>
        <text x="180" y="105" font-size="9" fill="var(--muted)">future</text>

        <!-- Vertical arrow (primary) -->
        <line x1="330" y1="55" x2="330" y2="155" stroke="var(--mandarin-color)" stroke-width="2.5" marker-end="url(#arrRed)"/>

        <!-- Past UP -->
        <text x="360" y="68" font-size="12" font-weight="700" fill="var(--past-color)">PAST</text>
        <text x="360" y="82" font-size="10" fill="var(--mandarin-color)">shang (up)</text>
        <text x="360" y="94" font-size="9" fill="var(--muted)" font-style="italic">shang zhou = last week</text>

        <!-- Future DOWN -->
        <text x="360" y="138" font-size="12" font-weight="700" fill="var(--future-color)">FUTURE</text>
        <text x="360" y="152" font-size="10" fill="var(--mandarin-color)">xia (down)</text>
        <text x="255" y="160" font-size="9" fill="var(--muted)" font-style="italic">xia zhou = next week</text>

        <!-- Label -->
        <text x="130" y="150" font-size="10" fill="var(--muted)">Metaphor: vertical reading +</text>
        <text x="130" y="163" font-size="10" fill="var(--muted)">up/down spatial metaphor</text>
      </g>

      <!-- ========= PANEL 3: AYMARA ========= -->
      <g transform="translate(20, 200)">
        <rect x="0" y="0" width="490" height="215" rx="12" fill="var(--aymara-bg)" stroke="var(--aymara-color)" stroke-width="2"/>
        <text x="245" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="var(--aymara-color)">Aymara (Andes)</text>
        <text x="245" y="45" text-anchor="middle" font-size="10" fill="var(--muted)">Past = in front (visible), Future = behind (unseen)</text>

        <!-- Person facing right -->
        <circle cx="245" cy="100" r="8" fill="none" stroke="var(--aymara-color)" stroke-width="2"/>
        <line x1="245" y1="108" x2="245" y2="130" stroke="var(--aymara-color)" stroke-width="2"/>
        <line x1="245" y1="118" x2="230" y2="128" stroke="var(--aymara-color)" stroke-width="2"/>
        <line x1="245" y1="118" x2="260" y2="128" stroke="var(--aymara-color)" stroke-width="2"/>
        <!-- Eyes indicator -->
        <line x1="253" y1="97" x2="268" y2="97" stroke="var(--aymara-color)" stroke-width="1.5" stroke-dasharray="2,2"/>
        <text x="280" y="100" font-size="8" fill="var(--aymara-color)">gaze</text>

        <!-- PAST in FRONT (right) -->
        <line x1="270" y1="108" x2="420" y2="108" stroke="var(--aymara-color)" stroke-width="2.5" marker-end="url(#arrPurple)"/>
        <rect x="340" y="72" width="110" height="28" rx="6" fill="var(--aymara-color)" opacity="0.15" stroke="var(--aymara-color)" stroke-width="1.5"/>
        <text x="395" y="91" text-anchor="middle" font-size="12" font-weight="700" fill="var(--aymara-color)">PAST (nayra)</text>
        <text x="395" y="120" text-anchor="middle" font-size="9" fill="var(--muted)">"front / seen / visible"</text>

        <!-- FUTURE BEHIND (left) -->
        <line x1="220" y1="108" x2="80" y2="108" stroke="var(--aymara-color)" stroke-width="2.5" marker-end="url(#arrPurple)"/>
        <rect x="40" y="72" width="120" height="28" rx="6" fill="var(--aymara-color)" opacity="0.15" stroke="var(--aymara-color)" stroke-width="1.5"/>
        <text x="100" y="91" text-anchor="middle" font-size="12" font-weight="700" fill="var(--aymara-color)">FUTURE (qhipa)</text>
        <text x="100" y="120" text-anchor="middle" font-size="9" fill="var(--muted)">"behind / unseen"</text>

        <!-- Key insight -->
        <rect x="30" y="143" width="430" height="58" rx="6" fill="var(--callout-bg)" stroke="var(--callout-border)" stroke-width="1"/>
        <text x="245" y="163" text-anchor="middle" font-size="11" font-weight="700" fill="var(--fg)">Underlying logic: The past is what we have already seen</text>
        <text x="245" y="179" text-anchor="middle" font-size="11" fill="var(--fg)">(it lies before our eyes). The future is what we cannot</text>
        <text x="245" y="193" text-anchor="middle" font-size="11" fill="var(--fg)">yet see (it lies behind us, out of sight).</text>
      </g>

      <!-- ========= PANEL 4: KUUK THAAYORRE ========= -->
      <g transform="translate(530, 200)">
        <rect x="0" y="0" width="490" height="215" rx="12" fill="var(--kuuk-bg)" stroke="var(--kuuk-color)" stroke-width="2"/>
        <text x="245" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="var(--kuuk-color)">Kuuk Thaayorre (Pormpuraaw)</text>
        <text x="245" y="45" text-anchor="middle" font-size="10" fill="var(--muted)">Solar path: East to West, following the sun</text>

        <!-- Sun path arc -->
        <path d="M 80,155 Q 245,30 410,155" fill="none" stroke="var(--kuuk-color)" stroke-width="2.5" stroke-dasharray="8,4"/>

        <!-- Sun symbol at east -->
        <circle cx="80" cy="155" r="12" fill="#f9a825" stroke="#e67e22" stroke-width="1.5"/>
        <text x="80" y="159" text-anchor="middle" font-size="10" fill="#333" font-weight="700">E</text>
        <text x="80" y="180" text-anchor="middle" font-size="10" font-weight="700" fill="var(--kuuk-color)">PAST</text>
        <text x="80" y="192" text-anchor="middle" font-size="9" fill="var(--muted)">(sunrise)</text>

        <!-- Sun symbol at west -->
        <circle cx="410" cy="155" r="12" fill="#e67e22" stroke="#d35400" stroke-width="1.5"/>
        <text x="410" y="159" text-anchor="middle" font-size="10" fill="#fff" font-weight="700">W</text>
        <text x="410" y="180" text-anchor="middle" font-size="10" font-weight="700" fill="var(--kuuk-color)">FUTURE</text>
        <text x="410" y="192" text-anchor="middle" font-size="9" fill="var(--muted)">(sunset)</text>

        <!-- Arrow along arc -->
        <line x1="100" y1="140" x2="390" y2="140" stroke="var(--kuuk-color)" stroke-width="2" marker-end="url(#arrGreen)"/>

        <!-- Person in center -->
        <circle cx="245" cy="120" r="6" fill="none" stroke="var(--kuuk-color)" stroke-width="1.5"/>
        <line x1="245" y1="126" x2="245" y2="140" stroke="var(--kuuk-color)" stroke-width="1.5"/>

        <!-- Facing direction note -->
        <text x="245" y="72" text-anchor="middle" font-size="10" fill="var(--muted)" font-style="italic">Cards arranged east-to-west</text>
        <text x="245" y="85" text-anchor="middle" font-size="10" fill="var(--muted)" font-style="italic">regardless of which way the person faces</text>
      </g>

      <!-- ========= COMPARISON SUMMARY ========= -->
      <g transform="translate(20, 435)">
        <rect x="0" y="0" width="1000" height="300" rx="12" fill="var(--surface)" stroke="var(--border)" stroke-width="1.5"/>
        <text x="500" y="30" text-anchor="middle" font-size="15" font-weight="700" fill="var(--fg)">Summary: How Four Languages Map Time Onto Space</text>

        <!-- Table-like layout -->
        <!-- Headers -->
        <text x="40" y="60" font-size="12" font-weight="700" fill="var(--fg)">Language</text>
        <text x="200" y="60" font-size="12" font-weight="700" fill="var(--fg)">Axis</text>
        <text x="360" y="60" font-size="12" font-weight="700" fill="var(--fg)">Past Direction</text>
        <text x="560" y="60" font-size="12" font-weight="700" fill="var(--fg)">Future Direction</text>
        <text x="760" y="60" font-size="12" font-weight="700" fill="var(--fg)">Underlying Metaphor</text>
        <line x1="30" y1="68" x2="970" y2="68" stroke="var(--border)" stroke-width="1"/>

        <!-- English row -->
        <circle cx="30" cy="88" r="5" fill="var(--english-color)"/>
        <text x="40" y="93" font-size="11" font-weight="600" fill="var(--english-color)">English</text>
        <text x="200" y="93" font-size="11" fill="var(--fg)">Horizontal</text>
        <text x="360" y="93" font-size="11" fill="var(--fg)">Left / Behind</text>
        <text x="560" y="93" font-size="11" fill="var(--fg)">Right / Ahead</text>
        <text x="760" y="93" font-size="11" fill="var(--muted)">Writing direction + forward motion</text>

        <line x1="30" y1="103" x2="970" y2="103" stroke="var(--border)" stroke-width="0.5" stroke-dasharray="3,3"/>

        <!-- Mandarin row -->
        <circle cx="30" cy="123" r="5" fill="var(--mandarin-color)"/>
        <text x="40" y="128" font-size="11" font-weight="600" fill="var(--mandarin-color)">Mandarin</text>
        <text x="200" y="128" font-size="11" fill="var(--fg)">Vertical (+ horiz.)</text>
        <text x="360" y="128" font-size="11" fill="var(--fg)">Up (shang)</text>
        <text x="560" y="128" font-size="11" fill="var(--fg)">Down (xia)</text>
        <text x="760" y="128" font-size="11" fill="var(--muted)">Vertical reading + up/down spatial</text>

        <line x1="30" y1="138" x2="970" y2="138" stroke="var(--border)" stroke-width="0.5" stroke-dasharray="3,3"/>

        <!-- Aymara row -->
        <circle cx="30" cy="158" r="5" fill="var(--aymara-color)"/>
        <text x="40" y="163" font-size="11" font-weight="600" fill="var(--aymara-color)">Aymara</text>
        <text x="200" y="163" font-size="11" fill="var(--fg)">Front/Back (reversed)</text>
        <text x="360" y="163" font-size="11" fill="var(--fg)">In front (nayra)</text>
        <text x="560" y="163" font-size="11" fill="var(--fg)">Behind (qhipa)</text>
        <text x="760" y="163" font-size="11" fill="var(--muted)">Visibility: seen = past, unseen = future</text>

        <line x1="30" y1="173" x2="970" y2="173" stroke="var(--border)" stroke-width="0.5" stroke-dasharray="3,3"/>

        <!-- Kuuk Thaayorre row -->
        <circle cx="30" cy="193" r="5" fill="var(--kuuk-color)"/>
        <text x="40" y="198" font-size="11" font-weight="600" fill="var(--kuuk-color)">Kuuk Thaayorre</text>
        <text x="200" y="198" font-size="11" fill="var(--fg)">Cardinal (E-to-W)</text>
        <text x="360" y="198" font-size="11" fill="var(--fg)">East (sunrise)</text>
        <text x="560" y="198" font-size="11" fill="var(--fg)">West (sunset)</text>
        <text x="760" y="198" font-size="11" fill="var(--muted)">Solar path across the sky</text>

        <line x1="30" y1="213" x2="970" y2="213" stroke="var(--border)" stroke-width="1"/>

        <!-- Key insight -->
        <rect x="30" y="225" width="940" height="60" rx="8" fill="var(--callout-bg)" stroke="var(--callout-border)" stroke-width="1.5"/>
        <text x="500" y="248" text-anchor="middle" font-size="12" font-weight="700" fill="var(--fg)">These differences are not just linguistic conventions -- they shape gesture direction, memory encoding, and spatial reasoning.</text>
        <text x="500" y="268" text-anchor="middle" font-size="11" fill="var(--muted)">Aymara speakers point forward when discussing the past. Kuuk Thaayorre speakers arrange temporal sequences east-to-west without being told which way they face.</text>
      </g>
    </svg>
  </div>
  <figcaption>
    <strong>Figure 4: Time Conceptualization Across Languages</strong>
    <span>Languages spatialize time using different metaphors, producing different mental timelines. English maps time horizontally (past-left, future-right), Mandarin adds a vertical axis (past-up, future-down), Aymara reverses the front/back mapping (past is visible and therefore in front), and Kuuk Thaayorre follows the sun's path from east to west regardless of the speaker's facing direction. Research by Boroditsky, Nunez and Sweetser, and others confirms these are genuine cognitive differences, not merely verbal habits.</span>
  </figcaption>
</figure>
</body>
</html>
