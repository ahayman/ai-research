<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unfamiliar vs. Irregular: The Difficulty Matrix</title>
<style>
  :root {
    --bg: #0f172a;
    --fg: #e2e8f0;
    --surface: #1e293b;
    --border: #334155;
    --accent: #06b6d4;
    --muted: #94a3b8;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure { max-width: 900px; width: 100%; }
  figcaption { text-align: center; margin-bottom: 1.5rem; }
  figcaption h2 { font-size: 1.3rem; font-weight: 700; color: var(--accent); margin-bottom: 0.3rem; }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  .svg-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.5rem;
    overflow-x: auto;
  }
  svg { display: block; margin: 0 auto; }
  .bottom-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.75rem;
    margin-top: 1rem;
  }
  @media (max-width: 600px) { .bottom-row { grid-template-columns: 1fr; } }
  .insight-box {
    padding: 0.85rem 1rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 0.84rem;
  }
  .insight-box strong { color: var(--accent); }
  .insight-box.key {
    border-color: rgba(6, 182, 212, 0.3);
    background: rgba(6, 182, 212, 0.06);
  }
</style>
</head>
<body>
<figure>
  <figcaption>
    <h2>The "Unfamiliar &#8800; Irregular" Matrix</h2>
    <p>Plotting language features on unfamiliarity (for English speakers) vs. irregularity reveals Mandarin's true nature</p>
  </figcaption>

  <div class="svg-wrap">
    <svg viewBox="0 0 780 560" xmlns="http://www.w3.org/2000/svg" style="max-width:780px;width:100%">
      <!-- Background quadrants -->
      <rect x="100" y="40" width="320" height="230" rx="6" fill="#064e3b" opacity="0.15"/>
      <rect x="420" y="40" width="320" height="230" rx="6" fill="#06b6d4" opacity="0.08"/>
      <rect x="100" y="270" width="320" height="230" rx="6" fill="#f59e0b" opacity="0.08"/>
      <rect x="420" y="270" width="320" height="230" rx="6" fill="#ef4444" opacity="0.08"/>

      <!-- Axes -->
      <line x1="100" y1="40" x2="100" y2="500" stroke="#475569" stroke-width="2"/>
      <line x1="100" y1="500" x2="740" y2="500" stroke="#475569" stroke-width="2"/>
      <!-- Arrows -->
      <polygon points="100,36 96,46 104,46" fill="#475569"/>
      <polygon points="744,500 734,496 734,504" fill="#475569"/>

      <!-- Axis labels -->
      <text x="420" y="530" fill="#94a3b8" font-size="13" text-anchor="middle" font-weight="600">UNFAMILIARITY (for English speakers) &#8594;</text>
      <text x="40" y="280" fill="#94a3b8" font-size="13" text-anchor="middle" font-weight="600" transform="rotate(-90 40 280)">IRREGULARITY (exceptions) &#8594;</text>

      <!-- Midlines -->
      <line x1="420" y1="40" x2="420" y2="500" stroke="#334155" stroke-width="1" stroke-dasharray="6,4"/>
      <line x1="100" y1="270" x2="740" y2="270" stroke="#334155" stroke-width="1" stroke-dasharray="6,4"/>

      <!-- Quadrant labels -->
      <text x="260" y="72" fill="#10b981" font-size="13" text-anchor="middle" font-weight="700">Q1: FAMILIAR + REGULAR</text>
      <text x="260" y="90" fill="#64748b" font-size="11" text-anchor="middle">Easy</text>

      <text x="580" y="72" fill="#06b6d4" font-size="13" text-anchor="middle" font-weight="700">Q2: UNFAMILIAR + REGULAR</text>
      <text x="580" y="90" fill="#64748b" font-size="11" text-anchor="middle">Learnable (Mandarin's sweet spot)</text>

      <text x="260" y="298" fill="#f59e0b" font-size="13" text-anchor="middle" font-weight="700">Q3: FAMILIAR + IRREGULAR</text>
      <text x="260" y="316" fill="#64748b" font-size="11" text-anchor="middle">Frustrating (English's weakness)</text>

      <text x="580" y="298" fill="#ef4444" font-size="13" text-anchor="middle" font-weight="700">Q4: UNFAMILIAR + IRREGULAR</text>
      <text x="580" y="316" fill="#64748b" font-size="11" text-anchor="middle">Genuinely Hard</text>

      <!-- Q1 items (Familiar + Regular) -->
      <rect x="145" y="110" width="125" height="28" rx="14" fill="#064e3b" stroke="#10b981" stroke-width="1"/>
      <text x="207" y="128" fill="#10b981" font-size="11" text-anchor="middle" font-weight="600">Basic SVO order</text>

      <rect x="145" y="148" width="175" height="28" rx="14" fill="#064e3b" stroke="#10b981" stroke-width="1"/>
      <text x="232" y="166" fill="#10b981" font-size="11" text-anchor="middle" font-weight="600">Number system (Mandarin)</text>

      <rect x="145" y="186" width="185" height="28" rx="14" fill="#064e3b" stroke="#10b981" stroke-width="1"/>
      <text x="237" y="204" fill="#10b981" font-size="11" text-anchor="middle" font-weight="600">Compound vocabulary logic</text>

      <rect x="145" y="224" width="155" height="28" rx="14" fill="#064e3b" stroke="#10b981" stroke-width="1"/>
      <text x="222" y="242" fill="#10b981" font-size="11" text-anchor="middle" font-weight="600">Zero conjugation rule</text>

      <!-- Q2 items (Unfamiliar + Regular) - MANDARIN'S SWEET SPOT -->
      <rect x="445" y="105" width="185" height="28" rx="14" fill="rgba(6,182,212,0.15)" stroke="#06b6d4" stroke-width="1.5"/>
      <text x="537" y="123" fill="#06b6d4" font-size="11" text-anchor="middle" font-weight="700">&#127927; Tones (4 categories, simple rules)</text>

      <rect x="445" y="143" width="215" height="28" rx="14" fill="rgba(6,182,212,0.15)" stroke="#06b6d4" stroke-width="1.5"/>
      <text x="552" y="161" fill="#06b6d4" font-size="11" text-anchor="middle" font-weight="700">&#23383; Characters (80% predictable)</text>

      <rect x="445" y="181" width="245" height="28" rx="14" fill="rgba(6,182,212,0.15)" stroke="#06b6d4" stroke-width="1.5"/>
      <text x="567" y="199" fill="#06b6d4" font-size="11" text-anchor="middle" font-weight="700">&#37327;&#35789; Classifiers (shape/animacy logic)</text>

      <rect x="445" y="219" width="195" height="28" rx="14" fill="rgba(6,182,212,0.15)" stroke="#06b6d4" stroke-width="1.5"/>
      <text x="542" y="237" fill="#06b6d4" font-size="11" text-anchor="middle" font-weight="700">Aspect particles (few, consistent)</text>

      <!-- Q3 items (Familiar + Irregular) - ENGLISH'S WEAKNESS -->
      <rect x="135" y="340" width="175" height="28" rx="14" fill="rgba(245,158,11,0.12)" stroke="#f59e0b" stroke-width="1"/>
      <text x="222" y="358" fill="#f59e0b" font-size="11" text-anchor="middle" font-weight="600">English irregular verbs</text>

      <rect x="135" y="378" width="190" height="28" rx="14" fill="rgba(245,158,11,0.12)" stroke="#f59e0b" stroke-width="1"/>
      <text x="230" y="396" fill="#f59e0b" font-size="11" text-anchor="middle" font-weight="600">English spelling madness</text>

      <rect x="135" y="416" width="210" height="28" rx="14" fill="rgba(245,158,11,0.12)" stroke="#f59e0b" stroke-width="1"/>
      <text x="240" y="434" fill="#f59e0b" font-size="11" text-anchor="middle" font-weight="600">English stress patterns</text>

      <rect x="135" y="454" width="175" height="28" rx="14" fill="rgba(245,158,11,0.12)" stroke="#f59e0b" stroke-width="1"/>
      <text x="222" y="472" fill="#f59e0b" font-size="11" text-anchor="middle" font-weight="600">English plural exceptions</text>

      <!-- Q4 items (Unfamiliar + Irregular) -->
      <rect x="455" y="345" width="225" height="28" rx="14" fill="rgba(239,68,68,0.1)" stroke="#ef4444" stroke-width="1"/>
      <text x="567" y="363" fill="#ef4444" font-size="11" text-anchor="middle" font-weight="600">&#25104;&#35821; Classical idioms (memorize)</text>

      <rect x="455" y="383" width="255" height="28" rx="14" fill="rgba(239,68,68,0.1)" stroke="#ef4444" stroke-width="1"/>
      <text x="582" y="401" fill="#ef4444" font-size="11" text-anchor="middle" font-weight="600">Broken phonetic components (~60%)</text>

      <rect x="455" y="421" width="245" height="28" rx="14" fill="rgba(239,68,68,0.1)" stroke="#ef4444" stroke-width="1"/>
      <text x="577" y="439" fill="#ef4444" font-size="11" text-anchor="middle" font-weight="600">Arbitrary classifier assignments</text>

      <rect x="455" y="459" width="255" height="28" rx="14" fill="rgba(239,68,68,0.1)" stroke="#ef4444" stroke-width="1"/>
      <text x="582" y="477" fill="#ef4444" font-size="11" text-anchor="middle" font-weight="600">T3 sandhi in fast speech chains</text>
    </svg>
  </div>

  <div class="bottom-row">
    <div class="insight-box key">
      <strong>Key Insight:</strong> Most Mandarin features that English speakers find "hard" cluster in Q2 (unfamiliar + regular). They feel difficult because they are new, not because they are irregular. Pattern-oriented learners thrive here.
    </div>
    <div class="insight-box">
      <strong>English's Hidden Burden:</strong> Many English features sit in Q3 (familiar + irregular). Native speakers don't notice the irregularity because they absorbed it as children, but L2 learners of English face enormous exception lists.
    </div>
  </div>
</figure>
</body>
</html>
