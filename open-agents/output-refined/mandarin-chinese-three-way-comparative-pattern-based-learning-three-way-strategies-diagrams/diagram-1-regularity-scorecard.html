<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Regularity Scorecard: Mandarin vs. English — Head to Head</title>
<style>
  :root {
    --bg: #0f172a;
    --fg: #e2e8f0;
    --surface: #1e293b;
    --border: #334155;
    --accent: #06b6d4;
    --accent-light: #0e3a4a;
    --mandarin: #06b6d4;
    --mandarin-light: #0c3d4f;
    --english: #f59e0b;
    --english-light: #3d2a08;
    --tie: #a78bfa;
    --tie-light: #2e2450;
    --muted: #94a3b8;
    --caption-bg: #1e293b;
    --win-bg: rgba(6, 182, 212, 0.12);
    --lose-bg: rgba(245, 158, 11, 0.12);
    --tie-bg: rgba(167, 139, 250, 0.1);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure { max-width: 960px; width: 100%; }
  figcaption {
    text-align: center;
    margin-bottom: 1.5rem;
  }
  figcaption h2 { font-size: 1.3rem; font-weight: 700; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  .chart-wrapper {
    overflow-x: auto;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--surface);
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.88rem;
    min-width: 700px;
  }
  th {
    padding: 0.75rem 1rem;
    text-align: left;
    font-weight: 700;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    border-bottom: 2px solid var(--border);
    background: rgba(15, 23, 42, 0.5);
  }
  td {
    padding: 0.7rem 1rem;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
  }
  tr:last-child td { border-bottom: none; }
  .winner-m { background: var(--win-bg); }
  .winner-e { background: var(--lose-bg); }
  .winner-t { background: var(--tie-bg); }
  .badge {
    display: inline-block;
    padding: 0.15rem 0.5rem;
    border-radius: 999px;
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.04em;
  }
  .badge-m { background: var(--mandarin-light); color: var(--mandarin); border: 1px solid rgba(6, 182, 212, 0.3); }
  .badge-e { background: var(--english-light); color: var(--english); border: 1px solid rgba(245, 158, 11, 0.3); }
  .badge-t { background: var(--tie-light); color: var(--tie); border: 1px solid rgba(167, 139, 250, 0.3); }
  .dim { color: var(--muted); font-size: 0.82rem; }
  .detail { color: #cbd5e1; font-size: 0.82rem; margin-top: 0.25rem; }
  .score-bar {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-top: 1.5rem;
    padding: 1.25rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
  }
  .score-label { font-size: 0.85rem; font-weight: 600; min-width: 90px; }
  .score-label.m { color: var(--mandarin); }
  .score-label.e { color: var(--english); }
  .score-track {
    flex: 1;
    height: 28px;
    background: rgba(51, 65, 85, 0.5);
    border-radius: 14px;
    overflow: hidden;
    display: flex;
  }
  .score-fill-m {
    background: linear-gradient(90deg, var(--mandarin), #0891b2);
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.8rem;
    font-weight: 700;
    color: #0f172a;
    border-radius: 14px 0 0 14px;
  }
  .score-fill-t {
    background: linear-gradient(90deg, #7c3aed, #a78bfa);
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.75rem;
    font-weight: 600;
    color: #fff;
  }
  .score-fill-e {
    background: linear-gradient(90deg, #d97706, var(--english));
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.8rem;
    font-weight: 700;
    color: #0f172a;
    border-radius: 0 14px 14px 0;
  }
  .score-legend {
    display: flex;
    justify-content: center;
    gap: 2rem;
    margin-top: 0.75rem;
    font-size: 0.8rem;
    color: var(--muted);
  }
  .legend-dot {
    display: inline-block;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    margin-right: 0.35rem;
    vertical-align: middle;
  }
  .legend-dot.m { background: var(--mandarin); }
  .legend-dot.e { background: var(--english); }
  .legend-dot.t { background: var(--tie); }
  .footnote {
    text-align: center;
    margin-top: 1rem;
    font-size: 0.78rem;
    color: var(--muted);
    padding: 0.75rem;
    background: var(--surface);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
</style>
</head>
<body>
<figure>
  <figcaption>
    <h2>Regularity Scorecard: Mandarin vs. English</h2>
    <p>Ten dimensions of linguistic regularity compared head-to-head. Mandarin wins 7, English wins 2, 1 mixed.</p>
  </figcaption>

  <div class="chart-wrapper">
    <table>
      <thead>
        <tr>
          <th style="width:18%">Dimension</th>
          <th style="width:33%">Mandarin (Simplified)</th>
          <th style="width:33%">English</th>
          <th style="width:16%">More Regular</th>
        </tr>
      </thead>
      <tbody>
        <tr class="winner-m">
          <td><strong>Verb Forms</strong></td>
          <td>1 form per verb. Zero conjugation. Zero irregular verbs. <div class="detail">去 qu = "go" always</div></td>
          <td>4-5 forms per verb. ~180-370 irregular verbs. <div class="detail">go / goes / went / gone / going</div></td>
          <td><span class="badge badge-m">MANDARIN</span></td>
        </tr>
        <tr class="winner-m">
          <td><strong>Plurals</strong></td>
          <td>No plural marking. Nouns never change form. <div class="detail">一本书 / 三本书 (book unchanged)</div></td>
          <td>Regular -s but 100+ irregular plurals. <div class="detail">mouse/mice, child/children, sheep/sheep</div></td>
          <td><span class="badge badge-m">MANDARIN</span></td>
        </tr>
        <tr class="winner-m">
          <td><strong>Numbers</strong></td>
          <td>Perfectly transparent at all scales. <div class="detail">十一 = ten-one = 11</div></td>
          <td>Irregular teens, inconsistent decades. <div class="detail">eleven, twelve, thirteen, twenty...</div></td>
          <td><span class="badge badge-m">MANDARIN</span></td>
        </tr>
        <tr class="winner-t">
          <td><strong>Tones / Stress</strong></td>
          <td>4 tones + neutral. Simple sandhi rules, virtually no exceptions. <div class="dim">Unfamiliar but regular</div></td>
          <td>Unpredictable lexical stress. Must memorize per word. <div class="dim">Familiar but irregular</div></td>
          <td><span class="badge badge-t">MIXED</span></td>
        </tr>
        <tr class="winner-m">
          <td><strong>Agreement</strong></td>
          <td>Zero agreement of any kind. No gender, case, number, or person marking. <div class="detail">No rules = no exceptions</div></td>
          <td>Subject-verb agreement, pronoun case, article selection. <div class="detail">he walks / they walk / I/me/my</div></td>
          <td><span class="badge badge-m">MANDARIN</span></td>
        </tr>
        <tr class="winner-e">
          <td><strong>Sound-Symbol</strong></td>
          <td>Characters have no direct phonetic access. Must know each character. <div class="dim">~3,000 for literacy</div></td>
          <td>Alphabet provides phonetic access despite irregularity. <div class="dim">26 letters, can sound out</div></td>
          <td><span class="badge badge-e">ENGLISH</span></td>
        </tr>
        <tr class="winner-e">
          <td><strong>Script Entry</strong></td>
          <td>~3,000 characters for newspaper literacy. Front-loaded investment. <div class="dim">But accelerates with radicals</div></td>
          <td>26 letters in weeks. Immediate reading access. <div class="dim">But spelling irregularity persists</div></td>
          <td><span class="badge badge-e">ENGLISH</span></td>
        </tr>
        <tr class="winner-m">
          <td><strong>Vocabulary<br>Transparency</strong></td>
          <td>70-80% transparent compounds. Morpheme logic visible. <div class="detail">电话 electric-speech = phone</div></td>
          <td>Heavy Latin/Greek/French borrowing. Opaque roots. <div class="detail">television = Greek+Latin blend</div></td>
          <td><span class="badge badge-m">MANDARIN</span></td>
        </tr>
        <tr class="winner-m">
          <td><strong>Gender</strong></td>
          <td>No grammatical gender. <div class="detail">他/她/它 same pronunciation (ta)</div></td>
          <td>Remnant pronoun gender. No noun gender. <div class="detail">he/she/it/they</div></td>
          <td><span class="badge badge-m">MANDARIN</span></td>
        </tr>
        <tr class="winner-m">
          <td><strong>Word Order</strong></td>
          <td>SVO base + consistent modifier-before-head rule. Topic flexibility. <div class="dim">Rules are complex but consistent</div></td>
          <td>SVO base + do-support + complex phrasal verb system. <div class="dim">Simpler rules but more exceptions</div></td>
          <td><span class="badge badge-m">MANDARIN</span></td>
        </tr>
      </tbody>
    </table>
  </div>

  <div class="score-bar">
    <div class="score-track">
      <div class="score-fill-m" style="width:70%">Mandarin 7</div>
      <div class="score-fill-t" style="width:10%">1</div>
      <div class="score-fill-e" style="width:20%">English 2</div>
    </div>
  </div>
  <div class="score-legend">
    <span><span class="legend-dot m"></span>Mandarin more regular</span>
    <span><span class="legend-dot t"></span>Mixed / depends</span>
    <span><span class="legend-dot e"></span>English more regular</span>
  </div>

  <div class="footnote">
    Mandarin's difficulty lies in <strong>unfamiliarity</strong> (tones, characters), not <strong>irregularity</strong>. Unfamiliar systems that follow rules are learnable through pattern recognition.
  </div>
</figure>
</body>
</html>
