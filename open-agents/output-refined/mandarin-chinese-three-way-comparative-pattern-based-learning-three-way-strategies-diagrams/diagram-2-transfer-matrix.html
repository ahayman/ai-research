<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Three-Way Transfer Matrix: What Transfers, What Doesn't</title>
<style>
  :root {
    --bg: #0f172a;
    --fg: #e2e8f0;
    --surface: #1e293b;
    --border: #334155;
    --accent: #06b6d4;
    --muted: #94a3b8;
    --green: #10b981;
    --green-bg: rgba(16, 185, 129, 0.1);
    --green-border: rgba(16, 185, 129, 0.3);
    --red: #f43f5e;
    --red-bg: rgba(244, 63, 94, 0.08);
    --red-border: rgba(244, 63, 94, 0.25);
    --amber: #f59e0b;
    --amber-bg: rgba(245, 158, 11, 0.08);
    --amber-border: rgba(245, 158, 11, 0.25);
    --blue: #3b82f6;
    --blue-bg: rgba(59, 130, 246, 0.08);
    --blue-border: rgba(59, 130, 246, 0.25);
    --trad-gold: #eab308;
    --trad-gold-bg: rgba(234, 179, 8, 0.08);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure { max-width: 960px; width: 100%; }
  figcaption { text-align: center; margin-bottom: 1.5rem; }
  figcaption h2 { font-size: 1.3rem; font-weight: 700; color: var(--accent); margin-bottom: 0.3rem; }
  figcaption p { font-size: 0.85rem; color: var(--muted); }

  .columns { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; }
  @media (max-width: 700px) { .columns { grid-template-columns: 1fr; } }

  .transfer-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  .card-header {
    padding: 0.75rem 1rem;
    font-weight: 700;
    font-size: 0.9rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    border-bottom: 1px solid var(--border);
  }
  .card-header .arrow { font-size: 1.1rem; }
  .card-body { padding: 0.75rem 1rem; }
  .item {
    display: flex;
    align-items: flex-start;
    gap: 0.5rem;
    padding: 0.45rem 0;
    border-bottom: 1px solid rgba(51, 65, 85, 0.5);
    font-size: 0.84rem;
  }
  .item:last-child { border-bottom: none; }
  .icon { font-size: 0.9rem; flex-shrink: 0; margin-top: 0.1rem; }
  .item-text strong { font-size: 0.82rem; }
  .item-text .note { color: var(--muted); font-size: 0.78rem; }

  .h-eng .card-header { background: var(--blue-bg); color: var(--blue); border-bottom-color: var(--blue-border); }
  .h-trad .card-header { background: var(--trad-gold-bg); color: var(--trad-gold); border-bottom-color: var(--amber-border); }
  .h-trap .card-header { background: var(--red-bg); color: var(--red); border-bottom-color: var(--red-border); }
  .h-novel .card-header { background: var(--amber-bg); color: var(--amber); border-bottom-color: var(--amber-border); }

  .full-width { grid-column: 1 / -1; }
  .novel-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
  }
  @media (max-width: 700px) { .novel-grid { grid-template-columns: 1fr; } }
  .novel-grid .item { padding: 0.5rem 1rem; border-bottom: 1px solid rgba(51, 65, 85, 0.5); }

  .summary-bar {
    margin-top: 1.25rem;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0.75rem;
  }
  @media (max-width: 600px) { .summary-bar { grid-template-columns: 1fr 1fr; } }
  .summary-stat {
    text-align: center;
    padding: 0.75rem;
    border-radius: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
  }
  .summary-stat .num { font-size: 1.5rem; font-weight: 800; display: block; }
  .summary-stat .label { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
  .num.green { color: var(--green); }
  .num.gold { color: var(--trad-gold); }
  .num.red { color: var(--red); }
  .num.amber { color: var(--amber); }
</style>
</head>
<body>
<figure>
  <figcaption>
    <h2>Three-Way Transfer Matrix</h2>
    <p>What knowledge transfers to Mandarin learning, what creates traps, and what is genuinely novel</p>
  </figcaption>

  <div class="columns">
    <!-- English Positive Transfer -->
    <div class="transfer-card h-eng">
      <div class="card-header"><span class="arrow">EN</span> <span>&#10132;</span> Mandarin: Positive Transfer</div>
      <div class="card-body">
        <div class="item"><span class="icon">&#10003;</span><div class="item-text"><strong>SVO word order</strong><br><span class="note">Basic sentence frame maps directly: I eat rice = &#25105;&#21507;&#39277;</span></div></div>
        <div class="item"><span class="icon">&#10003;</span><div class="item-text"><strong>Question word concepts</strong><br><span class="note">Who/what/where exist; just stay in-situ in Mandarin</span></div></div>
        <div class="item"><span class="icon">&#10003;</span><div class="item-text"><strong>Left-to-right processing</strong><br><span class="note">Head-initial VP structure aligns with English habit</span></div></div>
        <div class="item"><span class="icon">&#10003;</span><div class="item-text"><strong>Vocabulary concepts</strong><br><span class="note">Abstract domains (science, democracy) have parallel calques</span></div></div>
        <div class="item"><span class="icon">&#10003;</span><div class="item-text"><strong>Pinyin (Latin letters)</strong><br><span class="note">Familiar alphabet bootstraps pronunciation learning</span></div></div>
      </div>
    </div>

    <!-- Traditional Chinese Positive Transfer -->
    <div class="transfer-card h-trad">
      <div class="card-header"><span class="arrow">&#32321;&#39636;</span> <span>&#10132;</span> Mandarin: Positive Transfer</div>
      <div class="card-body">
        <div class="item"><span class="icon">&#10003;</span><div class="item-text"><strong>~70% character recognition</strong><br><span class="note">Majority of common characters are identical across systems</span></div></div>
        <div class="item"><span class="icon">&#10003;</span><div class="item-text"><strong>Grammar + syntax (100%)</strong><br><span class="note">Topic-prominence, aspect markers, classifiers all shared</span></div></div>
        <div class="item"><span class="icon">&#10003;</span><div class="item-text"><strong>Compound formation logic</strong><br><span class="note">Same morpheme-combination principles throughout</span></div></div>
        <div class="item"><span class="icon">&#10003;</span><div class="item-text"><strong>Cultural pragmatics</strong><br><span class="note">Face system, relational hierarchy, indirect communication</span></div></div>
        <div class="item"><span class="icon">&#10003;</span><div class="item-text"><strong>Radical system (enhanced)</strong><br><span class="note">Traditional radicals preserve more etymological detail</span></div></div>
      </div>
    </div>

    <!-- English Negative Transfer (Traps) -->
    <div class="transfer-card h-trap">
      <div class="card-header"><span class="arrow">EN</span> <span>&#10132;</span> Mandarin: Traps (Negative Transfer)</div>
      <div class="card-body">
        <div class="item"><span class="icon">&#10007;</span><div class="item-text"><strong>Tense-marking habit</strong><br><span class="note">Wanting to conjugate verbs for past/present/future</span></div></div>
        <div class="item"><span class="icon">&#10007;</span><div class="item-text"><strong>Subject-required habit</strong><br><span class="note">Mandarin drops subjects freely; English demands them</span></div></div>
        <div class="item"><span class="icon">&#10007;</span><div class="item-text"><strong>Article insertion habit</strong><br><span class="note">Reaching for a/an/the that don't exist in Mandarin</span></div></div>
        <div class="item"><span class="icon">&#10007;</span><div class="item-text"><strong>Relative clause position</strong><br><span class="note">English: noun + [clause]; Mandarin: [clause] + noun</span></div></div>
        <div class="item"><span class="icon">&#10007;</span><div class="item-text"><strong>Pluralization reflex</strong><br><span class="note">Adding -s to nouns that never change in Mandarin</span></div></div>
      </div>
    </div>

    <!-- Traditional Chinese Adjustments Needed -->
    <div class="transfer-card h-novel">
      <div class="card-header"><span class="arrow">&#32321;&#39636;</span> <span>&#10132;</span> Mandarin: Adjustments Needed</div>
      <div class="card-body">
        <div class="item"><span class="icon">&#9888;</span><div class="item-text"><strong>~30% character differences</strong><br><span class="note">Simplified forms: some merge multiple traditional chars</span></div></div>
        <div class="item"><span class="icon">&#9888;</span><div class="item-text"><strong>~2,000 vocabulary items</strong><br><span class="note">Different words for same concepts across the strait</span></div></div>
        <div class="item"><span class="icon">&#9888;</span><div class="item-text"><strong>Pronunciation norms</strong><br><span class="note">Erhua, stronger retroflexes, some tonal differences</span></div></div>
        <div class="item"><span class="icon">&#9888;</span><div class="item-text"><strong>Pragmatic shifts</strong><br><span class="note">PRC address terms, formality registers differ from Taiwan</span></div></div>
        <div class="item"><span class="icon">&#9888;</span><div class="item-text"><strong>Pinyin vs. Bopomofo</strong><br><span class="note">Different phonetic systems (Latin letters vs. &#12564;&#12566;&#12583;&#12584;)</span></div></div>
      </div>
    </div>
  </div>

  <div class="summary-bar">
    <div class="summary-stat">
      <span class="num green">5</span>
      <span class="label">English &#10132; Mandarin<br>Transfers</span>
    </div>
    <div class="summary-stat">
      <span class="num gold">5</span>
      <span class="label">Trad. Chinese &#10132; Mandarin<br>Transfers</span>
    </div>
    <div class="summary-stat">
      <span class="num red">5</span>
      <span class="label">English &#10132; Mandarin<br>Traps</span>
    </div>
    <div class="summary-stat">
      <span class="num amber">5</span>
      <span class="label">Trad. Chinese &#10132; Mandarin<br>Adjustments</span>
    </div>
  </div>
</figure>
</body>
</html>
