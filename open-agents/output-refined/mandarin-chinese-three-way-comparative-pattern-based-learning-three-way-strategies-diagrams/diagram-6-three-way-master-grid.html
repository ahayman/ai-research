<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Three-Way Structural Comparison: Master Grid</title>
<style>
  :root {
    --bg: #0f172a;
    --fg: #e2e8f0;
    --surface: #1e293b;
    --border: #334155;
    --accent: #06b6d4;
    --muted: #94a3b8;
    --mandarin: #06b6d4;
    --trad: #eab308;
    --english: #f59e0b;
    --mandarin-bg: rgba(6, 182, 212, 0.06);
    --trad-bg: rgba(234, 179, 8, 0.05);
    --english-bg: rgba(245, 158, 11, 0.05);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.5;
  }
  figure { max-width: 1020px; width: 100%; }
  figcaption { text-align: center; margin-bottom: 1.5rem; }
  figcaption h2 { font-size: 1.3rem; font-weight: 700; color: var(--accent); margin-bottom: 0.3rem; }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  .chart-wrapper {
    overflow-x: auto;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--surface);
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.8rem;
    min-width: 860px;
  }
  th {
    padding: 0.6rem 0.7rem;
    text-align: left;
    font-weight: 700;
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    border-bottom: 2px solid var(--border);
    background: rgba(15, 23, 42, 0.5);
    position: sticky;
    top: 0;
    z-index: 2;
  }
  th:nth-child(1) { color: var(--muted); width: 15%; }
  th:nth-child(2) { color: var(--mandarin); width: 30%; }
  th:nth-child(3) { color: var(--trad); width: 27%; }
  th:nth-child(4) { color: var(--english); width: 28%; }
  td {
    padding: 0.55rem 0.7rem;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
  }
  tr:last-child td { border-bottom: none; }
  td:nth-child(1) {
    font-weight: 600;
    font-size: 0.78rem;
    color: #cbd5e1;
    white-space: nowrap;
  }
  td:nth-child(2) { background: var(--mandarin-bg); }
  td:nth-child(3) { background: var(--trad-bg); }
  td:nth-child(4) { background: var(--english-bg); }
  .same { color: #10b981; font-size: 0.72rem; font-weight: 600; }
  .diff { color: #f43f5e; font-size: 0.72rem; font-weight: 600; }
  .partial { color: #f59e0b; font-size: 0.72rem; font-weight: 600; }
  tr:hover td { background-color: rgba(6, 182, 212, 0.04); }
  .footnote {
    text-align: center;
    margin-top: 1rem;
    padding: 0.75rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 0.8rem;
    color: var(--muted);
  }
</style>
</head>
<body>
<figure>
  <figcaption>
    <h2>Three-Way Structural Comparison: Master Grid</h2>
    <p>All 15 categories summarized as Mandarin (Simplified) / Traditional Chinese / English across major structural dimensions</p>
  </figcaption>

  <div class="chart-wrapper">
    <table>
      <thead>
        <tr>
          <th>Category</th>
          <th>&#26222;&#36890;&#35805; Mandarin (Simplified)</th>
          <th>&#32321;&#39636;&#20013;&#25991; Traditional Chinese</th>
          <th>English</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>Phonology</td>
          <td>4 tones + neutral, erhua, retroflexes, ~400 syllables (no tones) <span class="partial">&#9650; differs</span></td>
          <td>6-9 tones (Cantonese), entering tone preserved, no erhua <span class="diff">&#9650; differs</span></td>
          <td>0 lexical tones, stress-timed, ~15k syllables, complex clusters <span class="diff">&#9650; differs</span></td>
        </tr>
        <tr>
          <td>Writing</td>
          <td>Simplified chars (2,235 changes), Pinyin parallel layer <span class="partial">&#9650; differs</span></td>
          <td>Traditional chars (~4-5K), Bopomofo in Taiwan <span class="partial">&#9650; differs</span></td>
          <td>26-letter alphabet, deep orthography <span class="diff">&#9650; differs</span></td>
        </tr>
        <tr>
          <td>Radicals</td>
          <td>201 PRC standard; some transparency lost to simplification <span class="partial">&#9650; differs</span></td>
          <td>214 Kangxi radicals; better etymological preservation <span class="partial">&#9650; differs</span></td>
          <td>N/A (Latin/Greek roots serve similar function) <span class="diff">&#9650; differs</span></td>
        </tr>
        <tr>
          <td>Grammar</td>
          <td>Extreme isolating. Zero conjugation, agreement, gender. <span class="same">&#9632; same</span></td>
          <td>Same isolating structure <span class="same">&#9632; same</span></td>
          <td>Moderate inflection. Irregular verbs, agreement, articles. <span class="diff">&#9650; differs</span></td>
        </tr>
        <tr>
          <td>Syntax</td>
          <td>Topic-prominent, SVO, zero anaphora, topic chains <span class="same">&#9632; same</span></td>
          <td>Same topic-prominence and discourse structure <span class="same">&#9632; same</span></td>
          <td>Subject-prominent, SVO, explicit subjects required <span class="diff">&#9650; differs</span></td>
        </tr>
        <tr>
          <td>Classifiers</td>
          <td>~50+ common, &#20010; ge expanding in casual speech <span class="same">&#9632; same</span></td>
          <td>Same system with regional classifier variation <span class="same">&#9632; same</span></td>
          <td>No obligatory classifiers (optional measure words) <span class="diff">&#9650; differs</span></td>
        </tr>
        <tr>
          <td>Compounds</td>
          <td>70-80% of words. Five types. Highly productive. <span class="same">&#9632; same</span></td>
          <td>Same compound formation logic and types <span class="same">&#9632; same</span></td>
          <td>Heavy borrowing. Mixed root transparency. <span class="diff">&#9650; differs</span></td>
        </tr>
        <tr>
          <td>Metaphors</td>
          <td>Vertical time (&#19978;/&#19979;), heart-mind unity (&#24515;), body-organ emotions <span class="same">&#9632; same</span></td>
          <td>Same conceptual metaphor system <span class="same">&#9632; same</span></td>
          <td>Horizontal time only, heart/brain split <span class="diff">&#9650; differs</span></td>
        </tr>
        <tr>
          <td>Pragmatics</td>
          <td>PRC face/politeness, &#21516;&#24535; evolved, internet norms <span class="partial">&#9650; differs</span></td>
          <td>More traditional honorifics preserved, Taiwan norms <span class="partial">&#9650; differs</span></td>
          <td>Individualist directness, limited face system <span class="diff">&#9650; differs</span></td>
        </tr>
        <tr>
          <td>History</td>
          <td>Middle Chinese &#8594; Putonghua via PRC standardization <span class="partial">&#9650; differs</span></td>
          <td>Retains more archaic features; Guoyu standard <span class="partial">&#9650; differs</span></td>
          <td>Germanic &#8594; global via Norman conquest + colonization <span class="diff">&#9650; differs</span></td>
        </tr>
        <tr>
          <td>Cross-Strait</td>
          <td>PRC innovations, calque-preferred for loanwords <span class="partial">&#9650; differs</span></td>
          <td>Taiwan Guoyu, more transliterations, Japanese layer <span class="partial">&#9650; differs</span></td>
          <td>N/A (global varieties differ differently) <span class="diff">&#9650; differs</span></td>
        </tr>
        <tr>
          <td>Typology</td>
          <td>Isolating, SVO, mixed head-directionality, tonal <span class="same">&#9632; same</span></td>
          <td>Same typological profile <span class="same">&#9632; same</span></td>
          <td>Moderately analytic, SVO, mostly head-initial, non-tonal <span class="diff">&#9650; differs</span></td>
        </tr>
        <tr>
          <td>Digital</td>
          <td>Pinyin IME dominant, character amnesia, number slang <span class="partial">&#9650; differs</span></td>
          <td>Bopomofo / handwriting input, different digital culture <span class="partial">&#9650; differs</span></td>
          <td>Alphabet-native, emoji/abbreviation culture <span class="diff">&#9650; differs</span></td>
        </tr>
        <tr>
          <td>Diglossia</td>
          <td>Putonghua (H) + regional varieties (L), active policy <span class="partial">&#9650; differs</span></td>
          <td>Mandarin + Hokkien + Hakka trilingual ecology <span class="partial">&#9650; differs</span></td>
          <td>Global varieties, less hierarchical diglossia <span class="diff">&#9650; differs</span></td>
        </tr>
        <tr>
          <td>Speakers</td>
          <td>~920M native, PRC standard <span class="partial">&#9650; differs</span></td>
          <td>~24M (Taiwan standard) <span class="partial">&#9650; differs</span></td>
          <td>~380M native, ~1.5B total <span class="diff">&#9650; differs</span></td>
        </tr>
      </tbody>
    </table>
  </div>

  <div class="footnote">
    <span style="color:#10b981">&#9632; same</span> = Mandarin and Traditional Chinese share this feature &nbsp;|&nbsp;
    <span style="color:#f59e0b">&#9650; differs</span> = variation between Mandarin and Traditional &nbsp;|&nbsp;
    <span style="color:#f43f5e">&#9650; differs</span> = English diverges from both Chinese systems<br>
    <strong>Core finding:</strong> Grammar, syntax, typology, compounds, classifiers, and metaphors are nearly identical across both Chinese systems &mdash; the divergence is in writing, phonology, vocabulary, and pragmatic norms.
  </div>
</figure>
</body>
</html>
