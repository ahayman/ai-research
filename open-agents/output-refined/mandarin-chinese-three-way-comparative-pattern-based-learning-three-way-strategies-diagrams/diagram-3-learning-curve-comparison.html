<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Learning Curve Comparison: Mandarin vs. English</title>
<style>
  :root {
    --bg: #0f172a;
    --fg: #e2e8f0;
    --surface: #1e293b;
    --border: #334155;
    --accent: #06b6d4;
    --muted: #94a3b8;
    --mandarin: #06b6d4;
    --english: #f59e0b;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure { max-width: 900px; width: 100%; }
  figcaption { text-align: center; margin-bottom: 1.5rem; }
  figcaption h2 { font-size: 1.3rem; font-weight: 700; color: var(--accent); margin-bottom: 0.3rem; }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  .svg-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.5rem 1rem;
    overflow-x: auto;
  }
  svg { display: block; margin: 0 auto; }
  .phases {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0.75rem;
    margin-top: 1.25rem;
  }
  @media (max-width: 600px) { .phases { grid-template-columns: 1fr; } }
  .phase-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.85rem;
    border-top: 3px solid;
  }
  .phase-box.p1 { border-top-color: #ef4444; }
  .phase-box.p2 { border-top-color: #eab308; }
  .phase-box.p3 { border-top-color: #10b981; }
  .phase-title { font-weight: 700; font-size: 0.85rem; margin-bottom: 0.3rem; }
  .phase-title.p1 { color: #ef4444; }
  .phase-title.p2 { color: #eab308; }
  .phase-title.p3 { color: #10b981; }
  .phase-desc { font-size: 0.8rem; color: var(--muted); }
  .phase-langs { font-size: 0.78rem; margin-top: 0.35rem; }
  .lang-m { color: var(--mandarin); }
  .lang-e { color: var(--english); }
  .insight {
    margin-top: 1rem;
    padding: 0.85rem 1rem;
    background: rgba(6, 182, 212, 0.08);
    border: 1px solid rgba(6, 182, 212, 0.2);
    border-radius: 8px;
    font-size: 0.85rem;
    text-align: center;
    color: var(--accent);
  }
</style>
</head>
<body>
<figure>
  <figcaption>
    <h2>Learning Curve Comparison: Mandarin vs. English</h2>
    <p>English starts fast but plateaus; Mandarin starts slow but accelerates through pattern recognition</p>
  </figcaption>

  <div class="svg-wrap">
    <svg viewBox="0 0 800 380" xmlns="http://www.w3.org/2000/svg" style="max-width:800px;width:100%">
      <!-- Grid -->
      <defs>
        <linearGradient id="mGrad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.15"/>
          <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.02"/>
        </linearGradient>
        <linearGradient id="eGrad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.15"/>
          <stop offset="100%" stop-color="#f59e0b" stop-opacity="0.02"/>
        </linearGradient>
      </defs>

      <!-- Axes -->
      <line x1="80" y1="30" x2="80" y2="320" stroke="#334155" stroke-width="1.5"/>
      <line x1="80" y1="320" x2="760" y2="320" stroke="#334155" stroke-width="1.5"/>

      <!-- Y-axis labels -->
      <text x="72" y="320" text-anchor="end" fill="#64748b" font-size="11">0%</text>
      <text x="72" y="248" text-anchor="end" fill="#64748b" font-size="11">25%</text>
      <text x="72" y="176" text-anchor="end" fill="#64748b" font-size="11">50%</text>
      <text x="72" y="104" text-anchor="end" fill="#64748b" font-size="11">75%</text>
      <text x="72" y="42" text-anchor="end" fill="#64748b" font-size="11">100%</text>
      <text x="20" y="180" text-anchor="middle" fill="#94a3b8" font-size="11" transform="rotate(-90 20 180)">Usable Proficiency</text>

      <!-- Grid lines -->
      <line x1="80" y1="248" x2="760" y2="248" stroke="#1e293b" stroke-width="1" stroke-dasharray="4,4"/>
      <line x1="80" y1="176" x2="760" y2="176" stroke="#1e293b" stroke-width="1" stroke-dasharray="4,4"/>
      <line x1="80" y1="104" x2="760" y2="104" stroke="#1e293b" stroke-width="1" stroke-dasharray="4,4"/>

      <!-- X-axis labels -->
      <text x="80" y="345" fill="#64748b" font-size="11" text-anchor="middle">0</text>
      <text x="193" y="345" fill="#64748b" font-size="11" text-anchor="middle">3mo</text>
      <text x="306" y="345" fill="#64748b" font-size="11" text-anchor="middle">6mo</text>
      <text x="420" y="345" fill="#64748b" font-size="11" text-anchor="middle">1yr</text>
      <text x="533" y="345" fill="#64748b" font-size="11" text-anchor="middle">2yr</text>
      <text x="646" y="345" fill="#64748b" font-size="11" text-anchor="middle">3yr</text>
      <text x="760" y="345" fill="#64748b" font-size="11" text-anchor="middle">4yr+</text>
      <text x="420" y="370" fill="#94a3b8" font-size="11" text-anchor="middle">Study Time</text>

      <!-- Phase separators -->
      <line x1="193" y1="30" x2="193" y2="320" stroke="#334155" stroke-width="1" stroke-dasharray="3,5" opacity="0.5"/>
      <line x1="420" y1="30" x2="420" y2="320" stroke="#334155" stroke-width="1" stroke-dasharray="3,5" opacity="0.5"/>

      <!-- Phase labels -->
      <text x="136" y="22" fill="#ef4444" font-size="10" text-anchor="middle" font-weight="600">PHASE 1</text>
      <text x="306" y="22" fill="#eab308" font-size="10" text-anchor="middle" font-weight="600">PHASE 2</text>
      <text x="590" y="22" fill="#10b981" font-size="10" text-anchor="middle" font-weight="600">PHASE 3</text>

      <!-- English curve: fast start, then plateau with slow grind -->
      <path d="M80,320 C120,280 150,210 193,180 C230,155 280,130 306,115 C380,88 450,72 533,60 C600,52 680,46 760,42"
            fill="none" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round"/>
      <!-- English area fill -->
      <path d="M80,320 C120,280 150,210 193,180 C230,155 280,130 306,115 C380,88 450,72 533,60 C600,52 680,46 760,42 L760,320 Z"
            fill="url(#eGrad)" opacity="0.4"/>

      <!-- Mandarin curve: slow start, then accelerates -->
      <path d="M80,320 C120,310 150,298 193,278 C230,260 270,235 306,205 C360,165 420,120 490,85 C550,62 650,45 760,38"
            fill="none" stroke="#06b6d4" stroke-width="2.5" stroke-linecap="round"/>
      <!-- Mandarin area fill -->
      <path d="M80,320 C120,310 150,298 193,278 C230,260 270,235 306,205 C360,165 420,120 490,85 C550,62 650,45 760,38 L760,320 Z"
            fill="url(#mGrad)" opacity="0.4"/>

      <!-- Crossover point -->
      <circle cx="395" cy="128" r="6" fill="#a78bfa" stroke="#0f172a" stroke-width="2"/>
      <text x="395" y="118" fill="#a78bfa" font-size="10" text-anchor="middle" font-weight="600">Crossover</text>
      <text x="395" y="155" fill="#64748b" font-size="9" text-anchor="middle">~9-12 months</text>

      <!-- Legend -->
      <rect x="560" y="280" width="180" height="32" rx="6" fill="#1e293b" stroke="#334155"/>
      <line x1="572" y1="292" x2="595" y2="292" stroke="#06b6d4" stroke-width="2.5"/>
      <text x="600" y="296" fill="#06b6d4" font-size="10">Mandarin</text>
      <line x1="655" y1="292" x2="678" y2="292" stroke="#f59e0b" stroke-width="2.5"/>
      <text x="683" y="296" fill="#f59e0b" font-size="10">English</text>

      <!-- Annotations -->
      <text x="140" y="195" fill="#f59e0b" font-size="9" font-style="italic" text-anchor="middle" opacity="0.7">26 letters!</text>
      <text x="140" y="290" fill="#06b6d4" font-size="9" font-style="italic" text-anchor="middle" opacity="0.7">Tones + radicals</text>

      <text x="660" y="58" fill="#f59e0b" font-size="9" font-style="italic" text-anchor="middle" opacity="0.7">Irregularity drag</text>
      <text x="660" y="30" fill="#06b6d4" font-size="9" font-style="italic" text-anchor="middle" opacity="0.7">Pattern payoff</text>
    </svg>
  </div>

  <div class="phases">
    <div class="phase-box p1">
      <div class="phase-title p1">Phase 1: Foundation (0-3 months)</div>
      <div class="phase-desc">Building the unfamiliar scaffolding</div>
      <div class="phase-langs">
        <div class="lang-e">English: Fast entry (alphabet in weeks)</div>
        <div class="lang-m">Mandarin: Slow start (tones, radicals, first characters)</div>
      </div>
    </div>
    <div class="phase-box p2">
      <div class="phase-title p2">Phase 2: Acceleration (3-12 months)</div>
      <div class="phase-desc">Pattern recognition kicks in</div>
      <div class="phase-langs">
        <div class="lang-e">English: Irregularity drag begins (exceptions pile up)</div>
        <div class="lang-m">Mandarin: Components unlock compound vocabulary</div>
      </div>
    </div>
    <div class="phase-box p3">
      <div class="phase-title p3">Phase 3: Mastery (1-4+ years)</div>
      <div class="phase-desc">Returns on investment diverge</div>
      <div class="phase-langs">
        <div class="lang-e">English: Still fighting spelling, irregular forms</div>
        <div class="lang-m">Mandarin: Radical network = near-automatic character parsing</div>
      </div>
    </div>
  </div>

  <div class="insight">
    Mandarin rewards front-loaded investment in pattern frameworks (radicals, tones, compound logic).<br>
    English rewards rote memorization of individual exceptions.
  </div>
</figure>
</body>
</html>
