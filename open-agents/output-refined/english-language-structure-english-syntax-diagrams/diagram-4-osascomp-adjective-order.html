<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OSASCOMP Adjective Order</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --accent: #4361ee;
    --accent-light: #e8edff;
    --o1: #e63946;
    --s1: #d946a8;
    --a1: #7c3aed;
    --s2: #4361ee;
    --c1: #0d9488;
    --o2: #2d8a4e;
    --m1: #e9a820;
    --p1: #dc6d28;
    --muted: #6c757d;
    --caption-bg: #f8f9fa;
    --subjective: #e63946;
    --objective: #2d8a4e;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --accent: #6b8aff;
      --accent-light: #1e2a4a;
      --o1: #ff6b6b;
      --s1: #f0abdb;
      --a1: #a78bfa;
      --s2: #6b8aff;
      --c1: #2dd4bf;
      --o2: #5cb87a;
      --m1: #f0c050;
      --p1: #f09050;
      --muted: #9a9ab0;
      --caption-bg: #1a1a2e;
      --subjective: #ff6b6b;
      --objective: #5cb87a;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure { max-width: 1050px; width: 100%; }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding: 1rem 1.5rem;
    background: var(--caption-bg);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  .chart-wrapper {
    overflow-x: auto;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--surface);
    padding: 1.5rem;
    min-width: 800px;
  }
  /* OSASCOMP slots */
  .slots-container {
    display: flex;
    gap: 0;
    margin: 1rem 0;
    position: relative;
  }
  .slot {
    flex: 1;
    text-align: center;
    padding: 0.5rem 0.3rem;
    border: 2px solid;
    min-width: 95px;
    position: relative;
  }
  .slot:first-child { border-radius: 8px 0 0 8px; }
  .slot:last-child { border-radius: 0 8px 8px 0; }
  .slot:not(:first-child) { border-left: none; }
  .slot-letter {
    font-size: 1.8rem;
    font-weight: 900;
    line-height: 1;
  }
  .slot-name {
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin: 0.2rem 0;
  }
  .slot-examples {
    font-size: 0.68rem;
    color: var(--muted);
    line-height: 1.3;
  }
  .slot-o1 { border-color: var(--o1); background: rgba(230,57,70,0.05); }
  .slot-o1 .slot-letter, .slot-o1 .slot-name { color: var(--o1); }
  .slot-s1 { border-color: var(--s1); background: rgba(217,70,168,0.05); }
  .slot-s1 .slot-letter, .slot-s1 .slot-name { color: var(--s1); }
  .slot-a1 { border-color: var(--a1); background: rgba(124,58,237,0.05); }
  .slot-a1 .slot-letter, .slot-a1 .slot-name { color: var(--a1); }
  .slot-s2 { border-color: var(--s2); background: rgba(67,97,238,0.05); }
  .slot-s2 .slot-letter, .slot-s2 .slot-name { color: var(--s2); }
  .slot-c1 { border-color: var(--c1); background: rgba(13,148,136,0.05); }
  .slot-c1 .slot-letter, .slot-c1 .slot-name { color: var(--c1); }
  .slot-o2 { border-color: var(--o2); background: rgba(45,138,78,0.05); }
  .slot-o2 .slot-letter, .slot-o2 .slot-name { color: var(--o2); }
  .slot-m1 { border-color: var(--m1); background: rgba(233,168,32,0.05); }
  .slot-m1 .slot-letter, .slot-m1 .slot-name { color: var(--m1); }
  .slot-p1 { border-color: var(--p1); background: rgba(220,109,40,0.05); }
  .slot-p1 .slot-letter, .slot-p1 .slot-name { color: var(--p1); }

  /* Gradient arrow */
  .gradient-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin: 0.3rem 0 1.5rem;
    padding: 0.4rem 0.8rem;
    background: linear-gradient(to right, rgba(230,57,70,0.1), rgba(45,138,78,0.1));
    border-radius: 6px;
    font-size: 0.82rem;
    font-weight: 700;
  }
  .gradient-bar .left { color: var(--subjective); }
  .gradient-bar .center { color: var(--muted); font-weight: 400; font-size: 0.78rem; }
  .gradient-bar .right { color: var(--objective); }

  /* Full example */
  .full-example {
    padding: 1rem 1.2rem;
    background: var(--accent-light);
    border: 2px solid var(--accent);
    border-radius: 10px;
    margin: 1rem 0;
    text-align: center;
  }
  .full-example .label {
    font-size: 0.82rem;
    color: var(--accent);
    font-weight: 600;
    margin-bottom: 0.5rem;
  }
  .example-sentence {
    font-size: 1.1rem;
    line-height: 1.8;
  }
  .example-sentence .w-o1 { color: var(--o1); font-weight: 700; border-bottom: 2px solid var(--o1); }
  .example-sentence .w-s1 { color: var(--s1); font-weight: 700; border-bottom: 2px solid var(--s1); }
  .example-sentence .w-a1 { color: var(--a1); font-weight: 700; border-bottom: 2px solid var(--a1); }
  .example-sentence .w-s2 { color: var(--s2); font-weight: 700; border-bottom: 2px solid var(--s2); }
  .example-sentence .w-c1 { color: var(--c1); font-weight: 700; border-bottom: 2px solid var(--c1); }
  .example-sentence .w-o2 { color: var(--o2); font-weight: 700; border-bottom: 2px solid var(--o2); }
  .example-sentence .w-m1 { color: var(--m1); font-weight: 700; border-bottom: 2px solid var(--m1); }
  .example-sentence .w-p1 { color: var(--p1); font-weight: 700; border-bottom: 2px solid var(--p1); }
  .example-sentence .noun { font-weight: 800; }

  /* Violation example */
  .violation-box {
    margin: 1rem 0;
    padding: 0.8rem 1rem;
    background: rgba(230,57,70,0.05);
    border: 1px solid var(--o1);
    border-radius: 8px;
  }
  .violation-box .bad { color: var(--o1); text-decoration: line-through; }
  .violation-box .good { color: var(--o2); }
  .section-title {
    font-size: 0.9rem;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 0.5rem;
  }
  .pattern-note {
    margin-top: 1rem;
    padding: 0.8rem 1rem;
    background: var(--accent-light);
    border-radius: 8px;
    border-left: 4px solid var(--accent);
    font-size: 0.85rem;
  }
  .pattern-note strong { color: var(--accent); }
</style>
</head>
<body>
<figure>
  <div class="chart-wrapper">
    <!-- OSASCOMP Slots -->
    <div class="slots-container">
      <div class="slot slot-o1">
        <div class="slot-letter">O</div>
        <div class="slot-name">Opinion</div>
        <div class="slot-examples">lovely, ugly,<br>terrible, nice</div>
      </div>
      <div class="slot slot-s1">
        <div class="slot-letter">S</div>
        <div class="slot-name">Size</div>
        <div class="slot-examples">big, small,<br>tiny, enormous</div>
      </div>
      <div class="slot slot-a1">
        <div class="slot-letter">A</div>
        <div class="slot-name">Age</div>
        <div class="slot-examples">old, young,<br>new, ancient</div>
      </div>
      <div class="slot slot-s2">
        <div class="slot-letter">S</div>
        <div class="slot-name">Shape</div>
        <div class="slot-examples">round, square,<br>flat, long</div>
      </div>
      <div class="slot slot-c1">
        <div class="slot-letter">C</div>
        <div class="slot-name">Color</div>
        <div class="slot-examples">red, blue,<br>green, dark</div>
      </div>
      <div class="slot slot-o2">
        <div class="slot-letter">O</div>
        <div class="slot-name">Origin</div>
        <div class="slot-examples">French, Chinese,<br>American, local</div>
      </div>
      <div class="slot slot-m1">
        <div class="slot-letter">M</div>
        <div class="slot-name">Material</div>
        <div class="slot-examples">wooden, metal,<br>cotton, silk</div>
      </div>
      <div class="slot slot-p1">
        <div class="slot-letter">P</div>
        <div class="slot-name">Purpose</div>
        <div class="slot-examples">sleeping (bag),<br>running (shoes)</div>
      </div>
    </div>

    <!-- Gradient bar -->
    <div class="gradient-bar">
      <span class="left">&larr; Most Subjective</span>
      <span class="center">The ordering principle: evaluation &rarr; description &rarr; classification</span>
      <span class="right">Most Objective &rarr;</span>
    </div>

    <!-- Full example -->
    <div class="full-example">
      <div class="label">Complete OSASCOMP Example</div>
      <div class="example-sentence">
        a <span class="w-o1">lovely</span>
        <span class="w-s1">little</span>
        <span class="w-a1">old</span>
        <span class="w-s2">rectangular</span>
        <span class="w-c1">green</span>
        <span class="w-o2">French</span>
        <span class="w-m1">silver</span>
        <span class="w-p1">whittling</span>
        <span class="noun">knife</span>
      </div>
    </div>

    <!-- Violation -->
    <div class="violation-box">
      <div class="section-title" style="color:var(--o1);">Violating the Order Sounds Wrong</div>
      <div style="font-size:0.9rem; margin-bottom:0.4rem;">
        <span class="bad">*"a French rectangular lovely old whittling green little silver knife"</span>
      </div>
      <div style="font-size:0.9rem;">
        <span class="good">&check; "a lovely little old rectangular green French silver whittling knife"</span>
      </div>
      <div style="font-size:0.78rem; color:var(--muted); margin-top:0.4rem;">
        Native speakers follow this order automatically without being taught it. It is one of the best examples of implicit grammatical knowledge -- a pattern that operates below conscious awareness but is nearly exceptionless.
      </div>
    </div>
  </div>

  <div class="pattern-note">
    <strong>Pattern:</strong> OSASCOMP is organized by a single underlying principle: adjectives move from <em>most subjective</em> (speaker's evaluation) to <em>most objective</em> (inherent physical property) as they approach the noun. Opinion is the speaker's judgment and therefore least inherent to the object; purpose is most inherent (a "sleeping bag" is defined by its purpose). This gradient from evaluation through description to classification predicts the order of any combination of adjectives.
  </div>

  <figcaption>
    <h2>Figure 4 &mdash; OSASCOMP: The Fixed Adjective Order</h2>
    <p>When multiple adjectives precede a noun in English, they follow the OSASCOMP hierarchy: Opinion-Size-Age-Shape-Color-Origin-Material-Purpose. The order is nearly exceptionless and follows a gradient from most subjective (opinion) to most objective (purpose/classification). Native speakers follow this order unconsciously -- it is implicit grammatical knowledge that is never explicitly taught.</p>
  </figcaption>
</figure>
</body>
</html>
