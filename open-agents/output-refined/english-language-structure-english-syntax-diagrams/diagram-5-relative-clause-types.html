<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Relative Clause Types</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --accent: #4361ee;
    --accent-light: #e8edff;
    --restr: #2d8a4e;
    --restr-bg: #f0faf0;
    --nonrestr: #7c3aed;
    --nonrestr-bg: #f5f0ff;
    --rel-color: #e63946;
    --comma-color: #e9a820;
    --muted: #6c757d;
    --caption-bg: #f8f9fa;
    --error: #dc3545;
    --error-bg: #fff0f0;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --accent: #6b8aff;
      --accent-light: #1e2a4a;
      --restr: #5cb87a;
      --restr-bg: #102a18;
      --nonrestr: #a78bfa;
      --nonrestr-bg: #1a1030;
      --rel-color: #ff6b6b;
      --comma-color: #f0c050;
      --muted: #9a9ab0;
      --caption-bg: #1a1a2e;
      --error: #ff5555;
      --error-bg: #2a1515;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure { max-width: 1000px; width: 100%; }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding: 1rem 1.5rem;
    background: var(--caption-bg);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  .chart-wrapper {
    overflow-x: auto;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--surface);
    padding: 1.5rem;
    min-width: 700px;
  }
  .section-title {
    font-size: 1rem;
    font-weight: 700;
    color: var(--accent);
    margin: 1.2rem 0 0.8rem;
    padding-bottom: 0.3rem;
    border-bottom: 2px solid var(--accent);
  }
  .section-title:first-child { margin-top: 0; }
  .comparison-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.2rem;
    margin-bottom: 1rem;
  }
  .type-card {
    border-radius: 10px;
    border: 2px solid;
    overflow: hidden;
  }
  .type-header {
    padding: 0.6rem 1rem;
    font-weight: 700;
    font-size: 0.95rem;
  }
  .restr-card { border-color: var(--restr); }
  .restr-card .type-header { background: var(--restr-bg); color: var(--restr); }
  .nonrestr-card { border-color: var(--nonrestr); }
  .nonrestr-card .type-header { background: var(--nonrestr-bg); color: var(--nonrestr); }
  .type-body { padding: 0.8rem 1rem; }
  .type-desc { font-size: 0.82rem; color: var(--muted); margin-bottom: 0.6rem; }
  .sentence-example {
    padding: 0.5rem 0.7rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 0.9rem;
    margin-bottom: 0.4rem;
  }
  .sentence-example .rel { color: var(--rel-color); font-weight: 700; }
  .sentence-example .comma { color: var(--comma-color); font-weight: 800; font-size: 1.1em; }
  .sentence-example .clause { background: rgba(67,97,238,0.06); padding: 0.1rem 0.3rem; border-radius: 3px; }
  .sentence-example .note {
    font-size: 0.72rem;
    color: var(--muted);
    display: block;
    margin-top: 0.2rem;
  }
  .rule-list {
    font-size: 0.82rem;
    padding-left: 1rem;
    margin-top: 0.5rem;
  }
  .rule-list li { margin-bottom: 0.3rem; }
  .rule-list .allowed { color: var(--restr); font-weight: 600; }
  .rule-list .blocked { color: var(--error); font-weight: 600; }

  /* Relativizer table */
  .rel-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.82rem;
    margin: 1rem 0;
  }
  .rel-table th, .rel-table td {
    padding: 0.4rem 0.6rem;
    border: 1px solid var(--border);
    text-align: center;
  }
  .rel-table th {
    background: var(--accent-light);
    color: var(--accent);
    font-weight: 600;
  }
  .yes { color: var(--restr); font-weight: 700; }
  .no { color: var(--error); font-weight: 700; }
  .pref { color: var(--comma-color); }

  .pattern-note {
    margin-top: 1rem;
    padding: 0.8rem 1rem;
    background: var(--accent-light);
    border-radius: 8px;
    border-left: 4px solid var(--accent);
    font-size: 0.85rem;
  }
  .pattern-note strong { color: var(--accent); }
</style>
</head>
<body>
<figure>
  <div class="chart-wrapper">
    <div class="section-title">Two Types of Relative Clause</div>
    <div class="comparison-grid">
      <!-- Restrictive -->
      <div class="type-card restr-card">
        <div class="type-header">Restrictive (Defining)</div>
        <div class="type-body">
          <div class="type-desc"><strong>Narrows the reference</strong>: tells you WHICH one. Removing it changes the meaning. No commas.</div>
          <div class="sentence-example">
            The man <span class="clause"><span class="rel">who</span> lives next door</span> is a doctor.
            <span class="note">Which man? The one who lives next door. (Essential information.)</span>
          </div>
          <div class="sentence-example">
            The book <span class="clause"><span class="rel">that</span> I read</span> was excellent.
            <span class="note">"that" is the standard relativizer for restrictive clauses.</span>
          </div>
          <div class="sentence-example">
            The book <span class="clause">I read</span> was excellent.
            <span class="note">Zero relative (no relativizer) -- very common when it's the object.</span>
          </div>
          <ul class="rule-list">
            <li><span class="allowed">who, whom, which, that, zero/&#x2205;</span></li>
            <li>No commas</li>
            <li>Zero relative allowed (object only)</li>
          </ul>
        </div>
      </div>

      <!-- Non-restrictive -->
      <div class="type-card nonrestr-card">
        <div class="type-header">Non-Restrictive (Non-Defining)</div>
        <div class="type-body">
          <div class="type-desc"><strong>Adds extra info</strong>: we already know which one. Removing it doesn't change the core meaning. Commas required.</div>
          <div class="sentence-example">
            John<span class="comma">,</span> <span class="clause"><span class="rel">who</span> lives next door</span><span class="comma">,</span> is a doctor.
            <span class="note">We already know which John. The clause adds supplementary info.</span>
          </div>
          <div class="sentence-example">
            The book<span class="comma">,</span> <span class="clause"><span class="rel">which</span> I found fascinating</span><span class="comma">,</span> was published in 1985.
            <span class="note">"which" (not "that") for non-restrictive clauses.</span>
          </div>
          <div class="sentence-example">
            She passed the exam<span class="comma">,</span> <span class="clause"><span class="rel">which</span> surprised everyone</span>.
            <span class="note">Can modify an entire clause (not just a noun).</span>
          </div>
          <ul class="rule-list">
            <li><span class="allowed">who, which</span></li>
            <li><span class="blocked">NOT "that"</span>, <span class="blocked">NOT zero/&#x2205;</span></li>
            <li>Commas always required</li>
          </ul>
        </div>
      </div>
    </div>

    <!-- Relativizer Comparison Table -->
    <div class="section-title">Relativizer Selection Guide</div>
    <table class="rel-table">
      <thead>
        <tr>
          <th>Relativizer</th>
          <th>Animate?</th>
          <th>Function</th>
          <th>Restrictive</th>
          <th>Non-Restrictive</th>
          <th>Notes</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td><strong>who</strong></td>
          <td>animate</td>
          <td>subject</td>
          <td class="yes">&check;</td>
          <td class="yes">&check;</td>
          <td>Most common for people</td>
        </tr>
        <tr>
          <td><strong>whom</strong></td>
          <td>animate</td>
          <td>object</td>
          <td class="yes">&check;</td>
          <td class="yes">&check;</td>
          <td>Formal; often replaced by "who"</td>
        </tr>
        <tr>
          <td><strong>which</strong></td>
          <td>inanimate</td>
          <td>subj/obj</td>
          <td class="pref">&check; (informal)</td>
          <td class="yes">&check;</td>
          <td>Standard for non-restrictive</td>
        </tr>
        <tr>
          <td><strong>that</strong></td>
          <td>any</td>
          <td>subj/obj</td>
          <td class="yes">&check;</td>
          <td class="no">&times;</td>
          <td>Restrictive only</td>
        </tr>
        <tr>
          <td><strong>&#x2205; (zero)</strong></td>
          <td>any</td>
          <td>object only</td>
          <td class="yes">&check;</td>
          <td class="no">&times;</td>
          <td>"The book I read" -- very common</td>
        </tr>
        <tr>
          <td><strong>whose</strong></td>
          <td>any</td>
          <td>possessive</td>
          <td class="yes">&check;</td>
          <td class="yes">&check;</td>
          <td>"The man whose car..."</td>
        </tr>
        <tr>
          <td><strong>where/when</strong></td>
          <td>n/a</td>
          <td>place/time</td>
          <td class="yes">&check;</td>
          <td class="yes">&check;</td>
          <td>"The place where..."</td>
        </tr>
      </tbody>
    </table>

    <!-- The that/which rule -->
    <div style="padding:0.7rem 1rem; background:var(--accent-light); border-radius:8px; margin-top:0.5rem; font-size:0.85rem;">
      <strong style="color:var(--accent);">The that/which rule (formal writing):</strong> Use <strong>"that"</strong> for restrictive clauses (no commas); use <strong>"which"</strong> for non-restrictive clauses (with commas). In spoken English and informal writing, this distinction is often blurred -- "which" frequently appears in restrictive clauses.
    </div>
  </div>

  <div class="pattern-note">
    <strong>Pattern:</strong> The restrictive/non-restrictive distinction is marked by three converging signals: (1) <em>punctuation</em> -- commas present or absent; (2) <em>relativizer choice</em> -- "that" and zero are restricted to defining clauses; (3) <em>semantic function</em> -- restrictive narrows reference, non-restrictive adds supplementary information. These three signals always align, creating a robust pattern that identifies clause type. The zero relative ("The book I read") is one of English's most distinctive features -- it occurs only in restrictive clauses where the relativizer is the object.
  </div>

  <figcaption>
    <h2>Figure 5 &mdash; English Relative Clause Types</h2>
    <p>English has two types of relative clause distinguished by punctuation, relativizer choice, and semantic function. Restrictive clauses narrow reference (no commas, "that" allowed, zero relative possible). Non-restrictive clauses add supplementary information (commas required, "which"/"who" only, no "that" or zero). The that/which distinction is enforced in formal writing but relaxed in speech.</p>
  </figcaption>
</figure>
</body>
</html>
