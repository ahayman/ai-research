<!-- Description: English vs. other Germanic languages showing where English diverged; incorporates Afrikaans correction -->

<figure class="concept-diagram" id="diagram-germanic-comparison">
  <div class="diagram-container">
    <div class="comp-title">ENGLISH vs. ITS GERMANIC SIBLINGS</div>
    <div class="comp-subtitle">English is the most divergent Germanic language</div>

    <table class="comp-table">
      <thead>
        <tr>
          <th>Feature</th>
          <th class="eng-col">English</th>
          <th>German</th>
          <th>Dutch</th>
          <th>Swedish</th>
          <th>Icelandic</th>
          <th>Afrikaans</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>Grammatical gender</td>
          <td class="eng-col diverge"><b>None</b></td>
          <td>3 (M/F/N)</td>
          <td>2 (C/N)</td>
          <td>2 (C/N)</td>
          <td>3 (M/F/N)</td>
          <td class="diverge">None</td>
        </tr>
        <tr>
          <td>Case system</td>
          <td class="eng-col diverge"><b>Pronouns only</b></td>
          <td>4 cases</td>
          <td>Vestigial</td>
          <td>None</td>
          <td>4 cases</td>
          <td class="diverge">None</td>
        </tr>
        <tr>
          <td>V2 in main clauses</td>
          <td class="eng-col diverge"><b>No</b> (questions only)</td>
          <td>Yes</td>
          <td>Yes</td>
          <td>Yes</td>
          <td>Yes</td>
          <td>Yes</td>
        </tr>
        <tr>
          <td>Verb-final in subordinate</td>
          <td class="eng-col diverge"><b>No</b></td>
          <td>Yes</td>
          <td>Yes</td>
          <td>No</td>
          <td>No</td>
          <td>Yes</td>
        </tr>
        <tr>
          <td>Adjective agreement</td>
          <td class="eng-col diverge"><b>None</b></td>
          <td>Full (case/gender/number)</td>
          <td>Limited</td>
          <td>Limited</td>
          <td>Full</td>
          <td class="diverge">None</td>
        </tr>
        <tr>
          <td>Definite article</td>
          <td class="eng-col diverge"><b>"the" (invariable)</b></td>
          <td>der/die/das (inflected)</td>
          <td>de/het</td>
          <td>-en/-et (suffix)</td>
          <td>-inn/-in/-id (suffix)</td>
          <td>die (invariable)</td>
        </tr>
        <tr>
          <td>Progressive aspect</td>
          <td class="eng-col unique"><b>Yes (am going)</b></td>
          <td>No</td>
          <td>No (emerging)</td>
          <td>No</td>
          <td>No</td>
          <td>No</td>
        </tr>
        <tr>
          <td>Do-support</td>
          <td class="eng-col unique"><b>Yes</b></td>
          <td>No</td>
          <td>No</td>
          <td>No</td>
          <td>No</td>
          <td>No</td>
        </tr>
        <tr>
          <td>Morphological complexity</td>
          <td class="eng-col diverge"><b>Low</b></td>
          <td>High</td>
          <td>Moderate</td>
          <td>Low-Moderate</td>
          <td>High</td>
          <td class="diverge">Low</td>
        </tr>
      </tbody>
    </table>

    <div class="legend">
      <div class="legend-item"><span class="legend-swatch diverge"></span> Lost what siblings kept</div>
      <div class="legend-item"><span class="legend-swatch unique"></span> Developed what no sibling has</div>
    </div>

    <div class="divergence-box">
      <div class="div-title">WHY ENGLISH DIVERGED</div>
      <div class="div-content">
        The unique combination of <b>Old Norse contact</b> (9th-11th c.) + <b>Norman French overlay</b> (1066+) drove English further from the Proto-Germanic profile than any sibling. Norse contact eroded inflections; French provided thousands of Latinate borrowings. No other Germanic language experienced both pressures simultaneously.
      </div>
    </div>
  </div>
  <figcaption>
    <strong>Figure 5:</strong> English compared to its Germanic relatives. English is the most divergent member of the family, having lost grammatical gender, V2 word order, adjective agreement, and case marking on nouns -- features that every other Germanic language retains (except Afrikaans, which also lost gender and adjective agreement). English uniquely developed do-support and a grammaticalized progressive aspect, features found in no other Germanic language.
  </figcaption>
</figure>
