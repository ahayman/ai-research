<figure class="concept-diagram" id="diagram-head-directionality">
  <div class="diagram-container">
    <div class="head-title">ENGLISH HEAD DIRECTIONALITY: A Hybrid Profile</div>
    <div class="head-subtitle">Mostly head-initial (expected for SVO), with Germanic head-final remnants</div>

    <div class="head-grid">
      <div class="head-section initial">
        <div class="section-header">HEAD-INITIAL (expected for SVO)</div>
        <div class="head-items">
          <div class="head-item"><span class="construction">Adposition</span><span class="example"><b>in</b> the house</span><span class="note">Preposition before NP</span></div>
          <div class="head-item"><span class="construction">Verb + Object</span><span class="example"><b>read</b> the book</span><span class="note">VO order</span></div>
          <div class="head-item"><span class="construction">Aux + Verb</span><span class="example"><b>will</b> go</span><span class="note">Aux before main V</span></div>
          <div class="head-item"><span class="construction">Comp + Clause</span><span class="example"><b>that</b> he left</span><span class="note">C before clause</span></div>
          <div class="head-item"><span class="construction">Noun + Relative</span><span class="example">the man <b>who</b> came</span><span class="note">RC after head noun</span></div>
          <div class="head-item"><span class="construction">Noun + PP</span><span class="example">the book <b>on</b> the table</span><span class="note">PP after head noun</span></div>
        </div>
      </div>

      <div class="head-section final">
        <div class="section-header">HEAD-FINAL (Germanic remnants)</div>
        <div class="head-items">
          <div class="head-item"><span class="construction">Adj + Noun</span><span class="example"><b>red</b> house</span><span class="note">Not *house red (cf. French: maison rouge)</span></div>
          <div class="head-item"><span class="construction">Gen + Noun</span><span class="example"><b>John's</b> book</span><span class="note">Saxon genitive (Germanic)</span></div>
          <div class="head-item"><span class="construction">Dem + Noun</span><span class="example"><b>this</b> house</span><span class="note">Demonstrative before N</span></div>
          <div class="head-item"><span class="construction">Degree + Adj</span><span class="example"><b>very</b> tall</span><span class="note">Degree word before Adj</span></div>
          <div class="head-item"><span class="construction">Compound</span><span class="example"><b>black</b>bird</span><span class="note">Modifier before head</span></div>
        </div>
        <div class="hybrid-note">English has BOTH: <b>John's book</b> (head-final, Germanic) AND <b>the book of John</b> (head-initial, Romance). Both coexist.</div>
      </div>
    </div>

    <div class="pattern-note">
      <strong>The pattern:</strong> English is head-initial in clausal/verbal domains (where SVO word order operates) but head-final in nominal domains (where Germanic inheritance persists). This hybrid reflects English's position as a Germanic language that shifted toward analytic/head-initial typology.
    </div>
  </div>
  <figcaption>
    <strong>Figure 3:</strong> English head directionality profile. English is predominantly head-initial (prepositions, VO order, auxiliaries before verbs, relative clauses after nouns) -- the expected pattern for an SVO language. But it retains head-final patterns in the noun phrase (adjective-noun, possessor-noun, demonstrative-noun, compound-modifier-head) -- Germanic holdovers. The coexistence of "John's book" (head-final Saxon genitive) alongside "the book of John" (head-initial of-genitive) crystallizes the hybrid.
  </figcaption>
</figure>
