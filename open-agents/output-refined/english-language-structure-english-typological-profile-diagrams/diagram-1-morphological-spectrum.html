<figure class="concept-diagram" id="diagram-morphological-spectrum">
  <div class="diagram-container">
    <div class="spectrum-title">MORPHOLOGICAL TYPOLOGY SPECTRUM</div>
    <div class="spectrum-subtitle">Where English sits among the world's languages</div>

    <div class="spectrum-bar">
      <div class="spectrum-zone isolating">
        <div class="zone-label">ISOLATING</div>
        <div class="zone-desc">1 morpheme per word</div>
      </div>
      <div class="spectrum-zone analytic">
        <div class="zone-label">MODERATELY ANALYTIC</div>
        <div class="zone-desc">~1.5 morphemes/word</div>
      </div>
      <div class="spectrum-zone fusional">
        <div class="zone-label">FUSIONAL</div>
        <div class="zone-desc">~2-3 morphemes/word</div>
      </div>
      <div class="spectrum-zone agglutinative">
        <div class="zone-label">AGGLUTINATIVE</div>
        <div class="zone-desc">~3-4 morphemes/word</div>
      </div>
      <div class="spectrum-zone polysynthetic">
        <div class="zone-label">POLYSYNTHETIC</div>
        <div class="zone-desc">word = sentence</div>
      </div>
    </div>

    <div class="language-markers">
      <div class="lang-marker" style="left: 5%;">

        <div class="lang-example">Toi di hoc = I go learn</div>
      </div>
      <div class="lang-marker" style="left: 10%;">
        <div class="lang-name">Mandarin</div>
        <div class="lang-example">~1.0-1.2 m/w</div>
      </div>
      <div class="lang-marker english" style="left: 28%;">
        <div class="lang-name">ENGLISH</div>
        <div class="lang-example">~1.5-1.7 m/w</div>
        <div class="lang-detail">8 inflections remain</div>
      </div>
      <div class="lang-marker" style="left: 48%;">
        <div class="lang-name">German</div>
        <div class="lang-example">~2.0 m/w</div>
      </div>
      <div class="lang-marker" style="left: 55%;">
        <div class="lang-name">Russian</div>
        <div class="lang-example">~2.5 m/w</div>
      </div>
      <div class="lang-marker" style="left: 72%;">
        <div class="lang-name">Turkish</div>
        <div class="lang-example">ev-ler-im-de<br/>house-PL-my-in</div>
      </div>
      <div class="lang-marker" style="left: 78%;">
        <div class="lang-name">Finnish</div>
        <div class="lang-example">~3.0-3.5 m/w</div>
      </div>
      <div class="lang-marker" style="left: 92%;">
        <div class="lang-name">Inuktitut</div>
        <div class="lang-example">One word = whole sentence</div>
      </div>
    </div>

    <!-- English's 8 inflections -->
    <div class="inflections-box">
      <div class="infl-title">ENGLISH'S 8 SURVIVING INFLECTIONAL MORPHEMES</div>
      <div class="infl-grid">
        <div class="infl-item"><span class="infl">-s</span> plural (dogs)</div>
        <div class="infl-item"><span class="infl">-'s</span> possessive (dog's)</div>
        <div class="infl-item"><span class="infl">-s</span> 3sg present (walks)</div>
        <div class="infl-item"><span class="infl">-ed</span> past tense (walked)</div>
        <div class="infl-item"><span class="infl">-en/-ed</span> past participle (driven/walked)</div>
        <div class="infl-item"><span class="infl">-ing</span> progressive (walking)</div>
        <div class="infl-item"><span class="infl">-er</span> comparative (taller)</div>
        <div class="infl-item"><span class="infl">-est</span> superlative (tallest)</div>
      </div>
    </div>
  </div>
  <figcaption>
    <strong>Figure 1:</strong> English on the morphological typology spectrum. Modern English is moderately analytic -- more analytic than any other Germanic language, but less fully isolating than Mandarin or Vietnamese. With only 8 inflectional morphemes remaining, English compensates with rigid word order, prepositions, auxiliaries, and articles -- analytic strategies that replaced its lost inflections.
  </figcaption>
</figure>
