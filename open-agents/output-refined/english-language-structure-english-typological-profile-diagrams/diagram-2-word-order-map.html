<!-- Diagram: English Word Order Flexibility Map -->
<!-- Type: central node with radiating departures -->
<!-- Generated: 2026-03-31 -->
<!-- Description: Shows SVO as default with specific, rule-governed departures -->

<figure class="concept-diagram" id="diagram-word-order-map">
  <div class="diagram-container">
    <pre class="mermaid">
flowchart TB
    subgraph global["GLOBAL WORD ORDER DISTRIBUTION"]
        direction LR
        SOV["<b>SOV ~41%</b><br/>Japanese, Korean,<br/>Turkish, Hindi"]
        SVO["<b>SVO ~35%</b><br/>English, French,<br/>Mandarin, Russian"]
        VSO["<b>VSO ~7%</b><br/>Arabic, Welsh,<br/>Irish"]
        OTHER["<b>Other ~17%</b><br/>VOS, OVS, OSV,<br/>No dominant order"]
    end

    subgraph english["ENGLISH SVO: RIGID, WITH RULE-GOVERNED DEPARTURES"]
        direction TB
        DEFAULT(("SVO<br/><b>DEFAULT</b><br/>The dog chased the cat"))

        TOP["<b>Topicalization</b><br/>'This book, I really enjoyed'<br/><i>Trigger: fronting object for emphasis</i>"]
        PASS["<b>Passive</b><br/>'The cat was chased by the dog'<br/><i>Trigger: promote patient to subject</i>"]
        CLEFT["<b>Cleft</b><br/>'It was the dog that chased the cat'<br/><i>Trigger: focus on specific element</i>"]
        NEG["<b>Negative Inversion</b><br/>'Never have I seen such a thing'<br/><i>Trigger: fronted negative adverb</i>"]
        HEAVY["<b>Heavy NP Shift</b><br/>'I gave to Mary the incredibly<br/>detailed report that was due'<br/><i>Trigger: complex NP moved to end</i>"]
        COND["<b>Conditional Inversion</b><br/>'Had I known, I would have come'<br/><i>Trigger: V2 fossil without 'if'</i>"]

        DEFAULT --> TOP
        DEFAULT --> PASS
        DEFAULT --> CLEFT
        DEFAULT --> NEG
        DEFAULT --> HEAVY
        DEFAULT --> COND
    end

    subgraph v2["V2 FOSSILS (Remnants of Old English)"]
        direction LR
        V2Q["Questions<br/>'Did you go?'"]
        V2N["Neg. inversion<br/>'Never had he...'"]
        V2C["Conditionals<br/>'Had I known...'"]
        V2Qu["Quotative<br/>'Hello,' said John"]
    end

    subgraph why["WHY RIGID?"]
        W["English <b>lost its case system</b>.<br/>Position must do the work that<br/>case endings once did.<br/>'The dog bit the man' ≠ 'The man bit the dog'"]
    end

    style global fill:#f1f5f9,stroke:#94a3b8
    style english fill:#eff6ff,stroke:#3b82f6,stroke-width:2px
    style v2 fill:#fef3c7,stroke:#f59e0b,stroke-width:2px
    style why fill:#fef2f2,stroke:#ef4444,stroke-width:2px

    style DEFAULT fill:#3b82f6,stroke:#1e40af,color:#fff,font-size:14px
    style SVO fill:#3b82f6,stroke:#1e40af,color:#fff

    style TOP fill:#dbeafe,stroke:#2563eb
    style PASS fill:#dbeafe,stroke:#2563eb
    style CLEFT fill:#dbeafe,stroke:#2563eb
    style NEG fill:#dbeafe,stroke:#2563eb
    style HEAVY fill:#dbeafe,stroke:#2563eb
    style COND fill:#dbeafe,stroke:#2563eb

    style V2Q fill:#fef9c3,stroke:#ca8a04
    style V2N fill:#fef9c3,stroke:#ca8a04
    style V2C fill:#fef9c3,stroke:#ca8a04
    style V2Qu fill:#fef9c3,stroke:#ca8a04
    style W fill:#fecaca,stroke:#dc2626
    </pre>
  </div>
  <figcaption>
    <strong>Figure 2:</strong> English word order flexibility map. SVO is the rigid default -- word order determines meaning because English lost its case system. Each permitted departure (topicalization, passive, cleft, negative inversion, heavy NP shift, conditional inversion) has a specific pragmatic or syntactic trigger. The V2 fossils (questions, negative inversion, conditional inversion, quotative) are remnants of Old English's verb-second word order, preserved in specific grammatical niches.
  </figcaption>
</figure>
