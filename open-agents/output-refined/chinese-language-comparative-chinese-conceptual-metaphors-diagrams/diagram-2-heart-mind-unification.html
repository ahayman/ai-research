<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Heart-Mind Unification -- Chinese 心 vs. English Head/Heart Split</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --accent: #4361ee;
    --accent-light: #e8edff;
    --chinese: #e63946;
    --chinese-light: #ffe0e3;
    --english: #8338ec;
    --english-light: #ede0ff;
    --cognition: #2a9d8f;
    --emotion: #e9c46a;
    --muted: #6c757d;
    --caption-bg: #f8f9fa;
    --grid: #e0e0e0;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --accent: #6b8aff;
      --accent-light: #1e2a4a;
      --chinese: #ff6b6b;
      --chinese-light: #3a1a1a;
      --english: #b380ff;
      --english-light: #2a1a3a;
      --cognition: #4ecdc4;
      --emotion: #ffe66d;
      --muted: #9a9ab0;
      --caption-bg: #1a1a2e;
      --grid: #2d2d44;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure { max-width: 940px; width: 100%; }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding: 1rem 1.5rem;
    background: var(--caption-bg);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  .chart-wrapper {
    overflow-x: auto;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--surface);
    padding: 1rem;
  }
  svg { display: block; margin: 0 auto; }
  .legend {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 1.2rem;
    margin-top: 1rem;
    padding: 0.8rem;
    background: var(--surface);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.8rem;
    color: var(--muted);
  }
  .legend-swatch {
    width: 14px;
    height: 14px;
    border-radius: 3px;
  }
</style>
</head>
<body>
<figure>
  <div class="chart-wrapper">
    <svg viewBox="0 0 900 580" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
      <text x="450" y="28" text-anchor="middle" font-size="16" fill="var(--fg)" font-weight="700">Heart-Mind Unification: Chinese 心 vs. English Head/Heart Split</text>

      <!-- CHINESE SIDE: Unified Circle -->
      <text x="225" y="60" text-anchor="middle" font-size="14" fill="var(--chinese)" font-weight="700">CHINESE: Unified 心 (xin)</text>

      <!-- Large unified circle -->
      <circle cx="225" cy="260" r="175" fill="none" stroke="var(--chinese)" stroke-width="2.5"/>
      <!-- Center character -->
      <text x="225" y="180" text-anchor="middle" font-size="48" fill="var(--chinese)" font-weight="700">心</text>
      <text x="225" y="200" text-anchor="middle" font-size="12" fill="var(--chinese)">xin = heart-mind</text>

      <!-- Cognition characters (left arc) -->
      <text x="100" y="215" text-anchor="middle" font-size="10" fill="var(--cognition)" font-weight="600">COGNITION</text>
      <text x="82" y="240" font-size="16" fill="var(--cognition)">想</text>
      <text x="100" y="242" font-size="9" fill="var(--muted)">think</text>
      <text x="70" y="270" font-size="16" fill="var(--cognition)">思</text>
      <text x="88" y="272" font-size="9" fill="var(--muted)">contemplate</text>
      <text x="68" y="300" font-size="16" fill="var(--cognition)">忆</text>
      <text x="86" y="302" font-size="9" fill="var(--muted)">remember</text>
      <text x="73" y="330" font-size="16" fill="var(--cognition)">忘</text>
      <text x="91" y="332" font-size="9" fill="var(--muted)">forget</text>
      <text x="82" y="360" font-size="16" fill="var(--cognition)">悟</text>
      <text x="100" y="362" font-size="9" fill="var(--muted)">awaken</text>
      <text x="100" y="390" font-size="16" fill="var(--cognition)">意</text>
      <text x="118" y="392" font-size="9" fill="var(--muted)">intend</text>

      <!-- Emotion characters (right arc) -->
      <text x="345" y="215" text-anchor="middle" font-size="10" fill="var(--emotion)" font-weight="600">EMOTION</text>
      <text x="340" y="240" font-size="16" fill="var(--emotion)">情</text>
      <text x="358" y="242" font-size="9" fill="var(--muted)">feeling</text>
      <text x="360" y="270" font-size="16" fill="var(--emotion)">怒</text>
      <text x="378" y="272" font-size="9" fill="var(--muted)">anger</text>
      <text x="365" y="300" font-size="16" fill="var(--emotion)">恐</text>
      <text x="383" y="302" font-size="9" fill="var(--muted)">fear</text>
      <text x="362" y="330" font-size="16" fill="var(--emotion)">悲</text>
      <text x="380" y="332" font-size="9" fill="var(--muted)">sorrow</text>
      <text x="350" y="360" font-size="16" fill="var(--emotion)">愁</text>
      <text x="368" y="362" font-size="9" fill="var(--muted)">worry</text>
      <text x="333" y="390" font-size="16" fill="var(--emotion)">恨</text>
      <text x="351" y="392" font-size="9" fill="var(--muted)">hate</text>

      <!-- Key: radical visible -->
      <rect x="130" y="420" width="190" height="30" rx="4" fill="var(--accent-light)" stroke="var(--accent)" stroke-width="1"/>
      <text x="225" y="440" text-anchor="middle" font-size="10" fill="var(--accent)" font-weight="600">All share radical 心 or 忄</text>

      <!-- ENGLISH SIDE: Two Separate Circles -->
      <text x="675" y="60" text-anchor="middle" font-size="14" fill="var(--english)" font-weight="700">ENGLISH: Separated Head / Heart</text>

      <!-- Mind/Head circle -->
      <circle cx="610" cy="195" r="100" fill="none" stroke="var(--cognition)" stroke-width="2"/>
      <text x="610" y="125" text-anchor="middle" font-size="13" fill="var(--cognition)" font-weight="700">MIND / HEAD</text>
      <text x="610" y="170" text-anchor="middle" font-size="11" fill="var(--fg)">think, reason, analyze</text>
      <text x="610" y="188" text-anchor="middle" font-size="11" fill="var(--fg)">understand, remember</text>
      <text x="610" y="206" text-anchor="middle" font-size="11" fill="var(--fg)">decide, calculate</text>
      <text x="610" y="228" text-anchor="middle" font-size="10" fill="var(--english)" font-style="italic">"Use your head"</text>
      <text x="610" y="243" text-anchor="middle" font-size="10" fill="var(--english)" font-style="italic">"Think it through"</text>

      <!-- Separation line -->
      <line x1="565" y1="305" x2="730" y2="305" stroke="var(--english)" stroke-width="2" stroke-dasharray="6,4"/>
      <text x="675" y="318" text-anchor="middle" font-size="10" fill="var(--english)" font-weight="600">SEPARATED</text>

      <!-- Heart circle -->
      <circle cx="675" cy="405" r="100" fill="none" stroke="var(--emotion)" stroke-width="2"/>
      <text x="675" y="345" text-anchor="middle" font-size="13" fill="var(--emotion)" font-weight="700">HEART</text>
      <text x="675" y="380" text-anchor="middle" font-size="11" fill="var(--fg)">feel, love, desire</text>
      <text x="675" y="398" text-anchor="middle" font-size="11" fill="var(--fg)">passion, compassion</text>
      <text x="675" y="416" text-anchor="middle" font-size="11" fill="var(--fg)">emotion, intuition</text>
      <text x="675" y="440" text-anchor="middle" font-size="10" fill="var(--english)" font-style="italic">"Follow your heart"</text>
      <text x="675" y="455" text-anchor="middle" font-size="10" fill="var(--english)" font-style="italic">"Heart vs. head"</text>

      <!-- Cross-linguistic note at bottom -->
      <rect x="70" y="475" width="760" height="45" rx="6" fill="var(--accent-light)" stroke="var(--accent)" stroke-width="1.5"/>
      <text x="450" y="494" text-anchor="middle" font-size="11" fill="var(--accent)" font-weight="700">CROSS-LINGUISTIC PATTERN</text>
      <text x="450" y="511" text-anchor="middle" font-size="10" fill="var(--fg)">Chinese 心 (xin) and Arabic قلب (qalb) unify cognition and emotion in the heart. English and French split them: head = reason, heart = emotion.</text>

      <!-- Key pattern box -->
      <rect x="70" y="530" width="760" height="35" rx="6" fill="var(--surface)" stroke="var(--border)" stroke-width="1"/>
      <text x="450" y="553" text-anchor="middle" font-size="11" fill="var(--fg)">Chinese writing system makes the pattern <tspan font-weight="700">visible</tspan>: the radical 心/忄 appears in <tspan font-weight="700">both</tspan> cognitive and emotional characters. English has no morphological marker linking "think" and "feel."</text>
    </svg>
  </div>
  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background:var(--cognition)"></div>Cognition domain</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--emotion)"></div>Emotion domain</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--chinese)"></div>Chinese: Unified in 心</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--english)"></div>English: Separated</div>
  </div>
  <figcaption>
    <h2>Figure 2 -- The 心 (Xin) Heart-Mind Unification vs. the English Head/Heart Split</h2>
    <p>Chinese 心 (xin) simultaneously encompasses cognition and emotion as one domain, visible through the shared heart radical (心/忄) in characters for thinking (想, 思, 忆) and feeling (情, 怒, 恐, 悲). English treats mind/head and heart as fundamentally separate domains, encoding a reason-versus-emotion dualism absent from Chinese. Arabic's qalb (heart) parallels the Chinese unified model.</p>
  </figcaption>
</figure>
</body>
</html>
