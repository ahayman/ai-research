<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heart (心) Compound Word Families -- Metaphorical Productivity</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --accent: #4361ee;
    --accent-light: #e8edff;
    --positive: #2a9d8f;
    --negative: #e63946;
    --cognitive: #e9c46a;
    --center: #264653;
    --english: #8338ec;
    --muted: #6c757d;
    --caption-bg: #f8f9fa;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --accent: #6b8aff;
      --accent-light: #1e2a4a;
      --positive: #4ecdc4;
      --negative: #ff6b6b;
      --cognitive: #ffe66d;
      --center: #a8dadc;
      --english: #b380ff;
      --muted: #9a9ab0;
      --caption-bg: #1a1a2e;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure { max-width: 940px; width: 100%; }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding: 1rem 1.5rem;
    background: var(--caption-bg);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  .chart-wrapper {
    overflow-x: auto;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--surface);
    padding: 1rem;
  }
  svg { display: block; margin: 0 auto; }
  .legend {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 1.2rem;
    margin-top: 1rem;
    padding: 0.8rem;
    background: var(--surface);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.8rem;
    color: var(--muted);
  }
  .legend-swatch {
    width: 14px;
    height: 14px;
    border-radius: 3px;
  }
</style>
</head>
<body>
<figure>
  <div class="chart-wrapper">
    <svg viewBox="0 0 900 540" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
      <text x="450" y="28" text-anchor="middle" font-size="16" fill="var(--fg)" font-weight="700">Heart (心) Compound Word Families -- One Radical, Many States</text>

      <!-- Center -->
      <circle cx="450" cy="265" r="50" fill="var(--surface)" stroke="var(--center)" stroke-width="3"/>
      <text x="450" y="255" text-anchor="middle" font-size="36" fill="var(--center)" font-weight="700">心</text>
      <text x="450" y="278" text-anchor="middle" font-size="11" fill="var(--center)">xin</text>
      <text x="450" y="293" text-anchor="middle" font-size="9" fill="var(--muted)">heart-mind</text>

      <!-- POSITIVE EMOTIONS (upper left arc) -->
      <!-- 开心 -->
      <line x1="410" y1="225" x2="260" y2="110" stroke="var(--positive)" stroke-width="1.5"/>
      <rect x="160" y="80" width="160" height="55" rx="6" fill="var(--surface)" stroke="var(--positive)" stroke-width="1.5"/>
      <text x="240" y="98" text-anchor="middle" font-size="16" fill="var(--positive)" font-weight="700">开心</text>
      <text x="240" y="113" text-anchor="middle" font-size="10" fill="var(--fg)">kai xin = open + heart</text>
      <text x="240" y="128" text-anchor="middle" font-size="9" fill="var(--positive)" font-weight="600">HAPPY (heart opens)</text>

      <!-- 放心 -->
      <line x1="430" y1="218" x2="310" y2="40" stroke="var(--positive)" stroke-width="1.5"/>
      <rect x="220" y="15" width="160" height="50" rx="6" fill="var(--surface)" stroke="var(--positive)" stroke-width="1.5"/>
      <text x="300" y="33" text-anchor="middle" font-size="16" fill="var(--positive)" font-weight="700">放心</text>
      <text x="300" y="48" text-anchor="middle" font-size="10" fill="var(--fg)">fang xin = release + heart</text>
      <text x="300" y="60" text-anchor="middle" font-size="9" fill="var(--positive)" font-weight="600">RELIEVED (heart released)</text>

      <!-- 热心 -->
      <line x1="490" y1="225" x2="620" y2="100" stroke="var(--positive)" stroke-width="1.5"/>
      <rect x="540" y="75" width="165" height="50" rx="6" fill="var(--surface)" stroke="var(--positive)" stroke-width="1.5"/>
      <text x="622" y="93" text-anchor="middle" font-size="16" fill="var(--positive)" font-weight="700">热心</text>
      <text x="622" y="108" text-anchor="middle" font-size="10" fill="var(--fg)">re xin = hot + heart</text>
      <text x="622" y="120" text-anchor="middle" font-size="9" fill="var(--positive)" font-weight="600">ENTHUSIASTIC (heart heated)</text>

      <!-- NEGATIVE EMOTIONS (lower left arc) -->
      <!-- 伤心 -->
      <line x1="410" y1="305" x2="240" y2="410" stroke="var(--negative)" stroke-width="1.5"/>
      <rect x="140" y="385" width="165" height="55" rx="6" fill="var(--surface)" stroke="var(--negative)" stroke-width="1.5"/>
      <text x="222" y="403" text-anchor="middle" font-size="16" fill="var(--negative)" font-weight="700">伤心</text>
      <text x="222" y="418" text-anchor="middle" font-size="10" fill="var(--fg)">shang xin = wound + heart</text>
      <text x="222" y="433" text-anchor="middle" font-size="9" fill="var(--negative)" font-weight="600">SAD (heart wounded)</text>

      <!-- 担心 -->
      <line x1="420" y1="310" x2="270" y2="480" stroke="var(--negative)" stroke-width="1.5"/>
      <rect x="170" y="455" width="165" height="55" rx="6" fill="var(--surface)" stroke="var(--negative)" stroke-width="1.5"/>
      <text x="252" y="473" text-anchor="middle" font-size="16" fill="var(--negative)" font-weight="700">担心</text>
      <text x="252" y="488" text-anchor="middle" font-size="10" fill="var(--fg)">dan xin = carry + heart</text>
      <text x="252" y="503" text-anchor="middle" font-size="9" fill="var(--negative)" font-weight="600">WORRIED (heart burdened)</text>

      <!-- 恶心 -->
      <line x1="490" y1="305" x2="640" y2="430" stroke="var(--negative)" stroke-width="1.5"/>
      <rect x="555" y="410" width="165" height="55" rx="6" fill="var(--surface)" stroke="var(--negative)" stroke-width="1.5"/>
      <text x="637" y="428" text-anchor="middle" font-size="16" fill="var(--negative)" font-weight="700">恶心</text>
      <text x="637" y="443" text-anchor="middle" font-size="10" fill="var(--fg)">e xin = bad + heart</text>
      <text x="637" y="458" text-anchor="middle" font-size="9" fill="var(--negative)" font-weight="600">DISGUSTED (heart revolts)</text>

      <!-- COGNITIVE STATES (right side) -->
      <!-- 小心 -->
      <line x1="500" y1="255" x2="690" y2="195" stroke="var(--cognitive)" stroke-width="1.5"/>
      <rect x="610" y="170" width="165" height="50" rx="6" fill="var(--surface)" stroke="var(--cognitive)" stroke-width="1.5"/>
      <text x="692" y="188" text-anchor="middle" font-size="16" fill="var(--cognitive)" font-weight="700">小心</text>
      <text x="692" y="203" text-anchor="middle" font-size="10" fill="var(--fg)">xiao xin = small + heart</text>
      <text x="692" y="215" text-anchor="middle" font-size="9" fill="var(--cognitive)" font-weight="600">CAREFUL (heart contracts)</text>

      <!-- 用心 -->
      <line x1="500" y1="270" x2="700" y2="285" stroke="var(--cognitive)" stroke-width="1.5"/>
      <rect x="620" y="260" width="165" height="50" rx="6" fill="var(--surface)" stroke="var(--cognitive)" stroke-width="1.5"/>
      <text x="702" y="278" text-anchor="middle" font-size="16" fill="var(--cognitive)" font-weight="700">用心</text>
      <text x="702" y="293" text-anchor="middle" font-size="10" fill="var(--fg)">yong xin = use + heart</text>
      <text x="702" y="305" text-anchor="middle" font-size="9" fill="var(--cognitive)" font-weight="600">DILIGENT (heart applied)</text>

      <!-- 心眼 -->
      <line x1="500" y1="280" x2="700" y2="365" stroke="var(--cognitive)" stroke-width="1.5"/>
      <rect x="620" y="340" width="165" height="50" rx="6" fill="var(--surface)" stroke="var(--cognitive)" stroke-width="1.5"/>
      <text x="702" y="358" text-anchor="middle" font-size="16" fill="var(--cognitive)" font-weight="700">心眼</text>
      <text x="702" y="373" text-anchor="middle" font-size="10" fill="var(--fg)">xin yan = heart + eye</text>
      <text x="702" y="385" text-anchor="middle" font-size="9" fill="var(--cognitive)" font-weight="600">SHREWD (heart's eye)</text>

      <!-- English comparison -->
      <rect x="60" y="80" width="100" height="70" rx="6" fill="var(--accent-light)" stroke="var(--english)" stroke-width="1"/>
      <text x="110" y="98" text-anchor="middle" font-size="9" fill="var(--english)" font-weight="700">ENGLISH</text>
      <text x="110" y="112" text-anchor="middle" font-size="9" fill="var(--english)">heartbroken</text>
      <text x="110" y="124" text-anchor="middle" font-size="9" fill="var(--english)">sweetheart</text>
      <text x="110" y="136" text-anchor="middle" font-size="9" fill="var(--english)">...and few others</text>
      <text x="110" y="145" text-anchor="middle" font-size="8" fill="var(--muted)"></text>

      <!-- Pattern insight -->
      <rect x="60" y="165" width="100" height="45" rx="6" fill="var(--surface)" stroke="var(--accent)" stroke-width="1"/>
      <text x="110" y="182" text-anchor="middle" font-size="8" fill="var(--accent)" font-weight="700">THE PATTERN</text>
      <text x="110" y="194" text-anchor="middle" font-size="8" fill="var(--fg)">Modifier + 心</text>
      <text x="110" y="205" text-anchor="middle" font-size="8" fill="var(--fg)">= state of heart</text>
    </svg>
  </div>
  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background:var(--positive)"></div>Positive emotions</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--negative)"></div>Negative emotions</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--cognitive)"></div>Cognitive states</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--center)"></div>心 (heart-mind center)</div>
  </div>
  <figcaption>
    <h2>Figure 7 -- Heart (心) Compound Word Families: One Radical, Many States</h2>
    <p>The heart character 心 (xin) generates a systematic family of compound words for different emotional and cognitive states through a consistent pattern: a modifier describing what happens to the heart produces a predictable meaning. Open heart = happy, wounded heart = sad, small heart = careful, carry heart = worried, release heart = relieved. This is a productive living system, not a handful of frozen idioms -- a pattern learner's dream. English has only a few heart compounds (heartbroken, sweetheart) with no comparable systematic productivity.</p>
  </figcaption>
</figure>
</body>
</html>
