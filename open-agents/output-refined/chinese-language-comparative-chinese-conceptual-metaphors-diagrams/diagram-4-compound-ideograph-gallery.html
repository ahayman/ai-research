<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compound Ideograph Gallery -- Characters That Visually Encode Metaphor</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --accent: #4361ee;
    --accent-light: #e8edff;
    --comp-a: #e63946;
    --comp-b: #2a9d8f;
    --result: #264653;
    --muted: #6c757d;
    --caption-bg: #f8f9fa;
    --warn: #e9c46a;
    --warn-bg: #fef9e7;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --accent: #6b8aff;
      --accent-light: #1e2a4a;
      --comp-a: #ff6b6b;
      --comp-b: #4ecdc4;
      --result: #a8dadc;
      --muted: #9a9ab0;
      --caption-bg: #1a1a2e;
      --warn: #ffe66d;
      --warn-bg: #2a2a1a;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure { max-width: 940px; width: 100%; }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding: 1rem 1.5rem;
    background: var(--caption-bg);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  .chart-wrapper {
    overflow-x: auto;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--surface);
    padding: 1.5rem;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 1rem;
  }
  .card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1rem;
    text-align: center;
  }
  .card-char {
    font-size: 2.5rem;
    font-weight: 700;
    color: var(--result);
    margin-bottom: 0.2rem;
  }
  .card-pinyin {
    font-size: 0.85rem;
    color: var(--muted);
    margin-bottom: 0.5rem;
  }
  .card-components {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.4rem;
    margin-bottom: 0.5rem;
    font-size: 1.4rem;
  }
  .comp-a { color: var(--comp-a); font-weight: 600; }
  .comp-b { color: var(--comp-b); font-weight: 600; }
  .plus { color: var(--muted); font-size: 1rem; }
  .equals { color: var(--muted); font-size: 1rem; }
  .card-logic {
    font-size: 0.8rem;
    color: var(--accent);
    font-weight: 600;
    margin-bottom: 0.3rem;
  }
  .card-meaning {
    font-size: 0.85rem;
    color: var(--fg);
  }
  .card-english {
    font-size: 0.75rem;
    color: var(--muted);
    font-style: italic;
    margin-top: 0.3rem;
  }
  .caveat {
    margin-top: 1rem;
    padding: 0.8rem 1rem;
    background: var(--warn-bg);
    border: 1px solid var(--warn);
    border-radius: 6px;
    font-size: 0.85rem;
    color: var(--fg);
  }
  .caveat strong { color: var(--warn); }
  .eng-compare {
    margin-top: 1rem;
    padding: 0.8rem 1rem;
    background: var(--accent-light);
    border: 1px solid var(--accent);
    border-radius: 6px;
    font-size: 0.85rem;
    text-align: center;
  }
  .eng-compare strong { color: var(--accent); }
</style>
</head>
<body>
<figure>
  <div class="chart-wrapper">
    <h3 style="text-align:center;font-size:1.1rem;color:var(--fg);margin-bottom:1rem;font-weight:700;">Compound Ideographs (会意字) -- Characters That Visually Encode Metaphor</h3>
    <div class="grid">
      <div class="card">
        <div class="card-char">明</div>
        <div class="card-pinyin">ming</div>
        <div class="card-components">
          <span class="comp-a">日</span><span class="plus">+</span><span class="comp-b">月</span><span class="equals">=</span><span style="color:var(--result);font-weight:700;">明</span>
        </div>
        <div class="card-logic">sun + moon = BRIGHT</div>
        <div class="card-meaning">The two light sources combined</div>
        <div class="card-english">English "bright" -- letters encode sound, not meaning</div>
      </div>

      <div class="card">
        <div class="card-char">休</div>
        <div class="card-pinyin">xiu</div>
        <div class="card-components">
          <span class="comp-a">人</span><span class="plus">+</span><span class="comp-b">木</span><span class="equals">=</span><span style="color:var(--result);font-weight:700;">休</span>
        </div>
        <div class="card-logic">person + tree = REST</div>
        <div class="card-meaning">A person leaning against a tree</div>
        <div class="card-english">English "rest" -- no visual logic in r-e-s-t</div>
      </div>

      <div class="card">
        <div class="card-char">好</div>
        <div class="card-pinyin">hao</div>
        <div class="card-components">
          <span class="comp-a">女</span><span class="plus">+</span><span class="comp-b">子</span><span class="equals">=</span><span style="color:var(--result);font-weight:700;">好</span>
        </div>
        <div class="card-logic">woman + child = GOOD</div>
        <div class="card-meaning">Mother-child bond = goodness</div>
        <div class="card-english">English "good" -- arbitrary letter sequence</div>
      </div>

      <div class="card">
        <div class="card-char">信</div>
        <div class="card-pinyin">xin</div>
        <div class="card-components">
          <span class="comp-a">人</span><span class="plus">+</span><span class="comp-b">言</span><span class="equals">=</span><span style="color:var(--result);font-weight:700;">信</span>
        </div>
        <div class="card-logic">person + speech = TRUST *</div>
        <div class="card-meaning">A person standing by their word</div>
        <div class="card-english">* Likely phonetic origin -- but mnemonic works</div>
      </div>

      <div class="card">
        <div class="card-char">森</div>
        <div class="card-pinyin">sen</div>
        <div class="card-components">
          <span class="comp-a">木</span><span class="plus">+</span><span class="comp-b">木</span><span class="plus">+</span><span class="comp-a">木</span><span class="equals">=</span><span style="color:var(--result);font-weight:700;">森</span>
        </div>
        <div class="card-logic">tree + tree + tree = DENSE FOREST</div>
        <div class="card-meaning">Multiplied trees = density</div>
        <div class="card-english">cf. 林 (two trees = grove)</div>
      </div>

      <div class="card">
        <div class="card-char">安</div>
        <div class="card-pinyin">an</div>
        <div class="card-components">
          <span class="comp-a">宀</span><span class="plus">+</span><span class="comp-b">女</span><span class="equals">=</span><span style="color:var(--result);font-weight:700;">安</span>
        </div>
        <div class="card-logic">roof + woman = PEACE/SAFETY</div>
        <div class="card-meaning">Woman sheltered under a roof</div>
        <div class="card-english">English "peace" -- no visual clue to meaning</div>
      </div>

      <div class="card">
        <div class="card-char">家</div>
        <div class="card-pinyin">jia</div>
        <div class="card-components">
          <span class="comp-a">宀</span><span class="plus">+</span><span class="comp-b">豕</span><span class="equals">=</span><span style="color:var(--result);font-weight:700;">家</span>
        </div>
        <div class="card-logic">roof + pig = HOME/FAMILY</div>
        <div class="card-meaning">Domestic animals sheltered = home</div>
        <div class="card-english">English "home" -- h-o-m-e encodes only sound</div>
      </div>

      <div class="card">
        <div class="card-char">从</div>
        <div class="card-pinyin">cong</div>
        <div class="card-components">
          <span class="comp-a">人</span><span class="plus">+</span><span class="comp-b">人</span><span class="equals">=</span><span style="color:var(--result);font-weight:700;">从</span>
        </div>
        <div class="card-logic">person + person = FOLLOW</div>
        <div class="card-meaning">One person behind another</div>
        <div class="card-english">cf. 众 (three people = crowd)</div>
      </div>

      <div class="card">
        <div class="card-char">炎</div>
        <div class="card-pinyin">yan</div>
        <div class="card-components">
          <span class="comp-a">火</span><span class="plus">+</span><span class="comp-b">火</span><span class="equals">=</span><span style="color:var(--result);font-weight:700;">炎</span>
        </div>
        <div class="card-logic">fire + fire = SCORCHING/INFLAMMATION</div>
        <div class="card-meaning">Doubled fire = intensified heat</div>
        <div class="card-english">Multiplication pattern: 木->林->森, 火->炎->焱</div>
      </div>
    </div>

    <div class="caveat">
      <strong>Important caveat:</strong> Many characters traditionally explained as compound ideographs actually originated as semantic-phonetic compounds, with the visual-metaphorical reading being a folk etymology. However, even when historically inaccurate, the visual metaphor functions as a powerful learning mnemonic and resonates as cultural logic for native speakers. The visual reasoning is cognitively real even when etymologically secondary.
    </div>

    <div class="eng-compare">
      <strong>ENGLISH COMPARISON:</strong> Alphabetic scripts encode sounds, never meaning visually. The English word "bright" (b-r-i-g-h-t) gives zero visual clue to its meaning. Chinese 明 (sun + moon) visually depicts its metaphorical logic. This graphemic layer of metaphor is structurally impossible in any alphabetic writing system.
    </div>
  </div>
  <figcaption>
    <h2>Figure 4 -- Compound Ideograph Gallery: Characters That Visually Encode Metaphor</h2>
    <p>Chinese compound ideographs (会意字) combine semantic components to create characters whose visual structure encodes metaphorical reasoning. Each character above shows a decomposition into meaningful parts with the metaphorical logic annotated. Red and teal indicate the two component elements. Starred entries (*) indicate likely phonetic origins where the visual-metaphorical reading is a folk etymology that nonetheless serves as an effective mnemonic.</p>
  </figcaption>
</figure>
</body>
</html>
