<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Universal-to-Culture-Specific Metaphor Spectrum</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --accent: #4361ee;
    --accent-light: #e8edff;
    --universal: #2a9d8f;
    --universal-light: #d4f5f0;
    --widespread: #e9c46a;
    --widespread-light: #fef9e7;
    --specific: #e63946;
    --specific-light: #ffe0e3;
    --english: #8338ec;
    --muted: #6c757d;
    --caption-bg: #f8f9fa;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --accent: #6b8aff;
      --accent-light: #1e2a4a;
      --universal: #4ecdc4;
      --universal-light: #1a3a38;
      --widespread: #ffe66d;
      --widespread-light: #2a2a1a;
      --specific: #ff6b6b;
      --specific-light: #3a1a1a;
      --english: #b380ff;
      --muted: #9a9ab0;
      --caption-bg: #1a1a2e;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure { max-width: 940px; width: 100%; }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding: 1rem 1.5rem;
    background: var(--caption-bg);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  .chart-wrapper {
    overflow-x: auto;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--surface);
    padding: 1rem;
  }
  svg { display: block; margin: 0 auto; }
</style>
</head>
<body>
<figure>
  <div class="chart-wrapper">
    <svg viewBox="0 0 900 560" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
      <text x="450" y="28" text-anchor="middle" font-size="16" fill="var(--fg)" font-weight="700">Metaphor Universality Spectrum: Chinese-English Comparison</text>

      <!-- Spectrum bar -->
      <defs>
        <linearGradient id="spectrumGrad" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="var(--universal)"/>
          <stop offset="50%" stop-color="var(--widespread)"/>
          <stop offset="100%" stop-color="var(--specific)"/>
        </linearGradient>
      </defs>
      <rect x="80" y="55" width="740" height="12" rx="6" fill="url(#spectrumGrad)" opacity="0.4"/>

      <!-- Spectrum labels -->
      <text x="80" y="50" font-size="11" fill="var(--universal)" font-weight="700">UNIVERSAL</text>
      <text x="80" y="85" font-size="9" fill="var(--muted)">Found in all/most languages</text>
      <text x="450" y="50" text-anchor="middle" font-size="11" fill="var(--widespread)" font-weight="700">WIDESPREAD</text>
      <text x="450" y="85" text-anchor="middle" font-size="9" fill="var(--muted)">Found in many languages</text>
      <text x="820" y="50" text-anchor="end" font-size="11" fill="var(--specific)" font-weight="700">CULTURE-SPECIFIC</text>
      <text x="820" y="85" text-anchor="end" font-size="9" fill="var(--muted)">Found in one or few</text>

      <!-- UNIVERSAL METAPHORS -->
      <rect x="60" y="100" width="230" height="155" rx="6" fill="var(--universal-light)" stroke="var(--universal)" stroke-width="1.5"/>
      <text x="175" y="118" text-anchor="middle" font-size="11" fill="var(--universal)" font-weight="700">UNIVERSAL METAPHORS</text>
      <text x="175" y="132" text-anchor="middle" font-size="9" fill="var(--muted)">Grounded in embodied experience</text>

      <text x="75" y="155" font-size="10" fill="var(--fg)" font-weight="600">ANGER IS HEAT / FIRE</text>
      <text x="75" y="168" font-size="9" fill="var(--universal)">CN: 发火 fa huo (emit fire)</text>
      <text x="75" y="180" font-size="9" fill="var(--english)">EN: "burning with rage"</text>

      <text x="75" y="200" font-size="10" fill="var(--fg)" font-weight="600">HAPPINESS IS UP</text>
      <text x="75" y="213" font-size="9" fill="var(--universal)">CN: 高兴 gaoxing (high-excitement)</text>
      <text x="75" y="225" font-size="9" fill="var(--english)">EN: "I'm feeling up"</text>

      <text x="75" y="244" font-size="10" fill="var(--fg)" font-weight="600">SADNESS IS DOWN</text>
      <text x="75" y="244" font-size="10" fill="var(--fg)"></text>

      <!-- WIDESPREAD METAPHORS -->
      <rect x="310" y="100" width="260" height="155" rx="6" fill="var(--widespread-light)" stroke="var(--widespread)" stroke-width="1.5"/>
      <text x="440" y="118" text-anchor="middle" font-size="11" fill="var(--widespread)" font-weight="700">WIDESPREAD METAPHORS</text>
      <text x="440" y="132" text-anchor="middle" font-size="9" fill="var(--muted)">Universal base + cultural variation</text>

      <text x="325" y="155" font-size="10" fill="var(--fg)" font-weight="600">TIME IS SPACE</text>
      <text x="325" y="168" font-size="9" fill="var(--fg)">Universal principle, but axis varies:</text>
      <text x="325" y="181" font-size="9" fill="var(--universal)">CN: horizontal (primary) + vertical</text>
      <text x="325" y="194" font-size="9" fill="var(--english)">EN: horizontal only</text>

      <text x="325" y="215" font-size="10" fill="var(--fg)" font-weight="600">KNOWING IS SEEING</text>
      <text x="325" y="228" font-size="9" fill="var(--universal)">CN: 看出来 (look-out-come = realize)</text>
      <text x="325" y="241" font-size="9" fill="var(--english)">EN: "I see what you mean"</text>

      <!-- CULTURE-SPECIFIC METAPHORS -->
      <rect x="590" y="100" width="250" height="155" rx="6" fill="var(--specific-light)" stroke="var(--specific)" stroke-width="1.5"/>
      <text x="715" y="118" text-anchor="middle" font-size="11" fill="var(--specific)" font-weight="700">CULTURE-SPECIFIC</text>
      <text x="715" y="132" text-anchor="middle" font-size="9" fill="var(--muted)">TCM / Chinese philosophy</text>

      <text x="605" y="155" font-size="10" fill="var(--fg)" font-weight="600">GALLBLADDER IS COURAGE</text>
      <text x="605" y="168" font-size="9" fill="var(--specific)">CN: 胆大 (big gallbladder = brave)</text>
      <text x="605" y="181" font-size="9" fill="var(--english)">EN: no parallel</text>

      <text x="605" y="200" font-size="10" fill="var(--fg)" font-weight="600">SPLEEN IS TEMPERAMENT</text>
      <text x="605" y="213" font-size="9" fill="var(--specific)">CN: 脾气 (spleen-qi = temper)</text>
      <text x="605" y="226" font-size="9" fill="var(--english)">EN: "vent your spleen" (frozen)</text>

      <text x="605" y="244" font-size="10" fill="var(--fg)" font-weight="600">HEART-MIND UNITY</text>

      <!-- Bottom section: motivation axis -->
      <rect x="60" y="275" width="780" height="50" rx="6" fill="var(--accent-light)" stroke="var(--accent)" stroke-width="1"/>
      <text x="450" y="295" text-anchor="middle" font-size="11" fill="var(--accent)" font-weight="700">SOURCE OF METAPHOR</text>
      <text x="175" y="315" text-anchor="middle" font-size="10" fill="var(--universal)">Body (everyone heats up when angry)</text>
      <text x="450" y="315" text-anchor="middle" font-size="10" fill="var(--widespread)">Body + cultural model variation</text>
      <text x="715" y="315" text-anchor="middle" font-size="10" fill="var(--specific)">Cultural model (TCM five-organ theory)</text>

      <!-- Detailed Chinese-English comparison table -->
      <text x="450" y="355" text-anchor="middle" font-size="13" fill="var(--fg)" font-weight="700">Detailed Mapping: Same Concept, Different Metaphor</text>

      <!-- Table -->
      <rect x="60" y="365" width="780" height="180" rx="6" fill="var(--bg)" stroke="var(--border)" stroke-width="1"/>

      <!-- Headers -->
      <text x="160" y="385" text-anchor="middle" font-size="10" fill="var(--fg)" font-weight="700">Concept</text>
      <text x="340" y="385" text-anchor="middle" font-size="10" fill="var(--specific)" font-weight="700">Chinese Metaphor</text>
      <text x="540" y="385" text-anchor="middle" font-size="10" fill="var(--english)" font-weight="700">English Metaphor</text>
      <text x="730" y="385" text-anchor="middle" font-size="10" fill="var(--fg)" font-weight="700">Universality</text>
      <line x1="70" y1="390" x2="830" y2="390" stroke="var(--border)" stroke-width="0.5"/>

      <text x="160" y="410" text-anchor="middle" font-size="10" fill="var(--fg)">Computer</text>
      <text x="340" y="410" text-anchor="middle" font-size="10" fill="var(--specific)">电脑 electric-brain</text>
      <text x="540" y="410" text-anchor="middle" font-size="10" fill="var(--english)">computer (from compute)</text>
      <text x="730" y="410" text-anchor="middle" font-size="9" fill="var(--muted)">Different focus</text>

      <text x="160" y="430" text-anchor="middle" font-size="10" fill="var(--fg)">Train</text>
      <text x="340" y="430" text-anchor="middle" font-size="10" fill="var(--specific)">火车 fire-vehicle</text>
      <text x="540" y="430" text-anchor="middle" font-size="10" fill="var(--english)">train (from trailing)</text>
      <text x="730" y="430" text-anchor="middle" font-size="9" fill="var(--muted)">Different focus</text>

      <text x="160" y="450" text-anchor="middle" font-size="10" fill="var(--fg)">Happy</text>
      <text x="340" y="450" text-anchor="middle" font-size="10" fill="var(--specific)">开心 open-heart</text>
      <text x="540" y="450" text-anchor="middle" font-size="10" fill="var(--english)">happy (from hap = luck)</text>
      <text x="730" y="450" text-anchor="middle" font-size="9" fill="var(--universal)">Both use body metaphor</text>

      <text x="160" y="470" text-anchor="middle" font-size="10" fill="var(--fg)">Sad</text>
      <text x="340" y="470" text-anchor="middle" font-size="10" fill="var(--specific)">伤心 wound-heart</text>
      <text x="540" y="470" text-anchor="middle" font-size="10" fill="var(--english)">heartbroken</text>
      <text x="730" y="470" text-anchor="middle" font-size="9" fill="var(--universal)">Universal: heart = emotion</text>

      <text x="160" y="490" text-anchor="middle" font-size="10" fill="var(--fg)">Angry</text>
      <text x="340" y="490" text-anchor="middle" font-size="10" fill="var(--specific)">大动肝火 move liver-fire</text>
      <text x="540" y="490" text-anchor="middle" font-size="10" fill="var(--english)">burning with rage</text>
      <text x="730" y="490" text-anchor="middle" font-size="9" fill="var(--muted)">Heat universal; liver specific</text>

      <text x="160" y="510" text-anchor="middle" font-size="10" fill="var(--fg)">Worried</text>
      <text x="340" y="510" text-anchor="middle" font-size="10" fill="var(--specific)">担心 carry-heart</text>
      <text x="540" y="510" text-anchor="middle" font-size="10" fill="var(--english)">heavy-hearted</text>
      <text x="730" y="510" text-anchor="middle" font-size="9" fill="var(--universal)">Both use weight metaphor</text>

      <text x="160" y="530" text-anchor="middle" font-size="10" fill="var(--fg)">Brave</text>
      <text x="340" y="530" text-anchor="middle" font-size="10" fill="var(--specific)">胆大 big-gallbladder</text>
      <text x="540" y="530" text-anchor="middle" font-size="10" fill="var(--english)">gutsy, brave-hearted</text>
      <text x="730" y="530" text-anchor="middle" font-size="9" fill="var(--muted)">Body, but different organ</text>
    </svg>
  </div>
  <figcaption>
    <h2>Figure 5 -- The Universal-to-Culture-Specific Metaphor Spectrum</h2>
    <p>Conceptual metaphors exist on a continuum from universal (ANGER IS HEAT, found in virtually all languages and grounded in universal bodily experience) through widespread (TIME IS SPACE, universal but with axis variation) to culture-specific (GALLBLADDER IS COURAGE, rooted in Traditional Chinese Medicine). Chinese provides data points across the entire spectrum, demonstrating both shared human embodied cognition and culturally-specific conceptual models.</p>
  </figcaption>
</figure>
</body>
</html>
