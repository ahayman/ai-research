<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Body-Organ Emotion Map -- Chinese vs. English</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --accent: #4361ee;
    --accent-light: #e8edff;
    --chinese: #e63946;
    --chinese-light: #ffe0e3;
    --english: #8338ec;
    --english-light: #ede0ff;
    --fire: #e63946;
    --wood: #2a9d8f;
    --earth: #e9c46a;
    --metal: #a8dadc;
    --water: #264653;
    --muted: #6c757d;
    --caption-bg: #f8f9fa;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --accent: #6b8aff;
      --accent-light: #1e2a4a;
      --chinese: #ff6b6b;
      --chinese-light: #3a1a1a;
      --english: #b380ff;
      --english-light: #2a1a3a;
      --fire: #ff6b6b;
      --wood: #4ecdc4;
      --earth: #ffe66d;
      --metal: #a8dadc;
      --water: #457b9d;
      --muted: #9a9ab0;
      --caption-bg: #1a1a2e;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure { max-width: 940px; width: 100%; }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding: 1rem 1.5rem;
    background: var(--caption-bg);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  .chart-wrapper {
    overflow-x: auto;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--surface);
    padding: 1rem;
  }
  svg { display: block; margin: 0 auto; }
</style>
</head>
<body>
<figure>
  <div class="chart-wrapper">
    <svg viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
      <text x="450" y="28" text-anchor="middle" font-size="16" fill="var(--fg)" font-weight="700">Body-Organ Emotion Map: Chinese (7 organs) vs. English (1 organ)</text>

      <!-- CHINESE SIDE -->
      <text x="250" y="58" text-anchor="middle" font-size="14" fill="var(--chinese)" font-weight="700">CHINESE: Distributed Organ System</text>

      <!-- Simplified body outline -->
      <ellipse cx="250" cy="100" rx="30" ry="35" fill="none" stroke="var(--fg)" stroke-width="1.5" opacity="0.4"/>
      <line x1="250" y1="135" x2="250" y2="340" stroke="var(--fg)" stroke-width="1.5" opacity="0.4"/>
      <line x1="250" y1="170" x2="190" y2="250" stroke="var(--fg)" stroke-width="1.5" opacity="0.4"/>
      <line x1="250" y1="170" x2="310" y2="250" stroke="var(--fg)" stroke-width="1.5" opacity="0.4"/>
      <line x1="250" y1="340" x2="210" y2="440" stroke="var(--fg)" stroke-width="1.5" opacity="0.4"/>
      <line x1="250" y1="340" x2="290" y2="440" stroke="var(--fg)" stroke-width="1.5" opacity="0.4"/>

      <!-- Heart (Fire) -->
      <circle cx="250" cy="185" r="12" fill="var(--fire)" opacity="0.3" stroke="var(--fire)" stroke-width="1.5"/>
      <line x1="262" y1="180" x2="390" y2="80" stroke="var(--fire)" stroke-width="1" stroke-dasharray="3,2"/>
      <rect x="390" y="65" width="160" height="45" rx="4" fill="var(--surface)" stroke="var(--fire)" stroke-width="1.5"/>
      <text x="470" y="80" text-anchor="middle" font-size="11" fill="var(--fire)" font-weight="700">心 xin -- HEART</text>
      <text x="470" y="94" text-anchor="middle" font-size="10" fill="var(--fg)">Joy + All Cognition</text>
      <text x="470" y="106" text-anchor="middle" font-size="9" fill="var(--muted)">心烦 agitated | 心疼 sorry for</text>

      <!-- Lungs (Metal) -->
      <circle cx="230" cy="200" r="8" fill="var(--metal)" opacity="0.3" stroke="var(--metal)" stroke-width="1.5"/>
      <circle cx="270" cy="200" r="8" fill="var(--metal)" opacity="0.3" stroke="var(--metal)" stroke-width="1.5"/>
      <line x1="220" y1="197" x2="60" y2="130" stroke="var(--metal)" stroke-width="1" stroke-dasharray="3,2"/>
      <rect x="5" y="115" width="160" height="45" rx="4" fill="var(--surface)" stroke="var(--metal)" stroke-width="1.5"/>
      <text x="85" y="130" text-anchor="middle" font-size="11" fill="var(--metal)" font-weight="700">肺 fei -- LUNGS</text>
      <text x="85" y="144" text-anchor="middle" font-size="10" fill="var(--fg)">Sadness / Grief</text>
      <text x="85" y="156" text-anchor="middle" font-size="9" fill="var(--muted)">肺腑之言 heartfelt words</text>

      <!-- Liver (Wood) -->
      <ellipse cx="270" cy="240" rx="12" ry="8" fill="var(--wood)" opacity="0.3" stroke="var(--wood)" stroke-width="1.5"/>
      <line x1="282" y1="238" x2="390" y2="170" stroke="var(--wood)" stroke-width="1" stroke-dasharray="3,2"/>
      <rect x="390" y="155" width="160" height="45" rx="4" fill="var(--surface)" stroke="var(--wood)" stroke-width="1.5"/>
      <text x="470" y="170" text-anchor="middle" font-size="11" fill="var(--wood)" font-weight="700">肝 gan -- LIVER</text>
      <text x="470" y="184" text-anchor="middle" font-size="10" fill="var(--fg)">Anger</text>
      <text x="470" y="196" text-anchor="middle" font-size="9" fill="var(--muted)">肝火旺 liver-fire = irascible</text>

      <!-- Gallbladder -->
      <circle cx="278" cy="252" r="5" fill="var(--wood)" opacity="0.5" stroke="var(--wood)" stroke-width="1"/>
      <line x1="283" y1="252" x2="390" y2="240" stroke="var(--wood)" stroke-width="1" stroke-dasharray="3,2"/>
      <rect x="390" y="225" width="160" height="45" rx="4" fill="var(--surface)" stroke="var(--wood)" stroke-width="1.5"/>
      <text x="470" y="240" text-anchor="middle" font-size="11" fill="var(--wood)" font-weight="700">胆 dan -- GALLBLADDER</text>
      <text x="470" y="254" text-anchor="middle" font-size="10" fill="var(--fg)">Courage</text>
      <text x="470" y="266" text-anchor="middle" font-size="9" fill="var(--muted)">胆大 brave | 胆小 cowardly</text>

      <!-- Spleen (Earth) -->
      <ellipse cx="235" cy="260" rx="10" ry="7" fill="var(--earth)" opacity="0.3" stroke="var(--earth)" stroke-width="1.5"/>
      <line x1="224" y1="258" x2="60" y2="210" stroke="var(--earth)" stroke-width="1" stroke-dasharray="3,2"/>
      <rect x="5" y="195" width="160" height="45" rx="4" fill="var(--surface)" stroke="var(--earth)" stroke-width="1.5"/>
      <text x="85" y="210" text-anchor="middle" font-size="11" fill="var(--earth)" font-weight="700">脾 pi -- SPLEEN</text>
      <text x="85" y="224" text-anchor="middle" font-size="10" fill="var(--fg)">Worry / Temperament</text>
      <text x="85" y="236" text-anchor="middle" font-size="9" fill="var(--muted)">脾气 temper/temperament</text>

      <!-- Kidneys (Water) -->
      <circle cx="235" cy="290" r="7" fill="var(--water)" opacity="0.3" stroke="var(--water)" stroke-width="1.5"/>
      <circle cx="265" cy="290" r="7" fill="var(--water)" opacity="0.3" stroke="var(--water)" stroke-width="1.5"/>
      <line x1="225" y1="290" x2="60" y2="290" stroke="var(--water)" stroke-width="1" stroke-dasharray="3,2"/>
      <rect x="5" y="275" width="160" height="35" rx="4" fill="var(--surface)" stroke="var(--water)" stroke-width="1.5"/>
      <text x="85" y="290" text-anchor="middle" font-size="11" fill="var(--water)" font-weight="700">肾 shen -- KIDNEYS</text>
      <text x="85" y="304" text-anchor="middle" font-size="10" fill="var(--fg)">Fear</text>

      <!-- Intestines -->
      <path d="M238,310 Q250,320 262,310" fill="none" stroke="var(--fg)" stroke-width="1.5" opacity="0.4"/>
      <line x1="263" y1="310" x2="390" y2="310" stroke="var(--muted)" stroke-width="1" stroke-dasharray="3,2"/>
      <rect x="390" y="295" width="160" height="45" rx="4" fill="var(--surface)" stroke="var(--muted)" stroke-width="1.5"/>
      <text x="470" y="310" text-anchor="middle" font-size="11" fill="var(--muted)" font-weight="700">肠 chang -- INTESTINES</text>
      <text x="470" y="324" text-anchor="middle" font-size="10" fill="var(--fg)">Deep Feeling</text>
      <text x="470" y="336" text-anchor="middle" font-size="9" fill="var(--muted)">断肠 heartbroken (lit. severed)</text>

      <!-- ENGLISH SIDE -->
      <text x="750" y="58" text-anchor="middle" font-size="14" fill="var(--english)" font-weight="700">ENGLISH: Heart-Centric</text>

      <!-- Simplified body -->
      <ellipse cx="750" cy="100" rx="25" ry="30" fill="none" stroke="var(--fg)" stroke-width="1.5" opacity="0.4"/>
      <line x1="750" y1="130" x2="750" y2="300" stroke="var(--fg)" stroke-width="1.5" opacity="0.4"/>
      <line x1="750" y1="155" x2="700" y2="230" stroke="var(--fg)" stroke-width="1.5" opacity="0.4"/>
      <line x1="750" y1="155" x2="800" y2="230" stroke="var(--fg)" stroke-width="1.5" opacity="0.4"/>

      <!-- English Heart (dominant) -->
      <circle cx="750" cy="175" r="18" fill="var(--fire)" opacity="0.3" stroke="var(--fire)" stroke-width="2"/>
      <text x="750" y="180" text-anchor="middle" font-size="20" fill="var(--fire)" font-weight="700">&#9829;</text>

      <rect x="660" y="100" width="180" height="55" rx="4" fill="var(--surface)" stroke="var(--fire)" stroke-width="1.5"/>
      <text x="750" y="115" text-anchor="middle" font-size="11" fill="var(--fire)" font-weight="700">HEART -- Almost Everything</text>
      <text x="750" y="130" text-anchor="middle" font-size="10" fill="var(--fg)">heartbroken, heart of gold</text>
      <text x="750" y="143" text-anchor="middle" font-size="10" fill="var(--fg)">sweetheart, take heart</text>
      <text x="750" y="148" text-anchor="middle" font-size="10" fill="var(--fg)"></text>

      <!-- English Gut (minor) -->
      <rect x="660" y="210" width="180" height="35" rx="4" fill="var(--surface)" stroke="var(--muted)" stroke-width="1" stroke-dasharray="3,3"/>
      <text x="750" y="225" text-anchor="middle" font-size="10" fill="var(--muted)">GUT -- "gut feeling" (minor)</text>
      <text x="750" y="239" text-anchor="middle" font-size="9" fill="var(--muted)">Frozen idioms, not productive</text>

      <!-- English frozen idioms -->
      <rect x="660" y="255" width="180" height="55" rx="4" fill="var(--english-light)" stroke="var(--english)" stroke-width="1" stroke-dasharray="3,3"/>
      <text x="750" y="270" text-anchor="middle" font-size="10" fill="var(--english)" font-weight="600">FROZEN REMNANTS</text>
      <text x="750" y="285" text-anchor="middle" font-size="9" fill="var(--muted)">"vent your spleen" (archaic)</text>
      <text x="750" y="298" text-anchor="middle" font-size="9" fill="var(--muted)">"lily-livered" (archaic)</text>
      <text x="750" y="305" text-anchor="middle" font-size="9" fill="var(--muted)"></text>

      <!-- Comparison table -->
      <rect x="50" y="460" width="800" height="145" rx="6" fill="var(--accent-light)" stroke="var(--accent)" stroke-width="1.5"/>
      <text x="450" y="480" text-anchor="middle" font-size="12" fill="var(--accent)" font-weight="700">GRANULARITY COMPARISON</text>

      <!-- Table headers -->
      <text x="120" y="500" text-anchor="middle" font-size="10" fill="var(--fg)" font-weight="700">Emotion</text>
      <text x="280" y="500" text-anchor="middle" font-size="10" fill="var(--chinese)" font-weight="700">Chinese Organ</text>
      <text x="470" y="500" text-anchor="middle" font-size="10" fill="var(--english)" font-weight="700">English Organ</text>
      <text x="650" y="500" text-anchor="middle" font-size="10" fill="var(--fg)" font-weight="700">Pattern</text>

      <line x1="70" y1="505" x2="830" y2="505" stroke="var(--accent)" stroke-width="0.5"/>

      <text x="120" y="520" text-anchor="middle" font-size="10" fill="var(--fg)">Anger</text>
      <text x="280" y="520" text-anchor="middle" font-size="10" fill="var(--chinese)">肝 Liver</text>
      <text x="470" y="520" text-anchor="middle" font-size="10" fill="var(--muted)" font-style="italic">none (or archaic "livid")</text>
      <text x="650" y="520" text-anchor="middle" font-size="10" fill="var(--fg)">Chinese specific</text>

      <text x="120" y="538" text-anchor="middle" font-size="10" fill="var(--fg)">Courage</text>
      <text x="280" y="538" text-anchor="middle" font-size="10" fill="var(--chinese)">胆 Gallbladder</text>
      <text x="470" y="538" text-anchor="middle" font-size="10" fill="var(--muted)" font-style="italic">"guts" (vague)</text>
      <text x="650" y="538" text-anchor="middle" font-size="10" fill="var(--fg)">Chinese specific</text>

      <text x="120" y="556" text-anchor="middle" font-size="10" fill="var(--fg)">Temperament</text>
      <text x="280" y="556" text-anchor="middle" font-size="10" fill="var(--chinese)">脾 Spleen</text>
      <text x="470" y="556" text-anchor="middle" font-size="10" fill="var(--muted)" font-style="italic">none</text>
      <text x="650" y="556" text-anchor="middle" font-size="10" fill="var(--fg)">Chinese specific</text>

      <text x="120" y="574" text-anchor="middle" font-size="10" fill="var(--fg)">Deep sorrow</text>
      <text x="280" y="574" text-anchor="middle" font-size="10" fill="var(--chinese)">肠 Intestines</text>
      <text x="470" y="574" text-anchor="middle" font-size="10" fill="var(--muted)" font-style="italic">none</text>
      <text x="650" y="574" text-anchor="middle" font-size="10" fill="var(--fg)">Chinese specific</text>

      <text x="120" y="592" text-anchor="middle" font-size="10" fill="var(--fg)">General emotion</text>
      <text x="280" y="592" text-anchor="middle" font-size="10" fill="var(--chinese)">心 Heart</text>
      <text x="470" y="592" text-anchor="middle" font-size="10" fill="var(--english)">Heart</text>
      <text x="650" y="592" text-anchor="middle" font-size="10" fill="var(--fg)">Shared (universal)</text>
    </svg>
  </div>
  <figcaption>
    <h2>Figure 3 -- The Body-Organ Emotion Map: Chinese vs. English</h2>
    <p>Chinese maps emotions across seven internal organs following Traditional Chinese Medicine (TCM) theory: heart (joy/cognition), liver (anger), spleen (worry), lungs (grief), kidneys (fear), gallbladder (courage), intestines (deep feeling). English concentrates almost all emotional metaphor in the heart, with only "gut feeling" and frozen archaic idioms ("vent your spleen," "lily-livered") as traces of a once-broader system. Chinese organ-emotion mappings remain productive -- generating new expressions -- while English traces are fossilized.</p>
  </figcaption>
</figure>
</body>
</html>
