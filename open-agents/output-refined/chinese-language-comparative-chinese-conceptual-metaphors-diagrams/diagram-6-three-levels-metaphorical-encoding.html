<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Three Levels of Metaphorical Encoding -- Unique to Chinese</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --accent: #4361ee;
    --accent-light: #e8edff;
    --level1: #264653;
    --level2: #2a9d8f;
    --level3: #e63946;
    --english: #8338ec;
    --muted: #6c757d;
    --caption-bg: #f8f9fa;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --accent: #6b8aff;
      --accent-light: #1e2a4a;
      --level1: #a8dadc;
      --level2: #4ecdc4;
      --level3: #ff6b6b;
      --english: #b380ff;
      --muted: #9a9ab0;
      --caption-bg: #1a1a2e;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure { max-width: 940px; width: 100%; }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding: 1rem 1.5rem;
    background: var(--caption-bg);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  .chart-wrapper {
    overflow-x: auto;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--surface);
    padding: 1rem;
  }
  svg { display: block; margin: 0 auto; }
</style>
</head>
<body>
<figure>
  <div class="chart-wrapper">
    <svg viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
      <text x="450" y="28" text-anchor="middle" font-size="16" fill="var(--fg)" font-weight="700">Three Levels of Metaphorical Encoding</text>

      <!-- CHINESE COLUMN -->
      <text x="300" y="58" text-anchor="middle" font-size="14" fill="var(--accent)" font-weight="700">CHINESE: Three Levels</text>

      <!-- Level 3 (Top): Graphemic -->
      <rect x="70" y="75" width="460" height="105" rx="8" fill="var(--surface)" stroke="var(--level3)" stroke-width="2.5"/>
      <text x="300" y="95" text-anchor="middle" font-size="12" fill="var(--level3)" font-weight="700">LEVEL 3: GRAPHEMIC (unique to logographic scripts)</text>
      <text x="300" y="112" text-anchor="middle" font-size="11" fill="var(--fg)">Characters visually encode metaphor in their structure</text>
      <text x="130" y="138" font-size="11" fill="var(--fg)">Example: <tspan font-size="18" font-weight="700" fill="var(--level3)">想</tspan> contains <tspan font-size="16" font-weight="600" fill="var(--level3)">心</tspan> (heart radical)</text>
      <text x="130" y="155" font-size="10" fill="var(--muted)">Visual proof: THINKING is a heart-mind activity</text>
      <text x="130" y="170" font-size="10" fill="var(--fg)">明 = 日+月 (sun+moon = bright) -- meaning visible in the character</text>

      <!-- Arrow down -->
      <line x1="300" y1="180" x2="300" y2="195" stroke="var(--fg)" stroke-width="1.5"/>
      <polygon points="295,195 305,195 300,202" fill="var(--fg)"/>

      <!-- Level 2 (Middle): Lexical -->
      <rect x="70" y="205" width="460" height="95" rx="8" fill="var(--surface)" stroke="var(--level2)" stroke-width="2.5"/>
      <text x="300" y="225" text-anchor="middle" font-size="12" fill="var(--level2)" font-weight="700">LEVEL 2: LEXICAL (shared with many languages)</text>
      <text x="300" y="242" text-anchor="middle" font-size="11" fill="var(--fg)">Compound words encode metaphorical mappings</text>
      <text x="130" y="265" font-size="11" fill="var(--fg)">电脑 = electric + brain = COMPUTER IS ELECTRONIC BRAIN</text>
      <text x="130" y="280" font-size="10" fill="var(--fg)">开心 = open + heart = HAPPINESS IS OPEN HEART</text>
      <text x="130" y="293" font-size="10" fill="var(--muted)">~73% of Chinese vocabulary are two-character compounds</text>

      <!-- Arrow down -->
      <line x1="300" y1="300" x2="300" y2="315" stroke="var(--fg)" stroke-width="1.5"/>
      <polygon points="295,315 305,315 300,322" fill="var(--fg)"/>

      <!-- Level 1 (Bottom): Cognitive -->
      <rect x="70" y="325" width="460" height="95" rx="8" fill="var(--surface)" stroke="var(--level1)" stroke-width="2.5"/>
      <text x="300" y="345" text-anchor="middle" font-size="12" fill="var(--level1)" font-weight="700">LEVEL 1: COGNITIVE (shared with all languages)</text>
      <text x="300" y="362" text-anchor="middle" font-size="11" fill="var(--fg)">Conceptual metaphors structure abstract thought</text>
      <text x="130" y="385" font-size="11" fill="var(--fg)">THINKING IS A HEART-MIND ACTIVITY</text>
      <text x="130" y="400" font-size="10" fill="var(--fg)">ANGER IS HEAT -- TIME IS SPACE -- MORE IS UP</text>
      <text x="130" y="413" font-size="10" fill="var(--muted)">Lakoff &amp; Johnson (1980): Conceptual Metaphor Theory</text>

      <!-- ENGLISH COLUMN -->
      <text x="720" y="58" text-anchor="middle" font-size="14" fill="var(--english)" font-weight="700">ENGLISH: Two Levels</text>

      <!-- English Level 3: MISSING -->
      <rect x="580" y="75" width="280" height="105" rx="8" fill="var(--surface)" stroke="var(--english)" stroke-width="1.5" stroke-dasharray="8,5"/>
      <text x="720" y="105" text-anchor="middle" font-size="12" fill="var(--english)" font-weight="700">LEVEL 3: ABSENT</text>
      <text x="720" y="125" text-anchor="middle" font-size="11" fill="var(--muted)">Letters encode sounds only</text>
      <text x="720" y="145" text-anchor="middle" font-size="10" fill="var(--muted)">"think" -- t,h,i,n,k give</text>
      <text x="720" y="160" text-anchor="middle" font-size="10" fill="var(--muted)">zero visual clue to meaning</text>
      <text x="720" y="175" text-anchor="middle" font-size="10" fill="var(--english)" font-weight="600">Structurally impossible</text>

      <!-- English Level 2: Present but less transparent -->
      <rect x="580" y="205" width="280" height="95" rx="8" fill="var(--surface)" stroke="var(--level2)" stroke-width="1.5"/>
      <text x="720" y="225" text-anchor="middle" font-size="12" fill="var(--level2)" font-weight="700">LEVEL 2: PRESENT</text>
      <text x="720" y="242" text-anchor="middle" font-size="11" fill="var(--fg)">But less transparent</text>
      <text x="600" y="265" font-size="10" fill="var(--fg)">airport = air + port (transparent)</text>
      <text x="600" y="280" font-size="10" fill="var(--fg)">understand = under + stand (opaque)</text>
      <text x="600" y="293" font-size="10" fill="var(--muted)">Many compounds etymologically opaque</text>

      <!-- English Level 1: Same -->
      <rect x="580" y="325" width="280" height="95" rx="8" fill="var(--surface)" stroke="var(--level1)" stroke-width="1.5"/>
      <text x="720" y="345" text-anchor="middle" font-size="12" fill="var(--level1)" font-weight="700">LEVEL 1: SAME</text>
      <text x="720" y="362" text-anchor="middle" font-size="11" fill="var(--fg)">Identical cognitive metaphors</text>
      <text x="600" y="385" font-size="10" fill="var(--fg)">ANGER IS HEAT: "burning rage"</text>
      <text x="600" y="400" font-size="10" fill="var(--fg)">TIME IS SPACE: "looking forward"</text>
      <text x="600" y="413" font-size="10" fill="var(--muted)">Universal human cognition</text>

      <!-- Key insight -->
      <rect x="70" y="445" width="770" height="60" rx="6" fill="var(--accent-light)" stroke="var(--accent)" stroke-width="1.5"/>
      <text x="455" y="465" text-anchor="middle" font-size="12" fill="var(--accent)" font-weight="700">KEY PATTERN: THE MISSING LAYER</text>
      <text x="455" y="483" text-anchor="middle" font-size="11" fill="var(--fg)">Chinese encodes metaphor at a third level (graphemic) that is structurally impossible in any alphabetic script.</text>
      <text x="455" y="499" text-anchor="middle" font-size="10" fill="var(--fg)">This means Chinese writing is not just a transcription of speech -- it is a parallel meaning-encoding system with its own metaphorical layer.</text>
    </svg>
  </div>
  <figcaption>
    <h2>Figure 6 -- Three Levels of Metaphorical Encoding: Chinese vs. English</h2>
    <p>Chinese uniquely operates with metaphor at three distinct levels: cognitive (shared with all languages -- conceptual metaphors like ANGER IS HEAT), lexical (shared with many languages -- compound words like 电脑 "electric-brain" = computer), and graphemic (unique to logographic scripts -- characters like 想 visually containing the heart radical 心). Alphabetic scripts structurally cannot encode metaphor at the graphemic level because letters represent sounds, not meanings.</p>
  </figcaption>
</figure>
</body>
</html>
