<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Dual-Axis Time Model -- Chinese vs. English</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --accent: #4361ee;
    --accent-light: #e8edff;
    --chinese: #e63946;
    --chinese-light: #ffe0e3;
    --english: #8338ec;
    --english-light: #ede0ff;
    --shared: #2a9d8f;
    --shared-light: #d4f5f0;
    --muted: #6c757d;
    --caption-bg: #f8f9fa;
    --grid: #e0e0e0;
    --warn: #e9c46a;
    --warn-bg: #fef9e7;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --accent: #6b8aff;
      --accent-light: #1e2a4a;
      --chinese: #ff6b6b;
      --chinese-light: #3a1a1a;
      --english: #b380ff;
      --english-light: #2a1a3a;
      --shared: #4ecdc4;
      --shared-light: #1a3a38;
      --muted: #9a9ab0;
      --caption-bg: #1a1a2e;
      --grid: #2d2d44;
      --warn: #ffe66d;
      --warn-bg: #2a2a1a;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure { max-width: 940px; width: 100%; }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding: 1rem 1.5rem;
    background: var(--caption-bg);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  .chart-wrapper {
    overflow-x: auto;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--surface);
    padding: 1rem;
  }
  svg { display: block; margin: 0 auto; }
  .legend {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 1.2rem;
    margin-top: 1rem;
    padding: 0.8rem;
    background: var(--surface);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.8rem;
    color: var(--muted);
  }
  .legend-swatch {
    width: 24px;
    height: 3px;
    border-radius: 2px;
  }
</style>
</head>
<body>
<figure>
  <div class="chart-wrapper">
    <svg viewBox="0 0 900 560" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
      <!-- Title -->
      <text x="450" y="30" text-anchor="middle" font-size="16" fill="var(--fg)" font-weight="700">Temporal Metaphor Axes: Chinese vs. English</text>

      <!-- ENGLISH PANEL -->
      <rect x="30" y="55" width="400" height="220" rx="8" fill="var(--english-light)" stroke="var(--english)" stroke-width="1.5"/>
      <text x="230" y="78" text-anchor="middle" font-size="14" fill="var(--english)" font-weight="700">ENGLISH -- Horizontal Only</text>

      <!-- Horizontal axis -->
      <line x1="80" y1="160" x2="380" y2="160" stroke="var(--shared)" stroke-width="3" marker-end="url(#arrowShared)"/>
      <line x1="80" y1="160" x2="80" y2="160" stroke="var(--shared)" stroke-width="3"/>
      <!-- Arrow markers -->
      <defs>
        <marker id="arrowShared" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
          <path d="M0,0 L8,3 L0,6" fill="var(--shared)"/>
        </marker>
        <marker id="arrowChinese" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
          <path d="M0,0 L8,3 L0,6" fill="var(--chinese)"/>
        </marker>
      </defs>

      <!-- English horizontal labels -->
      <text x="85" y="150" font-size="11" fill="var(--fg)" font-weight="600">PAST</text>
      <text x="210" y="150" text-anchor="middle" font-size="11" fill="var(--fg)" font-weight="600">NOW</text>
      <text x="365" y="150" text-anchor="end" font-size="11" fill="var(--fg)" font-weight="600">FUTURE</text>
      <circle cx="210" cy="160" r="4" fill="var(--fg)"/>

      <text x="95" y="185" font-size="10" fill="var(--english)">"looking back"</text>
      <text x="95" y="198" font-size="10" fill="var(--english)">"behind us"</text>
      <text x="305" y="185" font-size="10" fill="var(--english)">"looking forward"</text>
      <text x="305" y="198" font-size="10" fill="var(--english)">"ahead of us"</text>

      <!-- Vertical axis ABSENT -->
      <rect x="80" y="215" width="300" height="45" rx="5" fill="var(--surface)" stroke="var(--border)" stroke-width="1" stroke-dasharray="4,3"/>
      <text x="230" y="235" text-anchor="middle" font-size="12" fill="var(--muted)" font-style="italic">Vertical axis: NOT USED for time</text>
      <text x="230" y="250" text-anchor="middle" font-size="10" fill="var(--muted)">No "up = past" or "down = future" in English</text>

      <!-- CHINESE PANEL -->
      <rect x="470" y="55" width="400" height="340" rx="8" fill="var(--chinese-light)" stroke="var(--chinese)" stroke-width="1.5"/>
      <text x="670" y="78" text-anchor="middle" font-size="14" fill="var(--chinese)" font-weight="700">CHINESE -- Horizontal + Vertical</text>

      <!-- Chinese horizontal axis (primary) -->
      <text x="670" y="100" text-anchor="middle" font-size="11" fill="var(--shared)" font-weight="700">PRIMARY AXIS: Horizontal (front/back)</text>
      <line x1="520" y1="130" x2="820" y2="130" stroke="var(--shared)" stroke-width="3" marker-end="url(#arrowShared)"/>
      <circle cx="650" cy="130" r="4" fill="var(--fg)"/>
      <text x="530" y="122" font-size="10" fill="var(--fg)" font-weight="600">PAST</text>
      <text x="650" y="122" text-anchor="middle" font-size="10" fill="var(--fg)" font-weight="600">NOW</text>
      <text x="805" y="122" text-anchor="end" font-size="10" fill="var(--fg)" font-weight="600">FUTURE</text>

      <text x="535" y="152" font-size="10" fill="var(--chinese)">前天 qiantiān</text>
      <text x="535" y="165" font-size="9" fill="var(--muted)">"front-day" = 2 days ago</text>
      <text x="735" y="152" font-size="10" fill="var(--chinese)">以后 yǐhòu</text>
      <text x="735" y="165" font-size="9" fill="var(--muted)">"after" = in the future</text>

      <!-- Chinese vertical axis (additional) -->
      <text x="670" y="200" text-anchor="middle" font-size="11" fill="var(--chinese)" font-weight="700">ADDITIONAL AXIS: Vertical (up/down)</text>
      <line x1="670" y1="220" x2="670" y2="370" stroke="var(--chinese)" stroke-width="3" marker-end="url(#arrowChinese)"/>
      <circle cx="670" cy="295" r="4" fill="var(--fg)"/>

      <!-- Up = earlier -->
      <text x="655" y="233" text-anchor="end" font-size="10" fill="var(--fg)" font-weight="600">EARLIER</text>
      <text x="690" y="233" font-size="10" fill="var(--chinese)">上 shàng (up)</text>
      <text x="690" y="248" font-size="9" fill="var(--muted)">上个星期 = "up-week" = last week</text>
      <text x="690" y="261" font-size="9" fill="var(--muted)">上午 = "up-noon" = morning</text>

      <!-- Down = later -->
      <text x="655" y="355" text-anchor="end" font-size="10" fill="var(--fg)" font-weight="600">LATER</text>
      <text x="690" y="345" font-size="10" fill="var(--chinese)">下 xià (down)</text>
      <text x="690" y="358" font-size="9" fill="var(--muted)">下个月 = "down-month" = next month</text>
      <text x="690" y="371" font-size="9" fill="var(--muted)">下午 = "down-noon" = afternoon</text>

      <!-- Key insight box -->
      <rect x="120" y="300" width="330" height="90" rx="6" fill="var(--accent-light)" stroke="var(--accent)" stroke-width="1.5"/>
      <text x="285" y="320" text-anchor="middle" font-size="12" fill="var(--accent)" font-weight="700">KEY PATTERN</text>
      <text x="285" y="338" text-anchor="middle" font-size="11" fill="var(--fg)">Chinese has MORE axes, not a DIFFERENT axis.</text>
      <text x="285" y="354" text-anchor="middle" font-size="11" fill="var(--fg)">Both languages use horizontal as primary.</text>
      <text x="285" y="370" text-anchor="middle" font-size="11" fill="var(--fg)">Chinese adds a vertical axis English lacks.</text>

      <!-- Boroditsky controversy callout -->
      <rect x="100" y="415" width="700" height="55" rx="6" fill="var(--warn-bg)" stroke="var(--warn)" stroke-width="1.5"/>
      <text x="450" y="435" text-anchor="middle" font-size="11" fill="var(--warn)" font-weight="700">REPLICATION CONTROVERSY (Boroditsky 2001 vs. Chen 2007)</text>
      <text x="450" y="452" text-anchor="middle" font-size="10" fill="var(--fg)">Vertical metaphors exist in the language (confirmed). Whether they shape nonlinguistic temporal cognition is contested.</text>
      <text x="450" y="465" text-anchor="middle" font-size="10" fill="var(--muted)">3 failed replications (Chen 2007, Tse &amp; Altarriba 2008, January &amp; Kako 2007) vs. supporting studies (Boroditsky 2011, Liu &amp; Zhang 2009)</text>

      <!-- Frequency note -->
      <rect x="100" y="485" width="700" height="55" rx="6" fill="var(--shared-light)" stroke="var(--shared)" stroke-width="1.5"/>
      <text x="450" y="505" text-anchor="middle" font-size="11" fill="var(--shared)" font-weight="700">FREQUENCY DATA</text>
      <text x="450" y="522" text-anchor="middle" font-size="10" fill="var(--fg)">In Chinese everyday speech: ~64% horizontal metaphors for time, ~36% vertical metaphors (Chen 2007 corpus study)</text>
      <text x="450" y="536" text-anchor="middle" font-size="10" fill="var(--fg)">Horizontal (前/后) is primary in BOTH languages. Vertical (上/下) is additional in Chinese, absent in English.</text>
    </svg>
  </div>
  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background:var(--shared)"></div>Shared: Horizontal Time Axis (primary in both)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--chinese)"></div>Chinese Only: Vertical Time Axis (additional)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--english)"></div>English: Horizontal only</div>
  </div>
  <figcaption>
    <h2>Figure 1 -- The Dual-Axis Time Model: Chinese vs. English</h2>
    <p>Chinese has two spatial axes available for temporal metaphor: the horizontal front/back axis (shared with English, and primary in both languages) and the vertical up/down axis (absent in English). The vertical axis maps 上 (up) to earlier and 下 (down) to later, but is restricted to specific contexts (weeks, months, half-days, semesters). Boroditsky's (2001) claim that this vertical metaphor shapes nonlinguistic cognition remains contested after multiple failed replications.</p>
  </figcaption>
</figure>
</body>
</html>
