<!-- Diagram: The Evidential Weight Framework -->
<!-- Type: flowchart -->
<!-- Generated: 2026-03-31 -->
<!-- Description: Decision tree providing a framework for evaluating the evidential weight of any first-person account from a non-speaking autistic individual, presented as a thinking tool rather than a gatekeeping mechanism. -->

<figure class="concept-diagram" id="diagram-evidential-weight">
  <div class="diagram-container">
    <pre class="mermaid">
flowchart TD
    START["Evaluating a First-Person Account\nfrom a Non-Speaking Autistic Individual"]

    Q1["Q1: What communication method?"]
    START --> Q1

    Q1 -->|"Standard AAC\n(Proloquo2Go, typing,\neye-gaze device)"| AAC["Standard AAC"]
    Q1 -->|"Independent typing\n(learned through RPM/FC\nbut now independent)"| INDEP["Independent Typing"]
    Q1 -->|"Supported method\n(RPM, S2C, alphabet\nboard with holder)"| SUPP["Supported Method"]
    Q1 -->|"Facilitated communication\n(physical contact\nwith facilitator)"| FC["FC"]

    AAC --> Q2A["Q2: Facilitator present?"]
    Q2A -->|"No"| HIGH["HIGH CONFIDENCE\nMethod is uncontested\nAuthorship is visually apparent\nStrongest evidential weight"]

    INDEP --> Q2B["Q2: Formal verification\nconducted?"]
    Q2B -->|"Yes, passed"| HIGH
    Q2B -->|"No formal study"| MOD["MODERATE CONFIDENCE\nIndependent behavior observed\nbut not formally verified\nContent evaluation matters"]

    SUPP --> Q3["Q3: Board/device holder present?"]
    Q3 -->|"Yes"| Q4["Q4: Has facilitator influence\nbeen ruled out?"]
    Q4 -->|"Yes, through\ncontrolled study"| MOD
    Q4 -->|"No controlled\nstudy conducted"| UNCERTAIN["UNCERTAIN\nMethod is susceptible to\nfacilitator influence\nContent may be authentic\nbut verification absent"]

    FC --> Q5["Q4: Physical contact\nduring communication?"]
    Q5 -->|"Yes"| LOW["LOW CONFIDENCE\nMethod has failed controlled\nstudies consistently\nAuthorship cannot be confirmed\nwithout verification study"]

    subgraph RESPONSE["APPROPRIATE RESPONSE AT EACH LEVEL"]
        R_HIGH["HIGH: Cite as first-person testimony.\nTreat like any self-report."]
        R_MOD["MODERATE: Note method and\nverification status. Evaluate\ncontent alongside method."]
        R_UNC["UNCERTAIN: Present account but\nnote evidential uncertainty.\nNeither accept nor reject."]
        R_LOW["LOW: Acknowledge account exists.\nNote that method has failed\ncontrolled validation. Do not\npresent as verified testimony."]
    end

    HIGH --> R_HIGH
    MOD --> R_MOD
    UNCERTAIN --> R_UNC
    LOW --> R_LOW

    NOTE["This framework is a THINKING TOOL,\nnot a gatekeeping mechanism.\nThe goal is honest evaluation,\nnot dismissal of voices."]

  <figcaption>
    <strong>Figure 6:</strong> The evidential weight framework for evaluating first-person accounts. This decision tree helps readers assess the evidential weight of any account based on communication method, facilitator presence, and verification status. Standard AAC without a facilitator provides the highest confidence (Zimmerman, Blasko). Independent typing without formal verification provides moderate confidence (Kedar). Supported methods without controlled studies produce uncertainty (Higashida, Tito). FC with physical contact provides the lowest confidence based on the method's consistent failure in controlled studies (Sequenzia). This is a thinking tool for honest evaluation, not a mechanism for dismissing voices. A person at any level may be fully authoring their communication; the framework maps what the evidence can and cannot confirm.
  </figcaption>
</figure>
