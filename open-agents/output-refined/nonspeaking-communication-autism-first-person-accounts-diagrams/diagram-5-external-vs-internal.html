  <figcaption>
    <strong>Figure 5:</strong> The disconnect between external behavioral presentation and reported internal experience. What observers see -- rocking, no eye contact, silence, apparent inattention, test failure -- is consistently described by first-person authors as masking a rich internal world: self-regulation rather than purposeless movement, sensory processing rather than disengagement, full comprehension with motor response failure rather than cognitive absence, and active thinking behind apparent inattention. This is the central claim of first-person accounts. The consistency of these reports across independent accounts using different communication methods is itself evidence, though verification of internal experience claims varies by author and method.
  </figcaption>
