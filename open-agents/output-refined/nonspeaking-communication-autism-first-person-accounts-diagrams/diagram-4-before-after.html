  <figcaption>
    <strong>Figure 4:</strong> The before/after communication access divide. Zimmerman spent 18 years in segregated classrooms with no communication tool, then received Proloquo2Go and went on to earn two degrees and lead a national nonprofit. Kedar spent ~7 years in ABA drills for skills he already possessed, then learned to communicate through RPM and later independent typing, becoming a published author at 16. In both cases, what changed was not intelligence, capacity, or understanding -- it was access to a method that could reveal what was already there. <strong>Note:</strong> These are individual cases demonstrating the ceiling of possibility, not population-level data. Kedar's authorship verification is intermediate (no formal blinded study); Zimmerman's is unambiguous.
  </figcaption>
