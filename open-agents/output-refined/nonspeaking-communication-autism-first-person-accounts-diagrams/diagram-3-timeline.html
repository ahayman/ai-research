<!-- Diagram: Timeline of Major Non-Speaking Autistic Authors and Their Works -->
<!-- Type: timeline -->
<!-- Generated: 2026-03-31 -->
<!-- Description: Biographical timeline showing when each major non-speaking autistic author began communicating, publishing, and contributing to public discourse, demonstrating the acceleration of non-speaking voices over two decades. -->

<figure class="concept-diagram" id="diagram-timeline">
  <div class="diagram-container">
    <pre class="mermaid">
timeline
    title Non-Speaking Autistic Voices: Three Decades of Emergence

    section Pioneers (1990s-2000s)
        ~1991 : Soma develops RPM for Tito
        2000 : Tito publishes Beyond the Silence
        ~2003 : Kedar begins RPM with Soma (age ~7)
        2003 : Tito publishes The Mind Tree

    section First Wave (2007-2013)
        2007 : Higashida publishes The Reason I Jump (Japan, age 13)
        ~2008 : Sequenzia writing through FC
        2012 : Kedar publishes Ido in Autismland (age ~16)
               : Savarese enters Oberlin College
        2013 : The Reason I Jump English translation (Mitchell)
               : Global bestseller

    section Breakthrough (2014-2018)
        ~2014 : Zimmerman receives Proloquo2Go (age 18)
              : First AAC device ever provided
        2017 : Savarese graduates Oberlin Phi Beta Kappa
             : Deej documentary released
        2018 : Kedar publishes In Two Worlds

    section Current Era (2020-2025)
        2020 : Higashida documentary, Sundance Audience Award
        2021 : This Is Not About Me documentary (Zimmerman)
             : Lancet Commission proposes "profound autism"
        2024 : Blasko receives UW Trailblazer recognition
             : Jaswal literacy study published and rebutted
        2025 : Zimmerman named Forbes Accessibility 100
             : Non-speaking voices increasingly visible in policy
    </pre>
  </div>
  <figcaption>
    <strong>Figure 3:</strong> Timeline of major non-speaking autistic authors and their works. From Soma Mukhopadhyay developing RPM for Tito in 1991 through Zimmerman's Forbes Accessibility 100 recognition in 2025, the timeline shows an accelerating emergence of non-speaking autistic voices in public discourse. The progression reflects both the development of new communication methods and the growing societal recognition that non-speaking individuals have perspectives the world needs to hear. Communication methods range from RPM (Kedar, Tito) to FC (Sequenzia) to standard AAC (Zimmerman, Blasko) -- the diversity of methods is itself part of the story.
  </figcaption>
</figure>
