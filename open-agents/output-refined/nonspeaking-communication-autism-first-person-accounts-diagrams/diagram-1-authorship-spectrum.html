<!-- Diagram: The Authorship Verification Spectrum -->
<!-- Type: flowchart -->
<!-- Generated: 2026-03-31 -->
<!-- Description: Graduated spectrum mapping prominent non-speaking autistic authors along a continuum of authorship verifiability, from standard AAC (most verifiable) to facilitated communication (least verifiable). Position reflects the method's evidentiary status, not a judgment about the person. -->

<figure class="concept-diagram" id="diagram-authorship-spectrum">
  <div class="diagram-container">
    <pre class="mermaid">
flowchart LR
    subgraph MOST["MOST VERIFIABLE\nStandard AAC, no facilitator"]
        M1["Jordyn Zimmerman\nProloquo2Go, types independently\nNo facilitator involvement\nVisually apparent independence"]
        M2["Grant Blasko\nStandard AAC technology\nEvidence-based practice"]
    end

    subgraph MODERATE["MODERATELY VERIFIABLE\nIndependent typing, initially\nlearned through supported method"]
        MOD1["Ido Kedar\nLearned through RPM (age 7)\nTransitioned to iPad typing\nVideos show typing without\nphysical contact\nNo formal blinded study"]
    end

    subgraph CONTESTED_M["CONTESTED\nHandwriting/typing with\ndeveloper or family present"]
        C1["Naoki Higashida\nAlphabet grid, typing\nVideos of independent use exist\nFein &amp; Kamio (2014) raised\nauthorship doubts\nMother often present"]
        C2["Tito Mukhopadhyay\nHandwriting (preferred)\nSacks endorsed authenticity\nBUT: Failed blind tests\ndocumented in Strange Son\nMother (Soma) developed RPM"]
    end

    subgraph LEAST["LEAST VERIFIABLE\nFacilitated communication"]
        L1["Amy Sequenzia\nFC is primary method\nFacilitator provides\nphysical support\nNo controlled verification\nconducted"]
    end

    MOST ==> MODERATE ==> CONTESTED_M ==> LEAST

    NOTE["This spectrum reflects the\nEVIDENTIARY STATUS of the METHOD\nnot a judgment about the PERSON.\nA person using FC may be fully\nauthoring their communication.\nThe gap is in verification,\nnot necessarily in authorship."]

    style MOST fill:#dcfce7,stroke:#16a34a,color:#14532d
    style M1 fill:#bbf7d0,stroke:#16a34a,color:#14532d
    style M2 fill:#bbf7d0,stroke:#16a34a,color:#14532d
    style MODERATE fill:#dbeafe,stroke:#2563eb,color:#1e3a5f
    style MOD1 fill:#bfdbfe,stroke:#2563eb,color:#1e3a5f
    style CONTESTED_M fill:#fef3c7,stroke:#d97706,color:#78350f
    style C1 fill:#fde68a,stroke:#d97706,color:#78350f
    style C2 fill:#fde68a,stroke:#d97706,color:#78350f
    style LEAST fill:#fee2e2,stroke:#dc2626,color:#7f1d1d
    style L1 fill:#fecaca,stroke:#dc2626,color:#7f1d1d
    style NOTE fill:#f3f4f6,stroke:#6b7280,color:#374151
    </pre>
  </div>
  <figcaption>
    <strong>Figure 1:</strong> The authorship verification spectrum. Prominent non-speaking autistic authors are positioned according to the verifiability of their communication method, not their personal worth or the likely truth of their accounts. Zimmerman and Blasko use standard AAC independently (most verifiable). Kedar transitioned from RPM to independent typing (moderately verifiable, no formal blinded study). Higashida's authorship was questioned by researchers Fein and Kamio (2014), and Tito Mukhopadhyay failed documented blind tests. Sequenzia communicates through FC (least verifiable, no controlled verification). All individuals may be fully authoring their communication; the spectrum maps the state of the evidence, not the state of the authorship.
  </figcaption>
</figure>
