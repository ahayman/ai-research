<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Body-to-Mind Metaphor Highway</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #f8f9fa;
    color: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 2rem;
  }
  figure {
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
    max-width: 1060px;
    width: 100%;
  }
  .diagram-title {
    text-align: center;
    font-size: 1.3rem;
    font-weight: 700;
    margin-bottom: 2rem;
    color: #1a1a2e;
  }
  .svg-container {
    display: flex;
    justify-content: center;
    overflow-x: auto;
    padding: 1rem 0;
  }
  svg text {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid #e9ecef;
  }
  figcaption strong {
    display: block;
    font-size: 1.1rem;
    color: #1a1a2e;
    margin-bottom: 0.4rem;
  }
  figcaption span {
    font-size: 0.88rem;
    color: #6c757d;
    line-height: 1.6;
    display: block;
  }
  .legend {
    display: flex;
    justify-content: center;
    gap: 1.5rem;
    margin-top: 1.25rem;
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.82rem;
    color: #495057;
  }
  .legend-swatch {
    width: 14px;
    height: 14px;
    border-radius: 3px;
    border: 1px solid rgba(0,0,0,0.15);
  }
  @media (prefers-color-scheme: dark) {
    body { background: #1a1a2e; color: #e9ecef; }
    figure { background: #2d2d44; box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
    .diagram-title { color: #e9ecef; }
    figcaption { border-top-color: #3d3d5c; }
    figcaption strong { color: #e9ecef; }
    figcaption span { color: #adb5bd; }
    .legend-item { color: #adb5bd; }
    svg text { fill: #e9ecef; }
    svg text.dark-fill { fill: #1a1a2e; }
    svg text.white-fill { fill: #ffffff; }
  }
  @media print {
    body { background: #fff; padding: 0; }
    figure { box-shadow: none; border: 1px solid #ccc; break-inside: avoid; }
  }
</style>
</head>
<body>
<figure>
  <div class="diagram-title">The Body-to-Mind Metaphor Highway (Sweetser 1990)</div>
  <div class="svg-container">
    <svg viewBox="0 0 1000 900" width="1000" height="900" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="map-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#F39C12"/>
        </marker>
        <marker id="dir-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#adb5bd"/>
        </marker>
        <linearGradient id="highway-grad" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="#2E86AB" stop-opacity="0.1"/>
          <stop offset="50%" stop-color="#F39C12" stop-opacity="0.08"/>
          <stop offset="100%" stop-color="#7B68EE" stop-opacity="0.1"/>
        </linearGradient>
      </defs>

      <!-- Column Headers -->
      <rect x="40" y="20" width="280" height="50" rx="10" fill="#2E86AB" opacity="0.12"/>
      <text x="180" y="42" text-anchor="middle" font-size="16" font-weight="700" fill="#2E86AB">PHYSICAL SENSE</text>
      <text x="180" y="60" text-anchor="middle" font-size="10" fill="#6c757d">(Source Domain)</text>

      <text x="500" y="48" text-anchor="middle" font-size="13" font-weight="700" fill="#F39C12">METAPHORICAL</text>
      <text x="500" y="62" text-anchor="middle" font-size="13" font-weight="700" fill="#F39C12">MAPPING</text>

      <rect x="680" y="20" width="280" height="50" rx="10" fill="#7B68EE" opacity="0.12"/>
      <text x="820" y="42" text-anchor="middle" font-size="16" font-weight="700" fill="#7B68EE">COGNITIVE DOMAIN</text>
      <text x="820" y="60" text-anchor="middle" font-size="10" fill="#6c757d">(Target Domain)</text>

      <!-- Directional arrow at top -->
      <line x1="100" y1="85" x2="880" y2="85" stroke="#adb5bd" stroke-width="1.5" marker-end="url(#dir-arrow)"/>
      <text x="490" y="80" text-anchor="middle" font-size="10" fill="#adb5bd" font-weight="600">Physical -> Mental (almost never reversed)</text>

      <!-- Highway background -->
      <rect x="350" y="95" width="300" height="660" rx="8" fill="url(#highway-grad)"/>

      <!-- ==================== ROW 1: VISION -> KNOWLEDGE ==================== -->
      <rect x="50" y="110" width="260" height="110" rx="12" fill="#2E86AB" opacity="0.08" stroke="#2E86AB" stroke-width="2"/>
      <circle cx="85" cy="145" r="20" fill="#2E86AB" opacity="0.2" stroke="#2E86AB" stroke-width="1.5"/>
      <text x="85" y="149" text-anchor="middle" font-size="14">👁</text>
      <text x="195" y="140" text-anchor="middle" font-size="18" font-weight="700" fill="#2E86AB">VISION</text>
      <text x="195" y="160" text-anchor="middle" font-size="10" fill="#6c757d">Most reliable, voluntary, detailed</text>
      <text x="180" y="180" font-size="9" fill="#2E86AB" font-style="italic">"I see what you mean"</text>
      <text x="180" y="194" font-size="9" fill="#2E86AB" font-style="italic">"an illuminating insight"</text>
      <text x="180" y="208" font-size="8" fill="#6c757d">Lat. videre -> evidence, supervise</text>

      <!-- Arrow -->
      <line x1="315" y1="165" x2="680" y2="165" stroke="#F39C12" stroke-width="3" marker-end="url(#map-arrow)" opacity="0.8"/>
      <rect x="420" y="148" width="160" height="22" rx="11" fill="#F39C12" opacity="0.15"/>
      <text x="500" y="163" text-anchor="middle" font-size="10" font-weight="700" fill="#F39C12">SEEING IS KNOWING</text>

      <rect x="690" y="110" width="260" height="110" rx="12" fill="#7B68EE" opacity="0.08" stroke="#7B68EE" stroke-width="2"/>
      <text x="820" y="140" text-anchor="middle" font-size="18" font-weight="700" fill="#7B68EE">KNOWLEDGE</text>
      <text x="820" y="160" text-anchor="middle" font-size="10" fill="#6c757d">Intellection, understanding</text>
      <text x="820" y="180" text-anchor="middle" font-size="9" fill="#7B68EE" font-style="italic">"a clear explanation"</text>
      <text x="820" y="194" text-anchor="middle" font-size="9" fill="#7B68EE" font-style="italic">"in view of the evidence"</text>
      <text x="820" y="208" text-anchor="middle" font-size="8" fill="#6c757d">Light = understanding; dark = ignorance</text>

      <!-- ==================== ROW 2: HEARING -> OBEDIENCE ==================== -->
      <rect x="50" y="240" width="260" height="110" rx="12" fill="#2E86AB" opacity="0.08" stroke="#2E86AB" stroke-width="2"/>
      <circle cx="85" cy="275" r="20" fill="#2E86AB" opacity="0.2" stroke="#2E86AB" stroke-width="1.5"/>
      <text x="85" y="279" text-anchor="middle" font-size="14">👂</text>
      <text x="195" y="270" text-anchor="middle" font-size="18" font-weight="700" fill="#2E86AB">HEARING</text>
      <text x="195" y="290" text-anchor="middle" font-size="10" fill="#6c757d">Receptive, cannot be shut off</text>
      <text x="180" y="310" font-size="9" fill="#2E86AB" font-style="italic">"I hear you"</text>
      <text x="180" y="324" font-size="9" fill="#2E86AB" font-style="italic">"she wouldn't listen to reason"</text>
      <text x="180" y="338" font-size="8" fill="#6c757d">Lat. ob-audire -> obey</text>

      <line x1="315" y1="295" x2="680" y2="295" stroke="#F39C12" stroke-width="3" marker-end="url(#map-arrow)" opacity="0.8"/>
      <rect x="410" y="278" width="180" height="22" rx="11" fill="#F39C12" opacity="0.15"/>
      <text x="500" y="293" text-anchor="middle" font-size="10" font-weight="700" fill="#F39C12">HEARING IS HEEDING</text>

      <rect x="690" y="240" width="260" height="110" rx="12" fill="#7B68EE" opacity="0.08" stroke="#7B68EE" stroke-width="2"/>
      <text x="820" y="270" text-anchor="middle" font-size="18" font-weight="700" fill="#7B68EE">OBEDIENCE</text>
      <text x="820" y="290" text-anchor="middle" font-size="10" fill="#6c757d">Heeding, receptivity, compliance</text>
      <text x="820" y="310" text-anchor="middle" font-size="9" fill="#7B68EE" font-style="italic">"obey" from ob-audire</text>
      <text x="820" y="324" text-anchor="middle" font-size="9" fill="#7B68EE" font-style="italic">"an obedient audience"</text>
      <text x="820" y="338" text-anchor="middle" font-size="8" fill="#6c757d">Passive reception = yielding to authority</text>

      <!-- ==================== ROW 3: TOUCH -> EMOTION ==================== -->
      <rect x="50" y="370" width="260" height="110" rx="12" fill="#2E86AB" opacity="0.08" stroke="#2E86AB" stroke-width="2"/>
      <circle cx="85" cy="405" r="20" fill="#2E86AB" opacity="0.2" stroke="#2E86AB" stroke-width="1.5"/>
      <text x="85" y="409" text-anchor="middle" font-size="14">🤚</text>
      <text x="195" y="400" text-anchor="middle" font-size="18" font-weight="700" fill="#2E86AB">TOUCH</text>
      <text x="195" y="420" text-anchor="middle" font-size="10" fill="#6c757d">Intimate, involuntary, embodied</text>
      <text x="180" y="440" font-size="9" fill="#2E86AB" font-style="italic">"I was touched by her kindness"</text>
      <text x="180" y="454" font-size="9" fill="#2E86AB" font-style="italic">"a moving speech"</text>
      <text x="180" y="468" font-size="8" fill="#6c757d">Lat. e-movere -> emotion</text>

      <line x1="315" y1="425" x2="680" y2="425" stroke="#F39C12" stroke-width="3" marker-end="url(#map-arrow)" opacity="0.8"/>
      <rect x="408" y="408" width="185" height="22" rx="11" fill="#F39C12" opacity="0.15"/>
      <text x="500" y="423" text-anchor="middle" font-size="10" font-weight="700" fill="#F39C12">TOUCHING IS FEELING</text>

      <rect x="690" y="370" width="260" height="110" rx="12" fill="#7B68EE" opacity="0.08" stroke="#7B68EE" stroke-width="2"/>
      <text x="820" y="400" text-anchor="middle" font-size="18" font-weight="700" fill="#7B68EE">EMOTION</text>
      <text x="820" y="420" text-anchor="middle" font-size="10" fill="#6c757d">Affect, feeling, sentiment</text>
      <text x="820" y="440" text-anchor="middle" font-size="9" fill="#7B68EE" font-style="italic">"a tender subject"</text>
      <text x="820" y="454" text-anchor="middle" font-size="9" fill="#7B68EE" font-style="italic">"he felt sad"</text>
      <text x="820" y="468" text-anchor="middle" font-size="8" fill="#6c757d">"emotion" = "to move out" (physical)</text>

      <!-- ==================== ROW 4: TASTE -> PREFERENCE ==================== -->
      <rect x="50" y="500" width="260" height="110" rx="12" fill="#2E86AB" opacity="0.08" stroke="#2E86AB" stroke-width="2"/>
      <circle cx="85" cy="535" r="20" fill="#2E86AB" opacity="0.2" stroke="#2E86AB" stroke-width="1.5"/>
      <text x="85" y="539" text-anchor="middle" font-size="14">👅</text>
      <text x="195" y="530" text-anchor="middle" font-size="18" font-weight="700" fill="#2E86AB">TASTE</text>
      <text x="195" y="550" text-anchor="middle" font-size="10" fill="#6c757d">Evaluative, personal, subjective</text>
      <text x="180" y="570" font-size="9" fill="#2E86AB" font-style="italic">"in bad taste"</text>
      <text x="180" y="584" font-size="9" fill="#2E86AB" font-style="italic">"a distasteful proposal"</text>
      <text x="180" y="598" font-size="8" fill="#6c757d">Personal, requires contact</text>

      <line x1="315" y1="555" x2="680" y2="555" stroke="#F39C12" stroke-width="3" marker-end="url(#map-arrow)" opacity="0.8"/>
      <rect x="404" y="538" width="192" height="22" rx="11" fill="#F39C12" opacity="0.15"/>
      <text x="500" y="553" text-anchor="middle" font-size="10" font-weight="700" fill="#F39C12">TASTING IS JUDGING</text>

      <rect x="690" y="500" width="260" height="110" rx="12" fill="#7B68EE" opacity="0.08" stroke="#7B68EE" stroke-width="2"/>
      <text x="820" y="530" text-anchor="middle" font-size="18" font-weight="700" fill="#7B68EE">PREFERENCE</text>
      <text x="820" y="550" text-anchor="middle" font-size="10" fill="#6c757d">Judgment, discrimination, choice</text>
      <text x="820" y="570" text-anchor="middle" font-size="9" fill="#7B68EE" font-style="italic">"refined sensibilities"</text>
      <text x="820" y="584" text-anchor="middle" font-size="9" fill="#7B68EE" font-style="italic">"savoring the moment"</text>
      <text x="820" y="598" text-anchor="middle" font-size="8" fill="#6c757d">Lat. sapere = taste, be wise</text>

      <!-- ==================== ROW 5: SMELL -> SUSPICION ==================== -->
      <rect x="50" y="630" width="260" height="110" rx="12" fill="#2E86AB" opacity="0.08" stroke="#2E86AB" stroke-width="2"/>
      <circle cx="85" cy="665" r="20" fill="#2E86AB" opacity="0.2" stroke="#2E86AB" stroke-width="1.5"/>
      <text x="85" y="669" text-anchor="middle" font-size="14">👃</text>
      <text x="195" y="660" text-anchor="middle" font-size="18" font-weight="700" fill="#2E86AB">SMELL</text>
      <text x="195" y="680" text-anchor="middle" font-size="10" fill="#6c757d">Passive, involuntary, vague</text>
      <text x="180" y="700" font-size="9" fill="#2E86AB" font-style="italic">"something smells fishy"</text>
      <text x="180" y="714" font-size="9" fill="#2E86AB" font-style="italic">"I smell a rat"</text>
      <text x="180" y="728" font-size="8" fill="#6c757d">Least controllable sense</text>

      <line x1="315" y1="685" x2="680" y2="685" stroke="#F39C12" stroke-width="3" marker-end="url(#map-arrow)" opacity="0.8"/>
      <rect x="395" y="668" width="210" height="22" rx="11" fill="#F39C12" opacity="0.15"/>
      <text x="500" y="683" text-anchor="middle" font-size="10" font-weight="700" fill="#F39C12">SMELLING IS SUSPECTING</text>

      <rect x="690" y="630" width="260" height="110" rx="12" fill="#7B68EE" opacity="0.08" stroke="#7B68EE" stroke-width="2"/>
      <text x="820" y="660" text-anchor="middle" font-size="18" font-weight="700" fill="#7B68EE">SUSPICION</text>
      <text x="820" y="680" text-anchor="middle" font-size="10" fill="#6c757d">Detection of hidden things</text>
      <text x="820" y="700" text-anchor="middle" font-size="9" fill="#7B68EE" font-style="italic">"a nose for trouble"</text>
      <text x="820" y="714" text-anchor="middle" font-size="9" fill="#7B68EE" font-style="italic">"the stench of corruption"</text>
      <text x="820" y="728" text-anchor="middle" font-size="8" fill="#6c757d">Resists metaphorical extension the most</text>

      <!-- ==================== RELIABILITY GRADIENT ==================== -->
      <rect x="50" y="770" width="900" height="60" rx="10" fill="none" stroke="#adb5bd" stroke-width="1"/>
      <text x="500" y="790" text-anchor="middle" font-size="11" font-weight="700" fill="#1a1a2e">Reliability &amp; Control Gradient</text>

      <!-- Gradient bar -->
      <defs>
        <linearGradient id="rel-grad" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="#27ae60"/>
          <stop offset="50%" stop-color="#F39C12"/>
          <stop offset="100%" stop-color="#E74C3C"/>
        </linearGradient>
      </defs>
      <rect x="80" y="800" width="840" height="8" rx="4" fill="url(#rel-grad)" opacity="0.5"/>
      <text x="80" y="822" font-size="8" fill="#27ae60" font-weight="600">HIGH reliability</text>
      <text x="920" y="822" text-anchor="end" font-size="8" fill="#E74C3C" font-weight="600">LOW reliability</text>

      <!-- Markers on gradient -->
      <circle cx="150" cy="804" r="4" fill="#27ae60"/>
      <text x="150" y="822" text-anchor="middle" font-size="7" fill="#6c757d">Vision</text>
      <circle cx="340" cy="804" r="4" fill="#2E86AB"/>
      <text x="340" y="822" text-anchor="middle" font-size="7" fill="#6c757d">Hearing</text>
      <circle cx="500" cy="804" r="4" fill="#F39C12"/>
      <text x="500" y="822" text-anchor="middle" font-size="7" fill="#6c757d">Touch</text>
      <circle cx="660" cy="804" r="4" fill="#F39C12"/>
      <text x="660" y="822" text-anchor="middle" font-size="7" fill="#6c757d">Taste</text>
      <circle cx="850" cy="804" r="4" fill="#E74C3C"/>
      <text x="850" y="822" text-anchor="middle" font-size="7" fill="#6c757d">Smell</text>

      <!-- Etymology box -->
      <rect x="150" y="845" width="700" height="42" rx="8" fill="#8B4513" opacity="0.07" stroke="#8B4513" stroke-width="1"/>
      <text x="500" y="862" text-anchor="middle" font-size="10" fill="#8B4513" font-weight="600">The Grasp-Comprehend Nexus: Lat. comprehendere = com + prehendere = "seize completely" = "understand"</text>
      <text x="500" y="878" text-anchor="middle" font-size="9" fill="#6c757d">Same pattern: grasp (EN), begreifen (DE), capire (IT from capere), perceive (from per-cipere) -- all grasping -> knowing</text>

    </svg>
  </div>

  <figcaption>
    <strong>Figure 4: The Body-to-Mind Metaphor Highway (Eve Sweetser, 1990)</strong>
    <span>Sweetser demonstrated that across Indo-European languages, physical sense vocabulary systematically extends to cognitive domains in the same directions. Vision maps to knowledge (the most reliable sense grounds the most trusted cognitive mode). Hearing maps to obedience ("obey" from Latin ob-audire, "to hear toward"). Touch maps to emotion. Taste maps to personal judgment. Smell -- the least controllable sense -- maps to suspicion. The gradient reflects each sense's reliability and controllability.</span>
  </figcaption>
  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background:#2E86AB;"></div>Physical sense (source)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#7B68EE;"></div>Cognitive domain (target)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#F39C12;"></div>Metaphorical mapping</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#8B4513;"></div>Etymological evidence</div>
  </div>
</figure>
</body>
</html>
