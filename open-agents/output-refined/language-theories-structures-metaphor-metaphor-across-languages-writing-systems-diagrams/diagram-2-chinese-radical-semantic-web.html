<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chinese Radical Semantic Web</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #f8f9fa;
    color: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 2rem;
  }
  figure {
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
    max-width: 1100px;
    width: 100%;
  }
  .diagram-title {
    text-align: center;
    font-size: 1.3rem;
    font-weight: 700;
    margin-bottom: 2rem;
    color: #1a1a2e;
  }
  .svg-container {
    display: flex;
    justify-content: center;
    overflow-x: auto;
    padding: 1rem 0;
  }
  svg text {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid #e9ecef;
  }
  figcaption strong {
    display: block;
    font-size: 1.1rem;
    color: #1a1a2e;
    margin-bottom: 0.4rem;
  }
  figcaption span {
    font-size: 0.88rem;
    color: #6c757d;
    line-height: 1.6;
    display: block;
  }
  .legend {
    display: flex;
    justify-content: center;
    gap: 1.5rem;
    margin-top: 1.25rem;
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.82rem;
    color: #495057;
  }
  .legend-swatch {
    width: 14px;
    height: 14px;
    border-radius: 3px;
    border: 1px solid rgba(0,0,0,0.15);
  }
  @media (prefers-color-scheme: dark) {
    body { background: #1a1a2e; color: #e9ecef; }
    figure { background: #2d2d44; box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
    .diagram-title { color: #e9ecef; }
    figcaption { border-top-color: #3d3d5c; }
    figcaption strong { color: #e9ecef; }
    figcaption span { color: #adb5bd; }
    .legend-item { color: #adb5bd; }
    svg text { fill: #e9ecef; }
    svg text.dark-fill { fill: #1a1a2e; }
  }
  @media print {
    body { background: #fff; padding: 0; }
    figure { box-shadow: none; border: 1px solid #ccc; break-inside: avoid; }
  }
</style>
</head>
<body>
<figure>
  <div class="diagram-title">Chinese Radical Semantic Web: How Radicals Organize Meaning</div>
  <div class="svg-container">
    <svg viewBox="0 0 1060 900" width="1060" height="900" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="waterGrad" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#2E86AB" stop-opacity="0.15"/>
          <stop offset="100%" stop-color="#2E86AB" stop-opacity="0.02"/>
        </radialGradient>
        <radialGradient id="heartGrad" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#E74C3C" stop-opacity="0.15"/>
          <stop offset="100%" stop-color="#E74C3C" stop-opacity="0.02"/>
        </radialGradient>
      </defs>

      <!-- ==================== MAIN: WATER RADICAL WEB ==================== -->
      <!-- Background glow -->
      <circle cx="400" cy="380" r="320" fill="url(#waterGrad)"/>

      <!-- Central radical -->
      <circle cx="400" cy="380" r="52" fill="#2E86AB" opacity="0.9"/>
      <text x="400" y="374" text-anchor="middle" font-size="32" font-weight="700" class="dark-fill" fill="#ffffff">氵</text>
      <text x="400" y="402" text-anchor="middle" font-size="10" class="dark-fill" fill="#ffffff">water radical</text>
      <text x="400" y="416" text-anchor="middle" font-size="9" class="dark-fill" fill="#ffffff" opacity="0.8">~15% of all characters</text>

      <!-- ---- BRANCH 1: Natural Water Bodies (upper-left) ---- -->
      <line x1="365" y1="340" x2="200" y2="170" stroke="#2E86AB" stroke-width="1.5" opacity="0.4"/>
      <line x1="200" y1="170" x2="100" y2="110" stroke="#2E86AB" stroke-width="1" opacity="0.3"/>
      <line x1="200" y1="170" x2="200" y2="90" stroke="#2E86AB" stroke-width="1" opacity="0.3"/>
      <line x1="200" y1="170" x2="300" y2="100" stroke="#2E86AB" stroke-width="1" opacity="0.3"/>
      <line x1="200" y1="170" x2="140" y2="200" stroke="#2E86AB" stroke-width="1" opacity="0.3"/>

      <!-- Category label -->
      <rect x="148" y="148" width="110" height="24" rx="12" fill="#2E86AB" opacity="0.2"/>
      <text x="203" y="164" text-anchor="middle" font-size="10" font-weight="700" fill="#2E86AB">Natural Bodies</text>

      <!-- Characters -->
      <circle cx="100" cy="100" r="28" fill="#ffffff" stroke="#2E86AB" stroke-width="1.5"/>
      <text x="100" y="96" text-anchor="middle" font-size="20" font-weight="700" fill="#2E86AB">河</text>
      <text x="100" y="112" text-anchor="middle" font-size="8" fill="#6c757d">he / river</text>

      <circle cx="200" cy="78" r="28" fill="#ffffff" stroke="#2E86AB" stroke-width="1.5"/>
      <text x="200" y="74" text-anchor="middle" font-size="20" font-weight="700" fill="#2E86AB">海</text>
      <text x="200" y="90" text-anchor="middle" font-size="8" fill="#6c757d">hai / sea</text>

      <circle cx="300" cy="88" r="28" fill="#ffffff" stroke="#2E86AB" stroke-width="1.5"/>
      <text x="300" y="84" text-anchor="middle" font-size="20" font-weight="700" fill="#2E86AB">湖</text>
      <text x="300" y="100" text-anchor="middle" font-size="8" fill="#6c757d">hu / lake</text>

      <circle cx="120" cy="210" r="28" fill="#ffffff" stroke="#2E86AB" stroke-width="1.5"/>
      <text x="120" y="206" text-anchor="middle" font-size="20" font-weight="700" fill="#2E86AB">江</text>
      <text x="120" y="222" text-anchor="middle" font-size="8" fill="#6c757d">jiang / river</text>

      <!-- ---- BRANCH 2: Water Actions (upper-right) ---- -->
      <line x1="440" y1="340" x2="620" y2="170" stroke="#4ECDC4" stroke-width="1.5" opacity="0.4"/>
      <line x1="620" y1="170" x2="550" y2="100" stroke="#4ECDC4" stroke-width="1" opacity="0.3"/>
      <line x1="620" y1="170" x2="650" y2="85" stroke="#4ECDC4" stroke-width="1" opacity="0.3"/>
      <line x1="620" y1="170" x2="720" y2="120" stroke="#4ECDC4" stroke-width="1" opacity="0.3"/>

      <!-- Category label -->
      <rect x="565" y="148" width="110" height="24" rx="12" fill="#4ECDC4" opacity="0.2"/>
      <text x="620" y="164" text-anchor="middle" font-size="10" font-weight="700" fill="#4ECDC4">Water Actions</text>

      <circle cx="550" cy="90" r="28" fill="#ffffff" stroke="#4ECDC4" stroke-width="1.5"/>
      <text x="550" y="86" text-anchor="middle" font-size="20" font-weight="700" fill="#4ECDC4">洗</text>
      <text x="550" y="102" text-anchor="middle" font-size="8" fill="#6c757d">xi / wash</text>

      <circle cx="650" cy="73" r="28" fill="#ffffff" stroke="#4ECDC4" stroke-width="1.5"/>
      <text x="650" y="69" text-anchor="middle" font-size="20" font-weight="700" fill="#4ECDC4">游</text>
      <text x="650" y="85" text-anchor="middle" font-size="8" fill="#6c757d">you / swim</text>

      <circle cx="730" cy="110" r="28" fill="#ffffff" stroke="#4ECDC4" stroke-width="1.5"/>
      <text x="730" y="106" text-anchor="middle" font-size="20" font-weight="700" fill="#4ECDC4">浇</text>
      <text x="730" y="122" text-anchor="middle" font-size="8" fill="#6c757d">jiao / pour</text>

      <!-- ---- BRANCH 3: Water States (lower-left) ---- -->
      <line x1="355" y1="415" x2="160" y2="530" stroke="#7B68EE" stroke-width="1.5" opacity="0.4"/>
      <line x1="160" y1="530" x2="80" y2="490" stroke="#7B68EE" stroke-width="1" opacity="0.3"/>
      <line x1="160" y1="530" x2="80" y2="580" stroke="#7B68EE" stroke-width="1" opacity="0.3"/>
      <line x1="160" y1="530" x2="180" y2="610" stroke="#7B68EE" stroke-width="1" opacity="0.3"/>

      <!-- Category label -->
      <rect x="105" y="510" width="110" height="24" rx="12" fill="#7B68EE" opacity="0.2"/>
      <text x="160" y="526" text-anchor="middle" font-size="10" font-weight="700" fill="#7B68EE">Water States</text>

      <circle cx="70" cy="480" r="28" fill="#ffffff" stroke="#7B68EE" stroke-width="1.5"/>
      <text x="70" y="476" text-anchor="middle" font-size="20" font-weight="700" fill="#7B68EE">清</text>
      <text x="70" y="492" text-anchor="middle" font-size="8" fill="#6c757d">qing / clear</text>

      <circle cx="65" cy="580" r="28" fill="#ffffff" stroke="#7B68EE" stroke-width="1.5"/>
      <text x="65" y="576" text-anchor="middle" font-size="20" font-weight="700" fill="#7B68EE">深</text>
      <text x="65" y="592" text-anchor="middle" font-size="8" fill="#6c757d">shen / deep</text>

      <circle cx="175" cy="620" r="28" fill="#ffffff" stroke="#7B68EE" stroke-width="1.5"/>
      <text x="175" y="616" text-anchor="middle" font-size="20" font-weight="700" fill="#7B68EE">浅</text>
      <text x="175" y="632" text-anchor="middle" font-size="8" fill="#6c757d">qian / shallow</text>

      <!-- ---- BRANCH 4: Metaphorical Extensions (lower-right) ---- -->
      <line x1="445" y1="415" x2="640" y2="530" stroke="#F39C12" stroke-width="1.5" opacity="0.4"/>
      <line x1="640" y1="530" x2="570" y2="600" stroke="#F39C12" stroke-width="1" opacity="0.3"/>
      <line x1="640" y1="530" x2="690" y2="610" stroke="#F39C12" stroke-width="1" opacity="0.3"/>
      <line x1="640" y1="530" x2="740" y2="530" stroke="#F39C12" stroke-width="1" opacity="0.3"/>

      <!-- Category label -->
      <rect x="573" y="510" width="140" height="24" rx="12" fill="#F39C12" opacity="0.2"/>
      <text x="643" y="526" text-anchor="middle" font-size="10" font-weight="700" fill="#F39C12">Metaphorical Extensions</text>

      <circle cx="555" cy="610" r="28" fill="#ffffff" stroke="#F39C12" stroke-width="1.5"/>
      <text x="555" y="606" text-anchor="middle" font-size="20" font-weight="700" fill="#F39C12">泪</text>
      <text x="555" y="622" text-anchor="middle" font-size="8" fill="#6c757d">lei / tears</text>

      <circle cx="690" cy="620" r="28" fill="#ffffff" stroke="#F39C12" stroke-width="1.5"/>
      <text x="690" y="616" text-anchor="middle" font-size="20" font-weight="700" fill="#F39C12">洋</text>
      <text x="690" y="632" text-anchor="middle" font-size="8" fill="#6c757d">yang / foreign</text>
      <text x="690" y="655" text-anchor="middle" font-size="7" fill="#F39C12" font-style="italic">ocean -> beyond -> foreign</text>

      <circle cx="760" cy="530" r="28" fill="#ffffff" stroke="#F39C12" stroke-width="1.5"/>
      <text x="760" y="526" text-anchor="middle" font-size="20" font-weight="700" fill="#F39C12">法</text>
      <text x="760" y="542" text-anchor="middle" font-size="8" fill="#6c757d">fa / law</text>
      <text x="760" y="558" text-anchor="middle" font-size="7" fill="#F39C12" font-style="italic">"water method" -> law</text>

      <!-- ==================== INSET: COMPOUND IDEOGRAPH ==================== -->
      <rect x="30" y="700" width="440" height="175" rx="12" fill="#f0f7fa" stroke="#2E86AB" stroke-width="1"/>
      <text x="250" y="725" text-anchor="middle" font-size="13" font-weight="700" fill="#2E86AB">Compound Ideographs: Meaning Made Visible</text>

      <!-- 明 = 日 + 月 -->
      <rect x="65" y="745" width="60" height="60" rx="8" fill="#F39C12" opacity="0.15" stroke="#F39C12" stroke-width="1.5"/>
      <text x="95" y="782" text-anchor="middle" font-size="28" font-weight="700" fill="#F39C12">日</text>
      <text x="95" y="820" text-anchor="middle" font-size="9" fill="#6c757d">ri / sun</text>

      <text x="145" y="782" text-anchor="middle" font-size="24" font-weight="700" fill="#adb5bd">+</text>

      <rect x="165" y="745" width="60" height="60" rx="8" fill="#7B68EE" opacity="0.15" stroke="#7B68EE" stroke-width="1.5"/>
      <text x="195" y="782" text-anchor="middle" font-size="28" font-weight="700" fill="#7B68EE">月</text>
      <text x="195" y="820" text-anchor="middle" font-size="9" fill="#6c757d">yue / moon</text>

      <text x="255" y="782" text-anchor="middle" font-size="24" font-weight="700" fill="#adb5bd">=</text>

      <rect x="280" y="740" width="80" height="70" rx="8" fill="#27ae60" opacity="0.15" stroke="#27ae60" stroke-width="2"/>
      <text x="320" y="782" text-anchor="middle" font-size="34" font-weight="700" fill="#27ae60">明</text>
      <text x="320" y="820" text-anchor="middle" font-size="9" fill="#6c757d">ming / bright</text>
      <text x="320" y="835" text-anchor="middle" font-size="8" fill="#27ae60" font-style="italic">also: tomorrow</text>

      <text x="250" y="862" text-anchor="middle" font-size="9" fill="#6c757d">The metaphor is literally visible: brightness = sun + moon co-presence</text>

      <!-- ==================== INSET: HEART RADICAL ==================== -->
      <rect x="500" y="700" width="540" height="175" rx="12" fill="#fdf0f0" stroke="#E74C3C" stroke-width="1"/>
      <text x="770" y="725" text-anchor="middle" font-size="13" font-weight="700" fill="#E74C3C">Heart Radical 心/忄 -- Emotion &amp; Mind Characters</text>

      <circle cx="770" cy="785" r="32" fill="url(#heartGrad)" stroke="#E74C3C" stroke-width="2"/>
      <text x="770" y="781" text-anchor="middle" font-size="22" font-weight="700" fill="#E74C3C">心</text>
      <text x="770" y="800" text-anchor="middle" font-size="8" fill="#E74C3C">xin / heart</text>
      <text x="770" y="830" text-anchor="middle" font-size="8" fill="#6c757d">364+ emotion/thought characters</text>

      <!-- Surrounding emotion chars -->
      <line x1="738" y1="775" x2="600" y2="755" stroke="#E74C3C" stroke-width="1" opacity="0.3"/>
      <circle cx="585" cy="750" r="22" fill="#ffffff" stroke="#E74C3C" stroke-width="1"/>
      <text x="585" y="747" text-anchor="middle" font-size="16" font-weight="700" fill="#E74C3C">想</text>
      <text x="585" y="760" text-anchor="middle" font-size="7" fill="#6c757d">think</text>

      <line x1="740" y1="795" x2="600" y2="830" stroke="#E74C3C" stroke-width="1" opacity="0.3"/>
      <circle cx="585" cy="835" r="22" fill="#ffffff" stroke="#E74C3C" stroke-width="1"/>
      <text x="585" y="832" text-anchor="middle" font-size="16" font-weight="700" fill="#E74C3C">怒</text>
      <text x="585" y="845" text-anchor="middle" font-size="7" fill="#6c757d">anger</text>

      <line x1="770" y1="753" x2="770" y2="740" stroke="#E74C3C" stroke-width="1" opacity="0.3"/>
      <circle cx="770" cy="740" r="0" fill="none"/>

      <line x1="802" y1="775" x2="880" y2="750" stroke="#E74C3C" stroke-width="1" opacity="0.3"/>
      <circle cx="895" cy="745" r="22" fill="#ffffff" stroke="#E74C3C" stroke-width="1"/>
      <text x="895" y="742" text-anchor="middle" font-size="16" font-weight="700" fill="#E74C3C">悲</text>
      <text x="895" y="755" text-anchor="middle" font-size="7" fill="#6c757d">sad</text>

      <line x1="800" y1="800" x2="880" y2="830" stroke="#E74C3C" stroke-width="1" opacity="0.3"/>
      <circle cx="895" cy="835" r="22" fill="#ffffff" stroke="#E74C3C" stroke-width="1"/>
      <text x="895" y="832" text-anchor="middle" font-size="16" font-weight="700" fill="#E74C3C">情</text>
      <text x="895" y="845" text-anchor="middle" font-size="7" fill="#6c757d">feeling</text>

      <line x1="755" y1="815" x2="710" y2="845" stroke="#E74C3C" stroke-width="1" opacity="0.3"/>
      <circle cx="700" cy="852" r="22" fill="#ffffff" stroke="#E74C3C" stroke-width="1"/>
      <text x="700" y="849" text-anchor="middle" font-size="16" font-weight="700" fill="#E74C3C">恐</text>
      <text x="700" y="862" text-anchor="middle" font-size="7" fill="#6c757d">fear</text>

      <line x1="785" y1="815" x2="830" y2="845" stroke="#E74C3C" stroke-width="1" opacity="0.3"/>
      <circle cx="840" cy="852" r="22" fill="#ffffff" stroke="#E74C3C" stroke-width="1"/>
      <text x="840" y="849" text-anchor="middle" font-size="16" font-weight="700" fill="#E74C3C">慈</text>
      <text x="840" y="862" text-anchor="middle" font-size="7" fill="#6c757d">compassion</text>

    </svg>
  </div>

  <figcaption>
    <strong>Figure 2: Chinese Radical Semantic Web</strong>
    <span>Chinese radicals function as a visual taxonomy of conceptual domains. The water radical 氵 organizes approximately 15% of all dictionary characters into semantically coherent clusters -- natural bodies of water, water actions, water states, and metaphorical extensions. The insets show how compound ideographs (明 = 日 sun + 月 moon = bright) make metaphorical composition literally visible, and how the heart radical 心/忄 organizes 364+ characters related to emotion and thought.</span>
  </figcaption>
  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background:#2E86AB;"></div>Water radical / natural bodies</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#4ECDC4;"></div>Water actions</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#7B68EE;"></div>Water states</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#F39C12;"></div>Metaphorical extensions</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#E74C3C;"></div>Heart radical / emotion</div>
  </div>
</figure>
</body>
</html>
