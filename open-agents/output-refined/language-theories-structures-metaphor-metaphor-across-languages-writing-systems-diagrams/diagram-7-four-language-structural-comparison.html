<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Four-Language Structural Comparison</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #f8f9fa;
    color: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 2rem;
  }
  figure {
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
    max-width: 1100px;
    width: 100%;
  }
  .diagram-title {
    text-align: center;
    font-size: 1.3rem;
    font-weight: 700;
    margin-bottom: 2rem;
    color: #1a1a2e;
  }
  .comparison-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5rem;
    margin-bottom: 1.5rem;
  }
  .lang-card {
    border-radius: 12px;
    padding: 1.5rem;
    border: 2px solid;
  }
  .lang-card h3 {
    font-size: 1.1rem;
    margin-bottom: 0.25rem;
  }
  .lang-card .subtitle {
    font-size: 0.82rem;
    color: #6c757d;
    margin-bottom: 1rem;
  }
  .lang-card .mechanism {
    font-size: 0.9rem;
    font-weight: 600;
    margin-bottom: 0.5rem;
    padding: 0.4rem 0.8rem;
    border-radius: 8px;
    display: inline-block;
  }
  .lang-card .example-block {
    background: rgba(0,0,0,0.03);
    border-radius: 8px;
    padding: 0.8rem;
    margin: 0.6rem 0;
  }
  .lang-card .example-block .formula {
    font-size: 1rem;
    font-weight: 700;
    margin-bottom: 0.3rem;
  }
  .lang-card .example-block .gloss {
    font-size: 0.82rem;
    color: #6c757d;
  }
  .lang-card .example-block .meaning {
    font-size: 0.85rem;
    font-weight: 600;
    margin-top: 0.2rem;
  }
  .lang-card .unique {
    font-size: 0.8rem;
    font-style: italic;
    margin-top: 0.6rem;
    padding-top: 0.6rem;
    border-top: 1px solid rgba(0,0,0,0.08);
  }
  /* Chinese */
  .lang-card.chinese { border-color: #E74C3C; background: rgba(231,76,60,0.03); }
  .lang-card.chinese h3 { color: #E74C3C; }
  .lang-card.chinese .mechanism { background: rgba(231,76,60,0.1); color: #E74C3C; }
  .lang-card.chinese .formula { color: #E74C3C; }
  .lang-card.chinese .meaning { color: #E74C3C; }
  .lang-card.chinese .unique { color: #E74C3C; }
  /* Arabic */
  .lang-card.arabic { border-color: #27ae60; background: rgba(39,174,96,0.03); }
  .lang-card.arabic h3 { color: #27ae60; }
  .lang-card.arabic .mechanism { background: rgba(39,174,96,0.1); color: #27ae60; }
  .lang-card.arabic .formula { color: #27ae60; }
  .lang-card.arabic .meaning { color: #27ae60; }
  .lang-card.arabic .unique { color: #27ae60; }
  /* Indo-European */
  .lang-card.ie { border-color: #2E86AB; background: rgba(46,134,171,0.03); }
  .lang-card.ie h3 { color: #2E86AB; }
  .lang-card.ie .mechanism { background: rgba(46,134,171,0.1); color: #2E86AB; }
  .lang-card.ie .formula { color: #2E86AB; }
  .lang-card.ie .meaning { color: #2E86AB; }
  .lang-card.ie .unique { color: #2E86AB; }
  /* Japanese */
  .lang-card.japanese { border-color: #7B68EE; background: rgba(123,104,238,0.03); }
  .lang-card.japanese h3 { color: #7B68EE; }
  .lang-card.japanese .mechanism { background: rgba(123,104,238,0.1); color: #7B68EE; }
  .lang-card.japanese .formula { color: #7B68EE; }
  .lang-card.japanese .meaning { color: #7B68EE; }
  .lang-card.japanese .unique { color: #7B68EE; }

  .synthesis-bar {
    background: #1a1a2e;
    color: #ffffff;
    border-radius: 10px;
    padding: 1.2rem 1.5rem;
    text-align: center;
    margin-bottom: 1.5rem;
  }
  .synthesis-bar h4 {
    font-size: 1rem;
    margin-bottom: 0.4rem;
    color: #F39C12;
  }
  .synthesis-bar p {
    font-size: 0.88rem;
    color: #adb5bd;
    line-height: 1.5;
  }

  .understanding-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0.8rem;
    margin-bottom: 1rem;
  }
  .understanding-card {
    border-radius: 8px;
    padding: 0.8rem;
    text-align: center;
  }
  .understanding-card .word {
    font-size: 0.95rem;
    font-weight: 700;
    margin-bottom: 0.2rem;
  }
  .understanding-card .gloss {
    font-size: 0.78rem;
    color: #6c757d;
  }
  .understanding-card .metaphor {
    font-size: 0.75rem;
    font-style: italic;
    margin-top: 0.3rem;
  }
  .understanding-card.cn { background: rgba(231,76,60,0.06); border: 1px solid rgba(231,76,60,0.2); }
  .understanding-card.cn .word { color: #E74C3C; }
  .understanding-card.cn .metaphor { color: #E74C3C; }
  .understanding-card.ar { background: rgba(39,174,96,0.06); border: 1px solid rgba(39,174,96,0.2); }
  .understanding-card.ar .word { color: #27ae60; }
  .understanding-card.ar .metaphor { color: #27ae60; }
  .understanding-card.en { background: rgba(46,134,171,0.06); border: 1px solid rgba(46,134,171,0.2); }
  .understanding-card.en .word { color: #2E86AB; }
  .understanding-card.en .metaphor { color: #2E86AB; }
  .understanding-card.jp { background: rgba(123,104,238,0.06); border: 1px solid rgba(123,104,238,0.2); }
  .understanding-card.jp .word { color: #7B68EE; }
  .understanding-card.jp .metaphor { color: #7B68EE; }

  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid #e9ecef;
  }
  figcaption strong {
    display: block;
    font-size: 1.1rem;
    color: #1a1a2e;
    margin-bottom: 0.4rem;
  }
  figcaption span {
    font-size: 0.88rem;
    color: #6c757d;
    line-height: 1.6;
    display: block;
  }
  .legend {
    display: flex;
    justify-content: center;
    gap: 1.5rem;
    margin-top: 1.25rem;
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.82rem;
    color: #495057;
  }
  .legend-swatch {
    width: 14px;
    height: 14px;
    border-radius: 3px;
    border: 1px solid rgba(0,0,0,0.15);
  }
  @media (prefers-color-scheme: dark) {
    body { background: #1a1a2e; color: #e9ecef; }
    figure { background: #2d2d44; box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
    .diagram-title { color: #e9ecef; }
    .lang-card { background: rgba(255,255,255,0.03) !important; }
    .lang-card .subtitle { color: #adb5bd; }
    .lang-card .example-block { background: rgba(255,255,255,0.05); }
    .lang-card .example-block .gloss { color: #adb5bd; }
    .lang-card .unique { border-top-color: rgba(255,255,255,0.1); }
    .synthesis-bar { background: #3d3d5c; }
    .understanding-card .gloss { color: #adb5bd; }
    figcaption { border-top-color: #3d3d5c; }
    figcaption strong { color: #e9ecef; }
    figcaption span { color: #adb5bd; }
    .legend-item { color: #adb5bd; }
  }
  @media print {
    body { background: #fff; padding: 0; }
    figure { box-shadow: none; border: 1px solid #ccc; break-inside: avoid; }
  }
</style>
</head>
<body>
<figure>
  <div class="diagram-title">Structural Machinery of Metaphor: Four Language Types Compared</div>

  <div class="comparison-grid">
    <!-- CHINESE -->
    <div class="lang-card chinese">
      <h3>Chinese (Isolating, Logographic)</h3>
      <div class="subtitle">Metaphors through radical composition &amp; character compounding</div>
      <div class="mechanism">Radical Composition + Free Morpheme Juxtaposition</div>

      <div class="example-block">
        <div class="formula">明 = 日 (sun) + 月 (moon)</div>
        <div class="gloss">Character composition: two meaning-bearing units combine visually</div>
        <div class="meaning">= "bright" -- the metaphor is literally visible</div>
      </div>

      <div class="example-block">
        <div class="formula">电脑 = 电 (electric) + 脑 (brain)</div>
        <div class="gloss">Compound word: two free morphemes create new concept</div>
        <div class="meaning">= "computer" -- COMPUTER IS ELECTRIC BRAIN</div>
      </div>

      <div class="example-block">
        <div class="formula">条 (tiao) classifier for news</div>
        <div class="gloss">Classifier for long, thin, flexible things applied to news items</div>
        <div class="meaning">NEWS IS A THREAD -- grammatical metaphor</div>
      </div>

      <div class="unique">Unique: Metaphorical transparency -- you can see the conceptual structure in the characters. Classifiers add a mandatory layer of metaphorical categorization.</div>
    </div>

    <!-- ARABIC -->
    <div class="lang-card arabic">
      <h3>Arabic (Fusional, Abjad)</h3>
      <div class="subtitle">Metaphors through root derivation &amp; pattern templates</div>
      <div class="mechanism">Trilateral Root + Wazn (Pattern) System</div>

      <div class="example-block">
        <div class="formula">K-T-B root: kataba, kitab, maktaba, maktub</div>
        <div class="gloss">Single root "writing" generates: action, product, place, fate</div>
        <div class="meaning">Root radiates from concrete act to cosmic destiny</div>
      </div>

      <div class="example-block">
        <div class="formula">Form I (fa'ala) -> Form III (faa'ala) -> Form X (istaf'ala)</div>
        <div class="gloss">Patterns as semantic operators: basic -> reciprocal -> seeking</div>
        <div class="meaning">Meaning transforms from within the root structure</div>
      </div>

      <div class="example-block">
        <div class="formula">S-L-M: salaam, islaam, muslim, saliim</div>
        <div class="gloss">"Wholeness" -> peace, submission, practitioner, sound/safe</div>
        <div class="meaning">Semantic genealogy visible through shared root</div>
      </div>

      <div class="unique">Unique: Internal transformation -- metaphor is generated by reshaping vowel patterns around a fixed consonant skeleton. The root system creates visible semantic families.</div>
    </div>

    <!-- INDO-EUROPEAN -->
    <div class="lang-card ie">
      <h3>Indo-European / English (Inflecting, Alphabetic)</h3>
      <div class="subtitle">Metaphors through etymological layering &amp; dead metaphors</div>
      <div class="mechanism">Etymological Extension + Derivational Morphology</div>

      <div class="example-block">
        <div class="formula">comprehend = com- + prehendere</div>
        <div class="gloss">Latin "seize completely" -> "understand" (dead metaphor)</div>
        <div class="meaning">UNDERSTANDING IS GRASPING -- buried in etymology</div>
      </div>

      <div class="example-block">
        <div class="formula">videre -> evidence, supervise, vision</div>
        <div class="gloss">Latin "to see" branches into knowledge words</div>
        <div class="meaning">KNOWING IS SEEING -- fossilized in vocabulary</div>
      </div>

      <div class="example-block">
        <div class="formula">ob-audire -> obey</div>
        <div class="gloss">"To hear toward" -> "to follow commands"</div>
        <div class="meaning">OBEDIENCE IS HEARING -- invisible without Latin</div>
      </div>

      <div class="unique">Unique: Metaphorical opacity -- dead metaphors accumulate invisibly. Only etymological excavation reveals the original conceptual mappings. The body-to-mind highway is hidden.</div>
    </div>

    <!-- JAPANESE -->
    <div class="lang-card japanese">
      <h3>Japanese (Agglutinating, Multi-Script)</h3>
      <div class="subtitle">Metaphors through multiple parallel systems</div>
      <div class="mechanism">Kanji Semantics + Mimetics + Keigo + Dual Readings</div>

      <div class="example-block">
        <div class="formula">心 = shin (Chinese) / kokoro (Japanese)</div>
        <div class="gloss">Same character, two readings with different associations</div>
        <div class="meaning">Dual metaphorical layer: Chinese + native Japanese</div>
      </div>

      <div class="example-block">
        <div class="formula">ピカピカ pikapika / ヌルヌル nurunuru</div>
        <div class="gloss">4,500+ mimetic words: sound = visual/tactile quality</div>
        <div class="meaning">Cross-modal metaphor: sound -> texture, appearance</div>
      </div>

      <div class="example-block">
        <div class="formula">Sonkeigo (raise other) / Kenjogo (lower self)</div>
        <div class="gloss">Honorific verb forms as metaphorical social positioning</div>
        <div class="meaning">RESPECT IS VERTICAL DISTANCE -- grammaticalized</div>
      </div>

      <div class="unique">Unique: Multi-layered -- kanji visual metaphor + native semantic associations + 4,500 mimetic sound-symbolism words + obligatory social-spatial metaphor in grammar (keigo).</div>
    </div>
  </div>

  <!-- Synthesis Bar -->
  <div class="synthesis-bar">
    <h4>The Same Concept, Four Different Machines</h4>
    <p>All four languages can express any metaphor -- but each uses fundamentally different structural machinery to build it. Chinese composes visible parts. Arabic transforms roots from within. English buries metaphors in etymology. Japanese layers multiple systems simultaneously.</p>
  </div>

  <!-- Understanding across languages -->
  <div style="text-align:center; margin-bottom:0.6rem; font-size:0.95rem; font-weight:600; color:#F39C12;">How Each Language Builds "UNDERSTANDING"</div>
  <div class="understanding-row">
    <div class="understanding-card cn">
      <div class="word">理解 li jie</div>
      <div class="gloss">"logic-untangle"</div>
      <div class="metaphor">UNDERSTANDING IS UNTANGLING</div>
    </div>
    <div class="understanding-card ar">
      <div class="word">فهم fahima</div>
      <div class="gloss">F-H-M root, Form I</div>
      <div class="metaphor">Root-level comprehension</div>
    </div>
    <div class="understanding-card en">
      <div class="word">comprehend</div>
      <div class="gloss">com + prehendere</div>
      <div class="metaphor">UNDERSTANDING IS GRASPING</div>
    </div>
    <div class="understanding-card jp">
      <div class="word">分かる wakaru</div>
      <div class="gloss">"to divide/separate"</div>
      <div class="metaphor">UNDERSTANDING IS SEPARATING</div>
    </div>
  </div>

  <figcaption>
    <strong>Figure 7: Structural Machinery of Metaphor -- Four Language Types Compared</strong>
    <span>Chinese (isolating/logographic) builds metaphors through visible radical composition and free-morpheme compounding. Arabic (fusional/abjad) generates metaphors by applying vowel-pattern templates to trilateral consonant roots. Indo-European/English (inflecting/alphabetic) accumulates dead metaphors through etymological extension, invisible to modern speakers. Japanese (agglutinating/multi-script) layers four simultaneous systems: kanji visual semantics, mimetic sound symbolism, honorific social-spatial metaphor, and dual Chinese/native readings. The "understanding" comparison shows each system producing a different specific metaphor for the same generic concept.</span>
  </figcaption>
  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background:#E74C3C;"></div>Chinese (composition)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#27ae60;"></div>Arabic (root derivation)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#2E86AB;"></div>Indo-European (etymology)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#7B68EE;"></div>Japanese (multi-layer)</div>
  </div>
</figure>
</body>
</html>
