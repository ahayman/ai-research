<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cross-Cultural Time Conceptualization Map</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #f8f9fa;
    color: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 2rem;
  }
  figure {
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
    max-width: 1100px;
    width: 100%;
  }
  .diagram-title {
    text-align: center;
    font-size: 1.3rem;
    font-weight: 700;
    margin-bottom: 2rem;
    color: #1a1a2e;
  }
  .svg-container {
    display: flex;
    justify-content: center;
    overflow-x: auto;
    padding: 1rem 0;
  }
  svg text {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid #e9ecef;
  }
  figcaption strong {
    display: block;
    font-size: 1.1rem;
    color: #1a1a2e;
    margin-bottom: 0.4rem;
  }
  figcaption span {
    font-size: 0.88rem;
    color: #6c757d;
    line-height: 1.6;
    display: block;
  }
  .legend {
    display: flex;
    justify-content: center;
    gap: 1.5rem;
    margin-top: 1.25rem;
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.82rem;
    color: #495057;
  }
  .legend-swatch {
    width: 14px;
    height: 14px;
    border-radius: 3px;
    border: 1px solid rgba(0,0,0,0.15);
  }
  @media (prefers-color-scheme: dark) {
    body { background: #1a1a2e; color: #e9ecef; }
    figure { background: #2d2d44; box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
    .diagram-title { color: #e9ecef; }
    figcaption { border-top-color: #3d3d5c; }
    figcaption strong { color: #e9ecef; }
    figcaption span { color: #adb5bd; }
    .legend-item { color: #adb5bd; }
    svg text { fill: #e9ecef; }
    svg text.dark-fill { fill: #1a1a2e; }
  }
  @media print {
    body { background: #fff; padding: 0; }
    figure { box-shadow: none; border: 1px solid #ccc; break-inside: avoid; }
  }
</style>
</head>
<body>
<figure>
  <div class="diagram-title">Cross-Cultural Time Conceptualization Map</div>
  <div class="svg-container">
    <svg viewBox="0 0 1060 820" width="1060" height="820" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="arr-past" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#2E86AB"/>
        </marker>
        <marker id="arr-future" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#E74C3C"/>
        </marker>
        <marker id="arr-gold" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#F39C12"/>
        </marker>
        <marker id="arr-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#27ae60"/>
        </marker>
      </defs>

      <!-- ==================== PANEL 1: ENGLISH ==================== -->
      <rect x="10" y="10" width="510" height="370" rx="12" fill="#f0f7fa" stroke="#2E86AB" stroke-width="1.5"/>
      <text x="265" y="40" text-anchor="middle" font-size="16" font-weight="700" fill="#2E86AB">English</text>
      <text x="265" y="58" text-anchor="middle" font-size="11" fill="#6c757d">Horizontal (Sagittal) Axis</text>

      <!-- Human figure -->
      <circle cx="265" cy="150" r="18" fill="#F39C12" opacity="0.2" stroke="#F39C12" stroke-width="2"/>
      <line x1="265" y1="168" x2="265" y2="230" stroke="#F39C12" stroke-width="2"/>
      <line x1="265" y1="185" x2="240" y2="210" stroke="#F39C12" stroke-width="2"/>
      <line x1="265" y1="185" x2="290" y2="210" stroke="#F39C12" stroke-width="2"/>
      <line x1="265" y1="230" x2="245" y2="265" stroke="#F39C12" stroke-width="2"/>
      <line x1="265" y1="230" x2="285" y2="265" stroke="#F39C12" stroke-width="2"/>
      <!-- Arrow pointing right = facing direction -->
      <text x="265" y="145" text-anchor="middle" font-size="10" fill="#F39C12" font-weight="600">FACING</text>

      <!-- Past behind -->
      <line x1="200" y1="190" x2="70" y2="190" stroke="#2E86AB" stroke-width="2.5" marker-end="url(#arr-past)" stroke-dasharray="6,3"/>
      <rect x="30" y="160" width="90" height="32" rx="6" fill="#2E86AB" opacity="0.15"/>
      <text x="75" y="180" text-anchor="middle" font-size="13" font-weight="700" fill="#2E86AB">PAST</text>
      <text x="75" y="205" text-anchor="middle" font-size="9" fill="#6c757d">behind</text>
      <text x="75" y="218" text-anchor="middle" font-size="8" fill="#6c757d" font-style="italic">"put it behind you"</text>

      <!-- Future ahead -->
      <line x1="330" y1="190" x2="460" y2="190" stroke="#E74C3C" stroke-width="2.5" marker-end="url(#arr-future)"/>
      <rect x="400" y="160" width="100" height="32" rx="6" fill="#E74C3C" opacity="0.15"/>
      <text x="450" y="180" text-anchor="middle" font-size="13" font-weight="700" fill="#E74C3C">FUTURE</text>
      <text x="450" y="205" text-anchor="middle" font-size="9" fill="#6c757d">ahead</text>
      <text x="450" y="218" text-anchor="middle" font-size="8" fill="#6c757d" font-style="italic">"looking forward to..."</text>

      <!-- Logic label -->
      <rect x="100" y="280" width="330" height="36" rx="8" fill="#F39C12" opacity="0.1" stroke="#F39C12" stroke-width="1"/>
      <text x="265" y="302" text-anchor="middle" font-size="11" fill="#F39C12" font-weight="600">Logic: Forward motion = progress toward goals</text>

      <!-- Horizontal axis line -->
      <line x1="50" y1="340" x2="480" y2="340" stroke="#adb5bd" stroke-width="1" stroke-dasharray="3,3"/>
      <text x="50" y="355" font-size="9" fill="#6c757d">BEHIND</text>
      <text x="450" y="355" font-size="9" fill="#6c757d">AHEAD</text>

      <!-- ==================== PANEL 2: MANDARIN ==================== -->
      <rect x="540" y="10" width="510" height="370" rx="12" fill="#fdf6f0" stroke="#F39C12" stroke-width="1.5"/>
      <text x="795" y="40" text-anchor="middle" font-size="16" font-weight="700" fill="#F39C12">Mandarin Chinese</text>
      <text x="795" y="58" text-anchor="middle" font-size="11" fill="#6c757d">Vertical + Horizontal Axes</text>

      <!-- Vertical axis -->
      <line x1="695" y1="80" x2="695" y2="290" stroke="#7B68EE" stroke-width="2"/>
      <!-- Up = earlier -->
      <rect x="645" y="80" width="100" height="30" rx="6" fill="#2E86AB" opacity="0.15"/>
      <text x="695" y="99" text-anchor="middle" font-size="12" font-weight="700" fill="#2E86AB">EARLIER</text>
      <text x="695" y="123" text-anchor="middle" font-size="10" fill="#7B68EE">UP</text>
      <text x="695" y="138" text-anchor="middle" font-size="9" fill="#6c757d">上个月 shang ge yue</text>
      <text x="695" y="150" text-anchor="middle" font-size="8" fill="#6c757d" font-style="italic">"upper month" = last month</text>

      <!-- Down = later -->
      <rect x="645" y="260" width="100" height="30" rx="6" fill="#E74C3C" opacity="0.15"/>
      <text x="695" y="279" text-anchor="middle" font-size="12" font-weight="700" fill="#E74C3C">LATER</text>
      <text x="695" y="250" text-anchor="middle" font-size="10" fill="#7B68EE">DOWN</text>
      <text x="695" y="303" text-anchor="middle" font-size="9" fill="#6c757d">下个月 xia ge yue</text>
      <text x="695" y="315" text-anchor="middle" font-size="8" fill="#6c757d" font-style="italic">"lower month" = next month</text>

      <!-- Vertical arrows -->
      <line x1="640" y1="145" x2="640" y2="95" stroke="#2E86AB" stroke-width="1.5" marker-end="url(#arr-past)"/>
      <line x1="640" y1="230" x2="640" y2="266" stroke="#E74C3C" stroke-width="1.5" marker-end="url(#arr-future)"/>

      <!-- Horizontal axis (smaller, to the right) -->
      <line x1="800" y1="165" x2="1010" y2="165" stroke="#F39C12" stroke-width="1.5"/>
      <text x="905" y="145" text-anchor="middle" font-size="10" fill="#F39C12" font-weight="600">Also horizontal:</text>
      <text x="820" y="185" font-size="9" fill="#2E86AB">前 qian</text>
      <text x="820" y="197" font-size="8" fill="#6c757d">"front"=past</text>
      <text x="970" y="185" text-anchor="end" font-size="9" fill="#E74C3C">后 hou</text>
      <text x="970" y="197" text-anchor="end" font-size="8" fill="#6c757d">"behind"=future</text>

      <!-- Logic label -->
      <rect x="620" y="332" width="330" height="36" rx="8" fill="#7B68EE" opacity="0.1" stroke="#7B68EE" stroke-width="1"/>
      <text x="785" y="348" text-anchor="middle" font-size="10" fill="#7B68EE" font-weight="600">Logic: Scroll/water metaphor -- earlier flows</text>
      <text x="785" y="362" text-anchor="middle" font-size="10" fill="#7B68EE" font-weight="600">from above; dual-axis system (Boroditsky 2001)</text>

      <!-- ==================== PANEL 3: AYMARA ==================== -->
      <rect x="10" y="400" width="510" height="410" rx="12" fill="#f0faf0" stroke="#27ae60" stroke-width="1.5"/>
      <text x="265" y="430" text-anchor="middle" font-size="16" font-weight="700" fill="#27ae60">Aymara</text>
      <text x="265" y="448" text-anchor="middle" font-size="11" fill="#6c757d">Horizontal Reversed (Epistemological)</text>

      <!-- Human figure facing left (toward past) -->
      <circle cx="265" cy="530" r="18" fill="#27ae60" opacity="0.2" stroke="#27ae60" stroke-width="2"/>
      <line x1="265" y1="548" x2="265" y2="610" stroke="#27ae60" stroke-width="2"/>
      <line x1="265" y1="565" x2="240" y2="590" stroke="#27ae60" stroke-width="2"/>
      <line x1="265" y1="565" x2="290" y2="590" stroke="#27ae60" stroke-width="2"/>
      <line x1="265" y1="610" x2="245" y2="645" stroke="#27ae60" stroke-width="2"/>
      <line x1="265" y1="610" x2="285" y2="645" stroke="#27ae60" stroke-width="2"/>

      <!-- Eyes/gaze toward past (front) -->
      <line x1="247" y1="526" x2="225" y2="520" stroke="#27ae60" stroke-width="1.5" stroke-dasharray="3,2"/>
      <line x1="247" y1="530" x2="225" y2="530" stroke="#27ae60" stroke-width="1.5" stroke-dasharray="3,2"/>
      <text x="200" y="520" text-anchor="end" font-size="9" fill="#27ae60" font-style="italic">gaze</text>

      <!-- Past IN FRONT -->
      <line x1="200" y1="570" x2="70" y2="570" stroke="#2E86AB" stroke-width="2.5" marker-end="url(#arr-past)"/>
      <rect x="30" y="540" width="100" height="32" rx="6" fill="#2E86AB" opacity="0.15"/>
      <text x="80" y="558" text-anchor="middle" font-size="12" font-weight="700" fill="#2E86AB">PAST</text>
      <text x="80" y="585" text-anchor="middle" font-size="9" fill="#6c757d">in front (visible)</text>
      <text x="80" y="600" text-anchor="middle" font-size="9" fill="#27ae60" font-weight="600">nayra</text>
      <text x="80" y="613" text-anchor="middle" font-size="8" fill="#6c757d">"eye/front/sight"</text>
      <text x="80" y="626" text-anchor="middle" font-size="8" fill="#6c757d" font-style="italic">nayra mara = last year</text>

      <!-- Future BEHIND -->
      <line x1="330" y1="570" x2="460" y2="570" stroke="#E74C3C" stroke-width="2.5" marker-end="url(#arr-future)"/>
      <rect x="400" y="540" width="100" height="32" rx="6" fill="#E74C3C" opacity="0.15"/>
      <text x="450" y="558" text-anchor="middle" font-size="12" font-weight="700" fill="#E74C3C">FUTURE</text>
      <text x="450" y="585" text-anchor="middle" font-size="9" fill="#6c757d">behind (unseen)</text>
      <text x="450" y="600" text-anchor="middle" font-size="9" fill="#27ae60" font-weight="600">qhipa</text>
      <text x="450" y="613" text-anchor="middle" font-size="8" fill="#6c757d">"back/behind"</text>
      <text x="450" y="626" text-anchor="middle" font-size="8" fill="#6c757d" font-style="italic">qhipa pacha = future time</text>

      <!-- Gesture arrows -->
      <path d="M 290 565 C 310 540, 340 530, 370 545" stroke="#E74C3C" stroke-width="1.5" fill="none" stroke-dasharray="4,3" marker-end="url(#arr-future)"/>
      <text x="350" y="530" font-size="8" fill="#E74C3C" font-style="italic">gesture for future:</text>
      <text x="350" y="542" font-size="8" fill="#E74C3C" font-style="italic">wave backward</text>

      <path d="M 240 565 C 220 540, 190 530, 150 545" stroke="#2E86AB" stroke-width="1.5" fill="none" stroke-dasharray="4,3" marker-end="url(#arr-past)"/>
      <text x="130" y="530" font-size="8" fill="#2E86AB" font-style="italic">gesture for past:</text>
      <text x="130" y="542" font-size="8" fill="#2E86AB" font-style="italic">reach forward</text>

      <!-- Logic label -->
      <rect x="100" y="660" width="330" height="50" rx="8" fill="#27ae60" opacity="0.1" stroke="#27ae60" stroke-width="1"/>
      <text x="265" y="678" text-anchor="middle" font-size="10" fill="#27ae60" font-weight="600">Logic: The known is visible (in front of you);</text>
      <text x="265" y="693" text-anchor="middle" font-size="10" fill="#27ae60" font-weight="600">the unknown is unseen (behind you).</text>
      <text x="265" y="706" text-anchor="middle" font-size="9" fill="#6c757d">Nunez &amp; Sweetser 2006</text>

      <!-- ==================== PANEL 4: KUUK THAAYORRE ==================== -->
      <rect x="540" y="400" width="510" height="410" rx="12" fill="#f5f0fa" stroke="#7B68EE" stroke-width="1.5"/>
      <text x="795" y="430" text-anchor="middle" font-size="16" font-weight="700" fill="#7B68EE">Kuuk Thaayorre</text>
      <text x="795" y="448" text-anchor="middle" font-size="11" fill="#6c757d">Cardinal / Solar Axis (Absolute Frame)</text>

      <!-- Compass rose -->
      <circle cx="795" cy="570" r="80" fill="none" stroke="#7B68EE" stroke-width="1" stroke-dasharray="4,3"/>
      <circle cx="795" cy="570" r="4" fill="#7B68EE"/>
      <!-- N -->
      <line x1="795" y1="570" x2="795" y2="495" stroke="#adb5bd" stroke-width="1"/>
      <text x="795" y="488" text-anchor="middle" font-size="10" fill="#adb5bd">N</text>
      <!-- S -->
      <line x1="795" y1="570" x2="795" y2="645" stroke="#adb5bd" stroke-width="1"/>
      <text x="795" y="660" text-anchor="middle" font-size="10" fill="#adb5bd">S</text>

      <!-- Sun path: East to West -->
      <!-- Sun at East -->
      <circle cx="880" cy="570" r="16" fill="#F39C12" opacity="0.3" stroke="#F39C12" stroke-width="2"/>
      <text x="880" y="574" text-anchor="middle" font-size="11" fill="#F39C12" font-weight="700">E</text>
      <!-- Sun rays -->
      <line x1="900" y1="570" x2="910" y2="570" stroke="#F39C12" stroke-width="1.5"/>
      <line x1="892" y1="556" x2="900" y2="548" stroke="#F39C12" stroke-width="1.5"/>
      <line x1="892" y1="584" x2="900" y2="592" stroke="#F39C12" stroke-width="1.5"/>

      <!-- Sunset at West -->
      <circle cx="710" cy="570" r="16" fill="#E74C3C" opacity="0.2" stroke="#E74C3C" stroke-width="2"/>
      <text x="710" y="574" text-anchor="middle" font-size="11" fill="#E74C3C" font-weight="700">W</text>
      <!-- Sunset half -->
      <line x1="694" y1="574" x2="694" y2="566" stroke="#E74C3C" stroke-width="1"/>

      <!-- Sun arc path -->
      <path d="M 865 555 C 830 500, 760 500, 725 555" stroke="#F39C12" stroke-width="2" fill="none" stroke-dasharray="5,3" marker-end="url(#arr-gold)"/>
      <text x="795" y="510" text-anchor="middle" font-size="10" fill="#F39C12" font-weight="600">Sun's path</text>

      <!-- Timeline arrow E to W -->
      <line x1="870" y1="600" x2="720" y2="600" stroke="#7B68EE" stroke-width="2.5" marker-end="url(#arr-past)"/>

      <!-- Labels -->
      <rect x="860" y="610" width="90" height="28" rx="6" fill="#2E86AB" opacity="0.15"/>
      <text x="905" y="629" text-anchor="middle" font-size="11" font-weight="700" fill="#2E86AB">EARLIER</text>
      <text x="905" y="650" text-anchor="middle" font-size="8" fill="#6c757d">sunrise</text>

      <rect x="660" y="610" width="90" height="28" rx="6" fill="#E74C3C" opacity="0.15"/>
      <text x="705" y="629" text-anchor="middle" font-size="11" font-weight="700" fill="#E74C3C">LATER</text>
      <text x="705" y="650" text-anchor="middle" font-size="8" fill="#6c757d">sunset</text>

      <!-- Key insight -->
      <rect x="640" y="670" width="310" height="60" rx="8" fill="#7B68EE" opacity="0.1" stroke="#7B68EE" stroke-width="1"/>
      <text x="795" y="688" text-anchor="middle" font-size="10" fill="#7B68EE" font-weight="600">Cards arranged east-to-west regardless</text>
      <text x="795" y="702" text-anchor="middle" font-size="10" fill="#7B68EE" font-weight="600">of which way the speaker faces.</text>
      <text x="795" y="720" text-anchor="middle" font-size="9" fill="#6c757d">Boroditsky &amp; Gaby; absolute, not egocentric</text>

      <!-- ==================== CENTER ANNOTATION ==================== -->
      <rect x="330" y="375" width="400" height="30" rx="15" fill="#1a1a2e" opacity="0.85"/>
      <text x="530" y="394" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">All use space for time -- none use the same mapping</text>

    </svg>
  </div>

  <figcaption>
    <strong>Figure 1: Cross-Cultural Time Conceptualization Map</strong>
    <span>Four languages demonstrate four fundamentally different spatial-temporal metaphor systems. English maps time onto a horizontal forward axis (future = ahead). Mandarin Chinese uses both vertical (earlier = up) and horizontal axes. Aymara reverses the dominant pattern, placing the known past in front and the unseen future behind. Kuuk Thaayorre aligns time with the sun's east-to-west path, using absolute cardinal directions rather than body-relative orientation. Based on Lakoff &amp; Johnson (1980), Boroditsky (2001), Nunez &amp; Sweetser (2006), and Boroditsky &amp; Gaby.</span>
  </figcaption>
  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background:#2E86AB;"></div>Past / Earlier</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#E74C3C;"></div>Future / Later</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#F39C12;"></div>Solar path / Mapping</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#27ae60;"></div>Epistemological logic</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#7B68EE;"></div>Cardinal / Absolute frame</div>
  </div>
</figure>
</body>
</html>
