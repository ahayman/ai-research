<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arabic Root Derivation Tree: K-T-B</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #f8f9fa;
    color: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 2rem;
  }
  figure {
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
    max-width: 1100px;
    width: 100%;
  }
  .diagram-title {
    text-align: center;
    font-size: 1.3rem;
    font-weight: 700;
    margin-bottom: 2rem;
    color: #1a1a2e;
  }
  .svg-container {
    display: flex;
    justify-content: center;
    overflow-x: auto;
    padding: 1rem 0;
  }
  svg text {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid #e9ecef;
  }
  figcaption strong {
    display: block;
    font-size: 1.1rem;
    color: #1a1a2e;
    margin-bottom: 0.4rem;
  }
  figcaption span {
    font-size: 0.88rem;
    color: #6c757d;
    line-height: 1.6;
    display: block;
  }
  .legend {
    display: flex;
    justify-content: center;
    gap: 1.5rem;
    margin-top: 1.25rem;
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.82rem;
    color: #495057;
  }
  .legend-swatch {
    width: 14px;
    height: 14px;
    border-radius: 3px;
    border: 1px solid rgba(0,0,0,0.15);
  }
  @media (prefers-color-scheme: dark) {
    body { background: #1a1a2e; color: #e9ecef; }
    figure { background: #2d2d44; box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
    .diagram-title { color: #e9ecef; }
    figcaption { border-top-color: #3d3d5c; }
    figcaption strong { color: #e9ecef; }
    figcaption span { color: #adb5bd; }
    .legend-item { color: #adb5bd; }
    svg text { fill: #e9ecef; }
    svg text.dark-fill { fill: #1a1a2e; }
    svg text.white-fill { fill: #ffffff; }
  }
  @media print {
    body { background: #fff; padding: 0; }
    figure { box-shadow: none; border: 1px solid #ccc; break-inside: avoid; }
  }
</style>
</head>
<body>
<figure>
  <div class="diagram-title">Arabic Root Derivation Tree: The K-T-B (ك-ت-ب) Semantic Universe</div>
  <div class="svg-container">
    <svg viewBox="0 0 1060 880" width="1060" height="880" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="arr-verb" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#2E86AB"/>
        </marker>
        <marker id="arr-noun" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#27ae60"/>
        </marker>
        <marker id="arr-place" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#F39C12"/>
        </marker>
        <marker id="arr-meta" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#E74C3C"/>
        </marker>
      </defs>

      <!-- ==================== ROOT AT CENTER ==================== -->
      <circle cx="530" cy="300" r="65" fill="#8B4513" opacity="0.9"/>
      <text x="530" y="278" text-anchor="middle" font-size="28" font-weight="700" class="white-fill" fill="#ffffff">ك ت ب</text>
      <text x="530" y="305" text-anchor="middle" font-size="14" font-weight="600" class="white-fill" fill="#ffffff">K - T - B</text>
      <text x="530" y="325" text-anchor="middle" font-size="11" class="white-fill" fill="#ffffff" opacity="0.85">Core: "writing"</text>
      <text x="530" y="345" text-anchor="middle" font-size="9" class="white-fill" fill="#ffffff" opacity="0.7">trilateral root</text>

      <!-- ==================== VERB FORMS (Left Side) ==================== -->
      <text x="150" y="50" font-size="14" font-weight="700" fill="#2E86AB">Verb Forms (Wazn Patterns)</text>
      <line x1="150" y1="55" x2="340" y2="55" stroke="#2E86AB" stroke-width="1"/>

      <!-- Form I: kataba -->
      <line x1="475" y1="270" x2="310" y2="110" stroke="#2E86AB" stroke-width="1.5" opacity="0.5"/>
      <rect x="190" y="70" width="190" height="65" rx="10" fill="#2E86AB" opacity="0.1" stroke="#2E86AB" stroke-width="1.5"/>
      <text x="285" y="92" text-anchor="middle" font-size="16" font-weight="700" fill="#2E86AB">kataba  كَتَبَ</text>
      <text x="285" y="108" text-anchor="middle" font-size="10" fill="#6c757d">"he wrote"</text>
      <text x="285" y="125" text-anchor="middle" font-size="9" fill="#2E86AB" font-style="italic">Form I: fa'ala (base action)</text>

      <!-- Form II: kattaba -->
      <line x1="468" y1="290" x2="240" y2="210" stroke="#2E86AB" stroke-width="1.5" opacity="0.5"/>
      <rect x="80" y="165" width="220" height="65" rx="10" fill="#2E86AB" opacity="0.1" stroke="#2E86AB" stroke-width="1.5"/>
      <text x="190" y="187" text-anchor="middle" font-size="15" font-weight="700" fill="#2E86AB">kattaba  كَتَّبَ</text>
      <text x="190" y="203" text-anchor="middle" font-size="10" fill="#6c757d">"he made someone write / dictated"</text>
      <text x="190" y="220" text-anchor="middle" font-size="9" fill="#2E86AB" font-style="italic">Form II: fa''ala (causation)</text>

      <!-- Form III: kaataba -->
      <line x1="470" y1="315" x2="240" y2="330" stroke="#2E86AB" stroke-width="1.5" opacity="0.5"/>
      <rect x="50" y="285" width="230" height="65" rx="10" fill="#2E86AB" opacity="0.1" stroke="#2E86AB" stroke-width="1.5"/>
      <text x="165" y="307" text-anchor="middle" font-size="15" font-weight="700" fill="#2E86AB">kaataba  كَاتَبَ</text>
      <text x="165" y="323" text-anchor="middle" font-size="10" fill="#6c757d">"he corresponded with"</text>
      <text x="165" y="340" text-anchor="middle" font-size="9" fill="#2E86AB" font-style="italic">Form III: faa'ala (reciprocal)</text>

      <!-- Form VI: takaataba -->
      <line x1="470" y1="335" x2="230" y2="430" stroke="#2E86AB" stroke-width="1.5" opacity="0.5"/>
      <rect x="40" y="390" width="260" height="65" rx="10" fill="#2E86AB" opacity="0.1" stroke="#2E86AB" stroke-width="1.5"/>
      <text x="170" y="412" text-anchor="middle" font-size="15" font-weight="700" fill="#2E86AB">takaataba  تَكَاتَبَ</text>
      <text x="170" y="428" text-anchor="middle" font-size="10" fill="#6c757d">"they corresponded with each other"</text>
      <text x="170" y="445" text-anchor="middle" font-size="9" fill="#2E86AB" font-style="italic">Form VI: tafaa'ala (mutual reciprocal)</text>

      <!-- Form X: istaktaba -->
      <line x1="475" y1="350" x2="230" y2="530" stroke="#2E86AB" stroke-width="1.5" opacity="0.5"/>
      <rect x="30" y="495" width="270" height="65" rx="10" fill="#2E86AB" opacity="0.1" stroke="#2E86AB" stroke-width="1.5"/>
      <text x="165" y="517" text-anchor="middle" font-size="15" font-weight="700" fill="#2E86AB">istaktaba  اِسْتَكْتَبَ</text>
      <text x="165" y="533" text-anchor="middle" font-size="10" fill="#6c757d">"he asked someone to write"</text>
      <text x="165" y="550" text-anchor="middle" font-size="9" fill="#2E86AB" font-style="italic">Form X: istaf'ala (seeking)</text>

      <!-- ==================== NOUN DERIVATIONS (Right Side) ==================== -->
      <text x="730" y="50" font-size="14" font-weight="700" fill="#27ae60">Noun Derivations</text>
      <line x1="730" y1="55" x2="900" y2="55" stroke="#27ae60" stroke-width="1"/>

      <!-- kitaab (book) -->
      <line x1="590" y1="270" x2="750" y2="100" stroke="#27ae60" stroke-width="1.5" opacity="0.5"/>
      <rect x="680" y="70" width="190" height="60" rx="10" fill="#27ae60" opacity="0.1" stroke="#27ae60" stroke-width="1.5"/>
      <text x="775" y="92" text-anchor="middle" font-size="16" font-weight="700" fill="#27ae60">kitaab  كِتَاب</text>
      <text x="775" y="108" text-anchor="middle" font-size="10" fill="#6c757d">"book" (product of writing)</text>
      <text x="775" y="122" text-anchor="middle" font-size="9" fill="#27ae60" font-style="italic">fi'aal pattern</text>

      <!-- kutub (books) -->
      <line x1="870" y1="100" x2="920" y2="120" stroke="#27ae60" stroke-width="1" opacity="0.3"/>
      <rect x="890" y="110" width="120" height="35" rx="8" fill="#27ae60" opacity="0.07"/>
      <text x="950" y="130" text-anchor="middle" font-size="12" font-weight="600" fill="#27ae60">kutub  كُتُب</text>
      <text x="950" y="143" text-anchor="middle" font-size="8" fill="#6c757d">"books" (broken plural)</text>

      <!-- kaatib (writer) -->
      <line x1="592" y1="280" x2="770" y2="195" stroke="#27ae60" stroke-width="1.5" opacity="0.5"/>
      <rect x="700" y="165" width="190" height="55" rx="10" fill="#27ae60" opacity="0.1" stroke="#27ae60" stroke-width="1.5"/>
      <text x="795" y="187" text-anchor="middle" font-size="16" font-weight="700" fill="#27ae60">kaatib  كَاتِب</text>
      <text x="795" y="203" text-anchor="middle" font-size="10" fill="#6c757d">"writer" (agent noun)</text>
      <text x="795" y="215" text-anchor="middle" font-size="9" fill="#27ae60" font-style="italic">faa'il pattern</text>

      <!-- mukaataba (correspondence) -->
      <line x1="592" y1="295" x2="770" y2="285" stroke="#27ae60" stroke-width="1.5" opacity="0.5"/>
      <rect x="710" y="256" width="220" height="55" rx="10" fill="#27ae60" opacity="0.1" stroke="#27ae60" stroke-width="1.5"/>
      <text x="820" y="278" text-anchor="middle" font-size="15" font-weight="700" fill="#27ae60">mukaataba  مُكَاتَبَة</text>
      <text x="820" y="295" text-anchor="middle" font-size="10" fill="#6c757d">"correspondence" (mutual noun)</text>

      <!-- ==================== PLACE NOUNS (Right-Lower) ==================== -->
      <text x="730" y="365" font-size="14" font-weight="700" fill="#F39C12">Place &amp; Instrument Nouns</text>
      <line x1="730" y1="370" x2="940" y2="370" stroke="#F39C12" stroke-width="1"/>

      <!-- maktaba (library) -->
      <line x1="590" y1="315" x2="750" y2="405" stroke="#F39C12" stroke-width="1.5" opacity="0.5"/>
      <rect x="685" y="385" width="220" height="55" rx="10" fill="#F39C12" opacity="0.1" stroke="#F39C12" stroke-width="1.5"/>
      <text x="795" y="407" text-anchor="middle" font-size="15" font-weight="700" fill="#F39C12">maktaba  مَكْتَبَة</text>
      <text x="795" y="423" text-anchor="middle" font-size="10" fill="#6c757d">"library" (place of books)</text>
      <text x="795" y="436" text-anchor="middle" font-size="9" fill="#F39C12" font-style="italic">maf'ala pattern (place noun)</text>

      <!-- maktab (office) -->
      <line x1="590" y1="325" x2="760" y2="485" stroke="#F39C12" stroke-width="1.5" opacity="0.5"/>
      <rect x="690" y="465" width="210" height="55" rx="10" fill="#F39C12" opacity="0.1" stroke="#F39C12" stroke-width="1.5"/>
      <text x="795" y="487" text-anchor="middle" font-size="15" font-weight="700" fill="#F39C12">maktab  مَكْتَب</text>
      <text x="795" y="503" text-anchor="middle" font-size="10" fill="#6c757d">"office/desk" (place of writing)</text>
      <text x="795" y="516" text-anchor="middle" font-size="9" fill="#F39C12" font-style="italic">maf'al pattern</text>

      <!-- ==================== METAPHORICAL EXTENSION (Bottom Center) ==================== -->
      <line x1="530" y1="365" x2="530" y2="610" stroke="#E74C3C" stroke-width="2.5" opacity="0.5"/>

      <!-- Big highlight box for maktub -->
      <rect x="355" y="615" width="350" height="110" rx="14" fill="#E74C3C" opacity="0.08" stroke="#E74C3C" stroke-width="2.5"/>
      <rect x="370" y="622" width="80" height="18" rx="9" fill="#E74C3C" opacity="0.8"/>
      <text x="410" y="635" text-anchor="middle" font-size="9" font-weight="700" class="white-fill" fill="#ffffff">METAPHOR</text>

      <text x="530" y="650" text-anchor="middle" font-size="20" font-weight="700" fill="#E74C3C">maktub  مَكْتُوب</text>
      <text x="530" y="672" text-anchor="middle" font-size="12" fill="#6c757d">"written" / "letter" / "fate, destiny"</text>
      <text x="530" y="692" text-anchor="middle" font-size="10" fill="#E74C3C" font-style="italic">DESTINY IS A TEXT WRITTEN BY GOD</text>
      <text x="530" y="712" text-anchor="middle" font-size="9" fill="#6c757d">The physical act of inscribing marks extends to cosmic predestination</text>

      <!-- ==================== PATTERN TEMPLATE BOX ==================== -->
      <rect x="150" y="630" width="180" height="130" rx="10" fill="#8B4513" opacity="0.08" stroke="#8B4513" stroke-width="1.5"/>
      <text x="240" y="652" text-anchor="middle" font-size="11" font-weight="700" fill="#8B4513">Wazn = Semantic Operator</text>
      <line x1="170" y1="658" x2="310" y2="658" stroke="#8B4513" stroke-width="0.5"/>
      <text x="170" y="675" font-size="9" fill="#8B4513">fa'ala       = base action</text>
      <text x="170" y="690" font-size="9" fill="#8B4513">fa''ala      = intensify / cause</text>
      <text x="170" y="705" font-size="9" fill="#8B4513">faa'ala     = reciprocal</text>
      <text x="170" y="720" font-size="9" fill="#8B4513">faa'il        = agent</text>
      <text x="170" y="735" font-size="9" fill="#8B4513">maf'ala    = place</text>
      <text x="170" y="750" font-size="9" fill="#8B4513">istaf'ala   = seeking</text>

      <!-- ==================== S-L-M ROOT COMPARISON (Bottom) ==================== -->
      <rect x="100" y="790" width="860" height="75" rx="10" fill="#7B68EE" opacity="0.07" stroke="#7B68EE" stroke-width="1"/>
      <text x="530" y="812" text-anchor="middle" font-size="12" font-weight="700" fill="#7B68EE">Same System, Different Root: S-L-M (س-ل-م) -- "wholeness/peace"</text>
      <text x="530" y="832" text-anchor="middle" font-size="10" fill="#6c757d">salaam (peace) -- islaam (submission) -- muslim (one who submits) -- saliim (sound/safe) -- tasliim (greeting/surrender)</text>
      <text x="530" y="852" text-anchor="middle" font-size="9" fill="#7B68EE" font-style="italic">Core "wholeness" radiates to: peace (unbroken state) -- submission (entrusting wholeness to God) -- greeting (wishing wholeness)</text>

    </svg>
  </div>

  <figcaption>
    <strong>Figure 3: Arabic Root Derivation Tree -- K-T-B (ك-ت-ب)</strong>
    <span>Arabic morphology builds entire semantic universes from three-consonant roots. The K-T-B root ("writing") generates verb forms through pattern templates (wazn), each performing a different semantic operation: causation, reciprocity, seeking. Noun derivations produce agents (writer), products (book), places (library, office), and -- through metaphorical extension -- the word maktub ("it is written"), which encodes the theological metaphor DESTINY IS A TEXT WRITTEN BY GOD. The S-L-M root comparison shows the same generative system at work.</span>
  </figcaption>
  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background:#8B4513;"></div>Root / Pattern system</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#2E86AB;"></div>Verb forms (wazn)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#27ae60;"></div>Noun derivations</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#F39C12;"></div>Place / Instrument nouns</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#E74C3C;"></div>Metaphorical extension</div>
  </div>
</figure>
</body>
</html>
