<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kovecses Generic-Specific Metaphor Pyramid</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #f8f9fa;
    color: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 2rem;
  }
  figure {
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
    max-width: 1100px;
    width: 100%;
  }
  .diagram-title {
    text-align: center;
    font-size: 1.3rem;
    font-weight: 700;
    margin-bottom: 2rem;
    color: #1a1a2e;
  }
  .svg-container {
    display: flex;
    justify-content: center;
    overflow-x: auto;
    padding: 1rem 0;
  }
  svg text {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid #e9ecef;
  }
  figcaption strong {
    display: block;
    font-size: 1.1rem;
    color: #1a1a2e;
    margin-bottom: 0.4rem;
  }
  figcaption span {
    font-size: 0.88rem;
    color: #6c757d;
    line-height: 1.6;
    display: block;
  }
  .legend {
    display: flex;
    justify-content: center;
    gap: 1.5rem;
    margin-top: 1.25rem;
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.82rem;
    color: #495057;
  }
  .legend-swatch {
    width: 14px;
    height: 14px;
    border-radius: 3px;
    border: 1px solid rgba(0,0,0,0.15);
  }
  @media (prefers-color-scheme: dark) {
    body { background: #1a1a2e; color: #e9ecef; }
    figure { background: #2d2d44; box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
    .diagram-title { color: #e9ecef; }
    figcaption { border-top-color: #3d3d5c; }
    figcaption strong { color: #e9ecef; }
    figcaption span { color: #adb5bd; }
    .legend-item { color: #adb5bd; }
    svg text { fill: #e9ecef; }
    svg text.dark-fill { fill: #1a1a2e; }
    svg text.white-fill { fill: #ffffff; }
  }
  @media print {
    body { background: #fff; padding: 0; }
    figure { box-shadow: none; border: 1px solid #ccc; break-inside: avoid; }
  }
</style>
</head>
<body>
<figure>
  <div class="diagram-title">Kovecses's Generic-Specific Metaphor Pyramid</div>
  <div class="svg-container">
    <svg viewBox="0 0 1060 920" width="1060" height="920" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="pyGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#F39C12" stop-opacity="0.08"/>
          <stop offset="100%" stop-color="#F39C12" stop-opacity="0.02"/>
        </linearGradient>
      </defs>

      <!-- ==================== PYRAMID SHAPE ==================== -->
      <polygon points="530,30 100,380 960,380" fill="url(#pyGrad)" stroke="#F39C12" stroke-width="1.5" opacity="0.5"/>

      <!-- ==================== TIER 1: GENERIC-LEVEL UNIVERSALS (Top) ==================== -->
      <rect x="350" y="55" width="360" height="45" rx="8" fill="#F39C12" opacity="0.15" stroke="#F39C12" stroke-width="2"/>
      <text x="530" y="76" text-anchor="middle" font-size="14" font-weight="700" fill="#F39C12">GENERIC-LEVEL UNIVERSALS</text>
      <text x="530" y="92" text-anchor="middle" font-size="9" fill="#6c757d">Shared across all cultures -- grounded in embodied experience</text>

      <!-- Universal metaphors -->
      <rect x="200" y="115" width="155" height="35" rx="8" fill="#F39C12" opacity="0.8"/>
      <text x="277" y="137" text-anchor="middle" font-size="11" font-weight="700" class="white-fill" fill="#ffffff">ANGER IS HEAT</text>

      <rect x="375" y="115" width="155" height="35" rx="8" fill="#F39C12" opacity="0.8"/>
      <text x="452" y="137" text-anchor="middle" font-size="11" font-weight="700" class="white-fill" fill="#ffffff">HAPPY IS UP</text>

      <rect x="550" y="115" width="175" height="35" rx="8" fill="#F39C12" opacity="0.8"/>
      <text x="637" y="137" text-anchor="middle" font-size="11" font-weight="700" class="white-fill" fill="#ffffff">KNOWING IS SEEING</text>

      <rect x="745" y="115" width="170" height="35" rx="8" fill="#F39C12" opacity="0.8"/>
      <text x="830" y="137" text-anchor="middle" font-size="11" font-weight="700" class="white-fill" fill="#ffffff">LIFE IS A JOURNEY</text>

      <text x="530" y="170" text-anchor="middle" font-size="9" fill="#6c757d">Embodied basis: elevated body temperature in anger, upright posture in happiness, vision as primary knowledge source</text>

      <!-- ==================== TIER 2: CULTURE-INFLUENCED ELABORATION (Middle) ==================== -->
      <rect x="210" y="195" width="640" height="40" rx="8" fill="#7B68EE" opacity="0.12" stroke="#7B68EE" stroke-width="1.5"/>
      <text x="530" y="215" text-anchor="middle" font-size="13" font-weight="700" fill="#7B68EE">CULTURE-INFLUENCED ELABORATION</text>
      <text x="530" y="228" text-anchor="middle" font-size="9" fill="#6c757d">Which body parts are salient? Which source domains are available? What aspects are emphasized?</text>

      <!-- Kovecses dimensions -->
      <rect x="140" y="250" width="100" height="28" rx="6" fill="#7B68EE" opacity="0.1"/>
      <text x="190" y="268" text-anchor="middle" font-size="9" font-weight="600" fill="#7B68EE">Range</text>

      <rect x="260" y="250" width="120" height="28" rx="6" fill="#7B68EE" opacity="0.1"/>
      <text x="320" y="268" text-anchor="middle" font-size="9" font-weight="600" fill="#7B68EE">Elaboration</text>

      <rect x="400" y="250" width="110" height="28" rx="6" fill="#7B68EE" opacity="0.1"/>
      <text x="455" y="268" text-anchor="middle" font-size="9" font-weight="600" fill="#7B68EE">Emphasis</text>

      <rect x="530" y="250" width="110" height="28" rx="6" fill="#7B68EE" opacity="0.1"/>
      <text x="585" y="268" text-anchor="middle" font-size="9" font-weight="600" fill="#7B68EE">Specificity</text>

      <rect x="660" y="250" width="140" height="28" rx="6" fill="#7B68EE" opacity="0.1"/>
      <text x="730" y="268" text-anchor="middle" font-size="9" font-weight="600" fill="#7B68EE">Alternative metaphors</text>

      <rect x="820" y="250" width="110" height="28" rx="6" fill="#7B68EE" opacity="0.1"/>
      <text x="875" y="268" text-anchor="middle" font-size="9" font-weight="600" fill="#7B68EE">Body locus</text>

      <!-- ==================== TIER 3: LANGUAGE-SPECIFIC (Bottom, widest) ==================== -->
      <rect x="60" y="300" width="940" height="35" rx="8" fill="#8B4513" opacity="0.1" stroke="#8B4513" stroke-width="1.5"/>
      <text x="530" y="320" text-anchor="middle" font-size="13" font-weight="700" fill="#8B4513">LANGUAGE-SPECIFIC EXPRESSIONS</text>
      <text x="530" y="335" text-anchor="middle" font-size="9" fill="#6c757d">Concrete idioms, grammatical patterns, lexical choices shaped by each language's structural machinery</text>

      <!-- ==================== ANGER IS HEAT: DETAILED BREAKDOWN ==================== -->
      <!-- Vertical connector from generic to specific -->
      <line x1="277" y1="150" x2="277" y2="400" stroke="#F39C12" stroke-width="1.5" stroke-dasharray="4,4" opacity="0.4"/>

      <rect x="30" y="400" width="220" height="35" rx="8" fill="#F39C12" opacity="0.6"/>
      <text x="140" y="422" text-anchor="middle" font-size="12" font-weight="700" class="white-fill" fill="#ffffff">ANGER IS HEAT -- 4 Cultures</text>

      <!-- ENGLISH -->
      <rect x="30" y="450" width="220" height="130" rx="10" fill="#2E86AB" opacity="0.06" stroke="#2E86AB" stroke-width="1.5"/>
      <rect x="40" y="455" width="60" height="18" rx="9" fill="#2E86AB" opacity="0.85"/>
      <text x="70" y="468" text-anchor="middle" font-size="9" font-weight="700" class="white-fill" fill="#ffffff">English</text>
      <text x="140" y="487" text-anchor="middle" font-size="10" font-weight="600" fill="#2E86AB">Head &amp; Face</text>
      <text x="140" y="502" text-anchor="middle" font-size="9" fill="#6c757d">"hot under the collar"</text>
      <text x="140" y="516" text-anchor="middle" font-size="9" fill="#6c757d">"blew her top"</text>
      <text x="140" y="530" text-anchor="middle" font-size="9" fill="#6c757d">"red-faced with anger"</text>
      <text x="140" y="548" text-anchor="middle" font-size="8" fill="#2E86AB" font-style="italic">Pressurized container model</text>
      <text x="140" y="562" text-anchor="middle" font-size="8" fill="#2E86AB" font-style="italic">Anger rises to head/face</text>

      <!-- CHINESE -->
      <rect x="280" y="450" width="220" height="130" rx="10" fill="#E74C3C" opacity="0.06" stroke="#E74C3C" stroke-width="1.5"/>
      <rect x="290" y="455" width="60" height="18" rx="9" fill="#E74C3C" opacity="0.85"/>
      <text x="320" y="468" text-anchor="middle" font-size="9" font-weight="700" class="white-fill" fill="#ffffff">Chinese</text>
      <text x="390" y="487" text-anchor="middle" font-size="10" font-weight="600" fill="#E74C3C">Liver &amp; Qi (vital energy)</text>
      <text x="390" y="502" text-anchor="middle" font-size="9" fill="#6c757d">发火 fa huo "emit fire"</text>
      <text x="390" y="516" text-anchor="middle" font-size="9" fill="#6c757d">肝火 gan huo "liver fire"</text>
      <text x="390" y="530" text-anchor="middle" font-size="9" fill="#6c757d">火冒三丈 "fire rises 3 zhang"</text>
      <text x="390" y="548" text-anchor="middle" font-size="8" fill="#E74C3C" font-style="italic">TCM organ theory (liver = anger)</text>
      <text x="390" y="562" text-anchor="middle" font-size="8" fill="#E74C3C" font-style="italic">Qi rises, disrupting balance</text>

      <!-- JAPANESE -->
      <rect x="530" y="450" width="220" height="130" rx="10" fill="#27ae60" opacity="0.06" stroke="#27ae60" stroke-width="1.5"/>
      <rect x="540" y="455" width="65" height="18" rx="9" fill="#27ae60" opacity="0.85"/>
      <text x="572" y="468" text-anchor="middle" font-size="9" font-weight="700" class="white-fill" fill="#ffffff">Japanese</text>
      <text x="640" y="487" text-anchor="middle" font-size="10" font-weight="600" fill="#27ae60">Belly (hara) &amp; Head</text>
      <text x="640" y="502" text-anchor="middle" font-size="9" fill="#6c757d">腹が立つ hara ga tatsu</text>
      <text x="640" y="516" text-anchor="middle" font-size="9" fill="#6c757d">"belly stands up" = angry</text>
      <text x="640" y="530" text-anchor="middle" font-size="9" fill="#6c757d">頭に来る atama ni kuru</text>
      <text x="640" y="544" text-anchor="middle" font-size="9" fill="#6c757d">"comes to the head"</text>
      <text x="640" y="562" text-anchor="middle" font-size="8" fill="#27ae60" font-style="italic">Dual locus: visceral + rational</text>

      <!-- ZULU -->
      <rect x="780" y="450" width="220" height="130" rx="10" fill="#7B68EE" opacity="0.06" stroke="#7B68EE" stroke-width="1.5"/>
      <rect x="790" y="455" width="45" height="18" rx="9" fill="#7B68EE" opacity="0.85"/>
      <text x="812" y="468" text-anchor="middle" font-size="9" font-weight="700" class="white-fill" fill="#ffffff">Zulu</text>
      <text x="890" y="487" text-anchor="middle" font-size="10" font-weight="600" fill="#7B68EE">Heart &amp; Heat</text>
      <text x="890" y="502" text-anchor="middle" font-size="9" fill="#6c757d">Heart-based heat metaphors</text>
      <text x="890" y="516" text-anchor="middle" font-size="9" fill="#6c757d">"the heart falls down"</text>
      <text x="890" y="530" text-anchor="middle" font-size="9" fill="#6c757d">= to become angry</text>
      <text x="890" y="548" text-anchor="middle" font-size="8" fill="#7B68EE" font-style="italic">Heart as emotional center</text>
      <text x="890" y="562" text-anchor="middle" font-size="8" fill="#7B68EE" font-style="italic">Gravity-based (heart falls)</text>

      <!-- ==================== HAPPY IS UP: DETAILED BREAKDOWN ==================== -->
      <line x1="452" y1="150" x2="452" y2="620" stroke="#F39C12" stroke-width="1.5" stroke-dasharray="4,4" opacity="0.4"/>

      <rect x="30" y="610" width="1000" height="35" rx="8" fill="#F39C12" opacity="0.5"/>
      <text x="530" y="632" text-anchor="middle" font-size="12" font-weight="700" class="white-fill" fill="#ffffff">HAPPY IS UP -- Same Generic, Radically Different Elaborations</text>

      <!-- English happiness -->
      <rect x="30" y="660" width="310" height="100" rx="10" fill="#2E86AB" opacity="0.06" stroke="#2E86AB" stroke-width="1.5"/>
      <rect x="40" y="665" width="60" height="18" rx="9" fill="#2E86AB" opacity="0.85"/>
      <text x="70" y="678" text-anchor="middle" font-size="9" font-weight="700" class="white-fill" fill="#ffffff">English</text>
      <text x="185" y="697" text-anchor="middle" font-size="11" font-weight="600" fill="#2E86AB">HAPPINESS IS BEING OFF THE GROUND</text>
      <text x="185" y="714" text-anchor="middle" font-size="9" fill="#6c757d">"on cloud nine" / "walking on air"</text>
      <text x="185" y="728" text-anchor="middle" font-size="9" fill="#6c757d">"over the moon" / "on top of the world"</text>
      <text x="185" y="748" text-anchor="middle" font-size="8" fill="#2E86AB" font-style="italic">Cultural emphasis: individual transcendence</text>

      <!-- Chinese happiness -->
      <rect x="370" y="660" width="310" height="100" rx="10" fill="#E74C3C" opacity="0.06" stroke="#E74C3C" stroke-width="1.5"/>
      <rect x="380" y="665" width="60" height="18" rx="9" fill="#E74C3C" opacity="0.85"/>
      <text x="410" y="678" text-anchor="middle" font-size="9" font-weight="700" class="white-fill" fill="#ffffff">Chinese</text>
      <text x="525" y="697" text-anchor="middle" font-size="11" font-weight="600" fill="#E74C3C">HAPPINESS IS FLOWERS IN HEART</text>
      <text x="525" y="714" text-anchor="middle" font-size="9" fill="#6c757d">心花怒放 "heart flowers burst into bloom"</text>
      <text x="525" y="728" text-anchor="middle" font-size="9" fill="#6c757d">高兴 gao xing "high mood"</text>
      <text x="525" y="748" text-anchor="middle" font-size="8" fill="#E74C3C" font-style="italic">Cultural emphasis: internal organs, natural imagery</text>

      <!-- Both share -->
      <rect x="710" y="660" width="320" height="100" rx="10" fill="#F39C12" opacity="0.06" stroke="#F39C12" stroke-width="1.5"/>
      <rect x="720" y="665" width="95" height="18" rx="9" fill="#F39C12" opacity="0.85"/>
      <text x="767" y="678" text-anchor="middle" font-size="9" font-weight="700" class="white-fill" fill="#ffffff">Both share</text>
      <text x="870" y="697" text-anchor="middle" font-size="11" font-weight="600" fill="#F39C12">HAPPY IS UP (generic)</text>
      <text x="870" y="714" text-anchor="middle" font-size="9" fill="#6c757d">HAPPY IS LIGHT</text>
      <text x="870" y="728" text-anchor="middle" font-size="9" fill="#6c757d">HAPPINESS IS VITALITY</text>
      <text x="870" y="748" text-anchor="middle" font-size="8" fill="#F39C12" font-style="italic">Universal embodied basis persists</text>

      <!-- ==================== KEY INSIGHT BOX ==================== -->
      <rect x="180" y="790" width="700" height="55" rx="12" fill="#1a1a2e" opacity="0.04" stroke="#1a1a2e" stroke-width="1.5"/>
      <text x="530" y="812" text-anchor="middle" font-size="12" font-weight="700" fill="#1a1a2e">The Key Insight (Kovecses 2005)</text>
      <text x="530" y="830" text-anchor="middle" font-size="10" fill="#6c757d">Embodied metaphors are universal at the generic level but culturally shaped at the specific level.</text>
      <text x="530" y="844" text-anchor="middle" font-size="10" fill="#6c757d">The body provides the foundation; culture builds the house.</text>

      <!-- Kovecses attribution -->
      <text x="530" y="870" text-anchor="middle" font-size="9" fill="#adb5bd">Zoltan Kovecses, Metaphor in Culture: Universality and Variation (2005)</text>

    </svg>
  </div>

  <figcaption>
    <strong>Figure 5: Kovecses's Generic-Specific Metaphor Pyramid</strong>
    <span>Zoltan Kovecses resolved the tension between universalist and relativist accounts of metaphor by distinguishing three levels. At the top, generic-level universals (ANGER IS HEAT, HAPPY IS UP) derive from shared embodied experience. In the middle, cultural elaboration shapes which body parts, source domains, and aspects are emphasized. At the base, each language produces its own specific expressions. The ANGER IS HEAT case study shows four cultures sharing the generic metaphor but locating anger in different body parts (head, liver, belly, heart) with different imagery.</span>
  </figcaption>
  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background:#F39C12;"></div>Generic-level universal</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#7B68EE;"></div>Cultural elaboration</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#2E86AB;"></div>English</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#E74C3C;"></div>Chinese</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#27ae60;"></div>Japanese</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#8B4513;"></div>Language-specific expressions</div>
  </div>
</figure>
</body>
</html>
