<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Script Relativity Transparency Spectrum</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #f8f9fa;
    color: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 2rem;
  }
  figure {
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
    max-width: 1100px;
    width: 100%;
  }
  .diagram-title {
    text-align: center;
    font-size: 1.3rem;
    font-weight: 700;
    margin-bottom: 2rem;
    color: #1a1a2e;
  }
  .svg-container {
    display: flex;
    justify-content: center;
    overflow-x: auto;
    padding: 1rem 0;
  }
  svg text {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid #e9ecef;
  }
  figcaption strong {
    display: block;
    font-size: 1.1rem;
    color: #1a1a2e;
    margin-bottom: 0.4rem;
  }
  figcaption span {
    font-size: 0.88rem;
    color: #6c757d;
    line-height: 1.6;
    display: block;
  }
  .legend {
    display: flex;
    justify-content: center;
    gap: 1.5rem;
    margin-top: 1.25rem;
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.82rem;
    color: #495057;
  }
  .legend-swatch {
    width: 14px;
    height: 14px;
    border-radius: 3px;
    border: 1px solid rgba(0,0,0,0.15);
  }
  @media (prefers-color-scheme: dark) {
    body { background: #1a1a2e; color: #e9ecef; }
    figure { background: #2d2d44; box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
    .diagram-title { color: #e9ecef; }
    figcaption { border-top-color: #3d3d5c; }
    figcaption strong { color: #e9ecef; }
    figcaption span { color: #adb5bd; }
    .legend-item { color: #adb5bd; }
    svg text { fill: #e9ecef; }
    svg text.dark-fill { fill: #1a1a2e; }
    svg text.white-fill { fill: #ffffff; }
  }
  @media print {
    body { background: #fff; padding: 0; }
    figure { box-shadow: none; border: 1px solid #ccc; break-inside: avoid; }
  }
</style>
</head>
<body>
<figure>
  <div class="diagram-title">Script Relativity: The Metaphorical Transparency Spectrum</div>
  <div class="svg-container">
    <svg viewBox="0 0 1060 860" width="1060" height="860" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="spectrumGrad" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="#27ae60" stop-opacity="0.3"/>
          <stop offset="50%" stop-color="#F39C12" stop-opacity="0.15"/>
          <stop offset="100%" stop-color="#E74C3C" stop-opacity="0.3"/>
        </linearGradient>
        <linearGradient id="brainGrad1" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="#27ae60" stop-opacity="0.15"/>
          <stop offset="100%" stop-color="#27ae60" stop-opacity="0.05"/>
        </linearGradient>
        <linearGradient id="brainGrad2" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="#E74C3C" stop-opacity="0.05"/>
          <stop offset="100%" stop-color="#E74C3C" stop-opacity="0.15"/>
        </linearGradient>
      </defs>

      <!-- ==================== MAIN SPECTRUM ==================== -->
      <text x="530" y="30" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1a2e">How Visible Is the Metaphor in the Written Form?</text>

      <!-- Spectrum bar -->
      <rect x="80" y="45" width="900" height="50" rx="25" fill="url(#spectrumGrad)" stroke="#adb5bd" stroke-width="1"/>

      <!-- Spectrum labels -->
      <text x="130" y="75" text-anchor="middle" font-size="12" font-weight="700" fill="#27ae60">TRANSPARENT</text>
      <text x="530" y="75" text-anchor="middle" font-size="12" font-weight="700" fill="#F39C12">PARTIALLY VISIBLE</text>
      <text x="930" y="75" text-anchor="middle" font-size="12" font-weight="700" fill="#E74C3C">OPAQUE</text>

      <!-- Gradient tick marks -->
      <line x1="130" y1="95" x2="130" y2="108" stroke="#27ae60" stroke-width="2"/>
      <line x1="380" y1="95" x2="380" y2="108" stroke="#F39C12" stroke-width="2"/>
      <line x1="530" y1="95" x2="530" y2="108" stroke="#F39C12" stroke-width="2"/>
      <line x1="700" y1="95" x2="700" y2="108" stroke="#E74C3C" stroke-width="2"/>
      <line x1="930" y1="95" x2="930" y2="108" stroke="#E74C3C" stroke-width="2"/>

      <!-- ==================== POSITION 1: CHINESE (Most Transparent) ==================== -->
      <line x1="130" y1="108" x2="130" y2="135" stroke="#27ae60" stroke-width="1.5"/>
      <rect x="20" y="135" width="260" height="225" rx="12" fill="#27ae60" opacity="0.05" stroke="#27ae60" stroke-width="2"/>

      <rect x="30" y="143" width="90" height="22" rx="6" fill="#27ae60" opacity="0.85"/>
      <text x="75" y="158" text-anchor="middle" font-size="10" font-weight="700" class="white-fill" fill="#ffffff">Chinese</text>
      <text x="150" y="160" font-size="12" font-weight="700" fill="#27ae60">Logographic / Compound Ideographs</text>

      <text x="40" y="185" font-size="10" fill="#6c757d">The metaphor is literally visible:</text>

      <!-- 明 example -->
      <rect x="40" y="195" width="220" height="55" rx="8" fill="#27ae60" opacity="0.08"/>
      <text x="150" y="215" text-anchor="middle" font-size="22" font-weight="700" fill="#27ae60">明 = 日 + 月</text>
      <text x="150" y="235" text-anchor="middle" font-size="9" fill="#6c757d">sun + moon = bright</text>
      <text x="150" y="246" text-anchor="middle" font-size="8" fill="#27ae60" font-style="italic">You can SEE the metaphor</text>

      <!-- 电脑 example -->
      <rect x="40" y="260" width="220" height="45" rx="8" fill="#27ae60" opacity="0.08"/>
      <text x="150" y="280" text-anchor="middle" font-size="16" font-weight="700" fill="#27ae60">电脑 = 电 + 脑</text>
      <text x="150" y="296" text-anchor="middle" font-size="9" fill="#6c757d">electric + brain = computer</text>

      <!-- 休 example -->
      <rect x="40" y="313" width="220" height="38" rx="8" fill="#27ae60" opacity="0.08"/>
      <text x="150" y="333" text-anchor="middle" font-size="16" font-weight="700" fill="#27ae60">休 = 亻+ 木</text>
      <text x="150" y="346" text-anchor="middle" font-size="9" fill="#6c757d">person + tree = rest</text>

      <!-- ==================== POSITION 2: ARABIC (Partially Transparent) ==================== -->
      <line x1="380" y1="108" x2="380" y2="135" stroke="#F39C12" stroke-width="1.5"/>
      <rect x="300" y="135" width="280" height="225" rx="12" fill="#F39C12" opacity="0.05" stroke="#F39C12" stroke-width="2"/>

      <rect x="310" y="143" width="75" height="22" rx="6" fill="#F39C12" opacity="0.85"/>
      <text x="347" y="158" text-anchor="middle" font-size="10" font-weight="700" class="white-fill" fill="#ffffff">Arabic</text>
      <text x="430" y="160" font-size="12" font-weight="700" fill="#F39C12">Abjad / Root-Pattern System</text>

      <text x="320" y="185" font-size="10" fill="#6c757d">Root connections visible to literate speakers:</text>

      <!-- K-T-B example -->
      <rect x="320" y="195" width="240" height="55" rx="8" fill="#F39C12" opacity="0.08"/>
      <text x="440" y="215" text-anchor="middle" font-size="14" font-weight="700" fill="#F39C12">K-T-B: kitab, maktub</text>
      <text x="440" y="232" text-anchor="middle" font-size="9" fill="#6c757d">book, written/fate -- shared root</text>
      <text x="440" y="245" text-anchor="middle" font-size="8" fill="#F39C12" font-style="italic">Root connection recognizable</text>

      <!-- S-L-M example -->
      <rect x="320" y="260" width="240" height="45" rx="8" fill="#F39C12" opacity="0.08"/>
      <text x="440" y="280" text-anchor="middle" font-size="14" font-weight="700" fill="#F39C12">S-L-M: salaam, islaam</text>
      <text x="440" y="296" text-anchor="middle" font-size="9" fill="#6c757d">peace, submission -- semantic web visible</text>

      <!-- Opacity note -->
      <rect x="320" y="313" width="240" height="38" rx="8" fill="#F39C12" opacity="0.05"/>
      <text x="440" y="330" text-anchor="middle" font-size="9" fill="#F39C12">Pattern templates (wazn) are systematic</text>
      <text x="440" y="344" text-anchor="middle" font-size="9" fill="#F39C12">but require morphological knowledge</text>

      <!-- ==================== POSITION 3: JAPANESE (Mixed) ==================== -->
      <line x1="700" y1="108" x2="700" y2="135" stroke="#7B68EE" stroke-width="1.5"/>
      <rect x="610" y="135" width="210" height="225" rx="12" fill="#7B68EE" opacity="0.05" stroke="#7B68EE" stroke-width="2"/>

      <rect x="620" y="143" width="80" height="22" rx="6" fill="#7B68EE" opacity="0.85"/>
      <text x="660" y="158" text-anchor="middle" font-size="10" font-weight="700" class="white-fill" fill="#ffffff">Japanese</text>
      <text x="715" y="175" text-anchor="middle" font-size="12" font-weight="700" fill="#7B68EE">Multi-Script</text>
      <text x="715" y="192" text-anchor="middle" font-size="9" fill="#6c757d">Kanji visible; kana opaque</text>

      <rect x="625" y="202" width="180" height="48" rx="8" fill="#7B68EE" opacity="0.08"/>
      <text x="715" y="220" text-anchor="middle" font-size="12" font-weight="600" fill="#7B68EE">心 kokoro</text>
      <text x="715" y="237" text-anchor="middle" font-size="8" fill="#6c757d">Heart radical visible in kanji</text>
      <text x="715" y="248" text-anchor="middle" font-size="8" fill="#27ae60">Transparent</text>

      <rect x="625" y="258" width="180" height="48" rx="8" fill="#7B68EE" opacity="0.08"/>
      <text x="715" y="276" text-anchor="middle" font-size="12" font-weight="600" fill="#7B68EE">ピカピカ pikapika</text>
      <text x="715" y="293" text-anchor="middle" font-size="8" fill="#6c757d">Mimetic: sound = shininess</text>
      <text x="715" y="304" text-anchor="middle" font-size="8" fill="#F39C12">Partial (sound-symbolic)</text>

      <rect x="625" y="313" width="180" height="38" rx="8" fill="#7B68EE" opacity="0.08"/>
      <text x="715" y="330" text-anchor="middle" font-size="9" fill="#7B68EE">Dual reading: shin vs. kokoro</text>
      <text x="715" y="344" text-anchor="middle" font-size="8" fill="#6c757d">Two metaphorical layers</text>

      <!-- ==================== POSITION 4: ENGLISH (Most Opaque) ==================== -->
      <line x1="930" y1="108" x2="930" y2="135" stroke="#E74C3C" stroke-width="1.5"/>
      <rect x="840" y="135" width="210" height="225" rx="12" fill="#E74C3C" opacity="0.05" stroke="#E74C3C" stroke-width="2"/>

      <rect x="850" y="143" width="75" height="22" rx="6" fill="#E74C3C" opacity="0.85"/>
      <text x="887" y="158" text-anchor="middle" font-size="10" font-weight="700" class="white-fill" fill="#ffffff">English</text>
      <text x="945" y="175" text-anchor="middle" font-size="12" font-weight="700" fill="#E74C3C">Alphabetic</text>
      <text x="945" y="192" text-anchor="middle" font-size="9" fill="#6c757d">Etymology buried</text>

      <rect x="855" y="202" width="180" height="48" rx="8" fill="#E74C3C" opacity="0.08"/>
      <text x="945" y="218" text-anchor="middle" font-size="12" font-weight="600" fill="#E74C3C">comprehend</text>
      <text x="945" y="233" text-anchor="middle" font-size="8" fill="#6c757d">com + prehendere = "seize"</text>
      <text x="945" y="246" text-anchor="middle" font-size="8" fill="#E74C3C" font-style="italic">Origin invisible without Latin</text>

      <rect x="855" y="258" width="180" height="48" rx="8" fill="#E74C3C" opacity="0.08"/>
      <text x="945" y="274" text-anchor="middle" font-size="12" font-weight="600" fill="#E74C3C">understand</text>
      <text x="945" y="289" text-anchor="middle" font-size="8" fill="#6c757d">OE understandan = "stand among"</text>
      <text x="945" y="302" text-anchor="middle" font-size="8" fill="#E74C3C" font-style="italic">Spatial metaphor completely dead</text>

      <rect x="855" y="313" width="180" height="38" rx="8" fill="#E74C3C" opacity="0.08"/>
      <text x="945" y="330" text-anchor="middle" font-size="9" fill="#E74C3C">obey (from ob-audire)</text>
      <text x="945" y="344" text-anchor="middle" font-size="8" fill="#6c757d">"hear toward" = invisible</text>

      <!-- ==================== BRAIN PROCESSING COMPARISON ==================== -->
      <text x="530" y="400" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1a2e">Brain Processing Differences by Script Type</text>

      <!-- Logographic brain -->
      <rect x="60" y="420" width="440" height="190" rx="12" fill="url(#brainGrad1)" stroke="#27ae60" stroke-width="1.5"/>
      <text x="280" y="445" text-anchor="middle" font-size="13" font-weight="700" fill="#27ae60">Logographic Readers (Chinese, Kanji)</text>

      <!-- Brain outline -->
      <ellipse cx="160" cy="530" rx="60" ry="50" fill="none" stroke="#27ae60" stroke-width="1.5"/>
      <path d="M 120 500 C 130 490, 150 485, 160 490 C 170 485, 190 490, 200 500" stroke="#27ae60" stroke-width="1" fill="none"/>

      <!-- Highlighted areas -->
      <ellipse cx="140" cy="520" rx="18" ry="14" fill="#27ae60" opacity="0.3"/>
      <text x="140" y="524" text-anchor="middle" font-size="7" fill="#27ae60" font-weight="600">L-MFG</text>

      <ellipse cx="185" cy="530" rx="16" ry="12" fill="#7B68EE" opacity="0.3"/>
      <text x="185" y="534" text-anchor="middle" font-size="7" fill="#7B68EE" font-weight="600">R-hem</text>

      <ellipse cx="150" cy="555" rx="18" ry="10" fill="#F39C12" opacity="0.3"/>
      <text x="150" y="559" text-anchor="middle" font-size="7" fill="#F39C12" font-weight="600">Motor</text>

      <!-- Bullet points -->
      <text x="240" y="470" font-size="9" fill="#27ae60" font-weight="600">Greater L-middle frontal gyrus activation</text>
      <text x="240" y="486" font-size="8" fill="#6c757d">(visuospatial processing)</text>
      <text x="240" y="506" font-size="9" fill="#27ae60" font-weight="600">More right hemisphere engagement</text>
      <text x="240" y="522" font-size="8" fill="#6c757d">(holistic pattern recognition)</text>
      <text x="240" y="542" font-size="9" fill="#27ae60" font-weight="600">Stronger motor area activation</text>
      <text x="240" y="558" font-size="8" fill="#6c757d">(stroke sequence encoding)</text>
      <text x="240" y="578" font-size="9" fill="#27ae60" font-weight="600">Holistic processing tendency</text>
      <text x="240" y="594" font-size="8" fill="#6c757d">(whole character as gestalt)</text>

      <!-- Alphabetic brain -->
      <rect x="560" y="420" width="440" height="190" rx="12" fill="url(#brainGrad2)" stroke="#E74C3C" stroke-width="1.5"/>
      <text x="780" y="445" text-anchor="middle" font-size="13" font-weight="700" fill="#E74C3C">Alphabetic Readers (Latin, Cyrillic)</text>

      <!-- Brain outline -->
      <ellipse cx="660" cy="530" rx="60" ry="50" fill="none" stroke="#E74C3C" stroke-width="1.5"/>
      <path d="M 620 500 C 630 490, 650 485, 660 490 C 670 485, 690 490, 700 500" stroke="#E74C3C" stroke-width="1" fill="none"/>

      <!-- Highlighted areas -->
      <ellipse cx="640" cy="510" rx="18" ry="14" fill="#E74C3C" opacity="0.3"/>
      <text x="640" y="514" text-anchor="middle" font-size="7" fill="#E74C3C" font-weight="600">L-STG</text>

      <ellipse cx="680" cy="540" rx="16" ry="12" fill="#2E86AB" opacity="0.3"/>
      <text x="680" y="544" text-anchor="middle" font-size="7" fill="#2E86AB" font-weight="600">Phon</text>

      <!-- Bullet points -->
      <text x="740" y="470" font-size="9" fill="#E74C3C" font-weight="600">Greater L-superior temporal activation</text>
      <text x="740" y="486" font-size="8" fill="#6c757d">(phonological processing)</text>
      <text x="740" y="506" font-size="9" fill="#E74C3C" font-weight="600">Stronger phonological route</text>
      <text x="740" y="522" font-size="8" fill="#6c757d">(letters -> sounds -> meaning)</text>
      <text x="740" y="542" font-size="9" fill="#E74C3C" font-weight="600">More sequential processing</text>
      <text x="740" y="558" font-size="8" fill="#6c757d">(left-to-right parsing)</text>
      <text x="740" y="578" font-size="9" fill="#E74C3C" font-weight="600">Analytical decomposition</text>
      <text x="740" y="594" font-size="8" fill="#6c757d">(phonological working memory)</text>

      <!-- ==================== IMPLICATIONS FOR METAPHOR ==================== -->
      <rect x="80" y="630" width="900" height="100" rx="12" fill="#1a1a2e" opacity="0.03" stroke="#1a1a2e" stroke-width="1.5"/>
      <text x="530" y="652" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1a2e">Implications for Metaphorical Cognition</text>

      <!-- Two columns -->
      <rect x="100" y="665" width="400" height="50" rx="8" fill="#27ae60" opacity="0.06"/>
      <text x="300" y="685" text-anchor="middle" font-size="10" fill="#27ae60" font-weight="600">Logographic: metaphor processed as visual gestalt</text>
      <text x="300" y="700" text-anchor="middle" font-size="9" fill="#6c757d">明 = sun+moon perceived simultaneously, not sequentially</text>

      <rect x="560" y="665" width="400" height="50" rx="8" fill="#E74C3C" opacity="0.06"/>
      <text x="760" y="685" text-anchor="middle" font-size="10" fill="#E74C3C" font-weight="600">Alphabetic: metaphor is opaque to the reader</text>
      <text x="760" y="700" text-anchor="middle" font-size="9" fill="#6c757d">"comprehend" = only scholarly analysis recovers "seize"</text>

      <!-- ==================== CAVEAT BOX ==================== -->
      <rect x="180" y="750" width="700" height="70" rx="12" fill="#F39C12" opacity="0.08" stroke="#F39C12" stroke-width="1.5"/>
      <rect x="195" y="758" width="100" height="18" rx="9" fill="#F39C12" opacity="0.8"/>
      <text x="245" y="771" text-anchor="middle" font-size="9" font-weight="700" class="white-fill" fill="#ffffff">IMPORTANT</text>

      <text x="530" y="790" text-anchor="middle" font-size="11" fill="#F39C12" font-weight="600">The Script Relativity Hypothesis: Currently Supported at Weak Level Only</text>
      <text x="530" y="808" text-anchor="middle" font-size="9" fill="#6c757d">Evidence supports a channeling effect on attention during reading. Whether these effects extend to general</text>
      <text x="530" y="820" text-anchor="middle" font-size="9" fill="#6c757d">cognition or metaphorical thinking outside reading contexts remains unclear (Bassetti &amp; Cook, 2022).</text>

    </svg>
  </div>

  <figcaption>
    <strong>Figure 8: Script Relativity -- The Metaphorical Transparency Spectrum</strong>
    <span>Writing systems vary dramatically in how visible they render the metaphorical structure of words. Chinese logographic script is maximally transparent: the metaphor in 明 (sun + moon = bright) is literally visible. Arabic's root-pattern system makes semantic connections partially visible to literate speakers. Japanese occupies a mixed position with transparent kanji alongside opaque kana. English alphabetic script is maximally opaque: the metaphorical origin of "comprehend" (Latin "seize completely") is invisible without scholarly knowledge. Neuroimaging confirms different brain regions are engaged, though the script relativity hypothesis currently has only weak empirical support for effects beyond reading.</span>
  </figcaption>
  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background:#27ae60;"></div>Transparent (metaphor visible)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#F39C12;"></div>Partially transparent</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#7B68EE;"></div>Mixed (multi-script)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#E74C3C;"></div>Opaque (metaphor buried)</div>
  </div>
</figure>
</body>
</html>
