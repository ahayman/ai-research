<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Japanese Emotion Body Map</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #f8f9fa;
    color: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 2rem;
  }
  figure {
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
    max-width: 1100px;
    width: 100%;
  }
  .diagram-title {
    text-align: center;
    font-size: 1.3rem;
    font-weight: 700;
    margin-bottom: 2rem;
    color: #1a1a2e;
  }
  .svg-container {
    display: flex;
    justify-content: center;
    overflow-x: auto;
    padding: 1rem 0;
  }
  svg text {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid #e9ecef;
  }
  figcaption strong {
    display: block;
    font-size: 1.1rem;
    color: #1a1a2e;
    margin-bottom: 0.4rem;
  }
  figcaption span {
    font-size: 0.88rem;
    color: #6c757d;
    line-height: 1.6;
    display: block;
  }
  .legend {
    display: flex;
    justify-content: center;
    gap: 1.5rem;
    margin-top: 1.25rem;
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.82rem;
    color: #495057;
  }
  .legend-swatch {
    width: 14px;
    height: 14px;
    border-radius: 3px;
    border: 1px solid rgba(0,0,0,0.15);
  }
  @media (prefers-color-scheme: dark) {
    body { background: #1a1a2e; color: #e9ecef; }
    figure { background: #2d2d44; box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
    .diagram-title { color: #e9ecef; }
    figcaption { border-top-color: #3d3d5c; }
    figcaption strong { color: #e9ecef; }
    figcaption span { color: #adb5bd; }
    .legend-item { color: #adb5bd; }
    svg text { fill: #e9ecef; }
    svg text.dark-fill { fill: #1a1a2e; }
    svg text.white-fill { fill: #ffffff; }
  }
  @media print {
    body { background: #fff; padding: 0; }
    figure { box-shadow: none; border: 1px solid #ccc; break-inside: avoid; }
  }
</style>
</head>
<body>
<figure>
  <div class="diagram-title">Japanese Emotion Body Map: Four Metaphorical Loci</div>
  <div class="svg-container">
    <svg viewBox="0 0 1060 880" width="1060" height="880" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="headGlow" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#2E86AB" stop-opacity="0.2"/>
          <stop offset="100%" stop-color="#2E86AB" stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="heartGlow" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#E74C3C" stop-opacity="0.2"/>
          <stop offset="100%" stop-color="#E74C3C" stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="bellyGlow" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#F39C12" stop-opacity="0.2"/>
          <stop offset="100%" stop-color="#F39C12" stop-opacity="0"/>
        </radialGradient>
      </defs>

      <!-- ==================== JAPANESE BODY FIGURE (Center) ==================== -->
      <!-- Head -->
      <circle cx="400" cy="120" r="55" fill="url(#headGlow)" stroke="#adb5bd" stroke-width="1"/>
      <circle cx="400" cy="120" r="42" fill="none" stroke="#adb5bd" stroke-width="1.5"/>

      <!-- Neck -->
      <rect x="388" y="162" width="24" height="25" fill="none" stroke="#adb5bd" stroke-width="1.5"/>

      <!-- Torso -->
      <rect x="330" y="187" width="140" height="200" rx="20" fill="none" stroke="#adb5bd" stroke-width="1.5"/>

      <!-- Chest/Kokoro zone -->
      <ellipse cx="400" cy="250" rx="45" ry="35" fill="url(#heartGlow)" stroke="#E74C3C" stroke-width="1.5" stroke-dasharray="4,3"/>

      <!-- Belly/Hara zone -->
      <ellipse cx="400" cy="340" rx="50" ry="35" fill="url(#bellyGlow)" stroke="#F39C12" stroke-width="1.5" stroke-dasharray="4,3"/>

      <!-- Arms -->
      <line x1="330" y1="200" x2="280" y2="310" stroke="#adb5bd" stroke-width="1.5"/>
      <line x1="470" y1="200" x2="520" y2="310" stroke="#adb5bd" stroke-width="1.5"/>

      <!-- Legs -->
      <line x1="370" y1="387" x2="350" y2="500" stroke="#adb5bd" stroke-width="1.5"/>
      <line x1="430" y1="387" x2="450" y2="500" stroke="#adb5bd" stroke-width="1.5"/>

      <!-- Ki flow lines (flowing around body) -->
      <path d="M 350 140 C 310 180, 300 250, 320 320 C 340 380, 360 400, 400 420" stroke="#27ae60" stroke-width="1.5" fill="none" stroke-dasharray="6,4" opacity="0.5"/>
      <path d="M 450 140 C 490 180, 500 250, 480 320 C 460 380, 440 400, 400 420" stroke="#27ae60" stroke-width="1.5" fill="none" stroke-dasharray="6,4" opacity="0.5"/>
      <text x="290" y="270" font-size="10" fill="#27ae60" font-weight="600" transform="rotate(-80, 290, 270)">Ki flow</text>
      <text x="510" y="270" font-size="10" fill="#27ae60" font-weight="600" transform="rotate(80, 510, 270)">Ki flow</text>

      <!-- Mushi (insect in belly) -->
      <text x="400" y="355" text-anchor="middle" font-size="16" fill="#7B68EE" opacity="0.6">虫</text>

      <!-- ==================== ATAMA / HEAD (Top-Left) ==================== -->
      <line x1="355" y1="100" x2="100" y2="50" stroke="#2E86AB" stroke-width="1.5" stroke-dasharray="4,3"/>
      <rect x="10" y="20" width="230" height="165" rx="12" fill="#2E86AB" opacity="0.06" stroke="#2E86AB" stroke-width="2"/>

      <rect x="20" y="28" width="100" height="22" rx="6" fill="#2E86AB" opacity="0.85"/>
      <text x="70" y="43" text-anchor="middle" font-size="11" font-weight="700" class="white-fill" fill="#ffffff">Atama 頭</text>

      <text x="125" y="65" text-anchor="middle" font-size="13" font-weight="700" fill="#2E86AB">HEAD</text>
      <text x="125" y="82" text-anchor="middle" font-size="10" fill="#6c757d">Rational thought, anger rising</text>

      <line x1="25" y1="92" x2="225" y2="92" stroke="#2E86AB" stroke-width="0.5" opacity="0.3"/>

      <text x="30" y="110" font-size="9" fill="#2E86AB">頭に来る atama ni kuru</text>
      <text x="30" y="124" font-size="8" fill="#6c757d">"it comes to the head" = anger</text>
      <text x="30" y="142" font-size="9" fill="#2E86AB">頭が良い atama ga yoi</text>
      <text x="30" y="156" font-size="8" fill="#6c757d">"good head" = intelligent</text>
      <text x="30" y="174" font-size="9" fill="#2E86AB">頭が固い atama ga katai</text>
      <text x="30" y="178" font-size="8" fill="#6c757d">"hard head" = stubborn</text>

      <!-- ==================== KOKORO / HEART-MIND (Top-Right) ==================== -->
      <line x1="445" y1="240" x2="660" y2="120" stroke="#E74C3C" stroke-width="1.5" stroke-dasharray="4,3"/>
      <rect x="620" y="20" width="280" height="200" rx="12" fill="#E74C3C" opacity="0.06" stroke="#E74C3C" stroke-width="2"/>

      <rect x="630" y="28" width="120" height="22" rx="6" fill="#E74C3C" opacity="0.85"/>
      <text x="690" y="43" text-anchor="middle" font-size="11" font-weight="700" class="white-fill" fill="#ffffff">Kokoro 心</text>

      <text x="760" y="65" text-anchor="middle" font-size="13" font-weight="700" fill="#E74C3C">HEART-MIND-SPIRIT</text>
      <text x="760" y="82" text-anchor="middle" font-size="10" fill="#6c757d">Holistic core: emotion + thought unified</text>
      <text x="760" y="96" text-anchor="middle" font-size="9" fill="#6c757d">Located in chest (mune)</text>

      <line x1="635" y1="105" x2="885" y2="105" stroke="#E74C3C" stroke-width="0.5" opacity="0.3"/>

      <text x="635" y="122" font-size="9" fill="#E74C3C">心が痛む kokoro ga itamu</text>
      <text x="635" y="136" font-size="8" fill="#6c757d">"heart hurts" = emotional pain</text>
      <text x="635" y="154" font-size="9" fill="#E74C3C">心強い kokorozuyoi</text>
      <text x="635" y="168" font-size="8" fill="#6c757d">"strong heart" = reassured</text>
      <text x="635" y="186" font-size="9" fill="#E74C3C">心細い kokorobosoi</text>
      <text x="635" y="200" font-size="8" fill="#6c757d">"thin heart" = anxious, helpless</text>
      <text x="635" y="214" font-size="8" fill="#E74C3C" font-style="italic">Unlike English "heart" (emotion only)</text>

      <!-- ==================== HARA / BELLY (Center-Right) ==================== -->
      <line x1="450" y1="340" x2="660" y2="340" stroke="#F39C12" stroke-width="1.5" stroke-dasharray="4,3"/>
      <rect x="620" y="260" width="280" height="200" rx="12" fill="#F39C12" opacity="0.06" stroke="#F39C12" stroke-width="2"/>

      <rect x="630" y="268" width="90" height="22" rx="6" fill="#F39C12" opacity="0.85"/>
      <text x="675" y="283" text-anchor="middle" font-size="11" font-weight="700" class="white-fill" fill="#ffffff">Hara 腹</text>

      <text x="760" y="305" text-anchor="middle" font-size="13" font-weight="700" fill="#F39C12">BELLY / STOMACH</text>
      <text x="760" y="322" text-anchor="middle" font-size="10" fill="#6c757d">Intention, character, moral judgment</text>
      <text x="760" y="336" text-anchor="middle" font-size="9" fill="#6c757d">Seat of authentic selfhood</text>

      <line x1="635" y1="345" x2="885" y2="345" stroke="#F39C12" stroke-width="0.5" opacity="0.3"/>

      <text x="635" y="362" font-size="9" fill="#F39C12">腹が立つ hara ga tatsu</text>
      <text x="635" y="376" font-size="8" fill="#6c757d">"belly stands up" = angry</text>
      <text x="635" y="394" font-size="9" fill="#F39C12">腹を割る hara o waru</text>
      <text x="635" y="408" font-size="8" fill="#6c757d">"split the belly" = speak frankly</text>
      <text x="635" y="426" font-size="9" fill="#F39C12">腹が黒い hara ga kuroi</text>
      <text x="635" y="440" font-size="8" fill="#6c757d">"black belly" = scheming</text>
      <text x="635" y="455" font-size="8" fill="#F39C12" font-style="italic">No equivalent in English</text>

      <!-- ==================== KI / VITAL ENERGY (Left-Center) ==================== -->
      <line x1="330" y1="250" x2="160" y2="310" stroke="#27ae60" stroke-width="1.5" stroke-dasharray="4,3"/>
      <rect x="10" y="230" width="250" height="200" rx="12" fill="#27ae60" opacity="0.06" stroke="#27ae60" stroke-width="2"/>

      <rect x="20" y="238" width="70" height="22" rx="6" fill="#27ae60" opacity="0.85"/>
      <text x="55" y="253" text-anchor="middle" font-size="11" font-weight="700" class="white-fill" fill="#ffffff">Ki 気</text>

      <text x="135" y="275" text-anchor="middle" font-size="13" font-weight="700" fill="#27ae60">BREATH / VITAL ENERGY</text>
      <text x="135" y="292" text-anchor="middle" font-size="10" fill="#6c757d">Mood, temperament, mental activity</text>
      <text x="135" y="306" text-anchor="middle" font-size="9" fill="#6c757d">Flows through the entire body</text>

      <line x1="25" y1="315" x2="245" y2="315" stroke="#27ae60" stroke-width="0.5" opacity="0.3"/>

      <text x="25" y="332" font-size="9" fill="#27ae60">気分 kibun "ki-portion"</text>
      <text x="25" y="346" font-size="8" fill="#6c757d">= mood, feeling</text>
      <text x="25" y="364" font-size="9" fill="#27ae60">気持ち kimochi "ki-holding"</text>
      <text x="25" y="378" font-size="8" fill="#6c757d">= feeling, sensation</text>
      <text x="25" y="396" font-size="9" fill="#27ae60">元気 genki "original ki"</text>
      <text x="25" y="410" font-size="8" fill="#6c757d">= health, energy, vigor</text>
      <text x="25" y="425" font-size="8" fill="#27ae60" font-style="italic">Non-localized: pervades the body</text>

      <!-- ==================== MUSHI / INSECT (Bottom-Left) ==================== -->
      <line x1="380" y1="375" x2="160" y2="510" stroke="#7B68EE" stroke-width="1.5" stroke-dasharray="4,3"/>
      <rect x="10" y="470" width="250" height="175" rx="12" fill="#7B68EE" opacity="0.06" stroke="#7B68EE" stroke-width="2"/>

      <rect x="20" y="478" width="100" height="22" rx="6" fill="#7B68EE" opacity="0.85"/>
      <text x="70" y="493" text-anchor="middle" font-size="11" font-weight="700" class="white-fill" fill="#ffffff">Mushi 虫</text>

      <text x="135" y="515" text-anchor="middle" font-size="13" font-weight="700" fill="#7B68EE">WORM / INSECT</text>
      <text x="135" y="532" text-anchor="middle" font-size="10" fill="#6c757d">Instinctive reactions, irrational feelings</text>
      <text x="135" y="546" text-anchor="middle" font-size="9" fill="#6c757d">An imagined creature in the belly</text>

      <line x1="25" y1="555" x2="245" y2="555" stroke="#7B68EE" stroke-width="0.5" opacity="0.3"/>

      <text x="25" y="572" font-size="9" fill="#7B68EE">虫が好かない mushi ga sukanai</text>
      <text x="25" y="586" font-size="8" fill="#6c757d">"worm doesn't like it" = instinctive dislike</text>
      <text x="25" y="604" font-size="9" fill="#7B68EE">虫の居所が悪い mushi no idokoro</text>
      <text x="25" y="618" font-size="8" fill="#6c757d">ga warui "worm's spot is bad" = bad mood</text>
      <text x="25" y="636" font-size="8" fill="#7B68EE" font-style="italic">Unique to Japanese: emotions as creatures</text>

      <!-- ==================== ENGLISH COMPARISON (Bottom-Right) ==================== -->
      <rect x="580" y="500" width="460" height="270" rx="12" fill="#adb5bd" opacity="0.06" stroke="#adb5bd" stroke-width="1.5"/>
      <text x="810" y="525" text-anchor="middle" font-size="14" font-weight="700" fill="#adb5bd">English Comparison</text>
      <text x="810" y="542" text-anchor="middle" font-size="10" fill="#6c757d">Far less differentiated body-emotion system</text>

      <!-- Small English body -->
      <circle cx="660" cy="600" r="22" fill="none" stroke="#adb5bd" stroke-width="1"/>
      <rect x="648" y="622" width="24" height="15" fill="none" stroke="#adb5bd" stroke-width="1"/>
      <rect x="636" y="637" width="48" height="80" rx="8" fill="none" stroke="#adb5bd" stroke-width="1"/>
      <line x1="636" y1="645" x2="615" y2="690" stroke="#adb5bd" stroke-width="1"/>
      <line x1="684" y1="645" x2="705" y2="690" stroke="#adb5bd" stroke-width="1"/>
      <line x1="650" y1="717" x2="640" y2="755" stroke="#adb5bd" stroke-width="1"/>
      <line x1="670" y1="717" x2="680" y2="755" stroke="#adb5bd" stroke-width="1"/>

      <!-- English zones -->
      <circle cx="660" cy="600" r="18" fill="#2E86AB" opacity="0.1"/>
      <text x="720" y="598" font-size="9" fill="#2E86AB" font-weight="600">Head = thought</text>
      <text x="720" y="612" font-size="8" fill="#6c757d">"use your head"</text>

      <circle cx="660" cy="660" r="14" fill="#E74C3C" opacity="0.1"/>
      <text x="720" y="660" font-size="9" fill="#E74C3C" font-weight="600">Heart = emotion</text>
      <text x="720" y="674" font-size="8" fill="#6c757d">"broken heart"</text>

      <ellipse cx="660" cy="690" rx="12" ry="10" fill="#F39C12" opacity="0.1"/>
      <text x="720" y="698" font-size="9" fill="#F39C12" font-weight="600">Gut = instinct</text>
      <text x="720" y="712" font-size="8" fill="#6c757d">"gut feeling"</text>

      <line x1="648" y1="660" x2="648" y2="680" stroke="#27ae60" stroke-width="1.5" opacity="0.3"/>
      <text x="720" y="738" font-size="9" fill="#27ae60" font-weight="600">Spine = courage</text>
      <text x="720" y="752" font-size="8" fill="#6c757d">"spineless"</text>

      <!-- Key difference -->
      <rect x="785" y="545" width="240" height="40" rx="8" fill="#adb5bd" opacity="0.08"/>
      <text x="905" y="562" text-anchor="middle" font-size="9" fill="#adb5bd" font-weight="600">English separates head (thought)</text>
      <text x="905" y="576" text-anchor="middle" font-size="9" fill="#adb5bd" font-weight="600">from heart (emotion); Japanese unifies them</text>

      <!-- ==================== SUMMARY BAR ==================== -->
      <rect x="30" y="800" width="1000" height="50" rx="10" fill="#1a1a2e" opacity="0.04" stroke="#1a1a2e" stroke-width="1"/>
      <text x="530" y="820" text-anchor="middle" font-size="11" font-weight="700" fill="#1a1a2e">Japanese: 4 systems (kokoro + hara + ki + mushi) distribute emotion across a richer, more differentiated body map</text>
      <text x="530" y="838" text-anchor="middle" font-size="10" fill="#6c757d">English: 2 main systems (head vs. heart) with minor roles for gut, spine, blood</text>

    </svg>
  </div>

  <figcaption>
    <strong>Figure 6: Japanese Emotion Body Map</strong>
    <span>Japanese distributes emotion metaphors across a distinctive four-system body map: kokoro (heart-mind-spirit, located in the chest) unifies emotion and thought in a way English separates; hara (belly) serves as the seat of authentic intention, character, and moral judgment; ki (vital energy/breath) flows through the body as mood and temperament; and mushi (an imagined insect in the belly) governs instinctive, irrational reactions. The English system is far less differentiated, primarily splitting head (thought) from heart (emotion).</span>
  </figcaption>
  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background:#2E86AB;"></div>Atama / Head</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#E74C3C;"></div>Kokoro / Heart-Mind</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#F39C12;"></div>Hara / Belly</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#27ae60;"></div>Ki / Vital Energy</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#7B68EE;"></div>Mushi / Insect</div>
  </div>
</figure>
</body>
</html>
