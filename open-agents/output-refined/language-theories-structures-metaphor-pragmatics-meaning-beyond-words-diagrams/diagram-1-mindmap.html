<body>
<figure>
  <div class="mermaid">
%%{init: {'theme': 'neutral', 'themeVariables': {'fontSize': '14px'}}}%%
mindmap
  root(("**Cooperative Principle**<br/>Make your contribution<br/>as required by the<br/>accepted purpose of<br/>the talk exchange"))
    **QUANTITY**<br/>Be Informative
      Be as informative<br/>as required
      Do not say more<br/>than required
      Flouting Example
        Boss: How is the new hire?<br/>Reply: Well, he is always on time.<br/>**Implicature: He is mediocre**
    **QUALITY**<br/>Be Truthful
      Do not say what you<br/>believe to be false
      Do not say what you<br/>lack evidence for
      Flouting Example
        Oh, that is just great!<br/>said when something terrible happens<br/>**Implicature: Sarcasm / irony**
    **RELATION**<br/>Be Relevant
      Make your contribution<br/>relevant to the topic
      Flouting Example
        A: How did the exam go?<br/>B: The weather was nice today.<br/>**Implicature: Exam went badly**
    **MANNER**<br/>Be Clear
      Avoid obscurity
      Avoid ambiguity
      Be brief
      Be orderly
      Flouting Example
        She did the thing with<br/>the stuff at the place.<br/>**Implicature: Topic is sensitive**
  </div>
  <div class="legend">
    <div class="legend-item"><div class="legend-swatch swatch-principle"></div> Cooperative Principle (center)</div>
    <div class="legend-item"><div class="legend-swatch swatch-maxim"></div> Four Maxims</div>
    <div class="legend-item"><div class="legend-swatch swatch-flouting"></div> Flouting examples generate implicature</div>
  </div>
  <figcaption>
    <strong>Diagram 1: Grice's Cooperative Principle and Maxims</strong>
    <span>H. Paul Grice (1975) proposed that conversation is governed by a general Cooperative Principle, supported by four maxims: Quantity (be informative), Quality (be truthful), Relation (be relevant), and Manner (be clear). The real power of the framework emerges when speakers conspicuously violate -- or "flout" -- these maxims, forcing hearers to derive conversational implicatures. The flouting examples show how deliberate violations generate meaning that goes far beyond the literal words. Based on Grice's "Logic and Conversation" (1975) in <i>Studies in the Way of Words</i> (1989).</span>
  </figcaption>
</figure>
