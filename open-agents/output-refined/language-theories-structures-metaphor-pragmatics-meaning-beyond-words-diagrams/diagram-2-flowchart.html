<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Speech Act Theory — Three Layers</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #f8f9fa;
    color: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 2rem;
  }
  figure {
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
    max-width: 900px;
    width: 100%;
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid #e9ecef;
  }
  figcaption strong {
    display: block;
    font-size: 1.15rem;
    color: #1a1a2e;
    margin-bottom: 0.4rem;
  }
  figcaption span {
    font-size: 0.9rem;
    color: #6c757d;
    line-height: 1.5;
  }

  .diagram-container {
    position: relative;
    max-width: 760px;
    margin: 0 auto;
  }

  .utterance-banner {
    text-align: center;
    background: linear-gradient(135deg, #312e81, #4338ca);
    color: #fff;
    padding: 1rem 1.5rem;
    border-radius: 12px;
    margin-bottom: 2rem;
    font-size: 1.2rem;
    font-style: italic;
    letter-spacing: 0.02em;
  }
  .utterance-banner .label {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    opacity: 0.8;
    font-style: normal;
    display: block;
    margin-bottom: 0.3rem;
  }

  .layers {
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .layer {
    display: grid;
    grid-template-columns: 180px 1fr;
    align-items: stretch;
    border: 2px solid;
    border-radius: 12px;
    overflow: hidden;
    position: relative;
  }
  .layer + .layer {
    margin-top: -2px;
  }

  .layer-label {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 1.2rem 1rem;
    text-align: center;
    color: #fff;
    font-weight: 600;
  }
  .layer-label .act-name {
    font-size: 1.05rem;
    margin-bottom: 0.2rem;
  }
  .layer-label .act-subtitle {
    font-size: 0.75rem;
    opacity: 0.85;
    font-weight: 400;
  }

  .layer-content {
    padding: 1.2rem 1.5rem;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .layer-content .definition {
    font-size: 0.92rem;
    color: #495057;
    margin-bottom: 0.6rem;
    line-height: 1.45;
  }
  .layer-content .example {
    font-size: 0.88rem;
    background: rgba(0,0,0,0.04);
    padding: 0.6rem 0.9rem;
    border-radius: 8px;
    border-left: 3px solid;
    line-height: 1.5;
  }

  /* Locutionary */
  .layer-loc { border-color: #0891b2; }
  .layer-loc .layer-label { background: #0891b2; }
  .layer-loc .layer-content { background: #ecfeff; }
  .layer-loc .example { border-left-color: #0891b2; color: #155e75; }

  /* Illocutionary */
  .layer-ill { border-color: #7c3aed; }
  .layer-ill .layer-label { background: #7c3aed; }
  .layer-ill .layer-content { background: #f5f3ff; }
  .layer-ill .example { border-left-color: #7c3aed; color: #4c1d95; }

  /* Perlocutionary */
  .layer-per { border-color: #dc2626; }
  .layer-per .layer-label { background: #dc2626; }
  .layer-per .layer-content { background: #fef2f2; }
  .layer-per .example { border-left-color: #dc2626; color: #7f1d1d; }

  .connector {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 28px;
    position: relative;
  }
  .connector::before {
    content: '';
    position: absolute;
    left: 50%;
    top: 0;
    bottom: 0;
    width: 2px;
    background: #adb5bd;
  }
  .connector-label {
    background: #f8f9fa;
    padding: 0 0.6rem;
    font-size: 0.72rem;
    color: #6c757d;
    position: relative;
    z-index: 1;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .simultaneous-badge {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.4rem;
    margin: 1.2rem 0 0.5rem;
    font-size: 0.8rem;
    color: #6c757d;
  }
  .simultaneous-badge .bracket {
    font-size: 2.5rem;
    color: #adb5bd;
    line-height: 1;
    font-weight: 200;
  }

  @media (prefers-color-scheme: dark) {
    body { background: #1a1a2e; color: #e9ecef; }
    figure { background: #2d2d44; box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
    figcaption { border-top-color: #3d3d5c; }
    figcaption strong { color: #e9ecef; }
    figcaption span { color: #adb5bd; }
    .layer-loc .layer-content { background: #1a2e2e; }
    .layer-loc .layer-content .definition { color: #a7d8de; }
    .layer-loc .example { background: rgba(8,145,178,0.12); color: #67e8f9; }
    .layer-ill .layer-content { background: #251a3a; }
    .layer-ill .layer-content .definition { color: #c4b5fd; }
    .layer-ill .example { background: rgba(124,58,237,0.12); color: #c4b5fd; }
    .layer-per .layer-content { background: #2e1a1a; }
    .layer-per .layer-content .definition { color: #fca5a5; }
    .layer-per .example { background: rgba(220,38,38,0.12); color: #fca5a5; }
    .connector-label { background: #2d2d44; color: #adb5bd; }
    .connector::before { background: #4d4d6c; }
    .simultaneous-badge { color: #adb5bd; }
    .simultaneous-badge .bracket { color: #4d4d6c; }
    .utterance-banner { background: linear-gradient(135deg, #312e81, #4338ca); }
  }

  @media (max-width: 600px) {
    .layer { grid-template-columns: 1fr; }
    .layer-label { padding: 0.8rem; }
    .layer-content { padding: 1rem; }
    figure { padding: 1.5rem; }
  }
</style>
</head>
<body>
<figure>
  <div class="diagram-container">
    <div class="utterance-banner">
      <span class="label">Example Utterance</span>
      "Can you pass the salt?"
    </div>

    <div class="simultaneous-badge">
      <span class="bracket">{</span>
      <span>All three acts occur simultaneously with every utterance</span>
      <span class="bracket">}</span>
    </div>

    <div class="layers">
      <div class="layer layer-loc">
        <div class="layer-label">
          <div class="act-name">Locutionary Act</div>
          <div class="act-subtitle">What is said</div>
        </div>
        <div class="layer-content">
          <div class="definition">The act of producing a meaningful linguistic expression -- sounds conforming to grammar, with definite sense and reference.</div>
          <div class="example">A yes/no interrogative about the hearer's physical ability to move a salt container in the hearer's direction.</div>
        </div>
      </div>

      <div class="connector"><span class="connector-label">simultaneous</span></div>

      <div class="layer layer-ill">
        <div class="layer-label">
          <div class="act-name">Illocutionary Act</div>
          <div class="act-subtitle">What is meant / done</div>
        </div>
        <div class="layer-content">
          <div class="definition">The act performed <em>in</em> saying something -- the illocutionary force (asserting, requesting, promising, warning, etc.).</div>
          <div class="example">A <strong>request</strong> (directive) -- the speaker wants the hearer to hand them the salt. The question form is an indirect speech act; its grammatical form (question) differs from its illocutionary force (request).</div>
        </div>
      </div>

      <div class="connector"><span class="connector-label">simultaneous</span></div>

      <div class="layer layer-per">
        <div class="layer-label">
          <div class="act-name">Perlocutionary Act</div>
          <div class="act-subtitle">What effect is achieved</div>
        </div>
        <div class="layer-content">
          <div class="definition">The effect achieved <em>by</em> saying something on the audience -- persuading, frightening, amusing, motivating, etc.</div>
          <div class="example">The hearer <strong>passes the salt</strong>. A secondary effect: the hearer recognizes the speaker as polite (having used an indirect form rather than a bald command).</div>
        </div>
      </div>
    </div>
  </div>

  <figcaption>
    <strong>Diagram 2: Speech Act Theory -- Three Simultaneous Layers</strong>
    <span>J.L. Austin proposed that every utterance simultaneously performs three acts: the locutionary (producing meaningful language), the illocutionary (performing an action such as requesting, promising, or warning), and the perlocutionary (achieving an effect on the audience). "Can you pass the salt?" illustrates how a single utterance's grammatical form (question) diverges from its illocutionary force (request) -- a phenomenon Searle termed the <em>indirect speech act</em>. Based on Austin's <i>How to Do Things with Words</i> (1962) and Searle's <i>Speech Acts</i> (1969).</span>
  </figcaption>
</figure>
</body>
</html>
