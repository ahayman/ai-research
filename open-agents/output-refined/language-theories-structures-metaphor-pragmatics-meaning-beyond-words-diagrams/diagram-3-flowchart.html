<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relevance Theory Processing Model</title>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #f8f9fa;
    color: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 2rem;
  }
  figure {
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
    max-width: 1000px;
    width: 100%;
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid #e9ecef;
  }
  figcaption strong {
    display: block;
    font-size: 1.15rem;
    color: #1a1a2e;
    margin-bottom: 0.4rem;
  }
  figcaption span {
    font-size: 0.9rem;
    color: #6c757d;
    line-height: 1.5;
  }
  .mermaid {
    display: flex;
    justify-content: center;
  }
  .legend {
    display: flex;
    justify-content: center;
    gap: 1.5rem;
    margin-top: 1rem;
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.85rem;
    color: #495057;
  }
  .legend-swatch {
    width: 16px;
    height: 16px;
    border-radius: 4px;
  }
  .swatch-input { background: #6366f1; }
  .swatch-decode { background: #0891b2; }
  .swatch-enrich { background: #059669; }
  .swatch-infer { background: #d97706; }
  .swatch-test { background: #dc2626; }
  @media (prefers-color-scheme: dark) {
    body { background: #1a1a2e; color: #e9ecef; }
    figure { background: #2d2d44; box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
    figcaption { border-top-color: #3d3d5c; }
    figcaption strong { color: #e9ecef; }
    figcaption span { color: #adb5bd; }
    .legend-item { color: #adb5bd; }
  }
</style>
</head>
<body>
<figure>
  <div class="mermaid">
%%{init: {'theme': 'neutral', 'themeVariables': {'fontSize': '13px'}}}%%
flowchart TD
    U["<b>Utterance Received</b><br/>Speaker produces an<br/>ostensive stimulus"]:::input

    U --> D["<b>1. Decode Linguistic Meaning</b><br/>Process phonology, syntax,<br/>compositional semantics<br/>to obtain logical form"]:::decode

    D --> E["<b>2. Enrich to Explicature</b><br/>Disambiguate, assign reference,<br/>saturate, free-enrich,<br/>construct ad hoc concepts"]:::enrich

    E --> I["<b>3. Derive Implicatures</b><br/>Generate implicitly communicated<br/>propositions via inference<br/>from context + background"]:::infer

    I --> T{"<b>4. Test for<br/>Optimal Relevance</b><br/>Sufficient cognitive effects<br/>for minimal effort?"}:::test

    T -->|"Yes: expectations<br/>of relevance met"| A["<b>Accept Interpretation</b><br/>Speaker meaning<br/>recovered"]:::accept

    T -->|"No: revise<br/>and try again"| E

    subgraph EFFORT ["Effort / Effect Trade-off"]
        direction LR
        EFF1["Greater cognitive effects<br/>= greater relevance"]:::effsub
        EFF2["Greater processing effort<br/>= lesser relevance"]:::effsub
    end

    T -.- EFFORT

    subgraph KEY_PRINCIPLE ["Communicative Principle of Relevance"]
        direction TB
        KP["Every act of ostensive<br/>communication conveys a<br/>presumption of its own<br/>optimal relevance"]:::principle
    end

    U -.- KEY_PRINCIPLE

    classDef input fill:#e0e7ff,stroke:#6366f1,stroke-width:2px,color:#1a1a2e
    classDef decode fill:#ecfeff,stroke:#0891b2,stroke-width:2px,color:#1a1a2e
    classDef enrich fill:#d1fae5,stroke:#059669,stroke-width:2px,color:#1a1a2e
    classDef infer fill:#fef3c7,stroke:#d97706,stroke-width:2px,color:#1a1a2e
    classDef test fill:#fee2e2,stroke:#dc2626,stroke-width:2px,color:#1a1a2e
    classDef accept fill:#d1fae5,stroke:#059669,stroke-width:3px,color:#1a1a2e
    classDef effsub fill:#f3f4f6,stroke:#9ca3af,stroke-width:1px,color:#374151
    classDef principle fill:#ede9fe,stroke:#7c3aed,stroke-width:2px,color:#4c1d95
  </div>
  <div class="legend">
    <div class="legend-item"><div class="legend-swatch swatch-input"></div> Input (ostensive stimulus)</div>
    <div class="legend-item"><div class="legend-swatch swatch-decode"></div> Linguistic decoding</div>
    <div class="legend-item"><div class="legend-swatch swatch-enrich"></div> Pragmatic enrichment</div>
    <div class="legend-item"><div class="legend-swatch swatch-infer"></div> Implicature derivation</div>
    <div class="legend-item"><div class="legend-swatch swatch-test"></div> Relevance test</div>
  </div>
  <figcaption>
    <strong>Diagram 3: Relevance Theory Processing Model</strong>
    <span>Sperber and Wilson's Relevance Theory (1986/1995) replaces Grice's four maxims with a single Communicative Principle of Relevance: every ostensive act carries a presumption of its own optimal relevance. The hearer follows a path of least effort -- decoding linguistic meaning, enriching it to an explicature, deriving implicatures, and testing whether the interpretation yields sufficient cognitive effects for the processing effort expended. If the relevance threshold is not met, the hearer revises and iterates. This is an automatic cognitive process, not a conscious deliberation.</span>
  </figcaption>
</figure>
<script>
  mermaid.initialize({ startOnLoad: true, securityLevel: 'loose', theme: 'neutral' });
</script>
</body>
</html>
