<body>
<figure>
  <div class="mermaid">
%%{init: {'theme': 'neutral', 'themeVariables': {'fontSize': '13px'}}}%%
flowchart TD
    FTA["<b>Speaker wants to perform<br/>a Face-Threatening Act</b>"]:::assess

    FTA --> CALC["<b>Calculate Weightiness</b><br/>W = D + P + R<br/><i>Distance + Power + Rank of imposition</i>"]:::assess

    CALC --> LOW{"Low threat?"}:::decision
    CALC --> MED{"Medium threat?"}:::decision
    CALC --> HIGH{"High threat?"}:::decision
    CALC --> EXT{"Extreme threat?"}:::decision

    LOW -->|"Yes"| S1["<b>Strategy 1: Bald on Record</b><br/>Direct, clear, unambiguous<br/>No redressive action"]:::strategy
    S1 --> E1["Close the window.<br/>You are wrong.<br/>Watch out!"]:::example

    MED -->|"Yes"| S2["<b>Strategy 2: Positive Politeness</b><br/>Attend to hearer's desire to<br/>be liked and approved of"]:::strategy
    S2 --> E2["Great shirt! Hey, could you<br/>close the window?<br/>We should try harder on this."]:::example

    MED -->|"Yes"| S3["<b>Strategy 3: Negative Politeness</b><br/>Attend to hearer's desire for<br/>autonomy and non-imposition"]:::strategy
    S3 --> E3["I am sorry to bother you,<br/>but would you mind closing<br/>the window?"]:::example

    HIGH -->|"Yes"| S4["<b>Strategy 4: Off Record</b><br/>Hints, understatement, ambiguity<br/>Deniable intention"]:::strategy
    S4 --> E4["It is cold in here.<br/>Someone left the window open.<br/>I wonder if the window is open."]:::example

    EXT -->|"Yes"| S5["<b>Strategy 5: Don't Do the FTA</b><br/>Face threat too great<br/>Silence is the safest option"]:::avoid

    subgraph FACE ["Two Dimensions of Face"]
        direction LR
        POS["<b>Positive Face</b><br/>Want to be liked,<br/>approved, ratified"]:::facepos
        NEG["<b>Negative Face</b><br/>Want autonomy,<br/>freedom from imposition"]:::faceneg
    end

    FTA -.- FACE

    classDef assess fill:#e0e7ff,stroke:#6366f1,stroke-width:2px,color:#1a1a2e
    classDef decision fill:#f3f4f6,stroke:#6b7280,stroke-width:2px,color:#1a1a2e
    classDef strategy fill:#d1fae5,stroke:#059669,stroke-width:2px,color:#1a1a2e
    classDef example fill:#fef3c7,stroke:#d97706,stroke-width:1px,color:#92400e
    classDef avoid fill:#fee2e2,stroke:#dc2626,stroke-width:2px,color:#7f1d1d
    classDef facepos fill:#dbeafe,stroke:#2563eb,stroke-width:1px,color:#1e40af
    classDef faceneg fill:#ede9fe,stroke:#7c3aed,stroke-width:1px,color:#4c1d95
  </div>
  <div class="legend">
    <div class="legend-item"><div class="legend-swatch swatch-assess"></div> Assessment of face threat</div>
    <div class="legend-item"><div class="legend-swatch swatch-strategy"></div> Politeness strategies</div>
    <div class="legend-item"><div class="legend-swatch swatch-example"></div> Example utterances</div>
    <div class="legend-item"><div class="legend-swatch swatch-avoid"></div> Avoidance</div>
  </div>
  <figcaption>
    <strong>Diagram 4: Politeness Strategy Selection (Brown & Levinson)</strong>
    <span>Brown and Levinson (1987) model politeness as a rational strategy selection process. Speakers assess the "weightiness" of a face-threatening act using three variables: social Distance (D), relative Power (P), and Rank of imposition (R). As weightiness increases, speakers move from direct, bald-on-record strategies through positive politeness (solidarity) and negative politeness (deference) to off-record hints -- or avoid the act entirely. This framework explains why human language is so pervasively indirect: directness is efficient but threatening; indirectness sacrifices efficiency for face-preservation.</span>
  </figcaption>
</figure>
