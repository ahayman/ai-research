mindmap
  root(("**DEIXIS**<br/>Context-dependent<br/>reference<br/>From Greek: pointing"))
    **Person Deixis**<br/>Who is speaking?
      1st person<br/>**I, me, we, us**<br/>The speaker
      2nd person<br/>**you**<br/>The addressee
      3rd person<br/>**he, she, they, it**<br/>Others
      Key problem<br/>A note saying I will<br/>be back is meaningless<br/>without knowing who I is
    **Spatial Deixis**<br/>Where?
      Proximal<br/>**this, here, these**<br/>Near the speaker
      Distal<br/>**that, there, those**<br/>Far from the speaker
      Cross-linguistic<br/>Japanese has 3 levels<br/>near speaker / near hearer<br/>/ far from both
    **Temporal Deixis**<br/>When?
      **now, then, today**<br/>**yesterday, tomorrow**
      Tense is deictic<br/>Past, present, future<br/>defined relative to<br/>moment of speaking
      I will do it tomorrow<br/>refers to different days<br/>depending on when said
    **Discourse Deixis**<br/>Where in the text?
      **this, that, the former**<br/>**the latter, as mentioned**<br/>**above, the following**
      This is what I mean<br/>refers to something in<br/>the discourse, not the<br/>physical environment
    **Social Deixis**<br/>What is our relationship?
      T-V distinctions<br/>French **tu** vs **vous**<br/>German **du** vs **Sie**
      Honorifics<br/>Japanese **-san**<br/>**-sama, -sensei**
      Encodes power,<br/>solidarity, respect,<br/>intimacy, and social<br/>distance into language
  </div>
  <div class="legend">
    <div class="legend-item"><div class="legend-swatch swatch-center"></div> Deixis (center)</div>

  </div>
  <figcaption>
    <strong>Diagram 6: Types of Deixis</strong>
    <span>Deixis (from Greek <i>deiktikos</i>, "pointing") refers to expressions whose meaning depends entirely on the context of utterance. Five types are recognized: Person deixis (who is speaking/addressed), Spatial deixis (where relative to the speaker), Temporal deixis (when relative to the moment of speaking), Discourse deixis (reference to parts of the ongoing text), and Social deixis (encoding of social relationships through language). Deictic expressions are like indexical arrows pointing outward from the utterance into the world -- without knowing who, where, when, and to whom, they have no determinate reference. As Wittgenstein noted, meaning requires context.</span>
  </figcaption>
