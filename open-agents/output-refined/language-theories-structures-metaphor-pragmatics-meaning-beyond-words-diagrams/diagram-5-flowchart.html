<title>Presupposition Triggers and Projection</title>

<style>

  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.25rem;

  }

    display: block;

  @media (prefers-color-scheme: dark) {
    body { background: #1a1a2e; color: #e9ecef; }

<body>
<figure>
  <div class="mermaid">
%%{init: {'theme': 'neutral', 'themeVariables': {'fontSize': '12px'}}}%%
flowchart TD
    subgraph TRIGGERS ["PRESUPPOSITION TRIGGERS"]
        direction TB
        T1["<b>Factive Verbs</b><br/><i>She regrets leaving</i><br/>Presupposes: she left"]:::trigger
        T2["<b>Definite Descriptions</b><br/><i>The professor is late</i><br/>Presupposes: a professor exists"]:::trigger
        T3["<b>Change-of-State Verbs</b><br/><i>He stopped smoking</i><br/>Presupposes: he was smoking"]:::trigger
        T4["<b>Cleft Sentences</b><br/><i>It was John who broke it</i><br/>Presupposes: someone broke it"]:::trigger
        T5["<b>Iteratives</b><br/><i>She returned to Paris</i><br/>Presupposes: she was there before"]:::trigger
        T6["<b>Temporal Clauses</b><br/><i>Before she left, she locked up</i><br/>Presupposes: she left"]:::trigger
        T7["<b>Counterfactuals</b><br/><i>If I were rich, I would travel</i><br/>Presupposes: I am not rich"]:::trigger
        T8["<b>Implicative Verbs</b><br/><i>He managed to open it</i><br/>Presupposes: he tried"]:::trigger
    end

    TRIGGERS --> NEG_TEST{"<b>Negation Test</b><br/>Does the presupposition<br/>survive negation?"}:::test

    NEG_TEST -->|"Yes: survives"| PROJ["<b>PROJECTS</b><br/>Presupposition holds<br/>for the whole sentence"]:::project

    PROJ --> EX_PROJ["<i>He did not stop smoking</i><br/>Still presupposes:<br/>he was smoking before"]:::projex

    NEG_TEST -->|"Compare with<br/>entailment"| ENT["<b>ENTAILMENT</b><br/>Does NOT survive negation"]:::entail

    ENT --> EX_ENT["<i>John did not manage to escape</i><br/>Does NOT entail:<br/>John escaped"]:::entex

    subgraph PROJECTION ["THE PROJECTION PROBLEM"]
        direction TB
        PP1["<b>Embedding in conditionals</b>"]:::projprob
        PP2["<b>Embedding in disjunctions</b>"]:::projprob
        PP3["<b>Embedding under attitude verbs</b>"]:::projprob

        PP1 --> F1["<i>If John was smoking,<br/>he has stopped</i><br/>Presupposition FILTERED<br/>by the antecedent"]:::filter
        PP2 --> F2["<i>Either John never smoked<br/>or he has stopped</i><br/>Presupposition FILTERED<br/>by the disjunct"]:::filter
        PP3 --> F3["<i>John believes the King<br/>of France is bald</i><br/>Presupposition may or<br/>may not project"]:::filter
    end

    PROJ --> PROJECTION

    subgraph ACCOM ["ACCOMMODATION"]
        direction TB
        AC["When presuppositions are<br/>new information, hearers<br/><b>accommodate</b> them into<br/>the common ground"]:::accom
        AC_EX["<i>My sister called yesterday</i><br/>Hearer did not know you<br/>had a sister -- adds it<br/>to shared knowledge"]:::accomex
    end

    PROJ --> ACCOM

    classDef trigger fill:#e0e7ff,stroke:#6366f1,stroke-width:2px,color:#1a1a2e
    classDef test fill:#fef3c7,stroke:#d97706,stroke-width:2px,color:#1a1a2e
    classDef project fill:#d1fae5,stroke:#059669,stroke-width:2px,color:#1a1a2e
    classDef projex fill:#ecfdf5,stroke:#059669,stroke-width:1px,color:#065f46
    classDef entail fill:#f3f4f6,stroke:#6b7280,stroke-width:1px,color:#374151
    classDef entex fill:#f9fafb,stroke:#9ca3af,stroke-width:1px,color:#6b7280
    classDef projprob fill:#dbeafe,stroke:#2563eb,stroke-width:1px,color:#1e40af
    classDef filter fill:#fee2e2,stroke:#dc2626,stroke-width:1px,color:#7f1d1d
    classDef accom fill:#ede9fe,stroke:#7c3aed,stroke-width:1px,color:#4c1d95
    classDef accomex fill:#f5f3ff,stroke:#7c3aed,stroke-width:1px,color:#5b21b6
  </div>
  <div class="legend">
    <div class="legend-item"><div class="legend-swatch swatch-trigger"></div> Presupposition triggers</div>
    <div class="legend-item"><div class="legend-swatch swatch-project"></div> Projection (survives negation)</div>
    <div class="legend-item"><div class="legend-swatch swatch-filter"></div> Filtered (blocked by embedding)</div>
    <div class="legend-item"><div class="legend-swatch swatch-presup"></div> Accommodation</div>
  </div>
  <figcaption>
    <strong>Diagram 5: Presupposition Triggers and Projection</strong>
    <span>Presuppositions are background assumptions that must hold for an utterance to make sense. Certain linguistic constructions -- factive verbs, definite descriptions, change-of-state verbs, clefts, iteratives, temporal clauses, counterfactuals, and implicative verbs -- systematically trigger presuppositions. The key diagnostic: presuppositions survive negation (unlike entailments). The "projection problem" asks how presuppositions behave when embedded in complex sentences: they may project through to the whole sentence, or be filtered by conditionals and disjunctions. When presuppositions introduce new information, hearers accommodate them into the common ground.</span>
  </figcaption>
</figure>
