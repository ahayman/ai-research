<html lang="en">
<head>

<title>Pragmatic Inference Chain</title>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;

  }

  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid #e9ecef;
  }
  figcaption strong {
    display: block;

  }
  figcaption span {
    font-size: 0.9rem;
    color: #6c757d;
    line-height: 1.5;
  }
  .mermaid {
    display: flex;

  }
  .legend {
    display: flex;
    justify-content: center;
    gap: 1.5rem;

    flex-wrap: wrap;
  }

  }

    width: 16px;
    height: 16px;
    border-radius: 4px;
  }

  .swatch-decode { background: #0891b2; }
  .swatch-enrich { background: #059669; }
  .swatch-implicate { background: #d97706; }
  .swatch-meaning { background: #dc2626; }
  @media (prefers-color-scheme: dark) {
    body { background: #1a1a2e; color: #e9ecef; }
    figure { background: #2d2d44; box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
    figcaption { border-top-color: #3d3d5c; }
    figcaption strong { color: #e9ecef; }
    figcaption span { color: #adb5bd; }
    .legend-item { color: #adb5bd; }
  }
</style>

<body>
<figure>
  <div class="mermaid">
%%{init: {'theme': 'neutral', 'themeVariables': {'fontSize': '13px'}}}%%
flowchart TD
    subgraph CONTEXT ["CONVERSATIONAL CONTEXT"]
        direction LR
        CTX_Q["A asks:<br/><b>Are you going to<br/>the party tonight?</b>"]:::context
    end

    UTT["<b>B's Utterance</b><br/>I have to work."]:::utterance

    CONTEXT --> UTT

    UTT --> STEP1

    subgraph STEP1 ["STEP 1: LINGUISTIC DECODING"]
        direction TB
        DEC["Decode phonology, syntax,<br/>compositional semantics"]:::decode
        LF["Logical form obtained:<br/><b>Speaker is obligated to<br/>perform labor</b>"]:::decode
    end

    STEP1 --> STEP2

    subgraph STEP2 ["STEP 2: PRAGMATIC ENRICHMENT"]
        direction TB
        REF["<b>Reference resolution</b><br/>I = B, the person speaking"]:::enrich
        TEMP["<b>Temporal enrichment</b><br/>have to work = tonight,<br/>during the party time"]:::enrich
        SAT["<b>Saturation</b><br/>work = at my place of<br/>employment, performing<br/>professional duties"]:::enrich
        EXP["<b>Explicature:</b><br/>B is obligated to be at their<br/>workplace performing professional<br/>duties tonight during the party"]:::enrichresult
    end

    STEP2 --> STEP3

    subgraph STEP3 ["STEP 3: IMPLICATURE DERIVATION"]
        direction TB
        IMP1["<b>Primary implicature</b><br/>B is not going to the party"]:::implicate
        IMP2["<b>Secondary implicature</b><br/>B cannot go because work<br/>conflicts with the party time"]:::implicate
        IMP3["<b>Possible further implicature</b><br/>B would go if they could<br/>-- expressing regret"]:::implicate
        IMP4["<b>Illocutionary force</b><br/>Functions as a refusal of<br/>an implicit invitation,<br/>an explanation, and<br/>perhaps an apology"]:::implicate
    end

    STEP3 --> STEP4

    subgraph STEP4 ["STEP 4: SPEAKER MEANING RECOVERED"]
        direction TB
        SM["<b>Full speaker meaning:</b><br/>No, I cannot come to the party<br/>because I have a work obligation<br/>tonight that prevents me from<br/>attending. I am sorry about this."]:::meaning
    end

    NOTE["The literal words <i>I have to work</i><br/>say nothing about parties.<br/>Every competent speaker processes<br/>all of this effortlessly and instantly."]:::note

    STEP4 --> NOTE

    classDef context fill:#e0e7ff,stroke:#6366f1,stroke-width:2px,color:#1a1a2e
    classDef utterance fill:#312e81,stroke:#4338ca,stroke-width:2px,color:#ffffff
    classDef decode fill:#ecfeff,stroke:#0891b2,stroke-width:2px,color:#155e75
    classDef enrich fill:#d1fae5,stroke:#059669,stroke-width:1px,color:#065f46
    classDef enrichresult fill:#a7f3d0,stroke:#059669,stroke-width:2px,color:#065f46
    classDef implicate fill:#fef3c7,stroke:#d97706,stroke-width:1px,color:#92400e
    classDef meaning fill:#fee2e2,stroke:#dc2626,stroke-width:2px,color:#7f1d1d
    classDef note fill:#f3f4f6,stroke:#9ca3af,stroke-width:1px,color:#6b7280,stroke-dasharray: 5 5
  </div>
  <div class="legend">
    <div class="legend-item"><div class="legend-swatch swatch-context"></div> Conversational context</div>
    <div class="legend-item"><div class="legend-swatch swatch-decode"></div> Linguistic decoding</div>
    <div class="legend-item"><div class="legend-swatch swatch-enrich"></div> Pragmatic enrichment</div>
    <div class="legend-item"><div class="legend-swatch swatch-implicate"></div> Implicature derivation</div>
    <div class="legend-item"><div class="legend-swatch swatch-meaning"></div> Full speaker meaning</div>
  </div>
  <figcaption>
    <strong>Diagram 7: Pragmatic Inference Chain -- "I have to work"</strong>
    <span>This diagram traces the full pragmatic inference process for a simple exchange. When A asks "Are you going to the party tonight?" and B replies "I have to work," the hearer must resolve deixis, enrich the underspecified content to an explicature, derive multiple implicatures (refusal, explanation, possibly regret), and assign illocutionary force -- none of which are encoded in the literal words. The sentence "I have to work" says nothing about parties, yet every competent speaker processes all of this effortlessly. This illustrates the central thesis of pragmatics: linguistic meaning massively underdetermines what speakers communicate.</span>
  </figcaption>
</figure>
