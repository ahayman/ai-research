<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Three Standards Architecture: German Pluricentrism</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --accent: #06b6d4; --accent-dim: #0891b2;
    --de: #ef4444; --de-bg: #fef2f2; --de-border: #fca5a5;
    --at: #8b5cf6; --at-bg: #f5f3ff; --at-border: #c4b5fd;
    --ch: #22c55e; --ch-bg: #f0fdf4; --ch-border: #86efac;
    --shared: #f59e0b; --shared-bg: #fffbeb; --shared-border: #fde68a;
    --muted: #6c757d; --caption-bg: #f8f9fa;
    --vocab: #06b6d4; --grammar: #ec4899; --ortho: #f97316; --phon: #8b5cf6;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f172a; --fg: #e2e8f0; --surface: #1e293b; --border: #334155;
      --accent: #22d3ee; --accent-dim: #06b6d4;
      --de: #f87171; --de-bg: #1f1215; --de-border: #7f1d1d;
      --at: #a78bfa; --at-bg: #1a1530; --at-border: #4c1d95;
      --ch: #4ade80; --ch-bg: #0f1f15; --ch-border: #166534;
      --shared: #fbbf24; --shared-bg: #1f1a0a; --shared-border: #92400e;
      --muted: #94a3b8; --caption-bg: #1e293b;
      --vocab: #22d3ee; --grammar: #f472b6; --ortho: #fb923c; --phon: #a78bfa;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg); color: var(--fg);
    display: flex; justify-content: center; padding: 2rem 1rem; line-height: 1.5;
  }
  figure { max-width: 1100px; width: 100%; }
  .diagram-container {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 1.5rem; overflow-x: auto;
  }
  .title { text-align: center; font-size: 1.15rem; font-weight: 700; color: var(--accent); margin-bottom: 0.2rem; }
  .subtitle { text-align: center; font-size: 0.82rem; color: var(--muted); margin-bottom: 1.2rem; }

  .legend {
    display: flex; justify-content: center; gap: 1.2rem; margin-bottom: 1rem;
    flex-wrap: wrap; font-size: 0.72rem;
  }
  .legend-item { display: flex; align-items: center; gap: 0.3rem; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .dot-vocab { background: var(--vocab); }
  .dot-grammar { background: var(--grammar); }
  .dot-ortho { background: var(--ortho); }
  .dot-phon { background: var(--phon); }

  /* Three columns */
  .columns {
    display: grid; grid-template-columns: 1.3fr 1fr 1fr; gap: 0.8rem;
    margin-bottom: 1rem;
  }
  .col {
    border-radius: 8px; padding: 0.9rem; border: 2px solid;
    position: relative;
  }
  .col-de { background: var(--de-bg); border-color: var(--de); }
  .col-at { background: var(--at-bg); border-color: var(--at); }
  .col-ch { background: var(--ch-bg); border-color: var(--ch); }

  .col-flag { font-size: 1.5rem; text-align: center; margin-bottom: 0.3rem; }
  .col-name { font-size: 0.95rem; font-weight: 700; text-align: center; margin-bottom: 0.15rem; }
  .col-de .col-name { color: var(--de); }
  .col-at .col-name { color: var(--at); }
  .col-ch .col-name { color: var(--ch); }
  .col-native { font-size: 0.72rem; color: var(--muted); text-align: center; font-style: italic; margin-bottom: 0.6rem; }

  .dominant-badge {
    position: absolute; top: -10px; right: 10px;
    background: var(--de); color: #fff; font-size: 0.6rem; font-weight: 700;
    padding: 0.15rem 0.5rem; border-radius: 3px; text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .col-section { margin-bottom: 0.6rem; }
  .col-section-title {
    font-size: 0.65rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.05em; color: var(--muted); margin-bottom: 0.25rem;
    border-bottom: 1px solid var(--border); padding-bottom: 0.15rem;
  }
  .col-section-body { font-size: 0.78rem; line-height: 1.45; }
  .col-section-body .stat {
    font-weight: 700; font-size: 0.9em;
  }

  .feat-tag {
    display: inline-block; font-size: 0.65rem; font-weight: 600;
    padding: 0.1rem 0.35rem; border-radius: 3px; margin: 0.1rem 0.15rem 0.1rem 0;
  }
  .feat-vocab { background: color-mix(in srgb, var(--vocab) 15%, transparent); color: var(--vocab); }
  .feat-grammar { background: color-mix(in srgb, var(--grammar) 15%, transparent); color: var(--grammar); }
  .feat-ortho { background: color-mix(in srgb, var(--ortho) 15%, transparent); color: var(--ortho); }
  .feat-phon { background: color-mix(in srgb, var(--phon) 15%, transparent); color: var(--phon); }

  .example { font-style: italic; color: var(--muted); font-size: 0.75rem; display: block; margin-top: 0.2rem; }

  /* Shared core */
  .shared-core {
    background: var(--shared-bg); border: 2px dashed var(--shared-border);
    border-radius: 8px; padding: 0.8rem 1rem; margin-bottom: 1rem;
    text-align: center;
  }
  .shared-title {
    font-size: 0.85rem; font-weight: 700; color: var(--shared);
    margin-bottom: 0.3rem;
  }
  .shared-body { font-size: 0.78rem; color: var(--muted); }

  /* Influence arrows */
  .influence {
    display: grid; grid-template-columns: 1fr auto 1fr; gap: 0.5rem;
    align-items: center; margin-top: 0.8rem; padding-top: 0.8rem;
    border-top: 1px solid var(--border);
  }
  .inf-label { font-size: 0.72rem; color: var(--muted); text-align: center; }
  .inf-arrows { text-align: center; }
  .arrow-thick { font-size: 1.3rem; color: var(--de); display: block; line-height: 1.1; }
  .arrow-thin { font-size: 0.9rem; color: var(--muted); display: block; line-height: 1.1; }
  .inf-center { font-size: 0.72rem; font-weight: 700; color: var(--accent); text-align: center; }

  figcaption {
    margin-top: 0.8rem; font-size: 0.72rem; color: var(--muted);
    text-align: center; font-style: italic;
  }

  @media (max-width: 768px) {
    .columns { grid-template-columns: 1fr; }
    .col-de { order: 0; }
    .col-at { order: 1; }
    .col-ch { order: 2; }
  }
</style>
</head>
<body>
<figure>
  <div class="diagram-container">
    <div class="title">Three Standards Architecture</div>
    <div class="subtitle">German as a Pluricentric Language: Three Codified Standard Varieties</div>

    <div class="legend">
      <span class="legend-item"><span class="legend-dot dot-vocab"></span> Vocabulary</span>
      <span class="legend-item"><span class="legend-dot dot-grammar"></span> Grammar</span>
      <span class="legend-item"><span class="legend-dot dot-ortho"></span> Orthography</span>
      <span class="legend-item"><span class="legend-dot dot-phon"></span> Phonology</span>
    </div>

    <div class="columns">
      <!-- Germany -->
      <div class="col col-de">
        <div class="dominant-badge">Dominant Center</div>
        <div class="col-flag">&#x1F1E9;&#x1F1EA;</div>
        <div class="col-name">German Standard German</div>
        <div class="col-native">Bundesdeutsches Hochdeutsch</div>

        <div class="col-section">
          <div class="col-section-title">Speakers</div>
          <div class="col-section-body"><span class="stat">~83 million</span> in Germany</div>
        </div>
        <div class="col-section">
          <div class="col-section-title">Reference Dictionary</div>
          <div class="col-section-body"><strong>Duden</strong> (28th ed.) &mdash; de facto international standard since 1901</div>
        </div>
        <div class="col-section">
          <div class="col-section-title">Governing Body</div>
          <div class="col-section-body">Rat fur deutsche Rechtschreibung + Institut fur Deutsche Sprache (IDS Mannheim)</div>
        </div>
        <div class="col-section">
          <div class="col-section-title">Distinctive Features</div>
          <div class="col-section-body">
            <span class="feat-tag feat-vocab">Kartoffel</span>
            <span class="feat-tag feat-vocab">Tomate</span>
            <span class="feat-tag feat-vocab">Sahne</span>
            <span class="feat-tag feat-grammar">habe gesessen</span>
            <span class="feat-tag feat-ortho">uses ss</span>
            <span class="feat-tag feat-phon">uvular r [&#x0281;]</span>
            <span class="feat-tag feat-phon">glottal stop [&#x0294;]</span>
            <span class="feat-tag feat-phon">KAF-fee stress</span>
          </div>
        </div>
        <div class="col-section">
          <div class="col-section-title">Global Role</div>
          <div class="col-section-body">Dominates international textbooks, media, publishing. Treated as "default German" worldwide.</div>
        </div>
      </div>

      <!-- Austria -->
      <div class="col col-at">
        <div class="col-flag">&#x1F1E6;&#x1F1F9;</div>
        <div class="col-name">Austrian Standard German</div>
        <div class="col-native">Osterreichisches Deutsch</div>

        <div class="col-section">
          <div class="col-section-title">Speakers</div>
          <div class="col-section-body"><span class="stat">~9 million</span> in Austria</div>
        </div>
        <div class="col-section">
          <div class="col-section-title">Reference Dictionary</div>
          <div class="col-section-body"><strong>OWB</strong> (44th ed.) &mdash; legally mandated for Austrian schools since 1951</div>
        </div>
        <div class="col-section">
          <div class="col-section-title">Legal Recognition</div>
          <div class="col-section-body"><strong>EU Protocol 10</strong> (1995): 23 Austrian food terms with equal legal standing in all EU law</div>
        </div>
        <div class="col-section">
          <div class="col-section-title">Distinctive Features</div>
          <div class="col-section-body">
            <span class="feat-tag feat-vocab">Erdapfel</span>
            <span class="feat-tag feat-vocab">Paradeiser</span>
            <span class="feat-tag feat-vocab">Obers</span>
            <span class="feat-tag feat-grammar">bin gesessen</span>
            <span class="feat-tag feat-grammar">Perfekt preference</span>
            <span class="feat-tag feat-ortho">uses ss</span>
            <span class="feat-tag feat-phon">ka-FEE stress</span>
            <span class="feat-tag feat-phon">alveolar r options</span>
          </div>
        </div>
        <div class="col-section">
          <div class="col-section-title">Contact Sources</div>
          <div class="col-section-body">Habsburg: Hungarian, Czech, Slovene, Italian loanwords</div>
        </div>
      </div>

      <!-- Switzerland -->
      <div class="col col-ch">
        <div class="col-flag">&#x1F1E8;&#x1F1ED;</div>
        <div class="col-name">Swiss Standard German</div>
        <div class="col-native">Schweizer Hochdeutsch</div>

        <div class="col-section">
          <div class="col-section-title">Speakers</div>
          <div class="col-section-body"><span class="stat">~5.4 million</span> in Switzerland</div>
        </div>
        <div class="col-section">
          <div class="col-section-title">Reference</div>
          <div class="col-section-body"><strong>Schweizer Schulerduden</strong> + NZZ style norms. Own seat on Rat fur dt. Rechtschreibung.</div>
        </div>
        <div class="col-section">
          <div class="col-section-title">Unique: Diglossia</div>
          <div class="col-section-body">Written/formal only &mdash; Swiss German dialects (Schweizerdeutsch) are the everyday spoken language</div>
        </div>
        <div class="col-section">
          <div class="col-section-title">Distinctive Features</div>
          <div class="col-section-body">
            <span class="feat-tag feat-vocab">Velo</span>
            <span class="feat-tag feat-vocab">Poulet</span>
            <span class="feat-tag feat-vocab">Ruebli</span>
            <span class="feat-tag feat-grammar">parkieren</span>
            <span class="feat-tag feat-ortho">no ss ever</span>
            <span class="feat-tag feat-phon">alveolar trill [r]</span>
            <span class="feat-tag feat-phon">no glottal stop</span>
          </div>
        </div>
        <div class="col-section">
          <div class="col-section-title">Contact Sources</div>
          <div class="col-section-body">French: Velo, Poulet, Trottoir, Billett, Coiffeur, parkieren</div>
        </div>
      </div>
    </div>

    <!-- Shared core -->
    <div class="shared-core">
      <div class="shared-title">Shared Core &mdash; Mutual Intelligibility ~95%+</div>
      <div class="shared-body">
        Shared grammar, vocabulary, syntax, and orthographic base. All three varieties use the same writing system,
        share the same fundamental grammatical framework, and are mutually intelligible in writing and formal speech.
        Differences are real but concentrated in specific domains (food vocabulary, auxiliary selection, diminutive suffixes, loanword layers).
      </div>
    </div>

    <!-- Influence dynamics -->
    <div class="influence">
      <div>
        <div class="inf-label">Media, textbooks, publishing</div>
        <div class="inf-label" style="font-weight:700; color: var(--de);">Strong convergence pressure</div>
      </div>
      <div class="inf-arrows">
        <span class="arrow-thick">&#x1F1E9;&#x1F1EA; &#x2192; &#x1F1E6;&#x1F1F9;</span>
        <span class="arrow-thick">&#x1F1E9;&#x1F1EA; &#x2192; &#x1F1E8;&#x1F1ED;</span>
        <span class="arrow-thin">&#x1F1E6;&#x1F1F9; &#x21E2; &#x1F1E9;&#x1F1EA; (minimal)</span>
        <span class="arrow-thin">&#x1F1E8;&#x1F1ED; &#x21E2; &#x1F1E9;&#x1F1EA; (minimal)</span>
      </div>
      <div>
        <div class="inf-label">Population ratio</div>
        <div class="inf-label"><strong style="color:var(--de);">83M</strong> : <strong style="color:var(--at);">9M</strong> : <strong style="color:var(--ch);">5.4M</strong></div>
        <div class="inf-label" style="margin-top:0.3rem;">Dictionary authority, media dominance, textbook exclusivity</div>
      </div>
    </div>
  </div>

  <figcaption>
    The architecture of German pluricentrism: three independently codified standard varieties sharing a common core,
    with asymmetric influence flowing outward from the dominant center (Germany).
    Data from Clyne 1992, Ammon 1995, Muhr 2003.
  </figcaption>
</figure>
</body>
</html>
