<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Swiss Diglossia: Three-Layer System</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --accent: #06b6d4;
    --l1: #22c55e; --l1-bg: #f0fdf4; --l1-border: #86efac;
    --l2: #f59e0b; --l2-bg: #fffbeb; --l2-border: #fde68a;
    --l3: #ef4444; --l3-bg: #fef2f2; --l3-border: #fca5a5;
    --ar-l1: #8b5cf6; --ar-l1-bg: #f5f3ff;
    --ar-l2: #ec4899; --ar-l2-bg: #fdf2f8;
    --ar-l3: #6366f1; --ar-l3-bg: #eef2ff;
    --prestige: #06b6d4;
    --muted: #6c757d;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f172a; --fg: #e2e8f0; --surface: #1e293b; --border: #334155;
      --accent: #22d3ee;
      --l1: #4ade80; --l1-bg: #0f1f15; --l1-border: #166534;
      --l2: #fbbf24; --l2-bg: #1f1a0a; --l2-border: #92400e;
      --l3: #f87171; --l3-bg: #1f1215; --l3-border: #7f1d1d;
      --ar-l1: #a78bfa; --ar-l1-bg: #1a1530;
      --ar-l2: #f472b6; --ar-l2-bg: #1f1225;
      --ar-l3: #818cf8; --ar-l3-bg: #1e1b4b;
      --prestige: #22d3ee;
      --muted: #94a3b8;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg); color: var(--fg);
    display: flex; justify-content: center; padding: 2rem 1rem; line-height: 1.5;
  }
  figure { max-width: 1100px; width: 100%; }
  .diagram-container {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 1.5rem; overflow-x: auto;
  }
  .title { text-align: center; font-size: 1.15rem; font-weight: 700; color: var(--accent); margin-bottom: 0.2rem; }
  .subtitle { text-align: center; font-size: 0.82rem; color: var(--muted); margin-bottom: 1.5rem; }

  /* Layers stack */
  .layers-stack { max-width: 700px; margin: 0 auto 1.5rem; }

  .layer {
    border-radius: 8px; padding: 0.8rem 1rem; margin-bottom: 0.5rem;
    border: 2px solid; position: relative;
  }
  .layer-l3 { background: var(--l3-bg); border-color: var(--l3); }
  .layer-l2 { background: var(--l2-bg); border-color: var(--l2); margin-left: 1.5rem; margin-right: 1.5rem; }
  .layer-l1 { background: var(--l1-bg); border-color: var(--l1); margin-left: 0; margin-right: 0; }

  .layer-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 0.4rem; flex-wrap: wrap; gap: 0.3rem;
  }
  .layer-num {
    font-size: 0.6rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.06em; padding: 0.1rem 0.4rem; border-radius: 3px; color: #fff;
  }
  .ln-3 { background: var(--l3); }
  .ln-2 { background: var(--l2); color: #1a1a2e; }
  .ln-1 { background: var(--l1); color: #1a1a2e; }

  .layer-name { font-size: 0.9rem; font-weight: 700; }
  .layer-l3 .layer-name { color: var(--l3); }
  .layer-l2 .layer-name { color: var(--l2); }
  .layer-l1 .layer-name { color: var(--l1); }

  .layer-native { font-size: 0.72rem; color: var(--muted); font-style: italic; }

  .prestige-badge {
    font-size: 0.6rem; font-weight: 700; padding: 0.12rem 0.4rem;
    border-radius: 3px; background: color-mix(in srgb, var(--prestige) 15%, transparent);
    color: var(--prestige); text-transform: uppercase; letter-spacing: 0.04em;
  }

  .layer-contexts {
    display: flex; flex-wrap: wrap; gap: 0.25rem; margin-top: 0.3rem;
  }
  .ctx-tag {
    font-size: 0.65rem; padding: 0.12rem 0.35rem; border-radius: 3px;
    background: var(--bg); border: 1px solid var(--border);
  }

  .layer-desc { font-size: 0.75rem; color: var(--muted); margin-top: 0.3rem; line-height: 1.4; }

  /* Arrows between layers */
  .layer-arrow {
    text-align: center; font-size: 0.72rem; color: var(--muted);
    padding: 0.15rem 0; margin: -0.15rem 0;
  }
  .layer-arrow span { font-size: 0.85rem; display: block; }

  /* Prestige inversion callout */
  .prestige-callout {
    background: color-mix(in srgb, var(--prestige) 8%, var(--surface));
    border: 2px dashed color-mix(in srgb, var(--prestige) 40%, var(--border));
    border-radius: 8px; padding: 0.7rem 1rem; margin-bottom: 1.5rem;
    max-width: 700px; margin-left: auto; margin-right: auto;
  }
  .pc-title { font-size: 0.82rem; font-weight: 700; color: var(--prestige); margin-bottom: 0.25rem; }
  .pc-body { font-size: 0.75rem; color: var(--muted); line-height: 1.45; }
  .pc-body strong { color: var(--fg); }

  /* Arabic comparison */
  .comparison {
    border-top: 2px solid var(--border); padding-top: 1rem; margin-top: 0.5rem;
  }
  .comp-title {
    text-align: center; font-size: 0.85rem; font-weight: 700;
    color: var(--accent); margin-bottom: 0.8rem;
  }
  .comp-grid {
    display: grid; grid-template-columns: 1fr 60px 1fr; gap: 0.3rem;
    max-width: 800px; margin: 0 auto; align-items: start;
  }
  .comp-col-title {
    font-size: 0.72rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.05em; text-align: center; margin-bottom: 0.4rem;
    color: var(--accent);
  }
  .comp-center { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0.3rem; padding-top: 1.8rem; }
  .comp-arrow { font-size: 0.7rem; color: var(--muted); }

  .comp-layer {
    border-radius: 6px; padding: 0.45rem 0.6rem; margin-bottom: 0.4rem;
    border: 1px solid; font-size: 0.75rem;
  }
  .cl-swiss-1 { background: var(--l1-bg); border-color: var(--l1); }
  .cl-swiss-2 { background: var(--l2-bg); border-color: var(--l2); }
  .cl-swiss-3 { background: var(--l3-bg); border-color: var(--l3); }
  .cl-ar-1 { background: var(--ar-l1-bg); border-color: var(--ar-l1); }
  .cl-ar-2 { background: var(--ar-l2-bg); border-color: var(--ar-l2); }
  .cl-ar-3 { background: var(--ar-l3-bg); border-color: var(--ar-l3); }

  .cl-label { font-weight: 700; font-size: 0.72rem; }
  .cl-swiss-1 .cl-label { color: var(--l1); }
  .cl-swiss-2 .cl-label { color: var(--l2); }
  .cl-swiss-3 .cl-label { color: var(--l3); }
  .cl-ar-1 .cl-label { color: var(--ar-l1); }
  .cl-ar-2 .cl-label { color: var(--ar-l2); }
  .cl-ar-3 .cl-label { color: var(--ar-l3); }

  .cl-desc { font-size: 0.7rem; color: var(--muted); margin-top: 0.15rem; }
  .cl-prestige { font-size: 0.6rem; font-weight: 600; margin-top: 0.15rem; }

  figcaption {
    margin-top: 0.8rem; font-size: 0.72rem; color: var(--muted);
    text-align: center; font-style: italic;
  }

  @media (max-width: 600px) {
    .comp-grid { grid-template-columns: 1fr; gap: 0.8rem; }
    .comp-center { flex-direction: row; padding-top: 0; }
  }
</style>
</head>
<body>
<figure>
  <div class="diagram-container">
    <div class="title">Swiss Diglossia: Three-Layer System</div>
    <div class="subtitle">Three linguistic layers in German-speaking Switzerland, with Arabic parallel</div>

    <!-- Layers -->
    <div class="layers-stack">

      <div class="layer layer-l3">
        <div class="layer-header">
          <span class="layer-num ln-3">Layer 3 &mdash; Narrowest</span>
          <span class="layer-name">German Standard German</span>
          <span class="layer-native">Bundesdeutsches Hochdeutsch</span>
        </div>
        <div class="layer-contexts">
          <span class="ctx-tag">imported media</span>
          <span class="ctx-tag">international publications</span>
          <span class="ctx-tag">pan-European contexts</span>
          <span class="ctx-tag">dubbed content</span>
        </div>
        <div class="layer-desc">International reference standard. Swiss speakers understand this but experience it as "German-German" (deutsch-deutsch) and feel distance from it.</div>
      </div>

      <div class="layer-arrow"><span>&#x2195;</span>minor differences (Helvetisms vs. German norms)</div>

      <div class="layer layer-l2">
        <div class="layer-header">
          <span class="layer-num ln-2">Layer 2 &mdash; Formal</span>
          <span class="layer-name">Swiss Standard German</span>
          <span class="layer-native">Schweizer Hochdeutsch</span>
        </div>
        <div class="layer-contexts">
          <span class="ctx-tag">newspapers</span>
          <span class="ctx-tag">official documents</span>
          <span class="ctx-tag">education</span>
          <span class="ctx-tag">formal letters</span>
          <span class="ctx-tag">TV news</span>
          <span class="ctx-tag">multilingual parliament</span>
          <span class="ctx-tag">addressing non-Swiss</span>
        </div>
        <div class="layer-desc">The formal written language and formal spoken language. Contains Helvetisms (Velo, Poulet, no ss, parkieren). Teachers teach in Standard German; students often respond in dialect.</div>
      </div>

      <div class="layer-arrow"><span>&#x2195;</span>code-switching in formal contexts; major differences</div>

      <div class="layer layer-l1">
        <div class="layer-header">
          <span class="layer-num ln-1">Layer 1 &mdash; Widest</span>
          <span class="layer-name">Swiss German Dialects</span>
          <span class="layer-native">Schweizerdeutsch (Schwyzerdutsch)</span>
          <span class="prestige-badge">High Identity Prestige</span>
        </div>
        <div class="layer-contexts">
          <span class="ctx-tag">family</span>
          <span class="ctx-tag">workplace</span>
          <span class="ctx-tag">shopping</span>
          <span class="ctx-tag">phone calls</span>
          <span class="ctx-tag">social media</span>
          <span class="ctx-tag">informal email</span>
          <span class="ctx-tag">radio entertainment</span>
          <span class="ctx-tag">TV programs</span>
          <span class="ctx-tag">cantonal parliament</span>
        </div>
        <div class="layer-desc">Everyday spoken language for all social classes. Varies by canton: Zuridutsch (Zurich), Barndutsch (Bern), Baseldutsch (Basel). Used by doctors, professors, politicians, and shopkeepers alike. No stigma &mdash; dialect signals Swiss identity with pride.</div>
      </div>
    </div>

    <!-- Prestige inversion callout -->
    <div class="prestige-callout">
      <div class="pc-title">Prestige Inversion &mdash; The Swiss Exception</div>
      <div class="pc-body">
        In classic diglossia (Ferguson 1959), the standard/written variety has <strong>higher prestige</strong> ("H") while the spoken dialect has <strong>lower prestige</strong> ("L").
        Swiss German inverts this: the dialect is the <strong>identity-bearing variety</strong> that signals Swissness across all social classes.
        Standard German can feel <strong>foreign or "German"</strong> &mdash; it is learned in school and used reluctantly in formal contexts.
        Swiss linguists call this <strong>"medial diglossia" (mediale Diglossie)</strong>: distribution by medium (spoken vs. written) rather than by social class.
      </div>
    </div>

    <!-- Arabic comparison -->
    <div class="comparison">
      <div class="comp-title">Cross-Linguistic Parallel: Swiss German vs. Arabic Three Layers</div>

      <div class="comp-grid">
        <!-- Swiss column -->
        <div>
          <div class="comp-col-title">&#x1F1E8;&#x1F1ED; Swiss German Situation</div>
          <div class="comp-layer cl-swiss-3">
            <div class="cl-label">German Standard German</div>
            <div class="cl-desc">International reference; imported media</div>
            <div class="cl-prestige" style="color:var(--l3);">Low local prestige</div>
          </div>
          <div class="comp-layer cl-swiss-2">
            <div class="cl-label">Swiss Standard German</div>
            <div class="cl-desc">Formal writing, news, education</div>
            <div class="cl-prestige" style="color:var(--l2);">Functional prestige</div>
          </div>
          <div class="comp-layer cl-swiss-1">
            <div class="cl-label">Swiss German Dialects</div>
            <div class="cl-desc">All everyday spoken interaction</div>
            <div class="cl-prestige" style="color:var(--l1);">HIGH identity prestige</div>
          </div>
        </div>

        <!-- Arrows center -->
        <div class="comp-center">
          <span class="comp-arrow">&#x2194;</span>
          <span class="comp-arrow">&#x2194;</span>
          <span class="comp-arrow">&#x2194;</span>
        </div>

        <!-- Arabic column -->
        <div>
          <div class="comp-col-title">Arabic Parallel</div>
          <div class="comp-layer cl-ar-3">
            <div class="cl-label">Classical Arabic (Fusha)</div>
            <div class="cl-desc">Quran, religious texts, literary heritage</div>
            <div class="cl-prestige" style="color:var(--ar-l3);">HIGH religious prestige</div>
          </div>
          <div class="comp-layer cl-ar-2">
            <div class="cl-label">Modern Standard Arabic (MSA)</div>
            <div class="cl-desc">News, formal writing, education, pan-Arab media</div>
            <div class="cl-prestige" style="color:var(--ar-l2);">Functional prestige</div>
          </div>
          <div class="comp-layer cl-ar-1">
            <div class="cl-label">Regional Dialect Arabic</div>
            <div class="cl-desc">All everyday spoken interaction</div>
            <div class="cl-prestige" style="color:var(--ar-l1);">Low prestige (stigmatized)</div>
          </div>
        </div>
      </div>

      <div style="max-width:700px; margin: 0.8rem auto 0; text-align:center;">
        <div style="font-size:0.75rem; color:var(--muted); line-height:1.4;">
          <strong style="color:var(--accent);">Key difference:</strong> In the Arabic world, dialect carries stigma and MSA/Classical carry prestige.
          In Switzerland, the <em>dialect</em> carries identity prestige while Standard German feels foreign.
          Same three-layer structure, inverted prestige hierarchy.
        </div>
      </div>
    </div>
  </div>

  <figcaption>
    The Swiss three-layer linguistic system compared with Arabic diglossia/triglossia.
    Both show three registers distributed by context, but Swiss German uniquely inverts the prestige hierarchy.
    Based on Ferguson 1959, Kolde 1981, Rash 1998.
  </figcaption>
</figure>
</body>
</html>
