<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Head-Directionality -- Mandarin's Mixed Profile</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --accent: #4361ee;
    --accent-light: #e8edff;
    --head-initial: #0891b2;
    --head-initial-bg: #ecfeff;
    --head-final: #dc2626;
    --head-final-bg: #fef2f2;
    --mixed: #d97706;
    --mixed-bg: #fffbeb;
    --english: #7c3aed;
    --japanese: #059669;
    --muted: #6c757d;
    --caption-bg: #f8f9fa;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f172a;
      --fg: #e2e8f0;
      --surface: #1e293b;
      --border: #334155;
      --accent: #06b6d4;
      --accent-light: #164e63;
      --head-initial: #22d3ee;
      --head-initial-bg: #083344;
      --head-final: #f87171;
      --head-final-bg: #450a0a;
      --mixed: #fbbf24;
      --mixed-bg: #451a03;
      --english: #a78bfa;
      --japanese: #34d399;
      --muted: #94a3b8;
      --caption-bg: #1e293b;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure { max-width: 960px; width: 100%; }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding: 1rem 1.5rem;
    background: var(--caption-bg);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  .chart-wrapper {
    overflow-x: auto;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--surface);
    padding: 1.5rem;
  }
  h3 {
    text-align: center;
    font-size: 1rem;
    margin-bottom: 1.25rem;
    color: var(--fg);
  }
  h3 span { color: var(--accent); }
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
    margin-bottom: 1.5rem;
  }
  .col-header {
    text-align: center;
    font-size: 0.85rem;
    font-weight: 700;
    padding: 0.5rem;
    border-radius: 8px 8px 0 0;
  }
  .col-hi { background: var(--head-initial-bg); color: var(--head-initial); border: 1px solid var(--head-initial); border-bottom: none; }
  .col-hf { background: var(--head-final-bg); color: var(--head-final); border: 1px solid var(--head-final); border-bottom: none; }
  .phrase-card {
    padding: 0.75rem 1rem;
    border-radius: 0 0 8px 8px;
    border: 1px solid var(--border);
    margin-bottom: 0.5rem;
  }
  .phrase-card.hi {
    border-left: 3px solid var(--head-initial);
    background: var(--head-initial-bg);
  }
  .phrase-card.hf {
    border-left: 3px solid var(--head-final);
    background: var(--head-final-bg);
  }
  .phrase-card.mx {
    border-left: 3px solid var(--mixed);
    background: var(--mixed-bg);
  }
  .phrase-label {
    font-size: 0.78rem;
    font-weight: 700;
    margin-bottom: 0.3rem;
  }
  .phrase-label.hi-label { color: var(--head-initial); }
  .phrase-label.hf-label { color: var(--head-final); }
  .phrase-label.mx-label { color: var(--mixed); }
  .phrase-example {
    font-size: 0.82rem;
    margin-bottom: 0.2rem;
  }
  .chinese-ex {
    font-size: 1rem;
    font-weight: 600;
    color: var(--fg);
    margin: 0.2rem 0;
  }
  .head-marker {
    display: inline-block;
    padding: 0.1rem 0.4rem;
    border-radius: 4px;
    font-size: 0.75rem;
    font-weight: 700;
  }
  .head-marker.hi-m { background: var(--head-initial); color: white; }
  .head-marker.hf-m { background: var(--head-final); color: white; }
  .gloss { font-size: 0.75rem; color: var(--muted); font-style: italic; }
  .comparison-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 0.5rem;
    margin-top: 1.5rem;
    padding-top: 1rem;
    border-top: 2px solid var(--border);
  }
  .lang-box {
    text-align: center;
    padding: 0.75rem;
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  .lang-box h4 { font-size: 0.85rem; margin-bottom: 0.3rem; }
  .lang-box .ratio { font-size: 1.2rem; font-weight: 800; }
  .lang-box .desc { font-size: 0.75rem; color: var(--muted); }
  .mandarin-box { border-color: var(--mixed); }
  .mandarin-box h4 { color: var(--mixed); }
  .mandarin-box .ratio { color: var(--mixed); }
  .english-box { border-color: var(--head-initial); }
  .english-box h4 { color: var(--english); }
  .english-box .ratio { color: var(--english); }
  .japanese-box { border-color: var(--head-final); }
  .japanese-box h4 { color: var(--japanese); }
  .japanese-box .ratio { color: var(--japanese); }
  .items {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }
</style>
</head>
<body>
<figure>
  <div class="chart-wrapper">
    <h3>Mandarin's <span>Mixed Head-Directionality</span> -- The Split Personality</h3>

    <div class="grid">
      <!-- HEAD-INITIAL column -->
      <div>
        <div class="col-header col-hi">HEAD-INITIAL in Mandarin (like English)</div>
        <div class="items">
          <div class="phrase-card hi">
            <div class="phrase-label hi-label">Verb Phrase (VP): V + Object</div>
            <div class="chinese-ex"><span class="head-marker hi-m">HEAD</span> 吃 苹果</div>
            <div class="phrase-example">chi pingguo</div>
            <div class="gloss">"eat apple" -- verb precedes object</div>
          </div>
          <div class="phrase-card hi">
            <div class="phrase-label hi-label">Prepositional Phrase: P + NP</div>
            <div class="chinese-ex"><span class="head-marker hi-m">HEAD</span> 在 桌子上</div>
            <div class="phrase-example">zai zhuozi-shang</div>
            <div class="gloss">"at table-on" -- preposition precedes noun (but postposition too!)</div>
          </div>
          <div class="phrase-card hi">
            <div class="phrase-label hi-label">Complementizer: C + Clause</div>
            <div class="chinese-ex"><span class="head-marker hi-m">HEAD</span> 如果 你来...</div>
            <div class="phrase-example">ruguo ni lai...</div>
            <div class="gloss">"if you come..." -- complementizer precedes clause</div>
          </div>
        </div>
      </div>

      <!-- HEAD-FINAL column -->
      <div>
        <div class="col-header col-hf">HEAD-FINAL in Mandarin (like Japanese)</div>
        <div class="items">
          <div class="phrase-card hf">
            <div class="phrase-label hf-label">Relative Clause: RC + Noun</div>
            <div class="chinese-ex">我买的 <span class="head-marker hf-m">HEAD</span> 书</div>
            <div class="phrase-example">wo mai de shu</div>
            <div class="gloss">"I-buy-DE book" -- RC precedes noun head</div>
          </div>
          <div class="phrase-card hf">
            <div class="phrase-label hf-label">Genitive: Gen + Noun</div>
            <div class="chinese-ex">我的 <span class="head-marker hf-m">HEAD</span> 书</div>
            <div class="phrase-example">wo de shu</div>
            <div class="gloss">"my DE book" -- possessor precedes noun</div>
          </div>
          <div class="phrase-card hf">
            <div class="phrase-label hf-label">Adjective: Adj + Noun</div>
            <div class="chinese-ex">大 <span class="head-marker hf-m">HEAD</span> 书</div>
            <div class="phrase-example">da shu</div>
            <div class="gloss">"big book" -- adjective precedes noun</div>
          </div>
          <div class="phrase-card hf">
            <div class="phrase-label hf-label">Aspect Markers: V + Asp (suffixal)</div>
            <div class="chinese-ex">吃 <span class="head-marker hf-m">HEAD</span> 了</div>
            <div class="phrase-example">chi le</div>
            <div class="gloss">"eat-LE" -- aspect follows verb (like a suffix)</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Mixed PP -->
    <div class="phrase-card mx" style="max-width: 600px; margin: 0 auto 1rem;">
      <div class="phrase-label mx-label">MIXED: Adpositional Phrase -- Both Pre + Post!</div>
      <div class="chinese-ex"><span class="head-marker hi-m">PRE</span> 在 桌子 <span class="head-marker hf-m">POST</span> 上</div>
      <div class="phrase-example">zai zhuozi shang</div>
      <div class="gloss">"at table on" -- circumposition: preposition AND postposition simultaneously!</div>
    </div>

    <!-- Comparison -->
    <div class="comparison-row">
      <div class="lang-box english-box">
        <h4>English</h4>
        <div class="ratio">~90% Head-Initial</div>
        <div class="desc">VP: V-O, PP: P-NP, RC: N-RC<br>Consistently head-initial<br>(except Gen-N with 's)</div>
      </div>
      <div class="lang-box mandarin-box">
        <h4>Mandarin</h4>
        <div class="ratio">~50/50 Split</div>
        <div class="desc">VP: V-O (head-initial)<br>NP: RC-N, Gen-N (head-final)<br><strong>Genuinely mixed -- rare!</strong></div>
      </div>
      <div class="lang-box japanese-box">
        <h4>Japanese</h4>
        <div class="ratio">~95% Head-Final</div>
        <div class="desc">VP: O-V, PP: NP-P, RC: RC-N<br>Consistently head-final<br>throughout the grammar</div>
      </div>
    </div>
  </div>
  <figcaption>
    <h2>Head-Directionality: Mandarin's Mixed Profile</h2>
    <p>Most languages are consistently head-initial (English) or head-final (Japanese). Mandarin splits: head-initial in verb phrases (like English SVO) but head-final in noun phrases (like Japanese SOV). This mixed profile is genuinely unusual cross-linguistically and challenges the Head-Directionality Parameter from generative grammar. The circumposition pattern (在...上 = "at...on") is a visible symptom of this mixed character.</p>
  </figcaption>
</figure>
</body>
</html>
