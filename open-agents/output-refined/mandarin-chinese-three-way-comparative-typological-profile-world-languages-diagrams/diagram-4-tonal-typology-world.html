<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tonal Typology -- Mandarin Among World Tone Languages</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --accent: #4361ee;
    --accent-light: #e8edff;
    --mandarin: #0891b2;
    --simple: #059669;
    --simple-bg: #d1fae5;
    --moderate: #d97706;
    --moderate-bg: #fef3c7;
    --complex: #dc2626;
    --complex-bg: #fee2e2;
    --none: #6366f1;
    --none-bg: #eef2ff;
    --muted: #6c757d;
    --caption-bg: #f8f9fa;
    --bar-track: rgba(0,0,0,0.06);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f172a;
      --fg: #e2e8f0;
      --surface: #1e293b;
      --border: #334155;
      --accent: #06b6d4;
      --accent-light: #164e63;
      --mandarin: #22d3ee;
      --simple: #34d399;
      --simple-bg: #064e3b;
      --moderate: #fbbf24;
      --moderate-bg: #451a03;
      --complex: #f87171;
      --complex-bg: #450a0a;
      --none: #818cf8;
      --none-bg: #1e1b4b;
      --muted: #94a3b8;
      --caption-bg: #1e293b;
      --bar-track: rgba(255,255,255,0.08);
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure { max-width: 960px; width: 100%; }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding: 1rem 1.5rem;
    background: var(--caption-bg);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  .chart-wrapper {
    overflow-x: auto;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--surface);
    padding: 1.5rem;
  }
  h3 {
    text-align: center;
    font-size: 1rem;
    margin-bottom: 0.25rem;
    color: var(--fg);
  }
  h3 span { color: var(--accent); }
  .subtitle {
    text-align: center;
    font-size: 0.82rem;
    color: var(--muted);
    margin-bottom: 1.5rem;
  }
  .region-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1rem;
    margin-bottom: 1.5rem;
  }
  .region-card {
    padding: 0.75rem 1rem;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
  }
  .region-card h4 {
    font-size: 0.82rem;
    font-weight: 700;
    margin-bottom: 0.4rem;
  }
  .region-card.tonal h4 { color: var(--moderate); }
  .region-card.non-tonal h4 { color: var(--none); }
  .region-card ul {
    list-style: none;
    font-size: 0.78rem;
  }
  .region-card li {
    padding: 0.15rem 0;
    color: var(--fg);
  }
  .region-card li span { color: var(--muted); font-size: 0.72rem; }
  /* Tone count comparison */
  .tone-bars {
    margin-top: 1.5rem;
    border-top: 2px solid var(--border);
    padding-top: 1rem;
  }
  .tone-bars h4 {
    text-align: center;
    font-size: 0.9rem;
    margin-bottom: 1rem;
    color: var(--fg);
  }
  .bar-row {
    display: grid;
    grid-template-columns: 140px 1fr 50px;
    gap: 0.5rem;
    align-items: center;
    margin-bottom: 0.5rem;
    padding: 0.35rem 0;
  }
  .bar-lang {
    font-size: 0.78rem;
    font-weight: 600;
    text-align: right;
    padding-right: 0.5rem;
  }
  .bar-track {
    height: 22px;
    background: var(--bar-track);
    border-radius: 6px;
    overflow: hidden;
    position: relative;
  }
  .bar-fill {
    height: 100%;
    border-radius: 6px;
    display: flex;
    align-items: center;
    padding-left: 0.5rem;
    font-size: 0.72rem;
    font-weight: 700;
    color: white;
    min-width: 20px;
  }
  .bar-count {
    font-size: 0.78rem;
    font-weight: 700;
    text-align: left;
    padding-left: 0.3rem;
  }
  .mandarin-highlight {
    background: var(--mandarin);
    background: linear-gradient(90deg, var(--mandarin), rgba(6,182,212,0.7));
    border: 2px solid var(--mandarin);
    border-radius: 8px;
    padding: 0.25rem 0;
  }
  .type-legend {
    display: flex;
    justify-content: center;
    gap: 1.5rem;
    margin-top: 1rem;
    flex-wrap: wrap;
  }
  .type-item {
    display: flex;
    align-items: center;
    gap: 0.3rem;
    font-size: 0.75rem;
  }
  .type-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
  }
  .stat-box {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0.75rem;
    margin-bottom: 1.5rem;
    text-align: center;
  }
  .stat {
    padding: 0.75rem;
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  .stat .num { font-size: 1.3rem; font-weight: 800; }
  .stat .label { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; font-weight: 600; letter-spacing: 0.04em; }
</style>
</head>
<body>
<figure>
  <div class="chart-wrapper">
    <h3>Tonal Typology: <span>Mandarin Among World Tone Languages</span></h3>
    <div class="subtitle">~40-70% of world languages use lexical tone -- Mandarin's 4-tone system is simple by global standards</div>

    <!-- Stats -->
    <div class="stat-box">
      <div class="stat">
        <div class="num" style="color:var(--moderate)">40-70%</div>
        <div class="label">of languages are tonal</div>
      </div>
      <div class="stat">
        <div class="num" style="color:var(--mandarin)">1.5B+</div>
        <div class="label">native tone language speakers</div>
      </div>
      <div class="stat">
        <div class="num" style="color:var(--complex)">2-14</div>
        <div class="label">tone count range globally</div>
      </div>
    </div>

    <!-- Geographic distribution -->
    <div class="region-grid">
      <div class="region-card tonal">
        <h4>East &amp; Southeast Asia</h4>
        <ul>
          <li>Mandarin: 4 tones <span>(contour)</span></li>
          <li>Cantonese: 6-9 tones <span>(mixed)</span></li>
          <li>Vietnamese: 6 tones <span>(contour)</span></li>
          <li>Thai: 5 tones <span>(mixed)</span></li>
          <li>Hmong: 7-8 tones <span>(contour)</span></li>
          <li>Burmese: 4 tones <span>(register)</span></li>
          <li>Lao: 6 tones <span>(contour)</span></li>
        </ul>
      </div>
      <div class="region-card tonal">
        <h4>Sub-Saharan Africa</h4>
        <ul>
          <li>Yoruba: 3 tones <span>(register)</span></li>
          <li>Igbo: 2 tones <span>(register)</span></li>
          <li>Zulu: 2 tones <span>(register)</span></li>
          <li>Shona: 2 tones <span>(register)</span></li>
          <li>Ewe: 3 tones <span>(register)</span></li>
          <li>Khoisan langs: 2-4 <span>(register)</span></li>
          <li>Chori: 6 levels <span>(register)</span></li>
        </ul>
      </div>
      <div class="region-card tonal">
        <h4>Americas &amp; Elsewhere</h4>
        <ul>
          <li>Navajo: 2 tones <span>(register)</span></li>
          <li>Chatino: up to 14 <span>(complex!)</span></li>
          <li>Mixtec: 3 tones <span>(register)</span></li>
          <li>Ticuna: 5-6 tones <span>(complex)</span></li>
          <li>Punjabi: 3 tones <span>(register)</span></li>
          <li style="color:var(--none)">Europe: almost none</li>
          <li style="color:var(--none)">Australia: almost none</li>
        </ul>
      </div>
    </div>

    <!-- Tone count bars -->
    <div class="tone-bars">
      <h4>Number of Lexical Tones -- Comparative Scale</h4>

      <div class="bar-row">
        <div class="bar-lang" style="color:var(--none)">English</div>
        <div class="bar-track"><div class="bar-fill" style="width:2%;background:var(--none)"></div></div>
        <div class="bar-count" style="color:var(--none)">0</div>
      </div>

      <div class="bar-row">
        <div class="bar-lang">Igbo / Zulu</div>
        <div class="bar-track"><div class="bar-fill" style="width:14%;background:var(--simple)">2</div></div>
        <div class="bar-count" style="color:var(--simple)">2</div>
      </div>

      <div class="bar-row">
        <div class="bar-lang">Yoruba / Ewe</div>
        <div class="bar-track"><div class="bar-fill" style="width:21%;background:var(--simple)">3</div></div>
        <div class="bar-count" style="color:var(--simple)">3</div>
      </div>

      <div class="bar-row mandarin-highlight">
        <div class="bar-lang" style="color:var(--mandarin);font-size:0.85rem">MANDARIN</div>
        <div class="bar-track"><div class="bar-fill" style="width:29%;background:var(--mandarin)">4</div></div>
        <div class="bar-count" style="color:var(--mandarin);font-weight:800">4</div>
      </div>

      <div class="bar-row">
        <div class="bar-lang">Thai / Shanghainese</div>
        <div class="bar-track"><div class="bar-fill" style="width:36%;background:var(--moderate)">5</div></div>
        <div class="bar-count" style="color:var(--moderate)">5</div>
      </div>

      <div class="bar-row">
        <div class="bar-lang">Vietnamese / Cantonese</div>
        <div class="bar-track"><div class="bar-fill" style="width:43%;background:var(--moderate)">6</div></div>
        <div class="bar-count" style="color:var(--moderate)">6</div>
      </div>

      <div class="bar-row">
        <div class="bar-lang">Hmong</div>
        <div class="bar-track"><div class="bar-fill" style="width:57%;background:var(--moderate)">7-8</div></div>
        <div class="bar-count" style="color:var(--moderate)">7-8</div>
      </div>

      <div class="bar-row">
        <div class="bar-lang">Cantonese (trad. 9)</div>
        <div class="bar-track"><div class="bar-fill" style="width:64%;background:var(--complex)">9</div></div>
        <div class="bar-count" style="color:var(--complex)">9</div>
      </div>

      <div class="bar-row">
        <div class="bar-lang" style="color:var(--complex)">Chatino (max)</div>
        <div class="bar-track"><div class="bar-fill" style="width:100%;background:var(--complex)">up to 14</div></div>
        <div class="bar-count" style="color:var(--complex)">14</div>
      </div>
    </div>

    <!-- Type legend -->
    <div class="type-legend">
      <div class="type-item"><div class="type-dot" style="background:var(--none)"></div><span style="color:var(--muted)">Non-tonal</span></div>
      <div class="type-item"><div class="type-dot" style="background:var(--simple)"></div><span style="color:var(--muted)">Simple register (2-3)</span></div>
      <div class="type-item"><div class="type-dot" style="background:var(--mandarin)"></div><span style="color:var(--muted)">Mandarin contour (4)</span></div>
      <div class="type-item"><div class="type-dot" style="background:var(--moderate)"></div><span style="color:var(--muted)">Moderate (5-8)</span></div>
      <div class="type-item"><div class="type-dot" style="background:var(--complex)"></div><span style="color:var(--muted)">Complex (9+)</span></div>
    </div>
  </div>
  <figcaption>
    <h2>Tonal Typology: Mandarin in Global Context</h2>
    <p>Mandarin's 4-tone contour system is actually simple by global tonal standards -- simpler than Cantonese (6-9), Vietnamese (6), and Hmong (7-8), and far simpler than Chatino's maximum of 14. English has zero lexical tones. Tone languages concentrate in East/Southeast Asia and Sub-Saharan Africa, and are rare in Europe and Australia. WALS data: ~42% of sampled languages are tonal; weighted global estimates reach 60-70%.</p>
  </figcaption>
</figure>
</body>
</html>
