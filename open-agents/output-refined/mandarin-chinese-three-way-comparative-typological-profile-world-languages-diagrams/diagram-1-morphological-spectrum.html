<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Morphological Typology Spectrum -- Three Languages Positioned</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --accent: #4361ee;
    --accent-light: #e8edff;
    --mandarin: #06b6d4;
    --english: #8b5cf6;
    --cantonese: #f59e0b;
    --turkish: #10b981;
    --arabic: #e63946;
    --mohawk: #ec4899;
    --muted: #6c757d;
    --caption-bg: #f8f9fa;
    --grid: #e0e0e0;
    --bar-bg: rgba(0,0,0,0.06);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f172a;
      --fg: #e2e8f0;
      --surface: #1e293b;
      --border: #334155;
      --accent: #06b6d4;
      --accent-light: #164e63;
      --mandarin: #22d3ee;
      --english: #a78bfa;
      --cantonese: #fbbf24;
      --turkish: #34d399;
      --arabic: #f87171;
      --mohawk: #f472b6;
      --muted: #94a3b8;
      --caption-bg: #1e293b;
      --grid: #334155;
      --bar-bg: rgba(255,255,255,0.06);
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure { max-width: 960px; width: 100%; }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding: 1rem 1.5rem;
    background: var(--caption-bg);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  .chart-wrapper {
    overflow-x: auto;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--surface);
    padding: 1.5rem 1rem;
  }
  svg { display: block; margin: 0 auto; }
  .legend {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 1.2rem;
    margin-top: 1rem;
    padding: 0.8rem;
    background: var(--surface);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.8rem;
    color: var(--muted);
  }
  .legend-swatch {
    width: 14px;
    height: 14px;
    border-radius: 50%;
  }
</style>
</head>
<body>
<figure>
  <div class="chart-wrapper">
    <svg viewBox="0 0 920 560" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
      <text x="460" y="28" text-anchor="middle" font-size="16" fill="var(--fg)" font-weight="700">Morphological Typology Spectrum</text>
      <text x="460" y="46" text-anchor="middle" font-size="11" fill="var(--muted)">Where Mandarin sits among world languages -- from isolating to polysynthetic</text>

      <!-- Spectrum gradient bar -->
      <defs>
        <linearGradient id="specGrad" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="var(--mandarin)" stop-opacity="0.25"/>
          <stop offset="20%" stop-color="var(--english)" stop-opacity="0.2"/>
          <stop offset="50%" stop-color="var(--turkish)" stop-opacity="0.2"/>
          <stop offset="75%" stop-color="var(--arabic)" stop-opacity="0.2"/>
          <stop offset="100%" stop-color="var(--mohawk)" stop-opacity="0.25"/>
        </linearGradient>
      </defs>
      <rect x="60" y="75" width="800" height="24" rx="12" fill="url(#specGrad)" stroke="var(--border)" stroke-width="1"/>

      <!-- Scale labels above -->
      <text x="60" y="66" font-size="10" fill="var(--muted)" font-weight="700">ISOLATING</text>
      <text x="260" y="66" font-size="10" fill="var(--muted)" font-weight="600">ANALYTIC</text>
      <text x="460" y="66" font-size="10" fill="var(--muted)" font-weight="600" text-anchor="middle">AGGLUTINATIVE</text>
      <text x="660" y="66" font-size="10" fill="var(--muted)" font-weight="600" text-anchor="middle">FUSIONAL</text>
      <text x="860" y="66" text-anchor="end" font-size="10" fill="var(--muted)" font-weight="700">POLYSYNTHETIC</text>

      <!-- Morpheme:word ratio scale -->
      <text x="60" y="115" font-size="9" fill="var(--muted)">~1.0 morphemes/word</text>
      <text x="860" y="115" text-anchor="end" font-size="9" fill="var(--muted)">~5-10+ morphemes/word</text>

      <!-- Tick marks -->
      <line x1="60" y1="99" x2="60" y2="107" stroke="var(--muted)" stroke-width="1"/>
      <line x1="260" y1="99" x2="260" y2="107" stroke="var(--muted)" stroke-width="1"/>
      <line x1="460" y1="99" x2="460" y2="107" stroke="var(--muted)" stroke-width="1"/>
      <line x1="660" y1="99" x2="660" y2="107" stroke="var(--muted)" stroke-width="1"/>
      <line x1="860" y1="99" x2="860" y2="107" stroke="var(--muted)" stroke-width="1"/>

      <!-- ========= MANDARIN marker ========= -->
      <circle cx="95" cy="87" r="14" fill="var(--mandarin)" opacity="0.9"/>
      <text x="95" y="91" text-anchor="middle" font-size="9" fill="white" font-weight="700">CMN</text>
      <line x1="95" y1="101" x2="95" y2="140" stroke="var(--mandarin)" stroke-width="1.5" stroke-dasharray="4,2"/>
      <rect x="10" y="140" width="170" height="120" rx="8" fill="var(--surface)" stroke="var(--mandarin)" stroke-width="1.5"/>
      <text x="95" y="158" text-anchor="middle" font-size="11" fill="var(--mandarin)" font-weight="700">MANDARIN</text>
      <text x="95" y="174" text-anchor="middle" font-size="10" fill="var(--fg)">Index: ~1.2</text>
      <text x="95" y="190" text-anchor="middle" font-size="9" fill="var(--muted)">Verb "eat":</text>
      <text x="95" y="206" text-anchor="middle" font-size="13" fill="var(--mandarin)" font-weight="600">1 form</text>
      <text x="95" y="222" text-anchor="middle" font-size="10" fill="var(--fg)">吃 chi</text>
      <text x="95" y="238" text-anchor="middle" font-size="8" fill="var(--muted)">No inflection at all</text>
      <text x="95" y="250" text-anchor="middle" font-size="8" fill="var(--muted)">(same for all persons/tenses)</text>

      <!-- ========= CANTONESE marker ========= -->
      <circle cx="115" cy="87" r="10" fill="var(--cantonese)" opacity="0.85"/>
      <text x="115" y="90" text-anchor="middle" font-size="8" fill="white" font-weight="700">YUE</text>

      <!-- ========= ENGLISH marker ========= -->
      <circle cx="240" cy="87" r="14" fill="var(--english)" opacity="0.9"/>
      <text x="240" y="91" text-anchor="middle" font-size="9" fill="white" font-weight="700">ENG</text>
      <line x1="240" y1="101" x2="240" y2="140" stroke="var(--english)" stroke-width="1.5" stroke-dasharray="4,2"/>
      <rect x="155" y="280" width="170" height="120" rx="8" fill="var(--surface)" stroke="var(--english)" stroke-width="1.5"/>
      <line x1="240" y1="101" x2="240" y2="280" stroke="var(--english)" stroke-width="1.5" stroke-dasharray="4,2"/>
      <text x="240" y="298" text-anchor="middle" font-size="11" fill="var(--english)" font-weight="700">ENGLISH</text>
      <text x="240" y="314" text-anchor="middle" font-size="10" fill="var(--fg)">Index: ~1.5</text>
      <text x="240" y="330" text-anchor="middle" font-size="9" fill="var(--muted)">Verb "eat":</text>
      <text x="240" y="346" text-anchor="middle" font-size="13" fill="var(--english)" font-weight="600">5 forms</text>
      <text x="240" y="362" text-anchor="middle" font-size="10" fill="var(--fg)">eat, eats, ate,</text>
      <text x="240" y="376" text-anchor="middle" font-size="10" fill="var(--fg)">eaten, eating</text>
      <text x="240" y="390" text-anchor="middle" font-size="8" fill="var(--muted)">Weakly fusional remnants</text>

      <!-- ========= TURKISH marker ========= -->
      <circle cx="470" cy="87" r="12" fill="var(--turkish)" opacity="0.85"/>
      <text x="470" y="91" text-anchor="middle" font-size="9" fill="white" font-weight="700">TUR</text>
      <line x1="470" y1="99" x2="470" y2="140" stroke="var(--turkish)" stroke-width="1.5" stroke-dasharray="4,2"/>
      <rect x="385" y="140" width="170" height="120" rx="8" fill="var(--surface)" stroke="var(--turkish)" stroke-width="1.5"/>
      <text x="470" y="158" text-anchor="middle" font-size="11" fill="var(--turkish)" font-weight="700">TURKISH</text>
      <text x="470" y="174" text-anchor="middle" font-size="10" fill="var(--fg)">Index: ~2.5</text>
      <text x="470" y="190" text-anchor="middle" font-size="9" fill="var(--muted)">Verb "eat":</text>
      <text x="470" y="206" text-anchor="middle" font-size="13" fill="var(--turkish)" font-weight="600">~120 forms</text>
      <text x="470" y="222" text-anchor="middle" font-size="10" fill="var(--fg)">ye-mek, yi-yor-um,</text>
      <text x="470" y="236" text-anchor="middle" font-size="10" fill="var(--fg)">ye-di-m, ye-me-z-sin...</text>
      <text x="470" y="250" text-anchor="middle" font-size="8" fill="var(--muted)">Affixes stack transparently</text>

      <!-- ========= ARABIC marker ========= -->
      <circle cx="660" cy="87" r="12" fill="var(--arabic)" opacity="0.85"/>
      <text x="660" y="91" text-anchor="middle" font-size="9" fill="white" font-weight="700">ARA</text>
      <line x1="660" y1="99" x2="660" y2="280" stroke="var(--arabic)" stroke-width="1.5" stroke-dasharray="4,2"/>
      <rect x="575" y="280" width="170" height="120" rx="8" fill="var(--surface)" stroke="var(--arabic)" stroke-width="1.5"/>
      <text x="660" y="298" text-anchor="middle" font-size="11" fill="var(--arabic)" font-weight="700">ARABIC</text>
      <text x="660" y="314" text-anchor="middle" font-size="10" fill="var(--fg)">Index: ~2.5-3.0</text>
      <text x="660" y="330" text-anchor="middle" font-size="9" fill="var(--muted)">Verb "eat":</text>
      <text x="660" y="346" text-anchor="middle" font-size="13" fill="var(--arabic)" font-weight="600">~100+ forms</text>
      <text x="660" y="362" text-anchor="middle" font-size="10" fill="var(--fg)">Root: ʔ-k-l</text>
      <text x="660" y="376" text-anchor="middle" font-size="10" fill="var(--fg)">akala, yakulu, kulit...</text>
      <text x="660" y="390" text-anchor="middle" font-size="8" fill="var(--muted)">Internal vowel change + affixes</text>

      <!-- ========= MOHAWK marker ========= -->
      <circle cx="830" cy="87" r="12" fill="var(--mohawk)" opacity="0.85"/>
      <text x="830" y="91" text-anchor="middle" font-size="9" fill="white" font-weight="700">MOH</text>
      <line x1="830" y1="99" x2="830" y2="140" stroke="var(--mohawk)" stroke-width="1.5" stroke-dasharray="4,2"/>
      <rect x="745" y="140" width="170" height="120" rx="8" fill="var(--surface)" stroke="var(--mohawk)" stroke-width="1.5"/>
      <text x="830" y="158" text-anchor="middle" font-size="11" fill="var(--mohawk)" font-weight="700">MOHAWK</text>
      <text x="830" y="174" text-anchor="middle" font-size="10" fill="var(--fg)">Index: ~5-10+</text>
      <text x="830" y="190" text-anchor="middle" font-size="9" fill="var(--muted)">One word = one sentence:</text>
      <text x="830" y="210" text-anchor="middle" font-size="9" fill="var(--mohawk)" font-weight="600">sahonwanhotokwahte</text>
      <text x="830" y="226" text-anchor="middle" font-size="8" fill="var(--fg)">"someone opened the</text>
      <text x="830" y="238" text-anchor="middle" font-size="8" fill="var(--fg)">door for her again"</text>
      <text x="830" y="252" text-anchor="middle" font-size="8" fill="var(--muted)">Whole clause in one word</text>

      <!-- Verb form comparison bar chart -->
      <text x="460" y="445" text-anchor="middle" font-size="12" fill="var(--fg)" font-weight="600">Verb Forms for "eat" -- Comparative Count</text>

      <!-- Bars -->
      <rect x="100" y="460" width="8" height="40" rx="4" fill="var(--mandarin)"/>
      <text x="104" y="510" text-anchor="middle" font-size="9" fill="var(--mandarin)" font-weight="600">1</text>
      <text x="104" y="524" text-anchor="middle" font-size="8" fill="var(--muted)">CMN</text>

      <rect x="240" y="455" width="40" height="45" rx="4" fill="var(--english)"/>
      <text x="260" y="510" text-anchor="middle" font-size="9" fill="var(--english)" font-weight="600">5</text>
      <text x="260" y="524" text-anchor="middle" font-size="8" fill="var(--muted)">ENG</text>

      <rect x="445" y="390" width="50" height="110" rx="4" fill="var(--turkish)" opacity="0.8"/>
      <text x="470" y="510" text-anchor="middle" font-size="9" fill="var(--turkish)" font-weight="600">~120</text>
      <text x="470" y="524" text-anchor="middle" font-size="8" fill="var(--muted)">TUR</text>

      <rect x="635" y="400" width="50" height="100" rx="4" fill="var(--arabic)" opacity="0.8"/>
      <text x="660" y="510" text-anchor="middle" font-size="9" fill="var(--arabic)" font-weight="600">~100+</text>
      <text x="660" y="524" text-anchor="middle" font-size="8" fill="var(--muted)">ARA</text>

      <rect x="810" y="380" width="50" height="120" rx="4" fill="var(--mohawk)" opacity="0.7"/>
      <text x="835" y="510" text-anchor="middle" font-size="9" fill="var(--mohawk)" font-weight="600">1000s</text>
      <text x="835" y="524" text-anchor="middle" font-size="8" fill="var(--muted)">MOH</text>

      <!-- Scale note -->
      <text x="460" y="550" text-anchor="middle" font-size="9" fill="var(--muted)">Mandarin: 1 form. English: 5 forms. The gulf between 5 and 120 is why English speakers underestimate morphological complexity.</text>
    </svg>
  </div>
  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background:var(--mandarin)"></div>Mandarin (CMN)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--cantonese)"></div>Cantonese (YUE)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--english)"></div>English (ENG)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--turkish)"></div>Turkish (TUR)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--arabic)"></div>Arabic (ARA)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--mohawk)"></div>Mohawk (MOH)</div>
  </div>
  <figcaption>
    <h2>Morphological Typology Spectrum</h2>
    <p>Mandarin sits at the isolating extreme with a synthesis index of ~1.2 morphemes/word. English is moderately analytic (~1.5). Cantonese clusters near Mandarin. The verb "eat" has exactly 1 form in Mandarin regardless of person, number, tense, or mood -- vs. 5 forms in English, ~120 in Turkish, and potentially thousands of complex forms in polysynthetic Mohawk. Based on Greenberg (1960) Index of Synthesis.</p>
  </figcaption>
</figure>
</body>
</html>
