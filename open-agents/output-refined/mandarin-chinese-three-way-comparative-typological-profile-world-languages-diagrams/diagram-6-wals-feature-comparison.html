<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WALS-Style Feature Rarity Map -- How Typical Is Mandarin?</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --accent: #4361ee;
    --accent-light: #e8edff;
    --common: #059669;
    --common-bg: #d1fae5;
    --minority: #d97706;
    --minority-bg: #fef3c7;
    --rare: #dc2626;
    --rare-bg: #fee2e2;
    --mandarin: #0891b2;
    --muted: #6c757d;
    --caption-bg: #f8f9fa;
    --bar-track: rgba(0,0,0,0.06);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f172a;
      --fg: #e2e8f0;
      --surface: #1e293b;
      --border: #334155;
      --accent: #06b6d4;
      --accent-light: #164e63;
      --common: #34d399;
      --common-bg: #064e3b;
      --minority: #fbbf24;
      --minority-bg: #451a03;
      --rare: #f87171;
      --rare-bg: #450a0a;
      --mandarin: #22d3ee;
      --muted: #94a3b8;
      --caption-bg: #1e293b;
      --bar-track: rgba(255,255,255,0.08);
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure { max-width: 960px; width: 100%; }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding: 1rem 1.5rem;
    background: var(--caption-bg);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  .chart-wrapper {
    overflow-x: auto;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--surface);
    padding: 1.5rem;
  }
  h3 {
    text-align: center;
    font-size: 1rem;
    margin-bottom: 0.25rem;
    color: var(--fg);
  }
  h3 span { color: var(--accent); }
  .subtitle {
    text-align: center;
    font-size: 0.82rem;
    color: var(--muted);
    margin-bottom: 1.5rem;
  }
  .feature-row {
    display: grid;
    grid-template-columns: 200px 120px 1fr 80px;
    gap: 0.5rem;
    align-items: center;
    padding: 0.55rem 0.5rem;
    border-bottom: 1px solid var(--border);
  }
  .feature-row:last-child { border-bottom: none; }
  .feature-name {
    font-size: 0.82rem;
    font-weight: 600;
  }
  .mandarin-value {
    font-size: 0.78rem;
    font-weight: 700;
    color: var(--mandarin);
  }
  .bar-container {
    display: flex;
    align-items: center;
    gap: 0.3rem;
  }
  .bar-track {
    flex: 1;
    height: 18px;
    background: var(--bar-track);
    border-radius: 9px;
    overflow: hidden;
    position: relative;
  }
  .bar-fill {
    height: 100%;
    border-radius: 9px;
    transition: width 0.3s;
  }
  .bar-fill.common { background: var(--common); }
  .bar-fill.minority { background: var(--minority); }
  .bar-fill.rare { background: var(--rare); }
  .pct {
    font-size: 0.75rem;
    font-weight: 700;
    min-width: 40px;
  }
  .pct.common { color: var(--common); }
  .pct.minority { color: var(--minority); }
  .pct.rare { color: var(--rare); }
  .rarity-tag {
    font-size: 0.65rem;
    font-weight: 700;
    padding: 0.15rem 0.4rem;
    border-radius: 9999px;
    text-align: center;
  }
  .rarity-tag.common { background: var(--common-bg); color: var(--common); border: 1px solid var(--common); }
  .rarity-tag.minority { background: var(--minority-bg); color: var(--minority); border: 1px solid var(--minority); }
  .rarity-tag.rare { background: var(--rare-bg); color: var(--rare); border: 1px solid var(--rare); }
  .section-divider {
    padding: 0.5rem 0.5rem;
    font-size: 0.72rem;
    font-weight: 700;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    border-bottom: 2px solid var(--accent);
    margin-top: 0.5rem;
  }
  .legend-bar {
    display: flex;
    justify-content: center;
    gap: 1.5rem;
    margin-top: 1rem;
    padding: 0.6rem;
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.3rem;
    font-size: 0.75rem;
    color: var(--muted);
  }
  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
  }
  .header-row {
    display: grid;
    grid-template-columns: 200px 120px 1fr 80px;
    gap: 0.5rem;
    padding: 0.4rem 0.5rem;
    font-size: 0.72rem;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    border-bottom: 2px solid var(--border);
    margin-bottom: 0.25rem;
  }
</style>
</head>
<body>
<figure>
  <div class="chart-wrapper">
    <h3>WALS-Style Feature Rarity Map: <span>How Typical Is Mandarin?</span></h3>
    <div class="subtitle">Each bar shows the percentage of world languages sharing Mandarin's value for that feature</div>

    <div class="header-row">
      <div>Feature</div>
      <div>Mandarin's Value</div>
      <div>% of World Languages</div>
      <div>Rarity</div>
    </div>

    <!-- MAJORITY FEATURES -->
    <div class="section-divider">Majority Features -- Mandarin Is Typical</div>

    <div class="feature-row">
      <div class="feature-name">Basic Word Order</div>
      <div class="mandarin-value">SVO</div>
      <div class="bar-container">
        <div class="bar-track"><div class="bar-fill common" style="width:42%"></div></div>
        <span class="pct common">~42%</span>
      </div>
      <div><span class="rarity-tag common">COMMON</span></div>
    </div>

    <div class="feature-row">
      <div class="feature-name">Adposition Type</div>
      <div class="mandarin-value">Prepositions</div>
      <div class="bar-container">
        <div class="bar-track"><div class="bar-fill common" style="width:45%"></div></div>
        <span class="pct common">~45%</span>
      </div>
      <div><span class="rarity-tag common">COMMON</span></div>
    </div>

    <div class="feature-row">
      <div class="feature-name">Adjective-Noun Order</div>
      <div class="mandarin-value">Adj-N</div>
      <div class="bar-container">
        <div class="bar-track"><div class="bar-fill common" style="width:55%"></div></div>
        <span class="pct common">~55%</span>
      </div>
      <div><span class="rarity-tag common">COMMON</span></div>
    </div>

    <div class="feature-row">
      <div class="feature-name">Demonstrative-Noun</div>
      <div class="mandarin-value">Dem-N</div>
      <div class="bar-container">
        <div class="bar-track"><div class="bar-fill common" style="width:70%"></div></div>
        <span class="pct common">~70%</span>
      </div>
      <div><span class="rarity-tag common">COMMON</span></div>
    </div>

    <!-- MINORITY FEATURES -->
    <div class="section-divider">Minority Features -- Not Rare, But Not Majority</div>

    <div class="feature-row">
      <div class="feature-name">Morphological Type</div>
      <div class="mandarin-value">Isolating</div>
      <div class="bar-container">
        <div class="bar-track"><div class="bar-fill minority" style="width:22%"></div></div>
        <span class="pct minority">~22%</span>
      </div>
      <div><span class="rarity-tag minority">MINORITY</span></div>
    </div>

    <div class="feature-row">
      <div class="feature-name">Lexical Tone</div>
      <div class="mandarin-value">Contour (4)</div>
      <div class="bar-container">
        <div class="bar-track"><div class="bar-fill minority" style="width:42%"></div></div>
        <span class="pct minority">~42%</span>
      </div>
      <div><span class="rarity-tag minority">MINORITY</span></div>
    </div>

    <div class="feature-row">
      <div class="feature-name">Topic-Prominence</div>
      <div class="mandarin-value">Topic-prominent</div>
      <div class="bar-container">
        <div class="bar-track"><div class="bar-fill minority" style="width:25%"></div></div>
        <span class="pct minority">~25%</span>
      </div>
      <div><span class="rarity-tag minority">MINORITY</span></div>
    </div>

    <div class="feature-row">
      <div class="feature-name">Discourse Pro-Drop</div>
      <div class="mandarin-value">Subj + Obj droppable</div>
      <div class="bar-container">
        <div class="bar-track"><div class="bar-fill minority" style="width:30%"></div></div>
        <span class="pct minority">~30%</span>
      </div>
      <div><span class="rarity-tag minority">MINORITY</span></div>
    </div>

    <div class="feature-row">
      <div class="feature-name">Obligatory Classifiers</div>
      <div class="mandarin-value">Required (Num-CL-N)</div>
      <div class="bar-container">
        <div class="bar-track"><div class="bar-fill minority" style="width:19%"></div></div>
        <span class="pct minority">~19%</span>
      </div>
      <div><span class="rarity-tag minority">MINORITY</span></div>
    </div>

    <div class="feature-row">
      <div class="feature-name">No Grammatical Gender</div>
      <div class="mandarin-value">None</div>
      <div class="bar-container">
        <div class="bar-track"><div class="bar-fill minority" style="width:38%"></div></div>
        <span class="pct minority">~38%</span>
      </div>
      <div><span class="rarity-tag minority">MINORITY</span></div>
    </div>

    <div class="feature-row">
      <div class="feature-name">Serial Verb Constructions</div>
      <div class="mandarin-value">Productive</div>
      <div class="bar-container">
        <div class="bar-track"><div class="bar-fill minority" style="width:30%"></div></div>
        <span class="pct minority">~30%</span>
      </div>
      <div><span class="rarity-tag minority">MINORITY</span></div>
    </div>

    <!-- RARE FEATURES -->
    <div class="section-divider">Rare Features -- Mandarin Is Genuinely Unusual</div>

    <div class="feature-row">
      <div class="feature-name" style="color:var(--rare);font-weight:800">SVO + Prenominal RC</div>
      <div class="mandarin-value" style="color:var(--rare)">RC before Noun</div>
      <div class="bar-container">
        <div class="bar-track"><div class="bar-fill rare" style="width:2%"></div></div>
        <span class="pct rare">&lt;2%</span>
      </div>
      <div><span class="rarity-tag rare">RARE!</span></div>
    </div>

    <div class="feature-row">
      <div class="feature-name" style="color:var(--rare);font-weight:800">Mixed Head-Directionality</div>
      <div class="mandarin-value" style="color:var(--rare)">VP head-init + NP head-fin</div>
      <div class="bar-container">
        <div class="bar-track"><div class="bar-fill rare" style="width:5%"></div></div>
        <span class="pct rare">~5%</span>
      </div>
      <div><span class="rarity-tag rare">RARE!</span></div>
    </div>

    <div class="feature-row">
      <div class="feature-name" style="color:var(--rare);font-weight:800">Zero Inflectional Morphology</div>
      <div class="mandarin-value" style="color:var(--rare)">No inflection at all</div>
      <div class="bar-container">
        <div class="bar-track"><div class="bar-fill rare" style="width:8%"></div></div>
        <span class="pct rare">~8%</span>
      </div>
      <div><span class="rarity-tag rare">RARE!</span></div>
    </div>

    <div class="legend-bar">
      <div class="legend-item"><div class="legend-dot" style="background:var(--common)"></div>Common (&gt;40%)</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--minority)"></div>Minority (15-40%)</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--rare)"></div>Rare (&lt;10%)</div>
    </div>
  </div>
  <figcaption>
    <h2>WALS-Style Feature Rarity Map</h2>
    <p>Each bar shows what percentage of the world's languages share Mandarin's value for that feature. Mandarin is typical in its basic word order (SVO, ~42%) and adposition type, but unusual in its isolating morphology (~22%), obligatory classifiers (~19%), and topic-prominence (~25%). Its genuinely rare features are the SVO + prenominal RC combination (&lt;2% of languages) and its mixed head-directionality (~5%). Data from WALS (Dryer &amp; Haspelmath 2013) and typological literature.</p>
  </figcaption>
</figure>
</body>
</html>
