<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Order Parameter Grid -- Mandarin vs English vs Cantonese</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --accent: #4361ee;
    --accent-light: #e8edff;
    --mandarin: #0891b2;
    --english: #7c3aed;
    --cantonese: #d97706;
    --match: #059669;
    --match-bg: #d1fae5;
    --mismatch: #dc2626;
    --mismatch-bg: #fee2e2;
    --unusual: #ea580c;
    --unusual-bg: #fff7ed;
    --muted: #6c757d;
    --caption-bg: #f8f9fa;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f172a;
      --fg: #e2e8f0;
      --surface: #1e293b;
      --border: #334155;
      --accent: #06b6d4;
      --accent-light: #164e63;
      --mandarin: #22d3ee;
      --english: #a78bfa;
      --cantonese: #fbbf24;
      --match: #34d399;
      --match-bg: #064e3b;
      --mismatch: #f87171;
      --mismatch-bg: #450a0a;
      --unusual: #fb923c;
      --unusual-bg: #431407;
      --muted: #94a3b8;
      --caption-bg: #1e293b;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure { max-width: 980px; width: 100%; }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding: 1rem 1.5rem;
    background: var(--caption-bg);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  .chart-wrapper {
    overflow-x: auto;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--surface);
    padding: 1rem;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.82rem;
  }
  th, td {
    padding: 0.55rem 0.65rem;
    border: 1px solid var(--border);
    text-align: center;
    vertical-align: middle;
  }
  thead th {
    background: var(--accent-light);
    color: var(--accent);
    font-weight: 700;
    font-size: 0.85rem;
  }
  th.param {
    text-align: left;
    width: 20%;
    font-weight: 600;
    color: var(--fg);
  }
  td.param {
    text-align: left;
    font-weight: 600;
  }
  .cmn { color: var(--mandarin); font-weight: 600; }
  .eng { color: var(--english); font-weight: 600; }
  .yue { color: var(--cantonese); font-weight: 600; }
  .match-cell { background: var(--match-bg); }
  .mismatch-cell { background: var(--mismatch-bg); }
  .unusual-cell { background: var(--unusual-bg); }
  .tag {
    display: inline-block;
    padding: 0.15rem 0.5rem;
    border-radius: 9999px;
    font-size: 0.7rem;
    font-weight: 700;
    margin-left: 0.3rem;
  }
  .tag-match { background: var(--match-bg); color: var(--match); border: 1px solid var(--match); }
  .tag-rare { background: var(--mismatch-bg); color: var(--mismatch); border: 1px solid var(--mismatch); }
  .tag-unusual { background: var(--unusual-bg); color: var(--unusual); border: 1px solid var(--unusual); }
  .svo-note {
    margin-top: 1rem;
    padding: 0.75rem 1rem;
    background: var(--unusual-bg);
    border: 1px solid var(--unusual);
    border-radius: 8px;
    font-size: 0.82rem;
    color: var(--fg);
  }
  .svo-note strong { color: var(--unusual); }
  .title-row { text-align: center; font-size: 0.95rem; font-weight: 700; color: var(--fg); padding: 0.75rem; }
</style>
</head>
<body>
<figure>
  <div class="chart-wrapper">
    <table>
      <thead>
        <tr>
          <th class="param">Word Order Parameter</th>
          <th style="width:22%"><span class="cmn">Mandarin</span></th>
          <th style="width:22%"><span class="eng">English</span></th>
          <th style="width:22%"><span class="yue">Cantonese</span></th>
          <th style="width:14%">SVO Norm</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td class="param">Basic Word Order</td>
          <td class="match-cell"><span class="cmn">SVO</span></td>
          <td class="match-cell"><span class="eng">SVO</span></td>
          <td class="match-cell"><span class="yue">SVO</span></td>
          <td><span class="tag tag-match">TYPICAL</span></td>
        </tr>
        <tr>
          <td class="param">Adpositions</td>
          <td><span class="cmn">Pre + some Post</span><br><span style="font-size:0.75rem;color:var(--muted)">在...上 zai...shang</span></td>
          <td><span class="eng">Prepositions</span><br><span style="font-size:0.75rem;color:var(--muted)">on the table</span></td>
          <td><span class="yue">Pre + some Post</span><br><span style="font-size:0.75rem;color:var(--muted)">hai2...seung6</span></td>
          <td><span class="tag tag-match">TYPICAL</span></td>
        </tr>
        <tr>
          <td class="param">Genitive-Noun</td>
          <td class="unusual-cell"><span class="cmn">Gen-N</span><br><span style="font-size:0.75rem;color:var(--muted)">我的书 wode shu</span></td>
          <td><span class="eng">Both</span><br><span style="font-size:0.75rem;color:var(--muted)">John's / of John</span></td>
          <td class="unusual-cell"><span class="yue">Gen-N</span><br><span style="font-size:0.75rem;color:var(--muted)">我嘅書 ngo5 ge3 syu1</span></td>
          <td><span class="tag tag-unusual">OV-LIKE</span></td>
        </tr>
        <tr>
          <td class="param">Adjective-Noun</td>
          <td class="match-cell"><span class="cmn">Adj-N</span><br><span style="font-size:0.75rem;color:var(--muted)">大书 da shu</span></td>
          <td class="match-cell"><span class="eng">Adj-N</span><br><span style="font-size:0.75rem;color:var(--muted)">big book</span></td>
          <td class="match-cell"><span class="yue">Adj-N</span><br><span style="font-size:0.75rem;color:var(--muted)">大書 daai6 syu1</span></td>
          <td><span class="tag tag-match">TYPICAL</span></td>
        </tr>
        <tr>
          <td class="param">Demonstrative-Noun</td>
          <td class="match-cell"><span class="cmn">Dem-CL-N</span><br><span style="font-size:0.75rem;color:var(--muted)">这本书 zhe ben shu</span></td>
          <td class="match-cell"><span class="eng">Dem-N</span><br><span style="font-size:0.75rem;color:var(--muted)">this book</span></td>
          <td class="match-cell"><span class="yue">Dem-CL-N</span><br><span style="font-size:0.75rem;color:var(--muted)">呢本書 ni1 bun2 syu1</span></td>
          <td><span class="tag tag-match">TYPICAL</span></td>
        </tr>
        <tr>
          <td class="param">Numeral-Noun</td>
          <td><span class="cmn">Num-CL-N</span><br><span style="font-size:0.75rem;color:var(--muted)">三本书 san ben shu</span></td>
          <td><span class="eng">Num-N</span><br><span style="font-size:0.75rem;color:var(--muted)">three books</span></td>
          <td><span class="yue">Num-CL-N</span><br><span style="font-size:0.75rem;color:var(--muted)">三本書 saam1 bun2 syu1</span></td>
          <td><span class="tag tag-match">TYPICAL</span></td>
        </tr>
        <tr>
          <td class="param" style="font-weight:800;color:var(--mismatch)">Relative Clause-Noun</td>
          <td class="mismatch-cell"><span class="cmn" style="font-weight:800">RC-N (prenominal)</span><br><span style="font-size:0.75rem;color:var(--muted)">我买的书 wo mai de shu</span></td>
          <td><span class="eng">N-RC (postnominal)</span><br><span style="font-size:0.75rem;color:var(--muted)">book that I bought</span></td>
          <td class="mismatch-cell"><span class="yue" style="font-weight:800">RC-N (prenominal)</span><br><span style="font-size:0.75rem;color:var(--muted)">我買嘅書 ngo5 maai5 ge3 syu1</span></td>
          <td><span class="tag tag-rare">RARE!</span></td>
        </tr>
        <tr>
          <td class="param">Standard of Comparison</td>
          <td><span class="cmn">Std-Adj</span><br><span style="font-size:0.75rem;color:var(--muted)">比我高 bi wo gao</span></td>
          <td><span class="eng">Adj-Std</span><br><span style="font-size:0.75rem;color:var(--muted)">taller than me</span></td>
          <td><span class="yue">Std-Adj</span><br><span style="font-size:0.75rem;color:var(--muted)">高過我 gou1 gwo3 ngo5</span></td>
          <td><span class="tag tag-unusual">OV-LIKE</span></td>
        </tr>
        <tr>
          <td class="param">Question Formation</td>
          <td><span class="cmn">Final particle 吗 / A-not-A</span><br><span style="font-size:0.75rem;color:var(--muted)">你吃吗? / 你吃不吃?</span></td>
          <td><span class="eng">Aux inversion + wh-</span><br><span style="font-size:0.75rem;color:var(--muted)">Did you eat?</span></td>
          <td><span class="yue">Final particles</span><br><span style="font-size:0.75rem;color:var(--muted)">你食咗未? nei5 sik6 zo2 mei6?</span></td>
          <td>--</td>
        </tr>
        <tr>
          <td class="param">Negation Position</td>
          <td class="match-cell"><span class="cmn">Pre-verbal</span><br><span style="font-size:0.75rem;color:var(--muted)">不吃 bu chi</span></td>
          <td class="match-cell"><span class="eng">Pre-verbal + aux</span><br><span style="font-size:0.75rem;color:var(--muted)">don't eat</span></td>
          <td class="match-cell"><span class="yue">Pre-verbal</span><br><span style="font-size:0.75rem;color:var(--muted)">唔食 m4 sik6</span></td>
          <td><span class="tag tag-match">TYPICAL</span></td>
        </tr>
      </tbody>
    </table>
    <div class="svo-note">
      <strong>The Relative Clause Anomaly:</strong> Mandarin is essentially the <strong>only major VO language family</strong> with prenominal relative clauses (Dryer 1992). In a sample of ~600 languages, the ratio of RelN to NRel in VO languages is approximately 1 to 60 -- and that 1 is Chinese. This violates one of the strongest Greenbergian word-order correlations.
    </div>
  </div>
  <figcaption>
    <h2>Word Order Parameter Grid</h2>
    <p>Mandarin shares SVO with English but diverges dramatically on relative clause position. The prenominal RC ("我买的书" = "I-buy-DE book") makes Mandarin a cross-linguistic outlier among VO languages. Green cells = typical for SVO; red = rare for SVO; orange = OV-like feature in a VO language. Cantonese patterns with Mandarin on nearly every parameter.</p>
  </figcaption>
</figure>
</body>
</html>
