<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The 8 English Inflections</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --accent: #4361ee;
    --accent-light: #e8edff;
    --noun-color: #2d8a4e;
    --noun-bg: #f0faf0;
    --verb-color: #e63946;
    --verb-bg: #fef3f0;
    --adj-color: #7c3aed;
    --adj-bg: #f5f0ff;
    --oe-color: #e9a820;
    --oe-bg: #fdf6ec;
    --muted: #6c757d;
    --caption-bg: #f8f9fa;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --accent: #6b8aff;
      --accent-light: #1e2a4a;
      --noun-color: #5cb87a;
      --noun-bg: #102a18;
      --verb-color: #ff6b6b;
      --verb-bg: #2a1520;
      --adj-color: #a78bfa;
      --adj-bg: #1a1030;
      --oe-color: #f0c050;
      --oe-bg: #2a2210;
      --muted: #9a9ab0;
      --caption-bg: #1a1a2e;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure { max-width: 1000px; width: 100%; }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding: 1rem 1.5rem;
    background: var(--caption-bg);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  .chart-wrapper {
    overflow-x: auto;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--surface);
    padding: 1.5rem;
    min-width: 700px;
  }
  .comparison-banner {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    padding: 0.8rem 1.2rem;
    background: var(--oe-bg);
    border: 2px solid var(--oe-color);
    border-radius: 10px;
    margin-bottom: 1.5rem;
    text-align: center;
  }
  .banner-oe {
    font-size: 2rem;
    font-weight: 800;
    color: var(--oe-color);
  }
  .banner-arrow { font-size: 1.5rem; color: var(--muted); }
  .banner-me {
    font-size: 2.5rem;
    font-weight: 800;
    color: var(--accent);
  }
  .banner-label { font-size: 0.75rem; color: var(--muted); display: block; }
  .category-section {
    margin-bottom: 1.5rem;
    border-radius: 10px;
    border: 1px solid;
    overflow: hidden;
  }
  .noun-section { border-color: var(--noun-color); }
  .verb-section { border-color: var(--verb-color); }
  .adj-section { border-color: var(--adj-color); }
  .category-header {
    padding: 0.5rem 1rem;
    font-weight: 700;
    font-size: 0.95rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .noun-section .category-header { background: var(--noun-bg); color: var(--noun-color); }
  .verb-section .category-header { background: var(--verb-bg); color: var(--verb-color); }
  .adj-section .category-header { background: var(--adj-bg); color: var(--adj-color); }
  .count-badge {
    display: inline-block;
    width: 24px;
    height: 24px;
    line-height: 24px;
    text-align: center;
    border-radius: 50%;
    font-size: 0.8rem;
    font-weight: 800;
    color: white;
  }
  .noun-section .count-badge { background: var(--noun-color); }
  .verb-section .count-badge { background: var(--verb-color); }
  .adj-section .count-badge { background: var(--adj-color); }
  .inflection-table {
    width: 100%;
    border-collapse: collapse;
  }
  .inflection-table th, .inflection-table td {
    padding: 0.5rem 0.8rem;
    border: 1px solid var(--border);
    font-size: 0.85rem;
  }
  .inflection-table th {
    background: var(--surface);
    font-weight: 600;
    color: var(--accent);
    text-align: left;
    width: 15%;
  }
  .inflection-table td { vertical-align: top; }
  .allomorph-grid {
    display: flex;
    gap: 0.4rem;
    flex-wrap: wrap;
    margin-top: 0.3rem;
  }
  .allomorph {
    font-family: 'Gentium Plus', 'Noto Sans', serif;
    font-size: 0.82rem;
    padding: 0.15rem 0.5rem;
    border-radius: 4px;
    background: var(--accent-light);
    color: var(--accent);
    font-weight: 600;
  }
  .allomorph-rule {
    font-size: 0.72rem;
    color: var(--muted);
    display: block;
  }
  .irregular-examples {
    font-size: 0.8rem;
    color: var(--muted);
    font-style: italic;
    margin-top: 0.3rem;
  }
  .pattern-note {
    margin-top: 1rem;
    padding: 0.8rem 1rem;
    background: var(--accent-light);
    border-radius: 8px;
    border-left: 4px solid var(--accent);
    font-size: 0.85rem;
  }
  .pattern-note strong { color: var(--accent); }
</style>
</head>
<body>
<figure>
  <div class="chart-wrapper">
    <!-- OE vs ME Comparison -->
    <div class="comparison-banner">
      <div>
        <span class="banner-label">Old English</span>
        <span class="banner-oe">~85+</span>
        <span class="banner-label">inflectional forms</span>
      </div>
      <span class="banner-arrow">&rarr;&rarr;&rarr;</span>
      <div>
        <span class="banner-label">Modern English</span>
        <span class="banner-me">8</span>
        <span class="banner-label">inflectional morphemes</span>
      </div>
    </div>

    <!-- Noun Inflections -->
    <div class="category-section noun-section">
      <div class="category-header"><span class="count-badge">2</span> Noun Inflections</div>
      <table class="inflection-table">
        <tr>
          <th>Inflection</th>
          <th>Suffix</th>
          <th>Allomorphs</th>
          <th>Regular Examples</th>
          <th>Irregular Examples</th>
        </tr>
        <tr>
          <td><strong>1. Plural</strong></td>
          <td>-s</td>
          <td>
            <div class="allomorph-grid">
              <div class="allomorph">/-s/<span class="allomorph-rule">after voiceless</span></div>
              <div class="allomorph">/-z/<span class="allomorph-rule">after voiced</span></div>
              <div class="allomorph">/-&#x26A;z/<span class="allomorph-rule">after sibilants</span></div>
            </div>
          </td>
          <td>cat&rarr;cats, dog&rarr;dogs, box&rarr;boxes</td>
          <td>
            <div class="irregular-examples">foot/feet, ox/oxen, sheep/sheep, child/children, mouse/mice</div>
          </td>
        </tr>
        <tr>
          <td><strong>2. Possessive</strong></td>
          <td>-'s</td>
          <td>
            <div class="allomorph-grid">
              <div class="allomorph">/-s/<span class="allomorph-rule">after voiceless</span></div>
              <div class="allomorph">/-z/<span class="allomorph-rule">after voiced</span></div>
              <div class="allomorph">/-&#x26A;z/<span class="allomorph-rule">after sibilants</span></div>
            </div>
          </td>
          <td>cat's, dog's, fox's</td>
          <td>
            <div class="irregular-examples">its (no apostrophe); plural possessives: dogs' (s-apostrophe)</div>
          </td>
        </tr>
      </table>
    </div>

    <!-- Verb Inflections -->
    <div class="category-section verb-section">
      <div class="category-header"><span class="count-badge">4</span> Verb Inflections</div>
      <table class="inflection-table">
        <tr>
          <th>Inflection</th>
          <th>Suffix</th>
          <th>Allomorphs</th>
          <th>Regular Examples</th>
          <th>Irregular Examples</th>
        </tr>
        <tr>
          <td><strong>3. 3sg Present</strong></td>
          <td>-s</td>
          <td>
            <div class="allomorph-grid">
              <div class="allomorph">/-s/<span class="allomorph-rule">after voiceless</span></div>
              <div class="allomorph">/-z/<span class="allomorph-rule">after voiced</span></div>
              <div class="allomorph">/-&#x26A;z/<span class="allomorph-rule">after sibilants</span></div>
            </div>
          </td>
          <td>walks, runs, watches</td>
          <td>
            <div class="irregular-examples">has, does, says /sez/, is</div>
          </td>
        </tr>
        <tr>
          <td><strong>4. Past Tense</strong></td>
          <td>-ed</td>
          <td>
            <div class="allomorph-grid">
              <div class="allomorph">/-t/<span class="allomorph-rule">after voiceless</span></div>
              <div class="allomorph">/-d/<span class="allomorph-rule">after voiced</span></div>
              <div class="allomorph">/-&#x26A;d/<span class="allomorph-rule">after /t, d/</span></div>
            </div>
          </td>
          <td>walked, played, wanted</td>
          <td>
            <div class="irregular-examples">sang, drove, went, bought, kept, was</div>
          </td>
        </tr>
        <tr>
          <td><strong>5. Past Participle</strong></td>
          <td>-ed / -en</td>
          <td>
            <div class="allomorph-grid">
              <div class="allomorph">/-t, -d, -&#x26A;d/<span class="allomorph-rule">regular</span></div>
              <div class="allomorph">/-&#x259;n/<span class="allomorph-rule">irregular -en</span></div>
            </div>
          </td>
          <td>walked, played, wanted</td>
          <td>
            <div class="irregular-examples">broken, eaten, driven, sung, gone, been</div>
          </td>
        </tr>
        <tr>
          <td><strong>6. Progressive</strong></td>
          <td>-ing</td>
          <td>
            <div class="allomorph-grid">
              <div class="allomorph">/-&#x26A;&#x14B;/<span class="allomorph-rule">invariant</span></div>
            </div>
          </td>
          <td>walking, playing, running</td>
          <td>
            <div class="irregular-examples">No irregular forms (the one completely regular inflection)</div>
          </td>
        </tr>
      </table>
    </div>

    <!-- Adjective Inflections -->
    <div class="category-section adj-section">
      <div class="category-header"><span class="count-badge">2</span> Adjective Inflections</div>
      <table class="inflection-table">
        <tr>
          <th>Inflection</th>
          <th>Suffix</th>
          <th>Allomorphs</th>
          <th>Regular Examples</th>
          <th>Irregular Examples</th>
        </tr>
        <tr>
          <td><strong>7. Comparative</strong></td>
          <td>-er</td>
          <td>
            <div class="allomorph-grid">
              <div class="allomorph">/-&#x259;r/<span class="allomorph-rule">invariant</span></div>
            </div>
          </td>
          <td>taller, bigger, happier</td>
          <td>
            <div class="irregular-examples">better, worse, more, less, farther/further</div>
          </td>
        </tr>
        <tr>
          <td><strong>8. Superlative</strong></td>
          <td>-est</td>
          <td>
            <div class="allomorph-grid">
              <div class="allomorph">/-&#x26A;st/<span class="allomorph-rule">invariant</span></div>
            </div>
          </td>
          <td>tallest, biggest, happiest</td>
          <td>
            <div class="irregular-examples">best, worst, most, least, farthest/furthest</div>
          </td>
        </tr>
      </table>
    </div>
  </div>

  <div class="pattern-note">
    <strong>Pattern:</strong> All three -s inflections (plural, possessive, 3sg present) share the <em>same three allomorphs</em> with the <em>same phonological conditioning</em>: /-s/ after voiceless, /-z/ after voiced, /-&#x26A;z/ after sibilants. Similarly, both -ed inflections (past tense, past participle) share /-t/ after voiceless, /-d/ after voiced, /-&#x26A;d/ after /t,d/. This is a pattern within the pattern: English uses just two allomorph templates across all eight inflections. The progressive -ing is the only inflection with no allomorphic variation at all.
  </div>

  <figcaption>
    <h2>Figure 1 &mdash; The 8 Inflections of Modern English</h2>
    <p>Modern English retains exactly 8 inflectional morphemes -- down from dozens of distinct forms in Old English. They divide cleanly into Noun (2), Verb (4), and Adjective (2). Each inflection has phonologically conditioned allomorphs that follow predictable rules. Inflections always attach outside derivational morphology: nation &rarr; national &rarr; nationalize &rarr; nationalizes.</p>
  </figcaption>
</figure>
</body>
</html>
