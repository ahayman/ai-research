<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Compounding Patterns</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --accent: #4361ee;
    --accent-light: #e8edff;
    --endo: #2d8a4e;
    --endo-bg: #f0faf0;
    --exo: #e63946;
    --exo-bg: #fef3f0;
    --stress1: #e63946;
    --stress2: #b0b0c0;
    --nn: #4361ee;
    --an: #2d8a4e;
    --vn: #7c3aed;
    --nv: #e9a820;
    --vp: #0d9488;
    --muted: #6c757d;
    --caption-bg: #f8f9fa;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --accent: #6b8aff;
      --accent-light: #1e2a4a;
      --endo: #5cb87a;
      --endo-bg: #102a18;
      --exo: #ff6b6b;
      --exo-bg: #2a1520;
      --stress1: #ff6b6b;
      --stress2: #555570;
      --nn: #6b8aff;
      --an: #5cb87a;
      --vn: #a78bfa;
      --nv: #f0c050;
      --vp: #2dd4bf;
      --muted: #9a9ab0;
      --caption-bg: #1a1a2e;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure { max-width: 1000px; width: 100%; }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding: 1rem 1.5rem;
    background: var(--caption-bg);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  .chart-wrapper {
    overflow-x: auto;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--surface);
    padding: 1.5rem;
    min-width: 700px;
  }
  .section-title {
    font-size: 1rem;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 0.8rem;
    padding-bottom: 0.3rem;
    border-bottom: 2px solid var(--accent);
  }
  /* Compound type rows */
  .type-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 0.8rem;
    margin-bottom: 1.5rem;
  }
  .type-card {
    border-radius: 8px;
    padding: 0.7rem 0.9rem;
    border-left: 4px solid;
  }
  .type-label {
    font-weight: 700;
    font-size: 0.85rem;
    margin-bottom: 0.3rem;
  }
  .type-examples {
    display: flex;
    flex-wrap: wrap;
    gap: 0.25rem;
    font-size: 0.8rem;
  }
  .type-examples span {
    padding: 0.1rem 0.4rem;
    border-radius: 4px;
    background: var(--surface);
    border: 1px solid var(--border);
  }
  .nn-card { background: rgba(67,97,238,0.06); border-color: var(--nn); }
  .nn-card .type-label { color: var(--nn); }
  .an-card { background: rgba(45,138,78,0.06); border-color: var(--an); }
  .an-card .type-label { color: var(--an); }
  .vn-card { background: rgba(124,58,237,0.06); border-color: var(--vn); }
  .vn-card .type-label { color: var(--vn); }
  .nv-card { background: rgba(233,168,32,0.06); border-color: var(--nv); }
  .nv-card .type-label { color: var(--nv); }
  .vp-card { background: rgba(13,148,136,0.06); border-color: var(--vp); }
  .vp-card .type-label { color: var(--vp); }

  /* Stress distinction section */
  .stress-section {
    background: var(--accent-light);
    border: 2px solid var(--accent);
    border-radius: 10px;
    padding: 1rem 1.2rem;
    margin-bottom: 1.5rem;
  }
  .stress-title {
    font-weight: 700;
    font-size: 0.95rem;
    color: var(--accent);
    margin-bottom: 0.8rem;
  }
  .stress-pair {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 0.6rem;
    flex-wrap: wrap;
  }
  .stress-item {
    padding: 0.4rem 0.8rem;
    border-radius: 6px;
    font-size: 0.9rem;
    border: 1px solid var(--border);
    background: var(--surface);
  }
  .stress-item .big { font-size: 1.1rem; font-weight: 800; color: var(--stress1); }
  .stress-item .small { font-size: 0.9rem; color: var(--stress2); }
  .stress-item .meaning { font-size: 0.72rem; color: var(--muted); display: block; }
  .vs-badge {
    font-size: 0.7rem;
    font-weight: 700;
    background: var(--accent-light);
    color: var(--accent);
    padding: 0.15rem 0.4rem;
    border-radius: 4px;
  }

  /* Endo vs Exo */
  .endo-exo-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
    margin-bottom: 1.5rem;
  }
  .ee-card {
    border-radius: 10px;
    border: 2px solid;
    padding: 0.8rem 1rem;
  }
  .endo-card { border-color: var(--endo); background: var(--endo-bg); }
  .exo-card { border-color: var(--exo); background: var(--exo-bg); }
  .ee-title { font-weight: 700; font-size: 0.9rem; margin-bottom: 0.4rem; }
  .endo-card .ee-title { color: var(--endo); }
  .exo-card .ee-title { color: var(--exo); }
  .ee-desc { font-size: 0.8rem; color: var(--muted); margin-bottom: 0.5rem; }
  .ee-examples { font-size: 0.82rem; }
  .ee-examples strong { color: var(--fg); }

  /* Recursion */
  .recursion-box {
    margin: 0.5rem 0;
    padding: 0.8rem 1rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 0.85rem;
    text-align: center;
  }
  .nest-0 { font-weight: 800; font-size: 1rem; }
  .nest-1 { color: var(--accent); }
  .nest-2 { color: var(--nn); }
  .pattern-note {
    margin-top: 1rem;
    padding: 0.8rem 1rem;
    background: var(--accent-light);
    border-radius: 8px;
    border-left: 4px solid var(--accent);
    font-size: 0.85rem;
  }
  .pattern-note strong { color: var(--accent); }
</style>
</head>
<body>
<figure>
  <div class="chart-wrapper">
    <!-- Structural Types -->
    <div class="section-title">Compound Structural Types</div>
    <div class="type-grid">
      <div class="type-card nn-card">
        <div class="type-label">Noun + Noun</div>
        <div class="type-examples">
          <span>football</span><span>bookstore</span><span>sunflower</span><span>toothpaste</span><span>earthquake</span>
        </div>
      </div>
      <div class="type-card an-card">
        <div class="type-label">Adjective + Noun</div>
        <div class="type-examples">
          <span>blackboard</span><span>greenhouse</span><span>highway</span><span>software</span>
        </div>
      </div>
      <div class="type-card vn-card">
        <div class="type-label">Verb + Noun</div>
        <div class="type-examples">
          <span>pickpocket</span><span>scarecrow</span><span>killjoy</span><span>breakfast</span>
        </div>
      </div>
      <div class="type-card nv-card">
        <div class="type-label">Noun + Verb / Adjective</div>
        <div class="type-examples">
          <span>nosebleed</span><span>headache</span><span>heartbreak</span><span>bittersweet</span>
        </div>
      </div>
      <div class="type-card vp-card">
        <div class="type-label">Verb + Particle (Phrasal)</div>
        <div class="type-examples">
          <span>breakdown</span><span>takeoff</span><span>checkout</span><span>login</span><span>input</span>
        </div>
      </div>
    </div>

    <!-- Stress Diagnostic -->
    <div class="stress-section">
      <div class="stress-title">The Compound Stress Rule: Stress Alone Distinguishes Compound from Phrase</div>
      <div class="stress-pair">
        <div class="stress-item">
          <span class="big">BLACK</span><span class="small">bird</span>
          <span class="meaning">compound = a species of bird</span>
        </div>
        <span class="vs-badge">vs</span>
        <div class="stress-item">
          <span class="small">black</span> <span class="big">BIRD</span>
          <span class="meaning">phrase = any bird that is black</span>
        </div>
      </div>
      <div class="stress-pair">
        <div class="stress-item">
          <span class="big">GREEN</span><span class="small">house</span>
          <span class="meaning">compound = plant-growing structure</span>
        </div>
        <span class="vs-badge">vs</span>
        <div class="stress-item">
          <span class="small">green</span> <span class="big">HOUSE</span>
          <span class="meaning">phrase = green-colored house</span>
        </div>
      </div>
      <div style="font-size:0.8rem; color:var(--muted); margin-top:0.4rem;">
        <strong>Rule:</strong> Compound nouns = first-element stress | Adjective+noun phrases = last-element stress
      </div>
    </div>

    <!-- Endocentric vs Exocentric -->
    <div class="section-title">Semantic Structure: Head and Headless Compounds</div>
    <div class="endo-exo-grid">
      <div class="ee-card endo-card">
        <div class="ee-title">Endocentric (Headed)</div>
        <div class="ee-desc">The compound IS a type of its head. In English, the head = the right-hand element.</div>
        <div class="ee-examples">
          <strong>blackbird</strong> IS a <strong>bird</strong><br>
          <strong>bookstore</strong> IS a <strong>store</strong><br>
          <strong>sunflower</strong> IS a <strong>flower</strong><br>
          <strong>football</strong> IS a <strong>ball</strong> (originally)
        </div>
      </div>
      <div class="ee-card exo-card">
        <div class="ee-title">Exocentric (Headless)</div>
        <div class="ee-desc">The compound is NOT a type of either element. Meaning is metaphorical or agentive.</div>
        <div class="ee-examples">
          <strong>pickpocket</strong> is NOT a <strong>pocket</strong><br>
          <strong>scarecrow</strong> is NOT a <strong>crow</strong><br>
          <strong>killjoy</strong> is NOT a <strong>joy</strong><br>
          <strong>breakfast</strong> is NOT a <strong>fast</strong>
        </div>
      </div>
    </div>

    <!-- Recursive Compounding -->
    <div class="section-title">Recursive Compounding: Compounds Inside Compounds</div>
    <div class="recursion-box">
      <span class="nest-0">[ [ <span class="nest-1">[ <span class="nest-2">student</span> <span class="nest-2">government</span> ]</span> <span class="nest-1">association</span> ] budget ] committee</span>
      <div style="font-size:0.78rem; color:var(--muted); margin-top:0.4rem;">
        English compounds can stack recursively with right-branching structure: each layer adds a modifier to the head
      </div>
    </div>
  </div>

  <div class="pattern-note">
    <strong>Pattern:</strong> English compounding follows three systematic rules. (1) The head is always the right-hand element (a bookstore is a store, not a book). (2) Compounds receive first-element stress; phrases receive last-element stress -- this is a minimal pair for structure. (3) Compounding is recursive: compounds can contain other compounds, producing arbitrarily long chains like "student government association budget committee meeting room."
  </div>

  <figcaption>
    <h2>Figure 5 &mdash; English Compounding Patterns</h2>
    <p>Compounding is English's most productive word-formation process. Compounds are classified by the parts of speech of their components (N+N, A+N, V+N, etc.), by their semantic headedness (endocentric vs. exocentric), and by their stress pattern (first-element stress = compound; last-element stress = phrase). English compounding is recursive, allowing arbitrarily complex nested structures.</p>
  </figcaption>
</figure>
</body>
</html>
