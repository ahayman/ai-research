<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Word Formation Processes</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --accent: #4361ee;
    --accent-light: #e8edff;
    --derive: #e63946;
    --derive-bg: #fef3f0;
    --compound: #2d8a4e;
    --compound-bg: #f0faf0;
    --convert: #7c3aed;
    --convert-bg: #f5f0ff;
    --back: #e9a820;
    --back-bg: #fdf6ec;
    --blend: #0d9488;
    --blend-bg: #f0fafa;
    --clip: #6366f1;
    --clip-bg: #eef0ff;
    --acronym: #d946a8;
    --acronym-bg: #fdf0fa;
    --muted: #6c757d;
    --caption-bg: #f8f9fa;
    --high: #2d8a4e;
    --medium: #e9a820;
    --low: #e63946;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --accent: #6b8aff;
      --accent-light: #1e2a4a;
      --derive: #ff6b6b;
      --derive-bg: #2a1520;
      --compound: #5cb87a;
      --compound-bg: #102a18;
      --convert: #a78bfa;
      --convert-bg: #1a1030;
      --back: #f0c050;
      --back-bg: #2a2210;
      --blend: #2dd4bf;
      --blend-bg: #102a28;
      --clip: #818cf8;
      --clip-bg: #151530;
      --acronym: #f0abdb;
      --acronym-bg: #2a1025;
      --muted: #9a9ab0;
      --caption-bg: #1a1a2e;
      --high: #5cb87a;
      --medium: #f0c050;
      --low: #ff6b6b;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure { max-width: 1000px; width: 100%; }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding: 1rem 1.5rem;
    background: var(--caption-bg);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  .chart-wrapper {
    overflow-x: auto;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--surface);
    padding: 1.5rem;
    min-width: 700px;
  }
  .processes-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
  }
  .process-card {
    border-radius: 10px;
    border: 2px solid;
    overflow: hidden;
  }
  .card-header {
    padding: 0.5rem 0.8rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-weight: 700;
    font-size: 0.9rem;
  }
  .productivity-badge {
    font-size: 0.65rem;
    padding: 0.1rem 0.4rem;
    border-radius: 4px;
    font-weight: 700;
    color: white;
  }
  .prod-high { background: var(--high); }
  .prod-medium { background: var(--medium); color: var(--fg); }
  .prod-low { background: var(--low); }
  .card-body { padding: 0.6rem 0.8rem; }
  .card-desc {
    font-size: 0.78rem;
    color: var(--muted);
    margin-bottom: 0.5rem;
  }
  .examples-list {
    display: flex;
    flex-wrap: wrap;
    gap: 0.3rem;
  }
  .example-chip {
    font-size: 0.78rem;
    padding: 0.15rem 0.5rem;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: var(--surface);
  }
  .example-chip .arrow { color: var(--muted); }

  .derive-card { border-color: var(--derive); }
  .derive-card .card-header { background: var(--derive-bg); color: var(--derive); }
  .compound-card { border-color: var(--compound); }
  .compound-card .card-header { background: var(--compound-bg); color: var(--compound); }
  .convert-card { border-color: var(--convert); }
  .convert-card .card-header { background: var(--convert-bg); color: var(--convert); }
  .back-card { border-color: var(--back); }
  .back-card .card-header { background: var(--back-bg); color: var(--back); }
  .blend-card { border-color: var(--blend); }
  .blend-card .card-header { background: var(--blend-bg); color: var(--blend); }
  .clip-card { border-color: var(--clip); }
  .clip-card .card-header { background: var(--clip-bg); color: var(--clip); }
  .acronym-card { border-color: var(--acronym); }
  .acronym-card .card-header { background: var(--acronym-bg); color: var(--acronym); }

  .full-width { grid-column: 1 / -1; }
  .pattern-note {
    margin-top: 1rem;
    padding: 0.8rem 1rem;
    background: var(--accent-light);
    border-radius: 8px;
    border-left: 4px solid var(--accent);
    font-size: 0.85rem;
  }
  .pattern-note strong { color: var(--accent); }
</style>
</head>
<body>
<figure>
  <div class="chart-wrapper">
    <div class="processes-grid">
      <!-- Derivation -->
      <div class="process-card derive-card">
        <div class="card-header">
          <span>Derivation (Affix Addition)</span>
          <span class="productivity-badge prod-high">HIGH</span>
        </div>
        <div class="card-body">
          <div class="card-desc">Add prefix or suffix to change meaning or part of speech. The most formally structured process.</div>
          <div class="examples-list">
            <span class="example-chip">happy <span class="arrow">&rarr;</span> un-happy</span>
            <span class="example-chip">teach <span class="arrow">&rarr;</span> teach-er</span>
            <span class="example-chip">nation <span class="arrow">&rarr;</span> nation-al</span>
            <span class="example-chip">dark <span class="arrow">&rarr;</span> dark-ness</span>
            <span class="example-chip">modern <span class="arrow">&rarr;</span> modern-ize</span>
          </div>
        </div>
      </div>

      <!-- Compounding -->
      <div class="process-card compound-card">
        <div class="card-header">
          <span>Compounding (Root + Root)</span>
          <span class="productivity-badge prod-high">HIGH</span>
        </div>
        <div class="card-body">
          <div class="card-desc">Combine two free words into one new word. The most productive process in English.</div>
          <div class="examples-list">
            <span class="example-chip">black + bird <span class="arrow">&rarr;</span> blackbird</span>
            <span class="example-chip">sun + flower <span class="arrow">&rarr;</span> sunflower</span>
            <span class="example-chip">break + down <span class="arrow">&rarr;</span> breakdown</span>
            <span class="example-chip">tooth + paste <span class="arrow">&rarr;</span> toothpaste</span>
          </div>
        </div>
      </div>

      <!-- Conversion -->
      <div class="process-card convert-card">
        <div class="card-header">
          <span>Conversion (Zero-Derivation)</span>
          <span class="productivity-badge prod-high">HIGH</span>
        </div>
        <div class="card-body">
          <div class="card-desc">Change part of speech with <em>no morphological change</em>. English's unique flexibility, enabled by loss of inflections.</div>
          <div class="examples-list">
            <span class="example-chip">N&rarr;V: email <span class="arrow">&rarr;</span> to email</span>
            <span class="example-chip">N&rarr;V: Google <span class="arrow">&rarr;</span> to Google</span>
            <span class="example-chip">V&rarr;N: to run <span class="arrow">&rarr;</span> a run</span>
            <span class="example-chip">A&rarr;V: clean <span class="arrow">&rarr;</span> to clean</span>
            <span class="example-chip">N&rarr;V: to Uber</span>
          </div>
        </div>
      </div>

      <!-- Back-formation -->
      <div class="process-card back-card">
        <div class="card-header">
          <span>Back-Formation (Affix Removal)</span>
          <span class="productivity-badge prod-medium">MEDIUM</span>
        </div>
        <div class="card-body">
          <div class="card-desc">Create a word by removing a perceived affix from an existing word. Reverses the expected direction of derivation.</div>
          <div class="examples-list">
            <span class="example-chip">editor <span class="arrow">&rarr;</span> edit</span>
            <span class="example-chip">burglar <span class="arrow">&rarr;</span> burgle</span>
            <span class="example-chip">television <span class="arrow">&rarr;</span> televise</span>
            <span class="example-chip">donation <span class="arrow">&rarr;</span> donate</span>
            <span class="example-chip">babysitter <span class="arrow">&rarr;</span> babysit</span>
          </div>
        </div>
      </div>

      <!-- Blending -->
      <div class="process-card blend-card">
        <div class="card-header">
          <span>Blending (Word Fusion)</span>
          <span class="productivity-badge prod-medium">MEDIUM</span>
        </div>
        <div class="card-body">
          <div class="card-desc">Fuse parts of two words into one new word. Typically takes the beginning of one and the end of another.</div>
          <div class="examples-list">
            <span class="example-chip">breakfast + lunch <span class="arrow">&rarr;</span> brunch</span>
            <span class="example-chip">smoke + fog <span class="arrow">&rarr;</span> smog</span>
            <span class="example-chip">motor + hotel <span class="arrow">&rarr;</span> motel</span>
            <span class="example-chip">info + entertainment <span class="arrow">&rarr;</span> infotainment</span>
          </div>
        </div>
      </div>

      <!-- Clipping -->
      <div class="process-card clip-card">
        <div class="card-header">
          <span>Clipping (Shortening)</span>
          <span class="productivity-badge prod-medium">MEDIUM</span>
        </div>
        <div class="card-body">
          <div class="card-desc">Shorten a word while keeping the same meaning. Usually clips from the front or back.</div>
          <div class="examples-list">
            <span class="example-chip">telephone <span class="arrow">&rarr;</span> phone</span>
            <span class="example-chip">examination <span class="arrow">&rarr;</span> exam</span>
            <span class="example-chip">influenza <span class="arrow">&rarr;</span> flu</span>
            <span class="example-chip">laboratory <span class="arrow">&rarr;</span> lab</span>
            <span class="example-chip">omnibus <span class="arrow">&rarr;</span> bus</span>
          </div>
        </div>
      </div>

      <!-- Acronyms -->
      <div class="process-card acronym-card full-width">
        <div class="card-header">
          <span>Acronyms &amp; Initialisms</span>
          <span class="productivity-badge prod-medium">MEDIUM</span>
        </div>
        <div class="card-body">
          <div class="card-desc">Form words from initial letters. Acronyms are pronounced as words; initialisms are spelled out. Some become productive bases for further word-formation.</div>
          <div class="examples-list">
            <span class="example-chip">NATO (pronounced as word)</span>
            <span class="example-chip">LASER &rarr; laser (fully lexicalized)</span>
            <span class="example-chip">SCUBA &rarr; scuba</span>
            <span class="example-chip">FAQ, ASAP (initialisms)</span>
            <span class="example-chip">to RSVP (acronym as verb base)</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="pattern-note">
    <strong>Pattern:</strong> English has seven major word-formation processes, but three dominate: derivation, compounding, and conversion. These three are "highly productive" -- they actively generate new words in contemporary English every day. Conversion is especially notable as it is directly enabled by English's loss of inflectional morphology: because English words lack category-marking endings, any word can shift part of speech simply by appearing in a new syntactic position. The loss of inflection that makes English "simpler" in one dimension makes it extraordinarily flexible in another.
  </div>

  <figcaption>
    <h2>Figure 4 &mdash; English Word Formation Processes</h2>
    <p>Seven major processes for creating new English words, ranked by productivity. Derivation, compounding, and conversion are highly productive and generate new vocabulary daily. Back-formation, blending, clipping, and acronym formation are moderately productive. Each process has a distinct structural mechanism but all contribute to English's enormous lexical inventory.</p>
  </figcaption>
</figure>
</body>
</html>
