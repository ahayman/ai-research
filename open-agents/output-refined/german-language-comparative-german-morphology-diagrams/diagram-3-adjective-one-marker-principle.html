<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The One-Marker Principle: Adjective Declension Flowchart</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --accent: #4361ee; --accent-light: #e8edff;
    --strong: #ef4444; --strong-bg: #fee2e2;
    --weak: #22c55e; --weak-bg: #dcfce7;
    --mixed: #f59e0b; --mixed-bg: #fef3c7;
    --flow: #8b5cf6; --flow-bg: #ede9fe;
    --english: #64748b; --english-bg: #f1f5f9;
    --muted: #6c757d; --caption-bg: #f8f9fa;
    --header-bg: #e2e8f0;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a; --fg: #e8e8f0; --surface: #1a1a2e; --border: #2d2d44;
      --accent: #6b8aff; --accent-light: #1e2a4a;
      --strong: #f87171; --strong-bg: #5c1a1a;
      --weak: #4ade80; --weak-bg: #14532d;
      --mixed: #fbbf24; --mixed-bg: #78350f;
      --flow: #a78bfa; --flow-bg: #3b1f7a;
      --english: #94a3b8; --english-bg: #1e293b;
      --muted: #9a9ab0; --caption-bg: #1a1a2e;
      --header-bg: #2d2d44;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg); color: var(--fg);
    display: flex; justify-content: center; padding: 2rem 1rem; line-height: 1.6;
  }
  figure { max-width: 1100px; width: 100%; }
  .diagram-container {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 1.5rem 1rem; overflow-x: auto;
  }
  figcaption {
    text-align: center; margin-top: 1.5rem; padding: 1rem 1.5rem;
    background: var(--caption-bg); border-radius: 8px; border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  svg { display: block; margin: 0 auto; }
  .title-text { font: bold 14px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
  .subtitle-text { font: 11px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
  .box-text { font: 12px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
  .cell-text { font: 11px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
  .label-sm { font: 10px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
  .form-text { font: bold 15px 'Segoe UI', system-ui, sans-serif; }
  .legend { display: flex; gap: 1.5rem; justify-content: center; flex-wrap: wrap; margin-top: 1rem; font-size: 0.82rem; color: var(--muted); }
  .legend-item { display: flex; align-items: center; gap: 0.4rem; }
  .legend-swatch { width: 14px; height: 14px; border-radius: 3px; border: 1px solid var(--border); }
</style>
</head>
<body>
<figure>
  <div class="diagram-container">
    <svg viewBox="0 0 1060 880" xmlns="http://www.w3.org/2000/svg" style="min-width:780px;">
      <text x="530" y="28" text-anchor="middle" class="title-text" style="font-size:16px;">The One-Marker Principle: One Algorithm, Three Outputs</text>
      <text x="530" y="46" text-anchor="middle" class="subtitle-text">Case/gender information must appear exactly once in the noun phrase</text>

      <!-- ========== FLOWCHART ========== -->
      <g transform="translate(200, 65)">
        <!-- START node -->
        <rect x="180" y="0" width="300" height="40" rx="20" fill="var(--flow-bg)" stroke="var(--flow)" stroke-width="2"/>
        <text x="330" y="25" text-anchor="middle" class="box-text" style="font-weight:bold;" fill="var(--flow)">Adjective before a noun -- what ending?</text>

        <!-- Arrow down -->
        <line x1="330" y1="40" x2="330" y2="65" stroke="var(--flow)" stroke-width="2"/>
        <polygon points="325,65 335,65 330,72" fill="var(--flow)"/>

        <!-- DECISION 1 -->
        <polygon points="330,75 510,120 330,165 150,120" fill="var(--surface)" stroke="var(--flow)" stroke-width="2"/>
        <text x="330" y="116" text-anchor="middle" class="cell-text" style="font-weight:bold;">Is there a preceding</text>
        <text x="330" y="130" text-anchor="middle" class="cell-text" style="font-weight:bold;">article/determiner?</text>

        <!-- NO branch (left) - Strong -->
        <line x1="150" y1="120" x2="60" y2="120" stroke="var(--strong)" stroke-width="2"/>
        <polygon points="60,115 60,125 53,120" fill="var(--strong)"/>
        <text x="105" y="112" text-anchor="middle" class="label-sm" fill="var(--strong)" style="font-weight:bold;">NO</text>

        <rect x="-120" y="95" width="170" height="50" rx="8" fill="var(--strong-bg)" stroke="var(--strong)" stroke-width="2"/>
        <text x="-35" y="116" text-anchor="middle" class="box-text" style="font-weight:bold;" fill="var(--strong)">STRONG endings</text>
        <text x="-35" y="132" text-anchor="middle" class="label-sm" fill="var(--strong)">Adjective = mini-article</text>

        <!-- YES branch (down) -->
        <line x1="330" y1="165" x2="330" y2="190" stroke="var(--flow)" stroke-width="2"/>
        <polygon points="325,190 335,190 330,197" fill="var(--flow)"/>
        <text x="345" y="183" text-anchor="start" class="label-sm" fill="var(--flow)" style="font-weight:bold;">YES</text>

        <!-- DECISION 2 -->
        <polygon points="330,200 510,245 330,290 150,245" fill="var(--surface)" stroke="var(--flow)" stroke-width="2"/>
        <text x="330" y="238" text-anchor="middle" class="cell-text" style="font-weight:bold;">Does the article show a</text>
        <text x="330" y="252" text-anchor="middle" class="cell-text" style="font-weight:bold;">distinctive case/gender ending?</text>

        <!-- YES branch (right) - Weak -->
        <line x1="510" y1="245" x2="600" y2="245" stroke="var(--weak)" stroke-width="2"/>
        <polygon points="600,240 600,250 607,245" fill="var(--weak)"/>
        <text x="555" y="237" text-anchor="middle" class="label-sm" fill="var(--weak)" style="font-weight:bold;">YES</text>

        <rect x="610" y="220" width="170" height="50" rx="8" fill="var(--weak-bg)" stroke="var(--weak)" stroke-width="2"/>
        <text x="695" y="241" text-anchor="middle" class="box-text" style="font-weight:bold;" fill="var(--weak)">WEAK endings</text>
        <text x="695" y="257" text-anchor="middle" class="label-sm" fill="var(--weak)">Only -e or -en</text>

        <!-- NO branch (down) - Mixed -->
        <line x1="330" y1="290" x2="330" y2="315" stroke="var(--mixed)" stroke-width="2"/>
        <polygon points="325,315 335,315 330,322" fill="var(--mixed)"/>
        <text x="240" y="308" text-anchor="start" class="label-sm" fill="var(--mixed)" style="font-weight:bold;">NO (gap cell)</text>

        <rect x="245" y="325" width="170" height="50" rx="8" fill="var(--mixed-bg)" stroke="var(--mixed)" stroke-width="2"/>
        <text x="330" y="346" text-anchor="middle" class="box-text" style="font-weight:bold;" fill="var(--mixed)">STRONG ending</text>
        <text x="330" y="362" text-anchor="middle" class="label-sm" fill="var(--mixed)">in this cell only</text>

        <!-- Note for mixed = weak + 3 -->
        <line x1="415" y1="350" x2="460" y2="350" stroke="var(--mixed)" stroke-width="1" stroke-dasharray="3,2"/>
        <text x="470" y="345" text-anchor="start" class="cell-text" fill="var(--mixed)" style="font-weight:bold;">MIXED declension =</text>
        <text x="470" y="360" text-anchor="start" class="cell-text" fill="var(--mixed)">Weak + 3 strong cells</text>
      </g>

      <!-- ========== EXAMPLES ========== -->
      <g transform="translate(40, 450)">
        <text x="500" y="0" text-anchor="middle" class="title-text" fill="var(--accent)">The Principle in Action: "gut" (good) + "Wein" (wine, masculine nominative)</text>

        <!-- Strong example -->
        <rect x="0" y="18" width="310" height="75" rx="8" fill="var(--strong-bg)" stroke="var(--strong)" stroke-width="2"/>
        <text x="155" y="38" text-anchor="middle" class="cell-text" style="font-weight:bold;" fill="var(--strong)">NO ARTICLE &#x2192; Strong</text>
        <text x="155" y="58" text-anchor="middle" class="form-text" fill="var(--strong)">Gut<tspan style="text-decoration:underline;">er</tspan> Wein</text>
        <text x="155" y="78" text-anchor="middle" class="label-sm">-er carries the masc.nom signal (mirrors "der")</text>

        <!-- Weak example -->
        <rect x="330" y="18" width="310" height="75" rx="8" fill="var(--weak-bg)" stroke="var(--weak)" stroke-width="2"/>
        <text x="485" y="38" text-anchor="middle" class="cell-text" style="font-weight:bold;" fill="var(--weak)">DEFINITE ARTICLE &#x2192; Weak</text>
        <text x="485" y="58" text-anchor="middle" class="form-text" fill="var(--weak)">Der gut<tspan style="text-decoration:underline;">e</tspan> Wein</text>
        <text x="485" y="78" text-anchor="middle" class="label-sm">"der" already signals masc.nom &#x2192; adjective relaxes to -e</text>

        <!-- Mixed example -->
        <rect x="660" y="18" width="310" height="75" rx="8" fill="var(--mixed-bg)" stroke="var(--mixed)" stroke-width="2"/>
        <text x="815" y="38" text-anchor="middle" class="cell-text" style="font-weight:bold;" fill="var(--mixed)">EIN-WORD (gap) &#x2192; Mixed</text>
        <text x="815" y="58" text-anchor="middle" class="form-text" fill="var(--mixed)">Ein gut<tspan style="text-decoration:underline;">er</tspan> Wein</text>
        <text x="815" y="78" text-anchor="middle" class="label-sm">"ein" has no ending &#x2192; adjective steps in with -er</text>
      </g>

      <!-- ========== MINI TABLE COMPARISON ========== -->
      <g transform="translate(40, 555)">
        <text x="500" y="0" text-anchor="middle" class="title-text" fill="var(--accent)">Three Tables Are Really One: Only 3 Cells Differ</text>
        <text x="500" y="16" text-anchor="middle" class="subtitle-text">Nominative shown -- bold cells are the only differences between weak and mixed</text>

        <!-- Table headers -->
        <text x="230" y="38" text-anchor="middle" class="box-text" style="font-weight:bold;">Masc</text>
        <text x="310" y="38" text-anchor="middle" class="box-text" style="font-weight:bold;">Fem</text>
        <text x="390" y="38" text-anchor="middle" class="box-text" style="font-weight:bold;">Neut</text>
        <text x="470" y="38" text-anchor="middle" class="box-text" style="font-weight:bold;">Pl</text>

        <!-- STRONG -->
        <text x="100" y="60" text-anchor="middle" class="box-text" style="font-weight:bold;" fill="var(--strong)">Strong</text>
        <text x="100" y="73" text-anchor="middle" class="label-sm" fill="var(--strong)">(no article)</text>
        <rect x="195" y="46" width="70" height="30" rx="4" fill="var(--strong-bg)" stroke="var(--strong)" stroke-width="2"/>
        <text x="230" y="66" text-anchor="middle" class="cell-text" style="font-weight:bold;" fill="var(--strong)">-er</text>
        <rect x="275" y="46" width="70" height="30" rx="4" fill="var(--strong-bg)" stroke="var(--strong)" stroke-width="1.5"/>
        <text x="310" y="66" text-anchor="middle" class="cell-text" fill="var(--strong)">-e</text>
        <rect x="355" y="46" width="70" height="30" rx="4" fill="var(--strong-bg)" stroke="var(--strong)" stroke-width="2"/>
        <text x="390" y="66" text-anchor="middle" class="cell-text" style="font-weight:bold;" fill="var(--strong)">-es</text>
        <rect x="435" y="46" width="70" height="30" rx="4" fill="var(--strong-bg)" stroke="var(--strong)" stroke-width="1.5"/>
        <text x="470" y="66" text-anchor="middle" class="cell-text" fill="var(--strong)">-e</text>

        <!-- WEAK -->
        <text x="100" y="100" text-anchor="middle" class="box-text" style="font-weight:bold;" fill="var(--weak)">Weak</text>
        <text x="100" y="113" text-anchor="middle" class="label-sm" fill="var(--weak)">(der/die/das)</text>
        <rect x="195" y="86" width="70" height="30" rx="4" fill="var(--weak-bg)" stroke="var(--weak)" stroke-width="1.5"/>
        <text x="230" y="106" text-anchor="middle" class="cell-text" fill="var(--weak)">-e</text>
        <rect x="275" y="86" width="70" height="30" rx="4" fill="var(--weak-bg)" stroke="var(--weak)" stroke-width="1.5"/>
        <text x="310" y="106" text-anchor="middle" class="cell-text" fill="var(--weak)">-e</text>
        <rect x="355" y="86" width="70" height="30" rx="4" fill="var(--weak-bg)" stroke="var(--weak)" stroke-width="1.5"/>
        <text x="390" y="106" text-anchor="middle" class="cell-text" fill="var(--weak)">-e</text>
        <rect x="435" y="86" width="70" height="30" rx="4" fill="var(--weak-bg)" stroke="var(--weak)" stroke-width="1.5"/>
        <text x="470" y="106" text-anchor="middle" class="cell-text" fill="var(--weak)">-en</text>

        <!-- MIXED -->
        <text x="100" y="140" text-anchor="middle" class="box-text" style="font-weight:bold;" fill="var(--mixed)">Mixed</text>
        <text x="100" y="153" text-anchor="middle" class="label-sm" fill="var(--mixed)">(ein/mein/kein)</text>
        <rect x="195" y="126" width="70" height="30" rx="4" fill="var(--mixed-bg)" stroke="var(--mixed)" stroke-width="2.5"/>
        <text x="230" y="146" text-anchor="middle" class="cell-text" style="font-weight:bold;" fill="var(--mixed)">-er</text>
        <rect x="275" y="126" width="70" height="30" rx="4" fill="var(--weak-bg)" stroke="var(--weak)" stroke-width="1.5"/>
        <text x="310" y="146" text-anchor="middle" class="cell-text" fill="var(--weak)">-e</text>
        <rect x="355" y="126" width="70" height="30" rx="4" fill="var(--mixed-bg)" stroke="var(--mixed)" stroke-width="2.5"/>
        <text x="390" y="146" text-anchor="middle" class="cell-text" style="font-weight:bold;" fill="var(--mixed)">-es</text>
        <rect x="435" y="126" width="70" height="30" rx="4" fill="var(--weak-bg)" stroke="var(--weak)" stroke-width="1.5"/>
        <text x="470" y="146" text-anchor="middle" class="cell-text" fill="var(--weak)">-en</text>

        <!-- Highlight arrows for the 3 different cells -->
        <line x1="230" y1="120" x2="230" y2="126" stroke="var(--mixed)" stroke-width="2"/>
        <line x1="390" y1="120" x2="390" y2="126" stroke="var(--mixed)" stroke-width="2"/>

        <!-- Annotation -->
        <rect x="550" y="46" width="420" height="110" rx="8" fill="var(--accent-light)" stroke="var(--accent)" stroke-width="1.5"/>
        <text x="760" y="68" text-anchor="middle" class="cell-text" style="font-weight:bold;" fill="var(--accent)">THE KEY INSIGHT</text>
        <text x="570" y="88" text-anchor="start" class="cell-text" fill="var(--fg)">Mixed declension is NOT a third table.</text>
        <text x="570" y="104" text-anchor="start" class="cell-text" fill="var(--fg)">It is the <tspan fill="var(--weak)" font-weight="bold">weak</tspan> table with <tspan fill="var(--mixed)" font-weight="bold">3 cells swapped</tspan></text>
        <text x="570" y="120" text-anchor="start" class="cell-text" fill="var(--fg)">to <tspan fill="var(--strong)" font-weight="bold">strong</tspan> endings -- the 3 cells where</text>
        <text x="570" y="136" text-anchor="start" class="cell-text" fill="var(--fg)">ein/mein/kein has no distinctive ending.</text>
        <text x="570" y="152" text-anchor="start" class="label-sm" fill="var(--accent)">Masc NOM, Neut NOM, Neut ACC</text>
      </g>

      <!-- ========== ENGLISH COMPARISON ========== -->
      <g transform="translate(40, 730)">
        <rect x="0" y="0" width="980" height="55" rx="10" fill="var(--english-bg)" stroke="var(--english)" stroke-width="1.5"/>
        <text x="490" y="20" text-anchor="middle" class="title-text" fill="var(--english)" style="font-size:12px;">ENGLISH: Zero Adjective Inflection</text>
        <text x="490" y="38" text-anchor="middle" class="cell-text" fill="var(--fg)">
          "good wine" / "good woman" / "good child" / "good children" -- always just "good." English lost all adjective agreement by ~1400.
        </text>
      </g>

      <!-- ========== PRINCIPLE RESTATEMENT ========== -->
      <g transform="translate(40, 805)">
        <rect x="0" y="0" width="980" height="55" rx="8" fill="var(--flow-bg)" stroke="var(--flow)" stroke-width="1.5"/>
        <text x="490" y="18" text-anchor="middle" class="title-text" fill="var(--flow)" style="font-size:12px;">THE ONE-MARKER PRINCIPLE (Monoflexion)</text>
        <text x="490" y="36" text-anchor="middle" class="subtitle-text" style="font-size:11px;">Case/gender information appears on the FIRST element that can carry it. If the article already signals it, the adjective relaxes.</text>
        <text x="490" y="50" text-anchor="middle" class="subtitle-text" style="font-size:11px;">If nothing else signals it, the adjective steps up. This one rule generates all three "tables."</text>
      </g>
    </svg>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background:var(--strong-bg);border-color:var(--strong);"></div> Strong (no article)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--weak-bg);border-color:var(--weak);"></div> Weak (after definite article)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--mixed-bg);border-color:var(--mixed);"></div> Mixed (after ein-word -- gap cells)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--flow-bg);border-color:var(--flow);"></div> Decision / algorithm</div>
  </div>

  <figcaption>
    <h2>Figure 3 -- The Adjective One-Marker Principle Flowchart</h2>
    <p>German adjective declension appears to require memorizing three separate tables (strong, weak, mixed) with 48 total cells. In reality, a single algorithm generates all three: case/gender information must appear exactly once in the noun phrase. If the article already carries a distinctive ending, the adjective relaxes to a minimal form (-e or -en). If there is no article, the adjective takes over with article-like endings. "Mixed" declension is simply the weak pattern with 3 cells swapped to strong -- the 3 cells where ein-words have no distinctive ending. One principle, three outputs, zero arbitrary memorization.</p>
  </figcaption>
</figure>
</body>
</html>
