<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Definite Article Declension: 16 Forms from 6 Shapes</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --accent: #4361ee; --accent-light: #e8edff;
    --c-der: #3b82f6; --c-der-bg: #dbeafe;
    --c-die: #ec4899; --c-die-bg: #fce7f3;
    --c-das: #f59e0b; --c-das-bg: #fef3c7;
    --c-den: #ef4444; --c-den-bg: #fee2e2;
    --c-dem: #22c55e; --c-dem-bg: #dcfce7;
    --c-des: #8b5cf6; --c-des-bg: #ede9fe;
    --gap: #f97316; --gap-bg: #fff7ed;
    --english: #64748b; --english-bg: #f1f5f9;
    --muted: #6c757d; --caption-bg: #f8f9fa;
    --header-bg: #e2e8f0;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a; --fg: #e8e8f0; --surface: #1a1a2e; --border: #2d2d44;
      --accent: #6b8aff; --accent-light: #1e2a4a;
      --c-der: #60a5fa; --c-der-bg: #1e3a5f;
      --c-die: #f472b6; --c-die-bg: #5c1a3a;
      --c-das: #fbbf24; --c-das-bg: #78350f;
      --c-den: #f87171; --c-den-bg: #5c1a1a;
      --c-dem: #4ade80; --c-dem-bg: #14532d;
      --c-des: #a78bfa; --c-des-bg: #3b1f7a;
      --gap: #fb923c; --gap-bg: #431407;
      --english: #94a3b8; --english-bg: #1e293b;
      --muted: #9a9ab0; --caption-bg: #1a1a2e;
      --header-bg: #2d2d44;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg); color: var(--fg);
    display: flex; justify-content: center; padding: 2rem 1rem; line-height: 1.6;
  }
  figure { max-width: 1100px; width: 100%; }
  .diagram-container {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 1.5rem 1rem; overflow-x: auto;
  }
  figcaption {
    text-align: center; margin-top: 1.5rem; padding: 1rem 1.5rem;
    background: var(--caption-bg); border-radius: 8px; border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  svg { display: block; margin: 0 auto; }
  .title-text { font: bold 14px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
  .subtitle-text { font: 11px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
  .box-text { font: 12px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
  .cell-text { font: 11px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
  .label-sm { font: 10px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
  .form-text { font: bold 18px 'Segoe UI', system-ui, sans-serif; }
  .big-num { font: bold 36px 'Segoe UI', system-ui, sans-serif; }
  .legend { display: flex; gap: 1.2rem; justify-content: center; flex-wrap: wrap; margin-top: 1rem; font-size: 0.82rem; color: var(--muted); }
  .legend-item { display: flex; align-items: center; gap: 0.4rem; }
  .legend-swatch { width: 14px; height: 14px; border-radius: 3px; border: 1px solid var(--border); }
</style>
</head>
<body>
<figure>
  <div class="diagram-container">
    <svg viewBox="0 0 1060 820" xmlns="http://www.w3.org/2000/svg" style="min-width:780px;">
      <text x="530" y="28" text-anchor="middle" class="title-text" style="font-size:16px;">The Definite Article: 16 Forms from Only 6 Unique Shapes</text>
      <text x="530" y="46" text-anchor="middle" class="subtitle-text">Color reveals massive syncretism -- identical forms serve multiple grammatical roles</text>

      <!-- ========== MAIN 4x4 GRID ========== -->
      <g transform="translate(60, 65)">
        <!-- Column headers -->
        <rect x="160" y="0" width="140" height="30" rx="5" fill="var(--header-bg)" stroke="var(--border)" stroke-width="1"/>
        <text x="230" y="20" text-anchor="middle" class="box-text" style="font-weight:bold;">Masculine</text>
        <rect x="310" y="0" width="140" height="30" rx="5" fill="var(--header-bg)" stroke="var(--border)" stroke-width="1"/>
        <text x="380" y="20" text-anchor="middle" class="box-text" style="font-weight:bold;">Feminine</text>
        <rect x="460" y="0" width="140" height="30" rx="5" fill="var(--header-bg)" stroke="var(--border)" stroke-width="1"/>
        <text x="530" y="20" text-anchor="middle" class="box-text" style="font-weight:bold;">Neuter</text>
        <rect x="610" y="0" width="140" height="30" rx="5" fill="var(--header-bg)" stroke="var(--border)" stroke-width="1"/>
        <text x="680" y="20" text-anchor="middle" class="box-text" style="font-weight:bold;">Plural</text>

        <!-- Row headers -->
        <rect x="0" y="40" width="150" height="55" rx="5" fill="var(--header-bg)" stroke="var(--border)" stroke-width="1"/>
        <text x="75" y="63" text-anchor="middle" class="box-text" style="font-weight:bold;">Nominative</text>
        <text x="75" y="78" text-anchor="middle" class="label-sm">Subject</text>

        <rect x="0" y="105" width="150" height="55" rx="5" fill="var(--header-bg)" stroke="var(--border)" stroke-width="1"/>
        <text x="75" y="128" text-anchor="middle" class="box-text" style="font-weight:bold;">Accusative</text>
        <text x="75" y="143" text-anchor="middle" class="label-sm">Direct Object</text>

        <rect x="0" y="170" width="150" height="55" rx="5" fill="var(--header-bg)" stroke="var(--border)" stroke-width="1"/>
        <text x="75" y="193" text-anchor="middle" class="box-text" style="font-weight:bold;">Dative</text>
        <text x="75" y="208" text-anchor="middle" class="label-sm">Indirect Object</text>

        <rect x="0" y="235" width="150" height="55" rx="5" fill="var(--header-bg)" stroke="var(--border)" stroke-width="1"/>
        <text x="75" y="258" text-anchor="middle" class="box-text" style="font-weight:bold;">Genitive</text>
        <text x="75" y="273" text-anchor="middle" class="label-sm">Possession</text>

        <!-- NOM row -->
        <rect x="160" y="40" width="140" height="55" rx="5" fill="var(--c-der-bg)" stroke="var(--c-der)" stroke-width="2"/>
        <text x="230" y="72" text-anchor="middle" class="form-text" fill="var(--c-der)">der</text>

        <rect x="310" y="40" width="140" height="55" rx="5" fill="var(--c-die-bg)" stroke="var(--c-die)" stroke-width="2"/>
        <text x="380" y="72" text-anchor="middle" class="form-text" fill="var(--c-die)">die</text>

        <rect x="460" y="40" width="140" height="55" rx="5" fill="var(--c-das-bg)" stroke="var(--c-das)" stroke-width="2"/>
        <text x="530" y="72" text-anchor="middle" class="form-text" fill="var(--c-das)">das</text>

        <rect x="610" y="40" width="140" height="55" rx="5" fill="var(--c-die-bg)" stroke="var(--c-die)" stroke-width="2"/>
        <text x="680" y="72" text-anchor="middle" class="form-text" fill="var(--c-die)">die</text>

        <!-- ACC row -->
        <rect x="160" y="105" width="140" height="55" rx="5" fill="var(--c-den-bg)" stroke="var(--c-den)" stroke-width="2"/>
        <text x="230" y="137" text-anchor="middle" class="form-text" fill="var(--c-den)">den</text>

        <rect x="310" y="105" width="140" height="55" rx="5" fill="var(--c-die-bg)" stroke="var(--c-die)" stroke-width="2"/>
        <text x="380" y="137" text-anchor="middle" class="form-text" fill="var(--c-die)">die</text>

        <rect x="460" y="105" width="140" height="55" rx="5" fill="var(--c-das-bg)" stroke="var(--c-das)" stroke-width="2"/>
        <text x="530" y="137" text-anchor="middle" class="form-text" fill="var(--c-das)">das</text>

        <rect x="610" y="105" width="140" height="55" rx="5" fill="var(--c-die-bg)" stroke="var(--c-die)" stroke-width="2"/>
        <text x="680" y="137" text-anchor="middle" class="form-text" fill="var(--c-die)">die</text>

        <!-- DAT row -->
        <rect x="160" y="170" width="140" height="55" rx="5" fill="var(--c-dem-bg)" stroke="var(--c-dem)" stroke-width="2"/>
        <text x="230" y="202" text-anchor="middle" class="form-text" fill="var(--c-dem)">dem</text>

        <rect x="310" y="170" width="140" height="55" rx="5" fill="var(--c-der-bg)" stroke="var(--c-der)" stroke-width="2"/>
        <text x="380" y="202" text-anchor="middle" class="form-text" fill="var(--c-der)">der</text>

        <rect x="460" y="170" width="140" height="55" rx="5" fill="var(--c-dem-bg)" stroke="var(--c-dem)" stroke-width="2"/>
        <text x="530" y="202" text-anchor="middle" class="form-text" fill="var(--c-dem)">dem</text>

        <rect x="610" y="170" width="140" height="55" rx="5" fill="var(--c-den-bg)" stroke="var(--c-den)" stroke-width="2"/>
        <text x="680" y="202" text-anchor="middle" class="form-text" fill="var(--c-den)">den</text>

        <!-- GEN row -->
        <rect x="160" y="235" width="140" height="55" rx="5" fill="var(--c-des-bg)" stroke="var(--c-des)" stroke-width="2"/>
        <text x="230" y="267" text-anchor="middle" class="form-text" fill="var(--c-des)">des</text>

        <rect x="310" y="235" width="140" height="55" rx="5" fill="var(--c-der-bg)" stroke="var(--c-der)" stroke-width="2"/>
        <text x="380" y="267" text-anchor="middle" class="form-text" fill="var(--c-der)">der</text>

        <rect x="460" y="235" width="140" height="55" rx="5" fill="var(--c-des-bg)" stroke="var(--c-des)" stroke-width="2"/>
        <text x="530" y="267" text-anchor="middle" class="form-text" fill="var(--c-des)">des</text>

        <rect x="610" y="235" width="140" height="55" rx="5" fill="var(--c-der-bg)" stroke="var(--c-der)" stroke-width="2"/>
        <text x="680" y="267" text-anchor="middle" class="form-text" fill="var(--c-der)">der</text>
      </g>

      <!-- ========== ANNOTATIONS (right side) ========== -->
      <g transform="translate(830, 105)">
        <text x="0" y="12" text-anchor="start" class="cell-text" fill="var(--c-die)" style="font-weight:bold;">die &#xD7;4</text>
        <text x="0" y="26" text-anchor="start" class="label-sm">Fem nom/acc = Pl nom/acc</text>

        <text x="0" y="55" text-anchor="start" class="cell-text" fill="var(--c-den)" style="font-weight:bold;">Only masc changes</text>
        <text x="0" y="69" text-anchor="start" class="label-sm">in accusative: der &#x2192; den</text>

        <text x="0" y="105" text-anchor="start" class="cell-text" fill="var(--c-dem)" style="font-weight:bold;">Dative "m" signature</text>
        <text x="0" y="119" text-anchor="start" class="label-sm">dem (M/N merge)</text>

        <text x="0" y="155" text-anchor="start" class="cell-text" fill="var(--c-des)" style="font-weight:bold;">Genitive "s" signature</text>
        <text x="0" y="169" text-anchor="start" class="label-sm">des (M/N merge)</text>

        <text x="0" y="205" text-anchor="start" class="cell-text" fill="var(--c-der)" style="font-weight:bold;">der &#xD7;3</text>
        <text x="0" y="219" text-anchor="start" class="label-sm">Masc nom, Fem dat/gen,</text>
        <text x="0" y="233" text-anchor="start" class="label-sm">Pl gen</text>
      </g>

      <!-- ========== 6 UNIQUE FORMS SUMMARY ========== -->
      <g transform="translate(60, 380)">
        <rect x="0" y="0" width="940" height="80" rx="10" fill="var(--accent-light)" stroke="var(--accent)" stroke-width="1.5"/>
        <text x="470" y="22" text-anchor="middle" class="title-text" fill="var(--accent)">Only 6 Unique Forms in the Entire 16-Cell Paradigm</text>

        <rect x="40" y="36" width="100" height="32" rx="6" fill="var(--c-der-bg)" stroke="var(--c-der)" stroke-width="2"/>
        <text x="90" y="57" text-anchor="middle" class="form-text" fill="var(--c-der)" style="font-size:15px;">der</text>

        <rect x="160" y="36" width="100" height="32" rx="6" fill="var(--c-die-bg)" stroke="var(--c-die)" stroke-width="2"/>
        <text x="210" y="57" text-anchor="middle" class="form-text" fill="var(--c-die)" style="font-size:15px;">die</text>

        <rect x="280" y="36" width="100" height="32" rx="6" fill="var(--c-das-bg)" stroke="var(--c-das)" stroke-width="2"/>
        <text x="330" y="57" text-anchor="middle" class="form-text" fill="var(--c-das)" style="font-size:15px;">das</text>

        <rect x="400" y="36" width="100" height="32" rx="6" fill="var(--c-den-bg)" stroke="var(--c-den)" stroke-width="2"/>
        <text x="450" y="57" text-anchor="middle" class="form-text" fill="var(--c-den)" style="font-size:15px;">den</text>

        <rect x="520" y="36" width="100" height="32" rx="6" fill="var(--c-dem-bg)" stroke="var(--c-dem)" stroke-width="2"/>
        <text x="570" y="57" text-anchor="middle" class="form-text" fill="var(--c-dem)" style="font-size:15px;">dem</text>

        <rect x="640" y="36" width="100" height="32" rx="6" fill="var(--c-des-bg)" stroke="var(--c-des)" stroke-width="2"/>
        <text x="690" y="57" text-anchor="middle" class="form-text" fill="var(--c-des)" style="font-size:15px;">des</text>

        <text x="800" y="46" text-anchor="start" class="big-num" fill="var(--accent)" style="font-size:28px;">6</text>
        <text x="830" y="46" text-anchor="start" class="box-text" fill="var(--accent)"> forms fill</text>
        <text x="800" y="66" text-anchor="start" class="big-num" fill="var(--accent)" style="font-size:28px;">16</text>
        <text x="835" y="66" text-anchor="start" class="box-text" fill="var(--accent)"> cells</text>
      </g>

      <!-- ========== RECOGNITION SHORTCUTS ========== -->
      <g transform="translate(60, 480)">
        <rect x="0" y="0" width="940" height="150" rx="10" fill="var(--surface)" stroke="var(--border)" stroke-width="1"/>
        <text x="470" y="24" text-anchor="middle" class="title-text" fill="var(--accent)">Pattern-Recognition Shortcuts</text>

        <!-- Shortcut 1 -->
        <rect x="20" y="40" width="280" height="45" rx="6" fill="var(--c-die-bg)" stroke="var(--c-die)" stroke-width="1"/>
        <text x="160" y="58" text-anchor="middle" class="cell-text" style="font-weight:bold;" fill="var(--c-die)">Feminine = Plural (nom/acc)</text>
        <text x="160" y="75" text-anchor="middle" class="label-sm">"die" does double duty in 4 cells</text>

        <!-- Shortcut 2 -->
        <rect x="320" y="40" width="290" height="45" rx="6" fill="var(--c-den-bg)" stroke="var(--c-den)" stroke-width="1"/>
        <text x="465" y="58" text-anchor="middle" class="cell-text" style="font-weight:bold;" fill="var(--c-den)">Only masc. changes NOM &#x2192; ACC</text>
        <text x="465" y="75" text-anchor="middle" class="label-sm">der &#x2192; den; all others stay the same</text>

        <!-- Shortcut 3 -->
        <rect x="630" y="40" width="290" height="45" rx="6" fill="var(--c-dem-bg)" stroke="var(--c-dem)" stroke-width="1"/>
        <text x="775" y="58" text-anchor="middle" class="cell-text" style="font-weight:bold;" fill="var(--c-dem)">Dative = "m" (dem/dem)</text>
        <text x="775" y="75" text-anchor="middle" class="label-sm">Masc and Neuter merge in dative</text>

        <!-- Shortcut 4 -->
        <rect x="20" y="96" width="280" height="45" rx="6" fill="var(--c-des-bg)" stroke="var(--c-des)" stroke-width="1"/>
        <text x="160" y="114" text-anchor="middle" class="cell-text" style="font-weight:bold;" fill="var(--c-des)">Genitive = "s" (des/des)</text>
        <text x="160" y="131" text-anchor="middle" class="label-sm">Masc and Neuter merge in genitive too</text>

        <!-- Shortcut 5 -->
        <rect x="320" y="96" width="600" height="45" rx="6" fill="var(--c-der-bg)" stroke="var(--c-der)" stroke-width="1"/>
        <text x="620" y="114" text-anchor="middle" class="cell-text" style="font-weight:bold;" fill="var(--c-der)">Masculine/Neuter merge everywhere except nominative</text>
        <text x="620" y="131" text-anchor="middle" class="label-sm">Once you leave the nominative, masc and neut behave almost identically: den/das &#x2192; dem/dem &#x2192; des/des</text>
      </g>

      <!-- ========== ENGLISH COMPARISON ========== -->
      <g transform="translate(60, 650)">
        <rect x="0" y="0" width="940" height="75" rx="10" fill="var(--english-bg)" stroke="var(--english)" stroke-width="1.5"/>
        <text x="470" y="22" text-anchor="middle" class="title-text" fill="var(--english)">English Comparison: 16 Forms &#x2192; 1</text>
        <text x="100" y="48" text-anchor="start" class="box-text" fill="var(--fg)">English "the" is completely invariable for case, gender, and number.</text>
        <text x="100" y="64" text-anchor="start" class="cell-text" fill="var(--english)">Old English had a full paradigm (se/seo/&#xFE;&#xE6;t + case forms) nearly identical to modern German. All 16 forms collapsed into one word: "the."</text>

        <!-- Single THE box -->
        <rect x="20" y="36" width="60" height="30" rx="6" fill="var(--english-bg)" stroke="var(--english)" stroke-width="2"/>
        <text x="50" y="56" text-anchor="middle" class="form-text" fill="var(--english)" style="font-size:15px;">the</text>
      </g>

      <!-- ========== EIN-WORD GAP NOTE ========== -->
      <g transform="translate(60, 745)">
        <rect x="0" y="0" width="940" height="55" rx="8" fill="var(--gap-bg)" stroke="var(--gap)" stroke-width="1.5"/>
        <text x="470" y="18" text-anchor="middle" class="title-text" fill="var(--gap)" style="font-size:12px;">THE EIN-WORD GAP</text>
        <text x="470" y="35" text-anchor="middle" class="subtitle-text" style="font-size:11px;">The indefinite article "ein" lacks a distinctive ending in 3 cells (masc nom, neut nom, neut acc) -- all are just "ein."</text>
        <text x="470" y="48" text-anchor="middle" class="subtitle-text" style="font-size:11px;">In these 3 cells, the adjective must compensate with a strong ending. This is the entire basis of "mixed" declension.</text>
      </g>
    </svg>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background:var(--c-der-bg);border-color:var(--c-der);"></div> der (&#xD7;3)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--c-die-bg);border-color:var(--c-die);"></div> die (&#xD7;4)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--c-das-bg);border-color:var(--c-das);"></div> das (&#xD7;2)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--c-den-bg);border-color:var(--c-den);"></div> den (&#xD7;2)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--c-dem-bg);border-color:var(--c-dem);"></div> dem (&#xD7;2)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--c-des-bg);border-color:var(--c-des);"></div> des (&#xD7;2)</div>
  </div>

  <figcaption>
    <h2>Figure 2 -- Definite Article Declension: 16 Forms from 6 Shapes</h2>
    <p>The German definite article "the" inflects across 4 cases and 4 columns (masculine, feminine, neuter, plural), producing a 16-cell paradigm. But color-coding reveals massive syncretism: only 6 unique forms (der, die, das, den, dem, des) fill all 16 slots. Key recognition shortcuts: "die" covers all feminine and plural nom/acc cells; only masculine changes from nominative to accusative; dative is always recognizable by its "m" (dem); genitive by its "s" (des); and masculine/neuter merge in every case except nominative. English collapsed this entire system into the single invariable word "the."</p>
  </figcaption>
</figure>
</body>
</html>
