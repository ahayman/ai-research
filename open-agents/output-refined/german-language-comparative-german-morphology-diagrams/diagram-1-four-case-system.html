<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Four-Case System Overview</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --accent: #4361ee; --accent-light: #e8edff;
    --nom: #3b82f6; --nom-bg: #dbeafe;
    --acc: #ef4444; --acc-bg: #fee2e2;
    --dat: #22c55e; --dat-bg: #dcfce7;
    --gen: #f59e0b; --gen-bg: #fef3c7;
    --english: #8b5cf6; --english-bg: #ede9fe;
    --muted: #6c757d; --caption-bg: #f8f9fa;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a; --fg: #e8e8f0; --surface: #1a1a2e; --border: #2d2d44;
      --accent: #6b8aff; --accent-light: #1e2a4a;
      --nom: #60a5fa; --nom-bg: #1e3a5f;
      --acc: #f87171; --acc-bg: #5c1a1a;
      --dat: #4ade80; --dat-bg: #14532d;
      --gen: #fbbf24; --gen-bg: #78350f;
      --english: #a78bfa; --english-bg: #3b1f7a;
      --muted: #9a9ab0; --caption-bg: #1a1a2e;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg); color: var(--fg);
    display: flex; justify-content: center; padding: 2rem 1rem; line-height: 1.6;
  }
  figure { max-width: 1100px; width: 100%; }
  .diagram-container {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 1.5rem 1rem; overflow-x: auto;
  }
  figcaption {
    text-align: center; margin-top: 1.5rem; padding: 1rem 1.5rem;
    background: var(--caption-bg); border-radius: 8px; border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  svg { display: block; margin: 0 auto; }
  .title-text { font: bold 14px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
  .subtitle-text { font: 11px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
  .box-text { font: 12px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
  .cell-text { font: 11px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
  .label-sm { font: 10px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
  .word-lg { font: bold 15px 'Segoe UI', system-ui, sans-serif; }
  .legend { display: flex; gap: 1.5rem; justify-content: center; flex-wrap: wrap; margin-top: 1rem; font-size: 0.82rem; color: var(--muted); }
  .legend-item { display: flex; align-items: center; gap: 0.4rem; }
  .legend-swatch { width: 14px; height: 14px; border-radius: 3px; border: 1px solid var(--border); }
</style>
</head>
<body>
<figure>
  <div class="diagram-container">
    <svg viewBox="0 0 1060 740" xmlns="http://www.w3.org/2000/svg" style="min-width:780px;">
      <text x="530" y="28" text-anchor="middle" class="title-text" style="font-size:16px;">The Four-Case System: How German Marks Grammatical Role</text>
      <text x="530" y="46" text-anchor="middle" class="subtitle-text">Case markers on articles tell you who does what to whom -- freeing word order for emphasis</text>

      <!-- ========== CENTRAL HUB ========== -->
      <rect x="390" y="65" width="280" height="50" rx="25" fill="var(--accent-light)" stroke="var(--accent)" stroke-width="2"/>
      <text x="530" y="87" text-anchor="middle" class="title-text" fill="var(--accent)" style="font-size:13px;">CASE = Grammatical Role Marker</text>
      <text x="530" y="102" text-anchor="middle" class="label-sm" fill="var(--accent)">Encoded on articles, adjectives, pronouns</text>

      <!-- Connecting lines from hub to four cases -->
      <line x1="430" y1="115" x2="260" y2="160" stroke="var(--nom)" stroke-width="2" stroke-dasharray="4,3"/>
      <line x1="530" y1="115" x2="530" y2="160" stroke="var(--acc)" stroke-width="2" stroke-dasharray="4,3"/>
      <line x1="630" y1="115" x2="800" y2="160" stroke="var(--dat)" stroke-width="2" stroke-dasharray="4,3"/>
      <line x1="530" y1="115" x2="530" y2="385" stroke="var(--gen)" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.4"/>

      <!-- ========== NOMINATIVE ========== -->
      <g transform="translate(40, 160)">
        <rect x="0" y="0" width="260" height="130" rx="10" fill="var(--nom-bg)" stroke="var(--nom)" stroke-width="2"/>
        <text x="130" y="24" text-anchor="middle" class="title-text" fill="var(--nom)">NOMINATIVE</text>
        <text x="130" y="40" text-anchor="middle" class="label-sm" fill="var(--nom)">Werfall -- "Who-case"</text>
        <line x1="20" y1="48" x2="240" y2="48" stroke="var(--nom)" stroke-width="0.5" opacity="0.4"/>
        <text x="130" y="64" text-anchor="middle" class="box-text" style="font-weight:bold;">Subject (the doer)</text>
        <text x="130" y="80" text-anchor="middle" class="label-sm">Question: Wer? Was?</text>
        <text x="20" y="100" text-anchor="start" class="cell-text"><tspan font-weight="bold" fill="var(--nom)">Der Hund</tspan> bei&#xDF;t den Mann.</text>
        <text x="20" y="116" text-anchor="start" class="label-sm">The dog bites the man.</text>
      </g>

      <!-- ========== ACCUSATIVE ========== -->
      <g transform="translate(320, 160)">
        <rect x="0" y="0" width="260" height="130" rx="10" fill="var(--acc-bg)" stroke="var(--acc)" stroke-width="2"/>
        <text x="130" y="24" text-anchor="middle" class="title-text" fill="var(--acc)">ACCUSATIVE</text>
        <text x="130" y="40" text-anchor="middle" class="label-sm" fill="var(--acc)">Wenfall -- "Whom-case"</text>
        <line x1="20" y1="48" x2="240" y2="48" stroke="var(--acc)" stroke-width="0.5" opacity="0.4"/>
        <text x="130" y="64" text-anchor="middle" class="box-text" style="font-weight:bold;">Direct Object (receiver)</text>
        <text x="130" y="80" text-anchor="middle" class="label-sm">Question: Wen? Was?</text>
        <text x="20" y="100" text-anchor="start" class="cell-text">Der Hund bei&#xDF;t <tspan font-weight="bold" fill="var(--acc)">den Mann</tspan>.</text>
        <text x="20" y="116" text-anchor="start" class="label-sm">The dog bites the man.</text>
      </g>

      <!-- ========== DATIVE ========== -->
      <g transform="translate(600, 160)">
        <rect x="0" y="0" width="260" height="130" rx="10" fill="var(--dat-bg)" stroke="var(--dat)" stroke-width="2"/>
        <text x="130" y="24" text-anchor="middle" class="title-text" fill="var(--dat)">DATIVE</text>
        <text x="130" y="40" text-anchor="middle" class="label-sm" fill="var(--dat)">Wemfall -- "To-whom-case"</text>
        <line x1="20" y1="48" x2="240" y2="48" stroke="var(--dat)" stroke-width="0.5" opacity="0.4"/>
        <text x="130" y="64" text-anchor="middle" class="box-text" style="font-weight:bold;">Indirect Object (recipient)</text>
        <text x="130" y="80" text-anchor="middle" class="label-sm">Question: Wem?</text>
        <text x="20" y="100" text-anchor="start" class="cell-text">Ich gebe <tspan font-weight="bold" fill="var(--dat)">dem Kind</tspan> ein Buch.</text>
        <text x="20" y="116" text-anchor="start" class="label-sm">I give the child a book.</text>
      </g>

      <!-- ========== GENITIVE (bottom center) ========== -->
      <g transform="translate(320, 310)">
        <rect x="0" y="0" width="260" height="130" rx="10" fill="var(--gen-bg)" stroke="var(--gen)" stroke-width="2"/>
        <text x="130" y="24" text-anchor="middle" class="title-text" fill="var(--gen)">GENITIVE</text>
        <text x="130" y="40" text-anchor="middle" class="label-sm" fill="var(--gen)">Wesfall -- "Whose-case"</text>
        <line x1="20" y1="48" x2="240" y2="48" stroke="var(--gen)" stroke-width="0.5" opacity="0.4"/>
        <text x="130" y="64" text-anchor="middle" class="box-text" style="font-weight:bold;">Possession (whose?)</text>
        <text x="130" y="80" text-anchor="middle" class="label-sm">Question: Wessen?</text>
        <text x="20" y="100" text-anchor="start" class="cell-text">Das Buch <tspan font-weight="bold" fill="var(--gen)">des Lehrers</tspan></text>
        <text x="20" y="116" text-anchor="start" class="label-sm">The teacher's book</text>
      </g>

      <!-- ========== WORD ORDER DEMONSTRATION ========== -->
      <g transform="translate(30, 465)">
        <rect x="0" y="0" width="1000" height="130" rx="10" fill="var(--surface)" stroke="var(--border)" stroke-width="1.5"/>
        <text x="500" y="24" text-anchor="middle" class="title-text" fill="var(--accent)">Case Markers Free Word Order</text>
        <text x="500" y="40" text-anchor="middle" class="label-sm">The same meaning, three different word orders -- cases keep the roles unambiguous</text>

        <!-- Sentence 1: SVO -->
        <text x="30" y="65" text-anchor="start" class="cell-text" style="font-weight:bold;">SVO:</text>
        <text x="80" y="65" text-anchor="start" class="word-lg" fill="var(--nom)">Der Hund</text>
        <text x="174" y="65" text-anchor="start" class="word-lg" fill="var(--fg)"> bei&#xDF;t </text>
        <text x="228" y="65" text-anchor="start" class="word-lg" fill="var(--acc)">den Mann.</text>
        <text x="370" y="65" text-anchor="start" class="label-sm">Neutral emphasis</text>

        <!-- Sentence 2: OVS -->
        <text x="30" y="90" text-anchor="start" class="cell-text" style="font-weight:bold;">OVS:</text>
        <text x="80" y="90" text-anchor="start" class="word-lg" fill="var(--acc)">Den Mann</text>
        <text x="178" y="90" text-anchor="start" class="word-lg" fill="var(--fg)"> bei&#xDF;t </text>
        <text x="232" y="90" text-anchor="start" class="word-lg" fill="var(--nom)">der Hund.</text>
        <text x="370" y="90" text-anchor="start" class="label-sm">Emphasis on "the man" -- SAME meaning</text>

        <!-- Equals sign -->
        <text x="500" y="78" text-anchor="middle" class="title-text" fill="var(--accent)" style="font-size:22px;">=</text>

        <!-- English contrast -->
        <rect x="540" y="50" width="440" height="68" rx="8" fill="var(--english-bg)" stroke="var(--english)" stroke-width="1.5"/>
        <text x="760" y="70" text-anchor="middle" class="title-text" fill="var(--english)" style="font-size:12px;">English: Word Order = Meaning</text>
        <text x="570" y="90" text-anchor="start" class="cell-text">"The dog bites the man" &#x2260; "The man bites the dog"</text>
        <text x="570" y="106" text-anchor="start" class="label-sm" fill="var(--english)">No case markers -- rearranging changes WHO is biting</text>
      </g>

      <!-- ========== ARTICLE QUICK REFERENCE ========== -->
      <g transform="translate(30, 615)">
        <rect x="0" y="0" width="1000" height="110" rx="10" fill="var(--accent-light)" stroke="var(--accent)" stroke-width="1.5"/>
        <text x="500" y="22" text-anchor="middle" class="title-text" fill="var(--accent)">Quick Reference: "der Mann" (the man, masculine) Across All Four Cases</text>

        <!-- Four article forms -->
        <rect x="60" y="38" width="180" height="55" rx="8" fill="var(--nom-bg)" stroke="var(--nom)" stroke-width="2"/>
        <text x="150" y="58" text-anchor="middle" class="word-lg" fill="var(--nom)">der Mann</text>
        <text x="150" y="76" text-anchor="middle" class="label-sm" fill="var(--nom)">NOMINATIVE</text>
        <text x="150" y="88" text-anchor="middle" class="label-sm">subject</text>

        <rect x="280" y="38" width="180" height="55" rx="8" fill="var(--acc-bg)" stroke="var(--acc)" stroke-width="2"/>
        <text x="370" y="58" text-anchor="middle" class="word-lg" fill="var(--acc)">den Mann</text>
        <text x="370" y="76" text-anchor="middle" class="label-sm" fill="var(--acc)">ACCUSATIVE</text>
        <text x="370" y="88" text-anchor="middle" class="label-sm">direct object</text>

        <rect x="500" y="38" width="180" height="55" rx="8" fill="var(--dat-bg)" stroke="var(--dat)" stroke-width="2"/>
        <text x="590" y="58" text-anchor="middle" class="word-lg" fill="var(--dat)">dem Mann</text>
        <text x="590" y="76" text-anchor="middle" class="label-sm" fill="var(--dat)">DATIVE</text>
        <text x="590" y="88" text-anchor="middle" class="label-sm">indirect object</text>

        <rect x="720" y="38" width="220" height="55" rx="8" fill="var(--gen-bg)" stroke="var(--gen)" stroke-width="2"/>
        <text x="830" y="58" text-anchor="middle" class="word-lg" fill="var(--gen)">des Mannes</text>
        <text x="830" y="76" text-anchor="middle" class="label-sm" fill="var(--gen)">GENITIVE</text>
        <text x="830" y="88" text-anchor="middle" class="label-sm">possession</text>
      </g>
    </svg>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background:var(--nom-bg);border-color:var(--nom);"></div> Nominative (subject)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--acc-bg);border-color:var(--acc);"></div> Accusative (direct object)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--dat-bg);border-color:var(--dat);"></div> Dative (indirect object)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--gen-bg);border-color:var(--gen);"></div> Genitive (possession)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--english-bg);border-color:var(--english);"></div> English comparison</div>
  </div>

  <figcaption>
    <h2>Figure 1 -- The Four-Case System Overview</h2>
    <p>German uses four grammatical cases -- Nominative, Accusative, Dative, and Genitive -- to mark the role of each noun phrase in a sentence. These markers appear on articles (der/den/dem/des), adjectives, and pronouns, encoding "who does what to whom" directly into the word forms. Because the articles carry this information, German can freely reorder its sentences for emphasis without changing meaning. English lost this system during the Middle English period and compensated by making word order rigidly fixed: rearranging an English sentence changes its meaning entirely.</p>
  </figcaption>
</figure>
</body>
</html>
