<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Preposition Case Government Chart</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --accent: #4361ee; --accent-light: #e8edff;
    --acc: #ef4444; --acc-bg: #fee2e2;
    --dat: #22c55e; --dat-bg: #dcfce7;
    --two: #8b5cf6; --two-bg: #ede9fe;
    --gen: #f59e0b; --gen-bg: #fef3c7;
    --motion: #f97316; --motion-bg: #fff7ed;
    --location: #06b6d4; --location-bg: #cffafe;
    --english: #64748b; --english-bg: #f1f5f9;
    --muted: #6c757d; --caption-bg: #f8f9fa;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a; --fg: #e8e8f0; --surface: #1a1a2e; --border: #2d2d44;
      --accent: #6b8aff; --accent-light: #1e2a4a;
      --acc: #f87171; --acc-bg: #5c1a1a;
      --dat: #4ade80; --dat-bg: #14532d;
      --two: #a78bfa; --two-bg: #3b1f7a;
      --gen: #fbbf24; --gen-bg: #78350f;
      --motion: #fb923c; --motion-bg: #431407;
      --location: #22d3ee; --location-bg: #0c3d4a;
      --english: #94a3b8; --english-bg: #1e293b;
      --muted: #9a9ab0; --caption-bg: #1a1a2e;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg); color: var(--fg);
    display: flex; justify-content: center; padding: 2rem 1rem; line-height: 1.6;
  }
  figure { max-width: 1100px; width: 100%; }
  .diagram-container {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 1.5rem 1rem; overflow-x: auto;
  }
  figcaption {
    text-align: center; margin-top: 1.5rem; padding: 1rem 1.5rem;
    background: var(--caption-bg); border-radius: 8px; border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  svg { display: block; margin: 0 auto; }
  .title-text { font: bold 14px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
  .subtitle-text { font: 11px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
  .box-text { font: 12px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
  .cell-text { font: 11px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
  .label-sm { font: 10px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
  .prep-text { font: bold 14px 'Segoe UI', system-ui, sans-serif; }
  .legend { display: flex; gap: 1.5rem; justify-content: center; flex-wrap: wrap; margin-top: 1rem; font-size: 0.82rem; color: var(--muted); }
  .legend-item { display: flex; align-items: center; gap: 0.4rem; }
  .legend-swatch { width: 14px; height: 14px; border-radius: 3px; border: 1px solid var(--border); }
</style>
</head>
<body>
<figure>
  <div class="diagram-container">
    <svg viewBox="0 0 1060 850" xmlns="http://www.w3.org/2000/svg" style="min-width:780px;">
      <text x="530" y="28" text-anchor="middle" class="title-text" style="font-size:16px;">Preposition Case Government: Every Preposition Demands a Case</text>
      <text x="530" y="46" text-anchor="middle" class="subtitle-text">Three fixed categories + the elegant two-way system for motion vs. location</text>

      <!-- ========== ACCUSATIVE ZONE ========== -->
      <g transform="translate(30, 65)">
        <rect x="0" y="0" width="300" height="245" rx="10" fill="var(--acc-bg)" stroke="var(--acc)" stroke-width="2"/>
        <text x="150" y="24" text-anchor="middle" class="title-text" fill="var(--acc)">ACCUSATIVE</text>
        <text x="150" y="40" text-anchor="middle" class="label-sm" fill="var(--acc)">Always accusative object</text>

        <!-- Prepositions -->
        <rect x="20" y="52" width="120" height="30" rx="6" fill="var(--surface)" stroke="var(--acc)" stroke-width="1.5"/>
        <text x="80" y="72" text-anchor="middle" class="prep-text" fill="var(--acc)">durch</text>
        <text x="155" y="72" text-anchor="start" class="cell-text">through</text>

        <rect x="20" y="88" width="120" height="30" rx="6" fill="var(--surface)" stroke="var(--acc)" stroke-width="1.5"/>
        <text x="80" y="108" text-anchor="middle" class="prep-text" fill="var(--acc)">f&#xFC;r</text>
        <text x="155" y="108" text-anchor="start" class="cell-text">for</text>

        <rect x="20" y="124" width="120" height="30" rx="6" fill="var(--surface)" stroke="var(--acc)" stroke-width="1.5"/>
        <text x="80" y="144" text-anchor="middle" class="prep-text" fill="var(--acc)">gegen</text>
        <text x="155" y="144" text-anchor="start" class="cell-text">against</text>

        <rect x="20" y="160" width="120" height="30" rx="6" fill="var(--surface)" stroke="var(--acc)" stroke-width="1.5"/>
        <text x="80" y="180" text-anchor="middle" class="prep-text" fill="var(--acc)">ohne</text>
        <text x="155" y="180" text-anchor="start" class="cell-text">without</text>

        <rect x="20" y="196" width="120" height="30" rx="6" fill="var(--surface)" stroke="var(--acc)" stroke-width="1.5"/>
        <text x="80" y="216" text-anchor="middle" class="prep-text" fill="var(--acc)">um</text>
        <text x="155" y="216" text-anchor="start" class="cell-text">around / at</text>
      </g>

      <!-- ========== DATIVE ZONE ========== -->
      <g transform="translate(730, 65)">
        <rect x="0" y="0" width="300" height="285" rx="10" fill="var(--dat-bg)" stroke="var(--dat)" stroke-width="2"/>
        <text x="150" y="24" text-anchor="middle" class="title-text" fill="var(--dat)">DATIVE</text>
        <text x="150" y="40" text-anchor="middle" class="label-sm" fill="var(--dat)">Always dative object</text>

        <rect x="20" y="52" width="100" height="26" rx="5" fill="var(--surface)" stroke="var(--dat)" stroke-width="1.5"/>
        <text x="70" y="70" text-anchor="middle" class="prep-text" fill="var(--dat)" style="font-size:12px;">aus</text>
        <text x="130" y="70" text-anchor="start" class="cell-text">from / out of</text>

        <rect x="20" y="82" width="100" height="26" rx="5" fill="var(--surface)" stroke="var(--dat)" stroke-width="1.5"/>
        <text x="70" y="100" text-anchor="middle" class="prep-text" fill="var(--dat)" style="font-size:12px;">au&#xDF;er</text>
        <text x="130" y="100" text-anchor="start" class="cell-text">except</text>

        <rect x="20" y="112" width="100" height="26" rx="5" fill="var(--surface)" stroke="var(--dat)" stroke-width="1.5"/>
        <text x="70" y="130" text-anchor="middle" class="prep-text" fill="var(--dat)" style="font-size:12px;">bei</text>
        <text x="130" y="130" text-anchor="start" class="cell-text">at / near</text>

        <rect x="20" y="142" width="100" height="26" rx="5" fill="var(--surface)" stroke="var(--dat)" stroke-width="1.5"/>
        <text x="70" y="160" text-anchor="middle" class="prep-text" fill="var(--dat)" style="font-size:12px;">mit</text>
        <text x="130" y="160" text-anchor="start" class="cell-text">with</text>

        <rect x="20" y="172" width="100" height="26" rx="5" fill="var(--surface)" stroke="var(--dat)" stroke-width="1.5"/>
        <text x="70" y="190" text-anchor="middle" class="prep-text" fill="var(--dat)" style="font-size:12px;">nach</text>
        <text x="130" y="190" text-anchor="start" class="cell-text">after / to</text>

        <rect x="20" y="202" width="100" height="26" rx="5" fill="var(--surface)" stroke="var(--dat)" stroke-width="1.5"/>
        <text x="70" y="220" text-anchor="middle" class="prep-text" fill="var(--dat)" style="font-size:12px;">seit</text>
        <text x="130" y="220" text-anchor="start" class="cell-text">since</text>

        <rect x="20" y="232" width="100" height="26" rx="5" fill="var(--surface)" stroke="var(--dat)" stroke-width="1.5"/>
        <text x="70" y="250" text-anchor="middle" class="prep-text" fill="var(--dat)" style="font-size:12px;">von</text>
        <text x="130" y="250" text-anchor="start" class="cell-text">from / of</text>

        <rect x="20" y="252" width="100" height="26" rx="5" fill="var(--surface)" stroke="var(--dat)" stroke-width="1.5"/>
        <text x="70" y="270" text-anchor="middle" class="prep-text" fill="var(--dat)" style="font-size:12px;">zu</text>
        <text x="130" y="270" text-anchor="start" class="cell-text">to</text>
      </g>

      <!-- ========== TWO-WAY ZONE (center) ========== -->
      <g transform="translate(345, 65)">
        <rect x="0" y="0" width="370" height="370" rx="10" fill="var(--two-bg)" stroke="var(--two)" stroke-width="2.5"/>
        <text x="185" y="24" text-anchor="middle" class="title-text" fill="var(--two)">TWO-WAY PREPOSITIONS</text>
        <text x="185" y="40" text-anchor="middle" class="label-sm" fill="var(--two)">Wechselpr&#xE4;positionen -- the crown jewel</text>

        <!-- The 9 prepositions in a grid -->
        <rect x="15" y="52" width="105" height="28" rx="5" fill="var(--surface)" stroke="var(--two)" stroke-width="1.5"/>
        <text x="67" y="71" text-anchor="middle" class="prep-text" fill="var(--two)" style="font-size:12px;">an</text>
        <text x="67" y="84" text-anchor="middle" class="label-sm">on / at</text>

        <rect x="130" y="52" width="105" height="28" rx="5" fill="var(--surface)" stroke="var(--two)" stroke-width="1.5"/>
        <text x="182" y="71" text-anchor="middle" class="prep-text" fill="var(--two)" style="font-size:12px;">auf</text>
        <text x="182" y="84" text-anchor="middle" class="label-sm">on / upon</text>

        <rect x="245" y="52" width="105" height="28" rx="5" fill="var(--surface)" stroke="var(--two)" stroke-width="1.5"/>
        <text x="297" y="71" text-anchor="middle" class="prep-text" fill="var(--two)" style="font-size:12px;">hinter</text>
        <text x="297" y="84" text-anchor="middle" class="label-sm">behind</text>

        <rect x="15" y="92" width="105" height="28" rx="5" fill="var(--surface)" stroke="var(--two)" stroke-width="1.5"/>
        <text x="67" y="111" text-anchor="middle" class="prep-text" fill="var(--two)" style="font-size:12px;">in</text>
        <text x="67" y="124" text-anchor="middle" class="label-sm">in / into</text>

        <rect x="130" y="92" width="105" height="28" rx="5" fill="var(--surface)" stroke="var(--two)" stroke-width="1.5"/>
        <text x="182" y="111" text-anchor="middle" class="prep-text" fill="var(--two)" style="font-size:12px;">neben</text>
        <text x="182" y="124" text-anchor="middle" class="label-sm">next to</text>

        <rect x="245" y="92" width="105" height="28" rx="5" fill="var(--surface)" stroke="var(--two)" stroke-width="1.5"/>
        <text x="297" y="111" text-anchor="middle" class="prep-text" fill="var(--two)" style="font-size:12px;">&#xFC;ber</text>
        <text x="297" y="124" text-anchor="middle" class="label-sm">over / above</text>

        <rect x="15" y="132" width="105" height="28" rx="5" fill="var(--surface)" stroke="var(--two)" stroke-width="1.5"/>
        <text x="67" y="151" text-anchor="middle" class="prep-text" fill="var(--two)" style="font-size:12px;">unter</text>
        <text x="67" y="164" text-anchor="middle" class="label-sm">under</text>

        <rect x="130" y="132" width="105" height="28" rx="5" fill="var(--surface)" stroke="var(--two)" stroke-width="1.5"/>
        <text x="182" y="151" text-anchor="middle" class="prep-text" fill="var(--two)" style="font-size:12px;">vor</text>
        <text x="182" y="164" text-anchor="middle" class="label-sm">in front of</text>

        <rect x="245" y="132" width="105" height="28" rx="5" fill="var(--surface)" stroke="var(--two)" stroke-width="1.5"/>
        <text x="297" y="151" text-anchor="middle" class="prep-text" fill="var(--two)" style="font-size:12px;">zwischen</text>
        <text x="297" y="164" text-anchor="middle" class="label-sm">between</text>

        <!-- THE RULE -->
        <line x1="15" y1="180" x2="355" y2="180" stroke="var(--two)" stroke-width="1" opacity="0.4"/>

        <!-- Motion = Accusative -->
        <rect x="15" y="190" width="165" height="75" rx="8" fill="var(--motion-bg)" stroke="var(--motion)" stroke-width="2"/>
        <text x="97" y="210" text-anchor="middle" class="box-text" style="font-weight:bold;" fill="var(--motion)">Wohin? (Where to?)</text>
        <text x="97" y="226" text-anchor="middle" class="cell-text" fill="var(--motion)">MOTION &#x2192; Accusative</text>
        <text x="97" y="244" text-anchor="middle" class="prep-text" fill="var(--motion)" style="font-size:12px;">auf den Tisch</text>
        <text x="97" y="258" text-anchor="middle" class="label-sm">(onto the table)</text>

        <!-- Arrow between -->
        <text x="185" y="230" text-anchor="middle" class="title-text" fill="var(--two)" style="font-size:20px;">&#x21C4;</text>

        <!-- Location = Dative -->
        <rect x="195" y="190" width="165" height="75" rx="8" fill="var(--location-bg)" stroke="var(--location)" stroke-width="2"/>
        <text x="277" y="210" text-anchor="middle" class="box-text" style="font-weight:bold;" fill="var(--location)">Wo? (Where?)</text>
        <text x="277" y="226" text-anchor="middle" class="cell-text" fill="var(--location)">LOCATION &#x2192; Dative</text>
        <text x="277" y="244" text-anchor="middle" class="prep-text" fill="var(--location)" style="font-size:12px;">auf dem Tisch</text>
        <text x="277" y="258" text-anchor="middle" class="label-sm">(on the table)</text>

        <!-- Verb pairs -->
        <text x="185" y="285" text-anchor="middle" class="cell-text" style="font-weight:bold;" fill="var(--two)">Reinforcing Verb Pairs</text>
        <text x="20" y="302" text-anchor="start" class="cell-text"><tspan fill="var(--motion)" font-weight="bold">stellen</tspan> (put) / <tspan fill="var(--location)" font-weight="bold">stehen</tspan> (stand)</text>
        <text x="20" y="318" text-anchor="start" class="cell-text"><tspan fill="var(--motion)" font-weight="bold">legen</tspan> (lay) / <tspan fill="var(--location)" font-weight="bold">liegen</tspan> (lie)</text>
        <text x="20" y="334" text-anchor="start" class="cell-text"><tspan fill="var(--motion)" font-weight="bold">setzen</tspan> (set) / <tspan fill="var(--location)" font-weight="bold">sitzen</tspan> (sit)</text>
        <text x="200" y="350" text-anchor="start" class="label-sm" fill="var(--two)">Motion verbs &#x2192; ACC | Location verbs &#x2192; DAT</text>
      </g>

      <!-- ========== GENITIVE ZONE (small, bottom) ========== -->
      <g transform="translate(30, 370)">
        <rect x="0" y="0" width="300" height="70" rx="8" fill="var(--gen-bg)" stroke="var(--gen)" stroke-width="1.5" stroke-dasharray="4,2"/>
        <text x="150" y="20" text-anchor="middle" class="cell-text" style="font-weight:bold;" fill="var(--gen)">GENITIVE (formal / written)</text>
        <text x="150" y="38" text-anchor="middle" class="cell-text">wegen, w&#xE4;hrend, trotz, statt</text>
        <text x="150" y="54" text-anchor="middle" class="label-sm" fill="var(--gen)">Shifting to dative in casual speech</text>
      </g>

      <!-- ========== EXAMPLE PAIRS ========== -->
      <g transform="translate(30, 465)">
        <rect x="0" y="0" width="1000" height="140" rx="10" fill="var(--surface)" stroke="var(--border)" stroke-width="1.5"/>
        <text x="500" y="24" text-anchor="middle" class="title-text" fill="var(--accent)">Two-Way Prepositions in Action: Same Preposition, Different Cases</text>

        <!-- Example 1 -->
        <rect x="20" y="40" width="470" height="40" rx="6" fill="var(--motion-bg)" stroke="var(--motion)" stroke-width="1.5"/>
        <text x="30" y="56" text-anchor="start" class="cell-text" fill="var(--motion)" style="font-weight:bold;">&#x2192; MOTION:</text>
        <text x="110" y="56" text-anchor="start" class="cell-text">Ich stelle das Glas <tspan font-weight="bold" fill="var(--motion)">auf den Tisch</tspan>.</text>
        <text x="30" y="72" text-anchor="start" class="label-sm">I place the glass onto the table (accusative -- change of location)</text>

        <rect x="510" y="40" width="470" height="40" rx="6" fill="var(--location-bg)" stroke="var(--location)" stroke-width="1.5"/>
        <text x="520" y="56" text-anchor="start" class="cell-text" fill="var(--location)" style="font-weight:bold;">&#x25CF; LOCATION:</text>
        <text x="610" y="56" text-anchor="start" class="cell-text">Das Glas steht <tspan font-weight="bold" fill="var(--location)">auf dem Tisch</tspan>.</text>
        <text x="520" y="72" text-anchor="start" class="label-sm">The glass stands on the table (dative -- static location)</text>

        <!-- Example 2 -->
        <rect x="20" y="90" width="470" height="40" rx="6" fill="var(--motion-bg)" stroke="var(--motion)" stroke-width="1.5"/>
        <text x="30" y="106" text-anchor="start" class="cell-text" fill="var(--motion)" style="font-weight:bold;">&#x2192; MOTION:</text>
        <text x="110" y="106" text-anchor="start" class="cell-text">Ich gehe <tspan font-weight="bold" fill="var(--motion)">in die Schule</tspan>.</text>
        <text x="30" y="122" text-anchor="start" class="label-sm">I go into the school (accusative -- entering)</text>

        <rect x="510" y="90" width="470" height="40" rx="6" fill="var(--location-bg)" stroke="var(--location)" stroke-width="1.5"/>
        <text x="520" y="106" text-anchor="start" class="cell-text" fill="var(--location)" style="font-weight:bold;">&#x25CF; LOCATION:</text>
        <text x="610" y="106" text-anchor="start" class="cell-text">Ich bin <tspan font-weight="bold" fill="var(--location)">in der Schule</tspan>.</text>
        <text x="520" y="122" text-anchor="start" class="label-sm">I am in the school (dative -- already there)</text>
      </g>

      <!-- ========== ENGLISH COMPARISON ========== -->
      <g transform="translate(30, 625)">
        <rect x="0" y="0" width="1000" height="70" rx="10" fill="var(--english-bg)" stroke="var(--english)" stroke-width="1.5"/>
        <text x="500" y="22" text-anchor="middle" class="title-text" fill="var(--english)">English: Zero Case Government on Prepositions</text>
        <text x="500" y="42" text-anchor="middle" class="cell-text" fill="var(--fg)">"with the man," "for the woman," "in the house" -- the noun form never changes after any preposition.</text>
        <text x="500" y="58" text-anchor="middle" class="cell-text" fill="var(--english)">English uses different prepositions instead: "in" (location) vs. "into" (motion). German uses one preposition + case.</text>
      </g>

      <!-- ========== MNEMONIC FOOTER ========== -->
      <g transform="translate(30, 715)">
        <rect x="0" y="0" width="480" height="55" rx="8" fill="var(--acc-bg)" stroke="var(--acc)" stroke-width="1.5"/>
        <text x="240" y="18" text-anchor="middle" class="cell-text" style="font-weight:bold;" fill="var(--acc)">ACC Mnemonic: DOGFU</text>
        <text x="240" y="35" text-anchor="middle" class="cell-text" fill="var(--acc)">Durch, Ohne, Gegen, F&#xFC;r, Um</text>
        <text x="240" y="48" text-anchor="middle" class="label-sm">5 prepositions -- always accusative</text>

        <rect x="520" y="0" width="480" height="55" rx="8" fill="var(--dat-bg)" stroke="var(--dat)" stroke-width="1.5"/>
        <text x="760" y="18" text-anchor="middle" class="cell-text" style="font-weight:bold;" fill="var(--dat)">DAT Mnemonic: Blue Danube Waltz</text>
        <text x="760" y="35" text-anchor="middle" class="cell-text" fill="var(--dat)">Aus-au&#xDF;er-bei-mit, nach-seit, von-zu</text>
        <text x="760" y="48" text-anchor="middle" class="label-sm">8 prepositions -- always dative</text>
      </g>

      <!-- ========== PRINCIPLE BOX ========== -->
      <g transform="translate(30, 790)">
        <rect x="0" y="0" width="1000" height="45" rx="8" fill="var(--two-bg)" stroke="var(--two)" stroke-width="1.5"/>
        <text x="500" y="18" text-anchor="middle" class="title-text" fill="var(--two)" style="font-size:12px;">THE PATTERN</text>
        <text x="500" y="34" text-anchor="middle" class="subtitle-text" style="font-size:11px;">The motion/location distinction is a single semantic parameter applied uniformly across all 9 two-way prepositions. One rule, 9 prepositions, perfectly predictable.</text>
      </g>
    </svg>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background:var(--acc-bg);border-color:var(--acc);"></div> Accusative prepositions</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--dat-bg);border-color:var(--dat);"></div> Dative prepositions</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--two-bg);border-color:var(--two);"></div> Two-way prepositions</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--motion-bg);border-color:var(--motion);"></div> Motion &#x2192; Accusative</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--location-bg);border-color:var(--location);"></div> Location &#x2192; Dative</div>
  </div>

  <figcaption>
    <h2>Figure 4 -- Preposition Case Government Chart</h2>
    <p>Every German preposition demands its object in a specific grammatical case. Five prepositions always take accusative, eight always take dative, and nine "two-way" prepositions (Wechselprapositionen) select accusative for motion/direction and dative for static location -- a single semantic rule applied uniformly. Reinforcing verb pairs (stellen/stehen, legen/liegen, setzen/sitzen) mirror this motion/location split. English prepositions have no case government at all and instead use separate words ("in" vs. "into," "on" vs. "onto") to encode the same distinction German handles with a single preposition plus case alternation.</p>
  </figcaption>
</figure>
</body>
</html>
