<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Great Vowel Shift</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #f8f9fa;
    color: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 2rem;
  }
  figure {
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
    max-width: 950px;
    width: 100%;
  }
  h2 { text-align: center; font-size: 1.3rem; margin-bottom: 0.3rem; }
  .subtitle { text-align: center; font-size: 0.9rem; color: #6c757d; margin-bottom: 2rem; }

  /* SVG vowel chart */
  .vowel-chart {
    display: flex;
    justify-content: center;
    margin-bottom: 1rem;
  }
  .vowel-chart svg {
    max-width: 100%;
    height: auto;
  }

  /* Shift table */
  .shift-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.82rem;
    margin-top: 1rem;
  }
  .shift-table th {
    padding: 0.5rem;
    text-align: center;
    font-weight: 700;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    border-bottom: 2px solid #dee2e6;
    color: #6c757d;
  }
  .shift-table td {
    padding: 0.5rem;
    text-align: center;
    border-bottom: 1px solid #f0f0f0;
  }
  .ipa { font-family: 'Lucida Sans Unicode', 'DejaVu Sans', sans-serif; font-weight: 600; }
  .me-sound { color: #dc2626; }
  .mode-sound { color: #2563eb; }
  .arrow-cell { color: #9ca3af; font-size: 1.2rem; }
  .spelling-note { font-size: 0.72rem; color: #6b7280; font-style: italic; }
  .example-word { font-style: italic; font-weight: 600; }
  .dipht { background: #fef3c7; }

  .spelling-box {
    margin-top: 1.5rem;
    padding: 1rem;
    background: #fef2f2;
    border-radius: 8px;
    border-left: 4px solid #dc2626;
    font-size: 0.82rem;
    line-height: 1.5;
    color: #374151;
  }
  .spelling-box strong { color: #991b1b; }

  .pattern-note {
    margin-top: 1rem;
    padding: 1rem;
    background: #f0f4ff;
    border-radius: 8px;
    border-left: 4px solid #3b82f6;
    font-size: 0.82rem;
    line-height: 1.5;
    color: #374151;
  }
  .pattern-note strong { color: #1e40af; }

  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid #e9ecef;
  }
  figcaption strong { display: block; font-size: 1.05rem; margin-bottom: 0.3rem; }
  figcaption span { font-size: 0.85rem; color: #6c757d; line-height: 1.5; }

  @media (prefers-color-scheme: dark) {
    body { background: #1a1a2e; color: #e9ecef; }
    figure { background: #2d2d44; box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
    h2 { color: #e9ecef; }
    .subtitle { color: #adb5bd; }
    .shift-table th { border-bottom-color: #3d3d5c; color: #adb5bd; }
    .shift-table td { border-bottom-color: #3d3d5c; color: #e9ecef; }
    .me-sound { color: #fca5a5; }
    .mode-sound { color: #93c5fd; }
    .spelling-note { color: #9ca3af; }
    .dipht { background: #451a03; }
    .spelling-box { background: #450a0a; border-left-color: #f87171; color: #fecaca; }
    .spelling-box strong { color: #fca5a5; }
    .pattern-note { background: #1e2a4a; border-left-color: #60a5fa; color: #cbd5e1; }
    .pattern-note strong { color: #93bbfc; }
    figcaption { border-top-color: #3d3d5c; }
    figcaption strong { color: #e9ecef; }
    figcaption span { color: #adb5bd; }
    /* SVG dark mode */
    .vowel-chart text { fill: #e9ecef; }
    .vowel-chart .chart-bg { fill: #1e2a4a; }
    .vowel-chart .grid-line { stroke: #3d3d5c; }
    .vowel-chart .shift-arrow { stroke: #60a5fa; }
    .vowel-chart .dipht-arrow { stroke: #f59e0b; }
  }
</style>
</head>
<body>
<figure>
  <h2>The Great Vowel Shift</h2>
  <p class="subtitle">c. 1400-1700 -- Every long vowel moved upward; the two highest diphthongized</p>

  <div class="vowel-chart">
    <svg viewBox="0 0 500 320" width="500" height="320">
      <!-- Background -->
      <rect class="chart-bg" x="0" y="0" width="500" height="320" rx="8" fill="#f0f4ff" />

      <!-- Trapezoid outline -->
      <polygon points="80,50 420,50 480,260 50,260" fill="none" stroke="#cbd5e6" stroke-width="1.5" class="grid-line"/>

      <!-- Height labels -->
      <text x="20" y="55" font-size="11" font-weight="700" fill="#6b7280">High</text>
      <text x="20" y="160" font-size="11" font-weight="700" fill="#6b7280">Mid</text>
      <text x="20" y="265" font-size="11" font-weight="700" fill="#6b7280">Low</text>

      <!-- Front/Back labels -->
      <text x="120" y="290" font-size="11" font-weight="700" fill="#6b7280">Front</text>
      <text x="380" y="290" font-size="11" font-weight="700" fill="#6b7280">Back</text>

      <!-- FRONT VOWELS: Shift arrows (upward) -->
      <!-- /a:/ -> /eɪ/ -->
      <line x1="110" y1="245" x2="110" y2="175" stroke="#3b82f6" stroke-width="2.5" marker-end="url(#arrow)" class="shift-arrow"/>
      <circle cx="110" cy="245" r="5" fill="#dc2626"/>
      <text x="70" y="252" font-size="11" fill="#dc2626" font-weight="700">/aː/</text>
      <text x="70" y="172" font-size="11" fill="#2563eb" font-weight="700">/eɪ/</text>

      <!-- /ɛ:/ -> /i:/ -->
      <line x1="150" y1="175" x2="130" y2="75" stroke="#3b82f6" stroke-width="2.5" marker-end="url(#arrow)" class="shift-arrow"/>
      <circle cx="150" cy="175" r="5" fill="#dc2626"/>
      <text x="158" y="180" font-size="11" fill="#dc2626" font-weight="700">/ɛː/</text>
      <text x="138" y="72" font-size="11" fill="#2563eb" font-weight="700">/iː/</text>

      <!-- /e:/ -> /i:/ (merged with above) -->
      <line x1="140" y1="130" x2="130" y2="80" stroke="#3b82f6" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrow)" class="shift-arrow"/>
      <circle cx="140" cy="130" r="4" fill="#dc2626"/>
      <text x="148" y="128" font-size="10" fill="#dc2626">/eː/</text>

      <!-- /i:/ -> /aɪ/ DIPHTHONGIZATION -->
      <path d="M 120 60 C 120 100, 160 180, 180 230" fill="none" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#arrowY)" class="dipht-arrow"/>
      <circle cx="120" cy="60" r="5" fill="#dc2626"/>
      <text x="85" y="58" font-size="11" fill="#dc2626" font-weight="700">/iː/</text>
      <text x="188" y="237" font-size="11" fill="#d97706" font-weight="700">/aɪ/</text>

      <!-- BACK VOWELS: Shift arrows (upward) -->
      <!-- /ɔ:/ -> /oʊ/ -->
      <line x1="400" y1="210" x2="400" y2="140" stroke="#3b82f6" stroke-width="2.5" marker-end="url(#arrow)" class="shift-arrow"/>
      <circle cx="400" cy="210" r="5" fill="#dc2626"/>
      <text x="410" y="217" font-size="11" fill="#dc2626" font-weight="700">/ɔː/</text>
      <text x="410" y="137" font-size="11" fill="#2563eb" font-weight="700">/oʊ/</text>

      <!-- /o:/ -> /u:/ -->
      <line x1="410" y1="130" x2="410" y2="72" stroke="#3b82f6" stroke-width="2.5" marker-end="url(#arrow)" class="shift-arrow"/>
      <circle cx="410" cy="130" r="5" fill="#dc2626"/>
      <text x="418" y="128" font-size="11" fill="#dc2626" font-weight="700">/oː/</text>
      <text x="418" y="68" font-size="11" fill="#2563eb" font-weight="700">/uː/</text>

      <!-- /u:/ -> /aʊ/ DIPHTHONGIZATION -->
      <path d="M 400 60 C 400 100, 360 180, 340 230" fill="none" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#arrowY)" class="dipht-arrow"/>
      <circle cx="400" cy="60" r="5" fill="#dc2626"/>
      <text x="410" y="55" font-size="11" fill="#dc2626" font-weight="700">/uː/</text>
      <text x="300" y="237" font-size="11" fill="#d97706" font-weight="700">/aʊ/</text>

      <!-- Arrow markers -->
      <defs>
        <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#3b82f6"/>
        </marker>
        <marker id="arrowY" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#f59e0b"/>
        </marker>
      </defs>

      <!-- Legend -->
      <line x1="200" y1="300" x2="230" y2="300" stroke="#3b82f6" stroke-width="2.5"/>
      <text x="235" y="304" font-size="10" fill="#6b7280">Upward shift</text>
      <line x1="310" y1="300" x2="340" y2="300" stroke="#f59e0b" stroke-width="2.5"/>
      <text x="345" y="304" font-size="10" fill="#6b7280">Diphthongization</text>
    </svg>
  </div>

  <table class="shift-table">
    <thead>
      <tr>
        <th>ME Vowel</th>
        <th>ME Sound</th>
        <th></th>
        <th>ModE Sound</th>
        <th>Example</th>
        <th>Spelling Frozen At</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td class="ipa me-sound">/aː/</td>
        <td>[aː]</td>
        <td class="arrow-cell">--></td>
        <td class="ipa mode-sound">/eɪ/</td>
        <td><span class="example-word">name</span>: /naːmə/ --&gt; /neɪm/</td>
        <td class="spelling-note">Silent -e preserves ME syllable</td>
      </tr>
      <tr>
        <td class="ipa me-sound">/ɛː/</td>
        <td>[ɛː]</td>
        <td class="arrow-cell">--></td>
        <td class="ipa mode-sound">/iː/</td>
        <td><span class="example-word">meat</span>: /mɛːt/ --&gt; /miːt/</td>
        <td class="spelling-note">"ea" = ME open e</td>
      </tr>
      <tr>
        <td class="ipa me-sound">/eː/</td>
        <td>[eː]</td>
        <td class="arrow-cell">--></td>
        <td class="ipa mode-sound">/iː/</td>
        <td><span class="example-word">meet</span>: /meːt/ --&gt; /miːt/</td>
        <td class="spelling-note">"ee" = ME close e (merged with above)</td>
      </tr>
      <tr class="dipht">
        <td class="ipa me-sound">/iː/</td>
        <td>[iː]</td>
        <td class="arrow-cell">--></td>
        <td class="ipa mode-sound">/aɪ/</td>
        <td><span class="example-word">mice</span>: /miːs/ --&gt; /maɪs/</td>
        <td class="spelling-note">"i" preserves ME high front vowel</td>
      </tr>
      <tr>
        <td class="ipa me-sound">/ɔː/</td>
        <td>[ɔː]</td>
        <td class="arrow-cell">--></td>
        <td class="ipa mode-sound">/oʊ/</td>
        <td><span class="example-word">boat</span>: /bɔːt/ --&gt; /boʊt/</td>
        <td class="spelling-note">"oa" = ME open o</td>
      </tr>
      <tr>
        <td class="ipa me-sound">/oː/</td>
        <td>[oː]</td>
        <td class="arrow-cell">--></td>
        <td class="ipa mode-sound">/uː/</td>
        <td><span class="example-word">moon</span>: /moːn/ --&gt; /muːn/</td>
        <td class="spelling-note">"oo" = ME close o</td>
      </tr>
      <tr class="dipht">
        <td class="ipa me-sound">/uː/</td>
        <td>[uː]</td>
        <td class="arrow-cell">--></td>
        <td class="ipa mode-sound">/aʊ/</td>
        <td><span class="example-word">mouse</span>: /muːs/ --&gt; /maʊs/</td>
        <td class="spelling-note">"ou" preserves ME high back vowel</td>
      </tr>
    </tbody>
  </table>

  <div class="spelling-box">
    <strong>The Spelling Catastrophe:</strong> Caxton's printing press (1476) standardized spelling mid-shift. The spellings record Middle English pronunciation; the sounds continued to change. This is why English spelling is opaque: every "silent" letter and every spelling-pronunciation mismatch is a fossil of a pronunciation that existed when the spelling was frozen.
  </div>

  <div class="pattern-note">
    <strong>The Pattern:</strong> The GVS is a <em>chain shift</em>: each vowel moved up one position in the mouth, like a conveyor belt. The two highest vowels (/iː/ and /uː/) had nowhere to go up, so they broke into diphthongs (two-element glides). Whether this was a "push chain" (lower vowels pushing) or "pull chain" (diphthongization creating vacuum) is debated, but the <em>regularity</em> is not: every single long vowel participated. The shift is perfectly symmetrical between front and back vowels. This regularity is the hallmark of systematic sound change.
  </div>

  <figcaption>
    <strong>Figure 4 -- The Great Vowel Shift</strong>
    <span>Vowel trapezoid showing all 7 long vowels shifting upward (c. 1400-1700), with the two highest diphthongizing. Table maps each shift with example words and the spelling frozen at the Middle English stage. The symmetry between front and back vowels reveals the systematic nature of the chain shift.</span>
  </figcaption>
</figure>
</body>
</html>
