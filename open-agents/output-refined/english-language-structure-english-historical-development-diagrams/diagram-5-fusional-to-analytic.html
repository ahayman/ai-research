<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>From Fusional to Analytic: English's Typological Transformation</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #f8f9fa;
    color: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 2rem;
  }
  figure {
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
    max-width: 1050px;
    width: 100%;
  }
  h2 { text-align: center; font-size: 1.3rem; margin-bottom: 0.3rem; }
  .subtitle { text-align: center; font-size: 0.9rem; color: #6c757d; margin-bottom: 2rem; }

  /* Two columns: what was lost vs what replaced it */
  .transformation {
    display: grid;
    grid-template-columns: 1fr 50px 1fr;
    gap: 0;
    margin-bottom: 1.5rem;
  }
  .col-header {
    font-weight: 800;
    font-size: 0.85rem;
    text-align: center;
    padding: 0.6rem;
    border-radius: 8px 8px 0 0;
  }
  .col-lost { background: #fef2f2; color: #991b1b; }
  .col-arrow-h { display: flex; align-items: center; justify-content: center; }
  .col-gained { background: #f0fdf4; color: #15803d; }

  .pair-row {
    display: contents;
  }
  .lost-cell, .gained-cell {
    padding: 0.6rem 0.8rem;
    border-bottom: 1px solid #f0f0f0;
  }
  .lost-cell {
    background: #fff5f5;
    text-align: right;
  }
  .gained-cell {
    background: #f0fdf9;
    text-align: left;
  }
  .arrow-cell {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.3rem;
    color: #9ca3af;
    border-bottom: 1px solid #f0f0f0;
  }
  .feature-name {
    font-weight: 700;
    font-size: 0.85rem;
    display: block;
  }
  .feature-detail {
    font-size: 0.72rem;
    color: #6b7280;
    margin-top: 0.2rem;
    line-height: 1.4;
  }
  .feature-example {
    font-style: italic;
    font-size: 0.72rem;
    margin-top: 0.2rem;
  }

  /* Synthesis index */
  .synth-meter {
    margin-top: 1.5rem;
    padding: 1rem;
    background: #f8fafc;
    border-radius: 8px;
    border: 1px solid #e2e8f0;
  }
  .synth-meter h3 {
    font-size: 0.82rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: #475569;
    margin-bottom: 0.8rem;
    text-align: center;
  }
  .meter-row {
    display: grid;
    grid-template-columns: 130px 1fr 60px;
    gap: 0.5rem;
    align-items: center;
    padding: 0.3rem 0;
  }
  .meter-label { font-weight: 600; font-size: 0.78rem; text-align: right; }
  .meter-bar-bg {
    height: 18px;
    background: #e9ecef;
    border-radius: 9px;
    overflow: hidden;
    position: relative;
  }
  .meter-bar {
    height: 100%;
    border-radius: 9px;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding-right: 0.3rem;
    font-size: 0.65rem;
    font-weight: 700;
    color: #fff;
  }
  .meter-count { font-size: 0.72rem; color: #6b7280; text-align: center; }
  .mb-oe   { background: linear-gradient(to right, #dc2626, #e04040); width: 100%; }
  .mb-me   { background: linear-gradient(to right, #f59e0b, #fbbf24); width: 30%; }
  .mb-mode { background: linear-gradient(to right, #22c55e, #4ade80); width: 12%; }

  .comparison-row {
    margin-top: 1rem;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0.5rem;
    font-size: 0.75rem;
  }
  .comp-card {
    padding: 0.6rem;
    border-radius: 8px;
    text-align: center;
    line-height: 1.4;
  }
  .comp-card .comp-lang {
    font-weight: 700;
    font-size: 0.82rem;
    margin-bottom: 0.2rem;
  }
  .comp-oe { background: #fef2f2; border: 1px solid #fca5a5; }
  .comp-de { background: #fef3c7; border: 1px solid #fcd34d; }
  .comp-cn { background: #dcfce7; border: 1px solid #86efac; }

  .pattern-note {
    margin-top: 1.5rem;
    padding: 1rem;
    background: #f0f4ff;
    border-radius: 8px;
    border-left: 4px solid #3b82f6;
    font-size: 0.82rem;
    line-height: 1.5;
    color: #374151;
  }
  .pattern-note strong { color: #1e40af; }

  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid #e9ecef;
  }
  figcaption strong { display: block; font-size: 1.05rem; margin-bottom: 0.3rem; }
  figcaption span { font-size: 0.85rem; color: #6c757d; line-height: 1.5; }

  @media (prefers-color-scheme: dark) {
    body { background: #1a1a2e; color: #e9ecef; }
    figure { background: #2d2d44; box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
    h2 { color: #e9ecef; }
    .subtitle { color: #adb5bd; }
    .col-lost { background: #450a0a; color: #fca5a5; }
    .col-gained { background: #052e16; color: #86efac; }
    .lost-cell { background: #2a0f0f; }
    .gained-cell { background: #0a2a14; }
    .lost-cell, .gained-cell { border-bottom-color: #3d3d5c; }
    .arrow-cell { border-bottom-color: #3d3d5c; color: #6b7280; }
    .feature-name { color: #e9ecef; }
    .feature-detail { color: #9ca3af; }
    .synth-meter { background: #1e2a4a; border-color: #3d3d5c; }
    .synth-meter h3 { color: #adb5bd; }
    .meter-bar-bg { background: #3d3d5c; }
    .meter-count { color: #9ca3af; }
    .comp-oe { background: #450a0a; border-color: #991b1b; color: #fca5a5; }
    .comp-de { background: #451a03; border-color: #b45309; color: #fde68a; }
    .comp-cn { background: #052e16; border-color: #16a34a; color: #86efac; }
    .pattern-note { background: #1e2a4a; border-left-color: #60a5fa; color: #cbd5e1; }
    .pattern-note strong { color: #93bbfc; }
    figcaption { border-top-color: #3d3d5c; }
    figcaption strong { color: #e9ecef; }
    figcaption span { color: #adb5bd; }
  }

  @media (max-width: 700px) {
    .transformation { grid-template-columns: 1fr; }
    .col-arrow-h, .arrow-cell { display: none; }
    .comparison-row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<figure>
  <h2>From Fusional to Analytic</h2>
  <p class="subtitle">English's typological transformation: what was lost and what replaced it</p>

  <div class="transformation">
    <div class="col-header col-lost">Lost (Synthetic / Fusional)</div>
    <div class="col-arrow-h"></div>
    <div class="col-header col-gained">Gained (Analytic / Periphrastic)</div>

    <div class="lost-cell">
      <span class="feature-name">Case endings on nouns</span>
      <span class="feature-detail">4 cases x 2 numbers x 3 genders</span>
      <span class="feature-example">thaem cyninge (dative)</span>
    </div>
    <div class="arrow-cell">--></div>
    <div class="gained-cell">
      <span class="feature-name">Prepositions + word order</span>
      <span class="feature-detail">to, for, by, with, of + fixed SVO</span>
      <span class="feature-example">to the king</span>
    </div>

    <div class="lost-cell">
      <span class="feature-name">Grammatical gender</span>
      <span class="feature-detail">M / F / N on all nouns</span>
      <span class="feature-example">se stan (M), seo sunne (F), thaet wif (N)</span>
    </div>
    <div class="arrow-cell">--></div>
    <div class="gained-cell">
      <span class="feature-name">Natural gender only</span>
      <span class="feature-detail">he/she/it based on meaning, not grammar</span>
      <span class="feature-example">the stone, the sun, the woman</span>
    </div>

    <div class="lost-cell">
      <span class="feature-name">V2 word order</span>
      <span class="feature-detail">Verb second in main clauses, verb-final in subordinates</span>
      <span class="feature-example">Tha sealde se cyning...</span>
    </div>
    <div class="arrow-cell">--></div>
    <div class="gained-cell">
      <span class="feature-name">Rigid SVO</span>
      <span class="feature-detail">Subject-Verb-Object as the only canonical order</span>
      <span class="feature-example">Then the king gave...</span>
    </div>

    <div class="lost-cell">
      <span class="feature-name">Gender-marked demonstratives</span>
      <span class="feature-detail">se (M), seo (F), thaet (N) + case forms</span>
      <span class="feature-example">~10 forms for "the"</span>
    </div>
    <div class="arrow-cell">--></div>
    <div class="gained-cell">
      <span class="feature-name">Invariable articles</span>
      <span class="feature-detail">"the" (definite), "a/an" (indefinite)</span>
      <span class="feature-example">2 forms total</span>
    </div>

    <div class="lost-cell">
      <span class="feature-name">Adjective declension</span>
      <span class="feature-detail">Strong + weak paradigms (case/gender/number)</span>
      <span class="feature-example">godne (acc.M.sg.strong)</span>
    </div>
    <div class="arrow-cell">--></div>
    <div class="gained-cell">
      <span class="feature-name">Invariable adjectives</span>
      <span class="feature-detail">One form for all contexts</span>
      <span class="feature-example">good (always)</span>
    </div>

    <div class="lost-cell">
      <span class="feature-name">Verb person/number marking</span>
      <span class="feature-detail">Distinct endings per person/number</span>
      <span class="feature-example">-e, -est, -eth, -ath</span>
    </div>
    <div class="arrow-cell">--></div>
    <div class="gained-cell">
      <span class="feature-name">Do-support + pronouns carry load</span>
      <span class="feature-detail">Only 3rd person -s survives; do-support for questions/negation</span>
      <span class="feature-example">Do you know? / He knows</span>
    </div>

    <div class="lost-cell">
      <span class="feature-name">T-V pronoun distinction</span>
      <span class="feature-detail">thou (informal) vs. you (formal/plural)</span>
      <span class="feature-example">thou knowest / you know</span>
    </div>
    <div class="arrow-cell">--></div>
    <div class="gained-cell">
      <span class="feature-name">Universal "you"</span>
      <span class="feature-detail">One form for all 2nd-person reference</span>
      <span class="feature-example">you (always); y'all / you guys (dialectal)</span>
    </div>
  </div>

  <div class="synth-meter">
    <h3>Approximate Inflectional Complexity Over Time</h3>
    <div class="meter-row">
      <div class="meter-label" style="color:#dc2626;">Old English</div>
      <div class="meter-bar-bg"><div class="meter-bar mb-oe">Dozens of forms</div></div>
      <div class="meter-count">High</div>
    </div>
    <div class="meter-row">
      <div class="meter-label" style="color:#f59e0b;">Late Middle English</div>
      <div class="meter-bar-bg"><div class="meter-bar mb-me">~12</div></div>
      <div class="meter-count">Low</div>
    </div>
    <div class="meter-row">
      <div class="meter-label" style="color:#22c55e;">Modern English</div>
      <div class="meter-bar-bg"><div class="meter-bar mb-mode">~8</div></div>
      <div class="meter-count">Minimal</div>
    </div>
  </div>

  <div class="comparison-row">
    <div class="comp-card comp-oe">
      <div class="comp-lang">Old English (~900)</div>
      Looks like Modern German:<br>fusional, inflected, V2 word order, grammatical gender
    </div>
    <div class="comp-card comp-de">
      <div class="comp-lang">Modern German</div>
      Kept: 4 cases, 3 genders, V2 order, adjective declension<br>(the road not taken by English)
    </div>
    <div class="comp-card comp-cn">
      <div class="comp-lang">Modern English</div>
      Lost nearly all inflection.<br>Compensated with word order, prepositions, articles, do-support.
    </div>
  </div>

  <div class="pattern-note">
    <strong>The Pattern:</strong> The transformation is a <em>conservation law</em>: grammatical information is never destroyed, only relocated. Every lost inflection was compensated by a gain elsewhere: case endings were replaced by prepositions and word order, gender agreement by articles, verb-second by rigid SVO, person marking by obligatory pronouns and do-support. Total information capacity stayed roughly constant; its <em>encoding method</em> shifted from morphology to syntax. Modern English is not "simpler" than Old English -- it encodes the same distinctions through different mechanisms. German preserved the original encoding; English rebuilt it from scratch.
  </div>

  <figcaption>
    <strong>Figure 5 -- The Fusional-to-Analytic Transformation</strong>
    <span>Seven pairs showing each lost synthetic feature and its analytic replacement. The meter shows approximate inflectional complexity declining from dozens of forms (OE) to ~8 (Modern English). Comparison with German illustrates the divergent paths from the same starting point.</span>
  </figcaption>
</figure>
</body>
</html>
