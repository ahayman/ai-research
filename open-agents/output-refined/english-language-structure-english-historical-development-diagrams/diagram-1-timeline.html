<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Language Timeline: OE to Modern English</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #f8f9fa;
    color: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 2rem;
  }
  figure {
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
    max-width: 1100px;
    width: 100%;
  }
  h2 { text-align: center; font-size: 1.3rem; margin-bottom: 0.3rem; }
  .subtitle { text-align: center; font-size: 0.9rem; color: #6c757d; margin-bottom: 2rem; }

  .timeline-container { position: relative; padding: 0 0 1rem 0; overflow-x: auto; }

  /* Period bars */
  .periods {
    display: grid;
    grid-template-columns: 140px 100px 100px 1fr;
    gap: 0;
    margin-bottom: 0.5rem;
  }
  .period {
    padding: 0.6rem 0.5rem;
    text-align: center;
    font-weight: 700;
    font-size: 0.82rem;
    border-radius: 8px 8px 0 0;
  }
  .period .dates {
    font-weight: 400;
    font-size: 0.7rem;
    opacity: 0.8;
  }
  .p-oe   { background: #dc2626; color: #fff; }
  .p-me   { background: #f59e0b; color: #fff; }
  .p-eme  { background: #3b82f6; color: #fff; }
  .p-mode { background: #22c55e; color: #fff; }

  /* Timeline track */
  .track {
    position: relative;
    height: 6px;
    background: linear-gradient(to right, #dc2626, #dc2626 30%, #f59e0b 30%, #f59e0b 52%, #3b82f6 52%, #3b82f6 68%, #22c55e 68%);
    border-radius: 3px;
    margin: 0.5rem 0 2rem 0;
  }

  /* Events */
  .events {
    display: flex;
    flex-direction: column;
    gap: 0;
  }
  .event-row {
    display: grid;
    grid-template-columns: 70px 1fr;
    gap: 0.8rem;
    padding: 0.5rem 0;
    border-bottom: 1px solid #f0f0f0;
    align-items: start;
  }
  .event-row:last-child { border-bottom: none; }
  .event-date {
    font-weight: 800;
    font-size: 0.85rem;
    text-align: right;
    padding-top: 0.15rem;
  }
  .event-body { font-size: 0.82rem; line-height: 1.5; }
  .event-body .event-title { font-weight: 700; }
  .event-body .event-desc { color: #4b5563; }
  .event-tag {
    display: inline-block;
    padding: 0.1rem 0.4rem;
    border-radius: 4px;
    font-size: 0.65rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    margin-left: 0.3rem;
    vertical-align: middle;
  }
  .tag-ext { background: #fef2f2; color: #dc2626; } /* external event */
  .tag-struct { background: #eff6ff; color: #2563eb; } /* structural change */
  .tag-vocab { background: #f0fdf4; color: #16a34a; } /* vocabulary */
  .tag-phon { background: #fdf2f8; color: #db2777; } /* phonological */

  /* Sample texts */
  .sample-texts {
    margin-top: 1.5rem;
    padding: 1rem;
    background: #f8fafc;
    border-radius: 8px;
    border: 1px solid #e2e8f0;
  }
  .sample-texts h3 {
    font-size: 0.82rem;
    margin-bottom: 0.6rem;
    color: #475569;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .sample-row {
    display: grid;
    grid-template-columns: 90px 1fr;
    gap: 0.5rem;
    padding: 0.3rem 0;
    font-size: 0.78rem;
    border-bottom: 1px solid #f0f0f0;
  }
  .sample-row:last-child { border-bottom: none; }
  .sample-period { font-weight: 700; }
  .sample-text { font-style: italic; }

  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid #e9ecef;
  }
  figcaption strong { display: block; font-size: 1.05rem; margin-bottom: 0.3rem; }
  figcaption span { font-size: 0.85rem; color: #6c757d; line-height: 1.5; }

  @media (prefers-color-scheme: dark) {
    body { background: #1a1a2e; color: #e9ecef; }
    figure { background: #2d2d44; box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
    h2 { color: #e9ecef; }
    .subtitle { color: #adb5bd; }
    .event-row { border-bottom-color: #3d3d5c; }
    .event-body .event-desc { color: #adb5bd; }
    .tag-ext { background: #450a0a; color: #fca5a5; }
    .tag-struct { background: #1e2a4a; color: #93c5fd; }
    .tag-vocab { background: #052e16; color: #86efac; }
    .tag-phon { background: #4a0d2b; color: #f9a8d4; }
    .sample-texts { background: #1e2a4a; border-color: #3d3d5c; }
    .sample-texts h3 { color: #adb5bd; }
    .sample-row { border-bottom-color: #3d3d5c; color: #cbd5e1; }
    figcaption { border-top-color: #3d3d5c; }
    figcaption strong { color: #e9ecef; }
    figcaption span { color: #adb5bd; }
  }
</style>
</head>
<body>
<figure>
  <h2>English Language Timeline</h2>
  <p class="subtitle">Old English through Modern English -- key events and their structural consequences</p>

  <div class="timeline-container">
    <div class="periods">
      <div class="period p-oe">Old English<div class="dates">c. 449 -- 1100</div></div>
      <div class="period p-me">Middle English<div class="dates">c. 1100 -- 1500</div></div>
      <div class="period p-eme">Early Modern<div class="dates">c. 1500 -- 1700</div></div>
      <div class="period p-mode">Modern English<div class="dates">c. 1700 -- present</div></div>
    </div>
    <div class="track"></div>
  </div>

  <div class="events">
    <div class="event-row">
      <div class="event-date" style="color:#dc2626;">c. 449</div>
      <div class="event-body"><span class="event-title">Anglo-Saxon settlement of Britain</span> <span class="event-tag tag-ext">external</span><br><span class="event-desc">Angles, Saxons, Jutes bring West Germanic to Britain. OE is fusional: 4 cases, 3 genders, V2 word order, near-100% Germanic vocabulary.</span></div>
    </div>
    <div class="event-row">
      <div class="event-date" style="color:#dc2626;">793</div>
      <div class="event-body"><span class="event-title">Viking raids begin (Lindisfarne)</span> <span class="event-tag tag-ext">external</span><br><span class="event-desc">Old Norse contact begins. Over next 200 years, Norse settlers in the Danelaw contribute pronouns (they/them/their), everyday vocabulary, and accelerate inflectional erosion.</span></div>
    </div>
    <div class="event-row">
      <div class="event-date" style="color:#dc2626;">c. 900</div>
      <div class="event-body"><span class="event-title">Inflection erosion begins in the north</span> <span class="event-tag tag-struct">structural</span><br><span class="event-desc">Norse-English contact accelerates loss of case/gender endings in Danelaw; spreads southward over following centuries.</span></div>
    </div>
    <div class="event-row">
      <div class="event-date" style="color:#f59e0b;">1066</div>
      <div class="event-body"><span class="event-title">Norman Conquest</span> <span class="event-tag tag-ext">external</span><br><span class="event-desc">French replaces English as prestige language for ~200 years. ~10,000 French words enter English, creating the three-tier vocabulary system.</span></div>
    </div>
    <div class="event-row">
      <div class="event-date" style="color:#f59e0b;">c. 1200</div>
      <div class="event-body"><span class="event-title">Grammatical gender collapses</span> <span class="event-tag tag-struct">structural</span><br><span class="event-desc">Three-gender system (M/F/N) replaced by natural gender. Case system reduced to near-modern levels. SVO solidifying as dominant word order.</span></div>
    </div>
    <div class="event-row">
      <div class="event-date" style="color:#f59e0b;">c. 1400</div>
      <div class="event-body"><span class="event-title">Great Vowel Shift begins</span> <span class="event-tag tag-phon">phonological</span><br><span class="event-desc">All 7 long vowels begin systematic upward shift. Will continue for ~300 years, creating the spelling-pronunciation divorce.</span></div>
    </div>
    <div class="event-row">
      <div class="event-date" style="color:#3b82f6;">1476</div>
      <div class="event-body"><span class="event-title">Caxton's printing press</span> <span class="event-tag tag-ext">external</span><br><span class="event-desc">Spelling standardized mid-vowel-shift. Spelling freezes at ME pronunciation while sounds keep changing -- the "spelling catastrophe."</span></div>
    </div>
    <div class="event-row">
      <div class="event-date" style="color:#3b82f6;">c. 1550</div>
      <div class="event-body"><span class="event-title">Inkhorn controversy / Latin-Greek flood</span> <span class="event-tag tag-vocab">vocabulary</span><br><span class="event-desc">Renaissance borrowing cements the three-tier lexicon: Germanic base (ask), French overlay (question), Latin/Greek learned layer (interrogate).</span></div>
    </div>
    <div class="event-row">
      <div class="event-date" style="color:#3b82f6;">c. 1600</div>
      <div class="event-body"><span class="event-title">Shakespeare's English / thou dying</span> <span class="event-tag tag-struct">structural</span><br><span class="event-desc">Do-support becoming obligatory. Thou/thee fading. Third-person -eth yielding to -s. Multiple negation departing standard English.</span></div>
    </div>
    <div class="event-row">
      <div class="event-date" style="color:#22c55e;">1755</div>
      <div class="event-body"><span class="event-title">Johnson's Dictionary</span> <span class="event-tag tag-ext">external</span><br><span class="event-desc">42,773 entries standardize spelling and meaning. First comprehensive English dictionary.</span></div>
    </div>
    <div class="event-row">
      <div class="event-date" style="color:#22c55e;">1762</div>
      <div class="event-body"><span class="event-title">Lowth's prescriptive grammar</span> <span class="event-tag tag-struct">structural</span><br><span class="event-desc">Latin-modeled rules: no preposition stranding, no double negatives. Creates lasting prescriptive/descriptive tension.</span></div>
    </div>
    <div class="event-row">
      <div class="event-date" style="color:#22c55e;">1828</div>
      <div class="event-body"><span class="event-title">Webster's American Dictionary</span> <span class="event-tag tag-vocab">vocabulary</span><br><span class="event-desc">Codifies American spelling divergence: color, center, traveled. English begins its global split into national varieties.</span></div>
    </div>
  </div>

  <div class="sample-texts">
    <h3>The same idea across 1,000 years</h3>
    <div class="sample-row">
      <div class="sample-period" style="color:#dc2626;">Old English</div>
      <div class="sample-text">Se cyning sealde thaem bisceope thaet sweord.</div>
    </div>
    <div class="sample-row">
      <div class="sample-period" style="color:#f59e0b;">Middle Eng.</div>
      <div class="sample-text">The king yaf the bisshop the swerd.</div>
    </div>
    <div class="sample-row">
      <div class="sample-period" style="color:#3b82f6;">Early Modern</div>
      <div class="sample-text">The king gave the bishop the sword.</div>
    </div>
    <div class="sample-row">
      <div class="sample-period" style="color:#22c55e;">Modern</div>
      <div class="sample-text">The king gave the bishop the sword.</div>
    </div>
  </div>

  <figcaption>
    <strong>Figure 1 -- English Language Timeline: Old English to Modern English</strong>
    <span>Key external events (invasions, printing press, dictionaries) mapped alongside structural consequences (inflection loss, word order change, vowel shift, vocabulary layering). Color-coded by period; tags mark event type.</span>
  </figcaption>
</figure>
</body>
</html>
