<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Translation Movement -- Knowledge Flow Across Languages</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --accent: #4361ee; --accent-light: #e8edff;
    --source: #8b5cf6; --source-bg: #ede9fe;
    --arabic: #3b82f6; --arabic-bg: #dbeafe;
    --latin: #f59e0b; --latin-bg: #fef3c7;
    --euro: #10b981; --euro-bg: #d1fae5;
    --en: #10b981; --en-bg: #d1fae5;
    --muted: #6c757d; --caption-bg: #f8f9fa;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a; --fg: #e8e8f0; --surface: #1a1a2e; --border: #2d2d44;
      --accent: #6b8aff; --accent-light: #1e2a4a;
      --source: #a78bfa; --source-bg: #3b2d6b;
      --arabic: #60a5fa; --arabic-bg: #1e3a5f;
      --latin: #fbbf24; --latin-bg: #78350f;
      --euro: #34d399; --euro-bg: #064e3b;
      --en: #34d399; --en-bg: #064e3b;
      --muted: #9a9ab0; --caption-bg: #1a1a2e;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--fg); display: flex; justify-content: center; padding: 2rem 1rem; line-height: 1.6; }
  figure { max-width: 1100px; width: 100%; }
  .diagram-container { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 1.5rem 1rem; overflow-x: auto; }
  figcaption { text-align: center; margin-top: 1.5rem; padding: 1rem 1.5rem; background: var(--caption-bg); border-radius: 8px; border: 1px solid var(--border); }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  svg { display: block; margin: 0 auto; }
  .title-text { font: bold 15px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
  .label { font: 11px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
  .label-bold { font: bold 11px 'Segoe UI', system-ui, sans-serif; }
  .label-sm { font: 10px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
  .section-title { font: bold 13px 'Segoe UI', system-ui, sans-serif; }
</style>
</head>
<body>
<figure>
  <div class="diagram-container">
    <svg viewBox="0 0 1060 780" xmlns="http://www.w3.org/2000/svg" style="min-width:750px;">
      <defs>
        <marker id="arrR" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="var(--accent)"/></marker>
        <marker id="arrAr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="var(--arabic)"/></marker>
      </defs>

      <text x="530" y="28" text-anchor="middle" class="title-text" style="font-size:16px;">The Translation Movement: Knowledge Flow Across Languages</text>
      <text x="530" y="46" text-anchor="middle" class="label-sm" style="font-size:11px;">Arabic was not merely a conduit -- Arabic-language scholars added original contributions at every stage</text>

      <!-- STAGE 1: SOURCE LANGUAGES -->
      <text x="105" y="80" text-anchor="middle" class="section-title" fill="var(--source)">SOURCE LANGUAGES</text>
      <text x="105" y="95" text-anchor="middle" class="label-sm">~300 BCE - 600 CE</text>

      <rect x="30" y="105" width="150" height="40" rx="6" fill="var(--source-bg)" stroke="var(--source)" stroke-width="1.5"/>
      <text x="105" y="123" text-anchor="middle" class="label-bold" fill="var(--source)">Greek</text>
      <text x="105" y="138" text-anchor="middle" class="label-sm">Philosophy, medicine, math</text>

      <rect x="30" y="152" width="150" height="40" rx="6" fill="var(--source-bg)" stroke="var(--source)" stroke-width="1.5"/>
      <text x="105" y="170" text-anchor="middle" class="label-bold" fill="var(--source)">Persian</text>
      <text x="105" y="185" text-anchor="middle" class="label-sm">Administration, literature</text>

      <rect x="30" y="199" width="150" height="40" rx="6" fill="var(--source-bg)" stroke="var(--source)" stroke-width="1.5"/>
      <text x="105" y="217" text-anchor="middle" class="label-bold" fill="var(--source)">Sanskrit</text>
      <text x="105" y="232" text-anchor="middle" class="label-sm">Mathematics, astronomy</text>

      <rect x="30" y="246" width="150" height="40" rx="6" fill="var(--source-bg)" stroke="var(--source)" stroke-width="1.5"/>
      <text x="105" y="264" text-anchor="middle" class="label-bold" fill="var(--source)">Syriac</text>
      <text x="105" y="279" text-anchor="middle" class="label-sm">Christian scholarship</text>

      <!-- Arrows from sources to Arabic -->
      <line x1="180" y1="125" x2="290" y2="180" stroke="var(--source)" stroke-width="1.5" marker-end="url(#arrR)"/>
      <line x1="180" y1="172" x2="290" y2="190" stroke="var(--source)" stroke-width="1.5" marker-end="url(#arrR)"/>
      <line x1="180" y1="219" x2="290" y2="205" stroke="var(--source)" stroke-width="1.5" marker-end="url(#arrR)"/>
      <line x1="180" y1="266" x2="290" y2="215" stroke="var(--source)" stroke-width="1.5" marker-end="url(#arrR)"/>

      <!-- STAGE 2: ARABIC PROCESSING -->
      <rect x="300" y="80" width="400" height="240" rx="10" fill="var(--arabic-bg)" stroke="var(--arabic)" stroke-width="2.5"/>
      <text x="500" y="100" text-anchor="middle" class="section-title" fill="var(--arabic)">ARABIC PROCESSING (8th-13th Century)</text>
      <text x="500" y="115" text-anchor="middle" class="label-sm" fill="var(--arabic)">House of Wisdom, Baghdad | Translation + Original Contribution</text>

      <!-- Key translator -->
      <rect x="315" y="125" width="175" height="50" rx="5" fill="var(--surface)" stroke="var(--arabic)" stroke-width="1"/>
      <text x="403" y="142" text-anchor="middle" class="label-bold" fill="var(--arabic)">Hunayn ibn Ishaq</text>
      <text x="403" y="155" text-anchor="middle" class="label-sm">(809-873) Nestorian Christian</text>
      <text x="403" y="168" text-anchor="middle" class="label-sm">Most productive translator</text>

      <!-- Original contributions -->
      <text x="315" y="195" class="label-bold" fill="var(--arabic)">ORIGINAL CONTRIBUTIONS ADDED:</text>
      <text x="315" y="210" class="label" fill="var(--fg)">al-Khwarizmi: algebra, algorithm</text>
      <text x="315" y="225" class="label" fill="var(--fg)">Ibn al-Haytham: optics, experiment</text>
      <text x="315" y="240" class="label" fill="var(--fg)">Ibn Sina: Canon of Medicine</text>
      <text x="315" y="255" class="label" fill="var(--fg)">Ibn Rushd: Aristotelian philosophy</text>
      <text x="315" y="270" class="label" fill="var(--fg)">Jabir ibn Hayyan: chemistry</text>

      <!-- Key patron -->
      <rect x="510" y="125" width="175" height="50" rx="5" fill="var(--surface)" stroke="var(--arabic)" stroke-width="1"/>
      <text x="598" y="142" text-anchor="middle" class="label-bold" fill="var(--arabic)">Caliph al-Ma'mun</text>
      <text x="598" y="155" text-anchor="middle" class="label-sm">(r. 813-833)</text>
      <text x="598" y="168" text-anchor="middle" class="label-sm">Expanded House of Wisdom</text>

      <!-- Vocabulary note -->
      <rect x="510" y="190" width="180" height="118" rx="5" fill="var(--surface)" stroke="var(--arabic)" stroke-width="1"/>
      <text x="520" y="208" class="label-bold" fill="var(--arabic)">VOCABULARY CREATED:</text>
      <text x="520" y="223" class="label" fill="var(--fg)">jabr (algebra) from j-b-r</text>
      <text x="520" y="238" class="label" fill="var(--fg)">sifr (zero) from s-f-r</text>
      <text x="520" y="253" class="label" fill="var(--fg)">falsafa (philosophy)</text>
      <text x="520" y="268" class="label" fill="var(--fg)">mantiq (logic)</text>
      <text x="520" y="283" class="label-sm" fill="var(--arabic)">Root system generated science terms</text>

      <!-- Arrows from Arabic to Latin -->
      <line x1="700" y1="190" x2="760" y2="190" stroke="var(--arabic)" stroke-width="2" marker-end="url(#arrAr)"/>

      <!-- STAGE 3: LATIN TRANSMISSION -->
      <rect x="770" y="80" width="250" height="160" rx="10" fill="var(--latin-bg)" stroke="var(--latin)" stroke-width="2"/>
      <text x="895" y="100" text-anchor="middle" class="section-title" fill="var(--latin)">LATIN TRANSMISSION</text>
      <text x="895" y="115" text-anchor="middle" class="label-sm" fill="var(--latin)">12th-13th Century</text>

      <text x="785" y="135" class="label-bold" fill="var(--latin)">Translation centers:</text>
      <text x="785" y="150" class="label" fill="var(--fg)">Toledo (Spain) -- Gerard of Cremona</text>
      <text x="785" y="165" class="label" fill="var(--fg)">Sicily -- Frederick II's court</text>
      <text x="785" y="180" class="label" fill="var(--fg)">Southern France -- Montpellier</text>

      <text x="785" y="200" class="label-bold" fill="var(--latin)">Arabic terms that stuck:</text>
      <text x="785" y="215" class="label" fill="var(--fg)">algebra, algorithm, cipher, zenith</text>
      <text x="785" y="228" class="label" fill="var(--fg)">nadir, alchemy, alcohol, almanac</text>

      <!-- Arrow to European vernaculars -->
      <line x1="895" y1="240" x2="895" y2="280" stroke="var(--latin)" stroke-width="2" marker-end="url(#arrR)"/>

      <!-- STAGE 4: EUROPEAN LANGUAGES -->
      <rect x="770" y="285" width="250" height="70" rx="8" fill="var(--euro-bg)" stroke="var(--euro)" stroke-width="2"/>
      <text x="895" y="308" text-anchor="middle" class="section-title" fill="var(--euro)">EUROPEAN VERNACULARS</text>
      <text x="895" y="325" text-anchor="middle" class="label" fill="var(--fg)">14th-17th C: Renaissance</text>
      <text x="895" y="340" text-anchor="middle" class="label-sm">Foundation of European scientific tradition</text>

      <!-- Arrow to modern science -->
      <line x1="895" y1="355" x2="895" y2="385" stroke="var(--euro)" stroke-width="2" marker-end="url(#arrR)"/>

      <rect x="810" y="390" width="170" height="35" rx="17" fill="var(--euro)" opacity="0.8"/>
      <text x="895" y="412" text-anchor="middle" class="label-bold" style="font-size:12px;" fill="white">MODERN SCIENCE</text>

      <!-- KNOWLEDGE DOMAINS flowing through -->
      <rect x="30" y="360" width="700" height="80" rx="8" fill="var(--accent-light)" stroke="var(--accent)" stroke-width="1.5"/>
      <text x="380" y="382" text-anchor="middle" class="section-title" fill="var(--accent)">Knowledge Domains Transmitted</text>
      <rect x="50" y="395" width="100" height="30" rx="4" fill="var(--surface)" stroke="var(--accent)" stroke-width="1"/>
      <text x="100" y="414" text-anchor="middle" class="label-bold" fill="var(--accent)">Mathematics</text>
      <rect x="160" y="395" width="100" height="30" rx="4" fill="var(--surface)" stroke="var(--accent)" stroke-width="1"/>
      <text x="210" y="414" text-anchor="middle" class="label-bold" fill="var(--accent)">Medicine</text>
      <rect x="270" y="395" width="100" height="30" rx="4" fill="var(--surface)" stroke="var(--accent)" stroke-width="1"/>
      <text x="320" y="414" text-anchor="middle" class="label-bold" fill="var(--accent)">Optics</text>
      <rect x="380" y="395" width="100" height="30" rx="4" fill="var(--surface)" stroke="var(--accent)" stroke-width="1"/>
      <text x="430" y="414" text-anchor="middle" class="label-bold" fill="var(--accent)">Philosophy</text>
      <rect x="490" y="395" width="100" height="30" rx="4" fill="var(--surface)" stroke="var(--accent)" stroke-width="1"/>
      <text x="540" y="414" text-anchor="middle" class="label-bold" fill="var(--accent)">Astronomy</text>
      <rect x="600" y="395" width="100" height="30" rx="4" fill="var(--surface)" stroke="var(--accent)" stroke-width="1"/>
      <text x="650" y="414" text-anchor="middle" class="label-bold" fill="var(--accent)">Chemistry</text>

      <!-- PATTERN BOX -->
      <rect x="30" y="465" width="1000" height="55" rx="8" fill="var(--arabic-bg)" stroke="var(--arabic)" stroke-width="2"/>
      <text x="530" y="487" text-anchor="middle" class="label-bold" style="font-size:12px;" fill="var(--arabic)">THE PATTERN: Arabic as Processing Engine, Not Just Conduit</text>
      <text x="530" y="505" text-anchor="middle" class="label" fill="var(--fg)">Arabic-language scholars did not just translate -- they corrected, extended, and made original contributions.</text>
      <text x="530" y="517" text-anchor="middle" class="label" fill="var(--fg)">Ibn Sina's Canon was used in European medical schools for ~600 years. This was creation, not just preservation.</text>

      <!-- ENGLISH COMPARISON -->
      <rect x="30" y="535" width="1000" height="55" rx="8" fill="var(--en-bg)" stroke="var(--en)" stroke-width="1.5"/>
      <text x="530" y="555" text-anchor="middle" class="label-bold" fill="var(--en)">ENGLISH COMPARISON: Mirror Trajectory</text>
      <text x="530" y="572" text-anchor="middle" class="label" fill="var(--fg)">English became the world language of science only in the 20th century (replacing French and German).</text>
      <text x="530" y="585" text-anchor="middle" class="label" fill="var(--fg)">Arabic held that role from the 8th to the 13th century -- a 500-year reign. The parallel is precise.</text>

    </svg>
  </div>
  <figcaption>
    <h2>The Translation Movement: Knowledge Flow Across Languages</h2>
    <p>The Abbasid-era Translation Movement (8th-13th century) transformed Arabic into the world's primary language of science. Greek, Persian, Sanskrit, and Syriac texts were translated into Arabic, where scholars like al-Khwarizmi, Ibn Sina, and Ibn al-Haytham made original contributions. This knowledge was then transmitted to Europe through Latin translation, forming the foundation of the European Renaissance.</p>
  </figcaption>
</figure>
</body>
</html>
