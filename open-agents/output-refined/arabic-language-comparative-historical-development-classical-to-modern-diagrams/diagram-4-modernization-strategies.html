<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arabic Vocabulary Modernization Strategies</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --accent: #4361ee; --accent-light: #e8edff;
    --s1: #3b82f6; --s1-bg: #dbeafe;
    --s2: #f59e0b; --s2-bg: #fef3c7;
    --s3: #8b5cf6; --s3-bg: #ede9fe;
    --s4: #14b8a6; --s4-bg: #ccfbf1;
    --win: #10b981; --lose: #ef4444;
    --en: #10b981; --en-bg: #d1fae5;
    --muted: #6c757d; --caption-bg: #f8f9fa;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a; --fg: #e8e8f0; --surface: #1a1a2e; --border: #2d2d44;
      --accent: #6b8aff; --accent-light: #1e2a4a;
      --s1: #60a5fa; --s1-bg: #1e3a5f;
      --s2: #fbbf24; --s2-bg: #78350f;
      --s3: #a78bfa; --s3-bg: #3b2d6b;
      --s4: #2dd4bf; --s4-bg: #134e4a;
      --win: #34d399; --lose: #f87171;
      --en: #34d399; --en-bg: #064e3b;
      --muted: #9a9ab0; --caption-bg: #1a1a2e;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--fg); display: flex; justify-content: center; padding: 2rem 1rem; line-height: 1.6; }
  figure { max-width: 1100px; width: 100%; }
  .diagram-container { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 1.5rem 1rem; overflow-x: auto; }
  figcaption { text-align: center; margin-top: 1.5rem; padding: 1rem 1.5rem; background: var(--caption-bg); border-radius: 8px; border: 1px solid var(--border); }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  h3 { text-align: center; font-size: 1rem; color: var(--accent); margin-bottom: 1rem; }
  .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
  @media (max-width: 700px) { .grid { grid-template-columns: 1fr; } }
  .strategy-card { border-radius: 8px; padding: 1rem; border-width: 2px; border-style: solid; }
  .strategy-card h4 { font-size: 0.95rem; margin-bottom: 0.5rem; }
  .strategy-card p { font-size: 0.82rem; margin-bottom: 0.4rem; color: var(--fg); }
  .strategy-card .example { font-size: 0.85rem; font-weight: 600; margin: 0.3rem 0; }
  .strategy-card .root-note { font-size: 0.78rem; color: var(--muted); font-style: italic; }
  .battle-table { width: 100%; border-collapse: collapse; font-size: 0.83rem; margin-bottom: 1rem; min-width: 600px; }
  .battle-table th { padding: 0.5rem; text-align: center; background: var(--accent-light); color: var(--accent); border: 1px solid var(--border); font-weight: 600; }
  .battle-table td { padding: 0.5rem; text-align: center; border: 1px solid var(--border); }
  .battle-table .won { font-weight: 700; }
  .pattern-box { background: var(--accent-light); border: 1px solid var(--accent); border-radius: 8px; padding: 1rem 1.5rem; margin: 1rem 0; }
  .pattern-box h4 { color: var(--accent); font-size: 0.95rem; margin-bottom: 0.5rem; }
  .pattern-box p { font-size: 0.85rem; margin-bottom: 0.3rem; }
  .en-box { background: var(--en-bg); border: 1px solid var(--en); border-radius: 8px; padding: 1rem 1.5rem; margin: 1rem 0; }
  .en-box h4 { color: var(--en); font-size: 0.95rem; margin-bottom: 0.5rem; }
  .en-box p { font-size: 0.85rem; margin-bottom: 0.3rem; }
  .overflow-x { overflow-x: auto; }
</style>
</head>
<body>
<figure>
  <div class="diagram-container">
    <h3>Arabic Vocabulary Modernization Strategies (Nahda, 19th C. - Present)</h3>

    <div class="grid">
      <div class="strategy-card" style="background:var(--s1-bg);border-color:var(--s1);">
        <h4 style="color:var(--s1);">Strategy 1: Root-Based Coinage (Ishtiqaq)</h4>
        <p>Create new words using the existing root system -- the Arabic-native approach.</p>
        <p class="example" style="color:var(--s1);">ta'ira (airplane) from t-y-r = to fly</p>
        <p class="example" style="color:var(--s1);">jarida (newspaper) from j-r-d = to strip/peel</p>
        <p class="example" style="color:var(--s1);">hatif (telephone) from h-t-f = to call out</p>
        <p class="example" style="color:var(--s1);">hasub (computer) from h-s-b = to count</p>
        <p class="root-note">PRESERVES the generative system. Each coinage follows existing patterns.</p>
      </div>

      <div class="strategy-card" style="background:var(--s2-bg);border-color:var(--s2);">
        <h4 style="color:var(--s2);">Strategy 2: Arabization / Borrowing (Ta'rib)</h4>
        <p>Adapt foreign words to Arabic phonology and script.</p>
        <p class="example" style="color:var(--s2);">tilifun (telephone) -- direct sound adaptation</p>
        <p class="example" style="color:var(--s2);">tiliviziyun (television)</p>
        <p class="example" style="color:var(--s2);">kumbiyutar (computer) -- competes with hasub</p>
        <p class="example" style="color:var(--s2);">hashtag -> hashtaj</p>
        <p class="root-note">BREAKS the generative system. No root decomposition possible.</p>
      </div>

      <div class="strategy-card" style="background:var(--s3-bg);border-color:var(--s3);">
        <h4 style="color:var(--s3);">Strategy 3: Semantic Extension</h4>
        <p>Give existing Arabic words new meanings for modern concepts.</p>
        <p class="example" style="color:var(--s3);">sayyara (car) -- originally "moving thing" from s-y-r</p>
        <p class="example" style="color:var(--s3);">qitar (train) -- originally "caravan/procession"</p>
        <p class="example" style="color:var(--s3);">shabaka (internet network) from sh-b-k = to weave</p>
        <p class="example" style="color:var(--s3);">barid iliktruni (email) = electronic mail</p>
        <p class="root-note">PRESERVES the root connection while extending meaning.</p>
      </div>

      <div class="strategy-card" style="background:var(--s4-bg);border-color:var(--s4);">
        <h4 style="color:var(--s4);">Strategy 4: Calquing (Translation)</h4>
        <p>Translate foreign compound terms word-by-word into Arabic.</p>
        <p class="example" style="color:var(--s4);">mahattat al-qitar (train station = station of the train)</p>
        <p class="example" style="color:var(--s4);">kurat al-qadam (football = ball of the foot)</p>
        <p class="example" style="color:var(--s4);">mukhtalif al-ra'y (dissenter = differing of opinion)</p>
        <p class="example" style="color:var(--s4);">al-dhaka' al-istina'i (artificial intelligence)</p>
        <p class="root-note">PRESERVES Arabic structure; each component word has a root.</p>
      </div>
    </div>

    <h3>Which Strategy Won? Concept-by-Concept Results</h3>

    <div class="overflow-x">
    <table class="battle-table">
      <thead>
        <tr>
          <th>Modern Concept</th>
          <th style="color:var(--s1);">Root Coinage</th>
          <th style="color:var(--s2);">Borrowing</th>
          <th style="color:var(--s3);">Semantic Ext.</th>
          <th>Winner in Use</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>Airplane</td>
          <td class="won" style="color:var(--win);">ta'ira (t-y-r)</td>
          <td style="color:var(--muted);">--</td>
          <td style="color:var(--muted);">--</td>
          <td style="color:var(--s1);font-weight:700;">ROOT COINAGE</td>
        </tr>
        <tr>
          <td>Computer</td>
          <td style="color:var(--s1);">hasub (h-s-b)</td>
          <td style="color:var(--s2);">kumbiyutar</td>
          <td style="color:var(--muted);">--</td>
          <td style="color:var(--s2);font-weight:700;">SPLIT (formal vs. informal)</td>
        </tr>
        <tr>
          <td>Telephone</td>
          <td style="color:var(--s1);">hatif (h-t-f)</td>
          <td style="color:var(--s2);">tilifun</td>
          <td style="color:var(--muted);">--</td>
          <td style="color:var(--s1);font-weight:700;">ROOT (hatif dominant)</td>
        </tr>
        <tr>
          <td>Car</td>
          <td style="color:var(--muted);">--</td>
          <td style="color:var(--muted);">--</td>
          <td class="won" style="color:var(--win);">sayyara (s-y-r)</td>
          <td style="color:var(--s3);font-weight:700;">SEMANTIC EXT.</td>
        </tr>
        <tr>
          <td>Train</td>
          <td style="color:var(--muted);">--</td>
          <td style="color:var(--muted);">--</td>
          <td class="won" style="color:var(--win);">qitar (q-t-r)</td>
          <td style="color:var(--s3);font-weight:700;">SEMANTIC EXT.</td>
        </tr>
        <tr>
          <td>Television</td>
          <td style="color:var(--s1);">tilfa:z (t-l-f-z)</td>
          <td style="color:var(--s2);">tiliviziyun</td>
          <td style="color:var(--muted);">--</td>
          <td style="color:var(--s2);font-weight:700;">SPLIT (regional variation)</td>
        </tr>
        <tr>
          <td>Internet</td>
          <td style="color:var(--muted);">--</td>
          <td style="color:var(--s2);">intarnit</td>
          <td style="color:var(--s3);">shabaka (sh-b-k)</td>
          <td style="color:var(--s2);font-weight:700;">BORROWING (with shabaka = network)</td>
        </tr>
        <tr>
          <td>Hashtag</td>
          <td style="color:var(--muted);">--</td>
          <td class="won" style="color:var(--win);">hashtaj</td>
          <td style="color:var(--muted);">--</td>
          <td style="color:var(--s2);font-weight:700;">BORROWING (too fast for academies)</td>
        </tr>
      </tbody>
    </table>
    </div>

    <div class="pattern-box">
      <h4>THE PATTERN: Speed vs. System Preservation</h4>
      <p><strong>Root coinage wins</strong> when the academy coinages are elegant and adopted early (ta'ira, hatif). These terms feel "natively Arabic" and integrate into the root system.</p>
      <p><strong>Borrowing wins</strong> when technology moves faster than the academies (hashtag, internet) or when the borrowed form becomes entrenched through media.</p>
      <p><strong>Semantic extension wins</strong> for physical objects that can be named by function (sayyara = "the moving thing," qitar = "the procession").</p>
      <p><strong>The tension:</strong> root-based coinage preserves the generative system; borrowing breaks it. Each borrowed word is a dead end -- it cannot generate derivatives through the pattern system. Each root coinage is a seed -- it can generate a full word family.</p>
    </div>

    <div class="en-box">
      <h4>ENGLISH COMPARISON: No Gatekeeping, Pure Borrowing</h4>
      <p>English has no language academy and no institutional resistance to borrowing. English just absorbs: "computer" (Latin computare), "television" (Greek tele + Latin visio), "robot" (Czech), "algorithm" (Arabic al-Khwarizmi's name). No attempt to coin from native roots.</p>
      <p>Arabic TRIES to preserve its root system by coining native terms. The very existence of this tension -- between borrowing and root coinage -- reflects Arabic's generative architecture. English has nothing to preserve because it has no equivalent generative system.</p>
    </div>
  </div>
  <figcaption>
    <h2>Arabic Vocabulary Modernization Strategies</h2>
    <p>The Nahda (19th century) and modern Arabic use four strategies to create vocabulary for new concepts: root-based coinage, Arabization/borrowing, semantic extension, and calquing. Root-based coinage preserves the generative root-and-pattern system; borrowing breaks it. The ongoing tension between these strategies is the central dynamic of Arabic modernization, with no English equivalent since English has no root system to preserve.</p>
  </figcaption>
</figure>
</body>
</html>
