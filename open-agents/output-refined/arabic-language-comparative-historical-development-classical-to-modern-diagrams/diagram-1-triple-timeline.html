<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arabic vs. English vs. French Historical Development</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --accent: #4361ee; --accent-light: #e8edff;
    --ar: #3b82f6; --ar-bg: #dbeafe;
    --en: #10b981; --en-bg: #d1fae5;
    --fr: #8b5cf6; --fr-bg: #ede9fe;
    --event: #f59e0b; --event-bg: #fef3c7;
    --muted: #6c757d; --caption-bg: #f8f9fa;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a; --fg: #e8e8f0; --surface: #1a1a2e; --border: #2d2d44;
      --accent: #6b8aff; --accent-light: #1e2a4a;
      --ar: #60a5fa; --ar-bg: #1e3a5f;
      --en: #34d399; --en-bg: #064e3b;
      --fr: #a78bfa; --fr-bg: #3b2d6b;
      --event: #fbbf24; --event-bg: #78350f;
      --muted: #9a9ab0; --caption-bg: #1a1a2e;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--fg); display: flex; justify-content: center; padding: 2rem 1rem; line-height: 1.6; }
  figure { max-width: 1100px; width: 100%; }
  .diagram-container { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 1.5rem 1rem; overflow-x: auto; }
  figcaption { text-align: center; margin-top: 1.5rem; padding: 1rem 1.5rem; background: var(--caption-bg); border-radius: 8px; border: 1px solid var(--border); }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  svg { display: block; margin: 0 auto; }
  .title-text { font: bold 15px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
  .label { font: 11px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
  .label-bold { font: bold 11px 'Segoe UI', system-ui, sans-serif; }
  .label-sm { font: 10px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
  .era-label { font: bold 10px 'Segoe UI', system-ui, sans-serif; }
</style>
</head>
<body>
<figure>
  <div class="diagram-container">
    <svg viewBox="0 0 1060 900" xmlns="http://www.w3.org/2000/svg" style="min-width:800px;">

      <text x="530" y="25" text-anchor="middle" class="title-text" style="font-size:16px;">Arabic vs. English vs. French: Historical Development Compared</text>
      <text x="530" y="43" text-anchor="middle" class="label-sm" style="font-size:11px;">Three languages, three trajectories -- Arabic has the most continuous grammatical tradition</text>

      <!-- Legend -->
      <rect x="60" y="55" width="12" height="12" rx="2" fill="var(--ar)"/>
      <text x="78" y="65" class="label-sm" fill="var(--ar)">Arabic</text>
      <rect x="140" y="55" width="12" height="12" rx="2" fill="var(--en)"/>
      <text x="158" y="65" class="label-sm" fill="var(--en)">English</text>
      <rect x="220" y="55" width="12" height="12" rx="2" fill="var(--fr)"/>
      <text x="238" y="65" class="label-sm" fill="var(--fr)">French</text>
      <rect x="300" y="55" width="12" height="12" rx="2" fill="var(--event)"/>
      <text x="318" y="65" class="label-sm" fill="var(--event)">Contact / key event</text>

      <!-- TIMELINE AXIS (horizontal) -->
      <line x1="80" y1="95" x2="1020" y2="95" stroke="var(--border)" stroke-width="1"/>
      <!-- Date markers -->
      <text x="100" y="90" text-anchor="middle" class="label-sm">500 CE</text>
      <text x="230" y="90" text-anchor="middle" class="label-sm">700</text>
      <text x="370" y="90" text-anchor="middle" class="label-sm">900</text>
      <text x="500" y="90" text-anchor="middle" class="label-sm">1100</text>
      <text x="630" y="90" text-anchor="middle" class="label-sm">1300</text>
      <text x="760" y="90" text-anchor="middle" class="label-sm">1600</text>
      <text x="890" y="90" text-anchor="middle" class="label-sm">1800</text>
      <text x="990" y="90" text-anchor="middle" class="label-sm">2000</text>

      <!-- Tick marks -->
      <line x1="100" y1="92" x2="100" y2="98" stroke="var(--border)" stroke-width="1"/>
      <line x1="230" y1="92" x2="230" y2="98" stroke="var(--border)" stroke-width="1"/>
      <line x1="370" y1="92" x2="370" y2="98" stroke="var(--border)" stroke-width="1"/>
      <line x1="500" y1="92" x2="500" y2="98" stroke="var(--border)" stroke-width="1"/>
      <line x1="630" y1="92" x2="630" y2="98" stroke="var(--border)" stroke-width="1"/>
      <line x1="760" y1="92" x2="760" y2="98" stroke="var(--border)" stroke-width="1"/>
      <line x1="890" y1="92" x2="890" y2="98" stroke="var(--border)" stroke-width="1"/>
      <line x1="990" y1="92" x2="990" y2="98" stroke="var(--border)" stroke-width="1"/>

      <!-- ARABIC TRACK -->
      <text x="50" y="125" text-anchor="end" class="label-bold" fill="var(--ar)">Arabic</text>
      <line x1="80" y1="125" x2="1010" y2="125" stroke="var(--ar)" stroke-width="3" opacity="0.3"/>

      <!-- Pre-Islamic Poetry -->
      <rect x="80" y="112" width="120" height="26" rx="4" fill="var(--ar-bg)" stroke="var(--ar)" stroke-width="1.5"/>
      <text x="140" y="129" text-anchor="middle" class="era-label" fill="var(--ar)">Pre-Islamic Poetry</text>
      <text x="140" y="150" text-anchor="middle" class="label-sm" fill="var(--ar)">~500 CE: Mu'allaqat</text>

      <!-- Quran -->
      <rect x="200" y="112" width="80" height="26" rx="4" fill="var(--ar)" opacity="0.8"/>
      <text x="240" y="129" text-anchor="middle" class="era-label" fill="white">Quran</text>
      <text x="240" y="150" text-anchor="middle" class="label-sm" fill="var(--ar)">622-632 CE</text>

      <!-- Sibawayhi -->
      <rect x="300" y="112" width="90" height="26" rx="4" fill="var(--ar-bg)" stroke="var(--ar)" stroke-width="1.5"/>
      <text x="345" y="129" text-anchor="middle" class="era-label" fill="var(--ar)">Sibawayhi</text>
      <text x="345" y="150" text-anchor="middle" class="label-sm" fill="var(--ar)">~760-796: al-Kitab</text>

      <!-- Golden Age -->
      <rect x="330" y="112" width="240" height="26" rx="4" fill="var(--event-bg)" stroke="var(--event)" stroke-width="1.5" opacity="0.6"/>
      <text x="450" y="129" text-anchor="middle" class="era-label" fill="var(--event)">Golden Age: World Language of Science</text>
      <text x="450" y="150" text-anchor="middle" class="label-sm" fill="var(--event)">8th-13th C: House of Wisdom, Translation Movement</text>

      <!-- Fall of Baghdad -->
      <line x1="605" y1="108" x2="605" y2="160" stroke="var(--event)" stroke-width="1.5" stroke-dasharray="3,2"/>
      <text x="605" y="170" text-anchor="middle" class="label-sm" fill="var(--event)">1258: Baghdad falls</text>

      <!-- Nahda -->
      <rect x="860" y="112" width="100" height="26" rx="4" fill="var(--ar-bg)" stroke="var(--ar)" stroke-width="1.5"/>
      <text x="910" y="129" text-anchor="middle" class="era-label" fill="var(--ar)">Nahda</text>
      <text x="910" y="150" text-anchor="middle" class="label-sm" fill="var(--ar)">19th C: Modernization</text>

      <!-- MSA -->
      <rect x="940" y="112" width="70" height="26" rx="4" fill="var(--ar)" opacity="0.8"/>
      <text x="975" y="129" text-anchor="middle" class="era-label" fill="white">MSA</text>

      <!-- ENGLISH TRACK -->
      <text x="50" y="225" text-anchor="end" class="label-bold" fill="var(--en)">English</text>
      <line x1="80" y1="225" x2="1010" y2="225" stroke="var(--en)" stroke-width="3" opacity="0.3"/>

      <!-- Old English -->
      <rect x="100" y="212" width="200" height="26" rx="4" fill="var(--en-bg)" stroke="var(--en)" stroke-width="1.5"/>
      <text x="200" y="229" text-anchor="middle" class="era-label" fill="var(--en)">Old English (Anglo-Saxon)</text>
      <text x="200" y="250" text-anchor="middle" class="label-sm" fill="var(--en)">~450-1066: Beowulf, 4 cases, 3 genders</text>

      <!-- Norman Conquest -->
      <rect x="485" y="212" width="40" height="26" rx="4" fill="var(--event)" opacity="0.9"/>
      <text x="505" y="229" text-anchor="middle" class="era-label" fill="white">1066</text>
      <text x="505" y="250" text-anchor="middle" class="label-sm" fill="var(--event)">Norman Conquest</text>

      <!-- Middle English -->
      <rect x="500" y="212" width="180" height="26" rx="4" fill="var(--en-bg)" stroke="var(--en)" stroke-width="1.5"/>
      <text x="590" y="229" text-anchor="middle" class="era-label" fill="var(--en)">Middle English</text>
      <text x="590" y="250" text-anchor="middle" class="label-sm" fill="var(--en)">1100-1500: Cases lost, French flood</text>

      <!-- Early Modern English -->
      <rect x="700" y="212" width="140" height="26" rx="4" fill="var(--en-bg)" stroke="var(--en)" stroke-width="1.5"/>
      <text x="770" y="229" text-anchor="middle" class="era-label" fill="var(--en)">Early Modern</text>
      <text x="770" y="250" text-anchor="middle" class="label-sm" fill="var(--en)">Shakespeare era</text>

      <!-- Modern English -->
      <rect x="860" y="212" width="150" height="26" rx="4" fill="var(--en)" opacity="0.8"/>
      <text x="935" y="229" text-anchor="middle" class="era-label" fill="white">Modern English</text>
      <text x="935" y="250" text-anchor="middle" class="label-sm" fill="var(--en)">Global language</text>

      <!-- FRENCH TRACK -->
      <text x="50" y="315" text-anchor="end" class="label-bold" fill="var(--fr)">French</text>
      <line x1="80" y1="315" x2="1010" y2="315" stroke="var(--fr)" stroke-width="3" opacity="0.3"/>

      <!-- Proto-Romance / Gallo-Romance -->
      <rect x="80" y="302" width="220" height="26" rx="4" fill="var(--fr-bg)" stroke="var(--fr)" stroke-width="1.5"/>
      <text x="190" y="319" text-anchor="middle" class="era-label" fill="var(--fr)">Gallo-Romance (from Vulgar Latin)</text>
      <text x="190" y="340" text-anchor="middle" class="label-sm" fill="var(--fr)">5th-9th C: Latin in Gaul + Frankish</text>

      <!-- Old French -->
      <rect x="400" y="302" width="200" height="26" rx="4" fill="var(--fr-bg)" stroke="var(--fr)" stroke-width="1.5"/>
      <text x="500" y="319" text-anchor="middle" class="era-label" fill="var(--fr)">Old French</text>
      <text x="500" y="340" text-anchor="middle" class="label-sm" fill="var(--fr)">842-1300: 2 cases -> 0 cases</text>

      <!-- Academie -->
      <rect x="740" y="302" width="60" height="26" rx="4" fill="var(--event-bg)" stroke="var(--fr)" stroke-width="1.5"/>
      <text x="770" y="319" text-anchor="middle" class="era-label" fill="var(--fr)">1635</text>
      <text x="770" y="340" text-anchor="middle" class="label-sm" fill="var(--fr)">Academie francaise</text>

      <!-- Modern French -->
      <rect x="860" y="302" width="150" height="26" rx="4" fill="var(--fr)" opacity="0.8"/>
      <text x="935" y="319" text-anchor="middle" class="era-label" fill="white">Modern French</text>

      <!-- CONTACT EVENTS (cross-timeline) -->
      <!-- Arabic loanwords to English -->
      <line x1="450" y1="150" x2="590" y2="210" stroke="var(--event)" stroke-width="1" stroke-dasharray="4,3"/>
      <text x="530" y="185" text-anchor="middle" class="label-sm" fill="var(--event)">Arabic -> English: algebra, algorithm, zero</text>

      <!-- Arabic -> French via Toledo -->
      <line x1="520" y1="155" x2="520" y2="300" stroke="var(--event)" stroke-width="1" stroke-dasharray="4,3"/>
      <text x="555" y="280" text-anchor="start" class="label-sm" fill="var(--event)">Toledo translations: Arabic -> Latin -> French</text>

      <!-- Norman Conquest: French -> English -->
      <line x1="505" y1="240" x2="505" y2="300" stroke="var(--event)" stroke-width="1.5" stroke-dasharray="4,3"/>
      <text x="510" y="264" text-anchor="start" class="label-sm" fill="var(--event)">10,000+ French words enter English</text>

      <!-- GRAMMATICAL CONTINUITY COMPARISON -->
      <rect x="60" y="380" width="950" height="200" rx="8" fill="var(--surface)" stroke="var(--border)" stroke-width="1.5"/>
      <text x="530" y="405" text-anchor="middle" class="title-text" fill="var(--fg)">Grammatical Continuity Comparison: The Key Pattern</text>

      <!-- Arabic: HIGH continuity -->
      <rect x="80" y="420" width="290" height="145" rx="6" fill="var(--ar-bg)" stroke="var(--ar)" stroke-width="1.5"/>
      <text x="225" y="440" text-anchor="middle" class="label-bold" style="font-size:12px;" fill="var(--ar)">ARABIC: Extraordinary Continuity</text>
      <text x="100" y="458" class="label" fill="var(--fg)">Same root-and-pattern system: 1,500+ years</text>
      <text x="100" y="473" class="label" fill="var(--fg)">Same case system: still taught in MSA</text>
      <text x="100" y="488" class="label" fill="var(--fg)">Same verb forms (I-X): unchanged</text>
      <text x="100" y="503" class="label" fill="var(--fg)">Pre-Islamic poetry: ACCESSIBLE to</text>
      <text x="100" y="516" class="label" fill="var(--fg)">educated modern speakers</text>
      <text x="100" y="535" class="label-bold" fill="var(--ar)">Continuity: 1,200+ years of stable grammar</text>
      <text x="100" y="550" class="label-sm" fill="var(--ar)">Quran guarantees preservation</text>

      <!-- English: LOW continuity -->
      <rect x="390" y="420" width="290" height="145" rx="6" fill="var(--en-bg)" stroke="var(--en)" stroke-width="1.5"/>
      <text x="535" y="440" text-anchor="middle" class="label-bold" style="font-size:12px;" fill="var(--en)">ENGLISH: Radical Transformation</text>
      <text x="410" y="458" class="label" fill="var(--fg)">Lost case system (~11th-12th C.)</text>
      <text x="410" y="473" class="label" fill="var(--fg)">Lost grammatical gender (~12th C.)</text>
      <text x="410" y="488" class="label" fill="var(--fg)">Lost verb inflection (mostly)</text>
      <text x="410" y="503" class="label" fill="var(--fg)">Beowulf (~8th C.): UNINTELLIGIBLE to</text>
      <text x="410" y="516" class="label" fill="var(--fg)">modern speakers without training</text>
      <text x="410" y="535" class="label-bold" fill="var(--en)">Disruption: grammar rebuilt after contact</text>
      <text x="410" y="550" class="label-sm" fill="var(--en)">Norse + French contact reshaped everything</text>

      <!-- French: MEDIUM continuity -->
      <rect x="700" y="420" width="290" height="145" rx="6" fill="var(--fr-bg)" stroke="var(--fr)" stroke-width="1.5"/>
      <text x="845" y="440" text-anchor="middle" class="label-bold" style="font-size:12px;" fill="var(--fr)">FRENCH: Moderate Transformation</text>
      <text x="720" y="458" class="label" fill="var(--fg)">Lost Latin case system (13th-14th C.)</text>
      <text x="720" y="473" class="label" fill="var(--fg)">Kept grammatical gender (2 of 3)</text>
      <text x="720" y="488" class="label" fill="var(--fg)">Kept rich verb conjugation</text>
      <text x="720" y="503" class="label" fill="var(--fg)">Song of Roland (~1100): DIFFICULT but</text>
      <text x="720" y="516" class="label" fill="var(--fg)">partially intelligible with effort</text>
      <text x="720" y="535" class="label-bold" fill="var(--fr)">Middle path: some loss, some retention</text>
      <text x="720" y="550" class="label-sm" fill="var(--fr)">Academie slowed but didn't stop change</text>

      <!-- Bottom pattern summary -->
      <rect x="60" y="600" width="950" height="55" rx="8" fill="var(--accent-light)" stroke="var(--accent)" stroke-width="2"/>
      <text x="530" y="622" text-anchor="middle" class="label-bold" style="font-size:12px;" fill="var(--accent)">THE META-PATTERN: Arabic's Root System Is the Constant Thread</text>
      <text x="530" y="640" text-anchor="middle" class="label" fill="var(--fg)">At every point on the 1,500-year timeline, the root-and-pattern morphological system is present and productive.</text>
      <text x="530" y="652" text-anchor="middle" class="label" fill="var(--fg)">Historical layers are additions TO the system, not replacements OF it. This stability has no English parallel.</text>

    </svg>
  </div>
  <figcaption>
    <h2>Arabic vs. English vs. French: Historical Development Compared</h2>
    <p>Three parallel timelines reveal the fundamental contrast: Arabic maintained extraordinary grammatical continuity over 1,500 years (pre-Islamic poetry is still accessible to modern readers), while English underwent radical transformation (Old English is unintelligible to modern speakers). French falls in between. The root-and-pattern system is the thread that connects all eras of Arabic.</p>
  </figcaption>
</figure>
</body>
</html>
