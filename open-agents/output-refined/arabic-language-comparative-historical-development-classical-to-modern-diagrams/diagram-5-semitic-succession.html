<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Succession of Semitic World Languages</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --accent: #4361ee; --accent-light: #e8edff;
    --akk: #ef4444; --akk-bg: #fee2e2;
    --arm: #f59e0b; --arm-bg: #fef3c7;
    --ar: #3b82f6; --ar-bg: #dbeafe;
    --en: #10b981; --en-bg: #d1fae5;
    --muted: #6c757d; --caption-bg: #f8f9fa;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a; --fg: #e8e8f0; --surface: #1a1a2e; --border: #2d2d44;
      --accent: #6b8aff; --accent-light: #1e2a4a;
      --akk: #f87171; --akk-bg: #5c1a1a;
      --arm: #fbbf24; --arm-bg: #78350f;
      --ar: #60a5fa; --ar-bg: #1e3a5f;
      --en: #34d399; --en-bg: #064e3b;
      --muted: #9a9ab0; --caption-bg: #1a1a2e;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--fg); display: flex; justify-content: center; padding: 2rem 1rem; line-height: 1.6; }
  figure { max-width: 1100px; width: 100%; }
  .diagram-container { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 1.5rem 1rem; overflow-x: auto; }
  figcaption { text-align: center; margin-top: 1.5rem; padding: 1rem 1.5rem; background: var(--caption-bg); border-radius: 8px; border: 1px solid var(--border); }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  svg { display: block; margin: 0 auto; }
  .title-text { font: bold 15px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
  .label { font: 11px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
  .label-bold { font: bold 11px 'Segoe UI', system-ui, sans-serif; }
  .label-sm { font: 10px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
  .bar-label { font: bold 12px 'Segoe UI', system-ui, sans-serif; }
</style>
</head>
<body>
<figure>
  <div class="diagram-container">
    <svg viewBox="0 0 1060 620" xmlns="http://www.w3.org/2000/svg" style="min-width:750px;">

      <text x="530" y="25" text-anchor="middle" class="title-text" style="font-size:16px;">The Succession of Semitic World Languages</text>
      <text x="530" y="43" text-anchor="middle" class="label-sm" style="font-size:11px;">Each succession was driven by POLITICAL power, not linguistic evolution -- each language was fully functional when replaced</text>

      <!-- TIME AXIS -->
      <line x1="100" y1="80" x2="1000" y2="80" stroke="var(--border)" stroke-width="1.5"/>
      <text x="100" y="72" text-anchor="middle" class="label-sm">2500 BCE</text>
      <text x="250" y="72" text-anchor="middle" class="label-sm">1500 BCE</text>
      <text x="400" y="72" text-anchor="middle" class="label-sm">500 BCE</text>
      <text x="550" y="72" text-anchor="middle" class="label-sm">0 CE</text>
      <text x="700" y="72" text-anchor="middle" class="label-sm">700 CE</text>
      <text x="850" y="72" text-anchor="middle" class="label-sm">1400 CE</text>
      <text x="1000" y="72" text-anchor="middle" class="label-sm">2000 CE</text>

      <!-- Tick marks -->
      <line x1="100" y1="77" x2="100" y2="83" stroke="var(--border)" stroke-width="1"/>
      <line x1="250" y1="77" x2="250" y2="83" stroke="var(--border)" stroke-width="1"/>
      <line x1="400" y1="77" x2="400" y2="83" stroke="var(--border)" stroke-width="1"/>
      <line x1="550" y1="77" x2="550" y2="83" stroke="var(--border)" stroke-width="1"/>
      <line x1="700" y1="77" x2="700" y2="83" stroke="var(--border)" stroke-width="1"/>
      <line x1="850" y1="77" x2="850" y2="83" stroke="var(--border)" stroke-width="1"/>
      <line x1="1000" y1="77" x2="1000" y2="83" stroke="var(--border)" stroke-width="1"/>

      <!-- AKKADIAN BAR -->
      <rect x="100" y="100" width="620" height="50" rx="6" fill="var(--akk-bg)" stroke="var(--akk)" stroke-width="2" opacity="0.8"/>
      <text x="410" y="122" text-anchor="middle" class="bar-label" fill="var(--akk)">AKKADIAN (Babylonian / Assyrian)</text>
      <text x="410" y="138" text-anchor="middle" class="label" fill="var(--fg)">~2400 BCE -- ~500 CE | ~2,900 years of use</text>

      <!-- Akkadian details -->
      <rect x="100" y="160" width="300" height="55" rx="5" fill="var(--surface)" stroke="var(--akk)" stroke-width="1"/>
      <text x="115" y="178" class="label-bold" fill="var(--akk)">Key facts:</text>
      <text x="115" y="193" class="label" fill="var(--fg)">Oldest attested Semitic language (~2400 BCE)</text>
      <text x="115" y="206" class="label" fill="var(--fg)">Written in cuneiform script. Language of Babylon.</text>

      <rect x="410" y="160" width="180" height="55" rx="5" fill="var(--surface)" stroke="var(--akk)" stroke-width="1"/>
      <text x="425" y="178" class="label-bold" fill="var(--akk)">Political driver:</text>
      <text x="425" y="193" class="label" fill="var(--fg)">Assyrian & Babylonian</text>
      <text x="425" y="206" class="label" fill="var(--fg)">Empires</text>

      <rect x="600" y="160" width="130" height="55" rx="5" fill="var(--akk-bg)" stroke="var(--akk)" stroke-width="1"/>
      <text x="615" y="178" class="label-bold" fill="var(--akk)">Today:</text>
      <text x="615" y="193" class="label-bold" fill="var(--akk)">EXTINCT</text>
      <text x="615" y="206" class="label-sm">0 speakers</text>

      <!-- ARAMAIC BAR (overlapping) -->
      <rect x="300" y="230" width="430" height="50" rx="6" fill="var(--arm-bg)" stroke="var(--arm)" stroke-width="2" opacity="0.8"/>
      <text x="515" y="252" text-anchor="middle" class="bar-label" fill="var(--arm)">ARAMAIC</text>
      <text x="515" y="268" text-anchor="middle" class="label" fill="var(--fg)">~800 BCE -- ~700 CE as lingua franca | ~1,500 years</text>

      <!-- Aramaic details -->
      <rect x="300" y="290" width="240" height="55" rx="5" fill="var(--surface)" stroke="var(--arm)" stroke-width="1"/>
      <text x="315" y="308" class="label-bold" fill="var(--arm)">Key facts:</text>
      <text x="315" y="323" class="label" fill="var(--fg)">Replaced Akkadian as regional lingua franca</text>
      <text x="315" y="336" class="label" fill="var(--fg)">Language of Jesus. Persian Empire's admin language.</text>

      <rect x="555" y="290" width="170" height="55" rx="5" fill="var(--surface)" stroke="var(--arm)" stroke-width="1"/>
      <text x="570" y="308" class="label-bold" fill="var(--arm)">Political driver:</text>
      <text x="570" y="323" class="label" fill="var(--fg)">Persian Empire adopted</text>
      <text x="570" y="336" class="label" fill="var(--fg)">Aramaic as admin language</text>

      <rect x="740" y="290" width="130" height="55" rx="5" fill="var(--arm-bg)" stroke="var(--arm)" stroke-width="1"/>
      <text x="755" y="308" class="label-bold" fill="var(--arm)">Today:</text>
      <text x="755" y="323" class="label" fill="var(--arm)">~500,000 speakers</text>
      <text x="755" y="336" class="label-sm">Small communities (Syria, Iraq)</text>

      <!-- ARABIC BAR (overlapping, extending to present) -->
      <rect x="680" y="360" width="320" height="50" rx="6" fill="var(--ar-bg)" stroke="var(--ar)" stroke-width="2.5" opacity="0.9"/>
      <text x="840" y="382" text-anchor="middle" class="bar-label" fill="var(--ar)">ARABIC</text>
      <text x="840" y="398" text-anchor="middle" class="label" fill="var(--fg)">~600 CE -- present | 1,400+ years and counting</text>

      <!-- Arabic details -->
      <rect x="680" y="420" width="200" height="55" rx="5" fill="var(--surface)" stroke="var(--ar)" stroke-width="1"/>
      <text x="695" y="438" class="label-bold" fill="var(--ar)">Key facts:</text>
      <text x="695" y="453" class="label" fill="var(--fg)">Replaced Aramaic via Islamic expansion</text>
      <text x="695" y="466" class="label" fill="var(--fg)">Sacred language of 1.8B Muslims</text>

      <rect x="890" y="420" width="110" height="55" rx="5" fill="var(--ar-bg)" stroke="var(--ar)" stroke-width="1.5"/>
      <text x="905" y="438" class="label-bold" fill="var(--ar)">Today:</text>
      <text x="905" y="453" class="label-bold" fill="var(--ar)">400M+ speakers</text>
      <text x="905" y="466" class="label-sm" fill="var(--ar)">Official in 26 countries</text>

      <!-- Succession arrows -->
      <text x="340" y="228" text-anchor="middle" class="label-sm" fill="var(--arm)">Aramaic displaces Akkadian</text>
      <text x="700" y="358" text-anchor="middle" class="label-sm" fill="var(--ar)">Arabic displaces Aramaic</text>

      <!-- PATTERN BOX -->
      <rect x="60" y="490" width="940" height="50" rx="8" fill="var(--accent-light)" stroke="var(--accent)" stroke-width="2"/>
      <text x="530" y="510" text-anchor="middle" class="label-bold" style="font-size:12px;" fill="var(--accent)">THE PATTERN: Political Power Drives Language Succession</text>
      <text x="530" y="527" text-anchor="middle" class="label" fill="var(--fg)">Each language was fully functional when it was replaced. Akkadian didn't "fail" -- the Assyrian/Babylonian empires did. Aramaic didn't "fail" -- Islam brought Arabic political dominance.</text>

      <!-- ENGLISH COMPARISON -->
      <rect x="60" y="555" width="940" height="45" rx="8" fill="var(--en-bg)" stroke="var(--en)" stroke-width="1.5"/>
      <text x="530" y="575" text-anchor="middle" class="label-bold" fill="var(--en)">ENGLISH COMPARISON: English's rise (16th C. -- present) is the same pattern: British Empire then American economic dominance.</text>
      <text x="530" y="590" text-anchor="middle" class="label" fill="var(--fg)">English dominance is driven by political/economic power, not linguistic superiority -- exactly as with Akkadian, Aramaic, and Arabic.</text>

    </svg>
  </div>
  <figcaption>
    <h2>The Succession of Semitic World Languages</h2>
    <p>Three great Semitic languages have dominated the Middle East in succession: Akkadian (~2,900 years), Aramaic (~1,500 years as lingua franca), and Arabic (1,400+ years and counting). Each succession was driven by political power shifts, not by linguistic superiority. Arabic's survival is guaranteed by its status as the sacred language of Islam and the native language of 400+ million people.</p>
  </figcaption>
</figure>
</body>
</html>
