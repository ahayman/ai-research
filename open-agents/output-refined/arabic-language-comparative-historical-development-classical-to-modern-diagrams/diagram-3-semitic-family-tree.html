<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Semitic Language Family Tree</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --accent: #4361ee; --accent-light: #e8edff;
    --arabic: #3b82f6; --arabic-bg: #dbeafe;
    --living: #10b981; --living-bg: #d1fae5;
    --extinct: #ef4444; --extinct-bg: #fee2e2;
    --root: #8b5cf6; --root-bg: #ede9fe;
    --cognate: #f59e0b; --cognate-bg: #fef3c7;
    --en: #10b981; --en-bg: #d1fae5;
    --muted: #6c757d; --caption-bg: #f8f9fa;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a; --fg: #e8e8f0; --surface: #1a1a2e; --border: #2d2d44;
      --accent: #6b8aff; --accent-light: #1e2a4a;
      --arabic: #60a5fa; --arabic-bg: #1e3a5f;
      --living: #34d399; --living-bg: #064e3b;
      --extinct: #f87171; --extinct-bg: #5c1a1a;
      --root: #a78bfa; --root-bg: #3b2d6b;
      --cognate: #fbbf24; --cognate-bg: #78350f;
      --en: #34d399; --en-bg: #064e3b;
      --muted: #9a9ab0; --caption-bg: #1a1a2e;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--fg); display: flex; justify-content: center; padding: 2rem 1rem; line-height: 1.6; }
  figure { max-width: 1100px; width: 100%; }
  .diagram-container { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 1.5rem 1rem; overflow-x: auto; }
  figcaption { text-align: center; margin-top: 1.5rem; padding: 1rem 1.5rem; background: var(--caption-bg); border-radius: 8px; border: 1px solid var(--border); }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  svg { display: block; margin: 0 auto; }
  .title-text { font: bold 15px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
  .label { font: 11px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
  .label-bold { font: bold 11px 'Segoe UI', system-ui, sans-serif; }
  .label-sm { font: 10px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
  .node-label { font: bold 11px 'Segoe UI', system-ui, sans-serif; }
</style>
</head>
<body>
<figure>
  <div class="diagram-container">
    <svg viewBox="0 0 1060 780" xmlns="http://www.w3.org/2000/svg" style="min-width:750px;">

      <text x="530" y="25" text-anchor="middle" class="title-text" style="font-size:16px;">The Semitic Language Family Tree</text>
      <text x="530" y="43" text-anchor="middle" class="label-sm" style="font-size:11px;">Arabic is the largest Semitic language -- more speakers than all other Semitic languages combined</text>

      <!-- Legend -->
      <circle cx="70" cy="60" r="6" fill="var(--living)"/>
      <text x="82" y="64" class="label-sm" fill="var(--living)">Living language</text>
      <circle cx="200" cy="60" r="6" fill="var(--extinct)"/>
      <text x="212" y="64" class="label-sm" fill="var(--extinct)">Extinct</text>
      <circle cx="310" cy="60" r="6" fill="var(--arabic)" stroke="var(--arabic)" stroke-width="2"/>
      <text x="322" y="64" class="label-sm" fill="var(--arabic)">Arabic (focus)</text>
      <rect x="430" y="54" width="12" height="12" rx="2" fill="var(--cognate-bg)" stroke="var(--cognate)" stroke-width="1"/>
      <text x="448" y="64" class="label-sm" fill="var(--cognate)">Shared features</text>

      <!-- ROOT: Proto-Afroasiatic -->
      <rect x="400" y="85" width="260" height="35" rx="6" fill="var(--root-bg)" stroke="var(--root)" stroke-width="2"/>
      <text x="530" y="107" text-anchor="middle" class="node-label" fill="var(--root)">PROTO-AFROASIATIC</text>
      <line x1="530" y1="120" x2="530" y2="140" stroke="var(--root)" stroke-width="1.5"/>

      <!-- Branches from PAA -->
      <line x1="530" y1="140" x2="150" y2="160" stroke="var(--border)" stroke-width="1" stroke-dasharray="3,3"/>
      <line x1="530" y1="140" x2="350" y2="160" stroke="var(--border)" stroke-width="1" stroke-dasharray="3,3"/>
      <line x1="530" y1="140" x2="530" y2="160" stroke="var(--root)" stroke-width="1.5"/>
      <line x1="530" y1="140" x2="710" y2="160" stroke="var(--border)" stroke-width="1" stroke-dasharray="3,3"/>
      <line x1="530" y1="140" x2="900" y2="160" stroke="var(--border)" stroke-width="1" stroke-dasharray="3,3"/>

      <!-- Other Afroasiatic branches (muted) -->
      <rect x="70" y="160" width="160" height="25" rx="4" fill="var(--surface)" stroke="var(--border)" stroke-width="1"/>
      <text x="150" y="177" text-anchor="middle" class="label-sm">Berber (Tamazight)</text>

      <rect x="270" y="160" width="160" height="25" rx="4" fill="var(--surface)" stroke="var(--border)" stroke-width="1"/>
      <text x="350" y="177" text-anchor="middle" class="label-sm">Egyptian (Coptic)</text>

      <rect x="630" y="160" width="160" height="25" rx="4" fill="var(--surface)" stroke="var(--border)" stroke-width="1"/>
      <text x="710" y="177" text-anchor="middle" class="label-sm">Cushitic (Somali, Oromo)</text>

      <rect x="820" y="160" width="160" height="25" rx="4" fill="var(--surface)" stroke="var(--border)" stroke-width="1"/>
      <text x="900" y="177" text-anchor="middle" class="label-sm">Chadic (Hausa)</text>

      <!-- PROTO-SEMITIC -->
      <rect x="430" y="160" width="200" height="35" rx="6" fill="var(--root-bg)" stroke="var(--root)" stroke-width="2"/>
      <text x="530" y="182" text-anchor="middle" class="node-label" fill="var(--root)">PROTO-SEMITIC</text>
      <line x1="530" y1="195" x2="530" y2="220" stroke="var(--root)" stroke-width="1.5"/>

      <!-- Four Semitic branches -->
      <line x1="530" y1="220" x2="130" y2="245" stroke="var(--extinct)" stroke-width="1.5"/>
      <line x1="530" y1="220" x2="370" y2="245" stroke="var(--living)" stroke-width="1.5"/>
      <line x1="530" y1="220" x2="610" y2="245" stroke="var(--arabic)" stroke-width="2.5"/>
      <line x1="530" y1="220" x2="870" y2="245" stroke="var(--living)" stroke-width="1.5"/>

      <!-- EAST SEMITIC -->
      <rect x="40" y="245" width="180" height="30" rx="5" fill="var(--extinct-bg)" stroke="var(--extinct)" stroke-width="1.5"/>
      <text x="130" y="264" text-anchor="middle" class="node-label" fill="var(--extinct)">EAST SEMITIC</text>
      <line x1="130" y1="275" x2="130" y2="300" stroke="var(--extinct)" stroke-width="1"/>
      <rect x="40" y="300" width="180" height="45" rx="5" fill="var(--extinct-bg)" stroke="var(--extinct)" stroke-width="1"/>
      <circle cx="55" cy="315" r="5" fill="var(--extinct)"/>
      <text x="67" y="319" class="node-label" fill="var(--extinct)">Akkadian</text>
      <text x="67" y="335" class="label-sm">(Babylonian/Assyrian)</text>
      <text x="67" y="350" class="label-sm" fill="var(--extinct)">~2400 BCE. EXTINCT</text>

      <!-- NORTHWEST SEMITIC -->
      <rect x="270" y="245" width="200" height="30" rx="5" fill="var(--living-bg)" stroke="var(--living)" stroke-width="1.5"/>
      <text x="370" y="264" text-anchor="middle" class="node-label" fill="var(--living)">NORTHWEST SEMITIC</text>
      <line x1="320" y1="275" x2="320" y2="300" stroke="var(--living)" stroke-width="1"/>
      <line x1="420" y1="275" x2="420" y2="300" stroke="var(--living)" stroke-width="1"/>

      <!-- Hebrew -->
      <rect x="250" y="300" width="140" height="55" rx="5" fill="var(--living-bg)" stroke="var(--living)" stroke-width="1.5"/>
      <circle cx="265" cy="315" r="5" fill="var(--living)"/>
      <text x="277" y="319" class="node-label" fill="var(--living)">Hebrew</text>
      <text x="265" y="335" class="label-sm">~9M speakers (revived)</text>
      <text x="265" y="348" class="label-sm">Shares root system with Arabic</text>

      <!-- Aramaic -->
      <rect x="400" y="300" width="140" height="55" rx="5" fill="var(--living-bg)" stroke="var(--living)" stroke-width="1"/>
      <circle cx="415" cy="315" r="5" fill="var(--living)"/>
      <text x="427" y="319" class="node-label" fill="var(--living)">Aramaic</text>
      <text x="415" y="335" class="label-sm">~500K speakers (small)</text>
      <text x="415" y="348" class="label-sm">Language of Jesus</text>

      <!-- Phoenician (under NW Semitic) -->
      <line x1="370" y1="275" x2="370" y2="360" stroke="var(--extinct)" stroke-width="1" stroke-dasharray="3,2"/>
      <rect x="300" y="360" width="140" height="25" rx="4" fill="var(--extinct-bg)" stroke="var(--extinct)" stroke-width="1"/>
      <text x="370" y="377" text-anchor="middle" class="label-sm" fill="var(--extinct)">Phoenician (EXTINCT)</text>

      <!-- CENTRAL SEMITIC: ARABIC -->
      <rect x="530" y="245" width="160" height="30" rx="5" fill="var(--arabic-bg)" stroke="var(--arabic)" stroke-width="2.5"/>
      <text x="610" y="264" text-anchor="middle" class="node-label" fill="var(--arabic)">CENTRAL SEMITIC</text>
      <line x1="610" y1="275" x2="610" y2="300" stroke="var(--arabic)" stroke-width="2"/>

      <rect x="530" y="300" width="160" height="70" rx="6" fill="var(--arabic-bg)" stroke="var(--arabic)" stroke-width="2.5"/>
      <circle cx="548" cy="318" r="7" fill="var(--arabic)"/>
      <text x="562" y="322" class="node-label" style="font-size:13px;" fill="var(--arabic)">ARABIC</text>
      <text x="545" y="340" class="label-bold" fill="var(--arabic)">~400M+ speakers</text>
      <text x="545" y="355" class="label-sm" fill="var(--arabic)">Largest Semitic language</text>
      <text x="545" y="367" class="label-sm" fill="var(--arabic)">by massive margin</text>

      <!-- SOUTH SEMITIC -->
      <rect x="780" y="245" width="180" height="30" rx="5" fill="var(--living-bg)" stroke="var(--living)" stroke-width="1.5"/>
      <text x="870" y="264" text-anchor="middle" class="node-label" fill="var(--living)">SOUTH SEMITIC</text>
      <line x1="830" y1="275" x2="830" y2="300" stroke="var(--extinct)" stroke-width="1"/>
      <line x1="910" y1="275" x2="910" y2="300" stroke="var(--living)" stroke-width="1"/>

      <!-- Ge'ez -->
      <rect x="770" y="300" width="120" height="40" rx="4" fill="var(--extinct-bg)" stroke="var(--extinct)" stroke-width="1"/>
      <text x="830" y="318" text-anchor="middle" class="label-bold" fill="var(--extinct)">Ge'ez</text>
      <text x="830" y="333" text-anchor="middle" class="label-sm" fill="var(--extinct)">Liturgical. EXTINCT</text>

      <!-- Amharic / Tigrinya -->
      <rect x="895" y="300" width="140" height="55" rx="4" fill="var(--living-bg)" stroke="var(--living)" stroke-width="1"/>
      <circle cx="910" cy="315" r="4" fill="var(--living)"/>
      <text x="920" y="319" class="label-bold" fill="var(--living)">Amharic (~57M)</text>
      <circle cx="910" cy="335" r="4" fill="var(--living)"/>
      <text x="920" y="339" class="label-bold" fill="var(--living)">Tigrinya (~9M)</text>

      <!-- COGNATE EXAMPLES -->
      <rect x="60" y="415" width="940" height="100" rx="8" fill="var(--cognate-bg)" stroke="var(--cognate)" stroke-width="1.5"/>
      <text x="530" y="437" text-anchor="middle" class="label-bold" style="font-size:12px;" fill="var(--cognate)">SHARED SEMITIC PATTERN: Cognate Roots Across Languages</text>

      <text x="100" y="460" class="label-bold" fill="var(--fg)">Concept</text>
      <text x="280" y="460" class="label-bold" fill="var(--arabic)">Arabic</text>
      <text x="440" y="460" class="label-bold" fill="var(--living)">Hebrew</text>
      <text x="600" y="460" class="label-bold" fill="var(--fg)">Root</text>
      <text x="780" y="460" class="label-bold" fill="var(--fg)">Pattern</text>

      <text x="100" y="478" class="label" fill="var(--fg)">Peace</text>
      <text x="280" y="478" class="label" fill="var(--arabic)">salam</text>
      <text x="440" y="478" class="label" fill="var(--living)">shalom</text>
      <text x="600" y="478" class="label" fill="var(--fg)">s-l-m</text>
      <text x="780" y="478" class="label-sm">Same root, same meaning</text>

      <text x="100" y="495" class="label" fill="var(--fg)">Book/Writing</text>
      <text x="280" y="495" class="label" fill="var(--arabic)">kitab</text>
      <text x="440" y="495" class="label" fill="var(--living)">ketav</text>
      <text x="600" y="495" class="label" fill="var(--fg)">k-t-b</text>
      <text x="780" y="495" class="label-sm">Trilateral root shared</text>

      <text x="100" y="512" class="label" fill="var(--fg)">House</text>
      <text x="280" y="512" class="label" fill="var(--arabic)">bayt</text>
      <text x="440" y="512" class="label" fill="var(--living)">bayit</text>
      <text x="600" y="512" class="label" fill="var(--fg)">b-y-t</text>
      <text x="780" y="512" class="label-sm">Nearly identical form</text>

      <!-- PATTERN BOX -->
      <rect x="60" y="535" width="940" height="50" rx="8" fill="var(--accent-light)" stroke="var(--accent)" stroke-width="2"/>
      <text x="530" y="555" text-anchor="middle" class="label-bold" style="font-size:12px;" fill="var(--accent)">THE PATTERN: The Trilateral Root System Is Shared Across ALL Semitic Languages</text>
      <text x="530" y="572" text-anchor="middle" class="label" fill="var(--fg)">Arabic, Hebrew, Aramaic, Akkadian, Amharic -- all use the same root-and-pattern morphological engine. Learning this system in Arabic gives insight into the entire family.</text>

      <!-- ENGLISH COMPARISON -->
      <rect x="60" y="600" width="940" height="60" rx="8" fill="var(--en-bg)" stroke="var(--en)" stroke-width="1.5"/>
      <text x="530" y="620" text-anchor="middle" class="label-bold" fill="var(--en)">ENGLISH COMPARISON: Different Family, Different Trajectory</text>
      <text x="530" y="638" text-anchor="middle" class="label" fill="var(--fg)">English is Indo-European (Germanic branch). Closest relatives: Frisian, Dutch, German.</text>
      <text x="530" y="652" text-anchor="middle" class="label" fill="var(--fg)">But English has LOST most Germanic morphology through contact. Arabic has RETAINED its Semitic morphology. Structural stability contrast is stark.</text>

    </svg>
  </div>
  <figcaption>
    <h2>The Semitic Language Family Tree</h2>
    <p>Arabic belongs to the Central Semitic branch of the Afroasiatic language family. With 400+ million speakers, it is by far the largest Semitic language. The trilateral root system is shared across all Semitic languages -- Arabic salam/Hebrew shalom, Arabic kitab/Hebrew ketav demonstrate transparent cognate relationships maintained over millennia.</p>
  </figcaption>
</figure>
</body>
</html>
