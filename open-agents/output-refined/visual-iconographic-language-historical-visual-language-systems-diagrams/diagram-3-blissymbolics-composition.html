<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blissymbolics Composition: From Primitives to Words</title>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #f8f9fa;
    color: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 2rem;
  }
  figure {
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
    max-width: 1000px;
    width: 100%;
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid #e9ecef;
  }
  figcaption strong {
    display: block;
    font-size: 1.15rem;
    color: #1a1a2e;
    margin-bottom: 0.4rem;
  }
  figcaption span {
    font-size: 0.9rem;
    color: #6c757d;
    line-height: 1.5;
  }
  .mermaid {
    display: flex;
    justify-content: center;
  }
  .legend {
    display: flex;
    justify-content: center;
    gap: 1.5rem;
    margin-top: 1rem;
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.85rem;
    color: #495057;
  }
  .legend-swatch {
    width: 16px;
    height: 16px;
    border-radius: 4px;
  }
  .swatch-primitive { background: #2563eb; }
  .swatch-composed { background: #059669; }
  .swatch-grammar { background: #d97706; }
  .swatch-semantic { background: #7c3aed; }
  @media (prefers-color-scheme: dark) {
    body { background: #1a1a2e; color: #e9ecef; }
    figure { background: #2d2d44; box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
    figcaption { border-top-color: #3d3d5c; }
    figcaption strong { color: #e9ecef; }
    figcaption span { color: #adb5bd; }
    .legend-item { color: #adb5bd; }
  }
</style>
</head>
<body>
<figure>
  <div class="mermaid">
%%{init: {'theme': 'neutral', 'themeVariables': {'fontSize': '13px'}}}%%
flowchart TD
    subgraph PRIMS ["BASE ELEMENTS (~120 geometric primitives)"]
        direction LR
        P1["<b>Line</b><br/>ground/earth"]:::primitive
        P2["<b>Circle</b><br/>sky/sun/cycle"]:::primitive
        P3["<b>Heart</b><br/>feeling/emotion"]:::primitive
        P4["<b>Arrow</b><br/>action/direction"]:::primitive
        P5["<b>Square</b><br/>enclosure/building"]:::primitive
        P6["<b>Pointer</b><br/>person/agent"]:::primitive
    end

    subgraph GRID ["SEMANTIC GRID (vertical position = meaning domain)"]
        direction TB
        SKY["SKY LINE -- abstract, spiritual"]:::semantic
        MID["MIDDLE -- human, social"]:::semantic
        GND["GROUND LINE -- earth, concrete"]:::semantic
    end

    subgraph COMP ["COMPOSITION EXAMPLES"]
        direction TB
        C1["<b>house</b> + <b>medical</b> = <b>HOSPITAL</b>"]:::composed
        C2["<b>feeling</b> + <b>up</b> = <b>HAPPY</b>"]:::composed
        C3["<b>eye</b> + <b>forward-action</b> = <b>TO LOOK</b>"]:::composed
        C4["<b>person</b> + <b>feeling</b> + <b>up</b> = <b>I FEEL HAPPY</b>"]:::composed
    end

    subgraph INDIC ["GRAMMATICAL INDICATORS (supralinear marks)"]
        direction LR
        G1["Small square<br/><b>NOUN</b> marker"]:::grammar
        G2["Small cone<br/><b>VERB</b> marker"]:::grammar
        G3["Inverted cone<br/><b>ADJ</b> marker"]:::grammar
        G4["<b>Tense:</b> ago / now / then"]:::grammar
        G5["<b>Number:</b> prefix"]:::grammar
    end

    PRIMS --> |"Combine left-to-right"| COMP
    GRID --> |"Position encodes domain"| COMP
    INDIC --> |"Mark grammar on compounds"| COMP

    classDef primitive fill:#dbeafe,stroke:#2563eb,stroke-width:2px,color:#1a1a2e
    classDef composed fill:#dcfce7,stroke:#059669,stroke-width:2px,color:#1a1a2e
    classDef grammar fill:#fef3c7,stroke:#d97706,stroke-width:2px,color:#1a1a2e
    classDef semantic fill:#f3e8ff,stroke:#7c3aed,stroke-width:2px,color:#1a1a2e
  </div>
  <div class="legend">
    <div class="legend-item"><div class="legend-swatch swatch-primitive"></div> Base geometric primitives</div>
    <div class="legend-item"><div class="legend-swatch swatch-composed"></div> Composed words</div>
    <div class="legend-item"><div class="legend-swatch swatch-grammar"></div> Grammatical indicators</div>
    <div class="legend-item"><div class="legend-swatch swatch-semantic"></div> Semantic grid zones</div>
  </div>
  <figcaption>
    <strong>Diagram 3: Blissymbolics Composition -- From Primitives to Words</strong>
    <span>Blissymbolics builds complex words from ~120 base geometric elements through left-to-right composition. Vertical position on the grid encodes semantic domain (earth-related at the bottom, abstract at the top). Small supralinear indicators mark grammatical features: noun, verb, adjective, tense, and number. "Happy" is literally composed as "feeling + up" -- a visual expression of the conceptual metaphor HAPPY IS UP. Based on BCI documentation and Jennische (2003).</span>
  </figcaption>
</figure>
<script>
  mermaid.initialize({ startOnLoad: true, securityLevel: 'loose', theme: 'neutral' });
</script>
</body>
</html>
