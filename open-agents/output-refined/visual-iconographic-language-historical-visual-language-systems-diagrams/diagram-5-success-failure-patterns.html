<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Success and Failure Patterns in Visual Language Systems</title>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #f8f9fa;
    color: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 2rem;
  }
  figure {
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
    max-width: 1100px;
    width: 100%;
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid #e9ecef;
  }
  figcaption strong {
    display: block;
    font-size: 1.15rem;
    color: #1a1a2e;
    margin-bottom: 0.4rem;
  }
  figcaption span {
    font-size: 0.9rem;
    color: #6c757d;
    line-height: 1.5;
  }
  .mermaid {
    display: flex;
    justify-content: center;
  }
  .legend {
    display: flex;
    justify-content: center;
    gap: 1.5rem;
    margin-top: 1rem;
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.85rem;
    color: #495057;
  }
  .legend-swatch {
    width: 16px;
    height: 16px;
    border-radius: 4px;
  }
  .swatch-design { background: #2563eb; }
  .swatch-environment { background: #059669; }
  .swatch-success { background: #16a34a; }
  .swatch-failure { background: #dc2626; }
  .swatch-lesson { background: #d97706; }
  @media (prefers-color-scheme: dark) {
    body { background: #1a1a2e; color: #e9ecef; }
    figure { background: #2d2d44; box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
    figcaption { border-top-color: #3d3d5c; }
    figcaption strong { color: #e9ecef; }
    figcaption span { color: #adb5bd; }
    .legend-item { color: #adb5bd; }
  }
</style>
</head>
<body>
<figure>
  <div class="mermaid">
%%{init: {'theme': 'neutral', 'themeVariables': {'fontSize': '12px'}}}%%
flowchart TD
    START["<b>VISUAL LANGUAGE CREATED</b><br/>Creator's goal: universal communication"]:::start

    START --> D1{"Has<br/>compositionality?"}
    D1 -->|"No"| NC["<b>ISOTYPE, Xu Bing</b><br/>Vocabulary without grammar"]:::design
    D1 -->|"Yes"| D2{"Has formal<br/>grammar?"}

    NC --> O1["<b>OUTCOME:</b> Information design<br/>or art success<br/><i>Not a language</i>"]:::success

    D2 -->|"Partial"| PG["<b>LoCoS, Elephant's Memory, Icono</b><br/>Grammar exists but limited"]:::design
    D2 -->|"Yes"| FG["<b>Blissymbolics, Leibniz</b><br/>Full compositional grammar"]:::design

    PG --> D3{"Community<br/>formed?"}
    FG --> D4{"Community<br/>formed?"}

    D3 -->|"No"| O2["<b>OUTCOME:</b> Academic/design<br/>curiosity<br/><i>LoCoS, Elephant's Memory</i>"]:::failure
    D3 -->|"Too early"| O3["<b>OUTCOME:</b> Awaiting testing<br/><i>Icono 2023</i>"]:::pending

    D4 -->|"Never completed"| O4["<b>OUTCOME:</b> Foreshadowed<br/>formal logic<br/><i>Leibniz</i>"]:::failure
    D4 -->|"Yes, but<br/>unintended"| D5{"Meets<br/>practical need?"}

    D5 -->|"Yes -- AAC for<br/>cerebral palsy"| O5["<b>OUTCOME:</b> Domain-restricted<br/>success in AAC<br/><i>Blissymbolics in 33+ countries</i>"]:::success
    D5 -->|"No -- philosophical<br/>ideal only"| O6["<b>OUTCOME:</b> Creator's goal<br/>unachieved<br/><i>Bliss's universal language dream</i>"]:::failure

    subgraph LESSON ["KEY PATTERN"]
        direction TB
        LP["No system achieved its creator's original goal.<br/>Success always came from meeting a <b>practical need</b><br/>the creator did not foresee."]:::lesson
    end

    O1 --> LESSON
    O5 --> LESSON

    classDef start fill:#f3f4f6,stroke:#6b7280,stroke-width:2px,color:#1a1a2e
    classDef design fill:#dbeafe,stroke:#2563eb,stroke-width:2px,color:#1a1a2e
    classDef success fill:#dcfce7,stroke:#16a34a,stroke-width:2px,color:#1a1a2e
    classDef failure fill:#fee2e2,stroke:#dc2626,stroke-width:2px,color:#1a1a2e
    classDef pending fill:#fef3c7,stroke:#d97706,stroke-width:2px,color:#1a1a2e
    classDef lesson fill:#fef3c7,stroke:#d97706,stroke-width:3px,color:#1a1a2e
  </div>
  <div class="legend">
    <div class="legend-item"><div class="legend-swatch swatch-design"></div> Design features</div>
    <div class="legend-item"><div class="legend-swatch swatch-success"></div> Achieved adoption (unexpected domain)</div>
    <div class="legend-item"><div class="legend-swatch swatch-failure"></div> Did not achieve adoption</div>
    <div class="legend-item"><div class="legend-swatch swatch-lesson"></div> Key lesson / pending</div>
  </div>
  <figcaption>
    <strong>Diagram 5: Success and Failure Patterns in Visual Language Systems</strong>
    <span>Decision tree mapping the factors that led each system to its outcome. Compositionality and grammar are necessary but not sufficient for language status. Community formation around a practical need is the decisive factor. Blissymbolics succeeded in AAC because children with cerebral palsy had no alternative -- not because of universal appeal. ISOTYPE succeeded as information design, not as language. The consistent pattern: no system achieved its creator's original vision of universal communication.</span>
  </figcaption>
</figure>
<script>
  mermaid.initialize({ startOnLoad: true, securityLevel: 'loose', theme: 'neutral' });
</script>
</body>
</html>
