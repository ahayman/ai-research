<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timeline of Visual Language Systems (1666-2023)</title>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #f8f9fa;
    color: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 2rem;
  }
  figure {
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
    max-width: 1100px;
    width: 100%;
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid #e9ecef;
  }
  figcaption strong {
    display: block;
    font-size: 1.15rem;
    color: #1a1a2e;
    margin-bottom: 0.4rem;
  }
  figcaption span {
    font-size: 0.9rem;
    color: #6c757d;
    line-height: 1.5;
  }
  .mermaid {
    display: flex;
    justify-content: center;
  }
  .legend {
    display: flex;
    justify-content: center;
    gap: 1.5rem;
    margin-top: 1rem;
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.85rem;
    color: #495057;
  }
  .legend-swatch {
    width: 16px;
    height: 16px;
    border-radius: 4px;
  }
  .swatch-algebraic { background: #7c3aed; }
  .swatch-pictographic { background: #059669; }
  .swatch-compositional { background: #2563eb; }
  .swatch-spatial { background: #d97706; }
  .swatch-influence { background: #6b7280; }
  @media (prefers-color-scheme: dark) {
    body { background: #1a1a2e; color: #e9ecef; }
    figure { background: #2d2d44; box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
    figcaption { border-top-color: #3d3d5c; }
    figcaption strong { color: #e9ecef; }
    figcaption span { color: #adb5bd; }
    .legend-item { color: #adb5bd; }
  }
</style>
</head>
<body>
<figure>
  <div class="mermaid">
%%{init: {'theme': 'neutral', 'themeVariables': {'fontSize': '13px'}}}%%
flowchart LR
    subgraph ERA1 ["1600s -- The Dream"]
        L["<b>Leibniz 1666</b><br/><i>Characteristica Universalis</i><br/>Algebraic-symbolic<br/>Alphabet of human thought"]:::algebraic
    end

    subgraph ERA2 ["1920s-1960s -- Pictographic Pioneers"]
        I["<b>ISOTYPE 1925</b><br/><i>Neurath / Arntz / Reidemeister</i><br/>Pictographic-statistical<br/>~4,000 pictograms"]:::pictographic
        B["<b>Blissymbolics 1949</b><br/><i>Charles Bliss</i><br/>Semantic-compositional<br/>~120 elements -> 6,500+ words"]:::compositional
        LC["<b>LoCoS 1964</b><br/><i>Yukio Ota</i><br/>Grid-spatial hybrid<br/>18 basic shapes"]:::spatial
    end

    subgraph ERA3 ["1990s-2020s -- New Approaches"]
        EM["<b>Elephant's Memory ~mid-1990s</b><br/><i>Timothee Ingen-Housz</i><br/>Non-linear spatial<br/>~150+ logograms"]:::spatial
        XB["<b>Book from the Ground 2003</b><br/><i>Xu Bing</i><br/>Cultural-pictographic<br/>Thousands of icons"]:::pictographic
        IC["<b>Icono 2023</b><br/><i>Peter Kramer</i><br/>Icon-string compositional<br/>Peer-reviewed"]:::compositional
    end

    L -.->|"Foreshadowed<br/>formal logic"| B
    I -.->|"Foundation for<br/>all pictographic systems"| LC
    I -.->|"Influenced"| XB
    B -.->|"AAC legacy<br/>informed"| IC
    LC -.->|"Grid grammar<br/>explored"| EM

    classDef algebraic fill:#f3e8ff,stroke:#7c3aed,stroke-width:2px,color:#1a1a2e
    classDef pictographic fill:#dcfce7,stroke:#059669,stroke-width:2px,color:#1a1a2e
    classDef compositional fill:#dbeafe,stroke:#2563eb,stroke-width:2px,color:#1a1a2e
    classDef spatial fill:#fef3c7,stroke:#d97706,stroke-width:2px,color:#1a1a2e
  </div>
  <div class="legend">
    <div class="legend-item"><div class="legend-swatch swatch-algebraic"></div> Algebraic-symbolic</div>
    <div class="legend-item"><div class="legend-swatch swatch-pictographic"></div> Pictographic</div>
    <div class="legend-item"><div class="legend-swatch swatch-compositional"></div> Semantic-compositional</div>
    <div class="legend-item"><div class="legend-swatch swatch-spatial"></div> Spatial grammar</div>
    <div class="legend-item"><div class="legend-swatch swatch-influence"></div> Influence connections</div>
  </div>
  <figcaption>
    <strong>Diagram 1: Timeline of Visual Language Systems (1666-2023)</strong>
    <span>Four centuries of attempts to create universal visual communication, from Leibniz's algebraic dream to Icono's peer-reviewed icon strings. Each system is color-coded by its primary design approach. Dashed arrows show documented influences between systems. No system achieved its creator's original goal -- success always came in unexpected directions. Sources: Wikipedia, Frontiers in Psychology (2023), MIT Press, BCI, Letterform Archive.</span>
  </figcaption>
</figure>
<script>
  mermaid.initialize({ startOnLoad: true, securityLevel: 'loose', theme: 'neutral' });
</script>
</body>
</html>
