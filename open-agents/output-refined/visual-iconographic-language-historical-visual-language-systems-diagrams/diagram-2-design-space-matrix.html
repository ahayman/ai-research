<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Design Space Matrix: Iconicity vs. Compositionality</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #f8f9fa;
    color: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 2rem;
  }
  figure {
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
    max-width: 900px;
    width: 100%;
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid #e9ecef;
  }
  figcaption strong {
    display: block;
    font-size: 1.15rem;
    color: #1a1a2e;
    margin-bottom: 0.4rem;
  }
  figcaption span {
    font-size: 0.9rem;
    color: #6c757d;
    line-height: 1.5;
  }
  .legend {
    display: flex;
    justify-content: center;
    gap: 1.5rem;
    margin-top: 1rem;
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.85rem;
    color: #495057;
  }
  .legend-swatch {
    width: 16px;
    height: 16px;
    border-radius: 4px;
  }
  .swatch-target { background: #dc2626; }
  .swatch-system { background: #2563eb; }
  .swatch-quadrant { background: #f3f4f6; border: 1px solid #d1d5db; }
  svg text { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
  @media (prefers-color-scheme: dark) {
    body { background: #1a1a2e; color: #e9ecef; }
    figure { background: #2d2d44; box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
    figcaption { border-top-color: #3d3d5c; }
    figcaption strong { color: #e9ecef; }
    figcaption span { color: #adb5bd; }
    .legend-item { color: #adb5bd; }
  }
</style>
</head>
<body>
<figure>
  <svg viewBox="0 0 800 620" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title-dsm desc-dsm">
    <title id="title-dsm">Design Space Matrix: Iconicity vs. Compositionality</title>
    <desc id="desc-dsm">A two-dimensional scatter plot positioning seven historical visual language systems along axes of iconicity (how much symbols look like what they represent) and compositionality (ability to combine primitives into unlimited new meanings). Four quadrants are labeled: Picture Dictionary (high iconicity, low compositionality), Icon Language (high iconicity, high compositionality), Abstract Code (low iconicity, low compositionality), and Formal Logic (low iconicity, high compositionality).</desc>

    <defs>
      <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
      </marker>
    </defs>

    <!-- Background quadrants -->
    <rect x="100" y="40" width="320" height="250" rx="8" fill="#f0fdf4" opacity="0.5"/>
    <rect x="420" y="40" width="320" height="250" rx="8" fill="#eff6ff" opacity="0.5"/>
    <rect x="100" y="290" width="320" height="250" rx="8" fill="#fef3c7" opacity="0.3"/>
    <rect x="420" y="290" width="320" height="250" rx="8" fill="#f3e8ff" opacity="0.4"/>

    <!-- Quadrant labels -->
    <text x="260" y="70" text-anchor="middle" font-size="13" font-weight="bold" fill="#059669" opacity="0.7">ICON LANGUAGE</text>
    <text x="260" y="86" text-anchor="middle" font-size="10" fill="#059669" opacity="0.6">High icon + High compose</text>
    <text x="580" y="70" text-anchor="middle" font-size="13" font-weight="bold" fill="#2563eb" opacity="0.7">FORMAL LOGIC</text>
    <text x="580" y="86" text-anchor="middle" font-size="10" fill="#2563eb" opacity="0.6">Low icon + High compose</text>
    <text x="260" y="520" text-anchor="middle" font-size="13" font-weight="bold" fill="#d97706" opacity="0.7">PICTURE DICTIONARY</text>
    <text x="260" y="536" text-anchor="middle" font-size="10" fill="#d97706" opacity="0.6">High icon + Low compose</text>
    <text x="580" y="520" text-anchor="middle" font-size="13" font-weight="bold" fill="#7c3aed" opacity="0.7">ABSTRACT CODE</text>
    <text x="580" y="536" text-anchor="middle" font-size="10" fill="#7c3aed" opacity="0.6">Low icon + Low compose</text>

    <!-- Axes -->
    <line x1="100" y1="540" x2="740" y2="540" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
    <line x1="100" y1="540" x2="100" y2="30" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>

    <!-- Axis labels -->
    <text x="420" y="575" text-anchor="middle" font-size="13" font-weight="bold" fill="#374151">ICONICITY: Concrete -------> Abstract</text>
    <text x="50" y="290" text-anchor="middle" font-size="13" font-weight="bold" fill="#374151" transform="rotate(-90, 50, 290)">COMPOSITIONALITY: Fixed -------> Productive</text>

    <!-- System nodes -->
    <!-- ISOTYPE: very high iconicity, very low compositionality -->
    <circle cx="180" cy="460" r="28" fill="#dcfce7" stroke="#059669" stroke-width="2"/>
    <text x="180" y="456" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a1a2e">ISOTYPE</text>
    <text x="180" y="470" text-anchor="middle" font-size="9" fill="#4b5563">1925</text>

    <!-- Xu Bing: high iconicity, low compositionality -->
    <circle cx="220" cy="410" r="28" fill="#dcfce7" stroke="#059669" stroke-width="2"/>
    <text x="220" y="406" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a1a2e">Xu Bing</text>
    <text x="220" y="420" text-anchor="middle" font-size="9" fill="#4b5563">2003</text>

    <!-- LoCoS: medium-high iconicity, medium compositionality -->
    <circle cx="300" cy="280" r="28" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
    <text x="300" y="276" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a1a2e">LoCoS</text>
    <text x="300" y="290" text-anchor="middle" font-size="9" fill="#4b5563">1964</text>

    <!-- Icono: medium iconicity, medium-high compositionality -->
    <circle cx="350" cy="200" r="28" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <text x="350" y="196" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a1a2e">Icono</text>
    <text x="350" y="210" text-anchor="middle" font-size="9" fill="#4b5563">2023</text>

    <!-- Elephant's Memory: medium iconicity, medium compositionality -->
    <circle cx="380" cy="260" r="28" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
    <text x="380" y="248" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a1a2e">Elephant's</text>
    <text x="380" y="262" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a1a2e">Memory</text>
    <text x="380" y="276" text-anchor="middle" font-size="9" fill="#4b5563">~mid-1990s</text>

    <!-- Blissymbolics: low iconicity, high compositionality -->
    <circle cx="540" cy="130" r="28" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <text x="540" y="122" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a1a2e">Bliss-</text>
    <text x="540" y="136" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a1a2e">symbolics</text>
    <text x="540" y="150" text-anchor="middle" font-size="9" fill="#4b5563">1949</text>

    <!-- Leibniz: very low iconicity, very high compositionality (theoretical) -->
    <circle cx="660" cy="80" r="28" fill="#f3e8ff" stroke="#7c3aed" stroke-width="2" stroke-dasharray="5,3"/>
    <text x="660" y="76" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a1a2e">Leibniz</text>
    <text x="660" y="90" text-anchor="middle" font-size="9" fill="#4b5563">1666</text>
    <text x="660" y="102" text-anchor="middle" font-size="8" fill="#7c3aed">(never completed)</text>

    <!-- Target zone for visual language -->
    <ellipse cx="340" cy="140" rx="70" ry="45" fill="none" stroke="#dc2626" stroke-width="2.5" stroke-dasharray="8,4" opacity="0.7"/>
    <text x="340" y="105" text-anchor="middle" font-size="10" font-weight="bold" fill="#dc2626">TARGET ZONE</text>
    <text x="340" y="118" text-anchor="middle" font-size="9" fill="#dc2626">for metaphor-based</text>
    <text x="340" y="130" text-anchor="middle" font-size="9" fill="#dc2626">visual language</text>

    <!-- Temporal arrow -->
    <path d="M180,460 C240,400 300,350 350,200" stroke="#94a3b8" stroke-width="1.5" fill="none" stroke-dasharray="4,3" marker-end="url(#arrowhead)" opacity="0.5"/>
    <text x="230" y="340" text-anchor="middle" font-size="9" fill="#94a3b8" transform="rotate(-50, 230, 340)">Historical trend</text>
  </svg>
  <div class="legend">
    <div class="legend-item"><div class="legend-swatch swatch-target"></div> Target zone for new visual language</div>
    <div class="legend-item"><div class="legend-swatch swatch-system"></div> High compositionality</div>
    <div class="legend-item"><div class="legend-swatch swatch-quadrant"></div> Quadrant labels</div>
  </div>
  <figcaption>
    <strong>Diagram 2: Design Space Matrix -- Iconicity vs. Compositionality</strong>
    <span>Each historical system plotted on two dimensions: how much its symbols look like what they represent (iconicity) and how productively primitives combine to create new meanings (compositionality). The "Icon Language" quadrant -- high iconicity with high compositionality -- represents the design target for a metaphor-based visual language, bridging the gap between pictographic clarity and formal expressiveness. The dashed trend line shows historical movement toward greater compositionality over time.</span>
  </figcaption>
</figure>
</body>
</html>
