<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grammar Type Comparison Across Visual Language Systems</title>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #f8f9fa;
    color: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 2rem;
  }
  figure {
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
    max-width: 1050px;
    width: 100%;
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid #e9ecef;
  }
  figcaption strong {
    display: block;
    font-size: 1.15rem;
    color: #1a1a2e;
    margin-bottom: 0.4rem;
  }
  figcaption span {
    font-size: 0.9rem;
    color: #6c757d;
    line-height: 1.5;
  }
  .mermaid {
    display: flex;
    justify-content: center;
  }
  .legend {
    display: flex;
    justify-content: center;
    gap: 1.5rem;
    margin-top: 1rem;
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.85rem;
    color: #495057;
  }
  .legend-swatch {
    width: 16px;
    height: 16px;
    border-radius: 4px;
  }
  .swatch-linear { background: #2563eb; }
  .swatch-grid { background: #d97706; }
  .swatch-spatial { background: #059669; }
  .swatch-string { background: #7c3aed; }
  .swatch-none { background: #dc2626; }
  @media (prefers-color-scheme: dark) {
    body { background: #1a1a2e; color: #e9ecef; }
    figure { background: #2d2d44; box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
    figcaption { border-top-color: #3d3d5c; }
    figcaption strong { color: #e9ecef; }
    figcaption span { color: #adb5bd; }
    .legend-item { color: #adb5bd; }
  }
</style>
</head>
<body>
<figure>
  <div class="mermaid">
%%{init: {'theme': 'neutral', 'themeVariables': {'fontSize': '12px'}}}%%
flowchart TD
    PROP["<b>PROPOSITION TO ENCODE:</b><br/>'The sun makes the flower grow'<br/><i>Agent: sun | Action: causes growth | Patient: flower</i>"]:::prompt

    subgraph LINEAR ["LINEAR GRAMMAR -- Blissymbolics"]
        direction LR
        L1["sun"]:::linear
        L2["verb-indicator"]:::linear
        L3["action: cause"]:::linear
        L4["flower"]:::linear
        L5["verb-indicator"]:::linear
        L6["action: grow"]:::linear
        L1 --> L2 --> L3 --> L4 --> L5 --> L6
    end

    subgraph GRIDG ["GRID GRAMMAR -- LoCoS (3x3 matrix)"]
        direction TB
        G_TOP["Top row: SUN (circle)"]:::grid
        G_MID["Middle row: ACTION ARROW (downward)"]:::grid
        G_BOT["Bottom row: FLOWER + UPWARD GROWTH"]:::grid
        G_TOP --- G_MID --- G_BOT
    end

    subgraph SPATIALG ["SPATIAL GRAMMAR -- Elephant's Memory"]
        direction TB
        SP["Large SUN symbol (agent = large size)<br/>Connected by proximity to<br/>small FLOWER symbol (patient = small)<br/>Growth shown by upward spatial expansion<br/><i>No fixed reading order -- eye follows size hierarchy</i>"]:::spatial
    end

    subgraph STRINGG ["ICON-STRING -- Icono"]
        direction LR
        S1["sun-icon"]:::string
        S2["arrow-icon"]:::string
        S3["flower-icon"]:::string
        S4["up-icon"]:::string
        S1 --> S2 --> S3 --> S4
    end

    subgraph NONEG ["NO GRAMMAR -- ISOTYPE"]
        direction LR
        N1["Row of sun pictograms<br/>+ row of flower pictograms<br/><i>Cannot express causation</i><br/><i>Only statistical juxtaposition</i>"]:::none
    end

    PROP --> LINEAR
    PROP --> GRIDG
    PROP --> SPATIALG
    PROP --> STRINGG
    PROP --> NONEG

    classDef prompt fill:#f3f4f6,stroke:#6b7280,stroke-width:2px,color:#1a1a2e
    classDef linear fill:#dbeafe,stroke:#2563eb,stroke-width:2px,color:#1a1a2e
    classDef grid fill:#fef3c7,stroke:#d97706,stroke-width:2px,color:#1a1a2e
    classDef spatial fill:#dcfce7,stroke:#059669,stroke-width:2px,color:#1a1a2e
    classDef string fill:#f3e8ff,stroke:#7c3aed,stroke-width:2px,color:#1a1a2e
    classDef none fill:#fee2e2,stroke:#dc2626,stroke-width:2px,color:#1a1a2e
  </div>
  <div class="legend">
    <div class="legend-item"><div class="legend-swatch swatch-linear"></div> Linear (Blissymbolics)</div>
    <div class="legend-item"><div class="legend-swatch swatch-grid"></div> Grid-based (LoCoS)</div>
    <div class="legend-item"><div class="legend-swatch swatch-spatial"></div> Free spatial (Elephant's Memory)</div>
    <div class="legend-item"><div class="legend-swatch swatch-string"></div> Icon-string (Icono)</div>
    <div class="legend-item"><div class="legend-swatch swatch-none"></div> No grammar (ISOTYPE)</div>
  </div>
  <figcaption>
    <strong>Diagram 4: Grammar Type Comparison -- Five Approaches to the Same Proposition</strong>
    <span>The same proposition -- "The sun makes the flower grow" -- expressed through five different grammar strategies. Linear grammar (Blissymbolics) reads left-to-right with grammatical indicators. Grid grammar (LoCoS) positions symbols in a spatial matrix. Free spatial grammar (Elephant's Memory) uses size and proximity to encode relationships. Icon-string grammar (Icono) sequences icons with graphical sentence structure. ISOTYPE lacks grammar entirely and cannot express causation. The critical difference: only systems with grammar can encode agent-action-patient relationships.</span>
  </figcaption>
</figure>
<script>
  mermaid.initialize({ startOnLoad: true, securityLevel: 'loose', theme: 'neutral' });
</script>
</body>
</html>
