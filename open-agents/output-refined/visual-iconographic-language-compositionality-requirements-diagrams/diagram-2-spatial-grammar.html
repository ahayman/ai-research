<body>
<figure class="concept-diagram" id="diagram-spatial-grammar">
  <div class="diagram-title">Spatial Grammar: What Position Encodes</div>
  <div class="diagram-subtitle">Seven independent visual parameters available for encoding grammatical relationships</div>

  <div class="params-grid">
    <div class="param-card c1">
      <div class="param-header"><span class="param-num">1</span> Horizontal Position</div>
      <div class="param-body">
        <div class="param-visual">
          <svg width="120" height="50" viewBox="0 0 120 50">
            <rect x="5" y="15" width="35" height="22" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
            <text x="11" y="30" font-size="8" fill="#1e40af" font-weight="600">Given</text>
            <text x="47" y="30" font-size="10" fill="#9ca3af">&rarr;</text>
            <rect x="60" y="15" width="55" height="22" rx="4" fill="#3b82f6" stroke="#1d4ed8" stroke-width="1.5"/>
            <text x="68" y="30" font-size="8" fill="white" font-weight="600">New info</text>
          </svg>
        </div>
        <div class="param-text">
          <div class="param-what">Left = given/agent/past. Right = new/patient/future.</div>
          <div class="param-how">Kress and van Leeuwen's visual grammar. Also encodes SVO-like predication.</div>
        </div>
      </div>
    </div>

    <div class="param-card c2">
      <div class="param-header"><span class="param-num">2</span> Vertical Position</div>
      <div class="param-body">
        <div class="param-visual">
          <svg width="70" height="70" viewBox="0 0 70 70">
            <rect x="10" y="5" width="50" height="22" rx="4" fill="#f3e8ff" stroke="#8b5cf6" stroke-width="1.5"/>
            <text x="16" y="20" font-size="8" fill="#6b21a8" font-weight="600">Ideal</text>
            <text x="30" y="42" font-size="10" fill="#9ca3af">&darr;</text>
            <rect x="10" y="48" width="50" height="22" rx="4" fill="#8b5cf6" stroke="#6d28d9" stroke-width="1.5"/>
            <text x="19" y="63" font-size="8" fill="white" font-weight="600">Real</text>
          </svg>
        </div>
        <div class="param-text">
          <div class="param-what">Top = abstract/ideal/general. Bottom = concrete/real/specific.</div>
          <div class="param-how">Also encodes general-to-specific hierarchy.</div>
        </div>
      </div>
    </div>

    <div class="param-card c3">
      <div class="param-header"><span class="param-num">3</span> Enclosure</div>
      <div class="param-body">
        <div class="param-visual">
          <svg width="80" height="60" viewBox="0 0 80 60">
            <rect x="5" y="5" width="70" height="50" rx="8" fill="none" stroke="#059669" stroke-width="2"/>
            <text x="12" y="20" font-size="7" fill="#059669" font-weight="700">SCOPE</text>
            <circle cx="30" cy="36" r="8" fill="#dcfce7" stroke="#059669" stroke-width="1.5"/>
            <circle cx="55" cy="36" r="8" fill="#dcfce7" stroke="#059669" stroke-width="1.5"/>
          </svg>
        </div>
        <div class="param-text">
          <div class="param-what">Enclosed elements fall within the scope of the encloser.</div>
          <div class="param-how">Negation encloses what is negated. Quantifier scope. Clause boundaries.</div>
        </div>
      </div>
    </div>

    <div class="param-card c4">
      <div class="param-header"><span class="param-num">4</span> Connection Lines</div>
      <div class="param-body">
        <div class="param-visual">
          <svg width="100" height="40" viewBox="0 0 100 40">
            <circle cx="15" cy="20" r="8" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
            <line x1="23" y1="20" x2="72" y2="20" stroke="#dc2626" stroke-width="2" marker-end="url(#sgArr)"/>
            <circle cx="82" cy="20" r="8" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
            <text x="36" y="14" font-size="7" fill="#dc2626" font-weight="600">verb</text>
            <text x="8" y="36" font-size="6" fill="#9ca3af">subj</text>
            <text x="77" y="36" font-size="6" fill="#9ca3af">obj</text>
            <defs><marker id="sgArr" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto"><polygon points="0 0, 7 2.5, 0 5" fill="#dc2626"/></marker></defs>
          </svg>
        </div>
        <div class="param-text">
          <div class="param-what">Directional lines encode predication (subject-verb-object).</div>
          <div class="param-how">Solid = direct. Dashed = possibility. Bold = necessity.</div>
        </div>
      </div>
    </div>

    <div class="param-card c5">
      <div class="param-header"><span class="param-num">5</span> Relative Size</div>
      <div class="param-body">
        <div class="param-visual">
          <svg width="80" height="50" viewBox="0 0 80 50">
            <circle cx="25" cy="25" r="18" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
            <text x="16" y="29" font-size="8" fill="#92400e" font-weight="600">main</text>
            <circle cx="60" cy="32" r="10" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
            <text x="53" y="36" font-size="6" fill="#92400e">mod</text>
          </svg>
        </div>
        <div class="param-text">
          <div class="param-what">Larger = more important, emphasized, primary.</div>
          <div class="param-how">Smaller = secondary, modifying, subordinate. Maps to SCALE schema.</div>
        </div>
      </div>
    </div>

    <div class="param-card c6">
      <div class="param-header"><span class="param-num">6</span> Line Style</div>
      <div class="param-body">
        <div class="param-visual">
          <svg width="80" height="55" viewBox="0 0 80 55">
            <line x1="5" y1="12" x2="75" y2="12" stroke="#0891b2" stroke-width="2.5"/>
            <text x="5" y="8" font-size="7" fill="#0891b2" font-weight="600">actual</text>
            <line x1="5" y1="28" x2="75" y2="28" stroke="#0891b2" stroke-width="2" stroke-dasharray="6,3"/>
            <text x="5" y="24" font-size="7" fill="#0891b2">possible</text>
            <line x1="5" y1="44" x2="75" y2="44" stroke="#0891b2" stroke-width="4"/>
            <text x="5" y="40" font-size="7" fill="#0891b2" font-weight="700">necessary</text>
          </svg>
        </div>
        <div class="param-text">
          <div class="param-what">Solid = certainty. Dashed = possibility. Bold = obligation.</div>
          <div class="param-how">Encodes modality (CAN, MUST, MIGHT). Maps to FORCE schema intensity.</div>
        </div>
      </div>
    </div>

    <div class="param-card c7">
      <div class="param-header"><span class="param-num">7</span> Color / Category Coding</div>
      <div class="param-body">
        <div class="param-visual">
          <svg width="80" height="50" viewBox="0 0 80 50">
            <rect x="3" y="5" width="20" height="14" rx="3" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
            <rect x="28" y="5" width="20" height="14" rx="3" fill="#fee2e2" stroke="#dc2626" stroke-width="1"/>
            <rect x="53" y="5" width="20" height="14" rx="3" fill="#dcfce7" stroke="#059669" stroke-width="1"/>
            <text x="5" y="33" font-size="6" fill="#3b82f6">entity</text>
            <text x="30" y="33" font-size="6" fill="#dc2626">action</text>
            <text x="54" y="33" font-size="6" fill="#059669">relation</text>
            <rect x="3" y="38" width="20" height="12" rx="3" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
            <rect x="28" y="38" width="20" height="12" rx="3" fill="#f3e8ff" stroke="#7c3aed" stroke-width="1"/>
            <text x="3" y="48" font-size="5" fill="#d97706">modifier</text>
            <text x="28" y="48" font-size="5" fill="#7c3aed">condition</text>
          </svg>
        </div>
        <div class="param-text">
          <div class="param-what">Color hue distinguishes grammatical categories.</div>
          <div class="param-how">Entity, action, relation, modifier, condition — each gets a distinct color family.</div>
        </div>
      </div>
    </div>
  </div>

  <div class="compare-box">
    <div class="compare-side">
      <div class="compare-label" style="color:#3b82f6">Visual Grammar</div>
      <div class="compare-value" style="color:#3b82f6">7+</div>
      <div class="compare-desc">Independent spatial parameters (position, enclosure, connection, size, style, color, orientation)</div>
    </div>
    <div class="compare-vs">vs</div>
    <div class="compare-side">
      <div class="compare-label" style="color:#dc2626">Linear Grammar</div>
      <div class="compare-value" style="color:#dc2626">1</div>
      <div class="compare-desc">Primary parameter (sequence position) + morphological modification</div>
    </div>
  </div>

  <figcaption>
    <strong>Figure 2:</strong> Seven independent spatial parameters available to a visual grammar, compared to the single primary parameter (word order) of linear verbal grammar. A 2D visual surface can encode more simultaneous information — but at the cost of greater parsing complexity. Each parameter maps to specific grammatical functions, creating a "cheat sheet" for reading and writing the visual language.
  </figcaption>
</figure>
</body>
