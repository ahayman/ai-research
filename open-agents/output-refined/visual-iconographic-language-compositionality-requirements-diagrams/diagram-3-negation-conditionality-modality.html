<figure class="concept-diagram" id="diagram-abstract-grammar">
  <div class="diagram-title">Visual Encoding Proposals: The Hard Problems</div>
  <div class="diagram-subtitle">How to represent negation, conditionality, and modality in spatial grammar</div>

  <!-- NEGATION -->
  <div class="category-section cat-negation">
    <div class="cat-header">
      <span class="cat-title">Negation (NOT)</span>
      <span class="cat-schema">Grounded in: BLOCKAGE image schema</span>
    </div>
    <div class="cat-body">
      <div class="example-row">
        <div class="example-box">
          <div class="example-label">Reading 1: "Not every student passed"</div>
          <div class="example-sentence">Negation scope encloses the quantifier</div>
          <div class="example-svg">
            <svg width="220" height="80" viewBox="0 0 220 80">
              <rect x="5" y="5" width="120" height="60" rx="6" fill="none" stroke="#dc2626" stroke-width="2.5"/>
              <line x1="5" y1="5" x2="125" y2="65" stroke="#dc2626" stroke-width="2" opacity="0.4"/>
              <text x="12" y="20" font-size="8" fill="#dc2626" font-weight="700">NOT</text>
              <text x="20" y="40" font-size="9" fill="#374151">EVERY + STUDENT</text>
              <text x="140" y="40" font-size="9" fill="#374151">PASSED</text>
            </svg>
          </div>
          <div class="example-explanation">Negation boundary encloses "every student" — some students may have passed</div>
        </div>
        <div class="example-box">
          <div class="example-label">Reading 2: "Every student didn't pass"</div>
          <div class="example-sentence">Negation scope encloses only the predicate</div>
          <div class="example-svg">
            <svg width="220" height="80" viewBox="0 0 220 80">
              <text x="10" y="40" font-size="9" fill="#374151">EVERY + STUDENT</text>
              <rect x="115" y="10" width="90" height="50" rx="6" fill="none" stroke="#dc2626" stroke-width="2.5"/>
              <line x1="115" y1="10" x2="205" y2="60" stroke="#dc2626" stroke-width="2" opacity="0.4"/>
              <text x="122" y="25" font-size="8" fill="#dc2626" font-weight="700">NOT</text>
              <text x="130" y="42" font-size="9" fill="#374151">PASSED</text>
            </svg>
          </div>
          <div class="example-explanation">Negation boundary encloses only "passed" — no student passed at all</div>
        </div>
      </div>
      <div class="scope-note">
        <strong>The scope advantage:</strong> In English, "Every student didn't pass" is ambiguous between these two readings. In visual grammar, the extent of the negation boundary resolves the ambiguity unambiguously. Spatial scope encoding may be clearer than linear word order for logic.
      </div>
    </div>
  </div>

  <!-- CONDITIONALITY -->
  <div class="category-section cat-condition">
    <div class="cat-header">
      <span class="cat-title">Conditionality (IF...THEN)</span>
      <span class="cat-schema">Grounded in: BRANCHING PATH schema</span>
    </div>
    <div class="cat-body">
      <div class="example-row">
        <div class="example-box">
          <div class="example-label">Factual Conditional</div>
          <div class="example-sentence">"If it rains, we stay inside"</div>
          <div class="example-svg">
            <svg width="200" height="90" viewBox="0 0 200 90">
              <circle cx="20" cy="45" r="5" fill="#2563eb"/>
              <line x1="25" y1="45" x2="70" y2="45" stroke="#2563eb" stroke-width="2"/>
              <circle cx="75" cy="45" r="8" fill="none" stroke="#2563eb" stroke-width="2.5"/>
              <text x="70" y="49" font-size="7" fill="#2563eb" font-weight="700">IF</text>
              <!-- branch up: condition met -->
              <line x1="83" y1="40" x2="120" y2="20" stroke="#2563eb" stroke-width="2" marker-end="url(#cArr)"/>
              <text x="90" y="17" font-size="7" fill="#6b7280">rain=yes</text>
              <rect x="125" y="10" width="65" height="20" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
              <text x="131" y="24" font-size="7" fill="#1e40af">WE + INSIDE</text>
              <!-- branch down: condition not met -->
              <line x1="83" y1="50" x2="120" y2="70" stroke="#93c5fd" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#cArr2)"/>
              <text x="90" y="78" font-size="7" fill="#9ca3af">rain=no</text>
              <rect x="125" y="60" width="65" height="20" rx="4" fill="#f1f5f9" stroke="#93c5fd" stroke-width="1.5"/>
              <text x="131" y="74" font-size="7" fill="#94a3b8">WE + PATH</text>
              <defs>
                <marker id="cArr" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto"><polygon points="0 0, 6 2, 0 4" fill="#2563eb"/></marker>
                <marker id="cArr2" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto"><polygon points="0 0, 6 2, 0 4" fill="#93c5fd"/></marker>
              </defs>
            </svg>
          </div>
          <div class="example-explanation">Solid branch = actual condition. The fork in the path IS the conditional.</div>
        </div>
        <div class="example-box">
          <div class="example-label">Counterfactual</div>
          <div class="example-sentence">"If it hadn't rained, we would have walked"</div>
          <div class="example-svg">
            <svg width="200" height="90" viewBox="0 0 200 90">
              <circle cx="20" cy="45" r="5" fill="#2563eb" opacity="0.5"/>
              <line x1="25" y1="45" x2="70" y2="45" stroke="#2563eb" stroke-width="2" stroke-dasharray="4,3"/>
              <circle cx="75" cy="45" r="8" fill="none" stroke="#2563eb" stroke-width="2.5" stroke-dasharray="3,2"/>
              <text x="70" y="49" font-size="7" fill="#2563eb" font-weight="700">IF</text>
              <!-- hypothetical branch: what didn't happen -->
              <line x1="83" y1="40" x2="120" y2="20" stroke="#2563eb" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#cfArr)"/>
              <text x="88" y="17" font-size="7" fill="#9ca3af">no rain</text>
              <rect x="125" y="10" width="65" height="20" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="4,3"/>
              <text x="131" y="24" font-size="7" fill="#1e40af" opacity="0.7">WE + PATH</text>
              <!-- actual: it did rain -->
              <line x1="83" y1="50" x2="120" y2="70" stroke="#2563eb" stroke-width="2"/>
              <text x="88" y="78" font-size="7" fill="#6b7280">rained</text>
              <rect x="125" y="60" width="65" height="20" rx="4" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
              <text x="131" y="74" font-size="7" fill="#1e40af">WE + INSIDE</text>
              <defs>
                <marker id="cfArr" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto"><polygon points="0 0, 6 2, 0 4" fill="#2563eb"/></marker>
              </defs>
            </svg>
          </div>
          <div class="example-explanation">Dashed path = counterfactual (the road not taken). Solid = what actually happened.</div>
        </div>
      </div>
    </div>
  </div>

  <!-- MODALITY -->
  <div class="category-section cat-modality">
    <div class="cat-header">
      <span class="cat-title">Modality (CAN, MUST, MIGHT)</span>
      <span class="cat-schema">Grounded in: FORCE schema intensity</span>
    </div>
    <div class="cat-body">
      <div class="example-row">
        <div class="example-box" style="grid-column: 1 / -1;">
          <div class="example-label">Three degrees of modality encoded by line weight</div>
          <div class="example-svg">
            <svg width="400" height="70" viewBox="0 0 400 70">
              <!-- MIGHT -->
              <circle cx="30" cy="35" r="10" fill="none" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="3,2"/>
              <line x1="40" y1="35" x2="90" y2="35" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="3,2" marker-end="url(#modArr1)"/>
              <circle cx="100" cy="35" r="10" fill="none" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="3,2"/>
              <text x="45" y="20" font-size="8" fill="#7c3aed" font-weight="600">MIGHT</text>
              <text x="30" y="60" font-size="7" fill="#9ca3af">dotted = uncertain</text>
              <!-- CAN -->
              <circle cx="170" cy="35" r="10" fill="none" stroke="#7c3aed" stroke-width="2"/>
              <line x1="180" y1="35" x2="230" y2="35" stroke="#7c3aed" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#modArr2)"/>
              <circle cx="240" cy="35" r="10" fill="none" stroke="#7c3aed" stroke-width="2"/>
              <text x="190" y="20" font-size="8" fill="#7c3aed" font-weight="600">CAN</text>
              <text x="170" y="60" font-size="7" fill="#9ca3af">dashed = possible</text>
              <!-- MUST -->
              <circle cx="310" cy="35" r="10" fill="none" stroke="#7c3aed" stroke-width="3.5"/>
              <line x1="320" y1="35" x2="370" y2="35" stroke="#7c3aed" stroke-width="3.5" marker-end="url(#modArr3)"/>
              <circle cx="380" cy="35" r="10" fill="none" stroke="#7c3aed" stroke-width="3.5"/>
              <text x="330" y="20" font-size="8" fill="#7c3aed" font-weight="700">MUST</text>
              <text x="315" y="60" font-size="7" fill="#9ca3af">bold = necessary</text>
              <defs>
                <marker id="modArr1" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto"><polygon points="0 0, 6 2, 0 4" fill="#7c3aed"/></marker>
                <marker id="modArr2" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto"><polygon points="0 0, 6 2, 0 4" fill="#7c3aed"/></marker>
                <marker id="modArr3" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#7c3aed"/></marker>
              </defs>
            </svg>
          </div>
          <div class="example-explanation">Line weight and dash pattern encode degrees of modality — from the lightest touch of possibility (dotted) through capability (dashed) to the heavy force of obligation (bold solid). This maps directly onto the FORCE schema: stronger force = more certain/obligatory.</div>
        </div>
      </div>
      <div class="advantage-note">
        These three visual encoding proposals are design hypotheses, not established standards. Each is grounded in an image schema (BLOCKAGE for negation, BRANCHING PATH for conditionality, FORCE intensity for modality), which should make them cognitively natural — but empirical testing with real users is essential.
      </div>
    </div>
  </div>

  <figcaption>
    <strong>Figure 3:</strong> Proposed visual encodings for the three most challenging abstract grammatical categories. Negation uses enclosure-with-cancellation (BLOCKAGE schema), conditionality uses branching paths (PATH schema with fork), and modality uses line weight (FORCE schema intensity). The scope advantage of spatial negation over linear word order is highlighted as a potential genuine advantage of visual grammar.
  </figcaption>
</figure>
