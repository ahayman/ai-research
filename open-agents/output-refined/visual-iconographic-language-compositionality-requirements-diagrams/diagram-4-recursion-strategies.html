<figure class="concept-diagram" id="diagram-recursion-strategies">
  <div class="diagram-title">Recursion Strategies for Visual Embedding</div>
  <div class="diagram-subtitle">Three approaches to the sentence:</div>
  <div class="test-sentence"><strong>"The cat [that chased the mouse [that ate the cheese]] ran away"</strong></div>

  <div class="strategies-grid">
    <!-- NESTED ENCLOSURE -->
    <div class="strategy s1">
      <div class="strat-header">A. Nested Enclosure</div>
      <div class="strat-body">
        <div class="strat-visual">
          <svg width="200" height="140" viewBox="0 0 200 140">
            <!-- outer clause -->
            <rect x="5" y="5" width="190" height="130" rx="8" fill="none" stroke="#3b82f6" stroke-width="2"/>
            <text x="12" y="20" font-size="7" fill="#3b82f6" font-weight="700">CLAUSE 1</text>
            <text x="15" y="125" font-size="8" fill="#374151">CAT ... RAN AWAY</text>
            <!-- middle clause -->
            <rect x="20" y="28" width="165" height="80" rx="6" fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="4,2"/>
            <text x="27" y="41" font-size="7" fill="#3b82f6">that chased MOUSE</text>
            <!-- inner clause -->
            <rect x="35" y="48" width="140" height="48" rx="5" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
            <text x="42" y="63" font-size="7" fill="#3b82f6">that ate CHEESE</text>
            <text x="50" y="80" font-size="7" fill="#94a3b8">MOUSE + ATE + CHEESE</text>
          </svg>
        </div>
        <div class="strat-pros">Visually explicit — all relationships visible at once</div>
        <div class="strat-pros">Maps to CONTAINER schema (natural cognitive fit)</div>
        <div class="strat-cons">Visual parsing degrades rapidly after 2-3 levels</div>
        <div class="strat-cons">Deep nesting becomes illegible</div>
        <div class="strat-limit"><strong>Practical limit:</strong> 2-3 levels (same as verbal center-embedding)</div>
      </div>
    </div>

    <!-- REFERENCE LINKING -->
    <div class="strategy s2">
      <div class="strat-header">B. Reference Linking</div>
      <div class="strat-body">
        <div class="strat-visual">
          <svg width="200" height="140" viewBox="0 0 200 140">
            <!-- main clause -->
            <rect x="10" y="5" width="180" height="35" rx="6" fill="#f0fdf4" stroke="#059669" stroke-width="1.5"/>
            <text x="18" y="20" font-size="8" fill="#374151">CAT</text>
            <circle cx="48" cy="18" r="7" fill="#059669"/><text x="45" y="21" font-size="7" fill="white" font-weight="700">1</text>
            <text x="62" y="20" font-size="8" fill="#374151">RAN AWAY</text>
            <!-- ref 1 -->
            <rect x="10" y="50" width="180" height="35" rx="6" fill="#f0fdf4" stroke="#059669" stroke-width="1.5"/>
            <circle cx="18" cy="65" r="7" fill="#059669"/><text x="15" y="68" font-size="7" fill="white" font-weight="700">1</text>
            <text x="30" y="70" font-size="8" fill="#374151">= chased MOUSE</text>
            <circle cx="118" cy="65" r="7" fill="#059669"/><text x="115" y="68" font-size="7" fill="white" font-weight="700">2</text>
            <!-- ref 2 -->
            <rect x="10" y="95" width="180" height="35" rx="6" fill="#f0fdf4" stroke="#059669" stroke-width="1.5"/>
            <circle cx="18" cy="110" r="7" fill="#059669"/><text x="15" y="113" font-size="7" fill="white" font-weight="700">2</text>
            <text x="30" y="115" font-size="8" fill="#374151">= ate CHEESE</text>
          </svg>
        </div>
        <div class="strat-pros">Scales to any depth without visual degradation</div>
        <div class="strat-pros">Each clause is independently readable</div>
        <div class="strat-cons">Requires tracking reference numbers (working memory)</div>
        <div class="strat-cons">Non-local — relationships span separate areas</div>
        <div class="strat-limit"><strong>Analogy:</strong> Footnotes, hyperlinks, variable names in code</div>
      </div>
    </div>

    <!-- STRIP/PANEL -->
    <div class="strategy s3">
      <div class="strat-header">C. Strip / Panel Recursion</div>
      <div class="strat-body">
        <div class="strat-visual">
          <svg width="200" height="140" viewBox="0 0 200 140">
            <!-- panel 1 -->
            <rect x="5" y="5" width="58" height="130" rx="4" fill="none" stroke="#d97706" stroke-width="1.5"/>
            <text x="12" y="18" font-size="6" fill="#d97706" font-weight="700">P1</text>
            <text x="10" y="35" font-size="7" fill="#374151">CAT</text>
            <text x="10" y="50" font-size="7" fill="#374151">ran away</text>
            <!-- panel 2 (embedded) -->
            <rect x="70" y="5" width="58" height="130" rx="4" fill="none" stroke="#d97706" stroke-width="1.5"/>
            <text x="77" y="18" font-size="6" fill="#d97706" font-weight="700">P2</text>
            <text x="75" y="35" font-size="7" fill="#374151">CAT</text>
            <text x="75" y="50" font-size="7" fill="#374151">chased</text>
            <text x="75" y="65" font-size="7" fill="#374151">MOUSE</text>
            <!-- panel 3 (embedded deeper) -->
            <rect x="135" y="5" width="58" height="130" rx="4" fill="none" stroke="#d97706" stroke-width="1.5"/>
            <text x="142" y="18" font-size="6" fill="#d97706" font-weight="700">P3</text>
            <text x="140" y="35" font-size="7" fill="#374151">MOUSE</text>
            <text x="140" y="50" font-size="7" fill="#374151">ate</text>
            <text x="140" y="65" font-size="7" fill="#374151">CHEESE</text>
            <!-- embed arrows -->
            <line x1="40" y1="80" x2="40" y2="95" stroke="#d97706" stroke-width="1" stroke-dasharray="2,2"/>
            <text x="15" y="110" font-size="6" fill="#d97706">see P2 &rarr;</text>
            <line x1="105" y1="80" x2="105" y2="95" stroke="#d97706" stroke-width="1" stroke-dasharray="2,2"/>
            <text x="80" y="110" font-size="6" fill="#d97706">see P3 &rarr;</text>
          </svg>
        </div>
        <div class="strat-pros">Familiar format (comic strips, storyboards)</div>
        <div class="strat-pros">DISL-compatible temporal panel format</div>
        <div class="strat-cons">Requires more horizontal space</div>
        <div class="strat-cons">Reading order may not be obvious for embedded panels</div>
        <div class="strat-limit"><strong>Analogy:</strong> Comics with flashback panels, stories-within-stories</div>
      </div>
    </div>
  </div>

  <div class="recommendation">
    <strong>Recommended synthesis:</strong> Use nested enclosure (A) for 1-2 levels of embedding — the most common case. Use reference linking (B) for deeper recursion. Use strip panels (C) for temporal narratives. This covers virtually all real-world communication needs: full recursion is theoretically required but rarely used beyond 2-3 levels in practice.
  </div>

  <figcaption>
    <strong>Figure 4:</strong> Three strategies for handling recursive clause embedding in a visual language. All three work, each with different trade-offs. The practical reality — that human processing degrades after 2-3 levels of center-embedding in verbal language as well — suggests that a hybrid approach (nesting for shallow recursion, references for deep) is the most practical design.
  </figcaption>
</figure>
