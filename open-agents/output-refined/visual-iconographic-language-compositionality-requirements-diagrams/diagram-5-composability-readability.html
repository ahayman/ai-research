<body>
<figure class="concept-diagram" id="diagram-tradeoff">
  <div class="diagram-title">The Composability-Readability Trade-off</div>
  <div class="diagram-subtitle">Higher compositionality enables expressiveness but reduces reading speed — until lexicalization restores it</div>

  <div class="chart-area">
    <div class="axis-label-y">Reading Speed &rarr;</div>
    <div class="axis-label-x">Compositionality &rarr;</div>
    <div class="axis-end-y-top">fast</div>
    <div class="axis-end-y-bottom">slow</div>
    <div class="axis-end-x-left">low</div>
    <div class="axis-end-x-right">high</div>

    <!-- hint curve -->
    <div class="curve-hint"></div>

    <!-- Sweet spot target -->
    <div class="sweet-spot"></div>
    <div class="sweet-label">Design target</div>

    <!-- EMOJI -->
    <div class="data-point" style="left: 12%; top: 40%;">
      <div class="point-dot" style="background: #f59e0b;"></div>
      <div class="point-label">Emoji</div>
      <div class="point-note">fast to read,<br/>can't compose</div>
    </div>

    <!-- ROAD SIGNS -->
    <div class="data-point" style="left: 20%; top: 25%;">
      <div class="point-dot" style="background: #10b981;"></div>
      <div class="point-label">Road Signs</div>
      <div class="point-note">instant,<br/>no grammar</div>
    </div>

    <!-- BLISSYMBOLICS -->
    <div class="data-point" style="left: 55%; top: 55%;">
      <div class="point-dot" style="background: #8b5cf6;"></div>
      <div class="point-label">Blissymbolics</div>
      <div class="point-note">good compose,<br/>slow reading</div>
    </div>

    <!-- CHINESE (after years) -->
    <div class="data-point" style="left: 45%; top: 28%;">
      <div class="point-dot" style="background: #dc2626;"></div>
      <div class="point-label">Chinese</div>
      <div class="point-note">lexicalized<br/>compositions</div>
    </div>

    <!-- FULL NSM -->
    <div class="data-point" style="left: 88%; top: 82%;">
      <div class="point-dot" style="background: #6366f1;"></div>
      <div class="point-label">Full NSM<br/>Explication</div>
      <div class="point-note">max transparent,<br/>very slow</div>
    </div>

    <!-- MATH NOTATION -->
    <div class="data-point" style="left: 80%; top: 35%;">
      <div class="point-dot" style="background: #0891b2;"></div>
      <div class="point-label">Math Notation</div>
      <div class="point-note">fully compositional,<br/>fast (for experts)</div>
    </div>

    <!-- TARGET: Lexicalized Visual Language -->
    <div class="data-point" style="left: 58%; top: 22%;">
      <div class="point-dot" style="background: #059669; width: 18px; height: 18px;"></div>
      <div class="point-label" style="color: #059669; font-weight: 700;">Visual Language<br/>(with lexicalization)</div>
    </div>

    <!-- Lexicalization arrow -->
    <div class="lex-arrow">
      <svg width="120" height="80" viewBox="0 0 120 80">
        <path d="M 10 65 C 40 60, 60 40, 100 15" fill="none" stroke="#d97706" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#lexArr)"/>
        <text x="30" y="30" font-size="8" fill="#d97706" font-weight="600" transform="rotate(-30, 30, 30)">lexicalization</text>
        <defs><marker id="lexArr" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto"><polygon points="0 0, 6 2, 0 4" fill="#d97706"/></marker></defs>
      </svg>
    </div>
  </div>

  <div class="chinese-example">
    <strong>The Chinese model:</strong> The character 看 (to look) = 手 (hand) + 目 (eye). Learners see the composition; fluent readers process it as a single unit. Frequent compositions crystallize into holistic symbols — the transition from analytical to automatic processing. A visual language should design for this same lifecycle: compositional transparency for learning, lexicalized efficiency for fluency.
  </div>

  <figcaption>
    <strong>Figure 5:</strong> The inherent tension between compositional transparency (seeing how a meaning is built from primitives) and reading speed (processing the meaning as a unit). Systems at the low-compositionality end (emoji, road signs) are fast but inexpressive. Systems at the high-compositionality end (NSM explications) are maximally transparent but slow. The design target is a system that starts compositional and lexicalizes frequent combinations — the same path Chinese characters have followed over millennia.
  </figcaption>
</figure>
