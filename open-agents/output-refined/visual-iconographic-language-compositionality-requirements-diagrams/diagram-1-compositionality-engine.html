<body>
<figure class="concept-diagram" id="diagram-compositionality-engine">
  <div class="diagram-title">The Compositionality Engine</div>
  <div class="diagram-subtitle">Finite symbols + composition rules = unlimited expressible meanings</div>

  <div class="engine-layout">
    <!-- INPUT: Finite Symbols -->
    <div class="engine-col col-input">
      <div class="col-header">Finite Symbol Inventory</div>
      <div class="col-body">
        <div class="sym-group">
          <div class="sym-group-label">Image Schema Symbols (~20)</div>
          <div class="sym-tags">
            <span class="sym-tag">Container</span>
            <span class="sym-tag">Path</span>
            <span class="sym-tag">Force</span>
            <span class="sym-tag">Balance</span>
            <span class="sym-tag">Link</span>
            <span class="sym-tag">Up-Down</span>
            <span class="sym-tag">Near-Far</span>
            <span class="sym-tag">Cycle</span>
            <span class="sym-tag">Part-Whole</span>
            <span class="sym-tag">Scale</span>
            <span class="sym-tag">Contact</span>
            <span class="sym-tag">Split</span>
            <span class="sym-tag">Merge</span>
          </div>
        </div>
        <div class="sym-group">
          <div class="sym-group-label">Semantic Prime Symbols (~65)</div>
          <div class="sym-tags">
            <span class="sym-tag">I</span>
            <span class="sym-tag">YOU</span>
            <span class="sym-tag">SOMEONE</span>
            <span class="sym-tag">GOOD</span>
            <span class="sym-tag">BAD</span>
            <span class="sym-tag">BIG</span>
            <span class="sym-tag">DO</span>
            <span class="sym-tag">KNOW</span>
            <span class="sym-tag">WANT</span>
            <span class="sym-tag">FEEL</span>
            <span class="sym-tag">SAY</span>
            <span class="sym-tag">...</span>
          </div>
        </div>
        <div class="sym-group">
          <div class="sym-group-label">Molecule Symbols (~50+)</div>
          <div class="sym-tags">
            <span class="sym-tag">person</span>
            <span class="sym-tag">house</span>
            <span class="sym-tag">water</span>
            <span class="sym-tag">food</span>
            <span class="sym-tag">day</span>
            <span class="sym-tag">hand</span>
            <span class="sym-tag">happy</span>
            <span class="sym-tag">...</span>
          </div>
        </div>
      </div>
    </div>

    <div class="arrow-col">&rarr;</div>

    <!-- RULES: Composition -->
    <div class="engine-col col-rules">
      <div class="col-header">Composition Rules</div>
      <div class="col-body">
        <div class="rule-item"><span class="rule-icon">&harr;</span> Spatial position (left-right, top-bottom)</div>
        <div class="rule-item"><span class="rule-icon">&#9711;</span> Enclosure (scope, containment)</div>
        <div class="rule-item"><span class="rule-icon">&mdash;</span> Connection lines (predication)</div>
        <div class="rule-item"><span class="rule-icon">&#9650;</span> Relative size (emphasis)</div>
        <div class="rule-item"><span class="rule-icon">---</span> Line style (modality, certainty)</div>
        <div class="rule-item"><span class="rule-icon">&#10005;</span> Negation boundary (blocking)</div>
        <div class="rule-item"><span class="rule-icon">&#8916;</span> Branching (conditionality)</div>
        <div class="rule-item"><span class="rule-icon">&#9632;</span> Color / shade (category)</div>
        <div class="rule-item"><span class="rule-icon">&#8634;</span> Nesting (recursion)</div>
      </div>
    </div>

    <div class="arrow-col">&rarr;</div>

    <!-- OUTPUT: Unlimited Meanings -->
    <div class="engine-col col-output">
      <div class="col-header">Unlimited Expressions</div>
      <div class="col-body">
        <div class="output-example output-simple">
          <div class="output-label">Simple</div>
          <div class="output-text">"person walks to house"</div>
          <div class="output-formula">PERSON + PATH-arrow + HOUSE</div>
        </div>
        <div class="output-example output-simple">
          <div class="output-label">Simple + Modifier</div>
          <div class="output-text">"happy person gives gift to friend"</div>
          <div class="output-formula">HAPPY(modifier) + PERSON + PATH(give) + GIFT + PERSON</div>
        </div>
        <div class="output-example output-medium">
          <div class="output-label">Medium — Temporal</div>
          <div class="output-text">"yesterday, rain fell on the city"</div>
          <div class="output-formula">PAST(position) + WATER + DOWN-PATH + CITY(container)</div>
        </div>
        <div class="output-example output-medium">
          <div class="output-label">Medium — Negation</div>
          <div class="output-text">"the child did not eat the food"</div>
          <div class="output-formula">CHILD + NEG-BOUNDARY[EAT + FOOD]</div>
        </div>
        <div class="output-example output-complex">
          <div class="output-label">Complex — Conditional</div>
          <div class="output-text">"if it rains, we will stay inside"</div>
          <div class="output-formula">BRANCH[RAIN(future)] -> WE + INSIDE(container)</div>
        </div>
        <div class="output-example output-complex">
          <div class="output-label">Complex — Counterfactual</div>
          <div class="output-text">"if it hadn't rained, we would have walked"</div>
          <div class="output-formula">BRANCH-dashed[NEG(RAIN)(past)] -> WE + PATH(walk)</div>
        </div>
      </div>
    </div>
  </div>

  <div class="bottom-banner">
    ~135 base symbols &times; composition rules = unlimited distinct expressions.<br/>
    This is what separates a language from a vocabulary.
  </div>

  <figcaption>
    <strong>Figure 1:</strong> The compositionality engine that transforms a finite symbol inventory into unlimited expressive capacity. Left: the three tiers of visual primitives (image schemas, semantic primes, lexicalized molecules). Center: the spatial grammar rules that determine how symbols combine. Right: example outputs of increasing complexity, from simple predications through negation and conditionality to counterfactual reasoning.
  </figcaption>
</figure>
</body>
