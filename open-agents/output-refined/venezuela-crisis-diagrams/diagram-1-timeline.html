        2013 : Hugo Chavez dies (March 5)

             : Economic crisis begins
        2015 : Opposition wins National Assembly
             : Two-thirds supermajority

    section Crisis Deepens
        2017 : Supreme Court tries to dissolve Assembly
             : Constituent Assembly created
             : U.S. financial sanctions begin

             : Mass emigration accelerates
        2019 : Guaido declares interim presidency
             : PDVSA sanctions imposed
             : 50+ countries recognize Guaido

    section Final Phase
        2023 : Guaido interim government dissolved
             : Oil sanctions temporarily lifted
        2024 : Opposition wins election (67-30%)
             : Government claims victory
             : International condemnation
             : Gonzalez flees to Spain
        2025 : Machado wins Nobel Peace Prize
