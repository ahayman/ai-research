<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
const years = ['2010', '2012', '2014', '2016', '2018', '2020', '2022', '2024'];

// GDP Chart
new Chart(document.getElementById('gdpChart'), {
  type: 'line',
  data: {
    labels: years,
    datasets: [{
      label: 'GDP Index',
      data: [90, 100, 100, 80, 50, 25, 22, 28],
      borderColor: '#dc2626',
      backgroundColor: 'rgba(220, 38, 38, 0.1)',
      fill: true,
      tension: 0.3
    }]
  },
  options: {
    responsive: true,
    plugins: {
      legend: { display: false },
      annotation: {
        annotations: {
          line1: {
            type: 'line',
            xMin: '2014',
            xMax: '2014',
            borderColor: '#f59e0b',
            borderWidth: 2,
            borderDash: [5, 5],
            label: {
              content: 'Oil crash',
              enabled: true
            }
          }
        }
      }
    },
    scales: {
      y: {
        beginAtZero: true,
        max: 110,
        title: { display: true, text: 'Index (2013=100)' }
      }
    }
  }
});

// Oil Production Chart
new Chart(document.getElementById('oilChart'), {
  type: 'line',
  data: {
    labels: years,
    datasets: [{
      label: 'Oil Production',
      data: [2.8, 2.9, 2.7, 2.4, 1.5, 0.5, 0.7, 0.9],
      borderColor: '#d97706',
      backgroundColor: 'rgba(217, 119, 6, 0.1)',
      fill: true,
      tension: 0.3
    }]
  },
  options: {
    responsive: true,
    plugins: { legend: { display: false } },
    scales: {
      y: {
        beginAtZero: true,
        max: 3.5,
        title: { display: true, text: 'Million bbl/day' }
      }
    }
  }
});

// Inflation Chart (log scale)
new Chart(document.getElementById('inflationChart'), {
  type: 'line',
  data: {
    labels: years,
    datasets: [{
      label: 'Inflation',
      data: [28, 20, 62, 500, 130000, 3000, 150, 50],
      borderColor: '#9333ea',
      backgroundColor: 'rgba(147, 51, 234, 0.1)',
      fill: true,
      tension: 0.3
    }]
  },
  options: {
    responsive: true,
    plugins: { legend: { display: false } },
    scales: {
      y: {
        type: 'logarithmic',
        title: { display: true, text: '% (log scale)' }
      }
    }
  }
});

// Migration Chart
new Chart(document.getElementById('migrationChart'), {
  type: 'line',
  data: {
    labels: years,
    datasets: [{
      label: 'Cumulative Migration',
      data: [0.2, 0.4, 0.5, 1.5, 3.0, 5.5, 7.1, 7.9],
      borderColor: '#16a34a',
      backgroundColor: 'rgba(22, 163, 74, 0.1)',
      fill: true,
      tension: 0.3
    }]
  },
  options: {
    responsive: true,
    plugins: { legend: { display: false } },
    scales: {
      y: {
        beginAtZero: true,
        max: 10,
        title: { display: true, text: 'Millions' }
      }
    }
  }
});
</script>
