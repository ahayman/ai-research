<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chinese Romanization Systems: A Historical Timeline</title>
<style>
  :root {
    --bg: #0f172a; --fg: #e2e8f0; --surface: #1e293b; --border: #334155;
    --cyan: #06b6d4; --amber: #f59e0b; --rose: #f43f5e; --emerald: #10b981;
    --purple: #a78bfa; --blue: #3b82f6; --orange: #f97316; --pink: #ec4899;
    --muted: #64748b; --caption-bg: #1e293b;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--fg); display: flex; justify-content: center; padding: 1.5rem 0.75rem; line-height: 1.5; }
  figure { max-width: 960px; width: 100%; }
  figcaption { text-align: center; margin-top: 1.25rem; padding: 1rem 1.5rem; background: var(--caption-bg); border-radius: 8px; border: 1px solid var(--border); }
  figcaption h2 { font-size: 1rem; font-weight: 700; margin-bottom: 0.3rem; color: var(--cyan); }
  figcaption p { font-size: 0.8rem; color: var(--muted); }
  .chart-wrapper { border: 1px solid var(--border); border-radius: 10px; background: var(--surface); padding: 1.5rem; overflow-x: auto; }

  .timeline { position: relative; padding: 1rem 0 1rem 2.5rem; }
  .timeline::before { content: ''; position: absolute; left: 1rem; top: 0; bottom: 0; width: 2px; background: linear-gradient(180deg, var(--cyan), var(--amber), var(--emerald), var(--purple)); }

  .t-event { position: relative; margin-bottom: 1.5rem; }
  .t-event:last-child { margin-bottom: 0; }
  .t-dot { position: absolute; left: -1.85rem; top: 0.35rem; width: 14px; height: 14px; border-radius: 50%; border: 2px solid; background: var(--surface); z-index: 1; }
  .t-year { font-size: 0.75rem; font-weight: 800; letter-spacing: 0.05em; margin-bottom: 0.15rem; }
  .t-card { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 0.85rem 1rem; transition: border-color 0.2s; }
  .t-card:hover { border-color: var(--cyan); }
  .t-name { font-size: 1rem; font-weight: 700; margin-bottom: 0.2rem; }
  .t-chinese { font-size: 0.85rem; color: var(--muted); margin-bottom: 0.35rem; }
  .t-desc { font-size: 0.82rem; color: var(--muted); margin-bottom: 0.5rem; }
  .t-sample { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 0.4rem 0.65rem; font-family: 'SF Mono', Consolas, monospace; font-size: 0.8rem; display: inline-flex; gap: 0.75rem; flex-wrap: wrap; }
  .t-sample-label { font-size: 0.65rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
  .t-tag { display: inline-block; font-size: 0.6rem; padding: 0.1rem 0.4rem; border-radius: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }

  .tag-western { background: rgba(59,130,246,0.15); color: var(--blue); border: 1px solid rgba(59,130,246,0.3); }
  .tag-roc { background: rgba(245,158,11,0.15); color: var(--amber); border: 1px solid rgba(245,158,11,0.3); }
  .tag-prc { background: rgba(244,63,94,0.15); color: var(--rose); border: 1px solid rgba(244,63,94,0.3); }
  .tag-intl { background: rgba(16,185,129,0.15); color: var(--emerald); border: 1px solid rgba(16,185,129,0.3); }

  .dot-western { border-color: var(--blue); }
  .dot-roc { border-color: var(--amber); }
  .dot-prc { border-color: var(--rose); }
  .dot-intl { border-color: var(--emerald); }

  .year-western { color: var(--blue); }
  .year-roc { color: var(--amber); }
  .year-prc { color: var(--rose); }
  .year-intl { color: var(--emerald); }

  .name-western { color: var(--blue); }
  .name-roc { color: var(--amber); }
  .name-prc { color: var(--rose); }
  .name-intl { color: var(--emerald); }

  .legend { display: flex; flex-wrap: wrap; gap: 0.75rem; margin-bottom: 1.25rem; font-size: 0.75rem; }
  .legend-item { display: flex; align-items: center; gap: 0.3rem; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
  .comparison-box { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; margin-top: 1.25rem; }
  .comparison-box h4 { font-size: 0.85rem; color: var(--cyan); margin-bottom: 0.5rem; }
  .comp-grid { display: grid; grid-template-columns: 130px repeat(5, 1fr); gap: 0; font-size: 0.72rem; }
  .comp-cell { padding: 0.4rem 0.35rem; border: 1px solid var(--border); text-align: center; }
  .comp-header { background: rgba(6,182,212,0.12); color: var(--cyan); font-weight: 700; font-size: 0.68rem; }
  .comp-label { background: rgba(6,182,212,0.06); color: var(--fg); font-weight: 600; text-align: left; padding-left: 0.5rem; }
</style>
</head>
<body>
<figure>
  <div class="chart-wrapper">
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--blue)"></div> Western scholars</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--amber)"></div> ROC (Republic of China)</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--rose)"></div> PRC (People's Republic)</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--emerald)"></div> International standard</div>
    </div>

    <div class="timeline">
      <!-- Wade-Giles -->
      <div class="t-event">
        <div class="t-dot dot-western"></div>
        <div class="t-year year-western">1859 / 1892</div>
        <div class="t-card">
          <div class="t-name name-western">Wade-Giles <span class="t-tag tag-western">Western</span></div>
          <div class="t-chinese">威妥玛拼音</div>
          <div class="t-desc">Thomas Wade (1859 textbook) + Herbert Giles (1892 dictionary). Used apostrophes for aspiration: p'/p, t'/t, k'/k. Dominant in English-speaking world for ~100 years.</div>
          <div class="t-sample">
            <div><span class="t-sample-label">Beijing:</span> Pei-ching</div>
            <div><span class="t-sample-label">Mao Zedong:</span> Mao Tse-tung</div>
          </div>
        </div>
      </div>

      <!-- Postal -->
      <div class="t-event">
        <div class="t-dot dot-western"></div>
        <div class="t-year year-western">1906</div>
        <div class="t-card">
          <div class="t-name name-western">Postal Romanization <span class="t-tag tag-western">Western</span></div>
          <div class="t-chinese">邮政式拼音</div>
          <div class="t-desc">Qing dynasty postal service standard for international communication. Hybrid system mixing Wade-Giles, local dialect pronunciations, and convention. Responsible for many still-familiar English names.</div>
          <div class="t-sample">
            <div><span class="t-sample-label">Beijing:</span> Peking</div>
            <div><span class="t-sample-label">Guangzhou:</span> Canton</div>
            <div><span class="t-sample-label">Xiamen:</span> Amoy</div>
          </div>
        </div>
      </div>

      <!-- Bopomofo -->
      <div class="t-event">
        <div class="t-dot dot-roc"></div>
        <div class="t-year year-roc">1913 / 1918</div>
        <div class="t-card">
          <div class="t-name name-roc">Bopomofo (Zhuyin Fuhao) <span class="t-tag tag-roc">ROC</span></div>
          <div class="t-chinese">注音符号 ㄅㄆㄇㄈ</div>
          <div class="t-desc">37 symbols derived from ancient Chinese character forms by Zhang Binglin. NOT a romanization — uses its own unique script. Adopted as the ROC's phonetic standard. Still the primary system in Taiwan today.</div>
          <div class="t-sample">
            <div><span class="t-sample-label">Beijing:</span> ㄅㄟˇ ㄐㄧㄥ</div>
          </div>
        </div>
      </div>

      <!-- GR -->
      <div class="t-event">
        <div class="t-dot dot-roc"></div>
        <div class="t-year year-roc">1928</div>
        <div class="t-card">
          <div class="t-name name-roc">Gwoyeu Romatzyh (GR) <span class="t-tag tag-roc">ROC</span></div>
          <div class="t-chinese">国语罗马字</div>
          <div class="t-desc">First official government romanization. Created by Y.R. Chao and others. Unique innovation: tones encoded through spelling variation, not diacritics. Intellectually elegant but too complex for mass adoption.</div>
          <div class="t-sample">
            <div><span class="t-sample-label">Beijing:</span> Beeijiing</div>
            <div><span class="t-sample-label">Tone encoding:</span> ma, ma, maa, mah</div>
          </div>
        </div>
      </div>

      <!-- Pinyin -->
      <div class="t-event">
        <div class="t-dot dot-prc" style="width:18px;height:18px;left:-2rem;top:0.2rem;background:var(--rose);"></div>
        <div class="t-year year-prc" style="font-size:0.9rem;">1958</div>
        <div class="t-card" style="border-color:rgba(244,63,94,0.3);background:rgba(244,63,94,0.04);">
          <div class="t-name name-prc" style="font-size:1.15rem;">Hanyu Pinyin <span class="t-tag tag-prc">PRC</span></div>
          <div class="t-chinese">汉语拼音</div>
          <div class="t-desc">Developed by committee led by Zhou Youguang (周有光). Drew on innovations from Gwoyeu Romatzyh with modifications. Latin letters with tone diacritics. Adopted 11 Feb 1958 by National People's Congress. Now used by over 1 billion people.</div>
          <div class="t-sample">
            <div><span class="t-sample-label">Beijing:</span> Běijīng</div>
            <div><span class="t-sample-label">Mao Zedong:</span> Máo Zédōng</div>
          </div>
        </div>
      </div>

      <!-- ISO -->
      <div class="t-event">
        <div class="t-dot dot-intl"></div>
        <div class="t-year year-intl">1982</div>
        <div class="t-card">
          <div class="t-name name-intl">ISO 7098 <span class="t-tag tag-intl">International</span></div>
          <div class="t-desc">International Organization for Standardization adopts Pinyin as the standard romanization for modern Chinese. Revised 1991, 2015.</div>
        </div>
      </div>

      <!-- UN -->
      <div class="t-event">
        <div class="t-dot dot-intl"></div>
        <div class="t-year year-intl">1986</div>
        <div class="t-card">
          <div class="t-name name-intl">United Nations Adoption <span class="t-tag tag-intl">International</span></div>
          <div class="t-desc">UN adopts Pinyin for romanization of Chinese geographical names and personal names, replacing earlier systems in international usage.</div>
        </div>
      </div>

      <!-- Taiwan Pinyin -->
      <div class="t-event">
        <div class="t-dot dot-roc"></div>
        <div class="t-year year-roc">2009</div>
        <div class="t-card">
          <div class="t-name name-roc">Taiwan Adopts Pinyin for Names <span class="t-tag tag-roc">ROC</span></div>
          <div class="t-desc">Taiwan switches to Hanyu Pinyin for romanized place names and signage (replacing Tongyong Pinyin, used 2000-2009). Bopomofo remains the primary phonetic system for education and daily input.</div>
        </div>
      </div>
    </div>

    <div class="comparison-box">
      <h4>"Beijing" Across Systems</h4>
      <div class="comp-grid">
        <div class="comp-cell comp-header">System</div>
        <div class="comp-cell comp-header">Wade-Giles</div>
        <div class="comp-cell comp-header">Postal</div>
        <div class="comp-cell comp-header">GR</div>
        <div class="comp-cell comp-header">Pinyin</div>
        <div class="comp-cell comp-header">Bopomofo</div>
        <div class="comp-cell comp-label">北京</div>
        <div class="comp-cell">Pei-ching</div>
        <div class="comp-cell">Peking</div>
        <div class="comp-cell">Beeijiing</div>
        <div class="comp-cell" style="color:var(--rose);font-weight:700;">Běijīng</div>
        <div class="comp-cell" style="color:var(--amber);">ㄅㄟˇㄐㄧㄥ</div>
      </div>
    </div>
  </div>

  <figcaption>
    <h2>Diagram 3: Romanization Systems Timeline (1859-2009)</h2>
    <p>From Wade-Giles through Postal Romanization to Pinyin: 150 years of attempts to bridge Chinese sounds and the Latin alphabet. Color-coded by origin: Western scholars, ROC, PRC, and international standards.</p>
  </figcaption>
</figure>
</body>
</html>
