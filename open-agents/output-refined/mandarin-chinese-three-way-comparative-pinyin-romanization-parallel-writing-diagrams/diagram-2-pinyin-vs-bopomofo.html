<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pinyin vs Bopomofo: Two Phonetic Systems Compared</title>
<style>
  :root {
    --bg: #0f172a; --fg: #e2e8f0; --surface: #1e293b; --border: #334155;
    --cyan: #06b6d4; --cyan-bg: rgba(6,182,212,0.08);
    --amber: #f59e0b; --amber-bg: rgba(245,158,11,0.08);
    --rose: #f43f5e; --rose-bg: rgba(244,63,94,0.08);
    --emerald: #10b981; --emerald-bg: rgba(16,185,129,0.08);
    --muted: #64748b; --caption-bg: #1e293b;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--fg); display: flex; justify-content: center; padding: 1.5rem 0.75rem; line-height: 1.5; }
  figure { max-width: 960px; width: 100%; }
  figcaption { text-align: center; margin-top: 1.25rem; padding: 1rem 1.5rem; background: var(--caption-bg); border-radius: 8px; border: 1px solid var(--border); }
  figcaption h2 { font-size: 1rem; font-weight: 700; margin-bottom: 0.3rem; color: var(--cyan); }
  figcaption p { font-size: 0.8rem; color: var(--muted); }
  .chart-wrapper { border: 1px solid var(--border); border-radius: 10px; background: var(--surface); padding: 1.5rem; }

  .header-row { display: flex; gap: 1.5rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .system-badge { flex: 1; min-width: 200px; padding: 1rem; border-radius: 8px; border: 1px solid; }
  .badge-pinyin { background: var(--cyan-bg); border-color: rgba(6,182,212,0.3); }
  .badge-bpmf { background: var(--amber-bg); border-color: rgba(245,158,11,0.3); }
  .badge-label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 700; margin-bottom: 0.25rem; }
  .badge-pinyin .badge-label { color: var(--cyan); }
  .badge-bpmf .badge-label { color: var(--amber); }
  .badge-name { font-size: 1.2rem; font-weight: 800; margin-bottom: 0.15rem; }
  .badge-pinyin .badge-name { color: var(--cyan); }
  .badge-bpmf .badge-name { color: var(--amber); }
  .badge-detail { font-size: 0.8rem; color: var(--muted); }
  .badge-chinese { font-size: 1.1rem; }

  .section-title { font-size: 0.85rem; font-weight: 700; color: var(--fg); margin: 1.25rem 0 0.5rem; text-transform: uppercase; letter-spacing: 0.06em; border-bottom: 1px solid var(--border); padding-bottom: 0.35rem; }

  .mapping-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 0.35rem; margin-bottom: 0.75rem; }
  .map-cell { display: flex; flex-direction: column; align-items: center; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 0.4rem 0.25rem; transition: border-color 0.2s; }
  .map-cell:hover { border-color: var(--cyan); }
  .map-pinyin { font-size: 0.9rem; font-weight: 700; color: var(--cyan); font-family: 'SF Mono', Consolas, monospace; }
  .map-bpmf { font-size: 1.1rem; color: var(--amber); line-height: 1.2; }
  .map-ipa { font-size: 0.6rem; color: var(--muted); font-family: 'Gentium Plus', 'Noto Sans', serif; }

  .compare-table { width: 100%; border-collapse: collapse; margin-top: 1rem; font-size: 0.82rem; }
  .compare-table th { background: rgba(6,182,212,0.12); color: var(--cyan); font-weight: 700; padding: 0.6rem 0.75rem; text-align: left; border-bottom: 2px solid var(--border); font-size: 0.75rem; }
  .compare-table td { padding: 0.55rem 0.75rem; border-bottom: 1px solid var(--border); vertical-align: top; }
  .compare-table tr:last-child td { border-bottom: none; }
  .compare-table .feat { font-weight: 600; color: var(--fg); min-width: 120px; }
  .pinyin-col { color: var(--cyan); }
  .bpmf-col { color: var(--amber); }

  .insight-box { background: var(--bg); border: 1px solid rgba(16,185,129,0.3); border-radius: 8px; padding: 0.85rem 1rem; margin-top: 1.25rem; font-size: 0.82rem; }
  .insight-box strong { color: var(--emerald); }
</style>
</head>
<body>
<figure>
  <div class="chart-wrapper">
    <div class="header-row">
      <div class="system-badge badge-pinyin">
        <div class="badge-label">Mainland China (PRC) since 1958</div>
        <div class="badge-name">Pinyin <span class="badge-chinese">拼音</span></div>
        <div class="badge-detail">Latin alphabet + tone diacritics</div>
      </div>
      <div class="system-badge badge-bpmf">
        <div class="badge-label">Taiwan (ROC) since 1913</div>
        <div class="badge-name">Bopomofo <span class="badge-chinese">ㄅㄆㄇㄈ</span></div>
        <div class="badge-detail">37 unique symbols from ancient characters</div>
      </div>
    </div>

    <div class="section-title">Initials Mapping (21 consonant onsets)</div>
    <div class="mapping-grid">
      <div class="map-cell"><span class="map-pinyin">b</span><span class="map-bpmf">ㄅ</span><span class="map-ipa">[p]</span></div>
      <div class="map-cell"><span class="map-pinyin">p</span><span class="map-bpmf">ㄆ</span><span class="map-ipa">[pʰ]</span></div>
      <div class="map-cell"><span class="map-pinyin">m</span><span class="map-bpmf">ㄇ</span><span class="map-ipa">[m]</span></div>
      <div class="map-cell"><span class="map-pinyin">f</span><span class="map-bpmf">ㄈ</span><span class="map-ipa">[f]</span></div>
      <div class="map-cell"><span class="map-pinyin">d</span><span class="map-bpmf">ㄉ</span><span class="map-ipa">[t]</span></div>
      <div class="map-cell"><span class="map-pinyin">t</span><span class="map-bpmf">ㄊ</span><span class="map-ipa">[tʰ]</span></div>
      <div class="map-cell"><span class="map-pinyin">n</span><span class="map-bpmf">ㄋ</span><span class="map-ipa">[n]</span></div>
      <div class="map-cell"><span class="map-pinyin">l</span><span class="map-bpmf">ㄌ</span><span class="map-ipa">[l]</span></div>
      <div class="map-cell"><span class="map-pinyin">g</span><span class="map-bpmf">ㄍ</span><span class="map-ipa">[k]</span></div>
      <div class="map-cell"><span class="map-pinyin">k</span><span class="map-bpmf">ㄎ</span><span class="map-ipa">[kʰ]</span></div>
      <div class="map-cell"><span class="map-pinyin">h</span><span class="map-bpmf">ㄏ</span><span class="map-ipa">[x]</span></div>
      <div class="map-cell"><span class="map-pinyin">j</span><span class="map-bpmf">ㄐ</span><span class="map-ipa">[tɕ]</span></div>
      <div class="map-cell"><span class="map-pinyin">q</span><span class="map-bpmf">ㄑ</span><span class="map-ipa">[tɕʰ]</span></div>
      <div class="map-cell"><span class="map-pinyin">x</span><span class="map-bpmf">ㄒ</span><span class="map-ipa">[ɕ]</span></div>
      <div class="map-cell"><span class="map-pinyin">zh</span><span class="map-bpmf">ㄓ</span><span class="map-ipa">[tʂ]</span></div>
      <div class="map-cell"><span class="map-pinyin">ch</span><span class="map-bpmf">ㄔ</span><span class="map-ipa">[tʂʰ]</span></div>
      <div class="map-cell"><span class="map-pinyin">sh</span><span class="map-bpmf">ㄕ</span><span class="map-ipa">[ʂ]</span></div>
      <div class="map-cell"><span class="map-pinyin">r</span><span class="map-bpmf">ㄖ</span><span class="map-ipa">[ɻ]</span></div>
      <div class="map-cell"><span class="map-pinyin">z</span><span class="map-bpmf">ㄗ</span><span class="map-ipa">[ts]</span></div>
      <div class="map-cell"><span class="map-pinyin">c</span><span class="map-bpmf">ㄘ</span><span class="map-ipa">[tsʰ]</span></div>
      <div class="map-cell"><span class="map-pinyin">s</span><span class="map-bpmf">ㄙ</span><span class="map-ipa">[s]</span></div>
    </div>

    <div class="section-title">Finals Mapping (16 basic rhymes)</div>
    <div class="mapping-grid">
      <div class="map-cell"><span class="map-pinyin">a</span><span class="map-bpmf">ㄚ</span><span class="map-ipa">[a]</span></div>
      <div class="map-cell"><span class="map-pinyin">o</span><span class="map-bpmf">ㄛ</span><span class="map-ipa">[o]</span></div>
      <div class="map-cell"><span class="map-pinyin">e</span><span class="map-bpmf">ㄜ</span><span class="map-ipa">[ɤ]</span></div>
      <div class="map-cell"><span class="map-pinyin">i</span><span class="map-bpmf">ㄧ</span><span class="map-ipa">[i]</span></div>
      <div class="map-cell"><span class="map-pinyin">u</span><span class="map-bpmf">ㄨ</span><span class="map-ipa">[u]</span></div>
      <div class="map-cell"><span class="map-pinyin">ü</span><span class="map-bpmf">ㄩ</span><span class="map-ipa">[y]</span></div>
      <div class="map-cell"><span class="map-pinyin">ai</span><span class="map-bpmf">ㄞ</span><span class="map-ipa">[ai]</span></div>
      <div class="map-cell"><span class="map-pinyin">ei</span><span class="map-bpmf">ㄟ</span><span class="map-ipa">[ei]</span></div>
      <div class="map-cell"><span class="map-pinyin">ao</span><span class="map-bpmf">ㄠ</span><span class="map-ipa">[au]</span></div>
      <div class="map-cell"><span class="map-pinyin">ou</span><span class="map-bpmf">ㄡ</span><span class="map-ipa">[ou]</span></div>
      <div class="map-cell"><span class="map-pinyin">an</span><span class="map-bpmf">ㄢ</span><span class="map-ipa">[an]</span></div>
      <div class="map-cell"><span class="map-pinyin">en</span><span class="map-bpmf">ㄣ</span><span class="map-ipa">[ən]</span></div>
      <div class="map-cell"><span class="map-pinyin">ang</span><span class="map-bpmf">ㄤ</span><span class="map-ipa">[aŋ]</span></div>
      <div class="map-cell"><span class="map-pinyin">eng</span><span class="map-bpmf">ㄥ</span><span class="map-ipa">[əŋ]</span></div>
      <div class="map-cell"><span class="map-pinyin">er</span><span class="map-bpmf">ㄦ</span><span class="map-ipa">[əɻ]</span></div>
      <div class="map-cell"><span class="map-pinyin">ong</span><span class="map-bpmf">ㄨㄥ</span><span class="map-ipa">[ʊŋ]</span></div>
    </div>

    <div class="section-title">Feature Comparison</div>
    <table class="compare-table">
      <thead>
        <tr><th>Feature</th><th class="pinyin-col">Pinyin 拼音</th><th class="bpmf-col">Bopomofo 注音</th></tr>
      </thead>
      <tbody>
        <tr><td class="feat">Script basis</td><td>Latin alphabet (26 letters)</td><td>Ancient Chinese character forms</td></tr>
        <tr><td class="feat">Symbol count</td><td>26 letters + 4 diacritics + ü</td><td>37 unique symbols + 5 tone marks</td></tr>
        <tr><td class="feat">Adopted</td><td>1958 (PRC)</td><td>1913/1918 (ROC)</td></tr>
        <tr><td class="feat">L1 interference</td><td>High — English speakers mispronounce c, q, x, zh, r</td><td>None — symbols have no prior associations</td></tr>
        <tr><td class="feat">International use</td><td>ISO 7098, UN standard, global signage</td><td>Taiwan domestic only</td></tr>
        <tr><td class="feat">Digital input</td><td>QWERTY keyboard, tones usually omitted</td><td>Dedicated keyboard layout, tones included</td></tr>
        <tr><td class="feat">Tone encoding</td><td>Diacritics: ā á ǎ à (often omitted in practice)</td><td>Marks: ˊ ˇ ˋ ˙ (always typed)</td></tr>
        <tr><td class="feat">Learning curve</td><td>Fast for Latin-alphabet speakers</td><td>Requires learning new symbol set</td></tr>
        <tr><td class="feat">Pronunciation accuracy</td><td>Risk of English-influenced errors</td><td>Cleaner — no false-friend sounds</td></tr>
      </tbody>
    </table>

    <div class="insight-box">
      <strong>Key Structural Insight:</strong> Pinyin and Bopomofo encode the <em>exact same</em> phonological inventory — 21 initials, 16 basic finals, 4 tones. The difference is purely notational: Pinyin borrows Latin letters (global accessibility, L1 interference risk), while Bopomofo uses purpose-built symbols (no interference, but no global familiarity). This is a design trade-off between internationality and phonetic purity.
    </div>
  </div>

  <figcaption>
    <h2>Diagram 2: Pinyin vs. Bopomofo — Complete Mapping</h2>
    <p>Both systems encode identical Mandarin sounds. Pinyin uses Latin letters for global accessibility; Bopomofo uses unique symbols derived from ancient Chinese characters for interference-free pronunciation.</p>
  </figcaption>
</figure>
</body>
</html>
