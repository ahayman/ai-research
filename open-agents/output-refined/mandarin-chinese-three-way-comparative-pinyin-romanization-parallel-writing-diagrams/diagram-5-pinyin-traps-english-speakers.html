<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pinyin Traps for English Speakers</title>
<style>
  :root {
    --bg: #0f172a; --fg: #e2e8f0; --surface: #1e293b; --border: #334155;
    --safe: #10b981; --safe-bg: rgba(16,185,129,0.08); --safe-border: rgba(16,185,129,0.3);
    --danger: #f43f5e; --danger-bg: rgba(244,63,94,0.08); --danger-border: rgba(244,63,94,0.3);
    --warn: #f59e0b; --warn-bg: rgba(245,158,11,0.08); --warn-border: rgba(245,158,11,0.3);
    --cyan: #06b6d4;
    --muted: #64748b; --caption-bg: #1e293b;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--fg); display: flex; justify-content: center; padding: 1.5rem 0.75rem; line-height: 1.5; }
  figure { max-width: 920px; width: 100%; }
  figcaption { text-align: center; margin-top: 1.25rem; padding: 1rem 1.5rem; background: var(--caption-bg); border-radius: 8px; border: 1px solid var(--border); }
  figcaption h2 { font-size: 1rem; font-weight: 700; margin-bottom: 0.3rem; color: var(--cyan); }
  figcaption p { font-size: 0.8rem; color: var(--muted); }
  .chart-wrapper { border: 1px solid var(--border); border-radius: 10px; background: var(--surface); padding: 1.5rem; }

  .section-title { font-size: 0.9rem; font-weight: 700; margin-bottom: 0.5rem; display: flex; align-items: center; gap: 0.5rem; }
  .section-title .badge { display: inline-block; padding: 0.15rem 0.6rem; border-radius: 10px; font-size: 0.65rem; font-weight: 800; color: white; }
  .badge-safe { background: var(--safe); }
  .badge-danger { background: var(--danger); }
  .badge-warn { background: var(--warn); }

  /* Safe letters grid */
  .safe-grid { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 0.5rem; }
  .safe-letter { display: inline-flex; align-items: center; justify-content: center; width: 42px; height: 42px; border-radius: 8px; background: var(--safe-bg); border: 1px solid var(--safe-border); color: var(--safe); font-weight: 800; font-size: 1.1rem; font-family: 'SF Mono', Consolas, monospace; transition: transform 0.15s; }
  .safe-letter:hover { transform: scale(1.1); }
  .safe-note { font-size: 0.78rem; color: var(--muted); margin-bottom: 1.5rem; padding-left: 0.25rem; }

  /* Danger table */
  .danger-section { margin-bottom: 1.5rem; }
  table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
  th { background: var(--danger-bg); color: var(--danger); font-weight: 700; padding: 0.6rem 0.5rem; text-align: center; border-bottom: 2px solid var(--border); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.06em; }
  td { padding: 0.6rem 0.5rem; border-bottom: 1px solid var(--border); text-align: center; vertical-align: middle; }
  tr:hover td { background: rgba(244,63,94,0.04); }

  .letter-big { font-size: 1.4rem; font-weight: 900; color: var(--danger); font-family: 'SF Mono', Consolas, monospace; }
  .ipa { font-family: 'Gentium Plus', 'Noto Sans', 'DejaVu Sans', serif; color: var(--cyan); font-weight: 600; }
  .wrong { color: var(--danger); font-size: 0.78rem; text-decoration: line-through; opacity: 0.7; }
  .right { color: var(--safe); font-size: 0.78rem; }
  .example { font-size: 0.78rem; color: var(--muted); }
  .example em { color: var(--fg); font-style: normal; font-weight: 600; }

  /* Vowel traps */
  .vowel-section { margin-top: 1rem; }
  .vowel-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 0.6rem; margin-top: 0.5rem; }
  .vowel-card { background: var(--bg); border: 1px solid var(--warn-border); border-radius: 8px; padding: 0.75rem 0.85rem; }
  .vowel-letter { font-size: 1.2rem; font-weight: 900; color: var(--warn); font-family: 'SF Mono', Consolas, monospace; }
  .vowel-ipa { font-family: 'Gentium Plus', 'Noto Sans', serif; color: var(--cyan); font-size: 0.85rem; }
  .vowel-wrong { color: var(--danger); font-size: 0.78rem; margin-top: 0.2rem; }
  .vowel-right { color: var(--safe); font-size: 0.78rem; }
  .vowel-tip { color: var(--muted); font-size: 0.75rem; margin-top: 0.25rem; }

  /* Tone placement */
  .tone-section { margin-top: 1.5rem; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; }
  .tone-section h4 { font-size: 0.85rem; font-weight: 700; color: var(--cyan); margin-bottom: 0.5rem; }
  .tone-row { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.4rem; flex-wrap: wrap; }
  .tone-mark { font-size: 1.4rem; font-weight: 800; font-family: 'SF Mono', Consolas, monospace; width: 2.5rem; text-align: center; }
  .t1 { color: #f43f5e; }
  .t2 { color: #f59e0b; }
  .t3 { color: #06b6d4; }
  .t4 { color: #a78bfa; }
  .t5 { color: var(--muted); }
  .tone-desc { font-size: 0.82rem; color: var(--muted); }
  .tone-contour { font-family: 'SF Mono', Consolas, monospace; font-weight: 700; font-size: 0.85rem; min-width: 60px; }

  .aspiration-box { margin-top: 1.5rem; background: var(--bg); border: 1px solid var(--danger-border); border-radius: 8px; padding: 1rem; }
  .aspiration-box h4 { color: var(--danger); font-size: 0.85rem; font-weight: 700; margin-bottom: 0.5rem; }
  .asp-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 0.5rem; }
  .asp-pair { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 0.6rem; text-align: center; }
  .asp-letters { font-size: 1.1rem; font-weight: 800; font-family: 'SF Mono', Consolas, monospace; }
  .asp-letters .unasp { color: var(--cyan); }
  .asp-letters .asp { color: var(--warn); }
  .asp-labels { font-size: 0.68rem; color: var(--muted); margin-top: 0.15rem; }
</style>
</head>
<body>
<figure>
  <div class="chart-wrapper">

    <!-- Safe Letters -->
    <div class="section-title" style="color:var(--safe);">
      Safe Zone <span class="badge badge-safe">Close Enough to English</span>
    </div>
    <div class="safe-grid">
      <div class="safe-letter">b</div>
      <div class="safe-letter">d</div>
      <div class="safe-letter">f</div>
      <div class="safe-letter">g</div>
      <div class="safe-letter">h</div>
      <div class="safe-letter">k</div>
      <div class="safe-letter">l</div>
      <div class="safe-letter">m</div>
      <div class="safe-letter">n</div>
      <div class="safe-letter">p</div>
      <div class="safe-letter">s</div>
      <div class="safe-letter">t</div>
      <div class="safe-letter">w</div>
      <div class="safe-letter">y</div>
    </div>
    <div class="safe-note">Caveat: b, d, g are technically voiceless unaspirated [p, t, k], not voiced — but close enough for initial learning. The real traps are below.</div>

    <!-- Dangerous Consonants -->
    <div class="danger-section">
      <div class="section-title" style="color:var(--danger);">
        Danger Zone: Consonants <span class="badge badge-danger">Sounds Nothing Like English</span>
      </div>
      <table>
        <thead>
          <tr>
            <th>Pinyin</th>
            <th>Actual IPA</th>
            <th>English Wrong Guess</th>
            <th>Actually Sounds Like</th>
            <th>Example</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td><span class="letter-big">c</span></td>
            <td><span class="ipa">[tsʰ]</span></td>
            <td><span class="wrong">/k/ or /s/</span></td>
            <td><span class="right">"ts" in ca<u>ts</u> + puff of air</span></td>
            <td class="example"><em>cai</em> = "tsai" (vegetable)</td>
          </tr>
          <tr>
            <td><span class="letter-big">q</span></td>
            <td><span class="ipa">[tɕʰ]</span></td>
            <td><span class="wrong">/kw/ as in "queen"</span></td>
            <td><span class="right">"ch" in <u>ch</u>eese, tongue forward</span></td>
            <td class="example"><em>qi</em> = "chee" (seven)</td>
          </tr>
          <tr>
            <td><span class="letter-big">x</span></td>
            <td><span class="ipa">[ɕ]</span></td>
            <td><span class="wrong">/ks/ as in "fox"</span></td>
            <td><span class="right">"sh" in <u>sh</u>e, tongue forward</span></td>
            <td class="example"><em>xi</em> = "shee" (west)</td>
          </tr>
          <tr>
            <td><span class="letter-big">zh</span></td>
            <td><span class="ipa">[tʂ]</span></td>
            <td><span class="wrong">voiced "zh" in "measure"</span></td>
            <td><span class="right">"j" in <u>j</u>udge, tongue curled back</span></td>
            <td class="example"><em>zhi</em> = "jrr" (know)</td>
          </tr>
          <tr>
            <td><span class="letter-big">r</span></td>
            <td><span class="ipa">[ɻ]</span></td>
            <td><span class="wrong">English /r/ as in "red"</span></td>
            <td><span class="right">Tongue curled back, like "r" + "zh" blend</span></td>
            <td class="example"><em>ri</em> = "rrr" (sun)</td>
          </tr>
          <tr>
            <td><span class="letter-big">z</span></td>
            <td><span class="ipa">[ts]</span></td>
            <td><span class="wrong">/z/ as in "zoo"</span></td>
            <td><span class="right">"ds" in bu<u>ds</u>, no buzz</span></td>
            <td class="example"><em>zi</em> = "dzuh" (character)</td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- Dangerous Vowels -->
    <div class="vowel-section">
      <div class="section-title" style="color:var(--warn);">
        Danger Zone: Vowels <span class="badge badge-warn">Not What They Look Like</span>
      </div>
      <div class="vowel-grid">
        <div class="vowel-card">
          <span class="vowel-letter">e</span> <span class="vowel-ipa">[ɤ]</span>
          <div class="vowel-wrong">Not /iː/ as in "be" or /ɛ/ as in "bed"</div>
          <div class="vowel-right">Back unrounded vowel — like "uh" but deeper</div>
          <div class="vowel-tip">Except: in ei, en, eng it is closer to [ə]; in ie, üe it is [ɛ]</div>
        </div>
        <div class="vowel-card">
          <span class="vowel-letter">ü</span> <span class="vowel-ipa">[y]</span>
          <div class="vowel-wrong">Not /uː/ as in "blue"</div>
          <div class="vowel-right">French "u" or German "ü" — round lips, say "ee"</div>
          <div class="vowel-tip">Written as "u" after j, q, x (umlaut dropped — no ambiguity there)</div>
        </div>
        <div class="vowel-card">
          <span class="vowel-letter">-i</span> <span class="vowel-ipa">[ɨ] / [ɻ̩]</span>
          <div class="vowel-wrong">Not /iː/ as in "see"</div>
          <div class="vowel-right">After zh/ch/sh/r: a "buzzy" syllabic retroflex</div>
          <div class="vowel-tip">zhi, chi, shi, ri — the "i" is barely a vowel, more like a prolonged consonant</div>
        </div>
        <div class="vowel-card">
          <span class="vowel-letter">ou</span> <span class="vowel-ipa">[ou]</span>
          <div class="vowel-wrong">Not /aʊ/ as in "out"</div>
          <div class="vowel-right">More like "oh" gliding to "oo"</div>
          <div class="vowel-tip">dou = "doh-oo" (all/every)</div>
        </div>
      </div>
    </div>

    <!-- Aspiration reminder -->
    <div class="aspiration-box">
      <h4>The Aspiration Trap (Most Important Rule)</h4>
      <p style="font-size:0.82rem;color:var(--muted);margin-bottom:0.6rem;">These pairs look like voiced/voiceless (as in English) but are actually <strong style="color:var(--danger)">unaspirated/aspirated</strong>. Hold a paper in front of your mouth: the aspirated one makes it flutter.</p>
      <div class="asp-grid">
        <div class="asp-pair">
          <div class="asp-letters"><span class="unasp">b</span> [p] / <span class="asp">p</span> [pʰ]</div>
          <div class="asp-labels">no puff / puff</div>
        </div>
        <div class="asp-pair">
          <div class="asp-letters"><span class="unasp">d</span> [t] / <span class="asp">t</span> [tʰ]</div>
          <div class="asp-labels">no puff / puff</div>
        </div>
        <div class="asp-pair">
          <div class="asp-letters"><span class="unasp">g</span> [k] / <span class="asp">k</span> [kʰ]</div>
          <div class="asp-labels">no puff / puff</div>
        </div>
        <div class="asp-pair">
          <div class="asp-letters"><span class="unasp">j</span> [tɕ] / <span class="asp">q</span> [tɕʰ]</div>
          <div class="asp-labels">no puff / puff</div>
        </div>
        <div class="asp-pair">
          <div class="asp-letters"><span class="unasp">z</span> [ts] / <span class="asp">c</span> [tsʰ]</div>
          <div class="asp-labels">no puff / puff</div>
        </div>
        <div class="asp-pair">
          <div class="asp-letters"><span class="unasp">zh</span> [tʂ] / <span class="asp">ch</span> [tʂʰ]</div>
          <div class="asp-labels">no puff / puff</div>
        </div>
      </div>
    </div>

  </div>

  <figcaption>
    <h2>Diagram 5: Pinyin Traps for English Speakers</h2>
    <p>The Latin letters in Pinyin look familiar but many encode completely different sounds. Green letters are "safe enough"; red and amber letters are pronunciation traps where English instincts will mislead you.</p>
  </figcaption>
</figure>
</body>
</html>
