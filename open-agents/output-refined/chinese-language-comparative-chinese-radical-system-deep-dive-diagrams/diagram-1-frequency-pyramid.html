<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Radical Frequency Pyramid</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #f8f9fa;
    color: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 2rem;
  }
  figure {
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
    max-width: 1100px;
    width: 100%;
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid #e9ecef;
  }
  figcaption strong { display: block; font-size: 1.15rem; color: #1a1a2e; margin-bottom: 0.4rem; }
  figcaption span { font-size: 0.9rem; color: #6c757d; line-height: 1.5; }
  svg { max-width: 100%; height: auto; }
  .legend {
    display: flex; justify-content: center; gap: 1.5rem; margin-top: 1rem; flex-wrap: wrap;
  }
  .legend-item { display: flex; align-items: center; gap: 0.5rem; font-size: 0.85rem; color: #495057; }
  .legend-swatch { width: 16px; height: 16px; border-radius: 4px; }
  @media (prefers-color-scheme: dark) {
    body { background: #1a1a2e; color: #e9ecef; }
    figure { background: #2d2d44; box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
    figcaption { border-top-color: #3d3d5c; }
    figcaption strong { color: #e9ecef; }
    figcaption span { color: #adb5bd; }
    .legend-item { color: #adb5bd; }
    svg text { fill: #e9ecef; }
  }
</style>
</head>
<body>
<figure>
  <svg viewBox="0 0 1050 720" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
    <!-- Title -->
    <text x="525" y="32" text-anchor="middle" font-size="20" font-weight="700" fill="#1a1a2e">The Radical Frequency Pyramid</text>
    <text x="525" y="52" text-anchor="middle" font-size="13" fill="#6c757d">214 Kangxi radicals follow a Pareto distribution -- 50 radicals cover most everyday characters</text>

    <!-- Pyramid -->
    <!-- Tier 1: Top 20 -->
    <polygon points="525,90 380,250 670,250" fill="#4338ca" fill-opacity="0.15" stroke="#4338ca" stroke-width="2"/>
    <text x="525" y="140" text-anchor="middle" font-size="16" font-weight="700" fill="#4338ca">TOP 20</text>
    <text x="525" y="160" text-anchor="middle" font-size="12" fill="#4338ca">~60% of common characters</text>
    <text x="525" y="180" text-anchor="middle" font-size="10" fill="#6366f1">&#20154;/&#20143; &#21475; &#27700;/&#27701; &#25163;/&#25163; &#24515;/&#24571; &#26408; &#26085; &#22899;</text>
    <text x="525" y="195" text-anchor="middle" font-size="10" fill="#6366f1">&#35328;/&#35765; &#37329;/&#38069; &#26376; &#22303; &#28779;/&#28779; &#30446; &#36275; &#39135;/&#39285; &#36208; &#20992;/&#21018; &#34915;/&#34923; &#31481;/&#31481;</text>

    <!-- Arrow: START HERE -->
    <line x1="700" y1="160" x2="660" y2="170" stroke="#ef4444" stroke-width="2" marker-end="url(#arrowRed)"/>
    <text x="710" y="155" font-size="13" font-weight="700" fill="#ef4444">START HERE</text>
    <text x="710" y="172" font-size="10" fill="#ef4444">Highest ROI for learners</text>
    <defs>
      <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
        <path d="M0,0 L8,3 L0,6" fill="#ef4444"/>
      </marker>
    </defs>

    <!-- Tier 2: Next 30 -->
    <polygon points="380,250 280,380 770,380 670,250" fill="#0891b2" fill-opacity="0.1" stroke="#0891b2" stroke-width="1.5"/>
    <text x="525" y="290" text-anchor="middle" font-size="14" font-weight="600" fill="#0891b2">NEXT 30</text>
    <text x="525" y="310" text-anchor="middle" font-size="12" fill="#0891b2">~25% more coverage</text>
    <text x="525" y="330" text-anchor="middle" font-size="10" fill="#06b6d4">&#21147; &#30000; &#34411; &#36125; &#30707; &#31166; &#36710; &#39532; &#39029; &#40060; &#40479; &#38376; &#32819; &#23665; &#31859; &#31034;/&#31036; &#29579;/&#29577;</text>
    <text x="525" y="345" text-anchor="middle" font-size="10" fill="#06b6d4">&#30142; &#24191; &#33400;/&#33402; &#31481; &#30382; &#29287; &#23544; &#31435; &#24339;/&#24358; &#38632;/&#38632; &#39118; &#40831;/&#40831; &#38761;...</text>

    <!-- Tier 3: Remaining 164 -->
    <polygon points="280,380 160,550 890,550 770,380" fill="#f59e0b" fill-opacity="0.08" stroke="#f59e0b" stroke-width="1"/>
    <text x="525" y="425" text-anchor="middle" font-size="14" font-weight="600" fill="#d97706">REMAINING 164</text>
    <text x="525" y="445" text-anchor="middle" font-size="12" fill="#d97706">~15% of common characters</text>
    <text x="525" y="470" text-anchor="middle" font-size="10" fill="#f59e0b">Specialized, rare, or archaic radicals</text>
    <text x="525" y="490" text-anchor="middle" font-size="10" fill="#f59e0b">Many with fewer than 20 commonly used characters each</text>
    <text x="525" y="510" text-anchor="middle" font-size="10" fill="#f59e0b">Radical 138 (&#33390;) has only 5 entries in Kangxi Dictionary</text>

    <!-- Statistics panel on right -->
    <rect x="760" y="250" width="260" height="250" rx="10" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
    <text x="890" y="275" text-anchor="middle" font-size="13" font-weight="700" fill="#334155">Kangxi Statistics</text>
    <line x1="780" y1="285" x2="1000" y2="285" stroke="#e2e8f0" stroke-width="1"/>
    <text x="780" y="308" font-size="11" fill="#475569">Total characters:</text>
    <text x="1000" y="308" text-anchor="end" font-size="11" font-weight="600" fill="#334155">47,035</text>
    <text x="780" y="330" font-size="11" fill="#475569">Total radicals:</text>
    <text x="1000" y="330" text-anchor="end" font-size="11" font-weight="600" fill="#334155">214</text>
    <text x="780" y="352" font-size="11" fill="#475569">Average per radical:</text>
    <text x="1000" y="352" text-anchor="end" font-size="11" font-weight="600" fill="#334155">220</text>
    <text x="780" y="374" font-size="11" fill="#475569">Median per radical:</text>
    <text x="1000" y="374" text-anchor="end" font-size="11" font-weight="600" fill="#334155">64</text>
    <text x="780" y="396" font-size="11" fill="#475569">Maximum (&#33400; grass):</text>
    <text x="1000" y="396" text-anchor="end" font-size="11" font-weight="600" fill="#334155">1,902</text>
    <text x="780" y="418" font-size="11" fill="#475569">Minimum (&#33390;):</text>
    <text x="1000" y="418" text-anchor="end" font-size="11" font-weight="600" fill="#334155">5</text>
    <line x1="780" y1="430" x2="1000" y2="430" stroke="#e2e8f0" stroke-width="1"/>
    <text x="780" y="452" font-size="11" fill="#475569">Top 10 cover:</text>
    <text x="1000" y="452" text-anchor="end" font-size="11" font-weight="700" fill="#4338ca">10,665 (23%)</text>
    <text x="780" y="474" font-size="11" fill="#475569">Avg:Median ratio:</text>
    <text x="1000" y="474" text-anchor="end" font-size="11" font-weight="600" fill="#dc2626">3.4x (skewed!)</text>

    <!-- Top 10 bar chart -->
    <text x="525" y="580" text-anchor="middle" font-size="14" font-weight="700" fill="#334155">Top 10 Most Productive Radicals</text>

    <!-- Bars -->
    <rect x="80" y="600" width="190" height="22" rx="4" fill="#4338ca" fill-opacity="0.8"/>
    <text x="90" y="615" font-size="10" font-weight="600" fill="#ffffff">&#33400;/&#33402; Grass: 1,902</text>

    <rect x="80" y="626" width="160" height="22" rx="4" fill="#4f46e5" fill-opacity="0.8"/>
    <text x="90" y="641" font-size="10" font-weight="600" fill="#ffffff">&#27700;/&#27701; Water: 1,595</text>

    <rect x="80" y="652" width="137" height="22" rx="4" fill="#6366f1" fill-opacity="0.8"/>
    <text x="90" y="667" font-size="10" font-weight="600" fill="#ffffff">&#26408; Wood: 1,369</text>

    <rect x="80" y="678" width="115" height="22" rx="4" fill="#818cf8" fill-opacity="0.8"/>
    <text x="90" y="693" font-size="10" font-weight="600" fill="#ffffff">&#21475; Mouth: 1,146</text>

    <rect x="380" y="600" width="106" height="22" rx="4" fill="#a5b4fc" fill-opacity="0.9"/>
    <text x="390" y="615" font-size="10" font-weight="600" fill="#312e81">&#25163;/&#25163; Hand: 1,059</text>

    <rect x="380" y="626" width="102" height="22" rx="4" fill="#a5b4fc" fill-opacity="0.7"/>
    <text x="390" y="641" font-size="10" font-weight="600" fill="#312e81">&#24515;/&#24571; Heart: 1,024</text>

    <rect x="380" y="652" width="90" height="22" rx="4" fill="#c7d2fe" fill-opacity="0.9"/>
    <text x="390" y="667" font-size="10" font-weight="600" fill="#3730a3">&#37329;/&#38069; Metal: ~900</text>

    <rect x="380" y="678" width="86" height="22" rx="4" fill="#c7d2fe" fill-opacity="0.7"/>
    <text x="390" y="693" font-size="10" font-weight="600" fill="#3730a3">&#35328;/&#35765; Speech: ~861</text>

    <rect x="680" y="600" width="82" height="22" rx="4" fill="#e0e7ff" fill-opacity="0.9"/>
    <text x="690" y="615" font-size="10" font-weight="600" fill="#4338ca">&#31992;/&#32419; Silk: ~823</text>

    <rect x="680" y="626" width="79" height="22" rx="4" fill="#e0e7ff" fill-opacity="0.7"/>
    <text x="690" y="641" font-size="10" font-weight="600" fill="#4338ca">&#34411; Insect: ~789</text>

    <!-- English comparison -->
    <rect x="680" y="660" width="320" height="45" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
    <text x="840" y="678" text-anchor="middle" font-size="10" font-weight="600" fill="#92400e">ENGLISH COMPARISON: 26 letters, equal frequency distribution</text>
    <text x="840" y="695" text-anchor="middle" font-size="10" fill="#92400e">Chinese: extreme Pareto -- a few radicals do most of the work</text>
  </svg>
  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background:#4338ca;"></div>Top 20 radicals (~60% coverage)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#0891b2;"></div>Next 30 radicals (~25% more)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#f59e0b;"></div>Remaining 164 (~15%)</div>
  </div>
  <figcaption>
    <strong>Figure 1: The Radical Frequency Pyramid -- 214 Radicals, Pareto Distributed</strong>
    <span>The Kangxi Dictionary's 47,035 characters follow an extreme power-law distribution across 214 radicals. The top 10 radicals alone account for 23% of all entries (10,665 characters). For learners, the top 50 radicals provide decomposition keys for the vast majority of everyday characters -- a dramatically more efficient strategy than whole-character memorization.</span>
  </figcaption>
</figure>
</body>
</html>
