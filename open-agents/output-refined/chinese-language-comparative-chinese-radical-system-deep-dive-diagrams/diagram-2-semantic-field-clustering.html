<style>

    <text x="290" y="577" text-anchor="middle" font-size="12" font-weight="700" fill="#6d28d9">PHILOSOPHICAL PATTERN: Heart Radical (&#24515;) Unifies Thought and Emotion</text>
    <text x="290" y="597" text-anchor="middle" font-size="11" fill="#5b21b6">&#24819; (think), &#24605; (contemplate), &#24518; (remember) share &#24515; with &#24773; (feel), &#24594; (anger), &#24656; (fear)</text>
    <text x="290" y="612" text-anchor="middle" font-size="10" fill="#7c3aed">English splits "head" vs. "heart" -- Chinese writing literally encodes heart-mind unity (&#24515;)</text>

    <!-- English comparison -->
    <rect x="570" y="555" width="500" height="70" rx="10" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/>

  <figcaption>
    <strong>Figure 2: Semantic Field Clustering -- Radicals as a Visual Periodic Table</strong>
    <span>Each radical organizes characters into a semantic domain, functioning as a visible meaning tag that English lacks entirely. The heart radical (&#24515;) is philosophically significant: it unifies cognition and emotion under one component, reflecting the Chinese concept of xin (heart-mind) -- a position visible in the writing system itself.</span>
