<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Qing Family -- Semantic-Phonetic Compound Network</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #f8f9fa;
    color: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 2rem;
  }
  figure {
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
    max-width: 1100px;
    width: 100%;
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid #e9ecef;
  }
  figcaption strong { display: block; font-size: 1.15rem; color: #1a1a2e; margin-bottom: 0.4rem; }
  figcaption span { font-size: 0.9rem; color: #6c757d; line-height: 1.5; }
  svg { max-width: 100%; height: auto; }
  .legend {
    display: flex; justify-content: center; gap: 1.5rem; margin-top: 1rem; flex-wrap: wrap;
  }
  .legend-item { display: flex; align-items: center; gap: 0.5rem; font-size: 0.85rem; color: #495057; }
  .legend-swatch { width: 16px; height: 16px; border-radius: 4px; }
  @media (prefers-color-scheme: dark) {
    body { background: #1a1a2e; color: #e9ecef; }
    figure { background: #2d2d44; box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
    figcaption { border-top-color: #3d3d5c; }
    figcaption strong { color: #e9ecef; }
    figcaption span { color: #adb5bd; }
    .legend-item { color: #adb5bd; }
    svg text { fill: #e9ecef; }
  }
</style>
</head>
<body>
<figure>
  <svg viewBox="0 0 1050 700" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
    <text x="525" y="32" text-anchor="middle" font-size="20" font-weight="700" fill="#1a1a2e">The &#38738; (q&#299;ng) Family: Semantic-Phonetic Compound Network</text>
    <text x="525" y="52" text-anchor="middle" font-size="13" fill="#6c757d">One phonetic component + different radicals = systematic character generation</text>

    <!-- Formula -->
    <rect x="250" y="70" width="550" height="40" rx="8" fill="#eef2ff" stroke="#6366f1" stroke-width="2"/>
    <text x="525" y="95" text-anchor="middle" font-size="14" font-weight="700" fill="#3730a3">[Semantic Radical (meaning)] + [Phonetic Component (sound)] = Character</text>

    <!-- Center: 青 -->
    <circle cx="525" cy="280" r="60" fill="#4338ca" stroke="#312e81" stroke-width="3"/>
    <text x="525" y="270" text-anchor="middle" font-size="36" font-weight="700" fill="#ffffff">&#38738;</text>
    <text x="525" y="298" text-anchor="middle" font-size="14" fill="#c7d2fe">q&#299;ng</text>
    <text x="525" y="315" text-anchor="middle" font-size="10" fill="#a5b4fc">PHONETIC</text>
    <text x="525" y="328" text-anchor="middle" font-size="10" fill="#a5b4fc">COMPONENT</text>

    <!-- Branch 1: 清 (water + qing) - top left -->
    <line x1="475" y1="240" x2="200" y2="170" stroke="#3b82f6" stroke-width="2.5"/>
    <rect x="100" y="130" width="200" height="85" rx="12" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
    <text x="200" y="160" text-anchor="middle" font-size="30" font-weight="700" fill="#1d4ed8">&#28165;</text>
    <text x="200" y="183" text-anchor="middle" font-size="12" font-weight="600" fill="#2563eb">q&#299;ng -- clear/pure</text>
    <text x="200" y="200" text-anchor="middle" font-size="10" fill="#3b82f6">&#27701; water + &#38738;</text>
    <text x="200" y="212" text-anchor="middle" font-size="9" fill="#60a5fa">Sound: EXACT MATCH</text>
    <!-- Radical label -->
    <rect x="90" y="133" width="30" height="18" rx="4" fill="#3b82f6"/>
    <text x="105" y="146" text-anchor="middle" font-size="9" font-weight="700" fill="#ffffff">&#27701;</text>

    <!-- Branch 2: 请 (speech + qing) - top right -->
    <line x1="575" y1="240" x2="850" y2="170" stroke="#d946ef" stroke-width="2.5"/>
    <rect x="750" y="130" width="200" height="85" rx="12" fill="#fdf4ff" stroke="#d946ef" stroke-width="2"/>
    <text x="850" y="160" text-anchor="middle" font-size="30" font-weight="700" fill="#c026d3">&#35831;</text>
    <text x="850" y="183" text-anchor="middle" font-size="12" font-weight="600" fill="#d946ef">q&#464;ng -- please/invite</text>
    <text x="850" y="200" text-anchor="middle" font-size="10" fill="#d946ef">&#35765; speech + &#38738;</text>
    <text x="850" y="212" text-anchor="middle" font-size="9" fill="#e879f9">Sound: CLOSE (tone 3 vs 1)</text>
    <rect x="740" y="133" width="30" height="18" rx="4" fill="#d946ef"/>
    <text x="755" y="146" text-anchor="middle" font-size="9" font-weight="700" fill="#ffffff">&#35765;</text>

    <!-- Branch 3: 情 (heart + qing) - left -->
    <line x1="465" y1="280" x2="200" y2="325" stroke="#7c3aed" stroke-width="2.5"/>
    <rect x="60" y="290" width="200" height="85" rx="12" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
    <text x="160" y="320" text-anchor="middle" font-size="30" font-weight="700" fill="#6d28d9">&#24773;</text>
    <text x="160" y="343" text-anchor="middle" font-size="12" font-weight="600" fill="#7c3aed">q&#237;ng -- feeling/emotion</text>
    <text x="160" y="360" text-anchor="middle" font-size="10" fill="#8b5cf6">&#24571; heart + &#38738;</text>
    <text x="160" y="372" text-anchor="middle" font-size="9" fill="#a78bfa">Sound: CLOSE (tone 2 vs 1)</text>
    <rect x="50" y="293" width="30" height="18" rx="4" fill="#7c3aed"/>
    <text x="65" y="306" text-anchor="middle" font-size="9" font-weight="700" fill="#ffffff">&#24571;</text>

    <!-- Branch 4: 晴 (sun + qing) - right -->
    <line x1="585" y1="280" x2="850" y2="325" stroke="#f59e0b" stroke-width="2.5"/>
    <rect x="790" y="290" width="200" height="85" rx="12" fill="#fefce8" stroke="#f59e0b" stroke-width="2"/>
    <text x="890" y="320" text-anchor="middle" font-size="30" font-weight="700" fill="#d97706">&#26228;</text>
    <text x="890" y="343" text-anchor="middle" font-size="12" font-weight="600" fill="#f59e0b">q&#237;ng -- clear weather</text>
    <text x="890" y="360" text-anchor="middle" font-size="10" fill="#eab308">&#26085; sun + &#38738;</text>
    <text x="890" y="372" text-anchor="middle" font-size="9" fill="#fbbf24">Sound: EXACT (tone 2)</text>
    <rect x="780" y="293" width="30" height="18" rx="4" fill="#f59e0b"/>
    <text x="795" y="306" text-anchor="middle" font-size="9" font-weight="700" fill="#ffffff">&#26085;</text>

    <!-- Branch 5: 睛 (eye + qing) - bottom left -->
    <line x1="480" y1="330" x2="250" y2="460" stroke="#0ea5e9" stroke-width="2.5"/>
    <rect x="120" y="430" width="200" height="85" rx="12" fill="#f0f9ff" stroke="#0ea5e9" stroke-width="2"/>
    <text x="220" y="460" text-anchor="middle" font-size="30" font-weight="700" fill="#0284c7">&#30555;</text>
    <text x="220" y="483" text-anchor="middle" font-size="12" font-weight="600" fill="#0ea5e9">j&#299;ng -- eyeball</text>
    <text x="220" y="500" text-anchor="middle" font-size="10" fill="#06b6d4">&#30446; eye + &#38738;</text>
    <text x="220" y="512" text-anchor="middle" font-size="9" fill="#22d3ee">Sound: DRIFTED (j vs q)</text>
    <rect x="110" y="433" width="30" height="18" rx="4" fill="#0ea5e9"/>
    <text x="125" y="446" text-anchor="middle" font-size="9" font-weight="700" fill="#ffffff">&#30446;</text>

    <!-- Branch 6: 精 (rice + qing) - bottom right -->
    <line x1="560" y1="330" x2="800" y2="460" stroke="#16a34a" stroke-width="2.5"/>
    <rect x="730" y="430" width="200" height="85" rx="12" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
    <text x="830" y="460" text-anchor="middle" font-size="30" font-weight="700" fill="#166534">&#31934;</text>
    <text x="830" y="483" text-anchor="middle" font-size="12" font-weight="600" fill="#16a34a">j&#299;ng -- essence/refined</text>
    <text x="830" y="500" text-anchor="middle" font-size="10" fill="#22c55e">&#31859; rice + &#38738;</text>
    <text x="830" y="512" text-anchor="middle" font-size="9" fill="#4ade80">Sound: DRIFTED (j vs q)</text>
    <rect x="720" y="433" width="30" height="18" rx="4" fill="#16a34a"/>
    <text x="735" y="446" text-anchor="middle" font-size="9" font-weight="700" fill="#ffffff">&#31859;</text>

    <!-- Phonetic reliability box -->
    <rect x="380" y="400" width="290" height="100" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="525" y="422" text-anchor="middle" font-size="12" font-weight="700" fill="#92400e">Phonetic Reliability (approximate)</text>
    <text x="525" y="445" text-anchor="middle" font-size="10" fill="#92400e">Exact match (incl. tone): ~20-26%</text>
    <text x="525" y="462" text-anchor="middle" font-size="10" fill="#92400e">Match ignoring tone: ~33-39%</text>
    <text x="525" y="479" text-anchor="middle" font-size="10" fill="#92400e">Shared rhyme: ~60-67%</text>
    <text x="525" y="496" text-anchor="middle" font-size="9" font-style="italic" fill="#b45309">(Ranges reflect variation across studies)</text>

    <!-- Bottom: The pattern insight -->
    <rect x="50" y="540" width="950" height="65" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
    <text x="525" y="565" text-anchor="middle" font-size="14" font-weight="700" fill="#3730a3">THE PATTERN: Same phonetic (&#38738;) + different radicals = different meaning domains</text>
    <text x="525" y="588" text-anchor="middle" font-size="12" fill="#4f46e5">Know &#38738; = know 6 characters' approximate pronunciation. Know the radicals = know 6 meaning domains.</text>
    <text x="525" y="598" text-anchor="middle" font-size="11" fill="#6366f1">This is systematic decomposition, not rote memorization.</text>

    <!-- English comparison -->
    <rect x="50" y="620" width="950" height="65" rx="10" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/>
    <text x="525" y="645" text-anchor="middle" font-size="13" font-weight="600" fill="#334155">ENGLISH COMPARISON: No equivalent pattern</text>
    <text x="525" y="665" text-anchor="middle" font-size="11" fill="#475569">"clear," "please," "feeling," "sunny," "eyeball," "refined" share nothing visible.</text>
    <text x="525" y="680" text-anchor="middle" font-size="11" fill="#64748b">In Chinese, they share &#38738; and you can see it. This is the radical system's power for pattern learners.</text>
  </svg>
  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background:#4338ca;"></div>Phonetic component (&#38738;)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#3b82f6;"></div>Water radical</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#d946ef;"></div>Speech radical</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#7c3aed;"></div>Heart radical</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#f59e0b;"></div>Sun radical</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#0ea5e9;"></div>Eye radical</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#16a34a;"></div>Rice radical</div>
  </div>
  <figcaption>
    <strong>Figure 4: The &#38738; (q&#299;ng) Family -- Semantic-Phonetic Compound Network</strong>
    <span>One phonetic component generates six characters with approximate pronunciation /q&#299;ng/ (with some drift to /j&#299;ng/). Each radical determines the meaning domain: water for clarity, speech for invitation, heart for emotion, sun for weather, eye for vision, rice for refinement. This is the core pattern behind 80%+ of all Chinese characters. Phonetic reliability ranges are approximate and vary by study.</span>
  </figcaption>
</figure>
</body>
</html>
