<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Positional Variants -- The Shape-Shifting Radicals</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #f8f9fa;
    color: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 2rem;
  }
  figure {
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
    max-width: 1100px;
    width: 100%;
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid #e9ecef;
  }
  figcaption strong { display: block; font-size: 1.15rem; color: #1a1a2e; margin-bottom: 0.4rem; }
  figcaption span { font-size: 0.9rem; color: #6c757d; line-height: 1.5; }
  svg { max-width: 100%; height: auto; }
  .legend {
    display: flex; justify-content: center; gap: 1.5rem; margin-top: 1rem; flex-wrap: wrap;
  }
  .legend-item { display: flex; align-items: center; gap: 0.5rem; font-size: 0.85rem; color: #495057; }
  .legend-swatch { width: 16px; height: 16px; border-radius: 4px; }
  @media (prefers-color-scheme: dark) {
    body { background: #1a1a2e; color: #e9ecef; }
    figure { background: #2d2d44; box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
    figcaption { border-top-color: #3d3d5c; }
    figcaption strong { color: #e9ecef; }
    figcaption span { color: #adb5bd; }
    .legend-item { color: #adb5bd; }
    svg text { fill: #e9ecef; }
  }
</style>
</head>
<body>
<figure>
  <svg viewBox="0 0 1050 700" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
    <defs>
      <marker id="arrowTrans" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
        <path d="M0,0 L8,3 L0,6" fill="#6366f1"/>
      </marker>
    </defs>

    <text x="525" y="32" text-anchor="middle" font-size="20" font-weight="700" fill="#1a1a2e">Positional Variants: Shape-Shifting Radicals</text>
    <text x="525" y="52" text-anchor="middle" font-size="13" fill="#6c757d">Radicals change shape based on position -- but the core identity persists</text>

    <!-- Spatial grammar rule -->
    <rect x="200" y="70" width="650" height="55" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="2"/>
    <text x="525" y="92" text-anchor="middle" font-size="13" font-weight="700" fill="#3730a3">THE SPATIAL RULE</text>
    <text x="525" y="112" text-anchor="middle" font-size="12" fill="#4f46e5">LEFT / TOP = Semantic (meaning) | RIGHT / BOTTOM = Phonetic (sound)</text>

    <!-- Grid -->
    <!-- Header -->
    <rect x="30" y="145" width="990" height="35" rx="6" fill="#334155"/>
    <text x="100" y="168" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">Full Form</text>
    <text x="220" y="168" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">Meaning</text>
    <text x="350" y="168" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">Left Variant</text>
    <text x="490" y="168" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">Bottom Variant</text>
    <text x="640" y="168" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">Example Character</text>
    <text x="830" y="168" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">Decomposition</text>

    <!-- Row 1: Water -->
    <rect x="30" y="180" width="990" height="50" rx="0" fill="#eff6ff"/>
    <text x="100" y="210" text-anchor="middle" font-size="26" font-weight="700" fill="#2563eb">&#27700;</text>
    <text x="220" y="210" text-anchor="middle" font-size="12" fill="#1d4ed8">Water</text>
    <text x="350" y="210" text-anchor="middle" font-size="26" font-weight="700" fill="#3b82f6">&#27701;</text>
    <text x="350" y="225" text-anchor="middle" font-size="9" fill="#3b82f6">(3 dots)</text>
    <text x="490" y="210" text-anchor="middle" font-size="14" fill="#94a3b8">&#27700; (full)</text>
    <text x="640" y="202" text-anchor="middle" font-size="28" font-weight="700" fill="#1e40af">&#27827;</text>
    <text x="640" y="225" text-anchor="middle" font-size="10" fill="#2563eb">h&#233; (river)</text>
    <text x="830" y="210" text-anchor="middle" font-size="12" fill="#1d4ed8">&#27701; (water) + &#21487; (k&#283;) = river</text>

    <!-- Row 2: Fire -->
    <rect x="30" y="230" width="990" height="50" rx="0" fill="#fef2f2"/>
    <text x="100" y="260" text-anchor="middle" font-size="26" font-weight="700" fill="#dc2626">&#28779;</text>
    <text x="220" y="260" text-anchor="middle" font-size="12" fill="#dc2626">Fire</text>
    <text x="350" y="260" text-anchor="middle" font-size="14" fill="#94a3b8">&#28779; (rare)</text>
    <text x="490" y="260" text-anchor="middle" font-size="26" font-weight="700" fill="#ef4444">&#28780;</text>
    <text x="490" y="275" text-anchor="middle" font-size="9" fill="#ef4444">(4 dots)</text>
    <text x="640" y="252" text-anchor="middle" font-size="28" font-weight="700" fill="#991b1b">&#29038;</text>
    <text x="640" y="275" text-anchor="middle" font-size="10" fill="#dc2626">zh&#468; (cook)</text>
    <text x="830" y="260" text-anchor="middle" font-size="12" fill="#991b1b">&#32773; + &#28780; (fire bottom) = cook</text>

    <!-- Row 3: Hand -->
    <rect x="30" y="280" width="990" height="50" rx="0" fill="#f0fdf4"/>
    <text x="100" y="310" text-anchor="middle" font-size="26" font-weight="700" fill="#16a34a">&#25163;</text>
    <text x="220" y="310" text-anchor="middle" font-size="12" fill="#16a34a">Hand</text>
    <text x="350" y="310" text-anchor="middle" font-size="26" font-weight="700" fill="#22c55e">&#25163;</text>
    <text x="350" y="325" text-anchor="middle" font-size="9" fill="#22c55e">(3 strokes)</text>
    <text x="490" y="310" text-anchor="middle" font-size="14" fill="#94a3b8">--</text>
    <text x="640" y="302" text-anchor="middle" font-size="28" font-weight="700" fill="#166534">&#25171;</text>
    <text x="640" y="325" text-anchor="middle" font-size="10" fill="#16a34a">d&#462; (hit)</text>
    <text x="830" y="310" text-anchor="middle" font-size="12" fill="#166534">&#25163; (hand) + &#19969; = hit/strike</text>

    <!-- Row 4: Heart -->
    <rect x="30" y="330" width="990" height="50" rx="0" fill="#f5f3ff"/>
    <text x="100" y="360" text-anchor="middle" font-size="26" font-weight="700" fill="#7c3aed">&#24515;</text>
    <text x="220" y="360" text-anchor="middle" font-size="12" fill="#7c3aed">Heart</text>
    <text x="350" y="360" text-anchor="middle" font-size="26" font-weight="700" fill="#8b5cf6">&#24571;</text>
    <text x="350" y="375" text-anchor="middle" font-size="9" fill="#8b5cf6">(3 strokes)</text>
    <text x="490" y="360" text-anchor="middle" font-size="18" fill="#7c3aed">&#24515; (full)</text>
    <text x="640" y="350" text-anchor="middle" font-size="28" font-weight="700" fill="#5b21b6">&#24773;</text>
    <text x="640" y="375" text-anchor="middle" font-size="10" fill="#7c3aed">q&#237;ng (feeling)</text>
    <text x="830" y="360" text-anchor="middle" font-size="12" fill="#5b21b6">&#24571; (heart) + &#38738; (q&#299;ng) = feeling</text>

    <!-- Row 5: Person -->
    <rect x="30" y="380" width="990" height="50" rx="0" fill="#f0f9ff"/>
    <text x="100" y="410" text-anchor="middle" font-size="26" font-weight="700" fill="#0284c7">&#20154;</text>
    <text x="220" y="410" text-anchor="middle" font-size="12" fill="#0284c7">Person</text>
    <text x="350" y="410" text-anchor="middle" font-size="26" font-weight="700" fill="#0ea5e9">&#20143;</text>
    <text x="350" y="425" text-anchor="middle" font-size="9" fill="#0ea5e9">(2 strokes)</text>
    <text x="490" y="410" text-anchor="middle" font-size="14" fill="#94a3b8">--</text>
    <text x="640" y="402" text-anchor="middle" font-size="28" font-weight="700" fill="#0369a1">&#20182;</text>
    <text x="640" y="425" text-anchor="middle" font-size="10" fill="#0284c7">t&#257; (he)</text>
    <text x="830" y="410" text-anchor="middle" font-size="12" fill="#0369a1">&#20143; (person) + &#20063; = he/him</text>

    <!-- Row 6: Speech -->
    <rect x="30" y="430" width="990" height="50" rx="0" fill="#fdf4ff"/>
    <text x="100" y="460" text-anchor="middle" font-size="26" font-weight="700" fill="#c026d3">&#35328;</text>
    <text x="220" y="460" text-anchor="middle" font-size="12" fill="#c026d3">Speech</text>
    <text x="350" y="460" text-anchor="middle" font-size="26" font-weight="700" fill="#d946ef">&#35765;</text>
    <text x="350" y="475" text-anchor="middle" font-size="9" fill="#d946ef">(2 strokes)</text>
    <text x="490" y="460" text-anchor="middle" font-size="14" fill="#94a3b8">--</text>
    <text x="640" y="452" text-anchor="middle" font-size="28" font-weight="700" fill="#86198f">&#35828;</text>
    <text x="640" y="475" text-anchor="middle" font-size="10" fill="#c026d3">shu&#333; (say)</text>
    <text x="830" y="460" text-anchor="middle" font-size="12" fill="#86198f">&#35765; (speech) + &#20817; = say/speak</text>

    <!-- Row 7: Metal -->
    <rect x="30" y="480" width="990" height="50" rx="0" fill="#fefce8"/>
    <text x="100" y="510" text-anchor="middle" font-size="26" font-weight="700" fill="#ca8a04">&#37329;</text>
    <text x="220" y="510" text-anchor="middle" font-size="12" fill="#ca8a04">Metal</text>
    <text x="350" y="510" text-anchor="middle" font-size="26" font-weight="700" fill="#eab308">&#38069;</text>
    <text x="350" y="525" text-anchor="middle" font-size="9" fill="#eab308">(5 strokes)</text>
    <text x="490" y="510" text-anchor="middle" font-size="14" fill="#94a3b8">--</text>
    <text x="640" y="502" text-anchor="middle" font-size="28" font-weight="700" fill="#854d0e">&#38081;</text>
    <text x="640" y="525" text-anchor="middle" font-size="10" fill="#ca8a04">ti&#283; (iron)</text>
    <text x="830" y="510" text-anchor="middle" font-size="12" fill="#854d0e">&#38069; (metal) + &#22833; = iron</text>

    <!-- Row 8: Food -->
    <rect x="30" y="530" width="990" height="50" rx="0" fill="#fff7ed"/>
    <text x="100" y="560" text-anchor="middle" font-size="26" font-weight="700" fill="#ea580c">&#39135;</text>
    <text x="220" y="560" text-anchor="middle" font-size="12" fill="#ea580c">Food</text>
    <text x="350" y="560" text-anchor="middle" font-size="26" font-weight="700" fill="#f97316">&#39285;</text>
    <text x="350" y="575" text-anchor="middle" font-size="9" fill="#f97316">(3 strokes)</text>
    <text x="490" y="560" text-anchor="middle" font-size="14" fill="#94a3b8">--</text>
    <text x="640" y="552" text-anchor="middle" font-size="28" font-weight="700" fill="#9a3412">&#39277;</text>
    <text x="640" y="575" text-anchor="middle" font-size="10" fill="#ea580c">f&#224;n (rice/meal)</text>
    <text x="830" y="560" text-anchor="middle" font-size="12" fill="#9a3412">&#39285; (food) + &#21453; = rice/meal</text>

    <!-- Visual parsing algorithm -->
    <rect x="30" y="600" width="990" height="85" rx="10" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
    <text x="525" y="625" text-anchor="middle" font-size="14" font-weight="700" fill="#334155">The Visual Parsing Algorithm (for any unknown character)</text>
    <text x="90" y="650" font-size="12" fill="#475569">1. See unknown character</text>
    <text x="285" y="650" font-size="12" fill="#475569">2. Find left/top component</text>
    <text x="520" y="650" font-size="12" fill="#475569">3. Identify radical = meaning</text>
    <text x="760" y="650" font-size="12" fill="#475569">4. Right/bottom = pronunciation</text>
    <path d="M 250,648 L 270,648" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrowTrans)"/>
    <path d="M 490,648 L 510,648" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrowTrans)"/>
    <path d="M 730,648 L 750,648" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrowTrans)"/>
    <text x="525" y="675" text-anchor="middle" font-size="11" font-style="italic" fill="#6366f1">English equivalent: no visual parsing algorithm exists -- you must already know the word or sound it out</text>
  </svg>
  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background:#3b82f6;"></div>Full form</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#6366f1;"></div>Left variant (compressed)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#94a3b8;"></div>Bottom variant</div>
  </div>
  <figcaption>
    <strong>Figure 3: Positional Variants -- Shape-Shifting Radicals and the Visual Parsing Algorithm</strong>
    <span>Radicals compress into variant forms when they occupy the left or bottom position in a character, but their core identity persists. The spatial rule (left/top = meaning, right/bottom = sound) creates a predictable visual parsing algorithm that turns reading unknown characters from guesswork into informed decomposition -- a pattern unique to logographic systems.</span>
  </figcaption>
</figure>
</body>
</html>
