<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Learning Acceleration Curve -- Characters vs. Alphabet</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #f8f9fa;
    color: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 2rem;
  }
  figure {
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
    max-width: 1100px;
    width: 100%;
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid #e9ecef;
  }
  figcaption strong { display: block; font-size: 1.15rem; color: #1a1a2e; margin-bottom: 0.4rem; }
  figcaption span { font-size: 0.9rem; color: #6c757d; line-height: 1.5; }
  svg { max-width: 100%; height: auto; }
  .legend {
    display: flex; justify-content: center; gap: 1.5rem; margin-top: 1rem; flex-wrap: wrap;
  }
  .legend-item { display: flex; align-items: center; gap: 0.5rem; font-size: 0.85rem; color: #495057; }
  .legend-swatch { width: 16px; height: 16px; border-radius: 4px; }
  @media (prefers-color-scheme: dark) {
    body { background: #1a1a2e; color: #e9ecef; }
    figure { background: #2d2d44; box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
    figcaption { border-top-color: #3d3d5c; }
    figcaption strong { color: #e9ecef; }
    figcaption span { color: #adb5bd; }
    .legend-item { color: #adb5bd; }
    svg text { fill: #e9ecef; }
  }
</style>
</head>
<body>
<figure>
  <svg viewBox="0 0 1050 680" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
    <text x="525" y="32" text-anchor="middle" font-size="20" font-weight="700" fill="#1a1a2e">Learning Acceleration: Characters vs. Alphabet</text>
    <text x="525" y="52" text-anchor="middle" font-size="13" fill="#6c757d">Chinese characters: slow start, accelerating returns. English alphabet: fast start, plateau.</text>

    <!-- Axes -->
    <line x1="100" y1="450" x2="900" y2="450" stroke="#94a3b8" stroke-width="2"/>
    <line x1="100" y1="450" x2="100" y2="100" stroke="#94a3b8" stroke-width="2"/>

    <!-- X axis label -->
    <text x="500" y="490" text-anchor="middle" font-size="13" font-weight="600" fill="#334155">Learning Investment (time)</text>
    <text x="150" y="475" font-size="10" fill="#94a3b8">Initial</text>
    <text x="400" y="475" font-size="10" fill="#94a3b8">Intermediate</text>
    <text x="700" y="475" font-size="10" fill="#94a3b8">Advanced</text>

    <!-- Y axis label -->
    <text x="45" y="280" text-anchor="middle" font-size="12" font-weight="600" fill="#334155" transform="rotate(-90, 45, 280)">New words decodable per unit study</text>

    <!-- English/Alphabet curve (fast start, plateau) -->
    <path d="M 100,440 C 200,200 300,160 450,150 C 550,145 700,142 880,140" fill="none" stroke="#94a3b8" stroke-width="3" stroke-dasharray="8,4"/>

    <!-- Chinese/Character curve (slow start, accelerating) -->
    <path d="M 100,445 C 150,440 200,430 280,410 C 350,385 420,340 500,270 C 580,200 650,145 750,110 C 820,90 880,85 900,82" fill="none" stroke="#4f46e5" stroke-width="3"/>

    <!-- Crossover point -->
    <circle cx="460" cy="280" r="8" fill="#ef4444" stroke="#dc2626" stroke-width="2"/>
    <line x1="460" y1="288" x2="460" y2="450" stroke="#ef4444" stroke-width="1" stroke-dasharray="4,3"/>
    <text x="475" y="310" font-size="11" font-weight="700" fill="#ef4444">CROSSOVER</text>
    <text x="475" y="325" font-size="9" fill="#dc2626">Character learning</text>
    <text x="475" y="338" font-size="9" fill="#dc2626">overtakes alphabetic</text>

    <!-- Phase labels on Chinese curve -->
    <!-- Phase 1: Slow -->
    <rect x="130" y="395" width="120" height="40" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
    <text x="190" y="413" text-anchor="middle" font-size="9" font-weight="600" fill="#dc2626">SLOW START</text>
    <text x="190" y="427" text-anchor="middle" font-size="8" fill="#991b1b">Each character = new</text>

    <!-- Phase 2: Acceleration -->
    <rect x="340" y="310" width="100" height="50" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
    <text x="390" y="328" text-anchor="middle" font-size="9" font-weight="600" fill="#d97706">RADICAL</text>
    <text x="390" y="340" text-anchor="middle" font-size="9" font-weight="600" fill="#d97706">KNOWLEDGE</text>
    <text x="390" y="354" text-anchor="middle" font-size="8" fill="#92400e">Pattern recognition</text>
    <text x="390" y="364" text-anchor="middle" font-size="8" fill="#92400e">kicks in</text>

    <!-- Phase 3: Accelerating returns -->
    <rect x="620" y="105" width="130" height="50" rx="6" fill="#eef2ff" stroke="#6366f1" stroke-width="1"/>
    <text x="685" y="123" text-anchor="middle" font-size="9" font-weight="600" fill="#4f46e5">ACCELERATING</text>
    <text x="685" y="137" text-anchor="middle" font-size="8" fill="#3730a3">Each new component</text>
    <text x="685" y="149" text-anchor="middle" font-size="8" fill="#3730a3">opens multiple characters</text>

    <!-- English plateau label -->
    <rect x="680" y="145" width="130" height="35" rx="6" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/>
    <text x="745" y="161" text-anchor="middle" font-size="9" font-weight="600" fill="#64748b">ENGLISH PLATEAU</text>
    <text x="745" y="175" text-anchor="middle" font-size="8" fill="#94a3b8">Spelling irregularities</text>

    <!-- Curve labels -->
    <text x="870" y="75" font-size="12" font-weight="700" fill="#4f46e5">Chinese</text>
    <text x="870" y="135" font-size="12" font-weight="700" fill="#94a3b8">English</text>

    <!-- Component knowledge table -->
    <rect x="100" y="510" width="800" height="150" rx="10" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
    <text x="500" y="535" text-anchor="middle" font-size="14" font-weight="700" fill="#334155">The Network Effect: Component Knowledge Compounds</text>

    <!-- Table header -->
    <rect x="120" y="545" width="760" height="25" rx="4" fill="#334155"/>
    <text x="215" y="562" text-anchor="middle" font-size="10" font-weight="600" fill="#ffffff">Components Known</text>
    <text x="400" y="562" text-anchor="middle" font-size="10" font-weight="600" fill="#ffffff">Characters Partially Decodable</text>
    <text x="580" y="562" text-anchor="middle" font-size="10" font-weight="600" fill="#ffffff">Rate of Return</text>
    <text x="760" y="562" text-anchor="middle" font-size="10" font-weight="600" fill="#ffffff">Analogous English Phase</text>

    <text x="215" y="590" text-anchor="middle" font-size="10" fill="#475569">~20 radicals</text>
    <text x="400" y="590" text-anchor="middle" font-size="10" fill="#475569">~500-800 common characters</text>
    <text x="580" y="590" text-anchor="middle" font-size="10" fill="#16a34a">25-40 chars per radical</text>
    <text x="760" y="590" text-anchor="middle" font-size="10" fill="#94a3b8">Learned the alphabet</text>

    <line x1="120" y1="600" x2="880" y2="600" stroke="#e5e7eb" stroke-width="1"/>

    <text x="215" y="620" text-anchor="middle" font-size="10" fill="#475569">~50 radicals + ~30 phonetics</text>
    <text x="400" y="620" text-anchor="middle" font-size="10" fill="#475569">~1,500-2,000 characters</text>
    <text x="580" y="620" text-anchor="middle" font-size="10" font-weight="600" fill="#4f46e5">Accelerating: 20-30 per new component</text>
    <text x="760" y="620" text-anchor="middle" font-size="10" fill="#94a3b8">Reading independently</text>

    <line x1="120" y1="630" x2="880" y2="630" stroke="#e5e7eb" stroke-width="1"/>

    <text x="215" y="650" text-anchor="middle" font-size="10" fill="#475569">~100 radicals + ~100 phonetics</text>
    <text x="400" y="650" text-anchor="middle" font-size="10" fill="#475569">~3,000-4,000 (literacy threshold)</text>
    <text x="580" y="650" text-anchor="middle" font-size="10" font-weight="600" fill="#4338ca">High: most new chars decomposable</text>
    <text x="760" y="650" text-anchor="middle" font-size="10" fill="#94a3b8">Plateau phase in English</text>
  </svg>
  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background:#4f46e5;"></div>Chinese character learning curve</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#94a3b8;"></div>English/alphabetic learning curve</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#ef4444;"></div>Crossover point</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#f59e0b;"></div>Radical knowledge zone</div>
  </div>
  <figcaption>
    <strong>Figure 5: Learning Acceleration Curve -- Characters vs. Alphabet</strong>
    <span>Chinese character learning starts slower than alphabetic systems but exhibits accelerating returns as radical and phonetic knowledge compounds. After the crossover point, each new component learned opens access to multiple characters, creating a network effect. The commonly cited "difficulty" of Chinese reflects only the initial phase -- for pattern-oriented learners who invest in component knowledge early, the acceleration arrives faster and rewards more generously.</span>
  </figcaption>
</figure>
</body>
</html>
