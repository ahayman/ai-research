<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catatonia in Autism -- Features and Overlap</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --muted: #6c757d;
    --catatonia: #7c3aed; --catatonia-bg: rgba(124,58,237,0.08);
    --autism: #3b82f6; --autism-bg: rgba(59,130,246,0.08);
    --overlap: #d97706; --overlap-bg: rgba(217,119,6,0.08);
    --treatable: #198754; --treatable-bg: #edfff5;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a; --fg: #e8e8f0; --surface: #1a1a2e; --border: #2d2d44;
      --muted: #9a9ab0;
      --catatonia: #b197fc; --catatonia-bg: rgba(177,151,252,0.1);
      --autism: #60a5fa; --autism-bg: rgba(96,165,250,0.1);
      --overlap: #fbbf24; --overlap-bg: rgba(251,191,36,0.1);
      --treatable: #51cf66; --treatable-bg: #0a2a15;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--fg); display: flex; justify-content: center; padding: 2rem 1rem; }
  figure { max-width: 960px; width: 100%; background: var(--surface); border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); padding: 2.5rem; }
  h2 { text-align: center; font-size: 1.4rem; margin-bottom: 0.4rem; }
  .subtitle { text-align: center; font-size: 0.95rem; color: var(--muted); margin-bottom: 2rem; }
  .diagram-wrapper { overflow-x: auto; padding: 0.5rem; }
  svg { display: block; margin: 0 auto; }
  figcaption { text-align: center; margin-top: 1.5rem; padding-top: 1.25rem; border-top: 1px solid var(--border); }
  figcaption strong { display: block; font-size: 1.05rem; margin-bottom: 0.4rem; }
  figcaption span { font-size: 0.88rem; color: var(--muted); line-height: 1.5; }
</style>
</head>
<body>
<figure>
  <h2>Catatonia in Autism</h2>
  <p class="subtitle">Feature overlap and the treatable diagnosis being missed</p>
  <div class="diagram-wrapper">
    <svg viewBox="0 0 900 540" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif" role="img" aria-labelledby="title-cat desc-cat">
      <title id="title-cat">Catatonia-Autism Feature Overlap</title>
      <desc id="desc-cat">Venn diagram showing the substantial overlap between features of catatonia and features commonly attributed to severe autism. The overlap zone includes mutism, stereotypies, prompt dependency, apparent lack of motivation, and negativism. Catatonia is treatable with benzodiazepines and ECT.</desc>

      <!-- Catatonia circle -->
      <ellipse cx="320" cy="230" rx="230" ry="180" fill="var(--catatonia-bg)" stroke="var(--catatonia)" stroke-width="2.5"/>
      <text x="180" y="85" font-size="14" font-weight="700" fill="var(--catatonia)">CATATONIA</text>
      <text x="180" y="102" font-size="10" fill="var(--muted)">~10.4% of autistic individuals</text>

      <!-- Autism circle -->
      <ellipse cx="580" cy="230" rx="230" ry="180" fill="var(--autism-bg)" stroke="var(--autism)" stroke-width="2.5"/>
      <text x="640" y="85" font-size="14" font-weight="700" fill="var(--autism)">"SEVERE AUTISM"</text>
      <text x="640" y="102" font-size="10" fill="var(--muted)">Features often attributed</text>

      <!-- Catatonia-only features -->
      <text x="170" y="155" font-size="11" fill="var(--fg)">Motor freezing</text>
      <text x="170" y="175" font-size="11" fill="var(--fg)">Extreme slowness</text>
      <text x="170" y="195" font-size="11" fill="var(--fg)">Waxy flexibility</text>
      <text x="170" y="215" font-size="11" fill="var(--fg)">Posturing</text>
      <text x="170" y="245" font-size="11" fill="var(--fg)">Motor initiation</text>
      <text x="170" y="260" font-size="11" fill="var(--fg)">failure</text>
      <text x="170" y="290" font-size="11" fill="var(--fg)">Stopping midway</text>
      <text x="170" y="305" font-size="11" fill="var(--fg)">through actions</text>

      <!-- Overlap features -->
      <rect x="375" y="125" width="150" height="220" rx="8" fill="var(--overlap-bg)" stroke="var(--overlap)" stroke-width="1.5" stroke-dasharray="6,3"/>
      <text x="450" y="145" text-anchor="middle" font-size="11" font-weight="700" fill="var(--overlap)">OVERLAP</text>
      <text x="450" y="170" text-anchor="middle" font-size="11" fill="var(--fg)">Mutism</text>
      <text x="450" y="190" text-anchor="middle" font-size="11" fill="var(--fg)">Stereotypies</text>
      <text x="450" y="210" text-anchor="middle" font-size="11" fill="var(--fg)">Echolalia</text>
      <text x="450" y="230" text-anchor="middle" font-size="11" fill="var(--fg)">Prompt</text>
      <text x="450" y="245" text-anchor="middle" font-size="11" fill="var(--fg)">dependency</text>
      <text x="450" y="270" text-anchor="middle" font-size="11" fill="var(--fg)">Apparent lack</text>
      <text x="450" y="285" text-anchor="middle" font-size="11" fill="var(--fg)">of motivation</text>
      <text x="450" y="310" text-anchor="middle" font-size="11" fill="var(--fg)">Negativism</text>
      <text x="450" y="335" text-anchor="middle" font-size="11" fill="var(--fg)">Withdrawal</text>

      <!-- Autism-only features -->
      <text x="630" y="175" font-size="11" fill="var(--fg)">Sensory differences</text>
      <text x="630" y="195" font-size="11" fill="var(--fg)">Social interaction</text>
      <text x="630" y="210" font-size="11" fill="var(--fg)">differences</text>
      <text x="630" y="240" font-size="11" fill="var(--fg)">Restricted interests</text>
      <text x="630" y="260" font-size="11" fill="var(--fg)">Communication</text>
      <text x="630" y="275" font-size="11" fill="var(--fg)">differences</text>
      <text x="630" y="305" font-size="11" fill="var(--fg)">Presumed intellectual</text>
      <text x="630" y="320" font-size="11" fill="var(--fg)">disability</text>

      <!-- Treatable callout -->
      <rect x="140" y="420" width="620" height="100" rx="12" fill="var(--treatable-bg)" stroke="var(--treatable)" stroke-width="2.5"/>
      <text x="450" y="448" text-anchor="middle" font-size="14" font-weight="700" fill="var(--treatable)">CATATONIA IS TREATABLE</text>
      <text x="450" y="472" text-anchor="middle" font-size="12" fill="var(--fg)">Benzodiazepines (lorazepam) and ECT can restore motor function and speech.</text>
      <text x="450" y="492" text-anchor="middle" font-size="12" fill="var(--fg)">Some individuals labeled "severe autism" may have undiagnosed, treatable catatonia</text>
      <text x="450" y="509" text-anchor="middle" font-size="11" fill="var(--muted)" font-style="italic">contributing to their apparent unresponsiveness and mutism.</text>
    </svg>
  </div>
  <figcaption>
    <strong>Figure 5: Catatonia in Autism -- Features and Overlap</strong>
    <span>Catatonic features (motor freezing, extreme slowness, mutism, prompt dependency) overlap substantially with behaviors routinely attributed to "severe autism." Meta-analysis estimates ~10.4% prevalence in autistic individuals (95% CI: 5.8-18.0%), but actual prevalence may be higher due to diagnostic overshadowing. The critical implication: catatonia is treatable, meaning some non-speaking individuals may have a reversible motor initiation component being missed.</span>
  </figcaption>
</figure>
</body>
</html>
