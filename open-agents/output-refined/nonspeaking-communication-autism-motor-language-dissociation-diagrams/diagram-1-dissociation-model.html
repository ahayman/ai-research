<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Motor-Language Dissociation Model</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --accent: #4361ee;
    --accent-light: #e8edff;
    --muted: #6c757d;
    --intact: #198754;
    --intact-bg: #edfff5;
    --impaired: #dc3545;
    --impaired-bg: #fff0f0;
    --bypass: #7c3aed;
    --bypass-bg: #f3e8ff;
    --breakdown: #d97706;
    --breakdown-bg: #fffbeb;
    --caption-bg: #f8f9fa;
    --arrow: #adb5bd;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --accent: #6b8aff;
      --accent-light: #1e2a4a;
      --muted: #9a9ab0;
      --intact: #51cf66;
      --intact-bg: #0a2a15;
      --impaired: #ff6b6b;
      --impaired-bg: #2a1010;
      --bypass: #b197fc;
      --bypass-bg: #1e1030;
      --breakdown: #fbbf24;
      --breakdown-bg: #2a2510;
      --caption-bg: #1a1a2e;
      --arrow: #4a4a60;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure {
    max-width: 960px;
    width: 100%;
    background: var(--surface);
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
  }
  h2 { text-align: center; font-size: 1.4rem; margin-bottom: 0.4rem; }
  .subtitle { text-align: center; font-size: 0.95rem; color: var(--muted); margin-bottom: 2rem; }
  .diagram-wrapper { overflow-x: auto; padding: 0.5rem; }
  svg { display: block; margin: 0 auto; }
  figcaption {
    text-align: center; margin-top: 1.5rem; padding-top: 1.25rem;
    border-top: 1px solid var(--border);
  }
  figcaption strong { display: block; font-size: 1.05rem; margin-bottom: 0.4rem; }
  figcaption span { font-size: 0.88rem; color: var(--muted); line-height: 1.5; }
  @media print { figure { break-inside: avoid; box-shadow: none; border: 1px solid #ccc; } }
</style>
</head>
<body>
<figure>
  <h2>The Motor-Language Dissociation Model</h2>
  <p class="subtitle">Where the breakdown occurs in non-speaking autism</p>
  <div class="diagram-wrapper">
    <svg viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif" role="img" aria-labelledby="title-mld desc-mld">
      <title id="title-mld">Motor-Language Dissociation Model</title>
      <desc id="desc-mld">Architecture diagram showing how language comprehension and communicative intent are often intact in non-speaking autism, while motor planning and motor execution are impaired. An AAC bypass route connects intent directly to simplified motor output.</desc>

      <defs>
        <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
          <polygon points="0 0, 10 3.5, 0 7" fill="var(--arrow)"/>
        </marker>
        <marker id="arrGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
          <polygon points="0 0, 10 3.5, 0 7" fill="var(--intact)"/>
        </marker>
        <marker id="arrRed" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
          <polygon points="0 0, 10 3.5, 0 7" fill="var(--impaired)"/>
        </marker>
        <marker id="arrPurple" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
          <polygon points="0 0, 10 3.5, 0 7" fill="var(--bypass)"/>
        </marker>
      </defs>

      <!-- Stage 1: Language Comprehension -->
      <rect x="240" y="30" width="420" height="90" rx="12" fill="var(--intact-bg)" stroke="var(--intact)" stroke-width="2.5"/>
      <text x="450" y="58" text-anchor="middle" font-size="15" font-weight="700" fill="var(--intact)">1. Language Comprehension</text>
      <text x="450" y="78" text-anchor="middle" font-size="12" fill="var(--fg)">Wernicke's area, semantic networks, temporal cortex</text>
      <text x="450" y="95" text-anchor="middle" font-size="11" fill="var(--intact)" font-weight="600">OFTEN INTACT</text>
      <!-- Status badge -->
      <rect x="610" y="36" width="40" height="20" rx="10" fill="var(--intact)"/>
      <text x="630" y="50" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">OK</text>

      <!-- Arrow 1->2 -->
      <line x1="450" y1="120" x2="450" y2="150" stroke="var(--intact)" stroke-width="2.5" marker-end="url(#arrGreen)"/>

      <!-- Stage 2: Communicative Intent -->
      <rect x="240" y="155" width="420" height="90" rx="12" fill="var(--intact-bg)" stroke="var(--intact)" stroke-width="2.5"/>
      <text x="450" y="183" text-anchor="middle" font-size="15" font-weight="700" fill="var(--intact)">2. Communicative Intent</text>
      <text x="450" y="203" text-anchor="middle" font-size="12" fill="var(--fg)">Prefrontal cortex, limbic circuits</text>
      <text x="450" y="220" text-anchor="middle" font-size="11" fill="var(--intact)" font-weight="600">OFTEN INTACT</text>
      <rect x="610" y="161" width="40" height="20" rx="10" fill="var(--intact)"/>
      <text x="630" y="175" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">OK</text>

      <!-- Arrow 2->3 (this is where things break) -->
      <line x1="450" y1="245" x2="450" y2="275" stroke="var(--breakdown)" stroke-width="2.5" marker-end="url(#arr)"/>

      <!-- Breakdown marker -->
      <rect x="355" y="255" width="190" height="24" rx="12" fill="var(--breakdown-bg)" stroke="var(--breakdown)" stroke-width="2"/>
      <text x="450" y="272" text-anchor="middle" font-size="11" font-weight="700" fill="var(--breakdown)">BREAKDOWN ZONE</text>

      <!-- Stage 3: Motor Planning for Speech -->
      <rect x="240" y="290" width="420" height="90" rx="12" fill="var(--impaired-bg)" stroke="var(--impaired)" stroke-width="2.5"/>
      <text x="450" y="318" text-anchor="middle" font-size="15" font-weight="700" fill="var(--impaired)">3. Motor Planning for Speech</text>
      <text x="450" y="338" text-anchor="middle" font-size="12" fill="var(--fg)">Broca's area, articulatory planning, ~100 muscles</text>
      <text x="450" y="355" text-anchor="middle" font-size="11" fill="var(--impaired)" font-weight="600">PRIMARY BREAKDOWN POINT (Apraxia)</text>

      <!-- Arrow 3->4 -->
      <line x1="450" y1="380" x2="450" y2="410" stroke="var(--impaired)" stroke-width="2.5" marker-end="url(#arrRed)"/>

      <!-- Stage 4: Motor Execution -->
      <rect x="240" y="415" width="420" height="90" rx="12" fill="var(--impaired-bg)" stroke="var(--impaired)" stroke-width="2.5"/>
      <text x="450" y="443" text-anchor="middle" font-size="15" font-weight="700" fill="var(--impaired)">4. Motor Execution</text>
      <text x="450" y="463" text-anchor="middle" font-size="12" fill="var(--fg)">Basal ganglia, cerebellum, cranial nerves, muscles</text>
      <text x="450" y="480" text-anchor="middle" font-size="11" fill="var(--impaired)" font-weight="600">OFTEN IMPAIRED BROADLY (50-95%)</text>

      <!-- AAC Bypass Route -->
      <!-- From Stage 2, curving left and down to AAC box -->
      <path d="M 240 200 L 80 200 L 80 480 L 240 480" fill="none" stroke="var(--bypass)" stroke-width="3" stroke-dasharray="8,4" marker-end="url(#arrPurple)"/>

      <!-- AAC Box -->
      <rect x="30" y="310" width="100" height="100" rx="12" fill="var(--bypass-bg)" stroke="var(--bypass)" stroke-width="2.5"/>
      <text x="80" y="340" text-anchor="middle" font-size="11" font-weight="700" fill="var(--bypass)">AAC</text>
      <text x="80" y="355" text-anchor="middle" font-size="11" font-weight="700" fill="var(--bypass)">BYPASS</text>
      <text x="80" y="375" text-anchor="middle" font-size="9" fill="var(--fg)">Pointing</text>
      <text x="80" y="388" text-anchor="middle" font-size="9" fill="var(--fg)">Typing</text>
      <text x="80" y="401" text-anchor="middle" font-size="9" fill="var(--fg)">Eye-gaze</text>

      <!-- Bypass label -->
      <text x="80" y="280" text-anchor="middle" font-size="10" fill="var(--bypass)" font-style="italic">Simpler motor</text>
      <text x="80" y="293" text-anchor="middle" font-size="10" fill="var(--bypass)" font-style="italic">pathways</text>

      <!-- Right side annotation -->
      <rect x="700" y="60" width="180" height="170" rx="10" fill="var(--surface)" stroke="var(--border)" stroke-width="1.5"/>
      <text x="790" y="85" text-anchor="middle" font-size="11" font-weight="700" fill="var(--fg)">Key Evidence</text>
      <line x1="720" y1="95" x2="860" y2="95" stroke="var(--border)" stroke-width="1"/>
      <text x="715" y="115" font-size="10" fill="var(--fg)">Fine motor predicts</text>
      <text x="715" y="128" font-size="10" fill="var(--fg)">expressive (not</text>
      <text x="715" y="141" font-size="10" fill="var(--fg)">receptive) language</text>
      <text x="715" y="161" font-size="10" fill="var(--muted)" font-style="italic">MIT Media Lab, 2025</text>
      <line x1="720" y1="170" x2="860" y2="170" stroke="var(--border)" stroke-width="1"/>
      <text x="715" y="190" font-size="10" fill="var(--fg)">Motor skills = most</text>
      <text x="715" y="203" font-size="10" fill="var(--fg)">significant predictor</text>
      <text x="715" y="216" font-size="10" fill="var(--fg)">of the R-E gap</text>

      <!-- Legend -->
      <g transform="translate(240, 560)">
        <rect x="0" y="0" width="14" height="14" rx="3" fill="var(--intact-bg)" stroke="var(--intact)" stroke-width="1.5"/>
        <text x="20" y="12" font-size="10" fill="var(--fg)">Intact / preserved</text>
        <rect x="140" y="0" width="14" height="14" rx="3" fill="var(--impaired-bg)" stroke="var(--impaired)" stroke-width="1.5"/>
        <text x="160" y="12" font-size="10" fill="var(--fg)">Impaired / disrupted</text>
        <rect x="300" y="0" width="14" height="14" rx="3" fill="var(--bypass-bg)" stroke="var(--bypass)" stroke-width="1.5"/>
        <text x="320" y="12" font-size="10" fill="var(--fg)">AAC bypass route</text>
      </g>
    </svg>
  </div>
  <figcaption>
    <strong>Figure 1: The Motor-Language Dissociation Model</strong>
    <span>In many non-speaking autistic individuals, language comprehension and communicative intent are intact (green), while motor planning and motor execution for speech are impaired (red). The problem is in the output pathway, not the language system. AAC (purple, dashed) provides an alternative motor route that bypasses the complex speech motor system with simpler movements -- pointing, typing, or eye-gaze.</span>
  </figcaption>
</figure>
</body>
</html>
