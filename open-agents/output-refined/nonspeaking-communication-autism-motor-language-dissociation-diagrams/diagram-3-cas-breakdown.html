<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Childhood Apraxia of Speech -- What Goes Wrong</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --muted: #6c757d; --intact: #198754; --intact-bg: #edfff5;
    --impaired: #dc3545; --impaired-bg: #fff0f0;
    --neutral: #4361ee; --neutral-bg: #e8edff;
    --arrow: #adb5bd;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a; --fg: #e8e8f0; --surface: #1a1a2e; --border: #2d2d44;
      --muted: #9a9ab0; --intact: #51cf66; --intact-bg: #0a2a15;
      --impaired: #ff6b6b; --impaired-bg: #2a1010;
      --neutral: #6b8aff; --neutral-bg: #1e2a4a;
      --arrow: #4a4a60;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--fg); display: flex; justify-content: center; padding: 2rem 1rem; }
  figure { max-width: 960px; width: 100%; background: var(--surface); border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); padding: 2.5rem; }
  h2 { text-align: center; font-size: 1.4rem; margin-bottom: 0.4rem; }
  .subtitle { text-align: center; font-size: 0.95rem; color: var(--muted); margin-bottom: 2rem; }
  .diagram-wrapper { overflow-x: auto; padding: 0.5rem; }
  svg { display: block; margin: 0 auto; }
  figcaption { text-align: center; margin-top: 1.5rem; padding-top: 1.25rem; border-top: 1px solid var(--border); }
  figcaption strong { display: block; font-size: 1.05rem; margin-bottom: 0.4rem; }
  figcaption span { font-size: 0.88rem; color: var(--muted); line-height: 1.5; }
</style>
</head>
<body>
<figure>
  <h2>Childhood Apraxia of Speech (CAS)</h2>
  <p class="subtitle">Where the motor planning for speech breaks down</p>
  <div class="diagram-wrapper">
    <svg viewBox="0 0 900 480" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif" role="img" aria-labelledby="title-cas desc-cas">
      <title id="title-cas">CAS Speech Production Breakdown</title>
      <desc id="desc-cas">Process flow showing the stages of speech production. In CAS, the thought, phoneme selection, and syllable assembly stages work, but the articulatory motor plan stage fails, producing inconsistent errors, groping movements, and prosodic abnormalities.</desc>

      <defs>
        <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
          <polygon points="0 0, 10 3.5, 0 7" fill="var(--arrow)"/>
        </marker>
      </defs>

      <!-- Normal pathway (top row) -->
      <!-- Step 1: Thought -->
      <rect x="30" y="60" width="120" height="70" rx="10" fill="var(--intact-bg)" stroke="var(--intact)" stroke-width="2"/>
      <text x="90" y="88" text-anchor="middle" font-size="12" font-weight="700" fill="var(--intact)">Thought</text>
      <text x="90" y="106" text-anchor="middle" font-size="10" fill="var(--fg)">"I want water"</text>

      <line x1="150" y1="95" x2="175" y2="95" stroke="var(--arrow)" stroke-width="2" marker-end="url(#arr)"/>

      <!-- Step 2: Phoneme Selection -->
      <rect x="180" y="60" width="120" height="70" rx="10" fill="var(--intact-bg)" stroke="var(--intact)" stroke-width="2"/>
      <text x="240" y="84" text-anchor="middle" font-size="12" font-weight="700" fill="var(--intact)">Phoneme</text>
      <text x="240" y="98" text-anchor="middle" font-size="12" font-weight="700" fill="var(--intact)">Selection</text>
      <text x="240" y="116" text-anchor="middle" font-size="10" fill="var(--fg)">/w/ /ɔː/ /t/ /ər/</text>

      <line x1="300" y1="95" x2="325" y2="95" stroke="var(--arrow)" stroke-width="2" marker-end="url(#arr)"/>

      <!-- Step 3: Syllable Assembly -->
      <rect x="330" y="60" width="120" height="70" rx="10" fill="var(--intact-bg)" stroke="var(--intact)" stroke-width="2"/>
      <text x="390" y="84" text-anchor="middle" font-size="12" font-weight="700" fill="var(--intact)">Syllable</text>
      <text x="390" y="98" text-anchor="middle" font-size="12" font-weight="700" fill="var(--intact)">Assembly</text>
      <text x="390" y="116" text-anchor="middle" font-size="10" fill="var(--fg)">"wa" + "ter"</text>

      <line x1="450" y1="95" x2="475" y2="95" stroke="var(--arrow)" stroke-width="2" marker-end="url(#arr)"/>

      <!-- Step 4: ARTICULATORY MOTOR PLAN (BREAKDOWN) -->
      <rect x="480" y="45" width="150" height="100" rx="10" fill="var(--impaired-bg)" stroke="var(--impaired)" stroke-width="3"/>
      <text x="555" y="72" text-anchor="middle" font-size="12" font-weight="700" fill="var(--impaired)">Articulatory</text>
      <text x="555" y="86" text-anchor="middle" font-size="12" font-weight="700" fill="var(--impaired)">Motor Plan</text>
      <text x="555" y="106" text-anchor="middle" font-size="10" fill="var(--fg)">~100 muscles</text>
      <text x="555" y="120" text-anchor="middle" font-size="10" fill="var(--fg)">ms-precision timing</text>
      <!-- X mark -->
      <text x="612" y="65" font-size="22" font-weight="900" fill="var(--impaired)">X</text>

      <!-- Broken arrow -->
      <line x1="630" y1="95" x2="650" y2="95" stroke="var(--impaired)" stroke-width="2" stroke-dasharray="4,4"/>
      <line x1="660" y1="95" x2="680" y2="95" stroke="var(--impaired)" stroke-width="2" stroke-dasharray="4,4"/>

      <!-- Step 5: Coordinated Movement (if it worked) -->
      <rect x="690" y="60" width="120" height="70" rx="10" fill="var(--neutral-bg)" stroke="var(--border)" stroke-width="1.5" stroke-dasharray="6,3"/>
      <text x="750" y="84" text-anchor="middle" font-size="12" font-weight="600" fill="var(--muted)">Coordinated</text>
      <text x="750" y="98" text-anchor="middle" font-size="12" font-weight="600" fill="var(--muted)">Movement</text>
      <text x="750" y="116" text-anchor="middle" font-size="10" fill="var(--muted)">Fluent "water"</text>

      <!-- CAS Effects branching down from breakdown -->
      <line x1="555" y1="145" x2="555" y2="175" stroke="var(--impaired)" stroke-width="2"/>

      <text x="450" y="195" text-anchor="middle" font-size="13" font-weight="700" fill="var(--impaired)">What CAS Produces Instead:</text>

      <!-- CAS symptom boxes -->
      <rect x="60" y="220" width="180" height="80" rx="8" fill="var(--impaired-bg)" stroke="var(--impaired)" stroke-width="1.5"/>
      <text x="150" y="245" text-anchor="middle" font-size="11" font-weight="700" fill="var(--impaired)">Inconsistent Errors</text>
      <text x="150" y="262" text-anchor="middle" font-size="10" fill="var(--fg)">"water" comes out as</text>
      <text x="150" y="276" text-anchor="middle" font-size="10" fill="var(--fg)">"wahder" then "wotter"</text>
      <text x="150" y="290" text-anchor="middle" font-size="10" fill="var(--fg)">then "wa-" (gives up)</text>

      <rect x="270" y="220" width="180" height="80" rx="8" fill="var(--impaired-bg)" stroke="var(--impaired)" stroke-width="1.5"/>
      <text x="360" y="245" text-anchor="middle" font-size="11" font-weight="700" fill="var(--impaired)">Groping Movements</text>
      <text x="360" y="262" text-anchor="middle" font-size="10" fill="var(--fg)">Mouth visibly searches</text>
      <text x="360" y="276" text-anchor="middle" font-size="10" fill="var(--fg)">for correct position;</text>
      <text x="360" y="290" text-anchor="middle" font-size="10" fill="var(--fg)">trial-and-error attempts</text>

      <rect x="480" y="220" width="180" height="80" rx="8" fill="var(--impaired-bg)" stroke="var(--impaired)" stroke-width="1.5"/>
      <text x="570" y="245" text-anchor="middle" font-size="11" font-weight="700" fill="var(--impaired)">Prosodic Problems</text>
      <text x="570" y="262" text-anchor="middle" font-size="10" fill="var(--fg)">Abnormal rhythm,</text>
      <text x="570" y="276" text-anchor="middle" font-size="10" fill="var(--fg)">stress, and intonation;</text>
      <text x="570" y="290" text-anchor="middle" font-size="10" fill="var(--fg)">robotic or monotone</text>

      <rect x="690" y="220" width="180" height="80" rx="8" fill="var(--impaired-bg)" stroke="var(--impaired)" stroke-width="1.5"/>
      <text x="780" y="245" text-anchor="middle" font-size="11" font-weight="700" fill="var(--impaired)">Length Effect</text>
      <text x="780" y="262" text-anchor="middle" font-size="10" fill="var(--fg)">Longer words = more</text>
      <text x="780" y="276" text-anchor="middle" font-size="10" fill="var(--fg)">errors; motor plans</text>
      <text x="780" y="290" text-anchor="middle" font-size="10" fill="var(--fg)">fail with complexity</text>

      <!-- Connecting lines to symptom boxes -->
      <line x1="555" y1="195" x2="150" y2="220" stroke="var(--impaired)" stroke-width="1.5"/>
      <line x1="555" y1="195" x2="360" y2="220" stroke="var(--impaired)" stroke-width="1.5"/>
      <line x1="555" y1="195" x2="570" y2="220" stroke="var(--impaired)" stroke-width="1.5"/>
      <line x1="555" y1="195" x2="780" y2="220" stroke="var(--impaired)" stroke-width="1.5"/>

      <!-- Distinction box at bottom -->
      <rect x="100" y="330" width="700" height="100" rx="10" fill="var(--neutral-bg)" stroke="var(--neutral)" stroke-width="1.5"/>
      <text x="450" y="355" text-anchor="middle" font-size="12" font-weight="700" fill="var(--neutral)">CAS is NOT the same as:</text>
      <text x="250" y="380" text-anchor="middle" font-size="11" fill="var(--fg)"><tspan font-weight="700">Dysarthria</tspan> = muscle weakness</text>
      <text x="250" y="396" text-anchor="middle" font-size="10" fill="var(--muted)">(muscles too weak to move correctly)</text>
      <text x="620" y="380" text-anchor="middle" font-size="11" fill="var(--fg)"><tspan font-weight="700">Phonological disorder</tspan> = rule-based sound errors</text>
      <text x="620" y="396" text-anchor="middle" font-size="10" fill="var(--muted)">(consistent patterns, not motor planning failure)</text>
      <text x="450" y="418" text-anchor="middle" font-size="11" font-weight="600" fill="var(--neutral)">CAS = motor planning failure: knows what to say, cannot program the movements</text>
    </svg>
  </div>
  <figcaption>
    <strong>Figure 3: Childhood Apraxia of Speech -- What Goes Wrong</strong>
    <span>In CAS, the earlier stages of speech production (thought, phoneme selection, syllable assembly) proceed normally. The breakdown occurs at the articulatory motor planning stage, where the brain fails to reliably program the precise muscle movements needed for speech. The result is inconsistent errors, groping movements, prosodic abnormalities, and increasing difficulty with longer words.</span>
  </figcaption>
</figure>
</body>
</html>
