<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Range of Motor Difficulties in Autism</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --accent: #4361ee; --muted: #6c757d;
    --bar1: #3b82f6; --bar2: #6366f1; --bar3: #8b5cf6; --bar4: #a855f7;
    --bar5: #d946ef; --bar6: #ec4899;
    --caution: #d97706; --caution-bg: #fffbeb;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a; --fg: #e8e8f0; --surface: #1a1a2e; --border: #2d2d44;
      --accent: #6b8aff; --muted: #9a9ab0;
      --bar1: #60a5fa; --bar2: #818cf8; --bar3: #a78bfa; --bar4: #c084fc;
      --bar5: #e879f9; --bar6: #f472b6;
      --caution: #fbbf24; --caution-bg: #2a2510;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--fg); display: flex; justify-content: center; padding: 2rem 1rem; }
  figure { max-width: 960px; width: 100%; background: var(--surface); border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); padding: 2.5rem; }
  h2 { text-align: center; font-size: 1.4rem; margin-bottom: 0.4rem; }
  .subtitle { text-align: center; font-size: 0.95rem; color: var(--muted); margin-bottom: 2rem; }
  .diagram-wrapper { overflow-x: auto; padding: 0.5rem; }
  svg { display: block; margin: 0 auto; }
  figcaption { text-align: center; margin-top: 1.5rem; padding-top: 1.25rem; border-top: 1px solid var(--border); }
  figcaption strong { display: block; font-size: 1.05rem; margin-bottom: 0.4rem; }
  figcaption span { font-size: 0.88rem; color: var(--muted); line-height: 1.5; }
</style>
</head>
<body>
<figure>
  <h2>The Range of Motor Difficulties in Autism</h2>
  <p class="subtitle">Prevalence and types of motor impairment across the spectrum</p>
  <div class="diagram-wrapper">
    <svg viewBox="0 0 860 520" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif" role="img" aria-labelledby="title-motor desc-motor">
      <title id="title-motor">Range of Motor Difficulties in Autism</title>
      <desc id="desc-motor">Horizontal bar chart showing the prevalence of different motor difficulties in autism, from general motor difficulties (87%) to catatonia (10%), with speech motor planning highlighted as the most demanding motor task.</desc>

      <!-- Grid lines -->
      <line x1="280" y1="40" x2="280" y2="400" stroke="var(--border)" stroke-width="1"/>
      <line x1="395" y1="40" x2="395" y2="400" stroke="var(--border)" stroke-width="0.5" stroke-dasharray="4,4"/>
      <line x1="510" y1="40" x2="510" y2="400" stroke="var(--border)" stroke-width="0.5" stroke-dasharray="4,4"/>
      <line x1="625" y1="40" x2="625" y2="400" stroke="var(--border)" stroke-width="0.5" stroke-dasharray="4,4"/>
      <line x1="740" y1="40" x2="740" y2="400" stroke="var(--border)" stroke-width="0.5" stroke-dasharray="4,4"/>
      <line x1="830" y1="40" x2="830" y2="400" stroke="var(--border)" stroke-width="1"/>

      <!-- X-axis labels -->
      <text x="280" y="420" text-anchor="middle" font-size="10" fill="var(--muted)">0%</text>
      <text x="395" y="420" text-anchor="middle" font-size="10" fill="var(--muted)">25%</text>
      <text x="510" y="420" text-anchor="middle" font-size="10" fill="var(--muted)">50%</text>
      <text x="625" y="420" text-anchor="middle" font-size="10" fill="var(--muted)">75%</text>
      <text x="740" y="420" text-anchor="middle" font-size="10" fill="var(--muted)">95%</text>
      <text x="555" y="445" text-anchor="middle" font-size="11" fill="var(--muted)" font-style="italic">Estimated prevalence in autistic individuals</text>

      <!-- Bar 1: General Motor (87%, range 50-95) -->
      <text x="270" y="72" text-anchor="end" font-size="12" font-weight="600" fill="var(--fg)">General Motor</text>
      <text x="270" y="86" text-anchor="end" font-size="10" fill="var(--muted)">Fine + gross motor</text>
      <rect x="280" y="58" width="478" height="34" rx="4" fill="var(--bar1)" opacity="0.85"/>
      <text x="766" y="80" font-size="11" font-weight="600" fill="var(--fg)">~87%</text>

      <!-- Bar 2: Praxis/Motor Planning -->
      <text x="270" y="132" text-anchor="end" font-size="12" font-weight="600" fill="var(--fg)">Praxis Deficits</text>
      <text x="270" y="146" text-anchor="end" font-size="10" fill="var(--muted)">Gestures, imitation</text>
      <rect x="280" y="118" width="410" height="34" rx="4" fill="var(--bar2)" opacity="0.85"/>
      <text x="698" y="140" font-size="11" font-weight="600" fill="var(--fg)">Widespread</text>

      <!-- Bar 3: Oral-Motor -->
      <text x="270" y="192" text-anchor="end" font-size="12" font-weight="600" fill="var(--fg)">Oral-Motor</text>
      <text x="270" y="206" text-anchor="end" font-size="10" fill="var(--muted)">Jaw, tongue, lips</text>
      <rect x="280" y="178" width="320" height="34" rx="4" fill="var(--bar3)" opacity="0.85"/>
      <text x="608" y="200" font-size="11" font-weight="600" fill="var(--fg)">Variable</text>

      <!-- Bar 4: CAS/Apraxia of Speech (with caution) -->
      <text x="270" y="252" text-anchor="end" font-size="12" font-weight="600" fill="var(--fg)">Speech Apraxia (CAS)</text>
      <text x="270" y="266" text-anchor="end" font-size="10" fill="var(--muted)">Speech motor planning</text>
      <!-- Range bar showing uncertainty -->
      <rect x="280" y="238" width="210" height="34" rx="4" fill="var(--bar4)" opacity="0.5" stroke="var(--bar4)" stroke-width="1.5" stroke-dasharray="6,3"/>
      <text x="498" y="260" font-size="11" font-weight="600" fill="var(--fg)">Debated*</text>

      <!-- Bar 5: Selective Mutism -->
      <text x="270" y="312" text-anchor="end" font-size="12" font-weight="600" fill="var(--fg)">Selective Mutism</text>
      <text x="270" y="326" text-anchor="end" font-size="10" fill="var(--muted)">Situational speech loss</text>
      <rect x="280" y="298" width="135" height="34" rx="4" fill="var(--bar5)" opacity="0.5" stroke="var(--bar5)" stroke-width="1.5" stroke-dasharray="6,3"/>
      <text x="423" y="320" font-size="11" font-weight="600" fill="var(--fg)">11.7-63%*</text>

      <!-- Bar 6: Catatonia -->
      <text x="270" y="372" text-anchor="end" font-size="12" font-weight="600" fill="var(--fg)">Catatonia</text>
      <text x="270" y="386" text-anchor="end" font-size="10" fill="var(--muted)">Motor initiation failure</text>
      <rect x="280" y="358" width="57" height="34" rx="4" fill="var(--bar6)" opacity="0.85"/>
      <text x="345" y="380" font-size="11" font-weight="600" fill="var(--fg)">~10.4%</text>

      <!-- Caution note for CAS -->
      <rect x="280" y="460" width="540" height="48" rx="8" fill="var(--caution-bg)" stroke="var(--caution)" stroke-width="1.5"/>
      <text x="300" y="479" font-size="11" font-weight="700" fill="var(--caution)">* Prevalence debate:</text>
      <text x="300" y="498" font-size="10" fill="var(--fg)">CAS figure (63.6%) from a single study of only 30 children (Tierney 2015). Dashed bars = uncertain estimates.</text>
    </svg>
  </div>
  <figcaption>
    <strong>Figure 2: The Range of Motor Difficulties in Autism</strong>
    <span>Motor difficulties affect the majority of autistic individuals (up to 87%) regardless of IQ. Speech is the single most complex motor task -- requiring coordination of approximately 100 muscles with millisecond precision -- making it especially vulnerable when motor systems are broadly compromised. Dashed bars indicate prevalence estimates with significant uncertainty.</span>
  </figcaption>
</figure>
</body>
</html>
