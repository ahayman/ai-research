<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alternative Motor Pathways -- Why AAC Works</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --muted: #6c757d;
    --high: #dc3545; --high-bg: #fee2e2;
    --mod: #d97706; --mod-bg: #fffbeb;
    --low: #198754; --low-bg: #edfff5;
    --min: #3b82f6; --min-bg: #dbeafe;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a; --fg: #e8e8f0; --surface: #1a1a2e; --border: #2d2d44;
      --muted: #9a9ab0;
      --high: #ff6b6b; --high-bg: #2a1010;
      --mod: #fbbf24; --mod-bg: #2a2510;
      --low: #51cf66; --low-bg: #0a2a15;
      --min: #60a5fa; --min-bg: #172554;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--fg); display: flex; justify-content: center; padding: 2rem 1rem; }
  figure { max-width: 960px; width: 100%; background: var(--surface); border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); padding: 2.5rem; }
  h2 { text-align: center; font-size: 1.4rem; margin-bottom: 0.4rem; }
  .subtitle { text-align: center; font-size: 0.95rem; color: var(--muted); margin-bottom: 2rem; }
  .diagram-wrapper { overflow-x: auto; padding: 0.5rem; }
  svg { display: block; margin: 0 auto; }
  figcaption { text-align: center; margin-top: 1.5rem; padding-top: 1.25rem; border-top: 1px solid var(--border); }
  figcaption strong { display: block; font-size: 1.05rem; margin-bottom: 0.4rem; }
  figcaption span { font-size: 0.88rem; color: var(--muted); line-height: 1.5; }
</style>
</head>
<body>
<figure>
  <h2>Alternative Motor Pathways</h2>
  <p class="subtitle">Why AAC works: replacing the most complex motor task with simpler ones</p>
  <div class="diagram-wrapper">
    <svg viewBox="0 0 880 520" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif" role="img" aria-labelledby="title-aac desc-aac">
      <title id="title-aac">Alternative Motor Pathways for Communication</title>
      <desc id="desc-aac">Comparison of motor demands across five communication methods, from speech (highest, ~100 muscles) through pointing, typing, and switch activation to eye-gaze (lowest, minimal motor demand). Lower motor demand means broader accessibility.</desc>

      <defs>
        <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="var(--muted)"/>
        </marker>
      </defs>

      <!-- Vertical axis label -->
      <text x="30" y="50" font-size="10" font-weight="700" fill="var(--high)">HIGHEST</text>
      <text x="30" y="62" font-size="10" fill="var(--high)">Motor Demand</text>
      <text x="30" y="440" font-size="10" font-weight="700" fill="var(--min)">LOWEST</text>
      <text x="30" y="452" font-size="10" fill="var(--min)">Motor Demand</text>
      <line x1="55" y1="75" x2="55" y2="425" stroke="var(--border)" stroke-width="1.5" marker-end="url(#arr)"/>

      <!-- Speech (highest) -->
      <rect x="100" y="30" width="740" height="80" rx="10" fill="var(--high-bg)" stroke="var(--high)" stroke-width="2.5"/>
      <text x="130" y="55" font-size="14" font-weight="700" fill="var(--high)">Speech</text>
      <text x="130" y="75" font-size="11" fill="var(--fg)">~100 muscles | millisecond precision | bilateral coordination | respiratory support</text>
      <text x="130" y="95" font-size="10" fill="var(--muted)">Jaw, lips, tongue, velum, larynx, diaphragm -- all coordinated simultaneously</text>
      <rect x="730" y="42" width="95" height="22" rx="11" fill="var(--high)"/>
      <text x="778" y="57" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">HIGHEST</text>

      <!-- Pointing/Touchscreen -->
      <rect x="100" y="130" width="580" height="70" rx="10" fill="var(--mod-bg)" stroke="var(--mod)" stroke-width="2"/>
      <text x="130" y="155" font-size="14" font-weight="700" fill="var(--mod)">Pointing / Touchscreen</text>
      <text x="130" y="175" font-size="11" fill="var(--fg)">Single limb | gross pointing movement | one-finger touch</text>
      <text x="130" y="190" font-size="10" fill="var(--muted)">Dramatically simpler than speech, though still requires some hand/arm motor control</text>
      <rect x="580" y="140" width="90" height="22" rx="11" fill="var(--mod)"/>
      <text x="625" y="155" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">MODERATE</text>

      <!-- Typing -->
      <rect x="100" y="220" width="510" height="70" rx="10" fill="var(--mod-bg)" stroke="var(--mod)" stroke-width="2"/>
      <text x="130" y="245" font-size="14" font-weight="700" fill="var(--mod)">Typing / Keyboard</text>
      <text x="130" y="265" font-size="11" fill="var(--fg)">Finger-to-key | sequential (not simultaneous) | one finger at a time</text>
      <text x="130" y="280" font-size="10" fill="var(--muted)">Letters produced one at a time rather than the simultaneous coordination speech requires</text>
      <rect x="510" y="230" width="90" height="22" rx="11" fill="var(--mod)"/>
      <text x="555" y="245" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">MODERATE</text>

      <!-- Switch Activation -->
      <rect x="100" y="310" width="400" height="70" rx="10" fill="var(--low-bg)" stroke="var(--low)" stroke-width="2"/>
      <text x="130" y="335" font-size="14" font-weight="700" fill="var(--low)">Switch Activation</text>
      <text x="130" y="355" font-size="11" fill="var(--fg)">Single movement: press, blink, sip/puff, head turn</text>
      <text x="130" y="370" font-size="10" fill="var(--muted)">Binary input -- any reliable movement can be used as a switch</text>
      <rect x="405" y="320" width="55" height="22" rx="11" fill="var(--low)"/>
      <text x="433" y="335" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">LOW</text>

      <!-- Eye-gaze -->
      <rect x="100" y="400" width="300" height="70" rx="10" fill="var(--min-bg)" stroke="var(--min)" stroke-width="2"/>
      <text x="130" y="425" font-size="14" font-weight="700" fill="var(--min)">Eye-Gaze Selection</text>
      <text x="130" y="445" font-size="11" fill="var(--fg)">Sustained visual fixation only</text>
      <text x="130" y="460" font-size="10" fill="var(--muted)">Bypasses the limb motor system entirely</text>
      <rect x="310" y="410" width="80" height="22" rx="11" fill="var(--min)"/>
      <text x="350" y="425" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">MINIMAL</text>

      <!-- Accessibility gradient annotation -->
      <text x="810" y="200" text-anchor="middle" font-size="11" fill="var(--muted)" transform="rotate(90, 810, 260)">Broader population can access</text>
      <line x1="790" y1="120" x2="790" y2="440" stroke="var(--muted)" stroke-width="1" marker-end="url(#arr)"/>

      <!-- Key insight -->
      <rect x="480" y="400" width="360" height="70" rx="10" fill="var(--surface)" stroke="var(--border)" stroke-width="1.5"/>
      <text x="660" y="425" text-anchor="middle" font-size="11" font-weight="700" fill="var(--fg)">Key Insight</text>
      <text x="660" y="445" text-anchor="middle" font-size="10" fill="var(--fg)">AAC works by replacing the most</text>
      <text x="660" y="460" text-anchor="middle" font-size="10" fill="var(--fg)">complex motor task (speech) with</text>
      <text x="660" y="475" text-anchor="middle" font-size="10" font-weight="600" fill="var(--fg)">simpler, more accessible motor tasks.</text>
    </svg>
  </div>
  <figcaption>
    <strong>Figure 6: Alternative Motor Pathways -- Why AAC Works</strong>
    <span>Speech requires coordination of approximately 100 muscles with millisecond precision -- making it the most motorically demanding communication method. AAC succeeds by providing alternative motor pathways that are progressively simpler: pointing, typing, switch activation, or eye-gaze. The simpler the motor demand, the broader the population that can access it. The language system remains the same; only the output channel changes.</span>
  </figcaption>
</figure>
</body>
</html>
