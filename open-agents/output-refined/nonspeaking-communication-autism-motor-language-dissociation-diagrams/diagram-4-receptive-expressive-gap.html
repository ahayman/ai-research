<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Receptive-Expressive Language Gap</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --muted: #6c757d; --receptive: #3b82f6; --receptive-bg: #dbeafe;
    --expressive: #dc3545; --expressive-bg: #fee2e2;
    --motor: #d97706; --motor-bg: #fffbeb;
    --accent: #4361ee;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a; --fg: #e8e8f0; --surface: #1a1a2e; --border: #2d2d44;
      --muted: #9a9ab0; --receptive: #60a5fa; --receptive-bg: #172554;
      --expressive: #ff6b6b; --expressive-bg: #2a1010;
      --motor: #fbbf24; --motor-bg: #2a2510;
      --accent: #6b8aff;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--fg); display: flex; justify-content: center; padding: 2rem 1rem; }
  figure { max-width: 900px; width: 100%; background: var(--surface); border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); padding: 2.5rem; }
  h2 { text-align: center; font-size: 1.4rem; margin-bottom: 0.4rem; }
  .subtitle { text-align: center; font-size: 0.95rem; color: var(--muted); margin-bottom: 2rem; }
  .diagram-wrapper { overflow-x: auto; padding: 0.5rem; }
  svg { display: block; margin: 0 auto; }
  figcaption { text-align: center; margin-top: 1.5rem; padding-top: 1.25rem; border-top: 1px solid var(--border); }
  figcaption strong { display: block; font-size: 1.05rem; margin-bottom: 0.4rem; }
  figcaption span { font-size: 0.88rem; color: var(--muted); line-height: 1.5; }
</style>
</head>
<body>
<figure>
  <h2>The Receptive-Expressive Language Gap</h2>
  <p class="subtitle">The most direct evidence for motor-language dissociation</p>
  <div class="diagram-wrapper">
    <svg viewBox="0 0 840 500" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif" role="img" aria-labelledby="title-gap desc-gap">
      <title id="title-gap">The Receptive-Expressive Language Gap</title>
      <desc id="desc-gap">Comparative visualization showing how receptive language (comprehension) is significantly higher than expressive language (speech output) in minimally verbal autistic individuals. The gap between them is predicted by motor skills, not cognitive ability.</desc>

      <!-- Y-axis -->
      <text x="95" y="50" text-anchor="end" font-size="11" fill="var(--muted)">High</text>
      <text x="95" y="380" text-anchor="end" font-size="11" fill="var(--muted)">Low</text>
      <text x="40" y="220" text-anchor="middle" font-size="12" fill="var(--muted)" transform="rotate(-90, 40, 220)">Language Level</text>
      <line x1="100" y1="40" x2="100" y2="390" stroke="var(--border)" stroke-width="1.5"/>

      <!-- Receptive bar -->
      <rect x="160" y="70" width="120" height="310" rx="8" fill="var(--receptive-bg)" stroke="var(--receptive)" stroke-width="2.5"/>
      <text x="220" y="220" text-anchor="middle" font-size="14" font-weight="700" fill="var(--receptive)">Receptive</text>
      <text x="220" y="240" text-anchor="middle" font-size="12" fill="var(--receptive)">Language</text>
      <text x="220" y="265" text-anchor="middle" font-size="10" fill="var(--fg)">(What the</text>
      <text x="220" y="278" text-anchor="middle" font-size="10" fill="var(--fg)">individual</text>
      <text x="220" y="291" text-anchor="middle" font-size="10" fill="var(--fg)">understands)</text>

      <!-- Expressive bar -->
      <rect x="340" y="250" width="120" height="130" rx="8" fill="var(--expressive-bg)" stroke="var(--expressive)" stroke-width="2.5"/>
      <text x="400" y="300" text-anchor="middle" font-size="14" font-weight="700" fill="var(--expressive)">Expressive</text>
      <text x="400" y="318" text-anchor="middle" font-size="12" fill="var(--expressive)">Language</text>
      <text x="400" y="343" text-anchor="middle" font-size="10" fill="var(--fg)">(What the</text>
      <text x="400" y="356" text-anchor="middle" font-size="10" fill="var(--fg)">individual</text>
      <text x="400" y="369" text-anchor="middle" font-size="10" fill="var(--fg)">can say)</text>

      <!-- Gap annotation -->
      <line x1="290" y1="100" x2="330" y2="100" stroke="var(--motor)" stroke-width="2"/>
      <line x1="310" y1="100" x2="310" y2="245" stroke="var(--motor)" stroke-width="2"/>
      <line x1="290" y1="245" x2="330" y2="245" stroke="var(--motor)" stroke-width="2"/>

      <!-- Gap label box -->
      <rect x="500" y="100" width="310" height="140" rx="10" fill="var(--motor-bg)" stroke="var(--motor)" stroke-width="2"/>
      <text x="655" y="125" text-anchor="middle" font-size="13" font-weight="700" fill="var(--motor)">THE GAP</text>
      <text x="655" y="145" text-anchor="middle" font-size="13" font-weight="700" fill="var(--motor)">Motor-Mediated</text>
      <line x1="530" y1="155" x2="780" y2="155" stroke="var(--motor)" stroke-width="0.5"/>
      <text x="520" y="175" font-size="11" fill="var(--fg)">Fine motor skills predict</text>
      <text x="520" y="192" font-size="11" font-weight="700" fill="var(--fg)">expressive but NOT receptive</text>
      <text x="520" y="209" font-size="11" fill="var(--fg)">language abilities</text>
      <text x="520" y="230" font-size="10" fill="var(--muted)" font-style="italic">MIT Media Lab, Frontiers in</text>
      <text x="520" y="243" font-size="10" fill="var(--muted)" font-style="italic">Language Sciences, 2025</text>

      <!-- Arrow from gap to label -->
      <line x1="310" y1="170" x2="495" y2="170" stroke="var(--motor)" stroke-width="1.5" stroke-dasharray="6,3"/>

      <!-- Bottom insight box -->
      <rect x="120" y="415" width="600" height="70" rx="10" fill="var(--surface)" stroke="var(--accent)" stroke-width="2"/>
      <text x="420" y="440" text-anchor="middle" font-size="12" font-weight="700" fill="var(--accent)">The Logic of Motor-Language Dissociation</text>
      <text x="420" y="460" text-anchor="middle" font-size="11" fill="var(--fg)">If the barrier were cognitive, both receptive AND expressive language would be equally affected.</text>
      <text x="420" y="477" text-anchor="middle" font-size="11" fill="var(--fg)">The selective impairment of expression points directly to the motor system.</text>
    </svg>
  </div>
  <figcaption>
    <strong>Figure 4: The Receptive-Expressive Language Gap</strong>
    <span>In minimally verbal autistic individuals, receptive language (comprehension) significantly exceeds expressive language (speech output). Motor skills are the most significant predictor of this gap. If the problem were cognitive, both bars would be equally low. The selective impairment of expression, with comprehension preserved, is the strongest evidence that the barrier is motor, not linguistic.</span>
  </figcaption>
</figure>
</body>
</html>
