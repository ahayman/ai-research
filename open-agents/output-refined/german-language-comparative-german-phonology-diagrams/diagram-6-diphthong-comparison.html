<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>German Diphthong System vs. English</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --accent: #4361ee;
    --accent-light: #e8edff;
    --german: #6366f1;
    --german-bg: #e0e0ff;
    --english: #22c55e;
    --english-bg: #dcfce7;
    --shared: #f59e0b;
    --shared-bg: #fef3c7;
    --cognate: #06b6d4;
    --cognate-bg: #cffafe;
    --muted: #6c757d;
    --caption-bg: #f8f9fa;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --accent: #6b8aff;
      --accent-light: #1e2a4a;
      --german: #818cf8;
      --german-bg: #2e2a5e;
      --english: #4ade80;
      --english-bg: #14532d;
      --shared: #fbbf24;
      --shared-bg: #78350f;
      --cognate: #22d3ee;
      --cognate-bg: #0c3d4a;
      --muted: #9a9ab0;
      --caption-bg: #1a1a2e;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure { max-width: 1100px; width: 100%; }
  .diagram-container {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.5rem 1rem;
    overflow-x: auto;
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding: 1rem 1.5rem;
    background: var(--caption-bg);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  .legend {
    display: flex; gap: 1.5rem; justify-content: center; flex-wrap: wrap;
    margin-top: 1rem; font-size: 0.82rem; color: var(--muted);
  }
  .legend-item { display: flex; align-items: center; gap: 0.4rem; }
  .legend-swatch { width: 14px; height: 14px; border-radius: 3px; border: 1px solid var(--border); }
  svg { display: block; margin: 0 auto; }
  .ipa { font: 15px 'Gentium Plus', 'Noto Sans', 'DejaVu Sans', serif; }
  .ipa-large { font: bold 18px 'Gentium Plus', 'Noto Sans', 'DejaVu Sans', serif; }
  .title-text { font: bold 14px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
  .subtitle-text { font: 11px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
  .box-text { font: 12px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
  .label-sm { font: 10px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
  .label-bold { font: bold 11px 'Segoe UI', system-ui, sans-serif; }
  .word-label { font: italic 11px 'Segoe UI', system-ui, sans-serif; }
</style>
</head>
<body>
<figure>
  <div class="diagram-container">
    <svg viewBox="0 0 1060 820" xmlns="http://www.w3.org/2000/svg" style="min-width:780px;">
      <defs>
        <marker id="arrDe" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
          <polygon points="0 0, 10 3.5, 0 7" fill="var(--german)"/>
        </marker>
        <marker id="arrEn" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
          <polygon points="0 0, 10 3.5, 0 7" fill="var(--english)"/>
        </marker>
        <marker id="arrCognate" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
          <polygon points="0 0, 10 3.5, 0 7" fill="var(--cognate)"/>
        </marker>
      </defs>

      <!-- Title -->
      <text x="530" y="28" text-anchor="middle" class="title-text" style="font-size:16px;">German Diphthong System vs. English</text>
      <text x="530" y="46" text-anchor="middle" class="subtitle-text">German: 3 compact diphthongs, pure monophthongs &#x2014; English: ~8 diphthongs, long vowels that glide</text>

      <!-- ========== GERMAN PANEL (left) ========== -->
      <text x="265" y="80" text-anchor="middle" class="title-text" fill="var(--german)">German: Only 3 Diphthongs</text>

      <!-- German vowel space with diphthong arrows -->
      <g transform="translate(50, 95)">
        <text x="30" y="-5" text-anchor="middle" class="label-sm">Front</text>
        <text x="200" y="-5" text-anchor="middle" class="label-sm">Central</text>
        <text x="380" y="-5" text-anchor="middle" class="label-sm">Back</text>
        <text x="-10" y="10" text-anchor="end" class="label-sm">Close</text>
        <text x="-10" y="120" text-anchor="end" class="label-sm">Mid</text>
        <text x="-10" y="230" text-anchor="end" class="label-sm">Open</text>

        <!-- Trapezoid -->
        <path d="M 30,0 L 380,0 L 400,240 L 110,240 Z" fill="none" stroke="var(--border)" stroke-width="1" stroke-dasharray="4,4"/>
        <line x1="30" y1="120" x2="390" y2="120" stroke="var(--border)" stroke-width="0.5" stroke-dasharray="2,3"/>

        <!-- Starting/ending vowel positions (subtle dots) -->
        <!-- a position -->
        <circle cx="180" cy="230" r="5" fill="var(--border)"/>
        <!-- I position -->
        <circle cx="65" cy="20" r="5" fill="var(--border)"/>
        <!-- U position -->
        <circle cx="350" cy="20" r="5" fill="var(--border)"/>
        <!-- OY position -->
        <circle cx="100" cy="150" r="5" fill="var(--border)"/>

        <!-- DIPHTHONG 1: /aI/ -->
        <path d="M 180,225 Q 130,130 70,30" fill="none" stroke="var(--german)" stroke-width="3" marker-end="url(#arrDe)"/>
        <rect x="95" y="115" width="80" height="35" rx="6" fill="var(--german-bg)" stroke="var(--german)" stroke-width="1.5"/>
        <text x="135" y="132" text-anchor="middle" class="ipa-large" fill="var(--german)">/a&#x026A;/</text>
        <text x="135" y="146" text-anchor="middle" class="label-sm" fill="var(--german)">ei, ai, ay</text>

        <!-- DIPHTHONG 2: /aU/ -->
        <path d="M 185,225 Q 270,130 345,30" fill="none" stroke="var(--german)" stroke-width="3" marker-end="url(#arrDe)"/>
        <rect x="245" y="115" width="80" height="35" rx="6" fill="var(--german-bg)" stroke="var(--german)" stroke-width="1.5"/>
        <text x="285" y="132" text-anchor="middle" class="ipa-large" fill="var(--german)">/a&#x028A;/</text>
        <text x="285" y="146" text-anchor="middle" class="label-sm" fill="var(--german)">au</text>

        <!-- DIPHTHONG 3: /OY/ -->
        <path d="M 175,220 Q 140,195 105,155" fill="none" stroke="var(--german)" stroke-width="3" marker-end="url(#arrDe)"/>
        <rect x="175" y="180" width="80" height="35" rx="6" fill="var(--german-bg)" stroke="var(--german)" stroke-width="1.5"/>
        <text x="215" y="197" text-anchor="middle" class="ipa-large" fill="var(--german)">/&#x254;&#x028F;/</text>
        <text x="215" y="211" text-anchor="middle" class="label-sm" fill="var(--german)">eu, &#xE4;u</text>

        <!-- Example words -->
        <text x="420" y="45" text-anchor="start" class="word-label" fill="var(--german)">Stein, mein, Mai</text>
        <text x="420" y="135" text-anchor="start" class="word-label" fill="var(--german)">Haus, Baum, Frau</text>
        <text x="420" y="200" text-anchor="start" class="word-label" fill="var(--german)">neu, H&#xE4;user, Freund</text>
      </g>

      <!-- Umlaut relationship note -->
      <g transform="translate(50, 360)">
        <rect x="0" y="0" width="430" height="40" rx="6" fill="var(--german-bg)" stroke="var(--german)" stroke-width="1" stroke-dasharray="3,2"/>
        <text x="215" y="17" text-anchor="middle" class="label-bold" fill="var(--german)">Umlaut: au &#x2192; &#xE4;u (spelled differently, same diphthong /&#x254;&#x028F;/)</text>
        <text x="215" y="33" text-anchor="middle" class="label-sm" fill="var(--german)">Haus &#x2192; H&#xE4;user &nbsp;|&nbsp; Baum &#x2192; B&#xE4;ume &nbsp;|&nbsp; Maus &#x2192; M&#xE4;use</text>
      </g>

      <!-- ========== ENGLISH PANEL (right) ========== -->
      <text x="795" y="80" text-anchor="middle" class="title-text" fill="var(--english)">English: ~8 Diphthongs</text>

      <g transform="translate(580, 95)">
        <text x="30" y="-5" text-anchor="middle" class="label-sm">Front</text>
        <text x="200" y="-5" text-anchor="middle" class="label-sm">Central</text>
        <text x="380" y="-5" text-anchor="middle" class="label-sm">Back</text>
        <text x="-10" y="10" text-anchor="end" class="label-sm">Close</text>
        <text x="-10" y="120" text-anchor="end" class="label-sm">Mid</text>
        <text x="-10" y="230" text-anchor="end" class="label-sm">Open</text>

        <!-- Trapezoid -->
        <path d="M 30,0 L 380,0 L 400,240 L 110,240 Z" fill="none" stroke="var(--border)" stroke-width="1" stroke-dasharray="4,4"/>
        <line x1="30" y1="120" x2="390" y2="120" stroke="var(--border)" stroke-width="0.5" stroke-dasharray="2,3"/>

        <!-- Shared diphthongs (cognates with German) -->
        <!-- /aI/ -->
        <path d="M 180,225 Q 130,130 70,30" fill="none" stroke="var(--english)" stroke-width="2.5" marker-end="url(#arrEn)"/>
        <text x="80" y="140" text-anchor="start" class="ipa" fill="var(--english)">/a&#x026A;/</text>
        <text x="80" y="155" text-anchor="start" class="label-sm" fill="var(--english)">mine</text>

        <!-- /aU/ -->
        <path d="M 185,225 Q 270,130 345,30" fill="none" stroke="var(--english)" stroke-width="2.5" marker-end="url(#arrEn)"/>
        <text x="275" y="140" text-anchor="start" class="ipa" fill="var(--english)">/a&#x028A;/</text>
        <text x="275" y="155" text-anchor="start" class="label-sm" fill="var(--english)">house</text>

        <!-- /OI/ -->
        <path d="M 340,200 Q 220,120 80,30" fill="none" stroke="var(--english)" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrEn)"/>
        <text x="200" y="90" text-anchor="start" class="ipa" fill="var(--english)">/&#x254;&#x026A;/</text>
        <text x="200" y="105" text-anchor="start" class="label-sm" fill="var(--english)">boy</text>

        <!-- English-ONLY "long vowel" diphthongs -->
        <!-- /eI/ -->
        <path d="M 80,125 Q 75,75 65,30" fill="none" stroke="var(--english)" stroke-width="2" marker-end="url(#arrEn)"/>
        <text x="45" y="80" text-anchor="end" class="ipa" style="font-weight:bold;" fill="var(--english)">/e&#x026A;/</text>
        <text x="45" y="95" text-anchor="end" class="label-sm" fill="var(--english)">bait</text>

        <!-- /oU/ -->
        <path d="M 340,130 Q 350,75 360,25" fill="none" stroke="var(--english)" stroke-width="2" marker-end="url(#arrEn)"/>
        <text x="370" y="85" text-anchor="start" class="ipa" style="font-weight:bold;" fill="var(--english)">/&#x0259;&#x028A;/</text>
        <text x="370" y="100" text-anchor="start" class="label-sm" fill="var(--english)">boat</text>

        <!-- /Ia/ -->
        <path d="M 55,15 Q 100,60 180,110" fill="none" stroke="var(--english)" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrEn)"/>
        <text x="140" y="50" text-anchor="start" class="ipa" fill="var(--english)">/&#x026A;&#x0259;/</text>
        <text x="140" y="63" text-anchor="start" class="label-sm" fill="var(--english)">beer</text>

        <!-- /Ua/ -->
        <path d="M 360,15 Q 320,60 240,110" fill="none" stroke="var(--english)" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrEn)"/>
        <text x="285" y="50" text-anchor="start" class="ipa" fill="var(--english)">/&#x028A;&#x0259;/</text>
        <text x="285" y="63" text-anchor="start" class="label-sm" fill="var(--english)">poor</text>

        <!-- English total count -->
        <text x="200" y="260" text-anchor="middle" style="font:bold 10px 'Segoe UI',sans-serif;fill:var(--english);">+ diphthongized "long" vowels /e&#x026A;/ and /&#x0259;&#x028A;/</text>
      </g>

      <!-- ===== COGNATE CONNECTION PANEL ===== -->
      <g transform="translate(0, 420)">
        <rect x="50" y="0" width="960" height="100" rx="8" fill="var(--cognate-bg)" stroke="var(--cognate)" stroke-width="1.5"/>
        <text x="530" y="22" text-anchor="middle" class="title-text" fill="var(--cognate)">Cognate Diphthong Pairs</text>
        <text x="530" y="40" text-anchor="middle" class="subtitle-text">German and English share two diphthongs from the same historical vowel changes</text>

        <!-- mein/mine -->
        <text x="180" y="65" text-anchor="middle" class="ipa" style="font-size:16px;" fill="var(--german)">mein [ma&#x026A;n]</text>
        <text x="300" y="65" text-anchor="middle" style="font:bold 14px 'Segoe UI',sans-serif;fill:var(--cognate);">&#x2194;</text>
        <text x="420" y="65" text-anchor="middle" class="ipa" style="font-size:16px;" fill="var(--english)">mine [ma&#x026A;n]</text>
        <text x="300" y="82" text-anchor="middle" class="label-sm" fill="var(--cognate)">Both from MHG/ME long /i&#x2D0;/ that diphthongized</text>

        <!-- Haus/house -->
        <text x="660" y="65" text-anchor="middle" class="ipa" style="font-size:16px;" fill="var(--german)">Haus [ha&#x028A;s]</text>
        <text x="780" y="65" text-anchor="middle" style="font:bold 14px 'Segoe UI',sans-serif;fill:var(--cognate);">&#x2194;</text>
        <text x="900" y="65" text-anchor="middle" class="ipa" style="font-size:16px;" fill="var(--english)">house [ha&#x028A;s]</text>
        <text x="780" y="82" text-anchor="middle" class="label-sm" fill="var(--cognate)">Both from MHG/ME long /u&#x2D0;/ that diphthongized</text>
      </g>

      <!-- ===== THE CRITICAL DIFFERENCE ===== -->
      <g transform="translate(0, 540)">
        <rect x="50" y="0" width="960" height="120" rx="8" fill="var(--accent-light)" stroke="var(--accent)" stroke-width="2"/>
        <text x="530" y="22" text-anchor="middle" class="title-text" fill="var(--accent)">The Critical Difference: Monophthong Purity</text>
        <text x="530" y="42" text-anchor="middle" class="subtitle-text" style="font-size:12px;">German "long" vowels stay pure &#x2014; English "long" vowels become diphthongs</text>

        <!-- Side by side comparison -->
        <text x="260" y="68" text-anchor="middle" class="label-bold" fill="var(--german)">GERMAN (monophthong)</text>
        <text x="530" y="68" text-anchor="middle" class="label-sm">vs.</text>
        <text x="800" y="68" text-anchor="middle" class="label-bold" fill="var(--english)">ENGLISH (diphthongized)</text>

        <text x="260" y="90" text-anchor="middle" class="ipa" style="font-size:16px;" fill="var(--german)">See [ze&#x2D0;] &#x2014; pure [e&#x2D0;]</text>
        <text x="800" y="90" text-anchor="middle" class="ipa" style="font-size:16px;" fill="var(--english)">say [se&#x026A;] &#x2014; glides to [&#x026A;]</text>

        <text x="260" y="112" text-anchor="middle" class="ipa" style="font-size:16px;" fill="var(--german)">Boot [bo&#x2D0;t] &#x2014; pure [o&#x2D0;]</text>
        <text x="800" y="112" text-anchor="middle" class="ipa" style="font-size:16px;" fill="var(--english)">boat [b&#x0259;&#x028A;t] &#x2014; glides to [&#x028A;]</text>
      </g>

      <!-- Quantity comparison -->
      <g transform="translate(0, 680)">
        <rect x="50" y="0" width="460" height="55" rx="8" fill="var(--german-bg)" stroke="var(--german)" stroke-width="1.5"/>
        <text x="280" y="22" text-anchor="middle" class="title-text" fill="var(--german)">German: 3 true diphthongs</text>
        <text x="280" y="42" text-anchor="middle" class="subtitle-text">/a&#x026A;/ + /a&#x028A;/ + /&#x254;&#x028F;/ &#x2014; all start from open /a/ or /&#x254;/</text>

        <rect x="550" y="0" width="460" height="55" rx="8" fill="var(--english-bg)" stroke="var(--english)" stroke-width="1.5"/>
        <text x="780" y="22" text-anchor="middle" class="title-text" fill="var(--english)">English: ~8 diphthongs</text>
        <text x="780" y="42" text-anchor="middle" class="subtitle-text">/a&#x026A;, a&#x028A;, &#x254;&#x026A;, e&#x026A;, &#x0259;&#x028A;, &#x026A;&#x0259;, e&#x0259;, &#x028A;&#x0259;/ &#x2014; diverse starting points</text>
      </g>

      <!-- Spelling note -->
      <g transform="translate(0, 755)">
        <rect x="50" y="0" width="960" height="45" rx="8" fill="var(--surface)" stroke="var(--border)" stroke-width="1"/>
        <text x="530" y="18" text-anchor="middle" class="label-bold" fill="var(--accent)">German Diphthong Spelling</text>
        <text x="530" y="36" text-anchor="middle" class="label-sm">
          /a&#x026A;/ = ei, ai, ay (Stein, Mai) &nbsp;&#x2022;&nbsp; /a&#x028A;/ = au (Haus, Baum) &nbsp;&#x2022;&nbsp; /&#x254;&#x028F;/ = eu or &#xE4;u (neu, H&#xE4;user) &#x2014; the &#xE4;u spelling signals an umlaut relationship
        </text>
      </g>
    </svg>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background:var(--german-bg);border-color:var(--german);"></div> German diphthongs (3 total)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--english-bg);border-color:var(--english);"></div> English diphthongs (~8 total)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--cognate-bg);border-color:var(--cognate);"></div> Cognate pairs (shared history)</div>
  </div>

  <figcaption>
    <h2>Figure 6 -- German Diphthong System vs. English</h2>
    <p>German has only three phonemic diphthongs (/a&#x026A;/, /a&#x028A;/, /&#x254;&#x028F;/) compared to English's eight or more. Two of these (/a&#x026A;/ and /a&#x028A;/) are cognates with their English equivalents, arising from the same historical diphthongization of medieval long vowels: MHG /i&#x2D0;/ &#x2192; /a&#x026A;/ (mein/mine), MHG /u&#x2D0;/ &#x2192; /a&#x028A;/ (Haus/house). The most critical difference for learners is that German "long" vowels (/e&#x2D0;, o&#x2D0;/) remain pure monophthongs, while English systematically diphthongizes them (/e&#x026A;, &#x0259;&#x028A;/). Avoiding this diphthongization is one of the most important pronunciation targets for English speakers learning German.</p>
  </figcaption>
</figure>
</body>
</html>
