<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>German vs. English Vowel Space Comparison</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --accent: #4361ee;
    --accent-light: #e8edff;
    --german: #6366f1;
    --german-bg: #e0e0ff;
    --english: #22c55e;
    --english-bg: #dcfce7;
    --shared: #f59e0b;
    --shared-bg: #fef3c7;
    --front-rounded: #a855f7;
    --front-rounded-bg: #f3e8ff;
    --muted: #6c757d;
    --caption-bg: #f8f9fa;
    --label: #374151;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --accent: #6b8aff;
      --accent-light: #1e2a4a;
      --german: #818cf8;
      --german-bg: #2e2a5e;
      --english: #4ade80;
      --english-bg: #14532d;
      --shared: #fbbf24;
      --shared-bg: #78350f;
      --front-rounded: #c084fc;
      --front-rounded-bg: #3b1764;
      --muted: #9a9ab0;
      --caption-bg: #1a1a2e;
      --label: #c8c8d8;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure { max-width: 1100px; width: 100%; }
  .diagram-container {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.5rem 1rem;
    overflow-x: auto;
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding: 1rem 1.5rem;
    background: var(--caption-bg);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  .legend {
    display: flex; gap: 1.5rem; justify-content: center; flex-wrap: wrap;
    margin-top: 1rem; font-size: 0.82rem; color: var(--muted);
  }
  .legend-item { display: flex; align-items: center; gap: 0.4rem; }
  .legend-swatch { width: 14px; height: 14px; border-radius: 3px; border: 1px solid var(--border); }
  svg { display: block; margin: 0 auto; }
  .ipa { font: 15px 'Gentium Plus', 'Noto Sans', 'DejaVu Sans', serif; }
  .ipa-large { font: bold 17px 'Gentium Plus', 'Noto Sans', 'DejaVu Sans', serif; }
  .title-text { font: bold 14px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
  .subtitle-text { font: 11px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
  .axis-label { font: 10px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
  .pair-label { font: italic 9px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
  .word-label { font: italic 10px 'Segoe UI', system-ui, sans-serif; }
</style>
</head>
<body>
<figure>
  <div class="diagram-container">
    <svg viewBox="0 0 1060 660" xmlns="http://www.w3.org/2000/svg" style="min-width:780px;">
      <!-- Title -->
      <text x="530" y="28" text-anchor="middle" class="title-text" style="font-size:16px;">German vs. English Vowel Space</text>
      <text x="530" y="46" text-anchor="middle" class="subtitle-text">Sibling systems: German adds front rounded vowels and keeps long vowels pure; English diphthongizes</text>

      <!-- ========== GERMAN PANEL (left) ========== -->
      <text x="250" y="80" text-anchor="middle" class="title-text" fill="var(--german)">German (15+ monophthongs + 3 diphthongs)</text>
      <text x="250" y="96" text-anchor="middle" class="subtitle-text">Systematic tense/lax pairs; front rounded series; pure monophthongs</text>

      <g transform="translate(50, 115)">
        <!-- Axes -->
        <text x="-5" y="0" text-anchor="end" class="axis-label">Close</text>
        <text x="-5" y="90" text-anchor="end" class="axis-label">Close-mid</text>
        <text x="-5" y="180" text-anchor="end" class="axis-label">Open-mid</text>
        <text x="-5" y="270" text-anchor="end" class="axis-label">Open</text>
        <text x="50" y="-12" text-anchor="middle" class="axis-label">Front</text>
        <text x="210" y="-12" text-anchor="middle" class="axis-label">Central</text>
        <text x="370" y="-12" text-anchor="middle" class="axis-label">Back</text>

        <!-- Trapezoid shape -->
        <path d="M 50,0 L 370,0 L 400,270 L 160,270 Z" fill="none" stroke="var(--border)" stroke-width="1" stroke-dasharray="4,4"/>
        <line x1="50" y1="90" x2="380" y2="90" stroke="var(--border)" stroke-width="0.5" stroke-dasharray="2,3"/>
        <line x1="50" y1="180" x2="390" y2="180" stroke="var(--border)" stroke-width="0.5" stroke-dasharray="2,3"/>

        <!-- Front rounded vowel zone highlight -->
        <rect x="120" y="-8" width="80" height="210" rx="10" fill="var(--front-rounded-bg)" stroke="var(--front-rounded)" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
        <text x="160" y="215" text-anchor="middle" style="font:italic 9px 'Segoe UI',sans-serif;fill:var(--front-rounded);">Front Rounded Zone</text>

        <!-- TENSE (long) vowels - shared with English approximate equivalents -->
        <!-- /i:/ -->
        <circle cx="55" cy="0" r="15" fill="var(--shared-bg)" stroke="var(--shared)" stroke-width="2"/>
        <text x="55" y="5" text-anchor="middle" class="ipa" fill="var(--shared)">i&#x2D0;</text>
        <text x="55" y="20" text-anchor="middle" class="word-label" fill="var(--muted)">Miete</text>

        <!-- /u:/ -->
        <circle cx="365" cy="0" r="15" fill="var(--shared-bg)" stroke="var(--shared)" stroke-width="2"/>
        <text x="365" y="5" text-anchor="middle" class="ipa" fill="var(--shared)">u&#x2D0;</text>
        <text x="365" y="20" text-anchor="middle" class="word-label" fill="var(--muted)">Mut</text>

        <!-- /e:/ -->
        <circle cx="70" cy="90" r="15" fill="var(--shared-bg)" stroke="var(--shared)" stroke-width="2"/>
        <text x="70" y="95" text-anchor="middle" class="ipa" fill="var(--shared)">e&#x2D0;</text>
        <text x="70" y="75" text-anchor="middle" class="word-label" fill="var(--muted)">Beet</text>

        <!-- /o:/ -->
        <circle cx="370" cy="90" r="15" fill="var(--shared-bg)" stroke="var(--shared)" stroke-width="2"/>
        <text x="370" y="95" text-anchor="middle" class="ipa" fill="var(--shared)">o&#x2D0;</text>
        <text x="370" y="75" text-anchor="middle" class="word-label" fill="var(--muted)">Boot</text>

        <!-- /a:/ -->
        <circle cx="210" cy="270" r="15" fill="var(--shared-bg)" stroke="var(--shared)" stroke-width="2"/>
        <text x="210" y="275" text-anchor="middle" class="ipa" fill="var(--shared)">a&#x2D0;</text>
        <text x="210" y="290" text-anchor="middle" class="word-label" fill="var(--muted)">Staat</text>

        <!-- LAX (short) vowels -->
        <!-- /I/ -->
        <circle cx="85" cy="30" r="13" fill="var(--shared-bg)" stroke="var(--shared)" stroke-width="1.5"/>
        <text x="85" y="35" text-anchor="middle" class="ipa" fill="var(--shared)">&#x026A;</text>

        <!-- /U/ -->
        <circle cx="335" cy="30" r="13" fill="var(--shared-bg)" stroke="var(--shared)" stroke-width="1.5"/>
        <text x="335" y="35" text-anchor="middle" class="ipa" fill="var(--shared)">&#x028A;</text>

        <!-- /E/ -->
        <circle cx="100" cy="180" r="13" fill="var(--shared-bg)" stroke="var(--shared)" stroke-width="1.5"/>
        <text x="100" y="185" text-anchor="middle" class="ipa" fill="var(--shared)">&#x025B;</text>

        <!-- /O/ -->
        <circle cx="380" cy="180" r="13" fill="var(--shared-bg)" stroke="var(--shared)" stroke-width="1.5"/>
        <text x="380" y="185" text-anchor="middle" class="ipa" fill="var(--shared)">&#x0254;</text>

        <!-- /a/ short -->
        <circle cx="230" cy="255" r="13" fill="var(--shared-bg)" stroke="var(--shared)" stroke-width="1.5"/>
        <text x="230" y="260" text-anchor="middle" class="ipa" fill="var(--shared)">a</text>
        <text x="245" y="255" text-anchor="start" class="word-label" fill="var(--muted)">Stadt</text>

        <!-- Schwa -->
        <circle cx="220" cy="135" r="12" fill="var(--german-bg)" stroke="var(--german)" stroke-width="1.5" stroke-dasharray="3,2"/>
        <text x="220" y="140" text-anchor="middle" class="ipa" fill="var(--german)">&#x0259;</text>
        <text x="240" y="130" text-anchor="start" class="word-label" fill="var(--german)">Schule</text>

        <!-- FRONT ROUNDED VOWELS (German-only) -->
        <!-- /y:/ -->
        <circle cx="140" cy="0" r="15" fill="var(--front-rounded-bg)" stroke="var(--front-rounded)" stroke-width="2.5"/>
        <text x="140" y="5" text-anchor="middle" class="ipa-large" fill="var(--front-rounded)">y&#x2D0;</text>
        <text x="140" y="20" text-anchor="middle" class="word-label" fill="var(--front-rounded)">T&#xFC;r</text>

        <!-- /Y/ -->
        <circle cx="155" cy="30" r="13" fill="var(--front-rounded-bg)" stroke="var(--front-rounded)" stroke-width="2"/>
        <text x="155" y="35" text-anchor="middle" class="ipa" fill="var(--front-rounded)">&#x028F;</text>
        <text x="175" y="35" text-anchor="start" class="word-label" fill="var(--front-rounded)">H&#xFC;tte</text>

        <!-- /oe:/ -->
        <circle cx="150" cy="90" r="15" fill="var(--front-rounded-bg)" stroke="var(--front-rounded)" stroke-width="2.5"/>
        <text x="150" y="95" text-anchor="middle" class="ipa-large" fill="var(--front-rounded)">&#xF8;&#x2D0;</text>
        <text x="150" y="75" text-anchor="middle" class="word-label" fill="var(--front-rounded)">H&#xF6;hle</text>

        <!-- /oe/ short -->
        <circle cx="165" cy="180" r="13" fill="var(--front-rounded-bg)" stroke="var(--front-rounded)" stroke-width="2"/>
        <text x="165" y="185" text-anchor="middle" class="ipa" fill="var(--front-rounded)">&#x0153;</text>
        <text x="165" y="168" text-anchor="middle" class="word-label" fill="var(--front-rounded)">H&#xF6;lle</text>

        <!-- Tense/Lax pairing lines -->
        <line x1="68" y1="0" x2="80" y2="25" stroke="var(--muted)" stroke-width="0.8" stroke-dasharray="2,2"/>
        <line x1="360" y1="10" x2="340" y2="25" stroke="var(--muted)" stroke-width="0.8" stroke-dasharray="2,2"/>

        <!-- /E:/ special long lax vowel -->
        <circle cx="90" cy="150" r="12" fill="var(--german-bg)" stroke="var(--german)" stroke-width="1.5" stroke-dasharray="3,2"/>
        <text x="90" y="155" text-anchor="middle" class="ipa" fill="var(--german)">&#x025B;&#x2D0;</text>
        <text x="90" y="145" text-anchor="end" class="word-label" fill="var(--german)">sp&#xE4;t</text>

        <!-- "No Diphthongization" arrows -->
        <text x="420" y="50" text-anchor="start" style="font:bold 9px 'Segoe UI',sans-serif;fill:var(--german);">STAYS PURE!</text>
        <path d="M 384,90 L 415,65" fill="none" stroke="var(--german)" stroke-width="1.2" stroke-dasharray="3,2"/>
        <text x="420" y="90" text-anchor="start" style="font:9px 'Segoe UI',sans-serif;fill:var(--german);">e&#x2D0; &#x2260; e&#x026A;</text>
        <text x="420" y="105" text-anchor="start" style="font:9px 'Segoe UI',sans-serif;fill:var(--german);">o&#x2D0; &#x2260; o&#x028A;</text>
      </g>

      <!-- ========== ENGLISH PANEL (right) ========== -->
      <text x="800" y="80" text-anchor="middle" class="title-text" fill="var(--english)">English (~12 monophthongs + 8 diphthongs)</text>
      <text x="800" y="96" text-anchor="middle" class="subtitle-text">Tense/lax pairs; diphthongized long vowels; no front rounded series</text>

      <g transform="translate(590, 115)">
        <!-- Axes -->
        <text x="-5" y="0" text-anchor="end" class="axis-label">Close</text>
        <text x="-5" y="90" text-anchor="end" class="axis-label">Mid</text>
        <text x="-5" y="180" text-anchor="end" class="axis-label">Open-mid</text>
        <text x="-5" y="270" text-anchor="end" class="axis-label">Open</text>
        <text x="50" y="-12" text-anchor="middle" class="axis-label">Front</text>
        <text x="370" y="-12" text-anchor="middle" class="axis-label">Back</text>

        <!-- Trapezoid -->
        <path d="M 50,0 L 370,0 L 400,270 L 160,270 Z" fill="none" stroke="var(--border)" stroke-width="1" stroke-dasharray="4,4"/>
        <line x1="50" y1="90" x2="380" y2="90" stroke="var(--border)" stroke-width="0.5" stroke-dasharray="2,3"/>
        <line x1="50" y1="180" x2="390" y2="180" stroke="var(--border)" stroke-width="0.5" stroke-dasharray="2,3"/>

        <!-- Empty front rounded zone (ghosted) -->
        <rect x="120" y="-8" width="80" height="210" rx="10" fill="none" stroke="var(--muted)" stroke-width="1" stroke-dasharray="6,4" opacity="0.3"/>
        <text x="160" y="105" text-anchor="middle" style="font:italic 10px 'Segoe UI',sans-serif;fill:var(--muted);opacity:0.5;">EMPTY</text>
        <text x="160" y="118" text-anchor="middle" style="font:italic 9px 'Segoe UI',sans-serif;fill:var(--muted);opacity:0.5;">No front rounded</text>

        <!-- Shared vowels (amber) -->
        <circle cx="55" cy="0" r="15" fill="var(--shared-bg)" stroke="var(--shared)" stroke-width="2"/>
        <text x="55" y="5" text-anchor="middle" class="ipa" fill="var(--shared)">i&#x2D0;</text>
        <text x="55" y="20" text-anchor="middle" class="word-label" fill="var(--muted)">beat</text>

        <circle cx="365" cy="0" r="15" fill="var(--shared-bg)" stroke="var(--shared)" stroke-width="2"/>
        <text x="365" y="5" text-anchor="middle" class="ipa" fill="var(--shared)">u&#x2D0;</text>
        <text x="365" y="20" text-anchor="middle" class="word-label" fill="var(--muted)">boot</text>

        <circle cx="100" cy="180" r="13" fill="var(--shared-bg)" stroke="var(--shared)" stroke-width="1.5"/>
        <text x="100" y="185" text-anchor="middle" class="ipa" fill="var(--shared)">&#x025B;</text>

        <circle cx="380" cy="180" r="13" fill="var(--shared-bg)" stroke="var(--shared)" stroke-width="1.5"/>
        <text x="380" y="185" text-anchor="middle" class="ipa" fill="var(--shared)">&#x0254;&#x2D0;</text>

        <!-- English lax monophthongs (green) -->
        <circle cx="85" cy="30" r="13" fill="var(--english-bg)" stroke="var(--english)" stroke-width="1.5"/>
        <text x="85" y="35" text-anchor="middle" class="ipa" fill="var(--english)">&#x026A;</text>

        <circle cx="335" cy="30" r="13" fill="var(--english-bg)" stroke="var(--english)" stroke-width="1.5"/>
        <text x="335" y="35" text-anchor="middle" class="ipa" fill="var(--english)">&#x028A;</text>

        <circle cx="210" cy="130" r="14" fill="var(--english-bg)" stroke="var(--english)" stroke-width="2"/>
        <text x="210" y="135" text-anchor="middle" class="ipa" fill="var(--english)">&#x0259;</text>
        <text x="230" y="122" text-anchor="start" style="font:italic 8px 'Segoe UI',sans-serif;fill:var(--english);">dominant!</text>

        <circle cx="225" cy="170" r="12" fill="var(--english-bg)" stroke="var(--english)" stroke-width="1.5"/>
        <text x="225" y="175" text-anchor="middle" class="ipa" fill="var(--english)">&#x028C;</text>

        <circle cx="235" cy="230" r="12" fill="var(--english-bg)" stroke="var(--english)" stroke-width="1.5"/>
        <text x="235" y="235" text-anchor="middle" class="ipa" fill="var(--english)">&#xE6;</text>

        <circle cx="360" cy="260" r="12" fill="var(--english-bg)" stroke="var(--english)" stroke-width="1.5"/>
        <text x="360" y="265" text-anchor="middle" class="ipa" fill="var(--english)">&#x0251;&#x2D0;</text>

        <circle cx="240" cy="95" r="12" fill="var(--english-bg)" stroke="var(--english)" stroke-width="1.5"/>
        <text x="240" y="100" text-anchor="middle" class="ipa" fill="var(--english)">&#x025C;&#x2D0;</text>

        <!-- Diphthong arrows showing English gliding tendency -->
        <defs>
          <marker id="arrowEn" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
            <polygon points="0 0, 8 3, 0 6" fill="var(--english)"/>
          </marker>
        </defs>

        <text x="210" y="290" text-anchor="middle" style="font:bold 10px 'Segoe UI',sans-serif;fill:var(--english);">Long vowels DIPHTHONGIZE</text>

        <!-- e -> eI -->
        <path d="M 90,155 Q 85,100 80,40" fill="none" stroke="var(--english)" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowEn)"/>
        <text x="67" y="100" text-anchor="end" class="pair-label" fill="var(--english)">e&#x026A;</text>
        <text x="50" y="112" text-anchor="end" class="word-label" fill="var(--english)">bait</text>

        <!-- o -> oU -->
        <path d="M 360,155 Q 345,100 340,40" fill="none" stroke="var(--english)" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowEn)"/>
        <text x="330" y="100" text-anchor="end" class="pair-label" fill="var(--english)">&#x0259;&#x028A;</text>
        <text x="315" y="112" text-anchor="end" class="word-label" fill="var(--english)">boat</text>
      </g>

      <!-- ========== BOTTOM COMPARISON PANEL ========== -->
      <g transform="translate(0, 440)">
        <rect x="50" y="0" width="960" height="65" rx="8" fill="var(--front-rounded-bg)" stroke="var(--front-rounded)" stroke-width="1.5"/>
        <text x="530" y="22" text-anchor="middle" class="title-text" fill="var(--front-rounded)">The Front Rounded Gap</text>
        <text x="530" y="42" text-anchor="middle" class="subtitle-text" style="font-size:12px;">
          German has 4 front rounded vowels (/y&#x2D0;, &#x028F;, &#xF8;&#x2D0;, &#x0153;/) that have NO English equivalents. These arose from umlaut
        </text>
        <text x="530" y="57" text-anchor="middle" class="subtitle-text" style="font-size:12px;">
          (vowel fronting) and serve as morphological markers: Mutter &#x2192; M&#xFC;tter (plural), gro&#xDF; &#x2192; gr&#xF6;&#xDF;er (comparative)
        </text>
      </g>

      <g transform="translate(0, 520)">
        <rect x="50" y="0" width="960" height="55" rx="8" fill="var(--accent-light)" stroke="var(--accent)" stroke-width="1.5"/>
        <text x="530" y="20" text-anchor="middle" class="title-text" fill="var(--accent)">The Diphthongization Difference</text>
        <text x="530" y="40" text-anchor="middle" class="subtitle-text" style="font-size:12px;">
          German long vowels stay PURE monophthongs (e&#x2D0; = [e&#x2D0;], o&#x2D0; = [o&#x2D0;]) &#x2014; English long vowels GLIDE (e &#x2192; [e&#x026A;], o &#x2192; [&#x0259;&#x028A;]). Saying German "See" like English "say" marks a foreign accent.
        </text>
      </g>

      <g transform="translate(0, 590)">
        <rect x="50" y="0" width="960" height="55" rx="8" fill="var(--surface)" stroke="var(--border)" stroke-width="1"/>
        <text x="530" y="20" text-anchor="middle" class="title-text">Tense/Lax Pairing</text>
        <text x="530" y="40" text-anchor="middle" class="subtitle-text" style="font-size:12px;">
          German pairs are more systematic: each tense (long, peripheral) vowel has a specific lax (short, central) partner. 7 tense/lax pairs plus the special long /&#x025B;&#x2D0;/.
        </text>
      </g>
    </svg>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background:var(--shared-bg);border-color:var(--shared);"></div> Shared (approximate equivalents)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--front-rounded-bg);border-color:var(--front-rounded);"></div> German front rounded (no English equivalent)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--german-bg);border-color:var(--german);"></div> German distinctive features</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--english-bg);border-color:var(--english);"></div> English only</div>
  </div>

  <figcaption>
    <h2>Figure 1 -- German vs. English Vowel Space</h2>
    <p>German's vowel inventory is substantially larger than English's (15+ monophthongs vs. ~12), primarily because German adds three front rounded vowel pairs (/y&#x2D0;&#x2013;&#x028F;/, /&#xF8;&#x2D0;&#x2013;&#x0153;/) produced by the historical umlaut process. These occupy a region of the vowel space that is completely empty in English. The other critical difference is that German long vowels remain pure monophthongs &#x2014; /e&#x2D0;/ is [e&#x2D0;], not [e&#x026A;] &#x2014; while English systematically diphthongizes its "long" vowels. Both systems share a tense/lax distinction, but German's is more symmetrical and paired with vowel length more consistently.</p>
  </figcaption>
</figure>
</body>
</html>
