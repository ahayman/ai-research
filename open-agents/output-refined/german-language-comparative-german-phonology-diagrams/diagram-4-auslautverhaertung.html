<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auslautverh&#xE4;rtung &#x2014; Final Devoicing Process</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --accent: #4361ee;
    --accent-light: #e8edff;
    --german: #6366f1;
    --german-bg: #e0e0ff;
    --english: #22c55e;
    --english-bg: #dcfce7;
    --voiced: #3b82f6;
    --voiced-bg: #dbeafe;
    --voiceless: #ef4444;
    --voiceless-bg: #fee2e2;
    --recovery: #8b5cf6;
    --recovery-bg: #ede9fe;
    --shared: #f59e0b;
    --shared-bg: #fef3c7;
    --muted: #6c757d;
    --caption-bg: #f8f9fa;
    --filter-bg: #fef3c7;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --accent: #6b8aff;
      --accent-light: #1e2a4a;
      --german: #818cf8;
      --german-bg: #2e2a5e;
      --english: #4ade80;
      --english-bg: #14532d;
      --voiced: #60a5fa;
      --voiced-bg: #1e3a5f;
      --voiceless: #f87171;
      --voiceless-bg: #5c1a1a;
      --recovery: #a78bfa;
      --recovery-bg: #2e1a5e;
      --shared: #fbbf24;
      --shared-bg: #78350f;
      --muted: #9a9ab0;
      --caption-bg: #1a1a2e;
      --filter-bg: #3d2e0a;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure { max-width: 1100px; width: 100%; }
  .diagram-container {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.5rem 1rem;
    overflow-x: auto;
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding: 1rem 1.5rem;
    background: var(--caption-bg);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  .legend {
    display: flex; gap: 1.5rem; justify-content: center; flex-wrap: wrap;
    margin-top: 1rem; font-size: 0.82rem; color: var(--muted);
  }
  .legend-item { display: flex; align-items: center; gap: 0.4rem; }
  .legend-swatch { width: 14px; height: 14px; border-radius: 3px; border: 1px solid var(--border); }
  svg { display: block; margin: 0 auto; }
  .ipa { font: 15px 'Gentium Plus', 'Noto Sans', 'DejaVu Sans', serif; }
  .ipa-large { font: bold 18px 'Gentium Plus', 'Noto Sans', 'DejaVu Sans', serif; }
  .title-text { font: bold 14px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
  .subtitle-text { font: 11px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
  .box-text { font: 12px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
  .label-sm { font: 10px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
  .label-bold { font: bold 11px 'Segoe UI', system-ui, sans-serif; }
  .word-label { font: italic 11px 'Segoe UI', system-ui, sans-serif; }
</style>
</head>
<body>
<figure>
  <div class="diagram-container">
    <svg viewBox="0 0 1060 780" xmlns="http://www.w3.org/2000/svg" style="min-width:780px;">
      <defs>
        <marker id="arrFg" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="var(--fg)"/>
        </marker>
        <marker id="arrVoiceless" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="var(--voiceless)"/>
        </marker>
        <marker id="arrRecovery" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="var(--recovery)"/>
        </marker>
      </defs>

      <!-- Title -->
      <text x="530" y="28" text-anchor="middle" class="title-text" style="font-size:16px;">Auslautverh&#xE4;rtung: Final Devoicing and Recovery Through Inflection</text>
      <text x="530" y="46" text-anchor="middle" class="subtitle-text">All voiced obstruents become voiceless at syllable boundaries &#x2014; but inflection reveals the hidden voicing</text>

      <!-- Column Headers -->
      <g transform="translate(0, 65)">
        <text x="120" y="15" text-anchor="middle" class="label-bold" fill="var(--voiced)">UNDERLYING FORM</text>
        <text x="120" y="30" text-anchor="middle" class="label-sm" fill="var(--voiced)">(what the speaker "knows")</text>

        <text x="440" y="8" text-anchor="middle" class="label-bold" fill="var(--voiceless)">DEVOICING</text>
        <text x="440" y="22" text-anchor="middle" class="label-bold" fill="var(--voiceless)">FILTER</text>
        <text x="440" y="36" text-anchor="middle" class="label-sm" fill="var(--voiceless)">syllable-final position</text>

        <text x="680" y="15" text-anchor="middle" class="label-bold" fill="var(--voiceless)">SURFACE FORM</text>
        <text x="680" y="30" text-anchor="middle" class="label-sm" fill="var(--voiceless)">(what you hear)</text>

        <text x="920" y="15" text-anchor="middle" class="label-bold" fill="var(--recovery)">RECOVERY</text>
        <text x="920" y="30" text-anchor="middle" class="label-sm" fill="var(--recovery)">(inflection reveals voicing)</text>
      </g>

      <!-- DEVOICING FILTER (central column) -->
      <rect x="375" y="95" width="130" height="420" rx="8" fill="var(--filter-bg)" stroke="var(--shared)" stroke-width="2"/>
      <text x="440" y="120" text-anchor="middle" style="font:bold 12px 'Segoe UI',sans-serif;fill:var(--shared);">Syllable</text>
      <text x="440" y="135" text-anchor="middle" style="font:bold 12px 'Segoe UI',sans-serif;fill:var(--shared);">Coda</text>
      <text x="440" y="155" text-anchor="middle" style="font:10px 'Segoe UI',sans-serif;fill:var(--muted);">&#x2193; voicing lost &#x2193;</text>

      <!-- Row 1: Rad -->
      <g transform="translate(0, 160)">
        <!-- Underlying -->
        <rect x="30" y="0" width="180" height="55" rx="8" fill="var(--voiced-bg)" stroke="var(--voiced)" stroke-width="1.5"/>
        <text x="120" y="20" text-anchor="middle" class="ipa-large" fill="var(--voiced)">/&#x281;a&#x2D0;<tspan font-weight="bold" fill="var(--voiced)">d</tspan>/</text>
        <text x="120" y="42" text-anchor="middle" class="word-label" fill="var(--voiced)">Rad "wheel"</text>

        <!-- Arrow through filter -->
        <line x1="210" y1="28" x2="370" y2="28" stroke="var(--voiceless)" stroke-width="2" marker-end="url(#arrVoiceless)"/>
        <text x="290" y="20" text-anchor="middle" class="label-sm" fill="var(--voiceless)">d &#x2192; t</text>

        <!-- Surface -->
        <rect x="510" y="0" width="180" height="55" rx="8" fill="var(--voiceless-bg)" stroke="var(--voiceless)" stroke-width="1.5"/>
        <text x="600" y="20" text-anchor="middle" class="ipa-large" fill="var(--voiceless)">[&#x281;a&#x2D0;<tspan font-weight="bold" fill="var(--voiceless)">t</tspan>]</text>
        <text x="600" y="42" text-anchor="middle" class="word-label" fill="var(--voiceless)">sounds like "Rat"!</text>

        <!-- Recovery arrow -->
        <path d="M 690,28 Q 760,28 790,28" fill="none" stroke="var(--recovery)" stroke-width="2" marker-end="url(#arrRecovery)"/>

        <!-- Recovered -->
        <rect x="800" y="0" width="220" height="55" rx="8" fill="var(--recovery-bg)" stroke="var(--recovery)" stroke-width="1.5"/>
        <text x="910" y="20" text-anchor="middle" class="ipa-large" fill="var(--recovery)">R&#xE4;<tspan font-weight="bold" fill="var(--recovery)">d</tspan>er [&#x2C8;&#x281;&#x025B;&#x2D0;d&#x250;]</text>
        <text x="910" y="42" text-anchor="middle" class="word-label" fill="var(--recovery)">"wheels" &#x2014; /d/ returns!</text>
      </g>

      <!-- Row 2: Tag -->
      <g transform="translate(0, 235)">
        <rect x="30" y="0" width="180" height="55" rx="8" fill="var(--voiced-bg)" stroke="var(--voiced)" stroke-width="1.5"/>
        <text x="120" y="20" text-anchor="middle" class="ipa-large" fill="var(--voiced)">/ta&#x2D0;<tspan font-weight="bold" fill="var(--voiced)">&#x261;</tspan>/</text>
        <text x="120" y="42" text-anchor="middle" class="word-label" fill="var(--voiced)">Tag "day"</text>

        <line x1="210" y1="28" x2="370" y2="28" stroke="var(--voiceless)" stroke-width="2" marker-end="url(#arrVoiceless)"/>
        <text x="290" y="20" text-anchor="middle" class="label-sm" fill="var(--voiceless)">&#x261; &#x2192; k</text>

        <rect x="510" y="0" width="180" height="55" rx="8" fill="var(--voiceless-bg)" stroke="var(--voiceless)" stroke-width="1.5"/>
        <text x="600" y="20" text-anchor="middle" class="ipa-large" fill="var(--voiceless)">[ta&#x2D0;<tspan font-weight="bold" fill="var(--voiceless)">k</tspan>]</text>
        <text x="600" y="42" text-anchor="middle" class="word-label" fill="var(--voiceless)">final /&#x261;/ &#x2192; [k]</text>

        <path d="M 690,28 Q 760,28 790,28" fill="none" stroke="var(--recovery)" stroke-width="2" marker-end="url(#arrRecovery)"/>

        <rect x="800" y="0" width="220" height="55" rx="8" fill="var(--recovery-bg)" stroke="var(--recovery)" stroke-width="1.5"/>
        <text x="910" y="20" text-anchor="middle" class="ipa-large" fill="var(--recovery)">Ta<tspan font-weight="bold" fill="var(--recovery)">g</tspan>e [&#x2C8;ta&#x2D0;&#x261;&#x259;]</text>
        <text x="910" y="42" text-anchor="middle" class="word-label" fill="var(--recovery)">"days" &#x2014; /&#x261;/ returns!</text>
      </g>

      <!-- Row 3: lieb -->
      <g transform="translate(0, 310)">
        <rect x="30" y="0" width="180" height="55" rx="8" fill="var(--voiced-bg)" stroke="var(--voiced)" stroke-width="1.5"/>
        <text x="120" y="20" text-anchor="middle" class="ipa-large" fill="var(--voiced)">/li&#x2D0;<tspan font-weight="bold" fill="var(--voiced)">b</tspan>/</text>
        <text x="120" y="42" text-anchor="middle" class="word-label" fill="var(--voiced)">lieb "dear"</text>

        <line x1="210" y1="28" x2="370" y2="28" stroke="var(--voiceless)" stroke-width="2" marker-end="url(#arrVoiceless)"/>
        <text x="290" y="20" text-anchor="middle" class="label-sm" fill="var(--voiceless)">b &#x2192; p</text>

        <rect x="510" y="0" width="180" height="55" rx="8" fill="var(--voiceless-bg)" stroke="var(--voiceless)" stroke-width="1.5"/>
        <text x="600" y="20" text-anchor="middle" class="ipa-large" fill="var(--voiceless)">[li&#x2D0;<tspan font-weight="bold" fill="var(--voiceless)">p</tspan>]</text>
        <text x="600" y="42" text-anchor="middle" class="word-label" fill="var(--voiceless)">final /b/ &#x2192; [p]</text>

        <path d="M 690,28 Q 760,28 790,28" fill="none" stroke="var(--recovery)" stroke-width="2" marker-end="url(#arrRecovery)"/>

        <rect x="800" y="0" width="220" height="55" rx="8" fill="var(--recovery-bg)" stroke="var(--recovery)" stroke-width="1.5"/>
        <text x="910" y="20" text-anchor="middle" class="ipa-large" fill="var(--recovery)">lie<tspan font-weight="bold" fill="var(--recovery)">b</tspan>e [&#x2C8;li&#x2D0;b&#x259;]</text>
        <text x="910" y="42" text-anchor="middle" class="word-label" fill="var(--recovery)">"dear" (infl.) &#x2014; /b/ returns!</text>
      </g>

      <!-- Row 4: Hund -->
      <g transform="translate(0, 385)">
        <rect x="30" y="0" width="180" height="55" rx="8" fill="var(--voiced-bg)" stroke="var(--voiced)" stroke-width="1.5"/>
        <text x="120" y="20" text-anchor="middle" class="ipa-large" fill="var(--voiced)">/h&#x028A;n<tspan font-weight="bold" fill="var(--voiced)">d</tspan>/</text>
        <text x="120" y="42" text-anchor="middle" class="word-label" fill="var(--voiced)">Hund "dog"</text>

        <line x1="210" y1="28" x2="370" y2="28" stroke="var(--voiceless)" stroke-width="2" marker-end="url(#arrVoiceless)"/>
        <text x="290" y="20" text-anchor="middle" class="label-sm" fill="var(--voiceless)">d &#x2192; t</text>

        <rect x="510" y="0" width="180" height="55" rx="8" fill="var(--voiceless-bg)" stroke="var(--voiceless)" stroke-width="1.5"/>
        <text x="600" y="20" text-anchor="middle" class="ipa-large" fill="var(--voiceless)">[h&#x028A;n<tspan font-weight="bold" fill="var(--voiceless)">t</tspan>]</text>
        <text x="600" y="42" text-anchor="middle" class="word-label" fill="var(--voiceless)">final /d/ &#x2192; [t]</text>

        <path d="M 690,28 Q 760,28 790,28" fill="none" stroke="var(--recovery)" stroke-width="2" marker-end="url(#arrRecovery)"/>

        <rect x="800" y="0" width="220" height="55" rx="8" fill="var(--recovery-bg)" stroke="var(--recovery)" stroke-width="1.5"/>
        <text x="910" y="20" text-anchor="middle" class="ipa-large" fill="var(--recovery)">Hun<tspan font-weight="bold" fill="var(--recovery)">d</tspan>e [&#x2C8;h&#x028A;nd&#x259;]</text>
        <text x="910" y="42" text-anchor="middle" class="word-label" fill="var(--recovery)">"dogs" &#x2014; /d/ returns!</text>
      </g>

      <!-- Neutralization illustration -->
      <g transform="translate(0, 470)">
        <rect x="425" y="0" width="270" height="75" rx="8" fill="var(--voiceless-bg)" stroke="var(--voiceless)" stroke-width="2"/>
        <text x="560" y="18" text-anchor="middle" class="label-bold" fill="var(--voiceless)">NEUTRALIZATION</text>
        <text x="560" y="38" text-anchor="middle" class="ipa" fill="var(--fg)">Rad /d/ &#x2192; [&#x281;a&#x2D0;t]</text>
        <text x="560" y="55" text-anchor="middle" class="ipa" fill="var(--fg)">Rat /t/ &#x2192; [&#x281;a&#x2D0;t]</text>
        <text x="560" y="70" text-anchor="middle" class="label-sm" fill="var(--voiceless)">&#x2191; Homophones in isolation &#x2191;</text>
      </g>

      <!-- ===== ENGLISH COMPARISON ===== -->
      <g transform="translate(0, 570)">
        <rect x="50" y="0" width="960" height="90" rx="8" fill="var(--english-bg)" stroke="var(--english)" stroke-width="1.5"/>
        <text x="530" y="22" text-anchor="middle" class="title-text" fill="var(--english)">English: NO Final Devoicing</text>
        <text x="530" y="45" text-anchor="middle" class="subtitle-text" style="font-size:12px;">
          English maintains voicing contrasts word-finally &#x2014; these are NEVER homophones:
        </text>
        <text x="530" y="68" text-anchor="middle" class="ipa" style="font-size:14px;" fill="var(--fg)">
          ba<tspan fill="var(--english)" font-weight="bold">d</tspan> &#x2260; ba<tspan fill="var(--english)" font-weight="bold">t</tspan>   &#x2022;   ba<tspan fill="var(--english)" font-weight="bold">g</tspan> &#x2260; ba<tspan fill="var(--english)" font-weight="bold">ck</tspan>   &#x2022;   ri<tspan fill="var(--english)" font-weight="bold">b</tspan> &#x2260; ri<tspan fill="var(--english)" font-weight="bold">p</tspan>   &#x2022;   bu<tspan fill="var(--english)" font-weight="bold">zz</tspan> &#x2260; bu<tspan fill="var(--english)" font-weight="bold">s</tspan>
        </text>
        <text x="530" y="84" text-anchor="middle" class="label-sm">English uses vowel length + aspiration to maintain final contrasts, not voicing alone</text>
      </g>

      <!-- Rule summary -->
      <g transform="translate(0, 680)">
        <rect x="50" y="0" width="960" height="75" rx="8" fill="var(--accent-light)" stroke="var(--accent)" stroke-width="1.5"/>
        <text x="530" y="22" text-anchor="middle" class="title-text" fill="var(--accent)">The Pattern Learner's Key Insight</text>
        <text x="530" y="45" text-anchor="middle" class="subtitle-text" style="font-size:12px;">
          German spelling preserves the underlying voiced consonant (Rad, not *Rat for "wheel") &#x2014; spelling is MORE informative than pronunciation.
        </text>
        <text x="530" y="65" text-anchor="middle" class="subtitle-text" style="font-size:12px;">
          To discover underlying voicing, add a vowel suffix: if the consonant "comes alive" as voiced, it was underlyingly voiced all along.
        </text>
      </g>
    </svg>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background:var(--voiced-bg);border-color:var(--voiced);"></div> Underlying voiced obstruent</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--voiceless-bg);border-color:var(--voiceless);"></div> Surface voiceless (devoiced)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--recovery-bg);border-color:var(--recovery);"></div> Recovery through inflection</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--english-bg);border-color:var(--english);"></div> English (no devoicing)</div>
  </div>

  <figcaption>
    <h2>Figure 4 -- Auslautverh&#xE4;rtung: Final Devoicing and Recovery</h2>
    <p>German systematically devoices all voiced obstruents (/b, d, &#x261;, v, z/) in syllable-final position &#x2014; Rad "wheel" and Rat "advice" become homophones as [&#x281;a&#x2D0;t]. This is not a speaker limitation but an automatic phonological rule (analogous to English aspiration). The underlying voicing is fully recoverable: adding a vowel suffix moves the consonant out of coda position, and voicing returns (R&#xE4;der [d], Tage [&#x261;], liebe [b]). English, by contrast, never devoices final obstruents &#x2014; "bad" and "bat" remain distinct. This difference is a major source of interference for learners in both directions.</p>
  </figcaption>
</figure>
</body>
</html>
