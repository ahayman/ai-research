<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>High German Consonant Shift Correspondence Chart</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --accent: #4361ee;
    --accent-light: #e8edff;
    --p-color: #3b82f6;
    --p-bg: #dbeafe;
    --t-color: #22c55e;
    --t-bg: #dcfce7;
    --k-color: #ef4444;
    --k-bg: #fee2e2;
    --shared: #f59e0b;
    --shared-bg: #fef3c7;
    --german: #6366f1;
    --german-bg: #e0e0ff;
    --muted: #6c757d;
    --caption-bg: #f8f9fa;
    --header-bg: #f1f5f9;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --accent: #6b8aff;
      --accent-light: #1e2a4a;
      --p-color: #60a5fa;
      --p-bg: #1e3a5f;
      --t-color: #4ade80;
      --t-bg: #14532d;
      --k-color: #f87171;
      --k-bg: #5c1a1a;
      --shared: #fbbf24;
      --shared-bg: #78350f;
      --german: #818cf8;
      --german-bg: #2e2a5e;
      --muted: #9a9ab0;
      --caption-bg: #1a1a2e;
      --header-bg: #1a1a30;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure { max-width: 1100px; width: 100%; }
  .diagram-container {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.5rem 1rem;
    overflow-x: auto;
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding: 1rem 1.5rem;
    background: var(--caption-bg);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  .legend {
    display: flex; gap: 1.5rem; justify-content: center; flex-wrap: wrap;
    margin-top: 1rem; font-size: 0.82rem; color: var(--muted);
  }
  .legend-item { display: flex; align-items: center; gap: 0.4rem; }
  .legend-swatch { width: 14px; height: 14px; border-radius: 3px; border: 1px solid var(--border); }
  h3 {
    text-align: center;
    font-size: 1rem;
    margin-bottom: 0.3rem;
    color: var(--accent);
  }
  .subtitle {
    text-align: center;
    font-size: 0.82rem;
    color: var(--muted);
    margin-bottom: 1.2rem;
  }

  .shift-section {
    margin-bottom: 1.5rem;
    border-radius: 10px;
    overflow: hidden;
    border: 2px solid var(--border);
  }
  .shift-header {
    padding: 0.6rem 1rem;
    display: flex;
    align-items: center;
    gap: 0.8rem;
  }
  .shift-header .shift-symbol {
    font: bold 22px 'Gentium Plus', 'Noto Sans', serif;
    min-width: 80px;
    text-align: center;
  }
  .shift-header .shift-label {
    font-size: 0.9rem;
    font-weight: 600;
  }
  .shift-header .shift-desc {
    font-size: 0.78rem;
    color: var(--muted);
    margin-left: auto;
  }

  .cognate-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
  }
  .cognate-col {
    padding: 0.5rem 0.8rem;
    border-top: 1px solid var(--border);
  }
  .cognate-col:nth-child(odd) {
    border-right: 1px solid var(--border);
  }
  .cognate-col h5 {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--muted);
    margin-bottom: 0.3rem;
  }
  .pair-row {
    display: flex;
    align-items: baseline;
    gap: 0.5rem;
    margin-bottom: 0.25rem;
    font-size: 0.88rem;
  }
  .en-word {
    font-weight: 600;
    min-width: 80px;
  }
  .arrow-sep {
    color: var(--muted);
    font-size: 0.8rem;
  }
  .de-word {
    font-weight: 600;
  }
  .ipa-hint {
    font: italic 0.75rem 'Gentium Plus', 'Noto Sans', serif;
    color: var(--muted);
  }

  .howto-box {
    margin-top: 1.5rem;
    padding: 1rem 1.2rem;
    border-radius: 8px;
    border: 2px solid var(--shared);
    background: var(--shared-bg);
  }
  .howto-box h4 {
    font-size: 0.9rem;
    color: var(--shared);
    margin-bottom: 0.5rem;
  }
  .howto-box p {
    font-size: 0.82rem;
    color: var(--muted);
    margin-bottom: 0.3rem;
  }
  .howto-box .example {
    font-size: 0.88rem;
    color: var(--fg);
    font-weight: 500;
  }
</style>
</head>
<body>
<figure>
  <div class="diagram-container">
    <h3>The High German Consonant Shift &#x2014; A Decoder Ring for Cognates</h3>
    <p class="subtitle">Three systematic sound changes (5th&#x2013;8th century) created predictable English &#x2194; German correspondences. English preserved the older sounds.</p>

    <!-- ===== P-SHIFT ===== -->
    <div class="shift-section" style="border-color:var(--p-color);">
      <div class="shift-header" style="background:var(--p-bg);">
        <span class="shift-symbol" style="color:var(--p-color);">p &#x2192; pf / f</span>
        <span class="shift-label" style="color:var(--p-color);">The P-Shift</span>
        <span class="shift-desc">Word-initial/post-consonant &#x2192; pf &nbsp;|&nbsp; Between vowels &#x2192; ff/f</span>
      </div>
      <div class="cognate-grid">
        <div class="cognate-col" style="background:var(--p-bg);">
          <h5>Initial / post-consonant: p &#x2192; pf</h5>
          <div class="pair-row"><span class="en-word">pound</span><span class="arrow-sep">&#x2192;</span><span class="de-word" style="color:var(--p-color);">Pfund</span></div>
          <div class="pair-row"><span class="en-word">path</span><span class="arrow-sep">&#x2192;</span><span class="de-word" style="color:var(--p-color);">Pfad</span></div>
          <div class="pair-row"><span class="en-word">plant</span><span class="arrow-sep">&#x2192;</span><span class="de-word" style="color:var(--p-color);">Pflanze</span></div>
          <div class="pair-row"><span class="en-word">pepper</span><span class="arrow-sep">&#x2192;</span><span class="de-word" style="color:var(--p-color);">Pfeffer</span></div>
          <div class="pair-row"><span class="en-word">plum</span><span class="arrow-sep">&#x2192;</span><span class="de-word" style="color:var(--p-color);">Pflaume</span></div>
          <div class="pair-row"><span class="en-word">apple</span><span class="arrow-sep">&#x2192;</span><span class="de-word" style="color:var(--p-color);">Apfel</span></div>
        </div>
        <div class="cognate-col">
          <h5>Between vowels: p &#x2192; ff / f</h5>
          <div class="pair-row"><span class="en-word">open</span><span class="arrow-sep">&#x2192;</span><span class="de-word" style="color:var(--p-color);">offen</span></div>
          <div class="pair-row"><span class="en-word">hope</span><span class="arrow-sep">&#x2192;</span><span class="de-word" style="color:var(--p-color);">hoffen</span></div>
          <div class="pair-row"><span class="en-word">sleep</span><span class="arrow-sep">&#x2192;</span><span class="de-word" style="color:var(--p-color);">schlafen</span></div>
          <div class="pair-row"><span class="en-word">ship</span><span class="arrow-sep">&#x2192;</span><span class="de-word" style="color:var(--p-color);">Schiff</span></div>
          <div class="pair-row"><span class="en-word">grip</span><span class="arrow-sep">&#x2192;</span><span class="de-word" style="color:var(--p-color);">greifen</span></div>
        </div>
      </div>
    </div>

    <!-- ===== T-SHIFT ===== -->
    <div class="shift-section" style="border-color:var(--t-color);">
      <div class="shift-header" style="background:var(--t-bg);">
        <span class="shift-symbol" style="color:var(--t-color);">t &#x2192; z / ss</span>
        <span class="shift-label" style="color:var(--t-color);">The T-Shift</span>
        <span class="shift-desc">Word-initial &#x2192; z [ts] &nbsp;|&nbsp; Between vowels / word-final &#x2192; ss / &#xDF;</span>
      </div>
      <div class="cognate-grid">
        <div class="cognate-col" style="background:var(--t-bg);">
          <h5>Initial: t &#x2192; z [ts]</h5>
          <div class="pair-row"><span class="en-word">ten</span><span class="arrow-sep">&#x2192;</span><span class="de-word" style="color:var(--t-color);">zehn</span></div>
          <div class="pair-row"><span class="en-word">tongue</span><span class="arrow-sep">&#x2192;</span><span class="de-word" style="color:var(--t-color);">Zunge</span></div>
          <div class="pair-row"><span class="en-word">to</span><span class="arrow-sep">&#x2192;</span><span class="de-word" style="color:var(--t-color);">zu</span></div>
          <div class="pair-row"><span class="en-word">two</span><span class="arrow-sep">&#x2192;</span><span class="de-word" style="color:var(--t-color);">zwei</span></div>
          <div class="pair-row"><span class="en-word">tooth</span><span class="arrow-sep">&#x2192;</span><span class="de-word" style="color:var(--t-color);">Zahn</span></div>
          <div class="pair-row"><span class="en-word">tin</span><span class="arrow-sep">&#x2192;</span><span class="de-word" style="color:var(--t-color);">Zinn</span></div>
          <div class="pair-row"><span class="en-word">tale/number</span><span class="arrow-sep">&#x2192;</span><span class="de-word" style="color:var(--t-color);">Zahl</span></div>
        </div>
        <div class="cognate-col">
          <h5>Between vowels / final: t &#x2192; ss / &#xDF;</h5>
          <div class="pair-row"><span class="en-word">water</span><span class="arrow-sep">&#x2192;</span><span class="de-word" style="color:var(--t-color);">Wasser</span></div>
          <div class="pair-row"><span class="en-word">eat</span><span class="arrow-sep">&#x2192;</span><span class="de-word" style="color:var(--t-color);">essen</span></div>
          <div class="pair-row"><span class="en-word">white</span><span class="arrow-sep">&#x2192;</span><span class="de-word" style="color:var(--t-color);">wei&#xDF;</span></div>
          <div class="pair-row"><span class="en-word">better</span><span class="arrow-sep">&#x2192;</span><span class="de-word" style="color:var(--t-color);">besser</span></div>
          <div class="pair-row"><span class="en-word">that</span><span class="arrow-sep">&#x2192;</span><span class="de-word" style="color:var(--t-color);">das</span></div>
          <div class="pair-row"><span class="en-word">what</span><span class="arrow-sep">&#x2192;</span><span class="de-word" style="color:var(--t-color);">was</span></div>
          <div class="pair-row"><span class="en-word">out</span><span class="arrow-sep">&#x2192;</span><span class="de-word" style="color:var(--t-color);">aus</span></div>
        </div>
      </div>
    </div>

    <!-- ===== K-SHIFT ===== -->
    <div class="shift-section" style="border-color:var(--k-color);">
      <div class="shift-header" style="background:var(--k-bg);">
        <span class="shift-symbol" style="color:var(--k-color);">k &#x2192; ch</span>
        <span class="shift-label" style="color:var(--k-color);">The K-Shift</span>
        <span class="shift-desc">Between vowels / word-finally &#x2192; ch [x/&#xE7;]</span>
      </div>
      <div class="cognate-grid">
        <div class="cognate-col" style="background:var(--k-bg);">
          <h5>Intervocalic: k &#x2192; ch</h5>
          <div class="pair-row"><span class="en-word">make</span><span class="arrow-sep">&#x2192;</span><span class="de-word" style="color:var(--k-color);">machen</span></div>
          <div class="pair-row"><span class="en-word">break</span><span class="arrow-sep">&#x2192;</span><span class="de-word" style="color:var(--k-color);">brechen</span></div>
          <div class="pair-row"><span class="en-word">speak</span><span class="arrow-sep">&#x2192;</span><span class="de-word" style="color:var(--k-color);">sprechen</span></div>
          <div class="pair-row"><span class="en-word">seek</span><span class="arrow-sep">&#x2192;</span><span class="de-word" style="color:var(--k-color);">suchen</span></div>
          <div class="pair-row"><span class="en-word">week</span><span class="arrow-sep">&#x2192;</span><span class="de-word" style="color:var(--k-color);">Woche</span></div>
        </div>
        <div class="cognate-col">
          <h5>Word-final: k &#x2192; ch</h5>
          <div class="pair-row"><span class="en-word">book</span><span class="arrow-sep">&#x2192;</span><span class="de-word" style="color:var(--k-color);">Buch</span></div>
          <div class="pair-row"><span class="en-word">like</span><span class="arrow-sep">&#x2192;</span><span class="de-word" style="color:var(--k-color);">gleich</span></div>
          <div class="pair-row"><span class="en-word">thatch</span><span class="arrow-sep">&#x2192;</span><span class="de-word" style="color:var(--k-color);">Dach</span></div>
          <div class="pair-row"><span class="en-word">wake (adj.)</span><span class="arrow-sep">&#x2192;</span><span class="de-word" style="color:var(--k-color);">wach</span></div>
          <div class="pair-row"><span class="en-word">cake</span><span class="arrow-sep">&#x2192;</span><span class="de-word" style="color:var(--k-color);">Kuchen</span></div>
        </div>
      </div>
    </div>

    <!-- HOW TO USE BOX -->
    <div class="howto-box">
      <h4>&#x1F50D; How to Decode: Reverse the Shift</h4>
      <p>When you see an unfamiliar German word, reverse the consonant shift to guess the English cognate:</p>
      <p class="example" style="margin-top:0.5rem;">
        &#x2022; See <strong>Pf-</strong>? Try <strong>P-</strong>: <em>Pfeffer</em> &#x2192; <em>pepper</em> &nbsp;|&nbsp;
        &#x2022; See <strong>Z-</strong> [ts]? Try <strong>T-</strong>: <em>Zahn</em> &#x2192; <em>tooth</em> (&#x2192; dental)
      </p>
      <p class="example">
        &#x2022; See <strong>-ss-/-&#xDF;-</strong>? Try <strong>-t-</strong>: <em>Wasser</em> &#x2192; <em>water</em> &nbsp;|&nbsp;
        &#x2022; See <strong>-ch-</strong>? Try <strong>-k-</strong>: <em>machen</em> &#x2192; <em>make</em>
      </p>
      <p style="margin-top:0.5rem;font-style:italic;">
        The shift did NOT affect Low German (northern Germany), which retains sounds closer to English and Dutch.
        The Benrath Line (maken/machen isogloss) marks the geographic boundary.
      </p>
    </div>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background:var(--p-bg);border-color:var(--p-color);"></div> P-Shift: p &#x2192; pf / ff</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--t-bg);border-color:var(--t-color);"></div> T-Shift: t &#x2192; z [ts] / ss</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--k-bg);border-color:var(--k-color);"></div> K-Shift: k &#x2192; ch [x/&#xE7;]</div>
  </div>

  <figcaption>
    <h2>Figure 5 -- The High German Consonant Shift: Sound Correspondence Chart</h2>
    <p>The High German Consonant Shift (5th&#x2013;8th century CE) systematically changed Proto-Germanic voiceless stops into affricates and fricatives, creating the most important set of cognate correspondences between English and German. The shift produced affricates (/pf/, /ts/) in word-initial and post-consonant positions, and fricatives (/ff/, /ss/, /ch/) between vowels. Each of the three major shifts (P, T, K) is conditioned by position in the word, creating a predictable decoder ring: English p &#x2194; German pf/f, English t &#x2194; German z/ss, English k &#x2194; German ch. This is not merely historical trivia &#x2014; it is a practical vocabulary tool that unlocks thousands of cognate pairs.</p>
  </figcaption>
</figure>
