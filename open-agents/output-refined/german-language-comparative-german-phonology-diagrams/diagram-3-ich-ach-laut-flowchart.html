<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ich-Laut / Ach-Laut Decision Flowchart</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --accent: #4361ee;
    --accent-light: #e8edff;
    --german: #6366f1;
    --german-bg: #e0e0ff;
    --ich: #3b82f6;
    --ich-bg: #dbeafe;
    --ach: #ef4444;
    --ach-bg: #fee2e2;
    --shared: #f59e0b;
    --shared-bg: #fef3c7;
    --muted: #6c757d;
    --caption-bg: #f8f9fa;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --accent: #6b8aff;
      --accent-light: #1e2a4a;
      --german: #818cf8;
      --german-bg: #2e2a5e;
      --ich: #60a5fa;
      --ich-bg: #1e3a5f;
      --ach: #f87171;
      --ach-bg: #5c1a1a;
      --shared: #fbbf24;
      --shared-bg: #78350f;
      --muted: #9a9ab0;
      --caption-bg: #1a1a2e;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure { max-width: 1100px; width: 100%; }
  .diagram-container {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.5rem 1rem;
    overflow-x: auto;
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding: 1rem 1.5rem;
    background: var(--caption-bg);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  .legend {
    display: flex; gap: 1.5rem; justify-content: center; flex-wrap: wrap;
    margin-top: 1rem; font-size: 0.82rem; color: var(--muted);
  }
  .legend-item { display: flex; align-items: center; gap: 0.4rem; }
  .legend-swatch { width: 14px; height: 14px; border-radius: 3px; border: 1px solid var(--border); }
  svg { display: block; margin: 0 auto; }
  .ipa { font: 15px 'Gentium Plus', 'Noto Sans', 'DejaVu Sans', serif; }
  .ipa-large { font: bold 20px 'Gentium Plus', 'Noto Sans', 'DejaVu Sans', serif; }
  .title-text { font: bold 14px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
  .subtitle-text { font: 11px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
  .box-text { font: 12px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
  .label-sm { font: 10px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
  .label-bold { font: bold 11px 'Segoe UI', system-ui, sans-serif; }
</style>
</head>
<body>
<figure>
  <div class="diagram-container">
    <svg viewBox="0 0 1060 760" xmlns="http://www.w3.org/2000/svg" style="min-width:780px;">
      <defs>
        <marker id="arrIch" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="var(--ich)"/>
        </marker>
        <marker id="arrAch" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="var(--ach)"/>
        </marker>
        <marker id="arrFg" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="var(--fg)"/>
        </marker>
        <marker id="arrGerman" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="var(--german)"/>
        </marker>
      </defs>

      <!-- Title -->
      <text x="530" y="28" text-anchor="middle" class="title-text" style="font-size:16px;">The Ich-Laut / Ach-Laut Rule: An Exceptionless Allophonic Distribution</text>
      <text x="530" y="46" text-anchor="middle" class="subtitle-text">One phoneme /&#xE7;/, two surface sounds [&#xE7;] and [x], 100% predictable from the preceding vowel</text>

      <!-- START NODE -->
      <g transform="translate(0, 60)">
        <rect x="400" y="0" width="260" height="48" rx="24" fill="var(--german-bg)" stroke="var(--german)" stroke-width="2"/>
        <text x="530" y="20" text-anchor="middle" class="box-text" style="font-weight:bold;" fill="var(--german)">Phoneme /&#xE7;/ occurs</text>
        <text x="530" y="37" text-anchor="middle" class="label-sm" fill="var(--german)">written &#x27E8;ch&#x27E9; in spelling</text>

        <!-- Arrow down -->
        <line x1="530" y1="48" x2="530" y2="85" stroke="var(--fg)" stroke-width="1.5" marker-end="url(#arrFg)"/>

        <!-- DECISION DIAMOND -->
        <polygon points="530,90 660,145 530,200 400,145" fill="var(--surface)" stroke="var(--fg)" stroke-width="2"/>
        <text x="530" y="138" text-anchor="middle" class="box-text" style="font-weight:bold;">What sound</text>
        <text x="530" y="155" text-anchor="middle" class="box-text" style="font-weight:bold;">precedes?</text>

        <!-- ===== ICH-LAUT BRANCH (left) ===== -->
        <line x1="400" y1="145" x2="200" y2="145" stroke="var(--ich)" stroke-width="2" marker-end="url(#arrIch)"/>

        <!-- Ich-Laut result box -->
        <rect x="40" y="115" width="160" height="60" rx="10" fill="var(--ich-bg)" stroke="var(--ich)" stroke-width="2.5"/>
        <text x="120" y="140" text-anchor="middle" class="ipa-large" fill="var(--ich)">[&#xE7;]</text>
        <text x="120" y="163" text-anchor="middle" class="label-bold" fill="var(--ich)">ICH-LAUT</text>

        <!-- ===== ACH-LAUT BRANCH (right) ===== -->
        <line x1="660" y1="145" x2="860" y2="145" stroke="var(--ach)" stroke-width="2" marker-end="url(#arrAch)"/>

        <!-- Ach-Laut result box -->
        <rect x="860" y="115" width="160" height="60" rx="10" fill="var(--ach-bg)" stroke="var(--ach)" stroke-width="2.5"/>
        <text x="940" y="140" text-anchor="middle" class="ipa-large" fill="var(--ach)">[x]</text>
        <text x="940" y="163" text-anchor="middle" class="label-bold" fill="var(--ach)">ACH-LAUT</text>

        <!-- ===== ICH conditions (descending from left box) ===== -->
        <!-- Front vowels -->
        <line x1="120" y1="175" x2="120" y2="210" stroke="var(--ich)" stroke-width="1.5" marker-end="url(#arrIch)"/>

        <rect x="10" y="210" width="220" height="78" rx="8" fill="var(--ich-bg)" stroke="var(--ich)" stroke-width="1.5"/>
        <text x="120" y="230" text-anchor="middle" class="label-bold" fill="var(--ich)">After FRONT vowels</text>
        <text x="120" y="248" text-anchor="middle" class="ipa" fill="var(--fg)">i, &#x026A;, e, &#x025B;, y, &#x028F;, &#xF8;, &#x0153;, &#x025B;&#x2D0;</text>
        <text x="120" y="266" text-anchor="middle" class="label-sm">Also after diphthongs /a&#x026A;/ and /&#x254;&#x028F;/</text>
        <text x="120" y="280" text-anchor="middle" class="ipa" style="font-size:12px;" fill="var(--ich)">ich [&#x026A;&#xE7;] &#x2022; Licht [l&#x026A;&#xE7;t] &#x2022; B&#xFC;cher [&#x2C8;by&#x2D0;&#xE7;&#x250;]</text>

        <!-- After consonants -->
        <line x1="120" y1="288" x2="120" y2="310" stroke="var(--ich)" stroke-width="1.5" marker-end="url(#arrIch)"/>

        <rect x="10" y="310" width="220" height="56" rx="8" fill="var(--ich-bg)" stroke="var(--ich)" stroke-width="1.5"/>
        <text x="120" y="330" text-anchor="middle" class="label-bold" fill="var(--ich)">After CONSONANTS</text>
        <text x="120" y="348" text-anchor="middle" class="ipa" fill="var(--fg)">/l, n, r/</text>
        <text x="120" y="362" text-anchor="middle" class="ipa" style="font-size:12px;" fill="var(--ich)">Milch [m&#x026A;l&#xE7;] &#x2022; manchmal [&#x2C8;man&#xE7;ma&#x2D0;l]</text>

        <!-- Word-initial / diminutive -->
        <line x1="120" y1="366" x2="120" y2="388" stroke="var(--ich)" stroke-width="1.5" marker-end="url(#arrIch)"/>

        <rect x="10" y="388" width="220" height="64" rx="8" fill="var(--ich-bg)" stroke="var(--ich)" stroke-width="1.5"/>
        <text x="120" y="408" text-anchor="middle" class="label-bold" fill="var(--ich)">Word-INITIAL / -chen</text>
        <text x="120" y="426" text-anchor="middle" class="label-sm">Before front vowels at word start</text>
        <text x="120" y="444" text-anchor="middle" class="ipa" style="font-size:12px;" fill="var(--ich)">Chemie [&#xE7;e&#x2C8;mi&#x2D0;] &#x2022; M&#xE4;dchen [&#x2C8;m&#x025B;&#x2D0;t&#xE7;&#x259;n]</text>

        <!-- ===== ACH conditions (descending from right box) ===== -->
        <line x1="940" y1="175" x2="940" y2="210" stroke="var(--ach)" stroke-width="1.5" marker-end="url(#arrAch)"/>

        <rect x="830" y="210" width="220" height="78" rx="8" fill="var(--ach-bg)" stroke="var(--ach)" stroke-width="1.5"/>
        <text x="940" y="230" text-anchor="middle" class="label-bold" fill="var(--ach)">After BACK vowels</text>
        <text x="940" y="248" text-anchor="middle" class="ipa" fill="var(--fg)">a, a&#x2D0;, o, &#x254;, u, &#x028A;</text>
        <text x="940" y="266" text-anchor="middle" class="label-sm">Also after diphthong /a&#x028A;/</text>
        <text x="940" y="280" text-anchor="middle" class="ipa" style="font-size:12px;" fill="var(--ach)">ach [ax] &#x2022; Buch [bu&#x2D0;x] &#x2022; Nacht [naxt]</text>

        <!-- "That's it" label -->
        <rect x="830" y="310" width="220" height="40" rx="8" fill="var(--ach-bg)" stroke="var(--ach)" stroke-width="1" stroke-dasharray="4,3"/>
        <text x="940" y="335" text-anchor="middle" class="label-sm" fill="var(--ach)">Only ONE conditioning environment</text>
      </g>

      <!-- ===== MORPHOLOGY OVERRIDE PANEL ===== -->
      <g transform="translate(0, 530)">
        <rect x="250" y="0" width="560" height="100" rx="10" fill="var(--german-bg)" stroke="var(--german)" stroke-width="2"/>
        <text x="530" y="22" text-anchor="middle" class="title-text" fill="var(--german)">Morphology Triggers Automatic Switching</text>
        <text x="530" y="42" text-anchor="middle" class="subtitle-text">When umlaut changes the vowel, the consonant follows automatically</text>

        <!-- Buch -> Bucher example -->
        <text x="340" y="68" text-anchor="middle" class="ipa" style="font-size:16px;" fill="var(--ach)">Buch [bu&#x2D0;x]</text>
        <text x="340" y="88" text-anchor="middle" class="label-sm" fill="var(--ach)">back /u&#x2D0;/ &#x2192; [x]</text>

        <line x1="410" y1="72" x2="520" y2="72" stroke="var(--german)" stroke-width="2" marker-end="url(#arrGerman)"/>
        <text x="465" y="65" text-anchor="middle" class="label-bold" fill="var(--german)">UMLAUT</text>

        <text x="630" y="68" text-anchor="middle" class="ipa" style="font-size:16px;" fill="var(--ich)">B&#xFC;cher [&#x2C8;by&#x2D0;&#xE7;&#x250;]</text>
        <text x="630" y="88" text-anchor="middle" class="label-sm" fill="var(--ich)">front /y&#x2D0;/ &#x2192; [&#xE7;]</text>
      </g>

      <!-- ===== ZERO EXCEPTIONS BADGE ===== -->
      <g transform="translate(0, 650)">
        <rect x="280" y="0" width="500" height="50" rx="25" fill="var(--shared-bg)" stroke="var(--shared)" stroke-width="2"/>
        <text x="530" y="22" text-anchor="middle" style="font:bold 14px 'Segoe UI',sans-serif;fill:var(--shared);">ZERO EXCEPTIONS in Standard German</text>
        <text x="530" y="40" text-anchor="middle" class="subtitle-text">This is a textbook case of complementary distribution &#x2014; [&#xE7;] and [x] NEVER appear in the same environment</text>
      </g>

      <!-- ===== English comparison note ===== -->
      <g transform="translate(0, 710)">
        <text x="530" y="15" text-anchor="middle" class="label-sm">English lacks both [&#xE7;] and [x] (except Scottish /x/ in "loch"). English speakers typically substitute [k] or [&#x283;] for [&#xE7;], and [k] for [x].</text>
      </g>
    </svg>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background:var(--ich-bg);border-color:var(--ich);"></div> Ich-Laut [&#xE7;] (palatal fricative)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--ach-bg);border-color:var(--ach);"></div> Ach-Laut [x] (velar fricative)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--german-bg);border-color:var(--german);"></div> Underlying phoneme /&#xE7;/</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--shared-bg);border-color:var(--shared);"></div> Key principle</div>
  </div>

  <figcaption>
    <h2>Figure 3 -- The Ich-Laut / Ach-Laut Decision Flowchart</h2>
    <p>German has a single underlying phoneme /&#xE7;/ (written &#x27E8;ch&#x27E9;) that surfaces as two different sounds depending entirely on the preceding vowel. After front vowels (i, e, &#xFC;, &#xF6;, etc.), consonants, and in word-initial position, it is pronounced as the palatal fricative [&#xE7;] (the "ich-Laut"). After back vowels (a, o, u) and the diphthong /a&#x028A;/, it becomes the velar fricative [x] (the "ach-Laut"). This rule has zero exceptions in Standard German &#x2014; a perfect case of complementary distribution. When umlaut changes a back vowel to a front vowel (as in Buch &#x2192; B&#xFC;cher), the consonant switches automatically.</p>
  </figcaption>
</figure>
</body>
</html>
