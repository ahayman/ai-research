<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consonant Inventory Comparison: German vs. English</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --accent: #4361ee;
    --accent-light: #e8edff;
    --german: #6366f1;
    --german-bg: #e0e0ff;
    --english: #22c55e;
    --english-bg: #dcfce7;
    --shared: #f59e0b;
    --shared-bg: #fef9e8;
    --muted: #6c757d;
    --caption-bg: #f8f9fa;
    --cell-shared: #fef9e8;
    --cell-german: #ede9fe;
    --cell-english: #dcfce7;
    --header-bg: #f1f5f9;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --accent: #6b8aff;
      --accent-light: #1e2a4a;
      --german: #818cf8;
      --german-bg: #2e2a5e;
      --english: #4ade80;
      --english-bg: #14532d;
      --shared: #fbbf24;
      --shared-bg: #3d2e0a;
      --muted: #9a9ab0;
      --caption-bg: #1a1a2e;
      --cell-shared: #2d2510;
      --cell-german: #1e1a3e;
      --cell-english: #0f2d1a;
      --header-bg: #1a1a30;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure { max-width: 1100px; width: 100%; }
  .diagram-container {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.5rem 1rem;
    overflow-x: auto;
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding: 1rem 1.5rem;
    background: var(--caption-bg);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  .legend {
    display: flex; gap: 1.5rem; justify-content: center; flex-wrap: wrap;
    margin-top: 1rem; font-size: 0.82rem; color: var(--muted);
  }
  .legend-item { display: flex; align-items: center; gap: 0.4rem; }
  .legend-swatch { width: 14px; height: 14px; border-radius: 3px; border: 1px solid var(--border); }
  h3 {
    text-align: center;
    font-size: 1rem;
    margin-bottom: 1rem;
    color: var(--accent);
  }
  .subtitle {
    text-align: center;
    font-size: 0.82rem;
    color: var(--muted);
    margin-bottom: 1.5rem;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.85rem;
    min-width: 780px;
  }
  th {
    background: var(--header-bg);
    padding: 0.5rem 0.3rem;
    border: 1px solid var(--border);
    font-weight: 600;
    font-size: 0.78rem;
    text-align: center;
    color: var(--fg);
  }
  th.manner {
    text-align: left;
    padding-left: 0.6rem;
    min-width: 90px;
  }
  td {
    padding: 0.4rem 0.3rem;
    border: 1px solid var(--border);
    text-align: center;
    vertical-align: middle;
    font-family: 'Gentium Plus', 'Noto Sans', 'DejaVu Sans', serif;
    font-size: 0.95rem;
    line-height: 1.3;
  }
  td.empty { background: var(--surface); }
  td.shared { background: var(--cell-shared); }
  td.german-only { background: var(--cell-german); font-weight: bold; }
  td.english-only { background: var(--cell-english); font-weight: bold; }
  .ph-german { color: var(--german); }
  .ph-english { color: var(--english); }
  .ph-shared { color: var(--shared); }
  .ph-note {
    display: block;
    font: italic 0.65rem 'Segoe UI', system-ui, sans-serif;
    color: var(--muted);
    margin-top: 2px;
  }
  .highlight-box {
    margin-top: 1.5rem;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
  }
  .hl-panel {
    padding: 0.8rem 1rem;
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  .hl-panel h4 {
    font-size: 0.85rem;
    margin-bottom: 0.4rem;
  }
  .hl-panel ul {
    list-style: none;
    font-size: 0.82rem;
    color: var(--muted);
  }
  .hl-panel ul li {
    margin-bottom: 0.2rem;
    font-family: 'Gentium Plus', 'Noto Sans', 'DejaVu Sans', serif;
  }
  .hl-panel ul li span.word {
    font-family: 'Segoe UI', system-ui, sans-serif;
    font-style: italic;
  }
  @media (max-width: 600px) {
    .highlight-box { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<figure>
  <div class="diagram-container">
    <h3>Consonant Inventory Grid: German vs. English</h3>
    <p class="subtitle">Place of articulation (columns) &#xD7; Manner of articulation (rows) &#x2014; showing what each language has and what it lacks</p>

    <table>
      <thead>
        <tr>
          <th class="manner">Manner</th>
          <th>Bilabial</th>
          <th>Labio-dental</th>
          <th>Dental</th>
          <th>Alveolar</th>
          <th>Post-alveolar</th>
          <th>Palatal</th>
          <th>Velar</th>
          <th>Uvular</th>
          <th>Glottal</th>
        </tr>
      </thead>
      <tbody>
        <!-- Stops -->
        <tr>
          <th class="manner">Stops</th>
          <td class="shared"><span class="ph-shared">p b</span></td>
          <td class="empty"></td>
          <td class="empty"></td>
          <td class="shared"><span class="ph-shared">t d</span></td>
          <td class="empty"></td>
          <td class="empty"></td>
          <td class="shared"><span class="ph-shared">k &#x261;</span></td>
          <td class="empty"></td>
          <td class="shared"><span class="ph-shared">&#x294;</span><span class="ph-note">both languages</span></td>
        </tr>
        <!-- Affricates -->
        <tr>
          <th class="manner">Affricates</th>
          <td class="german-only"><span class="ph-german">p&#x361;f</span><span class="ph-note">Pferd</span></td>
          <td class="empty"></td>
          <td class="empty"></td>
          <td class="german-only"><span class="ph-german">t&#x361;s</span><span class="ph-note">Zunge</span></td>
          <td class="shared"><span class="ph-shared">t&#x283; d&#x292;</span></td>
          <td class="empty"></td>
          <td class="empty"></td>
          <td class="empty"></td>
          <td class="empty"></td>
        </tr>
        <!-- Fricatives -->
        <tr>
          <th class="manner">Fricatives</th>
          <td class="empty"></td>
          <td class="shared"><span class="ph-shared">f v</span></td>
          <td class="english-only"><span class="ph-english">&#x3B8; &#xF0;</span><span class="ph-note">think, this</span></td>
          <td class="shared"><span class="ph-shared">s z</span></td>
          <td class="shared"><span class="ph-shared">&#x283; &#x292;</span></td>
          <td class="german-only"><span class="ph-german">&#xE7;</span><span class="ph-note">ich</span></td>
          <td class="german-only"><span class="ph-german">x</span><span class="ph-note">ach</span></td>
          <td class="german-only"><span class="ph-german">&#x281;</span><span class="ph-note">rot</span></td>
          <td class="shared"><span class="ph-shared">h</span></td>
        </tr>
        <!-- Nasals -->
        <tr>
          <th class="manner">Nasals</th>
          <td class="shared"><span class="ph-shared">m</span></td>
          <td class="empty"></td>
          <td class="empty"></td>
          <td class="shared"><span class="ph-shared">n</span></td>
          <td class="empty"></td>
          <td class="empty"></td>
          <td class="shared"><span class="ph-shared">&#x14B;</span></td>
          <td class="empty"></td>
          <td class="empty"></td>
        </tr>
        <!-- Approximants -->
        <tr>
          <th class="manner">Approximants</th>
          <td class="english-only"><span class="ph-english">w</span><span class="ph-note">water</span></td>
          <td class="empty"></td>
          <td class="empty"></td>
          <td class="english-only"><span class="ph-english">&#x279;</span><span class="ph-note">run</span></td>
          <td class="empty"></td>
          <td class="shared"><span class="ph-shared">j</span></td>
          <td class="empty"></td>
          <td class="empty"></td>
          <td class="empty"></td>
        </tr>
        <!-- Laterals -->
        <tr>
          <th class="manner">Laterals</th>
          <td class="empty"></td>
          <td class="empty"></td>
          <td class="empty"></td>
          <td class="shared"><span class="ph-shared">l</span></td>
          <td class="empty"></td>
          <td class="empty"></td>
          <td class="empty"></td>
          <td class="empty"></td>
          <td class="empty"></td>
        </tr>
      </tbody>
    </table>

    <div class="highlight-box">
      <div class="hl-panel" style="background:var(--cell-german);border-color:var(--german);">
        <h4 style="color:var(--german);">German has, English lacks</h4>
        <ul>
          <li><span class="ph-german">/p&#x361;f/</span> &#x2014; <span class="word">Pferd, Apfel, Pflanze</span> <span class="ph-note" style="display:inline;">(from HGCS p&#x2192;pf)</span></li>
          <li><span class="ph-german">/t&#x361;s/</span> &#x2014; <span class="word">Zunge, zehn, zu</span> <span class="ph-note" style="display:inline;">(from HGCS t&#x2192;z)</span></li>
          <li><span class="ph-german">/&#xE7;/</span> &#x2014; <span class="word">ich, Milch, Chemie</span> <span class="ph-note" style="display:inline;">(from HGCS k&#x2192;ch)</span></li>
          <li><span class="ph-german">/x/</span> &#x2014; <span class="word">Bach, Buch, Nacht</span> <span class="ph-note" style="display:inline;">(allophone of /&#xE7;/)</span></li>
          <li><span class="ph-german">/&#x281;/</span> &#x2014; <span class="word">rot, Regen, fahren</span> <span class="ph-note" style="display:inline;">(uvular R; vocalizes in coda)</span></li>
        </ul>
      </div>
      <div class="hl-panel" style="background:var(--cell-english);border-color:var(--english);">
        <h4 style="color:var(--english);">English has, German lacks</h4>
        <ul>
          <li><span class="ph-english">/&#x3B8;/</span> &#x2014; <span class="word">think, thin, bath</span></li>
          <li><span class="ph-english">/&#xF0;/</span> &#x2014; <span class="word">this, that, breathe</span></li>
          <li><span class="ph-english">/w/</span> &#x2014; <span class="word">water, wine, warm</span> <span class="ph-note" style="display:inline;">(Germ. W = /v/)</span></li>
          <li><span class="ph-english">/&#x279;/</span> &#x2014; <span class="word">run, right, around</span> <span class="ph-note" style="display:inline;">(English postalveolar approx.)</span></li>
        </ul>
      </div>
    </div>

    <div style="margin-top:1rem;padding:0.7rem 1rem;border-radius:8px;background:var(--accent-light);border:1px solid var(--accent);">
      <p style="font-size:0.82rem;color:var(--muted);text-align:center;">
        <strong style="color:var(--accent);">The W&#x2192;V Shift:</strong> Proto-Germanic */w/ became /v/ in German but survived in English. German <em>Wasser</em> /v/ = English <em>water</em> /w/; German <em>Wein</em> /v/ = English <em>wine</em> /w/. German W is always pronounced [v].
      </p>
    </div>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background:var(--cell-shared);border-color:var(--shared);"></div> Shared phonemes</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--cell-german);border-color:var(--german);"></div> German only</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--cell-english);border-color:var(--english);"></div> English only</div>
  </div>

  <figcaption>
    <h2>Figure 2 -- Consonant Inventory Comparison: German vs. English</h2>
    <p>The two West Germanic siblings share a large consonant core (~20 phonemes) but diverge in characteristic ways. German's unique consonants (/p&#x361;f, t&#x361;s, &#xE7;, x, &#x281;/) were created by the High German Consonant Shift (5th&#x2013;8th century), which turned Proto-Germanic voiceless stops into affricates and fricatives. English's unique sounds (/&#x3B8;, &#xF0;, w, &#x279;/) include the dental fricatives shared with no other major European language and the postalveolar approximant /&#x279;/ that is one of the rarest R-sounds worldwide. German also uses a fortis/lenis distinction for stops (aspiration-based) rather than a true voiced/voiceless contrast.</p>
  </figcaption>
</figure>
</body>
</html>
