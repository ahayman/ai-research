<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aspect vs Tense: Mandarin vs English</title>
<style>
  :root {
    --bg: #0f172a; --fg: #e2e8f0; --surface: #1e293b; --border: #334155;
    --accent: #06b6d4; --mandarin: #f43f5e; --mandarin-bg: #3b1121;
    --english: #06b6d4; --english-bg: #0c2d3d;
    --taiwan: #f59e0b; --taiwan-bg: #3b2a0a;
    --muted: #94a3b8; --caption-bg: #1e293b;
    --success: #22c55e; --warn: #f59e0b;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--fg); display: flex; justify-content: center; padding: 2rem 1rem; line-height: 1.6; }
  figure { max-width: 960px; width: 100%; }
  figcaption { text-align: center; margin-top: 1.5rem; padding: 1rem 1.5rem; background: var(--caption-bg); border-radius: 8px; border: 1px solid var(--border); }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  .chart-wrapper { overflow-x: auto; border: 1px solid var(--border); border-radius: 10px; background: var(--surface); padding: 1.5rem; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 1.5rem; }
  @media (max-width: 700px) { .grid { grid-template-columns: 1fr; } }
  .panel { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 1.2rem; }
  .panel h3 { font-size: 1rem; margin-bottom: 0.8rem; display: flex; align-items: center; gap: 0.5rem; }
  .panel h3 .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
  .marker { display: flex; align-items: flex-start; gap: 0.8rem; padding: 0.7rem; border-radius: 8px; margin-bottom: 0.5rem; border: 1px solid transparent; transition: border-color 0.2s; }
  .marker:hover { border-color: var(--border); }
  .marker .badge { min-width: 42px; height: 32px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 1rem; flex-shrink: 0; }
  .marker .details { flex: 1; }
  .marker .details .name { font-weight: 600; font-size: 0.9rem; }
  .marker .details .desc { font-size: 0.78rem; color: var(--muted); margin-top: 2px; }
  .marker .details .example { font-size: 0.8rem; margin-top: 4px; padding: 4px 8px; background: rgba(255,255,255,0.04); border-radius: 4px; font-family: monospace; }
  .eng-cell { display: flex; align-items: center; gap: 0.5rem; padding: 0.35rem 0.5rem; border-radius: 4px; margin-bottom: 3px; font-size: 0.78rem; }
  .eng-cell .form { font-weight: 600; min-width: 110px; }
  .eng-cell .ex { color: var(--muted); font-size: 0.72rem; }
  .tense-grid { display: grid; grid-template-columns: auto 1fr 1fr 1fr; gap: 1px; background: var(--border); border-radius: 8px; overflow: hidden; margin-top: 0.5rem; }
  .tense-grid .cell { background: var(--bg); padding: 6px 8px; font-size: 0.72rem; }
  .tense-grid .header { background: var(--english-bg); font-weight: 700; color: var(--english); font-size: 0.7rem; text-align: center; }
  .tense-grid .row-header { background: var(--english-bg); font-weight: 600; color: var(--english); font-size: 0.7rem; }
  .vs-box { text-align: center; padding: 1rem; background: var(--bg); border: 2px dashed var(--accent); border-radius: 10px; }
  .vs-box .big { font-size: 2.5rem; font-weight: 800; color: var(--accent); }
  .vs-box .sub { font-size: 0.85rem; color: var(--muted); margin-top: 0.3rem; }
  .taiwan-note { margin-top: 0.8rem; padding: 0.7rem; border-radius: 8px; background: var(--taiwan-bg); border: 1px solid var(--taiwan); font-size: 0.8rem; }
  .taiwan-note strong { color: var(--taiwan); }
</style>
</head>
<body>
<figure>
  <div class="chart-wrapper">
    <div style="text-align:center; margin-bottom:1.2rem;">
      <h2 style="font-size:1.2rem; color:var(--fg);">Aspect Markers vs. Tense System</h2>
      <p style="font-size:0.85rem; color:var(--muted);">Mandarin marks HOW an action relates to time. English marks WHEN it happens.</p>
    </div>

    <div class="vs-box" style="margin-bottom:1.5rem;">
      <div style="display:flex; align-items:center; justify-content:center; gap:2rem; flex-wrap:wrap;">
        <div>
          <div style="font-size:2rem; font-weight:800; color:var(--mandarin);">3-4</div>
          <div style="font-size:0.8rem; color:var(--mandarin);">Mandarin Aspect Particles</div>
          <div style="font-size:0.7rem; color:var(--muted);">All optional</div>
        </div>
        <div style="font-size:1.5rem; font-weight:800; color:var(--accent);">vs.</div>
        <div>
          <div style="font-size:2rem; font-weight:800; color:var(--english);">12</div>
          <div style="font-size:0.8rem; color:var(--english);">English Tense-Aspect Forms</div>
          <div style="font-size:0.7rem; color:var(--muted);">All obligatory</div>
        </div>
      </div>
    </div>

    <div class="grid">
      <!-- Mandarin Side -->
      <div class="panel" style="border-color:var(--mandarin);">
        <h3><span class="dot" style="background:var(--mandarin);"></span> <span style="color:var(--mandarin);">Mandarin: Aspect (not tense)</span></h3>

        <div class="marker">
          <div class="badge" style="background:var(--mandarin-bg); color:var(--mandarin);">了</div>
          <div class="details">
            <div class="name">le — Perfective / Change of State</div>
            <div class="desc">Action completed OR new situation emerged. NOT past tense!</div>
            <div class="example">我吃了 wǒ chi le "I ate" (completed)</div>
            <div class="example" style="margin-top:2px;">你吃了饭再去 "After you eat, then go" (future!)</div>
          </div>
        </div>

        <div class="marker">
          <div class="badge" style="background:var(--mandarin-bg); color:var(--mandarin);">着</div>
          <div class="details">
            <div class="name">zhe — Durative / Stative</div>
            <div class="desc">Ongoing state being maintained</div>
            <div class="example">门开着 men kai zhe "The door is (standing) open"</div>
          </div>
        </div>

        <div class="marker">
          <div class="badge" style="background:var(--mandarin-bg); color:var(--mandarin);">过</div>
          <div class="details">
            <div class="name">guo — Experiential</div>
            <div class="desc">Have ever experienced the action (life history)</div>
            <div class="example">我去过中国 "I have been to China (ever)"</div>
          </div>
        </div>

        <div class="marker">
          <div class="badge" style="background:var(--mandarin-bg); color:var(--mandarin);">在</div>
          <div class="details">
            <div class="name">zai — Progressive (preverbal)</div>
            <div class="desc">Action currently in progress</div>
            <div class="example">我在吃饭 "I am eating (right now)"</div>
          </div>
        </div>

        <div class="taiwan-note">
          <strong>Taiwan Mandarin (Guoyu):</strong> Also uses 有 (you) as perfective marker from Hokkien: 你有看医生吗？ "Did you see a doctor?" (Mainland: 你看医生了吗？)
        </div>
      </div>

      <!-- English Side -->
      <div class="panel" style="border-color:var(--english);">
        <h3><span class="dot" style="background:var(--english);"></span> <span style="color:var(--english);">English: 12 Tense-Aspect Forms</span></h3>
        <p style="font-size:0.78rem; color:var(--muted); margin-bottom:0.6rem;">3 tenses x 4 aspects = 12 obligatory forms, each requiring specific verb morphology</p>

        <div class="tense-grid">
          <div class="cell header"></div>
          <div class="cell header">Past</div>
          <div class="cell header">Present</div>
          <div class="cell header">Future</div>

          <div class="cell row-header">Simple</div>
          <div class="cell">I <strong>ate</strong></div>
          <div class="cell">I <strong>eat</strong></div>
          <div class="cell">I <strong>will eat</strong></div>

          <div class="cell row-header">Progressive</div>
          <div class="cell">I <strong>was eating</strong></div>
          <div class="cell">I <strong>am eating</strong></div>
          <div class="cell">I <strong>will be eating</strong></div>

          <div class="cell row-header">Perfect</div>
          <div class="cell">I <strong>had eaten</strong></div>
          <div class="cell">I <strong>have eaten</strong></div>
          <div class="cell">I <strong>will have eaten</strong></div>

          <div class="cell row-header">Perf. Prog.</div>
          <div class="cell">I <strong>had been eating</strong></div>
          <div class="cell">I <strong>have been eating</strong></div>
          <div class="cell">I <strong>will have been eating</strong></div>
        </div>

        <div style="margin-top:0.8rem; padding:0.6rem; background:rgba(6,182,212,0.08); border-radius:6px; font-size:0.78rem;">
          <strong style="color:var(--english);">Key difference:</strong> Every English finite verb MUST be marked for tense. You cannot say *"I eat yesterday." Mandarin: 我昨天吃饭 (literally "I yesterday eat-rice") is perfectly grammatical.
        </div>
      </div>
    </div>

    <!-- Bottom insight -->
    <div style="text-align:center; padding:0.8rem; background:var(--bg); border-radius:8px; border:1px solid var(--border);">
      <p style="font-size:0.85rem; color:var(--warn); font-weight:600;">Mandarin speakers choose whether to mark aspect. English speakers must always mark tense.</p>
      <p style="font-size:0.78rem; color:var(--muted);">Chinese temporal information comes from context and time words (昨天 yesterday, 明天 tomorrow), not verb morphology.</p>
    </div>
  </div>
  <figcaption>
    <h2>Diagram 2: Aspect Markers vs. Tense System</h2>
    <p>Mandarin uses 3-4 optional aspect particles to mark the internal shape of actions. English uses 12 obligatory tense-aspect forms with required verb morphology. Taiwan Mandarin adds 有 (you) as an additional perfective marker.</p>
  </figcaption>
</figure>
</body>
</html>
