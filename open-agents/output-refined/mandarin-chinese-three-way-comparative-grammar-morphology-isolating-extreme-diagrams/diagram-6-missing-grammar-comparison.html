<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Missing Grammar: What Mandarin Lacks vs English</title>
<style>
  :root {
    --bg: #0f172a; --fg: #e2e8f0; --surface: #1e293b; --border: #334155;
    --accent: #06b6d4; --mandarin: #f43f5e; --mandarin-bg: #3b1121;
    --english: #06b6d4; --english-bg: #0c2d3d;
    --taiwan: #f59e0b; --taiwan-bg: #3b2a0a;
    --absent: #ef4444; --present: #22c55e; --partial: #f59e0b;
    --muted: #94a3b8; --caption-bg: #1e293b;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--fg); display: flex; justify-content: center; padding: 2rem 1rem; line-height: 1.6; }
  figure { max-width: 960px; width: 100%; }
  figcaption { text-align: center; margin-top: 1.5rem; padding: 1rem 1.5rem; background: var(--caption-bg); border-radius: 8px; border: 1px solid var(--border); }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  .chart-wrapper { overflow-x: auto; border: 1px solid var(--border); border-radius: 10px; background: var(--surface); padding: 1.5rem; }

  .title { text-align: center; margin-bottom: 1.5rem; }
  .title h2 { font-size: 1.2rem; }
  .title p { font-size: 0.85rem; color: var(--muted); }

  table { width: 100%; border-collapse: separate; border-spacing: 0; border-radius: 10px; overflow: hidden; border: 1px solid var(--border); }
  thead th { background: var(--bg); padding: 12px 14px; font-size: 0.82rem; text-align: left; border-bottom: 2px solid var(--border); }
  thead th:first-child { min-width: 150px; }
  tbody td { padding: 10px 14px; font-size: 0.8rem; border-bottom: 1px solid var(--border); vertical-align: top; }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover { background: rgba(255,255,255,0.02); }

  .status { display: inline-flex; align-items: center; gap: 4px; font-weight: 600; font-size: 0.78rem; padding: 2px 8px; border-radius: 12px; }
  .status.absent { color: var(--absent); background: rgba(239,68,68,0.12); }
  .status.present { color: var(--present); background: rgba(34,197,94,0.12); }
  .status.partial { color: var(--partial); background: rgba(245,158,11,0.12); }

  .feature-name { font-weight: 700; color: var(--fg); }
  .eng-detail { color: var(--english); font-weight: 500; }
  .mand-detail { color: var(--muted); }
  .mand-instead { color: var(--mandarin); font-weight: 500; font-size: 0.75rem; display: block; margin-top: 3px; }

  .summary-bar { display: flex; justify-content: center; gap: 2rem; margin: 1.5rem 0; flex-wrap: wrap; }
  .summary-stat { text-align: center; padding: 1rem; background: var(--bg); border-radius: 10px; border: 1px solid var(--border); min-width: 140px; }
  .summary-stat .num { font-size: 2rem; font-weight: 800; }
  .summary-stat .label { font-size: 0.78rem; color: var(--muted); }

  .insight { text-align: center; padding: 1rem; background: var(--bg); border-radius: 10px; border: 1px solid var(--accent); margin-top: 1rem; }
  .insight p { font-size: 0.85rem; }
  .insight .key { color: var(--accent); font-weight: 700; }
</style>
</head>
<body>
<figure>
  <div class="chart-wrapper">
    <div class="title">
      <h2>The "Missing Grammar" Inventory</h2>
      <p>What Mandarin lacks compared to English — and what it uses instead</p>
    </div>

    <!-- Summary stats -->
    <div class="summary-bar">
      <div class="summary-stat">
        <div class="num" style="color:var(--absent);">0</div>
        <div class="label">Mandarin inflectional<br>affixes on verbs</div>
      </div>
      <div class="summary-stat">
        <div class="num" style="color:var(--present);">8</div>
        <div class="label">English inflectional<br>affixes</div>
      </div>
      <div class="summary-stat">
        <div class="num" style="color:var(--mandarin);">~15</div>
        <div class="label">Mandarin grammatical<br>particles instead</div>
      </div>
    </div>

    <!-- Main comparison table -->
    <table>
      <thead>
        <tr>
          <th><span class="feature-name">Grammar Feature</span></th>
          <th style="color:var(--english);">English</th>
          <th style="color:var(--mandarin);">Mandarin</th>
          <th>Mandarin Replacement</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td><span class="feature-name">Verb Conjugation</span></td>
          <td><span class="status present">YES</span><br><span class="eng-detail">go / goes / went / gone / going</span></td>
          <td><span class="status absent">NONE</span><br><span class="mand-detail">去 is always 去</span></td>
          <td><span class="mand-instead">Context + time words (昨天 yesterday, 明天 tomorrow)</span></td>
        </tr>
        <tr>
          <td><span class="feature-name">Tense Marking</span></td>
          <td><span class="status present">OBLIGATORY</span><br><span class="eng-detail">Every finite verb must be tensed</span></td>
          <td><span class="status absent">NONE</span><br><span class="mand-detail">No grammatical tense</span></td>
          <td><span class="mand-instead">Aspect particles (了/着/过) + time expressions. Taiwan also uses 有.</span></td>
        </tr>
        <tr>
          <td><span class="feature-name">Subject-Verb Agreement</span></td>
          <td><span class="status present">YES</span><br><span class="eng-detail">"I am / he is / they are"</span></td>
          <td><span class="status absent">NONE</span><br><span class="mand-detail">No agreement of any kind</span></td>
          <td><span class="mand-instead">N/A — verb form never changes regardless of subject</span></td>
        </tr>
        <tr>
          <td><span class="feature-name">Plural Marking</span></td>
          <td><span class="status present">YES</span><br><span class="eng-detail">book/books, child/children</span></td>
          <td><span class="status partial">MINIMAL</span><br><span class="mand-detail">们 (men) for pronouns only</span></td>
          <td><span class="mand-instead">Context, numbers, or classifiers: 三本书 "three [CL] book"</span></td>
        </tr>
        <tr>
          <td><span class="feature-name">Articles</span></td>
          <td><span class="status present">YES</span><br><span class="eng-detail">a / an / the</span></td>
          <td><span class="status absent">NONE</span><br><span class="mand-detail">No articles exist</span></td>
          <td><span class="mand-instead">Demonstratives (这/那 this/that) + classifiers, or context</span></td>
        </tr>
        <tr>
          <td><span class="feature-name">Grammatical Gender</span></td>
          <td><span class="status partial">PRONOUNS</span><br><span class="eng-detail">he / she / it</span></td>
          <td><span class="status absent">NONE (spoken)</span><br><span class="mand-detail">他/她/它 all = "ta"</span></td>
          <td><span class="mand-instead">Written distinction only (他/她/它). In speech, all "ta."</span></td>
        </tr>
        <tr>
          <td><span class="feature-name">Case Marking</span></td>
          <td><span class="status partial">PRONOUNS</span><br><span class="eng-detail">I/me/my, he/him/his</span></td>
          <td><span class="status absent">NONE</span><br><span class="mand-detail">我 = I/me/my (with 的)</span></td>
          <td><span class="mand-instead">Word order determines role. 我 is always 我.</span></td>
        </tr>
        <tr>
          <td><span class="feature-name">Comparative Forms</span></td>
          <td><span class="status present">YES</span><br><span class="eng-detail">big / bigger / biggest</span></td>
          <td><span class="status absent">NONE</span><br><span class="mand-detail">大 is always 大</span></td>
          <td><span class="mand-instead">Particles: 更大 (geng da "more big"), 最大 (zui da "most big")</span></td>
        </tr>
        <tr>
          <td><span class="feature-name">Passive Morphology</span></td>
          <td><span class="status present">YES</span><br><span class="eng-detail">"is broken" (be + V-en)</span></td>
          <td><span class="status absent">NONE</span><br><span class="mand-detail">Verb never changes</span></td>
          <td><span class="mand-instead">被 (bei) particle + word order change</span></td>
        </tr>
        <tr>
          <td><span class="feature-name">Infinitive Marker</span></td>
          <td><span class="status present">YES</span><br><span class="eng-detail">"to go," "to eat"</span></td>
          <td><span class="status absent">NONE</span><br><span class="mand-detail">No finite/non-finite distinction</span></td>
          <td><span class="mand-instead">Bare verbs in serial constructions: 去买 "go buy" (not "go TO buy")</span></td>
        </tr>
        <tr>
          <td><span class="feature-name">Relative Pronouns</span></td>
          <td><span class="status present">YES</span><br><span class="eng-detail">who / which / that / whose</span></td>
          <td><span class="status absent">NONE</span><br><span class="mand-detail">No relative pronouns</span></td>
          <td><span class="mand-instead">的 (de) covers all: [clause] + 的 + noun = "the noun that..."</span></td>
        </tr>
        <tr>
          <td><span class="feature-name">Copula (be)</span></td>
          <td><span class="status present">OBLIGATORY</span><br><span class="eng-detail">"She IS a teacher"</span></td>
          <td><span class="status partial">OPTIONAL</span><br><span class="mand-detail">是 (shi) for nouns only</span></td>
          <td><span class="mand-instead">Adjectives are predicative: 她很高 "She very tall" (no "is" needed)</span></td>
        </tr>
      </tbody>
    </table>

    <div class="insight">
      <p><span class="key">"Missing" does not mean "less capable."</span> Mandarin expresses everything English does — just through different mechanisms: word order, particles, classifiers, verb compounding, and pragmatic context. The grammatical information is there, just not encoded in word morphology.</p>
    </div>
  </div>
  <figcaption>
    <h2>Diagram 6: Missing Grammar Comparison</h2>
    <p>A feature-by-feature inventory of grammatical categories present in English but absent from Mandarin, and the isolating mechanisms Mandarin uses as replacements. Both Putonghua and Guoyu share the same "missing" inventory.</p>
  </figcaption>
</figure>
</body>
</html>
