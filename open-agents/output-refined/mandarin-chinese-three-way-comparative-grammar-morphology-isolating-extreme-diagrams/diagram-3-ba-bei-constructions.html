<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>把 and 被 Constructions</title>
<style>
  :root {
    --bg: #0f172a; --fg: #e2e8f0; --surface: #1e293b; --border: #334155;
    --accent: #06b6d4; --mandarin: #f43f5e; --mandarin-bg: #3b1121;
    --english: #06b6d4; --english-bg: #0c2d3d;
    --ba: #22c55e; --ba-bg: #0a2614;
    --bei: #a78bfa; --bei-bg: #1e1638;
    --muted: #94a3b8; --caption-bg: #1e293b;
    --warn: #f59e0b;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--fg); display: flex; justify-content: center; padding: 2rem 1rem; line-height: 1.6; }
  figure { max-width: 960px; width: 100%; }
  figcaption { text-align: center; margin-top: 1.5rem; padding: 1rem 1.5rem; background: var(--caption-bg); border-radius: 8px; border: 1px solid var(--border); }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  .chart-wrapper { overflow-x: auto; border: 1px solid var(--border); border-radius: 10px; background: var(--surface); padding: 1.5rem; }

  .title { text-align: center; margin-bottom: 1.5rem; }
  .title h2 { font-size: 1.2rem; color: var(--fg); }
  .title p { font-size: 0.85rem; color: var(--muted); }

  .slot-row { display: flex; align-items: center; gap: 4px; margin: 0.5rem 0; flex-wrap: wrap; }
  .slot { padding: 8px 14px; border-radius: 6px; font-size: 0.85rem; font-weight: 600; text-align: center; min-width: 60px; }
  .slot.subj { background: #1e3a5f; border: 1px solid #3b82f6; color: #93c5fd; }
  .slot.particle { border-radius: 20px; font-size: 1.1rem; }
  .slot.ba-p { background: var(--ba-bg); border: 2px solid var(--ba); color: var(--ba); }
  .slot.bei-p { background: var(--bei-bg); border: 2px solid var(--bei); color: var(--bei); }
  .slot.obj { background: #3b2a0a; border: 1px solid #f59e0b; color: #fcd34d; }
  .slot.verb { background: var(--mandarin-bg); border: 1px solid var(--mandarin); color: #fda4af; }
  .slot.result { background: #1a1a2e; border: 1px solid #818cf8; color: #c4b5fd; }
  .slot.agent { background: #2d1b69; border: 1px solid #a78bfa; color: #c4b5fd; }
  .arrow { color: var(--muted); font-size: 1.2rem; margin: 0 2px; }

  .section { background: var(--bg); border-radius: 10px; padding: 1.2rem; margin-bottom: 1.2rem; border: 1px solid var(--border); }
  .section h3 { font-size: 1rem; margin-bottom: 0.8rem; display: flex; align-items: center; gap: 0.5rem; }
  .section h3 .icon { font-size: 1.3rem; }

  .example-box { background: rgba(255,255,255,0.03); border-radius: 8px; padding: 0.8rem; margin: 0.6rem 0; border-left: 3px solid var(--border); }
  .example-box .zh { font-size: 1.1rem; font-weight: 600; margin-bottom: 4px; }
  .example-box .py { font-size: 0.8rem; color: var(--muted); }
  .example-box .en { font-size: 0.8rem; color: var(--accent); margin-top: 2px; }
  .example-box .note { font-size: 0.75rem; color: var(--warn); margin-top: 4px; font-style: italic; }

  .constraint { display: flex; align-items: flex-start; gap: 0.5rem; margin: 0.4rem 0; font-size: 0.82rem; }
  .constraint .mark { color: var(--mandarin); font-weight: 700; min-width: 16px; }

  .mirror-box { text-align: center; padding: 1rem; background: var(--bg); border: 2px dashed var(--accent); border-radius: 10px; margin: 1rem 0; }
  .mirror-box h4 { color: var(--accent); font-size: 0.95rem; margin-bottom: 0.5rem; }
  .mirror-row { display: flex; justify-content: center; gap: 2rem; flex-wrap: wrap; margin-top: 0.5rem; }
  .mirror-item { text-align: center; }
  .mirror-item .label { font-size: 0.75rem; color: var(--muted); margin-bottom: 4px; }
  .mirror-item .chinese { font-size: 1.1rem; font-weight: 600; }
  .mirror-item .gloss { font-size: 0.75rem; color: var(--muted); }

  .eng-compare { margin-top: 1rem; padding: 0.8rem; background: var(--english-bg); border: 1px solid var(--english); border-radius: 8px; }
  .eng-compare h4 { color: var(--english); font-size: 0.9rem; margin-bottom: 0.3rem; }
  .eng-compare p { font-size: 0.8rem; color: var(--muted); }
</style>
</head>
<body>
<figure>
  <div class="chart-wrapper">
    <div class="title">
      <h2>把 ba and 被 bei: Disposal & Passive Without Morphology</h2>
      <p>Mandarin rearranges word order with particles instead of changing verb forms</p>
    </div>

    <!-- Standard SVO -->
    <div class="section">
      <h3>Standard SVO Order</h3>
      <div class="slot-row">
        <div class="slot subj">我 wo</div>
        <span class="arrow">→</span>
        <div class="slot verb">打破 dapo</div>
        <span class="arrow">→</span>
        <div class="slot obj">杯子 beizi</div>
        <div class="slot result">了 le</div>
      </div>
      <div style="font-size:0.8rem; color:var(--muted); margin-top:4px;">Subject + Verb + Object = "I broke the cup"</div>
    </div>

    <!-- 把 Construction -->
    <div class="section" style="border-color: var(--ba);">
      <h3><span style="color:var(--ba); font-size:1.3rem; font-weight:800;">把</span> <span style="color:var(--ba);">ba Construction — Active Disposal (SOV)</span></h3>
      <p style="font-size:0.8rem; color:var(--muted); margin-bottom:0.8rem;">Fronts the object before the verb to emphasize what happens to it — "disposal" semantics</p>

      <div style="font-size:0.78rem; color:var(--muted); margin-bottom:4px; font-weight:600;">SLOT STRUCTURE:</div>
      <div class="slot-row">
        <div class="slot subj">Subject</div>
        <span class="arrow">+</span>
        <div class="slot particle ba-p">把</div>
        <span class="arrow">+</span>
        <div class="slot obj">Object (definite)</div>
        <span class="arrow">+</span>
        <div class="slot verb">Verb</div>
        <span class="arrow">+</span>
        <div class="slot result">Result/了</div>
      </div>

      <div class="example-box" style="border-left-color: var(--ba);">
        <div class="zh">我 <span style="color:var(--ba); font-weight:800;">把</span> 杯子 打破 了</div>
        <div class="py">wo <strong>ba</strong> beizi dapo le</div>
        <div class="en">"I took the cup and broke it" (emphasis on cup being disposed of)</div>
        <div class="note">Object moves BEFORE verb. Verb CANNOT stand alone — needs result (了, direction, etc.)</div>
      </div>

      <div class="example-box" style="border-left-color: var(--ba);">
        <div class="zh">请 <span style="color:var(--ba); font-weight:800;">把</span> 门 关上</div>
        <div class="py">qing <strong>ba</strong> men guanshang</div>
        <div class="en">"Please close the door" (disposal: do something to the door)</div>
      </div>

      <div style="margin-top:0.8rem;">
        <div style="font-size:0.82rem; font-weight:600; color:var(--ba); margin-bottom:4px;">Constraints:</div>
        <div class="constraint"><span class="mark">!</span> Object must be definite (specific, known to both parties)</div>
        <div class="constraint"><span class="mark">!</span> Verb must be high-transitivity (affects the object)</div>
        <div class="constraint"><span class="mark">!</span> Verb needs a complement (result, direction, 了, etc.)</div>
        <div class="constraint"><span class="mark">!</span> Cannot use with perception/emotion verbs (看见, 喜欢)</div>
      </div>
    </div>

    <!-- 被 Construction -->
    <div class="section" style="border-color: var(--bei);">
      <h3><span style="color:var(--bei); font-size:1.3rem; font-weight:800;">被</span> <span style="color:var(--bei);">bei Construction — Passive (Patient-Fronting)</span></h3>
      <p style="font-size:0.8rem; color:var(--muted); margin-bottom:0.8rem;">Fronts the patient (receiver of action) as subject — traditionally adversative (bad things happening)</p>

      <div style="font-size:0.78rem; color:var(--muted); margin-bottom:4px; font-weight:600;">SLOT STRUCTURE:</div>
      <div class="slot-row">
        <div class="slot obj">Patient (subject)</div>
        <span class="arrow">+</span>
        <div class="slot particle bei-p">被</div>
        <span class="arrow">+</span>
        <div class="slot agent">(Agent)</div>
        <span class="arrow">+</span>
        <div class="slot verb">Verb</div>
        <span class="arrow">+</span>
        <div class="slot result">Result/了</div>
      </div>

      <div class="example-box" style="border-left-color: var(--bei);">
        <div class="zh">杯子 <span style="color:var(--bei); font-weight:800;">被</span> (我) 打破 了</div>
        <div class="py">beizi <strong>bei</strong> (wo) dapo le</div>
        <div class="en">"The cup was broken (by me)" — passive, adversative connotation</div>
        <div class="note">Agent is optional. Traditionally implies misfortune.</div>
      </div>

      <div class="example-box" style="border-left-color: var(--bei);">
        <div class="zh">他 <span style="color:var(--bei); font-weight:800;">被</span> 老板 骂 了</div>
        <div class="py">ta <strong>bei</strong> laoban ma le</div>
        <div class="en">"He was scolded by the boss" (classic adversative: bad for the subject)</div>
      </div>

      <div class="example-box" style="border-left-color: var(--warn);">
        <div class="zh">她 <span style="color:var(--bei); font-weight:800;">被</span> 录取 了</div>
        <div class="py">ta <strong>bei</strong> luqu le</div>
        <div class="en">"She was admitted" (modern neutral/positive use — expanding beyond adversative)</div>
        <div class="note">Modern Mandarin increasingly allows neutral/positive 被 — a shift from Classical usage.</div>
      </div>
    </div>

    <!-- Mirror relationship -->
    <div class="mirror-box">
      <h4>Mirror Relationship: Same Event, Two Perspectives</h4>
      <div class="mirror-row">
        <div class="mirror-item">
          <div class="label" style="color:var(--ba);">把 (Active Disposal)</div>
          <div class="chinese">我 <span style="color:var(--ba);">把</span> 杯子 打破了</div>
          <div class="gloss">I BA cup broke — "I broke the cup"</div>
        </div>
        <div style="font-size:1.5rem; color:var(--accent); display:flex; align-items:center;">⟷</div>
        <div class="mirror-item">
          <div class="label" style="color:var(--bei);">被 (Passive Reception)</div>
          <div class="chinese">杯子 <span style="color:var(--bei);">被</span> 我 打破了</div>
          <div class="gloss">Cup BEI me broke — "The cup was broken by me"</div>
        </div>
      </div>
      <p style="font-size:0.78rem; color:var(--muted); margin-top:0.8rem;">Same verb (打破), same participants, same result — only the perspective changes. No verb morphology changes at all.</p>
    </div>

    <!-- English Comparison -->
    <div class="eng-compare">
      <h4>English Comparison: Passive Requires Verb Morphology</h4>
      <p>English: "I broke the cup" → "The cup <strong>was broken</strong> by me" — requires auxiliary "was" + past participle "broken" (verb form change).</p>
      <p style="margin-top:4px;">Mandarin: 打破 stays 打破 in both 把 and 被 constructions. The verb never changes form. Only word order + particle changes.</p>
    </div>
  </div>
  <figcaption>
    <h2>Diagram 3: 把 ba and 被 bei Construction Architecture</h2>
    <p>Mandarin uses particles and word-order rearrangement to express active disposal and passive voice — no verb morphology changes. The two constructions are structural mirrors of each other.</p>
  </figcaption>
</figure>
</body>
</html>
