<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Morphological Typology Spectrum</title>
<style>
  :root {
    --bg: #0f172a; --fg: #e2e8f0; --surface: #1e293b; --border: #334155;
    --accent: #06b6d4; --accent-dim: #0e4f5c;
    --mandarin: #f43f5e; --mandarin-bg: #3b1121;
    --english: #06b6d4; --english-bg: #0c2d3d;
    --taiwan: #f59e0b; --taiwan-bg: #3b2a0a;
    --other: #a78bfa; --other-bg: #1e1638;
    --muted: #94a3b8; --caption-bg: #1e293b;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--fg); display: flex; justify-content: center; padding: 2rem 1rem; line-height: 1.6; }
  figure { max-width: 960px; width: 100%; }
  figcaption { text-align: center; margin-top: 1.5rem; padding: 1rem 1.5rem; background: var(--caption-bg); border-radius: 8px; border: 1px solid var(--border); }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  .chart-wrapper { overflow-x: auto; border: 1px solid var(--border); border-radius: 10px; background: var(--surface); padding: 1.5rem; }
  svg { display: block; margin: 0 auto; }
  .lang-card { cursor: pointer; transition: opacity 0.2s; }
  .lang-card:hover { opacity: 0.85; }
  .tooltip { display: none; position: absolute; background: #0f172a; border: 1px solid var(--accent); border-radius: 8px; padding: 12px 16px; max-width: 280px; z-index: 10; font-size: 0.8rem; color: var(--fg); pointer-events: none; box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
  .tooltip.show { display: block; }
  .tooltip h4 { color: var(--accent); margin-bottom: 4px; font-size: 0.9rem; }
</style>
</head>
<body>
<figure>
  <div class="chart-wrapper">
    <svg viewBox="0 0 920 640" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
      <text x="460" y="30" text-anchor="middle" font-size="18" fill="#e2e8f0" font-weight="700">The Morphological Typology Spectrum</text>
      <text x="460" y="52" text-anchor="middle" font-size="12" fill="#94a3b8">Where languages fall on the isolating-to-polysynthetic continuum</text>

      <!-- Axis Labels -->
      <text x="60" y="82" font-size="11" fill="#e2e8f0" font-weight="700">ISOLATING</text>
      <text x="310" y="82" text-anchor="middle" font-size="11" fill="#e2e8f0" font-weight="700">AGGLUTINATING</text>
      <text x="570" y="82" text-anchor="middle" font-size="11" fill="#e2e8f0" font-weight="700">FUSIONAL</text>
      <text x="810" y="82" text-anchor="middle" font-size="11" fill="#e2e8f0" font-weight="700">POLYSYNTHETIC</text>

      <!-- Spectrum bar -->
      <defs>
        <linearGradient id="spec" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#f43f5e;stop-opacity:0.6"/>
          <stop offset="25%" style="stop-color:#06b6d4;stop-opacity:0.6"/>
          <stop offset="55%" style="stop-color:#a78bfa;stop-opacity:0.6"/>
          <stop offset="100%" style="stop-color:#22c55e;stop-opacity:0.6"/>
        </linearGradient>
      </defs>
      <rect x="60" y="92" width="800" height="24" rx="12" fill="url(#spec)" stroke="#475569" stroke-width="1"/>

      <!-- Tick marks -->
      <line x1="60" y1="116" x2="60" y2="126" stroke="#64748b" stroke-width="1"/>
      <text x="60" y="140" text-anchor="middle" font-size="9" fill="#94a3b8">1.0</text>
      <line x1="260" y1="116" x2="260" y2="126" stroke="#64748b" stroke-width="1"/>
      <text x="260" y="140" text-anchor="middle" font-size="9" fill="#94a3b8">1.5</text>
      <line x1="460" y1="116" x2="460" y2="126" stroke="#64748b" stroke-width="1"/>
      <text x="460" y="140" text-anchor="middle" font-size="9" fill="#94a3b8">2.0</text>
      <line x1="660" y1="116" x2="660" y2="126" stroke="#64748b" stroke-width="1"/>
      <text x="660" y="140" text-anchor="middle" font-size="9" fill="#94a3b8">3.0</text>
      <line x1="860" y1="116" x2="860" y2="126" stroke="#64748b" stroke-width="1"/>
      <text x="860" y="140" text-anchor="middle" font-size="9" fill="#94a3b8">5.0+</text>
      <text x="460" y="155" text-anchor="middle" font-size="10" fill="#64748b">Morphemes per word (Greenberg Synthesis Index)</text>

      <!-- MANDARIN MARKER -->
      <circle cx="95" cy="104" r="10" fill="#f43f5e" stroke="#fff" stroke-width="2" class="lang-card" data-lang="mandarin"/>
      <line x1="95" y1="116" x2="95" y2="175" stroke="#f43f5e" stroke-width="1.5" stroke-dasharray="4"/>

      <!-- TAIWAN MANDARIN MARKER (same position, slightly offset) -->
      <circle cx="105" cy="104" r="7" fill="#f59e0b" stroke="#fff" stroke-width="1.5" class="lang-card" data-lang="taiwan"/>

      <!-- ENGLISH MARKER -->
      <circle cx="290" cy="104" r="10" fill="#06b6d4" stroke="#fff" stroke-width="2" class="lang-card" data-lang="english"/>
      <line x1="290" y1="116" x2="290" y2="175" stroke="#06b6d4" stroke-width="1.5" stroke-dasharray="4"/>

      <!-- TURKISH MARKER -->
      <circle cx="490" cy="104" r="8" fill="#a78bfa" stroke="#fff" stroke-width="1.5" class="lang-card" data-lang="turkish"/>
      <line x1="490" y1="116" x2="490" y2="175" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="4"/>

      <!-- LATIN MARKER -->
      <circle cx="620" cy="104" r="8" fill="#a78bfa" stroke="#fff" stroke-width="1.5" class="lang-card" data-lang="latin"/>
      <line x1="620" y1="116" x2="620" y2="175" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="4"/>

      <!-- MOHAWK MARKER -->
      <circle cx="820" cy="104" r="8" fill="#22c55e" stroke="#fff" stroke-width="1.5" class="lang-card" data-lang="mohawk"/>
      <line x1="820" y1="116" x2="820" y2="175" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="4"/>

      <!-- Language labels -->
      <text x="95" y="192" text-anchor="middle" font-size="12" fill="#f43f5e" font-weight="700">Mandarin</text>
      <text x="95" y="206" text-anchor="middle" font-size="9" fill="#f59e0b">(+ Taiwan)</text>
      <text x="290" y="192" text-anchor="middle" font-size="12" fill="#06b6d4" font-weight="700">English</text>
      <text x="490" y="192" text-anchor="middle" font-size="11" fill="#a78bfa" font-weight="600">Turkish</text>
      <text x="620" y="192" text-anchor="middle" font-size="11" fill="#a78bfa" font-weight="600">Latin</text>
      <text x="820" y="192" text-anchor="middle" font-size="11" fill="#22c55e" font-weight="600">Mohawk</text>

      <!-- Description boxes -->
      <!-- Mandarin -->
      <rect x="20" y="225" width="200" height="195" rx="8" fill="#3b1121" stroke="#f43f5e" stroke-width="1.5"/>
      <text x="120" y="248" text-anchor="middle" font-size="13" fill="#f43f5e" font-weight="700">Mandarin Chinese</text>
      <text x="120" y="266" text-anchor="middle" font-size="10" fill="#94a3b8">Synthesis Index: ~1.0</text>
      <line x1="40" y1="275" x2="200" y2="275" stroke="#f43f5e" stroke-opacity="0.3" stroke-width="1"/>
      <text x="35" y="295" font-size="10" fill="#e2e8f0">No verb conjugation</text>
      <text x="35" y="312" font-size="10" fill="#e2e8f0">No noun declension</text>
      <text x="35" y="329" font-size="10" fill="#e2e8f0">No agreement</text>
      <text x="35" y="346" font-size="10" fill="#e2e8f0">No articles</text>
      <text x="35" y="363" font-size="10" fill="#e2e8f0">No plural marking*</text>
      <text x="35" y="380" font-size="10" fill="#e2e8f0">No gender</text>
      <text x="35" y="397" font-size="10" fill="#e2e8f0">No tense morphology</text>
      <text x="35" y="414" font-size="9" fill="#94a3b8">*们 men for pronouns only</text>

      <!-- English -->
      <rect x="240" y="225" width="200" height="195" rx="8" fill="#0c2d3d" stroke="#06b6d4" stroke-width="1.5"/>
      <text x="340" y="248" text-anchor="middle" font-size="13" fill="#06b6d4" font-weight="700">English</text>
      <text x="340" y="266" text-anchor="middle" font-size="10" fill="#94a3b8">Synthesis Index: ~1.5</text>
      <line x1="260" y1="275" x2="420" y2="275" stroke="#06b6d4" stroke-opacity="0.3" stroke-width="1"/>
      <text x="255" y="295" font-size="10" fill="#e2e8f0">8 inflectional affixes</text>
      <text x="255" y="312" font-size="10" fill="#e2e8f0">  -s, -ed, -ing, -en</text>
      <text x="255" y="329" font-size="10" fill="#e2e8f0">  -s (pl), -'s, -er, -est</text>
      <text x="255" y="346" font-size="10" fill="#e2e8f0">Articles: a/an/the</text>
      <text x="255" y="363" font-size="10" fill="#e2e8f0">Subject-verb agreement</text>
      <text x="255" y="380" font-size="10" fill="#e2e8f0">Obligatory tense</text>
      <text x="255" y="397" font-size="10" fill="#e2e8f0">Pronoun case: I/me/my</text>
      <text x="255" y="414" font-size="9" fill="#94a3b8">Weakly fusional / analytic</text>

      <!-- Turkish -->
      <rect x="420" y="225" width="170" height="195" rx="8" fill="#1e1638" stroke="#a78bfa" stroke-width="1.5"/>
      <text x="505" y="248" text-anchor="middle" font-size="13" fill="#a78bfa" font-weight="700">Turkish</text>
      <text x="505" y="266" text-anchor="middle" font-size="10" fill="#94a3b8">Synthesis Index: ~2.5</text>
      <line x1="435" y1="275" x2="575" y2="275" stroke="#a78bfa" stroke-opacity="0.3" stroke-width="1"/>
      <text x="433" y="295" font-size="10" fill="#e2e8f0">Regular affixes stack</text>
      <text x="433" y="312" font-size="10" fill="#e2e8f0">1 affix = 1 meaning</text>
      <text x="433" y="329" font-size="10" fill="#e2e8f0">ev-ler-in-den</text>
      <text x="433" y="346" font-size="10" fill="#e2e8f0">house-PL-POSS-ABL</text>
      <text x="433" y="363" font-size="10" fill="#94a3b8">"from their houses"</text>
      <text x="433" y="385" font-size="10" fill="#e2e8f0">Clear boundaries</text>
      <text x="433" y="402" font-size="10" fill="#e2e8f0">Highly regular</text>

      <!-- Latin -->
      <rect x="605" y="225" width="150" height="195" rx="8" fill="#1e1638" stroke="#a78bfa" stroke-width="1.5"/>
      <text x="680" y="248" text-anchor="middle" font-size="13" fill="#a78bfa" font-weight="700">Latin</text>
      <text x="680" y="266" text-anchor="middle" font-size="10" fill="#94a3b8">Synthesis Index: ~2.5</text>
      <line x1="615" y1="275" x2="745" y2="275" stroke="#a78bfa" stroke-opacity="0.3" stroke-width="1"/>
      <text x="615" y="295" font-size="10" fill="#e2e8f0">Fused affixes</text>
      <text x="615" y="312" font-size="10" fill="#e2e8f0">1 affix = N meanings</text>
      <text x="615" y="329" font-size="10" fill="#e2e8f0">am-o-r</text>
      <text x="615" y="346" font-size="10" fill="#e2e8f0">love-1SG.PRES-PASS</text>
      <text x="615" y="363" font-size="10" fill="#94a3b8">"I am loved"</text>
      <text x="615" y="385" font-size="10" fill="#e2e8f0">Blurred boundaries</text>
      <text x="615" y="402" font-size="10" fill="#e2e8f0">Many irregularities</text>

      <!-- Mohawk -->
      <rect x="770" y="225" width="135" height="195" rx="8" fill="#0a2614" stroke="#22c55e" stroke-width="1.5"/>
      <text x="837" y="248" text-anchor="middle" font-size="13" fill="#22c55e" font-weight="700">Mohawk</text>
      <text x="837" y="266" text-anchor="middle" font-size="10" fill="#94a3b8">Synthesis Index: ~5+</text>
      <line x1="780" y1="275" x2="895" y2="275" stroke="#22c55e" stroke-opacity="0.3" stroke-width="1"/>
      <text x="780" y="295" font-size="10" fill="#e2e8f0">One word =</text>
      <text x="780" y="312" font-size="10" fill="#e2e8f0">entire sentence</text>
      <text x="780" y="335" font-size="10" fill="#e2e8f0">Subject, object,</text>
      <text x="780" y="352" font-size="10" fill="#e2e8f0">verb, tense, mood</text>
      <text x="780" y="369" font-size="10" fill="#e2e8f0">all in one word</text>
      <text x="780" y="392" font-size="9" fill="#94a3b8">Up to 12+ morphemes</text>
      <text x="780" y="408" font-size="9" fill="#94a3b8">per word</text>

      <!-- Example comparison at bottom -->
      <rect x="40" y="445" width="840" height="175" rx="10" fill="#0f172a" stroke="#334155" stroke-width="1"/>
      <text x="460" y="472" text-anchor="middle" font-size="14" fill="#06b6d4" font-weight="700">Same Meaning, Different Morphology</text>
      <text x="460" y="490" text-anchor="middle" font-size="11" fill="#94a3b8">"I didn't eat" expressed across the spectrum</text>

      <!-- Mandarin example -->
      <rect x="60" y="505" width="180" height="55" rx="6" fill="#3b1121" stroke="#f43f5e" stroke-width="1"/>
      <text x="150" y="525" text-anchor="middle" font-size="14" fill="#f43f5e" font-weight="700">我没吃</text>
      <text x="150" y="543" text-anchor="middle" font-size="10" fill="#94a3b8">wǒ mei chi</text>
      <text x="150" y="555" text-anchor="middle" font-size="9" fill="#e2e8f0">3 words, 3 morphemes</text>

      <!-- English example -->
      <rect x="260" y="505" width="180" height="55" rx="6" fill="#0c2d3d" stroke="#06b6d4" stroke-width="1"/>
      <text x="350" y="525" text-anchor="middle" font-size="14" fill="#06b6d4" font-weight="700">I didn't eat</text>
      <text x="350" y="543" text-anchor="middle" font-size="10" fill="#94a3b8">3 words, 5 morphemes</text>
      <text x="350" y="555" text-anchor="middle" font-size="9" fill="#e2e8f0">did-n't = do+PAST+not</text>

      <!-- Turkish example -->
      <rect x="460" y="505" width="180" height="55" rx="6" fill="#1e1638" stroke="#a78bfa" stroke-width="1"/>
      <text x="550" y="525" text-anchor="middle" font-size="14" fill="#a78bfa" font-weight="700">ye-me-di-m</text>
      <text x="550" y="543" text-anchor="middle" font-size="10" fill="#94a3b8">1 word, 4 morphemes</text>
      <text x="550" y="555" text-anchor="middle" font-size="9" fill="#e2e8f0">eat-NEG-PAST-1SG</text>

      <!-- Latin example -->
      <rect x="660" y="505" width="180" height="55" rx="6" fill="#1e1638" stroke="#a78bfa" stroke-width="1"/>
      <text x="750" y="525" text-anchor="middle" font-size="14" fill="#a78bfa" font-weight="700">non edi</text>
      <text x="750" y="543" text-anchor="middle" font-size="10" fill="#94a3b8">2 words, fused meanings</text>
      <text x="750" y="555" text-anchor="middle" font-size="9" fill="#e2e8f0">-i = PAST+1SG fused</text>

      <!-- Key insight -->
      <text x="460" y="595" text-anchor="middle" font-size="11" fill="#f59e0b" font-weight="600">Mandarin: 1 morpheme per word (pure isolation) | English: ~1.5 morphemes per word | Turkish: ~2.5 | Mohawk: 5+</text>
    </svg>
  </div>
  <figcaption>
    <h2>Diagram 1: Morphological Typology Spectrum</h2>
    <p>Languages range from isolating (one morpheme per word) to polysynthetic (entire sentences in one word). Mandarin sits at the extreme isolating end; English is in the "weakly fusional" middle zone. Both Putonghua and Guoyu occupy the same position.</p>
  </figcaption>
</figure>
</body>
</html>
