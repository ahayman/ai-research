<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serial Verb Constructions & Resultative Compounds</title>
<style>
  :root {
    --bg: #0f172a; --fg: #e2e8f0; --surface: #1e293b; --border: #334155;
    --accent: #06b6d4; --mandarin: #f43f5e; --mandarin-bg: #3b1121;
    --english: #06b6d4; --english-bg: #0c2d3d;
    --v1: #f43f5e; --v2: #22c55e; --v3: #a78bfa;
    --result: #f59e0b; --result-bg: #3b2a0a;
    --muted: #94a3b8; --caption-bg: #1e293b;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--fg); display: flex; justify-content: center; padding: 2rem 1rem; line-height: 1.6; }
  figure { max-width: 960px; width: 100%; }
  figcaption { text-align: center; margin-top: 1.5rem; padding: 1rem 1.5rem; background: var(--caption-bg); border-radius: 8px; border: 1px solid var(--border); }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  .chart-wrapper { overflow-x: auto; border: 1px solid var(--border); border-radius: 10px; background: var(--surface); padding: 1.5rem; }

  .title { text-align: center; margin-bottom: 1.5rem; }
  .title h2 { font-size: 1.2rem; }
  .title p { font-size: 0.85rem; color: var(--muted); }

  .section { background: var(--bg); border-radius: 10px; padding: 1.2rem; margin-bottom: 1.2rem; border: 1px solid var(--border); }
  .section h3 { font-size: 1rem; margin-bottom: 0.5rem; }

  .verb-chain { display: flex; align-items: center; gap: 4px; margin: 0.6rem 0; flex-wrap: wrap; }
  .v-block { padding: 8px 14px; border-radius: 8px; font-weight: 700; text-align: center; font-size: 0.9rem; }
  .v-block.v1 { background: rgba(244,63,94,0.15); border: 2px solid var(--v1); color: var(--v1); }
  .v-block.v2 { background: rgba(34,197,94,0.15); border: 2px solid var(--v2); color: var(--v2); }
  .v-block.v3 { background: rgba(167,139,250,0.15); border: 2px solid var(--v3); color: var(--v3); }
  .v-block.obj { background: rgba(245,158,11,0.1); border: 1px solid var(--result); color: #fcd34d; font-weight: 500; }
  .v-block.subj { background: rgba(6,182,212,0.1); border: 1px solid var(--accent); color: var(--accent); font-weight: 500; }
  .chain-arrow { color: var(--muted); font-size: 1rem; }
  .chain-label { font-size: 0.72rem; color: var(--muted); display: block; margin-top: 2px; }
  .chain-en { font-size: 0.8rem; color: var(--english); margin-top: 4px; padding-left: 0.5rem; border-left: 2px solid var(--english); }
  .chain-note { font-size: 0.75rem; color: var(--muted); margin-top: 2px; font-style: italic; }

  .types-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 1rem; }
  @media (max-width: 700px) { .types-grid { grid-template-columns: 1fr; } }
  .type-card { padding: 1rem; border-radius: 8px; background: var(--bg); border: 1px solid var(--border); }
  .type-card h4 { font-size: 0.9rem; margin-bottom: 0.5rem; }

  .rvc-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 0.8rem; margin-top: 1rem; }
  .rvc-item { padding: 0.8rem; border-radius: 8px; background: var(--bg); border: 1px solid var(--border); text-align: center; transition: border-color 0.2s; }
  .rvc-item:hover { border-color: var(--result); }
  .rvc-item .compound { font-size: 1.3rem; font-weight: 800; }
  .rvc-item .parts { font-size: 0.78rem; margin-top: 4px; }
  .rvc-item .parts .action { color: var(--v1); }
  .rvc-item .parts .result { color: var(--v2); }
  .rvc-item .meaning { font-size: 0.78rem; color: var(--muted); margin-top: 4px; }

  .potential-box { margin-top: 1rem; padding: 1rem; border-radius: 10px; border: 1px solid var(--result); background: var(--result-bg); }
  .potential-box h4 { color: var(--result); font-size: 0.95rem; margin-bottom: 0.5rem; }
  .pot-row { display: flex; gap: 1.5rem; flex-wrap: wrap; margin-top: 0.5rem; }
  .pot-item { text-align: center; }
  .pot-item .zh { font-size: 1.1rem; font-weight: 700; }
  .pot-item .py { font-size: 0.75rem; color: var(--muted); }
  .pot-item .en { font-size: 0.78rem; color: var(--result); }

  .compare-box { margin-top: 1rem; padding: 1rem; border-radius: 8px; background: var(--english-bg); border: 1px solid var(--english); }
  .compare-box h4 { color: var(--english); margin-bottom: 0.3rem; }
  .compare-box p { font-size: 0.82rem; color: var(--muted); }
</style>
</head>
<body>
<figure>
  <div class="chart-wrapper">
    <div class="title">
      <h2>Serial Verb Constructions & Resultative Compounds</h2>
      <p>Two grammatical patterns unique to isolating languages: verb stacking and action-result fusion</p>
    </div>

    <!-- SERIAL VERB CONSTRUCTIONS -->
    <div class="section" style="border-color: var(--v1);">
      <h3 style="color:var(--v1);">Part A: Serial Verb Constructions (SVC)</h3>
      <p style="font-size:0.82rem; color:var(--muted); margin-bottom:0.8rem;">Multiple verbs in sequence, sharing a subject, with NO conjunction or subordinator between them</p>

      <!-- Example 1: Purpose -->
      <div style="margin-bottom:1rem;">
        <div style="font-size:0.78rem; color:var(--v1); font-weight:600;">PURPOSE SERIAL: V1 for V2</div>
        <div class="verb-chain">
          <div class="v-block subj">我 wo<span class="chain-label">I</span></div>
          <span class="chain-arrow">→</span>
          <div class="v-block v1">去 qu<span class="chain-label">go</span></div>
          <span class="chain-arrow">→</span>
          <div class="v-block obj">商店<span class="chain-label">store</span></div>
          <span class="chain-arrow">→</span>
          <div class="v-block v2">买 mai<span class="chain-label">buy</span></div>
          <span class="chain-arrow">→</span>
          <div class="v-block obj">东西<span class="chain-label">things</span></div>
        </div>
        <div class="chain-en">English: "I go <strong>to</strong> the store <strong>to</strong> buy things" — needs two "to"s</div>
        <div class="chain-note">Chinese: just stack verbs. No "to" needed.</div>
      </div>

      <!-- Example 2: Instrumental -->
      <div style="margin-bottom:1rem;">
        <div style="font-size:0.78rem; color:var(--v2); font-weight:600;">INSTRUMENTAL SERIAL: V1 provides means for V2</div>
        <div class="verb-chain">
          <div class="v-block subj">她 ta<span class="chain-label">she</span></div>
          <span class="chain-arrow">→</span>
          <div class="v-block v1">拿 na<span class="chain-label">take</span></div>
          <span class="chain-arrow">→</span>
          <div class="v-block obj">筷子<span class="chain-label">chopsticks</span></div>
          <span class="chain-arrow">→</span>
          <div class="v-block v2">吃饭 chifan<span class="chain-label">eat-rice</span></div>
        </div>
        <div class="chain-en">English: "She eats <strong>with</strong> chopsticks" — needs preposition "with"</div>
        <div class="chain-note">Chinese: "She take-chopsticks eat" — pure verb sequence.</div>
      </div>

      <!-- Example 3: Directional -->
      <div style="margin-bottom:1rem;">
        <div style="font-size:0.78rem; color:var(--v3); font-weight:600;">DIRECTIONAL SERIAL: Motion + Direction + Deictic</div>
        <div class="verb-chain">
          <div class="v-block subj">他 ta<span class="chain-label">he</span></div>
          <span class="chain-arrow">→</span>
          <div class="v-block v1">走 zou<span class="chain-label">walk</span></div>
          <span class="chain-arrow">→</span>
          <div class="v-block v2">进 jin<span class="chain-label">enter</span></div>
          <span class="chain-arrow">→</span>
          <div class="v-block v3">来 lai<span class="chain-label">come</span></div>
        </div>
        <div class="chain-en">English: "He walked in" — uses preposition/adverb particle</div>
        <div class="chain-note">Chinese stacks three verbs: walk-enter-come = "walked in (toward speaker)"</div>
      </div>

      <!-- Example 4: Consecutive -->
      <div>
        <div style="font-size:0.78rem; color:var(--accent); font-weight:600;">CONSECUTIVE SERIAL: Events in sequence</div>
        <div class="verb-chain">
          <div class="v-block subj">我 wo<span class="chain-label">I</span></div>
          <span class="chain-arrow">→</span>
          <div class="v-block v1">坐 zuo<span class="chain-label">sit</span></div>
          <span class="chain-arrow">→</span>
          <div class="v-block obj">飞机<span class="chain-label">airplane</span></div>
          <span class="chain-arrow">→</span>
          <div class="v-block v2">去 qu<span class="chain-label">go</span></div>
          <span class="chain-arrow">→</span>
          <div class="v-block obj">北京<span class="chain-label">Beijing</span></div>
        </div>
        <div class="chain-en">English: "I take a plane <strong>and</strong> go to Beijing" — needs "and"</div>
      </div>

      <div class="compare-box" style="margin-top:1rem;">
        <h4>Why English Cannot Do This</h4>
        <p>English verbs must be either finite (conjugated) or non-finite (infinitive, participle). Only one finite verb per clause. Multiple verbs need conjunctions ("and"), infinitive markers ("to"), or subordination ("while"). Since Chinese has NO finite/non-finite distinction and NO conjugation, bare verbs stack freely.</p>
      </div>
    </div>

    <!-- RESULTATIVE VERB COMPOUNDS -->
    <div class="section" style="border-color: var(--v2);">
      <h3 style="color:var(--v2);">Part B: Resultative Verb Compounds (V-V)</h3>
      <p style="font-size:0.82rem; color:var(--muted); margin-bottom:0.8rem;">Two verbs fuse: V1 = action, V2 = result. One of Mandarin's most productive word-formation patterns.</p>

      <div class="rvc-grid">
        <div class="rvc-item">
          <div class="compound"><span class="action" style="color:var(--v1);">打</span><span class="result" style="color:var(--v2);">破</span></div>
          <div class="parts"><span class="action">hit</span> + <span class="result">break</span></div>
          <div class="meaning">= break (by hitting)</div>
        </div>
        <div class="rvc-item">
          <div class="compound"><span class="action" style="color:var(--v1);">听</span><span class="result" style="color:var(--v2);">懂</span></div>
          <div class="parts"><span class="action">listen</span> + <span class="result">understand</span></div>
          <div class="meaning">= understand (by listening)</div>
        </div>
        <div class="rvc-item">
          <div class="compound"><span class="action" style="color:var(--v1);">看</span><span class="result" style="color:var(--v2);">见</span></div>
          <div class="parts"><span class="action">look</span> + <span class="result">perceive</span></div>
          <div class="meaning">= see (look and perceive)</div>
        </div>
        <div class="rvc-item">
          <div class="compound"><span class="action" style="color:var(--v1);">吃</span><span class="result" style="color:var(--v2);">饱</span></div>
          <div class="parts"><span class="action">eat</span> + <span class="result">full</span></div>
          <div class="meaning">= eat until full</div>
        </div>
        <div class="rvc-item">
          <div class="compound"><span class="action" style="color:var(--v1);">学</span><span class="result" style="color:var(--v2);">会</span></div>
          <div class="parts"><span class="action">study</span> + <span class="result">master</span></div>
          <div class="meaning">= learn (successfully)</div>
        </div>
        <div class="rvc-item">
          <div class="compound"><span class="action" style="color:var(--v1);">写</span><span class="result" style="color:var(--v2);">错</span></div>
          <div class="parts"><span class="action">write</span> + <span class="result">wrong</span></div>
          <div class="meaning">= write incorrectly</div>
        </div>
        <div class="rvc-item">
          <div class="compound"><span class="action" style="color:var(--v1);">洗</span><span class="result" style="color:var(--v2);">干净</span></div>
          <div class="parts"><span class="action">wash</span> + <span class="result">clean</span></div>
          <div class="meaning">= wash clean</div>
        </div>
        <div class="rvc-item">
          <div class="compound"><span class="action" style="color:var(--v1);">哭</span><span class="result" style="color:var(--v2);">湿</span></div>
          <div class="parts"><span class="action">cry</span> + <span class="result">wet</span></div>
          <div class="meaning">= cry until wet (novel!)</div>
        </div>
      </div>

      <!-- Potential form -->
      <div class="potential-box">
        <h4>The Potential Form: Can / Cannot Achieve Result</h4>
        <p style="font-size:0.82rem; color:var(--muted); margin-bottom:0.5rem;">Insert 得 (de, "can") or 不 (bu, "cannot") between V1 and V2:</p>
        <div class="pot-row">
          <div class="pot-item">
            <div class="zh" style="color:var(--v2);">听<span style="color:var(--result);">得</span>懂</div>
            <div class="py">ting de dong</div>
            <div class="en">CAN understand</div>
          </div>
          <div class="pot-item">
            <div class="zh" style="color:var(--v1);">听<span style="color:#ef4444;">不</span>懂</div>
            <div class="py">ting bu dong</div>
            <div class="en">CANNOT understand</div>
          </div>
          <div style="width:1px; background:var(--border);"></div>
          <div class="pot-item">
            <div class="zh" style="color:var(--v2);">吃<span style="color:var(--result);">得</span>完</div>
            <div class="py">chi de wan</div>
            <div class="en">CAN finish eating</div>
          </div>
          <div class="pot-item">
            <div class="zh" style="color:var(--v1);">吃<span style="color:#ef4444;">不</span>完</div>
            <div class="py">chi bu wan</div>
            <div class="en">CANNOT finish eating</div>
          </div>
        </div>
      </div>

      <div class="compare-box">
        <h4>English Comparison</h4>
        <p>English has phrasal verbs ("break down," "eat up") but uses preposition/adverb particles, not result verbs. English CANNOT productively create "hit-break" or "listen-understand." The closest equivalent is periphrasis: "listen until you understand," "hit it so it breaks." Mandarin's V-V system is far more productive and compact.</p>
      </div>
    </div>
  </div>
  <figcaption>
    <h2>Diagram 5: Serial Verb Constructions & Resultative Compounds</h2>
    <p>Mandarin stacks verbs without conjunctions (SVCs) and fuses action+result into compact compounds (V-V). Both patterns exploit the isolating structure: no finite/non-finite distinction, no conjugation, so verbs combine freely.</p>
  </figcaption>
</figure>
</body>
</html>
