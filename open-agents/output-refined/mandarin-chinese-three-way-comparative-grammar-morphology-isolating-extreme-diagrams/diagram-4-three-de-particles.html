<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Three De Particles: 的 地 得</title>
<style>
  :root {
    --bg: #0f172a; --fg: #e2e8f0; --surface: #1e293b; --border: #334155;
    --accent: #06b6d4; --mandarin: #f43f5e;
    --de1: #f43f5e; --de1-bg: #3b1121;
    --de2: #22c55e; --de2-bg: #0a2614;
    --de3: #a78bfa; --de3-bg: #1e1638;
    --english: #06b6d4; --english-bg: #0c2d3d;
    --muted: #94a3b8; --caption-bg: #1e293b;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--fg); display: flex; justify-content: center; padding: 2rem 1rem; line-height: 1.6; }
  figure { max-width: 960px; width: 100%; }
  figcaption { text-align: center; margin-top: 1.5rem; padding: 1rem 1.5rem; background: var(--caption-bg); border-radius: 8px; border: 1px solid var(--border); }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  .chart-wrapper { overflow-x: auto; border: 1px solid var(--border); border-radius: 10px; background: var(--surface); padding: 1.5rem; }

  .title { text-align: center; margin-bottom: 1.5rem; }
  .title h2 { font-size: 1.2rem; }
  .title p { font-size: 0.85rem; color: var(--muted); }

  .flow-container { display: flex; justify-content: center; align-items: center; gap: 1rem; margin: 1.5rem 0; flex-wrap: wrap; }
  .flow-question { text-align: center; padding: 1rem; background: var(--bg); border: 2px solid var(--accent); border-radius: 12px; max-width: 200px; }
  .flow-question .q { font-size: 0.9rem; font-weight: 700; color: var(--accent); }
  .flow-question .sub { font-size: 0.75rem; color: var(--muted); margin-top: 4px; }
  .flow-arrow { font-size: 1.5rem; color: var(--muted); }

  .de-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin: 1rem 0; }
  @media (max-width: 750px) { .de-cards { grid-template-columns: 1fr; } }

  .de-card { border-radius: 12px; padding: 1.2rem; position: relative; overflow: hidden; }
  .de-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; }
  .de-card.de1 { background: var(--de1-bg); border: 1px solid var(--de1); }
  .de-card.de1::before { background: var(--de1); }
  .de-card.de2 { background: var(--de2-bg); border: 1px solid var(--de2); }
  .de-card.de2::before { background: var(--de2); }
  .de-card.de3 { background: var(--de3-bg); border: 1px solid var(--de3); }
  .de-card.de3::before { background: var(--de3); }

  .de-char { font-size: 2.5rem; font-weight: 800; text-align: center; margin: 0.5rem 0; }
  .de-name { text-align: center; font-weight: 700; font-size: 0.95rem; margin-bottom: 0.5rem; }
  .de-formula { text-align: center; font-size: 0.85rem; padding: 6px 12px; border-radius: 6px; margin: 0.5rem 0; font-family: monospace; font-weight: 600; }
  .de-desc { font-size: 0.8rem; color: var(--muted); text-align: center; margin-bottom: 0.6rem; }
  .de-question { font-size: 0.82rem; font-weight: 600; text-align: center; margin: 0.5rem 0; }

  .example { font-size: 0.82rem; margin: 0.4rem 0; padding: 6px 8px; background: rgba(255,255,255,0.04); border-radius: 4px; }
  .example .zh { font-weight: 600; }
  .example .en { color: var(--muted); font-size: 0.75rem; }

  .english-equiv { margin-top: 0.5rem; padding: 6px 8px; border-radius: 4px; font-size: 0.78rem; }
  .english-equiv strong { font-size: 0.82rem; }

  .summary-box { margin-top: 1.5rem; padding: 1rem; background: var(--bg); border-radius: 10px; border: 1px solid var(--border); }
  .summary-grid { display: grid; grid-template-columns: auto 1fr 1fr 1fr; gap: 1px; background: var(--border); border-radius: 8px; overflow: hidden; margin-top: 0.5rem; }
  .summary-grid .cell { background: var(--bg); padding: 8px 10px; font-size: 0.78rem; }
  .summary-grid .header { font-weight: 700; text-align: center; }

  .spoken-note { text-align: center; margin-top: 1rem; padding: 0.7rem; background: rgba(245, 158, 11, 0.1); border: 1px dashed #f59e0b; border-radius: 8px; font-size: 0.82rem; color: #f59e0b; }
</style>
</head>
<body>
<figure>
  <div class="chart-wrapper">
    <div class="title">
      <h2>The Three De Particles: Three Adapters, One Sound</h2>
      <p>All pronounced "de" in speech — distinguished only in writing. Each connects a different type of modifier.</p>
    </div>

    <!-- Decision flow -->
    <div style="text-align:center; margin-bottom:0.5rem;">
      <span style="font-size:0.85rem; color:var(--accent); font-weight:600;">Which de? Ask: What am I modifying?</span>
    </div>
    <div class="flow-container">
      <div class="flow-question">
        <div class="q">Modifying a NOUN?</div>
        <div class="sub">What kind of noun?</div>
        <div style="margin-top:6px;"><span style="font-size:1.5rem; color:var(--de1); font-weight:800;">→ 的</span></div>
      </div>
      <div class="flow-question">
        <div class="q">Modifying a VERB?</div>
        <div class="sub">How is it done?</div>
        <div style="margin-top:6px;"><span style="font-size:1.5rem; color:var(--de2); font-weight:800;">→ 地</span></div>
      </div>
      <div class="flow-question">
        <div class="q">Evaluating a VERB?</div>
        <div class="sub">How well/much?</div>
        <div style="margin-top:6px;"><span style="font-size:1.5rem; color:var(--de3); font-weight:800;">→ 得</span></div>
      </div>
    </div>

    <!-- Three cards -->
    <div class="de-cards">
      <!-- 的 -->
      <div class="de-card de1">
        <div class="de-char" style="color:var(--de1);">的</div>
        <div class="de-name" style="color:var(--de1);">Attributive / Possessive</div>
        <div class="de-formula" style="background:rgba(244,63,94,0.15); color:var(--de1);">[X] + 的 + NOUN</div>
        <div class="de-question" style="color:var(--de1);">What KIND of noun?</div>
        <div class="de-desc">Links modifiers (adjectives, possessors, clauses) to nouns</div>

        <div class="example">
          <div class="zh">我<span style="color:var(--de1);">的</span>书</div>
          <div class="en">my book (possessive: I + 的 + book)</div>
        </div>
        <div class="example">
          <div class="zh">红<span style="color:var(--de1);">的</span>花</div>
          <div class="en">red flower (adjective + 的 + noun)</div>
        </div>
        <div class="example">
          <div class="zh">他买<span style="color:var(--de1);">的</span>书</div>
          <div class="en">the book (that) he bought (clause + 的 + noun)</div>
        </div>

        <div class="english-equiv" style="background:rgba(244,63,94,0.08);">
          <strong style="color:var(--de1);">English equivalents:</strong><br/>
          's (my), of (kind of), who/which/that (relative)
        </div>
      </div>

      <!-- 地 -->
      <div class="de-card de2">
        <div class="de-char" style="color:var(--de2);">地</div>
        <div class="de-name" style="color:var(--de2);">Adverbial Marker</div>
        <div class="de-formula" style="background:rgba(34,197,94,0.15); color:var(--de2);">[X] + 地 + VERB</div>
        <div class="de-question" style="color:var(--de2);">HOW is the action done?</div>
        <div class="de-desc">Converts adjectives into adverbs (before the verb)</div>

        <div class="example">
          <div class="zh">慢慢<span style="color:var(--de2);">地</span>走</div>
          <div class="en">walk slowly (slowly + 地 + walk)</div>
        </div>
        <div class="example">
          <div class="zh">高兴<span style="color:var(--de2);">地</span>唱歌</div>
          <div class="en">sing happily (happy + 地 + sing)</div>
        </div>
        <div class="example">
          <div class="zh">认真<span style="color:var(--de2);">地</span>学习</div>
          <div class="en">study seriously (serious + 地 + study)</div>
        </div>

        <div class="english-equiv" style="background:rgba(34,197,94,0.08);">
          <strong style="color:var(--de2);">English equivalent:</strong><br/>
          -ly suffix (slowly, happily, seriously)
        </div>
      </div>

      <!-- 得 -->
      <div class="de-card de3">
        <div class="de-char" style="color:var(--de3);">得</div>
        <div class="de-name" style="color:var(--de3);">Complement / Degree</div>
        <div class="de-formula" style="background:rgba(167,139,250,0.15); color:var(--de3);">VERB + 得 + [X]</div>
        <div class="de-question" style="color:var(--de3);">HOW WELL or HOW MUCH?</div>
        <div class="de-desc">Evaluates the degree or result of an action (after the verb)</div>

        <div class="example">
          <div class="zh">跑<span style="color:var(--de3);">得</span>快</div>
          <div class="en">run fast (run + 得 + fast)</div>
        </div>
        <div class="example">
          <div class="zh">说<span style="color:var(--de3);">得</span>很好</div>
          <div class="en">speak very well (speak + 得 + very good)</div>
        </div>
        <div class="example">
          <div class="zh">忙<span style="color:var(--de3);">得</span>没时间</div>
          <div class="en">so busy there's no time (busy + 得 + no time)</div>
        </div>

        <div class="english-equiv" style="background:rgba(167,139,250,0.08);">
          <strong style="color:var(--de3);">English equivalent:</strong><br/>
          "so...that," degree adverbs, result clauses
        </div>
      </div>
    </div>

    <!-- Key distinction -->
    <div class="summary-box">
      <h4 style="color:var(--accent); font-size:0.95rem; margin-bottom:0.5rem;">地 vs. 得 — The Crucial Difference</h4>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem;">
        <div style="padding:0.6rem; border-radius:8px; background:var(--de2-bg); border:1px solid var(--de2);">
          <div style="font-size:0.85rem; color:var(--de2); font-weight:700;">地 comes BEFORE the verb</div>
          <div style="font-size:0.82rem; margin-top:4px;">慢慢<span style="color:var(--de2); font-weight:700;">地</span>说 = speak slowly</div>
          <div style="font-size:0.75rem; color:var(--muted);">Describes manner of action (adverb)</div>
        </div>
        <div style="padding:0.6rem; border-radius:8px; background:var(--de3-bg); border:1px solid var(--de3);">
          <div style="font-size:0.85rem; color:var(--de3); font-weight:700;">得 comes AFTER the verb</div>
          <div style="font-size:0.82rem; margin-top:4px;">说<span style="color:var(--de3); font-weight:700;">得</span>很慢 = speak very slowly</div>
          <div style="font-size:0.75rem; color:var(--muted);">Evaluates degree/result of action (complement)</div>
        </div>
      </div>
    </div>

    <!-- Spoken note -->
    <div class="spoken-note">
      All three are pronounced identically as "de" in speech. Only distinguished in writing. Many native speakers mix them up in informal text — especially 的 and 地.
    </div>
  </div>
  <figcaption>
    <h2>Diagram 4: Three De Particles Comparison</h2>
    <p>Three homophonous particles each serve a distinct structural role: 的 modifies nouns, 地 creates adverbs before verbs, 得 evaluates degree after verbs. Together they replace English possessives, -ly adverbs, relative pronouns, and degree constructions.</p>
  </figcaption>
</figure>
</body>
</html>
