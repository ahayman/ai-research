  <figcaption>
    <strong>Figure 3:</strong> Mahler's pathway and IFS's 6 Fs share a perceptual front-end and diverge sharply at the back. Mahler's Stage 1 (Notice) directly scaffolds IFS's <em>Find</em> ("where in your body?") and <em>Focus</em> (sustain inward attention) — these are precisely the perceptual capacities IFS assumes a client already has. Mahler's Stage 2 (Connect body to feeling word) scaffolds <em>Feel toward</em> — the IFS gateway question that asks the client to read their own emotional stance. <strong>Where the protocols diverge:</strong> Mahler's Stage 3 (choose a regulating action) takes a self-regulation route. IFS at the same point continues into <em>beFriend</em> and <em>Fears</em> — parts-work moves that do not appear anywhere in Mahler's curriculum. So Mahler's curriculum could function as a perceptual front-end for IFS, but it is <em>not</em> parts work itself, and using it as preparation for IFS is not validated by either body of literature in adult populations. The conceptual fit is real; the empirical case is unproven.
  </figcaption>
</figure>
