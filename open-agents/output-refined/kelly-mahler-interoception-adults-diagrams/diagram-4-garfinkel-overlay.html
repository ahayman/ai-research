  <figcaption>
    <strong>Figure 4:</strong> Garfinkel's three-component model (2015 <em>Biological Psychology</em>; 2016 follow-up with Critchley) decomposes "interoception" into three empirically dissociable dimensions: <em>accuracy</em> (objective performance), <em>sensibility</em> (self-reported orientation inward), and <em>awareness</em> (metacognitive correspondence between confidence and accuracy). Mahler's clinical pathway maps onto two of the three but collapses the third. Stage 1 captures <em>some</em> of accuracy and <em>some</em> of sensibility without distinguishing them. Stage 2 builds the body-to-language bridge that overlaps with sensibility. <strong>Awareness — the metacognitive correspondence — is not measured in Mahler's pathway.</strong> An adult could become "more confident" they notice signals (Stage 1 self-report improvement) without their confidence actually tracking accurate detection. Garfinkel's framework predicts and measures this dissociation; Mahler's clinical model does not. For an alexithymic adult who already over-trusts or under-trusts their body signals, this missing layer is not academic — it is the precise dimension where intervention could go wrong without anyone in the clinical loop knowing it.
  </figcaption>
