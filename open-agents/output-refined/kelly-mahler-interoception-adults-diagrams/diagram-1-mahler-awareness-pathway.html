  <figcaption>
    <strong>Figure 1:</strong> Mahler's three-stage interoception awareness pathway, weighted by where the Interoception Curriculum actually concentrates. Stage 1 (Notice) is 64% of the curriculum — sixteen of twenty-five lessons are pure discrimination training. Stage 2 (Connect, four lessons) builds the body-to-feeling-word bridge. Stage 3 (Act, five lessons) translates the felt state into regulating action and produces what Mahler calls "body trust." The dotted feedback line indicates that body-trust experience refines Stage 1 discrimination over time. <strong>The structural point:</strong> the curriculum is dominated by perception-discrimination work; the labelling and regulation stages are comparatively brief. For an alexithymic adult, this means the curriculum's centre of gravity is precisely on the perceptual capacity that alexithymia disrupts — which is both where the work would be most needed and where it would be hardest.
  </figcaption>
</figure>
