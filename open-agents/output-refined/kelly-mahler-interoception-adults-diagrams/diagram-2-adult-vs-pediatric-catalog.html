  <figcaption>
    <strong>Figure 2:</strong> Mahler's catalog plotted by audience design (x-axis: child-designed → adult-designed) and by adult research evidence (y-axis: not-tested-in-adults → tested-in-adults). <strong>The top-right quadrant — adult-designed AND adult-tested — is empty.</strong> Nothing in the catalog has been tested in adult populations in a published peer-reviewed intervention study. Four products sit in the bottom-right (adult-designed, untested in adults): <em>My Interoception Workbook</em>, the <em>Lens-of-an-Autistic-Adult course</em>, the <em>Non-Speaking Client course</em>, and the adult version of the CAIA-3. The bulk of the catalog — Curriculum, Activity Cards, Yoga/Exercise Cards, the 2015 book, and all of Mahler's published research — sits in the bottom-left (pediatric-designed, never adult-tested). <em>Noticing Out Loud</em> is misnamed: it teaches adults to model interoception <em>for children</em>, so it lands closer to centre. <strong>The honest summary: a minority of Mahler's catalog is genuinely adult-targeted; the majority is pediatric work being recommended for adult use.</strong>
