        </div>

  <figcaption>
    <strong>Figure 1:</strong> The 12-cell tense-aspect matrix. English generates all verb forms by crossing 3 time references (present, past, future) with 4 aspect distinctions (simple, progressive, perfect, perfect progressive). Only present and past are true morphological tenses; the future is periphrastic (built with <em>will</em>). The entire system is combinatorial -- once you understand the two dimensions, you can produce and parse all 12 forms.
  </figcaption>
