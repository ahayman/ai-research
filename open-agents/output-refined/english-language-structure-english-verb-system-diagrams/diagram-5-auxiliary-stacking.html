<!-- Description: Shows the fixed order in which English auxiliaries stack and what form each slot triggers in the following element -->

<figure class="concept-diagram" id="diagram-auxiliary-stacking">
  <div class="diagram-container">
    <pre class="mermaid">
flowchart LR
    subgraph pipeline["AUXILIARY STACKING ORDER (Fixed -- No Rearrangement Possible)"]
        direction LR
        S1["<b>SLOT 1</b><br/>Modal<br/><i>can, will, must,<br/>may, should...</i>"]
        S2["<b>SLOT 2</b><br/>Perfect<br/><i>have</i>"]
        S3["<b>SLOT 3</b><br/>Progressive<br/><i>be</i>"]
        S4["<b>SLOT 4</b><br/>Passive<br/><i>be</i>"]
        S5["<b>SLOT 5</b><br/>Main Verb"]

        S1 -->|"triggers<br/>bare infinitive"| S2
        S2 -->|"triggers<br/>past participle"| S3
        S3 -->|"triggers<br/>-ing form"| S4
        S4 -->|"triggers<br/>past participle"| S5
    end

    subgraph full["MAXIMUM EXAMPLE"]
        direction LR
        F1["<b>might</b><br/><i>modal</i>"]
        F2["<b>have</b><br/><i>perfect</i>"]
        F3["<b>been</b><br/><i>progressive</i>"]
        F4["<b>being</b><br/><i>passive</i>"]
        F5["<b>observed</b><br/><i>main verb</i>"]
        F1 --- F2 --- F3 --- F4 --- F5
    end

    subgraph common["COMMON COMBINATIONS"]
        direction TB
        C1["Simple: <b>reads</b>"]
        C2["Progressive: <b>is reading</b>"]
        C3["Perfect: <b>has read</b>"]
        C4["Modal + Perfect: <b>must have read</b>"]
        C5["Perfect + Progressive: <b>has been reading</b>"]
        C6["Modal + Passive: <b>can be seen</b>"]
        C7["Perfect + Passive: <b>has been seen</b>"]
        C8["Full stack: <b>might have been being observed</b>"]
    end

    style pipeline fill:#eff6ff,stroke:#3b82f6,stroke-width:2px

    </pre>

    <div class="rule-box">
      <div class="rule-title">THE RULE: Each Slot Determines the Form of the Next</div>
      <div class="rule-grid">
        <div class="rule-item"><span class="slot s1">Modal</span> &rarr; bare infinitive: "can <b>go</b>"</div>
        <div class="rule-item"><span class="slot s2">Have</span> &rarr; past participle: "has <b>gone</b>"</div>
        <div class="rule-item"><span class="slot s3">Be (prog)</span> &rarr; -ing form: "is <b>going</b>"</div>
        <div class="rule-item"><span class="slot s4">Be (pass)</span> &rarr; past participle: "was <b>seen</b>"</div>
      </div>
    </div>
  </div>
  <figcaption>
    <strong>Figure 5:</strong> The fixed auxiliary stacking order in English. Auxiliaries must appear in exactly this sequence: Modal, then Perfect (<em>have</em>), then Progressive (<em>be</em>), then Passive (<em>be</em>), then Main Verb. Each slot determines the morphological form of the next element in the chain. This pipeline is absolute -- no reordering is possible. The maximum stack is "She might have been being observed" (all 5 slots filled).
  </figcaption>
