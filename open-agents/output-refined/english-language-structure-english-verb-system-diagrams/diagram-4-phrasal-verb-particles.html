  <div class="diagram-container">

mindmap
  root((PHRASAL VERB<br/>PARTICLE<br/>SEMANTICS))
    **UP** ↑
      Spatial: upward motion
      ::icon(fa fa-arrow-up)
      Completion
        eat up, drink up
        use up, finish up
        clean up
      Increase
        speed up, heat up
        build up, turn up
      Visibility
        show up, come up
        pop up, bring up
      Improvement
        cheer up, fix up
        make up reconcile
    **DOWN** ↓
      Spatial: downward motion
      ::icon(fa fa-arrow-down)
      Decrease
        slow down, cool down
        turn down, calm down
      Cessation
        break down, shut down
        close down
      Recording
        write down, note down
        put down, pin down
      Failure
        let down, break down
    **OUT** →
      Spatial: outward motion
      Exhaustion
        burn out, wear out
        tire out, die out
        sell out
      Distribution
        hand out, give out
        spread out, lay out
      Discovery
        find out, figure out
        turn out, work out
      Exclusion
        leave out, cut out
        lock out, rule out
    **OFF** ✂
      Spatial: separation
      Disconnection
        cut off, break off
        take off, rip off
      Departure
        set off, head off
        drive off, see off
      Cancellation
        call off, put off
        hold off, back off
      Triggering
        set off alarm
        go off, kick off

      Spatial: inward motion
      Involvement
        join in, fit in
        blend in, pitch in
      Submission
        give in, cave in
        hand in
      Arrival
        come in, check in
        drop in
    **OVER** ⤴
      Spatial: across or above
      Examination
        look over, go over

    <div class="pattern-insight">
      <div class="insight-title">THE PATTERN FOR LEARNERS</div>
      <div class="insight-text">
        Phrasal verbs are NOT random. Each particle carries a core spatial meaning that extends metaphorically into abstract domains. <strong>UP = completion/increase. DOWN = decrease/cessation. OUT = exhaustion/distribution. OFF = separation. IN = involvement. OVER = examination/repetition.</strong> Once you learn the particle's metaphorical profile, you can predict or decode unfamiliar phrasal verbs.
      </div>
    </div>

    <strong>Figure 4:</strong> Phrasal verb particle semantics map. Each English particle (up, down, out, off, in, over) carries a core spatial meaning that extends systematically into abstract domains through metaphorical mapping. UP moves from upward motion to completion, increase, visibility, and improvement. OUT moves from outward motion to exhaustion, distribution, discovery, and exclusion. These patterns are consistent enough to serve as a prediction tool for unfamiliar phrasal verbs.
