        E_should["<b>should</b><br/>Expectation<br/><i>'She should be here by now'</i>"]

        E_will["<b>will</b><br/>Prediction/certainty<br/><i>'She will be at home'</i>"]
        E_must["<b>must</b><br/>Logical necessity<br/><i>'She must be home' = I conclude</i>"]
    end

    subgraph deontic["DEONTIC (About Obligation / Permission)"]

        D_might["<b>might</b><br/>(Rare deontic use)"]

    <div class="syntax-box">
      <div class="syntax-title">SYNTACTIC PROPERTIES (What Makes Modals a Special Class)</div>
      <div class="syntax-grid">
        <div class="syntax-item bad">No -s: She can go, NOT *She cans go</div>
        <div class="syntax-item bad">No infinitive: *to can, *to must</div>
        <div class="syntax-item bad">No past participle: *have canned, *have musted</div>
        <div class="syntax-item bad">No stacking: *She will can go</div>
        <div class="syntax-item good">Bare infinitive follows: can go, must leave</div>
        <div class="syntax-item good">Invert for questions: Can she go?</div>
      </div>
    </div>
  </div>
  <figcaption>
    <strong>Figure 2:</strong> The modal dual-reading system. Every English modal verb carries both an epistemic reading (about the speaker's knowledge and certainty) and a deontic reading (about obligation, permission, or ability). Historically, deontic meanings came first in Old English; epistemic meanings developed later through metaphorical extension. The modals form a closed, syntactically defective class -- they cannot take -s, infinitives, or past participles. Semi-modals (<em>have to</em>, <em>be able to</em>) fill the gaps this defectiveness creates.
  </figcaption>
</figure>
