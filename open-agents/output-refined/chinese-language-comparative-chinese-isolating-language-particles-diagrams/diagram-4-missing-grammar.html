<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>What Chinese Does NOT Have -- The Absence Inventory</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --accent: #4361ee; --accent-light: #e8edff;
    --chinese: #e63946; --english: #2a9d8f; --french: #7209b7; --arabic: #ff6b35;
    --absent: #e63946; --absent-bg: #ffe0e3;
    --present: #2a9d8f; --present-bg: #d4f5f0;
    --muted: #6c757d; --caption-bg: #f8f9fa;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a; --fg: #e8e8f0; --surface: #1a1a2e; --border: #2d2d44;
      --accent: #6b8aff; --accent-light: #1e2a4a;
      --chinese: #ff6b6b; --english: #4ecdc4; --french: #c77dff; --arabic: #ff8c5a;
      --absent: #ff6b6b; --absent-bg: #3a1a1a;
      --present: #4ecdc4; --present-bg: #1a3a38;
      --muted: #9a9ab0; --caption-bg: #1a1a2e;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--fg); display: flex; justify-content: center; padding: 2rem 1rem; line-height: 1.6; }
  figure { max-width: 920px; width: 100%; }
  figcaption { text-align: center; margin-top: 1.5rem; padding: 1rem 1.5rem; background: var(--caption-bg); border-radius: 8px; border: 1px solid var(--border); }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  .chart-wrapper { overflow-x: auto; border: 1px solid var(--border); border-radius: 10px; background: var(--surface); padding: 1.5rem; }
  table { width: 100%; border-collapse: collapse; }
  th, td { padding: 0.6rem 0.5rem; text-align: center; border: 1px solid var(--border); font-size: 0.82rem; }
  th { font-weight: 600; font-size: 0.78rem; }
  .no-cell { background: var(--absent-bg); color: var(--absent); font-weight: 700; }
  .some-cell { background: var(--present-bg); color: var(--present); }
  .yes-cell { background: var(--surface); }
  .heavy-cell { background: var(--surface); font-weight: 600; }
  .replace-cell { font-size: 0.78rem; text-align: left; }
  .insight-box { margin-top: 1rem; padding: 1rem; background: var(--accent-light); border-radius: 8px; border: 1px solid var(--accent); }
  .insight-box h3 { font-size: 0.95rem; color: var(--accent); margin-bottom: 0.4rem; }
  .insight-box p { font-size: 0.85rem; }
</style>
</head>
<body>
<figure>
  <div class="chart-wrapper">
    <h3 style="text-align:center; color:var(--fg); margin-bottom:0.8rem;">The Absence Inventory: What Chinese Lacks (and How It Compensates)</h3>
    <table>
      <thead>
        <tr>
          <th style="width:16%">Grammar Feature</th>
          <th style="width:14%; color:var(--chinese)">Chinese</th>
          <th style="width:14%; color:var(--english)">English</th>
          <th style="width:14%; color:var(--french)">French</th>
          <th style="width:14%; color:var(--arabic)">Arabic</th>
          <th style="width:28%">Chinese Replacement</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td style="font-weight:600; text-align:left;">Verb conjugation</td>
          <td class="no-cell">NO<br><small>去 = 去 always</small></td>
          <td class="some-cell">Some<br><small>go/goes/went</small></td>
          <td class="heavy-cell">Extensive<br><small>40+ forms</small></td>
          <td class="heavy-cell">Very rich<br><small>person+gender+tense</small></td>
          <td class="replace-cell">Time words (昨天, 明天) + aspect particles (了, 着, 过)</td>
        </tr>
        <tr>
          <td style="font-weight:600; text-align:left;">Noun plurals</td>
          <td class="no-cell">NO<br><small>猫 = cat(s)</small></td>
          <td class="some-cell">Yes<br><small>cat/cats, mice</small></td>
          <td class="some-cell">Yes<br><small>chat/chats</small></td>
          <td class="heavy-cell">Broken plurals<br><small>whole-word reshape</small></td>
          <td class="replace-cell">Numbers + classifiers: 三只猫 (three cats); or context</td>
        </tr>
        <tr>
          <td style="font-weight:600; text-align:left;">Grammatical gender</td>
          <td class="no-cell">NO<br><small>he/she/it = ta</small></td>
          <td class="some-cell">Pronouns only<br><small>he/she/it</small></td>
          <td class="heavy-cell">All nouns<br><small>le/la, un/une</small></td>
          <td class="heavy-cell">All nouns + verbs<br><small>pervasive agreement</small></td>
          <td class="replace-cell">Written characters distinguish (他/她/它) but all pronounced "ta"</td>
        </tr>
        <tr>
          <td style="font-weight:600; text-align:left;">Articles</td>
          <td class="no-cell">NO<br><small>猫 = a/the cat(s)</small></td>
          <td class="some-cell">Yes<br><small>a/the</small></td>
          <td class="heavy-cell">3 systems<br><small>le/la/un/une/du</small></td>
          <td class="some-cell">Yes<br><small>al-</small></td>
          <td class="replace-cell">Demonstratives (这/那) when specificity matters; otherwise context</td>
        </tr>
        <tr>
          <td style="font-weight:600; text-align:left;">Case marking</td>
          <td class="no-cell">NO<br><small>我 = I/me</small></td>
          <td class="some-cell">Pronouns<br><small>I/me, he/him</small></td>
          <td class="some-cell">Pronouns<br><small>je/me, il/lui</small></td>
          <td class="heavy-cell">Full case system<br><small>nominative/acc/gen</small></td>
          <td class="replace-cell">Word order: 我看你 (I see you) vs. 你看我 (You see me)</td>
        </tr>
        <tr>
          <td style="font-weight:600; text-align:left;">Tense marking</td>
          <td class="no-cell">NO<br><small>no past/present/future on verbs</small></td>
          <td class="some-cell">Obligatory<br><small>-ed, will, etc.</small></td>
          <td class="heavy-cell">Obligatory<br><small>conjugation tables</small></td>
          <td class="heavy-cell">Obligatory<br><small>verb patterns</small></td>
          <td class="replace-cell">Time words + aspect particles + context</td>
        </tr>
      </tbody>
    </table>

    <div class="insight-box">
      <h3>THE PATTERN: Nothing Is Missing -- Everything Is Rearranged</h3>
      <p>Chinese is not "missing" grammar. Every function that other languages encode INSIDE words through morphological changes, Chinese encodes OUTSIDE words through three mechanisms:</p>
      <p style="margin-top:0.4rem;">
        <strong style="color:var(--chinese)">1. Word order</strong> -- position determines grammatical role (我看你 vs. 你看我)<br/>
        <strong style="color:var(--chinese)">2. Particles</strong> -- small function words mark aspect, modification, mood (~15-20 core particles)<br/>
        <strong style="color:var(--chinese)">3. Context</strong> -- shared knowledge supplies tense, number, definiteness when not explicitly marked
      </p>
      <p style="margin-top:0.5rem; color:var(--accent); font-weight:600;">The consequence: ZERO irregular forms. No "went" for "go." No "mice" for "mouse." No agreement errors. The word is sacred and unchangeable.</p>
    </div>
  </div>
  <figcaption>
    <h2>Figure 4 -- The Absence Inventory: What Chinese Lacks and How It Compensates</h2>
    <p>Chinese lacks verb conjugation, noun plurals, grammatical gender, articles, case marking, and tense marking on verbs. For each "absent" feature, Chinese has a replacement mechanism: word order, particles, context, numbers, classifiers, or demonstratives. The result is zero irregular forms -- a perfectly regular system where complexity lies in understanding function rather than memorizing form.</p>
  </figcaption>
</figure>
</body>
</html>
