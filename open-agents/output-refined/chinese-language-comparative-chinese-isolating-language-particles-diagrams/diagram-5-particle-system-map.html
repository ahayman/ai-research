<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chinese Particle System Architecture</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --accent: #4361ee; --accent-light: #e8edff;
    --structural: #e63946; --structural-bg: #ffe0e3;
    --aspect: #2a9d8f; --aspect-bg: #d4f5f0;
    --modal: #7209b7; --modal-bg: #f3e8ff;
    --other: #ff6b35; --other-bg: #fff3ec;
    --muted: #6c757d; --caption-bg: #f8f9fa;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a; --fg: #e8e8f0; --surface: #1a1a2e; --border: #2d2d44;
      --accent: #6b8aff; --accent-light: #1e2a4a;
      --structural: #ff6b6b; --structural-bg: #3a1a1a;
      --aspect: #4ecdc4; --aspect-bg: #1a3a38;
      --modal: #c77dff; --modal-bg: #1e0a2e;
      --other: #ff8c5a; --other-bg: #2a1a10;
      --muted: #9a9ab0; --caption-bg: #1a1a2e;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--fg); display: flex; justify-content: center; padding: 2rem 1rem; line-height: 1.6; }
  figure { max-width: 920px; width: 100%; }
  figcaption { text-align: center; margin-top: 1.5rem; padding: 1rem 1.5rem; background: var(--caption-bg); border-radius: 8px; border: 1px solid var(--border); }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  .chart-wrapper { overflow-x: auto; border: 1px solid var(--border); border-radius: 10px; background: var(--surface); padding: 1.5rem; }
  svg { display: block; margin: 0 auto; }
</style>
</head>
<body>
<figure>
  <div class="chart-wrapper">
    <svg viewBox="0 0 880 600" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
      <!-- Central hub -->
      <text x="440" y="28" text-anchor="middle" font-size="17" fill="var(--fg)" font-weight="700">Chinese Particle System Architecture</text>
      <text x="440" y="48" text-anchor="middle" font-size="12" fill="var(--muted)">~15-20 core particles handle the vast majority of Chinese grammar</text>

      <circle cx="440" cy="160" r="60" fill="var(--accent-light)" stroke="var(--accent)" stroke-width="2.5"/>
      <text x="440" y="150" text-anchor="middle" font-size="13" fill="var(--accent)" font-weight="700">Chinese</text>
      <text x="440" y="168" text-anchor="middle" font-size="13" fill="var(--accent)" font-weight="700">Particles</text>

      <!-- STRUCTURAL PARTICLES BRANCH -->
      <line x1="385" y1="140" x2="140" y2="80" stroke="var(--structural)" stroke-width="2"/>
      <rect x="20" y="55" width="250" height="155" rx="10" fill="var(--structural-bg)" stroke="var(--structural)" stroke-width="2"/>
      <text x="145" y="78" text-anchor="middle" font-size="14" fill="var(--structural)" font-weight="700">Structural Particles</text>
      <text x="145" y="93" text-anchor="middle" font-size="10" fill="var(--fg)">Connect modifiers to content words</text>

      <text x="40" y="118" font-size="24" fill="var(--structural)" font-weight="700">的</text>
      <text x="70" y="115" font-size="11" fill="var(--fg)">[X] 的 NOUN</text>
      <text x="70" y="130" font-size="10" fill="var(--muted)">attributive: 我的书 (my book)</text>

      <text x="40" y="158" font-size="24" fill="var(--structural)" font-weight="700">地</text>
      <text x="70" y="155" font-size="11" fill="var(--fg)">[X] 地 VERB</text>
      <text x="70" y="170" font-size="10" fill="var(--muted)">adverbial: 慢慢地走 (walk slowly)</text>

      <text x="40" y="198" font-size="24" fill="var(--structural)" font-weight="700">得</text>
      <text x="70" y="195" font-size="11" fill="var(--fg)">VERB 得 [X]</text>
      <text x="70" y="210" font-size="10" fill="var(--muted)">complement: 跑得快 (run fast)</text>

      <!-- ASPECT PARTICLES BRANCH -->
      <line x1="495" y1="140" x2="740" y2="80" stroke="var(--aspect)" stroke-width="2"/>
      <rect x="610" y="55" width="250" height="155" rx="10" fill="var(--aspect-bg)" stroke="var(--aspect)" stroke-width="2"/>
      <text x="735" y="78" text-anchor="middle" font-size="14" fill="var(--aspect)" font-weight="700">Aspect Particles</text>
      <text x="735" y="93" text-anchor="middle" font-size="10" fill="var(--fg)">Mark the temporal shape of actions</text>

      <text x="630" y="118" font-size="24" fill="var(--aspect)" font-weight="700">了</text>
      <text x="660" y="115" font-size="11" fill="var(--fg)">Completed / changed</text>
      <text x="660" y="130" font-size="10" fill="var(--muted)">我吃了 (I ate / I've eaten)</text>

      <text x="630" y="158" font-size="24" fill="var(--aspect)" font-weight="700">着</text>
      <text x="660" y="155" font-size="11" fill="var(--fg)">Ongoing / maintained</text>
      <text x="660" y="170" font-size="10" fill="var(--muted)">门开着 (door is open)</text>

      <text x="630" y="198" font-size="24" fill="var(--aspect)" font-weight="700">过</text>
      <text x="660" y="195" font-size="11" fill="var(--fg)">Experienced / "ever"</text>
      <text x="660" y="210" font-size="10" fill="var(--muted)">我去过中国 (I've been to China)</text>

      <!-- MODAL PARTICLES BRANCH -->
      <line x1="400" y1="210" x2="140" y2="310" stroke="var(--modal)" stroke-width="2"/>
      <rect x="20" y="270" width="250" height="195" rx="10" fill="var(--modal-bg)" stroke="var(--modal)" stroke-width="2"/>
      <text x="145" y="293" text-anchor="middle" font-size="14" fill="var(--modal)" font-weight="700">Modal / Sentence-Final</text>
      <text x="145" y="308" text-anchor="middle" font-size="10" fill="var(--fg)">Modify mood of entire sentences</text>

      <text x="40" y="338" font-size="24" fill="var(--modal)" font-weight="700">吗</text>
      <text x="70" y="335" font-size="11" fill="var(--fg)">Yes/No question</text>
      <text x="70" y="350" font-size="10" fill="var(--muted)">你好吗？ (Are you well?)</text>

      <text x="40" y="378" font-size="24" fill="var(--modal)" font-weight="700">吧</text>
      <text x="70" y="375" font-size="11" fill="var(--fg)">Suggestion / softener</text>
      <text x="70" y="390" font-size="10" fill="var(--muted)">走吧 (Let's go)</text>

      <text x="40" y="418" font-size="24" fill="var(--modal)" font-weight="700">呢</text>
      <text x="70" y="415" font-size="11" fill="var(--fg)">Continuation / "what about?"</text>
      <text x="70" y="430" font-size="10" fill="var(--muted)">你呢？ (And you?)</text>

      <text x="40" y="458" font-size="24" fill="var(--modal)" font-weight="700">啊</text>
      <text x="70" y="455" font-size="11" fill="var(--fg)">Exclamation / warmth</text>
      <text x="70" y="470" font-size="10" fill="var(--muted)">好啊！ (Great!)</text>

      <!-- OTHER FUNCTIONAL WORDS BRANCH -->
      <line x1="480" y1="210" x2="740" y2="310" stroke="var(--other)" stroke-width="2"/>
      <rect x="610" y="270" width="250" height="195" rx="10" fill="var(--other-bg)" stroke="var(--other)" stroke-width="2"/>
      <text x="735" y="293" text-anchor="middle" font-size="14" fill="var(--other)" font-weight="700">Other Functional Words</text>
      <text x="735" y="308" text-anchor="middle" font-size="10" fill="var(--fg)">Special constructions and markers</text>

      <text x="630" y="338" font-size="24" fill="var(--other)" font-weight="700">把</text>
      <text x="660" y="335" font-size="11" fill="var(--fg)">Disposal / object-fronting</text>
      <text x="660" y="350" font-size="10" fill="var(--muted)">把书放下 (put the book down)</text>

      <text x="630" y="378" font-size="24" fill="var(--other)" font-weight="700">被</text>
      <text x="660" y="375" font-size="11" fill="var(--fg)">Passive voice</text>
      <text x="660" y="390" font-size="10" fill="var(--muted)">被打了 (was hit)</text>

      <text x="630" y="418" font-size="24" fill="var(--other)" font-weight="700">在</text>
      <text x="660" y="415" font-size="11" fill="var(--fg)">Progressive / location</text>
      <text x="660" y="430" font-size="10" fill="var(--muted)">在看书 (is reading)</text>

      <text x="630" y="458" font-size="20" fill="var(--other)" font-weight="700">会/能/可以</text>
      <text x="660" y="470" font-size="11" fill="var(--fg)">Modal: can/will/may</text>

      <!-- KEY INSIGHT -->
      <rect x="120" y="500" width="640" height="80" rx="10" fill="var(--accent-light)" stroke="var(--accent)" stroke-width="2"/>
      <text x="440" y="525" text-anchor="middle" font-size="14" fill="var(--accent)" font-weight="700">A FINITE, CATEGORIZABLE SYSTEM</text>
      <text x="440" y="545" text-anchor="middle" font-size="12" fill="var(--fg)">3 structural + 3 aspect + 4 modal + ~5-10 other = ~15-20 particles</text>
      <text x="440" y="565" text-anchor="middle" font-size="12" fill="var(--fg)">These handle what English does with verb conjugation, auxiliaries, word-order changes,</text>
      <text x="440" y="580" text-anchor="middle" font-size="12" fill="var(--fg)">suffixes (-ly, -ed, -s, -ing, 's), tag questions, and intonation patterns.</text>
    </svg>
  </div>
  <figcaption>
    <h2>Figure 5 -- Chinese Particle System Architecture: Complete Map</h2>
    <p>The entire Chinese grammatical particle system consists of approximately 15-20 core particles organized into four categories: structural (的/地/得), aspect (了/着/过), modal/sentence-final (吗/吧/呢/啊), and other functional words (把/被/在 + modal verbs). This finite set handles virtually all the grammatical functions that English distributes across verb conjugation, auxiliaries, suffixes, word-order changes, and intonation.</p>
  </figcaption>
</figure>
</body>
</html>
