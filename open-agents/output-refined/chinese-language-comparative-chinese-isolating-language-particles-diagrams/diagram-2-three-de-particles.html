<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Three De Particles -- Function Mapping</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --accent: #4361ee; --accent-light: #e8edff;
    --de1: #e63946; --de1-bg: #ffe0e3;
    --de2: #2a9d8f; --de2-bg: #d4f5f0;
    --de3: #7209b7; --de3-bg: #f3e8ff;
    --muted: #6c757d; --caption-bg: #f8f9fa;
    --english: #ff6b35;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a; --fg: #e8e8f0; --surface: #1a1a2e; --border: #2d2d44;
      --accent: #6b8aff; --accent-light: #1e2a4a;
      --de1: #ff6b6b; --de1-bg: #3a1a1a;
      --de2: #4ecdc4; --de2-bg: #1a3a38;
      --de3: #c77dff; --de3-bg: #1e0a2e;
      --muted: #9a9ab0; --caption-bg: #1a1a2e;
      --english: #ff8c5a;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--fg); display: flex; justify-content: center; padding: 2rem 1rem; line-height: 1.6; }
  figure { max-width: 920px; width: 100%; }
  figcaption { text-align: center; margin-top: 1.5rem; padding: 1rem 1.5rem; background: var(--caption-bg); border-radius: 8px; border: 1px solid var(--border); }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  .chart-wrapper { overflow-x: auto; border: 1px solid var(--border); border-radius: 10px; background: var(--surface); padding: 1.5rem; }
  svg { display: block; margin: 0 auto; }
</style>
</head>
<body>
<figure>
  <div class="chart-wrapper">
    <svg viewBox="0 0 880 620" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
      <text x="440" y="28" text-anchor="middle" font-size="17" fill="var(--fg)" font-weight="700">The Three 的/地/得 Particles</text>
      <text x="440" y="48" text-anchor="middle" font-size="12" fill="var(--muted)">Three universal adapters -- all pronounced "de" but written differently</text>

      <!-- DE 1: 的 - Attributive -->
      <rect x="30" y="70" width="820" height="150" rx="10" fill="var(--de1-bg)" stroke="var(--de1)" stroke-width="2"/>
      <text x="80" y="100" font-size="40" fill="var(--de1)" font-weight="700">的</text>
      <text x="130" y="95" font-size="16" fill="var(--de1)" font-weight="700">Attributive / Possessive</text>
      <text x="130" y="115" font-size="12" fill="var(--fg)">Modifies NOUNS -- connects any descriptor to a noun</text>

      <!-- Pattern -->
      <rect x="50" y="128" width="150" height="30" rx="6" fill="var(--surface)" stroke="var(--de1)" stroke-width="1.5"/>
      <text x="125" y="148" text-anchor="middle" font-size="12" fill="var(--de1)" font-weight="600">[MODIFIER]</text>
      <text x="215" y="148" font-size="16" fill="var(--de1)" font-weight="700">+  的  +</text>
      <rect x="270" y="128" width="100" height="30" rx="6" fill="var(--surface)" stroke="var(--de1)" stroke-width="1.5"/>
      <text x="320" y="148" text-anchor="middle" font-size="12" fill="var(--de1)" font-weight="600">NOUN</text>

      <!-- Examples -->
      <text x="420" y="105" font-size="12" fill="var(--fg)">我<span style="font-weight:700">的</span>书</text>
      <text x="420" y="105" font-size="12" fill="var(--fg)">我的书  =  my book</text>
      <text x="420" y="125" font-size="12" fill="var(--fg)">红的花  =  red flower</text>
      <text x="420" y="145" font-size="12" fill="var(--fg)">他买的书  =  the book (that) he bought</text>
      <text x="680" y="105" font-size="11" fill="var(--english)" font-style="italic">English: 's, of, that/which</text>
      <text x="680" y="125" font-size="11" fill="var(--english)" font-style="italic">adjective position</text>
      <text x="680" y="145" font-size="11" fill="var(--english)" font-style="italic">relative clauses</text>

      <text x="50" y="205" font-size="11" fill="var(--de1)" font-weight="600">One particle replaces: possessives, adjective positioning, AND relative clauses</text>

      <!-- DE 2: 地 - Adverbial -->
      <rect x="30" y="230" width="820" height="140" rx="10" fill="var(--de2-bg)" stroke="var(--de2)" stroke-width="2"/>
      <text x="80" y="260" font-size="40" fill="var(--de2)" font-weight="700">地</text>
      <text x="130" y="255" font-size="16" fill="var(--de2)" font-weight="700">Adverbial</text>
      <text x="130" y="275" font-size="12" fill="var(--fg)">Modifies VERBS -- describes HOW the action is done</text>

      <!-- Pattern -->
      <rect x="50" y="290" width="150" height="30" rx="6" fill="var(--surface)" stroke="var(--de2)" stroke-width="1.5"/>
      <text x="125" y="310" text-anchor="middle" font-size="12" fill="var(--de2)" font-weight="600">[MANNER]</text>
      <text x="215" y="310" font-size="16" fill="var(--de2)" font-weight="700">+  地  +</text>
      <rect x="270" y="290" width="100" height="30" rx="6" fill="var(--surface)" stroke="var(--de2)" stroke-width="1.5"/>
      <text x="320" y="310" text-anchor="middle" font-size="12" fill="var(--de2)" font-weight="600">VERB</text>

      <text x="420" y="265" font-size="12" fill="var(--fg)">慢慢地走  =  walk slowly</text>
      <text x="420" y="285" font-size="12" fill="var(--fg)">高兴地唱歌  =  sing happily</text>
      <text x="680" y="265" font-size="11" fill="var(--english)" font-style="italic">English: -ly suffix</text>
      <text x="680" y="285" font-size="11" fill="var(--english)" font-style="italic">(slow -> slowly)</text>

      <text x="50" y="357" font-size="11" fill="var(--de2)" font-weight="600">English changes word form (add -ly); Chinese adds a particle -- the word itself never changes</text>

      <!-- DE 3: 得 - Complement -->
      <rect x="30" y="380" width="820" height="140" rx="10" fill="var(--de3-bg)" stroke="var(--de3)" stroke-width="2"/>
      <text x="80" y="410" font-size="40" fill="var(--de3)" font-weight="700">得</text>
      <text x="130" y="405" font-size="16" fill="var(--de3)" font-weight="700">Complement / Evaluation</text>
      <text x="130" y="425" font-size="12" fill="var(--fg)">Evaluates VERBS -- describes how WELL or to what DEGREE</text>

      <!-- Pattern (reversed!) -->
      <rect x="50" y="440" width="100" height="30" rx="6" fill="var(--surface)" stroke="var(--de3)" stroke-width="1.5"/>
      <text x="100" y="460" text-anchor="middle" font-size="12" fill="var(--de3)" font-weight="600">VERB</text>
      <text x="165" y="460" font-size="16" fill="var(--de3)" font-weight="700">+  得  +</text>
      <rect x="220" y="440" width="150" height="30" rx="6" fill="var(--surface)" stroke="var(--de3)" stroke-width="1.5"/>
      <text x="295" y="460" text-anchor="middle" font-size="12" fill="var(--de3)" font-weight="600">[EVALUATION]</text>

      <text x="420" y="415" font-size="12" fill="var(--fg)">跑得快  =  run fast</text>
      <text x="420" y="435" font-size="12" fill="var(--fg)">说得很好  =  speak very well</text>
      <text x="420" y="455" font-size="12" fill="var(--fg)">忙得没时间  =  so busy (that) no time</text>
      <text x="680" y="415" font-size="11" fill="var(--english)" font-style="italic">English: adverbs, "so...that"</text>
      <text x="680" y="435" font-size="11" fill="var(--english)" font-style="italic">result clauses</text>

      <text x="50" y="507" font-size="11" fill="var(--de3)" font-weight="600">Note: 得 comes AFTER the verb -- the only "de" where the particle follows the content word</text>

      <!-- PATTERN BOX -->
      <rect x="30" y="530" width="820" height="75" rx="10" fill="var(--accent-light)" stroke="var(--accent)" stroke-width="2"/>
      <text x="440" y="555" text-anchor="middle" font-size="14" fill="var(--accent)" font-weight="700">THE ELEGANT TRIPTYCH</text>
      <text x="200" y="580" text-anchor="middle" font-size="12" fill="var(--de1)" font-weight="600">[X] 的 NOUN</text>
      <text x="200" y="596" text-anchor="middle" font-size="10" fill="var(--de1)">what kind?</text>
      <text x="440" y="580" text-anchor="middle" font-size="12" fill="var(--de2)" font-weight="600">[X] 地 VERB</text>
      <text x="440" y="596" text-anchor="middle" font-size="10" fill="var(--de2)">how done?</text>
      <text x="680" y="580" text-anchor="middle" font-size="12" fill="var(--de3)" font-weight="600">VERB 得 [X]</text>
      <text x="680" y="596" text-anchor="middle" font-size="10" fill="var(--de3)">how well?</text>
    </svg>
  </div>
  <figcaption>
    <h2>Figure 2 -- The Three De Particles: A Clean Triptych</h2>
    <p>Three particles, all pronounced "de," handle all modification in Chinese. 的 connects modifiers to nouns (attributive), 地 connects manner descriptions to verbs (adverbial), and 得 connects evaluations to verbs (complement). English uses possessives, adjective position, the -ly suffix, and result clauses for these same functions. Chinese uses three invariant particles -- the words themselves never change form.</p>
  </figcaption>
</figure>
</body>
</html>
