<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Isolating-Synthetic Spectrum</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --accent: #4361ee; --accent-light: #e8edff;
    --chinese: #e63946; --chinese-bg: #ffe0e3;
    --english: #2a9d8f; --english-bg: #d4f5f0;
    --french: #7209b7; --french-bg: #f3e8ff;
    --arabic: #ff6b35; --arabic-bg: #fff3ec;
    --muted: #6c757d; --caption-bg: #f8f9fa;
    --spectrum-start: #e63946; --spectrum-end: #ff6b35;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a; --fg: #e8e8f0; --surface: #1a1a2e; --border: #2d2d44;
      --accent: #6b8aff; --accent-light: #1e2a4a;
      --chinese: #ff6b6b; --chinese-bg: #3a1a1a;
      --english: #4ecdc4; --english-bg: #1a3a38;
      --french: #c77dff; --french-bg: #1e0a2e;
      --arabic: #ff8c5a; --arabic-bg: #2a1a10;
      --muted: #9a9ab0; --caption-bg: #1a1a2e;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--fg); display: flex; justify-content: center; padding: 2rem 1rem; line-height: 1.6; }
  figure { max-width: 920px; width: 100%; }
  figcaption { text-align: center; margin-top: 1.5rem; padding: 1rem 1.5rem; background: var(--caption-bg); border-radius: 8px; border: 1px solid var(--border); }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  .chart-wrapper { overflow-x: auto; border: 1px solid var(--border); border-radius: 10px; background: var(--surface); padding: 1.5rem; }
  svg { display: block; margin: 0 auto; }
</style>
</head>
<body>
<figure>
  <div class="chart-wrapper">
    <svg viewBox="0 0 880 600" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
      <text x="440" y="28" text-anchor="middle" font-size="17" fill="var(--fg)" font-weight="700">The Morphological Typology Spectrum</text>
      <text x="440" y="48" text-anchor="middle" font-size="12" fill="var(--muted)">Where languages fall on the isolating-to-synthetic continuum</text>

      <!-- Spectrum bar -->
      <defs>
        <linearGradient id="spectrum" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:var(--chinese);stop-opacity:0.7"/>
          <stop offset="30%" style="stop-color:var(--english);stop-opacity:0.7"/>
          <stop offset="60%" style="stop-color:var(--french);stop-opacity:0.7"/>
          <stop offset="100%" style="stop-color:var(--arabic);stop-opacity:0.7"/>
        </linearGradient>
      </defs>
      <rect x="60" y="70" width="760" height="30" rx="15" fill="url(#spectrum)"/>
      <text x="60" y="68" font-size="11" fill="var(--fg)" font-weight="600">ISOLATING</text>
      <text x="820" y="68" text-anchor="end" font-size="11" fill="var(--fg)" font-weight="600">SYNTHETIC</text>
      <text x="60" y="118" font-size="10" fill="var(--muted)">Words never change</text>
      <text x="820" y="118" text-anchor="end" font-size="10" fill="var(--muted)">Words carry many morphemes</text>

      <!-- Language markers -->
      <!-- Chinese -->
      <circle cx="110" cy="85" r="8" fill="var(--chinese)" stroke="white" stroke-width="2"/>
      <line x1="110" y1="100" x2="110" y2="140" stroke="var(--chinese)" stroke-width="1.5"/>

      <!-- English -->
      <circle cx="310" cy="85" r="8" fill="var(--english)" stroke="white" stroke-width="2"/>
      <line x1="310" y1="100" x2="310" y2="140" stroke="var(--english)" stroke-width="1.5"/>

      <!-- French -->
      <circle cx="530" cy="85" r="8" fill="var(--french)" stroke="white" stroke-width="2"/>
      <line x1="530" y1="100" x2="530" y2="140" stroke="var(--french)" stroke-width="1.5"/>

      <!-- Arabic -->
      <circle cx="750" cy="85" r="8" fill="var(--arabic)" stroke="white" stroke-width="2"/>
      <line x1="750" y1="100" x2="750" y2="140" stroke="var(--arabic)" stroke-width="1.5"/>

      <!-- CHINESE BOX -->
      <rect x="20" y="140" width="190" height="200" rx="8" fill="var(--chinese-bg)" stroke="var(--chinese)" stroke-width="2"/>
      <text x="115" y="163" text-anchor="middle" font-size="14" fill="var(--chinese)" font-weight="700">CHINESE</text>
      <text x="115" y="180" text-anchor="middle" font-size="11" fill="var(--chinese)">Virtually no inflection</text>
      <text x="35" y="205" font-size="11" fill="var(--fg)" font-weight="600">"I went":</text>
      <text x="35" y="222" font-size="12" fill="var(--chinese)">我去了</text>
      <text x="35" y="238" font-size="10" fill="var(--muted)">wo qu le</text>
      <text x="35" y="255" font-size="10" fill="var(--fg)">I + go + [completed]</text>
      <text x="35" y="278" font-size="10" fill="var(--fg)">Verb form: <strong>qu</strong></text>
      <text x="35" y="295" font-size="10" fill="var(--fg)">Changes: <strong>ZERO</strong></text>
      <text x="35" y="315" font-size="10" fill="var(--chinese)" font-weight="600">Grammar = word order</text>
      <text x="35" y="330" font-size="10" fill="var(--chinese)" font-weight="600">+ particles + context</text>

      <!-- ENGLISH BOX -->
      <rect x="225" y="140" width="190" height="200" rx="8" fill="var(--english-bg)" stroke="var(--english)" stroke-width="2"/>
      <text x="320" y="163" text-anchor="middle" font-size="14" fill="var(--english)" font-weight="700">ENGLISH</text>
      <text x="320" y="180" text-anchor="middle" font-size="11" fill="var(--english)">Minimal inflection</text>
      <text x="240" y="205" font-size="11" fill="var(--fg)" font-weight="600">"I went":</text>
      <text x="240" y="222" font-size="12" fill="var(--english)">I went</text>
      <text x="240" y="238" font-size="10" fill="var(--muted)">go -> went (irregular)</text>
      <text x="240" y="258" font-size="10" fill="var(--fg)">Verb forms: <strong>5</strong></text>
      <text x="240" y="273" font-size="10" fill="var(--fg)">go/goes/went/gone/going</text>
      <text x="240" y="295" font-size="10" fill="var(--fg)">Plus: plural -s, poss. 's</text>
      <text x="240" y="310" font-size="10" fill="var(--fg)">past -ed, 3rd -s, -ing</text>
      <text x="240" y="330" font-size="10" fill="var(--english)" font-weight="600">Grammar = word order</text>
      <text x="240" y="340" font-size="10" fill="var(--english)" font-weight="600">+ some inflection</text>

      <!-- FRENCH BOX -->
      <rect x="430" y="140" width="200" height="200" rx="8" fill="var(--french-bg)" stroke="var(--french)" stroke-width="2"/>
      <text x="530" y="163" text-anchor="middle" font-size="14" fill="var(--french)" font-weight="700">FRENCH</text>
      <text x="530" y="180" text-anchor="middle" font-size="11" fill="var(--french)">Moderate inflection</text>
      <text x="445" y="205" font-size="11" fill="var(--fg)" font-weight="600">"I went":</text>
      <text x="445" y="222" font-size="12" fill="var(--french)">Je suis alle(e)</text>
      <text x="445" y="238" font-size="10" fill="var(--muted)">aller -> many forms</text>
      <text x="445" y="258" font-size="10" fill="var(--fg)">Verb forms: <strong>40+</strong></text>
      <text x="445" y="273" font-size="10" fill="var(--fg)">vais/vas/va/allons/allez</text>
      <text x="445" y="288" font-size="10" fill="var(--fg)">/vont/allais/irai...</text>
      <text x="445" y="308" font-size="10" fill="var(--fg)">Plus: gender agreement</text>
      <text x="445" y="323" font-size="10" fill="var(--fg)">articles, adjective forms</text>
      <text x="445" y="340" font-size="10" fill="var(--french)" font-weight="600">Grammar = inflection</text>

      <!-- ARABIC BOX -->
      <rect x="645" y="140" width="215" height="200" rx="8" fill="var(--arabic-bg)" stroke="var(--arabic)" stroke-width="2"/>
      <text x="752" y="163" text-anchor="middle" font-size="14" fill="var(--arabic)" font-weight="700">ARABIC</text>
      <text x="752" y="180" text-anchor="middle" font-size="11" fill="var(--arabic)">Rich inflection</text>
      <text x="660" y="205" font-size="11" fill="var(--fg)" font-weight="600">"I went":</text>
      <text x="660" y="222" font-size="12" fill="var(--arabic)" font-weight="600">ذهبت</text>
      <text x="660" y="238" font-size="10" fill="var(--muted)">dhahabtu</text>
      <text x="660" y="258" font-size="10" fill="var(--fg)">Root: <strong>dh-h-b</strong></text>
      <text x="660" y="273" font-size="10" fill="var(--fg)">Pattern encodes tense,</text>
      <text x="660" y="288" font-size="10" fill="var(--fg)">person, number, gender,</text>
      <text x="660" y="303" font-size="10" fill="var(--fg)">mood, voice -- ALL inside</text>
      <text x="660" y="318" font-size="10" fill="var(--fg)">the word form itself</text>
      <text x="660" y="340" font-size="10" fill="var(--arabic)" font-weight="600">Grammar = root patterns</text>

      <!-- INFLECTION GRADIENT ARROW -->
      <text x="440" y="375" text-anchor="middle" font-size="13" fill="var(--accent)" font-weight="700">Inflection Amount</text>
      <rect x="60" y="385" width="760" height="12" rx="6" fill="var(--surface)" stroke="var(--border)" stroke-width="1"/>
      <rect x="60" y="385" width="5" height="12" rx="6" fill="var(--chinese)"/>
      <rect x="240" y="385" width="80" height="12" rx="0" fill="var(--english)" opacity="0.6"/>
      <rect x="440" y="385" width="160" height="12" rx="0" fill="var(--french)" opacity="0.6"/>
      <rect x="620" y="385" width="200" height="12" rx="6" fill="var(--arabic)" opacity="0.6"/>

      <!-- WHAT EACH MARKS INTERNALLY vs. EXTERNALLY -->
      <rect x="30" y="420" width="820" height="160" rx="10" fill="var(--accent-light)" stroke="var(--accent)" stroke-width="1.5"/>
      <text x="440" y="445" text-anchor="middle" font-size="13" fill="var(--accent)" font-weight="700">What Each Language Marks INSIDE Words vs. OUTSIDE Words</text>

      <text x="50" y="475" font-size="11" fill="var(--fg)" font-weight="600">Feature:</text>
      <text x="200" y="475" text-anchor="middle" font-size="11" fill="var(--chinese)" font-weight="600">Chinese</text>
      <text x="370" y="475" text-anchor="middle" font-size="11" fill="var(--english)" font-weight="600">English</text>
      <text x="540" y="475" text-anchor="middle" font-size="11" fill="var(--french)" font-weight="600">French</text>
      <text x="730" y="475" text-anchor="middle" font-size="11" fill="var(--arabic)" font-weight="600">Arabic</text>

      <text x="50" y="497" font-size="10" fill="var(--fg)">Verb tense</text>
      <text x="200" y="497" text-anchor="middle" font-size="10" fill="var(--chinese)">time words</text>
      <text x="370" y="497" text-anchor="middle" font-size="10" fill="var(--english)">-ed, went</text>
      <text x="540" y="497" text-anchor="middle" font-size="10" fill="var(--french)">conjugation</text>
      <text x="730" y="497" text-anchor="middle" font-size="10" fill="var(--arabic)">root pattern</text>

      <text x="50" y="517" font-size="10" fill="var(--fg)">Plural</text>
      <text x="200" y="517" text-anchor="middle" font-size="10" fill="var(--chinese)">number word</text>
      <text x="370" y="517" text-anchor="middle" font-size="10" fill="var(--english)">-s, -es</text>
      <text x="540" y="517" text-anchor="middle" font-size="10" fill="var(--french)">-s + article</text>
      <text x="730" y="517" text-anchor="middle" font-size="10" fill="var(--arabic)">broken plural</text>

      <text x="50" y="537" font-size="10" fill="var(--fg)">Gender</text>
      <text x="200" y="537" text-anchor="middle" font-size="10" fill="var(--chinese)">NONE</text>
      <text x="370" y="537" text-anchor="middle" font-size="10" fill="var(--english)">pronouns only</text>
      <text x="540" y="537" text-anchor="middle" font-size="10" fill="var(--french)">all nouns</text>
      <text x="730" y="537" text-anchor="middle" font-size="10" fill="var(--arabic)">all nouns+verbs</text>

      <text x="50" y="557" font-size="10" fill="var(--fg)">Question</text>
      <text x="200" y="557" text-anchor="middle" font-size="10" fill="var(--chinese)">ma particle</text>
      <text x="370" y="557" text-anchor="middle" font-size="10" fill="var(--english)">word order</text>
      <text x="540" y="557" text-anchor="middle" font-size="10" fill="var(--french)">est-ce que</text>
      <text x="730" y="557" text-anchor="middle" font-size="10" fill="var(--arabic)">hal + order</text>

      <text x="440" y="590" text-anchor="middle" font-size="11" fill="var(--accent)" font-weight="600">Chinese: everything OUTSIDE the word. Arabic: everything INSIDE the word. English and French: in between.</text>
    </svg>
  </div>
  <figcaption>
    <h2>Figure 1 -- The Isolating-Synthetic Spectrum: Where Languages Fall</h2>
    <p>Languages range from purely isolating (words never change form) to highly synthetic (a single word can encode subject, tense, aspect, mood, gender, and number). Chinese sits at the isolating extreme, English left-of-center, French center-right, and Arabic on the synthetic side. The same grammatical information is encoded by every language -- but through completely different mechanisms.</p>
  </figcaption>
</figure>
</body>
</html>
