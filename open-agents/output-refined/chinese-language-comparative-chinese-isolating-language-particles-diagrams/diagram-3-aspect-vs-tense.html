<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aspect vs. Tense -- Chinese vs. English Time Systems</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --accent: #4361ee; --accent-light: #e8edff;
    --chinese: #e63946; --chinese-bg: #ffe0e3;
    --english: #2a9d8f; --english-bg: #d4f5f0;
    --muted: #6c757d; --caption-bg: #f8f9fa;
    --le: #ff6b35; --zhe: #7209b7; --guo: #264653;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a; --fg: #e8e8f0; --surface: #1a1a2e; --border: #2d2d44;
      --accent: #6b8aff; --accent-light: #1e2a4a;
      --chinese: #ff6b6b; --chinese-bg: #3a1a1a;
      --english: #4ecdc4; --english-bg: #1a3a38;
      --muted: #9a9ab0; --caption-bg: #1a1a2e;
      --le: #ff8c5a; --zhe: #c77dff; --guo: #a8dadc;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--fg); display: flex; justify-content: center; padding: 2rem 1rem; line-height: 1.6; }
  figure { max-width: 920px; width: 100%; }
  figcaption { text-align: center; margin-top: 1.5rem; padding: 1rem 1.5rem; background: var(--caption-bg); border-radius: 8px; border: 1px solid var(--border); }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  .chart-wrapper { overflow-x: auto; border: 1px solid var(--border); border-radius: 10px; background: var(--surface); padding: 1.5rem; }
  table { width: 100%; border-collapse: collapse; margin: 0.8rem 0; }
  th, td { padding: 0.5rem 0.4rem; text-align: center; border: 1px solid var(--border); font-size: 0.85rem; }
  th { font-weight: 600; font-size: 0.8rem; }
  .section-title { font-size: 1rem; font-weight: 700; margin: 0.5rem 0; }
  .insight-box { margin-top: 1rem; padding: 1rem; background: var(--accent-light); border-radius: 8px; border: 1px solid var(--accent); }
  .insight-box h3 { font-size: 0.95rem; color: var(--accent); margin-bottom: 0.4rem; }
  .insight-box p { font-size: 0.85rem; }
  .particle-box { display: inline-block; padding: 0.3rem 0.8rem; border-radius: 6px; font-weight: 700; font-size: 1.2rem; margin: 0.2rem; }
  .warning-box { margin-top: 0.8rem; padding: 0.8rem; background: var(--chinese-bg); border-radius: 6px; border-left: 4px solid var(--chinese); }
  .warning-box p { font-size: 0.85rem; }
</style>
</head>
<body>
<figure>
  <div class="chart-wrapper">
    <p class="section-title" style="text-align:center; color:var(--fg);">Two Completely Different Systems for Expressing Time</p>

    <div style="display:flex; gap:1rem; flex-wrap:wrap; justify-content:center; margin:0.8rem 0;">
      <div style="flex:1; min-width:300px; padding:0.8rem; background:var(--english-bg); border-radius:8px; border:1px solid var(--english);">
        <p style="font-weight:700; color:var(--english); text-align:center; font-size:1rem;">ENGLISH: 12+ Verb Forms</p>
        <p style="font-size:0.85rem; text-align:center; color:var(--fg);">Marks TENSE (when) + ASPECT (how)</p>
        <p style="font-size:0.85rem; text-align:center; color:var(--fg);">Verb form MUST change every time</p>
        <table>
          <thead><tr><th></th><th style="color:var(--english)">Simple</th><th style="color:var(--english)">Progressive</th><th style="color:var(--english)">Perfect</th></tr></thead>
          <tbody>
            <tr><td style="font-weight:600">Past</td><td>I ate</td><td>I was eating</td><td>I had eaten</td></tr>
            <tr><td style="font-weight:600">Present</td><td>I eat</td><td>I am eating</td><td>I have eaten</td></tr>
            <tr><td style="font-weight:600">Future</td><td>I will eat</td><td>I will be eating</td><td>I will have eaten</td></tr>
          </tbody>
        </table>
        <p style="font-size:0.8rem; color:var(--english); text-align:center; margin-top:0.3rem;">9 combinations shown (12+ total with perfect progressive)</p>
      </div>

      <div style="flex:1; min-width:300px; padding:0.8rem; background:var(--chinese-bg); border-radius:8px; border:1px solid var(--chinese);">
        <p style="font-weight:700; color:var(--chinese); text-align:center; font-size:1rem;">CHINESE: 1 Verb + 3 Particles</p>
        <p style="font-size:0.85rem; text-align:center; color:var(--fg);">Marks ASPECT only (what shape)</p>
        <p style="font-size:0.85rem; text-align:center; color:var(--fg);">Verb NEVER changes form: 吃 = 吃 always</p>
        <div style="text-align:center; margin:1rem 0;">
          <div class="particle-box" style="background:var(--le); color:white;">了 le</div>
          <p style="font-size:0.85rem; margin-top:0.2rem;">COMPLETED / change of state</p>
          <div class="particle-box" style="background:var(--zhe); color:white;">着 zhe</div>
          <p style="font-size:0.85rem; margin-top:0.2rem;">ONGOING / maintained state</p>
          <div class="particle-box" style="background:var(--guo); color:white;">过 guo</div>
          <p style="font-size:0.85rem; margin-top:0.2rem;">EXPERIENCED / "have ever"</p>
        </div>
        <p style="font-size:0.8rem; color:var(--chinese); text-align:center;">+ time words (昨天, 明天) for WHEN</p>
      </div>
    </div>

    <div class="warning-box">
      <p><strong style="color:var(--chinese)">CRITICAL MISCONCEPTION:</strong> 了 does NOT mean "past tense."</p>
      <p>了 marks <em>completion</em>, not <em>past</em>. Proof: 你吃了饭再去 = "Go after you <strong>have eaten</strong> (FUTURE completion)."</p>
      <p>Chinese has NO tense system. Time is expressed by time words or inferred from context -- never by verb form.</p>
    </div>

    <p class="section-title" style="text-align:center; margin-top:1.2rem;">How the Same Meanings Map Between Systems</p>
    <table>
      <thead>
        <tr>
          <th style="color:var(--english)">English (tense+aspect)</th>
          <th style="color:var(--chinese)">Chinese (aspect only)</th>
          <th>What changes?</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>"I ate" / "I have eaten"</td>
          <td>我吃了 (wo chi <strong>le</strong>)</td>
          <td style="color:var(--chinese)">Verb unchanged; 了 = completed</td>
        </tr>
        <tr>
          <td>"I am eating" / "I was eating"</td>
          <td>我在吃着 (wo zai chi <strong>zhe</strong>)</td>
          <td style="color:var(--chinese)">Verb unchanged; 着 = ongoing</td>
        </tr>
        <tr>
          <td>"I have (ever) eaten"</td>
          <td>我吃过 (wo chi <strong>guo</strong>)</td>
          <td style="color:var(--chinese)">Verb unchanged; 过 = experienced</td>
        </tr>
        <tr>
          <td>"I eat" (habitual)</td>
          <td>我吃 (wo chi) -- bare verb</td>
          <td style="color:var(--chinese)">Verb unchanged; NO particle needed</td>
        </tr>
        <tr>
          <td>"I will eat"</td>
          <td>我明天吃 (wo mingtian chi)</td>
          <td style="color:var(--chinese)">Verb unchanged; time word = "tomorrow"</td>
        </tr>
      </tbody>
    </table>

    <div class="insight-box">
      <h3>THE PATTERN: 12+ English forms collapse to 4 Chinese patterns</h3>
      <p>English forces you to specify tense EVERY time you use a verb. Chinese lets you specify time only when it matters. Once context establishes the time frame, subsequent sentences can omit all time marking entirely -- because the verb never changes, <strong>silence is always an option</strong>.</p>
      <p style="margin-top:0.4rem; color:var(--accent);">This is the deepest consequence of the isolating principle: grammatical information is optional, not obligatory.</p>
    </div>
  </div>
  <figcaption>
    <h2>Figure 3 -- Aspect vs. Tense: Chinese vs. English Time Systems</h2>
    <p>English marks both tense (when) and aspect (how) through 12+ verb forms. Chinese marks only aspect through three particles (了 completed, 着 ongoing, 过 experienced) while the verb itself never changes. Time is expressed by separate time words or inferred from context. The most common learner error is treating 了 as "past tense" -- it actually marks completion and can appear in future-referring sentences.</p>
  </figcaption>
</figure>
</body>
</html>
