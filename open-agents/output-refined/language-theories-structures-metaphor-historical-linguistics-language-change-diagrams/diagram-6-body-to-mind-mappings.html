<!-- Diagram: Body-to-Mind Metaphorical Mappings -->
<!-- Type: SVG network -->
<!-- Generated: 2026-03-15 -->
<!-- Description: Network diagram showing how concrete bodily/physical vocabulary extends systematically to abstract mental vocabulary through metaphorical mapping, organized by source domain (grasping, seeing, hearing, spatial) with unidirectional arrows and Sweetser's three-domain model -->

<figure class="concept-diagram" id="diagram-body-to-mind">
  <div class="diagram-container">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 750" style="width:100%;max-width:900px;margin:0 auto;display:block;" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
      <defs>
        <marker id="arrowMain" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
          <polygon points="0 0, 10 3.5, 0 7" fill="#6366f1"/>
        </marker>
        <marker id="arrowDomain" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
          <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
        </marker>
        <linearGradient id="bgGrad3" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#faf5ff"/>
          <stop offset="100%" stop-color="#f0f9ff"/>
        </linearGradient>
      </defs>

      <!-- Background -->
      <rect width="900" height="750" rx="12" fill="url(#bgGrad3)" stroke="#e2e8f0" stroke-width="1"/>

      <!-- Title -->
      <text x="450" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#1e293b">Body-to-Mind: Metaphorical Mappings in Etymology</text>
      <text x="450" y="58" text-anchor="middle" font-size="13" fill="#64748b">"Words are carried over from bodies ... to signify the institutions of the mind" -- Vico</text>

      <!-- Sweetser's Three-Domain Model (top) -->
      <rect x="50" y="78" width="800" height="72" rx="10" fill="#fff7ed" stroke="#f97316" stroke-width="1.5"/>
      <text x="450" y="98" text-anchor="middle" font-size="13" font-weight="700" fill="#9a3412">Sweetser's Three-Domain Model: Direction of Semantic Extension</text>

      <!-- Domain 1 -->
      <rect x="80" y="110" width="200" height="30" rx="6" fill="#16a34a" stroke="#15803d" stroke-width="1"/>
      <text x="180" y="130" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff">D1: Sociophysical World</text>

      <!-- Arrow D1->D2 -->
      <line x1="280" y1="125" x2="330" y2="125" stroke="#dc2626" stroke-width="2.5" marker-end="url(#arrowDomain)"/>
      <text x="305" y="118" text-anchor="middle" font-size="9" fill="#dc2626" font-weight="600">always</text>

      <!-- Domain 2 -->
      <rect x="335" y="110" width="200" height="30" rx="6" fill="#2563eb" stroke="#1d4ed8" stroke-width="1"/>
      <text x="435" y="130" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff">D2: Mental / Epistemic</text>

      <!-- Arrow D2->D3 -->
      <line x1="535" y1="125" x2="585" y2="125" stroke="#dc2626" stroke-width="2.5" marker-end="url(#arrowDomain)"/>
      <text x="560" y="118" text-anchor="middle" font-size="9" fill="#dc2626" font-weight="600">always</text>

      <!-- Domain 3 -->
      <rect x="590" y="110" width="200" height="30" rx="6" fill="#7c3aed" stroke="#6d28d9" stroke-width="1"/>
      <text x="690" y="130" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff">D3: Speech Act</text>

      <!-- ===== MAPPING 1: GRASPING -> UNDERSTANDING ===== -->
      <rect x="30" y="170" width="400" height="130" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
      <text x="230" y="192" text-anchor="middle" font-size="14" font-weight="700" fill="#14532d">GRASPING / SEIZING → UNDERSTANDING</text>

      <!-- Physical source -->
      <rect x="50" y="202" width="130" height="86" rx="6" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
      <text x="115" y="222" text-anchor="middle" font-size="11" font-weight="700" fill="#166534">Physical</text>
      <text x="115" y="240" text-anchor="middle" font-size="10" fill="#166534" font-style="italic">grasp (seize)</text>
      <text x="115" y="255" text-anchor="middle" font-size="10" fill="#166534" font-style="italic">catch (capture)</text>
      <text x="115" y="270" text-anchor="middle" font-size="10" fill="#166534" font-style="italic">get (obtain)</text>

      <!-- Arrow -->
      <line x1="185" y1="245" x2="220" y2="245" stroke="#6366f1" stroke-width="2.5" marker-end="url(#arrowMain)"/>

      <!-- Mental target -->
      <rect x="225" y="202" width="190" height="86" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
      <text x="320" y="222" text-anchor="middle" font-size="11" font-weight="700" fill="#1e3a5f">Mental</text>
      <text x="320" y="240" text-anchor="middle" font-size="10" fill="#1e3a5f" font-style="italic">grasp an idea</text>
      <text x="320" y="255" text-anchor="middle" font-size="10" fill="#1e3a5f" font-style="italic">catch the meaning</text>
      <text x="320" y="270" text-anchor="middle" font-size="10" fill="#1e3a5f" font-style="italic">get the point</text>

      <!-- Latin etymologies -->
      <text x="230" y="295" text-anchor="middle" font-size="9" fill="#64748b">Lat. comprehendere "seize" → comprehend | Lat. apprehendere "seize" → apprehend</text>

      <!-- ===== MAPPING 2: SEEING -> KNOWING ===== -->
      <rect x="470" y="170" width="400" height="130" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
      <text x="670" y="192" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a5f">SEEING / VISION → KNOWING</text>

      <!-- Physical source -->
      <rect x="490" y="202" width="130" height="86" rx="6" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
      <text x="555" y="222" text-anchor="middle" font-size="11" font-weight="700" fill="#166534">Physical</text>
      <text x="555" y="240" text-anchor="middle" font-size="10" fill="#166534" font-style="italic">see (perceive)</text>
      <text x="555" y="255" text-anchor="middle" font-size="10" fill="#166534" font-style="italic">clear (visible)</text>
      <text x="555" y="270" text-anchor="middle" font-size="10" fill="#166534" font-style="italic">illuminate (light)</text>

      <!-- Arrow -->
      <line x1="625" y1="245" x2="660" y2="245" stroke="#6366f1" stroke-width="2.5" marker-end="url(#arrowMain)"/>

      <!-- Mental target -->
      <rect x="665" y="202" width="190" height="86" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
      <text x="760" y="222" text-anchor="middle" font-size="11" font-weight="700" fill="#1e3a5f">Mental</text>
      <text x="760" y="240" text-anchor="middle" font-size="10" fill="#1e3a5f" font-style="italic">I see = I understand</text>
      <text x="760" y="255" text-anchor="middle" font-size="10" fill="#1e3a5f" font-style="italic">clear explanation</text>
      <text x="760" y="270" text-anchor="middle" font-size="10" fill="#1e3a5f" font-style="italic">illuminate a topic</text>

      <text x="670" y="295" text-anchor="middle" font-size="9" fill="#64748b">Also: insight, perspective, point of view, outlook, obscure, envision</text>

      <!-- ===== MAPPING 3: HEARING -> OBEYING ===== -->
      <rect x="30" y="320" width="400" height="120" rx="10" fill="#fdf4ff" stroke="#a855f7" stroke-width="2"/>
      <text x="230" y="342" text-anchor="middle" font-size="14" font-weight="700" fill="#581c87">HEARING → OBEYING / HEEDING</text>

      <!-- Physical source -->
      <rect x="50" y="352" width="130" height="76" rx="6" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
      <text x="115" y="372" text-anchor="middle" font-size="11" font-weight="700" fill="#166534">Physical</text>
      <text x="115" y="390" text-anchor="middle" font-size="10" fill="#166534" font-style="italic">audire (hear)</text>
      <text x="115" y="405" text-anchor="middle" font-size="10" fill="#166534" font-style="italic">listen (attend to)</text>

      <!-- Arrow -->
      <line x1="185" y1="390" x2="220" y2="390" stroke="#6366f1" stroke-width="2.5" marker-end="url(#arrowMain)"/>

      <!-- Mental/social target -->
      <rect x="225" y="352" width="190" height="76" rx="6" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
      <text x="320" y="372" text-anchor="middle" font-size="11" font-weight="700" fill="#3b0764">Social / Mental</text>
      <text x="320" y="390" text-anchor="middle" font-size="10" fill="#3b0764" font-style="italic">obey (< ob + audire)</text>
      <text x="320" y="405" text-anchor="middle" font-size="10" fill="#3b0764" font-style="italic">listen to authority</text>

      <text x="230" y="435" text-anchor="middle" font-size="9" fill="#64748b">Cross-linguistic: Hebrew shema = "hear" and "obey"</text>

      <!-- ===== MAPPING 4: HOLDING -> KNOWING/BELIEVING ===== -->
      <rect x="470" y="320" width="400" height="120" rx="10" fill="#fefce8" stroke="#ca8a04" stroke-width="2"/>
      <text x="670" y="342" text-anchor="middle" font-size="14" font-weight="700" fill="#713f12">HOLDING / CONTAINING → BELIEVING</text>

      <!-- Physical source -->
      <rect x="490" y="352" width="130" height="76" rx="6" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
      <text x="555" y="372" text-anchor="middle" font-size="11" font-weight="700" fill="#166534">Physical</text>
      <text x="555" y="390" text-anchor="middle" font-size="10" fill="#166534" font-style="italic">hold (grip)</text>
      <text x="555" y="405" text-anchor="middle" font-size="10" fill="#166534" font-style="italic">contain (enclose)</text>

      <!-- Arrow -->
      <line x1="625" y1="390" x2="660" y2="390" stroke="#6366f1" stroke-width="2.5" marker-end="url(#arrowMain)"/>

      <!-- Mental target -->
      <rect x="665" y="352" width="190" height="76" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
      <text x="760" y="372" text-anchor="middle" font-size="11" font-weight="700" fill="#1e3a5f">Mental</text>
      <text x="760" y="390" text-anchor="middle" font-size="10" fill="#1e3a5f" font-style="italic">hold a belief</text>
      <text x="760" y="405" text-anchor="middle" font-size="10" fill="#1e3a5f" font-style="italic">contain knowledge</text>

      <text x="670" y="435" text-anchor="middle" font-size="9" fill="#64748b">Also: retain information, an idea is "in" one's mind</text>

      <!-- ===== MAPPING 5: SPATIAL -> TEMPORAL ===== -->
      <rect x="140" y="465" width="620" height="120" rx="10" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
      <text x="450" y="487" text-anchor="middle" font-size="14" font-weight="700" fill="#0c4a6e">SPATIAL → TEMPORAL (Space becomes Time)</text>

      <!-- Spatial source -->
      <rect x="160" y="497" width="180" height="76" rx="6" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
      <text x="250" y="517" text-anchor="middle" font-size="11" font-weight="700" fill="#166534">Spatial</text>
      <text x="250" y="535" text-anchor="middle" font-size="10" fill="#166534" font-style="italic">before = in front of</text>
      <text x="250" y="550" text-anchor="middle" font-size="10" fill="#166534" font-style="italic">long = extended in space</text>
      <text x="250" y="565" text-anchor="middle" font-size="10" fill="#166534" font-style="italic">ahead = in front</text>

      <!-- Arrow -->
      <line x1="345" y1="535" x2="400" y2="535" stroke="#6366f1" stroke-width="2.5" marker-end="url(#arrowMain)"/>

      <!-- Temporal target -->
      <rect x="405" y="497" width="180" height="76" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
      <text x="495" y="517" text-anchor="middle" font-size="11" font-weight="700" fill="#1e3a5f">Temporal</text>
      <text x="495" y="535" text-anchor="middle" font-size="10" fill="#1e3a5f" font-style="italic">before = earlier than</text>
      <text x="495" y="550" text-anchor="middle" font-size="10" fill="#1e3a5f" font-style="italic">long = extended in time</text>
      <text x="495" y="565" text-anchor="middle" font-size="10" fill="#1e3a5f" font-style="italic">ahead = in the future</text>

      <!-- Never reverses -->
      <rect x="610" y="520" width="120" height="30" rx="6" fill="#dc2626" stroke="#b91c1c" stroke-width="1"/>
      <text x="670" y="540" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">Never reverses</text>

      <!-- ===== Key Insight Box ===== -->
      <rect x="100" y="605" width="700" height="120" rx="10" fill="#1e293b" stroke="#334155" stroke-width="2"/>
      <text x="450" y="632" text-anchor="middle" font-size="15" font-weight="700" fill="#f1f5f9">The Universal Direction of Semantic Extension</text>

      <text x="450" y="658" text-anchor="middle" font-size="12" fill="#94a3b8">Physical / Concrete / Bodily</text>
      <line x1="340" y1="668" x2="410" y2="668" stroke="#6366f1" stroke-width="3" marker-end="url(#arrowMain)"/>
      <text x="450" y="680" text-anchor="middle" font-size="12" fill="#a5b4fc">Mental / Abstract / Cognitive</text>
      <line x1="540" y1="668" x2="610" y2="668" stroke="#6366f1" stroke-width="3" marker-end="url(#arrowMain)"/>
      <text x="650" y="680" text-anchor="middle" font-size="12" fill="#818cf8">Speech Act / Pragmatic</text>

      <text x="450" y="710" text-anchor="middle" font-size="11" fill="#64748b">This pattern recurs independently across unrelated language families worldwide,</text>
      <text x="450" y="724" text-anchor="middle" font-size="11" fill="#64748b">providing evidence that abstract thought is built through metaphorical extension from embodied experience.</text>
    </svg>
  </div>
  <figcaption>
    <strong>Figure 6: Body-to-Mind Metaphorical Mappings.</strong> Across unrelated language families, abstract vocabulary is systematically built from concrete bodily experience through the same metaphorical mappings: grasping becomes understanding, seeing becomes knowing, hearing becomes obeying, and spatial relations become temporal ones. Eve Sweetser's three-domain model (sociophysical → mental/epistemic → speech act) captures the consistent unidirectionality of these extensions. The pervasiveness of these patterns provides powerful evidence for embodied cognition: our entire vocabulary for mental life is constructed through the metaphorical appropriation of physical vocabulary.
  </figcaption>
</figure>
