<!-- Description: Horizontal flowchart showing the four stages of grammaticalization (content word, function word, clitic, affix) with parallel tracks for semantic bleaching, phonetic erosion, and obligatorification, plus concrete examples at each stage -->

<figure class="concept-diagram" id="diagram-grammaticalization-cline">
  <div class="diagram-container">
    <pre class="mermaid">
flowchart LR
    subgraph CLINE["THE GRAMMATICALIZATION CLINE"]
        direction LR
        CW["<strong>Content Word</strong><br/><em>Full lexical item</em><br/>Concrete meaning<br/>Phonologically full<br/>Syntactically free"]
        FW["<strong>Function Word</strong><br/><em>Grammatical word</em><br/>Abstract meaning<br/>Some reduction<br/>Conventionalized use"]
        CL["<strong>Clitic</strong><br/><em>Dependent form</em><br/>Grammatical meaning<br/>Phonetically reduced<br/>Attached to host"]
        AF["<strong>Affix</strong><br/><em>Bound morpheme</em><br/>Pure grammar<br/>Maximally reduced<br/>Obligatory"]

        CW -->|"Semantic<br/>bleaching"| FW
        FW -->|"Phonetic<br/>erosion"| CL
        CL -->|"Morphological<br/>fusion"| AF
    end

    subgraph EX1["Example 1: FUTURE TENSE from motion verb"]
        direction LR
        E1A["<strong>go</strong><br/><em>'move toward'</em><br/>I am going to<br/>the market"]
        E1B["<strong>going to</strong><br/><em>'intend to'</em><br/>I am going to<br/>study tonight"]
        E1C["<strong>gonna</strong><br/><em>'will'</em><br/>I'm gonna<br/>study tonight"]
        E1D["<strong>'mma / -a</strong><br/><em>future marker</em><br/>I'mma do it"]

        E1A -->|"motion ><br/>intention"| E1B
        E1B -->|"reduction"| E1C
        E1C -->|"further<br/>erosion"| E1D
    end

    subgraph EX2["Example 2: FUTURE TENSE from volition verb"]
        direction LR
        E2A["<strong>willan</strong><br/><em>'to want, desire'</em><br/>OE: Ic wille<br/>drincan"]
        E2B["<strong>will</strong><br/><em>'intend to'</em><br/>I will go<br/>tomorrow"]
        E2C["<strong>'ll</strong><br/><em>future clitic</em><br/>I'll go<br/>tomorrow"]
        E2D["<em>&lpar;ongoing...&rpar;</em><br/>Not yet an affix<br/>in English"]

        E2A -->|"desire ><br/>intention"| E2B
        E2B -->|"reduction<br/>to clitic"| E2C
        E2C -.->|"potential<br/>future"| E2D
    end

    subgraph EX3["Example 3: PERFECT ASPECT from possession"]
        direction LR
        E3A["<strong>have</strong><br/><em>'to possess'</em><br/>I have a letter<br/>written &lpar;= I possess<br/>a written letter&rpar;"]
        E3B["<strong>have</strong><br/><em>'completed action'</em><br/>I have written<br/>a letter"]
        E3C["<strong>'ve</strong><br/><em>perfect clitic</em><br/>I've written<br/>a letter"]
        E3D["<em>&lpar;affix in some<br/>Romance langs&rpar;</em><br/>Fr. <em>j'ai ecrit</em>"]

        E3A -->|"possession ><br/>completion"| E3B
        E3B -->|"reduction"| E3C
        E3C -.->|"compare<br/>Romance"| E3D
    end

    subgraph PROPS["CONCURRENT CHANGES ALONG THE CLINE"]
        direction TB
        PR1["<strong>Semantic Bleaching</strong><br/>concrete meaning → abstract → purely grammatical"]
        PR2["<strong>Phonetic Erosion</strong><br/>full word → reduced → clitic → bound morpheme"]
        PR3["<strong>Decategorialization</strong><br/>loss of word-class properties &lpar;verb loses tense marking, etc.&rpar;"]
        PR4["<strong>Obligatorification</strong><br/>optional → conventionalized → obligatory"]
        PR1 ~~~ PR2 ~~~ PR3 ~~~ PR4
    end

    CLINE ~~~ EX1
    EX1 ~~~ EX2
    EX2 ~~~ EX3
    EX3 ~~~ PROPS

  <figcaption>
    <strong>Figure 4: The Grammaticalization Cline.</strong> Hopper and Traugott's (2003) model shows how lexical content words gradually become grammatical function words, then phonetically reduced clitics, and ultimately bound affixes. Three examples illustrate the process: English "going to" (motion verb to future marker), "will" (desire verb to future auxiliary), and "have" (possession verb to perfect aspect marker). Four concurrent changes accompany the journey along the cline: semantic bleaching, phonetic erosion, decategorialization, and obligatorification. The process is overwhelmingly unidirectional -- forms move from lexical to grammatical, almost never in reverse.
  </figcaption>
</figure>
