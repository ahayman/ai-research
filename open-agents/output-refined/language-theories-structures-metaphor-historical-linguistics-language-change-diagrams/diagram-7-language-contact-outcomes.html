<!-- Description: Decision-tree flowchart showing the possible outcomes when languages come into contact: borrowing, convergence (sprachbund), pidginization, creolization, and language shift/death, with historical examples at each outcome node -->

  <div class="diagram-container">
    <pre class="mermaid">
flowchart TB
    CONTACT["<strong>LANGUAGE CONTACT</strong><br/><em>Speakers of different languages<br/>interact over time</em>"]

    CONTACT --> INT["What is the<br/><strong>intensity</strong> and<br/><strong>type</strong> of contact?"]

    INT -->|"Casual / Trade<br/>contact"| BORROW["<strong>BORROWING</strong><br/><em>Vocabulary adopted from<br/>one language to another</em>"]

    INT -->|"Sustained geographic<br/>proximity"| CONVG["<strong>CONVERGENCE</strong><br/><em>Languages share structural<br/>features through contact</em>"]

    INT -->|"Disrupted transmission<br/>&lpar;colonial, slavery, trade&rpar;"| PIDG["<strong>PIDGINIZATION</strong><br/><em>Simplified contact language<br/>for limited purposes</em>"]

    INT -->|"Political / social<br/>dominance"| SHIFT["<strong>LANGUAGE SHIFT</strong><br/><em>Community abandons its<br/>language for another</em>"]

    BORROW --> BLEX["<strong>Lexical borrowing</strong><br/>Most common; vocabulary items<br/>adopted with phonological adaptation"]
    BORROW --> BSTR["<strong>Structural borrowing</strong><br/>Rarer; grammatical patterns<br/>adopted under intense contact"]

    BLEX --> BLEX_EX["<strong>Examples:</strong><br/>English ← French: <em>government,<br/>justice, beef, pork</em><br/>English ← Arabic: <em>algebra,<br/>algorithm, cotton</em><br/>Japanese ← English: <em>konpyuutaa,<br/>terebi, sumaatofon</em>"]

    CONVG --> SPRACH["<strong>SPRACHBUND</strong><br/>&lpar;Linguistic Area&rpar;<br/><em>Unrelated languages develop<br/>shared typological features</em>"]

    SPRACH --> SP1["<strong>Balkan Sprachbund</strong><br/>Albanian, Romanian, Bulgarian,<br/>Greek, Balkan Turkish share:<br/>• Postposed definite articles<br/>• Loss of infinitive<br/>• Merged genitive/dative"]
    SPRACH --> SP2["<strong>South Asian Linguistic Area</strong><br/>Indo-Aryan + Dravidian share:<br/>• Retroflex consonants<br/>• SOV word order<br/>• Echo word formation"]
    SPRACH --> SP3["<strong>Standard Average European</strong><br/>European languages share:<br/>• Definite + indefinite articles<br/>• have-perfect constructions<br/>• Relative pronouns"]

    PIDG --> PIDG_FEAT["<strong>Pidgin features:</strong><br/>• No native speakers<br/>• Reduced vocabulary<br/>• Simplified grammar<br/>• Used for trade/work"]

    PIDG_FEAT --> NATIVE{"Does the pidgin<br/>become a<br/><strong>native language?</strong>"}

    NATIVE -->|"Yes: children acquire<br/>it as first language"| CREOLE["<strong>CREOLIZATION</strong><br/><em>Pidgin develops full<br/>grammatical complexity</em>"]

    NATIVE -->|"No: remains a<br/>second language"| STABLE["<strong>Stable pidgin</strong><br/><em>Continues as lingua franca<br/>without nativization</em>"]

    CREOLE --> CR_EX["<strong>Examples:</strong><br/>• <em>Tok Pisin</em> &lpar;Papua New Guinea&rpar;<br/>• <em>Haitian Creole</em> &lpar;French-based&rpar;<br/>• <em>Jamaican Patois</em> &lpar;English-based&rpar;<br/>• <em>Papiamentu</em> &lpar;Portuguese/Spanish&rpar;"]

    CREOLE --> CR_FEAT["<strong>Creole features:</strong><br/>• Full native language<br/>• New complex grammar<br/>• Evidence of children's<br/>  capacity to create grammar<br/>  from limited input"]

    SHIFT --> DEATH["<strong>LANGUAGE DEATH</strong><br/><em>Original language ceases<br/>to be spoken</em>"]

    SHIFT --> SUB["<strong>SUBSTRATE EFFECTS</strong><br/><em>Features of abandoned<br/>language persist in the<br/>adopted language</em>"]

    DEATH --> DEATH_EX["<strong>Examples:</strong><br/>• Cornish &lpar;died c. 1777,<br/>  revival underway&rpar;<br/>• Dalmatian &lpar;died 1898&rpar;<br/>• ~40% of world's languages<br/>  endangered today"]

    SUB --> SUB_EX["<strong>Examples:</strong><br/>• French phonology influenced<br/>  by Gaulish substrate<br/>• Irish English influenced<br/>  by Irish Gaelic substrate"]

  <figcaption>
    <strong>Figure 7: Language Contact Outcomes.</strong> When speakers of different languages come into sustained contact, the outcome depends on the intensity, duration, and social dynamics of the interaction. Casual contact produces <em>borrowing</em> (primarily vocabulary). Sustained geographic proximity leads to structural <em>convergence</em> and the formation of sprachbunds (linguistic areas). Disrupted transmission produces <em>pidgins</em>, which may develop into full <em>creole</em> languages if acquired natively by children. Political or social dominance can lead to <em>language shift</em> and ultimately <em>language death</em>, though substrate effects from the abandoned language often persist.
  </figcaption>
</figure>
