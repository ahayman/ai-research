<!-- Diagram: Grimm's Law Chain Shift -->
<!-- Type: flowchart -->
<!-- Generated: 2026-03-15 -->
<!-- Description: Three-phase circular chain shift of Grimm's Law (First Germanic Consonant Shift) showing how PIE voiceless stops became voiceless fricatives, voiced stops became voiceless stops, and voiced aspirated stops became voiced stops, with cognate examples at each phase -->

<figure class="concept-diagram" id="diagram-grimms-law">
  <div class="diagram-container">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" style="width:100%;max-width:900px;margin:0 auto;display:block;" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
      <defs>
        <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
          <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
        </marker>
        <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
          <polygon points="0 0, 10 3.5, 0 7" fill="#059669"/>
        </marker>
        <marker id="arrowAmber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
          <polygon points="0 0, 10 3.5, 0 7" fill="#d97706"/>
        </marker>
        <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#f8fafc"/>
          <stop offset="100%" stop-color="#f1f5f9"/>
        </linearGradient>
      </defs>

      <!-- Background -->
      <rect width="900" height="620" rx="12" fill="url(#bgGrad)" stroke="#e2e8f0" stroke-width="1"/>

      <!-- Title -->
      <text x="450" y="40" text-anchor="middle" font-size="22" font-weight="700" fill="#1e293b">Grimm's Law: The First Germanic Consonant Shift</text>
      <text x="450" y="62" text-anchor="middle" font-size="13" fill="#64748b">A three-phase chain shift (c. 1st millennium BCE)</text>

      <!-- Phase 1: Voiceless Stops -> Voiceless Fricatives (Blue) -->
      <rect x="30" y="90" width="260" height="200" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
      <rect x="30" y="90" width="260" height="36" rx="10" fill="#2563eb"/>
      <rect x="30" y="116" width="260" height="10" fill="#2563eb"/>
      <text x="160" y="114" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Phase 1: Voiceless Stops</text>
      <text x="160" y="135" text-anchor="middle" font-size="12" fill="#2563eb" font-weight="600">become Voiceless Fricatives</text>

      <text x="160" y="162" text-anchor="middle" font-size="15" font-weight="700" fill="#1e3a5f">*p → *f</text>
      <text x="160" y="180" text-anchor="middle" font-size="11" fill="#475569">Lat. <tspan font-style="italic">pater</tspan> → Eng. <tspan font-style="italic">father</tspan></text>

      <text x="160" y="206" text-anchor="middle" font-size="15" font-weight="700" fill="#1e3a5f">*t → *θ</text>
      <text x="160" y="224" text-anchor="middle" font-size="11" fill="#475569">Lat. <tspan font-style="italic">tres</tspan> → Eng. <tspan font-style="italic">three</tspan></text>

      <text x="160" y="250" text-anchor="middle" font-size="15" font-weight="700" fill="#1e3a5f">*k → *x/h</text>
      <text x="160" y="268" text-anchor="middle" font-size="11" fill="#475569">Lat. <tspan font-style="italic">cor(d)</tspan> → Eng. <tspan font-style="italic">heart</tspan></text>

      <!-- Phase 2: Voiced Stops -> Voiceless Stops (Green) -->
      <rect x="320" y="90" width="260" height="200" rx="10" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
      <rect x="320" y="90" width="260" height="36" rx="10" fill="#059669"/>
      <rect x="320" y="116" width="260" height="10" fill="#059669"/>
      <text x="450" y="114" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Phase 2: Voiced Stops</text>
      <text x="450" y="135" text-anchor="middle" font-size="12" fill="#059669" font-weight="600">become Voiceless Stops</text>

      <text x="450" y="162" text-anchor="middle" font-size="15" font-weight="700" fill="#064e3b">*b → *p</text>
      <text x="450" y="180" text-anchor="middle" font-size="11" fill="#475569">Lith. <tspan font-style="italic">dubas</tspan> → Eng. <tspan font-style="italic">deep</tspan></text>

      <text x="450" y="206" text-anchor="middle" font-size="15" font-weight="700" fill="#064e3b">*d → *t</text>
      <text x="450" y="224" text-anchor="middle" font-size="11" fill="#475569">Lat. <tspan font-style="italic">duo</tspan> → Eng. <tspan font-style="italic">two</tspan></text>

      <text x="450" y="250" text-anchor="middle" font-size="15" font-weight="700" fill="#064e3b">*g → *k</text>
      <text x="450" y="268" text-anchor="middle" font-size="11" fill="#475569">Lat. <tspan font-style="italic">genus</tspan> → Eng. <tspan font-style="italic">kin</tspan></text>

      <!-- Phase 3: Voiced Aspirated -> Voiced Stops (Amber) -->
      <rect x="610" y="90" width="260" height="200" rx="10" fill="#fffbeb" stroke="#d97706" stroke-width="2"/>
      <rect x="610" y="90" width="260" height="36" rx="10" fill="#d97706"/>
      <rect x="610" y="116" width="260" height="10" fill="#d97706"/>
      <text x="740" y="114" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Phase 3: Voiced Aspirated</text>
      <text x="740" y="135" text-anchor="middle" font-size="12" fill="#d97706" font-weight="600">become Voiced Stops</text>

      <text x="740" y="162" text-anchor="middle" font-size="15" font-weight="700" fill="#78350f">*bh → *b</text>
      <text x="740" y="180" text-anchor="middle" font-size="11" fill="#475569">Skt. <tspan font-style="italic">bhrata</tspan> → Eng. <tspan font-style="italic">brother</tspan></text>

      <text x="740" y="206" text-anchor="middle" font-size="15" font-weight="700" fill="#78350f">*dh → *d</text>
      <text x="740" y="224" text-anchor="middle" font-size="11" fill="#475569">Skt. <tspan font-style="italic">dha-</tspan> → Eng. <tspan font-style="italic">do</tspan></text>

      <text x="740" y="250" text-anchor="middle" font-size="15" font-weight="700" fill="#78350f">*gh → *g</text>
      <text x="740" y="268" text-anchor="middle" font-size="11" fill="#475569">Lat. <tspan font-style="italic">hostis</tspan> (*ghostis) → Eng. <tspan font-style="italic">guest</tspan></text>

      <!-- Chain Shift Arrows -->
      <path d="M 290 190 L 318 190" stroke="#2563eb" stroke-width="2.5" fill="none" marker-end="url(#arrowBlue)"/>
      <path d="M 580 190 L 608 190" stroke="#059669" stroke-width="2.5" fill="none" marker-end="url(#arrowGreen)"/>

      <!-- Circular Chain Shift Diagram -->
      <text x="450" y="330" text-anchor="middle" font-size="16" font-weight="700" fill="#1e293b">The Chain Shift: Each Phase Creates Space for the Next</text>

      <!-- Chain shift circles -->
      <!-- Voiceless Fricatives (top) -->
      <circle cx="450" cy="420" r="52" fill="#eff6ff" stroke="#2563eb" stroke-width="2.5"/>
      <text x="450" y="414" text-anchor="middle" font-size="12" font-weight="700" fill="#1e3a5f">Voiceless</text>
      <text x="450" y="430" text-anchor="middle" font-size="12" font-weight="700" fill="#1e3a5f">Fricatives</text>
      <text x="450" y="448" text-anchor="middle" font-size="11" fill="#2563eb">*f, *θ, *x</text>

      <!-- Voiceless Stops (bottom-left) -->
      <circle cx="310" cy="540" r="52" fill="#ecfdf5" stroke="#059669" stroke-width="2.5"/>
      <text x="310" y="534" text-anchor="middle" font-size="12" font-weight="700" fill="#064e3b">Voiceless</text>
      <text x="310" y="550" text-anchor="middle" font-size="12" font-weight="700" fill="#064e3b">Stops</text>
      <text x="310" y="568" text-anchor="middle" font-size="11" fill="#059669">*p, *t, *k</text>

      <!-- Voiced Stops (bottom-right) -->
      <circle cx="590" cy="540" r="52" fill="#fffbeb" stroke="#d97706" stroke-width="2.5"/>
      <text x="590" y="534" text-anchor="middle" font-size="12" font-weight="700" fill="#78350f">Voiced</text>
      <text x="590" y="550" text-anchor="middle" font-size="12" font-weight="700" fill="#78350f">Stops</text>
      <text x="590" y="568" text-anchor="middle" font-size="11" fill="#d97706">*b, *d, *g</text>

      <!-- Voiced Aspirated (far right) -->
      <ellipse cx="720" cy="440" rx="55" ry="40" fill="#fef3c7" stroke="#b45309" stroke-width="2" stroke-dasharray="6,3"/>
      <text x="720" y="434" text-anchor="middle" font-size="11" font-weight="700" fill="#78350f">Voiced Aspirated</text>
      <text x="720" y="452" text-anchor="middle" font-size="11" fill="#b45309">*bh, *dh, *gh</text>
      <text x="720" y="470" text-anchor="middle" font-size="9" fill="#92400e">(PIE source)</text>

      <!-- Curved arrows for chain shift -->
      <!-- Voiceless Stops -> Voiceless Fricatives (Phase 1) -->
      <path d="M 340 500 Q 340 420 410 400" stroke="#2563eb" stroke-width="2.5" fill="none" marker-end="url(#arrowBlue)"/>
      <text x="345" y="448" text-anchor="middle" font-size="10" font-weight="600" fill="#2563eb">Phase 1</text>

      <!-- Voiced Stops -> Voiceless Stops (Phase 2) -->
      <path d="M 545 555 Q 450 570 365 555" stroke="#059669" stroke-width="2.5" fill="none" marker-end="url(#arrowGreen)"/>
      <text x="450" y="578" text-anchor="middle" font-size="10" font-weight="600" fill="#059669">Phase 2</text>

      <!-- Voiced Aspirated -> Voiced Stops (Phase 3) -->
      <path d="M 690 472 Q 660 520 635 530" stroke="#d97706" stroke-width="2.5" fill="none" marker-end="url(#arrowAmber)"/>
      <text x="680" y="510" text-anchor="middle" font-size="10" font-weight="600" fill="#d97706">Phase 3</text>

      <!-- Legend -->
      <text x="110" y="350" font-size="11" fill="#64748b">Each sound class shifts to fill the position</text>
      <text x="110" y="366" font-size="11" fill="#64748b">vacated by the previous phase, preventing merger.</text>
    </svg>
  </div>
  <figcaption>
    <strong>Figure 2: Grimm's Law -- The First Germanic Consonant Shift.</strong> This chain shift, occurring in the first millennium BCE, systematically transformed the entire stop consonant system of Proto-Indo-European as it evolved into Proto-Germanic. Each phase created a gap that was filled by the next: voiceless stops became fricatives (Phase 1), voiced stops moved into the vacated voiceless position (Phase 2), and voiced aspirated stops lost their aspiration to fill the voiced position (Phase 3). This regularity demonstrated for the first time that sound change is systematic, not accidental.
  </figcaption>
</figure>
