  <figcaption>
    <strong>Figure 5: Types of Semantic Change.</strong> Words change meaning through six well-documented processes, organized into three categories. <em>Changes in scope</em> involve broadening (generalization) or narrowing (specialization) of a word's referential range. <em>Changes in evaluation</em> involve amelioration (improvement) or pejoration (degradation) of connotation. <em>Changes by transfer</em> involve metaphor (similarity-based mapping) or metonymy (contiguity-based association). These processes are not mutually exclusive -- a single word's history may involve multiple types of change over centuries.
  </figcaption>
