  <figcaption>
    <strong>Figure 8: Cross-Linguistic Grammaticalization Paths.</strong> Six recurrent grammaticalization pathways that have been independently attested across multiple unrelated language families worldwide. Movement verbs become future tense markers; body part nouns become spatial adpositions and then case markers; possession verbs become perfect aspect markers; demonstratives weaken into definite articles; full verbs become auxiliaries and then affixes; and spatial terms extend to temporal meanings. The independent recurrence of these paths across genetically unrelated languages demonstrates that grammaticalization is constrained by universal properties of human cognition and language use.
  </figcaption>
