      <text x="430" y="648" text-anchor="middle" font-size="10" fill="#94a3b8">Spellings were fixed in Middle English; pronunciations shifted -- hence English spelling appears "chaotic"</text>

  <figcaption>
    <strong>Figure 3: The Great Vowel Shift (c. 1400 -- 1700).</strong> All seven long vowels of Middle English shifted systematically upward. The highest vowels (/i:/ and /u:/) had nowhere to rise and instead diphthongized into /aI/ and /aU/. The mid vowels rose to fill the vacated high positions, and the low vowel /a:/ began its ascent. Because English spelling was largely standardized before the shift completed, modern English spelling preserves Middle English vowel values while modern pronunciation reflects the shifted system -- the primary source of English's notoriously opaque orthography.
  </figcaption>
