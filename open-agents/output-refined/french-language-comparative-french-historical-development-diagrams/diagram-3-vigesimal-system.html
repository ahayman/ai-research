<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Vigesimal Number System -- Gaulish Inheritance</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --accent-fr: #3b82f6;
    --accent-en: #10b981;
    --accent-fr-bg: #eff6ff;
    --accent-en-bg: #ecfdf5;
    --celtic: #f59e0b;
    --celtic-bg: #fffbeb;
    --decimal: #8b5cf6;
    --decimal-bg: #f5f3ff;
    --vigesimal: #e63946;
    --vigesimal-bg: #fef2f2;
    --muted: #6c757d;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --accent-fr: #60a5fa;
      --accent-en: #34d399;
      --accent-fr-bg: #1e293b;
      --accent-en-bg: #132e24;
      --celtic: #fbbf24;
      --celtic-bg: #2a2510;
      --decimal: #a78bfa;
      --decimal-bg: #1e1b3a;
      --vigesimal: #f87171;
      --vigesimal-bg: #2a1215;
      --muted: #9a9ab0;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure {
    max-width: 1000px;
    width: 100%;
    background: var(--surface);
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
  }
  h2 { text-align: center; font-size: 1.4rem; margin-bottom: 0.3rem; }
  .subtitle { text-align: center; font-size: 0.95rem; color: var(--muted); margin-bottom: 2rem; }

  .number-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.85rem;
    margin-bottom: 1.5rem;
  }
  .number-table th {
    padding: 0.6rem;
    text-align: center;
    border-bottom: 2px solid var(--border);
    font-size: 0.78rem;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    color: var(--muted);
  }
  .number-table td {
    padding: 0.6rem;
    text-align: center;
    border-bottom: 1px solid var(--border);
  }
  .number-table .num-col { font-weight: 800; font-size: 1.1rem; }
  .number-table .fr-col { color: var(--accent-fr); font-weight: 600; }
  .number-table .be-col { color: var(--decimal); }
  .number-table .sw-col { color: var(--decimal); }
  .number-table .en-col { color: var(--accent-en); }
  .number-table .math-col { font-size: 0.78rem; color: var(--muted); font-style: italic; }
  .vigesimal-row { background: var(--vigesimal-bg); }
  .vigesimal-row .fr-col { color: var(--vigesimal); font-weight: 800; }
  .decimal-row { background: var(--surface); }

  .math-breakdown {
    border: 2px solid var(--vigesimal);
    border-radius: 12px;
    padding: 1.2rem;
    margin-bottom: 1.5rem;
  }
  .math-breakdown h3 { font-size: 0.95rem; color: var(--vigesimal); margin-bottom: 0.8rem; text-align: center; }
  .math-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0.8rem;
  }
  .math-card {
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.8rem;
    text-align: center;
  }
  .math-card .math-num { font-size: 1.6rem; font-weight: 800; color: var(--vigesimal); }
  .math-card .math-fr { font-style: italic; font-weight: 600; margin: 0.2rem 0; }
  .math-card .math-formula { font-size: 0.82rem; color: var(--muted); }
  .math-card .math-literal { font-size: 0.75rem; color: var(--muted); font-style: italic; }

  .origin-box {
    border: 2px solid var(--celtic);
    border-radius: 12px;
    padding: 1.2rem;
    margin-bottom: 1.5rem;
    background: var(--celtic-bg);
  }
  .origin-box h3 { font-size: 0.95rem; color: var(--celtic); margin-bottom: 0.8rem; text-align: center; }
  .origin-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0.6rem;
  }
  .origin-card {
    border: 1px solid var(--celtic);
    border-radius: 8px;
    padding: 0.6rem;
    text-align: center;
    font-size: 0.82rem;
  }
  .origin-card .lang-name { font-weight: 700; color: var(--celtic); }
  .origin-card .lang-example { font-style: italic; }

  .en-comparison {
    margin-top: 1.5rem;
    background: var(--accent-en-bg);
    border: 2px solid var(--accent-en);
    border-radius: 12px;
    padding: 1.2rem;
  }
  .en-comparison h4 { color: var(--accent-en); margin-bottom: 0.5rem; }
  .en-comparison p { font-size: 0.88rem; }

  figcaption {
    margin-top: 1.5rem;
    padding-top: 1rem;
    border-top: 1px solid var(--border);
    font-size: 0.82rem;
    color: var(--muted);
    text-align: center;
  }
  @media (max-width: 640px) {
    .math-grid { grid-template-columns: 1fr; }
    .origin-grid { grid-template-columns: 1fr; }
    .number-table { font-size: 0.75rem; }
    figure { padding: 1.5rem; }
  }
</style>
</head>
<body>
<figure>
  <h2>The Vigesimal Number System</h2>
  <p class="subtitle">A Gaulish Celtic inheritance surviving 2,000+ years in French numbers 60-99</p>

  <table class="number-table">
    <thead>
      <tr>
        <th>Number</th>
        <th>Standard French</th>
        <th>Math</th>
        <th>Belgian FR</th>
        <th>Swiss FR</th>
        <th>English</th>
        <th>System</th>
      </tr>
    </thead>
    <tbody>
      <tr class="decimal-row">
        <td class="num-col">60</td>
        <td class="fr-col">soixante</td>
        <td class="math-col">60</td>
        <td class="be-col">soixante</td>
        <td class="sw-col">soixante</td>
        <td class="en-col">sixty</td>
        <td>Decimal</td>
      </tr>
      <tr class="vigesimal-row">
        <td class="num-col">70</td>
        <td class="fr-col">soixante-dix</td>
        <td class="math-col">60 + 10</td>
        <td class="be-col">septante</td>
        <td class="sw-col">septante</td>
        <td class="en-col">seventy</td>
        <td style="color:var(--vigesimal);font-weight:700;">Vigesimal</td>
      </tr>
      <tr class="vigesimal-row">
        <td class="num-col">71</td>
        <td class="fr-col">soixante-et-onze</td>
        <td class="math-col">60 + 11</td>
        <td class="be-col">septante-et-un</td>
        <td class="sw-col">septante-et-un</td>
        <td class="en-col">seventy-one</td>
        <td style="color:var(--vigesimal);font-weight:700;">Vigesimal</td>
      </tr>
      <tr class="vigesimal-row">
        <td class="num-col">80</td>
        <td class="fr-col">quatre-vingts</td>
        <td class="math-col">4 x 20</td>
        <td class="be-col">quatre-vingts</td>
        <td class="sw-col">huitante</td>
        <td class="en-col">eighty</td>
        <td style="color:var(--vigesimal);font-weight:700;">Vigesimal</td>
      </tr>
      <tr class="vigesimal-row">
        <td class="num-col">90</td>
        <td class="fr-col">quatre-vingt-dix</td>
        <td class="math-col">4 x 20 + 10</td>
        <td class="be-col">nonante</td>
        <td class="sw-col">nonante</td>
        <td class="en-col">ninety</td>
        <td style="color:var(--vigesimal);font-weight:700;">Vigesimal</td>
      </tr>
      <tr class="vigesimal-row">
        <td class="num-col">99</td>
        <td class="fr-col">quatre-vingt-dix-neuf</td>
        <td class="math-col">4 x 20 + 10 + 9</td>
        <td class="be-col">nonante-neuf</td>
        <td class="sw-col">nonante-neuf</td>
        <td class="en-col">ninety-nine</td>
        <td style="color:var(--vigesimal);font-weight:700;">Vigesimal</td>
      </tr>
    </tbody>
  </table>

  <div class="math-breakdown">
    <h3>The Arithmetic of French Numbers</h3>
    <div class="math-grid">
      <div class="math-card">
        <div class="math-num">70</div>
        <div class="math-fr">soixante-dix</div>
        <div class="math-formula">60 + 10</div>
        <div class="math-literal">"sixty-ten"</div>
      </div>
      <div class="math-card">
        <div class="math-num">80</div>
        <div class="math-fr">quatre-vingts</div>
        <div class="math-formula">4 x 20</div>
        <div class="math-literal">"four-twenties"</div>
      </div>
      <div class="math-card">
        <div class="math-num">99</div>
        <div class="math-fr">quatre-vingt-dix-neuf</div>
        <div class="math-formula">(4 x 20) + 10 + 9</div>
        <div class="math-literal">"four-twenties-ten-nine"</div>
      </div>
    </div>
  </div>

  <div class="origin-box">
    <h3>Celtic Base-20 Evidence -- The Gaulish Connection</h3>
    <div class="origin-grid">
      <div class="origin-card">
        <div class="lang-name">Breton</div>
        <div class="lang-example">tregont = 30 (but also uses base-20)</div>
        Celtic language of Brittany, retains vigesimal features
      </div>
      <div class="origin-card">
        <div class="lang-name">Welsh</div>
        <div class="lang-example">ugain = 20, deugain = 40 (2x20)</div>
        Celtic language with traditional vigesimal counting
      </div>
      <div class="origin-card">
        <div class="lang-name">Basque</div>
        <div class="lang-example">hogei = 20, laurogei = 80 (4x20)</div>
        Pre-Indo-European with vigesimal system -- suggests areal feature
      </div>
    </div>
  </div>

  <div class="en-comparison">
    <h4>ENGLISH COMPARISON</h4>
    <p>English uses a purely decimal system inherited from Germanic: <strong>seventy, eighty, ninety</strong> -- transparent, regular, base-10. Despite English being spoken in formerly Celtic Britain, <em>no Celtic substrate effect on English numbers is attested</em>. The Germanic settlers imposed their number system completely.</p>
    <p style="margin-top:0.5rem;"><strong>The pattern:</strong> The Gaulish vigesimal system has survived in Standard French for over 2,000 years, persisting through Latin dominance, Frankish conquest, and institutional standardization. Belgian, Swiss, and Congolese French replaced these forms with decimal equivalents, demonstrating that the vigesimal system is specifically a <em>Hexagonal French</em> feature -- a Celtic ghost that metropolitan France preserved while other francophone regions did not.</p>
  </div>

  <figcaption>
    Substrate influence can persist for millennia in specific lexical domains, even when the substrate language (Gaulish) has been extinct for over 1,500 years. The vigesimal numbers are among the most durable linguistic fossils in any European language.
  </figcaption>
</figure>
</body>
</html>
