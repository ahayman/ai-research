<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Jespersen Cycle in French Negation</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --accent-fr: #3b82f6;
    --accent-en: #10b981;
    --accent-fr-bg: #eff6ff;
    --accent-en-bg: #ecfdf5;
    --stage1: #f59e0b;
    --stage1-bg: #fffbeb;
    --stage2: #8b5cf6;
    --stage2-bg: #f5f3ff;
    --stage3: #e63946;
    --stage3-bg: #fef2f2;
    --muted: #6c757d;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --accent-fr: #60a5fa;
      --accent-en: #34d399;
      --accent-fr-bg: #1e293b;
      --accent-en-bg: #132e24;
      --stage1: #fbbf24;
      --stage1-bg: #2a2510;
      --stage2: #a78bfa;
      --stage2-bg: #1e1b3a;
      --stage3: #f87171;
      --stage3-bg: #2a1215;
      --muted: #9a9ab0;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure {
    max-width: 1100px;
    width: 100%;
    background: var(--surface);
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
  }
  h2 { text-align: center; font-size: 1.4rem; margin-bottom: 0.3rem; }
  .subtitle { text-align: center; font-size: 0.95rem; color: var(--muted); margin-bottom: 2rem; }

  .cycle-flow {
    display: grid;
    grid-template-columns: 1fr 40px 1fr 40px 1fr;
    gap: 0;
    align-items: stretch;
    margin-bottom: 2rem;
  }
  .stage-card {
    border: 3px solid var(--border);
    border-radius: 14px;
    padding: 1.2rem;
    display: flex;
    flex-direction: column;
  }
  .stage-num {
    font-size: 0.72rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 0.3rem;
  }
  .stage-title {
    font-size: 1rem;
    font-weight: 700;
    margin-bottom: 0.5rem;
  }
  .stage-period {
    font-size: 0.78rem;
    color: var(--muted);
    margin-bottom: 0.8rem;
  }
  .stage-example {
    font-size: 0.95rem;
    font-style: italic;
    font-weight: 600;
    margin-bottom: 0.3rem;
    text-align: center;
    padding: 0.5rem;
    border-radius: 8px;
  }
  .stage-gloss {
    font-size: 0.78rem;
    color: var(--muted);
    text-align: center;
    margin-bottom: 0.5rem;
  }
  .stage-desc {
    font-size: 0.82rem;
    flex: 1;
  }
  .neg-marker {
    font-weight: 800;
    padding: 1px 4px;
    border-radius: 4px;
  }
  .s1 { border-color: var(--stage1); }
  .s1 .stage-num { color: var(--stage1); }
  .s1 .stage-example { background: var(--stage1-bg); }
  .s1 .neg-marker { background: var(--stage1-bg); color: var(--stage1); }
  .s2 { border-color: var(--stage2); }
  .s2 .stage-num { color: var(--stage2); }
  .s2 .stage-example { background: var(--stage2-bg); }
  .s2 .neg-marker { background: var(--stage2-bg); color: var(--stage2); }
  .s3 { border-color: var(--stage3); }
  .s3 .stage-num { color: var(--stage3); }
  .s3 .stage-example { background: var(--stage3-bg); }
  .s3 .neg-marker { background: var(--stage3-bg); color: var(--stage3); }

  .flow-arrow {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.5rem;
    color: var(--muted);
  }

  .reinforcers {
    border: 2px solid var(--accent-fr);
    border-radius: 12px;
    padding: 1.2rem;
    margin-bottom: 1.5rem;
  }
  .reinforcers h3 { font-size: 0.95rem; color: var(--accent-fr); margin-bottom: 0.8rem; text-align: center; }
  .reinforcer-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0.6rem;
  }
  .reinforcer-card {
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.6rem;
    text-align: center;
    font-size: 0.82rem;
  }
  .reinforcer-card .r-word { font-weight: 700; color: var(--accent-fr); font-size: 0.95rem; }
  .reinforcer-card .r-orig { font-style: italic; color: var(--muted); font-size: 0.75rem; }
  .reinforcer-card .r-meaning { font-size: 0.78rem; margin-top: 0.2rem; }

  .ne-drop-bar {
    margin: 1.5rem 0;
    border: 2px solid var(--stage3);
    border-radius: 12px;
    padding: 1.2rem;
  }
  .ne-drop-bar h3 { font-size: 0.95rem; color: var(--stage3); margin-bottom: 0.8rem; text-align: center; }
  .bar-container {
    position: relative;
    height: 32px;
    background: var(--stage2-bg);
    border-radius: 8px;
    overflow: hidden;
    margin-bottom: 0.5rem;
  }
  .bar-fill {
    height: 100%;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.78rem;
    font-weight: 700;
    color: #fff;
  }
  .bar-label {
    font-size: 0.82rem;
    margin-bottom: 0.3rem;
    font-weight: 600;
  }
  .bar-note { font-size: 0.75rem; color: var(--muted); text-align: center; margin-top: 0.5rem; }

  .en-comparison {
    margin-top: 1.5rem;
    background: var(--accent-en-bg);
    border: 2px solid var(--accent-en);
    border-radius: 12px;
    padding: 1.2rem;
  }
  .en-comparison h4 { color: var(--accent-en); margin-bottom: 0.5rem; }
  .en-comparison p { font-size: 0.88rem; }
  .en-stages {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 0.5rem;
    margin-top: 0.5rem;
  }
  .en-stage {
    border: 1px solid var(--accent-en);
    border-radius: 8px;
    padding: 0.5rem;
    text-align: center;
    font-size: 0.82rem;
  }

  figcaption {
    margin-top: 1.5rem;
    padding-top: 1rem;
    border-top: 1px solid var(--border);
    font-size: 0.82rem;
    color: var(--muted);
    text-align: center;
  }
  @media (max-width: 768px) {
    .cycle-flow { grid-template-columns: 1fr; gap: 0.5rem; }
    .flow-arrow { transform: rotate(90deg); padding: 0.3rem 0; }
    .reinforcer-grid { grid-template-columns: 1fr 1fr; }
    .en-stages { grid-template-columns: 1fr; }
    figure { padding: 1.5rem; }
  }
</style>
</head>
<body>
<figure>
  <h2>The Jespersen Cycle in French Negation</h2>
  <p class="subtitle">A universal pattern of language change -- French is the textbook example, currently transitioning from Stage II to Stage III</p>

  <div class="cycle-flow">
    <div class="stage-card s1">
      <div class="stage-num">Stage I -- Preverbal Only</div>
      <div class="stage-title">ne alone</div>
      <div class="stage-period">Latin & Old French (pre-~1200)</div>
      <div class="stage-example">
        Je <span class="neg-marker">ne</span> sai
      </div>
      <div class="stage-gloss">"I [not] know" -- ne carries ALL negation</div>
      <div class="stage-desc">Latin: <em>non dico</em> ("I do not say"). In early Old French, <strong>ne</strong> alone was sufficient. No reinforcement needed.</div>
    </div>

    <div class="flow-arrow">&#10132;</div>

    <div class="stage-card s2">
      <div class="stage-num">Stage II -- Bipartite</div>
      <div class="stage-title">ne...pas</div>
      <div class="stage-period">Standard Modern French (writing)</div>
      <div class="stage-example">
        Je <span class="neg-marker">ne</span> sais <span class="neg-marker">pas</span>
      </div>
      <div class="stage-gloss">"I [not] know [a step]" -- ne + pas bracket the verb</div>
      <div class="stage-desc">ne weakened and was reinforced by emphatic nouns. <strong>pas</strong> (originally "a step") became the default reinforcer. Bipartite ne...pas is obligatory in standard written French.</div>
    </div>

    <div class="flow-arrow">&#10132;</div>

    <div class="stage-card s3">
      <div class="stage-num">Stage III -- Postverbal Only</div>
      <div class="stage-title">pas alone</div>
      <div class="stage-period">Contemporary Spoken French</div>
      <div class="stage-example">
        Je sais <span class="neg-marker">pas</span>
      </div>
      <div class="stage-gloss">"I know [not]" -- ne dropped, pas carries ALL negation</div>
      <div class="stage-desc">ne is dropped in 60-95% of European spoken French and ~99% in Quebec French. The cycle has nearly completed: the postverbal element now carries negation alone.</div>
    </div>
  </div>

  <div class="reinforcers">
    <h3>The Original Reinforcers -- From Nouns to Negation Markers</h3>
    <div class="reinforcer-grid">
      <div class="reinforcer-card">
        <div class="r-word">pas</div>
        <div class="r-orig">Originally: "a step"</div>
        <div class="r-meaning">"Je ne marche pas" = "I don't walk <em>a step</em>." Now the default universal negator.</div>
      </div>
      <div class="reinforcer-card">
        <div class="r-word">point</div>
        <div class="r-orig">Originally: "a point / dot"</div>
        <div class="r-meaning">"Je ne vois point" = "I don't see <em>a point</em>." Survives in formal/literary register.</div>
      </div>
      <div class="reinforcer-card">
        <div class="r-word">mie</div>
        <div class="r-orig">Originally: "a crumb"</div>
        <div class="r-meaning">"Je ne mange mie" = "I don't eat <em>a crumb</em>." Now archaic, lost to pas.</div>
      </div>
      <div class="reinforcer-card">
        <div class="r-word">goutte</div>
        <div class="r-orig">Originally: "a drop"</div>
        <div class="r-meaning">"Je ne vois goutte" = "I don't see <em>a drop</em>." Survives in expression "n'y voir goutte."</div>
      </div>
    </div>
  </div>

  <div class="ne-drop-bar">
    <h3>Current Ne-Drop Rates -- The Cycle in Progress</h3>
    <div class="bar-label">European French (ne dropped 60-95% depending on register/context)</div>
    <div class="bar-container">
      <div class="bar-fill" style="width:78%;background:linear-gradient(to right, var(--stage2), var(--stage3));">
        60-95% ne dropped
      </div>
    </div>
    <div class="bar-label" style="margin-top:0.8rem;">Quebec French (ne dropped ~99%)</div>
    <div class="bar-container">
      <div class="bar-fill" style="width:99%;background:var(--stage3);">
        ~99% ne dropped
      </div>
    </div>
    <div class="bar-note">European French ranges widely: casual youth speech ~95%, middle-aged neutral speech ~60-80%, formal speech much lower. Quebec French has nearly completed the cycle.</div>
  </div>

  <div class="en-comparison">
    <h4>ENGLISH COMPARISON -- A Different Negation Path</h4>
    <p>English underwent negation changes but not a clean Jespersen Cycle. It developed a unique auxiliary-based system instead:</p>
    <div class="en-stages">
      <div class="en-stage">
        <strong>Old English</strong><br>
        <em>ic ne secge</em><br>
        Preverbal ne (like French Stage I)
      </div>
      <div class="en-stage">
        <strong>Middle English</strong><br>
        <em>I ne seye not</em><br>
        ne + not bipartite (like French Stage II), then ne lost
      </div>
      <div class="en-stage">
        <strong>Modern English</strong><br>
        <em>I do not say</em><br>
        Do-support: unique auxiliary construction, no exact parallel in French
      </div>
    </div>
    <p style="margin-top:0.5rem;"><strong>The pattern:</strong> Both languages moved away from simple preverbal negation, but French developed postverbal reinforcement (ne...pas -> pas) while English developed auxiliary support (do not). Both show the tendency toward bipartite structures.</p>
  </div>

  <figcaption>
    The Jespersen Cycle (named after Otto Jespersen, though first observed by Antoine Meillet in 1912) is a recurring cross-linguistic pattern. French is the canonical textbook example, with all three stages documented and datable. The cycle demonstrates that language change follows predictable structural patterns, not random drift.
  </figcaption>
</figure>
</body>
</html>
