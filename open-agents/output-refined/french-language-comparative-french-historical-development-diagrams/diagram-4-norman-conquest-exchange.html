<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Norman Conquest Vocabulary Exchange</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --accent-fr: #3b82f6;
    --accent-en: #10b981;
    --accent-fr-bg: #eff6ff;
    --accent-en-bg: #ecfdf5;
    --accent-shared: #8b5cf6;
    --accent-shared-bg: #f5f3ff;
    --accent-modern: #f59e0b;
    --accent-modern-bg: #fffbeb;
    --muted: #6c757d;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --accent-fr: #60a5fa;
      --accent-en: #34d399;
      --accent-fr-bg: #1e293b;
      --accent-en-bg: #132e24;
      --accent-shared: #a78bfa;
      --accent-shared-bg: #1e1b3a;
      --accent-modern: #fbbf24;
      --accent-modern-bg: #2a2510;
      --muted: #9a9ab0;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure {
    max-width: 1100px;
    width: 100%;
    background: var(--surface);
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
  }
  h2 { text-align: center; font-size: 1.4rem; margin-bottom: 0.3rem; }
  .subtitle { text-align: center; font-size: 0.95rem; color: var(--muted); margin-bottom: 2rem; }

  .flow-diagram {
    display: grid;
    grid-template-columns: 1fr 80px 1fr;
    gap: 0;
    margin-bottom: 2rem;
  }
  .flow-side {
    border: 2px solid var(--border);
    border-radius: 12px;
    padding: 1.2rem;
  }
  .flow-side h3 {
    font-size: 1rem;
    margin-bottom: 0.3rem;
  }
  .flow-side .flow-scale {
    font-size: 0.82rem;
    color: var(--muted);
    margin-bottom: 1rem;
  }
  .fr-to-en { border-color: var(--accent-fr); }
  .fr-to-en h3 { color: var(--accent-fr); }
  .en-to-fr { border-color: var(--accent-modern); }
  .en-to-fr h3 { color: var(--accent-modern); }

  .flow-center {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
  }
  .arrow-block {
    text-align: center;
    font-size: 0.72rem;
    color: var(--muted);
  }
  .big-arrow { font-size: 2rem; line-height: 1; }
  .small-arrow { font-size: 1.2rem; line-height: 1; }

  .category-list { list-style: none; }
  .category-list li {
    padding: 0.5rem 0;
    border-bottom: 1px solid var(--border);
    font-size: 0.85rem;
  }
  .category-list li:last-child { border-bottom: none; }
  .cat-name {
    font-weight: 700;
    font-size: 0.82rem;
  }
  .cat-words {
    font-style: italic;
    color: var(--muted);
    font-size: 0.8rem;
  }

  .meat-split {
    margin-bottom: 2rem;
    border: 2px solid var(--accent-shared);
    border-radius: 12px;
    padding: 1.2rem;
  }
  .meat-split h3 { font-size: 1rem; color: var(--accent-shared); margin-bottom: 1rem; text-align: center; }
  .meat-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.88rem;
  }
  .meat-table th {
    padding: 0.5rem;
    text-align: center;
    border-bottom: 2px solid var(--border);
    font-size: 0.75rem;
    text-transform: uppercase;
    color: var(--muted);
  }
  .meat-table td {
    padding: 0.5rem;
    text-align: center;
    border-bottom: 1px solid var(--border);
  }
  .meat-table .germ { color: var(--accent-en); font-weight: 600; }
  .meat-table .fren { color: var(--accent-fr); font-weight: 600; }
  .meat-table .social { font-size: 0.78rem; color: var(--muted); font-style: italic; }

  .register-split {
    margin-bottom: 1.5rem;
    border: 2px solid var(--accent-fr);
    border-radius: 12px;
    padding: 1.2rem;
  }
  .register-split h3 { font-size: 1rem; color: var(--accent-fr); margin-bottom: 1rem; text-align: center; }
  .reg-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0.5rem;
  }
  .reg-pair {
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.6rem;
    text-align: center;
    font-size: 0.82rem;
  }
  .reg-pair .low { color: var(--accent-en); font-weight: 600; }
  .reg-pair .high { color: var(--accent-fr); font-weight: 600; }
  .reg-pair .reg-label { font-size: 0.7rem; color: var(--muted); }

  .guerre-box {
    margin-top: 1.5rem;
    border: 2px solid var(--accent-shared);
    border-radius: 12px;
    padding: 1.2rem;
    background: var(--accent-shared-bg);
  }
  .guerre-box h4 { color: var(--accent-shared); margin-bottom: 0.5rem; }
  .guerre-box p { font-size: 0.88rem; }

  figcaption {
    margin-top: 1.5rem;
    padding-top: 1rem;
    border-top: 1px solid var(--border);
    font-size: 0.82rem;
    color: var(--muted);
    text-align: center;
  }
  @media (max-width: 768px) {
    .flow-diagram { grid-template-columns: 1fr; gap: 1rem; }
    .flow-center { flex-direction: row; justify-content: center; }
    .reg-grid { grid-template-columns: 1fr 1fr; }
    figure { padding: 1.5rem; }
  }
</style>
</head>
<body>
<figure>
  <h2>The Norman Conquest Vocabulary Exchange</h2>
  <p class="subtitle">1066 -- The event that permanently fused French vocabulary into English's Germanic structure</p>

  <div class="flow-diagram">
    <div class="flow-side fr-to-en">
      <h3>French -> English (1066-1400s)</h3>
      <div class="flow-scale">10,000+ words. ~30% of modern English vocabulary. MASSIVE, asymmetric transfer.</div>
      <ul class="category-list">
        <li><span class="cat-name">Government & Law:</span> <span class="cat-words">parliament, justice, court, judge, attorney, crime, prison, verdict, government, authority</span></li>
        <li><span class="cat-name">Cuisine & Dining:</span> <span class="cat-words">dinner, supper, sauce, cuisine, restaurant, beef, pork, mutton, venison</span></li>
        <li><span class="cat-name">Culture & Arts:</span> <span class="cat-words">art, music, literature, poetry, dance, romance, beauty, fashion</span></li>
        <li><span class="cat-name">Social & Class:</span> <span class="cat-words">noble, gentle, courtesy, honor, virtue, courage, chivalry</span></li>
        <li><span class="cat-name">Military:</span> <span class="cat-words">army, battle, siege, castle, defense, soldier, lieutenant</span></li>
        <li><span class="cat-name">Religion:</span> <span class="cat-words">religion, prayer, sermon, salvation, clergy, cathedral</span></li>
      </ul>
    </div>

    <div class="flow-center">
      <div class="arrow-block">
        <div class="big-arrow" style="color:var(--accent-fr);">&#10232;</div>
        <div>Historical</div>
        <div>10,000+</div>
      </div>
      <div style="height:2rem;"></div>
      <div class="arrow-block">
        <div class="small-arrow" style="color:var(--accent-modern);">&#10233;</div>
        <div>Modern</div>
        <div>Smaller</div>
      </div>
    </div>

    <div class="flow-side en-to-fr">
      <h3>English -> French (19th C. - Present)</h3>
      <div class="flow-scale">Much smaller, mostly modern domains. Academie francaise resistance.</div>
      <ul class="category-list">
        <li><span class="cat-name">Technology:</span> <span class="cat-words">le smartphone, le software (logiciel), le bug, le cloud</span></li>
        <li><span class="cat-name">Business:</span> <span class="cat-words">le marketing, le management, le business, le startup</span></li>
        <li><span class="cat-name">Culture:</span> <span class="cat-words">le weekend, le shopping, le brunch, le cool</span></li>
        <li><span class="cat-name">Sports:</span> <span class="cat-words">le football, le rugby, le tennis, le jogging</span></li>
        <li><span class="cat-name" style="color:var(--accent-fr);">Academie Resistance:</span> <span class="cat-words">courriel (not email), logiciel (not software), ordinateur (not computer)</span></li>
      </ul>
    </div>
  </div>

  <div class="meat-split">
    <h3>The Meat/Animal Split -- Social Hierarchy Encoded in Vocabulary</h3>
    <table class="meat-table">
      <thead>
        <tr>
          <th>Living Animal</th>
          <th>Origin</th>
          <th>Meat on Table</th>
          <th>Origin</th>
          <th>Social Logic</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td class="germ">cow</td><td class="social">Germanic (OE cu)</td>
          <td class="fren">beef</td><td class="social">French (boeuf)</td>
          <td class="social">Peasants raised it / Nobles ate it</td>
        </tr>
        <tr>
          <td class="germ">sheep</td><td class="social">Germanic (OE sceap)</td>
          <td class="fren">mutton</td><td class="social">French (mouton)</td>
          <td class="social">Peasants raised it / Nobles ate it</td>
        </tr>
        <tr>
          <td class="germ">pig</td><td class="social">Germanic (OE picg)</td>
          <td class="fren">pork</td><td class="social">French (porc)</td>
          <td class="social">Peasants raised it / Nobles ate it</td>
        </tr>
        <tr>
          <td class="germ">deer</td><td class="social">Germanic (OE deor)</td>
          <td class="fren">venison</td><td class="social">French (venaison)</td>
          <td class="social">Peasants saw it / Nobles hunted it</td>
        </tr>
      </tbody>
    </table>
    <p style="font-size:0.82rem;color:var(--muted);margin-top:0.5rem;text-align:center;">French has a single word for each (boeuf, mouton, porc, cerf) -- no split, because French speakers occupied both social roles.</p>
  </div>

  <div class="register-split">
    <h3>Register Doubling -- Germanic Base Word vs. French Elevated Synonym</h3>
    <div class="reg-grid">
      <div class="reg-pair">
        <div class="low">begin</div>
        <div class="reg-label">Germanic (everyday)</div>
        <div class="high">commence</div>
        <div class="reg-label">French (formal)</div>
      </div>
      <div class="reg-pair">
        <div class="low">ask</div>
        <div class="reg-label">Germanic (everyday)</div>
        <div class="high">demand / inquire</div>
        <div class="reg-label">French (formal)</div>
      </div>
      <div class="reg-pair">
        <div class="low">kingly</div>
        <div class="reg-label">Germanic (everyday)</div>
        <div class="high">royal</div>
        <div class="reg-label">French (formal)</div>
      </div>
      <div class="reg-pair">
        <div class="low">freedom</div>
        <div class="reg-label">Germanic (everyday)</div>
        <div class="high">liberty</div>
        <div class="reg-label">French (formal)</div>
      </div>
    </div>
  </div>

  <div class="guerre-box">
    <h4>Case Study: "guerre" / "war" -- The Round-Trip Word</h4>
    <p>Frankish Germanic <em>*werra</em> -> Old French <em>guerre</em> (Frankish superstrate, replacing Latin <em>bellum</em>) -> Anglo-Norman <em>werre</em> -> English <strong>"war"</strong>. A word that traveled from one Germanic language, through a Romance language, and back into a different Germanic language. The initial /w/ -> /gw/ -> /g/ shift is characteristic of how French adapted Germanic w-initial words (cf. <em>garden</em> from Frankish *<em>wardo</em> -> French <em>jardin</em> -> English borrowed both <em>garden</em> and <em>jardin</em>).</p>
  </div>

  <figcaption>
    The Norman Conquest created the most important single contact event in the history of either language. English absorbed French vocabulary wholesale while retaining Germanic grammar -- creating a language that is structurally Germanic but lexically heavily French. This register-split architecture persists in modern English.
  </figcaption>
</figure>
</body>
</html>
