        ISO["<b>ISOLATING</b><br/>Mandarin, Vietnamese, Thai"]
        ISO_S["<b>Strategy:</b><br/>Focus on word order rules<br/>Learn classifier systems<br/>Master tone distinctions<br/>Study particles and context<br/><i>No inflectional endings exist</i>"]

        AGG["<b>AGGLUTINATIVE</b><br/>Turkish, Finnish, Japanese, Korean, Swahili"]
        AGG_S["<b>Strategy:</b><br/>Master the affix inventory<br/>Each suffix = one meaning<br/>Build words like LEGO bricks<br/>Highly regular and predictable<br/><i>Ideal for pattern learners</i>"]

        FUS["<b>FUSIONAL</b><br/>Latin, Russian, Spanish, German, Arabic"]
        FUS_S["<b>Strategy:</b><br/>Learn paradigm tables<br/>Conjugation + declension charts<br/>Multiple meanings per ending<br/>Expect irregularities in<br/>high-frequency words"]

        POLY["<b>POLYSYNTHETIC</b><br/>Inuktitut, Mohawk, Yupik"]
        POLY_S["<b>Strategy:</b><br/>One 'word' = whole clause<br/>Focus on morpheme-building<br/>Extensive combination system<br/>Very different from English<br/><i>Sentence-words</i>"]

        ISO --> ISO_S
        AGG --> AGG_S
        FUS --> FUS_S
        POLY --> POLY_S
    end

    subgraph ORDER["WORD ORDER → Predict correlated features"]

        SOV["<b>SOV</b><br/>Japanese, Korean,<br/>Turkish, Hindi, Persian"]
        SOV_F["Postpositions ✓<br/>Genitive before noun ✓<br/>Adjective before noun ✓<br/>Relative clause before noun ✓<br/>HEAD-FINAL"]

        SVO["<b>SVO</b><br/>English, French,<br/>Spanish, Mandarin, Russian"]
        SVO_F["Prepositions ✓<br/>Variable genitive position<br/>Relative clause after noun ✓<br/>Mixed head direction"]

        VSO["<b>VSO</b><br/>Irish, Welsh,<br/>Arabic, Hawaiian, Tagalog"]
        VSO_F["Prepositions ✓ (always)<br/>Genitive after noun ✓<br/>Adjective after noun ✓<br/>HEAD-INITIAL"]

        SOV --> SOV_F
        SVO --> SVO_F
        VSO --> VSO_F
    end

    subgraph CASE["CASE MARKING → How are roles signaled?"]

        NOCASE["<b>NO CASE</b><br/>English, Mandarin, French"]
        NOCASE_S["Word order is sacred<br/>Learn it — do not deviate<br/>Position = meaning"]

        NOMACC["<b>NOMINATIVE-ACCUSATIVE</b><br/>German, Russian, Latin,<br/>Turkish, Finnish"]
        NOMACC_S["Learn case paradigms<br/>Case endings track roles<br/>Gain word order freedom"]

        ERGABS_S["Reframe 'subject'<br/>Agent of transitive = special<br/>Different from English logic"]

    end
