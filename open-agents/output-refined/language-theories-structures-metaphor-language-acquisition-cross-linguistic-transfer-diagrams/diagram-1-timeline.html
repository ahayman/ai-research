<!-- Diagram: First Language Acquisition Timeline -->
<!-- Type: SVG horizontal timeline -->
<!-- Generated: 2026-03-15 -->
<!-- Description: Horizontal timeline showing the six stages of first language acquisition from prelinguistic (0-12 months) through mastery (5+ years), with vocabulary milestones and key features at each stage -->

<figure class="concept-diagram" id="diagram-timeline">
  <div class="diagram-container">
    <svg viewBox="0 0 1400 620" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="timeline-title timeline-desc" style="width:100%;max-width:1400px;margin:0 auto;display:block;">
      <title id="timeline-title">First Language Acquisition Timeline</title>
      <desc id="timeline-desc">Horizontal timeline showing six stages of language acquisition: Prelinguistic (0-12 months), One-Word (12-18 months), Two-Word (18-24 months), Telegraphic (24-30 months), Complex Grammar (30-60 months), and Mastery (5+ years), with vocabulary milestones at each stage.</desc>

      <defs>
        <linearGradient id="timelineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" class="grad-start"/>
          <stop offset="100%" class="grad-end"/>
        </linearGradient>
        <filter id="shadow">
          <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/>
        </filter>
        <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
          <polygon points="0 0, 10 3.5, 0 7" class="arrow-fill"/>
        </marker>
      </defs>

      <!-- Title -->
      <text x="700" y="38" text-anchor="middle" class="title-text" font-size="22" font-weight="700">First Language Acquisition Timeline</text>
      <text x="700" y="60" text-anchor="middle" class="subtitle-text" font-size="13">The universal developmental sequence: sounds → syllables → words → combinations → grammar → mastery</text>

      <!-- Main timeline axis -->
      <line x1="60" y1="140" x2="1340" y2="140" class="timeline-line" stroke-width="4" marker-end="url(#arrowhead)"/>

      <!-- Age labels along timeline -->
      <text x="120" y="165" text-anchor="middle" class="age-label" font-size="11">Birth</text>
      <text x="300" y="165" text-anchor="middle" class="age-label" font-size="11">12 mo</text>
      <text x="480" y="165" text-anchor="middle" class="age-label" font-size="11">18 mo</text>
      <text x="660" y="165" text-anchor="middle" class="age-label" font-size="11">24 mo</text>
      <text x="860" y="165" text-anchor="middle" class="age-label" font-size="11">30 mo</text>
      <text x="1100" y="165" text-anchor="middle" class="age-label" font-size="11">5 yrs</text>
      <text x="1300" y="165" text-anchor="middle" class="age-label" font-size="11">5+ yrs</text>

      <!-- Tick marks -->
      <line x1="120" y1="132" x2="120" y2="148" class="tick-mark" stroke-width="2"/>
      <line x1="300" y1="132" x2="300" y2="148" class="tick-mark" stroke-width="2"/>
      <line x1="480" y1="132" x2="480" y2="148" class="tick-mark" stroke-width="2"/>
      <line x1="660" y1="132" x2="660" y2="148" class="tick-mark" stroke-width="2"/>
      <line x1="860" y1="132" x2="860" y2="148" class="tick-mark" stroke-width="2"/>
      <line x1="1100" y1="132" x2="1100" y2="148" class="tick-mark" stroke-width="2"/>
      <line x1="1300" y1="132" x2="1300" y2="148" class="tick-mark" stroke-width="2"/>

      <!-- Stage 1: Prelinguistic -->
      <rect x="50" y="190" width="210" height="200" rx="10" class="stage-box stage-1" filter="url(#shadow)"/>
      <rect x="50" y="190" width="210" height="36" rx="10" class="stage-header stage-1-header"/>
      <rect x="50" y="216" width="210" height="10" class="stage-header stage-1-header"/>
      <text x="155" y="213" text-anchor="middle" class="stage-title" font-size="13" font-weight="700">Prelinguistic</text>
      <text x="155" y="232" text-anchor="middle" class="stage-age" font-size="10.5">0 - 12 months</text>

      <line x1="155" y1="148" x2="155" y2="190" class="connector" stroke-width="1.5" stroke-dasharray="4,3"/>

      <text x="65" y="256" class="stage-detail" font-size="10">Cooing (vowel sounds)</text>
      <text x="65" y="273" class="stage-detail" font-size="10">Babbling (ba-ba, ma-ma)</text>
      <text x="65" y="290" class="stage-detail" font-size="10">Sound discrimination narrows</text>
      <text x="65" y="307" class="stage-detail" font-size="10">Gesture + eye contact</text>

      <rect x="70" y="322" width="170" height="28" rx="6" class="vocab-badge"/>
      <text x="155" y="340" text-anchor="middle" class="vocab-text" font-size="10" font-weight="600">Vocab: 0 words</text>
      <text x="155" y="372" text-anchor="middle" class="pattern-note" font-size="9">Sounds of ALL languages</text>
      <text x="155" y="384" text-anchor="middle" class="pattern-note" font-size="9">→ narrows to native sounds</text>

      <!-- Stage 2: One-Word -->
      <rect x="270" y="190" width="195" height="200" rx="10" class="stage-box stage-2" filter="url(#shadow)"/>
      <rect x="270" y="190" width="195" height="36" rx="10" class="stage-header stage-2-header"/>
      <rect x="270" y="216" width="195" height="10" class="stage-header stage-2-header"/>
      <text x="367" y="213" text-anchor="middle" class="stage-title" font-size="13" font-weight="700">One-Word</text>
      <text x="367" y="232" text-anchor="middle" class="stage-age" font-size="10.5">12 - 18 months</text>

      <line x1="367" y1="148" x2="367" y2="190" class="connector" stroke-width="1.5" stroke-dasharray="4,3"/>

      <text x="285" y="256" class="stage-detail" font-size="10">First recognizable words</text>
      <text x="285" y="273" class="stage-detail" font-size="10">Holophrastic: "milk!" = sentence</text>
      <text x="285" y="290" class="stage-detail" font-size="10">Mostly nouns + social words</text>
      <text x="285" y="307" class="stage-detail" font-size="10">Context-dependent meaning</text>

      <rect x="290" y="322" width="155" height="28" rx="6" class="vocab-badge"/>
      <text x="367" y="340" text-anchor="middle" class="vocab-text" font-size="10" font-weight="600">Vocab: ~50 words</text>
      <text x="367" y="372" text-anchor="middle" class="pattern-note" font-size="9">Single words carry</text>
      <text x="367" y="384" text-anchor="middle" class="pattern-note" font-size="9">full propositions</text>

      <!-- Stage 3: Two-Word -->
      <rect x="475" y="190" width="195" height="200" rx="10" class="stage-box stage-3" filter="url(#shadow)"/>
      <rect x="475" y="190" width="195" height="36" rx="10" class="stage-header stage-3-header"/>
      <rect x="475" y="216" width="195" height="10" class="stage-header stage-3-header"/>
      <text x="572" y="213" text-anchor="middle" class="stage-title" font-size="13" font-weight="700">Two-Word</text>
      <text x="572" y="232" text-anchor="middle" class="stage-age" font-size="10.5">18 - 24 months</text>

      <line x1="572" y1="148" x2="572" y2="190" class="connector" stroke-width="1.5" stroke-dasharray="4,3"/>

      <text x="490" y="256" class="stage-detail" font-size="10">"Vocabulary explosion" begins</text>
      <text x="490" y="273" class="stage-detail" font-size="10">Combinations: "more milk"</text>
      <text x="490" y="290" class="stage-detail" font-size="10">Rudimentary syntax emerges</text>
      <text x="490" y="307" class="stage-detail" font-size="10">Word order reflects L1</text>

      <rect x="495" y="322" width="155" height="28" rx="6" class="vocab-badge"/>
      <text x="572" y="340" text-anchor="middle" class="vocab-text" font-size="10" font-weight="600">Vocab: 200-300</text>
      <text x="572" y="372" text-anchor="middle" class="pattern-note" font-size="9">NOT random pairs —</text>
      <text x="572" y="384" text-anchor="middle" class="pattern-note" font-size="9">structured combinations</text>

      <!-- Stage 4: Telegraphic -->
      <rect x="680" y="190" width="210" height="200" rx="10" class="stage-box stage-4" filter="url(#shadow)"/>
      <rect x="680" y="190" width="210" height="36" rx="10" class="stage-header stage-4-header"/>
      <rect x="680" y="216" width="210" height="10" class="stage-header stage-4-header"/>
      <text x="785" y="213" text-anchor="middle" class="stage-title" font-size="13" font-weight="700">Telegraphic</text>
      <text x="785" y="232" text-anchor="middle" class="stage-age" font-size="10.5">24 - 30 months</text>

      <line x1="785" y1="148" x2="785" y2="190" class="connector" stroke-width="1.5" stroke-dasharray="4,3"/>

      <text x="695" y="256" class="stage-detail" font-size="10">"Daddy go work" (no function words)</text>
      <text x="695" y="273" class="stage-detail" font-size="10">Morphemes appear in order</text>
      <text x="695" y="290" class="stage-detail" font-size="10">Overgeneralization: "goed"</text>
      <text x="695" y="307" class="stage-detail" font-size="10">= evidence of RULE extraction</text>

      <rect x="705" y="322" width="160" height="28" rx="6" class="vocab-badge"/>
      <text x="785" y="340" text-anchor="middle" class="vocab-text" font-size="10" font-weight="600">Vocab: 500-1,000</text>
      <text x="785" y="372" text-anchor="middle" class="pattern-note" font-size="9">"Errors" prove children</text>
      <text x="785" y="384" text-anchor="middle" class="pattern-note" font-size="9">extract grammar RULES</text>

      <!-- Stage 5: Complex Grammar -->
      <rect x="900" y="190" width="220" height="200" rx="10" class="stage-box stage-5" filter="url(#shadow)"/>
      <rect x="900" y="190" width="220" height="36" rx="10" class="stage-header stage-5-header"/>
      <rect x="900" y="216" width="220" height="10" class="stage-header stage-5-header"/>
      <text x="1010" y="213" text-anchor="middle" class="stage-title" font-size="13" font-weight="700">Complex Grammar</text>
      <text x="1010" y="232" text-anchor="middle" class="stage-age" font-size="10.5">30 - 60 months</text>

      <line x1="1010" y1="148" x2="1010" y2="190" class="connector" stroke-width="1.5" stroke-dasharray="4,3"/>

      <text x="915" y="256" class="stage-detail" font-size="10">Full sentences with clauses</text>
      <text x="915" y="273" class="stage-detail" font-size="10">"The dog that bit me was brown"</text>
      <text x="915" y="290" class="stage-detail" font-size="10">Questions, negation acquired</text>
      <text x="915" y="307" class="stage-detail" font-size="10">Relative clauses mastered</text>

      <rect x="925" y="322" width="170" height="28" rx="6" class="vocab-badge"/>
      <text x="1010" y="340" text-anchor="middle" class="vocab-text" font-size="10" font-weight="600">Vocab: 2,000 - 5,000+</text>
      <text x="1010" y="372" text-anchor="middle" class="pattern-note" font-size="9">Core grammar of the</text>
      <text x="1010" y="384" text-anchor="middle" class="pattern-note" font-size="9">language is mastered</text>

      <!-- Stage 6: Mastery -->
      <rect x="1130" y="190" width="210" height="200" rx="10" class="stage-box stage-6" filter="url(#shadow)"/>
      <rect x="1130" y="190" width="210" height="36" rx="10" class="stage-header stage-6-header"/>
      <rect x="1130" y="216" width="210" height="10" class="stage-header stage-6-header"/>
      <text x="1235" y="213" text-anchor="middle" class="stage-title" font-size="13" font-weight="700">Mastery</text>
      <text x="1235" y="232" text-anchor="middle" class="stage-age" font-size="10.5">5+ years</text>

      <line x1="1235" y1="148" x2="1235" y2="190" class="connector" stroke-width="1.5" stroke-dasharray="4,3"/>

      <text x="1145" y="256" class="stage-detail" font-size="10">Literacy development</text>
      <text x="1145" y="273" class="stage-detail" font-size="10">Academic language grows</text>
      <text x="1145" y="290" class="stage-detail" font-size="10">Metalinguistic awareness</text>
      <text x="1145" y="307" class="stage-detail" font-size="10">Pragmatic refinement</text>

      <rect x="1155" y="322" width="160" height="28" rx="6" class="vocab-badge"/>
      <text x="1235" y="340" text-anchor="middle" class="vocab-text" font-size="10" font-weight="600">Vocab: 10,000+</text>
      <text x="1235" y="372" text-anchor="middle" class="pattern-note" font-size="9">Vocabulary keeps growing;</text>
      <text x="1235" y="384" text-anchor="middle" class="pattern-note" font-size="9">grammar is complete</text>

      <!-- Bottom pattern summary -->
      <rect x="120" y="430" width="1160" height="70" rx="10" class="pattern-box"/>
      <text x="700" y="455" text-anchor="middle" class="pattern-label" font-size="13" font-weight="700">THE PATTERN</text>
      <text x="700" y="475" text-anchor="middle" class="pattern-body" font-size="11.5">The sequence is invariant across all human languages: sounds → syllables → words → word combinations → grammar → complex grammar.</text>
      <text x="700" y="492" text-anchor="middle" class="pattern-body" font-size="11.5">Each stage builds on the previous. This is not taught — it emerges from the interaction of biology and linguistic input.</text>

      <!-- Progression arrows at bottom -->
      <text x="155" y="535" text-anchor="middle" class="progression-label" font-size="10" font-weight="600">Sounds</text>
      <text x="255" y="535" text-anchor="middle" class="arrow-text" font-size="14">→</text>
      <text x="367" y="535" text-anchor="middle" class="progression-label" font-size="10" font-weight="600">Words</text>
      <text x="467" y="535" text-anchor="middle" class="arrow-text" font-size="14">→</text>
      <text x="572" y="535" text-anchor="middle" class="progression-label" font-size="10" font-weight="600">Pairs</text>
      <text x="670" y="535" text-anchor="middle" class="arrow-text" font-size="14">→</text>
      <text x="785" y="535" text-anchor="middle" class="progression-label" font-size="10" font-weight="600">Phrases</text>
      <text x="895" y="535" text-anchor="middle" class="arrow-text" font-size="14">→</text>
      <text x="1010" y="535" text-anchor="middle" class="progression-label" font-size="10" font-weight="600">Sentences</text>
      <text x="1120" y="535" text-anchor="middle" class="arrow-text" font-size="14">→</text>
      <text x="1235" y="535" text-anchor="middle" class="progression-label" font-size="10" font-weight="600">Fluency</text>

      <!-- Vocabulary growth curve label -->
      <text x="700" y="570" text-anchor="middle" class="curve-label" font-size="11">Vocabulary growth: 0 → 50 → 300 → 1,000 → 5,000 → 10,000+ words</text>
      <rect x="200" y="582" width="1000" height="8" rx="4" class="growth-bar-bg"/>
      <rect x="200" y="582" width="40" height="8" rx="4" class="growth-bar-1"/>
      <rect x="200" y="582" width="120" height="8" rx="4" class="growth-bar-2"/>
      <rect x="200" y="582" width="300" height="8" rx="4" class="growth-bar-3"/>
      <rect x="200" y="582" width="550" height="8" rx="4" class="growth-bar-4"/>
      <rect x="200" y="582" width="800" height="8" rx="4" class="growth-bar-5"/>
      <rect x="200" y="582" width="1000" height="8" rx="4" class="growth-bar-6"/>
    </svg>
  </div>
  <figcaption>
    <strong>Figure 1: First Language Acquisition Timeline.</strong> Children around the world reach language milestones in roughly the same order and at roughly the same age. The sequence from prelinguistic sounds through complex grammar is invariant — a powerful pattern suggesting that language acquisition follows a biologically constrained developmental program. Vocabulary milestones are approximate averages; individual variation is normal but the sequence is universal.
  </figcaption>
</figure>
