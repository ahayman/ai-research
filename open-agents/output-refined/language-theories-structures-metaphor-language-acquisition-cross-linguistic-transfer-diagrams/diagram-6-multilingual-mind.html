<!-- Diagram: The Multilingual Mind -->
<!-- Type: SVG layered diagram -->
<!-- Generated: 2026-03-15 -->
<!-- Description: Layered diagram showing how languages share a common conceptual layer but maintain separate lexical systems in the bilingual/multilingual mind, with cross-activation links and the cumulative multilingual advantage -->

<figure class="concept-diagram" id="diagram-multilingual-mind">
  <div class="diagram-container">
    <svg viewBox="0 0 1100 820" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="multi-title multi-desc" style="width:100%;max-width:1100px;margin:0 auto;display:block;">
      <title id="multi-title">The Multilingual Mind</title>
      <desc id="multi-desc">Layered diagram showing the integrated-but-differentiated model of the multilingual lexicon. A shared conceptual layer at the center connects to separate but interconnected lexical systems for each language, with cross-activation links between them. Additional layers show phonological systems, the executive control system, and the cumulative advantage of multilingualism.</desc>

      <defs>
        <filter id="shadow">
          <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
        </filter>
        <filter id="glow">
          <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
          <feMerge>
            <feMergeNode in="coloredBlur"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>
        <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#16a34a"/>
        </marker>
        <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#0284c7"/>
        </marker>
        <marker id="arrowPurple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#7c3aed"/>
        </marker>
        <marker id="arrowAmber" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#d97706"/>
        </marker>
      </defs>

      <!-- Title -->
      <text x="550" y="38" text-anchor="middle" class="title-text" font-size="22" font-weight="700">The Multilingual Mind</text>
      <text x="550" y="58" text-anchor="middle" class="subtitle-text" font-size="13">Integrated but Differentiated: Shared Concepts, Separate Lexicons</text>

      <!-- Executive Control Layer (outermost) -->
      <rect x="40" y="80" width="1020" height="600" rx="20" class="exec-layer" filter="url(#shadow)"/>
      <text x="550" y="108" text-anchor="middle" class="exec-label" font-size="14" font-weight="700">EXECUTIVE CONTROL SYSTEM</text>
      <text x="550" y="125" text-anchor="middle" class="exec-detail" font-size="11">Selectively activates/inhibits languages depending on context — both are ALWAYS somewhat active</text>

      <!-- Phonological Layer (second ring) -->
      <rect x="80" y="140" width="940" height="200" rx="15" class="phono-layer"/>
      <text x="550" y="165" text-anchor="middle" class="layer-label" font-size="13" font-weight="700">PHONOLOGICAL SYSTEMS</text>

      <!-- L1 Phonology -->
      <rect x="110" y="180" width="250" height="140" rx="10" class="l1-phono-box" filter="url(#shadow)"/>
      <text x="235" y="205" text-anchor="middle" class="lang-title" font-size="12" font-weight="700">L1 Sound System</text>
      <text x="235" y="225" text-anchor="middle" class="lang-detail" font-size="10">Native phoneme inventory</text>
      <text x="235" y="242" text-anchor="middle" class="lang-detail" font-size="10">Prosody, stress, intonation</text>
      <text x="235" y="259" text-anchor="middle" class="lang-detail" font-size="10">Phonotactic constraints</text>
      <text x="235" y="280" text-anchor="middle" class="lang-example" font-size="9">/dɒɡ/ → "dog"</text>
      <text x="235" y="295" text-anchor="middle" class="lang-example" font-size="9">English phonemes</text>

      <!-- L2 Phonology -->
      <rect x="425" y="180" width="250" height="140" rx="10" class="l2-phono-box" filter="url(#shadow)"/>
      <text x="550" y="205" text-anchor="middle" class="lang-title" font-size="12" font-weight="700">L2 Sound System</text>
      <text x="550" y="225" text-anchor="middle" class="lang-detail" font-size="10">Acquired phoneme inventory</text>
      <text x="550" y="242" text-anchor="middle" class="lang-detail" font-size="10">May overlap with L1</text>
      <text x="550" y="259" text-anchor="middle" class="lang-detail" font-size="10">Accent = L1 influence</text>
      <text x="550" y="280" text-anchor="middle" class="lang-example" font-size="9">/pɛ.ʁo/ → "perro"</text>
      <text x="550" y="295" text-anchor="middle" class="lang-example" font-size="9">Spanish phonemes</text>

      <!-- L3 Phonology -->
      <rect x="740" y="180" width="250" height="140" rx="10" class="l3-phono-box" filter="url(#shadow)"/>
      <text x="865" y="205" text-anchor="middle" class="lang-title" font-size="12" font-weight="700">L3+ Sound System</text>
      <text x="865" y="225" text-anchor="middle" class="lang-detail" font-size="10">Newest phoneme inventory</text>
      <text x="865" y="242" text-anchor="middle" class="lang-detail" font-size="10">Benefits from expanded</text>
      <text x="865" y="259" text-anchor="middle" class="lang-detail" font-size="10">phonological awareness</text>
      <text x="865" y="280" text-anchor="middle" class="lang-example" font-size="9">/いぬ/ → "inu"</text>
      <text x="865" y="295" text-anchor="middle" class="lang-example" font-size="9">Japanese phonemes</text>

      <!-- Cross-activation arrows between phonologies -->
      <line x1="360" y1="250" x2="425" y2="250" class="cross-link" stroke-dasharray="5,3" marker-end="url(#arrowBlue)"/>
      <line x1="425" y1="260" x2="360" y2="260" class="cross-link-rev" stroke-dasharray="5,3" marker-end="url(#arrowGreen)"/>
      <line x1="675" y1="250" x2="740" y2="250" class="cross-link-2" stroke-dasharray="5,3" marker-end="url(#arrowPurple)"/>
      <line x1="740" y1="260" x2="675" y2="260" class="cross-link-2-rev" stroke-dasharray="5,3" marker-end="url(#arrowBlue)"/>

      <!-- Lexical Layer (third ring) -->
      <rect x="80" y="360" width="940" height="140" rx="15" class="lexical-layer"/>
      <text x="550" y="382" text-anchor="middle" class="layer-label" font-size="13" font-weight="700">LEXICAL SYSTEMS (Separate but Interconnected)</text>

      <!-- L1 Lexicon -->
      <rect x="110" y="395" width="250" height="85" rx="10" class="l1-lex-box" filter="url(#shadow)"/>
      <text x="235" y="420" text-anchor="middle" class="lang-title" font-size="12" font-weight="700">L1 Lexicon</text>
      <text x="235" y="438" text-anchor="middle" class="lang-detail" font-size="10">Language-specific lemmas</text>
      <text x="235" y="453" text-anchor="middle" class="lang-detail" font-size="10">Morphology, syntax info</text>
      <text x="235" y="468" text-anchor="middle" class="lang-example" font-size="10" font-weight="600">"dog" "house" "run"</text>

      <!-- L2 Lexicon -->
      <rect x="425" y="395" width="250" height="85" rx="10" class="l2-lex-box" filter="url(#shadow)"/>
      <text x="550" y="420" text-anchor="middle" class="lang-title" font-size="12" font-weight="700">L2 Lexicon</text>
      <text x="550" y="438" text-anchor="middle" class="lang-detail" font-size="10">Separate lemma entries</text>
      <text x="550" y="453" text-anchor="middle" class="lang-detail" font-size="10">L2-specific nuances</text>
      <text x="550" y="468" text-anchor="middle" class="lang-example" font-size="10" font-weight="600">"perro" "casa" "correr"</text>

      <!-- L3 Lexicon -->
      <rect x="740" y="395" width="250" height="85" rx="10" class="l3-lex-box" filter="url(#shadow)"/>
      <text x="865" y="420" text-anchor="middle" class="lang-title" font-size="12" font-weight="700">L3+ Lexicon</text>
      <text x="865" y="438" text-anchor="middle" class="lang-detail" font-size="10">Grows with each language</text>
      <text x="865" y="453" text-anchor="middle" class="lang-detail" font-size="10">Cross-language links</text>
      <text x="865" y="468" text-anchor="middle" class="lang-example" font-size="10" font-weight="600">"犬" "家" "走る"</text>

      <!-- Cross-activation between lexicons -->
      <line x1="360" y1="435" x2="425" y2="435" class="cross-link" stroke-dasharray="5,3" marker-end="url(#arrowBlue)"/>
      <line x1="425" y1="445" x2="360" y2="445" class="cross-link-rev" stroke-dasharray="5,3" marker-end="url(#arrowGreen)"/>
      <line x1="675" y1="435" x2="740" y2="435" class="cross-link-2" stroke-dasharray="5,3" marker-end="url(#arrowPurple)"/>
      <line x1="740" y1="445" x2="675" y2="445" class="cross-link-2-rev" stroke-dasharray="5,3" marker-end="url(#arrowBlue)"/>

      <!-- SHARED CONCEPTUAL LAYER (innermost, central) -->
      <rect x="180" y="520" width="740" height="130" rx="15" class="concept-layer" filter="url(#glow)"/>
      <text x="550" y="548" text-anchor="middle" class="concept-label" font-size="16" font-weight="700">SHARED CONCEPTUAL SYSTEM</text>
      <text x="550" y="568" text-anchor="middle" class="concept-detail" font-size="11">Translation equivalents share the same mental concepts</text>
      <text x="550" y="588" text-anchor="middle" class="concept-detail" font-size="11">"dog" = "perro" = "犬" → same concept of DOG</text>
      <text x="550" y="610" text-anchor="middle" class="concept-detail" font-size="11">But each language adds its own conceptual nuances</text>
      <text x="550" y="632" text-anchor="middle" class="concept-note" font-size="10" font-style="italic">The conceptual system is the shared foundation — languages connect THROUGH it</text>

      <!-- Vertical connection arrows from lexicons to concepts -->
      <line x1="235" y1="480" x2="235" y2="520" class="vert-link-1" stroke-width="2" marker-end="url(#arrowGreen)"/>
      <line x1="550" y1="480" x2="550" y2="520" class="vert-link-2" stroke-width="2" marker-end="url(#arrowBlue)"/>
      <line x1="865" y1="480" x2="865" y2="520" class="vert-link-3" stroke-width="2" marker-end="url(#arrowPurple)"/>

      <!-- Cumulative Advantage box -->
      <rect x="120" y="690" width="860" height="90" rx="10" class="advantage-box" filter="url(#shadow)"/>
      <text x="550" y="715" text-anchor="middle" class="advantage-title" font-size="14" font-weight="700">THE CUMULATIVE ADVANTAGE</text>
      <text x="550" y="735" text-anchor="middle" class="advantage-detail" font-size="11.5">Each new language connects to the existing network, expanding the shared conceptual system</text>
      <text x="550" y="752" text-anchor="middle" class="advantage-detail" font-size="11.5">and providing more sources for positive transfer. The brain does not "fill up" — it creates parallel systems.</text>
      <text x="550" y="769" text-anchor="middle" class="advantage-note" font-size="11" font-weight="600">Monolingualism is the historical exception. The human brain is built for multilingualism.</text>

      <!-- Labels for cross-activation -->
      <text x="390" y="240" text-anchor="middle" class="cross-label" font-size="8">co-activation</text>
      <text x="390" y="425" text-anchor="middle" class="cross-label" font-size="8">co-activation</text>
      <text x="710" y="240" text-anchor="middle" class="cross-label" font-size="8">co-activation</text>
      <text x="710" y="425" text-anchor="middle" class="cross-label" font-size="8">co-activation</text>
    </svg>
  </div>
  <figcaption>
    <strong>Figure 6: The Multilingual Mind.</strong> The bilingual/multilingual lexicon operates on an "integrated but differentiated" model. All languages share a common conceptual layer (the meanings are the same), but each language maintains separate lexical and phonological systems. Crucially, these systems are always co-activated to some degree — hearing "dog" automatically activates "perro" and vice versa. Executive control mechanisms manage which language is dominant at any moment. Each new language added to the system expands the network and makes subsequent languages easier to learn through accumulated metalinguistic awareness and structural transfer.
  </figcaption>
</figure>
