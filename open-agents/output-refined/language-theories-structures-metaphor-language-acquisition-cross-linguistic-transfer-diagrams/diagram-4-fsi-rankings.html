      <title id="fsi-title">FSI Language Difficulty Rankings for English Speakers</title>
      <desc id="fsi-desc">Tiered pyramid diagram showing four categories of language difficulty as ranked by the U.S. Foreign Service Institute. Category I at the top (easiest): 24-30 weeks for languages like Spanish and French. Category II: 36 weeks for German and Indonesian. Category III: 44 weeks for Russian and Hindi. Category IV at the base (hardest): 88 weeks for Arabic, Chinese, Japanese, and Korean.</desc>

      <!-- Title -->

      <text x="550" y="78" text-anchor="middle" class="subtitle-text" font-size="11">Time to reach professional working proficiency (ILR Level 3)</text>

      <!-- Category I - Top of pyramid (easiest) -->
      <polygon points="550,110 370,230 730,230" class="tier-1" filter="url(#shadow)"/>

      <text x="550" y="195" text-anchor="middle" class="tier-langs" font-size="11">Spanish | French | Italian | Portuguese | Dutch</text>
      <text x="550" y="212" text-anchor="middle" class="tier-langs" font-size="11">Norwegian | Swedish | Danish | Romanian</text>

      <!-- Category II -->
      <polygon points="370,236 290,330 810,330 730,236" class="tier-2" filter="url(#shadow)"/>
      <text x="550" y="265" text-anchor="middle" class="tier-label" font-size="15" font-weight="700">CATEGORY II</text>
      <text x="550" y="285" text-anchor="middle" class="tier-time" font-size="12" font-weight="600">36 weeks (900 hours)</text>
      <text x="550" y="305" text-anchor="middle" class="tier-langs" font-size="11">German | Indonesian | Malay | Swahili</text>

      <text x="550" y="368" text-anchor="middle" class="tier-label" font-size="15" font-weight="700">CATEGORY III</text>

      <text x="550" y="408" text-anchor="middle" class="tier-langs" font-size="11">Russian | Greek | Hindi | Hebrew | Polish | Czech | Finnish</text>

      <text x="550" y="445" text-anchor="middle" class="tier-langs" font-size="11">Tagalog | Tamil | Icelandic | Georgian | Mongolian | Zulu</text>
      <text x="550" y="462" text-anchor="middle" class="tier-note" font-size="10">Significant structural differences from English</text>

      <text x="550" y="582" text-anchor="middle" class="tier-langs-light" font-size="13">Japanese | Korean</text>
      <text x="550" y="610" text-anchor="middle" class="tier-note-light" font-size="11">Different script + no cognates + fundamentally different grammar + tones/honorifics</text>

      <text x="880" y="168" class="factor-detail" font-size="10">Same (Latin) → Different (hanzi, abjad, hangul)</text>

      <text x="780" y="190" class="factor-label" font-size="11" font-weight="600">Vocabulary</text>
      <text x="880" y="190" class="factor-detail" font-size="10">Many cognates → Few or no cognates</text>

      <text x="780" y="212" class="factor-label" font-size="11" font-weight="600">Grammar</text>
      <text x="880" y="212" class="factor-detail" font-size="10">Similar structure → Fundamentally different</text>

      <text x="780" y="234" class="factor-label" font-size="11" font-weight="600">Word Order</text>
      <text x="880" y="234" class="factor-detail" font-size="10">Same SVO → Different (SOV, VSO, free)</text>

      <text x="780" y="256" class="factor-label" font-size="11" font-weight="600">Morphology</text>
      <text x="880" y="256" class="factor-detail" font-size="10">Similar type → Different (agglutinative, etc.)</text>

      <text x="780" y="278" class="factor-label" font-size="11" font-weight="600">Phonology</text>
      <text x="880" y="278" class="factor-detail" font-size="10">Similar sounds → Tones, novel phonemes</text>

      <text x="780" y="300" class="factor-label" font-size="11" font-weight="600">Social System</text>
      <text x="880" y="300" class="factor-detail" font-size="10">Minimal honorifics → Extensive (JP, KR)</text>

      <text x="50" y="375" text-anchor="middle" class="arrow-label" font-size="11" font-weight="600" transform="rotate(-90, 50, 375)">INCREASING DIFFICULTY →</text>

      <text x="550" y="672" text-anchor="middle" class="pattern-label" font-size="13" font-weight="700">THE PATTERN</text>
      <text x="550" y="692" text-anchor="middle" class="pattern-body" font-size="11.5">Difficulty is NOT intrinsic to a language — it is relative to what you already know. Japanese is "hard" for English</text>
      <text x="550" y="707" text-anchor="middle" class="pattern-body" font-size="11.5">speakers but easier for Korean speakers. The FSI rankings measure typological distance FROM ENGLISH, not absolute complexity.</text>

      <!-- Time comparison bar at very bottom -->

      <rect x="250" y="755" width="180" height="16" rx="4" class="bar-2"/>
      <text x="340" y="767" text-anchor="middle" class="bar-text" font-size="9" font-weight="600">Cat II: 900h</text>
      <rect x="250" y="775" width="220" height="16" rx="4" class="bar-3"/>
      <text x="360" y="787" text-anchor="middle" class="bar-text-dark" font-size="9" font-weight="600">Cat III: 1,100h</text>
      <rect x="250" y="795" width="440" height="16" rx="4" class="bar-4"/>
      <text x="470" y="807" text-anchor="middle" class="bar-text-light" font-size="9" font-weight="600">Cat IV: 2,200h (3.5x Cat I)</text>
    </svg>
  </div>
  <figcaption>
    <strong>Figure 4: FSI Language Difficulty Rankings.</strong> The U.S. Foreign Service Institute's empirical data from decades of language training shows that learning time for English speakers ranges from 600 hours (Category I languages like Spanish) to 2,200 hours (Category IV languages like Japanese). The difficulty is driven by typological distance: differences in script, vocabulary overlap, grammar, word order, morphology, phonology, and social systems. Each factor compounds the others.
  </figcaption>
</figure>
