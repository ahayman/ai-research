<!-- Diagram: Explicit-to-Implicit Knowledge Pipeline -->
<!-- Type: Mermaid flowchart -->
<!-- Generated: 2026-03-15 -->
<!-- Description: Flowchart showing how explicit pattern knowledge (grammar rules, typological awareness) becomes implicit through practice, based on the weak interface hypothesis. Includes feedback loops where output errors trigger return to explicit analysis. -->

<figure class="concept-diagram" id="diagram-explicit-implicit-pipeline">
  <div class="diagram-container">
    <pre class="mermaid">
flowchart LR
    subgraph EXPLICIT["📚 EXPLICIT KNOWLEDGE"]
        direction TB
        E1["<b>Structural Knowledge</b><br/>Grammar rules, paradigm tables<br/>Typological classification<br/>Word order correlations"]
        E2["<b>Sources</b><br/>Textbooks, this deep dive,<br/>grammar references,<br/>cross-linguistic comparison"]
        E1 --- E2
    end

    subgraph NOTICE["👁️ NOTICING"]
        direction TB
        N1["<b>Directed Attention</b><br/>Explicit knowledge tells you<br/>WHAT to look for in input"]
        N2["<b>Examples</b><br/>'That suffix is the<br/>past tense marker'<br/>'That is the ergative case'<br/>'SOV — verb will come last'"]
        N1 --- N2
    end

    subgraph PRACTICE["🔄 PRACTICE"]
        direction TB
        PR1["<b>Repeated Exposure + Use</b><br/>Comprehensible input (i+1)<br/>Interaction with speakers<br/>Output production"]
        PR2["<b>Volume Required</b><br/>Hundreds to thousands<br/>of encounters with<br/>each structure"]
        PR1 --- PR2
    end

    subgraph PROC["⚡ PROCEDURALIZATION"]
        direction TB
        PC1["<b>Getting Faster</b><br/>Knowledge becomes quicker<br/>to access and apply"]
        PC2["<b>Signs of Progress</b><br/>Less hesitation<br/>Less mental effort<br/>Fewer conscious lookups"]
        PC1 --- PC2
    end

    subgraph IMPLICIT["🧠 IMPLICIT KNOWLEDGE"]
        direction TB
        I1["<b>Intuitive Performance</b><br/>Fluent, automatic,<br/>feels 'natural'"]
        I2["<b>Result</b><br/>You KNOW 'he go'<br/>sounds wrong without<br/>stating the rule"]
        I1 --- I2
    end

    EXPLICIT -->|"enables"| NOTICE
    NOTICE -->|"guides attention<br/>in input"| PRACTICE
    PRACTICE -->|"repeated<br/>processing"| PROC
    PROC -->|"becomes<br/>automatic"| IMPLICIT

    subgraph FEEDBACK["🔄 FEEDBACK LOOPS"]
        direction TB
        F1["<b>Output Errors</b><br/>Mistakes in production<br/>reveal gaps"]
        F2["<b>Error Analysis</b><br/>Is this L1 transfer?<br/>Overgeneralization?<br/>Gap in paradigm?"]
        F3["<b>Return to Explicit</b><br/>Revisit the rule,<br/>study the pattern,<br/>then re-enter the cycle"]
        F1 --> F2 --> F3
    end

    IMPLICIT -.->|"gaps<br/>discovered"| FEEDBACK
    PRACTICE -.->|"errors<br/>during use"| FEEDBACK
    FEEDBACK -.->|"re-enter<br/>the cycle"| EXPLICIT

    subgraph INTERFACE["THE WEAK INTERFACE POSITION"]
        direction TB
        INT1["<b>Explicit ≠ Implicit</b><br/>They are different systems"]
        INT2["<b>BUT: Explicit FACILITATES Implicit</b><br/>Knowing rules enables noticing<br/>Noticing accelerates acquisition<br/>Practice proceduralizes knowledge"]
        INT3["<b>The Pattern Learner's Advantage</b><br/>Structural knowledge from this deep dive<br/>= explicit framework that accelerates<br/>the entire implicit learning process"]
        INT1 --- INT2 --- INT3
    end

    classDef explicitStyle fill:#e0f2fe,stroke:#0284c7,stroke-width:2px,color:#0c4a6e
    classDef noticeStyle fill:#fef3c7,stroke:#d97706,stroke-width:2px,color:#451a03
    classDef practiceStyle fill:#dcfce7,stroke:#16a34a,stroke-width:2px,color:#052e16
    classDef procStyle fill:#f3e8ff,stroke:#7c3aed,stroke-width:2px,color:#2e1065
    classDef implicitStyle fill:#fce7f3,stroke:#db2777,stroke-width:2px,color:#500724
    classDef feedbackStyle fill:#fee2e2,stroke:#dc2626,stroke-width:1.5px,color:#450a0a
    classDef interfaceStyle fill:#f0fdf4,stroke:#16a34a,stroke-width:2px,color:#15803d

    class E1,E2 explicitStyle
    class N1,N2 noticeStyle
    class PR1,PR2 practiceStyle
    class PC1,PC2 procStyle
    class I1,I2 implicitStyle
    class F1,F2,F3 feedbackStyle
    class INT1,INT2,INT3 interfaceStyle
    </pre>
  </div>
  <figcaption>
    <strong>Figure 7: Explicit-to-Implicit Knowledge Pipeline.</strong> Based on Nick Ellis's weak interface hypothesis, this diagram shows how explicit structural knowledge (grammar rules, typological awareness) transforms into implicit, intuitive performance through a multi-stage process. Explicit knowledge enables noticing relevant features in input; noticing guides attention during practice; repeated practice proceduralizes the knowledge; and proceduralized knowledge eventually becomes implicit and automatic. Feedback loops ensure that output errors are diagnosed and fed back into the explicit analysis stage. This is the theoretical foundation for why understanding linguistic structure — the content of this entire deep dive — accelerates practical language learning.
  </figcaption>
</figure>
