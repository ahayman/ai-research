<!-- Type: Mermaid flowchart -->
<!-- Generated: 2026-03-15 -->
<!-- Description: Side-by-side comparison of three complementary SLA theories: Krashen's Input Hypothesis, Long's Interaction Hypothesis, and Swain's Output Hypothesis, showing how they relate and build upon each other -->

<figure class="concept-diagram" id="diagram-sla-theories">
  <div class="diagram-container">
    <pre class="mermaid">
flowchart TB
    subgraph TITLE[" "]
        direction TB
        T["<b>Second Language Acquisition: Three Complementary Theories</b><br/>Input + Interaction + Output = Full Acquisition"]
    end

    subgraph KRASHEN["🎧 KRASHEN — Input Hypothesis (1977-85)"]
        direction TB
        K1["<b>Core Claim</b><br/>Language is acquired through<br/>comprehensible input (i+1)"]
        K2["<b>Acquisition vs. Learning</b><br/>Subconscious acquisition &gt;<br/>conscious learning"]
        K3["<b>The Monitor</b><br/>Learned rules only edit output<br/>when time + focus + knowledge"]
        K4["<b>Affective Filter</b><br/>Anxiety blocks acquisition<br/>even with good input"]
        K5["<b>Practical Rule</b><br/>Aim for 70-90% comprehension<br/>in reading/listening material"]
        K1 --> K2
        K1 --> K3
        K1 --> K4
        K1 --> K5
    end

    subgraph LONG["💬 LONG — Interaction Hypothesis (1983-96)"]
        direction TB
        L1["<b>Core Claim</b><br/>Interaction is what MAKES<br/>input comprehensible"]
        L2["<b>Negotiation of Meaning</b><br/>Clarification requests<br/>Confirmation checks<br/>Comprehension checks"]
        L3["<b>Modified Input</b><br/>Partners adjust language<br/>to your level naturally"]
        L4["<b>Implicit Correction</b><br/>Recasts embed corrections<br/>in meaningful replies"]
        L5["<b>Practical Rule</b><br/>Conversation provides both<br/>input AND feedback"]
        L1 --> L2
        L1 --> L3
        L2 --> L4
        L1 --> L5
    end

    subgraph SWAIN["✍️ SWAIN — Output Hypothesis (1985-95)"]
        direction TB
        S1["<b>Core Claim</b><br/>Producing language forces<br/>deeper processing than input alone"]
        S2["<b>Noticing Function</b><br/>Output reveals gaps:<br/>you notice what you<br/>cannot yet say"]
        S3["<b>Hypothesis Testing</b><br/>Speaking = testing theories<br/>about how the language works"]
        S4["<b>Metalinguistic Function</b><br/>Output forces syntactic processing<br/>(not just semantic)"]
        S5["<b>Practical Rule</b><br/>You can understand input<br/>semantically without processing<br/>grammar; output demands grammar"]
        S1 --> S2
        S1 --> S3
        S1 --> S4
        S1 --> S5
    end

    subgraph SYNTHESIS["🔄 THE SYNTHESIS: How They Work Together"]
        direction LR
        SY1["<b>INPUT</b><br/>provides raw material"]
        SY2["<b>INTERACTION</b><br/>makes input comprehensible<br/>+ provides feedback"]
        SY3["<b>OUTPUT</b><br/>forces deep processing<br/>+ reveals gaps"]
        SY1 -->|"feeds"| SY2
        SY2 -->|"enables"| SY3
        SY3 -->|"gaps trigger<br/>need for more"| SY1
    end

    TITLE ~~~ KRASHEN
    TITLE ~~~ LONG
    TITLE ~~~ SWAIN
    KRASHEN ~~~ SYNTHESIS
    LONG ~~~ SYNTHESIS
    SWAIN ~~~ SYNTHESIS

    classDef titleStyle fill:none,stroke:none,color:#1e293b,font-size:16px
    classDef krashenBox fill:#e0f2fe,stroke:#0284c7,stroke-width:2px,color:#0c4a6e
    classDef longBox fill:#dcfce7,stroke:#16a34a,stroke-width:2px,color:#052e16
    classDef swainBox fill:#f3e8ff,stroke:#7c3aed,stroke-width:2px,color:#2e1065
    classDef synthBox fill:#fef3c7,stroke:#d97706,stroke-width:2px,color:#451a03
    classDef invisible fill:none,stroke:none

    class T titleStyle
    class K1,K2,K3,K4,K5 krashenBox
    class L1,L2,L3,L4,L5 longBox
    class S1,S2,S3,S4,S5 swainBox
    class SY1,SY2,SY3 synthBox
    </pre>
  </div>
  <figcaption>
    <strong>Figure 2: SLA Theory Comparison.</strong> Krashen's Input Hypothesis, Long's Interaction Hypothesis, and Swain's Output Hypothesis are not competing theories but complementary components of a complete acquisition framework. Input provides the raw linguistic material; interaction makes that input comprehensible and embeds corrective feedback; output forces deep grammatical processing and reveals knowledge gaps. All three are necessary for full language acquisition.
  </figcaption>
</figure>
