<!-- Diagram: Cross-Linguistic Transfer Map -->
<!-- Type: Mermaid concept map -->
<!-- Generated: 2026-03-15 -->
<!-- Description: Concept map showing how knowledge from known languages transfers (positively or negatively) to a target language, with examples of each type and typological distance as the predictor variable -->

<figure class="concept-diagram" id="diagram-cross-linguistic-transfer">
  <div class="diagram-container">
    <pre class="mermaid">
flowchart TB
    CENTER["<b>YOUR KNOWN LANGUAGES</b><br/>L1 + any previously learned languages"]

    subgraph POS["✅ POSITIVE TRANSFER — Shared Features Accelerate Learning"]
        direction TB
        P1["<b>Shared Word Order</b><br/>English SVO → French SVO<br/>Sentence structure feels natural"]
        P2["<b>Cognate Vocabulary</b><br/>English → Spanish<br/>university / universidad<br/>possible / posible<br/>nation / nación"]
        P3["<b>Shared Grammatical Concepts</b><br/>English articles (a, the)<br/>→ French, Spanish, German<br/>Concept already understood"]
        P4["<b>Similar Morphology</b><br/>Spanish conjugation<br/>→ Italian, Portuguese<br/>Paradigms transfer directly"]
        P5["<b>Case System Familiarity</b><br/>German case system<br/>→ Russian, Latin<br/>Concept of marking roles is known"]
    end

    subgraph NEG["❌ NEGATIVE TRANSFER — L1 Patterns Cause Interference"]
        direction TB
        N1["<b>Missing Category</b><br/>English (no gender)<br/>→ French/Spanish/German<br/>Struggle to assign gender"]
        N2["<b>Different Word Order</b><br/>English SVO → German V2<br/>Fail to invert after adverbs<br/>English SVO → Japanese SOV<br/>Object-before-verb feels wrong"]
        N3["<b>Missing Morphology</b><br/>Mandarin (no conjugation)<br/>→ Spanish/French<br/>Omit verb inflections"]
        N4["<b>False Friends</b><br/>'actually' ≠ 'actuellement'<br/>'embarrassed' ≠ 'embarazada'<br/>Look-alike words with<br/>different meanings"]
        N5["<b>Structural Mismatch</b><br/>English prepositions<br/>→ Japanese postpositions<br/>Expect 'to Tokyo' not 'Tokyo to'"]
    end

    subgraph PREDICT["🔍 TYPOLOGICAL DISTANCE — The Predictor"]
        direction TB
        TD1["<b>Close Distance</b><br/>Same family, similar structure<br/>English → Dutch, Norwegian<br/>Maximum positive transfer"]
        TD2["<b>Medium Distance</b><br/>Same family, different features<br/>English → German, Russian<br/>Mix of positive + negative"]
        TD3["<b>Far Distance</b><br/>Different family, different structure<br/>English → Japanese, Arabic<br/>Maximum negative transfer risk"]
        TD1 --- TD2 --- TD3
    end

    subgraph STRATEGY["🧠 THE PATTERN"]
        ST["Transfer is <b>predictable</b> from structural comparison.<br/>If you know the typological differences between<br/>your L1 and L2, you can predict where interference<br/>will occur and preemptively address it."]
    end

    CENTER -->|"similar features<br/>facilitate"| POS
    CENTER -->|"different features<br/>cause interference"| NEG
    CENTER -->|"distance determines<br/>ratio of positive to negative"| PREDICT
    POS --> STRATEGY
    NEG --> STRATEGY
    PREDICT --> STRATEGY

    classDef centerStyle fill:#fef3c7,stroke:#d97706,stroke-width:3px,color:#451a03,font-size:15px
    classDef posStyle fill:#dcfce7,stroke:#16a34a,stroke-width:1.5px,color:#052e16
    classDef negStyle fill:#fee2e2,stroke:#dc2626,stroke-width:1.5px,color:#450a0a
    classDef predictStyle fill:#e0f2fe,stroke:#0284c7,stroke-width:1.5px,color:#0c4a6e
    classDef stratStyle fill:#f0fdf4,stroke:#16a34a,stroke-width:2px,color:#15803d,font-size:13px

    class CENTER centerStyle
    class P1,P2,P3,P4,P5 posStyle
    class N1,N2,N3,N4,N5 negStyle
    class TD1,TD2,TD3 predictStyle
    class ST stratStyle
    </pre>
  </div>
  <figcaption>
    <strong>Figure 3: Cross-Linguistic Transfer Map.</strong> When learning a new language, your existing linguistic knowledge transfers in two ways. Positive transfer occurs when shared features (word order, cognates, grammatical concepts) accelerate learning. Negative transfer occurs when L1 patterns are incorrectly applied, causing interference errors. Typological distance between languages predicts the ratio of positive to negative transfer. Crucially, both types are predictable from structural comparison — making transfer analysis a powerful planning tool for language learners.
  </figcaption>
</figure>
