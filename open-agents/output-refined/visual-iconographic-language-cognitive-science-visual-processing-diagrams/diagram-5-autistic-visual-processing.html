<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Autistic Visual Processing Profile -- Strengths Map</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #f8f9fa;
    color: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 2rem;
  }
  figure {
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
    max-width: 1100px;
    width: 100%;
  }
  .diagram-title {
    text-align: center;
    font-size: 1.4rem;
    font-weight: 700;
    margin-bottom: 0.3rem;
    color: #1a1a2e;
  }
  .diagram-subtitle {
    text-align: center;
    font-size: 0.85rem;
    color: #6c757d;
    margin-bottom: 2rem;
  }

  .raven-box {
    display: flex;
    gap: 1.5rem;
    margin-bottom: 2rem;
    flex-wrap: wrap;
    align-items: stretch;
  }
  .raven-card {
    flex: 1;
    min-width: 250px;
    border: 2.5px solid;
    border-radius: 14px;
    padding: 1.2rem;
    text-align: center;
  }
  .raven-card h4 {
    font-size: 0.9rem;
    font-weight: 700;
    margin-bottom: 0.5rem;
  }
  .raven-score {
    font-size: 3rem;
    font-weight: 700;
    line-height: 1.1;
  }
  .raven-sub {
    font-size: 0.8rem;
    margin-top: 0.2rem;
  }
  .raven-detail {
    font-size: 0.78rem;
    margin-top: 0.5rem;
    line-height: 1.4;
  }
  .raven-wechsler { border-color: #ef4444; }
  .raven-wechsler h4 { color: #dc2626; }
  .raven-wechsler .raven-score { color: #ef4444; }
  .raven-rpm { border-color: #22c55e; }
  .raven-rpm h4 { color: #16a34a; }
  .raven-rpm .raven-score { color: #22c55e; }
  .raven-gap { border-color: #3b82f6; }
  .raven-gap h4 { color: #2563eb; }
  .raven-gap .raven-score { color: #3b82f6; }

  .strengths-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 1rem;
    margin-bottom: 2rem;
  }
  .strength-card {
    border: 2px solid #22c55e;
    border-radius: 12px;
    padding: 1rem;
    display: flex;
    gap: 0.8rem;
    align-items: flex-start;
  }
  .strength-icon {
    font-size: 1.5rem;
    flex-shrink: 0;
    width: 36px;
    height: 36px;
    background: #f0fdf4;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .strength-text h4 {
    font-size: 0.88rem;
    font-weight: 700;
    color: #16a34a;
    margin-bottom: 0.2rem;
  }
  .strength-text p {
    font-size: 0.78rem;
    line-height: 1.4;
    color: #374151;
  }
  .strength-text .design-implication {
    font-size: 0.75rem;
    background: #dcfce7;
    padding: 0.3rem 0.5rem;
    border-radius: 4px;
    margin-top: 0.4rem;
    color: #166534;
    font-weight: 500;
  }

  .epf-section {
    background: #f0fdf4;
    border: 2px solid #22c55e;
    border-radius: 14px;
    padding: 1.2rem;
    margin-bottom: 1.5rem;
    text-align: center;
  }
  .epf-section h3 {
    font-size: 1rem;
    font-weight: 700;
    color: #16a34a;
    margin-bottom: 0.5rem;
  }
  .epf-section p {
    font-size: 0.85rem;
    line-height: 1.5;
    max-width: 700px;
    margin: 0 auto;
  }

  .grandin-types {
    display: flex;
    gap: 1rem;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }
  .grandin-card {
    flex: 1;
    min-width: 250px;
    border: 2px solid;
    border-radius: 12px;
    padding: 1rem;
  }
  .grandin-card h4 {
    font-size: 0.9rem;
    font-weight: 700;
    margin-bottom: 0.3rem;
  }
  .grandin-card p {
    font-size: 0.78rem;
    line-height: 1.4;
  }
  .type-object { border-color: #f59e0b; }
  .type-object h4 { color: #d97706; }
  .type-spatial { border-color: #7c3aed; }
  .type-spatial h4 { color: #7c3aed; }

  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid #e9ecef;
  }
  figcaption strong {
    display: block;
    font-size: 1.15rem;
    color: #1a1a2e;
    margin-bottom: 0.4rem;
  }
  figcaption span {
    font-size: 0.9rem;
    color: #6c757d;
    line-height: 1.5;
  }

  @media (prefers-color-scheme: dark) {
    body { background: #1a1a2e; color: #e9ecef; }
    figure { background: #2d2d44; box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
    .diagram-title { color: #e9ecef; }
    .diagram-subtitle { color: #adb5bd; }
    figcaption { border-top-color: #3d3d5c; }
    figcaption strong { color: #e9ecef; }
    figcaption span { color: #adb5bd; }
    .raven-card { background: rgba(0,0,0,0.15); }
    .raven-detail { color: #adb5bd; }
    .strength-card { background: rgba(0,0,0,0.1); }
    .strength-text p { color: #d1d5db; }
    .strength-icon { background: rgba(34,197,94,0.15); }
    .strength-text .design-implication { background: rgba(34,197,94,0.15); color: #86efac; }
    .epf-section { background: rgba(34,197,94,0.08); }
    .grandin-card { background: rgba(0,0,0,0.1); }
    .grandin-card p { color: #adb5bd; }
  }
</style>
</head>
<body>
<figure>
  <div class="diagram-title">Autistic Visual Processing Profile -- Strengths Map</div>
  <div class="diagram-subtitle">Enhanced perceptual functioning as cognitive architecture, not deficit -- with direct design implications for a visual language</div>

  <div class="raven-box">
    <div class="raven-card raven-wechsler">
      <h4>Wechsler (Verbal-Heavy)</h4>
      <div class="raven-score">0%</div>
      <div class="raven-sub">scored "high intelligence"</div>
      <div class="raven-detail">One-third of autistic children scored in the "intellectually disabled" range on this verbal-dependent measure.</div>
    </div>
    <div class="raven-card raven-rpm">
      <h4>Raven's Matrices (Visual)</h4>
      <div class="raven-score">33%</div>
      <div class="raven-sub">scored "high intelligence"</div>
      <div class="raven-detail">One-third of the same autistic children scored in the high intelligence range on this nonverbal pattern-reasoning test.</div>
    </div>
    <div class="raven-card raven-gap">
      <h4>The Gap</h4>
      <div class="raven-score">30-70</div>
      <div class="raven-sub">percentile points higher</div>
      <div class="raven-detail">Raven's scores 30-70 percentile points above Wechsler for the same individuals. The channel matters: visual-spatial reveals what verbal conceals.</div>
    </div>
  </div>

  <div class="epf-section">
    <h3>Mottron's Enhanced Perceptual Functioning (EPF) Model</h3>
    <p>Autistic perception is characterized by <strong>enhanced low-level perceptual processing</strong>, locally oriented visual and auditory perception, enhanced discrimination, and greater autonomy from top-down influence. This is not a deficit compensated by strengths -- it is a different, enhanced cognitive architecture. The most validated model of autistic cognition (Mottron et al., 2006).</p>
  </div>

  <div class="strengths-grid">
    <div class="strength-card">
      <div class="strength-icon">&#x1F50D;</div>
      <div class="strength-text">
        <h4>Enhanced Local Detail Detection</h4>
        <p>Superior performance on embedded figures, block design, and visual search tasks requiring identification of local features within complex patterns.</p>
        <div class="design-implication">Design for: Fine-grained component distinctions within composed symbols</div>
      </div>
    </div>
    <div class="strength-card">
      <div class="strength-icon">&#x1F9E9;</div>
      <div class="strength-text">
        <h4>Pattern Recognition</h4>
        <p>Exceptional ability to detect regularities, systematic rules, and structural patterns -- the skill that makes Raven's Matrices a strong measure.</p>
        <div class="design-implication">Design for: Consistent compositional rules that reward pattern detection</div>
      </div>
    </div>
    <div class="strength-card">
      <div class="strength-icon">&#x1F4D0;</div>
      <div class="strength-text">
        <h4>Abstract Spatial Reasoning</h4>
        <p>Increased activity in extrastriate visual areas (BA18) during reasoning tasks. Visual processing plays a more prominent role in autistic reasoning.</p>
        <div class="design-implication">Design for: Spatial arrangement encoding logical relationships</div>
      </div>
    </div>
    <div class="strength-card">
      <div class="strength-icon">&#x1F3AF;</div>
      <div class="strength-text">
        <h4>Monotropic Focus</h4>
        <p>Intense sustained attention on stimuli of interest. Information within the focus of attention is processed deeply and stored effectively in long-term memory.</p>
        <div class="design-implication">Design for: Symbols that reward deep inspection with discoverable structure</div>
      </div>
    </div>
    <div class="strength-card">
      <div class="strength-icon">&#x1F9EC;</div>
      <div class="strength-text">
        <h4>Enhanced Perceptual Discrimination</h4>
        <p>Finer-grained distinctions between similar stimuli. Can detect differences that neurotypical processing averages over or ignores.</p>
        <div class="design-implication">Design for: Subtle visual distinctions between related-but-different symbols</div>
      </div>
    </div>
    <div class="strength-card">
      <div class="strength-icon">&#x1F4CA;</div>
      <div class="strength-text">
        <h4>Systematic Processing</h4>
        <p>Preference for rule-governed, predictable systems. Systematic structure is not just tolerated but actively preferred and rapidly acquired.</p>
        <div class="design-implication">Design for: Transparent, rule-governed composition -- no exceptions without reasons</div>
      </div>
    </div>
  </div>

  <div class="grandin-types">
    <div class="grandin-card type-object">
      <h4>Object Visualizers (Grandin)</h4>
      <p>Think in photorealistic mental images. "See" concrete pictures of objects and scenes. May excel at recognizing and distinguishing individual symbol forms.</p>
    </div>
    <div class="grandin-card type-spatial">
      <h4>Spatial Visualizers (Grandin)</h4>
      <p>Think in patterns, systems, and spatial relationships. "See" how things connect and relate. May excel at compositional grammar and structural rules.</p>
    </div>
  </div>

  <figcaption>
    <strong>Diagram 5: Autistic Visual Processing Profile -- Strengths Map</strong>
    <span>Six documented visual-spatial processing strengths in autistic cognition, each linked to a specific design implication for a visual language. The Dawson/Mottron Raven's Matrices finding (2007) demonstrates the core argument: verbal measures systematically underestimate autistic intelligence, while visual-spatial measures reveal capabilities the verbal channel conceals. A visual-spatial communication system would not merely accommodate autistic users -- it would align with their cognitive architecture, potentially revealing expressive capacity that verbal modes suppress. The EPF model (Mottron et al., 2006) frames this as enhanced perception, not compensated deficit. Sources: PMC (Enhanced visual processing), Sage Journals (Dawson et al. 2007), Springer (EPF model), Grandin.</span>
  </figcaption>
</figure>
</body>
</html>
