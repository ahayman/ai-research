<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dual Coding Theory -- Two Channels, One Meaning</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #f8f9fa;
    color: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 2rem;
  }
  figure {
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
    max-width: 1100px;
    width: 100%;
  }
  .diagram-title {
    text-align: center;
    font-size: 1.4rem;
    font-weight: 700;
    margin-bottom: 0.3rem;
    color: #1a1a2e;
  }
  .diagram-subtitle {
    text-align: center;
    font-size: 0.85rem;
    color: #6c757d;
    margin-bottom: 2rem;
  }

  .dct-layout {
    display: flex;
    gap: 1.5rem;
    align-items: stretch;
    margin-bottom: 2rem;
    flex-wrap: wrap;
    justify-content: center;
  }
  .channel-col {
    flex: 1;
    min-width: 260px;
    max-width: 340px;
    border: 2.5px solid;
    border-radius: 14px;
    padding: 1.5rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.8rem;
  }
  .channel-col h3 {
    font-size: 1.1rem;
    font-weight: 700;
  }
  .channel-col .ch-desc {
    font-size: 0.82rem;
    text-align: center;
    line-height: 1.45;
    opacity: 0.8;
  }
  .channel-col .ch-unit {
    font-size: 0.75rem;
    font-weight: 600;
    padding: 0.3rem 0.8rem;
    border-radius: 20px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .channel-col .ch-process {
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
    width: 100%;
  }
  .ch-step {
    padding: 0.5rem 0.8rem;
    border-radius: 6px;
    font-size: 0.78rem;
    text-align: center;
  }

  .col-verbal { border-color: #3b82f6; }
  .col-verbal h3 { color: #3b82f6; }
  .col-verbal .ch-unit { background: #dbeafe; color: #2563eb; }
  .col-verbal .ch-step { background: #eff6ff; }

  .col-imagery { border-color: #f59e0b; }
  .col-imagery h3 { color: #d97706; }
  .col-imagery .ch-unit { background: #fef3c7; color: #d97706; }
  .col-imagery .ch-step { background: #fffbeb; }

  .bridge-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    min-width: 120px;
  }
  .bridge-arrow {
    font-size: 1.5rem;
    color: #9ca3af;
  }
  .bridge-label {
    font-size: 0.72rem;
    color: #6c757d;
    text-align: center;
    line-height: 1.3;
    font-weight: 600;
  }

  .examples-section {
    margin-bottom: 1.5rem;
  }
  .examples-section h3 {
    font-size: 1rem;
    font-weight: 700;
    text-align: center;
    margin-bottom: 1rem;
    color: #374151;
  }
  .example-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
  }
  .ex-card {
    border: 2px solid;
    border-radius: 12px;
    padding: 1rem;
    text-align: center;
  }
  .ex-card h4 {
    font-size: 0.9rem;
    font-weight: 700;
    margin-bottom: 0.5rem;
  }
  .ex-card .ex-stim {
    font-size: 2.5rem;
    margin-bottom: 0.3rem;
  }
  .encoding-bars {
    display: flex;
    flex-direction: column;
    gap: 0.3rem;
    margin-top: 0.5rem;
  }
  .enc-bar {
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .enc-bar .bar-label {
    font-size: 0.7rem;
    width: 50px;
    text-align: right;
    font-weight: 600;
  }
  .enc-bar .bar-fill {
    height: 14px;
    border-radius: 3px;
  }
  .bar-verbal { background: #3b82f6; }
  .bar-imagery { background: #f59e0b; }

  .ex-strong { border-color: #22c55e; }
  .ex-strong h4 { color: #16a34a; }

  .ex-weak { border-color: #ef4444; }
  .ex-weak h4 { color: #dc2626; }

  .ex-result {
    font-size: 0.78rem;
    margin-top: 0.5rem;
    font-weight: 600;
  }

  .memory-note {
    background: #f0fdf4;
    border-left: 4px solid #22c55e;
    border-radius: 0 8px 8px 0;
    padding: 1rem 1.2rem;
    font-size: 0.88rem;
    line-height: 1.5;
  }
  .memory-note strong {
    color: #16a34a;
  }

  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid #e9ecef;
  }
  figcaption strong {
    display: block;
    font-size: 1.15rem;
    color: #1a1a2e;
    margin-bottom: 0.4rem;
  }
  figcaption span {
    font-size: 0.9rem;
    color: #6c757d;
    line-height: 1.5;
  }

  @media (prefers-color-scheme: dark) {
    body { background: #1a1a2e; color: #e9ecef; }
    figure { background: #2d2d44; box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
    .diagram-title, .examples-section h3 { color: #e9ecef; }
    .diagram-subtitle { color: #adb5bd; }
    figcaption { border-top-color: #3d3d5c; }
    figcaption strong { color: #e9ecef; }
    figcaption span { color: #adb5bd; }
    .col-verbal .ch-step { background: rgba(59,130,246,0.1); }
    .col-imagery .ch-step { background: rgba(245,158,11,0.1); }
    .bridge-label { color: #adb5bd; }
    .ex-card { background: rgba(0,0,0,0.1); }
    .memory-note { background: rgba(34,197,94,0.08); }
  }
</style>
</head>
<body>
<figure>
  <div class="diagram-title">Dual Coding Theory -- Two Channels, One Meaning</div>
  <div class="diagram-subtitle">Paivio's model: verbal and imagery systems process information in parallel, and dual-coded items are remembered better</div>

  <div class="dct-layout">
    <div class="channel-col col-verbal">
      <h3>Verbal System</h3>
      <div class="ch-unit">Logogens</div>
      <div class="ch-desc">Processes language: words, sentences, linguistic structure. Sequential and symbolic.</div>
      <div class="ch-process">
        <div class="ch-step">Spoken/written word input</div>
        <div class="ch-step">Logogen activation</div>
        <div class="ch-step">Verbal representation stored</div>
        <div class="ch-step">Verbal output (naming, describing)</div>
      </div>
    </div>

    <div class="bridge-col">
      <div class="bridge-label">Referential<br>Connections</div>
      <div class="bridge-arrow">&#x2194;</div>
      <div class="bridge-label">Cross-system<br>activation</div>
      <div class="bridge-arrow">&#x2194;</div>
      <div class="bridge-label">Two paths to<br>same meaning</div>
    </div>

    <div class="channel-col col-imagery">
      <h3>Imagery System</h3>
      <div class="ch-unit">Imagens</div>
      <div class="ch-desc">Processes images, spatial layouts, sensory experience. Parallel and analogical.</div>
      <div class="ch-process">
        <div class="ch-step">Visual/spatial input</div>
        <div class="ch-step">Imagen activation</div>
        <div class="ch-step">Image representation stored</div>
        <div class="ch-step">Imagery output (mental images)</div>
      </div>
    </div>
  </div>

  <div class="examples-section">
    <h3>Why $ Beats "Dollar" in Memory</h3>
    <div class="example-grid">
      <div class="ex-card ex-strong">
        <h4>Visual Symbol: $</h4>
        <div class="ex-stim">$</div>
        <div class="encoding-bars">
          <div class="enc-bar">
            <span class="bar-label" style="color:#3b82f6;">Verbal</span>
            <div class="bar-fill bar-verbal" style="width: 120px;"></div>
            <span style="font-size:0.7rem;">"dollar"</span>
          </div>
          <div class="enc-bar">
            <span class="bar-label" style="color:#d97706;">Imagery</span>
            <div class="bar-fill bar-imagery" style="width: 140px;"></div>
            <span style="font-size:0.7rem;">distinctive shape</span>
          </div>
        </div>
        <div class="ex-result" style="color:#16a34a;">DUAL CODED -- 2 retrieval paths -- better memory</div>
      </div>

      <div class="ex-card ex-weak">
        <h4>Word: "dollar"</h4>
        <div class="ex-stim" style="font-size:1.8rem; font-weight:400;">dollar</div>
        <div class="encoding-bars">
          <div class="enc-bar">
            <span class="bar-label" style="color:#3b82f6;">Verbal</span>
            <div class="bar-fill bar-verbal" style="width: 140px;"></div>
            <span style="font-size:0.7rem;">"dollar"</span>
          </div>
          <div class="enc-bar">
            <span class="bar-label" style="color:#d97706;">Imagery</span>
            <div class="bar-fill bar-imagery" style="width: 30px;"></div>
            <span style="font-size:0.7rem;">weak image</span>
          </div>
        </div>
        <div class="ex-result" style="color:#dc2626;">SINGLE CODED -- 1 retrieval path -- weaker memory</div>
      </div>
    </div>
  </div>

  <div class="memory-note">
    <strong>Implication for visual language:</strong> Symbols that are both visually distinctive (strong imagen) and verbally nameable (strong logogen) will be dual-coded and better remembered. Purely abstract symbols without verbal associations lose the dual-coding advantage. The design goal: create symbols that users naturally name while processing them visually -- fostering two retrieval pathways rather than one.
  </div>

  <figcaption>
    <strong>Diagram 1: Dual Coding Theory -- Two Channels, One Meaning</strong>
    <span>Allan Paivio's dual coding model (1971) explains the picture superiority effect: information encoded in both the verbal and imagery systems has two independent retrieval pathways, making it more resistant to forgetting. The symbol $ activates both an imagen (distinctive visual form) and a logogen ("dollar"), while the word "dollar" primarily activates only the verbal system. This 10-30% memory advantage is the cognitive foundation for the claim that well-designed visual symbols can outperform purely verbal encoding. Sources: Dual-coding theory (Wikipedia), InstructionalDesign.org, ScienceDirect (Symbol superiority).</span>
  </figcaption>
</figure>
</body>
</html>
