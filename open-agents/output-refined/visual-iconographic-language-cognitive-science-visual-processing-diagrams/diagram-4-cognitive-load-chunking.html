<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cognitive Load and the Chunking Advantage</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #f8f9fa;
    color: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 2rem;
  }
  figure {
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
    max-width: 1100px;
    width: 100%;
  }
  .diagram-title {
    text-align: center;
    font-size: 1.4rem;
    font-weight: 700;
    margin-bottom: 0.3rem;
    color: #1a1a2e;
  }
  .diagram-subtitle {
    text-align: center;
    font-size: 0.85rem;
    color: #6c757d;
    margin-bottom: 2rem;
  }

  .wm-section {
    margin-bottom: 2rem;
  }
  .wm-section h3 {
    font-size: 1rem;
    font-weight: 700;
    text-align: center;
    margin-bottom: 1rem;
    color: #374151;
  }

  .slot-comparison {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5rem;
    margin-bottom: 2rem;
  }
  .slot-card {
    border: 2.5px solid;
    border-radius: 14px;
    padding: 1.2rem;
  }
  .slot-card h4 {
    font-size: 0.95rem;
    font-weight: 700;
    margin-bottom: 0.5rem;
    text-align: center;
  }
  .slot-row {
    display: flex;
    gap: 0.3rem;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 0.5rem;
  }
  .slot {
    width: 55px;
    height: 55px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.7rem;
    font-weight: 600;
    text-align: center;
    line-height: 1.2;
  }
  .slot-full {
    border: 2px solid;
  }
  .slot-empty {
    border: 2px dashed #d1d5db;
    color: #d1d5db;
  }
  .slot-overflow {
    border: 2px solid #ef4444;
    background: #fef2f2;
    color: #ef4444;
  }

  .card-novice { border-color: #ef4444; }
  .card-novice h4 { color: #dc2626; }
  .card-novice .slot-full { border-color: #fca5a5; background: #fef2f2; color: #991b1b; }

  .card-expert { border-color: #22c55e; }
  .card-expert h4 { color: #16a34a; }
  .card-expert .slot-full { border-color: #86efac; background: #f0fdf4; color: #166534; }

  .slot-card .card-note {
    text-align: center;
    font-size: 0.78rem;
    color: #6c757d;
    margin-top: 0.5rem;
    line-height: 1.4;
  }
  .card-note.overflow-note {
    color: #ef4444;
    font-weight: 600;
  }
  .card-note.success-note {
    color: #22c55e;
    font-weight: 600;
  }

  .char-demo {
    text-align: center;
    margin-bottom: 1.5rem;
    padding: 1rem;
    background: #f8f9fa;
    border-radius: 10px;
  }
  .char-demo .demo-char {
    font-size: 4rem;
    line-height: 1.2;
    margin-bottom: 0.3rem;
  }
  .char-demo .demo-label {
    font-size: 0.8rem;
    color: #6c757d;
  }

  .load-types {
    display: flex;
    gap: 1rem;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }
  .load-card {
    flex: 1;
    min-width: 200px;
    border: 2px solid;
    border-radius: 12px;
    padding: 1rem;
    text-align: center;
  }
  .load-card h4 {
    font-size: 0.85rem;
    font-weight: 700;
    margin-bottom: 0.3rem;
  }
  .load-card p {
    font-size: 0.78rem;
    line-height: 1.4;
  }
  .load-intrinsic { border-color: #6b7280; }
  .load-intrinsic h4 { color: #374151; }
  .load-extraneous { border-color: #ef4444; }
  .load-extraneous h4 { color: #ef4444; }
  .load-germane { border-color: #22c55e; }
  .load-germane h4 { color: #22c55e; }

  .cowan-note {
    background: #fffbeb;
    border-left: 4px solid #f59e0b;
    border-radius: 0 8px 8px 0;
    padding: 0.8rem 1rem;

    line-height: 1.5;
    margin-bottom: 1.5rem;
  }
  .cowan-note strong { color: #d97706; }

  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid #e9ecef;
  }
  figcaption strong {
    display: block;
    font-size: 1.15rem;
    color: #1a1a2e;
    margin-bottom: 0.4rem;
  }
  figcaption span {
    font-size: 0.9rem;
    color: #6c757d;
    line-height: 1.5;
  }

  @media (prefers-color-scheme: dark) {
    body { background: #1a1a2e; color: #e9ecef; }
    figure { background: #2d2d44; box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
    .diagram-title, .wm-section h3 { color: #e9ecef; }
    .diagram-subtitle { color: #adb5bd; }
    figcaption { border-top-color: #3d3d5c; }
    figcaption strong { color: #e9ecef; }
    figcaption span { color: #adb5bd; }
    .char-demo { background: #23233a; }
    .slot-empty { border-color: #4b5563; color: #4b5563; }
    .card-novice .slot-full { background: rgba(239,68,68,0.1); }
    .card-expert .slot-full { background: rgba(34,197,94,0.1); }
    .slot-card .card-note { color: #adb5bd; }
    .load-card { background: rgba(0,0,0,0.1); }
    .load-card p { color: #adb5bd; }
    .cowan-note { background: rgba(245,158,11,0.08); }
  }

</head>
<body>
<figure>
  <div class="diagram-title">Cognitive Load and the Chunking Advantage</div>
  <div class="diagram-subtitle">Working memory holds approximately 4 chunks (Cowan) -- expertise transforms complex compositions into single chunks</div>

  <div class="cowan-note">
    <strong>Updated estimate (Cowan, 2001):</strong> Miller's classic "7 plus or minus 2" (1956) has been revised. Current research places working memory capacity closer to <strong>4 chunks</strong>, with the variation from 3 to 5 depending on task demands. This makes chunking even more critical: with fewer available slots, each slot must carry more information.
  </div>

  <div class="char-demo">
    <div class="demo-char">&#x60F3;</div>
    <div class="demo-label">xiang -- "to think / to miss" -- contains 13 strokes, 3 components (&#x6728; wood + &#x76EE; eye + &#x5FC3; heart)</div>
  </div>

  <div class="slot-comparison">
    <div class="slot-card card-novice">
      <h4>Novice: Component-by-Component</h4>
      <div class="slot-row">
        <div class="slot slot-full">&#x6728;<br>wood</div>
        <div class="slot slot-full">&#x76EE;<br>eye</div>
        <div class="slot slot-full">&#x5FC3;<br>heart</div>
        <div class="slot slot-full">top-bottom<br>layout</div>
        <div class="slot slot-empty">~</div>
      </div>
      <div class="card-note overflow-note">3-4 of ~4 working memory slots consumed for ONE character</div>
      <div class="card-note">A sentence of 5 characters would require 15-20 items -- far beyond capacity. Processing is slow, effortful, error-prone.</div>
    </div>

    <div class="slot-card card-expert">
      <h4>Expert: Whole-Character Chunk</h4>
      <div class="slot-row">
        <div class="slot slot-full" style="width:80px;">&#x60F3;<br>"think"</div>
        <div class="slot slot-empty">~</div>
        <div class="slot slot-empty">~</div>
        <div class="slot slot-empty">~</div>
      </div>
      <div class="card-note success-note">1 of ~4 slots used -- 3 remaining for sentence context</div>
      <div class="card-note">Radical &#x5FC3; still provides a background semantic cue ("emotion/mind"), but the expert processes &#x60F3; as a single unit with instant meaning access.</div>
    </div>
  </div>

  <div class="wm-section">
    <h3>Sweller's Three Types of Cognitive Load</h3>
    <div class="load-types">
      <div class="load-card load-intrinsic">
        <h4>Intrinsic Load</h4>
        <p>Inherent complexity of the material. Cannot be reduced -- a complex concept is complex. Design must match complexity to learner readiness.</p>
      </div>
      <div class="load-card load-extraneous">
        <h4>Extraneous Load</h4>
        <p>Complexity from poor design -- confusing layouts, inconsistent conventions, unclear symbols. This is the load that good design eliminates.</p>
      </div>
      <div class="load-card load-germane">
        <h4>Germane Load</h4>
        <p>Effort spent building schemas and understanding. The "good" load. Design should maximize this by making patterns visible and learnable.</p>
      </div>
    </div>
  </div>

  <figcaption>
    <strong>Diagram 4: Cognitive Load and the Chunking Advantage</strong>
    <span>Working memory holds approximately 4 chunks (Cowan's updated estimate, more conservative than Miller's classic 7 plus or minus 2). A novice processing the character &#x60F3; ("think") must decompose it into 3-4 components, consuming most of working memory for a single character. An expert recognizes the whole character as one chunk, freeing capacity for sentence-level comprehension. This transformation from component-level to chunk-level processing is the cognitive payoff of expertise -- and the learning investment any visual language must require. Sweller's three load types provide the design framework: minimize extraneous load, respect intrinsic load, and maximize germane load. Sources: Miller (1956), Cowan (2001), Sweller (Cognitive Load Theory).</span>
  </figcaption>
</figure>
</body>
</html>
