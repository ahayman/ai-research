<title>The Visual Processing Pipeline -- From Retina to Meaning</title>
<style>

  body {

    .diagram-subtitle { color: #adb5bd; }

    .s2 .stage-box { background: rgba(59,130,246,0.1); }
    .s3 .stage-box { background: rgba(139,92,246,0.1); }
    .s4 .stage-box { background: rgba(239,68,68,0.1); }
    .s5 .stage-box { background: rgba(34,197,94,0.1); }
    .vwfa-highlight { border-color: #ef4444; background: rgba(239,68,68,0.05); }

<body>
<figure>
  <div class="diagram-title">The Visual Processing Pipeline -- From Retina to Meaning</div>
  <div class="diagram-subtitle">How the brain transforms a visual symbol into recognized meaning in under 400 milliseconds</div>

  <div class="pipeline">
    <div class="stage s1">
      <div class="stage-box">
        <div class="stage-icon">&#x1F441;</div>
        <div class="stage-name">Retina</div>
        <div class="stage-region">Optic nerve</div>
      </div>
      <div class="stage-time">0 ms</div>
      <div class="stage-desc">Light hits photoreceptors. Signal sent to brain.</div>
    </div>
    <div class="stage-arrow">&#x2192;</div>
    <div class="stage s2">
      <div class="stage-box">
        <div class="stage-icon">&#x1F4D0;</div>
        <div class="stage-name">V1</div>
        <div class="stage-region">Primary visual cortex</div>
      </div>
      <div class="stage-time">~50 ms</div>
      <div class="stage-desc">Edges, orientations, spatial frequencies detected.</div>
    </div>
    <div class="stage-arrow">&#x2192;</div>
    <div class="stage s3">
      <div class="stage-box">
        <div class="stage-icon">&#x1F300;</div>
        <div class="stage-name">V2 / V4</div>
        <div class="stage-region">Ventral stream</div>
      </div>
      <div class="stage-time">~100 ms</div>
      <div class="stage-desc">Contours, shapes, object features assembled.</div>
    </div>
    <div class="stage-arrow">&#x2192;</div>
    <div class="stage s4">
      <div class="stage-box">
        <div class="stage-icon">&#x1F4D6;</div>
        <div class="stage-name">VWFA</div>
        <div class="stage-region">Left fusiform gyrus</div>
      </div>
      <div class="stage-time">~150-200 ms</div>
      <div class="stage-desc">Symbol/word recognition. Cultural learning bottleneck.</div>
    </div>
    <div class="stage-arrow">&#x2192;</div>
    <div class="stage s5">
      <div class="stage-box">
        <div class="stage-icon">&#x1F4A1;</div>
        <div class="stage-name">Semantic</div>
        <div class="stage-region">Temporal + frontal</div>
      </div>
      <div class="stage-time">~200-400 ms</div>
      <div class="stage-desc">Meaning retrieved. Dual coding activated. Comprehension.</div>
    </div>
  </div>

  <div class="feedback-note">Top-down feedback flows backward at every stage -- expectations shape what we see, not just what enters the eye</div>

  <div class="vwfa-highlight">
    <div class="vwfa-main">
      <h4>The VWFA: The Cultural Learning Bottleneck</h4>
      <p>The Visual Word Form Area is not an evolved reading center -- it is a region that originally processed objects and tools, repurposed ("neurally recycled") for reading through years of experience. Any new visual language must pass through this bottleneck: the VWFA must learn to recognize the new symbol set, and this takes years of exposure, not weeks.</p>
    </div>
    <div class="vwfa-facts">
      <div class="vwfa-fact">Same brain region activated for English, Chinese, Japanese kana</div>
      <div class="vwfa-fact">Adjacent to face-recognition area in fusiform gyrus</div>
      <div class="vwfa-fact">Bilingual readers develop VWFA sensitivity to both scripts</div>
      <div class="vwfa-fact">Years of development needed for expert-level processing</div>
    </div>
  </div>

  <figcaption>
    <strong>Diagram 2: The Visual Processing Pipeline -- From Retina to Meaning</strong>
    <span>Five-stage pathway tracing how a visual symbol is processed: from initial photoreceptor activation (0ms) through edge detection in V1 (~50ms), feature assembly in V2/V4 (~100ms), symbol recognition in the VWFA (~150-200ms), and semantic access (~200-400ms). The VWFA in the left fusiform gyrus is the critical bottleneck -- a cultural adaptation that must learn any new writing system through extended exposure. Dehaene's neural recycling hypothesis explains this: the VWFA repurposes circuits originally evolved for object recognition. Sources: Wikipedia (VWFA, Neuronal recycling), PLOS Biology, PNAS.</span>
  </figcaption>
</figure>
