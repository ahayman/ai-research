<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestalt Principles for Symbol Design</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #f8f9fa;
    color: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 2rem;
  }
  figure {
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
    max-width: 1100px;
    width: 100%;
  }
  .diagram-title {
    text-align: center;
    font-size: 1.4rem;
    font-weight: 700;
    margin-bottom: 0.3rem;
    color: #1a1a2e;
  }
  .diagram-subtitle {
    text-align: center;
    font-size: 0.85rem;
    color: #6c757d;
    margin-bottom: 2rem;
  }

  .principle-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
    gap: 1.2rem;
    margin-bottom: 1.5rem;
  }
  .principle-card {
    border: 2px solid;
    border-radius: 14px;
    padding: 1.2rem;
    display: flex;
    gap: 1rem;
    align-items: flex-start;
  }
  .principle-visual {
    width: 80px;
    height: 80px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 10px;
  }
  .principle-text {
    flex: 1;
  }
  .principle-text h3 {
    font-size: 0.95rem;
    font-weight: 700;
    margin-bottom: 0.2rem;
  }
  .principle-text .principle-def {
    font-size: 0.78rem;
    line-height: 1.4;
    margin-bottom: 0.5rem;
  }
  .principle-text .design-rule {
    font-size: 0.75rem;
    padding: 0.4rem 0.6rem;
    border-radius: 6px;
    line-height: 1.35;
    font-weight: 500;
  }

  /* Color coding for each principle */
  .gp-proximity { border-color: #2563eb; }
  .gp-proximity h3 { color: #2563eb; }
  .gp-proximity .principle-visual { background: #eff6ff; }
  .gp-proximity .design-rule { background: #dbeafe; color: #1e40af; }

  .gp-similarity { border-color: #059669; }
  .gp-similarity h3 { color: #059669; }
  .gp-similarity .principle-visual { background: #f0fdf4; }
  .gp-similarity .design-rule { background: #dcfce7; color: #166534; }

  .gp-closure { border-color: #d97706; }
  .gp-closure h3 { color: #d97706; }
  .gp-closure .principle-visual { background: #fffbeb; }
  .gp-closure .design-rule { background: #fef3c7; color: #92400e; }

  .gp-continuity { border-color: #7c3aed; }
  .gp-continuity h3 { color: #7c3aed; }
  .gp-continuity .principle-visual { background: #faf5ff; }
  .gp-continuity .design-rule { background: #f3e8ff; color: #5b21b6; }

  .gp-figureground { border-color: #ef4444; }
  .gp-figureground h3 { color: #ef4444; }
  .gp-figureground .principle-visual { background: #fef2f2; }
  .gp-figureground .design-rule { background: #fee2e2; color: #991b1b; }

  .gp-symmetry { border-color: #06b6d4; }
  .gp-symmetry h3 { color: #06b6d4; }
  .gp-symmetry .principle-visual { background: #ecfeff; }
  .gp-symmetry .design-rule { background: #cffafe; color: #155e75; }

  /* Simple SVG visualizations */
  .principle-visual svg {
    width: 60px;
    height: 60px;
  }

  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid #e9ecef;
  }
  figcaption strong {
    display: block;
    font-size: 1.15rem;
    color: #1a1a2e;
    margin-bottom: 0.4rem;
  }
  figcaption span {
    font-size: 0.9rem;
    color: #6c757d;
    line-height: 1.5;
  }

  @media (prefers-color-scheme: dark) {
    body { background: #1a1a2e; color: #e9ecef; }
    figure { background: #2d2d44; box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
    .diagram-title { color: #e9ecef; }
    .diagram-subtitle { color: #adb5bd; }
    figcaption { border-top-color: #3d3d5c; }
    figcaption strong { color: #e9ecef; }
    figcaption span { color: #adb5bd; }
    .gp-proximity .principle-visual { background: rgba(37,99,235,0.12); }
    .gp-similarity .principle-visual { background: rgba(5,150,105,0.12); }
    .gp-closure .principle-visual { background: rgba(217,119,6,0.12); }
    .gp-continuity .principle-visual { background: rgba(124,58,237,0.12); }
    .gp-figureground .principle-visual { background: rgba(239,68,68,0.12); }
    .gp-symmetry .principle-visual { background: rgba(6,182,212,0.12); }
    .gp-proximity .design-rule { background: rgba(37,99,235,0.15); color: #93c5fd; }
    .gp-similarity .design-rule { background: rgba(5,150,105,0.15); color: #86efac; }
    .gp-closure .design-rule { background: rgba(217,119,6,0.15); color: #fcd34d; }
    .gp-continuity .design-rule { background: rgba(124,58,237,0.15); color: #d8b4fe; }
    .gp-figureground .design-rule { background: rgba(239,68,68,0.15); color: #fca5a5; }
    .gp-symmetry .design-rule { background: rgba(6,182,212,0.15); color: #67e8f9; }
  }
</style>
</head>
<body>
<figure>
  <div class="diagram-title">Gestalt Principles for Visual Symbol Design</div>
  <div class="diagram-subtitle">Six perceptual laws that govern how the brain automatically groups and segments visual elements -- each generating a concrete design rule</div>

  <div class="principle-grid">
    <div class="principle-card gp-proximity">
      <div class="principle-visual">
        <svg viewBox="0 0 60 60">
          <circle cx="12" cy="15" r="4" fill="#2563eb"/>
          <circle cx="22" cy="15" r="4" fill="#2563eb"/>
          <circle cx="12" cy="25" r="4" fill="#2563eb"/>
          <circle cx="22" cy="25" r="4" fill="#2563eb"/>
          <circle cx="42" cy="15" r="4" fill="#2563eb" opacity="0.5"/>
          <circle cx="52" cy="15" r="4" fill="#2563eb" opacity="0.5"/>
          <circle cx="42" cy="25" r="4" fill="#2563eb" opacity="0.5"/>
          <circle cx="52" cy="25" r="4" fill="#2563eb" opacity="0.5"/>
        </svg>
      </div>
      <div class="principle-text">
        <h3>Proximity</h3>
        <div class="principle-def">Elements close together are perceived as belonging together. Distance separates; closeness unites.</div>
        <div class="design-rule">Rule: Sub-elements of a composed symbol must be spatially close to be perceived as a single unit. Spacing between symbols must exceed spacing within symbols.</div>
      </div>
    </div>

    <div class="principle-card gp-similarity">
      <div class="principle-visual">
        <svg viewBox="0 0 60 60">
          <circle cx="10" cy="15" r="5" fill="#059669"/>
          <circle cx="25" cy="15" r="5" fill="#059669"/>
          <circle cx="40" cy="15" r="5" fill="#059669"/>
          <rect x="5" y="30" width="10" height="10" fill="#059669" opacity="0.5"/>
          <rect x="20" y="30" width="10" height="10" fill="#059669" opacity="0.5"/>
          <rect x="35" y="30" width="10" height="10" fill="#059669" opacity="0.5"/>
        </svg>
      </div>
      <div class="principle-text">
        <h3>Similarity</h3>
        <div class="principle-def">Elements sharing visual features (shape, color, size) are perceived as related. Same shape = same category.</div>
        <div class="design-rule">Rule: Conceptually related symbols should share visual features -- similar base shapes, consistent style. Semantic domains should be visually cohesive.</div>
      </div>
    </div>

    <div class="principle-card gp-closure">
      <div class="principle-visual">
        <svg viewBox="0 0 60 60">
          <path d="M 10 30 A 20 20 0 1 1 50 30" stroke="#d97706" stroke-width="3" fill="none"/>
          <path d="M 10 30 L 20 30" stroke="#d97706" stroke-width="3" fill="none" stroke-dasharray="3,3"/>
          <circle cx="30" cy="15" r="2" fill="#d97706" opacity="0.4"/>
        </svg>
      </div>
      <div class="principle-text">
        <h3>Closure</h3>
        <div class="principle-def">The brain completes incomplete shapes. A circle with a gap is still perceived as a circle.</div>
        <div class="design-rule">Rule: Symbol boundaries can be implied rather than fully drawn, reducing visual clutter while maintaining recognition. Fewer strokes can convey the same form.</div>
      </div>
    </div>

    <div class="principle-card gp-continuity">
      <div class="principle-visual">
        <svg viewBox="0 0 60 60">
          <path d="M 5 40 Q 30 5 55 40" stroke="#7c3aed" stroke-width="3" fill="none"/>
          <path d="M 5 20 Q 30 55 55 20" stroke="#7c3aed" stroke-width="2" fill="none" opacity="0.4"/>
        </svg>
      </div>
      <div class="principle-text">
        <h3>Continuity</h3>
        <div class="principle-def">The eye follows smooth lines and curves, perceiving them as continuous even when interrupted.</div>
        <div class="design-rule">Rule: Compositional elements should flow naturally. Visual grammar should exploit continuous lines to connect related elements, creating natural reading paths.</div>
      </div>
    </div>

    <div class="principle-card gp-figureground">
      <div class="principle-visual">
        <svg viewBox="0 0 60 60">
          <rect x="0" y="0" width="60" height="60" fill="#374151" rx="6"/>
          <circle cx="30" cy="30" r="18" fill="#fef2f2"/>
          <text x="30" y="35" text-anchor="middle" font-size="14" font-weight="700" fill="#ef4444">A</text>
        </svg>
      </div>
      <div class="principle-text">
        <h3>Figure-Ground</h3>
        <div class="principle-def">The brain separates a focal figure from its background automatically. Ambiguous figure-ground delays recognition.</div>
        <div class="design-rule">Rule: Each symbol must have clear figure-ground separation from background and from adjacent symbols. Avoid designs where figure and ground could swap.</div>
      </div>
    </div>

    <div class="principle-card gp-symmetry">
      <div class="principle-visual">
        <svg viewBox="0 0 60 60">
          <line x1="30" y1="5" x2="30" y2="55" stroke="#06b6d4" stroke-width="1" stroke-dasharray="3,3"/>
          <polygon points="10,30 20,15 30,10 30,50 20,45" fill="#06b6d4" opacity="0.6"/>
          <polygon points="50,30 40,15 30,10 30,50 40,45" fill="#06b6d4" opacity="0.6"/>
        </svg>
      </div>
      <div class="principle-text">
        <h3>Symmetry</h3>
        <div class="principle-def">Symmetric elements are perceived as belonging together. The brain prefers balanced, orderly configurations.</div>
        <div class="design-rule">Rule: Symmetric symbol design aids rapid recognition. Balanced compositions are processed faster and judged more aesthetically cohesive.</div>
      </div>
    </div>
  </div>

  <figcaption>
    <strong>Diagram 3: Gestalt Principles for Visual Symbol Design</strong>
    <span>Six perceptual laws, each demonstrated with an abstract visual and translated into a concrete design rule for visual language symbols. These principles operate automatically and pre-attentively -- the brain applies them before conscious processing begins. A visual language that aligns with these principles will be processed more efficiently; one that violates them will create unnecessary perceptual friction. The principles originate with Wertheimer, Koffka, and Kohler (1920s) and remain foundational in design and cognitive science. Sources: IxDF (Gestalt Principles), OpenStax Psychology, PMC.</span>
  </figcaption>
</figure>
</body>
</html>
