<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Internet Slang Taxonomy: Nine Types of Chinese Digital Word Formation</title>
<style>
  :root {
    --bg: #0f172a; --fg: #e2e8f0; --surface: #1e293b; --border: #334155;
    --accent: #06b6d4;
    --c1: #f43f5e; --c1bg: rgba(244,63,94,0.1);
    --c2: #f59e0b; --c2bg: rgba(245,158,11,0.1);
    --c3: #10b981; --c3bg: rgba(16,185,129,0.1);
    --c4: #8b5cf6; --c4bg: rgba(139,92,246,0.1);
    --c5: #06b6d4; --c5bg: rgba(6,182,212,0.1);
    --c6: #ec4899; --c6bg: rgba(236,72,153,0.1);
    --c7: #3b82f6; --c7bg: rgba(59,130,246,0.1);
    --c8: #eab308; --c8bg: rgba(234,179,8,0.1);
    --c9: #a78bfa; --c9bg: rgba(167,139,250,0.1);
    --muted: #64748b; --text-sec: #94a3b8;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg); color: var(--fg);
    display: flex; justify-content: center; padding: 2rem 1rem; line-height: 1.6;
  }
  figure { max-width: 1100px; width: 100%; }
  .diagram-box {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 2rem 1.5rem; overflow-x: auto;
  }
  .title { text-align: center; font-size: 1.15rem; font-weight: 700; color: var(--accent); margin-bottom: 0.2rem; }
  .subtitle { text-align: center; font-size: 0.82rem; color: var(--muted); margin-bottom: 1.5rem; }

  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.75rem; }

  .type-card {
    border-radius: 10px; padding: 0.85rem; border: 2px solid;
    display: flex; flex-direction: column;
  }
  .type-num {
    font-size: 0.6rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.1em; margin-bottom: 0.15rem;
  }
  .type-name { font-size: 0.92rem; font-weight: 700; margin-bottom: 0.15rem; }
  .type-zh { font-size: 0.75rem; color: var(--text-sec); margin-bottom: 0.4rem; }
  .type-mechanism {
    font-size: 0.72rem; color: var(--text-sec); margin-bottom: 0.5rem;
    padding: 0.3rem 0.5rem; background: var(--bg); border-radius: 4px;
    border: 1px solid var(--border);
  }
  .examples { flex: 1; }
  .ex {
    background: var(--bg); border: 1px solid var(--border); border-radius: 5px;
    padding: 0.3rem 0.45rem; margin-bottom: 0.3rem; font-size: 0.78rem;
  }
  .ex .code { font-weight: 700; font-family: 'Courier New', monospace; }
  .ex .arrow-sm { color: var(--muted); margin: 0 0.2rem; }
  .ex .meaning { color: var(--text-sec); font-size: 0.72rem; }
  .en-note {
    font-size: 0.68rem; color: var(--muted); margin-top: 0.4rem;
    padding-top: 0.3rem; border-top: 1px dashed var(--border);
    font-style: italic;
  }

  .tc1 { background: var(--c1bg); border-color: var(--c1); }
  .tc1 .type-num, .tc1 .type-name { color: var(--c1); }
  .tc2 { background: var(--c2bg); border-color: var(--c2); }
  .tc2 .type-num, .tc2 .type-name { color: var(--c2); }
  .tc3 { background: var(--c3bg); border-color: var(--c3); }
  .tc3 .type-num, .tc3 .type-name { color: var(--c3); }
  .tc4 { background: var(--c4bg); border-color: var(--c4); }
  .tc4 .type-num, .tc4 .type-name { color: var(--c4); }
  .tc5 { background: var(--c5bg); border-color: var(--c5); }
  .tc5 .type-num, .tc5 .type-name { color: var(--c5); }
  .tc6 { background: var(--c6bg); border-color: var(--c6); }
  .tc6 .type-num, .tc6 .type-name { color: var(--c6); }
  .tc7 { background: var(--c7bg); border-color: var(--c7); }
  .tc7 .type-num, .tc7 .type-name { color: var(--c7); }
  .tc8 { background: var(--c8bg); border-color: var(--c8); }
  .tc8 .type-num, .tc8 .type-name { color: var(--c8); }
  .tc9 { background: var(--c9bg); border-color: var(--c9); }
  .tc9 .type-num, .tc9 .type-name { color: var(--c9); }

  figcaption {
    text-align: center; margin-top: 1.25rem; font-size: 0.82rem;
    color: var(--muted); font-style: italic; padding: 0 1rem; line-height: 1.5;
  }

  @media (max-width: 900px) { .grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 550px) { .grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<figure>
  <div class="diagram-box">
    <div class="title">Chinese Internet Slang: A Taxonomy of Innovation</div>
    <div class="subtitle">Nine word-formation patterns exploiting unique features of Chinese script, phonology, and digital culture</div>

    <div class="grid">
      <!-- 1: Number Homophones -->
      <div class="type-card tc1">
        <div class="type-num">Type 1</div>
        <div class="type-name">Number Homophones</div>
        <div class="type-zh">&#25968;&#23383;&#35856;&#38899; shuzhi xiehyin</div>
        <div class="type-mechanism">Numbers read aloud &asymp; Chinese words (exploits ~1,300 syllable inventory)</div>
        <div class="examples">
          <div class="ex"><span class="code">520</span><span class="arrow-sm">&rarr;</span>&#25105;&#29233;&#20320; "I love you"</div>
          <div class="ex"><span class="code">666</span><span class="arrow-sm">&rarr;</span>&#28316;&#28316;&#28316; "awesome"</div>
          <div class="ex"><span class="code">233</span><span class="arrow-sm">&rarr;</span>laughing (Mop #233 emoji)</div>
          <div class="ex"><span class="code">88</span><span class="arrow-sm">&rarr;</span>&#25308;&#25308; "bye-bye"</div>
        </div>
        <div class="en-note">English: very limited (4U, 2 = to). Phonology too diverse for systematic mapping.</div>
      </div>

      <!-- 2: Pinyin Abbreviations -->
      <div class="type-card tc2">
        <div class="type-num">Type 2</div>
        <div class="type-name">Pinyin Abbreviations</div>
        <div class="type-zh">&#25340;&#38899;&#32553;&#20889; pinyin suoxie</div>
        <div class="type-mechanism">Latin letter initials of Pinyin syllables &mdash; unreadable without Chinese</div>
        <div class="examples">
          <div class="ex"><span class="code">YYDS</span><span class="arrow-sm">&rarr;</span>&#27704;&#36828;&#30340;&#31070; "eternal god/GOAT"</div>
          <div class="ex"><span class="code">XSWL</span><span class="arrow-sm">&rarr;</span>&#31505;&#27515;&#25105;&#20102; "dying laughing"</div>
          <div class="ex"><span class="code">DDDD</span><span class="arrow-sm">&rarr;</span>&#25026;&#30340;&#37117;&#25026; "IYKYK"</div>
          <div class="ex"><span class="code">GG</span><span class="arrow-sm">&rarr;</span>&#21733;&#21733; "bro" / "game over"</div>
        </div>
        <div class="en-note">Unique: looks like English but encodes Chinese. Genuinely bilingual camouflage.</div>
      </div>

      <!-- 3: Homophone Substitution -->
      <div class="type-card tc3">
        <div class="type-num">Type 3</div>
        <div class="type-name">Homophone Substitution</div>
        <div class="type-zh">&#35856;&#38899;&#26367;&#20195; xiehyin tidai</div>
        <div class="type-mechanism">Characters with similar pronunciation replace the original &mdash; humor, euphemism, or evasion</div>
        <div class="examples">
          <div class="ex"><span class="code">&#40493;&#26792;</span> duck-pear<span class="arrow-sm">&asymp;</span>&#21387;&#21147; "pressure"</div>
          <div class="ex"><span class="code">&#37233;&#32043;</span> sauce-purple<span class="arrow-sm">&asymp;</span>&#36825;&#26679;&#23376; "like this"</div>
          <div class="ex"><span class="code">&#26479;&#20855;</span> cup-utensil<span class="arrow-sm">&asymp;</span>&#24754;&#21095; "tragedy"</div>
          <div class="ex"><span class="code">&#34013;&#29916;&#39321;&#33735;</span><span class="arrow-sm">&asymp;</span>&#38590;&#21463;&#24819;&#21741; "sad, want to cry"</div>
        </div>
        <div class="en-note">English has puns but cannot substitute at character level. Chinese homophones are orders of magnitude denser.</div>
      </div>

      <!-- 4: Character Decomposition -->
      <div class="type-card tc4">
        <div class="type-num">Type 4</div>
        <div class="type-name">Visual / Character Manipulation</div>
        <div class="type-zh">&#25286;&#23383;&#25913;&#23383; chaizi gaizi</div>
        <div class="type-mechanism">Exploiting visual resemblance, component extraction, or character shape as image</div>
        <div class="examples">
          <div class="ex"><span class="code">&#22247;</span> (ancient "window") &rarr; used as distressed face emoji</div>
          <div class="ex"><span class="code">&#33609;</span> grass &rarr; euphemism (visual component link to &#25805;)</div>
          <div class="ex"><span class="code">&#28779;&#26143;&#25991;</span> "Martian script" &mdash; deformed Unicode mixing</div>
        </div>
        <div class="en-note">Impossible in alphabetic systems. Requires logographic visual structure.</div>
      </div>

      <!-- 5: Semantic Extension -->
      <div class="type-card tc5">
        <div class="type-num">Type 5</div>
        <div class="type-name">Semantic Extension</div>
        <div class="type-zh">&#35821;&#20041;&#24341;&#30003; yuyi yinshen</div>
        <div class="type-mechanism">Existing words gain new internet-specific meanings through metaphorical shift</div>
        <div class="examples">
          <div class="ex"><span class="code">&#20869;&#21367;</span> "involution" &rarr; rat race / hypercompetition</div>
          <div class="ex"><span class="code">&#36538;&#24179;</span> "lie flat" &rarr; opting out of grind culture</div>
          <div class="ex"><span class="code">&#31038;&#27515;</span> "social death" &rarr; extreme embarrassment</div>
          <div class="ex"><span class="code">&#20961;&#23572;&#36187;</span> "Versailles" &rarr; humble-bragging</div>
        </div>
        <div class="en-note">English does this too ("ghosting," "slay"). But Chinese compounds are more visually decomposable.</div>
      </div>

      <!-- 6: Alphanumeric Code-Mixing -->
      <div class="type-card tc6">
        <div class="type-num">Type 6</div>
        <div class="type-name">Alphanumeric Code-Mixing</div>
        <div class="type-zh">&#23383;&#27597;&#25968;&#23383;&#28151;&#29992; zimu shuzi hunyong</div>
        <div class="type-mechanism">English words/letters + Chinese grammar markers or complements</div>
        <div class="examples">
          <div class="ex"><span class="code">hold&#20303;</span> English verb + Chinese complement &#20303;</div>
          <div class="ex"><span class="code">get&#21040;</span> "get it" + directional complement &#21040;</div>
          <div class="ex"><span class="code">emo&#20102;</span> English adjective + aspect marker &#20102;</div>
          <div class="ex"><span class="code">C&#20301;</span> "center position" (C + &#20301; "seat")</div>
        </div>
        <div class="en-note">Chinese grammar productively absorbs English roots. English rarely absorbs Chinese grammar.</div>
      </div>

      <!-- 7: Emoji / Sticker Pragmatics -->
      <div class="type-card tc7">
        <div class="type-num">Type 7</div>
        <div class="type-name">Emoji/Sticker Pragmatics</div>
        <div class="type-zh">&#34920;&#24773;&#21253; biaoqingbao</div>
        <div class="type-mechanism">Emoji reinterpretation and sticker packs as pragmatic markers or censorship bypass</div>
        <div class="examples">
          <div class="ex">&#128578; smiley = passive-aggressive (young) vs. sincere (old)</div>
          <div class="ex">&#128054; dog head = "I'm being sarcastic" marker</div>
          <div class="ex">Sticker packs with embedded text bypass keyword filters</div>
        </div>
        <div class="en-note">English has emoji but lacks the generational reinterpretation depth or censorship dimension.</div>
      </div>

      <!-- 8: Censorship-Driven Coinage -->
      <div class="type-card tc8">
        <div class="type-num">Type 8</div>
        <div class="type-name">Censorship-Driven Coinage</div>
        <div class="type-zh">&#23457;&#26597;&#35268;&#36991; shencha guibi</div>
        <div class="type-mechanism">Substitutes created specifically to evade automated keyword filtering</div>
        <div class="examples">
          <div class="ex"><span class="code">&#27827;&#34809;</span> river crab &asymp; &#21644;&#35856; "harmonious"</div>
          <div class="ex"><span class="code">&#32500;&#23612;</span> Winnie &rarr; political reference</div>
          <div class="ex"><span class="code">May 35th</span> = June 4th (date evasion)</div>
        </div>
        <div class="en-note">English "unalive" (TikTok) is a pale shadow. Chinese censorship evasion is a full linguistic subsystem.</div>
      </div>

      <!-- 9: Platform-Specific Jargon -->
      <div class="type-card tc9">
        <div class="type-num">Type 9</div>
        <div class="type-name">Platform-Specific Jargon</div>
        <div class="type-zh">&#24179;&#21488;&#26415;&#35821; pingtai shuyu</div>
        <div class="type-mechanism">Vocabulary native to specific platforms, unintelligible outside that community</div>
        <div class="examples">
          <div class="ex"><span class="code">&#24377;&#24149;</span> danmu &mdash; Bilibili's scrolling comments</div>
          <div class="ex"><span class="code">UP&#20027;</span> &mdash; Bilibili content creator</div>
          <div class="ex"><span class="code">&#28909;&#25628;</span> &mdash; Weibo trending topics</div>
          <div class="ex"><span class="code">&#26379;&#21451;&#22280;</span> &mdash; WeChat "Moments" feed</div>
        </div>
        <div class="en-note">English has platform jargon too ("subreddit," "retweet"), but Chinese platforms form more distinct registers.</div>
      </div>
    </div>
  </div>
  <figcaption>Nine distinct word-formation strategies in Chinese internet language, each exploiting specific features of Chinese phonology, script structure, or digital context. Types 1-4 and 8 have no meaningful English parallels because they depend on properties unique to Chinese.</figcaption>
</figure>
</body>
</html>
