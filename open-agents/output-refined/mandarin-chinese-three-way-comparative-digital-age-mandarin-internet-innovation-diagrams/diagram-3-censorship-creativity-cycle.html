<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Censorship-Creativity Cycle: How Filtering Drives Linguistic Innovation</title>
<style>
  :root {
    --bg: #0f172a; --fg: #e2e8f0; --surface: #1e293b; --border: #334155;
    --accent: #06b6d4; --accent-glow: rgba(6,182,212,0.15);
    --rose: #f43f5e; --rose-bg: rgba(244,63,94,0.1);
    --amber: #f59e0b; --amber-bg: rgba(245,158,11,0.1);
    --emerald: #10b981; --emerald-bg: rgba(16,185,129,0.1);
    --purple: #8b5cf6; --purple-bg: rgba(139,92,246,0.1);
    --blue: #3b82f6; --blue-bg: rgba(59,130,246,0.1);
    --muted: #64748b; --text-sec: #94a3b8;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg); color: var(--fg);
    display: flex; justify-content: center; padding: 2rem 1rem; line-height: 1.6;
  }
  figure { max-width: 1000px; width: 100%; }
  .diagram-box {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 2rem 1.5rem;
  }
  .title { text-align: center; font-size: 1.15rem; font-weight: 700; color: var(--accent); margin-bottom: 0.2rem; }
  .subtitle { text-align: center; font-size: 0.82rem; color: var(--muted); margin-bottom: 2rem; }

  /* Circular cycle */
  .cycle-wrapper {
    display: flex; justify-content: center; margin-bottom: 2rem;
  }
  .cycle-ring {
    display: grid;
    grid-template-columns: 200px 60px 200px;
    grid-template-rows: auto 60px auto 60px auto;
    gap: 0;
    align-items: center; justify-items: center;
    max-width: 480px;
  }
  .step-box {
    padding: 0.75rem 0.9rem; border-radius: 10px; border: 2px solid;
    text-align: center; width: 100%;
  }
  .step-num {
    font-size: 0.6rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.08em; margin-bottom: 0.2rem;
  }
  .step-text { font-size: 0.82rem; font-weight: 600; }
  .step-detail { font-size: 0.7rem; color: var(--text-sec); margin-top: 0.15rem; }

  .s-ban { background: var(--rose-bg); border-color: var(--rose); }
  .s-ban .step-num, .s-ban .step-text { color: var(--rose); }
  .s-create { background: var(--emerald-bg); border-color: var(--emerald); }
  .s-create .step-num, .s-create .step-text { color: var(--emerald); }
  .s-spread { background: var(--blue-bg); border-color: var(--blue); }
  .s-spread .step-num, .s-spread .step-text { color: var(--blue); }
  .s-detect { background: var(--amber-bg); border-color: var(--amber); }
  .s-detect .step-num, .s-detect .step-text { color: var(--amber); }
  .s-mainstream { background: var(--purple-bg); border-color: var(--purple); }
  .s-mainstream .step-num, .s-mainstream .step-text { color: var(--purple); }

  .cycle-arrow {
    font-size: 1.4rem; color: var(--muted); display: flex;
    align-items: center; justify-content: center;
  }
  .cycle-spacer { /* empty grid cell */ }

  /* Case study */
  .case-study {
    margin-top: 1.5rem; background: var(--bg); border: 1px solid var(--border);
    border-radius: 10px; padding: 1.25rem;
  }
  .case-title {
    font-size: 0.82rem; font-weight: 700; color: var(--accent);
    margin-bottom: 0.75rem; text-transform: uppercase; letter-spacing: 0.06em;
  }
  .chain {
    display: flex; align-items: center; flex-wrap: wrap; gap: 0.5rem;
    margin-bottom: 0.75rem;
  }
  .chain-item {
    padding: 0.4rem 0.6rem; border-radius: 6px; font-size: 0.8rem;
    font-weight: 600; border: 1px solid;
  }
  .chain-active { background: var(--emerald-bg); border-color: var(--emerald); color: var(--emerald); }
  .chain-blocked { background: var(--rose-bg); border-color: var(--rose); color: var(--rose); text-decoration: line-through; }
  .chain-arrow { color: var(--muted); font-size: 1rem; }
  .chain-label { font-size: 0.68rem; color: var(--text-sec); display: block; font-weight: 400; }

  /* Strategies grid */
  .strategies {
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.75rem;
    margin-top: 1.5rem;
  }
  .strat-card {
    background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
    padding: 0.75rem;
  }
  .strat-title { font-size: 0.78rem; font-weight: 700; color: var(--accent); margin-bottom: 0.4rem; }
  .strat-list { font-size: 0.75rem; color: var(--text-sec); }
  .strat-list div { margin-bottom: 0.25rem; padding-left: 0.8rem; text-indent: -0.8rem; }
  .strat-list div::before { content: ""; display: inline-block; width: 5px; height: 5px; border-radius: 50%; margin-right: 0.4rem; vertical-align: middle; }
  .strat-list.homophone div::before { background: var(--emerald); }
  .strat-list.visual div::before { background: var(--purple); }
  .strat-list.semantic div::before { background: var(--amber); }
  .strat-list.technical div::before { background: var(--blue); }

  figcaption {
    text-align: center; margin-top: 1.25rem; font-size: 0.82rem;
    color: var(--muted); font-style: italic; padding: 0 1rem; line-height: 1.5;
  }

  @media (max-width: 600px) {
    .cycle-ring { grid-template-columns: 1fr; grid-template-rows: auto; }
    .cycle-arrow { transform: rotate(90deg); }
    .strategies { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<figure>
  <div class="diagram-box">
    <div class="title">The Censorship-Creativity Cycle</div>
    <div class="subtitle">How automated keyword filtering inadvertently drives real-time linguistic innovation in Chinese</div>

    <!-- The cycle -->
    <div class="cycle-wrapper">
      <div class="cycle-ring">
        <!-- Row 1: Ban -->
        <div class="step-box s-ban">
          <div class="step-num">Step 1</div>
          <div class="step-text">Sensitive Term Blocked</div>
          <div class="step-detail">Keyword filter activated</div>
        </div>
        <div class="cycle-arrow">&rarr;</div>
        <div class="step-box s-create">
          <div class="step-num">Step 2</div>
          <div class="step-text">Substitute Created</div>
          <div class="step-detail">Homophone, pun, metaphor</div>
        </div>

        <!-- Arrow down right -->
        <div class="cycle-spacer"></div>
        <div class="cycle-spacer"></div>
        <div class="cycle-arrow">&darr;</div>

        <!-- Row 2 -->
        <div class="step-box s-mainstream">
          <div class="step-num">Outcome</div>
          <div class="step-text">Enters Mainstream</div>
          <div class="step-detail">Some substitutes survive permanently</div>
        </div>
        <div class="cycle-arrow">&larr;</div>
        <div class="step-box s-spread">
          <div class="step-num">Step 3</div>
          <div class="step-text">Substitute Spreads</div>
          <div class="step-detail">Virally across platforms</div>
        </div>

        <!-- Arrow down left -->
        <div class="cycle-arrow">&darr;</div>
        <div class="cycle-spacer"></div>
        <div class="cycle-spacer"></div>

        <!-- Row 3 -->
        <div class="step-box s-detect">
          <div class="step-num">Step 4</div>
          <div class="step-text">Censors Detect Substitute</div>
          <div class="step-detail">New keyword added to filter</div>
        </div>
        <div class="cycle-arrow">&rarr;</div>
        <div class="step-box s-ban" style="border-style: dashed;">
          <div class="step-num">Step 5</div>
          <div class="step-text">Substitute Blocked</div>
          <div class="step-detail">Cycle restarts &rarr; Step 2</div>
        </div>
      </div>
    </div>

    <!-- Case study: hexie -->
    <div class="case-study">
      <div class="case-title">Case Study: &#21644;&#35856; "Harmonious Society"</div>
      <div class="chain">
        <div class="chain-item chain-blocked">&#21644;&#35856; hexie<span class="chain-label">"harmonious" (govt slogan)</span></div>
        <div class="chain-arrow">&rarr;</div>
        <div class="chain-item chain-active">&#27827;&#34809; hexie<span class="chain-label">"river crab" (homophone)</span></div>
        <div class="chain-arrow">&rarr;</div>
        <div class="chain-item chain-blocked">&#27827;&#34809; blocked<span class="chain-label">censors caught up</span></div>
        <div class="chain-arrow">&rarr;</div>
        <div class="chain-item chain-active">&#27700;&#20135; shuichan<span class="chain-label">"aquatic product" (semantic shift)</span></div>
        <div class="chain-arrow">&rarr;</div>
        <div class="chain-item chain-active" style="background:var(--purple-bg);border-color:var(--purple);color:var(--purple);">&#34809; = censorship<span class="chain-label">crab icon = censorship (permanent)</span></div>
      </div>
      <div style="font-size:0.75rem;color:var(--text-sec);">The river crab image became a permanent symbol of internet censorship in China, outliving the specific term that created it. This is linguistic evolution driven by political pressure.</div>
    </div>

    <!-- Evasion strategies -->
    <div class="strategies">
      <div class="strat-card">
        <div class="strat-title">Homophone Strategies</div>
        <div class="strat-list homophone">
          <div>&#27827;&#34809; hexie &asymp; &#21644;&#35856; hexie (river crab / harmony)</div>
          <div>&#32500;&#23612; Weini &asymp; political figure (Winnie the Pooh)</div>
          <div>Tone/syllable-adjacent substitutions</div>
        </div>
      </div>
      <div class="strat-card">
        <div class="strat-title">Visual/Structural Strategies</div>
        <div class="strat-list visual">
          <div>Traditional characters bypass Simplified-only filters</div>
          <div>Invisible Unicode insertion between characters</div>
          <div>Text rendered as image (OCR-resistant)</div>
        </div>
      </div>
      <div class="strat-card">
        <div class="strat-title">Semantic/Metaphorical Strategies</div>
        <div class="strat-list semantic">
          <div>404 = censored content (HTTP error metaphor)</div>
          <div>&#21917;&#33590; he cha "drink tea" = police questioning</div>
          <div>May 35th = June 4th (date arithmetic)</div>
        </div>
      </div>
      <div class="strat-card">
        <div class="strat-title">Technical Strategies</div>
        <div class="strat-list technical">
          <div>Tibetan/Uyghur script transliteration</div>
          <div>Vertical text or mirror writing</div>
          <div>Base64 encoding of sensitive phrases</div>
        </div>
      </div>
    </div>
  </div>
  <figcaption>China's internet censorship system creates an arms race between automated keyword filters and user creativity. Each blocked term spawns new substitutes, some of which permanently enter the language. This cycle has no parallel in Taiwan (minimal censorship) or English-speaking internet (no equivalent homophone density for systematic substitution).</figcaption>
</figure>
</body>
</html>
