<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Code-Mixing Patterns: Three Scripts in One Sentence</title>
<style>
  :root {
    --bg: #0f172a; --fg: #e2e8f0; --surface: #1e293b; --border: #334155;
    --accent: #06b6d4; --accent-glow: rgba(6,182,212,0.15);
    --rose: #f43f5e; --rose-bg: rgba(244,63,94,0.1);
    --amber: #f59e0b; --amber-bg: rgba(245,158,11,0.1);
    --emerald: #10b981; --emerald-bg: rgba(16,185,129,0.1);
    --purple: #8b5cf6; --purple-bg: rgba(139,92,246,0.1);
    --blue: #3b82f6; --blue-bg: rgba(59,130,246,0.1);
    --pink: #ec4899; --pink-bg: rgba(236,72,153,0.08);
    --muted: #64748b; --text-sec: #94a3b8;
    --cn-red: #dc2626; --cn-red-bg: rgba(220,38,38,0.1);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg); color: var(--fg);
    display: flex; justify-content: center; padding: 2rem 1rem; line-height: 1.6;
  }
  figure { max-width: 1000px; width: 100%; }
  .diagram-box {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 2rem 1.5rem;
  }
  .title { text-align: center; font-size: 1.15rem; font-weight: 700; color: var(--accent); margin-bottom: 0.2rem; }
  .subtitle { text-align: center; font-size: 0.82rem; color: var(--muted); margin-bottom: 2rem; }

  /* Pattern cards */
  .patterns { display: flex; flex-direction: column; gap: 1rem; }

  .pattern-card {
    background: var(--bg); border: 1px solid var(--border); border-radius: 10px;
    padding: 1rem 1.25rem; border-left: 4px solid;
  }
  .pattern-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 0.6rem; flex-wrap: wrap; gap: 0.4rem;
  }
  .pattern-title { font-size: 0.9rem; font-weight: 700; }
  .pattern-formula {
    font-size: 0.72rem; padding: 0.2rem 0.6rem; border-radius: 9999px;
    font-weight: 600; border: 1px solid;
  }

  .example-sentence {
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    padding: 0.75rem 1rem; margin-bottom: 0.5rem;
  }
  .sentence-text { font-size: 1.1rem; margin-bottom: 0.4rem; line-height: 1.8; }
  .seg-cn { color: var(--cn-red); font-weight: 600; }
  .seg-en { color: var(--accent); font-weight: 600; }
  .seg-num { color: var(--amber); font-weight: 600; }
  .seg-py { color: var(--purple); font-weight: 600; font-style: italic; }
  .seg-emoji { }
  .sentence-gloss { font-size: 0.75rem; color: var(--text-sec); }
  .sentence-analysis { font-size: 0.72rem; color: var(--muted); margin-top: 0.3rem; font-style: italic; }

  /* Color legend */
  .legend {
    display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center;
    margin-bottom: 1.5rem; padding: 0.6rem; background: var(--bg);
    border: 1px solid var(--border); border-radius: 8px;
  }
  .legend-item { display: flex; align-items: center; gap: 0.3rem; font-size: 0.72rem; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  .p1 { border-left-color: var(--accent); }
  .p1 .pattern-title { color: var(--accent); }
  .p1 .pattern-formula { background: var(--accent-glow); border-color: var(--accent); color: var(--accent); }

  .p2 { border-left-color: var(--purple); }
  .p2 .pattern-title { color: var(--purple); }
  .p2 .pattern-formula { background: var(--purple-bg); border-color: var(--purple); color: var(--purple); }

  .p3 { border-left-color: var(--amber); }
  .p3 .pattern-title { color: var(--amber); }
  .p3 .pattern-formula { background: var(--amber-bg); border-color: var(--amber); color: var(--amber); }

  .p4 { border-left-color: var(--emerald); }
  .p4 .pattern-title { color: var(--emerald); }
  .p4 .pattern-formula { background: var(--emerald-bg); border-color: var(--emerald); color: var(--emerald); }

  .p5 { border-left-color: var(--rose); }
  .p5 .pattern-title { color: var(--rose); }
  .p5 .pattern-formula { background: var(--rose-bg); border-color: var(--rose); color: var(--rose); }

  .p6 { border-left-color: var(--pink); }
  .p6 .pattern-title { color: var(--pink); }
  .p6 .pattern-formula { background: var(--pink-bg); border-color: var(--pink); color: var(--pink); }

  /* Insight box */
  .insight {
    margin-top: 1.25rem; padding: 1rem;
    background: var(--accent-glow); border: 1px solid var(--accent);
    border-radius: 10px;
  }
  .insight-title { font-size: 0.78rem; font-weight: 700; color: var(--accent); margin-bottom: 0.4rem; text-transform: uppercase; letter-spacing: 0.06em; }
  .insight-text { font-size: 0.8rem; color: var(--text-sec); }

  figcaption {
    text-align: center; margin-top: 1.25rem; font-size: 0.82rem;
    color: var(--muted); font-style: italic; padding: 0 1rem; line-height: 1.5;
  }

  @media (max-width: 600px) {
    .pattern-header { flex-direction: column; align-items: flex-start; }
  }
</style>
</head>
<body>
<figure>
  <div class="diagram-box">
    <div class="title">Code-Mixing Patterns in Digital Mandarin</div>
    <div class="subtitle">Six ways English letters, Arabic numerals, Pinyin abbreviations, and Chinese characters combine in a single stream</div>

    <!-- Color legend -->
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--cn-red);"></div>Chinese characters</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--accent);"></div>English words/letters</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--amber);"></div>Numbers</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--purple);"></div>Pinyin abbreviations</div>
    </div>

    <div class="patterns">
      <!-- Pattern 1: English verb + Chinese complement -->
      <div class="pattern-card p1">
        <div class="pattern-header">
          <div class="pattern-title">English Verb + Chinese Grammar</div>
          <div class="pattern-formula">EN-verb + CN-complement/aspect</div>
        </div>
        <div class="example-sentence">
          <div class="sentence-text">
            <span class="seg-cn">&#20320;&#33021;</span><span class="seg-en">hold</span><span class="seg-cn">&#20303;&#21527;&#65311;</span>
          </div>
          <div class="sentence-gloss">ni neng <strong>hold</strong>-zhu ma? &mdash; "Can you hold it together?"</div>
          <div class="sentence-analysis">English "hold" receives Chinese resultative complement &#20303; (zhu, "firmly"). Chinese grammar absorbs the English root.</div>
        </div>
        <div class="example-sentence">
          <div class="sentence-text">
            <span class="seg-cn">&#25105;</span><span class="seg-en">get</span><span class="seg-cn">&#21040;&#20102;&#20182;&#30340;&#28857;</span>
          </div>
          <div class="sentence-gloss">wo <strong>get</strong>-dao-le ta de dian &mdash; "I got his point"</div>
          <div class="sentence-analysis">English "get" + directional complement &#21040; (dao) + perfective aspect &#20102; (le). Three Chinese grammar layers on one English root.</div>
        </div>
      </div>

      <!-- Pattern 2: Pinyin initial abbreviation -->
      <div class="pattern-card p2">
        <div class="pattern-header">
          <div class="pattern-title">Pinyin Initial Abbreviations</div>
          <div class="pattern-formula">Latin letters encoding Chinese initials</div>
        </div>
        <div class="example-sentence">
          <div class="sentence-text">
            <span class="seg-cn">&#36825;&#20010;&#30495;&#30340;</span><span class="seg-py">YYDS</span><span class="seg-cn">&#65281;</span>
          </div>
          <div class="sentence-gloss">zhe ge zhen de <strong>YYDS</strong>! &mdash; "This is truly the GOAT!"</div>
          <div class="sentence-analysis">YYDS = &#27704;&#36828;&#30340;&#31070; (yongyuan de shen, "eternal god"). Latin letters represent Pinyin initials, not English words.</div>
        </div>
        <div class="example-sentence">
          <div class="sentence-text">
            <span class="seg-py">XSWL</span><span class="seg-cn">&#65292;&#20320;&#20204;&#22826;&#25630;&#31505;&#20102;</span>
          </div>
          <div class="sentence-gloss"><strong>XSWL</strong>, nimen tai gaoxiao le &mdash; "LMAO, you guys are hilarious"</div>
          <div class="sentence-analysis">XSWL = &#31505;&#27515;&#25105;&#20102; (xiao si wo le). Same letters, zero English meaning. Bilingual camouflage.</div>
        </div>
      </div>

      <!-- Pattern 3: Number substitution -->
      <div class="pattern-card p3">
        <div class="pattern-header">
          <div class="pattern-title">Number-Sound Encoding</div>
          <div class="pattern-formula">Arabic numerals &asymp; Chinese syllables</div>
        </div>
        <div class="example-sentence">
          <div class="sentence-text">
            <span class="seg-num">520</span><span class="seg-cn">&#65281;&#20170;&#22825;</span><span class="seg-num">1314</span>
          </div>
          <div class="sentence-gloss"><strong>520</strong> (= &#25105;&#29233;&#20320;)! jintian <strong>1314</strong> (= &#19968;&#29983;&#19968;&#19990;) &mdash; "I love you! Today, forever."</div>
          <div class="sentence-analysis">Numbers read in Mandarin approximate Chinese phrases. Exploits ~1,300 syllable inventory's density of homophones.</div>
        </div>
      </div>

      <!-- Pattern 4: English adjective + Chinese aspect -->
      <div class="pattern-card p4">
        <div class="pattern-header">
          <div class="pattern-title">English Root + Chinese Aspect Marker</div>
          <div class="pattern-formula">EN-adj/noun + &#20102; (le) / &#19968;&#19979; (yixia)</div>
        </div>
        <div class="example-sentence">
          <div class="sentence-text">
            <span class="seg-cn">&#25105;&#20170;&#22825;&#30495;&#30340;&#24456;</span><span class="seg-en">emo</span><span class="seg-cn">&#20102;</span>
          </div>
          <div class="sentence-gloss">wo jintian zhen de hen <strong>emo</strong>-le &mdash; "I'm really feeling emo today"</div>
          <div class="sentence-analysis">English "emo" inflected with Chinese change-of-state marker &#20102;. Chinese grammar treats it as a stative verb.</div>
        </div>
        <div class="example-sentence">
          <div class="sentence-text">
            <span class="seg-cn">&#24110;&#25105;</span><span class="seg-en">update</span><span class="seg-cn">&#19968;&#19979;&#36827;&#24230;</span>
          </div>
          <div class="sentence-gloss">bang wo <strong>update</strong> yixia jindu &mdash; "Help me update on the progress"</div>
          <div class="sentence-analysis">English "update" + Chinese delimiter &#19968;&#19979; (yixia, "a bit"). Chinese verbal grammar wraps around the English root.</div>
        </div>
      </div>

      <!-- Pattern 5: Letter + Character hybrid words -->
      <div class="pattern-card p5">
        <div class="pattern-header">
          <div class="pattern-title">Letter-Character Compound Words</div>
          <div class="pattern-formula">Single letter + Chinese morpheme = new word</div>
        </div>
        <div class="example-sentence">
          <div class="sentence-text">
            <span class="seg-cn">&#22905;&#22312;</span><span class="seg-en">C</span><span class="seg-cn">&#20301;&#20986;&#36947;&#30340;</span>
          </div>
          <div class="sentence-gloss">ta zai <strong>C-wei</strong> chudao de &mdash; "She debuted in the center position"</div>
          <div class="sentence-analysis">C (English "center") + &#20301; (wei, "position") = a stable compound. Not code-switching; it's a new lexical item.</div>
        </div>
        <div class="example-sentence">
          <div class="sentence-text">
            <span class="seg-cn">&#36825;&#20010;</span><span class="seg-en">A</span><span class="seg-cn">&#36135;&#36136;&#37327;&#22826;&#22909;&#20102;</span>
          </div>
          <div class="sentence-gloss">zhe ge <strong>A-huo</strong> zhiliang tai hao le &mdash; "This knockoff is too good quality"</div>
          <div class="sentence-analysis">A (English "A-grade") + &#36135; (huo, "goods") = counterfeit luxury. Ironic use of the English letter.</div>
        </div>
      </div>

      <!-- Pattern 6: Full English phrases in Chinese context -->
      <div class="pattern-card p6">
        <div class="pattern-header">
          <div class="pattern-title">Embedded English Phrases</div>
          <div class="pattern-formula">Full English expression in Chinese syntax slot</div>
        </div>
        <div class="example-sentence">
          <div class="sentence-text">
            <span class="seg-cn">&#22905;&#23601;&#26159;&#19968;&#20010;</span><span class="seg-en">pick me</span><span class="seg-cn">&#22899;</span>
          </div>
          <div class="sentence-gloss">ta jiu shi yi ge <strong>pick me</strong> nu &mdash; "She's such a pick-me girl"</div>
          <div class="sentence-analysis">English "pick me" slots into Chinese as a modifier before &#22899; (nu, "girl"). Functions as a Chinese modifier-head compound.</div>
        </div>
      </div>
    </div>

    <!-- Insight -->
    <div class="insight">
      <div class="insight-title">Key Linguistic Insight</div>
      <div class="insight-text">These are not random English insertions. Chinese grammar <em>productively absorbs</em> English roots: attaching complements (&#20303;, &#21040;), aspect markers (&#20102;), delimiters (&#19968;&#19979;), and measure words. The English material enters Chinese syntactic slots. The reverse &mdash; Chinese grammar markers in English sentences &mdash; essentially never happens. This asymmetry reveals Chinese as the matrix language and English as the donor language in digital code-mixing.</div>
    </div>
  </div>
  <figcaption>Six code-mixing patterns showing how English letters, numbers, and Pinyin abbreviations integrate into Chinese text. Chinese grammar consistently acts as the "wrapper" that absorbs foreign material into its syntactic framework, reflecting Mandarin's role as the matrix language in digital communication.</figcaption>
</figure>
</body>
</html>
