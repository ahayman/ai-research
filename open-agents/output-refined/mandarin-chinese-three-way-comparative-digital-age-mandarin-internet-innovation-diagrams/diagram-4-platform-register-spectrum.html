<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Platform Register Spectrum: Formality Across Chinese Social Media</title>
<style>
  :root {
    --bg: #0f172a; --fg: #e2e8f0; --surface: #1e293b; --border: #334155;
    --accent: #06b6d4; --accent-glow: rgba(6,182,212,0.15);
    --rose: #f43f5e; --rose-bg: rgba(244,63,94,0.08);
    --amber: #f59e0b; --amber-bg: rgba(245,158,11,0.08);
    --emerald: #10b981; --emerald-bg: rgba(16,185,129,0.08);
    --purple: #8b5cf6; --purple-bg: rgba(139,92,246,0.08);
    --blue: #3b82f6; --blue-bg: rgba(59,130,246,0.08);
    --pink: #ec4899; --pink-bg: rgba(236,72,153,0.08);
    --muted: #64748b; --text-sec: #94a3b8;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg); color: var(--fg);
    display: flex; justify-content: center; padding: 2rem 1rem; line-height: 1.6;
  }
  figure { max-width: 1050px; width: 100%; }
  .diagram-box {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 2rem 1.5rem;
  }
  .title { text-align: center; font-size: 1.15rem; font-weight: 700; color: var(--accent); margin-bottom: 0.2rem; }
  .subtitle { text-align: center; font-size: 0.82rem; color: var(--muted); margin-bottom: 2rem; }

  /* Spectrum bar */
  .spectrum-bar {
    height: 12px; border-radius: 6px; margin: 0 0 0.5rem;
    background: linear-gradient(90deg, var(--rose) 0%, var(--amber) 25%, var(--emerald) 50%, var(--blue) 75%, var(--purple) 100%);
    position: relative;
  }
  .spectrum-labels {
    display: flex; justify-content: space-between; font-size: 0.7rem;
    color: var(--text-sec); margin-bottom: 2rem; font-weight: 600;
  }
  .spectrum-labels span:first-child { color: var(--rose); }
  .spectrum-labels span:last-child { color: var(--purple); }

  /* Platform cards */
  .platforms { display: flex; flex-direction: column; gap: 0.75rem; }

  .platform {
    display: grid; grid-template-columns: 140px 1fr; gap: 1rem;
    background: var(--bg); border: 1px solid var(--border); border-radius: 10px;
    padding: 1rem; align-items: start; border-left: 4px solid;
  }
  .platform-info { text-align: center; }
  .platform-icon { font-size: 1.8rem; margin-bottom: 0.2rem; }
  .platform-name { font-size: 0.9rem; font-weight: 700; }
  .platform-zh { font-size: 0.75rem; color: var(--text-sec); }
  .platform-users { font-size: 0.65rem; color: var(--muted); margin-top: 0.2rem; }

  .platform-details { }
  .detail-row { display: flex; gap: 0.5rem; margin-bottom: 0.4rem; font-size: 0.78rem; }
  .detail-label { color: var(--text-sec); min-width: 80px; font-weight: 600; flex-shrink: 0; }
  .detail-value { color: var(--fg); }

  .feature-tags { display: flex; flex-wrap: wrap; gap: 0.3rem; margin-top: 0.4rem; }
  .tag {
    padding: 0.15rem 0.5rem; border-radius: 9999px; font-size: 0.68rem;
    font-weight: 600; border: 1px solid;
  }

  .p-gov { border-left-color: var(--rose); }
  .p-gov .platform-name { color: var(--rose); }
  .p-gov .tag { background: var(--rose-bg); border-color: var(--rose); color: var(--rose); }

  .p-weibo { border-left-color: var(--amber); }
  .p-weibo .platform-name { color: var(--amber); }
  .p-weibo .tag { background: var(--amber-bg); border-color: var(--amber); color: var(--amber); }

  .p-wechat { border-left-color: var(--emerald); }
  .p-wechat .platform-name { color: var(--emerald); }
  .p-wechat .tag { background: var(--emerald-bg); border-color: var(--emerald); color: var(--emerald); }

  .p-douyin { border-left-color: var(--blue); }
  .p-douyin .platform-name { color: var(--blue); }
  .p-douyin .tag { background: var(--blue-bg); border-color: var(--blue); color: var(--blue); }

  .p-bilibili { border-left-color: var(--purple); }
  .p-bilibili .platform-name { color: var(--purple); }
  .p-bilibili .tag { background: var(--purple-bg); border-color: var(--purple); color: var(--purple); }

  .p-xhs { border-left-color: var(--pink); }
  .p-xhs .platform-name { color: var(--pink); }
  .p-xhs .tag { background: var(--pink-bg); border-color: var(--pink); color: var(--pink); }

  /* Sample text */
  .sample {
    margin-top: 0.5rem; padding: 0.5rem 0.7rem;
    background: var(--surface); border: 1px solid var(--border); border-radius: 6px;
    font-size: 0.75rem; color: var(--text-sec);
  }
  .sample-label { font-size: 0.65rem; font-weight: 600; color: var(--muted); margin-bottom: 0.2rem; text-transform: uppercase; letter-spacing: 0.06em; }
  .sample-text { font-style: italic; }

  figcaption {
    text-align: center; margin-top: 1.25rem; font-size: 0.82rem;
    color: var(--muted); font-style: italic; padding: 0 1rem; line-height: 1.5;
  }

  @media (max-width: 600px) {
    .platform { grid-template-columns: 1fr; }
    .platform-info { text-align: left; display: flex; gap: 0.75rem; align-items: center; }
    .detail-row { flex-direction: column; gap: 0.1rem; }
  }
</style>
</head>
<body>
<figure>
  <div class="diagram-box">
    <div class="title">Platform Register Spectrum</div>
    <div class="subtitle">How formality, vocabulary, and communication style vary across Chinese digital platforms</div>

    <div class="spectrum-bar"></div>
    <div class="spectrum-labels">
      <span>FORMAL / INSTITUTIONAL</span>
      <span>INFORMAL / SUBCULTURAL</span>
    </div>

    <div class="platforms">
      <!-- Government Weibo -->
      <div class="platform p-gov">
        <div class="platform-info">
          <div class="platform-icon">&#127987;</div>
          <div>
            <div class="platform-name">Gov Weibo</div>
            <div class="platform-zh">&#25919;&#21153;&#24494;&#21338;</div>
            <div class="platform-users">Official accounts</div>
          </div>
        </div>
        <div class="platform-details">
          <div class="detail-row"><span class="detail-label">Register:</span><span class="detail-value">Formal, standardized Mandarin. Follows National Language Commission norms.</span></div>
          <div class="detail-row"><span class="detail-label">Slang level:</span><span class="detail-value">Near zero. Occasional official incorporation of trending terms.</span></div>
          <div class="feature-tags">
            <span class="tag">Standard grammar</span>
            <span class="tag">No code-mixing</span>
            <span class="tag">Institutional voice</span>
          </div>
        </div>
      </div>

      <!-- Personal Weibo -->
      <div class="platform p-weibo">
        <div class="platform-info">
          <div class="platform-icon">&#128172;</div>
          <div>
            <div class="platform-name">Weibo</div>
            <div class="platform-zh">&#24494;&#21338; weibo</div>
            <div class="platform-users">~580M MAU</div>
          </div>
        </div>
        <div class="platform-details">
          <div class="detail-row"><span class="detail-label">Register:</span><span class="detail-value">Public-facing, curated. Mix of formal and casual depending on account type.</span></div>
          <div class="detail-row"><span class="detail-label">Slang level:</span><span class="detail-value">Moderate-high. Hot search (#&#28909;&#25628;) topics drive rapid vocabulary creation.</span></div>
          <div class="feature-tags">
            <span class="tag">Hashtag culture</span>
            <span class="tag">Viral neologisms</span>
            <span class="tag">Celebrity register</span>
            <span class="tag">Censorship-aware</span>
          </div>
          <div class="sample">
            <div class="sample-label">Typical language</div>
            <div class="sample-text">"&#20170;&#22825;&#30340;&#28909;&#25628;&#20063;&#22826;&#31163;&#35889;&#20102;&#21543;&#65281;YYDS" &mdash; mixing standard + internet slang + Pinyin acronym</div>
          </div>
        </div>
      </div>

      <!-- WeChat -->
      <div class="platform p-wechat">
        <div class="platform-info">
          <div class="platform-icon">&#128241;</div>
          <div>
            <div class="platform-name">WeChat</div>
            <div class="platform-zh">&#24494;&#20449; weixin</div>
            <div class="platform-users">~1.34B MAU</div>
          </div>
        </div>
        <div class="platform-details">
          <div class="detail-row"><span class="detail-label">Register:</span><span class="detail-value">Semi-private. Moments = curated public self. Group chats = most informal text register.</span></div>
          <div class="detail-row"><span class="detail-label">Slang level:</span><span class="detail-value">Varies by context. Voice messages bypass typing entirely. Sticker packs convey tone.</span></div>
          <div class="feature-tags">
            <span class="tag">Voice messages</span>
            <span class="tag">Red envelopes &#32418;&#21253;</span>
            <span class="tag">Sticker packs</span>
            <span class="tag">Emoji generational gap</span>
          </div>
          <div class="sample">
            <div class="sample-label">Generational split</div>
            <div class="sample-text">&#128578; = "I'm happy" (parents) vs. "I'm annoyed / passive-aggressive" (youth)</div>
          </div>
        </div>
      </div>

      <!-- Douyin -->
      <div class="platform p-douyin">
        <div class="platform-info">
          <div class="platform-icon">&#127909;</div>
          <div>
            <div class="platform-name">Douyin</div>
            <div class="platform-zh">&#25238;&#38899; douyin</div>
            <div class="platform-users">~750M DAU</div>
          </div>
        </div>
        <div class="platform-details">
          <div class="detail-row"><span class="detail-label">Register:</span><span class="detail-value">Ultra-short-form. Sound-based virality. Spoken catchphrases become text memes.</span></div>
          <div class="detail-row"><span class="detail-label">Slang level:</span><span class="detail-value">Very high. Algorithm drives rapid vocabulary diffusion. Audio transcription creates new written forms.</span></div>
          <div class="feature-tags">
            <span class="tag">Audio-first memes</span>
            <span class="tag">Comment flooding</span>
            <span class="tag">"&#31532;&#19968;" (first!) culture</span>
            <span class="tag">Transcription slang</span>
          </div>
          <div class="sample">
            <div class="sample-label">Typical language</div>
            <div class="sample-text">Viral audio catchphrase &rarr; gets transcribed &rarr; transcription itself becomes meme &rarr; spreads to other platforms</div>
          </div>
        </div>
      </div>

      <!-- Bilibili -->
      <div class="platform p-bilibili">
        <div class="platform-info">
          <div class="platform-icon">&#127918;</div>
          <div>
            <div class="platform-name">Bilibili</div>
            <div class="platform-zh">B&#31449;</div>
            <div class="platform-users">~340M MAU</div>
          </div>
        </div>
        <div class="platform-details">
          <div class="detail-row"><span class="detail-label">Register:</span><span class="detail-value">Youth/subculture. Anime + gaming vocabulary. Dense Japanese code-mixing.</span></div>
          <div class="detail-row"><span class="detail-label">Slang level:</span><span class="detail-value">Extreme. Danmaku (&#24377;&#24149;) creates real-time communal text overlay. Platform-native jargon.</span></div>
          <div class="feature-tags">
            <span class="tag">&#24377;&#24149; danmaku</span>
            <span class="tag">UP&#20027; creators</span>
            <span class="tag">Japanese mixing</span>
            <span class="tag">Otaku register</span>
          </div>
          <div class="sample">
            <div class="sample-label">Danmaku style</div>
            <div class="sample-text">"666" "&#21069;&#26041;&#39640;&#33021;" "&#31505;&#27515;&#20102;www" &mdash; short bursts scrolling across video in real time</div>
          </div>
        </div>
      </div>

      <!-- Xiaohongshu -->
      <div class="platform p-xhs">
        <div class="platform-info">
          <div class="platform-icon">&#128214;</div>
          <div>
            <div class="platform-name">Xiaohongshu</div>
            <div class="platform-zh">&#23567;&#32418;&#20070;</div>
            <div class="platform-users">~300M MAU</div>
          </div>
        </div>
        <div class="platform-details">
          <div class="detail-row"><span class="detail-label">Register:</span><span class="detail-value">Lifestyle/consumer. "Little essay" format. Heavy emoji as section dividers.</span></div>
          <div class="detail-row"><span class="detail-label">Slang level:</span><span class="detail-value">Moderate. Euphemistic commercial language. Strongest female-skewing register online.</span></div>
          <div class="feature-tags">
            <span class="tag">&#23567;&#20316;&#25991; "little essays"</span>
            <span class="tag">Emoji dividers</span>
            <span class="tag">Brand euphemisms</span>
            <span class="tag">Aesthetic register</span>
          </div>
          <div class="sample">
            <div class="sample-label">Typical post opening</div>
            <div class="sample-text">&#128293;&#128293;&#128293; &#22993;&#23064;&#20204;&#30475;&#36807;&#26469;&#65281;&#36825;&#20010;&#30495;&#30340;&#32477;&#20102; &#10024;&#10024; &mdash; emoji-heavy, exclamatory, personal address</div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <figcaption>Six distinct registers across Chinese digital platforms, from institutional government accounts to subcultural communities. Each platform has developed its own linguistic norms, vocabulary, and communication conventions. This level of platform-specific register variation has no precise English parallel, partly because China's internet ecosystem is largely self-contained.</figcaption>
</figure>
</body>
</html>
