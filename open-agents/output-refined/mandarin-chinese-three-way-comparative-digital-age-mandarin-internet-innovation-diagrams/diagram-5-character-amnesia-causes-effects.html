<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Character Amnesia: Causes, Mechanisms, and Effects</title>
<style>
  :root {
    --bg: #0f172a; --fg: #e2e8f0; --surface: #1e293b; --border: #334155;
    --accent: #06b6d4; --accent-glow: rgba(6,182,212,0.15);
    --rose: #f43f5e; --rose-bg: rgba(244,63,94,0.1);
    --amber: #f59e0b; --amber-bg: rgba(245,158,11,0.1);
    --emerald: #10b981; --emerald-bg: rgba(16,185,129,0.1);
    --purple: #8b5cf6; --purple-bg: rgba(139,92,246,0.1);
    --blue: #3b82f6; --blue-bg: rgba(59,130,246,0.1);
    --muted: #64748b; --text-sec: #94a3b8;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg); color: var(--fg);
    display: flex; justify-content: center; padding: 2rem 1rem; line-height: 1.6;
  }
  figure { max-width: 1000px; width: 100%; }
  .diagram-box {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 2rem 1.5rem;
  }
  .title { text-align: center; font-size: 1.15rem; font-weight: 700; color: var(--accent); margin-bottom: 0.2rem; }
  .subtitle { text-align: center; font-size: 0.82rem; color: var(--muted); margin-bottom: 2rem; }

  /* Central flow */
  .flow {
    display: flex; flex-direction: column; align-items: center; gap: 1rem;
  }

  .cause-row {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.75rem; width: 100%;
  }
  .cause-box {
    background: var(--blue-bg); border: 2px solid var(--blue); border-radius: 10px;
    padding: 0.85rem; text-align: center;
  }
  .cause-icon { font-size: 1.5rem; margin-bottom: 0.3rem; }
  .cause-title { font-size: 0.85rem; font-weight: 700; color: var(--blue); }
  .cause-detail { font-size: 0.72rem; color: var(--text-sec); margin-top: 0.2rem; }

  .flow-arrow {
    font-size: 2rem; color: var(--muted); line-height: 1;
  }

  /* Mechanism box */
  .mechanism-box {
    background: var(--amber-bg); border: 2px solid var(--amber); border-radius: 12px;
    padding: 1.25rem; width: 100%; max-width: 700px; text-align: center;
  }
  .mech-title {
    font-size: 1rem; font-weight: 700; color: var(--amber); margin-bottom: 0.5rem;
  }
  .mech-zh { font-size: 1.4rem; font-weight: 700; color: var(--fg); margin-bottom: 0.3rem; }
  .mech-pinyin { font-size: 0.82rem; color: var(--text-sec); font-style: italic; margin-bottom: 0.5rem; }
  .mech-explanation { font-size: 0.82rem; color: var(--text-sec); }

  /* Skills comparison */
  .skills-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; width: 100%;
    max-width: 700px;
  }
  .skill-card {
    border-radius: 8px; padding: 0.7rem; display: flex; align-items: center; gap: 0.6rem;
    border: 1px solid;
  }
  .skill-preserved { background: var(--emerald-bg); border-color: var(--emerald); }
  .skill-degraded { background: var(--rose-bg); border-color: var(--rose); }
  .skill-icon { font-size: 1.2rem; flex-shrink: 0; }
  .skill-text { font-size: 0.78rem; }
  .skill-label { font-weight: 700; }
  .skill-preserved .skill-label { color: var(--emerald); }
  .skill-degraded .skill-label { color: var(--rose); }
  .skill-desc { color: var(--text-sec); font-size: 0.72rem; }

  /* Effects row */
  .effects-row {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.75rem; width: 100%;
  }
  .effect-box {
    background: var(--purple-bg); border: 2px solid var(--purple); border-radius: 10px;
    padding: 0.85rem; text-align: center;
  }
  .effect-title { font-size: 0.82rem; font-weight: 700; color: var(--purple); }
  .effect-detail { font-size: 0.72rem; color: var(--text-sec); margin-top: 0.2rem; }

  /* Stats bar */
  .stats-bar {
    display: flex; gap: 0.75rem; width: 100%; justify-content: center;
    flex-wrap: wrap; margin-top: 0.5rem;
  }
  .stat {
    background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
    padding: 0.75rem 1rem; text-align: center; min-width: 140px;
  }
  .stat-value { font-size: 1.4rem; font-weight: 800; color: var(--rose); }
  .stat-label { font-size: 0.68rem; color: var(--text-sec); margin-top: 0.15rem; }

  /* Response section */
  .response-section {
    width: 100%; margin-top: 0.5rem; display: grid;
    grid-template-columns: 1fr 1fr; gap: 0.75rem;
  }
  .response-card {
    background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
    padding: 0.85rem;
  }
  .response-title { font-size: 0.78rem; font-weight: 700; color: var(--emerald); margin-bottom: 0.4rem; }
  .response-item { font-size: 0.72rem; color: var(--text-sec); margin-bottom: 0.2rem; padding-left: 0.8rem; }
  .response-item::before { content: "\2022"; margin-left: -0.8rem; margin-right: 0.3rem; color: var(--emerald); }

  figcaption {
    text-align: center; margin-top: 1.25rem; font-size: 0.82rem;
    color: var(--muted); font-style: italic; padding: 0 1rem; line-height: 1.5;
  }

  @media (max-width: 700px) {
    .cause-row, .effects-row { grid-template-columns: 1fr; }
    .skills-grid { grid-template-columns: 1fr; }
    .response-section { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<figure>
  <div class="diagram-box">
    <div class="title">Character Amnesia: &#25552;&#31508;&#24536;&#23383;</div>
    <div class="subtitle">"Raise the pen, forget the character" &mdash; how Pinyin input is reshaping the relationship between reading and writing</div>

    <div class="flow">
      <!-- Causes -->
      <div class="cause-row">
        <div class="cause-box">
          <div class="cause-icon">&#9000;</div>
          <div class="cause-title">Pinyin-Based Input</div>
          <div class="cause-detail">Near-universal adoption of phonological typing. No stroke production required.</div>
        </div>
        <div class="cause-box">
          <div class="cause-icon">&#128241;</div>
          <div class="cause-title">Smartphone Dominance</div>
          <div class="cause-detail">Most writing now happens on phones. Pen-and-paper usage declining sharply.</div>
        </div>
        <div class="cause-box">
          <div class="cause-icon">&#129302;</div>
          <div class="cause-title">Predictive Algorithms</div>
          <div class="cause-detail">Full-sentence prediction reduces even the need for conscious character selection.</div>
        </div>
      </div>

      <div class="flow-arrow">&darr;</div>

      <!-- Central phenomenon -->
      <div class="mechanism-box">
        <div class="mech-title">The Core Dissociation</div>
        <div class="mech-zh">&#25552;&#31508;&#24536;&#23383;</div>
        <div class="mech-pinyin">tibi wangzi &mdash; "raise pen, forget character"</div>
        <div class="mech-explanation">Speakers can <strong>recognize</strong> characters (reading) but cannot <strong>produce</strong> them from memory (writing). Recognition and recall have become decoupled.</div>
      </div>

      <div class="flow-arrow">&darr;</div>

      <!-- Skills preserved vs degraded -->
      <div class="skills-grid">
        <div class="skill-card skill-preserved">
          <div class="skill-icon">&#10003;</div>
          <div class="skill-text">
            <div class="skill-label">Preserved: Recognition</div>
            <div class="skill-desc">Can read characters in context, select correct candidate from IME list</div>
          </div>
        </div>
        <div class="skill-card skill-degraded">
          <div class="skill-icon">&#10007;</div>
          <div class="skill-text">
            <div class="skill-label">Degraded: Stroke Recall</div>
            <div class="skill-desc">Cannot reproduce exact stroke sequence from memory</div>
          </div>
        </div>
        <div class="skill-card skill-preserved">
          <div class="skill-icon">&#10003;</div>
          <div class="skill-text">
            <div class="skill-label">Preserved: Pronunciation</div>
            <div class="skill-desc">Phonological knowledge strong (required for Pinyin input)</div>
          </div>
        </div>
        <div class="skill-card skill-degraded">
          <div class="skill-icon">&#10007;</div>
          <div class="skill-text">
            <div class="skill-label">Degraded: Component Detail</div>
            <div class="skill-desc">Fuzzy on exact radicals, stroke count, fine structural details</div>
          </div>
        </div>
        <div class="skill-card skill-preserved">
          <div class="skill-icon">&#10003;</div>
          <div class="skill-text">
            <div class="skill-label">Preserved: Meaning</div>
            <div class="skill-desc">Semantic knowledge intact; can identify and use correctly in context</div>
          </div>
        </div>
        <div class="skill-card skill-degraded">
          <div class="skill-icon">&#10007;</div>
          <div class="skill-text">
            <div class="skill-label">Degraded: Motor Memory</div>
            <div class="skill-desc">Handwriting automaticity lost for infrequent characters</div>
          </div>
        </div>
      </div>

      <div class="flow-arrow">&darr;</div>

      <!-- Statistics -->
      <div class="stats-bar">
        <div class="stat">
          <div class="stat-value">94%</div>
          <div class="stat-label">Report experiencing<br>character amnesia (CCTV, 2013)</div>
        </div>
        <div class="stat">
          <div class="stat-value">83%</div>
          <div class="stat-label">Difficulty writing<br>by hand (China Youth Daily)</div>
        </div>
        <div class="stat">
          <div class="stat-value" style="color:var(--amber);">Most affected</div>
          <div class="stat-label">Low-frequency chars<br>with many strokes</div>
        </div>
      </div>

      <div class="flow-arrow">&darr;</div>

      <!-- Effects -->
      <div class="effects-row">
        <div class="effect-box">
          <div class="effect-title">Cultural Anxiety</div>
          <div class="effect-detail">"Losing" characters seen as losing cultural identity. Public concern.</div>
        </div>
        <div class="effect-box">
          <div class="effect-title">Educational Pressure</div>
          <div class="effect-detail">Schools maintain handwriting requirements. TV competitions (&#21548;&#20889;&#22823;&#20250;) launched.</div>
        </div>
        <div class="effect-box">
          <div class="effect-title">Functional Shift</div>
          <div class="effect-detail">Writing system moving from productive to receptive skill. Reading persists; recall narrows.</div>
        </div>
      </div>

      <!-- Government/institutional responses -->
      <div class="response-section">
        <div class="response-card">
          <div class="response-title">Government Responses</div>
          <div class="response-item">Character Standard List (&#36890;&#29992;&#35268;&#33539;&#27721;&#23383;&#34920;, 2013): 8,105 characters</div>
          <div class="response-item">Chinese Character Dictation Conference on CCTV (2013&#8211;present)</div>
          <div class="response-item">Mandatory handwriting instruction maintained in schools</div>
          <div class="response-item">National Language Commission monitors and publishes guidance</div>
        </div>
        <div class="response-card">
          <div class="response-title" style="color:var(--amber);">Three-Way Comparison</div>
          <div class="response-item"><strong style="color:var(--rose);">PRC:</strong> Highest risk. Pinyin input universal. Simplified characters = fewer strokes but same issue.</div>
          <div class="response-item"><strong style="color:var(--amber);">Taiwan:</strong> Lower risk. Cangjie/structure-based input reinforces component knowledge. Zhuyin is phonological but non-Roman.</div>
          <div class="response-item"><strong style="color:var(--accent);">English:</strong> No parallel. Typing IS spelling. Autocorrect erosion is orders of magnitude smaller.</div>
        </div>
      </div>
    </div>
  </div>
  <figcaption>Character amnesia is the most significant cognitive side effect of digital writing in Chinese. It represents a unique dissociation between recognition and recall that has no structural equivalent in alphabetic writing systems, where typing reinforces the same letter sequences used in handwriting.</figcaption>
</figure>
</body>
</html>
