<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Synthesis Spectrum</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --accent: #4361ee; --accent-light: #e8edff;
    --english: #8b5cf6; --english-bg: #ede9fe;
    --french: #3b82f6; --french-bg: #dbeafe;
    --ancestor: #f59e0b; --ancestor-bg: #fef3c7;
    --muted: #6c757d; --caption-bg: #f8f9fa;
    --analytic: #22c55e; --synthetic: #ef4444; --poly: #ec4899;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a; --fg: #e8e8f0; --surface: #1a1a2e; --border: #2d2d44;
      --accent: #6b8aff; --accent-light: #1e2a4a;
      --english: #a78bfa; --english-bg: #2e1a5e;
      --french: #60a5fa; --french-bg: #1e3a5f;
      --ancestor: #fbbf24; --ancestor-bg: #78350f;
      --muted: #9a9ab0; --caption-bg: #1a1a2e;
      --analytic: #4ade80; --synthetic: #f87171; --poly: #f472b6;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg); color: var(--fg);
    display: flex; justify-content: center; padding: 2rem 1rem; line-height: 1.6;
  }
  figure { max-width: 1100px; width: 100%; }
  .diagram-container {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 1.5rem 1rem; overflow-x: auto;
  }
  figcaption {
    text-align: center; margin-top: 1.5rem; padding: 1rem 1.5rem;
    background: var(--caption-bg); border-radius: 8px; border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  svg { display: block; margin: 0 auto; }
  .title-text { font: bold 15px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
  .subtitle-text { font: 11px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
  .label { font: 12px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
  .label-sm { font: 10px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
  .label-bold { font: bold 12px 'Segoe UI', system-ui, sans-serif; }
  .marker-label { font: bold 13px 'Segoe UI', system-ui, sans-serif; }
  .example { font: italic 11px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
</style>
</head>
<body>
<figure>
  <div class="diagram-container">
    <svg viewBox="0 0 1060 520" xmlns="http://www.w3.org/2000/svg" style="min-width:780px;">
      <defs>
        <linearGradient id="spectrumGrad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:var(--analytic);stop-opacity:0.3"/>
          <stop offset="50%" style="stop-color:var(--accent);stop-opacity:0.15"/>
          <stop offset="100%" style="stop-color:var(--poly);stop-opacity:0.3"/>
        </linearGradient>
        <marker id="arrowDown" markerWidth="8" markerHeight="6" refX="4" refY="6" orient="auto">
          <polygon points="0 0, 8 0, 4 6" fill="var(--ancestor)"/>
        </marker>
      </defs>

      <text x="530" y="28" text-anchor="middle" class="title-text" style="font-size:16px;">The Analytic-Synthetic Spectrum</text>
      <text x="530" y="46" text-anchor="middle" class="subtitle-text">Where French and English sit -- and how they got there</text>

      <!-- Spectrum bar -->
      <rect x="50" y="80" width="960" height="50" rx="25" fill="url(#spectrumGrad)" stroke="var(--border)" stroke-width="1"/>

      <!-- Zone labels -->
      <text x="130" y="75" text-anchor="middle" class="label-bold" fill="var(--analytic)">ISOLATING</text>
      <text x="130" y="145" text-anchor="middle" class="label-sm">1 morpheme/word</text>

      <text x="340" y="75" text-anchor="middle" class="label-bold" fill="var(--english)">ANALYTIC</text>
      <text x="340" y="145" text-anchor="middle" class="label-sm">~1.5 morphemes/word</text>

      <text x="570" y="75" text-anchor="middle" class="label-bold" fill="var(--french)">FUSIONAL</text>
      <text x="570" y="145" text-anchor="middle" class="label-sm">~2.5 morphemes/word</text>

      <text x="780" y="75" text-anchor="middle" class="label-bold" fill="var(--synthetic)">SYNTHETIC</text>
      <text x="780" y="145" text-anchor="middle" class="label-sm">~3-4 morphemes/word</text>

      <text x="940" y="75" text-anchor="middle" class="label-bold" fill="var(--poly)">POLYSYNTHETIC</text>
      <text x="940" y="145" text-anchor="middle" class="label-sm">5+ morphemes/word</text>

      <!-- Divider marks -->
      <line x1="230" y1="80" x2="230" y2="130" stroke="var(--border)" stroke-width="1" stroke-dasharray="3,3"/>
      <line x1="450" y1="80" x2="450" y2="130" stroke="var(--border)" stroke-width="1" stroke-dasharray="3,3"/>
      <line x1="700" y1="80" x2="700" y2="130" stroke="var(--border)" stroke-width="1" stroke-dasharray="3,3"/>
      <line x1="860" y1="80" x2="860" y2="130" stroke="var(--border)" stroke-width="1" stroke-dasharray="3,3"/>

      <!-- Language markers on spectrum -->
      <!-- Mandarin -->
      <circle cx="130" cy="105" r="6" fill="var(--analytic)" stroke="var(--fg)" stroke-width="1.5"/>
      <text x="130" y="170" text-anchor="middle" class="label-sm">Mandarin</text>
      <text x="130" y="182" text-anchor="middle" class="example">"ta hui shuo" (3 words)</text>
      <text x="130" y="194" text-anchor="middle" class="example">= "s/he can speak"</text>

      <!-- English -->
      <circle cx="340" cy="105" r="12" fill="var(--english-bg)" stroke="var(--english)" stroke-width="3"/>
      <text x="340" y="109" text-anchor="middle" class="marker-label" fill="var(--english)">EN</text>
      <text x="340" y="170" text-anchor="middle" class="label-bold" fill="var(--english)">Modern English</text>
      <text x="340" y="184" text-anchor="middle" class="example">"they would speak"</text>
      <text x="340" y="196" text-anchor="middle" class="example">3 words, 5 verb forms max</text>

      <!-- French -->
      <circle cx="570" cy="105" r="12" fill="var(--french-bg)" stroke="var(--french)" stroke-width="3"/>
      <text x="570" y="109" text-anchor="middle" class="marker-label" fill="var(--french)">FR</text>
      <text x="570" y="170" text-anchor="middle" class="label-bold" fill="var(--french)">Modern French</text>
      <text x="570" y="184" text-anchor="middle" class="example">"ils parleraient"</text>
      <text x="570" y="196" text-anchor="middle" class="example">1 word, 50+ verb forms</text>

      <!-- Latin -->
      <circle cx="730" cy="105" r="6" fill="var(--synthetic)" stroke="var(--fg)" stroke-width="1.5"/>
      <text x="730" y="170" text-anchor="middle" class="label-sm">Latin</text>
      <text x="730" y="182" text-anchor="middle" class="example">"loquerentur"</text>
      <text x="730" y="194" text-anchor="middle" class="example">= "they would speak"</text>

      <!-- Russian -->
      <circle cx="810" cy="105" r="6" fill="var(--synthetic)" stroke="var(--fg)" stroke-width="1.5"/>
      <text x="810" y="170" text-anchor="middle" class="label-sm">Russian</text>

      <!-- Mohawk -->
      <circle cx="940" cy="105" r="6" fill="var(--poly)" stroke="var(--fg)" stroke-width="1.5"/>
      <text x="940" y="170" text-anchor="middle" class="label-sm">Mohawk</text>
      <text x="940" y="182" text-anchor="middle" class="example">"washakotya'tawitsherahetkvhkwe"</text>
      <text x="940" y="194" text-anchor="middle" class="example">= full clause in 1 word</text>

      <!-- Historical drift arrows -->
      <g transform="translate(0, 230)">
        <text x="530" y="0" text-anchor="middle" class="title-text" fill="var(--ancestor)">Historical Drift: Both Languages Moved Toward Analytic</text>

        <!-- Proto-Germanic to English -->
        <rect x="80" y="25" width="180" height="55" rx="8" fill="var(--ancestor-bg)" stroke="var(--ancestor)" stroke-width="1.5"/>
        <text x="170" y="47" text-anchor="middle" class="label-bold" fill="var(--ancestor)">Proto-Germanic</text>
        <text x="170" y="63" text-anchor="middle" class="label-sm">4 cases, 3 genders</text>
        <text x="170" y="75" text-anchor="middle" class="label-sm">Strong/weak verb classes</text>

        <path d="M 270,55 L 360,55" fill="none" stroke="var(--ancestor)" stroke-width="2" marker-end="url(#arrowDown)"/>
        <text x="315" y="48" text-anchor="middle" class="label-sm" fill="var(--ancestor)">lost cases,</text>
        <text x="315" y="60" text-anchor="middle" class="label-sm" fill="var(--ancestor)">lost gender</text>

        <rect x="370" y="25" width="140" height="55" rx="8" fill="var(--english-bg)" stroke="var(--english)" stroke-width="2"/>
        <text x="440" y="47" text-anchor="middle" class="label-bold" fill="var(--english)">Mod. English</text>
        <text x="440" y="63" text-anchor="middle" class="label-sm">0 cases, 0 genders</text>
        <text x="440" y="75" text-anchor="middle" class="label-sm">5 verb forms max</text>

        <!-- Latin to French -->
        <rect x="570" y="25" width="180" height="55" rx="8" fill="var(--ancestor-bg)" stroke="var(--ancestor)" stroke-width="1.5"/>
        <text x="660" y="47" text-anchor="middle" class="label-bold" fill="var(--ancestor)">Latin</text>
        <text x="660" y="63" text-anchor="middle" class="label-sm">6 cases, 3 genders</text>
        <text x="660" y="75" text-anchor="middle" class="label-sm">100+ verb forms</text>

        <path d="M 760,55 L 850,55" fill="none" stroke="var(--ancestor)" stroke-width="2" marker-end="url(#arrowDown)"/>
        <text x="805" y="48" text-anchor="middle" class="label-sm" fill="var(--ancestor)">lost cases,</text>
        <text x="805" y="60" text-anchor="middle" class="label-sm" fill="var(--ancestor)">lost 1 gender</text>

        <rect x="860" y="25" width="140" height="55" rx="8" fill="var(--french-bg)" stroke="var(--french)" stroke-width="2"/>
        <text x="930" y="47" text-anchor="middle" class="label-bold" fill="var(--french)">Mod. French</text>
        <text x="930" y="63" text-anchor="middle" class="label-sm">0 cases, 2 genders</text>
        <text x="930" y="75" text-anchor="middle" class="label-sm">50+ verb forms</text>
      </g>

      <!-- Key insight box -->
      <g transform="translate(50, 350)">
        <rect x="0" y="0" width="960" height="80" rx="10" fill="var(--accent-light)" stroke="var(--accent)" stroke-width="1.5"/>
        <text x="480" y="22" text-anchor="middle" class="title-text" fill="var(--accent)" style="font-size:13px;">THE KEY PATTERN</text>
        <text x="480" y="42" text-anchor="middle" class="label" fill="var(--fg)">Both languages drifted from synthetic ancestors toward more analytic structures.</text>
        <text x="480" y="58" text-anchor="middle" class="label" fill="var(--fg)">English went FURTHER: lost all cases and genders, compensated with rigid word order + auxiliary verbs.</text>
        <text x="480" y="74" text-anchor="middle" class="label-bold" fill="var(--accent)">French stayed in the MIDDLE: kept gender, kept rich verb morphology, but lost cases like English.</text>
      </g>

      <!-- Encoding comparison -->
      <g transform="translate(50, 445)">
        <text x="480" y="0" text-anchor="middle" class="subtitle-text">Same meaning, different strategies:</text>
        <text x="200" y="22" text-anchor="middle" class="label-bold" fill="var(--french)">"parleraient" = 1 word, 6 pieces of info</text>
        <text x="200" y="38" text-anchor="middle" class="label-sm">(root + class + conditional + imperfect + 3rd + plural)</text>
        <text x="730" y="22" text-anchor="middle" class="label-bold" fill="var(--english)">"they would speak" = 3 words, same 6 pieces</text>
        <text x="730" y="38" text-anchor="middle" class="label-sm">(pronoun=3pl + modal=conditional + verb=root)</text>
        <text x="480" y="56" text-anchor="middle" class="label-bold" fill="var(--accent)">Fewer words, heavier words (FR) vs. More words, lighter words (EN)</text>
      </g>
    </svg>
  </div>

  <figcaption>
    <h2>Figure 2 -- The Analytic-Synthetic Spectrum</h2>
    <p>French and English sit at different points on the analytic-synthetic continuum. English is one of the most analytic Indo-European languages; French is moderately synthetic (fusional). Both drifted from more synthetic ancestors (Proto-Germanic and Latin), but English went further. This single positional difference on the spectrum predicts the majority of specific grammatical divergences between the two languages.</p>
  </figcaption>
</figure>
</body>
</html>
