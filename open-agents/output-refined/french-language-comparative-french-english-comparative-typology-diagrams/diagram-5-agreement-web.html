<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agreement Web Comparison</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --accent: #4361ee; --accent-light: #e8edff;
    --french: #3b82f6; --french-bg: #dbeafe;
    --english: #8b5cf6; --english-bg: #ede9fe;
    --agree-gen: #ef4444; --agree-num: #22c55e; --agree-both: #f59e0b;
    --controller: #ec4899; --controller-bg: #fce7f3;
    --muted: #6c757d; --caption-bg: #f8f9fa;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a; --fg: #e8e8f0; --surface: #1a1a2e; --border: #2d2d44;
      --accent: #6b8aff; --accent-light: #1e2a4a;
      --french: #60a5fa; --french-bg: #1e3a5f;
      --english: #a78bfa; --english-bg: #2e1a5e;
      --agree-gen: #f87171; --agree-num: #4ade80; --agree-both: #fbbf24;
      --controller: #f472b6; --controller-bg: #5c1a3a;
      --muted: #9a9ab0; --caption-bg: #1a1a2e;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg); color: var(--fg);
    display: flex; justify-content: center; padding: 2rem 1rem; line-height: 1.6;
  }
  figure { max-width: 1100px; width: 100%; }
  .diagram-container {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 1.5rem 1rem; overflow-x: auto;
  }
  figcaption {
    text-align: center; margin-top: 1.5rem; padding: 1rem 1.5rem;
    background: var(--caption-bg); border-radius: 8px; border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  svg { display: block; margin: 0 auto; }
  .title-text { font: bold 14px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
  .label { font: 12px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
  .label-bold { font: bold 12px 'Segoe UI', system-ui, sans-serif; }
  .label-sm { font: 10px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
  .word { font: bold 20px 'Segoe UI', system-ui, sans-serif; }
  .word-sm { font: bold 16px 'Segoe UI', system-ui, sans-serif; }
  .legend { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; margin-top: 1rem; font-size: 0.82rem; color: var(--muted); }
  .legend-item { display: flex; align-items: center; gap: 0.4rem; }
  .legend-swatch { width: 14px; height: 14px; border-radius: 3px; border: 1px solid var(--border); }
</style>
</head>
<body>
<figure>
  <div class="diagram-container">
    <svg viewBox="0 0 1060 650" xmlns="http://www.w3.org/2000/svg" style="min-width:780px;">
      <text x="530" y="28" text-anchor="middle" class="title-text" style="font-size:16px;">Agreement Web: French vs. English</text>
      <text x="530" y="46" text-anchor="middle" class="label-sm" style="font-size:11px;fill:var(--muted);">How gender and number propagate through a sentence (or don't)</text>

      <!-- ========== FRENCH SECTION ========== -->
      <g transform="translate(20, 70)">
        <rect x="0" y="0" width="1020" height="260" rx="10" fill="var(--french-bg)" stroke="var(--french)" stroke-width="1.5"/>
        <text x="510" y="22" text-anchor="middle" class="title-text" fill="var(--french)">French: "Les petites filles intelligentes sont allees"</text>
        <text x="510" y="38" text-anchor="middle" class="label" fill="var(--french)">The intelligent little girls went -- 5 agreement links</text>

        <!-- Words positioned across the sentence -->
        <!-- Les -->
        <rect x="50" y="70" width="90" height="50" rx="8" fill="var(--surface)" stroke="var(--agree-both)" stroke-width="2"/>
        <text x="95" y="95" text-anchor="middle" class="word-sm" fill="var(--fg)">Les</text>
        <text x="95" y="110" text-anchor="middle" class="label-sm" fill="var(--agree-both)">f.pl. article</text>

        <!-- petites -->
        <rect x="180" y="70" width="120" height="50" rx="8" fill="var(--surface)" stroke="var(--agree-both)" stroke-width="2"/>
        <text x="240" y="95" text-anchor="middle" class="word-sm" fill="var(--fg)">petites</text>
        <text x="240" y="110" text-anchor="middle" class="label-sm" fill="var(--agree-both)">f.pl. adjective</text>

        <!-- filles (CONTROLLER) -->
        <rect x="340" y="60" width="120" height="60" rx="8" fill="var(--controller-bg)" stroke="var(--controller)" stroke-width="3"/>
        <text x="400" y="88" text-anchor="middle" class="word-sm" fill="var(--controller)">filles</text>
        <text x="400" y="105" text-anchor="middle" class="label-bold" fill="var(--controller)">CONTROLLER</text>
        <text x="400" y="115" text-anchor="middle" class="label-sm" fill="var(--controller)">fem. plural noun</text>

        <!-- intelligentes -->
        <rect x="500" y="70" width="160" height="50" rx="8" fill="var(--surface)" stroke="var(--agree-both)" stroke-width="2"/>
        <text x="580" y="95" text-anchor="middle" class="word-sm" fill="var(--fg)">intelligentes</text>
        <text x="580" y="110" text-anchor="middle" class="label-sm" fill="var(--agree-both)">f.pl. adjective</text>

        <!-- sont -->
        <rect x="700" y="70" width="80" height="50" rx="8" fill="var(--surface)" stroke="var(--agree-num)" stroke-width="2"/>
        <text x="740" y="95" text-anchor="middle" class="word-sm" fill="var(--fg)">sont</text>
        <text x="740" y="110" text-anchor="middle" class="label-sm" fill="var(--agree-num)">3rd pl. verb</text>

        <!-- allees -->
        <rect x="820" y="70" width="110" height="50" rx="8" fill="var(--surface)" stroke="var(--agree-both)" stroke-width="2"/>
        <text x="875" y="95" text-anchor="middle" class="word-sm" fill="var(--fg)">allees</text>
        <text x="875" y="110" text-anchor="middle" class="label-sm" fill="var(--agree-both)">f.pl. past part.</text>

        <!-- Agreement arcs (drawn below the words) -->
        <!-- Les -> filles -->
        <path d="M 95,125 Q 95,175 400,175 Q 400,175 400,125" fill="none" stroke="var(--agree-both)" stroke-width="2.5" stroke-dasharray="none"/>
        <text x="250" y="185" text-anchor="middle" class="label-sm" fill="var(--agree-both)">gender + number</text>

        <!-- petites -> filles -->
        <path d="M 240,125 Q 240,155 400,155 Q 400,155 400,125" fill="none" stroke="var(--agree-both)" stroke-width="2.5"/>
        <text x="320" y="160" text-anchor="middle" class="label-sm" fill="var(--agree-both)">gen + num</text>

        <!-- filles -> intelligentes -->
        <path d="M 400,125 Q 400,155 580,155 Q 580,155 580,125" fill="none" stroke="var(--agree-both)" stroke-width="2.5"/>
        <text x="490" y="160" text-anchor="middle" class="label-sm" fill="var(--agree-both)">gen + num</text>

        <!-- filles -> sont -->
        <path d="M 400,125 Q 400,195 740,195 Q 740,195 740,125" fill="none" stroke="var(--agree-num)" stroke-width="2.5"/>
        <text x="570" y="205" text-anchor="middle" class="label-sm" fill="var(--agree-num)">number (person)</text>

        <!-- filles -> allees (via etre) -->
        <path d="M 400,125 Q 400,220 875,220 Q 875,220 875,125" fill="none" stroke="var(--agree-both)" stroke-width="2.5"/>
        <text x="640" y="235" text-anchor="middle" class="label-sm" fill="var(--agree-both)">gender + number (etre verb)</text>

        <!-- Count -->
        <rect x="50" y="240" width="150" height="20" rx="5" fill="var(--agree-both)" opacity="0.3"/>
        <text x="125" y="255" text-anchor="middle" class="label-bold" fill="var(--agree-both)">5 agreement links</text>
      </g>

      <!-- ========== ENGLISH SECTION ========== -->
      <g transform="translate(20, 350)">
        <rect x="0" y="0" width="1020" height="140" rx="10" fill="var(--english-bg)" stroke="var(--english)" stroke-width="1.5"/>
        <text x="510" y="22" text-anchor="middle" class="title-text" fill="var(--english)">English: "The intelligent little girls went"</text>
        <text x="510" y="38" text-anchor="middle" class="label" fill="var(--english)">Same meaning -- 0 agreement links</text>

        <!-- Words -->
        <rect x="80" y="55" width="70" height="45" rx="8" fill="var(--surface)" stroke="var(--border)" stroke-width="1.5"/>
        <text x="115" y="80" text-anchor="middle" class="word-sm" fill="var(--fg)">The</text>
        <text x="115" y="95" text-anchor="middle" class="label-sm">invariable</text>

        <rect x="190" y="55" width="130" height="45" rx="8" fill="var(--surface)" stroke="var(--border)" stroke-width="1.5"/>
        <text x="255" y="80" text-anchor="middle" class="word-sm" fill="var(--fg)">intelligent</text>
        <text x="255" y="95" text-anchor="middle" class="label-sm">invariable</text>

        <rect x="360" y="55" width="80" height="45" rx="8" fill="var(--surface)" stroke="var(--border)" stroke-width="1.5"/>
        <text x="400" y="80" text-anchor="middle" class="word-sm" fill="var(--fg)">little</text>
        <text x="400" y="95" text-anchor="middle" class="label-sm">invariable</text>

        <rect x="480" y="55" width="80" height="45" rx="8" fill="var(--surface)" stroke="var(--border)" stroke-width="1.5"/>
        <text x="520" y="80" text-anchor="middle" class="word-sm" fill="var(--fg)">girls</text>
        <text x="520" y="95" text-anchor="middle" class="label-sm">noun (-s plural)</text>

        <rect x="600" y="55" width="80" height="45" rx="8" fill="var(--surface)" stroke="var(--border)" stroke-width="1.5"/>
        <text x="640" y="80" text-anchor="middle" class="word-sm" fill="var(--fg)">went</text>
        <text x="640" y="95" text-anchor="middle" class="label-sm">invariable</text>

        <!-- No arcs - empty space is the point -->
        <text x="510" y="125" text-anchor="middle" class="label" fill="var(--english)" style="font-style:italic;">No agreement arcs. Zero words change form based on the noun's properties.</text>
      </g>

      <!-- ========== GENDER SWAP DEMONSTRATION ========== -->
      <g transform="translate(20, 510)">
        <rect x="0" y="0" width="1020" height="115" rx="10" fill="var(--accent-light)" stroke="var(--accent)" stroke-width="1.5"/>
        <text x="510" y="20" text-anchor="middle" class="title-text" fill="var(--accent)" style="font-size:12px;">THE SWAP TEST: Change "filles" (f) to "garcons" (m) -- what changes?</text>

        <text x="30" y="48" text-anchor="start" class="label-bold" fill="var(--french)">French (5 words change):</text>
        <text x="220" y="48" text-anchor="start" class="label" fill="var(--fg)">Les petites filles intelligentes sont allees</text>
        <text x="220" y="65" text-anchor="start" class="label-bold" fill="var(--agree-gen)">Les petits garcons intelligents sont alles</text>
        <text x="220" y="80" text-anchor="start" class="label-sm" fill="var(--agree-gen)">les (same) + petits (-s not -es) + garcons + intelligents (-s not -es) + alles (-s not -es)</text>

        <text x="30" y="100" text-anchor="start" class="label-bold" fill="var(--english)">English (0 words change):</text>
        <text x="220" y="100" text-anchor="start" class="label" fill="var(--fg)">"The intelligent little girls went" -> "The intelligent little boys went" (only the noun itself changes)</text>
      </g>
    </svg>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background:var(--controller-bg);border-color:var(--controller);"></div> Agreement controller (noun)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--agree-both);opacity:0.3;border-color:var(--agree-both);"></div> Gender + number agreement</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--agree-num);opacity:0.3;border-color:var(--agree-num);"></div> Number/person agreement</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--english-bg);border-color:var(--english);"></div> No agreement (English)</div>
  </div>

  <figcaption>
    <h2>Figure 5 -- Agreement Web: French vs. English</h2>
    <p>In French, a single noun's gender and number propagate through 4-5 other words in the same sentence: articles, adjectives, verbs, and past participles must all agree. In English, zero words change form based on the noun's properties. The swap test makes this concrete: changing the noun from feminine to masculine forces 4 other French words to change form. In English, only the noun itself changes. This agreement web is the most visible, quantifiable consequence of French's greater morphological synthesis.</p>
  </figcaption>
</figure>
</body>
</html>
