<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Cascade Effect</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --accent: #4361ee; --accent-light: #e8edff;
    --root-color: #dc2626; --root-bg: #fee2e2;
    --branch1: #3b82f6; --branch1-bg: #dbeafe;
    --branch2: #22c55e; --branch2-bg: #dcfce7;
    --branch3: #8b5cf6; --branch3-bg: #ede9fe;
    --branch4: #f59e0b; --branch4-bg: #fef3c7;
    --english: #6c757d; --english-bg: #f8f9fa;
    --muted: #6c757d; --caption-bg: #f8f9fa;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a; --fg: #e8e8f0; --surface: #1a1a2e; --border: #2d2d44;
      --accent: #6b8aff; --accent-light: #1e2a4a;
      --root-color: #f87171; --root-bg: #5c1a1a;
      --branch1: #60a5fa; --branch1-bg: #1e3a5f;
      --branch2: #4ade80; --branch2-bg: #14532d;
      --branch3: #a78bfa; --branch3-bg: #2e1a5e;
      --branch4: #fbbf24; --branch4-bg: #78350f;
      --english: #9a9ab0; --english-bg: #1a1a2e;
      --muted: #9a9ab0; --caption-bg: #1a1a2e;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg); color: var(--fg);
    display: flex; justify-content: center; padding: 2rem 1rem; line-height: 1.6;
  }
  figure { max-width: 1100px; width: 100%; }
  .diagram-container {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 1.5rem 1rem; overflow-x: auto;
  }
  figcaption {
    text-align: center; margin-top: 1.5rem; padding: 1rem 1.5rem;
    background: var(--caption-bg); border-radius: 8px; border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  svg { display: block; margin: 0 auto; }
  .title-text { font: bold 14px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
  .label { font: 11px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
  .label-bold { font: bold 11px 'Segoe UI', system-ui, sans-serif; }
  .label-sm { font: 10px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
  .legend { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; margin-top: 1rem; font-size: 0.82rem; color: var(--muted); }
  .legend-item { display: flex; align-items: center; gap: 0.4rem; }
  .legend-swatch { width: 14px; height: 14px; border-radius: 3px; border: 1px solid var(--border); }
</style>
</head>
<body>
<figure>
  <div class="diagram-container">
    <svg viewBox="0 0 1060 700" xmlns="http://www.w3.org/2000/svg" style="min-width:780px;">
      <defs>
        <marker id="arr1" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="var(--branch1)"/></marker>
        <marker id="arr2" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="var(--branch2)"/></marker>
        <marker id="arr3" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="var(--branch3)"/></marker>
        <marker id="arr4" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="var(--branch4)"/></marker>
        <marker id="arrE" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="var(--english)"/></marker>
      </defs>

      <text x="530" y="28" text-anchor="middle" class="title-text" style="font-size:16px;fill:var(--fg);">The Cascade Effect: One Principle, Dozens of Consequences</text>

      <!-- ROOT NODE -->
      <rect x="310" y="50" width="440" height="50" rx="25" fill="var(--root-bg)" stroke="var(--root-color)" stroke-width="3"/>
      <text x="530" y="73" text-anchor="middle" class="title-text" fill="var(--root-color)" style="font-size:13px;">French is MORE MORPHOLOGICALLY SYNTHETIC than English</text>
      <text x="530" y="88" text-anchor="middle" class="label-sm" fill="var(--root-color)">The single macro-parameter that predicts ~80% of differences</text>

      <!-- BRANCH 1: VERB SYSTEM (left) -->
      <line x1="380" y1="100" x2="150" y2="150" stroke="var(--branch1)" stroke-width="2" marker-end="url(#arr1)"/>
      <rect x="30" y="150" width="240" height="40" rx="8" fill="var(--branch1-bg)" stroke="var(--branch1)" stroke-width="2"/>
      <text x="150" y="167" text-anchor="middle" class="label-bold" fill="var(--branch1)">MORE INFLECTION</text>
      <text x="150" y="180" text-anchor="middle" class="label-sm" fill="var(--branch1)">info packed into word forms</text>

      <!-- Branch 1 leaves -->
      <line x1="90" y1="190" x2="90" y2="215" stroke="var(--branch1)" stroke-width="1.5"/>
      <rect x="10" y="215" width="160" height="35" rx="6" fill="var(--branch1-bg)" stroke="var(--branch1)" stroke-width="1"/>
      <text x="90" y="232" text-anchor="middle" class="label-bold" fill="var(--branch1)">50+ verb forms/verb</text>
      <text x="90" y="244" text-anchor="middle" class="label-sm">parle, parles, parlait, parlera...</text>

      <line x1="90" y1="250" x2="60" y2="275" stroke="var(--branch1)" stroke-width="1"/>
      <rect x="5" y="275" width="110" height="30" rx="5" fill="var(--branch1-bg)" stroke="var(--branch1)" stroke-width="1"/>
      <text x="60" y="294" text-anchor="middle" class="label" fill="var(--branch1)">Morph. conditional</text>

      <line x1="90" y1="250" x2="150" y2="275" stroke="var(--branch1)" stroke-width="1"/>
      <rect x="120" y="275" width="110" height="30" rx="5" fill="var(--branch1-bg)" stroke="var(--branch1)" stroke-width="1"/>
      <text x="175" y="294" text-anchor="middle" class="label" fill="var(--branch1)">Productive subj.</text>

      <line x1="200" y1="190" x2="200" y2="215" stroke="var(--branch1)" stroke-width="1.5"/>
      <rect x="140" y="215" width="130" height="35" rx="6" fill="var(--branch1-bg)" stroke="var(--branch1)" stroke-width="1"/>
      <text x="205" y="232" text-anchor="middle" class="label-bold" fill="var(--branch1)">No do-support</text>
      <text x="205" y="244" text-anchor="middle" class="label-sm">verb moves, not auxiliary</text>

      <!-- BRANCH 2: AGREEMENT (center-left) -->
      <line x1="460" y1="100" x2="390" y2="150" stroke="var(--branch2)" stroke-width="2" marker-end="url(#arr2)"/>
      <rect x="290" y="150" width="200" height="40" rx="8" fill="var(--branch2-bg)" stroke="var(--branch2)" stroke-width="2"/>
      <text x="390" y="167" text-anchor="middle" class="label-bold" fill="var(--branch2)">RICH AGREEMENT</text>
      <text x="390" y="180" text-anchor="middle" class="label-sm" fill="var(--branch2)">gender + number propagation</text>

      <!-- Branch 2 leaves -->
      <line x1="340" y1="190" x2="310" y2="215" stroke="var(--branch2)" stroke-width="1.5"/>
      <rect x="245" y="215" width="130" height="35" rx="6" fill="var(--branch2-bg)" stroke="var(--branch2)" stroke-width="1"/>
      <text x="310" y="232" text-anchor="middle" class="label-bold" fill="var(--branch2)">2 genders</text>
      <text x="310" y="244" text-anchor="middle" class="label-sm">every noun: masc./fem.</text>

      <line x1="310" y1="250" x2="310" y2="275" stroke="var(--branch2)" stroke-width="1"/>
      <rect x="250" y="275" width="120" height="30" rx="5" fill="var(--branch2-bg)" stroke="var(--branch2)" stroke-width="1"/>
      <text x="310" y="294" text-anchor="middle" class="label" fill="var(--branch2)">Adj. agreement x4</text>

      <line x1="440" y1="190" x2="460" y2="215" stroke="var(--branch2)" stroke-width="1.5"/>
      <rect x="395" y="215" width="130" height="35" rx="6" fill="var(--branch2-bg)" stroke="var(--branch2)" stroke-width="1"/>
      <text x="460" y="232" text-anchor="middle" class="label-bold" fill="var(--branch2)">~11 article forms</text>
      <text x="460" y="244" text-anchor="middle" class="label-sm">le/la/les/un/une/des/du...</text>

      <line x1="460" y1="250" x2="460" y2="275" stroke="var(--branch2)" stroke-width="1"/>
      <rect x="395" y="275" width="130" height="30" rx="5" fill="var(--branch2-bg)" stroke="var(--branch2)" stroke-width="1"/>
      <text x="460" y="294" text-anchor="middle" class="label" fill="var(--branch2)">Past part. agreement</text>

      <!-- BRANCH 3: WORD-INTERNAL INFO (center-right) -->
      <line x1="600" y1="100" x2="670" y2="150" stroke="var(--branch3)" stroke-width="2" marker-end="url(#arr3)"/>
      <rect x="560" y="150" width="220" height="40" rx="8" fill="var(--branch3-bg)" stroke="var(--branch3)" stroke-width="2"/>
      <text x="670" y="167" text-anchor="middle" class="label-bold" fill="var(--branch3)">MORE WORD-INTERNAL INFO</text>
      <text x="670" y="180" text-anchor="middle" class="label-sm" fill="var(--branch3)">pronouns fuse into verb complex</text>

      <!-- Branch 3 leaves -->
      <line x1="620" y1="190" x2="600" y2="215" stroke="var(--branch3)" stroke-width="1.5"/>
      <rect x="535" y="215" width="130" height="35" rx="6" fill="var(--branch3-bg)" stroke="var(--branch3)" stroke-width="1"/>
      <text x="600" y="232" text-anchor="middle" class="label-bold" fill="var(--branch3)">Pre-verbal clitics</text>
      <text x="600" y="244" text-anchor="middle" class="label-sm">Je le lui donne</text>

      <line x1="600" y1="250" x2="600" y2="275" stroke="var(--branch3)" stroke-width="1"/>
      <rect x="540" y="275" width="120" height="30" rx="5" fill="var(--branch3-bg)" stroke="var(--branch3)" stroke-width="1"/>
      <text x="600" y="294" text-anchor="middle" class="label" fill="var(--branch3)">SOV with pronouns</text>

      <line x1="720" y1="190" x2="740" y2="215" stroke="var(--branch3)" stroke-width="1.5"/>
      <rect x="675" y="215" width="130" height="35" rx="6" fill="var(--branch3-bg)" stroke="var(--branch3)" stroke-width="1"/>
      <text x="740" y="232" text-anchor="middle" class="label-bold" fill="var(--branch3)">Bipartite negation</text>
      <text x="740" y="244" text-anchor="middle" class="label-sm">ne...pas wraps verb</text>

      <!-- BRANCH 4: ENGLISH COMPENSATIONS (right) -->
      <line x1="680" y1="100" x2="900" y2="150" stroke="var(--branch4)" stroke-width="2" marker-end="url(#arr4)"/>
      <rect x="800" y="150" width="220" height="40" rx="8" fill="var(--branch4-bg)" stroke="var(--branch4)" stroke-width="2"/>
      <text x="910" y="167" text-anchor="middle" class="label-bold" fill="var(--branch4)">ENGLISH COMPENSATES</text>
      <text x="910" y="180" text-anchor="middle" class="label-sm" fill="var(--branch4)">analytic strategies instead</text>

      <!-- Branch 4 leaves -->
      <line x1="860" y1="190" x2="840" y2="215" stroke="var(--branch4)" stroke-width="1.5"/>
      <rect x="775" y="215" width="130" height="35" rx="6" fill="var(--branch4-bg)" stroke="var(--branch4)" stroke-width="1"/>
      <text x="840" y="232" text-anchor="middle" class="label-bold" fill="var(--branch4)">Auxiliary stacking</text>
      <text x="840" y="244" text-anchor="middle" class="label-sm">would have been -ing</text>

      <line x1="960" y1="190" x2="970" y2="215" stroke="var(--branch4)" stroke-width="1.5"/>
      <rect x="905" y="215" width="130" height="35" rx="6" fill="var(--branch4-bg)" stroke="var(--branch4)" stroke-width="1"/>
      <text x="970" y="232" text-anchor="middle" class="label-bold" fill="var(--branch4)">Rigid word order</text>
      <text x="970" y="244" text-anchor="middle" class="label-sm">SVO never varies</text>

      <line x1="840" y1="250" x2="840" y2="275" stroke="var(--branch4)" stroke-width="1"/>
      <rect x="775" y="275" width="130" height="30" rx="5" fill="var(--branch4-bg)" stroke="var(--branch4)" stroke-width="1"/>
      <text x="840" y="294" text-anchor="middle" class="label" fill="var(--branch4)">Do-support: inserts do</text>

      <line x1="970" y1="250" x2="970" y2="275" stroke="var(--branch4)" stroke-width="1"/>
      <rect x="905" y="275" width="130" height="30" rx="5" fill="var(--branch4-bg)" stroke="var(--branch4)" stroke-width="1"/>
      <text x="970" y="294" text-anchor="middle" class="label" fill="var(--branch4)">No gender/adj. agr.</text>

      <!-- Counter-examples box -->
      <g transform="translate(50, 340)">
        <rect x="0" y="0" width="960" height="75" rx="10" fill="var(--english-bg)" stroke="var(--english)" stroke-width="1.5" stroke-dasharray="5,3"/>
        <text x="480" y="20" text-anchor="middle" class="label-bold" fill="var(--english)">EXCEPTIONS: What the macro-parameter does NOT predict</text>
        <text x="25" y="42" text-anchor="start" class="label" fill="var(--muted)">Syllable-timed vs. stress-timed (prosodic, not morphological)</text>
        <text x="400" y="42" text-anchor="start" class="label" fill="var(--muted)">Progressive aspect: EN more explicit (be + -ing)</text>
        <text x="25" y="60" text-anchor="start" class="label" fill="var(--muted)">Vigesimal numbers: quatre-vingts (historical, not synthesis)</text>
        <text x="400" y="60" text-anchor="start" class="label" fill="var(--muted)">Aspirate-h: le heros (lexical class, not synthesis)</text>
      </g>

      <!-- Concrete example -->
      <g transform="translate(50, 440)">
        <rect x="0" y="0" width="960" height="120" rx="10" fill="var(--accent-light)" stroke="var(--accent)" stroke-width="1.5"/>
        <text x="480" y="22" text-anchor="middle" class="title-text" fill="var(--accent)" style="font-size:12px;">THE CASCADE IN ACTION: "The beautiful new car went fast"</text>

        <text x="25" y="50" text-anchor="start" class="label-bold" fill="var(--branch2)">French: "La belle nouvelle voiture est allee vite"</text>
        <text x="25" y="68" text-anchor="start" class="label" fill="var(--fg)">La (f.sg.def) + belle (f.sg.adj) + nouvelle (f.sg.adj) + voiture (f.noun) + est allee (f.past.part) = 5 agreement links</text>

        <text x="25" y="92" text-anchor="start" class="label-bold" fill="var(--branch4)">English: "The beautiful new car went fast"</text>
        <text x="25" y="110" text-anchor="start" class="label" fill="var(--fg)">The + beautiful + new + car + went + fast = 0 agreement links. Every word invariable regardless of noun.</text>
      </g>

      <!-- Ratio summary -->
      <g transform="translate(50, 580)">
        <text x="180" y="15" text-anchor="middle" class="label-bold" fill="var(--branch2)">French: 5 agreement links</text>
        <text x="480" y="15" text-anchor="middle" class="title-text" fill="var(--root-color)">vs.</text>
        <text x="780" y="15" text-anchor="middle" class="label-bold" fill="var(--branch4)">English: 0 agreement links</text>

        <rect x="60" y="25" width="240" height="14" rx="7" fill="var(--branch2)" opacity="0.7"/>
        <rect x="660" y="25" width="240" height="14" rx="7" fill="var(--branch4)" opacity="0.15"/>
        <text x="60" y="55" text-anchor="start" class="label-sm">Dense agreement web</text>
        <text x="900" y="55" text-anchor="end" class="label-sm">No agreement web</text>
      </g>
    </svg>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background:var(--root-bg);border-color:var(--root-color);"></div> Macro-parameter (root)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--branch1-bg);border-color:var(--branch1);"></div> Inflection branch</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--branch2-bg);border-color:var(--branch2);"></div> Agreement branch</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--branch3-bg);border-color:var(--branch3);"></div> Word-internal info branch</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--branch4-bg);border-color:var(--branch4);"></div> English compensations</div>
  </div>

  <figcaption>
    <h2>Figure 3 -- The Cascade Effect: How One Difference Predicts Many</h2>
    <p>The single observation that "French is more morphologically synthetic" cascades into dozens of specific predictions: more verb forms, more agreement, grammatical gender, pre-verbal clitics, bipartite negation. English compensates for less synthesis with auxiliary stacking, rigid word order, do-support, and zero agreement. The exceptions (prosody, progressive aspect, vigesimal numbers) confirm that the macro-parameter is a powerful but not universal predictor.</p>
  </figcaption>
</figure>
</body>
</html>
