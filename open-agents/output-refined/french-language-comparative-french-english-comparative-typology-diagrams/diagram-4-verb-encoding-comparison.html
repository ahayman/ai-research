<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verb Encoding Comparison</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --accent: #4361ee; --accent-light: #e8edff;
    --french: #3b82f6; --french-bg: #dbeafe;
    --english: #8b5cf6; --english-bg: #ede9fe;
    --info-person: #22c55e; --info-number: #f59e0b; --info-tense: #ef4444;
    --info-mood: #ec4899; --info-root: #06b6d4; --info-class: #8b5cf6;
    --info-gender: #f97316;
    --muted: #6c757d; --caption-bg: #f8f9fa;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a; --fg: #e8e8f0; --surface: #1a1a2e; --border: #2d2d44;
      --accent: #6b8aff; --accent-light: #1e2a4a;
      --french: #60a5fa; --french-bg: #1e3a5f;
      --english: #a78bfa; --english-bg: #2e1a5e;
      --info-person: #4ade80; --info-number: #fbbf24; --info-tense: #f87171;
      --info-mood: #f472b6; --info-root: #22d3ee; --info-class: #a78bfa;
      --info-gender: #fb923c;
      --muted: #9a9ab0; --caption-bg: #1a1a2e;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg); color: var(--fg);
    display: flex; justify-content: center; padding: 2rem 1rem; line-height: 1.6;
  }
  figure { max-width: 1100px; width: 100%; }
  .diagram-container {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 1.5rem 1rem; overflow-x: auto;
  }
  figcaption {
    text-align: center; margin-top: 1.5rem; padding: 1rem 1.5rem;
    background: var(--caption-bg); border-radius: 8px; border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  svg { display: block; margin: 0 auto; }
  .title-text { font: bold 14px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
  .label { font: 12px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
  .label-bold { font: bold 12px 'Segoe UI', system-ui, sans-serif; }
  .label-sm { font: 10px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
  .word { font: bold 18px 'Segoe UI', system-ui, sans-serif; }
  .morph { font: bold 16px 'Courier New', monospace; }
  .legend { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; margin-top: 1rem; font-size: 0.82rem; color: var(--muted); }
  .legend-item { display: flex; align-items: center; gap: 0.4rem; }
  .legend-swatch { width: 14px; height: 14px; border-radius: 3px; border: 1px solid var(--border); }
</style>
</head>
<body>
<figure>
  <div class="diagram-container">
    <svg viewBox="0 0 1060 680" xmlns="http://www.w3.org/2000/svg" style="min-width:780px;">
      <text x="530" y="28" text-anchor="middle" class="title-text" style="font-size:16px;">Verb Encoding: Same Meaning, Two Strategies</text>
      <text x="530" y="46" text-anchor="middle" class="label-sm" style="font-size:11px;fill:var(--muted);">French packs information INTO words; English distributes it ACROSS words</text>

      <!-- ========= EXAMPLE 1: "parleraient" vs "they would speak" ========= -->
      <g transform="translate(20, 70)">
        <text x="510" y="0" text-anchor="middle" class="title-text" fill="var(--accent)">Example 1: "They would speak"</text>

        <!-- French side -->
        <rect x="30" y="15" width="440" height="160" rx="10" fill="var(--french-bg)" stroke="var(--french)" stroke-width="1.5"/>
        <text x="250" y="35" text-anchor="middle" class="label-bold" fill="var(--french)">FRENCH: 1 word = 6 pieces of information</text>

        <text x="250" y="70" text-anchor="middle" class="word" fill="var(--french)">parleraient</text>

        <!-- Morpheme breakdown -->
        <text x="140" y="95" text-anchor="middle" class="morph" fill="var(--info-root)">parl</text>
        <text x="190" y="95" text-anchor="middle" class="morph" fill="var(--info-class)">er</text>
        <text x="238" y="95" text-anchor="middle" class="morph" fill="var(--info-mood)">-</text>
        <text x="265" y="95" text-anchor="middle" class="morph" fill="var(--info-tense)">ai</text>
        <text x="310" y="95" text-anchor="middle" class="morph" fill="var(--info-person)">ent</text>

        <!-- Labels -->
        <line x1="140" y1="100" x2="140" y2="115" stroke="var(--info-root)" stroke-width="1"/>
        <text x="140" y="128" text-anchor="middle" class="label-sm" fill="var(--info-root)">ROOT</text>
        <text x="140" y="140" text-anchor="middle" class="label-sm" fill="var(--info-root)">"speak"</text>

        <line x1="190" y1="100" x2="190" y2="115" stroke="var(--info-class)" stroke-width="1"/>
        <text x="190" y="128" text-anchor="middle" class="label-sm" fill="var(--info-class)">CLASS</text>
        <text x="190" y="140" text-anchor="middle" class="label-sm" fill="var(--info-class)">Group 1</text>

        <line x1="238" y1="100" x2="238" y2="115" stroke="var(--info-mood)" stroke-width="1"/>
        <text x="238" y="128" text-anchor="middle" class="label-sm" fill="var(--info-mood)">MOOD</text>
        <text x="238" y="140" text-anchor="middle" class="label-sm" fill="var(--info-mood)">conditional</text>

        <line x1="265" y1="100" x2="265" y2="115" stroke="var(--info-tense)" stroke-width="1"/>
        <text x="265" y="128" text-anchor="middle" class="label-sm" fill="var(--info-tense)">TENSE</text>
        <text x="265" y="140" text-anchor="middle" class="label-sm" fill="var(--info-tense)">imperfect</text>

        <line x1="310" y1="100" x2="310" y2="115" stroke="var(--info-person)" stroke-width="1"/>
        <text x="310" y="128" text-anchor="middle" class="label-sm" fill="var(--info-person)">PERSON+NUM</text>
        <text x="310" y="140" text-anchor="middle" class="label-sm" fill="var(--info-person)">3rd plural</text>

        <text x="430" y="120" text-anchor="middle" class="label-bold" fill="var(--french)">1 word</text>
        <text x="430" y="136" text-anchor="middle" class="label-bold" fill="var(--french)">6 infos</text>

        <!-- English side -->
        <rect x="490" y="15" width="480" height="160" rx="10" fill="var(--english-bg)" stroke="var(--english)" stroke-width="1.5"/>
        <text x="730" y="35" text-anchor="middle" class="label-bold" fill="var(--english)">ENGLISH: 3 words = same 6 pieces of information</text>

        <text x="730" y="75" text-anchor="middle" class="word" fill="var(--english)">they    would    speak</text>

        <!-- Word breakdown -->
        <rect x="590" y="90" width="60" height="28" rx="5" fill="none" stroke="var(--info-person)" stroke-width="1.5"/>
        <text x="620" y="108" text-anchor="middle" class="label-bold" fill="var(--info-person)">they</text>
        <text x="620" y="136" text-anchor="middle" class="label-sm" fill="var(--info-person)">PERSON: 3rd</text>
        <text x="620" y="148" text-anchor="middle" class="label-sm" fill="var(--info-number)">NUMBER: plural</text>

        <rect x="690" y="90" width="70" height="28" rx="5" fill="none" stroke="var(--info-mood)" stroke-width="1.5"/>
        <text x="725" y="108" text-anchor="middle" class="label-bold" fill="var(--info-mood)">would</text>
        <text x="725" y="136" text-anchor="middle" class="label-sm" fill="var(--info-mood)">MOOD: conditional</text>
        <text x="725" y="148" text-anchor="middle" class="label-sm" fill="var(--info-tense)">TENSE: (implied)</text>

        <rect x="800" y="90" width="70" height="28" rx="5" fill="none" stroke="var(--info-root)" stroke-width="1.5"/>
        <text x="835" y="108" text-anchor="middle" class="label-bold" fill="var(--info-root)">speak</text>
        <text x="835" y="136" text-anchor="middle" class="label-sm" fill="var(--info-root)">ROOT: "speak"</text>
        <text x="835" y="148" text-anchor="middle" class="label-sm" fill="var(--info-class)">CLASS: (bare form)</text>

        <text x="930" y="120" text-anchor="middle" class="label-bold" fill="var(--english)">3 words</text>
        <text x="930" y="136" text-anchor="middle" class="label-bold" fill="var(--english)">6 infos</text>
      </g>

      <!-- ========= EXAMPLE 2: "Elle parlerait" vs "She would speak" ========= -->
      <g transform="translate(20, 260)">
        <text x="510" y="0" text-anchor="middle" class="title-text" fill="var(--accent)">Example 2: "She would speak"</text>

        <rect x="30" y="15" width="440" height="70" rx="10" fill="var(--french-bg)" stroke="var(--french)" stroke-width="1.5"/>
        <text x="250" y="38" text-anchor="middle" class="word" fill="var(--french)">Elle parlerait</text>
        <text x="250" y="58" text-anchor="middle" class="label" fill="var(--french)">2 words -- verb encodes mood+tense+person in suffix -rait</text>
        <text x="250" y="75" text-anchor="middle" class="label-sm" fill="var(--french)">Conditional is a SINGLE SUFFIX, not a separate word</text>

        <rect x="490" y="15" width="480" height="70" rx="10" fill="var(--english-bg)" stroke="var(--english)" stroke-width="1.5"/>
        <text x="730" y="38" text-anchor="middle" class="word" fill="var(--english)">She would speak</text>
        <text x="730" y="58" text-anchor="middle" class="label" fill="var(--english)">3 words -- "would" is a separate modal auxiliary word</text>
        <text x="730" y="75" text-anchor="middle" class="label-sm" fill="var(--english)">Conditional is a SEPARATE WORD, not part of the verb</text>
      </g>

      <!-- ========= EXAMPLE 3: Compound tense with agreement ========= -->
      <g transform="translate(20, 360)">
        <text x="510" y="0" text-anchor="middle" class="title-text" fill="var(--accent)">Example 3: "She had been eaten" (passive + agreement)</text>

        <rect x="30" y="15" width="440" height="85" rx="10" fill="var(--french-bg)" stroke="var(--french)" stroke-width="1.5"/>
        <text x="250" y="38" text-anchor="middle" class="word" fill="var(--french)">Elle avait ete mangee</text>
        <text x="250" y="58" text-anchor="middle" class="label" fill="var(--french)">4 words -- but "mangee" carries GENDER agreement (-ee = feminine)</text>
        <text x="250" y="75" text-anchor="middle" class="label-sm" fill="var(--info-gender)">Past participle agrees with subject: mange (m) vs. mangee (f)</text>
        <text x="250" y="90" text-anchor="middle" class="label-sm" fill="var(--info-gender)">Extra information PER WORD that English never encodes</text>

        <rect x="490" y="15" width="480" height="85" rx="10" fill="var(--english-bg)" stroke="var(--english)" stroke-width="1.5"/>
        <text x="730" y="38" text-anchor="middle" class="word" fill="var(--english)">She had been eaten</text>
        <text x="730" y="58" text-anchor="middle" class="label" fill="var(--english)">4 words -- but "eaten" is INVARIABLE regardless of subject</text>
        <text x="730" y="75" text-anchor="middle" class="label-sm" fill="var(--english)">No gender agreement: "eaten" same for he/she/they/it</text>
        <text x="730" y="90" text-anchor="middle" class="label-sm" fill="var(--english)">Same word count, but LESS information per word</text>
      </g>

      <!-- ========= EXAMPLE 4: Maximum auxiliary stacking ========= -->
      <g transform="translate(20, 475)">
        <text x="510" y="0" text-anchor="middle" class="title-text" fill="var(--accent)">Example 4: Maximum English Auxiliary Stack</text>

        <rect x="30" y="15" width="440" height="70" rx="10" fill="var(--french-bg)" stroke="var(--french)" stroke-width="1.5"/>
        <text x="250" y="38" text-anchor="middle" class="word" fill="var(--french)" style="font-size:15px;">Ils auraient parle</text>
        <text x="250" y="58" text-anchor="middle" class="label" fill="var(--french)">3 words -- "auraient" = conditional of avoir (would have)</text>
        <text x="250" y="75" text-anchor="middle" class="label-sm" fill="var(--french)">Conditional FUSED into the auxiliary: one word = would + have</text>

        <rect x="490" y="15" width="480" height="70" rx="10" fill="var(--english-bg)" stroke="var(--english)" stroke-width="1.5"/>
        <text x="730" y="38" text-anchor="middle" class="word" fill="var(--english)" style="font-size:15px;">They would have spoken</text>
        <text x="730" y="58" text-anchor="middle" class="label" fill="var(--english)">4 words -- "would" + "have" as separate auxiliaries</text>
        <text x="730" y="75" text-anchor="middle" class="label-sm" fill="var(--english)">Each grammatical function gets its own word: modal + perfect + verb</text>
      </g>

      <!-- Summary box -->
      <g transform="translate(50, 575)">
        <rect x="0" y="0" width="960" height="80" rx="10" fill="var(--accent-light)" stroke="var(--accent)" stroke-width="1.5"/>
        <text x="480" y="22" text-anchor="middle" class="title-text" fill="var(--accent)" style="font-size:13px;">THE INVERSE RELATIONSHIP</text>
        <text x="200" y="45" text-anchor="middle" class="label-bold" fill="var(--french)">French: FEWER words, HEAVIER words</text>
        <text x="200" y="63" text-anchor="middle" class="label" fill="var(--french)">Each word carries more grammatical payload</text>
        <text x="480" y="54" text-anchor="middle" class="title-text" fill="var(--accent)">vs.</text>
        <text x="760" y="45" text-anchor="middle" class="label-bold" fill="var(--english)">English: MORE words, LIGHTER words</text>
        <text x="760" y="63" text-anchor="middle" class="label" fill="var(--english)">Each word carries less grammatical payload</text>
      </g>
    </svg>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background:var(--info-root);opacity:0.7;"></div> Root meaning</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--info-class);opacity:0.7;"></div> Conjugation class</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--info-mood);opacity:0.7;"></div> Mood</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--info-tense);opacity:0.7;"></div> Tense</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--info-person);opacity:0.7;"></div> Person/Number</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--info-gender);opacity:0.7;"></div> Gender agreement</div>
  </div>

  <figcaption>
    <h2>Figure 4 -- Verb Encoding: One Meaning, Two Strategies</h2>
    <p>French and English encode the same verbal meanings through opposite strategies. French "parleraient" packs root, class, mood, tense, person, and number into a single word. English "they would speak" distributes the same information across three separate words. The trade-off is consistent: French uses fewer words with more internal complexity; English uses more words with simpler structure. Neither is inherently more complex -- they redistribute complexity differently.</p>
  </figcaption>
</figure>
</body>
</html>
