<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parameter-by-Parameter Comparison</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --accent: #4361ee; --accent-light: #e8edff;
    --conv: #22c55e; --conv-bg: #dcfce7;
    --div-synth: #ef4444; --div-synth-bg: #fee2e2;
    --div-indep: #f59e0b; --div-indep-bg: #fef3c7;
    --french: #3b82f6; --english: #8b5cf6;
    --muted: #6c757d; --caption-bg: #f8f9fa;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a; --fg: #e8e8f0; --surface: #1a1a2e; --border: #2d2d44;
      --accent: #6b8aff; --accent-light: #1e2a4a;
      --conv: #4ade80; --conv-bg: #14532d;
      --div-synth: #f87171; --div-synth-bg: #5c1a1a;
      --div-indep: #fbbf24; --div-indep-bg: #78350f;
      --french: #60a5fa; --english: #a78bfa;
      --muted: #9a9ab0; --caption-bg: #1a1a2e;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg); color: var(--fg);
    display: flex; justify-content: center; padding: 2rem 1rem; line-height: 1.6;
  }
  figure { max-width: 1100px; width: 100%; }
  .diagram-container {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 1.5rem; overflow-x: auto;
  }
  figcaption {
    text-align: center; margin-top: 1.5rem; padding: 1rem 1.5rem;
    background: var(--caption-bg); border-radius: 8px; border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  table { width: 100%; border-collapse: collapse; font-size: 0.88rem; min-width: 780px; }
  th { background: var(--accent-light); color: var(--accent); font-weight: 600; padding: 0.7rem 0.6rem; text-align: left; border-bottom: 2px solid var(--accent); }
  td { padding: 0.6rem; border-bottom: 1px solid var(--border); vertical-align: top; }
  tr:hover td { background: var(--accent-light); }
  .conv { color: var(--conv); font-weight: 600; }
  .div-s { color: var(--div-synth); font-weight: 600; }
  .div-i { color: var(--div-indep); font-weight: 600; }
  .param-name { font-weight: 600; color: var(--fg); }
  .wals { font-size: 0.75rem; color: var(--muted); display: block; }
  .fr { color: var(--french); }
  .en { color: var(--english); }
  .section-label { background: var(--surface); border-left: 4px solid; padding: 0.4rem 0.6rem; font-weight: 700; font-size: 0.85rem; }
  .section-conv { border-left-color: var(--conv); color: var(--conv); }
  .section-div { border-left-color: var(--div-synth); color: var(--div-synth); }
  .section-indep { border-left-color: var(--div-indep); color: var(--div-indep); }
  .legend { display: flex; gap: 1.5rem; justify-content: center; flex-wrap: wrap; margin-top: 1rem; font-size: 0.82rem; color: var(--muted); }
  .legend-item { display: flex; align-items: center; gap: 0.4rem; }
  .legend-swatch { width: 14px; height: 14px; border-radius: 3px; border: 1px solid var(--border); }
  h3 { text-align: center; font-size: 1.15rem; margin-bottom: 1rem; color: var(--accent); }
</style>
</head>
<body>
<figure>
  <div class="diagram-container">
    <h3>French-English Typological Parameter Comparison</h3>
    <table>
      <thead>
        <tr>
          <th style="width:18%">Parameter</th>
          <th style="width:28%">French</th>
          <th style="width:28%">English</th>
          <th style="width:12%">Status</th>
          <th style="width:14%">Source</th>
        </tr>
      </thead>
      <tbody>
        <!-- Convergent section -->
        <tr><td colspan="5" class="section-label section-conv">CONVERGENT PARAMETERS -- Shared Architectural Features</td></tr>
        <tr>
          <td class="param-name">Word Order <span class="wals">WALS #81</span></td>
          <td class="fr">SVO: Le chat mange la souris</td>
          <td class="en">SVO: The cat eats the mouse</td>
          <td class="conv">Convergent</td>
          <td>Shared</td>
        </tr>
        <tr>
          <td class="param-name">Head Direction <span class="wals">WALS #83-87</span></td>
          <td class="fr">Head-initial: manger des pommes</td>
          <td class="en">Head-initial: eat apples</td>
          <td class="conv">Convergent</td>
          <td>Shared</td>
        </tr>
        <tr>
          <td class="param-name">Adposition Type <span class="wals">WALS #85</span></td>
          <td class="fr">Prepositional: dans la maison</td>
          <td class="en">Prepositional: in the house</td>
          <td class="conv">Convergent</td>
          <td>Shared</td>
        </tr>
        <tr>
          <td class="param-name">Article Presence <span class="wals">WALS #37</span></td>
          <td class="fr">Has articles (definite + indefinite)</td>
          <td class="en">Has articles (definite + indefinite)</td>
          <td class="conv">Convergent</td>
          <td>Shared</td>
        </tr>
        <tr>
          <td class="param-name">Clause Structure</td>
          <td class="fr">Subordination with que/si/quand</td>
          <td class="en">Subordination with that/if/when</td>
          <td class="conv">Convergent</td>
          <td>Shared</td>
        </tr>
        <tr>
          <td class="param-name">Relative Clauses</td>
          <td class="fr">Post-nominal: le livre que j'ai lu</td>
          <td class="en">Post-nominal: the book that I read</td>
          <td class="conv">Convergent</td>
          <td>Shared</td>
        </tr>

        <!-- Divergent: synthesis-derived -->
        <tr><td colspan="5" class="section-label section-div">DIVERGENT -- Predicted by Synthesis Macro-Parameter</td></tr>
        <tr>
          <td class="param-name">Grammatical Gender <span class="wals">WALS #30</span></td>
          <td class="fr">2 genders (masc/fem) on every noun</td>
          <td class="en">0 genders (natural gender only)</td>
          <td class="div-s">Divergent</td>
          <td>Synthesis</td>
        </tr>
        <tr>
          <td class="param-name">Agreement Density</td>
          <td class="fr">~20+ operations/sentence (5+ types)</td>
          <td class="en">~1-2 operations (3rd person -s only)</td>
          <td class="div-s">Divergent</td>
          <td>Synthesis</td>
        </tr>
        <tr>
          <td class="param-name">Verb Forms per Verb</td>
          <td class="fr">50+ synthetic forms (parle, parles, parlait...)</td>
          <td class="en">5 max (walk, walks, walked, walking, walked)</td>
          <td class="div-s">Divergent</td>
          <td>Synthesis</td>
        </tr>
        <tr>
          <td class="param-name">Conditional</td>
          <td class="fr">Morphological mood: parlerait</td>
          <td class="en">Periphrastic: would speak</td>
          <td class="div-s">Divergent</td>
          <td>Synthesis</td>
        </tr>
        <tr>
          <td class="param-name">Subjunctive</td>
          <td class="fr">Productive, obligatory: qu'il parle</td>
          <td class="en">Vestigial: "If I were," "I suggest he go"</td>
          <td class="div-s">Divergent</td>
          <td>Synthesis</td>
        </tr>
        <tr>
          <td class="param-name">Article System</td>
          <td class="fr">3-way: definite + indefinite + partitive (~11 forms)</td>
          <td class="en">2-way: definite + indefinite (2-3 forms)</td>
          <td class="div-s">Divergent</td>
          <td>Synthesis</td>
        </tr>
        <tr>
          <td class="param-name">Pronoun System</td>
          <td class="fr">Pre-verbal clitics: Je le lui donne</td>
          <td class="en">Post-verbal full: I give it to him</td>
          <td class="div-s">Divergent</td>
          <td>Synthesis</td>
        </tr>
        <tr>
          <td class="param-name">Negation</td>
          <td class="fr">Bipartite: ne...pas (wraps verb)</td>
          <td class="en">Do-support: do + not (inserts word)</td>
          <td class="div-s">Divergent</td>
          <td>Synthesis</td>
        </tr>
        <tr>
          <td class="param-name">Adjective Agreement</td>
          <td class="fr">4 forms: grand/grande/grands/grandes</td>
          <td class="en">Invariable: big (always)</td>
          <td class="div-s">Divergent</td>
          <td>Synthesis</td>
        </tr>

        <!-- Divergent: independent -->
        <tr><td colspan="5" class="section-label section-indep">DIVERGENT -- Independent Parameters (Not Predicted by Synthesis)</td></tr>
        <tr>
          <td class="param-name">Prosodic Type <span class="wals">WALS #17</span></td>
          <td class="fr">Syllable-timed ("machine-gun" rhythm)</td>
          <td class="en">Stress-timed ("galloping" rhythm)</td>
          <td class="div-i">Independent</td>
          <td>Prosodic</td>
        </tr>
        <tr>
          <td class="param-name">Progressive Aspect</td>
          <td class="fr">None obligatory (je mange = eat / am eating)</td>
          <td class="en">Grammaticalized: be + -ing (I am eating)</td>
          <td class="div-i">Independent</td>
          <td>Aspect</td>
        </tr>
        <tr>
          <td class="param-name">Numeral System</td>
          <td class="fr">Vigesimal above 69: quatre-vingts (4x20)</td>
          <td class="en">Purely decimal: eighty</td>
          <td class="div-i">Independent</td>
          <td>Historical</td>
        </tr>
        <tr>
          <td class="param-name">Politeness Encoding</td>
          <td class="fr">Grammatical: tu/vous (T-V distinction)</td>
          <td class="en">Lexical: politeness via word choice only</td>
          <td class="div-i">Independent</td>
          <td>Pragmatic</td>
        </tr>
      </tbody>
    </table>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background:var(--conv-bg);border-color:var(--conv);"></div> Convergent (shared)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--div-synth-bg);border-color:var(--div-synth);"></div> Divergent (synthesis-predicted)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--div-indep-bg);border-color:var(--div-indep);"></div> Divergent (independent)</div>
  </div>

  <figcaption>
    <h2>Figure 1 -- Parameter-by-Parameter Typological Comparison</h2>
    <p>French and English converge on all major architectural parameters (SVO, head-initial, prepositional, articles, clause structure). Most divergences (gender, agreement, verb morphology, negation, pronouns) are predicted by a single macro-parameter: French is more morphologically synthetic. Only a few divergences (prosodic type, progressive aspect, vigesimal numbers, T-V politeness) are truly independent. The pattern: same architecture, different implementation density.</p>
  </figcaption>
</figure>
</body>
</html>
