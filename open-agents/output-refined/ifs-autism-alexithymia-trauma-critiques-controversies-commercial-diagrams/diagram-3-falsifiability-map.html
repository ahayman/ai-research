  <figcaption>
    <strong>Figure 3:</strong> Falsifiability map. Some IFS claims are empirically testable (and the Buys 2025 scoping review documents what the testing has found so far). Others — particularly the universality of Self — are not falsifiable as currently formulated, because absence of Self gets reframed as "a part is in the way." This is the <em>ad hoc rescue</em> pattern Popper named: any apparent disconfirmation gets reabsorbed into the theory rather than counting against it. The clinical moves can still be useful while the underlying universality claim remains an open question.
  </figcaption>
</figure>
