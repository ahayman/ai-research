<!-- Diagram: Three Categories of Critique -->
<!-- Type: flowchart -->
<!-- Generated: 2026-04-29 -->
<!-- Description: Sorts the IFS critique conversation into three structurally distinct objects (epistemic / commercial-structural / brand-overclaiming), each with its key named sources. Helps the reader recognize which kind of critique they are reading at any given moment. -->

<figure class="concept-diagram" id="diagram-1">
  <div class="diagram-container">
    <pre class="mermaid">
flowchart TD
    Center["Critiques of IFS<br/>(three structurally distinct objects)"]:::root

    Center --> Epi["EPISTEMIC<br/>Truth-claims of the model"]:::epi
    Center --> Com["COMMERCIAL / STRUCTURAL<br/>The Institute as institution"]:::com
    Center --> Brand["BRAND / OVER-CLAIMING<br/>Marketing vs. evidence"]:::brand

    Epi --> Falsi["Falsifiability<br/>of parts and Self"]:::epi
    Epi --> Univ["Universality of Self<br/>(no evidence)"]:::epi
    Epi --> NoBad["'No bad parts'<br/>stance vs. doctrine"]:::epi
    Epi --> Source1["Brownstone, Hunsicker,<br/>Greene 2024<br/>Wikipedia / clinician forums"]:::epiSrc

    Com --> Founder["Founder concentration<br/>(Schwartz: founder, face,<br/>IP-holder, gatekeeper)"]:::com
    Com --> Pricing["Tiered $4K+ training<br/>recertification cadence"]:::com
    Com --> Loop["Foundation funds research<br/>Institute markets results"]:::com
    Com --> Source2["McAllen 2025 (The Nation)<br/>Mad in America July 2025"]:::comSrc

    Brand --> EvBased["'Evidence-based' label<br/>vs. 2 RCTs + thin pilots"]:::brand
    Brand --> Defunct["NREPP listing 2015<br/>(registry now defunct)"]:::brand
    Brand --> Master["Shedler's 'master narrative'<br/>(general critique applied here)"]:::brand
    Brand --> Source3["Shedler 2015/2018<br/>Buys 2025 scoping review"]:::brandSrc

    Note["NOTE: Conflating these categories<br/>collapses arguments with different<br/>evidentiary structures and remedies"]:::note
    Center -.-> Note

    classDef root fill:#1E3A5F,stroke:#0F172A,stroke-width:2px,color:#FFFFFF
    classDef epi fill:#DBEAFE,stroke:#2563EB,stroke-width:2px,color:#1E3A8A
    classDef epiSrc fill:#EFF6FF,stroke:#60A5FA,stroke-width:1px,color:#1E40AF,font-style:italic
    classDef com fill:#FEF3C7,stroke:#D97706,stroke-width:2px,color:#78350F
    classDef comSrc fill:#FFFBEB,stroke:#FBBF24,stroke-width:1px,color:#78350F,font-style:italic
    classDef brand fill:#FEE2E2,stroke:#DC2626,stroke-width:2px,color:#7F1D1D
    classDef brandSrc fill:#FEF2F2,stroke:#F87171,stroke-width:1px,color:#991B1B,font-style:italic
    classDef note fill:#F3F4F6,stroke:#9CA3AF,stroke-width:1px,color:#374151,font-style:italic
    </pre>
  </div>
  <figcaption>
    <strong>Figure 1:</strong> The IFS critique conversation sorts into three structurally distinct objects. Each has its own evidentiary basis and would require different responses. Reading "IFS criticism" without sorting which kind of critique a given source is making collapses arguments that operate at different levels.
  </figcaption>
</figure>
