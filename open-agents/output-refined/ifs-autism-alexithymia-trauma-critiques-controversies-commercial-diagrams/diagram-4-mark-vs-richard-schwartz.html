    <strong>Figure 4:</strong> Mark Schwartz and Richard Schwartz are unrelated. Same surname; same general field; one paid-consultant relationship between them at some point. The Castlewood litigation involves Mark, not Richard. <em>The Cut</em>'s framing of the Castlewood pattern as "IFS" collapses this distinction, and the IFS Institute's response on this specific point is factually correct. The harder generalizable concern — that hypnotic and imagery-based methods carry false-memory induction risks across modalities — survives the disambiguation and is what serious critics actually argue.
