<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>German vs English Pragmatic Strategy Comparison</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --accent-de: #e63946;
    --accent-en: #10b981;
    --accent-de-bg: #fef2f2;
    --accent-en-bg: #ecfdf5;
    --goal-color: #8b5cf6;
    --goal-bg: #f5f3ff;
    --muted: #6c757d;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --accent-de: #f87171;
      --accent-en: #34d399;
      --accent-de-bg: #2a1215;
      --accent-en-bg: #132e24;
      --goal-color: #a78bfa;
      --goal-bg: #1e1b3a;
      --muted: #9a9ab0;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure {
    max-width: 1100px;
    width: 100%;
    background: var(--surface);
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
  }
  h2 { text-align: center; font-size: 1.4rem; margin-bottom: 0.3rem; }
  .subtitle { text-align: center; font-size: 0.95rem; color: var(--muted); margin-bottom: 2rem; }

  .header-row {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 0.8rem;
    align-items: center;
    margin-bottom: 1rem;
  }
  .track-header {
    text-align: center;
    font-size: 0.85rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding: 0.5rem;
    border-radius: 8px;
  }
  .track-header.de { background: var(--accent-de-bg); color: var(--accent-de); }
  .track-header.en { background: var(--accent-en-bg); color: var(--accent-en); }
  .track-header.goal { background: var(--goal-bg); color: var(--goal-color); }

  .comparison-row {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 0.8rem;
    align-items: stretch;
    margin-bottom: 1rem;
  }
  .strat-card {
    border: 2px solid var(--border);
    border-radius: 10px;
    padding: 0.8rem 1rem;
    font-size: 0.85rem;
  }
  .strat-card.de {
    border-color: var(--accent-de);
    border-left: 5px solid var(--accent-de);
  }
  .strat-card.en {
    border-color: var(--accent-en);
    border-right: 5px solid var(--accent-en);
  }
  .strat-card .mech {
    font-weight: 700;
    font-size: 0.82rem;
    margin-bottom: 0.3rem;
  }
  .strat-card .mech.de-mech { color: var(--accent-de); }
  .strat-card .mech.en-mech { color: var(--accent-en); }
  .strat-card .example-de {
    font-style: italic;
    font-size: 0.82rem;
    border-left: 3px solid var(--accent-de);
    padding-left: 0.6rem;
    margin-top: 0.3rem;
  }
  .strat-card .example-en {
    font-style: italic;
    font-size: 0.82rem;
    border-left: 3px solid var(--accent-en);
    padding-left: 0.6rem;
    margin-top: 0.3rem;
  }
  .strat-card .note {
    font-size: 0.75rem;
    color: var(--muted);
    margin-top: 0.3rem;
  }

  .goal-pill {
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--goal-bg);
    border: 2px solid var(--goal-color);
    border-radius: 24px;
    padding: 0.4rem 0.8rem;
    font-size: 0.78rem;
    font-weight: 700;
    color: var(--goal-color);
    text-align: center;
    min-width: 100px;
    writing-mode: horizontal-tb;
  }

  .bridge-lines {
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    font-size: 0.9rem;
    letter-spacing: 0.2em;
  }

  .summary-section {
    margin-top: 2rem;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
  }
  .summary-card {
    border: 2px solid var(--border);
    border-radius: 12px;
    padding: 1rem;
    text-align: center;
  }
  .summary-card.de-summary { border-color: var(--accent-de); }
  .summary-card.en-summary { border-color: var(--accent-en); }
  .summary-card h4 { font-size: 0.92rem; margin-bottom: 0.5rem; }
  .summary-card h4.de-title { color: var(--accent-de); }
  .summary-card h4.en-title { color: var(--accent-en); }
  .summary-card ul {
    list-style: none;
    padding: 0;
    font-size: 0.82rem;
    text-align: left;
  }
  .summary-card li {
    padding: 0.2rem 0;
    padding-left: 1.2rem;
    position: relative;
  }
  .summary-card.de-summary li::before {
    content: "";
    position: absolute;
    left: 0;
    top: 0.55rem;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent-de);
  }
  .summary-card.en-summary li::before {
    content: "";
    position: absolute;
    left: 0;
    top: 0.55rem;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent-en);
  }

  .insight-box {
    margin-top: 1.5rem;
    border: 2px solid var(--goal-color);
    border-radius: 12px;
    padding: 1.2rem;
    background: var(--goal-bg);
    text-align: center;
    font-size: 0.9rem;
  }
  .insight-box h4 { color: var(--goal-color); margin-bottom: 0.5rem; }

  figcaption {
    margin-top: 1.5rem;
    padding-top: 1rem;
    border-top: 1px solid var(--border);
    font-size: 0.82rem;
    color: var(--muted);
    text-align: center;
  }
  @media (max-width: 768px) {
    .comparison-row, .header-row { grid-template-columns: 1fr; }
    .goal-pill { order: -1; }
    .summary-section { grid-template-columns: 1fr; }
    figure { padding: 1.5rem; }
  }
  @media print {
    body { background: white; padding: 0; }
    figure { box-shadow: none; border: 1px solid #ccc; }
  }
</style>
</head>
<body>
<figure>
  <h2>German vs English Pragmatic Strategy Comparison</h2>
  <p class="subtitle">Same communicative goals, fundamentally different mechanisms -- dedicated vs. distributed systems</p>

  <!-- Header -->
  <div class="header-row">
    <div class="track-header de">German -- Concentrated Mechanisms</div>
    <div class="track-header goal">Communicative Goal</div>
    <div class="track-header en">English -- Distributed Strategies</div>
  </div>

  <!-- Row 1: Making a Request -->
  <div class="comparison-row">
    <div class="strat-card de">
      <div class="mech de-mech">Konjunktiv II + bitte + modal particle (mal)</div>
      <div class="example-de">"Konntest du mir mal helfen?"</div>
      <div class="example-de">"Wurden Sie mir bitte helfen?"</div>
      <div class="note">Three dedicated tools: verb mood, politeness word, particle. Short and direct.</div>
    </div>
    <div class="goal-pill">Making a<br>Request</div>
    <div class="strat-card en">
      <div class="mech en-mech">Hedging chain + modal verb + tag</div>
      <div class="example-en">"I was wondering if you might possibly be able to help me?"</div>
      <div class="example-en">"Could you maybe help me out for a sec?"</div>
      <div class="note">Politeness encoded through stacking more words. Length = politeness.</div>
    </div>
  </div>

  <!-- Row 2: Encoding Social Distance -->
  <div class="comparison-row">
    <div class="strat-card de">
      <div class="mech de-mech">Du/Sie pronoun choice (grammatical)</div>
      <div class="example-de">du kommst / Sie kommen</div>
      <div class="example-de">Komm! / Kommen Sie!</div>
      <div class="note">Binary, obligatory, propagates through all verb forms and pronouns. Impossible to avoid.</div>
    </div>
    <div class="goal-pill">Encoding<br>Social Distance</div>
    <div class="strat-card en">
      <div class="mech en-mech">Vocabulary, tone, register (pragmatic)</div>
      <div class="example-en">"Hey, grab me that" vs. "Would you mind passing that?"</div>
      <div class="note">No grammatical signal. Distance encoded via word choice, hedging, and tone. Optional and gradient.</div>
    </div>
  </div>

  <!-- Row 3: Expressing Uncertainty -->
  <div class="comparison-row">
    <div class="strat-card de">
      <div class="mech de-mech">Modal particle: wohl, eigentlich</div>
      <div class="example-de">"Er ist wohl krank."</div>
      <div class="example-de">"Das stimmt eigentlich nicht."</div>
      <div class="note">Single particle inserted in mid-sentence modulates the entire proposition.</div>
    </div>
    <div class="goal-pill">Expressing<br>Uncertainty</div>
    <div class="strat-card en">
      <div class="mech en-mech">Hedging phrases + possibly + intonation</div>
      <div class="example-en">"I think maybe he might be sick?"</div>
      <div class="example-en">"That's not actually quite right, I don't think."</div>
      <div class="note">Multiple hedges stacked together. Rising intonation adds further softening.</div>
    </div>
  </div>

  <!-- Row 4: Refusing -->
  <div class="comparison-row">
    <div class="strat-card de">
      <div class="mech de-mech">Direct negation + leider (unfortunately)</div>
      <div class="example-de">"Nein, das geht leider nicht."</div>
      <div class="example-de">"Das kann ich nicht machen."</div>
      <div class="note">The word "no" appears. Directness is the norm; "leider" provides social softening.</div>
    </div>
    <div class="goal-pill">Refusing a<br>Request</div>
    <div class="strat-card en">
      <div class="mech en-mech">Indirection + regret markers + passive</div>
      <div class="example-en">"I'm afraid that might be a bit difficult..."</div>
      <div class="example-en">"I'm not sure that's going to work, unfortunately."</div>
      <div class="note">The word "no" is avoided. Refusal is implied through hedged language. Directness would feel rude.</div>
    </div>
  </div>

  <!-- Row 5: Criticizing -->
  <div class="comparison-row">
    <div class="strat-card de">
      <div class="mech de-mech">Sachlichkeit -- factual statement (+ doch for emphasis)</div>
      <div class="example-de">"Das ist falsch."</div>
      <div class="example-de">"Das stimmt doch nicht."</div>
      <div class="note">Critique targets the content, not the person. Sachlichkeit separates person from issue. Normal in academic/professional settings.</div>
    </div>
    <div class="goal-pill">Giving<br>Criticism</div>
    <div class="strat-card en">
      <div class="mech en-mech">Hedged suggestion + positive framing</div>
      <div class="example-en">"I wonder if there might be a different way to look at this."</div>
      <div class="example-en">"Have you considered the possibility that...?"</div>
      <div class="note">Criticism reframed as a question or suggestion. Direct criticism feels like personal attack.</div>
    </div>
  </div>

  <!-- Row 6: Invoking Shared Knowledge -->
  <div class="comparison-row">
    <div class="strat-card de">
      <div class="mech de-mech">Modal particle: ja</div>
      <div class="example-de">"Du weisst ja, dass er krank ist."</div>
      <div class="note">Single particle marks the entire clause as shared knowledge. Economical.</div>
    </div>
    <div class="goal-pill">Invoking<br>Shared Knowledge</div>
    <div class="strat-card en">
      <div class="mech en-mech">Tag questions + hedging + intonation</div>
      <div class="example-en">"You know he's sick, right?"</div>
      <div class="example-en">"As you know, he's been unwell."</div>
      <div class="note">English requires a clause-level addition or a tag question -- more words, same function.</div>
    </div>
  </div>

  <!-- Architecture Summary -->
  <div class="summary-section">
    <div class="summary-card de-summary">
      <h4 class="de-title">German Architecture</h4>
      <ul>
        <li><strong>Concentrated:</strong> pragmatic work done by dedicated tools</li>
        <li><strong>Grammatical:</strong> Du/Sie, Konjunktiv II are part of the grammar</li>
        <li><strong>Particle-based:</strong> 9 particles handle most nuance</li>
        <li><strong>Direct default:</strong> Sachlichkeit -- say what you mean</li>
        <li><strong>Short utterances:</strong> politeness doesn't require more words</li>
      </ul>
    </div>
    <div class="summary-card en-summary">
      <h4 class="en-title">English Architecture</h4>
      <ul>
        <li><strong>Distributed:</strong> pragmatic work spread across many devices</li>
        <li><strong>Pragmatic:</strong> social distance encoded via inference, not grammar</li>
        <li><strong>Hedge-based:</strong> politeness = stacking more hedging words</li>
        <li><strong>Indirect default:</strong> face-saving -- soften everything</li>
        <li><strong>Longer utterances:</strong> politeness requires more words</li>
      </ul>
    </div>
  </div>

  <div class="insight-box">
    <h4>The Pattern-Learner Insight</h4>
    German concentrates pragmatic signaling into a small set of <strong>dedicated, learnable mechanisms</strong> (particles, pronoun choice, verb mood). English distributes the same information across <strong>many ad hoc devices</strong> (intonation, hedging, register, passive voice). For pattern-oriented thinkers, the German system may actually be <em>more accessible</em> -- once you learn the 9 particles and the Du/Sie rules, you have the core toolkit. In English, the rules are implicit and context-dependent.
  </div>

  <figcaption>
    Both languages achieve the same communicative goals -- but German uses grammaticalized, dedicated mechanisms while English relies on optional, distributed strategies. Neither system is better; they are different architectures for the same human needs.
  </figcaption>
</figure>
</body>
</html>
