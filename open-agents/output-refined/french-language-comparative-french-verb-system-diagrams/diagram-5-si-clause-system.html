<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Si-Clause Tense Correspondence System</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --type1: #10b981;
    --type1-bg: #ecfdf5;
    --type2: #3b82f6;
    --type2-bg: #eff6ff;
    --type3: #8b5cf6;
    --type3-bg: #f5f3ff;
    --danger: #e63946;
    --danger-bg: #fef2f2;
    --en-color: #6b7280;
    --en-bg: #f3f4f6;
    --shared-color: #f59e0b;
    --shared-bg: #fffbeb;
    --muted: #6c757d;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --type1: #34d399;
      --type1-bg: #132e24;
      --type2: #60a5fa;
      --type2-bg: #1e293b;
      --type3: #a78bfa;
      --type3-bg: #1e1b3a;
      --danger: #ff6b6b;
      --danger-bg: #2a1515;
      --en-color: #9ca3af;
      --en-bg: #1f2937;
      --shared-color: #fbbf24;
      --shared-bg: #2a2510;
      --muted: #9a9ab0;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure {
    max-width: 1100px;
    width: 100%;
    background: var(--surface);
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
  }
  h2 { text-align: center; font-size: 1.4rem; margin-bottom: 0.3rem; }
  .subtitle { text-align: center; font-size: 0.95rem; color: var(--muted); margin-bottom: 2rem; }

  .correspondence-rows { display: flex; flex-direction: column; gap: 1.2rem; }
  .corr-row {
    display: grid;
    grid-template-columns: 100px 1fr 60px 1fr;
    gap: 0.5rem;
    align-items: center;
    border: 2px solid;
    border-radius: 12px;
    padding: 1rem;
  }
  .corr-row.type1 { border-color: var(--type1); }
  .corr-row.type2 { border-color: var(--type2); }
  .corr-row.type3 { border-color: var(--type3); }

  .row-label {
    font-weight: 700;
    font-size: 0.82rem;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }
  .corr-row.type1 .row-label { color: var(--type1); }
  .corr-row.type2 .row-label { color: var(--type2); }
  .corr-row.type3 .row-label { color: var(--type3); }

  .clause-box {
    border-radius: 8px;
    padding: 0.6rem 0.8rem;
  }
  .si-clause { background: var(--surface); border: 1px solid var(--border); }
  .result-clause { border: 1px solid var(--border); }
  .corr-row.type1 .result-clause { background: var(--type1-bg); }
  .corr-row.type2 .result-clause { background: var(--type2-bg); }
  .corr-row.type3 .result-clause { background: var(--type3-bg); }

  .clause-tense { font-weight: 700; font-size: 0.85rem; }
  .clause-example { font-size: 0.78rem; color: var(--muted); font-style: italic; margin-top: 0.2rem; }
  .clause-en { font-size: 0.75rem; color: var(--en-color); margin-top: 0.15rem; }

  .arrow-col {
    text-align: center;
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--muted);
  }

  .danger-box {
    margin-top: 1.5rem;
    background: var(--danger-bg);
    border: 3px solid var(--danger);
    border-radius: 12px;
    padding: 1rem 1.25rem;
    display: flex;
    align-items: center;
    gap: 1rem;
  }
  .danger-x {
    font-size: 2.5rem;
    font-weight: 900;
    color: var(--danger);
    line-height: 1;
  }
  .danger-text { font-size: 0.88rem; }
  .danger-text strong { color: var(--danger); }
  .danger-text .wrong { text-decoration: line-through; color: var(--danger); }

  .shared-mechanism {
    margin-top: 1.5rem;
    padding: 1rem;
    background: var(--shared-bg);
    border: 2px solid var(--shared-color);
    border-radius: 10px;
    font-size: 0.85rem;
  }
  .shared-mechanism h4 { color: var(--shared-color); margin-bottom: 0.4rem; }

  .en-comparison {
    margin-top: 1.5rem;
    padding: 1rem;
    background: var(--en-bg);
    border: 2px solid var(--en-color);
    border-radius: 10px;
    font-size: 0.85rem;
  }
  .en-comparison h4 { color: var(--en-color); margin-bottom: 0.4rem; }

  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid var(--border);
  }
  figcaption strong { display: block; font-size: 1.05rem; margin-bottom: 0.4rem; }
  figcaption span { font-size: 0.88rem; color: var(--muted); line-height: 1.5; }
  @media (max-width: 750px) {
    .corr-row { grid-template-columns: 1fr; gap: 0.3rem; }
    .arrow-col { transform: rotate(90deg); }
    figure { padding: 1.2rem; }
  }
</style>
</head>
<body>
<figure>
  <h2>Si-Clause Tense Correspondence System</h2>
  <p class="subtitle">Three types, strict rules, one absolute prohibition. One of the closest French-English parallels.</p>

  <div class="correspondence-rows">
    <!-- Type 1: Real -->
    <div class="corr-row type1">
      <div class="row-label">Type 1<br>Real / Possible</div>
      <div class="clause-box si-clause">
        <div class="clause-tense">Si + PRESENT</div>
        <div class="clause-example">Si tu viens...</div>
        <div class="clause-en">If you come...</div>
      </div>
      <div class="arrow-col">&rarr;</div>
      <div class="clause-box result-clause">
        <div class="clause-tense">FUTURE (or Present)</div>
        <div class="clause-example">...je serai content</div>
        <div class="clause-en">...I will be happy</div>
      </div>
    </div>

    <!-- Type 2: Hypothetical -->
    <div class="corr-row type2">
      <div class="row-label">Type 2<br>Hypothetical</div>
      <div class="clause-box si-clause">
        <div class="clause-tense">Si + IMPERFECT</div>
        <div class="clause-example">Si j'avais de l'argent...</div>
        <div class="clause-en">If I had money...</div>
      </div>
      <div class="arrow-col">&rarr;</div>
      <div class="clause-box result-clause">
        <div class="clause-tense">CONDITIONAL</div>
        <div class="clause-example">...j'ach&egrave;terais une maison</div>
        <div class="clause-en">...I would buy a house</div>
      </div>
    </div>

    <!-- Type 3: Contrary to past -->
    <div class="corr-row type3">
      <div class="row-label">Type 3<br>Contrary to Past</div>
      <div class="clause-box si-clause">
        <div class="clause-tense">Si + PLUS-QUE-PARFAIT</div>
        <div class="clause-example">Si j'avais &eacute;tudi&eacute;...</div>
        <div class="clause-en">If I had studied...</div>
      </div>
      <div class="arrow-col">&rarr;</div>
      <div class="clause-box result-clause">
        <div class="clause-tense">CONDITIONAL PAST</div>
        <div class="clause-example">...j'aurais r&eacute;ussi</div>
        <div class="clause-en">...I would have passed</div>
      </div>
    </div>
  </div>

  <!-- NEVER rule -->
  <div class="danger-box">
    <div class="danger-x">&#x2717;</div>
    <div class="danger-text">
      <strong>NEVER: Si + conditional</strong><br>
      <span class="wrong">Si j'aurais...</span> is one of the most stigmatized errors in French.<br>
      The conditional goes ONLY in the result clause, NEVER after "si."<br>
      <em>"Les si n'aiment pas les -rais"</em> (The "ifs" don't like the "-rais" endings) -- French mnemonic
    </div>
  </div>

  <!-- Shared mechanism -->
  <div class="shared-mechanism">
    <h4>Shared Pattern: The "Fake Past" for Unreality</h4>
    <p>Both French and English use a PAST tense form to express PRESENT hypotheticals. This is not real past time -- it is "fake past" used to signal unreality:</p>
    <p style="margin-top:0.3rem;">French: "Si j'<strong>avais</strong> de l'argent" (imperfect -- but means NOW, not then)</p>
    <p>English: "If I <strong>had</strong> money" (past tense -- but means NOW, not then)</p>
    <p style="margin-top:0.3rem;color:var(--muted);font-size:0.82rem;">This "fake past = irrealis" mechanism is shared across many Indo-European languages. The tense form says "past" but the meaning says "unreal present."</p>
  </div>

  <!-- English comparison -->
  <div class="en-comparison">
    <h4>English Comparison: Nearly Parallel</h4>
    <p>The si-clause system maps remarkably well to English conditionals. Type 1 (present/future), Type 2 (past/would), and Type 3 (past perfect/would have) are structurally almost identical. This is one of the closest structural parallels between French and English verb systems -- a welcome island of regularity for learners navigating very different grammatical terrain.</p>
  </div>

  <figcaption>
    <strong>Figure 5: Si-Clause Tense Correspondence System</strong>
    <span>French conditional sentences follow three strict tense-matching patterns. Type 1 (real possibility) pairs present with future. Type 2 (hypothetical) pairs imperfect with conditional. Type 3 (contrary to past fact) pairs plus-que-parfait with conditional past. The absolute rule: conditional is NEVER used after "si." Both French and English share the "fake past for unreality" mechanism, making this one of the most structurally parallel features between the two languages.</span>
  </figcaption>
</figure>
</body>
</html>
