<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>French Tense-Mood Grid vs. English Tense-Aspect Grid</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --accent-fr: #3b82f6;
    --accent-en: #10b981;
    --accent-fr-bg: #eff6ff;
    --accent-en-bg: #ecfdf5;
    --accent-shared: #8b5cf6;
    --accent-shared-bg: #f5f3ff;
    --accent-unique: #f59e0b;
    --accent-unique-bg: #fffbeb;
    --muted: #6c757d;
    --caption-bg: #f8f9fa;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --accent-fr: #60a5fa;
      --accent-en: #34d399;
      --accent-fr-bg: #1e293b;
      --accent-en-bg: #132e24;
      --accent-shared: #a78bfa;
      --accent-shared-bg: #1e1b3a;
      --accent-unique: #fbbf24;
      --accent-unique-bg: #2a2510;
      --muted: #9a9ab0;
      --caption-bg: #1a1a2e;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure {
    max-width: 1200px;
    width: 100%;
    background: var(--surface);
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
  }
  h2 { text-align: center; font-size: 1.4rem; margin-bottom: 0.3rem; }
  .subtitle { text-align: center; font-size: 0.95rem; color: var(--muted); margin-bottom: 2rem; }
  .grids { display: flex; flex-direction: column; gap: 2rem; }
  .grid-section { border: 2px solid var(--border); border-radius: 12px; padding: 1.5rem; }
  .grid-section.french { border-color: var(--accent-fr); }
  .grid-section.english { border-color: var(--accent-en); }
  .grid-title {
    font-size: 1.1rem;
    font-weight: 700;
    margin-bottom: 0.2rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .grid-title .tag {
    font-size: 0.7rem;
    padding: 2px 8px;
    border-radius: 20px;
    font-weight: 600;
    text-transform: uppercase;
  }
  .french .tag { background: var(--accent-fr-bg); color: var(--accent-fr); }
  .english .tag { background: var(--accent-en-bg); color: var(--accent-en); }
  .grid-subtitle { font-size: 0.85rem; color: var(--muted); margin-bottom: 1rem; }
  table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
  th, td { padding: 0.5rem 0.6rem; border: 1px solid var(--border); text-align: center; vertical-align: middle; }
  th { background: var(--surface); font-weight: 700; font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.03em; }
  .french td.cell { background: var(--accent-fr-bg); }
  .english td.cell { background: var(--accent-en-bg); }
  td.shared { background: var(--accent-shared-bg) !important; }
  td.unique { background: var(--accent-unique-bg) !important; font-weight: 600; }
  td.empty { background: var(--surface); color: var(--muted); font-style: italic; }
  .form-example { display: block; font-size: 0.72rem; color: var(--muted); margin-top: 2px; font-style: italic; }
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 1.2rem;
    margin-top: 1.5rem;
    justify-content: center;
    font-size: 0.82rem;
  }
  .legend-item { display: flex; align-items: center; gap: 0.4rem; }
  .legend-swatch {
    width: 16px; height: 16px;
    border-radius: 4px;
    border: 1px solid var(--border);
  }
  .insight-box {
    margin-top: 1.5rem;
    padding: 1rem 1.25rem;
    border-radius: 8px;
    border-left: 4px solid var(--accent-shared);
    background: var(--accent-shared-bg);
    font-size: 0.88rem;
  }
  .insight-box strong { display: block; margin-bottom: 0.3rem; }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid var(--border);
  }
  figcaption strong { display: block; font-size: 1.05rem; margin-bottom: 0.4rem; }
  figcaption span { font-size: 0.88rem; color: var(--muted); line-height: 1.5; }
  @media (max-width: 800px) {
    figure { padding: 1.2rem; }
    table { font-size: 0.72rem; }
    th, td { padding: 0.35rem; }
    .form-example { font-size: 0.65rem; }
  }
</style>
</head>
<body>
<figure>
  <h2>The French Tense-Mood Grid vs. English Tense-Aspect Grid</h2>
  <p class="subtitle">French builds through INFLECTION (one word). English builds through PERIPHRASIS (stacked auxiliaries).</p>

  <div class="grids">
    <!-- FRENCH GRID -->
    <div class="grid-section french">
      <div class="grid-title"><span class="tag">French</span> Tense-Mood Grid (~50 forms per verb)</div>
      <p class="grid-subtitle">Each cell = a single inflected word form. Built by morphology.</p>
      <table>
        <thead>
          <tr>
            <th></th>
            <th>Present</th>
            <th>Imperfect</th>
            <th>Pass&eacute; Simple</th>
            <th>Future</th>
            <th>Conditional</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <th>Indicative Simple</th>
            <td class="cell shared">je parle<span class="form-example">I speak / am speaking</span></td>
            <td class="cell unique">je parlais<span class="form-example">I was speaking / used to speak</span></td>
            <td class="cell unique">je parlai<span class="form-example">I spoke (literary only)</span></td>
            <td class="cell shared">je parlerai<span class="form-example">I will speak</span></td>
            <td class="cell shared">je parlerais<span class="form-example">I would speak</span></td>
          </tr>
          <tr>
            <th>Indicative Compound</th>
            <td class="cell shared">j'ai parl&eacute;<span class="form-example">I spoke / have spoken</span></td>
            <td class="cell shared">j'avais parl&eacute;<span class="form-example">I had spoken</span></td>
            <td class="cell unique">j'eus parl&eacute;<span class="form-example">I had spoken (literary)</span></td>
            <td class="cell shared">j'aurai parl&eacute;<span class="form-example">I will have spoken</span></td>
            <td class="cell shared">j'aurais parl&eacute;<span class="form-example">I would have spoken</span></td>
          </tr>
          <tr>
            <th>Subjunctive</th>
            <td class="cell unique">que je parle<span class="form-example">that I speak (doubt/desire)</span></td>
            <td class="cell unique">que j'aie parl&eacute;<span class="form-example">that I have spoken</span></td>
            <td class="cell unique" style="font-style:italic;opacity:0.7">que je parlasse<span class="form-example">literary/archaic</span></td>
            <td class="cell empty" colspan="2">No subjunctive future</td>
          </tr>
          <tr>
            <th>Imperative</th>
            <td class="cell">parle! parlons! parlez!<span class="form-example">3 forms only</span></td>
            <td class="cell empty" colspan="4">Imperative exists only in present</td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- ENGLISH GRID -->
    <div class="grid-section english">
      <div class="grid-title"><span class="tag">English</span> Tense-Aspect Grid (12 combinations)</div>
      <p class="grid-subtitle">Each cell = auxiliary stack + main verb. Built by periphrasis.</p>
      <table>
        <thead>
          <tr>
            <th></th>
            <th>Simple</th>
            <th>Progressive</th>
            <th>Perfect</th>
            <th>Perfect Progressive</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <th>Present</th>
            <td class="cell shared">I speak<span class="form-example">1 word</span></td>
            <td class="cell unique">I am speaking<span class="form-example">2 words (no French equiv.)</span></td>
            <td class="cell shared">I have spoken<span class="form-example">2 words</span></td>
            <td class="cell unique">I have been speaking<span class="form-example">3 words (no French equiv.)</span></td>
          </tr>
          <tr>
            <th>Past</th>
            <td class="cell shared">I spoke<span class="form-example">1 word</span></td>
            <td class="cell unique">I was speaking<span class="form-example">2 words (~ imparfait)</span></td>
            <td class="cell shared">I had spoken<span class="form-example">2 words</span></td>
            <td class="cell unique">I had been speaking<span class="form-example">3 words (no French equiv.)</span></td>
          </tr>
          <tr>
            <th>Future</th>
            <td class="cell shared">I will speak<span class="form-example">2 words</span></td>
            <td class="cell unique">I will be speaking<span class="form-example">3 words (no French equiv.)</span></td>
            <td class="cell shared">I will have spoken<span class="form-example">3 words</span></td>
            <td class="cell unique">I will have been speaking<span class="form-example">4 words (no French equiv.)</span></td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background:var(--accent-shared-bg);border-color:var(--accent-shared)"></div> Shared function (both languages)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--accent-unique-bg);border-color:var(--accent-unique)"></div> Unique to this language</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--accent-fr-bg);border-color:var(--accent-fr)"></div> French standard cell</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--accent-en-bg);border-color:var(--accent-en)"></div> English standard cell</div>
  </div>

  <div class="insight-box">
    <strong>The Pattern:</strong>
    French encodes person + number + tense + mood in a single word ("parlerions" = we-would-speak). English stacks auxiliaries before an invariant main verb ("we would have been speaking" = 5 separate words). French has more FORMS but simpler PHRASES. English has fewer forms but more complex phrases. Neither is simpler -- they distribute complexity differently.
  </div>

  <figcaption>
    <strong>Figure 1: The French Tense-Mood Grid vs. English Tense-Aspect Grid</strong>
    <span>French organizes its verb system around mood (indicative, subjunctive, imperative) and tense, building each cell from inflectional morphology. English organizes around tense and aspect (simple, progressive, perfect), building each cell from auxiliary stacking. Purple cells mark shared functional territory; amber cells mark features unique to one language -- notably, French has no progressive aspect and English has no living subjunctive.</span>
  </figcaption>
</figure>
</body>
</html>
