<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Passé Composé vs. Imparfait -- Aspect Distinction</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --pc-color: #e63946;
    --pc-bg: #fef2f2;
    --imp-color: #3b82f6;
    --imp-bg: #eff6ff;
    --en-color: #10b981;
    --en-bg: #ecfdf5;
    --muted: #6c757d;
    --timeline-bg: #f1f5f9;
    --meaning-bg: #fffbeb;
    --meaning-border: #f59e0b;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --pc-color: #ff6b6b;
      --pc-bg: #2a1515;
      --imp-color: #60a5fa;
      --imp-bg: #1e293b;
      --en-color: #34d399;
      --en-bg: #132e24;
      --muted: #9a9ab0;
      --timeline-bg: #1e2433;
      --meaning-bg: #2a2510;
      --meaning-border: #c49000;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure {
    max-width: 1100px;
    width: 100%;
    background: var(--surface);
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
  }
  h2 { text-align: center; font-size: 1.4rem; margin-bottom: 0.3rem; }
  .subtitle { text-align: center; font-size: 0.95rem; color: var(--muted); margin-bottom: 2rem; }

  .narrative-scene {
    background: var(--timeline-bg);
    border-radius: 12px;
    padding: 1.5rem;
    margin-bottom: 2rem;
  }
  .narrative-title { font-weight: 700; margin-bottom: 1rem; font-size: 0.95rem; }
  .timeline-track {
    position: relative;
    height: 180px;
    margin: 0.5rem 0;
  }
  .timeline-line {
    position: absolute;
    top: 90px;
    left: 0;
    right: 0;
    height: 3px;
    background: var(--border);
  }
  .timeline-label-past {
    position: absolute;
    top: 80px;
    left: 0;
    font-size: 0.7rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .imp-bar {
    position: absolute;
    height: 40px;
    background: var(--imp-bg);
    border: 2px solid var(--imp-color);
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--imp-color);
    padding: 0 12px;
  }
  .pc-mark {
    position: absolute;
    width: 4px;
    height: 50px;
    background: var(--pc-color);
    border-radius: 2px;
  }
  .pc-label {
    position: absolute;
    font-size: 0.72rem;
    font-weight: 700;
    color: var(--pc-color);
    white-space: nowrap;
  }
  .imp-bar.weather { top: 25px; left: 5%; width: 88%; }
  .imp-bar.birds { top: 75px; left: 15%; width: 60%; font-size: 0.7rem; }
  .pc-mark.thunder { top: 65px; left: 72%; }
  .pc-label.thunder { top: 120px; left: 68%; }
  .imp-bar.sleep { top: 25px; left: 5%; width: 55%; }
  .pc-mark.phone { top: 65px; left: 50%; }
  .pc-label.phone { top: 120px; left: 42%; }

  .aspect-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5rem;
    margin-bottom: 2rem;
  }
  .aspect-card {
    border-radius: 12px;
    padding: 1.25rem;
    border: 2px solid;
  }
  .aspect-card.pc { border-color: var(--pc-color); background: var(--pc-bg); }
  .aspect-card.imp { border-color: var(--imp-color); background: var(--imp-bg); }
  .aspect-card h3 { font-size: 1rem; margin-bottom: 0.5rem; }
  .aspect-card.pc h3 { color: var(--pc-color); }
  .aspect-card.imp h3 { color: var(--imp-color); }
  .aspect-card .visual { font-size: 1.5rem; text-align: center; margin: 0.5rem 0; letter-spacing: 0.2em; }
  .aspect-card ul { list-style: none; font-size: 0.82rem; }
  .aspect-card li { margin-bottom: 0.4rem; padding-left: 0.8rem; position: relative; }
  .aspect-card li::before { content: ""; position: absolute; left: 0; top: 0.5em; width: 6px; height: 6px; border-radius: 50%; }
  .aspect-card.pc li::before { background: var(--pc-color); }
  .aspect-card.imp li::before { background: var(--imp-color); }

  .meaning-shift {
    background: var(--meaning-bg);
    border: 2px solid var(--meaning-border);
    border-radius: 12px;
    padding: 1.25rem;
    margin-bottom: 2rem;
  }
  .meaning-shift h3 { font-size: 1rem; margin-bottom: 0.75rem; }
  .shift-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; font-size: 0.82rem; }
  .shift-item { display: flex; align-items: center; gap: 0.5rem; padding: 0.4rem; border-radius: 6px; }
  .shift-imp { color: var(--imp-color); font-weight: 600; }
  .shift-pc { color: var(--pc-color); font-weight: 600; }
  .shift-arrow { color: var(--muted); }

  .english-comparison {
    background: var(--en-bg);
    border: 2px solid var(--en-color);
    border-radius: 12px;
    padding: 1.25rem;
  }
  .english-comparison h3 { color: var(--en-color); font-size: 1rem; margin-bottom: 0.75rem; }
  .comparison-row {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 0.5rem;
    align-items: center;
    font-size: 0.82rem;
    margin-bottom: 0.4rem;
    padding: 0.3rem 0;
    border-bottom: 1px solid var(--border);
  }
  .comparison-row:last-child { border-bottom: none; }
  .comp-fr { font-weight: 600; }
  .comp-arrow { color: var(--muted); text-align: center; }
  .comp-en { color: var(--en-color); }

  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid var(--border);
  }
  figcaption strong { display: block; font-size: 1.05rem; margin-bottom: 0.4rem; }
  figcaption span { font-size: 0.88rem; color: var(--muted); line-height: 1.5; }
  @media (max-width: 700px) {
    .aspect-grid, .shift-grid { grid-template-columns: 1fr; }
    figure { padding: 1.2rem; }
  }
</style>
</head>
<body>
<figure>
  <h2>Pass&eacute; Compos&eacute; vs. Imparfait</h2>
  <p class="subtitle">The most important distinction in French past tense: COMPLETED events vs. ONGOING background</p>

  <!-- Narrative timeline -->
  <div class="narrative-scene">
    <div class="narrative-title">Narrative Example: "Il faisait beau. Les oiseaux chantaient. Soudain, un coup de tonnerre a retenti."</div>
    <div class="timeline-track">
      <div class="timeline-line"></div>
      <div class="timeline-label-past">PAST</div>
      <div class="imp-bar weather">Il faisait beau (IMPARFAIT -- background)</div>
      <div class="imp-bar birds">Les oiseaux chantaient (IMPARFAIT -- ongoing)</div>
      <div class="pc-mark thunder"></div>
      <div class="pc-label thunder">a retenti (PASS&Eacute; COMPOS&Eacute; -- punctual event)</div>
    </div>
    <div style="font-size:0.8rem;color:var(--muted);margin-top:0.5rem;text-align:center;">
      Imparfait = wide horizontal bars (ongoing). Pass&eacute; compos&eacute; = vertical marks (completed, bounded).
    </div>
  </div>

  <!-- Aspect cards -->
  <div class="aspect-grid">
    <div class="aspect-card pc">
      <h3>Pass&eacute; Compos&eacute; = Perfective</h3>
      <div class="visual">|</div>
      <p style="text-align:center;font-size:0.78rem;margin-bottom:0.5rem;">Bounded. A point or completed arc.</p>
      <ul>
        <li>Single completed action: "J'ai mang&eacute; une pomme"</li>
        <li>Sequence of events: "Je suis arriv&eacute;, j'ai ouvert la porte"</li>
        <li>Specific duration: "J'ai travaill&eacute; pendant 3 heures"</li>
        <li>Change of state: "Il a commenc&eacute; &agrave; pleuvoir"</li>
      </ul>
    </div>
    <div class="aspect-card imp">
      <h3>Imparfait = Imperfective</h3>
      <div class="visual">~~~~~~~~</div>
      <p style="text-align:center;font-size:0.78rem;margin-bottom:0.5rem;">Unbounded. Ongoing, habitual, or descriptive.</p>
      <ul>
        <li>Background/scene: "Il pleuvait, les rues &eacute;taient mouill&eacute;es"</li>
        <li>Habitual past: "Je jouais au football chaque samedi"</li>
        <li>Ongoing interrupted: "Je dormais quand le t&eacute;l&eacute;phone a sonn&eacute;"</li>
        <li>States/descriptions: "Elle avait les cheveux blonds"</li>
      </ul>
    </div>
  </div>

  <!-- Meaning-shift pairs -->
  <div class="meaning-shift">
    <h3>Same Verb, Different Aspect = Different Meaning</h3>
    <div class="shift-grid">
      <div class="shift-item">
        <span class="shift-imp">connaissais</span> <span class="shift-arrow">=</span> knew (ongoing)
        <span class="shift-arrow">vs.</span>
        <span class="shift-pc">ai connu</span> <span class="shift-arrow">=</span> met (moment)
      </div>
      <div class="shift-item">
        <span class="shift-imp">savais</span> <span class="shift-arrow">=</span> knew (state)
        <span class="shift-arrow">vs.</span>
        <span class="shift-pc">ai su</span> <span class="shift-arrow">=</span> found out
      </div>
      <div class="shift-item">
        <span class="shift-imp">voulais</span> <span class="shift-arrow">=</span> wanted (desire)
        <span class="shift-arrow">vs.</span>
        <span class="shift-pc">ai voulu</span> <span class="shift-arrow">=</span> tried to
      </div>
      <div class="shift-item">
        <span class="shift-imp">pouvais</span> <span class="shift-arrow">=</span> was able to
        <span class="shift-arrow">vs.</span>
        <span class="shift-pc">ai pu</span> <span class="shift-arrow">=</span> managed to
      </div>
    </div>
  </div>

  <!-- English comparison -->
  <div class="english-comparison">
    <h3>English Comparison</h3>
    <div class="comparison-row">
      <div class="comp-fr">Imparfait: "Je mangeais"</div>
      <div class="comp-arrow">&asymp;</div>
      <div class="comp-en">"I was eating" (progressive) OR "I used to eat" (habitual)</div>
    </div>
    <div class="comparison-row">
      <div class="comp-fr">Pass&eacute; compos&eacute;: "J'ai mang&eacute;"</div>
      <div class="comp-arrow">&asymp;</div>
      <div class="comp-en">"I ate" (simple past) OR "I have eaten" (present perfect)</div>
    </div>
    <div class="comparison-row">
      <div class="comp-fr" style="font-weight:400;font-style:italic;">English "I ate" can be EITHER completed or habitual. French FORCES a choice.</div>
      <div class="comp-arrow"></div>
      <div class="comp-en" style="font-style:italic;">"When I was young, I ate candy" -- is this habitual or completed? English is ambiguous; French is explicit.</div>
    </div>
  </div>

  <figcaption>
    <strong>Figure 2: Pass&eacute; Compos&eacute; vs. Imparfait -- The Aspect Distinction</strong>
    <span>Both tenses refer to past time, but they encode fundamentally different ASPECTS. The pass&eacute; compos&eacute; (perfective) presents events as completed, bounded wholes. The imparfait (imperfective) presents events as ongoing, habitual, or descriptive background. In narrative, the imparfait sets the scene while the pass&eacute; compos&eacute; advances the plot. Some stative verbs change meaning entirely between the two aspects. English approximates this with simple past vs. past progressive, but the mapping is imperfect.</span>
  </figcaption>
</figure>
</body>
</html>
