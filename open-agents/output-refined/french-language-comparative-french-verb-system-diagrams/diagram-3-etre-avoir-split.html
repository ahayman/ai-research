<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Être/Avoir Auxiliary Split</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --etre-color: #8b5cf6;
    --etre-bg: #f5f3ff;
    --avoir-color: #3b82f6;
    --avoir-bg: #eff6ff;
    --both-color: #f59e0b;
    --both-bg: #fffbeb;
    --en-color: #10b981;
    --en-bg: #ecfdf5;
    --muted: #6c757d;
    --danger: #e63946;
    --danger-bg: #fef2f2;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --etre-color: #a78bfa;
      --etre-bg: #1e1b3a;
      --avoir-color: #60a5fa;
      --avoir-bg: #1e293b;
      --both-color: #fbbf24;
      --both-bg: #2a2510;
      --en-color: #34d399;
      --en-bg: #132e24;
      --muted: #9a9ab0;
      --danger: #ff6b6b;
      --danger-bg: #2a1515;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure {
    max-width: 1100px;
    width: 100%;
    background: var(--surface);
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
  }
  h2 { text-align: center; font-size: 1.4rem; margin-bottom: 0.3rem; }
  .subtitle { text-align: center; font-size: 0.95rem; color: var(--muted); margin-bottom: 2rem; }
  .diagram-wrapper { overflow-x: auto; padding: 0.5rem; }
  svg text { font-family: 'Segoe UI', system-ui, sans-serif; }
  .agreement-rules {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
    margin-top: 1.5rem;
  }
  .rule-card {
    padding: 1rem;
    border-radius: 10px;
    border: 2px solid;
    font-size: 0.82rem;
  }
  .rule-card.etre { border-color: var(--etre-color); background: var(--etre-bg); }
  .rule-card.avoir { border-color: var(--avoir-color); background: var(--avoir-bg); }
  .rule-card h4 { margin-bottom: 0.5rem; font-size: 0.9rem; }
  .rule-card.etre h4 { color: var(--etre-color); }
  .rule-card.avoir h4 { color: var(--avoir-color); }
  .rule-example { font-style: italic; margin: 0.3rem 0; }
  .rule-example .agreed { font-weight: 700; text-decoration: underline; }
  .english-note {
    margin-top: 1.5rem;
    padding: 1rem;
    background: var(--en-bg);
    border: 2px solid var(--en-color);
    border-radius: 10px;
    font-size: 0.85rem;
  }
  .english-note h4 { color: var(--en-color); margin-bottom: 0.5rem; }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid var(--border);
  }
  figcaption strong { display: block; font-size: 1.05rem; margin-bottom: 0.4rem; }
  figcaption span { font-size: 0.88rem; color: var(--muted); line-height: 1.5; }
  @media (max-width: 700px) {
    .agreement-rules { grid-template-columns: 1fr; }
    figure { padding: 1.2rem; }
  }
</style>
</head>
<body>
<figure>
  <h2>The &Ecirc;tre / Avoir Auxiliary Split</h2>
  <p class="subtitle">Decision tree: Which auxiliary for compound tenses? English has only "have." French has two.</p>

  <div class="diagram-wrapper">
    <svg viewBox="0 0 960 600" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title-aux desc-aux">
      <title id="title-aux">Être/Avoir Auxiliary Decision Tree</title>
      <desc id="desc-aux">A decision tree showing how French selects between être and avoir as the auxiliary verb in compound tenses. Reflexive verbs always use être. DR MRS VANDERTRAMP verbs use être. All other verbs use avoir. Some verbs take either auxiliary with a change in meaning.</desc>

      <!-- Root node -->
      <rect x="350" y="10" width="260" height="50" rx="25" fill="var(--surface)" stroke="var(--fg)" stroke-width="2"/>
      <text x="480" y="42" text-anchor="middle" font-size="15" font-weight="700" fill="var(--fg)">Which auxiliary?</text>

      <!-- Branch lines from root -->
      <line x1="420" y1="60" x2="180" y2="110" stroke="var(--border)" stroke-width="2"/>
      <line x1="480" y1="60" x2="480" y2="110" stroke="var(--border)" stroke-width="2"/>
      <line x1="540" y1="60" x2="780" y2="110" stroke="var(--border)" stroke-width="2"/>

      <!-- Question 1: Reflexive? -->
      <rect x="80" y="110" width="200" height="44" rx="10" fill="var(--etre-bg)" stroke="var(--etre-color)" stroke-width="2"/>
      <text x="180" y="128" text-anchor="middle" font-size="12" font-weight="600" fill="var(--fg)">Is it reflexive?</text>
      <text x="180" y="144" text-anchor="middle" font-size="11" fill="var(--muted)">se laver, s'asseoir, se lever</text>

      <!-- Arrow to ÊTRE -->
      <line x1="180" y1="154" x2="180" y2="190" stroke="var(--etre-color)" stroke-width="2" marker-end="url(#arrow-etre)"/>
      <text x="195" y="178" font-size="11" font-weight="700" fill="var(--etre-color)">YES</text>

      <!-- ÊTRE box (reflexive) -->
      <rect x="100" y="190" width="160" height="60" rx="10" fill="var(--etre-color)" stroke="var(--etre-color)" stroke-width="2"/>
      <text x="180" y="215" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">ÊTRE</text>
      <text x="180" y="235" text-anchor="middle" font-size="10" fill="#fff">Always. No exceptions.</text>

      <!-- Examples -->
      <text x="180" y="270" text-anchor="middle" font-size="10" fill="var(--etre-color)" font-style="italic">Elle s'est levée</text>
      <text x="180" y="285" text-anchor="middle" font-size="10" fill="var(--etre-color)" font-style="italic">Ils se sont lavés</text>

      <!-- Question 2: DR MRS VANDERTRAMP? -->
      <rect x="340" y="110" width="280" height="44" rx="10" fill="var(--etre-bg)" stroke="var(--etre-color)" stroke-width="2"/>
      <text x="480" y="128" text-anchor="middle" font-size="12" font-weight="600" fill="var(--fg)">DR MRS VANDERTRAMP verb?</text>
      <text x="480" y="144" text-anchor="middle" font-size="10" fill="var(--muted)">~17 verbs of motion/change of state</text>

      <!-- Arrow to ÊTRE -->
      <line x1="480" y1="154" x2="480" y2="190" stroke="var(--etre-color)" stroke-width="2"/>
      <text x="495" y="178" font-size="11" font-weight="700" fill="var(--etre-color)">YES</text>

      <!-- ÊTRE box (VANDERTRAMP) -->
      <rect x="390" y="190" width="180" height="60" rx="10" fill="var(--etre-color)" stroke="var(--etre-color)" stroke-width="2"/>
      <text x="480" y="215" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">ÊTRE</text>
      <text x="480" y="235" text-anchor="middle" font-size="10" fill="#fff">Agree participle with SUBJECT</text>

      <!-- DR MRS VANDERTRAMP list -->
      <rect x="350" y="270" width="260" height="190" rx="8" fill="var(--etre-bg)" stroke="var(--etre-color)" stroke-width="1" stroke-dasharray="4"/>
      <text x="480" y="290" text-anchor="middle" font-size="11" font-weight="700" fill="var(--etre-color)">DR MRS VANDERTRAMP</text>
      <text x="370" y="310" font-size="9.5" fill="var(--fg)"><tspan font-weight="700">D</tspan>evenir (become)</text>
      <text x="370" y="325" font-size="9.5" fill="var(--fg)"><tspan font-weight="700">R</tspan>evenir (come back)</text>
      <text x="370" y="340" font-size="9.5" fill="var(--fg)"><tspan font-weight="700">M</tspan>onter (go up) *</text>
      <text x="370" y="355" font-size="9.5" fill="var(--fg)"><tspan font-weight="700">R</tspan>ester (stay)</text>
      <text x="370" y="370" font-size="9.5" fill="var(--fg)"><tspan font-weight="700">S</tspan>ortir (go out) *</text>
      <text x="370" y="385" font-size="9.5" fill="var(--fg)"><tspan font-weight="700">V</tspan>enir (come)</text>
      <text x="370" y="400" font-size="9.5" fill="var(--fg)"><tspan font-weight="700">A</tspan>ller (go)</text>
      <text x="370" y="415" font-size="9.5" fill="var(--fg)"><tspan font-weight="700">N</tspan>aître (be born)</text>
      <text x="370" y="430" font-size="9.5" fill="var(--fg)"><tspan font-weight="700">D</tspan>escendre (go down) *</text>

      <text x="500" y="310" font-size="9.5" fill="var(--fg)"><tspan font-weight="700">E</tspan>ntrer (enter)</text>
      <text x="500" y="325" font-size="9.5" fill="var(--fg)"><tspan font-weight="700">R</tspan>entrer (return) *</text>
      <text x="500" y="340" font-size="9.5" fill="var(--fg)"><tspan font-weight="700">T</tspan>omber (fall)</text>
      <text x="500" y="355" font-size="9.5" fill="var(--fg)"><tspan font-weight="700">R</tspan>etourner (go back) *</text>
      <text x="500" y="370" font-size="9.5" fill="var(--fg)"><tspan font-weight="700">A</tspan>rriver (arrive)</text>
      <text x="500" y="385" font-size="9.5" fill="var(--fg)"><tspan font-weight="700">M</tspan>ourir (die)</text>
      <text x="500" y="400" font-size="9.5" fill="var(--fg)"><tspan font-weight="700">P</tspan>artir (leave)</text>
      <text x="500" y="415" font-size="9.5" fill="var(--fg)"><tspan font-weight="700">P</tspan>asser (pass by) *</text>
      <text x="480" y="450" text-anchor="middle" font-size="9" fill="var(--both-color)" font-weight="600">* = can also take AVOIR (meaning changes)</text>

      <!-- Question 3: All others -->
      <rect x="680" y="110" width="200" height="44" rx="10" fill="var(--avoir-bg)" stroke="var(--avoir-color)" stroke-width="2"/>
      <text x="780" y="128" text-anchor="middle" font-size="12" font-weight="600" fill="var(--fg)">All other verbs</text>
      <text x="780" y="144" text-anchor="middle" font-size="11" fill="var(--muted)">~85% of all French verbs</text>

      <!-- Arrow to AVOIR -->
      <line x1="780" y1="154" x2="780" y2="190" stroke="var(--avoir-color)" stroke-width="2"/>

      <!-- AVOIR box -->
      <rect x="700" y="190" width="160" height="60" rx="10" fill="var(--avoir-color)" stroke="var(--avoir-color)" stroke-width="2"/>
      <text x="780" y="215" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">AVOIR</text>
      <text x="780" y="235" text-anchor="middle" font-size="10" fill="#fff">No agreement (usually)</text>

      <!-- Examples -->
      <text x="780" y="270" text-anchor="middle" font-size="10" fill="var(--avoir-color)" font-style="italic">J'ai mangé</text>
      <text x="780" y="285" text-anchor="middle" font-size="10" fill="var(--avoir-color)" font-style="italic">Elle a vu</text>
      <text x="780" y="300" text-anchor="middle" font-size="10" fill="var(--avoir-color)" font-style="italic">Il a dormi</text>

      <!-- BOTH box -->
      <rect x="700" y="330" width="200" height="90" rx="10" fill="var(--both-bg)" stroke="var(--both-color)" stroke-width="2"/>
      <text x="800" y="352" text-anchor="middle" font-size="11" font-weight="700" fill="var(--both-color)">EXCEPT: preceding DO</text>
      <text x="800" y="372" text-anchor="middle" font-size="10" fill="var(--fg)">If direct object PRECEDES,</text>
      <text x="800" y="387" text-anchor="middle" font-size="10" fill="var(--fg)">participle agrees with it:</text>
      <text x="800" y="407" text-anchor="middle" font-size="10" fill="var(--both-color)" font-style="italic">La pomme que j'ai mangée</text>

      <!-- Meaning change examples -->
      <rect x="55" y="340" width="250" height="120" rx="8" fill="var(--both-bg)" stroke="var(--both-color)" stroke-width="2"/>
      <text x="180" y="362" text-anchor="middle" font-size="11" font-weight="700" fill="var(--both-color)">Verbs Taking EITHER (meaning shifts)</text>
      <text x="70" y="385" font-size="9.5" fill="var(--fg)">monter + <tspan fill="var(--avoir-color)" font-weight="600">avoir</tspan> = to carry up</text>
      <text x="70" y="400" font-size="9.5" fill="var(--fg)">monter + <tspan fill="var(--etre-color)" font-weight="600">être</tspan> = to go up</text>
      <text x="70" y="420" font-size="9.5" fill="var(--fg)">sortir + <tspan fill="var(--avoir-color)" font-weight="600">avoir</tspan> = to take out</text>
      <text x="70" y="435" font-size="9.5" fill="var(--fg)">sortir + <tspan fill="var(--etre-color)" font-weight="600">être</tspan> = to go out</text>

      <!-- English comparison box -->
      <rect x="55" y="490" width="850" height="50" rx="10" fill="var(--en-bg)" stroke="var(--en-color)" stroke-width="2"/>
      <text x="480" y="515" text-anchor="middle" font-size="13" fill="var(--en-color)" font-weight="600">English: ONLY "have" as perfect auxiliary. No split. No agreement. "She has gone" / "They have gone" -- invariable.</text>
      <text x="480" y="535" text-anchor="middle" font-size="11" fill="var(--muted)">This entire decision tree has no equivalent in English.</text>

      <defs>
        <marker id="arrow-etre" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
          <polygon points="0 0, 10 3.5, 0 7" fill="var(--etre-color)"/>
        </marker>
      </defs>
    </svg>
  </div>

  <div class="agreement-rules">
    <div class="rule-card etre">
      <h4>&Ecirc;tre: Participle agrees with SUBJECT</h4>
      <p class="rule-example">Elle est all<span class="agreed">ée</span> (FEM.SG)</p>
      <p class="rule-example">Ils sont part<span class="agreed">is</span> (MASC.PL)</p>
      <p class="rule-example">Elles sont reven<span class="agreed">ues</span> (FEM.PL)</p>
      <p style="font-size:0.78rem;color:var(--muted);margin-top:0.5rem;">Always. No conditions. Subject gender/number flows to participle.</p>
    </div>
    <div class="rule-card avoir">
      <h4>Avoir: Participle agrees with PRECEDING direct object</h4>
      <p class="rule-example">La lettre que j'ai &eacute;cri<span class="agreed">te</span> (FEM.SG -- "lettre" precedes)</p>
      <p class="rule-example">Les fleurs que j'ai achet<span class="agreed">ées</span> (FEM.PL -- "fleurs" precedes)</p>
      <p class="rule-example">J'ai &eacute;crit la lettre (NO agreement -- "lettre" follows)</p>
      <p style="font-size:0.78rem;color:var(--muted);margin-top:0.5rem;">Only when DO comes BEFORE the verb. The hardest grammar rule in French.</p>
    </div>
  </div>

  <div class="english-note">
    <h4>English Comparison</h4>
    <p>English uses only "have" for all perfect tenses. "She has gone," "They have gone," "The letter I have written" -- the participle never changes form. The entire &ecirc;tre/avoir decision tree, the DR MRS VANDERTRAMP mnemonic, and the agreement rules represent an entire layer of French grammar that simply does not exist in English.</p>
  </div>

  <figcaption>
    <strong>Figure 3: The &Ecirc;tre/Avoir Auxiliary Split</strong>
    <span>French divides verbs into two classes for compound tense formation. Reflexive verbs always take &ecirc;tre. The ~17 DR MRS VANDERTRAMP verbs (motion/change of state) take &ecirc;tre. All others (~85%) take avoir. Some starred verbs take either auxiliary with a meaning change (transitive = avoir, intransitive = &ecirc;tre). Each auxiliary carries different agreement rules. English has no equivalent split.</span>
  </figcaption>
</figure>
</body>
</html>
