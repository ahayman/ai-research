<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Living Subjunctive -- Trigger Map</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --subj-color: #8b5cf6;
    --subj-bg: #f5f3ff;
    --necessity: #e63946;
    --necessity-bg: #fef2f2;
    --desire: #f59e0b;
    --desire-bg: #fffbeb;
    --emotion: #ec4899;
    --emotion-bg: #fdf2f8;
    --doubt: #3b82f6;
    --doubt-bg: #eff6ff;
    --conj: #10b981;
    --conj-bg: #ecfdf5;
    --en-color: #6b7280;
    --en-bg: #f3f4f6;
    --dead-color: #9ca3af;
    --muted: #6c757d;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --subj-color: #a78bfa;
      --subj-bg: #1e1b3a;
      --necessity: #ff6b6b;
      --necessity-bg: #2a1515;
      --desire: #fbbf24;
      --desire-bg: #2a2510;
      --emotion: #f472b6;
      --emotion-bg: #2a1525;
      --doubt: #60a5fa;
      --doubt-bg: #1e293b;
      --conj: #34d399;
      --conj-bg: #132e24;
      --en-color: #9ca3af;
      --en-bg: #1f2937;
      --dead-color: #4b5563;
      --muted: #9a9ab0;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure {
    max-width: 1100px;
    width: 100%;
    background: var(--surface);
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
  }
  h2 { text-align: center; font-size: 1.4rem; margin-bottom: 0.3rem; }
  .subtitle { text-align: center; font-size: 0.95rem; color: var(--muted); margin-bottom: 2rem; }

  .center-hub {
    text-align: center;
    margin-bottom: 2rem;
  }
  .hub-node {
    display: inline-block;
    background: var(--subj-color);
    color: #fff;
    padding: 0.8rem 2rem;
    border-radius: 30px;
    font-size: 1.1rem;
    font-weight: 700;
    box-shadow: 0 4px 16px rgba(139,92,246,0.3);
  }
  .hub-pattern {
    font-size: 0.85rem;
    color: var(--muted);
    margin-top: 0.5rem;
  }

  .trigger-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
    margin-bottom: 2rem;
  }
  .trigger-card {
    border: 2px solid;
    border-radius: 12px;
    padding: 1rem;
  }
  .trigger-card h3 {
    font-size: 0.95rem;
    margin-bottom: 0.6rem;
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }
  .trigger-card.necessity { border-color: var(--necessity); }
  .trigger-card.necessity h3 { color: var(--necessity); }
  .trigger-card.desire { border-color: var(--desire); }
  .trigger-card.desire h3 { color: var(--desire); }
  .trigger-card.emotion { border-color: var(--emotion); }
  .trigger-card.emotion h3 { color: var(--emotion); }
  .trigger-card.doubt { border-color: var(--doubt); }
  .trigger-card.doubt h3 { color: var(--doubt); }
  .trigger-card.conj { border-color: var(--conj); grid-column: 1 / -1; }
  .trigger-card.conj h3 { color: var(--conj); }

  .trigger-list { list-style: none; font-size: 0.82rem; }
  .trigger-list li { margin-bottom: 0.3rem; }
  .trigger-expr { font-weight: 700; }
  .trigger-example { color: var(--muted); font-style: italic; font-size: 0.78rem; display: block; margin-left: 1rem; }
  .conj-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 0.5rem; }

  .living-dead {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
    margin-bottom: 1.5rem;
  }
  .status-card {
    border-radius: 12px;
    padding: 1rem;
    text-align: center;
  }
  .status-card.living {
    background: var(--subj-bg);
    border: 2px solid var(--subj-color);
  }
  .status-card.dead {
    background: var(--en-bg);
    border: 2px solid var(--dead-color);
  }
  .status-card h3 { font-size: 1rem; margin-bottom: 0.5rem; }
  .status-card.living h3 { color: var(--subj-color); }
  .status-card.dead h3 { color: var(--dead-color); }
  .status-card .frequency {
    font-size: 2rem;
    font-weight: 700;
    margin: 0.3rem 0;
  }
  .status-card.living .frequency { color: var(--subj-color); }
  .status-card.dead .frequency { color: var(--dead-color); }
  .status-card .desc { font-size: 0.82rem; color: var(--muted); }
  .survivor-list { text-align: left; font-size: 0.78rem; color: var(--muted); margin-top: 0.5rem; font-style: italic; }

  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid var(--border);
  }
  figcaption strong { display: block; font-size: 1.05rem; margin-bottom: 0.4rem; }
  figcaption span { font-size: 0.88rem; color: var(--muted); line-height: 1.5; }
  @media (max-width: 700px) {
    .trigger-grid, .living-dead { grid-template-columns: 1fr; }
    .trigger-card.conj { grid-column: auto; }
    figure { padding: 1.2rem; }
  }
</style>
</head>
<body>
<figure>
  <h2>The Living Subjunctive -- Trigger Map</h2>
  <p class="subtitle">French requires the subjunctive daily. English's subjunctive is nearly extinct.</p>

  <div class="center-hub">
    <div class="hub-node">SUBJUNCTIVE</div>
    <p class="hub-pattern">Pattern: [trigger expression] + <strong>que</strong> + [subjunctive verb form]</p>
  </div>

  <div class="trigger-grid">
    <div class="trigger-card necessity">
      <h3>Necessity &amp; Obligation</h3>
      <ul class="trigger-list">
        <li><span class="trigger-expr">il faut que</span> + subj.<span class="trigger-example">Il faut que tu viennes (You must come)</span></li>
        <li><span class="trigger-expr">il est n&eacute;cessaire que</span> + subj.<span class="trigger-example">Il est n&eacute;cessaire que nous partions</span></li>
        <li><span class="trigger-expr">il est important que</span> + subj.</li>
        <li><span class="trigger-expr">il est essentiel que</span> + subj.</li>
      </ul>
    </div>

    <div class="trigger-card desire">
      <h3>Desire &amp; Will</h3>
      <ul class="trigger-list">
        <li><span class="trigger-expr">je veux que</span> + subj.<span class="trigger-example">Je veux que tu sois heureux (I want you to be happy)</span></li>
        <li><span class="trigger-expr">j'aimerais que</span> + subj.<span class="trigger-example">J'aimerais qu'il parte (I'd like him to leave)</span></li>
        <li><span class="trigger-expr">je souhaite que</span> + subj.</li>
        <li><span class="trigger-expr">je pr&eacute;f&egrave;re que</span> + subj.</li>
      </ul>
    </div>

    <div class="trigger-card emotion">
      <h3>Emotion</h3>
      <ul class="trigger-list">
        <li><span class="trigger-expr">je suis content que</span> + subj.<span class="trigger-example">Je suis content que tu sois l&agrave; (I'm glad you're here)</span></li>
        <li><span class="trigger-expr">c'est dommage que</span> + subj.<span class="trigger-example">C'est dommage qu'il pleuve (It's a shame it's raining)</span></li>
        <li><span class="trigger-expr">j'ai peur que</span> + subj.</li>
        <li><span class="trigger-expr">je suis surpris que</span> + subj.</li>
      </ul>
    </div>

    <div class="trigger-card doubt">
      <h3>Doubt &amp; Uncertainty</h3>
      <ul class="trigger-list">
        <li><span class="trigger-expr">je doute que</span> + subj.<span class="trigger-example">Je doute qu'il vienne (I doubt he'll come)</span></li>
        <li><span class="trigger-expr">il est possible que</span> + subj.<span class="trigger-example">Il est possible qu'elle ait raison (She may be right)</span></li>
        <li><span class="trigger-expr">je ne crois pas que</span> + subj.</li>
        <li><span class="trigger-expr">il semble que</span> + subj.</li>
      </ul>
    </div>

    <div class="trigger-card conj">
      <h3>Conjunctions (always + subjunctive)</h3>
      <div class="conj-grid">
        <div>
          <ul class="trigger-list">
            <li><span class="trigger-expr">bien que</span> (although)</li>
            <li><span class="trigger-expr">avant que</span> (before)</li>
            <li><span class="trigger-expr">pour que</span> (so that)</li>
          </ul>
        </div>
        <div>
          <ul class="trigger-list">
            <li><span class="trigger-expr">sans que</span> (without)</li>
            <li><span class="trigger-expr">&agrave; moins que</span> (unless)</li>
            <li><span class="trigger-expr">jusqu'&agrave; ce que</span> (until)</li>
          </ul>
        </div>
        <div>
          <ul class="trigger-list">
            <li><span class="trigger-expr">afin que</span> (in order that)</li>
            <li><span class="trigger-expr">pourvu que</span> (provided that)</li>
            <li><span class="trigger-expr">de peur que</span> (for fear that)</li>
          </ul>
        </div>
      </div>
    </div>
  </div>

  <!-- Living vs Dead -->
  <div class="living-dead">
    <div class="status-card living">
      <h3>French Subjunctive: ALIVE</h3>
      <div class="frequency">Daily</div>
      <div class="desc">Used multiple times per day by every French speaker.</div>
      <div class="desc" style="margin-top:0.3rem">"Il faut que..." alone accounts for thousands of daily uses.</div>
      <div class="desc" style="margin-top:0.3rem">Mandatory after dozens of trigger expressions.</div>
    </div>
    <div class="status-card dead">
      <h3>English Subjunctive: NEARLY EXTINCT</h3>
      <div class="frequency">~5 fossils</div>
      <div class="desc">Survives only in set phrases and formal style.</div>
      <div class="survivor-list">
        "If I <strong>were</strong> you" (but "was" gaining)<br>
        "God <strong>save</strong> the King"<br>
        "I suggest he <strong>leave</strong>" (mainly US)<br>
        "<strong>Be</strong> that as it may"<br>
        "Long <strong>live</strong> the queen"
      </div>
    </div>
  </div>

  <figcaption>
    <strong>Figure 4: The Living Subjunctive -- Trigger Map</strong>
    <span>The French subjunctive is mandatory after expressions of necessity, desire, emotion, doubt, and certain conjunctions. It is used multiple times daily by every French speaker. By contrast, the English subjunctive survives only in a handful of formulaic expressions and is increasingly replaced by indicative forms. Where French says "il faut que tu viennes" (subjunctive required), English says "you need to come" (infinitive construction, no subjunctive). This is one of the most dramatic living-vs.-dead contrasts between the two languages.</span>
  </figcaption>
</figure>
</body>
</html>
