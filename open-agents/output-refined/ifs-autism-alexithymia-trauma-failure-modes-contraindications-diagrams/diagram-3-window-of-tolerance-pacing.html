flowchart TD

    H["HYPERAROUSAL<br/>panic, flooding,<br/>dissociative flooding,<br/>fight/flight"]:::hyper
    H1["Markers:<br/>racing heart, shallow<br/>breath, can't slow down,<br/>tearful flooding,<br/>intrusive imagery"]:::hyper
    H2["IFS pacing:<br/>STOP unburdening;<br/>return to grounding;<br/>resource the system;<br/>direct access to<br/>flooding part if possible"]:::hyper

    UE["Upper edge of window"]:::edge
    UE1["Markers:<br/>activation rising,<br/>mild trembling,<br/>tightness,<br/>slight derealization"]:::edge
    UE2["IFS pacing:<br/>slow down; titrate;<br/>resource; check<br/>protector consent;<br/>do NOT proceed<br/>to unburdening"]:::edge

    W["WINDOW OF TOLERANCE<br/>integrative range —<br/>IFS work is possible"]:::window
    W1["Markers:<br/>steady breath, present,<br/>can name what's<br/>happening, body soft,<br/>tears flow without<br/>flooding"]:::window

    LE1["Markers:<br/>numbing rising,<br/>spacy, slowed thought,<br/>dimming presence"]:::edge
    LE2["IFS pacing:<br/>slow down; orient;<br/>movement, breath,<br/>stand up; do NOT<br/>continue inward work"]:::edge

    L1["Markers:<br/>flat affect, very<br/>slow speech, eyes<br/>distant, no felt<br/>sense in body"]:::hypo

  <figcaption>
    <strong>Figure 3:</strong> Window of tolerance (Siegel 1999) with IFS pacing decisions at each level. IFS work — particularly unburdening — is only safe within the window. At the edges, slow down. Outside the window, stop inward work and orient to the body and the room. Pure IFS does not have explicit window-of-tolerance vocabulary; integrating it from sensorimotor psychotherapy (Ogden), TIST (Fisher), or somatic experiencing (Levine) is one of the things integrative-trained clinicians bring that core IFS-Institute curriculum may not.
  </figcaption>
