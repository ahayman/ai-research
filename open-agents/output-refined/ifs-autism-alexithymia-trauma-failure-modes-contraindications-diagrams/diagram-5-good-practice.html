    <strong>Figure 5:</strong> What competently-supervised IFS practice looks like, as a positive foil to the failure-mode catalogue. The shape of good practice is not perfect protocol execution — it is the integration of pacing, contraindication awareness, willingness to refer out, and humility about the model's universal claims. Many of these markers do not appear in IFS-Institute Levels 1–3 training as core content; they come from integrative trauma training, supervision, and clinical experience.
