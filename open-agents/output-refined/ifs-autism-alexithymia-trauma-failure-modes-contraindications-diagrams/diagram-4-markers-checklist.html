  <figcaption>
    <strong>Figure 4:</strong> Specific markers for the four most common IFS failure modes. None of these alone is diagnostic — temporary intensification can follow real therapeutic work — but a pattern across multiple sessions or the presence of several markers in one session warrants explicit conversation with the therapist. This checklist is designed to be screenshot-portable: a sophisticated client can bring it to a session and use it to discuss what is happening, rather than waiting until the failure mode has compounded.
  </figcaption>
