  <figcaption>
    <strong>Figure 2:</strong> Clinical presentations mapped to IFS suitability. Green = IFS generally works well as primary modality. Amber = caution warranted; pure IFS may need adaptation or adjuncts. Orange = needs specific adaptation or specialized training. Red = contraindicated as primary modality without significant clinical scaffolding. The matrix is not a substitute for individual clinical judgment — but it captures the consensus of the trauma-and-dissociation field on where pure IFS fits and where it does not.
