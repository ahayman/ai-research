<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anatomy of a Semantic-Phonetic Compound</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --accent: #4361ee; --accent-light: #e8edff;
    --semantic: #2a9d8f; --semantic-bg: #d4f5f0;
    --phonetic: #e63946; --phonetic-bg: #ffe0e3;
    --muted: #6c757d; --caption-bg: #f8f9fa;
    --english: #7209b7;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a; --fg: #e8e8f0; --surface: #1a1a2e; --border: #2d2d44;
      --accent: #6b8aff; --accent-light: #1e2a4a;
      --semantic: #4ecdc4; --semantic-bg: #1a3a38;
      --phonetic: #ff6b6b; --phonetic-bg: #3a1a1a;
      --muted: #9a9ab0; --caption-bg: #1a1a2e;
      --english: #c77dff;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--fg); display: flex; justify-content: center; padding: 2rem 1rem; line-height: 1.6; }
  figure { max-width: 920px; width: 100%; }
  figcaption { text-align: center; margin-top: 1.5rem; padding: 1rem 1.5rem; background: var(--caption-bg); border-radius: 8px; border: 1px solid var(--border); }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  .chart-wrapper { overflow-x: auto; border: 1px solid var(--border); border-radius: 10px; background: var(--surface); padding: 1.5rem; }
  svg { display: block; margin: 0 auto; }
</style>
</head>
<body>
<figure>
  <div class="chart-wrapper">
    <svg viewBox="0 0 880 650" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
      <text x="440" y="28" text-anchor="middle" font-size="17" fill="var(--fg)" font-weight="700">How Semantic-Phonetic Compounds Work</text>
      <text x="440" y="48" text-anchor="middle" font-size="12" fill="var(--muted)">The dual-encoding principle behind 80-90% of all Chinese characters</text>

      <!-- Central character: 清 -->
      <rect x="350" y="70" width="180" height="110" rx="12" fill="var(--surface)" stroke="var(--accent)" stroke-width="3"/>
      <text x="440" y="125" text-anchor="middle" font-size="60" fill="var(--fg)">清</text>
      <text x="440" y="170" text-anchor="middle" font-size="13" fill="var(--accent)" font-weight="600">qing -- clear/pure</text>

      <!-- Left arrow to semantic -->
      <line x1="350" y1="125" x2="230" y2="125" stroke="var(--semantic)" stroke-width="2" marker-end="url(#arrowS)"/>
      <defs><marker id="arrowS" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-auto"><path d="M 10 0 L 0 5 L 10 10 z" fill="var(--semantic)"/></marker></defs>

      <!-- Semantic component -->
      <rect x="80" y="80" width="150" height="90" rx="10" fill="var(--semantic-bg)" stroke="var(--semantic)" stroke-width="2"/>
      <text x="155" y="115" text-anchor="middle" font-size="36" fill="var(--semantic)">氵</text>
      <text x="155" y="145" text-anchor="middle" font-size="12" fill="var(--semantic)" font-weight="700">SEMANTIC</text>
      <text x="155" y="162" text-anchor="middle" font-size="10" fill="var(--fg)">water radical</text>

      <!-- Right arrow to phonetic -->
      <line x1="530" y1="125" x2="650" y2="125" stroke="var(--phonetic)" stroke-width="2" marker-end="url(#arrowP)"/>
      <defs><marker id="arrowP" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="var(--phonetic)"/></marker></defs>

      <!-- Phonetic component -->
      <rect x="650" y="80" width="150" height="90" rx="10" fill="var(--phonetic-bg)" stroke="var(--phonetic)" stroke-width="2"/>
      <text x="725" y="115" text-anchor="middle" font-size="36" fill="var(--phonetic)">青</text>
      <text x="725" y="145" text-anchor="middle" font-size="12" fill="var(--phonetic)" font-weight="700">PHONETIC</text>
      <text x="725" y="162" text-anchor="middle" font-size="10" fill="var(--fg)">qing sound</text>

      <!-- SAME RADICAL FAMILY (meaning family - vertical) -->
      <text x="155" y="210" text-anchor="middle" font-size="13" fill="var(--semantic)" font-weight="700">Same Radical Family (氵)</text>
      <text x="155" y="226" text-anchor="middle" font-size="10" fill="var(--semantic)">All related to water/liquid</text>
      <rect x="40" y="235" width="230" height="180" rx="8" fill="var(--semantic-bg)" stroke="var(--semantic)" stroke-width="1"/>
      <!-- Family members -->
      <text x="65" y="265" font-size="22" fill="var(--fg)">河</text><text x="95" y="265" font-size="11" fill="var(--fg)">he -- river</text>
      <text x="65" y="295" font-size="22" fill="var(--fg)">海</text><text x="95" y="295" font-size="11" fill="var(--fg)">hai -- sea</text>
      <text x="65" y="325" font-size="22" fill="var(--fg)">洗</text><text x="95" y="325" font-size="11" fill="var(--fg)">xi -- wash</text>
      <text x="65" y="355" font-size="22" fill="var(--fg)">汤</text><text x="95" y="355" font-size="11" fill="var(--fg)">tang -- soup</text>
      <text x="65" y="385" font-size="22" fill="var(--fg)">泪</text><text x="95" y="385" font-size="11" fill="var(--fg)">lei -- tears</text>
      <text x="65" y="405" font-size="10" fill="var(--semantic)" font-style="italic">Radical = meaning domain clue</text>

      <!-- SAME PHONETIC FAMILY (sound family - horizontal) -->
      <text x="725" y="210" text-anchor="middle" font-size="13" fill="var(--phonetic)" font-weight="700">Same Phonetic Family (青)</text>
      <text x="725" y="226" text-anchor="middle" font-size="10" fill="var(--phonetic)">All share the "-ing" sound</text>
      <rect x="610" y="235" width="240" height="180" rx="8" fill="var(--phonetic-bg)" stroke="var(--phonetic)" stroke-width="1"/>
      <text x="635" y="265" font-size="22" fill="var(--fg)">请</text><text x="665" y="265" font-size="11" fill="var(--fg)">qing -- please/invite</text>
      <text x="635" y="295" font-size="22" fill="var(--fg)">情</text><text x="665" y="295" font-size="11" fill="var(--fg)">qing -- emotion</text>
      <text x="635" y="325" font-size="22" fill="var(--fg)">晴</text><text x="665" y="325" font-size="11" fill="var(--fg)">qing -- sunny</text>
      <text x="635" y="355" font-size="22" fill="var(--fg)">精</text><text x="665" y="355" font-size="11" fill="var(--fg)">jing -- essence</text>
      <text x="635" y="385" font-size="22" fill="var(--fg)">睛</text><text x="665" y="385" font-size="11" fill="var(--fg)">jing -- eye</text>
      <text x="635" y="405" font-size="10" fill="var(--phonetic)" font-style="italic">Phonetic = pronunciation clue</text>

      <!-- 2D GRID INSIGHT -->
      <rect x="290" y="235" width="300" height="180" rx="10" fill="var(--accent-light)" stroke="var(--accent)" stroke-width="2"/>
      <text x="440" y="260" text-anchor="middle" font-size="14" fill="var(--accent)" font-weight="700">THE 2D PATTERN</text>
      <text x="440" y="285" text-anchor="middle" font-size="12" fill="var(--fg)">Characters exist on a 2D grid:</text>
      <text x="340" y="315" font-size="12" fill="var(--semantic)" font-weight="600">Vertical axis = Radical (meaning)</text>
      <text x="340" y="335" font-size="11" fill="var(--fg)">氵= water, 女 = woman, 木 = wood...</text>
      <text x="340" y="365" font-size="12" fill="var(--phonetic)" font-weight="600">Horizontal axis = Phonetic (sound)</text>
      <text x="340" y="385" font-size="11" fill="var(--fg)">青 = qing, 马 = ma, 方 = fang...</text>
      <text x="440" y="408" text-anchor="middle" font-size="11" fill="var(--accent)" font-weight="600">Any radical + any phonetic = a character</text>

      <!-- ENGLISH COMPARISON -->
      <rect x="30" y="440" width="820" height="70" rx="10" fill="var(--surface)" stroke="var(--english)" stroke-width="1.5"/>
      <text x="440" y="465" text-anchor="middle" font-size="13" fill="var(--english)" font-weight="700">ENGLISH COMPARISON</text>
      <text x="440" y="485" text-anchor="middle" font-size="11" fill="var(--fg)">English has no equivalent. The closest analogy: imagine if "heart" somehow contained a picture suggesting "organ"</text>
      <text x="440" y="502" text-anchor="middle" font-size="11" fill="var(--fg)">AND letters suggesting the sound "hart" -- all packed into one fixed-size symbol. That is what 清 does.</text>

      <!-- Another phonetic family: 马 -->
      <text x="440" y="540" text-anchor="middle" font-size="14" fill="var(--fg)" font-weight="700">Another Example: The 马 (ma) Sound Family</text>
      <rect x="80" y="555" width="720" height="50" rx="8" fill="var(--surface)" stroke="var(--border)" stroke-width="1"/>
      <text x="130" y="585" text-anchor="middle" font-size="26" fill="var(--fg)">妈</text>
      <text x="130" y="600" text-anchor="middle" font-size="9" fill="var(--fg)">女+马 = mother</text>
      <text x="270" y="585" text-anchor="middle" font-size="26" fill="var(--fg)">骂</text>
      <text x="270" y="600" text-anchor="middle" font-size="9" fill="var(--fg)">scold (ma)</text>
      <text x="410" y="585" text-anchor="middle" font-size="26" fill="var(--fg)">吗</text>
      <text x="410" y="600" text-anchor="middle" font-size="9" fill="var(--fg)">口+马 = question</text>
      <text x="550" y="585" text-anchor="middle" font-size="26" fill="var(--fg)">码</text>
      <text x="550" y="600" text-anchor="middle" font-size="9" fill="var(--fg)">石+马 = code</text>
      <text x="690" y="585" text-anchor="middle" font-size="26" fill="var(--fg)">蚂</text>
      <text x="690" y="600" text-anchor="middle" font-size="9" fill="var(--fg)">虫+马 = ant</text>

      <text x="440" y="640" text-anchor="middle" font-size="11" fill="var(--phonetic)" font-weight="600">All share 马 as phonetic (sound = "ma") but different radicals give different meanings</text>
    </svg>
  </div>
  <figcaption>
    <h2>Figure 2 -- Anatomy of a Semantic-Phonetic Compound</h2>
    <p>The character 清 (qing, clear) decomposes into a water radical (semantic: meaning domain) and 青 (phonetic: sound clue). Characters form a two-dimensional grid where the vertical axis groups by meaning (same radical) and the horizontal axis groups by sound (same phonetic). Knowing ~200 radicals and ~500 common phonetics enables productive analysis of most characters.</p>
  </figcaption>
</figure>
</body>
</html>
