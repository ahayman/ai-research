<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chinese vs. English Writing System Architecture</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --accent: #4361ee; --accent-light: #e8edff;
    --chinese: #e63946; --chinese-bg: #ffe0e3;
    --english: #2a9d8f; --english-bg: #d4f5f0;
    --muted: #6c757d; --caption-bg: #f8f9fa;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a; --fg: #e8e8f0; --surface: #1a1a2e; --border: #2d2d44;
      --accent: #6b8aff; --accent-light: #1e2a4a;
      --chinese: #ff6b6b; --chinese-bg: #3a1a1a;
      --english: #4ecdc4; --english-bg: #1a3a38;
      --muted: #9a9ab0; --caption-bg: #1a1a2e;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--fg); display: flex; justify-content: center; padding: 2rem 1rem; line-height: 1.6; }
  figure { max-width: 920px; width: 100%; }
  figcaption { text-align: center; margin-top: 1.5rem; padding: 1rem 1.5rem; background: var(--caption-bg); border-radius: 8px; border: 1px solid var(--border); }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  .chart-wrapper { overflow-x: auto; border: 1px solid var(--border); border-radius: 10px; background: var(--surface); padding: 1.5rem; }
  svg { display: block; margin: 0 auto; }
</style>
</head>
<body>
<figure>
  <div class="chart-wrapper">
    <svg viewBox="0 0 880 680" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
      <text x="440" y="28" text-anchor="middle" font-size="17" fill="var(--fg)" font-weight="700">Two Writing System Architectures</text>
      <text x="440" y="48" text-anchor="middle" font-size="12" fill="var(--muted)">Different engineering solutions to the same problem: representing language visually</text>

      <!-- CHINESE SIDE -->
      <rect x="30" y="65" width="400" height="420" rx="12" fill="var(--chinese-bg)" stroke="var(--chinese)" stroke-width="2"/>
      <text x="230" y="92" text-anchor="middle" font-size="16" fill="var(--chinese)" font-weight="700">CHINESE (Logographic)</text>

      <!-- Building blocks -->
      <text x="50" y="120" font-size="12" fill="var(--fg)" font-weight="600">Building Blocks:</text>
      <rect x="50" y="130" width="170" height="35" rx="5" fill="var(--surface)" stroke="var(--chinese)" stroke-width="1"/>
      <text x="135" y="153" text-anchor="middle" font-size="11" fill="var(--chinese)" font-weight="600">~200 radicals</text>
      <text x="230" y="153" font-size="15" fill="var(--chinese)" font-weight="700">+</text>
      <rect x="240" y="130" width="170" height="35" rx="5" fill="var(--surface)" stroke="var(--chinese)" stroke-width="1"/>
      <text x="325" y="153" text-anchor="middle" font-size="11" fill="var(--chinese)" font-weight="600">~1,000 phonetics</text>

      <text x="230" y="185" text-anchor="middle" font-size="20" fill="var(--chinese)">|</text>
      <text x="260" y="183" font-size="10" fill="var(--muted)">combine spatially (2D)</text>

      <!-- Output -->
      <rect x="70" y="195" width="320" height="35" rx="5" fill="var(--chinese)" stroke="var(--chinese)" stroke-width="1"/>
      <text x="230" y="218" text-anchor="middle" font-size="12" fill="white" font-weight="700">~50,000+ unique characters</text>

      <!-- Properties -->
      <text x="50" y="260" font-size="11" fill="var(--fg)">Encodes: <strong style="color:var(--chinese)">meaning + pronunciation</strong></text>
      <text x="50" y="280" font-size="11" fill="var(--fg)">Layout: <strong>fixed-size square</strong> (2D spatial)</text>
      <text x="50" y="300" font-size="11" fill="var(--fg)">Meaning access: <strong>VISUAL first</strong> (radical clue)</text>
      <text x="50" y="320" font-size="11" fill="var(--fg)">Sound access: phonetic component (~25-40% exact)</text>
      <text x="50" y="340" font-size="11" fill="var(--fg)">Symbol count: <strong>thousands</strong></text>
      <text x="50" y="360" font-size="11" fill="var(--fg)">Initial learning cost: <strong>HIGH</strong></text>
      <text x="50" y="380" font-size="11" fill="var(--fg)">Info per symbol: <strong>HIGH</strong> (each = morpheme)</text>
      <text x="50" y="400" font-size="11" fill="var(--fg)">Direction: horizontal, vertical, or grid</text>
      <text x="50" y="420" font-size="11" fill="var(--fg)">Dictionary lookup: by radical + stroke count</text>
      <text x="50" y="440" font-size="11" fill="var(--fg)">Reading path: <strong>appearance --> meaning</strong></text>
      <text x="50" y="462" font-size="11" fill="var(--chinese)" font-weight="600">Text density: ~30-50% fewer visual units</text>

      <!-- ENGLISH SIDE -->
      <rect x="450" y="65" width="400" height="420" rx="12" fill="var(--english-bg)" stroke="var(--english)" stroke-width="2"/>
      <text x="650" y="92" text-anchor="middle" font-size="16" fill="var(--english)" font-weight="700">ENGLISH (Alphabetic)</text>

      <!-- Building blocks -->
      <text x="470" y="120" font-size="12" fill="var(--fg)" font-weight="600">Building Blocks:</text>
      <rect x="470" y="130" width="360" height="35" rx="5" fill="var(--surface)" stroke="var(--english)" stroke-width="1"/>
      <text x="650" y="153" text-anchor="middle" font-size="11" fill="var(--english)" font-weight="600">26 letters --> ~44 phonemes</text>

      <text x="650" y="185" text-anchor="middle" font-size="20" fill="var(--english)">|</text>
      <text x="680" y="183" font-size="10" fill="var(--muted)">combine sequentially (1D)</text>

      <!-- Output -->
      <rect x="490" y="195" width="320" height="35" rx="5" fill="var(--english)" stroke="var(--english)" stroke-width="1"/>
      <text x="650" y="218" text-anchor="middle" font-size="12" fill="white" font-weight="700">~170,000+ words</text>

      <!-- Properties -->
      <text x="470" y="260" font-size="11" fill="var(--fg)">Encodes: <strong style="color:var(--english)">pronunciation primarily</strong></text>
      <text x="470" y="280" font-size="11" fill="var(--fg)">Layout: <strong>variable-length string</strong> (1D sequential)</text>
      <text x="470" y="300" font-size="11" fill="var(--fg)">Meaning access: <strong>SOUND first</strong> (decode, then recognize)</text>
      <text x="470" y="320" font-size="11" fill="var(--fg)">Sound access: spelling (moderately reliable)</text>
      <text x="470" y="340" font-size="11" fill="var(--fg)">Symbol count: <strong>26 (highly reusable)</strong></text>
      <text x="470" y="360" font-size="11" fill="var(--fg)">Initial learning cost: <strong>LOW</strong></text>
      <text x="470" y="380" font-size="11" fill="var(--fg)">Info per symbol: <strong>LOW</strong> (each = sound hint)</text>
      <text x="470" y="400" font-size="11" fill="var(--fg)">Direction: horizontal only (L-to-R)</text>
      <text x="470" y="420" font-size="11" fill="var(--fg)">Dictionary lookup: by alphabetical spelling</text>
      <text x="470" y="440" font-size="11" fill="var(--fg)">Reading path: <strong>letters --> sounds --> meaning</strong></text>
      <text x="470" y="462" font-size="11" fill="var(--english)" font-weight="600">Symbol reuse: maximum (26 symbols for everything)</text>

      <!-- MIDDLE: Same Functions -->
      <rect x="200" y="505" width="480" height="30" rx="15" fill="var(--accent)" stroke="var(--accent)" stroke-width="2"/>
      <text x="440" y="525" text-anchor="middle" font-size="12" fill="white" font-weight="700">SAME FUNCTIONS, DIFFERENT ARCHITECTURES</text>

      <!-- Function comparison -->
      <rect x="30" y="550" width="820" height="110" rx="10" fill="var(--accent-light)" stroke="var(--accent)" stroke-width="1.5"/>
      <text x="160" y="575" text-anchor="middle" font-size="12" fill="var(--accent)" font-weight="700">Function</text>
      <text x="440" y="575" text-anchor="middle" font-size="12" fill="var(--chinese)" font-weight="700">Chinese</text>
      <text x="720" y="575" text-anchor="middle" font-size="12" fill="var(--english)" font-weight="700">English</text>

      <line x1="30" y1="582" x2="850" y2="582" stroke="var(--border)" stroke-width="0.5"/>

      <text x="160" y="600" text-anchor="middle" font-size="11" fill="var(--fg)">Encode meaning</text>
      <text x="440" y="600" text-anchor="middle" font-size="11" fill="var(--chinese)">Radical (visual)</text>
      <text x="720" y="600" text-anchor="middle" font-size="11" fill="var(--english)">Word (via sound)</text>

      <text x="160" y="620" text-anchor="middle" font-size="11" fill="var(--fg)">Encode pronunciation</text>
      <text x="440" y="620" text-anchor="middle" font-size="11" fill="var(--chinese)">Phonetic component (~partial)</text>
      <text x="720" y="620" text-anchor="middle" font-size="11" fill="var(--english)">Spelling (~partial)</text>

      <text x="160" y="640" text-anchor="middle" font-size="11" fill="var(--fg)">Find in dictionary</text>
      <text x="440" y="640" text-anchor="middle" font-size="11" fill="var(--chinese)">By visual form (no sound needed)</text>
      <text x="720" y="640" text-anchor="middle" font-size="11" fill="var(--english)">By spelling (must guess sound)</text>

      <text x="440" y="670" text-anchor="middle" font-size="12" fill="var(--accent)" font-weight="600">Neither is "better" -- they optimize for different trade-offs</text>
    </svg>
  </div>
  <figcaption>
    <h2>Figure 5 -- Chinese vs. English Writing System Architecture</h2>
    <p>Chinese and English writing represent two fundamentally different engineering solutions. Chinese combines ~200 radicals with ~1,000 phonetics to produce thousands of fixed-size square characters that encode meaning and pronunciation simultaneously in 2D space. English sequences 26 letters to encode pronunciation in 1D strings, with meaning accessed through the sound layer. Both achieve the same communicative functions through opposite architectural strategies.</p>
  </figcaption>
</figure>
</body>
</html>
