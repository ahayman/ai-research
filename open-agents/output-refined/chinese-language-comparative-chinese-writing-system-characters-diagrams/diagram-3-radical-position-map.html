<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radical Position Map -- Where Radicals Sit</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --accent: #4361ee; --accent-light: #e8edff;
    --semantic: #2a9d8f; --semantic-bg: #d4f5f0;
    --phonetic: #e63946; --phonetic-bg: #ffe0e3;
    --layout: #7209b7; --layout-bg: #f3e8ff;
    --muted: #6c757d; --caption-bg: #f8f9fa;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a; --fg: #e8e8f0; --surface: #1a1a2e; --border: #2d2d44;
      --accent: #6b8aff; --accent-light: #1e2a4a;
      --semantic: #4ecdc4; --semantic-bg: #1a3a38;
      --phonetic: #ff6b6b; --phonetic-bg: #3a1a1a;
      --layout: #c77dff; --layout-bg: #1e0a2e;
      --muted: #9a9ab0; --caption-bg: #1a1a2e;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--fg); display: flex; justify-content: center; padding: 2rem 1rem; line-height: 1.6; }
  figure { max-width: 920px; width: 100%; }
  figcaption { text-align: center; margin-top: 1.5rem; padding: 1rem 1.5rem; background: var(--caption-bg); border-radius: 8px; border: 1px solid var(--border); }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  .chart-wrapper { overflow-x: auto; border: 1px solid var(--border); border-radius: 10px; background: var(--surface); padding: 1.5rem; }
  svg { display: block; margin: 0 auto; }
</style>
</head>
<body>
<figure>
  <div class="chart-wrapper">
    <svg viewBox="0 0 880 620" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
      <text x="440" y="28" text-anchor="middle" font-size="17" fill="var(--fg)" font-weight="700">Character Composition Layouts</text>
      <text x="440" y="48" text-anchor="middle" font-size="12" fill="var(--muted)">How components are arranged within the square character space (方块字)</text>

      <!-- LEFT-RIGHT LAYOUT (~65%) -->
      <rect x="30" y="70" width="400" height="220" rx="10" fill="var(--surface)" stroke="var(--layout)" stroke-width="2"/>
      <text x="230" y="95" text-anchor="middle" font-size="14" fill="var(--layout)" font-weight="700">LEFT-RIGHT (⿰) -- ~65% of compounds</text>

      <!-- Template square -->
      <rect x="60" y="110" width="60" height="80" rx="4" fill="var(--semantic-bg)" stroke="var(--semantic)" stroke-width="2"/>
      <text x="90" y="145" text-anchor="middle" font-size="10" fill="var(--semantic)" font-weight="700">Radical</text>
      <text x="90" y="160" text-anchor="middle" font-size="9" fill="var(--semantic)">(LEFT)</text>
      <rect x="120" y="110" width="60" height="80" rx="4" fill="var(--phonetic-bg)" stroke="var(--phonetic)" stroke-width="2"/>
      <text x="150" y="145" text-anchor="middle" font-size="10" fill="var(--phonetic)" font-weight="700">Phonetic</text>
      <text x="150" y="160" text-anchor="middle" font-size="9" fill="var(--phonetic)">(RIGHT)</text>

      <!-- Examples -->
      <text x="220" y="125" font-size="28" fill="var(--fg)">妈</text>
      <text x="255" y="120" font-size="10" fill="var(--semantic)">女</text>
      <text x="255" y="135" font-size="10" fill="var(--phonetic)">马</text>
      <text x="305" y="125" font-size="28" fill="var(--fg)">清</text>
      <text x="340" y="120" font-size="10" fill="var(--semantic)">氵</text>
      <text x="340" y="135" font-size="10" fill="var(--phonetic)">青</text>
      <text x="380" y="125" font-size="28" fill="var(--fg)">说</text>
      <text x="220" y="160" font-size="28" fill="var(--fg)">你</text>
      <text x="255" y="155" font-size="10" fill="var(--semantic)">亻</text>
      <text x="255" y="170" font-size="10" fill="var(--phonetic)">尔</text>
      <text x="305" y="160" font-size="28" fill="var(--fg)">铜</text>
      <text x="340" y="155" font-size="10" fill="var(--semantic)">钅</text>
      <text x="340" y="170" font-size="10" fill="var(--phonetic)">同</text>

      <text x="230" y="210" text-anchor="middle" font-size="11" fill="var(--fg)">Common left-side radicals:</text>
      <text x="230" y="230" text-anchor="middle" font-size="12" fill="var(--semantic)">氵水 亻人 扌手 讠言 钅金 女 木 火</text>
      <text x="230" y="250" text-anchor="middle" font-size="10" fill="var(--muted)" font-style="italic">Semantic on LEFT, phonetic on RIGHT -- the default pattern</text>
      <text x="230" y="275" text-anchor="middle" font-size="13" fill="var(--layout)" font-weight="700">Most common layout by far</text>

      <!-- TOP-BOTTOM LAYOUT (~20%) -->
      <rect x="450" y="70" width="400" height="220" rx="10" fill="var(--surface)" stroke="var(--layout)" stroke-width="2"/>
      <text x="650" y="95" text-anchor="middle" font-size="14" fill="var(--layout)" font-weight="700">TOP-BOTTOM (⿱) -- ~20%</text>

      <!-- Template square -->
      <rect x="480" y="110" width="80" height="35" rx="4" fill="var(--semantic-bg)" stroke="var(--semantic)" stroke-width="2"/>
      <text x="520" y="133" text-anchor="middle" font-size="10" fill="var(--semantic)" font-weight="700">Radical (TOP)</text>
      <rect x="480" y="145" width="80" height="35" rx="4" fill="var(--phonetic-bg)" stroke="var(--phonetic)" stroke-width="2"/>
      <text x="520" y="168" text-anchor="middle" font-size="10" fill="var(--phonetic)" font-weight="700">Phonetic (BTM)</text>

      <text x="610" y="130" font-size="28" fill="var(--fg)">花</text>
      <text x="645" y="125" font-size="10" fill="var(--semantic)">艹</text>
      <text x="645" y="140" font-size="10" fill="var(--phonetic)">化</text>
      <text x="690" y="130" font-size="28" fill="var(--fg)">想</text>
      <text x="725" y="125" font-size="10" fill="var(--phonetic)">相</text>
      <text x="725" y="140" font-size="10" fill="var(--semantic)">心</text>
      <text x="770" y="130" font-size="28" fill="var(--fg)">字</text>
      <text x="805" y="125" font-size="10" fill="var(--semantic)">宀</text>
      <text x="805" y="140" font-size="10" fill="var(--phonetic)">子</text>

      <text x="650" y="210" text-anchor="middle" font-size="11" fill="var(--fg)">Common top radicals:</text>
      <text x="650" y="230" text-anchor="middle" font-size="12" fill="var(--semantic)">艹 grass  宀 roof  雨 rain  竹 bamboo</text>
      <text x="650" y="250" text-anchor="middle" font-size="11" fill="var(--fg)">Common bottom radicals:</text>
      <text x="650" y="270" text-anchor="middle" font-size="12" fill="var(--semantic)">心 heart  灬 fire  皿 dish</text>

      <!-- ENCLOSING LAYOUTS (~10%) -->
      <rect x="30" y="310" width="300" height="140" rx="10" fill="var(--surface)" stroke="var(--layout)" stroke-width="2"/>
      <text x="180" y="335" text-anchor="middle" font-size="14" fill="var(--layout)" font-weight="700">ENCLOSING -- ~10%</text>
      <text x="80" y="365" font-size="28" fill="var(--fg)">国</text>
      <text x="115" y="360" font-size="10" fill="var(--semantic)">囗 enclosure</text>
      <text x="115" y="375" font-size="10" fill="var(--phonetic)">玉 inside</text>
      <text x="180" y="365" font-size="28" fill="var(--fg)">问</text>
      <text x="215" y="360" font-size="10" fill="var(--semantic)">门 gate</text>
      <text x="215" y="375" font-size="10" fill="var(--phonetic)">口 inside</text>
      <text x="180" y="430" text-anchor="middle" font-size="10" fill="var(--muted)">Outer frame first, fill, then seal bottom</text>

      <!-- OTHER (~5%) -->
      <rect x="350" y="310" width="200" height="140" rx="10" fill="var(--surface)" stroke="var(--border)" stroke-width="1.5"/>
      <text x="450" y="335" text-anchor="middle" font-size="13" fill="var(--muted)" font-weight="700">LEFT-MID-RIGHT (~5%)</text>
      <text x="400" y="375" font-size="28" fill="var(--fg)">谢</text>
      <text x="438" y="370" font-size="10" fill="var(--fg)">讠+ 身 + 寸</text>

      <!-- Proportional bar for layouts -->
      <rect x="570" y="310" width="280" height="140" rx="10" fill="var(--accent-light)" stroke="var(--accent)" stroke-width="2"/>
      <text x="710" y="335" text-anchor="middle" font-size="13" fill="var(--accent)" font-weight="700">Layout Frequency</text>
      <rect x="590" y="350" width="195" height="18" rx="4" fill="var(--layout)"/>
      <text x="687" y="364" text-anchor="middle" font-size="10" fill="white" font-weight="600">Left-Right ~65%</text>
      <rect x="590" y="375" width="60" height="18" rx="4" fill="var(--semantic)"/>
      <text x="620" y="389" text-anchor="middle" font-size="9" fill="white" font-weight="600">T-B ~20%</text>
      <rect x="590" y="400" width="30" height="18" rx="4" fill="var(--phonetic)"/>
      <text x="640" y="414" font-size="9" fill="var(--fg)">Enclosing ~10%</text>
      <rect x="590" y="425" width="15" height="18" rx="4" fill="var(--muted)"/>
      <text x="640" y="439" font-size="9" fill="var(--fg)">Other ~5%</text>

      <!-- ENGLISH COMPARISON -->
      <rect x="30" y="470" width="820" height="60" rx="10" fill="var(--surface)" stroke="var(--accent)" stroke-width="1.5"/>
      <text x="440" y="495" text-anchor="middle" font-size="13" fill="var(--accent)" font-weight="700">ENGLISH COMPARISON: Sequential vs. Spatial</text>
      <text x="440" y="515" text-anchor="middle" font-size="11" fill="var(--fg)">English words vary in visual length ("I" vs. "antidisestablishmentarianism") because they are sequential.</text>
      <text x="440" y="522" text-anchor="middle" font-size="11" fill="var(--fg)">Chinese characters ALL occupy the same square space (方块字) -- components compress to fit. Like a sentence vs. a QR code.</text>

      <!-- THE SQUARE PRINCIPLE -->
      <rect x="30" y="545" width="820" height="60" rx="10" fill="var(--accent-light)" stroke="var(--accent)" stroke-width="2"/>
      <text x="440" y="570" text-anchor="middle" font-size="14" fill="var(--accent)" font-weight="700">THE PATTERN: Predictable Component Positions</text>
      <text x="440" y="590" text-anchor="middle" font-size="12" fill="var(--fg)">In left-right compounds: semantic LEFT, phonetic RIGHT. In top-bottom: semantic TOP, phonetic BOTTOM.</text>
      <text x="440" y="600" text-anchor="middle" font-size="11" fill="var(--muted)">This means you can quickly identify which part carries MEANING and which carries SOUND.</text>
    </svg>
  </div>
  <figcaption>
    <h2>Figure 3 -- Radical Position Map: Where Components Sit</h2>
    <p>Chinese characters occupy a uniform square space regardless of internal complexity. Components are arranged in predictable layouts: left-right (~65%, the most common), top-bottom (~20%), and enclosing (~10%). Semantic radicals predictably sit on the left or top; phonetic components on the right or bottom. This positional regularity lets learners quickly parse any character into its meaning and sound components.</p>
  </figcaption>
</figure>
</body>
</html>
