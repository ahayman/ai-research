<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Traditional vs. Simplified -- Simplification Methods</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --accent: #4361ee; --accent-light: #e8edff;
    --trad: #7209b7; --trad-bg: #f3e8ff;
    --simp: #2a9d8f; --simp-bg: #d4f5f0;
    --muted: #6c757d; --caption-bg: #f8f9fa;
    --arrow: #e63946;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a; --fg: #e8e8f0; --surface: #1a1a2e; --border: #2d2d44;
      --accent: #6b8aff; --accent-light: #1e2a4a;
      --trad: #c77dff; --trad-bg: #1e0a2e;
      --simp: #4ecdc4; --simp-bg: #1a3a38;
      --muted: #9a9ab0; --caption-bg: #1a1a2e;
      --arrow: #ff6b6b;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--fg); display: flex; justify-content: center; padding: 2rem 1rem; line-height: 1.6; }
  figure { max-width: 920px; width: 100%; }
  figcaption { text-align: center; margin-top: 1.5rem; padding: 1rem 1.5rem; background: var(--caption-bg); border-radius: 8px; border: 1px solid var(--border); }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  .chart-wrapper { overflow-x: auto; border: 1px solid var(--border); border-radius: 10px; background: var(--surface); padding: 1.5rem; }
  table { width: 100%; border-collapse: collapse; margin: 0.5rem 0; }
  th, td { padding: 0.6rem 0.4rem; text-align: center; border: 1px solid var(--border); }
  th { background: var(--accent-light); color: var(--accent); font-weight: 600; font-size: 0.8rem; }
  td { font-size: 0.85rem; }
  .trad-char { font-size: 1.8rem; color: var(--trad); }
  .simp-char { font-size: 1.8rem; color: var(--simp); }
  .arrow-cell { color: var(--arrow); font-weight: 700; font-size: 1.2rem; }
  .method-label { font-weight: 600; color: var(--accent); font-size: 0.8rem; }
  .cascade-box { margin-top: 1rem; padding: 1rem; background: var(--accent-light); border-radius: 8px; border: 1px solid var(--accent); }
  .cascade-box h3 { font-size: 0.95rem; color: var(--accent); margin-bottom: 0.4rem; }
  .cascade-box p { font-size: 0.85rem; }
  .history-box { margin-top: 1rem; padding: 0.8rem; background: var(--surface); border-radius: 6px; border-left: 4px solid var(--trad); }
  .history-box p { font-size: 0.85rem; }
  .geo-box { margin-top: 1rem; padding: 0.8rem; background: var(--surface); border-radius: 6px; }
  .geo-box p { font-size: 0.85rem; }
  .geo-tag { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 10px; font-size: 0.75rem; font-weight: 600; margin: 0.1rem; }
</style>
</head>
<body>
<figure>
  <div class="chart-wrapper">
    <h3 style="text-align:center; color:var(--fg); margin-bottom:0.8rem; font-size:1.1rem;">Five Systematic Simplification Methods</h3>
    <table>
      <thead>
        <tr>
          <th>Method</th>
          <th>Traditional</th>
          <th></th>
          <th>Simplified</th>
          <th>Strokes</th>
          <th>How It Works</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td class="method-label">1. Stroke Reduction</td>
          <td><span class="trad-char">國</span><br><small>guo (country)</small></td>
          <td class="arrow-cell">--></td>
          <td><span class="simp-char">国</span></td>
          <td><span style="color:var(--trad)">11</span> --> <span style="color:var(--simp)">8</span></td>
          <td style="text-align:left; font-size:0.8rem;">Remove strokes while preserving recognizability</td>
        </tr>
        <tr>
          <td class="method-label">1. Stroke Reduction</td>
          <td><span class="trad-char">學</span><br><small>xue (study)</small></td>
          <td class="arrow-cell">--></td>
          <td><span class="simp-char">学</span></td>
          <td><span style="color:var(--trad)">16</span> --> <span style="color:var(--simp)">8</span></td>
          <td style="text-align:left; font-size:0.8rem;">Simplified top portion, kept core structure</td>
        </tr>
        <tr>
          <td class="method-label">2. Component Replacement</td>
          <td><span class="trad-char">對</span><br><small>dui (correct)</small></td>
          <td class="arrow-cell">--></td>
          <td><span class="simp-char">对</span></td>
          <td><span style="color:var(--trad)">14</span> --> <span style="color:var(--simp)">5</span></td>
          <td style="text-align:left; font-size:0.8rem;">Replace complex right side with simpler form</td>
        </tr>
        <tr>
          <td class="method-label">3. Cursive Adoption</td>
          <td><span class="trad-char">書</span><br><small>shu (book)</small></td>
          <td class="arrow-cell">--></td>
          <td><span class="simp-char">书</span></td>
          <td><span style="color:var(--trad)">10</span> --> <span style="color:var(--simp)">4</span></td>
          <td style="text-align:left; font-size:0.8rem;">Handwritten cursive form became official</td>
        </tr>
        <tr>
          <td class="method-label">4. Phonetic Substitution</td>
          <td><span class="trad-char">後</span><br><small>hou (after)</small></td>
          <td class="arrow-cell">--></td>
          <td><span class="simp-char">后</span></td>
          <td><span style="color:var(--trad)">9</span> --> <span style="color:var(--simp)">6</span></td>
          <td style="text-align:left; font-size:0.8rem;">Reused an ancient simpler homophone</td>
        </tr>
        <tr>
          <td class="method-label">5. Radical Simplification</td>
          <td><span class="trad-char">龍</span><br><small>long (dragon)</small></td>
          <td class="arrow-cell">--></td>
          <td><span class="simp-char">龙</span></td>
          <td><span style="color:var(--trad)">16</span> --> <span style="color:var(--simp)">5</span></td>
          <td style="text-align:left; font-size:0.8rem;">Most dramatic: 11 strokes eliminated</td>
        </tr>
        <tr>
          <td class="method-label">5. Radical Simplification</td>
          <td><span class="trad-char">馬</span><br><small>ma (horse)</small></td>
          <td class="arrow-cell">--></td>
          <td><span class="simp-char">马</span></td>
          <td><span style="color:var(--trad)">10</span> --> <span style="color:var(--simp)">3</span></td>
          <td style="text-align:left; font-size:0.8rem;">Cascades through all characters using 马</td>
        </tr>
      </tbody>
    </table>

    <div class="cascade-box">
      <h3>The Cascade Effect: One Radical Change, Many Characters</h3>
      <p>When a radical is simplified, ALL characters using it change. Simplifying 言 --> 讠 cascades through:</p>
      <p style="font-size:1.1rem; margin-top:0.3rem;">
        <span style="color:var(--trad)">說</span> --> <span style="color:var(--simp)">说</span> (speak) |
        <span style="color:var(--trad)">話</span> --> <span style="color:var(--simp)">话</span> (words) |
        <span style="color:var(--trad)">語</span> --> <span style="color:var(--simp)">语</span> (language) |
        <span style="color:var(--trad)">請</span> --> <span style="color:var(--simp)">请</span> (please) |
        <span style="color:var(--trad)">讀</span> --> <span style="color:var(--simp)">读</span> (read)
      </p>
      <p style="margin-top:0.4rem; color:var(--accent); font-weight:600;">One systematic change simplifies dozens of characters at once. This is systematic engineering, not arbitrary revision.</p>
    </div>

    <div class="history-box">
      <p><strong style="color:var(--trad)">Timeline:</strong> 1956 -- first promulgation (515 characters + 54 radicals) | 1964 -- expanded to 2,236 characters | 1977 -- second round attempted | 1986 -- second round retracted as too radical</p>
    </div>

    <div class="geo-box">
      <p><strong>Geographic Distribution:</strong></p>
      <p>
        <span class="geo-tag" style="background:var(--simp-bg); color:var(--simp); border:1px solid var(--simp);">Simplified: Mainland China, Singapore, Malaysia, UN</span>
        <span class="geo-tag" style="background:var(--trad-bg); color:var(--trad); border:1px solid var(--trad);">Traditional: Taiwan, Hong Kong, Macau, overseas communities</span>
      </p>
      <p style="font-size:0.8rem; color:var(--muted); margin-top:0.3rem;">Both systems are mutually intelligible to educated readers with some effort.</p>
      <p style="font-size:0.8rem; color:var(--muted); margin-top:0.3rem; font-style:italic;">English comparison: Like British/American spelling (colour/color) but far more extensive -- affecting thousands of characters.</p>
    </div>
  </div>
  <figcaption>
    <h2>Figure 4 -- Traditional vs. Simplified: Systematic Simplification Methods</h2>
    <p>The 1956 simplification reform used five systematic methods: stroke reduction, component replacement, cursive adoption, phonetic substitution, and radical simplification. The cascade effect means simplifying one radical (like 言 to 讠) automatically updates all characters containing it. This was systematic engineering aimed at increasing literacy, not arbitrary modification.</p>
  </figcaption>
</figure>
</body>
</html>
