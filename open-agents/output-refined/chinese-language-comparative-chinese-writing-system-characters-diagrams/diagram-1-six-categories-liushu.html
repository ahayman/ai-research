<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Six Character Categories (Liushu) -- Hierarchy with Frequency</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --accent: #4361ee; --accent-light: #e8edff;
    --dominant: #e63946; --dominant-bg: #ffe0e3;
    --secondary: #2a9d8f; --secondary-bg: #d4f5f0;
    --tertiary: #7209b7; --tertiary-bg: #f3e8ff;
    --minor: #ff6b35; --minor-bg: #fff3ec;
    --muted: #6c757d; --caption-bg: #f8f9fa;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a; --fg: #e8e8f0; --surface: #1a1a2e; --border: #2d2d44;
      --accent: #6b8aff; --accent-light: #1e2a4a;
      --dominant: #ff6b6b; --dominant-bg: #3a1a1a;
      --secondary: #4ecdc4; --secondary-bg: #1a3a38;
      --tertiary: #c77dff; --tertiary-bg: #1e0a2e;
      --minor: #ff8c5a; --minor-bg: #2a1a10;
      --muted: #9a9ab0; --caption-bg: #1a1a2e;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--fg); display: flex; justify-content: center; padding: 2rem 1rem; line-height: 1.6; }
  figure { max-width: 920px; width: 100%; }
  figcaption { text-align: center; margin-top: 1.5rem; padding: 1rem 1.5rem; background: var(--caption-bg); border-radius: 8px; border: 1px solid var(--border); }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  .chart-wrapper { overflow-x: auto; border: 1px solid var(--border); border-radius: 10px; background: var(--surface); padding: 1.5rem; }
  svg { display: block; margin: 0 auto; }
</style>
</head>
<body>
<figure>
  <div class="chart-wrapper">
    <svg viewBox="0 0 880 580" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
      <text x="440" y="28" text-anchor="middle" font-size="17" fill="var(--fg)" font-weight="700">The Six Categories of Chinese Characters (六书 Liushu)</text>
      <text x="440" y="48" text-anchor="middle" font-size="12" fill="var(--muted)">Classified by Xu Shen, c. 100 CE -- distribution is massively skewed</text>

      <!-- DOMINANT: Semantic-Phonetic Compounds -->
      <rect x="30" y="70" width="820" height="130" rx="10" fill="var(--dominant-bg)" stroke="var(--dominant)" stroke-width="2.5"/>
      <text x="50" y="95" font-size="15" fill="var(--dominant)" font-weight="700">1. Semantic-Phonetic Compounds (形声 xingsheng)</text>
      <rect x="680" y="78" width="150" height="30" rx="15" fill="var(--dominant)"/>
      <text x="755" y="98" text-anchor="middle" font-size="14" fill="white" font-weight="700">80-90%</text>
      <text x="50" y="115" font-size="12" fill="var(--fg)">Meaning component (radical) + pronunciation component (phonetic) = dual-encoded character</text>
      <!-- Examples -->
      <text x="50" y="140" font-size="18" fill="var(--fg)">妈</text>
      <text x="75" y="140" font-size="11" fill="var(--fg)">= 女 (woman) + 马 (ma sound)</text>
      <text x="260" y="140" font-size="18" fill="var(--fg)">清</text>
      <text x="285" y="140" font-size="11" fill="var(--fg)">= 氵(water) + 青 (qing sound)</text>
      <text x="480" y="140" font-size="18" fill="var(--fg)">铜</text>
      <text x="505" y="140" font-size="11" fill="var(--fg)">= 钅(metal) + 同 (tong sound)</text>
      <text x="50" y="165" font-size="11" fill="var(--dominant)" font-weight="600">THE BACKBONE: This single principle governs the vast majority of all characters you will ever encounter.</text>
      <text x="50" y="185" font-size="11" fill="var(--muted)" font-style="italic">English has nothing comparable -- no word simultaneously encodes meaning visually AND pronunciation spatially.</text>

      <!-- Compound Ideographs -->
      <rect x="30" y="210" width="410" height="100" rx="8" fill="var(--secondary-bg)" stroke="var(--secondary)" stroke-width="1.5"/>
      <text x="50" y="233" font-size="13" fill="var(--secondary)" font-weight="700">2. Compound Ideographs (会意 huiyi)</text>
      <rect x="340" y="218" width="80" height="22" rx="11" fill="var(--secondary)"/>
      <text x="380" y="234" text-anchor="middle" font-size="11" fill="white" font-weight="700">~13%</text>
      <text x="50" y="253" font-size="11" fill="var(--fg)">Combined meanings suggest new meaning</text>
      <text x="50" y="275" font-size="16" fill="var(--fg)">明</text>
      <text x="72" y="275" font-size="10" fill="var(--fg)">= 日+月 (sun+moon = bright)</text>
      <text x="220" y="275" font-size="16" fill="var(--fg)">休</text>
      <text x="242" y="275" font-size="10" fill="var(--fg)">= 人+木 (person+tree = rest)</text>
      <text x="50" y="298" font-size="10" fill="var(--muted)" font-style="italic">Like English "sunlight" but visual, not sequential</text>

      <!-- Pictographs -->
      <rect x="450" y="210" width="400" height="100" rx="8" fill="var(--tertiary-bg)" stroke="var(--tertiary)" stroke-width="1.5"/>
      <text x="470" y="233" font-size="13" fill="var(--tertiary)" font-weight="700">3. Pictographs (象形 xiangxing)</text>
      <rect x="750" y="218" width="80" height="22" rx="11" fill="var(--tertiary)"/>
      <text x="790" y="234" text-anchor="middle" font-size="11" fill="white" font-weight="700">~4%</text>
      <text x="470" y="253" font-size="11" fill="var(--fg)">Simplified drawings of objects -- the "seeds"</text>
      <text x="470" y="275" font-size="16" fill="var(--fg)">山</text>
      <text x="490" y="275" font-size="10" fill="var(--fg)">mountain</text>
      <text x="550" y="275" font-size="16" fill="var(--fg)">水</text>
      <text x="570" y="275" font-size="10" fill="var(--fg)">water</text>
      <text x="620" y="275" font-size="16" fill="var(--fg)">日</text>
      <text x="640" y="275" font-size="10" fill="var(--fg)">sun</text>
      <text x="690" y="275" font-size="16" fill="var(--fg)">月</text>
      <text x="710" y="275" font-size="10" fill="var(--fg)">moon</text>
      <text x="470" y="298" font-size="10" fill="var(--muted)" font-style="italic">Only 4% -- the system is NOT pictographic</text>

      <!-- Minor categories -->
      <rect x="30" y="320" width="270" height="85" rx="8" fill="var(--minor-bg)" stroke="var(--minor)" stroke-width="1.5"/>
      <text x="50" y="343" font-size="12" fill="var(--minor)" font-weight="700">4. Indicatives (指事)</text>
      <text x="230" y="343" font-size="10" fill="var(--minor)">~1-2%</text>
      <text x="50" y="362" font-size="10" fill="var(--fg)">Abstract symbols</text>
      <text x="50" y="385" font-size="16" fill="var(--fg)">上</text>
      <text x="70" y="385" font-size="10" fill="var(--fg)">above</text>
      <text x="120" y="385" font-size="16" fill="var(--fg)">下</text>
      <text x="140" y="385" font-size="10" fill="var(--fg)">below</text>
      <text x="190" y="385" font-size="16" fill="var(--fg)">本</text>
      <text x="210" y="385" font-size="10" fill="var(--fg)">root</text>

      <rect x="310" y="320" width="270" height="85" rx="8" fill="var(--surface)" stroke="var(--border)" stroke-width="1.5"/>
      <text x="330" y="343" font-size="12" fill="var(--muted)" font-weight="700">5. Phonetic Loans (假借)</text>
      <text x="520" y="343" font-size="10" fill="var(--muted)">~2-3%</text>
      <text x="330" y="362" font-size="10" fill="var(--fg)">Borrowed for same-sound words</text>
      <text x="330" y="385" font-size="16" fill="var(--fg)">来</text>
      <text x="352" y="385" font-size="10" fill="var(--fg)">"wheat" borrowed for "come"</text>

      <rect x="590" y="320" width="260" height="85" rx="8" fill="var(--surface)" stroke="var(--border)" stroke-width="1.5"/>
      <text x="610" y="343" font-size="12" fill="var(--muted)" font-weight="700">6. Derivative Cognates (转注)</text>
      <text x="610" y="362" font-size="10" fill="var(--fg)">Extended meanings (rare/disputed)</text>
      <text x="610" y="385" font-size="16" fill="var(--fg)">老</text>
      <text x="632" y="385" font-size="10" fill="var(--fg)">old</text>
      <text x="670" y="385" font-size="16" fill="var(--fg)">考</text>
      <text x="692" y="385" font-size="10" fill="var(--fg)">examine</text>
      <text x="790" y="343" font-size="10" fill="var(--muted)">rare</text>

      <!-- Proportional bar -->
      <text x="440" y="435" text-anchor="middle" font-size="13" fill="var(--fg)" font-weight="700">Frequency Distribution</text>
      <!-- Semantic-phonetic -->
      <rect x="30" y="445" width="680" height="30" rx="5" fill="var(--dominant)"/>
      <text x="370" y="465" text-anchor="middle" font-size="12" fill="white" font-weight="700">Semantic-Phonetic Compounds: 80-90%</text>
      <!-- Compound ideograph -->
      <rect x="710" y="445" width="100" height="30" rx="5" fill="var(--secondary)"/>
      <text x="760" y="465" text-anchor="middle" font-size="9" fill="white" font-weight="600">Compound 13%</text>
      <!-- Pictograph -->
      <rect x="810" y="445" width="35" height="30" rx="5" fill="var(--tertiary)"/>
      <text x="828" y="465" text-anchor="middle" font-size="8" fill="white">4%</text>
      <!-- Other -->
      <rect x="845" y="445" width="5" height="30" rx="2" fill="var(--minor)"/>

      <!-- KEY INSIGHT -->
      <rect x="30" y="495" width="820" height="70" rx="10" fill="var(--accent-light)" stroke="var(--accent)" stroke-width="2"/>
      <text x="440" y="520" text-anchor="middle" font-size="14" fill="var(--accent)" font-weight="700">KEY INSIGHT: The System Is Overwhelmingly Regular</text>
      <text x="440" y="540" text-anchor="middle" font-size="12" fill="var(--fg)">~200 radicals + ~800-1,200 phonetic components = productive analysis of 80-90% of all characters</text>
      <text x="440" y="556" text-anchor="middle" font-size="11" fill="var(--muted)">Comparable to how knowing Latin/Greek roots lets English readers decode "cardiovascular" or "photosynthesis"</text>
    </svg>
  </div>
  <figcaption>
    <h2>Figure 1 -- The Six Character Categories (Liushu): Hierarchy with Frequency</h2>
    <p>Chinese characters are classified into six formation types, but the distribution is massively skewed: semantic-phonetic compounds account for 80-90% of all characters. This means the writing system is not a gallery of thousands of unique pictures -- it is an engineering system of modular components (radicals + phonetics) assembled according to discoverable rules. Only about 4% of characters are true pictographs.</p>
  </figcaption>
</figure>
</body>
</html>
