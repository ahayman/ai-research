<!-- Diagram: Hardware vs. Software Reframe -->
<!-- Type: flowchart (mermaid) -->
<!-- Generated: 2026-04-29 -->
<!-- Description: Visualizes the hardware/software distinction at the heart of neurodiversity-affirming IFS — autism is the neurotype/hardware (not workable in IFS terms), while parts are patterns/software that formed under pressure (workable). -->

<figure class="concept-diagram" id="diagram-1">
  <div class="diagram-container">
    <pre class="mermaid">
flowchart TB
    subgraph HARDWARE["AUTISM — Neurotype / Hardware (not unburdened)"]
        direction TB
        H1["Monotropism<br/>(single attentional channel)"]
        H2["Sensory profile"]
        H3["Literal / pattern-first processing"]
        H4["Possibly aphantasia<br/>(no mental imagery)"]
        H5["Possibly low interoception<br/>(see Cat 6 alexithymia)"]
    end
    subgraph SOFTWARE["PARTS — Software (patterns formed under pressure, workable in IFS)"]
        direction LR
        M["Managers<br/>(masking, perfectionism,<br/>scripting, planning)"]
        F["Firefighters<br/>(shutdown, reactive numbing,<br/>special-interest as escape)"]
        E["Exiles<br/>(early shame, rejection,<br/>autism-related wounds)"]
    end
    SELF((Self<br/>—— autistic-expressed ——<br/>8 Cs through neurotype))
    HARDWARE -.runs on top of.-> SOFTWARE
    SELF --- M
    SELF --- F
    SELF --- E
    SOFTWARE -- "can unburden" --> SOFTWARE
    HARDWARE -- "DO NOT unburden" --x HARDWARE

    classDef hardware fill:#fef3c7,stroke:#92400e,stroke-width:2px,color:#1f2937
    classDef software fill:#e0f2fe,stroke:#0284c7,stroke-width:2px,color:#0c4a6e
    classDef self fill:#ddd6fe,stroke:#6d28d9,stroke-width:2px,color:#3b0764
    class H1,H2,H3,H4,H5 hardware
    class M,F,E software
    class SELF self
    </pre>
  </div>
  <figcaption>
    <strong>Figure 1:</strong> Hardware/Software Reframe. Autism is neurotype/hardware — not a "part" to unburden. Parts are patterns that formed under pressure (including being autistic in a non-autistic world) — those can be befriended, witnessed, and unburdened. Self is present in autistic systems and is expressed through the autistic neurotype rather than around it.
  </figcaption>
</figure>
