  <figcaption>
    <strong>Figure 3:</strong> Masking vs. manager-part decision tree. The test: would resolving this make me more comfortably autistic, or less autistic? The first answer means there's a protector pattern doing software work — workable in IFS. The second means we're aimed at hardware — leave alone. Boundary cases are common; the masking-protector and the underlying autistic processing style are layered, and you treat each on its own terms.
