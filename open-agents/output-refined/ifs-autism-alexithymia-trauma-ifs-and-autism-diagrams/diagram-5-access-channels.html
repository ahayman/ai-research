<!-- Diagram: Access Channels Map -->

<!-- Description: Shows the full set of channels through which autistic / aphantasic / alexithymic clients can access parts in IFS, with annotations for which combinations of features each channel works for. -->

<figure class="concept-diagram" id="diagram-5">
  <div class="diagram-container">
    <pre class="mermaid">
flowchart LR
    Center((Accessing<br/>a part))

    Visual["VISUAL<br/>(mental imagery)<br/><br/><span style='font-size:0.8rem'>Default IFS<br/>Blocked by aphantasia</span>"]
    Somatic["SOMATIC<br/>(interoception)<br/><br/><span style='font-size:0.8rem'>'Where in the body?'<br/>Blocked by alexithymia (Cat 6)</span>"]
    Cognitive["COGNITIVE<br/>('hearing in mind')<br/><br/><span style='font-size:0.8rem'>Knowing what a part thinks<br/>without feeling it</span>"]
    Auditory["AUDITORY<br/>(inner voice)<br/><br/><span style='font-size:0.8rem'>Some aphantasic clients<br/>do have inner speech</span>"]
    External["EXTERNALIZED<br/>(cards, drawings,<br/>spreadsheets,<br/>written dialogue)<br/><br/><span style='font-size:0.8rem'>Works regardless of<br/>internal access</span>"]
    Symbolic["SYMBOLIC PLACEHOLDER<br/>(name + role + function,<br/>no sensory texture)<br/><br/><span style='font-size:0.8rem'>Last-resort but valid;<br/>preserves model mechanics</span>"]

    Center --- Visual
    Center --- Somatic
    Center --- Cognitive
    Center --- Auditory
    Center --- External
    Center --- Symbolic

    classDef hub fill:#ddd6fe,stroke:#6d28d9,stroke-width:3px,color:#3b0764
    classDef intact fill:#dcfce7,stroke:#166534,color:#14532d
    classDef partial fill:#fef3c7,stroke:#92400e,color:#1f2937
    classDef substitute fill:#e0f2fe,stroke:#0284c7,color:#0c4a6e
    class Center hub
    class Visual,Somatic partial
    class Cognitive,Auditory intact
    class External,Symbolic substitute
    </pre>
  </div>
  <figcaption>
    <strong>Figure 5:</strong> Access channels map. Most autistic clients use a hybrid of channels. The hardest case — aphantasia + alexithymia + literal thinking — leaves Visual and Somatic attenuated; the work proceeds through Cognitive, Auditory, External, and Symbolic channels. The model's mechanics survive translation when the channel is substituted; what changes is the texture of access, not the procedural skeleton.
  </figcaption>
</figure>
