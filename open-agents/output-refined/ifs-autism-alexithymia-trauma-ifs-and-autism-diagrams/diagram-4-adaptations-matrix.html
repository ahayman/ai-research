        <tr style="border-bottom:1px solid #e5e7eb;">
          <td style="padding:0.75rem; vertical-align:top; background:#f9fafb;">
            <strong>Literal / pattern-first thinking</strong><br/>
            <span style="font-size:0.8rem; color:#6b7280;">Metaphor processing differences (PMC5843023 meta-analysis)</span>
          </td>
          <td style="padding:0.75rem; vertical-align:top;">
            • Index cards (one part per card)<br/>
            • Spreadsheet / tabular representations<br/>
            • Neural-network reframing ("patterns of brain activity, not little people")<br/>
            • Color-coded cards for emotional states<br/>
            • Descriptive labels ("Anxious Mode") rather than abstract "parts"<br/>
            • Brain-science explanations (PFC, parasympathetic NS, neural pathway strengthening)<br/>

          </td>
          <td style="padding:0.75rem; vertical-align:top; font-size:0.85rem;">
            Self Leadership Journey (literal-thinkers piece)<br/>
            AutSide Substack (Internal Architecture)<br/>
            IFS with Sanni
          </td>
        </tr>
        <tr style="border-bottom:1px solid #e5e7eb;">
          <td style="padding:0.75rem; vertical-align:top; background:#f9fafb;">
            <strong>Monotropism</strong><br/>
            <span style="font-size:0.8rem; color:#6b7280;">Murray, Lesser, Lawson 2005</span>
          </td>
          <td style="padding:0.75rem; vertical-align:top;">
            • Sustained dwell-time on one part across multiple sessions<br/>
            • Pace sessions around client's attentional flow, not therapist's structured check-ins<br/>
            • Fewer parts per session, deeper relationship<br/>
            • Recognize attention-shifting itself as parts content<br/>
            • Special-interest immersion as Self-access route (autistic flow)
          </td>
          <td style="padding:0.75rem; vertical-align:top; font-size:0.85rem;">
            Heasman et al. 2024 (autistic flow theory)<br/>
            Bergenfield (clinical practice)<br/>
            BPS Psychologist (monotropism, meditation, autistic flow)
          </td>
        </tr>
        <tr style="border-bottom:1px solid #e5e7eb;">
          <td style="padding:0.75rem; vertical-align:top; background:#f9fafb;">
            <strong>Masking history</strong><br/>
            <span style="font-size:0.8rem; color:#6b7280;">Hull/Mandy CAT-Q research</span>
          </td>
          <td style="padding:0.75rem; vertical-align:top;">
            • Hardware/software distinction explicit before parts work begins<br/>
            • Befriend masking-protectors; do not "unburden" the underlying autistic processing style<br/>
            • Test: if released, does this make me more comfortably autistic or less autistic?<br/>
            • Recognize masking deconstruction as its own slow process<br/>
            • Watch for masking-induced burnout as signal of overworked manager parts
          </td>
          <td style="padding:0.75rem; vertical-align:top; font-size:0.85rem;">
            IFS with Sanni<br/>
            Emma (IFS &amp; Neurodiversity Substack)<br/>
            Anchored in Self<br/>
            Stroud Therapy / Natasha Wilson
          </td>
        </tr>
        <tr style="border-bottom:1px solid #e5e7eb;">
          <td style="padding:0.75rem; vertical-align:top; background:#f9fafb;">
            <strong>Sensory profile</strong>
          </td>
          <td style="padding:0.75rem; vertical-align:top;">
            • Sensory regulation as session prerequisite (lighting, sound, posture, eye contact)<br/>
            • Telehealth often sensorily simpler than in-person<br/>
            • Distinguish sensory dysregulation (regulate room) from part-trigger (work with part)<br/>
            • Ask "is the room OK?" before "what part is activated?"<br/>
            • Movement, fidgeting, side-by-side seating, holding objects allowed
          </td>
          <td style="padding:0.75rem; vertical-align:top; font-size:0.85rem;">
            IFS Telehealth Collective<br/>
            Bergenfield (Wired to Feel)<br/>
            Open Doors Therapy
          </td>
        </tr>
        <tr style="border-bottom:1px solid #e5e7eb;">
          <td style="padding:0.75rem; vertical-align:top; background:#f9fafb;">
            <strong>Aphantasia</strong><br/>
            <span style="font-size:0.8rem; color:#6b7280;">Zeman 2015; Dance et al. 2021</span>
          </td>
          <td style="padding:0.75rem; vertical-align:top;">
            • Felt-sense substitution (if interoception intact)<br/>
            • Cognitive description ("if I described it in words without picturing it...")<br/>
            • Auditory access (inner voice / inner speech)<br/>
            • Externalized representation (drawing on paper, choosing an object)<br/>
            • Symbolic placeholder (name + role + function, no sensory texture)<br/>
            • Somatic mapping pointed on diagram of body
          </td>
          <td style="padding:0.75rem; vertical-align:top; font-size:0.85rem;">
            IFS Telehealth Collective ("Supporting Your Neurotype")<br/>
            Reframing Autism (aphantasia/autism guide)<br/>
            Anecdotal practitioner reports
          </td>
        </tr>
        <tr>
          <td style="padding:0.75rem; vertical-align:top; background:#f9fafb;">
            <strong>Universal-Self friction</strong>
          </td>
          <td style="padding:0.75rem; vertical-align:top;">
            • "Autistic Self" frame — in an autistic system, all parts and Self are autistic (Bergenfield)<br/>
            • Self universal but expressed through neurotype (Emma; prism metaphor)<br/>
            • 8 Cs available but their texture differs (calm = focused-immersion calm; connection through shared interest, not eye contact)<br/>
            • Special-interest immersion as alternative Self-access route<br/>
            • Honor that "step back from parts" may not be the only or even primary access
          </td>
          <td style="padding:0.75rem; vertical-align:top; font-size:0.85rem;">
            Bergenfield (Autistic Self, 2022 IFS Conference)<br/>
            Emma at IFS &amp; Neurodiversity (Can Self Be Autistic?)<br/>
            PARTS &amp; SELF (The Autistic Self)
          </td>
        </tr>
