<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MSA vs. Dialect Structural Comparison Matrix</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --accent: #4361ee; --accent-light: #e8edff;
    --same: #10b981; --same-bg: #d1fae5;
    --partial: #f59e0b; --partial-bg: #fef3c7;
    --diff: #ef4444; --diff-bg: #fee2e2;
    --msa: #3b82f6; --msa-bg: #dbeafe;
    --en: #10b981; --en-bg: #d1fae5;
    --muted: #6c757d; --caption-bg: #f8f9fa;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a; --fg: #e8e8f0; --surface: #1a1a2e; --border: #2d2d44;
      --accent: #6b8aff; --accent-light: #1e2a4a;
      --same: #34d399; --same-bg: #064e3b;
      --partial: #fbbf24; --partial-bg: #78350f;
      --diff: #f87171; --diff-bg: #5c1a1a;
      --msa: #60a5fa; --msa-bg: #1e3a5f;
      --en: #34d399; --en-bg: #064e3b;
      --muted: #9a9ab0; --caption-bg: #1a1a2e;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--fg); display: flex; justify-content: center; padding: 2rem 1rem; line-height: 1.6; }
  figure { max-width: 1100px; width: 100%; }
  .diagram-container { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 1.5rem 1rem; overflow-x: auto; }
  figcaption { text-align: center; margin-top: 1.5rem; padding: 1rem 1.5rem; background: var(--caption-bg); border-radius: 8px; border: 1px solid var(--border); }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  h3 { font-size: 1rem; text-align: center; margin-bottom: 1rem; color: var(--accent); }
  table { width: 100%; border-collapse: collapse; margin-bottom: 1.5rem; font-size: 0.85rem; min-width: 700px; }
  th { background: var(--accent-light); color: var(--accent); padding: 0.6rem 0.5rem; text-align: center; font-weight: 600; border: 1px solid var(--border); }
  th.msa { background: var(--msa-bg); color: var(--msa); }
  td { padding: 0.5rem; text-align: center; border: 1px solid var(--border); vertical-align: middle; }
  td.feature { text-align: left; font-weight: 600; background: var(--surface); min-width: 120px; }
  td.msa-cell { background: var(--msa-bg); font-weight: 600; color: var(--msa); }
  td.same { background: var(--same-bg); color: var(--same); }
  td.partial { background: var(--partial-bg); color: var(--partial); }
  td.diff { background: var(--diff-bg); color: var(--diff); }
  .legend { display: flex; gap: 1.5rem; justify-content: center; flex-wrap: wrap; margin: 1rem 0; font-size: 0.82rem; }
  .legend-item { display: flex; align-items: center; gap: 0.4rem; }
  .legend-swatch { width: 14px; height: 14px; border-radius: 3px; border: 1px solid var(--border); }
  .pattern-box { background: var(--accent-light); border: 1px solid var(--accent); border-radius: 8px; padding: 1rem 1.5rem; margin: 1rem 0; }
  .pattern-box h4 { color: var(--accent); margin-bottom: 0.5rem; font-size: 0.95rem; }
  .pattern-box p { font-size: 0.85rem; color: var(--fg); margin-bottom: 0.3rem; }
  .en-box { background: var(--en-bg); border: 1px solid var(--en); border-radius: 8px; padding: 1rem 1.5rem; margin: 1rem 0; }
  .en-box h4 { color: var(--en); margin-bottom: 0.5rem; font-size: 0.95rem; }
  .en-box p { font-size: 0.85rem; color: var(--fg); margin-bottom: 0.3rem; }
  .score-row td { font-weight: 700; font-size: 0.9rem; }
</style>
</head>
<body>
<figure>
  <div class="diagram-container">
    <h3>MSA vs. Dialect Structural Comparison Matrix</h3>

    <div class="legend">
      <div class="legend-item"><div class="legend-swatch" style="background:var(--msa-bg);border-color:var(--msa);"></div> MSA (reference)</div>
      <div class="legend-item"><div class="legend-swatch" style="background:var(--same-bg);border-color:var(--same);"></div> Retains MSA feature</div>
      <div class="legend-item"><div class="legend-swatch" style="background:var(--partial-bg);border-color:var(--partial);"></div> Partially retained</div>
      <div class="legend-item"><div class="legend-swatch" style="background:var(--diff-bg);border-color:var(--diff);"></div> Completely different</div>
    </div>

    <table>
      <thead>
        <tr>
          <th>Feature</th>
          <th class="msa">MSA (Fusha)</th>
          <th>Egyptian</th>
          <th>Levantine</th>
          <th>Gulf</th>
          <th>Moroccan</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td class="feature">Case System</td>
          <td class="msa-cell">3 cases (-u, -a, -i)</td>
          <td class="diff">LOST entirely</td>
          <td class="diff">LOST entirely</td>
          <td class="diff">LOST entirely</td>
          <td class="diff">LOST entirely</td>
        </tr>
        <tr>
          <td class="feature">Dual Number</td>
          <td class="msa-cell">Full (nouns, verbs, adj.)</td>
          <td class="partial">Nouns only (yomen)</td>
          <td class="partial">Nouns only</td>
          <td class="partial">Nouns only</td>
          <td class="partial">Nouns only</td>
        </tr>
        <tr>
          <td class="feature">Passive Voice</td>
          <td class="msa-cell">Internal vowel change<br/>(kataba -> kutiba)</td>
          <td class="diff">Periphrastic / it-</td>
          <td class="diff">Periphrastic / in-</td>
          <td class="partial">Some internal change</td>
          <td class="diff">Periphrastic / t-</td>
        </tr>
        <tr>
          <td class="feature">Negation</td>
          <td class="msa-cell">la / lam / ma / laysa</td>
          <td class="diff">ma...sh (circumfix)</td>
          <td class="diff">ma / mu</td>
          <td class="partial">ma</td>
          <td class="diff">ma...sh</td>
        </tr>
        <tr>
          <td class="feature">Future Marker</td>
          <td class="msa-cell">sawfa / sa-</td>
          <td class="diff">ha-</td>
          <td class="diff">rah-</td>
          <td class="diff">b-</td>
          <td class="diff">ghadi</td>
        </tr>
        <tr>
          <td class="feature">Subjunctive</td>
          <td class="msa-cell">Distinct mood form</td>
          <td class="diff">LOST</td>
          <td class="diff">LOST</td>
          <td class="diff">LOST</td>
          <td class="diff">LOST</td>
        </tr>
        <tr>
          <td class="feature">"What?"</td>
          <td class="msa-cell">madha</td>
          <td class="diff">eh</td>
          <td class="diff">shu</td>
          <td class="diff">shinu</td>
          <td class="diff">shnu / ash</td>
        </tr>
        <tr>
          <td class="feature">"Want"</td>
          <td class="msa-cell">uridu</td>
          <td class="diff">ayiz / ayza</td>
          <td class="diff">biddi</td>
          <td class="diff">abi / abgha</td>
          <td class="diff">bghit</td>
        </tr>
        <tr>
          <td class="feature">"Now"</td>
          <td class="msa-cell">al-an</td>
          <td class="diff">dilwaqti</td>
          <td class="diff">halla'</td>
          <td class="diff">al-hin</td>
          <td class="diff">daba</td>
        </tr>
        <tr>
          <td class="feature">"Very"</td>
          <td class="msa-cell">jiddan</td>
          <td class="diff">awi</td>
          <td class="diff">ktir</td>
          <td class="diff">wayid</td>
          <td class="diff">bezzaf</td>
        </tr>
        <tr>
          <td class="feature">"Good"</td>
          <td class="msa-cell">jayyid</td>
          <td class="diff">kuwayyis</td>
          <td class="diff">mnih</td>
          <td class="diff">zayn</td>
          <td class="diff">mziyan</td>
        </tr>
        <tr>
          <td class="feature">"How?"</td>
          <td class="msa-cell">kayfa</td>
          <td class="diff">izzay</td>
          <td class="diff">kif</td>
          <td class="diff">shilon</td>
          <td class="diff">ki-dayer</td>
        </tr>
        <tr class="score-row">
          <td class="feature" style="color:var(--accent);">Divergence Score</td>
          <td class="msa-cell">0 (reference)</td>
          <td class="diff" style="font-size:1rem;">HIGH</td>
          <td class="diff" style="font-size:1rem;">HIGH</td>
          <td class="partial" style="font-size:1rem;">MOD-HIGH</td>
          <td class="diff" style="font-size:1rem;">HIGHEST</td>
        </tr>
      </tbody>
    </table>

    <div class="pattern-box">
      <h4>THE PATTERN: Systematic Simplification</h4>
      <p><strong>Universal losses:</strong> ALL dialects lost the case system. ALL lost the subjunctive. ALL simplified the dual. This is not random drift -- it is predictable grammatical erosion following the same direction.</p>
      <p><strong>Vocabulary divergence:</strong> Everyday words diverge most (now, what, good, very). Formal/religious vocabulary stays closest to MSA. The more intimate the concept, the more dialectal the word.</p>
      <p><strong>Moroccan is the outlier:</strong> Consistently the MOST divergent from MSA, due to Berber substrate and heavy French influence. Vowel reduction makes it opaque to eastern speakers.</p>
    </div>

    <div class="en-box">
      <h4>ENGLISH COMPARISON: Nothing Equivalent</h4>
      <p>English dialect differences (British "boot" vs. American "trunk") are VOCABULARY differences with IDENTICAL grammar. Arabic dialect differences include different negation structures, different future markers, and completely different everyday vocabulary. The MSA-dialect gap is comparable to the Old English-Modern English gap -- except both forms are used simultaneously today.</p>
    </div>
  </div>
  <figcaption>
    <h2>MSA vs. Dialect Structural Comparison Matrix</h2>
    <p>Systematic comparison across 12 features shows that Arabic dialects diverge from MSA not randomly but in predictable patterns: case system universally lost, dual simplified, everyday vocabulary replaced by regional forms. Moroccan Arabic shows the greatest divergence. The pattern of simplification mirrors Latin-to-Romance-language changes.</p>
  </figcaption>
</figure>
</body>
</html>
