<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mutual Intelligibility Network</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --accent: #4361ee; --accent-light: #e8edff;
    --high: #10b981; --high-bg: #d1fae5;
    --mod: #f59e0b; --mod-bg: #fef3c7;
    --low: #ef4444; --low-bg: #fee2e2;
    --msa: #3b82f6; --msa-bg: #dbeafe;
    --egypt: #8b5cf6; --egypt-bg: #ede9fe;
    --en: #10b981; --en-bg: #d1fae5;
    --muted: #6c757d; --caption-bg: #f8f9fa;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a; --fg: #e8e8f0; --surface: #1a1a2e; --border: #2d2d44;
      --accent: #6b8aff; --accent-light: #1e2a4a;
      --high: #34d399; --high-bg: #064e3b;
      --mod: #fbbf24; --mod-bg: #78350f;
      --low: #f87171; --low-bg: #5c1a1a;
      --msa: #60a5fa; --msa-bg: #1e3a5f;
      --egypt: #a78bfa; --egypt-bg: #3b2d6b;
      --en: #34d399; --en-bg: #064e3b;
      --muted: #9a9ab0; --caption-bg: #1a1a2e;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--fg); display: flex; justify-content: center; padding: 2rem 1rem; line-height: 1.6; }
  figure { max-width: 1100px; width: 100%; }
  .diagram-container { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 1.5rem 1rem; overflow-x: auto; }
  figcaption { text-align: center; margin-top: 1.5rem; padding: 1rem 1.5rem; background: var(--caption-bg); border-radius: 8px; border: 1px solid var(--border); }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  svg { display: block; margin: 0 auto; }
  .title-text { font: bold 15px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
  .label { font: 11px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
  .label-bold { font: bold 11px 'Segoe UI', system-ui, sans-serif; }
  .label-sm { font: 10px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
  .node-label { font: bold 12px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
  .node-sub { font: 10px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
</style>
</head>
<body>
<figure>
  <div class="diagram-container">
    <svg viewBox="0 0 1060 750" xmlns="http://www.w3.org/2000/svg" style="min-width:700px;">

      <text x="530" y="28" text-anchor="middle" class="title-text" style="font-size:16px;">Arabic Dialect Mutual Intelligibility Network</text>
      <text x="530" y="46" text-anchor="middle" class="label-sm" style="font-size:11px;">Edge thickness = intelligibility level | Egyptian has outsized reach via media dominance</text>

      <!-- Legend -->
      <line x1="60" y1="70" x2="100" y2="70" stroke="var(--high)" stroke-width="4"/>
      <text x="108" y="74" class="label-sm" fill="var(--high)">High intelligibility</text>
      <line x1="250" y1="70" x2="290" y2="70" stroke="var(--mod)" stroke-width="2.5"/>
      <text x="298" y="74" class="label-sm" fill="var(--mod)">Moderate intelligibility</text>
      <line x1="470" y1="70" x2="510" y2="70" stroke="var(--low)" stroke-width="1.5" stroke-dasharray="5,3"/>
      <text x="518" y="74" class="label-sm" fill="var(--low)">Low intelligibility</text>
      <line x1="670" y1="70" x2="710" y2="70" stroke="var(--msa)" stroke-width="2" stroke-dasharray="3,3"/>
      <text x="718" y="74" class="label-sm" fill="var(--msa)">MSA bridge (formal)</text>

      <!-- NODE POSITIONS:
           Egyptian: 300, 250
           Levantine: 530, 170
           Iraqi: 730, 250
           Gulf: 730, 420
           Maghrebi: 200, 450
           MSA: 480, 380
      -->

      <!-- EDGES (drawn first, behind nodes) -->
      <!-- Egyptian - Levantine: HIGH -->
      <line x1="340" y1="230" x2="490" y2="180" stroke="var(--high)" stroke-width="5" opacity="0.7"/>
      <text x="400" y="195" text-anchor="middle" class="label-sm" fill="var(--high)">HIGH</text>

      <!-- Levantine - Iraqi: MOD-HIGH -->
      <line x1="570" y1="175" x2="690" y2="240" stroke="var(--high)" stroke-width="3.5" opacity="0.7"/>
      <text x="640" y="195" text-anchor="middle" class="label-sm" fill="var(--high)">MOD-HIGH</text>

      <!-- Iraqi - Gulf: MOD-HIGH -->
      <line x1="730" y1="280" x2="730" y2="390" stroke="var(--high)" stroke-width="3.5" opacity="0.7"/>
      <text x="755" y="340" text-anchor="start" class="label-sm" fill="var(--high)">MOD-HIGH</text>

      <!-- Egyptian - Gulf: MODERATE -->
      <line x1="340" y1="265" x2="690" y2="410" stroke="var(--mod)" stroke-width="2.5" opacity="0.6"/>
      <text x="530" y="360" text-anchor="middle" class="label-sm" fill="var(--mod)">MODERATE</text>

      <!-- Levantine - Gulf: MODERATE -->
      <line x1="560" y1="195" x2="700" y2="400" stroke="var(--mod)" stroke-width="2" opacity="0.5"/>

      <!-- Egyptian - Maghrebi: LOW -->
      <line x1="280" y1="275" x2="220" y2="420" stroke="var(--low)" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.6"/>
      <text x="230" y="355" text-anchor="middle" class="label-sm" fill="var(--low)">LOW</text>

      <!-- Levantine - Maghrebi: LOW -->
      <line x1="500" y1="195" x2="240" y2="440" stroke="var(--low)" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.4"/>

      <!-- Gulf - Maghrebi: VERY LOW -->
      <line x1="690" y1="430" x2="250" y2="460" stroke="var(--low)" stroke-width="1" stroke-dasharray="3,5" opacity="0.4"/>
      <text x="470" y="458" text-anchor="middle" class="label-sm" fill="var(--low)">VERY LOW</text>

      <!-- MSA bridge lines -->
      <line x1="480" y1="380" x2="320" y2="260" stroke="var(--msa)" stroke-width="2" stroke-dasharray="3,3" opacity="0.5"/>
      <line x1="480" y1="375" x2="530" y2="195" stroke="var(--msa)" stroke-width="2" stroke-dasharray="3,3" opacity="0.5"/>
      <line x1="510" y1="380" x2="710" y2="255" stroke="var(--msa)" stroke-width="2" stroke-dasharray="3,3" opacity="0.5"/>
      <line x1="510" y1="395" x2="710" y2="420" stroke="var(--msa)" stroke-width="2" stroke-dasharray="3,3" opacity="0.5"/>
      <line x1="450" y1="395" x2="230" y2="445" stroke="var(--msa)" stroke-width="2" stroke-dasharray="3,3" opacity="0.5"/>

      <!-- NODES -->
      <!-- Egyptian (special halo for media reach) -->
      <circle cx="300" cy="250" r="52" fill="var(--egypt-bg)" stroke="var(--egypt)" stroke-width="1" opacity="0.3"/>
      <circle cx="300" cy="250" r="40" fill="var(--egypt-bg)" stroke="var(--egypt)" stroke-width="2.5"/>
      <text x="300" y="246" text-anchor="middle" class="node-label" fill="var(--egypt)">EGYPTIAN</text>
      <text x="300" y="260" text-anchor="middle" class="node-sub">~100M speakers</text>
      <text x="300" y="305" text-anchor="middle" class="label-sm" fill="var(--egypt)">Media advantage:</text>
      <text x="300" y="316" text-anchor="middle" class="label-sm" fill="var(--egypt)">understood by nearly all</text>

      <!-- Levantine -->
      <circle cx="530" cy="170" r="36" fill="var(--surface)" stroke="var(--accent)" stroke-width="2"/>
      <text x="530" y="167" text-anchor="middle" class="node-label" fill="var(--accent)">LEVANTINE</text>
      <text x="530" y="180" text-anchor="middle" class="node-sub">~35M speakers</text>

      <!-- Iraqi -->
      <circle cx="730" cy="250" r="34" fill="var(--surface)" stroke="var(--accent)" stroke-width="2"/>
      <text x="730" y="247" text-anchor="middle" class="node-label" fill="var(--accent)">IRAQI</text>
      <text x="730" y="260" text-anchor="middle" class="node-sub">~40M speakers</text>

      <!-- Gulf -->
      <circle cx="730" cy="420" r="34" fill="var(--surface)" stroke="var(--accent)" stroke-width="2"/>
      <text x="730" y="417" text-anchor="middle" class="node-label" fill="var(--accent)">GULF</text>
      <text x="730" y="430" text-anchor="middle" class="node-sub">~30M speakers</text>

      <!-- Maghrebi (isolated position) -->
      <circle cx="200" cy="450" r="40" fill="var(--low-bg)" stroke="var(--low)" stroke-width="2.5"/>
      <text x="200" y="446" text-anchor="middle" class="node-label" fill="var(--low)">MAGHREBI</text>
      <text x="200" y="460" text-anchor="middle" class="node-sub">~90M speakers</text>
      <text x="200" y="500" text-anchor="middle" class="label-sm" fill="var(--low)">Most isolated:</text>
      <text x="200" y="511" text-anchor="middle" class="label-sm" fill="var(--low)">Berber + French influence</text>

      <!-- MSA (bridge node) -->
      <rect x="430" y="365" width="100" height="35" rx="17" fill="var(--msa-bg)" stroke="var(--msa)" stroke-width="2"/>
      <text x="480" y="387" text-anchor="middle" class="node-label" fill="var(--msa)">MSA</text>
      <text x="480" y="415" text-anchor="middle" class="label-sm" fill="var(--msa)">Formal bridge:</text>
      <text x="480" y="426" text-anchor="middle" class="label-sm" fill="var(--msa)">connects all dialects</text>

      <!-- Pattern insight box -->
      <rect x="80" y="545" width="900" height="55" rx="8" fill="var(--accent-light)" stroke="var(--accent)" stroke-width="2"/>
      <text x="530" y="567" text-anchor="middle" class="label-bold" style="font-size:12px;" fill="var(--accent)">THE PATTERN: Geographic Continuum + Media Asymmetry</text>
      <text x="530" y="585" text-anchor="middle" class="label" fill="var(--fg)">Adjacent dialects understand each other (Egyptian-Levantine, Levantine-Iraqi, Iraqi-Gulf). Distance = incomprehension.</text>
      <text x="530" y="596" text-anchor="middle" class="label" fill="var(--fg)">Egyptian breaks the pattern via media exposure -- understood far beyond geographic proximity.</text>

      <!-- English comparison -->
      <rect x="80" y="615" width="900" height="50" rx="8" fill="var(--en-bg)" stroke="var(--en)" stroke-width="1.5"/>
      <text x="530" y="637" text-anchor="middle" class="label-bold" fill="var(--en)">ENGLISH COMPARISON</text>
      <text x="530" y="653" text-anchor="middle" class="label" fill="var(--fg)">No English dialect pair has intelligibility as low as Egyptian-Moroccan. The closest English analogy would be if British, American,</text>
      <text x="530" y="663" text-anchor="middle" class="label" fill="var(--fg)">and Australian English were each structurally different languages that also used a shared formal standard for writing.</text>

      <!-- Dialect continuum note -->
      <rect x="80" y="680" width="900" height="40" rx="6" fill="var(--surface)" stroke="var(--border)" stroke-width="1"/>
      <text x="530" y="700" text-anchor="middle" class="label-sm">Like the Romance language continuum (Portuguese-Spanish-Catalan-French-Italian) -- each region understands its neighbors,</text>
      <text x="530" y="712" text-anchor="middle" class="label-sm">but mutual intelligibility drops with distance. Except all Arabic dialects are conventionally called "one language."</text>

    </svg>
  </div>
  <figcaption>
    <h2>Arabic Dialect Mutual Intelligibility Network</h2>
    <p>The network reveals two structural features: (1) Maghrebi Arabic's isolation from eastern dialects due to Berber/French influence and vowel reduction, and (2) Egyptian Arabic's outsized intelligibility due to a century of dominance in Arabic-language entertainment. MSA serves as a formal bridge when speakers of mutually unintelligible dialects meet.</p>
  </figcaption>
</figure>
</body>
</html>
