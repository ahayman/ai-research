<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ferguson's Diglossia Model -- H and L Domain Allocation</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --accent: #4361ee; --accent-light: #e8edff;
    --h-color: #3b82f6; --h-bg: #dbeafe;
    --l-color: #f59e0b; --l-bg: #fef3c7;
    --mix: #8b5cf6; --mix-bg: #ede9fe;
    --en: #10b981; --en-bg: #d1fae5;
    --muted: #6c757d; --caption-bg: #f8f9fa;
    --danger: #ef4444;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a; --fg: #e8e8f0; --surface: #1a1a2e; --border: #2d2d44;
      --accent: #6b8aff; --accent-light: #1e2a4a;
      --h-color: #60a5fa; --h-bg: #1e3a5f;
      --l-color: #fbbf24; --l-bg: #78350f;
      --mix: #a78bfa; --mix-bg: #3b2d6b;
      --en: #34d399; --en-bg: #064e3b;
      --muted: #9a9ab0; --caption-bg: #1a1a2e;
      --danger: #f87171;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--fg); display: flex; justify-content: center; padding: 2rem 1rem; line-height: 1.6; }
  figure { max-width: 1100px; width: 100%; }
  .diagram-container { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 1.5rem 1rem; overflow-x: auto; }
  figcaption { text-align: center; margin-top: 1.5rem; padding: 1rem 1.5rem; background: var(--caption-bg); border-radius: 8px; border: 1px solid var(--border); }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  svg { display: block; margin: 0 auto; }
  .title-text { font: bold 15px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
  .label { font: 11px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
  .label-bold { font: bold 11px 'Segoe UI', system-ui, sans-serif; }
  .label-sm { font: 10px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
  .section-title { font: bold 13px 'Segoe UI', system-ui, sans-serif; }
</style>
</head>
<body>
<figure>
  <div class="diagram-container">
    <svg viewBox="0 0 1060 820" xmlns="http://www.w3.org/2000/svg" style="min-width:780px;">

      <!-- Title -->
      <text x="530" y="28" text-anchor="middle" class="title-text" style="font-size:16px;">Ferguson's Diglossia Model: H and L Domain Allocation in Arabic</text>
      <text x="530" y="46" text-anchor="middle" class="label-sm" style="font-size:11px;">Ferguson (1959) -- The SAME speaker uses both varieties, switching by context</text>

      <!-- H COLUMN (MSA) -->
      <rect x="40" y="65" width="300" height="35" rx="6" fill="var(--h-bg)" stroke="var(--h-color)" stroke-width="2"/>
      <text x="190" y="87" text-anchor="middle" class="section-title" fill="var(--h-color)">H = MSA / Fusha (High Variety)</text>

      <rect x="40" y="108" width="300" height="30" rx="5" fill="var(--h-bg)" stroke="var(--h-color)" stroke-width="1"/>
      <text x="190" y="128" text-anchor="middle" class="label-bold" fill="var(--h-color)">News Broadcasts (reading)</text>

      <rect x="40" y="143" width="300" height="30" rx="5" fill="var(--h-bg)" stroke="var(--h-color)" stroke-width="1"/>
      <text x="190" y="163" text-anchor="middle" class="label-bold" fill="var(--h-color)">Mosque Sermons (khutba)</text>

      <rect x="40" y="178" width="300" height="30" rx="5" fill="var(--h-bg)" stroke="var(--h-color)" stroke-width="1"/>
      <text x="190" y="198" text-anchor="middle" class="label-bold" fill="var(--h-color)">University Lectures</text>

      <rect x="40" y="213" width="300" height="30" rx="5" fill="var(--h-bg)" stroke="var(--h-color)" stroke-width="1"/>
      <text x="190" y="233" text-anchor="middle" class="label-bold" fill="var(--h-color)">Political Speeches</text>

      <rect x="40" y="248" width="300" height="30" rx="5" fill="var(--h-bg)" stroke="var(--h-color)" stroke-width="1"/>
      <text x="190" y="268" text-anchor="middle" class="label-bold" fill="var(--h-color)">Literature & Formal Writing</text>

      <rect x="40" y="283" width="300" height="30" rx="5" fill="var(--h-bg)" stroke="var(--h-color)" stroke-width="1"/>
      <text x="190" y="303" text-anchor="middle" class="label-bold" fill="var(--h-color)">Legal Documents & Contracts</text>

      <rect x="40" y="318" width="300" height="30" rx="5" fill="var(--h-bg)" stroke="var(--h-color)" stroke-width="1"/>
      <text x="190" y="338" text-anchor="middle" class="label-bold" fill="var(--h-color)">Inter-Arab Communication</text>

      <text x="190" y="368" text-anchor="middle" class="label-sm">Learned through formal education</text>
      <text x="190" y="382" text-anchor="middle" class="label-sm" fill="var(--danger)">Nobody's native language</text>

      <!-- L COLUMN (Dialect) -->
      <rect x="720" y="65" width="300" height="35" rx="6" fill="var(--l-bg)" stroke="var(--l-color)" stroke-width="2"/>
      <text x="870" y="87" text-anchor="middle" class="section-title" fill="var(--l-color)">L = Dialect / Ammiyya (Low Variety)</text>

      <rect x="720" y="108" width="300" height="30" rx="5" fill="var(--l-bg)" stroke="var(--l-color)" stroke-width="1"/>
      <text x="870" y="128" text-anchor="middle" class="label-bold" fill="var(--l-color)">Family Conversation</text>

      <rect x="720" y="143" width="300" height="30" rx="5" fill="var(--l-bg)" stroke="var(--l-color)" stroke-width="1"/>
      <text x="870" y="163" text-anchor="middle" class="label-bold" fill="var(--l-color)">Jokes & Humor</text>

      <rect x="720" y="178" width="300" height="30" rx="5" fill="var(--l-bg)" stroke="var(--l-color)" stroke-width="1"/>
      <text x="870" y="198" text-anchor="middle" class="label-bold" fill="var(--l-color)">Market Bargaining</text>

      <rect x="720" y="213" width="300" height="30" rx="5" fill="var(--l-bg)" stroke="var(--l-color)" stroke-width="1"/>
      <text x="870" y="233" text-anchor="middle" class="label-bold" fill="var(--l-color)">Popular Music & Folk Songs</text>

      <rect x="720" y="248" width="300" height="30" rx="5" fill="var(--l-bg)" stroke="var(--l-color)" stroke-width="1"/>
      <text x="870" y="268" text-anchor="middle" class="label-bold" fill="var(--l-color)">Soap Operas & Comedy</text>

      <rect x="720" y="283" width="300" height="30" rx="5" fill="var(--l-bg)" stroke="var(--l-color)" stroke-width="1"/>
      <text x="870" y="303" text-anchor="middle" class="label-bold" fill="var(--l-color)">Internal Monologue & Emotion</text>

      <rect x="720" y="318" width="300" height="30" rx="5" fill="var(--l-bg)" stroke="var(--l-color)" stroke-width="1"/>
      <text x="870" y="338" text-anchor="middle" class="label-bold" fill="var(--l-color)">Children's First Language</text>

      <text x="870" y="368" text-anchor="middle" class="label-sm">Acquired naturally at home</text>
      <text x="870" y="382" text-anchor="middle" class="label-sm" fill="var(--en)">Everyone's native language</text>

      <!-- MIDDLE: MIXED/SHIFTING ZONE -->
      <rect x="380" y="65" width="300" height="35" rx="6" fill="var(--mix-bg)" stroke="var(--mix)" stroke-width="2"/>
      <text x="530" y="87" text-anchor="middle" class="section-title" fill="var(--mix)">Shifting Zone (Mixed H+L)</text>

      <rect x="380" y="108" width="300" height="30" rx="5" fill="var(--mix-bg)" stroke="var(--mix)" stroke-width="1"/>
      <text x="530" y="128" text-anchor="middle" class="label-bold" fill="var(--mix)">Social Media Posts</text>

      <rect x="380" y="143" width="300" height="30" rx="5" fill="var(--mix-bg)" stroke="var(--mix)" stroke-width="1"/>
      <text x="530" y="163" text-anchor="middle" class="label-bold" fill="var(--mix)">Modern Novels (dialogue)</text>

      <rect x="380" y="178" width="300" height="30" rx="5" fill="var(--mix-bg)" stroke="var(--mix)" stroke-width="1"/>
      <text x="530" y="198" text-anchor="middle" class="label-bold" fill="var(--mix)">TV Talk Shows</text>

      <rect x="380" y="213" width="300" height="30" rx="5" fill="var(--mix-bg)" stroke="var(--mix)" stroke-width="1"/>
      <text x="530" y="233" text-anchor="middle" class="label-bold" fill="var(--mix)">YouTube & Podcasts</text>

      <rect x="380" y="248" width="300" height="30" rx="5" fill="var(--mix-bg)" stroke="var(--mix)" stroke-width="1"/>
      <text x="530" y="268" text-anchor="middle" class="label-bold" fill="var(--mix)">Educated Conversation</text>

      <rect x="380" y="283" width="300" height="30" rx="5" fill="var(--mix-bg)" stroke="var(--mix)" stroke-width="1"/>
      <text x="530" y="303" text-anchor="middle" class="label-bold" fill="var(--mix)">Code-Mixing (Arabic + EN/FR)</text>

      <!-- Arrows showing shift direction -->
      <text x="530" y="338" text-anchor="middle" class="label-sm" fill="var(--mix)">Social media is expanding this zone</text>
      <line x1="530" y1="345" x2="530" y2="370" stroke="var(--mix)" stroke-width="2" marker-end="url(#arrMix)"/>
      <text x="530" y="385" text-anchor="middle" class="label-sm" fill="var(--mix)">Written dialect use: historically unprecedented</text>

      <defs>
        <marker id="arrMix" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="var(--mix)"/></marker>
      </defs>

      <!-- CRITICAL PATTERN BOX -->
      <rect x="100" y="410" width="860" height="70" rx="8" fill="var(--accent-light)" stroke="var(--accent)" stroke-width="2"/>
      <text x="530" y="433" text-anchor="middle" class="label-bold" style="font-size:13px;" fill="var(--accent)">THE CRITICAL PATTERN</text>
      <text x="530" y="452" text-anchor="middle" class="label" fill="var(--fg)">A professor LECTURES in MSA but CHATS with students in dialect. A politician gives a SPEECH in MSA but DISCUSSES strategy in dialect.</text>
      <text x="530" y="468" text-anchor="middle" class="label" fill="var(--fg)">Reading a newspaper aloud = MSA. Discussing its contents = dialect. SAME PERSON, SAME MOMENT, DIFFERENT VARIETY.</text>

      <!-- ENGLISH COMPARISON -->
      <rect x="100" y="500" width="860" height="95" rx="8" fill="var(--en-bg)" stroke="var(--en)" stroke-width="2"/>
      <text x="530" y="523" text-anchor="middle" class="section-title" fill="var(--en)">ENGLISH COMPARISON: Nothing Like This Exists</text>
      <text x="530" y="543" text-anchor="middle" class="label" fill="var(--fg)">English has formal vs. informal registers, but no English speaker needs a structurally different variety</text>
      <text x="530" y="559" text-anchor="middle" class="label" fill="var(--fg)">to read a newspaper vs. chat with friends. The SAME grammar works for both.</text>
      <text x="530" y="579" text-anchor="middle" class="label-sm" fill="var(--muted)">Closest historical parallel: medieval Europe where Latin (H) coexisted with vernacular languages (L) -- but that ended centuries ago.</text>

      <!-- SCALE COMPARISON -->
      <text x="530" y="620" text-anchor="middle" class="section-title" fill="var(--fg)">Scale of the Structural Gap</text>

      <!-- English dialects -->
      <rect x="100" y="635" width="380" height="55" rx="6" fill="var(--en-bg)" stroke="var(--en)" stroke-width="1.5"/>
      <text x="290" y="655" text-anchor="middle" class="label-bold" fill="var(--en)">English Dialect Variation</text>
      <text x="290" y="670" text-anchor="middle" class="label-sm">British vs. American vs. Australian</text>
      <text x="290" y="682" text-anchor="middle" class="label-sm">Accent + some vocabulary. SAME grammar.</text>

      <!-- Arabic dialects -->
      <rect x="580" y="635" width="380" height="55" rx="6" fill="var(--l-bg)" stroke="var(--l-color)" stroke-width="1.5"/>
      <text x="770" y="655" text-anchor="middle" class="label-bold" fill="var(--l-color)">Arabic Dialect Variation</text>
      <text x="770" y="670" text-anchor="middle" class="label-sm">Egyptian vs. Gulf vs. Moroccan</text>
      <text x="770" y="682" text-anchor="middle" class="label-sm">Different grammar + vocabulary + phonology</text>

      <!-- Gap indicator -->
      <rect x="100" y="700" width="380" height="25" rx="4" fill="var(--en)" opacity="0.15"/>
      <rect x="100" y="700" width="50" height="25" rx="4" fill="var(--en)" opacity="0.5"/>
      <text x="290" y="717" text-anchor="middle" class="label-sm" fill="var(--en)">Small gap -- fully mutually intelligible</text>

      <rect x="580" y="700" width="380" height="25" rx="4" fill="var(--l-color)" opacity="0.15"/>
      <rect x="580" y="700" width="300" height="25" rx="4" fill="var(--l-color)" opacity="0.5"/>
      <text x="770" y="717" text-anchor="middle" class="label-sm" fill="var(--l-color)">Large gap -- comparable to Portuguese vs. Spanish</text>

      <!-- Bottom note -->
      <text x="530" y="755" text-anchor="middle" class="label-sm" fill="var(--muted)">MSA-Dialect gap is comparable to Old English vs. Modern English -- except both forms are used SIMULTANEOUSLY</text>

    </svg>
  </div>
  <figcaption>
    <h2>Ferguson's Diglossia Model Applied to Arabic</h2>
    <p>Ferguson (1959) defined diglossia as a stable sociolinguistic situation where H (High) and L (Low) varieties coexist with specialized functions. Arabic is the world's most prominent example. The critical insight: MSA is nobody's native language -- every Arabic speaker acquires a dialect first and learns MSA through education. English has no equivalent structural split.</p>
  </figcaption>
</figure>
</body>
</html>
