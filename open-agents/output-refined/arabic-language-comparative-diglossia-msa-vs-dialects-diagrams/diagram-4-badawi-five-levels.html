<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Badawi's Five-Level Arabic Continuum</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --accent: #4361ee; --accent-light: #e8edff;
    --l1: #1e40af; --l1-bg: #dbeafe;
    --l2: #3b82f6; --l2-bg: #dbeafe;
    --l3: #8b5cf6; --l3-bg: #ede9fe;
    --l4: #f59e0b; --l4-bg: #fef3c7;
    --l5: #ef4444; --l5-bg: #fee2e2;
    --en: #10b981; --en-bg: #d1fae5;
    --muted: #6c757d; --caption-bg: #f8f9fa;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a; --fg: #e8e8f0; --surface: #1a1a2e; --border: #2d2d44;
      --accent: #6b8aff; --accent-light: #1e2a4a;
      --l1: #93c5fd; --l1-bg: #1e3a5f;
      --l2: #60a5fa; --l2-bg: #1e3a5f;
      --l3: #a78bfa; --l3-bg: #3b2d6b;
      --l4: #fbbf24; --l4-bg: #78350f;
      --l5: #f87171; --l5-bg: #5c1a1a;
      --en: #34d399; --en-bg: #064e3b;
      --muted: #9a9ab0; --caption-bg: #1a1a2e;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--fg); display: flex; justify-content: center; padding: 2rem 1rem; line-height: 1.6; }
  figure { max-width: 1100px; width: 100%; }
  .diagram-container { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 1.5rem 1rem; overflow-x: auto; }
  figcaption { text-align: center; margin-top: 1.5rem; padding: 1rem 1.5rem; background: var(--caption-bg); border-radius: 8px; border: 1px solid var(--border); }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  svg { display: block; margin: 0 auto; }
  .title-text { font: bold 15px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
  .label { font: 11px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
  .label-bold { font: bold 11px 'Segoe UI', system-ui, sans-serif; }
  .label-sm { font: 10px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
  .level-title { font: bold 12px 'Segoe UI', system-ui, sans-serif; }
  .level-arabic { font: 11px 'Segoe UI', system-ui, sans-serif; font-style: italic; }
</style>
</head>
<body>
<figure>
  <div class="diagram-container">
    <svg viewBox="0 0 1060 830" xmlns="http://www.w3.org/2000/svg" style="min-width:700px;">

      <text x="530" y="28" text-anchor="middle" class="title-text" style="font-size:16px;">Badawi's Five-Level Arabic Continuum (1973)</text>
      <text x="530" y="46" text-anchor="middle" class="label-sm" style="font-size:11px;">Replaces Ferguson's binary H/L with a gradient -- reality is a spectrum, not a switch</text>

      <!-- Left label: FORMALITY axis -->
      <text x="25" y="250" text-anchor="middle" class="label-bold" fill="var(--l1)" transform="rotate(-90, 25, 250)">MORE FORMAL</text>
      <text x="25" y="540" text-anchor="middle" class="label-bold" fill="var(--l5)" transform="rotate(-90, 25, 540)">MORE INFORMAL</text>
      <line x1="40" y1="80" x2="40" y2="620" stroke="var(--border)" stroke-width="1.5" marker-end="url(#arrDown)"/>
      <defs>
        <marker id="arrDown" markerWidth="8" markerHeight="8" refX="4" refY="8" orient="auto"><polygon points="0 0, 8 0, 4 8" fill="var(--border)"/></marker>
      </defs>

      <!-- LEVEL 1: Classical Arabic -->
      <rect x="60" y="70" width="580" height="85" rx="8" fill="var(--l1-bg)" stroke="var(--l1)" stroke-width="2"/>
      <text x="80" y="92" class="level-title" fill="var(--l1)">Level 1: Fusha al-Turath (Classical Arabic)</text>
      <text x="80" y="108" class="level-arabic" fill="var(--l1)">فصحى التراث</text>
      <text x="80" y="125" class="label" fill="var(--fg)">The Quran, classical poetry, medieval scholarship</text>
      <text x="80" y="140" class="label-sm">Full case endings, dual in all forms, classical vocabulary. Recited, not spoken conversationally.</text>

      <!-- Context for L1 -->
      <rect x="670" y="70" width="350" height="85" rx="6" fill="var(--surface)" stroke="var(--l1)" stroke-width="1"/>
      <text x="690" y="92" class="label-bold" fill="var(--l1)">Used for:</text>
      <text x="690" y="108" class="label">Quran recitation (tajwid)</text>
      <text x="690" y="122" class="label">Classical poetry reading</text>
      <text x="690" y="136" class="label">Religious legal texts</text>
      <text x="690" y="150" class="label-sm" fill="var(--muted)">Audience: scholars, imams, Quran students</text>

      <!-- LEVEL 2: Modern Standard Arabic -->
      <rect x="60" y="165" width="580" height="85" rx="8" fill="var(--l2-bg)" stroke="var(--l2)" stroke-width="2"/>
      <text x="80" y="187" class="level-title" fill="var(--l2)">Level 2: Fusha al-Asr (Modern Standard Arabic)</text>
      <text x="80" y="203" class="level-arabic" fill="var(--l2)">فصحى العصر</text>
      <text x="80" y="220" class="label" fill="var(--fg)">News, academic writing, official documents, formal speeches</text>
      <text x="80" y="235" class="label-sm">Same grammar as Classical but modernized vocabulary, simpler style. Case endings often dropped in speech.</text>

      <rect x="670" y="165" width="350" height="85" rx="6" fill="var(--surface)" stroke="var(--l2)" stroke-width="1"/>
      <text x="690" y="187" class="label-bold" fill="var(--l2)">Used for:</text>
      <text x="690" y="203" class="label">Al Jazeera / Al Arabiya news</text>
      <text x="690" y="217" class="label">University textbooks</text>
      <text x="690" y="231" class="label">Government documents</text>
      <text x="690" y="245" class="label-sm" fill="var(--muted)">Audience: all literate Arabic speakers</text>

      <!-- LEVEL 3: Educated Colloquial -->
      <rect x="60" y="260" width="580" height="85" rx="8" fill="var(--l3-bg)" stroke="var(--l3)" stroke-width="2"/>
      <text x="80" y="282" class="level-title" fill="var(--l3)">Level 3: Ammiyyat al-Muthaqqafin (Educated Colloquial)</text>
      <text x="80" y="298" class="level-arabic" fill="var(--l3)">عامية المثقفين</text>
      <text x="80" y="315" class="label" fill="var(--fg)">University corridor conversation, professional discussion, dinner parties</text>
      <text x="80" y="330" class="label-sm">Dialect base with heavy MSA vocabulary. Code-switches freely. No case endings. Technical terms from MSA.</text>

      <rect x="670" y="260" width="350" height="85" rx="6" fill="var(--surface)" stroke="var(--l3)" stroke-width="1"/>
      <text x="690" y="282" class="label-bold" fill="var(--l3)">Used for:</text>
      <text x="690" y="298" class="label">Inter-dialect communication</text>
      <text x="690" y="312" class="label">Professional workplace chat</text>
      <text x="690" y="326" class="label">TV talk shows and interviews</text>
      <text x="690" y="340" class="label-sm" fill="var(--muted)">Audience: educated urbanites</text>

      <!-- LEVEL 4: Semi-literate Colloquial -->
      <rect x="60" y="355" width="580" height="85" rx="8" fill="var(--l4-bg)" stroke="var(--l4)" stroke-width="2"/>
      <text x="80" y="377" class="level-title" fill="var(--l4)">Level 4: Ammiyyat al-Mutanawwirin (Literate Colloquial)</text>
      <text x="80" y="393" class="level-arabic" fill="var(--l4)">عامية المتنورين</text>
      <text x="80" y="410" class="label" fill="var(--fg)">Urban everyday conversation, shop talk, basic workplace interaction</text>
      <text x="80" y="425" class="label-sm">Strongly dialectal with occasional MSA vocabulary for formal concepts. Standard regional dialect.</text>

      <rect x="670" y="355" width="350" height="85" rx="6" fill="var(--surface)" stroke="var(--l4)" stroke-width="1"/>
      <text x="690" y="377" class="label-bold" fill="var(--l4)">Used for:</text>
      <text x="690" y="393" class="label">Street conversation</text>
      <text x="690" y="407" class="label">Social media / texting</text>
      <text x="690" y="421" class="label">Soap operas, comedy</text>
      <text x="690" y="435" class="label-sm" fill="var(--muted)">Audience: general urban population</text>

      <!-- LEVEL 5: Illiterate Colloquial -->
      <rect x="60" y="450" width="580" height="85" rx="8" fill="var(--l5-bg)" stroke="var(--l5)" stroke-width="2"/>
      <text x="80" y="472" class="level-title" fill="var(--l5)">Level 5: Ammiyyat al-Ummiyyin (Unschooled Colloquial)</text>
      <text x="80" y="488" class="level-arabic" fill="var(--l5)">عامية الأميين</text>
      <text x="80" y="505" class="label" fill="var(--fg)">Rural conversation, uneducated speakers, deepest dialectal forms</text>
      <text x="80" y="520" class="label-sm">Pure dialect with no MSA influence. Most archaic and most regionally divergent. May retain some features lost in urban dialect.</text>

      <rect x="670" y="450" width="350" height="85" rx="6" fill="var(--surface)" stroke="var(--l5)" stroke-width="1"/>
      <text x="690" y="472" class="label-bold" fill="var(--l5)">Used for:</text>
      <text x="690" y="488" class="label">Rural village life</text>
      <text x="690" y="502" class="label">Folk traditions and oral culture</text>
      <text x="690" y="516" class="label">Internal family communication</text>
      <text x="690" y="530" class="label-sm" fill="var(--muted)">Audience: local community only</text>

      <!-- Gradient bar -->
      <defs>
        <linearGradient id="gradH2L" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="var(--l1)"/>
          <stop offset="25%" stop-color="var(--l2)"/>
          <stop offset="50%" stop-color="var(--l3)"/>
          <stop offset="75%" stop-color="var(--l4)"/>
          <stop offset="100%" stop-color="var(--l5)"/>
        </linearGradient>
      </defs>
      <rect x="45" y="75" width="8" height="455" rx="4" fill="url(#gradH2L)" opacity="0.6"/>

      <!-- PATTERN BOX -->
      <rect x="60" y="555" width="960" height="65" rx="8" fill="var(--accent-light)" stroke="var(--accent)" stroke-width="2"/>
      <text x="530" y="577" text-anchor="middle" class="label-bold" style="font-size:12px;" fill="var(--accent)">THE PATTERN: Fluid Navigation, Not Binary Switching</text>
      <text x="530" y="595" text-anchor="middle" class="label" fill="var(--fg)">Educated Arabic speakers navigate levels 2-4 fluidly, shifting up (toward MSA) or down (toward dialect) based on context.</text>
      <text x="530" y="610" text-anchor="middle" class="label" fill="var(--fg)">Ferguson's binary H/L is a useful simplification, but Badawi's continuum captures how speakers actually behave.</text>

      <!-- ENGLISH COMPARISON -->
      <rect x="60" y="635" width="960" height="80" rx="8" fill="var(--en-bg)" stroke="var(--en)" stroke-width="1.5"/>
      <text x="530" y="657" text-anchor="middle" class="label-bold" fill="var(--en)">ENGLISH COMPARISON: Register vs. Variety</text>
      <text x="530" y="675" text-anchor="middle" class="label" fill="var(--fg)">English has formality registers: "Yo, what's up" (informal) vs. "Good afternoon, how do you do" (formal).</text>
      <text x="530" y="691" text-anchor="middle" class="label" fill="var(--fg)">But these are the SAME language variety with different word choices. Arabic levels involve different GRAMMAR --</text>
      <text x="530" y="707" text-anchor="middle" class="label" fill="var(--fg)">case endings present at Level 1-2, absent at Level 3-5. Verb morphology changes. It is not just word choice.</text>

      <!-- Bottom note on who operates where -->
      <text x="530" y="745" text-anchor="middle" class="label-sm">Badawi's model was developed for Egyptian Arabic (1973) but the five-level framework applies across all Arabic-speaking communities.</text>
      <text x="530" y="760" text-anchor="middle" class="label-sm">For learners: MSA study targets Levels 1-2. Dialect study targets Levels 4-5. Level 3 is where most interaction happens.</text>

    </svg>
  </div>
  <figcaption>
    <h2>Badawi's Five-Level Arabic Continuum (1973)</h2>
    <p>El-Said Badawi proposed five levels of Arabic in Egypt, replacing Ferguson's binary H/L model with a realistic continuum. Educated speakers navigate Levels 2-4 fluidly, shifting toward MSA for formality and toward dialect for intimacy. The gradient model captures what the binary model misses: Arabic is not two separate languages but a spectrum with structural variation at each point.</p>
  </figcaption>
</figure>
</body>
</html>
