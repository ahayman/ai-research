<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Learner's Decision Tree -- Which Arabic?</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --accent: #4361ee; --accent-light: #e8edff;
    --msa: #3b82f6; --msa-bg: #dbeafe;
    --dialect: #f59e0b; --dialect-bg: #fef3c7;
    --both: #8b5cf6; --both-bg: #ede9fe;
    --pattern: #ec4899; --pattern-bg: #fce7f3;
    --en: #10b981; --en-bg: #d1fae5;
    --muted: #6c757d; --caption-bg: #f8f9fa;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a; --fg: #e8e8f0; --surface: #1a1a2e; --border: #2d2d44;
      --accent: #6b8aff; --accent-light: #1e2a4a;
      --msa: #60a5fa; --msa-bg: #1e3a5f;
      --dialect: #fbbf24; --dialect-bg: #78350f;
      --both: #a78bfa; --both-bg: #3b2d6b;
      --pattern: #f472b6; --pattern-bg: #5c1a3a;
      --en: #34d399; --en-bg: #064e3b;
      --muted: #9a9ab0; --caption-bg: #1a1a2e;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--fg); display: flex; justify-content: center; padding: 2rem 1rem; line-height: 1.6; }
  figure { max-width: 1100px; width: 100%; }
  .diagram-container { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 1.5rem 1rem; overflow-x: auto; }
  figcaption { text-align: center; margin-top: 1.5rem; padding: 1rem 1.5rem; background: var(--caption-bg); border-radius: 8px; border: 1px solid var(--border); }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  svg { display: block; margin: 0 auto; }
  .title-text { font: bold 15px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
  .label { font: 11px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
  .label-bold { font: bold 11px 'Segoe UI', system-ui, sans-serif; }
  .label-sm { font: 10px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
  .q-text { font: bold 12px 'Segoe UI', system-ui, sans-serif; }
</style>
</head>
<body>
<figure>
  <div class="diagram-container">
    <svg viewBox="0 0 1060 880" xmlns="http://www.w3.org/2000/svg" style="min-width:750px;">
      <defs>
        <marker id="arrB" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="var(--accent)"/></marker>
        <marker id="arrM" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="var(--msa)"/></marker>
        <marker id="arrD" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="var(--dialect)"/></marker>
        <marker id="arrP" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="var(--pattern)"/></marker>
      </defs>

      <text x="530" y="28" text-anchor="middle" class="title-text" style="font-size:16px;">The Learner's Decision Tree: Which Arabic Should You Learn?</text>
      <text x="530" y="46" text-anchor="middle" class="label-sm" style="font-size:11px;">No English learner faces this dilemma -- one English works everywhere. Arabic requires strategic choice.</text>

      <!-- ENTRY NODE -->
      <rect x="370" y="60" width="320" height="40" rx="20" fill="var(--accent-light)" stroke="var(--accent)" stroke-width="2.5"/>
      <text x="530" y="85" text-anchor="middle" class="q-text" fill="var(--accent)">Why are you learning Arabic?</text>

      <!-- Branch lines from entry -->
      <line x1="420" y1="100" x2="150" y2="150" stroke="var(--accent)" stroke-width="1.5" marker-end="url(#arrB)"/>
      <line x1="480" y1="100" x2="370" y2="150" stroke="var(--accent)" stroke-width="1.5" marker-end="url(#arrB)"/>
      <line x1="530" y1="100" x2="530" y2="150" stroke="var(--accent)" stroke-width="1.5" marker-end="url(#arrB)"/>
      <line x1="580" y1="100" x2="690" y2="150" stroke="var(--accent)" stroke-width="1.5" marker-end="url(#arrB)"/>
      <line x1="640" y1="100" x2="900" y2="150" stroke="var(--accent)" stroke-width="1.5" marker-end="url(#arrB)"/>

      <!-- BRANCH 1: Read/Write formally -->
      <rect x="50" y="150" width="200" height="55" rx="6" fill="var(--surface)" stroke="var(--accent)" stroke-width="1.5"/>
      <text x="150" y="170" text-anchor="middle" class="q-text" fill="var(--accent)">To read & write</text>
      <text x="150" y="185" text-anchor="middle" class="label" fill="var(--fg)">formally?</text>
      <text x="150" y="198" text-anchor="middle" class="label-sm">(books, news, documents)</text>
      <line x1="150" y1="205" x2="150" y2="240" stroke="var(--msa)" stroke-width="1.5" marker-end="url(#arrM)"/>
      <rect x="60" y="240" width="180" height="45" rx="8" fill="var(--msa-bg)" stroke="var(--msa)" stroke-width="2"/>
      <text x="150" y="260" text-anchor="middle" class="label-bold" fill="var(--msa)">MSA FIRST</text>
      <text x="150" y="275" text-anchor="middle" class="label-sm" fill="var(--msa)">Pan-Arab reading access</text>

      <!-- BRANCH 2: Specific country -->
      <rect x="280" y="150" width="200" height="55" rx="6" fill="var(--surface)" stroke="var(--accent)" stroke-width="1.5"/>
      <text x="380" y="170" text-anchor="middle" class="q-text" fill="var(--accent)">To converse in a</text>
      <text x="380" y="185" text-anchor="middle" class="label" fill="var(--fg)">specific country?</text>
      <text x="380" y="198" text-anchor="middle" class="label-sm">(travel, relationships, work)</text>
      <line x1="380" y1="205" x2="380" y2="240" stroke="var(--dialect)" stroke-width="1.5" marker-end="url(#arrD)"/>
      <rect x="290" y="240" width="180" height="45" rx="8" fill="var(--dialect-bg)" stroke="var(--dialect)" stroke-width="2"/>
      <text x="380" y="260" text-anchor="middle" class="label-bold" fill="var(--dialect)">THAT DIALECT</text>
      <text x="380" y="275" text-anchor="middle" class="label-sm" fill="var(--dialect)">Immediate conversation</text>

      <!-- BRANCH 3: Media -->
      <rect x="440" y="150" width="180" height="55" rx="6" fill="var(--surface)" stroke="var(--accent)" stroke-width="1.5"/>
      <text x="530" y="170" text-anchor="middle" class="q-text" fill="var(--accent)">To understand</text>
      <text x="530" y="185" text-anchor="middle" class="label" fill="var(--fg)">movies & music?</text>
      <text x="530" y="198" text-anchor="middle" class="label-sm">(entertainment, media)</text>
      <line x1="530" y1="205" x2="530" y2="240" stroke="var(--dialect)" stroke-width="1.5" marker-end="url(#arrD)"/>
      <rect x="440" y="240" width="180" height="45" rx="8" fill="var(--dialect-bg)" stroke="var(--dialect)" stroke-width="2"/>
      <text x="530" y="260" text-anchor="middle" class="label-bold" fill="var(--dialect)">EGYPTIAN ARABIC</text>
      <text x="530" y="275" text-anchor="middle" class="label-sm" fill="var(--dialect)">Most widely understood</text>

      <!-- BRANCH 4: Religion -->
      <rect x="640" y="150" width="180" height="55" rx="6" fill="var(--surface)" stroke="var(--accent)" stroke-width="1.5"/>
      <text x="730" y="170" text-anchor="middle" class="q-text" fill="var(--accent)">To understand</text>
      <text x="730" y="185" text-anchor="middle" class="label" fill="var(--fg)">the Quran?</text>
      <text x="730" y="198" text-anchor="middle" class="label-sm">(religious study)</text>
      <line x1="730" y1="205" x2="730" y2="240" stroke="var(--msa)" stroke-width="1.5" marker-end="url(#arrM)"/>
      <rect x="640" y="240" width="180" height="45" rx="8" fill="var(--msa-bg)" stroke="var(--msa)" stroke-width="2"/>
      <text x="730" y="260" text-anchor="middle" class="label-bold" fill="var(--msa)">CLASSICAL / MSA</text>
      <text x="730" y="275" text-anchor="middle" class="label-sm" fill="var(--msa)">Quranic Arabic first</text>

      <!-- BRANCH 5: General -->
      <rect x="840" y="150" width="180" height="55" rx="6" fill="var(--surface)" stroke="var(--accent)" stroke-width="1.5"/>
      <text x="930" y="170" text-anchor="middle" class="q-text" fill="var(--accent)">General</text>
      <text x="930" y="185" text-anchor="middle" class="label" fill="var(--fg)">communication?</text>
      <text x="930" y="198" text-anchor="middle" class="label-sm">(broadest utility)</text>
      <line x1="930" y1="205" x2="930" y2="240" stroke="var(--both)" stroke-width="1.5"/>
      <rect x="840" y="240" width="180" height="55" rx="8" fill="var(--both-bg)" stroke="var(--both)" stroke-width="2"/>
      <text x="930" y="260" text-anchor="middle" class="label-bold" fill="var(--both)">EGYPTIAN or LEVANTINE</text>
      <text x="930" y="275" text-anchor="middle" class="label-bold" fill="var(--both)">+ MSA reading</text>
      <text x="930" y="290" text-anchor="middle" class="label-sm" fill="var(--both)">Mirrors native speakers</text>

      <!-- CONVERGENCE: Eventually you need both -->
      <rect x="250" y="320" width="560" height="40" rx="20" fill="var(--both-bg)" stroke="var(--both)" stroke-width="2"/>
      <text x="530" y="345" text-anchor="middle" class="q-text" fill="var(--both)">ALL paths converge: most serious learners need BOTH MSA + a dialect</text>

      <!-- Arrows converging -->
      <line x1="150" y1="285" x2="320" y2="325" stroke="var(--both)" stroke-width="1" opacity="0.5"/>
      <line x1="380" y1="285" x2="400" y2="325" stroke="var(--both)" stroke-width="1" opacity="0.5"/>
      <line x1="530" y1="285" x2="530" y2="320" stroke="var(--both)" stroke-width="1" opacity="0.5"/>
      <line x1="730" y1="285" x2="660" y2="325" stroke="var(--both)" stroke-width="1" opacity="0.5"/>
      <line x1="930" y1="295" x2="740" y2="325" stroke="var(--both)" stroke-width="1" opacity="0.5"/>

      <!-- TRADE-OFF COMPARISON -->
      <text x="530" y="395" text-anchor="middle" class="title-text" fill="var(--fg)">The Trade-Off</text>

      <rect x="60" y="410" width="460" height="120" rx="8" fill="var(--msa-bg)" stroke="var(--msa)" stroke-width="1.5"/>
      <text x="290" y="432" text-anchor="middle" class="label-bold" style="font-size:12px;" fill="var(--msa)">MSA FIRST: Advantages</text>
      <text x="80" y="452" class="label" fill="var(--fg)">+ Access to ALL formal written Arabic (news, books, documents)</text>
      <text x="80" y="468" class="label" fill="var(--fg)">+ Pan-Arab comprehension (understood formally everywhere)</text>
      <text x="80" y="484" class="label" fill="var(--fg)">+ Foundation for learning ANY dialect later</text>
      <text x="80" y="500" class="label" fill="var(--fg)">+ Full grammatical system (case endings, dual, all verb forms)</text>
      <text x="80" y="518" class="label-sm" fill="var(--muted)">- Cannot converse naturally | - No native speakers to practice with | - Sounds bizarre in casual settings</text>

      <rect x="540" y="410" width="460" height="120" rx="8" fill="var(--dialect-bg)" stroke="var(--dialect)" stroke-width="1.5"/>
      <text x="770" y="432" text-anchor="middle" class="label-bold" style="font-size:12px;" fill="var(--dialect)">DIALECT FIRST: Advantages</text>
      <text x="560" y="452" class="label" fill="var(--fg)">+ Immediate conversational ability in target region</text>
      <text x="560" y="468" class="label" fill="var(--fg)">+ Natural practice with native speakers</text>
      <text x="560" y="484" class="label" fill="var(--fg)">+ Cultural immersion and authentic interaction</text>
      <text x="560" y="500" class="label" fill="var(--fg)">+ Access to humor, emotion, intimate expression</text>
      <text x="560" y="518" class="label-sm" fill="var(--muted)">- Limited to one region | - Cannot read formal text | - No standard written form</text>

      <!-- PATTERN LEARNER RECOMMENDATION -->
      <rect x="120" y="555" width="820" height="105" rx="10" fill="var(--pattern-bg)" stroke="var(--pattern)" stroke-width="2.5"/>
      <text x="530" y="578" text-anchor="middle" class="q-text" style="font-size:14px;" fill="var(--pattern)">PATTERN LEARNER RECOMMENDATION: MSA FIRST</text>
      <text x="530" y="598" text-anchor="middle" class="label-bold" fill="var(--fg)">MSA retains the FULL pattern system: case endings, dual number, all ten verb forms, classical morphology.</text>
      <text x="530" y="615" text-anchor="middle" class="label" fill="var(--fg)">Learning MSA first means learning the COMPLETE system. Dialects then become predictable simplifications:</text>
      <text x="530" y="632" text-anchor="middle" class="label" fill="var(--fg)">"Drop case endings, change future marker from sa- to ha-, replace lam with ma...sh" = Egyptian transformation rules.</text>
      <text x="530" y="648" text-anchor="middle" class="label-sm" fill="var(--pattern)">System first, variations later = the pattern learner's optimal sequence.</text>

      <!-- ENGLISH COMPARISON -->
      <rect x="120" y="680" width="820" height="55" rx="8" fill="var(--en-bg)" stroke="var(--en)" stroke-width="1.5"/>
      <text x="530" y="700" text-anchor="middle" class="label-bold" fill="var(--en)">ENGLISH COMPARISON: No Equivalent Dilemma</text>
      <text x="530" y="716" text-anchor="middle" class="label" fill="var(--fg)">Learning English means learning English. The same variety works for reading newspapers and ordering coffee.</text>
      <text x="530" y="728" text-anchor="middle" class="label" fill="var(--fg)">No English learner must choose between "formal English" and "conversational English" as structurally different systems.</text>

      <!-- Bottom summary -->
      <rect x="120" y="755" width="820" height="40" rx="6" fill="var(--surface)" stroke="var(--border)" stroke-width="1"/>
      <text x="530" y="775" text-anchor="middle" class="label-sm">Closest parallel: choosing between standard German (Hochdeutsch) and Swiss German (Schweizerdeutsch) -- but even there,</text>
      <text x="530" y="788" text-anchor="middle" class="label-sm">Hochdeutsch IS many Germans' native language. MSA is nobody's native language. The Arabic dilemma is unique.</text>

    </svg>
  </div>
  <figcaption>
    <h2>The Learner's Decision Tree: Which Arabic Should You Learn?</h2>
    <p>Every Arabic learner faces a strategic question that has no English equivalent: which variety to learn first. All paths eventually require both MSA and a dialect. For pattern-oriented learners, MSA first is recommended because it retains the complete grammatical system -- dialects can then be understood as systematic, predictable simplifications of the full pattern set.</p>
  </figcaption>
</figure>
</body>
</html>
