<!-- Description: Multi-perspective stakeholder map showing the different groups and their positions on the "profound autism" label, highlighting that non-speaking individuals are least represented in the debate about their own label. -->

flowchart TB

    subgraph SUPPORT["GENERALLY SUPPORT"]
        S1["Lancet Commission\nProposed term for\nadministrative/research use"]

    end

    subgraph PARADOX["THE META-IRONY"]
        P1["Non-speaking autistic individuals\nThe people MOST affected by the label\nare LEAST represented in\nthe decision-making process"]
        P2["A label partly justified by\nlack of communication\nwas developed without\nfull communication access\nfor those it labels"]
    end

    subgraph TENSIONS["KEY TENSIONS"]
        T1["Label conflates current behavior\nwith immutable capacity"]
        T2["A person labeled 'profound' at 5\nmay communicate fluently at 18\n(Zimmerman's trajectory)"]

    end

  <figcaption>
    <strong>Figure 6:</strong> Stakeholder positions on the "profound autism" label. The Lancet Commission (2021) proposed the term for autistic individuals requiring 24-hour care. Support comes primarily from parents of high-support-needs children who want visibility and targeted services. Opposition comes from autistic self-advocates and organizations (ASAN) who have resisted functioning labels for over three decades as misleading and reductive. The meta-irony: non-speaking autistic individuals -- the people most directly affected by the label -- are the least represented in the debate about whether and how it should be applied. The label risks conflating current behavior with immutable capacity, as Jordyn Zimmerman's trajectory demonstrates.
  </figcaption>
