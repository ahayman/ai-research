<figure class="concept-diagram" id="diagram-zimmerman-timeline">
  <div class="diagram-container">
    <pre class="mermaid">
timeline
    title Jordyn Zimmerman: The Same Brain, Different Access

    section Before AAC (18 years)
        Early childhood : Autism diagnosis
                       : Non-speaking
        Age 5-17 : Segregated "life skills" classrooms
                 : No AAC device provided
                 : No literacy instruction
                 : Assessed as intellectually disabled
                 : No communication tool of any kind
                 : Presumed incompetent
                 : 12+ years of wrong assumptions

    section The Pivot Point
        Age 18 : Receives Proloquo2Go
               : First AAC device ever provided
               : Standard technology, no facilitator
               : Independent use from the start

    section After AAC
        Ohio University : Bachelor's degree
                       : Education Policy major
        Boston College : Master's of Education
        Advocacy : Board Chair, CommunicationFIRST
               : Apple Distinguished Educator
               : Two presidential appointments
               : Keynote speaker worldwide
        2021 : Documentary: This Is Not About Me
        2023 : Published in NYT and Boston Globe
        2025 : Inaugural Forbes Accessibility 100
    </pre>
  </div>
  <figcaption>
    <strong>Figure 7:</strong> Jordyn Zimmerman's timeline. For 18 years, Zimmerman was placed in segregated classrooms, denied literacy instruction, and given no communication tool. Assessments presumably classified her as having significant intellectual disability. At age 18, she received Proloquo2Go -- a standard AAC app, used independently with no facilitator. She subsequently earned bachelor's and master's degrees, became Board Chair of CommunicationFIRST, was named to the Forbes Accessibility 100, and was appointed to a presidential committee. Her intelligence did not change at age 18 -- only her access to a communication method that could reveal it. <strong>Note:</strong> Zimmerman's case does not prove all non-speaking individuals have hidden academic ability. It proves that current assessment methods can be catastrophically wrong, and that the consequences of underestimation span an entire lifetime.
  </figcaption>
</figure>
