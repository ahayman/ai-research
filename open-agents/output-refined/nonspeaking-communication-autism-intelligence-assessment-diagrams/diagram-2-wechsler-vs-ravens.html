<!-- Description: Comparative visualization showing how the same autistic children score dramatically differently on verbal (Wechsler) versus nonverbal (Raven's) intelligence tests, based on Dawson et al. 2007. -->

  <figcaption>
    <strong>Figure 2:</strong> The Dawson-Mottron finding (2007). The same autistic children scored an average of 30 percentile points higher on Raven's Progressive Matrices (a nonverbal test of abstract reasoning) than on the Wechsler Intelligence Scales (the most commonly used IQ test). On the Wechsler, zero autistic children scored in the "high intelligence" range and one-third scored in the "intellectual disability" range. On the Raven's, one-third scored "high intelligence" and only 5% scored in the ID range. The difference is the test, not the child. <strong>Important caveat:</strong> The original study included speaking autistic individuals; whether the Raven's advantage extends to non-speaking individuals specifically has not been directly tested.
  </figcaption>
</figure>
