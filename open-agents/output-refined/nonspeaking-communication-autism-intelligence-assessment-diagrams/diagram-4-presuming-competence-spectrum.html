<!-- Description: Continuum from presuming incompetence to presuming competence, showing the costs and risks at each position, with Donnellan's least dangerous assumption and the "stretch boundaries" position marked. -->

    subgraph LDA["LEAST DANGEROUS\nASSUMPTION\n(Donnellan, 1984)"]

  <figcaption>
    <strong>Figure 4:</strong> The presuming competence spectrum. Positions range from presuming incompetence (the historical default, with devastating consequences when wrong) through empirical testing (ideal but limited by test barriers), to the "stretch boundaries" approach (Lloyd-Thomas, 2025), Donnellan's least dangerous assumption (1984), and full presumption of competence (the disability rights position). Every position carries risks. The consequences of underestimation (denying education, communication, autonomy) are generally more severe and less reversible than the consequences of overestimation (providing supports that may be unnecessary). In the specific context of facilitated communication, however, presuming competence can complicate authorship verification.
  </figcaption>
