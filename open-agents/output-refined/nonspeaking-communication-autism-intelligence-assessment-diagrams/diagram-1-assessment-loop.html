<!-- Diagram: The Assessment-Placement-Confirmation Loop -->
<!-- Type: flowchart -->
<!-- Generated: 2026-03-31 -->
<!-- Description: Circular feedback loop showing how standard IQ testing creates a self-reinforcing cycle of underestimation for non-speaking autistic individuals, with a break point showing where alternative assessment can interrupt the cycle. -->

<figure class="concept-diagram" id="diagram-assessment-loop">
  <div class="diagram-container">
    <pre class="mermaid">
flowchart TD
    A["Standard IQ Test Administered\n(Wechsler scales)"] --> B["Low Score Produced\n(IQ &lt; 70)"]
    B --> C["Segregated Placement\n'Life skills' classroom"]
    C --> D["Reduced Expectations\nNo academic instruction\nNo literacy teaching"]
    D --> E["No Opportunity to Develop\nTest-relevant skills\nCommunication access\nAcademic knowledge"]
    E --> F["Re-Assessment\nSame tests administered"]
    F --> A

    B -->|"Score enters IEP"| G["Educational Gatekeeping\nAAC deemed unnecessary\nAcademic goals removed\nCommunication not pursued"]

    BREAK["BREAK POINT\nAlternative assessment\n(Raven's, Leiter, eye-tracking)\nOR\nPresume competence\n(Donnellan 1984)"]
    BREAK -.->|"Interrupts cycle"| ALT["Revised Assessment\nHigher score on adapted test\nOR presumption of capacity"]
    ALT -.-> NEW["New Trajectory\nInclusive placement\nAAC provided\nLiteracy instruction\nAcademic goals"]

    style A fill:#fee2e2,stroke:#dc2626,color:#7f1d1d
    style B fill:#fee2e2,stroke:#dc2626,color:#7f1d1d
    style C fill:#fef3c7,stroke:#d97706,color:#78350f
    style D fill:#fef3c7,stroke:#d97706,color:#78350f
    style E fill:#fef3c7,stroke:#d97706,color:#78350f
    style F fill:#fee2e2,stroke:#dc2626,color:#7f1d1d
    style G fill:#fecaca,stroke:#b91c1c,color:#7f1d1d
    style BREAK fill:#dcfce7,stroke:#16a34a,color:#14532d
    style ALT fill:#dbeafe,stroke:#2563eb,color:#1e3a5f
    style NEW fill:#dcfce7,stroke:#16a34a,color:#14532d
    </pre>
  </div>
  <figcaption>
    <strong>Figure 1:</strong> The assessment-placement-confirmation loop. A non-speaking autistic child assessed with standard IQ tests receives a low score reflecting test barriers, not cognitive capacity. This score determines placement in a low-expectation environment, which denies the cognitive stimulation needed to develop test-relevant skills. Re-assessment with the same instruments confirms the original score -- the assessment creates the conditions that justify its own findings. The cycle can be interrupted through alternative assessment (Raven's Progressive Matrices, Leiter-3, eye-tracking methods) or through the least dangerous assumption (Donnellan, 1984).
  </figcaption>
</figure>
