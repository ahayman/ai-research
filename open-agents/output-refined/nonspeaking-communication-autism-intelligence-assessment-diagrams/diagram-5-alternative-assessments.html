  <figcaption>
    <strong>Figure 5:</strong> Comparison of intelligence assessment methods across barrier dimensions relevant to non-speaking autistic individuals. The Wechsler scales (most widely used) impose the highest barriers across all dimensions. Raven's Progressive Matrices eliminates language demands and reduces others, producing the documented 30-percentile-point advantage. The Leiter-3 and TONI-4 offer similar nonverbal profiles. Eye-tracking-based assessment is the most accessible -- requiring no language, no motor output, and minimal compliance -- but remains an emerging approach without standardized norms. No current test fully solves the problem for individuals with severe motor difficulties.
  </figcaption>
