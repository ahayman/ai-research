<!-- Description: Decomposition diagram showing how IQ test scores for non-speaking autistic individuals reflect test barriers (verbal, motor, compliance, instruction) rather than cognitive capacity. -->

  </div>
  <figcaption>
    <strong>Figure 3:</strong> What standard IQ tests actually measure. For a neurotypical test-taker, the test barriers (verbal expression, motor response, compliance, instruction comprehension, test-taking conventions) are minimal, so the score primarily reflects cognitive ability -- the target construct. For a non-speaking autistic test-taker, every barrier is substantial: they cannot speak, may have motor planning difficulties, engage atypically with examiners, receive verbal instructions they may not be able to act on, and have never been taught test-taking conventions. The resulting score reflects the cumulative barrier, not the underlying capacity. The test measures the instrument's limitations, not the individual's intelligence.
  </figcaption>
