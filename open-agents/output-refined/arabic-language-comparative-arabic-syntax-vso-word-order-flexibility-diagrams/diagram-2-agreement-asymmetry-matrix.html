<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arabic Agreement Asymmetry Matrix</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --accent: #4361ee;
    --accent-light: #e8edff;
    --yes: #2d8a4e;
    --yes-bg: #dcfce7;
    --no: #e63946;
    --no-bg: #fee2e2;
    --arabic: #d4770b;
    --arabic-bg: #fdf6ec;
    --english: #0077b6;
    --english-bg: #e8f4f8;
    --muted: #6c757d;
    --caption-bg: #f8f9fa;
    --highlight: #fef3c7;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --accent: #6b8aff;
      --accent-light: #1e2a4a;
      --yes: #5cb87a;
      --yes-bg: #0a2a12;
      --no: #ff6b6b;
      --no-bg: #2a0a12;
      --arabic: #f0c050;
      --arabic-bg: #2a2210;
      --english: #5dade2;
      --english-bg: #102030;
      --muted: #9a9ab0;
      --caption-bg: #1a1a2e;
      --highlight: #3a3210;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure { max-width: 1000px; width: 100%; }
  .chart-wrapper {
    overflow-x: auto;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--surface);
    padding: 1.5rem;
  }
  .section-title {
    font-size: 1rem;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 0.8rem;
    padding-bottom: 0.3rem;
    border-bottom: 2px solid var(--accent);
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding: 1rem 1.5rem;
    background: var(--caption-bg);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }

  /* Matrix table */
  .matrix-table {
    width: 100%;
    border-collapse: collapse;
    margin: 1rem 0;
    font-size: 0.88rem;
  }
  .matrix-table th, .matrix-table td {
    padding: 0.7rem 0.8rem;
    border: 2px solid var(--border);
    text-align: center;
    vertical-align: middle;
  }
  .matrix-table th {
    background: var(--accent-light);
    color: var(--accent);
    font-weight: 700;
  }
  .matrix-table .row-header {
    background: var(--arabic-bg);
    color: var(--arabic);
    font-weight: 700;
    text-align: left;
    width: 160px;
  }
  .cell-yes {
    background: var(--yes-bg);
    font-weight: 700;
    color: var(--yes);
  }
  .cell-no {
    background: var(--no-bg);
    font-weight: 700;
    color: var(--no);
  }
  .cell-example {
    font-size: 0.78rem;
    margin-top: 0.3rem;
    color: var(--muted);
  }
  .arabic-text {
    font-family: 'Traditional Arabic', 'Scheherazade', serif;
    font-size: 1.05rem;
    direction: rtl;
  }

  /* The rule box */
  .rule-box {
    margin: 1.5rem 0;
    padding: 1rem 1.2rem;
    border: 3px solid var(--accent);
    border-radius: 10px;
    background: var(--highlight);
    text-align: center;
  }
  .rule-box .rule-title {
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 0.5rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .rule-box .rule-text {
    font-size: 1.05rem;
    font-weight: 600;
  }
  .rule-box .rule-text .yes-span { color: var(--yes); }
  .rule-box .rule-text .no-span { color: var(--no); }

  /* English comparison */
  .english-compare {
    margin-top: 1.2rem;
    padding: 0.8rem 1rem;
    background: var(--english-bg);
    border-radius: 8px;
    border-left: 4px solid var(--english);
    font-size: 0.85rem;
  }
  .english-compare strong { color: var(--english); }
  .pattern-note {
    margin-top: 1rem;
    padding: 0.8rem 1rem;
    background: var(--accent-light);
    border-radius: 8px;
    border-left: 4px solid var(--accent);
    font-size: 0.85rem;
  }
  .pattern-note strong { color: var(--accent); }
</style>
</head>
<body>
<figure>
  <div class="chart-wrapper">
    <div class="section-title">The Agreement Asymmetry -- Arabic's Most Distinctive Syntactic Rule</div>

    <div class="rule-box">
      <div class="rule-title">The Core Rule</div>
      <div class="rule-text">
        VSO: verb agrees in <span class="yes-span">gender</span> only (<span class="no-span">not number</span>)<br>
        SVO: verb agrees in <span class="yes-span">gender</span> + <span class="yes-span">number</span>
      </div>
    </div>

    <table class="matrix-table">
      <thead>
        <tr>
          <th>Word Order</th>
          <th>Gender Agreement</th>
          <th>Number Agreement</th>
          <th>Verb Form</th>
          <th>Example</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td class="row-header">VSO<br><span style="font-size:0.75rem;font-weight:400;">(verb first)</span></td>
          <td class="cell-yes">YES<div class="cell-example">masc. verb for masc. subject</div></td>
          <td class="cell-no">NO<div class="cell-example">SINGULAR verb for PLURAL subject</div></td>
          <td><span class="arabic-text">كَتَبَ</span><br><em>katab-a</em><br>(3rd m. <strong>sg.</strong>)</td>
          <td style="text-align:left;font-size:0.82rem;">
            <span class="arabic-text">كَتَبَ الطُّلّابُ</span><br>
            <em>kataba t-tullabu</em><br>
            "The students (m.pl.) wrote"<br>
            <strong>Verb is singular!</strong>
          </td>
        </tr>
        <tr>
          <td class="row-header">SVO<br><span style="font-size:0.75rem;font-weight:400;">(subject first)</span></td>
          <td class="cell-yes">YES<div class="cell-example">masc. verb for masc. subject</div></td>
          <td class="cell-yes">YES<div class="cell-example">PLURAL verb for PLURAL subject</div></td>
          <td><span class="arabic-text">كَتَبوا</span><br><em>katab-u</em><br>(3rd m. <strong>pl.</strong>)</td>
          <td style="text-align:left;font-size:0.82rem;">
            <span class="arabic-text">الطُّلّابُ كَتَبوا</span><br>
            <em>at-tullabu katabu</em><br>
            "The students (m.pl.) wrote"<br>
            <strong>Verb is plural!</strong>
          </td>
        </tr>
      </tbody>
    </table>

    <div class="section-title" style="margin-top:1.5rem;">The Same Pattern with Feminine Subjects</div>
    <table class="matrix-table">
      <thead>
        <tr>
          <th>Word Order</th>
          <th>Gender</th>
          <th>Number</th>
          <th>Verb Form</th>
          <th>Example</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td class="row-header">VSO (f.)</td>
          <td class="cell-yes">YES (fem.)</td>
          <td class="cell-no">NO (sg.!)</td>
          <td><span class="arabic-text">كَتَبَتْ</span><br><em>katab-at</em><br>(3rd f. <strong>sg.</strong>)</td>
          <td style="text-align:left;font-size:0.82rem;">
            <span class="arabic-text">كَتَبَتْ الطالِباتُ</span><br>
            "The (f.) students wrote" -- verb is f. <strong>singular</strong>
          </td>
        </tr>
        <tr>
          <td class="row-header">SVO (f.)</td>
          <td class="cell-yes">YES (fem.)</td>
          <td class="cell-yes">YES (pl.)</td>
          <td><span class="arabic-text">كَتَبْنَ</span><br><em>katab-na</em><br>(3rd f. <strong>pl.</strong>)</td>
          <td style="text-align:left;font-size:0.82rem;">
            <span class="arabic-text">الطالِباتُ كَتَبْنَ</span><br>
            "The (f.) students wrote" -- verb is f. <strong>plural</strong>
          </td>
        </tr>
      </tbody>
    </table>

    <div class="english-compare">
      <strong>English comparison:</strong> English "wrote" is always "wrote" -- no agreement with subject in gender or number (in past tense). The only English verb agreement is 3rd person singular present: "she write<em>s</em>" vs. "they write." English has no asymmetry based on word order because English does not permit word order variation.
    </div>

    <div class="pattern-note">
      <strong>The pattern:</strong> The verb form <em>encodes</em> the syntactic configuration. When you hear a singular verb followed by a plural subject, you know you are in VSO. When you hear a plural verb, you know the subject has already appeared (SVO). The agreement asymmetry is not a complication -- it is an <em>information signal</em> that tells the listener which sentence structure is in play.
    </div>
  </div>

  <figcaption>
    <h2>Figure 2 &mdash; The Agreement Asymmetry Matrix</h2>
    <p>Arabic's most distinctive syntactic rule: in VSO order, the verb agrees only in gender (singular form for plural subjects). In SVO order, the verb agrees in both gender and number. This asymmetry has no parallel in English, where verb form is independent of word order.</p>
  </figcaption>
</figure>
</body>
</html>
