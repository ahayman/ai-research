<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arabic Verbal vs. Nominal Sentences</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --accent: #4361ee;
    --accent-light: #e8edff;
    --verbal: #e63946;
    --verbal-bg: #fef3f0;
    --nominal: #2d8a4e;
    --nominal-bg: #f0faf0;
    --kana: #7c3aed;
    --kana-bg: #f5f0ff;
    --inna: #d4770b;
    --inna-bg: #fdf6ec;
    --english: #0077b6;
    --english-bg: #e8f4f8;
    --muted: #6c757d;
    --caption-bg: #f8f9fa;
    --tree-line: #aab0c0;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --accent: #6b8aff;
      --accent-light: #1e2a4a;
      --verbal: #ff6b6b;
      --verbal-bg: #2a1520;
      --nominal: #5cb87a;
      --nominal-bg: #102a18;
      --kana: #a78bfa;
      --kana-bg: #1a1030;
      --inna: #f0c050;
      --inna-bg: #2a2210;
      --english: #5dade2;
      --english-bg: #102030;
      --muted: #9a9ab0;
      --caption-bg: #1a1a2e;
      --tree-line: #555570;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure { max-width: 1000px; width: 100%; }
  .chart-wrapper {
    overflow-x: auto;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--surface);
    padding: 1.5rem;
  }
  .section-title {
    font-size: 1rem;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 0.8rem;
    padding-bottom: 0.3rem;
    border-bottom: 2px solid var(--accent);
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding: 1rem 1.5rem;
    background: var(--caption-bg);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }

  /* Tree SVG */
  svg text { font-family: 'Segoe UI', system-ui, sans-serif; }

  .branch-card {
    display: flex;
    gap: 1.5rem;
    margin: 1rem 0;
  }
  .branch {
    flex: 1;
    border: 2px solid;
    border-radius: 10px;
    padding: 1rem;
  }
  .branch-verbal { border-color: var(--verbal); background: var(--verbal-bg); }
  .branch-nominal { border-color: var(--nominal); background: var(--nominal-bg); }
  .branch-title {
    font-weight: 700;
    font-size: 0.95rem;
    margin-bottom: 0.5rem;
  }
  .branch-verbal .branch-title { color: var(--verbal); }
  .branch-nominal .branch-title { color: var(--nominal); }
  .branch-arabic {
    font-family: 'Traditional Arabic', 'Scheherazade', serif;
    font-size: 1.1rem;
    direction: rtl;
    text-align: center;
    padding: 0.3rem;
    margin: 0.3rem 0;
  }
  .branch-translit {
    text-align: center;
    font-size: 0.8rem;
    color: var(--muted);
    font-style: italic;
  }
  .branch-meaning {
    text-align: center;
    font-size: 0.85rem;
    font-weight: 600;
    margin: 0.3rem 0;
  }
  .branch-features {
    font-size: 0.8rem;
    margin-top: 0.5rem;
    padding-left: 1rem;
  }
  .branch-features li { margin: 0.2rem 0; }

  .zero-copula-box {
    margin: 1.2rem 0;
    padding: 1rem;
    border: 2px dashed var(--nominal);
    border-radius: 10px;
    background: var(--nominal-bg);
    text-align: center;
  }
  .zero-copula-box .zc-title {
    font-weight: 700;
    color: var(--nominal);
    font-size: 0.95rem;
    margin-bottom: 0.5rem;
  }
  .copula-compare {
    display: flex;
    gap: 1.5rem;
    justify-content: center;
    margin-top: 0.5rem;
  }
  .copula-item {
    padding: 0.6rem 1rem;
    border-radius: 8px;
    font-size: 0.85rem;
    text-align: center;
  }
  .copula-arabic { background: var(--inna-bg); border: 1px solid var(--inna); }
  .copula-english { background: var(--english-bg); border: 1px solid var(--english); }
  .copula-label { font-weight: 700; font-size: 0.75rem; margin-bottom: 0.2rem; }
  .copula-arabic .copula-label { color: var(--inna); }
  .copula-english .copula-label { color: var(--english); }

  .english-compare {
    margin-top: 1.2rem;
    padding: 0.8rem 1rem;
    background: var(--english-bg);
    border-radius: 8px;
    border-left: 4px solid var(--english);
    font-size: 0.85rem;
  }
  .english-compare strong { color: var(--english); }
  .pattern-note {
    margin-top: 1rem;
    padding: 0.8rem 1rem;
    background: var(--accent-light);
    border-radius: 8px;
    border-left: 4px solid var(--accent);
    font-size: 0.85rem;
  }
  .pattern-note strong { color: var(--accent); }
  @media (max-width: 700px) {
    .branch-card { flex-direction: column; }
    .copula-compare { flex-direction: column; align-items: center; }
  }
</style>
</head>
<body>
<figure>
  <div class="chart-wrapper">
    <div class="section-title">Arabic Sentence Classification Tree</div>

    <!-- SVG Tree -->
    <svg viewBox="0 0 800 160" xmlns="http://www.w3.org/2000/svg" style="max-width:800px;margin:0 auto;display:block;">
      <!-- Root -->
      <rect x="300" y="5" width="200" height="32" rx="8" fill="var(--accent-light)" stroke="var(--accent)" stroke-width="2"/>
      <text x="400" y="26" text-anchor="middle" font-weight="700" font-size="14" fill="var(--accent)">Arabic Sentence</text>

      <!-- Branches -->
      <line x1="350" y1="37" x2="170" y2="70" stroke="var(--tree-line)" stroke-width="2"/>
      <line x1="450" y1="37" x2="630" y2="70" stroke="var(--tree-line)" stroke-width="2"/>

      <!-- Verbal -->
      <rect x="60" y="65" width="220" height="34" rx="8" fill="var(--verbal-bg)" stroke="var(--verbal)" stroke-width="2"/>
      <text x="170" y="87" text-anchor="middle" font-weight="700" font-size="13" fill="var(--verbal)">Verbal (al-jumla al-fi'liyya)</text>

      <!-- Nominal -->
      <rect x="520" y="65" width="220" height="34" rx="8" fill="var(--nominal-bg)" stroke="var(--nominal)" stroke-width="2"/>
      <text x="630" y="87" text-anchor="middle" font-weight="700" font-size="13" fill="var(--nominal)">Nominal (al-jumla al-ismiyya)</text>

      <!-- Sub-features verbal -->
      <line x1="110" y1="99" x2="110" y2="120" stroke="var(--tree-line)" stroke-width="1.5"/>
      <line x1="230" y1="99" x2="230" y2="120" stroke="var(--tree-line)" stroke-width="1.5"/>
      <text x="110" y="135" text-anchor="middle" font-size="10" fill="var(--verbal)">Begins with VERB</text>
      <text x="230" y="135" text-anchor="middle" font-size="10" fill="var(--verbal)">Partial agreement</text>
      <text x="110" y="150" text-anchor="middle" font-size="10" fill="var(--muted)">(VSO order)</text>
      <text x="230" y="150" text-anchor="middle" font-size="10" fill="var(--muted)">(gender only)</text>

      <!-- Sub-features nominal -->
      <line x1="580" y1="99" x2="580" y2="120" stroke="var(--tree-line)" stroke-width="1.5"/>
      <line x1="690" y1="99" x2="690" y2="120" stroke="var(--tree-line)" stroke-width="1.5"/>
      <text x="580" y="135" text-anchor="middle" font-size="10" fill="var(--nominal)">Begins with NOUN</text>
      <text x="690" y="135" text-anchor="middle" font-size="10" fill="var(--nominal)">Full agreement</text>
      <text x="580" y="150" text-anchor="middle" font-size="10" fill="var(--muted)">(zero copula present)</text>
      <text x="690" y="150" text-anchor="middle" font-size="10" fill="var(--muted)">(gender + number)</text>
    </svg>

    <!-- Branch cards -->
    <div class="branch-card">
      <div class="branch branch-verbal">
        <div class="branch-title">Verbal Sentence (begins with verb)</div>
        <div class="branch-arabic">كَتَبَ الطالِبُ الدَّرْسَ</div>
        <div class="branch-translit">kataba t-talibu d-darsa</div>
        <div class="branch-meaning">"The student wrote the lesson."</div>
        <ul class="branch-features">
          <li>Focus on the <strong>action</strong> (verb)</li>
          <li>Default/unmarked word order</li>
          <li>Verb agrees in gender only</li>
          <li>Used for narration, events, new information</li>
        </ul>
      </div>
      <div class="branch branch-nominal">
        <div class="branch-title">Nominal Sentence (begins with noun)</div>
        <div class="branch-arabic">الطالِبُ كَتَبَ الدَّرْسَ</div>
        <div class="branch-translit">at-talibu kataba d-darsa</div>
        <div class="branch-meaning">"The student wrote the lesson."</div>
        <ul class="branch-features">
          <li>Focus on the <strong>agent</strong> (subject)</li>
          <li>Topicalized/marked order</li>
          <li>Verb agrees in gender + number</li>
          <li>Used for topics, established entities, commentary</li>
        </ul>
      </div>
    </div>

    <!-- Zero copula -->
    <div class="zero-copula-box">
      <div class="zc-title">The Zero Copula: Arabic's Invisible "Is"</div>
      <p style="font-size:0.85rem;margin-bottom:0.5rem;">Present-tense nominal sentences need no verb "to be" -- juxtaposition IS the assertion:</p>
      <div class="copula-compare">
        <div class="copula-item copula-arabic">
          <div class="copula-label">Arabic (present)</div>
          <div class="branch-arabic" style="margin:0;">الكِتابُ كَبيرٌ</div>
          <div style="font-size:0.8rem;"><em>al-kitabu kabirun</em></div>
          <div style="font-size:0.8rem;">"The-book big" = "The book is big"</div>
          <div style="font-size:0.75rem;color:var(--inna);font-weight:700;margin-top:0.3rem;">No verb at all</div>
        </div>
        <div class="copula-item copula-english">
          <div class="copula-label">English (present)</div>
          <div style="font-size:1.05rem;font-weight:600;">"The book <strong>is</strong> big."</div>
          <div style="font-size:0.8rem;margin-top:0.3rem;">Copula "is" mandatory</div>
          <div style="font-size:0.75rem;color:var(--english);font-weight:700;margin-top:0.3rem;">Cannot omit: *"The book big"</div>
        </div>
      </div>
      <p style="font-size:0.8rem;margin-top:0.6rem;color:var(--muted);">Past tense requires <em>kana</em>: <span style="font-family:'Traditional Arabic',serif;">كانَ الكِتابُ كَبيراً</span> "The book <strong>was</strong> big" -- now a verbal sentence</p>
    </div>

    <div class="english-compare">
      <strong>English comparison:</strong> English does not classify sentences into verbal/nominal types. All English sentences require a verb (even just "is/are/am"). The concept of a sentence with <em>no verb at all</em> is foreign to English grammar. Arabic treats "is" as the default state -- so default it does not need to be spoken.
    </div>

    <div class="pattern-note">
      <strong>The pattern:</strong> Arabic has a fundamental binary: sentences that <em>start with a verb</em> (verbal) and sentences that <em>start with a noun</em> (nominal). This is not just a descriptive label -- it determines agreement rules, particle behavior, and whether a copula is present. The first word of the sentence sets the grammatical mode.
    </div>
  </div>

  <figcaption>
    <h2>Figure 3 &mdash; Verbal vs. Nominal Sentence Types</h2>
    <p>Arabic grammar classifies every sentence as either verbal (begins with a verb, VSO, partial agreement) or nominal (begins with a noun, zero copula in present tense, full agreement). This classification has concrete grammatical consequences that English, which requires a verb in every sentence, does not have.</p>
  </figcaption>
</figure>
</body>
</html>
