<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Five Compound Types of Mandarin Chinese</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --accent: #06b6d4;
    --coord: #8b5cf6; --coord-bg: #ede9fe;
    --modh: #e67e22; --modh-bg: #fef3e2;
    --vo: #2563eb; --vo-bg: #dbeafe;
    --vc: #ef4444; --vc-bg: #fef2f2;
    --sp: #059669; --sp-bg: #d1fae5;
    --muted: #6c757d; --english: #6366f1; --classical: #a16207;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f172a; --fg: #e2e8f0; --surface: #1e293b; --border: #334155;
      --accent: #06b6d4;
      --coord: #a78bfa; --coord-bg: #2e1065;
      --modh: #f59e0b; --modh-bg: #451a03;
      --vo: #60a5fa; --vo-bg: #172554;
      --vc: #f87171; --vc-bg: #450a0a;
      --sp: #34d399; --sp-bg: #064e3b;
      --muted: #94a3b8; --english: #818cf8; --classical: #fbbf24;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg); color: var(--fg);
    display: flex; justify-content: center; padding: 2rem 1rem; line-height: 1.6;
  }
  figure { max-width: 1100px; width: 100%; }
  .diagram-container {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 2rem 1.5rem; overflow-x: auto;
  }
  .title { text-align: center; font-size: 1.15rem; font-weight: 700; color: var(--accent); margin-bottom: 0.3rem; }
  .subtitle { text-align: center; font-size: 0.85rem; color: var(--muted); margin-bottom: 1.8rem; }
  .types-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 0.7rem; }
  .type-card { border-radius: 8px; padding: 0.9rem; border: 2px solid; }
  .tc-coord { background: var(--coord-bg); border-color: var(--coord); }
  .tc-modh { background: var(--modh-bg); border-color: var(--modh); }
  .tc-vo { background: var(--vo-bg); border-color: var(--vo); }
  .tc-vc { background: var(--vc-bg); border-color: var(--vc); }
  .tc-sp { background: var(--sp-bg); border-color: var(--sp); }
  .type-num { font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; }
  .tc-coord .type-num, .tc-coord .type-name { color: var(--coord); }
  .tc-modh .type-num, .tc-modh .type-name { color: var(--modh); }
  .tc-vo .type-num, .tc-vo .type-name { color: var(--vo); }
  .tc-vc .type-num, .tc-vc .type-name { color: var(--vc); }
  .tc-sp .type-num, .tc-sp .type-name { color: var(--sp); }
  .type-name { font-size: 0.92rem; font-weight: 700; margin-bottom: 0.15rem; }
  .type-zh { font-size: 0.78rem; color: var(--muted); margin-bottom: 0.4rem; }
  .type-formula {
    font-size: 0.82rem; font-weight: 700; padding: 0.25rem 0.5rem;
    background: var(--bg); border-radius: 5px; border: 1px solid var(--border);
    text-align: center; margin-bottom: 0.6rem; font-family: monospace;
  }
  .ex-item {
    background: var(--bg); border: 1px solid var(--border); border-radius: 5px;
    padding: 0.4rem 0.5rem; margin-bottom: 0.35rem; font-size: 0.8rem;
  }
  .ex-item .zh { font-weight: 700; font-size: 1rem; }
  .ex-item .pinyin { color: var(--muted); font-size: 0.72rem; }
  .ex-item .decomp { color: var(--muted); font-size: 0.74rem; }
  .ex-item .meaning { font-size: 0.78rem; font-weight: 600; }
  .productivity {
    margin-top: 0.5rem; font-size: 0.72rem; color: var(--muted);
    padding-top: 0.4rem; border-top: 1px dashed var(--border);
  }
  .prod-bar { display: flex; gap: 2px; margin-top: 3px; }
  .prod-dot { width: 10px; height: 6px; border-radius: 2px; background: var(--border); }
  .tc-coord .prod-dot.filled { background: var(--coord); }
  .tc-modh .prod-dot.filled { background: var(--modh); }
  .tc-vo .prod-dot.filled { background: var(--vo); }
  .tc-vc .prod-dot.filled { background: var(--vc); }
  .tc-sp .prod-dot.filled { background: var(--sp); }
  .sep-note {
    margin-top: 0.5rem; font-size: 0.72rem; color: var(--english);
    padding: 0.3rem 0.5rem; background: var(--bg); border-radius: 4px;
    border: 1px dashed var(--border); font-style: italic;
  }
  .summary-bar {
    margin-top: 1.2rem; padding: 0.9rem 1rem;
    background: var(--bg); border-radius: 8px; border: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 0.5rem;
  }
  .summary-stat { text-align: center; flex: 1; min-width: 120px; }
  .summary-stat .num { font-size: 1.4rem; font-weight: 800; color: var(--accent); }
  .summary-stat .label { font-size: 0.72rem; color: var(--muted); }
  figcaption {
    margin-top: 1rem; padding: 0.8rem 1rem; background: var(--surface);
    border-radius: 8px; border: 1px solid var(--border);
    font-size: 0.78rem; color: var(--muted); line-height: 1.5;
  }
  @media (max-width: 900px) {
    .types-grid { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 500px) {
    .types-grid { grid-template-columns: 1fr; }
    .diagram-container { padding: 1rem; }
  }
</style>
</head>
<body>
<figure>
  <div class="diagram-container">
    <div class="title">The Five Compound Types of Mandarin Chinese</div>
    <div class="subtitle">Five structural patterns account for the vast majority of Mandarin's compound words</div>

    <div class="types-grid">
      <!-- Coordinate -->
      <div class="type-card tc-coord">
        <div class="type-num">Type 1</div>
        <div class="type-name">Coordinate</div>
        <div class="type-zh">联合式 liánhéshì</div>
        <div class="type-formula">A + B &rarr; AB</div>
        <div class="ex-item">
          <div class="zh">买卖</div>
          <div class="pinyin">mǎi-mài</div>
          <div class="decomp">buy + sell</div>
          <div class="meaning">= business/trade</div>
        </div>
        <div class="ex-item">
          <div class="zh">大小</div>
          <div class="pinyin">dà-xiǎo</div>
          <div class="decomp">big + small</div>
          <div class="meaning">= size</div>
        </div>
        <div class="ex-item">
          <div class="zh">国家</div>
          <div class="pinyin">guó-jiā</div>
          <div class="decomp">country + family</div>
          <div class="meaning">= nation</div>
        </div>
        <div class="productivity">
          Productivity
          <div class="prod-bar">
            <div class="prod-dot filled"></div>
            <div class="prod-dot filled"></div>
            <div class="prod-dot filled"></div>
            <div class="prod-dot"></div>
            <div class="prod-dot"></div>
          </div>
        </div>
      </div>

      <!-- Modifier-Head -->
      <div class="type-card tc-modh">
        <div class="type-num">Type 2</div>
        <div class="type-name">Modifier-Head</div>
        <div class="type-zh">偏正式 piānzhèngshì</div>
        <div class="type-formula">Mod + Head &rarr; [ModH]</div>
        <div class="ex-item">
          <div class="zh">火车</div>
          <div class="pinyin">huǒ-chē</div>
          <div class="decomp">fire + vehicle</div>
          <div class="meaning">= train</div>
        </div>
        <div class="ex-item">
          <div class="zh">电脑</div>
          <div class="pinyin">diàn-nǎo</div>
          <div class="decomp">electric + brain</div>
          <div class="meaning">= computer</div>
        </div>
        <div class="ex-item">
          <div class="zh">牛肉</div>
          <div class="pinyin">niú-ròu</div>
          <div class="decomp">cow + meat</div>
          <div class="meaning">= beef</div>
        </div>
        <div class="productivity">
          Productivity
          <div class="prod-bar">
            <div class="prod-dot filled"></div>
            <div class="prod-dot filled"></div>
            <div class="prod-dot filled"></div>
            <div class="prod-dot filled"></div>
            <div class="prod-dot filled"></div>
          </div>
        </div>
      </div>

      <!-- Verb-Object -->
      <div class="type-card tc-vo">
        <div class="type-num">Type 3</div>
        <div class="type-name">Verb-Object</div>
        <div class="type-zh">动宾式 dòngbīnshì</div>
        <div class="type-formula">V + Obj &rarr; [VO]</div>
        <div class="ex-item">
          <div class="zh">革命</div>
          <div class="pinyin">gé-mìng</div>
          <div class="decomp">change + mandate</div>
          <div class="meaning">= revolution</div>
        </div>
        <div class="ex-item">
          <div class="zh">担心</div>
          <div class="pinyin">dān-xīn</div>
          <div class="decomp">carry + heart</div>
          <div class="meaning">= worry</div>
        </div>
        <div class="ex-item">
          <div class="zh">吃亏</div>
          <div class="pinyin">chī-kuī</div>
          <div class="decomp">eat + loss</div>
          <div class="meaning">= suffer a loss</div>
        </div>
        <div class="sep-note">Many V-O compounds are separable: 睡了一觉 shuì-le yī jiào</div>
        <div class="productivity">
          Productivity
          <div class="prod-bar">
            <div class="prod-dot filled"></div>
            <div class="prod-dot filled"></div>
            <div class="prod-dot filled"></div>
            <div class="prod-dot filled"></div>
            <div class="prod-dot"></div>
          </div>
        </div>
      </div>

      <!-- Verb-Complement -->
      <div class="type-card tc-vc">
        <div class="type-num">Type 4</div>
        <div class="type-name">Verb-Complement</div>
        <div class="type-zh">动补式 dòngbǔshì</div>
        <div class="type-formula">V + Result &rarr; [VR]</div>
        <div class="ex-item">
          <div class="zh">提高</div>
          <div class="pinyin">tí-gāo</div>
          <div class="decomp">lift + high</div>
          <div class="meaning">= raise/improve</div>
        </div>
        <div class="ex-item">
          <div class="zh">说明</div>
          <div class="pinyin">shuō-míng</div>
          <div class="decomp">speak + clear</div>
          <div class="meaning">= explain</div>
        </div>
        <div class="ex-item">
          <div class="zh">推翻</div>
          <div class="pinyin">tuī-fān</div>
          <div class="decomp">push + overturn</div>
          <div class="meaning">= overthrow</div>
        </div>
        <div class="productivity">
          Productivity
          <div class="prod-bar">
            <div class="prod-dot filled"></div>
            <div class="prod-dot filled"></div>
            <div class="prod-dot filled"></div>
            <div class="prod-dot filled"></div>
            <div class="prod-dot"></div>
          </div>
        </div>
      </div>

      <!-- Subject-Predicate -->
      <div class="type-card tc-sp">
        <div class="type-num">Type 5</div>
        <div class="type-name">Subject-Predicate</div>
        <div class="type-zh">主谓式 zhǔwèishì</div>
        <div class="type-formula">Subj + Pred &rarr; [SP]</div>
        <div class="ex-item">
          <div class="zh">地震</div>
          <div class="pinyin">dì-zhèn</div>
          <div class="decomp">earth + shake</div>
          <div class="meaning">= earthquake</div>
        </div>
        <div class="ex-item">
          <div class="zh">眼红</div>
          <div class="pinyin">yǎn-hóng</div>
          <div class="decomp">eye + red</div>
          <div class="meaning">= jealous</div>
        </div>
        <div class="ex-item">
          <div class="zh">胆小</div>
          <div class="pinyin">dǎn-xiǎo</div>
          <div class="decomp">gall + small</div>
          <div class="meaning">= timid</div>
        </div>
        <div class="productivity">
          Productivity
          <div class="prod-bar">
            <div class="prod-dot filled"></div>
            <div class="prod-dot filled"></div>
            <div class="prod-dot"></div>
            <div class="prod-dot"></div>
            <div class="prod-dot"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="summary-bar">
      <div class="summary-stat">
        <div class="num">~80%</div>
        <div class="label">of Mandarin words are compounds</div>
      </div>
      <div class="summary-stat">
        <div class="num">~95%</div>
        <div class="label">of neologisms use compounding</div>
      </div>
      <div class="summary-stat">
        <div class="num">2 syllables</div>
        <div class="label">is the modern default word length</div>
      </div>
    </div>
  </div>

  <figcaption>
    <strong>The five compound types of Mandarin.</strong> Modifier-head compounds are the most productive, especially for technology terms and neologisms. Verb-object compounds are notable for being "separable" (离合词) — other elements can be inserted between the two morphemes. Subject-predicate compounds are the least productive but commonly describe body states and natural phenomena.
  </figcaption>
</figure>
</body>
</html>
