<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loanword Integration Strategies: How Mandarin Absorbs Foreign Concepts</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --accent: #06b6d4; --muted: #6c757d;
    --calque: #059669; --calque-bg: #d1fae5;
    --phon: #e67e22; --phon-bg: #fef3e2;
    --hybrid: #8b5cf6; --hybrid-bg: #ede9fe;
    --clever: #ef4444; --clever-bg: #fef2f2;
    --en: #6366f1; --en-bg: #eef2ff;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f172a; --fg: #e2e8f0; --surface: #1e293b; --border: #334155;
      --accent: #06b6d4; --muted: #94a3b8;
      --calque: #34d399; --calque-bg: #064e3b;
      --phon: #f59e0b; --phon-bg: #451a03;
      --hybrid: #a78bfa; --hybrid-bg: #2e1065;
      --clever: #f87171; --clever-bg: #450a0a;
      --en: #818cf8; --en-bg: #1e1b4b;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg); color: var(--fg);
    display: flex; justify-content: center; padding: 2rem 1rem; line-height: 1.6;
  }
  figure { max-width: 1050px; width: 100%; }
  .diagram-container {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 2rem 1.5rem;
  }
  .title { text-align: center; font-size: 1.15rem; font-weight: 700; color: var(--accent); margin-bottom: 0.3rem; }
  .subtitle { text-align: center; font-size: 0.85rem; color: var(--muted); margin-bottom: 2rem; }

  .strategy-section { margin-bottom: 1.5rem; }
  .strat-header {
    display: flex; align-items: center; gap: 0.6rem;
    padding: 0.6rem 0.8rem; border-radius: 8px 8px 0 0; border: 2px solid; border-bottom: none;
  }
  .sh-calque { background: var(--calque-bg); border-color: var(--calque); }
  .sh-phon { background: var(--phon-bg); border-color: var(--phon); }
  .sh-hybrid { background: var(--hybrid-bg); border-color: var(--hybrid); }
  .sh-clever { background: var(--clever-bg); border-color: var(--clever); }

  .strat-badge {
    font-size: 0.65rem; font-weight: 800; padding: 0.15rem 0.45rem;
    border-radius: 3px; text-transform: uppercase; letter-spacing: 0.05em;
    color: white;
  }
  .sb-calque { background: var(--calque); }
  .sb-phon { background: var(--phon); }
  .sb-hybrid { background: var(--hybrid); }
  .sb-clever { background: var(--clever); }

  .strat-title-text { font-weight: 700; font-size: 0.9rem; }
  .sh-calque .strat-title-text { color: var(--calque); }
  .sh-phon .strat-title-text { color: var(--phon); }
  .sh-hybrid .strat-title-text { color: var(--hybrid); }
  .sh-clever .strat-title-text { color: var(--clever); }

  .strat-zh { font-size: 0.78rem; color: var(--muted); }
  .strat-freq { margin-left: auto; font-size: 0.7rem; font-weight: 700; color: var(--muted); }

  .strat-body {
    border: 2px solid var(--border); border-top: none;
    border-radius: 0 0 8px 8px; padding: 0.7rem 0.8rem;
    background: var(--bg);
  }
  .sh-calque + .strat-body { border-color: var(--calque); }
  .sh-phon + .strat-body { border-color: var(--phon); }
  .sh-hybrid + .strat-body { border-color: var(--hybrid); }
  .sh-clever + .strat-body { border-color: var(--clever); }

  .strat-desc { font-size: 0.78rem; color: var(--muted); margin-bottom: 0.5rem; }
  .examples-row { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 0.45rem; }
  .loan-ex {
    background: var(--surface); border: 1px solid var(--border); border-radius: 6px;
    padding: 0.4rem 0.55rem;
  }
  .le-foreign { font-size: 0.72rem; color: var(--en); font-weight: 600; }
  .le-arrow { color: var(--muted); font-size: 0.72rem; }
  .le-zh { font-size: 1rem; font-weight: 700; }
  .le-pinyin { font-size: 0.68rem; color: var(--muted); }
  .le-lit { font-size: 0.68rem; color: var(--muted); font-style: italic; }

  /* English comparison */
  .en-compare {
    margin-top: 1.5rem; padding: 0.9rem 1rem;
    background: var(--en-bg); border: 2px solid var(--en); border-radius: 8px;
  }
  .en-compare-title { font-size: 0.88rem; font-weight: 700; color: var(--en); margin-bottom: 0.5rem; }
  .en-compare-text { font-size: 0.78rem; color: var(--muted); margin-bottom: 0.5rem; }
  .en-loan-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 0.35rem; }
  .en-loan-item {
    background: var(--bg); border: 1px solid var(--border); border-radius: 5px;
    padding: 0.3rem 0.45rem; font-size: 0.78rem;
  }
  .en-src { font-size: 0.65rem; color: var(--en); font-weight: 600; }

  /* Why section */
  .why-box {
    margin-top: 1rem; padding: 0.8rem 1rem;
    background: var(--bg); border-radius: 8px; border: 1px solid var(--border);
  }
  .why-title { font-size: 0.82rem; font-weight: 700; color: var(--accent); margin-bottom: 0.4rem; }
  .why-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.5rem; }
  .why-item { display: flex; gap: 0.4rem; align-items: flex-start; font-size: 0.78rem; }
  .why-num {
    flex-shrink: 0; width: 22px; height: 22px; border-radius: 50%;
    background: var(--accent); color: white; font-size: 0.68rem; font-weight: 800;
    display: flex; align-items: center; justify-content: center;
  }
  .why-text { color: var(--muted); }

  figcaption {
    margin-top: 1rem; padding: 0.8rem 1rem; background: var(--surface);
    border-radius: 8px; border: 1px solid var(--border);
    font-size: 0.78rem; color: var(--muted); line-height: 1.5;
  }
  @media (max-width: 600px) {
    .examples-row, .en-loan-grid, .why-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<figure>
  <div class="diagram-container">
    <div class="title">Loanword Integration Strategies</div>
    <div class="subtitle">How Mandarin absorbs foreign concepts vs. English's open-door borrowing policy</div>

    <!-- Semantic Calque -->
    <div class="strategy-section">
      <div class="strat-header sh-calque">
        <span class="strat-badge sb-calque">Most Common</span>
        <span class="strat-title-text">Semantic Calque</span>
        <span class="strat-zh">意译 yìyì</span>
        <span class="strat-freq">~60-70% of loans</span>
      </div>
      <div class="strat-body">
        <div class="strat-desc">Translate the meaning using existing Chinese morphemes. Preferred because the result is immediately understandable.</div>
        <div class="examples-row">
          <div class="loan-ex">
            <div class="le-foreign">computer <span class="le-arrow">&rarr;</span></div>
            <div class="le-zh">电脑</div>
            <div class="le-pinyin">diàn-nǎo</div>
            <div class="le-lit">electric + brain</div>
          </div>
          <div class="loan-ex">
            <div class="le-foreign">software <span class="le-arrow">&rarr;</span></div>
            <div class="le-zh">软件</div>
            <div class="le-pinyin">ruǎn-jiàn</div>
            <div class="le-lit">soft + piece</div>
          </div>
          <div class="loan-ex">
            <div class="le-foreign">hot dog <span class="le-arrow">&rarr;</span></div>
            <div class="le-zh">热狗</div>
            <div class="le-pinyin">rè-gǒu</div>
            <div class="le-lit">hot + dog</div>
          </div>
          <div class="loan-ex">
            <div class="le-foreign">honeymoon <span class="le-arrow">&rarr;</span></div>
            <div class="le-zh">蜜月</div>
            <div class="le-pinyin">mì-yuè</div>
            <div class="le-lit">honey + moon</div>
          </div>
          <div class="loan-ex">
            <div class="le-foreign">skyscraper <span class="le-arrow">&rarr;</span></div>
            <div class="le-zh">摩天大楼</div>
            <div class="le-pinyin">mó-tiān-dà-lóu</div>
            <div class="le-lit">scrape + sky + big + building</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Phonetic Transliteration -->
    <div class="strategy-section">
      <div class="strat-header sh-phon">
        <span class="strat-badge sb-phon">Less Common</span>
        <span class="strat-title-text">Phonetic Transliteration</span>
        <span class="strat-zh">音译 yīnyì</span>
        <span class="strat-freq">~15-20% of loans</span>
      </div>
      <div class="strat-body">
        <div class="strat-desc">Approximate the foreign sound using Chinese characters. Common for proper nouns, food items, and culturally specific concepts.</div>
        <div class="examples-row">
          <div class="loan-ex">
            <div class="le-foreign">sofa <span class="le-arrow">&rarr;</span></div>
            <div class="le-zh">沙发</div>
            <div class="le-pinyin">shāfā</div>
            <div class="le-lit">sand + emit (sound only)</div>
          </div>
          <div class="loan-ex">
            <div class="le-foreign">coffee <span class="le-arrow">&rarr;</span></div>
            <div class="le-zh">咖啡</div>
            <div class="le-pinyin">kāfēi</div>
            <div class="le-lit">(sound only)</div>
          </div>
          <div class="loan-ex">
            <div class="le-foreign">chocolate <span class="le-arrow">&rarr;</span></div>
            <div class="le-zh">巧克力</div>
            <div class="le-pinyin">qiǎokèlì</div>
            <div class="le-lit">(sound only)</div>
          </div>
          <div class="loan-ex">
            <div class="le-foreign">yoga <span class="le-arrow">&rarr;</span></div>
            <div class="le-zh">瑜伽</div>
            <div class="le-pinyin">yújiā</div>
            <div class="le-lit">(sound only)</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Hybrid -->
    <div class="strategy-section">
      <div class="strat-header sh-hybrid">
        <span class="strat-badge sb-hybrid">Hybrid</span>
        <span class="strat-title-text">Sound + Meaning Combined</span>
        <span class="strat-zh">半音半意 bànyīn-bànyì</span>
        <span class="strat-freq">~10-15% of loans</span>
      </div>
      <div class="strat-body">
        <div class="strat-desc">Part of the word is transliterated for sound; part uses a Chinese morpheme for meaning.</div>
        <div class="examples-row">
          <div class="loan-ex">
            <div class="le-foreign">beer <span class="le-arrow">&rarr;</span></div>
            <div class="le-zh">啤酒</div>
            <div class="le-pinyin">pí-jiǔ</div>
            <div class="le-lit">pi (sound) + wine/alcohol (meaning)</div>
          </div>
          <div class="loan-ex">
            <div class="le-foreign">ice cream <span class="le-arrow">&rarr;</span></div>
            <div class="le-zh">冰淇淋</div>
            <div class="le-pinyin">bīng-qílín</div>
            <div class="le-lit">ice (meaning) + qilin (sound)</div>
          </div>
          <div class="loan-ex">
            <div class="le-foreign">internet <span class="le-arrow">&rarr;</span></div>
            <div class="le-zh">因特网</div>
            <div class="le-pinyin">yīntè-wǎng</div>
            <div class="le-lit">yinte (sound) + net (meaning)</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Phono-Semantic -->
    <div class="strategy-section">
      <div class="strat-header sh-clever">
        <span class="strat-badge sb-clever">Elegant</span>
        <span class="strat-title-text">Sound + Meaning Matched</span>
        <span class="strat-zh">音意兼顾 yīnyì-jiāngù</span>
        <span class="strat-freq">Rare but prized</span>
      </div>
      <div class="strat-body">
        <div class="strat-desc">Characters are chosen that simultaneously approximate the foreign sound AND contribute relevant meaning. Considered the most elegant solution.</div>
        <div class="examples-row">
          <div class="loan-ex">
            <div class="le-foreign">gene <span class="le-arrow">&rarr;</span></div>
            <div class="le-zh">基因</div>
            <div class="le-pinyin">jī-yīn</div>
            <div class="le-lit">basic + cause (sounds like "gene")</div>
          </div>
          <div class="loan-ex">
            <div class="le-foreign">vitamin <span class="le-arrow">&rarr;</span></div>
            <div class="le-zh">维他命</div>
            <div class="le-pinyin">wéi-tā-mìng</div>
            <div class="le-lit">maintain + his + life (sounds like "vitamin")</div>
          </div>
          <div class="loan-ex">
            <div class="le-foreign">Coca-Cola <span class="le-arrow">&rarr;</span></div>
            <div class="le-zh">可口可乐</div>
            <div class="le-pinyin">kěkǒu-kělè</div>
            <div class="le-lit">tasty + enjoyable (sounds like "Coca-Cola")</div>
          </div>
        </div>
      </div>
    </div>

    <!-- English comparison -->
    <div class="en-compare">
      <div class="en-compare-title">Contrast: English's Open-Door Borrowing</div>
      <div class="en-compare-text">English freely absorbs words from any language, often with minimal modification. About 58% of English vocabulary comes from Latin and French.</div>
      <div class="en-loan-grid">
        <div class="en-loan-item"><div class="en-src">Japanese</div>karate, tsunami, sushi</div>
        <div class="en-loan-item"><div class="en-src">Arabic</div>algebra, algorithm, coffee</div>
        <div class="en-loan-item"><div class="en-src">Hindi</div>jungle, shampoo, veranda</div>
        <div class="en-loan-item"><div class="en-src">German</div>kindergarten, wanderlust</div>
        <div class="en-loan-item"><div class="en-src">Italian</div>piano, opera, broccoli</div>
        <div class="en-loan-item"><div class="en-src">Mandarin</div>typhoon, dim sum, kung fu</div>
      </div>
    </div>

    <!-- Why Mandarin resists -->
    <div class="why-box">
      <div class="why-title">Why Mandarin Prefers Calques Over Borrowing</div>
      <div class="why-grid">
        <div class="why-item">
          <div class="why-num">1</div>
          <div class="why-text"><strong>Script barrier</strong> — Characters encode meaning, not sound. Phonetic loans require awkward character choices.</div>
        </div>
        <div class="why-item">
          <div class="why-num">2</div>
          <div class="why-text"><strong>Rich morpheme stock</strong> — Existing morphemes combine to describe any concept transparently.</div>
        </div>
        <div class="why-item">
          <div class="why-num">3</div>
          <div class="why-text"><strong>Comprehension</strong> — 电脑 "electric-brain" is instantly clear; transliterations are opaque.</div>
        </div>
        <div class="why-item">
          <div class="why-num">4</div>
          <div class="why-text"><strong>Cultural aesthetics</strong> — Semantic compounds are felt to be more elegant and authentically Chinese.</div>
        </div>
      </div>
    </div>
  </div>

  <figcaption>
    <strong>Loanword integration strategies.</strong> Mandarin overwhelmingly prefers semantic calques (意译), translating the meaning rather than the sound of foreign words. This contrasts sharply with English, which has been absorbing loanwords from dozens of languages throughout its history. The most prized Chinese translations are those that simultaneously approximate the foreign sound AND convey relevant meaning — like 可口可乐 kěkǒu-kělè for Coca-Cola, literally "tasty and enjoyable."
  </figcaption>
</figure>
</body>
</html>
