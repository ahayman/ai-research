<!-- Description: Point-counterpoint argument flow mapping the two sides of the ecological validity debate about message-passing tests, clearly marking where each argument is stronger or weaker. -->

<figure class="concept-diagram" id="diagram-ecological-validity">
  <div class="diagram-container">
    <pre class="mermaid">
flowchart TB
    TITLE["THE ECOLOGICAL VALIDITY DEBATE\nAre message-passing tests fair?"]

    subgraph PRO["PROPONENT ARGUMENT\n(FC/S2C advocates)"]
        direction TB
        P1["Lab settings are stressful\nand artificial"]
        P2["Stress impairs communication\ncapacity"]
        P3["Low performance reflects\nstress, not lack of ability"]
        P4["Tests are ecologically invalid"]
        P5["Communication requires trust\nand familiar partners"]
        P6["Performance anxiety prevents\ndemonstrating known abilities"]
        P1 --> P2 --> P3 --> P4
        P5 --> P4
        P6 --> P4
    end

    subgraph COUNTER["SKEPTIC COUNTERARGUMENT"]
        direction TB
        S1["Tests don't merely show\nLOW performance"]
        S2["They show FACILITATOR-\nMATCHED output"]
        S3["Output specifically tracks\nwhat the facilitator knows"]
        S4["This is a POSITIVE FINDING\nof influence, not absence\nof communication"]
        S5["Stress CANNOT explain why\noutput matches facilitator's\n(incorrect) knowledge"]
        S6["The ecological validity objection\nwould invalidate ALL\ncontrolled research"]
        S1 --> S2 --> S3 --> S4
        S5 --> S4
        S6 --> S4
    end

    TITLE --> PRO
    TITLE --> COUNTER

    subgraph VERDICT["WHERE EACH SIDE IS STRONGER"]
        V1["Proponents are correct that\nlab settings may reduce\ncommunicative output"]
        V2["Skeptics are correct that\nstress cannot explain\nfacilitator-matched output"]
        V3["The facilitator-matched-output\nfinding is the STRONGEST\nskeptic evidence because\nit has no ecological\nvalidity explanation"]
    end

    PRO --> VERDICT
    COUNTER --> VERDICT

    </pre>
  </div>
  <figcaption>
    <strong>Figure 2:</strong> The ecological validity debate. Proponents argue that laboratory conditions are artificial, stressful, and do not reflect the trust-based context in which supported communication occurs. Skeptics counter that the tests do not merely show low performance under stress -- they show output that specifically and consistently matches the facilitator's knowledge, not the communicator's experience. The facilitator-matched-output finding (Condition 3 in message-passing tests) is the strongest skeptic evidence because it cannot be explained by stress, anxiety, or ecological invalidity. There is no ecological validity argument for why a communicator's output would track what the facilitator was told rather than what the communicator experienced.
  </figcaption>
</figure>
