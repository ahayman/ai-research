<!-- Diagram: The Informed Consent Paradox -->
<!-- Type: flowchart -->
<!-- Generated: 2026-03-31 -->
<!-- Description: Circular recursive diagram showing the logical circularity of obtaining consent from people whose communication method is the subject of study, with escape routes shown. -->

<figure class="concept-diagram" id="diagram-consent-paradox">
  <div class="diagram-container">
    <pre class="mermaid">
flowchart TD
    S1["1. Researcher wants to study\nwhether communication\nmethod X works"]
    S2["2. IRB requires informed\nconsent from participant"]
    S3["3. Participant can only\nconsent through method X"]
    S4["4. If method X is invalid,\nconsent obtained through\nit is also invalid"]
    S5["5. Cannot determine if method X\nis valid without studying it\n(which requires consent)"]

    S1 --> S2 --> S3 --> S4 --> S5 --> S1

    subgraph ESCAPE["ESCAPE ROUTES\n(Partial resolutions)"]
        E1["Proxy consent\n(parent/guardian)\nProblem: denies autonomy"]
        E2["Behavioral assent\n(approach, engage, no distress)\nProblem: low threshold"]
        E3["Ethical listening framework\n(Aidonopoulou-Read 2025)\nVideo + behavior checklists\nProblem: not yet standardized"]
        E4["Accessible consent materials\n(PMC12448064, 2025)\nVisual formats, plain language\nProblem: still requires some\ncommunicative capacity"]
        E5["Multi-modal consent\nAccept any available method\nwith behavioral verification\nProblem: which methods count?"]
    end

    S3 -.->|"Breaks the loop\nbut imperfectly"| ESCAPE

    subgraph CONSEQUENCE["REAL-WORLD CONSEQUENCE"]
        CON1["Studies are stalled or never conducted"]
        CON2["The evidence vacuum persists"]
        CON3["Without research, the debate\ncannot be resolved"]
        CON4["Without resolution, non-speaking\nindividuals remain caught in the middle"]
    end

    S5 --> CONSEQUENCE

    style S1 fill:#dbeafe,stroke:#2563eb,color:#1e3a5f
    style S2 fill:#dbeafe,stroke:#2563eb,color:#1e3a5f

    style S4 fill:#fee2e2,stroke:#dc2626,color:#7f1d1d
    style S5 fill:#fee2e2,stroke:#dc2626,color:#7f1d1d
    style ESCAPE fill:#dcfce7,stroke:#16a34a,color:#14532d
    style E1 fill:#dcfce7,stroke:#16a34a,color:#14532d
    style E2 fill:#dcfce7,stroke:#16a34a,color:#14532d
    style E3 fill:#dcfce7,stroke:#16a34a,color:#14532d
    style E4 fill:#dcfce7,stroke:#16a34a,color:#14532d
    style E5 fill:#dcfce7,stroke:#16a34a,color:#14532d
    style CONSEQUENCE fill:#fef3c7,stroke:#d97706,color:#78350f
    style CON1 fill:#fef3c7,stroke:#d97706,color:#78350f

    style CON3 fill:#fef3c7,stroke:#d97706,color:#78350f
    style CON4 fill:#fef3c7,stroke:#d97706,color:#78350f
    </pre>
  </div>
  <figcaption>
    <strong>Figure 3:</strong> The informed consent paradox. To study whether a communication method works, researchers need consent from participants. But if participants can only consent through the method being studied, and the method might be invalid, the consent itself may be invalid. This circular logic contributes to the evidence vacuum: studies are stalled, the debate cannot be resolved, and non-speaking individuals remain caught in the middle. Partial escape routes include proxy consent (which raises autonomy concerns), behavioral assent indicators, the 2025 ethical listening framework, accessible consent materials, and multi-modal consent approaches. None fully resolves the paradox.
  </figcaption>
</figure>
