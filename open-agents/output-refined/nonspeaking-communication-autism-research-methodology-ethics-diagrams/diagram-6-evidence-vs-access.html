  <figcaption>
    <strong>Figure 6:</strong> The tension between evidence-based practice and communication access. Strict evidence-based practice would restrict communication to validated methods, protecting against facilitator influence but potentially denying access. Maximum communication access would accept all methods, ensuring no one is left without a voice but potentially including facilitator-authored communication. Both sides have genuine moral weight: the FC evidence actively demonstrates facilitator influence (not merely "insufficient evidence"), AND non-speaking individuals cannot wait for perfect evidence before receiving communication tools. The common ground: evidence-based AAC (Proloquo2Go, TouchChat, eye-gaze systems) is universally supported. The debate is specifically about which methods reliably transmit the person's own thoughts.
