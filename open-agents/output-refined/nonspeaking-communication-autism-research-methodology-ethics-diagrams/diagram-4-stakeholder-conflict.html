  <figcaption>
    <strong>Figure 4:</strong> Stakeholder positions on non-speaking communication methods. Organizations prioritizing evidence-based practice (ASHA, NCSA, ASAT) warn against FC and its variants based on controlled research showing facilitator influence. Organizations prioritizing communication access (ASAN, I-ASC, United for Communication Choice) argue for the right to use preferred methods and critique the process by which professional positions were developed. Bridging positions include CommunicationFIRST (a cross-disability organization whose "5+ million" figure covers all speech-related disabilities, not just autism) and non-speaking AAC users like Zimmerman and Blasko who use uncontested methods while advocating broadly for communication access. The conflict reflects different value hierarchies, not disagreement about whether non-speaking people deserve to be heard.
  </figcaption>
