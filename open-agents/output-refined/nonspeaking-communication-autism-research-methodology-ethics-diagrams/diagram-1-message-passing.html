<!-- Description: Experimental design diagram showing how message-passing tests work across three conditions and what the results mean, with actual data from controlled studies. -->

<figure class="concept-diagram" id="diagram-message-passing">
  <div class="diagram-container">
    <pre class="mermaid">
flowchart TB
    TITLE["THE MESSAGE-PASSING TEST\nThe gold standard for authorship verification"]

    subgraph COND1["CONDITION 1: SAME INFORMATION\nBoth see the same stimulus"]
        direction TB
        C1_SETUP["Communicator sees: DOG\nFacilitator sees: DOG"]
        C1_OUTPUT["Facilitated output: 'DOG'"]
        C1_RESULT["RESULT: Correct\nBUT AMBIGUOUS\nEither person could\nbe the source"]
    end

    subgraph COND2["CONDITION 2: FACILITATOR BLIND\nOnly communicator sees stimulus"]
        direction TB
        C2_SETUP["Communicator sees: DOG\nFacilitator sees: NOTHING"]
        C2_OUTPUT["Facilitated output:\nNonsensical or no output"]
        C2_RESULT["RESULT: 0-1.8% correct\nCommunicator CANNOT\nproduce correct output\nwithout facilitator knowledge"]
    end

    subgraph COND3["CONDITION 3: DIFFERENT INFORMATION\nFacilitator given wrong stimulus"]
        direction TB
        C3_SETUP["Communicator sees: DOG\nFacilitator sees: HOUSE"]
        C3_OUTPUT["Facilitated output: 'HOUSE'"]
        C3_RESULT["RESULT: 66-80% match\nfacilitator's information\nOutput tracks FACILITATOR,\nnot communicator"]
    end

    TITLE --> COND1
    TITLE --> COND2
    TITLE --> COND3

    subgraph EVIDENCE["WHAT THIS MEANS"]
        EV1["~40-50 controlled studies\nconducted primarily in 1990s"]
        EV2["Systematic reviews:\nMostert 2001, 2010\nSchlosser et al. 2014\nHemsley et al. 2018"]
        EV3["Consistent finding:\nNo evidence for communicator\nauthorship under blinded conditions"]
        EV4["CRITICAL: Condition 3 is a\nPOSITIVE finding of facilitator\ninfluence, not merely absence\nof communicator authorship"]
    end

    COND2 --> EVIDENCE
    COND3 --> EVIDENCE

    style TITLE fill:#f3f4f6,stroke:#6b7280,color:#1f2937
    style COND1 fill:#fef3c7,stroke:#d97706,color:#78350f
    style COND2 fill:#fee2e2,stroke:#dc2626,color:#7f1d1d
    style COND3 fill:#fee2e2,stroke:#dc2626,color:#7f1d1d
    style EVIDENCE fill:#dbeafe,stroke:#2563eb,color:#1e3a5f

    style C1_RESULT fill:#fef3c7,stroke:#d97706,color:#78350f
    style C2_SETUP fill:#fee2e2,stroke:#dc2626,color:#7f1d1d
    style C2_OUTPUT fill:#fee2e2,stroke:#dc2626,color:#7f1d1d
    style C2_RESULT fill:#fee2e2,stroke:#dc2626,color:#7f1d1d
    style C3_SETUP fill:#fee2e2,stroke:#dc2626,color:#7f1d1d
    style C3_OUTPUT fill:#fee2e2,stroke:#dc2626,color:#7f1d1d
    style C3_RESULT fill:#fee2e2,stroke:#dc2626,color:#7f1d1d

    style EV2 fill:#dbeafe,stroke:#2563eb,color:#1e3a5f
    style EV3 fill:#dbeafe,stroke:#2563eb,color:#1e3a5f
    style EV4 fill:#dbeafe,stroke:#2563eb,color:#1e3a5f
    </pre>
  </div>
  <figcaption>
    <strong>Figure 1:</strong> The message-passing test paradigm. Three experimental conditions test whether the communicator or the facilitator is authoring facilitated output. When both see the same stimulus (Condition 1), correct output is ambiguous. When only the communicator sees the stimulus (Condition 2), correct responses range from 0% to 1.8%. When the facilitator is given <em>different</em> information (Condition 3), 66-80% of output matches what the <em>facilitator</em> was told, not what the communicator experienced. This last finding is critical: it is a positive demonstration of facilitator influence, not merely an absence of communication. Stress and ecological invalidity cannot explain why output specifically and consistently tracks the facilitator's knowledge.
  </figcaption>
</figure>
