<!-- Diagram: The "Nothing About Us Without Us" Recursion -->
<!-- Type: flowchart -->
<!-- Generated: 2026-03-31 -->
<!-- Description: Recursive loop showing how the disability rights principle encounters a logical paradox when applied to decisions about non-speaking communication methods. -->

<figure class="concept-diagram" id="diagram-recursion">
  <div class="diagram-container">
    <pre class="mermaid">
flowchart TD
    PRINCIPLE["PRINCIPLE\n'Nothing About Us Without Us'\nNon-speaking people should\ndecide about their communication"]

    PROBLEM["PROBLEM\nDeciding requires communication"]

    PRINCIPLE --> PROBLEM

    PROBLEM --> BRANCH1
    PROBLEM --> BRANCH2

    subgraph BRANCH1["IF METHOD IS UNCONTESTED (AAC)"]
        B1A["Include their voice"]
        B1B["Zimmerman, Blasko:\nUnambiguous self-advocacy"]
        B1C["But: May not represent\nall non-speaking individuals"]
        B1A --> B1B --> B1C
    end

    subgraph BRANCH2["IF METHOD IS CONTESTED (FC/S2C)"]
        direction TB
        B2A["Include their voice?"]
        B2B["May actually be including\nfacilitator's voice"]
        B2C["Exclude them because\nmethod is contested?"]
        B2D["Reproduces the EXACT\ngatekeeping the principle\nwas designed to prevent"]
        B2A --> B2B
        B2C --> B2D
        B2B -.-> B2C
    end

    subgraph RESOLUTION["ATTEMPTED RESOLUTIONS\n(None fully satisfactory)"]
        R1["1. Prioritize uncontested voices\n(Zimmerman, Blasko)\nProblem: May not represent all"]
        R2["2. Accept all communication\nProblem: Risks including\nfacilitator-authored input"]
        R3["3. Verify then include\nProblem: May exclude genuine\nbut unverified communicators"]
        R4["4. Acknowledge the paradox\nPrioritize uncontested voices\nRemain open to new evidence\n(Least-bad approach)"]
    end

    BRANCH1 --> RESOLUTION
    BRANCH2 --> RESOLUTION

    style PRINCIPLE fill:#dbeafe,stroke:#2563eb,color:#1e3a5f

    style BRANCH2 fill:#fee2e2,stroke:#dc2626,color:#7f1d1d
    style RESOLUTION fill:#f3f4f6,stroke:#6b7280,color:#1f2937
    style B1A fill:#dcfce7,stroke:#16a34a,color:#14532d
    style B1B fill:#dcfce7,stroke:#16a34a,color:#14532d
    style B1C fill:#fef3c7,stroke:#d97706,color:#78350f
    style B2A fill:#fef3c7,stroke:#d97706,color:#78350f
    style B2B fill:#fee2e2,stroke:#dc2626,color:#7f1d1d
    style B2C fill:#fef3c7,stroke:#d97706,color:#78350f
    style B2D fill:#fee2e2,stroke:#dc2626,color:#7f1d1d
    style R1 fill:#f3f4f6,stroke:#6b7280,color:#374151
    style R2 fill:#f3f4f6,stroke:#6b7280,color:#374151
    style R3 fill:#f3f4f6,stroke:#6b7280,color:#374151
    style R4 fill:#dbeafe,stroke:#2563eb,color:#1e3a5f
    </pre>
  </div>
  <figcaption>
    <strong>Figure 5:</strong> The "Nothing About Us Without Us" recursion. The disability rights principle demands that non-speaking autistic people be included in decisions about their communication methods. But inclusion requires communication, and if the communication method is contested, including their "voice" may actually include the facilitator's voice. Excluding them because their method is contested reproduces exactly the gatekeeping the principle was designed to prevent. No resolution is fully satisfactory. The least-bad approach: prioritize individuals whose communication methods are uncontested (Zimmerman, Blasko), acknowledge the paradox honestly, and remain open to new verification evidence.
  </figcaption>
</figure>
