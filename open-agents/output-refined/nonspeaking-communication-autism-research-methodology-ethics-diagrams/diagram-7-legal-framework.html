  <figcaption>
    <strong>Figure 7:</strong> Legal framework for communication rights and the implementation gap. Federal law (ADA, IDEA, Section 504) clearly establishes communication access as a right: the ADA requires "appropriate auxiliary aids and services," IDEA mandates assistive technology consideration in every IEP, and schools must educate in the least restrictive environment. State and local implementation, however, falls far short. AAC devices are expensive ($5,000-$15,000 for dedicated devices), insurance coverage varies, schools lack trained staff, the assessment-placement loop can deny AAC to those "assessed as unable to benefit," and the legal system may view non-standard communication as suspicious. The gap between legal mandate and practical reality is where non-speaking individuals' rights are lost.
  </figcaption>
</figure>
