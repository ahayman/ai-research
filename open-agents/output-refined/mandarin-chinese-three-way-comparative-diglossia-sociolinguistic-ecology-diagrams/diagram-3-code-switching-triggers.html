<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Code-Switching Triggers Map</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --accent: #06b6d4;
    --pth: #ef4444; --pth-bg: #fef2f2; --pth-light: #fca5a5;
    --dial: #6366f1; --dial-bg: #eef2ff; --dial-light: #a5b4fc;
    --mix: #f59e0b; --mix-bg: #fef3c7;
    --muted: #6c757d;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f172a; --fg: #e2e8f0; --surface: #1e293b; --border: #334155;
      --pth-bg: #3b1a1a; --dial-bg: #1e1b4b; --mix-bg: #4a3520;
      --pth-light: #991b1b; --dial-light: #4338ca;
      --muted: #94a3b8;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--fg); display: flex; justify-content: center; padding: 2rem 1rem; line-height: 1.6; }
  figure { max-width: 960px; width: 100%; }
  figcaption { text-align: center; font-size: 0.82rem; color: var(--muted); margin-top: 1rem; font-style: italic; }
  .diagram-container { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 2rem 1.5rem; }
  .title { font-size: 1.15rem; font-weight: 700; text-align: center; margin-bottom: 0.25rem; }
  .subtitle { font-size: 0.85rem; color: var(--muted); text-align: center; margin-bottom: 1.5rem; }

  /* Legend */
  .legend { display: flex; gap: 1.25rem; justify-content: center; margin-bottom: 1.25rem; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 0.4rem; font-size: 0.78rem; font-weight: 600; }
  .legend-dot { width: 12px; height: 12px; border-radius: 3px; }

  /* Domain section */
  .section-label { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--accent); margin-top: 1.25rem; margin-bottom: 0.5rem; padding-left: 0.5rem; border-left: 3px solid var(--accent); }
  .section-label:first-of-type { margin-top: 0; }

  /* Spectrum rows */
  .spectrum-row { display: grid; grid-template-columns: 120px 1fr 90px; gap: 0.75rem; align-items: center; padding: 0.5rem 0.6rem; background: var(--bg); border-radius: 6px; border: 1px solid var(--border); margin-bottom: 0.4rem; }
  @media (max-width: 600px) { .spectrum-row { grid-template-columns: 90px 1fr; } .spectrum-note { display: none; } }
  .spectrum-domain { font-weight: 700; font-size: 0.82rem; }
  .spectrum-bar { height: 28px; border-radius: 14px; display: flex; overflow: hidden; }
  .spec-pth { background: var(--pth); height: 100%; display: flex; align-items: center; justify-content: center; }
  .spec-mix { background: var(--mix); height: 100%; display: flex; align-items: center; justify-content: center; }
  .spec-dial { background: var(--dial); height: 100%; display: flex; align-items: center; justify-content: center; }
  .spec-label { font-size: 0.62rem; font-weight: 700; color: #fff; white-space: nowrap; padding: 0 0.3rem; }
  .spectrum-note { font-size: 0.7rem; color: var(--muted); }

  /* Interlocutor triggers */
  .trigger-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.6rem; margin-top: 0.5rem; }
  @media (max-width: 600px) { .trigger-grid { grid-template-columns: 1fr; } }
  .trigger-card { padding: 0.75rem; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); }
  .trigger-card.pth-card { border-left: 4px solid var(--pth); }
  .trigger-card.dial-card { border-left: 4px solid var(--dial); }
  .trigger-card.mix-card { border-left: 4px solid var(--mix); }
  .trigger-heading { font-size: 0.82rem; font-weight: 700; margin-bottom: 0.25rem; }
  .trigger-text { font-size: 0.75rem; color: var(--muted); }
  .trigger-arrow { font-size: 0.72rem; font-weight: 700; margin-top: 0.3rem; }
  .trigger-arrow.to-pth { color: var(--pth); }
  .trigger-arrow.to-dial { color: var(--dial); }
  .trigger-arrow.to-mix { color: var(--mix); }

  /* Identity signals */
  .signal-row { display: flex; gap: 1rem; margin-top: 0.5rem; flex-wrap: wrap; }
  .signal-box { flex: 1; min-width: 200px; padding: 0.6rem 0.75rem; border-radius: 6px; text-align: center; }
  .signal-box.pth-sig { background: var(--pth-bg); border: 1px solid var(--pth); }
  .signal-box.dial-sig { background: var(--dial-bg); border: 1px solid var(--dial); }
  .signal-title { font-size: 0.82rem; font-weight: 700; }
  .signal-tags { display: flex; flex-wrap: wrap; gap: 0.25rem; justify-content: center; margin-top: 0.3rem; }
  .signal-tag { font-size: 0.68rem; padding: 0.12rem 0.4rem; border-radius: 999px; background: var(--surface); border: 1px solid var(--border); }
</style>
</head>
<body>
<figure>
<div class="diagram-container">
  <div class="title">Code-Switching Triggers</div>
  <div class="subtitle">When and why Chinese speakers shift between Putonghua and local dialect</div>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:var(--pth)"></div> Putonghua dominant</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--mix)"></div> Mixed / Regional PTH</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--dial)"></div> Dialect dominant</div>
  </div>

  <!-- Domain-based -->
  <div class="section-label">Domain-Based Switching: Where Are You?</div>
  <div class="spectrum-row">
    <div class="spectrum-domain">Education</div>
    <div class="spectrum-bar"><div class="spec-pth" style="width:92%"><span class="spec-label">Putonghua</span></div><div class="spec-mix" style="width:8%"></div></div>
    <div class="spectrum-note">Mandated since 1950s</div>
  </div>
  <div class="spectrum-row">
    <div class="spectrum-domain">Government</div>
    <div class="spectrum-bar"><div class="spec-pth" style="width:85%"><span class="spec-label">Putonghua</span></div><div class="spec-mix" style="width:15%"></div></div>
    <div class="spectrum-note">Required for official</div>
  </div>
  <div class="spectrum-row">
    <div class="spectrum-domain">Workplace</div>
    <div class="spectrum-bar"><div class="spec-pth" style="width:55%"><span class="spec-label">PTH</span></div><div class="spec-mix" style="width:30%"><span class="spec-label">Mixed</span></div><div class="spec-dial" style="width:15%"></div></div>
    <div class="spectrum-note">Varies by locality</div>
  </div>
  <div class="spectrum-row">
    <div class="spectrum-domain">Marketplace</div>
    <div class="spectrum-bar"><div class="spec-pth" style="width:35%"><span class="spec-label">PTH</span></div><div class="spec-mix" style="width:35%"><span class="spec-label">Mixed</span></div><div class="spec-dial" style="width:30%"><span class="spec-label">Dialect</span></div></div>
    <div class="spectrum-note">Age + store type</div>
  </div>
  <div class="spectrum-row">
    <div class="spectrum-domain">Social media</div>
    <div class="spectrum-bar"><div class="spec-pth" style="width:60%"><span class="spec-label">PTH writing</span></div><div class="spec-mix" style="width:30%"><span class="spec-label">Mixed</span></div><div class="spec-dial" style="width:10%"></div></div>
    <div class="spectrum-note">Dialect humor rising</div>
  </div>
  <div class="spectrum-row">
    <div class="spectrum-domain">Family</div>
    <div class="spectrum-bar"><div class="spec-pth" style="width:25%"><span class="spec-label">PTH</span></div><div class="spec-mix" style="width:25%"><span class="spec-label">Mix</span></div><div class="spec-dial" style="width:50%"><span class="spec-label">Dialect</span></div></div>
    <div class="spectrum-note">Generational shift</div>
  </div>

  <!-- Interlocutor-based -->
  <div class="section-label">Interlocutor-Based Switching: Who Are You Talking To?</div>
  <div class="trigger-grid">
    <div class="trigger-card pth-card">
      <div class="trigger-heading">Different dialect group</div>
      <div class="trigger-text">No shared local language; Putonghua serves as lingua franca</div>
      <div class="trigger-arrow to-pth">&#8594; Default to Putonghua</div>
    </div>
    <div class="trigger-card dial-card">
      <div class="trigger-heading">Same hometown / dialect</div>
      <div class="trigger-text">Shared variety signals solidarity, belonging, trust</div>
      <div class="trigger-arrow to-dial">&#8594; Switch to dialect</div>
    </div>
    <div class="trigger-card pth-card">
      <div class="trigger-heading">Higher formality / status</div>
      <div class="trigger-text">Boss, official, stranger in formal context</div>
      <div class="trigger-arrow to-pth">&#8594; More Putonghua</div>
    </div>
    <div class="trigger-card mix-card">
      <div class="trigger-heading">Age mismatch</div>
      <div class="trigger-text">Older speakers may not be fluent in PTH; younger may not know dialect</div>
      <div class="trigger-arrow to-mix">&#8594; Regional Putonghua compromise</div>
    </div>
  </div>

  <!-- Identity signals -->
  <div class="section-label">Identity Signals: What Does Your Language Choice Say?</div>
  <div class="signal-row">
    <div class="signal-box pth-sig">
      <div class="signal-title" style="color:var(--pth)">Putonghua Signals</div>
      <div class="signal-tags">
        <span class="signal-tag">Education</span>
        <span class="signal-tag">Modernity</span>
        <span class="signal-tag">Professionalism</span>
        <span class="signal-tag">National identity</span>
        <span class="signal-tag">Social mobility</span>
      </div>
    </div>
    <div class="signal-box dial-sig">
      <div class="signal-title" style="color:var(--dial)">Dialect Signals</div>
      <div class="signal-tags">
        <span class="signal-tag">Local identity</span>
        <span class="signal-tag">Authenticity</span>
        <span class="signal-tag">In-group trust</span>
        <span class="signal-tag">Cultural roots</span>
        <span class="signal-tag">Warmth</span>
      </div>
    </div>
  </div>
</div>
<figcaption>Chinese speakers navigate a complex repertoire: domain, interlocutor, and identity all influence the choice between Putonghua and dialect</figcaption>
</figure>
</body>
</html>
