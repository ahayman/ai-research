<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Regional Mandarin Continuum</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --accent: #06b6d4;
    --high-int: #22c55e; --med-int: #f59e0b; --low-int: #ef4444;
    --high-bg: #dcfce7; --med-bg: #fef3c7; --low-bg: #fef2f2;
    --muted: #6c757d;
    --bar-track: #e2e8f0;
    --beijing: #3b82f6;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f172a; --fg: #e2e8f0; --surface: #1e293b; --border: #334155;
      --high-bg: #14532d; --med-bg: #4a3520; --low-bg: #3b1a1a;
      --muted: #94a3b8; --bar-track: #334155;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--fg); display: flex; justify-content: center; padding: 2rem 1rem; line-height: 1.6; }
  figure { max-width: 960px; width: 100%; }
  figcaption { text-align: center; font-size: 0.82rem; color: var(--muted); margin-top: 1rem; font-style: italic; }
  .diagram-container { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 2rem 1.5rem; }
  .title { font-size: 1.15rem; font-weight: 700; text-align: center; margin-bottom: 0.25rem; }
  .subtitle { font-size: 0.85rem; color: var(--muted); text-align: center; margin-bottom: 1.5rem; }

  /* Legend */
  .legend { display: flex; gap: 1.25rem; justify-content: center; margin-bottom: 1.25rem; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 0.35rem; font-size: 0.75rem; font-weight: 600; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; }

  /* Variety rows */
  .variety-list { display: flex; flex-direction: column; gap: 0.5rem; }
  .variety-row { display: grid; grid-template-columns: 180px 80px 1fr 120px; gap: 0.75rem; align-items: center; padding: 0.65rem 0.75rem; background: var(--bg); border-radius: 6px; border: 1px solid var(--border); }
  @media (max-width: 700px) { .variety-row { grid-template-columns: 130px 60px 1fr; } .variety-features { display: none; } }

  .variety-row.beijing-row { border: 2px solid var(--beijing); position: relative; }
  .variety-row.beijing-row::after {
    content: 'BASIS FOR PUTONGHUA';
    position: absolute; top: -8px; right: 10px;
    font-size: 0.58rem; font-weight: 800; color: #fff;
    background: var(--beijing); padding: 0.05rem 0.4rem; border-radius: 3px;
    letter-spacing: 0.05em;
  }

  .variety-name { font-weight: 700; font-size: 0.88rem; }
  .variety-chinese { font-size: 0.72rem; color: var(--muted); }
  .variety-speakers { font-size: 0.82rem; font-weight: 700; text-align: center; color: var(--accent); }

  /* Intelligibility meter */
  .intel-meter { display: flex; align-items: center; gap: 0.4rem; }
  .intel-bar { flex: 1; height: 16px; background: var(--bar-track); border-radius: 8px; overflow: hidden; }
  .intel-fill { height: 100%; border-radius: 8px; }
  .intel-fill.high { background: var(--high-int); }
  .intel-fill.med { background: var(--med-int); }
  .intel-fill.low { background: var(--low-int); }
  .intel-label { font-size: 0.68rem; font-weight: 700; min-width: 38px; text-align: center; }
  .intel-label.high { color: var(--high-int); }
  .intel-label.med { color: var(--med-int); }
  .intel-label.low { color: var(--low-int); }

  .variety-features { font-size: 0.7rem; color: var(--muted); }

  /* Section header */
  .section-note { font-size: 0.78rem; color: var(--muted); text-align: center; margin-bottom: 0.75rem; padding: 0.5rem; background: var(--bg); border-radius: 6px; border: 1px solid var(--border); }

  /* Key insight */
  .insight { background: var(--bg); border: 1px solid var(--accent); border-radius: 6px; padding: 0.75rem 1rem; margin-top: 1.25rem; }
  .insight-label { font-size: 0.7rem; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.25rem; }
  .insight-text { font-size: 0.82rem; }
</style>
</head>
<body>
<figure>
<div class="diagram-container">
  <div class="title">Regional Mandarin: A Continuum, Not a Monolith</div>
  <div class="subtitle">Eight sub-groups with varying mutual intelligibility — ranked by proximity to Beijing standard</div>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:var(--high-int)"></div> High intelligibility with Beijing</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--med-int)"></div> Moderate / Partial</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--low-int)"></div> Limited intelligibility</div>
  </div>

  <div class="section-note">Intelligibility meter: approximate comprehension by a Standard Putonghua speaker encountering native dialect speech</div>

  <div class="variety-list">
    <div class="variety-row beijing-row">
      <div><div class="variety-name">Beijing Mandarin</div><div class="variety-chinese">北京官话 Běijīng Guānhuà</div></div>
      <div class="variety-speakers">27M</div>
      <div class="intel-meter">
        <div class="intel-bar"><div class="intel-fill high" style="width:95%"></div></div>
        <div class="intel-label high">95%</div>
      </div>
      <div class="variety-features">Heavy erhua, local slang</div>
    </div>
    <div class="variety-row">
      <div><div class="variety-name">Northeastern</div><div class="variety-chinese">东北官话 Dōngběi Guānhuà</div></div>
      <div class="variety-speakers">98M</div>
      <div class="intel-meter">
        <div class="intel-bar"><div class="intel-fill high" style="width:88%"></div></div>
        <div class="intel-label high">88%</div>
      </div>
      <div class="variety-features">-n/-ng merge, rising intonation</div>
    </div>
    <div class="variety-row">
      <div><div class="variety-name">Jilu</div><div class="variety-chinese">冀鲁官话 Jìlǔ Guānhuà</div></div>
      <div class="variety-speakers">89M</div>
      <div class="intel-meter">
        <div class="intel-bar"><div class="intel-fill high" style="width:80%"></div></div>
        <div class="intel-label high">80%</div>
      </div>
      <div class="variety-features">Different tone contours</div>
    </div>
    <div class="variety-row">
      <div><div class="variety-name">Jiaoliao</div><div class="variety-chinese">胶辽官话 Jiāoliáo Guānhuà</div></div>
      <div class="variety-speakers">35M</div>
      <div class="intel-meter">
        <div class="intel-bar"><div class="intel-fill med" style="width:68%"></div></div>
        <div class="intel-label med">68%</div>
      </div>
      <div class="variety-features">Peninsular varieties</div>
    </div>
    <div class="variety-row">
      <div><div class="variety-name">Central Plains</div><div class="variety-chinese">中原官话 Zhōngyuán Guānhuà</div></div>
      <div class="variety-speakers">186M</div>
      <div class="intel-meter">
        <div class="intel-bar"><div class="intel-fill med" style="width:60%"></div></div>
        <div class="intel-label med">60%</div>
      </div>
      <div class="variety-features">Historical prestige variety</div>
    </div>
    <div class="variety-row">
      <div><div class="variety-name">Lanyin</div><div class="variety-chinese">兰银官话 Lányín Guānhuà</div></div>
      <div class="variety-speakers">17M</div>
      <div class="intel-meter">
        <div class="intel-bar"><div class="intel-fill med" style="width:55%"></div></div>
        <div class="intel-label med">55%</div>
      </div>
      <div class="variety-features">Northwestern, Silk Road region</div>
    </div>
    <div class="variety-row">
      <div><div class="variety-name">Lower Yangtze</div><div class="variety-chinese">江淮官话 Jiānghuái Guānhuà</div></div>
      <div class="variety-speakers">86M</div>
      <div class="intel-meter">
        <div class="intel-bar"><div class="intel-fill low" style="width:45%"></div></div>
        <div class="intel-label low">45%</div>
      </div>
      <div class="variety-features">Wu influence, entering tone traces</div>
    </div>
    <div class="variety-row">
      <div><div class="variety-name">Southwestern</div><div class="variety-chinese">西南官话 Xīnán Guānhuà</div></div>
      <div class="variety-speakers">260M</div>
      <div class="intel-meter">
        <div class="intel-bar"><div class="intel-fill low" style="width:40%"></div></div>
        <div class="intel-label low">40%</div>
      </div>
      <div class="variety-features">Largest group, mountainous terrain</div>
    </div>
  </div>

  <div class="insight">
    <div class="insight-label">Key Insight</div>
    <div class="insight-text"><strong>Southwestern Mandarin alone has 260 million speakers</strong> — more than the entire population of most European countries — yet its speakers have limited intelligibility with Beijing-based Putonghua. "Mandarin" is not one language but a continuum stretching from highly intelligible (Northeastern) to barely intelligible (Southwestern, Lower Yangtze) with the standard.</div>
  </div>
</div>
<figcaption>Eight Mandarin sub-groups ordered by intelligibility with Beijing standard. Intelligibility percentages are approximate estimates based on dialectological research. Speaker counts from Language Atlas of China.</figcaption>
</figure>
</body>
</html>
