<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chinese Language Family Tree</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --accent: #06b6d4;
    --mandarin: #ef4444; --mandarin-bg: #fef2f2;
    --wu: #8b5cf6; --wu-bg: #f5f3ff;
    --yue: #f59e0b; --yue-bg: #fef3c7;
    --min: #10b981; --min-bg: #d1fae5;
    --hakka: #ec4899; --hakka-bg: #fce7f3;
    --other: #6366f1; --other-bg: #eef2ff;
    --jin: #0ea5e9; --jin-bg: #e0f2fe;
    --xiang: #84cc16; --xiang-bg: #ecfccb;
    --gan: #f97316; --gan-bg: #fff7ed;
    --muted: #6c757d; --bar-track: #e2e8f0;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f172a; --fg: #e2e8f0; --surface: #1e293b; --border: #334155;
      --mandarin-bg: #3b1a1a; --wu-bg: #2e1a4a; --yue-bg: #4a3520;
      --min-bg: #1a3a2e; --hakka-bg: #3a1a2e; --other-bg: #1e1b4b;
      --jin-bg: #0c2a3e; --xiang-bg: #1a2e10; --gan-bg: #3a2510;
      --muted: #94a3b8; --bar-track: #334155;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--fg); display: flex; justify-content: center; padding: 2rem 1rem; line-height: 1.6; }
  figure { max-width: 960px; width: 100%; }
  figcaption { text-align: center; font-size: 0.82rem; color: var(--muted); margin-top: 1rem; font-style: italic; }
  .diagram-container { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 2rem 1.5rem; }
  .title { font-size: 1.15rem; font-weight: 700; text-align: center; margin-bottom: 0.25rem; }
  .subtitle { font-size: 0.85rem; color: var(--muted); text-align: center; margin-bottom: 1.5rem; }

  /* Language cards */
  .lang-grid { display: flex; flex-direction: column; gap: 0.6rem; }
  .lang-row { display: grid; grid-template-columns: 140px 60px 1fr 100px; gap: 0.75rem; align-items: center; padding: 0.6rem 0.75rem; background: var(--bg); border-radius: 6px; border: 1px solid var(--border); }
  @media (max-width: 600px) { .lang-row { grid-template-columns: 100px 50px 1fr; } .lang-region { display: none; } }

  .lang-name { font-weight: 700; font-size: 0.88rem; }
  .lang-chinese { font-size: 0.75rem; color: var(--muted); }
  .lang-pct { font-size: 0.82rem; font-weight: 700; text-align: center; }

  /* Bar chart */
  .bar-container { height: 20px; background: var(--bar-track); border-radius: 10px; overflow: hidden; position: relative; }
  .bar-fill { height: 100%; border-radius: 10px; transition: width 0.5s ease; display: flex; align-items: center; justify-content: flex-end; padding-right: 0.4rem; }
  .bar-label { font-size: 0.65rem; font-weight: 700; color: #fff; white-space: nowrap; }

  .lang-region { font-size: 0.72rem; color: var(--muted); text-align: right; }

  /* Group headers */
  .group-header { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--accent); margin-top: 1rem; margin-bottom: 0.25rem; padding-left: 0.5rem; border-left: 3px solid var(--accent); }
  .group-header:first-child { margin-top: 0; }

  /* Highlight for Mandarin */
  .lang-row.mandarin-row { border-color: var(--mandarin); border-width: 2px; background: var(--mandarin-bg); }

  /* Summary stats */
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.75rem; margin-top: 1.25rem; }
  @media (max-width: 600px) { .stats { grid-template-columns: 1fr; } }
  .stat-box { text-align: center; padding: 0.75rem; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; }
  .stat-num { font-size: 1.3rem; font-weight: 800; color: var(--accent); }
  .stat-label { font-size: 0.72rem; color: var(--muted); }

  .note { font-size: 0.75rem; color: var(--muted); margin-top: 1rem; text-align: center; font-style: italic; }
</style>
</head>
<body>
<figure>
<div class="diagram-container">
  <div class="title">The Chinese Language Family</div>
  <div class="subtitle">Ten major groups — one writing system, many mutually unintelligible spoken languages</div>

  <div class="lang-grid">
    <div class="group-header">Mandarin Group (官话 Guānhuà)</div>
    <div class="lang-row mandarin-row">
      <div><div class="lang-name" style="color:var(--mandarin)">Mandarin</div><div class="lang-chinese">官话 Guānhuà</div></div>
      <div class="lang-pct" style="color:var(--mandarin)">65.7%</div>
      <div class="bar-container"><div class="bar-fill" style="width:65.7%;background:var(--mandarin)"><span class="bar-label">~920M</span></div></div>
      <div class="lang-region">North, SW, Central</div>
    </div>

    <div class="group-header">Non-Mandarin Chinese Languages</div>
    <div class="lang-row">
      <div><div class="lang-name" style="color:var(--min)">Min</div><div class="lang-chinese">闽语 Mǐnyǔ</div></div>
      <div class="lang-pct" style="color:var(--min)">6.2%</div>
      <div class="bar-container"><div class="bar-fill" style="width:37.5%;background:var(--min)"><span class="bar-label">~75M</span></div></div>
      <div class="lang-region">Fujian, Taiwan, Hainan</div>
    </div>
    <div class="lang-row">
      <div><div class="lang-name" style="color:var(--wu)">Wu</div><div class="lang-chinese">吴语 Wúyǔ</div></div>
      <div class="lang-pct" style="color:var(--wu)">6.1%</div>
      <div class="bar-container"><div class="bar-fill" style="width:36.9%;background:var(--wu)"><span class="bar-label">~80M</span></div></div>
      <div class="lang-region">Shanghai, Zhejiang</div>
    </div>
    <div class="lang-row">
      <div><div class="lang-name" style="color:var(--yue)">Yue (Cantonese)</div><div class="lang-chinese">粤语 Yuèyǔ</div></div>
      <div class="lang-pct" style="color:var(--yue)">5.6%</div>
      <div class="bar-container"><div class="bar-fill" style="width:34%;background:var(--yue)"><span class="bar-label">~85M</span></div></div>
      <div class="lang-region">Guangdong, HK, Macau</div>
    </div>
    <div class="lang-row">
      <div><div class="lang-name" style="color:var(--jin)">Jin</div><div class="lang-chinese">晋语 Jìnyǔ</div></div>
      <div class="lang-pct" style="color:var(--jin)">5.2%</div>
      <div class="bar-container"><div class="bar-fill" style="width:31.5%;background:var(--jin)"><span class="bar-label">~63M</span></div></div>
      <div class="lang-region">Shanxi</div>
    </div>
    <div class="lang-row">
      <div><div class="lang-name" style="color:var(--gan)">Gan</div><div class="lang-chinese">赣语 Gànyǔ</div></div>
      <div class="lang-pct" style="color:var(--gan)">3.9%</div>
      <div class="bar-container"><div class="bar-fill" style="width:23.6%;background:var(--gan)"><span class="bar-label">~48M</span></div></div>
      <div class="lang-region">Jiangxi</div>
    </div>
    <div class="lang-row">
      <div><div class="lang-name" style="color:var(--hakka)">Hakka</div><div class="lang-chinese">客家话 Kèjiāhuà</div></div>
      <div class="lang-pct" style="color:var(--hakka)">3.5%</div>
      <div class="bar-container"><div class="bar-fill" style="width:21.2%;background:var(--hakka)"><span class="bar-label">~47M</span></div></div>
      <div class="lang-region">Scattered (GD, FJ, TW)</div>
    </div>
    <div class="lang-row">
      <div><div class="lang-name" style="color:var(--xiang)">Xiang</div><div class="lang-chinese">湘语 Xiāngyǔ</div></div>
      <div class="lang-pct" style="color:var(--xiang)">3.0%</div>
      <div class="bar-container"><div class="bar-fill" style="width:18.2%;background:var(--xiang)"><span class="bar-label">~38M</span></div></div>
      <div class="lang-region">Hunan</div>
    </div>
    <div class="lang-row">
      <div><div class="lang-name" style="color:var(--other)">Huizhou + Pinghua</div><div class="lang-chinese">徽语 + 平话</div></div>
      <div class="lang-pct" style="color:var(--other)">0.9%</div>
      <div class="bar-container"><div class="bar-fill" style="width:5.5%;background:var(--other)"><span class="bar-label">~12M</span></div></div>
      <div class="lang-region">S. Anhui, Guangxi</div>
    </div>
  </div>

  <div class="stats">
    <div class="stat-box">
      <div class="stat-num">10</div>
      <div class="stat-label">Major language groups</div>
    </div>
    <div class="stat-box">
      <div class="stat-num">~300</div>
      <div class="stat-label">Distinct varieties</div>
    </div>
    <div class="stat-box">
      <div class="stat-num">0%</div>
      <div class="stat-label">Cross-group mutual intelligibility</div>
    </div>
  </div>

  <div class="note">Speaker counts are estimates. Mandarin and Cantonese are as mutually unintelligible as Portuguese and Romanian.</div>
</div>
<figcaption>The Sinitic branch: ten major language groups unified by script but separated by sound. Bar widths proportional within non-Mandarin groups.</figcaption>
</figure>
</body>
</html>
