<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ferguson's Diglossia Model Applied to China</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --accent: #06b6d4; --accent-dim: #0891b2;
    --supreme: #ef4444; --supreme-bg: #fef2f2;
    --high: #f59e0b; --high-bg: #fef3c7;
    --low: #6366f1; --low-bg: #eef2ff;
    --muted: #6c757d; --arrow: #94a3b8;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f172a; --fg: #e2e8f0; --surface: #1e293b; --border: #334155;
      --accent: #06b6d4; --accent-dim: #22d3ee;
      --supreme: #f87171; --supreme-bg: #3b1a1a;
      --high: #fbbf24; --high-bg: #4a3520;
      --low: #818cf8; --low-bg: #2e2e5a;
      --muted: #94a3b8; --arrow: #64748b;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--fg); display: flex; justify-content: center; padding: 2rem 1rem; line-height: 1.6; }
  figure { max-width: 960px; width: 100%; }
  figcaption { text-align: center; font-size: 0.82rem; color: var(--muted); margin-top: 1rem; font-style: italic; }
  .diagram-container { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 2rem 1.5rem; }
  .title { font-size: 1.15rem; font-weight: 700; text-align: center; margin-bottom: 0.25rem; }
  .subtitle { font-size: 0.85rem; color: var(--muted); text-align: center; margin-bottom: 1.5rem; }

  /* Two-column layout */
  .comparison { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 1.5rem; }
  @media (max-width: 700px) { .comparison { grid-template-columns: 1fr; } }

  .model { border: 1px solid var(--border); border-radius: 8px; padding: 1.25rem; background: var(--bg); }
  .model-label { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--accent); margin-bottom: 1rem; text-align: center; }

  /* Tier blocks */
  .tier { border-radius: 6px; padding: 0.75rem 1rem; margin-bottom: 0.5rem; border-left: 4px solid; position: relative; }
  .tier-s { background: var(--supreme-bg); border-left-color: var(--supreme); }
  .tier-h { background: var(--high-bg); border-left-color: var(--high); }
  .tier-l { background: var(--low-bg); border-left-color: var(--low); }
  .tier-tag { display: inline-block; font-size: 0.7rem; font-weight: 800; padding: 0.1rem 0.4rem; border-radius: 3px; margin-right: 0.5rem; color: #fff; vertical-align: middle; }
  .tag-s { background: var(--supreme); }
  .tag-h { background: var(--high); }
  .tag-l { background: var(--low); }
  .tier-name { font-weight: 700; font-size: 0.9rem; }
  .tier-desc { font-size: 0.78rem; color: var(--muted); margin-top: 0.25rem; }
  .tier-domains { display: flex; flex-wrap: wrap; gap: 0.3rem; margin-top: 0.4rem; }
  .domain-tag { font-size: 0.68rem; padding: 0.15rem 0.45rem; background: var(--surface); border: 1px solid var(--border); border-radius: 999px; color: var(--fg); }

  /* Arrow between tiers */
  .tier-arrow { text-align: center; color: var(--arrow); font-size: 0.75rem; margin: 0.25rem 0; }

  /* Historical timeline */
  .timeline { margin-top: 1.5rem; }
  .timeline-title { font-size: 0.9rem; font-weight: 700; margin-bottom: 0.75rem; border-left: 3px solid var(--accent); padding-left: 0.5rem; }
  .tl-row { display: grid; grid-template-columns: 120px 1fr; gap: 0.75rem; padding: 0.6rem 0; border-bottom: 1px solid var(--border); align-items: start; }
  .tl-row:last-child { border-bottom: none; }
  .tl-era { font-size: 0.78rem; font-weight: 700; color: var(--accent); }
  .tl-h { font-weight: 600; font-size: 0.82rem; }
  .tl-l { font-size: 0.75rem; color: var(--muted); }
  .tl-detail { font-size: 0.8rem; }

  /* Insight box */
  .insight { background: var(--bg); border: 1px solid var(--accent); border-radius: 6px; padding: 0.75rem 1rem; margin-top: 1.25rem; }
  .insight-label { font-size: 0.7rem; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.25rem; }
  .insight-text { font-size: 0.82rem; }
</style>
</head>
<body>
<figure>
<div class="diagram-container">
  <div class="title">Ferguson's Diglossia Model Applied to China</div>
  <div class="subtitle">From classical H/L split to Tsou's triglossic expansion</div>

  <div class="comparison">
    <!-- Ferguson's Original -->
    <div class="model">
      <div class="model-label">Ferguson (1959) — Classic Diglossia</div>
      <div class="tier tier-h">
        <span class="tier-tag tag-h">H</span>
        <span class="tier-name">High Variety</span>
        <div class="tier-desc">Formal, prestigious, codified</div>
        <div class="tier-domains">
          <span class="domain-tag">Education</span>
          <span class="domain-tag">Government</span>
          <span class="domain-tag">Literature</span>
          <span class="domain-tag">Religion</span>
          <span class="domain-tag">Media</span>
        </div>
      </div>
      <div class="tier-arrow">&#9660;</div>
      <div class="tier tier-l">
        <span class="tier-tag tag-l">L</span>
        <span class="tier-name">Low Variety</span>
        <div class="tier-desc">Informal, spoken, uncodified</div>
        <div class="tier-domains">
          <span class="domain-tag">Family</span>
          <span class="domain-tag">Friends</span>
          <span class="domain-tag">Market</span>
          <span class="domain-tag">Daily life</span>
        </div>
      </div>
      <div style="margin-top:0.75rem; font-size:0.75rem; color:var(--muted); text-align:center;">
        e.g., Literary Arabic (H) vs. Regional Arabic (L)
      </div>
    </div>

    <!-- Tsou's Triglossic Model -->
    <div class="model">
      <div class="model-label">Tsou (1980) — Chinese Triglossia</div>
      <div class="tier tier-s">
        <span class="tier-tag tag-s">S</span>
        <span class="tier-name">Supreme: Putonghua 普通话</span>
        <div class="tier-desc">National standard, lingua franca</div>
        <div class="tier-domains">
          <span class="domain-tag">National education</span>
          <span class="domain-tag">Government</span>
          <span class="domain-tag">National media</span>
          <span class="domain-tag">Cross-regional</span>
        </div>
      </div>
      <div class="tier-arrow">&#9660;</div>
      <div class="tier tier-h">
        <span class="tier-tag tag-h">H</span>
        <span class="tier-name">High: Regional Prestige Variety</span>
        <div class="tier-desc">e.g., Cantonese in Guangdong, Shanghainese in Shanghai</div>
        <div class="tier-domains">
          <span class="domain-tag">Local commerce</span>
          <span class="domain-tag">Local media</span>
          <span class="domain-tag">Community</span>
        </div>
      </div>
      <div class="tier-arrow">&#9660;</div>
      <div class="tier tier-l">
        <span class="tier-tag tag-l">L</span>
        <span class="tier-name">Low: Sub-regional / Rural Dialects</span>
        <div class="tier-desc">Village speech, intimate family language</div>
        <div class="tier-domains">
          <span class="domain-tag">Family</span>
          <span class="domain-tag">Village</span>
          <span class="domain-tag">Elderly</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Historical Shift Timeline -->
  <div class="timeline">
    <div class="timeline-title">Historical Shift in China's Diglossic Pattern</div>
    <div class="tl-row">
      <div class="tl-era">Pre-1900s</div>
      <div class="tl-detail">
        <div class="tl-h">Literary Chinese 文言 (H) vs. Regional Vernaculars (L)</div>
        <div class="tl-l">No national spoken standard. Writing and speech were completely separate systems.</div>
      </div>
    </div>
    <div class="tl-row">
      <div class="tl-era">1900s–1950s</div>
      <div class="tl-detail">
        <div class="tl-h">Guoyu 国语 movement begins. Vernacular writing 白话 replaces Literary Chinese.</div>
        <div class="tl-l">Transition period. Spoken standard not yet universally adopted.</div>
      </div>
    </div>
    <div class="tl-row">
      <div class="tl-era">1956–2000s</div>
      <div class="tl-detail">
        <div class="tl-h">Putonghua designated as standard (S). Aggressive promotion campaigns.</div>
        <div class="tl-l">Regional varieties begin declining as domains shift to Putonghua.</div>
      </div>
    </div>
    <div class="tl-row">
      <div class="tl-era">2010s–Now</div>
      <div class="tl-detail">
        <div class="tl-h">80.72% Putonghua penetration (2020). Regional Putonghua emerges as middle tier.</div>
        <div class="tl-l">Trajectory toward monoglossic future? Preservation efforts begin.</div>
      </div>
    </div>
  </div>

  <div class="insight">
    <div class="insight-label">Key Insight</div>
    <div class="insight-text">China's diglossia has <strong>morphed from a literary/vernacular split to a national/regional split</strong>. The H tier (regional prestige varieties) is being squeezed from above by Putonghua and losing ground as the L tier (rural dialects) loses speakers to urbanization. The current trajectory suggests movement toward a monoglossic future.</div>
  </div>
</div>
<figcaption>Ferguson's (1959) two-tier diglossia model vs. Tsou's (1980) three-tier expansion for China's sociolinguistic ecology</figcaption>
</figure>
</body>
</html>
