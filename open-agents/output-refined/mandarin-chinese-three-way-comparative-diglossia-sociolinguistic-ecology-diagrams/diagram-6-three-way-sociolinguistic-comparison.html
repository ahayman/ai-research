<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Three-Way Sociolinguistic Comparison</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --accent: #06b6d4;
    --china: #ef4444; --china-bg: #fef2f2;
    --english: #3b82f6; --english-bg: #eff6ff;
    --taiwan: #10b981; --taiwan-bg: #dcfce7;
    --muted: #6c757d;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f172a; --fg: #e2e8f0; --surface: #1e293b; --border: #334155;
      --china-bg: #3b1a1a; --english-bg: #1e3050; --taiwan-bg: #14352d;
      --muted: #94a3b8;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--fg); display: flex; justify-content: center; padding: 2rem 1rem; line-height: 1.6; }
  figure { max-width: 1000px; width: 100%; }
  figcaption { text-align: center; font-size: 0.82rem; color: var(--muted); margin-top: 1rem; font-style: italic; }
  .diagram-container { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 2rem 1.5rem; }
  .title { font-size: 1.15rem; font-weight: 700; text-align: center; margin-bottom: 0.25rem; }
  .subtitle { font-size: 0.85rem; color: var(--muted); text-align: center; margin-bottom: 1.5rem; }

  /* Headers row */
  .header-row { display: grid; grid-template-columns: 140px repeat(3, 1fr); gap: 0.5rem; margin-bottom: 0.5rem; }
  @media (max-width: 700px) { .header-row, .comp-row { grid-template-columns: 100px repeat(3, 1fr); } }
  .header-cell { text-align: center; font-weight: 700; font-size: 0.82rem; padding: 0.6rem 0.4rem; border-radius: 6px; }
  .header-cell.china-h { background: var(--china-bg); color: var(--china); border: 1px solid var(--china); }
  .header-cell.english-h { background: var(--english-bg); color: var(--english); border: 1px solid var(--english); }
  .header-cell.taiwan-h { background: var(--taiwan-bg); color: var(--taiwan); border: 1px solid var(--taiwan); }
  .header-label { font-size: 0.65rem; font-weight: 400; color: var(--muted); display: block; margin-top: 0.15rem; }

  /* Comparison rows */
  .comp-row { display: grid; grid-template-columns: 140px repeat(3, 1fr); gap: 0.5rem; margin-bottom: 0.35rem; align-items: stretch; }
  .dim-label { font-size: 0.78rem; font-weight: 700; display: flex; align-items: center; padding: 0.4rem; }
  .comp-cell { font-size: 0.75rem; padding: 0.5rem 0.6rem; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; display: flex; align-items: center; }
  .comp-cell strong { color: var(--fg); }

  /* Highlight rows */
  .comp-row.highlight .comp-cell { border-width: 1px; }
  .comp-row.highlight .china-c { border-color: var(--china); }
  .comp-row.highlight .english-c { border-color: var(--english); }
  .comp-row.highlight .taiwan-c { border-color: var(--taiwan); }

  /* Analogy section */
  .analogy { margin-top: 1.5rem; background: var(--bg); border: 2px solid var(--accent); border-radius: 8px; padding: 1rem 1.25rem; }
  .analogy-title { font-size: 0.8rem; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.5rem; }
  .analogy-text { font-size: 0.82rem; margin-bottom: 0.5rem; }
  .analogy-comparison { display: grid; grid-template-columns: 1fr 40px 1fr; gap: 0.5rem; align-items: center; }
  @media (max-width: 600px) { .analogy-comparison { grid-template-columns: 1fr; } .analogy-vs { display: none; } }
  .analogy-box { padding: 0.6rem; border-radius: 6px; text-align: center; font-size: 0.82rem; }
  .analogy-box.china-box { background: var(--china-bg); border: 1px solid var(--china); }
  .analogy-box.english-box { background: var(--english-bg); border: 1px solid var(--english); }
  .analogy-vs { text-align: center; font-weight: 700; font-size: 0.9rem; color: var(--muted); }
  .analogy-items { font-size: 0.75rem; color: var(--muted); margin-top: 0.25rem; }
</style>
</head>
<body>
<figure>
<div class="diagram-container">
  <div class="title">Three-Way Sociolinguistic Comparison</div>
  <div class="subtitle">Mainland China's diglossia vs. English global varieties vs. Taiwan's trilingualism</div>

  <div class="header-row">
    <div></div>
    <div class="header-cell china-h">Mainland China<span class="header-label">PRC Diglossia</span></div>
    <div class="header-cell english-h">English World<span class="header-label">Global Varieties</span></div>
    <div class="header-cell taiwan-h">Taiwan<span class="header-label">Trilingualism</span></div>
  </div>

  <div class="comp-row highlight">
    <div class="dim-label">Ecology type</div>
    <div class="comp-cell china-c"><strong>Imposed monoglossic convergence</strong></div>
    <div class="comp-cell english-c"><strong>Pluricentric polyglossic</strong></div>
    <div class="comp-cell taiwan-c"><strong>Legislated multilingualism</strong></div>
  </div>
  <div class="comp-row">
    <div class="dim-label">Standard variety</div>
    <div class="comp-cell china-c">Putonghua (sole official)</div>
    <div class="comp-cell english-c">Multiple standards (US, UK, AU...)</div>
    <div class="comp-cell taiwan-c">Mandarin (dominant) + others</div>
  </div>
  <div class="comp-row">
    <div class="dim-label">Internal diversity</div>
    <div class="comp-cell china-c">10 mutually unintelligible groups</div>
    <div class="comp-cell english-c">Many accents, mostly intelligible</div>
    <div class="comp-cell taiwan-c">3 Sinitic + 16 Austronesian</div>
  </div>
  <div class="comp-row highlight">
    <div class="dim-label">Mutual intelligibility</div>
    <div class="comp-cell china-c" style="color:var(--china)"><strong>~0% across groups</strong></div>
    <div class="comp-cell english-c" style="color:var(--english)"><strong>~95%+ across major varieties</strong></div>
    <div class="comp-cell taiwan-c" style="color:var(--taiwan)"><strong>~0% (Mandarin vs Hokkien)</strong></div>
  </div>
  <div class="comp-row">
    <div class="dim-label">Policy direction</div>
    <div class="comp-cell china-c">Convergence to one standard</div>
    <div class="comp-cell english-c">No central authority; laissez-faire</div>
    <div class="comp-cell taiwan-c">Active preservation of diversity</div>
  </div>
  <div class="comp-row">
    <div class="dim-label">Legal framework</div>
    <div class="comp-cell china-c">PTH is sole official language (2000 law)</div>
    <div class="comp-cell english-c">De facto standard per nation</div>
    <div class="comp-cell taiwan-c">All native languages = national (2019)</div>
  </div>
  <div class="comp-row">
    <div class="dim-label">Education policy</div>
    <div class="comp-cell china-c">Putonghua-only instruction</div>
    <div class="comp-cell english-c">Local variety as medium</div>
    <div class="comp-cell taiwan-c">Mandarin + compulsory local language</div>
  </div>
  <div class="comp-row highlight">
    <div class="dim-label">Endangerment risk</div>
    <div class="comp-cell china-c" style="color:var(--china)"><strong>High (regional languages declining)</strong></div>
    <div class="comp-cell english-c" style="color:var(--english)"><strong>Low (varieties have state support)</strong></div>
    <div class="comp-cell taiwan-c" style="color:var(--taiwan)"><strong>Medium (declining but revitalizing)</strong></div>
  </div>
  <div class="comp-row">
    <div class="dim-label">Political symbolism</div>
    <div class="comp-cell china-c">Unity through one language</div>
    <div class="comp-cell english-c">Each nation owns its variety</div>
    <div class="comp-cell taiwan-c">Democracy through pluralism</div>
  </div>
  <div class="comp-row">
    <div class="dim-label">Writing system role</div>
    <div class="comp-cell china-c">Shared script unifies despite spoken gap</div>
    <div class="comp-cell english-c">Same alphabet, minor spelling diffs</div>
    <div class="comp-cell taiwan-c">Shared script + romanization for Hokkien</div>
  </div>
  <div class="comp-row">
    <div class="dim-label">Code-switching</div>
    <div class="comp-cell china-c">PTH &#8596; dialect (domain-based)</div>
    <div class="comp-cell english-c">Register/accent shifting</div>
    <div class="comp-cell taiwan-c">Mandarin &#8596; Hokkien &#8596; Hakka</div>
  </div>

  <div class="analogy">
    <div class="analogy-title">The Analogy That Reveals the Gap</div>
    <div class="analogy-text">To understand China's linguistic diversity through English-speaker eyes:</div>
    <div class="analogy-comparison">
      <div class="analogy-box china-box">
        <strong style="color:var(--china)">China's Internal Diversity</strong>
        <div class="analogy-items">Like all Romance languages (French, Spanish, Portuguese, Italian, Romanian) in one country under one government</div>
      </div>
      <div class="analogy-vs">vs.</div>
      <div class="analogy-box english-box">
        <strong style="color:var(--english)">English Global Diversity</strong>
        <div class="analogy-items">Like different accents of the same language across separate sovereign nations</div>
      </div>
    </div>
  </div>
</div>
<figcaption>Three ecologies, three outcomes: China converges on one standard at the cost of diversity; English diversifies freely across nations; Taiwan reverses course to preserve plurality</figcaption>
</figure>
</body>
</html>
