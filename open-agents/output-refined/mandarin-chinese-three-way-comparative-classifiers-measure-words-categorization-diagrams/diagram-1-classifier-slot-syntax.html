<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Classifier Slot: Noun Phrase Syntax</title>
<style>
  :root {
    --bg: #0f172a; --fg: #e2e8f0; --surface: #1e293b; --border: #334155;
    --accent: #06b6d4; --accent-dim: #0891b2;
    --mandarin: #f59e0b; --mandarin-bg: rgba(245,158,11,0.12);
    --trad: #f43f5e; --trad-bg: rgba(244,63,94,0.1);
    --english: #8b5cf6; --english-bg: rgba(139,92,246,0.1);
    --cl: #06b6d4; --cl-bg: rgba(6,182,212,0.12);
    --num: #3b82f6; --num-bg: rgba(59,130,246,0.12);
    --noun: #10b981; --noun-bg: rgba(16,185,129,0.12);
    --dem: #f59e0b; --dem-bg: rgba(245,158,11,0.12);
    --muted: #64748b; --success: #4ade80; --error: #f87171;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg); color: var(--fg);
    display: flex; justify-content: center; padding: 1.5rem 1rem; line-height: 1.6;
  }
  figure { max-width: 900px; width: 100%; }
  figcaption { text-align: center; font-size: 0.8rem; color: var(--muted); margin-top: 1rem; font-style: italic; }
  .diagram-box {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 1.75rem 1.5rem; overflow-x: auto;
  }
  .title { font-size: 1.1rem; font-weight: 700; text-align: center; margin-bottom: 0.25rem; color: var(--accent); }
  .subtitle { font-size: 0.82rem; color: var(--muted); text-align: center; margin-bottom: 1.5rem; }
  .section-label {
    font-size: 0.78rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em;
    margin: 1.5rem 0 0.6rem; padding-left: 0.5rem; border-left: 3px solid var(--accent);
    color: var(--accent);
  }
  .section-label:first-of-type { margin-top: 0; }

  /* Template row */
  .template {
    display: flex; align-items: center; gap: 0.5rem; padding: 0.75rem 1rem;
    background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
    margin-bottom: 0.5rem; flex-wrap: wrap;
  }
  .template-lang {
    font-size: 0.72rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.06em; min-width: 80px;
  }
  .lang-zh { color: var(--mandarin); }
  .lang-cant { color: var(--trad); }
  .lang-en { color: var(--english); }
  .slot {
    padding: 0.35rem 0.65rem; border-radius: 5px; font-size: 0.85rem;
    font-weight: 600; text-align: center; border: 2px solid; white-space: nowrap;
  }
  .s-dem { background: var(--dem-bg); color: var(--dem); border-color: var(--dem); }
  .s-num { background: var(--num-bg); color: var(--num); border-color: var(--num); }
  .s-cl { background: var(--cl-bg); color: var(--cl); border-color: var(--cl); }
  .s-cl-req { background: var(--cl-bg); color: var(--cl); border-color: var(--cl); animation: pulse 2s infinite; }
  .s-cl-empty { background: transparent; color: var(--muted); border-color: var(--muted); border-style: dashed; opacity: 0.5; }
  .s-noun { background: var(--noun-bg); color: var(--noun); border-color: var(--noun); }
  .s-article { background: var(--english-bg); color: var(--english); border-color: var(--english); }
  .s-plural { background: rgba(168,85,247,0.1); color: #a855f7; border-color: #a855f7; }
  .arrow { color: var(--muted); font-size: 0.85rem; }
  .result { font-size: 0.82rem; color: var(--muted); margin-left: 0.25rem; }
  .status { font-weight: 700; font-size: 0.78rem; }
  .ok { color: var(--success); }
  .err { color: var(--error); text-decoration: line-through; }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(6,182,212,0.3); }
    50% { box-shadow: 0 0 8px 2px rgba(6,182,212,0.3); }
  }

  /* Example grid */
  .ex-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; margin-top: 0.5rem; }
  .ex-card {
    padding: 0.6rem 0.8rem; border-radius: 6px; border: 1px solid var(--border);
    background: var(--bg);
  }
  .ex-card.zh { border-left: 3px solid var(--mandarin); }
  .ex-card.cant { border-left: 3px solid var(--trad); }
  .ex-card.en { border-left: 3px solid var(--english); }
  .ex-main { font-size: 1.05rem; font-weight: 600; }
  .ex-py { font-size: 0.75rem; color: var(--muted); font-style: italic; }
  .ex-gloss { font-size: 0.8rem; color: var(--fg); margin-top: 0.15rem; }
  .ex-note { font-size: 0.72rem; color: var(--muted); margin-top: 0.2rem; }
  .hl-cl { color: var(--cl); font-weight: 700; }
  .hl-num { color: var(--num); font-weight: 700; }
  .hl-noun { color: var(--noun); font-weight: 700; }

  /* Contrast box */
  .contrast {
    margin-top: 1rem; padding: 1rem; background: var(--bg);
    border: 2px dashed var(--accent); border-radius: 8px;
  }
  .contrast-title { font-weight: 700; color: var(--accent); font-size: 0.85rem; margin-bottom: 0.5rem; }
  .contrast-row {
    display: grid; grid-template-columns: 1fr auto 1fr; gap: 0.75rem;
    align-items: center; margin-bottom: 0.35rem; font-size: 0.82rem;
  }
  .contrast-vs { color: var(--muted); font-weight: 600; text-align: center; }

  @media (max-width: 600px) {
    .ex-grid { grid-template-columns: 1fr; }
    .template { padding: 0.5rem 0.6rem; }
    .template-lang { min-width: 60px; font-size: 0.68rem; }
    .slot { font-size: 0.78rem; padding: 0.3rem 0.5rem; }
    .contrast-row { grid-template-columns: 1fr; gap: 0.25rem; }
  }
</style>
</head>
<body>
<figure>
<div class="diagram-box">
  <div class="title">The Classifier Slot: Noun Phrase Syntax</div>
  <div class="subtitle">Mandarin requires a classifier between every numeral/demonstrative and noun</div>

  <div class="section-label">Core Template: Numeral + Classifier + Noun</div>

  <div class="template">
    <span class="template-lang lang-zh">Mandarin</span>
    <span class="slot s-num">Num</span>
    <span class="arrow">+</span>
    <span class="slot s-cl-req">CL</span>
    <span class="arrow">+</span>
    <span class="slot s-noun">N</span>
    <span class="arrow">=</span>
    <span class="result"><span class="hl-num">三</span><span class="hl-cl">本</span><span class="hl-noun">书</span> "three books"</span>
  </div>

  <div class="template">
    <span class="template-lang lang-en">English</span>
    <span class="slot s-num">Num</span>
    <span class="arrow">+</span>
    <span class="slot s-cl-empty">(CL)</span>
    <span class="arrow">+</span>
    <span class="slot s-noun">N</span>
    <span class="arrow">=</span>
    <span class="result">"three books" <span class="ok">(no classifier needed)</span></span>
  </div>

  <div class="section-label">Demonstrative + Classifier + Noun</div>

  <div class="template">
    <span class="template-lang lang-zh">Mandarin</span>
    <span class="slot s-dem">Dem</span>
    <span class="arrow">+</span>
    <span class="slot s-cl-req">CL</span>
    <span class="arrow">+</span>
    <span class="slot s-noun">N</span>
    <span class="arrow">=</span>
    <span class="result"><span style="color:var(--dem)">这</span><span class="hl-cl">本</span><span class="hl-noun">书</span> "this book"</span>
  </div>

  <div class="template">
    <span class="template-lang lang-cant">Cantonese</span>
    <span class="slot s-cl-req">CL</span>
    <span class="arrow">+</span>
    <span class="slot s-noun">N</span>
    <span class="arrow">=</span>
    <span class="result"><span class="hl-cl">本</span><span class="hl-noun">書</span> "the book" <span style="color:var(--trad)">(bare CL = definite!)</span></span>
  </div>

  <div class="template">
    <span class="template-lang lang-en">English</span>
    <span class="slot s-article">Art</span>
    <span class="arrow">+</span>
    <span class="slot s-cl-empty">(CL)</span>
    <span class="arrow">+</span>
    <span class="slot s-noun">N</span>
    <span class="arrow">=</span>
    <span class="result">"this book" / "the book"</span>
  </div>

  <div class="section-label">Full Noun Phrase: Dem + Num + CL + N</div>

  <div class="template">
    <span class="template-lang lang-zh">Mandarin</span>
    <span class="slot s-dem">这 zhè</span>
    <span class="arrow">+</span>
    <span class="slot s-num">三 sān</span>
    <span class="arrow">+</span>
    <span class="slot s-cl-req">本 běn</span>
    <span class="arrow">+</span>
    <span class="slot s-noun">书 shū</span>
    <span class="arrow">=</span>
    <span class="result">"these three books"</span>
  </div>

  <div class="section-label">What Happens Without the Classifier?</div>

  <div class="ex-grid">
    <div class="ex-card zh">
      <div class="ex-main"><span class="ok">&#10003;</span> 三<span class="hl-cl">本</span>书</div>
      <div class="ex-py">sān <em>běn</em> shū</div>
      <div class="ex-gloss">"three [CL:volume] books"</div>
      <div class="ex-note">Grammatical: classifier present</div>
    </div>
    <div class="ex-card zh">
      <div class="ex-main"><span class="err">&#10007; *三书</span></div>
      <div class="ex-py">*sān shū</div>
      <div class="ex-gloss">"three books" (no classifier)</div>
      <div class="ex-note" style="color:var(--error)">Ungrammatical in Mandarin!</div>
    </div>
    <div class="ex-card en">
      <div class="ex-main" style="color:var(--english)"><span class="ok">&#10003;</span> three books</div>
      <div class="ex-gloss">Num + N directly</div>
      <div class="ex-note">Grammatical: English needs no classifier</div>
    </div>
    <div class="ex-card en">
      <div class="ex-main" style="color:var(--english)"><span class="ok">&#10003;</span> three cups of water</div>
      <div class="ex-gloss">Num + Measure + N</div>
      <div class="ex-note">English uses measure words for mass nouns only</div>
    </div>
  </div>

  <div class="contrast">
    <div class="contrast-title">Three-Way Comparison: How Each System Marks "Three Books"</div>
    <div class="contrast-row">
      <div><strong style="color:var(--mandarin)">Mandarin:</strong> 三<span class="hl-cl">本</span>书</div>
      <div class="contrast-vs">Num+<strong>CL</strong>+N</div>
      <div style="color:var(--muted)">Classifier REQUIRED</div>
    </div>
    <div class="contrast-row">
      <div><strong style="color:var(--trad)">Cantonese:</strong> 三<span class="hl-cl">本</span>書</div>
      <div class="contrast-vs">Num+<strong>CL</strong>+N</div>
      <div style="color:var(--muted)">Classifier also required</div>
    </div>
    <div class="contrast-row">
      <div><strong style="color:var(--english)">English:</strong> three book<span style="color:#a855f7;font-weight:700">s</span></div>
      <div class="contrast-vs">Num+N+<strong>pl</strong></div>
      <div style="color:var(--muted)">No classifier; plural suffix instead</div>
    </div>
  </div>
</div>
<figcaption>Diagram 1 &mdash; The classifier occupies a mandatory syntactic slot in Mandarin that English fills with nothing (for count nouns) and Cantonese can use alone for definiteness.</figcaption>
</figure>
</body>
</html>
