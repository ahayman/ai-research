<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mandarin Obligatory vs. English Optional: Classifier Comparison</title>
<style>
  :root {
    --bg: #0f172a; --fg: #e2e8f0; --surface: #1e293b; --border: #334155;
    --accent: #06b6d4; --muted: #64748b;
    --mandarin: #f59e0b; --mandarin-bg: rgba(245,158,11,0.08);
    --english: #8b5cf6; --english-bg: rgba(139,92,246,0.08);
    --cantonese: #f43f5e; --cantonese-bg: rgba(244,63,94,0.08);
    --shared: #10b981; --shared-bg: rgba(16,185,129,0.08);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg); color: var(--fg);
    display: flex; justify-content: center; padding: 1.5rem 1rem; line-height: 1.6;
  }
  figure { max-width: 940px; width: 100%; }
  figcaption { text-align: center; font-size: 0.8rem; color: var(--muted); margin-top: 1rem; font-style: italic; }
  .diagram-box {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 1.75rem 1.5rem;
  }
  .title { font-size: 1.1rem; font-weight: 700; text-align: center; margin-bottom: 0.25rem; color: var(--accent); }
  .subtitle { font-size: 0.82rem; color: var(--muted); text-align: center; margin-bottom: 1.5rem; }

  .section-label {
    font-size: 0.78rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em;
    margin: 1.5rem 0 0.6rem; padding-left: 0.5rem;
    color: var(--accent); border-left: 3px solid var(--accent);
  }
  .section-label:first-of-type { margin-top: 0; }

  /* Comparison table */
  .cmp-table { width: 100%; border-collapse: collapse; margin-bottom: 1rem; }
  .cmp-table th {
    text-align: left; padding: 0.55rem 0.75rem; font-size: 0.72rem;
    text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted);
    border-bottom: 2px solid var(--border); font-weight: 700;
  }
  .cmp-table td { padding: 0.55rem 0.75rem; border-bottom: 1px solid var(--border); font-size: 0.85rem; vertical-align: top; }
  .cmp-table tr:last-child td { border-bottom: none; }
  .cmp-table tr:hover td { background: rgba(6,182,212,0.03); }
  .th-feat { width: 200px; }
  .th-zh { color: var(--mandarin); }
  .th-en { color: var(--english); }
  .zh-cell { color: var(--fg); }
  .en-cell { color: var(--fg); }
  .status-req { font-weight: 700; color: var(--mandarin); }
  .status-opt { font-weight: 700; color: var(--english); }
  .status-no { color: var(--muted); }

  /* Side-by-side examples */
  .parallel-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-top: 0.5rem; }
  .par-card {
    padding: 0.85rem 1rem; background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; border-top: 3px solid;
  }
  .par-card.zh { border-top-color: var(--mandarin); }
  .par-card.en { border-top-color: var(--english); }
  .par-card.cant { border-top-color: var(--cantonese); }
  .par-lang { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.5rem; }
  .par-lang.zh { color: var(--mandarin); }
  .par-lang.en { color: var(--english); }
  .par-lang.cant { color: var(--cantonese); }

  .par-ex { margin-bottom: 0.5rem; }
  .par-ex:last-child { margin-bottom: 0; }
  .par-label { font-size: 0.72rem; color: var(--muted); font-weight: 600; margin-bottom: 0.15rem; }
  .par-text { font-size: 0.9rem; }
  .par-text .hl-cl { color: var(--accent); font-weight: 700; }
  .par-text .hl-mw { color: var(--english); font-weight: 700; }
  .par-gloss { font-size: 0.75rem; color: var(--muted); font-style: italic; }
  .par-note { font-size: 0.72rem; color: var(--muted); margin-top: 0.25rem; }

  /* Overlap section */
  .overlap-area {
    margin-top: 1.25rem; padding: 1rem;
    background: rgba(16,185,129,0.04); border: 1px solid rgba(16,185,129,0.2);
    border-radius: 8px;
  }
  .overlap-title { font-weight: 700; color: var(--shared); font-size: 0.88rem; margin-bottom: 0.75rem; }
  .overlap-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.75rem; }
  .overlap-item {
    padding: 0.6rem 0.75rem; background: var(--bg); border-radius: 6px;
    border: 1px solid var(--border); font-size: 0.8rem;
  }
  .overlap-en { font-weight: 600; color: var(--english); margin-bottom: 0.15rem; }
  .overlap-zh { margin-bottom: 0.15rem; }
  .overlap-zh .zh { font-weight: 600; color: var(--mandarin); }
  .overlap-note { font-size: 0.72rem; color: var(--muted); }

  /* Key insight */
  .insight {
    margin-top: 1.25rem; padding: 0.85rem 1rem;
    background: rgba(6,182,212,0.06); border: 1px solid rgba(6,182,212,0.2);
    border-radius: 8px; font-size: 0.82rem;
  }
  .insight strong { color: var(--accent); }

  @media (max-width: 700px) {
    .parallel-grid { grid-template-columns: 1fr; }
    .overlap-grid { grid-template-columns: 1fr; }
    .cmp-table { font-size: 0.78rem; }
    .cmp-table th, .cmp-table td { padding: 0.4rem 0.5rem; }
  }
</style>
</head>
<body>
<figure>
<div class="diagram-box">
  <div class="title">Mandarin Obligatory vs. English Optional</div>
  <div class="subtitle">Three-way comparison of how each language handles noun quantification</div>

  <div class="section-label">Feature Comparison Matrix</div>
  <table class="cmp-table">
    <thead>
      <tr>
        <th class="th-feat">Feature</th>
        <th class="th-zh">Mandarin</th>
        <th class="th-en">English</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td><strong>Classifier with count nouns?</strong></td>
        <td class="zh-cell"><span class="status-req">OBLIGATORY</span><br>三<strong style="color:var(--accent)">本</strong>书 "three CL book"</td>
        <td class="en-cell"><span class="status-no">Not used</span><br>"three books" (Num + N directly)</td>
      </tr>
      <tr>
        <td><strong>Measure word with mass nouns?</strong></td>
        <td class="zh-cell"><span class="status-req">OBLIGATORY</span><br>三<strong style="color:var(--accent)">杯</strong>水 "three CL:cup water"</td>
        <td class="en-cell"><span class="status-req">REQUIRED</span><br>"three <strong style="color:var(--english)">cups of</strong> water"</td>
      </tr>
      <tr>
        <td><strong>Plural morphology?</strong></td>
        <td class="zh-cell"><span class="status-no">None</span><br>书 = book/books (context decides)</td>
        <td class="en-cell"><span class="status-req">OBLIGATORY</span><br>book &rarr; book<strong style="color:var(--english)">s</strong></td>
      </tr>
      <tr>
        <td><strong>Articles (a/the)?</strong></td>
        <td class="zh-cell"><span class="status-no">None</span><br>Definiteness via context / demonstratives</td>
        <td class="en-cell"><span class="status-req">OBLIGATORY</span><br><strong style="color:var(--english)">a</strong> book / <strong style="color:var(--english)">the</strong> book</td>
      </tr>
      <tr>
        <td><strong>Shape/animacy encoded?</strong></td>
        <td class="zh-cell"><span class="status-req">In the grammar</span><br>Classifier reveals shape, animacy, function</td>
        <td class="en-cell"><span class="status-opt">In the lexicon only</span><br>Optional: "a sheet of," "a head of"</td>
      </tr>
      <tr>
        <td><strong>Bare nouns allowed?</strong></td>
        <td class="zh-cell"><span style="color:var(--mandarin);font-weight:700">YES</span><br>书很贵 "Books are expensive" (generic)</td>
        <td class="en-cell"><span class="status-opt">Limited</span><br>Requires article or plural: "Books are..."</td>
      </tr>
    </tbody>
  </table>

  <div class="section-label">Parallel Examples: Count Noun, Mass Noun, Collective Noun</div>
  <div class="parallel-grid">
    <div class="par-card zh">
      <div class="par-lang zh">Mandarin</div>
      <div class="par-ex">
        <div class="par-label">Count Noun (book)</div>
        <div class="par-text">三<span class="hl-cl">本</span>书</div>
        <div class="par-gloss">three CL:volume book</div>
        <div class="par-note">Classifier mandatory &mdash; encodes "bound volume"</div>
      </div>
      <div class="par-ex">
        <div class="par-label">Mass Noun (water)</div>
        <div class="par-text">三<span class="hl-cl">杯</span>水</div>
        <div class="par-gloss">three CL:cup water</div>
        <div class="par-note">Mensural classifier &mdash; same slot as sortal CL</div>
      </div>
      <div class="par-ex">
        <div class="par-label">Collective (birds)</div>
        <div class="par-text">一<span class="hl-cl">群</span>鸟</div>
        <div class="par-gloss">one CL:flock bird</div>
        <div class="par-note">Collective classifier &mdash; same obligatory slot</div>
      </div>
    </div>

    <div class="par-card en">
      <div class="par-lang en">English</div>
      <div class="par-ex">
        <div class="par-label">Count Noun (book)</div>
        <div class="par-text">three books</div>
        <div class="par-gloss">&mdash;</div>
        <div class="par-note">No classifier needed &mdash; plural -s marks countability</div>
      </div>
      <div class="par-ex">
        <div class="par-label">Mass Noun (water)</div>
        <div class="par-text">three <span class="hl-mw">cups of</span> water</div>
        <div class="par-gloss">&mdash;</div>
        <div class="par-note">Measure phrase required &mdash; parallels Mandarin here</div>
      </div>
      <div class="par-ex">
        <div class="par-label">Collective (birds)</div>
        <div class="par-text">a <span class="hl-mw">flock of</span> birds</div>
        <div class="par-gloss">&mdash;</div>
        <div class="par-note">Collective noun optional; "many birds" also works</div>
      </div>
    </div>
  </div>

  <div class="overlap-area">
    <div class="overlap-title">Where English and Mandarin Overlap: Mensural Measure Words</div>
    <div class="overlap-grid">
      <div class="overlap-item">
        <div class="overlap-en">a cup of coffee</div>
        <div class="overlap-zh"><span class="zh">一杯咖啡</span></div>
        <div class="overlap-note">Both use container-based measure</div>
      </div>
      <div class="overlap-item">
        <div class="overlap-en">a bottle of wine</div>
        <div class="overlap-zh"><span class="zh">一瓶酒</span></div>
        <div class="overlap-note">Both use container-based measure</div>
      </div>
      <div class="overlap-item">
        <div class="overlap-en">a piece of paper</div>
        <div class="overlap-zh"><span class="zh">一张纸</span></div>
        <div class="overlap-note">English: optional portion; Mandarin: shape-CL</div>
      </div>
      <div class="overlap-item">
        <div class="overlap-en">a slice of bread</div>
        <div class="overlap-zh"><span class="zh">一片面包</span></div>
        <div class="overlap-note">Both: portion-based partitioning</div>
      </div>
      <div class="overlap-item">
        <div class="overlap-en">a head of cattle</div>
        <div class="overlap-zh"><span class="zh">一头牛</span></div>
        <div class="overlap-note">English fossil parallels Mandarin animal CL</div>
      </div>
      <div class="overlap-item">
        <div class="overlap-en">a pair of shoes</div>
        <div class="overlap-zh"><span class="zh">一双鞋</span></div>
        <div class="overlap-note">Both: paired-set quantification</div>
      </div>
    </div>
  </div>

  <div class="insight">
    <strong>Key Insight:</strong> English and Mandarin are not binary opposites. English has measure-word-like expressions that parallel Mandarin's <em>mensural</em> classifiers (杯, 瓶, 片). What English completely lacks is Mandarin's <em>sortal</em> classifiers &mdash; the mandatory encoding of shape, animacy, and function (本, 条, 只, 张) for ordinary count nouns. This is the true typological divide.
  </div>
</div>
<figcaption>Diagram 6 &mdash; English and Mandarin overlap in mensural measure words (cups, bottles, slices) but diverge completely in sortal classifiers. Mandarin grammaticalizes physical perception; English leaves it lexically optional.</figcaption>
</figure>
</body>
</html>
