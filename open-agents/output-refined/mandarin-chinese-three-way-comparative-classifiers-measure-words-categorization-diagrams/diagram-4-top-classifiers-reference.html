<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Top 20 Most Common Classifiers</title>
<style>
  :root {
    --bg: #0f172a; --fg: #e2e8f0; --surface: #1e293b; --border: #334155;
    --accent: #06b6d4; --muted: #64748b;
    --general: #10b981; --animal: #f43f5e; --shape: #3b82f6;
    --function: #f59e0b; --mensural: #8b5cf6; --person: #ec4899;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg); color: var(--fg);
    display: flex; justify-content: center; padding: 1.5rem 1rem; line-height: 1.6;
  }
  figure { max-width: 960px; width: 100%; }
  figcaption { text-align: center; font-size: 0.8rem; color: var(--muted); margin-top: 1rem; font-style: italic; }
  .diagram-box {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 1.75rem 1.5rem; overflow-x: auto;
  }
  .title { font-size: 1.1rem; font-weight: 700; text-align: center; margin-bottom: 0.25rem; color: var(--accent); }
  .subtitle { font-size: 0.82rem; color: var(--muted); text-align: center; margin-bottom: 1rem; }

  /* Legend */
  .legend { display: flex; flex-wrap: wrap; gap: 0.5rem; justify-content: center; margin-bottom: 1.25rem; }
  .legend-item { display: flex; align-items: center; gap: 0.3rem; font-size: 0.72rem; }
  .legend-dot { width: 10px; height: 10px; border-radius: 3px; }

  /* Table */
  .cl-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  .cl-table th {
    text-align: left; padding: 0.5rem 0.6rem; font-size: 0.72rem;
    text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted);
    border-bottom: 2px solid var(--border); font-weight: 700;
  }
  .cl-table td { padding: 0.5rem 0.6rem; border-bottom: 1px solid var(--border); vertical-align: middle; }
  .cl-table tr:hover td { background: rgba(6,182,212,0.04); }
  .cl-table tr:last-child td { border-bottom: none; }

  .rank { font-weight: 700; color: var(--muted); font-size: 0.78rem; text-align: center; width: 30px; }
  .rank-top { color: var(--accent); font-size: 0.85rem; }
  .cl-char { font-size: 1.3rem; font-weight: 700; }
  .cl-pinyin { font-size: 0.78rem; color: var(--muted); font-style: italic; }
  .cl-domain { font-size: 0.82rem; }
  .cl-example { font-size: 0.8rem; color: var(--muted); }
  .cl-example .zh { color: var(--fg); font-weight: 500; }

  .cat-tag {
    font-size: 0.68rem; font-weight: 600; padding: 0.15rem 0.4rem;
    border-radius: 3px; white-space: nowrap; display: inline-block;
  }
  .cat-general { background: rgba(16,185,129,0.15); color: var(--general); }
  .cat-animal { background: rgba(244,63,94,0.12); color: var(--animal); }
  .cat-shape { background: rgba(59,130,246,0.12); color: var(--shape); }
  .cat-function { background: rgba(245,158,11,0.12); color: var(--function); }
  .cat-mensural { background: rgba(139,92,246,0.12); color: var(--mensural); }
  .cat-person { background: rgba(236,72,153,0.12); color: var(--person); }

  .freq-bar-cell { width: 100px; }
  .freq-bar-wrap { height: 6px; background: rgba(255,255,255,0.05); border-radius: 3px; overflow: hidden; }
  .freq-bar-fill { height: 100%; border-radius: 3px; background: var(--accent); }

  @media (max-width: 700px) {
    .cl-table { font-size: 0.78rem; }
    .cl-char { font-size: 1.1rem; }
    .freq-bar-cell { display: none; }
    th:last-child, td:last-child { display: none; }
  }
</style>
</head>
<body>
<figure>
<div class="diagram-box">
  <div class="title">Top 20 Most Common Mandarin Classifiers</div>
  <div class="subtitle">Quick reference card ordered by approximate frequency in spoken Mandarin</div>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:var(--general)"></div> General</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--shape)"></div> Shape</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--function)"></div> Function</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--animal)"></div> Animal</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--person)"></div> Person</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--mensural)"></div> Mensural</div>
  </div>

  <table class="cl-table">
    <thead>
      <tr><th>#</th><th>CL</th><th></th><th>Category</th><th>Primary Domain</th><th>Example</th><th class="freq-bar-cell">Rel. Freq</th></tr>
    </thead>
    <tbody>
      <tr><td class="rank rank-top">1</td><td><span class="cl-char" style="color:var(--general)">个</span></td><td class="cl-pinyin">ge</td><td><span class="cat-tag cat-general">General</span></td><td class="cl-domain">Default / universal fallback</td><td class="cl-example"><span class="zh">一个人</span> a person</td><td class="freq-bar-cell"><div class="freq-bar-wrap"><div class="freq-bar-fill" style="width:100%;background:var(--general)"></div></div></td></tr>
      <tr><td class="rank">2</td><td><span class="cl-char" style="color:var(--animal)">只</span></td><td class="cl-pinyin">zhi</td><td><span class="cat-tag cat-animal">Animal</span></td><td class="cl-domain">Small animals, birds, one of pair</td><td class="cl-example"><span class="zh">一只猫</span> a cat</td><td class="freq-bar-cell"><div class="freq-bar-wrap"><div class="freq-bar-fill" style="width:18%;background:var(--animal)"></div></div></td></tr>
      <tr><td class="rank">3</td><td><span class="cl-char" style="color:var(--shape)">条</span></td><td class="cl-pinyin">tiao</td><td><span class="cat-tag cat-shape">Shape</span></td><td class="cl-domain">Long, flexible: roads, fish, rivers</td><td class="cl-example"><span class="zh">一条鱼</span> a fish</td><td class="freq-bar-cell"><div class="freq-bar-wrap"><div class="freq-bar-fill" style="width:14%;background:var(--shape)"></div></div></td></tr>
      <tr><td class="rank">4</td><td><span class="cl-char" style="color:var(--function)">本</span></td><td class="cl-pinyin">ben</td><td><span class="cat-tag cat-function">Function</span></td><td class="cl-domain">Bound volumes: books, magazines</td><td class="cl-example"><span class="zh">一本书</span> a book</td><td class="freq-bar-cell"><div class="freq-bar-wrap"><div class="freq-bar-fill" style="width:12%;background:var(--function)"></div></div></td></tr>
      <tr><td class="rank">5</td><td><span class="cl-char" style="color:var(--shape)">张</span></td><td class="cl-pinyin">zhang</td><td><span class="cat-tag cat-shape">Shape</span></td><td class="cl-domain">Flat surfaces: paper, tables, tickets</td><td class="cl-example"><span class="zh">一张纸</span> a sheet of paper</td><td class="freq-bar-cell"><div class="freq-bar-wrap"><div class="freq-bar-fill" style="width:11%;background:var(--shape)"></div></div></td></tr>
      <tr><td class="rank">6</td><td><span class="cl-char" style="color:var(--shape)">把</span></td><td class="cl-pinyin">ba</td><td><span class="cat-tag cat-shape">Shape</span></td><td class="cl-domain">Handled objects, handfuls</td><td class="cl-example"><span class="zh">一把刀</span> a knife</td><td class="freq-bar-cell"><div class="freq-bar-wrap"><div class="freq-bar-fill" style="width:9%;background:var(--shape)"></div></div></td></tr>
      <tr><td class="rank">7</td><td><span class="cl-char" style="color:var(--shape)">块</span></td><td class="cl-pinyin">kuai</td><td><span class="cat-tag cat-shape">Shape</span></td><td class="cl-domain">Chunks, pieces; also money (slang)</td><td class="cl-example"><span class="zh">一块肉</span> a piece of meat</td><td class="freq-bar-cell"><div class="freq-bar-wrap"><div class="freq-bar-fill" style="width:8%;background:var(--shape)"></div></div></td></tr>
      <tr><td class="rank">8</td><td><span class="cl-char" style="color:var(--function)">件</span></td><td class="cl-pinyin">jian</td><td><span class="cat-tag cat-function">Function</span></td><td class="cl-domain">Garments, matters, luggage items</td><td class="cl-example"><span class="zh">一件衣服</span> a garment</td><td class="freq-bar-cell"><div class="freq-bar-wrap"><div class="freq-bar-fill" style="width:7%;background:var(--function)"></div></div></td></tr>
      <tr><td class="rank">9</td><td><span class="cl-char" style="color:var(--person)">位</span></td><td class="cl-pinyin">wei</td><td><span class="cat-tag cat-person">Person</span></td><td class="cl-domain">Persons (respectful/formal)</td><td class="cl-example"><span class="zh">一位老师</span> a teacher</td><td class="freq-bar-cell"><div class="freq-bar-wrap"><div class="freq-bar-fill" style="width:6%;background:var(--person)"></div></div></td></tr>
      <tr><td class="rank">10</td><td><span class="cl-char" style="color:var(--function)">辆</span></td><td class="cl-pinyin">liang</td><td><span class="cat-tag cat-function">Function</span></td><td class="cl-domain">Vehicles: cars, bicycles, buses</td><td class="cl-example"><span class="zh">一辆车</span> a vehicle</td><td class="freq-bar-cell"><div class="freq-bar-wrap"><div class="freq-bar-fill" style="width:5.5%;background:var(--function)"></div></div></td></tr>
      <tr><td class="rank">11</td><td><span class="cl-char" style="color:var(--function)">双</span></td><td class="cl-pinyin">shuang</td><td><span class="cat-tag cat-function">Function</span></td><td class="cl-domain">Symmetrical pairs: shoes, eyes</td><td class="cl-example"><span class="zh">一双鞋</span> a pair of shoes</td><td class="freq-bar-cell"><div class="freq-bar-wrap"><div class="freq-bar-fill" style="width:5%;background:var(--function)"></div></div></td></tr>
      <tr><td class="rank">12</td><td><span class="cl-char" style="color:var(--shape)">根</span></td><td class="cl-pinyin">gen</td><td><span class="cat-tag cat-shape">Shape</span></td><td class="cl-domain">Long & rigid: sticks, chopsticks</td><td class="cl-example"><span class="zh">一根筷子</span> a chopstick</td><td class="freq-bar-cell"><div class="freq-bar-wrap"><div class="freq-bar-fill" style="width:4.5%;background:var(--shape)"></div></div></td></tr>
      <tr><td class="rank">13</td><td><span class="cl-char" style="color:var(--shape)">颗</span></td><td class="cl-pinyin">ke</td><td><span class="cat-tag cat-shape">Shape</span></td><td class="cl-domain">Small & round: stars, pearls, teeth</td><td class="cl-example"><span class="zh">一颗星</span> a star</td><td class="freq-bar-cell"><div class="freq-bar-wrap"><div class="freq-bar-fill" style="width:4%;background:var(--shape)"></div></div></td></tr>
      <tr><td class="rank">14</td><td><span class="cl-char" style="color:var(--shape)">片</span></td><td class="cl-pinyin">pian</td><td><span class="cat-tag cat-shape">Shape</span></td><td class="cl-domain">Flat slices, expanses, areas</td><td class="cl-example"><span class="zh">一片叶子</span> a leaf</td><td class="freq-bar-cell"><div class="freq-bar-wrap"><div class="freq-bar-fill" style="width:3.5%;background:var(--shape)"></div></div></td></tr>
      <tr><td class="rank">15</td><td><span class="cl-char" style="color:var(--mensural)">杯</span></td><td class="cl-pinyin">bei</td><td><span class="cat-tag cat-mensural">Mensural</span></td><td class="cl-domain">Cup/glass (container measure)</td><td class="cl-example"><span class="zh">一杯水</span> a cup of water</td><td class="freq-bar-cell"><div class="freq-bar-wrap"><div class="freq-bar-fill" style="width:3%;background:var(--mensural)"></div></div></td></tr>
      <tr><td class="rank">16</td><td><span class="cl-char" style="color:var(--function)">座</span></td><td class="cl-pinyin">zuo</td><td><span class="cat-tag cat-function">Function</span></td><td class="cl-domain">Large fixed structures, mountains</td><td class="cl-example"><span class="zh">一座桥</span> a bridge</td><td class="freq-bar-cell"><div class="freq-bar-wrap"><div class="freq-bar-fill" style="width:2.8%;background:var(--function)"></div></div></td></tr>
      <tr><td class="rank">17</td><td><span class="cl-char" style="color:var(--function)">台</span></td><td class="cl-pinyin">tai</td><td><span class="cat-tag cat-function">Function</span></td><td class="cl-domain">Machines, performances, stages</td><td class="cl-example"><span class="zh">一台电脑</span> a computer</td><td class="freq-bar-cell"><div class="freq-bar-wrap"><div class="freq-bar-fill" style="width:2.5%;background:var(--function)"></div></div></td></tr>
      <tr><td class="rank">18</td><td><span class="cl-char" style="color:var(--shape)">支</span></td><td class="cl-pinyin">zhi</td><td><span class="cat-tag cat-shape">Shape</span></td><td class="cl-domain">Stick-like: pens, rifles, songs</td><td class="cl-example"><span class="zh">一支笔</span> a pen</td><td class="freq-bar-cell"><div class="freq-bar-wrap"><div class="freq-bar-fill" style="width:2.2%;background:var(--shape)"></div></div></td></tr>
      <tr><td class="rank">19</td><td><span class="cl-char" style="color:var(--animal)">头</span></td><td class="cl-pinyin">tou</td><td><span class="cat-tag cat-animal">Animal</span></td><td class="cl-domain">Large livestock: cattle, elephants</td><td class="cl-example"><span class="zh">一头牛</span> a cow</td><td class="freq-bar-cell"><div class="freq-bar-wrap"><div class="freq-bar-fill" style="width:2%;background:var(--animal)"></div></div></td></tr>
      <tr><td class="rank">20</td><td><span class="cl-char" style="color:var(--function)">棵</span></td><td class="cl-pinyin">ke</td><td><span class="cat-tag cat-function">Function</span></td><td class="cl-domain">Trees and standing plants</td><td class="cl-example"><span class="zh">一棵树</span> a tree</td><td class="freq-bar-cell"><div class="freq-bar-wrap"><div class="freq-bar-fill" style="width:1.8%;background:var(--function)"></div></div></td></tr>
    </tbody>
  </table>
</div>
<figcaption>Diagram 4 &mdash; The top 20 classifiers cover the vast majority of everyday Mandarin noun phrases. 个 alone accounts for ~87-94% of all classifier tokens in casual speech.</figcaption>
</figure>
</body>
</html>
