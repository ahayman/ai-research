<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>What Changes in Clinical Practice</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --muted: #6c757d;
    --trad: #dc3545; --trad-bg: #fee2e2;
    --glp: #7c3aed; --glp-bg: #f3e8ff;
    --shared: #198754; --shared-bg: #edfff5;
    --caution: #d97706; --caution-bg: #fffbeb;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a; --fg: #e8e8f0; --surface: #1a1a2e; --border: #2d2d44;
      --muted: #9a9ab0;
      --trad: #ff6b6b; --trad-bg: #2a1010;
      --glp: #b197fc; --glp-bg: #1e1030;
      --shared: #51cf66; --shared-bg: #0a2a15;
      --caution: #fbbf24; --caution-bg: #2a2510;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--fg); display: flex; justify-content: center; padding: 2rem 1rem; }
  figure { max-width: 960px; width: 100%; background: var(--surface); border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); padding: 2.5rem; }
  h2 { text-align: center; font-size: 1.4rem; margin-bottom: 0.4rem; }
  .subtitle { text-align: center; font-size: 0.95rem; color: var(--muted); margin-bottom: 2rem; }
  .diagram-wrapper { overflow-x: auto; padding: 0.5rem; }
  svg { display: block; margin: 0 auto; }
  figcaption { text-align: center; margin-top: 1.5rem; padding-top: 1.25rem; border-top: 1px solid var(--border); }
  figcaption strong { display: block; font-size: 1.05rem; margin-bottom: 0.4rem; }
  figcaption span { font-size: 0.88rem; color: var(--muted); line-height: 1.5; }
</style>
</head>
<body>
<figure>
  <h2>What Changes in Clinical Practice</h2>
  <p class="subtitle">Traditional vs. GLP/NLA approach -- with evidence status for each element</p>
  <div class="diagram-wrapper">
    <svg viewBox="0 0 920 500" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif" role="img" aria-labelledby="title-prac desc-prac">
      <title id="title-prac">Clinical Practice Comparison</title>
      <desc id="desc-prac">Before-after comparison showing how a child saying 'To infinity and beyond!' is handled. Traditional approach: dismiss as meaningless, drill single words. GLP/NLA approach: honor as Stage 1 language, model modified gestalts. The diagram marks which elements are evidence-supported and which are not.</desc>

      <!-- Shared stimulus at top -->
      <rect x="280" y="20" width="360" height="70" rx="12" fill="var(--surface)" stroke="var(--border)" stroke-width="2.5"/>
      <text x="460" y="47" text-anchor="middle" font-size="14" font-weight="700" fill="var(--fg)">Child says:</text>
      <text x="460" y="72" text-anchor="middle" font-size="14" fill="var(--fg)" font-style="italic">"To infinity and beyond!"</text>

      <!-- Split arrow -->
      <line x1="380" y1="90" x2="200" y2="130" stroke="var(--trad)" stroke-width="2"/>
      <line x1="540" y1="90" x2="720" y2="130" stroke="var(--glp)" stroke-width="2"/>

      <!-- Traditional approach (left) -->
      <rect x="30" y="135" width="350" height="340" rx="14" fill="var(--trad-bg)" stroke="var(--trad)" stroke-width="2"/>
      <text x="205" y="162" text-anchor="middle" font-size="13" font-weight="700" fill="var(--trad)">Traditional Approach</text>

      <rect x="50" y="178" width="310" height="50" rx="8" fill="var(--surface)" stroke="var(--trad)" stroke-width="1"/>
      <text x="205" y="198" text-anchor="middle" font-size="11" fill="var(--fg)">Therapist: "Meaningless echolalia.</text>
      <text x="205" y="215" text-anchor="middle" font-size="11" fill="var(--fg)">Redirect to functional words."</text>

      <text x="205" y="245" text-anchor="middle" font-size="18" fill="var(--trad)">|</text>

      <rect x="50" y="255" width="310" height="50" rx="8" fill="var(--surface)" stroke="var(--trad)" stroke-width="1"/>
      <text x="205" y="275" text-anchor="middle" font-size="11" fill="var(--fg)">Drill single words:</text>
      <text x="205" y="292" text-anchor="middle" font-size="11" fill="var(--fg)">"cup" "want" "more" "go"</text>

      <text x="205" y="322" text-anchor="middle" font-size="18" fill="var(--trad)">|</text>

      <rect x="50" y="332" width="310" height="50" rx="8" fill="var(--surface)" stroke="var(--trad)" stroke-width="1"/>
      <text x="205" y="352" text-anchor="middle" font-size="11" fill="var(--fg)">Extinguish echolalia</text>
      <text x="205" y="369" text-anchor="middle" font-size="11" fill="var(--fg)">(treat as behavior to eliminate)</text>

      <!-- Evidence status for traditional -->
      <rect x="50" y="395" width="310" height="65" rx="8" fill="var(--trad)" opacity="0.08" stroke="var(--trad)" stroke-width="1"/>
      <text x="205" y="418" text-anchor="middle" font-size="10" fill="var(--trad)" font-weight="600">Evidence status:</text>
      <text x="205" y="436" text-anchor="middle" font-size="10" fill="var(--fg)">Extinguishing echolalia: CONTRADICTED</text>
      <text x="205" y="450" text-anchor="middle" font-size="10" fill="var(--fg)">by 40 years of research (Prizant et al.)</text>

      <!-- GLP/NLA approach (right) -->
      <rect x="540" y="135" width="360" height="340" rx="14" fill="var(--glp-bg)" stroke="var(--glp)" stroke-width="2"/>
      <text x="720" y="162" text-anchor="middle" font-size="13" font-weight="700" fill="var(--glp)">GLP/NLA Approach</text>

      <rect x="560" y="178" width="320" height="50" rx="8" fill="var(--surface)" stroke="var(--shared)" stroke-width="1.5"/>
      <text x="720" y="198" text-anchor="middle" font-size="11" fill="var(--fg)">Therapist: "Stage 1 gestalt.</text>
      <text x="720" y="215" text-anchor="middle" font-size="11" fill="var(--fg)">Communicating excitement."</text>
      <rect x="830" y="183" width="40" height="16" rx="8" fill="var(--shared)"/>
      <text x="850" y="194" text-anchor="middle" font-size="7" font-weight="700" fill="#fff">OK</text>

      <text x="720" y="245" text-anchor="middle" font-size="18" fill="var(--glp)">|</text>

      <rect x="560" y="255" width="320" height="50" rx="8" fill="var(--surface)" stroke="var(--caution)" stroke-width="1.5" stroke-dasharray="6,3"/>
      <text x="720" y="275" text-anchor="middle" font-size="11" fill="var(--fg)">Model mitigated gestalt:</text>
      <text x="720" y="292" text-anchor="middle" font-size="11" fill="var(--fg)">"Ready to go!" (Stage 2 model)</text>
      <rect x="830" y="260" width="40" height="16" rx="8" fill="var(--caution)"/>
      <text x="850" y="271" text-anchor="middle" font-size="6" font-weight="700" fill="#fff">UNVAL</text>

      <text x="720" y="322" text-anchor="middle" font-size="18" fill="var(--glp)">|</text>

      <rect x="560" y="332" width="320" height="50" rx="8" fill="var(--surface)" stroke="var(--caution)" stroke-width="1.5" stroke-dasharray="6,3"/>
      <text x="720" y="352" text-anchor="middle" font-size="11" fill="var(--fg)">Avoid teaching individual words</text>
      <text x="720" y="369" text-anchor="middle" font-size="11" fill="var(--fg)">(wait for "stage progression")</text>
      <rect x="830" y="337" width="58" height="16" rx="8" fill="var(--trad)"/>
      <text x="859" y="348" text-anchor="middle" font-size="6" font-weight="700" fill="#fff">DISPUTED</text>

      <!-- Evidence status for GLP -->
      <rect x="560" y="395" width="320" height="65" rx="8" fill="var(--glp)" opacity="0.08" stroke="var(--glp)" stroke-width="1"/>
      <text x="720" y="418" text-anchor="middle" font-size="10" fill="var(--glp)" font-weight="600">Evidence status:</text>
      <text x="720" y="436" text-anchor="middle" font-size="10" fill="var(--fg)">Honoring echolalia: SUPPORTED</text>
      <text x="720" y="450" text-anchor="middle" font-size="10" fill="var(--fg)">Stage-based restrictions: UNVALIDATED</text>
    </svg>
  </div>
  <figcaption>
    <strong>Figure 5: What Changes in Clinical Practice</strong>
    <span>The GLP/NLA framework bundles evidence-supported practices (honoring echolalia as communication, green badge) with unvalidated practices (modeling mitigated gestalts as a therapy technique, amber badge) and disputed practices (withholding explicit vocabulary instruction, red badge). The traditional approach of extinguishing echolalia is contradicted by decades of research. The challenge for clinicians is separating the well-supported elements from the unvalidated framework.</span>
  </figcaption>
</figure>
</body>
</html>
