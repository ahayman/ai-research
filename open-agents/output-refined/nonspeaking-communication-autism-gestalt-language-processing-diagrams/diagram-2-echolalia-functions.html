<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Communicative Functions of Echolalia</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --muted: #6c757d;
    --comm: #3b82f6; --comm-bg: #dbeafe;
    --cog: #7c3aed; --cog-bg: #f3e8ff;
    --auto: #6b7280; --auto-bg: #f3f4f6;
    --accent: #198754;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a; --fg: #e8e8f0; --surface: #1a1a2e; --border: #2d2d44;
      --muted: #9a9ab0;
      --comm: #60a5fa; --comm-bg: #172554;
      --cog: #b197fc; --cog-bg: #1e1030;
      --auto: #9ca3af; --auto-bg: #1f2937;
      --accent: #51cf66;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--fg); display: flex; justify-content: center; padding: 2rem 1rem; }
  figure { max-width: 940px; width: 100%; background: var(--surface); border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); padding: 2.5rem; }
  h2 { text-align: center; font-size: 1.4rem; margin-bottom: 0.4rem; }
  .subtitle { text-align: center; font-size: 0.95rem; color: var(--muted); margin-bottom: 2rem; }
  .diagram-wrapper { overflow-x: auto; padding: 0.5rem; }
  svg { display: block; margin: 0 auto; }
  figcaption { text-align: center; margin-top: 1.5rem; padding-top: 1.25rem; border-top: 1px solid var(--border); }
  figcaption strong { display: block; font-size: 1.05rem; margin-bottom: 0.4rem; }
  figcaption span { font-size: 0.88rem; color: var(--muted); line-height: 1.5; }
</style>
</head>
<body>
<figure>
  <h2>Communicative Functions of Echolalia</h2>
  <p class="subtitle">Prizant and Rydell (1984) -- the well-established foundation</p>
  <div class="diagram-wrapper">
    <svg viewBox="0 0 900 430" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif" role="img" aria-labelledby="title-echo desc-echo">
      <title id="title-echo">Functions of Echolalia</title>
      <desc id="desc-echo">Mind map showing three categories of echolalia function: Interactive/Communicative (requesting, protesting, labeling, turn-taking, affirming, calling, directing, information-providing, social maintenance), Cognitive (rehearsal, memory, self-regulation, processing), and Non-functional/automatic (rare). This evidence base is strong with four decades of replication.</desc>

      <!-- Central node -->
      <circle cx="450" cy="200" r="55" fill="var(--accent)" opacity="0.1" stroke="var(--accent)" stroke-width="3"/>
      <text x="450" y="195" text-anchor="middle" font-size="14" font-weight="700" fill="var(--accent)">Echolalia</text>
      <text x="450" y="214" text-anchor="middle" font-size="10" fill="var(--muted)">is meaningful</text>

      <!-- Branch 1: Communicative (left, large) -->
      <line x1="395" y1="190" x2="230" y2="130" stroke="var(--comm)" stroke-width="2.5"/>
      <rect x="20" y="30" width="420" height="230" rx="12" fill="var(--comm-bg)" stroke="var(--comm)" stroke-width="2"/>
      <text x="230" y="55" text-anchor="middle" font-size="13" font-weight="700" fill="var(--comm)">Interactive / Communicative</text>
      <text x="230" y="72" text-anchor="middle" font-size="10" fill="var(--muted)">Echolalia used to communicate with others</text>

      <!-- Function items -->
      <g font-size="11" fill="var(--fg)">
        <rect x="40" y="85" width="130" height="28" rx="6" fill="var(--comm)" opacity="0.12"/>
        <text x="105" y="104" text-anchor="middle">Requesting</text>
        <rect x="180" y="85" width="130" height="28" rx="6" fill="var(--comm)" opacity="0.12"/>
        <text x="245" y="104" text-anchor="middle">Protesting</text>
        <rect x="320" y="85" width="100" height="28" rx="6" fill="var(--comm)" opacity="0.12"/>
        <text x="370" y="104" text-anchor="middle">Labeling</text>
        <rect x="40" y="120" width="130" height="28" rx="6" fill="var(--comm)" opacity="0.12"/>
        <text x="105" y="139" text-anchor="middle">Turn-taking</text>
        <rect x="180" y="120" width="130" height="28" rx="6" fill="var(--comm)" opacity="0.12"/>
        <text x="245" y="139" text-anchor="middle">Affirming</text>
        <rect x="320" y="120" width="100" height="28" rx="6" fill="var(--comm)" opacity="0.12"/>
        <text x="370" y="139" text-anchor="middle">Calling</text>
        <rect x="40" y="155" width="130" height="28" rx="6" fill="var(--comm)" opacity="0.12"/>
        <text x="105" y="174" text-anchor="middle">Directing</text>
        <rect x="180" y="155" width="165" height="28" rx="6" fill="var(--comm)" opacity="0.12"/>
        <text x="262" y="174" text-anchor="middle">Information-providing</text>
        <rect x="40" y="190" width="190" height="28" rx="6" fill="var(--comm)" opacity="0.12"/>
        <text x="135" y="209" text-anchor="middle">Social maintenance</text>
      </g>
      <text x="230" y="240" text-anchor="middle" font-size="9" fill="var(--muted)" font-style="italic">Prizant & Rydell 1984: 9 interactive categories identified</text>

      <!-- Branch 2: Cognitive (right) -->
      <line x1="505" y1="180" x2="640" y2="100" stroke="var(--cog)" stroke-width="2.5"/>
      <rect x="550" y="30" width="330" height="160" rx="12" fill="var(--cog-bg)" stroke="var(--cog)" stroke-width="2"/>
      <text x="715" y="55" text-anchor="middle" font-size="13" font-weight="700" fill="var(--cog)">Cognitive Functions</text>
      <text x="715" y="72" text-anchor="middle" font-size="10" fill="var(--muted)">Self-directed, not for others</text>

      <g font-size="11" fill="var(--fg)">
        <rect x="570" y="85" width="130" height="28" rx="6" fill="var(--cog)" opacity="0.12"/>
        <text x="635" y="104" text-anchor="middle">Rehearsal</text>
        <rect x="710" y="85" width="150" height="28" rx="6" fill="var(--cog)" opacity="0.12"/>
        <text x="785" y="104" text-anchor="middle">Memory processing</text>
        <rect x="570" y="120" width="150" height="28" rx="6" fill="var(--cog)" opacity="0.12"/>
        <text x="645" y="139" text-anchor="middle">Self-regulation</text>
        <rect x="730" y="120" width="130" height="28" rx="6" fill="var(--cog)" opacity="0.12"/>
        <text x="795" y="139" text-anchor="middle">Verbal thinking</text>
      </g>
      <text x="715" y="178" text-anchor="middle" font-size="9" fill="var(--muted)" font-style="italic">Cognitive echoes: processing + calming functions</text>

      <!-- Branch 3: Non-functional (bottom, small) -->
      <line x1="450" y1="255" x2="450" y2="300" stroke="var(--auto)" stroke-width="1.5"/>
      <rect x="330" y="305" width="240" height="55" rx="10" fill="var(--auto-bg)" stroke="var(--auto)" stroke-width="1.5"/>
      <text x="450" y="328" text-anchor="middle" font-size="12" font-weight="600" fill="var(--auto)">Automatic (rare)</text>
      <text x="450" y="347" text-anchor="middle" font-size="10" fill="var(--muted)">Repetition without apparent purpose</text>

      <!-- Evidence badge -->
      <rect x="280" y="380" width="340" height="40" rx="20" fill="var(--accent)" opacity="0.1" stroke="var(--accent)" stroke-width="2"/>
      <text x="450" y="405" text-anchor="middle" font-size="12" font-weight="700" fill="var(--accent)">Evidence: 4 decades, multiple research groups, well-replicated</text>
    </svg>
  </div>
  <figcaption>
    <strong>Figure 2: Communicative Functions of Echolalia</strong>
    <span>Prizant and Rydell (1984) identified nine interactive and five non-interactive functions of delayed echolalia. This research -- the observation that echolalia is meaningful communication, not meaningless repetition -- is the solid foundation of the GLP concept, replicated across four decades of independent research. It is critically important to distinguish this well-established observation from the unvalidated NLA therapy framework built upon it.</span>
  </figcaption>
</figure>
</body>
</html>
