<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Evidence Landscape -- What Is and Is Not Supported</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --muted: #6c757d;
    --supported: #198754; --supported-bg: #edfff5;
    --speculative: #d97706; --speculative-bg: #fffbeb;
    --disputed: #dc3545; --disputed-bg: #fee2e2;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a; --fg: #e8e8f0; --surface: #1a1a2e; --border: #2d2d44;
      --muted: #9a9ab0;
      --supported: #51cf66; --supported-bg: #0a2a15;
      --speculative: #fbbf24; --speculative-bg: #2a2510;
      --disputed: #ff6b6b; --disputed-bg: #2a1010;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--fg); display: flex; justify-content: center; padding: 2rem 1rem; }
  figure { max-width: 960px; width: 100%; background: var(--surface); border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); padding: 2.5rem; }
  h2 { text-align: center; font-size: 1.4rem; margin-bottom: 0.4rem; }
  .subtitle { text-align: center; font-size: 0.95rem; color: var(--muted); margin-bottom: 2rem; }
  .diagram-wrapper { overflow-x: auto; padding: 0.5rem; }
  svg { display: block; margin: 0 auto; }
  figcaption { text-align: center; margin-top: 1.5rem; padding-top: 1.25rem; border-top: 1px solid var(--border); }
  figcaption strong { display: block; font-size: 1.05rem; margin-bottom: 0.4rem; }
  figcaption span { font-size: 0.88rem; color: var(--muted); line-height: 1.5; }
</style>
</head>
<body>
<figure>
  <h2>The GLP/NLA Evidence Landscape</h2>
  <p class="subtitle">Mapping what the evidence supports, what is speculative, and what is disputed</p>
  <div class="diagram-wrapper">
    <svg viewBox="0 0 920 400" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif" role="img" aria-labelledby="title-evid desc-evid">
      <title id="title-evid">GLP NLA Evidence Landscape</title>
      <desc id="desc-evid">Three-column evidence spectrum showing: Well-Supported (echolalia serves functions, should not be extinguished, functional communication helps), Speculative/Unvalidated (6-stage progression, GLP as clinical entity, NLA protocols), and Disputed (stages must be sequential, teaching words to GLPs is harmful, GLP as all-or-nothing category).</desc>

      <!-- Well-Supported column -->
      <rect x="20" y="20" width="280" height="350" rx="14" fill="var(--supported-bg)" stroke="var(--supported)" stroke-width="2.5"/>
      <text x="160" y="50" text-anchor="middle" font-size="14" font-weight="700" fill="var(--supported)">Well-Supported</text>
      <text x="160" y="68" text-anchor="middle" font-size="10" fill="var(--muted)">Multiple studies, replicated</text>
      <line x1="40" y1="78" x2="280" y2="78" stroke="var(--supported)" stroke-width="0.5"/>

      <rect x="40" y="90" width="240" height="55" rx="8" fill="var(--surface)" stroke="var(--supported)" stroke-width="1"/>
      <text x="160" y="112" text-anchor="middle" font-size="10.5" fill="var(--fg)">Echolalia serves communicative</text>
      <text x="160" y="128" text-anchor="middle" font-size="10.5" fill="var(--fg)">and cognitive functions</text>

      <rect x="40" y="155" width="240" height="55" rx="8" fill="var(--surface)" stroke="var(--supported)" stroke-width="1"/>
      <text x="160" y="177" text-anchor="middle" font-size="10.5" fill="var(--fg)">Echolalia should not be treated</text>
      <text x="160" y="193" text-anchor="middle" font-size="10.5" fill="var(--fg)">as meaningless or extinguished</text>

      <rect x="40" y="220" width="240" height="55" rx="8" fill="var(--surface)" stroke="var(--supported)" stroke-width="1"/>
      <text x="160" y="242" text-anchor="middle" font-size="10.5" fill="var(--fg)">Functional communication</text>
      <text x="160" y="258" text-anchor="middle" font-size="10.5" fill="var(--fg)">approaches are effective</text>

      <text x="160" y="300" text-anchor="middle" font-size="10" fill="var(--supported)" font-weight="600">Prizant 1984 + 40 years</text>
      <text x="160" y="316" text-anchor="middle" font-size="10" fill="var(--supported)" font-weight="600">of independent replication</text>

      <text x="160" y="350" text-anchor="middle" font-size="9" fill="var(--muted)">This is the solid foundation.</text>

      <!-- Speculative/Unvalidated column -->
      <rect x="320" y="20" width="280" height="350" rx="14" fill="var(--speculative-bg)" stroke="var(--speculative)" stroke-width="2.5"/>
      <text x="460" y="50" text-anchor="middle" font-size="14" font-weight="700" fill="var(--speculative)">Speculative / Unvalidated</text>
      <text x="460" y="68" text-anchor="middle" font-size="10" fill="var(--muted)">Zero outcome studies</text>
      <line x1="340" y1="78" x2="580" y2="78" stroke="var(--speculative)" stroke-width="0.5"/>

      <rect x="340" y="90" width="240" height="55" rx="8" fill="var(--surface)" stroke="var(--speculative)" stroke-width="1"/>
      <text x="460" y="112" text-anchor="middle" font-size="10.5" fill="var(--fg)">The 6-stage NLA progression</text>
      <text x="460" y="128" text-anchor="middle" font-size="10.5" fill="var(--fg)">as a developmental sequence</text>

      <rect x="340" y="155" width="240" height="55" rx="8" fill="var(--surface)" stroke="var(--speculative)" stroke-width="1"/>
      <text x="460" y="177" text-anchor="middle" font-size="10.5" fill="var(--fg)">"Gestalt language processor"</text>
      <text x="460" y="193" text-anchor="middle" font-size="10.5" fill="var(--fg)">as a clinical diagnostic entity</text>

      <rect x="340" y="220" width="240" height="55" rx="8" fill="var(--surface)" stroke="var(--speculative)" stroke-width="1"/>
      <text x="460" y="242" text-anchor="middle" font-size="10.5" fill="var(--fg)">Specific NLA-based therapy</text>
      <text x="460" y="258" text-anchor="middle" font-size="10.5" fill="var(--fg)">protocols and interventions</text>

      <text x="460" y="300" text-anchor="middle" font-size="10" fill="var(--speculative)" font-weight="600">Hutchins et al. 2024: zero studies</text>
      <text x="460" y="316" text-anchor="middle" font-size="10" fill="var(--speculative)" font-weight="600">Bryant et al. 2024: 18 databases, none</text>

      <text x="460" y="350" text-anchor="middle" font-size="9" fill="var(--muted)">Adopted before tested.</text>

      <!-- Disputed column -->
      <rect x="620" y="20" width="280" height="350" rx="14" fill="var(--disputed-bg)" stroke="var(--disputed)" stroke-width="2.5"/>
      <text x="760" y="50" text-anchor="middle" font-size="14" font-weight="700" fill="var(--disputed)">Disputed / Contradicted</text>
      <text x="760" y="68" text-anchor="middle" font-size="10" fill="var(--muted)">Challenged by published critiques</text>
      <line x1="640" y1="78" x2="880" y2="78" stroke="var(--disputed)" stroke-width="0.5"/>

      <rect x="640" y="90" width="240" height="55" rx="8" fill="var(--surface)" stroke="var(--disputed)" stroke-width="1"/>
      <text x="760" y="112" text-anchor="middle" font-size="10.5" fill="var(--fg)">All children must progress</text>
      <text x="760" y="128" text-anchor="middle" font-size="10.5" fill="var(--fg)">through stages sequentially</text>

      <rect x="640" y="155" width="240" height="55" rx="8" fill="var(--surface)" stroke="var(--disputed)" stroke-width="1"/>
      <text x="760" y="177" text-anchor="middle" font-size="10.5" fill="var(--fg)">Teaching single words to</text>
      <text x="760" y="193" text-anchor="middle" font-size="10.5" fill="var(--fg)">"GLPs" is harmful</text>

      <rect x="640" y="220" width="240" height="55" rx="8" fill="var(--surface)" stroke="var(--disputed)" stroke-width="1"/>
      <text x="760" y="242" text-anchor="middle" font-size="10.5" fill="var(--fg)">GLP vs. analytic is an</text>
      <text x="760" y="258" text-anchor="middle" font-size="10.5" fill="var(--fg)">all-or-nothing category</text>

      <text x="760" y="300" text-anchor="middle" font-size="10" fill="var(--disputed)" font-weight="600">Linguist's critique 2024:</text>
      <text x="760" y="316" text-anchor="middle" font-size="10" fill="var(--disputed)" font-weight="600">"implausible theory"</text>
      <text x="760" y="332" text-anchor="middle" font-size="10" fill="var(--disputed)" font-weight="600">Lorang et al. 2025: 5 concerns</text>

      <text x="760" y="355" text-anchor="middle" font-size="9" fill="var(--muted)">May cause harm per critics.</text>
    </svg>
  </div>
  <figcaption>
    <strong>Figure 3: The GLP/NLA Evidence Landscape</strong>
    <span>The GLP/NLA space contains claims at three distinct evidence levels. Well-supported (green): echolalia is meaningful, with four decades of replication. Speculative/unvalidated (amber): the six-stage progression and NLA-based therapy protocols, with zero controlled outcome studies despite a decade of adoption. Disputed (red): specific claims about mandatory stage progression and harms of teaching single words, actively challenged in published 2024-2025 critiques.</span>
  </figcaption>
</figure>
</body>
</html>
