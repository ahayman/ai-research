    --muted: #6c757d;
    --research: #3b82f6; --research-bg: #dbeafe;
    --framework: #7c3aed; --framework-bg: #f3e8ff;
    --critique: #dc3545; --critique-bg: #fee2e2;
    --adoption: #d97706; --adoption-bg: #fffbeb;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a; --fg: #e8e8f0; --surface: #1a1a2e; --border: #2d2d44;
      --muted: #9a9ab0;
      --research: #60a5fa; --research-bg: #172554;
      --framework: #b197fc; --framework-bg: #1e1030;
      --critique: #ff6b6b; --critique-bg: #2a1010;
      --adoption: #fbbf24; --adoption-bg: #2a2510;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--fg); display: flex; justify-content: center; padding: 2rem 1rem; }
  figure { max-width: 960px; width: 100%; background: var(--surface); border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); padding: 2.5rem; }
  h2 { text-align: center; font-size: 1.4rem; margin-bottom: 0.4rem; }
  .subtitle { text-align: center; font-size: 0.95rem; color: var(--muted); margin-bottom: 2rem; }

  figcaption { text-align: center; margin-top: 1.5rem; padding-top: 1.25rem; border-top: 1px solid var(--border); }

  figcaption span { font-size: 0.88rem; color: var(--muted); line-height: 1.5; }
</style>
</head>
<body>
<figure>
  <h2>Timeline of the GLP/NLA Controversy</h2>
  <p class="subtitle">From foundational science to clinical adoption to critical backlash</p>
  <div class="diagram-wrapper">
    <pre class="mermaid">
timeline
    title From Echolalia Research to NLA Controversy

    section Foundational Research
        1981 : Prizant & Duchan
             : Echolalia has communicative functions
             : First paradigm shift
        1983 : Ann Peters
             : Gestalt/analytic distinction in typical development
        1984 : Prizant & Rydell
             : 9 interactive + 5 cognitive functions of echolalia
             : Well-replicated finding

    section NLA Framework
        2012 : Marge Blanc publishes NLA book
             : Self-published, 85 participants from her clinic
             : Expands Prizant's 4 stages to 6
        2012-2020 : Training courses spread through SLP community
                  : Social media amplifies GLP concepts
                  : Widespread clinical adoption begins

    section Rapid Adoption
        2020-2023 : GLP enters popular usage on social media
                  : Thousands of SLPs adopt framework
                  : No controlled outcome studies conducted
        2023 : Blanc publishes NLA protocol in ASHA Perspectives
             : First peer-reviewed publication of the protocol

    section Critical Backlash
        May 2024 : Hutchins, Knox, Fletcher critical analysis
                 : ZERO validation studies found (PMC11113044)
        Oct 2024 : Linguist's critique in Springer
                 : "An implausible theory at odds with the research"
        Dec 2024 : Bryant, Hemsley, Shane systematic review
                 : 18 databases searched, no empirical evidence
        2025 : Lorang et al. ASHA Perspectives response
             : 5 specific concerns including potential harms
             : Field now divided, debate continues
    </pre>
  </div>
  <figcaption>
    <strong>Figure 4: Timeline of the GLP/NLA Controversy</strong>
    <span>The echolalia research foundation (1981-1984) is scientifically robust. The NLA framework (2012) was built on that foundation but adopted widely before any controlled testing. Over a decade of clinical use (2012-2024) preceded the first published critiques (2024-2025), which found zero empirical validation studies. The gap between adoption and evidence is the central controversy.</span>
  </figcaption>
</figure>
