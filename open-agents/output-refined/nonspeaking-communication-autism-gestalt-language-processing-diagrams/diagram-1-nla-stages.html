<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Six Stages of NLA -- With Evidence Status</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --muted: #6c757d;
    --supported: #198754; --supported-bg: #edfff5;
    --unvalidated: #d97706; --unvalidated-bg: #fffbeb;
    --accent: #4361ee;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a; --fg: #e8e8f0; --surface: #1a1a2e; --border: #2d2d44;
      --muted: #9a9ab0;
      --supported: #51cf66; --supported-bg: #0a2a15;
      --unvalidated: #fbbf24; --unvalidated-bg: #2a2510;
      --accent: #6b8aff;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--fg); display: flex; justify-content: center; padding: 2rem 1rem; }
  figure { max-width: 960px; width: 100%; background: var(--surface); border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); padding: 2.5rem; }
  h2 { text-align: center; font-size: 1.4rem; margin-bottom: 0.4rem; }
  .subtitle { text-align: center; font-size: 0.95rem; color: var(--muted); margin-bottom: 2rem; }
  .diagram-wrapper { overflow-x: auto; padding: 0.5rem; }
  svg { display: block; margin: 0 auto; }
  figcaption { text-align: center; margin-top: 1.5rem; padding-top: 1.25rem; border-top: 1px solid var(--border); }
  figcaption strong { display: block; font-size: 1.05rem; margin-bottom: 0.4rem; }
  figcaption span { font-size: 0.88rem; color: var(--muted); line-height: 1.5; }
</style>
</head>
<body>
<figure>
  <h2>The Six Stages of NLA</h2>
  <p class="subtitle">Blanc's proposed progression -- with evidence status overlay</p>
  <div class="diagram-wrapper">
    <svg viewBox="0 0 920 480" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif" role="img" aria-labelledby="title-nla desc-nla">
      <title id="title-nla">Six Stages of NLA with Evidence Status</title>
      <desc id="desc-nla">Stepped progression showing Blanc's six stages from whole gestalts to complete grammar. Stage 1 has solid green border (echolalia-as-communication well-supported). Stages 2-6 have dashed amber borders (specific stage progression is unvalidated -- zero controlled outcome studies).</desc>

      <defs>
        <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
          <polygon points="0 0, 10 3.5, 0 7" fill="var(--border)"/>
        </marker>
      </defs>

      <!-- Stage 1 (well-supported) -->
      <rect x="30" y="40" width="250" height="110" rx="12" fill="var(--supported-bg)" stroke="var(--supported)" stroke-width="3"/>
      <text x="155" y="66" text-anchor="middle" font-size="13" font-weight="700" fill="var(--supported)">Stage 1</text>
      <text x="155" y="84" text-anchor="middle" font-size="11" fill="var(--fg)">Whole gestalts (echolalia)</text>
      <text x="155" y="104" text-anchor="middle" font-size="10" fill="var(--muted)">"Let's get out of here!"</text>
      <text x="155" y="120" text-anchor="middle" font-size="10" fill="var(--muted)">"Want some more?"</text>
      <!-- Evidence badge -->
      <rect x="200" y="130" width="72" height="18" rx="9" fill="var(--supported)"/>
      <text x="236" y="143" text-anchor="middle" font-size="8" font-weight="700" fill="#fff">SUPPORTED</text>

      <line x1="280" y1="95" x2="310" y2="95" stroke="var(--border)" stroke-width="2" marker-end="url(#arr)"/>

      <!-- Stage 2 (unvalidated) -->
      <rect x="320" y="40" width="250" height="110" rx="12" fill="var(--unvalidated-bg)" stroke="var(--unvalidated)" stroke-width="2" stroke-dasharray="8,4"/>
      <text x="445" y="66" text-anchor="middle" font-size="13" font-weight="700" fill="var(--unvalidated)">Stage 2</text>
      <text x="445" y="84" text-anchor="middle" font-size="11" fill="var(--fg)">Mitigated gestalts</text>
      <text x="445" y="104" text-anchor="middle" font-size="10" fill="var(--muted)">"Want out of here"</text>
      <text x="445" y="120" text-anchor="middle" font-size="10" fill="var(--muted)">(parts recombined)</text>
      <rect x="490" y="130" width="78" height="18" rx="9" fill="var(--unvalidated)"/>
      <text x="529" y="143" text-anchor="middle" font-size="8" font-weight="700" fill="#fff">UNVALIDATED</text>

      <line x1="570" y1="95" x2="600" y2="95" stroke="var(--border)" stroke-width="2" marker-end="url(#arr)"/>

      <!-- Stage 3 -->
      <rect x="610" y="40" width="250" height="110" rx="12" fill="var(--unvalidated-bg)" stroke="var(--unvalidated)" stroke-width="2" stroke-dasharray="8,4"/>
      <text x="735" y="66" text-anchor="middle" font-size="13" font-weight="700" fill="var(--unvalidated)">Stage 3</text>
      <text x="735" y="84" text-anchor="middle" font-size="11" fill="var(--fg)">Single word isolation</text>
      <text x="735" y="104" text-anchor="middle" font-size="10" fill="var(--muted)">"Get" + "more" = "Get more"</text>
      <text x="735" y="120" text-anchor="middle" font-size="10" fill="var(--muted)">(novel combinations)</text>
      <rect x="780" y="130" width="78" height="18" rx="9" fill="var(--unvalidated)"/>
      <text x="819" y="143" text-anchor="middle" font-size="8" font-weight="700" fill="#fff">UNVALIDATED</text>

      <!-- Arrow down -->
      <line x1="735" y1="150" x2="735" y2="195" stroke="var(--border)" stroke-width="2" marker-end="url(#arr)"/>

      <!-- Stage 4 -->
      <rect x="610" y="200" width="250" height="80" rx="12" fill="var(--unvalidated-bg)" stroke="var(--unvalidated)" stroke-width="2" stroke-dasharray="8,4"/>
      <text x="735" y="226" text-anchor="middle" font-size="13" font-weight="700" fill="var(--unvalidated)">Stage 4</text>
      <text x="735" y="244" text-anchor="middle" font-size="11" fill="var(--fg)">Simple sentences</text>
      <text x="735" y="264" text-anchor="middle" font-size="10" fill="var(--muted)">"I want more juice"</text>

      <line x1="610" y1="240" x2="575" y2="240" stroke="var(--border)" stroke-width="2" marker-end="url(#arr)"/>

      <!-- Stage 5 -->
      <rect x="320" y="200" width="250" height="80" rx="12" fill="var(--unvalidated-bg)" stroke="var(--unvalidated)" stroke-width="2" stroke-dasharray="8,4"/>
      <text x="445" y="226" text-anchor="middle" font-size="13" font-weight="700" fill="var(--unvalidated)">Stage 5</text>
      <text x="445" y="244" text-anchor="middle" font-size="11" fill="var(--fg)">Complex sentences</text>
      <text x="445" y="264" text-anchor="middle" font-size="10" fill="var(--muted)">"I want more juice because..."</text>

      <line x1="320" y1="240" x2="285" y2="240" stroke="var(--border)" stroke-width="2" marker-end="url(#arr)"/>

      <!-- Stage 6 -->
      <rect x="30" y="200" width="250" height="80" rx="12" fill="var(--unvalidated-bg)" stroke="var(--unvalidated)" stroke-width="2" stroke-dasharray="8,4"/>
      <text x="155" y="226" text-anchor="middle" font-size="13" font-weight="700" fill="var(--unvalidated)">Stage 6</text>
      <text x="155" y="244" text-anchor="middle" font-size="11" fill="var(--fg)">Complete grammar</text>
      <text x="155" y="264" text-anchor="middle" font-size="10" fill="var(--muted)">Flexible, self-generated language</text>

      <!-- Evidence summary box -->
      <rect x="30" y="310" width="860" height="150" rx="12" fill="var(--surface)" stroke="var(--border)" stroke-width="2"/>
      <text x="460" y="338" text-anchor="middle" font-size="13" font-weight="700" fill="var(--fg)">Evidence Status</text>
      <line x1="60" y1="348" x2="860" y2="348" stroke="var(--border)" stroke-width="1"/>

      <!-- Supported column -->
      <rect x="50" y="360" width="380" height="85" rx="8" fill="var(--supported-bg)" stroke="var(--supported)" stroke-width="1.5"/>
      <text x="240" y="382" text-anchor="middle" font-size="11" font-weight="700" fill="var(--supported)">Well-Supported (4 decades of research):</text>
      <text x="70" y="402" font-size="10" fill="var(--fg)">- Echolalia serves communicative functions</text>
      <text x="70" y="418" font-size="10" fill="var(--fg)">- Echolalia should not be extinguished</text>
      <text x="70" y="434" font-size="10" fill="var(--fg)">- Prizant & Rydell (1984) + 40 years of replication</text>

      <!-- Unvalidated column -->
      <rect x="450" y="360" width="420" height="85" rx="8" fill="var(--unvalidated-bg)" stroke="var(--unvalidated)" stroke-width="1.5"/>
      <text x="660" y="382" text-anchor="middle" font-size="11" font-weight="700" fill="var(--unvalidated)">Unvalidated (zero outcome studies):</text>
      <text x="470" y="402" font-size="10" fill="var(--fg)">- The 6-stage progression as a developmental sequence</text>
      <text x="470" y="418" font-size="10" fill="var(--fg)">- NLA-based therapy protocols</text>
      <text x="470" y="434" font-size="10" fill="var(--fg)">- "Gestalt language processor" as a clinical category</text>
    </svg>
  </div>
  <figcaption>
    <strong>Figure 1: The Six Stages of NLA -- With Evidence Status</strong>
    <span>Blanc's NLA framework proposes six stages from whole echolalic gestalts (Stage 1) to complete grammar (Stage 6). Stage 1 -- the observation that echolalia is meaningful communication -- is well-supported by four decades of research (solid green border). The specific stage progression and NLA therapy protocols (Stages 2-6, dashed amber borders) have zero controlled outcome studies. Three independent reviews in 2024 and one in 2025 found no empirical validation.</span>
  </figcaption>
</figure>
</body>
</html>
