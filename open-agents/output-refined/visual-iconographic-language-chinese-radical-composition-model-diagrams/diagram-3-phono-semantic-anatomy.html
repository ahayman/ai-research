<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anatomy of Phono-Semantic Compounds</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #f8f9fa;
    color: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 2rem;
  }
  figure {
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
    max-width: 1100px;
    width: 100%;
  }
  .diagram-title {
    text-align: center;
    font-size: 1.4rem;
    font-weight: 700;
    margin-bottom: 0.3rem;
    color: #1a1a2e;
  }
  .diagram-subtitle {
    text-align: center;
    font-size: 0.85rem;
    color: #6c757d;
    margin-bottom: 2rem;
  }

  .compound-row {
    display: flex;
    flex-wrap: wrap;
    gap: 1.5rem;
    justify-content: center;
    margin-bottom: 2rem;
  }
  .compound-card {
    border: 2px solid #e5e7eb;
    border-radius: 14px;
    padding: 1.5rem;
    min-width: 220px;
    flex: 1;
    max-width: 260px;
    position: relative;
  }
  .compound-card .layout-tag {
    position: absolute;
    top: -10px;
    left: 12px;
    background: #f3f4f6;
    padding: 0 0.5rem;
    font-size: 0.7rem;
    font-weight: 600;
    color: #6b7280;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .full-char {
    text-align: center;
    font-size: 4rem;
    line-height: 1.2;
    margin-bottom: 0.3rem;
  }
  .char-reading {
    text-align: center;
    font-size: 0.9rem;
    color: #6c757d;
    margin-bottom: 1rem;
  }
  .decomp-visual {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    margin-bottom: 1rem;
  }
  .comp-box {
    padding: 0.6rem 0.8rem;
    border-radius: 8px;
    text-align: center;
    min-width: 70px;
  }
  .comp-semantic {
    background: #dbeafe;
    border: 2px solid #3b82f6;
  }
  .comp-phonetic {
    background: #fee2e2;
    border: 2px solid #ef4444;
  }
  .comp-char {
    font-size: 1.8rem;
    line-height: 1.2;
  }
  .comp-label {
    font-size: 0.65rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-top: 0.15rem;
  }
  .comp-semantic .comp-label { color: #2563eb; }
  .comp-phonetic .comp-label { color: #ef4444; }
  .plus-sign {
    font-size: 1.4rem;
    color: #9ca3af;
    font-weight: 300;
  }
  .meaning-hint, .sound-hint {
    font-size: 0.8rem;
    text-align: center;
    line-height: 1.4;
  }
  .meaning-hint {
    color: #2563eb;
    margin-bottom: 0.2rem;
  }
  .sound-hint {
    color: #ef4444;
  }

  .structure-section {
    margin-top: 2rem;
    margin-bottom: 1.5rem;
  }
  .structure-section h3 {
    font-size: 1rem;
    font-weight: 700;
    margin-bottom: 1rem;
    text-align: center;
    color: #374151;
  }
  .structure-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 1rem;
    justify-content: center;
  }
  .structure-item {
    border: 1.5px solid #e5e7eb;
    border-radius: 10px;
    padding: 0.8rem 1.2rem;
    text-align: center;
    min-width: 130px;
  }
  .struct-icon {
    font-size: 2.5rem;
    line-height: 1.2;
    margin-bottom: 0.3rem;
  }
  .struct-boxes {
    display: grid;
    width: 60px;
    height: 60px;
    margin: 0 auto 0.4rem;
    border: 2px solid #9ca3af;
    border-radius: 4px;
    overflow: hidden;
  }
  .struct-lr { grid-template-columns: 1fr 1fr; }
  .struct-tb { grid-template-rows: 1fr 1fr; }
  .struct-enc { display: flex; align-items: center; justify-content: center; }
  .struct-half {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.65rem;
    font-weight: 600;
  }
  .half-sem { background: #dbeafe; color: #2563eb; }
  .half-pho { background: #fee2e2; color: #ef4444; }
  .struct-label {
    font-size: 0.75rem;
    font-weight: 600;
    color: #374151;
  }
  .struct-note {
    font-size: 0.7rem;
    color: #9ca3af;
    margin-top: 0.2rem;
  }

  .legend {
    display: flex;
    justify-content: center;
    gap: 2rem;
    margin-top: 1.5rem;
    margin-bottom: 1rem;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.85rem;
  }
  .legend-swatch {
    width: 18px;
    height: 18px;
    border-radius: 4px;
    border: 2px solid;
  }
  .swatch-sem { background: #dbeafe; border-color: #3b82f6; }
  .swatch-pho { background: #fee2e2; border-color: #ef4444; }

  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid #e9ecef;
  }
  figcaption strong {
    display: block;
    font-size: 1.15rem;
    color: #1a1a2e;
    margin-bottom: 0.4rem;
  }
  figcaption span {
    font-size: 0.9rem;
    color: #6c757d;
    line-height: 1.5;
  }

  @media (prefers-color-scheme: dark) {
    body { background: #1a1a2e; color: #e9ecef; }
    figure { background: #2d2d44; box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
    .diagram-title, .structure-section h3 { color: #e9ecef; }
    .diagram-subtitle, .char-reading { color: #adb5bd; }
    figcaption { border-top-color: #3d3d5c; }
    figcaption strong { color: #e9ecef; }
    figcaption span { color: #adb5bd; }
    .compound-card { border-color: #3d3d5c; }
    .compound-card .layout-tag { background: #3d3d5c; color: #adb5bd; }
    .comp-semantic { background: rgba(59,130,246,0.15); }
    .comp-phonetic { background: rgba(239,68,68,0.15); }
    .meaning-hint { color: #93c5fd; }
    .sound-hint { color: #fca5a5; }
    .structure-item { border-color: #3d3d5c; }
    .struct-label { color: #e9ecef; }
    .struct-note { color: #6c757d; }
    .struct-boxes { border-color: #6c757d; }
    .half-sem { background: rgba(59,130,246,0.25); color: #93c5fd; }
    .half-pho { background: rgba(239,68,68,0.25); color: #fca5a5; }
    .legend-item { color: #adb5bd; }
  }
</style>
</head>
<body>
<figure>
  <div class="diagram-title">Anatomy of Phono-Semantic Compounds</div>
  <div class="diagram-subtitle">How 80-90% of Chinese characters encode both meaning and pronunciation through a two-component structure</div>

  <div class="legend">
    <div class="legend-item"><div class="legend-swatch swatch-sem"></div> Semantic radical (meaning hint)</div>
    <div class="legend-item"><div class="legend-swatch swatch-pho"></div> Phonetic component (sound hint)</div>
  </div>

  <div class="compound-row">
    <div class="compound-card">
      <div class="layout-tag">Left-Right</div>
      <div class="full-char">&#x6CB3;</div>
      <div class="char-reading">he -- "river"</div>
      <div class="decomp-visual">
        <div class="comp-box comp-semantic"><div class="comp-char">&#x6C35;</div><div class="comp-label">Semantic</div></div>
        <div class="plus-sign">+</div>
        <div class="comp-box comp-phonetic"><div class="comp-char">&#x53EF;</div><div class="comp-label">Phonetic</div></div>
      </div>
      <div class="meaning-hint">&#x6C35; signals "water-related"</div>
      <div class="sound-hint">&#x53EF; (ke) approximates "he"</div>
    </div>

    <div class="compound-card">
      <div class="layout-tag">Left-Right</div>
      <div class="full-char">&#x5988;</div>
      <div class="char-reading">ma -- "mother"</div>
      <div class="decomp-visual">
        <div class="comp-box comp-semantic"><div class="comp-char">&#x5973;</div><div class="comp-label">Semantic</div></div>
        <div class="plus-sign">+</div>
        <div class="comp-box comp-phonetic"><div class="comp-char">&#x9A6C;</div><div class="comp-label">Phonetic</div></div>
      </div>
      <div class="meaning-hint">&#x5973; signals "woman/female"</div>
      <div class="sound-hint">&#x9A6C; (ma) gives exact sound</div>
    </div>

    <div class="compound-card">
      <div class="layout-tag">Top-Bottom</div>
      <div class="full-char">&#x60F3;</div>
      <div class="char-reading">xiang -- "think / miss"</div>
      <div class="decomp-visual">
        <div class="comp-box comp-phonetic"><div class="comp-char">&#x76F8;</div><div class="comp-label">Phonetic</div></div>
        <div class="plus-sign">+</div>
        <div class="comp-box comp-semantic"><div class="comp-char">&#x5FC3;</div><div class="comp-label">Semantic</div></div>
      </div>
      <div class="meaning-hint">&#x5FC3; signals "heart/mind/emotion"</div>
      <div class="sound-hint">&#x76F8; (xiang) gives exact sound</div>
    </div>

    <div class="compound-card">
      <div class="layout-tag">Enclosure</div>
      <div class="full-char">&#x56FD;</div>
      <div class="char-reading">guo -- "country"</div>
      <div class="decomp-visual">
        <div class="comp-box comp-semantic"><div class="comp-char">&#x56D7;</div><div class="comp-label">Semantic</div></div>
        <div class="plus-sign">+</div>
        <div class="comp-box comp-phonetic"><div class="comp-char">&#x7389;</div><div class="comp-label">Phonetic</div></div>
      </div>
      <div class="meaning-hint">&#x56D7; signals "enclosed territory"</div>
      <div class="sound-hint">&#x7389; (yu) -- weak sound match</div>
    </div>
  </div>

  <div class="structure-section">
    <h3>Spatial Arrangement Types</h3>
    <div class="structure-grid">
      <div class="structure-item">
        <div class="struct-boxes struct-lr">
          <div class="struct-half half-sem">SEM</div>
          <div class="struct-half half-pho">PHO</div>
        </div>
        <div class="struct-label">Left-Right &#x2FF0;</div>
        <div class="struct-note">Most common</div>
      </div>
      <div class="structure-item">
        <div class="struct-boxes struct-tb">
          <div class="struct-half half-pho">PHO</div>
          <div class="struct-half half-sem">SEM</div>
        </div>
        <div class="struct-label">Top-Bottom &#x2FF1;</div>
        <div class="struct-note">Varies: SEM can be top or bottom</div>
      </div>
      <div class="structure-item">
        <div class="struct-boxes struct-enc">
          <div style="border: 2px solid #3b82f6; background: #dbeafe; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;">
            <div style="background: #fee2e2; border: 2px solid #ef4444; width: 50%; height: 50%; border-radius: 3px; display: flex; align-items: center; justify-content: center;">
              <span class="struct-half half-pho" style="font-size: 0.55rem;">PHO</span>
            </div>
          </div>
        </div>
        <div class="struct-label">Enclosure &#x2FF4;</div>
        <div class="struct-note">SEM wraps around PHO</div>
      </div>
      <div class="structure-item">
        <div class="struct-boxes" style="grid-template-columns: 1fr 1fr 1fr;">
          <div class="struct-half half-sem" style="font-size: 0.55rem;">S</div>
          <div class="struct-half half-pho" style="font-size: 0.55rem;">P</div>
          <div class="struct-half half-sem" style="font-size: 0.55rem;">S</div>
        </div>
        <div class="struct-label">Left-Mid-Right &#x2FF2;</div>
        <div class="struct-note">Rare, complex</div>
      </div>
    </div>
  </div>

  <figcaption>
    <strong>Diagram 3: Anatomy of Phono-Semantic Compounds</strong>
    <span>Four example characters exploded to reveal their internal dual-channel structure: a semantic radical constrains the meaning domain (blue) while a phonetic component approximates pronunciation (red). Positional conventions carry information -- in left-right structures, the semantic radical typically occupies the left position. Phonetic reliability varies: &#x5988; (ma) has a perfect sound match, while &#x56FD; (guo) has a weak one, reflecting millennia of pronunciation drift since the Old Chinese period. Sources: Hacking Chinese, Kangxi radicals (Wikipedia).</span>
  </figcaption>
</figure>
</body>
</html>
