<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Character Evolution -- From Pictograph to Abstraction</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #f8f9fa;
    color: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 2rem;
  }
  figure {
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
    max-width: 1100px;
    width: 100%;
  }
  .diagram-title {
    text-align: center;
    font-size: 1.4rem;
    font-weight: 700;
    margin-bottom: 0.3rem;
    color: #1a1a2e;
  }
  .diagram-subtitle {
    text-align: center;
    font-size: 0.85rem;
    color: #6c757d;
    margin-bottom: 2rem;
  }

  .timeline-table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
    margin-bottom: 1.5rem;
  }
  .timeline-table th {
    padding: 0.8rem 0.5rem;
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    text-align: center;
    border-bottom: 3px solid #1a1a2e;
  }
  .timeline-table th.era-head {
    color: #fff;
    border-radius: 8px 8px 0 0;
    border-bottom: none;
  }
  .era-oracle { background: #92400e; }
  .era-bronze { background: #b45309; }
  .era-seal { background: #d97706; }
  .era-clerical { background: #059669; }
  .era-regular { background: #2563eb; }

  .era-date {
    font-size: 0.65rem;
    font-weight: 400;
    opacity: 0.85;
    display: block;
  }
  .timeline-table td {
    padding: 1rem 0.5rem;
    text-align: center;
    border-bottom: 1px solid #e5e7eb;
    vertical-align: middle;
  }
  .timeline-table tr:last-child td {
    border-bottom: none;
  }
  .char-label {
    font-size: 0.8rem;
    font-weight: 600;
    color: #374151;
  }
  .char-meaning {
    font-size: 0.7rem;
    color: #9ca3af;
  }
  .evo-char {
    font-size: 2.2rem;
    line-height: 1.3;
  }
  .evo-note {
    font-size: 0.65rem;
    color: #9ca3af;
    margin-top: 0.2rem;
    font-style: italic;
  }
  /* For oracle bone stage, show descriptions since fonts don't exist */
  .oracle-desc {
    font-size: 0.7rem;
    color: #92400e;
    font-style: italic;
    line-height: 1.3;
  }

  .arrow-row td {
    padding: 0.2rem 0;
    border-bottom: none;
    color: #d1d5db;
    font-size: 1.2rem;
  }

  .gradient-bar {
    display: flex;
    align-items: center;
    height: 40px;
    border-radius: 8px;
    overflow: hidden;
    margin: 1.5rem 0 0.5rem;
  }
  .gradient-bar div {
    flex: 1;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.75rem;
    font-weight: 600;
    color: #fff;
  }
  .grad-iconic { background: #f59e0b; }
  .grad-mixed { background: #84cc16; }
  .grad-abstract { background: #2563eb; }
  .gradient-labels {
    display: flex;
    justify-content: space-between;
    font-size: 0.75rem;
    color: #6c757d;
    margin-bottom: 1.5rem;
  }

  .warning-box {
    background: #fffbeb;
    border-left: 4px solid #f59e0b;
    border-radius: 0 8px 8px 0;
    padding: 1rem 1.2rem;
    font-size: 0.88rem;
    line-height: 1.5;
  }
  .warning-box strong {
    color: #92400e;
  }

  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid #e9ecef;
  }
  figcaption strong {
    display: block;
    font-size: 1.15rem;
    color: #1a1a2e;
    margin-bottom: 0.4rem;
  }
  figcaption span {
    font-size: 0.9rem;
    color: #6c757d;
    line-height: 1.5;
  }

  @media (prefers-color-scheme: dark) {
    body { background: #1a1a2e; color: #e9ecef; }
    figure { background: #2d2d44; box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
    .diagram-title { color: #e9ecef; }
    .diagram-subtitle { color: #adb5bd; }
    figcaption { border-top-color: #3d3d5c; }
    figcaption strong { color: #e9ecef; }
    figcaption span { color: #adb5bd; }
    .timeline-table th { border-bottom-color: #e9ecef; }
    .timeline-table td { border-bottom-color: #3d3d5c; }
    .char-label { color: #e9ecef; }
    .char-meaning, .evo-note { color: #6c757d; }
    .oracle-desc { color: #fcd34d; }
    .arrow-row td { color: #4b5563; }
    .warning-box { background: rgba(245,158,11,0.1); border-left-color: #f59e0b; }
    .warning-box strong { color: #fcd34d; }
  }
</style>
</head>
<body>
<figure>
  <div class="diagram-title">Character Evolution -- From Pictograph to Abstraction</div>
  <div class="diagram-subtitle">3,300+ years of transformation: five characters tracked across five script eras, showing the inevitable loss of iconicity</div>

  <table class="timeline-table">
    <thead>
      <tr>
        <th style="width:12%"></th>
        <th class="era-head era-oracle">Oracle Bone<span class="era-date">~1300 BCE</span></th>
        <th class="era-head era-bronze">Bronze<span class="era-date">~1000 BCE</span></th>
        <th class="era-head era-seal">Seal<span class="era-date">~221 BCE</span></th>
        <th class="era-head era-clerical">Clerical<span class="era-date">~200 BCE</span></th>
        <th class="era-head era-regular">Regular<span class="era-date">~200 CE+</span></th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td><span class="char-label">Eye</span><br><span class="char-meaning">mu</span></td>
        <td><span class="oracle-desc">Horizontal eye with pupil dot</span></td>
        <td><span class="oracle-desc">Rounded eye shape</span></td>
        <td><span class="oracle-desc">Oval, more stylized</span></td>
        <td><span class="evo-char" style="font-size:1.8rem;">&#x76EE;</span><div class="evo-note">rotated vertical</div></td>
        <td><span class="evo-char">&#x76EE;</span><div class="evo-note">rectangular grid</div></td>
      </tr>
      <tr>
        <td><span class="char-label">Horse</span><br><span class="char-meaning">ma</span></td>
        <td><span class="oracle-desc">Side profile with mane, legs, tail</span></td>
        <td><span class="oracle-desc">Stylized horse figure</span></td>
        <td><span class="oracle-desc">Flowing curves</span></td>
        <td><span class="evo-char" style="font-size:1.8rem;">&#x99AC;</span><div class="evo-note">traditional</div></td>
        <td><span class="evo-char">&#x9A6C;</span><div class="evo-note">simplified: 3 strokes</div></td>
      </tr>
      <tr>
        <td><span class="char-label">Mountain</span><br><span class="char-meaning">shan</span></td>
        <td><span class="oracle-desc">Three peaks in a row</span></td>
        <td><span class="oracle-desc">Three peaks, more regular</span></td>
        <td><span class="oracle-desc">Curved peaks</span></td>
        <td><span class="evo-char" style="font-size:1.8rem;">&#x5C71;</span><div class="evo-note">straightened</div></td>
        <td><span class="evo-char">&#x5C71;</span><div class="evo-note">3 vertical strokes</div></td>
      </tr>
      <tr>
        <td><span class="char-label">Water</span><br><span class="char-meaning">shui</span></td>
        <td><span class="oracle-desc">Flowing stream with ripples</span></td>
        <td><span class="oracle-desc">Wavy vertical lines</span></td>
        <td><span class="oracle-desc">Stylized flow</span></td>
        <td><span class="evo-char" style="font-size:1.8rem;">&#x6C34;</span><div class="evo-note">angular strokes</div></td>
        <td><span class="evo-char">&#x6C34;</span><div class="evo-note">abstract strokes</div></td>
      </tr>
      <tr>
        <td><span class="char-label">Person</span><br><span class="char-meaning">ren</span></td>
        <td><span class="oracle-desc">Side profile of standing figure</span></td>
        <td><span class="oracle-desc">Standing figure, simplified</span></td>
        <td><span class="oracle-desc">Two strokes suggesting body</span></td>
        <td><span class="evo-char" style="font-size:1.8rem;">&#x4EBA;</span><div class="evo-note">two strokes</div></td>
        <td><span class="evo-char">&#x4EBA;</span><div class="evo-note">two strokes only</div></td>
      </tr>
    </tbody>
  </table>

  <div class="gradient-bar">
    <div class="grad-iconic">ICONIC</div>
    <div class="grad-iconic" style="opacity:0.8;">Recognizable</div>
    <div class="grad-mixed">Stylized</div>
    <div class="grad-abstract" style="opacity:0.7;">Structured</div>
    <div class="grad-abstract">ABSTRACT</div>
  </div>
  <div class="gradient-labels">
    <span>Oracle Bone ~1300 BCE</span>
    <span>Regular Script ~200 CE -- present</span>
  </div>

  <div class="warning-box">
    <strong>Design warning for visual language:</strong> Iconicity is a starting point, not an endpoint. If Chinese is any guide, a visual language will inevitably drift from iconic to abstract as efficiency pressures dominate. The design strategy must build in structural consistency that survives the loss of iconicity -- relying on compositional rules and positional conventions rather than pictorial resemblance.
  </div>

  <figcaption>
    <strong>Diagram 4: Character Evolution Timeline -- From Pictograph to Abstraction</strong>
    <span>Five characters traced across five major script eras. Oracle bone script (~1300 BCE) was already substantially abstract -- even the earliest attested Chinese writing was not pure pictography. By the clerical script transition (~200 BCE), virtually all pictorial quality was lost, replaced by efficient angular strokes optimized for speed. The modern simplified forms (rightmost column) compress characters further. Mountain (&#x5C71;) retains some recognizable peak imagery; eye (&#x76EE;) is completely opaque without historical study. Sources: Oracle bone script (Wikipedia), PLOS ONE character evolution study.</span>
  </figcaption>
</figure>
</body>
</html>
