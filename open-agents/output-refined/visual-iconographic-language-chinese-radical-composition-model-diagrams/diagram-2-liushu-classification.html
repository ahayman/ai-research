<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Liushu -- Six Principles of Character Formation</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #f8f9fa;
    color: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 2rem;
  }
  figure {
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
    max-width: 1100px;
    width: 100%;
  }
  .diagram-title {
    text-align: center;
    font-size: 1.4rem;
    font-weight: 700;
    margin-bottom: 0.3rem;
    color: #1a1a2e;
  }
  .diagram-subtitle {
    text-align: center;
    font-size: 0.85rem;
    color: #6c757d;
    margin-bottom: 2rem;
  }

  .proportions-bar {
    display: flex;
    height: 40px;
    border-radius: 8px;
    overflow: hidden;
    margin-bottom: 0.5rem;
  }
  .prop-segment {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.7rem;
    font-weight: 600;
    color: #fff;
    transition: flex-basis 0.3s;
  }
  .prop-xingsheng { background: #2563eb; flex-basis: 82%; }
  .prop-huiyi { background: #059669; flex-basis: 13%; }
  .prop-xiangxing { background: #d97706; flex-basis: 4%; }
  .prop-zhishi { background: #7c3aed; flex-basis: 1%; }
  .prop-bar-label {
    text-align: center;
    font-size: 0.75rem;
    color: #6c757d;
    margin-bottom: 2rem;
  }

  .principle-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 1.2rem;
    margin-bottom: 1.5rem;
  }
  .principle-card {
    border: 2px solid;
    border-radius: 12px;
    padding: 1.2rem;
    position: relative;
  }
  .principle-card .pct-badge {
    position: absolute;
    top: -10px;
    right: 12px;
    background: #fff;
    padding: 0 0.6rem;
    font-size: 0.8rem;
    font-weight: 700;
    border-radius: 20px;
    border: 2px solid;
  }
  .principle-card h3 {
    font-size: 1rem;
    font-weight: 700;
    margin-bottom: 0.3rem;
  }
  .principle-card .chinese-name {
    font-size: 0.85rem;
    opacity: 0.7;
    margin-bottom: 0.6rem;
  }
  .principle-card .description {
    font-size: 0.85rem;
    margin-bottom: 0.8rem;
    line-height: 1.45;
  }
  .example-group {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
  }
  .example-char {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0.4rem 0.7rem;
    border-radius: 8px;
    font-size: 0.8rem;
  }
  .char-large {
    font-size: 1.8rem;
    line-height: 1.2;
  }
  .char-decomp {
    font-size: 0.7rem;
    opacity: 0.7;
  }

  /* Color coding */
  .card-xingsheng { border-color: #2563eb; }
  .card-xingsheng h3 { color: #2563eb; }
  .card-xingsheng .pct-badge { border-color: #2563eb; color: #2563eb; }
  .card-xingsheng .example-char { background: #eff6ff; }

  .card-huiyi { border-color: #059669; }
  .card-huiyi h3 { color: #059669; }
  .card-huiyi .pct-badge { border-color: #059669; color: #059669; }
  .card-huiyi .example-char { background: #f0fdf4; }

  .card-xiangxing { border-color: #d97706; }
  .card-xiangxing h3 { color: #d97706; }
  .card-xiangxing .pct-badge { border-color: #d97706; color: #d97706; }
  .card-xiangxing .example-char { background: #fffbeb; }

  .card-zhishi { border-color: #7c3aed; }
  .card-zhishi h3 { color: #7c3aed; }
  .card-zhishi .pct-badge { border-color: #7c3aed; color: #7c3aed; }
  .card-zhishi .example-char { background: #faf5ff; }

  .card-jiajie { border-color: #6b7280; }
  .card-jiajie h3 { color: #6b7280; }
  .card-jiajie .pct-badge { border-color: #6b7280; color: #6b7280; }
  .card-jiajie .example-char { background: #f3f4f6; }

  .card-zhuanzhu { border-color: #9ca3af; }
  .card-zhuanzhu h3 { color: #9ca3af; }
  .card-zhuanzhu .pct-badge { border-color: #9ca3af; color: #9ca3af; }
  .card-zhuanzhu .example-char { background: #f9fafb; }

  .insight-box {
    background: #eff6ff;
    border-left: 4px solid #2563eb;
    border-radius: 0 8px 8px 0;
    padding: 1rem 1.2rem;
    font-size: 0.88rem;
    line-height: 1.5;
  }
  .insight-box strong {
    color: #2563eb;
  }

  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid #e9ecef;
  }
  figcaption strong {
    display: block;
    font-size: 1.15rem;
    color: #1a1a2e;
    margin-bottom: 0.4rem;
  }
  figcaption span {
    font-size: 0.9rem;
    color: #6c757d;
    line-height: 1.5;
  }

  @media (prefers-color-scheme: dark) {
    body { background: #1a1a2e; color: #e9ecef; }
    figure { background: #2d2d44; box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
    .diagram-title { color: #e9ecef; }
    .diagram-subtitle { color: #adb5bd; }
    figcaption { border-top-color: #3d3d5c; }
    figcaption strong { color: #e9ecef; }
    figcaption span { color: #adb5bd; }
    .prop-bar-label { color: #adb5bd; }
    .principle-card .pct-badge { background: #2d2d44; }
    .insight-box { background: rgba(37,99,235,0.12); }
    .card-xingsheng .example-char { background: rgba(37,99,235,0.12); color: #93c5fd; }
    .card-huiyi .example-char { background: rgba(5,150,105,0.12); color: #86efac; }
    .card-xiangxing .example-char { background: rgba(217,119,6,0.12); color: #fcd34d; }
    .card-zhishi .example-char { background: rgba(124,58,237,0.12); color: #d8b4fe; }
    .card-jiajie .example-char { background: rgba(107,114,128,0.12); color: #d1d5db; }
    .card-zhuanzhu .example-char { background: rgba(156,163,175,0.12); color: #d1d5db; }
  }
</style>
</head>
<body>
<figure>
  <div class="diagram-title">The Liushu (&#x516D;&#x4E66;) -- Six Principles of Character Formation</div>
  <div class="diagram-subtitle">How Chinese characters are built, classified by formation strategy and their proportions in the modern writing system</div>

  <div class="proportions-bar">
    <div class="prop-segment prop-xingsheng">80-90% Phono-semantic</div>
    <div class="prop-segment prop-huiyi">~13%</div>
    <div class="prop-segment prop-xiangxing">~4%</div>
    <div class="prop-segment prop-zhishi"></div>
  </div>
  <div class="prop-bar-label">Proportion of modern Chinese characters by formation type (phonetic loan and transfer types are usage classifications, not formation methods)</div>

  <div class="principle-grid">
    <div class="principle-card card-xingsheng">
      <div class="pct-badge">80-90%</div>
      <h3>Phono-semantic Compound</h3>
      <div class="chinese-name">&#x5F62;&#x58F0; xingsheng -- "form and sound"</div>
      <div class="description">Combines a semantic radical (meaning hint) with a phonetic component (pronunciation hint). The dominant strategy by far.</div>
      <div class="example-group">
        <div class="example-char"><span class="char-large">&#x6CB3;</span><span class="char-decomp">&#x6C35; water + &#x53EF; ke</span>river</div>
        <div class="example-char"><span class="char-large">&#x5988;</span><span class="char-decomp">&#x5973; woman + &#x9A6C; ma</span>mother</div>
        <div class="example-char"><span class="char-large">&#x6E05;</span><span class="char-decomp">&#x6C35; water + &#x9752; qing</span>clear</div>
      </div>
    </div>

    <div class="principle-card card-huiyi">
      <div class="pct-badge">~13%</div>
      <h3>Compound Ideograph</h3>
      <div class="chinese-name">&#x4F1A;&#x610F; huiyi -- "joined meaning"</div>
      <div class="description">Two or more semantic components combined to create new meaning. Purely meaning-based -- no phonetic component.</div>
      <div class="example-group">
        <div class="example-char"><span class="char-large">&#x660E;</span><span class="char-decomp">&#x65E5; sun + &#x6708; moon</span>bright</div>
        <div class="example-char"><span class="char-large">&#x6797;</span><span class="char-decomp">&#x6728; tree + &#x6728; tree</span>forest</div>
        <div class="example-char"><span class="char-large">&#x770B;</span><span class="char-decomp">&#x624B; hand + &#x76EE; eye</span>look</div>
      </div>
    </div>

    <div class="principle-card card-xiangxing">
      <div class="pct-badge">~4%</div>
      <h3>Pictograph</h3>
      <div class="chinese-name">&#x8C61;&#x5F62; xiangxing -- "resembling form"</div>
      <div class="description">Stylized drawings of physical objects. Historically first, but only a tiny fraction of modern characters. Original iconicity is largely invisible today.</div>
      <div class="example-group">
        <div class="example-char"><span class="char-large">&#x5C71;</span>mountain</div>
        <div class="example-char"><span class="char-large">&#x6728;</span>tree</div>
        <div class="example-char"><span class="char-large">&#x76EE;</span>eye</div>
        <div class="example-char"><span class="char-large">&#x65E5;</span>sun</div>
      </div>
    </div>

    <div class="principle-card card-zhishi">
      <div class="pct-badge">~2%</div>
      <h3>Simple Ideograph</h3>
      <div class="chinese-name">&#x6307;&#x4E8B; zhishi -- "indicating things"</div>
      <div class="description">Abstract indicators for concepts that cannot be drawn. Spatial relationships and numerical values.</div>
      <div class="example-group">
        <div class="example-char"><span class="char-large">&#x4E0A;</span>up/above</div>
        <div class="example-char"><span class="char-large">&#x4E0B;</span>down/below</div>
        <div class="example-char"><span class="char-large">&#x4E00;</span>one</div>
        <div class="example-char"><span class="char-large">&#x4E09;</span>three</div>
      </div>
    </div>

    <div class="principle-card card-jiajie">
      <div class="pct-badge">usage</div>
      <h3>Phonetic Loan</h3>
      <div class="chinese-name">&#x5047;&#x501F; jiajie -- "false borrowing"</div>
      <div class="description">Borrowing a character for an unrelated word that sounds the same. A usage pattern, not a formation method.</div>
      <div class="example-group">
        <div class="example-char"><span class="char-large">&#x6765;</span><span class="char-decomp">originally "wheat"</span>come</div>
      </div>
    </div>

    <div class="principle-card card-zhuanzhu">
      <div class="pct-badge">usage</div>
      <h3>Transfer Character</h3>
      <div class="chinese-name">&#x8F6C;&#x6CE8; zhuanzhu -- "mutual explanation"</div>
      <div class="description">Characters with shared etymology that explain each other. The most debated and least clearly defined category.</div>
      <div class="example-group">
        <div class="example-char"><span class="char-large">&#x8001;</span>old</div>
        <div class="example-char"><span class="char-large">&#x8003;</span><span class="char-decomp">related to &#x8001;</span>examine</div>
      </div>
    </div>
  </div>

  <div class="insight-box">
    <strong>Design lesson:</strong> The overwhelming dominance of phono-semantic compounds (80-90%) demonstrates that purely semantic composition was insufficient for scaling the system. Chinese needed a phonetic escape hatch to disambiguate similar-meaning characters and encode novel terms. Any visual language attempting purely semantic composition will face the same scaling pressure.
  </div>

  <figcaption>
    <strong>Diagram 2: The Liushu -- Six Principles of Character Formation</strong>
    <span>Traditional classification system for Chinese character formation, first described in the Shuowen Jiezi (100 CE). The proportions tell the critical story: pictographs and ideographs together account for only ~19% of characters. The system scaled through phono-semantic compounds, which combine meaning hints with sound hints -- proving that visual semantics alone cannot support a full vocabulary. Sources: Chinese character classification (Wikipedia), Hacking Chinese, StudyCli.</span>
  </figcaption>
</figure>
</body>
</html>
