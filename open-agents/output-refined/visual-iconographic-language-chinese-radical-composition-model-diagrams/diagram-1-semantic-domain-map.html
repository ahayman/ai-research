<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kangxi Radical Semantic Domain Map</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #f8f9fa;
    color: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 2rem;
  }
  figure {
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
    max-width: 1200px;
    width: 100%;
  }
  .diagram-title {
    text-align: center;
    font-size: 1.4rem;
    font-weight: 700;
    margin-bottom: 0.3rem;
    color: #1a1a2e;
  }
  .diagram-subtitle {
    text-align: center;
    font-size: 0.85rem;
    color: #6c757d;
    margin-bottom: 2rem;
  }

  .domain-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 1.5rem;
    margin-bottom: 2rem;
  }
  .domain-card {
    border: 2px solid;
    border-radius: 12px;
    padding: 1.2rem;
    position: relative;
  }
  .domain-card h3 {
    font-size: 1rem;
    font-weight: 700;
    margin-bottom: 0.6rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .domain-card h3 .icon {
    font-size: 1.3rem;
  }
  .radical-row {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin-bottom: 0.5rem;
  }
  .radical-chip {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0.4rem 0.6rem;
    border-radius: 8px;
    font-size: 0.8rem;
    min-width: 65px;
  }
  .radical-char {
    font-size: 1.5rem;
    line-height: 1.2;
    font-weight: 600;
  }
  .radical-meaning {
    font-size: 0.7rem;
    opacity: 0.8;
    margin-top: 0.15rem;
  }
  .radical-count {
    font-size: 0.65rem;
    opacity: 0.6;
    margin-top: 0.1rem;
  }
  .domain-examples {
    font-size: 0.78rem;
    color: #6c757d;
    margin-top: 0.5rem;
    padding-top: 0.5rem;
    border-top: 1px solid rgba(0,0,0,0.08);
  }

  /* Domain color themes */
  .domain-body { border-color: #ef4444; }
  .domain-body h3 { color: #dc2626; }
  .domain-body .radical-chip { background: #fef2f2; }

  .domain-elements { border-color: #3b82f6; }
  .domain-elements h3 { color: #2563eb; }
  .domain-elements .radical-chip { background: #eff6ff; }

  .domain-nature { border-color: #22c55e; }
  .domain-nature h3 { color: #16a34a; }
  .domain-nature .radical-chip { background: #f0fdf4; }

  .domain-human { border-color: #a855f7; }
  .domain-human h3 { color: #9333ea; }
  .domain-human .radical-chip { background: #faf5ff; }

  .domain-tools { border-color: #f59e0b; }
  .domain-tools h3 { color: #d97706; }
  .domain-tools .radical-chip { background: #fffbeb; }

  .domain-structures { border-color: #06b6d4; }
  .domain-structures h3 { color: #0891b2; }
  .domain-structures .radical-chip { background: #ecfeff; }

  .stats-bar {
    display: flex;
    justify-content: space-around;
    padding: 1rem 1.5rem;
    background: #f8f9fa;
    border-radius: 10px;
    margin-bottom: 1.5rem;
  }
  .stat-item {
    text-align: center;
  }
  .stat-value {
    font-size: 1.6rem;
    font-weight: 700;
    color: #1a1a2e;
  }
  .stat-label {
    font-size: 0.75rem;
    color: #6c757d;
    margin-top: 0.2rem;
  }
  .distribution-note {
    text-align: center;
    font-size: 0.8rem;
    color: #9ca3af;
    margin-top: 0.5rem;
    font-style: italic;
  }

  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid #e9ecef;
  }
  figcaption strong {
    display: block;
    font-size: 1.15rem;
    color: #1a1a2e;
    margin-bottom: 0.4rem;
  }
  figcaption span {
    font-size: 0.9rem;
    color: #6c757d;
    line-height: 1.5;
  }

  @media (prefers-color-scheme: dark) {
    body { background: #1a1a2e; color: #e9ecef; }
    figure { background: #2d2d44; box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
    .diagram-title { color: #e9ecef; }
    .diagram-subtitle { color: #adb5bd; }
    figcaption { border-top-color: #3d3d5c; }
    figcaption strong { color: #e9ecef; }
    figcaption span { color: #adb5bd; }
    .stats-bar { background: #23233a; }
    .stat-value { color: #e9ecef; }
    .stat-label { color: #adb5bd; }
    .domain-examples { color: #adb5bd; }
    .distribution-note { color: #6c757d; }

    .domain-body .radical-chip { background: rgba(239,68,68,0.12); color: #fca5a5; }
    .domain-elements .radical-chip { background: rgba(59,130,246,0.12); color: #93c5fd; }
    .domain-nature .radical-chip { background: rgba(34,197,94,0.12); color: #86efac; }
    .domain-human .radical-chip { background: rgba(168,85,247,0.12); color: #d8b4fe; }
    .domain-tools .radical-chip { background: rgba(245,158,11,0.12); color: #fcd34d; }
    .domain-structures .radical-chip { background: rgba(6,182,212,0.12); color: #67e8f9; }
  }
</style>
</head>
<body>
<figure>
  <div class="diagram-title">The Kangxi Radical Semantic Domain Map</div>
  <div class="diagram-subtitle">214 radicals organize Chinese characters into conceptual domains -- a taxonomy of human experience encoded in writing</div>

  <div class="stats-bar">
    <div class="stat-item">
      <div class="stat-value">214</div>
      <div class="stat-label">Kangxi Radicals</div>
    </div>
    <div class="stat-item">
      <div class="stat-value">47,035</div>
      <div class="stat-label">Characters Indexed</div>
    </div>
    <div class="stat-item">
      <div class="stat-value">1,902</div>
      <div class="stat-label">Max (Radical 140: grass)</div>
    </div>
    <div class="stat-item">
      <div class="stat-value">5</div>
      <div class="stat-label">Min (Radical 138)</div>
    </div>
    <div class="stat-item">
      <div class="stat-value">64</div>
      <div class="stat-label">Median per Radical</div>
    </div>
  </div>
  <div class="distribution-note">Distribution is highly unequal -- a few radicals dominate, most index fewer than 100 characters</div>

  <div class="domain-grid">
    <div class="domain-card domain-body">
      <h3><span class="icon">&#x1F9B4;</span> Body Parts</h3>
      <div class="radical-row">
        <div class="radical-chip"><span class="radical-char">口</span><span class="radical-meaning">mouth</span><span class="radical-count">1,146 chars</span></div>
        <div class="radical-chip"><span class="radical-char">目</span><span class="radical-meaning">eye</span><span class="radical-count">601 chars</span></div>
        <div class="radical-chip"><span class="radical-char">耳</span><span class="radical-meaning">ear</span><span class="radical-count">172 chars</span></div>
        <div class="radical-chip"><span class="radical-char">手/扌</span><span class="radical-meaning">hand</span><span class="radical-count">580 chars</span></div>
        <div class="radical-chip"><span class="radical-char">心/忄</span><span class="radical-meaning">heart</span><span class="radical-count">600 chars</span></div>
        <div class="radical-chip"><span class="radical-char">足</span><span class="radical-meaning">foot</span><span class="radical-count">580 chars</span></div>
      </div>
      <div class="domain-examples">Examples: 吃 eat, 看 look, 听 listen, 想 think, 跑 run, 拿 hold</div>
    </div>

    <div class="domain-card domain-elements">
      <h3><span class="icon">&#x1F30A;</span> Natural Elements</h3>
      <div class="radical-row">
        <div class="radical-chip"><span class="radical-char">水/氵</span><span class="radical-meaning">water</span><span class="radical-count">1,167 chars</span></div>
        <div class="radical-chip"><span class="radical-char">火/灬</span><span class="radical-meaning">fire</span><span class="radical-count">639 chars</span></div>
        <div class="radical-chip"><span class="radical-char">土</span><span class="radical-meaning">earth</span><span class="radical-count">580 chars</span></div>
        <div class="radical-chip"><span class="radical-char">金/钅</span><span class="radical-meaning">metal</span><span class="radical-count">888 chars</span></div>
        <div class="radical-chip"><span class="radical-char">木</span><span class="radical-meaning">wood</span><span class="radical-count">1,369 chars</span></div>
      </div>
      <div class="domain-examples">Examples: 河 river, 烧 burn, 城 city, 铁 iron, 林 forest</div>
    </div>

    <div class="domain-card domain-nature">
      <h3><span class="icon">&#x1F3D4;</span> Natural World</h3>
      <div class="radical-row">
        <div class="radical-chip"><span class="radical-char">山</span><span class="radical-meaning">mountain</span><span class="radical-count">636 chars</span></div>
        <div class="radical-chip"><span class="radical-char">雨</span><span class="radical-meaning">rain</span><span class="radical-count">298 chars</span></div>
        <div class="radical-chip"><span class="radical-char">艹</span><span class="radical-meaning">grass</span><span class="radical-count">1,902 chars</span></div>
        <div class="radical-chip"><span class="radical-char">竹</span><span class="radical-meaning">bamboo</span><span class="radical-count">953 chars</span></div>
        <div class="radical-chip"><span class="radical-char">日</span><span class="radical-meaning">sun</span><span class="radical-count">453 chars</span></div>
        <div class="radical-chip"><span class="radical-char">月</span><span class="radical-meaning">moon</span><span class="radical-count">69 chars</span></div>
      </div>
      <div class="domain-examples">Examples: 花 flower, 晴 clear sky, 雪 snow, 笔 brush/pen, 峰 peak</div>
    </div>

    <div class="domain-card domain-human">
      <h3><span class="icon">&#x1F465;</span> Human Categories</h3>
      <div class="radical-row">
        <div class="radical-chip"><span class="radical-char">人/亻</span><span class="radical-meaning">person</span><span class="radical-count">794 chars</span></div>
        <div class="radical-chip"><span class="radical-char">女</span><span class="radical-meaning">woman</span><span class="radical-count">681 chars</span></div>
        <div class="radical-chip"><span class="radical-char">子</span><span class="radical-meaning">child</span><span class="radical-count">83 chars</span></div>
      </div>
      <div class="domain-examples">Examples: 他 he, 她 she, 好 good, 孩 child, 你 you</div>
    </div>

    <div class="domain-card domain-tools">
      <h3><span class="icon">&#x1F528;</span> Actions / Tools</h3>
      <div class="radical-row">
        <div class="radical-chip"><span class="radical-char">刀/刂</span><span class="radical-meaning">knife</span><span class="radical-count">377 chars</span></div>
        <div class="radical-chip"><span class="radical-char">弓</span><span class="radical-meaning">bow</span><span class="radical-count">165 chars</span></div>
        <div class="radical-chip"><span class="radical-char">车</span><span class="radical-meaning">vehicle</span><span class="radical-count">361 chars</span></div>
        <div class="radical-chip"><span class="radical-char">言/讠</span><span class="radical-meaning">speech</span><span class="radical-count">861 chars</span></div>
        <div class="radical-chip"><span class="radical-char">力</span><span class="radical-meaning">force</span><span class="radical-count">163 chars</span></div>
      </div>
      <div class="domain-examples">Examples: 切 cut, 说 speak, 转 turn, 强 strong, 张 stretch</div>
    </div>

    <div class="domain-card domain-structures">
      <h3><span class="icon">&#x1F3E0;</span> Containers / Enclosures</h3>
      <div class="radical-row">
        <div class="radical-chip"><span class="radical-char">囗</span><span class="radical-meaning">enclosure</span><span class="radical-count">118 chars</span></div>
        <div class="radical-chip"><span class="radical-char">宀</span><span class="radical-meaning">roof</span><span class="radical-count">246 chars</span></div>
        <div class="radical-chip"><span class="radical-char">门</span><span class="radical-meaning">door</span><span class="radical-count">246 chars</span></div>
      </div>
      <div class="domain-examples">Examples: 国 country, 家 home, 间 room, 围 surround, 窗 window</div>
    </div>
  </div>

  <figcaption>
    <strong>Diagram 1: The Kangxi Radical Semantic Domain Map</strong>
    <span>Six major semantic domains organize the 214 Kangxi radicals into a conceptual taxonomy. Each radical signals the meaning territory of every character it appears in -- a finite inventory of semantic building blocks generating an open-ended vocabulary. The grass/plant radical (radical 140) indexes the most characters at 1,902, while radical 138 indexes only 5. This unequal distribution reflects the domains most important to the culture that created the system. For a visual language, this demonstrates that a manageable set of visual primitives can organize an entire vocabulary. Sources: Kangxi Dictionary (1716), Wikipedia.</span>
  </figcaption>
</figure>
</body>
</html>
