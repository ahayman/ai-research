<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arabic vs. English Vocabulary Architecture</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --accent: #4361ee;
    --muted: #6c757d;
    --caption-bg: #f8f9fa;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --accent: #6b8aff;
      --muted: #9a9ab0;
      --caption-bg: #1a1a2e;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure { max-width: 1100px; width: 100%; }
  .diagram-container {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.5rem 1rem;
    overflow-x: auto;
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding: 1rem 1.5rem;
    background: var(--caption-bg);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
</style>
</head>
<body>
<figure>
  <div class="diagram-container">
    <pre class="mermaid">
flowchart LR
    subgraph ARABIC["<strong>ARABIC: Root-Generated Lexicon</strong><br/><em>One system generates all vocabulary</em>"]
        direction TB
        AR_ROOT["<strong>Root: ʿ-l-m</strong><br/>ع-ل-م<br/>(KNOWLEDGE)"]
        AR_ROOT --> AR1["ʿilm<br/>knowledge / science"]
        AR_ROOT --> AR2["ʿ&amacr;lim<br/>scholar"]
        AR_ROOT --> AR3["ʿallama<br/>he taught"]
        AR_ROOT --> AR4["taʿallama<br/>he learned"]
        AR_ROOT --> AR5["muʿallim<br/>teacher"]
        AR_ROOT --> AR6["iʿl&amacr;m<br/>media"]
        AR_ROOT --> AR7["ʿ&amacr;lam<br/>world"]
        AR_ROOT --> AR8["maʿl&umacr;ma<br/>information"]

        AR_REG["<strong>Register via GRAMMAR</strong><br/>Case endings = formal<br/>Dialect switch = informal<br/><em>Same vocabulary, different grammar</em>"]
    end

    subgraph ENGLISH["<strong>ENGLISH: Three-Layer Assembled Lexicon</strong><br/><em>Three historical sources, opaque connections</em>"]
        direction TB
        subgraph GERM["Germanic Layer (~25%)"]
            G1["know"]
            G2["teach"]
            G3["learn"]
            G4["wise"]
        end
        subgraph FRENCH["French Layer (~29%)"]
            F1["science"]
            F2["educate"]
            F3["inform"]
        end
        subgraph LATIN["Latin/Greek Layer (~29%)"]
            L1["erudite"]
            L2["pedagogy"]
            L3["epistemology"]
        end
        EN_REG["<strong>Register via VOCABULARY SOURCE</strong><br/>ask (Germanic) = casual<br/>question (French) = neutral<br/>interrogate (Latin) = formal"]
    end

    COMPARE["<strong>KEY CONTRAST</strong><br/>Arabic: GENERATIVE system<br/>All words from root + pattern<br/>Transparent connections<br/>---<br/>English: ASSEMBLED collection<br/>Words from 3+ source languages<br/>Opaque connections"]

    style ARABIC fill:#dcfce7,stroke:#16a34a,color:#14532d
    style AR_ROOT fill:#bbf7d0,stroke:#16a34a,color:#14532d
    style AR1 fill:#f0fdf4,stroke:#22c55e,color:#14532d
    style AR2 fill:#f0fdf4,stroke:#22c55e,color:#14532d
    style AR3 fill:#f0fdf4,stroke:#22c55e,color:#14532d
    style AR4 fill:#f0fdf4,stroke:#22c55e,color:#14532d
    style AR5 fill:#f0fdf4,stroke:#22c55e,color:#14532d
    style AR6 fill:#f0fdf4,stroke:#22c55e,color:#14532d
    style AR7 fill:#f0fdf4,stroke:#22c55e,color:#14532d
    style AR8 fill:#f0fdf4,stroke:#22c55e,color:#14532d
    style AR_REG fill:#bbf7d0,stroke:#16a34a,color:#14532d

    style ENGLISH fill:#fce7f3,stroke:#db2777,color:#831843
    style GERM fill:#fee2e2,stroke:#dc2626,color:#7f1d1d
    style FRENCH fill:#fef3c7,stroke:#d97706,color:#78350f
    style LATIN fill:#ede9fe,stroke:#7c3aed,color:#3b0764
    style G1 fill:#fef2f2,stroke:#f87171,color:#7f1d1d
    style G2 fill:#fef2f2,stroke:#f87171,color:#7f1d1d
    style G3 fill:#fef2f2,stroke:#f87171,color:#7f1d1d
    style G4 fill:#fef2f2,stroke:#f87171,color:#7f1d1d
    style F1 fill:#fefce8,stroke:#eab308,color:#78350f
    style F2 fill:#fefce8,stroke:#eab308,color:#78350f
    style F3 fill:#fefce8,stroke:#eab308,color:#78350f
    style L1 fill:#f5f3ff,stroke:#8b5cf6,color:#3b0764
    style L2 fill:#f5f3ff,stroke:#8b5cf6,color:#3b0764
    style L3 fill:#f5f3ff,stroke:#8b5cf6,color:#3b0764
    style EN_REG fill:#fdf2f8,stroke:#ec4899,color:#831843

    style COMPARE fill:#e0f2fe,stroke:#0284c7,color:#0c4a6e
    </pre>
  </div>
  <figcaption>
    <h2>Figure 4 &mdash; Arabic vs. English Vocabulary Architecture</h2>
    <p>The fundamental architectural difference between two lexicons. Left (green): Arabic generates all eight words from a single root (ʿ-l-m) through predictable patterns -- every word is visibly related. Right (pink): English distributes the same semantic territory across three historically separate layers -- Germanic (red), French (amber), Latin/Greek (purple) -- with no visible connection between "know," "science," and "epistemology." Arabic achieves register variation through grammar (adding case endings, switching dialects); English achieves register variation through vocabulary source (Germanic = casual, French = neutral, Latin = formal).</p>
  </figcaption>
</figure>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<script>
  mermaid.initialize({
    startOnLoad: true,
    theme: window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'neutral',
    flowchart: { useMaxWidth: true, htmlLabels: true }
  });
</script>
</body>
</html>
