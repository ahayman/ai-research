<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Root Semantic Network: The k-t-b Web</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --accent: #4361ee;
    --muted: #6c757d;
    --caption-bg: #f8f9fa;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --accent: #6b8aff;
      --muted: #9a9ab0;
      --caption-bg: #1a1a2e;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure { max-width: 1100px; width: 100%; }
  .diagram-container {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.5rem 1rem;
    overflow-x: auto;
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding: 1rem 1.5rem;
    background: var(--caption-bg);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
</style>
</head>
<body>
<figure>
  <div class="diagram-container">
    <pre class="mermaid">
flowchart TD
    ROOT["<strong>k-t-b  ك-ت-ب</strong><br/><em>Core domain: WRITING</em><br/>Three consonants = one semantic universe"]

    ROOT --> VERBS
    ROOT --> PARTS
    ROOT --> NOUNS
    ROOT --> PLACES

    subgraph VERBS["VERB FORMS"]
        V1["<strong>kataba</strong> كَتَبَ<br/>he wrote<br/><em>Form I &mdash; basic</em>"]
        V2["<strong>kattaba</strong> كَتَّبَ<br/>he dictated / made write<br/><em>Form II &mdash; causative</em>"]
        V3["<strong>k&amacr;taba</strong> كَاتَبَ<br/>he corresponded with<br/><em>Form III &mdash; reciprocal</em>"]
        V8["<strong>iktataba</strong> اكْتَتَبَ<br/>he subscribed / copied<br/><em>Form VIII &mdash; reflexive</em>"]
        V10["<strong>istaktaba</strong> اسْتَكْتَبَ<br/>he requested writing<br/><em>Form X &mdash; seeking</em>"]
    end

    subgraph PARTS["PARTICIPLES"]
        PA["<strong>k&amacr;tib</strong> كَاتِب<br/>writer / scribe<br/><em>Active participle</em>"]
        PP["<strong>makt&umacr;b</strong> مَكْتُوب<br/>written / letter / fate<br/><em>Passive participle</em>"]
    end

    subgraph NOUNS["NOUNS &amp; VERBAL NOUNS"]
        N1["<strong>kit&amacr;b</strong> كِتَاب<br/>book"]
        N2["<strong>kutub</strong> كُتُب<br/>books (broken plural)"]
        N3["<strong>kit&amacr;ba</strong> كِتَابَة<br/>the act of writing<br/><em>Masdar (verbal noun)</em>"]
        N4["<strong>kutt&amacr;b</strong> كُتَّاب<br/>writers / Quranic school"]
    end

    subgraph PLACES["NOUNS OF PLACE"]
        P1["<strong>maktab</strong> مَكْتَب<br/>desk / office<br/><em>Where writing happens</em>"]
        P2["<strong>maktaba</strong> مَكْتَبَة<br/>library / bookstore<br/><em>Where books are</em>"]
    end

    ENG["<strong>ENGLISH: No equivalent system</strong><br/>write (Germanic) &bull; author (Latin) &bull; script (Latin)<br/>book (Germanic) &bull; library (French) &bull; correspond (Latin)<br/><em>Six unrelated roots vs. one Arabic root</em>"]

    style ROOT fill:#e0f2fe,stroke:#0284c7,color:#0c4a6e
    style VERBS fill:#dcfce7,stroke:#16a34a,color:#14532d
    style V1 fill:#f0fdf4,stroke:#22c55e,color:#14532d
    style V2 fill:#f0fdf4,stroke:#22c55e,color:#14532d
    style V3 fill:#f0fdf4,stroke:#22c55e,color:#14532d
    style V8 fill:#f0fdf4,stroke:#22c55e,color:#14532d
    style V10 fill:#f0fdf4,stroke:#22c55e,color:#14532d
    style PARTS fill:#fef3c7,stroke:#d97706,color:#78350f
    style PA fill:#fefce8,stroke:#eab308,color:#78350f
    style PP fill:#fefce8,stroke:#eab308,color:#78350f
    style NOUNS fill:#fce7f3,stroke:#db2777,color:#831843
    style N1 fill:#fdf2f8,stroke:#ec4899,color:#831843
    style N2 fill:#fdf2f8,stroke:#ec4899,color:#831843
    style N3 fill:#fdf2f8,stroke:#ec4899,color:#831843
    style N4 fill:#fdf2f8,stroke:#ec4899,color:#831843
    style PLACES fill:#ede9fe,stroke:#7c3aed,color:#3b0764
    style P1 fill:#f5f3ff,stroke:#8b5cf6,color:#3b0764
    style P2 fill:#f5f3ff,stroke:#8b5cf6,color:#3b0764
    style ENG fill:#fee2e2,stroke:#dc2626,color:#7f1d1d
    </pre>
  </div>
  <figcaption>
    <h2>Figure 1 &mdash; Root Semantic Network: The k-t-b Web</h2>
    <p>A single trilateral root (k-t-b) generates an entire family of related words through systematic patterns. Green = verb forms (each form applies a predictable semantic modification). Amber = participles (doer and done-to). Pink = nouns and verbal nouns. Purple = nouns of place. Red = English comparison showing that the same semantic territory requires six unrelated words from three different source languages. In Arabic, every word is transparently connected to its root; in English, the connections are invisible without etymological knowledge.</p>
  </figcaption>
</figure>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<script>
  mermaid.initialize({
    startOnLoad: true,
    theme: window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'neutral',
    flowchart: { useMaxWidth: true, htmlLabels: true }
  });
</script>
</body>
</html>
