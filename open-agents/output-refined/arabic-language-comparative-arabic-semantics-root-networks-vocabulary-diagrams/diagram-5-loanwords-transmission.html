<title>Arabic Loanwords in English: Domains and Transmission Routes</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --accent: #4361ee;
    --muted: #6c757d;
    --caption-bg: #f8f9fa;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --accent: #6b8aff;
      --muted: #9a9ab0;
      --caption-bg: #1a1a2e;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure { max-width: 1100px; width: 100%; }
  .diagram-container {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;

    overflow-x: auto;
  }

    text-align: center;
    margin-top: 1.5rem;

    border-radius: 8px;

  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }

flowchart TD

    SOURCE --> MATH

    subgraph MATH["MATHEMATICS"]

        A2["<strong>nadir</strong><br/>&larr; naz&imacr;r نظير<br/><em>opposite</em>"]
        A3["<strong>azimuth</strong><br/>&larr; al-sum&umacr;t السموت<br/><em>the directions</em>"]
    end

    subgraph CHEM["CHEMISTRY"]
        C1["<strong>alchemy / chemistry</strong><br/>&larr; al-k&imacr;miy&amacr;ʾ الكيمياء"]

  </div>
  <figcaption>
    <h2>Figure 5 &mdash; Arabic Loanwords in English: Domains and Transmission Routes</h2>
    <p>The OED documents 900+ English words of Arabic origin, clustering in domains where Arabic-speaking civilization was dominant during the 8th-13th centuries. Green = mathematics (algebra, algorithm, zero). Amber = astronomy (zenith, nadir, azimuth). Pink = chemistry (alchemy, alcohol). Purple = commerce (tariff, magazine, cotton). Orange = food (coffee, sugar, lemon). Red = military (admiral, arsenal). Most words entered English indirectly through Medieval Latin and Old French via Spain's convivencia or Crusader contact. The domain clustering is a fossil record of cultural power dynamics -- loanwords map to areas of intellectual and commercial dominance.</p>
  </figcaption>
</figure>
