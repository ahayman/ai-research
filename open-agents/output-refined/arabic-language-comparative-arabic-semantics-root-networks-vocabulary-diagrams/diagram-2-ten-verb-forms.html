<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Ten Verb Forms as Semantic Operators</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --accent: #4361ee;
    --muted: #6c757d;
    --caption-bg: #f8f9fa;
    --header-bg: #e0f2fe;
    --header-border: #0284c7;
    --header-text: #0c4a6e;
    --pair-a: #dcfce7;
    --pair-a-border: #16a34a;
    --pair-b: #fef3c7;
    --pair-b-border: #d97706;
    --pair-c: #fce7f3;
    --pair-c-border: #db2777;
    --pair-d: #ede9fe;
    --pair-d-border: #7c3aed;
    --cell-text: #1a1a2e;
    --highlight: #fef9c3;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --accent: #6b8aff;
      --muted: #9a9ab0;
      --caption-bg: #1a1a2e;
      --header-bg: #1e3a5f;
      --header-border: #6b8aff;
      --header-text: #c8ddf0;
      --pair-a: #064e3b;
      --pair-a-border: #34d399;
      --pair-b: #78350f;
      --pair-b-border: #fbbf24;
      --pair-c: #831843;
      --pair-c-border: #f472b6;
      --pair-d: #3b0764;
      --pair-d-border: #a78bfa;
      --cell-text: #e8e8f0;
      --highlight: #422006;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.5;
  }
  figure { max-width: 1200px; width: 100%; }
  .diagram-container {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.5rem 1rem;
    overflow-x: auto;
  }
  table { border-collapse: collapse; width: 100%; min-width: 900px; font-size: 0.85rem; }
  th {
    background: var(--header-bg);
    border: 2px solid var(--header-border);
    color: var(--header-text);
    padding: 0.6rem 0.5rem;
    text-align: center;
    font-weight: 700;
    font-size: 0.9rem;
  }
  td {
    border: 1px solid var(--border);
    padding: 0.5rem;
    vertical-align: top;
    color: var(--cell-text);
  }
  .form-col { font-weight: 700; text-align: center; width: 60px; }
  .template-col { font-family: monospace; text-align: center; font-size: 0.9rem; width: 100px; }
  .function-col { font-style: italic; width: 140px; }
  .root-col { width: 180px; }
  .root-col .ar { font-size: 0.75rem; color: var(--muted); }
  .pair-marker { font-size: 0.7rem; padding: 0.1rem 0.4rem; border-radius: 3px; font-weight: 600; display: inline-block; margin-left: 0.3rem; }
  .pair-II-V { background: var(--pair-a); border: 1px solid var(--pair-a-border); }
  .pair-III-VI { background: var(--pair-b); border: 1px solid var(--pair-b-border); }
  .highlight-row { background: var(--highlight); }
  .eng-row td { background: var(--pair-c); border-color: var(--pair-c-border); font-style: italic; }
  .section-label { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--accent); }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding: 1rem 1.5rem;
    background: var(--caption-bg);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
</style>
</head>
<body>
<figure>
  <div class="diagram-container">
    <table>
      <thead>
        <tr>
          <th>Form</th>
          <th>Template</th>
          <th>Semantic Function</th>
          <th>Root: ʿ-l-m (KNOW)</th>
          <th>Root: k-t-b (WRITE)</th>
          <th>Root: d-r-s (STUDY)</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td class="form-col">I</td>
          <td class="template-col">faʿala</td>
          <td class="function-col"><strong>Basic meaning</strong></td>
          <td class="root-col">ʿalima = he knew <span class="ar">عَلِمَ</span></td>
          <td class="root-col">kataba = he wrote <span class="ar">كَتَبَ</span></td>
          <td class="root-col">darasa = he studied <span class="ar">دَرَسَ</span></td>
        </tr>
        <tr class="highlight-row">
          <td class="form-col">II</td>
          <td class="template-col">faʿʿala</td>
          <td class="function-col"><strong>Causative / Intensive</strong> <span class="pair-marker pair-II-V">II-V pair</span></td>
          <td class="root-col">ʿallama = he taught <span class="ar">عَلَّمَ</span><br/>(caused to know)</td>
          <td class="root-col">kattaba = he dictated <span class="ar">كَتَّبَ</span><br/>(caused to write)</td>
          <td class="root-col">darrasa = he taught <span class="ar">دَرَّسَ</span><br/>(caused to study)</td>
        </tr>
        <tr>
          <td class="form-col">III</td>
          <td class="template-col">faaʿala</td>
          <td class="function-col"><strong>Reciprocal / Mutual</strong> <span class="pair-marker pair-III-VI">III-VI pair</span></td>
          <td class="root-col">ʿaalama = he competed in knowledge <span class="ar">عَالَمَ</span></td>
          <td class="root-col">kaataba = he corresponded with <span class="ar">كَاتَبَ</span></td>
          <td class="root-col">daarasa = he studied with <span class="ar">دَارَسَ</span></td>
        </tr>
        <tr>
          <td class="form-col">IV</td>
          <td class="template-col">afʿala</td>
          <td class="function-col"><strong>Causative (transitive)</strong></td>
          <td class="root-col">aʿlama = he informed <span class="ar">أَعْلَمَ</span><br/>(made to know)</td>
          <td class="root-col">aktaba = he made write <span class="ar">أَكْتَبَ</span></td>
          <td class="root-col">&mdash;</td>
        </tr>
        <tr class="highlight-row">
          <td class="form-col">V</td>
          <td class="template-col">tafaʿʿala</td>
          <td class="function-col"><strong>Reflexive of II</strong> <span class="pair-marker pair-II-V">II-V pair</span></td>
          <td class="root-col">taʿallama = he learned <span class="ar">تَعَلَّمَ</span><br/>(taught himself)</td>
          <td class="root-col">&mdash;</td>
          <td class="root-col">tadarrasa = he studied intensively <span class="ar">تَدَرَّسَ</span></td>
        </tr>
        <tr>
          <td class="form-col">VI</td>
          <td class="template-col">tafaaʿala</td>
          <td class="function-col"><strong>Mutual / Pretense</strong> <span class="pair-marker pair-III-VI">III-VI pair</span></td>
          <td class="root-col">taʿaalama = he pretended to know <span class="ar">تَعَالَمَ</span></td>
          <td class="root-col">takaatabuu = they corresponded <span class="ar">تَكَاتَبُوا</span></td>
          <td class="root-col">tadaarasuu = they studied together <span class="ar">تَدَارَسُوا</span></td>
        </tr>
        <tr>
          <td class="form-col">VII</td>
          <td class="template-col">infaʿala</td>
          <td class="function-col"><strong>Passive / Spontaneous</strong></td>
          <td class="root-col" colspan="3" style="text-align:center; font-style:italic; color: var(--muted);">Form VII is relatively rare and often restricted to specific roots (inkataba = it was registered)</td>
        </tr>
        <tr>
          <td class="form-col">VIII</td>
          <td class="template-col">iftaʿala</td>
          <td class="function-col"><strong>Reflexive / Effort</strong></td>
          <td class="root-col">&mdash;</td>
          <td class="root-col">iktataba = he copied / subscribed <span class="ar">اكْتَتَبَ</span></td>
          <td class="root-col">&mdash;</td>
        </tr>
        <tr>
          <td class="form-col">IX</td>
          <td class="template-col">ifʿalla</td>
          <td class="function-col"><strong>Colors / Physical traits</strong></td>
          <td class="root-col" colspan="3" style="text-align:center; font-style:italic; color: var(--muted);">Restricted to color/defect roots only: ihmarra = it turned red; iswadda = it turned black</td>
        </tr>
        <tr>
          <td class="form-col">X</td>
          <td class="template-col">istafʿala</td>
          <td class="function-col"><strong>Seeking / Considering</strong></td>
          <td class="root-col">istaʿlama = he inquired <span class="ar">اسْتَعْلَمَ</span><br/>(sought to know)</td>
          <td class="root-col">istaktaba = he requested writing <span class="ar">اسْتَكْتَبَ</span></td>
          <td class="root-col">&mdash;</td>
        </tr>
        <tr class="eng-row">
          <td colspan="3" style="text-align:right; font-weight:700;">ENGLISH equivalent words:</td>
          <td class="root-col">know, teach, learn, inform, inquire &mdash; 5 unrelated verbs</td>
          <td class="root-col">write, dictate, correspond, copy, request &mdash; 5 unrelated verbs</td>
          <td class="root-col">study, teach, cram &mdash; 3 unrelated verbs</td>
        </tr>
      </tbody>
    </table>
  </div>
  <figcaption>
    <h2>Figure 2 &mdash; The Ten Verb Forms as Semantic Operators</h2>
    <p>Each verb form applies the SAME semantic modification across ALL roots. Form II always makes causative ("he caused X to happen"), Form V always makes reflexive of II ("he did X to himself"), Form X always means "to seek X." The green-tagged II-V pair (causative / reflexive) and amber-tagged III-VI pair (directed mutual / generalized mutual) are the most productive linked pairs. The pink row at bottom shows what English must do instead: use completely separate, unrelated verbs for each semantic modification. Arabic computes meaning; English memorizes it.</p>
  </figcaption>
</figure>
</body>
</html>
