  <figcaption>
    <h2>Figure 3 &mdash; Three Root Domains Compared: s-l-m, ʿ-l-m, k-t-b</h2>
    <p>Three complete root families displayed in parallel to demonstrate the system's consistency. Green = s-l-m (peace/submission, 140 Quranic occurrences in 16 derived forms). Amber = ʿ-l-m (knowledge, generating words for scholar, world, flag, media). Pink = k-t-b (writing, generating words from book to library). The same derivational patterns produce structurally parallel words across all three roots: Form II is always causative, active participles always name the doer, place nouns always name where the action occurs. The parallel structure IS the pattern.</p>
  </figcaption>
