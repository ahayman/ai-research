<figure class="concept-diagram" id="diagram-transparency">
  <div class="diagram-container">
    <pre class="mermaid">
flowchart LR
    subgraph TRANS["TRANSPARENT"]
        T1["Photograph of cup<br/>= 'cup'<br/>---<br/>Immediately guessable<br/>No teaching needed"]
    end

    subgraph TRANSLUC["TRANSLUCENT"]
        T2["Line drawing of cup (PCS)<br/>= 'cup'<br/>---<br/>Requires some inference<br/>Connection learnable"]
    end

    subgraph OPAQUE["OPAQUE"]
        T3["Blissymbol for 'cup'<br/>= water + container<br/>---<br/>Requires explicit teaching<br/>Systematic rules apply"]
    end

    subgraph ABSTRACT["ABSTRACT"]
        T4["Bliss modifier symbols<br/>= grammatical markers<br/>---<br/>Meaning from rules only<br/>Highest learning cost"]
    end

    TRANS --> TRANSLUC --> OPAQUE --> ABSTRACT

    LEARN["LEARNABILITY<br/>decreases"]
    EXPRESS["EXPRESSIVE POWER<br/>increases"]

    LEARN -.-> TRANS
    EXPRESS -.-> ABSTRACT

    TRADE["TRADE-OFF: Transparent symbols<br/>are easier to learn but less flexible.<br/>Opaque compositional systems offer<br/>more expressive power at the cost<br/>of a steeper learning curve."]

  <figcaption>
    <strong>Figure 3:</strong> The symbol transparency spectrum, from immediately guessable photographs (transparent) through line drawings (translucent) to abstract compositional symbols (opaque). There is an inherent trade-off: transparent symbols are easier to learn but represent fixed concepts, while opaque compositional systems like Blissymbols offer greater expressive power -- the ability to construct novel meanings from base elements -- at the cost of a steeper learning curve.
  </figcaption>
