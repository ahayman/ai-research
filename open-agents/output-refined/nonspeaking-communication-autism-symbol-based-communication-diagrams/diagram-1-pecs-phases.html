<!-- Description: Stepped progression through PECS phases from basic physical exchange (Phase I) to spontaneous commenting (Phase VI), with communicative function labels at each phase and notation about where programs commonly stall. -->

<figure class="concept-diagram" id="diagram-pecs-phases">
  <div class="diagram-container">
    <pre class="mermaid">
flowchart TD
    P1["PHASE I: How to Communicate<br/>---<br/>Physical exchange: pick up picture,<br/>hand to partner, receive item<br/>---<br/>Function: Basic MAND (request)"]

    P2["PHASE II: Distance & Persistence<br/>---<br/>Travel to communication partner<br/>and communication book<br/>---<br/>Function: Persistent MAND"]

    P3["PHASE III: Picture Discrimination<br/>---<br/>Select correct picture from<br/>array of multiple options<br/>---<br/>Function: Specific MAND"]

    STALL["WARNING: Many programs<br/>stall here at requesting.<br/>Phases IV-VI require<br/>intentional programming."]

    P4["PHASE IV: Sentence Structure<br/>---<br/>Construct on sentence strip:<br/>'I want' + item picture<br/>---<br/>Function: Structured MAND"]

    P5["PHASE V: Responding to Questions<br/>---<br/>Answer 'What do you want?'<br/>using picture selection<br/>---<br/>Function: Responsive MAND<br/>(emerging INTRAVERBAL)"]

    P6["PHASE VI: Commenting<br/>---<br/>Respond to 'What do you see?'<br/>'What do you hear?'<br/>Spontaneous comments<br/>---<br/>Function: TACT (label/comment)"]

    P1 --> P2 --> P3 --> P4 --> P5 --> P6

    P3 -.-> STALL

    style P1 fill:#e0f2fe,stroke:#0284c7,color:#1e3a5f
    style P2 fill:#dbeafe,stroke:#2563eb,color:#1e3a5f
    style P3 fill:#bfdbfe,stroke:#3b82f6,color:#1e3a5f
    style P4 fill:#dcfce7,stroke:#16a34a,color:#14532d
    style P5 fill:#bbf7d0,stroke:#15803d,color:#14532d
    style P6 fill:#86efac,stroke:#059669,color:#14532d
    style STALL fill:#fee2e2,stroke:#dc2626,color:#7f1d1d
    </pre>
  </div>
  <figcaption>
    <strong>Figure 1:</strong> The six phases of PECS (Picture Exchange Communication System), developed by Bondy and Frost (1985). Phases I-III focus on requesting (mands in Skinner's verbal behavior framework); Phases IV-VI progress to sentence construction and commenting (tacts). A critical gap exists between Phase III and the higher phases -- many programs stall at requesting, and advancing to commenting and social functions requires intentional, systematic programming.
  </figcaption>
</figure>
