<!-- Diagram: Symbol System Comparison Matrix -->
<!-- Type: flowchart -->
<!-- Generated: 2026-03-31 -->
<!-- Description: Comparison of major symbol systems (PECS, Makaton, Blissymbols, PCS, Widgit, ARASAAC) across key dimensions: iconicity, compositionality, modality, evidence base, primary population, and cost. -->

<figure class="concept-diagram" id="diagram-symbol-comparison">
  <div class="diagram-container">
    <pre class="mermaid">
flowchart TD
    subgraph PECS_SYS["PECS"]
        PECS_I["Iconicity: Transparent<br/>(uses photos or PCS symbols)"]
        PECS_C["Compositionality: Fixed<br/>(each concept = one picture)"]
        PECS_M["Modality: Picture exchange"]
        PECS_E["Evidence: Strong<br/>(multiple RCTs, meta-analyses)"]
        PECS_P["Population: Primarily autism"]
        PECS_COST["Cost: ~$400 training +<br/>materials"]
    end

    subgraph MAK_SYS["MAKATON"]
        MAK_I["Iconicity: Translucent<br/>(simplified signs + symbols)"]
        MAK_C["Compositionality: Fixed<br/>(key-word signing)"]
        MAK_M["Modality: Signs + symbols<br/>+ speech together"]
        MAK_E["Evidence: Moderate<br/>(widespread use, limited RCTs)"]
        MAK_P["Population: 100,000+ UK users<br/>(cross-disability)"]
        MAK_COST["Cost: Training required;<br/>programs in 40+ countries"]
    end

    subgraph BLISS_SYS["BLISSYMBOLS"]
        BLISS_I["Iconicity: Opaque<br/>(abstract base elements)"]
        BLISS_C["Compositionality: HIGH<br/>(~120 elements build 6,100+)"]
        BLISS_M["Modality: Graphic symbols"]
        BLISS_E["Evidence: Limited<br/>(primarily cerebral palsy)"]
        BLISS_P["Population: Primarily<br/>physical disability / CP"]
        BLISS_COST["Cost: Free (BCI authorized<br/>vocabulary available)"]
    end

    subgraph ARASAAC_SYS["ARASAAC"]
        ARA_I["Iconicity: HIGHEST across<br/>grammatical categories"]
        ARA_C["Compositionality: Fixed"]
        ARA_M["Modality: Graphic symbols"]
        ARA_E["Evidence: Growing<br/>(transparency research strong)"]
        ARA_P["Population: Cross-disability<br/>(international)"]
        ARA_COST["Cost: FREE & open-source"]
    end

    style PECS_SYS fill:#dbeafe,stroke:#2563eb,color:#1e3a5f
    style MAK_SYS fill:#dcfce7,stroke:#16a34a,color:#14532d
    style BLISS_SYS fill:#fae8ff,stroke:#a855f7,color:#581c87
    style ARASAAC_SYS fill:#fef3c7,stroke:#d97706,color:#78350f
    </pre>
  </div>
  <figcaption>
    <strong>Figure 2:</strong> Comparison of major symbol-based communication systems across key dimensions. PECS has the strongest evidence base for autism; Makaton is the most widely adopted in the UK; Blissymbols has the highest compositionality (building complex meanings from ~120 base elements); and ARASAAC demonstrates the best iconicity across grammatical categories while being free and open-source. PCS (Mayer-Johnson) and Widgit are symbol <em>sets</em> used within other systems rather than communication systems themselves.
  </figcaption>
</figure>
