<!-- Type: flowchart -->

<!-- Description: Pyramid/hierarchy showing the developmental progression of communicative functions taught through symbol systems, from requesting at the base to narrating/expressing emotions at the top. Highlights the gap between where most programs stop (requesting) and the full range of human communication. -->

<figure class="concept-diagram" id="diagram-comm-functions">
  <div class="diagram-container">
    <pre class="mermaid">
flowchart TD
    L6["LEVEL 6: Narrating, Explaining,<br/>Expressing Emotions, Humor<br/>---<br/>Complex, personal expression<br/>Rarely reached in programs"]

    L5["LEVEL 5: Asking Questions<br/>---<br/>Requesting information<br/>'What is that?' 'Where are we going?'"]

    L4["LEVEL 4: Commenting<br/>---<br/>Sharing observations, labeling<br/>'I see dog' 'That's funny'<br/>Skinner: TACT"]

    L3["LEVEL 3: Social Routines<br/>---<br/>Greetings, turn-taking<br/>'Hello' 'My turn' 'Thank you'"]

    L2["LEVEL 2: Rejecting / Protesting<br/>---<br/>Saying no, refusing<br/>'Stop' 'No more' 'I don't want'"]

    L1["LEVEL 1: REQUESTING<br/>---<br/>Getting needs met<br/>'I want crackers' 'More juice'<br/>Skinner: MAND<br/>---<br/>MOST COMMONLY TAUGHT<br/>STRONGEST EVIDENCE"]

    L6 --> L5 --> L4 --> L3 --> L2 --> L1

    GAP["THE GAP: Most intervention<br/>programs stall at requesting.<br/>The full range of human<br/>communication extends far<br/>beyond getting needs met."]

    GAP -.-> L1

    style L1 fill:#dbeafe,stroke:#2563eb,color:#1e3a5f
    style L2 fill:#e0f2fe,stroke:#0284c7,color:#1e3a5f
    style L3 fill:#dcfce7,stroke:#16a34a,color:#14532d
    style L4 fill:#bbf7d0,stroke:#15803d,color:#14532d
    style L5 fill:#fef3c7,stroke:#d97706,color:#78350f
    style L6 fill:#fae8ff,stroke:#a855f7,color:#581c87
    style GAP fill:#fee2e2,stroke:#dc2626,color:#7f1d1d
    </pre>
  </div>
  <figcaption>
    <strong>Figure 4:</strong> The communicative functions hierarchy in symbol-based communication. Most programs begin with -- and many never progress beyond -- requesting (Level 1, the mand in Skinner's framework). The full range of human communication includes rejecting, social routines, commenting (tacts), questioning, and narrating. The gap between where most intervention stops and what communication actually encompasses represents a significant limitation of current practice.
  </figcaption>
</figure>
