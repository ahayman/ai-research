<!-- Diagram: Symbol-Based Communication to Language Development Pathways -->
<!-- Type: flowchart -->
<!-- Generated: 2026-03-31 -->
<!-- Description: Flowchart with branching paths showing the different trajectories from symbol-based communication: bridge to speech, bridge to text/literacy, lifelong primary mode, or bridge to high-tech AAC. All paths represent successful communication. -->

<figure class="concept-diagram" id="diagram-pathways">
  <div class="diagram-container">
    <pre class="mermaid">
flowchart TD
    ENTRY["SYMBOL-BASED COMMUNICATION<br/>---<br/>PECS, Makaton, visual AAC,<br/>communication boards"]

    ENTRY --> PA
    ENTRY --> PB
    ENTRY --> PC
    ENTRY --> PD

    subgraph PA["PATH A: Bridge to Speech"]
        A1["Symbols reduce<br/>communicative frustration"]
        A2["Speech emerges alongside<br/>symbol use"]
        A3["Symbols gradually fade<br/>as speech becomes reliable"]
        A1 --> A2 --> A3
    end

    subgraph PB["PATH B: Bridge to Literacy"]
        B1["Symbol understanding develops"]
        B2["Symbols connect to<br/>written word recognition"]
        B3["Text-based communication<br/>becomes primary mode"]
        B1 --> B2 --> B3
    end

    subgraph PC["PATH C: Lifelong Primary Mode"]
        C1["Symbol vocabulary<br/>expands over time"]
        C2["Communication sophistication<br/>increases within symbol system"]
        C3["Symbols remain primary<br/>communication method"]
        C1 --> C2 --> C3
    end

    subgraph PD["PATH D: Bridge to High-Tech AAC"]
        D1["Symbols learned in<br/>low-tech context"]
        D2["Skills transfer to SGD<br/>or tablet AAC app"]
        D3["High-tech device becomes<br/>primary communication tool"]
        D1 --> D2 --> D3
    end

    VALID["ALL PATHS ARE VALID OUTCOMES.<br/>The goal is functional communication,<br/>not speech specifically."]

    PA --> VALID
    PB --> VALID
    PC --> VALID
    PD --> VALID

    style ENTRY fill:#dbeafe,stroke:#2563eb,color:#1e3a5f
    style PA fill:#dcfce7,stroke:#16a34a,color:#14532d
    style PB fill:#e0f2fe,stroke:#0284c7,color:#1e3a5f
    style PC fill:#fae8ff,stroke:#a855f7,color:#581c87
    style PD fill:#fef3c7,stroke:#d97706,color:#78350f
    style VALID fill:#f0fdf4,stroke:#22c55e,color:#14532d
    </pre>
  </div>
  <figcaption>
    <strong>Figure 5:</strong> Four developmental pathways from symbol-based communication. Path A: symbols serve as a bridge to speech (symbols reduce frustration, speech emerges, symbols fade). Path B: symbols bridge to text-based literacy. Path C: symbols remain the lifelong primary communication mode with increasing sophistication. Path D: low-tech symbol skills transfer to high-tech AAC devices. All four paths represent successful communication outcomes -- the goal is functional communication, not speech specifically.
  </figcaption>
</figure>
