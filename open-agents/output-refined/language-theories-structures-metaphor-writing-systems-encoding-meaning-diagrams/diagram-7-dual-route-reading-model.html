<figure class="concept-diagram" id="diagram-dual-route">
  <div class="diagram-container">
    <div class="route-labels">
      <div class="route-label"><div class="swatch lexical"></div> Lexical Route (whole-word)</div>
      <div class="route-label"><div class="swatch nonlexical"></div> Non-Lexical Route (GPC rules)</div>
      <div class="route-label"><div class="swatch shared"></div> Shared stages</div>
    </div>

    <pre class="mermaid">
flowchart TD
    INPUT["<strong>Written Word</strong><br/><em>Visual input on page/screen</em>"]

    INPUT --> FEAT["<strong>Visual Feature Detection</strong><br/><em>Lines, curves, angles</em>"]
    FEAT --> LETTERS["<strong>Letter Identification</strong><br/><em>Abstract letter units</em>"]

    LETTERS --> LEX_PATH["<strong>LEXICAL ROUTE</strong><br/><em>Direct lookup</em>"]
    LETTERS --> NONLEX_PATH["<strong>NON-LEXICAL ROUTE</strong><br/><em>Rule-based decoding</em>"]

    LEX_PATH --> ORTH_LEX["<strong>Orthographic Lexicon</strong><br/><em>Stored whole-word<br/>visual forms</em>"]
    ORTH_LEX --> SEM["<strong>Semantic System</strong><br/><em>Word meaning</em>"]
    SEM --> PHON_LEX["<strong>Phonological Lexicon</strong><br/><em>Stored pronunciations</em>"]
    ORTH_LEX --> PHON_LEX

    NONLEX_PATH --> GPC["<strong>Grapheme-Phoneme<br/>Conversion (GPC)</strong><br/><em>Apply spelling rules:<br/>th → /θ/, ph → /f/, etc.</em>"]
    GPC --> PHON_ASS["<strong>Phoneme Assembly</strong><br/><em>Blend individual<br/>phonemes into word</em>"]

    PHON_LEX --> OUTPUT["<strong>Phonological Output<br/>Buffer</strong><br/><em>Articulatory planning</em>"]
    PHON_ASS --> OUTPUT

    OUTPUT --> SPEECH["<strong>Speech / Reading Aloud</strong><br/><em>Pronounced word</em>"]

    style INPUT fill:#8b5cf6,stroke:#6d28d9,color:#ffffff

    style SEM fill:#93c5fd,stroke:#60a5fa,color:#1e3a5f
    style PHON_LEX fill:#60a5fa,stroke:#3b82f6,color:#1e3a5f
    style NONLEX_PATH fill:#10b981,stroke:#059669,color:#ffffff
    style GPC fill:#34d399,stroke:#10b981,color:#064e3b
    style PHON_ASS fill:#6ee7b7,stroke:#34d399,color:#064e3b

    <div class="examples-section">
      <div class="example-box lexical-ex">
        <h4>Lexical Route Dominates</h4>
        <p><span class="word">"yacht"</span> — irregular spelling. GPC rules would produce /jatʃt/. Correct pronunciation (/jɒt/) requires whole-word lookup in the orthographic lexicon.</p>
        <p style="margin-top:0.3rem"><span class="word">"colonel"</span> — no regular rule maps this spelling to /kɜːnəl/. Must be retrieved from memory.</p>
      </div>
      <div class="example-box nonlexical-ex">
        <h4>Non-Lexical Route Dominates</h4>
        <p><span class="word">"blint"</span> — a novel nonword. Never seen before, so no lexical entry exists. Must be decoded via grapheme-phoneme rules: b-l-i-n-t → /blɪnt/.</p>
        <p style="margin-top:0.3rem"><span class="word">"mip"</span> — pronounceable by rules alone, proving the non-lexical route operates independently.</p>
      </div>
    </div>
  </div>
  <figcaption>
    <strong>Figure 7: Dual-Route Cascaded Model of Reading</strong>
    <p>The DRC model (Coltheart et al., 2001) proposes that skilled readers process written words through two parallel pathways. The lexical route recognizes familiar words as whole units via the orthographic lexicon, accessing meaning and stored pronunciations — essential for irregular words like "yacht." The non-lexical route applies grapheme-to-phoneme conversion rules to decode letter strings into sounds — essential for reading novel words and nonwords. Both routes operate in parallel and converge at the phonological output buffer. The balance between routes varies by orthographic depth: shallow orthographies rely heavily on the non-lexical route, while deep orthographies like English demand strong lexical route processing.</p>
  </figcaption>
</figure>
