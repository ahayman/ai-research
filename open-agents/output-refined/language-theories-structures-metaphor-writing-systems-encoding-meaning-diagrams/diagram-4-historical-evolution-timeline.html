  <figcaption>
    <strong>Figure 4: Historical Evolution of Writing Systems</strong>
    <p>The majority of the world's scripts descend from a single innovation: the Proto-Sinaitic alphabet (c. 1800 BCE), which adapted Egyptian hieroglyphic signs to represent individual consonant sounds. The Phoenician refinement spread westward to Greece (which added vowels, creating the first true alphabet) and eastward through Aramaic, spawning Hebrew, Arabic, and the Brahmi-derived scripts of South and Southeast Asia. Chinese and Mesoamerican writing arose independently. This diagram traces the major pathways of transmission and adaptation across five millennia.</p>
