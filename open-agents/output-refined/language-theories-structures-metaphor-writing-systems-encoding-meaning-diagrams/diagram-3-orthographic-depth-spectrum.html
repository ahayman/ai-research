<!-- Diagram: Orthographic Depth Spectrum -->
<!-- Type: SVG -->
<!-- Generated: 2026-03-15 -->
<!-- Description: Visual spectrum from shallow/transparent orthographies (Finnish, Spanish) to deep/opaque orthographies (English, French, Chinese) with reading acquisition speed annotations -->

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orthographic Depth Spectrum</title>
<style>
:root {
  --bg: #ffffff;
  --fg: #1a1a2e;
  --surface: #f8f9fa;
  --border: #e5e7eb;
  --accent: #4361ee;
  --muted: #6c757d;
  --caption-bg: #f8f9fa;
  --shallow-color: #10b981;
  --mid-color: #f59e0b;
  --deep-color: #ef4444;
  --gradient-start: #10b981;
  --gradient-mid: #f59e0b;
  --gradient-end: #ef4444;
  --card-bg: #ffffff;
  --card-shadow: rgba(0,0,0,0.08);
  --connector: #d1d5db;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #0f0f1a;
    --fg: #e8e8f0;
    --surface: #1a1a2e;
    --border: #2d2d44;
    --accent: #6b8aff;
    --muted: #9a9ab0;
    --caption-bg: #1a1a2e;
    --shallow-color: #34d399;
    --mid-color: #fbbf24;
    --deep-color: #f87171;
    --card-bg: #252540;
    --card-shadow: rgba(0,0,0,0.3);
    --connector: #374151;
  }
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--fg);
  display: flex;
  justify-content: center;
  padding: 2rem 1rem;
  line-height: 1.6;
}
figure {
  max-width: 1000px;
  width: 100%;
}
.diagram-container {
  padding: 2rem;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
}
.spectrum-header {
  display: flex;
  justify-content: space-between;
  margin-bottom: 0.5rem;
  font-weight: 600;
  font-size: 0.9rem;
}
.spectrum-header .shallow { color: var(--shallow-color); }
.spectrum-header .deep { color: var(--deep-color); }
.spectrum-bar {
  height: 16px;
  border-radius: 8px;
  background: linear-gradient(to right, var(--gradient-start), var(--gradient-mid) 50%, var(--gradient-end));
  position: relative;
  margin-bottom: 0.25rem;
}
.spectrum-labels {
  display: flex;
  justify-content: space-between;
  font-size: 0.75rem;
  color: var(--muted);
  margin-bottom: 2rem;
}
.script-track {
  position: relative;
  min-height: 500px;
  margin-top: 1rem;
}
.script-item {
  position: absolute;
  width: 170px;
  background: var(--card-bg);
  border: 2px solid var(--border);
  border-radius: 10px;
  padding: 0.75rem;
  text-align: center;
  box-shadow: 0 2px 8px var(--card-shadow);
  transition: transform 0.2s, box-shadow 0.2s;
  z-index: 1;
}
.script-item:hover {
  transform: translateY(-3px);
  box-shadow: 0 6px 16px var(--card-shadow);
}
.script-item .script-name {
  font-weight: 700;
  font-size: 1rem;
  margin-bottom: 0.15rem;
}
.script-item .script-example {
  font-size: 1.3rem;
  margin-bottom: 0.3rem;
}
.script-item .script-note {
  font-size: 0.72rem;
  color: var(--muted);
  line-height: 1.3;
}
.script-item .speed-badge {
  display: inline-block;
  margin-top: 0.4rem;
  padding: 0.15rem 0.5rem;
  border-radius: 10px;
  font-size: 0.7rem;
  font-weight: 600;
}
/* Positioning along the spectrum (left % approximates depth) */
.script-item[data-depth="finnish"]   { left: 2%;  top: 0; border-color: var(--shallow-color); }
.script-item[data-depth="spanish"]   { left: 8%;  top: 120px; border-color: var(--shallow-color); }
.script-item[data-depth="italian"]   { left: 14%; top: 240px; border-color: var(--shallow-color); }
.script-item[data-depth="german"]    { left: 28%; top: 0; border-color: #84cc16; }
.script-item[data-depth="dutch"]     { left: 38%; top: 120px; border-color: var(--mid-color); }
.script-item[data-depth="portuguese"]{ left: 46%; top: 240px; border-color: var(--mid-color); }
.script-item[data-depth="danish"]    { left: 55%; top: 360px; border-color: #f97316; }
.script-item[data-depth="french"]    { left: 65%; top: 0; border-color: #f97316; }
.script-item[data-depth="english"]   { left: 78%; top: 120px; border-color: var(--deep-color); }
.script-item[data-depth="chinese"]   { left: 78%; top: 280px; border-color: var(--deep-color); }

@media (max-width: 750px) {
  .script-track { min-height: auto; }
  .script-item {
    position: relative;
    width: 100%;
    left: 0 !important;
    top: 0 !important;
    margin-bottom: 0.75rem;
  }
}
.speed-fast { background: #d1fae5; color: #065f46; }
.speed-moderate { background: #fef3c7; color: #92400e; }
.speed-slow { background: #fee2e2; color: #991b1b; }
@media (prefers-color-scheme: dark) {
  .speed-fast { background: #064e3b; color: #6ee7b7; }
  .speed-moderate { background: #78350f; color: #fbbf24; }
  .speed-slow { background: #7f1d1d; color: #fca5a5; }
}
.key-insight {
  margin-top: 1.5rem;
  padding: 1rem;
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  border-left: 4px solid var(--accent);
}
.key-insight h4 { font-size: 0.9rem; color: var(--accent); margin-bottom: 0.3rem; }
.key-insight p { font-size: 0.8rem; color: var(--muted); }
figcaption {
  text-align: center;
  margin-top: 1.5rem;
  padding: 1rem 1.5rem;
  background: var(--caption-bg);
  border-radius: 8px;
  border: 1px solid var(--border);
}
figcaption strong {
  display: block;
  font-size: 1.05rem;
  color: var(--accent);
  margin-bottom: 0.3rem;
}
figcaption p {
  font-size: 0.85rem;
  color: var(--muted);
  font-style: italic;
}
@media print { figure { break-inside: avoid; } }
</style>
</head>
<body>
<figure class="concept-diagram" id="diagram-orthographic-depth">
  <div class="diagram-container">
    <div class="spectrum-header">
      <span class="shallow">SHALLOW (Transparent)</span>
      <span class="deep">DEEP (Opaque)</span>
    </div>
    <div class="spectrum-bar"></div>
    <div class="spectrum-labels">
      <span>1:1 letter-sound mapping</span>
      <span>complex / irregular mapping</span>
    </div>

    <div class="script-track">
      <div class="script-item" data-depth="finnish">
        <div class="script-name">Finnish</div>
        <div class="script-example">koulu</div>
        <div class="script-note">Near-perfect 1:1 grapheme-phoneme correspondence</div>
        <span class="speed-badge speed-fast">Decoding by end of Y1</span>
      </div>

      <div class="script-item" data-depth="spanish">
        <div class="script-name">Spanish</div>
        <div class="script-example">escuela</div>
        <div class="script-note">Highly regular; few exceptions</div>
        <span class="speed-badge speed-fast">~1 year to decode fluently</span>
      </div>

      <div class="script-item" data-depth="italian">
        <div class="script-name">Italian</div>
        <div class="script-example">scuola</div>
        <div class="script-note">Very consistent mapping; digraphs predictable</div>
        <span class="speed-badge speed-fast">~1 year to decode fluently</span>
      </div>

      <div class="script-item" data-depth="german">
        <div class="script-name">German</div>
        <div class="script-example">Schule</div>
        <div class="script-note">Mostly regular; some consonant clusters</div>
        <span class="speed-badge speed-fast">~1 year to decode fluently</span>
      </div>

      <div class="script-item" data-depth="dutch">
        <div class="script-name">Dutch</div>
        <div class="script-example">school</div>
        <div class="script-note">Moderate complexity; vowel spelling varies</div>
        <span class="speed-badge speed-moderate">~1.5 years</span>
      </div>

      <div class="script-item" data-depth="portuguese">
        <div class="script-name">Portuguese</div>
        <div class="script-example">escola</div>
        <div class="script-note">Some irregularity in vowel reduction</div>
        <span class="speed-badge speed-moderate">~1.5 years</span>
      </div>

      <div class="script-item" data-depth="danish">
        <div class="script-name">Danish</div>
        <div class="script-example">skole</div>
        <div class="script-note">Vowels notably opaque; stod prosody</div>
        <span class="speed-badge speed-moderate">~2 years</span>
      </div>

      <div class="script-item" data-depth="french">
        <div class="script-name">French</div>
        <div class="script-example">ecole</div>
        <div class="script-note">Many silent letters; complex vowel spellings</div>
        <span class="speed-badge speed-slow">~2+ years</span>
      </div>

      <div class="script-item" data-depth="english">
        <div class="script-name">English</div>
        <div class="script-example">school</div>
        <div class="script-note">Highly irregular; ~1,120 grapheme-phoneme rules</div>
        <span class="speed-badge speed-slow">~3 years to decode fluently</span>
      </div>

      <div class="script-item" data-depth="chinese">
        <div class="script-name">Chinese</div>
        <div class="script-example">学校 (xuéxiào)</div>
        <div class="script-note">No grapheme-phoneme route; logographic</div>
        <span class="speed-badge speed-slow">~6+ years for functional literacy</span>
      </div>
    </div>

    <div class="key-insight">
      <h4>The Orthographic Depth Hypothesis</h4>
      <p>Shallow orthographies like Finnish allow children to rely on straightforward grapheme-phoneme conversion (non-lexical route), reaching accurate decoding within one school year. Deep orthographies like English force readers to memorize whole-word forms (lexical route), tripling the time needed. Cross-linguistic studies (Seymour et al., 2003) found English children decode at roughly half the accuracy of children in transparent orthographies after one year of instruction.</p>
    </div>
  </div>
  <figcaption>
    <strong>Figure 3: Orthographic Depth Spectrum</strong>
    <p>Writing systems vary in how predictably their spelling maps to pronunciation. "Shallow" (transparent) orthographies like Finnish and Spanish have near-perfect letter-sound correspondence, enabling rapid reading acquisition. "Deep" (opaque) orthographies like English and French have accumulated historical spellings that diverge from modern pronunciation, requiring years of additional practice. Chinese, being logographic, represents the extreme case where each character must be individually learned.</p>
  </figcaption>
</figure>
</body>
</html>
