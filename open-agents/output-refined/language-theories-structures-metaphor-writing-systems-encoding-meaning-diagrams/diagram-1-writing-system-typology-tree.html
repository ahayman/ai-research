  <figcaption>
    <strong>Figure 1: Writing System Typology Tree</strong>
    <p>The six major types of writing systems, classified by what unit of language each grapheme represents. Logographic scripts map symbols to meanings (words/morphemes), syllabaries map to syllables, abjads to consonants (vowels implied), abugidas to consonant-vowel units, alphabets to individual consonants and vowels, and featural scripts encode articulatory features in letter shapes. Real-world scripts often blend types: Japanese uses logographic kanji alongside syllabic kana, and Arabic abjad writing can optionally mark vowels.</p>
  </figcaption>
