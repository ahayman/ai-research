<figure class="concept-diagram" id="diagram-hangul-featural">
  <div class="diagram-container">
    <p class="intro-text">Korean Hangul, created in 1443 by King Sejong, is the world's only widely used featural writing system. Each consonant letter's shape depicts the position of the speech organs (tongue, lips, teeth) used to produce that sound. Adding strokes systematically indicates aspiration or tensing.</p>

    <div class="feature-groups">
      <!-- Velar -->
      <div class="feature-group velar">
        <div class="group-header">
          <div class="place-icon">&#x1F445;</div>
          <div>
            <div class="place-label">Velar</div>
            <div class="place-desc">Shape: back of tongue touching soft palate</div>
          </div>
        </div>
        <div class="letter-row base">
          <div class="hangul-char">ㄱ</div>
          <div class="letter-info">
            <div class="romanized">g/k</div>
            <div class="ipa">/k/, /g/</div>
            <div class="stroke-note">base shape — tongue root profile</div>
          </div>
        </div>
        <div class="arrow-down">+ stroke</div>
        <div class="letter-row">
          <div class="hangul-char">ㅋ</div>
          <div class="letter-info">
            <div class="romanized">k</div>
            <div class="ipa">/kh/</div>
            <div class="stroke-note">added stroke = aspiration</div>
          </div>
        </div>
        <div class="arrow-down">doubled</div>
        <div class="letter-row">
          <div class="hangul-char">ㄲ</div>
          <div class="letter-info">
            <div class="romanized">kk</div>
            <div class="ipa">/k*/</div>
            <div class="stroke-note">doubled = tense/fortis</div>
          </div>
        </div>
      </div>

      <!-- Alveolar -->
      <div class="feature-group alveolar">
        <div class="group-header">
          <div class="place-icon">&#x1F444;</div>
          <div>
            <div class="place-label">Alveolar</div>
            <div class="place-desc">Shape: tongue tip touching alveolar ridge</div>
          </div>
        </div>
        <div class="letter-row base">
          <div class="hangul-char">ㄴ</div>
          <div class="letter-info">
            <div class="romanized">n</div>
            <div class="ipa">/n/</div>
            <div class="stroke-note">base shape — tongue tip raised</div>
          </div>
        </div>
        <div class="arrow-down">+ stroke</div>
        <div class="letter-row">
          <div class="hangul-char">ㄷ</div>
          <div class="letter-info">
            <div class="romanized">d/t</div>
            <div class="ipa">/t/, /d/</div>
            <div class="stroke-note">added stroke = stop closure</div>
          </div>
        </div>
        <div class="arrow-down">+ stroke</div>
        <div class="letter-row">
          <div class="hangul-char">ㅌ</div>
          <div class="letter-info">
            <div class="romanized">t</div>
            <div class="ipa">/th/</div>
            <div class="stroke-note">additional stroke = aspiration</div>
          </div>
        </div>
      </div>

      <!-- Bilabial -->
      <div class="feature-group bilabial">
        <div class="group-header">
          <div class="place-icon">&#x1F48B;</div>
          <div>
            <div class="place-label">Bilabial</div>
            <div class="place-desc">Shape: closed lips viewed from the side</div>
          </div>
        </div>
        <div class="letter-row base">
          <div class="hangul-char">ㅁ</div>
          <div class="letter-info">
            <div class="romanized">m</div>
            <div class="ipa">/m/</div>
            <div class="stroke-note">base shape — square mouth outline</div>
          </div>
        </div>
        <div class="arrow-down">+ stroke</div>
        <div class="letter-row">
          <div class="hangul-char">ㅂ</div>
          <div class="letter-info">
            <div class="romanized">b/p</div>
            <div class="ipa">/p/, /b/</div>
            <div class="stroke-note">added strokes = stop closure</div>
          </div>
        </div>
        <div class="arrow-down">+ stroke</div>
        <div class="letter-row">
          <div class="hangul-char">ㅍ</div>
          <div class="letter-info">
            <div class="romanized">p</div>
            <div class="ipa">/ph/</div>
            <div class="stroke-note">additional stroke = aspiration</div>
          </div>
        </div>
      </div>

      <!-- Dental/Sibilant -->
      <div class="feature-group dental">
        <div class="group-header">
          <div class="place-icon">&#x1F9B7;</div>
          <div>
            <div class="place-label">Sibilant (Dental)</div>
            <div class="place-desc">Shape: teeth / airflow over tongue</div>
          </div>
        </div>
        <div class="letter-row base">
          <div class="hangul-char">ㅅ</div>
          <div class="letter-info">
            <div class="romanized">s</div>
            <div class="ipa">/s/</div>
            <div class="stroke-note">base shape — incisors profile</div>
          </div>
        </div>
        <div class="arrow-down">+ stroke</div>
        <div class="letter-row">
          <div class="hangul-char">ㅈ</div>
          <div class="letter-info">
            <div class="romanized">j</div>
            <div class="ipa">/tɕ/</div>
            <div class="stroke-note">added stroke = affrication</div>
          </div>
        </div>
        <div class="arrow-down">+ stroke</div>
        <div class="letter-row">
          <div class="hangul-char">ㅊ</div>
          <div class="letter-info">
            <div class="romanized">ch</div>
            <div class="ipa">/tɕh/</div>
            <div class="stroke-note">additional stroke = aspiration</div>

      <!-- Glottal -->

        <div class="group-header">
          <div class="place-icon">&#x1F4A8;</div>

            <div class="place-label">Glottal</div>
            <div class="place-desc">Shape: open throat / round aperture</div>
          </div>
        </div>
        <div class="letter-row base">
          <div class="hangul-char">ㅇ</div>
          <div class="letter-info">
            <div class="romanized">(silent / ng)</div>
            <div class="ipa">/ŋ/ or null</div>
            <div class="stroke-note">base shape — circular throat opening</div>
          </div>
        </div>
        <div class="arrow-down">+ strokes</div>
        <div class="letter-row">
          <div class="hangul-char">ㅎ</div>
          <div class="letter-info">
            <div class="romanized">h</div>
            <div class="ipa">/h/</div>

        </div>
      </div>

    <!-- Syllable block demo -->
    <div class="syllable-section">
      <h3>Syllable Block Assembly</h3>
      <div class="syllable-demo">
        <div class="component-stack">
          <div class="comp">ㅎ</div>
          <div class="comp-label">h (initial)</div>

        </div>
        <span class="equals-sign">=</span>
        <div class="syllable-block">
          <div class="big-hangul">한</div>
          <div class="pronunciation">han</div>
          <div class="breakdown">Letters stack into a syllable block</div>
        </div>
        <span class="equals-sign">+</span>
        <div class="syllable-block">
          <div class="big-hangul">글</div>
          <div class="pronunciation">geul</div>
        </div>
        <span class="equals-sign">=</span>
        <div class="syllable-block">
          <div class="big-hangul">한글</div>
          <div class="pronunciation">Hangul</div>
          <div class="breakdown">"great script"</div>
        </div>
      </div>
    </div>
  </div>
  <figcaption>
    <strong>Figure 6: Hangul Featural Design — How Consonant Shapes Map to Articulation</strong>
    <p>Korean Hangul is uniquely systematic: each consonant's base shape iconically represents the position of the tongue, lips, or teeth during articulation. Additional strokes indicate aspiration (a puff of air) or tensing. Vowels follow a separate system based on yin-yang philosophy (vertical/horizontal strokes). Individual letters are then assembled into square syllable blocks, giving Hangul the visual density of a syllabary while maintaining the analytical precision of an alphabet. Linguists often call it the most scientifically designed writing system in human history.</p>
  </figcaption>
</figure>
