<style>

* { margin: 0; padding: 0; box-sizing: border-box; }
body {

<figure class="concept-diagram" id="diagram-chinese-decomposition">
  <div class="diagram-container">
    <!-- Section 1: Ideographic Compound -->
    <div class="section-title">Ideographic Compound (會意字 huìyìzì)</div>
    <div class="decomposition-row">
      <div class="char-box">
        <div class="hanzi">日</div>
        <div class="pinyin">rì</div>
        <div class="meaning">sun</div>
      </div>
      <div class="operator">+</div>
      <div class="char-box">
        <div class="hanzi">月</div>
        <div class="pinyin">yuè</div>
        <div class="meaning">moon</div>
      </div>
      <div class="operator equals">=</div>
      <div class="char-box result">
        <div class="hanzi">明</div>
        <div class="pinyin">míng</div>
        <div class="meaning">bright / clear</div>
      </div>
    </div>
    <div class="decomposition-row">
      <div class="char-box">
        <div class="hanzi">木</div>
        <div class="pinyin">mù</div>
        <div class="meaning">tree</div>
      </div>
      <div class="operator">+</div>
      <div class="char-box">
        <div class="hanzi">木</div>
        <div class="pinyin">mù</div>
        <div class="meaning">tree</div>
      </div>
      <div class="operator equals">=</div>
      <div class="char-box result">
        <div class="hanzi">林</div>
        <div class="pinyin">lín</div>
        <div class="meaning">grove / forest</div>
      </div>
    </div>

    <hr class="separator">

    <!-- Section 2: Semantic-Phonetic Compounds -->
    <div class="section-title">Semantic-Phonetic Compounds (形聲字 xíngshēngzì) — ~80% of all characters</div>
    <div class="compound-grid">
      <div class="compound-card">
        <div class="compound-char">妈</div>
        <div class="breakdown">
          <span class="tag semantic">女 (woman)</span>
          <span>+</span>
          <span class="tag phonetic">马 mǎ (horse)</span>
        </div>
        <div class="explanation">Semantic: female person. Phonetic: mǎ sound → <strong>māma</strong> (mother)</div>
      </div>
      <div class="compound-card">
        <div class="compound-char">清</div>
        <div class="breakdown">
          <span class="tag semantic">氵 (water)</span>
          <span>+</span>
          <span class="tag phonetic">青 qīng (blue/green)</span>
        </div>
        <div class="explanation">Semantic: relates to water. Phonetic: qīng sound → <strong>qīng</strong> (clear/pure)</div>
      </div>
      <div class="compound-card">
        <div class="compound-char">铜</div>
        <div class="breakdown">
          <span class="tag semantic">钅 (metal)</span>
          <span>+</span>
          <span class="tag phonetic">同 tóng (same)</span>
        </div>
        <div class="explanation">Semantic: a type of metal. Phonetic: tóng sound → <strong>tóng</strong> (copper)</div>
      </div>
      <div class="compound-card">
        <div class="compound-char">洋</div>
        <div class="breakdown">
          <span class="tag semantic">氵 (water)</span>
          <span>+</span>
          <span class="tag phonetic">羊 yáng (sheep)</span>
        </div>
        <div class="explanation">Semantic: large body of water. Phonetic: yáng sound → <strong>yáng</strong> (ocean)</div>
      </div>
    </div>

    <div class="stat-note">
      Approximately 80% of Chinese characters are semantic-phonetic compounds: a <span class="tag semantic">radical</span> hints at meaning, while a <span class="tag phonetic">phonetic component</span> approximates pronunciation.
    </div>
  </div>
  <figcaption>
    <strong>Figure 2: Chinese Character Decomposition</strong>
    <p>Chinese characters are not arbitrary. Ideographic compounds combine meaningful elements (日 sun + 月 moon = 明 bright). The dominant category, semantic-phonetic compounds, pairs a radical (signaling meaning domain) with a phonetic component (approximating sound). This system allows literate readers to guess both the meaning category and pronunciation of unfamiliar characters, though phonetic drift over millennia has weakened some sound correspondences.</p>
  </figcaption>
</figure>
