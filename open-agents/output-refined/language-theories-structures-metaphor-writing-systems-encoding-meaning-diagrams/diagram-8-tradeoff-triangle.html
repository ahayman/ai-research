<!-- Description: Triangular diagram showing the three competing properties of writing systems (learnability, information density, phonetic precision) with different scripts positioned according to their trade-offs -->

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Writing System Trade-Off Triangle</title>
<style>
:root {
  --bg: #ffffff;
  --fg: #1a1a2e;
  --surface: #f8f9fa;
  --border: #e5e7eb;
  --accent: #4361ee;
  --muted: #6c757d;
  --caption-bg: #f8f9fa;
  --learn-color: #10b981;
  --density-color: #ef4444;
  --phonetic-color: #3b82f6;
  --card-bg: #ffffff;
  --triangle-fill: rgba(99, 102, 241, 0.04);
  --triangle-stroke: #a5b4fc;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #0f0f1a;
    --fg: #e8e8f0;
    --surface: #1a1a2e;
    --border: #2d2d44;
    --accent: #6b8aff;
    --muted: #9a9ab0;
    --caption-bg: #1a1a2e;
    --learn-color: #34d399;
    --density-color: #f87171;
    --phonetic-color: #60a5fa;
    --card-bg: #252540;
    --triangle-fill: rgba(99, 102, 241, 0.08);
    --triangle-stroke: #4f46e5;
  }
}
* { margin: 0; padding: 0; box-sizing: border-box; }

  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: var(--bg);

}

}

}

}

  fill: var(--fg);
}

  fill: var(--muted);

}

}

.legend-grid {

  display: block;
  font-size: 1.05rem;
  color: var(--accent);

<body>
<figure class="concept-diagram" id="diagram-tradeoff-triangle">
  <div class="diagram-container">
    <div class="triangle-wrapper">
      <svg viewBox="0 0 700 620" xmlns="http://www.w3.org/2000/svg">
        <!-- Triangle -->
        <polygon points="350,30 50,570 650,570" fill="var(--triangle-fill)" stroke="var(--triangle-stroke)" stroke-width="2.5" />

        <!-- Gradient lines along edges -->
        <line x1="350" y1="30" x2="50" y2="570" stroke="var(--learn-color)" stroke-width="1.5" opacity="0.3" stroke-dasharray="6 3"/>
        <line x1="350" y1="30" x2="650" y2="570" stroke="var(--phonetic-color)" stroke-width="1.5" opacity="0.3" stroke-dasharray="6 3"/>
        <line x1="50" y1="570" x2="650" y2="570" stroke="var(--density-color)" stroke-width="1.5" opacity="0.3" stroke-dasharray="6 3"/>

        <!-- Vertex labels -->
        <!-- Top: Learnability -->
        <text x="350" y="20" text-anchor="middle" class="vertex-label" fill="var(--learn-color)">LEARNABILITY</text>
        <text x="350" y="60" text-anchor="middle" class="vertex-desc">Few symbols, simple rules</text>
        <text x="350" y="73" text-anchor="middle" class="vertex-desc">Quick to acquire</text>

        <!-- Bottom-left: Information Density -->
        <text x="45" y="595" text-anchor="start" class="vertex-label" fill="var(--density-color)">INFORMATION DENSITY</text>
        <text x="45" y="612" text-anchor="start" class="vertex-desc">Compact, meaning-rich symbols</text>

        <!-- Bottom-right: Phonetic Precision -->
        <text x="655" y="595" text-anchor="end" class="vertex-label" fill="var(--phonetic-color)">PHONETIC PRECISION</text>
        <text x="655" y="612" text-anchor="end" class="vertex-desc">Exact sound representation</text>

        <!-- Script points positioned within the triangle -->
        <!-- Coordinates: top vertex = max learnability, bottom-left = max density, bottom-right = max phonetic precision -->

        <!-- Finnish (high learnability, high phonetic precision, low density) — upper right area -->
        <circle cx="470" cy="160" r="7" fill="#10b981" class="script-dot" stroke="#059669"/>
        <text x="483" y="155" class="script-point" fill="var(--fg)">Finnish</text>
        <text x="483" y="168" class="script-point-sub" fill="var(--muted)">Shallow alphabet</text>

        <!-- Hangul (high learnability, good phonetic precision) — upper center-right -->
        <circle cx="420" cy="200" r="7" fill="#ec4899" class="script-dot" stroke="#be185d"/>
        <text x="433" y="195" class="script-point" fill="var(--fg)">Hangul</text>
        <text x="433" y="208" class="script-point-sub" fill="var(--muted)">Featural alphabet</text>

        <!-- IPA (extreme phonetic precision, low density, moderate learnability) — right side -->
        <circle cx="560" cy="340" r="7" fill="#3b82f6" class="script-dot" stroke="#1d4ed8"/>
        <text x="573" y="335" class="script-point" fill="var(--fg)">IPA</text>
        <text x="573" y="348" class="script-point-sub" fill="var(--muted)">Maximum precision</text>

        <!-- Latin (moderate all) — center -->
        <circle cx="350" cy="320" r="7" fill="#8b5cf6" class="script-dot" stroke="#6d28d9"/>
        <text x="363" y="315" class="script-point" fill="var(--fg)">Latin (English)</text>
        <text x="363" y="328" class="script-point-sub" fill="var(--muted)">Deep alphabet</text>

        <!-- Arabic (moderate density, moderate learnability, low phonetic) — center-left -->
        <circle cx="260" cy="340" r="7" fill="#f59e0b" class="script-dot" stroke="#d97706"/>
        <text x="170" y="335" class="script-point" fill="var(--fg)">Arabic</text>
        <text x="170" y="348" class="script-point-sub" fill="var(--muted)">Abjad (consonants)</text>

        <!-- Japanese mixed (high density, moderate phonetic via kana) — lower-center -->
        <circle cx="300" cy="430" r="7" fill="#f97316" class="script-dot" stroke="#ea580c"/>
        <text x="190" y="425" class="script-point" fill="var(--fg)">Japanese</text>
        <text x="190" y="438" class="script-point-sub" fill="var(--muted)">Kanji + Kana hybrid</text>

        <!-- Chinese (maximum density, lowest learnability, no phonetic route) — bottom-left -->
        <circle cx="160" cy="500" r="7" fill="#ef4444" class="script-dot" stroke="#dc2626"/>
        <text x="70" y="495" class="script-point" fill="var(--fg)">Chinese</text>
        <text x="70" y="508" class="script-point-sub" fill="var(--muted)">Logographic (~50K chars)</text>

        <!-- Cherokee syllabary (high learnability, low density) — upper left -->
        <circle cx="260" cy="210" r="7" fill="#06b6d4" class="script-dot" stroke="#0891b2"/>
        <text x="170" y="205" class="script-point" fill="var(--fg)">Cherokee</text>
        <text x="170" y="218" class="script-point-sub" fill="var(--muted)">Syllabary (85)</text>

        <!-- Devanagari (good phonetic, moderate learnability) — right-center area -->
        <circle cx="450" cy="310" r="7" fill="#14b8a6" class="script-dot" stroke="#0d9488"/>
        <text x="463" y="305" class="script-point" fill="var(--fg)">Devanagari</text>
        <text x="463" y="318" class="script-point-sub" fill="var(--muted)">Abugida</text>
      </svg>
    </div>

    <div class="legend-grid">
      <div class="legend-item">
        <div class="legend-dot" style="background: var(--learn-color)"></div>
        <div class="legend-text">
          <div class="legend-name">Learnability</div>
          <div class="legend-desc">Fewer symbols and more regular rules mean faster acquisition. Alphabets and syllabaries with small inventories score high.</div>
        </div>
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background: var(--density-color)"></div>
        <div class="legend-text">
          <div class="legend-name">Information Density</div>
          <div class="legend-desc">How much meaning is packed per unit of space. Logographic scripts can encode a word in a single character; alphabets require multiple letters.</div>
        </div>
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background: var(--phonetic-color)"></div>
        <div class="legend-text">
          <div class="legend-name">Phonetic Precision</div>
          <div class="legend-desc">How accurately the script represents pronunciation. Shallow alphabets and the IPA score highest; logographic scripts score lowest.</div>
        </div>
      </div>
    </div>

    <div class="tradeoff-note">
      <h4>The Impossible Triangle</h4>
      <p>No writing system maximizes all three properties simultaneously. Chinese achieves extraordinary information density (a newspaper can be read in half the column inches of English) but requires years of memorization. Finnish orthography offers near-perfect phonetic transparency and fast learnability but uses more space per concept. Hangul comes closest to balancing all three: its featural design is systematic enough to learn rapidly, its syllable blocks provide visual density, and its phonetic mapping is highly regular. The choice of script type reflects a society's priorities among these competing demands.</p>
    </div>
  </div>
  <figcaption>
    <strong>Figure 8: Writing System Trade-Off Triangle</strong>
    <p>Every writing system navigates a fundamental three-way trade-off. Learnability favors fewer, more regular symbols (alphabets, syllabaries). Information density favors meaning-rich symbols that compress text (logographs). Phonetic precision favors accurate sound representation (shallow alphabets, IPA). Scripts cluster in different regions of this space depending on their design priorities, and no system can maximize all three dimensions simultaneously.</p>
  </figcaption>
</figure>
