      <h4>Semitic Root-and-Pattern Morphology</h4>
      <p>Arabic and Hebrew share a root-and-pattern (or "templatic") morphological system. A trilateral consonantal root (here: K-T-B, relating to writing) provides the core semantic meaning, while vowel patterns intercalated between the consonants specify grammatical function: agent (katib), object (kitab), place (maktaba), passive participle (maktub). This is why abjad scripts, which write only consonants, are well-suited to Semitic languages: the visible consonants convey the root meaning, while readers infer the vowel pattern from context.</p>
