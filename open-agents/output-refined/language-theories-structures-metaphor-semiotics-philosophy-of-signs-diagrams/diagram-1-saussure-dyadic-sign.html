<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saussure's Dyadic Sign Model</title>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #f8f9fa;
    color: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 2rem;
  }
  figure {
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
    max-width: 1000px;
    width: 100%;
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid #e9ecef;
  }
  figcaption strong {
    display: block;
    font-size: 1.15rem;
    color: #1a1a2e;
    margin-bottom: 0.4rem;
  }
  figcaption span {
    font-size: 0.9rem;
    color: #6c757d;
    line-height: 1.5;
  }
  .mermaid {
    display: flex;
    justify-content: center;
  }
  .legend {
    display: flex;
    justify-content: center;
    gap: 2rem;
    margin-top: 1rem;
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.85rem;
    color: #495057;
  }
  .legend-swatch {
    width: 16px;
    height: 16px;
    border-radius: 4px;
  }
  .swatch-sign { background: #6366f1; }
  .swatch-system { background: #0284c7; }
  .swatch-excluded { background: #dc2626; }
  @media (prefers-color-scheme: dark) {
    body { background: #1a1a2e; color: #e9ecef; }
    figure { background: #2d2d44; box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
    figcaption { border-top-color: #3d3d5c; }
    figcaption strong { color: #e9ecef; }
    figcaption span { color: #adb5bd; }
    .legend-item { color: #adb5bd; }
  }
</style>
</head>
<body>
<figure>
  <div class="mermaid">
%%{init: {'theme': 'neutral', 'themeVariables': {'fontSize': '14px'}}}%%
flowchart TD
    subgraph SIGN ["THE SIGN (Two inseparable halves)"]
        direction TB
        SR["<b>Signifier</b> <i>(Signifiant)</i><br/>Sound-image / written mark<br/>e.g., the sound pattern /tri:/"]:::signifier
        SD["<b>Signified</b> <i>(Signifie)</i><br/>Concept / mental image<br/>e.g., the concept of a tree"]:::signified
        SR <--->|"Bound together like<br/>recto and verso of paper"| SD
    end

    ARB["<b>ARBITRARY</b><br/>No natural connection between<br/>signifier and signified<br/><i>tree / arbre / Baum / derevo</i>"]:::arbitrary
    SR -.- ARB
    SD -.- ARB

    REF["<b>Real-World Object</b><br/>(External Referent)"]:::excluded
    SIGN -.->|"EXCLUDED from model"| REF

    subgraph DIFF ["SYSTEM OF DIFFERENCES"]
        direction LR
        S1["Sign: dark"]:::othersign
        S2["Sign: dim"]:::othersign
        S3["Sign: gloomy"]:::othersign
        S4["Sign: light"]:::othersign
        S5["Sign: murky"]:::othersign
    end

    SIGN -->|"Meaning arises from<br/>differences, not positive content"| DIFF
    S1 <-.->|"not"| S2
    S2 <-.->|"not"| S3
    S3 <-.->|"not"| S4
    S4 <-.->|"not"| S5
    S1 <-.->|"not"| S5

    classDef signifier fill:#e0e7ff,stroke:#6366f1,stroke-width:2px,color:#1a1a2e
    classDef signified fill:#dbeafe,stroke:#2563eb,stroke-width:2px,color:#1a1a2e
    classDef arbitrary fill:#fef3c7,stroke:#d97706,stroke-width:2px,color:#1a1a2e
    classDef excluded fill:#fee2e2,stroke:#dc2626,stroke-width:2px,color:#1a1a2e,stroke-dasharray: 5 5
    classDef othersign fill:#e0f2fe,stroke:#0284c7,stroke-width:1px,color:#1a1a2e
  </div>
  <div class="legend">
    <div class="legend-item"><div class="legend-swatch swatch-sign"></div> The sign (signifier + signified)</div>
    <div class="legend-item"><div class="legend-swatch swatch-system"></div> System of differences</div>
    <div class="legend-item"><div class="legend-swatch swatch-excluded"></div> Excluded referent</div>
  </div>
  <figcaption>
    <strong>Diagram 1: Saussure's Dyadic Sign Model</strong>
    <span>Saussure's linguistic sign consists of two inseparable psychological elements: the signifier (sound-image) and the signified (concept). Their bond is arbitrary -- no natural connection exists between them. Crucially, the external referent is excluded: meaning arises not from correspondence with the world, but from differences within the sign system. "In language there are only differences without positive terms." Based on Saussure's <i>Course in General Linguistics</i> (1916).</span>
  </figcaption>
</figure>
<script>
  mermaid.initialize({ startOnLoad: true, securityLevel: 'loose', theme: 'neutral' });
</script>
</body>
</html>
