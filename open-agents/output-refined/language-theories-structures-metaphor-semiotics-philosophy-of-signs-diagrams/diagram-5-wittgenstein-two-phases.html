<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wittgenstein's Two Phases</title>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #f8f9fa;
    color: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 2rem;
  }
  figure {
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
    max-width: 1100px;
    width: 100%;
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid #e9ecef;
  }
  figcaption strong {
    display: block;
    font-size: 1.15rem;
    color: #1a1a2e;
    margin-bottom: 0.4rem;
  }
  figcaption span {
    font-size: 0.9rem;
    color: #6c757d;
    line-height: 1.5;
  }
  .mermaid {
    display: flex;
    justify-content: center;
  }
  .legend {
    display: flex;
    justify-content: center;
    gap: 2rem;
    margin-top: 1rem;
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.85rem;
    color: #495057;
  }
  .legend-swatch {
    width: 16px;
    height: 16px;
    border-radius: 4px;
  }
  .swatch-early { background: #6366f1; }
  .swatch-late { background: #059669; }
  .swatch-break { background: #dc2626; }
  @media (prefers-color-scheme: dark) {
    body { background: #1a1a2e; color: #e9ecef; }
    figure { background: #2d2d44; box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
    figcaption { border-top-color: #3d3d5c; }
    figcaption strong { color: #e9ecef; }
    figcaption span { color: #adb5bd; }
    .legend-item { color: #adb5bd; }
  }
</style>
</head>
<body>
<figure>
  <div class="mermaid">
%%{init: {'theme': 'neutral', 'themeVariables': {'fontSize': '13px'}}}%%
flowchart LR
    subgraph EARLY ["TRACTATUS LOGICO-PHILOSOPHICUS (1921)<br/>The Picture Theory"]
        direction TB
        E_LANG["<b>Language</b><br/>Propositions"]:::early
        E_FORM["<b>Shared Logical Form</b><br/>Isomorphism between<br/>proposition and fact"]:::early
        E_WORLD["<b>World</b><br/>Atomic facts composed<br/>of simple objects"]:::early
        E_LANG -->|"mirrors"| E_FORM
        E_FORM -->|"pictures"| E_WORLD

        E_P1["Logical atomism:<br/>world = totality of facts"]:::early_detail
        E_P2["Single deterministic structure<br/>underlies all meaningful language"]:::early_detail
        E_P3["Limits of language = limits of world<br/><i>Whereof one cannot speak,<br/>thereof one must be silent</i>"]:::early_detail

        E_LANG --- E_P1
        E_FORM --- E_P2
        E_WORLD --- E_P3
    end

    BREAK["<b>RADICAL BREAK</b><br/>Wittgenstein dismantles<br/>his own earlier work<br/>(1930s-1940s)"]:::break

    subgraph LATE ["PHILOSOPHICAL INVESTIGATIONS (1953)<br/>Language Games and Meaning as Use"]
        direction TB
        L_GAMES["<b>Language Games</b><br/>(Sprachspiele)<br/>Ordering, describing,<br/>joking, praying, greeting..."]:::late

        L_USE["<b>Meaning = Use</b><br/>Look at how words are<br/>employed in concrete<br/>situations"]:::late

        L_FAM["<b>Family Resemblance</b><br/>Categories linked by<br/>overlapping similarities,<br/>no single essence"]:::late

        L_PL["<b>No Private Language</b><br/>Meaning requires public<br/>norms and shared practices<br/>(Beetle in the Box)"]:::late

        L_LIFE["<b>Forms of Life</b><br/>(Lebensformen)<br/>Language embedded in<br/>human activities"]:::late

        L_LIFE --> L_GAMES
        L_GAMES --> L_USE
        L_USE --> L_FAM
        L_USE --> L_PL
    end

    EARLY ====>|" "| BREAK
    BREAK ====>|" "| LATE

    classDef early fill:#e0e7ff,stroke:#6366f1,stroke-width:2px,color:#1a1a2e
    classDef early_detail fill:#ede9fe,stroke:#8b5cf6,stroke-width:1px,color:#1a1a2e
    classDef late fill:#dcfce7,stroke:#059669,stroke-width:2px,color:#1a1a2e
    classDef break fill:#fee2e2,stroke:#dc2626,stroke-width:3px,color:#1a1a2e
  </div>
  <div class="legend">
    <div class="legend-item"><div class="legend-swatch swatch-early"></div> Early Wittgenstein (Tractatus)</div>
    <div class="legend-item"><div class="legend-swatch swatch-break"></div> The radical reversal</div>
    <div class="legend-item"><div class="legend-swatch swatch-late"></div> Later Wittgenstein (Investigations)</div>
  </div>
  <figcaption>
    <strong>Diagram 5: Wittgenstein's Two Phases -- From Picture to Practice</strong>
    <span>One of philosophy's most dramatic intellectual reversals. The early Wittgenstein (Tractatus, 1921) held that language is a logical picture of the world, with a single deterministic structure mirroring atomic facts. The later Wittgenstein (Philosophical Investigations, 1953) dismantled this vision entirely: language has no single essence, only a motley of "language games" embedded in forms of life, where meaning is use and categories are held together by family resemblance rather than essential definitions.</span>
  </figcaption>
</figure>
<script>
  mermaid.initialize({ startOnLoad: true, securityLevel: 'loose', theme: 'neutral' });
</script>
</body>
</html>
