<body>
<figure>
  <div class="mermaid">
%%{init: {'theme': 'neutral', 'themeVariables': {'fontSize': '12px'}}}%%
flowchart LR
    subgraph STAGE1 ["STAGE 1: FOUNDATIONS<br/>Fixed Meaning"]
        direction TB
        FREGE["<b>Frege (1892)</b><br/>Sense + Reference<br/>Objective, determinate<br/>senses compose logically"]:::foundation
        SAUSS["<b>Saussure (1916)</b><br/>Signifier + Signified<br/>Stable system of differences<br/>Closed, synchronic structure"]:::foundation
        TRACT["<b>Wittgenstein:<br/>Tractatus (1921)</b><br/>Picture theory<br/>Language mirrors world<br/>via logical form"]:::foundation
        PEIRCE["<b>Peirce (influence<br/>from 1930s)</b><br/>Triadic sign + unlimited<br/>semiosis -- but converges<br/>on truth"]:::foundation_dyn
    end

    SHIFT1["<b>Sign as System</b><br/>to<br/><b>Sign as Process</b>"]:::shift

    subgraph STAGE2 ["STAGE 2: THE PIVOT"]
        direction TB
        PI["<b>Wittgenstein:<br/>Investigations (1953)</b><br/>Language games<br/>Meaning = use<br/>Family resemblance<br/>No single essence"]:::pivot
    end

    SHIFT2["<b>Sign as Practice</b><br/>to<br/><b>Sign as Play</b>"]:::shift

    subgraph STAGE3 ["STAGE 3: DISSOLUTION<br/>Fluid Meaning"]
        direction TB
        BARTH1["<b>Barthes:<br/>Mythologies (1957)</b><br/>Orders of signification<br/>Myth naturalizes ideology"]:::dissolution
        DERR["<b>Derrida (1967)</b><br/>Differance<br/>No transcendental signified<br/>Meaning always deferred"]:::dissolution
        BARTH2["<b>Barthes: S/Z (1970)</b><br/>Death of the Author<br/>Reader as co-producer<br/>Galaxy of signifiers"]:::dissolution
        ECO["<b>Eco (1976)</b><br/>Encyclopedia model<br/>Open but bounded<br/>Limits of interpretation"]:::synthesis
    end

    STAGE1 ==> SHIFT1
    SHIFT1 ==> STAGE2
    STAGE2 ==> SHIFT2
    SHIFT2 ==> STAGE3

    TENSIONS["<b>Living Tensions</b><br/>Structure vs. Process<br/>Stability vs. Instability<br/>System vs. Context<br/>Author vs. Reader<br/>Limited vs. Unlimited interpretation"]:::tension

    STAGE3 --> TENSIONS

    classDef foundation fill:#e0e7ff,stroke:#6366f1,stroke-width:2px,color:#1a1a2e
    classDef foundation_dyn fill:#c7d2fe,stroke:#6366f1,stroke-width:2px,color:#1a1a2e,stroke-dasharray: 5 5

    classDef shift fill:#f3f4f6,stroke:#6b7280,stroke-width:2px,color:#1a1a2e
    classDef dissolution fill:#fee2e2,stroke:#dc2626,stroke-width:2px,color:#1a1a2e
    classDef synthesis fill:#dcfce7,stroke:#059669,stroke-width:2px,color:#1a1a2e

  </div>
  <div class="legend">
    <div class="legend-item"><div class="legend-swatch swatch-foundation"></div> Foundations (fixed meaning)</div>
    <div class="legend-item"><div class="legend-swatch swatch-pivot"></div> The pivot (Wittgenstein)</div>
    <div class="legend-item"><div class="legend-swatch swatch-dissolution"></div> Dissolution (fluid meaning)</div>
    <div class="legend-item"><div class="legend-swatch swatch-synthesis"></div> Synthesis (Eco: open but bounded)</div>
  </div>
  <figcaption>
    <strong>Diagram 7: The Grand Arc -- From Fixed to Fluid Meaning</strong>
    <span>The history of the philosophy of signs traces a trajectory from stability to instability, from structure to process, from fixed to fluid meaning. Frege, Saussure, and the early Wittgenstein established determinate systems of meaning. Wittgenstein's own reversal pivoted from picture theory to language games. Barthes, Derrida, and post-structuralism dissolved fixed meaning into play. Eco charted a middle course: meaning is encyclopedic and open-ended, but bounded by textual and communal constraints. Five fundamental tensions remain unresolved and continue to animate the field.</span>
  </figcaption>
</figure>
