<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Frege's Sense and Reference</title>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #f8f9fa;
    color: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 2rem;
  }
  figure {
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
    max-width: 1000px;
    width: 100%;
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid #e9ecef;
  }
  figcaption strong {
    display: block;
    font-size: 1.15rem;
    color: #1a1a2e;
    margin-bottom: 0.4rem;
  }
  figcaption span {
    font-size: 0.9rem;
    color: #6c757d;
    line-height: 1.5;
  }
  .mermaid {
    display: flex;
    justify-content: center;
  }
  .legend {
    display: flex;
    justify-content: center;
    gap: 2rem;
    margin-top: 1rem;
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.85rem;
    color: #495057;
  }
  .legend-swatch {
    width: 16px;
    height: 16px;
    border-radius: 4px;
  }
  .swatch-expression { background: #6366f1; }
  .swatch-sense { background: #d97706; }
  .swatch-reference { background: #059669; }
  @media (prefers-color-scheme: dark) {
    body { background: #1a1a2e; color: #e9ecef; }
    figure { background: #2d2d44; box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
    figcaption { border-top-color: #3d3d5c; }
    figcaption strong { color: #e9ecef; }
    figcaption span { color: #adb5bd; }
    .legend-item { color: #adb5bd; }
  }
</style>
</head>
<body>
<figure>
  <div class="mermaid">
%%{init: {'theme': 'neutral', 'themeVariables': {'fontSize': '14px'}}}%%
flowchart TD
    subgraph EXPRESSIONS ["EXPRESSIONS (Linguistic Signs)"]
        direction LR
        MS["<b>The Morning Star</b>"]:::expr
        ES["<b>The Evening Star</b>"]:::expr
    end

    subgraph SINN ["SINN (Sense) -- Mode of Presentation"]
        direction LR
        MS_S["<b>Sense:</b><br/>Bright celestial body<br/>visible at <i>dawn</i>"]:::sense
        ES_S["<b>Sense:</b><br/>Bright celestial body<br/>visible at <i>dusk</i>"]:::sense
    end

    subgraph BEDEUTUNG ["BEDEUTUNG (Reference) -- Object in the World"]
        VENUS["<b>The Planet Venus</b><br/>Same object, different<br/>modes of presentation"]:::reference
    end

    MS --> MS_S
    ES --> ES_S
    MS_S --> VENUS
    ES_S --> VENUS

    PUZZLE["<b>Frege's Puzzle</b><br/><i>Morning star = morning star</i> is trivial<br/><i>Morning star = evening star</i> is informative<br/>Same reference, different senses!"]:::puzzle

    VENUS --> PUZZLE

    subgraph SENTENCES ["EXTENSION TO SENTENCES"]
        direction TB
        SENT["<b>A sentence</b>"]:::expr
        S_SENSE["<b>Sense of sentence:</b><br/>The Thought (Gedanke)<br/>The proposition expressed"]:::sense
        S_REF["<b>Reference of sentence:</b><br/>Its Truth Value<br/>(True or False)"]:::reference
        SENT --> S_SENSE
        SENT --> S_REF
    end

    COMP["<b>Compositionality</b><br/>The meaning of the whole is<br/>determined by the meanings of<br/>the parts + syntactic rules"]:::comp

    SENTENCES --> COMP

    classDef expr fill:#e0e7ff,stroke:#6366f1,stroke-width:2px,color:#1a1a2e
    classDef sense fill:#fef3c7,stroke:#d97706,stroke-width:2px,color:#1a1a2e
    classDef reference fill:#dcfce7,stroke:#059669,stroke-width:2px,color:#1a1a2e
    classDef puzzle fill:#fce7f3,stroke:#db2777,stroke-width:2px,color:#1a1a2e
    classDef comp fill:#e0f2fe,stroke:#0284c7,stroke-width:2px,color:#1a1a2e
  </div>
  <div class="legend">
    <div class="legend-item"><div class="legend-swatch swatch-expression"></div> Expression (linguistic sign)</div>
    <div class="legend-item"><div class="legend-swatch swatch-sense"></div> Sinn (sense / mode of presentation)</div>
    <div class="legend-item"><div class="legend-swatch swatch-reference"></div> Bedeutung (reference / object)</div>
  </div>
  <figcaption>
    <strong>Diagram 4: Frege's Sense and Reference (Sinn und Bedeutung)</strong>
    <span>"The Morning Star" and "The Evening Star" both refer to Venus (same Bedeutung), but present it under different modes (different Sinn). This explains why "the morning star is the evening star" is an informative discovery, not a trivial tautology -- meaning has two dimensions, not one. Frege extended this to sentences: sense is the thought expressed; reference is the truth value. The principle of compositionality governs how parts combine into wholes. Based on Frege's "Uber Sinn und Bedeutung" (1892).</span>
  </figcaption>
</figure>

  mermaid.initialize({ startOnLoad: true, securityLevel: 'loose', theme: 'neutral' });
</script>
</body>
</html>
