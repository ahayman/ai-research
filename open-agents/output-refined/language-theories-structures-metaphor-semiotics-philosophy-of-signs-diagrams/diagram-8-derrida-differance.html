<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Derrida's Differance</title>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #f8f9fa;
    color: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 2rem;
  }
  figure {
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
    max-width: 1100px;
    width: 100%;
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid #e9ecef;
  }
  figcaption strong {
    display: block;
    font-size: 1.15rem;
    color: #1a1a2e;
    margin-bottom: 0.4rem;
  }
  figcaption span {
    font-size: 0.9rem;
    color: #6c757d;
    line-height: 1.5;
  }
  .mermaid {
    display: flex;
    justify-content: center;
  }
  .legend {
    display: flex;
    justify-content: center;
    gap: 2rem;
    margin-top: 1rem;
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.85rem;
    color: #495057;
  }
  .legend-swatch {
    width: 16px;
    height: 16px;
    border-radius: 4px;
  }
  .swatch-sign { background: #6366f1; }
  .swatch-trace { background: #6b7280; }
  .swatch-differance { background: #dc2626; }
  .swatch-critique { background: #d97706; }
  @media (prefers-color-scheme: dark) {
    body { background: #1a1a2e; color: #e9ecef; }
    figure { background: #2d2d44; box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
    figcaption { border-top-color: #3d3d5c; }
    figcaption strong { color: #e9ecef; }
    figcaption span { color: #adb5bd; }
    .legend-item { color: #adb5bd; }
  }
</style>
</head>
<body>
<figure>
  <div class="mermaid">
%%{init: {'theme': 'neutral', 'themeVariables': {'fontSize': '13px'}}}%%
flowchart TD
    DIFF["<b>DIFFERANCE</b><br/>(with an 'a')<br/>Neither a word nor a concept"]:::differance

    DIFFER["<b>To Differ</b><br/>(spatial, synchronic)<br/>Every sign is constituted by<br/>its differences from other signs"]:::dimension
    DEFER["<b>To Defer</b><br/>(temporal, diachronic)<br/>Meaning is always postponed,<br/>never fully present"]:::dimension

    DIFF -->|"combines"| DIFFER
    DIFF -->|"combines"| DEFER

    subgraph CHAIN ["THE CHAIN OF SIGNIFICATION (No Final Signified)"]
        direction LR
        S1["Signifier A<br/><i>cat</i>"]:::sign
        S2["Signifier B<br/><i>feline animal</i>"]:::sign
        S3["Signifier C<br/><i>domesticated<br/>predator</i>"]:::sign
        S4["Signifier D<br/><i>carnivorous<br/>mammal</i>"]:::sign
        S5["Signifier E<br/><i>warm-blooded<br/>creature...</i>"]:::sign
        S1 -->|"defined by"| S2
        S2 -->|"defined by"| S3
        S3 -->|"defined by"| S4
        S4 -->|"defined by"| S5
    end

    DIFF --> CHAIN

    subgraph TRACES ["TRACES: Every sign carries the absent presence of what it is not"]
        direction TB
        T1["<i>cat</i> bears traces of<br/><i>bat, cut, car, hat...</i>"]:::trace
        T2["<i>cat</i> bears traces of<br/><i>dog, mouse, bird...</i>"]:::trace
        T3["Identity is always already<br/>contaminated by alterity"]:::trace
    end

    S1 -.->|"traces"| TRACES

    LOGO["<b>LOGOCENTRISM</b><br/>Western philosophy privileges<br/>speech over writing,<br/>presence over absence"]:::critique

    ARCHE["<b>ARCHE-WRITING</b><br/>Writing is not a degraded copy<br/>of speech -- absence, repetition,<br/>and recontextualization underlie<br/>ALL signification"]:::critique

    NOANCHOR["<b>No Transcendental Signified</b><br/>No final, foundational meaning<br/>anchors the chain -- one signifier<br/>always leads to another signifier"]:::differance

    DIFF --> LOGO
    LOGO -->|"Derrida inverts"| ARCHE
    CHAIN --> NOANCHOR

    DECON["<b>DECONSTRUCTION</b><br/>Reading that reveals how<br/>texts undermine their own<br/>premises -- binary oppositions<br/>depend on what they exclude"]:::decon

    NOANCHOR --> DECON
    ARCHE --> DECON

    classDef differance fill:#fee2e2,stroke:#dc2626,stroke-width:2px,color:#1a1a2e
    classDef dimension fill:#fce7f3,stroke:#db2777,stroke-width:2px,color:#1a1a2e
    classDef sign fill:#e0e7ff,stroke:#6366f1,stroke-width:2px,color:#1a1a2e
    classDef trace fill:#f3f4f6,stroke:#6b7280,stroke-width:1px,color:#1a1a2e,stroke-dasharray: 5 5
    classDef critique fill:#fef3c7,stroke:#d97706,stroke-width:2px,color:#1a1a2e
    classDef decon fill:#f3e8ff,stroke:#7c3aed,stroke-width:2px,color:#1a1a2e
  </div>
  <div class="legend">
    <div class="legend-item"><div class="legend-swatch swatch-differance"></div> Differance</div>
    <div class="legend-item"><div class="legend-swatch swatch-sign"></div> Chain of signifiers</div>
    <div class="legend-item"><div class="legend-swatch swatch-trace"></div> Traces (absent presences)</div>
    <div class="legend-item"><div class="legend-swatch swatch-critique"></div> Critique of logocentrism</div>
  </div>
  <figcaption>
    <strong>Diagram 8: Derrida's Differance and the Chain of Signification</strong>
    <span>Derrida radicalized Saussure's own insight: if meaning is differential, the process of differentiation can never come to rest. Differance names a double movement -- to differ (spatial) and to defer (temporal). Every sign is defined by other signs in an endless chain with no transcendental signified to anchor it. Every sign carries "traces" of absent signs that constitute it. Logocentrism (the privilege of speech/presence) is inverted through arche-writing: absence and recontextualization underlie all signification. Deconstruction reads texts to reveal how they undermine their own premises. Based on Derrida's "Differance" (1967) and <i>Of Grammatology</i> (1967).</span>
  </figcaption>
</figure>

  mermaid.initialize({ startOnLoad: true, securityLevel: 'loose', theme: 'neutral' });
</script>
</body>
</html>
