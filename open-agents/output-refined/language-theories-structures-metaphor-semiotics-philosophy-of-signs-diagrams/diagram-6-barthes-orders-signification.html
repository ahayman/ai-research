<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Barthes's Orders of Signification</title>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #f8f9fa;
    color: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 2rem;
  }
  figure {
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
    max-width: 1060px;
    width: 100%;
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid #e9ecef;
  }
  figcaption strong {
    display: block;
    font-size: 1.15rem;
    color: #1a1a2e;
    margin-bottom: 0.4rem;
  }
  figcaption span {
    font-size: 0.9rem;
    color: #6c757d;
    line-height: 1.5;
  }
  .mermaid {
    display: flex;
    justify-content: center;
  }
  .legend {
    display: flex;
    justify-content: center;
    gap: 2rem;
    margin-top: 1rem;
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.85rem;
    color: #495057;
  }
  .legend-swatch {
    width: 16px;
    height: 16px;
    border-radius: 4px;
  }
  .swatch-denote { background: #0284c7; }
  .swatch-connote { background: #7c3aed; }
  .swatch-myth { background: #dc2626; }
  @media (prefers-color-scheme: dark) {
    body { background: #1a1a2e; color: #e9ecef; }
    figure { background: #2d2d44; box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
    figcaption { border-top-color: #3d3d5c; }
    figcaption strong { color: #e9ecef; }
    figcaption span { color: #adb5bd; }
    .legend-item { color: #adb5bd; }
  }
</style>
</head>
<body>
<figure>
  <div class="mermaid">
%%{init: {'theme': 'neutral', 'themeVariables': {'fontSize': '13px'}}}%%
flowchart TB
    subgraph L1 ["FIRST ORDER: DENOTATION"]
        direction LR
        SR1["<b>Signifier</b><br/>Photograph of<br/>a red rose"]:::denote
        SD1["<b>Signified</b><br/>The flower:<br/>a rose"]:::denote
        SIGN1["<b>SIGN</b><br/>(Denotative meaning)<br/><i>This is a rose</i>"]:::denote_sign
        SR1 -->|"+"| SD1
        SD1 -->|"="| SIGN1
    end

    subgraph L2 ["SECOND ORDER: CONNOTATION"]
        direction LR
        SR2["<b>New Signifier</b><br/>(= the first-order<br/>sign as a whole)"]:::connote
        SD2["<b>New Signified</b><br/>Romance, passion,<br/>love, desire"]:::connote
        SIGN2["<b>SIGN</b><br/>(Connotative meaning)<br/><i>Rose means love</i>"]:::connote_sign
        SR2 -->|"+"| SD2
        SD2 -->|"="| SIGN2
    end

    subgraph L3 ["THIRD ORDER: MYTH / IDEOLOGY"]
        direction LR
        SR3["<b>New Signifier</b><br/>(= the connotative<br/>sign as a whole)"]:::myth
        SD3["<b>New Signified</b><br/>Naturalized ideology:<br/>love is universal,<br/>romance is natural"]:::myth
        SIGN3["<b>MYTH</b><br/>(Ideology as nature)<br/><i>This is just how<br/>things are</i>"]:::myth_sign
        SR3 -->|"+"| SD3
        SD3 -->|"="| SIGN3
    end

    SIGN1 ==>|"First-order sign<br/>becomes new signifier"| SR2
    SIGN2 ==>|"Second-order sign<br/>becomes new signifier"| SR3

    subgraph EXAMPLE ["BARTHES'S FAMOUS EXAMPLE"]
        direction TB
        EX1["<b>Denotation:</b> Photo of a Black soldier<br/>saluting the French flag"]:::ex
        EX2["<b>Connotation:</b> French military devotion,<br/>patriotism across races"]:::ex
        EX3["<b>Myth:</b> France is a great empire,<br/>all her sons serve faithfully --<br/>colonialism is benign and natural"]:::ex_myth
        EX1 --> EX2 --> EX3
    end

    POWER["<b>Myth's Power</b><br/>Transforms culture into nature<br/>Makes the arbitrary seem inevitable<br/>Invisibly naturalizes ideology"]:::power

    SIGN3 --> POWER

    classDef denote fill:#e0f2fe,stroke:#0284c7,stroke-width:2px,color:#1a1a2e
    classDef denote_sign fill:#bae6fd,stroke:#0284c7,stroke-width:2px,color:#1a1a2e
    classDef connote fill:#f3e8ff,stroke:#7c3aed,stroke-width:2px,color:#1a1a2e
    classDef connote_sign fill:#e9d5ff,stroke:#7c3aed,stroke-width:2px,color:#1a1a2e
    classDef myth fill:#fee2e2,stroke:#dc2626,stroke-width:2px,color:#1a1a2e
    classDef myth_sign fill:#fecaca,stroke:#dc2626,stroke-width:2px,color:#1a1a2e
    classDef ex fill:#f3f4f6,stroke:#6b7280,stroke-width:1px,color:#1a1a2e
    classDef ex_myth fill:#fee2e2,stroke:#dc2626,stroke-width:1px,color:#1a1a2e
    classDef power fill:#fef3c7,stroke:#d97706,stroke-width:2px,color:#1a1a2e
  </div>
  <div class="legend">
    <div class="legend-item"><div class="legend-swatch swatch-denote"></div> First order (denotation)</div>
    <div class="legend-item"><div class="legend-swatch swatch-connote"></div> Second order (connotation)</div>
    <div class="legend-item"><div class="legend-swatch swatch-myth"></div> Third order (myth/ideology)</div>
  </div>
  <figcaption>
    <strong>Diagram 6: Barthes's Orders of Signification</strong>
    <span>Barthes showed how Saussure's sign model operates at multiple levels. A first-order sign (denotation) becomes the signifier for a second-order sign (connotation), which in turn becomes the signifier for myth -- a system that transforms culturally constructed meanings into seemingly natural, inevitable truths. The Paris Match example shows a photograph of a saluting Black soldier that, at the level of myth, naturalizes French imperialism. Based on Barthes's <i>Mythologies</i> (1957).</span>
  </figcaption>
</figure>
<script>
  mermaid.initialize({ startOnLoad: true, securityLevel: 'loose', theme: 'neutral' });
</script>
</body>
</html>
