<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Peirce's Triadic Sign Model</title>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #f8f9fa;
    color: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 2rem;
  }
  figure {
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
    max-width: 1060px;
    width: 100%;
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid #e9ecef;
  }
  figcaption strong {
    display: block;
    font-size: 1.15rem;
    color: #1a1a2e;
    margin-bottom: 0.4rem;
  }
  figcaption span {
    font-size: 0.9rem;
    color: #6c757d;
    line-height: 1.5;
  }
  .mermaid {
    display: flex;
    justify-content: center;
  }
  .legend {
    display: flex;
    justify-content: center;
    gap: 2rem;
    margin-top: 1rem;
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.85rem;
    color: #495057;
  }
  .legend-swatch {
    width: 16px;
    height: 16px;
    border-radius: 4px;
  }
  .swatch-triad { background: #6366f1; }
  .swatch-types { background: #0891b2; }
  .swatch-semiosis { background: #059669; }
  @media (prefers-color-scheme: dark) {
    body { background: #1a1a2e; color: #e9ecef; }
    figure { background: #2d2d44; box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
    figcaption { border-top-color: #3d3d5c; }
    figcaption strong { color: #e9ecef; }
    figcaption span { color: #adb5bd; }
    .legend-item { color: #adb5bd; }
  }
</style>
</head>
<body>
<figure>
  <div class="mermaid">
%%{init: {'theme': 'neutral', 'themeVariables': {'fontSize': '13px'}}}%%
flowchart TD
    REP["<b>REPRESENTAMEN</b><br/>(Sign-vehicle)<br/>The perceptible form:<br/>word, image, gesture, sound"]:::triad

    OBJ["<b>OBJECT</b><br/>What the sign refers to:<br/>thing, idea, quality, event"]:::triad

    INT["<b>INTERPRETANT</b><br/>The meaning-effect produced:<br/>understanding, response,<br/>or further sign"]:::triad

    REP -->|"stands for"| OBJ
    REP -->|"determines"| INT
    OBJ -->|"grounds"| INT

    subgraph TYPES ["Sign-Object Relationship Types"]
        direction LR
        ICO["<b>ICON</b><br/>Resemblance<br/><i>photograph, map,<br/>onomatopoeia</i>"]:::icon
        IDX["<b>INDEX</b><br/>Causal connection<br/><i>smoke to fire,<br/>weathervane, pointing</i>"]:::index
        SYM["<b>SYMBOL</b><br/>Convention/rule<br/><i>words, flags,<br/>math notation</i>"]:::symbol
    end

    REP -.->|"related to Object as"| TYPES

    subgraph SEMIOSIS ["UNLIMITED SEMIOSIS"]
        direction LR
        I1["Interpretant 1<br/><i>See smoke, think fire</i>"]:::sem
        I2["Interpretant 2<br/><i>Think: call 911</i>"]:::sem
        I3["Interpretant 3<br/><i>Think: evacuate</i>"]:::sem
        I4["Interpretant N<br/><i>Chain continues...</i>"]:::sem
        I1 -->|"becomes new sign"| I2
        I2 -->|"becomes new sign"| I3
        I3 -->|"becomes new sign"| I4
    end

    INT -->|"Each interpretant is<br/>itself a new sign"| SEMIOSIS

    HABIT["<b>HABIT</b><br/>Ingrained tendency that<br/>temporarily arrests the chain<br/>and enables practical meaning"]:::habit
    SEMIOSIS -.->|"limited in practice by"| HABIT

    classDef triad fill:#e0e7ff,stroke:#6366f1,stroke-width:2px,color:#1a1a2e
    classDef icon fill:#ccfbf1,stroke:#0891b2,stroke-width:2px,color:#1a1a2e
    classDef index fill:#cffafe,stroke:#0891b2,stroke-width:2px,color:#1a1a2e
    classDef symbol fill:#e0f2fe,stroke:#0891b2,stroke-width:2px,color:#1a1a2e
    classDef sem fill:#dcfce7,stroke:#059669,stroke-width:1px,color:#1a1a2e
    classDef habit fill:#fef3c7,stroke:#d97706,stroke-width:2px,color:#1a1a2e
  </div>
  <div class="legend">
    <div class="legend-item"><div class="legend-swatch swatch-triad"></div> Triadic elements</div>
    <div class="legend-item"><div class="legend-swatch swatch-types"></div> Sign-Object types</div>
    <div class="legend-item"><div class="legend-swatch swatch-semiosis"></div> Unlimited semiosis chain</div>
  </div>
  <figcaption>
    <strong>Diagram 2: Peirce's Triadic Sign Model and Unlimited Semiosis</strong>
    <span>Peirce's sign is irreducibly triadic: the Representamen (sign-vehicle) stands for an Object and determines an Interpretant (meaning-effect). The sign-object relationship yields three types: Icons (resemblance), Indexes (causal connection), and Symbols (convention). Each interpretant is itself a sign that generates further interpretants -- unlimited semiosis -- though habit arrests the chain in practice. Based on Peirce's semiotic theory (c. 1860s-1910s).</span>
  </figcaption>
</figure>
<script>
  mermaid.initialize({ startOnLoad: true, securityLevel: 'loose', theme: 'neutral' });
</script>
</body>
</html>
