<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saussure vs. Peirce Comparison</title>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #f8f9fa;
    color: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 2rem;
  }
  figure {
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
    max-width: 1100px;
    width: 100%;
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid #e9ecef;
  }
  figcaption strong {
    display: block;
    font-size: 1.15rem;
    color: #1a1a2e;
    margin-bottom: 0.4rem;
  }
  figcaption span {
    font-size: 0.9rem;
    color: #6c757d;
    line-height: 1.5;
  }
  .mermaid {
    display: flex;
    justify-content: center;
  }
  .legend {
    display: flex;
    justify-content: center;
    gap: 2rem;
    margin-top: 1rem;
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.85rem;
    color: #495057;
  }
  .legend-swatch {
    width: 16px;
    height: 16px;
    border-radius: 4px;
  }
  .swatch-saussure { background: #6366f1; }
  .swatch-peirce { background: #059669; }
  .swatch-contrast { background: #d97706; }
  @media (prefers-color-scheme: dark) {
    body { background: #1a1a2e; color: #e9ecef; }
    figure { background: #2d2d44; box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
    figcaption { border-top-color: #3d3d5c; }
    figcaption strong { color: #e9ecef; }
    figcaption span { color: #adb5bd; }
    .legend-item { color: #adb5bd; }
  }
</style>
</head>
<body>
<figure>
  <div class="mermaid">
%%{init: {'theme': 'neutral', 'themeVariables': {'fontSize': '13px'}}}%%
flowchart LR
    subgraph SAUSS ["SAUSSURE (1857-1913)<br/>Continental Semiology"]
        direction TB
        S_SR["<b>Signifier</b><br/>Sound-image"]:::sauss
        S_SD["<b>Signified</b><br/>Concept"]:::sauss
        S_SR <-->|"arbitrary<br/>bond"| S_SD
        S_REF["Real-world referent"]:::excluded
        S_SD -.->|"EXCLUDED"| S_REF
        S_SYS["<b>Closed System</b><br/>Langue: stable structure<br/>of differences"]:::sauss_sys
        S_SR --> S_SYS
        S_SD --> S_SYS
    end

    subgraph PEIRCE ["PEIRCE (1839-1914)<br/>Anglo-American Semiotics"]
        direction TB
        P_REP["<b>Representamen</b><br/>Sign-vehicle"]:::peirce
        P_OBJ["<b>Object</b><br/>Real-world referent"]:::peirce
        P_INT["<b>Interpretant</b><br/>Meaning-effect"]:::peirce
        P_REP -->|"stands for"| P_OBJ
        P_REP -->|"determines"| P_INT
        P_OBJ -->|"grounds"| P_INT
        P_SEM["<b>Open Process</b><br/>Unlimited semiosis:<br/>interpretation never final"]:::peirce_sys
        P_INT --> P_SEM
    end

    subgraph KEY ["KEY DIFFERENCES"]
        direction TB
        K1["2 elements vs. 3 elements"]:::contrast
        K2["Referent excluded vs. included"]:::contrast
        K3["Structure vs. Process"]:::contrast
        K4["Linguistic signs only vs. All signs"]:::contrast
        K5["Synchronic system vs. Dynamic interpretation"]:::contrast
        K6["Meaning is fixed by system vs. Meaning converges via inquiry"]:::contrast
    end

    SAUSS --- KEY
    KEY --- PEIRCE

    classDef sauss fill:#e0e7ff,stroke:#6366f1,stroke-width:2px,color:#1a1a2e
    classDef sauss_sys fill:#c7d2fe,stroke:#6366f1,stroke-width:2px,color:#1a1a2e
    classDef excluded fill:#fee2e2,stroke:#dc2626,stroke-width:2px,color:#1a1a2e,stroke-dasharray: 5 5
    classDef peirce fill:#d1fae5,stroke:#059669,stroke-width:2px,color:#1a1a2e
    classDef peirce_sys fill:#a7f3d0,stroke:#059669,stroke-width:2px,color:#1a1a2e
    classDef contrast fill:#fef3c7,stroke:#d97706,stroke-width:2px,color:#1a1a2e
  </div>
  <div class="legend">
    <div class="legend-item"><div class="legend-swatch swatch-saussure"></div> Saussure's semiology</div>
    <div class="legend-item"><div class="legend-swatch swatch-peirce"></div> Peirce's semiotics</div>
    <div class="legend-item"><div class="legend-swatch swatch-contrast"></div> Key contrasts</div>
  </div>
  <figcaption>
    <strong>Diagram 3: Saussure vs. Peirce -- Two Founding Traditions</strong>
    <span>The two founders of modern sign theory took radically different approaches. Saussure's dyadic model confines meaning to an internal system of differences, excluding the real-world referent. Peirce's triadic model includes the object (referent) and introduces the interpretant, making sign relations dynamic and open-ended. These differences define the Continental (semiology) and Anglo-American (semiotics) traditions that shaped the field.</span>
  </figcaption>
</figure>
<script>
  mermaid.initialize({ startOnLoad: true, securityLevel: 'loose', theme: 'neutral' });
</script>
</body>
</html>
