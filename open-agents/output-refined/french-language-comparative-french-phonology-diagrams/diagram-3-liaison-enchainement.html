<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liaison and Enchaînement Process Flow</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --accent: #4361ee; --accent-light: #e8edff;
    --french: #3b82f6; --french-bg: #dbeafe;
    --english: #ef4444; --english-bg: #fee2e2;
    --liaison: #8b5cf6; --liaison-bg: #ede9fe;
    --chain: #06b6d4; --chain-bg: #cffafe;
    --forbidden: #ef4444; --forbidden-bg: #fee2e2;
    --obligatory: #22c55e; --obligatory-bg: #dcfce7;
    --optional: #f59e0b; --optional-bg: #fef3c7;
    --muted: #6c757d; --caption-bg: #f8f9fa;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a; --fg: #e8e8f0; --surface: #1a1a2e; --border: #2d2d44;
      --accent: #6b8aff; --accent-light: #1e2a4a;
      --french: #60a5fa; --french-bg: #1e3a5f;
      --english: #f87171; --english-bg: #5c1a1a;
      --liaison: #a78bfa; --liaison-bg: #2e1a5e;
      --chain: #22d3ee; --chain-bg: #0c3d4a;
      --forbidden: #f87171; --forbidden-bg: #5c1a1a;
      --obligatory: #4ade80; --obligatory-bg: #14532d;
      --optional: #fbbf24; --optional-bg: #78350f;
      --muted: #9a9ab0; --caption-bg: #1a1a2e;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg); color: var(--fg);
    display: flex; justify-content: center; padding: 2rem 1rem; line-height: 1.6;
  }
  figure { max-width: 1100px; width: 100%; }
  .diagram-container {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 1.5rem 1rem; overflow-x: auto;
  }
  figcaption {
    text-align: center; margin-top: 1.5rem; padding: 1rem 1.5rem;
    background: var(--caption-bg); border-radius: 8px; border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  svg { display: block; margin: 0 auto; }
  .title-text { font: bold 14px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
  .subtitle-text { font: 11px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
  .box-text { font: 12px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
  .ipa { font: 14px 'Gentium Plus', 'Noto Sans', 'DejaVu Sans', serif; }
  .label-sm { font: 10px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
  .legend { display: flex; gap: 1.5rem; justify-content: center; flex-wrap: wrap; margin-top: 1rem; font-size: 0.82rem; color: var(--muted); }
  .legend-item { display: flex; align-items: center; gap: 0.4rem; }
  .legend-swatch { width: 14px; height: 14px; border-radius: 3px; border: 1px solid var(--border); }
</style>
</head>
<body>
<figure>
  <div class="diagram-container">
    <svg viewBox="0 0 1060 700" xmlns="http://www.w3.org/2000/svg" style="min-width:780px;">
      <defs>
        <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="var(--fg)"/>
        </marker>
        <marker id="arrLiaison" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="var(--liaison)"/>
        </marker>
        <marker id="arrChain" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="var(--chain)"/>
        </marker>
      </defs>

      <text x="530" y="28" text-anchor="middle" class="title-text" style="font-size:16px;">Liaison and Enchainement: How French Blurs Word Boundaries</text>
      <text x="530" y="46" text-anchor="middle" class="subtitle-text">Two processes that restructure syllables across words to maintain the open-syllable (CV) preference</text>

      <!-- ========== DECISION FLOW ========== -->
      <g transform="translate(30, 65)">
        <!-- Starting state -->
        <rect x="370" y="0" width="260" height="40" rx="8" fill="var(--accent-light)" stroke="var(--accent)" stroke-width="2"/>
        <text x="500" y="25" text-anchor="middle" class="box-text" style="font-weight:bold;" fill="var(--accent)">Word ends in consonant letter</text>

        <!-- Decision diamond -->
        <line x1="500" y1="40" x2="500" y2="65" stroke="var(--fg)" stroke-width="1.5" marker-end="url(#arr)"/>
        <polygon points="500,70 580,110 500,150 420,110" fill="var(--surface)" stroke="var(--fg)" stroke-width="1.5"/>
        <text x="500" y="108" text-anchor="middle" class="box-text" style="font-size:11px;">Is the consonant</text>
        <text x="500" y="122" text-anchor="middle" class="box-text" style="font-size:11px;">normally silent?</text>

        <!-- YES -> Liaison path (left) -->
        <line x1="420" y1="110" x2="220" y2="110" stroke="var(--liaison)" stroke-width="2" marker-end="url(#arrLiaison)"/>
        <text x="320" y="100" text-anchor="middle" class="box-text" style="font-weight:bold;" fill="var(--liaison)">YES</text>

        <rect x="60" y="85" width="160" height="50" rx="8" fill="var(--liaison-bg)" stroke="var(--liaison)" stroke-width="2"/>
        <text x="140" y="107" text-anchor="middle" class="box-text" style="font-weight:bold;" fill="var(--liaison)">LIAISON</text>
        <text x="140" y="123" text-anchor="middle" class="label-sm" fill="var(--liaison)">Silent consonant revived</text>

        <!-- NO -> Enchaînement path (right) -->
        <line x1="580" y1="110" x2="780" y2="110" stroke="var(--chain)" stroke-width="2" marker-end="url(#arrChain)"/>
        <text x="680" y="100" text-anchor="middle" class="box-text" style="font-weight:bold;" fill="var(--chain)">NO</text>

        <rect x="780" y="85" width="200" height="50" rx="8" fill="var(--chain-bg)" stroke="var(--chain)" stroke-width="2"/>
        <text x="880" y="107" text-anchor="middle" class="box-text" style="font-weight:bold;" fill="var(--chain)">ENCHAINEMENT</text>
        <text x="880" y="123" text-anchor="middle" class="label-sm" fill="var(--chain)">Pronounced consonant resyllabified</text>
      </g>

      <!-- ========== LIAISON EXAMPLES ========== -->
      <g transform="translate(30, 230)">
        <text x="250" y="0" text-anchor="middle" class="title-text" fill="var(--liaison)">Liaison Examples</text>

        <!-- Three categories -->
        <!-- Obligatory -->
        <rect x="20" y="20" width="280" height="140" rx="8" fill="var(--obligatory-bg)" stroke="var(--obligatory)" stroke-width="1.5"/>
        <text x="160" y="42" text-anchor="middle" class="box-text" style="font-weight:bold;" fill="var(--obligatory)">OBLIGATORY</text>

        <text x="40" y="62" text-anchor="start" class="box-text" fill="var(--fg)">les amis</text>
        <text x="40" y="80" text-anchor="start" class="ipa" fill="var(--fg)">/le/ + /ami/ \u2192 /le.za.mi/</text>
        <text x="40" y="98" text-anchor="start" class="label-sm">After determiners, subject pronouns,</text>
        <text x="40" y="112" text-anchor="start" class="label-sm">monosyllabic prepositions</text>
        <text x="40" y="132" text-anchor="start" class="box-text" fill="var(--fg)">nous avons</text>
        <text x="40" y="148" text-anchor="start" class="ipa" fill="var(--fg)">/nu/ + /av\u0254\u0303/ \u2192 /nu.za.v\u0254\u0303/</text>

        <!-- Optional -->
        <rect x="320" y="20" width="160" height="140" rx="8" fill="var(--optional-bg)" stroke="var(--optional)" stroke-width="1.5"/>
        <text x="400" y="42" text-anchor="middle" class="box-text" style="font-weight:bold;" fill="var(--optional)">OPTIONAL</text>
        <text x="340" y="68" text-anchor="start" class="label-sm">After plural nouns,</text>
        <text x="340" y="82" text-anchor="start" class="label-sm">after verbs,</text>
        <text x="340" y="96" text-anchor="start" class="label-sm">varies by register</text>
        <text x="340" y="120" text-anchor="start" class="box-text" style="font-size:11px;" fill="var(--fg)">pas encore</text>
        <text x="340" y="138" text-anchor="start" class="ipa" style="font-size:12px;" fill="var(--fg)">/pa.z\u0251\u0303.k\u0254\u0281/</text>

        <!-- Forbidden -->
        <rect x="500" y="20" width="160" height="140" rx="8" fill="var(--forbidden-bg)" stroke="var(--forbidden)" stroke-width="1.5"/>
        <text x="580" y="42" text-anchor="middle" class="box-text" style="font-weight:bold;" fill="var(--forbidden)">FORBIDDEN</text>
        <text x="520" y="68" text-anchor="start" class="label-sm">After "et" (and),</text>
        <text x="520" y="82" text-anchor="start" class="label-sm">before h aspire,</text>
        <text x="520" y="96" text-anchor="start" class="label-sm">after proper names</text>
        <text x="520" y="120" text-anchor="start" class="box-text" style="font-size:11px;" fill="var(--fg)">et | elle</text>
        <text x="520" y="138" text-anchor="start" class="box-text" style="font-size:11px;" fill="var(--fg)">les | heros</text>

        <!-- Consonant changes -->
        <rect x="20" y="175" width="640" height="35" rx="6" fill="var(--surface)" stroke="var(--border)" stroke-width="1"/>
        <text x="340" y="198" text-anchor="middle" class="box-text" style="font-size:11px;">
          Consonant changes in liaison: -s/-x \u2192 /z/,  -d \u2192 /t/,  -n \u2192 nasalizes preceding vowel,  -f \u2192 /v/ (neuf_ans)
        </text>
      </g>

      <!-- ========== ENCHAINEMENT EXAMPLES ========== -->
      <g transform="translate(700, 230)">
        <text x="165" y="0" text-anchor="middle" class="title-text" fill="var(--chain)">Enchainement Example</text>

        <rect x="20" y="20" width="310" height="140" rx="8" fill="var(--chain-bg)" stroke="var(--chain)" stroke-width="1.5"/>
        <text x="175" y="42" text-anchor="middle" class="box-text" style="font-weight:bold;" fill="var(--chain)">Consonant ALWAYS pronounced</text>

        <text x="40" y="68" text-anchor="start" class="box-text" fill="var(--fg)">avec elle</text>
        <text x="40" y="88" text-anchor="start" class="ipa" fill="var(--fg)">/av\u025Bk/ + /\u025Bl/ \u2192 /a.v\u025B.k\u025Bl/</text>
        <text x="40" y="110" text-anchor="start" class="label-sm">The /k/ moves to begin next syllable</text>
        <text x="40" y="132" text-anchor="start" class="box-text" fill="var(--fg)">il arrive</text>
        <text x="40" y="150" text-anchor="start" class="ipa" fill="var(--fg)">/il/ + /a\u0281iv/ \u2192 /i.la.\u0281iv/</text>
      </g>

      <!-- ========== SYLLABIFICATION DEMO ========== -->
      <g transform="translate(30, 480)">
        <rect x="0" y="0" width="1000" height="95" rx="8" fill="var(--accent-light)" stroke="var(--accent)" stroke-width="1.5"/>
        <text x="500" y="22" text-anchor="middle" class="title-text" fill="var(--accent)">The Result: CV Syllable Structure Maintained Across Word Boundaries</text>

        <text x="30" y="48" text-anchor="start" class="box-text" fill="var(--fg)">Isolated words:</text>
        <text x="180" y="48" text-anchor="start" class="ipa" fill="var(--fg)"> /le/  |  /za.mi/  |  /s\u0254\u0303/  |  /ta.\u0281i.ve/</text>
        <text x="600" y="48" text-anchor="start" class="label-sm">\u2190 word boundaries clear</text>

        <text x="30" y="75" text-anchor="start" class="box-text" fill="var(--fg)">Connected speech:</text>
        <text x="180" y="75" text-anchor="start" class="ipa" style="font-weight:bold;" fill="var(--liaison)">/le.za.mi.s\u0254\u0303.ta.\u0281i.ve/</text>
        <text x="600" y="75" text-anchor="start" class="label-sm">\u2190 word boundaries ERASED; continuous CV.CV.CV</text>
        <text x="180" y="90" text-anchor="start" class="label-sm" fill="var(--liaison)">"les amis sont arrives" -- every syllable opens (ends in vowel)</text>
      </g>

      <!-- ========== ENGLISH COMPARISON ========== -->
      <g transform="translate(30, 590)">
        <rect x="0" y="0" width="1000" height="85" rx="8" fill="var(--english-bg)" stroke="var(--english)" stroke-width="1.5"/>
        <text x="500" y="22" text-anchor="middle" class="title-text" fill="var(--english)">English: No Equivalent Process</text>
        <text x="30" y="48" text-anchor="start" class="box-text" fill="var(--fg)">English word boundaries are stable in connected speech. "The friends arrived" keeps clear breaks between words.</text>
        <text x="30" y="68" text-anchor="start" class="box-text" fill="var(--fg)">English has linking-r ("far away" \u2192 /fa:\u0279\u0259we\u026A/) but nothing comparable to liaison's systematic revival of silent consonants.</text>
      </g>
    </svg>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background:var(--liaison-bg);border-color:var(--liaison);"></div> Liaison (silent consonant revived)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--chain-bg);border-color:var(--chain);"></div> Enchainement (consonant resyllabified)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--obligatory-bg);border-color:var(--obligatory);"></div> Obligatory</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--optional-bg);border-color:var(--optional);"></div> Optional</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--forbidden-bg);border-color:var(--forbidden);"></div> Forbidden</div>
  </div>

  <figcaption>
    <h2>Figure 3 -- Liaison and Enchainement: Cross-Word Syllable Restructuring</h2>
    <p>French has two systematic processes for restructuring syllable boundaries across words. Liaison revives normally-silent final consonants before vowel-initial words; enchainement resyllabifies always-pronounced final consonants. Both serve the same purpose: maintaining the open-syllable (CV) preference that gives French its smooth, flowing character. English has no comparable process -- word boundaries remain stable in connected speech.</p>
  </figcaption>
</figure>
</body>
</html>
