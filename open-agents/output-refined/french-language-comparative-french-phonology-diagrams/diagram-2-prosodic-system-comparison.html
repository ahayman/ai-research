<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prosodic System Comparison: Syllable-Timed vs. Stress-Timed</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --accent: #4361ee; --accent-light: #e8edff;
    --french: #3b82f6; --french-bg: #dbeafe;
    --english: #ef4444; --english-bg: #fee2e2;
    --muted: #6c757d; --caption-bg: #f8f9fa;
    --stress: #f59e0b; --stress-bg: #fef3c7;
    --reduced: #94a3b8;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a; --fg: #e8e8f0; --surface: #1a1a2e; --border: #2d2d44;
      --accent: #6b8aff; --accent-light: #1e2a4a;
      --french: #60a5fa; --french-bg: #1e3a5f;
      --english: #f87171; --english-bg: #5c1a1a;
      --muted: #9a9ab0; --caption-bg: #1a1a2e;
      --stress: #fbbf24; --stress-bg: #78350f;
      --reduced: #64748b;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg); color: var(--fg);
    display: flex; justify-content: center; padding: 2rem 1rem; line-height: 1.6;
  }
  figure { max-width: 1100px; width: 100%; }
  .diagram-container {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 1.5rem 1rem; overflow-x: auto;
  }
  figcaption {
    text-align: center; margin-top: 1.5rem; padding: 1rem 1.5rem;
    background: var(--caption-bg); border-radius: 8px; border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  svg { display: block; margin: 0 auto; }
  .title-text { font: bold 14px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
  .subtitle-text { font: 11px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
  .syl-text { font: 13px 'Segoe UI', system-ui, sans-serif; }
  .ipa { font: 13px 'Gentium Plus', 'Noto Sans', 'DejaVu Sans', serif; }
  .label-sm { font: 10px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
  .legend { display: flex; gap: 1.5rem; justify-content: center; flex-wrap: wrap; margin-top: 1rem; font-size: 0.82rem; color: var(--muted); }
  .legend-item { display: flex; align-items: center; gap: 0.4rem; }
  .legend-swatch { width: 14px; height: 14px; border-radius: 3px; border: 1px solid var(--border); }
</style>
</head>
<body>
<figure>
  <div class="diagram-container">
    <svg viewBox="0 0 1060 620" xmlns="http://www.w3.org/2000/svg" style="min-width:780px;">
      <text x="530" y="28" text-anchor="middle" class="title-text" style="font-size:16px;">Prosodic System Comparison</text>
      <text x="530" y="46" text-anchor="middle" class="subtitle-text">The same sentence, two completely different rhythmic architectures</text>

      <!-- Example sentence -->
      <text x="530" y="78" text-anchor="middle" class="title-text" style="font-size:13px;">"The little cat is on the table" / "Le petit chat est sur la table"</text>

      <!-- ========== ENGLISH: STRESS-TIMED ========== -->
      <g transform="translate(30, 100)">
        <text x="500" y="0" text-anchor="middle" class="title-text" fill="var(--english)">English: Stress-Timed</text>
        <text x="500" y="18" text-anchor="middle" class="subtitle-text">Peaks and valleys -- stressed syllables expand, unstressed compress toward schwa</text>

        <!-- Syllable bars with varying heights -->
        <!-- The LI- ttle CAT is ON the TA- ble -->
        <!-- Stress pattern: x X x X x X x X x -->

        <!-- "The" - unstressed -->
        <rect x="50" y="100" width="70" height="25" rx="4" fill="var(--english-bg)" stroke="var(--reduced)" stroke-width="1"/>
        <text x="85" y="117" text-anchor="middle" class="syl-text" fill="var(--reduced)">The</text>
        <text x="85" y="140" text-anchor="middle" class="ipa" fill="var(--reduced)">/\u00F0\u0259/</text>
        <text x="85" y="155" text-anchor="middle" class="label-sm" fill="var(--reduced)">reduced</text>

        <!-- "LI-" stressed -->
        <rect x="130" y="60" width="80" height="65" rx="4" fill="var(--stress-bg)" stroke="var(--stress)" stroke-width="2"/>
        <text x="170" y="100" text-anchor="middle" class="syl-text" style="font-weight:bold;" fill="var(--english)">LI-</text>
        <text x="170" y="140" text-anchor="middle" class="ipa" fill="var(--english)">/\u02C8l\u026At/</text>
        <text x="170" y="155" text-anchor="middle" class="label-sm" fill="var(--stress)">STRESSED</text>

        <!-- "-ttle" unstressed -->
        <rect x="220" y="100" width="60" height="25" rx="4" fill="var(--english-bg)" stroke="var(--reduced)" stroke-width="1"/>
        <text x="250" y="117" text-anchor="middle" class="syl-text" fill="var(--reduced)">-tle</text>
        <text x="250" y="140" text-anchor="middle" class="ipa" fill="var(--reduced)">/\u0259l/</text>

        <!-- "CAT" stressed -->
        <rect x="290" y="60" width="80" height="65" rx="4" fill="var(--stress-bg)" stroke="var(--stress)" stroke-width="2"/>
        <text x="330" y="100" text-anchor="middle" class="syl-text" style="font-weight:bold;" fill="var(--english)">CAT</text>
        <text x="330" y="140" text-anchor="middle" class="ipa" fill="var(--english)">/k\u00E6t/</text>
        <text x="330" y="155" text-anchor="middle" class="label-sm" fill="var(--stress)">STRESSED</text>

        <!-- "is" unstressed -->
        <rect x="380" y="100" width="50" height="25" rx="4" fill="var(--english-bg)" stroke="var(--reduced)" stroke-width="1"/>
        <text x="405" y="117" text-anchor="middle" class="syl-text" fill="var(--reduced)">is</text>
        <text x="405" y="140" text-anchor="middle" class="ipa" fill="var(--reduced)">/\u0259z/</text>

        <!-- "ON" stressed -->
        <rect x="440" y="60" width="80" height="65" rx="4" fill="var(--stress-bg)" stroke="var(--stress)" stroke-width="2"/>
        <text x="480" y="100" text-anchor="middle" class="syl-text" style="font-weight:bold;" fill="var(--english)">ON</text>
        <text x="480" y="140" text-anchor="middle" class="ipa" fill="var(--english)">/\u0252n/</text>
        <text x="480" y="155" text-anchor="middle" class="label-sm" fill="var(--stress)">STRESSED</text>

        <!-- "the" unstressed -->
        <rect x="530" y="100" width="50" height="25" rx="4" fill="var(--english-bg)" stroke="var(--reduced)" stroke-width="1"/>
        <text x="555" y="117" text-anchor="middle" class="syl-text" fill="var(--reduced)">the</text>
        <text x="555" y="140" text-anchor="middle" class="ipa" fill="var(--reduced)">/\u00F0\u0259/</text>

        <!-- "TA-" stressed -->
        <rect x="590" y="60" width="80" height="65" rx="4" fill="var(--stress-bg)" stroke="var(--stress)" stroke-width="2"/>
        <text x="630" y="100" text-anchor="middle" class="syl-text" style="font-weight:bold;" fill="var(--english)">TA-</text>
        <text x="630" y="140" text-anchor="middle" class="ipa" fill="var(--english)">/\u02C8te\u026A/</text>
        <text x="630" y="155" text-anchor="middle" class="label-sm" fill="var(--stress)">STRESSED</text>

        <!-- "-ble" unstressed -->
        <rect x="680" y="100" width="60" height="25" rx="4" fill="var(--english-bg)" stroke="var(--reduced)" stroke-width="1"/>
        <text x="710" y="117" text-anchor="middle" class="syl-text" fill="var(--reduced)">-ble</text>
        <text x="710" y="140" text-anchor="middle" class="ipa" fill="var(--reduced)">/b\u0259l/</text>

        <!-- Rhythm wave -->
        <path d="M 85,45 Q 130,30 170,25 Q 210,45 250,48 Q 290,30 330,25 Q 370,45 405,48 Q 440,30 480,25 Q 520,45 555,48 Q 590,30 630,25 Q 670,45 710,48" fill="none" stroke="var(--english)" stroke-width="2" opacity="0.6"/>
        <text x="800" y="40" text-anchor="start" class="label-sm" fill="var(--english)">stress wave</text>
      </g>

      <!-- ========== FRENCH: SYLLABLE-TIMED ========== -->
      <g transform="translate(30, 330)">
        <text x="500" y="0" text-anchor="middle" class="title-text" fill="var(--french)">French: Syllable-Timed</text>
        <text x="500" y="18" text-anchor="middle" class="subtitle-text">Even plateau -- all syllables roughly equal, slight phrase-final lengthening only</text>

        <!-- Le pe-tit chat | est sur la table -->
        <!-- Rhythmic group 1: Le.pe.ti.CHAT  Group 2: e.syr.la.TABL -->

        <!-- All syllables equal height -->
        <!-- Group 1 -->
        <rect x="80" y="75" width="80" height="45" rx="4" fill="var(--french-bg)" stroke="var(--french)" stroke-width="1.5"/>
        <text x="120" y="102" text-anchor="middle" class="syl-text" fill="var(--french)">Le</text>
        <text x="120" y="135" text-anchor="middle" class="ipa" fill="var(--french)">/l\u0259/</text>
        <text x="120" y="150" text-anchor="middle" class="label-sm" fill="var(--french)">full quality</text>

        <rect x="170" y="75" width="80" height="45" rx="4" fill="var(--french-bg)" stroke="var(--french)" stroke-width="1.5"/>
        <text x="210" y="102" text-anchor="middle" class="syl-text" fill="var(--french)">pe-</text>
        <text x="210" y="135" text-anchor="middle" class="ipa" fill="var(--french)">/p\u0259/</text>
        <text x="210" y="150" text-anchor="middle" class="label-sm" fill="var(--french)">full quality</text>

        <rect x="260" y="75" width="80" height="45" rx="4" fill="var(--french-bg)" stroke="var(--french)" stroke-width="1.5"/>
        <text x="300" y="102" text-anchor="middle" class="syl-text" fill="var(--french)">-ti</text>
        <text x="300" y="135" text-anchor="middle" class="ipa" fill="var(--french)">/ti/</text>

        <rect x="350" y="68" width="90" height="52" rx="4" fill="var(--stress-bg)" stroke="var(--stress)" stroke-width="2"/>
        <text x="395" y="100" text-anchor="middle" class="syl-text" style="font-weight:bold;" fill="var(--french)">CHAT</text>
        <text x="395" y="135" text-anchor="middle" class="ipa" fill="var(--french)">/\u0283a/</text>
        <text x="395" y="150" text-anchor="middle" class="label-sm" fill="var(--stress)">phrase-final</text>

        <!-- Phrase boundary marker -->
        <line x1="455" y1="60" x2="455" y2="135" stroke="var(--muted)" stroke-width="1.5" stroke-dasharray="4,3"/>
        <text x="455" y="55" text-anchor="middle" class="label-sm">|</text>

        <!-- Group 2 -->
        <rect x="475" y="75" width="80" height="45" rx="4" fill="var(--french-bg)" stroke="var(--french)" stroke-width="1.5"/>
        <text x="515" y="102" text-anchor="middle" class="syl-text" fill="var(--french)">est</text>
        <text x="515" y="135" text-anchor="middle" class="ipa" fill="var(--french)">/\u025B/</text>

        <rect x="565" y="75" width="80" height="45" rx="4" fill="var(--french-bg)" stroke="var(--french)" stroke-width="1.5"/>
        <text x="605" y="102" text-anchor="middle" class="syl-text" fill="var(--french)">sur</text>
        <text x="605" y="135" text-anchor="middle" class="ipa" fill="var(--french)">/sy\u0281/</text>

        <rect x="655" y="75" width="70" height="45" rx="4" fill="var(--french-bg)" stroke="var(--french)" stroke-width="1.5"/>
        <text x="690" y="102" text-anchor="middle" class="syl-text" fill="var(--french)">la</text>
        <text x="690" y="135" text-anchor="middle" class="ipa" fill="var(--french)">/la/</text>

        <rect x="735" y="68" width="95" height="52" rx="4" fill="var(--stress-bg)" stroke="var(--stress)" stroke-width="2"/>
        <text x="782" y="100" text-anchor="middle" class="syl-text" style="font-weight:bold;" fill="var(--french)">TABLE</text>
        <text x="782" y="135" text-anchor="middle" class="ipa" fill="var(--french)">/tabl/</text>
        <text x="782" y="150" text-anchor="middle" class="label-sm" fill="var(--stress)">phrase-final</text>

        <!-- Flat rhythm line -->
        <line x1="120" y1="65" x2="782" y2="65" stroke="var(--french)" stroke-width="2" opacity="0.6"/>
        <text x="860" y="68" text-anchor="start" class="label-sm" fill="var(--french)">even rhythm</text>

        <!-- Bracket annotations -->
        <path d="M 80,165 L 440,165" fill="none" stroke="var(--muted)" stroke-width="1"/>
        <text x="260" y="180" text-anchor="middle" class="label-sm">Rhythmic group 1</text>
        <path d="M 475,165 L 830,165" fill="none" stroke="var(--muted)" stroke-width="1"/>
        <text x="652" y="180" text-anchor="middle" class="label-sm">Rhythmic group 2</text>
      </g>

      <!-- ========== KEY INSIGHT BOX ========== -->
      <g transform="translate(60, 555)">
        <rect x="0" y="0" width="940" height="50" rx="8" fill="var(--accent-light)" stroke="var(--accent)" stroke-width="1"/>
        <text x="470" y="20" text-anchor="middle" class="title-text" fill="var(--accent)" style="font-size:12px;">THE CORE PATTERN</text>
        <text x="470" y="38" text-anchor="middle" class="subtitle-text" style="font-size:11px;">English stress is WORD-LEVEL and unpredictable (must be memorized per word). French stress is PHRASE-LEVEL and 100% predictable (always final syllable of group).</text>
      </g>
    </svg>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background:var(--stress-bg);border-color:var(--stress);"></div> Stressed / phrase-final</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--french-bg);border-color:var(--french);"></div> French syllable (equal weight)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--english-bg);border-color:var(--reduced);"></div> English unstressed (reduced)</div>
  </div>

  <figcaption>
    <h2>Figure 2 -- Prosodic System Comparison: Stress-Timed vs. Syllable-Timed</h2>
    <p>English creates a rhythmic landscape of peaks and valleys: stressed syllables are longer and louder, unstressed syllables compress and their vowels reduce toward schwa. French flows as an even plateau: every syllable receives roughly equal duration, with only slight lengthening at phrase boundaries. This is the single largest structural difference between French and English phonology -- it affects pronunciation, listening comprehension, and the entire rhythmic feel of each language.</p>
  </figcaption>
</figure>
</body>
</html>
