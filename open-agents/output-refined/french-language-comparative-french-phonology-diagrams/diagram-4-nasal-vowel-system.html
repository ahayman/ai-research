<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The French Nasal Vowel System</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --accent: #4361ee; --accent-light: #e8edff;
    --nasal: #a855f7; --nasal-bg: #f3e8ff;
    --oral: #22c55e; --oral-bg: #dcfce7;
    --english: #ef4444; --english-bg: #fee2e2;
    --rule: #f59e0b; --rule-bg: #fef3c7;
    --muted: #6c757d; --caption-bg: #f8f9fa;
    --merge: #94a3b8;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a; --fg: #e8e8f0; --surface: #1a1a2e; --border: #2d2d44;
      --accent: #6b8aff; --accent-light: #1e2a4a;
      --nasal: #c084fc; --nasal-bg: #3b1764;
      --oral: #4ade80; --oral-bg: #14532d;
      --english: #f87171; --english-bg: #5c1a1a;
      --rule: #fbbf24; --rule-bg: #78350f;
      --muted: #9a9ab0; --caption-bg: #1a1a2e;
      --merge: #64748b;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg); color: var(--fg);
    display: flex; justify-content: center; padding: 2rem 1rem; line-height: 1.6;
  }
  figure { max-width: 1100px; width: 100%; }
  .diagram-container {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 1.5rem 1rem; overflow-x: auto;
  }
  figcaption {
    text-align: center; margin-top: 1.5rem; padding: 1rem 1.5rem;
    background: var(--caption-bg); border-radius: 8px; border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  svg { display: block; margin: 0 auto; }
  .title-text { font: bold 14px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
  .subtitle-text { font: 11px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
  .box-text { font: 12px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
  .ipa { font: 15px 'Gentium Plus', 'Noto Sans', 'DejaVu Sans', serif; }
  .ipa-lg { font: bold 22px 'Gentium Plus', 'Noto Sans', 'DejaVu Sans', serif; }
  .label-sm { font: 10px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
  .word { font: italic 13px 'Segoe UI', system-ui, sans-serif; }
  .legend { display: flex; gap: 1.5rem; justify-content: center; flex-wrap: wrap; margin-top: 1rem; font-size: 0.82rem; color: var(--muted); }
  .legend-item { display: flex; align-items: center; gap: 0.4rem; }
  .legend-swatch { width: 14px; height: 14px; border-radius: 3px; border: 1px solid var(--border); }
</style>
</head>
<body>
<figure>
  <div class="diagram-container">
    <svg viewBox="0 0 1060 650" xmlns="http://www.w3.org/2000/svg" style="min-width:780px;">
      <defs>
        <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="var(--fg)"/>
        </marker>
        <marker id="arrMerge" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="var(--merge)"/>
        </marker>
      </defs>

      <text x="530" y="28" text-anchor="middle" class="title-text" style="font-size:16px;">The French Nasal Vowel System</text>
      <text x="530" y="46" text-anchor="middle" class="subtitle-text">Phonemic nasalization: an entire dimension of meaning-encoding absent from English</text>

      <!-- ========== THE FOUR NASAL VOWELS ========== -->
      <g transform="translate(30, 70)">
        <text x="500" y="0" text-anchor="middle" class="title-text" fill="var(--nasal)">The Four Nasal Vowels (3 stable + 1 merging)</text>

        <!-- /ɛ̃/ -->
        <rect x="40" y="25" width="200" height="100" rx="10" fill="var(--nasal-bg)" stroke="var(--nasal)" stroke-width="2"/>
        <text x="140" y="55" text-anchor="middle" class="ipa-lg" fill="var(--nasal)">\u025B\u0303</text>
        <text x="140" y="78" text-anchor="middle" class="word" fill="var(--fg)">vin, main, plein, faim</text>
        <text x="140" y="95" text-anchor="middle" class="label-sm">"open-mid front nasal"</text>
        <text x="140" y="112" text-anchor="middle" class="box-text" fill="var(--nasal)">STABLE</text>

        <!-- /ɑ̃/ -->
        <rect x="270" y="25" width="200" height="100" rx="10" fill="var(--nasal-bg)" stroke="var(--nasal)" stroke-width="2"/>
        <text x="370" y="55" text-anchor="middle" class="ipa-lg" fill="var(--nasal)">\u0251\u0303</text>
        <text x="370" y="78" text-anchor="middle" class="word" fill="var(--fg)">vent, dans, chambre</text>
        <text x="370" y="95" text-anchor="middle" class="label-sm">"open back nasal"</text>
        <text x="370" y="112" text-anchor="middle" class="box-text" fill="var(--nasal)">STABLE</text>

        <!-- /ɔ̃/ -->
        <rect x="500" y="25" width="200" height="100" rx="10" fill="var(--nasal-bg)" stroke="var(--nasal)" stroke-width="2"/>
        <text x="600" y="55" text-anchor="middle" class="ipa-lg" fill="var(--nasal)">\u0254\u0303</text>
        <text x="600" y="78" text-anchor="middle" class="word" fill="var(--fg)">vont, bon, monde</text>
        <text x="600" y="95" text-anchor="middle" class="label-sm">"open-mid back rounded nasal"</text>
        <text x="600" y="112" text-anchor="middle" class="box-text" fill="var(--nasal)">STABLE</text>

        <!-- /œ̃/ merging -->
        <rect x="730" y="25" width="200" height="100" rx="10" fill="var(--nasal-bg)" stroke="var(--merge)" stroke-width="2" stroke-dasharray="5,3"/>
        <text x="830" y="55" text-anchor="middle" class="ipa-lg" fill="var(--merge)">\u0153\u0303</text>
        <text x="830" y="78" text-anchor="middle" class="word" fill="var(--fg)">brun, un, parfum</text>
        <text x="830" y="95" text-anchor="middle" class="label-sm">"open-mid front rounded nasal"</text>
        <text x="830" y="112" text-anchor="middle" class="box-text" fill="var(--merge)">MERGING \u2192 \u025B\u0303</text>

        <!-- Merger arrow -->
        <path d="M 730,75 Q 580,20 240,75" fill="none" stroke="var(--merge)" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrMerge)"/>
        <text x="480" y="18" text-anchor="middle" class="label-sm" fill="var(--merge)">Parisian merger (4 \u2192 3 nasal vowels)</text>
      </g>

      <!-- ========== THE RULE ========== -->
      <g transform="translate(30, 210)">
        <rect x="80" y="0" width="900" height="100" rx="10" fill="var(--rule-bg)" stroke="var(--rule)" stroke-width="2"/>
        <text x="530" y="25" text-anchor="middle" class="title-text" fill="var(--rule)">THE PATTERN: Syllable Structure Determines Nasalization</text>

        <text x="130" y="52" text-anchor="start" class="box-text" fill="var(--fg)">V + /m,n/ in SAME syllable \u2192</text>
        <rect x="380" y="38" width="120" height="25" rx="5" fill="var(--nasal-bg)" stroke="var(--nasal)" stroke-width="1.5"/>
        <text x="440" y="56" text-anchor="middle" class="box-text" style="font-weight:bold;" fill="var(--nasal)">NASAL VOWEL</text>
        <text x="520" y="56" text-anchor="start" class="ipa" fill="var(--fg)">  "bon" /b\u0254\u0303/ -- n closes syllable</text>

        <text x="130" y="82" text-anchor="start" class="box-text" fill="var(--fg)">V + /m,n/ in DIFFERENT syllables \u2192</text>
        <rect x="410" y="68" width="120" height="25" rx="5" fill="var(--oral-bg)" stroke="var(--oral)" stroke-width="1.5"/>
        <text x="470" y="86" text-anchor="middle" class="box-text" style="font-weight:bold;" fill="var(--oral)">ORAL + nasal C</text>
        <text x="550" y="86" text-anchor="start" class="ipa" fill="var(--fg)">  "bonne" /b\u0254n/ -- n opens next syl.</text>
      </g>

      <!-- ========== MINIMAL PAIRS GRID ========== -->
      <g transform="translate(30, 330)">
        <text x="500" y="0" text-anchor="middle" class="title-text">Minimal Pairs: Nasalization Changes Meaning</text>

        <!-- Headers -->
        <rect x="80" y="18" width="200" height="28" rx="4" fill="var(--nasal-bg)" stroke="var(--nasal)" stroke-width="1"/>
        <text x="180" y="37" text-anchor="middle" class="box-text" style="font-weight:bold;" fill="var(--nasal)">Nasal Vowel</text>
        <rect x="290" y="18" width="200" height="28" rx="4" fill="var(--oral-bg)" stroke="var(--oral)" stroke-width="1"/>
        <text x="390" y="37" text-anchor="middle" class="box-text" style="font-weight:bold;" fill="var(--oral)">Oral Vowel + Nasal C</text>
        <rect x="500" y="18" width="200" height="28" rx="4" fill="var(--surface)" stroke="var(--border)" stroke-width="1"/>
        <text x="600" y="37" text-anchor="middle" class="box-text" style="font-weight:bold;">Why different?</text>

        <!-- Row 1 -->
        <text x="180" y="72" text-anchor="middle" class="ipa" fill="var(--nasal)">bon /b\u0254\u0303/ "good"</text>
        <text x="390" y="72" text-anchor="middle" class="ipa" fill="var(--oral)">bonne /b\u0254n/ "good (f.)"</text>
        <text x="600" y="72" text-anchor="middle" class="box-text">-n closes syl. vs. opens next</text>

        <!-- Row 2 -->
        <text x="180" y="102" text-anchor="middle" class="ipa" fill="var(--nasal)">an /\u0251\u0303/ "year"</text>
        <text x="390" y="102" text-anchor="middle" class="ipa" fill="var(--oral)">ane /\u0251\u02D0n/ "donkey"</text>
        <text x="600" y="102" text-anchor="middle" class="box-text">Same pattern</text>

        <!-- Row 3 -->
        <text x="180" y="132" text-anchor="middle" class="ipa" fill="var(--nasal)">beau /bo/ "beautiful"</text>
        <text x="390" y="132" text-anchor="middle" class="ipa" fill="var(--nasal)">bon /b\u0254\u0303/ "good"</text>
        <text x="600" y="132" text-anchor="middle" class="box-text">Nasality alone changes meaning</text>

        <!-- Row 4 -->
        <text x="180" y="162" text-anchor="middle" class="ipa" fill="var(--nasal)">sa /sa/ "his/her"</text>
        <text x="390" y="162" text-anchor="middle" class="ipa" fill="var(--nasal)">sans /s\u0251\u0303/ "without"</text>
        <text x="600" y="162" text-anchor="middle" class="box-text">Oral vs. nasal = different word</text>

        <!-- Separator lines -->
        <line x1="80" y1="55" x2="700" y2="55" stroke="var(--border)" stroke-width="0.5"/>
        <line x1="80" y1="85" x2="700" y2="85" stroke="var(--border)" stroke-width="0.5"/>
        <line x1="80" y1="115" x2="700" y2="115" stroke="var(--border)" stroke-width="0.5"/>
        <line x1="80" y1="145" x2="700" y2="145" stroke="var(--border)" stroke-width="0.5"/>
      </g>

      <!-- ========== ENGLISH COMPARISON ========== -->
      <g transform="translate(30, 530)">
        <rect x="0" y="0" width="1000" height="100" rx="8" fill="var(--english-bg)" stroke="var(--english)" stroke-width="1.5"/>
        <text x="500" y="22" text-anchor="middle" class="title-text" fill="var(--english)">English Comparison: Allophonic Nasalization Only</text>

        <text x="30" y="48" text-anchor="start" class="box-text" fill="var(--fg)">
          English "can" [k\u00E6\u0303n] -- the /\u00E6/ is nasalized before /n/, but this is AUTOMATIC and NEVER distinguishes meaning.
        </text>
        <text x="30" y="68" text-anchor="start" class="box-text" fill="var(--fg)">
          No English minimal pair exists where nasal vs. oral vowel alone changes the word. Nasalization is allophonic (predictable), not phonemic (contrastive).
        </text>
        <text x="30" y="88" text-anchor="start" class="box-text" style="font-weight:bold;" fill="var(--english)">
          French has an entire dimension of meaning-encoding (4 nasal phonemes) that English completely lacks.
        </text>
      </g>
    </svg>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background:var(--nasal-bg);border-color:var(--nasal);"></div> Nasal vowel (phonemic)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--oral-bg);border-color:var(--oral);"></div> Oral vowel + nasal consonant</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--rule-bg);border-color:var(--rule);"></div> The nasalization rule</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--english-bg);border-color:var(--english);"></div> English (no phonemic nasalization)</div>
  </div>

  <figcaption>
    <h2>Figure 4 -- The French Nasal Vowel System</h2>
    <p>French has 3-4 nasal vowel phonemes that distinguish word meaning -- an entire contrastive dimension absent from English. The nasalization rule is elegant and predictable: a vowel followed by /m/ or /n/ in the same syllable becomes nasal; when the nasal consonant opens the next syllable, the vowel stays oral. This syllable-structure rule governs all nasalization in French. English has only allophonic (automatic, non-contrastive) nasalization.</p>
  </figcaption>
</figure>
</body>
</html>
