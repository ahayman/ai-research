<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>French vs. English Vowel Space Comparison</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --accent: #4361ee;
    --accent-light: #e8edff;
    --shared: #22c55e;
    --shared-bg: #dcfce7;
    --french-only: #3b82f6;
    --french-bg: #dbeafe;
    --english-only: #ef4444;
    --english-bg: #fee2e2;
    --nasal: #a855f7;
    --nasal-bg: #f3e8ff;
    --muted: #6c757d;
    --caption-bg: #f8f9fa;
    --label: #374151;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --accent: #6b8aff;
      --accent-light: #1e2a4a;
      --shared: #4ade80;
      --shared-bg: #14532d;
      --french-only: #60a5fa;
      --french-bg: #1e3a5f;
      --english-only: #f87171;
      --english-bg: #5c1a1a;
      --nasal: #c084fc;
      --nasal-bg: #3b1764;
      --muted: #9a9ab0;
      --caption-bg: #1a1a2e;
      --label: #c8c8d8;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure { max-width: 1100px; width: 100%; }
  .diagram-container {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.5rem 1rem;
    overflow-x: auto;
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding: 1rem 1.5rem;
    background: var(--caption-bg);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  .legend {
    display: flex; gap: 1.5rem; justify-content: center; flex-wrap: wrap;
    margin-top: 1rem; font-size: 0.82rem; color: var(--muted);
  }
  .legend-item { display: flex; align-items: center; gap: 0.4rem; }
  .legend-swatch { width: 14px; height: 14px; border-radius: 3px; border: 1px solid var(--border); }
  svg { display: block; margin: 0 auto; }
  .ipa { font: 15px 'Gentium Plus', 'Noto Sans', 'DejaVu Sans', serif; }
  .ipa-large { font: bold 17px 'Gentium Plus', 'Noto Sans', 'DejaVu Sans', serif; }
  .title-text { font: bold 14px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
  .subtitle-text { font: 11px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
  .axis-label { font: 10px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
  .pair-label { font: italic 9px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
</style>
</head>
<body>
<figure>
  <div class="diagram-container">
    <svg viewBox="0 0 1060 580" xmlns="http://www.w3.org/2000/svg" style="min-width:780px;">
      <!-- Title -->
      <text x="530" y="28" text-anchor="middle" class="title-text" style="font-size:16px;">French vs. English Vowel Space</text>
      <text x="530" y="46" text-anchor="middle" class="subtitle-text">The same articulatory space, two radically different strategies</text>

      <!-- ========== FRENCH PANEL (left) ========== -->
      <text x="250" y="80" text-anchor="middle" class="title-text">French (~13 oral + 4 nasal)</text>
      <text x="250" y="96" text-anchor="middle" class="subtitle-text">Pure monophthongs; front rounded series; nasal vowels</text>

      <!-- Trapezoid outline -->
      <g transform="translate(60, 110)">
        <!-- Axes -->
        <text x="-10" y="0" text-anchor="end" class="axis-label">Close</text>
        <text x="-10" y="100" text-anchor="end" class="axis-label">Close-mid</text>
        <text x="-10" y="200" text-anchor="end" class="axis-label">Open-mid</text>
        <text x="-10" y="290" text-anchor="end" class="axis-label">Open</text>
        <text x="50" y="-15" text-anchor="middle" class="axis-label">Front</text>
        <text x="350" y="-15" text-anchor="middle" class="axis-label">Back</text>

        <!-- Trapezoid shape -->
        <path d="M 50,0 L 350,0 L 380,290 L 170,290 Z" fill="none" stroke="var(--border)" stroke-width="1" stroke-dasharray="4,4"/>

        <!-- Horizontal reference lines -->
        <line x1="50" y1="100" x2="360" y2="100" stroke="var(--border)" stroke-width="0.5" stroke-dasharray="2,3"/>
        <line x1="50" y1="200" x2="370" y2="200" stroke="var(--border)" stroke-width="0.5" stroke-dasharray="2,3"/>

        <!-- SHARED vowels (green) -->
        <circle cx="60" cy="0" r="16" fill="var(--shared-bg)" stroke="var(--shared)" stroke-width="2"/>
        <text x="60" y="5" text-anchor="middle" class="ipa" fill="var(--shared)">i</text>

        <circle cx="340" cy="0" r="16" fill="var(--shared-bg)" stroke="var(--shared)" stroke-width="2"/>
        <text x="340" y="5" text-anchor="middle" class="ipa" fill="var(--shared)">u</text>

        <circle cx="80" cy="100" r="16" fill="var(--shared-bg)" stroke="var(--shared)" stroke-width="2"/>
        <text x="80" y="105" text-anchor="middle" class="ipa" fill="var(--shared)">e</text>

        <circle cx="350" cy="100" r="16" fill="var(--shared-bg)" stroke="var(--shared)" stroke-width="2"/>
        <text x="350" y="105" text-anchor="middle" class="ipa" fill="var(--shared)">o</text>

        <circle cx="110" cy="200" r="16" fill="var(--shared-bg)" stroke="var(--shared)" stroke-width="2"/>
        <text x="110" y="205" text-anchor="middle" class="ipa" fill="var(--shared)">\u025B</text>

        <circle cx="365" cy="200" r="16" fill="var(--shared-bg)" stroke="var(--shared)" stroke-width="2"/>
        <text x="365" y="205" text-anchor="middle" class="ipa" fill="var(--shared)">\u0254</text>

        <circle cx="190" cy="280" r="16" fill="var(--shared-bg)" stroke="var(--shared)" stroke-width="2"/>
        <text x="190" y="285" text-anchor="middle" class="ipa" fill="var(--shared)">a</text>

        <!-- FRENCH-ONLY front rounded (blue) -->
        <circle cx="170" cy="0" r="16" fill="var(--french-bg)" stroke="var(--french-only)" stroke-width="2.5"/>
        <text x="170" y="5" text-anchor="middle" class="ipa-large" fill="var(--french-only)">y</text>

        <circle cx="190" cy="100" r="16" fill="var(--french-bg)" stroke="var(--french-only)" stroke-width="2.5"/>
        <text x="190" y="105" text-anchor="middle" class="ipa-large" fill="var(--french-only)">\u00F8</text>

        <circle cx="210" cy="200" r="16" fill="var(--french-bg)" stroke="var(--french-only)" stroke-width="2.5"/>
        <text x="210" y="205" text-anchor="middle" class="ipa-large" fill="var(--french-only)">\u0153</text>

        <!-- Pairing brackets for front rounded pairs -->
        <line x1="75" y1="0" x2="155" y2="0" stroke="var(--french-only)" stroke-width="1" stroke-dasharray="3,2"/>
        <text x="115" y="-10" text-anchor="middle" class="pair-label" fill="var(--french-only)">i vs y</text>
        <line x1="95" y1="100" x2="175" y2="100" stroke="var(--french-only)" stroke-width="1" stroke-dasharray="3,2"/>
        <text x="135" y="90" text-anchor="middle" class="pair-label" fill="var(--french-only)">e vs \u00F8</text>
        <line x1="125" y1="200" x2="195" y2="200" stroke="var(--french-only)" stroke-width="1" stroke-dasharray="3,2"/>
        <text x="160" y="190" text-anchor="middle" class="pair-label" fill="var(--french-only)">\u025B vs \u0153</text>

        <!-- Schwa (unique behavior in French) -->
        <circle cx="230" cy="150" r="14" fill="var(--french-bg)" stroke="var(--french-only)" stroke-width="1.5" stroke-dasharray="3,2"/>
        <text x="230" y="155" text-anchor="middle" class="ipa" fill="var(--french-only)">\u0259</text>
        <text x="260" y="150" text-anchor="start" class="pair-label" fill="var(--french-only)">e muet</text>

        <!-- NASAL VOWELS (purple, offset to right) -->
        <circle cx="420" cy="200" r="14" fill="var(--nasal-bg)" stroke="var(--nasal)" stroke-width="2"/>
        <text x="420" y="205" text-anchor="middle" class="ipa" fill="var(--nasal)">\u025B\u0303</text>

        <circle cx="420" cy="245" r="14" fill="var(--nasal-bg)" stroke="var(--nasal)" stroke-width="2"/>
        <text x="420" y="250" text-anchor="middle" class="ipa" fill="var(--nasal)">\u0254\u0303</text>

        <circle cx="420" cy="290" r="14" fill="var(--nasal-bg)" stroke="var(--nasal)" stroke-width="2"/>
        <text x="420" y="295" text-anchor="middle" class="ipa" fill="var(--nasal)">\u0251\u0303</text>

        <circle cx="420" cy="155" r="14" fill="var(--nasal-bg)" stroke="var(--nasal)" stroke-width="1.5" stroke-dasharray="3,2"/>
        <text x="420" y="160" text-anchor="middle" class="ipa" fill="var(--nasal)">\u0153\u0303</text>
        <text x="440" y="142" text-anchor="start" style="font:italic 8px 'Segoe UI',sans-serif;fill:var(--nasal);">merging w/ \u025B\u0303</text>

        <text x="420" y="122" text-anchor="middle" class="subtitle-text" fill="var(--nasal)">Nasal Vowels</text>
      </g>

      <!-- ========== ENGLISH PANEL (right) ========== -->
      <text x="800" y="80" text-anchor="middle" class="title-text">English (~12 mono + 8 diphthongs)</text>
      <text x="800" y="96" text-anchor="middle" class="subtitle-text">Tense/lax contrast; diphthongs; pervasive schwa reduction</text>

      <g transform="translate(600, 110)">
        <!-- Axes -->
        <text x="-10" y="0" text-anchor="end" class="axis-label">Close</text>
        <text x="-10" y="100" text-anchor="end" class="axis-label">Mid</text>
        <text x="-10" y="200" text-anchor="end" class="axis-label">Open-mid</text>
        <text x="-10" y="290" text-anchor="end" class="axis-label">Open</text>
        <text x="50" y="-15" text-anchor="middle" class="axis-label">Front</text>
        <text x="350" y="-15" text-anchor="middle" class="axis-label">Back</text>

        <!-- Trapezoid -->
        <path d="M 50,0 L 350,0 L 380,290 L 170,290 Z" fill="none" stroke="var(--border)" stroke-width="1" stroke-dasharray="4,4"/>
        <line x1="50" y1="100" x2="360" y2="100" stroke="var(--border)" stroke-width="0.5" stroke-dasharray="2,3"/>
        <line x1="50" y1="200" x2="370" y2="200" stroke="var(--border)" stroke-width="0.5" stroke-dasharray="2,3"/>

        <!-- Shared vowels (green) -->
        <circle cx="60" cy="0" r="16" fill="var(--shared-bg)" stroke="var(--shared)" stroke-width="2"/>
        <text x="60" y="5" text-anchor="middle" class="ipa" fill="var(--shared)">i\u02D0</text>

        <circle cx="340" cy="0" r="16" fill="var(--shared-bg)" stroke="var(--shared)" stroke-width="2"/>
        <text x="340" y="5" text-anchor="middle" class="ipa" fill="var(--shared)">u\u02D0</text>

        <circle cx="110" cy="200" r="16" fill="var(--shared-bg)" stroke="var(--shared)" stroke-width="2"/>
        <text x="110" y="205" text-anchor="middle" class="ipa" fill="var(--shared)">\u025B</text>

        <circle cx="365" cy="200" r="16" fill="var(--shared-bg)" stroke="var(--shared)" stroke-width="2"/>
        <text x="365" y="205" text-anchor="middle" class="ipa" fill="var(--shared)">\u0254\u02D0</text>

        <!-- English-only monophthongs (red) -->
        <circle cx="100" cy="40" r="14" fill="var(--english-bg)" stroke="var(--english-only)" stroke-width="2"/>
        <text x="100" y="45" text-anchor="middle" class="ipa" fill="var(--english-only)">\u026A</text>

        <circle cx="310" cy="40" r="14" fill="var(--english-bg)" stroke="var(--english-only)" stroke-width="2"/>
        <text x="310" y="45" text-anchor="middle" class="ipa" fill="var(--english-only)">\u028A</text>

        <circle cx="200" cy="130" r="16" fill="var(--english-bg)" stroke="var(--english-only)" stroke-width="2"/>
        <text x="200" y="135" text-anchor="middle" class="ipa" fill="var(--english-only)">\u0259</text>
        <text x="220" y="122" text-anchor="start" style="font:italic 8px 'Segoe UI',sans-serif;fill:var(--english-only);">dominant!</text>

        <circle cx="220" cy="180" r="14" fill="var(--english-bg)" stroke="var(--english-only)" stroke-width="2"/>
        <text x="220" y="185" text-anchor="middle" class="ipa" fill="var(--english-only)">\u028C</text>

        <circle cx="240" cy="240" r="14" fill="var(--english-bg)" stroke="var(--english-only)" stroke-width="2"/>
        <text x="240" y="245" text-anchor="middle" class="ipa" fill="var(--english-only)">\u00E6</text>

        <circle cx="350" cy="270" r="14" fill="var(--english-bg)" stroke="var(--english-only)" stroke-width="2"/>
        <text x="350" y="275" text-anchor="middle" class="ipa" fill="var(--english-only)">\u0251\u02D0</text>

        <circle cx="230" cy="100" r="14" fill="var(--english-bg)" stroke="var(--english-only)" stroke-width="2"/>
        <text x="230" y="105" text-anchor="middle" class="ipa" fill="var(--english-only)">\u025C\u02D0</text>

        <!-- Diphthong arrows (red, dashed) -->
        <text x="200" y="310" text-anchor="middle" style="font:bold 10px 'Segoe UI',sans-serif;fill:var(--english-only);">+ 8 Diphthongs (gliding vowels)</text>
        <!-- sample arrows for ei, ou, ai -->
        <path d="M 100,200 Q 90,120 80,40" fill="none" stroke="var(--english-only)" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowRed)"/>
        <text x="72" y="120" text-anchor="end" class="pair-label" fill="var(--english-only)">e\u026A</text>

        <path d="M 300,200 Q 310,120 320,40" fill="none" stroke="var(--english-only)" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowRed)"/>
        <text x="335" y="120" text-anchor="start" class="pair-label" fill="var(--english-only)">\u0259\u028A</text>

        <path d="M 200,280 Q 180,200 100,40" fill="none" stroke="var(--english-only)" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowRed)"/>
        <text x="135" y="180" text-anchor="start" class="pair-label" fill="var(--english-only)">a\u026A</text>

        <defs>
          <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
            <polygon points="0 0, 8 3, 0 6" fill="var(--english-only)"/>
          </marker>
        </defs>
      </g>

      <!-- ========== BOTTOM COMPARISON PANEL ========== -->
      <g transform="translate(0, 440)">
        <rect x="60" y="0" width="940" height="120" rx="8" fill="var(--surface)" stroke="var(--border)" stroke-width="1"/>

        <text x="530" y="25" text-anchor="middle" class="title-text">Pattern Summary</text>

        <text x="120" y="52" text-anchor="start" class="subtitle-text" style="font-size:12px;">
          French strategy: MORE monophthong contrasts, ZERO diphthongs, front rounded series, nasal vowels
        </text>
        <text x="120" y="72" text-anchor="start" class="subtitle-text" style="font-size:12px;">
          English strategy: FEWER monophthongs, 8 diphthongs (gliding vowels), tense/lax pairs, dominant schwa
        </text>
        <text x="120" y="95" text-anchor="start" class="subtitle-text" style="font-size:12px;">
          Key insight: Both systems are comparably rich (~17 vs ~20 vowel contrasts) but achieve richness through completely different mechanisms
        </text>
      </g>
    </svg>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background:var(--shared-bg);border-color:var(--shared);"></div> Shared (approximate equivalents)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--french-bg);border-color:var(--french-only);"></div> French only (front rounded)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--nasal-bg);border-color:var(--nasal);"></div> French nasal vowels</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--english-bg);border-color:var(--english-only);"></div> English only (lax/diphthongs)</div>
  </div>

  <figcaption>
    <h2>Figure 1 -- French vs. English Vowel Space</h2>
    <p>French exploits the rounded/unrounded distinction for front vowels at three heights (i/y, e/ø, ɛ/œ) and adds phonemic nasal vowels -- categories entirely absent from English. English compensates with 8 diphthongs (gliding vowels) and a tense/lax contrast. The two systems occupy the same articulatory space but carve it up with different tools: French uses lip rounding and nasalization; English uses vowel gliding and stress-driven reduction toward schwa.</p>
  </figcaption>
</figure>
</body>
</html>
