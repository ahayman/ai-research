<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Syllable Structure and Consonant Inventory Comparison</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --accent: #4361ee; --accent-light: #e8edff;
    --french: #3b82f6; --french-bg: #dbeafe;
    --english: #ef4444; --english-bg: #fee2e2;
    --shared: #22c55e; --shared-bg: #dcfce7;
    --unique-fr: #a855f7; --unique-fr-bg: #f3e8ff;
    --unique-en: #f59e0b; --unique-en-bg: #fef3c7;
    --muted: #6c757d; --caption-bg: #f8f9fa;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a; --fg: #e8e8f0; --surface: #1a1a2e; --border: #2d2d44;
      --accent: #6b8aff; --accent-light: #1e2a4a;
      --french: #60a5fa; --french-bg: #1e3a5f;
      --english: #f87171; --english-bg: #5c1a1a;
      --shared: #4ade80; --shared-bg: #14532d;
      --unique-fr: #c084fc; --unique-fr-bg: #3b1764;
      --unique-en: #fbbf24; --unique-en-bg: #78350f;
      --muted: #9a9ab0; --caption-bg: #1a1a2e;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg); color: var(--fg);
    display: flex; justify-content: center; padding: 2rem 1rem; line-height: 1.6;
  }
  figure { max-width: 1100px; width: 100%; }
  .diagram-container {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 1.5rem 1rem; overflow-x: auto;
  }
  figcaption {
    text-align: center; margin-top: 1.5rem; padding: 1rem 1.5rem;
    background: var(--caption-bg); border-radius: 8px; border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  svg { display: block; margin: 0 auto; }
  .title-text { font: bold 14px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
  .subtitle-text { font: 11px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
  .box-text { font: 12px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
  .ipa { font: 14px 'Gentium Plus', 'Noto Sans', 'DejaVu Sans', serif; }
  .label-sm { font: 10px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
  .legend { display: flex; gap: 1.5rem; justify-content: center; flex-wrap: wrap; margin-top: 1rem; font-size: 0.82rem; color: var(--muted); }
  .legend-item { display: flex; align-items: center; gap: 0.4rem; }
  .legend-swatch { width: 14px; height: 14px; border-radius: 3px; border: 1px solid var(--border); }
</style>
</head>
<body>
<figure>
  <div class="diagram-container">
    <svg viewBox="0 0 1060 720" xmlns="http://www.w3.org/2000/svg" style="min-width:780px;">
      <text x="530" y="28" text-anchor="middle" class="title-text" style="font-size:16px;">Syllable Structure and Consonant Inventory: French vs. English</text>

      <!-- ========== PART 1: SYLLABLE STRUCTURE ========== -->
      <g transform="translate(30, 55)">
        <text x="500" y="0" text-anchor="middle" class="title-text" fill="var(--accent)">Syllable Structure Templates</text>

        <!-- French template -->
        <rect x="40" y="20" width="420" height="110" rx="8" fill="var(--french-bg)" stroke="var(--french)" stroke-width="1.5"/>
        <text x="250" y="42" text-anchor="middle" class="title-text" fill="var(--french)">French: (C)(C)V(C)</text>
        <text x="60" y="65" text-anchor="start" class="box-text">Max onset: 2 consonants</text>
        <text x="60" y="82" text-anchor="start" class="box-text">Max coda: 1 consonant (rarely)</text>
        <text x="60" y="102" text-anchor="start" class="ipa" fill="var(--french)">pa.pi.er = CV.CV.V</text>
        <text x="60" y="120" text-anchor="start" class="ipa" fill="var(--french)">a.ni.mal = V.CV.CVC</text>

        <!-- English template -->
        <rect x="500" y="20" width="480" height="110" rx="8" fill="var(--english-bg)" stroke="var(--english)" stroke-width="1.5"/>
        <text x="740" y="42" text-anchor="middle" class="title-text" fill="var(--english)">English: (C)(C)(C)V(C)(C)(C)(C)</text>
        <text x="520" y="65" text-anchor="start" class="box-text">Max onset: 3 consonants</text>
        <text x="520" y="82" text-anchor="start" class="box-text">Max coda: 4 consonants</text>
        <text x="520" y="102" text-anchor="start" class="ipa" fill="var(--english)">strengths = CCCVCCCC</text>
        <text x="520" y="120" text-anchor="start" class="ipa" fill="var(--english)">sixths = CVCCCC</text>

        <!-- Open syllable pie charts -->
        <text x="250" y="155" text-anchor="middle" class="title-text" style="font-size:12px;">Open Syllable Percentage</text>

        <!-- French pie (76%) -->
        <circle cx="180" cy="210" r="45" fill="var(--french-bg)" stroke="var(--french)" stroke-width="2"/>
        <!-- 76% arc - approximately 273.6 degrees -->
        <path d="M 180,165 A 45,45 0 1 1 139.1,238.6" fill="var(--french)" opacity="0.6"/>
        <text x="180" y="215" text-anchor="middle" class="title-text" fill="var(--fg)" style="font-size:18px;">~76%</text>
        <text x="180" y="270" text-anchor="middle" class="box-text" fill="var(--french)">French: open syllables</text>

        <!-- English pie (~40%) -->
        <circle cx="380" cy="210" r="45" fill="var(--english-bg)" stroke="var(--english)" stroke-width="2"/>
        <!-- 40% arc - approximately 144 degrees -->
        <path d="M 380,165 A 45,45 0 0 1 411.8,241.8" fill="var(--english)" opacity="0.6"/>
        <text x="380" y="215" text-anchor="middle" class="title-text" fill="var(--fg)" style="font-size:18px;">~40%</text>
        <text x="380" y="270" text-anchor="middle" class="box-text" fill="var(--english)">English: open syllables</text>

        <!-- Insight -->
        <rect x="480" y="175" width="480" height="70" rx="6" fill="var(--accent-light)" stroke="var(--accent)" stroke-width="1"/>
        <text x="720" y="198" text-anchor="middle" class="box-text" style="font-weight:bold;" fill="var(--accent)">This is why French sounds "smooth" and English sounds "chunky"</text>
        <text x="720" y="218" text-anchor="middle" class="label-sm" style="font-size:11px;">French actively restructures syllables across word boundaries</text>
        <text x="720" y="235" text-anchor="middle" class="label-sm" style="font-size:11px;">(via liaison/enchainement) to maintain CV.CV.CV flow</text>
      </g>

      <!-- ========== PART 2: CONSONANT VENN DIAGRAM ========== -->
      <g transform="translate(30, 360)">
        <text x="500" y="0" text-anchor="middle" class="title-text" fill="var(--accent)">Consonant Inventory Comparison</text>

        <!-- Shared consonants (center) -->
        <rect x="200" y="25" width="600" height="80" rx="8" fill="var(--shared-bg)" stroke="var(--shared)" stroke-width="1.5"/>
        <text x="500" y="45" text-anchor="middle" class="box-text" style="font-weight:bold;" fill="var(--shared)">SHARED (~15 consonants)</text>
        <text x="500" y="65" text-anchor="middle" class="ipa" fill="var(--fg)">/p  b  t  d  k  g  f  v  s  z  \u0283  \u0292  m  n  l/</text>
        <text x="500" y="85" text-anchor="middle" class="label-sm">Plosives, most fricatives, bilabial/alveolar nasals, lateral</text>

        <!-- French only (left) -->
        <rect x="40" y="125" width="300" height="110" rx="8" fill="var(--unique-fr-bg)" stroke="var(--unique-fr)" stroke-width="2"/>
        <text x="190" y="148" text-anchor="middle" class="box-text" style="font-weight:bold;" fill="var(--unique-fr)">FRENCH ONLY</text>

        <text x="60" y="172" text-anchor="start" class="ipa" fill="var(--unique-fr)">/\u0281/</text>
        <text x="100" y="172" text-anchor="start" class="box-text">uvular fricative (the "French R")</text>

        <text x="60" y="195" text-anchor="start" class="ipa" fill="var(--unique-fr)">/\u0272/</text>
        <text x="100" y="195" text-anchor="start" class="box-text">palatal nasal (oignon, montagne)</text>

        <text x="60" y="218" text-anchor="start" class="ipa" fill="var(--unique-fr)">/\u0265/</text>
        <text x="100" y="218" text-anchor="start" class="box-text">labial-palatal glide (huit)</text>

        <!-- English only (right) -->
        <rect x="660" y="125" width="340" height="135" rx="8" fill="var(--unique-en-bg)" stroke="var(--unique-en)" stroke-width="2"/>
        <text x="830" y="148" text-anchor="middle" class="box-text" style="font-weight:bold;" fill="var(--unique-en)">ENGLISH ONLY</text>

        <text x="680" y="172" text-anchor="start" class="ipa" fill="var(--unique-en)">/\u03B8  \u00F0/</text>
        <text x="730" y="172" text-anchor="start" class="box-text">dental fricatives ("th" sounds)</text>

        <text x="680" y="195" text-anchor="start" class="ipa" fill="var(--unique-en)">/t\u0283  d\u0292/</text>
        <text x="730" y="195" text-anchor="start" class="box-text">affricates ("ch", "j")</text>

        <text x="680" y="218" text-anchor="start" class="ipa" fill="var(--unique-en)">/\u014B/</text>
        <text x="730" y="218" text-anchor="start" class="box-text">velar nasal ("ng")</text>

        <text x="680" y="241" text-anchor="start" class="ipa" fill="var(--unique-en)">/\u0279/</text>
        <text x="730" y="241" text-anchor="start" class="box-text">post-alveolar approximant ("r")</text>

        <!-- R comparison callout -->
        <rect x="200" y="275" width="600" height="50" rx="6" fill="var(--accent-light)" stroke="var(--accent)" stroke-width="1.5"/>
        <text x="500" y="295" text-anchor="middle" class="title-text" fill="var(--accent)" style="font-size:12px;">THE "R" CONTRAST: Same letter, completely different sounds</text>
        <text x="500" y="315" text-anchor="middle" class="box-text">
          French /\u0281/ (back of throat, uvular) vs. English /\u0279/ (tongue tip, alveolar) -- produced in opposite parts of the mouth
        </text>
      </g>

      <!-- Count summary -->
      <g transform="translate(30, 690)">
        <text x="250" y="0" text-anchor="middle" class="box-text" fill="var(--french)">French: ~18 consonants + 3 semi-vowels</text>
        <text x="530" y="0" text-anchor="middle" class="box-text" fill="var(--fg)">|</text>
        <text x="780" y="0" text-anchor="middle" class="box-text" fill="var(--english)">English: ~24 consonants</text>
      </g>
    </svg>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background:var(--shared-bg);border-color:var(--shared);"></div> Shared consonants</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--unique-fr-bg);border-color:var(--unique-fr);"></div> French only</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--unique-en-bg);border-color:var(--unique-en);"></div> English only</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--french-bg);border-color:var(--french);"></div> French syllable template</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--english-bg);border-color:var(--english);"></div> English syllable template</div>
  </div>

  <figcaption>
    <h2>Figure 5 -- Syllable Structure and Consonant Inventory Comparison</h2>
    <p>French and English diverge sharply in syllable complexity. French favors open syllables (~76% CV) with simple templates; English tolerates massive consonant clusters (up to CCCVCCCC in "strengths"). The consonant inventories overlap substantially (~15 shared), but each language has unique sounds: French contributes the uvular R, palatal nasal, and labial-palatal glide; English contributes dental fricatives, affricates, the velar nasal, and the alveolar approximant R. The R difference is particularly striking -- same letter, opposite articulatory locations.</p>
  </figcaption>
</figure>
</body>
</html>
