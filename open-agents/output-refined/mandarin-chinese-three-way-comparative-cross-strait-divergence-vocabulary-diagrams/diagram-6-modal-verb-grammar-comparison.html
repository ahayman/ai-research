<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grammar & Modal Verb Differences: Putonghua vs. Guoyu</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --accent: #06b6d4;
    --ml: #ef4444; --ml-bg: #fef2f2; --ml-border: #fecaca;
    --tw: #22c55e; --tw-bg: #f0fdf4; --tw-border: #bbf7d0;
    --both: #6366f1; --both-bg: #eef2ff;
    --muted: #6c757d;
    --gram1: #8b5cf6; --gram2: #ec4899; --gram3: #0ea5e9; --gram4: #f59e0b;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f172a; --fg: #e2e8f0; --surface: #1e293b; --border: #334155;
      --accent: #22d3ee;
      --ml: #f87171; --ml-bg: #1f1215; --ml-border: #7f1d1d;
      --tw: #4ade80; --tw-bg: #0f1f15; --tw-border: #166534;
      --both: #818cf8; --both-bg: #1e1b4b;
      --muted: #94a3b8;
      --gram1: #a78bfa; --gram2: #f472b6; --gram3: #38bdf8; --gram4: #fbbf24;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg); color: var(--fg);
    display: flex; justify-content: center; padding: 2rem 1rem; line-height: 1.5;
  }
  figure { max-width: 1050px; width: 100%; }
  .diagram-container {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 1.5rem; overflow-x: auto;
  }
  .title { text-align: center; font-size: 1.15rem; font-weight: 700; color: var(--accent); margin-bottom: 0.2rem; }
  .subtitle { text-align: center; font-size: 0.82rem; color: var(--muted); margin-bottom: 1.5rem; }

  /* Section headers */
  .section-head {
    display: flex; align-items: center; gap: 0.5rem;
    margin-bottom: 0.8rem; margin-top: 1.5rem;
  }
  .section-head:first-of-type { margin-top: 0; }
  .sh-icon {
    width: 28px; height: 28px; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.7rem; font-weight: 800; color: #fff;
  }
  .sh-1 .sh-icon { background: var(--gram1); }
  .sh-2 .sh-icon { background: var(--gram2); }
  .sh-3 .sh-icon { background: var(--gram3); }
  .sh-4 .sh-icon { background: var(--gram4); }
  .sh-title { font-size: 0.95rem; font-weight: 700; }
  .sh-1 .sh-title { color: var(--gram1); }
  .sh-2 .sh-title { color: var(--gram2); }
  .sh-3 .sh-title { color: var(--gram3); }
  .sh-4 .sh-title { color: var(--gram4); }

  /* Modal verb table */
  .modal-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; margin-bottom: 0.5rem; }
  .modal-table th {
    padding: 0.4rem 0.6rem; font-size: 0.68rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.04em;
    border-bottom: 2px solid var(--border); text-align: left;
  }
  .modal-table th:nth-child(2) { color: var(--ml); }
  .modal-table th:nth-child(3) { color: var(--tw); }
  .modal-table td {
    padding: 0.4rem 0.6rem; border-bottom: 1px solid var(--border);
    vertical-align: top;
  }
  .modal-table tr:last-child td { border-bottom: none; }
  .zh { font-weight: 700; font-size: 1em; }
  .py { font-style: italic; color: var(--muted); font-size: 0.85em; }
  .freq { font-size: 0.7rem; padding: 0.1rem 0.3rem; border-radius: 3px; font-weight: 600; }
  .freq-high { background: color-mix(in srgb, var(--ml) 12%, var(--bg)); color: var(--ml); }
  .freq-low { background: color-mix(in srgb, var(--muted) 12%, var(--bg)); color: var(--muted); }
  .freq-tw-high { background: color-mix(in srgb, var(--tw) 12%, var(--bg)); color: var(--tw); }

  /* Construction cards */
  .constructions {
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.8rem;
  }
  .constr-card {
    border-radius: 8px; padding: 0.7rem 0.8rem;
    border: 2px solid var(--border); background: var(--bg);
  }
  .cc-title { font-size: 0.85rem; font-weight: 700; margin-bottom: 0.3rem; }
  .cc-example {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 5px; padding: 0.35rem 0.5rem; margin-bottom: 0.3rem;
    font-size: 0.78rem;
  }
  .cc-example:last-child { margin-bottom: 0; }
  .cc-side { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; }
  .cs-ml { color: var(--ml); }
  .cs-tw { color: var(--tw); }
  .cs-both { color: var(--both); }
  .cc-zh { font-weight: 700; }
  .cc-gloss { font-size: 0.72rem; color: var(--muted); }

  /* Particle comparison */
  .particles-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.5rem;
  }
  .particle-card {
    border-radius: 6px; padding: 0.5rem 0.6rem;
    border: 1px solid var(--border); background: var(--bg);
    text-align: center;
  }
  .pc-char { font-size: 1.3rem; font-weight: 700; }
  .pc-py { font-size: 0.75rem; color: var(--muted); font-style: italic; }
  .pc-use { font-size: 0.7rem; margin-top: 0.2rem; }
  .pc-use-ml { color: var(--ml); }
  .pc-use-tw { color: var(--tw); }
  .pc-use-both { color: var(--both); }
  .pc-note { font-size: 0.68rem; color: var(--muted); margin-top: 0.2rem; }

  /* Takeaway */
  .takeaway {
    margin-top: 1.2rem; padding: 0.8rem 1rem;
    border-radius: 8px; border: 2px dashed var(--accent);
    background: color-mix(in srgb, var(--accent) 5%, var(--bg));
    font-size: 0.82rem; line-height: 1.5;
  }
  .tk-title {
    font-weight: 700; color: var(--accent); font-size: 0.78rem;
    text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 0.3rem;
  }

  figcaption {
    text-align: center; margin-top: 0.8rem; font-size: 0.78rem;
    color: var(--muted); font-style: italic; padding: 0 1rem;
  }

  @media (max-width: 700px) {
    .constructions { grid-template-columns: 1fr; }
    .particles-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>
<figure>
  <div class="diagram-container">
    <div class="title">Grammar &amp; Modal Verb Differences</div>
    <div class="subtitle">Systematic preference differences in shared grammatical structures</div>

    <!-- Section 1: Modal verbs -->
    <div class="section-head sh-1">
      <div class="sh-icon">1</div>
      <div class="sh-title">Modal Verb Preferences</div>
    </div>
    <table class="modal-table">
      <thead>
        <tr>
          <th style="width:25%;">Function</th>
          <th style="width:25%;">Putonghua Preference</th>
          <th style="width:25%;">Guoyu Preference</th>
          <th style="width:25%;">Notes</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td><strong>"must / need to"</strong></td>
          <td><span class="zh">得</span> <span class="py">děi</span> <span class="freq freq-high">primary</span></td>
          <td><span class="zh">要</span> <span class="py">yào</span> <span class="freq freq-tw-high">primary</span></td>
          <td style="font-size:0.78rem;color:var(--muted);">得 děi is rare in Taiwan; sounds distinctly "mainland" to Taiwan ears</td>
        </tr>
        <tr>
          <td><strong>"don't" (imperative)</strong></td>
          <td><span class="zh">别</span> <span class="py">bié</span> <span class="freq freq-high">primary</span></td>
          <td><span class="zh">不要</span> <span class="py">búyào</span> <span class="freq freq-tw-high">primary</span></td>
          <td style="font-size:0.78rem;color:var(--muted);">别 exists in Taiwan but feels characteristically mainland</td>
        </tr>
        <tr>
          <td><strong>"can / able"</strong></td>
          <td><span class="zh">能</span> <span class="py">néng</span> / <span class="zh">可以</span> <span class="py">kěyǐ</span></td>
          <td><span class="zh">可以</span> <span class="py">kěyǐ</span> <span class="freq freq-tw-high">preferred</span></td>
          <td style="font-size:0.78rem;color:var(--muted);">Both use both; Taiwan slightly prefers 可以 overall</td>
        </tr>
        <tr>
          <td><strong>"have to" (obligation)</strong></td>
          <td><span class="zh">得</span> <span class="py">děi</span> / <span class="zh">必须</span> <span class="py">bìxū</span></td>
          <td><span class="zh">必須</span> <span class="py">bìxū</span> / <span class="zh">一定要</span> <span class="py">yīdìng yào</span></td>
          <td style="font-size:0.78rem;color:var(--muted);">得 again absent from Taiwan's active modal vocabulary</td>
        </tr>
      </tbody>
    </table>

    <!-- Section 2: Structural differences -->
    <div class="section-head sh-2">
      <div class="sh-icon">2</div>
      <div class="sh-title">Key Structural Differences</div>
    </div>
    <div class="constructions">
      <div class="constr-card">
        <div class="cc-title"><span class="zh">有</span> + Verb (perfective)</div>
        <div class="cc-example">
          <div class="cc-side cs-tw">Taiwan (common)</div>
          <div class="cc-zh">我有看到</div>
          <div class="cc-gloss">wǒ yǒu kàndào = "I did see (it)"</div>
        </div>
        <div class="cc-example">
          <div class="cc-side cs-ml">Mainland (non-standard)</div>
          <div class="cc-zh">我看到了</div>
          <div class="cc-gloss">wǒ kàndào le = "I saw (it)"</div>
        </div>
        <div style="font-size:0.72rem;color:var(--muted);margin-top:0.3rem;">
          The 有+V pattern is a Southern Min substrate feature. Mainland considers it grammatically non-standard.
        </div>
      </div>
      <div class="constr-card">
        <div class="cc-title">Semantic Shift: Same Word, Different Meaning</div>
        <div class="cc-example">
          <div class="cc-zh">窝心</div> <span class="py">wōxīn</span>
          <div class="cc-gloss"><span class="cs-ml">Mainland</span> = annoying, vexing</div>
          <div class="cc-gloss"><span class="cs-tw">Taiwan</span> = heartwarming, touching</div>
        </div>
        <div class="cc-example">
          <div class="cc-zh">爱人</div> <span class="py">àiren</span>
          <div class="cc-gloss"><span class="cs-ml">Mainland</span> = spouse (neutral, standard)</div>
          <div class="cc-gloss"><span class="cs-tw">Taiwan</span> = lover/sweetheart (intimate)</div>
        </div>
      </div>
    </div>

    <!-- Section 3: Sentence-final particles -->
    <div class="section-head sh-3">
      <div class="sh-icon">3</div>
      <div class="sh-title">Sentence-Final Particle Preferences</div>
    </div>
    <div class="particles-grid">
      <div class="particle-card">
        <div class="pc-char">嘛</div>
        <div class="pc-py">ma</div>
        <div class="pc-use pc-use-both">Both varieties</div>
        <div class="pc-note">"obviously" / assertive</div>
      </div>
      <div class="particle-card">
        <div class="pc-char">呢</div>
        <div class="pc-py">ne</div>
        <div class="pc-use pc-use-both">Both varieties</div>
        <div class="pc-note">question / continuation</div>
      </div>
      <div class="particle-card">
        <div class="pc-char">啦</div>
        <div class="pc-py">la</div>
        <div class="pc-use pc-use-both">Both (different nuance)</div>
        <div class="pc-note">softening; slightly different force</div>
      </div>
      <div class="particle-card">
        <div class="pc-char">耶</div>
        <div class="pc-py">yē</div>
        <div class="pc-use pc-use-tw">Characteristic Taiwan</div>
        <div class="pc-note">excitement / emphasis</div>
      </div>
      <div class="particle-card">
        <div class="pc-char">喔</div>
        <div class="pc-py">ō / wō</div>
        <div class="pc-use pc-use-tw">More common in Taiwan</div>
        <div class="pc-note">acknowledgment / gentle reminder</div>
      </div>
      <div class="particle-card">
        <div class="pc-char">哦</div>
        <div class="pc-py">ó / ò</div>
        <div class="pc-use pc-use-ml">More common on mainland</div>
        <div class="pc-note">acknowledgment / realization</div>
      </div>
    </div>

    <!-- Section 4: English comparison -->
    <div class="section-head sh-4">
      <div class="sh-icon">4</div>
      <div class="sh-title">English Parallel: British vs. American</div>
    </div>
    <div class="constructions">
      <div class="constr-card">
        <div class="cc-title">Grammar Preference Parallels</div>
        <div class="cc-example">
          <div class="cc-side cs-ml">British</div>
          <div>Have you got a pen? / at the weekend / in hospital</div>
        </div>
        <div class="cc-example">
          <div class="cc-side cs-tw">American</div>
          <div>Do you have a pen? / on the weekend / in the hospital</div>
        </div>
        <div style="font-size:0.72rem;color:var(--muted);margin-top:0.3rem;">
          Same pattern: shared core grammar, but systematic preference differences that mark identity.
        </div>
      </div>
      <div class="constr-card">
        <div class="cc-title">Semantic Shift Parallels</div>
        <div class="cc-example">
          <div><strong>pants</strong>: British = underwear; American = trousers</div>
        </div>
        <div class="cc-example">
          <div><strong>first floor</strong>: British = one above ground; American = ground level</div>
        </div>
        <div style="font-size:0.72rem;color:var(--muted);margin-top:0.3rem;">
          Like 窝心 wōxīn ("annoying" vs. "heartwarming"), same words can shift to opposite meanings.
        </div>
      </div>
    </div>

    <div class="takeaway">
      <div class="tk-title">Key Insight</div>
      The grammar and modal verb differences between Putonghua and Guoyu are <strong>preference differences, not structural incompatibilities</strong>. Speakers of both varieties understand each other perfectly &mdash; but the choices they make signal regional identity as clearly as accent does. This mirrors the British/American English situation, where "have you got" vs. "do you have" is instantly recognizable without causing any comprehension difficulty.
    </div>

  </div>
  <figcaption>Figure 6: Grammar, modal verb, and sentence-final particle preferences that differ between Putonghua and Guoyu. These are preference differences within a shared grammatical system, not structural incompatibilities.</figcaption>
</figure>
</body>
</html>
