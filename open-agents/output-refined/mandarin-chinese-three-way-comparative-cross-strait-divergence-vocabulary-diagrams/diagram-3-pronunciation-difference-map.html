<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pronunciation Differences: Putonghua vs. Guoyu</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --accent: #06b6d4;
    --ml: #ef4444; --ml-bg: #fef2f2; --ml-border: #fecaca;
    --tw: #22c55e; --tw-bg: #f0fdf4; --tw-border: #bbf7d0;
    --diff: #f59e0b; --diff-bg: #fffbeb;
    --muted: #6c757d;
    --feat1: #8b5cf6; --feat2: #ec4899; --feat3: #0ea5e9; --feat4: #14b8a6;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f172a; --fg: #e2e8f0; --surface: #1e293b; --border: #334155;
      --accent: #22d3ee;
      --ml: #f87171; --ml-bg: #1f1215; --ml-border: #7f1d1d;
      --tw: #4ade80; --tw-bg: #0f1f15; --tw-border: #166534;
      --diff: #fbbf24; --diff-bg: #1f1a0a;
      --muted: #94a3b8;
      --feat1: #a78bfa; --feat2: #f472b6; --feat3: #38bdf8; --feat4: #2dd4bf;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg); color: var(--fg);
    display: flex; justify-content: center; padding: 2rem 1rem; line-height: 1.5;
  }
  figure { max-width: 1050px; width: 100%; }
  .diagram-container {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 1.5rem; overflow-x: auto;
  }
  .title { text-align: center; font-size: 1.15rem; font-weight: 700; color: var(--accent); margin-bottom: 0.2rem; }
  .subtitle { text-align: center; font-size: 0.82rem; color: var(--muted); margin-bottom: 1.5rem; }

  .features {
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem;
  }
  .feature-card {
    border-radius: 8px; padding: 1rem;
    border: 2px solid var(--border); background: var(--bg);
  }
  .fc-head {
    display: flex; align-items: center; gap: 0.5rem;
    margin-bottom: 0.6rem;
  }
  .fc-icon {
    width: 32px; height: 32px; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.85rem; font-weight: 800; color: #fff;
  }
  .fc-1 .fc-icon { background: var(--feat1); }
  .fc-2 .fc-icon { background: var(--feat2); }
  .fc-3 .fc-icon { background: var(--feat3); }
  .fc-4 .fc-icon { background: var(--feat4); }
  .fc-title { font-size: 0.9rem; font-weight: 700; }
  .fc-1 .fc-title { color: var(--feat1); }
  .fc-2 .fc-title { color: var(--feat2); }
  .fc-3 .fc-title { color: var(--feat3); }
  .fc-4 .fc-title { color: var(--feat4); }
  .fc-desc { font-size: 0.78rem; color: var(--muted); margin-bottom: 0.6rem; line-height: 1.4; }

  .comparison-row {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 0.4rem; margin-bottom: 0.4rem;
  }
  .comp-cell {
    border-radius: 5px; padding: 0.3rem 0.5rem; font-size: 0.78rem;
  }
  .comp-ml { background: var(--ml-bg); border: 1px solid var(--ml-border); }
  .comp-tw { background: var(--tw-bg); border: 1px solid var(--tw-border); }
  .comp-label {
    font-size: 0.6rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.05em; display: block;
  }
  .comp-ml .comp-label { color: var(--ml); }
  .comp-tw .comp-label { color: var(--tw); }
  .comp-zh { font-weight: 700; font-size: 0.95em; }
  .comp-ipa { font-style: italic; color: var(--muted); font-size: 0.85em; }

  .example-set { margin-top: 0.5rem; }
  .example-set-title {
    font-size: 0.68rem; font-weight: 600; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.3rem;
  }

  .attitude-bar {
    margin-top: 1.5rem; padding-top: 1.2rem; border-top: 2px solid var(--border);
  }
  .att-title { text-align: center; font-size: 0.85rem; font-weight: 700; color: var(--accent); margin-bottom: 0.8rem; }
  .att-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem;
  }
  .att-card {
    border-radius: 8px; padding: 0.7rem 0.8rem; font-size: 0.78rem;
    line-height: 1.4;
  }
  .att-ml {
    background: var(--ml-bg); border: 1px solid var(--ml-border);
  }
  .att-tw {
    background: var(--tw-bg); border: 1px solid var(--tw-border);
  }
  .att-label { font-weight: 700; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.2rem; }
  .att-ml .att-label { color: var(--ml); }
  .att-tw .att-label { color: var(--tw); }

  figcaption {
    text-align: center; margin-top: 0.8rem; font-size: 0.78rem;
    color: var(--muted); font-style: italic; padding: 0 1rem;
  }

  @media (max-width: 700px) {
    .features { grid-template-columns: 1fr; }
    .att-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<figure>
  <div class="diagram-container">
    <div class="title">Pronunciation Differences: Putonghua vs. Guoyu</div>
    <div class="subtitle">Same phonological system, systematic surface differences</div>

    <div class="features">

      <!-- Feature 1: Retroflexes -->
      <div class="feature-card fc-1">
        <div class="fc-head">
          <div class="fc-icon">1</div>
          <div class="fc-title">Retroflex Reduction</div>
        </div>
        <div class="fc-desc">Taiwan Guoyu tends to merge retroflex initials (zh, ch, sh) toward dental/alveolar (z, c, s). Attributed to Southern Min substrate influence. Varies by formality and education.</div>
        <div class="example-set">
          <div class="example-set-title">Examples</div>
          <div class="comparison-row">
            <div class="comp-cell comp-ml"><span class="comp-label">Putonghua</span><span class="comp-zh">知道</span> <span class="comp-ipa">zhīdào [tʂɻ̩.taʊ]</span></div>
            <div class="comp-cell comp-tw"><span class="comp-label">Guoyu</span><span class="comp-zh">知道</span> <span class="comp-ipa">zhīdào ~ zīdào [tsɻ̩.taʊ]</span></div>
          </div>
          <div class="comparison-row">
            <div class="comp-cell comp-ml"><span class="comp-label">Putonghua</span><span class="comp-zh">吃</span> <span class="comp-ipa">chī [tʂʰɻ̩]</span></div>
            <div class="comp-cell comp-tw"><span class="comp-label">Guoyu</span><span class="comp-zh">吃</span> <span class="comp-ipa">chī ~ cī [tsʰɻ̩]</span></div>
          </div>
          <div class="comparison-row">
            <div class="comp-cell comp-ml"><span class="comp-label">Putonghua</span><span class="comp-zh">是</span> <span class="comp-ipa">shì [ʂɻ̩]</span></div>
            <div class="comp-cell comp-tw"><span class="comp-label">Guoyu</span><span class="comp-zh">是</span> <span class="comp-ipa">shì ~ sì [sɻ̩]</span></div>
          </div>
        </div>
      </div>

      <!-- Feature 2: Erhua -->
      <div class="feature-card fc-2">
        <div class="fc-head">
          <div class="fc-icon">2</div>
          <div class="fc-title">Erhua (兒化) Presence</div>
        </div>
        <div class="fc-desc">Mainland Putonghua (especially Beijing-influenced) pervasively adds the -r suffix. Taiwan Guoyu virtually never uses erhua. This is one of the most immediately noticeable differences.</div>
        <div class="example-set">
          <div class="example-set-title">Examples</div>
          <div class="comparison-row">
            <div class="comp-cell comp-ml"><span class="comp-label">Putonghua</span><span class="comp-zh">花儿</span> <span class="comp-ipa">huār</span></div>
            <div class="comp-cell comp-tw"><span class="comp-label">Guoyu</span><span class="comp-zh">花</span> <span class="comp-ipa">huā</span></div>
          </div>
          <div class="comparison-row">
            <div class="comp-cell comp-ml"><span class="comp-label">Putonghua</span><span class="comp-zh">哪儿</span> <span class="comp-ipa">nǎr</span></div>
            <div class="comp-cell comp-tw"><span class="comp-label">Guoyu</span><span class="comp-zh">哪裡</span> <span class="comp-ipa">nǎlǐ</span></div>
          </div>
          <div class="comparison-row">
            <div class="comp-cell comp-ml"><span class="comp-label">Putonghua</span><span class="comp-zh">一点儿</span> <span class="comp-ipa">yìdiǎnr</span></div>
            <div class="comp-cell comp-tw"><span class="comp-label">Guoyu</span><span class="comp-zh">一點</span> <span class="comp-ipa">yìdiǎn</span></div>
          </div>
        </div>
      </div>

      <!-- Feature 3: Neutral tone -->
      <div class="feature-card fc-3">
        <div class="fc-head">
          <div class="fc-icon">3</div>
          <div class="fc-title">Neutral Tone (轻声)</div>
        </div>
        <div class="fc-desc">Putonghua frequently reduces the second syllable of common words to a neutral (unstressed) tone. Guoyu tends to pronounce both syllables with full tones, sounding more "even."</div>
        <div class="example-set">
          <div class="example-set-title">Examples</div>
          <div class="comparison-row">
            <div class="comp-cell comp-ml"><span class="comp-label">Putonghua</span><span class="comp-zh">你们</span> <span class="comp-ipa">nǐ·men (neutral 2nd)</span></div>
            <div class="comp-cell comp-tw"><span class="comp-label">Guoyu</span><span class="comp-zh">你們</span> <span class="comp-ipa">nǐmén (full T2)</span></div>
          </div>
          <div class="comparison-row">
            <div class="comp-cell comp-ml"><span class="comp-label">Putonghua</span><span class="comp-zh">东西</span> <span class="comp-ipa">dōng·xi (neutral 2nd)</span></div>
            <div class="comp-cell comp-tw"><span class="comp-label">Guoyu</span><span class="comp-zh">東西</span> <span class="comp-ipa">dōngxī (full T1)</span></div>
          </div>
          <div class="comparison-row">
            <div class="comp-cell comp-ml"><span class="comp-label">Putonghua</span><span class="comp-zh">客气</span> <span class="comp-ipa">kè·qi (neutral 2nd)</span></div>
            <div class="comp-cell comp-tw"><span class="comp-label">Guoyu</span><span class="comp-zh">客氣</span> <span class="comp-ipa">kèqì (full T4)</span></div>
          </div>
        </div>
      </div>

      <!-- Feature 4: Specific word pronunciations -->
      <div class="feature-card fc-4">
        <div class="fc-head">
          <div class="fc-icon">4</div>
          <div class="fc-title">Specific Word Differences</div>
        </div>
        <div class="fc-desc">Certain words have entirely different standard pronunciations in the two varieties, reflecting different historical reading traditions or standardization decisions.</div>
        <div class="example-set">
          <div class="example-set-title">Examples</div>
          <div class="comparison-row">
            <div class="comp-cell comp-ml"><span class="comp-label">Putonghua</span><span class="comp-zh">垃圾</span> <span class="comp-ipa">lājī</span></div>
            <div class="comp-cell comp-tw"><span class="comp-label">Guoyu</span><span class="comp-zh">垃圾</span> <span class="comp-ipa">lèsè</span></div>
          </div>
          <div class="comparison-row">
            <div class="comp-cell comp-ml"><span class="comp-label">Putonghua</span><span class="comp-zh">企鹅</span> <span class="comp-ipa">qǐ'é</span></div>
            <div class="comp-cell comp-tw"><span class="comp-label">Guoyu</span><span class="comp-zh">企鵝</span> <span class="comp-ipa">qì'é</span></div>
          </div>
          <div class="comparison-row">
            <div class="comp-cell comp-ml"><span class="comp-label">Putonghua</span><span class="comp-zh">暂时</span> <span class="comp-ipa">zànshí</span></div>
            <div class="comp-cell comp-tw"><span class="comp-label">Guoyu</span><span class="comp-zh">暫時</span> <span class="comp-ipa">zhànshí</span></div>
          </div>
        </div>
      </div>

    </div>

    <div class="attitude-bar">
      <div class="att-title">How Speakers Perceive Each Other</div>
      <div class="att-grid">
        <div class="att-card att-ml">
          <div class="att-label">How Putonghua Sounds to Taiwan Ears</div>
          "Crisp," "strong," "northern," "heavy erhua." In casual speech, retroflex initials and erhua create a distinctly "Beijing" flavor. Perceived as authoritative or sometimes harsh.
        </div>
        <div class="att-card att-tw">
          <div class="att-label">How Guoyu Sounds to Mainland Ears</div>
          "Soft," "flat," "gentle," "cute." The absence of erhua and reduced retroflexes create a smoother sound. Perceived as elegant or sometimes overly polite. Taiwan dramas have given Guoyu cultural cachet.
        </div>
      </div>
    </div>

  </div>
  <figcaption>Figure 3: Four systematic pronunciation differences between mainland Putonghua and Taiwan Guoyu. Despite sharing the same phonological system, these surface differences are immediately noticeable to native speakers of either variety.</figcaption>
</figure>
</body>
</html>
