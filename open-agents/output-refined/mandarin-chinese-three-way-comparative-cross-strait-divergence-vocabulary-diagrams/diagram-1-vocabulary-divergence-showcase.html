<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cross-Strait Vocabulary Divergence: Putonghua vs. Guoyu</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --accent: #06b6d4; --accent-dim: #0891b2;
    --ml: #ef4444; --ml-bg: #fef2f2; --ml-border: #fca5a5;
    --tw: #22c55e; --tw-bg: #f0fdf4; --tw-border: #86efac;
    --en: #6366f1; --en-bg: #eef2ff; --en-border: #a5b4fc;
    --same: #f59e0b; --same-bg: #fffbeb;
    --muted: #6c757d; --caption-bg: #f8f9fa;
    --cat-tech: #8b5cf6; --cat-food: #f97316; --cat-transport: #0ea5e9;
    --cat-daily: #ec4899; --cat-medical: #14b8a6;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f172a; --fg: #e2e8f0; --surface: #1e293b; --border: #334155;
      --accent: #22d3ee; --accent-dim: #06b6d4;
      --ml: #f87171; --ml-bg: #1f1215; --ml-border: #7f1d1d;
      --tw: #4ade80; --tw-bg: #0f1f15; --tw-border: #166534;
      --en: #818cf8; --en-bg: #1e1b4b; --en-border: #3730a3;
      --same: #fbbf24; --same-bg: #1f1a0a;
      --muted: #94a3b8; --caption-bg: #1e293b;
      --cat-tech: #a78bfa; --cat-food: #fb923c; --cat-transport: #38bdf8;
      --cat-daily: #f472b6; --cat-medical: #2dd4bf;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg); color: var(--fg);
    display: flex; justify-content: center; padding: 2rem 1rem; line-height: 1.5;
  }
  figure { max-width: 1100px; width: 100%; }
  .diagram-container {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 1.5rem; overflow-x: auto;
  }
  .title { text-align: center; font-size: 1.15rem; font-weight: 700; color: var(--accent); margin-bottom: 0.2rem; }
  .subtitle { text-align: center; font-size: 0.82rem; color: var(--muted); margin-bottom: 1.2rem; }
  .legend {
    display: flex; justify-content: center; gap: 1.5rem; margin-bottom: 1rem;
    flex-wrap: wrap; font-size: 0.78rem;
  }
  .legend-item { display: flex; align-items: center; gap: 0.3rem; }
  .legend-dot {
    width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
  }
  .dot-ml { background: var(--ml); }
  .dot-tw { background: var(--tw); }
  .dot-en { background: var(--en); }

  .vocab-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
  .vocab-table th {
    padding: 0.5rem 0.6rem; font-size: 0.7rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.05em;
    border-bottom: 2px solid var(--border); text-align: left;
  }
  .vocab-table th:nth-child(1) { width: 8%; color: var(--muted); }
  .vocab-table th:nth-child(2) { width: 14%; color: var(--en); }
  .vocab-table th:nth-child(3) { width: 28%; color: var(--ml); }
  .vocab-table th:nth-child(4) { width: 28%; color: var(--tw); }
  .vocab-table th:nth-child(5) { width: 22%; color: var(--muted); }
  .vocab-table td {
    padding: 0.45rem 0.6rem; border-bottom: 1px solid var(--border);
    vertical-align: top;
  }
  .vocab-table tr:last-child td { border-bottom: none; }
  .zh { font-size: 1.05em; font-weight: 600; }
  .py { font-style: italic; color: var(--muted); font-size: 0.85em; display: block; }
  .lit { font-size: 0.78em; color: var(--muted); display: block; margin-top: 1px; }
  .cat-badge {
    display: inline-block; font-size: 0.6rem; font-weight: 700;
    padding: 0.1rem 0.35rem; border-radius: 3px; text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .cat-tech { background: color-mix(in srgb, var(--cat-tech) 15%, transparent); color: var(--cat-tech); }
  .cat-food { background: color-mix(in srgb, var(--cat-food) 15%, transparent); color: var(--cat-food); }
  .cat-transport { background: color-mix(in srgb, var(--cat-transport) 15%, transparent); color: var(--cat-transport); }
  .cat-daily { background: color-mix(in srgb, var(--cat-daily) 15%, transparent); color: var(--cat-daily); }
  .cat-medical { background: color-mix(in srgb, var(--cat-medical) 15%, transparent); color: var(--cat-medical); }
  .insight {
    font-size: 0.78em; color: var(--muted); font-style: italic;
  }
  .highlight-row td { background: var(--same-bg); }

  .summary {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.8rem;
    margin-top: 1.2rem;
  }
  .summary-card {
    border-radius: 8px; padding: 0.7rem 0.8rem; text-align: center;
  }
  .sc-ml { background: var(--ml-bg); border: 1px solid var(--ml-border); }
  .sc-tw { background: var(--tw-bg); border: 1px solid var(--tw-border); }
  .sc-en { background: var(--en-bg); border: 1px solid var(--en-border); }
  .sc-label { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.2rem; }
  .sc-ml .sc-label { color: var(--ml); }
  .sc-tw .sc-label { color: var(--tw); }
  .sc-en .sc-label { color: var(--en); }
  .sc-value { font-size: 0.82rem; color: var(--fg); line-height: 1.4; }

  figcaption {
    text-align: center; margin-top: 0.8rem; font-size: 0.78rem;
    color: var(--muted); font-style: italic; padding: 0 1rem;
  }

  @media (max-width: 700px) {
    .summary { grid-template-columns: 1fr; }
    .vocab-table { font-size: 0.75rem; }
  }
</style>
</head>
<body>
<figure>
  <div class="diagram-container">
    <div class="title">Cross-Strait Vocabulary Divergence</div>
    <div class="subtitle">20 common concepts with different words in Putonghua (Mainland) vs. Guoyu (Taiwan)</div>

    <div class="legend">
      <div class="legend-item"><span class="legend-dot dot-ml"></span> Mainland Putonghua</div>
      <div class="legend-item"><span class="legend-dot dot-tw"></span> Taiwan Guoyu</div>
      <div class="legend-item"><span class="legend-dot dot-en"></span> English</div>
    </div>

    <table class="vocab-table">
      <thead>
        <tr>
          <th>Cat.</th>
          <th>English</th>
          <th>Mainland Putonghua</th>
          <th>Taiwan Guoyu</th>
          <th>Divergence Insight</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td><span class="cat-badge cat-food">Food</span></td>
          <td>Tomato</td>
          <td><span class="zh">西红柿</span><span class="py">xīhóngshì</span><span class="lit">"west-red-persimmon"</span></td>
          <td><span class="zh">番茄</span><span class="py">fānqié</span><span class="lit">"foreign-eggplant"</span></td>
          <td class="insight">Both descriptive calques; different metaphors chosen</td>
        </tr>
        <tr>
          <td><span class="cat-badge cat-food">Food</span></td>
          <td>Pineapple</td>
          <td><span class="zh">菠萝</span><span class="py">bōluó</span><span class="lit">Malay-origin transliteration</span></td>
          <td><span class="zh">鳳梨</span><span class="py">fènglí</span><span class="lit">"phoenix-pear"</span></td>
          <td class="insight">Mainland uses foreign loan; Taiwan uses native coinage</td>
        </tr>
        <tr>
          <td><span class="cat-badge cat-food">Food</span></td>
          <td>Potato</td>
          <td><span class="zh">土豆</span><span class="py">tǔdòu</span><span class="lit">"earth-bean"</span></td>
          <td><span class="zh">馬鈴薯</span><span class="py">mǎlíngshǔ</span><span class="lit">"horse-bell-tuber"</span></td>
          <td class="insight">Mainland: colloquial; Taiwan: formal compound</td>
        </tr>
        <tr>
          <td><span class="cat-badge cat-food">Food</span></td>
          <td>Yogurt</td>
          <td><span class="zh">酸奶</span><span class="py">suānnǎi</span><span class="lit">"sour-milk"</span></td>
          <td><span class="zh">優格</span><span class="py">yōugé</span><span class="lit">from "yogurt"</span></td>
          <td class="insight">Mainland calque vs. Taiwan transliteration</td>
        </tr>
        <tr>
          <td><span class="cat-badge cat-transport">Trans</span></td>
          <td>Taxi</td>
          <td><span class="zh">出租车</span><span class="py">chūzūchē</span><span class="lit">"rent-out-vehicle"</span></td>
          <td><span class="zh">計程車</span><span class="py">jìchéngchē</span><span class="lit">"meter-distance-vehicle"</span></td>
          <td class="insight">Both calques; different functional aspect highlighted</td>
        </tr>
        <tr>
          <td><span class="cat-badge cat-transport">Trans</span></td>
          <td>Bicycle</td>
          <td><span class="zh">自行车</span><span class="py">zìxíngchē</span><span class="lit">"self-moving-vehicle"</span></td>
          <td><span class="zh">腳踏車</span><span class="py">jiǎotàchē</span><span class="lit">"foot-pedal-vehicle"</span></td>
          <td class="insight">Mainland: abstract mechanism; Taiwan: physical action</td>
        </tr>
        <tr>
          <td><span class="cat-badge cat-transport">Trans</span></td>
          <td>Bus</td>
          <td><span class="zh">公共汽车</span><span class="py">gōnggòng qìchē</span><span class="lit">"public steam-vehicle"</span></td>
          <td><span class="zh">公車</span><span class="py">gōngchē</span><span class="lit">"public-vehicle"</span></td>
          <td class="insight">Taiwan abbreviates; 公车 = "official car" on mainland</td>
        </tr>
        <tr>
          <td><span class="cat-badge cat-tech">Tech</span></td>
          <td>Software</td>
          <td><span class="zh">软件</span><span class="py">ruǎnjiàn</span><span class="lit">"soft-piece"</span></td>
          <td><span class="zh">軟體</span><span class="py">ruǎntǐ</span><span class="lit">"soft-body"</span></td>
          <td class="insight">Same strategy (calque); different second morpheme</td>
        </tr>
        <tr>
          <td><span class="cat-badge cat-tech">Tech</span></td>
          <td>Laser</td>
          <td><span class="zh">激光</span><span class="py">jīguāng</span><span class="lit">"excited-light"</span></td>
          <td><span class="zh">雷射</span><span class="py">léishè</span><span class="lit">"thunder-shoot"</span></td>
          <td class="insight">Mainland: pure calque; Taiwan: phonetic + semantic hybrid</td>
        </tr>
        <tr>
          <td><span class="cat-badge cat-tech">Tech</span></td>
          <td>Internet</td>
          <td><span class="zh">互联网</span><span class="py">hùliánwǎng</span><span class="lit">"mutual-connect-net"</span></td>
          <td><span class="zh">網路</span><span class="py">wǎnglù</span><span class="lit">"net-road"</span></td>
          <td class="insight">Mainland: describes topology; Taiwan: metaphor of path</td>
        </tr>
        <tr>
          <td><span class="cat-badge cat-tech">Tech</span></td>
          <td>Blog</td>
          <td><span class="zh">博客</span><span class="py">bókè</span><span class="lit">transliteration</span></td>
          <td><span class="zh">部落格</span><span class="py">bùluògé</span><span class="lit">transliteration</span></td>
          <td class="insight">Both transliterate; different character choices</td>
        </tr>
        <tr>
          <td><span class="cat-badge cat-tech">Tech</span></td>
          <td>Space shuttle</td>
          <td><span class="zh">航天飞机</span><span class="py">hángtiān fēijī</span><span class="lit">"navigate-sky fly-machine"</span></td>
          <td><span class="zh">太空梭</span><span class="py">tàikōngsuō</span><span class="lit">"space-shuttle"</span></td>
          <td class="insight">Mainland: longer calque; Taiwan: hybrid with "shuttle"</td>
        </tr>
        <tr>
          <td><span class="cat-badge cat-tech">Tech</span></td>
          <td>Vitamin</td>
          <td><span class="zh">维生素</span><span class="py">wéishēngsù</span><span class="lit">"sustain-life-element"</span></td>
          <td><span class="zh">維他命</span><span class="py">wéitāmìng</span><span class="lit">transliteration</span></td>
          <td class="insight">Textbook example: calque vs. transliteration</td>
        </tr>
        <tr>
          <td><span class="cat-badge cat-daily">Daily</span></td>
          <td>Band-Aid</td>
          <td><span class="zh">创可贴</span><span class="py">chuāngkětiē</span><span class="lit">"wound-can-stick"</span></td>
          <td><span class="zh">OK繃</span><span class="py">OK bēng</span><span class="lit">English "OK" + wrap</span></td>
          <td class="insight">Taiwan mixes English directly into compound</td>
        </tr>
        <tr>
          <td><span class="cat-badge cat-daily">Daily</span></td>
          <td>Missile</td>
          <td><span class="zh">导弹</span><span class="py">dǎodàn</span><span class="lit">"guided-bomb"</span></td>
          <td><span class="zh">飛彈</span><span class="py">fēidàn</span><span class="lit">"flying-bomb"</span></td>
          <td class="insight">Both calques; different action: "guide" vs. "fly"</td>
        </tr>
        <tr>
          <td><span class="cat-badge cat-daily">Daily</span></td>
          <td>Lunchbox</td>
          <td><span class="zh">盒饭</span><span class="py">héfàn</span><span class="lit">"box-rice"</span></td>
          <td><span class="zh">便當</span><span class="py">biàndāng</span><span class="lit">from Japanese bentō</span></td>
          <td class="insight">Taiwan: Japanese loanword layer</td>
        </tr>
        <tr>
          <td><span class="cat-badge cat-daily">Daily</span></td>
          <td>Salmon</td>
          <td><span class="zh">三文鱼</span><span class="py">sānwényú</span><span class="lit">Cantonese-mediated</span></td>
          <td><span class="zh">鮭魚</span><span class="py">guīyú</span><span class="lit">traditional Chinese name</span></td>
          <td class="insight">Mainland: via Hong Kong; Taiwan: native term</td>
        </tr>
        <tr>
          <td><span class="cat-badge cat-medical">Med</span></td>
          <td>AIDS</td>
          <td><span class="zh">艾滋病</span><span class="py">àizībìng</span><span class="lit">transliteration + "disease"</span></td>
          <td><span class="zh">愛滋病</span><span class="py">àizībìng</span><span class="lit">"love-multiply-disease"</span></td>
          <td class="insight">Same sound; different characters (愛 "love" in Taiwan)</td>
        </tr>
      </tbody>
    </table>

    <div class="summary">
      <div class="summary-card sc-ml">
        <div class="sc-label">Mainland Tendency</div>
        <div class="sc-value">Prefers semantic calques (meaning translation), producing longer but immediately transparent compounds</div>
      </div>
      <div class="summary-card sc-tw">
        <div class="sc-label">Taiwan Tendency</div>
        <div class="sc-value">More accepting of transliterations, Japanese loans, and English hybrids; also uses calques but with different morpheme choices</div>
      </div>
      <div class="summary-card sc-en">
        <div class="sc-label">English Baseline</div>
        <div class="sc-value">Borrows directly with minimal adaptation — "laser," "yoga," "tsunami" enter unchanged. Maximum permeability.</div>
      </div>
    </div>
  </div>
  <figcaption>Figure 1: 18 common concepts showing cross-strait vocabulary divergence. Categories span food, transport, technology, daily life, and medical terminology. Both varieties are mutually intelligible despite these differences.</figcaption>
</figure>
</body>
</html>
