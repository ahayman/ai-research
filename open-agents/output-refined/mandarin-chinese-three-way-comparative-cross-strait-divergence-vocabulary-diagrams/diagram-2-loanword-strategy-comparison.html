<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loanword Strategy Comparison: Four Approaches</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --accent: #06b6d4;
    --ml: #ef4444; --ml-bg: #fef2f2; --ml-light: #fecaca;
    --tw: #22c55e; --tw-bg: #f0fdf4; --tw-light: #bbf7d0;
    --hk: #f59e0b; --hk-bg: #fffbeb; --hk-light: #fde68a;
    --en: #6366f1; --en-bg: #eef2ff; --en-light: #c7d2fe;
    --muted: #6c757d; --arrow: #94a3b8;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f172a; --fg: #e2e8f0; --surface: #1e293b; --border: #334155;
      --accent: #22d3ee;
      --ml: #f87171; --ml-bg: #1f1215; --ml-light: #7f1d1d;
      --tw: #4ade80; --tw-bg: #0f1f15; --tw-light: #166534;
      --hk: #fbbf24; --hk-bg: #1f1a0a; --hk-light: #92400e;
      --en: #818cf8; --en-bg: #1e1b4b; --en-light: #3730a3;
      --muted: #94a3b8; --arrow: #64748b;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg); color: var(--fg);
    display: flex; justify-content: center; padding: 2rem 1rem; line-height: 1.5;
  }
  figure { max-width: 1100px; width: 100%; }
  .diagram-container {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 1.5rem; overflow-x: auto;
  }
  .title { text-align: center; font-size: 1.15rem; font-weight: 700; color: var(--accent); margin-bottom: 0.2rem; }
  .subtitle { text-align: center; font-size: 0.82rem; color: var(--muted); margin-bottom: 1.5rem; }

  /* Four strategy columns */
  .strategies {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.8rem;
    margin-bottom: 1.5rem;
  }
  .strategy {
    border-radius: 8px; padding: 0.8rem; border: 2px solid;
  }
  .s-ml { background: var(--ml-bg); border-color: var(--ml); }
  .s-tw { background: var(--tw-bg); border-color: var(--tw); }
  .s-hk { background: var(--hk-bg); border-color: var(--hk); }
  .s-en { background: var(--en-bg); border-color: var(--en); }
  .s-header { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.15rem; }
  .s-ml .s-header { color: var(--ml); }
  .s-tw .s-header { color: var(--tw); }
  .s-hk .s-header { color: var(--hk); }
  .s-en .s-header { color: var(--en); }
  .s-name { font-size: 0.95rem; font-weight: 700; margin-bottom: 0.3rem; }
  .s-desc { font-size: 0.78rem; color: var(--muted); margin-bottom: 0.6rem; line-height: 1.4; }
  .s-formula {
    font-size: 0.75rem; font-weight: 600; padding: 0.25rem 0.5rem;
    background: var(--bg); border: 1px solid var(--border); border-radius: 4px;
    text-align: center; margin-bottom: 0.6rem;
  }

  /* Example flow cards */
  .example-flow {
    margin-top: 1.2rem;
    border-top: 2px solid var(--border); padding-top: 1.2rem;
  }
  .flow-title {
    text-align: center; font-size: 0.85rem; font-weight: 700; color: var(--accent);
    margin-bottom: 1rem;
  }
  .flow-row {
    display: grid; grid-template-columns: 100px 1fr 1fr 1fr 1fr;
    gap: 0.5rem; align-items: center; margin-bottom: 0.6rem;
    padding-bottom: 0.6rem; border-bottom: 1px solid var(--border);
  }
  .flow-row:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
  .flow-source {
    font-weight: 700; font-size: 0.82rem; color: var(--en);
    text-align: center;
  }
  .flow-cell {
    border-radius: 6px; padding: 0.35rem 0.5rem; font-size: 0.78rem;
    text-align: center;
  }
  .fc-ml { background: var(--ml-bg); border: 1px solid var(--ml); }
  .fc-tw { background: var(--tw-bg); border: 1px solid var(--tw); }
  .fc-hk { background: var(--hk-bg); border: 1px solid var(--hk); }
  .fc-en { background: var(--en-bg); border: 1px solid var(--en); }
  .flow-zh { font-size: 1em; font-weight: 700; display: block; }
  .flow-py { font-size: 0.72em; color: var(--muted); display: block; font-style: italic; }
  .flow-type { font-size: 0.65em; color: var(--muted); display: block; margin-top: 1px; }

  .flow-header {
    display: grid; grid-template-columns: 100px 1fr 1fr 1fr 1fr;
    gap: 0.5rem; margin-bottom: 0.5rem;
  }
  .fh-cell {
    text-align: center; font-size: 0.68rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.05em;
  }
  .fh-ml { color: var(--ml); }
  .fh-tw { color: var(--tw); }
  .fh-hk { color: var(--hk); }
  .fh-en { color: var(--en); }

  /* Permeability scale */
  .scale-section { margin-top: 1.2rem; }
  .scale-label { text-align: center; font-size: 0.78rem; font-weight: 600; margin-bottom: 0.5rem; color: var(--fg); }
  .scale-bar {
    height: 28px; border-radius: 14px; position: relative;
    background: linear-gradient(to right, var(--ml) 0%, var(--ml) 25%, var(--tw) 25%, var(--tw) 50%, var(--hk) 50%, var(--hk) 75%, var(--en) 75%, var(--en) 100%);
    opacity: 0.8;
  }
  .scale-labels {
    display: flex; justify-content: space-between; font-size: 0.68rem;
    color: var(--muted); margin-top: 0.3rem; padding: 0 0.5rem;
  }
  .scale-markers {
    display: grid; grid-template-columns: repeat(4, 1fr); text-align: center;
    font-size: 0.7rem; font-weight: 600; margin-top: 0.2rem;
  }
  .sm-ml { color: var(--ml); }
  .sm-tw { color: var(--tw); }
  .sm-hk { color: var(--hk); }
  .sm-en { color: var(--en); }

  figcaption {
    text-align: center; margin-top: 0.8rem; font-size: 0.78rem;
    color: var(--muted); font-style: italic; padding: 0 1rem;
  }

  @media (max-width: 800px) {
    .strategies { grid-template-columns: repeat(2, 1fr); }
    .flow-row, .flow-header { grid-template-columns: 70px 1fr 1fr 1fr 1fr; font-size: 0.72rem; }
    .flow-source { font-size: 0.72rem; }
  }
  @media (max-width: 500px) {
    .strategies { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<figure>
  <div class="diagram-container">
    <div class="title">Loanword Integration Strategies</div>
    <div class="subtitle">How Mainland China, Taiwan, Hong Kong, and English handle foreign vocabulary</div>

    <div class="strategies">
      <div class="strategy s-ml">
        <div class="s-header">Mainland Putonghua</div>
        <div class="s-name">Semantic Calque</div>
        <div class="s-desc">Translate the <em>meaning</em> using native Chinese morphemes. Preserves lexical transparency.</div>
        <div class="s-formula">English meaning &rarr; Chinese morphemes</div>
        <div style="font-size:0.78rem;">
          <strong>computer</strong> &rarr; 电脑 "electric-brain"<br>
          <strong>hot dog</strong> &rarr; 热狗 "hot-dog"<br>
          <strong>bluetooth</strong> &rarr; 蓝牙 "blue-tooth"
        </div>
      </div>
      <div class="strategy s-tw">
        <div class="s-header">Taiwan Guoyu</div>
        <div class="s-name">Mixed Strategy</div>
        <div class="s-desc">Uses calques AND transliterations freely. More tolerant of phonetic borrowing and Japanese loans.</div>
        <div class="s-formula">English sound OR meaning &rarr; Chinese</div>
        <div style="font-size:0.78rem;">
          <strong>vitamin</strong> &rarr; 維他命 (sound)<br>
          <strong>laser</strong> &rarr; 雷射 (sound+meaning)<br>
          <strong>bento</strong> &rarr; 便當 (from Japanese)
        </div>
      </div>
      <div class="strategy s-hk">
        <div class="s-header">Hong Kong Cantonese</div>
        <div class="s-name">Phonetic via Cantonese</div>
        <div class="s-desc">English sounds mapped through Cantonese phonology, then written in characters readable in Mandarin.</div>
        <div class="s-formula">English &rarr; Cantonese sound &rarr; characters</div>
        <div style="font-size:0.78rem;">
          <strong>taxi</strong> &rarr; 的士 (dik-si &rarr; díshì)<br>
          <strong>bus</strong> &rarr; 巴士 (baa-si &rarr; bāshì)<br>
          <strong>cheese</strong> &rarr; 芝士 (zi-si &rarr; zhīshì)
        </div>
      </div>
      <div class="strategy s-en">
        <div class="s-header">English</div>
        <div class="s-name">Direct Import</div>
        <div class="s-desc">Borrows words directly with minimal phonological adaptation. Maximum permeability to foreign vocabulary.</div>
        <div class="s-formula">Foreign word &rarr; English (minimal change)</div>
        <div style="font-size:0.78rem;">
          <strong>karate</strong> (Japanese, unchanged)<br>
          <strong>kindergarten</strong> (German)<br>
          <strong>dim sum</strong> (Cantonese)
        </div>
      </div>
    </div>

    <div class="example-flow">
      <div class="flow-title">Tracing the Same English Word Through Four Systems</div>
      <div class="flow-header">
        <div class="fh-cell fh-en">Source</div>
        <div class="fh-cell fh-ml">Mainland</div>
        <div class="fh-cell fh-tw">Taiwan</div>
        <div class="fh-cell fh-hk">Hong Kong</div>
        <div class="fh-cell fh-en">English</div>
      </div>

      <div class="flow-row">
        <div class="flow-source">Taxi</div>
        <div class="flow-cell fc-ml"><span class="flow-zh">出租车</span><span class="flow-py">chūzūchē</span><span class="flow-type">calque</span></div>
        <div class="flow-cell fc-tw"><span class="flow-zh">計程車</span><span class="flow-py">jìchéngchē</span><span class="flow-type">calque</span></div>
        <div class="flow-cell fc-hk"><span class="flow-zh">的士</span><span class="flow-py">díshì</span><span class="flow-type">transliteration</span></div>
        <div class="flow-cell fc-en"><span class="flow-zh">taxi</span><span class="flow-type">direct import</span></div>
      </div>

      <div class="flow-row">
        <div class="flow-source">Vitamin</div>
        <div class="flow-cell fc-ml"><span class="flow-zh">维生素</span><span class="flow-py">wéishēngsù</span><span class="flow-type">calque</span></div>
        <div class="flow-cell fc-tw"><span class="flow-zh">維他命</span><span class="flow-py">wéitāmìng</span><span class="flow-type">transliteration</span></div>
        <div class="flow-cell fc-hk"><span class="flow-zh">維他命</span><span class="flow-py">wéitāmìng</span><span class="flow-type">transliteration</span></div>
        <div class="flow-cell fc-en"><span class="flow-zh">vitamin</span><span class="flow-type">from Latin vita</span></div>
      </div>

      <div class="flow-row">
        <div class="flow-source">Laser</div>
        <div class="flow-cell fc-ml"><span class="flow-zh">激光</span><span class="flow-py">jīguāng</span><span class="flow-type">calque</span></div>
        <div class="flow-cell fc-tw"><span class="flow-zh">雷射</span><span class="flow-py">léishè</span><span class="flow-type">hybrid</span></div>
        <div class="flow-cell fc-hk"><span class="flow-zh">鐳射</span><span class="flow-py">léishè</span><span class="flow-type">hybrid</span></div>
        <div class="flow-cell fc-en"><span class="flow-zh">laser</span><span class="flow-type">acronym (LASER)</span></div>
      </div>

      <div class="flow-row">
        <div class="flow-source">Salmon</div>
        <div class="flow-cell fc-ml"><span class="flow-zh">三文鱼</span><span class="flow-py">sānwényú</span><span class="flow-type">HK-mediated</span></div>
        <div class="flow-cell fc-tw"><span class="flow-zh">鮭魚</span><span class="flow-py">guīyú</span><span class="flow-type">native term</span></div>
        <div class="flow-cell fc-hk"><span class="flow-zh">三文魚</span><span class="flow-py">sāammànyú</span><span class="flow-type">transliteration</span></div>
        <div class="flow-cell fc-en"><span class="flow-zh">salmon</span><span class="flow-type">from Latin salmo</span></div>
      </div>

      <div class="flow-row">
        <div class="flow-source">Cheese</div>
        <div class="flow-cell fc-ml"><span class="flow-zh">奶酪</span><span class="flow-py">nǎilào</span><span class="flow-type">calque</span></div>
        <div class="flow-cell fc-tw"><span class="flow-zh">起司</span><span class="flow-py">qǐsī</span><span class="flow-type">transliteration</span></div>
        <div class="flow-cell fc-hk"><span class="flow-zh">芝士</span><span class="flow-py">zhīshì</span><span class="flow-type">Cantonese translit.</span></div>
        <div class="flow-cell fc-en"><span class="flow-zh">cheese</span><span class="flow-type">from Latin caseus</span></div>
      </div>
    </div>

    <div class="scale-section">
      <div class="scale-label">Foreign Vocabulary Permeability Spectrum</div>
      <div class="scale-bar"></div>
      <div class="scale-labels">
        <span>Least permeable (calque everything)</span>
        <span>Most permeable (borrow directly)</span>
      </div>
      <div class="scale-markers">
        <span class="sm-ml">Mainland<br>Putonghua</span>
        <span class="sm-tw">Taiwan<br>Guoyu</span>
        <span class="sm-hk">Hong Kong<br>Cantonese</span>
        <span class="sm-en">English</span>
      </div>
    </div>

  </div>
  <figcaption>Figure 2: Four loanword integration strategies mapped across the permeability spectrum. Mainland Chinese preserves maximum lexical transparency by translating meanings; English achieves maximum borrowing speed by importing sounds directly.</figcaption>
</figure>
</body>
</html>
