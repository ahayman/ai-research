<!-- Diagram: Unitary-Self vs Multiplicity Models -->
<!-- Type: side-by-side comparison block (Mermaid graph) -->
<!-- Generated: 2026-04-29 -->
<!-- Description: Side-by-side contrast of the unitary-self model (Cartesian "I think therefore I am") with the multiplicity model (IFS, Assagioli, Jung, dual-process, modular mind, dissociation theory). Includes the shared empirical ground footer where both views agree. -->

<figure class="concept-diagram" id="diagram-3">
  <div class="diagram-container">
    <pre class="mermaid">
graph LR
    subgraph Unitary[Unitary-Self model]
        U1[Single coherent 'I'<br/>at the center]
        U2[Introspection reports<br/>about <i>me</i>]
        U3[Pathology = fragmentation,<br/>'falling apart']
        U4[Therapeutic goal:<br/>reintegration to a singular,<br/>stable identity]
        U1 --> U2
        U2 --> U3
        U3 --> U4
    end

    subgraph Multi[Multiplicity model — IFS variant]
        M1[Plural mind:<br/>parts + Self as coordinator]
        M2[Introspection reports<br/>from <i>parts</i>]
        M3[Multiplicity is normal;<br/>pathology is <i>role</i> &amp; <i>burden</i>]
        M4[Therapeutic goal:<br/>harmonious internal system,<br/>NOT collapse to one voice]
        M1 --> M2
        M2 --> M3
        M3 --> M4
    end

    Unitary -.-> Bridge[Shared empirical ground]
    Multi -.-> Bridge

    Bridge --> B1[Dual-process theory:<br/>System 1 / System 2]
    Bridge --> B2[Modular-mind research:<br/>distinct domain-specific systems]
    Bridge --> B3[Dissociation literature:<br/>state-dependent memory and affect]
    Bridge --> B4[Phenomenology of inner conflict:<br/>nearly universal across cultures]

    classDef unitaryStyle fill:#FEE2E2,stroke:#DC2626,stroke-width:2px
    classDef multiStyle fill:#DCFCE7,stroke:#16A34A,stroke-width:2px
    classDef bridgeStyle fill:#FEF3C7,stroke:#D97706,stroke-width:2px

    class U1,U2,U3,U4 unitaryStyle
    class M1,M2,M3,M4 multiStyle
    class Bridge,B1,B2,B3,B4 bridgeStyle
    </pre>
  </div>
  <figcaption>
    <strong>Figure 3:</strong> The unitary-self model (left) — Cartesian, Western Enlightenment default — versus the multiplicity model that IFS sits inside (right). Yellow at the bottom is the empirical ground both views are obliged to engage with. Notice that the multiplicity claim is well-supported at the descriptive level (minds are not unitary). The bigger leap — from "minds are plural" to "minds contain discriminable subpersonalities with their own histories and intentions" — is what IFS Position 3 commits to and what the empirical ground does <em>not</em> directly support.
  </figcaption>
</figure>
