<!-- Diagram: Falsifiability Map of IFS Claims -->

<!-- Description: IFS's central claims sorted by epistemic status — falsifiable (clinical-outcome claims), partly falsifiable (state-distinguishability claims), and unfalsifiable as currently formulated (the Self-blending escape; "every person has a Self"; "parts are real entities"). Position 4 (unattached burdens) sits in the unfalsifiable zone. -->

<figure class="concept-diagram" id="diagram-4">
  <div class="diagram-container">
    <pre class="mermaid">
graph LR
    Claims[IFS claims]

    Claims --> F[Falsifiable<br/>Outcome claims]
    Claims --> P[Partly falsifiable<br/>Mechanism-adjacent claims]
    Claims --> U[Unfalsifiable<br/>as currently formulated]

    F --> F1["IFS reduces PTSD severity at 6 months<br/>in adults with C-PTSD<br/><i>tested in pilots; no large RCT yet</i>"]
    F --> F2["IFS produces self-compassion gains<br/>at 1-year follow-up<br/><i>Shadick 2013 supports for RA</i>"]

    P --> P1["Self-states show distinguishable<br/>physiological signatures from blended states<br/><i>operationalizable; not yet tested cleanly</i>"]
    P --> P2["Clients can identify recurring inner figures<br/>with stable characteristics<br/><i>indirect support; no discriminant-validity tool</i>"]

    U --> U1["'Every person has an undamaged Self'<br/><i>absence is reframed as blending —<br/>no possible failure mode</i>"]
    U --> U2["'Parts are real entities with their own<br/>perspectives, intentions, histories'<br/><i>no discriminant-validity instrument exists</i>"]
    U --> U3["'Some burdens are unattached / discarnate'<br/><i>Position 4 — outside conventional empirical reach</i>"]
    U --> U4["The Self-blending escape:<br/>negative result -&gt; 'a part is in the way'<br/><i>structurally unfalsifiable</i>"]

    classDef rootStyle fill:#F3F4F6,stroke:#6B7280,stroke-width:2px,font-weight:bold
    classDef falsStyle fill:#DCFCE7,stroke:#16A34A,stroke-width:2px
    classDef partStyle fill:#FEF3C7,stroke:#D97706,stroke-width:2px

    </pre>
  </div>
  <figcaption>
    <strong>Figure 4:</strong> Not all IFS claims are equal. <strong>Outcome claims</strong> (green) are testable in principle and partly tested in practice — clients improve, with measurable effects. <strong>Mechanism-adjacent claims</strong> (yellow) could be tested with the right instruments but currently lack them. <strong>Mechanism claims about parts as discrete entities and Self as universally present</strong> (red) are unfalsifiable as currently formulated, because absence is always reattributed to interference from "another part." The falsifiability problem narrows when you separate the layers: it does not entail that IFS is wrong, only that mechanism-claims about <em>what parts are</em> cannot currently be put to a fair empirical test.
  </figcaption>
</figure>
