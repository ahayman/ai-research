<!-- Diagram: Four Ontology Positions on What "Parts" Are -->
<!-- Type: comparison block grid (Mermaid + custom CSS table) -->
<!-- Generated: 2026-04-29 -->
<!-- Description: The four positions in circulation about what IFS "parts" are: metaphor/heuristic, neural networks/dissociated states, discrete subpersonalities, and transpersonal/discarnate (the Falconer/Schwartz extension). Shows what each position claims, who holds it, and its falsifiability status. -->

<figure class="concept-diagram" id="diagram-2">
  <div class="ontology-grid">
    <div class="ontology-header">
      <div class="grid-cell header">Position</div>
      <div class="grid-cell header">What &quot;parts&quot; ARE</div>
      <div class="grid-cell header">Falsifiable?</div>
      <div class="grid-cell header">Schwartz's stance</div>
      <div class="grid-cell header">Typical proponents</div>
    </div>

    <div class="ontology-row pos-1">
      <div class="grid-cell label"><strong>1 — Metaphor /<br/>Heuristic</strong></div>
      <div class="grid-cell">Useful clinical fictions for organizing experience</div>
      <div class="grid-cell">Not in principle <span class="badge na">N/A</span></div>
      <div class="grid-cell">Held early 1980s, then explicitly abandoned. Hedge language remains.</div>
      <div class="grid-cell">Many practicing clinicians; some philosophers of mind</div>
    </div>

    <div class="ontology-row pos-2">
      <div class="grid-cell label"><strong>2 — Neural networks /<br/>dissociated states</strong></div>
      <div class="grid-cell">Phenomenological labels for state-dependent affective subroutines</div>
      <div class="grid-cell">Partly <span class="badge partial">Partial</span></div>
      <div class="grid-cell">Sometimes endorsed in interviews; aligns with neuroscience-friendly language</div>
      <div class="grid-cell">Trauma-informed clinicians; structural-dissociation theory; Janina Fisher</div>
    </div>

    <div class="ontology-row pos-3">
      <div class="grid-cell label"><strong>3 — Discrete<br/>subpersonalities</strong></div>
      <div class="grid-cell">Real mental entities with intentions, memories, histories</div>
      <div class="grid-cell">Not as currently formalized <span class="badge no">No</span></div>
      <div class="grid-cell">Dominant public stance since late 1980s. <em>No Bad Parts</em>: &quot;not imaginary or symbolic.&quot;</div>
      <div class="grid-cell">IFS Institute marketing; many trainees</div>
    </div>

    <div class="ontology-row pos-4">
      <div class="grid-cell label"><strong>4 — Transpersonal /<br/>discarnate</strong></div>
      <div class="grid-cell">Real entities, some external in origin (&quot;unattached burdens&quot;)</div>
      <div class="grid-cell">Not at all <span class="badge no">No</span></div>
      <div class="grid-cell">Endorsed via foreword to Falconer (2023); <em>Spirituality of IFS</em> course</div>
      <div class="grid-cell">Falconer; Schwartz's spirituality work; some psychedelic-IFS practitioners</div>
    </div>
  </div>
  <figcaption>
    <strong>Figure 2:</strong> Four positions on what "parts" actually are. The model itself does not require a single answer; clinicians often work as if Position 1 or 2 even when the marketing language is at Position 3, while Schwartz personally has shifted toward Position 4 in recent years. For a systems thinker, the question is whether this multi-stability is a feature or a bug. (Position 4 is covered in full in the Psychedelic-Assisted IFS &amp; "Unattached Burdens" page.)
  </figcaption>
