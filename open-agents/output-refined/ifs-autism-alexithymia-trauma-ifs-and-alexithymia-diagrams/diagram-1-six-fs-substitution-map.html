  <figcaption>
    <strong>Figure 1:</strong> The 6 Fs with explicit substitution channels for low-interoception access. Red steps (Find, Focus, Feel toward) are the highest-load — they form the alexithymia bottleneck zone. The substitutes listed for each are not workarounds; they are valid access routes documented in the autistic-IFS-clinician literature (Bergenfield, IFS Telehealth Collective, IFS with Sanni). Yellow (Flesh out) is medium-load: it uses imagery in the standard protocol but trades cleanly for words, drawings, or chosen objects. Green (beFriend, Fears) are largely independent of interoceptive access — they run on dialogue and reasoning. The pattern: <strong>the front half of the protocol is the interoception zone; the back half runs on language.</strong> When the front half fails, externalized substitution is the way through.
  </figcaption>
</figure>
