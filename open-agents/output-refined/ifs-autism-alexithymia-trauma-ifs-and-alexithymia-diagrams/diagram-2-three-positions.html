  <figcaption>
    <strong>Figure 2:</strong> Three positions on whether IFS fits alexithymic clients. <strong>(A) Poor fit</strong> would mean recommending against IFS — almost no published source defends this; it ignores that the protocol explicitly accommodates direct access. <strong>(B) Slow fit / training modality</strong> assumes interoception can be built. The literature shows it sometimes can — small-to-medium effects in mindfulness studies — but the Aaron 2020 quadratic finding and the harm-risk literature mean blanket "you'll feel it eventually" overpromises. <strong>(C) Structural modification</strong> matches what the autistic-IFS-clinician community actually publishes: substitute access channels, direct access from the outset, externalized work as primary mode. The honest answer is C with cautious elements of B for clients in whom capacity may emerge — never imposed.
  </figcaption>
