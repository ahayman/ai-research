<!-- Diagram: Clinical Decision Flowchart — When 'Feel toward' produces no clear answer -->
<!-- Type: flowchart with branching decisions -->
<!-- Generated: 2026-04-29 -->
<!-- Description: Practical pathway when interoceptive access fails — what to try next, in order. -->

<figure class="concept-diagram" id="diagram-4">
  <div class="diagram-container">
    <pre class="mermaid">
flowchart TD
    Start([Therapist: 'How do you feel toward this part?'])
    Resp{Client: 'I don't know.<br/>I can't tell.'}

    Start --> Resp

    Resp --> CheckSafety{First check: is this<br/>a state-regulation issue?<br/>Are you flooded or shut down?}

    CheckSafety -->|Yes — dysregulated| Regulate[Pause. Regulate state first.<br/>Polyvagal-informed pacing.<br/>Do NOT push into the body.<br/>Return when ventral vagal.]

    CheckSafety -->|No — calm but no signal| TryVis{Can you visualize<br/>the part?<br/>See it as a figure,<br/>color, image?}

    TryVis -->|Yes| VisChannel[Use visual channel.<br/>'What does it look like<br/>when it sees you<br/>looking at it?']

    TryVis -->|No — aphantasia or<br/>just not visual today| TryCog{Can you describe<br/>your stance toward it<br/>in words?<br/>Approving? Critical?<br/>Curious?}

    TryCog -->|Yes| CogChannel[Use cognitive channel.<br/>That stance IS your stance.<br/>Continue from there.]

    TryCog -->|No — can't tell| TryWrite{Could you write<br/>a paragraph about<br/>this part?<br/>Letter to it,<br/>or about it?}

    TryWrite -->|Yes| WriteChannel[Use written channel.<br/>Tone of the writing<br/>often reveals stance<br/>that wasn't accessible<br/>by introspection.]

    TryWrite -->|Still no| TryExt[Externalize directly.<br/>Choose an object, draw<br/>it, place it on paper.<br/>Look at it from outside.<br/>What do you observe?]

    TryExt --> Behavior{Or — observe behavior:<br/>when this part is active,<br/>what do you DO?<br/>Approach or avoid?<br/>Defend or collapse?}

    Behavior --> BehaviorOut[Behavior IS data.<br/>Approach pattern = some<br/>positive valence.<br/>Avoid pattern = some<br/>protective valence.<br/>Use that as the answer.]

    VisChannel --> Continue([Continue 6 Fs<br/>through that channel])
    CogChannel --> Continue
    WriteChannel --> Continue
    BehaviorOut --> Continue

    Regulate --> Resp

    classDef startNode fill:#E0F2FE,stroke:#0284C7,stroke-width:2px,color:#0C4A6E
    classDef question fill:#FEF3C7,stroke:#D97706,stroke-width:2px,color:#78350F
    classDef warning fill:#FEE2E2,stroke:#DC2626,stroke-width:2px,color:#7F1D1D
    classDef channel fill:#DCFCE7,stroke:#16A34A,stroke-width:2px,color:#14532D
    classDef endNode fill:#EDE9FE,stroke:#7C3AED,stroke-width:2px,color:#4C1D95

    class Start,Resp startNode
    class CheckSafety,TryVis,TryCog,TryWrite,Behavior question
    class Regulate warning
    class VisChannel,CogChannel,WriteChannel,TryExt,BehaviorOut channel
    class Continue endNode
    </pre>
  </div>
  <figcaption>
    <strong>Figure 4:</strong> A clinical decision pathway when "feel toward" produces no clear answer. <strong>The first check is always state-regulation, not channel-substitution</strong> — if the client is flooded or shut down, no channel will work; pause and regulate. Once the system is regulated and the issue is genuinely access rather than dysregulation, work through the channels in order: visual → cognitive → written → externalized → behavioral observation. Each branch is a valid completion of the F-step; none is a workaround. The behavioral branch is especially useful for highly externalizing clients — what you DO when a part is active is data about the part's stance and your stance toward it, even when introspection produces nothing.
  </figcaption>
</figure>
