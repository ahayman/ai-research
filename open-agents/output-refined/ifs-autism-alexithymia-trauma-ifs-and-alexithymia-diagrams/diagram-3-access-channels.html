  <figcaption>
    <strong>Figure 3:</strong> Four parallel access channels. The interoceptive channel (red) is the IFS default but is structurally blocked by alexithymia and by trauma-related shutdown — which is why the standard "where in your body" prompt fails for many. The visual channel (yellow) is independent of interoception but blocked separately by aphantasia (~2–4% prevalence; full treatment in Cat 7). The cognitive channel (blue) — recognizing parts as belief-clusters, voices in mind, or behavior patterns — is accessible to almost everyone and supports several of the 6 Fs natively. The externalized channel (green) is always accessible and is the IFS Telehealth Collective's recommended primary mode for low-interoception clients. <strong>Most clients have at least two channels available; the practical question is which two work best.</strong>
  </figcaption>
</figure>
