<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Raven's Matrices Revelation</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --accent: #4361ee;
    --muted: #6c757d;
    --caption-bg: #f8f9fa;
    --wechsler: #dc2626;
    --wechsler-bg: #fee2e2;
    --ravens: #16a34a;
    --ravens-bg: #dcfce7;
    --high: #7c3aed;
    --avg: #0284c7;
    --id: #6b7280;
    --grid: #e9ecef;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --accent: #6b8aff;
      --muted: #9a9ab0;
      --caption-bg: #1a1a2e;
      --wechsler: #ff6b7a;
      --wechsler-bg: #450a0a;
      --ravens: #34d399;
      --ravens-bg: #064e3b;
      --high: #a78bfa;
      --avg: #6b8aff;
      --id: #6b7280;
      --grid: #252540;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure { max-width: 1000px; width: 100%; }
  .chart-wrapper {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.5rem 1rem;
    overflow-x: auto;
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding: 1rem 1.5rem;
    background: var(--caption-bg);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
</style>
</head>
<body>
<figure>
  <div class="chart-wrapper">
    <svg viewBox="0 0 920 540" xmlns="http://www.w3.org/2000/svg" style="min-width:680px;">
      <defs>
        <style>
          .title { font: bold 16px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
          .subtitle { font: 12px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
          .section-title { font: bold 14px 'Segoe UI', system-ui, sans-serif; }
          .bar-label { font: bold 12px 'Segoe UI', system-ui, sans-serif; fill: white; }
          .pct-label { font: bold 14px 'Segoe UI', system-ui, sans-serif; }
          .cat-label { font: bold 11px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
          .note-text { font: 11px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
          .insight-text { font: bold 12px 'Segoe UI', system-ui, sans-serif; fill: var(--accent); }
          .big-num { font: bold 28px 'Segoe UI', system-ui, sans-serif; }
        </style>
      </defs>

      <text x="460" y="30" text-anchor="middle" class="title">The Raven's Matrices Revelation</text>
      <text x="460" y="48" text-anchor="middle" class="subtitle">Same children, different measure, dramatically different result -- Dawson, Soulieres, Gernsbacher &amp; Mottron, 2007</text>

      <!-- Left: Wechsler -->
      <text x="230" y="80" text-anchor="middle" class="section-title" fill="var(--wechsler)">Wechsler Intelligence Scales</text>
      <text x="230" y="96" text-anchor="middle" class="note-text">(verbal-heavy measure)</text>

      <!-- Wechsler stacked bar -->
      <g transform="translate(80, 110)">
        <!-- High Intelligence -->
        <rect x="0" y="0" width="300" height="30" rx="4" fill="var(--grid)" stroke="var(--border)" stroke-width="1"/>
        <text x="150" y="20" text-anchor="middle" class="cat-label">High Intelligence</text>
        <text x="285" y="20" text-anchor="end" class="pct-label" fill="var(--wechsler)">0%</text>

        <!-- Average -->
        <rect x="0" y="40" width="300" height="80" rx="4" fill="var(--wechsler)" opacity="0.3"/>
        <rect x="0" y="40" width="200" height="80" rx="4" fill="var(--wechsler)" opacity="0.6"/>
        <text x="100" y="85" text-anchor="middle" class="bar-label">~67%</text>
        <text x="315" y="85" class="cat-label">Average range</text>

        <!-- Intellectually disabled -->
        <rect x="0" y="130" width="300" height="80" rx="4" fill="var(--wechsler)" opacity="0.15"/>
        <rect x="0" y="130" width="100" height="80" rx="4" fill="var(--wechsler)" opacity="0.8"/>
        <text x="50" y="175" text-anchor="middle" class="bar-label">~33%</text>
        <text x="315" y="175" class="cat-label">"Intellectually<br/>disabled" range</text>
      </g>

      <!-- Right: Raven's -->
      <text x="690" y="80" text-anchor="middle" class="section-title" fill="var(--ravens)">Raven's Progressive Matrices</text>
      <text x="690" y="96" text-anchor="middle" class="note-text">(visual-spatial reasoning)</text>

      <!-- Raven's stacked bar -->
      <g transform="translate(540, 110)">
        <!-- High Intelligence -->
        <rect x="0" y="0" width="300" height="80" rx="4" fill="var(--ravens)" opacity="0.15"/>
        <rect x="0" y="0" width="100" height="80" rx="4" fill="var(--ravens)" opacity="0.7"/>
        <text x="50" y="45" text-anchor="middle" class="bar-label">~33%</text>
        <text x="315" y="45" class="cat-label">High Intelligence</text>

        <!-- Average -->
        <rect x="0" y="90" width="300" height="80" rx="4" fill="var(--ravens)" opacity="0.3"/>
        <rect x="0" y="90" width="186" height="80" rx="4" fill="var(--ravens)" opacity="0.5"/>
        <text x="93" y="135" text-anchor="middle" class="bar-label">~62%</text>
        <text x="315" y="135" class="cat-label">Average range</text>

        <!-- Intellectually disabled -->
        <rect x="0" y="180" width="300" height="30" rx="4" fill="var(--grid)" stroke="var(--border)" stroke-width="1"/>
        <rect x="0" y="180" width="15" height="30" rx="4" fill="var(--ravens)" opacity="0.8"/>
        <text x="150" y="200" text-anchor="middle" class="cat-label">"ID" range</text>
        <text x="285" y="200" text-anchor="end" class="pct-label" fill="var(--ravens)">~5%</text>
      </g>

      <!-- Central arrow showing the shift -->
      <g transform="translate(415, 150)">
        <text x="45" y="0" text-anchor="middle" class="big-num" fill="var(--accent)">30-70</text>
        <text x="45" y="22" text-anchor="middle" class="note-text" font-weight="bold">percentile points</text>
        <text x="45" y="36" text-anchor="middle" class="note-text">higher on Raven's</text>
        <line x1="-20" y1="50" x2="110" y2="50" stroke="var(--accent)" stroke-width="2"/>
        <text x="45" y="68" text-anchor="middle" class="note-text">Same individuals</text>
        <text x="45" y="82" text-anchor="middle" class="note-text">Different measure</text>
      </g>

      <!-- Key comparisons -->
      <g transform="translate(60, 365)">
        <rect x="0" y="0" width="380" height="40" rx="6" fill="var(--wechsler-bg)" stroke="var(--wechsler)" stroke-width="1.5"/>
        <text x="190" y="18" text-anchor="middle" class="cat-label">Not a single autistic child scored</text>
        <text x="190" y="33" text-anchor="middle" class="cat-label">"high intelligence" on the Wechsler</text>

        <rect x="420" y="0" width="380" height="40" rx="6" fill="var(--ravens-bg)" stroke="var(--ravens)" stroke-width="1.5"/>
        <text x="610" y="18" text-anchor="middle" class="cat-label">One-third scored "high intelligence"</text>
        <text x="610" y="33" text-anchor="middle" class="cat-label">on Raven's Progressive Matrices</text>
      </g>

      <!-- Neuroimaging finding -->
      <g transform="translate(60, 420)">
        <rect x="0" y="0" width="800" height="38" rx="6" fill="var(--surface)" stroke="var(--accent)" stroke-width="1"/>
        <text x="400" y="16" text-anchor="middle" class="note-text"><tspan font-weight="bold">Neuroimaging:</tspan> For Raven's tasks, autistic brains showed increased visual cortex (BA18) activity and decreased prefrontal (BA9) activity</text>
        <text x="400" y="31" text-anchor="middle" class="note-text">-- visual processing playing a more prominent role in reasoning than in neurotypical controls</text>
      </g>

      <!-- Bottom insight -->
      <rect x="100" y="475" width="720" height="45" rx="10" fill="var(--surface)" stroke="var(--accent)" stroke-width="2"/>
      <text x="460" y="495" text-anchor="middle" class="insight-text">Change the measurement tool -- change the modality -- and competence becomes visible.</text>
      <text x="460" y="512" text-anchor="middle" class="note-text">A visual communication system could do for expression what Raven's does for assessment.</text>
    </svg>
  </div>
  <figcaption>
    <h2>Figure 3 &mdash; The Raven's Matrices Revelation: Verbal vs. Visual Intelligence Measurement</h2>
    <p>Dawson, Soulieres, Gernsbacher, and Mottron (2007) found that autistic children's scores on Raven's Progressive Matrices were 30-70 percentile points higher than on the Wechsler Intelligence Scales. One-third scored in the "high intelligence" range on Raven's; zero scored high on Wechsler. One-third scored in the "intellectually disabled" range on Wechsler; only 1 in 20 scored that low on Raven's. The communication channel shapes what competence is visible.</p>
  </figcaption>
</figure>
</body>
</html>
