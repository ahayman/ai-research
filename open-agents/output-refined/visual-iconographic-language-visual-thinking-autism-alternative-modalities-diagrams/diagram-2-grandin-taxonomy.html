  <figcaption>
    <strong>Figure 2:</strong> Temple Grandin's taxonomy of thinking styles in autism. Object visualizers think in photorealistic images; spatial visualizers think in patterns and systems; verbal thinkers process through language. Most individuals have mixed profiles. A visual language based on image schemas would naturally serve spatial visualizers through systematic compositional rules, while object visualizers could benefit from iconic detail in concrete referents. Verbal thinkers may find traditional text-based communication more natural -- the visual language is an additional option, not a mandate.
