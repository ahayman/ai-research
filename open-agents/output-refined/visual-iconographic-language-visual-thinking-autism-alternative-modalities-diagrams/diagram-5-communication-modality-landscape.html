<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Communication Modality Landscape</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --accent: #4361ee;
    --muted: #6c757d;
    --caption-bg: #f8f9fa;
    --grid: #e9ecef;
    --speech: #dc2626;
    --text: #d97706;
    --sign: #16a34a;
    --pcs: #0284c7;
    --bliss: #7c3aed;
    --target: #16a34a;
    --target-bg: rgba(22, 163, 74, 0.08);
    --gap-bg: rgba(220, 38, 38, 0.06);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --accent: #6b8aff;
      --muted: #9a9ab0;
      --caption-bg: #1a1a2e;
      --grid: #252540;
      --speech: #ff6b7a;
      --text: #fbbf24;
      --sign: #34d399;
      --pcs: #6b8aff;
      --bliss: #a78bfa;
      --target: #34d399;
      --target-bg: rgba(52, 211, 153, 0.08);
      --gap-bg: rgba(255, 107, 122, 0.06);
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure { max-width: 1000px; width: 100%; }
  .chart-wrapper {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.5rem 1rem;
    overflow-x: auto;
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding: 1rem 1.5rem;
    background: var(--caption-bg);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
</style>
</head>
<body>
<figure>
  <div class="chart-wrapper">
    <svg viewBox="0 0 920 530" xmlns="http://www.w3.org/2000/svg" style="min-width:680px;">
      <defs>
        <style>
          .title { font: bold 16px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
          .subtitle { font: 12px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
          .axis-label { font: bold 12px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
          .axis-text { font: 11px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
          .dot-label { font: bold 11px 'Segoe UI', system-ui, sans-serif; }
          .dot-desc { font: 10px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
          .gap-label { font: bold 14px 'Segoe UI', system-ui, sans-serif; }
          .target-label { font: bold 12px 'Segoe UI', system-ui, sans-serif; fill: var(--target); }
          .note-text { font: 11px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
        </style>
        <marker id="arrowAccent" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
          <path d="M0,0 L8,3 L0,6" fill="var(--accent)"/>
        </marker>
      </defs>

      <text x="460" y="28" text-anchor="middle" class="title">The Communication Modality Landscape</text>
      <text x="460" y="46" text-anchor="middle" class="subtitle">Current options mapped by expressiveness and visual-spatial alignment -- and the gap</text>

      <!-- Axes -->
      <g transform="translate(100, 70)">
        <!-- Y-axis: Expressiveness -->
        <line x1="0" y1="0" x2="0" y2="380" stroke="var(--fg)" stroke-width="2"/>
        <text x="-15" y="190" text-anchor="middle" transform="rotate(-90, -15, 190)" class="axis-label">Expressiveness</text>
        <text x="-8" y="10" text-anchor="end" class="axis-text">Full natural</text>
        <text x="-8" y="24" text-anchor="end" class="axis-text">language</text>
        <text x="-8" y="375" text-anchor="end" class="axis-text">Basic</text>
        <text x="-8" y="389" text-anchor="end" class="axis-text">requests</text>

        <!-- X-axis: Visual-spatial alignment -->
        <line x1="0" y1="380" x2="720" y2="380" stroke="var(--fg)" stroke-width="2"/>
        <text x="360" y="420" text-anchor="middle" class="axis-label">Visual-Spatial Alignment</text>
        <text x="10" y="400" class="axis-text">Low (verbal/phonetic)</text>
        <text x="700" y="400" text-anchor="end" class="axis-text">High (visual/spatial)</text>

        <!-- Grid -->
        <line x1="0" y1="95" x2="720" y2="95" stroke="var(--grid)" stroke-width="0.5"/>
        <line x1="0" y1="190" x2="720" y2="190" stroke="var(--grid)" stroke-width="0.5"/>
        <line x1="0" y1="285" x2="720" y2="285" stroke="var(--grid)" stroke-width="0.5"/>
        <line x1="180" y1="0" x2="180" y2="380" stroke="var(--grid)" stroke-width="0.5"/>
        <line x1="360" y1="0" x2="360" y2="380" stroke="var(--grid)" stroke-width="0.5"/>
        <line x1="540" y1="0" x2="540" y2="380" stroke="var(--grid)" stroke-width="0.5"/>

        <!-- THE GAP (target zone) -->
        <rect x="440" y="10" width="240" height="170" rx="12" fill="var(--target-bg)" stroke="var(--target)" stroke-width="2.5" stroke-dasharray="8,4"/>
        <text x="560" y="40" text-anchor="middle" class="gap-label" fill="var(--target)">THE GAP</text>
        <text x="560" y="58" text-anchor="middle" class="target-label">High expressiveness +</text>
        <text x="560" y="73" text-anchor="middle" class="target-label">High visual-spatial alignment</text>
        <text x="560" y="95" text-anchor="middle" class="dot-desc">Target for Visual</text>
        <text x="560" y="108" text-anchor="middle" class="dot-desc">Iconographic Language</text>
        <!-- Target dot -->
        <circle cx="560" cy="75" r="9" fill="var(--target)" opacity="0.6"/>

        <!-- Speech -->
        <circle cx="80" cy="40" r="13" fill="var(--speech)" opacity="0.8"/>
        <text x="98" y="35" class="dot-label" fill="var(--speech)">Speech</text>
        <text x="98" y="48" class="dot-desc">Full expressiveness, zero visual alignment</text>

        <!-- Written language -->
        <circle cx="200" cy="50" r="13" fill="var(--text)" opacity="0.8"/>
        <text x="218" y="42" class="dot-label" fill="var(--text)">Written Text</text>
        <text x="218" y="55" class="dot-desc">Full expressiveness, low visual alignment</text>
        <text x="218" y="68" class="dot-desc">(still encodes phonemes)</text>

        <!-- Sign language -->
        <circle cx="620" cy="35" r="13" fill="var(--sign)" opacity="0.8"/>
        <text x="615" y="55" text-anchor="middle" class="dot-label" fill="var(--sign)">Sign Language</text>
        <text x="615" y="68" text-anchor="middle" class="dot-desc">Full expressiveness, high visual</text>
        <text x="615" y="81" text-anchor="middle" class="dot-desc">(requires 3D + time production)</text>

        <!-- PCS/PECS -->
        <circle cx="470" cy="310" r="12" fill="var(--pcs)" opacity="0.8"/>
        <text x="488" y="305" class="dot-label" fill="var(--pcs)">PCS / PECS</text>
        <text x="488" y="318" class="dot-desc">High visual alignment, limited expressiveness</text>

        <!-- Blissymbolics -->
        <circle cx="380" cy="195" r="12" fill="var(--bliss)" opacity="0.8"/>
        <text x="335" y="185" class="dot-label" fill="var(--bliss)">Blissymbolics</text>
        <text x="295" y="198" class="dot-desc">Moderate both dimensions</text>

        <!-- Makaton -->
        <circle cx="400" cy="270" r="10" fill="#db2777" opacity="0.8"/>
        <text x="418" y="267" class="dot-label" fill="#db2777">Makaton</text>
        <text x="418" y="280" class="dot-desc">Multimodal, moderate both</text>

        <!-- Visual supports -->
        <circle cx="550" cy="340" r="10" fill="var(--muted)" opacity="0.6"/>
        <text x="568" y="335" class="dot-label" fill="var(--muted)">Visual Supports</text>
        <text x="568" y="348" class="dot-desc">Schedules, social stories</text>
        <text x="568" y="361" class="dot-desc">High visual, not communication</text>

        <!-- Arrow from sign to target: note about motor requirement -->
        <path d="M618,50 C618,70 590,100 570,85" fill="none" stroke="var(--accent)" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arrowAccent)"/>
        <text x="630" y="92" class="dot-desc" fill="var(--accent)">Remove motor/3D</text>
        <text x="630" y="105" class="dot-desc" fill="var(--accent)">requirement</text>
      </g>

      <!-- Bottom insight -->
      <rect x="100" y="480" width="720" height="35" rx="8" fill="var(--surface)" stroke="var(--accent)" stroke-width="1.5"/>
      <text x="460" y="502" text-anchor="middle" class="note-text">Sign languages prove full expressiveness is possible in the visual-spatial modality. The gap is for a <tspan font-weight="bold">written/screen-based</tspan> visual system with comparable power.</text>
    </svg>
  </div>
  <figcaption>
    <h2>Figure 5 &mdash; The Communication Modality Landscape: Current Options and the Gap</h2>
    <p>Existing communication systems plotted by expressiveness and visual-spatial alignment. Speech and written text achieve full expressiveness but require verbal/phonetic encoding. Sign languages achieve both -- but require 3D spatial production and motor capabilities. PCS/PECS are highly visual but limited in expressiveness. The gap -- high expressiveness in a written/screen-based visual-spatial format -- is the design target for the visual iconographic language.</p>
  </figcaption>
</figure>
</body>
</html>
