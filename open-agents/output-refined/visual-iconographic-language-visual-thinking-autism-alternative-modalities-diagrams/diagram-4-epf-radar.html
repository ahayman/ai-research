<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enhanced Perceptual Functioning -- EPF Model</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --accent: #4361ee;
    --muted: #6c757d;
    --caption-bg: #f8f9fa;
    --autistic: #7c3aed;
    --autistic-fill: rgba(124, 58, 237, 0.12);
    --nt: #6b7280;
    --nt-fill: rgba(107, 114, 128, 0.08);
    --grid: #e9ecef;
    --design-bg: #dcfce7;
    --design-border: #16a34a;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --accent: #6b8aff;
      --muted: #9a9ab0;
      --caption-bg: #1a1a2e;
      --autistic: #a78bfa;
      --autistic-fill: rgba(167, 139, 250, 0.15);
      --nt: #6b7280;
      --nt-fill: rgba(107, 114, 128, 0.05);
      --grid: #252540;
      --design-bg: #064e3b;
      --design-border: #34d399;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure { max-width: 1000px; width: 100%; }
  .chart-wrapper {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.5rem 1rem;
    overflow-x: auto;
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding: 1rem 1.5rem;
    background: var(--caption-bg);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
</style>
</head>
<body>
<figure>
  <div class="chart-wrapper">
    <svg viewBox="0 0 920 580" xmlns="http://www.w3.org/2000/svg" style="min-width:680px;">
      <defs>
        <style>
          .title { font: bold 16px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
          .subtitle { font: 12px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
          .dim-label { font: bold 10px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
          .legend-label { font: bold 11px 'Segoe UI', system-ui, sans-serif; }
          .design-label { font: bold 10px 'Segoe UI', system-ui, sans-serif; fill: var(--design-border); }
          .design-text { font: 9px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
          .note-text { font: 11px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
        </style>
      </defs>

      <text x="460" y="28" text-anchor="middle" class="title">Enhanced Perceptual Functioning (EPF) Model</text>
      <text x="460" y="46" text-anchor="middle" class="subtitle">Mottron et al. (2006) -- Eight Principles of Autistic Perception as Strengths</text>

      <!-- Radar chart center -->
      <g transform="translate(330, 290)">
        <!-- Grid circles -->
        <circle cx="0" cy="0" r="190" fill="none" stroke="var(--grid)" stroke-width="0.5"/>
        <circle cx="0" cy="0" r="142" fill="none" stroke="var(--grid)" stroke-width="0.5"/>
        <circle cx="0" cy="0" r="95" fill="none" stroke="var(--grid)" stroke-width="0.5"/>
        <circle cx="0" cy="0" r="47" fill="none" stroke="var(--grid)" stroke-width="0.5"/>

        <!-- 8 axis lines (45 degrees apart) -->
        <!-- 0: top (visual patterns) -->
        <line x1="0" y1="-190" x2="0" y2="190" stroke="var(--grid)" stroke-width="0.5"/>
        <!-- 45: top-right (discrimination) -->
        <line x1="-134" y1="-134" x2="134" y2="134" stroke="var(--grid)" stroke-width="0.5"/>
        <!-- 90: right (local processing) -->
        <line x1="-190" y1="0" x2="190" y2="0" stroke="var(--grid)" stroke-width="0.5"/>
        <!-- 135: bottom-right (first-order patterns) -->
        <line x1="-134" y1="134" x2="134" y2="-134" stroke="var(--grid)" stroke-width="0.5"/>

        <!-- NT polygon (baseline, smaller) -->
        <polygon points="0,-95 67,-67 95,0 67,67 0,95 -67,67 -95,0 -67,-67"
          fill="var(--nt-fill)" stroke="var(--nt)" stroke-width="1.5" stroke-dasharray="4,3"/>

        <!-- Autistic polygon (enhanced, larger on most dimensions) -->
        <polygon points="0,-175 120,-120 170,0 110,110 0,130 -100,100 -160,0 -115,-115"
          fill="var(--autistic-fill)" stroke="var(--autistic)" stroke-width="2.5"/>

        <!-- Dimension labels around the outside -->
        <!-- 1: Visual Patterns (top) -->
        <text x="0" y="-200" text-anchor="middle" class="dim-label">1. Visual Pattern</text>
        <text x="0" y="-210" text-anchor="middle" class="dim-label">Detection</text>

        <!-- 2: Perceptual Discrimination (top-right) -->
        <text x="155" y="-155" text-anchor="start" class="dim-label">2. Perceptual</text>
        <text x="155" y="-143" text-anchor="start" class="dim-label">Discrimination</text>

        <!-- 3: Local Processing (right) -->
        <text x="200" y="-5" text-anchor="start" class="dim-label">3. Locally Oriented</text>
        <text x="200" y="7" text-anchor="start" class="dim-label">Default Processing</text>

        <!-- 4: First-Order Patterns (bottom-right) -->
        <text x="125" y="140" text-anchor="start" class="dim-label">4. First-Order</text>
        <text x="125" y="152" text-anchor="start" class="dim-label">Pattern Detection</text>

        <!-- 5: Autonomy from Top-Down (bottom) -->
        <text x="0" y="210" text-anchor="middle" class="dim-label">5. Autonomy from</text>
        <text x="0" y="222" text-anchor="middle" class="dim-label">Top-Down Influence</text>

        <!-- 6: Spatial Tasks (bottom-left) -->
        <text x="-125" y="140" text-anchor="end" class="dim-label">6. Spatial Task</text>
        <text x="-125" y="152" text-anchor="end" class="dim-label">Superiority</text>

        <!-- 7: Auditory Processing (left) -->
        <text x="-200" y="-5" text-anchor="end" class="dim-label">7. Auditory</text>
        <text x="-200" y="7" text-anchor="end" class="dim-label">Processing</text>

        <!-- 8: Tactile Processing (top-left) -->
        <text x="-155" y="-155" text-anchor="end" class="dim-label">8. Tactile</text>
        <text x="-155" y="-143" text-anchor="end" class="dim-label">Processing</text>
      </g>

      <!-- Legend -->
      <g transform="translate(700, 75)">
        <line x1="0" y1="0" x2="25" y2="0" stroke="var(--autistic)" stroke-width="2.5"/>
        <text x="30" y="4" class="legend-label" fill="var(--autistic)">Autistic profile</text>
        <line x1="0" y1="20" x2="25" y2="20" stroke="var(--nt)" stroke-width="1.5" stroke-dasharray="4,3"/>
        <text x="30" y="24" class="legend-label" fill="var(--nt)">NT baseline</text>
      </g>

      <!-- Design implications (right side) -->
      <g transform="translate(680, 140)">
        <rect x="0" y="0" width="220" height="340" rx="8" fill="var(--design-bg)" stroke="var(--design-border)" stroke-width="1.5"/>
        <text x="110" y="20" text-anchor="middle" class="design-label">Design Implications</text>

        <text x="10" y="45" class="design-text">1. Rich visual detail</text>
        <text x="15" y="57" class="design-text">rewarded, not punished</text>

        <text x="10" y="80" class="design-text">2. Subtle visual distinctions</text>
        <text x="15" y="92" class="design-text">can carry meaning</text>

        <text x="10" y="115" class="design-text">3. Bottom-up composition</text>
        <text x="15" y="127" class="design-text">over top-down context</text>

        <text x="10" y="150" class="design-text">4. Regular patterns in</text>
        <text x="15" y="162" class="design-text">symbol construction</text>

        <text x="10" y="185" class="design-text">5. Meaning in parts,</text>
        <text x="15" y="197" class="design-text">not requiring context</text>

        <text x="10" y="220" class="design-text">6. Spatial arrangement</text>
        <text x="15" y="232" class="design-text">as grammar</text>

        <text x="10" y="255" class="design-text">7. Multi-sensory input</text>
        <text x="15" y="267" class="design-text">options available</text>

        <text x="10" y="290" class="design-text">8. Tactile/haptic</text>
        <text x="15" y="302" class="design-text">versions possible</text>

        <text x="110" y="330" text-anchor="middle" class="design-label">Design with strengths,</text>
        <text x="110" y="342" text-anchor="middle" class="design-label">not around deficits</text>
      </g>

      <!-- Source note -->
      <text x="460" y="555" text-anchor="middle" class="note-text">Source: Mottron, Dawson, Soulieres, Hubert &amp; Burack (2006). 1,766+ citations.</text>
      <text x="460" y="570" text-anchor="middle" class="note-text">The EPF model reframes autistic perception as genuinely enhanced -- not disordered, not compensatory.</text>
    </svg>
  </div>
  <figcaption>
    <h2>Figure 4 &mdash; Enhanced Perceptual Functioning: Mottron's EPF Model</h2>
    <p>The EPF model (Mottron et al., 2006) identifies eight dimensions of enhanced autistic perception: visual pattern detection, perceptual discrimination, locally oriented processing, first-order pattern detection, autonomy from top-down influence, spatial task superiority, enhanced auditory processing, and possible enhanced tactile processing. A visual language designed to leverage these strengths -- rather than working around them -- could be processed more efficiently by autistic users, not less.</p>
  </figcaption>
</figure>
</body>
</html>
