<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Modality Mismatch</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --accent: #4361ee;
    --muted: #6c757d;
    --caption-bg: #f8f9fa;
    --thought-bg: #ede9fe;
    --thought-border: #7c3aed;
    --bottleneck-bg: #fee2e2;
    --bottleneck-border: #dc2626;
    --verbal-bg: #fef3c7;
    --verbal-border: #d97706;
    --visual-bg: #dcfce7;
    --visual-border: #16a34a;
    --direct-bg: #e0f2fe;
    --direct-border: #0284c7;
    --loss: #dc2626;
    --flow: #16a34a;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --accent: #6b8aff;
      --muted: #9a9ab0;
      --caption-bg: #1a1a2e;
      --thought-bg: #3b0764;
      --thought-border: #a78bfa;
      --bottleneck-bg: #450a0a;
      --bottleneck-border: #ff6b7a;
      --verbal-bg: #78350f;
      --verbal-border: #fbbf24;
      --visual-bg: #064e3b;
      --visual-border: #34d399;
      --direct-bg: #1e3a5f;
      --direct-border: #6b8aff;
      --loss: #ff6b7a;
      --flow: #34d399;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure { max-width: 1050px; width: 100%; }
  .chart-wrapper {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.5rem 1rem;
    overflow-x: auto;
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding: 1rem 1.5rem;
    background: var(--caption-bg);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
</style>
</head>
<body>
<figure>
  <div class="chart-wrapper">
    <svg viewBox="0 0 980 520" xmlns="http://www.w3.org/2000/svg" style="min-width:700px;">
      <defs>
        <style>
          .title { font: bold 16px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
          .subtitle { font: 12px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
          .path-label { font: bold 13px 'Segoe UI', system-ui, sans-serif; }
          .box-label { font: bold 12px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
          .box-desc { font: 10px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
          .loss-label { font: bold 11px 'Segoe UI', system-ui, sans-serif; fill: var(--loss); }
          .flow-label { font: bold 11px 'Segoe UI', system-ui, sans-serif; fill: var(--flow); }
          .energy-text { font: italic 10px 'Segoe UI', system-ui, sans-serif; }
          .note-text { font: 11px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
        </style>
        <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
          <path d="M0,0 L8,3 L0,6" fill="var(--loss)"/>
        </marker>
        <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
          <path d="M0,0 L8,3 L0,6" fill="var(--flow)"/>
        </marker>
      </defs>

      <text x="490" y="30" text-anchor="middle" class="title">The Modality Mismatch</text>
      <text x="490" y="48" text-anchor="middle" class="subtitle">Visual Thought Through a Verbal Bottleneck -- and the Alternative Path</text>

      <!-- PATH 1: Current (verbal bottleneck) -->
      <text x="30" y="90" class="path-label" fill="var(--loss)">CURRENT PATH: Verbal bottleneck</text>
      <line x1="30" y1="96" x2="320" y2="96" stroke="var(--loss)" stroke-width="1" opacity="0.4"/>

      <!-- Visual-spatial thought (rich) -->
      <rect x="30" y="110" width="180" height="90" rx="10" fill="var(--thought-bg)" stroke="var(--thought-border)" stroke-width="2"/>
      <text x="120" y="135" text-anchor="middle" class="box-label">Rich Visual-Spatial</text>
      <text x="120" y="150" text-anchor="middle" class="box-label">Thought</text>
      <text x="120" y="168" text-anchor="middle" class="box-desc">Complete spatial structures</text>
      <text x="120" y="181" text-anchor="middle" class="box-desc">Relationships, patterns, systems</text>
      <!-- Energy bar: full -->
      <rect x="50" y="195" width="140" height="5" rx="2" fill="var(--thought-border)" opacity="0.7"/>

      <!-- Arrow to bottleneck -->
      <line x1="210" y1="155" x2="265" y2="155" stroke="var(--loss)" stroke-width="2" marker-end="url(#arrowRed)"/>
      <text x="237" y="145" text-anchor="middle" class="energy-text" fill="var(--loss)">serialize</text>

      <!-- Translation bottleneck -->
      <rect x="270" y="115" width="160" height="80" rx="6" fill="var(--bottleneck-bg)" stroke="var(--bottleneck-border)" stroke-width="2.5"/>
      <text x="350" y="140" text-anchor="middle" class="box-label">Translation</text>
      <text x="350" y="155" text-anchor="middle" class="box-label">Bottleneck</text>
      <text x="350" y="172" text-anchor="middle" class="box-desc">Disassemble structure</text>
      <text x="350" y="185" text-anchor="middle" class="box-desc">Find words, linearize</text>
      <!-- Bottleneck shape -->
      <polygon points="270,195 350,205 430,195" fill="var(--bottleneck-border)" opacity="0.15"/>

      <!-- Arrow to verbal output -->
      <line x1="430" y1="155" x2="485" y2="155" stroke="var(--loss)" stroke-width="2" marker-end="url(#arrowRed)"/>
      <text x="457" y="145" text-anchor="middle" class="energy-text" fill="var(--loss)">encode</text>

      <!-- Verbal encoding -->
      <rect x="490" y="115" width="150" height="80" rx="6" fill="var(--verbal-bg)" stroke="var(--verbal-border)" stroke-width="1.5"/>
      <text x="565" y="140" text-anchor="middle" class="box-label">Verbal Encoding</text>
      <text x="565" y="158" text-anchor="middle" class="box-desc">Linear word sequence</text>
      <text x="565" y="171" text-anchor="middle" class="box-desc">One word at a time</text>
      <text x="565" y="184" text-anchor="middle" class="box-desc">Working memory drain</text>

      <!-- Arrow to reduced output -->
      <line x1="640" y1="155" x2="695" y2="155" stroke="var(--loss)" stroke-width="2" marker-end="url(#arrowRed)"/>
      <text x="667" y="145" text-anchor="middle" class="energy-text" fill="var(--loss)">speak</text>

      <!-- Reduced output -->
      <rect x="700" y="115" width="160" height="80" rx="6" fill="var(--bottleneck-bg)" stroke="var(--bottleneck-border)" stroke-width="1.5" stroke-dasharray="4,2"/>
      <text x="780" y="137" text-anchor="middle" class="box-label">Reduced Output</text>
      <text x="780" y="155" text-anchor="middle" class="box-desc">Fragmented expression</text>
      <text x="780" y="168" text-anchor="middle" class="box-desc">Exhaustion, lost detail</text>
      <text x="780" y="181" text-anchor="middle" class="box-desc">Thought &gt; Words available</text>
      <!-- Energy bar: depleted -->
      <rect x="720" y="195" width="120" height="5" rx="2" fill="var(--loss)" opacity="0.4"/>
      <rect x="720" y="195" width="35" height="5" rx="2" fill="var(--loss)" opacity="0.7"/>

      <!-- Loss indicators -->
      <text x="350" y="220" text-anchor="middle" class="loss-label">Cognitive energy spent on translation, not communication</text>

      <!-- PATH 2: Proposed (direct visual) -->
      <text x="30" y="280" class="path-label" fill="var(--flow)">PROPOSED PATH: Direct visual encoding</text>
      <line x1="30" y1="286" x2="370" y2="286" stroke="var(--flow)" stroke-width="1" opacity="0.4"/>

      <!-- Visual-spatial thought (same) -->
      <rect x="30" y="300" width="180" height="90" rx="10" fill="var(--thought-bg)" stroke="var(--thought-border)" stroke-width="2"/>
      <text x="120" y="325" text-anchor="middle" class="box-label">Rich Visual-Spatial</text>
      <text x="120" y="340" text-anchor="middle" class="box-label">Thought</text>
      <text x="120" y="358" text-anchor="middle" class="box-desc">Same complete structures</text>
      <text x="120" y="371" text-anchor="middle" class="box-desc">Same relationships, patterns</text>
      <!-- Energy bar: full -->
      <rect x="50" y="385" width="140" height="5" rx="2" fill="var(--thought-border)" opacity="0.7"/>

      <!-- Arrow: direct encoding -->
      <line x1="210" y1="345" x2="395" y2="345" stroke="var(--flow)" stroke-width="3" marker-end="url(#arrowGreen)"/>
      <text x="300" y="335" text-anchor="middle" class="flow-label">Direct visual encoding</text>
      <text x="300" y="360" text-anchor="middle" class="box-desc">No translation step needed</text>

      <!-- Visual-spatial output -->
      <rect x="400" y="300" width="200" height="90" rx="10" fill="var(--visual-bg)" stroke="var(--visual-border)" stroke-width="2"/>
      <text x="500" y="325" text-anchor="middle" class="box-label">Visual-Spatial Output</text>
      <text x="500" y="343" text-anchor="middle" class="box-desc">Spatial structure preserved</text>
      <text x="500" y="356" text-anchor="middle" class="box-desc">Relationships visible</text>
      <text x="500" y="369" text-anchor="middle" class="box-desc">Composed from image schemas</text>
      <!-- Energy bar: mostly full -->
      <rect x="420" y="385" width="160" height="5" rx="2" fill="var(--flow)" opacity="0.4"/>
      <rect x="420" y="385" width="125" height="5" rx="2" fill="var(--flow)" opacity="0.7"/>

      <!-- Arrow to full expression -->
      <line x1="600" y1="345" x2="655" y2="345" stroke="var(--flow)" stroke-width="2" marker-end="url(#arrowGreen)"/>

      <!-- Full expressive potential -->
      <rect x="660" y="300" width="200" height="90" rx="10" fill="var(--visual-bg)" stroke="var(--visual-border)" stroke-width="2"/>
      <text x="760" y="322" text-anchor="middle" class="box-label">Full Expressive</text>
      <text x="760" y="337" text-anchor="middle" class="box-label">Potential</text>
      <text x="760" y="355" text-anchor="middle" class="box-desc">Thought complexity preserved</text>
      <text x="760" y="368" text-anchor="middle" class="box-desc">Energy for content, not translation</text>
      <text x="760" y="381" text-anchor="middle" class="box-desc">Communication matches cognition</text>
      <!-- Energy bar: full -->
      <rect x="680" y="385" width="160" height="5" rx="2" fill="var(--flow)" opacity="0.7"/>

      <!-- Flow label -->
      <text x="500" y="415" text-anchor="middle" class="flow-label">Cognitive energy available for communication itself</text>

      <!-- Bottom insight -->
      <rect x="140" y="450" width="700" height="50" rx="10" fill="var(--surface)" stroke="var(--accent)" stroke-width="2"/>
      <text x="490" y="470" text-anchor="middle" class="note-text"><tspan font-weight="bold">This is not a language deficit.</tspan> It is a bandwidth mismatch.</text>
      <text x="490" y="487" text-anchor="middle" class="note-text">Change the communication channel, and competence becomes visible.</text>
    </svg>
  </div>
  <figcaption>
    <h2>Figure 1 &mdash; The Modality Mismatch: Visual Thought Through a Verbal Bottleneck</h2>
    <p>The current communication pathway forces visual-spatial thought through a verbal-phonetic bottleneck, consuming cognitive resources on translation rather than expression. The proposed alternative allows visual-spatial thought to be expressed directly in visual-spatial format, preserving structural complexity and reducing translation cost. This reframes communication difficulty not as deficit but as modality mismatch -- supported by findings that autistic individuals perform better on semantic tasks when visual rather than verbal access is provided (PMC11589611; PMC3606476).</p>
  </figcaption>
</figure>
</body>
</html>
