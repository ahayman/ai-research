<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guanxi Network Architecture</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #f8f9fa;
    color: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 2rem;
  }
  figure {
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
    max-width: 1100px;
    width: 100%;
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid #e9ecef;
  }
  figcaption strong { display: block; font-size: 1.15rem; color: #1a1a2e; margin-bottom: 0.4rem; }
  figcaption span { font-size: 0.9rem; color: #6c757d; line-height: 1.5; }
  svg { max-width: 100%; height: auto; }
  .legend {
    display: flex; justify-content: center; gap: 1.5rem; margin-top: 1rem; flex-wrap: wrap;
  }
  .legend-item { display: flex; align-items: center; gap: 0.5rem; font-size: 0.85rem; color: #495057; }
  .legend-swatch { width: 16px; height: 16px; border-radius: 4px; }
  @media (prefers-color-scheme: dark) {
    body { background: #1a1a2e; color: #e9ecef; }
    figure { background: #2d2d44; box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
    figcaption { border-top-color: #3d3d5c; }
    figcaption strong { color: #e9ecef; }
    figcaption span { color: #adb5bd; }
    .legend-item { color: #adb5bd; }
    svg text { fill: #e9ecef; }
  }
</style>
</head>
<body>
<figure>
  <svg viewBox="0 0 1050 750" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
    <!-- Title -->
    <text x="400" y="32" text-anchor="middle" font-size="20" font-weight="700" fill="#1a1a2e">Guanxi Network Architecture</text>
    <text x="400" y="52" text-anchor="middle" font-size="13" fill="#6c757d">Concentric obligation rings vs. English flat networking</text>

    <!-- Concentric rings - Chinese guanxi -->
    <text x="400" y="80" text-anchor="middle" font-size="15" font-weight="600" fill="#4338ca">CHINESE: Guanxi (&#20851;&#31995;)</text>

    <!-- Outermost ring - Strangers -->
    <circle cx="400" cy="370" r="270" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="8,4"/>
    <text x="400" y="118" text-anchor="middle" font-size="11" fill="#94a3b8">Strangers (&#38476;&#29983;&#20154;) -- No guanxi; no obligation</text>

    <!-- Ring 4 - Acquaintances -->
    <circle cx="400" cy="370" r="220" fill="#e0e7ff" fill-opacity="0.3" stroke="#818cf8" stroke-width="1.5"/>
    <text x="400" y="168" text-anchor="middle" font-size="11" fill="#6366f1">Acquaintances (&#29087;&#20154;) -- Weak obligation; indirect reciprocity</text>

    <!-- Ring 3 - Classmates/Colleagues -->
    <circle cx="400" cy="370" r="165" fill="#c7d2fe" fill-opacity="0.3" stroke="#6366f1" stroke-width="2"/>
    <text x="400" y="222" text-anchor="middle" font-size="11" fill="#4338ca">Classmates &#183; Colleagues &#183; Army buddies (&#21516;&#23398;/&#21516;&#20107;) -- Moderate obligation</text>

    <!-- Ring 2 - Close friends -->
    <circle cx="400" cy="370" r="110" fill="#a5b4fc" fill-opacity="0.3" stroke="#4f46e5" stroke-width="2"/>
    <text x="400" y="278" text-anchor="middle" font-size="11" fill="#3730a3">Close friends (&#22909;&#26379;&#21451;) -- Strong obligation; emotional bond</text>

    <!-- Ring 1 - Family -->
    <circle cx="400" cy="370" r="60" fill="#6366f1" fill-opacity="0.2" stroke="#4338ca" stroke-width="2.5"/>
    <text x="400" y="335" text-anchor="middle" font-size="12" font-weight="600" fill="#312e81">&#23478;&#20154;</text>
    <text x="400" y="352" text-anchor="middle" font-size="11" fill="#312e81">Family</text>
    <text x="400" y="370" text-anchor="middle" font-size="10" fill="#4338ca">Strongest</text>
    <text x="400" y="385" text-anchor="middle" font-size="10" fill="#4338ca">obligation</text>
    <text x="400" y="400" text-anchor="middle" font-size="10" fill="#4338ca">Lifelong</text>

    <!-- Ego at center -->
    <circle cx="400" cy="370" r="18" fill="#4338ca" stroke="#312e81" stroke-width="2"/>
    <text x="400" y="374" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">EGO</text>

    <!-- Intermediary bridge -->
    <circle cx="290" cy="520" r="14" fill="#f59e0b" stroke="#d97706" stroke-width="1.5"/>
    <text x="290" y="524" text-anchor="middle" font-size="8" font-weight="700" fill="#fff">&#20013;</text>
    <text x="290" y="550" text-anchor="middle" font-size="10" fill="#d97706">&#20013;&#38388;&#20154;</text>
    <text x="290" y="563" text-anchor="middle" font-size="9" fill="#d97706">(Intermediary)</text>

    <!-- Arrow from intermediary bridging rings -->
    <path d="M 304,520 Q 350,500 370,460" fill="none" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrowOrange)"/>
    <path d="M 276,520 Q 230,540 220,560" fill="none" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrowOrange)"/>
    <text x="220" y="580" text-anchor="middle" font-size="9" fill="#d97706">Connects strangers</text>
    <text x="220" y="593" text-anchor="middle" font-size="9" fill="#d97706">into the network</text>

    <defs>
      <marker id="arrowOrange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
        <path d="M0,0 L8,3 L0,6" fill="#f59e0b"/>
      </marker>
      <marker id="arrowGray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
        <path d="M0,0 L8,3 L0,6" fill="#64748b"/>
      </marker>
    </defs>

    <!-- Reciprocity arrows -->
    <path d="M 418,370 Q 480,330 520,320" fill="none" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
    <path d="M 520,330 Q 480,350 418,375" fill="none" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
    <text x="540" y="310" font-size="10" fill="#059669">&#20114;&#24800; (h&#249;hu&#236;)</text>
    <text x="540" y="325" font-size="9" fill="#059669">Reciprocity</text>
    <text x="540" y="345" font-size="9" fill="#059669">Every favor = debt</text>
    <defs>
      <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
        <path d="M0,0 L8,3 L0,6" fill="#10b981"/>
      </marker>
    </defs>

    <!-- Properties annotation -->
    <rect x="520" y="400" width="170" height="95" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
    <text x="530" y="418" font-size="10" font-weight="600" fill="#92400e">Core properties:</text>
    <text x="530" y="436" font-size="10" fill="#92400e">&#9679; Reciprocity (&#20114;&#24800;)</text>
    <text x="530" y="454" font-size="10" fill="#92400e">&#9679; Trust (&#20449;&#20219;)</text>
    <text x="530" y="472" font-size="10" fill="#92400e">&#9679; Hierarchy (&#31561;&#32423;)</text>
    <text x="530" y="490" font-size="10" fill="#92400e">&#9679; Durability (lifelong)</text>

    <!-- Divider -->
    <line x1="720" y1="80" x2="720" y2="650" stroke="#d1d5db" stroke-width="1" stroke-dasharray="6,4"/>
    <text x="720" y="670" text-anchor="middle" font-size="11" fill="#9ca3af">vs.</text>

    <!-- English networking - right side -->
    <text x="885" y="80" text-anchor="middle" font-size="15" font-weight="600" fill="#475569">ENGLISH: Networking</text>

    <!-- Flat network -->
    <circle cx="885" cy="250" r="12" fill="#64748b" stroke="#475569" stroke-width="1.5"/>
    <text x="885" y="254" text-anchor="middle" font-size="8" font-weight="700" fill="#fff">EGO</text>

    <!-- Flat connections radiating out -->
    <line x1="897" y1="250" x2="960" y2="200" stroke="#94a3b8" stroke-width="1"/>
    <circle cx="960" cy="200" r="8" fill="#94a3b8"/>
    <line x1="897" y1="250" x2="970" y2="260" stroke="#94a3b8" stroke-width="1"/>
    <circle cx="970" cy="260" r="8" fill="#94a3b8"/>
    <line x1="885" y1="238" x2="920" y2="170" stroke="#94a3b8" stroke-width="1"/>
    <circle cx="920" cy="170" r="8" fill="#94a3b8"/>
    <line x1="873" y1="250" x2="810" y2="210" stroke="#94a3b8" stroke-width="1"/>
    <circle cx="810" cy="210" r="8" fill="#94a3b8"/>
    <line x1="873" y1="250" x2="800" y2="280" stroke="#94a3b8" stroke-width="1"/>
    <circle cx="800" cy="280" r="8" fill="#94a3b8"/>
    <line x1="885" y1="262" x2="850" y2="310" stroke="#94a3b8" stroke-width="1"/>
    <circle cx="850" cy="310" r="8" fill="#94a3b8"/>
    <line x1="885" y1="262" x2="930" y2="320" stroke="#94a3b8" stroke-width="1"/>
    <circle cx="930" cy="320" r="8" fill="#94a3b8"/>

    <!-- English properties -->
    <rect x="745" y="360" width="280" height="160" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/>
    <text x="885" y="385" text-anchor="middle" font-size="11" font-weight="600" fill="#475569">English "Networking"</text>
    <text x="760" y="410" font-size="10" fill="#475569">&#9679; Primarily professional</text>
    <text x="760" y="430" font-size="10" fill="#475569">&#9679; Loosely reciprocal</text>
    <text x="760" y="450" font-size="10" fill="#475569">&#9679; No moral penalty for</text>
    <text x="770" y="465" font-size="10" fill="#475569">non-reciprocation</text>
    <text x="760" y="485" font-size="10" fill="#475569">&#9679; Limited to immediate utility</text>
    <text x="760" y="505" font-size="10" fill="#475569">&#9679; No intermediary required</text>

    <!-- Comparison box at bottom -->
    <rect x="50" y="640" width="950" height="90" rx="10" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
    <text x="525" y="665" text-anchor="middle" font-size="13" font-weight="600" fill="#334155">STRUCTURAL CONTRAST</text>
    <text x="525" y="688" text-anchor="middle" font-size="11" fill="#475569">Guanxi: Hierarchical concentric rings &#183; Morally binding &#183; Multigenerational &#183; Face-linked &#183; Intermediary-dependent</text>
    <text x="525" y="708" text-anchor="middle" font-size="11" fill="#475569">Networking: Flat graph &#183; Loosely transactional &#183; Short-term &#183; Reputation-linked &#183; Self-initiated</text>
    <text x="525" y="722" text-anchor="middle" font-size="10" font-style="italic" fill="#64748b">Arabic "wasta" (&#1608;&#1575;&#1587;&#1591;&#1577;) shares structural similarities with guanxi -- intermediary-based, obligation-bound</text>
    </svg>
  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background:#4338ca;"></div>Family (strongest obligation)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#6366f1;"></div>Close friends / classmates</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#818cf8;"></div>Acquaintances</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#f59e0b;"></div>Intermediary (&#20013;&#38388;&#20154;)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#10b981;"></div>Reciprocal flow</div>
  </div>
  <figcaption>
    <strong>Figure 2: Guanxi Network Architecture -- Concentric Obligation Rings</strong>
    <span>Guanxi organizes relationships in concentric rings of decreasing obligation, bridged by intermediaries. English networking is a comparatively flat, transactional graph. Failure to reciprocate in guanxi damages lian (moral face) -- in English networking, it merely reduces future utility.</span>
  </figcaption>
</figure>
</body>
</html>
