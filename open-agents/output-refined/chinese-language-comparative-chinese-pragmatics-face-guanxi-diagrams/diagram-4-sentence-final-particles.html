<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sentence-Final Particles -- The Pragmatic Stance Grid</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #f8f9fa;
    color: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 2rem;
  }
  figure {
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
    max-width: 1150px;
    width: 100%;
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid #e9ecef;
  }
  figcaption strong { display: block; font-size: 1.15rem; color: #1a1a2e; margin-bottom: 0.4rem; }
  figcaption span { font-size: 0.9rem; color: #6c757d; line-height: 1.5; }
  svg { max-width: 100%; height: auto; }
  .legend {
    display: flex; justify-content: center; gap: 1.5rem; margin-top: 1rem; flex-wrap: wrap;
  }
  .legend-item { display: flex; align-items: center; gap: 0.5rem; font-size: 0.85rem; color: #495057; }
  .legend-swatch { width: 16px; height: 16px; border-radius: 4px; }
  @media (prefers-color-scheme: dark) {
    body { background: #1a1a2e; color: #e9ecef; }
    figure { background: #2d2d44; box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
    figcaption { border-top-color: #3d3d5c; }
    figcaption strong { color: #e9ecef; }
    figcaption span { color: #adb5bd; }
    .legend-item { color: #adb5bd; }
    svg text { fill: #e9ecef; }
  }
</style>
</head>
<body>
<figure>
  <svg viewBox="0 0 1100 780" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
    <!-- Title -->
    <text x="550" y="32" text-anchor="middle" font-size="20" font-weight="700" fill="#1a1a2e">Sentence-Final Particles: Chinese Pragmatic Stance Grid</text>
    <text x="550" y="52" text-anchor="middle" font-size="13" fill="#6c757d">A dedicated "pragmatic slot" at sentence-end -- English distributes this across intonation, adverbs, and tag questions</text>

    <!-- Demo sentence -->
    <rect x="50" y="70" width="1000" height="55" rx="10" fill="#eef2ff" stroke="#a5b4fc" stroke-width="1.5"/>
    <text x="550" y="90" text-anchor="middle" font-size="13" font-weight="600" fill="#3730a3">Base sentence: &#20320;&#21435; (n&#464; q&#249;) = "You go" -- bare statement, no pragmatic coloring</text>
    <text x="550" y="110" text-anchor="middle" font-size="12" fill="#4f46e5">Adding one particle transforms the entire pragmatic meaning:</text>

    <!-- Grid header -->
    <rect x="50" y="140" width="1000" height="35" rx="6" fill="#334155"/>
    <text x="120" y="163" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff">Particle</text>
    <text x="240" y="163" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff">Example</text>
    <text x="410" y="163" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff">Pragmatic Force</text>
    <text x="580" y="163" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff">Epistemic</text>
    <text x="720" y="163" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff">Interpersonal</text>
    <text x="910" y="163" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff">English Equivalent</text>

    <!-- Row 1: 吗 -->
    <rect x="50" y="175" width="1000" height="48" rx="0" fill="#fef2f2"/>
    <text x="100" y="198" font-size="22" font-weight="700" fill="#dc2626">&#21527;</text>
    <text x="130" y="198" font-size="11" fill="#dc2626">ma</text>
    <text x="240" y="195" text-anchor="middle" font-size="11" fill="#991b1b">&#20320;&#21435;&#21527;&#65311;</text>
    <text x="240" y="212" text-anchor="middle" font-size="9" font-style="italic" fill="#b91c1c">Are you going?</text>
    <text x="410" y="200" text-anchor="middle" font-size="11" fill="#991b1b">Yes/no question</text>
    <rect x="535" y="189" width="90" height="18" rx="9" fill="#fca5a5"/>
    <text x="580" y="202" text-anchor="middle" font-size="10" font-weight="600" fill="#7f1d1d">Uncertain</text>
    <rect x="675" y="189" width="90" height="18" rx="9" fill="#e5e7eb"/>
    <text x="720" y="202" text-anchor="middle" font-size="10" fill="#374151">Neutral</text>
    <text x="910" y="200" text-anchor="middle" font-size="10" fill="#991b1b">Rising intonation (?)</text>

    <!-- Row 2: 吧 -->
    <rect x="50" y="223" width="1000" height="48" rx="0" fill="#fff7ed"/>
    <text x="100" y="246" font-size="22" font-weight="700" fill="#ea580c">&#21543;</text>
    <text x="130" y="246" font-size="11" fill="#ea580c">ba</text>
    <text x="240" y="243" text-anchor="middle" font-size="11" fill="#9a3412">&#20320;&#21435;&#21543;&#12290;</text>
    <text x="240" y="260" text-anchor="middle" font-size="9" font-style="italic" fill="#c2410c">You should go / Go ahead</text>
    <text x="410" y="248" text-anchor="middle" font-size="11" fill="#9a3412">Suggestion / soft command</text>
    <rect x="535" y="237" width="90" height="18" rx="9" fill="#fed7aa"/>
    <text x="580" y="250" text-anchor="middle" font-size="10" font-weight="600" fill="#7c2d12">Partial</text>
    <rect x="675" y="237" width="90" height="18" rx="9" fill="#bbf7d0"/>
    <text x="720" y="250" text-anchor="middle" font-size="10" font-weight="600" fill="#14532d">Seeking accord</text>
    <text x="910" y="248" text-anchor="middle" font-size="10" fill="#9a3412">"Let's..." / "...right?"</text>

    <!-- Row 3: 呢 -->
    <rect x="50" y="271" width="1000" height="48" rx="0" fill="#fefce8"/>
    <text x="100" y="294" font-size="22" font-weight="700" fill="#ca8a04">&#21602;</text>
    <text x="130" y="294" font-size="11" fill="#ca8a04">ne</text>
    <text x="240" y="291" text-anchor="middle" font-size="11" fill="#854d0e">&#20320;&#21435;&#21602;&#65311;</text>
    <text x="240" y="308" text-anchor="middle" font-size="9" font-style="italic" fill="#a16207">What about you going?</text>
    <text x="410" y="296" text-anchor="middle" font-size="11" fill="#854d0e">Topic continuation</text>
    <rect x="535" y="285" width="90" height="18" rx="9" fill="#fef08a"/>
    <text x="580" y="298" text-anchor="middle" font-size="10" font-weight="600" fill="#713f12">Open</text>
    <rect x="675" y="285" width="90" height="18" rx="9" fill="#bbf7d0"/>
    <text x="720" y="298" text-anchor="middle" font-size="10" font-weight="600" fill="#14532d">Engaged</text>
    <text x="910" y="296" text-anchor="middle" font-size="10" fill="#854d0e">"What about...?" / "And?"</text>

    <!-- Row 4: 了 -->
    <rect x="50" y="319" width="1000" height="48" rx="0" fill="#f0fdf4"/>
    <text x="100" y="342" font-size="22" font-weight="700" fill="#16a34a">&#20102;</text>
    <text x="130" y="342" font-size="11" fill="#16a34a">le</text>
    <text x="240" y="339" text-anchor="middle" font-size="11" fill="#166534">&#20320;&#21435;&#20102;&#12290;</text>
    <text x="240" y="356" text-anchor="middle" font-size="9" font-style="italic" fill="#15803d">You've gone / are going now</text>
    <text x="410" y="344" text-anchor="middle" font-size="11" fill="#166534">Change of state</text>
    <rect x="535" y="333" width="90" height="18" rx="9" fill="#86efac"/>
    <text x="580" y="346" text-anchor="middle" font-size="10" font-weight="600" fill="#14532d">Certain (new)</text>
    <rect x="675" y="333" width="90" height="18" rx="9" fill="#e5e7eb"/>
    <text x="720" y="346" text-anchor="middle" font-size="10" fill="#374151">Informing</text>
    <text x="910" y="344" text-anchor="middle" font-size="10" fill="#166534">"now" (grammaticalized)</text>

    <!-- Row 5: 啊 -->
    <rect x="50" y="367" width="1000" height="48" rx="0" fill="#eef2ff"/>
    <text x="100" y="390" font-size="22" font-weight="700" fill="#4f46e5">&#21834;</text>
    <text x="130" y="390" font-size="11" fill="#4f46e5">a</text>
    <text x="240" y="387" text-anchor="middle" font-size="11" fill="#3730a3">&#20320;&#21435;&#21834;&#65281;</text>
    <text x="240" y="404" text-anchor="middle" font-size="9" font-style="italic" fill="#4338ca">Go on! (encouragement)</text>
    <text x="410" y="392" text-anchor="middle" font-size="11" fill="#3730a3">Emphasis / exclamation</text>
    <rect x="535" y="381" width="90" height="18" rx="9" fill="#c7d2fe"/>
    <text x="580" y="394" text-anchor="middle" font-size="10" font-weight="600" fill="#312e81">Variable</text>
    <rect x="675" y="381" width="90" height="18" rx="9" fill="#fde68a"/>
    <text x="720" y="394" text-anchor="middle" font-size="10" font-weight="600" fill="#78350f">Warm</text>
    <text x="910" y="392" text-anchor="middle" font-size="10" fill="#3730a3">Exclamation mark (!)</text>

    <!-- Row 6: 嘛 -->
    <rect x="50" y="415" width="1000" height="48" rx="0" fill="#fdf2f8"/>
    <text x="100" y="438" font-size="22" font-weight="700" fill="#db2777">&#22043;</text>
    <text x="130" y="438" font-size="11" fill="#db2777">ma</text>
    <text x="240" y="435" text-anchor="middle" font-size="11" fill="#9d174d">&#20320;&#21435;&#22043;&#65281;</text>
    <text x="240" y="452" text-anchor="middle" font-size="9" font-style="italic" fill="#be185d">Go already! (obviously)</text>
    <text x="410" y="440" text-anchor="middle" font-size="11" fill="#9d174d">Obviousness / impatience</text>
    <rect x="535" y="429" width="90" height="18" rx="9" fill="#f9a8d4"/>
    <text x="580" y="442" text-anchor="middle" font-size="10" font-weight="600" fill="#831843">Fully certain</text>
    <rect x="675" y="429" width="90" height="18" rx="9" fill="#fca5a5"/>
    <text x="720" y="442" text-anchor="middle" font-size="10" font-weight="600" fill="#7f1d1d">Insistent</text>
    <text x="910" y="440" text-anchor="middle" font-size="10" fill="#9d174d">"obviously" / "duh"</text>

    <!-- Row 7: 啦 -->
    <rect x="50" y="463" width="1000" height="48" rx="0" fill="#f5f3ff"/>
    <text x="100" y="486" font-size="22" font-weight="700" fill="#7c3aed">&#21862;</text>
    <text x="130" y="486" font-size="11" fill="#7c3aed">la</text>
    <text x="240" y="483" text-anchor="middle" font-size="11" fill="#5b21b6">&#22909;&#21862;&#22909;&#21862;</text>
    <text x="240" y="500" text-anchor="middle" font-size="9" font-style="italic" fill="#6d28d9">OK OK (stop nagging)</text>
    <text x="410" y="488" text-anchor="middle" font-size="11" fill="#5b21b6">Completed + emotion (&#20102;+&#21834;)</text>
    <rect x="535" y="477" width="90" height="18" rx="9" fill="#c4b5fd"/>
    <text x="580" y="490" text-anchor="middle" font-size="10" font-weight="600" fill="#3b0764">Resolved</text>
    <rect x="675" y="477" width="90" height="18" rx="9" fill="#fde68a"/>
    <text x="720" y="490" text-anchor="middle" font-size="10" font-weight="600" fill="#78350f">Exasperated</text>
    <text x="910" y="488" text-anchor="middle" font-size="10" fill="#5b21b6">"alright already"</text>

    <!-- Three-dimension summary -->
    <text x="550" y="545" text-anchor="middle" font-size="16" font-weight="600" fill="#1a1a2e">The Three Pragmatic Dimensions</text>

    <!-- Epistemic -->
    <rect x="50" y="565" width="320" height="80" rx="10" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
    <text x="210" y="588" text-anchor="middle" font-size="12" font-weight="700" fill="#dc2626">EPISTEMIC (what speaker knows)</text>
    <text x="210" y="610" text-anchor="middle" font-size="11" fill="#991b1b">&#21527; uncertain &#8594; &#21543; partial &#8594; &#22043; certain</text>
    <text x="210" y="630" text-anchor="middle" font-size="10" fill="#b91c1c">English: modal verbs (might/could/must)</text>

    <!-- Illocutionary -->
    <rect x="390" y="565" width="320" height="80" rx="10" fill="#eef2ff" stroke="#a5b4fc" stroke-width="1.5"/>
    <text x="550" y="588" text-anchor="middle" font-size="12" font-weight="700" fill="#4f46e5">ILLOCUTIONARY (what speaker does)</text>
    <text x="550" y="610" text-anchor="middle" font-size="11" fill="#3730a3">&#21527; asks &#8594; &#21543; suggests &#8594; &#21834; exclaims</text>
    <text x="550" y="630" text-anchor="middle" font-size="10" fill="#4338ca">English: intonation + sentence type</text>

    <!-- Interpersonal -->
    <rect x="730" y="565" width="320" height="80" rx="10" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
    <text x="890" y="588" text-anchor="middle" font-size="12" font-weight="700" fill="#16a34a">INTERPERSONAL (speaker-hearer relation)</text>
    <text x="890" y="610" text-anchor="middle" font-size="11" fill="#166534">&#21834; warm &#8594; &#22043; insistent &#8594; &#21543; collaborative</text>
    <text x="890" y="630" text-anchor="middle" font-size="10" fill="#15803d">English: tone of voice + word choice</text>

    <!-- Bottom pattern box -->
    <rect x="50" y="670" width="1000" height="90" rx="10" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
    <text x="550" y="695" text-anchor="middle" font-size="13" font-weight="600" fill="#334155">PATTERN: Chinese concentrates three pragmatic dimensions into one sentence-final slot.</text>
    <text x="550" y="718" text-anchor="middle" font-size="12" fill="#475569">English distributes the same functions across intonation, tag questions, modal verbs, adverbs, and word choice.</text>
    <text x="550" y="740" text-anchor="middle" font-size="12" fill="#475569">Particles are as precise as English modals -- just operating on interpersonal stance rather than epistemic modality.</text>
  </svg>
  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background:#dc2626;"></div>Question (&#21527;)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#ea580c;"></div>Suggestion (&#21543;)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#ca8a04;"></div>Continuation (&#21602;)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#16a34a;"></div>Change of state (&#20102;)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#4f46e5;"></div>Emphasis (&#21834;)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#db2777;"></div>Obviousness (&#22043;)</div>
  </div>
  <figcaption>
    <strong>Figure 4: Sentence-Final Particles -- The Pragmatic Stance Grid</strong>
    <span>Chinese sentence-final particles form a systematic mini-grammar of interpersonal stance, operating across epistemic, illocutionary, and interpersonal dimensions simultaneously. English has no equivalent dedicated slot -- it distributes these functions across multiple subsystems. The same two-word sentence (&#20320;&#21435;) produces seven distinct pragmatic meanings through particle choice alone.</span>
  </figcaption>
</figure>
</body>
</html>
