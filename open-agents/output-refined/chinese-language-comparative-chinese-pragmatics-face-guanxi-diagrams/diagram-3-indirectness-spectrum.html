<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Indirect Communication Spectrum</title>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #f8f9fa;
    color: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 2rem;
  }
  figure {
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
    max-width: 1100px;
    width: 100%;
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid #e9ecef;
  }
  figcaption strong { display: block; font-size: 1.15rem; color: #1a1a2e; margin-bottom: 0.4rem; }
  figcaption span { font-size: 0.9rem; color: #6c757d; line-height: 1.5; }
  svg.spectrum { max-width: 100%; height: auto; }
  .legend {
    display: flex; justify-content: center; gap: 1.5rem; margin-top: 1rem; flex-wrap: wrap;
  }
  .legend-item { display: flex; align-items: center; gap: 0.5rem; font-size: 0.85rem; color: #495057; }
  .legend-swatch { width: 16px; height: 16px; border-radius: 4px; }
  @media (prefers-color-scheme: dark) {
    body { background: #1a1a2e; color: #e9ecef; }
    figure { background: #2d2d44; box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
    figcaption { border-top-color: #3d3d5c; }
    figcaption strong { color: #e9ecef; }
    figcaption span { color: #adb5bd; }
    .legend-item { color: #adb5bd; }
    svg text { fill: #e9ecef; }
  }
</style>
</head>
<body>
<figure>
  <svg class="spectrum" viewBox="0 0 1050 680" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
    <defs>
      <linearGradient id="spectrumGrad" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="#ef4444"/>
        <stop offset="25%" stop-color="#f97316"/>
        <stop offset="50%" stop-color="#eab308"/>
        <stop offset="75%" stop-color="#22c55e"/>
        <stop offset="100%" stop-color="#6366f1"/>
      </linearGradient>
    </defs>

    <!-- Title -->
    <text x="525" y="35" text-anchor="middle" font-size="20" font-weight="700" fill="#1a1a2e">The Indirect Communication Spectrum</text>
    <text x="525" y="55" text-anchor="middle" font-size="13" fill="#6c757d">Same pragmatic act ("declining an invitation") across five languages</text>

    <!-- Spectrum bar -->
    <rect x="60" y="80" width="930" height="16" rx="8" fill="url(#spectrumGrad)" opacity="0.7"/>
    <text x="60" y="75" font-size="12" font-weight="600" fill="#ef4444">MOST DIRECT</text>
    <text x="990" y="75" text-anchor="end" font-size="12" font-weight="600" fill="#6366f1">MOST INDIRECT</text>

    <!-- Position markers -->
    <!-- German -->
    <line x1="130" y1="96" x2="130" y2="175" stroke="#ef4444" stroke-width="2"/>
    <circle cx="130" cy="92" r="5" fill="#ef4444"/>
    <rect x="50" y="115" width="160" height="110" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
    <text x="130" y="135" text-anchor="middle" font-size="13" font-weight="700" fill="#dc2626">German</text>
    <text x="130" y="155" text-anchor="middle" font-size="10" fill="#991b1b">"Nein, das geht nicht."</text>
    <text x="130" y="170" text-anchor="middle" font-size="9" font-style="italic" fill="#b91c1c">(No, that won't work.)</text>
    <text x="130" y="192" text-anchor="middle" font-size="9" fill="#991b1b">Direct refusal</text>
    <text x="130" y="206" text-anchor="middle" font-size="9" fill="#991b1b">Content > relationship</text>

    <!-- English -->
    <line x1="310" y1="96" x2="310" y2="175" stroke="#f97316" stroke-width="2"/>
    <circle cx="310" cy="92" r="5" fill="#f97316"/>
    <rect x="230" y="115" width="160" height="110" rx="8" fill="#fff7ed" stroke="#f97316" stroke-width="1.5"/>
    <text x="310" y="135" text-anchor="middle" font-size="13" font-weight="700" fill="#ea580c">English</text>
    <text x="310" y="155" text-anchor="middle" font-size="10" fill="#9a3412">"I'd love to, but I</text>
    <text x="310" y="170" text-anchor="middle" font-size="10" fill="#9a3412">can't make it."</text>
    <text x="310" y="192" text-anchor="middle" font-size="9" fill="#9a3412">Softened refusal</text>
    <text x="310" y="206" text-anchor="middle" font-size="9" fill="#9a3412">Hedged with "love to"</text>

    <!-- French -->
    <line x1="510" y1="96" x2="510" y2="175" stroke="#eab308" stroke-width="2"/>
    <circle cx="510" cy="92" r="5" fill="#eab308"/>
    <rect x="430" y="115" width="160" height="110" rx="8" fill="#fefce8" stroke="#eab308" stroke-width="1.5"/>
    <text x="510" y="135" text-anchor="middle" font-size="13" font-weight="700" fill="#ca8a04">French</text>
    <text x="510" y="155" text-anchor="middle" font-size="10" fill="#854d0e">"Ce serait avec plaisir,</text>
    <text x="510" y="170" text-anchor="middle" font-size="10" fill="#854d0e">mais malheureusement..."</text>
    <text x="510" y="192" text-anchor="middle" font-size="9" fill="#854d0e">Conditional tense refusal</text>
    <text x="510" y="206" text-anchor="middle" font-size="9" fill="#854d0e">Grammaticalized politeness</text>

    <!-- Arabic -->
    <line x1="720" y1="96" x2="720" y2="175" stroke="#22c55e" stroke-width="2"/>
    <circle cx="720" cy="92" r="5" fill="#22c55e"/>
    <rect x="640" y="115" width="160" height="110" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/>
    <text x="720" y="135" text-anchor="middle" font-size="13" font-weight="700" fill="#16a34a">Arabic</text>
    <text x="720" y="155" text-anchor="middle" font-size="10" fill="#166534">&#1573;&#1606; &#1588;&#1575;&#1569; &#1575;&#1604;&#1604;&#1607;</text>
    <text x="720" y="170" text-anchor="middle" font-size="9" font-style="italic" fill="#166534">(If God wills...)</text>
    <text x="720" y="192" text-anchor="middle" font-size="9" fill="#166534">Religious formula = soft no</text>
    <text x="720" y="206" text-anchor="middle" font-size="9" fill="#166534">Defers to divine will</text>

    <!-- Chinese -->
    <line x1="920" y1="96" x2="920" y2="175" stroke="#6366f1" stroke-width="2"/>
    <circle cx="920" cy="92" r="5" fill="#6366f1"/>
    <rect x="840" y="115" width="160" height="110" rx="8" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
    <text x="920" y="135" text-anchor="middle" font-size="13" font-weight="700" fill="#4f46e5">Chinese</text>
    <text x="920" y="155" text-anchor="middle" font-size="10" fill="#3730a3">&#19981;&#22826;&#26041;&#20415;</text>
    <text x="920" y="170" text-anchor="middle" font-size="9" font-style="italic" fill="#3730a3">(Not very convenient)</text>
    <text x="920" y="192" text-anchor="middle" font-size="9" fill="#3730a3">Implicature-based refusal</text>
    <text x="920" y="206" text-anchor="middle" font-size="9" fill="#3730a3">Context does the work</text>

    <!-- Lower section: Mechanism comparison -->
    <text x="525" y="265" text-anchor="middle" font-size="16" font-weight="600" fill="#1a1a2e">Indirectness Mechanisms Compared</text>

    <!-- Table header -->
    <rect x="60" y="280" width="930" height="30" rx="4" fill="#f1f5f9"/>
    <text x="130" y="300" text-anchor="middle" font-size="11" font-weight="600" fill="#334155">Mechanism</text>
    <text x="310" y="300" text-anchor="middle" font-size="11" font-weight="600" fill="#334155">English</text>
    <text x="530" y="300" text-anchor="middle" font-size="11" font-weight="600" fill="#334155">French</text>
    <text x="730" y="300" text-anchor="middle" font-size="11" font-weight="600" fill="#334155">Arabic</text>
    <text x="920" y="300" text-anchor="middle" font-size="11" font-weight="600" fill="#334155">Chinese</text>

    <!-- Row 1 -->
    <line x1="60" y1="315" x2="990" y2="315" stroke="#e5e7eb" stroke-width="1"/>
    <text x="130" y="335" text-anchor="middle" font-size="10" fill="#475569">Hedging words</text>
    <text x="310" y="335" text-anchor="middle" font-size="10" fill="#9a3412">"maybe," "sort of"</text>
    <text x="530" y="335" text-anchor="middle" font-size="10" fill="#854d0e">"peut-&#234;tre," "un peu"</text>
    <text x="730" y="335" text-anchor="middle" font-size="10" fill="#166534">&#1605;&#1605;&#1603;&#1606; (mumkin)</text>
    <text x="920" y="335" text-anchor="middle" font-size="10" fill="#3730a3">&#21487;&#33021; (k&#283;n&#233;ng)</text>

    <!-- Row 2 -->
    <line x1="60" y1="350" x2="990" y2="350" stroke="#e5e7eb" stroke-width="1"/>
    <text x="130" y="370" text-anchor="middle" font-size="10" fill="#475569">Grammatical mood</text>
    <text x="310" y="370" text-anchor="middle" font-size="10" fill="#9a3412">"Could you...?"</text>
    <text x="530" y="370" text-anchor="middle" font-size="10" fill="#854d0e">Conditional tense</text>
    <text x="730" y="370" text-anchor="middle" font-size="10" fill="#166534">Subjunctive mood</text>
    <text x="920" y="370" text-anchor="middle" font-size="10" fill="#3730a3">Particles (&#21543;, &#21834;)</text>

    <!-- Row 3 -->
    <line x1="60" y1="385" x2="990" y2="385" stroke="#e5e7eb" stroke-width="1"/>
    <text x="130" y="405" text-anchor="middle" font-size="10" fill="#475569">Topic avoidance</text>
    <text x="310" y="405" text-anchor="middle" font-size="10" fill="#9a3412">Rare, seen as evasive</text>
    <text x="530" y="405" text-anchor="middle" font-size="10" fill="#854d0e">Moderate</text>
    <text x="730" y="405" text-anchor="middle" font-size="10" fill="#166534">Common</text>
    <text x="920" y="405" text-anchor="middle" font-size="10" fill="#3730a3">Expected (face-saving)</text>

    <!-- Row 4 -->
    <line x1="60" y1="420" x2="990" y2="420" stroke="#e5e7eb" stroke-width="1"/>
    <text x="130" y="440" text-anchor="middle" font-size="10" fill="#475569">Silence as message</text>
    <text x="310" y="440" text-anchor="middle" font-size="10" fill="#9a3412">Awkward; fill silence</text>
    <text x="530" y="440" text-anchor="middle" font-size="10" fill="#854d0e">Tolerated briefly</text>
    <text x="730" y="440" text-anchor="middle" font-size="10" fill="#166534">Meaningful</text>
    <text x="920" y="440" text-anchor="middle" font-size="10" fill="#3730a3">Highly meaningful</text>

    <!-- Row 5 -->
    <line x1="60" y1="455" x2="990" y2="455" stroke="#e5e7eb" stroke-width="1"/>
    <text x="130" y="475" text-anchor="middle" font-size="10" fill="#475569">Third-party mediation</text>
    <text x="310" y="475" text-anchor="middle" font-size="10" fill="#9a3412">Rare (professional only)</text>
    <text x="530" y="475" text-anchor="middle" font-size="10" fill="#854d0e">Moderate</text>
    <text x="730" y="475" text-anchor="middle" font-size="10" fill="#166534">Common (wasta)</text>
    <text x="920" y="475" text-anchor="middle" font-size="10" fill="#3730a3">Expected (&#20013;&#38388;&#20154;)</text>

    <!-- Bottom insight boxes -->
    <rect x="60" y="510" width="440" height="70" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
    <text x="280" y="532" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">PATTERN: Chinese indirectness is not vagueness</text>
    <text x="280" y="550" text-anchor="middle" font-size="10" fill="#92400e">It is precision in a different domain: relational meaning</text>
    <text x="280" y="566" text-anchor="middle" font-size="10" fill="#92400e">rather than propositional content.</text>

    <rect x="530" y="510" width="460" height="70" rx="8" fill="#f0f9ff" stroke="#0ea5e9" stroke-width="1"/>
    <text x="760" y="532" text-anchor="middle" font-size="11" font-weight="600" fill="#0369a1">Edward Hall's framework (1959)</text>
    <text x="760" y="550" text-anchor="middle" font-size="10" fill="#0369a1">High-context (Chinese, Arabic, Japanese):</text>
    <text x="760" y="566" text-anchor="middle" font-size="10" fill="#0369a1">meaning embedded in context, not in words</text>

    <!-- Chinese-specific examples -->
    <text x="525" y="610" text-anchor="middle" font-size="14" font-weight="600" fill="#1a1a2e">Chinese Indirect Refusal Patterns</text>

    <rect x="60" y="625" width="295" height="45" rx="6" fill="#eef2ff" stroke="#a5b4fc" stroke-width="1"/>
    <text x="207" y="643" text-anchor="middle" font-size="10" fill="#3730a3">&#25105;&#20877;&#32771;&#34385;&#32771;&#34385; -- "I'll think about it"</text>
    <text x="207" y="659" text-anchor="middle" font-size="9" font-style="italic" fill="#4f46e5">= No (but face preserved)</text>

    <rect x="378" y="625" width="295" height="45" rx="6" fill="#eef2ff" stroke="#a5b4fc" stroke-width="1"/>
    <text x="525" y="643" text-anchor="middle" font-size="10" fill="#3730a3">&#20320;&#19968;&#23450;&#24456;&#24537;&#21543; -- "You must be busy"</text>
    <text x="525" y="659" text-anchor="middle" font-size="9" font-style="italic" fill="#4f46e5">= Please leave (exit provided)</text>

    <rect x="696" y="625" width="295" height="45" rx="6" fill="#eef2ff" stroke="#a5b4fc" stroke-width="1"/>
    <text x="843" y="643" text-anchor="middle" font-size="10" fill="#3730a3">&#20063;&#35768;&#21487;&#20197;&#25442;&#20010;&#35282;&#24230; -- "Maybe try another angle"</text>
    <text x="843" y="659" text-anchor="middle" font-size="9" font-style="italic" fill="#4f46e5">= You're wrong (without contradiction)</text>
  </svg>
  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background:#ef4444;"></div>Most direct (German)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#f97316;"></div>Moderately direct (English)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#eab308;"></div>Grammatically indirect (French)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#22c55e;"></div>Culturally indirect (Arabic)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#6366f1;"></div>Most indirect (Chinese)</div>
  </div>
  <figcaption>
    <strong>Figure 3: The Indirect Communication Spectrum</strong>
    <span>Five languages positioned on the directness-indirectness continuum for the same pragmatic act (declining an invitation). Chinese and Arabic both rely on discourse-level implicature; French uses grammatical mood; English uses lexical hedging. Based on Edward Hall's high-context/low-context framework (1959) and Brown &amp; Levinson (1987).</span>
  </figcaption>
</figure>
</body>
</html>
