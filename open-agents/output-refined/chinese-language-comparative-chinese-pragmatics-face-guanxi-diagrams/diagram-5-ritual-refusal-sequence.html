<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ritual Refusal Sequence -- Gift-Giving Flowchart</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #f8f9fa;
    color: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 2rem;
  }
  figure {
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
    max-width: 1100px;
    width: 100%;
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid #e9ecef;
  }
  figcaption strong { display: block; font-size: 1.15rem; color: #1a1a2e; margin-bottom: 0.4rem; }
  figcaption span { font-size: 0.9rem; color: #6c757d; line-height: 1.5; }
  svg { max-width: 100%; height: auto; }
  .legend {
    display: flex; justify-content: center; gap: 1.5rem; margin-top: 1rem; flex-wrap: wrap;
  }
  .legend-item { display: flex; align-items: center; gap: 0.5rem; font-size: 0.85rem; color: #495057; }
  .legend-swatch { width: 16px; height: 16px; border-radius: 4px; }
  @media (prefers-color-scheme: dark) {
    body { background: #1a1a2e; color: #e9ecef; }
    figure { background: #2d2d44; box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
    figcaption { border-top-color: #3d3d5c; }
    figcaption strong { color: #e9ecef; }
    figcaption span { color: #adb5bd; }
    .legend-item { color: #adb5bd; }
    svg text { fill: #e9ecef; }
  }
</style>
</head>
<body>
<figure>
  <svg viewBox="0 0 1050 780" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
    <defs>
      <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
        <path d="M0,0 L8,3 L0,6" fill="#4f46e5"/>
      </marker>
      <marker id="arrowGray2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
        <path d="M0,0 L8,3 L0,6" fill="#64748b"/>
      </marker>
      <marker id="arrowGreen2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
        <path d="M0,0 L8,3 L0,6" fill="#16a34a"/>
      </marker>
    </defs>

    <!-- Title -->
    <text x="525" y="32" text-anchor="middle" font-size="20" font-weight="700" fill="#1a1a2e">The Ritual Refusal Sequence</text>
    <text x="525" y="52" text-anchor="middle" font-size="13" fill="#6c757d">Chinese, Arabic, and English patterns for gift-giving, bill-paying, and invitations</text>

    <!-- Three columns -->
    <!-- CHINESE COLUMN -->
    <text x="200" y="85" text-anchor="middle" font-size="16" font-weight="700" fill="#4f46e5">Chinese (&#20013;&#25991;)</text>
    <text x="200" y="102" text-anchor="middle" font-size="11" fill="#6366f1">2-3 rounds required</text>

    <!-- Step 1: Offer -->
    <rect x="85" y="115" width="230" height="40" rx="8" fill="#eef2ff" stroke="#6366f1" stroke-width="2"/>
    <text x="200" y="133" text-anchor="middle" font-size="11" font-weight="600" fill="#3730a3">OFFER: "&#36825;&#26159;&#32473;&#20320;&#30340;&#23567;&#31036;&#29289;"</text>
    <text x="200" y="148" text-anchor="middle" font-size="9" fill="#4f46e5">(A small gift for you)</text>
    <line x1="200" y1="155" x2="200" y2="175" stroke="#4f46e5" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

    <!-- Step 2: Refuse 1 -->
    <rect x="85" y="175" width="230" height="45" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
    <text x="200" y="193" text-anchor="middle" font-size="11" font-weight="600" fill="#dc2626">REFUSE 1: "&#19981;&#29992;&#19981;&#29992;&#65281;"</text>
    <text x="200" y="208" text-anchor="middle" font-size="9" fill="#ef4444">(No need, no need!)</text>
    <text x="330" y="198" font-size="8" fill="#f59e0b">&#8592; Shows modesty</text>
    <line x1="200" y1="220" x2="200" y2="240" stroke="#4f46e5" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

    <!-- Step 3: Insist 1 -->
    <rect x="85" y="240" width="230" height="40" rx="8" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
    <text x="200" y="258" text-anchor="middle" font-size="11" font-weight="600" fill="#3730a3">INSIST 1: "&#19968;&#28857;&#24515;&#24847;&#65292;&#25910;&#19979;&#21543;"</text>
    <text x="200" y="273" text-anchor="middle" font-size="9" fill="#4f46e5">(Just a thought, please take it)</text>
    <line x1="200" y1="280" x2="200" y2="300" stroke="#4f46e5" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

    <!-- Step 4: Refuse 2 -->
    <rect x="85" y="300" width="230" height="45" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
    <text x="200" y="318" text-anchor="middle" font-size="11" font-weight="600" fill="#dc2626">REFUSE 2: "&#22826;&#23458;&#27668;&#20102;&#65281;"</text>
    <text x="200" y="333" text-anchor="middle" font-size="9" fill="#ef4444">(You're too polite!)</text>
    <text x="330" y="318" font-size="8" fill="#f59e0b">&#8592; Tests sincerity</text>
    <line x1="200" y1="345" x2="200" y2="365" stroke="#4f46e5" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

    <!-- Step 5: Insist 2 -->
    <rect x="85" y="365" width="230" height="40" rx="8" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
    <text x="200" y="383" text-anchor="middle" font-size="11" font-weight="600" fill="#3730a3">INSIST 2: "&#19968;&#23450;&#35201;&#25910;&#65281;"</text>
    <text x="200" y="398" text-anchor="middle" font-size="9" fill="#4f46e5">(You must accept!)</text>
    <line x1="200" y1="405" x2="200" y2="425" stroke="#4f46e5" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

    <!-- Step 6: Accept -->
    <rect x="85" y="425" width="230" height="45" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
    <text x="200" y="443" text-anchor="middle" font-size="11" font-weight="700" fill="#16a34a">ACCEPT: "&#37027;&#25105;&#23601;&#25910;&#19979;&#20102;"</text>
    <text x="200" y="458" text-anchor="middle" font-size="9" fill="#16a34a">(Then I'll accept it)</text>
    <text x="330" y="443" font-size="8" fill="#16a34a">&#8592; Relationship strengthened</text>

    <!-- ARABIC COLUMN -->
    <text x="545" y="85" text-anchor="middle" font-size="16" font-weight="700" fill="#16a34a">Arabic (&#1575;&#1604;&#1593;&#1585;&#1576;&#1610;&#1577;)</text>
    <text x="545" y="102" text-anchor="middle" font-size="11" fill="#22c55e">Similar ritual pattern</text>

    <rect x="430" y="115" width="230" height="40" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
    <text x="545" y="133" text-anchor="middle" font-size="11" font-weight="600" fill="#166534">OFFER: "&#1607;&#1584;&#1575; &#1604;&#1603;"</text>
    <text x="545" y="148" text-anchor="middle" font-size="9" fill="#16a34a">(This is for you)</text>
    <line x1="545" y1="155" x2="545" y2="175" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrowGreen2)"/>

    <rect x="430" y="175" width="230" height="45" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
    <text x="545" y="193" text-anchor="middle" font-size="11" font-weight="600" fill="#dc2626">REFUSE: "&#1604;&#1575; &#1610;&#1575; &#1571;&#1582;&#1610;&#65281;"</text>
    <text x="545" y="208" text-anchor="middle" font-size="9" fill="#ef4444">(No, my brother!)</text>
    <line x1="545" y1="220" x2="545" y2="240" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrowGreen2)"/>

    <rect x="430" y="240" width="230" height="40" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/>
    <text x="545" y="258" text-anchor="middle" font-size="11" font-weight="600" fill="#166534">INSIST: "&#1593;&#1610;&#1576;&#65292; &#1582;&#1584;&#1607;"</text>
    <text x="545" y="273" text-anchor="middle" font-size="9" fill="#16a34a">(Shame on you, take it)</text>
    <line x1="545" y1="280" x2="545" y2="300" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrowGreen2)"/>

    <rect x="430" y="300" width="230" height="45" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
    <text x="545" y="318" text-anchor="middle" font-size="11" font-weight="600" fill="#dc2626">REFUSE: "&#1575;&#1604;&#1604;&#1607; &#1610;&#1582;&#1604;&#1610;&#1603;"</text>
    <text x="545" y="333" text-anchor="middle" font-size="9" fill="#ef4444">(God keep you)</text>
    <line x1="545" y1="345" x2="545" y2="365" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrowGreen2)"/>

    <rect x="430" y="365" width="230" height="40" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/>
    <text x="545" y="383" text-anchor="middle" font-size="11" font-weight="600" fill="#166534">INSIST: "&#1571;&#1589;&#1585;&#1617;!"</text>
    <text x="545" y="398" text-anchor="middle" font-size="9" fill="#16a34a">(I insist!)</text>
    <line x1="545" y1="405" x2="545" y2="425" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrowGreen2)"/>

    <rect x="430" y="425" width="230" height="45" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
    <text x="545" y="443" text-anchor="middle" font-size="11" font-weight="700" fill="#16a34a">ACCEPT: "&#1575;&#1604;&#1604;&#1607; &#1610;&#1576;&#1575;&#1585;&#1603; &#1601;&#1610;&#1603;"</text>
    <text x="545" y="458" text-anchor="middle" font-size="9" fill="#16a34a">(God bless you)</text>

    <!-- ENGLISH COLUMN -->
    <text x="880" y="85" text-anchor="middle" font-size="16" font-weight="700" fill="#64748b">English</text>
    <text x="880" y="102" text-anchor="middle" font-size="11" fill="#94a3b8">Direct acceptance</text>

    <rect x="765" y="115" width="230" height="40" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/>
    <text x="880" y="133" text-anchor="middle" font-size="11" font-weight="600" fill="#475569">OFFER: "I got this for you"</text>
    <line x1="880" y1="155" x2="880" y2="175" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowGray2)"/>

    <rect x="765" y="175" width="230" height="40" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
    <text x="880" y="193" text-anchor="middle" font-size="11" font-weight="700" fill="#16a34a">ACCEPT: "Thank you!"</text>
    <text x="880" y="208" text-anchor="middle" font-size="9" fill="#16a34a">(Immediate acceptance)</text>

    <!-- Short path annotation -->
    <rect x="765" y="240" width="230" height="65" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
    <text x="880" y="260" text-anchor="middle" font-size="10" fill="#92400e">Refusal would signal:</text>
    <text x="880" y="278" text-anchor="middle" font-size="10" fill="#92400e">- Rejection of the gift</text>
    <text x="880" y="294" text-anchor="middle" font-size="10" fill="#92400e">- Rudeness or ingratitude</text>

    <!-- Connecting bracket to show pattern -->
    <rect x="50" y="490" width="950" height="85" rx="10" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
    <text x="525" y="515" text-anchor="middle" font-size="14" font-weight="700" fill="#334155">The Same Pattern Applies To:</text>

    <rect x="80" y="530" width="275" height="35" rx="6" fill="#eef2ff" stroke="#a5b4fc" stroke-width="1"/>
    <text x="217" y="551" text-anchor="middle" font-size="11" fill="#3730a3">&#20105;&#30528;&#20080;&#21333; Bill-paying "fight"</text>

    <rect x="380" y="530" width="275" height="35" rx="6" fill="#eef2ff" stroke="#a5b4fc" stroke-width="1"/>
    <text x="517" y="551" text-anchor="middle" font-size="11" fill="#3730a3">Invitation acceptance rituals</text>

    <rect x="680" y="530" width="275" height="35" rx="6" fill="#eef2ff" stroke="#a5b4fc" stroke-width="1"/>
    <text x="817" y="551" text-anchor="middle" font-size="11" fill="#3730a3">Compliment deflection (&#27809;&#26377;&#27809;&#26377;)</text>

    <!-- Bottom insight -->
    <rect x="50" y="600" width="950" height="55" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
    <text x="525" y="622" text-anchor="middle" font-size="12" font-weight="600" fill="#92400e">PATTERN: The ritual is algorithmic, not random. Both parties know the script.</text>
    <text x="525" y="642" text-anchor="middle" font-size="11" fill="#92400e">Refusal demonstrates modesty (lian). Insistence proves sincerity (mianzi). Immediate acceptance = greed = face loss.</text>

    <!-- Deeper comparison box -->
    <rect x="50" y="675" width="950" height="90" rx="10" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
    <text x="525" y="700" text-anchor="middle" font-size="13" font-weight="600" fill="#334155">Cross-Cultural Logic</text>
    <text x="525" y="722" text-anchor="middle" font-size="11" fill="#475569">Chinese: Face + modesty display &#8594; Relationship prioritized over efficiency</text>
    <text x="525" y="740" text-anchor="middle" font-size="11" fill="#475569">Arabic: Generosity + religious frame &#8594; "God bless you" sanctifies the exchange</text>
    <text x="525" y="758" text-anchor="middle" font-size="11" fill="#475569">English: Sincerity + autonomy &#8594; Efficiency prioritized; refusal = rejection</text>
  </svg>
  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background:#4f46e5;"></div>Chinese sequence (2-3 rounds)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#16a34a;"></div>Arabic sequence (similar pattern)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#64748b;"></div>English sequence (direct)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#ef4444;"></div>Refusal steps</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#f59e0b;"></div>Face-saving function</div>
  </div>
  <figcaption>
    <strong>Figure 5: The Ritual Refusal Sequence -- Gift-Giving Across Cultures</strong>
    <span>Chinese and Arabic share a multi-round ritual refusal pattern where immediate acceptance signals greed. English short-circuits to direct acceptance. The same pattern governs bill-paying, invitations, and compliment responses in Chinese. Traditional Chinese practice involves three refusals; modern practice may use 1-2.</span>
  </figcaption>
</figure>
</body>
</html>
