<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Dual Face System -- Mianzi vs. Lian</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #f8f9fa;
    color: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 2rem;
  }
  figure {
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
    max-width: 1100px;
    width: 100%;
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid #e9ecef;
  }
  figcaption strong {
    display: block;
    font-size: 1.15rem;
    color: #1a1a2e;
    margin-bottom: 0.4rem;
  }
  figcaption span {
    font-size: 0.9rem;
    color: #6c757d;
    line-height: 1.5;
  }
  .diagram-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.5rem;
  }
  svg { max-width: 100%; height: auto; }
  .legend {
    display: flex;
    justify-content: center;
    gap: 1.5rem;
    margin-top: 1rem;
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.85rem;
    color: #495057;
  }
  .legend-swatch {
    width: 16px;
    height: 16px;
    border-radius: 4px;
  }
  @media (prefers-color-scheme: dark) {
    body { background: #1a1a2e; color: #e9ecef; }
    figure { background: #2d2d44; box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
    figcaption { border-top-color: #3d3d5c; }
    figcaption strong { color: #e9ecef; }
    figcaption span { color: #adb5bd; }
    .legend-item { color: #adb5bd; }
    svg text { fill: #e9ecef; }
    svg .bg-fill { fill: #2d2d44; }
  }
</style>
</head>
<body>
<figure>
  <div class="diagram-container">
    <svg viewBox="0 0 1000 680" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
      <defs>
        <linearGradient id="mianziGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#6366f1" stop-opacity="0.15"/>
          <stop offset="100%" stop-color="#6366f1" stop-opacity="0.05"/>
        </linearGradient>
        <linearGradient id="lianGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#ef4444" stop-opacity="0.15"/>
          <stop offset="100%" stop-color="#ef4444" stop-opacity="0.05"/>
        </linearGradient>
        <linearGradient id="overlapGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.25"/>
          <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.1"/>
        </linearGradient>
        <linearGradient id="englishGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#64748b" stop-opacity="0.15"/>
          <stop offset="100%" stop-color="#64748b" stop-opacity="0.05"/>
        </linearGradient>
      </defs>

      <!-- Title -->
      <text x="500" y="35" text-anchor="middle" font-size="20" font-weight="700" fill="#1a1a2e">Chinese Dual Face System vs. English Unified "Face"</text>
      <text x="500" y="55" text-anchor="middle" font-size="13" fill="#6c757d">Two independent axes of social evaluation -- no English structural equivalent</text>

      <!-- CHINESE SYSTEM - Left Side -->
      <text x="310" y="90" text-anchor="middle" font-size="16" font-weight="600" fill="#4338ca">CHINESE: Two Dimensions</text>

      <!-- Mianzi Circle -->
      <ellipse cx="210" cy="310" rx="190" ry="220" fill="url(#mianziGrad)" stroke="#6366f1" stroke-width="2"/>
      <text x="110" y="140" font-size="18" font-weight="700" fill="#6366f1">&#38754;&#23376; (mianzi)</text>
      <text x="110" y="160" font-size="12" fill="#6366f1">Social Face</text>

      <!-- Mianzi attributes -->
      <text x="80" y="195" font-size="11" fill="#4338ca">&#9679; Social prestige</text>
      <text x="80" y="215" font-size="11" fill="#4338ca">&#9679; Public reputation</text>
      <text x="80" y="235" font-size="11" fill="#4338ca">&#9679; Status &amp; competence</text>
      <text x="80" y="255" font-size="11" fill="#4338ca">&#9679; Other-oriented</text>
      <text x="80" y="285" font-size="10" font-style="italic" fill="#6366f1">Gained through:</text>
      <text x="80" y="300" font-size="10" fill="#4338ca">Achievement, connections,</text>
      <text x="80" y="315" font-size="10" fill="#4338ca">generosity, public success</text>
      <text x="80" y="345" font-size="10" font-style="italic" fill="#6366f1">Lost through:</text>
      <text x="80" y="360" font-size="10" fill="#4338ca">Public failure, humiliation,</text>
      <text x="80" y="375" font-size="10" fill="#4338ca">inability to perform</text>
      <text x="80" y="405" font-size="10" font-style="italic" fill="#6366f1">Recovery:</text>
      <text x="80" y="420" font-size="10" fill="#4338ca">Relatively achievable</text>

      <!-- Lian Circle (overlapping) -->
      <ellipse cx="410" cy="310" rx="190" ry="220" fill="url(#lianGrad)" stroke="#ef4444" stroke-width="2"/>
      <text x="440" y="140" font-size="18" font-weight="700" fill="#ef4444">&#33080; (lian)</text>
      <text x="440" y="160" font-size="12" fill="#ef4444">Moral Face</text>

      <!-- Lian attributes -->
      <text x="430" y="195" font-size="11" fill="#dc2626">&#9679; Moral integrity</text>
      <text x="430" y="215" font-size="11" fill="#dc2626">&#9679; Ethical character</text>
      <text x="430" y="235" font-size="11" fill="#dc2626">&#9679; Trustworthiness</text>
      <text x="430" y="255" font-size="11" fill="#dc2626">&#9679; Self-oriented</text>
      <text x="430" y="285" font-size="10" font-style="italic" fill="#ef4444">Baseline assumption:</text>
      <text x="430" y="300" font-size="10" fill="#dc2626">Everyone has it unless</text>
      <text x="430" y="315" font-size="10" fill="#dc2626">they lose it</text>
      <text x="430" y="345" font-size="10" font-style="italic" fill="#ef4444">Lost through:</text>
      <text x="430" y="360" font-size="10" fill="#dc2626">Lying, cheating, moral</text>
      <text x="430" y="375" font-size="10" fill="#dc2626">failure, betrayal</text>
      <text x="430" y="405" font-size="10" font-style="italic" fill="#ef4444">Recovery:</text>
      <text x="430" y="420" font-size="10" fill="#dc2626">Extremely difficult</text>

      <!-- Overlap zone -->
      <text x="310" y="450" text-anchor="middle" font-size="11" font-weight="600" fill="#7c3aed">OVERLAP</text>
      <text x="310" y="467" text-anchor="middle" font-size="10" fill="#7c3aed">Keeping promises</text>
      <text x="310" y="482" text-anchor="middle" font-size="10" fill="#7c3aed">Public generosity</text>
      <text x="310" y="497" text-anchor="middle" font-size="10" fill="#7c3aed">Consistent behavior</text>

      <!-- Key insight box -->
      <rect x="50" y="530" width="520" height="50" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
      <text x="310" y="552" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">KEY PATTERN: High mianzi + low lian = corrupt official</text>
      <text x="310" y="568" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">High lian + low mianzi = virtuous but poor person</text>

      <!-- Divider -->
      <line x1="620" y1="100" x2="620" y2="580" stroke="#d1d5db" stroke-width="1" stroke-dasharray="6,4"/>
      <text x="620" y="625" text-anchor="middle" font-size="11" fill="#9ca3af">vs.</text>

      <!-- ENGLISH SYSTEM - Right Side -->
      <text x="810" y="90" text-anchor="middle" font-size="16" font-weight="600" fill="#475569">ENGLISH: One Dimension</text>

      <ellipse cx="810" cy="310" rx="160" ry="200" fill="url(#englishGrad)" stroke="#64748b" stroke-width="2"/>
      <text x="810" y="160" text-anchor="middle" font-size="18" font-weight="700" fill="#475569">"Face"</text>
      <text x="810" y="180" text-anchor="middle" font-size="12" fill="#64748b">Single unified concept</text>

      <text x="700" y="215" font-size="11" fill="#475569">&#9679; Positive face (approval)</text>
      <text x="700" y="240" font-size="11" fill="#475569">&#9679; Negative face (autonomy)</text>
      <text x="700" y="275" font-size="10" font-style="italic" fill="#64748b">Properties:</text>
      <text x="700" y="295" font-size="10" fill="#475569">Individual-centered</text>
      <text x="700" y="315" font-size="10" fill="#475569">Situational (not systemic)</text>
      <text x="700" y="335" font-size="10" fill="#475569">Recoverable after loss</text>
      <text x="700" y="355" font-size="10" fill="#475569">No moral/social split</text>

      <text x="700" y="390" font-size="10" font-style="italic" fill="#64748b">Expressions:</text>
      <text x="700" y="410" font-size="10" fill="#475569">"save face"</text>
      <text x="700" y="430" font-size="10" fill="#475569">"lose face" (borrowed</text>
      <text x="700" y="445" font-size="10" fill="#475569"> from Chinese!)</text>

      <!-- English insight box -->
      <rect x="650" y="470" width="320" height="45" rx="8" fill="#f0f9ff" stroke="#0ea5e9" stroke-width="1"/>
      <text x="810" y="490" text-anchor="middle" font-size="10" font-weight="600" fill="#0369a1">Brown &amp; Levinson (1987): positive/negative face</text>
      <text x="810" y="505" text-anchor="middle" font-size="10" fill="#0369a1">Maps approval vs. autonomy -- NOT morality vs. status</text>

      <!-- Bottom comparison -->
      <rect x="50" y="600" width="900" height="60" rx="10" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
      <text x="500" y="622" text-anchor="middle" font-size="12" font-weight="600" fill="#334155">PATTERN: Chinese encodes TWO independent social evaluation axes with distinct lexemes.</text>
      <text x="500" y="642" text-anchor="middle" font-size="12" fill="#334155">English collapses them into ONE concept. The mianzi/lian distinction has no structural English parallel.</text>
    </svg>
  </div>
  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background:#6366f1;"></div>Mianzi (social prestige)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#ef4444;"></div>Lian (moral integrity)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#7c3aed;"></div>Overlap zone</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#64748b;"></div>English "face" (unified)</div>
  </div>
  <figcaption>
    <strong>Figure 1: The Dual Face System -- Mianzi vs. Lian</strong>
    <span>Chinese splits social evaluation into two independent dimensions (social prestige and moral integrity) where English uses a single concept. The English expression "lose face" was itself borrowed from Chinese in the 19th century. Based on Hu (1944), Goffman (1967), and Ho (1976).</span>
  </figcaption>
</figure>
</body>
</html>
