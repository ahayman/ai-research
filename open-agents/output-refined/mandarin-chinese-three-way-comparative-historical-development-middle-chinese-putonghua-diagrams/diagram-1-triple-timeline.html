<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Triple Timeline: Middle Chinese to Modern Standards</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 1.5rem;
  }
  figure {
    background: #1e293b;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.3);
    padding: 2rem;
    max-width: 1150px;
    width: 100%;
    border: 1px solid #334155;
  }
  figcaption {
    text-align: center;
    margin-top: 1.25rem;
    padding-top: 1rem;
    border-top: 1px solid #334155;
  }
  figcaption strong { display: block; font-size: 1.05rem; color: #e2e8f0; margin-bottom: 0.3rem; }
  figcaption span { font-size: 0.85rem; color: #94a3b8; line-height: 1.5; }
  svg { max-width: 100%; height: auto; }
  .legend {
    display: flex; justify-content: center; gap: 1.5rem; margin-top: 0.75rem; flex-wrap: wrap;
  }
  .legend-item { display: flex; align-items: center; gap: 0.4rem; font-size: 0.8rem; color: #94a3b8; }
  .legend-swatch { width: 14px; height: 14px; border-radius: 3px; }
</style>
</head>
<body>
<figure>
  <svg viewBox="0 0 1100 720" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
    <defs>
      <filter id="glow">
        <feGaussianBlur stdDeviation="2" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>

    <!-- Title -->
    <text x="550" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#e2e8f0">Triple Timeline: From Middle Chinese to Modern Standards</text>
    <text x="550" y="50" text-anchor="middle" font-size="12" fill="#94a3b8">Mandarin (most innovative) vs Cantonese (conservative) vs English (parallel track)</text>

    <!-- Time axis -->
    <line x1="70" y1="90" x2="1050" y2="90" stroke="#475569" stroke-width="1.5"/>
    <!-- Time labels -->
    <text x="90" y="82" text-anchor="middle" font-size="10" fill="#64748b">600 CE</text>
    <line x1="90" y1="86" x2="90" y2="94" stroke="#475569" stroke-width="1"/>
    <text x="230" y="82" text-anchor="middle" font-size="10" fill="#64748b">900</text>
    <line x1="230" y1="86" x2="230" y2="94" stroke="#475569" stroke-width="1"/>
    <text x="370" y="82" text-anchor="middle" font-size="10" fill="#64748b">1200</text>
    <line x1="370" y1="86" x2="370" y2="94" stroke="#475569" stroke-width="1"/>
    <text x="510" y="82" text-anchor="middle" font-size="10" fill="#64748b">1400</text>
    <line x1="510" y1="86" x2="510" y2="94" stroke="#475569" stroke-width="1"/>
    <text x="650" y="82" text-anchor="middle" font-size="10" fill="#64748b">1600</text>
    <line x1="650" y1="86" x2="650" y2="94" stroke="#475569" stroke-width="1"/>
    <text x="790" y="82" text-anchor="middle" font-size="10" fill="#64748b">1800</text>
    <line x1="790" y1="86" x2="790" y2="94" stroke="#475569" stroke-width="1"/>
    <text x="930" y="82" text-anchor="middle" font-size="10" fill="#64748b">1956</text>
    <line x1="930" y1="86" x2="930" y2="94" stroke="#475569" stroke-width="1"/>
    <text x="1030" y="82" text-anchor="middle" font-size="10" fill="#64748b">Now</text>
    <line x1="1030" y1="86" x2="1030" y2="94" stroke="#475569" stroke-width="1"/>

    <!-- ===== TRACK 1: MANDARIN (Cyan) ===== -->
    <text x="60" y="138" text-anchor="end" font-size="11" font-weight="700" fill="#06b6d4">Mandarin</text>
    <text x="60" y="152" text-anchor="end" font-size="9" fill="#0891b2">(Most innovative)</text>
    <line x1="70" y1="145" x2="1050" y2="145" stroke="#06b6d4" stroke-width="2.5" opacity="0.6"/>

    <!-- MC start -->
    <circle cx="90" cy="145" r="5" fill="#06b6d4" filter="url(#glow)"/>
    <text x="90" y="170" text-anchor="middle" font-size="9" fill="#06b6d4" font-weight="600">Middle Chinese</text>
    <text x="90" y="181" text-anchor="middle" font-size="8" fill="#64748b">Qieyun 601 CE</text>
    <text x="90" y="191" text-anchor="middle" font-size="8" fill="#64748b">8 tones, 36 initials</text>

    <!-- Entering tone loss -->
    <circle cx="320" cy="145" r="5" fill="#06b6d4"/>
    <rect x="265" y="198" width="110" height="42" rx="6" fill="#06b6d4" opacity="0.12" stroke="#06b6d4" stroke-width="1"/>
    <text x="320" y="213" text-anchor="middle" font-size="9" fill="#06b6d4" font-weight="600">Entering tone lost</text>
    <text x="320" y="226" text-anchor="middle" font-size="8" fill="#94a3b8">-p, -t, -k disappear</text>
    <line x1="320" y1="150" x2="320" y2="198" stroke="#06b6d4" stroke-width="1" stroke-dasharray="3,3"/>

    <!-- Voiced obstruent loss -->
    <circle cx="420" cy="145" r="4" fill="#06b6d4"/>
    <text x="420" y="170" text-anchor="middle" font-size="8" fill="#06b6d4">Voiced stops lost</text>
    <text x="420" y="180" text-anchor="middle" font-size="7" fill="#64748b">b,d,g → aspiration</text>

    <!-- Palatalization -->
    <circle cx="560" cy="145" r="4" fill="#06b6d4"/>
    <text x="560" y="170" text-anchor="middle" font-size="8" fill="#06b6d4">Palatalization</text>
    <text x="560" y="180" text-anchor="middle" font-size="7" fill="#64748b">k,kh → j,q,x</text>

    <!-- Final -m loss -->
    <circle cx="480" cy="145" r="4" fill="#06b6d4"/>
    <text x="480" y="196" text-anchor="middle" font-size="8" fill="#06b6d4">-m → -n merger</text>

    <!-- Guanhua period -->
    <rect x="630" y="132" width="90" height="26" rx="5" fill="#06b6d4" opacity="0.15" stroke="#06b6d4" stroke-width="1"/>
    <text x="675" y="149" text-anchor="middle" font-size="9" fill="#06b6d4" font-weight="600">Guanhua</text>
    <text x="675" y="170" text-anchor="middle" font-size="7" fill="#64748b">Nanjing-based</text>

    <!-- Beijing shift -->
    <rect x="760" y="132" width="80" height="26" rx="5" fill="#06b6d4" opacity="0.15" stroke="#06b6d4" stroke-width="1"/>
    <text x="800" y="149" text-anchor="middle" font-size="9" fill="#06b6d4" font-weight="600">Beijing base</text>

    <!-- Putonghua -->
    <rect x="910" y="125" width="130" height="40" rx="8" fill="#06b6d4" opacity="0.2" stroke="#06b6d4" stroke-width="1.5"/>
    <text x="975" y="143" text-anchor="middle" font-size="10" fill="#06b6d4" font-weight="700">Putonghua</text>
    <text x="975" y="157" text-anchor="middle" font-size="8" fill="#94a3b8">4 tones, 21 initials</text>

    <!-- Arrow showing reduction -->
    <text x="550" y="130" text-anchor="middle" font-size="9" fill="#475569" font-style="italic">Sound inventory shrinks: 8 tones → 4 tones | 36 initials → 21 | 200+ finals → 35</text>

    <!-- ===== TRACK 2: CANTONESE (Gold) ===== -->
    <text x="60" y="288" text-anchor="end" font-size="11" font-weight="700" fill="#eab308">Cantonese</text>
    <text x="60" y="302" text-anchor="end" font-size="9" fill="#a16207">(Conservative)</text>
    <line x1="70" y1="295" x2="1050" y2="295" stroke="#eab308" stroke-width="2.5" opacity="0.6"/>

    <!-- MC start -->
    <circle cx="90" cy="295" r="5" fill="#eab308" filter="url(#glow)"/>
    <text x="90" y="320" text-anchor="middle" font-size="9" fill="#eab308" font-weight="600">Same ancestor</text>
    <text x="90" y="331" text-anchor="middle" font-size="8" fill="#64748b">Middle Chinese</text>

    <!-- Cantonese preservations -->
    <rect x="280" y="282" width="140" height="26" rx="5" fill="#eab308" opacity="0.12" stroke="#eab308" stroke-width="1"/>
    <text x="350" y="299" text-anchor="middle" font-size="9" fill="#eab308" font-weight="600">Entering tone PRESERVED</text>
    <text x="350" y="321" text-anchor="middle" font-size="8" fill="#94a3b8">-p, -t, -k retained</text>

    <rect x="460" y="282" width="120" height="26" rx="5" fill="#eab308" opacity="0.12" stroke="#eab308" stroke-width="1"/>
    <text x="520" y="299" text-anchor="middle" font-size="9" fill="#eab308" font-weight="600">Final -m PRESERVED</text>

    <rect x="620" y="282" width="110" height="26" rx="5" fill="#eab308" opacity="0.12" stroke="#eab308" stroke-width="1"/>
    <text x="675" y="299" text-anchor="middle" font-size="9" fill="#eab308" font-weight="600">6-9 tones retained</text>

    <!-- Modern Cantonese -->
    <rect x="910" y="275" width="130" height="40" rx="8" fill="#eab308" opacity="0.15" stroke="#eab308" stroke-width="1.5"/>
    <text x="975" y="293" text-anchor="middle" font-size="10" fill="#eab308" font-weight="700">Modern Cantonese</text>
    <text x="975" y="307" text-anchor="middle" font-size="8" fill="#94a3b8">6-9 tones, -p -t -k -m</text>

    <text x="550" y="274" text-anchor="middle" font-size="9" fill="#475569" font-style="italic">Sound inventory largely preserved from Middle Chinese</text>

    <!-- Connecting bracket showing "same start, different outcomes" -->
    <line x1="85" y1="155" x2="85" y2="285" stroke="#475569" stroke-width="1" stroke-dasharray="4,4"/>
    <text x="78" y="220" text-anchor="end" font-size="8" fill="#475569" transform="rotate(-90 78 220)">Same ancestor</text>

    <!-- ===== TRACK 3: ENGLISH (Rose) ===== -->
    <text x="60" y="418" text-anchor="end" font-size="11" font-weight="700" fill="#f43f5e">English</text>
    <text x="60" y="432" text-anchor="end" font-size="9" fill="#be123c">(Parallel track)</text>
    <line x1="70" y1="425" x2="1050" y2="425" stroke="#f43f5e" stroke-width="2.5" opacity="0.6"/>

    <!-- Old English -->
    <circle cx="90" cy="425" r="5" fill="#f43f5e" filter="url(#glow)"/>
    <text x="90" y="450" text-anchor="middle" font-size="9" fill="#f43f5e" font-weight="600">Old English</text>
    <text x="90" y="461" text-anchor="middle" font-size="8" fill="#64748b">~450-1100 CE</text>
    <text x="90" y="471" text-anchor="middle" font-size="8" fill="#64748b">Case system, V2</text>

    <!-- Norman Conquest -->
    <circle cx="280" cy="425" r="5" fill="#f43f5e"/>
    <rect x="228" y="478" width="104" height="36" rx="6" fill="#f43f5e" opacity="0.12" stroke="#f43f5e" stroke-width="1"/>
    <text x="280" y="493" text-anchor="middle" font-size="9" fill="#f43f5e" font-weight="600">Norman Conquest</text>
    <text x="280" y="505" text-anchor="middle" font-size="8" fill="#94a3b8">1066 — French layer</text>
    <line x1="280" y1="430" x2="280" y2="478" stroke="#f43f5e" stroke-width="1" stroke-dasharray="3,3"/>

    <!-- Case loss -->
    <circle cx="370" cy="425" r="4" fill="#f43f5e"/>
    <text x="370" y="450" text-anchor="middle" font-size="8" fill="#f43f5e">Case system lost</text>
    <text x="370" y="460" text-anchor="middle" font-size="7" fill="#64748b">→ SVO word order</text>

    <!-- Great Vowel Shift -->
    <circle cx="530" cy="425" r="5" fill="#f43f5e"/>
    <rect x="472" y="478" width="116" height="42" rx="6" fill="#f43f5e" opacity="0.12" stroke="#f43f5e" stroke-width="1"/>
    <text x="530" y="493" text-anchor="middle" font-size="9" fill="#f43f5e" font-weight="600">Great Vowel Shift</text>
    <text x="530" y="505" text-anchor="middle" font-size="8" fill="#94a3b8">~1400-1700</text>
    <text x="530" y="516" text-anchor="middle" font-size="8" fill="#94a3b8">Spelling frozen</text>
    <line x1="530" y1="430" x2="530" y2="478" stroke="#f43f5e" stroke-width="1" stroke-dasharray="3,3"/>

    <!-- Printing press -->
    <circle cx="610" cy="425" r="4" fill="#f43f5e"/>
    <text x="610" y="450" text-anchor="middle" font-size="8" fill="#f43f5e">Caxton 1476</text>
    <text x="610" y="460" text-anchor="middle" font-size="7" fill="#64748b">Printing begins</text>

    <!-- Johnson -->
    <circle cx="730" cy="425" r="4" fill="#f43f5e"/>
    <text x="730" y="450" text-anchor="middle" font-size="8" fill="#f43f5e">Johnson 1755</text>
    <text x="730" y="460" text-anchor="middle" font-size="7" fill="#64748b">Dictionary</text>

    <!-- Modern English -->
    <rect x="910" y="405" width="130" height="40" rx="8" fill="#f43f5e" opacity="0.15" stroke="#f43f5e" stroke-width="1.5"/>
    <text x="975" y="423" text-anchor="middle" font-size="10" fill="#f43f5e" font-weight="700">Modern English</text>
    <text x="975" y="437" text-anchor="middle" font-size="8" fill="#94a3b8">No single decree</text>

    <text x="550" y="406" text-anchor="middle" font-size="9" fill="#475569" font-style="italic">Gradual, decentralized standardization — no government decree</text>

    <!-- ===== KEY COMPARISON BOX ===== -->
    <rect x="120" y="550" width="860" height="140" rx="12" fill="#0f172a" stroke="#334155" stroke-width="1.5"/>
    <text x="550" y="575" text-anchor="middle" font-size="13" font-weight="700" fill="#e2e8f0">The Key Contrast</text>

    <!-- Mandarin column -->
    <rect x="140" y="590" width="250" height="85" rx="8" fill="#06b6d4" opacity="0.08" stroke="#06b6d4" stroke-width="1"/>
    <text x="265" y="610" text-anchor="middle" font-size="11" font-weight="700" fill="#06b6d4">Mandarin</text>
    <text x="265" y="628" text-anchor="middle" font-size="9" fill="#94a3b8">MOST changed from ancestor</text>
    <text x="265" y="643" text-anchor="middle" font-size="9" fill="#94a3b8">Lost entering tone, -m, voiced stops</text>
    <text x="265" y="658" text-anchor="middle" font-size="9" fill="#94a3b8">Standard by government decree</text>

    <!-- Cantonese column -->
    <rect x="420" y="590" width="250" height="85" rx="8" fill="#eab308" opacity="0.08" stroke="#eab308" stroke-width="1"/>
    <text x="545" y="610" text-anchor="middle" font-size="11" font-weight="700" fill="#eab308">Cantonese</text>
    <text x="545" y="628" text-anchor="middle" font-size="9" fill="#94a3b8">LEAST changed from ancestor</text>
    <text x="545" y="643" text-anchor="middle" font-size="9" fill="#94a3b8">Preserves -p -t -k -m, 6-9 tones</text>
    <text x="545" y="658" text-anchor="middle" font-size="9" fill="#94a3b8">Standard = more conservative</text>

    <!-- English column -->
    <rect x="700" y="590" width="260" height="85" rx="8" fill="#f43f5e" opacity="0.08" stroke="#f43f5e" stroke-width="1"/>
    <text x="830" y="610" text-anchor="middle" font-size="11" font-weight="700" fill="#f43f5e">English</text>
    <text x="830" y="628" text-anchor="middle" font-size="9" fill="#94a3b8">Massive changes (GVS, case loss)</text>
    <text x="830" y="643" text-anchor="middle" font-size="9" fill="#94a3b8">Spelling preserves old pronunciations</text>
    <text x="830" y="658" text-anchor="middle" font-size="9" fill="#94a3b8">Standard by market forces, not decree</text>
  </svg>

  <figcaption>
    <strong>Figure 1: Triple Timeline -- Sound Change and Standardization Paths</strong>
    <span>Mandarin is the MOST innovative Chinese variety, having lost more Middle Chinese features than any other dialect group. The "standard" was chosen for political reasons (northern capital), not linguistic conservatism. English underwent analogous upheavals but standardized through organic market forces rather than government decree.</span>
  </figcaption>

  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background:#06b6d4;"></div> Mandarin / Putonghua</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#eab308;"></div> Cantonese (conservative reference)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#f43f5e;"></div> English (parallel track)</div>
  </div>
</figure>
</body>
</html>
