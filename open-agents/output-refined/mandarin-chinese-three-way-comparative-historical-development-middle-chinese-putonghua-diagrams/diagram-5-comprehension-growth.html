<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Putonghua Comprehension Growth</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 1.5rem;
  }
  figure {
    background: #1e293b;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.3);
    padding: 2rem;
    max-width: 1050px;
    width: 100%;
    border: 1px solid #334155;
  }
  figcaption {
    text-align: center;
    margin-top: 1.25rem;
    padding-top: 1rem;
    border-top: 1px solid #334155;
  }
  figcaption strong { display: block; font-size: 1.05rem; color: #e2e8f0; margin-bottom: 0.3rem; }
  figcaption span { font-size: 0.85rem; color: #94a3b8; line-height: 1.5; }
  svg { max-width: 100%; height: auto; }
</style>
</head>
<body>
<figure>
  <svg viewBox="0 0 1000 600" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
    <defs>
      <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.3"/>
        <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.02"/>
      </linearGradient>
      <linearGradient id="engGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#f43f5e" stop-opacity="0.15"/>
        <stop offset="100%" stop-color="#f43f5e" stop-opacity="0.02"/>
      </linearGradient>
      <filter id="glow">
        <feGaussianBlur stdDeviation="2" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>

    <!-- Title -->
    <text x="500" y="28" text-anchor="middle" font-size="18" font-weight="700" fill="#e2e8f0">Putonghua Adoption: From Policy to Practice</text>
    <text x="500" y="46" text-anchor="middle" font-size="12" fill="#94a3b8">Self-reported comprehension rates alongside key policy milestones</text>

    <!-- Chart area -->
    <!-- Y axis -->
    <line x1="100" y1="80" x2="100" y2="460" stroke="#334155" stroke-width="1.5"/>
    <!-- X axis -->
    <line x1="100" y1="460" x2="920" y2="460" stroke="#334155" stroke-width="1.5"/>

    <!-- Y axis labels -->
    <text x="90" y="84" text-anchor="end" font-size="10" fill="#64748b">100%</text>
    <line x1="96" y1="80" x2="100" y2="80" stroke="#334155" stroke-width="1"/>
    <line x1="100" y1="80" x2="920" y2="80" stroke="#334155" stroke-width="0.5" stroke-dasharray="4,6" opacity="0.3"/>

    <text x="90" y="175" text-anchor="end" font-size="10" fill="#64748b">75%</text>
    <line x1="96" y1="171" x2="100" y2="171" stroke="#334155" stroke-width="1"/>
    <line x1="100" y1="171" x2="920" y2="171" stroke="#334155" stroke-width="0.5" stroke-dasharray="4,6" opacity="0.3"/>

    <text x="90" y="270" text-anchor="end" font-size="10" fill="#64748b">50%</text>
    <line x1="96" y1="266" x2="100" y2="266" stroke="#334155" stroke-width="1"/>
    <line x1="100" y1="266" x2="920" y2="266" stroke="#334155" stroke-width="0.5" stroke-dasharray="4,6" opacity="0.3"/>

    <text x="90" y="365" text-anchor="end" font-size="10" fill="#64748b">25%</text>
    <line x1="96" y1="361" x2="100" y2="361" stroke="#334155" stroke-width="1"/>
    <line x1="100" y1="361" x2="920" y2="361" stroke="#334155" stroke-width="0.5" stroke-dasharray="4,6" opacity="0.3"/>

    <text x="90" y="464" text-anchor="end" font-size="10" fill="#64748b">0%</text>

    <!-- X axis labels (years) -->
    <text x="140" y="480" text-anchor="middle" font-size="9" fill="#64748b">1956</text>
    <line x1="140" y1="456" x2="140" y2="464" stroke="#334155" stroke-width="1"/>

    <text x="250" y="480" text-anchor="middle" font-size="9" fill="#64748b">1965</text>
    <line x1="250" y1="456" x2="250" y2="464" stroke="#334155" stroke-width="1"/>

    <text x="400" y="480" text-anchor="middle" font-size="9" fill="#64748b">1982</text>
    <line x1="400" y1="456" x2="400" y2="464" stroke="#334155" stroke-width="1"/>

    <text x="510" y="480" text-anchor="middle" font-size="9" fill="#64748b">1994</text>
    <line x1="510" y1="456" x2="510" y2="464" stroke="#334155" stroke-width="1"/>

    <text x="590" y="480" text-anchor="middle" font-size="9" fill="#64748b">2000</text>
    <line x1="590" y1="456" x2="590" y2="464" stroke="#334155" stroke-width="1"/>

    <text x="700" y="480" text-anchor="middle" font-size="9" fill="#64748b">2010</text>
    <line x1="700" y1="456" x2="700" y2="464" stroke="#334155" stroke-width="1"/>

    <text x="810" y="480" text-anchor="middle" font-size="9" fill="#64748b">2020</text>
    <line x1="810" y1="456" x2="810" y2="464" stroke="#334155" stroke-width="1"/>

    <text x="890" y="480" text-anchor="middle" font-size="9" fill="#64748b">2025</text>
    <line x1="890" y1="456" x2="890" y2="464" stroke="#334155" stroke-width="1"/>

    <!-- ===== PUTONGHUA LINE ===== -->
    <!-- Area fill -->
    <path d="M140,255 L250,260 L400,262 L510,262 L590,262 L700,194 L810,153 L890,137 L890,460 L140,460 Z" fill="url(#areaGrad)"/>

    <!-- Main line -->
    <path d="M140,255 L250,260 L400,262 L510,262 L590,262 L700,194 L810,153 L890,137" fill="none" stroke="#06b6d4" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Data points -->
    <circle cx="250" cy="255" r="6" fill="#06b6d4" stroke="#1e293b" stroke-width="2" filter="url(#glow)"/>
    <text x="250" y="245" text-anchor="middle" font-size="11" font-weight="700" fill="#06b6d4">~54%</text>
    <text x="250" y="233" text-anchor="middle" font-size="8" fill="#64748b">1960s estimate</text>

    <circle cx="590" cy="262" r="6" fill="#06b6d4" stroke="#1e293b" stroke-width="2" filter="url(#glow)"/>
    <text x="590" y="252" text-anchor="middle" font-size="11" font-weight="700" fill="#06b6d4">53%</text>
    <text x="590" y="240" text-anchor="middle" font-size="8" fill="#64748b">2000 survey</text>

    <circle cx="700" cy="194" r="6" fill="#06b6d4" stroke="#1e293b" stroke-width="2" filter="url(#glow)"/>
    <text x="700" y="184" text-anchor="middle" font-size="11" font-weight="700" fill="#06b6d4">~70%</text>
    <text x="700" y="172" text-anchor="middle" font-size="8" fill="#64748b">2010</text>

    <circle cx="810" cy="153" r="7" fill="#06b6d4" stroke="#1e293b" stroke-width="2" filter="url(#glow)"/>
    <text x="810" y="140" text-anchor="middle" font-size="12" font-weight="700" fill="#06b6d4">80.7%</text>
    <text x="810" y="128" text-anchor="middle" font-size="8" fill="#64748b">2020 official</text>

    <!-- Target -->
    <circle cx="890" cy="137" r="5" fill="none" stroke="#10b981" stroke-width="2" stroke-dasharray="3,3"/>
    <text x="890" y="125" text-anchor="middle" font-size="10" font-weight="600" fill="#10b981">85%</text>
    <text x="890" y="113" text-anchor="middle" font-size="8" fill="#64748b">2025 target</text>

    <!-- ===== POLICY MILESTONE ANNOTATIONS ===== -->
    <!-- 1956 Definition -->
    <line x1="140" y1="80" x2="140" y2="460" stroke="#06b6d4" stroke-width="1" stroke-dasharray="4,4" opacity="0.3"/>
    <rect x="110" y="84" width="60" height="24" rx="4" fill="#06b6d4" opacity="0.15"/>
    <text x="140" y="100" text-anchor="middle" font-size="8" fill="#06b6d4" font-weight="600">Defined</text>

    <!-- 1958 Pinyin -->
    <line x1="170" y1="380" x2="170" y2="460" stroke="#eab308" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>
    <text x="170" y="374" text-anchor="middle" font-size="7" fill="#eab308">Pinyin</text>

    <!-- 1982 Constitution -->
    <line x1="400" y1="300" x2="400" y2="460" stroke="#8b5cf6" stroke-width="1" stroke-dasharray="4,4" opacity="0.3"/>
    <rect x="370" y="304" width="60" height="24" rx="4" fill="#8b5cf6" opacity="0.15"/>
    <text x="400" y="320" text-anchor="middle" font-size="8" fill="#a78bfa" font-weight="600">Art. 19</text>

    <!-- 1994 PSC Test -->
    <line x1="510" y1="320" x2="510" y2="460" stroke="#f59e0b" stroke-width="1" stroke-dasharray="3,3" opacity="0.3"/>
    <text x="510" y="316" text-anchor="middle" font-size="7" fill="#f59e0b">PSC test</text>

    <!-- 2000 Language Law -->
    <line x1="590" y1="200" x2="590" y2="255" stroke="#8b5cf6" stroke-width="1" stroke-dasharray="4,4" opacity="0.3"/>
    <rect x="556" y="200" width="68" height="24" rx="4" fill="#8b5cf6" opacity="0.15"/>
    <text x="590" y="216" text-anchor="middle" font-size="8" fill="#a78bfa" font-weight="600">Lang. Law</text>

    <!-- ===== ENGLISH COMPARISON LINE (small, subdued) ===== -->
    <path d="M100,350 L250,330 L400,305 L510,280 L590,260 L700,240 L810,225 L920,220" fill="none" stroke="#f43f5e" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.5"/>
    <text x="920" y="215" font-size="8" fill="#f43f5e" opacity="0.7">English std.</text>
    <text x="920" y="227" font-size="7" fill="#64748b" opacity="0.7">(very approximate)</text>

    <!-- ===== ANNOTATION: Stagnation period ===== -->
    <rect x="270" y="280" width="280" height="38" rx="6" fill="#f59e0b" opacity="0.06" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4,3"/>
    <text x="410" y="296" text-anchor="middle" font-size="9" fill="#f59e0b" font-weight="600">Stagnation: Cultural Revolution disruption</text>
    <text x="410" y="310" text-anchor="middle" font-size="8" fill="#64748b">Comprehension flat at ~53% for decades</text>

    <!-- ===== ANNOTATION: Acceleration ===== -->
    <rect x="625" y="152" width="155" height="38" rx="6" fill="#10b981" opacity="0.06" stroke="#10b981" stroke-width="1"/>
    <text x="703" y="168" text-anchor="middle" font-size="9" fill="#10b981" font-weight="600">Acceleration: Urbanization +</text>
    <text x="703" y="182" text-anchor="middle" font-size="8" fill="#64748b">Internet + media + economic incentive</text>

    <!-- ===== LEGEND ===== -->
    <rect x="120" y="500" width="780" height="55" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <text x="140" y="520" font-size="10" font-weight="600" fill="#64748b">Key drivers:</text>
    <rect x="220" y="510" width="8" height="8" rx="2" fill="#06b6d4"/>
    <text x="234" y="519" font-size="9" fill="#94a3b8">Education mandate</text>
    <rect x="340" y="510" width="8" height="8" rx="2" fill="#eab308"/>
    <text x="354" y="519" font-size="9" fill="#94a3b8">Media dominance</text>
    <rect x="460" y="510" width="8" height="8" rx="2" fill="#10b981"/>
    <text x="474" y="519" font-size="9" fill="#94a3b8">Urbanization/migration</text>
    <rect x="620" y="510" width="8" height="8" rx="2" fill="#8b5cf6"/>
    <text x="634" y="519" font-size="9" fill="#94a3b8">Internet/digital ecosystem</text>
    <text x="140" y="543" font-size="9" fill="#64748b" font-style="italic">Note: Self-reported survey data; actual functional fluency may be lower, especially in rural south/west</text>
  </svg>

  <figcaption>
    <strong>Figure 5: Putonghua Comprehension Growth -- 54% to 80%+ in Seven Decades</strong>
    <span>Comprehension stagnated for decades (disrupted by the Cultural Revolution), then accelerated dramatically after 2000 as urbanization, internet penetration, and media exposure created overwhelming practical incentives for Putonghua fluency. English standardization, shown as a rough comparison, took roughly 500 years without any single government mandate.</span>
  </figcaption>
</figure>
</body>
</html>
