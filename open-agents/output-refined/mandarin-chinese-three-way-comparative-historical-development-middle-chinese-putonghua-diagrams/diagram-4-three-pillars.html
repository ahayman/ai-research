<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Three Pillars of Putonghua</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 1.5rem;
  }
  figure {
    background: #1e293b;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.3);
    padding: 2rem;
    max-width: 1050px;
    width: 100%;
    border: 1px solid #334155;
  }
  figcaption {
    text-align: center;
    margin-top: 1.25rem;
    padding-top: 1rem;
    border-top: 1px solid #334155;
  }
  figcaption strong { display: block; font-size: 1.05rem; color: #e2e8f0; margin-bottom: 0.3rem; }
  figcaption span { font-size: 0.85rem; color: #94a3b8; line-height: 1.5; }
  svg { max-width: 100%; height: auto; }
</style>
</head>
<body>
<figure>
  <svg viewBox="0 0 1000 700" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
    <defs>
      <filter id="shadow">
        <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
      </filter>
      <linearGradient id="roofGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#06b6d4"/>
        <stop offset="100%" stop-color="#0891b2"/>
      </linearGradient>
    </defs>

    <!-- Title -->
    <text x="500" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#e2e8f0">The Three Pillars of Putonghua (1956 Definition)</text>
    <text x="500" y="50" text-anchor="middle" font-size="12" fill="#94a3b8">State Council directive: a tripartite standard from three distinct sources</text>

    <!-- ===== ROOF / ARCHITRAVE: PUTONGHUA ===== -->
    <polygon points="100,100 500,55 900,100" fill="url(#roofGrad)" opacity="0.2" stroke="#06b6d4" stroke-width="2"/>
    <rect x="200" y="100" width="600" height="55" rx="0" fill="#06b6d4" opacity="0.15" stroke="#06b6d4" stroke-width="2" filter="url(#shadow)"/>
    <text x="500" y="122" text-anchor="middle" font-size="20" font-weight="800" fill="#06b6d4">普通话  PUTONGHUA</text>
    <text x="500" y="143" text-anchor="middle" font-size="11" fill="#94a3b8">"Common Speech" -- defined February 6, 1956</text>

    <!-- Connection lines from architrave to pillars -->
    <line x1="270" y1="155" x2="270" y2="175" stroke="#06b6d4" stroke-width="2"/>
    <line x1="500" y1="155" x2="500" y2="175" stroke="#eab308" stroke-width="2"/>
    <line x1="730" y1="155" x2="730" y2="175" stroke="#10b981" stroke-width="2"/>

    <!-- ===== PILLAR 1: Beijing Phonology ===== -->
    <rect x="160" y="175" width="220" height="340" rx="10" fill="#0f172a" stroke="#06b6d4" stroke-width="2"/>
    <!-- Pillar header -->
    <rect x="160" y="175" width="220" height="50" rx="10" fill="#06b6d4" opacity="0.2"/>
    <rect x="160" y="205" width="220" height="20" rx="0" fill="#06b6d4" opacity="0.2"/>
    <text x="270" y="198" text-anchor="middle" font-size="14" font-weight="700" fill="#06b6d4">PILLAR 1</text>
    <text x="270" y="218" text-anchor="middle" font-size="11" fill="#22d3ee">Beijing Phonology</text>
    <text x="270" y="233" text-anchor="middle" font-size="10" fill="#94a3b8">北京语音为标准音</text>

    <!-- Includes -->
    <text x="175" y="260" font-size="10" font-weight="600" fill="#22d3ee">INCLUDES:</text>
    <text x="175" y="278" font-size="9" fill="#e2e8f0">4-tone system</text>
    <text x="175" y="294" font-size="9" fill="#e2e8f0">21 initials (incl. zh, ch, sh, r)</text>
    <text x="175" y="310" font-size="9" fill="#e2e8f0">35 finals</text>
    <text x="175" y="326" font-size="9" fill="#e2e8f0">Standard tone values</text>
    <text x="175" y="342" font-size="9" fill="#e2e8f0">Tone sandhi rules</text>

    <!-- Excludes -->
    <text x="175" y="370" font-size="10" font-weight="600" fill="#f43f5e">EXCLUDES:</text>
    <text x="175" y="388" font-size="9" fill="#94a3b8">Heavy Beijing erhua</text>
    <text x="175" y="404" font-size="9" fill="#94a3b8">Beijing slang (e.g., 倍儿)</text>
    <text x="175" y="420" font-size="9" fill="#94a3b8">Beijing-specific vowel shifts</text>
    <text x="175" y="436" font-size="9" fill="#94a3b8">Casual Beijing contractions</text>

    <!-- Key insight -->
    <rect x="170" y="450" width="200" height="50" rx="6" fill="#06b6d4" opacity="0.08" stroke="#06b6d4" stroke-width="1" stroke-dasharray="4,3"/>
    <text x="270" y="470" text-anchor="middle" font-size="8.5" fill="#06b6d4" font-weight="600">KEY INSIGHT:</text>
    <text x="270" y="484" text-anchor="middle" font-size="8" fill="#94a3b8">Beijing phonology ≠ Beijing dialect</text>
    <text x="270" y="496" text-anchor="middle" font-size="8" fill="#94a3b8">Putonghua is an idealized version</text>

    <!-- ===== PILLAR 2: Northern Dialect Base ===== -->
    <rect x="390" y="175" width="220" height="340" rx="10" fill="#0f172a" stroke="#eab308" stroke-width="2"/>
    <rect x="390" y="175" width="220" height="50" rx="10" fill="#eab308" opacity="0.15"/>
    <rect x="390" y="205" width="220" height="20" rx="0" fill="#eab308" opacity="0.15"/>
    <text x="500" y="198" text-anchor="middle" font-size="14" font-weight="700" fill="#eab308">PILLAR 2</text>
    <text x="500" y="218" text-anchor="middle" font-size="11" fill="#fbbf24">Northern Dialect Base</text>
    <text x="500" y="233" text-anchor="middle" font-size="10" fill="#94a3b8">北方话为基础方言</text>

    <text x="405" y="260" font-size="10" font-weight="600" fill="#fbbf24">INCLUDES:</text>
    <text x="405" y="278" font-size="9" fill="#e2e8f0">Core vocabulary from northern group</text>
    <text x="405" y="294" font-size="9" fill="#e2e8f0">SVO word order patterns</text>
    <text x="405" y="310" font-size="9" fill="#e2e8f0">Aspect markers (了, 着, 过)</text>
    <text x="405" y="326" font-size="9" fill="#e2e8f0">Complement constructions</text>
    <text x="405" y="342" font-size="9" fill="#e2e8f0">把/被 constructions</text>

    <text x="405" y="370" font-size="10" font-weight="600" fill="#f43f5e">EXCLUDES:</text>
    <text x="405" y="388" font-size="9" fill="#94a3b8">Cantonese grammar patterns</text>
    <text x="405" y="404" font-size="9" fill="#94a3b8">Wu/Min/Hakka structures</text>
    <text x="405" y="420" font-size="9" fill="#94a3b8">Southern vocabulary</text>
    <text x="405" y="436" font-size="9" fill="#94a3b8">Regional-specific particles</text>

    <rect x="400" y="450" width="200" height="50" rx="6" fill="#eab308" opacity="0.08" stroke="#eab308" stroke-width="1" stroke-dasharray="4,3"/>
    <text x="500" y="470" text-anchor="middle" font-size="8.5" fill="#eab308" font-weight="600">KEY INSIGHT:</text>
    <text x="500" y="484" text-anchor="middle" font-size="8" fill="#94a3b8">~800M speakers form the base</text>
    <text x="500" y="496" text-anchor="middle" font-size="8" fill="#94a3b8">Broader than just Beijing grammar</text>

    <!-- ===== PILLAR 3: Vernacular Literary Norms ===== -->
    <rect x="620" y="175" width="220" height="340" rx="10" fill="#0f172a" stroke="#10b981" stroke-width="2"/>
    <rect x="620" y="175" width="220" height="50" rx="10" fill="#10b981" opacity="0.15"/>
    <rect x="620" y="205" width="220" height="20" rx="0" fill="#10b981" opacity="0.15"/>
    <text x="730" y="198" text-anchor="middle" font-size="14" font-weight="700" fill="#10b981">PILLAR 3</text>
    <text x="730" y="218" text-anchor="middle" font-size="11" fill="#34d399">Literary Norms</text>
    <text x="730" y="233" text-anchor="middle" font-size="10" fill="#94a3b8">典范的现代白话文著作</text>

    <text x="635" y="260" font-size="10" font-weight="600" fill="#34d399">INCLUDES:</text>
    <text x="635" y="278" font-size="9" fill="#e2e8f0">Lu Xun, Mao Dun, Lao She</text>
    <text x="635" y="294" font-size="9" fill="#e2e8f0">Modern vernacular grammar</text>
    <text x="635" y="310" font-size="9" fill="#e2e8f0">Formal register patterns</text>
    <text x="635" y="326" font-size="9" fill="#e2e8f0">Stable written reference</text>
    <text x="635" y="342" font-size="9" fill="#e2e8f0">Resolves spoken ambiguity</text>

    <text x="635" y="370" font-size="10" font-weight="600" fill="#f43f5e">EXCLUDES:</text>
    <text x="635" y="388" font-size="9" fill="#94a3b8">Classical Chinese (文言文)</text>
    <text x="635" y="404" font-size="9" fill="#94a3b8">Internet slang / neologisms</text>
    <text x="635" y="420" font-size="9" fill="#94a3b8">Casual spoken-only forms</text>
    <text x="635" y="436" font-size="9" fill="#94a3b8">Emerging colloquialisms</text>

    <rect x="630" y="450" width="200" height="50" rx="6" fill="#10b981" opacity="0.08" stroke="#10b981" stroke-width="1" stroke-dasharray="4,3"/>
    <text x="730" y="470" text-anchor="middle" font-size="8.5" fill="#10b981" font-weight="600">KEY INSIGHT:</text>
    <text x="730" y="484" text-anchor="middle" font-size="8" fill="#94a3b8">Written norms override spoken</text>
    <text x="730" y="496" text-anchor="middle" font-size="8" fill="#94a3b8">when Beijing speech drifts</text>

    <!-- ===== FOUNDATION / BASE ===== -->
    <rect x="160" y="515" width="680" height="3" rx="1" fill="#475569"/>

    <!-- ===== WHY THREE PILLARS BOX ===== -->
    <rect x="120" y="540" width="760" height="65" rx="10" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <text x="500" y="562" text-anchor="middle" font-size="12" font-weight="700" fill="#e2e8f0">Why Three Pillars?</text>
    <text x="500" y="580" text-anchor="middle" font-size="9" fill="#94a3b8">Beijing dialect alone would include slang and heavy erhua. Northern dialects alone would be too vague.</text>
    <text x="500" y="594" text-anchor="middle" font-size="9" fill="#94a3b8">Literary norms alone would be a written-only standard. Each pillar compensates for the others' weaknesses.</text>

    <!-- ===== ENGLISH COMPARISON (small) ===== -->
    <rect x="120" y="620" width="760" height="55" rx="10" fill="#f43f5e" opacity="0.05" stroke="#f43f5e" stroke-width="1"/>
    <text x="130" y="640" font-size="10" font-weight="600" fill="#f43f5e">English comparison:</text>
    <text x="130" y="655" font-size="9" fill="#94a3b8">No equivalent tripartite definition exists for English. No government body has ever defined "Standard English"</text>
    <text x="130" y="668" font-size="9" fill="#94a3b8">in a single document. The closest analogs (BBC pronunciation, Oxford usage, AP style) are advisory, not law.</text>
  </svg>

  <figcaption>
    <strong>Figure 4: The Three Pillars of Putonghua</strong>
    <span>The 1956 State Council definition is a masterpiece of language engineering: Beijing phonology provides the sound system, northern dialects provide the grammatical base, and exemplary modern literature provides the normative reference. Each pillar addresses a limitation the others cannot solve alone. No equivalent formal definition exists for English.</span>
  </figcaption>
</figure>
</body>
</html>
