<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Putonghua Standardization Milestones</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 1.5rem;
  }
  figure {
    background: #1e293b;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.3);
    padding: 2rem;
    max-width: 1100px;
    width: 100%;
    border: 1px solid #334155;
  }
  figcaption {
    text-align: center;
    margin-top: 1.25rem;
    padding-top: 1rem;
    border-top: 1px solid #334155;
  }
  figcaption strong { display: block; font-size: 1.05rem; color: #e2e8f0; margin-bottom: 0.3rem; }
  figcaption span { font-size: 0.85rem; color: #94a3b8; line-height: 1.5; }
  svg { max-width: 100%; height: auto; }
</style>
</head>
<body>
<figure>
  <svg viewBox="0 0 1060 680" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
    <defs>
      <filter id="glow">
        <feGaussianBlur stdDeviation="3" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <linearGradient id="timelineGrad" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.3"/>
        <stop offset="50%" stop-color="#06b6d4" stop-opacity="0.8"/>
        <stop offset="100%" stop-color="#06b6d4" stop-opacity="1"/>
      </linearGradient>
    </defs>

    <!-- Title -->
    <text x="530" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#e2e8f0">Putonghua Standardization: 100 Years of Milestones</text>
    <text x="530" y="48" text-anchor="middle" font-size="12" fill="#94a3b8">From the 1913 Pronunciation Conference to nationwide adoption</text>

    <!-- Main timeline axis -->
    <line x1="80" y1="340" x2="1000" y2="340" stroke="url(#timelineGrad)" stroke-width="3"/>
    <!-- Arrow head -->
    <polygon points="1000,340 990,335 990,345" fill="#06b6d4"/>

    <!-- ===== ERA BACKGROUNDS ===== -->
    <!-- Republic era -->
    <rect x="80" y="80" width="310" height="500" rx="0" fill="#06b6d4" opacity="0.03"/>
    <text x="235" y="600" text-anchor="middle" font-size="10" fill="#475569" font-weight="600">REPUBLIC ERA (ROC)</text>

    <!-- PRC era -->
    <rect x="470" y="80" width="530" height="500" rx="0" fill="#06b6d4" opacity="0.06"/>
    <text x="735" y="600" text-anchor="middle" font-size="10" fill="#475569" font-weight="600">PRC ERA</text>

    <!-- Dividing line -->
    <line x1="470" y1="80" x2="470" y2="580" stroke="#334155" stroke-width="1" stroke-dasharray="6,4"/>
    <text x="470" y="618" text-anchor="middle" font-size="10" fill="#64748b">1949 Split</text>

    <!-- ===== MILESTONE 1: 1913 Conference ===== -->
    <circle cx="120" cy="340" r="8" fill="#06b6d4" stroke="#0f172a" stroke-width="2" filter="url(#glow)"/>
    <line x1="120" y1="332" x2="120" y2="120" stroke="#06b6d4" stroke-width="1" opacity="0.5"/>
    <rect x="60" y="95" width="120" height="76" rx="8" fill="#0f172a" stroke="#06b6d4" stroke-width="1"/>
    <text x="120" y="113" text-anchor="middle" font-size="12" font-weight="700" fill="#06b6d4">1913</text>
    <text x="120" y="128" text-anchor="middle" font-size="8.5" fill="#e2e8f0">Pronunciation</text>
    <text x="120" y="140" text-anchor="middle" font-size="8.5" fill="#e2e8f0">Conference</text>
    <text x="120" y="155" text-anchor="middle" font-size="7.5" fill="#64748b">"Old National Pron."</text>
    <text x="120" y="165" text-anchor="middle" font-size="7.5" fill="#64748b">Hybrid Nanjing+Beijing</text>

    <!-- ===== MILESTONE 2: 1918 Zhuyin ===== -->
    <circle cx="190" cy="340" r="6" fill="#eab308" stroke="#0f172a" stroke-width="2"/>
    <line x1="190" y1="348" x2="190" y2="420" stroke="#eab308" stroke-width="1" opacity="0.5"/>
    <rect x="140" y="420" width="100" height="60" rx="8" fill="#0f172a" stroke="#eab308" stroke-width="1"/>
    <text x="190" y="438" text-anchor="middle" font-size="12" font-weight="700" fill="#eab308">1918</text>
    <text x="190" y="452" text-anchor="middle" font-size="8.5" fill="#e2e8f0">Zhuyin Fuhao</text>
    <text x="190" y="464" text-anchor="middle" font-size="8.5" fill="#e2e8f0">BoPoMoFo</text>
    <text x="190" y="476" text-anchor="middle" font-size="7.5" fill="#64748b">Phonetic notation</text>

    <!-- ===== MILESTONE 3: 1932 New National Pron ===== -->
    <circle cx="290" cy="340" r="8" fill="#06b6d4" stroke="#0f172a" stroke-width="2" filter="url(#glow)"/>
    <line x1="290" y1="332" x2="290" y2="190" stroke="#06b6d4" stroke-width="1" opacity="0.5"/>
    <rect x="226" y="148" width="128" height="76" rx="8" fill="#0f172a" stroke="#06b6d4" stroke-width="1.5"/>
    <text x="290" y="168" text-anchor="middle" font-size="12" font-weight="700" fill="#06b6d4">1932</text>
    <text x="290" y="183" text-anchor="middle" font-size="8.5" fill="#e2e8f0">"New National Pron."</text>
    <text x="290" y="197" text-anchor="middle" font-size="9" fill="#06b6d4" font-weight="600">Beijing base adopted</text>
    <text x="290" y="210" text-anchor="middle" font-size="7.5" fill="#64748b">Entering tone dropped</text>
    <text x="290" y="220" text-anchor="middle" font-size="7.5" fill="#64748b">Key pivot point</text>

    <!-- ===== MILESTONE 4: 1949 Split ===== -->
    <circle cx="470" cy="340" r="7" fill="#f43f5e" stroke="#0f172a" stroke-width="2"/>
    <line x1="470" y1="348" x2="470" y2="420" stroke="#f43f5e" stroke-width="1" opacity="0.5"/>
    <rect x="420" y="420" width="100" height="60" rx="8" fill="#0f172a" stroke="#f43f5e" stroke-width="1"/>
    <text x="470" y="438" text-anchor="middle" font-size="12" font-weight="700" fill="#f43f5e">1949</text>
    <text x="470" y="452" text-anchor="middle" font-size="8.5" fill="#e2e8f0">PRC/ROC Split</text>
    <text x="470" y="464" text-anchor="middle" font-size="7.5" fill="#64748b">Putonghua vs Guoyu</text>
    <text x="470" y="476" text-anchor="middle" font-size="7.5" fill="#64748b">Independent evolution</text>

    <!-- ===== MILESTONE 5: 1955-56 Definition ===== -->
    <circle cx="550" cy="340" r="10" fill="#06b6d4" stroke="#0f172a" stroke-width="3" filter="url(#glow)"/>
    <line x1="550" y1="330" x2="550" y2="110" stroke="#06b6d4" stroke-width="1.5" opacity="0.6"/>
    <rect x="484" y="86" width="132" height="92" rx="10" fill="#06b6d4" opacity="0.15" stroke="#06b6d4" stroke-width="2"/>
    <text x="550" y="106" text-anchor="middle" font-size="13" font-weight="800" fill="#06b6d4">1956</text>
    <text x="550" y="121" text-anchor="middle" font-size="9" fill="#e2e8f0" font-weight="600">Putonghua Defined</text>
    <text x="550" y="136" text-anchor="middle" font-size="7.5" fill="#94a3b8">Three Pillars:</text>
    <text x="550" y="148" text-anchor="middle" font-size="7.5" fill="#94a3b8">1. Beijing phonology</text>
    <text x="550" y="159" text-anchor="middle" font-size="7.5" fill="#94a3b8">2. Northern dialect base</text>
    <text x="550" y="170" text-anchor="middle" font-size="7.5" fill="#94a3b8">3. Literary norms</text>

    <!-- ===== MILESTONE 6: 1958 Pinyin ===== -->
    <circle cx="620" cy="340" r="6" fill="#eab308" stroke="#0f172a" stroke-width="2"/>
    <line x1="620" y1="348" x2="620" y2="420" stroke="#eab308" stroke-width="1" opacity="0.5"/>
    <rect x="572" y="420" width="96" height="55" rx="8" fill="#0f172a" stroke="#eab308" stroke-width="1"/>
    <text x="620" y="438" text-anchor="middle" font-size="12" font-weight="700" fill="#eab308">1958</text>
    <text x="620" y="452" text-anchor="middle" font-size="8.5" fill="#e2e8f0">Hanyu Pinyin</text>
    <text x="620" y="464" text-anchor="middle" font-size="7.5" fill="#64748b">Romanization adopted</text>
    <text x="620" y="474" text-anchor="middle" font-size="7.5" fill="#64748b">Teaching tool</text>

    <!-- ===== MILESTONE 7: 1982 Constitution ===== -->
    <circle cx="720" cy="340" r="7" fill="#06b6d4" stroke="#0f172a" stroke-width="2"/>
    <line x1="720" y1="332" x2="720" y2="230" stroke="#06b6d4" stroke-width="1" opacity="0.5"/>
    <rect x="668" y="198" width="104" height="60" rx="8" fill="#0f172a" stroke="#06b6d4" stroke-width="1"/>
    <text x="720" y="216" text-anchor="middle" font-size="12" font-weight="700" fill="#06b6d4">1982</text>
    <text x="720" y="231" text-anchor="middle" font-size="8.5" fill="#e2e8f0">Constitution Art. 19</text>
    <text x="720" y="245" text-anchor="middle" font-size="7.5" fill="#64748b">"State promotes</text>
    <text x="720" y="255" text-anchor="middle" font-size="7.5" fill="#64748b">nationwide use"</text>

    <!-- ===== MILESTONE 8: 1994 Test ===== -->
    <circle cx="800" cy="340" r="5" fill="#94a3b8" stroke="#0f172a" stroke-width="2"/>
    <line x1="800" y1="348" x2="800" y2="418" stroke="#94a3b8" stroke-width="1" opacity="0.5"/>
    <rect x="752" y="418" width="96" height="50" rx="8" fill="#0f172a" stroke="#475569" stroke-width="1"/>
    <text x="800" y="436" text-anchor="middle" font-size="11" font-weight="700" fill="#94a3b8">1994</text>
    <text x="800" y="450" text-anchor="middle" font-size="8" fill="#e2e8f0">Proficiency Test</text>
    <text x="800" y="462" text-anchor="middle" font-size="7.5" fill="#64748b">PSC established</text>

    <!-- ===== MILESTONE 9: 2000 Language Law ===== -->
    <circle cx="880" cy="340" r="7" fill="#06b6d4" stroke="#0f172a" stroke-width="2"/>
    <line x1="880" y1="332" x2="880" y2="230" stroke="#06b6d4" stroke-width="1" opacity="0.5"/>
    <rect x="828" y="198" width="104" height="60" rx="8" fill="#0f172a" stroke="#06b6d4" stroke-width="1"/>
    <text x="880" y="216" text-anchor="middle" font-size="12" font-weight="700" fill="#06b6d4">2000</text>
    <text x="880" y="231" text-anchor="middle" font-size="8.5" fill="#e2e8f0">Language Law</text>
    <text x="880" y="245" text-anchor="middle" font-size="7.5" fill="#64748b">Legal mandate for</text>
    <text x="880" y="255" text-anchor="middle" font-size="7.5" fill="#64748b">education, media</text>

    <!-- ===== MILESTONE 10: 2020 ~80% ===== -->
    <circle cx="960" cy="340" r="8" fill="#10b981" stroke="#0f172a" stroke-width="2" filter="url(#glow)"/>
    <line x1="960" y1="348" x2="960" y2="420" stroke="#10b981" stroke-width="1" opacity="0.5"/>
    <rect x="904" y="420" width="112" height="55" rx="8" fill="#0f172a" stroke="#10b981" stroke-width="1"/>
    <text x="960" y="438" text-anchor="middle" font-size="12" font-weight="700" fill="#10b981">2020</text>
    <text x="960" y="452" text-anchor="middle" font-size="9" fill="#10b981" font-weight="600">~80% adoption</text>
    <text x="960" y="466" text-anchor="middle" font-size="7.5" fill="#64748b">1.1 billion speakers</text>
    <text x="960" y="476" text-anchor="middle" font-size="7.5" fill="#64748b">Campaign continues</text>

    <!-- Comprehension rate annotations along bottom -->
    <rect x="80" y="540" width="920" height="36" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <text x="120" y="560" font-size="9" fill="#64748b">Comprehension:</text>
    <text x="230" y="560" font-size="9" fill="#f59e0b" font-weight="600">~54% (1960s)</text>
    <text x="450" y="560" font-size="9" fill="#f59e0b" font-weight="600">~53% (2000)</text>
    <text x="650" y="560" font-size="9" fill="#f59e0b" font-weight="600">~70% (2010)</text>
    <text x="850" y="560" font-size="9" fill="#10b981" font-weight="600">~80.7% (2020)</text>
  </svg>

  <figcaption>
    <strong>Figure 2: Putonghua Standardization -- A Century of Milestones</strong>
    <span>The 1932 pivot to Beijing-based pronunciation and the 1956 three-pillar definition are the two most consequential decisions. The Putonghua campaign took roughly 70 years to achieve ~80% comprehension -- remarkably fast for a country of 1.4 billion spanning dozens of dialect groups.</span>
  </figcaption>
</figure>
</body>
</html>
