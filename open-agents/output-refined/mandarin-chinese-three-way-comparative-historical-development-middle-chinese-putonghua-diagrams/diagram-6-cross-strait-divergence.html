<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cross-Strait Divergence and Reconvergence</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 1.5rem;
  }
  figure {
    background: #1e293b;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.3);
    padding: 2rem;
    max-width: 1100px;
    width: 100%;
    border: 1px solid #334155;
  }
  figcaption {
    text-align: center;
    margin-top: 1.25rem;
    padding-top: 1rem;
    border-top: 1px solid #334155;
  }
  figcaption strong { display: block; font-size: 1.05rem; color: #e2e8f0; margin-bottom: 0.3rem; }
  figcaption span { font-size: 0.85rem; color: #94a3b8; line-height: 1.5; }
  svg { max-width: 100%; height: auto; }
</style>
</head>
<body>
<figure>
  <svg viewBox="0 0 1060 720" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
    <defs>
      <filter id="glow">
        <feGaussianBlur stdDeviation="2" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>

    <!-- Title -->
    <text x="530" y="28" text-anchor="middle" font-size="18" font-weight="700" fill="#e2e8f0">Cross-Strait Divergence and Reconvergence</text>
    <text x="530" y="46" text-anchor="middle" font-size="12" fill="#94a3b8">1932 shared standard -- 1949 split -- independent evolution -- internet-era convergence</text>

    <!-- Time axis -->
    <line x1="80" y1="350" x2="1000" y2="350" stroke="#475569" stroke-width="1.5"/>
    <polygon points="1000,350 990,345 990,355" fill="#475569"/>

    <!-- Time markers -->
    <text x="120" y="370" text-anchor="middle" font-size="9" fill="#64748b">1932</text>
    <line x1="120" y1="346" x2="120" y2="354" stroke="#475569" stroke-width="1"/>
    <text x="260" y="370" text-anchor="middle" font-size="9" fill="#64748b">1949</text>
    <line x1="260" y1="346" x2="260" y2="354" stroke="#475569" stroke-width="1"/>
    <text x="400" y="370" text-anchor="middle" font-size="9" fill="#64748b">1956-58</text>
    <line x1="400" y1="346" x2="400" y2="354" stroke="#475569" stroke-width="1"/>
    <text x="560" y="370" text-anchor="middle" font-size="9" fill="#64748b">1970-80s</text>
    <line x1="560" y1="346" x2="560" y2="354" stroke="#475569" stroke-width="1"/>
    <text x="720" y="370" text-anchor="middle" font-size="9" fill="#64748b">1990s</text>
    <line x1="720" y1="346" x2="720" y2="354" stroke="#475569" stroke-width="1"/>
    <text x="860" y="370" text-anchor="middle" font-size="9" fill="#64748b">2000s-now</text>
    <line x1="860" y1="346" x2="860" y2="354" stroke="#475569" stroke-width="1"/>

    <!-- ===== SHARED ORIGIN ===== -->
    <circle cx="120" cy="350" r="8" fill="#8b5cf6" stroke="#0f172a" stroke-width="2" filter="url(#glow)"/>
    <rect x="70" y="76" width="100" height="52" rx="8" fill="#8b5cf6" opacity="0.12" stroke="#8b5cf6" stroke-width="1"/>
    <text x="120" y="96" text-anchor="middle" font-size="10" font-weight="700" fill="#a78bfa">1932</text>
    <text x="120" y="110" text-anchor="middle" font-size="8.5" fill="#e2e8f0">New National Pron.</text>
    <text x="120" y="122" text-anchor="middle" font-size="8" fill="#94a3b8">Beijing-based standard</text>
    <line x1="120" y1="128" x2="120" y2="342" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.4"/>

    <!-- ===== 1949 SPLIT ===== -->
    <circle cx="260" cy="350" r="10" fill="#f43f5e" stroke="#0f172a" stroke-width="3" filter="url(#glow)"/>
    <line x1="260" y1="100" x2="260" y2="340" stroke="#f43f5e" stroke-width="2" stroke-dasharray="6,4" opacity="0.4"/>
    <rect x="218" y="76" width="84" height="30" rx="6" fill="#f43f5e" opacity="0.15" stroke="#f43f5e" stroke-width="1"/>
    <text x="260" y="96" text-anchor="middle" font-size="11" font-weight="700" fill="#f43f5e">1949 SPLIT</text>

    <!-- ===== PRC TRACK (Top, Cyan) ===== -->
    <text x="80" y="210" text-anchor="end" font-size="12" font-weight="700" fill="#06b6d4">PRC</text>
    <text x="80" y="224" text-anchor="end" font-size="9" fill="#0891b2">Putonghua</text>

    <!-- PRC line - diverging upward from split -->
    <path d="M260,340 C320,300 380,240 400,220 L560,200 L720,200 L860,220 L960,230" fill="none" stroke="#06b6d4" stroke-width="2.5" stroke-linecap="round"/>

    <!-- PRC milestones -->
    <!-- Simplified + Pinyin -->
    <circle cx="400" cy="220" r="5" fill="#06b6d4"/>
    <rect x="340" y="130" width="120" height="60" rx="8" fill="#0f172a" stroke="#06b6d4" stroke-width="1"/>
    <text x="400" y="148" text-anchor="middle" font-size="9" font-weight="700" fill="#06b6d4">1956-58</text>
    <text x="400" y="162" text-anchor="middle" font-size="8" fill="#e2e8f0">Simplified characters</text>
    <text x="400" y="174" text-anchor="middle" font-size="8" fill="#e2e8f0">Hanyu Pinyin adopted</text>
    <text x="400" y="186" text-anchor="middle" font-size="8" fill="#94a3b8">Putonghua defined</text>
    <line x1="400" y1="190" x2="400" y2="215" stroke="#06b6d4" stroke-width="1" opacity="0.5"/>

    <!-- Peak divergence period -->
    <circle cx="560" cy="200" r="4" fill="#06b6d4"/>
    <text x="560" y="172" text-anchor="middle" font-size="8" fill="#06b6d4">Max divergence</text>
    <text x="560" y="184" text-anchor="middle" font-size="7" fill="#64748b">Separate vocab evolution</text>

    <!-- PRC vocab examples -->
    <rect x="460" y="120" width="140" height="48" rx="6" fill="#06b6d4" opacity="0.06" stroke="#06b6d4" stroke-width="1"/>
    <text x="530" y="136" text-anchor="middle" font-size="8" fill="#06b6d4" font-weight="600">PRC Vocabulary</text>
    <text x="530" y="150" text-anchor="middle" font-size="8" fill="#94a3b8">软件 software | 信息 info</text>
    <text x="530" y="162" text-anchor="middle" font-size="8" fill="#94a3b8">出租车 taxi | 激光 laser</text>

    <!-- ===== TAIWAN TRACK (Bottom, Gold) ===== -->
    <text x="80" y="476" text-anchor="end" font-size="12" font-weight="700" fill="#eab308">Taiwan</text>
    <text x="80" y="490" text-anchor="end" font-size="9" fill="#a16207">Guoyu</text>

    <!-- Taiwan line - diverging downward from split -->
    <path d="M260,360 C320,400 380,460 400,480 L560,500 L720,500 L860,480 L960,460" fill="none" stroke="#eab308" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Taiwan milestones -->
    <circle cx="400" cy="480" r="5" fill="#eab308"/>
    <rect x="340" y="520" width="120" height="60" rx="8" fill="#0f172a" stroke="#eab308" stroke-width="1"/>
    <text x="400" y="538" text-anchor="middle" font-size="9" font-weight="700" fill="#eab308">Continued</text>
    <text x="400" y="552" text-anchor="middle" font-size="8" fill="#e2e8f0">Traditional characters</text>
    <text x="400" y="564" text-anchor="middle" font-size="8" fill="#e2e8f0">Zhuyin (Bopomofo)</text>
    <text x="400" y="576" text-anchor="middle" font-size="8" fill="#94a3b8">Guoyu name retained</text>
    <line x1="400" y1="480" x2="400" y2="520" stroke="#eab308" stroke-width="1" opacity="0.5"/>

    <!-- Taiwan vocab -->
    <rect x="460" y="530" width="140" height="48" rx="6" fill="#eab308" opacity="0.06" stroke="#eab308" stroke-width="1"/>
    <text x="530" y="546" text-anchor="middle" font-size="8" fill="#eab308" font-weight="600">Taiwan Vocabulary</text>
    <text x="530" y="560" text-anchor="middle" font-size="8" fill="#94a3b8">軟體 software | 資訊 info</text>
    <text x="530" y="572" text-anchor="middle" font-size="8" fill="#94a3b8">計程車 taxi | 雷射 laser</text>

    <!-- Taiwan pronunciation note -->
    <circle cx="560" cy="500" r="4" fill="#eab308"/>
    <text x="560" y="518" text-anchor="middle" font-size="8" fill="#eab308">Less erhua, weaker</text>
    <text x="560" y="530" text-anchor="middle" font-size="7" fill="#64748b">retroflexes (zh→z)</text>

    <!-- ===== RECONVERGENCE ERA ===== -->
    <!-- Convergence arrows -->
    <rect x="780" y="260" width="160" height="180" rx="10" fill="#10b981" opacity="0.04" stroke="#10b981" stroke-width="1" stroke-dasharray="5,3"/>
    <text x="860" y="282" text-anchor="middle" font-size="10" font-weight="700" fill="#10b981">RECONVERGENCE</text>
    <text x="860" y="296" text-anchor="middle" font-size="8" fill="#64748b">1990s-present</text>

    <!-- Convergence factors -->
    <text x="800" y="318" font-size="8" fill="#10b981">Internet/social media</text>
    <text x="800" y="332" font-size="8" fill="#10b981">Shared entertainment</text>
    <text x="800" y="398" font-size="8" fill="#10b981">Cross-strait tourism</text>
    <text x="800" y="412" font-size="8" fill="#10b981">Shared pop culture</text>

    <!-- Convergence indicator arrows -->
    <path d="M960,230 L970,350" fill="none" stroke="#06b6d4" stroke-width="1.5" opacity="0.5"/>
    <path d="M960,460 L970,350" fill="none" stroke="#eab308" stroke-width="1.5" opacity="0.5"/>
    <circle cx="970" cy="350" r="6" fill="#10b981" filter="url(#glow)"/>

    <!-- ===== DIVERGENCE TRACKS (4 dimensions) ===== -->
    <rect x="80" y="612" width="900" height="90" rx="10" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <text x="530" y="634" text-anchor="middle" font-size="12" font-weight="700" fill="#e2e8f0">Four Dimensions of Divergence</text>

    <!-- Writing system -->
    <rect x="100" y="645" width="190" height="45" rx="6" fill="#06b6d4" opacity="0.06" stroke="#334155" stroke-width="1"/>
    <text x="195" y="660" text-anchor="middle" font-size="9" font-weight="600" fill="#06b6d4">Writing System</text>
    <text x="195" y="675" text-anchor="middle" font-size="8" fill="#94a3b8">Simplified vs Traditional</text>
    <text x="195" y="686" text-anchor="middle" font-size="7" fill="#f43f5e" font-weight="600">HIGH divergence</text>

    <!-- Phonetic notation -->
    <rect x="310" y="645" width="190" height="45" rx="6" fill="#eab308" opacity="0.06" stroke="#334155" stroke-width="1"/>
    <text x="405" y="660" text-anchor="middle" font-size="9" font-weight="600" fill="#eab308">Phonetic Notation</text>
    <text x="405" y="675" text-anchor="middle" font-size="8" fill="#94a3b8">Pinyin vs Bopomofo</text>
    <text x="405" y="686" text-anchor="middle" font-size="7" fill="#f43f5e" font-weight="600">HIGH divergence</text>

    <!-- Vocabulary -->
    <rect x="520" y="645" width="190" height="45" rx="6" fill="#8b5cf6" opacity="0.06" stroke="#334155" stroke-width="1"/>
    <text x="615" y="660" text-anchor="middle" font-size="9" font-weight="600" fill="#a78bfa">Vocabulary</text>
    <text x="615" y="675" text-anchor="middle" font-size="8" fill="#94a3b8">~2,000+ differences</text>
    <text x="615" y="686" text-anchor="middle" font-size="7" fill="#f59e0b" font-weight="600">MODERATE divergence</text>

    <!-- Grammar -->
    <rect x="730" y="645" width="190" height="45" rx="6" fill="#10b981" opacity="0.06" stroke="#334155" stroke-width="1"/>
    <text x="825" y="660" text-anchor="middle" font-size="9" font-weight="600" fill="#34d399">Grammar</text>
    <text x="825" y="675" text-anchor="middle" font-size="8" fill="#94a3b8">Mutually intelligible</text>
    <text x="825" y="686" text-anchor="middle" font-size="7" fill="#10b981" font-weight="600">LOW divergence</text>
  </svg>

  <figcaption>
    <strong>Figure 6: Cross-Strait Divergence Timeline</strong>
    <span>The 1949 split created a natural experiment in independent language evolution. Divergence was deepest in writing system and phonetic notation (deliberate policy choices), moderate in vocabulary (different loanword strategies), and minimal in core grammar. Since the 1990s, internet and media contact has driven reconvergence, especially in vocabulary.</span>
  </figcaption>
</figure>
</body>
</html>
