<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sound Change Cascade: 8 Tones to 4</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 1.5rem;
  }
  figure {
    background: #1e293b;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.3);
    padding: 2rem;
    max-width: 1100px;
    width: 100%;
    border: 1px solid #334155;
  }
  figcaption {
    text-align: center;
    margin-top: 1.25rem;
    padding-top: 1rem;
    border-top: 1px solid #334155;
  }
  figcaption strong { display: block; font-size: 1.05rem; color: #e2e8f0; margin-bottom: 0.3rem; }
  figcaption span { font-size: 0.85rem; color: #94a3b8; line-height: 1.5; }
  svg { max-width: 100%; height: auto; }
</style>
</head>
<body>
<figure>
  <svg viewBox="0 0 1060 750" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
    <!-- Title -->
    <text x="530" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#e2e8f0">Sound Change Cascade: Middle Chinese 8 Tones to Mandarin 4</text>
    <text x="530" y="50" text-anchor="middle" font-size="12" fill="#94a3b8">How tonal distinctions collapsed in Mandarin but survived in Cantonese</text>

    <!-- ===== LEFT COLUMN: Middle Chinese (8 categories) ===== -->
    <text x="120" y="85" text-anchor="middle" font-size="14" font-weight="700" fill="#94a3b8">Middle Chinese</text>
    <text x="120" y="100" text-anchor="middle" font-size="10" fill="#64748b">~601 CE (Qieyun)</text>

    <!-- Ping (level) -->
    <rect x="40" y="120" width="160" height="34" rx="6" fill="#8b5cf6" opacity="0.15" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="120" y="141" text-anchor="middle" font-size="11" fill="#a78bfa" font-weight="600">Yin Ping (Tone A1)</text>
    <text x="120" y="170" text-anchor="middle" font-size="8" fill="#64748b">voiceless initial</text>

    <rect x="40" y="180" width="160" height="34" rx="6" fill="#8b5cf6" opacity="0.1" stroke="#8b5cf6" stroke-width="1"/>
    <text x="120" y="201" text-anchor="middle" font-size="11" fill="#a78bfa" font-weight="600">Yang Ping (Tone A2)</text>
    <text x="120" y="228" text-anchor="middle" font-size="8" fill="#64748b">voiced initial</text>

    <!-- Shang (rising) -->
    <rect x="40" y="248" width="160" height="34" rx="6" fill="#06b6d4" opacity="0.15" stroke="#06b6d4" stroke-width="1.5"/>
    <text x="120" y="269" text-anchor="middle" font-size="11" fill="#22d3ee" font-weight="600">Yin Shang (Tone B1)</text>

    <rect x="40" y="298" width="160" height="34" rx="6" fill="#06b6d4" opacity="0.1" stroke="#06b6d4" stroke-width="1"/>
    <text x="120" y="319" text-anchor="middle" font-size="11" fill="#22d3ee" font-weight="600">Yang Shang (Tone B2)</text>

    <!-- Qu (departing) -->
    <rect x="40" y="358" width="160" height="34" rx="6" fill="#10b981" opacity="0.15" stroke="#10b981" stroke-width="1.5"/>
    <text x="120" y="379" text-anchor="middle" font-size="11" fill="#34d399" font-weight="600">Yin Qu (Tone C1)</text>

    <rect x="40" y="408" width="160" height="34" rx="6" fill="#10b981" opacity="0.1" stroke="#10b981" stroke-width="1"/>
    <text x="120" y="429" text-anchor="middle" font-size="11" fill="#34d399" font-weight="600">Yang Qu (Tone C2)</text>

    <!-- Ru (entering) -->
    <rect x="40" y="468" width="160" height="34" rx="6" fill="#f43f5e" opacity="0.15" stroke="#f43f5e" stroke-width="1.5"/>
    <text x="120" y="489" text-anchor="middle" font-size="11" fill="#fb7185" font-weight="600">Yin Ru (Tone D1)</text>
    <text x="120" y="516" text-anchor="middle" font-size="8" fill="#64748b">ends in -p, -t, -k</text>

    <rect x="40" y="528" width="160" height="34" rx="6" fill="#f43f5e" opacity="0.1" stroke="#f43f5e" stroke-width="1"/>
    <text x="120" y="549" text-anchor="middle" font-size="11" fill="#fb7185" font-weight="600">Yang Ru (Tone D2)</text>
    <text x="120" y="576" text-anchor="middle" font-size="8" fill="#64748b">ends in -p, -t, -k</text>

    <!-- ===== CENTER COLUMN: Mandarin (4 tones) ===== -->
    <text x="530" y="85" text-anchor="middle" font-size="14" font-weight="700" fill="#06b6d4">Modern Mandarin</text>
    <text x="530" y="100" text-anchor="middle" font-size="10" fill="#0891b2">Putonghua (4 tones)</text>

    <!-- Tone 1: High Level -->
    <rect x="440" y="140" width="180" height="50" rx="8" fill="#06b6d4" opacity="0.15" stroke="#06b6d4" stroke-width="2"/>
    <text x="530" y="161" text-anchor="middle" font-size="13" fill="#06b6d4" font-weight="700">Tone 1 (high level)</text>
    <text x="530" y="178" text-anchor="middle" font-size="9" fill="#94a3b8">ma (mother)</text>
    <!-- Pitch contour -->
    <line x1="610" y1="145" x2="625" y2="145" stroke="#06b6d4" stroke-width="3" stroke-linecap="round"/>

    <!-- Tone 2: Rising -->
    <rect x="440" y="230" width="180" height="50" rx="8" fill="#06b6d4" opacity="0.15" stroke="#06b6d4" stroke-width="2"/>
    <text x="530" y="251" text-anchor="middle" font-size="13" fill="#06b6d4" font-weight="700">Tone 2 (rising)</text>
    <text x="530" y="268" text-anchor="middle" font-size="9" fill="#94a3b8">ma (hemp)</text>
    <line x1="610" y1="250" x2="625" y2="237" stroke="#06b6d4" stroke-width="3" stroke-linecap="round"/>

    <!-- Tone 3: Dipping -->
    <rect x="440" y="320" width="180" height="50" rx="8" fill="#06b6d4" opacity="0.15" stroke="#06b6d4" stroke-width="2"/>
    <text x="530" y="341" text-anchor="middle" font-size="13" fill="#06b6d4" font-weight="700">Tone 3 (dipping)</text>
    <text x="530" y="358" text-anchor="middle" font-size="9" fill="#94a3b8">ma (horse)</text>
    <polyline points="610,330 617,340 625,327" fill="none" stroke="#06b6d4" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Tone 4: Falling -->
    <rect x="440" y="410" width="180" height="50" rx="8" fill="#06b6d4" opacity="0.15" stroke="#06b6d4" stroke-width="2"/>
    <text x="530" y="431" text-anchor="middle" font-size="13" fill="#06b6d4" font-weight="700">Tone 4 (falling)</text>
    <text x="530" y="448" text-anchor="middle" font-size="9" fill="#94a3b8">ma (scold)</text>
    <line x1="610" y1="418" x2="625" y2="438" stroke="#06b6d4" stroke-width="3" stroke-linecap="round"/>

    <!-- "Entering tone LOST" marker -->
    <rect x="450" y="500" width="160" height="40" rx="8" fill="#f43f5e" opacity="0.1" stroke="#f43f5e" stroke-width="1.5" stroke-dasharray="5,3"/>
    <text x="530" y="518" text-anchor="middle" font-size="11" fill="#f43f5e" font-weight="700">Entering Tone</text>
    <text x="530" y="533" text-anchor="middle" font-size="10" fill="#fb7185">COMPLETELY LOST</text>

    <!-- ===== FLOW ARROWS (MC → Mandarin) ===== -->
    <!-- Yin Ping → Tone 1 -->
    <path d="M200,137 C300,137 340,160 440,160" fill="none" stroke="#8b5cf6" stroke-width="1.5" opacity="0.7"/>
    <!-- Yang Ping → Tone 2 -->
    <path d="M200,197 C300,197 340,250 440,250" fill="none" stroke="#8b5cf6" stroke-width="1.5" opacity="0.7"/>
    <!-- Yin Shang → Tone 3 -->
    <path d="M200,265 C300,265 340,340 440,340" fill="none" stroke="#06b6d4" stroke-width="1.5" opacity="0.7"/>
    <!-- Yang Shang → Tone 4 (partially) -->
    <path d="M200,315 C300,315 340,430 440,430" fill="none" stroke="#06b6d4" stroke-width="1.5" opacity="0.5" stroke-dasharray="4,3"/>
    <!-- Yin Qu → Tone 4 -->
    <path d="M200,375 C300,375 340,430 440,430" fill="none" stroke="#10b981" stroke-width="1.5" opacity="0.7"/>
    <!-- Yang Qu → Tone 4 -->
    <path d="M200,425 C300,425 340,435 440,435" fill="none" stroke="#10b981" stroke-width="1.5" opacity="0.5"/>
    <!-- Ru tones → scattered across all 4 (chaotic redistribution) -->
    <path d="M200,485 C300,480 370,160 440,160" fill="none" stroke="#f43f5e" stroke-width="1" opacity="0.4" stroke-dasharray="3,3"/>
    <path d="M200,485 C300,490 370,250 440,250" fill="none" stroke="#f43f5e" stroke-width="1" opacity="0.4" stroke-dasharray="3,3"/>
    <path d="M200,485 C300,500 370,340 440,340" fill="none" stroke="#f43f5e" stroke-width="1" opacity="0.4" stroke-dasharray="3,3"/>
    <path d="M200,485 C300,485 370,430 440,430" fill="none" stroke="#f43f5e" stroke-width="1" opacity="0.4" stroke-dasharray="3,3"/>
    <path d="M200,545 C300,540 370,160 440,160" fill="none" stroke="#f43f5e" stroke-width="1" opacity="0.3" stroke-dasharray="3,3"/>
    <path d="M200,545 C300,540 370,250 440,250" fill="none" stroke="#f43f5e" stroke-width="1" opacity="0.3" stroke-dasharray="3,3"/>
    <path d="M200,545 C300,540 370,340 440,340" fill="none" stroke="#f43f5e" stroke-width="1" opacity="0.3" stroke-dasharray="3,3"/>
    <path d="M200,545 C300,540 370,430 440,430" fill="none" stroke="#f43f5e" stroke-width="1" opacity="0.3" stroke-dasharray="3,3"/>

    <!-- Annotation for Ru scatter -->
    <text x="320" y="510" text-anchor="middle" font-size="9" fill="#f43f5e" font-style="italic" font-weight="600">Chaotic redistribution</text>
    <text x="320" y="522" text-anchor="middle" font-size="8" fill="#64748b">No predictable pattern</text>

    <!-- ===== RIGHT COLUMN: Cantonese (6-9 tones) ===== -->
    <text x="920" y="85" text-anchor="middle" font-size="14" font-weight="700" fill="#eab308">Cantonese</text>
    <text x="920" y="100" text-anchor="middle" font-size="10" fill="#a16207">(6-9 tones preserved)</text>

    <rect x="830" y="120" width="180" height="30" rx="5" fill="#eab308" opacity="0.1" stroke="#eab308" stroke-width="1"/>
    <text x="920" y="140" text-anchor="middle" font-size="10" fill="#eab308">T1 High Level (55)</text>

    <rect x="830" y="160" width="180" height="30" rx="5" fill="#eab308" opacity="0.1" stroke="#eab308" stroke-width="1"/>
    <text x="920" y="180" text-anchor="middle" font-size="10" fill="#eab308">T2 High Rising (25)</text>

    <rect x="830" y="200" width="180" height="30" rx="5" fill="#eab308" opacity="0.1" stroke="#eab308" stroke-width="1"/>
    <text x="920" y="220" text-anchor="middle" font-size="10" fill="#eab308">T3 Mid Level (33)</text>

    <rect x="830" y="240" width="180" height="30" rx="5" fill="#eab308" opacity="0.1" stroke="#eab308" stroke-width="1"/>
    <text x="920" y="260" text-anchor="middle" font-size="10" fill="#eab308">T4 Low Falling (21)</text>

    <rect x="830" y="280" width="180" height="30" rx="5" fill="#eab308" opacity="0.1" stroke="#eab308" stroke-width="1"/>
    <text x="920" y="300" text-anchor="middle" font-size="10" fill="#eab308">T5 Low Rising (23)</text>

    <rect x="830" y="320" width="180" height="30" rx="5" fill="#eab308" opacity="0.1" stroke="#eab308" stroke-width="1"/>
    <text x="920" y="340" text-anchor="middle" font-size="10" fill="#eab308">T6 Low Level (22)</text>

    <!-- Entering tones (same pitch as 1, 3, 6 but short/checked) -->
    <rect x="830" y="370" width="180" height="30" rx="5" fill="#f43f5e" opacity="0.1" stroke="#f43f5e" stroke-width="1"/>
    <text x="920" y="390" text-anchor="middle" font-size="10" fill="#fb7185">T7 High Entering (55)</text>

    <rect x="830" y="410" width="180" height="30" rx="5" fill="#f43f5e" opacity="0.1" stroke="#f43f5e" stroke-width="1"/>
    <text x="920" y="430" text-anchor="middle" font-size="10" fill="#fb7185">T8 Mid Entering (33)</text>

    <rect x="830" y="450" width="180" height="30" rx="5" fill="#f43f5e" opacity="0.1" stroke="#f43f5e" stroke-width="1"/>
    <text x="920" y="470" text-anchor="middle" font-size="10" fill="#fb7185">T9 Low Entering (22)</text>

    <!-- Annotation -->
    <text x="920" y="505" text-anchor="middle" font-size="9" fill="#10b981" font-weight="600">Entering tones PRESERVED</text>
    <text x="920" y="518" text-anchor="middle" font-size="8" fill="#64748b">Syllables still end in -p, -t, -k</text>

    <!-- ===== EXAMPLES BOX ===== -->
    <rect x="60" y="610" width="940" height="120" rx="10" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <text x="530" y="635" text-anchor="middle" font-size="13" font-weight="700" fill="#e2e8f0">Entering Tone Examples: Same Character, Different Fate</text>

    <!-- Headers -->
    <text x="160" y="658" text-anchor="middle" font-size="10" fill="#64748b" font-weight="600">Character</text>
    <text x="310" y="658" text-anchor="middle" font-size="10" fill="#64748b" font-weight="600">Meaning</text>
    <text x="480" y="658" text-anchor="middle" font-size="10" fill="#06b6d4" font-weight="600">Mandarin</text>
    <text x="650" y="658" text-anchor="middle" font-size="10" fill="#eab308" font-weight="600">Cantonese</text>
    <text x="830" y="658" text-anchor="middle" font-size="10" fill="#64748b" font-weight="600">MC Final</text>

    <!-- Row 1 -->
    <text x="160" y="680" text-anchor="middle" font-size="14" fill="#e2e8f0" font-weight="600">六</text>
    <text x="310" y="680" text-anchor="middle" font-size="10" fill="#94a3b8">six</text>
    <text x="480" y="680" text-anchor="middle" font-size="10" fill="#06b6d4">liu (T4)</text>
    <text x="650" y="680" text-anchor="middle" font-size="10" fill="#eab308">luk6 (-k!)</text>
    <text x="830" y="680" text-anchor="middle" font-size="10" fill="#fb7185">*-k</text>

    <!-- Row 2 -->
    <text x="160" y="700" text-anchor="middle" font-size="14" fill="#e2e8f0" font-weight="600">十</text>
    <text x="310" y="700" text-anchor="middle" font-size="10" fill="#94a3b8">ten</text>
    <text x="480" y="700" text-anchor="middle" font-size="10" fill="#06b6d4">shi (T2)</text>
    <text x="650" y="700" text-anchor="middle" font-size="10" fill="#eab308">sap6 (-p!)</text>
    <text x="830" y="700" text-anchor="middle" font-size="10" fill="#fb7185">*-p</text>

    <!-- Row 3 -->
    <text x="160" y="720" text-anchor="middle" font-size="14" fill="#e2e8f0" font-weight="600">國</text>
    <text x="310" y="720" text-anchor="middle" font-size="10" fill="#94a3b8">country</text>
    <text x="480" y="720" text-anchor="middle" font-size="10" fill="#06b6d4">guo (T2)</text>
    <text x="650" y="720" text-anchor="middle" font-size="10" fill="#eab308">gwok3 (-k!)</text>
    <text x="830" y="720" text-anchor="middle" font-size="10" fill="#fb7185">*-k</text>
  </svg>

  <figcaption>
    <strong>Figure 3: The Tone Reduction Cascade</strong>
    <span>Middle Chinese's 8 tonal categories collapsed into Mandarin's 4 tones. The entering tone (ru) was chaotically redistributed with no predictable pattern -- a major source of difficulty for Mandarin speakers reading classical poetry. Cantonese preserves all tonal distinctions including entering tones with their original final stop consonants (-p, -t, -k).</span>
  </figcaption>
</figure>
</body>
</html>
