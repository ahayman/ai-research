<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Generative Architecture of Abstract Thought</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #f8f9fa;
    color: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 2rem;
  }
  figure {
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
    max-width: 1060px;
    width: 100%;
  }
  .diagram-title {
    text-align: center;
    font-size: 1.3rem;
    font-weight: 700;
    margin-bottom: 2rem;
    color: #1a1a2e;
  }
  .svg-container {
    display: flex;
    justify-content: center;
    overflow-x: auto;
    padding: 1rem 0;
  }
  svg text {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid #e9ecef;
  }
  figcaption strong {
    display: block;
    font-size: 1.1rem;
    color: #1a1a2e;
    margin-bottom: 0.4rem;
  }
  figcaption span {
    font-size: 0.88rem;
    color: #6c757d;
    line-height: 1.6;
    display: block;
  }
  .legend {
    display: flex;
    justify-content: center;
    gap: 1.5rem;
    margin-top: 1.25rem;
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.82rem;
    color: #495057;
  }
  .legend-swatch {
    width: 14px;
    height: 14px;
    border-radius: 3px;
    border: 1px solid rgba(0,0,0,0.15);
  }
  @media (prefers-color-scheme: dark) {
    body { background: #1a1a2e; color: #e9ecef; }
    figure { background: #2d2d44; box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
    .diagram-title { color: #e9ecef; }
    figcaption { border-top-color: #3d3d5c; }
    figcaption strong { color: #e9ecef; }
    figcaption span { color: #adb5bd; }
    .legend-item { color: #adb5bd; }
    svg text { fill: #e9ecef; }
    svg text.dark-text { fill: #1a1a2e; }
  }
  @media print {
    body { background: #fff; padding: 0; }
    figure { box-shadow: none; border: 1px solid #ccc; break-inside: avoid; }
  }
</style>
</head>
<body>
<figure>
  <div class="diagram-title">The Generative Architecture of Abstract Thought</div>
  <div class="svg-container">
    <svg viewBox="0 0 980 920" width="980" height="920" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto">

        </marker>
        <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#8B4513;stop-opacity:1" />
          <stop offset="100%" style="stop-color:#A0522D;stop-opacity:1" />
        </linearGradient>
        <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#2E86AB;stop-opacity:1" />
          <stop offset="100%" style="stop-color:#4ECDC4;stop-opacity:1" />
        </linearGradient>
        <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7B68EE;stop-opacity:1" />
          <stop offset="100%" style="stop-color:#9B59B6;stop-opacity:1" />
        </linearGradient>
        <linearGradient id="grad4" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#E74C3C;stop-opacity:1" />
          <stop offset="100%" style="stop-color:#C0392B;stop-opacity:1" />
        </linearGradient>
        <linearGradient id="grad5" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#F39C12;stop-opacity:1" />
          <stop offset="100%" style="stop-color:#E67E22;stop-opacity:1" />
        </linearGradient>
      </defs>

      <!-- Level 1: Embodied Experience -->
      <rect x="190" y="20" width="600" height="80" rx="12" fill="url(#grad1)" opacity="0.9"/>
      <text x="490" y="52" text-anchor="middle" font-size="18" font-weight="700" class="dark-text" fill="#fff">EMBODIED EXPERIENCE</text>
      <text x="490" y="78" text-anchor="middle" font-size="12" class="dark-text" fill="rgba(255,255,255,0.85)">Gravity, temperature, bodily movement, spatial interaction, force dynamics</text>

      <!-- Arrow 1-2 -->
      <line x1="340" y1="100" x2="340" y2="165" stroke="#6c757d" stroke-width="2" marker-end="url(#arrow)"/>
      <line x1="490" y1="100" x2="490" y2="165" stroke="#6c757d" stroke-width="2" marker-end="url(#arrow)"/>
      <line x1="640" y1="100" x2="640" y2="165" stroke="#6c757d" stroke-width="2" marker-end="url(#arrow)"/>
      <text x="520" y="138" font-size="10" fill="#6c757d" font-style="italic">repeated sensorimotor correlations</text>

      <!-- Level 2: Image Schemas -->
      <rect x="90" y="170" width="800" height="110" rx="12" fill="url(#grad2)" opacity="0.9"/>
      <text x="490" y="198" text-anchor="middle" font-size="18" font-weight="700" class="dark-text" fill="#fff">IMAGE SCHEMAS</text>
      <text x="490" y="218" text-anchor="middle" font-size="11" class="dark-text" fill="rgba(255,255,255,0.85)">Pre-linguistic skeletal patterns from sensorimotor experience</text>

      <!-- Image schema boxes -->
      <rect x="110" y="232" width="90" height="34" rx="6" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
      <text x="155" y="254" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">CONTAINER</text>

      <rect x="210" y="232" width="110" height="34" rx="6" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
      <text x="265" y="254" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">SOURCE-PATH-GOAL</text>

      <rect x="330" y="232" width="70" height="34" rx="6" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
      <text x="365" y="254" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">FORCE</text>

      <rect x="410" y="232" width="80" height="34" rx="6" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
      <text x="450" y="254" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">BALANCE</text>

      <rect x="500" y="232" width="80" height="34" rx="6" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
      <text x="540" y="254" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">UP-DOWN</text>

      <rect x="590" y="232" width="110" height="34" rx="6" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
      <text x="645" y="254" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">CENTER-PERIPH.</text>

      <rect x="710" y="232" width="60" height="34" rx="6" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
      <text x="740" y="254" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">LINK</text>

      <rect x="780" y="232" width="90" height="34" rx="6" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
      <text x="825" y="254" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">PART-WHOLE</text>

      <!-- Arrow 2-3 -->
      <line x1="300" y1="280" x2="300" y2="345" stroke="#6c757d" stroke-width="2" marker-end="url(#arrow)"/>
      <line x1="490" y1="280" x2="490" y2="345" stroke="#6c757d" stroke-width="2" marker-end="url(#arrow)"/>
      <line x1="680" y1="280" x2="680" y2="345" stroke="#6c757d" stroke-width="2" marker-end="url(#arrow)"/>
      <text x="520" y="316" font-size="10" fill="#6c757d" font-style="italic">childhood conflation + Hebbian learning</text>

      <!-- Level 3: Primary Metaphors -->
      <rect x="130" y="350" width="720" height="110" rx="12" fill="url(#grad3)" opacity="0.9"/>
      <text x="490" y="378" text-anchor="middle" font-size="18" font-weight="700" class="dark-text" fill="#fff">PRIMARY METAPHORS</text>
      <text x="490" y="398" text-anchor="middle" font-size="11" class="dark-text" fill="rgba(255,255,255,0.85)">Irreducible cross-domain mappings from universal bodily experience</text>

      <!-- Primary metaphor boxes -->
      <rect x="148" y="412" width="105" height="34" rx="6" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
      <text x="200" y="434" text-anchor="middle" font-size="9.5" font-weight="600" fill="#fff">MORE IS UP</text>

      <rect x="263" y="412" width="120" height="34" rx="6" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
      <text x="323" y="434" text-anchor="middle" font-size="9.5" font-weight="600" fill="#fff">KNOWING IS SEEING</text>

      <rect x="393" y="412" width="130" height="34" rx="6" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
      <text x="458" y="434" text-anchor="middle" font-size="9.5" font-weight="600" fill="#fff">AFFECTION IS WARMTH</text>

      <rect x="533" y="412" width="130" height="34" rx="6" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
      <text x="598" y="434" text-anchor="middle" font-size="9.5" font-weight="600" fill="#fff">TIME IS MOTION</text>

      <rect x="673" y="412" width="155" height="34" rx="6" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
      <text x="750" y="434" text-anchor="middle" font-size="9.5" font-weight="600" fill="#fff">PURPOSES ARE DEST.</text>

      <!-- Arrow 3-4 -->
      <line x1="300" y1="460" x2="300" y2="525" stroke="#6c757d" stroke-width="2" marker-end="url(#arrow)"/>
      <line x1="490" y1="460" x2="490" y2="525" stroke="#6c757d" stroke-width="2" marker-end="url(#arrow)"/>
      <line x1="680" y1="460" x2="680" y2="525" stroke="#6c757d" stroke-width="2" marker-end="url(#arrow)"/>
      <text x="520" y="496" font-size="10" fill="#6c757d" font-style="italic">compositional combination + cultural knowledge</text>

      <!-- Level 4: Complex Metaphors -->
      <rect x="160" y="530" width="660" height="110" rx="12" fill="url(#grad4)" opacity="0.9"/>
      <text x="490" y="558" text-anchor="middle" font-size="18" font-weight="700" class="dark-text" fill="#fff">COMPLEX METAPHORS</text>
      <text x="490" y="578" text-anchor="middle" font-size="11" class="dark-text" fill="rgba(255,255,255,0.85)">Molecular structures built from primary metaphor atoms</text>

      <!-- Complex metaphor boxes -->
      <rect x="178" y="592" width="140" height="34" rx="6" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
      <text x="248" y="614" text-anchor="middle" font-size="9.5" font-weight="600" fill="#fff">LOVE IS A JOURNEY</text>

      <rect x="328" y="592" width="140" height="34" rx="6" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
      <text x="398" y="614" text-anchor="middle" font-size="9.5" font-weight="600" fill="#fff">ARGUMENT IS WAR</text>

      <rect x="478" y="592" width="160" height="34" rx="6" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
      <text x="558" y="614" text-anchor="middle" font-size="9.5" font-weight="600" fill="#fff">THEORIES ARE BUILDINGS</text>

      <rect x="648" y="592" width="150" height="34" rx="6" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
      <text x="723" y="614" text-anchor="middle" font-size="9.5" font-weight="600" fill="#fff">TIME IS MONEY</text>

      <!-- Arrow 4-5 -->
      <line x1="340" y1="640" x2="340" y2="705" stroke="#6c757d" stroke-width="2" marker-end="url(#arrow)"/>
      <line x1="490" y1="640" x2="490" y2="705" stroke="#6c757d" stroke-width="2" marker-end="url(#arrow)"/>
      <line x1="640" y1="640" x2="640" y2="705" stroke="#6c757d" stroke-width="2" marker-end="url(#arrow)"/>
      <text x="520" y="676" font-size="10" fill="#6c757d" font-style="italic">metaphorical inference maps source logic to target reasoning</text>

      <!-- Level 5: Abstract Thought -->
      <rect x="200" y="710" width="580" height="80" rx="12" fill="url(#grad5)" opacity="0.9"/>
      <text x="490" y="742" text-anchor="middle" font-size="18" font-weight="700" class="dark-text" fill="#fff">ABSTRACT THOUGHT</text>
      <text x="490" y="768" text-anchor="middle" font-size="12" class="dark-text" fill="rgba(255,255,255,0.85)">Morality, time, causation, mathematics, emotion, politics, justice</text>

      <!-- Side annotations -->
      <!-- Left: mechanism labels -->
      <rect x="10" y="125" width="65" height="28" rx="5" fill="#f0f0f0" stroke="#ccc" stroke-width="1"/>
      <text x="42" y="143" text-anchor="middle" font-size="9" fill="#666">~8-12</text>

      <rect x="10" y="305" width="65" height="28" rx="5" fill="#f0f0f0" stroke="#ccc" stroke-width="1"/>
      <text x="42" y="323" text-anchor="middle" font-size="9" fill="#666">~20-30</text>

      <rect x="10" y="485" width="65" height="28" rx="5" fill="#f0f0f0" stroke="#ccc" stroke-width="1"/>
      <text x="42" y="503" text-anchor="middle" font-size="9" fill="#666">hundreds</text>

      <rect x="10" y="665" width="65" height="28" rx="5" fill="#f0f0f0" stroke="#ccc" stroke-width="1"/>
      <text x="42" y="683" text-anchor="middle" font-size="9" fill="#666">unbounded</text>

      <!-- Right side: branching annotation -->
      <text x="920" y="230" text-anchor="middle" font-size="10" fill="#6c757d" font-weight="600">Combinatorial</text>
      <text x="920" y="245" text-anchor="middle" font-size="10" fill="#6c757d" font-weight="600">Explosion</text>
      <path d="M 905 260 L 905 450 L 915 450" stroke="#6c757d" stroke-width="1.5" fill="none" stroke-dasharray="4,3"/>
      <path d="M 905 260 L 915 260" stroke="#6c757d" stroke-width="1.5" fill="none"/>
      <text x="935" y="360" text-anchor="start" font-size="9" fill="#adb5bd" transform="rotate(90 935 360)">finite inputs generate infinite outputs</text>

      <!-- Bottom annotation: the key principle -->
      <rect x="190" y="820" width="600" height="70" rx="10" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1.5"/>
      <text x="490" y="845" text-anchor="middle" font-size="12" font-weight="700" fill="#495057">Key Principle: A finite set generates an infinite range</text>
      <text x="490" y="865" text-anchor="middle" font-size="10.5" fill="#6c757d">Analogous to how a finite number of phonemes generates an infinite number of words,</text>
      <text x="490" y="880" text-anchor="middle" font-size="10.5" fill="#6c757d">a small set of image schemas and primary metaphors generates all of abstract thought.</text>
    </svg>
  </div>
  <figcaption>
    <strong>Figure 1: The Generative Architecture of Abstract Thought</strong>
    <span>Lakoff and Johnson's Conceptual Metaphor Theory reveals that abstract thought has a five-level generative architecture. Embodied sensorimotor experience gives rise to a small set of image schemas (~8-12), which combine through childhood conflation and Hebbian neural learning to form primary metaphors (~20-30). These primary metaphors compose into hundreds of complex metaphors, which collectively structure the unbounded domain of abstract thought. Each level is built from the level below, creating a combinatorial system where finite primitives generate infinite conceptual possibilities.</span>
  </figcaption>
  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background: #8B4513;"></div>Embodied Foundation</div>
    <div class="legend-item"><div class="legend-swatch" style="background: #2E86AB;"></div>Image Schemas</div>
    <div class="legend-item"><div class="legend-swatch" style="background: #7B68EE;"></div>Primary Metaphors</div>
    <div class="legend-item"><div class="legend-swatch" style="background: #E74C3C;"></div>Complex Metaphors</div>
    <div class="legend-item"><div class="legend-swatch" style="background: #F39C12;"></div>Abstract Thought</div>
  </div>
</figure>
