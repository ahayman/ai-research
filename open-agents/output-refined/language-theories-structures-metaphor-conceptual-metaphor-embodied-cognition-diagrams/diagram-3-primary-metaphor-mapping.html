<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Primary Metaphor Mapping Diagram</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #f8f9fa;
    color: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 2rem;
  }
  figure {
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
    max-width: 1060px;
    width: 100%;
  }
  .diagram-title {
    text-align: center;
    font-size: 1.3rem;
    font-weight: 700;
    margin-bottom: 2rem;
    color: #1a1a2e;
  }
  .svg-container {
    display: flex;
    justify-content: center;
    overflow-x: auto;
    padding: 1rem 0;
  }
  svg text {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid #e9ecef;
  }
  figcaption strong {
    display: block;
    font-size: 1.1rem;
    color: #1a1a2e;
    margin-bottom: 0.4rem;
  }
  figcaption span {
    font-size: 0.88rem;
    color: #6c757d;
    line-height: 1.6;
    display: block;
  }
  .legend {
    display: flex;
    justify-content: center;
    gap: 1.5rem;
    margin-top: 1.25rem;
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.82rem;
    color: #495057;
  }
  .legend-swatch {
    width: 14px;
    height: 14px;
    border-radius: 3px;
    border: 1px solid rgba(0,0,0,0.15);
  }
  @media (prefers-color-scheme: dark) {
    body { background: #1a1a2e; color: #e9ecef; }
    figure { background: #2d2d44; box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
    .diagram-title { color: #e9ecef; }
    figcaption { border-top-color: #3d3d5c; }
    figcaption strong { color: #e9ecef; }
    figcaption span { color: #adb5bd; }
    .legend-item { color: #adb5bd; }
    svg text { fill: #e9ecef; }
    svg text.dark-text { fill: #1a1a2e; }
    svg text.source-text { fill: #e9ecef; }
    svg text.target-text { fill: #e9ecef; }
    svg text.ground-text { fill: #e9ecef; }
  }
  @media print {
    body { background: #fff; padding: 0; }
    figure { box-shadow: none; border: 1px solid #ccc; break-inside: avoid; }
  }
</style>
</head>
<body>
<figure>
  <div class="diagram-title">Primary Metaphor Mapping: From Body to Abstraction</div>
  <div class="svg-container">
    <svg viewBox="0 0 960 820" width="960" height="820" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="map-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#F39C12"/>
        </marker>
        <marker id="uni-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#adb5bd"/>
        </marker>
      </defs>

      <!-- Column headers -->
      <text x="200" y="30" text-anchor="middle" font-size="15" font-weight="700" fill="#2E86AB">SOURCE DOMAIN</text>
      <text x="200" y="48" text-anchor="middle" font-size="11" fill="#6c757d">(Bodily Experience)</text>
      <text x="480" y="38" text-anchor="middle" font-size="14" font-weight="700" fill="#F39C12">MAPPING</text>
      <text x="760" y="30" text-anchor="middle" font-size="15" font-weight="700" fill="#7B68EE">TARGET DOMAIN</text>
      <text x="760" y="48" text-anchor="middle" font-size="11" fill="#6c757d">(Abstract Concept)</text>

      <!-- Unidirectionality indicator -->
      <line x1="350" y1="38" x2="610" y2="38" stroke="#adb5bd" stroke-width="1.5" marker-end="url(#uni-arrow)" stroke-dasharray="4,3"/>
      <text x="480" y="56" text-anchor="middle" font-size="9" fill="#adb5bd" font-style="italic">unidirectional: concrete to abstract</text>

      <!-- ========== MORE IS UP ========== -->
      <rect x="70" y="80" width="260" height="120" rx="10" fill="#2E86AB" fill-opacity="0.08" stroke="#2E86AB" stroke-width="1.5"/>
      <rect x="630" y="80" width="260" height="120" rx="10" fill="#7B68EE" fill-opacity="0.08" stroke="#7B68EE" stroke-width="1.5"/>

      <!-- Source content -->
      <text x="200" y="102" text-anchor="middle" font-size="12" font-weight="700" class="source-text" fill="#2E86AB">VERTICALITY (Up/Down)</text>
      <text x="200" y="122" text-anchor="middle" font-size="10" class="source-text" fill="#495057">Stacking objects increases height</text>
      <text x="200" y="138" text-anchor="middle" font-size="10" class="source-text" fill="#495057">Pouring liquid raises level</text>
      <text x="200" y="154" text-anchor="middle" font-size="10" class="source-text" fill="#495057">Erect posture = vitality</text>

      <!-- Grounding -->
      <rect x="100" y="170" width="200" height="22" rx="5" fill="#8B4513" fill-opacity="0.15"/>
      <text x="200" y="185" text-anchor="middle" font-size="9" class="ground-text" fill="#8B4513" font-style="italic">Gravity + object stacking experience</text>

      <!-- Mapping arrow -->
      <line x1="335" y1="130" x2="625" y2="130" stroke="#F39C12" stroke-width="2.5" marker-end="url(#map-arrow)"/>
      <rect x="415" y="110" width="130" height="28" rx="8" fill="#F39C12" fill-opacity="0.15" stroke="#F39C12" stroke-width="1.5"/>
      <text x="480" y="129" text-anchor="middle" font-size="12" font-weight="700" fill="#F39C12">MORE IS UP</text>

      <!-- Target content -->
      <text x="760" y="102" text-anchor="middle" font-size="12" font-weight="700" class="target-text" fill="#7B68EE">QUANTITY</text>
      <text x="760" y="122" text-anchor="middle" font-size="10" class="target-text" fill="#495057">"Prices are rising"</text>
      <text x="760" y="138" text-anchor="middle" font-size="10" class="target-text" fill="#495057">"The stock market fell"</text>
      <text x="760" y="154" text-anchor="middle" font-size="10" class="target-text" fill="#495057">"Turn the volume up"</text>

      <!-- ========== KNOWING IS SEEING ========== -->
      <rect x="70" y="220" width="260" height="120" rx="10" fill="#2E86AB" fill-opacity="0.08" stroke="#2E86AB" stroke-width="1.5"/>
      <rect x="630" y="220" width="260" height="120" rx="10" fill="#7B68EE" fill-opacity="0.08" stroke="#7B68EE" stroke-width="1.5"/>

      <text x="200" y="242" text-anchor="middle" font-size="12" font-weight="700" class="source-text" fill="#2E86AB">VISUAL PERCEPTION</text>
      <text x="200" y="262" text-anchor="middle" font-size="10" class="source-text" fill="#495057">Seeing objects = learning about them</text>
      <text x="200" y="278" text-anchor="middle" font-size="10" class="source-text" fill="#495057">Light reveals, darkness conceals</text>
      <text x="200" y="294" text-anchor="middle" font-size="10" class="source-text" fill="#495057">Visual clarity = comprehension</text>

      <rect x="100" y="310" width="200" height="22" rx="5" fill="#8B4513" fill-opacity="0.15"/>
      <text x="200" y="325" text-anchor="middle" font-size="9" class="ground-text" fill="#8B4513" font-style="italic">Visual dominance in human perception</text>

      <line x1="335" y1="270" x2="625" y2="270" stroke="#F39C12" stroke-width="2.5" marker-end="url(#map-arrow)"/>
      <rect x="395" y="250" width="170" height="28" rx="8" fill="#F39C12" fill-opacity="0.15" stroke="#F39C12" stroke-width="1.5"/>
      <text x="480" y="269" text-anchor="middle" font-size="12" font-weight="700" fill="#F39C12">KNOWING IS SEEING</text>

      <text x="760" y="242" text-anchor="middle" font-size="12" font-weight="700" class="target-text" fill="#7B68EE">KNOWLEDGE</text>
      <text x="760" y="262" text-anchor="middle" font-size="10" class="target-text" fill="#495057">"I see what you mean"</text>
      <text x="760" y="278" text-anchor="middle" font-size="10" class="target-text" fill="#495057">"A clear explanation"</text>
      <text x="760" y="294" text-anchor="middle" font-size="10" class="target-text" fill="#495057">"His motives are transparent"</text>

      <!-- ========== INTIMACY IS CLOSENESS ========== -->
      <rect x="70" y="360" width="260" height="120" rx="10" fill="#2E86AB" fill-opacity="0.08" stroke="#2E86AB" stroke-width="1.5"/>
      <rect x="630" y="360" width="260" height="120" rx="10" fill="#7B68EE" fill-opacity="0.08" stroke="#7B68EE" stroke-width="1.5"/>

      <text x="200" y="382" text-anchor="middle" font-size="12" font-weight="700" class="source-text" fill="#2E86AB">PHYSICAL PROXIMITY</text>
      <text x="200" y="402" text-anchor="middle" font-size="10" class="source-text" fill="#495057">Close to caregivers = comforted</text>
      <text x="200" y="418" text-anchor="middle" font-size="10" class="source-text" fill="#495057">Distance = separation, loss</text>
      <text x="200" y="434" text-anchor="middle" font-size="10" class="source-text" fill="#495057">Physical nearness = connection</text>

      <rect x="100" y="450" width="200" height="22" rx="5" fill="#8B4513" fill-opacity="0.15"/>
      <text x="200" y="465" text-anchor="middle" font-size="9" class="ground-text" fill="#8B4513" font-style="italic">Caregiver proximity in infancy</text>

      <line x1="335" y1="410" x2="625" y2="410" stroke="#F39C12" stroke-width="2.5" marker-end="url(#map-arrow)"/>
      <rect x="385" y="390" width="190" height="28" rx="8" fill="#F39C12" fill-opacity="0.15" stroke="#F39C12" stroke-width="1.5"/>
      <text x="480" y="409" text-anchor="middle" font-size="12" font-weight="700" fill="#F39C12">INTIMACY IS CLOSENESS</text>

      <text x="760" y="382" text-anchor="middle" font-size="12" font-weight="700" class="target-text" fill="#7B68EE">EMOTIONAL CONNECTION</text>
      <text x="760" y="402" text-anchor="middle" font-size="10" class="target-text" fill="#495057">"We're close friends"</text>
      <text x="760" y="418" text-anchor="middle" font-size="10" class="target-text" fill="#495057">"They've grown apart"</text>
      <text x="760" y="434" text-anchor="middle" font-size="10" class="target-text" fill="#495057">"A distant relative"</text>

      <!-- ========== TIME IS MOTION ========== -->
      <rect x="70" y="500" width="260" height="120" rx="10" fill="#2E86AB" fill-opacity="0.08" stroke="#2E86AB" stroke-width="1.5"/>
      <rect x="630" y="500" width="260" height="120" rx="10" fill="#7B68EE" fill-opacity="0.08" stroke="#7B68EE" stroke-width="1.5"/>

      <text x="200" y="522" text-anchor="middle" font-size="12" font-weight="700" class="source-text" fill="#2E86AB">SPATIAL MOTION</text>
      <text x="200" y="542" text-anchor="middle" font-size="10" class="source-text" fill="#495057">Objects moving past observer</text>
      <text x="200" y="558" text-anchor="middle" font-size="10" class="source-text" fill="#495057">Observer moving past landmarks</text>
      <text x="200" y="574" text-anchor="middle" font-size="10" class="source-text" fill="#495057">Approach = future, recede = past</text>

      <rect x="100" y="590" width="200" height="22" rx="5" fill="#8B4513" fill-opacity="0.15"/>
      <text x="200" y="605" text-anchor="middle" font-size="9" class="ground-text" fill="#8B4513" font-style="italic">Movement through space + temporal flow</text>

      <line x1="335" y1="550" x2="625" y2="550" stroke="#F39C12" stroke-width="2.5" marker-end="url(#map-arrow)"/>
      <rect x="405" y="530" width="150" height="28" rx="8" fill="#F39C12" fill-opacity="0.15" stroke="#F39C12" stroke-width="1.5"/>
      <text x="480" y="549" text-anchor="middle" font-size="12" font-weight="700" fill="#F39C12">TIME IS MOTION</text>

      <text x="760" y="522" text-anchor="middle" font-size="12" font-weight="700" class="target-text" fill="#7B68EE">TEMPORAL PASSAGE</text>
      <text x="760" y="542" text-anchor="middle" font-size="10" class="target-text" fill="#495057">"Time flies"</text>
      <text x="760" y="558" text-anchor="middle" font-size="10" class="target-text" fill="#495057">"The deadline is approaching"</text>
      <text x="760" y="574" text-anchor="middle" font-size="10" class="target-text" fill="#495057">"We're coming up on the date"</text>

      <!-- ========== PURPOSES ARE DESTINATIONS ========== -->
      <rect x="70" y="640" width="260" height="120" rx="10" fill="#2E86AB" fill-opacity="0.08" stroke="#2E86AB" stroke-width="1.5"/>
      <rect x="630" y="640" width="260" height="120" rx="10" fill="#7B68EE" fill-opacity="0.08" stroke="#7B68EE" stroke-width="1.5"/>

      <text x="200" y="662" text-anchor="middle" font-size="12" font-weight="700" class="source-text" fill="#2E86AB">REACHING A DESTINATION</text>
      <text x="200" y="682" text-anchor="middle" font-size="10" class="source-text" fill="#495057">Traveling to a place = arriving</text>
      <text x="200" y="698" text-anchor="middle" font-size="10" class="source-text" fill="#495057">Choosing a path = choosing direction</text>
      <text x="200" y="714" text-anchor="middle" font-size="10" class="source-text" fill="#495057">Getting lost = failing to arrive</text>

      <rect x="100" y="730" width="200" height="22" rx="5" fill="#8B4513" fill-opacity="0.15"/>
      <text x="200" y="745" text-anchor="middle" font-size="9" class="ground-text" fill="#8B4513" font-style="italic">Purposeful movement to endpoints</text>

      <line x1="335" y1="690" x2="625" y2="690" stroke="#F39C12" stroke-width="2.5" marker-end="url(#map-arrow)"/>
      <rect x="370" y="670" width="220" height="28" rx="8" fill="#F39C12" fill-opacity="0.15" stroke="#F39C12" stroke-width="1.5"/>
      <text x="480" y="689" text-anchor="middle" font-size="12" font-weight="700" fill="#F39C12">PURPOSES ARE DESTINATIONS</text>

      <text x="760" y="662" text-anchor="middle" font-size="12" font-weight="700" class="target-text" fill="#7B68EE">GOALS / PURPOSE</text>
      <text x="760" y="682" text-anchor="middle" font-size="10" class="target-text" fill="#495057">"She reached her goal"</text>
      <text x="760" y="698" text-anchor="middle" font-size="10" class="target-text" fill="#495057">"He's on his way to success"</text>
      <text x="760" y="714" text-anchor="middle" font-size="10" class="target-text" fill="#495057">"I'm not there yet"</text>

      <!-- Bottom note -->
      <rect x="220" y="775" width="520" height="35" rx="8" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
      <text x="480" y="798" text-anchor="middle" font-size="11" fill="#6c757d" font-weight="600">All mappings arise from universal sensorimotor correlations experienced in infancy (Grady, 1997)</text>
    </svg>
  </div>
  <figcaption>
    <strong>Figure 3: Five Primary Metaphors with Source-to-Target Mapping</strong>
    <span>Primary metaphors are the irreducible atoms of metaphorical thought. Each arises from a specific, recurring correlation between a bodily experience (source domain) and a subjective judgment (target domain) during early childhood. The mapping is unidirectional: we understand abstract concepts through concrete bodily experience, never the reverse. Each primary metaphor is grounded in a specific sensorimotor experience shared by all humans, which is why they are predicted to be cross-culturally universal.</span>
  </figcaption>
  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background: #2E86AB;"></div>Source Domain (Bodily)</div>
    <div class="legend-item"><div class="legend-swatch" style="background: #F39C12;"></div>Mapping Direction</div>
    <div class="legend-item"><div class="legend-swatch" style="background: #7B68EE;"></div>Target Domain (Abstract)</div>
    <div class="legend-item"><div class="legend-swatch" style="background: #8B4513;"></div>Sensorimotor Grounding</div>
  </div>
</figure>
</body>
</html>
