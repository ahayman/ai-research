<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARGUMENT IS WAR: Full Mapping Diagram</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #f8f9fa;
    color: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 2rem;
  }
  figure {
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
    max-width: 1060px;
    width: 100%;
  }
  .diagram-title {
    text-align: center;
    font-size: 1.3rem;
    font-weight: 700;
    margin-bottom: 2rem;
    color: #1a1a2e;
  }
  .svg-container {
    display: flex;
    justify-content: center;
    overflow-x: auto;
    padding: 1rem 0;
  }
  svg text {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid #e9ecef;
  }
  figcaption strong {
    display: block;
    font-size: 1.1rem;
    color: #1a1a2e;
    margin-bottom: 0.4rem;
  }
  figcaption span {
    font-size: 0.88rem;
    color: #6c757d;
    line-height: 1.6;
    display: block;
  }
  .legend {
    display: flex;
    justify-content: center;
    gap: 1.5rem;
    margin-top: 1.25rem;
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.82rem;
    color: #495057;
  }
  .legend-swatch {
    width: 14px;
    height: 14px;
    border-radius: 3px;
    border: 1px solid rgba(0,0,0,0.15);
  }
  @media (prefers-color-scheme: dark) {
    body { background: #1a1a2e; color: #e9ecef; }
    figure { background: #2d2d44; box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
    .diagram-title { color: #e9ecef; }
    figcaption { border-top-color: #3d3d5c; }
    figcaption strong { color: #e9ecef; }
    figcaption span { color: #adb5bd; }
    .legend-item { color: #adb5bd; }
    svg text { fill: #e9ecef; }
    svg text.dark-text { fill: #1a1a2e; }
  }
  @media print {
    body { background: #fff; padding: 0; }
    figure { box-shadow: none; border: 1px solid #ccc; break-inside: avoid; }
  }
</style>
</head>
<body>
<figure>
  <div class="diagram-title">ARGUMENT IS WAR: Complete Ontological Mapping</div>
  <div class="svg-container">
    <svg viewBox="0 0 960 850" width="960" height="850" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="m-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#F39C12"/>
        </marker>
      </defs>

      <!-- SOURCE DOMAIN: WAR -->
      <rect x="30" y="20" width="360" height="500" rx="14" fill="#E74C3C" fill-opacity="0.04" stroke="#E74C3C" stroke-width="2"/>
      <text x="210" y="52" text-anchor="middle" font-size="18" font-weight="700" fill="#E74C3C">SOURCE DOMAIN</text>
      <text x="210" y="72" text-anchor="middle" font-size="14" fill="#E74C3C">WAR</text>
      <text x="210" y="90" text-anchor="middle" font-size="9" fill="#6c757d">(concrete, experientially grounded)</text>

      <!-- TARGET DOMAIN: ARGUMENT -->
      <rect x="570" y="20" width="360" height="500" rx="14" fill="#7B68EE" fill-opacity="0.04" stroke="#7B68EE" stroke-width="2"/>
      <text x="750" y="52" text-anchor="middle" font-size="18" font-weight="700" fill="#7B68EE">TARGET DOMAIN</text>
      <text x="750" y="72" text-anchor="middle" font-size="14" fill="#7B68EE">ARGUMENT</text>
      <text x="750" y="90" text-anchor="middle" font-size="9" fill="#6c757d">(abstract, understood through mapping)</text>

      <!-- Mapping pairs -->
      <!-- 1. Combatants = Arguers -->
      <rect x="55" y="110" width="310" height="38" rx="8" fill="#E74C3C" fill-opacity="0.08" stroke="#E74C3C" stroke-width="1"/>
      <text x="80" y="134" text-anchor="start" font-size="12" font-weight="600" fill="#E74C3C">Combatants</text>
      <text x="340" y="134" text-anchor="end" font-size="9" fill="#6c757d" font-style="italic">two sides in conflict</text>

      <rect x="595" y="110" width="310" height="38" rx="8" fill="#7B68EE" fill-opacity="0.08" stroke="#7B68EE" stroke-width="1"/>
      <text x="620" y="134" text-anchor="start" font-size="12" font-weight="600" fill="#7B68EE">Arguers</text>
      <text x="880" y="134" text-anchor="end" font-size="9" fill="#6c757d" font-style="italic">two opposing parties</text>

      <line x1="365" y1="129" x2="590" y2="129" stroke="#F39C12" stroke-width="2" marker-end="url(#m-arrow)"/>

      <!-- 2. Attacks = Criticisms -->
      <rect x="55" y="160" width="310" height="38" rx="8" fill="#E74C3C" fill-opacity="0.08" stroke="#E74C3C" stroke-width="1"/>
      <text x="80" y="184" text-anchor="start" font-size="12" font-weight="600" fill="#E74C3C">Attacks</text>
      <text x="340" y="184" text-anchor="end" font-size="9" fill="#6c757d" font-style="italic">"attacked every weak point"</text>

      <rect x="595" y="160" width="310" height="38" rx="8" fill="#7B68EE" fill-opacity="0.08" stroke="#7B68EE" stroke-width="1"/>
      <text x="620" y="184" text-anchor="start" font-size="12" font-weight="600" fill="#7B68EE">Criticisms</text>
      <text x="880" y="184" text-anchor="end" font-size="9" fill="#6c757d" font-style="italic">challenging claims</text>

      <line x1="365" y1="179" x2="590" y2="179" stroke="#F39C12" stroke-width="2" marker-end="url(#m-arrow)"/>

      <!-- 3. Defense = Justification -->
      <rect x="55" y="210" width="310" height="38" rx="8" fill="#E74C3C" fill-opacity="0.08" stroke="#E74C3C" stroke-width="1"/>
      <text x="80" y="234" text-anchor="start" font-size="12" font-weight="600" fill="#E74C3C">Defense</text>
      <text x="340" y="234" text-anchor="end" font-size="9" fill="#6c757d" font-style="italic">"claims are indefensible"</text>

      <rect x="595" y="210" width="310" height="38" rx="8" fill="#7B68EE" fill-opacity="0.08" stroke="#7B68EE" stroke-width="1"/>
      <text x="620" y="234" text-anchor="start" font-size="12" font-weight="600" fill="#7B68EE">Justification / Rebuttal</text>
      <text x="880" y="234" text-anchor="end" font-size="9" fill="#6c757d" font-style="italic">supporting one's stance</text>

      <line x1="365" y1="229" x2="590" y2="229" stroke="#F39C12" stroke-width="2" marker-end="url(#m-arrow)"/>

      <!-- 4. Strategy = Planning -->
      <rect x="55" y="260" width="310" height="38" rx="8" fill="#E74C3C" fill-opacity="0.08" stroke="#E74C3C" stroke-width="1"/>
      <text x="80" y="284" text-anchor="start" font-size="12" font-weight="600" fill="#E74C3C">Strategy</text>
      <text x="340" y="284" text-anchor="end" font-size="9" fill="#6c757d" font-style="italic">"if you use that strategy"</text>

      <rect x="595" y="260" width="310" height="38" rx="8" fill="#7B68EE" fill-opacity="0.08" stroke="#7B68EE" stroke-width="1"/>
      <text x="620" y="284" text-anchor="start" font-size="12" font-weight="600" fill="#7B68EE">Argumentative Planning</text>
      <text x="880" y="284" text-anchor="end" font-size="9" fill="#6c757d" font-style="italic">choosing how to argue</text>

      <line x1="365" y1="279" x2="590" y2="279" stroke="#F39C12" stroke-width="2" marker-end="url(#m-arrow)"/>

      <!-- 5. Positions = Claims -->
      <rect x="55" y="310" width="310" height="38" rx="8" fill="#E74C3C" fill-opacity="0.08" stroke="#E74C3C" stroke-width="1"/>
      <text x="80" y="334" text-anchor="start" font-size="12" font-weight="600" fill="#E74C3C">Positions</text>
      <text x="340" y="334" text-anchor="end" font-size="9" fill="#6c757d" font-style="italic">territory held</text>

      <rect x="595" y="310" width="310" height="38" rx="8" fill="#7B68EE" fill-opacity="0.08" stroke="#7B68EE" stroke-width="1"/>
      <text x="620" y="334" text-anchor="start" font-size="12" font-weight="600" fill="#7B68EE">Claims / Stances</text>
      <text x="880" y="334" text-anchor="end" font-size="9" fill="#6c757d" font-style="italic">ideas defended</text>

      <line x1="365" y1="329" x2="590" y2="329" stroke="#F39C12" stroke-width="2" marker-end="url(#m-arrow)"/>

      <!-- 6. Ground = Points -->
      <rect x="55" y="360" width="310" height="38" rx="8" fill="#E74C3C" fill-opacity="0.08" stroke="#E74C3C" stroke-width="1"/>
      <text x="80" y="384" text-anchor="start" font-size="12" font-weight="600" fill="#E74C3C">Ground Gained / Lost</text>
      <text x="340" y="384" text-anchor="end" font-size="9" fill="#6c757d" font-style="italic">"demolished his argument"</text>

      <rect x="595" y="360" width="310" height="38" rx="8" fill="#7B68EE" fill-opacity="0.08" stroke="#7B68EE" stroke-width="1"/>
      <text x="620" y="384" text-anchor="start" font-size="12" font-weight="600" fill="#7B68EE">Points Won / Conceded</text>
      <text x="880" y="384" text-anchor="end" font-size="9" fill="#6c757d" font-style="italic">progress in debate</text>

      <line x1="365" y1="379" x2="590" y2="379" stroke="#F39C12" stroke-width="2" marker-end="url(#m-arrow)"/>

      <!-- 7. Winning/Losing -->
      <rect x="55" y="410" width="310" height="38" rx="8" fill="#E74C3C" fill-opacity="0.08" stroke="#E74C3C" stroke-width="1"/>
      <text x="80" y="434" text-anchor="start" font-size="12" font-weight="600" fill="#E74C3C">Winning / Losing</text>
      <text x="340" y="434" text-anchor="end" font-size="9" fill="#6c757d" font-style="italic">"she won the argument"</text>

      <rect x="595" y="410" width="310" height="38" rx="8" fill="#7B68EE" fill-opacity="0.08" stroke="#7B68EE" stroke-width="1"/>
      <text x="620" y="434" text-anchor="start" font-size="12" font-weight="600" fill="#7B68EE">Persuading / Being Persuaded</text>
      <text x="880" y="434" text-anchor="end" font-size="9" fill="#6c757d" font-style="italic">outcome of debate</text>

      <line x1="365" y1="429" x2="590" y2="429" stroke="#F39C12" stroke-width="2" marker-end="url(#m-arrow)"/>

      <!-- 8. Weapons = Rhetorical tools -->
      <rect x="55" y="460" width="310" height="38" rx="8" fill="#E74C3C" fill-opacity="0.08" stroke="#E74C3C" stroke-width="1"/>
      <text x="80" y="484" text-anchor="start" font-size="12" font-weight="600" fill="#E74C3C">Weapons</text>
      <text x="340" y="484" text-anchor="end" font-size="9" fill="#6c757d" font-style="italic">"shot down all my arguments"</text>

      <rect x="595" y="460" width="310" height="38" rx="8" fill="#7B68EE" fill-opacity="0.08" stroke="#7B68EE" stroke-width="1"/>
      <text x="620" y="484" text-anchor="start" font-size="12" font-weight="600" fill="#7B68EE">Rhetorical Tools</text>
      <text x="880" y="484" text-anchor="end" font-size="9" fill="#6c757d" font-style="italic">means of persuasion</text>

      <line x1="365" y1="479" x2="590" y2="479" stroke="#F39C12" stroke-width="2" marker-end="url(#m-arrow)"/>

      <!-- Central mapping label -->
      <rect x="430" y="35" width="100" height="25" rx="8" fill="#F39C12" fill-opacity="0.15" stroke="#F39C12" stroke-width="1.5"/>
      <text x="480" y="52" text-anchor="middle" font-size="11" font-weight="700" fill="#F39C12">MAPPING</text>

      <!-- =================== HIGHLIGHTS & HIDES SECTION =================== -->
      <line x1="30" y1="545" x2="930" y2="545" stroke="#dee2e6" stroke-width="1"/>

      <text x="480" y="578" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1a2e">What the Metaphor Highlights and Hides</text>

      <!-- Highlights -->
      <rect x="50" y="595" width="400" height="120" rx="10" fill="#27ae60" fill-opacity="0.06" stroke="#27ae60" stroke-width="1.5"/>
      <text x="250" y="620" text-anchor="middle" font-size="13" font-weight="700" fill="#27ae60">HIGHLIGHTS (made visible)</text>
      <text x="250" y="645" text-anchor="middle" font-size="10" fill="#495057">Adversarial, competitive structure</text>
      <text x="250" y="665" text-anchor="middle" font-size="10" fill="#495057">Win/lose binary outcome</text>
      <text x="250" y="685" text-anchor="middle" font-size="10" fill="#495057">Strategic planning and tactics</text>
      <text x="250" y="705" text-anchor="middle" font-size="10" fill="#495057">Attack, defense, counterattack sequence</text>

      <!-- Hides -->
      <rect x="510" y="595" width="400" height="120" rx="10" fill="#E74C3C" fill-opacity="0.06" stroke="#E74C3C" stroke-width="1.5"/>
      <text x="710" y="620" text-anchor="middle" font-size="13" font-weight="700" fill="#E74C3C">HIDES (made invisible)</text>
      <text x="710" y="645" text-anchor="middle" font-size="10" fill="#495057">Collaborative truth-seeking</text>
      <text x="710" y="665" text-anchor="middle" font-size="10" fill="#495057">Mutual understanding as goal</text>
      <text x="710" y="685" text-anchor="middle" font-size="10" fill="#495057">Exploratory, open-ended inquiry</text>
      <text x="710" y="705" text-anchor="middle" font-size="10" fill="#495057">Aesthetic qualities of reasoning</text>

      <!-- Alternative metaphor -->
      <rect x="150" y="740" width="660" height="95" rx="12" fill="#4ECDC4" fill-opacity="0.06" stroke="#4ECDC4" stroke-width="2"/>
      <text x="480" y="768" text-anchor="middle" font-size="14" font-weight="700" fill="#4ECDC4">Alternative: ARGUMENT IS A DANCE</text>
      <text x="480" y="790" text-anchor="middle" font-size="11" fill="#495057">Lakoff and Johnson's thought experiment: imagine a culture where argument is viewed as a dance,</text>
      <text x="480" y="808" text-anchor="middle" font-size="11" fill="#495057">participants are performers, and the goal is balanced, aesthetically pleasing exchange.</text>
      <text x="480" y="826" text-anchor="middle" font-size="11" fill="#495057" font-weight="600">In such a culture, the concept of "winning" an argument would be incoherent.</text>
    </svg>
  </div>
  <figcaption>
    <strong>Figure 6: ARGUMENT IS WAR -- Full Ontological Mapping</strong>
    <span>Lakoff and Johnson's opening example from Metaphors We Live By (1980) demonstrates how a conceptual metaphor systematically maps every element of a source domain (WAR) onto a target domain (ARGUMENT). The mapping is not mere decoration -- it constitutes how we experience and conduct arguments. Crucially, every metaphor both highlights and hides: ARGUMENT IS WAR makes adversarial structure visible while concealing collaborative, exploratory dimensions of argumentation. The alternative ARGUMENT IS A DANCE would produce an entirely different experience of what argument is and what counts as success.</span>
  </figcaption>
  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background: #E74C3C;"></div>Source Domain (WAR)</div>
    <div class="legend-item"><div class="legend-swatch" style="background: #F39C12;"></div>Systematic Mapping</div>
    <div class="legend-item"><div class="legend-swatch" style="background: #7B68EE;"></div>Target Domain (ARGUMENT)</div>
    <div class="legend-item"><div class="legend-swatch" style="background: #4ECDC4;"></div>Alternative Metaphor</div>
  </div>
</figure>
</body>
</html>
