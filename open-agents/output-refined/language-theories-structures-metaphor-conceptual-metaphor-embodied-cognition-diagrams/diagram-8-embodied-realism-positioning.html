<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Embodied Realism: Philosophical Positioning</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #f8f9fa;
    color: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 2rem;
  }
  figure {
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
    max-width: 1060px;
    width: 100%;
  }
  .diagram-title {
    text-align: center;
    font-size: 1.3rem;
    font-weight: 700;
    margin-bottom: 2rem;
    color: #1a1a2e;
  }
  .svg-container {
    display: flex;
    justify-content: center;
    overflow-x: auto;
    padding: 1rem 0;
  }
  svg text {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid #e9ecef;
  }
  figcaption strong {
    display: block;
    font-size: 1.1rem;
    color: #1a1a2e;
    margin-bottom: 0.4rem;
  }
  figcaption span {
    font-size: 0.88rem;
    color: #6c757d;
    line-height: 1.6;
    display: block;
  }
  .legend {
    display: flex;
    justify-content: center;
    gap: 1.5rem;
    margin-top: 1.25rem;
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.82rem;
    color: #495057;
  }
  .legend-swatch {
    width: 14px;
    height: 14px;
    border-radius: 3px;
    border: 1px solid rgba(0,0,0,0.15);
  }
  @media (prefers-color-scheme: dark) {
    body { background: #1a1a2e; color: #e9ecef; }
    figure { background: #2d2d44; box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
    .diagram-title { color: #e9ecef; }
    figcaption { border-top-color: #3d3d5c; }
    figcaption strong { color: #e9ecef; }
    figcaption span { color: #adb5bd; }
    .legend-item { color: #adb5bd; }
    svg text { fill: #e9ecef; }
    svg text.dark-text { fill: #1a1a2e; }
  }
  @media print {
    body { background: #fff; padding: 0; }
    figure { box-shadow: none; border: 1px solid #ccc; break-inside: avoid; }
  }
</style>
</head>
<body>
<figure>
  <div class="diagram-title">Embodied Realism: Philosophical Positioning Spectrum</div>
  <div class="svg-container">
    <svg viewBox="0 0 960 900" width="960" height="900" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="spectrum" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#2E86AB;stop-opacity:0.4"/>
          <stop offset="50%" style="stop-color:#F39C12;stop-opacity:0.4"/>
          <stop offset="100%" style="stop-color:#E74C3C;stop-opacity:0.4"/>
        </linearGradient>
        <marker id="pos-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#6c757d"/>
        </marker>
      </defs>

      <!-- ===================== MAIN SPECTRUM ===================== -->
      <text x="480" y="30" text-anchor="middle" font-size="15" font-weight="700" fill="#1a1a2e">The Epistemological Spectrum</text>
      <text x="480" y="50" text-anchor="middle" font-size="10" fill="#6c757d">Where does knowledge come from? What is the relationship between mind and reality?</text>

      <!-- Spectrum bar -->
      <rect x="80" y="70" width="800" height="40" rx="8" fill="url(#spectrum)" stroke="#adb5bd" stroke-width="1"/>

      <!-- Spectrum labels -->
      <text x="130" y="60" text-anchor="middle" font-size="12" font-weight="700" fill="#2E86AB">OBJECTIVISM</text>
      <text x="480" y="60" text-anchor="middle" font-size="12" font-weight="700" fill="#F39C12">EMBODIED REALISM</text>
      <text x="830" y="60" text-anchor="middle" font-size="12" font-weight="700" fill="#E74C3C">RELATIVISM</text>

      <!-- Position markers on spectrum -->
      <!-- Descartes -->
      <circle cx="120" cy="90" r="5" fill="#2E86AB" stroke="#fff" stroke-width="1.5"/>
      <line x1="120" y1="110" x2="120" y2="135" stroke="#2E86AB" stroke-width="1"/>
      <text x="120" y="150" text-anchor="middle" font-size="9" font-weight="600" fill="#2E86AB">Descartes</text>

      <!-- Kant -->
      <circle cx="220" cy="90" r="5" fill="#2E86AB" stroke="#fff" stroke-width="1.5"/>
      <line x1="220" y1="110" x2="220" y2="135" stroke="#2E86AB" stroke-width="1"/>
      <text x="220" y="150" text-anchor="middle" font-size="9" font-weight="600" fill="#2E86AB">Kant</text>

      <!-- Formal Logic -->
      <circle cx="180" cy="90" r="5" fill="#2E86AB" stroke="#fff" stroke-width="1.5"/>
      <line x1="180" y1="110" x2="180" y2="155" stroke="#2E86AB" stroke-width="1"/>
      <text x="180" y="170" text-anchor="middle" font-size="9" font-weight="600" fill="#2E86AB">Classical Logic</text>

      <!-- Mahon & Caramazza (middle-ground) -->
      <circle cx="380" cy="90" r="5" fill="#4ECDC4" stroke="#fff" stroke-width="1.5"/>
      <line x1="380" y1="110" x2="380" y2="135" stroke="#4ECDC4" stroke-width="1"/>
      <text x="380" y="150" text-anchor="middle" font-size="9" font-weight="600" fill="#4ECDC4">Mahon &amp;</text>
      <text x="380" y="163" text-anchor="middle" font-size="9" font-weight="600" fill="#4ECDC4">Caramazza</text>

      <!-- Barsalou -->
      <circle cx="440" cy="90" r="5" fill="#27ae60" stroke="#fff" stroke-width="1.5"/>
      <line x1="440" y1="110" x2="440" y2="135" stroke="#27ae60" stroke-width="1"/>
      <text x="440" y="150" text-anchor="middle" font-size="9" font-weight="600" fill="#27ae60">Barsalou</text>

      <!-- Lakoff & Johnson (center, highlighted) -->
      <circle cx="500" cy="90" r="8" fill="#F39C12" stroke="#fff" stroke-width="2"/>
      <line x1="500" y1="110" x2="500" y2="130" stroke="#F39C12" stroke-width="2"/>
      <text x="500" y="145" text-anchor="middle" font-size="10" font-weight="700" fill="#F39C12">Lakoff &amp;</text>
      <text x="500" y="160" text-anchor="middle" font-size="10" font-weight="700" fill="#F39C12">Johnson</text>

      <!-- Gibbs -->
      <circle cx="540" cy="90" r="5" fill="#27ae60" stroke="#fff" stroke-width="1.5"/>
      <line x1="540" y1="110" x2="540" y2="135" stroke="#27ae60" stroke-width="1"/>
      <text x="540" y="150" text-anchor="middle" font-size="9" font-weight="600" fill="#27ae60">Gibbs</text>

      <!-- Kovecses -->
      <circle cx="600" cy="90" r="5" fill="#7B68EE" stroke="#fff" stroke-width="1.5"/>
      <line x1="600" y1="110" x2="600" y2="135" stroke="#7B68EE" stroke-width="1"/>
      <text x="600" y="150" text-anchor="middle" font-size="9" font-weight="600" fill="#7B68EE">Kovecses</text>

      <!-- Sapir-Whorf (linguistic relativism) -->
      <circle cx="740" cy="90" r="5" fill="#E74C3C" stroke="#fff" stroke-width="1.5"/>
      <line x1="740" y1="110" x2="740" y2="135" stroke="#E74C3C" stroke-width="1"/>
      <text x="740" y="150" text-anchor="middle" font-size="9" font-weight="600" fill="#E74C3C">Sapir-Whorf</text>
      <text x="740" y="163" text-anchor="middle" font-size="9" font-weight="600" fill="#E74C3C">(strong)</text>

      <!-- Postmodernism -->
      <circle cx="840" cy="90" r="5" fill="#E74C3C" stroke="#fff" stroke-width="1.5"/>
      <line x1="840" y1="110" x2="840" y2="135" stroke="#E74C3C" stroke-width="1"/>
      <text x="840" y="150" text-anchor="middle" font-size="9" font-weight="600" fill="#E74C3C">Postmodernism</text>

      <!-- ===================== THREE POSITIONS DETAILED ===================== -->
      <line x1="40" y1="190" x2="920" y2="190" stroke="#dee2e6" stroke-width="1"/>

      <!-- Objectivism Box -->
      <rect x="40" y="210" width="270" height="300" rx="12" fill="#2E86AB" fill-opacity="0.04" stroke="#2E86AB" stroke-width="1.5"/>
      <text x="175" y="240" text-anchor="middle" font-size="15" font-weight="700" fill="#2E86AB">OBJECTIVISM</text>
      <line x1="60" y1="250" x2="290" y2="250" stroke="#2E86AB" stroke-width="0.5"/>

      <text x="175" y="272" text-anchor="middle" font-size="10" font-weight="600" fill="#495057">Core Claim:</text>
      <text x="175" y="290" text-anchor="middle" font-size="10" fill="#495057">One objective reality exists;</text>
      <text x="175" y="306" text-anchor="middle" font-size="10" fill="#495057">the mind can represent it</text>
      <text x="175" y="322" text-anchor="middle" font-size="10" fill="#495057">through disembodied reason.</text>

      <text x="175" y="350" text-anchor="middle" font-size="10" font-weight="600" fill="#495057">Key Assumptions:</text>
      <text x="175" y="370" text-anchor="middle" font-size="9" fill="#6c757d">Mind is separate from body</text>
      <text x="175" y="386" text-anchor="middle" font-size="9" fill="#6c757d">Concepts are abstract symbols</text>
      <text x="175" y="402" text-anchor="middle" font-size="9" fill="#6c757d">Logic is literal, non-metaphorical</text>
      <text x="175" y="418" text-anchor="middle" font-size="9" fill="#6c757d">Truth = correspondence to reality</text>

      <rect x="60" y="435" width="230" height="55" rx="6" fill="#E74C3C" fill-opacity="0.06" stroke="#E74C3C" stroke-width="1"/>
      <text x="175" y="455" text-anchor="middle" font-size="9" font-weight="600" fill="#E74C3C">CMT Rejects Because:</text>
      <text x="175" y="472" text-anchor="middle" font-size="9" fill="#495057">Mind IS embodied; concepts are</text>
      <text x="175" y="486" text-anchor="middle" font-size="9" fill="#495057">shaped by body, not pure reason</text>

      <!-- Embodied Realism Box (central, highlighted) -->
      <rect x="345" y="210" width="270" height="300" rx="12" fill="#F39C12" fill-opacity="0.06" stroke="#F39C12" stroke-width="2.5"/>
      <text x="480" y="240" text-anchor="middle" font-size="15" font-weight="700" fill="#F39C12">EMBODIED REALISM</text>
      <line x1="365" y1="250" x2="595" y2="250" stroke="#F39C12" stroke-width="0.5"/>

      <text x="480" y="272" text-anchor="middle" font-size="10" font-weight="600" fill="#495057">Core Claim:</text>
      <text x="480" y="290" text-anchor="middle" font-size="10" fill="#495057">Concepts are shaped by</text>
      <text x="480" y="306" text-anchor="middle" font-size="10" fill="#495057">embodiment, but embodiment</text>
      <text x="480" y="322" text-anchor="middle" font-size="10" fill="#495057">is constrained by real physics.</text>

      <text x="480" y="350" text-anchor="middle" font-size="10" font-weight="600" fill="#495057">Key Claims:</text>
      <text x="480" y="370" text-anchor="middle" font-size="9" fill="#6c757d">Mind is embodied (not disembodied)</text>
      <text x="480" y="386" text-anchor="middle" font-size="9" fill="#6c757d">Thought is mostly unconscious</text>
      <text x="480" y="402" text-anchor="middle" font-size="9" fill="#6c757d">Abstract concepts are metaphorical</text>
      <text x="480" y="418" text-anchor="middle" font-size="9" fill="#6c757d">Concepts constrained by real world</text>

      <rect x="365" y="435" width="230" height="55" rx="6" fill="#27ae60" fill-opacity="0.06" stroke="#27ae60" stroke-width="1"/>
      <text x="480" y="455" text-anchor="middle" font-size="9" font-weight="600" fill="#27ae60">The Middle Path:</text>
      <text x="480" y="472" text-anchor="middle" font-size="9" fill="#495057">Access to reality through the lens</text>
      <text x="480" y="486" text-anchor="middle" font-size="9" fill="#495057">of embodied cognition; not arbitrary</text>

      <!-- Relativism Box -->
      <rect x="650" y="210" width="270" height="300" rx="12" fill="#E74C3C" fill-opacity="0.04" stroke="#E74C3C" stroke-width="1.5"/>
      <text x="785" y="240" text-anchor="middle" font-size="15" font-weight="700" fill="#E74C3C">RELATIVISM</text>
      <line x1="670" y1="250" x2="900" y2="250" stroke="#E74C3C" stroke-width="0.5"/>

      <text x="785" y="272" text-anchor="middle" font-size="10" font-weight="600" fill="#495057">Core Claim:</text>
      <text x="785" y="290" text-anchor="middle" font-size="10" fill="#495057">No objective reality; all</text>
      <text x="785" y="306" text-anchor="middle" font-size="10" fill="#495057">perspectives are equally valid;</text>
      <text x="785" y="322" text-anchor="middle" font-size="10" fill="#495057">truth is socially constructed.</text>

      <text x="785" y="350" text-anchor="middle" font-size="10" font-weight="600" fill="#495057">Key Assumptions:</text>
      <text x="785" y="370" text-anchor="middle" font-size="9" fill="#6c757d">All knowledge is culturally relative</text>
      <text x="785" y="386" text-anchor="middle" font-size="9" fill="#6c757d">No privileged perspective</text>
      <text x="785" y="402" text-anchor="middle" font-size="9" fill="#6c757d">Language constructs reality</text>
      <text x="785" y="418" text-anchor="middle" font-size="9" fill="#6c757d">No universal cognitive structures</text>

      <rect x="670" y="435" width="230" height="55" rx="6" fill="#E74C3C" fill-opacity="0.06" stroke="#E74C3C" stroke-width="1"/>
      <text x="785" y="455" text-anchor="middle" font-size="9" font-weight="600" fill="#E74C3C">CMT Rejects Because:</text>
      <text x="785" y="472" text-anchor="middle" font-size="9" fill="#495057">Embodied concepts are NOT arbitrary;</text>
      <text x="785" y="486" text-anchor="middle" font-size="9" fill="#495057">constrained by real physical structure</text>

      <!-- ===================== CHALLENGES TO PHILOSOPHY ===================== -->
      <line x1="40" y1="530" x2="920" y2="530" stroke="#dee2e6" stroke-width="1"/>
      <text x="480" y="560" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1a2e">Challenges to Western Philosophy</text>

      <!-- Challenge cards -->
      <rect x="40" y="580" width="175" height="110" rx="8" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
      <text x="128" y="600" text-anchor="middle" font-size="10" font-weight="700" fill="#E74C3C">vs. Descartes</text>
      <text x="128" y="618" text-anchor="middle" font-size="9" fill="#495057">The cogito assumes</text>
      <text x="128" y="632" text-anchor="middle" font-size="9" fill="#495057">disembodied thought.</text>
      <text x="128" y="650" text-anchor="middle" font-size="9" font-weight="600" fill="#F39C12">CMT: No thought</text>
      <text x="128" y="664" text-anchor="middle" font-size="9" font-weight="600" fill="#F39C12">without a body.</text>
      <text x="128" y="682" text-anchor="middle" font-size="8" fill="#adb5bd">mind-body dualism rejected</text>

      <rect x="230" y="580" width="175" height="110" rx="8" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
      <text x="318" y="600" text-anchor="middle" font-size="10" font-weight="700" fill="#E74C3C">vs. Kant</text>
      <text x="318" y="618" text-anchor="middle" font-size="9" fill="#495057">Categories are pure,</text>
      <text x="318" y="632" text-anchor="middle" font-size="9" fill="#495057">a priori, universal.</text>
      <text x="318" y="650" text-anchor="middle" font-size="9" font-weight="600" fill="#F39C12">CMT: Categories are</text>
      <text x="318" y="664" text-anchor="middle" font-size="9" font-weight="600" fill="#F39C12">embodied, experiential.</text>
      <text x="318" y="682" text-anchor="middle" font-size="8" fill="#adb5bd">a priori rejected</text>

      <rect x="420" y="580" width="175" height="110" rx="8" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
      <text x="508" y="600" text-anchor="middle" font-size="10" font-weight="700" fill="#E74C3C">vs. Formal Logic</text>
      <text x="508" y="618" text-anchor="middle" font-size="9" fill="#495057">Propositions are literal,</text>
      <text x="508" y="632" text-anchor="middle" font-size="9" fill="#495057">non-metaphorical.</text>
      <text x="508" y="650" text-anchor="middle" font-size="9" font-weight="600" fill="#F39C12">CMT: Logic inherits</text>
      <text x="508" y="664" text-anchor="middle" font-size="9" font-weight="600" fill="#F39C12">from image schemas.</text>
      <text x="508" y="682" text-anchor="middle" font-size="8" fill="#adb5bd">literal semantics challenged</text>

      <rect x="610" y="580" width="175" height="110" rx="8" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
      <text x="698" y="600" text-anchor="middle" font-size="10" font-weight="700" fill="#E74C3C">vs. Moral Philosophy</text>
      <text x="698" y="618" text-anchor="middle" font-size="9" fill="#495057">Morality from</text>
      <text x="698" y="632" text-anchor="middle" font-size="9" fill="#495057">pure reason.</text>
      <text x="698" y="650" text-anchor="middle" font-size="9" font-weight="600" fill="#F39C12">CMT: Morality is</text>
      <text x="698" y="664" text-anchor="middle" font-size="9" font-weight="600" fill="#F39C12">metaphor-structured.</text>
      <text x="698" y="682" text-anchor="middle" font-size="8" fill="#adb5bd">purity, balance, accounting</text>

      <!-- ===================== ALTERNATIVE POSITIONS ===================== -->
      <line x1="40" y1="715" x2="920" y2="715" stroke="#dee2e6" stroke-width="1"/>
      <text x="480" y="745" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1a2e">Related Positions on the Embodiment Question</text>

      <!-- Barsalou's position -->
      <rect x="40" y="760" width="280" height="115" rx="10" fill="#27ae60" fill-opacity="0.06" stroke="#27ae60" stroke-width="1.5"/>
      <text x="180" y="785" text-anchor="middle" font-size="11" font-weight="700" fill="#27ae60">Barsalou: Perceptual Symbols</text>
      <line x1="60" y1="793" x2="300" y2="793" stroke="#27ae60" stroke-width="0.5"/>
      <text x="180" y="812" text-anchor="middle" font-size="9" fill="#495057">Concepts are multimodal re-enactments</text>
      <text x="180" y="828" text-anchor="middle" font-size="9" fill="#495057">of perceptual experience. Cognition =</text>
      <text x="180" y="844" text-anchor="middle" font-size="9" fill="#495057">simulation, not symbol manipulation.</text>
      <text x="180" y="864" text-anchor="middle" font-size="9" font-weight="600" fill="#27ae60">Supports strong embodiment.</text>

      <!-- Mahon/Caramazza's position -->
      <rect x="340" y="760" width="280" height="115" rx="10" fill="#4ECDC4" fill-opacity="0.06" stroke="#4ECDC4" stroke-width="1.5"/>
      <text x="480" y="785" text-anchor="middle" font-size="11" font-weight="700" fill="#4ECDC4">Mahon &amp; Caramazza: Grounding by Interaction</text>
      <line x1="360" y1="793" x2="600" y2="793" stroke="#4ECDC4" stroke-width="0.5"/>
      <text x="480" y="812" text-anchor="middle" font-size="9" fill="#495057">Concepts may have amodal core +</text>
      <text x="480" y="828" text-anchor="middle" font-size="9" fill="#495057">sensorimotor associations. Activation</text>
      <text x="480" y="844" text-anchor="middle" font-size="9" fill="#495057">may be secondary, not constitutive.</text>
      <text x="480" y="864" text-anchor="middle" font-size="9" font-weight="600" fill="#4ECDC4">Hybrid: embodied + amodal components.</text>

      <!-- Emerging consensus -->
      <rect x="640" y="760" width="280" height="115" rx="10" fill="#7B68EE" fill-opacity="0.06" stroke="#7B68EE" stroke-width="1.5"/>
      <text x="780" y="785" text-anchor="middle" font-size="11" font-weight="700" fill="#7B68EE">Emerging Consensus (2025)</text>
      <line x1="660" y1="793" x2="900" y2="793" stroke="#7B68EE" stroke-width="0.5"/>
      <text x="780" y="812" text-anchor="middle" font-size="9" fill="#495057">Growing minimalist view: abstract</text>
      <text x="780" y="828" text-anchor="middle" font-size="9" fill="#495057">concepts "come in many flavors,"</text>
      <text x="780" y="844" text-anchor="middle" font-size="9" fill="#495057">grounded through multiple modalities.</text>
      <text x="780" y="864" text-anchor="middle" font-size="9" font-weight="600" fill="#7B68EE">Hybrid account gaining ground.</text>
    </svg>
  </div>
  <figcaption>
    <strong>Figure 8: Embodied Realism -- Philosophical Positioning</strong>
    <span>Lakoff and Johnson's embodied realism occupies a deliberate middle position between objectivism (mind-independent reality accessed through disembodied reason) and relativism (no reality, all perspectives equally valid). Embodied realism holds that our conceptual system is shaped by embodiment -- we have access to reality, but always through the lens of a body interacting with the physical world. This position challenges Descartes (no disembodied mind), Kant (categories are embodied, not a priori), formal logic (propositions are metaphorically structured), and moral philosophy (moral reasoning is metaphor-grounded). Barsalou's perceptual symbol systems support strong embodiment, while Mahon and Caramazza's grounding-by-interaction offers a hybrid alternative.</span>
  </figcaption>
  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background: #2E86AB;"></div>Objectivism</div>
    <div class="legend-item"><div class="legend-swatch" style="background: #F39C12;"></div>Embodied Realism (Lakoff &amp; Johnson)</div>
    <div class="legend-item"><div class="legend-swatch" style="background: #E74C3C;"></div>Relativism</div>
    <div class="legend-item"><div class="legend-swatch" style="background: #4ECDC4;"></div>Hybrid Positions</div>
  </div>
</figure>
</body>
</html>
