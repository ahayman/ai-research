<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Invariance Principle: Topology Preservation</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #f8f9fa;
    color: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 2rem;
  }
  figure {
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
    max-width: 1060px;
    width: 100%;
  }
  .diagram-title {
    text-align: center;
    font-size: 1.3rem;
    font-weight: 700;
    margin-bottom: 0.5rem;
    color: #1a1a2e;
  }
  .diagram-subtitle {
    text-align: center;
    font-size: 0.9rem;
    color: #6c757d;
    margin-bottom: 2rem;
    font-style: italic;
  }
  .svg-container {
    display: flex;
    justify-content: center;
    overflow-x: auto;
    padding: 1rem 0;
  }
  svg text {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid #e9ecef;
  }
  figcaption strong {
    display: block;
    font-size: 1.1rem;
    color: #1a1a2e;
    margin-bottom: 0.4rem;
  }
  figcaption span {
    font-size: 0.88rem;
    color: #6c757d;
    line-height: 1.6;
    display: block;
  }
  .legend {
    display: flex;
    justify-content: center;
    gap: 1.5rem;
    margin-top: 1.25rem;
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.82rem;
    color: #495057;
  }
  .legend-swatch {
    width: 14px;
    height: 14px;
    border-radius: 3px;
    border: 1px solid rgba(0,0,0,0.15);
  }
  @media (prefers-color-scheme: dark) {
    body { background: #1a1a2e; color: #e9ecef; }
    figure { background: #2d2d44; box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
    .diagram-title { color: #e9ecef; }
    .diagram-subtitle { color: #adb5bd; }
    figcaption { border-top-color: #3d3d5c; }
    figcaption strong { color: #e9ecef; }
    figcaption span { color: #adb5bd; }
    .legend-item { color: #adb5bd; }
    svg text { fill: #e9ecef; }
    svg text.dark-text { fill: #1a1a2e; }
  }
  @media print {
    body { background: #fff; padding: 0; }
    figure { box-shadow: none; border: 1px solid #ccc; break-inside: avoid; }
  }
</style>
</head>
<body>
<figure>
  <div class="diagram-title">The Invariance Principle: Topology Preservation Across Mappings</div>
  <div class="diagram-subtitle">"Metaphorical mappings preserve the cognitive topology of the source domain" -- Lakoff (1993)</div>
  <div class="svg-container">
    <svg viewBox="0 0 960 820" width="960" height="820" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="inv-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#F39C12"/>
        </marker>
        <marker id="inv-arrow-gray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#6c757d"/>
        </marker>
      </defs>

      <!-- ===================== EXAMPLE 1: CONTAINER SCHEMA ===================== -->
      <text x="480" y="30" text-anchor="middle" font-size="15" font-weight="700" fill="#1a1a2e">Example: CONTAINER Schema Preserved in STATES ARE CONTAINERS</text>

      <!-- Source domain: Physical Container -->
      <rect x="40" y="50" width="380" height="280" rx="12" fill="#2E86AB" fill-opacity="0.04" stroke="#2E86AB" stroke-width="1.5"/>
      <text x="230" y="78" text-anchor="middle" font-size="14" font-weight="700" fill="#2E86AB">SOURCE: Physical Container</text>

      <!-- Physical container visualization -->
      <circle cx="230" cy="190" r="80" fill="#2E86AB" fill-opacity="0.06" stroke="#2E86AB" stroke-width="2.5"/>

      <!-- Interior -->
      <circle cx="230" cy="190" r="50" fill="#2E86AB" fill-opacity="0.1"/>
      <text x="230" y="185" text-anchor="middle" font-size="11" font-weight="600" fill="#2E86AB">INTERIOR</text>
      <text x="230" y="200" text-anchor="middle" font-size="9" fill="#6c757d">objects inside</text>

      <!-- Boundary label -->
      <line x1="290" y1="140" x2="320" y2="120" stroke="#E74C3C" stroke-width="1"/>
      <text x="340" y="118" text-anchor="start" font-size="10" font-weight="600" fill="#E74C3C">BOUNDARY</text>
      <text x="340" y="132" text-anchor="start" font-size="9" fill="#6c757d">wall/edge</text>

      <!-- Exterior label -->
      <text x="105" y="102" text-anchor="middle" font-size="10" font-weight="600" fill="#495057">EXTERIOR</text>
      <text x="105" y="116" text-anchor="middle" font-size="9" fill="#6c757d">outside</text>

      <!-- Logic elements -->
      <text x="230" y="290" text-anchor="middle" font-size="10" font-weight="600" fill="#2E86AB">Inherent Logic:</text>
      <text x="230" y="306" text-anchor="middle" font-size="9" fill="#495057">If A is in container, B is in A</text>
      <text x="230" y="320" text-anchor="middle" font-size="9" fill="#495057">then B is in container (transitivity)</text>

      <!-- Mapping arrow -->
      <line x1="425" y1="190" x2="530" y2="190" stroke="#F39C12" stroke-width="3" marker-end="url(#inv-arrow)"/>
      <text x="478" y="178" text-anchor="middle" font-size="11" font-weight="700" fill="#F39C12">MAPS TO</text>
      <text x="478" y="210" text-anchor="middle" font-size="9" fill="#F39C12">preserving topology</text>

      <!-- Target domain: Emotional States -->
      <rect x="540" y="50" width="390" height="280" rx="12" fill="#7B68EE" fill-opacity="0.04" stroke="#7B68EE" stroke-width="1.5"/>
      <text x="735" y="78" text-anchor="middle" font-size="14" font-weight="700" fill="#7B68EE">TARGET: Emotional States</text>

      <!-- Abstract container visualization -->
      <circle cx="735" cy="190" r="80" fill="#7B68EE" fill-opacity="0.06" stroke="#7B68EE" stroke-width="2.5" stroke-dasharray="8,4"/>

      <!-- Interior -->
      <circle cx="735" cy="190" r="50" fill="#7B68EE" fill-opacity="0.1"/>
      <text x="735" y="178" text-anchor="middle" font-size="11" font-weight="600" fill="#7B68EE">INTERIOR</text>
      <text x="735" y="193" text-anchor="middle" font-size="9" fill="#6c757d">"in love"</text>
      <text x="735" y="208" text-anchor="middle" font-size="9" fill="#6c757d">"in trouble"</text>

      <!-- Boundary label -->
      <line x1="795" y1="140" x2="830" y2="120" stroke="#E74C3C" stroke-width="1"/>
      <text x="845" y="118" text-anchor="start" font-size="10" font-weight="600" fill="#E74C3C">BOUNDARY</text>
      <text x="845" y="132" text-anchor="start" font-size="9" fill="#6c757d">"crossed the line"</text>

      <!-- Exterior label -->
      <text x="610" y="102" text-anchor="middle" font-size="10" font-weight="600" fill="#495057">EXTERIOR</text>
      <text x="610" y="116" text-anchor="middle" font-size="9" fill="#6c757d">"out of danger"</text>

      <!-- Logic preserved -->
      <text x="735" y="290" text-anchor="middle" font-size="10" font-weight="600" fill="#7B68EE">Preserved Logic:</text>
      <text x="735" y="306" text-anchor="middle" font-size="9" fill="#495057">If you're in trouble, and trouble</text>
      <text x="735" y="320" text-anchor="middle" font-size="9" fill="#495057">leads to despair, you're in despair</text>

      <!-- Structural correspondence lines -->
      <!-- Interior to Interior -->
      <rect x="410" y="140" width="140" height="20" rx="4" fill="#27ae60" fill-opacity="0.1" stroke="#27ae60" stroke-width="1"/>
      <text x="480" y="155" text-anchor="middle" font-size="8" fill="#27ae60" font-weight="600">interior = interior</text>

      <rect x="410" y="232" width="140" height="20" rx="4" fill="#27ae60" fill-opacity="0.1" stroke="#27ae60" stroke-width="1"/>
      <text x="480" y="247" text-anchor="middle" font-size="8" fill="#27ae60" font-weight="600">exterior = exterior</text>

      <rect x="410" y="258" width="140" height="20" rx="4" fill="#27ae60" fill-opacity="0.1" stroke="#27ae60" stroke-width="1"/>
      <text x="480" y="273" text-anchor="middle" font-size="8" fill="#27ae60" font-weight="600">boundary = boundary</text>

      <!-- ===================== THE PRINCIPLE ===================== -->
      <line x1="40" y1="355" x2="920" y2="355" stroke="#dee2e6" stroke-width="1"/>

      <rect x="120" y="375" width="720" height="80" rx="12" fill="#F39C12" fill-opacity="0.06" stroke="#F39C12" stroke-width="2"/>
      <text x="480" y="402" text-anchor="middle" font-size="13" font-weight="700" fill="#F39C12">The Invariance Principle (Lakoff, 1990)</text>
      <text x="480" y="425" text-anchor="middle" font-size="11" fill="#495057">Metaphorical mappings preserve the cognitive topology (image-schema structure)</text>
      <text x="480" y="442" text-anchor="middle" font-size="11" fill="#495057">of the source domain, in a way consistent with the inherent structure of the target domain.</text>

      <!-- ===================== THREE CONSTRAINTS ===================== -->
      <text x="480" y="490" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1a2e">Three Constraints on Mapping</text>

      <!-- Constraint 1 -->
      <rect x="40" y="510" width="280" height="130" rx="10" fill="#27ae60" fill-opacity="0.06" stroke="#27ae60" stroke-width="1.5"/>
      <text x="180" y="538" text-anchor="middle" font-size="12" font-weight="700" fill="#27ae60">1. Topology Preserved</text>
      <line x1="60" y1="548" x2="300" y2="548" stroke="#27ae60" stroke-width="0.5"/>
      <text x="180" y="570" text-anchor="middle" font-size="10" fill="#495057">Source interiors map to</text>
      <text x="180" y="586" text-anchor="middle" font-size="10" fill="#495057">target interiors; exteriors</text>
      <text x="180" y="602" text-anchor="middle" font-size="10" fill="#495057">to exteriors; paths to paths.</text>
      <text x="180" y="625" text-anchor="middle" font-size="9" fill="#6c757d" font-style="italic">Structural relations are kept intact.</text>

      <!-- Constraint 2 -->
      <rect x="340" y="510" width="280" height="130" rx="10" fill="#E74C3C" fill-opacity="0.06" stroke="#E74C3C" stroke-width="1.5"/>
      <text x="480" y="538" text-anchor="middle" font-size="12" font-weight="700" fill="#E74C3C">2. Target Constrains Import</text>
      <line x1="360" y1="548" x2="600" y2="548" stroke="#E74C3C" stroke-width="0.5"/>
      <text x="480" y="570" text-anchor="middle" font-size="10" fill="#495057">The target domain has its</text>
      <text x="480" y="586" text-anchor="middle" font-size="10" fill="#495057">own inherent structure that</text>
      <text x="480" y="602" text-anchor="middle" font-size="10" fill="#495057">cannot be overridden.</text>
      <text x="480" y="625" text-anchor="middle" font-size="9" fill="#6c757d" font-style="italic">Only compatible structure is imported.</text>

      <!-- Constraint 3 -->
      <rect x="640" y="510" width="280" height="130" rx="10" fill="#7B68EE" fill-opacity="0.06" stroke="#7B68EE" stroke-width="1.5"/>
      <text x="780" y="538" text-anchor="middle" font-size="12" font-weight="700" fill="#7B68EE">3. Mapping Is Partial</text>
      <line x1="660" y1="548" x2="900" y2="548" stroke="#7B68EE" stroke-width="0.5"/>
      <text x="780" y="570" text-anchor="middle" font-size="10" fill="#495057">Not every aspect of the</text>
      <text x="780" y="586" text-anchor="middle" font-size="10" fill="#495057">source maps to the target.</text>
      <text x="780" y="602" text-anchor="middle" font-size="10" fill="#495057">The mapping is selective.</text>
      <text x="780" y="625" text-anchor="middle" font-size="9" fill="#6c757d" font-style="italic">Highlights some, hides other features.</text>

      <!-- ===================== DEEPER IMPLICATION ===================== -->
      <line x1="40" y1="665" x2="920" y2="665" stroke="#dee2e6" stroke-width="1"/>

      <text x="480" y="698" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1a2e">Deeper Implication: Abstract Reasoning as Spatial Reasoning</text>

      <!-- Visual showing topology transfer -->
      <rect x="80" y="715" width="360" height="90" rx="10" fill="#2E86AB" fill-opacity="0.06" stroke="#2E86AB" stroke-width="1.5"/>
      <text x="260" y="740" text-anchor="middle" font-size="12" font-weight="700" fill="#2E86AB">Spatial Inference</text>
      <text x="260" y="760" text-anchor="middle" font-size="10" fill="#495057">If you start at A and follow a path to B,</text>
      <text x="260" y="778" text-anchor="middle" font-size="10" fill="#495057">you pass through all intermediate points.</text>
      <text x="260" y="796" text-anchor="middle" font-size="9" fill="#6c757d">(inherent in SOURCE-PATH-GOAL)</text>

      <line x1="445" y1="760" x2="515" y2="760" stroke="#F39C12" stroke-width="2.5" marker-end="url(#inv-arrow)"/>
      <text x="480" y="750" text-anchor="middle" font-size="9" fill="#F39C12" font-weight="600">becomes</text>

      <rect x="520" y="715" width="360" height="90" rx="10" fill="#7B68EE" fill-opacity="0.06" stroke="#7B68EE" stroke-width="1.5"/>
      <text x="700" y="740" text-anchor="middle" font-size="12" font-weight="700" fill="#7B68EE">Abstract Inference</text>
      <text x="700" y="760" text-anchor="middle" font-size="10" fill="#495057">If you're going from novice to expert,</text>
      <text x="700" y="778" text-anchor="middle" font-size="10" fill="#495057">you must pass through intermediate stages.</text>
      <text x="700" y="796" text-anchor="middle" font-size="9" fill="#6c757d">(inherited via LIFE IS A JOURNEY)</text>
    </svg>
  </div>
  <figcaption>
    <strong>Figure 7: The Invariance Principle -- Topology Preservation</strong>
    <span>Lakoff's Invariance Principle (1990, 1993) constrains metaphorical mappings: the image-schematic structure of the source domain must be preserved in the target domain, consistent with the target's own inherent structure. Using the CONTAINER schema as an example, when we map physical containment onto emotional states (STATES ARE CONTAINERS), the topological relations -- interior, boundary, exterior, and their logical relationships (transitivity, excluded middle) -- are preserved. This preservation is not coincidental but systematic, leading to the profound possibility that most abstract inferences are actually metaphorical versions of spatial inferences.</span>
  </figcaption>
  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background: #2E86AB;"></div>Source Domain (Spatial)</div>
    <div class="legend-item"><div class="legend-swatch" style="background: #F39C12;"></div>Topology-Preserving Mapping</div>
    <div class="legend-item"><div class="legend-swatch" style="background: #7B68EE;"></div>Target Domain (Abstract)</div>
    <div class="legend-item"><div class="legend-swatch" style="background: #27ae60;"></div>Preserved Structure</div>
  </div>
</figure>
</body>
</html>
