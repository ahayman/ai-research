<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Schema Visual Gallery</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #f8f9fa;
    color: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 2rem;
  }
  figure {
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
    max-width: 1100px;
    width: 100%;
  }
  .diagram-title {
    text-align: center;
    font-size: 1.3rem;
    font-weight: 700;
    margin-bottom: 0.5rem;
    color: #1a1a2e;
  }
  .diagram-subtitle {
    text-align: center;
    font-size: 0.9rem;
    color: #6c757d;
    margin-bottom: 2rem;
  }
  .gallery {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1.5rem;
  }
  .schema-card {
    border: 1.5px solid #e9ecef;
    border-radius: 12px;
    padding: 1.2rem;
    text-align: center;
    transition: box-shadow 0.2s;
  }
  .schema-card:hover {
    box-shadow: 0 4px 16px rgba(0,0,0,0.08);
  }
  .schema-name {
    font-size: 0.85rem;
    font-weight: 700;
    color: #2E86AB;
    margin-bottom: 0.6rem;
    letter-spacing: 0.5px;
  }
  .schema-svg {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 120px;
    margin-bottom: 0.8rem;
  }
  .schema-elements {
    font-size: 0.72rem;
    color: #495057;
    margin-bottom: 0.5rem;
    font-weight: 600;
  }
  .schema-examples {
    font-size: 0.7rem;
    color: #6c757d;
    line-height: 1.5;
    text-align: left;
  }
  .schema-examples em {
    color: #7B68EE;
    font-style: normal;
    font-weight: 600;
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid #e9ecef;
  }
  figcaption strong {
    display: block;
    font-size: 1.1rem;
    color: #1a1a2e;
    margin-bottom: 0.4rem;
  }
  figcaption span {
    font-size: 0.88rem;
    color: #6c757d;
    line-height: 1.6;
    display: block;
  }
  @media (prefers-color-scheme: dark) {
    body { background: #1a1a2e; color: #e9ecef; }
    figure { background: #2d2d44; box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
    .diagram-title { color: #e9ecef; }
    .diagram-subtitle { color: #adb5bd; }
    .schema-card { border-color: #3d3d5c; background: #35354f; }
    .schema-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.2); }
    .schema-name { color: #4ECDC4; }
    .schema-elements { color: #adb5bd; }
    .schema-examples { color: #9ca3af; }
    .schema-examples em { color: #a78bfa; }
    figcaption { border-top-color: #3d3d5c; }
    figcaption strong { color: #e9ecef; }
    figcaption span { color: #adb5bd; }
  }
  @media (max-width: 768px) {
    .gallery { grid-template-columns: repeat(2, 1fr); }
  }
  @media print {
    body { background: #fff; padding: 0; }
    figure { box-shadow: none; border: 1px solid #ccc; break-inside: avoid; }
  }
</style>
</head>
<body>
<figure>
  <div class="diagram-title">Image Schema Visual Gallery</div>
  <div class="diagram-subtitle">The skeletal structures of embodied thought (Johnson, 1987)</div>
  <div class="gallery">

    <!-- CONTAINER -->
    <div class="schema-card">
      <div class="schema-name">CONTAINER</div>
      <div class="schema-svg">
        <svg viewBox="0 0 140 110" width="140" height="110">
          <circle cx="70" cy="55" r="42" fill="none" stroke="#2E86AB" stroke-width="2.5" stroke-dasharray="none"/>
          <circle cx="70" cy="55" r="42" fill="#2E86AB" fill-opacity="0.08"/>
          <text x="70" y="50" text-anchor="middle" font-size="10" fill="#2E86AB" font-weight="600">INTERIOR</text>
          <text x="70" y="64" text-anchor="middle" font-size="8" fill="#6c757d">bounded</text>
          <text x="70" y="14" text-anchor="middle" font-size="9" fill="#999">EXTERIOR</text>
          <text x="70" y="100" text-anchor="middle" font-size="9" fill="#999">EXTERIOR</text>
          <line x1="102" y1="30" x2="112" y2="22" stroke="#E74C3C" stroke-width="1"/>
          <text x="126" y="22" text-anchor="middle" font-size="7" fill="#E74C3C">BOUNDARY</text>
        </svg>
      </div>
      <div class="schema-elements">Interior + Boundary + Exterior</div>
      <div class="schema-examples">
        <em>STATES ARE CONTAINERS:</em> "in love," "out of trouble"<br>
        <em>MIND IS CONTAINER:</em> "can't get it out of my head"
      </div>
    </div>

    <!-- SOURCE-PATH-GOAL -->
    <div class="schema-card">
      <div class="schema-name">SOURCE-PATH-GOAL</div>
      <div class="schema-svg">
        <svg viewBox="0 0 140 110" width="140" height="110">
          <defs>
            <marker id="arr-spg" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
              <path d="M 0 0 L 10 5 L 0 10 z" fill="#2E86AB"/>
            </marker>
          </defs>
          <circle cx="20" cy="55" r="8" fill="#2E86AB" fill-opacity="0.3" stroke="#2E86AB" stroke-width="1.5"/>
          <text x="20" y="58" text-anchor="middle" font-size="7" fill="#2E86AB" font-weight="600">S</text>
          <line x1="30" y1="55" x2="105" y2="55" stroke="#2E86AB" stroke-width="2.5" marker-end="url(#arr-spg)" stroke-dasharray="6,3"/>
          <circle cx="120" cy="55" r="8" fill="#E74C3C" fill-opacity="0.3" stroke="#E74C3C" stroke-width="1.5"/>
          <text x="120" y="58" text-anchor="middle" font-size="7" fill="#E74C3C" font-weight="600">G</text>
          <text x="20" y="78" text-anchor="middle" font-size="7" fill="#6c757d">Source</text>
          <text x="70" y="45" text-anchor="middle" font-size="8" fill="#6c757d">PATH</text>
          <text x="120" y="78" text-anchor="middle" font-size="7" fill="#6c757d">Goal</text>
          <text x="70" y="92" text-anchor="middle" font-size="7" fill="#999" font-style="italic">direction of motion</text>
        </svg>
      </div>
      <div class="schema-elements">Source + Path + Goal + Direction</div>
      <div class="schema-examples">
        <em>LIFE IS A JOURNEY:</em> "at a crossroads"<br>
        <em>PURPOSES ARE DESTINATIONS:</em> "reached her goal"
      </div>
    </div>

    <!-- FORCE -->
    <div class="schema-card">
      <div class="schema-name">FORCE</div>
      <div class="schema-svg">
        <svg viewBox="0 0 140 110" width="140" height="110">
          <defs>
            <marker id="arr-f1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
              <path d="M 0 0 L 10 5 L 0 10 z" fill="#E74C3C"/>
            </marker>
            <marker id="arr-f2" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="5" markerHeight="5" orient="auto">
              <path d="M 10 0 L 0 5 L 10 10 z" fill="#2E86AB"/>
            </marker>
          </defs>
          <!-- Compulsion arrow -->
          <line x1="15" y1="35" x2="55" y2="35" stroke="#E74C3C" stroke-width="3" marker-end="url(#arr-f1)"/>
          <text x="35" y="28" text-anchor="middle" font-size="7" fill="#E74C3C">PUSH</text>
          <!-- Object being pushed -->
          <rect x="60" y="25" width="20" height="20" rx="3" fill="#6c757d" fill-opacity="0.3" stroke="#6c757d" stroke-width="1.5"/>
          <!-- Resistance/blockage -->
          <rect x="95" y="15" width="8" height="40" rx="2" fill="#495057" fill-opacity="0.4" stroke="#495057" stroke-width="1.5"/>
          <text x="110" y="38" text-anchor="start" font-size="7" fill="#495057">BLOCK</text>
          <!-- Counterforce -->
          <line x1="130" y1="80" x2="80" y2="80" stroke="#2E86AB" stroke-width="2.5" marker-end="url(#arr-f2)"/>
          <line x1="15" y1="80" x2="65" y2="80" stroke="#E74C3C" stroke-width="2.5" marker-end="url(#arr-f1)"/>
          <text x="70" y="100" text-anchor="middle" font-size="7" fill="#6c757d">COUNTERFORCE</text>
        </svg>
      </div>
      <div class="schema-elements">Compulsion, Blockage, Counterforce, Diversion</div>
      <div class="schema-examples">
        <em>CAUSES ARE FORCES:</em> "driven to succeed"<br>
        <em>EMOTIONS ARE FORCES:</em> "overwhelmed by grief"
      </div>
    </div>

    <!-- BALANCE -->
    <div class="schema-card">
      <div class="schema-name">BALANCE</div>
      <div class="schema-svg">
        <svg viewBox="0 0 140 110" width="140" height="110">
          <!-- Fulcrum -->
          <polygon points="70,80 60,95 80,95" fill="#F39C12" fill-opacity="0.3" stroke="#F39C12" stroke-width="1.5"/>
          <!-- Beam -->
          <line x1="20" y1="60" x2="120" y2="60" stroke="#2E86AB" stroke-width="2.5"/>
          <!-- Left pan -->
          <line x1="30" y1="60" x2="30" y2="75" stroke="#6c757d" stroke-width="1.5"/>
          <path d="M 15 75 Q 30 82 45 75" stroke="#6c757d" stroke-width="1.5" fill="none"/>
          <rect x="22" y="52" width="16" height="8" rx="2" fill="#7B68EE" fill-opacity="0.4"/>
          <!-- Right pan -->
          <line x1="110" y1="60" x2="110" y2="75" stroke="#6c757d" stroke-width="1.5"/>
          <path d="M 95 75 Q 110 82 125 75" stroke="#6c757d" stroke-width="1.5" fill="none"/>
          <rect x="102" y="52" width="16" height="8" rx="2" fill="#7B68EE" fill-opacity="0.4"/>
          <!-- Fulcrum point -->
          <circle cx="70" cy="60" r="4" fill="#F39C12"/>
          <!-- Labels -->
          <text x="70" y="25" text-anchor="middle" font-size="8" fill="#6c757d">EQUILIBRIUM</text>
          <line x1="70" y1="28" x2="70" y2="55" stroke="#6c757d" stroke-width="0.5" stroke-dasharray="3,2"/>
        </svg>
      </div>
      <div class="schema-elements">Fulcrum + Forces + Equilibrium</div>
      <div class="schema-examples">
        <em>JUSTICE IS BALANCE:</em> "scales of justice"<br>
        <em>WELL-BEING IS BALANCE:</em> "well-balanced person"
      </div>
    </div>

    <!-- UP-DOWN -->
    <div class="schema-card">
      <div class="schema-name">UP-DOWN</div>
      <div class="schema-svg">
        <svg viewBox="0 0 140 110" width="140" height="110">
          <defs>
            <linearGradient id="vert-grad" x1="0%" y1="0%" x2="0%" y2="100%">
              <stop offset="0%" style="stop-color:#2E86AB;stop-opacity:0.5"/>
              <stop offset="100%" style="stop-color:#E74C3C;stop-opacity:0.3"/>
            </linearGradient>
            <marker id="arr-up" viewBox="0 0 10 10" refX="5" refY="0" markerWidth="6" markerHeight="6" orient="auto">
              <path d="M 0 10 L 5 0 L 10 10 z" fill="#2E86AB"/>
            </marker>
          </defs>
          <!-- Vertical axis -->
          <rect x="60" y="12" width="20" height="88" rx="4" fill="url(#vert-grad)"/>
          <line x1="70" y1="100" x2="70" y2="14" stroke="#495057" stroke-width="1.5" marker-end="url(#arr-up)"/>
          <!-- UP labels -->
          <text x="95" y="22" text-anchor="start" font-size="8" fill="#2E86AB" font-weight="600">MORE</text>
          <text x="95" y="33" text-anchor="start" font-size="8" fill="#2E86AB" font-weight="600">HAPPY</text>
          <text x="95" y="44" text-anchor="start" font-size="8" fill="#2E86AB" font-weight="600">GOOD</text>
          <text x="95" y="55" text-anchor="start" font-size="8" fill="#2E86AB" font-weight="600">CONTROL</text>
          <!-- DOWN labels -->
          <text x="95" y="72" text-anchor="start" font-size="8" fill="#E74C3C" font-weight="600">LESS</text>
          <text x="95" y="83" text-anchor="start" font-size="8" fill="#E74C3C" font-weight="600">SAD</text>
          <text x="95" y="94" text-anchor="start" font-size="8" fill="#E74C3C" font-weight="600">BAD</text>
          <!-- UP/DOWN labels -->
          <text x="40" y="22" text-anchor="end" font-size="9" fill="#2E86AB" font-weight="700">UP</text>
          <text x="40" y="98" text-anchor="end" font-size="9" fill="#E74C3C" font-weight="700">DOWN</text>
          <!-- Gravity arrow -->
          <text x="20" y="60" text-anchor="middle" font-size="7" fill="#999" transform="rotate(-90 20 60)">gravity</text>
        </svg>
      </div>
      <div class="schema-elements">Vertical axis + Gravitational asymmetry</div>
      <div class="schema-examples">
        <em>MORE IS UP:</em> "prices are rising"<br>
        <em>HAPPY IS UP:</em> "feeling up / down in the dumps"
      </div>
    </div>

    <!-- CENTER-PERIPHERY -->
    <div class="schema-card">
      <div class="schema-name">CENTER-PERIPHERY</div>
      <div class="schema-svg">
        <svg viewBox="0 0 140 110" width="140" height="110">
          <!-- Outer ring -->
          <circle cx="70" cy="55" r="42" fill="none" stroke="#adb5bd" stroke-width="1" stroke-dasharray="4,3"/>
          <circle cx="70" cy="55" r="30" fill="none" stroke="#6c757d" stroke-width="1" stroke-dasharray="4,3"/>
          <!-- Center dot -->
          <circle cx="70" cy="55" r="14" fill="#E74C3C" fill-opacity="0.2" stroke="#E74C3C" stroke-width="2"/>
          <circle cx="70" cy="55" r="4" fill="#E74C3C"/>
          <!-- Labels -->
          <text x="70" y="42" text-anchor="middle" font-size="7" fill="#E74C3C" font-weight="600">CENTER</text>
          <text x="70" y="74" text-anchor="middle" font-size="7" fill="#E74C3C" font-weight="600">core</text>
          <text x="120" y="20" text-anchor="middle" font-size="7" fill="#999">PERIPHERY</text>
          <text x="25" y="98" text-anchor="middle" font-size="7" fill="#999">margin</text>
          <!-- Radial lines -->
          <line x1="70" y1="41" x2="70" y2="15" stroke="#ddd" stroke-width="0.5" stroke-dasharray="2,2"/>
          <line x1="84" y1="55" x2="112" y2="55" stroke="#ddd" stroke-width="0.5" stroke-dasharray="2,2"/>
        </svg>
      </div>
      <div class="schema-elements">Center + Periphery + Gradient</div>
      <div class="schema-examples">
        <em>IMPORTANT IS CENTRAL:</em> "core values"<br>
        <em>MAINSTREAM IS CENTER:</em> "fringe beliefs"
      </div>
    </div>

    <!-- LINK -->
    <div class="schema-card">
      <div class="schema-name">LINK</div>
      <div class="schema-svg">
        <svg viewBox="0 0 140 110" width="140" height="110">
          <!-- Two entities -->
          <circle cx="35" cy="55" r="18" fill="#7B68EE" fill-opacity="0.15" stroke="#7B68EE" stroke-width="2"/>
          <text x="35" y="58" text-anchor="middle" font-size="9" fill="#7B68EE" font-weight="600">A</text>
          <circle cx="105" cy="55" r="18" fill="#7B68EE" fill-opacity="0.15" stroke="#7B68EE" stroke-width="2"/>
          <text x="105" y="58" text-anchor="middle" font-size="9" fill="#7B68EE" font-weight="600">B</text>
          <!-- Link line -->
          <line x1="53" y1="55" x2="87" y2="55" stroke="#F39C12" stroke-width="3"/>
          <circle cx="70" cy="55" r="3" fill="#F39C12"/>
          <!-- Labels -->
          <text x="70" y="40" text-anchor="middle" font-size="8" fill="#F39C12" font-weight="600">BOND</text>
          <!-- Broken link below -->
          <line x1="30" y1="90" x2="55" y2="90" stroke="#E74C3C" stroke-width="2"/>
          <line x1="85" y1="90" x2="110" y2="90" stroke="#E74C3C" stroke-width="2"/>
          <text x="70" y="93" text-anchor="middle" font-size="7" fill="#E74C3C">broken</text>
        </svg>
      </div>
      <div class="schema-elements">Entities + Connection + Bond</div>
      <div class="schema-examples">
        <em>RELATIONSHIPS ARE LINKS:</em> "tied to each other"<br>
        <em>LOGIC IS CONNECTION:</em> "chain of reasoning"
      </div>
    </div>

    <!-- PART-WHOLE -->
    <div class="schema-card">
      <div class="schema-name">PART-WHOLE</div>
      <div class="schema-svg">
        <svg viewBox="0 0 140 110" width="140" height="110">
          <!-- Whole -->
          <circle cx="70" cy="55" r="42" fill="#2E86AB" fill-opacity="0.06" stroke="#2E86AB" stroke-width="2"/>
          <text x="70" y="22" text-anchor="middle" font-size="8" fill="#2E86AB" font-weight="600">WHOLE</text>
          <!-- Parts -->
          <circle cx="50" cy="50" r="12" fill="#E74C3C" fill-opacity="0.15" stroke="#E74C3C" stroke-width="1.5"/>
          <text x="50" y="53" text-anchor="middle" font-size="7" fill="#E74C3C">part</text>
          <circle cx="85" cy="42" r="10" fill="#7B68EE" fill-opacity="0.15" stroke="#7B68EE" stroke-width="1.5"/>
          <text x="85" y="45" text-anchor="middle" font-size="7" fill="#7B68EE">part</text>
          <circle cx="60" cy="75" r="11" fill="#F39C12" fill-opacity="0.15" stroke="#F39C12" stroke-width="1.5"/>
          <text x="60" y="78" text-anchor="middle" font-size="7" fill="#F39C12">part</text>
          <circle cx="90" cy="68" r="9" fill="#27ae60" fill-opacity="0.15" stroke="#27ae60" stroke-width="1.5"/>
          <text x="90" y="71" text-anchor="middle" font-size="7" fill="#27ae60">part</text>
        </svg>
      </div>
      <div class="schema-elements">Whole + Parts + Composition</div>
      <div class="schema-examples">
        <em>GROUPS ARE BODIES:</em> "head of the organization"<br>
        <em>THEORIES HAVE PARTS:</em> "piece of the puzzle"
      </div>
    </div>

  </div>
  <figcaption>
    <strong>Figure 2: The Eight Major Image Schemas</strong>
    <span>Image schemas are pre-linguistic, dynamic patterns abstracted from repeated sensorimotor experience (Johnson, 1987). They are not visual images but skeletal structures -- the most fundamental spatial, force-dynamic, and kinesthetic patterns of embodied interaction. These schemas serve as the structural foundation for metaphorical mappings: when we say we are "in" love or "out of" trouble, we deploy the CONTAINER schema; when we say someone "reached" their goal, we deploy SOURCE-PATH-GOAL. Each schema carries its own inherent logic, which is then inherited by the abstract domains it structures.</span>
  </figcaption>
</figure>
</body>
</html>
