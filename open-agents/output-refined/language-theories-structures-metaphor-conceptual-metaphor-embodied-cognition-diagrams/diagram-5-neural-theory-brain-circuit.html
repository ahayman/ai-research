<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neural Theory of Metaphor: Brain Circuit Diagram</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #f8f9fa;
    color: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 2rem;
  }
  figure {
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
    max-width: 1060px;
    width: 100%;
  }
  .diagram-title {
    text-align: center;
    font-size: 1.3rem;
    font-weight: 700;
    margin-bottom: 2rem;
    color: #1a1a2e;
  }
  .svg-container {
    display: flex;
    justify-content: center;
    overflow-x: auto;
    padding: 1rem 0;
  }
  svg text {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid #e9ecef;
  }
  figcaption strong {
    display: block;
    font-size: 1.1rem;
    color: #1a1a2e;
    margin-bottom: 0.4rem;
  }
  figcaption span {
    font-size: 0.88rem;
    color: #6c757d;
    line-height: 1.6;
    display: block;
  }
  .legend {
    display: flex;
    justify-content: center;
    gap: 1.5rem;
    margin-top: 1.25rem;
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.82rem;
    color: #495057;
  }
  .legend-swatch {
    width: 14px;
    height: 14px;
    border-radius: 3px;
    border: 1px solid rgba(0,0,0,0.15);
  }
  @media (prefers-color-scheme: dark) {
    body { background: #1a1a2e; color: #e9ecef; }
    figure { background: #2d2d44; box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
    .diagram-title { color: #e9ecef; }
    figcaption { border-top-color: #3d3d5c; }
    figcaption strong { color: #e9ecef; }
    figcaption span { color: #adb5bd; }
    .legend-item { color: #adb5bd; }
    svg text { fill: #e9ecef; }
    svg text.dark-text { fill: #1a1a2e; }
  }
  @media print {
    body { background: #fff; padding: 0; }
    figure { box-shadow: none; border: 1px solid #ccc; break-inside: avoid; }
  }
</style>
</head>
<body>
<figure>
  <div class="diagram-title">Neural Theory of Metaphor: From Conflation to Cascade</div>
  <div class="svg-container">
    <svg viewBox="0 0 960 880" width="960" height="880" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="n-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#6c757d"/>
        </marker>
        <marker id="n-arrow-gold" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#F39C12"/>
        </marker>
      </defs>

      <!-- ===================== SECTION 1: DEVELOPMENTAL PROCESS ===================== -->
      <text x="480" y="25" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1a2e">Developmental Process: How Primary Metaphors Form</text>

      <!-- Phase 1: Conflation -->
      <rect x="30" y="45" width="280" height="200" rx="12" fill="#E74C3C" fill-opacity="0.06" stroke="#E74C3C" stroke-width="1.5"/>
      <text x="170" y="70" text-anchor="middle" font-size="13" font-weight="700" fill="#E74C3C">PHASE 1: CONFLATION</text>
      <text x="170" y="88" text-anchor="middle" font-size="9" fill="#6c757d">Early childhood (0-3 years)</text>

      <!-- Brain simplified - sensorimotor area -->
      <ellipse cx="110" cy="160" rx="55" ry="40" fill="#2E86AB" fill-opacity="0.2" stroke="#2E86AB" stroke-width="1.5"/>
      <text x="110" y="152" text-anchor="middle" font-size="9" font-weight="600" fill="#2E86AB">Sensorimotor</text>
      <text x="110" y="165" text-anchor="middle" font-size="9" font-weight="600" fill="#2E86AB">Circuit</text>
      <text x="110" y="180" text-anchor="middle" font-size="8" fill="#6c757d">(warmth)</text>

      <!-- Abstract area -->
      <ellipse cx="230" cy="160" rx="55" ry="40" fill="#7B68EE" fill-opacity="0.2" stroke="#7B68EE" stroke-width="1.5"/>
      <text x="230" y="152" text-anchor="middle" font-size="9" font-weight="600" fill="#7B68EE">Subjective</text>
      <text x="230" y="165" text-anchor="middle" font-size="9" font-weight="600" fill="#7B68EE">Experience</text>
      <text x="230" y="180" text-anchor="middle" font-size="8" fill="#6c757d">(affection)</text>

      <!-- Overlap indicator -->
      <path d="M 145 130 Q 170 120 195 130" stroke="#F39C12" stroke-width="2" fill="none"/>
      <path d="M 145 190 Q 170 200 195 190" stroke="#F39C12" stroke-width="2" fill="none"/>
      <text x="170" y="215" text-anchor="middle" font-size="8" fill="#F39C12" font-weight="600">fire simultaneously</text>
      <text x="170" y="228" text-anchor="middle" font-size="8" fill="#F39C12" font-weight="600">(undifferentiated)</text>

      <!-- Arrow to Phase 2 -->
      <line x1="310" y1="145" x2="340" y2="145" stroke="#6c757d" stroke-width="2" marker-end="url(#n-arrow)"/>

      <!-- Phase 2: Hebbian Learning -->
      <rect x="345" y="45" width="270" height="200" rx="12" fill="#F39C12" fill-opacity="0.06" stroke="#F39C12" stroke-width="1.5"/>
      <text x="480" y="70" text-anchor="middle" font-size="13" font-weight="700" fill="#F39C12">PHASE 2: HEBBIAN LEARNING</text>
      <text x="480" y="88" text-anchor="middle" font-size="9" fill="#6c757d">"Neurons that fire together wire together"</text>

      <!-- Neural nodes with connections forming -->
      <circle cx="410" cy="145" r="8" fill="#2E86AB"/>
      <circle cx="430" cy="165" r="6" fill="#2E86AB"/>
      <circle cx="400" cy="175" r="7" fill="#2E86AB"/>
      <circle cx="550" cy="145" r="8" fill="#7B68EE"/>
      <circle cx="540" cy="170" r="6" fill="#7B68EE"/>
      <circle cx="560" cy="160" r="7" fill="#7B68EE"/>

      <!-- Connections forming -->
      <line x1="418" y1="145" x2="542" y2="145" stroke="#F39C12" stroke-width="2" stroke-dasharray="4,3"/>
      <line x1="436" y1="165" x2="534" y2="170" stroke="#F39C12" stroke-width="1.5" stroke-dasharray="4,3"/>
      <line x1="407" y1="175" x2="533" y2="170" stroke="#F39C12" stroke-width="1.5" stroke-dasharray="4,3"/>

      <!-- Repeated co-activation -->
      <text x="480" y="128" text-anchor="middle" font-size="8" fill="#F39C12" font-weight="600">repeated co-activation</text>
      <text x="480" y="200" text-anchor="middle" font-size="8" fill="#F39C12" font-weight="600">strong neural connections form</text>
      <text x="480" y="215" text-anchor="middle" font-size="8" fill="#6c757d">cross-domain wiring established</text>
      <text x="480" y="228" text-anchor="middle" font-size="8" fill="#6c757d">during critical developmental period</text>

      <!-- Arrow to Phase 3 -->
      <line x1="615" y1="145" x2="650" y2="145" stroke="#6c757d" stroke-width="2" marker-end="url(#n-arrow)"/>

      <!-- Phase 3: Differentiation -->
      <rect x="655" y="45" width="280" height="200" rx="12" fill="#27ae60" fill-opacity="0.06" stroke="#27ae60" stroke-width="1.5"/>
      <text x="795" y="70" text-anchor="middle" font-size="13" font-weight="700" fill="#27ae60">PHASE 3: DIFFERENTIATION</text>
      <text x="795" y="88" text-anchor="middle" font-size="9" fill="#6c757d">Domains separate, connections persist</text>

      <!-- Two distinct but connected circuits -->
      <ellipse cx="730" cy="160" rx="45" ry="35" fill="#2E86AB" fill-opacity="0.15" stroke="#2E86AB" stroke-width="1.5"/>
      <text x="730" y="155" text-anchor="middle" font-size="9" font-weight="600" fill="#2E86AB">Warmth</text>
      <text x="730" y="170" text-anchor="middle" font-size="9" fill="#2E86AB">circuit</text>

      <ellipse cx="860" cy="160" rx="45" ry="35" fill="#7B68EE" fill-opacity="0.15" stroke="#7B68EE" stroke-width="1.5"/>
      <text x="860" y="155" text-anchor="middle" font-size="9" font-weight="600" fill="#7B68EE">Affection</text>
      <text x="860" y="170" text-anchor="middle" font-size="9" fill="#7B68EE">circuit</text>

      <!-- Persistent connections -->
      <line x1="775" y1="150" x2="815" y2="150" stroke="#F39C12" stroke-width="2.5"/>
      <line x1="775" y1="165" x2="815" y2="165" stroke="#F39C12" stroke-width="2.5"/>
      <text x="795" y="205" text-anchor="middle" font-size="8" fill="#27ae60" font-weight="600">domains now distinct</text>
      <text x="795" y="218" text-anchor="middle" font-size="8" fill="#F39C12" font-weight="600">but neural links persist</text>
      <text x="795" y="231" text-anchor="middle" font-size="8" fill="#6c757d">= AFFECTION IS WARMTH</text>

      <!-- ===================== SECTION 2: BRAIN ACTIVATION ===================== -->
      <line x1="30" y1="275" x2="930" y2="275" stroke="#dee2e6" stroke-width="1"/>
      <text x="480" y="308" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1a2e">Neural Cascade During Metaphor Processing</text>

      <!-- Simplified brain outline -->
      <path d="M 180 430 Q 180 340 280 330 Q 380 320 480 340 Q 580 320 680 330 Q 780 340 780 430 Q 780 520 680 540 Q 580 560 480 550 Q 380 560 280 540 Q 180 520 180 430 Z" fill="#f0f0f0" stroke="#adb5bd" stroke-width="2" fill-opacity="0.5"/>

      <!-- Motor cortex region -->
      <ellipse cx="310" cy="380" rx="60" ry="40" fill="#2E86AB" fill-opacity="0.25" stroke="#2E86AB" stroke-width="1.5"/>
      <text x="310" y="372" text-anchor="middle" font-size="10" font-weight="600" fill="#2E86AB">Motor</text>
      <text x="310" y="386" text-anchor="middle" font-size="10" font-weight="600" fill="#2E86AB">Cortex</text>
      <text x="310" y="400" text-anchor="middle" font-size="8" fill="#6c757d">sensorimotor</text>

      <!-- Somatosensory cortex -->
      <ellipse cx="430" cy="370" rx="50" ry="30" fill="#4ECDC4" fill-opacity="0.25" stroke="#4ECDC4" stroke-width="1.5"/>
      <text x="430" y="366" text-anchor="middle" font-size="9" font-weight="600" fill="#4ECDC4">Somatosensory</text>
      <text x="430" y="380" text-anchor="middle" font-size="9" font-weight="600" fill="#4ECDC4">Cortex</text>

      <!-- Language areas -->
      <ellipse cx="560" cy="420" rx="55" ry="35" fill="#7B68EE" fill-opacity="0.25" stroke="#7B68EE" stroke-width="1.5"/>
      <text x="560" y="414" text-anchor="middle" font-size="10" font-weight="600" fill="#7B68EE">Language</text>
      <text x="560" y="428" text-anchor="middle" font-size="10" font-weight="600" fill="#7B68EE">Areas</text>
      <text x="560" y="442" text-anchor="middle" font-size="8" fill="#6c757d">Broca + Wernicke</text>

      <!-- Prefrontal -->
      <ellipse cx="680" cy="400" rx="50" ry="35" fill="#E74C3C" fill-opacity="0.2" stroke="#E74C3C" stroke-width="1.5"/>
      <text x="680" y="394" text-anchor="middle" font-size="9" font-weight="600" fill="#E74C3C">Prefrontal</text>
      <text x="680" y="408" text-anchor="middle" font-size="9" font-weight="600" fill="#E74C3C">Cortex</text>
      <text x="680" y="420" text-anchor="middle" font-size="8" fill="#6c757d">abstract</text>

      <!-- Neural cascade arrows -->
      <path d="M 360 385 Q 395 395 410 385" stroke="#F39C12" stroke-width="2" fill="none" marker-end="url(#n-arrow-gold)"/>
      <path d="M 470 380 Q 510 400 535 410" stroke="#F39C12" stroke-width="2" fill="none" marker-end="url(#n-arrow-gold)"/>
      <path d="M 600 415 Q 625 410 640 405" stroke="#F39C12" stroke-width="2" fill="none" marker-end="url(#n-arrow-gold)"/>

      <!-- Cascade label -->
      <text x="480" y="470" text-anchor="middle" font-size="10" fill="#F39C12" font-weight="600">bidirectional neural cascade</text>
      <text x="480" y="485" text-anchor="middle" font-size="9" fill="#6c757d">activation spreads in ~200ms</text>

      <!-- Input labels -->
      <rect x="190" y="490" width="160" height="40" rx="6" fill="#2E86AB" fill-opacity="0.08" stroke="#2E86AB" stroke-width="1"/>
      <text x="270" y="510" text-anchor="middle" font-size="9" fill="#2E86AB" font-weight="600">"He kicked the habit"</text>
      <text x="270" y="522" text-anchor="middle" font-size="8" fill="#6c757d">metaphorical sentence</text>
      <line x1="270" y1="490" x2="300" y2="420" stroke="#2E86AB" stroke-width="1" stroke-dasharray="3,2"/>

      <!-- Key finding box -->
      <rect x="600" y="490" width="180" height="55" rx="6" fill="#E74C3C" fill-opacity="0.06" stroke="#E74C3C" stroke-width="1"/>
      <text x="690" y="510" text-anchor="middle" font-size="9" fill="#E74C3C" font-weight="600">Key fMRI Finding:</text>
      <text x="690" y="525" text-anchor="middle" font-size="8" fill="#495057">Leg-motor cortex activates</text>
      <text x="690" y="538" text-anchor="middle" font-size="8" fill="#495057">for "kicked" even metaphorically</text>

      <!-- ===================== SECTION 3: ACTIVATION GRADIENT ===================== -->
      <line x1="30" y1="570" x2="930" y2="570" stroke="#dee2e6" stroke-width="1"/>
      <text x="480" y="600" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1a2e">Sensorimotor Activation Gradient</text>
      <text x="480" y="618" text-anchor="middle" font-size="10" fill="#6c757d">Strength of motor/sensory cortex activation by sentence type</text>

      <!-- Gradient bar chart -->
      <!-- Bar 1: Literal -->
      <rect x="130" y="650" width="140" height="40" rx="6" fill="#2E86AB" fill-opacity="0.85"/>
      <text x="200" y="675" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">LITERAL</text>
      <text x="290" y="675" text-anchor="start" font-size="9" fill="#495057">"He kicked the ball"</text>
      <text x="130" y="640" text-anchor="middle" font-size="8" fill="#2E86AB" font-weight="600">strongest</text>

      <!-- Bar 2: Metaphorical -->
      <rect x="130" y="700" width="110" height="40" rx="6" fill="#7B68EE" fill-opacity="0.85"/>
      <text x="185" y="725" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">METAPHORICAL</text>
      <text x="260" y="725" text-anchor="start" font-size="9" fill="#495057">"He kicked the habit"</text>

      <!-- Bar 3: Idiomatic -->
      <rect x="130" y="750" width="80" height="40" rx="6" fill="#F39C12" fill-opacity="0.85"/>
      <text x="170" y="775" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">IDIOMATIC</text>
      <text x="230" y="775" text-anchor="start" font-size="9" fill="#495057">"He kicked the bucket"</text>

      <!-- Bar 4: Abstract -->
      <rect x="130" y="800" width="50" height="40" rx="6" fill="#adb5bd" fill-opacity="0.85"/>
      <text x="155" y="825" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">ABSTRACT</text>
      <text x="200" y="825" text-anchor="start" font-size="9" fill="#495057">"He considered the idea"</text>
      <text x="130" y="850" text-anchor="middle" font-size="8" fill="#adb5bd" font-weight="600">weakest</text>

      <!-- Gradient arrow -->
      <line x1="100" y1="660" x2="100" y2="835" stroke="#6c757d" stroke-width="1.5" marker-end="url(#n-arrow)"/>
      <text x="85" y="750" text-anchor="middle" font-size="8" fill="#6c757d" transform="rotate(-90 85 750)">decreasing activation</text>

      <!-- Timeline annotation -->
      <rect x="580" y="660" width="340" height="100" rx="10" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1.5"/>
      <text x="750" y="685" text-anchor="middle" font-size="11" font-weight="700" fill="#1a1a2e">Timing Evidence</text>
      <line x1="595" y1="693" x2="905" y2="693" stroke="#dee2e6" stroke-width="1"/>
      <text x="750" y="712" text-anchor="middle" font-size="10" fill="#495057">Sensorimotor activation occurs within</text>
      <text x="750" y="730" text-anchor="middle" font-size="16" font-weight="700" fill="#E74C3C">~200 milliseconds</text>
      <text x="750" y="748" text-anchor="middle" font-size="10" fill="#495057">Too fast for conscious imagery or post-hoc</text>
      <text x="750" y="762" text-anchor="middle" font-size="10" fill="#495057">simulation. Indicates automatic, mandatory activation.</text>

      <!-- Dead metaphor note -->
      <rect x="580" y="780" width="340" height="60" rx="8" fill="#F39C12" fill-opacity="0.06" stroke="#F39C12" stroke-width="1"/>
      <text x="750" y="802" text-anchor="middle" font-size="10" fill="#F39C12" font-weight="600">Even "dead" metaphors retain embodiment</text>
      <text x="750" y="818" text-anchor="middle" font-size="9" fill="#495057">Harris et al. (2024): "breakthrough" activates</text>
      <text x="750" y="832" text-anchor="middle" font-size="9" fill="#495057">sensorimotor areas within 250ms (EEG)</text>
    </svg>
  </div>
  <figcaption>
    <strong>Figure 5: The Neural Theory of Metaphor</strong>
    <span>Lakoff and Narayanan's neural theory explains metaphor through three developmental phases: (1) Conflation, where sensorimotor and subjective experiences fire simultaneously in infancy; (2) Hebbian Learning, where repeated co-activation creates strong cross-domain neural connections; (3) Differentiation, where domains separate but neural links persist as metaphorical mappings. During adult metaphor processing, bidirectional neural cascades activate sensorimotor cortex within ~200ms, even for metaphorical uses of action verbs. fMRI studies confirm a gradient of activation: literal sentences produce the strongest sensorimotor response, followed by metaphorical, idiomatic, and abstract sentences.</span>
  </figcaption>
  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background: #2E86AB;"></div>Sensorimotor Circuits</div>
    <div class="legend-item"><div class="legend-swatch" style="background: #7B68EE;"></div>Abstract/Language Circuits</div>
    <div class="legend-item"><div class="legend-swatch" style="background: #F39C12;"></div>Cross-domain Connections</div>
    <div class="legend-item"><div class="legend-swatch" style="background: #E74C3C;"></div>Key Findings</div>
  </div>
</figure>
</body>
</html>
