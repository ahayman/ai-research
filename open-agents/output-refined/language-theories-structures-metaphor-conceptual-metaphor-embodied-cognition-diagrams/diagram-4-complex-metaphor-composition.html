<!DOCTYPE html>

<title>Complex Metaphor Composition: From Atoms to Molecules</title>
<style>

<body>
<figure>
  <div class="diagram-title">Complex Metaphor Composition: How LOVE IS A JOURNEY Is Built</div>
  <div class="svg-container">
    <svg viewBox="0 0 960 780" width="960" height="780" xmlns="http://www.w3.org/2000/svg">
      <defs>

      <!-- Title: Atoms label -->
      <text x="165" y="30" text-anchor="middle" font-size="13" font-weight="700" fill="#7B68EE">PRIMARY METAPHOR ATOMS</text>

      <!-- Atom 1: PURPOSES ARE DESTINATIONS -->
      <rect x="20" y="50" width="290" height="60" rx="10" fill="#7B68EE" fill-opacity="0.1" stroke="#7B68EE" stroke-width="2"/>
      <text x="165" y="72" text-anchor="middle" font-size="12" font-weight="700" fill="#7B68EE">PURPOSES ARE DESTINATIONS</text>
      <text x="165" y="90" text-anchor="middle" font-size="9" fill="#6c757d">Reaching a place = achieving a purpose</text>

      <!-- Atom 2: INTIMACY IS CLOSENESS -->
      <rect x="20" y="125" width="290" height="60" rx="10" fill="#7B68EE" fill-opacity="0.1" stroke="#7B68EE" stroke-width="2"/>
      <text x="165" y="147" text-anchor="middle" font-size="12" font-weight="700" fill="#7B68EE">INTIMACY IS CLOSENESS</text>
      <text x="165" y="165" text-anchor="middle" font-size="9" fill="#6c757d">Physical proximity = emotional connection</text>

      <!-- Atom 3: DIFFICULTIES ARE BURDENS -->
      <rect x="20" y="200" width="290" height="60" rx="10" fill="#7B68EE" fill-opacity="0.1" stroke="#7B68EE" stroke-width="2"/>
      <text x="165" y="222" text-anchor="middle" font-size="12" font-weight="700" fill="#7B68EE">DIFFICULTIES ARE BURDENS</text>
      <text x="165" y="240" text-anchor="middle" font-size="9" fill="#6c757d">Heavy weight = hardship to endure</text>

      <!-- Atom 4: STATES ARE LOCATIONS -->
      <rect x="20" y="275" width="290" height="60" rx="10" fill="#7B68EE" fill-opacity="0.1" stroke="#7B68EE" stroke-width="2"/>
      <text x="165" y="297" text-anchor="middle" font-size="12" font-weight="700" fill="#7B68EE">STATES ARE LOCATIONS</text>
      <text x="165" y="315" text-anchor="middle" font-size="9" fill="#6c757d">Being in a place = being in a state</text>

      <!-- Atom 5: CHANGE IS MOTION -->
      <rect x="20" y="350" width="290" height="60" rx="10" fill="#7B68EE" fill-opacity="0.1" stroke="#7B68EE" stroke-width="2"/>
      <text x="165" y="372" text-anchor="middle" font-size="12" font-weight="700" fill="#7B68EE">CHANGE IS MOTION</text>
      <text x="165" y="390" text-anchor="middle" font-size="9" fill="#6c757d">Moving from A to B = changing state</text>

      <!-- Cultural knowledge -->
      <rect x="20" y="430" width="290" height="45" rx="10" fill="#8B4513" fill-opacity="0.1" stroke="#8B4513" stroke-width="1.5" stroke-dasharray="5,3"/>
      <text x="165" y="450" text-anchor="middle" font-size="11" font-weight="600" fill="#8B4513">+ Cultural Knowledge</text>
      <text x="165" y="466" text-anchor="middle" font-size="9" fill="#8B4513">Shared life-path narratives, relationship conventions</text>

      <!-- Composition arrows -->
      <line x1="310" y1="80" x2="470" y2="250" stroke="#6c757d" stroke-width="1.5" marker-end="url(#comp-arrow)"/>
      <line x1="310" y1="155" x2="470" y2="250" stroke="#6c757d" stroke-width="1.5" marker-end="url(#comp-arrow)"/>
      <line x1="310" y1="230" x2="470" y2="260" stroke="#6c757d" stroke-width="1.5" marker-end="url(#comp-arrow)"/>
      <line x1="310" y1="305" x2="470" y2="270" stroke="#6c757d" stroke-width="1.5" marker-end="url(#comp-arrow)"/>
      <line x1="310" y1="380" x2="470" y2="280" stroke="#6c757d" stroke-width="1.5" marker-end="url(#comp-arrow)"/>
      <line x1="310" y1="452" x2="470" y2="290" stroke="#8B4513" stroke-width="1.5" marker-end="url(#comp-arrow)" stroke-dasharray="5,3"/>

      <!-- MOLECULE: LOVE IS A JOURNEY -->
      <rect x="475" y="205" width="240" height="130" rx="14" fill="#E74C3C" fill-opacity="0.1" stroke="#E74C3C" stroke-width="2.5"/>
      <text x="595" y="235" text-anchor="middle" font-size="16" font-weight="700" fill="#E74C3C">LOVE IS A</text>
      <text x="595" y="258" text-anchor="middle" font-size="16" font-weight="700" fill="#E74C3C">JOURNEY</text>
      <text x="595" y="280" text-anchor="middle" font-size="10" fill="#6c757d">Complex Metaphor</text>
      <text x="595" y="295" text-anchor="middle" font-size="10" fill="#6c757d">(molecular structure)</text>
      <text x="595" y="325" text-anchor="middle" font-size="9" fill="#999" font-style="italic">"the canonical example"</text>

      <!-- Result: Mapping Table -->
      <line x1="715" y1="270" x2="750" y2="270" stroke="#E74C3C" stroke-width="2" marker-end="url(#comp-arrow-red)"/>

      <rect x="755" y="170" width="195" height="250" rx="10" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1.5"/>
      <text x="852" y="195" text-anchor="middle" font-size="11" font-weight="700" fill="#1a1a2e">Resulting Mapping</text>
      <line x1="770" y1="203" x2="935" y2="203" stroke="#dee2e6" stroke-width="1"/>

      <!-- Mapping entries -->
      <text x="800" y="222" text-anchor="middle" font-size="9" font-weight="600" fill="#2E86AB">JOURNEY</text>
      <text x="900" y="222" text-anchor="middle" font-size="9" font-weight="600" fill="#7B68EE">LOVE</text>

      <text x="800" y="242" text-anchor="middle" font-size="8.5" fill="#495057">Travelers</text>
      <text x="852" y="242" text-anchor="middle" font-size="8.5" fill="#adb5bd">=</text>
      <text x="900" y="242" text-anchor="middle" font-size="8.5" fill="#495057">Lovers</text>

      <text x="800" y="260" text-anchor="middle" font-size="8.5" fill="#495057">Vehicle</text>
      <text x="852" y="260" text-anchor="middle" font-size="8.5" fill="#adb5bd">=</text>
      <text x="900" y="260" text-anchor="middle" font-size="8.5" fill="#495057">Relationship</text>

      <text x="800" y="278" text-anchor="middle" font-size="8.5" fill="#495057">Destinations</text>
      <text x="852" y="278" text-anchor="middle" font-size="8.5" fill="#adb5bd">=</text>
      <text x="900" y="278" text-anchor="middle" font-size="8.5" fill="#495057">Shared goals</text>

      <text x="800" y="296" text-anchor="middle" font-size="8.5" fill="#495057">Crossroads</text>
      <text x="852" y="296" text-anchor="middle" font-size="8.5" fill="#adb5bd">=</text>
      <text x="900" y="296" text-anchor="middle" font-size="8.5" fill="#495057">Decisions</text>

      <text x="800" y="314" text-anchor="middle" font-size="8.5" fill="#495057">Dead end</text>
      <text x="852" y="314" text-anchor="middle" font-size="8.5" fill="#adb5bd">=</text>
      <text x="900" y="314" text-anchor="middle" font-size="8.5" fill="#495057">No future</text>

      <text x="800" y="332" text-anchor="middle" font-size="8.5" fill="#495057">Obstacles</text>
      <text x="852" y="332" text-anchor="middle" font-size="8.5" fill="#adb5bd">=</text>
      <text x="900" y="332" text-anchor="middle" font-size="8.5" fill="#495057">Difficulties</text>

      <text x="800" y="350" text-anchor="middle" font-size="8.5" fill="#495057">Smooth road</text>
      <text x="852" y="350" text-anchor="middle" font-size="8.5" fill="#adb5bd">=</text>
      <text x="900" y="350" text-anchor="middle" font-size="8.5" fill="#495057">Easy progress</text>

      <text x="800" y="368" text-anchor="middle" font-size="8.5" fill="#495057">Diff. directions</text>
      <text x="852" y="368" text-anchor="middle" font-size="8.5" fill="#adb5bd">=</text>
      <text x="900" y="368" text-anchor="middle" font-size="8.5" fill="#495057">Incompat. goals</text>

      <text x="800" y="398" text-anchor="middle" font-size="8" fill="#999" font-style="italic">Getting stuck</text>
      <text x="852" y="398" text-anchor="middle" font-size="8" fill="#adb5bd">=</text>
      <text x="900" y="398" text-anchor="middle" font-size="8" fill="#999" font-style="italic">Stagnation</text>

      <!-- Separator -->
      <line x1="20" y1="500" x2="940" y2="500" stroke="#dee2e6" stroke-width="1" stroke-dasharray="8,4"/>
      <text x="480" y="530" text-anchor="middle" font-size="12" font-weight="700" fill="#6c757d">THE SAME ATOMS, DIFFERENT MOLECULE</text>

      <!-- Lower section: different composition -->
      <!-- Some shared atoms -->
      <rect x="20" y="555" width="200" height="45" rx="8" fill="#7B68EE" fill-opacity="0.1" stroke="#7B68EE" stroke-width="1.5"/>
      <text x="120" y="578" text-anchor="middle" font-size="10" font-weight="600" fill="#7B68EE">CAUSES ARE FORCES</text>
      <text x="120" y="592" text-anchor="middle" font-size="8" fill="#6c757d">Physical force = causation</text>

      <rect x="20" y="615" width="200" height="45" rx="8" fill="#7B68EE" fill-opacity="0.1" stroke="#7B68EE" stroke-width="1.5"/>
      <text x="120" y="638" text-anchor="middle" font-size="10" font-weight="600" fill="#7B68EE">CONTROL IS UP</text>
      <text x="120" y="652" text-anchor="middle" font-size="8" fill="#6c757d">Physical dominance = authority</text>

      <rect x="20" y="675" width="200" height="45" rx="8" fill="#7B68EE" fill-opacity="0.1" stroke="#7B68EE" stroke-width="1.5"/>
      <text x="120" y="698" text-anchor="middle" font-size="10" font-weight="600" fill="#7B68EE">PURPOSES ARE DESTINATIONS</text>
      <text x="120" y="712" text-anchor="middle" font-size="8" fill="#6c757d">(reused atom)</text>

      <rect x="20" y="735" width="200" height="30" rx="8" fill="#8B4513" fill-opacity="0.1" stroke="#8B4513" stroke-width="1" stroke-dasharray="5,3"/>
      <text x="120" y="755" text-anchor="middle" font-size="9" fill="#8B4513">+ Adversarial cultural framing</text>

      <!-- Composition arrows to ARGUMENT IS WAR -->
      <line x1="220" y1="578" x2="350" y2="650" stroke="#6c757d" stroke-width="1.5" marker-end="url(#comp-arrow)"/>
      <line x1="220" y1="638" x2="350" y2="655" stroke="#6c757d" stroke-width="1.5" marker-end="url(#comp-arrow)"/>
      <line x1="220" y1="698" x2="350" y2="660" stroke="#6c757d" stroke-width="1.5" marker-end="url(#comp-arrow)"/>
      <line x1="220" y1="750" x2="350" y2="670" stroke="#8B4513" stroke-width="1.5" marker-end="url(#comp-arrow)" stroke-dasharray="5,3"/>

      <!-- ARGUMENT IS WAR molecule -->
      <rect x="355" y="615" width="240" height="100" rx="14" fill="#2E86AB" fill-opacity="0.1" stroke="#2E86AB" stroke-width="2.5"/>
      <text x="475" y="650" text-anchor="middle" font-size="16" font-weight="700" fill="#2E86AB">ARGUMENT</text>
      <text x="475" y="672" text-anchor="middle" font-size="16" font-weight="700" fill="#2E86AB">IS WAR</text>
      <text x="475" y="695" text-anchor="middle" font-size="10" fill="#6c757d">Different molecule, overlapping atoms</text>

      <!-- Key insight box -->
      <rect x="640" y="570" width="300" height="190" rx="10" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1.5"/>
      <text x="790" y="598" text-anchor="middle" font-size="12" font-weight="700" fill="#1a1a2e">Key Insight</text>
      <line x1="655" y1="605" x2="925" y2="605" stroke="#dee2e6" stroke-width="1"/>
      <text x="790" y="628" text-anchor="middle" font-size="10" fill="#495057">The same primary metaphor atoms</text>
      <text x="790" y="645" text-anchor="middle" font-size="10" fill="#495057">combine in different configurations</text>
      <text x="790" y="662" text-anchor="middle" font-size="10" fill="#495057">to produce different complex metaphors.</text>
      <text x="790" y="688" text-anchor="middle" font-size="10" fill="#495057">PURPOSES ARE DESTINATIONS appears</text>
      <text x="790" y="705" text-anchor="middle" font-size="10" fill="#495057">in both LOVE IS A JOURNEY and</text>
      <text x="790" y="722" text-anchor="middle" font-size="10" fill="#495057">ARGUMENT IS WAR -- the same atom</text>
      <text x="790" y="739" text-anchor="middle" font-size="10" fill="#495057">serving different molecular structures.</text>
    </svg>
  </div>
  <figcaption>
    <strong>Figure 4: Complex Metaphor Composition -- From Atoms to Molecules</strong>
    <span>Complex metaphors are compositional structures, built by combining primary metaphor "atoms" together with cultural knowledge. LOVE IS A JOURNEY decomposes into five primary metaphors (PURPOSES ARE DESTINATIONS, INTIMACY IS CLOSENESS, DIFFICULTIES ARE BURDENS, STATES ARE LOCATIONS, CHANGE IS MOTION) plus culturally shared narratives about life paths. The same atoms can be recombined to produce entirely different complex metaphors -- ARGUMENT IS WAR shares PURPOSES ARE DESTINATIONS but combines it with CAUSES ARE FORCES and CONTROL IS UP instead. This compositional architecture explains why metaphorical systems are systematic rather than random.</span>
  </figcaption>
  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background: #7B68EE;"></div>Primary Metaphor (Atom)</div>
    <div class="legend-item"><div class="legend-swatch" style="background: #E74C3C;"></div>Complex Metaphor (Molecule)</div>
    <div class="legend-item"><div class="legend-swatch" style="background: #8B4513;"></div>Cultural Knowledge</div>
    <div class="legend-item"><div class="legend-swatch" style="background: #2E86AB;"></div>Alternative Molecule</div>
  </div>
</figure>
