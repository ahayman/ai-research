    <pre class="mermaid">
flowchart LR
    Mon["<b>MON</b><br/>Brief check-in<br/>5 min<br/><br/>'What part is loud<br/>today?'<br/>One paragraph"]
    Tue["<b>TUE</b><br/>Letter to a manager<br/>15–25 min<br/><br/>Two-pass dialogue<br/>or three-pass if<br/>another part interrupts"]
    Wed["<b>WED</b><br/>Trigger log<br/>5 min @ evening<br/><br/>Date · situation ·<br/>which part activated ·<br/>how it resolved<br/>(do daily across week)"]
    Thu["<b>THU</b><br/>Pattern review<br/>10 min<br/><br/>Re-read recent entries.<br/>Recurring parts? triggers?<br/>Movement vs. rumination?"]
    Fri["<b>FRI</b><br/>Therapy prep<br/>5–10 min<br/><br/>Pull 1–2 entries to bring.<br/>Note one question for the<br/>therapist."]
    Sat["<b>SAT</b><br/>THERAPY SESSION<br/>or your usual day<br/><br/>Solo material informs<br/>the session<br/>External clinician<br/>holds the room"]
    Sun["<b>SUN</b><br/>Post-session integration<br/>15 min<br/><br/>What arose?<br/>What part wants follow-up?<br/>Note for next week."]

    Mon --> Tue --> Wed --> Thu --> Fri --> Sat --> Sun
    Sun -.next week.-> Mon

    Wed -.continuous trigger log<br/>across the whole week.-> Wed

  <figcaption>
    <strong>Figure 5:</strong> One concrete worked example of a weekly journaling-with-therapy structure. <strong>This is illustrative, not prescriptive</strong> — adjust to your own session day, your own bandwidth, and what's actually happening that week. The pattern: light daily check-ins (Mon, Wed) interleaved with one longer reflective entry (Tue), one pattern-review pass (Thu), and a deliberate prep step before the session (Fri). The session day in green is the pivot: solo journaling has been gathering externalised data all week and now feeds the conversation with the clinician. The Sun post-session integration entry catches what arose. The dotted self-loop on Wednesday signals that trigger logging runs continuously across the week, not just on that day. Total time: roughly 60–90 minutes a week of writing, which most people can fit. <em>If a week is overloaded, drop everything except the Wed trigger log and the Sun integration — those are the highest-yield entries for a low-bandwidth week.</em>
  </figcaption>
</figure>
