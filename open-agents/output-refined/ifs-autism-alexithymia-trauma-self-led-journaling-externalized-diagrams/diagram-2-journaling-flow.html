<!-- Diagram 2: Journaling-Led Parts Work Flow -->
<!-- Type: flowchart -->
<!-- Generated: 2026-04-29 -->
<!-- Description: The end-to-end loop a writing-led IFS practice runs through, with the re-read step highlighted as the externalised unblending move. -->

<figure class="concept-diagram" id="diagram-2">
  <div class="diagram-container">
    <pre class="mermaid">
flowchart TD
    Start([A part is calling — feeling, behaviour, recurring thought])
    Name[Name the part on the page<br/>Note location in body, or write 'no body location']
    WriteAs["Write AS the part<br/>(uninterrupted, in its voice)<br/>Don't edit. Let it be defensive,<br/>scared, hostile, or vague."]
    ReRead{"<b>Re-read what was written</b><br/>This is the externalised unblending move.<br/>Notice your stance toward the part."}
    Stance{Is your stance<br/>one of the 8 Cs?<br/>curious, calm, compassionate,<br/>clear, courageous, confident,<br/>creative, connected}
    Detour["Another part is in the way.<br/>Name it. Give it a brief letter.<br/>Ask it to step back. Return."]
    SelfWrite[Respond AS Self<br/>Acknowledge what was said.<br/>Ask if there's more.<br/>Ask what it wants you to know.]
    Close[Note and close.<br/>One closing line.<br/>Date the entry.]
    Pattern[/After 1–2 weeks:<br/>re-read recent entries<br/>Note recurring parts, triggers,<br/>movement, rumination/]
    Therapy[/Bring summary or journal<br/>to a therapy session<br/>Solo work feeds the session/]

    Start --> Name
    Name --> WriteAs
    WriteAs --> ReRead
    ReRead --> Stance
    Stance -- No --> Detour
    Detour --> Stance
    Stance -- Yes --> SelfWrite
    SelfWrite --> Close
    Close -.weeks of entries.-> Pattern
    Pattern --> Therapy
    Therapy -.next session ends.-> Start

    classDef start fill:#E0F2FE,stroke:#0284C7,stroke-width:2px,color:#0C4A6E
    classDef step fill:#FEF3C7,stroke:#D97706,stroke-width:2px,color:#78350F
    classDef key fill:#FECACA,stroke:#DC2626,stroke-width:3px,color:#7F1D1D
    classDef decision fill:#E0E7FF,stroke:#4F46E5,stroke-width:2px,color:#312E81
    classDef longitudinal fill:#DCFCE7,stroke:#16A34A,stroke-width:2px,color:#14532D

    class Start start
    class Name,WriteAs,SelfWrite,Close,Detour step
    class ReRead key
    class Stance decision
    class Pattern,Therapy longitudinal
    </pre>
  </div>
  <figcaption>
    <strong>Figure 2:</strong> The journaling-led parts work loop. The red step — <strong>re-read what was written</strong> — is the structural translation of the unblending move from clinical IFS into writing. In a session, the unblending happens internally: notice you are blended with a part, separate. On the page, the equivalent is finishing a paragraph and reading it back. The page does the step-back move <em>for</em> you. The decision diamond in purple is the Self-energy check (the diagnostic IFS uses to ask "am I in Self?"); if the answer is anything other than the 8 Cs, another part is in the way and gets a brief turn first. Green steps are longitudinal: pattern review across weeks of entries is where the journal becomes externalised data — the modality this user processes best. The dotted return arrow shows that this is a loop, not a one-shot.
  </figcaption>
</figure>
