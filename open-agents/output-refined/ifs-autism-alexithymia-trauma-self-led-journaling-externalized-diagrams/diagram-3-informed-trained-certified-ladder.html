  <figcaption>
    <strong>Figure 3:</strong> The IFS Institute's three-tier label system. Red (IFS-Informed) is the widest and weakest: the Institute's own definition explicitly includes anyone who has done <em>any</em> IFS-adjacent learning, from one workshop through extensive Sounds True coursework. The label has <strong>no quality floor</strong>. Yellow (IFS-Trained) requires Level 1 — about 90–100 hours and ~$4–5K. Green (IFS-Certified) is the only tier that involves formal competence evaluation: supervised consultation, case presentations, biennial renewal. <em>Most practitioners on therapist directories with "IFS" in their listing are at the Informed tier.</em> The blue box at the bottom is what to actually ask a candidate practitioner — labels alone won't tell you what their practice depth is.
  </figcaption>
