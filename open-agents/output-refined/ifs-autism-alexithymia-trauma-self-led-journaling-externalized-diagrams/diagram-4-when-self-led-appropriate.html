  <figcaption>
    <strong>Figure 4:</strong> When solo IFS is appropriate. The vertical axis is acuity of distress / dissociation; the horizontal axis is Self-access stability. <strong>Green</strong> (low acuity, stable Self-access): solo practice is broadly safe — parts identification, mapping, trigger journals, letters to manager parts, daily unblending micro-practice. This is the territory <em>Self-Therapy</em> (Earley) and <em>No Bad Parts</em> (Schwartz, used solo) are designed for. <strong>Yellow</strong> (moderate, mixed): solo practice <em>alongside therapy</em>; protector dialogue is fine, but exile material goes to therapy, not solo. <strong>The user's profile sits here</strong>, marked in gold: solo journaling as data-gathering, exile work with the therapist, no solo unburdening. <strong>Red</strong> (high acuity, unstable Self-access): even solo manager work may be too activating; stabilization comes first. The clinical literature (Twombly, Anderson, Fisher) consistently warns against solo unburdening in this zone.
  </figcaption>
