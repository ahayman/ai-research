  <figcaption>
    <strong>Figure 1:</strong> The self-led IFS toolkit. Yellow = book layer (the prose backbone of self-led IFS, with the Schwartz canon and the Earley/Weiss self-help line that pre-dates it by twelve years). Blue = apps and online courses (lower-friction, often audio-led). Purple = web and blog content (uneven quality; Propagate Hope is the most rigorous). Grey = adjacent tools that aren't IFS but are commonly recommended in trauma communities — useful for nervous-system regulation but separate from parts work. <strong>Note*</strong>: <em>The Spirituality of IFS</em> Sounds True course is in this product line but represents the spiritual/transpersonal turn covered in Category 11; treat it as a different kind of object than the other Sounds True products.
