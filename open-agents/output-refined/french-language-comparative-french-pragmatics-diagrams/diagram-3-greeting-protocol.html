<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>French Greeting Protocol Flowchart</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --accent-fr: #3b82f6;
    --accent-en: #10b981;
    --accent-fr-bg: #eff6ff;
    --accent-en-bg: #ecfdf5;
    --step-color: #8b5cf6;
    --step-bg: #f5f3ff;
    --warn-color: #e63946;
    --warn-bg: #fef2f2;
    --muted: #6c757d;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --accent-fr: #60a5fa;
      --accent-en: #34d399;
      --accent-fr-bg: #1e293b;
      --accent-en-bg: #132e24;
      --step-color: #a78bfa;
      --step-bg: #1e1b3a;
      --warn-color: #f87171;
      --warn-bg: #2a1215;
      --muted: #9a9ab0;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure {
    max-width: 1100px;
    width: 100%;
    background: var(--surface);
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
  }
  h2 { text-align: center; font-size: 1.4rem; margin-bottom: 0.3rem; }
  .subtitle { text-align: center; font-size: 0.95rem; color: var(--muted); margin-bottom: 2rem; }

  .flow-sequence {
    display: flex;
    flex-direction: column;
    gap: 0;
    align-items: center;
  }
  .step-box {
    border: 2px solid var(--step-color);
    border-radius: 12px;
    padding: 1rem 1.5rem;
    max-width: 500px;
    width: 100%;
    background: var(--step-bg);
  }
  .step-box .step-num {
    font-size: 0.72rem;
    font-weight: 700;
    text-transform: uppercase;
    color: var(--step-color);
    letter-spacing: 0.05em;
  }
  .step-box .step-title {
    font-size: 1rem;
    font-weight: 700;
    margin-bottom: 0.3rem;
  }
  .step-box .step-body { font-size: 0.85rem; }
  .flow-arrow {
    color: var(--step-color);
    font-size: 1.4rem;
    line-height: 1;
    padding: 0.3rem 0;
  }

  .warn-box {
    border: 2px solid var(--warn-color);
    border-radius: 12px;
    padding: 1rem 1.5rem;
    max-width: 500px;
    width: 100%;
    background: var(--warn-bg);
    text-align: center;
    font-size: 0.88rem;
    font-weight: 600;
  }

  .bise-map {
    margin-top: 2rem;
    border: 2px solid var(--accent-fr);
    border-radius: 12px;
    padding: 1.5rem;
  }
  .bise-map h3 {
    font-size: 1.05rem;
    margin-bottom: 1rem;
    text-align: center;
  }
  .bise-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0.8rem;
  }
  .bise-card {
    border: 2px solid var(--border);
    border-radius: 10px;
    padding: 0.8rem;
    text-align: center;
  }
  .bise-num {
    font-size: 1.8rem;
    font-weight: 800;
    color: var(--accent-fr);
  }
  .bise-region {
    font-size: 0.82rem;
    color: var(--muted);
  }
  .bise-note {
    font-size: 0.75rem;
    color: var(--muted);
    font-style: italic;
    margin-top: 1rem;
    text-align: center;
  }

  .physical-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 0.8rem;
    margin-top: 1.5rem;
  }
  .phys-card {
    border: 2px solid var(--border);
    border-radius: 10px;
    padding: 1rem;
    text-align: center;
    font-size: 0.85rem;
  }
  .phys-card h4 { font-size: 0.9rem; margin-bottom: 0.5rem; color: var(--accent-fr); }

  .en-comparison {
    margin-top: 2rem;
    background: var(--accent-en-bg);
    border: 2px solid var(--accent-en);
    border-radius: 12px;
    padding: 1.2rem;
  }
  .en-comparison h4 { color: var(--accent-en); margin-bottom: 0.5rem; }
  .en-comparison p { font-size: 0.88rem; }

  figcaption {
    margin-top: 1.5rem;
    padding-top: 1rem;
    border-top: 1px solid var(--border);
    font-size: 0.82rem;
    color: var(--muted);
    text-align: center;
  }
  @media (max-width: 640px) {
    .bise-grid { grid-template-columns: 1fr 1fr; }
    .physical-grid { grid-template-columns: 1fr; }
    figure { padding: 1.5rem; }
  }
</style>
</head>
<body>
<figure>
  <h2>French Greeting Protocol</h2>
  <p class="subtitle">A scripted, rule-governed sequence that must precede all interaction -- no equivalent exists in English</p>

  <div class="flow-sequence">
    <div class="step-box">
      <div class="step-num">Step 1 -- Time Check</div>
      <div class="step-title">Bonjour or Bonsoir?</div>
      <div class="step-body">Before ~6 PM: <strong>"Bonjour"</strong>. After ~6 PM: <strong>"Bonsoir"</strong>. This verbal greeting is <em>obligatory</em> before any request, transaction, or conversation.</div>
    </div>
    <div class="flow-arrow">&#9660;</div>

    <div class="warn-box" style="color: var(--warn-color);">
      CRITICAL RULE: Skipping "Bonjour" before making a request is a serious pragmatic violation. The baker, shopkeeper, or receptionist will perceive you as rude regardless of how polite your request is grammatically.
    </div>
    <div class="flow-arrow">&#9660;</div>

    <div class="step-box">
      <div class="step-num">Step 2 -- Relationship Assessment</div>
      <div class="step-title">What physical greeting?</div>
      <div class="step-body">Known person (friend/colleague/family)? Or stranger/professional contact? This determines the physical greeting form.</div>
    </div>
    <div class="flow-arrow">&#9660;</div>

    <div class="step-box">
      <div class="step-num">Step 3 -- Physical Greeting</div>
      <div class="step-title">Bise, Handshake, or Verbal Only</div>
      <div class="step-body">See physical greeting rules and regional bise map below.</div>
    </div>
    <div class="flow-arrow">&#9660;</div>

    <div class="step-box">
      <div class="step-num">Step 4 -- Individual Greeting</div>
      <div class="step-title">Greet each person separately</div>
      <div class="step-body">In a group or room, you must greet <em>each individual person</em> with appropriate greeting. A general wave or group "hello" is insufficient.</div>
    </div>
    <div class="flow-arrow">&#9660;</div>

    <div class="step-box">
      <div class="step-num">Step 5 -- Small Talk</div>
      <div class="step-title">"Ca va?" / "Comment allez-vous?"</div>
      <div class="step-body">Tu register: <strong>"Ca va?"</strong> (informal). Vous register: <strong>"Comment allez-vous?"</strong> (formal). Now the substantive interaction may begin.</div>
    </div>
  </div>

  <div class="physical-grid">
    <div class="phys-card">
      <h4>La Bise</h4>
      Friends, family, close colleagues. Cheeks touch, kissing sound in air (not actual kiss). Number varies by region. Typically woman-woman or woman-man; men often shake hands instead.
    </div>
    <div class="phys-card">
      <h4>La Poignee de Main</h4>
      Professional contexts, strangers, between men. French handshakes are typically briefer and lighter than American handshakes. One firm pump, not sustained.
    </div>
    <div class="phys-card">
      <h4>Verbal Only</h4>
      Casual passing encounters, phone calls, very brief interactions. "Bonjour" alone suffices. Post-COVID, some previously-bise contexts have shifted here.
    </div>
  </div>

  <div class="bise-map">
    <h3>Regional Bise Variation -- How Many Kisses?</h3>
    <div class="bise-grid">
      <div class="bise-card">
        <div class="bise-num">1</div>
        <div class="bise-region">Parts of Brittany, some western regions</div>
      </div>
      <div class="bise-card" style="border-color: var(--accent-fr);">
        <div class="bise-num">2</div>
        <div class="bise-region">Paris, most of northern France, Ile-de-France (most common nationally)</div>
      </div>
      <div class="bise-card">
        <div class="bise-num">3</div>
        <div class="bise-region">Southern France (Languedoc, Provence, Rhone valley)</div>
      </div>
      <div class="bise-card">
        <div class="bise-num">4</div>
        <div class="bise-region">Some northern departments (Aube, Yonne), parts of eastern France</div>
      </div>
    </div>
    <div class="bise-note">Regional variation creates genuine awkwardness when people from different regions interact. There is no single "correct" national standard. The website "Combien de Bises" maps these variations. Post-COVID, bise norms remain in flux in many contexts.</div>
  </div>

  <div class="en-comparison">
    <h4>ENGLISH COMPARISON</h4>
    <p>English greetings are <strong>optional, flexible, and unscripted</strong>. You can walk into a shop and say "Do you have...?" without greeting -- slightly brusque but not a social violation. Physical greetings (handshake, hug, wave) are determined by individual relationship, not regional rule. There is no equivalent of the bise's codified regional variation. There is no obligation to greet each person individually in a group.</p>
    <p style="margin-top:0.5rem;"><strong>The pattern:</strong> French greeting is a mandatory PROTOCOL (fixed sequence, obligatory elements, regional rules). English greeting is an optional GESTURE (flexible, personal, uncodified).</p>
  </div>

  <figcaption>
    The French greeting protocol is simultaneously a politeness requirement, a relationship-status signal, and a regional identity marker. Its scripted nature makes it more learnable as a rule set than English's flexible but ambiguous greeting conventions.
  </figcaption>
</figure>
</body>
</html>
