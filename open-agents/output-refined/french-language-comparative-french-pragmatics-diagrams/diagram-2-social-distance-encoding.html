<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English vs. French Social Distance Encoding</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --accent-fr: #3b82f6;
    --accent-en: #10b981;
    --accent-fr-bg: #eff6ff;
    --accent-en-bg: #ecfdf5;
    --accent-shared: #8b5cf6;
    --accent-shared-bg: #f5f3ff;
    --muted: #6c757d;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --accent-fr: #60a5fa;
      --accent-en: #34d399;
      --accent-fr-bg: #1e293b;
      --accent-en-bg: #132e24;
      --accent-shared: #a78bfa;
      --accent-shared-bg: #1e1b3a;
      --muted: #9a9ab0;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure {
    max-width: 1100px;
    width: 100%;
    background: var(--surface);
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
  }
  h2 { text-align: center; font-size: 1.4rem; margin-bottom: 0.3rem; }
  .subtitle { text-align: center; font-size: 0.95rem; color: var(--muted); margin-bottom: 2rem; }
  .tracks {
    display: grid;
    grid-template-columns: 1fr 80px 1fr;
    gap: 0;
    align-items: start;
  }
  .track {
    border: 2px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem;
  }
  .track-fr { border-color: var(--accent-fr); }
  .track-en { border-color: var(--accent-en); }
  .track-title {
    font-size: 1.05rem;
    font-weight: 700;
    margin-bottom: 0.3rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .tag {
    font-size: 0.7rem;
    padding: 2px 8px;
    border-radius: 20px;
    font-weight: 600;
    text-transform: uppercase;
  }
  .tag-fr { background: var(--accent-fr-bg); color: var(--accent-fr); }
  .tag-en { background: var(--accent-en-bg); color: var(--accent-en); }
  .track-desc { font-size: 0.82rem; color: var(--muted); margin-bottom: 1rem; }
  .mechanism {
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.8rem;
    margin-bottom: 0.8rem;
    font-size: 0.85rem;
  }
  .mechanism .label {
    font-weight: 700;
    font-size: 0.78rem;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    margin-bottom: 0.3rem;
  }
  .track-fr .mechanism .label { color: var(--accent-fr); }
  .track-en .mechanism .label { color: var(--accent-en); }
  .mechanism .type-tag {
    display: inline-block;
    font-size: 0.68rem;
    padding: 1px 6px;
    border-radius: 4px;
    font-weight: 600;
    margin-left: 0.3rem;
  }
  .type-grammatical { background: var(--accent-fr-bg); color: var(--accent-fr); }
  .type-pragmatic { background: var(--accent-en-bg); color: var(--accent-en); }
  .type-both { background: var(--accent-shared-bg); color: var(--accent-shared); }
  .middle-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding-top: 4rem;
    gap: 2.5rem;
  }
  .arrow-label {
    writing-mode: vertical-rl;
    text-orientation: mixed;
    font-size: 0.72rem;
    font-weight: 600;
    color: var(--accent-shared);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .bridge {
    width: 100%;
    text-align: center;
    font-size: 0.7rem;
    color: var(--muted);
  }
  .bridge-line {
    border-top: 2px dashed var(--accent-shared);
    margin: 0.2rem 0;
  }
  .function-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
    gap: 0.8rem;
    margin-top: 2rem;
  }
  .function-card {
    border: 2px solid var(--accent-shared);
    border-radius: 10px;
    padding: 0.8rem;
    text-align: center;
  }
  .function-card h4 {
    font-size: 0.85rem;
    color: var(--accent-shared);
    margin-bottom: 0.5rem;
  }
  .function-card .fr-way, .function-card .en-way {
    font-size: 0.78rem;
    padding: 0.3rem;
    border-radius: 4px;
    margin-bottom: 0.3rem;
  }
  .function-card .fr-way { background: var(--accent-fr-bg); }
  .function-card .en-way { background: var(--accent-en-bg); }
  .insight-box {
    margin-top: 2rem;
    border: 2px solid var(--accent-shared);
    border-radius: 12px;
    padding: 1.2rem;
    background: var(--accent-shared-bg);
    text-align: center;
    font-size: 0.92rem;
  }
  .insight-box strong { color: var(--accent-shared); }
  figcaption {
    margin-top: 1.5rem;
    padding-top: 1rem;
    border-top: 1px solid var(--border);
    font-size: 0.82rem;
    color: var(--muted);
    text-align: center;
  }
  @media (max-width: 768px) {
    .tracks { grid-template-columns: 1fr; gap: 1rem; }
    .middle-col { display: none; }
    .function-row { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>
<figure>
  <h2>English vs. French Social Distance Encoding</h2>
  <p class="subtitle">Both languages encode the same social information -- but French uses grammar where English uses inference</p>

  <div class="tracks">
    <div class="track track-fr">
      <div class="track-title"><span class="tag tag-fr">French</span> Explicit / Grammatical</div>
      <div class="track-desc">Social distance encoded in obligatory grammatical structures</div>

      <div class="mechanism">
        <div class="label">1. Pronoun Choice <span class="type-tag type-grammatical">Grammatical</span></div>
        Tu (intimate) vs. Vous (formal) -- binary, obligatory, propagates through verb forms, possessives, object pronouns
      </div>
      <div class="mechanism">
        <div class="label">2. Verb Morphology <span class="type-tag type-grammatical">Grammatical</span></div>
        Tu parl<strong>es</strong> vs. Vous parl<strong>ez</strong> -- pronoun choice forces distinct verb endings
      </div>
      <div class="mechanism">
        <div class="label">3. Conditional Mood <span class="type-tag type-grammatical">Grammatical</span></div>
        Je v<strong>eux</strong> (direct) vs. Je v<strong>oudrais</strong> (polite) -- mood change built into verb morphology
      </div>
      <div class="mechanism">
        <div class="label">4. Greeting Protocol <span class="type-tag type-both">Ritual</span></div>
        Bonjour (obligatory) + bise/handshake -- scripted, rule-governed sequence
      </div>
      <div class="mechanism">
        <div class="label">5. Register System <span class="type-tag type-both">6 Levels</span></div>
        Soutenu > Formel > Courant > Familier > Populaire > Vulgaire
      </div>
    </div>

    <div class="middle-col">
      <div class="bridge">
        <div>Same</div>
        <div class="bridge-line"></div>
        <div>social</div>
        <div class="bridge-line"></div>
        <div>function</div>
      </div>
      <div class="bridge">
        <div>Same</div>
        <div class="bridge-line"></div>
        <div>social</div>
        <div class="bridge-line"></div>
        <div>function</div>
      </div>
      <div class="bridge">
        <div>Same</div>
        <div class="bridge-line"></div>
        <div>social</div>
        <div class="bridge-line"></div>
        <div>function</div>
      </div>
    </div>

    <div class="track track-en">
      <div class="track-title"><span class="tag tag-en">English</span> Implicit / Pragmatic</div>
      <div class="track-desc">Social distance encoded through optional, context-dependent strategies</div>

      <div class="mechanism">
        <div class="label">1. Modal Verb Selection <span class="type-tag type-pragmatic">Pragmatic</span></div>
        Can vs. Could vs. Would vs. Might -- auxiliary choice encodes politeness, but is optional and gradient
      </div>
      <div class="mechanism">
        <div class="label">2. Vocabulary Register <span class="type-tag type-pragmatic">Pragmatic</span></div>
        Begin (casual) vs. Commence (formal) -- word choice signals register but is not grammatically required
      </div>
      <div class="mechanism">
        <div class="label">3. Hedging Strategies <span class="type-tag type-pragmatic">Pragmatic</span></div>
        "I was wondering if you might..." -- adding words for indirectness (periphrastic, not morphological)
      </div>
      <div class="mechanism">
        <div class="label">4. Greeting (Flexible) <span class="type-tag type-pragmatic">Optional</span></div>
        Hi / Hello / Hey / wave -- no obligatory script, no physical greeting rules
      </div>
      <div class="mechanism">
        <div class="label">5. Register System <span class="type-tag type-pragmatic">~3 Levels</span></div>
        Formal > Neutral > Informal (less granular, less codified)
      </div>
    </div>
  </div>

  <div class="function-row">
    <div class="function-card">
      <h4>Requesting</h4>
      <div class="fr-way"><strong>FR:</strong> Conditional mood change<br><em>Pourriez-vous...?</em></div>
      <div class="en-way"><strong>EN:</strong> Auxiliary substitution<br><em>Could you...?</em></div>
    </div>
    <div class="function-card">
      <h4>Refusing</h4>
      <div class="fr-way"><strong>FR:</strong> Litote / hedging<br><em>Ce n'est pas evident</em></div>
      <div class="en-way"><strong>EN:</strong> Hedging / indirectness<br><em>I'm not sure that works</em></div>
    </div>
    <div class="function-card">
      <h4>Disagreeing</h4>
      <div class="fr-way"><strong>FR:</strong> Direct + vous register<br><em>Je ne suis pas d'accord</em></div>
      <div class="en-way"><strong>EN:</strong> Softened hedging<br><em>I see your point, but...</em></div>
    </div>
    <div class="function-card">
      <h4>Apologizing</h4>
      <div class="fr-way"><strong>FR:</strong> Vous form + conditional<br><em>Je voudrais m'excuser</em></div>
      <div class="en-way"><strong>EN:</strong> Intensifying adverbs<br><em>I'm terribly sorry</em></div>
    </div>
  </div>

  <div class="insight-box">
    <strong>The Core Pattern:</strong> French makes social distance VISIBLE in grammar -- you cannot speak without choosing tu or vous, without selecting a verb mood. English makes social distance INVISIBLE in grammar -- you encode it through word choice, tone, and pragmatic inference. The French system is <strong>more explicit and learnable as a rule</strong>; the English system is <strong>more flexible but harder to decode</strong>.
  </div>

  <figcaption>
    Both languages encode politeness, respect, and social distance. French grammaticalizes what English leaves to pragmatic inference. Neither is more or less polite -- they distribute politeness signals differently.
  </figcaption>
</figure>
</body>
</html>
