<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>French Discourse Marker Function Map</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --accent-fr: #3b82f6;
    --accent-en: #10b981;
    --accent-fr-bg: #eff6ff;
    --accent-en-bg: #ecfdf5;
    --accent-shared: #8b5cf6;
    --accent-shared-bg: #f5f3ff;
    --accent-warn: #f59e0b;
    --accent-warn-bg: #fffbeb;
    --muted: #6c757d;
    --formal: #3b82f6;
    --neutral: #8b5cf6;
    --informal: #f59e0b;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --accent-fr: #60a5fa;
      --accent-en: #34d399;
      --accent-fr-bg: #1e293b;
      --accent-en-bg: #132e24;
      --accent-shared: #a78bfa;
      --accent-shared-bg: #1e1b3a;
      --accent-warn: #fbbf24;
      --accent-warn-bg: #2a2510;
      --muted: #9a9ab0;
      --formal: #60a5fa;
      --neutral: #a78bfa;
      --informal: #fbbf24;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure {
    max-width: 1200px;
    width: 100%;
    background: var(--surface);
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
  }
  h2 { text-align: center; font-size: 1.4rem; margin-bottom: 0.3rem; }
  .subtitle { text-align: center; font-size: 0.95rem; color: var(--muted); margin-bottom: 2rem; }

  .marker-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
  }
  .marker-card {
    border: 2px solid var(--border);
    border-radius: 12px;
    padding: 1rem 1.2rem;
    position: relative;
  }
  .marker-name {
    font-size: 1.15rem;
    font-weight: 800;
    color: var(--accent-fr);
  }
  .marker-register {
    display: inline-block;
    font-size: 0.65rem;
    padding: 1px 8px;
    border-radius: 20px;
    font-weight: 700;
    text-transform: uppercase;
    margin-left: 0.5rem;
    vertical-align: middle;
  }
  .reg-formal { background: rgba(59,130,246,0.15); color: var(--formal); }
  .reg-neutral { background: rgba(139,92,246,0.15); color: var(--neutral); }
  .reg-informal { background: rgba(245,158,11,0.15); color: var(--informal); }
  .marker-translation {
    font-size: 0.82rem;
    color: var(--muted);
    font-style: italic;
    margin-bottom: 0.5rem;
  }
  .marker-functions {
    display: flex;
    flex-wrap: wrap;
    gap: 0.3rem;
    margin-bottom: 0.5rem;
  }
  .func-tag {
    font-size: 0.7rem;
    padding: 2px 8px;
    border-radius: 4px;
    background: var(--accent-fr-bg);
    color: var(--accent-fr);
    font-weight: 600;
  }
  .marker-example {
    font-size: 0.82rem;
    border-left: 3px solid var(--accent-fr);
    padding-left: 0.8rem;
    margin-top: 0.5rem;
  }
  .marker-example .fr { font-style: italic; }
  .marker-example .en { color: var(--accent-en); font-size: 0.78rem; }
  .marker-english {
    font-size: 0.78rem;
    margin-top: 0.4rem;
    color: var(--muted);
  }
  .marker-english strong { color: var(--accent-en); }

  .polysemy-insight {
    margin-top: 2rem;
    border: 2px solid var(--accent-shared);
    border-radius: 12px;
    padding: 1.5rem;
    background: var(--accent-shared-bg);
  }
  .polysemy-insight h3 {
    font-size: 1rem;
    color: var(--accent-shared);
    margin-bottom: 0.8rem;
    text-align: center;
  }
  .polysemy-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.82rem;
  }
  .polysemy-table th {
    text-align: left;
    padding: 0.4rem 0.6rem;
    border-bottom: 2px solid var(--border);
    font-size: 0.75rem;
    text-transform: uppercase;
    color: var(--muted);
    letter-spacing: 0.03em;
  }
  .polysemy-table td {
    padding: 0.4rem 0.6rem;
    border-bottom: 1px solid var(--border);
  }
  .polysemy-table .fr-col { color: var(--accent-fr); font-weight: 600; }

  .stacking-example {
    margin-top: 1.5rem;
    border: 2px solid var(--accent-fr);
    border-radius: 12px;
    padding: 1.2rem;
  }
  .stacking-example h4 { font-size: 0.95rem; margin-bottom: 0.5rem; }
  .stacking-example .sentence {
    font-size: 0.95rem;
    font-style: italic;
    line-height: 1.8;
  }
  .stacking-example .sentence .dm {
    background: var(--accent-fr-bg);
    border: 1px solid var(--accent-fr);
    border-radius: 4px;
    padding: 1px 4px;
    font-weight: 700;
    color: var(--accent-fr);
  }
  .stacking-example .translation {
    font-size: 0.85rem;
    color: var(--muted);
    margin-top: 0.3rem;
  }
  .stacking-example .analysis {
    font-size: 0.82rem;
    margin-top: 0.5rem;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 0.3rem;
  }
  .stacking-example .ann {
    font-size: 0.75rem;
    background: var(--accent-fr-bg);
    border-radius: 4px;
    padding: 0.3rem 0.5rem;
    text-align: center;
  }
  .ann .ann-word { font-weight: 700; color: var(--accent-fr); }
  .ann .ann-func { color: var(--muted); }

  figcaption {
    margin-top: 1.5rem;
    padding-top: 1rem;
    border-top: 1px solid var(--border);
    font-size: 0.82rem;
    color: var(--muted);
    text-align: center;
  }
  @media (max-width: 768px) {
    .marker-grid { grid-template-columns: 1fr; }
    figure { padding: 1.5rem; }
  }
</style>
</head>
<body>
<figure>
  <h2>French Discourse Marker Function Map</h2>
  <p class="subtitle">Eight markers, dozens of functions -- French discourse markers are more polysemous than their English equivalents</p>

  <div class="marker-grid">
    <div class="marker-card">
      <div class="marker-name">Alors <span class="marker-register reg-neutral">All Registers</span></div>
      <div class="marker-translation">"so / then / well"</div>
      <div class="marker-functions">
        <span class="func-tag">Consequence</span>
        <span class="func-tag">Topic Resumption</span>
        <span class="func-tag">Pause Filler</span>
        <span class="func-tag">Readiness Signal</span>
      </div>
      <div class="marker-example">
        <div class="fr">"Alors, qu'est-ce qu'on fait?"</div>
        <div class="en">So, what do we do?</div>
      </div>
      <div class="marker-english">EN equivalents: <strong>so, well, then</strong> -- split across 3+ words</div>
    </div>

    <div class="marker-card">
      <div class="marker-name">Donc <span class="marker-register reg-neutral">Neutral-Formal</span></div>
      <div class="marker-translation">"so / therefore"</div>
      <div class="marker-functions">
        <span class="func-tag">Consequence</span>
        <span class="func-tag">Recovery</span>
        <span class="func-tag">Argument</span>
        <span class="func-tag">Recap</span>
        <span class="func-tag">Metadiscourse</span>
      </div>
      <div class="marker-example">
        <div class="fr">"Vous etes fatigues, donc on arrete."</div>
        <div class="en">You're tired, so we'll stop.</div>
      </div>
      <div class="marker-english">EN equivalents: <strong>so, therefore, thus</strong> -- 5 identified pragmatic functions</div>
    </div>

    <div class="marker-card">
      <div class="marker-name">Quand meme <span class="marker-register reg-neutral">All Registers</span></div>
      <div class="marker-translation">"still / anyway / all the same"</div>
      <div class="marker-functions">
        <span class="func-tag">Concession</span>
        <span class="func-tag">Surprise</span>
        <span class="func-tag">Mild Protest</span>
      </div>
      <div class="marker-example">
        <div class="fr">"C'est quand meme bizarre."</div>
        <div class="en">It's still pretty weird / You have to admit that's strange.</div>
      </div>
      <div class="marker-english">EN equivalents: <strong>still, anyway, even so, all the same</strong> -- no single equivalent</div>
    </div>

    <div class="marker-card">
      <div class="marker-name">Bref <span class="marker-register reg-neutral">Neutral-Informal</span></div>
      <div class="marker-translation">"in short / anyway"</div>
      <div class="marker-functions">
        <span class="func-tag">Narrative Compression</span>
        <span class="func-tag">Topic Closure</span>
      </div>
      <div class="marker-example">
        <div class="fr">"Bref, on est partis."</div>
        <div class="en">Anyway, we left.</div>
      </div>
      <div class="marker-english">EN equivalents: <strong>anyway, long story short</strong> -- more abrupt in French</div>
    </div>

    <div class="marker-card">
      <div class="marker-name">Du coup <span class="marker-register reg-informal">Informal / Gen Z</span></div>
      <div class="marker-translation">"so / as a result / like"</div>
      <div class="marker-functions">
        <span class="func-tag">Consequence</span>
        <span class="func-tag">Topic Connector</span>
        <span class="func-tag">Filler</span>
      </div>
      <div class="marker-example">
        <div class="fr">"Du coup, t'as fait quoi?"</div>
        <div class="en">So, what did you do?</div>
      </div>
      <div class="marker-english">EN equivalents: <strong>so, like</strong> -- generational marker; Academie warns against overuse</div>
    </div>

    <div class="marker-card">
      <div class="marker-name">Enfin <span class="marker-register reg-neutral">All Registers</span></div>
      <div class="marker-translation">"well / I mean / that is to say"</div>
      <div class="marker-functions">
        <span class="func-tag">Self-Correction</span>
        <span class="func-tag">Reformulation</span>
        <span class="func-tag">Hesitation</span>
      </div>
      <div class="marker-example">
        <div class="fr">"C'est un ami, enfin, une connaissance."</div>
        <div class="en">He's a friend, well, an acquaintance.</div>
      </div>
      <div class="marker-english">EN equivalents: <strong>well, I mean, or rather</strong></div>
    </div>

    <div class="marker-card">
      <div class="marker-name">Voila <span class="marker-register reg-neutral">All Registers</span></div>
      <div class="marker-translation">"there you go / that's it / so yeah"</div>
      <div class="marker-functions">
        <span class="func-tag">Completion</span>
        <span class="func-tag">Summary</span>
        <span class="func-tag">Turn-Final Filler</span>
      </div>
      <div class="marker-example">
        <div class="fr">"J'ai fini mes etudes, et voila."</div>
        <div class="en">I finished my studies, and, well, that's it.</div>
      </div>
      <div class="marker-english">EN equivalents: <strong>so yeah, that's it, you know</strong></div>
    </div>

    <div class="marker-card">
      <div class="marker-name">Quoi <span class="marker-register reg-informal">Informal</span></div>
      <div class="marker-translation">"you know / like"</div>
      <div class="marker-functions">
        <span class="func-tag">Sentence-Final Filler</span>
        <span class="func-tag">Hedging</span>
      </div>
      <div class="marker-example">
        <div class="fr">"C'est complique, quoi."</div>
        <div class="en">It's complicated, you know.</div>
      </div>
      <div class="marker-english">EN equivalents: <strong>you know, like</strong> -- purely pragmatic, no grammatical function</div>
    </div>
  </div>

  <div class="stacking-example">
    <h4>Discourse Marker Stacking -- Real Speech Example</h4>
    <div class="sentence">
      "<span class="dm">Alors</span>, on etait au resto, et <span class="dm">du coup</span> le serveur arrive et, <span class="dm">enfin</span>, il etait un peu bizarre, <span class="dm">quoi</span>. <span class="dm">Bref</span>, on est partis."
    </div>
    <div class="translation">"So, we were at the restaurant, and so the waiter comes and, well, he was a bit weird, you know. Anyway, we left."</div>
    <div class="analysis">
      <div class="ann"><div class="ann-word">Alors</div><div class="ann-func">Topic intro</div></div>
      <div class="ann"><div class="ann-word">Du coup</div><div class="ann-func">Consequence</div></div>
      <div class="ann"><div class="ann-word">Enfin</div><div class="ann-func">Self-correction</div></div>
      <div class="ann"><div class="ann-word">Quoi</div><div class="ann-func">Hedging</div></div>
      <div class="ann"><div class="ann-word">Bref</div><div class="ann-func">Compression</div></div>
    </div>
  </div>

  <div class="polysemy-insight">
    <h3>The Polysemy Pattern -- Each French Marker Covers More Functions</h3>
    <table class="polysemy-table">
      <thead>
        <tr><th>Pragmatic Function</th><th class="fr-col">French Marker(s)</th><th>English Equivalent(s)</th></tr>
      </thead>
      <tbody>
        <tr><td>Consequence / Result</td><td class="fr-col">alors, donc, du coup</td><td>so, therefore, as a result</td></tr>
        <tr><td>Topic Resumption</td><td class="fr-col">alors, donc</td><td>so, anyway</td></tr>
        <tr><td>Self-Correction</td><td class="fr-col">enfin</td><td>I mean, or rather, well</td></tr>
        <tr><td>Narrative Compression</td><td class="fr-col">bref</td><td>anyway, long story short</td></tr>
        <tr><td>Concession / Surprise</td><td class="fr-col">quand meme</td><td>still, even so, all the same</td></tr>
        <tr><td>Completion / Summary</td><td class="fr-col">voila</td><td>so yeah, that's it</td></tr>
        <tr><td>Hedging / Filler</td><td class="fr-col">quoi, voila, du coup</td><td>you know, like, I guess</td></tr>
      </tbody>
    </table>
  </div>

  <figcaption>
    French discourse markers are not meaningless filler -- each carries specific, analyzable pragmatic functions. They are more polysemous (each covering more functions) than their English counterparts and more tightly tied to register.
  </figcaption>
</figure>
</body>
</html>
