<figure class="concept-diagram" id="diagram-phrasal-verb-semantics">
  <div class="diagram-container">
    <div class="pv-title">PHRASAL VERB PARTICLES: Spatial Metaphor as System</div>
    <div class="pv-subtitle">Each particle has a spatial core that extends systematically to abstract domains</div>

    <div class="particles-grid">
      <!-- UP -->
      <div class="particle-card" data-particle="up">
        <div class="particle-header">UP <span class="direction-icon">&#x2191;</span></div>
        <div class="spatial-core">Spatial: upward motion</div>
        <div class="extension-list">
          <div class="extension"><span class="ext-label">Completion</span> eat up, drink up, use up, finish up, clean up</div>
          <div class="extension"><span class="ext-label">Increase</span> speed up, heat up, build up, turn up</div>
          <div class="extension"><span class="ext-label">Visibility</span> show up, come up, pop up, bring up</div>
          <div class="extension"><span class="ext-label">Improvement</span> cheer up, fix up, make up</div>
        </div>
      </div>

      <!-- DOWN -->
      <div class="particle-card" data-particle="down">
        <div class="particle-header">DOWN <span class="direction-icon">&#x2193;</span></div>
        <div class="spatial-core">Spatial: downward motion</div>
        <div class="extension-list">
          <div class="extension"><span class="ext-label">Decrease</span> slow down, cool down, turn down, calm down</div>
          <div class="extension"><span class="ext-label">Cessation</span> break down, shut down, close down</div>
          <div class="extension"><span class="ext-label">Recording</span> write down, note down, pin down</div>
          <div class="extension"><span class="ext-label">Failure</span> let down, break down, put down</div>
        </div>
      </div>

      <!-- OUT -->
      <div class="particle-card" data-particle="out">
        <div class="particle-header">OUT <span class="direction-icon">&#x2192;&#x2197;&#x2198;</span></div>
        <div class="spatial-core">Spatial: outward motion</div>
        <div class="extension-list">
          <div class="extension"><span class="ext-label">Exhaustion</span> burn out, wear out, tire out, die out, sell out</div>
          <div class="extension"><span class="ext-label">Distribution</span> hand out, give out, spread out, lay out</div>
          <div class="extension"><span class="ext-label">Discovery</span> find out, figure out, turn out, work out</div>
          <div class="extension"><span class="ext-label">Exclusion</span> leave out, cut out, lock out, rule out</div>
        </div>
      </div>

      <!-- OFF -->
      <div class="particle-card" data-particle="off">
        <div class="particle-header">OFF <span class="direction-icon">&#x2702;</span></div>
        <div class="spatial-core">Spatial: separation / detachment</div>
        <div class="extension-list">
          <div class="extension"><span class="ext-label">Disconnection</span> cut off, break off, take off, rip off</div>
          <div class="extension"><span class="ext-label">Departure</span> set off, head off, drive off, see off</div>
          <div class="extension"><span class="ext-label">Cancellation</span> call off, put off, hold off, back off</div>
          <div class="extension"><span class="ext-label">Triggering</span> set off (alarm), go off, kick off</div>
        </div>
      </div>

      <!-- IN -->
      <div class="particle-card" data-particle="in">
        <div class="particle-header">IN <span class="direction-icon">&#x2190;</span></div>
        <div class="spatial-core">Spatial: inward motion</div>
        <div class="extension-list">
          <div class="extension"><span class="ext-label">Involvement</span> join in, fit in, blend in, pitch in</div>
          <div class="extension"><span class="ext-label">Submission</span> give in, cave in, hand in</div>
          <div class="extension"><span class="ext-label">Arrival</span> come in, check in, drop in</div>
        </div>
      </div>

      <!-- OVER -->
      <div class="particle-card" data-particle="over">
        <div class="particle-header">OVER <span class="direction-icon">&#x2934;</span></div>
        <div class="spatial-core">Spatial: across / above</div>
        <div class="extension-list">
          <div class="extension"><span class="ext-label">Examination</span> look over, go over, think over, check over</div>
          <div class="extension"><span class="ext-label">Repetition</span> do over, start over, make over</div>
          <div class="extension"><span class="ext-label">Transfer</span> hand over, turn over, give over</div>
          <div class="extension"><span class="ext-label">Excess</span> boil over, run over, overflow</div>
        </div>
      </div>
    </div>

    <div class="prediction-box">
      <div class="pred-title">THE PREDICTION TOOL</div>
      <div class="pred-content">
        When you encounter an unfamiliar phrasal verb, <strong>check the particle</strong>. If it has "up," expect completion/increase. If it has "out," expect exhaustion/distribution/discovery. If it has "off," expect separation/cancellation. The particles are not random -- they carry the metaphorical DNA of the meaning.
      </div>
    </div>
  </div>
  <figcaption>
    <strong>Figure 3:</strong> Phrasal verb particle semantics. Each particle (up, down, out, off, in, over) maps a core spatial meaning onto systematic abstract extensions. UP moves from upward motion to completion, increase, visibility, and improvement. OUT moves from outward motion to exhaustion, distribution, discovery, and exclusion. These patterns are consistent enough to serve as a prediction tool: knowing the particle's metaphorical profile lets you decode unfamiliar phrasal verbs.
  </figcaption>
</figure>
