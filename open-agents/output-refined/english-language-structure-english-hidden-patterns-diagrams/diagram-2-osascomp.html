<figure class="concept-diagram" id="diagram-osascomp">
  <div class="diagram-container">
    <div class="osa-title">OSASCOMP: The Adjective Order Rule Nobody Teaches But Everybody Follows</div>
    <div class="osa-subtitle">Opinion &rarr; Size &rarr; Age &rarr; Shape &rarr; Color &rarr; Origin &rarr; Material &rarr; Purpose &rarr; NOUN</div>

    <div class="rings">
      <div class="ring" data-cat="O" style="--ring-color: #ef4444; --ring-bg: #fef2f2;">
        <div class="ring-label">O<span class="ring-full">pinion</span></div>
        <div class="ring-examples">lovely, wonderful, awful, ugly</div>
        <div class="ring-arrow">MOST SUBJECTIVE (furthest from noun)</div>
      </div>
      <div class="ring" data-cat="S" style="--ring-color: #f59e0b; --ring-bg: #fffbeb;">
        <div class="ring-label">S<span class="ring-full">ize</span></div>
        <div class="ring-examples">big, small, tiny, enormous, huge</div>
      </div>
      <div class="ring" data-cat="A" style="--ring-color: #eab308; --ring-bg: #fefce8;">
        <div class="ring-label">A<span class="ring-full">ge</span></div>
        <div class="ring-examples">old, young, new, ancient, modern</div>
      </div>
      <div class="ring" data-cat="S2" style="--ring-color: #22c55e; --ring-bg: #f0fdf4;">
        <div class="ring-label">S<span class="ring-full">hape</span></div>
        <div class="ring-examples">round, square, flat, long, thin</div>
      </div>
      <div class="ring" data-cat="C" style="--ring-color: #06b6d4; --ring-bg: #ecfeff;">
        <div class="ring-label">C<span class="ring-full">olor</span></div>
        <div class="ring-examples">red, blue, green, dark, bright</div>
      </div>
      <div class="ring" data-cat="O2" style="--ring-color: #3b82f6; --ring-bg: #eff6ff;">
        <div class="ring-label">O<span class="ring-full">rigin</span></div>
        <div class="ring-examples">French, American, Chinese, Victorian</div>
      </div>
      <div class="ring" data-cat="M" style="--ring-color: #8b5cf6; --ring-bg: #f5f3ff;">
        <div class="ring-label">M<span class="ring-full">aterial</span></div>
        <div class="ring-examples">wooden, metal, cotton, silk, plastic</div>
      </div>
      <div class="ring" data-cat="P" style="--ring-color: #a855f7; --ring-bg: #faf5ff;">
        <div class="ring-label">P<span class="ring-full">urpose</span></div>
        <div class="ring-examples">sleeping (bag), running (shoes), writing (desk)</div>
        <div class="ring-arrow">MOST OBJECTIVE (closest to noun -- almost part of it)</div>
      </div>
      <div class="ring noun-ring">
        <div class="ring-label">NOUN</div>
      </div>
    </div>

    <!-- Examples -->
    <div class="examples-section">
      <div class="ex-title">THE TEST</div>
      <div class="example correct">
        <span class="ex-label good">CORRECT:</span>
        A <span class="adj o">lovely</span> <span class="adj s">little</span> <span class="adj a">old</span> <span class="adj sh">rectangular</span> <span class="adj c">green</span> <span class="adj or">French</span> <span class="adj m">silver</span> <span class="adj p">whittling</span> knife
      </div>
      <div class="example wrong">
        <span class="ex-label bad">WRONG:</span>
        A green rectangular old little lovely French silver whittling knife
      </div>
      <div class="example correct">
        <span class="ex-label good">CORRECT:</span>
        A <span class="adj s">big</span> <span class="adj c">red</span> ball
      </div>
      <div class="example wrong">
        <span class="ex-label bad">WRONG:</span>
        A red big ball
      </div>
      <div class="example correct">
        <span class="ex-label good">CORRECT:</span>
        A <span class="adj o">beautiful</span> <span class="adj a">old</span> <span class="adj or">Italian</span> car
      </div>
      <div class="example wrong">
        <span class="ex-label bad">WRONG:</span>
        An Italian old beautiful car
      </div>
    </div>

    <div class="principle-box">
      <strong>THE UNDERLYING PRINCIPLE:</strong> The hierarchy runs from most subjective (opinion -- furthest from noun) to most objective/inherent (purpose/material -- closest to noun). The most inherent properties merge with the noun's identity ("sleeping bag" is nearly a compound).
    </div>
  </div>
  <figcaption>
    <strong>Figure 2:</strong> The OSASCOMP adjective ordering rule. When multiple adjectives modify a noun, they must follow this specific sequence: Opinion, Size, Age, Shape, Color, Origin, Material, Purpose. Violating the order produces sentences that sound immediately and viscerally wrong to native speakers, even though almost no native speaker can articulate the rule. The hierarchy reflects a gradient from most subjective (opinion, furthest from noun) to most objective/inherent (purpose, closest to noun).
  </figcaption>
</figure>
