<figure class="concept-diagram" id="diagram-ablaut-classes-capstone">
  <div class="diagram-container">
    <div class="ab-title">"IRREGULAR" VERBS: Not Random -- Archaic-Regular</div>
    <div class="ab-subtitle">Group them by vowel pattern and the system becomes visible</div>

    <div class="classes-flow">
      <!-- Class I -->
      <div class="class-card" style="--class-color: #3b82f6; --class-bg: #eff6ff;">
        <div class="class-badge">i &rarr; o &rarr; i</div>
        <div class="class-vowels">

        </div>
        <div class="verb-entries">
          <span>dr<u>i</u>ve / dr<u>o</u>ve / dr<u>i</u>ven</span>

      <!-- Class III -->
      <div class="class-card" style="--class-color: #10b981; --class-bg: #ecfdf5;">

        <div class="class-vowels">

          <span class="v-arrow">&rarr;</span>
          <span class="v pp">/&#x028C;/</span>
        </div>
        <div class="verb-entries">
          <span>s<u>i</u>ng / s<u>a</u>ng / s<u>u</u>ng</span>
          <span>dr<u>i</u>nk / dr<u>a</u>nk / dr<u>u</u>nk</span>
          <span>sw<u>i</u>m / sw<u>a</u>m / sw<u>u</u>m</span>
          <span>r<u>i</u>ng / r<u>a</u>ng / r<u>u</u>ng</span>
          <span>spr<u>i</u>ng / spr<u>a</u>ng / spr<u>u</u>ng</span>

          <span>beg<u>i</u>n / beg<u>a</u>n / beg<u>u</u>n</span>
        </div>
        <div class="class-note">Largest surviving class -- 9 verbs with identical pattern</div>
      </div>

      <!-- Class II/V merged -->
      <div class="class-card" style="--class-color: #8b5cf6; --class-bg: #f5f3ff;">
        <div class="class-badge">ee/ea &rarr; o &rarr; o</div>

      <div class="class-card" style="--class-color: #f59e0b; --class-bg: #fffbeb;">
        <div class="class-badge">ea &rarr; o &rarr; o (r-final)</div>
        <div class="verb-entries">
          <span>b<u>ea</u>r / b<u>o</u>re / b<u>o</u>rn(e)</span>
          <span>t<u>ea</u>r / t<u>o</u>re / t<u>o</u>rn</span>
          <span>sw<u>ea</u>r / sw<u>o</u>re / sw<u>o</u>rn</span>
          <span>w<u>ea</u>r / w<u>o</u>re / w<u>o</u>rn</span>

      <!-- Weak irregular (dental + shortening) -->
      <div class="class-card" style="--class-color: #ef4444; --class-bg: #fef2f2;">
        <div class="class-badge">Dental suffix + vowel shortening</div>
        <div class="class-note-top">Not ablaut -- these are weak verbs with a sound change before the -t ending</div>
        <div class="verb-entries">
          <span>k<u>ee</u>p / k<u>e</u>pt / k<u>e</u>pt</span>
          <span>sl<u>ee</u>p / sl<u>e</u>pt / sl<u>e</u>pt</span>

          <span>l<u>ea</u>ve / l<u>e</u>ft / l<u>e</u>ft</span>
          <span>m<u>ea</u>n / m<u>ea</u>nt / m<u>ea</u>nt</span>
        </div>
      </div>
    </div>

    <div class="key-insight">
      <div class="ki-title">THE PATTERN-LEARNER INSIGHT</div>
      <div class="ki-content">
        Instead of memorizing 200 "irregular" verbs individually, group them by vowel pattern. Class III alone (the i-a-u pattern) accounts for 9 verbs. Seeing the pattern converts rote memorization into systematic recognition. The "irregularity" is actually <strong>archaic regularity</strong> -- these verbs follow rules from Proto-Germanic that predate the -ed system by thousands of years.
      </div>
    </div>
  </div>
  <figcaption>
    <strong>Figure 5:</strong> Strong verb ablaut classes -- the pattern inside "irregular" verbs. English's approximately 200 irregular verbs are not random exceptions; most follow systematic vowel alternation patterns inherited from Proto-Germanic. Class III (sing/sang/sung) has 9 members all following the /i/-/a/-/u/ pattern. The weak irregular verbs (keep/kept, feel/felt) follow a separate pattern: vowel shortening before the dental suffix -t. Recognizing these classes transforms rote memorization into pattern recognition.
  </figcaption>
</figure>
