<!-- Diagram: Noun-Verb Stress Shift Pairs + Compound Stress Rule -->

<!-- Generated: 2026-03-31 -->
<!-- Description: Shows the systematic pattern where nouns carry first-syllable stress and verbs carry second-syllable stress -->

<figure class="concept-diagram" id="diagram-stress-shift">
  <div class="diagram-container">
    <div class="stress-title">THE NOUN-VERB STRESS SHIFT: A Pattern Hiding in Plain Sight</div>
    <div class="stress-subtitle">Nouns = first-syllable stress (Germanic default). Verbs = second-syllable stress (Latinate pattern).</div>

    <div class="shift-grid">
      <div class="shift-header"><span class="stress-mark">NOUN (1st syllable)</span></div>
      <div class="shift-header"><span class="stress-mark">VERB (2nd syllable)</span></div>
      <div class="shift-header">Prefix</div>

      <div class="shift-row noun"><b>RE</b>cord</div>
      <div class="shift-row verb">re<b>CORD</b></div>
      <div class="shift-row prefix">re-</div>

      <div class="shift-row noun"><b>PRE</b>sent</div>
      <div class="shift-row verb">pre<b>SENT</b></div>
      <div class="shift-row prefix">pre-</div>

      <div class="shift-row noun"><b>CON</b>flict</div>
      <div class="shift-row verb">con<b>FLICT</b></div>
      <div class="shift-row prefix">con-</div>

      <div class="shift-row noun"><b>IN</b>sult</div>
      <div class="shift-row verb">in<b>SULT</b></div>
      <div class="shift-row prefix">in-</div>

      <div class="shift-row noun"><b>PER</b>mit</div>
      <div class="shift-row verb">per<b>MIT</b></div>
      <div class="shift-row prefix">per-</div>

      <div class="shift-row noun"><b>CON</b>duct</div>
      <div class="shift-row verb">con<b>DUCT</b></div>
      <div class="shift-row prefix">con-</div>

      <div class="shift-row noun"><b>PRO</b>duce</div>
      <div class="shift-row verb">pro<b>DUCE</b></div>
      <div class="shift-row prefix">pro-</div>

      <div class="shift-row noun"><b>RE</b>bel</div>
      <div class="shift-row verb">re<b>BEL</b></div>
      <div class="shift-row prefix">re-</div>

      <div class="shift-row noun"><b>PRO</b>ject</div>
      <div class="shift-row verb">pro<b>JECT</b></div>
      <div class="shift-row prefix">pro-</div>

      <div class="shift-row noun"><b>OB</b>ject</div>
      <div class="shift-row verb">ob<b>JECT</b></div>
      <div class="shift-row prefix">ob-</div>

      <div class="shift-row noun"><b>IM</b>port</div>
      <div class="shift-row verb">im<b>PORT</b></div>
      <div class="shift-row prefix">im-</div>

      <div class="shift-row noun"><b>EX</b>port</div>
      <div class="shift-row verb">ex<b>PORT</b></div>
      <div class="shift-row prefix">ex-</div>

      <div class="shift-row noun"><b>SUS</b>pect</div>
      <div class="shift-row verb">sus<b>PECT</b></div>
      <div class="shift-row prefix">sus-</div>

      <div class="shift-row noun"><b>CON</b>test</div>
      <div class="shift-row verb">con<b>TEST</b></div>
      <div class="shift-row prefix">con-</div>
    </div>

    <!-- Compound Stress Rule -->
    <div class="compound-section">
      <div class="compound-title">THE COMPOUND STRESS RULE (Related Pattern)</div>
      <div class="compound-subtitle">Compound nouns = stress on first element. Adjective + noun = stress on second.</div>
      <div class="compound-grid">
        <div class="compound-pair">
          <span class="compound"><b>BLACK</b>bird</span>
          <span class="vs">vs.</span>
          <span class="adjnoun">black <b>BIRD</b></span>
          <span class="meaning">species vs. a bird that is black</span>
        </div>
        <div class="compound-pair">
          <span class="compound"><b>GREEN</b>house</span>
          <span class="vs">vs.</span>
          <span class="adjnoun">green <b>HOUSE</b></span>
          <span class="meaning">plant structure vs. a green house</span>
        </div>
        <div class="compound-pair">
          <span class="compound"><b>HOT</b> dog</span>
          <span class="vs">vs.</span>
          <span class="adjnoun">hot <b>DOG</b></span>
          <span class="meaning">frankfurter vs. a warm dog</span>
        </div>
        <div class="compound-pair">
          <span class="compound"><b>WHITE</b> House</span>
          <span class="vs">vs.</span>
          <span class="adjnoun">white <b>HOUSE</b></span>
          <span class="meaning">presidential residence vs. a white house</span>
        </div>
      </div>
    </div>
  </div>
  <figcaption>
    <strong>Figure 1:</strong> The noun-verb stress shift. English systematically places stress on the first syllable for nouns and the second syllable for verbs when the same Latinate word serves both functions. The pattern is most consistent with Latin prefixes (re-, pre-, con-, pro-, ob-, im-, ex-). The compound stress rule follows a parallel logic: compound nouns stress the first element (BLACKbird = a species), while adjective-noun phrases stress the second (black BIRD = a bird that is black).
  </figcaption>
</figure>
