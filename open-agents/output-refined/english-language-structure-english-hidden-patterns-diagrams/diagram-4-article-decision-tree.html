<!-- Diagram: English Article Decision Tree -->
<!-- Type: flowchart/decision tree -->
<!-- Generated: 2026-03-31 -->
<!-- Description: Systematic decision procedure for English article selection based on countability, number, and identifiability -->

<figure class="concept-diagram" id="diagram-article-decision-tree">
  <div class="diagram-container">
    <pre class="mermaid">
flowchart TB
    START(["What article does this noun need?"])

    Q1{"Is the noun<br/><b>COUNTABLE?</b><br/><i>Can you count it?</i>"}
    Q2{"Is it<br/><b>SINGULAR?</b>"}
    Q3{"Is it <b>IDENTIFIABLE</b><br/>to the hearer?"}
    Q4{"Is it <b>IDENTIFIABLE</b><br/>to the hearer?"}
    Q5{"Is it <b>IDENTIFIABLE</b><br/>to the hearer?"}

    THE1["<b>THE</b><br/><i>the book<br/>the car<br/>the problem</i>"]
    AAN["<b>A / AN</b><br/><i>a book<br/>a car<br/>a problem</i>"]
    THE2["<b>THE</b><br/><i>the books<br/>the problems</i>"]
    ZERO1["<b>ZERO / SOME</b><br/><i>books<br/>some books</i>"]
    THE3["<b>THE</b><br/><i>the water<br/>the information</i>"]
    ZERO2["<b>ZERO / SOME</b><br/><i>water<br/>some music</i>"]

    START --> Q1

    Q1 -->|"YES<br/>(chair, book, idea)"| Q2
    Q1 -->|"NO<br/>(water, furniture,<br/>information)"| Q5

    Q2 -->|"YES"| Q3
    Q2 -->|"NO (PLURAL)"| Q4

    Q3 -->|"YES"| THE1
    Q3 -->|"NO"| AAN

    Q4 -->|"YES"| THE2
    Q4 -->|"NO"| ZERO1

    Q5 -->|"YES"| THE3
    Q5 -->|"NO"| ZERO2

    subgraph ident["What makes a noun IDENTIFIABLE?"]
        direction TB
        I1["<b>Previous mention</b><br/>'I bought a book. The book was great.'"]
        I2["<b>Shared context</b><br/>'Close the door.' (we both see it)"]
        I3["<b>World knowledge</b><br/>'The sun is bright.' (only one sun)"]
        I4["<b>Modifier specifies</b><br/>'The book on the table'"]
        I5["<b>Cultural uniqueness</b><br/>'The president', 'The internet'"]
    end

    subgraph rule["CRITICAL RULE"]
        R["Singular countable nouns<br/><b>MUST have a determiner</b><br/>*'I bought book' is UNGRAMMATICAL<br/>'I bought a/the book' is required"]
    end

    subgraph generic["GENERIC STATEMENTS (same meaning, three forms)"]
        direction LR
        G1["'<b>A</b> dog is loyal'<br/><i>indefinite singular</i>"]
        G2["'<b>Dogs</b> are loyal'<br/><i>bare plural</i>"]
        G3["'<b>The</b> dog is loyal'<br/><i>definite singular</i>"]
    end

    style START fill:#3b82f6,stroke:#1e40af,color:#fff
    style Q1 fill:#fef3c7,stroke:#f59e0b,stroke-width:2px
    style Q2 fill:#fef3c7,stroke:#f59e0b,stroke-width:2px
    style Q3 fill:#fef3c7,stroke:#f59e0b,stroke-width:2px
    style Q4 fill:#fef3c7,stroke:#f59e0b,stroke-width:2px
    style Q5 fill:#fef3c7,stroke:#f59e0b,stroke-width:2px

    style THE1 fill:#dbeafe,stroke:#2563eb,stroke-width:2px
    style THE2 fill:#dbeafe,stroke:#2563eb,stroke-width:2px
    style THE3 fill:#dbeafe,stroke:#2563eb,stroke-width:2px
    style AAN fill:#d1fae5,stroke:#059669,stroke-width:2px
    style ZERO1 fill:#f3e8ff,stroke:#8b5cf6,stroke-width:2px
    style ZERO2 fill:#f3e8ff,stroke:#8b5cf6,stroke-width:2px

    style ident fill:#f8fafc,stroke:#94a3b8
    style rule fill:#fef2f2,stroke:#ef4444,stroke-width:2px
    style generic fill:#ecfdf5,stroke:#22c55e
    style R fill:#fee2e2,stroke:#dc2626
    </pre>
  </div>
  <figcaption>
    <strong>Figure 4:</strong> The English article decision tree. Article selection follows a systematic procedure based on three binary features: countability (can you count it?), number (singular or plural?), and identifiability (can the hearer identify which one?). The definite article "the" signals that the hearer can uniquely identify the referent. The mandatory-determiner rule for singular countable nouns (*"I bought book" is ungrammatical) is one of the most frequently violated structures by learners from article-less languages.
  </figcaption>
</figure>
