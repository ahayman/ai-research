<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Vigesimal Number System (70-99)</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --fr-color: #3b82f6;
    --fr-bg: #eff6ff;
    --en-color: #10b981;
    --en-bg: #ecfdf5;
    --celtic-color: #f59e0b;
    --celtic-bg: #fffbeb;
    --belgian-color: #8b5cf6;
    --belgian-bg: #f5f3ff;
    --math-color: #e63946;
    --math-bg: #fef2f2;
    --muted: #6c757d;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --fr-color: #60a5fa;
      --fr-bg: #1e293b;
      --en-color: #34d399;
      --en-bg: #132e24;
      --celtic-color: #fbbf24;
      --celtic-bg: #2a2510;
      --belgian-color: #a78bfa;
      --belgian-bg: #1e1b3a;
      --math-color: #ff6b6b;
      --math-bg: #2a1515;
      --muted: #9a9ab0;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure {
    max-width: 1100px;
    width: 100%;
    background: var(--surface);
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
  }
  h2 { text-align: center; font-size: 1.4rem; margin-bottom: 0.3rem; }
  .subtitle { text-align: center; font-size: 0.95rem; color: var(--muted); margin-bottom: 2rem; }

  /* Number line */
  .number-blocks {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1rem;
    margin-bottom: 2rem;
  }
  .num-block {
    border: 2px solid;
    border-radius: 12px;
    padding: 1rem;
    text-align: center;
  }
  .num-block.seventies { border-color: var(--fr-color); }
  .num-block.eighties { border-color: var(--math-color); }
  .num-block.nineties { border-color: var(--celtic-color); }
  .num-block .big-num { font-size: 2.5rem; font-weight: 800; }
  .num-block.seventies .big-num { color: var(--fr-color); }
  .num-block.eighties .big-num { color: var(--math-color); }
  .num-block.nineties .big-num { color: var(--celtic-color); }
  .num-block .french-name { font-size: 1rem; font-weight: 700; margin: 0.3rem 0; }
  .num-block .math { font-family: 'Courier New', monospace; font-size: 0.9rem; color: var(--muted); }
  .num-block .english { font-size: 0.82rem; color: var(--en-color); margin-top: 0.3rem; }

  /* Decomposition example */
  .decomposition {
    background: var(--math-bg);
    border: 2px solid var(--math-color);
    border-radius: 12px;
    padding: 1.25rem;
    margin-bottom: 1.5rem;
    text-align: center;
  }
  .decomposition h3 { color: var(--math-color); font-size: 1rem; margin-bottom: 0.8rem; }
  .decomp-example {
    font-size: 1.3rem;
    font-weight: 700;
    margin: 0.5rem 0;
  }
  .decomp-steps {
    font-family: 'Courier New', monospace;
    font-size: 0.9rem;
    color: var(--muted);
  }
  .ops-count { font-size: 0.85rem; margin-top: 0.5rem; }
  .ops-count strong { color: var(--math-color); }

  /* Three-way comparison */
  .three-way {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 1rem;
    margin-bottom: 1.5rem;
  }
  .way-card {
    border: 2px solid;
    border-radius: 10px;
    padding: 1rem;
    font-size: 0.82rem;
  }
  .way-card.standard { border-color: var(--fr-color); }
  .way-card.belgian { border-color: var(--belgian-color); }
  .way-card.english { border-color: var(--en-color); }
  .way-card h4 { font-size: 0.85rem; margin-bottom: 0.5rem; }
  .way-card.standard h4 { color: var(--fr-color); }
  .way-card.belgian h4 { color: var(--belgian-color); }
  .way-card.english h4 { color: var(--en-color); }
  .way-card .num-list { list-style: none; }
  .way-card .num-list li { padding: 0.15rem 0; border-bottom: 1px solid var(--border); }
  .way-card .num-list li:last-child { border-bottom: none; }

  /* Celtic origin */
  .celtic-box {
    background: var(--celtic-bg);
    border: 2px solid var(--celtic-color);
    border-radius: 12px;
    padding: 1.25rem;
  }
  .celtic-box h3 { color: var(--celtic-color); font-size: 1rem; margin-bottom: 0.5rem; }
  .celtic-box p { font-size: 0.85rem; }
  .celtic-timeline {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-top: 0.8rem;
    font-size: 0.82rem;
    flex-wrap: wrap;
    justify-content: center;
  }
  .celtic-step {
    padding: 0.3rem 0.6rem;
    border-radius: 6px;
    background: var(--surface);
    border: 1px solid var(--celtic-color);
  }
  .celtic-arrow { color: var(--celtic-color); font-weight: 700; }

  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid var(--border);
  }
  figcaption strong { display: block; font-size: 1.05rem; margin-bottom: 0.4rem; }
  figcaption span { font-size: 0.88rem; color: var(--muted); line-height: 1.5; }
  @media (max-width: 700px) {
    figure { padding: 1.2rem; }
    .number-blocks, .three-way { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<figure>
  <h2>The Vigesimal Number System (70-99)</h2>
  <p class="subtitle">A 2,000-year-old Celtic fossil embedded in modern French arithmetic</p>

  <!-- Three key numbers -->
  <div class="number-blocks">
    <div class="num-block seventies">
      <div class="big-num">70</div>
      <div class="french-name">soixante-dix</div>
      <div class="math">60 + 10</div>
      <div class="english">English: seventy (7 &times; 10)</div>
    </div>
    <div class="num-block eighties">
      <div class="big-num">80</div>
      <div class="french-name">quatre-vingts</div>
      <div class="math">4 &times; 20</div>
      <div class="english">English: eighty (8 &times; 10)</div>
    </div>
    <div class="num-block nineties">
      <div class="big-num">90</div>
      <div class="french-name">quatre-vingt-dix</div>
      <div class="math">4 &times; 20 + 10</div>
      <div class="english">English: ninety (9 &times; 10)</div>
    </div>
  </div>

  <!-- Decomposition -->
  <div class="decomposition">
    <h3>Cognitive Load: Decoding 97</h3>
    <div class="decomp-example" style="color:var(--fr-color);">
      quatre-vingt-dix-sept
    </div>
    <div class="decomp-steps">4 &times; 20 + 10 + 7 = 97</div>
    <div class="ops-count"><strong>2 arithmetic operations</strong> required to decode</div>
    <div style="margin-top:0.8rem;">
      <div class="decomp-example" style="color:var(--en-color);font-size:1.1rem;">ninety-seven</div>
      <div class="decomp-steps">90 + 7 = 97</div>
      <div class="ops-count"><strong>1 operation</strong> (base-10 is simpler to decode)</div>
    </div>
  </div>

  <!-- Three-way comparison -->
  <div class="three-way">
    <div class="way-card standard">
      <h4>Standard French (vigesimal)</h4>
      <ul class="num-list">
        <li>70 = soixante-dix</li>
        <li>71 = soixante-et-onze</li>
        <li>80 = quatre-vingts</li>
        <li>81 = quatre-vingt-un</li>
        <li>90 = quatre-vingt-dix</li>
        <li>99 = quatre-vingt-dix-neuf</li>
      </ul>
    </div>
    <div class="way-card belgian">
      <h4>Belgian / Swiss French (base-10)</h4>
      <ul class="num-list">
        <li>70 = septante</li>
        <li>71 = septante-et-un</li>
        <li>80 = huitante (Swiss)</li>
        <li>81 = huitante-et-un</li>
        <li>90 = nonante</li>
        <li>99 = nonante-neuf</li>
      </ul>
    </div>
    <div class="way-card english">
      <h4>English (base-10)</h4>
      <ul class="num-list">
        <li>70 = seventy</li>
        <li>71 = seventy-one</li>
        <li>80 = eighty</li>
        <li>81 = eighty-one</li>
        <li>90 = ninety</li>
        <li>99 = ninety-nine</li>
      </ul>
    </div>
  </div>

  <!-- Celtic origin -->
  <div class="celtic-box">
    <h3>Origin: A Gaulish (Celtic) Substrate Feature</h3>
    <p>The Gauls -- Celtic inhabitants of pre-Roman France -- used a base-20 counting system. When Latin replaced Gaulish as the spoken language (1st century BCE onward), the base-10 Latin system was adopted for most numbers, but the base-20 system survived in the 70-99 range.</p>
    <div class="celtic-timeline">
      <span class="celtic-step">Gaulish base-20</span>
      <span class="celtic-arrow">&rarr;</span>
      <span class="celtic-step">Roman conquest (58 BCE)</span>
      <span class="celtic-arrow">&rarr;</span>
      <span class="celtic-step">Latin replaces Gaulish</span>
      <span class="celtic-arrow">&rarr;</span>
      <span class="celtic-step">Base-20 survives for 70-99</span>
      <span class="celtic-arrow">&rarr;</span>
      <span class="celtic-step">Modern French (2,000+ years later)</span>
    </div>
    <p style="font-size:0.82rem;color:var(--muted);margin-top:0.8rem;">Other Celtic languages also use base-20: Welsh, Breton, Irish. The medieval Parisian hospital "Quinze-Vingts" (15 &times; 20 = 300) preserves a more extensive vigesimal usage. English's own Celtic substrate (Brittonic) left virtually zero structural traces -- one of the unsolved puzzles of historical linguistics.</p>
  </div>

  <figcaption>
    <strong>Figure 5: The Vigesimal Number System (70-99)</strong>
    <span>Standard French uses a base-20 (vigesimal) system for numbers 70-99, inherited from Gaulish Celtic over 2,000 years ago. This requires additional arithmetic to decode (quatre-vingt-dix-sept = 4&times;20+10+7 = 97) compared to English's purely base-10 system (ninety-seven = 90+7). Belgian and Swiss French demonstrate that a base-10 alternative (septante, huitante, nonante) is entirely possible -- the vigesimal system is specifically a Metropolitan French feature, a living fossil from pre-Roman Gaul.</span>
  </figcaption>
</figure>
</body>
</html>
