<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Faux Amis -- The Treacherous Gap</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --danger: #e63946;
    --danger-bg: #fef2f2;
    --caution: #f59e0b;
    --caution-bg: #fffbeb;
    --fr-color: #3b82f6;
    --en-color: #10b981;
    --drift-color: #8b5cf6;
    --drift-bg: #f5f3ff;
    --muted: #6c757d;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --danger: #ff6b6b;
      --danger-bg: #2a1515;
      --caution: #fbbf24;
      --caution-bg: #2a2510;
      --fr-color: #60a5fa;
      --en-color: #34d399;
      --drift-color: #a78bfa;
      --drift-bg: #1e1b3a;
      --muted: #9a9ab0;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure {
    max-width: 1100px;
    width: 100%;
    background: var(--surface);
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
  }
  h2 { text-align: center; font-size: 1.4rem; margin-bottom: 0.3rem; }
  .subtitle { text-align: center; font-size: 0.95rem; color: var(--muted); margin-bottom: 2rem; }

  .faux-table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 1.5rem;
    font-size: 0.82rem;
  }
  .faux-table th {
    padding: 0.5rem 0.6rem;
    border-bottom: 2px solid var(--border);
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }
  .faux-table th:nth-child(1) { color: var(--fr-color); text-align: left; }
  .faux-table th:nth-child(2) { text-align: center; }
  .faux-table th:nth-child(3) { color: var(--en-color); text-align: left; }
  .faux-table th:nth-child(4) { color: var(--fr-color); text-align: left; }
  .faux-table td {
    padding: 0.45rem 0.6rem;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
  }
  .faux-table tr:last-child td { border-bottom: none; }
  .fr-word { font-weight: 700; color: var(--fr-color); }
  .en-word { font-weight: 700; color: var(--en-color); }
  .actual-meaning { font-weight: 600; }
  .cross-icon { color: var(--danger); font-weight: 900; font-size: 1.1rem; text-align: center; }
  .severity-tag {
    display: inline-block;
    font-size: 0.65rem;
    padding: 1px 5px;
    border-radius: 10px;
    font-weight: 600;
    margin-left: 0.3rem;
  }
  .severity-tag.high { background: var(--danger-bg); color: var(--danger); }
  .severity-tag.medium { background: var(--caution-bg); color: var(--caution); }

  .section-break {
    padding: 0.3rem 0.6rem;
    background: var(--surface);
    font-weight: 700;
    font-size: 0.78rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
  }

  .drift-box {
    background: var(--drift-bg);
    border: 2px solid var(--drift-color);
    border-radius: 12px;
    padding: 1.25rem;
    margin-bottom: 1.5rem;
  }
  .drift-box h3 { color: var(--drift-color); font-size: 1rem; margin-bottom: 0.5rem; }
  .drift-box p { font-size: 0.85rem; }
  .drift-example {
    margin: 0.5rem 0;
    padding: 0.4rem 0.8rem;
    border-radius: 6px;
    background: var(--surface);
    font-size: 0.82rem;
  }

  .count-note {
    text-align: center;
    font-size: 0.85rem;
    color: var(--muted);
    margin-bottom: 1rem;
    font-style: italic;
  }

  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid var(--border);
  }
  figcaption strong { display: block; font-size: 1.05rem; margin-bottom: 0.4rem; }
  figcaption span { font-size: 0.88rem; color: var(--muted); line-height: 1.5; }
  @media (max-width: 700px) {
    figure { padding: 1.2rem; }
    .faux-table { font-size: 0.75rem; }
  }
</style>
</head>
<body>
<figure>
  <h2>Faux Amis -- The Treacherous Gap</h2>
  <p class="subtitle">Same spelling. Different meaning. The dark side of the cognate bridge.</p>
  <p class="count-note">Estimates range from 85 to several hundred false friends, depending on how broadly "false friend" is defined.</p>

  <table class="faux-table">
    <thead>
      <tr>
        <th>French Word</th>
        <th></th>
        <th>English Lookalike</th>
        <th>True French Equivalent</th>
      </tr>
    </thead>
    <tbody>
      <tr><td colspan="4" class="section-break">Complete False Friends (no overlap)</td></tr>
      <tr>
        <td><span class="fr-word">attendre</span> = <span class="actual-meaning">to wait</span> <span class="severity-tag high">high risk</span></td>
        <td class="cross-icon">&ne;</td>
        <td><span class="en-word">attend</span> = to be present at</td>
        <td>assister (&agrave;)</td>
      </tr>
      <tr>
        <td><span class="fr-word">assister</span> = <span class="actual-meaning">to attend, be present</span> <span class="severity-tag high">high risk</span></td>
        <td class="cross-icon">&ne;</td>
        <td><span class="en-word">assist</span> = to help</td>
        <td>aider</td>
      </tr>
      <tr>
        <td><span class="fr-word">actuellement</span> = <span class="actual-meaning">currently</span> <span class="severity-tag high">high risk</span></td>
        <td class="cross-icon">&ne;</td>
        <td><span class="en-word">actually</span> = in fact</td>
        <td>en fait, vraiment</td>
      </tr>
      <tr>
        <td><span class="fr-word">blesser</span> = <span class="actual-meaning">to injure</span> <span class="severity-tag high">high risk</span></td>
        <td class="cross-icon">&ne;</td>
        <td><span class="en-word">bless</span> = to consecrate</td>
        <td>b&eacute;nir</td>
      </tr>
      <tr>
        <td><span class="fr-word">librairie</span> = <span class="actual-meaning">bookshop</span> <span class="severity-tag high">high risk</span></td>
        <td class="cross-icon">&ne;</td>
        <td><span class="en-word">library</span> = lending library</td>
        <td>biblioth&egrave;que</td>
      </tr>
      <tr>
        <td><span class="fr-word">sensible</span> = <span class="actual-meaning">sensitive</span> <span class="severity-tag high">high risk</span></td>
        <td class="cross-icon">&ne;</td>
        <td><span class="en-word">sensible</span> = practical, reasonable</td>
        <td>raisonnable, sens&eacute;</td>
      </tr>
      <tr>
        <td><span class="fr-word">pr&eacute;servatif</span> = <span class="actual-meaning">condom</span> <span class="severity-tag high">high risk</span></td>
        <td class="cross-icon">&ne;</td>
        <td><span class="en-word">preservative</span> = food additive</td>
        <td>conservateur</td>
      </tr>
      <tr>
        <td><span class="fr-word">monnaie</span> = <span class="actual-meaning">change, currency</span></td>
        <td class="cross-icon">&ne;</td>
        <td><span class="en-word">money</span> = general money</td>
        <td>argent</td>
      </tr>
      <tr>
        <td><span class="fr-word">journ&eacute;e</span> = <span class="actual-meaning">daytime, full day</span></td>
        <td class="cross-icon">&ne;</td>
        <td><span class="en-word">journey</span> = trip</td>
        <td>voyage</td>
      </tr>

      <tr><td colspan="4" class="section-break">Semi-False Friends (partial overlap)</td></tr>
      <tr>
        <td><span class="fr-word">demander</span> = <span class="actual-meaning">to ask</span> <span class="severity-tag medium">medium</span></td>
        <td class="cross-icon">&asymp;</td>
        <td><span class="en-word">demand</span> = to require forcefully</td>
        <td>exiger</td>
      </tr>
      <tr>
        <td><span class="fr-word">rester</span> = <span class="actual-meaning">to stay, remain</span> <span class="severity-tag medium">medium</span></td>
        <td class="cross-icon">&asymp;</td>
        <td><span class="en-word">rest</span> = to relax/sleep</td>
        <td>se reposer</td>
      </tr>
      <tr>
        <td><span class="fr-word">sympathique</span> = <span class="actual-meaning">nice, likeable</span></td>

        <td>compatissant</td>

    </tbody>
  </table>

  <!-- Semantic drift pattern -->
  <div class="drift-box">
    <h3>The Pattern: French Preserves Latin, English Drifts</h3>
    <p>Many false friends show a systematic pattern where French retained the original Latin meaning while English shifted to a more specialized or metaphorical sense:</p>
    <div class="drift-example">
      <strong>attendre</strong> &larr; Latin <em>attendere</em> (to stretch toward, give attention) -- French kept "waiting/attending to"; English shifted to "being present at"
    </div>
    <div class="drift-example">
      <strong>assister</strong> &larr; Latin <em>assistere</em> (to stand by) -- French kept "standing by/being present"; English shifted to "helping"
    </div>
    <p style="font-size:0.82rem;color:var(--muted);margin-top:0.5rem;">This drift pattern is itself predictable: when you see a false friend, check if French has the older, more literal Latin meaning. It often does.</p>
  </div>

  <figcaption>
    <strong>Figure 2: Faux Amis -- The Treacherous Gap</strong>
    <span>False friends are the price of the cognate bridge. The same historical relationship that created ~1,700 genuine cognates also produced an estimated 85 to several hundred meaning divergences where the same Latin root evolved differently in each language. The cognate strategy usually works -- but when it fails, it fails dramatically. The pattern-recognition approach works well: learn the systematic drift direction (French preserves Latin, English shifts) and flag the exceptions.</span>
  </figcaption>
</figure>
