<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Savoir vs. Connaître -- The Split "Know"</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --savoir-color: #3b82f6;
    --savoir-bg: #eff6ff;
    --connaitre-color: #8b5cf6;
    --connaitre-bg: #f5f3ff;
    --en-color: #10b981;
    --en-bg: #ecfdf5;
    --rule-color: #f59e0b;
    --rule-bg: #fffbeb;
    --muted: #6c757d;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --savoir-color: #60a5fa;
      --savoir-bg: #1e293b;
      --connaitre-color: #a78bfa;
      --connaitre-bg: #1e1b3a;
      --en-color: #34d399;
      --en-bg: #132e24;
      --rule-color: #fbbf24;
      --rule-bg: #2a2510;
      --muted: #9a9ab0;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure {
    max-width: 1100px;
    width: 100%;
    background: var(--surface);
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
  }
  h2 { text-align: center; font-size: 1.4rem; margin-bottom: 0.3rem; }
  .subtitle { text-align: center; font-size: 0.95rem; color: var(--muted); margin-bottom: 2rem; }

  /* English "know" hub */
  .know-hub {
    text-align: center;
    margin-bottom: 1.5rem;
  }
  .know-node {
    display: inline-block;
    background: var(--en-color);
    color: #fff;
    padding: 0.6rem 2rem;
    border-radius: 25px;
    font-size: 1.2rem;
    font-weight: 700;
  }
  .know-desc { font-size: 0.82rem; color: var(--muted); margin-top: 0.3rem; }
  .split-arrow { text-align: center; font-size: 2rem; color: var(--muted); margin: 0.5rem 0; }

  /* Two branches */
  .branches {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5rem;
    margin-bottom: 1.5rem;
  }
  .branch {
    border: 2px solid;
    border-radius: 12px;
    padding: 1.25rem;
  }
  .branch.savoir { border-color: var(--savoir-color); }
  .branch.connaitre { border-color: var(--connaitre-color); }
  .branch h3 { font-size: 1.1rem; margin-bottom: 0.3rem; }
  .branch.savoir h3 { color: var(--savoir-color); }
  .branch.connaitre h3 { color: var(--connaitre-color); }
  .branch .concept { font-size: 0.85rem; color: var(--muted); margin-bottom: 0.8rem; font-style: italic; }

  .follows-box {
    padding: 0.5rem 0.8rem;
    border-radius: 6px;
    margin-bottom: 0.8rem;
    font-size: 0.82rem;
    font-weight: 600;
  }
  .branch.savoir .follows-box { background: var(--savoir-bg); color: var(--savoir-color); }
  .branch.connaitre .follows-box { background: var(--connaitre-bg); color: var(--connaitre-color); }

  .example-list { list-style: none; font-size: 0.82rem; }
  .example-list li { padding: 0.3rem 0; border-bottom: 1px solid var(--border); }
  .example-list li:last-child { border-bottom: none; }
  .ex-fr { font-weight: 600; }
  .ex-en { color: var(--muted); font-style: italic; font-size: 0.78rem; display: block; }

  /* Decision rule -->
  .decision-rule {
    background: var(--rule-bg);
    border: 2px solid var(--rule-color);
    border-radius: 12px;
    padding: 1.25rem;
    text-align: center;
    margin-bottom: 1.5rem;
  }
  .decision-rule h3 { color: var(--rule-color); font-size: 1rem; margin-bottom: 0.5rem; }
  .decision-rule .rule-text { font-size: 1rem; font-weight: 700; }
  .decision-rule .rule-detail { font-size: 0.82rem; color: var(--muted); margin-top: 0.3rem; }

  /* Aspect effects */
  .aspect-effects {
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.25rem;
    margin-bottom: 1.5rem;
  }
  .aspect-effects h3 { font-size: 1rem; margin-bottom: 0.8rem; }
  .aspect-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.5rem;
    font-size: 0.82rem;
  }
  .aspect-item {
    padding: 0.4rem 0.6rem;
    border-radius: 6px;
  }
  .aspect-item.imp { background: var(--savoir-bg); border-left: 3px solid var(--savoir-color); }
  .aspect-item.pc { background: var(--connaitre-bg); border-left: 3px solid var(--connaitre-color); }

  /* Cross-linguistic -->
  .crossling {
    padding: 1rem;
    background: var(--en-bg);
    border: 2px solid var(--en-color);
    border-radius: 10px;
  }
  .crossling h3 { color: var(--en-color); font-size: 0.95rem; margin-bottom: 0.4rem; }
  .crossling p { font-size: 0.85rem; }
  .lang-pair { font-weight: 600; margin-right: 0.5rem; }

  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid var(--border);
  }
  figcaption strong { display: block; font-size: 1.05rem; margin-bottom: 0.4rem; }
  figcaption span { font-size: 0.88rem; color: var(--muted); line-height: 1.5; }
  @media (max-width: 700px) {
    figure { padding: 1.2rem; }
    .branches { grid-template-columns: 1fr; }
    .aspect-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<figure>
  <h2>Savoir vs. Conna&icirc;tre -- The Split "Know"</h2>
  <p class="subtitle">English has one "know." French has two. The rule is almost exceptionless.</p>

  <div class="know-hub">
    <div class="know-node">English: "know"</div>
    <p class="know-desc">One verb covers all types of knowing</p>
  </div>
  <div class="split-arrow">&darr;&darr;</div>

  <div class="branches">
    <div class="branch savoir">
      <h3>SAVOIR</h3>
      <div class="concept">Knowing through learning, information, reasoning (epistemic)</div>
      <div class="follows-box">Followed by: que-clause, infinitive, interrogative, or a fact</div>
      <ul class="example-list">
        <li><span class="ex-fr">Je sais que Paris est la capitale</span><span class="ex-en">I know that Paris is the capital (propositional)</span></li>
        <li><span class="ex-fr">Je sais nager</span><span class="ex-en">I know how to swim (skill)</span></li>
        <li><span class="ex-fr">Je sais la r&eacute;ponse</span><span class="ex-en">I know the answer (factual)</span></li>
        <li><span class="ex-fr">Tu sais o&ugrave; il habite?</span><span class="ex-en">Do you know where he lives? (embedded question)</span></li>
      </ul>
    </div>

    <div class="branch connaitre">
      <h3>CONNA&Icirc;TRE</h3>
      <div class="concept">Knowing through experience, acquaintance, familiarity (experiential)</div>
      <div class="follows-box">Followed by: ALWAYS a noun (person, place, thing)</div>
      <ul class="example-list">
        <li><span class="ex-fr">Je connais Marie</span><span class="ex-en">I know Marie (personal acquaintance)</span></li>
        <li><span class="ex-fr">Je connais Paris</span><span class="ex-en">I know Paris (experiential familiarity)</span></li>
        <li><span class="ex-fr">Je connais cette chanson</span><span class="ex-en">I know this song (familiar through experience)</span></li>
        <li><span class="ex-fr">Tu connais ce restaurant?</span><span class="ex-en">Do you know this restaurant? (have you been?)</span></li>
      </ul>
    </div>
  </div>

  <!-- Decision rule -->
  <div class="decision-rule">
    <h3>The Pattern (nearly exceptionless)</h3>
    <div class="rule-text">Conna&icirc;tre + NOUN (always) &nbsp;&nbsp;|&nbsp;&nbsp; Savoir + everything else</div>
    <div class="rule-detail">If the next word is a noun (person/place/thing) &rarr; conna&icirc;tre. If it's que, a question word, an infinitive, or a specific fact &rarr; savoir.</div>
  </div>

  <!-- Aspect effects -->
  <div class="aspect-effects">
    <h3>Pass&eacute; Compos&eacute; Changes the Meaning (aspect interaction)</h3>
    <div class="aspect-grid">
      <div class="aspect-item imp"><strong>connaissais</strong> = knew (ongoing familiarity)</div>
      <div class="aspect-item pc"><strong>ai connu</strong> = met (moment of acquaintance)</div>
      <div class="aspect-item imp"><strong>savais</strong> = knew (state of knowledge)</div>
      <div class="aspect-item pc"><strong>ai su</strong> = found out (moment of discovery)</div>
    </div>
    <p style="font-size:0.78rem;color:var(--muted);margin-top:0.5rem;">The perfective aspect (pass&eacute; compos&eacute;) converts ongoing states into bounded events: "knowing" becomes "meeting" or "discovering."</p>
  </div>

  <!-- Cross-linguistic -->
  <div class="crossling">
    <h3>English Is the Odd One Out</h3>
    <p>This distinction exists across many European languages. English is unusual in LACKING it:</p>
    <p style="margin-top:0.3rem;">
      <span class="lang-pair">German:</span> wissen / kennen &nbsp;
      <span class="lang-pair">Spanish:</span> saber / conocer &nbsp;
      <span class="lang-pair">Italian:</span> sapere / conoscere &nbsp;
      <span class="lang-pair">Portuguese:</span> saber / conhecer
    </p>
    <p style="font-size:0.82rem;color:var(--muted);margin-top:0.3rem;">English collapsed a distinction that most European languages maintain. Learning it in French also prepares you for German, Spanish, Italian, and Portuguese.</p>
  </div>

  <figcaption>
    <strong>Figure 3: Savoir vs. Conna&icirc;tre -- The Split "Know"</strong>
    <span>French divides "knowing" into two conceptually distinct domains: savoir (epistemic knowledge -- facts, skills, information) and conna&icirc;tre (experiential knowledge -- acquaintance, familiarity). The grammatical rule is nearly exceptionless: conna&icirc;tre takes a noun; savoir takes clauses, infinitives, and questions. English collapses both into a single verb "know," making it the exception among European languages.</span>
  </figcaption>
</figure>
</body>
</html>
