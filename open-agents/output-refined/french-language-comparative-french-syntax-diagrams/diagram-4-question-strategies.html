<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Three Question Formation Strategies</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --accent: #4361ee; --accent-light: #e8edff;
    --casual: #22c55e; --casual-bg: #dcfce7;
    --standard: #f59e0b; --standard-bg: #fef3c7;
    --formal: #a855f7; --formal-bg: #f3e8ff;
    --english: #ef4444; --english-bg: #fee2e2;
    --muted: #6c757d; --caption-bg: #f8f9fa;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a; --fg: #e8e8f0; --surface: #1a1a2e; --border: #2d2d44;
      --accent: #6b8aff; --accent-light: #1e2a4a;
      --casual: #4ade80; --casual-bg: #14532d;
      --standard: #fbbf24; --standard-bg: #78350f;
      --formal: #c084fc; --formal-bg: #3b1764;
      --english: #f87171; --english-bg: #5c1a1a;
      --muted: #9a9ab0; --caption-bg: #1a1a2e;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg); color: var(--fg);
    display: flex; justify-content: center; padding: 2rem 1rem; line-height: 1.6;
  }
  figure { max-width: 1100px; width: 100%; }
  .diagram-container {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 1.5rem 1rem; overflow-x: auto;
  }
  figcaption {
    text-align: center; margin-top: 1.5rem; padding: 1rem 1.5rem;
    background: var(--caption-bg); border-radius: 8px; border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  svg { display: block; margin: 0 auto; }
  .title-text { font: bold 14px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
  .subtitle-text { font: 11px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
  .box-text { font: 12px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
  .word { font: bold 15px 'Segoe UI', system-ui, sans-serif; }
  .label-sm { font: 10px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
  .legend { display: flex; gap: 1.5rem; justify-content: center; flex-wrap: wrap; margin-top: 1rem; font-size: 0.82rem; color: var(--muted); }
  .legend-item { display: flex; align-items: center; gap: 0.4rem; }
  .legend-swatch { width: 14px; height: 14px; border-radius: 3px; border: 1px solid var(--border); }
</style>
</head>
<body>
<figure>
  <div class="diagram-container">
    <svg viewBox="0 0 1060 550" xmlns="http://www.w3.org/2000/svg" style="min-width:780px;">
      <text x="530" y="28" text-anchor="middle" class="title-text" style="font-size:16px;">Three Question Formation Strategies Mapped to Register</text>
      <text x="530" y="46" text-anchor="middle" class="subtitle-text">French grammaticalizes formality directly in syntax -- English has one strategy</text>

      <!-- ========== YES/NO QUESTIONS ========== -->
      <g transform="translate(30, 70)">
        <text x="250" y="0" text-anchor="middle" class="title-text" fill="var(--accent)">Yes/No Question: "Are you coming?"</text>

        <!-- Tier 1: Casual -->
        <rect x="0" y="20" width="500" height="55" rx="8" fill="var(--casual-bg)" stroke="var(--casual)" stroke-width="2"/>
        <text x="15" y="38" text-anchor="start" class="label-sm" fill="var(--casual)" style="font-weight:bold;font-size:11px;">CASUAL</text>
        <text x="15" y="55" text-anchor="start" class="label-sm" fill="var(--casual)">Rising intonation only</text>
        <text x="200" y="55" text-anchor="start" class="word" fill="var(--casual)">Tu viens?  \u2197</text>
        <text x="370" y="55" text-anchor="start" class="label-sm">No syntactic change at all</text>

        <!-- Tier 2: Standard -->
        <rect x="0" y="85" width="500" height="55" rx="8" fill="var(--standard-bg)" stroke="var(--standard)" stroke-width="2"/>
        <text x="15" y="103" text-anchor="start" class="label-sm" fill="var(--standard)" style="font-weight:bold;font-size:11px;">STANDARD</text>
        <text x="15" y="120" text-anchor="start" class="label-sm" fill="var(--standard)">Est-ce que particle</text>
        <text x="200" y="120" text-anchor="start" class="word" fill="var(--standard)">Est-ce que tu viens?</text>
        <text x="420" y="120" text-anchor="start" class="label-sm">Insert particle; rest unchanged</text>

        <!-- Tier 3: Formal -->
        <rect x="0" y="150" width="500" height="55" rx="8" fill="var(--formal-bg)" stroke="var(--formal)" stroke-width="2"/>
        <text x="15" y="168" text-anchor="start" class="label-sm" fill="var(--formal)" style="font-weight:bold;font-size:11px;">FORMAL</text>
        <text x="15" y="185" text-anchor="start" class="label-sm" fill="var(--formal)">Subject-verb inversion</text>
        <text x="200" y="185" text-anchor="start" class="word" fill="var(--formal)">Viens-tu?</text>
        <text x="310" y="185" text-anchor="start" class="label-sm">Subject pronoun after verb</text>
      </g>

      <!-- ========== WH-QUESTIONS ========== -->
      <g transform="translate(560, 70)">
        <text x="220" y="0" text-anchor="middle" class="title-text" fill="var(--accent)">Wh-Question: "Where are you going?"</text>

        <!-- Tier 1 -->
        <rect x="0" y="20" width="450" height="55" rx="8" fill="var(--casual-bg)" stroke="var(--casual)" stroke-width="2"/>
        <text x="15" y="38" text-anchor="start" class="label-sm" fill="var(--casual)" style="font-weight:bold;font-size:11px;">CASUAL</text>
        <text x="15" y="55" text-anchor="start" class="label-sm" fill="var(--casual)">Question word in situ</text>
        <text x="180" y="55" text-anchor="start" class="word" fill="var(--casual)">Tu vas ou?</text>
        <text x="310" y="55" text-anchor="start" class="label-sm">Wh-word stays at end</text>

        <!-- Tier 2 -->
        <rect x="0" y="85" width="450" height="55" rx="8" fill="var(--standard-bg)" stroke="var(--standard)" stroke-width="2"/>
        <text x="15" y="103" text-anchor="start" class="label-sm" fill="var(--standard)" style="font-weight:bold;font-size:11px;">STANDARD</text>
        <text x="15" y="120" text-anchor="start" class="label-sm" fill="var(--standard)">Fronted + est-ce que</text>
        <text x="180" y="120" text-anchor="start" class="word" fill="var(--standard)">Ou est-ce que tu vas?</text>

        <!-- Tier 3 -->
        <rect x="0" y="150" width="450" height="55" rx="8" fill="var(--formal-bg)" stroke="var(--formal)" stroke-width="2"/>
        <text x="15" y="168" text-anchor="start" class="label-sm" fill="var(--formal)" style="font-weight:bold;font-size:11px;">FORMAL</text>
        <text x="15" y="185" text-anchor="start" class="label-sm" fill="var(--formal)">Fronted + inversion</text>
        <text x="180" y="185" text-anchor="start" class="word" fill="var(--formal)">Ou vas-tu?</text>
      </g>

      <!-- ========== REGISTER SCALE ========== -->
      <g transform="translate(30, 310)">
        <defs>
          <linearGradient id="regScale" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:var(--casual)" />
            <stop offset="50%" style="stop-color:var(--standard)" />
            <stop offset="100%" style="stop-color:var(--formal)" />
          </linearGradient>
        </defs>
        <rect x="100" y="0" width="800" height="20" rx="10" fill="url(#regScale)" opacity="0.3"/>
        <rect x="100" y="0" width="800" height="20" rx="10" fill="none" stroke="var(--border)" stroke-width="1"/>

        <text x="100" y="38" text-anchor="middle" class="box-text" fill="var(--casual)">Text messages</text>
        <text x="100" y="52" text-anchor="middle" class="box-text" fill="var(--casual)">Casual talk</text>

        <text x="500" y="38" text-anchor="middle" class="box-text" fill="var(--standard)">Everyday</text>
        <text x="500" y="52" text-anchor="middle" class="box-text" fill="var(--standard)">conversation</text>

        <text x="900" y="38" text-anchor="middle" class="box-text" fill="var(--formal)">Literature</text>
        <text x="900" y="52" text-anchor="middle" class="box-text" fill="var(--formal)">Formal writing</text>

        <text x="500" y="72" text-anchor="middle" class="subtitle-text" style="font-size:11px;">
          Inversion is declining in spoken French -- effectively reducing to a two-strategy system (intonation + est-ce que) in most spoken contexts
        </text>
      </g>

      <!-- ========== ENGLISH COMPARISON ========== -->
      <g transform="translate(30, 400)">
        <rect x="0" y="0" width="1000" height="90" rx="10" fill="var(--english-bg)" stroke="var(--english)" stroke-width="1.5"/>
        <text x="500" y="22" text-anchor="middle" class="title-text" fill="var(--english)">English: ONE Strategy (Inversion + Do-Support)</text>

        <text x="30" y="48" text-anchor="start" class="box-text" fill="var(--fg)">
          Yes/No: "Do you come?" / "Are you coming?" -- ONLY inversion (with obligatory do-support for most verbs)
        </text>
        <text x="30" y="68" text-anchor="start" class="box-text" fill="var(--fg)">
          Wh: "Where do you go?" / "Where are you going?" -- question word fronted + inversion + do-support
        </text>
        <text x="30" y="88" text-anchor="start" class="box-text" style="font-weight:bold;" fill="var(--english)">
          English has no question particle like "est-ce que." Register variation comes from word choice, not syntactic structure.
        </text>
      </g>

      <!-- Key insight -->
      <g transform="translate(30, 505)">
        <rect x="0" y="0" width="1000" height="35" rx="6" fill="var(--accent-light)" stroke="var(--accent)" stroke-width="1"/>
        <text x="500" y="22" text-anchor="middle" class="box-text" style="font-weight:bold;" fill="var(--accent)">
          French encodes register IN syntax (3 strategies). English encodes register OUTSIDE syntax (word choice, tone). A structural vs. lexical encoding difference.
        </text>
      </g>
    </svg>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background:var(--casual-bg);border-color:var(--casual);"></div> Casual (intonation)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--standard-bg);border-color:var(--standard);"></div> Standard (est-ce que)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--formal-bg);border-color:var(--formal);"></div> Formal (inversion)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--english-bg);border-color:var(--english);"></div> English (one strategy)</div>
  </div>

  <figcaption>
    <h2>Figure 4 -- Three Question Formation Strategies Mapped to Register</h2>
    <p>French has three syntactically distinct ways to form questions, each mapped to a register level: rising intonation (casual), est-ce que insertion (standard), and subject-verb inversion (formal). English has only one standard strategy (do-support inversion) with no syntactic register variation. French grammaticalizes formality directly in sentence structure -- choosing a question form tells the listener how formal you intend to be. Inversion is declining in spoken French, making it effectively a two-strategy system in everyday speech.</p>
  </figcaption>
</figure>
</body>
</html>
