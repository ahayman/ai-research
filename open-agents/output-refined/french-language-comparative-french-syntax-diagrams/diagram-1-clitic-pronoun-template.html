<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clitic Pronoun Template</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --accent: #4361ee; --accent-light: #e8edff;
    --french: #3b82f6; --french-bg: #dbeafe;
    --english: #ef4444; --english-bg: #fee2e2;
    --slot1: #8b5cf6; --slot1-bg: #ede9fe;
    --slot2: #22c55e; --slot2-bg: #dcfce7;
    --slot3: #f59e0b; --slot3-bg: #fef3c7;
    --slot4: #06b6d4; --slot4-bg: #cffafe;
    --slot5: #ec4899; --slot5-bg: #fce7f3;
    --neg: #ef4444; --neg-bg: #fee2e2;
    --verb: #1e3a5f;
    --muted: #6c757d; --caption-bg: #f8f9fa;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a; --fg: #e8e8f0; --surface: #1a1a2e; --border: #2d2d44;
      --accent: #6b8aff; --accent-light: #1e2a4a;
      --french: #60a5fa; --french-bg: #1e3a5f;
      --english: #f87171; --english-bg: #5c1a1a;
      --slot1: #a78bfa; --slot1-bg: #2e1a5e;
      --slot2: #4ade80; --slot2-bg: #14532d;
      --slot3: #fbbf24; --slot3-bg: #78350f;
      --slot4: #22d3ee; --slot4-bg: #0c3d4a;
      --slot5: #f472b6; --slot5-bg: #5c1a3a;
      --neg: #f87171; --neg-bg: #5c1a1a;
      --verb: #93c5fd;
      --muted: #9a9ab0; --caption-bg: #1a1a2e;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg); color: var(--fg);
    display: flex; justify-content: center; padding: 2rem 1rem; line-height: 1.6;
  }
  figure { max-width: 1100px; width: 100%; }
  .diagram-container {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 1.5rem 1rem; overflow-x: auto;
  }
  figcaption {
    text-align: center; margin-top: 1.5rem; padding: 1rem 1.5rem;
    background: var(--caption-bg); border-radius: 8px; border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  svg { display: block; margin: 0 auto; }
  .title-text { font: bold 14px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
  .subtitle-text { font: 11px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
  .box-text { font: 12px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
  .slot-label { font: bold 11px 'Segoe UI', system-ui, sans-serif; }
  .word { font: bold 14px 'Segoe UI', system-ui, sans-serif; }
  .label-sm { font: 10px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
  .legend { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; margin-top: 1rem; font-size: 0.82rem; color: var(--muted); }
  .legend-item { display: flex; align-items: center; gap: 0.4rem; }
  .legend-swatch { width: 14px; height: 14px; border-radius: 3px; border: 1px solid var(--border); }
</style>
</head>
<body>
<figure>
  <div class="diagram-container">
    <svg viewBox="0 0 1060 600" xmlns="http://www.w3.org/2000/svg" style="min-width:780px;">
      <text x="530" y="28" text-anchor="middle" class="title-text" style="font-size:16px;">The Clitic Pronoun Template</text>
      <text x="530" y="46" text-anchor="middle" class="subtitle-text">A rigid pre-verbal slot structure with NO English equivalent</text>

      <!-- ========== THE TEMPLATE ========== -->
      <g transform="translate(20, 70)">
        <text x="510" y="0" text-anchor="middle" class="title-text" fill="var(--french)">French Declarative Clause Template</text>

        <!-- Slot boxes -->
        <rect x="10" y="20" width="80" height="60" rx="6" fill="var(--surface)" stroke="var(--border)" stroke-width="2"/>
        <text x="50" y="45" text-anchor="middle" class="slot-label" fill="var(--fg)">Subject</text>
        <text x="50" y="62" text-anchor="middle" class="label-sm">je, tu, il...</text>

        <rect x="100" y="20" width="60" height="60" rx="6" fill="var(--neg-bg)" stroke="var(--neg)" stroke-width="1.5"/>
        <text x="130" y="45" text-anchor="middle" class="slot-label" fill="var(--neg)">(ne)</text>
        <text x="130" y="62" text-anchor="middle" class="label-sm">neg. 1</text>

        <rect x="170" y="20" width="130" height="60" rx="6" fill="var(--slot1-bg)" stroke="var(--slot1)" stroke-width="2"/>
        <text x="235" y="40" text-anchor="middle" class="slot-label" fill="var(--slot1)">me/te/se</text>
        <text x="235" y="55" text-anchor="middle" class="slot-label" fill="var(--slot1)">nous/vous</text>
        <text x="235" y="72" text-anchor="middle" class="label-sm">reflexive/1st-2nd</text>

        <rect x="310" y="20" width="100" height="60" rx="6" fill="var(--slot2-bg)" stroke="var(--slot2)" stroke-width="2"/>
        <text x="360" y="45" text-anchor="middle" class="slot-label" fill="var(--slot2)">le/la/les</text>
        <text x="360" y="62" text-anchor="middle" class="label-sm">direct obj.</text>

        <rect x="420" y="20" width="100" height="60" rx="6" fill="var(--slot3-bg)" stroke="var(--slot3)" stroke-width="2"/>
        <text x="470" y="45" text-anchor="middle" class="slot-label" fill="var(--slot3)">lui/leur</text>
        <text x="470" y="62" text-anchor="middle" class="label-sm">indirect obj.</text>

        <rect x="530" y="20" width="50" height="60" rx="6" fill="var(--slot4-bg)" stroke="var(--slot4)" stroke-width="2"/>
        <text x="555" y="45" text-anchor="middle" class="slot-label" fill="var(--slot4)">y</text>
        <text x="555" y="62" text-anchor="middle" class="label-sm">locative</text>

        <rect x="590" y="20" width="50" height="60" rx="6" fill="var(--slot5-bg)" stroke="var(--slot5)" stroke-width="2"/>
        <text x="615" y="45" text-anchor="middle" class="slot-label" fill="var(--slot5)">en</text>
        <text x="615" y="62" text-anchor="middle" class="label-sm">partitive</text>

        <rect x="650" y="20" width="100" height="60" rx="6" fill="var(--accent-light)" stroke="var(--accent)" stroke-width="2.5"/>
        <text x="700" y="45" text-anchor="middle" class="word" fill="var(--accent)">VERB</text>
        <text x="700" y="62" text-anchor="middle" class="label-sm" fill="var(--accent)">conjugated</text>

        <rect x="760" y="20" width="60" height="60" rx="6" fill="var(--neg-bg)" stroke="var(--neg)" stroke-width="1.5"/>
        <text x="790" y="45" text-anchor="middle" class="slot-label" fill="var(--neg)">(pas)</text>
        <text x="790" y="62" text-anchor="middle" class="label-sm">neg. 2</text>

        <!-- Order arrow -->
        <path d="M 50,85 L 790,85" fill="none" stroke="var(--french)" stroke-width="1.5" marker-end="url(#arrFr)"/>
        <text x="420" y="100" text-anchor="middle" class="label-sm" fill="var(--french)">RIGID ORDER: never varies</text>
        <defs>
          <marker id="arrFr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
            <polygon points="0 0, 8 3, 0 6" fill="var(--french)"/>
          </marker>
        </defs>
      </g>

      <!-- ========== EXAMPLES ========== -->
      <g transform="translate(20, 195)">
        <text x="510" y="0" text-anchor="middle" class="title-text" fill="var(--accent)">Examples: Filling the Template</text>

        <!-- Example 1 -->
        <text x="20" y="30" text-anchor="start" class="box-text" style="font-weight:bold;" fill="var(--french)">Je le vois</text>
        <text x="200" y="30" text-anchor="start" class="box-text" fill="var(--muted)">= "I see him/it"</text>
        <text x="400" y="30" text-anchor="start" class="label-sm">Subject + direct obj. + VERB</text>

        <!-- Example 2 -->
        <text x="20" y="55" text-anchor="start" class="box-text" style="font-weight:bold;" fill="var(--french)">Je le lui donne</text>
        <text x="200" y="55" text-anchor="start" class="box-text" fill="var(--muted)">= "I give it to him/her"</text>
        <text x="400" y="55" text-anchor="start" class="label-sm">Subject + direct obj. + indirect obj. + VERB</text>

        <!-- Example 3 -->
        <text x="20" y="80" text-anchor="start" class="box-text" style="font-weight:bold;" fill="var(--french)">Il m'en a parle</text>
        <text x="200" y="80" text-anchor="start" class="box-text" fill="var(--muted)">= "He spoke to me about it"</text>
        <text x="400" y="80" text-anchor="start" class="label-sm">Subject + reflexive + partitive + VERB</text>

        <!-- Example 4 (with negation) -->
        <text x="20" y="105" text-anchor="start" class="box-text" style="font-weight:bold;" fill="var(--french)">Je ne le lui ai pas donne</text>
        <text x="250" y="105" text-anchor="start" class="box-text" fill="var(--muted)">= "I didn't give it to him"</text>
        <text x="480" y="105" text-anchor="start" class="label-sm">S + ne + DO + IO + AUX + pas + participle</text>

        <!-- Imperative exception -->
        <rect x="600" y="15" width="400" height="100" rx="8" fill="var(--surface)" stroke="var(--border)" stroke-width="1.5"/>
        <text x="800" y="35" text-anchor="middle" class="box-text" style="font-weight:bold;" fill="var(--accent)">Exception: Affirmative Imperative</text>
        <text x="620" y="58" text-anchor="start" class="box-text" fill="var(--french)">Donne-le-moi</text>
        <text x="780" y="58" text-anchor="start" class="box-text" fill="var(--muted)">= "Give it to me"</text>
        <text x="620" y="78" text-anchor="start" class="label-sm">Pronouns FOLLOW verb (reversed!)</text>
        <text x="620" y="98" text-anchor="start" class="box-text" fill="var(--french)">Ne me le donne pas</text>
        <text x="830" y="98" text-anchor="start" class="label-sm">Negative \u2192 reverts to pre-verbal</text>
      </g>

      <!-- ========== ENGLISH COMPARISON ========== -->
      <g transform="translate(20, 330)">
        <rect x="0" y="0" width="1020" height="130" rx="10" fill="var(--english-bg)" stroke="var(--english)" stroke-width="1.5"/>
        <text x="510" y="22" text-anchor="middle" class="title-text" fill="var(--english)">English: ALL Objects Follow the Verb (No Pre-Verbal Slots)</text>

        <!-- English template -->
        <rect x="30" y="35" width="80" height="40" rx="5" fill="var(--surface)" stroke="var(--english)" stroke-width="1"/>
        <text x="70" y="60" text-anchor="middle" class="slot-label" fill="var(--english)">Subject</text>

        <rect x="120" y="35" width="80" height="40" rx="5" fill="var(--surface)" stroke="var(--english)" stroke-width="2"/>
        <text x="160" y="60" text-anchor="middle" class="word" fill="var(--english)">VERB</text>

        <rect x="210" y="35" width="100" height="40" rx="5" fill="var(--surface)" stroke="var(--english)" stroke-width="1"/>
        <text x="260" y="55" text-anchor="middle" class="slot-label" fill="var(--english)">Direct Obj.</text>

        <rect x="320" y="35" width="100" height="40" rx="5" fill="var(--surface)" stroke="var(--english)" stroke-width="1"/>
        <text x="370" y="55" text-anchor="middle" class="slot-label" fill="var(--english)">Indirect Obj.</text>

        <text x="470" y="60" text-anchor="start" class="box-text" fill="var(--english)">
          "I gave it to him" -- everything AFTER the verb
        </text>

        <text x="30" y="100" text-anchor="start" class="box-text" style="font-weight:bold;" fill="var(--english)">
          English has NO pre-verbal object position and NO clitic system.
        </text>
        <text x="30" y="118" text-anchor="start" class="box-text" fill="var(--fg)">
          What English achieves through post-verbal ordering, French achieves through a pre-verbal template. Learning this template requires different cognitive sequencing.
        </text>
      </g>

      <!-- ========== COGNITIVE INSIGHT ========== -->
      <g transform="translate(20, 480)">
        <rect x="0" y="0" width="1020" height="100" rx="10" fill="var(--accent-light)" stroke="var(--accent)" stroke-width="1.5"/>
        <text x="510" y="22" text-anchor="middle" class="title-text" fill="var(--accent)" style="font-size:12px;">WHY THIS IS HARD FOR ENGLISH SPEAKERS</text>

        <text x="30" y="48" text-anchor="start" class="box-text" fill="var(--fg)">
          English: Plan verb first, then add objects after it. \u2192 "I [VERB] [OBJECT]" (linear, forward-flowing)
        </text>
        <text x="30" y="68" text-anchor="start" class="box-text" fill="var(--fg)">
          French: Must know all objects BEFORE producing the verb, to place them in the correct pre-verbal slots.
        </text>
        <text x="30" y="88" text-anchor="start" class="box-text" style="font-weight:bold;" fill="var(--accent)">
          The clitic template requires planning the entire verb phrase before articulating any of it -- a fundamentally different production strategy.
        </text>
      </g>
    </svg>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background:var(--slot1-bg);border-color:var(--slot1);"></div> Reflexive/personal</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--slot2-bg);border-color:var(--slot2);"></div> Direct object</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--slot3-bg);border-color:var(--slot3);"></div> Indirect object</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--slot4-bg);border-color:var(--slot4);"></div> Locative (y)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--slot5-bg);border-color:var(--slot5);"></div> Partitive (en)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--neg-bg);border-color:var(--neg);"></div> Negation</div>
  </div>

  <figcaption>
    <h2>Figure 1 -- The Clitic Pronoun Template</h2>
    <p>French places object pronouns in a rigid pre-verbal template with 6 ordered slots (reflexive/personal, direct object, indirect object, locative, partitive, plus negation wrapping). English places ALL objects after the verb with no pre-verbal slots whatsoever. This template represents a fundamentally different clause architecture -- and requires speakers to plan the entire object inventory before producing the verb, a cognitive sequencing challenge that has no parallel in English.</p>
  </figcaption>
</figure>
</body>
</html>
