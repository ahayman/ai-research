<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adjective Placement: BAGS vs. Default</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --accent: #4361ee; --accent-light: #e8edff;
    --french: #3b82f6; --french-bg: #dbeafe;
    --english: #ef4444; --english-bg: #fee2e2;
    --bags: #22c55e; --bags-bg: #dcfce7;
    --post: #f59e0b; --post-bg: #fef3c7;
    --meaning: #a855f7; --meaning-bg: #f3e8ff;
    --muted: #6c757d; --caption-bg: #f8f9fa;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a; --fg: #e8e8f0; --surface: #1a1a2e; --border: #2d2d44;
      --accent: #6b8aff; --accent-light: #1e2a4a;
      --french: #60a5fa; --french-bg: #1e3a5f;
      --english: #f87171; --english-bg: #5c1a1a;
      --bags: #4ade80; --bags-bg: #14532d;
      --post: #fbbf24; --post-bg: #78350f;
      --meaning: #c084fc; --meaning-bg: #3b1764;
      --muted: #9a9ab0; --caption-bg: #1a1a2e;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg); color: var(--fg);
    display: flex; justify-content: center; padding: 2rem 1rem; line-height: 1.6;
  }
  figure { max-width: 1100px; width: 100%; }
  .diagram-container {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 1.5rem 1rem; overflow-x: auto;
  }
  figcaption {
    text-align: center; margin-top: 1.5rem; padding: 1rem 1.5rem;
    background: var(--caption-bg); border-radius: 8px; border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  svg { display: block; margin: 0 auto; }
  .title-text { font: bold 14px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
  .subtitle-text { font: 11px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
  .box-text { font: 12px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
  .word { font: bold 14px 'Segoe UI', system-ui, sans-serif; }
  .label-sm { font: 10px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
  .legend { display: flex; gap: 1.5rem; justify-content: center; flex-wrap: wrap; margin-top: 1rem; font-size: 0.82rem; color: var(--muted); }
  .legend-item { display: flex; align-items: center; gap: 0.4rem; }
  .legend-swatch { width: 14px; height: 14px; border-radius: 3px; border: 1px solid var(--border); }
</style>
</head>
<body>
<figure>
  <div class="diagram-container">
    <svg viewBox="0 0 1060 580" xmlns="http://www.w3.org/2000/svg" style="min-width:780px;">
      <text x="530" y="28" text-anchor="middle" class="title-text" style="font-size:16px;">Adjective Placement: BAGS Rule and Meaning-Changing Positions</text>
      <text x="530" y="46" text-anchor="middle" class="subtitle-text">French reverses the English default: most adjectives follow the noun</text>

      <!-- ========== DECISION FLOW ========== -->
      <g transform="translate(30, 70)">
        <!-- Decision diamond -->
        <polygon points="300,0 450,50 300,100 150,50" fill="var(--surface)" stroke="var(--accent)" stroke-width="2"/>
        <text x="300" y="45" text-anchor="middle" class="box-text" style="font-weight:bold;font-size:11px;" fill="var(--accent)">Is this a BAGS</text>
        <text x="300" y="60" text-anchor="middle" class="box-text" style="font-weight:bold;font-size:11px;" fill="var(--accent)">adjective?</text>

        <!-- YES branch (left) -->
        <line x1="150" y1="50" x2="50" y2="50" stroke="var(--bags)" stroke-width="2"/>
        <text x="100" y="40" text-anchor="middle" class="box-text" style="font-weight:bold;" fill="var(--bags)">YES</text>

        <rect x="-100" y="25" width="150" height="50" rx="8" fill="var(--bags-bg)" stroke="var(--bags)" stroke-width="2"/>
        <text x="-25" y="48" text-anchor="middle" class="word" fill="var(--bags)">ADJ + NOUN</text>
        <text x="-25" y="65" text-anchor="middle" class="label-sm" fill="var(--bags)">BEFORE the noun</text>

        <!-- NO branch (right) -->
        <line x1="450" y1="50" x2="550" y2="50" stroke="var(--post)" stroke-width="2"/>
        <text x="500" y="40" text-anchor="middle" class="box-text" style="font-weight:bold;" fill="var(--post)">NO</text>

        <rect x="550" y="25" width="150" height="50" rx="8" fill="var(--post-bg)" stroke="var(--post)" stroke-width="2"/>
        <text x="625" y="48" text-anchor="middle" class="word" fill="var(--post)">NOUN + ADJ</text>
        <text x="625" y="65" text-anchor="middle" class="label-sm" fill="var(--post)">AFTER the noun (default)</text>

        <!-- English -->
        <rect x="780" y="10" width="230" height="80" rx="8" fill="var(--english-bg)" stroke="var(--english)" stroke-width="1.5"/>
        <text x="895" y="35" text-anchor="middle" class="word" fill="var(--english)">ADJ + NOUN</text>
        <text x="895" y="55" text-anchor="middle" class="label-sm" fill="var(--english)">ALWAYS before (English)</text>
        <text x="895" y="72" text-anchor="middle" class="label-sm" fill="var(--english)">No decision needed!</text>
      </g>

      <!-- ========== BAGS CATEGORIES ========== -->
      <g transform="translate(30, 195)">
        <text x="500" y="0" text-anchor="middle" class="title-text" fill="var(--bags)">BAGS: Several Dozen Adjectives That Precede the Noun</text>

        <!-- B -->
        <rect x="30" y="20" width="200" height="65" rx="8" fill="var(--bags-bg)" stroke="var(--bags)" stroke-width="1.5"/>
        <text x="130" y="40" text-anchor="middle" class="word" fill="var(--bags)">B = Beauty</text>
        <text x="130" y="58" text-anchor="middle" class="box-text">beau/belle, joli(e)</text>
        <text x="130" y="75" text-anchor="middle" class="label-sm">une belle maison</text>

        <!-- A -->
        <rect x="250" y="20" width="200" height="65" rx="8" fill="var(--bags-bg)" stroke="var(--bags)" stroke-width="1.5"/>
        <text x="350" y="40" text-anchor="middle" class="word" fill="var(--bags)">A = Age</text>
        <text x="350" y="58" text-anchor="middle" class="box-text">jeune, vieux, nouveau</text>
        <text x="350" y="75" text-anchor="middle" class="label-sm">un vieux livre</text>

        <!-- G -->
        <rect x="470" y="20" width="200" height="65" rx="8" fill="var(--bags-bg)" stroke="var(--bags)" stroke-width="1.5"/>
        <text x="570" y="40" text-anchor="middle" class="word" fill="var(--bags)">G = Goodness</text>
        <text x="570" y="58" text-anchor="middle" class="box-text">bon(ne), mauvais(e)</text>
        <text x="570" y="75" text-anchor="middle" class="label-sm">un bon repas</text>

        <!-- S -->
        <rect x="690" y="20" width="200" height="65" rx="8" fill="var(--bags-bg)" stroke="var(--bags)" stroke-width="1.5"/>
        <text x="790" y="40" text-anchor="middle" class="word" fill="var(--bags)">S = Size</text>
        <text x="790" y="58" text-anchor="middle" class="box-text">grand(e), petit(e), gros(se)</text>
        <text x="790" y="75" text-anchor="middle" class="label-sm">une petite fille</text>

        <!-- Post-nominal default examples -->
        <text x="500" y="108" text-anchor="middle" class="title-text" fill="var(--post)">Default: Most Adjectives Follow the Noun</text>
        <text x="200" y="132" text-anchor="middle" class="box-text">une voiture <text style="font-weight:bold;" fill="var(--post)">rouge</text></text>
        <text x="450" y="132" text-anchor="middle" class="box-text">une decision <text style="font-weight:bold;" fill="var(--post)">importante</text></text>
        <text x="700" y="132" text-anchor="middle" class="box-text">un livre <text style="font-weight:bold;" fill="var(--post)">francais</text></text>
      </g>

      <!-- ========== MEANING CHANGES ========== -->
      <g transform="translate(30, 360)">
        <rect x="50" y="0" width="900" height="130" rx="10" fill="var(--meaning-bg)" stroke="var(--meaning)" stroke-width="2"/>
        <text x="500" y="22" text-anchor="middle" class="title-text" fill="var(--meaning)">Position Changes Meaning: The Most Elegant Feature</text>

        <text x="100" y="48" text-anchor="start" class="box-text" style="font-weight:bold;" fill="var(--meaning)">un homme grand</text>
        <text x="300" y="48" text-anchor="start" class="box-text">= a tall man (physical)</text>
        <text x="550" y="48" text-anchor="start" class="box-text" style="font-weight:bold;" fill="var(--meaning)">un grand homme</text>
        <text x="750" y="48" text-anchor="start" class="box-text">= a great man (figurative)</text>

        <text x="100" y="72" text-anchor="start" class="box-text" style="font-weight:bold;" fill="var(--meaning)">un homme pauvre</text>
        <text x="300" y="72" text-anchor="start" class="box-text">= an impoverished man</text>
        <text x="550" y="72" text-anchor="start" class="box-text" style="font-weight:bold;" fill="var(--meaning)">un pauvre homme</text>
        <text x="750" y="72" text-anchor="start" class="box-text">= a pitiable man</text>

        <text x="100" y="96" text-anchor="start" class="box-text" style="font-weight:bold;" fill="var(--meaning)">une femme seule</text>
        <text x="300" y="96" text-anchor="start" class="box-text">= a lone/solitary woman</text>
        <text x="550" y="96" text-anchor="start" class="box-text" style="font-weight:bold;" fill="var(--meaning)">une seule femme</text>
        <text x="750" y="96" text-anchor="start" class="box-text">= a single/only woman</text>

        <text x="500" y="122" text-anchor="middle" class="label-sm" fill="var(--meaning)">
          After noun = literal/physical meaning. Before noun = figurative/subjective meaning. English has no equivalent -- uses different words instead.
        </text>
      </g>

      <!-- ========== COMBINED PLACEMENT ========== -->
      <g transform="translate(30, 510)">
        <rect x="0" y="0" width="1000" height="50" rx="8" fill="var(--accent-light)" stroke="var(--accent)" stroke-width="1.5"/>
        <text x="500" y="18" text-anchor="middle" class="title-text" fill="var(--accent)" style="font-size:12px;">MULTIPLE ADJECTIVES: BAGS before + default after</text>
        <text x="500" y="38" text-anchor="middle" class="box-text" fill="var(--fg)">
          "une <text style="font-weight:bold;" fill="var(--bags)">belle</text> voiture <text style="font-weight:bold;" fill="var(--post)">rouge</text>" (a beautiful red car)  =  BAGS before the noun, color after
        </text>
      </g>
    </svg>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background:var(--bags-bg);border-color:var(--bags);"></div> BAGS (before noun)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--post-bg);border-color:var(--post);"></div> Default (after noun)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--meaning-bg);border-color:var(--meaning);"></div> Position changes meaning</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--english-bg);border-color:var(--english);"></div> English (always before)</div>
  </div>

  <figcaption>
    <h2>Figure 3 -- Adjective Placement: BAGS Rule and Meaning-Changing Positions</h2>
    <p>French adjectives default to post-nominal position (after the noun), the reverse of English. A predictable group of short, frequent, subjective adjectives -- captured by the BAGS mnemonic (Beauty, Age, Goodness, Size), comprising several dozen items -- precede the noun. The most elegant feature: some adjectives change meaning based on position. "Un homme grand" means "a tall man" (literal); "un grand homme" means "a great man" (figurative). English uses entirely different words where French uses position alone.</p>
  </figcaption>
</figure>
</body>
</html>
