<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bipartite Negation Architecture</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --accent: #4361ee; --accent-light: #e8edff;
    --french: #3b82f6; --french-bg: #dbeafe;
    --english: #ef4444; --english-bg: #fee2e2;
    --ne: #a855f7; --ne-bg: #f3e8ff;
    --pas: #f59e0b; --pas-bg: #fef3c7;
    --formal: #22c55e; --casual: #ef4444;
    --muted: #6c757d; --caption-bg: #f8f9fa;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a; --fg: #e8e8f0; --surface: #1a1a2e; --border: #2d2d44;
      --accent: #6b8aff; --accent-light: #1e2a4a;
      --french: #60a5fa; --french-bg: #1e3a5f;
      --english: #f87171; --english-bg: #5c1a1a;
      --ne: #c084fc; --ne-bg: #3b1764;
      --pas: #fbbf24; --pas-bg: #78350f;
      --formal: #4ade80; --casual: #f87171;
      --muted: #9a9ab0; --caption-bg: #1a1a2e;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg); color: var(--fg);
    display: flex; justify-content: center; padding: 2rem 1rem; line-height: 1.6;
  }
  figure { max-width: 1100px; width: 100%; }
  .diagram-container {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 1.5rem 1rem; overflow-x: auto;
  }
  figcaption {
    text-align: center; margin-top: 1.5rem; padding: 1rem 1.5rem;
    background: var(--caption-bg); border-radius: 8px; border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  svg { display: block; margin: 0 auto; }
  .title-text { font: bold 14px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
  .subtitle-text { font: 11px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
  .box-text { font: 12px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
  .word { font: bold 15px 'Segoe UI', system-ui, sans-serif; }
  .label-sm { font: 10px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
  .legend { display: flex; gap: 1.5rem; justify-content: center; flex-wrap: wrap; margin-top: 1rem; font-size: 0.82rem; color: var(--muted); }
  .legend-item { display: flex; align-items: center; gap: 0.4rem; }
  .legend-swatch { width: 14px; height: 14px; border-radius: 3px; border: 1px solid var(--border); }
</style>
</head>
<body>
<figure>
  <div class="diagram-container">
    <svg viewBox="0 0 1060 600" xmlns="http://www.w3.org/2000/svg" style="min-width:780px;">
      <text x="530" y="28" text-anchor="middle" class="title-text" style="font-size:16px;">Bipartite Negation: ne...pas and Jespersen's Cycle</text>
      <text x="530" y="46" text-anchor="middle" class="subtitle-text">Two-part negation wrapping the verb -- and a sociolinguistic variable in real-time change</text>

      <!-- ========== WRAPPING STRUCTURE ========== -->
      <g transform="translate(30, 70)">
        <text x="350" y="0" text-anchor="middle" class="title-text" fill="var(--french)">The Wrapping Structure</text>

        <!-- Standard negation -->
        <text x="20" y="35" text-anchor="start" class="box-text" style="font-weight:bold;">Standard:</text>
        <text x="110" y="35" text-anchor="start" class="word" fill="var(--fg)">Je</text>
        <rect x="140" y="18" width="40" height="28" rx="5" fill="var(--ne-bg)" stroke="var(--ne)" stroke-width="2"/>
        <text x="160" y="38" text-anchor="middle" class="word" fill="var(--ne)">ne</text>
        <text x="195" y="35" text-anchor="start" class="word" fill="var(--accent)">sais</text>
        <rect x="228" y="18" width="45" height="28" rx="5" fill="var(--pas-bg)" stroke="var(--pas)" stroke-width="2"/>
        <text x="250" y="38" text-anchor="middle" class="word" fill="var(--pas)">pas</text>

        <!-- Bracket -->
        <path d="M 140,48 Q 140,60 195,60 Q 275,60 275,48" fill="none" stroke="var(--french)" stroke-width="1.5"/>
        <text x="207" y="75" text-anchor="middle" class="label-sm" fill="var(--french)">wraps the conjugated verb</text>

        <text x="310" y="35" text-anchor="start" class="box-text" fill="var(--muted)">"I don't know"</text>

        <!-- With clitics -->
        <text x="20" y="110" text-anchor="start" class="box-text" style="font-weight:bold;">With clitics:</text>
        <text x="110" y="110" text-anchor="start" class="word" fill="var(--fg)">Je</text>
        <rect x="140" y="93" width="40" height="28" rx="5" fill="var(--ne-bg)" stroke="var(--ne)" stroke-width="2"/>
        <text x="160" y="113" text-anchor="middle" class="word" fill="var(--ne)">ne</text>
        <text x="190" y="110" text-anchor="start" class="word" fill="var(--fg)">le lui</text>
        <text x="250" y="110" text-anchor="start" class="word" fill="var(--accent)">ai</text>
        <rect x="275" y="93" width="45" height="28" rx="5" fill="var(--pas-bg)" stroke="var(--pas)" stroke-width="2"/>
        <text x="297" y="113" text-anchor="middle" class="word" fill="var(--pas)">pas</text>
        <text x="332" y="110" text-anchor="start" class="word" fill="var(--fg)">donne</text>
        <text x="420" y="110" text-anchor="start" class="box-text" fill="var(--muted)">"I didn't give it to him"</text>
        <text x="420" y="128" text-anchor="start" class="label-sm">clitics sit INSIDE the negation frame</text>

        <!-- Extended negation variants -->
        <text x="550" y="0" text-anchor="start" class="title-text" fill="var(--accent)">Extended Negation</text>
        <text x="550" y="25" text-anchor="start" class="box-text">ne...<text style="font-weight:bold;">plus</text> (no longer)</text>
        <text x="550" y="45" text-anchor="start" class="box-text">ne...<text style="font-weight:bold;">jamais</text> (never)</text>
        <text x="550" y="65" text-anchor="start" class="box-text">ne...<text style="font-weight:bold;">rien</text> (nothing)</text>
        <text x="550" y="85" text-anchor="start" class="box-text">ne...<text style="font-weight:bold;">personne</text> (nobody)</text>
        <text x="550" y="105" text-anchor="start" class="box-text">ne...<text style="font-weight:bold;">que</text> (only)</text>
        <text x="750" y="25" text-anchor="start" class="box-text" fill="var(--muted)">Je ne fume plus</text>
        <text x="750" y="45" text-anchor="start" class="box-text" fill="var(--muted)">Il ne parle jamais</text>
        <text x="750" y="65" text-anchor="start" class="box-text" fill="var(--muted)">Je ne vois rien</text>
        <text x="750" y="85" text-anchor="start" class="box-text" fill="var(--muted)">Je ne connais personne</text>
        <text x="750" y="105" text-anchor="start" class="box-text" fill="var(--muted)">Je n'ai que cinq euros</text>
      </g>

      <!-- ========== NE-DROP SPECTRUM ========== -->
      <g transform="translate(30, 230)">
        <text x="500" y="0" text-anchor="middle" class="title-text" fill="var(--accent)">Ne-Drop: The Register Spectrum</text>
        <text x="500" y="18" text-anchor="middle" class="subtitle-text">"ne" is the primary sociolinguistic variable in modern French</text>

        <!-- Gradient bar -->
        <defs>
          <linearGradient id="regGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:var(--formal);stop-opacity:1" />
            <stop offset="100%" style="stop-color:var(--casual);stop-opacity:1" />
          </linearGradient>
        </defs>
        <rect x="100" y="30" width="800" height="25" rx="12" fill="url(#regGrad)" opacity="0.3"/>
        <rect x="100" y="30" width="800" height="25" rx="12" fill="none" stroke="var(--border)" stroke-width="1"/>

        <!-- Labels -->
        <text x="100" y="72" text-anchor="middle" class="box-text" style="font-weight:bold;" fill="var(--formal)">Formal</text>
        <text x="100" y="88" text-anchor="middle" class="label-sm">ne retained</text>
        <text x="100" y="100" text-anchor="middle" class="label-sm">~50-80%</text>
        <text x="900" y="72" text-anchor="middle" class="box-text" style="font-weight:bold;" fill="var(--casual)">Casual</text>
        <text x="900" y="88" text-anchor="middle" class="label-sm">ne retained</text>
        <text x="900" y="100" text-anchor="middle" class="label-sm">&lt;5-10%</text>

        <!-- Example stages -->
        <rect x="100" y="110" width="180" height="50" rx="6" fill="var(--surface)" stroke="var(--formal)" stroke-width="1.5"/>
        <text x="190" y="130" text-anchor="middle" class="word" style="font-size:13px;" fill="var(--fg)">Je ne sais pas</text>
        <text x="190" y="150" text-anchor="middle" class="label-sm">formal written/spoken</text>

        <rect x="320" y="110" width="160" height="50" rx="6" fill="var(--surface)" stroke="var(--border)" stroke-width="1.5"/>
        <text x="400" y="130" text-anchor="middle" class="word" style="font-size:13px;" fill="var(--fg)">Je sais pas</text>
        <text x="400" y="150" text-anchor="middle" class="label-sm">standard spoken</text>

        <rect x="520" y="110" width="160" height="50" rx="6" fill="var(--surface)" stroke="var(--border)" stroke-width="1.5"/>
        <text x="600" y="130" text-anchor="middle" class="word" style="font-size:13px;" fill="var(--fg)">J'sais pas</text>
        <text x="600" y="150" text-anchor="middle" class="label-sm">casual spoken</text>

        <rect x="720" y="110" width="180" height="50" rx="6" fill="var(--surface)" stroke="var(--casual)" stroke-width="1.5"/>
        <text x="810" y="130" text-anchor="middle" class="word" style="font-size:13px;" fill="var(--fg)">Chais pas / Chpa</text>
        <text x="810" y="150" text-anchor="middle" class="label-sm">very casual youth</text>
      </g>

      <!-- ========== JESPERSEN'S CYCLE ========== -->
      <g transform="translate(30, 400)">
        <rect x="50" y="0" width="900" height="85" rx="10" fill="var(--accent-light)" stroke="var(--accent)" stroke-width="1.5"/>
        <text x="500" y="22" text-anchor="middle" class="title-text" fill="var(--accent)">Jespersen's Cycle: A Pattern Across Time</text>

        <!-- Timeline -->
        <text x="100" y="48" text-anchor="start" class="box-text" style="font-weight:bold;" fill="var(--ne)">Stage I:</text>
        <text x="170" y="48" text-anchor="start" class="box-text">"ne" alone (Latin/Old French)</text>

        <text x="100" y="68" text-anchor="start" class="box-text" style="font-weight:bold;" fill="var(--accent)">Stage II:</text>
        <text x="170" y="68" text-anchor="start" class="box-text">ne...pas (Modern written French) \u2190 WE ARE HERE</text>

        <text x="550" y="48" text-anchor="start" class="box-text" style="font-weight:bold;" fill="var(--pas)">Stage III:</text>
        <text x="620" y="48" text-anchor="start" class="box-text">"pas" alone (Modern spoken French, advancing)</text>

        <text x="550" y="68" text-anchor="start" class="box-text" style="font-size:11px;font-style:italic;" fill="var(--muted)">
          "pas" started as an emphatic reinforcer ("not a step") and became the main negator
        </text>
      </g>

      <!-- ========== ENGLISH COMPARISON ========== -->
      <g transform="translate(30, 500)">
        <rect x="0" y="0" width="1000" height="80" rx="10" fill="var(--english-bg)" stroke="var(--english)" stroke-width="1.5"/>
        <text x="500" y="22" text-anchor="middle" class="title-text" fill="var(--english)">English Comparison: Single-Element Negation with Do-Support</text>

        <text x="30" y="48" text-anchor="start" class="box-text" fill="var(--fg)">
          "I don't know" = do (auxiliary) + not (single negator). No wrapping, no bipartite structure.
        </text>
        <text x="30" y="68" text-anchor="start" class="box-text" fill="var(--fg)">
          English lost its OWN bipartite negation ("I ne say not") during Middle English -- completing the same cycle French is now undergoing.
        </text>
      </g>
    </svg>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background:var(--ne-bg);border-color:var(--ne);"></div> "ne" (pre-verbal negator)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--pas-bg);border-color:var(--pas);"></div> "pas" (post-verbal negator)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--english-bg);border-color:var(--english);"></div> English (single negator + do-support)</div>
  </div>

  <figcaption>
    <h2>Figure 2 -- Bipartite Negation Architecture and Jespersen's Cycle</h2>
    <p>French negation wraps two elements (ne...pas) around the conjugated verb, with clitics sitting inside the frame. In spoken French, "ne" is systematically dropped -- a register marker varying from ~50-80% retention in formal speech to under 10% in casual youth speech. This change follows Jespersen's Cycle, the same historical pattern that English already completed: from "ne" alone, through "ne...pas," toward "pas" alone. English completed this cycle centuries ago, dropping its own "ne" and adopting do-support instead.</p>
  </figcaption>
</figure>
</body>
</html>
