<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relative Pronoun Comparison: French Five vs. English System</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --accent: #4361ee; --accent-light: #e8edff;
    --french: #3b82f6; --french-bg: #dbeafe;
    --english: #ef4444; --english-bg: #fee2e2;
    --qui: #22c55e; --qui-bg: #dcfce7;
    --que: #f59e0b; --que-bg: #fef3c7;
    --dont: #a855f7; --dont-bg: #f3e8ff;
    --ou: #06b6d4; --ou-bg: #cffafe;
    --lequel: #ec4899; --lequel-bg: #fce7f3;
    --muted: #6c757d; --caption-bg: #f8f9fa;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a; --fg: #e8e8f0; --surface: #1a1a2e; --border: #2d2d44;
      --accent: #6b8aff; --accent-light: #1e2a4a;
      --french: #60a5fa; --french-bg: #1e3a5f;
      --english: #f87171; --english-bg: #5c1a1a;
      --qui: #4ade80; --qui-bg: #14532d;
      --que: #fbbf24; --que-bg: #78350f;
      --dont: #c084fc; --dont-bg: #3b1764;
      --ou: #22d3ee; --ou-bg: #0c3d4a;
      --lequel: #f472b6; --lequel-bg: #5c1a3a;
      --muted: #9a9ab0; --caption-bg: #1a1a2e;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg); color: var(--fg);
    display: flex; justify-content: center; padding: 2rem 1rem; line-height: 1.6;
  }
  figure { max-width: 1100px; width: 100%; }
  .diagram-container {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 1.5rem 1rem; overflow-x: auto;
  }
  figcaption {
    text-align: center; margin-top: 1.5rem; padding: 1rem 1.5rem;
    background: var(--caption-bg); border-radius: 8px; border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  svg { display: block; margin: 0 auto; }
  .title-text { font: bold 14px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
  .subtitle-text { font: 11px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
  .box-text { font: 12px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
  .word { font: bold 18px 'Segoe UI', system-ui, sans-serif; }
  .label-sm { font: 10px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
  .legend { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; margin-top: 1rem; font-size: 0.82rem; color: var(--muted); }
  .legend-item { display: flex; align-items: center; gap: 0.4rem; }
  .legend-swatch { width: 14px; height: 14px; border-radius: 3px; border: 1px solid var(--border); }
</style>
</head>
<body>
<figure>
  <div class="diagram-container">
    <svg viewBox="0 0 1060 560" xmlns="http://www.w3.org/2000/svg" style="min-width:780px;">
      <text x="530" y="28" text-anchor="middle" class="title-text" style="font-size:16px;">Relative Pronoun Systems: French Five vs. English</text>
      <text x="530" y="46" text-anchor="middle" class="subtitle-text">French maps grammatical function to specific pronouns; English allows flexibility and omission</text>

      <!-- ========== FUNCTION-TO-PRONOUN MAP ========== -->
      <g transform="translate(30, 70)">
        <!-- Column headers -->
        <rect x="0" y="0" width="180" height="30" rx="5" fill="var(--accent-light)" stroke="var(--accent)" stroke-width="1"/>
        <text x="90" y="20" text-anchor="middle" class="box-text" style="font-weight:bold;" fill="var(--accent)">Function</text>

        <rect x="200" y="0" width="130" height="30" rx="5" fill="var(--french-bg)" stroke="var(--french)" stroke-width="1"/>
        <text x="265" y="20" text-anchor="middle" class="box-text" style="font-weight:bold;" fill="var(--french)">French</text>

        <rect x="350" y="0" width="300" height="30" rx="5" fill="var(--french-bg)" stroke="var(--french)" stroke-width="1"/>
        <text x="500" y="20" text-anchor="middle" class="box-text" style="font-weight:bold;" fill="var(--french)">French Example</text>

        <rect x="670" y="0" width="130" height="30" rx="5" fill="var(--english-bg)" stroke="var(--english)" stroke-width="1"/>
        <text x="735" y="20" text-anchor="middle" class="box-text" style="font-weight:bold;" fill="var(--english)">English</text>

        <rect x="820" y="0" width="200" height="30" rx="5" fill="var(--english-bg)" stroke="var(--english)" stroke-width="1"/>
        <text x="920" y="20" text-anchor="middle" class="box-text" style="font-weight:bold;" fill="var(--english)">English Example</text>

        <!-- Row 1: Subject -->
        <rect x="0" y="40" width="180" height="45" rx="4" fill="var(--surface)" stroke="var(--border)" stroke-width="1"/>
        <text x="90" y="62" text-anchor="middle" class="box-text" style="font-weight:bold;">Subject</text>
        <text x="90" y="78" text-anchor="middle" class="label-sm">of relative clause</text>

        <rect x="200" y="40" width="130" height="45" rx="4" fill="var(--qui-bg)" stroke="var(--qui)" stroke-width="2"/>
        <text x="265" y="68" text-anchor="middle" class="word" fill="var(--qui)">qui</text>

        <rect x="350" y="40" width="300" height="45" rx="4" fill="var(--surface)" stroke="var(--border)" stroke-width="1"/>
        <text x="500" y="68" text-anchor="middle" class="box-text">L'homme <text style="font-weight:bold;" fill="var(--qui)">qui</text> parle</text>

        <rect x="670" y="40" width="130" height="45" rx="4" fill="var(--surface)" stroke="var(--english)" stroke-width="1"/>
        <text x="735" y="68" text-anchor="middle" class="box-text" fill="var(--english)">who / that</text>

        <rect x="820" y="40" width="200" height="45" rx="4" fill="var(--surface)" stroke="var(--border)" stroke-width="1"/>
        <text x="920" y="68" text-anchor="middle" class="box-text">The man who speaks</text>

        <!-- Row 2: Direct Object -->
        <rect x="0" y="95" width="180" height="45" rx="4" fill="var(--surface)" stroke="var(--border)" stroke-width="1"/>
        <text x="90" y="117" text-anchor="middle" class="box-text" style="font-weight:bold;">Direct Object</text>
        <text x="90" y="133" text-anchor="middle" class="label-sm">of relative clause</text>

        <rect x="200" y="95" width="130" height="45" rx="4" fill="var(--que-bg)" stroke="var(--que)" stroke-width="2"/>
        <text x="265" y="123" text-anchor="middle" class="word" fill="var(--que)">que</text>

        <rect x="350" y="95" width="300" height="45" rx="4" fill="var(--surface)" stroke="var(--border)" stroke-width="1"/>
        <text x="500" y="123" text-anchor="middle" class="box-text">L'homme <text style="font-weight:bold;" fill="var(--que)">que</text> je vois</text>

        <rect x="670" y="95" width="130" height="45" rx="4" fill="var(--surface)" stroke="var(--english)" stroke-width="1"/>
        <text x="735" y="118" text-anchor="middle" class="box-text" fill="var(--english)">whom / that</text>
        <text x="735" y="133" text-anchor="middle" class="box-text" style="font-weight:bold;" fill="var(--english)">or OMIT!</text>

        <rect x="820" y="95" width="200" height="45" rx="4" fill="var(--surface)" stroke="var(--border)" stroke-width="1"/>
        <text x="920" y="118" text-anchor="middle" class="box-text">The man (that) I see</text>
        <text x="920" y="133" text-anchor="middle" class="label-sm" fill="var(--english)">pronoun optional!</text>

        <!-- Row 3: de-phrase -->
        <rect x="0" y="150" width="180" height="45" rx="4" fill="var(--surface)" stroke="var(--border)" stroke-width="1"/>
        <text x="90" y="172" text-anchor="middle" class="box-text" style="font-weight:bold;">"de" relationship</text>
        <text x="90" y="188" text-anchor="middle" class="label-sm">whose / of which / about</text>

        <rect x="200" y="150" width="130" height="45" rx="4" fill="var(--dont-bg)" stroke="var(--dont)" stroke-width="2"/>
        <text x="265" y="178" text-anchor="middle" class="word" fill="var(--dont)">dont</text>

        <rect x="350" y="150" width="300" height="45" rx="4" fill="var(--surface)" stroke="var(--border)" stroke-width="1"/>
        <text x="500" y="178" text-anchor="middle" class="box-text">L'homme <text style="font-weight:bold;" fill="var(--dont)">dont</text> je parle</text>

        <rect x="670" y="150" width="130" height="45" rx="4" fill="var(--surface)" stroke="var(--english)" stroke-width="1"/>
        <text x="735" y="173" text-anchor="middle" class="box-text" fill="var(--english)">whose /</text>
        <text x="735" y="188" text-anchor="middle" class="box-text" fill="var(--english)">of which / about</text>

        <rect x="820" y="150" width="200" height="45" rx="4" fill="var(--surface)" stroke="var(--border)" stroke-width="1"/>
        <text x="920" y="178" text-anchor="middle" class="box-text">The man I'm talking about</text>

        <!-- Row 4: Place/Time -->
        <rect x="0" y="205" width="180" height="45" rx="4" fill="var(--surface)" stroke="var(--border)" stroke-width="1"/>
        <text x="90" y="232" text-anchor="middle" class="box-text" style="font-weight:bold;">Place / Time</text>

        <rect x="200" y="205" width="130" height="45" rx="4" fill="var(--ou-bg)" stroke="var(--ou)" stroke-width="2"/>
        <text x="265" y="233" text-anchor="middle" class="word" fill="var(--ou)">ou</text>

        <rect x="350" y="205" width="300" height="45" rx="4" fill="var(--surface)" stroke="var(--border)" stroke-width="1"/>
        <text x="500" y="233" text-anchor="middle" class="box-text">La ville <text style="font-weight:bold;" fill="var(--ou)">ou</text> j'habite</text>

        <rect x="670" y="205" width="130" height="45" rx="4" fill="var(--surface)" stroke="var(--english)" stroke-width="1"/>
        <text x="735" y="233" text-anchor="middle" class="box-text" fill="var(--english)">where / when</text>

        <rect x="820" y="205" width="200" height="45" rx="4" fill="var(--surface)" stroke="var(--border)" stroke-width="1"/>
        <text x="920" y="233" text-anchor="middle" class="box-text">The city where I live</text>

        <!-- Row 5: Preposition + NP -->
        <rect x="0" y="260" width="180" height="45" rx="4" fill="var(--surface)" stroke="var(--border)" stroke-width="1"/>
        <text x="90" y="282" text-anchor="middle" class="box-text" style="font-weight:bold;">After Preposition</text>
        <text x="90" y="298" text-anchor="middle" class="label-sm">agrees in gender/number</text>

        <rect x="200" y="260" width="130" height="45" rx="4" fill="var(--lequel-bg)" stroke="var(--lequel)" stroke-width="2"/>
        <text x="265" y="288" text-anchor="middle" class="word" fill="var(--lequel)">lequel</text>

        <rect x="350" y="260" width="300" height="45" rx="4" fill="var(--surface)" stroke="var(--border)" stroke-width="1"/>
        <text x="500" y="283" text-anchor="middle" class="box-text">La table sur <text style="font-weight:bold;" fill="var(--lequel)">laquelle</text></text>
        <text x="500" y="298" text-anchor="middle" class="label-sm">lequel/laquelle/lesquels/lesquelles</text>

        <rect x="670" y="260" width="130" height="45" rx="4" fill="var(--surface)" stroke="var(--english)" stroke-width="1"/>
        <text x="735" y="288" text-anchor="middle" class="box-text" fill="var(--english)">which / whom</text>

        <rect x="820" y="260" width="200" height="45" rx="4" fill="var(--surface)" stroke="var(--border)" stroke-width="1"/>
        <text x="920" y="288" text-anchor="middle" class="box-text">The table on which...</text>
      </g>

      <!-- ========== KEY DIFFERENCE ========== -->
      <g transform="translate(30, 410)">
        <rect x="0" y="0" width="1000" height="55" rx="8" fill="var(--accent-light)" stroke="var(--accent)" stroke-width="2"/>
        <text x="500" y="20" text-anchor="middle" class="title-text" fill="var(--accent)" style="font-size:12px;">THE CRITICAL DIFFERENCE</text>
        <text x="500" y="42" text-anchor="middle" class="box-text" fill="var(--fg)">
          French NEVER omits relative pronouns. "The book I read" is ungrammatical in French -- it MUST be "Le livre que j'ai lu."
          English drops them freely in object position: "The book (that) I read."
        </text>
      </g>

      <!-- "dont" highlight -->
      <g transform="translate(30, 480)">
        <rect x="0" y="0" width="1000" height="55" rx="8" fill="var(--dont-bg)" stroke="var(--dont)" stroke-width="1.5"/>
        <text x="500" y="20" text-anchor="middle" class="title-text" fill="var(--dont)" style="font-size:12px;">THE "DONT" PRONOUN: No Single English Equivalent</text>
        <text x="500" y="42" text-anchor="middle" class="box-text" fill="var(--fg)">
          "dont" covers "whose," "of which," "about whom," "from which" -- any relative clause that would use "de" in French. One pronoun replaces many English constructions.
        </text>
      </g>
    </svg>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background:var(--qui-bg);border-color:var(--qui);"></div> qui (subject)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--que-bg);border-color:var(--que);"></div> que (direct object)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--dont-bg);border-color:var(--dont);"></div> dont (de-phrase)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--ou-bg);border-color:var(--ou);"></div> ou (place/time)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--lequel-bg);border-color:var(--lequel);"></div> lequel (preposition)</div>
  </div>

  <figcaption>
    <h2>Figure 5 -- Relative Pronoun Systems: French Five vs. English</h2>
    <p>French uses five relative pronouns, each encoding a specific grammatical function: qui (subject), que (direct object), dont (de-phrase), ou (place/time), and lequel (after prepositions, with gender/number agreement). English has a more flexible system with optional omission ("The book I read" drops the pronoun entirely). The "dont" pronoun is particularly notable -- it has no single English equivalent, covering "whose," "of which," "about whom," and other constructions that all involve the French preposition "de."</p>
  </figcaption>
</figure>
</body>
</html>
