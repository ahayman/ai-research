<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Three-Gender System Overview</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --masc-color: #3b82f6;
    --masc-bg: #eff6ff;
    --fem-color: #ec4899;
    --fem-bg: #fdf2f8;
    --neut-color: #10b981;
    --neut-bg: #ecfdf5;
    --plur-color: #8b5cf6;
    --plur-bg: #f5f3ff;
    --en-color: #6b7280;
    --en-bg: #f3f4f6;
    --muted: #6c757d;
    --accent: #f59e0b;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --masc-color: #60a5fa;
      --masc-bg: #1e293b;
      --fem-color: #f472b6;
      --fem-bg: #2a1525;
      --neut-color: #34d399;
      --neut-bg: #132e24;
      --plur-color: #a78bfa;
      --plur-bg: #1e1535;
      --en-color: #9ca3af;
      --en-bg: #1f2937;
      --muted: #9a9ab0;
      --accent: #fbbf24;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure {
    max-width: 1100px;
    width: 100%;
    background: var(--surface);
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
  }
  h2 { text-align: center; font-size: 1.4rem; margin-bottom: 0.3rem; }
  .subtitle { text-align: center; font-size: 0.95rem; color: var(--muted); margin-bottom: 2rem; }

  /* Distribution bar */
  .dist-bar {
    display: flex;
    height: 36px;
    border-radius: 18px;
    overflow: hidden;
    margin-bottom: 0.4rem;
    border: 2px solid var(--border);
  }
  .dist-seg {
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 0.82rem; color: #fff;
  }
  .dist-masc { background: var(--masc-color); width: 34%; }
  .dist-fem { background: var(--fem-color); width: 46%; }
  .dist-neut { background: var(--neut-color); width: 20%; }
  .dist-labels {
    display: flex; justify-content: space-between;
    font-size: 0.75rem; color: var(--muted); margin-bottom: 2rem; padding: 0 0.5rem;
  }

  /* Gender cards */
  .gender-cards {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1.2rem;
    margin-bottom: 1.5rem;
  }
  .g-card {
    border: 2px solid;
    border-radius: 12px;
    padding: 1.25rem;
    text-align: center;
  }
  .g-card.masc { border-color: var(--masc-color); }
  .g-card.fem { border-color: var(--fem-color); }
  .g-card.neut { border-color: var(--neut-color); }
  .g-card .article {
    font-size: 2.2rem;
    font-weight: 800;
    line-height: 1.1;
    margin-bottom: 0.15rem;
  }
  .g-card.masc .article { color: var(--masc-color); }
  .g-card.fem .article { color: var(--fem-color); }
  .g-card.neut .article { color: var(--neut-color); }
  .g-card .label {
    font-size: 0.78rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 0.8rem;
  }
  .g-card.masc .label { color: var(--masc-color); }
  .g-card.fem .label { color: var(--fem-color); }
  .g-card.neut .label { color: var(--neut-color); }
  .g-card .pct {
    font-size: 1.6rem; font-weight: 800; margin-bottom: 0.6rem;
  }
  .g-card.masc .pct { color: var(--masc-color); }
  .g-card.fem .pct { color: var(--fem-color); }
  .g-card.neut .pct { color: var(--neut-color); }
  .noun-list {
    list-style: none; padding: 0; font-size: 0.85rem;
  }
  .noun-list li {
    padding: 0.25rem 0;
    border-bottom: 1px solid var(--border);
  }
  .noun-list li:last-child { border-bottom: none; }
  .noun-list .de { font-weight: 700; }
  .noun-list .en { color: var(--muted); font-size: 0.78rem; }

  /* Plural row */
  .plural-row {
    border: 2px solid var(--plur-color);
    border-radius: 12px;
    padding: 1rem 1.5rem;
    display: flex;
    align-items: center;
    gap: 1.5rem;
    margin-bottom: 1.5rem;
    background: var(--plur-bg);
  }
  .plural-row .plur-article {
    font-size: 1.8rem; font-weight: 800; color: var(--plur-color);
    white-space: nowrap;
  }
  .plural-row .plur-desc {
    font-size: 0.88rem;
  }
  .plural-row .plur-desc strong { color: var(--plur-color); }

  /* English comparison */
  .en-compare {
    border: 2px solid var(--en-color);
    border-radius: 12px;
    padding: 1rem 1.5rem;
    display: flex;
    align-items: center;
    gap: 1.5rem;
    margin-bottom: 1.5rem;
    background: var(--en-bg);
  }
  .en-compare .en-article {
    font-size: 1.8rem; font-weight: 800; color: var(--en-color);
    white-space: nowrap;
  }
  .en-compare .en-desc {
    font-size: 0.88rem;
  }
  .en-compare .en-desc strong { color: var(--en-color); }

  /* Historical note */
  .history-note {
    border: 2px dashed var(--accent);
    border-radius: 10px;
    padding: 0.8rem 1.2rem;
    font-size: 0.82rem;
    color: var(--muted);
    text-align: center;
    margin-bottom: 0;
  }
  .history-note strong { color: var(--accent); }
  .history-note .arrow { font-size: 1.1rem; margin: 0 0.3rem; }

  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid var(--border);
  }
  figcaption strong { display: block; font-size: 1.05rem; margin-bottom: 0.4rem; }
  figcaption span { font-size: 0.88rem; color: var(--muted); line-height: 1.5; }

  @media (max-width: 700px) {
    figure { padding: 1.2rem; }
    .gender-cards { grid-template-columns: 1fr; }
    .plural-row, .en-compare { flex-direction: column; text-align: center; gap: 0.6rem; }
  }
</style>
</head>
<body>
<figure>
  <h2>The Three-Gender System</h2>
  <p class="subtitle">Every German noun is classified as masculine (der), feminine (die), or neuter (das) -- a system English once had and lost.</p>

  <!-- Distribution bar -->
  <div class="dist-bar">
    <div class="dist-seg dist-masc">34%</div>
    <div class="dist-seg dist-fem">46%</div>
    <div class="dist-seg dist-neut">20%</div>
  </div>
  <div class="dist-labels">
    <span>Masculine (Maskulinum)</span>
    <span>Feminine (Femininum)</span>
    <span>Neuter (Neutrum)</span>
  </div>

  <!-- Three gender cards -->
  <div class="gender-cards">
    <div class="g-card masc">
      <div class="article">der</div>
      <div class="label">Masculine</div>
      <div class="pct">34%</div>
      <ul class="noun-list">
        <li><span class="de">der Tisch</span> <span class="en">the table</span></li>
        <li><span class="de">der Hund</span> <span class="en">the dog</span></li>
        <li><span class="de">der Montag</span> <span class="en">Monday</span></li>
        <li><span class="de">der Sommer</span> <span class="en">summer</span></li>
      </ul>
    </div>

    <div class="g-card fem">
      <div class="article">die</div>
      <div class="label">Feminine</div>
      <div class="pct">46%</div>
      <ul class="noun-list">
        <li><span class="de">die Lampe</span> <span class="en">the lamp</span></li>
        <li><span class="de">die Katze</span> <span class="en">the cat</span></li>
        <li><span class="de">die Zeitung</span> <span class="en">the newspaper</span></li>
        <li><span class="de">die Rose</span> <span class="en">the rose</span></li>
      </ul>
    </div>

    <div class="g-card neut">
      <div class="article">das</div>
      <div class="label">Neuter</div>
      <div class="pct">20%</div>
      <ul class="noun-list">
        <li><span class="de">das Buch</span> <span class="en">the book</span></li>
        <li><span class="de">das Kind</span> <span class="en">the child</span></li>
        <li><span class="de">das Gold</span> <span class="en">gold</span></li>
        <li><span class="de">das Essen</span> <span class="en">food/eating</span></li>
      </ul>
    </div>
  </div>

  <!-- Plural note -->
  <div class="plural-row">
    <div class="plur-article">die</div>
    <div class="plur-desc"><strong>Plural (all genders)</strong> -- The plural article is always <strong>die</strong>, identical to the feminine singular nominative. Context and noun form distinguish them: <em>die Lampe</em> (one lamp) vs. <em>die Lampen</em> (the lamps).</div>
  </div>

  <!-- English comparison -->
  <div class="en-compare">
    <div class="en-article">the</div>
    <div class="en-desc"><strong>English: one article for everything.</strong> No gender, no case, no number distinction. "The table," "the lamp," "the book," "the tables" -- always just <strong>"the."</strong></div>
  </div>

  <!-- Historical note -->
  <div class="history-note">
    <strong>Old English had three genders too:</strong>
    <em>se</em> (masc.) / <em>s&#x113;o</em> (fem.) / <em>&#x00FE;&#x00E6;t</em> (neut.)
    <span class="arrow">&rarr;</span> Middle English collapse
    <span class="arrow">&rarr;</span> Modern English <strong>"the"</strong>
    <br>German preserved what English discarded.
  </div>

  <figcaption>
    <strong>Figure 1: The Three-Gender System Overview</strong>
    <span>German classifies every noun into one of three grammatical genders -- masculine (der), feminine (die), or neuter (das) -- a categorization that has no connection to perceived "masculinity" or "femininity" of objects. Roughly 46% of nouns are feminine, 34% masculine, and 20% neuter (Duden statistics). The plural article "die" is shared across all genders, creating a systematic ambiguity resolved by context. English once had this identical three-gender system in Old English but lost it entirely during the Middle English period.</span>
  </figcaption>
</figure>
</body>
</html>
