<!-- Diagram: Session Arc -->
<!-- Type: flowchart -->
<!-- Generated: 2026-04-29 -->
<!-- Description: Full arc of a session — opening → unblending → 6-F sequence with target part → identifying exile → protector permission → witnessing/unburdening → closing. Most sessions stop well before unburdening; that's a feature, not a failure. -->

<figure class="concept-diagram" id="diagram-3">
  <div class="diagram-container">
    <pre class="mermaid">
flowchart TD
    Open[Opening<br/>Check-in, body scan,<br/>what's live today?] --> Target[Identify target part<br/>Often a protector that<br/>has been active]
    Target --> Unblend[Unblending<br/>Notice & ask part<br/>to step back]
    Unblend --> SixFs[Run the 6 Fs<br/>Find → Focus → Flesh out<br/>→ Feel toward → beFriend<br/>→ Fears]
    SixFs --> Q1{Was an exile<br/>identified through<br/>the Fears step?}
    Q1 -->|No - more<br/>protector work needed| ProtectorClose[Close session with<br/>protector relationship<br/>Most sessions end here]
    Q1 -->|Yes| Q2{Does the protector<br/>give permission to<br/>meet the exile?}
    Q2 -->|No| Negotiate[Stay with protector<br/>Hear its fears<br/>Build trust<br/>Often many sessions]
    Negotiate --> ProtectorClose
    Q2 -->|Yes| Witness[Witnessing<br/>Self goes to exile<br/>Exile shows what<br/>happened]
    Witness --> DoOver[Do-over<br/>Self offers what<br/>was missing in<br/>imagination]
    DoOver --> Retrieval[Retrieval<br/>Self brings exile<br/>to safe place<br/>if exile wishes]
    Retrieval --> Unburdening[Unburdening<br/>Burden identified<br/>→ located in body<br/>→ released to element]
    Unburdening --> Integration[Integration<br/>Welcome new qualities<br/>Renegotiate protector's<br/>role]
    Integration --> Close[Close<br/>Ground, thank parts,<br/>note where work paused]
    ProtectorClose --> Close
    Close --> Homework[Optional homework<br/>Journaling, parts<br/>check-ins between<br/>sessions]

    classDef openStyle fill:#E0F2FE,stroke:#0284C7,stroke-width:2px
    classDef sixfsStyle fill:#FEF3C7,stroke:#D97706,stroke-width:2px
    classDef exileStyle fill:#FCE7F3,stroke:#DB2777,stroke-width:2px
    classDef endStyle fill:#F3F4F6,stroke:#6B7280,stroke-width:2px

    class Open,Target,Unblend openStyle
    class SixFs sixfsStyle
    class Witness,DoOver,Retrieval,Unburdening,Integration exileStyle
    class ProtectorClose,Close,Homework,Negotiate endStyle
    </pre>
  </div>
  <figcaption>
    <strong>Figure 3:</strong> A full session arc. Most sessions stop at "more protector work needed" and that's expected — exile work has many prerequisites. When all prerequisites are met (exile identified, protector consents, Self present), the session can move into witnessing → do-over → retrieval → unburdening → integration. Bypassing any prerequisite is the canonical failure mode (see Cat 9).
  </figcaption>
</figure>
