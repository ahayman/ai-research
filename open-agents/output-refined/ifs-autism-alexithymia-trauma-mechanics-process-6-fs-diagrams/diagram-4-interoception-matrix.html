<!-- Diagram: Interoception-Dependency Matrix -->
<!-- Type: custom flowchart / matrix -->
<!-- Generated: 2026-04-29 -->
<!-- Description: Each step of the IFS procedure labeled by what perceptual capacity it requires (interoceptive / visual-imaginative / cognitive-dialogic / relational), plus where substitutions are available for low-interoception clients. -->

<figure class="concept-diagram" id="diagram-4">
  <div class="diagram-container">
    <pre class="mermaid">
flowchart LR
    subgraph Interoceptive [Interoception-Gated — HARD for alexithymia]
        direction TB
        Find[Find<br/>Locate part in/<br/>around body]
        FeelToward[Feel toward<br/>Internal emotional<br/>read - the bottleneck]
        Burden[Burden location<br/>Where in body<br/>does exile<br/>carry it?]
    end

    subgraph Visual [Visual-Imaginative — HARD for aphantasia]
        direction TB
        FleshOut[Flesh out<br/>Image, age,<br/>appearance]
        DoOverV[Do-over<br/>Imagined scene<br/>intervention]
        ElementV[Element release<br/>Visualizing<br/>release ritual]
    end

    subgraph Attentional [Sustained Attention — generally accessible]
        direction TB
        Focus[Focus<br/>Hold inward<br/>attention]
        WitnessA[Witnessing<br/>Stay present<br/>with exile]
    end

    subgraph Cognitive [Cognitive / Dialogic — accessible for literal thinkers]
        direction TB
        Befriend[beFriend<br/>Build relationship<br/>Verbal exchange]
        Fears[Fears<br/>Articulate<br/>protective logic]
        DA[Direct Access<br/>Therapist talks<br/>to the part]
    end

    classDef hard fill:#FEE2E2,stroke:#DC2626,stroke-width:2px,color:#7F1D1D
    classDef hardV fill:#FEF3C7,stroke:#D97706,stroke-width:2px,color:#78350F
    classDef ok fill:#DBEAFE,stroke:#2563EB,stroke-width:2px,color:#1E3A8A
    classDef good fill:#DCFCE7,stroke:#16A34A,stroke-width:2px,color:#14532D

    class Find,FeelToward,Burden hard
    class FleshOut,DoOverV,ElementV hardV
    class Focus,WitnessA ok
    class Befriend,Fears,DA good
    </pre>
  </div>
  <figcaption>
    <strong>Figure 4:</strong> The IFS procedure mapped against perceptual capacity. Red (interoception-gated) is hardest for alexithymia: Find, Feel toward, locating burdens in the body. Yellow (visual-imaginative) is hardest for aphantasia: Flesh out, do-over imagery, element-release visualization. Blue (sustained attention) and green (cognitive/dialogic) are generally accessible for literal-thinking, low-interoception clients — and direct access is the procedural lifeline when the in-sight steps don't work. <strong>Substitutions</strong>: Find can use spatial location instead of body location; Flesh out can use words/sound/conceptual sketch instead of imagery; Feel toward can sometimes use behavioral observation ("when this part is active, what do I do? Approach or avoid?") instead of internal feeling; element release can use breath, words, or any "way of letting go." See Cat 6 (alexithymia) for the deep treatment.
  </figcaption>
</figure>
