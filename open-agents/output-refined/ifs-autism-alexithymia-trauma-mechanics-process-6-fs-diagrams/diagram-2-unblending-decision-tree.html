<!-- Diagram: Unblending Decision Tree -->
<!-- Type: flowchart -->
<!-- Generated: 2026-04-29 -->
<!-- Description: When "Feel toward" returns a non-C answer or the client appears blended, this tree shows what the therapist does next. Includes the case where in-sight access fails entirely and direct access is used. -->

<figure class="concept-diagram" id="diagram-2">
  <div class="diagram-container">
    <pre class="mermaid">
flowchart TD
    Detect[Detect blending:<br/>non-C answer to Feel toward<br/>OR client speaking from the part] --> Q1{Can client<br/>notice the part<br/>as separate?}
    Q1 -->|Yes| Ask[Ask the blending part:<br/>"Would you step back<br/>so I can get to know<br/>this other part?"]
    Q1 -->|No, fully fused| DA[Switch to<br/>Direct Access<br/>Therapist talks<br/>to the part]
    Ask --> Q2{Part agrees?}
    Q2 -->|Yes| Recheck[Re-ask "How do<br/>you feel toward<br/>the original target<br/>now?"]
    Q2 -->|No| NewTarget[Make the blending<br/>part the new target<br/>Run 6 Fs on it]
    Recheck --> Q3{8 Cs<br/>present?}
    Q3 -->|Yes| Continue[Continue with<br/>original target]
    Q3 -->|No, another<br/>part blended| Detect
    NewTarget --> Continue
    DA --> ImpExp{Implicit or<br/>explicit DA?}
    ImpExp -->|Implicit| Talk1[Therapist speaks<br/>to the part without<br/>contracting]
    ImpExp -->|Explicit| Talk2[Contract with<br/>client first<br/>then interview part]
    Talk1 --> Restore[Eventually part<br/>may unblend<br/>restoring in-sight]
    Talk2 --> Restore
    Restore --> Continue

    classDef detectStyle fill:#FEE2E2,stroke:#DC2626,stroke-width:2px
    classDef actionStyle fill:#DBEAFE,stroke:#2563EB,stroke-width:2px
    classDef successStyle fill:#DCFCE7,stroke:#16A34A,stroke-width:2px
    classDef altStyle fill:#F3E8FF,stroke:#7C3AED,stroke-width:2px

    class Detect detectStyle
    class Ask,Recheck,NewTarget actionStyle
    class Continue,Restore successStyle
    class DA,Talk1,Talk2 altStyle
    </pre>
  </div>
  <figcaption>
    <strong>Figure 2:</strong> The unblending decision tree. Most blends resolve by asking the part to step back. When it refuses, that part becomes the new target and gets its own 6-F interview. When the client cannot notice the part as separate at all, the therapist switches to <em>direct access</em>, speaking to the part directly. Direct access is canonical IFS, not a workaround — it's what's used when in-sight isn't available.
  </figcaption>
</figure>
