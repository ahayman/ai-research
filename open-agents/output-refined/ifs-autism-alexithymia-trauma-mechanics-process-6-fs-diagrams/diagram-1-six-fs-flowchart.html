<!-- Diagram: The 6 Fs with Branching at Feel Toward -->
<!-- Type: flowchart -->
<!-- Generated: 2026-04-29 -->
<!-- Description: The canonical 6-F protector interview, with the diagnostic branch at "Feel toward" — what happens when the answer lands in the 8 Cs (Self present, proceed) vs. when it doesn't (another part is blended, pivot). -->

<figure class="concept-diagram" id="diagram-1">
  <div class="diagram-container">
    <pre class="mermaid">
flowchart TD
    Start([Target part identified]) --> F1[Find<br/>Where in/around<br/>the body?<br/><i>interoceptive</i>]
    F1 --> F2[Focus<br/>Sustained inward<br/>attention<br/><i>attentional</i>]
    F2 --> F3[Flesh out<br/>What does it look<br/>like? Sound? Age?<br/><i>visual-imaginative</i>]
    F3 --> F4[Feel toward<br/>How do you feel<br/>toward this part?<br/><i>interoceptive emotional</i>]
    F4 --> Q{Answer?}
    Q -->|"8 Cs neighborhood<br/>(curious, calm,<br/>compassionate...)"| Self[Self present<br/>Proceed]
    Q -->|"Non-C answer<br/>(frustrated, scared,<br/>annoyed, hostile)"| Blended[Another part<br/>is blended]
    Q -->|"Nothing / neutral /<br/>I don't know"| Ambig[Ambiguous<br/>Take time<br/>to discern]
    Self --> F5[beFriend<br/>Build relationship<br/><i>relational/dialogic</i>]
    F5 --> F6[Fears<br/>What does it fear<br/>if it stopped?<br/><i>cognitive/dialogic</i>]
    F6 --> End([Exile likely<br/>identified through<br/>protector's fear])
    Blended --> Pivot[Ask blended part<br/>to step back<br/>OR make it<br/>the new target]
    Pivot --> F1
    Ambig --> F4

    classDef interoStyle fill:#FEF3C7,stroke:#D97706,stroke-width:2px
    classDef selfStyle fill:#DCFCE7,stroke:#16A34A,stroke-width:2px
    classDef blendStyle fill:#FEE2E2,stroke:#DC2626,stroke-width:2px
    classDef cogStyle fill:#DBEAFE,stroke:#2563EB,stroke-width:2px

    class F1,F4 interoStyle
    class Self selfStyle
    class Blended,Pivot blendStyle
    class F5,F6 cogStyle
    </pre>
  </div>
  <figcaption>
    <strong>Figure 1:</strong> The canonical 6 Fs with the diagnostic branch at "Feel toward." A non-C answer is information, not failure — it tells the therapist another part is blended and the work pivots. Color: yellow = interoception-gated; green = Self present; red = blended pivot; blue = cognitive/dialogic.
  </figcaption>
</figure>
