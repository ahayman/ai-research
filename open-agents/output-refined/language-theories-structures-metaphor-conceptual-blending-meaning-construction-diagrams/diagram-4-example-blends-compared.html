<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Example Blends Compared: Three Network Types</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #f8f9fa;
    color: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 2rem;
  }
  figure {
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
    max-width: 1200px;
    width: 100%;
  }
  .diagram-title {
    text-align: center;
    font-size: 1.3rem;
    font-weight: 700;
    margin-bottom: 2rem;
    color: #1a1a2e;
  }
  .blends-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 1.5rem;
  }
  @media (max-width: 900px) {
    .blends-grid { grid-template-columns: 1fr; }
  }
  .blend-card {
    border-radius: 12px;
    padding: 1.25rem;
    border: 2px solid;
  }
  .blend-card h3 {
    text-align: center;
    font-size: 0.95rem;
    margin-bottom: 0.3rem;
  }
  .blend-card .network-type {
    text-align: center;
    font-size: 0.78rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 1rem;
  }
  .svg-wrap {
    display: flex;
    justify-content: center;
    margin-bottom: 0.75rem;
  }
  .blend-card svg text {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  }
  .blend-desc {
    font-size: 0.8rem;
    line-height: 1.5;
    color: #4b5563;
    text-align: center;
  }
  .card-single { border-color: #2563eb; background: #f8faff; }
  .card-single .network-type { color: #2563eb; }
  .card-mirror { border-color: #7c3aed; background: #faf8ff; }
  .card-mirror .network-type { color: #7c3aed; }
  .card-double { border-color: #dc2626; background: #fff8f8; }
  .card-double .network-type { color: #dc2626; }

  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid #e9ecef;
  }
  figcaption strong {
    display: block;
    font-size: 1.1rem;
    color: #1a1a2e;
    margin-bottom: 0.4rem;
  }
  figcaption span {
    font-size: 0.88rem;
    color: #6c757d;
    line-height: 1.6;
    display: block;
  }

  @media (prefers-color-scheme: dark) {
    body { background: #1a1a2e; color: #e9ecef; }
    figure { background: #2d2d44; box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
    .diagram-title { color: #e9ecef; }
    figcaption { border-top-color: #3d3d5c; }
    figcaption strong { color: #e9ecef; }
    figcaption span { color: #adb5bd; }
    .blend-desc { color: #9ca3af; }
    .card-single { background: #1e2a3e; border-color: #3b82f6; }
    .card-mirror { background: #251e3e; border-color: #8b5cf6; }
    .card-double { background: #3e1e1e; border-color: #ef4444; }
    svg text { fill: #e9ecef; }
    svg text.dark-text { fill: #1a1a2e; }
  }
  @media print {
    body { background: #fff; padding: 0; }
    figure { box-shadow: none; border: 1px solid #ccc; break-inside: avoid; }
  }
</style>
</head>
<body>
<figure>
  <div class="diagram-title">Example Blends Compared: Three Network Types</div>
  <div class="blends-grid">

    <!-- Card 1: Surgeon-Butcher (Single-scope / Double-scope) -->
    <div class="blend-card card-single">
      <h3>"This surgeon is a butcher"</h3>
      <div class="network-type">Single-Scope Network</div>
      <div class="svg-wrap">
        <svg viewBox="0 0 280 340" width="280" height="340">
          <!-- Generic -->
          <rect x="70" y="5" width="140" height="48" rx="8" fill="#f3e8ff" stroke="#7c3aed" stroke-width="1.5"/>
          <text x="140" y="24" text-anchor="middle" font-size="9" font-weight="700" class="dark-text" fill="#1a1a2e">GENERIC</text>
          <text x="140" y="38" text-anchor="middle" font-size="8" class="dark-text" fill="#4b5563">Agent, undergoer, cutting</text>
          <!-- Input 1 -->
          <rect x="5" y="90" width="120" height="80" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
          <text x="65" y="108" text-anchor="middle" font-size="8.5" font-weight="700" class="dark-text" fill="#1a1a2e">INPUT 1: Surgery</text>
          <text x="65" y="122" text-anchor="middle" font-size="7.5" class="dark-text" fill="#4b5563">Surgeon, patient</text>
          <text x="65" y="134" text-anchor="middle" font-size="7.5" class="dark-text" fill="#4b5563">Scalpel, OR</text>
          <text x="65" y="146" text-anchor="middle" font-size="7.5" class="dark-text" fill="#4b5563">Goal: heal</text>
          <text x="65" y="158" text-anchor="middle" font-size="7.5" font-weight="600" class="dark-text" fill="#2563eb">FRAME DOMINATES</text>
          <!-- Input 2 -->
          <rect x="155" y="90" width="120" height="80" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
          <text x="215" y="108" text-anchor="middle" font-size="8.5" font-weight="700" class="dark-text" fill="#1a1a2e">INPUT 2: Butchery</text>
          <text x="215" y="122" text-anchor="middle" font-size="7.5" class="dark-text" fill="#4b5563">Butcher, carcass</text>
          <text x="215" y="134" text-anchor="middle" font-size="7.5" class="dark-text" fill="#4b5563">Cleaver, abattoir</text>
          <text x="215" y="146" text-anchor="middle" font-size="7.5" class="dark-text" fill="#4b5563">Goal: cut meat</text>
          <text x="215" y="158" text-anchor="middle" font-size="7.5" font-style="italic" class="dark-text" fill="#d97706">provides content</text>
          <!-- Blend -->
          <rect x="40" y="225" width="200" height="80" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
          <text x="140" y="244" text-anchor="middle" font-size="9" font-weight="700" class="dark-text" fill="#1a1a2e">BLEND</text>
          <text x="140" y="258" text-anchor="middle" font-size="7.5" class="dark-text" fill="#4b5563">Surgeon + butcher's methods</text>
          <text x="140" y="270" text-anchor="middle" font-size="7.5" class="dark-text" fill="#4b5563">Goal (heal) clashes with means (hack)</text>
          <text x="140" y="286" text-anchor="middle" font-size="8.5" font-weight="700" class="dark-text" fill="#16a34a">EMERGENT: Incompetence</text>
          <!-- Connectors -->
          <line x1="110" y1="53" x2="80" y2="90" stroke="#7c3aed" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
          <line x1="170" y1="53" x2="200" y2="90" stroke="#7c3aed" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
          <line x1="125" y1="122" x2="155" y2="122" stroke="#ef4444" stroke-width="1" stroke-dasharray="3,2" opacity="0.6"/>
          <line x1="125" y1="134" x2="155" y2="134" stroke="#ef4444" stroke-width="1" stroke-dasharray="3,2" opacity="0.6"/>
          <path d="M 65 170 C 65 200, 100 210, 110 225" fill="none" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrB)"/>
          <path d="M 215 170 C 215 200, 180 210, 170 225" fill="none" stroke="#d97706" stroke-width="1.5" marker-end="url(#arrA)"/>
          <text x="140" y="322" text-anchor="middle" font-size="7.5" class="dark-text" fill="#4b5563">Surgery frame organizes the blend;</text>
          <text x="140" y="334" text-anchor="middle" font-size="7.5" class="dark-text" fill="#4b5563">butchery provides dissonant content</text>
          <defs>
            <marker id="arrB" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto"><polygon points="0 0,6 2.5,0 5" fill="#2563eb"/></marker>
            <marker id="arrA" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto"><polygon points="0 0,6 2.5,0 5" fill="#d97706"/></marker>
          </defs>
        </svg>
      </div>
    </div>

    <!-- Card 2: Buddhist Monk (Mirror) -->
    <div class="blend-card card-mirror">
      <h3>The Buddhist Monk Riddle</h3>
      <div class="network-type">Mirror Network</div>
      <div class="svg-wrap">
        <svg viewBox="0 0 280 340" width="280" height="340">
          <!-- Generic -->
          <rect x="50" y="5" width="180" height="48" rx="8" fill="#f3e8ff" stroke="#7c3aed" stroke-width="1.5"/>
          <text x="140" y="24" text-anchor="middle" font-size="9" font-weight="700" class="dark-text" fill="#1a1a2e">GENERIC (Shared Frame)</text>
          <text x="140" y="38" text-anchor="middle" font-size="8" class="dark-text" fill="#4b5563">Monk, path, dawn to sunset</text>
          <!-- Input 1 -->
          <rect x="5" y="90" width="120" height="80" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
          <text x="65" y="108" text-anchor="middle" font-size="8.5" font-weight="700" class="dark-text" fill="#1a1a2e">INPUT 1: Day 1</text>
          <text x="65" y="122" text-anchor="middle" font-size="7.5" class="dark-text" fill="#4b5563">Monk ascending</text>
          <text x="65" y="134" text-anchor="middle" font-size="7.5" class="dark-text" fill="#4b5563">Mountain path UP</text>
          <text x="65" y="146" text-anchor="middle" font-size="7.5" class="dark-text" fill="#4b5563">Dawn at bottom</text>
          <text x="65" y="158" text-anchor="middle" font-size="7.5" class="dark-text" fill="#4b5563">Sunset at summit</text>
          <!-- Input 2 -->
          <rect x="155" y="90" width="120" height="80" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
          <text x="215" y="108" text-anchor="middle" font-size="8.5" font-weight="700" class="dark-text" fill="#1a1a2e">INPUT 2: Day 2</text>
          <text x="215" y="122" text-anchor="middle" font-size="7.5" class="dark-text" fill="#4b5563">Monk descending</text>
          <text x="215" y="134" text-anchor="middle" font-size="7.5" class="dark-text" fill="#4b5563">Mountain path DOWN</text>
          <text x="215" y="146" text-anchor="middle" font-size="7.5" class="dark-text" fill="#4b5563">Dawn at summit</text>
          <text x="215" y="158" text-anchor="middle" font-size="7.5" class="dark-text" fill="#4b5563">Sunset at bottom</text>
          <!-- Blend -->
          <rect x="40" y="225" width="200" height="80" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
          <text x="140" y="244" text-anchor="middle" font-size="9" font-weight="700" class="dark-text" fill="#1a1a2e">BLEND</text>
          <text x="140" y="258" text-anchor="middle" font-size="7.5" class="dark-text" fill="#4b5563">TWO monks, SAME day, SAME path</text>
          <text x="140" y="270" text-anchor="middle" font-size="7.5" class="dark-text" fill="#4b5563">One walking up, one walking down</text>
          <text x="140" y="286" text-anchor="middle" font-size="8.5" font-weight="700" class="dark-text" fill="#16a34a">EMERGENT: Meeting point</text>
          <!-- Connectors -->
          <line x1="110" y1="53" x2="80" y2="90" stroke="#7c3aed" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
          <line x1="170" y1="53" x2="200" y2="90" stroke="#7c3aed" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
          <line x1="125" y1="122" x2="155" y2="122" stroke="#ef4444" stroke-width="1" stroke-dasharray="3,2" opacity="0.6"/>
          <line x1="125" y1="134" x2="155" y2="134" stroke="#ef4444" stroke-width="1" stroke-dasharray="3,2" opacity="0.6"/>
          <path d="M 65 170 C 65 200, 100 210, 110 225" fill="none" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrB2)"/>
          <path d="M 215 170 C 215 200, 180 210, 170 225" fill="none" stroke="#d97706" stroke-width="1.5" marker-end="url(#arrA2)"/>
          <text x="140" y="316" text-anchor="middle" font-size="7.5" class="dark-text" fill="#4b5563">Both inputs share same frame;</text>
          <text x="140" y="328" text-anchor="middle" font-size="7.5" class="dark-text" fill="#4b5563">Time compressed: 2 days become 1</text>
          <defs>
            <marker id="arrB2" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto"><polygon points="0 0,6 2.5,0 5" fill="#2563eb"/></marker>
            <marker id="arrA2" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto"><polygon points="0 0,6 2.5,0 5" fill="#d97706"/></marker>
          </defs>
        </svg>
      </div>
    </div>

    <!-- Card 3: Grim Reaper (Double-scope) -->
    <div class="blend-card card-double">
      <h3>The Grim Reaper</h3>
      <div class="network-type">Double-Scope Network</div>
      <div class="svg-wrap">
        <svg viewBox="0 0 280 340" width="280" height="340">
          <!-- Generic -->
          <rect x="50" y="5" width="180" height="48" rx="8" fill="#f3e8ff" stroke="#7c3aed" stroke-width="1.5"/>
          <text x="140" y="24" text-anchor="middle" font-size="9" font-weight="700" class="dark-text" fill="#1a1a2e">GENERIC</text>
          <text x="140" y="38" text-anchor="middle" font-size="8" class="dark-text" fill="#4b5563">Causal process, change of state</text>
          <!-- Input 1 -->
          <rect x="5" y="90" width="120" height="80" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
          <text x="65" y="108" text-anchor="middle" font-size="8.5" font-weight="700" class="dark-text" fill="#1a1a2e">INPUT 1: Death</text>
          <text x="65" y="122" text-anchor="middle" font-size="7.5" class="dark-text" fill="#4b5563">Abstract process</text>
          <text x="65" y="134" text-anchor="middle" font-size="7.5" class="dark-text" fill="#4b5563">No agent, no form</text>
          <text x="65" y="146" text-anchor="middle" font-size="7.5" class="dark-text" fill="#4b5563">Universal, impersonal</text>
          <text x="65" y="158" text-anchor="middle" font-size="7.5" font-weight="600" class="dark-text" fill="#2563eb">FRAME: causation</text>
          <!-- Input 2 -->
          <rect x="155" y="90" width="120" height="80" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
          <text x="215" y="108" text-anchor="middle" font-size="8.5" font-weight="700" class="dark-text" fill="#1a1a2e">INPUT 2: Human</text>
          <text x="215" y="122" text-anchor="middle" font-size="7.5" class="dark-text" fill="#4b5563">Person with body</text>
          <text x="215" y="134" text-anchor="middle" font-size="7.5" class="dark-text" fill="#4b5563">Intentions, tools</text>
          <text x="215" y="146" text-anchor="middle" font-size="7.5" class="dark-text" fill="#4b5563">Approaches, departs</text>
          <text x="215" y="158" text-anchor="middle" font-size="7.5" font-weight="600" class="dark-text" fill="#d97706">FRAME: agency</text>
          <!-- Blend -->
          <rect x="40" y="225" width="200" height="80" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
          <text x="140" y="244" text-anchor="middle" font-size="9" font-weight="700" class="dark-text" fill="#1a1a2e">BLEND</text>
          <text x="140" y="258" text-anchor="middle" font-size="7.5" class="dark-text" fill="#4b5563">Skeleton in hooded robe + scythe</text>
          <text x="140" y="270" text-anchor="middle" font-size="7.5" class="dark-text" fill="#4b5563">Death as agent: "comes for" people</text>
          <text x="140" y="286" text-anchor="middle" font-size="8.5" font-weight="700" class="dark-text" fill="#dc2626">EMERGENT: Death at human scale</text>
          <!-- Connectors -->
          <line x1="110" y1="53" x2="80" y2="90" stroke="#7c3aed" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
          <line x1="170" y1="53" x2="200" y2="90" stroke="#7c3aed" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
          <line x1="125" y1="130" x2="155" y2="130" stroke="#ef4444" stroke-width="1" stroke-dasharray="3,2" opacity="0.6"/>
          <path d="M 65 170 C 65 200, 100 210, 110 225" fill="none" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrB3)"/>
          <path d="M 215 170 C 215 200, 180 210, 170 225" fill="none" stroke="#d97706" stroke-width="1.5" marker-end="url(#arrA3)"/>
          <text x="140" y="316" text-anchor="middle" font-size="7.5" class="dark-text" fill="#4b5563">BOTH frames organize the blend;</text>
          <text x="140" y="328" text-anchor="middle" font-size="7.5" class="dark-text" fill="#4b5563">maximum creative clash and emergence</text>
          <defs>
            <marker id="arrB3" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto"><polygon points="0 0,6 2.5,0 5" fill="#2563eb"/></marker>
            <marker id="arrA3" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto"><polygon points="0 0,6 2.5,0 5" fill="#d97706"/></marker>
          </defs>
        </svg>
      </div>
    </div>
  </div>

  <figcaption>
    <strong>Figure 4: Example Blends Compared -- Three Network Types</strong>
    <span>The same four-space architecture produces radically different meanings depending on the relationship between the input frames. In single-scope networks (left), one input's frame dominates -- the surgery frame structures the blend while butchery provides dissonant content, yielding the emergent meaning "incompetence." In mirror networks (center), both inputs share the same frame -- two journeys on the same path compress into a single day, making the meeting point self-evident. In double-scope networks (right), both inputs have different organizing frames, and both contribute -- Death's causation frame and the Human's agency frame clash productively to create the Grim Reaper, an entity that makes the abstract process of death cognitively manageable at human scale. Based on Fauconnier and Turner (2002); Grady, Oakley, and Coulson (1999).</span>
  </figcaption>
</figure>
</body>
</html>
