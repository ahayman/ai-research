<style>

<body>
<figure>
  <div class="diagram-title">Construction Grammar as Conceptual Blending</div>
  <div class="diagram-subtitle">How grammatical constructions blend with lexical content to produce emergent meaning</div>
  <div class="example-sentence">"He <em>sneezed</em> the napkin off the table."</div>

  <div class="mermaid">
%%{init: {'theme': 'neutral', 'themeVariables': {'fontSize': '12px'}, 'flowchart': {'curve': 'basis', 'nodeSpacing': 25, 'rankSpacing': 45}}}%%
flowchart TD
    GEN["<b>GENERIC SPACE</b><br/>Agent performs action,<br/>entity changes state"]:::generic

    I1["<b>INPUT 1: Lexical Semantics</b><br/><i>SNEEZE frame</i><br/>Intransitive, involuntary action<br/>No object, no caused motion<br/>Agent does not control direction<br/>No causal force on external entity"]:::input1

    I2["<b>INPUT 2: Constructional Semantics</b><br/><i>CAUSED-MOTION construction</i><br/>Pattern: X causes Y to move to Z<br/>Transitive, volitional causation<br/>Agent exerts force on object<br/>Object moves along a path"]:::input2

    BL["<b>BLENDED SPACE</b><br/>Sneeze-caused-motion event<br/>The sneeze = the causal force<br/>The napkin = the moved object<br/>'Off the table' = the path/goal"]:::blend

    EM["<b>EMERGENT MEANING</b><br/>Involuntary action interpreted<br/>AS IF it were volitional causation<br/>Construction forces causal reading<br/>onto a non-causal verb"]:::emerge

    PRIN["<b>THE PRINCIPLE</b><br/>Construction meaning is independent<br/>of specific words. Any verb inserted into<br/>[Subj V Obj Oblique] inherits<br/>CAUSED-MOTION semantics"]:::principle

    GEN -.-> I1
    GEN -.-> I2
    I1 -->|"verb frame<br/>projected"| BL
    I2 -->|"constructional<br/>frame projected"| BL
    I1 <-.->|"cross-space<br/>mapping"| I2
    BL --> EM
    EM --> PRIN

    classDef generic fill:#f3e8ff,stroke:#7c3aed,stroke-width:2px,color:#1a1a2e
    classDef input1 fill:#dbeafe,stroke:#2563eb,stroke-width:2px,color:#1a1a2e
    classDef input2 fill:#fef3c7,stroke:#d97706,stroke-width:2px,color:#1a1a2e
    classDef blend fill:#dcfce7,stroke:#16a34a,stroke-width:2.5px,color:#1a1a2e
    classDef emerge fill:#fce7f3,stroke:#db2777,stroke-width:2px,color:#1a1a2e
    classDef principle fill:#e0f2fe,stroke:#0284c7,stroke-width:2px,color:#1a1a2e
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background:#f3e8ff;"></div> Generic Space</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#dbeafe;"></div> Lexical frame (verb)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#fef3c7;"></div> Constructional frame (pattern)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#dcfce7;"></div> Blended event</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#fce7f3;"></div> Emergent meaning</div>
  </div>

  <figcaption>
    <strong>Figure 6: Construction Grammar as Conceptual Blending</strong>
    <span>Adele Goldberg's Construction Grammar (1995) shows that syntactic patterns carry meaning independently of words. In "He sneezed the napkin off the table," the verb "sneeze" is intransitive and involuntary -- you cannot normally sneeze something. But the caused-motion construction [Subject Verb Object Oblique] has its own meaning: X causes Y to move to Z. The constructional frame and the verb frame blend: the sneeze (involuntary) is coerced into serving as a causal force (volitional). The emergent meaning -- that the sneeze unintentionally caused the napkin to fly off the table -- exists in neither the verb frame nor the construction alone. This is a double-scope blend: both the verb's semantics and the construction's semantics contribute to organizing the final interpretation. Based on Goldberg (1995); Fauconnier and Turner (2002).</span>
  </figcaption>
</figure>
