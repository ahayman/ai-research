<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CMT vs. Blending Theory Comparison</title>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #f8f9fa;
    color: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 2rem;
  }
  figure {
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
    max-width: 1100px;
    width: 100%;
  }
  .diagram-title {
    text-align: center;
    font-size: 1.3rem;
    font-weight: 700;
    margin-bottom: 1.5rem;
    color: #1a1a2e;
  }
  .comparison-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 2rem;
    margin-bottom: 1.5rem;
  }
  @media (max-width: 768px) {
    .comparison-grid { grid-template-columns: 1fr; }
  }
  .comp-panel {
    border-radius: 12px;
    padding: 1.5rem;
    border: 2px solid;
  }
  .comp-panel h3 {
    text-align: center;
    font-size: 1rem;
    margin-bottom: 0.3rem;
  }
  .comp-panel .subtitle {
    text-align: center;
    font-size: 0.8rem;
    color: #6c757d;
    margin-bottom: 1rem;
  }
  .panel-cmt { border-color: #0284c7; background: #f0f9ff; }
  .panel-blend { border-color: #7c3aed; background: #faf5ff; }
  .svg-wrap {
    display: flex;
    justify-content: center;
    margin-bottom: 1rem;
  }
  .feature-list {
    list-style: none;
    padding: 0;
  }
  .feature-list li {
    font-size: 0.82rem;
    padding: 0.35rem 0;
    border-bottom: 1px solid rgba(0,0,0,0.06);
    color: #374151;
    line-height: 1.4;
  }
  .feature-list li:last-child { border-bottom: none; }
  .feature-list li strong { color: #1a1a2e; }

  .spectrum-section {
    margin-top: 1rem;
    padding: 1.25rem;
    background: #f9fafb;
    border-radius: 10px;
    border: 1px solid #e5e7eb;
  }
  .spectrum-section h4 {
    text-align: center;
    font-size: 0.95rem;
    margin-bottom: 1rem;
    color: #1a1a2e;
  }
  .mermaid {
    display: flex;
    justify-content: center;
  }
  svg text {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid #e9ecef;
  }
  figcaption strong {
    display: block;
    font-size: 1.1rem;
    color: #1a1a2e;
    margin-bottom: 0.4rem;
  }
  figcaption span {
    font-size: 0.88rem;
    color: #6c757d;
    line-height: 1.6;
    display: block;
  }
  @media (prefers-color-scheme: dark) {
    body { background: #1a1a2e; color: #e9ecef; }
    figure { background: #2d2d44; box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
    .diagram-title { color: #e9ecef; }
    .panel-cmt { background: #1a2e3e; border-color: #38bdf8; }
    .panel-blend { background: #2a1e3e; border-color: #a78bfa; }
    .comp-panel .subtitle { color: #9ca3af; }
    .feature-list li { color: #d1d5db; border-bottom-color: rgba(255,255,255,0.08); }
    .feature-list li strong { color: #e9ecef; }
    .spectrum-section { background: #252540; border-color: #3d3d5c; }
    .spectrum-section h4 { color: #e9ecef; }
    figcaption { border-top-color: #3d3d5c; }
    figcaption strong { color: #e9ecef; }
    figcaption span { color: #adb5bd; }
    svg text { fill: #e9ecef; }
    svg text.dark-text { fill: #1a1a2e; }
  }
  @media print {
    body { background: #fff; padding: 0; }
    figure { box-shadow: none; border: 1px solid #ccc; break-inside: avoid; }
  }
</style>
</head>
<body>
<figure>
  <div class="diagram-title">Conceptual Metaphor Theory vs. Conceptual Blending Theory</div>

  <div class="comparison-grid">
    <!-- CMT Panel -->
    <div class="comp-panel panel-cmt">
      <h3>Conceptual Metaphor Theory (CMT)</h3>
      <div class="subtitle">Lakoff &amp; Johnson, 1980</div>
      <div class="svg-wrap">
        <svg viewBox="0 0 300 160" width="300" height="160">
          <rect x="20" y="30" width="110" height="70" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
          <text x="75" y="58" text-anchor="middle" font-weight="700" font-size="12" class="dark-text" fill="#1a1a2e">SOURCE</text>
          <text x="75" y="75" text-anchor="middle" font-size="9.5" class="dark-text" fill="#4b5563">e.g., WAR</text>
          <text x="75" y="88" text-anchor="middle" font-size="8.5" class="dark-text" fill="#4b5563">attack, defend, win</text>
          <rect x="170" y="30" width="110" height="70" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
          <text x="225" y="58" text-anchor="middle" font-weight="700" font-size="12" class="dark-text" fill="#1a1a2e">TARGET</text>
          <text x="225" y="75" text-anchor="middle" font-size="9.5" class="dark-text" fill="#4b5563">e.g., ARGUMENT</text>
          <text x="225" y="88" text-anchor="middle" font-size="8.5" class="dark-text" fill="#4b5563">rebut, concede, win</text>
          <line x1="130" y1="65" x2="170" y2="65" stroke="#0284c7" stroke-width="2.5" marker-end="url(#arrCMT)"/>
          <text x="150" y="57" text-anchor="middle" font-size="8" fill="#0284c7" font-weight="600">one-way</text>
          <text x="150" y="120" text-anchor="middle" font-size="9" fill="#0284c7" font-weight="600">Stable, entrenched mapping</text>
          <text x="150" y="135" text-anchor="middle" font-size="8.5" class="dark-text" fill="#6c757d">No emergent structure modeled</text>
          <text x="150" y="150" text-anchor="middle" font-size="8.5" class="dark-text" fill="#6c757d">Two domains only</text>
          <defs>
            <marker id="arrCMT" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#0284c7"/></marker>
          </defs>
        </svg>
      </div>
      <ul class="feature-list">
        <li><strong>Domains:</strong> Two (Source, Target)</li>
        <li><strong>Mapping:</strong> Unidirectional (Source to Target)</li>
        <li><strong>Knowledge type:</strong> Stable, entrenched in long-term memory</li>
        <li><strong>Temporal scope:</strong> Diachronic -- tracks entrenchment over time</li>
        <li><strong>Processing:</strong> Largely automatic, unconscious retrieval</li>
        <li><strong>Emergent meaning:</strong> Not a primary focus</li>
        <li><strong>Best explains:</strong> Why "argument is war" feels natural; systematic metaphorical reasoning</li>
      </ul>
    </div>

    <!-- Blending Panel -->
    <div class="comp-panel panel-blend">
      <h3>Conceptual Blending Theory</h3>
      <div class="subtitle">Fauconnier &amp; Turner, 1993/2002</div>
      <div class="svg-wrap">
        <svg viewBox="0 0 300 160" width="300" height="160">
          <!-- Generic -->
          <rect x="100" y="2" width="100" height="30" rx="6" fill="#f3e8ff" stroke="#7c3aed" stroke-width="1.5"/>
          <text x="150" y="21" text-anchor="middle" font-size="8.5" font-weight="600" class="dark-text" fill="#1a1a2e">Generic Space</text>
          <!-- Input 1 -->
          <rect x="15" y="50" width="100" height="40" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
          <text x="65" y="72" text-anchor="middle" font-size="9" font-weight="600" class="dark-text" fill="#1a1a2e">Input 1</text>
          <!-- Input 2 -->
          <rect x="185" y="50" width="100" height="40" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
          <text x="235" y="72" text-anchor="middle" font-size="9" font-weight="600" class="dark-text" fill="#1a1a2e">Input 2</text>
          <!-- Blend -->
          <rect x="75" y="110" width="150" height="40" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
          <text x="150" y="127" text-anchor="middle" font-size="9" font-weight="700" class="dark-text" fill="#1a1a2e">Blended Space</text>
          <text x="150" y="141" text-anchor="middle" font-size="7.5" font-weight="600" class="dark-text" fill="#16a34a">+ emergent structure</text>
          <!-- Lines -->
          <line x1="130" y1="32" x2="80" y2="50" stroke="#7c3aed" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
          <line x1="170" y1="32" x2="220" y2="50" stroke="#7c3aed" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
          <line x1="115" y1="70" x2="185" y2="70" stroke="#ef4444" stroke-width="1" stroke-dasharray="3,2" opacity="0.6"/>
          <path d="M 65 90 C 65 102, 110 105, 120 110" fill="none" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrBL1)"/>
          <path d="M 235 90 C 235 102, 190 105, 180 110" fill="none" stroke="#d97706" stroke-width="1.5" marker-end="url(#arrBL2)"/>
          <defs>
            <marker id="arrBL1" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto"><polygon points="0 0,6 2.5,0 5" fill="#2563eb"/></marker>
            <marker id="arrBL2" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto"><polygon points="0 0,6 2.5,0 5" fill="#d97706"/></marker>
          </defs>
        </svg>
      </div>
      <ul class="feature-list">
        <li><strong>Spaces:</strong> Minimum four (Input 1, Input 2, Generic, Blend)</li>
        <li><strong>Mapping:</strong> Multi-directional; both inputs contribute</li>
        <li><strong>Knowledge type:</strong> Dynamic, on-line constructions in working memory</li>
        <li><strong>Temporal scope:</strong> Synchronic -- models real-time meaning construction</li>
        <li><strong>Processing:</strong> On-line, dynamic, effortful construction</li>
        <li><strong>Emergent meaning:</strong> Central claim -- blends produce meaning not in any input</li>
        <li><strong>Best explains:</strong> How "this surgeon is a butcher" works in the moment; novel metaphors</li>
      </ul>
    </div>
  </div>

  <!-- Network Type Spectrum -->
  <div class="spectrum-section">
    <h4>Network Type Spectrum: CMT as a Special Case within Blending Theory</h4>
    <div class="mermaid">
%%{init: {'theme': 'neutral', 'themeVariables': {'fontSize': '12px'}, 'flowchart': {'curve': 'basis', 'rankSpacing': 40}}}%%
flowchart LR
    S["<b>Simplex</b><br/>Frame + Values<br/><i>'Paul is the<br/>father of Sally'</i>"]:::simplex
    M["<b>Mirror</b><br/>Shared frame,<br/>different content<br/><i>Buddhist Monk<br/>riddle</i>"]:::mirror
    SS["<b>Single-Scope</b><br/>One frame dominates<br/><i>ARGUMENT IS WAR</i><br/><i>CMT maps here</i>"]:::single
    DS["<b>Double-Scope</b><br/>Both frames<br/>contribute<br/><i>Grim Reaper,<br/>computer desktop</i>"]:::double

    S -->|"increasing<br/>complexity"| M
    M -->|"different<br/>frames"| SS
    SS -->|"both frames<br/>active"| DS

    classDef simplex fill:#e0f2fe,stroke:#0284c7,stroke-width:2px,color:#1a1a2e
    classDef mirror fill:#f3e8ff,stroke:#7c3aed,stroke-width:2px,color:#1a1a2e
    classDef single fill:#dbeafe,stroke:#2563eb,stroke-width:2.5px,color:#1a1a2e
    classDef double fill:#fee2e2,stroke:#dc2626,stroke-width:2px,color:#1a1a2e
    </div>
  </div>

  <figcaption>
    <strong>Figure 5: Conceptual Metaphor Theory vs. Conceptual Blending Theory</strong>
    <span>CMT and Blending Theory are complementary, not competing. CMT describes stable, entrenched metaphorical mappings (Source to Target, unidirectional), while Blending Theory models dynamic, real-time meaning construction across four or more mental spaces. Critically, CMT maps onto just one segment of the blending framework: the single-scope network, where one input's frame dominates. Blending Theory also handles simplex networks (frame + values), mirror networks (shared frame), and double-scope networks (both frames contribute) -- none of which are metaphors in the traditional CMT sense. The spectrum from simplex to double-scope represents increasing cognitive complexity, with double-scope blending hypothesized to be uniquely human. Based on Fauconnier and Turner (2002); Grady, Oakley, and Coulson (1999).</span>
  </figcaption>
</figure>
<script>
  mermaid.initialize({
    startOnLoad: true,
    securityLevel: 'loose',
    theme: window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'neutral'
  });
</script>
</body>
</html>
