<figure>
  <div class="diagram-title">Blending Recursion: How Blends Build on Blends</div>
  <div class="diagram-subtitle">Finite cognitive resources produce infinite conceptual complexity through recursive composition</div>

  <div class="mermaid">
%%{init: {'theme': 'neutral', 'themeVariables': {'fontSize': '12px'}, 'flowchart': {'curve': 'basis', 'nodeSpacing': 20, 'rankSpacing': 40}}}%%
flowchart TD
    subgraph LEVEL1 ["LEVEL 1: Basic Blend"]
        direction TB
        A1["<b>Input A</b><br/>Harvest/reaping<br/>(cutting grain)"]:::input
        A2["<b>Input B</b><br/>Passage of time<br/>(Chronos)"]:::input
        B1["<b>Blend 1</b><br/>Time as Reaper<br/>'Time reaps all things'"]:::blend1
        A1 --> B1
        A2 --> B1
    end

    subgraph LEVEL2 ["LEVEL 2: Blend Becomes Input"]
        direction TB
        C1["<b>Blend 1 as Input</b><br/>Time-as-Reaper<br/>(from Level 1)"]:::blend_input
        C2["<b>New Input C</b><br/>Human agent<br/>(body, intentions,<br/>tools, approach)"]:::input
        B2["<b>Blend 2</b><br/>The Grim Reaper<br/>Skeleton + scythe +<br/>hooded robe + agency"]:::blend2
        C1 --> B2
        C2 --> B2
    end

    subgraph LEVEL3 ["LEVEL 3: Further Recursion"]
        direction TB
        D1["<b>Blend 2 as Input</b><br/>The Grim Reaper<br/>(from Level 2)"]:::blend_input
        D2["<b>New Input D</b><br/>Chess game<br/>(strategy, contest,<br/>moves, winner)"]:::input
        B3["<b>Blend 3</b><br/>Playing chess with Death<br/>Negotiation with mortality;<br/>stakes are your life"]:::blend3
        D1 --> B3
        D2 --> B3
    end

    subgraph LEVEL4 ["LEVEL 4: Cultural Elaboration"]
        direction TB
        E1["<b>Blend 3 as Input</b><br/>Chess with Death<br/>(from Level 3)"]:::blend_input
        E2["<b>New Input E</b><br/>Film narrative<br/>(Bergman's<br/>Seventh Seal)"]:::input
        B4["<b>Blend 4</b><br/>Artistic meditation<br/>on mortality, faith,<br/>and meaning"]:::blend4
        E1 --> B4
        E2 --> B4
    end

    B1 -.->|"output becomes<br/>new input"| C1
    B2 -.->|"output becomes<br/>new input"| D1
    B3 -.->|"output becomes<br/>new input"| E1

    PATTERN["<b>THE RECURSIVE PATTERN</b><br/>Each blend's emergent structure becomes<br/>available as input to further blending.<br/>Finite operations produce unbounded complexity.<br/>This is the cognitive architecture that enables<br/>language, science, art, and culture."]:::pattern

    B4 --> PATTERN

    classDef input fill:#dbeafe,stroke:#2563eb,stroke-width:1.5px,color:#1a1a2e
    classDef blend1 fill:#dcfce7,stroke:#16a34a,stroke-width:2px,color:#1a1a2e

    <div class="legend-item"><div class="legend-swatch" style="background:#fef3c7;"></div> Previous blend reused as input</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#dcfce7;"></div> Level 1 blend</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#bbf7d0;"></div> Level 2 blend</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#86efac;"></div> Level 3 blend</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#4ade80;"></div> Level 4 blend</div>
  </div>

  <figcaption>
    <strong>Figure 7: Blending Recursion -- Compositional Architecture</strong>
    <span>Blending is recursive: the output of one blending operation can become input to the next, allowing unbounded conceptual complexity from finite cognitive resources. This example traces the Grim Reaper through four levels of recursive blending. Level 1: the harvest/reaping frame blends with the passage of time to create "Time as Reaper." Level 2: Time-as-Reaper blends with the human agent frame to create the Grim Reaper -- a personified death. Level 3: The Grim Reaper blends with the chess game frame to produce "playing chess with Death" -- a negotiation with mortality. Level 4: Chess-with-Death blends with cinematic narrative to create Bergman's The Seventh Seal -- an artistic meditation on faith and mortality. Each blend's emergent structure was unavailable before the blend was constructed, yet becomes available as raw material for further integration. Fauconnier and Turner argue that this recursive compositionality -- especially double-scope recursion -- is what makes human cognition unique and may have driven the "creative explosion" approximately 50,000 years ago. Based on Fauconnier and Turner (2002).</span>
  </figcaption>
</figure>
