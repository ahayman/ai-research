<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emergent Structure: Composition, Completion, Elaboration</title>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #f8f9fa;
    color: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 2rem;
  }
  figure {

    padding: 2.5rem;
    max-width: 1000px;

  }
  .diagram-title {
    text-align: center;
    font-size: 1.3rem;
    font-weight: 700;
    margin-bottom: 1.5rem;
    color: #1a1a2e;
  }
  .mermaid {
    display: flex;
    justify-content: center;
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid #e9ecef;
  }
  figcaption strong {

  }

  }
  @media (prefers-color-scheme: dark) {
    body { background: #1a1a2e; color: #e9ecef; }
    figure { background: #2d2d44; box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
    .diagram-title { color: #e9ecef; }
    figcaption { border-top-color: #3d3d5c; }
    figcaption strong { color: #e9ecef; }

  }
</style>

<body>
<figure>
  <div class="diagram-title">Emergent Structure: How Blends Create New Meaning</div>
  <div class="mermaid">
%%{init: {'theme': 'neutral', 'themeVariables': {'fontSize': '13px'}, 'flowchart': {'curve': 'basis', 'nodeSpacing': 30, 'rankSpacing': 50}}}%%
flowchart TD
    INPUTS["<b>Input Spaces Activated</b><br/>Elements from Input 1 and Input 2<br/>are selected for projection"]:::input

    COMP["<b>1. COMPOSITION</b><br/>Elements from different inputs are<br/>juxtaposed in the blend, creating<br/>new relations that exist in neither input"]:::comp

    COMP_EX["<i>Surgeon-Butcher:</i> Surgeon's goal<br/>(healing) meets butcher's methods<br/>(rough cutting) -- juxtaposition<br/>creates possibility of evaluating mismatch"]:::example_comp

    COMPL["<b>2. COMPLETION</b><br/>Background knowledge, cultural frames,<br/>and long-term memory are recruited<br/>to fill out the blend into a coherent scenario"]:::compl

    COMPL_EX["<i>Surgeon-Butcher:</i> Professional standards,<br/>expectation that surgeons should be precise,<br/>knowledge of what happens when inappropriate<br/>methods are used for delicate tasks"]:::example_compl

    ELAB["<b>3. ELABORATION</b><br/>'Running the blend' -- mentally simulating<br/>the scenario, exploring consequences,<br/>generating further insights"]:::elab

    ELAB_EX["<i>Surgeon-Butcher:</i> Vivid mental image of<br/>the surgeon hacking at flesh, blood<br/>everywhere, tissue damage -- intensifies<br/>the evaluation of incompetence"]:::example_elab

    EMERGE["<b>EMERGENT MEANING</b><br/>Novel meaning not present in any input:<br/>INCOMPETENCE -- the devastating evaluation<br/>that arises only from the blend"]:::emerge

    INPUTS --> COMP
    COMP --> COMP_EX
    COMP --> COMPL
    COMPL --> COMPL_EX
    COMPL --> ELAB
    ELAB --> ELAB_EX
    ELAB --> EMERGE

    ELAB -.->|"Elaboration triggers<br/>further completion"| COMPL
    EMERGE -.->|"Emergent structure can<br/>feed back into<br/>further blending<br/>(recursion)"| INPUTS

    classDef input fill:#e0f2fe,stroke:#0284c7,stroke-width:2px,color:#1a1a2e
    classDef comp fill:#dbeafe,stroke:#2563eb,stroke-width:2px,color:#1a1a2e
    classDef compl fill:#fef3c7,stroke:#d97706,stroke-width:2px,color:#1a1a2e
    classDef elab fill:#f3e8ff,stroke:#7c3aed,stroke-width:2px,color:#1a1a2e
    classDef emerge fill:#dcfce7,stroke:#16a34a,stroke-width:2.5px,color:#1a1a2e
    classDef example_comp fill:#eff6ff,stroke:#93c5fd,stroke-width:1px,color:#4b5563,stroke-dasharray: 4 3
    classDef example_compl fill:#fffbeb,stroke:#fcd34d,stroke-width:1px,color:#4b5563,stroke-dasharray: 4 3
    classDef example_elab fill:#faf5ff,stroke:#c4b5fd,stroke-width:1px,color:#4b5563,stroke-dasharray: 4 3
  </div>
  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background:#dbeafe;"></div> Composition</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#fef3c7;"></div> Completion</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#f3e8ff;"></div> Elaboration</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#dcfce7;"></div> Emergent meaning</div>
  </div>
  <figcaption>
    <strong>Figure 2: The Emergent Structure Process</strong>
    <span>Blends generate meaning through three interacting processes. Composition juxtaposes elements from different inputs, creating new relational structures. Completion recruits background knowledge and cultural frames to make the blend coherent. Elaboration mentally simulates the blend, exploring consequences. Crucially, the process is recursive: elaboration can trigger further completion, and emergent structure from one blend can become input to subsequent blends. Using the "this surgeon is a butcher" example, the emergent meaning "incompetence" is not a property of either surgeons or butchers -- it arises only through blending. Based on Fauconnier and Turner (2002); Polak (2017).</span>
  </figcaption>
</figure>
