<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vital Relations Map</title>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #f8f9fa;
    color: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 2rem;
  }
  figure {
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
    max-width: 1100px;
    width: 100%;
  }
  .diagram-title {
    text-align: center;
    font-size: 1.3rem;
    font-weight: 700;
    margin-bottom: 1.5rem;
    color: #1a1a2e;
  }
  .mermaid {
    display: flex;
    justify-content: center;
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid #e9ecef;
  }
  figcaption strong {
    display: block;
    font-size: 1.1rem;
    color: #1a1a2e;
    margin-bottom: 0.4rem;
  }
  figcaption span {
    font-size: 0.88rem;
    color: #6c757d;
    line-height: 1.6;
    display: block;
  }
  .legend {
    display: flex;
    justify-content: center;
    gap: 1.5rem;
    margin-top: 1rem;
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.82rem;
    color: #495057;
  }
  .legend-swatch {
    width: 14px;
    height: 14px;
    border-radius: 3px;
    border: 1px solid rgba(0,0,0,0.15);
  }
  @media (prefers-color-scheme: dark) {
    body { background: #1a1a2e; color: #e9ecef; }
    figure { background: #2d2d44; box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
    .diagram-title { color: #e9ecef; }
    figcaption { border-top-color: #3d3d5c; }
    figcaption strong { color: #e9ecef; }
    figcaption span { color: #adb5bd; }
    .legend-item { color: #adb5bd; }
  }
  @media print {
    body { background: #fff; padding: 0; }
    figure { box-shadow: none; border: 1px solid #ccc; break-inside: avoid; }
  }
</style>
</head>
<body>
<figure>
  <div class="diagram-title">Vital Relations: The Cognitive Connections That Structure Blending</div>
  <div class="mermaid">
%%{init: {'theme': 'neutral', 'themeVariables': {'fontSize': '13px'}, 'mindmap': {'useMaxWidth': true}}}%%
mindmap
  root(("VITAL<br/>RELATIONS"))
    **Spatiotemporal**
      Time
        Temporal relations between events
        Compression: two days become one
      Space
        Spatial relations between locations
        Compression: distant places merge
    **Causal**
      Cause-Effect
        Causal connections between events
        Compression: long causal chain becomes single cause
      Intentionality
        Goal-directedness and purpose
        Compression: abstract process gains agency
      Change
        Transformation of entity over time
        Compression: aging becomes single transition
    **Identity**
      Identity
        Same entity across different spaces
        Compression: monk splits into two monks
      Uniqueness
        Singular, distinct identity
        Compression: many identities merge into one
      Role-Value
        Abstract role mapped to specific filler
        The president role vs. specific person
    **Structural**
      Part-Whole
        Relations between parts and wholes
        Compression: many components become unified entity
      Category
        Membership in shared category
        Two entities as instances of same type
      Property
        Attributes of entities
        Specific properties projected selectively
    **Comparative**
      Analogy
        Parallel structure between domains
        Compression: analogy becomes identity
      Disanalogy
        Structural differences between domains
        Where the parallel breaks down
      Similarity
        Resemblance between elements
        Visual, functional, or structural
    **Semiotic**
      Representation
        One thing standing for another
        Symbol, icon, or model
  </div>
  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background:#dbeafe;"></div> Spatiotemporal</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#dcfce7;"></div> Causal</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#fef3c7;"></div> Identity</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#f3e8ff;"></div> Structural</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#fce7f3;"></div> Comparative</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#e0f2fe;"></div> Semiotic</div>
  </div>
  <figcaption>
    <strong>Figure 3: Vital Relations Map</strong>
    <span>Fauconnier and Turner identify fifteen fundamental vital relations -- the conceptual connections that matter most to human cognition. These relations hold between elements across mental spaces (outer-space relations) and are systematically compressed within the blended space (inner-space relations) to achieve "human scale." For example, an outer-space Analogy between domains becomes inner-space Identity in the blend; diffuse Cause-Effect chains compress into a single salient cause; Time spread across days compresses into a single moment. The Grim Reaper exemplifies multiple compressions: Time (all deaths across history compressed into one agent acting now), Space (death everywhere compressed into one figure), and Cause-Effect (biological processes compressed into one agent's action). Based on Fauconnier and Turner (2002).</span>
  </figcaption>
</figure>
<script>
  mermaid.initialize({
    startOnLoad: true,
    securityLevel: 'loose',

  });
</script>
</body>
</html>
