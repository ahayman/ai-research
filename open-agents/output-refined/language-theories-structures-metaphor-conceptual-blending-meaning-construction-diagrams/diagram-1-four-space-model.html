<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Four-Space Model of Conceptual Blending</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #f8f9fa;
    color: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 2rem;
  }
  figure {
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
    max-width: 960px;
    width: 100%;
  }
  .diagram-title {
    text-align: center;
    font-size: 1.3rem;
    font-weight: 700;
    margin-bottom: 2rem;
    color: #1a1a2e;
  }
  .svg-container {
    display: flex;
    justify-content: center;
    overflow-x: auto;
    padding: 1rem 0;
  }
  svg text {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid #e9ecef;
  }
  figcaption strong {
    display: block;
    font-size: 1.1rem;
    color: #1a1a2e;
    margin-bottom: 0.4rem;
  }
  figcaption span {
    font-size: 0.88rem;
    color: #6c757d;
    line-height: 1.6;
    display: block;
  }
  .legend {
    display: flex;
    justify-content: center;
    gap: 1.5rem;
    margin-top: 1.25rem;
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.82rem;
    color: #495057;
  }
  .legend-swatch {
    width: 14px;
    height: 14px;
    border-radius: 3px;
    border: 1px solid rgba(0,0,0,0.15);
  }
  @media (prefers-color-scheme: dark) {
    body { background: #1a1a2e; color: #e9ecef; }
    figure { background: #2d2d44; box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
    .diagram-title { color: #e9ecef; }
    figcaption { border-top-color: #3d3d5c; }
    figcaption strong { color: #e9ecef; }
    figcaption span { color: #adb5bd; }
    .legend-item { color: #adb5bd; }
    svg text { fill: #e9ecef; }
    svg text.dark-text { fill: #1a1a2e; }
  }
  @media print {
    body { background: #fff; padding: 0; }
    figure { box-shadow: none; border: 1px solid #ccc; break-inside: avoid; }
  }
</style>
</head>
<body>
<figure>
  <div class="diagram-title">The Four-Space Model of Conceptual Blending</div>
  <div class="svg-container">
    <svg viewBox="0 0 820 620" width="820" height="620" xmlns="http://www.w3.org/2000/svg">
      <!-- Generic Space (top center) -->
      <rect x="260" y="20" width="300" height="130" rx="16" fill="#f3e8ff" stroke="#7c3aed" stroke-width="2.5"/>
      <text x="410" y="48" text-anchor="middle" font-weight="700" font-size="14" class="dark-text" fill="#1a1a2e">GENERIC SPACE</text>
      <text x="410" y="68" text-anchor="middle" font-size="11.5" class="dark-text" fill="#4b5563">(Shared abstract structure)</text>
      <line x1="290" y1="85" x2="530" y2="85" stroke="#7c3aed" stroke-width="0.5" opacity="0.4"/>
      <text x="410" y="102" text-anchor="middle" font-size="11" class="dark-text" fill="#4b5563">Agent</text>
      <text x="410" y="117" text-anchor="middle" font-size="11" class="dark-text" fill="#4b5563">Undergoer / Sharp instrument</text>
      <text x="410" y="132" text-anchor="middle" font-size="11" class="dark-text" fill="#4b5563">Cutting action / Workspace / Goal</text>

      <!-- Input Space 1 (left) -->
      <rect x="30" y="210" width="300" height="175" rx="16" fill="#dbeafe" stroke="#2563eb" stroke-width="2.5"/>
      <text x="180" y="238" text-anchor="middle" font-weight="700" font-size="14" class="dark-text" fill="#1a1a2e">INPUT SPACE 1: Surgery</text>
      <line x1="60" y1="252" x2="300" y2="252" stroke="#2563eb" stroke-width="0.5" opacity="0.4"/>
      <text x="180" y="272" text-anchor="middle" font-size="11.5" class="dark-text" fill="#4b5563">Surgeon (agent)</text>
      <text x="180" y="290" text-anchor="middle" font-size="11.5" class="dark-text" fill="#4b5563">Patient -- living human (undergoer)</text>
      <text x="180" y="308" text-anchor="middle" font-size="11.5" class="dark-text" fill="#4b5563">Scalpel (instrument)</text>
      <text x="180" y="326" text-anchor="middle" font-size="11.5" class="dark-text" fill="#4b5563">Operating room (workspace)</text>
      <text x="180" y="344" text-anchor="middle" font-size="11.5" class="dark-text" fill="#4b5563">Goal: heal with precision</text>
      <text x="180" y="362" text-anchor="middle" font-size="11.5" class="dark-text" fill="#4b5563">Expectation of care</text>

      <!-- Input Space 2 (right) -->
      <rect x="490" y="210" width="300" height="175" rx="16" fill="#fef3c7" stroke="#d97706" stroke-width="2.5"/>
      <text x="640" y="238" text-anchor="middle" font-weight="700" font-size="14" class="dark-text" fill="#1a1a2e">INPUT SPACE 2: Butchery</text>
      <line x1="520" y1="252" x2="760" y2="252" stroke="#d97706" stroke-width="0.5" opacity="0.4"/>
      <text x="640" y="272" text-anchor="middle" font-size="11.5" class="dark-text" fill="#4b5563">Butcher (agent)</text>
      <text x="640" y="290" text-anchor="middle" font-size="11.5" class="dark-text" fill="#4b5563">Animal carcass -- dead meat (undergoer)</text>
      <text x="640" y="308" text-anchor="middle" font-size="11.5" class="dark-text" fill="#4b5563">Cleaver (instrument)</text>
      <text x="640" y="326" text-anchor="middle" font-size="11.5" class="dark-text" fill="#4b5563">Abattoir (workspace)</text>
      <text x="640" y="344" text-anchor="middle" font-size="11.5" class="dark-text" fill="#4b5563">Goal: cut meat for commerce</text>
      <text x="640" y="362" text-anchor="middle" font-size="11.5" class="dark-text" fill="#4b5563">No care toward undergoer</text>

      <!-- Blended Space (bottom center) -->
      <rect x="210" y="450" width="400" height="150" rx="16" fill="#dcfce7" stroke="#16a34a" stroke-width="2.5"/>
      <text x="410" y="478" text-anchor="middle" font-weight="700" font-size="14" class="dark-text" fill="#1a1a2e">BLENDED SPACE</text>
      <text x="410" y="496" text-anchor="middle" font-size="11" font-style="italic" class="dark-text" fill="#16a34a">"This surgeon is a butcher"</text>
      <line x1="240" y1="508" x2="580" y2="508" stroke="#16a34a" stroke-width="0.5" opacity="0.4"/>
      <text x="410" y="526" text-anchor="middle" font-size="11.5" class="dark-text" fill="#4b5563">Agent: the surgeon (identity from Input 1)</text>
      <text x="410" y="544" text-anchor="middle" font-size="11.5" class="dark-text" fill="#4b5563">Methods: rough cutting, no care (from Input 2)</text>
      <text x="410" y="562" text-anchor="middle" font-size="11.5" font-weight="600" class="dark-text" fill="#16a34a">EMERGENT: Incompetence</text>
      <text x="410" y="580" text-anchor="middle" font-size="10.5" class="dark-text" fill="#4b5563">(not in either input -- arises from goal/means clash)</text>

      <!-- Connections: Generic to Input 1 -->
      <line x1="340" y1="150" x2="230" y2="210" stroke="#7c3aed" stroke-width="1.8" stroke-dasharray="6,4" opacity="0.6"/>
      <!-- Connections: Generic to Input 2 -->
      <line x1="480" y1="150" x2="590" y2="210" stroke="#7c3aed" stroke-width="1.8" stroke-dasharray="6,4" opacity="0.6"/>

      <!-- Cross-space mapping lines (between inputs) -->
      <line x1="330" y1="270" x2="490" y2="270" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.7"/>
      <line x1="330" y1="290" x2="490" y2="290" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.7"/>
      <line x1="330" y1="308" x2="490" y2="308" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.7"/>
      <line x1="330" y1="326" x2="490" y2="326" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.7"/>
      <text x="410" y="265" text-anchor="middle" font-size="9.5" fill="#ef4444" font-weight="600">Cross-space mappings</text>

      <!-- Selective projection arrows: Input 1 to Blend -->
      <path d="M 180 385 C 180 420, 310 420, 330 450" fill="none" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowBlue)"/>
      <text x="200" y="430" font-size="9.5" fill="#2563eb" font-weight="600">Selective</text>
      <text x="200" y="442" font-size="9.5" fill="#2563eb" font-weight="600">projection</text>

      <!-- Selective projection arrows: Input 2 to Blend -->
      <path d="M 640 385 C 640 420, 510 420, 490 450" fill="none" stroke="#d97706" stroke-width="2" marker-end="url(#arrowAmber)"/>
      <text x="575" y="430" font-size="9.5" fill="#d97706" font-weight="600">Selective</text>
      <text x="575" y="442" font-size="9.5" fill="#d97706" font-weight="600">projection</text>

      <!-- Arrow markers -->
      <defs>
        <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#2563eb"/>
        </marker>
        <marker id="arrowAmber" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#d97706"/>
        </marker>
      </defs>
    </svg>
  </div>
  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background:#f3e8ff; border-color:#7c3aed;"></div> Generic Space</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#dbeafe; border-color:#2563eb;"></div> Input Space 1</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#fef3c7; border-color:#d97706;"></div> Input Space 2</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#dcfce7; border-color:#16a34a;"></div> Blended Space</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#fff; border: 2px dashed #ef4444;"></div> Cross-space mappings</div>
  </div>
  <figcaption>
    <strong>Figure 1: The Four-Space Model of Conceptual Blending</strong>
    <span>Every conceptual integration network requires at minimum four mental spaces. The Generic Space (top) captures the abstract structure shared by both inputs. Input Space 1 and Input Space 2 contribute distinct frames -- here, Surgery and Butchery. Cross-space mappings (dashed red lines) connect counterpart elements. Selective projection (arrows) carries partial structure from each input into the Blended Space, where emergent meaning arises -- "incompetence" exists in neither input alone but emerges from the clash between the surgeon's goal and the butcher's methods. Based on Fauconnier and Turner (2002).</span>
  </figcaption>
</figure>
</body>
</html>
