<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Number System: Chinese Perfect Transparency vs. English Irregularity</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --accent: #2563eb;
    --regular: #22c55e; --regular-bg: #dcfce7;
    --irreg: #ef4444; --irreg-bg: #fef2f2;
    --chinese: #e67e22; --chinese-bg: #fef3e2;
    --english: #6366f1; --english-bg: #e8e8ff;
    --muted: #6c757d; --caption-bg: #f8f9fa;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a; --fg: #e8e8f0; --surface: #1a1a2e; --border: #2d2d44;
      --accent: #6b8aff;
      --regular: #4ade80; --regular-bg: #14532d;
      --irreg: #f87171; --irreg-bg: #3b1a1a;
      --chinese: #f59e0b; --chinese-bg: #4a3520;
      --english: #818cf8; --english-bg: #2e2e5a;
      --muted: #9a9ab0; --caption-bg: #1a1a2e;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg); color: var(--fg);
    display: flex; justify-content: center; padding: 2rem 1rem; line-height: 1.6;
  }
  figure { max-width: 1000px; width: 100%; }
  .diagram-container {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 2rem 1.5rem; overflow-x: auto;
  }
  .title { text-align: center; font-size: 1.1rem; font-weight: 700; color: var(--accent); margin-bottom: 1.5rem; }
  .num-table {
    width: 100%; border-collapse: collapse;
    border: 2px solid var(--border); border-radius: 8px; overflow: hidden;
    margin-bottom: 1.5rem;
  }
  .num-table th {
    padding: 0.5rem; font-size: 0.82rem; text-align: center;
    border-bottom: 2px solid var(--border);
  }
  .th-num { background: var(--surface); color: var(--muted); width: 60px; }
  .th-zh { background: var(--chinese-bg); color: var(--chinese); }
  .th-en { background: var(--english-bg); color: var(--english); }
  .th-status { background: var(--surface); color: var(--muted); width: 100px; }
  .num-table td {
    padding: 0.35rem 0.5rem; font-size: 0.85rem; text-align: center;
    border-bottom: 1px solid var(--border); background: var(--bg);
  }
  .num-table tr:last-child td { border-bottom: none; }
  .zh-cell { font-weight: 600; }
  .zh-decomp { font-size: 0.72rem; color: var(--muted); display: block; }
  .en-regular { color: var(--regular); }
  .en-irreg { color: var(--irreg); font-weight: 700; }
  .status-ok { color: var(--regular); font-weight: 700; font-size: 0.78rem; }
  .status-bad { color: var(--irreg); font-weight: 700; font-size: 0.78rem; }
  .zone-row td { background: var(--irreg-bg) !important; }
  /* Zone labels */
  .zone-label {
    padding: 0.3rem 0.6rem; background: var(--irreg);
    color: white; font-size: 0.75rem; font-weight: 700;
    text-align: center; border-radius: 3px;
  }
  /* Summary */
  .summary {
    display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;
    margin-top: 1rem;
  }
  .sum-panel {
    padding: 0.8rem 1rem; border-radius: 8px; border: 2px solid;
  }
  .sum-zh { background: var(--chinese-bg); border-color: var(--chinese); }
  .sum-en { background: var(--english-bg); border-color: var(--english); }
  .sum-panel h4 { font-size: 0.9rem; margin-bottom: 0.3rem; }
  .sum-zh h4 { color: var(--chinese); }
  .sum-en h4 { color: var(--english); }
  .sum-panel p { font-size: 0.85rem; }
  .sum-stat {
    font-size: 1.3rem; font-weight: 700; text-align: center;
    margin: 0.3rem 0;
  }
  .sum-zh .sum-stat { color: var(--regular); }
  .sum-en .sum-stat { color: var(--irreg); }
  figcaption {
    text-align: center; margin-top: 1.5rem; padding: 1rem 1.5rem;
    background: var(--caption-bg); border-radius: 8px; border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
</style>
</head>
<body>
<figure>
  <div class="diagram-container">
    <div class="title">Number Names: Chinese Perfect Regularity vs. English Three Irregularity Zones</div>

    <table class="num-table">
      <tr>
        <th class="th-num">#</th>
        <th class="th-zh">Chinese</th>
        <th class="th-en">English</th>
        <th class="th-status">Pattern?</th>
      </tr>
      <tr><td>1-10</td><td class="zh-cell">一 二 三 ... 十<span class="zh-decomp">10 unique digit words</span></td><td>one two three ... ten</td><td class="status-ok">Both: learn 10 words</td></tr>
      <tr class="zone-row"><td>11</td><td class="zh-cell">十一<span class="zh-decomp">ten-one</span></td><td class="en-irreg">"eleven"</td><td><span class="zone-label">OPAQUE</span></td></tr>
      <tr class="zone-row"><td>12</td><td class="zh-cell">十二<span class="zh-decomp">ten-two</span></td><td class="en-irreg">"twelve"</td><td><span class="zone-label">OPAQUE</span></td></tr>
      <tr class="zone-row"><td>13</td><td class="zh-cell">十三<span class="zh-decomp">ten-three</span></td><td class="en-irreg">"thirteen"</td><td class="status-bad">REVERSED + irregular</td></tr>
      <tr class="zone-row"><td>15</td><td class="zh-cell">十五<span class="zh-decomp">ten-five</span></td><td class="en-irreg">"fifteen"</td><td class="status-bad">not "fiveteen"</td></tr>
      <tr class="zone-row"><td>19</td><td class="zh-cell">十九<span class="zh-decomp">ten-nine</span></td><td>"nineteen"</td><td class="status-bad">reversed order</td></tr>
      <tr class="zone-row"><td>20</td><td class="zh-cell">二十<span class="zh-decomp">two-ten</span></td><td class="en-irreg">"twenty"</td><td class="status-bad">not "twoty"</td></tr>
      <tr><td>21</td><td class="zh-cell">二十一<span class="zh-decomp">two-ten-one</span></td><td class="en-regular">"twenty-one"</td><td class="status-ok">FINALLY regular!</td></tr>
      <tr><td>62</td><td class="zh-cell">六十二<span class="zh-decomp">six-ten-two</span></td><td class="en-regular">"sixty-two"</td><td class="status-ok">Both regular</td></tr>
      <tr><td>111</td><td class="zh-cell">一百一十一<span class="zh-decomp">one-hundred-one-ten-one</span></td><td>"one hundred eleven"</td><td class="status-ok">Both regular</td></tr>
      <tr><td>3,456</td><td class="zh-cell">三千四百五十六<span class="zh-decomp">three-thousand-four-hundred-five-ten-six</span></td><td>"three thousand four hundred fifty-six"</td><td class="status-ok">Both regular</td></tr>
    </table>

    <div class="summary">
      <div class="sum-panel sum-zh">
        <h4>Chinese Number System</h4>
        <div class="sum-stat">11 words + 1 rule = count to 99</div>
        <p>Learn digits 0-10 plus multiplier words (百, 千, 万). The pattern is <b>perfectly compositional</b> from 11 onward. Every number name explicitly states its base-10 decomposition: 62 = "six-ten-two" -- you can HEAR the math.</p>
      </div>
      <div class="sum-panel sum-en">
        <h4>English Number System</h4>
        <div class="sum-stat">~28 unique forms before regularity</div>
        <p><b>Three irregularity zones:</b> (1) "eleven"/"twelve" are completely opaque; (2) "-teen" numbers reverse digit order and use irregular forms; (3) "-ty" numbers use modified forms ("twenty" not "twoty"). A child must memorize ~20 irregular names before the pattern becomes fully regular at 21.</p>
      </div>
    </div>
  </div>

  <figcaption>
    <h2>Number System Transparency: A Pattern Learner's Comparison</h2>
    <p>Chinese numbers are perfectly regular from 11 onward: 十一 = "ten-one" = 11. English has three zones of irregularity (11-12 opaque, 13-19 reversed, 20-90 irregular forms) before reaching full regularity at 21. Research shows this transparency correlates with earlier base-10 understanding and fewer counting errors in Chinese-speaking children.</p>
  </figcaption>
</figure>
</body>
</html>
