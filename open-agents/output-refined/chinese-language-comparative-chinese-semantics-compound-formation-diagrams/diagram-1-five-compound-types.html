<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Five Compound Types: Chinese Word Formation Patterns</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --accent: #2563eb;
    --coord: #8b5cf6; --coord-bg: #ede9fe;
    --modh: #e67e22; --modh-bg: #fef3e2;
    --vo: #2563eb; --vo-bg: #dbeafe;
    --vr: #ef4444; --vr-bg: #fef2f2;
    --sp: #059669; --sp-bg: #d1fae5;
    --muted: #6c757d; --caption-bg: #f8f9fa; --english: #6366f1;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a; --fg: #e8e8f0; --surface: #1a1a2e; --border: #2d2d44;
      --accent: #6b8aff;
      --coord: #a78bfa; --coord-bg: #2e2050;
      --modh: #f59e0b; --modh-bg: #4a3520;
      --vo: #6b8aff; --vo-bg: #1e2a4a;
      --vr: #f87171; --vr-bg: #3b1a1a;
      --sp: #34d399; --sp-bg: #14352d;
      --muted: #9a9ab0; --caption-bg: #1a1a2e; --english: #818cf8;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg); color: var(--fg);
    display: flex; justify-content: center; padding: 2rem 1rem; line-height: 1.6;
  }
  figure { max-width: 1100px; width: 100%; }
  .diagram-container {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 2rem 1.5rem; overflow-x: auto;
  }
  .title { text-align: center; font-size: 1.1rem; font-weight: 700; color: var(--accent); margin-bottom: 0.3rem; }
  .subtitle { text-align: center; font-size: 0.85rem; color: var(--muted); margin-bottom: 1.5rem; }
  .types-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 0.6rem; }
  .type-card { border-radius: 8px; padding: 0.8rem; border: 2px solid; }
  .tc-coord { background: var(--coord-bg); border-color: var(--coord); }
  .tc-modh { background: var(--modh-bg); border-color: var(--modh); }
  .tc-vo { background: var(--vo-bg); border-color: var(--vo); }
  .tc-vr { background: var(--vr-bg); border-color: var(--vr); }
  .tc-sp { background: var(--sp-bg); border-color: var(--sp); }
  .type-num { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; }
  .tc-coord .type-num { color: var(--coord); }
  .tc-modh .type-num { color: var(--modh); }
  .tc-vo .type-num { color: var(--vo); }
  .tc-vr .type-num { color: var(--vr); }
  .tc-sp .type-num { color: var(--sp); }
  .type-name { font-size: 0.9rem; font-weight: 700; margin-bottom: 0.1rem; }
  .tc-coord .type-name { color: var(--coord); }
  .tc-modh .type-name { color: var(--modh); }
  .tc-vo .type-name { color: var(--vo); }
  .tc-vr .type-name { color: var(--vr); }
  .tc-sp .type-name { color: var(--sp); }
  .type-zh { font-size: 0.78rem; color: var(--muted); margin-bottom: 0.3rem; }
  .type-formula {
    font-size: 0.82rem; font-weight: 700; padding: 0.2rem 0.4rem;
    background: var(--bg); border-radius: 4px; border: 1px solid var(--border);
    text-align: center; margin-bottom: 0.5rem;
  }
  .ex-item {
    background: var(--bg); border: 1px solid var(--border); border-radius: 4px;
    padding: 0.35rem 0.45rem; margin-bottom: 0.3rem; font-size: 0.8rem;
  }
  .ex-item .zh { font-weight: 700; font-size: 0.95rem; }
  .ex-item .decomp { color: var(--muted); font-size: 0.75rem; }
  .ex-item .meaning { font-size: 0.78rem; }
  .type-en {
    font-size: 0.72rem; color: var(--english); margin-top: 0.4rem;
    padding-top: 0.3rem; border-top: 1px dashed var(--border); font-style: italic;
  }
  .freq-note {
    margin-top: 1rem; padding: 0.8rem 1rem;
    background: var(--modh-bg); border: 2px solid var(--modh);
    border-radius: 6px; font-size: 0.85rem; text-align: center;
  }
  .freq-note strong { color: var(--modh); }
  .en-compare {
    margin-top: 1rem; padding: 0.8rem 1rem;
    background: color-mix(in srgb, var(--english) 8%, var(--bg));
    border: 1px solid var(--english); border-radius: 6px; font-size: 0.85rem;
  }
  .en-compare h4 { color: var(--english); font-size: 0.9rem; margin-bottom: 0.3rem; }
  figcaption {
    text-align: center; margin-top: 1.5rem; padding: 1rem 1.5rem;
    background: var(--caption-bg); border-radius: 8px; border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  .legend {
    display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap;
    margin-top: 1rem; font-size: 0.78rem; color: var(--muted);
  }
  .legend-item { display: flex; align-items: center; gap: 0.3rem; }
  .legend-swatch { width: 12px; height: 12px; border-radius: 2px; }
</style>
</head>
<body>
<figure>
  <div class="diagram-container">
    <div class="title">The Five Compound Types: How Chinese Builds Words</div>
    <div class="subtitle">70-80% of Chinese vocabulary is built through these five systematic patterns</div>

    <div class="types-grid">
      <!-- 1. Coordinate -->
      <div class="type-card tc-coord">
        <div class="type-num">Type 1</div>
        <div class="type-name">Coordinate</div>
        <div class="type-zh">联合式 lianheshi</div>
        <div class="type-formula">A + B (equals)</div>
        <div class="ex-item">
          <div class="zh">语言</div>
          <div class="decomp">语 speech + 言 words</div>
          <div class="meaning">= language</div>
        </div>
        <div class="ex-item">
          <div class="zh">国家</div>
          <div class="decomp">国 state + 家 family</div>
          <div class="meaning">= country</div>
        </div>
        <div class="ex-item">
          <div class="zh">道路</div>
          <div class="decomp">道 way + 路 road</div>
          <div class="meaning">= road/path</div>
        </div>
        <div class="type-en">English: "bittersweet" (bitter+sweet)</div>
      </div>

      <!-- 2. Modifier-Head -->
      <div class="type-card tc-modh">
        <div class="type-num">Type 2 -- Most Productive</div>
        <div class="type-name">Modifier-Head</div>
        <div class="type-zh">偏正式 pianzhengshi</div>
        <div class="type-formula">Modifier + Head</div>
        <div class="ex-item">
          <div class="zh">电脑</div>
          <div class="decomp">电 electric + 脑 brain</div>
          <div class="meaning">= computer</div>
        </div>
        <div class="ex-item">
          <div class="zh">火车</div>
          <div class="decomp">火 fire + 车 vehicle</div>
          <div class="meaning">= train</div>
        </div>
        <div class="ex-item">
          <div class="zh">大学</div>
          <div class="decomp">大 big + 学 study</div>
          <div class="meaning">= university</div>
        </div>
        <div class="type-en">English: "sunflower," "blackboard"</div>
      </div>

      <!-- 3. Verb-Object -->
      <div class="type-card tc-vo">
        <div class="type-num">Type 3</div>
        <div class="type-name">Verb-Object</div>
        <div class="type-zh">动宾式 dongbinshi</div>
        <div class="type-formula">Verb + Object</div>
        <div class="ex-item">
          <div class="zh">吃饭</div>
          <div class="decomp">吃 eat + 饭 rice/food</div>
          <div class="meaning">= eat a meal</div>
        </div>
        <div class="ex-item">
          <div class="zh">唱歌</div>
          <div class="decomp">唱 sing + 歌 song</div>
          <div class="meaning">= sing</div>
        </div>
        <div class="ex-item">
          <div class="zh">放心</div>
          <div class="decomp">放 release + 心 heart</div>
          <div class="meaning">= relax / don't worry</div>
        </div>
        <div class="type-en">English: "babysit" (baby+sit)</div>
      </div>

      <!-- 4. Verb-Result -->
      <div class="type-card tc-vr">
        <div class="type-num">Type 4</div>
        <div class="type-name">Verb-Result</div>
        <div class="type-zh">动补式 dongbushi</div>
        <div class="type-formula">Action + Outcome</div>
        <div class="ex-item">
          <div class="zh">提高</div>
          <div class="decomp">提 lift + 高 high</div>
          <div class="meaning">= improve/raise</div>
        </div>
        <div class="ex-item">
          <div class="zh">看见</div>
          <div class="decomp">看 look + 见 perceive</div>
          <div class="meaning">= see</div>
        </div>
        <div class="ex-item">
          <div class="zh">打破</div>
          <div class="decomp">打 hit + 破 broken</div>
          <div class="meaning">= break</div>
        </div>
        <div class="type-en">English: no common pattern</div>
      </div>

      <!-- 5. Subject-Predicate -->
      <div class="type-card tc-sp">
        <div class="type-num">Type 5</div>
        <div class="type-name">Subject-Predicate</div>
        <div class="type-zh">主谓式 zhuweidhi</div>
        <div class="type-formula">Subject + Predicate</div>
        <div class="ex-item">
          <div class="zh">地震</div>
          <div class="decomp">地 earth + 震 shake</div>
          <div class="meaning">= earthquake</div>
        </div>
        <div class="ex-item">
          <div class="zh">头疼</div>
          <div class="decomp">头 head + 疼 ache</div>
          <div class="meaning">= headache</div>
        </div>
        <div class="ex-item">
          <div class="zh">年轻</div>
          <div class="decomp">年 year + 轻 light/few</div>
          <div class="meaning">= young</div>
        </div>
        <div class="type-en">English: "earthquake" (earth+quake) -- rare match!</div>
      </div>
    </div>

    <div class="freq-note">
      <strong>Modifier-Head</strong> is the most productive type -- nearly all modern technical coinages use it. 电 (electric) + X generates an entire technology vocabulary. These are not historical fossils; new compounds are being coined today using these exact patterns.
    </div>

    <div class="en-compare">
      <h4>English Comparison: Why Chinese Compounds Are Different</h4>
      <p>English HAS compound words ("sunflower," "blackboard," "airport"). But English compounds are a <b>fraction</b> of the total vocabulary. Most English technical/abstract words are borrowed from Latin, French, or Greek: "telephone" (Greek), "computer" (Latin), "university" (Latin). A 10-year-old English speaker cannot decompose "computer." A 10-year-old Chinese speaker CAN decompose 电脑 into 电 (electric) + 脑 (brain). Chinese compounds use <b>everyday morphemes</b>; English compounds at the learned level use <b>fossilized classical roots</b>.</p>
    </div>

    <div class="legend">
      <div class="legend-item"><div class="legend-swatch" style="background:var(--coord);"></div> Coordinate (A+B equal)</div>
      <div class="legend-item"><div class="legend-swatch" style="background:var(--modh);"></div> Modifier-Head (most productive)</div>
      <div class="legend-item"><div class="legend-swatch" style="background:var(--vo);"></div> Verb-Object</div>
      <div class="legend-item"><div class="legend-swatch" style="background:var(--vr);"></div> Verb-Result</div>
      <div class="legend-item"><div class="legend-swatch" style="background:var(--sp);"></div> Subject-Predicate</div>
    </div>
  </div>

  <figcaption>
    <h2>The Five Compound Types: How Chinese Builds Its Vocabulary</h2>
    <p>Chinese vocabulary is built through five systematic compound patterns: Coordinate (synonyms joined), Modifier-Head (type specified), Verb-Object (action + target), Verb-Result (action + outcome), and Subject-Predicate (mini-sentence frozen as word). Modifier-Head dominates modern coinages. All five use everyday morphemes that speakers already know.</p>
  </figcaption>
</figure>
</body>
</html>
