<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Active and Passive Participle Patterns Across All Forms</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --accent: #4361ee;
    --accent-light: #e8edff;
    --active: #2d8a4e;
    --active-bg: #f0faf0;
    --passive: #7c3aed;
    --passive-bg: #f5f0ff;
    --vowel-i: #e63946;
    --vowel-a: #0077b6;
    --english: #0077b6;
    --english-bg: #e8f4f8;
    --familiar: #d4770b;
    --familiar-bg: #fdf6ec;
    --muted: #6c757d;
    --caption-bg: #f8f9fa;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --accent: #6b8aff;
      --accent-light: #1e2a4a;
      --active: #5cb87a;
      --active-bg: #102a18;
      --passive: #a78bfa;
      --passive-bg: #1a1030;
      --vowel-i: #ff6b6b;
      --vowel-a: #5dade2;
      --english: #5dade2;
      --english-bg: #102030;
      --familiar: #f0c050;
      --familiar-bg: #2a2210;
      --muted: #9a9ab0;
      --caption-bg: #1a1a2e;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure { max-width: 1000px; width: 100%; }
  .chart-wrapper {
    overflow-x: auto;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--surface);
    padding: 1.5rem;
  }
  .section-title {
    font-size: 1rem;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 0.8rem;
    padding-bottom: 0.3rem;
    border-bottom: 2px solid var(--accent);
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding: 1rem 1.5rem;
    background: var(--caption-bg);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }

  .ptable {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.82rem;
  }
  .ptable th, .ptable td {
    padding: 0.5rem 0.6rem;
    border: 1px solid var(--border);
    text-align: center;
    vertical-align: middle;
  }
  .ptable th {
    background: var(--accent-light);
    color: var(--accent);
    font-weight: 700;
  }
  .col-active { background: var(--active-bg); }
  .col-passive { background: var(--passive-bg); }
  .head-active { background: var(--active-bg) !important; color: var(--active) !important; }
  .head-passive { background: var(--passive-bg) !important; color: var(--passive) !important; }

  .arabic-text {
    font-family: 'Traditional Arabic', 'Scheherazade', serif;
    font-size: 1rem;
    direction: rtl;
  }
  .pattern-mono {
    font-family: monospace;
    font-size: 0.85rem;
    font-weight: 700;
  }
  .vowel-highlight-i { color: var(--vowel-i); font-weight: 900; font-size: 1.1em; }
  .vowel-highlight-a { color: var(--vowel-a); font-weight: 900; font-size: 1.1em; }

  .key-rule {
    margin: 1rem 0;
    padding: 1rem;
    border: 3px solid var(--accent);
    border-radius: 10px;
    background: var(--accent-light);
    text-align: center;
  }
  .key-rule .rule-title { font-weight: 700; color: var(--accent); margin-bottom: 0.3rem; text-transform: uppercase; font-size: 0.8rem; }
  .key-rule .rule-text { font-size: 1rem; font-weight: 600; }

  .familiar-box {
    margin: 1rem 0;
    padding: 0.8rem 1rem;
    background: var(--familiar-bg);
    border: 2px solid var(--familiar);
    border-radius: 8px;
  }
  .familiar-box .fam-title { color: var(--familiar); font-weight: 700; font-size: 0.9rem; margin-bottom: 0.4rem; }
  .familiar-item {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin: 0.3rem 0;
    font-size: 0.82rem;
  }
  .familiar-item .arabic-text { font-size: 1.1rem; }

  .english-compare {
    margin-top: 1.2rem;
    padding: 0.8rem 1rem;
    background: var(--english-bg);
    border-radius: 8px;
    border-left: 4px solid var(--english);
    font-size: 0.85rem;
  }
  .english-compare strong { color: var(--english); }
  .pattern-note {
    margin-top: 1rem;
    padding: 0.8rem 1rem;
    background: var(--accent-light);
    border-radius: 8px;
    border-left: 4px solid var(--accent);
    font-size: 0.85rem;
  }
  .pattern-note strong { color: var(--accent); }
</style>
</head>
<body>
<figure>
  <div class="chart-wrapper">
    <div class="section-title">Active and Passive Participle Patterns Across All Forms</div>

    <div class="key-rule">
      <div class="rule-title">The One Rule for Forms II-X</div>
      <div class="rule-text">
        Active participle: mu- prefix + <span class="vowel-highlight-i">-i-</span> before last consonant<br>
        Passive participle: mu- prefix + <span class="vowel-highlight-a">-a-</span> before last consonant<br>
        <span style="font-size:0.85rem;color:var(--muted);">The ONLY difference is one vowel: <span class="vowel-highlight-i">i</span> (active) vs. <span class="vowel-highlight-a">a</span> (passive)</span>
      </div>
    </div>

    <table class="ptable">
      <thead>
        <tr>
          <th>Form</th>
          <th class="head-active">Active Participle</th>
          <th class="head-active">Active Example</th>
          <th class="head-passive">Passive Participle</th>
          <th class="head-passive">Passive Example</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td style="font-weight:900;">I</td>
          <td class="col-active"><span class="pattern-mono">fa'<span class="vowel-highlight-i">i</span>l</span><br><span class="arabic-text">فاعِل</span></td>
          <td class="col-active"><span class="arabic-text">كاتِب</span> <em>katib</em> "writer"</td>
          <td class="col-passive"><span class="pattern-mono">maf'<span class="vowel-highlight-a">u</span>l</span><br><span class="arabic-text">مَفْعول</span></td>
          <td class="col-passive"><span class="arabic-text">مَكْتوب</span> <em>maktub</em> "written"</td>
        </tr>
        <tr>
          <td style="font-weight:900;">II</td>
          <td class="col-active"><span class="pattern-mono">mufa''<span class="vowel-highlight-i">i</span>l</span><br><span class="arabic-text">مُفَعِّل</span></td>
          <td class="col-active"><span class="arabic-text">مُعَلِّم</span> <em>mu'allim</em> "teacher"</td>
          <td class="col-passive"><span class="pattern-mono">mufa''<span class="vowel-highlight-a">a</span>l</span><br><span class="arabic-text">مُفَعَّل</span></td>
          <td class="col-passive"><span class="arabic-text">مُعَلَّم</span> <em>mu'allam</em> "taught"</td>
        </tr>
        <tr>
          <td style="font-weight:900;">III</td>
          <td class="col-active"><span class="pattern-mono">mufa'<span class="vowel-highlight-i">i</span>l</span><br><span class="arabic-text">مُفاعِل</span></td>
          <td class="col-active"><span class="arabic-text">مُقاتِل</span> <em>muqatil</em> "fighter"</td>
          <td class="col-passive"><span class="pattern-mono">mufa'<span class="vowel-highlight-a">a</span>l</span><br><span class="arabic-text">مُفاعَل</span></td>
          <td class="col-passive"><span class="arabic-text">مُقاتَل</span> <em>muqatal</em> "fought against"</td>
        </tr>
        <tr>
          <td style="font-weight:900;">IV</td>
          <td class="col-active"><span class="pattern-mono">muf'<span class="vowel-highlight-i">i</span>l</span><br><span class="arabic-text">مُفْعِل</span></td>
          <td class="col-active"><span class="arabic-text">مُسْلِم</span> <em>muslim</em> "submitter"</td>
          <td class="col-passive"><span class="pattern-mono">muf'<span class="vowel-highlight-a">a</span>l</span><br><span class="arabic-text">مُفْعَل</span></td>
          <td class="col-passive"><span class="arabic-text">مُسْلَم</span> <em>muslam</em> "surrendered"</td>
        </tr>
        <tr>
          <td style="font-weight:900;">V</td>
          <td class="col-active"><span class="pattern-mono">mutafa''<span class="vowel-highlight-i">i</span>l</span><br><span class="arabic-text">مُتَفَعِّل</span></td>
          <td class="col-active"><span class="arabic-text">مُتَعَلِّم</span> <em>muta'allim</em> "learner"</td>
          <td class="col-passive"><span class="pattern-mono">mutafa''<span class="vowel-highlight-a">a</span>l</span><br><span class="arabic-text">مُتَفَعَّل</span></td>
          <td class="col-passive"><span class="arabic-text">مُتَعَلَّم</span> <em>muta'allam</em> "learned (thing)"</td>
        </tr>
        <tr>
          <td style="font-weight:900;">X</td>
          <td class="col-active"><span class="pattern-mono">mustaf'<span class="vowel-highlight-i">i</span>l</span><br><span class="arabic-text">مُسْتَفْعِل</span></td>
          <td class="col-active"><span class="arabic-text">مُسْتَعْمِل</span> <em>musta'mil</em> "user"</td>
          <td class="col-passive"><span class="pattern-mono">mustaf'<span class="vowel-highlight-a">a</span>l</span><br><span class="arabic-text">مُسْتَفْعَل</span></td>
          <td class="col-passive"><span class="arabic-text">مُسْتَعْمَل</span> <em>musta'mal</em> "used"</td>
        </tr>
      </tbody>
    </table>

    <div class="familiar-box">
      <div class="fam-title">Arabic Words You Already Know -- Decoded as Participles</div>
      <div class="familiar-item"><span class="arabic-text">مُسْلِم</span> <strong>muslim</strong> = Form IV active participle of s-l-m = "one who submits"</div>
      <div class="familiar-item"><span class="arabic-text">مُعَلِّم</span> <strong>mu'allim</strong> = Form II active participle of '-l-m = "one who teaches" = teacher</div>
      <div class="familiar-item"><span class="arabic-text">مَكْتوب</span> <strong>maktub</strong> = Form I passive participle of k-t-b = "that which is written" = fate/letter</div>
      <div class="familiar-item"><span class="arabic-text">مُتَعَلِّم</span> <strong>muta'allim</strong> = Form V active participle of '-l-m = "one who learns" = learner/student</div>
    </div>

    <div class="english-compare">
      <strong>English comparison:</strong> English has two participle forms: -ing (writing) and -ed/-en (written). They look completely different from each other. Arabic participles for Forms II-X differ by a <em>single vowel</em> (-i- vs. -a-). Arabic's system is far more regular -- learn the mu- prefix rule and you can form 18 participles (active + passive for 9 forms).
    </div>

    <div class="pattern-note">
      <strong>The pattern:</strong> Form I has its own participle templates (fa'il / maf'ul). But for <strong>every other form</strong> (II through X), the participle rule is mechanical: prefix mu-, keep the form's consonant pattern, insert -<span class="vowel-highlight-i">i</span>- for active or -<span class="vowel-highlight-a">a</span>- for passive before the last root consonant. One rule, nine forms, eighteen participles.
    </div>
  </div>

  <figcaption>
    <h2>Figure 4 &mdash; Active and Passive Participle Patterns</h2>
    <p>Every Arabic verb form produces two participles. For Forms II-X, the pattern is perfectly regular: mu- prefix, with -i- (active, "the doer") or -a- (passive, "the done-to") as the only difference. Familiar Arabic words like muslim, mu'allim, and maktub are participles decoded.</p>
  </figcaption>
</figure>
</body>
