<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Ten Arabic Verb Forms -- Pattern Shapes and Semantic Functions</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --accent: #4361ee;
    --accent-light: #e8edff;
    --basic: #6c757d;
    --basic-bg: #f0f0f5;
    --causative: #e63946;
    --causative-bg: #fef3f0;
    --reflexive: #2d8a4e;
    --reflexive-bg: #f0faf0;
    --reciprocal: #7c3aed;
    --reciprocal-bg: #f5f0ff;
    --seeking: #d4770b;
    --seeking-bg: #fdf6ec;
    --special: #0077b6;
    --special-bg: #e8f4f8;
    --muted: #6c757d;
    --caption-bg: #f8f9fa;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --accent: #6b8aff;
      --accent-light: #1e2a4a;
      --basic: #888;
      --basic-bg: #1e1e30;
      --causative: #ff6b6b;
      --causative-bg: #2a1520;
      --reflexive: #5cb87a;
      --reflexive-bg: #102a18;
      --reciprocal: #a78bfa;
      --reciprocal-bg: #1a1030;
      --seeking: #f0c050;
      --seeking-bg: #2a2210;
      --special: #5dade2;
      --special-bg: #102030;
      --muted: #9a9ab0;
      --caption-bg: #1a1a2e;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure { max-width: 1100px; width: 100%; }
  .chart-wrapper {
    overflow-x: auto;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--surface);
    padding: 1.5rem;
  }
  .section-title {
    font-size: 1rem;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 0.8rem;
    padding-bottom: 0.3rem;
    border-bottom: 2px solid var(--accent);
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding: 1rem 1.5rem;
    background: var(--caption-bg);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }

  .forms-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.8rem;
  }
  .forms-table th, .forms-table td {
    padding: 0.5rem 0.6rem;
    border: 1px solid var(--border);
    vertical-align: middle;
  }
  .forms-table th {
    background: var(--accent-light);
    color: var(--accent);
    font-weight: 700;
    text-align: center;
    font-size: 0.78rem;
  }
  .form-num {
    font-weight: 900;
    font-size: 1rem;
    text-align: center;
    width: 40px;
  }
  .form-pattern {
    font-family: monospace;
    font-size: 0.9rem;
    font-weight: 700;
    text-align: center;
  }
  .form-arabic {
    font-family: 'Traditional Arabic', 'Scheherazade', serif;
    font-size: 1rem;
    direction: rtl;
    text-align: center;
  }
  .form-semantic {
    font-weight: 600;
    font-size: 0.78rem;
  }
  .form-example {
    font-size: 0.75rem;
  }
  .form-morph {
    font-size: 0.72rem;
    color: var(--muted);
  }

  /* Semantic color coding */
  .sem-basic { color: var(--basic); }
  .sem-causative { color: var(--causative); }
  .sem-reflexive { color: var(--reflexive); }
  .sem-reciprocal { color: var(--reciprocal); }
  .sem-seeking { color: var(--seeking); }
  .sem-special { color: var(--special); }

  .bg-basic { background: var(--basic-bg); }
  .bg-causative { background: var(--causative-bg); }
  .bg-reflexive { background: var(--reflexive-bg); }
  .bg-reciprocal { background: var(--reciprocal-bg); }
  .bg-seeking { background: var(--seeking-bg); }
  .bg-special { background: var(--special-bg); }

  .derive-arrow {
    font-size: 0.7rem;
    color: var(--accent);
    text-align: center;
    padding: 0.1rem;
  }

  /* Legend */
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 0.8rem;
    margin: 1rem 0;
    font-size: 0.78rem;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.3rem;
  }
  .legend-dot {
    width: 12px;
    height: 12px;
    border-radius: 3px;
  }

  .pattern-note {
    margin-top: 1rem;
    padding: 0.8rem 1rem;
    background: var(--accent-light);
    border-radius: 8px;
    border-left: 4px solid var(--accent);
    font-size: 0.85rem;
  }
  .pattern-note strong { color: var(--accent); }
</style>
</head>
<body>
<figure>
  <div class="chart-wrapper">
    <div class="section-title">The Ten Verb Forms -- Templates with Predictable Semantics</div>

    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--basic);"></div> Basic</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--causative);"></div> Causative/Intensive</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--reciprocal);"></div> Reciprocal</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--reflexive);"></div> Reflexive</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--special);"></div> Passive/Special</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--seeking);"></div> Seeking/Considering</div>
    </div>

    <table class="forms-table">
      <thead>
        <tr>
          <th>Form</th>
          <th>Pattern (f-'-l)</th>
          <th>Arabic</th>
          <th>Morphological Key</th>
          <th>Semantic Function</th>
          <th>Example (root '-l-m)</th>
          <th>Derived From</th>
        </tr>
      </thead>
      <tbody>
        <tr class="bg-basic">
          <td class="form-num sem-basic">I</td>
          <td class="form-pattern">fa'ala</td>
          <td class="form-arabic">فَعَلَ</td>
          <td class="form-morph">Base template</td>
          <td class="form-semantic sem-basic">Basic action</td>
          <td class="form-example"><em>'alima</em> = "he knew"</td>
          <td class="form-morph">--</td>
        </tr>
        <tr class="bg-causative">
          <td class="form-num sem-causative">II</td>
          <td class="form-pattern">fa''ala</td>
          <td class="form-arabic">فَعَّلَ</td>
          <td class="form-morph">Doubled middle consonant</td>
          <td class="form-semantic sem-causative">Intensive / Causative</td>
          <td class="form-example"><em>'allama</em> = "he taught"</td>
          <td class="form-morph">Form I + doubling</td>
        </tr>
        <tr class="bg-reciprocal">
          <td class="form-num sem-reciprocal">III</td>
          <td class="form-pattern">fa'ala</td>
          <td class="form-arabic">فاعَلَ</td>
          <td class="form-morph">Long vowel after C1</td>
          <td class="form-semantic sem-reciprocal">Reciprocal / With someone</td>
          <td class="form-example"><em>'alama</em> = "dealt knowledgeably with"</td>
          <td class="form-morph">Form I + long a</td>
        </tr>
        <tr class="bg-causative">
          <td class="form-num sem-causative">IV</td>
          <td class="form-pattern">'af'ala</td>
          <td class="form-arabic">أَفْعَلَ</td>
          <td class="form-morph">Prefix 'a-</td>
          <td class="form-semantic sem-causative">Causative (transitivizing)</td>
          <td class="form-example"><em>'a'lama</em> = "he informed"</td>
          <td class="form-morph">Form I + prefix</td>
        </tr>
        <tr>
          <td colspan="7" class="derive-arrow">Form V = ta- + Form II (reflexive of causative)</td>
        </tr>
        <tr class="bg-reflexive">
          <td class="form-num sem-reflexive">V</td>
          <td class="form-pattern">tafa''ala</td>
          <td class="form-arabic">تَفَعَّلَ</td>
          <td class="form-morph">ta- prefix + doubled middle</td>
          <td class="form-semantic sem-reflexive">Reflexive of Form II</td>
          <td class="form-example"><em>ta'allama</em> = "he learned"</td>
          <td class="form-morph"><strong>ta- + Form II</strong></td>
        </tr>
        <tr>
          <td colspan="7" class="derive-arrow">Form VI = ta- + Form III (reflexive of reciprocal)</td>
        </tr>
        <tr class="bg-reflexive">
          <td class="form-num sem-reflexive">VI</td>
          <td class="form-pattern">tafa'ala</td>
          <td class="form-arabic">تَفاعَلَ</td>
          <td class="form-morph">ta- prefix + long vowel</td>
          <td class="form-semantic sem-reflexive">Mutual reflexive / Pretending</td>
          <td class="form-example"><em>ta'alama</em> = "pretended to know"</td>
          <td class="form-morph"><strong>ta- + Form III</strong></td>
        </tr>
        <tr class="bg-special">
          <td class="form-num sem-special">VII</td>
          <td class="form-pattern">infa'ala</td>
          <td class="form-arabic">اِنْفَعَلَ</td>
          <td class="form-morph">in- prefix</td>
          <td class="form-semantic sem-special">Passive / Intransitive</td>
          <td class="form-example"><em>inkasara</em> = "it broke"</td>
          <td class="form-morph">Form I + in-</td>
        </tr>
        <tr class="bg-special">
          <td class="form-num sem-special">VIII</td>
          <td class="form-pattern">ifta'ala</td>
          <td class="form-arabic">اِفْتَعَلَ</td>
          <td class="form-morph">Infix -t- after C1 (unique!)</td>
          <td class="form-semantic sem-special">Deliberate / Reflexive</td>
          <td class="form-example"><em>istama'a</em> = "he listened"</td>
          <td class="form-morph">Form I + infix</td>
        </tr>
        <tr class="bg-special">
          <td class="form-num sem-special">IX</td>
          <td class="form-pattern">if'alla</td>
          <td class="form-arabic">اِفْعَلَّ</td>
          <td class="form-morph">Doubled final consonant</td>
          <td class="form-semantic sem-special">Colors + physical defects ONLY</td>
          <td class="form-example"><em>ihmarra</em> = "became red"</td>
          <td class="form-morph">Restricted domain</td>
        </tr>
        <tr class="bg-seeking">
          <td class="form-num sem-seeking">X</td>
          <td class="form-pattern">istaf'ala</td>
          <td class="form-arabic">اِسْتَفْعَلَ</td>
          <td class="form-morph">ista- prefix</td>
          <td class="form-semantic sem-seeking">Seeking / Considering as</td>
          <td class="form-example"><em>ista'lama</em> = "he inquired"</td>
          <td class="form-morph">Form I + ista-</td>
        </tr>
      </tbody>
    </table>

    <div class="pattern-note">
      <strong>The pattern:</strong> The ten forms are not ten arbitrary tables -- they are <strong>ten templates</strong>, each with a predictable phonological shape (doubled consonant, prefix, infix, long vowel) and a predictable semantic modification (causative, reflexive, reciprocal, seeking). Forms V and VI are <em>compositionally derived</em>: V = ta- + Form II, VI = ta- + Form III. Know the building blocks and you can predict the forms.
    </div>
  </div>

  <figcaption>
    <h2>Figure 2 &mdash; The Ten Arabic Verb Forms</h2>
    <p>Every trilateral root can be processed through ten verb forms, each with a predictable phonological template and semantic function. Color-coded by semantic category: basic (gray), causative/intensive (red), reciprocal (purple), reflexive (green), passive/special (blue), seeking (amber). Forms V and VI are derived from Forms II and III by adding the reflexive prefix ta-.</p>
  </figcaption>
</figure>
</body>
</html>
