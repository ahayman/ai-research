<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Know-Teach-Learn Derivational Chain</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --accent: #4361ee;
    --accent-light: #e8edff;
    --form1: #6c757d;
    --form1-bg: #f0f0f5;
    --form2: #e63946;
    --form2-bg: #fef3f0;
    --form5: #2d8a4e;
    --form5-bg: #f0faf0;
    --english: #0077b6;
    --english-bg: #e8f4f8;
    --arrow: #d4770b;
    --muted: #6c757d;
    --caption-bg: #f8f9fa;
    --root-bg: #fef3c7;
    --root-border: #d4770b;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --accent: #6b8aff;
      --accent-light: #1e2a4a;
      --form1: #888;
      --form1-bg: #1e1e30;
      --form2: #ff6b6b;
      --form2-bg: #2a1520;
      --form5: #5cb87a;
      --form5-bg: #102a18;
      --english: #5dade2;
      --english-bg: #102030;
      --arrow: #f0c050;
      --muted: #9a9ab0;
      --caption-bg: #1a1a2e;
      --root-bg: #3a3210;
      --root-border: #f0c050;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure { max-width: 1000px; width: 100%; }
  .chart-wrapper {
    overflow-x: auto;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--surface);
    padding: 1.5rem;
  }
  .section-title {
    font-size: 1rem;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 0.8rem;
    padding-bottom: 0.3rem;
    border-bottom: 2px solid var(--accent);
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding: 1rem 1.5rem;
    background: var(--caption-bg);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }

  /* Root display */
  .root-display {
    text-align: center;
    margin: 1rem 0;
    padding: 0.8rem;
    background: var(--root-bg);
    border: 2px solid var(--root-border);
    border-radius: 10px;
  }
  .root-letters {
    font-family: 'Traditional Arabic', 'Scheherazade', serif;
    font-size: 2rem;
    font-weight: 700;
    color: var(--root-border);
    direction: rtl;
    letter-spacing: 0.3em;
  }
  .root-translit { font-size: 1rem; font-weight: 700; color: var(--arrow); }
  .root-meaning { font-size: 0.85rem; color: var(--muted); }

  /* Chain */
  .chain {
    display: flex;
    align-items: stretch;
    gap: 0;
    margin: 1.5rem 0;
  }
  .chain-step {
    flex: 1;
    text-align: center;
    padding: 1rem;
    border: 3px solid;
    border-radius: 12px;
  }
  .chain-arrow {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 0 0.5rem;
    min-width: 100px;
  }
  .arrow-morph {
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--arrow);
    margin-bottom: 0.2rem;
  }
  .arrow-semantic {
    font-size: 0.72rem;
    color: var(--muted);
  }
  .arrow-glyph {
    font-size: 1.5rem;
    color: var(--arrow);
    font-weight: 700;
  }

  .step-form1 { border-color: var(--form1); background: var(--form1-bg); }
  .step-form2 { border-color: var(--form2); background: var(--form2-bg); }
  .step-form5 { border-color: var(--form5); background: var(--form5-bg); }

  .step-label { font-size: 0.75rem; font-weight: 700; }
  .step-form1 .step-label { color: var(--form1); }
  .step-form2 .step-label { color: var(--form2); }
  .step-form5 .step-label { color: var(--form5); }

  .step-arabic {
    font-family: 'Traditional Arabic', 'Scheherazade', serif;
    font-size: 1.6rem;
    direction: rtl;
    margin: 0.3rem 0;
  }
  .step-translit { font-style: italic; font-size: 0.9rem; }
  .step-meaning { font-size: 1.1rem; font-weight: 900; margin-top: 0.3rem; }
  .step-form1 .step-meaning { color: var(--form1); }
  .step-form2 .step-meaning { color: var(--form2); }
  .step-form5 .step-meaning { color: var(--form5); }

  /* English comparison */
  .english-chain {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    margin: 1rem 0;
    padding: 1rem;
    background: var(--english-bg);
    border: 2px solid var(--english);
    border-radius: 10px;
  }
  .eng-word {
    padding: 0.5rem 1rem;
    border: 2px solid var(--english);
    border-radius: 8px;
    font-weight: 700;
    color: var(--english);
    background: var(--bg);
  }
  .eng-arrow { color: var(--muted); font-size: 1.2rem; }
  .eng-note { font-size: 0.78rem; color: var(--muted); }

  /* More chains */
  .extra-chain {
    margin: 1.2rem 0;
    padding: 0.8rem 1rem;
    border: 1px solid var(--border);
    border-radius: 8px;
  }
  .extra-chain .chain-title {
    font-weight: 700;
    font-size: 0.85rem;
    color: var(--accent);
    margin-bottom: 0.4rem;
  }
  .extra-row {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.82rem;
    flex-wrap: wrap;
  }
  .extra-step {
    padding: 0.3rem 0.6rem;
    border-radius: 6px;
    font-weight: 600;
  }

  .pattern-note {
    margin-top: 1rem;
    padding: 0.8rem 1rem;
    background: var(--accent-light);
    border-radius: 8px;
    border-left: 4px solid var(--accent);
    font-size: 0.85rem;
  }
  .pattern-note strong { color: var(--accent); }
  .english-compare {
    margin-top: 1.2rem;
    padding: 0.8rem 1rem;
    background: var(--english-bg);
    border-radius: 8px;
    border-left: 4px solid var(--english);
    font-size: 0.85rem;
  }
  .english-compare strong { color: var(--english); }
  @media (max-width: 700px) {
    .chain { flex-direction: column; align-items: center; }
    .chain-arrow { flex-direction: row; min-width: auto; padding: 0.3rem 0; }
    .arrow-glyph { transform: rotate(90deg); }
  }
</style>
</head>
<body>
<figure>
  <div class="chart-wrapper">
    <div class="section-title">The Derivational Chain: Know, Teach, Learn -- From One Root</div>

    <div class="root-display">
      <div class="root-letters">ع ل م</div>
      <div class="root-translit">' - l - m</div>
      <div class="root-meaning">Core meaning: knowledge, knowing</div>
    </div>

    <div class="chain">
      <div class="chain-step step-form1">
        <div class="step-label">FORM I</div>
        <div class="step-arabic">عَلِمَ</div>
        <div class="step-translit">'alima</div>
        <div class="step-meaning">"He knew"</div>
        <div style="font-size:0.72rem;color:var(--muted);">Basic action of root</div>
      </div>

      <div class="chain-arrow">
        <div class="arrow-morph">Double middle C</div>
        <div class="arrow-glyph">&rarr;</div>
        <div class="arrow-semantic">Causative: "cause to know"</div>
      </div>

      <div class="chain-step step-form2">
        <div class="step-label">FORM II</div>
        <div class="step-arabic">عَلَّمَ</div>
        <div class="step-translit">'allama</div>
        <div class="step-meaning">"He taught"</div>
        <div style="font-size:0.72rem;color:var(--muted);">Caused someone to know</div>
      </div>

      <div class="chain-arrow">
        <div class="arrow-morph">Add ta- prefix</div>
        <div class="arrow-glyph">&rarr;</div>
        <div class="arrow-semantic">Reflexive: "teach oneself"</div>
      </div>

      <div class="chain-step step-form5">
        <div class="step-label">FORM V</div>
        <div class="step-arabic">تَعَلَّمَ</div>
        <div class="step-translit">ta'allama</div>
        <div class="step-meaning">"He learned"</div>
        <div style="font-size:0.72rem;color:var(--muted);">Taught oneself = learned</div>
      </div>
    </div>

    <div class="section-title" style="margin-top:1.5rem;">English Equivalent: Three Unrelated Words</div>
    <div class="english-chain">
      <div class="eng-word">know</div>
      <div class="eng-arrow">&rarr;</div>
      <div class="eng-word">teach</div>
      <div class="eng-arrow">&rarr;</div>
      <div class="eng-word">learn</div>
    </div>
    <div style="text-align:center;font-size:0.8rem;color:var(--muted);margin-bottom:1rem;">Three etymologically unrelated words. No morphological connection between them.</div>

    <div class="section-title" style="margin-top:1rem;">More Derivational Chains</div>

    <div class="extra-chain">
      <div class="chain-title">Root: k-t-b (writing)</div>
      <div class="extra-row">
        <span class="extra-step" style="background:var(--form1-bg);color:var(--form1);">I: kataba "wrote"</span>
        <span style="color:var(--arrow);">&rarr;</span>
        <span class="extra-step" style="background:var(--form2-bg);color:var(--form2);">II: kattaba "dictated"</span>
        <span style="color:var(--arrow);">&rarr;</span>
        <span class="extra-step" style="background:var(--reciprocal-bg);color:#7c3aed;">III: kataba "corresponded with"</span>
        <span style="color:var(--arrow);">&rarr;</span>
        <span class="extra-step" style="background:var(--form5-bg);color:var(--form5);">VI: takataba "wrote to each other"</span>
        <span style="color:var(--arrow);">&rarr;</span>
        <span class="extra-step" style="background:var(--seeking-bg);color:var(--seeking);">X: istaktaba "asked to write"</span>
      </div>
    </div>

    <div class="extra-chain">
      <div class="chain-title">Root: s-l-m (peace, safety, submission)</div>
      <div class="extra-row">
        <span class="extra-step" style="background:var(--form1-bg);color:var(--form1);">I: salima "was safe"</span>
        <span style="color:var(--arrow);">&rarr;</span>
        <span class="extra-step" style="background:var(--form2-bg);color:var(--form2);">II: sallama "greeted"</span>
        <span style="color:var(--arrow);">&rarr;</span>
        <span class="extra-step" style="background:var(--causative-bg);color:var(--causative);">IV: 'aslama "submitted"</span>
        <span style="color:var(--arrow);">&rarr;</span>
        <span class="extra-step" style="background:var(--form5-bg);color:var(--form5);">V: tasallama "received"</span>
        <span style="color:var(--arrow);">&rarr;</span>
        <span class="extra-step" style="background:var(--seeking-bg);color:var(--seeking);">X: istaslama "surrendered"</span>
      </div>
      <div style="font-size:0.75rem;color:var(--muted);margin-top:0.3rem;">Islam = Form IV masdar ('islam). Muslim = Form IV active participle (muslim). Salam = peace (from same root).</div>
    </div>

    <div class="english-compare">
      <strong>English comparison:</strong> English uses separate, etymologically unrelated words for related concepts: know/teach/learn, write/dictate/correspond, safe/greet/submit. Arabic derives all of them from a single root using compositional morphological templates. The semantic relationships that English hides behind vocabulary, Arabic encodes in structure.
    </div>

    <div class="pattern-note">
      <strong>The pattern:</strong> The derivational chain is <em>predictable</em>. If you know Form I and understand the Form II operation (doubling = causative), you can <em>predict</em> Form II's meaning. If you understand Form V (ta- = reflexive of Form II), you can predict Form V's meaning. The ten forms are a <strong>compositional system</strong> -- not ten separate things to memorize, but a small set of operations that combine.
    </div>
  </div>

  <figcaption>
    <h2>Figure 3 &mdash; The Know-Teach-Learn Derivational Chain</h2>
    <p>From the root '-l-m (knowledge): Form I 'alima "knew" becomes Form II 'allama "taught" (causative: caused to know) becomes Form V ta'allama "learned" (reflexive: taught oneself). Teaching and learning are morphologically related as causative and reflexive of the same root. English needs three unrelated words for what Arabic derives from one root.</p>
  </figcaption>
</figure>
</body>
</html>
