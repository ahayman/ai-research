<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Initial Consonant System -- Three-Way Place Contrast</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --accent: #4361ee; --accent-light: #e8edff;
    --dental: #e63946; --dental-bg: #ffe0e3;
    --retro: #2a9d8f; --retro-bg: #d4f5f0;
    --palatal: #7209b7; --palatal-bg: #f3e8ff;
    --muted: #6c757d; --caption-bg: #f8f9fa;
    --english: #ff6b35; --english-bg: #fff3ec;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a; --fg: #e8e8f0; --surface: #1a1a2e; --border: #2d2d44;
      --accent: #6b8aff; --accent-light: #1e2a4a;
      --dental: #ff6b6b; --dental-bg: #3a1a1a;
      --retro: #4ecdc4; --retro-bg: #1a3a38;
      --palatal: #c77dff; --palatal-bg: #1e0a2e;
      --muted: #9a9ab0; --caption-bg: #1a1a2e;
      --english: #ff8c5a; --english-bg: #2a1a10;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--fg); display: flex; justify-content: center; padding: 2rem 1rem; line-height: 1.6; }
  figure { max-width: 900px; width: 100%; }
  figcaption { text-align: center; margin-top: 1.5rem; padding: 1rem 1.5rem; background: var(--caption-bg); border-radius: 8px; border: 1px solid var(--border); }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  .chart-wrapper { overflow-x: auto; border: 1px solid var(--border); border-radius: 10px; background: var(--surface); padding: 1.5rem; }
  table { width: 100%; border-collapse: collapse; margin: 0.5rem 0; }
  th, td { padding: 0.7rem 0.5rem; text-align: center; border: 1px solid var(--border); font-size: 0.9rem; }
  th { background: var(--accent-light); color: var(--accent); font-weight: 600; }
  .dental { background: var(--dental-bg); }
  .retro { background: var(--retro-bg); }
  .palatal { background: var(--palatal-bg); }
  .english-row { background: var(--english-bg); }
  .section-title { font-size: 1rem; font-weight: 700; margin: 1.2rem 0 0.5rem; color: var(--fg); }
  .pattern-box { margin-top: 1.2rem; padding: 1rem; background: var(--accent-light); border-radius: 8px; border: 1px solid var(--accent); }
  .pattern-box h3 { font-size: 0.95rem; color: var(--accent); margin-bottom: 0.4rem; }
  .pattern-box p { font-size: 0.85rem; color: var(--fg); }
  .dist-rule { margin-top: 1rem; padding: 0.8rem; background: var(--surface); border-radius: 6px; border-left: 4px solid var(--palatal); }
  .dist-rule p { font-size: 0.85rem; }
  .aspiration-note { margin-top: 1rem; padding: 0.8rem; background: var(--english-bg); border-radius: 6px; border-left: 4px solid var(--english); }
  .aspiration-note h4 { font-size: 0.9rem; color: var(--english); margin-bottom: 0.3rem; }
  .aspiration-note p { font-size: 0.85rem; }
  .ipa { font-family: 'Gentium Plus', 'Noto Sans', 'DejaVu Sans', serif; }
</style>
</head>
<body>
<figure>
  <div class="chart-wrapper">
    <p class="section-title">The Three Sibilant Series: Dental / Retroflex / Palatal</p>
    <table>
      <thead>
        <tr>
          <th>Manner</th>
          <th style="color:var(--dental)">Dental (tip at teeth)</th>
          <th style="color:var(--retro)">Retroflex (tip curled back)</th>
          <th style="color:var(--palatal)">Palatal (blade at palate)</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td><strong>Unaspirated Affricate</strong><br><small>(no puff of air)</small></td>
          <td class="dental"><strong>z</strong> <span class="ipa">[ts]</span><br><small>like "ts" in ca<u>ts</u></small></td>
          <td class="retro"><strong>zh</strong> <span class="ipa">[ts]</span><br><small>like "j" in <u>j</u>udge (unvoiced, curled)</small></td>
          <td class="palatal"><strong>j</strong> <span class="ipa">[tc]</span><br><small>like "j" in <u>j</u>eep (forward)</small></td>
        </tr>
        <tr>
          <td><strong>Aspirated Affricate</strong><br><small>(puff of air)</small></td>
          <td class="dental"><strong>c</strong> <span class="ipa">[tsh]</span><br><small>like "ts" + breath</small></td>
          <td class="retro"><strong>ch</strong> <span class="ipa">[tsh]</span><br><small>like "ch" in <u>ch</u>urch (curled)</small></td>
          <td class="palatal"><strong>q</strong> <span class="ipa">[tch]</span><br><small>like "ch" in <u>ch</u>eese (forward)</small></td>
        </tr>
        <tr>
          <td><strong>Fricative</strong><br><small>(continuous airflow)</small></td>
          <td class="dental"><strong>s</strong> <span class="ipa">[s]</span><br><small>like "s" in <u>s</u>un</small></td>
          <td class="retro"><strong>sh</strong> <span class="ipa">[s]</span><br><small>like "sh" in <u>sh</u>ip (curled)</small></td>
          <td class="palatal"><strong>x</strong> <span class="ipa">[c]</span><br><small>like "sh" in <u>sh</u>e (forward)</small></td>
        </tr>
        <tr class="english-row">
          <td colspan="4" style="text-align:left; padding:0.5rem 1rem;">
            <strong style="color:var(--english)">English closest match:</strong>
            voiced/voiceless pairs like s/z, sh/zh, ch/j -- English uses <em>voicing</em>; Chinese uses <em>aspiration</em>
          </td>
        </tr>
      </tbody>
    </table>

    <div class="dist-rule">
      <p><strong style="color:var(--palatal)">COMPLEMENTARY DISTRIBUTION RULE (a learnable pattern):</strong></p>
      <p>Palatals <strong>j, q, x</strong> appear ONLY before <strong>/i/</strong> and <strong>/u/</strong> (front vowels).</p>
      <p>Retroflexes <strong>zh, ch, sh</strong> NEVER appear before <strong>/i/</strong> or <strong>/u/</strong> in the palatal sense.</p>
      <p>Dentals <strong>z, c, s</strong> never appear before <strong>/i/</strong> or <strong>/u/</strong> either.</p>
      <p style="color:var(--muted); font-style:italic; margin-top:0.3rem;">This means you can always predict which series is possible based on the following vowel -- the system is perfectly regular.</p>
    </div>

    <div class="aspiration-note">
      <h4>ENGLISH vs. CHINESE: The Aspiration Pattern</h4>
      <p>English distinguishes <strong>voiced</strong> (vocal cords vibrate: b, d, g, z, zh, j) from <strong>voiceless</strong> (no vibration: p, t, k, s, sh, ch).</p>
      <p>Chinese distinguishes <strong>unaspirated</strong> (no puff: b, d, g, z, zh, j) from <strong>aspirated</strong> (puff of air: p, t, k, c, ch, q). ALL are voiceless.</p>
      <p style="margin-top:0.4rem"><strong>Paper test:</strong> Hold a paper strip in front of your mouth. It flutters for p, t, k, c, ch, q (aspirated). It stays still for b, d, g, z, zh, j (unaspirated). This is the organizing principle of the entire consonant system.</p>
    </div>

    <div class="pattern-box">
      <h3>THE PATTERN: 3 Places x 3 Manners = 9 Sibilants</h3>
      <p>The Chinese sibilant system is a perfectly symmetrical 3x3 grid. Each place of articulation (dental, retroflex, palatal) has exactly one unaspirated affricate, one aspirated affricate, and one fricative. Plus the retroflex series adds <strong>r</strong> <span class="ipa">[z]</span> as a fourth member. This level of symmetry makes the system highly learnable once you see the grid.</p>
    </div>
  </div>
  <figcaption>
    <h2>Figure 4 -- Initial Consonant System: Three-Way Place Contrast</h2>
    <p>Mandarin organizes its sibilant consonants in a symmetrical three-way contrast: dental (z/c/s), retroflex (zh/ch/sh), and palatal (j/q/x). Each row pairs an unaspirated sound with an aspirated one -- not a voiced/voiceless pair as in English. The three series occupy strictly complementary vowel environments, making the system entirely predictable.</p>
  </figcaption>
</figure>
</body>
</html>
