<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mandarin vs. English Phoneme Inventory Comparison</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --accent: #4361ee; --accent-light: #e8edff;
    --chinese: #e63946; --chinese-bg: #ffe0e3;
    --english: #2a9d8f; --english-bg: #d4f5f0;
    --muted: #6c757d; --caption-bg: #f8f9fa;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a; --fg: #e8e8f0; --surface: #1a1a2e; --border: #2d2d44;
      --accent: #6b8aff; --accent-light: #1e2a4a;
      --chinese: #ff6b6b; --chinese-bg: #3a1a1a;
      --english: #4ecdc4; --english-bg: #1a3a38;
      --muted: #9a9ab0; --caption-bg: #1a1a2e;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--fg); display: flex; justify-content: center; padding: 2rem 1rem; line-height: 1.6; }
  figure { max-width: 900px; width: 100%; }
  figcaption { text-align: center; margin-top: 1.5rem; padding: 1rem 1.5rem; background: var(--caption-bg); border-radius: 8px; border: 1px solid var(--border); }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  .chart-wrapper { overflow-x: auto; border: 1px solid var(--border); border-radius: 10px; background: var(--surface); padding: 1rem; }
  svg { display: block; margin: 0 auto; }
</style>
</head>
<body>
<figure>
  <div class="chart-wrapper">
    <svg viewBox="0 0 880 620" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
      <text x="440" y="28" text-anchor="middle" font-size="17" fill="var(--fg)" font-weight="700">Sound Inventory: Mandarin vs. English</text>

      <!-- Headers -->
      <text x="300" y="65" text-anchor="middle" font-size="14" fill="var(--chinese)" font-weight="700">MANDARIN CHINESE</text>
      <text x="620" y="65" text-anchor="middle" font-size="14" fill="var(--english)" font-weight="700">ENGLISH</text>
      <text x="460" y="65" text-anchor="middle" font-size="13" fill="var(--muted)" font-weight="600">Feature</text>

      <!-- Row backgrounds -->
      <rect x="30" y="75" width="820" height="45" rx="0" fill="var(--surface)" stroke="var(--border)" stroke-width="0.5"/>
      <rect x="30" y="120" width="820" height="45" rx="0" fill="var(--bg)" stroke="var(--border)" stroke-width="0.5"/>
      <rect x="30" y="165" width="820" height="45" rx="0" fill="var(--surface)" stroke="var(--border)" stroke-width="0.5"/>
      <rect x="30" y="210" width="820" height="45" rx="0" fill="var(--bg)" stroke="var(--border)" stroke-width="0.5"/>
      <rect x="30" y="255" width="820" height="45" rx="0" fill="var(--surface)" stroke="var(--border)" stroke-width="0.5"/>
      <rect x="30" y="300" width="820" height="45" rx="0" fill="var(--bg)" stroke="var(--border)" stroke-width="0.5"/>

      <!-- Row 1: Consonants -->
      <text x="460" y="103" text-anchor="middle" font-size="12" fill="var(--fg)" font-weight="600">Consonants</text>
      <text x="300" y="103" text-anchor="middle" font-size="13" fill="var(--chinese)" font-weight="600">~21</text>
      <text x="620" y="103" text-anchor="middle" font-size="13" fill="var(--english)" font-weight="600">~24</text>

      <!-- Row 2: Vowels -->
      <text x="460" y="148" text-anchor="middle" font-size="12" fill="var(--fg)" font-weight="600">Vowels</text>
      <text x="300" y="143" text-anchor="middle" font-size="13" fill="var(--chinese)" font-weight="600">~6 basic</text>
      <text x="300" y="158" text-anchor="middle" font-size="10" fill="var(--chinese)">+ compounds</text>
      <text x="620" y="143" text-anchor="middle" font-size="13" fill="var(--english)" font-weight="600">~12 monoph.</text>
      <text x="620" y="158" text-anchor="middle" font-size="10" fill="var(--english)">+ ~8 diphthongs</text>

      <!-- Row 3: Lexical Tones -->
      <text x="460" y="193" text-anchor="middle" font-size="12" fill="var(--fg)" font-weight="600">Lexical Tones</text>
      <rect x="230" y="180" width="140" height="25" rx="5" fill="var(--chinese)" opacity="0.9"/>
      <text x="300" y="198" text-anchor="middle" font-size="13" fill="white" font-weight="700">4 + neutral</text>
      <text x="620" y="198" text-anchor="middle" font-size="13" fill="var(--english)" font-weight="600">0</text>

      <!-- Row 4: Syllable Types -->
      <text x="460" y="238" text-anchor="middle" font-size="12" fill="var(--fg)" font-weight="600">Syllable Types</text>
      <text x="300" y="238" text-anchor="middle" font-size="13" fill="var(--chinese)" font-weight="600">~1,300</text>
      <rect x="550" y="225" width="140" height="25" rx="5" fill="var(--english)" opacity="0.9"/>
      <text x="620" y="243" text-anchor="middle" font-size="13" fill="white" font-weight="700">~10,000-15,000</text>

      <!-- Row 5: Consonant Clusters -->
      <text x="460" y="283" text-anchor="middle" font-size="12" fill="var(--fg)" font-weight="600">Consonant Clusters</text>
      <text x="300" y="283" text-anchor="middle" font-size="13" fill="var(--chinese)" font-weight="700">ZERO</text>
      <text x="620" y="278" text-anchor="middle" font-size="13" fill="var(--english)" font-weight="600">Onset: up to 3</text>
      <text x="620" y="293" text-anchor="middle" font-size="10" fill="var(--english)">Coda: up to 4</text>

      <!-- Row 6: Final Consonants -->
      <text x="460" y="328" text-anchor="middle" font-size="12" fill="var(--fg)" font-weight="600">Final Consonants</text>
      <text x="300" y="328" text-anchor="middle" font-size="13" fill="var(--chinese)" font-weight="600">/n/ and /ng/ only</text>
      <text x="620" y="328" text-anchor="middle" font-size="13" fill="var(--english)" font-weight="600">Any consonant</text>

      <!-- VISUAL METAPHOR -->
      <text x="440" y="380" text-anchor="middle" font-size="15" fill="var(--accent)" font-weight="700">The Architectural Metaphor</text>

      <!-- Chinese: Tall building -->
      <rect x="100" y="405" width="100" height="180" rx="6" fill="var(--chinese-bg)" stroke="var(--chinese)" stroke-width="2"/>
      <!-- Floors (tones) -->
      <line x1="100" y1="450" x2="200" y2="450" stroke="var(--chinese)" stroke-width="1"/>
      <line x1="100" y1="495" x2="200" y2="495" stroke="var(--chinese)" stroke-width="1"/>
      <line x1="100" y1="540" x2="200" y2="540" stroke="var(--chinese)" stroke-width="1"/>
      <text x="150" y="432" text-anchor="middle" font-size="10" fill="var(--chinese)">Tone 1</text>
      <text x="150" y="477" text-anchor="middle" font-size="10" fill="var(--chinese)">Tone 2</text>
      <text x="150" y="522" text-anchor="middle" font-size="10" fill="var(--chinese)">Tone 3</text>
      <text x="150" y="567" text-anchor="middle" font-size="10" fill="var(--chinese)">Tone 4</text>
      <text x="150" y="400" text-anchor="middle" font-size="11" fill="var(--chinese)" font-weight="600">COMPACT + TALL</text>
      <text x="150" y="600" text-anchor="middle" font-size="10" fill="var(--muted)">Few streets, many floors</text>

      <!-- English: Wide sprawling city -->
      <rect x="480" y="510" width="320" height="75" rx="6" fill="var(--english-bg)" stroke="var(--english)" stroke-width="2"/>
      <!-- Rooms (syllable variety) -->
      <line x1="560" y1="510" x2="560" y2="585" stroke="var(--english)" stroke-width="1"/>
      <line x1="640" y1="510" x2="640" y2="585" stroke="var(--english)" stroke-width="1"/>
      <line x1="720" y1="510" x2="720" y2="585" stroke="var(--english)" stroke-width="1"/>
      <text x="520" y="552" text-anchor="middle" font-size="9" fill="var(--english)">str-</text>
      <text x="600" y="552" text-anchor="middle" font-size="9" fill="var(--english)">spl-</text>
      <text x="680" y="552" text-anchor="middle" font-size="9" fill="var(--english)">-ngths</text>
      <text x="760" y="552" text-anchor="middle" font-size="9" fill="var(--english)">-ksths</text>
      <text x="640" y="505" text-anchor="middle" font-size="11" fill="var(--english)" font-weight="600">WIDE + FLAT</text>
      <text x="640" y="600" text-anchor="middle" font-size="10" fill="var(--muted)">Many streets, one floor</text>

      <!-- Equals sign -->
      <text x="380" y="540" text-anchor="middle" font-size="30" fill="var(--accent)" font-weight="700">=</text>
      <text x="380" y="565" text-anchor="middle" font-size="11" fill="var(--accent)" font-weight="600">Comparable</text>
      <text x="380" y="580" text-anchor="middle" font-size="11" fill="var(--accent)" font-weight="600">expressiveness</text>
    </svg>
  </div>
  <figcaption>
    <h2>Figure 5 -- Mandarin vs. English Phoneme Inventory Comparison</h2>
    <p>Despite similar consonant counts, the two languages achieve expressiveness through radically different strategies. Chinese has fewer syllable shapes but multiplies them with tones (vertical expansion). English has no tones but permits complex consonant clusters (horizontal expansion). The result: both systems can express an effectively unlimited vocabulary, using completely different architectural principles.</p>
  </figcaption>
</figure>
</body>
</html>
