<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Four Tones of Mandarin -- Pitch Contour Visualization</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --accent: #4361ee;
    --accent-light: #e8edff;
    --tone1: #e63946;
    --tone2: #2a9d8f;
    --tone3: #e9c46a;
    --tone4: #264653;
    --neutral: #9a9ab0;
    --muted: #6c757d;
    --caption-bg: #f8f9fa;
    --grid: #e0e0e0;
    --english: #8338ec;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --accent: #6b8aff;
      --accent-light: #1e2a4a;
      --tone1: #ff6b6b;
      --tone2: #4ecdc4;
      --tone3: #ffe66d;
      --tone4: #a8dadc;
      --neutral: #7a7a90;
      --muted: #9a9ab0;
      --caption-bg: #1a1a2e;
      --grid: #2d2d44;
      --english: #b380ff;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure { max-width: 900px; width: 100%; }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding: 1rem 1.5rem;
    background: var(--caption-bg);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  .chart-wrapper {
    overflow-x: auto;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--surface);
    padding: 1rem;
  }
  svg { display: block; margin: 0 auto; }
  .legend {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 1.2rem;
    margin-top: 1rem;
    padding: 0.8rem;
    background: var(--surface);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.8rem;
    color: var(--muted);
  }
  .legend-swatch {
    width: 24px;
    height: 3px;
    border-radius: 2px;
  }
</style>
</head>
<body>
<figure>
  <div class="chart-wrapper">
    <svg viewBox="0 0 840 480" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
      <!-- Grid and axes -->
      <rect x="100" y="30" width="640" height="320" fill="none" stroke="var(--grid)" stroke-width="0.5"/>
      <!-- Y-axis labels (pitch levels 1-5) -->
      <text x="90" y="38" text-anchor="end" font-size="12" fill="var(--muted)">5 (high)</text>
      <text x="90" y="118" text-anchor="end" font-size="12" fill="var(--muted)">4</text>
      <text x="90" y="198" text-anchor="end" font-size="12" fill="var(--muted)">3 (mid)</text>
      <text x="90" y="278" text-anchor="end" font-size="12" fill="var(--muted)">2</text>
      <text x="90" y="358" text-anchor="end" font-size="12" fill="var(--muted)">1 (low)</text>
      <!-- Y-axis title -->
      <text x="20" y="200" text-anchor="middle" font-size="13" fill="var(--fg)" transform="rotate(-90 20 200)" font-weight="600">Pitch Level</text>
      <!-- Horizontal grid lines -->
      <line x1="100" y1="30" x2="740" y2="30" stroke="var(--grid)" stroke-width="0.5" stroke-dasharray="4,4"/>
      <line x1="100" y1="110" x2="740" y2="110" stroke="var(--grid)" stroke-width="0.5" stroke-dasharray="4,4"/>
      <line x1="100" y1="190" x2="740" y2="190" stroke="var(--grid)" stroke-width="0.5" stroke-dasharray="4,4"/>
      <line x1="100" y1="270" x2="740" y2="270" stroke="var(--grid)" stroke-width="0.5" stroke-dasharray="4,4"/>
      <line x1="100" y1="350" x2="740" y2="350" stroke="var(--grid)" stroke-width="0.5" stroke-dasharray="4,4"/>
      <!-- X-axis -->
      <text x="420" y="395" text-anchor="middle" font-size="13" fill="var(--fg)" font-weight="600">Time through syllable</text>
      <text x="110" y="380" text-anchor="start" font-size="11" fill="var(--muted)">start</text>
      <text x="730" y="380" text-anchor="end" font-size="11" fill="var(--muted)">end</text>

      <!-- TONE 1: High Level (55) - flat line at pitch 5 -->
      <line x1="130" y1="35" x2="290" y2="35" stroke="var(--tone1)" stroke-width="4" stroke-linecap="round"/>
      <circle cx="130" cy="35" r="4" fill="var(--tone1)"/>
      <circle cx="290" cy="35" r="4" fill="var(--tone1)"/>
      <text x="310" y="30" font-size="14" fill="var(--tone1)" font-weight="700">Tone 1 (55)</text>
      <text x="310" y="47" font-size="12" fill="var(--tone1)">ma -- mother</text>
      <text x="310" y="63" font-size="11" fill="var(--english)" font-style="italic">Like holding "ahhh" for a doctor</text>

      <!-- TONE 2: Rising (35) - rises from mid to high -->
      <path d="M130,195 Q200,150 290,35" stroke="var(--tone2)" stroke-width="4" fill="none" stroke-linecap="round"/>
      <circle cx="130" cy="195" r="4" fill="var(--tone2)"/>
      <circle cx="290" cy="35" r="4" fill="var(--tone2)"/>
      <text x="310" y="110" font-size="14" fill="var(--tone2)" font-weight="700">Tone 2 (35)</text>
      <text x="310" y="127" font-size="12" fill="var(--tone2)">ma -- hemp/numb</text>
      <text x="310" y="143" font-size="11" fill="var(--english)" font-style="italic">Like a surprised "What?"</text>

      <!-- TONE 3: Dipping (214) - full form: dips and rises -->
      <path d="M130,275 Q180,350 210,350 Q240,350 290,115" stroke="var(--tone3)" stroke-width="4" fill="none" stroke-linecap="round"/>
      <circle cx="130" cy="275" r="4" fill="var(--tone3)"/>
      <circle cx="290" cy="115" r="4" fill="var(--tone3)"/>
      <text x="310" y="200" font-size="14" fill="var(--tone3)" font-weight="700">Tone 3 (214)</text>
      <text x="310" y="217" font-size="12" fill="var(--tone3)">ma -- horse</text>
      <text x="310" y="233" font-size="11" fill="var(--english)" font-style="italic">Like a reluctant "well..."</text>
      <!-- Half-third (common form) -->
      <path d="M130,275 Q180,350 230,350" stroke="var(--tone3)" stroke-width="3" fill="none" stroke-linecap="round" stroke-dasharray="8,5"/>
      <text x="240" y="360" font-size="10" fill="var(--tone3)" font-style="italic">(half 3rd: stays low)</text>

      <!-- TONE 4: Falling (51) - sharp drop -->
      <path d="M130,35 Q200,200 290,350" stroke="var(--tone4)" stroke-width="4" fill="none" stroke-linecap="round"/>
      <circle cx="130" cy="35" r="4" fill="var(--tone4)"/>
      <circle cx="290" cy="350" r="4" fill="var(--tone4)"/>
      <text x="310" y="290" font-size="14" fill="var(--tone4)" font-weight="700">Tone 4 (51)</text>
      <text x="310" y="307" font-size="12" fill="var(--tone4)">ma -- to scold</text>
      <text x="310" y="323" font-size="11" fill="var(--english)" font-style="italic">Like a firm command: "Stop!"</text>

      <!-- Neutral tone indicators -->
      <text x="420" y="430" text-anchor="middle" font-size="13" fill="var(--neutral)" font-weight="600">Neutral Tone (light, unstressed)</text>
      <text x="420" y="450" text-anchor="middle" font-size="11" fill="var(--neutral)">After T1: mid-low | After T2: mid | After T3: mid-high | After T4: low</text>
      <text x="420" y="466" text-anchor="middle" font-size="11" fill="var(--neutral)" font-style="italic">Example: ma (question particle)</text>

      <!-- English comparison box -->
      <rect x="530" y="170" width="200" height="80" rx="6" fill="var(--accent-light)" stroke="var(--english)" stroke-width="1.5"/>
      <text x="630" y="190" text-anchor="middle" font-size="12" fill="var(--english)" font-weight="700">ENGLISH COMPARISON</text>
      <text x="630" y="208" text-anchor="middle" font-size="11" fill="var(--english)">Pitch = attitude/grammar</text>
      <text x="630" y="224" text-anchor="middle" font-size="11" fill="var(--english)">Rising = question</text>
      <text x="630" y="240" text-anchor="middle" font-size="11" fill="var(--english)">Falling = statement</text>

      <!-- Key insight -->
      <rect x="530" y="260" width="200" height="55" rx="6" fill="var(--surface)" stroke="var(--accent)" stroke-width="1.5"/>
      <text x="630" y="280" text-anchor="middle" font-size="12" fill="var(--accent)" font-weight="700">KEY PATTERN</text>
      <text x="630" y="296" text-anchor="middle" font-size="10" fill="var(--fg)">Chinese pitch = word meaning</text>
      <text x="630" y="310" text-anchor="middle" font-size="10" fill="var(--fg)">English pitch = sentence mood</text>
    </svg>
  </div>
  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background:var(--tone1)"></div>Tone 1 -- High Level</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--tone2)"></div>Tone 2 -- Rising</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--tone3)"></div>Tone 3 -- Dipping (solid=full, dashed=half)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--tone4)"></div>Tone 4 -- Falling</div>
  </div>
  <figcaption>
    <h2>Figure 1 -- The Four Tones of Mandarin Chinese</h2>
    <p>Mandarin uses four specified pitch contours (plus a neutral tone) to distinguish word meaning. The syllable "ma" produces five different meanings depending on pitch shape alone. English uses pitch at the sentence level (intonation) but never to change the dictionary meaning of an individual word. Numbers in parentheses are Chao tone-letter values on a 1-5 pitch scale.</p>
  </figcaption>
</figure>
</body>
</html>
