<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Syllable Structure Comparison -- Chinese vs. English</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --accent: #4361ee; --accent-light: #e8edff; --chinese: #e63946; --chinese-light: #ffe0e3;
    --english: #2a9d8f; --english-light: #d4f5f0; --muted: #6c757d; --caption-bg: #f8f9fa;
    --grid: #e0e0e0; --highlight: #ff6b35;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a; --fg: #e8e8f0; --surface: #1a1a2e; --border: #2d2d44;
      --accent: #6b8aff; --accent-light: #1e2a4a; --chinese: #ff6b6b; --chinese-light: #3a1a1a;
      --english: #4ecdc4; --english-light: #1a3a38; --muted: #9a9ab0; --caption-bg: #1a1a2e;
      --grid: #2d2d44; --highlight: #ff8c5a;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg); color: var(--fg);
    display: flex; justify-content: center; padding: 2rem 1rem; line-height: 1.6;
  }
  figure { max-width: 950px; width: 100%; }
  figcaption { text-align: center; margin-top: 1.5rem; padding: 1rem 1.5rem; background: var(--caption-bg); border-radius: 8px; border: 1px solid var(--border); }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  .chart-wrapper { overflow-x: auto; border: 1px solid var(--border); border-radius: 10px; background: var(--surface); padding: 1rem; }
  svg { display: block; margin: 0 auto; }
</style>
</head>
<body>
<figure>
  <div class="chart-wrapper">
    <svg viewBox="0 0 900 560" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
      <!-- Title -->
      <text x="450" y="30" text-anchor="middle" font-size="18" fill="var(--fg)" font-weight="700">Syllable Architecture: Two Design Philosophies</text>

      <!-- CHINESE SECTION -->
      <rect x="30" y="50" width="410" height="200" rx="10" fill="var(--chinese-light)" stroke="var(--chinese)" stroke-width="2"/>
      <text x="235" y="75" text-anchor="middle" font-size="16" fill="var(--chinese)" font-weight="700">MANDARIN CHINESE</text>
      <text x="235" y="95" text-anchor="middle" font-size="13" fill="var(--fg)">Template: (C)(G)V(C) + Tone</text>

      <!-- Chinese syllable slots -->
      <rect x="55" y="110" width="60" height="45" rx="6" fill="var(--surface)" stroke="var(--chinese)" stroke-width="1.5" stroke-dasharray="4,3"/>
      <text x="85" y="128" text-anchor="middle" font-size="10" fill="var(--muted)">Initial</text>
      <text x="85" y="145" text-anchor="middle" font-size="13" fill="var(--chinese)" font-weight="600">C</text>

      <rect x="125" y="110" width="60" height="45" rx="6" fill="var(--surface)" stroke="var(--chinese)" stroke-width="1.5" stroke-dasharray="4,3"/>
      <text x="155" y="128" text-anchor="middle" font-size="10" fill="var(--muted)">Glide</text>
      <text x="155" y="145" text-anchor="middle" font-size="13" fill="var(--chinese)" font-weight="600">G</text>

      <rect x="195" y="110" width="60" height="45" rx="6" fill="var(--surface)" stroke="var(--chinese)" stroke-width="2"/>
      <text x="225" y="128" text-anchor="middle" font-size="10" fill="var(--muted)">Vowel</text>
      <text x="225" y="145" text-anchor="middle" font-size="13" fill="var(--chinese)" font-weight="700">V</text>

      <rect x="265" y="110" width="60" height="45" rx="6" fill="var(--surface)" stroke="var(--chinese)" stroke-width="1.5" stroke-dasharray="4,3"/>
      <text x="295" y="128" text-anchor="middle" font-size="10" fill="var(--muted)">Coda</text>
      <text x="295" y="145" text-anchor="middle" font-size="13" fill="var(--chinese)" font-weight="600">n/ng</text>

      <rect x="340" y="110" width="50" height="45" rx="6" fill="var(--chinese)" stroke="var(--chinese)" stroke-width="2"/>
      <text x="365" y="133" text-anchor="middle" font-size="12" fill="white" font-weight="700">TONE</text>

      <!-- Chinese example: zhuang -->
      <text x="235" y="180" text-anchor="middle" font-size="12" fill="var(--fg)" font-weight="600">Maximum example: zhuang [tswang]</text>
      <text x="85" y="198" text-anchor="middle" font-size="11" fill="var(--chinese)">zh</text>
      <text x="155" y="198" text-anchor="middle" font-size="11" fill="var(--chinese)">u</text>
      <text x="225" y="198" text-anchor="middle" font-size="11" fill="var(--chinese)">a</text>
      <text x="295" y="198" text-anchor="middle" font-size="11" fill="var(--chinese)">ng</text>
      <text x="365" y="198" text-anchor="middle" font-size="11" fill="white">1st</text>

      <!-- Chinese stats -->
      <text x="235" y="230" text-anchor="middle" font-size="12" fill="var(--chinese)" font-weight="600">~410 syllables (without tone)</text>
      <text x="235" y="246" text-anchor="middle" font-size="12" fill="var(--chinese)" font-weight="600">~1,300 syllables (with tone)</text>

      <!-- ENGLISH SECTION -->
      <rect x="460" y="50" width="410" height="200" rx="10" fill="var(--english-light)" stroke="var(--english)" stroke-width="2"/>
      <text x="665" y="75" text-anchor="middle" font-size="16" fill="var(--english)" font-weight="700">ENGLISH</text>
      <text x="665" y="95" text-anchor="middle" font-size="13" fill="var(--fg)">Template: (C)(C)(C)V(C)(C)(C)(C)</text>

      <!-- English syllable slots - onset -->
      <rect x="475" y="110" width="30" height="45" rx="4" fill="var(--surface)" stroke="var(--english)" stroke-width="1.5"/>
      <text x="490" y="138" text-anchor="middle" font-size="11" fill="var(--english)" font-weight="600">C</text>
      <rect x="510" y="110" width="30" height="45" rx="4" fill="var(--surface)" stroke="var(--english)" stroke-width="1.5"/>
      <text x="525" y="138" text-anchor="middle" font-size="11" fill="var(--english)" font-weight="600">C</text>
      <rect x="545" y="110" width="30" height="45" rx="4" fill="var(--surface)" stroke="var(--english)" stroke-width="1.5"/>
      <text x="560" y="138" text-anchor="middle" font-size="11" fill="var(--english)" font-weight="600">C</text>

      <rect x="585" y="110" width="35" height="45" rx="4" fill="var(--surface)" stroke="var(--english)" stroke-width="2"/>
      <text x="602" y="138" text-anchor="middle" font-size="12" fill="var(--english)" font-weight="700">V</text>

      <rect x="630" y="110" width="30" height="45" rx="4" fill="var(--surface)" stroke="var(--english)" stroke-width="1.5"/>
      <text x="645" y="138" text-anchor="middle" font-size="11" fill="var(--english)" font-weight="600">C</text>
      <rect x="665" y="110" width="30" height="45" rx="4" fill="var(--surface)" stroke="var(--english)" stroke-width="1.5"/>
      <text x="680" y="138" text-anchor="middle" font-size="11" fill="var(--english)" font-weight="600">C</text>
      <rect x="700" y="110" width="30" height="45" rx="4" fill="var(--surface)" stroke="var(--english)" stroke-width="1.5"/>
      <text x="715" y="138" text-anchor="middle" font-size="11" fill="var(--english)" font-weight="600">C</text>
      <rect x="735" y="110" width="30" height="45" rx="4" fill="var(--surface)" stroke="var(--english)" stroke-width="1.5"/>
      <text x="750" y="138" text-anchor="middle" font-size="11" fill="var(--english)" font-weight="600">C</text>

      <!-- English example: strengths -->
      <text x="665" y="180" text-anchor="middle" font-size="12" fill="var(--fg)" font-weight="600">Maximum example: strengths</text>
      <text x="490" y="198" text-anchor="middle" font-size="11" fill="var(--english)">s</text>
      <text x="525" y="198" text-anchor="middle" font-size="11" fill="var(--english)">t</text>
      <text x="560" y="198" text-anchor="middle" font-size="11" fill="var(--english)">r</text>
      <text x="602" y="198" text-anchor="middle" font-size="11" fill="var(--english)">e</text>
      <text x="645" y="198" text-anchor="middle" font-size="11" fill="var(--english)">ng</text>
      <text x="680" y="198" text-anchor="middle" font-size="11" fill="var(--english)">k</text>
      <text x="715" y="198" text-anchor="middle" font-size="11" fill="var(--english)">th</text>
      <text x="750" y="198" text-anchor="middle" font-size="11" fill="var(--english)">s</text>

      <!-- English stats -->
      <text x="665" y="230" text-anchor="middle" font-size="12" fill="var(--english)" font-weight="600">~10,000-15,000 possible syllables</text>
      <text x="665" y="246" text-anchor="middle" font-size="12" fill="var(--english)" font-weight="600">0 lexical tones</text>

      <!-- RATIO BAR -->
      <text x="450" y="290" text-anchor="middle" font-size="15" fill="var(--fg)" font-weight="700">Syllable Inventory Ratio</text>
      <!-- Chinese bar -->
      <rect x="100" y="305" width="52" height="30" rx="5" fill="var(--chinese)"/>
      <text x="126" y="325" text-anchor="middle" font-size="11" fill="white" font-weight="600">~1,300</text>
      <text x="60" y="325" text-anchor="end" font-size="12" fill="var(--chinese)" font-weight="600">Chinese</text>
      <!-- English bar -->
      <rect x="100" y="345" width="600" height="30" rx="5" fill="var(--english)"/>
      <text x="400" y="365" text-anchor="middle" font-size="11" fill="white" font-weight="600">~10,000-15,000</text>
      <text x="60" y="365" text-anchor="end" font-size="12" fill="var(--english)" font-weight="600">English</text>
      <text x="450" y="400" text-anchor="middle" font-size="12" fill="var(--muted)">English has roughly 10x more syllable shapes</text>

      <!-- KEY INSIGHT BOX -->
      <rect x="100" y="420" width="700" height="120" rx="10" fill="var(--accent-light)" stroke="var(--accent)" stroke-width="2"/>
      <text x="450" y="445" text-anchor="middle" font-size="14" fill="var(--accent)" font-weight="700">THE CORE PATTERN: Horizontal vs. Vertical Expansion</text>
      <text x="220" y="475" text-anchor="middle" font-size="12" fill="var(--chinese)" font-weight="600">CHINESE: Compact + Tall</text>
      <text x="220" y="495" text-anchor="middle" font-size="11" fill="var(--fg)">Few syllable shapes x 4 tones</text>
      <text x="220" y="512" text-anchor="middle" font-size="11" fill="var(--fg)">= vertical multiplication</text>
      <text x="680" y="475" text-anchor="middle" font-size="12" fill="var(--english)" font-weight="600">ENGLISH: Wide + Flat</text>
      <text x="680" y="495" text-anchor="middle" font-size="11" fill="var(--fg)">Many consonant clusters</text>
      <text x="680" y="512" text-anchor="middle" font-size="11" fill="var(--fg)">= horizontal sprawl</text>
      <!-- Divider -->
      <line x1="450" y1="460" x2="450" y2="530" stroke="var(--accent)" stroke-width="1" stroke-dasharray="4,4"/>
      <text x="450" y="530" text-anchor="middle" font-size="11" fill="var(--accent)" font-weight="600">Both achieve comparable expressiveness</text>
    </svg>
  </div>
  <figcaption>
    <h2>Figure 2 -- Syllable Structure Comparison: Chinese vs. English</h2>
    <p>Chinese syllables follow an extremely constrained template with no consonant clusters and only two possible final consonants (/n/ and /ng/). English permits up to three onset consonants and four coda consonants, producing roughly 10 times more possible syllable shapes. Chinese compensates with tonal pitch contours -- a vertical expansion strategy versus English's horizontal one.</p>
  </figcaption>
</figure>
</body>
</html>
