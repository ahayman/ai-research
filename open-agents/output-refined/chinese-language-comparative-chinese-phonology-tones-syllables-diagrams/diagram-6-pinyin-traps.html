<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pinyin Letter-to-Sound Mapping -- Traps for English Speakers</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --accent: #4361ee; --accent-light: #e8edff;
    --safe: #2a9d8f; --safe-bg: #d4f5f0;
    --danger: #e63946; --danger-bg: #ffe0e3;
    --muted: #6c757d; --caption-bg: #f8f9fa;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a; --fg: #e8e8f0; --surface: #1a1a2e; --border: #2d2d44;
      --accent: #6b8aff; --accent-light: #1e2a4a;
      --safe: #4ecdc4; --safe-bg: #1a3a38;
      --danger: #ff6b6b; --danger-bg: #3a1a1a;
      --muted: #9a9ab0; --caption-bg: #1a1a2e;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--fg); display: flex; justify-content: center; padding: 2rem 1rem; line-height: 1.6; }
  figure { max-width: 900px; width: 100%; }
  figcaption { text-align: center; margin-top: 1.5rem; padding: 1rem 1.5rem; background: var(--caption-bg); border-radius: 8px; border: 1px solid var(--border); }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  .chart-wrapper { overflow-x: auto; border: 1px solid var(--border); border-radius: 10px; background: var(--surface); padding: 1.5rem; }
  .section-title { font-size: 1rem; font-weight: 700; margin-bottom: 0.5rem; }
  table { width: 100%; border-collapse: collapse; margin-bottom: 1rem; }
  th, td { padding: 0.6rem 0.5rem; text-align: center; border: 1px solid var(--border); font-size: 0.85rem; }
  th { background: var(--accent-light); color: var(--accent); font-weight: 600; font-size: 0.8rem; }
  .safe-cell { background: var(--safe-bg); }
  .danger-cell { background: var(--danger-bg); }
  .ipa { font-family: 'Gentium Plus', 'Noto Sans', 'DejaVu Sans', serif; }
  .badge { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 10px; font-size: 0.7rem; font-weight: 700; }
  .badge-safe { background: var(--safe); color: white; }
  .badge-danger { background: var(--danger); color: white; }
  .safe-grid { display: flex; flex-wrap: wrap; gap: 0.5rem; justify-content: center; margin: 0.5rem 0; }
  .safe-letter { display: inline-flex; align-items: center; justify-content: center; width: 36px; height: 36px; border-radius: 6px; background: var(--safe-bg); border: 1px solid var(--safe); color: var(--safe); font-weight: 700; font-size: 1rem; }
  .tone-rule { margin-top: 1rem; padding: 0.8rem; background: var(--accent-light); border-radius: 8px; border: 1px solid var(--accent); }
  .tone-rule h3 { font-size: 0.9rem; color: var(--accent); margin-bottom: 0.3rem; }
  .tone-rule p { font-size: 0.85rem; }
</style>
</head>
<body>
<figure>
  <div class="chart-wrapper">
    <p class="section-title" style="color:var(--safe)">Safe Letters <span class="badge badge-safe">Roughly Match English</span></p>
    <div class="safe-grid">
      <div class="safe-letter">b</div>
      <div class="safe-letter">d</div>
      <div class="safe-letter">f</div>
      <div class="safe-letter">g</div>
      <div class="safe-letter">h</div>
      <div class="safe-letter">k</div>
      <div class="safe-letter">l</div>
      <div class="safe-letter">m</div>
      <div class="safe-letter">n</div>
      <div class="safe-letter">p</div>
      <div class="safe-letter">s</div>
      <div class="safe-letter">t</div>
      <div class="safe-letter">w</div>
      <div class="safe-letter">y</div>
    </div>
    <p style="font-size:0.8rem; color:var(--muted); text-align:center; margin-top:0.3rem;">Note: b, d, g are voiceless unaspirated in Chinese (not voiced like English), but close enough for initial learning.</p>

    <p class="section-title" style="color:var(--danger); margin-top:1.5rem;">Dangerous Letters <span class="badge badge-danger">Different From English</span></p>
    <table>
      <thead>
        <tr>
          <th>Pinyin</th>
          <th>Actual IPA</th>
          <th>English Wrong Guess</th>
          <th>How to Produce It</th>
          <th>Example</th>
        </tr>
      </thead>
      <tbody>
        <tr class="danger-cell">
          <td><strong style="font-size:1.2rem; color:var(--danger)">c</strong></td>
          <td class="ipa">[tsh]</td>
          <td>/k/ or /s/</td>
          <td>"ts" in ca<u>ts</u> + puff of air</td>
          <td>ci = "tsuh"</td>
        </tr>
        <tr class="danger-cell">
          <td><strong style="font-size:1.2rem; color:var(--danger)">q</strong></td>
          <td class="ipa">[tch]</td>
          <td>/kw/ as in "queen"</td>
          <td>"ch" in <u>ch</u>eese but tongue forward</td>
          <td>qi = "chee"</td>
        </tr>
        <tr class="danger-cell">
          <td><strong style="font-size:1.2rem; color:var(--danger)">x</strong></td>
          <td class="ipa">[c]</td>
          <td>/ks/ as in "fox"</td>
          <td>"sh" in <u>sh</u>e but tongue forward</td>
          <td>xi = "shee"</td>
        </tr>
        <tr class="danger-cell">
          <td><strong style="font-size:1.2rem; color:var(--danger)">zh</strong></td>
          <td class="ipa">[ts]</td>
          <td>Voiced "zh" as in "measure"</td>
          <td>"j" in <u>j</u>udge but unvoiced + tongue curled</td>
          <td>zhi = "jrr"</td>
        </tr>
        <tr class="danger-cell">
          <td><strong style="font-size:1.2rem; color:var(--danger)">r</strong></td>
          <td class="ipa">[z]</td>
          <td>English /r/ as in "red"</td>
          <td>Retroflex approximant, tongue curled back</td>
          <td>ri = "rrr"</td>
        </tr>
        <tr class="danger-cell">
          <td><strong style="font-size:1.2rem; color:var(--danger)">e</strong></td>
          <td class="ipa">[G]</td>
          <td>/i:/ as in "be" or /e/ as in "bed"</td>
          <td>Unrounded "uh" with tight lips</td>
          <td>ge = "guh"</td>
        </tr>
        <tr class="danger-cell">
          <td><strong style="font-size:1.2rem; color:var(--danger)">u</strong></td>
          <td class="ipa">[y]</td>
          <td>/u/ as in "do"</td>
          <td>French "tu" -- say "ee" with lips rounded</td>
          <td>lu = "l+ew"</td>
        </tr>
      </tbody>
    </table>

    <div class="tone-rule">
      <h3>Tone Mark Placement Rule (a learnable pattern)</h3>
      <p>The tone mark goes on the <strong>main vowel</strong>. Priority order: <strong>a > e > o > (i or u, whichever comes second)</strong></p>
      <p style="margin-top:0.3rem; font-size:0.85rem;">"ai" = tone on <strong>a</strong> | "ei" = tone on <strong>e</strong> | "ou" = tone on <strong>o</strong> | "iu" = tone on <strong>u</strong> | "ui" = tone on <strong>i</strong></p>
    </div>
  </div>
  <figcaption>
    <h2>Figure 6 -- Pinyin Letter-to-Sound Mapping: Traps for English Speakers</h2>
    <p>Pinyin uses the Latin alphabet but assigns Chinese phonetic values, not English ones. Approximately half the letters behave roughly as English speakers expect. Seven critical letters and combinations (c, q, x, zh, r, e, u) have values that will produce wrong pronunciations if read with English phonetic assumptions. Learning these seven traps is one of the highest-leverage early investments for an English-speaking learner.</p>
  </figcaption>
</figure>
</body>
</html>
