<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tone Sandhi Decision Flowchart</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --accent: #4361ee; --accent-light: #e8edff; --yes: #2a9d8f; --no: #e63946;
    --muted: #6c757d; --caption-bg: #f8f9fa; --decision: #ff6b35; --decision-light: #fff3ec;
    --result: #7209b7; --result-light: #f3e8ff;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a; --fg: #e8e8f0; --surface: #1a1a2e; --border: #2d2d44;
      --accent: #6b8aff; --accent-light: #1e2a4a; --yes: #4ecdc4; --no: #ff6b6b;
      --muted: #9a9ab0; --caption-bg: #1a1a2e; --decision: #ff8c5a; --decision-light: #2a1a10;
      --result: #c77dff; --result-light: #1e0a2e;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--fg); display: flex; justify-content: center; padding: 2rem 1rem; line-height: 1.6; }
  figure { max-width: 950px; width: 100%; }
  figcaption { text-align: center; margin-top: 1.5rem; padding: 1rem 1.5rem; background: var(--caption-bg); border-radius: 8px; border: 1px solid var(--border); }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  .chart-wrapper { overflow-x: auto; border: 1px solid var(--border); border-radius: 10px; background: var(--surface); padding: 1rem; }
  svg { display: block; margin: 0 auto; }
</style>
</head>
<body>
<figure>
  <div class="chart-wrapper">
    <svg viewBox="0 0 900 700" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
      <!-- Title -->
      <text x="450" y="28" text-anchor="middle" font-size="17" fill="var(--fg)" font-weight="700">Tone Sandhi Decision Flowchart</text>
      <text x="450" y="48" text-anchor="middle" font-size="12" fill="var(--muted)">Apply these rules in order for every multi-syllable utterance</text>

      <!-- START -->
      <rect x="350" y="65" width="200" height="40" rx="20" fill="var(--accent)" stroke="var(--accent)" stroke-width="2"/>
      <text x="450" y="90" text-anchor="middle" font-size="13" fill="white" font-weight="600">START: Multi-syllable word</text>
      <line x1="450" y1="105" x2="450" y2="130" stroke="var(--fg)" stroke-width="1.5" marker-end="url(#arrow)"/>

      <!-- Arrow marker -->
      <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-auto">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--fg)"/>
        </marker>
      </defs>

      <!-- RULE 1: Third tone + Third tone? -->
      <rect x="300" y="130" width="300" height="50" rx="5" fill="var(--decision-light)" stroke="var(--decision)" stroke-width="2" transform="rotate(0)"/>
      <polygon points="450,130 600,155 450,180 300,155" fill="var(--decision-light)" stroke="var(--decision)" stroke-width="2"/>
      <text x="450" y="152" text-anchor="middle" font-size="12" fill="var(--decision)" font-weight="600">Two consecutive 3rd tones?</text>
      <text x="450" y="168" text-anchor="middle" font-size="10" fill="var(--muted)">e.g., ni + hao</text>

      <!-- YES branch for rule 1 -->
      <line x1="600" y1="155" x2="720" y2="155" stroke="var(--yes)" stroke-width="1.5" marker-end="url(#arrowY)"/>
      <text x="650" y="148" font-size="11" fill="var(--yes)" font-weight="600">YES</text>
      <defs><marker id="arrowY" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="var(--yes)"/></marker></defs>
      <rect x="720" y="135" width="160" height="42" rx="6" fill="var(--result-light)" stroke="var(--result)" stroke-width="1.5"/>
      <text x="800" y="153" text-anchor="middle" font-size="11" fill="var(--result)" font-weight="600">1st becomes Tone 2</text>
      <text x="800" y="170" text-anchor="middle" font-size="10" fill="var(--muted)">ni hao -> ni hao</text>

      <!-- NO branch continues down -->
      <line x1="450" y1="180" x2="450" y2="220" stroke="var(--no)" stroke-width="1.5" marker-end="url(#arrowN)"/>
      <text x="460" y="200" font-size="11" fill="var(--no)" font-weight="600">NO</text>
      <defs><marker id="arrowN" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="var(--no)"/></marker></defs>

      <!-- RULE 2: 3rd tone before non-3rd? -->
      <polygon points="450,220 600,250 450,280 300,250" fill="var(--decision-light)" stroke="var(--decision)" stroke-width="2"/>
      <text x="450" y="247" text-anchor="middle" font-size="12" fill="var(--decision)" font-weight="600">3rd tone before non-3rd?</text>
      <text x="450" y="265" text-anchor="middle" font-size="10" fill="var(--muted)">e.g., ni + chi</text>

      <!-- YES -->
      <line x1="600" y1="250" x2="720" y2="250" stroke="var(--yes)" stroke-width="1.5" marker-end="url(#arrowY)"/>
      <text x="650" y="243" font-size="11" fill="var(--yes)" font-weight="600">YES</text>
      <rect x="720" y="230" width="160" height="42" rx="6" fill="var(--result-light)" stroke="var(--result)" stroke-width="1.5"/>
      <text x="800" y="248" text-anchor="middle" font-size="11" fill="var(--result)" font-weight="600">Use HALF 3rd tone</text>
      <text x="800" y="265" text-anchor="middle" font-size="10" fill="var(--muted)">Low dip, no rise</text>

      <!-- NO -->
      <line x1="450" y1="280" x2="450" y2="320" stroke="var(--no)" stroke-width="1.5" marker-end="url(#arrowN)"/>
      <text x="460" y="300" font-size="11" fill="var(--no)" font-weight="600">NO</text>

      <!-- RULE 3: Is the word bu? -->
      <polygon points="450,320 600,350 450,380 300,350" fill="var(--decision-light)" stroke="var(--decision)" stroke-width="2"/>
      <text x="450" y="347" text-anchor="middle" font-size="12" fill="var(--decision)" font-weight="600">Is the word bu (not)?</text>
      <text x="450" y="365" text-anchor="middle" font-size="10" fill="var(--muted)">bu = natively Tone 4</text>

      <!-- YES sub-branch -->
      <line x1="600" y1="350" x2="720" y2="350" stroke="var(--yes)" stroke-width="1.5" marker-end="url(#arrowY)"/>
      <text x="650" y="343" font-size="11" fill="var(--yes)" font-weight="600">YES</text>
      <polygon points="800,320 865,350 800,380 735,350" fill="var(--decision-light)" stroke="var(--decision)" stroke-width="1.5"/>
      <text x="800" y="347" text-anchor="middle" font-size="10" fill="var(--decision)" font-weight="600">Before T4?</text>

      <!-- bu before T4 = becomes T2 -->
      <line x1="865" y1="350" x2="890" y2="350" stroke="var(--yes)" stroke-width="1"/>
      <text x="860" y="340" font-size="9" fill="var(--yes)">Y</text>
      <!-- Inline result -->
      <text x="870" y="330" font-size="10" fill="var(--result)" font-weight="600" transform="rotate(0)">bu->bu(T2)</text>
      <text x="870" y="370" font-size="9" fill="var(--muted)">bu shi->bu shi</text>

      <!-- NO -->
      <line x1="450" y1="380" x2="450" y2="420" stroke="var(--no)" stroke-width="1.5" marker-end="url(#arrowN)"/>
      <text x="460" y="400" font-size="11" fill="var(--no)" font-weight="600">NO</text>

      <!-- RULE 4: Is the word yi? -->
      <polygon points="450,420 600,455 450,490 300,455" fill="var(--decision-light)" stroke="var(--decision)" stroke-width="2"/>
      <text x="450" y="452" text-anchor="middle" font-size="12" fill="var(--decision)" font-weight="600">Is the word yi (one)?</text>
      <text x="450" y="470" text-anchor="middle" font-size="10" fill="var(--muted)">yi = natively Tone 1</text>

      <!-- YES -->
      <line x1="600" y1="455" x2="670" y2="455" stroke="var(--yes)" stroke-width="1.5" marker-end="url(#arrowY)"/>
      <text x="630" y="448" font-size="11" fill="var(--yes)" font-weight="600">YES</text>

      <!-- Two sub-branches for yi -->
      <rect x="670" y="425" width="100" height="28" rx="5" fill="var(--result-light)" stroke="var(--result)" stroke-width="1.5"/>
      <text x="720" y="444" text-anchor="middle" font-size="10" fill="var(--result)" font-weight="600">Before T4:</text>
      <rect x="775" y="425" width="100" height="28" rx="5" fill="var(--result-light)" stroke="var(--result)" stroke-width="1.5"/>
      <text x="825" y="444" text-anchor="middle" font-size="10" fill="var(--result)" font-weight="600">yi -> T2</text>

      <rect x="670" y="460" width="100" height="28" rx="5" fill="var(--result-light)" stroke="var(--result)" stroke-width="1.5"/>
      <text x="720" y="478" text-anchor="middle" font-size="10" fill="var(--result)" font-weight="600">Before T1/2/3:</text>
      <rect x="775" y="460" width="100" height="28" rx="5" fill="var(--result-light)" stroke="var(--result)" stroke-width="1.5"/>
      <text x="825" y="478" text-anchor="middle" font-size="10" fill="var(--result)" font-weight="600">yi -> T4</text>

      <!-- NO -->
      <line x1="450" y1="490" x2="450" y2="530" stroke="var(--no)" stroke-width="1.5" marker-end="url(#arrowN)"/>
      <text x="460" y="510" font-size="11" fill="var(--no)" font-weight="600">NO</text>

      <!-- END: No change -->
      <rect x="350" y="530" width="200" height="40" rx="20" fill="var(--accent)" stroke="var(--accent)" stroke-width="2"/>
      <text x="450" y="555" text-anchor="middle" font-size="13" fill="white" font-weight="600">No tone change needed</text>

      <!-- English comparison box -->
      <rect x="30" y="590" width="840" height="90" rx="10" fill="var(--accent-light)" stroke="var(--accent)" stroke-width="1.5"/>
      <text x="450" y="615" text-anchor="middle" font-size="13" fill="var(--accent)" font-weight="700">ENGLISH COMPARISON: Stress Shift (Optional)</text>
      <text x="450" y="635" text-anchor="middle" font-size="11" fill="var(--fg)">English "THIRteen" -> "thirteen PEOPLE" (stress moves to avoid clash) -- but this is optional and variable.</text>
      <text x="450" y="655" text-anchor="middle" font-size="11" fill="var(--fg)">Chinese tone sandhi is OBLIGATORY and CATEGORICAL -- every native speaker applies these rules without exception.</text>
      <text x="450" y="673" text-anchor="middle" font-size="11" fill="var(--muted)" font-style="italic">English changes emphasis; Chinese changes pitch identity.</text>
    </svg>
  </div>
  <figcaption>
    <h2>Figure 3 -- Tone Sandhi Decision Flowchart</h2>
    <p>When tones combine in connected speech, Mandarin applies systematic pitch-change rules. The most important: two consecutive third tones cause the first to become a second tone. The words bu (not) and yi (one) each have their own sandhi patterns. These rules are obligatory -- unlike English stress adjustment, which is variable and optional.</p>
  </figcaption>
</figure>
</body>
</html>
