<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visual Representability Spectrum of Semantic Primes</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #f8f9fa;
    color: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 2rem;
  }
  figure {
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
    max-width: 1050px;
    width: 100%;
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid #e9ecef;
  }
  figcaption strong {
    display: block;
    font-size: 1.15rem;
    color: #1a1a2e;
    margin-bottom: 0.4rem;
  }
  figcaption span {
    font-size: 0.9rem;
    color: #6c757d;
    line-height: 1.5;
  }
  svg text { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
  .legend {
    display: flex;
    justify-content: center;
    gap: 1.5rem;
    margin-top: 1rem;
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.85rem;
    color: #495057;
  }
  .legend-swatch {
    width: 16px;
    height: 16px;
    border-radius: 4px;
  }
  .swatch-easy { background: #059669; }
  .swatch-medium { background: #d97706; }
  .swatch-hard { background: #dc2626; }
  @media (prefers-color-scheme: dark) {
    body { background: #1a1a2e; color: #e9ecef; }
    figure { background: #2d2d44; box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
    figcaption { border-top-color: #3d3d5c; }
    figcaption strong { color: #e9ecef; }
    figcaption span { color: #adb5bd; }
    .legend-item { color: #adb5bd; }
  }
</style>
</head>
<body>
<figure>
  <svg viewBox="0 0 950 520" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title-vr desc-vr">
    <title id="title-vr">Visual Representability Spectrum of Semantic Primes</title>
    <desc id="desc-vr">A horizontal spectrum dividing all 65 semantic primes into three zones: directly imageable (green, left), metaphorically groundable (amber, center), and necessarily conventional (red, right). Each zone lists its primes with annotations showing the visual representation strategy.</desc>

    <!-- Zone backgrounds -->
    <rect x="20" y="55" width="290" height="410" rx="12" fill="#dcfce7" opacity="0.4" stroke="#059669" stroke-width="1.5"/>
    <rect x="325" y="55" width="290" height="410" rx="12" fill="#fef3c7" opacity="0.4" stroke="#d97706" stroke-width="1.5"/>
    <rect x="630" y="55" width="300" height="410" rx="12" fill="#fee2e2" opacity="0.4" stroke="#dc2626" stroke-width="1.5"/>

    <!-- Zone headers -->
    <text x="165" y="35" text-anchor="middle" font-size="14" font-weight="bold" fill="#059669">DIRECTLY IMAGEABLE</text>
    <text x="165" y="50" text-anchor="middle" font-size="10" fill="#059669">~25 primes -- draw it</text>
    <text x="470" y="35" text-anchor="middle" font-size="14" font-weight="bold" fill="#d97706">METAPHORICALLY GROUNDABLE</text>
    <text x="470" y="50" text-anchor="middle" font-size="10" fill="#d97706">~20 primes -- use image schemas</text>
    <text x="780" y="35" text-anchor="middle" font-size="14" font-weight="bold" fill="#dc2626">NECESSARILY CONVENTIONAL</text>
    <text x="780" y="50" text-anchor="middle" font-size="10" fill="#dc2626">~20 primes -- learnable symbols</text>

    <!-- GREEN ZONE: Directly imageable -->
    <text x="40" y="85" font-size="11" fill="#1e3a5f" font-weight="bold">Space:</text>
    <text x="40" y="100" font-size="10" fill="#374151">ABOVE, BELOW -- vertical position</text>
    <text x="40" y="115" font-size="10" fill="#374151">NEAR, FAR -- distance</text>
    <text x="40" y="130" font-size="10" fill="#374151">INSIDE -- containment</text>
    <text x="40" y="145" font-size="10" fill="#374151">HERE, SIDE, TOUCH -- spatial relation</text>
    <text x="40" y="160" font-size="10" fill="#374151">WHERE/PLACE -- location marker</text>

    <text x="40" y="185" font-size="11" fill="#1e3a5f" font-weight="bold">Substantives:</text>
    <text x="40" y="200" font-size="10" fill="#374151">I -- pointing to self</text>
    <text x="40" y="215" font-size="10" fill="#374151">YOU -- pointing to other</text>
    <text x="40" y="230" font-size="10" fill="#374151">SOMEONE/PERSON -- figure</text>
    <text x="40" y="245" font-size="10" fill="#374151">PEOPLE -- group of figures</text>
    <text x="40" y="260" font-size="10" fill="#374151">BODY -- human form</text>

    <text x="40" y="285" font-size="11" fill="#1e3a5f" font-weight="bold">Descriptors &amp; Senses:</text>
    <text x="40" y="300" font-size="10" fill="#374151">BIG, SMALL -- relative size</text>
    <text x="40" y="315" font-size="10" fill="#374151">SEE -- eye symbol</text>
    <text x="40" y="330" font-size="10" fill="#374151">HEAR -- ear symbol</text>
    <text x="40" y="345" font-size="10" fill="#374151">MOVE -- motion arrow</text>

    <text x="40" y="370" font-size="11" fill="#1e3a5f" font-weight="bold">Life &amp; Quantity:</text>
    <text x="40" y="385" font-size="10" fill="#374151">LIVE, DIE -- alive/crossed-out figure</text>
    <text x="40" y="400" font-size="10" fill="#374151">ONE, TWO -- dots or tally marks</text>
    <text x="40" y="415" font-size="10" fill="#374151">PART OF -- piece detached from whole</text>

    <!-- AMBER ZONE: Metaphorically groundable -->
    <text x="345" y="85" font-size="11" fill="#1e3a5f" font-weight="bold">Via UP-DOWN metaphor:</text>
    <text x="345" y="100" font-size="10" fill="#374151">GOOD -- upward arrow (GOOD IS UP)</text>
    <text x="345" y="115" font-size="10" fill="#374151">BAD -- downward arrow (BAD IS DOWN)</text>

    <text x="345" y="140" font-size="11" fill="#1e3a5f" font-weight="bold">Via timeline metaphor:</text>
    <text x="345" y="155" font-size="10" fill="#374151">BEFORE -- left on horizontal line</text>
    <text x="345" y="170" font-size="10" fill="#374151">AFTER -- right on horizontal line</text>
    <text x="345" y="185" font-size="10" fill="#374151">NOW -- center point</text>
    <text x="345" y="200" font-size="10" fill="#374151">WHEN/TIME -- clock/timeline icon</text>
    <text x="345" y="215" font-size="10" fill="#374151">A LONG/SHORT TIME -- extended/brief</text>
    <text x="345" y="230" font-size="10" fill="#374151">MOMENT -- point on timeline</text>

    <text x="345" y="255" font-size="11" fill="#1e3a5f" font-weight="bold">Via body metaphor:</text>
    <text x="345" y="270" font-size="10" fill="#374151">FEEL -- hand over heart/chest</text>

    <text x="345" y="295" font-size="11" fill="#1e3a5f" font-weight="bold">Via quantity metaphor:</text>
    <text x="345" y="310" font-size="10" fill="#374151">SOME -- partial fill</text>
    <text x="345" y="325" font-size="10" fill="#374151">ALL -- complete fill</text>
    <text x="345" y="340" font-size="10" fill="#374151">MUCH/MANY -- overflowing container</text>

    <text x="345" y="365" font-size="11" fill="#1e3a5f" font-weight="bold">Via action metaphor:</text>
    <text x="345" y="380" font-size="10" fill="#374151">DO -- hand in action</text>
    <text x="345" y="395" font-size="10" fill="#374151">SOMETHING/THING -- abstract marker</text>
    <text x="345" y="410" font-size="10" fill="#374151">THIS -- pointing gesture</text>
    <text x="345" y="425" font-size="10" fill="#374151">FOR SOME TIME -- duration bracket</text>

    <!-- RED ZONE: Necessarily conventional -->
    <text x="650" y="85" font-size="11" fill="#1e3a5f" font-weight="bold">Logical (hardest):</text>
    <text x="650" y="100" font-size="10" fill="#374151">NOT -- blocked path? X mark?</text>
    <text x="650" y="115" font-size="10" fill="#374151">IF -- forking path? Branch?</text>
    <text x="650" y="130" font-size="10" fill="#374151">BECAUSE -- force arrow? Chain?</text>
    <text x="650" y="145" font-size="10" fill="#374151">MAYBE -- dashed line? Fog?</text>
    <text x="650" y="160" font-size="10" fill="#374151">CAN -- open gate? Possibility mark?</text>

    <text x="650" y="185" font-size="11" fill="#1e3a5f" font-weight="bold">Mental predicates:</text>
    <text x="650" y="200" font-size="10" fill="#374151">THINK -- thought bubble?</text>
    <text x="650" y="215" font-size="10" fill="#374151">KNOW -- solid thought bubble?</text>
    <text x="650" y="230" font-size="10" fill="#374151">WANT -- reaching arrow?</text>
    <text x="650" y="245" font-size="10" fill="#374151">DON'T WANT -- blocked reaching?</text>

    <text x="650" y="270" font-size="11" fill="#1e3a5f" font-weight="bold">Speech &amp; truth:</text>
    <text x="650" y="285" font-size="10" fill="#374151">SAY -- speech bubble</text>
    <text x="650" y="300" font-size="10" fill="#374151">WORDS -- text marks</text>
    <text x="650" y="315" font-size="10" fill="#374151">TRUE -- checkmark?</text>

    <text x="650" y="340" font-size="11" fill="#1e3a5f" font-weight="bold">Abstract relations:</text>
    <text x="650" y="355" font-size="10" fill="#374151">THE SAME -- equals sign?</text>
    <text x="650" y="370" font-size="10" fill="#374151">OTHER/ELSE -- divergence mark?</text>
    <text x="650" y="385" font-size="10" fill="#374151">KIND OF -- subset circle?</text>
    <text x="650" y="400" font-size="10" fill="#374151">LIKE/AS/WAY -- similarity wave?</text>
    <text x="650" y="415" font-size="10" fill="#374151">VERY -- emphasis mark</text>
    <text x="650" y="430" font-size="10" fill="#374151">MORE -- increase arrow</text>
    <text x="650" y="445" font-size="10" fill="#374151">HAPPEN, EXIST, BE, HAVE</text>

    <!-- Bottom annotation -->
    <rect x="20" y="475" width="910" height="35" rx="6" fill="#f8fafc" stroke="#94a3b8" stroke-width="1"/>
    <text x="475" y="497" text-anchor="middle" font-size="11" font-weight="bold" fill="#374151">The red zone is where the hardest visual language design challenges lie. These ~20 primes are needed for grammar, logic, and complex thought.</text>
  </svg>
  <div class="legend">
    <div class="legend-item"><div class="legend-swatch swatch-easy"></div> Directly imageable -- can be drawn (~25)</div>
    <div class="legend-item"><div class="legend-swatch swatch-medium"></div> Metaphorically groundable -- image schema bridge (~20)</div>
    <div class="legend-item"><div class="legend-swatch swatch-hard"></div> Necessarily conventional -- must be learned (~20)</div>
  </div>
  <figcaption>
    <strong>Diagram 3: Visual Representability Spectrum of Semantic Primes</strong>
    <span>All 65 semantic primes classified by how readily they can be visually represented. Spatial primes (ABOVE, BELOW, INSIDE) and concrete substantives (I, YOU, BODY) are directly imageable. Evaluators (GOOD, BAD) and temporal primes (BEFORE, AFTER) can be grounded through established conceptual metaphors (GOOD IS UP, TIME IS A HORIZONTAL LINE). But logical primes (NOT, IF, BECAUSE, MAYBE) and mental predicates (THINK, KNOW, WANT) resist iconic representation -- they require conventional symbols, possibly with metaphorical justification. The question marks in the red zone signal genuine open design problems.</span>
  </figcaption>
</figure>
</body>
</html>
