<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>From Primes to Complex Meaning -- The Explication Stack</title>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #f8f9fa;
    color: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 2rem;
  }
  figure {
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
    max-width: 1000px;
    width: 100%;
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid #e9ecef;
  }
  figcaption strong {
    display: block;
    font-size: 1.15rem;
    color: #1a1a2e;
    margin-bottom: 0.4rem;
  }
  figcaption span {
    font-size: 0.9rem;
    color: #6c757d;
    line-height: 1.5;
  }
  .mermaid {
    display: flex;
    justify-content: center;
  }
  .legend {
    display: flex;
    justify-content: center;
    gap: 1.5rem;
    margin-top: 1rem;
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.85rem;
    color: #495057;
  }
  .legend-swatch {
    width: 16px;
    height: 16px;
    border-radius: 4px;
  }
  .swatch-primes { background: #2563eb; }
  .swatch-molecules { background: #7c3aed; }
  .swatch-complex { background: #059669; }
  .swatch-example { background: #d97706; }
  @media (prefers-color-scheme: dark) {
    body { background: #1a1a2e; color: #e9ecef; }
    figure { background: #2d2d44; box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
    figcaption { border-top-color: #3d3d5c; }
    figcaption strong { color: #e9ecef; }
    figcaption span { color: #adb5bd; }
    .legend-item { color: #adb5bd; }
  }
</style>
</head>
<body>
<figure>
  <div class="mermaid">
%%{init: {'theme': 'neutral', 'themeVariables': {'fontSize': '12px'}}}%%
flowchart BT
    subgraph L1 ["LAYER 1: SEMANTIC PRIMES (65 atoms -- irreducible, universal)"]
        direction LR
        P1["I"]:::primes
        P2["FEEL"]:::primes
        P3["SOMETHING"]:::primes
        P4["GOOD"]:::primes
        P5["BAD"]:::primes
        P6["HAPPEN"]:::primes
        P7["WANT"]:::primes
        P8["THINK"]:::primes
        P9["BECAUSE"]:::primes
        P10["DO"]:::primes
        P11["...60 more"]:::primes
    end

    subgraph L2 ["LAYER 2: SEMANTIC MOLECULES (~25 universal, ~180 total for English)"]
        direction LR
        M1["HANDS"]:::molecules
        M2["MOUTH"]:::molecules
        M3["EAT"]:::molecules
        M4["WATER"]:::molecules
        M5["FIRE"]:::molecules
        M6["MAN"]:::molecules
        M7["WOMAN"]:::molecules
        M8["CHILD"]:::molecules
        M9["ROUND"]:::molecules
        M10["HARD"]:::molecules
    end

    subgraph L3 ["LAYER 3: COMPLEX CONCEPTS (unlimited -- any concept definable from below)"]
        direction LR
        C1["HAPPY"]:::complex
        C2["ANGRY"]:::complex
        C3["AFRAID"]:::complex
        C4["JUSTICE"]:::complex
        C5["BREAKFAST"]:::complex
        C6["JEALOUSY"]:::complex
    end

    L1 ==>|"Molecules defined<br/>entirely from primes"| L2
    L2 ==>|"Complex concepts<br/>from primes + molecules"| L3

    subgraph EXAMPLE ["TRACED EXAMPLE: How 'HAPPY' decomposes"]
        direction TB
        EX_TOP["<b>HAPPY</b>"]:::example
        EX1["X FELT SOMETHING GOOD at that time"]:::example
        EX2["X felt something like this:<br/>'something good is happening to me'<br/>'I want this'<br/>'this is good'"]:::example
        EX3["X felt like this because X thought something good"]:::example
        EX4["<i>Every word above is a semantic prime</i><br/>SOMEONE + FEEL + SOMETHING + GOOD + HAPPEN + WANT + THINK + BECAUSE + TIME"]:::example
        EX_TOP --> EX1 --> EX2 --> EX3 --> EX4
    end

    classDef primes fill:#dbeafe,stroke:#2563eb,stroke-width:2px,color:#1a1a2e
    classDef molecules fill:#f3e8ff,stroke:#7c3aed,stroke-width:2px,color:#1a1a2e
    classDef complex fill:#dcfce7,stroke:#059669,stroke-width:2px,color:#1a1a2e
    classDef example fill:#fef3c7,stroke:#d97706,stroke-width:2px,color:#1a1a2e
  </div>
  <div class="legend">
    <div class="legend-item"><div class="legend-swatch swatch-primes"></div> 65 semantic primes (irreducible)</div>
    <div class="legend-item"><div class="legend-swatch swatch-molecules"></div> Semantic molecules (defined from primes)</div>
    <div class="legend-item"><div class="legend-swatch swatch-complex"></div> Complex concepts (unlimited)</div>
    <div class="legend-item"><div class="legend-swatch swatch-example"></div> Traced explication example</div>
  </div>
  <figcaption>
    <strong>Diagram 2: From Primes to Complex Meaning -- The Explication Stack</strong>
    <span>NSM's three-layer architecture for meaning construction. Layer 1: 65 semantic primes -- irreducible, universal, found in every tested language. Layer 2: semantic molecules (~25 universal, ~180 catalogued for English) -- intermediate concepts defined entirely from primes (e.g., EAT = "X does something with the mouth to something; because of this, something goes inside X's body"). Layer 3: any complex concept, decomposed through "explication" into primes and molecules. The traced example shows how HAPPY decomposes into SOMEONE + FEEL + SOMETHING + GOOD + HAPPEN + WANT + THINK + BECAUSE. Based on Wierzbicka (1996), Goddard (2002).</span>
  </figcaption>
</figure>
<script>
  mermaid.initialize({ startOnLoad: true, securityLevel: 'loose', theme: 'neutral' });
</script>
</body>
</html>
