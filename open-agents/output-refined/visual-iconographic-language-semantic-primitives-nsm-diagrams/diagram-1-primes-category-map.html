<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The 65 Semantic Primes -- Category Map</title>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #f8f9fa;
    color: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 2rem;
  }
  figure {
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
    max-width: 1100px;
    width: 100%;
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid #e9ecef;
  }
  figcaption strong {
    display: block;
    font-size: 1.15rem;
    color: #1a1a2e;
    margin-bottom: 0.4rem;
  }
  figcaption span {
    font-size: 0.9rem;
    color: #6c757d;
    line-height: 1.5;
  }
  .mermaid {
    display: flex;
    justify-content: center;
  }
  .legend {
    display: flex;
    justify-content: center;
    gap: 1.5rem;
    margin-top: 1rem;
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.85rem;
    color: #495057;
  }
  .legend-swatch {
    width: 16px;
    height: 16px;
    border-radius: 4px;
  }
  .swatch-imageable { background: #059669; }
  .swatch-metaphor { background: #d97706; }
  .swatch-conventional { background: #dc2626; }
  .swatch-center { background: #2563eb; }
  @media (prefers-color-scheme: dark) {
    body { background: #1a1a2e; color: #e9ecef; }
    figure { background: #2d2d44; box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
    figcaption { border-top-color: #3d3d5c; }
    figcaption strong { color: #e9ecef; }
    figcaption span { color: #adb5bd; }
    .legend-item { color: #adb5bd; }
  }
</style>
</head>
<body>
<figure>
  <div class="mermaid">
%%{init: {'theme': 'neutral', 'themeVariables': {'fontSize': '11px'}}}%%
mindmap
  root(("65 SEMANTIC PRIMES<br/>Wierzbicka / Goddard"))
    Substantives
      I, YOU:::imageable
      SOMEONE/PERSON:::imageable
      PEOPLE:::imageable
      SOMETHING/THING:::metaphor
      BODY:::imageable
    Determiners
      THIS:::metaphor
      THE SAME:::conventional
      OTHER/ELSE:::conventional
    Quantifiers
      ONE, TWO:::imageable
      SOME, ALL:::metaphor
      MUCH/MANY:::metaphor
    Evaluators
      GOOD:::metaphor
      BAD:::metaphor
    Descriptors
      BIG:::imageable
      SMALL:::imageable
    Mental Predicates
      THINK:::conventional
      KNOW:::conventional
      WANT:::conventional
      DONT WANT:::conventional
      FEEL:::metaphor
      SEE:::imageable
      HEAR:::imageable
    Speech
      SAY:::conventional
      WORDS:::conventional
      TRUE:::conventional
    Actions/Events
      DO:::metaphor
      HAPPEN:::conventional
      MOVE:::imageable
    Existence
      THERE IS/EXIST:::conventional
      BE:::conventional
      HAVE:::conventional
    Life/Death
      LIVE:::imageable
      DIE:::imageable
    Time
      WHEN/TIME:::metaphor
      NOW:::metaphor
      BEFORE, AFTER:::metaphor
      A LONG TIME:::metaphor
      A SHORT TIME:::metaphor
      FOR SOME TIME:::metaphor
      MOMENT:::metaphor
    Space
      WHERE/PLACE:::imageable
      HERE:::imageable
      ABOVE, BELOW:::imageable
      FAR, NEAR:::imageable
      SIDE:::imageable
      INSIDE:::imageable
      TOUCH:::imageable
    Logical
      NOT:::conventional
      MAYBE:::conventional
      CAN:::conventional
      BECAUSE:::conventional
      IF:::conventional
    Intensifier
      VERY:::conventional
      MORE:::conventional
    Taxonomy
      KIND OF:::conventional
      PART OF:::imageable
    Similarity
      LIKE/AS/WAY:::conventional
  </div>
  <div class="legend">
    <div class="legend-item"><div class="legend-swatch swatch-imageable"></div> Directly imageable (~25 primes)</div>
    <div class="legend-item"><div class="legend-swatch swatch-metaphor"></div> Metaphorically groundable (~20 primes)</div>
    <div class="legend-item"><div class="legend-swatch swatch-conventional"></div> Necessarily conventional (~20 primes)</div>
  </div>
  <figcaption>
    <strong>Diagram 1: The 65 Semantic Primes -- Category Map</strong>
    <span>All 65 semantic primes identified by Wierzbicka and Goddard, organized into 15 categories. Color-coded by visual representability: green primes are directly imageable (ABOVE, BODY, BIG), amber primes can be metaphorically grounded through image schemas (GOOD via UP metaphor, BEFORE via timeline), and red primes are necessarily conventional -- they require arbitrary but learnable symbols (IF, NOT, BECAUSE, MAYBE). The red zone contains approximately 20 primes that represent the hardest design challenge for any visual language. Validated across 30+ typologically diverse languages. Based on NSM-Approach.net and Griffith University NSM Portal.</span>
  </figcaption>
</figure>
<script>
  mermaid.initialize({ startOnLoad: true, securityLevel: 'loose', theme: 'neutral' });
</script>
</body>
</html>
