<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Three-Layer Architecture for a Visual Language</title>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #f8f9fa;
    color: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 2rem;
  }
  figure {
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
    max-width: 1000px;
    width: 100%;
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid #e9ecef;
  }
  figcaption strong {
    display: block;
    font-size: 1.15rem;
    color: #1a1a2e;
    margin-bottom: 0.4rem;
  }
  figcaption span {
    font-size: 0.9rem;
    color: #6c757d;
    line-height: 1.5;
  }
  .mermaid {
    display: flex;
    justify-content: center;
  }
  .legend {
    display: flex;
    justify-content: center;
    gap: 1.5rem;
    margin-top: 1rem;
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.85rem;
    color: #495057;
  }
  .legend-swatch {
    width: 16px;
    height: 16px;
    border-radius: 4px;
  }
  .swatch-foundation { background: #059669; }
  .swatch-semantic { background: #2563eb; }
  .swatch-molecular { background: #7c3aed; }
  .swatch-open { background: #d97706; }
  @media (prefers-color-scheme: dark) {
    body { background: #1a1a2e; color: #e9ecef; }
    figure { background: #2d2d44; box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
    figcaption { border-top-color: #3d3d5c; }
    figcaption strong { color: #e9ecef; }
    figcaption span { color: #adb5bd; }
    .legend-item { color: #adb5bd; }
  }
</style>
</head>
<body>
<figure>
  <div class="mermaid">
%%{init: {'theme': 'neutral', 'themeVariables': {'fontSize': '12px'}}}%%
flowchart BT
    subgraph L0 ["LAYER 0: IMAGE SCHEMA FOUNDATION (visual primitives)"]
        direction LR
        IS1["CONTAINER<br/>enclosure"]:::foundation
        IS2["PATH<br/>source-goal"]:::foundation
        IS3["FORCE<br/>push-pull"]:::foundation
        IS4["BALANCE<br/>equilibrium"]:::foundation
        IS5["UP-DOWN<br/>vertical"]:::foundation
        IS6["LINK<br/>connection"]:::foundation
        IS7["SCALE<br/>gradient"]:::foundation
        IS8["CYCLE<br/>recurrence"]:::foundation
    end

    subgraph L1 ["LAYER 1: SEMANTIC PRIMES (65 meaning atoms mapped to visual symbols)"]
        direction LR
        SP1["<b>Imageable primes</b><br/>ABOVE, BELOW, INSIDE...<br/><i>Use image schema icons directly</i>"]:::semantic
        SP2["<b>Metaphor-bridged primes</b><br/>GOOD, BAD, BEFORE, AFTER...<br/><i>Use image schemas via metaphor</i>"]:::semantic
        SP3["<b>Conventional primes</b><br/>IF, NOT, BECAUSE, MAYBE...<br/><i>Learnable symbols with<br/>metaphorical justification</i>"]:::semantic
    end

    subgraph L2 ["LAYER 2: SEMANTIC MOLECULES (~25 universal building blocks)"]
        direction LR
        MOL1["HANDS, MOUTH, EYES"]:::molecular
        MOL2["EAT, DRINK, SLEEP"]:::molecular
        MOL3["WATER, FIRE, SUN"]:::molecular
        MOL4["MAN, WOMAN, CHILD"]:::molecular
        MOL5["ROUND, LONG, HARD"]:::molecular
    end

    subgraph L3 ["LAYER 3: OPEN COMPOSITION (any concept through visual explication)"]
        direction LR
        OC1["HAPPY = feel + good"]:::open
        OC2["ANGRY = feel + bad +<br/>someone did bad +<br/>want to do something"]:::open
        OC3["JUSTICE = good + someone +<br/>do + because + all + same"]:::open
        OC4["BREAKFAST = eat +<br/>time + begin + day"]:::open
    end

    L0 ==>|"Provides visual<br/>vocabulary"| L1
    L1 ==>|"Molecules composed<br/>from prime symbols"| L2
    L2 ==>|"Complex concepts via<br/>visual explication"| L3

    NOTE["<i>This architecture is a hypothesis -- not a proven design.<br/>The gap between layers 0 and 1 (grounding abstract primes)<br/>is where the hardest unsolved problems lie.</i>"]:::note

    classDef foundation fill:#dcfce7,stroke:#059669,stroke-width:2px,color:#1a1a2e
    classDef semantic fill:#dbeafe,stroke:#2563eb,stroke-width:2px,color:#1a1a2e
    classDef molecular fill:#f3e8ff,stroke:#7c3aed,stroke-width:2px,color:#1a1a2e
    classDef open fill:#fef3c7,stroke:#d97706,stroke-width:2px,color:#1a1a2e
    classDef note fill:#f3f4f6,stroke:#94a3b8,stroke-width:1px,color:#6b7280,font-style:italic
  </div>
  <div class="legend">
    <div class="legend-item"><div class="legend-swatch swatch-foundation"></div> Layer 0: Image schemas (visual primitives)</div>
    <div class="legend-item"><div class="legend-swatch swatch-semantic"></div> Layer 1: Semantic primes (65 meaning atoms)</div>
    <div class="legend-item"><div class="legend-swatch swatch-molecular"></div> Layer 2: Semantic molecules (~25 universal)</div>
    <div class="legend-item"><div class="legend-swatch swatch-open"></div> Layer 3: Open composition (unlimited)</div>
  </div>
  <figcaption>
    <strong>Diagram 5: Three-Layer Architecture for a Visual Language</strong>
    <span>A proposed architecture combining NSM's semantic framework with image schemas' visual vocabulary. Layer 0 provides the visual primitives (CONTAINER, PATH, FORCE, etc.). Layer 1 maps all 65 semantic primes to visual symbols -- imageable primes use schema icons directly, others use metaphorical or conventional symbols. Layer 2 composes semantic molecules from prime symbols. Layer 3 enables open-ended visual explication of any concept. This is a hypothesis for how a metaphor-based visual language could achieve both semasiographic universality and expressive generality. The critical design challenge lies in the connection between Layers 0 and 1 -- grounding abstract primes like IF, NOT, and BECAUSE in visual form.</span>
  </figcaption>
</figure>
<script>
  mermaid.initialize({ startOnLoad: true, securityLevel: 'loose', theme: 'neutral' });
</script>
</body>
</html>
