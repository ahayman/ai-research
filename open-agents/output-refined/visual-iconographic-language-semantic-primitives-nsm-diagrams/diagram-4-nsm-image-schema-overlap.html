<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NSM Primes vs. Image Schemas -- Overlap Map</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #f8f9fa;
    color: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 2rem;
  }
  figure {
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
    max-width: 950px;
    width: 100%;
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid #e9ecef;
  }
  figcaption strong {
    display: block;
    font-size: 1.15rem;
    color: #1a1a2e;
    margin-bottom: 0.4rem;
  }
  figcaption span {
    font-size: 0.9rem;
    color: #6c757d;
    line-height: 1.5;
  }
  svg text { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
  .legend {
    display: flex;
    justify-content: center;
    gap: 1.5rem;
    margin-top: 1rem;
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.85rem;
    color: #495057;
  }
  .legend-swatch {
    width: 16px;
    height: 16px;
    border-radius: 4px;
  }
  .swatch-primes { background: #2563eb; }
  .swatch-overlap { background: #7c3aed; }
  .swatch-schemas { background: #059669; }
  @media (prefers-color-scheme: dark) {
    body { background: #1a1a2e; color: #e9ecef; }
    figure { background: #2d2d44; box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
    figcaption { border-top-color: #3d3d5c; }
    figcaption strong { color: #e9ecef; }
    figcaption span { color: #adb5bd; }
    .legend-item { color: #adb5bd; }
  }
</style>
</head>
<body>
<figure>
  <svg viewBox="0 0 850 520" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title-venn desc-venn">
    <title id="title-venn">NSM Primes vs. Image Schemas -- Overlap Map</title>
    <desc id="desc-venn">A Venn diagram showing the overlap between NSM semantic primes and image schemas. The left circle contains primes without schema counterparts (IF, NOT, TRUE, etc.). The right circle contains schemas without prime counterparts (BALANCE, CYCLE, LINK, etc.). The overlap zone contains concepts shared by both frameworks (INSIDE/CONTAINER, ABOVE/UP-DOWN, MOVE/PATH, etc.).</desc>

    <!-- Left circle: NSM primes only -->
    <circle cx="310" cy="250" r="210" fill="#dbeafe" opacity="0.35" stroke="#2563eb" stroke-width="2"/>
    <!-- Right circle: Image schemas only -->
    <circle cx="540" cy="250" r="210" fill="#dcfce7" opacity="0.35" stroke="#059669" stroke-width="2"/>
    <!-- Overlap highlight -->
    <ellipse cx="425" cy="250" rx="95" ry="180" fill="#f3e8ff" opacity="0.35" stroke="#7c3aed" stroke-width="2"/>

    <!-- Labels -->
    <text x="195" y="70" text-anchor="middle" font-size="15" font-weight="bold" fill="#2563eb">NSM PRIMES</text>
    <text x="195" y="88" text-anchor="middle" font-size="11" fill="#2563eb">(semantic atoms)</text>
    <text x="655" y="70" text-anchor="middle" font-size="15" font-weight="bold" fill="#059669">IMAGE SCHEMAS</text>
    <text x="655" y="88" text-anchor="middle" font-size="11" fill="#059669">(spatial-bodily patterns)</text>
    <text x="425" y="95" text-anchor="middle" font-size="13" font-weight="bold" fill="#7c3aed">OVERLAP</text>
    <text x="425" y="110" text-anchor="middle" font-size="10" fill="#7c3aed">(visual sweet spot)</text>

    <!-- LEFT: Primes without schema equivalents -->
    <text x="170" y="140" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e3a5f">Abstract primes:</text>
    <text x="170" y="158" text-anchor="middle" font-size="10" fill="#374151">IF, NOT, MAYBE</text>
    <text x="170" y="173" text-anchor="middle" font-size="10" fill="#374151">BECAUSE, CAN</text>
    <text x="170" y="188" text-anchor="middle" font-size="10" fill="#374151">TRUE, THE SAME</text>
    <text x="170" y="208" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e3a5f">Mental/speech:</text>
    <text x="170" y="226" text-anchor="middle" font-size="10" fill="#374151">THINK, KNOW</text>
    <text x="170" y="241" text-anchor="middle" font-size="10" fill="#374151">SAY, WORDS</text>
    <text x="170" y="261" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e3a5f">Taxonomy:</text>
    <text x="170" y="279" text-anchor="middle" font-size="10" fill="#374151">KIND OF</text>
    <text x="170" y="294" text-anchor="middle" font-size="10" fill="#374151">LIKE/AS/WAY</text>
    <text x="170" y="314" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e3a5f">Intensifiers:</text>
    <text x="170" y="332" text-anchor="middle" font-size="10" fill="#374151">VERY, MORE</text>
    <text x="170" y="352" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e3a5f">Other:</text>
    <text x="170" y="370" text-anchor="middle" font-size="10" fill="#374151">OTHER/ELSE, HAVE</text>
    <text x="170" y="385" text-anchor="middle" font-size="10" fill="#374151">EXIST, BE, HAPPEN</text>
    <text x="170" y="400" text-anchor="middle" font-size="10" fill="#374151">DO, GOOD, BAD</text>

    <!-- CENTER: Overlap -->
    <text x="425" y="140" text-anchor="middle" font-size="10" font-weight="bold" fill="#4c1d95">INSIDE = CONTAINER</text>
    <text x="425" y="168" text-anchor="middle" font-size="10" font-weight="bold" fill="#4c1d95">ABOVE/BELOW = UP-DOWN</text>
    <text x="425" y="196" text-anchor="middle" font-size="10" font-weight="bold" fill="#4c1d95">NEAR/FAR = PROXIMITY</text>
    <text x="425" y="224" text-anchor="middle" font-size="10" font-weight="bold" fill="#4c1d95">MOVE = PATH/SOURCE-GOAL</text>
    <text x="425" y="252" text-anchor="middle" font-size="10" font-weight="bold" fill="#4c1d95">PART OF = PART-WHOLE</text>
    <text x="425" y="280" text-anchor="middle" font-size="10" font-weight="bold" fill="#4c1d95">TOUCH = CONTACT</text>
    <text x="425" y="308" text-anchor="middle" font-size="10" font-weight="bold" fill="#4c1d95">BIG/SMALL = SCALE</text>
    <text x="425" y="340" text-anchor="middle" font-size="9" fill="#6b21a8">Metaphorical bridges:</text>
    <text x="425" y="358" text-anchor="middle" font-size="9" fill="#6b21a8">BECAUSE ~ FORCE</text>
    <text x="425" y="373" text-anchor="middle" font-size="9" fill="#6b21a8">WANT ~ ATTRACTION</text>
    <text x="425" y="388" text-anchor="middle" font-size="9" fill="#6b21a8">NOT ~ BLOCKAGE</text>
    <text x="425" y="403" text-anchor="middle" font-size="9" fill="#6b21a8">IF ~ PATH-BRANCH</text>

    <!-- RIGHT: Schemas without prime equivalents -->
    <text x="680" y="140" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e3a5f">Spatial/dynamic:</text>
    <text x="680" y="158" text-anchor="middle" font-size="10" fill="#374151">BALANCE</text>
    <text x="680" y="173" text-anchor="middle" font-size="10" fill="#374151">CYCLE</text>
    <text x="680" y="188" text-anchor="middle" font-size="10" fill="#374151">LINK / CONNECTION</text>
    <text x="680" y="203" text-anchor="middle" font-size="10" fill="#374151">CENTER-PERIPHERY</text>
    <text x="680" y="218" text-anchor="middle" font-size="10" fill="#374151">SPLITTING / MERGING</text>
    <text x="680" y="233" text-anchor="middle" font-size="10" fill="#374151">FULL-EMPTY</text>
    <text x="680" y="258" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e3a5f">Force dynamics:</text>
    <text x="680" y="276" text-anchor="middle" font-size="10" fill="#374151">FORCE</text>
    <text x="680" y="291" text-anchor="middle" font-size="10" fill="#374151">COUNTERFORCE</text>
    <text x="680" y="306" text-anchor="middle" font-size="10" fill="#374151">COMPULSION</text>
    <text x="680" y="321" text-anchor="middle" font-size="10" fill="#374151">RESTRAINT</text>
    <text x="680" y="336" text-anchor="middle" font-size="10" fill="#374151">ENABLEMENT</text>
    <text x="680" y="361" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e3a5f">Other:</text>
    <text x="680" y="379" text-anchor="middle" font-size="10" fill="#374151">ITERATION</text>
    <text x="680" y="394" text-anchor="middle" font-size="10" fill="#374151">SURFACE</text>
    <text x="680" y="409" text-anchor="middle" font-size="10" fill="#374151">MASS-COUNT</text>

    <!-- Bottom insight -->
    <rect x="90" y="470" width="670" height="35" rx="6" fill="#f8fafc" stroke="#94a3b8" stroke-width="1"/>
    <text x="425" y="492" text-anchor="middle" font-size="11" font-weight="bold" fill="#374151">A visual language needs BOTH: the meaning inventory from NSM primes AND the visual vocabulary from image schemas.</text>
  </svg>
  <div class="legend">
    <div class="legend-item"><div class="legend-swatch swatch-primes"></div> NSM primes only (need visual grounding)</div>
    <div class="legend-item"><div class="legend-swatch swatch-overlap"></div> Overlap zone (both semantic and spatial)</div>
    <div class="legend-item"><div class="legend-swatch swatch-schemas"></div> Image schemas only (need semantic mapping)</div>
  </div>
  <figcaption>
    <strong>Diagram 4: NSM Primes vs. Image Schemas -- Overlap Map</strong>
    <span>NSM primes and image schemas are complementary inventories, not competitors. The overlap zone (purple) represents the "visual sweet spot" -- concepts that are both semantically primitive and spatially groundable (INSIDE/CONTAINER, ABOVE/UP-DOWN, MOVE/PATH). The left zone (blue) contains abstract primes that need visual grounding -- some can be metaphorically bridged (BECAUSE through FORCE, NOT through BLOCKAGE), but others remain genuinely hard. The right zone (green) contains image schemas that provide additional visual vocabulary beyond what NSM requires. A visual language needs both frameworks working together.</span>
  </figcaption>
</figure>
</body>
</html>
