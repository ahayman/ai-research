<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gelb's Teleological Model vs. Modern Understanding</title>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #f8f9fa;
    color: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 2rem;
  }
  figure {
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
    max-width: 1100px;
    width: 100%;
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid #e9ecef;
  }
  figcaption strong {
    display: block;
    font-size: 1.15rem;
    color: #1a1a2e;
    margin-bottom: 0.4rem;
  }
  figcaption span {
    font-size: 0.9rem;
    color: #6c757d;
    line-height: 1.5;
  }
  .mermaid {
    display: flex;
    justify-content: center;
  }
  .legend {
    display: flex;
    justify-content: center;
    gap: 1.5rem;
    margin-top: 1rem;
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.85rem;
    color: #495057;
  }
  .legend-swatch {
    width: 16px;
    height: 16px;
    border-radius: 4px;
  }
  .swatch-gelb { background: #dc2626; }
  .swatch-modern { background: #2563eb; }
  .swatch-counter { background: #059669; }
  @media (prefers-color-scheme: dark) {
    body { background: #1a1a2e; color: #e9ecef; }
    figure { background: #2d2d44; box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
    figcaption { border-top-color: #3d3d5c; }
    figcaption strong { color: #e9ecef; }
    figcaption span { color: #adb5bd; }
    .legend-item { color: #adb5bd; }
  }
</style>
</head>
<body>
<figure>
  <div class="mermaid">
%%{init: {'theme': 'neutral', 'themeVariables': {'fontSize': '12px'}}}%%
flowchart TD
    subgraph GELB ["GELB's MODEL (1952) -- Linear Teleology"]
        direction LR
        G1["<b>Semasiography</b><br/><i>Forerunner stage</i><br/>Pictographs, ideographs"]:::gelb
        G2["<b>Word-Syllabic</b><br/><i>Logographic</i><br/>Chinese, Cuneiform"]:::gelb
        G3["<b>Syllabic</b><br/><i>Syllabaries</i><br/>Kana, Linear B"]:::gelb
        G4["<b>Alphabetic</b><br/><i>Culmination</i><br/>Greek alphabet"]:::gelb
        G1 ==>|"inevitable<br/>progress"| G2 ==>|"inevitable<br/>progress"| G3 ==>|"inevitable<br/>progress"| G4
    end

    subgraph MODERN ["MODERN UNDERSTANDING -- Multiple Paths, No Teleology"]
        direction TB
        M_SEM["<b>Semasiographic</b><br/>Math, music, road signs<br/><i>Stable endpoint, not forerunner</i>"]:::modern
        M_MIXED["<b>Mixed Systems</b><br/>Chinese, Egyptian, Maya<br/><i>Stable endpoint, not transition</i>"]:::modern
        M_SYL["<b>Syllabic</b><br/>Kana, Cherokee<br/><i>Stable endpoint</i>"]:::modern
        M_ALPHA["<b>Alphabetic</b><br/>Latin, Cyrillic, Hangul<br/><i>One path, not the destination</i>"]:::modern
        M_EMOJI["<b>Emoji overlay</b><br/>Adds semasiography<br/>to alphabetic text<br/><i>Reverse direction</i>"]:::counter

        M_SEM <-.->|"bidirectional<br/>movement"| M_MIXED
        M_MIXED <-.->|"bidirectional<br/>movement"| M_SYL
        M_SYL <-.->|"bidirectional<br/>movement"| M_ALPHA
        M_ALPHA -.->|"modern text<br/>+ emoji"| M_EMOJI
    end

    subgraph EVIDENCE ["COUNTER-EVIDENCE TO TELEOLOGY"]
        direction LR
        E1["Chinese has not evolved<br/>toward alphabet in 3,000+ years"]:::counter
        E2["Emoji adds semasiographic<br/>elements to alphabetic text"]:::counter
        E3["Math notation succeeded<br/>as pure semasiography"]:::counter
        E4["Mesoamerican mixed systems<br/>were stable, not transitional"]:::counter
    end

    classDef gelb fill:#fee2e2,stroke:#dc2626,stroke-width:2px,color:#1a1a2e
    classDef modern fill:#dbeafe,stroke:#2563eb,stroke-width:2px,color:#1a1a2e
    classDef counter fill:#dcfce7,stroke:#059669,stroke-width:2px,color:#1a1a2e
  </div>
  <div class="legend">
    <div class="legend-item"><div class="legend-swatch swatch-gelb"></div> Gelb's teleological model (contested)</div>
    <div class="legend-item"><div class="legend-swatch swatch-modern"></div> Modern understanding (multiple paths)</div>
    <div class="legend-item"><div class="legend-swatch swatch-counter"></div> Counter-evidence / reverse movement</div>
  </div>
  <figcaption>
    <strong>Diagram 2: Gelb's Teleological Model vs. Modern Understanding</strong>
    <span>Gelb (1952) argued writing systems inevitably evolve from semasiography toward alphabetic representation -- a linear progression with the Greek alphabet as the "culmination." Modern scholarship rejects this teleology: Chinese has remained logographic for 3,000+ years, Mesoamerican mixed systems were stable endpoints, and emoji represents a modern movement back toward semasiographic elements. The modern model shows multiple parallel stable states with bidirectional movement, not a single evolutionary ladder.</span>
  </figcaption>
</figure>
<script>
  mermaid.initialize({ startOnLoad: true, securityLevel: 'loose', theme: 'neutral' });
</script>
</body>
</html>
