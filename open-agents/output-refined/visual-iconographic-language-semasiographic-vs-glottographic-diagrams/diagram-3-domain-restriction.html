<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Domain-Restricted vs. General-Purpose Semasiographic Systems</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #f8f9fa;
    color: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 2rem;
  }
  figure {
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
    max-width: 900px;
    width: 100%;
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid #e9ecef;
  }
  figcaption strong {
    display: block;
    font-size: 1.15rem;
    color: #1a1a2e;
    margin-bottom: 0.4rem;
  }
  figcaption span {
    font-size: 0.9rem;
    color: #6c757d;
    line-height: 1.5;
  }
  .legend {
    display: flex;
    justify-content: center;
    gap: 1.5rem;
    margin-top: 1rem;
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.85rem;
    color: #495057;
  }
  .legend-swatch {
    width: 16px;
    height: 16px;
    border-radius: 4px;
  }
  .swatch-natural { background: #6b7280; }
  .swatch-domain { background: #2563eb; }
  .swatch-gap { background: #fef3c7; border: 1px solid #d97706; }
  .swatch-target { background: #dc2626; }
  svg text { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
  @media (prefers-color-scheme: dark) {
    body { background: #1a1a2e; color: #e9ecef; }
    figure { background: #2d2d44; box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
    figcaption { border-top-color: #3d3d5c; }
    figcaption strong { color: #e9ecef; }
    figcaption span { color: #adb5bd; }
    .legend-item { color: #adb5bd; }
  }
</style>
</head>
<body>
<figure>
  <svg viewBox="0 0 800 550" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title-domain desc-domain">
    <title id="title-domain">Domain-Restricted vs. General-Purpose Semasiographic Systems</title>
    <desc id="desc-domain">Concentric circles showing that existing semasiographic systems (mathematics, music, chemistry, road signs, circuit diagrams) each occupy small, non-overlapping domains within the much larger space of all expressible propositions that natural language covers. The enormous gap between domain-restricted success and general-purpose expressiveness is highlighted.</desc>

    <defs>
      <marker id="arr2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
      </marker>
    </defs>

    <!-- Outer circle: all expressible propositions -->
    <circle cx="400" cy="270" r="235" fill="#f3f4f6" stroke="#6b7280" stroke-width="2.5"/>
    <text x="400" y="60" text-anchor="middle" font-size="14" font-weight="bold" fill="#374151">ALL EXPRESSIBLE PROPOSITIONS</text>
    <text x="400" y="78" text-anchor="middle" font-size="11" fill="#6b7280">(Natural language territory)</text>

    <!-- Domain circles -->
    <circle cx="200" cy="200" r="70" fill="#dbeafe" stroke="#2563eb" stroke-width="2" opacity="0.8"/>
    <text x="200" y="190" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e3a5f">Mathematics</text>
    <text x="200" y="206" text-anchor="middle" font-size="10" fill="#4b5563">Quantitative /</text>
    <text x="200" y="220" text-anchor="middle" font-size="10" fill="#4b5563">logical relations</text>

    <circle cx="350" cy="340" r="55" fill="#dcfce7" stroke="#059669" stroke-width="2" opacity="0.8"/>
    <text x="350" y="332" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e3a5f">Music</text>
    <text x="350" y="348" text-anchor="middle" font-size="10" fill="#4b5563">Acoustic</text>
    <text x="350" y="362" text-anchor="middle" font-size="10" fill="#4b5563">specification</text>

    <circle cx="520" cy="200" r="55" fill="#f3e8ff" stroke="#7c3aed" stroke-width="2" opacity="0.8"/>
    <text x="520" y="192" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e3a5f">Chemistry</text>
    <text x="520" y="208" text-anchor="middle" font-size="10" fill="#4b5563">Molecular</text>
    <text x="520" y="222" text-anchor="middle" font-size="10" fill="#4b5563">structure</text>

    <circle cx="560" cy="340" r="45" fill="#fef3c7" stroke="#d97706" stroke-width="2" opacity="0.8"/>
    <text x="560" y="332" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e3a5f">Road</text>
    <text x="560" y="348" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e3a5f">Signs</text>

    <circle cx="270" cy="360" r="40" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5" opacity="0.8"/>
    <text x="270" y="355" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e3a5f">Circuits</text>
    <text x="270" y="370" text-anchor="middle" font-size="9" fill="#4b5563">Electronics</text>

    <!-- The gap label -->
    <text x="400" y="430" text-anchor="middle" font-size="13" font-weight="bold" fill="#d97706">THE GAP</text>
    <text x="400" y="448" text-anchor="middle" font-size="11" fill="#d97706">Emotions, intentions, hypotheticals,</text>
    <text x="400" y="463" text-anchor="middle" font-size="11" fill="#d97706">counterfactuals, irony, poetry, narrative,</text>
    <text x="400" y="478" text-anchor="middle" font-size="11" fill="#d97706">social relations, abstract reasoning...</text>

    <!-- Arrow: proposed visual language bridging -->
    <path d="M400,500 L400,520 L700,520 L700,270" stroke="#dc2626" stroke-width="2" fill="none" stroke-dasharray="6,3" marker-end="url(#arr2)"/>
    <text x="680" y="260" text-anchor="end" font-size="10" font-weight="bold" fill="#dc2626">Proposed visual</text>
    <text x="680" y="273" text-anchor="end" font-size="10" font-weight="bold" fill="#dc2626">language ambition:</text>
    <text x="680" y="286" text-anchor="end" font-size="10" fill="#dc2626">bridge the gap</text>

    <!-- Properties that enable success -->
    <rect x="40" y="480" width="330" height="55" rx="6" fill="#f8fafc" stroke="#94a3b8" stroke-width="1"/>
    <text x="55" y="498" font-size="10" font-weight="bold" fill="#374151">Why domain-restricted systems succeed:</text>
    <text x="55" y="514" font-size="10" fill="#4b5563">1. Bounded domain  2. Shared context</text>
    <text x="55" y="528" font-size="10" fill="#4b5563">3. Finite vocabulary  4. Unambiguous semantics</text>
  </svg>
  <div class="legend">
    <div class="legend-item"><div class="legend-swatch swatch-natural"></div> Natural language coverage</div>
    <div class="legend-item"><div class="legend-swatch swatch-domain"></div> Domain-restricted semasiographic systems</div>
    <div class="legend-item"><div class="legend-swatch swatch-gap"></div> The unexpressed gap</div>
    <div class="legend-item"><div class="legend-swatch swatch-target"></div> Proposed visual language ambition</div>
  </div>
  <figcaption>
    <strong>Diagram 3: Domain-Restricted vs. General-Purpose Semasiographic Systems</strong>
    <span>Existing semasiographic systems succeed brilliantly within restricted domains -- mathematics for quantities, music for sound, chemistry for molecules, road signs for traffic. But each occupies a tiny fraction of the total space of expressible propositions. The vast gap encompasses emotions, hypotheticals, counterfactuals, social relationships, abstract reasoning, and narrative -- everything that natural language handles routinely. No semasiographic system has ever crossed this gap.</span>
  </figcaption>
</figure>
</body>
</html>
