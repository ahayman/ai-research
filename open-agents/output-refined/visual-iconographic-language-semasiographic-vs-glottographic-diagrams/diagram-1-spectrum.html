<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Semasiographic-Glottographic Spectrum</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #f8f9fa;
    color: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 2rem;
  }
  figure {
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
    max-width: 1000px;
    width: 100%;
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid #e9ecef;
  }
  figcaption strong {
    display: block;
    font-size: 1.15rem;
    color: #1a1a2e;
    margin-bottom: 0.4rem;
  }
  figcaption span {
    font-size: 0.9rem;
    color: #6c757d;
    line-height: 1.5;
  }
  .legend {
    display: flex;
    justify-content: center;
    gap: 1.5rem;
    margin-top: 1rem;
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.85rem;
    color: #495057;
  }
  .legend-swatch {
    width: 16px;
    height: 16px;
    border-radius: 4px;
  }
  .swatch-sema { background: #2563eb; }
  .swatch-mixed { background: #7c3aed; }
  .swatch-glotto { background: #059669; }
  .swatch-target { background: #dc2626; }
  svg text { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
  @media (prefers-color-scheme: dark) {
    body { background: #1a1a2e; color: #e9ecef; }
    figure { background: #2d2d44; box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
    figcaption { border-top-color: #3d3d5c; }
    figcaption strong { color: #e9ecef; }
    figcaption span { color: #adb5bd; }
    .legend-item { color: #adb5bd; }
  }
</style>
</head>
<body>
<figure>
  <svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title-spec desc-spec">
    <title id="title-spec">The Semasiographic-Glottographic Spectrum</title>
    <desc id="desc-spec">A horizontal spectrum showing writing systems positioned from purely semasiographic (meaning-representing, left) to purely glottographic (speech-representing, right). Mathematical notation and road signs are at the far left. Chinese characters occupy the center as a mixed system. Finnish orthography and IPA are at the far right. The proposed visual language target is marked near the semasiographic end.</desc>

    <defs>
      <linearGradient id="spectrumGrad" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="#dbeafe"/>
        <stop offset="50%" stop-color="#f3e8ff"/>
        <stop offset="100%" stop-color="#dcfce7"/>
      </linearGradient>
      <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
      </marker>
    </defs>

    <!-- Spectrum bar -->
    <rect x="60" y="180" width="780" height="60" rx="30" fill="url(#spectrumGrad)" stroke="#94a3b8" stroke-width="1.5"/>

    <!-- Axis labels -->
    <text x="60" y="270" text-anchor="start" font-size="14" font-weight="bold" fill="#2563eb">SEMASIOGRAPHIC</text>
    <text x="60" y="288" text-anchor="start" font-size="11" fill="#2563eb">Represents meaning directly</text>
    <text x="60" y="303" text-anchor="start" font-size="11" fill="#2563eb">Language-independent</text>

    <text x="840" y="270" text-anchor="end" font-size="14" font-weight="bold" fill="#059669">GLOTTOGRAPHIC</text>
    <text x="840" y="288" text-anchor="end" font-size="11" fill="#059669">Represents speech sounds</text>
    <text x="840" y="303" text-anchor="end" font-size="11" fill="#059669">Language-specific</text>

    <!-- Systems positioned along spectrum -->
    <!-- Math notation: pure semasiographic -->
    <line x1="110" y1="170" x2="110" y2="180" stroke="#2563eb" stroke-width="2"/>
    <rect x="55" y="105" width="110" height="60" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <text x="110" y="125" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e3a5f">Math Notation</text>
    <text x="110" y="140" text-anchor="middle" font-size="10" fill="#4b5563">2 + 3 = 5</text>
    <text x="110" y="155" text-anchor="middle" font-size="9" fill="#6b7280">Universal</text>

    <!-- Road signs -->
    <line x1="195" y1="170" x2="195" y2="180" stroke="#2563eb" stroke-width="2"/>
    <rect x="145" y="105" width="100" height="60" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <text x="195" y="125" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e3a5f">Road Signs</text>
    <text x="195" y="140" text-anchor="middle" font-size="10" fill="#4b5563">STOP octagon</text>
    <text x="195" y="155" text-anchor="middle" font-size="9" fill="#6b7280">Domain-restricted</text>

    <!-- Blissymbolics -->
    <line x1="300" y1="170" x2="300" y2="180" stroke="#2563eb" stroke-width="2"/>
    <rect x="245" y="105" width="110" height="60" rx="8" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
    <text x="300" y="125" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e3a5f">Blissymbolics</text>
    <text x="300" y="140" text-anchor="middle" font-size="10" fill="#4b5563">Semantic writing</text>
    <text x="300" y="155" text-anchor="middle" font-size="9" fill="#6b7280">Needs phonetic fallback</text>

    <!-- Egyptian hieroglyphs: mixed -->
    <line x1="430" y1="240" x2="430" y2="250" stroke="#7c3aed" stroke-width="2"/>
    <rect x="370" y="250" width="120" height="60" rx="8" fill="#f3e8ff" stroke="#7c3aed" stroke-width="2"/>
    <text x="430" y="270" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e3a5f">Egyptian</text>
    <text x="430" y="285" text-anchor="middle" font-size="10" fill="#4b5563">Logo + phonetic +</text>
    <text x="430" y="300" text-anchor="middle" font-size="10" fill="#4b5563">determinatives</text>

    <!-- Chinese: mixed -->
    <line x1="520" y1="170" x2="520" y2="180" stroke="#7c3aed" stroke-width="2"/>
    <rect x="460" y="105" width="120" height="60" rx="8" fill="#f3e8ff" stroke="#7c3aed" stroke-width="2"/>
    <text x="520" y="125" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e3a5f">Chinese</text>
    <text x="520" y="140" text-anchor="middle" font-size="10" fill="#4b5563">Semantic + phonetic</text>
    <text x="520" y="155" text-anchor="middle" font-size="9" fill="#6b7280">80%+ compounds</text>

    <!-- Japanese -->
    <line x1="620" y1="240" x2="620" y2="250" stroke="#7c3aed" stroke-width="2"/>
    <rect x="565" y="250" width="110" height="60" rx="8" fill="#f3e8ff" stroke="#7c3aed" stroke-width="2"/>
    <text x="620" y="270" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e3a5f">Japanese</text>
    <text x="620" y="285" text-anchor="middle" font-size="10" fill="#4b5563">Kanji + kana</text>
    <text x="620" y="300" text-anchor="middle" font-size="10" fill="#4b5563">mixed system</text>

    <!-- Latin alphabet -->
    <line x1="720" y1="170" x2="720" y2="180" stroke="#059669" stroke-width="2"/>
    <rect x="670" y="105" width="100" height="60" rx="8" fill="#dcfce7" stroke="#059669" stroke-width="2"/>
    <text x="720" y="125" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e3a5f">Latin Alphabet</text>
    <text x="720" y="140" text-anchor="middle" font-size="10" fill="#4b5563">Phonemic</text>
    <text x="720" y="155" text-anchor="middle" font-size="9" fill="#6b7280">Language-specific</text>

    <!-- IPA: pure glottographic -->
    <line x1="800" y1="240" x2="800" y2="250" stroke="#059669" stroke-width="2"/>
    <rect x="750" y="250" width="100" height="60" rx="8" fill="#dcfce7" stroke="#059669" stroke-width="2"/>
    <text x="800" y="270" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e3a5f">IPA</text>
    <text x="800" y="285" text-anchor="middle" font-size="10" fill="#4b5563">Pure phonetic</text>
    <text x="800" y="300" text-anchor="middle" font-size="10" fill="#4b5563">transcription</text>

    <!-- Target zone for proposed visual language -->
    <ellipse cx="260" cy="50" rx="90" ry="25" fill="none" stroke="#dc2626" stroke-width="2.5" stroke-dasharray="6,3"/>
    <text x="260" y="45" text-anchor="middle" font-size="10" font-weight="bold" fill="#dc2626">PROPOSED VISUAL LANGUAGE</text>
    <text x="260" y="58" text-anchor="middle" font-size="9" fill="#dc2626">Primarily semasiographic with phonetic bridge</text>
    <line x1="260" y1="75" x2="260" y2="100" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr)"/>

    <!-- Section labels on spectrum -->
    <text x="150" y="205" text-anchor="middle" font-size="10" fill="#2563eb" font-weight="bold">Pure meaning</text>
    <text x="450" y="220" text-anchor="middle" font-size="10" fill="#7c3aed" font-weight="bold">Mixed systems</text>
    <text x="760" y="205" text-anchor="middle" font-size="10" fill="#059669" font-weight="bold">Pure sound</text>

    <!-- Title -->
    <text x="450" y="390" text-anchor="middle" font-size="12" fill="#374151" font-style="italic">The distinction is a spectrum, not a binary. Most successful writing systems are mixed.</text>
  </svg>
  <div class="legend">
    <div class="legend-item"><div class="legend-swatch swatch-sema"></div> Semasiographic (meaning-based)</div>
    <div class="legend-item"><div class="legend-swatch swatch-mixed"></div> Mixed systems</div>
    <div class="legend-item"><div class="legend-swatch swatch-glotto"></div> Glottographic (speech-based)</div>
    <div class="legend-item"><div class="legend-swatch swatch-target"></div> Proposed visual language target</div>
  </div>
  <figcaption>
    <strong>Diagram 1: The Semasiographic-Glottographic Spectrum</strong>
    <span>All writing systems fall on a continuum from purely semasiographic (representing meaning directly, language-independent) to purely glottographic (representing speech sounds, language-specific). Mathematical notation and road signs are purely semasiographic but domain-restricted. Chinese characters are a mixed system with both semantic and phonetic components. A metaphor-based visual language would aim to be primarily semasiographic while including a phonetic bridge subsystem for proper names and borrowed terms. Based on Gelb (1952), Sampson, and modern typological analysis.</span>
  </figcaption>
</figure>
</body>
</html>
