<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expressive Power Requirements Matrix</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #f8f9fa;
    color: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 2rem;
  }
  figure {
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
    max-width: 1000px;
    width: 100%;
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid #e9ecef;
  }
  figcaption strong {
    display: block;
    font-size: 1.15rem;
    color: #1a1a2e;
    margin-bottom: 0.4rem;
  }
  figcaption span {
    font-size: 0.9rem;
    color: #6c757d;
    line-height: 1.5;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    margin: 0.5rem 0;
    font-size: 0.85rem;
  }
  th {
    background: #f1f5f9;
    padding: 0.7rem 0.5rem;
    text-align: center;
    border: 1px solid #e2e8f0;
    font-size: 0.8rem;
    color: #374151;
  }
  th.capability {
    text-align: left;
    min-width: 140px;
  }
  td {
    padding: 0.5rem;
    text-align: center;
    border: 1px solid #e2e8f0;
    font-size: 0.85rem;
  }
  .yes { background: #dcfce7; color: #166534; font-weight: bold; }
  .no { background: #fee2e2; color: #991b1b; font-weight: bold; }
  .partial { background: #fef3c7; color: #92400e; font-weight: bold; }
  .unknown { background: #f3e8ff; color: #6b21a8; font-weight: bold; }
  .legend {
    display: flex;
    justify-content: center;
    gap: 1.5rem;
    margin-top: 1rem;
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.85rem;
    color: #495057;
  }
  .legend-swatch {
    width: 16px;
    height: 16px;
    border-radius: 4px;
  }
  .swatch-yes { background: #dcfce7; border: 1px solid #166534; }
  .swatch-partial { background: #fef3c7; border: 1px solid #92400e; }
  .swatch-no { background: #fee2e2; border: 1px solid #991b1b; }
  .swatch-unknown { background: #f3e8ff; border: 1px solid #6b21a8; }
  @media (prefers-color-scheme: dark) {
    body { background: #1a1a2e; color: #e9ecef; }
    figure { background: #2d2d44; box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
    figcaption { border-top-color: #3d3d5c; }
    figcaption strong { color: #e9ecef; }
    figcaption span { color: #adb5bd; }
    .legend-item { color: #adb5bd; }
    th { background: #3d3d5c; color: #e9ecef; border-color: #4d4d6c; }
    td { border-color: #4d4d6c; color: #e9ecef; }
    .yes { background: #064e3b; color: #6ee7b7; }
    .no { background: #7f1d1d; color: #fca5a5; }
    .partial { background: #78350f; color: #fcd34d; }
    .unknown { background: #4c1d95; color: #c4b5fd; }
  }
</style>
</head>
<body>
<figure>
  <table>
    <thead>
      <tr>
        <th class="capability">Expressive Capability</th>
        <th>Math<br/>Notation</th>
        <th>Road<br/>Signs</th>
        <th>Bliss-<br/>symbolics</th>
        <th>Emoji</th>
        <th>Chinese<br/>(mixed)</th>
        <th>Natural<br/>Language</th>
        <th>Proposed<br/>Visual Lang.</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td class="capability" style="text-align:left; font-weight:bold;">Novel propositions</td>
        <td class="yes">Yes</td>
        <td class="no">No</td>
        <td class="partial">Limited</td>
        <td class="no">No</td>
        <td class="yes">Yes</td>
        <td class="yes">Yes</td>
        <td class="unknown">Goal</td>
      </tr>
      <tr>
        <td class="capability" style="text-align:left; font-weight:bold;">Negation</td>
        <td class="yes">Yes</td>
        <td class="partial">Limited</td>
        <td class="yes">Yes</td>
        <td class="no">No</td>
        <td class="yes">Yes</td>
        <td class="yes">Yes</td>
        <td class="unknown">Goal</td>
      </tr>
      <tr>
        <td class="capability" style="text-align:left; font-weight:bold;">Counterfactuals</td>
        <td class="no">No</td>
        <td class="no">No</td>
        <td class="partial">Cumbersome</td>
        <td class="no">No</td>
        <td class="yes">Yes</td>
        <td class="yes">Yes</td>
        <td class="unknown">Goal</td>
      </tr>
      <tr>
        <td class="capability" style="text-align:left; font-weight:bold;">Temporal displacement</td>
        <td class="no">No</td>
        <td class="no">No</td>
        <td class="partial">Basic</td>
        <td class="no">No</td>
        <td class="yes">Yes</td>
        <td class="yes">Yes</td>
        <td class="unknown">Goal</td>
      </tr>
      <tr>
        <td class="capability" style="text-align:left; font-weight:bold;">Quantification</td>
        <td class="yes">Yes</td>
        <td class="no">No</td>
        <td class="partial">Basic</td>
        <td class="no">No</td>
        <td class="yes">Yes</td>
        <td class="yes">Yes</td>
        <td class="unknown">Goal</td>
      </tr>
      <tr>
        <td class="capability" style="text-align:left; font-weight:bold;">Recursion / embedding</td>
        <td class="yes">Yes</td>
        <td class="no">No</td>
        <td class="no">No</td>
        <td class="no">No</td>
        <td class="yes">Yes</td>
        <td class="yes">Yes</td>
        <td class="unknown">Goal</td>
      </tr>
      <tr>
        <td class="capability" style="text-align:left; font-weight:bold;">Proper names</td>
        <td class="no">No</td>
        <td class="no">No</td>
        <td class="no">No</td>
        <td class="no">No</td>
        <td class="yes">Yes</td>
        <td class="yes">Yes</td>
        <td class="unknown">Needs bridge</td>
      </tr>
      <tr>
        <td class="capability" style="text-align:left; font-weight:bold;">Metalinguistic reference</td>
        <td class="partial">Limited</td>
        <td class="no">No</td>
        <td class="no">No</td>
        <td class="no">No</td>
        <td class="yes">Yes</td>
        <td class="yes">Yes</td>
        <td class="unknown">Goal</td>
      </tr>
      <tr>
        <td class="capability" style="text-align:left; font-weight:bold;">Irony / pragmatics</td>
        <td class="no">No</td>
        <td class="no">No</td>
        <td class="no">No</td>
        <td class="partial">Crude</td>
        <td class="yes">Yes</td>
        <td class="yes">Yes</td>
        <td class="unknown">Open question</td>
      </tr>
      <tr>
        <td class="capability" style="text-align:left; font-weight:bold;">Language-independent</td>
        <td class="yes">Yes</td>
        <td class="yes">Yes</td>
        <td class="yes">Yes</td>
        <td class="partial">Mostly</td>
        <td class="no">No</td>
        <td class="no">No</td>
        <td class="unknown">Goal</td>
      </tr>
    </tbody>
  </table>
  <div class="legend">
    <div class="legend-item"><div class="legend-swatch swatch-yes"></div> Full capability</div>
    <div class="legend-item"><div class="legend-swatch swatch-partial"></div> Partial / limited</div>
    <div class="legend-item"><div class="legend-swatch swatch-no"></div> Cannot do</div>
    <div class="legend-item"><div class="legend-swatch swatch-unknown"></div> Design goal / open question</div>
  </div>
  <figcaption>
    <strong>Diagram 5: Expressive Power Requirements Matrix</strong>
    <span>A feature matrix mapping which expressive capabilities each system type can achieve. Domain-restricted semasiographic systems (math, road signs) are language-independent but expressively limited. Chinese achieves full expressiveness but is language-specific. Natural language achieves everything but is language-specific. No existing semasiographic system achieves both full expressiveness and language-independence. The proposed visual language must fill every cell in the rightmost column -- and the purple "open question" cells mark where the hardest unsolved design challenges lie.</span>
  </figcaption>
</figure>
</body>
</html>
