<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chinese Characters as a Mixed Semasiographic-Glottographic System</title>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #f8f9fa;
    color: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 2rem;
  }
  figure {
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
    max-width: 1000px;
    width: 100%;
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid #e9ecef;
  }
  figcaption strong {
    display: block;
    font-size: 1.15rem;
    color: #1a1a2e;
    margin-bottom: 0.4rem;
  }
  figcaption span {
    font-size: 0.9rem;
    color: #6c757d;
    line-height: 1.5;
  }
  .mermaid {
    display: flex;
    justify-content: center;
  }
  .legend {
    display: flex;
    justify-content: center;
    gap: 1.5rem;
    margin-top: 1rem;
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.85rem;
    color: #495057;
  }
  .legend-swatch {
    width: 16px;
    height: 16px;
    border-radius: 4px;
  }
  .swatch-semantic { background: #2563eb; }
  .swatch-phonetic { background: #059669; }
  .swatch-character { background: #7c3aed; }
  .swatch-insight { background: #d97706; }
  @media (prefers-color-scheme: dark) {
    body { background: #1a1a2e; color: #e9ecef; }
    figure { background: #2d2d44; box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
    figcaption { border-top-color: #3d3d5c; }
    figcaption strong { color: #e9ecef; }
    figcaption span { color: #adb5bd; }
    .legend-item { color: #adb5bd; }
  }
</style>
</head>
<body>
<figure>
  <div class="mermaid">
%%{init: {'theme': 'neutral', 'themeVariables': {'fontSize': '13px'}}}%%
flowchart TD
    TITLE["<b>CHINESE SEMANTIC-PHONETIC COMPOUNDS</b><br/><i>80%+ of all Chinese characters</i>"]:::title

    subgraph EX1 ["Example 1: Mother"]
        direction LR
        S1["<b>Semantic Radical</b><br/>女 nu -- woman/female<br/><i>SEMASIOGRAPHIC</i><br/>Cross-linguistically transparent"]:::semantic
        P1["<b>Phonetic Radical</b><br/>马 ma -- horse<br/><i>GLOTTOGRAPHIC</i><br/>Sound hint: ma"]:::phonetic
        C1["<b>Combined Character</b><br/>妈 ma -- mother"]:::character
        S1 -->|"meaning domain"| C1
        P1 -->|"pronunciation hint"| C1
    end

    subgraph EX2 ["Example 2: River"]
        direction LR
        S2["<b>Semantic Radical</b><br/>氵 -- water drops<br/><i>SEMASIOGRAPHIC</i><br/>Anyone can guess: water-related"]:::semantic
        P2["<b>Phonetic Radical</b><br/>可 ke<br/><i>GLOTTOGRAPHIC</i><br/>Sound hint: he"]:::phonetic
        C2["<b>Combined Character</b><br/>河 he -- river"]:::character
        S2 -->|"meaning domain"| C2
        P2 -->|"pronunciation hint"| C2
    end

    subgraph EX3 ["Example 3: Emotion"]
        direction LR
        S3["<b>Semantic Radical</b><br/>忄 -- heart/mind<br/><i>SEMASIOGRAPHIC</i><br/>Emotion/thought domain"]:::semantic
        P3["<b>Phonetic Radical</b><br/>青 qing<br/><i>GLOTTOGRAPHIC</i><br/>Sound hint: qing"]:::phonetic
        C3["<b>Combined Character</b><br/>情 qing -- emotion"]:::character
        S3 -->|"meaning domain"| C3
        P3 -->|"pronunciation hint"| C3
    end

    subgraph INSIGHT ["KEY INSIGHT FOR VISUAL LANGUAGE DESIGN"]
        direction TB
        I1["The semantic radical <b>travels across languages</b><br/>A Korean reader of hanja recognizes 氵 = water-related"]:::insight
        I2["The phonetic radical <b>does not travel</b><br/>It only works if you know Mandarin pronunciation"]:::insight
        I3["<b>Design lesson:</b> A viable visual language may need<br/>to be primarily semasiographic with a carefully<br/>designed phonetic subsystem -- exactly the mixed<br/>strategy Chinese evolved over millennia"]:::insight
        I1 --- I2 --- I3
    end

    TITLE --> EX1
    TITLE --> EX2
    TITLE --> EX3
    EX1 --> INSIGHT
    EX2 --> INSIGHT
    EX3 --> INSIGHT

    classDef title fill:#f3f4f6,stroke:#6b7280,stroke-width:2px,color:#1a1a2e
    classDef semantic fill:#dbeafe,stroke:#2563eb,stroke-width:2px,color:#1a1a2e
    classDef phonetic fill:#dcfce7,stroke:#059669,stroke-width:2px,color:#1a1a2e
    classDef character fill:#f3e8ff,stroke:#7c3aed,stroke-width:2px,color:#1a1a2e
    classDef insight fill:#fef3c7,stroke:#d97706,stroke-width:2px,color:#1a1a2e
  </div>
  <div class="legend">
    <div class="legend-item"><div class="legend-swatch swatch-semantic"></div> Semantic radical (semasiographic)</div>
    <div class="legend-item"><div class="legend-swatch swatch-phonetic"></div> Phonetic radical (glottographic)</div>
    <div class="legend-item"><div class="legend-swatch swatch-character"></div> Combined character</div>
    <div class="legend-item"><div class="legend-swatch swatch-insight"></div> Design insight</div>
  </div>
  <figcaption>
    <strong>Diagram 4: Chinese Characters as a Mixed Semasiographic-Glottographic System</strong>
    <span>Over 80% of Chinese characters are semantic-phonetic compounds containing both a semasiographic element (semantic radical indicating meaning domain) and a glottographic element (phonetic radical hinting at pronunciation). The semantic radical crosses language boundaries -- anyone can infer that characters with 氵 relate to water. The phonetic radical is language-specific -- useless without knowing Mandarin. This mixed strategy, evolved over millennia, may represent the only viable architecture for a visual language that must interface with the spoken world.</span>
  </figcaption>
</figure>
<script>
  mermaid.initialize({ startOnLoad: true, securityLevel: 'loose', theme: 'neutral' });
</script>
</body>
</html>
