<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vocal Tract: Arabic vs. English Articulation Zones</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --surface: #f8f9fa;
    --border: #dee2e6;
    --accent: #2563eb;
    --accent-light: #dbeafe;
    --shared: #22c55e;
    --shared-bg: #dcfce7;
    --arabic-only: #e67e22;
    --arabic-bg: #fef3e2;
    --english-only: #6366f1;
    --english-bg: #e8e8ff;
    --muted: #6c757d;
    --caption-bg: #f8f9fa;
    --label: #374151;
    --danger: #ef4444;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --fg: #e8e8f0;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --accent: #6b8aff;
      --accent-light: #1e2a4a;
      --shared: #4ade80;
      --shared-bg: #14532d;
      --arabic-only: #f59e0b;
      --arabic-bg: #4a3520;
      --english-only: #818cf8;
      --english-bg: #2e2e5a;
      --muted: #9a9ab0;
      --caption-bg: #1a1a2e;
      --label: #c8c8d8;
      --danger: #f87171;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  figure { max-width: 1100px; width: 100%; }
  .diagram-container {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.5rem 1rem;
    overflow-x: auto;
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding: 1rem 1.5rem;
    background: var(--caption-bg);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  .legend {
    display: flex; gap: 1.5rem; justify-content: center; flex-wrap: wrap;
    margin-top: 1rem; font-size: 0.82rem; color: var(--muted);
  }
  .legend-item { display: flex; align-items: center; gap: 0.4rem; }
  .legend-swatch { width: 14px; height: 14px; border-radius: 3px; border: 1px solid var(--border); }
  svg { display: block; margin: 0 auto; }
  .ipa { font: 15px 'Gentium Plus', 'Noto Sans', 'DejaVu Sans', serif; }
  .title-text { font: bold 14px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
  .subtitle-text { font: 11px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
</style>
</head>
<body>
<figure>
  <div class="diagram-container">
    <svg viewBox="0 0 1060 680" xmlns="http://www.w3.org/2000/svg" style="min-width:780px;">
      <text x="530" y="28" text-anchor="middle" class="title-text" style="font-size:16px;">The Vocal Tract: Lips to Glottis</text>
      <text x="530" y="46" text-anchor="middle" class="subtitle-text">Arabic uses the FULL depth -- English clusters in the front half</text>

      <!-- Sagittal cross-section outline -->
      <g transform="translate(80,60)">
        <!-- Tract outline - simplified sagittal view -->
        <path d="M 60,40 Q 80,20 120,15 Q 180,5 250,10 Q 320,15 370,30 Q 420,50 440,80 Q 460,110 460,150 Q 460,200 440,250 Q 420,300 390,340 Q 370,360 360,390 Q 355,420 360,450"
              fill="none" stroke="var(--border)" stroke-width="2.5"/>
        <!-- Lower jaw/tongue area -->
        <path d="M 60,120 Q 80,100 130,90 Q 200,80 260,85 Q 320,95 360,130 Q 390,160 400,200 Q 410,250 400,300 Q 390,340 360,390"
              fill="none" stroke="var(--border)" stroke-width="2.5"/>

        <!-- ZONE LABELS & SHADING -->

        <!-- 1. Labial zone - SHARED -->
        <rect x="30" y="50" width="60" height="80" rx="6" fill="var(--shared)" opacity="0.2" stroke="var(--shared)" stroke-width="1.5"/>
        <text x="60" y="145" text-anchor="middle" style="font: bold 11px system-ui; fill: var(--shared);">Labial</text>
        <text x="60" y="158" text-anchor="middle" class="ipa" style="font-size:11px; fill: var(--fg);">/b/ /m/ /f/ /w/</text>

        <!-- 2. Dental/Alveolar zone - SHARED -->
        <rect x="100" y="15" width="100" height="80" rx="6" fill="var(--shared)" opacity="0.2" stroke="var(--shared)" stroke-width="1.5"/>
        <text x="150" y="110" text-anchor="middle" style="font: bold 11px system-ui; fill: var(--shared);">Dental/Alveolar</text>
        <text x="150" y="123" text-anchor="middle" class="ipa" style="font-size:10px; fill: var(--fg);">/t/ /d/ /s/ /z/ /n/ /l/ /r/</text>
        <text x="150" y="136" text-anchor="middle" class="ipa" style="font-size:10px; fill: var(--fg);">/θ/ /ð/</text>

        <!-- 3. Palatal zone - SHARED -->
        <rect x="210" y="5" width="80" height="60" rx="6" fill="var(--shared)" opacity="0.2" stroke="var(--shared)" stroke-width="1.5"/>
        <text x="250" y="80" text-anchor="middle" style="font: bold 11px system-ui; fill: var(--shared);">Palatal</text>
        <text x="250" y="93" text-anchor="middle" class="ipa" style="font-size:11px; fill: var(--fg);">/ʃ/ /j/ /dʒ/</text>

        <!-- 4. Velar zone - SHARED -->
        <rect x="310" y="20" width="70" height="60" rx="6" fill="var(--shared)" opacity="0.2" stroke="var(--shared)" stroke-width="1.5"/>
        <text x="345" y="95" text-anchor="middle" style="font: bold 11px system-ui; fill: var(--shared);">Velar</text>
        <text x="345" y="108" text-anchor="middle" class="ipa" style="font-size:11px; fill: var(--fg);">/k/ /g/</text>

        <!-- 5. Uvular zone - ARABIC ONLY -->
        <rect x="395" y="60" width="80" height="80" rx="6" fill="var(--arabic-only)" opacity="0.25" stroke="var(--arabic-only)" stroke-width="2"/>
        <text x="435" y="155" text-anchor="middle" style="font: bold 11px system-ui; fill: var(--arabic-only);">Uvular</text>
        <text x="435" y="168" text-anchor="middle" class="ipa" style="font-size:11px; fill: var(--fg);">/q/ /χ/ /ʁ/</text>
        <text x="435" y="181" text-anchor="middle" style="font: 10px system-ui; fill: var(--arabic-only);">ARABIC ONLY</text>

        <!-- 6. Pharyngeal zone - ARABIC ONLY -->
        <rect x="420" y="200" width="70" height="100" rx="6" fill="var(--arabic-only)" opacity="0.25" stroke="var(--arabic-only)" stroke-width="2"/>
        <text x="455" y="315" text-anchor="middle" style="font: bold 11px system-ui; fill: var(--arabic-only);">Pharyngeal</text>
        <text x="455" y="328" text-anchor="middle" class="ipa" style="font-size:12px; fill: var(--fg);">/ħ/ /ʕ/</text>
        <text x="455" y="341" text-anchor="middle" style="font: 10px system-ui; fill: var(--arabic-only);">ARABIC ONLY</text>

        <!-- 7. Glottal zone - SHARED (partially) -->
        <rect x="410" y="370" width="60" height="70" rx="6" fill="var(--shared)" opacity="0.2" stroke="var(--shared)" stroke-width="1.5"/>
        <text x="440" y="455" text-anchor="middle" style="font: bold 11px system-ui; fill: var(--shared);">Glottal</text>
        <text x="440" y="468" text-anchor="middle" class="ipa" style="font-size:11px; fill: var(--fg);">/h/ /ʔ/</text>

        <!-- Depth arrow -->
        <line x1="60" y1="490" x2="460" y2="490" stroke="var(--fg)" stroke-width="1.5" marker-end="url(#arrowhead)"/>
        <text x="260" y="510" text-anchor="middle" style="font: bold 12px system-ui; fill: var(--fg);">Front (Lips) -------> Back (Glottis)</text>

        <!-- English coverage bracket -->
        <line x1="30" y1="530" x2="380" y2="530" stroke="var(--english-only)" stroke-width="3"/>
        <text x="205" y="548" text-anchor="middle" style="font: bold 11px system-ui; fill: var(--english-only);">English coverage (skips uvular + pharyngeal)</text>

        <!-- Arabic coverage bracket -->
        <line x1="30" y1="565" x2="470" y2="565" stroke="var(--arabic-only)" stroke-width="3"/>
        <text x="250" y="583" text-anchor="middle" style="font: bold 11px system-ui; fill: var(--arabic-only);">Arabic coverage (FULL DEPTH -- no gaps)</text>
      </g>

      <!-- RIGHT PANEL: Summary stats -->
      <g transform="translate(630,80)">
        <rect x="0" y="0" width="380" height="540" rx="10" fill="var(--surface)" stroke="var(--border)" stroke-width="1"/>
        <text x="190" y="30" text-anchor="middle" class="title-text">The Pattern: Depth vs. Breadth</text>

        <!-- Arabic stats -->
        <rect x="20" y="50" width="340" height="100" rx="8" fill="var(--arabic-bg)" stroke="var(--arabic-only)" stroke-width="1"/>
        <text x="190" y="72" text-anchor="middle" style="font: bold 13px system-ui; fill: var(--arabic-only);">Arabic</text>
        <text x="190" y="92" text-anchor="middle" style="font: 12px system-ui; fill: var(--fg);">28 consonants across 7 zones</text>
        <text x="190" y="110" text-anchor="middle" style="font: 12px system-ui; fill: var(--fg);">6 vowels (3 short + 3 long)</text>
        <text x="190" y="130" text-anchor="middle" style="font: bold 12px system-ui; fill: var(--arabic-only);">9 sounds with NO English equivalent</text>
        <text x="190" y="145" text-anchor="middle" style="font: 10px system-ui; fill: var(--muted);">= one third of the consonant inventory</text>

        <!-- English stats -->
        <rect x="20" y="165" width="340" height="90" rx="8" fill="var(--english-bg)" stroke="var(--english-only)" stroke-width="1"/>
        <text x="190" y="187" text-anchor="middle" style="font: bold 13px system-ui; fill: var(--english-only);">English</text>
        <text x="190" y="207" text-anchor="middle" style="font: 12px system-ui; fill: var(--fg);">~24 consonants across 5 zones</text>
        <text x="190" y="225" text-anchor="middle" style="font: 12px system-ui; fill: var(--fg);">12-15 vowels (rich inventory)</text>
        <text x="190" y="245" text-anchor="middle" style="font: bold 12px system-ui; fill: var(--english-only);">Clusters in front of mouth</text>

        <!-- Key insight box -->
        <rect x="20" y="275" width="340" height="120" rx="8" fill="var(--accent-light)" stroke="var(--accent)" stroke-width="1.5"/>
        <text x="190" y="297" text-anchor="middle" style="font: bold 13px system-ui; fill: var(--accent);">The Trade-Off</text>
        <text x="190" y="320" text-anchor="middle" style="font: 12px system-ui; fill: var(--fg);">English: MANY vowels, SHALLOW consonants</text>
        <text x="190" y="340" text-anchor="middle" style="font: 12px system-ui; fill: var(--fg);">Arabic: FEW vowels, DEEP consonants</text>
        <text x="190" y="365" text-anchor="middle" style="font: italic 11px system-ui; fill: var(--muted);">Same articulatory space,</text>
        <text x="190" y="380" text-anchor="middle" style="font: italic 11px system-ui; fill: var(--muted);">opposite allocation strategies</text>

        <!-- The 9 Arabic-only sounds -->
        <text x="190" y="420" text-anchor="middle" style="font: bold 12px system-ui; fill: var(--arabic-only);">The 9 Arabic-Only Sounds</text>
        <text x="30" y="445" style="font: 11px system-ui; fill: var(--fg);">Pharyngeal: /ħ/ (&#x62D;) /ʕ/ (&#x639;)</text>
        <text x="30" y="463" style="font: 11px system-ui; fill: var(--fg);">Uvular: /q/ (&#x642;) /&#x03C7;/ (&#x62E;) /&#x0281;/ (&#x63A;)</text>
        <text x="30" y="481" style="font: 11px system-ui; fill: var(--fg);">Emphatic: /s&#x02E4;/ (&#x635;) /d&#x02E4;/ (&#x636;) /t&#x02E4;/ (&#x637;) /&#x00F0;&#x02E4;/ (&#x638;)</text>
        <text x="30" y="504" style="font: italic 10px system-ui; fill: var(--muted);">Emphatics use a second dimension (pharyngealization)</text>
        <text x="30" y="519" style="font: italic 10px system-ui; fill: var(--muted);">that English does not exploit at all</text>
      </g>

      <defs>
        <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
          <polygon points="0 0, 10 3.5, 0 7" fill="var(--fg)"/>
        </marker>
      </defs>
    </svg>
  </div>

  <figcaption>
    <h2>Figure 1 -- Vocal Tract Articulation Zones</h2>
    <p>Arabic consonants span the full depth of the vocal tract from lips to glottis, exploiting uvular and pharyngeal zones that English skips entirely. English clusters its consonants in the front half of the mouth and compensates with a richer vowel inventory. The two languages embody opposite allocation strategies for the same finite articulatory space.</p>
  </figcaption>

  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background:var(--shared);"></div>Shared (both languages)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--arabic-only);"></div>Arabic only</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--english-only);"></div>English coverage</div>
  </div>
</figure>
</body>
</html>
