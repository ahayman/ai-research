<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sun and Moon Letters: Phonological Assimilation</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --accent: #2563eb; --accent-light: #dbeafe;
    --sun: #f59e0b; --sun-bg: #fef3c7;
    --moon: #6366f1; --moon-bg: #e0e7ff;
    --muted: #6c757d; --caption-bg: #f8f9fa;
    --coronal: #dc2626;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a; --fg: #e8e8f0; --surface: #1a1a2e; --border: #2d2d44;
      --accent: #6b8aff; --accent-light: #1e2a4a;
      --sun: #fbbf24; --sun-bg: #4a3520;
      --moon: #818cf8; --moon-bg: #2e2e5a;
      --muted: #9a9ab0; --caption-bg: #1a1a2e;
      --coronal: #f87171;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--fg); display: flex; justify-content: center; padding: 2rem 1rem; line-height: 1.6; }
  figure { max-width: 1100px; width: 100%; }
  .diagram-container { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 1.5rem 1rem; overflow-x: auto; }
  figcaption { text-align: center; margin-top: 1.5rem; padding: 1rem 1.5rem; background: var(--caption-bg); border-radius: 8px; border: 1px solid var(--border); }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  .legend { display: flex; gap: 1.5rem; justify-content: center; flex-wrap: wrap; margin-top: 1rem; font-size: 0.82rem; color: var(--muted); }
  .legend-item { display: flex; align-items: center; gap: 0.4rem; }
  .legend-swatch { width: 14px; height: 14px; border-radius: 3px; border: 1px solid var(--border); }
  svg { display: block; margin: 0 auto; }
  .arabic { font-family: 'Noto Sans Arabic', 'Geeza Pro', serif; }
  .ipa { font-family: 'Gentium Plus', 'Noto Sans', 'DejaVu Sans', serif; }
</style>
</head>
<body>
<figure>
  <div class="diagram-container">
    <svg viewBox="0 0 1060 820" xmlns="http://www.w3.org/2000/svg" style="min-width:780px;">
      <text x="530" y="28" text-anchor="middle" style="font: bold 16px system-ui; fill: var(--fg);">Sun Letters vs. Moon Letters</text>
      <text x="530" y="48" text-anchor="middle" style="font: 11px system-ui; fill: var(--muted);">The definite article al- assimilates before coronal consonants -- physics, not memorization</text>

      <!-- SUN LETTERS PANEL -->
      <g transform="translate(30,70)">
        <rect width="490" height="330" rx="10" fill="var(--sun-bg)" stroke="var(--sun)" stroke-width="1.5"/>
        <text x="245" y="28" text-anchor="middle" style="font: bold 15px system-ui; fill: var(--sun);">&#x2600; 14 Sun Letters (&#x0627;&#x0644;&#x062D;&#x0631;&#x0648;&#x0641; &#x0627;&#x0644;&#x0634;&#x0645;&#x0633;&#x064A;&#x0629;)</text>
        <text x="245" y="48" text-anchor="middle" style="font: 11px system-ui; fill: var(--coronal);">Feature: [+coronal] -- tongue tip/blade near teeth or alveolar ridge</text>

        <!-- Letter grid -->
        <g transform="translate(20,60)">
          <!-- Row 1 -->
          <g transform="translate(0,0)">
            <rect width="55" height="45" rx="6" fill="var(--surface)" stroke="var(--sun)" stroke-width="1"/>
            <text x="28" y="20" text-anchor="middle" class="arabic" style="font-size:18px; fill: var(--fg);">&#x062A;</text>
            <text x="28" y="38" text-anchor="middle" class="ipa" style="font-size:10px; fill: var(--muted);">/t/</text>
          </g>
          <g transform="translate(60,0)">
            <rect width="55" height="45" rx="6" fill="var(--surface)" stroke="var(--sun)" stroke-width="1"/>

            <text x="28" y="38" text-anchor="middle" class="ipa" style="font-size:10px; fill: var(--muted);">/&#x03B8;/</text>
          </g>
          <g transform="translate(120,0)">
            <rect width="55" height="45" rx="6" fill="var(--surface)" stroke="var(--sun)" stroke-width="1"/>
            <text x="28" y="20" text-anchor="middle" class="arabic" style="font-size:18px; fill: var(--fg);">&#x062F;</text>

            <rect width="55" height="45" rx="6" fill="var(--surface)" stroke="var(--sun)" stroke-width="1"/>
            <text x="28" y="20" text-anchor="middle" class="arabic" style="font-size:18px; fill: var(--fg);">&#x0630;</text>
            <text x="28" y="38" text-anchor="middle" class="ipa" style="font-size:10px; fill: var(--muted);">/&#x00F0;/</text>
          </g>
          <g transform="translate(240,0)">
            <rect width="55" height="45" rx="6" fill="var(--surface)" stroke="var(--sun)" stroke-width="1"/>
            <text x="28" y="20" text-anchor="middle" class="arabic" style="font-size:18px; fill: var(--fg);">&#x0631;</text>
            <text x="28" y="38" text-anchor="middle" class="ipa" style="font-size:10px; fill: var(--muted);">/r/</text>
          </g>
          <g transform="translate(300,0)">
            <rect width="55" height="45" rx="6" fill="var(--surface)" stroke="var(--sun)" stroke-width="1"/>
            <text x="28" y="20" text-anchor="middle" class="arabic" style="font-size:18px; fill: var(--fg);">&#x0632;</text>
            <text x="28" y="38" text-anchor="middle" class="ipa" style="font-size:10px; fill: var(--muted);">/z/</text>
          </g>
          <g transform="translate(360,0)">
            <rect width="55" height="45" rx="6" fill="var(--surface)" stroke="var(--sun)" stroke-width="1"/>
            <text x="28" y="20" text-anchor="middle" class="arabic" style="font-size:18px; fill: var(--fg);">&#x0633;</text>
            <text x="28" y="38" text-anchor="middle" class="ipa" style="font-size:10px; fill: var(--muted);">/s/</text>
          </g>
          <!-- Row 2 -->
          <g transform="translate(0,55)">
            <rect width="55" height="45" rx="6" fill="var(--surface)" stroke="var(--sun)" stroke-width="1"/>
            <text x="28" y="20" text-anchor="middle" class="arabic" style="font-size:18px; fill: var(--fg);">&#x0634;</text>
            <text x="28" y="38" text-anchor="middle" class="ipa" style="font-size:10px; fill: var(--muted);">/&#x0283;/</text>
          </g>
          <g transform="translate(60,55)">
            <rect width="55" height="45" rx="6" fill="var(--surface)" stroke="var(--sun)" stroke-width="1"/>
            <text x="28" y="20" text-anchor="middle" class="arabic" style="font-size:18px; fill: var(--fg);">&#x0635;</text>
            <text x="28" y="38" text-anchor="middle" class="ipa" style="font-size:10px; fill: var(--muted);">/s&#x02E4;/</text>
          </g>
          <g transform="translate(120,55)">
            <rect width="55" height="45" rx="6" fill="var(--surface)" stroke="var(--sun)" stroke-width="1"/>
            <text x="28" y="20" text-anchor="middle" class="arabic" style="font-size:18px; fill: var(--fg);">&#x0636;</text>
            <text x="28" y="38" text-anchor="middle" class="ipa" style="font-size:10px; fill: var(--muted);">/d&#x02E4;/</text>
          </g>
          <g transform="translate(180,55)">
            <rect width="55" height="45" rx="6" fill="var(--surface)" stroke="var(--sun)" stroke-width="1"/>
            <text x="28" y="20" text-anchor="middle" class="arabic" style="font-size:18px; fill: var(--fg);">&#x0637;</text>
            <text x="28" y="38" text-anchor="middle" class="ipa" style="font-size:10px; fill: var(--muted);">/t&#x02E4;/</text>
          </g>
          <g transform="translate(240,55)">
            <rect width="55" height="45" rx="6" fill="var(--surface)" stroke="var(--sun)" stroke-width="1"/>
            <text x="28" y="20" text-anchor="middle" class="arabic" style="font-size:18px; fill: var(--fg);">&#x0638;</text>
            <text x="28" y="38" text-anchor="middle" class="ipa" style="font-size:10px; fill: var(--muted);">/&#x00F0;&#x02E4;/</text>
          </g>
          <g transform="translate(300,55)">
            <rect width="55" height="45" rx="6" fill="var(--surface)" stroke="var(--sun)" stroke-width="1"/>
            <text x="28" y="20" text-anchor="middle" class="arabic" style="font-size:18px; fill: var(--fg);">&#x0644;</text>
            <text x="28" y="38" text-anchor="middle" class="ipa" style="font-size:10px; fill: var(--muted);">/l/</text>
          </g>
          <g transform="translate(360,55)">
            <rect width="55" height="45" rx="6" fill="var(--surface)" stroke="var(--sun)" stroke-width="1"/>
            <text x="28" y="20" text-anchor="middle" class="arabic" style="font-size:18px; fill: var(--fg);">&#x0646;</text>
            <text x="28" y="38" text-anchor="middle" class="ipa" style="font-size:10px; fill: var(--muted);">/n/</text>
          </g>
        </g>

        <!-- Rule -->
        <rect x="20" y="195" width="450" height="55" rx="6" fill="var(--surface)" stroke="var(--sun)" stroke-width="1.5"/>
        <text x="245" y="215" text-anchor="middle" style="font: bold 12px system-ui; fill: var(--sun);">RULE: al- + sun letter --> /l/ assimilates (doubles next consonant)</text>
        <text x="245" y="235" text-anchor="middle" class="ipa" style="font: 12px serif; fill: var(--fg);">al-shams --> ash-shams (NOT al-shams)</text>

        <!-- Examples -->
        <text x="30" y="270" style="font: 11px system-ui; fill: var(--fg);">&#x0627;&#x0644;&#x0634;&#x0645;&#x0633; <tspan class="ipa">ash-shams</tspan> "the sun"</text>
        <text x="30" y="290" style="font: 11px system-ui; fill: var(--fg);">&#x0627;&#x0644;&#x0646;&#x0648;&#x0631; <tspan class="ipa">an-nu&#x02D0;r</tspan> "the light"</text>
        <text x="250" y="270" style="font: 11px system-ui; fill: var(--fg);">&#x0627;&#x0644;&#x062F;&#x0627;&#x0631; <tspan class="ipa">ad-da&#x02D0;r</tspan> "the house"</text>
        <text x="250" y="290" style="font: 11px system-ui; fill: var(--fg);">&#x0627;&#x0644;&#x0637;&#x0627;&#x0644;&#x0628; <tspan class="ipa">at&#x02E4;-t&#x02E4;a&#x02D0;lib</tspan> "the student"</text>
        <text x="30" y="318" style="font: italic 10px system-ui; fill: var(--muted);">The /l/ disappears and the following consonant doubles</text>
      </g>

      <!-- MOON LETTERS PANEL -->
      <g transform="translate(540,70)">
        <rect width="490" height="330" rx="10" fill="var(--moon-bg)" stroke="var(--moon)" stroke-width="1.5"/>
        <text x="245" y="28" text-anchor="middle" style="font: bold 15px system-ui; fill: var(--moon);">&#x263D; 14 Moon Letters (&#x0627;&#x0644;&#x062D;&#x0631;&#x0648;&#x0641; &#x0627;&#x0644;&#x0642;&#x0645;&#x0631;&#x064A;&#x0629;)</text>
        <text x="245" y="48" text-anchor="middle" style="font: 11px system-ui; fill: var(--moon);">Feature: [-coronal] -- labials, velars, uvulars, pharyngeals, glottals</text>

        <!-- Letter grid -->
        <g transform="translate(20,60)">
          <g transform="translate(0,0)">
            <rect width="55" height="45" rx="6" fill="var(--surface)" stroke="var(--moon)" stroke-width="1"/>
            <text x="28" y="20" text-anchor="middle" class="arabic" style="font-size:18px; fill: var(--fg);">&#x0623;</text>
            <text x="28" y="38" text-anchor="middle" class="ipa" style="font-size:10px; fill: var(--muted);">/&#x0294;/</text>
          </g>
          <g transform="translate(60,0)">
            <rect width="55" height="45" rx="6" fill="var(--surface)" stroke="var(--moon)" stroke-width="1"/>
            <text x="28" y="20" text-anchor="middle" class="arabic" style="font-size:18px; fill: var(--fg);">&#x0628;</text>
            <text x="28" y="38" text-anchor="middle" class="ipa" style="font-size:10px; fill: var(--muted);">/b/</text>
          </g>
          <g transform="translate(120,0)">
            <rect width="55" height="45" rx="6" fill="var(--surface)" stroke="var(--moon)" stroke-width="1"/>
            <text x="28" y="20" text-anchor="middle" class="arabic" style="font-size:18px; fill: var(--fg);">&#x062C;</text>
            <text x="28" y="38" text-anchor="middle" class="ipa" style="font-size:10px; fill: var(--muted);">/d&#x0292;/</text>
          </g>
          <g transform="translate(180,0)">
            <rect width="55" height="45" rx="6" fill="var(--surface)" stroke="var(--moon)" stroke-width="1"/>
            <text x="28" y="20" text-anchor="middle" class="arabic" style="font-size:18px; fill: var(--fg);">&#x062D;</text>
            <text x="28" y="38" text-anchor="middle" class="ipa" style="font-size:10px; fill: var(--muted);">/&#x0127;/</text>
          </g>
          <g transform="translate(240,0)">
            <rect width="55" height="45" rx="6" fill="var(--surface)" stroke="var(--moon)" stroke-width="1"/>
            <text x="28" y="20" text-anchor="middle" class="arabic" style="font-size:18px; fill: var(--fg);">&#x062E;</text>
            <text x="28" y="38" text-anchor="middle" class="ipa" style="font-size:10px; fill: var(--muted);">/&#x03C7;/</text>
          </g>
          <g transform="translate(300,0)">
            <rect width="55" height="45" rx="6" fill="var(--surface)" stroke="var(--moon)" stroke-width="1"/>
            <text x="28" y="20" text-anchor="middle" class="arabic" style="font-size:18px; fill: var(--fg);">&#x0639;</text>
            <text x="28" y="38" text-anchor="middle" class="ipa" style="font-size:10px; fill: var(--muted);">/&#x0295;/</text>
          </g>
          <g transform="translate(360,0)">
            <rect width="55" height="45" rx="6" fill="var(--surface)" stroke="var(--moon)" stroke-width="1"/>
            <text x="28" y="20" text-anchor="middle" class="arabic" style="font-size:18px; fill: var(--fg);">&#x063A;</text>
            <text x="28" y="38" text-anchor="middle" class="ipa" style="font-size:10px; fill: var(--muted);">/&#x0281;/</text>
          </g>
          <!-- Row 2 -->
          <g transform="translate(0,55)">
            <rect width="55" height="45" rx="6" fill="var(--surface)" stroke="var(--moon)" stroke-width="1"/>
            <text x="28" y="20" text-anchor="middle" class="arabic" style="font-size:18px; fill: var(--fg);">&#x0641;</text>
            <text x="28" y="38" text-anchor="middle" class="ipa" style="font-size:10px; fill: var(--muted);">/f/</text>
          </g>
          <g transform="translate(60,55)">
            <rect width="55" height="45" rx="6" fill="var(--surface)" stroke="var(--moon)" stroke-width="1"/>
            <text x="28" y="20" text-anchor="middle" class="arabic" style="font-size:18px; fill: var(--fg);">&#x0642;</text>
            <text x="28" y="38" text-anchor="middle" class="ipa" style="font-size:10px; fill: var(--muted);">/q/</text>
          </g>
          <g transform="translate(120,55)">
            <rect width="55" height="45" rx="6" fill="var(--surface)" stroke="var(--moon)" stroke-width="1"/>
            <text x="28" y="20" text-anchor="middle" class="arabic" style="font-size:18px; fill: var(--fg);">&#x0643;</text>
            <text x="28" y="38" text-anchor="middle" class="ipa" style="font-size:10px; fill: var(--muted);">/k/</text>
          </g>
          <g transform="translate(180,55)">
            <rect width="55" height="45" rx="6" fill="var(--surface)" stroke="var(--moon)" stroke-width="1"/>
            <text x="28" y="20" text-anchor="middle" class="arabic" style="font-size:18px; fill: var(--fg);">&#x0645;</text>
            <text x="28" y="38" text-anchor="middle" class="ipa" style="font-size:10px; fill: var(--muted);">/m/</text>
          </g>
          <g transform="translate(240,55)">
            <rect width="55" height="45" rx="6" fill="var(--surface)" stroke="var(--moon)" stroke-width="1"/>
            <text x="28" y="20" text-anchor="middle" class="arabic" style="font-size:18px; fill: var(--fg);">&#x0647;</text>
            <text x="28" y="38" text-anchor="middle" class="ipa" style="font-size:10px; fill: var(--muted);">/h/</text>
          </g>
          <g transform="translate(300,55)">
            <rect width="55" height="45" rx="6" fill="var(--surface)" stroke="var(--moon)" stroke-width="1"/>
            <text x="28" y="20" text-anchor="middle" class="arabic" style="font-size:18px; fill: var(--fg);">&#x0648;</text>
            <text x="28" y="38" text-anchor="middle" class="ipa" style="font-size:10px; fill: var(--muted);">/w/</text>
          </g>
          <g transform="translate(360,55)">
            <rect width="55" height="45" rx="6" fill="var(--surface)" stroke="var(--moon)" stroke-width="1"/>
            <text x="28" y="20" text-anchor="middle" class="arabic" style="font-size:18px; fill: var(--fg);">&#x064A;</text>
            <text x="28" y="38" text-anchor="middle" class="ipa" style="font-size:10px; fill: var(--muted);">/j/</text>
          </g>
        </g>

        <!-- Rule -->
        <rect x="20" y="195" width="450" height="55" rx="6" fill="var(--surface)" stroke="var(--moon)" stroke-width="1.5"/>
        <text x="245" y="215" text-anchor="middle" style="font: bold 12px system-ui; fill: var(--moon);">RULE: al- + moon letter --> /l/ pronounced normally</text>
        <text x="245" y="235" text-anchor="middle" class="ipa" style="font: 12px serif; fill: var(--fg);">al-qamar = al-qamar (the /l/ stays)</text>

        <!-- Examples -->
        <text x="30" y="270" style="font: 11px system-ui; fill: var(--fg);">&#x0627;&#x0644;&#x0642;&#x0645;&#x0631; <tspan class="ipa">al-qamar</tspan> "the moon"</text>
        <text x="30" y="290" style="font: 11px system-ui; fill: var(--fg);">&#x0627;&#x0644;&#x0643;&#x062A;&#x0627;&#x0628; <tspan class="ipa">al-kita&#x02D0;b</tspan> "the book"</text>
        <text x="250" y="270" style="font: 11px system-ui; fill: var(--fg);">&#x0627;&#x0644;&#x0628;&#x064A;&#x062A; <tspan class="ipa">al-bayt</tspan> "the house"</text>
        <text x="250" y="290" style="font: 11px system-ui; fill: var(--fg);">&#x0627;&#x0644;&#x062D;&#x0628; <tspan class="ipa">al-&#x0127;ubb</tspan> "the love"</text>
        <text x="30" y="318" style="font: italic 10px system-ui; fill: var(--muted);">The /l/ is clearly pronounced before these consonants</text>
      </g>

      <!-- BOTTOM: WHY THIS WORKS -->
      <g transform="translate(30,420)">
        <rect width="1000" height="180" rx="10" fill="var(--accent-light)" stroke="var(--accent)" stroke-width="1.5"/>
        <text x="500" y="25" text-anchor="middle" style="font: bold 14px system-ui; fill: var(--accent);">Why This Is Physics, Not Memorization</text>

        <!-- The mechanism -->
        <g transform="translate(30,45)">
          <rect width="440" height="110" rx="8" fill="var(--sun-bg)" stroke="var(--sun)"/>
          <text x="220" y="20" text-anchor="middle" style="font: bold 12px system-ui; fill: var(--sun);">Sun Letter Mechanism</text>
          <text x="220" y="40" text-anchor="middle" style="font: 11px system-ui; fill: var(--fg);">The /l/ of al- is coronal (tongue tip on ridge)</text>
          <text x="220" y="58" text-anchor="middle" style="font: 11px system-ui; fill: var(--fg);">Sun letters are ALSO coronal (same position)</text>
          <text x="220" y="76" text-anchor="middle" style="font: bold 11px system-ui; fill: var(--sun);">Tongue stays in place --> /l/ merges with next sound</text>
          <text x="220" y="96" text-anchor="middle" style="font: italic 10px system-ui; fill: var(--muted);">Least-effort principle: why move if you are already there?</text>
        </g>

        <g transform="translate(530,45)">
          <rect width="440" height="110" rx="8" fill="var(--moon-bg)" stroke="var(--moon)"/>
          <text x="220" y="20" text-anchor="middle" style="font: bold 12px system-ui; fill: var(--moon);">Moon Letter Mechanism</text>
          <text x="220" y="40" text-anchor="middle" style="font: 11px system-ui; fill: var(--fg);">The /l/ of al- is coronal (tongue tip on ridge)</text>
          <text x="220" y="58" text-anchor="middle" style="font: 11px system-ui; fill: var(--fg);">Moon letters are NON-coronal (different position)</text>
          <text x="220" y="76" text-anchor="middle" style="font: bold 11px system-ui; fill: var(--moon);">Tongue must move --> /l/ pronounced distinctly</text>
          <text x="220" y="96" text-anchor="middle" style="font: italic 10px system-ui; fill: var(--muted);">Movement required: the /l/ has time to be heard</text>
        </g>

        <text x="500" y="170" text-anchor="middle" style="font: italic 12px system-ui; fill: var(--accent);">English analog: say "in Paris" vs. "input" -- the /n/ naturally shifts to /m/ before /p/ (same principle, but English does not codify it)</text>
      </g>

      <!-- COUNT COMPARISON -->
      <g transform="translate(30,620)">
        <rect width="1000" height="180" rx="10" fill="var(--surface)" stroke="var(--border)" stroke-width="1"/>
        <text x="500" y="25" text-anchor="middle" style="font: bold 14px system-ui; fill: var(--fg);">The Single Rule: [+coronal] = Sun, [-coronal] = Moon</text>

        <!-- Articulatory map -->
        <text x="50" y="60" style="font: 11px system-ui; fill: var(--muted);">Labial</text>
        <text x="170" y="60" style="font: 11px system-ui; fill: var(--muted);">Dental</text>
        <text x="310" y="60" style="font: 11px system-ui; fill: var(--muted);">Alveolar</text>
        <text x="440" y="60" style="font: 11px system-ui; fill: var(--muted);">Palato-alv.</text>
        <text x="560" y="60" style="font: 11px system-ui; fill: var(--muted);">Velar</text>
        <text x="670" y="60" style="font: 11px system-ui; fill: var(--muted);">Uvular</text>
        <text x="780" y="60" style="font: 11px system-ui; fill: var(--muted);">Pharyngeal</text>
        <text x="910" y="60" style="font: 11px system-ui; fill: var(--muted);">Glottal</text>

        <!-- Colored bars -->
        <rect x="30" y="70" width="80" height="30" rx="4" fill="var(--moon-bg)" stroke="var(--moon)"/>
        <text x="70" y="90" text-anchor="middle" style="font: bold 10px system-ui; fill: var(--moon);">MOON</text>

        <rect x="140" y="70" width="340" height="30" rx="4" fill="var(--sun-bg)" stroke="var(--sun)"/>
        <text x="310" y="90" text-anchor="middle" style="font: bold 10px system-ui; fill: var(--sun);">SUN (coronal zone)</text>

        <rect x="510" y="70" width="470" height="30" rx="4" fill="var(--moon-bg)" stroke="var(--moon)"/>
        <text x="745" y="90" text-anchor="middle" style="font: bold 10px system-ui; fill: var(--moon);">MOON</text>

        <!-- Arrow showing /l/ position -->
        <line x1="280" y1="108" x2="280" y2="125" stroke="var(--coronal)" stroke-width="2"/>
        <text x="280" y="140" text-anchor="middle" style="font: bold 11px system-ui; fill: var(--coronal);">/l/ lives HERE (alveolar)</text>
        <text x="280" y="158" text-anchor="middle" style="font: 11px system-ui; fill: var(--fg);">Sun letters share this zone -- assimilation is automatic</text>
        <text x="280" y="174" text-anchor="middle" style="font: 11px system-ui; fill: var(--fg);">Moon letters are OUTSIDE this zone -- /l/ stays distinct</text>
      </g>
    </svg>
  </div>

  <figcaption>
    <h2>Figure 5 -- Sun and Moon Letter Classification</h2>
    <p>The 28 Arabic consonants divide perfectly in half: 14 sun letters (coronal) and 14 moon letters (non-coronal). The definite article al- assimilates its /l/ before sun letters because /l/ is itself coronal -- the tongue is already in the right position. Before moon letters, the tongue must move, so /l/ is pronounced distinctly. One phonetic feature -- [+/-coronal] -- explains the entire classification. No memorization needed.</p>
  </figcaption>

  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background:var(--sun);"></div>Sun letters [+coronal]</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--moon);"></div>Moon letters [-coronal]</div>
  </div>
