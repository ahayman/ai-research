<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arabic 28-Consonant Inventory</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --accent: #2563eb; --accent-light: #dbeafe;
    --shared: #22c55e; --shared-bg: #dcfce7;
    --arabic-only: #e67e22; --arabic-bg: #fef3e2;
    --emphatic: #dc2626; --emphatic-bg: #fee2e2;
    --muted: #6c757d; --caption-bg: #f8f9fa;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a; --fg: #e8e8f0; --surface: #1a1a2e; --border: #2d2d44;
      --accent: #6b8aff; --accent-light: #1e2a4a;
      --shared: #4ade80; --shared-bg: #14532d;
      --arabic-only: #f59e0b; --arabic-bg: #4a3520;
      --emphatic: #f87171; --emphatic-bg: #5c1a1a;
      --muted: #9a9ab0; --caption-bg: #1a1a2e;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--fg); display: flex; justify-content: center; padding: 2rem 1rem; line-height: 1.6; }
  figure { max-width: 1200px; width: 100%; }
  .diagram-container { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 1.5rem 1rem; overflow-x: auto; }
  figcaption { text-align: center; margin-top: 1.5rem; padding: 1rem 1.5rem; background: var(--caption-bg); border-radius: 8px; border: 1px solid var(--border); }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  .legend { display: flex; gap: 1.5rem; justify-content: center; flex-wrap: wrap; margin-top: 1rem; font-size: 0.82rem; color: var(--muted); }
  .legend-item { display: flex; align-items: center; gap: 0.4rem; }
  .legend-swatch { width: 14px; height: 14px; border-radius: 3px; border: 1px solid var(--border); }

  table { border-collapse: collapse; width: 100%; min-width: 900px; font-size: 0.9rem; }
  th, td { border: 1px solid var(--border); padding: 8px 6px; text-align: center; vertical-align: middle; }
  th { background: var(--accent-light); font-weight: 600; font-size: 0.82rem; color: var(--accent); }
  th.place { min-width: 80px; }
  td.shared { background: var(--shared-bg); }
  td.arabic-only { background: var(--arabic-bg); font-weight: 600; }
  td.emphatic { background: var(--emphatic-bg); font-weight: 700; }
  .manner-label { font-weight: 600; background: var(--surface); text-align: left; padding-left: 12px; white-space: nowrap; }
  .arabic-letter { font-size: 1.1rem; font-family: 'Noto Sans Arabic', 'Geeza Pro', 'Traditional Arabic', serif; }
  .ipa { font-family: 'Gentium Plus', 'Noto Sans', 'DejaVu Sans', serif; }
  .cell-content { display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .voicing-label { font-size: 0.7rem; color: var(--muted); font-style: italic; }
  h3 { text-align: center; margin-bottom: 1rem; font-size: 1.1rem; color: var(--fg); }
</style>
</head>
<body>
<figure>
  <div class="diagram-container">
    <h3>Arabic 28-Consonant Inventory -- IPA Chart by Place and Manner</h3>
    <table>
      <thead>
        <tr>
          <th>Manner</th>
          <th class="place">Labial</th>
          <th class="place">Interdental</th>
          <th class="place">Dental/Alveolar</th>
          <th class="place">Emphatic<br/>(pharyngealized)</th>
          <th class="place">Palato-Alveolar</th>
          <th class="place">Velar</th>
          <th class="place">Uvular</th>
          <th class="place">Pharyngeal</th>
          <th class="place">Glottal</th>
        </tr>
      </thead>
      <tbody>
        <!-- Stops -->
        <tr>
          <td class="manner-label">Stop</td>
          <td class="shared"><div class="cell-content"><span class="arabic-letter">ب</span><span class="ipa">/b/</span><span class="voicing-label">voiced</span></div></td>
          <td></td>
          <td class="shared"><div class="cell-content"><span class="ipa">/t/ /d/</span><span class="arabic-letter">ت&nbsp;د</span><span class="voicing-label">vl. / vd.</span></div></td>
          <td class="emphatic"><div class="cell-content"><span class="ipa">/t&#x02E4;/ /d&#x02E4;/</span><span class="arabic-letter">ط&nbsp;ض</span><span class="voicing-label">vl. / vd.</span></div></td>
          <td></td>
          <td class="shared"><div class="cell-content"><span class="ipa">/k/</span><span class="arabic-letter">ك</span></div></td>
          <td class="arabic-only"><div class="cell-content"><span class="ipa">/q/</span><span class="arabic-letter">ق</span><span class="voicing-label">voiceless</span></div></td>
          <td></td>
          <td class="shared"><div class="cell-content"><span class="ipa">/&#x0294;/</span><span class="arabic-letter">ء</span><span class="voicing-label">glottal stop</span></div></td>
        </tr>
        <!-- Fricatives -->
        <tr>
          <td class="manner-label">Fricative</td>
          <td class="shared"><div class="cell-content"><span class="ipa">/f/</span><span class="arabic-letter">ف</span><span class="voicing-label">voiceless</span></div></td>
          <td class="shared"><div class="cell-content"><span class="ipa">/&#x03B8;/ /&#x00F0;/</span><span class="arabic-letter">ث&nbsp;ذ</span><span class="voicing-label">vl. / vd.</span></div></td>
          <td class="shared"><div class="cell-content"><span class="ipa">/s/ /z/</span><span class="arabic-letter">س&nbsp;ز</span><span class="voicing-label">vl. / vd.</span></div></td>
          <td class="emphatic"><div class="cell-content"><span class="ipa">/s&#x02E4;/ /&#x00F0;&#x02E4;/</span><span class="arabic-letter">ص&nbsp;ظ</span><span class="voicing-label">vl. / vd.</span></div></td>
          <td class="shared"><div class="cell-content"><span class="ipa">/&#x0283;/</span><span class="arabic-letter">ش</span><span class="voicing-label">voiceless</span></div></td>
          <td></td>
          <td class="arabic-only"><div class="cell-content"><span class="ipa">/&#x03C7;/ /&#x0281;/</span><span class="arabic-letter">خ&nbsp;غ</span><span class="voicing-label">vl. / vd.</span></div></td>
          <td class="arabic-only"><div class="cell-content"><span class="ipa">/&#x0127;/ /&#x0295;/</span><span class="arabic-letter">ح&nbsp;ع</span><span class="voicing-label">vl. / vd.</span></div></td>
          <td class="shared"><div class="cell-content"><span class="ipa">/h/</span><span class="arabic-letter">ه</span></div></td>
        </tr>
        <!-- Nasal -->
        <tr>
          <td class="manner-label">Nasal</td>
          <td class="shared"><div class="cell-content"><span class="ipa">/m/</span><span class="arabic-letter">م</span></div></td>
          <td></td>
          <td class="shared"><div class="cell-content"><span class="ipa">/n/</span><span class="arabic-letter">ن</span></div></td>
          <td></td>
          <td></td>
          <td></td>
          <td></td>
          <td></td>
          <td></td>
        </tr>
        <!-- Lateral -->
        <tr>
          <td class="manner-label">Lateral</td>
          <td></td>
          <td></td>
          <td class="shared"><div class="cell-content"><span class="ipa">/l/</span><span class="arabic-letter">ل</span></div></td>
          <td></td>
          <td></td>
          <td></td>
          <td></td>
          <td></td>
          <td></td>
        </tr>
        <!-- Tap/Trill -->
        <tr>
          <td class="manner-label">Tap/Trill</td>
          <td></td>
          <td></td>
          <td class="shared"><div class="cell-content"><span class="ipa">/r/</span><span class="arabic-letter">ر</span><span class="voicing-label">tap/trill</span></div></td>
          <td></td>
          <td></td>
          <td></td>
          <td></td>
          <td></td>
          <td></td>
        </tr>
        <!-- Approximant -->
        <tr>
          <td class="manner-label">Approximant</td>
          <td class="shared"><div class="cell-content"><span class="ipa">/w/</span><span class="arabic-letter">و</span></div></td>
          <td></td>
          <td></td>
          <td></td>
          <td class="shared"><div class="cell-content"><span class="ipa">/j/</span><span class="arabic-letter">ي</span></div></td>
          <td></td>
          <td></td>
          <td></td>
          <td></td>
        </tr>
      </tbody>
    </table>
  </div>

  <figcaption>
    <h2>Figure 2 -- Arabic Consonant Inventory by Place and Manner</h2>
    <p>Green cells are shared with English. Orange cells are Arabic-only (uvular and pharyngeal). Red cells are emphatic -- consonants with a secondary pharyngealized articulation that English entirely lacks. Every place of articulation features voicing pairs, extending the same organizational principle English uses into deeper throat territory. The emphatic column represents a unique phonological dimension: the same tongue-tip articulation as the plain counterpart, plus simultaneous throat constriction.</p>
  </figcaption>

  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background:var(--shared);"></div>Shared with English</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--arabic-only);"></div>Arabic only (uvular/pharyngeal)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--emphatic);"></div>Emphatic (pharyngealized)</div>
  </div>
</figure>
</body>
</html>
