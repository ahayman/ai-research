<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arabic Three-Vowel Triangle vs. English Vowel Space</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --accent: #2563eb; --accent-light: #dbeafe;
    --arabic: #e67e22; --arabic-bg: #fef3e2;
    --english: #6366f1; --english-bg: #e8e8ff;
    --shared: #22c55e;
    --muted: #6c757d; --caption-bg: #f8f9fa;
    --allophone: #a855f7; --allophone-bg: #f3e8ff;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a; --fg: #e8e8f0; --surface: #1a1a2e; --border: #2d2d44;
      --accent: #6b8aff; --accent-light: #1e2a4a;
      --arabic: #f59e0b; --arabic-bg: #4a3520;
      --english: #818cf8; --english-bg: #2e2e5a;
      --shared: #4ade80;
      --muted: #9a9ab0; --caption-bg: #1a1a2e;
      --allophone: #c084fc; --allophone-bg: #3b1764;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--fg); display: flex; justify-content: center; padding: 2rem 1rem; line-height: 1.6; }
  figure { max-width: 1100px; width: 100%; }
  .diagram-container { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 1.5rem 1rem; overflow-x: auto; }
  figcaption { text-align: center; margin-top: 1.5rem; padding: 1rem 1.5rem; background: var(--caption-bg); border-radius: 8px; border: 1px solid var(--border); }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  .legend { display: flex; gap: 1.5rem; justify-content: center; flex-wrap: wrap; margin-top: 1rem; font-size: 0.82rem; color: var(--muted); }
  .legend-item { display: flex; align-items: center; gap: 0.4rem; }
  .legend-swatch { width: 14px; height: 14px; border-radius: 3px; border: 1px solid var(--border); }
  svg { display: block; margin: 0 auto; }
  .ipa { font-family: 'Gentium Plus', 'Noto Sans', 'DejaVu Sans', serif; }
</style>
</head>
<body>
<figure>
  <div class="diagram-container">
    <svg viewBox="0 0 1060 700" xmlns="http://www.w3.org/2000/svg" style="min-width:780px;">
      <text x="530" y="28" text-anchor="middle" style="font: bold 16px system-ui; fill: var(--fg);">Vowel Systems: Arabic Minimalism vs. English Density</text>
      <text x="530" y="48" text-anchor="middle" style="font: 11px system-ui; fill: var(--muted);">Arabic: 3 phonemes (6 with length) -- English: 12-15 phonemes</text>

      <!-- ========== ARABIC PANEL (left) ========== -->
      <g transform="translate(30,70)">
        <rect width="470" height="350" rx="10" fill="var(--surface)" stroke="var(--arabic)" stroke-width="1.5"/>
        <text x="235" y="25" text-anchor="middle" style="font: bold 14px system-ui; fill: var(--arabic);">Arabic: 3 Vowels (x2 lengths = 6)</text>

        <!-- Vowel triangle axes -->
        <text x="60" y="55" style="font: 10px system-ui; fill: var(--muted);">Front</text>
        <text x="380" y="55" style="font: 10px system-ui; fill: var(--muted);">Back</text>
        <text x="30" y="80" style="font: 10px system-ui; fill: var(--muted);">Close</text>
        <text x="30" y="280" style="font: 10px system-ui; fill: var(--muted);">Open</text>

        <!-- Triangle lines -->
        <polygon points="120,80 400,80 260,270" fill="none" stroke="var(--arabic)" stroke-width="1" stroke-dasharray="5,3"/>

        <!-- /i/ -->
        <circle cx="120" cy="80" r="16" fill="var(--arabic)" opacity="0.9"/>
        <text x="120" y="86" text-anchor="middle" class="ipa" style="font: bold 16px serif; fill: white;">/i/</text>
        <text x="120" y="115" text-anchor="middle" style="font: 11px system-ui; fill: var(--fg);">short: kasra &#x0650;</text>
        <text x="120" y="130" text-anchor="middle" style="font: 11px system-ui; fill: var(--fg);">long: /i:/ &#x064A;</text>

        <!-- /u/ -->
        <circle cx="400" cy="80" r="16" fill="var(--arabic)" opacity="0.9"/>
        <text x="400" y="86" text-anchor="middle" class="ipa" style="font: bold 16px serif; fill: white;">/u/</text>
        <text x="400" y="115" text-anchor="middle" style="font: 11px system-ui; fill: var(--fg);">short: damma &#x064F;</text>
        <text x="400" y="130" text-anchor="middle" style="font: 11px system-ui; fill: var(--fg);">long: /u:/ &#x0648;</text>

        <!-- /a/ -->
        <circle cx="260" cy="270" r="16" fill="var(--arabic)" opacity="0.9"/>
        <text x="260" y="276" text-anchor="middle" class="ipa" style="font: bold 16px serif; fill: white;">/a/</text>
        <text x="260" y="305" text-anchor="middle" style="font: 11px system-ui; fill: var(--fg);">short: fatha &#x064E;</text>
        <text x="260" y="320" text-anchor="middle" style="font: 11px system-ui; fill: var(--fg);">long: /a:/ &#x0627;</text>

        <!-- Allophonic cloud for /a/ -->
        <ellipse cx="260" cy="250" rx="120" ry="30" fill="var(--allophone)" opacity="0.1" stroke="var(--allophone)" stroke-width="1" stroke-dasharray="3,3"/>
        <circle cx="180" cy="248" r="6" fill="var(--allophone)" opacity="0.5"/>
        <text x="180" y="240" text-anchor="middle" style="font: 9px system-ui; fill: var(--allophone);">[ae]</text>
        <circle cx="340" cy="248" r="6" fill="var(--allophone)" opacity="0.5"/>
        <text x="340" y="240" text-anchor="middle" style="font: 9px system-ui; fill: var(--allophone);">[&#x0251;]</text>
        <text x="260" y="344" text-anchor="middle" style="font: italic 9px system-ui; fill: var(--allophone);">Purple zone: allophonic range near emphatics</text>
      </g>

      <!-- ========== ENGLISH PANEL (right) ========== -->
      <g transform="translate(540,70)">
        <rect width="490" height="350" rx="10" fill="var(--surface)" stroke="var(--english)" stroke-width="1.5"/>
        <text x="245" y="25" text-anchor="middle" style="font: bold 14px system-ui; fill: var(--english);">English: ~15 Vowel Phonemes</text>

        <!-- Vowel trapezoid axes -->
        <text x="50" y="55" style="font: 10px system-ui; fill: var(--muted);">Front</text>
        <text x="400" y="55" style="font: 10px system-ui; fill: var(--muted);">Back</text>
        <text x="20" y="80" style="font: 10px system-ui; fill: var(--muted);">Close</text>
        <text x="20" y="290" style="font: 10px system-ui; fill: var(--muted);">Open</text>

        <!-- Trapezoid outline -->
        <polygon points="90,75 390,75 420,280 60,280" fill="none" stroke="var(--english)" stroke-width="1" stroke-dasharray="5,3"/>

        <!-- English vowels - densely packed -->
        <circle cx="90" cy="75" r="10" fill="var(--english)" opacity="0.8"/>
        <text x="90" y="79" text-anchor="middle" class="ipa" style="font: bold 11px serif; fill: white;">i:</text>

        <circle cx="140" cy="100" r="10" fill="var(--english)" opacity="0.8"/>
        <text x="140" y="104" text-anchor="middle" class="ipa" style="font: bold 11px serif; fill: white;">&#x026A;</text>

        <circle cx="100" cy="140" r="10" fill="var(--english)" opacity="0.8"/>
        <text x="100" y="144" text-anchor="middle" class="ipa" style="font: bold 11px serif; fill: white;">e</text>

        <circle cx="115" cy="180" r="10" fill="var(--english)" opacity="0.8"/>
        <text x="115" y="184" text-anchor="middle" class="ipa" style="font: bold 11px serif; fill: white;">ae</text>

        <circle cx="390" cy="75" r="10" fill="var(--english)" opacity="0.8"/>
        <text x="390" y="79" text-anchor="middle" class="ipa" style="font: bold 11px serif; fill: white;">u:</text>

        <circle cx="350" cy="105" r="10" fill="var(--english)" opacity="0.8"/>
        <text x="350" y="109" text-anchor="middle" class="ipa" style="font: bold 11px serif; fill: white;">&#x028A;</text>

        <circle cx="370" cy="155" r="10" fill="var(--english)" opacity="0.8"/>
        <text x="370" y="159" text-anchor="middle" class="ipa" style="font: bold 11px serif; fill: white;">&#x0254;:</text>

        <circle cx="400" cy="210" r="10" fill="var(--english)" opacity="0.8"/>
        <text x="400" y="214" text-anchor="middle" class="ipa" style="font: bold 11px serif; fill: white;">&#x0252;</text>

        <circle cx="240" cy="140" r="10" fill="var(--english)" opacity="0.8"/>
        <text x="240" y="144" text-anchor="middle" class="ipa" style="font: bold 11px serif; fill: white;">&#x0259;</text>

        <circle cx="270" cy="190" r="10" fill="var(--english)" opacity="0.8"/>
        <text x="270" y="194" text-anchor="middle" class="ipa" style="font: bold 11px serif; fill: white;">&#x028C;</text>

        <circle cx="330" cy="260" r="10" fill="var(--english)" opacity="0.8"/>
        <text x="330" y="264" text-anchor="middle" class="ipa" style="font: bold 11px serif; fill: white;">&#x0251;:</text>

        <circle cx="150" cy="240" r="10" fill="var(--english)" opacity="0.8"/>
        <text x="150" y="244" text-anchor="middle" class="ipa" style="font: bold 11px serif; fill: white;">a</text>

        <!-- Diphthong arrows (a few examples) -->
        <path d="M 155,235 Q 130,180 100,145" fill="none" stroke="var(--english)" stroke-width="1" stroke-dasharray="2,2" marker-end="url(#arrEn)"/>
        <text x="105" y="195" style="font: 9px system-ui; fill: var(--english);">/a&#x026A;/</text>

        <path d="M 280,185 Q 310,140 345,110" fill="none" stroke="var(--english)" stroke-width="1" stroke-dasharray="2,2" marker-end="url(#arrEn)"/>
        <text x="330" y="140" style="font: 9px system-ui; fill: var(--english);">/&#x0259;&#x028A;/</text>

        <text x="245" y="310" text-anchor="middle" style="font: 11px system-ui; fill: var(--fg);">Dense! Vowels crowded together.</text>
        <text x="245" y="328" text-anchor="middle" style="font: 11px system-ui; fill: var(--fg);">+ diphthongs that glide between points.</text>
      </g>

      <!-- BOTTOM COMPARISON BOX -->
      <g transform="translate(30,440)">
        <rect width="1000" height="240" rx="10" fill="var(--accent-light)" stroke="var(--accent)" stroke-width="1.5"/>
        <text x="500" y="28" text-anchor="middle" style="font: bold 14px system-ui; fill: var(--accent);">The Pattern: Why the Asymmetry Exists</text>

        <!-- Arabic column -->
        <g transform="translate(30,50)">
          <rect width="440" height="80" rx="8" fill="var(--arabic-bg)" stroke="var(--arabic)"/>
          <text x="220" y="20" text-anchor="middle" style="font: bold 12px system-ui; fill: var(--arabic);">Arabic Vowels = GRAMMAR</text>
          <text x="220" y="40" text-anchor="middle" style="font: 11px system-ui; fill: var(--fg);">Vowels encode patterns (verb form, participle, noun type)</text>
          <text x="220" y="55" text-anchor="middle" style="font: 11px system-ui; fill: var(--fg);">kataba / kutiba / kitab = same root, different grammar</text>
          <text x="220" y="72" text-anchor="middle" style="font: italic 11px system-ui; fill: var(--arabic);">3 vowels are enough for grammatical distinctions</text>
        </g>

        <!-- English column -->
        <g transform="translate(530,50)">
          <rect width="440" height="80" rx="8" fill="var(--english-bg)" stroke="var(--english)"/>
          <text x="220" y="20" text-anchor="middle" style="font: bold 12px system-ui; fill: var(--english);">English Vowels = VOCABULARY</text>
          <text x="220" y="40" text-anchor="middle" style="font: 11px system-ui; fill: var(--fg);">Vowels distinguish different words (lexical contrast)</text>
          <text x="220" y="55" text-anchor="middle" style="font: 11px system-ui; fill: var(--fg);">bat / bet / bit / but / bot = different words entirely</text>
          <text x="220" y="72" text-anchor="middle" style="font: italic 11px system-ui; fill: var(--english);">MANY vowels needed to avoid word collisions</text>
        </g>

        <!-- Length contrast -->
        <g transform="translate(30,145)">
          <rect width="440" height="70" rx="8" fill="var(--arabic-bg)" stroke="var(--arabic)"/>
          <text x="220" y="18" text-anchor="middle" style="font: bold 11px system-ui; fill: var(--arabic);">Vowel Length = PHONEMIC</text>
          <text x="220" y="36" text-anchor="middle" style="font: 11px system-ui; fill: var(--fg);">kataba ("he wrote") vs. kaataba ("he corresponded")</text>
          <text x="220" y="53" text-anchor="middle" style="font: 11px system-ui; fill: var(--fg);">Length alone changes meaning</text>
        </g>

        <g transform="translate(530,145)">
          <rect width="440" height="70" rx="8" fill="var(--english-bg)" stroke="var(--english)"/>
          <text x="220" y="18" text-anchor="middle" style="font: bold 11px system-ui; fill: var(--english);">Vowel Length = ALLOPHONIC</text>
          <text x="220" y="36" text-anchor="middle" style="font: 11px system-ui; fill: var(--fg);">"beat" vs. "bit" -- differs in quality, not just length</text>
          <text x="220" y="53" text-anchor="middle" style="font: 11px system-ui; fill: var(--fg);">Length alone never changes meaning</text>
        </g>
      </g>

      <defs>
        <marker id="arrEn" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto">
          <polygon points="0 0, 6 2, 0 4" fill="var(--english)"/>
        </marker>
      </defs>
    </svg>
  </div>

  <figcaption>
    <h2>Figure 4 -- Arabic Three-Vowel Triangle vs. English Vowel Trapezoid</h2>
    <p>Arabic compresses its entire vowel system into three phonemes (/a/, /i/, /u/) plus length distinctions, for six total contrasts. English spreads 12-15 phonemes densely across the vowel space, plus diphthongs. The reason: Arabic vowels do grammatical work (marking patterns), requiring few contrasts. English vowels do lexical work (distinguishing words), requiring many. Neither system is simpler -- they allocate complexity to different channels.</p>
  </figcaption>

  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background:var(--arabic);"></div>Arabic vowel phonemes</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--english);"></div>English vowel phonemes</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--allophone);"></div>Allophonic range (emphatic environment)</div>
  </div>
</figure>
</body>
</html>
