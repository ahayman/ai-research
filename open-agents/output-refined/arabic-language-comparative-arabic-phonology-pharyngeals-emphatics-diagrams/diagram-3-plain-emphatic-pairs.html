<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plain vs. Emphatic Consonant Pairs</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --accent: #2563eb; --accent-light: #dbeafe;
    --plain: #3b82f6; --plain-bg: #dbeafe;
    --emphatic: #dc2626; --emphatic-bg: #fee2e2;
    --muted: #6c757d; --caption-bg: #f8f9fa;
    --vowel-light: #22c55e; --vowel-dark: #b45309;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a; --fg: #e8e8f0; --surface: #1a1a2e; --border: #2d2d44;
      --accent: #6b8aff; --accent-light: #1e2a4a;
      --plain: #60a5fa; --plain-bg: #1e3a5f;
      --emphatic: #f87171; --emphatic-bg: #5c1a1a;
      --muted: #9a9ab0; --caption-bg: #1a1a2e;
      --vowel-light: #4ade80; --vowel-dark: #f59e0b;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--fg); display: flex; justify-content: center; padding: 2rem 1rem; line-height: 1.6; }
  figure { max-width: 1100px; width: 100%; }
  .diagram-container { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 1.5rem 1rem; overflow-x: auto; }
  figcaption { text-align: center; margin-top: 1.5rem; padding: 1rem 1.5rem; background: var(--caption-bg); border-radius: 8px; border: 1px solid var(--border); }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  .legend { display: flex; gap: 1.5rem; justify-content: center; flex-wrap: wrap; margin-top: 1rem; font-size: 0.82rem; color: var(--muted); }
  .legend-item { display: flex; align-items: center; gap: 0.4rem; }
  .legend-swatch { width: 14px; height: 14px; border-radius: 3px; border: 1px solid var(--border); }
  svg { display: block; margin: 0 auto; }
  .ipa { font-family: 'Gentium Plus', 'Noto Sans', 'DejaVu Sans', serif; }
  .arabic { font-family: 'Noto Sans Arabic', 'Geeza Pro', serif; font-size: 1.2em; }
</style>
</head>
<body>
<figure>
  <div class="diagram-container">
    <svg viewBox="0 0 1060 750" xmlns="http://www.w3.org/2000/svg" style="min-width:780px;">
      <text x="530" y="28" text-anchor="middle" style="font: bold 16px system-ui; fill: var(--fg);">Plain vs. Emphatic Consonant Pairs</text>
      <text x="530" y="48" text-anchor="middle" style="font: 11px system-ui; fill: var(--muted);">Same tongue-tip position + throat constriction = different phoneme = different meaning</text>

      <!-- Four pair panels -->
      <!-- PAIR 1: /s/ vs /sˤ/ -->
      <g transform="translate(30,70)">
        <rect width="480" height="140" rx="10" fill="var(--surface)" stroke="var(--border)" stroke-width="1"/>
        <!-- Plain side -->
        <rect x="10" y="10" width="220" height="120" rx="8" fill="var(--plain-bg)" stroke="var(--plain)" stroke-width="1.5"/>
        <text x="120" y="35" text-anchor="middle" style="font: bold 13px system-ui; fill: var(--plain);">Plain /s/</text>
        <text x="120" y="55" text-anchor="middle" style="font: 20px 'Noto Sans Arabic', serif; fill: var(--fg);">&#x0633;</text>
        <text x="120" y="80" text-anchor="middle" style="font: 12px system-ui; fill: var(--fg);">&#x0633;&#x0628;&#x0631; <tspan class="ipa">sabr</tspan></text>
        <text x="120" y="97" text-anchor="middle" style="font: bold 12px system-ui; fill: var(--plain);">"probing"</text>
        <text x="120" y="118" text-anchor="middle" style="font: 10px system-ui; fill: var(--muted);">Vowel /a/ sounds like [ae] (front)</text>

        <!-- Arrow -->
        <text x="240" y="75" text-anchor="middle" style="font: bold 20px system-ui; fill: var(--muted);">vs</text>

        <!-- Emphatic side -->
        <rect x="250" y="10" width="220" height="120" rx="8" fill="var(--emphatic-bg)" stroke="var(--emphatic)" stroke-width="1.5"/>
        <text x="360" y="35" text-anchor="middle" style="font: bold 13px system-ui; fill: var(--emphatic);">Emphatic /s&#x02E4;/</text>
        <text x="360" y="55" text-anchor="middle" style="font: 20px 'Noto Sans Arabic', serif; fill: var(--fg);">&#x0635;</text>
        <text x="360" y="80" text-anchor="middle" style="font: 12px system-ui; fill: var(--fg);">&#x0635;&#x0628;&#x0631; <tspan class="ipa">s&#x02E4;abr</tspan></text>
        <text x="360" y="97" text-anchor="middle" style="font: bold 12px system-ui; fill: var(--emphatic);">"patience"</text>
        <text x="360" y="118" text-anchor="middle" style="font: 10px system-ui; fill: var(--muted);">Vowel /a/ sounds like [&#x0251;] (backed)</text>
      </g>

      <!-- PAIR 2: /t/ vs /tˤ/ -->
      <g transform="translate(540,70)">
        <rect width="480" height="140" rx="10" fill="var(--surface)" stroke="var(--border)" stroke-width="1"/>
        <rect x="10" y="10" width="220" height="120" rx="8" fill="var(--plain-bg)" stroke="var(--plain)" stroke-width="1.5"/>
        <text x="120" y="35" text-anchor="middle" style="font: bold 13px system-ui; fill: var(--plain);">Plain /t/</text>
        <text x="120" y="55" text-anchor="middle" style="font: 20px 'Noto Sans Arabic', serif; fill: var(--fg);">&#x062A;</text>
        <text x="120" y="80" text-anchor="middle" style="font: 12px system-ui; fill: var(--fg);">&#x062A;&#x064A;&#x0646; <tspan class="ipa">ti&#x02D0;n</tspan></text>
        <text x="120" y="97" text-anchor="middle" style="font: bold 12px system-ui; fill: var(--plain);">"figs"</text>
        <text x="120" y="118" text-anchor="middle" style="font: 10px system-ui; fill: var(--muted);">Vowel /i:/ stays front [i:]</text>

        <text x="240" y="75" text-anchor="middle" style="font: bold 20px system-ui; fill: var(--muted);">vs</text>

        <rect x="250" y="10" width="220" height="120" rx="8" fill="var(--emphatic-bg)" stroke="var(--emphatic)" stroke-width="1.5"/>
        <text x="360" y="35" text-anchor="middle" style="font: bold 13px system-ui; fill: var(--emphatic);">Emphatic /t&#x02E4;/</text>
        <text x="360" y="55" text-anchor="middle" style="font: 20px 'Noto Sans Arabic', serif; fill: var(--fg);">&#x0637;</text>
        <text x="360" y="80" text-anchor="middle" style="font: 12px system-ui; fill: var(--fg);">&#x0637;&#x064A;&#x0646; <tspan class="ipa">t&#x02E4;i&#x02D0;n</tspan></text>
        <text x="360" y="97" text-anchor="middle" style="font: bold 12px system-ui; fill: var(--emphatic);">"clay / mud"</text>
        <text x="360" y="118" text-anchor="middle" style="font: 10px system-ui; fill: var(--muted);">Vowel /i:/ backs toward [e]</text>
      </g>

      <!-- PAIR 3: /d/ vs /dˤ/ -->
      <g transform="translate(30,230)">
        <rect width="480" height="140" rx="10" fill="var(--surface)" stroke="var(--border)" stroke-width="1"/>
        <rect x="10" y="10" width="220" height="120" rx="8" fill="var(--plain-bg)" stroke="var(--plain)" stroke-width="1.5"/>
        <text x="120" y="35" text-anchor="middle" style="font: bold 13px system-ui; fill: var(--plain);">Plain /d/</text>
        <text x="120" y="55" text-anchor="middle" style="font: 20px 'Noto Sans Arabic', serif; fill: var(--fg);">&#x062F;</text>
        <text x="120" y="80" text-anchor="middle" style="font: 12px system-ui; fill: var(--fg);">&#x062F;&#x0644;&#x0651; <tspan class="ipa">dall</tspan></text>
        <text x="120" y="97" text-anchor="middle" style="font: bold 12px system-ui; fill: var(--plain);">"to indicate"</text>

        <text x="240" y="75" text-anchor="middle" style="font: bold 20px system-ui; fill: var(--muted);">vs</text>

        <rect x="250" y="10" width="220" height="120" rx="8" fill="var(--emphatic-bg)" stroke="var(--emphatic)" stroke-width="1.5"/>
        <text x="360" y="35" text-anchor="middle" style="font: bold 13px system-ui; fill: var(--emphatic);">Emphatic /d&#x02E4;/</text>
        <text x="360" y="55" text-anchor="middle" style="font: 20px 'Noto Sans Arabic', serif; fill: var(--fg);">&#x0636;</text>
        <text x="360" y="80" text-anchor="middle" style="font: 12px system-ui; fill: var(--fg);">&#x0636;&#x0644;&#x0651; <tspan class="ipa">d&#x02E4;all</tspan></text>
        <text x="360" y="97" text-anchor="middle" style="font: bold 12px system-ui; fill: var(--emphatic);">"to go astray"</text>
        <text x="360" y="118" text-anchor="middle" style="font: italic 10px system-ui; fill: var(--emphatic);">&#x0636; = the letter Arabic is named for</text>
      </g>

      <!-- PAIR 4: /ð/ vs /ðˤ/ -->
      <g transform="translate(540,230)">
        <rect width="480" height="140" rx="10" fill="var(--surface)" stroke="var(--border)" stroke-width="1"/>
        <rect x="10" y="10" width="220" height="120" rx="8" fill="var(--plain-bg)" stroke="var(--plain)" stroke-width="1.5"/>
        <text x="120" y="35" text-anchor="middle" style="font: bold 13px system-ui; fill: var(--plain);">Plain /&#x00F0;/</text>
        <text x="120" y="55" text-anchor="middle" style="font: 20px 'Noto Sans Arabic', serif; fill: var(--fg);">&#x0630;</text>
        <text x="120" y="80" text-anchor="middle" style="font: 12px system-ui; fill: var(--fg);">&#x0630;&#x0627;&#x062A; <tspan class="ipa">&#x00F0;a&#x02D0;t</tspan></text>
        <text x="120" y="97" text-anchor="middle" style="font: bold 12px system-ui; fill: var(--plain);">"self / essence"</text>

        <text x="240" y="75" text-anchor="middle" style="font: bold 20px system-ui; fill: var(--muted);">vs</text>

        <rect x="250" y="10" width="220" height="120" rx="8" fill="var(--emphatic-bg)" stroke="var(--emphatic)" stroke-width="1.5"/>
        <text x="360" y="35" text-anchor="middle" style="font: bold 13px system-ui; fill: var(--emphatic);">Emphatic /&#x00F0;&#x02E4;/</text>
        <text x="360" y="55" text-anchor="middle" style="font: 20px 'Noto Sans Arabic', serif; fill: var(--fg);">&#x0638;</text>
        <text x="360" y="80" text-anchor="middle" style="font: 12px system-ui; fill: var(--fg);">&#x0638;&#x0647;&#x0631; <tspan class="ipa">&#x00F0;&#x02E4;ahr</tspan></text>
        <text x="360" y="97" text-anchor="middle" style="font: bold 12px system-ui; fill: var(--emphatic);">"back / noon"</text>
      </g>

      <!-- MECHANISM DIAGRAM -->
      <g transform="translate(30,400)">
        <rect width="1000" height="160" rx="10" fill="var(--accent-light)" stroke="var(--accent)" stroke-width="1.5"/>
        <text x="500" y="25" text-anchor="middle" style="font: bold 14px system-ui; fill: var(--accent);">How Emphatics Work: Dual Articulation</text>

        <!-- Plain diagram -->
        <g transform="translate(50,40)">
          <text x="150" y="0" text-anchor="middle" style="font: bold 12px system-ui; fill: var(--plain);">Plain Consonant</text>
          <rect x="30" y="15" width="240" height="40" rx="6" fill="var(--plain-bg)" stroke="var(--plain)"/>
          <text x="150" y="40" text-anchor="middle" style="font: 12px system-ui; fill: var(--fg);">Tongue tip at teeth/alveolar ridge</text>
          <text x="150" y="75" text-anchor="middle" style="font: 11px system-ui; fill: var(--muted);">ONE articulation point</text>
          <text x="150" y="95" text-anchor="middle" style="font: 11px system-ui; fill: var(--muted);">Adjacent vowels stay FRONT [ae]</text>
        </g>

        <!-- Arrow -->
        <text x="500" y="85" text-anchor="middle" style="font: bold 24px system-ui; fill: var(--muted);">+</text>

        <!-- Emphatic diagram -->
        <g transform="translate(530,40)">
          <text x="200" y="0" text-anchor="middle" style="font: bold 12px system-ui; fill: var(--emphatic);">Emphatic Consonant</text>
          <rect x="30" y="15" width="240" height="40" rx="6" fill="var(--plain-bg)" stroke="var(--plain)"/>
          <text x="150" y="40" text-anchor="middle" style="font: 12px system-ui; fill: var(--fg);">Tongue tip at teeth/alveolar ridge</text>
          <rect x="280" y="15" width="140" height="40" rx="6" fill="var(--emphatic-bg)" stroke="var(--emphatic)"/>
          <text x="350" y="40" text-anchor="middle" style="font: 11px system-ui; fill: var(--emphatic);">+ tongue root</text>
          <text x="350" y="52" text-anchor="middle" style="font: 11px system-ui; fill: var(--emphatic);">retracts to pharynx</text>
          <text x="200" y="75" text-anchor="middle" style="font: 11px system-ui; fill: var(--muted);">TWO simultaneous articulation points</text>
          <text x="200" y="95" text-anchor="middle" style="font: 11px system-ui; fill: var(--muted);">Adjacent vowels shift BACK [&#x0251;]</text>
        </g>

        <!-- English comparison -->
        <text x="500" y="145" text-anchor="middle" style="font: italic 11px system-ui; fill: var(--accent);">English comparison: English has NO phonemic secondary articulations. The closest analog -- dark L in "full" vs. clear L in "leaf" -- never changes meaning.</text>
      </g>

      <!-- Vowel effect visualization -->
      <g transform="translate(30,580)">
        <rect width="1000" height="145" rx="10" fill="var(--surface)" stroke="var(--border)" stroke-width="1"/>
        <text x="500" y="25" text-anchor="middle" style="font: bold 14px system-ui; fill: var(--fg);">The Acoustic Effect: Emphatics "Darken" Adjacent Vowels</text>

        <!-- Vowel spectrum: plain -->
        <g transform="translate(50,45)">
          <text x="0" y="0" style="font: bold 11px system-ui; fill: var(--plain);">Near plain consonant:</text>
          <rect x="0" y="10" width="400" height="30" rx="4" fill="var(--plain-bg)" stroke="var(--plain)"/>
          <!-- F2 marker high -->
          <circle cx="320" cy="25" r="8" fill="var(--plain)"/>
          <text x="320" y="29" text-anchor="middle" style="font: bold 10px system-ui; fill: white;">/a/</text>
          <text x="340" y="28" style="font: 10px system-ui; fill: var(--plain);">[ae] = F2 HIGH (front)</text>
          <text x="10" y="30" style="font: 9px system-ui; fill: var(--muted);">BACK</text>
          <text x="370" y="30" style="font: 9px system-ui; fill: var(--muted);">FRONT</text>
        </g>

        <!-- Vowel spectrum: emphatic -->
        <g transform="translate(50,95)">
          <text x="0" y="0" style="font: bold 11px system-ui; fill: var(--emphatic);">Near emphatic consonant:</text>
          <rect x="0" y="10" width="400" height="30" rx="4" fill="var(--emphatic-bg)" stroke="var(--emphatic)"/>
          <!-- F2 marker low -->
          <circle cx="100" cy="25" r="8" fill="var(--emphatic)"/>
          <text x="100" y="29" text-anchor="middle" style="font: bold 10px system-ui; fill: white;">/a/</text>
          <text x="120" y="28" style="font: 10px system-ui; fill: var(--emphatic);">[&#x0251;] = F2 LOW (backed)</text>
          <text x="10" y="30" style="font: 9px system-ui; fill: var(--muted);">BACK</text>
          <text x="370" y="30" style="font: 9px system-ui; fill: var(--muted);">FRONT</text>
          <!-- Arrow showing shift -->
          <line x1="320" y1="8" x2="110" y2="18" stroke="var(--emphatic)" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowE)"/>
        </g>

        <!-- Summary -->
        <text x="600" y="80" style="font: 12px system-ui; fill: var(--fg);">Same phoneme /a/ --</text>
        <text x="600" y="98" style="font: 12px system-ui; fill: var(--fg);">different realization depending</text>
        <text x="600" y="116" style="font: 12px system-ui; fill: var(--fg);">on emphatic environment.</text>
        <text x="600" y="138" style="font: italic 11px system-ui; fill: var(--muted);">This is why wrong emphasis sounds "off"</text>
        <text x="600" y="152" style="font: italic 11px system-ui; fill: var(--muted);">even when the consonant itself seems right.</text>
      </g>

      <defs>
        <marker id="arrowE" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="var(--emphatic)"/>
        </marker>
      </defs>
    </svg>
  </div>

  <figcaption>
    <h2>Figure 3 -- The Four Plain-Emphatic Minimal Pairs</h2>
    <p>Each emphatic consonant is produced at the same primary articulation point as its plain counterpart, with an added secondary pharyngeal constriction. This secondary articulation is the sole phonemic difference, yet it changes word meaning entirely. The surrounding vowels shift from front [ae] to backed [&#x0251;], creating an audible "darkening" effect that spreads across the word.</p>
  </figcaption>

  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background:var(--plain);"></div>Plain consonant</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--emphatic);"></div>Emphatic (pharyngealized)</div>
  </div>
</figure>
</body>
</html>
