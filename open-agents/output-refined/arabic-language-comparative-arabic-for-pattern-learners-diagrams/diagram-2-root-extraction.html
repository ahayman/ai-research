<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Root Extraction Decision Tree</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --accent: #4361ee; --accent-light: #e8edff;
    --step: #3b82f6; --step-bg: #dbeafe;
    --strip: #ef4444; --strip-bg: #fee2e2;
    --root: #10b981; --root-bg: #d1fae5;
    --example: #8b5cf6; --example-bg: #ede9fe;
    --en: #10b981; --en-bg: #d1fae5;
    --muted: #6c757d; --caption-bg: #f8f9fa;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a; --fg: #e8e8f0; --surface: #1a1a2e; --border: #2d2d44;
      --accent: #6b8aff; --accent-light: #1e2a4a;
      --step: #60a5fa; --step-bg: #1e3a5f;
      --strip: #f87171; --strip-bg: #5c1a1a;
      --root: #34d399; --root-bg: #064e3b;
      --example: #a78bfa; --example-bg: #3b2d6b;
      --en: #34d399; --en-bg: #064e3b;
      --muted: #9a9ab0; --caption-bg: #1a1a2e;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--fg); display: flex; justify-content: center; padding: 2rem 1rem; line-height: 1.6; }
  figure { max-width: 1100px; width: 100%; }
  .diagram-container { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 1.5rem 1rem; overflow-x: auto; }
  figcaption { text-align: center; margin-top: 1.5rem; padding: 1rem 1.5rem; background: var(--caption-bg); border-radius: 8px; border: 1px solid var(--border); }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  svg { display: block; margin: 0 auto; }
  .title-text { font: bold 15px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
  .label { font: 11px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
  .label-bold { font: bold 11px 'Segoe UI', system-ui, sans-serif; }
  .label-sm { font: 10px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
  .step-label { font: bold 12px 'Segoe UI', system-ui, sans-serif; }
</style>
</head>
<body>
<figure>
  <div class="diagram-container">
    <svg viewBox="0 0 1060 820" xmlns="http://www.w3.org/2000/svg" style="min-width:750px;">
      <defs>
        <marker id="arrS" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="var(--step)"/></marker>
        <marker id="arrG" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="var(--root)"/></marker>
      </defs>

      <text x="530" y="25" text-anchor="middle" class="title-text" style="font-size:16px;">Root Extraction Decision Tree</text>
      <text x="530" y="43" text-anchor="middle" class="label-sm" style="font-size:11px;">A step-by-step algorithm for finding the trilateral root of any Arabic word</text>

      <!-- ENTRY -->
      <rect x="380" y="55" width="300" height="35" rx="17" fill="var(--accent-light)" stroke="var(--accent)" stroke-width="2"/>
      <text x="530" y="77" text-anchor="middle" class="step-label" fill="var(--accent)">INPUT: Any Arabic word</text>

      <line x1="530" y1="90" x2="530" y2="115" stroke="var(--step)" stroke-width="2" marker-end="url(#arrS)"/>

      <!-- STEP 1: Strip Prefixes -->
      <rect x="280" y="115" width="500" height="110" rx="8" fill="var(--strip-bg)" stroke="var(--strip)" stroke-width="2"/>
      <text x="530" y="135" text-anchor="middle" class="step-label" fill="var(--strip)">STEP 1: Strip Prefixes</text>

      <rect x="295" y="143" width="110" height="30" rx="4" fill="var(--surface)" stroke="var(--strip)" stroke-width="1"/>
      <text x="350" y="162" text-anchor="middle" class="label-bold" fill="var(--strip)">al- (definite)</text>

      <rect x="415" y="143" width="110" height="30" rx="4" fill="var(--surface)" stroke="var(--strip)" stroke-width="1"/>
      <text x="470" y="162" text-anchor="middle" class="label-bold" fill="var(--strip)">m- (place/part.)</text>

      <rect x="535" y="143" width="110" height="30" rx="4" fill="var(--surface)" stroke="var(--strip)" stroke-width="1"/>
      <text x="590" y="162" text-anchor="middle" class="label-bold" fill="var(--strip)">ta- (Form V/VI)</text>

      <rect x="655" y="143" width="110" height="30" rx="4" fill="var(--surface)" stroke="var(--strip)" stroke-width="1"/>
      <text x="710" y="162" text-anchor="middle" class="label-bold" fill="var(--strip)">ista- (Form X)</text>

      <rect x="375" y="180" width="110" height="30" rx="4" fill="var(--surface)" stroke="var(--strip)" stroke-width="1"/>
      <text x="430" y="199" text-anchor="middle" class="label-bold" fill="var(--strip)">in- (Form VII)</text>

      <rect x="495" y="180" width="110" height="30" rx="4" fill="var(--surface)" stroke="var(--strip)" stroke-width="1"/>
      <text x="550" y="199" text-anchor="middle" class="label-bold" fill="var(--strip)">a- (Form IV)</text>

      <line x1="530" y1="225" x2="530" y2="250" stroke="var(--step)" stroke-width="2" marker-end="url(#arrS)"/>

      <!-- STEP 2: Strip Suffixes -->
      <rect x="280" y="250" width="500" height="90" rx="8" fill="var(--strip-bg)" stroke="var(--strip)" stroke-width="2"/>
      <text x="530" y="270" text-anchor="middle" class="step-label" fill="var(--strip)">STEP 2: Strip Suffixes</text>

      <rect x="295" y="280" width="130" height="26" rx="4" fill="var(--surface)" stroke="var(--strip)" stroke-width="1"/>
      <text x="360" y="297" text-anchor="middle" class="label-bold" fill="var(--strip)">-a (ta' marbuta)</text>

      <rect x="435" y="280" width="100" height="26" rx="4" fill="var(--surface)" stroke="var(--strip)" stroke-width="1"/>
      <text x="485" y="297" text-anchor="middle" class="label-bold" fill="var(--strip)">-at (fem. pl.)</text>

      <rect x="545" y="280" width="100" height="26" rx="4" fill="var(--surface)" stroke="var(--strip)" stroke-width="1"/>
      <text x="595" y="297" text-anchor="middle" class="label-bold" fill="var(--strip)">-un/-in (masc.)</text>

      <rect x="655" y="280" width="110" height="26" rx="4" fill="var(--surface)" stroke="var(--strip)" stroke-width="1"/>
      <text x="710" y="297" text-anchor="middle" class="label-bold" fill="var(--strip)">-i (nisba adj.)</text>

      <text x="530" y="330" text-anchor="middle" class="label-sm" fill="var(--strip)">Strip known affixes. Long vowels (a, w, y) may be root OR pattern -- context determines.</text>

      <line x1="530" y1="340" x2="530" y2="365" stroke="var(--step)" stroke-width="2" marker-end="url(#arrS)"/>

      <!-- STEP 3: Identify Core Consonants -->
      <rect x="330" y="365" width="400" height="55" rx="8" fill="var(--step-bg)" stroke="var(--step)" stroke-width="2"/>
      <text x="530" y="387" text-anchor="middle" class="step-label" fill="var(--step)">STEP 3: Identify the 3 Core Consonants</text>
      <text x="530" y="405" text-anchor="middle" class="label" fill="var(--fg)">What remains should be 3 (or 4) consonants IN ORDER = the ROOT</text>

      <line x1="530" y1="420" x2="530" y2="445" stroke="var(--step)" stroke-width="2" marker-end="url(#arrS)"/>

      <!-- STEP 4: Verify -->
      <rect x="330" y="445" width="400" height="55" rx="8" fill="var(--root-bg)" stroke="var(--root)" stroke-width="2"/>
      <text x="530" y="467" text-anchor="middle" class="step-label" fill="var(--root)">STEP 4: Verify the Root</text>
      <text x="530" y="485" text-anchor="middle" class="label" fill="var(--fg)">Does the semantic domain match? Known root? If YES: root extracted.</text>

      <!-- Branch: If NO -->
      <line x1="730" y1="472" x2="810" y2="472" stroke="var(--muted)" stroke-width="1.5"/>
      <rect x="810" y="457" width="210" height="30" rx="5" fill="var(--surface)" stroke="var(--muted)" stroke-width="1"/>
      <text x="915" y="476" text-anchor="middle" class="label-sm">If NO: may be a loanword or irregular</text>

      <!-- WORKED EXAMPLES -->
      <text x="530" y="530" text-anchor="middle" class="title-text" fill="var(--example)">Worked Examples</text>

      <!-- Example 1: maktaba -->
      <rect x="40" y="545" width="310" height="110" rx="8" fill="var(--example-bg)" stroke="var(--example)" stroke-width="1.5"/>
      <text x="195" y="565" text-anchor="middle" class="step-label" fill="var(--example)">maktaba (library)</text>
      <text x="55" y="585" class="label" fill="var(--fg)">Step 1: Strip <tspan fill="var(--strip)" font-weight="bold">m-</tspan> prefix (noun of place)</text>
      <text x="55" y="600" class="label" fill="var(--fg)">Step 2: Strip <tspan fill="var(--strip)" font-weight="bold">-a</tspan> suffix (ta' marbuta)</text>
      <text x="55" y="615" class="label" fill="var(--fg)">Step 3: Remaining = <tspan fill="var(--root)" font-weight="bold">k-t-b</tspan></text>
      <text x="55" y="632" class="label" fill="var(--root)">Step 4: k-t-b = writing domain. VERIFIED.</text>
      <text x="55" y="648" class="label-sm" fill="var(--muted)">Library = "place of writing" -- transparent!</text>

      <!-- Example 2: mu'allim -->
      <rect x="375" y="545" width="310" height="110" rx="8" fill="var(--example-bg)" stroke="var(--example)" stroke-width="1.5"/>
      <text x="530" y="565" text-anchor="middle" class="step-label" fill="var(--example)">mu'allim (teacher)</text>
      <text x="390" y="585" class="label" fill="var(--fg)">Step 1: Strip <tspan fill="var(--strip)" font-weight="bold">mu-</tspan> prefix (participle marker)</text>
      <text x="390" y="600" class="label" fill="var(--fg)">Step 2: No suffix to strip</text>
      <text x="390" y="615" class="label" fill="var(--fg)">Step 3: Remaining = <tspan fill="var(--root)" font-weight="bold">'-l-m</tspan> (doubled l = Form II)</text>
      <text x="390" y="632" class="label" fill="var(--root)">Step 4: '-l-m = knowledge. Form II = causative.</text>
      <text x="390" y="648" class="label-sm" fill="var(--muted)">Teacher = "one who CAUSES knowing" -- transparent!</text>

      <!-- Example 3: istiqlal -->
      <rect x="710" y="545" width="310" height="110" rx="8" fill="var(--example-bg)" stroke="var(--example)" stroke-width="1.5"/>
      <text x="865" y="565" text-anchor="middle" class="step-label" fill="var(--example)">istiqlal (independence)</text>
      <text x="725" y="585" class="label" fill="var(--fg)">Step 1: Strip <tspan fill="var(--strip)" font-weight="bold">ist-</tspan> prefix (Form X)</text>
      <text x="725" y="600" class="label" fill="var(--fg)">Step 2: No suffix to strip</text>
      <text x="725" y="615" class="label" fill="var(--fg)">Step 3: Remaining = <tspan fill="var(--root)" font-weight="bold">q-l-l</tspan></text>
      <text x="725" y="632" class="label" fill="var(--root)">Step 4: q-l-l = to be independent. VERIFIED.</text>
      <text x="725" y="648" class="label-sm" fill="var(--muted)">Form X masdar = "state of seeking self-sufficiency"</text>

      <!-- PATTERN BOX -->
      <rect x="40" y="675" width="980" height="50" rx="8" fill="var(--accent-light)" stroke="var(--accent)" stroke-width="2"/>
      <text x="530" y="697" text-anchor="middle" class="label-bold" style="font-size:12px;" fill="var(--accent)">THE PAYOFF: This Algorithm Works on THOUSANDS of Words</text>
      <text x="530" y="714" text-anchor="middle" class="label" fill="var(--fg)">Root extraction is how literate Arabic speakers actually process vocabulary. It is a SKILL that improves with practice and eventually becomes automatic.</text>

      <!-- ENGLISH COMPARISON -->
      <rect x="40" y="740" width="980" height="50" rx="8" fill="var(--en-bg)" stroke="var(--en)" stroke-width="1.5"/>
      <text x="530" y="760" text-anchor="middle" class="label-bold" fill="var(--en)">ENGLISH COMPARISON: No Equivalent Algorithm</text>
      <text x="530" y="776" text-anchor="middle" class="label" fill="var(--fg)">You cannot decompose "library" to find "book" (Latin liber -- not visible). You cannot decompose "teacher" to find "knowledge" (Germanic taecan -- not connected to "know").</text>
      <text x="530" y="788" text-anchor="middle" class="label" fill="var(--fg)">Arabic root extraction is a PRODUCTIVE cognitive strategy. English etymology is an academic exercise.</text>

    </svg>
  </div>
  <figcaption>
    <h2>Root Extraction Decision Tree</h2>
    <p>A four-step algorithm for extracting the trilateral root from any Arabic word: strip prefixes, strip suffixes, identify the three core consonants, verify against the semantic domain. This works for thousands of words and becomes automatic with practice -- a genuine cognitive tool with no English equivalent.</p>
  </figcaption>
</figure>
</body>
</html>
