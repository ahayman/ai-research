<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verb Form Identification Flowchart (I-X)</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --accent: #4361ee; --accent-light: #e8edff;
    --q: #f59e0b; --q-bg: #fef3c7;
    --form: #3b82f6; --form-bg: #dbeafe;
    --sem: #8b5cf6; --sem-bg: #ede9fe;
    --chain: #14b8a6; --chain-bg: #ccfbf1;
    --en: #10b981; --en-bg: #d1fae5;
    --muted: #6c757d; --caption-bg: #f8f9fa;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a; --fg: #e8e8f0; --surface: #1a1a2e; --border: #2d2d44;
      --accent: #6b8aff; --accent-light: #1e2a4a;
      --q: #fbbf24; --q-bg: #78350f;
      --form: #60a5fa; --form-bg: #1e3a5f;
      --sem: #a78bfa; --sem-bg: #3b2d6b;
      --chain: #2dd4bf; --chain-bg: #134e4a;
      --en: #34d399; --en-bg: #064e3b;
      --muted: #9a9ab0; --caption-bg: #1a1a2e;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--fg); display: flex; justify-content: center; padding: 2rem 1rem; line-height: 1.6; }
  figure { max-width: 1100px; width: 100%; }
  .diagram-container { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 1.5rem 1rem; overflow-x: auto; }
  figcaption { text-align: center; margin-top: 1.5rem; padding: 1rem 1.5rem; background: var(--caption-bg); border-radius: 8px; border: 1px solid var(--border); }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  h3 { text-align: center; font-size: 1rem; color: var(--accent); margin-bottom: 0.5rem; }
  .subtitle { text-align: center; font-size: 0.82rem; color: var(--muted); margin-bottom: 1rem; }
  table { width: 100%; border-collapse: collapse; font-size: 0.82rem; margin-bottom: 1rem; min-width: 700px; }
  th { padding: 0.5rem; text-align: center; font-weight: 600; border: 1px solid var(--border); }
  td { padding: 0.5rem; border: 1px solid var(--border); vertical-align: middle; }
  td.form-num { text-align: center; font-weight: 700; font-size: 0.95rem; }
  td.visual-cue { font-weight: 600; }
  .chain-box { background: var(--chain-bg); border: 1px solid var(--chain); border-radius: 8px; padding: 1rem 1.5rem; margin: 1rem 0; }
  .chain-box h4 { color: var(--chain); font-size: 0.95rem; margin-bottom: 0.5rem; }
  .chain-box p { font-size: 0.85rem; margin-bottom: 0.3rem; }
  .shortcut-box { background: var(--q-bg); border: 1px solid var(--q); border-radius: 8px; padding: 1rem 1.5rem; margin: 1rem 0; }
  .shortcut-box h4 { color: var(--q); font-size: 0.95rem; margin-bottom: 0.5rem; }
  .shortcut-box p { font-size: 0.85rem; margin-bottom: 0.3rem; }
  .en-box { background: var(--en-bg); border: 1px solid var(--en); border-radius: 8px; padding: 1rem 1.5rem; margin: 1rem 0; }
  .en-box h4 { color: var(--en); font-size: 0.95rem; margin-bottom: 0.5rem; }
  .en-box p { font-size: 0.85rem; margin-bottom: 0.3rem; }
  .overflow-x { overflow-x: auto; }
</style>
</head>
<body>
<figure>
  <div class="diagram-container">
    <h3>Verb Form Identification Flowchart (Forms I-X)</h3>
    <p class="subtitle">Like a periodic table of semantic modifications -- once you know the table, you can predict properties of any element</p>

    <div class="shortcut-box">
      <h4>QUICK IDENTIFICATION: What to Look For</h4>
      <p><strong>See ta- prefix?</strong> Form V (if doubled middle) or Form VI (if long a after first root letter)</p>
      <p><strong>See ista- prefix?</strong> Form X (seeking/considering)</p>
      <p><strong>See in- prefix?</strong> Form VII (passive/spontaneous)</p>
      <p><strong>See doubled middle consonant?</strong> Form II (causative/intensive)</p>
      <p><strong>See long a after first root letter?</strong> Form III (reciprocal/with someone)</p>
      <p><strong>See a- prefix (no ta-)?</strong> Form IV (causative/transitive)</p>
      <p><strong>See infix -t- after first consonant?</strong> Form VIII (reflexive/effort)</p>
    </div>

    <div class="overflow-x">
    <table>
      <thead>
        <tr>
          <th style="background:var(--form-bg);color:var(--form);">Form</th>
          <th style="background:var(--q-bg);color:var(--q);">Visual Cue (Template)</th>
          <th style="background:var(--sem-bg);color:var(--sem);">Semantic Function</th>
          <th>Example (root: '-l-m = know)</th>
          <th>Example (root: k-t-b = write)</th>
          <th style="color:var(--en);">English Equivalent</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td class="form-num" style="color:var(--form);">I</td>
          <td class="visual-cue" style="color:var(--q);">fa'ala (basic shape)</td>
          <td style="color:var(--sem);">Basic meaning</td>
          <td>'alima = he knew</td>
          <td>kataba = he wrote</td>
          <td style="color:var(--en);">know, write</td>
        </tr>
        <tr>
          <td class="form-num" style="color:var(--form);">II</td>
          <td class="visual-cue" style="color:var(--q);">fa''ala (DOUBLED middle)</td>
          <td style="color:var(--sem);">Causative / Intensive</td>
          <td>'allama = he taught</td>
          <td>kattaba = he dictated</td>
          <td style="color:var(--en);">teach (cause to know)</td>
        </tr>
        <tr>
          <td class="form-num" style="color:var(--form);">III</td>
          <td class="visual-cue" style="color:var(--q);">fa:ala (LONG A after 1st)</td>
          <td style="color:var(--sem);">Reciprocal / With someone</td>
          <td>--</td>
          <td>kataba = he corresponded</td>
          <td style="color:var(--en);">correspond with</td>
        </tr>
        <tr>
          <td class="form-num" style="color:var(--form);">IV</td>
          <td class="visual-cue" style="color:var(--q);">af'ala (PREFIX a-)</td>
          <td style="color:var(--sem);">Causative (transitive)</td>
          <td>a'lama = he informed</td>
          <td>--</td>
          <td style="color:var(--en);">inform (cause to know)</td>
        </tr>
        <tr>
          <td class="form-num" style="color:var(--form);">V</td>
          <td class="visual-cue" style="color:var(--q);">tafa''ala (ta- + DOUBLED)</td>
          <td style="color:var(--sem);">Reflexive of II</td>
          <td>ta'allama = he learned</td>
          <td>--</td>
          <td style="color:var(--en);">learn (cause self to know)</td>
        </tr>
        <tr>
          <td class="form-num" style="color:var(--form);">VI</td>
          <td class="visual-cue" style="color:var(--q);">tafa:'ala (ta- + LONG A)</td>
          <td style="color:var(--sem);">Mutual / Pretend</td>
          <td>--</td>
          <td>takataba = they corresponded</td>
          <td style="color:var(--en);">correspond mutually</td>
        </tr>
        <tr>
          <td class="form-num" style="color:var(--form);">VII</td>
          <td class="visual-cue" style="color:var(--q);">infa'ala (PREFIX in-)</td>
          <td style="color:var(--sem);">Passive / Spontaneous</td>
          <td>--</td>
          <td>inkataba = it was inscribed</td>
          <td style="color:var(--en);">be written/inscribed</td>
        </tr>
        <tr>
          <td class="form-num" style="color:var(--form);">VIII</td>
          <td class="visual-cue" style="color:var(--q);">ifta'ala (INFIX -t-)</td>
          <td style="color:var(--sem);">Reflexive / Effort</td>
          <td>--</td>
          <td>iktataba = he copied/subscribed</td>
          <td style="color:var(--en);">subscribe (write for self)</td>
        </tr>
        <tr>
          <td class="form-num" style="color:var(--form);">IX</td>
          <td class="visual-cue" style="color:var(--q);">if'alla (DOUBLED final)</td>
          <td style="color:var(--sem);">Colors / Physical traits</td>
          <td colspan="2" style="text-align:center;">ihmarra = he turned red (h-m-r)</td>
          <td style="color:var(--en);">turn red/go pale</td>
        </tr>
        <tr>
          <td class="form-num" style="color:var(--form);">X</td>
          <td class="visual-cue" style="color:var(--q);">istaf'ala (PREFIX ista-)</td>
          <td style="color:var(--sem);">Seeking / Considering</td>
          <td>ista'lama = he inquired</td>
          <td>istaktaba = he asked to write</td>
          <td style="color:var(--en);">inquire (seek to know)</td>
        </tr>
      </tbody>
    </table>
    </div>

    <div class="chain-box">
      <h4>THE SEMANTIC CHAIN PATTERNS (Memorize These)</h4>
      <p><strong>I -> II -> V:</strong> basic -> causative -> reflexive. <em>know -> teach -> learn.</em> The most productive chain.</p>
      <p><strong>III -> VI:</strong> with someone -> mutual. <em>correspond -> correspond with each other.</em></p>
      <p><strong>I -> VII:</strong> basic -> passive/spontaneous. <em>break -> be broken.</em></p>
      <p><strong>I -> X:</strong> basic -> seeking. <em>know -> inquire. forgive -> seek forgiveness.</em></p>
      <p><strong>The consistency guarantee:</strong> These patterns hold across the ENTIRE Arabic verb lexicon. No verb has an "irregular Form V." Every Form V follows the same template.</p>
    </div>

    <div class="en-box">
      <h4>ENGLISH COMPARISON: No Equivalent System</h4>
      <p>To express what Arabic does with Forms I-X, English uses separate verbs (know/teach/learn), phrasal verbs (look up, look into), or auxiliary constructions (make someone write). None follow a consistent pattern.</p>
      <p>Arabic: <strong>'alima</strong> (I, know) -> <strong>'allama</strong> (II, teach) -> <strong>ta'allama</strong> (V, learn). Same root, predictable pattern.</p>
      <p>English: <strong>know</strong> -> <strong>teach</strong> -> <strong>learn</strong>. Three unrelated word shapes. No pattern at all.</p>
    </div>
  </div>
  <figcaption>
    <h2>Verb Form Identification Flowchart (Forms I-X)</h2>
    <p>Each Arabic verb form (I-X) has a distinctive visual template and a consistent semantic function. Form II always doubles the middle consonant and means causative/intensive. Form X always uses the ista- prefix and means seeking/considering. These patterns hold across the entire verb lexicon with no exceptions -- a consistency guarantee that English cannot match.</p>
  </figcaption>
</figure>
</body>
</html>
