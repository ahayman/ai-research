  .pattern-box p { font-size: 0.85rem; margin-bottom: 0.3rem; }

    <div class="pattern-box">
      <h4>THE PATTERN WITHIN THE "IRREGULARITY"</h4>
      <p><strong>Sound plurals</strong> (add -un/-in or -at) are the regular default -- like English -s. Used for many feminine nouns and most participles.</p>
      <p><strong>Broken plurals</strong> are "irregular" only relative to the sound plural default. Internally, they are SYSTEMATIC -- each singular pattern has a predictable (or small set of predictable) plural patterns.</p>
      <p><strong>The 80/20 rule:</strong> Grammarians catalog 30+ broken plural patterns, but 8 patterns cover approximately 70% of common vocabulary. Learn these 8 first; the long tail can wait.</p>
      <p><strong>Recognition strategy:</strong> Learn to identify the singular's vowel pattern (CiCaC? CaCaC? CaCiC?) -> look up the corresponding plural pattern -> apply. With practice, this becomes automatic.</p>
    </div>

    <div class="en-box">
      <h4>ENGLISH COMPARISON: Arbitrary Relics vs. Systematic Patterns</h4>
      <p><strong>English irregular plurals (~20 words):</strong> man/men, child/children, mouse/mice, goose/geese, ox/oxen, tooth/teeth. TRULY irregular -- each is a historical relic with no predictive pattern. You cannot predict "geese" from "goose" without memorizing it.</p>
      <p><strong>Arabic broken plurals (~30 patterns, thousands of words):</strong> Each pattern covers HUNDREDS of words. kitab/kutub and bahr/buhur follow the SAME pattern. Once you learn the pattern, it applies broadly. Arabic broken plurals have STRUCTURE within the irregularity. English irregular plurals have only history.</p>
    </div>
  </div>
  <figcaption>
    <h2>Broken Plural Pattern Map: The 8 Most Common Patterns</h2>
    <p>Arabic broken plurals change the internal vowel pattern of the word rather than adding a suffix. While grammarians catalog 30+ patterns, the 8 most common cover approximately 70% of frequently used nouns. Unlike English's truly arbitrary irregular plurals (man/men, goose/geese), Arabic broken plurals follow systematic, learnable patterns -- there are rules within the "irregularity."</p>
  </figcaption>
</figure>
