<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Optimal Learning Sequence for Pattern Learners</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --accent: #4361ee; --accent-light: #e8edff;
    --p1: #ef4444; --p1-bg: #fee2e2;
    --p2: #f59e0b; --p2-bg: #fef3c7;
    --p3: #10b981; --p3-bg: #d1fae5;
    --p4: #3b82f6; --p4-bg: #dbeafe;
    --p5: #8b5cf6; --p5-bg: #ede9fe;
    --p6: #ec4899; --p6-bg: #fce7f3;
    --en: #10b981; --en-bg: #d1fae5;
    --muted: #6c757d; --caption-bg: #f8f9fa;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a; --fg: #e8e8f0; --surface: #1a1a2e; --border: #2d2d44;
      --accent: #6b8aff; --accent-light: #1e2a4a;
      --p1: #f87171; --p1-bg: #5c1a1a;
      --p2: #fbbf24; --p2-bg: #78350f;
      --p3: #34d399; --p3-bg: #064e3b;
      --p4: #60a5fa; --p4-bg: #1e3a5f;
      --p5: #a78bfa; --p5-bg: #3b2d6b;
      --p6: #f472b6; --p6-bg: #5c1a3a;
      --en: #34d399; --en-bg: #064e3b;
      --muted: #9a9ab0; --caption-bg: #1a1a2e;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--fg); display: flex; justify-content: center; padding: 2rem 1rem; line-height: 1.6; }
  figure { max-width: 1100px; width: 100%; }
  .diagram-container { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 1.5rem 1rem; overflow-x: auto; }
  figcaption { text-align: center; margin-top: 1.5rem; padding: 1rem 1.5rem; background: var(--caption-bg); border-radius: 8px; border: 1px solid var(--border); }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  svg { display: block; margin: 0 auto; }
  .title-text { font: bold 15px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
  .label { font: 11px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
  .label-bold { font: bold 11px 'Segoe UI', system-ui, sans-serif; }
  .label-sm { font: 10px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
  .phase-title { font: bold 13px 'Segoe UI', system-ui, sans-serif; }
  .phase-sub { font: bold 10px 'Segoe UI', system-ui, sans-serif; }
</style>
</head>
<body>
<figure>
  <div class="diagram-container">
    <svg viewBox="0 0 1060 850" xmlns="http://www.w3.org/2000/svg" style="min-width:750px;">
      <defs>
        <marker id="arrD2" markerWidth="8" markerHeight="8" refX="4" refY="8" orient="auto"><polygon points="0 0, 8 0, 4 8" fill="var(--accent)"/></marker>
      </defs>

      <text x="530" y="25" text-anchor="middle" class="title-text" style="font-size:16px;">Optimal Learning Sequence for Pattern-Oriented Learners</text>
      <text x="530" y="43" text-anchor="middle" class="label-sm" style="font-size:11px;">System first, variations later -- designed for pattern-recognition cognitive strengths</text>

      <!-- Central timeline arrow -->
      <line x1="80" y1="70" x2="80" y2="730" stroke="var(--accent)" stroke-width="2" opacity="0.3"/>

      <!-- Time labels on left -->
      <text x="70" y="90" text-anchor="end" class="label-sm" fill="var(--muted)">Week 1</text>
      <text x="70" y="210" text-anchor="end" class="label-sm" fill="var(--muted)">Week 3</text>
      <text x="70" y="330" text-anchor="end" class="label-sm" fill="var(--muted)">Week 6</text>
      <text x="70" y="450" text-anchor="end" class="label-sm" fill="var(--muted)">Week 12</text>
      <text x="70" y="570" text-anchor="end" class="label-sm" fill="var(--muted)">Week 16</text>
      <text x="70" y="690" text-anchor="end" class="label-sm" fill="var(--muted)">Week 20+</text>

      <!-- PATTERN SYSTEM GROWTH bar (right side) -->
      <text x="980" y="70" text-anchor="end" class="label-bold" fill="var(--accent)">Pattern System Growth</text>
      <rect x="960" y="80" width="20" height="640" rx="10" fill="var(--surface)" stroke="var(--border)" stroke-width="1"/>
      <defs>
        <linearGradient id="growth" x1="0" y1="1" x2="0" y2="0">
          <stop offset="0%" stop-color="var(--p1)"/>
          <stop offset="20%" stop-color="var(--p2)"/>
          <stop offset="40%" stop-color="var(--p3)"/>
          <stop offset="60%" stop-color="var(--p4)"/>
          <stop offset="80%" stop-color="var(--p5)"/>
          <stop offset="100%" stop-color="var(--p6)"/>
        </linearGradient>
      </defs>
      <rect x="962" y="82" width="16" height="636" rx="8" fill="url(#growth)" opacity="0.6"/>

      <!-- PHASE 1: Script -->
      <rect x="100" y="70" width="840" height="110" rx="8" fill="var(--p1-bg)" stroke="var(--p1)" stroke-width="2"/>
      <text x="120" y="92" class="phase-title" fill="var(--p1)">PHASE 1: The Script (Weeks 1-3)</text>
      <text x="120" y="110" class="label" fill="var(--fg)">Learn the alphabet AS a pattern system:</text>
      <text x="135" y="127" class="label" fill="var(--fg)">1. Learn ~15 base shapes (ignoring dots) -- these are the underlying forms</text>
      <text x="135" y="142" class="label" fill="var(--fg)">2. Add the dot differentiation system (b/t/th/n/y share one shape with 0-3 dots)</text>
      <text x="135" y="157" class="label" fill="var(--fg)">3. Learn 6 non-connecting letters as a closed class. Practice positional forms.</text>
      <text x="135" y="172" class="label" fill="var(--fg)">4. Learn harakat (vowel marks) simultaneously for early reading.</text>
      <text x="680" y="92" class="phase-sub" fill="var(--p1)">TARGET: Read voweled text fluently</text>
      <text x="680" y="110" class="label-sm" fill="var(--muted)">28 letters, systematic dot system</text>
      <text x="680" y="125" class="label-sm" fill="var(--muted)">Pattern: base shapes + dots = letters</text>

      <!-- Arrow -->
      <line x1="530" y1="180" x2="530" y2="195" stroke="var(--accent)" stroke-width="1.5" marker-end="url(#arrD2)"/>

      <!-- PHASE 2: Root System -->
      <rect x="100" y="195" width="840" height="110" rx="8" fill="var(--p2-bg)" stroke="var(--p2)" stroke-width="2"/>
      <text x="120" y="217" class="phase-title" fill="var(--p2)">PHASE 2: The Root System (Weeks 3-8)</text>
      <text x="120" y="235" class="label" fill="var(--fg)">Introduce the root concept with 10 high-frequency roots:</text>
      <text x="135" y="252" class="label" fill="var(--fg)">k-t-b (writing), '-l-m (knowledge), d-r-s (study), q-r-' (reading), s-l-m (peace)</text>
      <text x="135" y="267" class="label" fill="var(--fg)">h-s-b (counting), f-'-l (doing), kh-r-j (exiting), d-kh-l (entering), s-m-' (hearing)</text>
      <text x="135" y="282" class="label" fill="var(--fg)">For each root: learn 5-10 derived words, identify the pattern in each. Practice root extraction.</text>
      <text x="680" y="217" class="phase-sub" fill="var(--p2)">TARGET: Automatic root recognition</text>
      <text x="680" y="235" class="label-sm" fill="var(--muted)">10 roots x 8+ patterns = 80+ words</text>
      <text x="680" y="250" class="label-sm" fill="var(--muted)">Pattern: ROOT + PATTERN = WORD</text>

      <line x1="530" y1="305" x2="530" y2="320" stroke="var(--accent)" stroke-width="1.5" marker-end="url(#arrD2)"/>

      <!-- PHASE 3: Verb Forms -->
      <rect x="100" y="320" width="840" height="110" rx="8" fill="var(--p3-bg)" stroke="var(--p3)" stroke-width="2"/>
      <text x="120" y="342" class="phase-title" fill="var(--p3)">PHASE 3: Verb Form System (Weeks 6-12)</text>
      <text x="120" y="360" class="label" fill="var(--fg)">Learn the ten forms AS a system, not individually:</text>
      <text x="135" y="377" class="label" fill="var(--fg)">Start with Form I-II-V chain (basic -> causative -> reflexive): 'alima -> 'allama -> ta'allama</text>
      <text x="135" y="392" class="label" fill="var(--fg)">Add Form III-VI (reciprocal -> mutual), Form VII (passive), Form X (seeking)</text>
      <text x="135" y="407" class="label" fill="var(--fg)">Practice: given root + form number -> produce verb. Given verb -> identify form + predict meaning.</text>
      <text x="680" y="342" class="phase-sub" fill="var(--p3)">TARGET: Form identification in context</text>
      <text x="680" y="360" class="label-sm" fill="var(--muted)">10 forms x known roots = verb explosion</text>
      <text x="680" y="375" class="label-sm" fill="var(--muted)">Pattern: semantic modification chains</text>

      <line x1="530" y1="430" x2="530" y2="445" stroke="var(--accent)" stroke-width="1.5" marker-end="url(#arrD2)"/>

      <!-- PHASE 4: Noun Patterns -->
      <rect x="100" y="445" width="840" height="100" rx="8" fill="var(--p4-bg)" stroke="var(--p4)" stroke-width="2"/>
      <text x="120" y="467" class="phase-title" fill="var(--p4)">PHASE 4: Noun Patterns (Weeks 8-16)</text>
      <text x="120" y="485" class="label" fill="var(--fg)">Learn major noun derivation patterns as extensions of the root system:</text>
      <text x="135" y="502" class="label" fill="var(--fg)">Active participle (CaCiC = doer), Passive participle (maCCuC = done-to), Noun of place (maCCaC)</text>
      <text x="135" y="517" class="label" fill="var(--fg)">Noun of instrument (miCCaC), Masdar patterns per form, Broken plural patterns (8 most common)</text>
      <text x="680" y="467" class="phase-sub" fill="var(--p4)">TARGET: Decompose any derived noun</text>
      <text x="680" y="485" class="label-sm" fill="var(--muted)">Vocabulary EXPLOSION phase</text>

      <line x1="530" y1="545" x2="530" y2="560" stroke="var(--accent)" stroke-width="1.5" marker-end="url(#arrD2)"/>

      <!-- PHASE 5: Grammar Skeleton -->
      <rect x="100" y="560" width="840" height="100" rx="8" fill="var(--p5-bg)" stroke="var(--p5)" stroke-width="2"/>
      <text x="120" y="582" class="phase-title" fill="var(--p5)">PHASE 5: The Grammar Skeleton (Weeks 12-20)</text>
      <text x="120" y="600" class="label" fill="var(--fg)">Now add grammatical patterns on top of the vocabulary foundation:</text>
      <text x="135" y="617" class="label" fill="var(--fg)">Case system (3 cases, 3 vowels). Definiteness (al- vs. tanwin -- binary). Gender agreement (ta' marbuta rule).</text>
      <text x="135" y="632" class="label" fill="var(--fg)">Idafa (possessive pattern). Sentence types (nominal: X is Y; verbal: V-S-O). Non-human plural agreement.</text>
      <text x="680" y="582" class="phase-sub" fill="var(--p5)">TARGET: Produce + parse MSA sentences</text>
      <text x="680" y="600" class="label-sm" fill="var(--muted)">Grammar is simple when vocabulary is strong</text>

      <line x1="530" y1="660" x2="530" y2="675" stroke="var(--accent)" stroke-width="1.5" marker-end="url(#arrD2)"/>

      <!-- PHASE 6: Dialect Layer -->
      <rect x="100" y="675" width="840" height="90" rx="8" fill="var(--p6-bg)" stroke="var(--p6)" stroke-width="2"/>
      <text x="120" y="697" class="phase-title" fill="var(--p6)">PHASE 6: Dialect Layer (Week 16+)</text>
      <text x="120" y="715" class="label" fill="var(--fg)">Add ONE dialect as a SYSTEMATIC TRANSFORMATION of the MSA base:</text>
      <text x="135" y="732" class="label" fill="var(--fg)">Egyptian: drop cases + b- present + ha- future + ma...sh negation = predictable rule set</text>
      <text x="135" y="747" class="label" fill="var(--fg)">This approach works BECAUSE you learned the base system first -- the dialect is a transformation, not a new language.</text>
      <text x="680" y="697" class="phase-sub" fill="var(--p6)">TARGET: Conversational + reading ability</text>
      <text x="680" y="715" class="label-sm" fill="var(--muted)">Dialect = predictable simplification of MSA</text>

      <!-- BOTTOM: Principle -->
      <rect x="100" y="780" width="840" height="40" rx="8" fill="var(--accent-light)" stroke="var(--accent)" stroke-width="2"/>
      <text x="530" y="802" text-anchor="middle" class="label-bold" style="font-size:12px;" fill="var(--accent)">KEY PRINCIPLE: System first, variations later = the pattern learner's optimal sequence.</text>
      <text x="530" y="816" text-anchor="middle" class="label-sm">This sequence exists BECAUSE Arabic has a system to sequence. English has no equivalent systematic learning pathway.</text>

    </svg>
  </div>
  <figcaption>
    <h2>Optimal Learning Sequence for Pattern-Oriented Learners</h2>
    <p>A six-phase roadmap optimized for pattern-recognition strengths: script (the dot-differentiation pattern system), roots (the vocabulary engine), verb forms (the semantic modification table), noun patterns (the derivation expansion), grammar (the structural skeleton), then dialect (a systematic transformation of the MSA base). Each phase builds on the previous, with the pattern system growing at each step. The very existence of this structured pathway is evidence that Arabic is a pattern language.</p>
  </figcaption>
</figure>
</body>
</html>
