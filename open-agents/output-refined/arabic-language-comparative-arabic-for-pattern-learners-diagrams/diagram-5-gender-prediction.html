<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gender Prediction Decision Tree</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --accent: #4361ee; --accent-light: #e8edff;
    --fem: #ec4899; --fem-bg: #fce7f3;
    --masc: #3b82f6; --masc-bg: #dbeafe;
    --exc: #ef4444; --exc-bg: #fee2e2;
    --rule: #f59e0b; --rule-bg: #fef3c7;
    --en: #10b981; --en-bg: #d1fae5;
    --muted: #6c757d; --caption-bg: #f8f9fa;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a; --fg: #e8e8f0; --surface: #1a1a2e; --border: #2d2d44;
      --accent: #6b8aff; --accent-light: #1e2a4a;
      --fem: #f472b6; --fem-bg: #5c1a3a;
      --masc: #60a5fa; --masc-bg: #1e3a5f;
      --exc: #f87171; --exc-bg: #5c1a1a;
      --rule: #fbbf24; --rule-bg: #78350f;
      --en: #34d399; --en-bg: #064e3b;
      --muted: #9a9ab0; --caption-bg: #1a1a2e;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--fg); display: flex; justify-content: center; padding: 2rem 1rem; line-height: 1.6; }
  figure { max-width: 1100px; width: 100%; }
  .diagram-container { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 1.5rem 1rem; overflow-x: auto; }
  figcaption { text-align: center; margin-top: 1.5rem; padding: 1rem 1.5rem; background: var(--caption-bg); border-radius: 8px; border: 1px solid var(--border); }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  svg { display: block; margin: 0 auto; }
  .title-text { font: bold 15px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
  .label { font: 11px 'Segoe UI', system-ui, sans-serif; fill: var(--fg); }
  .label-bold { font: bold 11px 'Segoe UI', system-ui, sans-serif; }
  .label-sm { font: 10px 'Segoe UI', system-ui, sans-serif; fill: var(--muted); }
  .q-text { font: bold 12px 'Segoe UI', system-ui, sans-serif; }
</style>
</head>
<body>
<figure>
  <div class="diagram-container">
    <svg viewBox="0 0 1060 800" xmlns="http://www.w3.org/2000/svg" style="min-width:750px;">
      <defs>
        <marker id="arrY" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="var(--fem)"/></marker>
        <marker id="arrN" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="var(--masc)"/></marker>
      </defs>

      <text x="530" y="25" text-anchor="middle" class="title-text" style="font-size:16px;">Gender Prediction Decision Tree</text>
      <text x="530" y="43" text-anchor="middle" class="label-sm" style="font-size:11px;">Arabic gender is MORE predictable than French or German -- the ta' marbuta rule covers the vast majority</text>

      <!-- ENTRY -->
      <rect x="370" y="55" width="320" height="35" rx="17" fill="var(--accent-light)" stroke="var(--accent)" stroke-width="2"/>
      <text x="530" y="77" text-anchor="middle" class="q-text" fill="var(--accent)">What gender is this noun?</text>

      <!-- BRANCH 1: Ta' marbuta -->
      <line x1="530" y1="90" x2="530" y2="120" stroke="var(--accent)" stroke-width="2"/>
      <rect x="340" y="120" width="380" height="35" rx="6" fill="var(--rule-bg)" stroke="var(--rule)" stroke-width="2"/>
      <text x="530" y="142" text-anchor="middle" class="q-text" fill="var(--rule)">Does it end in ta' marbuta (a / ة)?</text>

      <!-- YES branch -->
      <line x1="430" y1="155" x2="250" y2="190" stroke="var(--fem)" stroke-width="2" marker-end="url(#arrY)"/>
      <text x="320" y="175" text-anchor="middle" class="label-bold" fill="var(--fem)">YES</text>

      <rect x="100" y="190" width="300" height="60" rx="8" fill="var(--fem-bg)" stroke="var(--fem)" stroke-width="2.5"/>
      <text x="250" y="213" text-anchor="middle" class="q-text" style="font-size:14px;" fill="var(--fem)">FEMININE (~85% of cases)</text>
      <text x="250" y="232" text-anchor="middle" class="label" fill="var(--fg)">madina (city), madrasa (school), jarida (newspaper)</text>
      <text x="250" y="244" text-anchor="middle" class="label-sm" fill="var(--fem)">This ONE rule covers the vast majority of Arabic gender.</text>

      <!-- Exceptions to ta' marbuta -->
      <rect x="100" y="260" width="300" height="55" rx="6" fill="var(--exc-bg)" stroke="var(--exc)" stroke-width="1.5"/>
      <text x="250" y="278" text-anchor="middle" class="label-bold" fill="var(--exc)">EXCEPTIONS: Masculine with ta' marbuta (&lt;20 words)</text>
      <text x="115" y="295" class="label-sm" fill="var(--fg)">khalifa (caliph), Talha, Hamza, Usama (male names)</text>
      <text x="115" y="308" class="label-sm" fill="var(--exc)">COUNTABLE -- memorize this short list.</text>

      <!-- NO branch -->
      <line x1="630" y1="155" x2="780" y2="190" stroke="var(--masc)" stroke-width="2" marker-end="url(#arrN)"/>
      <text x="720" y="175" text-anchor="middle" class="label-bold" fill="var(--masc)">NO</text>

      <!-- Sub-question: other feminine markers -->
      <rect x="600" y="190" width="400" height="35" rx="6" fill="var(--rule-bg)" stroke="var(--rule)" stroke-width="1.5"/>
      <text x="800" y="212" text-anchor="middle" class="q-text" fill="var(--rule)">Does it end in alif maqsura (a) or alif mamduda (a')?</text>

      <!-- YES -->
      <line x1="700" y1="225" x2="640" y2="260" stroke="var(--fem)" stroke-width="1.5"/>
      <text x="660" y="248" class="label-bold" fill="var(--fem)">YES</text>
      <rect x="540" y="260" width="200" height="45" rx="6" fill="var(--fem-bg)" stroke="var(--fem)" stroke-width="1.5"/>
      <text x="640" y="278" text-anchor="middle" class="label-bold" fill="var(--fem)">FEMININE</text>
      <text x="640" y="295" text-anchor="middle" class="label-sm">kubra (greatest), sahra' (desert)</text>

      <!-- NO -->
      <line x1="900" y1="225" x2="900" y2="260" stroke="var(--masc)" stroke-width="1.5"/>
      <text x="910" y="248" class="label-bold" fill="var(--masc)">NO</text>

      <!-- Sub-question: semantic feminines -->
      <rect x="750" y="260" width="280" height="35" rx="6" fill="var(--rule-bg)" stroke="var(--rule)" stroke-width="1.5"/>
      <text x="890" y="282" text-anchor="middle" class="q-text" fill="var(--rule)">Is it a paired body part or natural force?</text>

      <!-- YES: semantic feminine -->
      <line x1="820" y1="295" x2="770" y2="325" stroke="var(--fem)" stroke-width="1.5"/>
      <text x="788" y="315" class="label-bold" fill="var(--fem)">CHECK</text>
      <rect x="620" y="325" width="300" height="75" rx="6" fill="var(--fem-bg)" stroke="var(--fem)" stroke-width="1.5"/>
      <text x="770" y="345" text-anchor="middle" class="label-bold" fill="var(--fem)">SEMANTIC FEMININES (memorize list)</text>
      <text x="635" y="362" class="label-sm" fill="var(--fg)">Paired body parts: 'ayn (eye), yad (hand), udhn (ear), rijl (foot)</text>
      <text x="635" y="377" class="label-sm" fill="var(--fg)">Natural forces: shams (sun), nar (fire), ard (earth), rih (wind)</text>
      <text x="635" y="392" class="label-sm" fill="var(--fg)">Others: dar (house), harb (war) -- small, closed list</text>

      <!-- NO: default masculine -->
      <line x1="960" y1="295" x2="960" y2="325" stroke="var(--masc)" stroke-width="1.5"/>
      <text x="970" y="315" class="label-bold" fill="var(--masc)">NO</text>
      <rect x="870" y="325" width="180" height="45" rx="8" fill="var(--masc-bg)" stroke="var(--masc)" stroke-width="2.5"/>
      <text x="960" y="348" text-anchor="middle" class="q-text" style="font-size:14px;" fill="var(--masc)">MASCULINE</text>
      <text x="960" y="365" text-anchor="middle" class="label-sm" fill="var(--masc)">Default gender</text>

      <!-- BONUS RULE: Non-human plural agreement -->
      <rect x="100" y="430" width="860" height="65" rx="8" fill="var(--rule-bg)" stroke="var(--rule)" stroke-width="2"/>
      <text x="530" y="452" text-anchor="middle" class="q-text" fill="var(--rule)">BONUS PATTERN: Non-Human Plural Agreement</text>
      <text x="530" y="472" text-anchor="middle" class="label" fill="var(--fg)">Non-human plurals ALWAYS take feminine singular agreement, regardless of the singular's gender.</text>
      <text x="530" y="488" text-anchor="middle" class="label-bold" fill="var(--fg)">kutub kabira (big books) -- not kutub kibar. The plural "books" is treated as feminine singular.</text>

      <!-- AGREEMENT EXAMPLES -->
      <rect x="100" y="510" width="420" height="80" rx="6" fill="var(--fem-bg)" stroke="var(--fem)" stroke-width="1"/>
      <text x="310" y="530" text-anchor="middle" class="label-bold" fill="var(--fem)">Feminine Agreement Examples</text>
      <text x="115" y="548" class="label" fill="var(--fg)">madina kabira = a big city (fem. noun + fem. adj.)</text>
      <text x="115" y="563" class="label" fill="var(--fg)">kutub kabira = big books (non-human pl. = fem. sg. agreement)</text>
      <text x="115" y="578" class="label" fill="var(--fg)">al-buyut al-jamila = the beautiful houses</text>

      <rect x="540" y="510" width="420" height="80" rx="6" fill="var(--masc-bg)" stroke="var(--masc)" stroke-width="1"/>
      <text x="750" y="530" text-anchor="middle" class="label-bold" fill="var(--masc)">Masculine Agreement Examples</text>
      <text x="555" y="548" class="label" fill="var(--fg)">kitab kabir = a big book (masc. noun + masc. adj.)</text>
      <text x="555" y="563" class="label" fill="var(--fg)">walad tawil = a tall boy</text>
      <text x="555" y="578" class="label" fill="var(--fg)">al-mu'allim al-jadid = the new teacher</text>

      <!-- ENGLISH COMPARISON -->
      <rect x="100" y="610" width="860" height="65" rx="8" fill="var(--en-bg)" stroke="var(--en)" stroke-width="1.5"/>
      <text x="530" y="632" text-anchor="middle" class="label-bold" fill="var(--en)">ENGLISH COMPARISON: Three-Way Gender Comparison</text>
      <text x="530" y="650" text-anchor="middle" class="label" fill="var(--fg)">English: NO grammatical gender. Simplest possible system but no pattern to discover.</text>
      <text x="530" y="666" text-anchor="middle" class="label" fill="var(--fg)">French: Grammatical gender with FEW reliable prediction rules. Why is "table" feminine? Largely arbitrary.</text>
      <text x="530" y="680" text-anchor="middle" class="label-bold" fill="var(--en)">Arabic: Grammatical gender with a STRONG primary rule (ta' marbuta). More predictable than French.</text>

    </svg>
  </div>
  <figcaption>
    <h2>Gender Prediction Decision Tree</h2>
    <p>Arabic grammatical gender follows a clear decision tree: the ta' marbuta ending predicts feminine gender for approximately 85% of nouns. Secondary markers (alif maqsura, alif mamduda) and a small list of semantic feminines (body parts, natural forces) cover most remaining cases. Arabic gender is significantly MORE predictable from word shape than French or German gender.</p>
  </figcaption>
</figure>
</body>
</html>
