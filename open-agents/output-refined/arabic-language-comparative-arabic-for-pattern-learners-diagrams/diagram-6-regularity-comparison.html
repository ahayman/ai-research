<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arabic Regularity vs. English Irregularity</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --accent: #4361ee; --accent-light: #e8edff;
    --ar: #3b82f6; --ar-bg: #dbeafe;
    --en: #10b981; --en-bg: #d1fae5;
    --high: #10b981; --low: #ef4444; --mid: #f59e0b;
    --pattern: #ec4899; --pattern-bg: #fce7f3;
    --muted: #6c757d; --caption-bg: #f8f9fa;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a; --fg: #e8e8f0; --surface: #1a1a2e; --border: #2d2d44;
      --accent: #6b8aff; --accent-light: #1e2a4a;
      --ar: #60a5fa; --ar-bg: #1e3a5f;
      --en: #34d399; --en-bg: #064e3b;
      --high: #34d399; --low: #f87171; --mid: #fbbf24;
      --pattern: #f472b6; --pattern-bg: #5c1a3a;
      --muted: #9a9ab0; --caption-bg: #1a1a2e;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--fg); display: flex; justify-content: center; padding: 2rem 1rem; line-height: 1.6; }
  figure { max-width: 1100px; width: 100%; }
  .diagram-container { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 1.5rem 1rem; overflow-x: auto; }
  figcaption { text-align: center; margin-top: 1.5rem; padding: 1rem 1.5rem; background: var(--caption-bg); border-radius: 8px; border: 1px solid var(--border); }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  h3 { text-align: center; font-size: 1rem; color: var(--accent); margin-bottom: 0.5rem; }
  .subtitle { text-align: center; font-size: 0.82rem; color: var(--muted); margin-bottom: 1rem; }
  table { width: 100%; border-collapse: collapse; font-size: 0.82rem; margin-bottom: 1rem; min-width: 700px; }
  th { padding: 0.6rem 0.5rem; text-align: center; font-weight: 600; border: 1px solid var(--border); }
  td { padding: 0.6rem 0.5rem; border: 1px solid var(--border); vertical-align: top; }
  td.feature { font-weight: 600; text-align: left; background: var(--surface); width: 15%; }
  td.ar { background: var(--ar-bg); }
  td.en { background: var(--en-bg); }
  td.winner { font-weight: 700; text-align: center; width: 10%; }
  .bar { display: inline-block; height: 10px; border-radius: 5px; vertical-align: middle; }
  .pattern-box { background: var(--pattern-bg); border: 2px solid var(--pattern); border-radius: 8px; padding: 1rem 1.5rem; margin: 1rem 0; }
  .pattern-box h4 { color: var(--pattern); font-size: 0.95rem; margin-bottom: 0.5rem; }
  .pattern-box p { font-size: 0.85rem; margin-bottom: 0.3rem; }
  .summary-box { background: var(--accent-light); border: 1px solid var(--accent); border-radius: 8px; padding: 1rem 1.5rem; margin: 1rem 0; }
  .summary-box h4 { color: var(--accent); font-size: 0.95rem; margin-bottom: 0.5rem; }
  .summary-box p { font-size: 0.85rem; margin-bottom: 0.3rem; }
  .overflow-x { overflow-x: auto; }
</style>
</head>
<body>
<figure>
  <div class="diagram-container">
    <h3>Arabic Regularity vs. English Irregularity: Comparative Scorecard</h3>
    <p class="subtitle">Arabic is SYSTEMATICALLY complex. English is RANDOMLY complex. For pattern learners, systematic complexity is tractable.</p>

    <div class="overflow-x">
    <table>
      <thead>
        <tr>
          <th>Dimension</th>
          <th style="background:var(--ar-bg);color:var(--ar);">Arabic</th>
          <th style="background:var(--en-bg);color:var(--en);">English</th>
          <th>More Regular?</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td class="feature">Verb Conjugation</td>
          <td class="ar"><strong style="color:var(--high);">HIGHLY REGULAR</strong><br/>Almost all verbs follow their form's pattern. No equivalent to go/went, be/am/is/are/was/were. Weak verbs have predictable adjustments, not arbitrary exceptions.</td>
          <td class="en"><strong style="color:var(--low);">IRREGULAR</strong><br/>200+ irregular verbs with unpredictable forms. go/went, see/saw, be/am/is/are. Each must be memorized individually.</td>
          <td class="winner" style="color:var(--ar);"><span class="bar" style="width:85%;background:var(--ar);"></span><br/>ARABIC</td>
        </tr>
        <tr>
          <td class="feature">Plural Formation</td>
          <td class="ar"><strong style="color:var(--mid);">MIXED but SYSTEMATIC</strong><br/>Sound plurals (-un, -at) are fully regular. Broken plurals (~30 patterns) are "irregular" but follow their own sub-patterns. 8 patterns cover ~70%.</td>
          <td class="en"><strong style="color:var(--high);">MOSTLY REGULAR</strong><br/>Regular -s/-es covers 95%+. ~20 truly arbitrary irregular plurals (man/men, child/children). Simple but with relics.</td>
          <td class="winner" style="color:var(--en);">ENGLISH<br/><span style="font-size:0.75rem;color:var(--muted);">(simpler, fewer rules)</span></td>
        </tr>
        <tr>
          <td class="feature">Spelling-Pronunciation</td>
          <td class="ar"><strong style="color:var(--high);">NEARLY PERFECT</strong><br/>When voweled, Arabic spelling is almost perfectly phonetic. Each letter = one sound. Exceptions minimal (sun/lunar al- assimilation).</td>
          <td class="en"><strong style="color:var(--low);">CHAOTIC</strong><br/>"ough" has 7+ pronunciations (through, though, tough, cough, thought, bough, hiccough). English spelling is one of the most irregular of any language.</td>
          <td class="winner" style="color:var(--ar);"><span class="bar" style="width:90%;background:var(--ar);"></span><br/>ARABIC</td>
        </tr>
        <tr>
          <td class="feature">Vocabulary Transparency</td>
          <td class="ar"><strong style="color:var(--high);">HIGHLY TRANSPARENT</strong><br/>maktaba (library) transparently contains k-t-b (writing). mu'allim (teacher) contains '-l-m (knowledge). Root decomposition works on thousands of words.</td>
          <td class="en"><strong style="color:var(--low);">OPAQUE</strong><br/>"library" doesn't show "book." "teacher" doesn't show "know." Etymology is invisible without Latin/Greek training. Each word is a black box.</td>
          <td class="winner" style="color:var(--ar);"><span class="bar" style="width:90%;background:var(--ar);"></span><br/>ARABIC</td>
        </tr>
        <tr>
          <td class="feature">Gender Predictability</td>
          <td class="ar"><strong style="color:var(--high);">HIGHLY PREDICTABLE</strong><br/>Ta' marbuta ending = feminine (~85%). Clear secondary markers. Small exception list. Much more predictable than French/German.</td>
          <td class="en"><strong style="color:var(--high);">NO GENDER</strong><br/>No grammatical gender at all. Simplest possible system -- nothing to predict because nothing exists.</td>
          <td class="winner" style="color:var(--muted);">TIE<br/><span style="font-size:0.75rem;color:var(--muted);">EN simpler; AR more predictable than other gendered languages</span></td>
        </tr>
        <tr>
          <td class="feature">Case Marking</td>
          <td class="ar"><strong style="color:var(--high);">PERFECTLY MAPPED</strong><br/>3 cases = 3 vowels (u, a, i). No exceptions to the vowel-case mapping. Elegantly simple once learned. (MSA only; dialects dropped cases.)</td>
          <td class="en"><strong style="color:var(--high);">NO CASES</strong><br/>No case marking on nouns. Word order rigid to compensate. Simpler but less flexible.</td>
          <td class="winner" style="color:var(--muted);">TIE<br/><span style="font-size:0.75rem;color:var(--muted);">EN simpler; AR more explicit/flexible</span></td>
        </tr>
        <tr>
          <td class="feature">Learning Curve Shape</td>
          <td class="ar"><strong style="color:var(--high);">EXPONENTIAL (J-curve)</strong><br/>Slow start (unfamiliar script/sounds), then accelerating as root-pattern recognition kicks in. Each pattern multiplies with every root.</td>
          <td class="en"><strong style="color:var(--mid);">LINEAR</strong><br/>Each new word costs the same effort as the last. No generative system to discover. Steady but never accelerating.</td>
          <td class="winner" style="color:var(--ar);"><span class="bar" style="width:70%;background:var(--ar);"></span><br/>ARABIC<br/><span style="font-size:0.75rem;color:var(--muted);">(after initial hump)</span></td>
        </tr>
      </tbody>
    </table>
    </div>

    <div class="summary-box">
      <h4>SCORE SUMMARY</h4>
      <p><strong>Arabic wins on:</strong> verb regularity, spelling-pronunciation, vocabulary transparency, learning curve acceleration</p>
      <p><strong>English wins on:</strong> simpler plurals, no gender/case systems to learn (lower entry barrier)</p>
      <p><strong>The key insight:</strong> Arabic's advantages are in SYSTEMATIC features that reward pattern recognition. English's advantages are in ABSENCE of features (no gender, no cases) -- simpler but less patterned.</p>
    </div>

    <div class="pattern-box">
      <h4>FOR PATTERN LEARNERS: The Difficulty Reframe</h4>
      <p>The FSI rates Arabic as <strong>Category V</strong> (~2,200 class hours for English speakers). But this measures UNFAMILIARITY, not IRREGULARITY.</p>
      <p>What English speakers experience as "Arabic is hard" decomposes into: (1) unfamiliar script (learnable in 2-4 weeks), (2) unfamiliar phonemes (learnable with practice), (3) unfamiliar morphology (the root system -- once internalized, it ACCELERATES learning), (4) diglossia (a social reality, not a linguistic complexity).</p>
      <p><strong>NONE of these difficulties are about Arabic being LESS SYSTEMATIC. They are ALL about it being DIFFERENTLY SYSTEMATIC.</strong></p>
      <p>For a brain that thrives on patterns, Arabic offers an extraordinarily rich and satisfying system to discover. The "difficulty" is the entry barrier. The "reward" is a language where most of vocabulary and grammar is PREDICTABLE.</p>
    </div>
  </div>
  <figcaption>
    <h2>Arabic Regularity vs. English Irregularity: Comparative Scorecard</h2>
    <p>Across seven linguistic dimensions, Arabic demonstrates higher systematic regularity than English in verb conjugation, spelling-pronunciation correspondence, vocabulary transparency, and learning curve shape. English is simpler in that it lacks gender and case systems entirely. The core insight: Arabic is systematically complex (patterns everywhere); English is randomly complex (exceptions everywhere). For pattern-oriented learners, systematic complexity is tractable.</p>
  </figcaption>
</figure>
</body>
</html>
