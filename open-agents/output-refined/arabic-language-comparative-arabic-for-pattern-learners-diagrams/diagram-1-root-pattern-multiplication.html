<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Root-Pattern Multiplication Table</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --surface: #f8f9fa; --border: #dee2e6;
    --accent: #4361ee; --accent-light: #e8edff;
    --root: #3b82f6; --root-bg: #dbeafe;
    --pattern: #8b5cf6; --pattern-bg: #ede9fe;
    --word: #14b8a6; --word-bg: #ccfbf1;
    --en: #10b981; --en-bg: #d1fae5;
    --highlight: #f59e0b; --highlight-bg: #fef3c7;
    --muted: #6c757d; --caption-bg: #f8f9fa;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a; --fg: #e8e8f0; --surface: #1a1a2e; --border: #2d2d44;
      --accent: #6b8aff; --accent-light: #1e2a4a;
      --root: #60a5fa; --root-bg: #1e3a5f;
      --pattern: #a78bfa; --pattern-bg: #3b2d6b;
      --word: #2dd4bf; --word-bg: #134e4a;
      --en: #34d399; --en-bg: #064e3b;
      --highlight: #fbbf24; --highlight-bg: #78350f;
      --muted: #9a9ab0; --caption-bg: #1a1a2e;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--fg); display: flex; justify-content: center; padding: 2rem 1rem; line-height: 1.6; }
  figure { max-width: 1100px; width: 100%; }
  .diagram-container { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 1.5rem 1rem; overflow-x: auto; }
  figcaption { text-align: center; margin-top: 1.5rem; padding: 1rem 1.5rem; background: var(--caption-bg); border-radius: 8px; border: 1px solid var(--border); }
  figcaption h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  figcaption p { font-size: 0.85rem; color: var(--muted); }
  h3 { text-align: center; font-size: 1rem; color: var(--accent); margin-bottom: 0.5rem; }
  .subtitle { text-align: center; font-size: 0.82rem; color: var(--muted); margin-bottom: 1rem; }
  table { width: 100%; border-collapse: collapse; font-size: 0.8rem; margin-bottom: 1.5rem; min-width: 750px; }
  th { padding: 0.5rem 0.3rem; text-align: center; font-weight: 600; border: 1px solid var(--border); }
  th.root-header { background: var(--root-bg); color: var(--root); }
  th.pattern-header { background: var(--pattern-bg); color: var(--pattern); font-size: 0.75rem; }
  td { padding: 0.4rem 0.3rem; text-align: center; border: 1px solid var(--border); }
  td.root-cell { background: var(--root-bg); color: var(--root); font-weight: 700; font-size: 0.85rem; }
  td.word-cell { background: var(--word-bg); color: var(--word); font-size: 0.78rem; }
  td.word-cell .ar { font-weight: 600; display: block; }
  td.word-cell .en { font-size: 0.72rem; color: var(--muted); }
  .formula { text-align: center; padding: 1rem; margin: 1rem 0; background: var(--accent-light); border-radius: 8px; border: 1px solid var(--accent); }
  .formula code { font-family: 'Consolas', 'Courier New', monospace; font-size: 1.1rem; font-weight: 700; color: var(--accent); }
  .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin: 1rem 0; }
  @media (max-width: 700px) { .stats-grid { grid-template-columns: 1fr; } }
  .stat-card { border-radius: 8px; padding: 1rem; text-align: center; border-width: 2px; border-style: solid; }
  .stat-card .number { font-size: 1.5rem; font-weight: 700; }
  .stat-card .label { font-size: 0.82rem; }
  .pattern-box { background: var(--highlight-bg); border: 1px solid var(--highlight); border-radius: 8px; padding: 1rem 1.5rem; margin: 1rem 0; }
  .pattern-box h4 { color: var(--highlight); font-size: 0.95rem; margin-bottom: 0.5rem; }
  .pattern-box p { font-size: 0.85rem; margin-bottom: 0.3rem; }
  .en-box { background: var(--en-bg); border: 1px solid var(--en); border-radius: 8px; padding: 1rem 1.5rem; margin: 1rem 0; }
  .en-box h4 { color: var(--en); font-size: 0.95rem; margin-bottom: 0.5rem; }
  .en-box p { font-size: 0.85rem; margin-bottom: 0.3rem; }
</style>
</head>
<body>
<figure>
  <div class="diagram-container">

    <p class="subtitle">WORD = f(ROOT, PATTERN) -- Arabic vocabulary is a GENERATIVE SYSTEM, not a list</p>

    <div class="formula">
      <code>5 roots + 8 patterns = 13 items learned &rarr; 40 words produced</code>
    </div>

          <th class="pattern-header">Masdar<br/>(verbal noun)</th>
          <th class="pattern-header">Noun of<br/>Instrument</th>
          <th class="pattern-header">Related<br/>Noun</th>
        </tr>
      </thead>
      <tbody>

          <td class="word-cell"><span class="ar">'alim</span><span class="en">scholar</span></td>
          <td class="word-cell"><span class="ar">ma'lum</span><span class="en">known</span></td>

      </tbody>
    </table>

    <div class="stats-grid">
      <div class="stat-card" style="background:var(--root-bg);border-color:var(--root);">
        <div class="number" style="color:var(--root);">5</div>
        <div class="label">Roots learned</div>
      </div>
      <div class="stat-card" style="background:var(--pattern-bg);border-color:var(--pattern);">
        <div class="number" style="color:var(--pattern);">8</div>
        <div class="label">Patterns learned</div>
      </div>
      <div class="stat-card" style="background:var(--highlight-bg);border-color:var(--highlight);">
        <div class="number" style="color:var(--highlight);">~40</div>
        <div class="label">Words produced</div>
      </div>
    </div>

    <div class="pattern-box">
      <h4>THE EXPONENTIAL PATTERN</h4>
      <p><strong>Linear (English):</strong> 40 words = 40 separate memorization items. Each new word costs equally.</p>
      <p><strong>Exponential (Arabic):</strong> 40 words = 13 learned items (5 roots + 8 patterns). Each NEW root learned adds 8 more words. Each NEW pattern learned multiplies with all 5 roots.</p>
      <p><strong>At scale:</strong> 100 roots x 10 patterns = 1,000 words from 110 items. 500 roots x 20 patterns = 10,000 words from 520 items.</p>
      <p>For a brain that excels at pattern extraction and rule application, this is the ideal architecture.</p>
    </div>

    <div class="en-box">
      <h4>ENGLISH COMPARISON: Museum vs. Factory</h4>
      <p><strong>English vocabulary is a museum:</strong> a collection of individual items from many sources (Germanic, French, Latin, Greek, Norse) with no unifying generative principle. "Library," "book," "write," "author," "literacy" -- five unrelated word shapes for one semantic domain.</p>
      <p><strong>Arabic vocabulary is a factory:</strong> one root (k-t-b) + eight patterns = eight transparently connected words. The system GENERATES vocabulary. For pattern-oriented learners who are strong at systems but may struggle with arbitrary memorization, the factory model is fundamentally more congruent.</p>
    </div>
  </div>
  <figcaption>
    <h2>The Root-Pattern Multiplication Table</h2>
    <p>Arabic word formation is a mathematical function: WORD = f(ROOT, PATTERN). Five roots combined with eight patterns produce approximately 40 words from only 13 learned items. This exponential learning curve is the core argument for Arabic's tractability for pattern-oriented learners -- each new root multiplies with every known pattern, and each new pattern multiplies with every known root.</p>
  </figcaption>
</figure>
</body>
</html>
