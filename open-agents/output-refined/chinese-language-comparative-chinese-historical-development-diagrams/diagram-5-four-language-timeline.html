<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Four-Language Historical Comparison Timeline</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #f8f9fa;
    color: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 2rem;
  }
  figure {
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
    max-width: 1150px;
    width: 100%;
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid #e9ecef;
  }
  figcaption strong { display: block; font-size: 1.15rem; color: #1a1a2e; margin-bottom: 0.4rem; }
  figcaption span { font-size: 0.9rem; color: #6c757d; line-height: 1.5; }
  svg { max-width: 100%; height: auto; }
  .legend {
    display: flex; justify-content: center; gap: 1.5rem; margin-top: 1rem; flex-wrap: wrap;
  }
  .legend-item { display: flex; align-items: center; gap: 0.5rem; font-size: 0.85rem; color: #495057; }
  .legend-swatch { width: 16px; height: 16px; border-radius: 4px; }
  @media (prefers-color-scheme: dark) {
    body { background: #1a1a2e; color: #e9ecef; }
    figure { background: #2d2d44; box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
    figcaption { border-top-color: #3d3d5c; }
    figcaption strong { color: #e9ecef; }
    figcaption span { color: #adb5bd; }
    .legend-item { color: #adb5bd; }
    svg text { fill: #e9ecef; }
  }
</style>
</head>
<body>
<figure>
  <svg viewBox="0 0 1100 720" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
    <text x="550" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#1a1a2e">Four-Language Historical Comparison</text>
    <text x="550" y="50" text-anchor="middle" font-size="13" fill="#6c757d">Chinese, English, French, and Arabic -- parallel tracks revealing shared pressures and divergent solutions</text>

    <!-- Time axis at top -->
    <line x1="170" y1="80" x2="1060" y2="80" stroke="#94a3b8" stroke-width="1"/>
    <text x="200" y="75" text-anchor="middle" font-size="9" fill="#94a3b8">1250 BCE</text>
    <text x="330" y="75" text-anchor="middle" font-size="9" fill="#94a3b8">221 BCE</text>
    <text x="420" y="75" text-anchor="middle" font-size="9" fill="#94a3b8">100 CE</text>
    <text x="510" y="75" text-anchor="middle" font-size="9" fill="#94a3b8">450 CE</text>
    <text x="600" y="75" text-anchor="middle" font-size="9" fill="#94a3b8">650 CE</text>
    <text x="690" y="75" text-anchor="middle" font-size="9" fill="#94a3b8">1066</text>
    <text x="780" y="75" text-anchor="middle" font-size="9" fill="#94a3b8">1539</text>
    <text x="870" y="75" text-anchor="middle" font-size="9" fill="#94a3b8">1716</text>
    <text x="940" y="75" text-anchor="middle" font-size="9" fill="#94a3b8">1919</text>
    <text x="1010" y="75" text-anchor="middle" font-size="9" fill="#94a3b8">1956</text>

    <!-- CHINESE TRACK -->
    <rect x="20" y="90" width="140" height="22" rx="4" fill="#4f46e5"/>
    <text x="90" y="105" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">CHINESE</text>
    <line x1="170" y1="101" x2="1060" y2="101" stroke="#6366f1" stroke-width="3"/>

    <!-- Chinese events -->
    <circle cx="200" cy="101" r="5" fill="#4f46e5"/>
    <text x="200" y="122" text-anchor="middle" font-size="8" fill="#4f46e5">Oracle</text>
    <text x="200" y="131" text-anchor="middle" font-size="8" fill="#4f46e5">bones</text>

    <circle cx="330" cy="101" r="5" fill="#4f46e5"/>
    <text x="330" y="122" text-anchor="middle" font-size="8" fill="#4f46e5">Qin</text>
    <text x="330" y="131" text-anchor="middle" font-size="8" fill="#4f46e5">unif.</text>

    <circle cx="420" cy="101" r="5" fill="#4f46e5"/>
    <text x="420" y="122" text-anchor="middle" font-size="8" fill="#4f46e5">Shuowen</text>
    <text x="420" y="131" text-anchor="middle" font-size="8" fill="#4f46e5">Jiezi</text>

    <circle cx="870" cy="101" r="5" fill="#4f46e5"/>
    <text x="870" y="122" text-anchor="middle" font-size="8" fill="#4f46e5">Kangxi</text>
    <text x="870" y="131" text-anchor="middle" font-size="8" fill="#4f46e5">Dict.</text>

    <circle cx="940" cy="101" r="6" fill="#ef4444" stroke="#4f46e5" stroke-width="2"/>
    <text x="940" y="122" text-anchor="middle" font-size="8" font-weight="600" fill="#ef4444">May 4th</text>

    <circle cx="1010" cy="101" r="6" fill="#ef4444" stroke="#4f46e5" stroke-width="2"/>
    <text x="1010" y="122" text-anchor="middle" font-size="8" font-weight="600" fill="#ef4444">Simpl.</text>

    <!-- ENGLISH TRACK -->
    <rect x="20" y="145" width="140" height="22" rx="4" fill="#64748b"/>
    <text x="90" y="160" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">ENGLISH</text>

    <!-- Gray "does not exist" bar -->
    <line x1="170" y1="156" x2="510" y2="156" stroke="#d1d5db" stroke-width="3" stroke-dasharray="3,3"/>
    <text x="340" y="150" text-anchor="middle" font-size="8" fill="#d1d5db">Does not exist</text>
    <line x1="510" y1="156" x2="1060" y2="156" stroke="#64748b" stroke-width="3"/>

    <circle cx="510" cy="156" r="5" fill="#64748b"/>
    <text x="510" y="177" text-anchor="middle" font-size="8" fill="#64748b">Old</text>
    <text x="510" y="186" text-anchor="middle" font-size="8" fill="#64748b">English</text>

    <circle cx="690" cy="156" r="6" fill="#ef4444" stroke="#64748b" stroke-width="2"/>
    <text x="690" y="177" text-anchor="middle" font-size="8" font-weight="600" fill="#ef4444">Norman</text>
    <text x="690" y="186" text-anchor="middle" font-size="8" fill="#ef4444">Conquest</text>

    <circle cx="850" cy="156" r="5" fill="#64748b"/>
    <text x="850" y="177" text-anchor="middle" font-size="8" fill="#64748b">Johnson's</text>
    <text x="850" y="186" text-anchor="middle" font-size="8" fill="#64748b">Dict. 1755</text>

    <!-- FRENCH TRACK -->
    <rect x="20" y="200" width="140" height="22" rx="4" fill="#16a34a"/>
    <text x="90" y="215" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">FRENCH</text>

    <line x1="170" y1="211" x2="555" y2="211" stroke="#d1d5db" stroke-width="3" stroke-dasharray="3,3"/>
    <text x="360" y="205" text-anchor="middle" font-size="8" fill="#d1d5db">Latin in Gaul</text>
    <line x1="555" y1="211" x2="1060" y2="211" stroke="#16a34a" stroke-width="3"/>

    <circle cx="555" cy="211" r="5" fill="#16a34a"/>
    <text x="555" y="232" text-anchor="middle" font-size="8" fill="#16a34a">Strasbourg</text>
    <text x="555" y="241" text-anchor="middle" font-size="8" fill="#16a34a">Oaths 842</text>

    <circle cx="780" cy="211" r="6" fill="#ef4444" stroke="#16a34a" stroke-width="2"/>
    <text x="780" y="232" text-anchor="middle" font-size="8" font-weight="600" fill="#ef4444">Villers-C.</text>
    <text x="780" y="241" text-anchor="middle" font-size="8" fill="#ef4444">1539</text>

    <circle cx="820" cy="211" r="5" fill="#16a34a"/>
    <text x="820" y="232" text-anchor="middle" font-size="8" fill="#16a34a">Acad&#233;mie</text>
    <text x="820" y="241" text-anchor="middle" font-size="8" fill="#16a34a">1635</text>

    <!-- ARABIC TRACK -->
    <rect x="20" y="255" width="140" height="22" rx="4" fill="#ea580c"/>
    <text x="90" y="270" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">ARABIC</text>

    <line x1="170" y1="266" x2="580" y2="266" stroke="#d1d5db" stroke-width="3" stroke-dasharray="3,3"/>
    <text x="380" y="260" text-anchor="middle" font-size="8" fill="#d1d5db">Pre-Islamic</text>
    <line x1="580" y1="266" x2="1060" y2="266" stroke="#ea580c" stroke-width="3"/>

    <circle cx="600" cy="266" r="6" fill="#ef4444" stroke="#ea580c" stroke-width="2"/>
    <text x="600" y="287" text-anchor="middle" font-size="8" font-weight="600" fill="#ef4444">Quran</text>
    <text x="600" y="296" text-anchor="middle" font-size="8" fill="#ef4444">~650</text>

    <circle cx="650" cy="266" r="5" fill="#ea580c"/>
    <text x="650" y="287" text-anchor="middle" font-size="8" fill="#ea580c">Grammarians</text>
    <text x="650" y="296" text-anchor="middle" font-size="8" fill="#ea580c">~800</text>

    <circle cx="930" cy="266" r="5" fill="#ea580c"/>
    <text x="930" y="287" text-anchor="middle" font-size="8" fill="#ea580c">Nahda</text>
    <text x="930" y="296" text-anchor="middle" font-size="8" fill="#ea580c">~1900</text>

    <!-- Standardization events highlighted -->
    <text x="550" y="325" text-anchor="middle" font-size="15" font-weight="700" fill="#334155">Shared Pressures, Different Solutions</text>

    <!-- Pressure 1: Standardization -->
    <rect x="30" y="340" width="330" height="110" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="195" y="362" text-anchor="middle" font-size="12" font-weight="700" fill="#d97706">STANDARDIZATION</text>
    <text x="45" y="385" font-size="10" fill="#92400e">Chinese: Emperor decrees (4 cycles)</text>
    <text x="45" y="402" font-size="10" fill="#92400e">English: Never (proposals rejected)</text>
    <text x="45" y="419" font-size="10" fill="#92400e">French: Royal decree + Academy</text>
    <text x="45" y="436" font-size="10" fill="#92400e">Arabic: Religious authority (Quran)</text>

    <!-- Pressure 2: Diglossia -->
    <rect x="380" y="340" width="330" height="110" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
    <text x="545" y="362" text-anchor="middle" font-size="12" font-weight="700" fill="#4f46e5">DIGLOSSIA RESOLUTION</text>
    <text x="395" y="385" font-size="10" fill="#3730a3">Chinese: RESOLVED 1919 (May Fourth)</text>
    <text x="395" y="402" font-size="10" fill="#3730a3">English: RESOLVED ~1400s (organic)</text>
    <text x="395" y="419" font-size="10" fill="#3730a3">French: RESOLVED 1539 (decree)</text>
    <text x="395" y="436" font-size="10" fill="#dc2626">Arabic: UNRESOLVED (MSA vs. dialects)</text>

    <!-- Pressure 3: Script reform -->
    <rect x="730" y="340" width="330" height="110" rx="10" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/>
    <text x="895" y="362" text-anchor="middle" font-size="12" font-weight="700" fill="#16a34a">SCRIPT REFORM</text>
    <text x="745" y="385" font-size="10" fill="#166534">Chinese: Simplified (1956, partial)</text>
    <text x="745" y="402" font-size="10" fill="#166534">English: Never (no reform succeeded)</text>
    <text x="745" y="419" font-size="10" fill="#166534">French: Minor spelling reforms</text>
    <text x="745" y="436" font-size="10" fill="#166534">Arabic: Never (script unchanged)</text>

    <!-- Dialect/language question -->
    <rect x="30" y="470" width="1030" height="80" rx="10" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
    <text x="550" y="495" text-anchor="middle" font-size="14" font-weight="700" fill="#334155">The Dialect/Language Question: Politics, Not Linguistics</text>
    <text x="550" y="518" text-anchor="middle" font-size="11" fill="#475569">Chinese "dialects" (Mandarin, Cantonese, Wu, Min): mutually unintelligible = separate languages by linguistic criteria</text>
    <text x="550" y="538" text-anchor="middle" font-size="11" fill="#475569">Romance "languages" (French, Spanish, Italian): equally divergent from Latin = separate languages by political criteria</text>
    <text x="550" y="545" text-anchor="middle" font-size="10" font-style="italic" fill="#64748b">"A language is a dialect with an army and a navy." If China fragmented like Europe, Cantonese would be a "language."</text>

    <!-- Bottom pattern -->
    <rect x="30" y="570" width="1030" height="55" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="550" y="592" text-anchor="middle" font-size="13" font-weight="600" fill="#92400e">ALL FOUR LANGUAGES faced divergence, diglossia, and standardization pressure.</text>
    <text x="550" y="614" text-anchor="middle" font-size="11" fill="#92400e">The outcomes differ because political structure differs: unified state (Chinese), fragmented states (European), religious authority (Arabic).</text>

    <!-- Age comparison -->
    <rect x="30" y="640" width="1030" height="40" rx="8" fill="#eef2ff" stroke="#6366f1" stroke-width="1"/>
    <text x="550" y="665" text-anchor="middle" font-size="12" fill="#3730a3">Chinese writing: ~3,300 years. Arabic: ~1,400 years. French: ~1,200 years. English: ~1,600 years. Chinese is the oldest living writing system.</text>
  </svg>
  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background:#4f46e5;"></div>Chinese</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#64748b;"></div>English</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#16a34a;"></div>French</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#ea580c;"></div>Arabic</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#ef4444;"></div>Major reform/event</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#d1d5db;"></div>Pre-existence</div>
  </div>
  <figcaption>
    <strong>Figure 5: Four-Language Historical Comparison -- Parallel Tracks, Divergent Solutions</strong>
    <span>Chinese, English, French, and Arabic all faced the same fundamental pressures (regional divergence, diglossia, standardization needs) but resolved them differently based on political structure. Chinese writing predates English by ~1,700 years and is the world's oldest continuously used writing system. The parallel tracks reveal that language change is driven by universal pressures, but shaped by political contingency.</span>
  </figcaption>
</figure>
</body>
</html>
