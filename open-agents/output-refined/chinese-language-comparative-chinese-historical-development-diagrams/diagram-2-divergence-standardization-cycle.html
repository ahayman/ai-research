<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Divergence-Standardization Cycle</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #f8f9fa;
    color: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 2rem;
  }
  figure {
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
    max-width: 1100px;
    width: 100%;
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid #e9ecef;
  }
  figcaption strong { display: block; font-size: 1.15rem; color: #1a1a2e; margin-bottom: 0.4rem; }
  figcaption span { font-size: 0.9rem; color: #6c757d; line-height: 1.5; }
  svg { max-width: 100%; height: auto; }
  .legend {
    display: flex; justify-content: center; gap: 1.5rem; margin-top: 1rem; flex-wrap: wrap;
  }
  .legend-item { display: flex; align-items: center; gap: 0.5rem; font-size: 0.85rem; color: #495057; }
  .legend-swatch { width: 16px; height: 16px; border-radius: 4px; }
  @media (prefers-color-scheme: dark) {
    body { background: #1a1a2e; color: #e9ecef; }
    figure { background: #2d2d44; box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
    figcaption { border-top-color: #3d3d5c; }
    figcaption strong { color: #e9ecef; }
    figcaption span { color: #adb5bd; }
    .legend-item { color: #adb5bd; }
    svg text { fill: #e9ecef; }
  }
</style>
</head>
<body>
<figure>
  <svg viewBox="0 0 1050 720" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
    <defs>
      <marker id="arrowCycle" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
        <path d="M0,0 L8,3 L0,6" fill="#4f46e5"/>
      </marker>
    </defs>

    <text x="525" y="32" text-anchor="middle" font-size="20" font-weight="700" fill="#1a1a2e">The Divergence-Standardization Cycle</text>
    <text x="525" y="52" text-anchor="middle" font-size="13" fill="#6c757d">A repeating four-phase pattern across 3,300 years of Chinese linguistic history</text>

    <!-- Central cycle diagram -->
    <circle cx="525" cy="160" r="70" fill="none" stroke="#6366f1" stroke-width="2" stroke-dasharray="8,4"/>

    <!-- Phase labels around the cycle -->
    <rect x="445" y="80" width="160" height="25" rx="12" fill="#ef4444" fill-opacity="0.15" stroke="#ef4444" stroke-width="1.5"/>
    <text x="525" y="97" text-anchor="middle" font-size="11" font-weight="700" fill="#dc2626">1. DIVERGENCE</text>

    <rect x="615" y="140" width="160" height="25" rx="12" fill="#f59e0b" fill-opacity="0.15" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="695" y="157" text-anchor="middle" font-size="11" font-weight="700" fill="#d97706">2. POLITICAL TRIGGER</text>

    <rect x="445" y="215" width="160" height="25" rx="12" fill="#22c55e" fill-opacity="0.15" stroke="#22c55e" stroke-width="1.5"/>
    <text x="525" y="232" text-anchor="middle" font-size="11" font-weight="700" fill="#16a34a">3. STANDARDIZATION</text>

    <rect x="295" y="140" width="120" height="25" rx="12" fill="#6366f1" fill-opacity="0.15" stroke="#6366f1" stroke-width="1.5"/>
    <text x="355" y="157" text-anchor="middle" font-size="11" font-weight="700" fill="#4f46e5">4. DRIFT</text>

    <!-- Cycle arrows -->
    <path d="M 560,88 Q 610,100 615,140" fill="none" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrowCycle)"/>
    <path d="M 660,165 Q 620,210 605,218" fill="none" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrowCycle)"/>
    <path d="M 480,230 Q 420,215 415,165" fill="none" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrowCycle)"/>
    <path d="M 370,140 Q 410,100 445,92" fill="none" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrowCycle)"/>

    <!-- Four historical cycles -->
    <text x="525" y="280" text-anchor="middle" font-size="15" font-weight="700" fill="#334155">Four Cycles in Chinese History</text>

    <!-- Cycle 1: Qin -->
    <rect x="50" y="300" width="230" height="130" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
    <text x="165" y="322" text-anchor="middle" font-size="13" font-weight="700" fill="#dc2626">Cycle 1: Qin (221 BCE)</text>
    <text x="65" y="345" font-size="10" fill="#991b1b">&#9650; Warring States scripts diverge</text>
    <text x="65" y="362" font-size="10" fill="#d97706">&#9654; Qin Shi Huang conquers all</text>
    <text x="65" y="379" font-size="10" fill="#16a34a">&#9660; Li Si creates Small Seal Script</text>
    <text x="65" y="396" font-size="10" fill="#4f46e5">&#9668; Regional variants re-emerge</text>
    <text x="65" y="418" font-size="9" font-style="italic" fill="#64748b">First centralized script reform in history</text>

    <!-- Cycle 2: Kangxi -->
    <rect x="300" y="300" width="230" height="130" rx="10" fill="#fefce8" stroke="#eab308" stroke-width="1.5"/>
    <text x="415" y="322" text-anchor="middle" font-size="13" font-weight="700" fill="#ca8a04">Cycle 2: Kangxi (1716)</text>
    <text x="315" y="345" font-size="10" fill="#991b1b">&#9650; Character variants proliferate</text>
    <text x="315" y="362" font-size="10" fill="#d97706">&#9654; Qing imperial authority</text>
    <text x="315" y="379" font-size="10" fill="#16a34a">&#9660; 214 radicals, 47,035 chars</text>
    <text x="315" y="396" font-size="10" fill="#4f46e5">&#9668; Classical/vernacular gap grows</text>
    <text x="315" y="418" font-size="9" font-style="italic" fill="#64748b">Classification standardized, not script form</text>

    <!-- Cycle 3: May Fourth -->
    <rect x="550" y="300" width="230" height="130" rx="10" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/>
    <text x="665" y="322" text-anchor="middle" font-size="12" font-weight="700" fill="#16a34a">Cycle 3: May Fourth (1919)</text>
    <text x="565" y="345" font-size="10" fill="#991b1b">&#9650; Classical/vernacular diglossia</text>
    <text x="565" y="362" font-size="10" fill="#d97706">&#9654; Intellectual revolution</text>
    <text x="565" y="379" font-size="10" fill="#16a34a">&#9660; Vernacular replaces Classical</text>
    <text x="565" y="396" font-size="10" fill="#4f46e5">&#9668; Simplified/traditional diverges</text>
    <text x="565" y="418" font-size="9" font-style="italic" fill="#64748b">2,000-year diglossia resolved in a decade</text>

    <!-- Cycle 4: PRC -->
    <rect x="800" y="300" width="230" height="130" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
    <text x="915" y="322" text-anchor="middle" font-size="13" font-weight="700" fill="#4f46e5">Cycle 4: PRC (1956)</text>
    <text x="815" y="345" font-size="10" fill="#991b1b">&#9650; Character complexity, illiteracy</text>
    <text x="815" y="362" font-size="10" fill="#d97706">&#9654; Communist government</text>
    <text x="815" y="379" font-size="10" fill="#16a34a">&#9660; 230+285 simplified chars</text>
    <text x="815" y="396" font-size="10" fill="#4f46e5">&#9668; Taiwan/HK keep traditional</text>
    <text x="815" y="418" font-size="9" font-style="italic" fill="#64748b">Ongoing: digital age may reduce divide</text>

    <!-- Cross-language comparison -->
    <text x="525" y="465" text-anchor="middle" font-size="15" font-weight="700" fill="#334155">Cross-Language Comparison: Who Controls Language?</text>

    <!-- Chinese -->
    <rect x="50" y="485" width="310" height="80" rx="8" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
    <text x="205" y="505" text-anchor="middle" font-size="12" font-weight="700" fill="#4f46e5">CHINESE: Centralized Control</text>
    <text x="65" y="525" font-size="10" fill="#3730a3">&#9679; Emperor/government decrees reforms</text>
    <text x="65" y="542" font-size="10" fill="#3730a3">&#9679; Top-down standardization (4 cycles)</text>
    <text x="65" y="559" font-size="10" fill="#3730a3">&#9679; Organic change constantly corrected</text>

    <!-- French -->
    <rect x="380" y="485" width="310" height="80" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/>
    <text x="535" y="505" text-anchor="middle" font-size="12" font-weight="700" fill="#16a34a">FRENCH: Institutional Control</text>
    <text x="395" y="525" font-size="10" fill="#166534">&#9679; Acad&#233;mie Fran&#231;aise (1635)</text>
    <text x="395" y="542" font-size="10" fill="#166534">&#9679; Villers-Cotter&#234;ts (1539): French replaces Latin</text>
    <text x="395" y="559" font-size="10" fill="#166534">&#9679; State-managed linguistic policy</text>

    <!-- English -->
    <rect x="710" y="485" width="310" height="80" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="865" y="505" text-anchor="middle" font-size="12" font-weight="700" fill="#475569">ENGLISH: Organic Evolution</text>
    <text x="725" y="525" font-size="10" fill="#475569">&#9679; No Academy (proposals always rejected)</text>
    <text x="725" y="542" font-size="10" fill="#475569">&#9679; Prestige, printing, colonialism drive change</text>
    <text x="725" y="559" font-size="10" fill="#475569">&#9679; Spelling reforms consistently fail</text>

    <!-- Arabic -->
    <rect x="50" y="580" width="310" height="55" rx="8" fill="#fff7ed" stroke="#f97316" stroke-width="1"/>
    <text x="205" y="600" text-anchor="middle" font-size="12" font-weight="700" fill="#ea580c">ARABIC: Religious Authority</text>
    <text x="65" y="620" font-size="10" fill="#9a3412">&#9679; Quran codification (~650 CE) fixed Classical Arabic</text>
    <text x="65" y="632" font-size="10" fill="#9a3412">&#9679; Diglossia persists: MSA vs. regional dialects</text>

    <!-- Bottom pattern -->
    <rect x="50" y="650" width="950" height="55" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
    <text x="525" y="672" text-anchor="middle" font-size="13" font-weight="600" fill="#92400e">PATTERN: Divergence &#8594; Political Trigger &#8594; Standardization &#8594; Drift &#8594; Repeat</text>
    <text x="525" y="694" text-anchor="middle" font-size="11" fill="#92400e">Chinese history is evolutionary branching under political constraint. English evolves organically. Arabic freezes at the Classical level.</text>
  </svg>
  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background:#ef4444;"></div>Divergence</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#f59e0b;"></div>Political trigger</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#22c55e;"></div>Standardization</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#6366f1;"></div>Drift</div>
  </div>
  <figcaption>
    <strong>Figure 2: The Divergence-Standardization Cycle -- Four Turns of the Same Wheel</strong>
    <span>Chinese linguistic history exhibits a repeating four-phase cycle of divergence, political unification, top-down standardization, and gradual drift. This pattern is strikingly different from English (organic evolution, no central authority) and partially parallels French (Acad&#233;mie Fran&#231;aise). Arabic represents a third model: religious authority freezing the written standard while spoken varieties diverge.</span>
  </figcaption>
</figure>
</body>
</html>
