<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Simplified/Traditional Split -- Methods and Geography</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #f8f9fa;
    color: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 2rem;
  }
  figure {
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
    max-width: 1100px;
    width: 100%;
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid #e9ecef;
  }
  figcaption strong { display: block; font-size: 1.15rem; color: #1a1a2e; margin-bottom: 0.4rem; }
  figcaption span { font-size: 0.9rem; color: #6c757d; line-height: 1.5; }
  svg { max-width: 100%; height: auto; }
  .legend {
    display: flex; justify-content: center; gap: 1.5rem; margin-top: 1rem; flex-wrap: wrap;
  }
  .legend-item { display: flex; align-items: center; gap: 0.5rem; font-size: 0.85rem; color: #495057; }
  .legend-swatch { width: 16px; height: 16px; border-radius: 4px; }
  @media (prefers-color-scheme: dark) {
    body { background: #1a1a2e; color: #e9ecef; }
    figure { background: #2d2d44; box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
    figcaption { border-top-color: #3d3d5c; }
    figcaption strong { color: #e9ecef; }
    figcaption span { color: #adb5bd; }
    .legend-item { color: #adb5bd; }
    svg text { fill: #e9ecef; }
  }
</style>
</head>
<body>
<figure>
  <svg viewBox="0 0 1050 680" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
    <text x="525" y="32" text-anchor="middle" font-size="20" font-weight="700" fill="#1a1a2e">The Simplified/Traditional Split</text>
    <text x="525" y="52" text-anchor="middle" font-size="13" fill="#6c757d">Systematic simplification methods and the resulting geographic divide</text>

    <!-- Five methods with examples -->
    <text x="525" y="85" text-anchor="middle" font-size="15" font-weight="700" fill="#334155">Five Simplification Methods (1956 Reform)</text>

    <!-- Method 1: Stroke reduction -->
    <rect x="30" y="100" width="195" height="135" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="2"/>
    <text x="127" y="122" text-anchor="middle" font-size="11" font-weight="700" fill="#4f46e5">STROKE REDUCTION</text>
    <text x="127" y="155" text-anchor="middle" font-size="36" fill="#3730a3">&#23416; &#8594; &#23398;</text>
    <text x="127" y="180" text-anchor="middle" font-size="11" fill="#4f46e5">xu&#233; (learn)</text>
    <text x="127" y="198" text-anchor="middle" font-size="10" fill="#6366f1">16 strokes &#8594; 8 strokes</text>
    <text x="127" y="215" text-anchor="middle" font-size="9" fill="#818cf8">Remove decorative components</text>

    <!-- Method 2: Cursive adoption -->
    <rect x="240" y="100" width="195" height="135" rx="10" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
    <text x="337" y="122" text-anchor="middle" font-size="11" font-weight="700" fill="#16a34a">CURSIVE ADOPTION</text>
    <text x="337" y="155" text-anchor="middle" font-size="36" fill="#166534">&#26360; &#8594; &#20070;</text>
    <text x="337" y="180" text-anchor="middle" font-size="11" fill="#16a34a">sh&#363; (book)</text>
    <text x="337" y="198" text-anchor="middle" font-size="10" fill="#22c55e">Handwriting form standardized</text>
    <text x="337" y="215" text-anchor="middle" font-size="9" fill="#4ade80">From existing cursive tradition</text>

    <!-- Method 3: Component simplification -->
    <rect x="450" y="100" width="195" height="135" rx="10" fill="#fefce8" stroke="#eab308" stroke-width="2"/>
    <text x="547" y="122" text-anchor="middle" font-size="11" font-weight="700" fill="#ca8a04">COMPONENT SIMPL.</text>
    <text x="547" y="155" text-anchor="middle" font-size="36" fill="#854d0e">&#35486; &#8594; &#35821;</text>
    <text x="547" y="180" text-anchor="middle" font-size="11" fill="#ca8a04">y&#468; (language)</text>
    <text x="547" y="198" text-anchor="middle" font-size="10" fill="#eab308">&#35328; &#8594; &#35765; (7 &#8594; 2 strokes)</text>
    <text x="547" y="215" text-anchor="middle" font-size="9" fill="#fbbf24">Radical simplified systematically</text>

    <!-- Method 4: Character merger -->
    <rect x="660" y="100" width="195" height="135" rx="10" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
    <text x="757" y="122" text-anchor="middle" font-size="11" font-weight="700" fill="#ea580c">CHARACTER MERGER</text>
    <text x="757" y="155" text-anchor="middle" font-size="30" fill="#9a3412">&#24460;/&#21518; &#8594; &#21518;</text>
    <text x="757" y="180" text-anchor="middle" font-size="11" fill="#ea580c">h&#242;u (after/queen)</text>
    <text x="757" y="198" text-anchor="middle" font-size="10" fill="#f97316">Two distinct chars &#8594; one</text>
    <text x="757" y="215" text-anchor="middle" font-size="9" fill="#fb923c">Can create ambiguity</text>

    <!-- Method 5: Phonetic substitution -->
    <rect x="870" y="100" width="160" height="135" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
    <text x="950" y="122" text-anchor="middle" font-size="11" font-weight="700" fill="#dc2626">PHONETIC SUBST.</text>
    <text x="950" y="155" text-anchor="middle" font-size="36" fill="#991b1b">&#27231; &#8594; &#26426;</text>
    <text x="950" y="180" text-anchor="middle" font-size="11" fill="#dc2626">j&#299; (machine)</text>
    <text x="950" y="198" text-anchor="middle" font-size="10" fill="#ef4444">Simpler homophone used</text>
    <text x="950" y="215" text-anchor="middle" font-size="9" fill="#f87171">Original meaning lost</text>

    <!-- Geographic split -->
    <text x="525" y="265" text-anchor="middle" font-size="15" font-weight="700" fill="#334155">Geographic Split</text>

    <!-- Simplified regions -->
    <rect x="30" y="280" width="480" height="120" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="2"/>
    <text x="270" y="305" text-anchor="middle" font-size="14" font-weight="700" fill="#4f46e5">&#31616;&#20307;&#23383; Simplified Characters</text>
    <text x="270" y="325" text-anchor="middle" font-size="12" fill="#3730a3">Mainland China &#183; Singapore &#183; Malaysia</text>
    <text x="270" y="350" text-anchor="middle" font-size="11" fill="#4f46e5">~2,236 characters differ from traditional</text>
    <text x="270" y="370" text-anchor="middle" font-size="11" fill="#4f46e5">Average strokes per common character: ~9.8</text>
    <text x="270" y="390" text-anchor="middle" font-size="10" fill="#6366f1">Some radicals simplified: &#35328;&#8594;&#35765;, &#37329;&#8594;&#38069;, &#39135;&#8594;&#39285;</text>

    <!-- Traditional regions -->
    <rect x="540" y="280" width="480" height="120" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
    <text x="780" y="305" text-anchor="middle" font-size="14" font-weight="700" fill="#dc2626">&#32321;&#39636;&#23383; Traditional Characters</text>
    <text x="780" y="325" text-anchor="middle" font-size="12" fill="#991b1b">Taiwan &#183; Hong Kong &#183; Macau &#183; Overseas</text>
    <text x="780" y="350" text-anchor="middle" font-size="11" fill="#dc2626">Original forms preserved</text>
    <text x="780" y="370" text-anchor="middle" font-size="11" fill="#dc2626">Average strokes per common character: ~12.4</text>
    <text x="780" y="390" text-anchor="middle" font-size="10" fill="#ef4444">Full radical-phonetic relationships visible</text>

    <!-- Timeline of reform -->
    <text x="525" y="430" text-anchor="middle" font-size="15" font-weight="700" fill="#334155">Reform Timeline</text>

    <rect x="30" y="445" width="990" height="35" rx="6" fill="#334155"/>
    <text x="120" y="468" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">1956</text>
    <text x="350" y="468" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">1964</text>
    <text x="580" y="468" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">1977</text>
    <text x="810" y="468" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">1986</text>

    <rect x="30" y="480" width="240" height="50" rx="6" fill="#eef2ff" stroke="#6366f1" stroke-width="1"/>
    <text x="150" y="500" text-anchor="middle" font-size="10" fill="#3730a3">First scheme: 230 immediate</text>
    <text x="150" y="515" text-anchor="middle" font-size="10" fill="#3730a3">+ 285 phased + 54 components</text>

    <rect x="280" y="480" width="200" height="50" rx="6" fill="#f0fdf4" stroke="#22c55e" stroke-width="1"/>
    <text x="380" y="500" text-anchor="middle" font-size="10" fill="#166534">Consolidated list:</text>
    <text x="380" y="515" text-anchor="middle" font-size="10" fill="#166534">2,236 simplified characters</text>

    <rect x="490" y="480" width="200" height="50" rx="6" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
    <text x="590" y="500" text-anchor="middle" font-size="10" fill="#dc2626">Second round proposed</text>
    <text x="590" y="515" text-anchor="middle" font-size="10" fill="#dc2626">"Widely rejected"</text>

    <rect x="720" y="480" width="200" height="50" rx="6" fill="#fefce8" stroke="#eab308" stroke-width="1"/>
    <text x="820" y="500" text-anchor="middle" font-size="10" fill="#854d0e">Second round officially</text>
    <text x="820" y="515" text-anchor="middle" font-size="10" fill="#854d0e">RETRACTED by State Council</text>

    <!-- Cross-script comparison -->
    <text x="525" y="560" text-anchor="middle" font-size="14" font-weight="700" fill="#334155">Script Reform Comparison</text>

    <rect x="30" y="575" width="990" height="90" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
    <text x="150" y="598" text-anchor="middle" font-size="10" font-weight="600" fill="#334155">Chinese (1956)</text>
    <text x="150" y="615" text-anchor="middle" font-size="9" fill="#475569">Stroke reduction</text>
    <text x="150" y="630" text-anchor="middle" font-size="9" fill="#475569">Partial adoption</text>

    <text x="350" y="598" text-anchor="middle" font-size="10" font-weight="600" fill="#334155">Turkish (1928)</text>
    <text x="350" y="615" text-anchor="middle" font-size="9" fill="#475569">Arabic &#8594; Latin script</text>
    <text x="350" y="630" text-anchor="middle" font-size="9" fill="#475569">Complete replacement</text>

    <text x="550" y="598" text-anchor="middle" font-size="10" font-weight="600" fill="#334155">Korean (1443)</text>
    <text x="550" y="615" text-anchor="middle" font-size="9" fill="#475569">New alphabet created</text>
    <text x="550" y="630" text-anchor="middle" font-size="9" fill="#475569">Eventually replaced chars</text>

    <text x="740" y="598" text-anchor="middle" font-size="10" font-weight="600" fill="#334155">German (1996)</text>
    <text x="740" y="615" text-anchor="middle" font-size="9" fill="#475569">Spelling regularization</text>
    <text x="740" y="630" text-anchor="middle" font-size="9" fill="#475569">Still contested</text>

    <text x="920" y="598" text-anchor="middle" font-size="10" font-weight="600" fill="#334155">English (various)</text>
    <text x="920" y="615" text-anchor="middle" font-size="9" fill="#475569">Multiple proposals</text>
    <text x="920" y="630" text-anchor="middle" font-size="9" font-weight="600" fill="#dc2626">Always rejected</text>

    <text x="525" y="656" text-anchor="middle" font-size="10" font-style="italic" fill="#64748b">PATTERN: Simplification is systematic, not random. The five methods form recognizable, learnable patterns.</text>
  </svg>
  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background:#6366f1;"></div>Stroke reduction</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#22c55e;"></div>Cursive adoption</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#eab308;"></div>Component simplification</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#f97316;"></div>Character merger</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#ef4444;"></div>Phonetic substitution</div>
  </div>
  <figcaption>
    <strong>Figure 4: The Simplified/Traditional Split -- Methods, Timeline, and Geography</strong>
    <span>The 1956 simplification reform used five systematic methods to reduce character complexity. The first scheme introduced 230 characters immediately plus 285 in phases (not simply "515 at once"). A second round (1977) was rejected and retracted in 1986. The resulting geographic split (Mainland/Singapore vs. Taiwan/HK) persists, though digital tools increasingly bridge the divide.</span>
  </figcaption>
</figure>
</body>
</html>
