<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3,300-Year Script Evolution Timeline</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #f8f9fa;
    color: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 2rem;
  }
  figure {
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
    max-width: 1150px;
    width: 100%;
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid #e9ecef;
  }
  figcaption strong { display: block; font-size: 1.15rem; color: #1a1a2e; margin-bottom: 0.4rem; }
  figcaption span { font-size: 0.9rem; color: #6c757d; line-height: 1.5; }
  svg { max-width: 100%; height: auto; }
  .legend {
    display: flex; justify-content: center; gap: 1.5rem; margin-top: 1rem; flex-wrap: wrap;
  }
  .legend-item { display: flex; align-items: center; gap: 0.5rem; font-size: 0.85rem; color: #495057; }
  .legend-swatch { width: 16px; height: 16px; border-radius: 4px; }
  @media (prefers-color-scheme: dark) {
    body { background: #1a1a2e; color: #e9ecef; }
    figure { background: #2d2d44; box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
    figcaption { border-top-color: #3d3d5c; }
    figcaption strong { color: #e9ecef; }
    figcaption span { color: #adb5bd; }
    .legend-item { color: #adb5bd; }
    svg text { fill: #e9ecef; }
  }
</style>
</head>
<body>
<figure>
  <svg viewBox="0 0 1100 750" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
    <text x="550" y="32" text-anchor="middle" font-size="20" font-weight="700" fill="#1a1a2e">3,300 Years of Chinese Script Evolution</text>
    <text x="550" y="52" text-anchor="middle" font-size="13" fill="#6c757d">From pictographic oracle bones to modern simplified characters -- an unbroken chain</text>

    <!-- Timeline axis -->
    <line x1="80" y1="130" x2="1020" y2="130" stroke="#94a3b8" stroke-width="2"/>

    <!-- Time markers -->
    <line x1="100" y1="125" x2="100" y2="135" stroke="#94a3b8" stroke-width="2"/>
    <text x="100" y="150" text-anchor="middle" font-size="10" fill="#64748b">~1250 BCE</text>

    <line x1="250" y1="125" x2="250" y2="135" stroke="#94a3b8" stroke-width="2"/>
    <text x="250" y="150" text-anchor="middle" font-size="10" fill="#64748b">~1000 BCE</text>

    <line x1="400" y1="125" x2="400" y2="135" stroke="#94a3b8" stroke-width="2"/>
    <text x="400" y="150" text-anchor="middle" font-size="10" fill="#64748b">221 BCE</text>

    <line x1="510" y1="125" x2="510" y2="135" stroke="#94a3b8" stroke-width="2"/>
    <text x="510" y="150" text-anchor="middle" font-size="10" fill="#64748b">~200 CE</text>

    <line x1="630" y1="125" x2="630" y2="135" stroke="#94a3b8" stroke-width="2"/>
    <text x="630" y="150" text-anchor="middle" font-size="10" fill="#64748b">~400 CE</text>

    <line x1="780" y1="125" x2="780" y2="135" stroke="#94a3b8" stroke-width="2"/>
    <text x="780" y="150" text-anchor="middle" font-size="10" fill="#64748b">1716 CE</text>

    <line x1="900" y1="125" x2="900" y2="135" stroke="#94a3b8" stroke-width="2"/>
    <text x="900" y="150" text-anchor="middle" font-size="10" fill="#64748b">1956 CE</text>

    <line x1="1000" y1="125" x2="1000" y2="135" stroke="#94a3b8" stroke-width="2"/>
    <text x="1000" y="150" text-anchor="middle" font-size="10" fill="#64748b">Today</text>

    <!-- Script stages -->
    <!-- Oracle Bone -->
    <rect x="65" y="165" width="130" height="95" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
    <text x="130" y="188" text-anchor="middle" font-size="13" font-weight="700" fill="#dc2626">&#30002;&#39592;&#25991;</text>
    <text x="130" y="204" text-anchor="middle" font-size="10" fill="#ef4444">Oracle Bone</text>
    <text x="130" y="222" text-anchor="middle" font-size="9" fill="#991b1b">Carved on shells</text>
    <text x="130" y="236" text-anchor="middle" font-size="9" fill="#991b1b">~4,500 chars</text>
    <text x="130" y="250" text-anchor="middle" font-size="9" fill="#991b1b">~1,200-1,500 deciphered</text>

    <!-- Bronze -->
    <rect x="210" y="165" width="130" height="95" rx="10" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
    <text x="275" y="188" text-anchor="middle" font-size="13" font-weight="700" fill="#ea580c">&#37329;&#25991;</text>
    <text x="275" y="204" text-anchor="middle" font-size="10" fill="#f97316">Bronze Script</text>
    <text x="275" y="222" text-anchor="middle" font-size="9" fill="#9a3412">Cast on vessels</text>
    <text x="275" y="236" text-anchor="middle" font-size="9" fill="#9a3412">Rounded, ornate</text>
    <text x="275" y="250" text-anchor="middle" font-size="9" fill="#9a3412">Royal decrees</text>

    <!-- Seal -->
    <rect x="360" y="165" width="130" height="95" rx="10" fill="#fefce8" stroke="#eab308" stroke-width="2"/>
    <text x="425" y="188" text-anchor="middle" font-size="13" font-weight="700" fill="#ca8a04">&#23567;&#31686;</text>
    <text x="425" y="204" text-anchor="middle" font-size="10" fill="#eab308">Small Seal</text>
    <text x="425" y="222" text-anchor="middle" font-size="9" fill="#854d0e">Li Si standardized</text>
    <text x="425" y="236" text-anchor="middle" font-size="9" fill="#854d0e">Qin unification</text>
    <text x="425" y="250" text-anchor="middle" font-size="9" fill="#854d0e">Symmetrical, formal</text>

    <!-- Clerical -->
    <rect x="480" y="165" width="115" height="95" rx="10" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
    <text x="537" y="188" text-anchor="middle" font-size="13" font-weight="700" fill="#16a34a">&#38582;&#20070;</text>
    <text x="537" y="204" text-anchor="middle" font-size="10" fill="#22c55e">Clerical</text>
    <text x="537" y="222" text-anchor="middle" font-size="9" fill="#166534">Angular strokes</text>
    <text x="537" y="236" text-anchor="middle" font-size="9" fill="#166534">Bureaucratic speed</text>
    <text x="537" y="250" text-anchor="middle" font-size="9" fill="#166534">Major structural shift</text>

    <!-- Regular -->
    <rect x="610" y="165" width="115" height="95" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="2"/>
    <text x="667" y="188" text-anchor="middle" font-size="13" font-weight="700" fill="#4f46e5">&#26999;&#20070;</text>
    <text x="667" y="204" text-anchor="middle" font-size="10" fill="#6366f1">Regular</text>
    <text x="667" y="222" text-anchor="middle" font-size="9" fill="#3730a3">Modern standard</text>
    <text x="667" y="236" text-anchor="middle" font-size="9" fill="#3730a3">Clear, balanced</text>
    <text x="667" y="250" text-anchor="middle" font-size="9" fill="#3730a3">Basis for print</text>

    <!-- Kangxi -->
    <rect x="740" y="165" width="115" height="95" rx="10" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="2"/>
    <text x="797" y="188" text-anchor="middle" font-size="10" font-weight="700" fill="#6d28d9">&#24247;&#29081;&#23383;&#20856;</text>
    <text x="797" y="204" text-anchor="middle" font-size="10" fill="#8b5cf6">Kangxi Dict.</text>
    <text x="797" y="222" text-anchor="middle" font-size="9" fill="#5b21b6">214 radicals</text>
    <text x="797" y="236" text-anchor="middle" font-size="9" fill="#5b21b6">47,035 characters</text>
    <text x="797" y="250" text-anchor="middle" font-size="9" fill="#5b21b6">Standard classification</text>

    <!-- Simplified -->
    <rect x="865" y="165" width="115" height="95" rx="10" fill="#f0f9ff" stroke="#0ea5e9" stroke-width="2"/>
    <text x="922" y="188" text-anchor="middle" font-size="12" font-weight="700" fill="#0284c7">&#31616;&#20307;&#23383;</text>
    <text x="922" y="204" text-anchor="middle" font-size="10" fill="#0ea5e9">Simplified</text>
    <text x="922" y="222" text-anchor="middle" font-size="9" fill="#0369a1">230 + 285 chars</text>
    <text x="922" y="236" text-anchor="middle" font-size="9" fill="#0369a1">(1956 reform)</text>
    <text x="922" y="250" text-anchor="middle" font-size="9" fill="#0369a1">PRC, Singapore</text>

    <!-- Evolution arrows -->
    <path d="M 195,212 L 210,212" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arrowGr)"/>
    <path d="M 340,212 L 360,212" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arrowGr)"/>
    <path d="M 490,212 L 480,212" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arrowGr)"/>
    <path d="M 595,212 L 610,212" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arrowGr)"/>
    <defs>
      <marker id="arrowGr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
        <path d="M0,0 L8,3 L0,6" fill="#94a3b8"/>
      </marker>
    </defs>

    <!-- Dual track annotation -->
    <rect x="80" y="280" width="940" height="55" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
    <text x="550" y="300" text-anchor="middle" font-size="12" font-weight="700" fill="#334155">DUAL-TRACK EVOLUTION</text>
    <text x="550" y="318" text-anchor="middle" font-size="11" fill="#475569">Formal: Oracle Bone &#8594; Seal &#8594; Clerical &#8594; Regular &#8594; Modern Print</text>
    <text x="550" y="330" text-anchor="middle" font-size="11" fill="#64748b">Speed: Running script (&#34892;&#20070;) &#8594; Cursive/Grass script (&#33609;&#20070;) &#8594; Informal handwriting</text>

    <!-- Key events below timeline -->
    <text x="550" y="360" text-anchor="middle" font-size="15" font-weight="700" fill="#1a1a2e">Key Historical Events</text>

    <!-- Event cards -->
    <rect x="80" y="375" width="220" height="75" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
    <text x="190" y="395" text-anchor="middle" font-size="11" font-weight="600" fill="#dc2626">1899: Oracle Bones Discovered</text>
    <text x="190" y="413" text-anchor="middle" font-size="9" fill="#991b1b">Near Anyang, Henan province</text>
    <text x="190" y="428" text-anchor="middle" font-size="9" fill="#991b1b">150,000+ fragments excavated</text>
    <text x="190" y="443" text-anchor="middle" font-size="9" fill="#991b1b">Oldest Chinese writing found</text>

    <rect x="320" y="375" width="220" height="75" rx="8" fill="#fefce8" stroke="#eab308" stroke-width="1"/>
    <text x="430" y="395" text-anchor="middle" font-size="11" font-weight="600" fill="#ca8a04">221 BCE: Qin Unification</text>
    <text x="430" y="413" text-anchor="middle" font-size="9" fill="#854d0e">First script standardization</text>
    <text x="430" y="428" text-anchor="middle" font-size="9" fill="#854d0e">Li Si creates Small Seal Script</text>
    <text x="430" y="443" text-anchor="middle" font-size="9" fill="#854d0e">All regional variants abolished</text>

    <rect x="560" y="375" width="220" height="75" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="1"/>
    <text x="670" y="395" text-anchor="middle" font-size="11" font-weight="600" fill="#16a34a">1919: May Fourth Movement</text>
    <text x="670" y="413" text-anchor="middle" font-size="9" fill="#166534">Vernacular replaces Classical</text>
    <text x="670" y="428" text-anchor="middle" font-size="9" fill="#166534">Hu Shih (1917), Lu Xun (1918)</text>
    <text x="670" y="443" text-anchor="middle" font-size="9" fill="#166534">2,000-year diglossia resolved</text>

    <rect x="800" y="375" width="220" height="75" rx="8" fill="#eef2ff" stroke="#6366f1" stroke-width="1"/>
    <text x="910" y="395" text-anchor="middle" font-size="11" font-weight="600" fill="#4f46e5">1956: Simplification Reform</text>
    <text x="910" y="413" text-anchor="middle" font-size="9" fill="#3730a3">230 chars immediate + 285 phased</text>
    <text x="910" y="428" text-anchor="middle" font-size="9" fill="#3730a3">1964: 2,236 total simplified</text>
    <text x="910" y="443" text-anchor="middle" font-size="9" fill="#3730a3">1977 second round: rejected 1986</text>

    <!-- Character type evolution -->
    <rect x="80" y="470" width="940" height="65" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
    <text x="550" y="493" text-anchor="middle" font-size="12" font-weight="700" fill="#92400e">PATTERN: The Compositional Principle Was Present From The Start</text>
    <text x="550" y="513" text-anchor="middle" font-size="11" fill="#92400e">Oracle bone script (1250 BCE): already 27% semantic-phonetic compounds</text>
    <text x="550" y="528" text-anchor="middle" font-size="11" fill="#92400e">Modern characters: 80%+ semantic-phonetic compounds -- the same logic, scaled up over 3,300 years</text>

    <!-- English comparison timeline -->
    <text x="550" y="565" text-anchor="middle" font-size="14" font-weight="700" fill="#334155">English Comparison: Where Was English?</text>
    <rect x="80" y="580" width="940" height="45" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/>
    <text x="140" y="602" font-size="10" fill="#64748b">1250 BCE: Does not exist</text>
    <text x="350" y="602" font-size="10" fill="#64748b">221 BCE: Does not exist</text>
    <text x="540" y="602" font-size="10" fill="#64748b">450 CE: Old English begins</text>
    <text x="770" y="602" font-size="10" fill="#64748b">1066: Norman Conquest</text>
    <text x="140" y="618" font-size="10" fill="#94a3b8">Chinese writing is ~1,700 years older than English writing. No alphabetic script has this continuity.</text>

    <!-- Bottom insight -->
    <rect x="80" y="640" width="940" height="50" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="1"/>
    <text x="550" y="660" text-anchor="middle" font-size="12" font-weight="600" fill="#3730a3">A literate modern Chinese person can, with training, read oracle bone inscriptions from 1250 BCE.</text>
    <text x="550" y="678" text-anchor="middle" font-size="12" fill="#4f46e5">No English speaker can read Old English (450 CE) without specialized study. The continuity is unique.</text>
  </svg>
  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background:#ef4444;"></div>Oracle Bone (~1250 BCE)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#f97316;"></div>Bronze (~1000 BCE)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#eab308;"></div>Seal (221 BCE)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#22c55e;"></div>Clerical (~200 CE)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#6366f1;"></div>Regular (~400 CE)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#0ea5e9;"></div>Simplified (1956)</div>
  </div>
  <figcaption>
    <strong>Figure 1: 3,300 Years of Chinese Script Evolution</strong>
    <span>The Chinese writing system evolved through seven major stages over 3,300 years while maintaining compositional continuity. Oracle bone script already contained 27% semantic-phonetic compounds -- the same structural principle behind 80%+ of modern characters. English writing, by comparison, began around 450 CE. Oracle bone decipherment count: approximately 1,200-1,500 characters of the ~4,500 found.</span>
  </figcaption>
</figure>
</body>
</html>
