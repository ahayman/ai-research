<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diglossia: Classical vs. Vernacular Across Languages</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #f8f9fa;
    color: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 2rem;
  }
  figure {
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 2.5rem;
    max-width: 1100px;
    width: 100%;
  }
  figcaption {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid #e9ecef;
  }
  figcaption strong { display: block; font-size: 1.15rem; color: #1a1a2e; margin-bottom: 0.4rem; }
  figcaption span { font-size: 0.9rem; color: #6c757d; line-height: 1.5; }
  svg { max-width: 100%; height: auto; }
  .legend {
    display: flex; justify-content: center; gap: 1.5rem; margin-top: 1rem; flex-wrap: wrap;
  }
  .legend-item { display: flex; align-items: center; gap: 0.5rem; font-size: 0.85rem; color: #495057; }
  .legend-swatch { width: 16px; height: 16px; border-radius: 4px; }
  @media (prefers-color-scheme: dark) {
    body { background: #1a1a2e; color: #e9ecef; }
    figure { background: #2d2d44; box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
    figcaption { border-top-color: #3d3d5c; }
    figcaption strong { color: #e9ecef; }
    figcaption span { color: #adb5bd; }
    .legend-item { color: #adb5bd; }
    svg text { fill: #e9ecef; }
  }
</style>
</head>
<body>
<figure>
  <svg viewBox="0 0 1050 660" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
    <text x="525" y="32" text-anchor="middle" font-size="20" font-weight="700" fill="#1a1a2e">Diglossia Across Four Languages</text>
    <text x="525" y="52" text-anchor="middle" font-size="13" fill="#6c757d">The same structural phenomenon -- four different historical outcomes</text>

    <!-- Chinese -->
    <rect x="30" y="80" width="240" height="310" rx="12" fill="#eef2ff" stroke="#6366f1" stroke-width="2"/>
    <text x="150" y="108" text-anchor="middle" font-size="16" font-weight="700" fill="#4f46e5">Chinese</text>
    <text x="150" y="126" text-anchor="middle" font-size="11" font-weight="600" fill="#22c55e">RESOLVED (1919)</text>

    <!-- High variety -->
    <rect x="45" y="140" width="210" height="60" rx="6" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/>
    <text x="150" y="160" text-anchor="middle" font-size="11" font-weight="600" fill="#475569">HIGH: &#25991;&#35328;&#25991; (Classical)</text>
    <text x="150" y="178" text-anchor="middle" font-size="9" fill="#64748b">Monosyllabic, compressed, archaic</text>
    <text x="150" y="192" text-anchor="middle" font-size="9" fill="#64748b">Used 2,000+ years for all writing</text>

    <!-- Arrow: Resolution -->
    <line x1="150" y1="200" x2="150" y2="230" stroke="#22c55e" stroke-width="2"/>
    <text x="220" y="218" font-size="9" font-weight="600" fill="#22c55e">May Fourth &#8595;</text>

    <!-- Low variety -->
    <rect x="45" y="230" width="210" height="60" rx="6" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
    <text x="150" y="250" text-anchor="middle" font-size="11" font-weight="600" fill="#16a34a">LOW &#8594; NOW STANDARD</text>
    <text x="150" y="265" text-anchor="middle" font-size="11" fill="#166534">&#30333;&#35805;&#25991; (Vernacular)</text>
    <text x="150" y="280" text-anchor="middle" font-size="9" fill="#166534">Disyllabic, explicit, modern</text>

    <!-- Example -->
    <rect x="45" y="300" width="210" height="55" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
    <text x="150" y="318" text-anchor="middle" font-size="9" font-weight="600" fill="#92400e">"This is very difficult"</text>
    <text x="150" y="335" text-anchor="middle" font-size="10" fill="#92400e">Classical: &#27492;&#20107;&#29978;&#38590; (4 chars)</text>
    <text x="150" y="350" text-anchor="middle" font-size="10" fill="#92400e">Vernacular: &#36825;&#20214;&#20107;&#24773;&#38750;&#24120;&#22256;&#38590; (7)</text>

    <!-- Arabic -->
    <rect x="285" y="80" width="240" height="310" rx="12" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
    <text x="405" y="108" text-anchor="middle" font-size="16" font-weight="700" fill="#ea580c">Arabic</text>
    <text x="405" y="126" text-anchor="middle" font-size="11" font-weight="600" fill="#ef4444">UNRESOLVED (persists)</text>

    <rect x="300" y="140" width="210" height="60" rx="6" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/>
    <text x="405" y="158" text-anchor="middle" font-size="11" font-weight="600" fill="#475569">HIGH: MSA (&#1601;&#1589;&#1581;&#1609;)</text>
    <text x="405" y="175" text-anchor="middle" font-size="9" fill="#64748b">Formal writing, news, education</text>
    <text x="405" y="189" text-anchor="middle" font-size="9" fill="#64748b">No one's native spoken language</text>

    <line x1="405" y1="200" x2="405" y2="230" stroke="#ef4444" stroke-width="2" stroke-dasharray="4,3"/>
    <text x="475" y="218" font-size="9" font-weight="600" fill="#ef4444">Still split &#8596;</text>

    <rect x="300" y="230" width="210" height="60" rx="6" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
    <text x="405" y="250" text-anchor="middle" font-size="11" font-weight="600" fill="#dc2626">LOW: Regional dialects (&#1593;&#1575;&#1605;&#1610;&#1577;)</text>
    <text x="405" y="268" text-anchor="middle" font-size="9" fill="#991b1b">Egyptian, Levantine, Gulf, Maghrebi</text>
    <text x="405" y="282" text-anchor="middle" font-size="9" fill="#991b1b">Mutually unintelligible across regions</text>

    <rect x="300" y="300" width="210" height="55" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
    <text x="405" y="318" text-anchor="middle" font-size="9" font-weight="600" fill="#92400e">Arabic is where Chinese was</text>
    <text x="405" y="335" text-anchor="middle" font-size="9" fill="#92400e">before 1919 -- the written standard</text>
    <text x="405" y="350" text-anchor="middle" font-size="9" fill="#92400e">is nobody's native language</text>

    <!-- French -->
    <rect x="540" y="80" width="240" height="310" rx="12" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
    <text x="660" y="108" text-anchor="middle" font-size="16" font-weight="700" fill="#16a34a">French</text>
    <text x="660" y="126" text-anchor="middle" font-size="11" font-weight="600" fill="#22c55e">RESOLVED (1539)</text>

    <rect x="555" y="140" width="210" height="60" rx="6" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/>
    <text x="660" y="158" text-anchor="middle" font-size="11" font-weight="600" fill="#475569">HIGH: Latin</text>
    <text x="660" y="175" text-anchor="middle" font-size="9" fill="#64748b">Church, law, scholarship</text>
    <text x="660" y="189" text-anchor="middle" font-size="9" fill="#64748b">Lingua franca of medieval Europe</text>

    <line x1="660" y1="200" x2="660" y2="230" stroke="#22c55e" stroke-width="2"/>
    <text x="730" y="218" font-size="9" font-weight="600" fill="#22c55e">Villers-Cott. &#8595;</text>

    <rect x="555" y="230" width="210" height="60" rx="6" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
    <text x="660" y="250" text-anchor="middle" font-size="11" font-weight="600" fill="#16a34a">LOW &#8594; NOW STANDARD</text>
    <text x="660" y="268" text-anchor="middle" font-size="9" fill="#166534">Old French &#8594; Modern French</text>
    <text x="660" y="282" text-anchor="middle" font-size="9" fill="#166534">Acad&#233;mie Fran&#231;aise (1635) guards it</text>

    <rect x="555" y="300" width="210" height="55" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
    <text x="660" y="318" text-anchor="middle" font-size="9" font-weight="600" fill="#92400e">Parallel to Chinese:</text>
    <text x="660" y="335" text-anchor="middle" font-size="9" fill="#92400e">Vernacular elevated to replace</text>
    <text x="660" y="350" text-anchor="middle" font-size="9" fill="#92400e">prestige classical language</text>

    <!-- English -->
    <rect x="795" y="80" width="240" height="310" rx="12" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/>
    <text x="915" y="108" text-anchor="middle" font-size="16" font-weight="700" fill="#475569">English</text>
    <text x="915" y="126" text-anchor="middle" font-size="11" font-weight="600" fill="#22c55e">RESOLVED (~1400s)</text>

    <rect x="810" y="140" width="210" height="60" rx="6" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/>
    <text x="915" y="158" text-anchor="middle" font-size="11" font-weight="600" fill="#475569">HIGH: Latin + Norman French</text>
    <text x="915" y="175" text-anchor="middle" font-size="9" fill="#64748b">Court, law, church</text>
    <text x="915" y="189" text-anchor="middle" font-size="9" fill="#64748b">Post-1066 Norman Conquest</text>

    <line x1="915" y1="200" x2="915" y2="230" stroke="#22c55e" stroke-width="2"/>
    <text x="985" y="218" font-size="9" font-weight="600" fill="#22c55e">Organic &#8595;</text>

    <rect x="810" y="230" width="210" height="60" rx="6" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
    <text x="915" y="250" text-anchor="middle" font-size="11" font-weight="600" fill="#16a34a">LOW &#8594; NOW STANDARD</text>
    <text x="915" y="268" text-anchor="middle" font-size="9" fill="#166534">Middle English &#8594; Modern English</text>
    <text x="915" y="282" text-anchor="middle" font-size="9" fill="#166534">No Academy; organic evolution</text>

    <rect x="810" y="300" width="210" height="55" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
    <text x="915" y="318" text-anchor="middle" font-size="9" font-weight="600" fill="#92400e">Unique: no top-down reform</text>
    <text x="915" y="335" text-anchor="middle" font-size="9" fill="#92400e">Prestige, printing, and</text>
    <text x="915" y="350" text-anchor="middle" font-size="9" fill="#92400e">colonialism drove the shift</text>

    <!-- Characters as unity mechanism -->
    <text x="525" y="420" text-anchor="middle" font-size="16" font-weight="700" fill="#1a1a2e">Why Characters Persist: Variety-Independent Meaning Encoding</text>

    <rect x="30" y="440" width="990" height="110" rx="10" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
    <text x="525" y="465" text-anchor="middle" font-size="13" font-weight="600" fill="#334155">Same sentence: &#25105;&#21435;&#23398;&#26657; -- Five completely different pronunciations</text>

    <text x="120" y="495" text-anchor="middle" font-size="11" font-weight="600" fill="#4f46e5">Mandarin</text>
    <text x="120" y="512" text-anchor="middle" font-size="10" fill="#3730a3">w&#466; q&#249; xu&#233;xi&#224;o</text>

    <text x="300" y="495" text-anchor="middle" font-size="11" font-weight="600" fill="#ea580c">Cantonese</text>
    <text x="300" y="512" text-anchor="middle" font-size="10" fill="#9a3412">ng&#243;h heui hohk haauh</text>

    <text x="480" y="495" text-anchor="middle" font-size="11" font-weight="600" fill="#16a34a">Shanghainese</text>
    <text x="480" y="512" text-anchor="middle" font-size="10" fill="#166534">ngu qi hhoh hhau</text>

    <text x="660" y="495" text-anchor="middle" font-size="11" font-weight="600" fill="#7c3aed">Hokkien</text>
    <text x="660" y="512" text-anchor="middle" font-size="10" fill="#5b21b6">g&#243;a kh&#236; ha&#803;k-h&#257;u</text>

    <text x="840" y="495" text-anchor="middle" font-size="11" font-weight="600" fill="#0284c7">Hakka</text>
    <text x="840" y="512" text-anchor="middle" font-size="10" fill="#0369a1">ngi s&#7869;t fan &#234; m&#242;</text>

    <text x="525" y="540" text-anchor="middle" font-size="11" font-style="italic" fill="#475569">Characters encode meaning, not sound. An alphabet would make these five separate "languages" visible.</text>

    <!-- Bottom pattern -->
    <rect x="30" y="570" width="990" height="75" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
    <text x="525" y="595" text-anchor="middle" font-size="14" font-weight="700" fill="#3730a3">THE PATTERN: Diglossia is a universal pressure. Resolution depends on political structure.</text>
    <text x="525" y="618" text-anchor="middle" font-size="11" fill="#4f46e5">Chinese: resolved by intellectual revolution (May Fourth). French: resolved by royal decree. English: resolved organically.</text>
    <text x="525" y="636" text-anchor="middle" font-size="11" fill="#6366f1">Arabic: still unresolved. The writing system's role as unity mechanism makes Chinese uniquely resistant to fragmentation.</text>
  </svg>
  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background:#6366f1;"></div>Chinese (resolved 1919)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#f97316;"></div>Arabic (unresolved)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#22c55e;"></div>French (resolved 1539)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#94a3b8;"></div>English (resolved ~1400s)</div>
  </div>
  <figcaption>
    <strong>Figure 3: Diglossia Across Four Languages -- Same Phenomenon, Four Outcomes</strong>
    <span>All four languages experienced a split between a prestige written form and a living spoken form. Chinese, French, and English resolved theirs; Arabic's persists. Chinese characters serve as a variety-independent meaning encoding that holds mutually unintelligible spoken varieties together under one writing system -- a role no alphabet could perform.</span>
  </figcaption>
</figure>
</body>
</html>
